<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wilson's Algorithm - Maze Generation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a.back-link {
    position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none;
    z-index: 1000; font-size: 1.2rem;
}
a.back-link:hover { color: #DDA15E; }
.controls {
    position: fixed; top: 10px; right: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 16px; min-width: 200px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { font-size: 13px; color: #8A9A5B; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.controls label { display: block; font-size: 12px; color: #FEFAE0; margin-top: 6px; opacity: 0.8; }
.controls input[type=range] { width: 100%; margin: 4px 0; accent-color: #8A9A5B; }
.btn {
    display: inline-block; margin: 3px 2px; padding: 6px 12px; border: none; border-radius: 6px;
    background: #606C38; color: #FEFAE0; font-size: 12px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #8A9A5B; }
.btn-row { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
.info {
    position: fixed; bottom: 10px; left: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 12px 16px; max-width: 320px;
    border: 1px solid rgba(138,154,91,0.3); font-size: 12px; line-height: 1.5;
}
.info h4 { color: #DDA15E; margin-bottom: 4px; }
.info p { color: #FEFAE0; opacity: 0.8; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="controls">
    <h3>Wilson's Algorithm</h3>
    <label>Grid Size: <span id="sizeVal">20</span></label>
    <input type="range" id="sizeSlider" min="8" max="40" value="20">
    <label>Speed: <span id="speedVal">20</span> steps/frame</label>
    <input type="range" id="speedSlider" min="1" max="100" value="20">
    <div class="btn-row">
        <button class="btn" id="btnGenerate">Generate</button>
        <button class="btn" id="btnInstant">Instant</button>
    </div>
</div>

<div class="info">
    <h4>Wilson's Loop-Erased Random Walk</h4>
    <p>Generates uniformly random spanning trees. Performs random walks that erase loops when they form. Slow to start (the walk wanders aimlessly) but speeds up as more cells join the maze. Produces unbiased, perfectly random mazes.</p>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let cols, rows, cellSize, grid, inMaze, walkPath, walkDir, walkCell, unvisited, generating, autoMode, stepsPerFrame;

const DIRS = [
    { dr: -1, dc: 0, wall: 0, opp: 2 },
    { dr: 0, dc: 1, wall: 1, opp: 3 },
    { dr: 1, dc: 0, wall: 2, opp: 0 },
    { dr: 0, dc: -1, wall: 3, opp: 1 }
];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function idx(r, c) {
    if (r < 0 || c < 0 || r >= rows || c >= cols) return -1;
    return r * cols + c;
}

function initGrid() {
    const size = parseInt(document.getElementById('sizeSlider').value);
    cellSize = Math.floor(Math.min(canvas.width, canvas.height) / (size + 2));
    cols = Math.floor((canvas.width - cellSize) / cellSize);
    rows = Math.floor((canvas.height - cellSize) / cellSize);
    grid = [];
    inMaze = [];
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            grid.push({ r, c, walls: [true, true, true, true] });
            inMaze.push(false);
        }
    }
    // Start with one random cell in maze
    const startIdx = Math.floor(Math.random() * grid.length);
    inMaze[startIdx] = true;

    unvisited = [];
    for (let i = 0; i < grid.length; i++) {
        if (i !== startIdx) unvisited.push(i);
    }
    walkPath = [];
    walkDir = [];
    walkCell = -1;
    startNewWalk();
    generating = true;
    autoMode = false;
}

function startNewWalk() {
    if (unvisited.length === 0) {
        generating = false;
        walkPath = [];
        return;
    }
    const ri = Math.floor(Math.random() * unvisited.length);
    walkCell = unvisited[ri];
    walkPath = [walkCell];
    walkDir = [];
}

function step() {
    if (!generating) return false;
    if (unvisited.length === 0) {
        generating = false;
        return false;
    }
    if (walkCell < 0) {
        startNewWalk();
        return true;
    }

    const cell = grid[walkCell];
    // Random neighbor
    const validDirs = [];
    for (const d of DIRS) {
        const ni = idx(cell.r + d.dr, cell.c + d.dc);
        if (ni >= 0) validDirs.push({ ni, d });
    }
    const chosen = validDirs[Math.floor(Math.random() * validDirs.length)];
    const nextIdx = chosen.ni;

    // Check if next cell is in maze - carve path
    if (inMaze[nextIdx]) {
        walkPath.push(nextIdx);
        walkDir.push(chosen.d);
        // Carve the path into the maze
        for (let i = 0; i < walkPath.length - 1; i++) {
            const ci = walkPath[i];
            const ni = walkPath[i + 1];
            const d = walkDir[i];
            grid[ci].walls[d.wall] = false;
            grid[ni].walls[d.opp] = false;
            inMaze[ci] = true;
        }
        inMaze[nextIdx] = true;
        // Remove carved cells from unvisited
        unvisited = unvisited.filter(u => !inMaze[u]);
        walkPath = [];
        walkDir = [];
        walkCell = -1;
        startNewWalk();
        return true;
    }

    // Check if next cell is already in walk path (loop)
    const loopIdx = walkPath.indexOf(nextIdx);
    if (loopIdx >= 0) {
        // Erase the loop
        walkPath = walkPath.slice(0, loopIdx + 1);
        walkDir = walkDir.slice(0, loopIdx);
        walkCell = nextIdx;
    } else {
        walkPath.push(nextIdx);
        walkDir.push(chosen.d);
        walkCell = nextIdx;
    }
    return true;
}

function drawCell(i, color) {
    const cell = grid[i];
    const x = cell.c * cellSize + cellSize / 2;
    const y = cell.r * cellSize + cellSize / 2;
    ctx.fillStyle = color;
    ctx.fillRect(x, y, cellSize, cellSize);
}

function drawWalls(cell) {
    const x = cell.c * cellSize + cellSize / 2;
    const y = cell.r * cellSize + cellSize / 2;
    ctx.strokeStyle = '#8A9A5B';
    ctx.lineWidth = 2;
    ctx.beginPath();
    if (cell.walls[0]) { ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); }
    if (cell.walls[1]) { ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); }
    if (cell.walls[2]) { ctx.moveTo(x, y + cellSize); ctx.lineTo(x + cellSize, y + cellSize); }
    if (cell.walls[3]) { ctx.moveTo(x, y); ctx.lineTo(x, y + cellSize); }
    ctx.stroke();
}

function draw() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw maze cells
    for (let i = 0; i < grid.length; i++) {
        if (inMaze[i]) drawCell(i, '#2a2a4e');
    }
    // Draw walk path
    for (let i = 0; i < walkPath.length; i++) {
        const progress = i / Math.max(1, walkPath.length - 1);
        const r = Math.floor(96 + progress * 125);
        const g = Math.floor(108 + progress * 53);
        const b = Math.floor(56 + progress * 38);
        drawCell(walkPath[i], `rgb(${r},${g},${b})`);
    }
    // Draw walls for maze cells
    for (let i = 0; i < grid.length; i++) {
        if (inMaze[i]) drawWalls(grid[i]);
    }
}

function animate() {
    if (autoMode && generating) {
        stepsPerFrame = parseInt(document.getElementById('speedSlider').value);
        for (let i = 0; i < stepsPerFrame; i++) {
            if (!step()) break;
        }
    }
    draw();
    requestAnimationFrame(animate);
}

function generate() {
    initGrid();
    autoMode = true;
}

function instant() {
    initGrid();
    while (step()) {}
}

window.reset = generate;

document.getElementById('btnGenerate').addEventListener('click', generate);
document.getElementById('btnInstant').addEventListener('click', instant);
document.getElementById('sizeSlider').addEventListener('input', e => {
    document.getElementById('sizeVal').textContent = e.target.value;
});
document.getElementById('speedSlider').addEventListener('input', e => {
    document.getElementById('speedVal').textContent = e.target.value;
});

let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => { resize(); generate(); }, 200);
});

resize();
generate();
animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
