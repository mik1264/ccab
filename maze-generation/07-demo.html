<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Tree &amp; Sidewinder - Maze Generation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a.back-link {
    position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none;
    z-index: 1000; font-size: 1.2rem;
}
a.back-link:hover { color: #DDA15E; }
.controls {
    position: fixed; top: 10px; right: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 16px; min-width: 220px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { font-size: 13px; color: #8A9A5B; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.controls label { display: block; font-size: 12px; color: #FEFAE0; margin-top: 6px; opacity: 0.8; }
.controls input[type=range] { width: 100%; margin: 4px 0; accent-color: #8A9A5B; }
.controls select {
    width: 100%; margin: 4px 0; padding: 4px 8px; border-radius: 6px;
    background: #2a2a4e; color: #FEFAE0; border: 1px solid rgba(138,154,91,0.3);
    font-size: 12px;
}
.btn {
    display: inline-block; margin: 3px 2px; padding: 6px 12px; border: none; border-radius: 6px;
    background: #606C38; color: #FEFAE0; font-size: 12px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #8A9A5B; }
.btn-row { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
.info {
    position: fixed; bottom: 10px; left: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 12px 16px; max-width: 320px;
    border: 1px solid rgba(138,154,91,0.3); font-size: 12px; line-height: 1.5;
}
.info h4 { color: #DDA15E; margin-bottom: 4px; }
.info p { color: #FEFAE0; opacity: 0.8; }
#algoDesc { margin-top: 6px; font-style: italic; color: #8A9A5B; font-size: 11px; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="controls">
    <h3>Simple Mazes</h3>
    <label>Algorithm:</label>
    <select id="algoSelect">
        <option value="binary">Binary Tree</option>
        <option value="sidewinder">Sidewinder</option>
    </select>
    <label>Grid Size: <span id="sizeVal">30</span></label>
    <input type="range" id="sizeSlider" min="10" max="60" value="30">
    <label>Speed: <span id="speedVal">5</span> cells/frame</label>
    <input type="range" id="speedSlider" min="1" max="30" value="5">
    <div class="btn-row">
        <button class="btn" id="btnGenerate">Generate</button>
        <button class="btn" id="btnInstant">Instant</button>
    </div>
</div>

<div class="info">
    <h4>Binary Tree &amp; Sidewinder</h4>
    <p>Two of the simplest maze algorithms. Binary Tree: each cell connects either north or east (coin flip). Sidewinder: extends runs eastward, then connects one cell northward.</p>
    <div id="algoDesc">Binary Tree: Notice the diagonal bias and open north/east edges.</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let cols, rows, cellSize, grid, currentR, currentC, generating, autoMode, stepsPerFrame;
let algorithm, run;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function initGrid() {
    const size = parseInt(document.getElementById('sizeSlider').value);
    algorithm = document.getElementById('algoSelect').value;
    cellSize = Math.floor(Math.min(canvas.width, canvas.height) / (size + 2));
    cols = Math.floor((canvas.width - cellSize) / cellSize);
    rows = Math.floor((canvas.height - cellSize) / cellSize);
    grid = [];
    for (let r = 0; r < rows; r++) {
        grid[r] = [];
        for (let c = 0; c < cols; c++) {
            grid[r][c] = { right: true, bottom: true, visited: false };
        }
    }
    currentR = 0;
    currentC = 0;
    run = [];
    generating = true;
    autoMode = false;

    const desc = document.getElementById('algoDesc');
    if (algorithm === 'binary') {
        desc.textContent = 'Binary Tree: Notice the diagonal bias and open north/east edges.';
    } else {
        desc.textContent = 'Sidewinder: Only the top row is one long corridor. Less bias than Binary Tree.';
    }
}

function stepBinaryTree() {
    if (currentR >= rows) { generating = false; return false; }
    const r = currentR, c = currentC;
    grid[r][c].visited = true;

    const canGoNorth = r > 0;
    const canGoEast = c < cols - 1;

    if (canGoNorth && canGoEast) {
        if (Math.random() < 0.5) {
            // North
            grid[r - 1][c].bottom = false;
        } else {
            // East
            grid[r][c].right = false;
        }
    } else if (canGoNorth) {
        grid[r - 1][c].bottom = false;
    } else if (canGoEast) {
        grid[r][c].right = false;
    }

    currentC++;
    if (currentC >= cols) { currentC = 0; currentR++; }
    return currentR < rows;
}

function stepSidewinder() {
    if (currentR >= rows) { generating = false; return false; }
    const r = currentR, c = currentC;
    grid[r][c].visited = true;
    run.push(c);

    const canGoNorth = r > 0;
    const canGoEast = c < cols - 1;
    const shouldClose = !canGoEast || (canGoNorth && Math.random() < 0.5);

    if (shouldClose && canGoNorth) {
        // Pick random cell from run, connect north
        const rc = run[Math.floor(Math.random() * run.length)];
        grid[r - 1][rc].bottom = false;
        run = [];
    } else if (canGoEast) {
        grid[r][c].right = false;
    }

    currentC++;
    if (currentC >= cols) {
        currentC = 0;
        currentR++;
        run = [];
    }
    return currentR < rows;
}

function step() {
    if (algorithm === 'binary') return stepBinaryTree();
    return stepSidewinder();
}

function draw() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const ox = cellSize / 2, oy = cellSize / 2;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const x = c * cellSize + ox;
            const y = r * cellSize + oy;
            if (grid[r][c].visited) {
                ctx.fillStyle = '#2a2a4e';
            } else {
                ctx.fillStyle = '#1e1e3e';
            }
            ctx.fillRect(x, y, cellSize, cellSize);
        }
    }

    // Highlight current cell
    if (generating && currentR < rows) {
        ctx.fillStyle = 'rgba(221,161,94,0.5)';
        ctx.fillRect(currentC * cellSize + ox, currentR * cellSize + oy, cellSize, cellSize);
        // Highlight run
        for (const rc of run) {
            ctx.fillStyle = 'rgba(138,154,91,0.3)';
            ctx.fillRect(rc * cellSize + ox, currentR * cellSize + oy, cellSize, cellSize);
        }
    }

    // Draw walls
    ctx.strokeStyle = '#8A9A5B';
    ctx.lineWidth = 2;
    ctx.strokeRect(ox, oy, cols * cellSize, rows * cellSize);

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const x = c * cellSize + ox;
            const y = r * cellSize + oy;
            ctx.beginPath();
            if (grid[r][c].right && c < cols - 1) {
                ctx.moveTo(x + cellSize, y);
                ctx.lineTo(x + cellSize, y + cellSize);
            }
            if (grid[r][c].bottom && r < rows - 1) {
                ctx.moveTo(x, y + cellSize);
                ctx.lineTo(x + cellSize, y + cellSize);
            }
            ctx.stroke();
        }
    }
}

function animate() {
    if (autoMode && generating) {
        stepsPerFrame = parseInt(document.getElementById('speedSlider').value);
        for (let i = 0; i < stepsPerFrame; i++) {
            if (!step()) break;
        }
    }
    draw();
    requestAnimationFrame(animate);
}

function generate() {
    initGrid();
    autoMode = true;
}

function instant() {
    initGrid();
    while (step()) {}
}

window.reset = generate;

document.getElementById('btnGenerate').addEventListener('click', generate);
document.getElementById('btnInstant').addEventListener('click', instant);
document.getElementById('algoSelect').addEventListener('change', generate);
document.getElementById('sizeSlider').addEventListener('input', e => {
    document.getElementById('sizeVal').textContent = e.target.value;
});
document.getElementById('speedSlider').addEventListener('input', e => {
    document.getElementById('speedVal').textContent = e.target.value;
});

let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => { resize(); generate(); }, 200);
});

resize();
generate();
animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
