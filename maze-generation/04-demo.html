<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recursive Division Maze - Maze Generation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a.back-link {
    position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none;
    z-index: 1000; font-size: 1.2rem;
}
a.back-link:hover { color: #DDA15E; }
.controls {
    position: fixed; top: 10px; right: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 16px; min-width: 200px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { font-size: 13px; color: #8A9A5B; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.controls label { display: block; font-size: 12px; color: #FEFAE0; margin-top: 6px; opacity: 0.8; }
.controls input[type=range] { width: 100%; margin: 4px 0; accent-color: #8A9A5B; }
.btn {
    display: inline-block; margin: 3px 2px; padding: 6px 12px; border: none; border-radius: 6px;
    background: #606C38; color: #FEFAE0; font-size: 12px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #8A9A5B; }
.btn-row { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
.info {
    position: fixed; bottom: 10px; left: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 12px 16px; max-width: 320px;
    border: 1px solid rgba(138,154,91,0.3); font-size: 12px; line-height: 1.5;
}
.info h4 { color: #DDA15E; margin-bottom: 4px; }
.info p { color: #FEFAE0; opacity: 0.8; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="controls">
    <h3>Recursive Division</h3>
    <label>Grid Size: <span id="sizeVal">30</span></label>
    <input type="range" id="sizeSlider" min="10" max="60" value="30">
    <label>Speed: <span id="speedVal">5</span> walls/frame</label>
    <input type="range" id="speedSlider" min="1" max="30" value="5">
    <div class="btn-row">
        <button class="btn" id="btnGenerate">Generate</button>
        <button class="btn" id="btnInstant">Instant</button>
    </div>
</div>

<div class="info">
    <h4>Recursive Division</h4>
    <p>The only wall-adding algorithm. Starts with an open field, recursively divides it with walls that have single passage holes. Creates fractal-like rooms with long straight walls.</p>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let cols, rows, cellSize, wallGrid, taskQueue, generating, autoMode, stepsPerFrame;
let activeWall = null;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function initGrid() {
    const size = parseInt(document.getElementById('sizeSlider').value);
    cellSize = Math.floor(Math.min(canvas.width, canvas.height) / (size + 2));
    cols = Math.floor((canvas.width - cellSize) / cellSize);
    rows = Math.floor((canvas.height - cellSize) / cellSize);

    // wallGrid[r][c] = {right: bool, bottom: bool}
    wallGrid = [];
    for (let r = 0; r < rows; r++) {
        wallGrid[r] = [];
        for (let c = 0; c < cols; c++) {
            wallGrid[r][c] = {
                right: c === cols - 1,
                bottom: r === rows - 1,
                top: r === 0,
                left: c === 0
            };
        }
    }
    // Add border walls
    taskQueue = [];
    divide(0, 0, cols, rows);
    generating = true;
    autoMode = false;
    activeWall = null;
}

function divide(x, y, w, h) {
    if (w < 2 || h < 2) return;

    const horizontal = h > w ? true : (w > h ? false : Math.random() < 0.5);

    if (horizontal) {
        const wy = y + 1 + Math.floor(Math.random() * (h - 1));
        const passage = x + Math.floor(Math.random() * w);
        taskQueue.push({ type: 'hwall', x, y: wy, w, passage });
        // Queue sub-divisions (will be processed after walls)
        taskQueue.push({ type: 'divide', x, y, w, h: wy - y });
        taskQueue.push({ type: 'divide', x, y: wy, w, h: y + h - wy });
    } else {
        const wx = x + 1 + Math.floor(Math.random() * (w - 1));
        const passage = y + Math.floor(Math.random() * h);
        taskQueue.push({ type: 'vwall', x: wx, y, h, passage });
        taskQueue.push({ type: 'divide', x, y, w: wx - x, h });
        taskQueue.push({ type: 'divide', x: wx, y, w: x + w - wx, h });
    }
}

function step() {
    if (!generating || taskQueue.length === 0) {
        generating = false;
        activeWall = null;
        return false;
    }
    const task = taskQueue.shift();
    if (task.type === 'divide') {
        divide(task.x, task.y, task.w, task.h);
        return taskQueue.length > 0;
    }
    if (task.type === 'hwall') {
        activeWall = { cells: [] };
        for (let c = task.x; c < task.x + task.w; c++) {
            if (c !== task.passage && task.y - 1 >= 0 && task.y - 1 < rows) {
                wallGrid[task.y - 1][c].bottom = true;
                if (task.y < rows) wallGrid[task.y][c].top = true;
                activeWall.cells.push({ r: task.y - 1, c, side: 'bottom' });
            }
        }
    }
    if (task.type === 'vwall') {
        activeWall = { cells: [] };
        for (let r = task.y; r < task.y + task.h; r++) {
            if (r !== task.passage && task.x - 1 >= 0 && task.x - 1 < cols) {
                wallGrid[r][task.x - 1].right = true;
                if (task.x < cols) wallGrid[r][task.x].left = true;
                activeWall.cells.push({ r, c: task.x - 1, side: 'right' });
            }
        }
    }
    return taskQueue.length > 0;
}

function draw() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const ox = cellSize / 2;
    const oy = cellSize / 2;

    // Fill all cells as open space
    ctx.fillStyle = '#2a2a4e';
    ctx.fillRect(ox, oy, cols * cellSize, rows * cellSize);

    // Highlight active wall
    if (activeWall) {
        for (const w of activeWall.cells) {
            const x = w.c * cellSize + ox;
            const y = w.r * cellSize + oy;
            ctx.fillStyle = 'rgba(221,161,94,0.2)';
            ctx.fillRect(x, y, cellSize, cellSize);
        }
    }

    // Draw walls
    ctx.strokeStyle = '#8A9A5B';
    ctx.lineWidth = 2;
    // Border
    ctx.strokeRect(ox, oy, cols * cellSize, rows * cellSize);
    // Internal walls
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const x = c * cellSize + ox;
            const y = r * cellSize + oy;
            ctx.beginPath();
            if (wallGrid[r][c].bottom && r < rows - 1) {
                ctx.moveTo(x, y + cellSize);
                ctx.lineTo(x + cellSize, y + cellSize);
            }
            if (wallGrid[r][c].right && c < cols - 1) {
                ctx.moveTo(x + cellSize, y);
                ctx.lineTo(x + cellSize, y + cellSize);
            }
            ctx.stroke();
        }
    }
}

function animate() {
    if (autoMode && generating) {
        stepsPerFrame = parseInt(document.getElementById('speedSlider').value);
        for (let i = 0; i < stepsPerFrame; i++) {
            if (!step()) break;
        }
    }
    draw();
    requestAnimationFrame(animate);
}

function generate() {
    initGrid();
    autoMode = true;
}

function instant() {
    initGrid();
    while (step()) {}
}

window.reset = generate;

document.getElementById('btnGenerate').addEventListener('click', generate);
document.getElementById('btnInstant').addEventListener('click', instant);
document.getElementById('sizeSlider').addEventListener('input', e => {
    document.getElementById('sizeVal').textContent = e.target.value;
});
document.getElementById('speedSlider').addEventListener('input', e => {
    document.getElementById('speedVal').textContent = e.target.value;
});

let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => { resize(); generate(); }, 200);
});

resize();
generate();
animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
