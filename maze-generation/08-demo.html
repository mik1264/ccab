<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A* Pathfinding - Maze Generation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a.back-link {
    position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none;
    z-index: 1000; font-size: 1.2rem;
}
a.back-link:hover { color: #DDA15E; }
.controls {
    position: fixed; top: 10px; right: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 16px; min-width: 220px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { font-size: 13px; color: #8A9A5B; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.controls label { display: block; font-size: 12px; color: #FEFAE0; margin-top: 6px; opacity: 0.8; }
.controls input[type=range] { width: 100%; margin: 4px 0; accent-color: #8A9A5B; }
.btn {
    display: inline-block; margin: 3px 2px; padding: 6px 12px; border: none; border-radius: 6px;
    background: #606C38; color: #FEFAE0; font-size: 12px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #8A9A5B; }
.btn.active { background: #DDA15E; color: #1a1a2e; }
.btn-row { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
.stats-bar {
    position: fixed; bottom: 10px; left: 10px; right: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 10px 16px;
    border: 1px solid rgba(138,154,91,0.3); font-size: 12px;
    display: flex; gap: 20px; flex-wrap: wrap;
}
.stat { display: flex; gap: 6px; }
.stat-label { color: #888; }
.stat-value { color: #DDA15E; font-family: monospace; }
.info {
    position: fixed; bottom: 50px; left: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 12px 16px; max-width: 300px;
    border: 1px solid rgba(138,154,91,0.3); font-size: 12px; line-height: 1.5;
}
.info h4 { color: #DDA15E; margin-bottom: 4px; }
.info p { color: #FEFAE0; opacity: 0.8; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="controls">
    <h3>A* Pathfinding</h3>
    <label>Grid Size: <span id="sizeVal">25</span></label>
    <input type="range" id="sizeSlider" min="10" max="50" value="25">
    <label>Solve Speed: <span id="speedVal">5</span> steps/frame</label>
    <input type="range" id="speedSlider" min="1" max="30" value="5">
    <div class="btn-row">
        <button class="btn" id="btnNew">New Maze</button>
        <button class="btn" id="btnSolve">Solve A*</button>
        <button class="btn" id="btnSolveDijkstra">Dijkstra</button>
    </div>
</div>

<div class="info">
    <h4>A* vs Dijkstra Pathfinding</h4>
    <p>Generate a maze with DFS, then watch A* or Dijkstra find the shortest path. A* uses Manhattan distance heuristic (orange = explored, green = path). Dijkstra explores uniformly.</p>
</div>

<div class="stats-bar">
    <div class="stat"><span class="stat-label">Explored:</span><span class="stat-value" id="explored">0</span></div>
    <div class="stat"><span class="stat-label">Path Length:</span><span class="stat-value" id="pathLen">-</span></div>
    <div class="stat"><span class="stat-label">Status:</span><span class="stat-value" id="status">Ready</span></div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let cols, rows, cellSize, grid;
let openSet, closedSet, cameFrom, gScore, fScore, solving, path, solveMode;
let stepsPerFrame;
const startCell = { r: 0, c: 0 };
let endCell = { r: 0, c: 0 };

const DIRS = [
    { dr: -1, dc: 0, wall: 0, opp: 2 },
    { dr: 0, dc: 1, wall: 1, opp: 3 },
    { dr: 1, dc: 0, wall: 2, opp: 0 },
    { dr: 0, dc: -1, wall: 3, opp: 1 }
];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function idx(r, c) {
    if (r < 0 || c < 0 || r >= rows || c >= cols) return -1;
    return r * cols + c;
}

function generateMaze() {
    const size = parseInt(document.getElementById('sizeSlider').value);
    cellSize = Math.floor(Math.min(canvas.width, canvas.height) / (size + 2));
    cols = Math.floor((canvas.width - cellSize) / cellSize);
    rows = Math.floor((canvas.height - cellSize) / cellSize);
    grid = [];
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            grid.push({ r, c, walls: [true, true, true, true], visited: false });
        }
    }
    // DFS generation
    const stack = [];
    const start = grid[0];
    start.visited = true;
    stack.push(start);
    while (stack.length > 0) {
        const current = stack[stack.length - 1];
        const neighbors = [];
        for (const d of DIRS) {
            const ni = idx(current.r + d.dr, current.c + d.dc);
            if (ni >= 0 && !grid[ni].visited) neighbors.push({ cell: grid[ni], d });
        }
        if (neighbors.length > 0) {
            const chosen = neighbors[Math.floor(Math.random() * neighbors.length)];
            current.walls[chosen.d.wall] = false;
            chosen.cell.walls[chosen.d.opp] = false;
            chosen.cell.visited = true;
            stack.push(chosen.cell);
        } else {
            stack.pop();
        }
    }
    endCell = { r: rows - 1, c: cols - 1 };
    solving = false;
    path = [];
    openSet = [];
    closedSet = new Set();
    document.getElementById('explored').textContent = '0';
    document.getElementById('pathLen').textContent = '-';
    document.getElementById('status').textContent = 'Ready';
}

function heuristic(a, b) {
    return Math.abs(a.r - b.r) + Math.abs(a.c - b.c);
}

function startSolve(mode) {
    solveMode = mode;
    const n = rows * cols;
    gScore = new Array(n).fill(Infinity);
    fScore = new Array(n).fill(Infinity);
    cameFrom = new Array(n).fill(-1);
    closedSet = new Set();
    path = [];

    const si = idx(startCell.r, startCell.c);
    gScore[si] = 0;
    fScore[si] = mode === 'astar' ? heuristic(startCell, endCell) : 0;
    openSet = [si];
    solving = true;
    document.getElementById('status').textContent = mode === 'astar' ? 'Solving (A*)...' : 'Solving (Dijkstra)...';
}

function solvingStep() {
    if (!solving || openSet.length === 0) {
        solving = false;
        document.getElementById('status').textContent = path.length > 0 ? 'Solved!' : 'No path!';
        return false;
    }

    // Find lowest fScore in openSet
    let bestIdx = 0;
    for (let i = 1; i < openSet.length; i++) {
        if (fScore[openSet[i]] < fScore[openSet[bestIdx]]) bestIdx = i;
    }
    const current = openSet[bestIdx];
    openSet.splice(bestIdx, 1);

    const cell = grid[current];
    if (cell.r === endCell.r && cell.c === endCell.c) {
        // Reconstruct path
        path = [];
        let ci = current;
        while (ci >= 0) {
            path.push(ci);
            ci = cameFrom[ci];
        }
        path.reverse();
        solving = false;
        document.getElementById('pathLen').textContent = path.length;
        document.getElementById('status').textContent = solveMode === 'astar' ? 'Solved (A*)!' : 'Solved (Dijkstra)!';
        return false;
    }

    closedSet.add(current);
    document.getElementById('explored').textContent = closedSet.size;

    for (const d of DIRS) {
        if (cell.walls[d.wall]) continue;
        const ni = idx(cell.r + d.dr, cell.c + d.dc);
        if (ni < 0 || closedSet.has(ni)) continue;
        const tentG = gScore[current] + 1;
        if (tentG < gScore[ni]) {
            cameFrom[ni] = current;
            gScore[ni] = tentG;
            fScore[ni] = tentG + (solveMode === 'astar' ? heuristic(grid[ni], endCell) : 0);
            if (!openSet.includes(ni)) openSet.push(ni);
        }
    }
    return true;
}

function drawCell(i, color) {
    const cell = grid[i];
    const x = cell.c * cellSize + cellSize / 2;
    const y = cell.r * cellSize + cellSize / 2;
    ctx.fillStyle = color;
    ctx.fillRect(x, y, cellSize, cellSize);
}

function draw() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // All cells
    for (let i = 0; i < grid.length; i++) {
        drawCell(i, '#2a2a4e');
    }

    // Closed set (explored)
    for (const ci of closedSet) {
        drawCell(ci, 'rgba(96,108,56,0.3)');
    }

    // Open set
    for (const ci of openSet) {
        drawCell(ci, 'rgba(221,161,94,0.3)');
    }

    // Path
    if (path.length > 0) {
        for (let i = 0; i < path.length; i++) {
            const t = i / path.length;
            const r = Math.floor(96 + t * 125);
            const g = Math.floor(108 + t * 53);
            const b = Math.floor(56);
            drawCell(path[i], `rgb(${r},${g},${b})`);
        }
    }

    // Start and end
    drawCell(idx(startCell.r, startCell.c), '#606C38');
    drawCell(idx(endCell.r, endCell.c), '#DDA15E');

    // Walls
    ctx.strokeStyle = '#8A9A5B';
    ctx.lineWidth = 1.5;
    for (const cell of grid) {
        const x = cell.c * cellSize + cellSize / 2;
        const y = cell.r * cellSize + cellSize / 2;
        ctx.beginPath();
        if (cell.walls[0]) { ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); }
        if (cell.walls[1]) { ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); }
        if (cell.walls[2]) { ctx.moveTo(x, y + cellSize); ctx.lineTo(x + cellSize, y + cellSize); }
        if (cell.walls[3]) { ctx.moveTo(x, y); ctx.lineTo(x, y + cellSize); }
        ctx.stroke();
    }
}

function animate() {
    if (solving) {
        stepsPerFrame = parseInt(document.getElementById('speedSlider').value);
        for (let i = 0; i < stepsPerFrame; i++) {
            if (!solvingStep()) break;
        }
    }
    draw();
    requestAnimationFrame(animate);
}

window.reset = function() {
    generateMaze();
};

document.getElementById('btnNew').addEventListener('click', () => generateMaze());
document.getElementById('btnSolve').addEventListener('click', () => {
    if (solving) return;
    path = [];
    startSolve('astar');
});
document.getElementById('btnSolveDijkstra').addEventListener('click', () => {
    if (solving) return;
    path = [];
    startSolve('dijkstra');
});
document.getElementById('sizeSlider').addEventListener('input', e => {
    document.getElementById('sizeVal').textContent = e.target.value;
});
document.getElementById('speedSlider').addEventListener('input', e => {
    document.getElementById('speedVal').textContent = e.target.value;
});

let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => { resize(); generateMaze(); }, 200);
});

resize();
generateMaze();
animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
