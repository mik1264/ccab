<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algorithm Comparison Arena - Maze Generation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a.back-link {
    position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none;
    z-index: 1000; font-size: 1.2rem;
}
a.back-link:hover { color: #DDA15E; }
.controls {
    position: fixed; top: 10px; right: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 16px; min-width: 200px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { font-size: 13px; color: #8A9A5B; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.controls label { display: block; font-size: 12px; color: #FEFAE0; margin-top: 6px; opacity: 0.8; }
.controls input[type=range] { width: 100%; margin: 4px 0; accent-color: #8A9A5B; }
.btn {
    display: inline-block; margin: 3px 2px; padding: 6px 12px; border: none; border-radius: 6px;
    background: #606C38; color: #FEFAE0; font-size: 12px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #8A9A5B; }
.btn-row { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
.panel-label {
    position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: #DDA15E; text-transform: uppercase; letter-spacing: 1px;
    background: rgba(20,20,40,0.7); padding: 2px 8px; border-radius: 4px;
    white-space: nowrap; z-index: 10;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="controls">
    <h3>Comparison Arena</h3>
    <label>Grid Size: <span id="sizeVal">20</span></label>
    <input type="range" id="sizeSlider" min="8" max="35" value="20">
    <label>Speed: <span id="speedVal">5</span> steps/frame</label>
    <input type="range" id="speedSlider" min="1" max="30" value="5">
    <div class="btn-row">
        <button class="btn" id="btnRace">Race!</button>
        <button class="btn" id="btnInstant">Instant</button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const SAGE = '#8A9A5B';
const EARTH = '#DDA15E';
const BG = '#1a1a2e';
const VISITED = '#2a2a4e';

const ALGOS = [
    { name: 'DFS Backtracker', color: '#606C38' },
    { name: "Prim's", color: '#5a3a2e' },
    { name: "Kruskal's", color: '#2e3a5a' },
    { name: 'Recursive Division', color: '#3a2e5a' }
];

let panels = [];
let gridSize, generating, stepsPerFrame;

const DIRS = [
    { dr: -1, dc: 0, wall: 0, opp: 2 },
    { dr: 0, dc: 1, wall: 1, opp: 3 },
    { dr: 1, dc: 0, wall: 2, opp: 0 },
    { dr: 0, dc: -1, wall: 3, opp: 1 }
];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function createPanel(algo, ox, oy, pw, ph) {
    gridSize = parseInt(document.getElementById('sizeSlider').value);
    const cellSize = Math.floor(Math.min(pw, ph) / (gridSize + 1));
    const cols = Math.floor((pw - 10) / cellSize);
    const rows = Math.floor((ph - 20) / cellSize);

    const grid = [];
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            grid.push({ r, c, walls: [true, true, true, true], visited: false });
        }
    }

    const panel = {
        algo, ox, oy, pw, ph, cellSize, cols, rows, grid,
        done: false, steps: 0
    };

    // Initialize algorithm state
    if (algo.name === 'DFS Backtracker') {
        grid[0].visited = true;
        panel.stack = [grid[0]];
        panel.current = grid[0];
    } else if (algo.name === "Prim's") {
        grid[0].visited = true;
        panel.frontier = [];
        addPrimFrontier(panel, grid[0]);
    } else if (algo.name === "Kruskal's") {
        panel.parent = new Array(rows * cols);
        panel.rank = new Array(rows * cols).fill(0);
        for (let i = 0; i < rows * cols; i++) panel.parent[i] = i;
        panel.edges = [];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const i = r * cols + c;
                if (r > 0) panel.edges.push({ a: i, b: (r-1)*cols+c, wA: 0, wB: 2 });
                if (c < cols-1) panel.edges.push({ a: i, b: r*cols+c+1, wA: 1, wB: 3 });
            }
        }
        for (let i = panel.edges.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [panel.edges[i], panel.edges[j]] = [panel.edges[j], panel.edges[i]];
        }
        panel.edgeIdx = 0;
    } else if (algo.name === 'Recursive Division') {
        // Open all internal walls first
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cell = grid[r * cols + c];
                cell.visited = true;
                if (r > 0) { cell.walls[0] = false; grid[(r-1)*cols+c].walls[2] = false; }
                if (c < cols - 1) { cell.walls[1] = false; grid[r*cols+c+1].walls[3] = false; }
            }
        }
        panel.divQueue = [];
        dividePanel(panel, 0, 0, cols, rows);
    }

    return panel;
}

function pidx(panel, r, c) {
    if (r < 0 || c < 0 || r >= panel.rows || c >= panel.cols) return -1;
    return r * panel.cols + c;
}

function addPrimFrontier(panel, cell) {
    for (const d of DIRS) {
        const ni = pidx(panel, cell.r + d.dr, cell.c + d.dc);
        if (ni >= 0 && !panel.grid[ni].visited) {
            panel.frontier.push(ni);
        }
    }
}

function kfind(panel, x) {
    while (panel.parent[x] !== x) { panel.parent[x] = panel.parent[panel.parent[x]]; x = panel.parent[x]; }
    return x;
}

function kunion(panel, a, b) {
    const ra = kfind(panel, a), rb = kfind(panel, b);
    if (ra === rb) return false;
    if (panel.rank[ra] < panel.rank[rb]) panel.parent[ra] = rb;
    else if (panel.rank[ra] > panel.rank[rb]) panel.parent[rb] = ra;
    else { panel.parent[rb] = ra; panel.rank[ra]++; }
    return true;
}

function dividePanel(panel, x, y, w, h) {
    if (w < 2 || h < 2) return;
    const horiz = h > w ? true : (w > h ? false : Math.random() < 0.5);
    if (horiz) {
        const wy = y + 1 + Math.floor(Math.random() * (h - 1));
        const passage = x + Math.floor(Math.random() * w);
        panel.divQueue.push({ type: 'h', x, y: wy, w, passage });
        dividePanel(panel, x, y, w, wy - y);
        dividePanel(panel, x, wy, w, y + h - wy);
    } else {
        const wx = x + 1 + Math.floor(Math.random() * (w - 1));
        const passage = y + Math.floor(Math.random() * h);
        panel.divQueue.push({ type: 'v', x: wx, y, h, passage });
        dividePanel(panel, x, y, wx - x, h);
        dividePanel(panel, wx, y, x + w - wx, h);
    }
}

function stepPanel(panel) {
    if (panel.done) return false;
    panel.steps++;
    const g = panel.grid;

    if (panel.algo.name === 'DFS Backtracker') {
        if (panel.stack.length === 0) { panel.done = true; return false; }
        const current = panel.stack[panel.stack.length - 1];
        const neighbors = [];
        for (const d of DIRS) {
            const ni = pidx(panel, current.r + d.dr, current.c + d.dc);
            if (ni >= 0 && !g[ni].visited) neighbors.push({ cell: g[ni], d });
        }
        if (neighbors.length > 0) {
            const ch = neighbors[Math.floor(Math.random() * neighbors.length)];
            current.walls[ch.d.wall] = false;
            ch.cell.walls[ch.d.opp] = false;
            ch.cell.visited = true;
            panel.stack.push(ch.cell);
            panel.current = ch.cell;
        } else {
            panel.stack.pop();
            panel.current = panel.stack.length > 0 ? panel.stack[panel.stack.length - 1] : null;
        }
        return panel.stack.length > 0;
    }

    if (panel.algo.name === "Prim's") {
        if (panel.frontier.length === 0) { panel.done = true; return false; }
        const ri = Math.floor(Math.random() * panel.frontier.length);
        const fi = panel.frontier[ri];
        panel.frontier.splice(ri, 1);
        if (g[fi].visited) return true;
        g[fi].visited = true;
        const neighbors = [];
        for (const d of DIRS) {
            const ni = pidx(panel, g[fi].r + d.dr, g[fi].c + d.dc);
            if (ni >= 0 && g[ni].visited) neighbors.push({ ni, d });
        }
        if (neighbors.length > 0) {
            const ch = neighbors[Math.floor(Math.random() * neighbors.length)];
            g[fi].walls[ch.d.wall] = false;
            g[ch.ni].walls[ch.d.opp] = false;
        }
        addPrimFrontier(panel, g[fi]);
        return panel.frontier.length > 0;
    }

    if (panel.algo.name === "Kruskal's") {
        if (panel.edgeIdx >= panel.edges.length) { panel.done = true; return false; }
        const edge = panel.edges[panel.edgeIdx++];
        if (kunion(panel, edge.a, edge.b)) {
            g[edge.a].walls[edge.wA] = false;
            g[edge.b].walls[edge.wB] = false;
            g[edge.a].visited = true;
            g[edge.b].visited = true;
        }
        return panel.edgeIdx < panel.edges.length;
    }

    if (panel.algo.name === 'Recursive Division') {
        if (panel.divQueue.length === 0) { panel.done = true; return false; }
        const task = panel.divQueue.shift();
        if (task.type === 'h') {
            for (let c = task.x; c < task.x + task.w; c++) {
                if (c !== task.passage) {
                    const upper = pidx(panel, task.y - 1, c);
                    const lower = pidx(panel, task.y, c);
                    if (upper >= 0 && lower >= 0) {
                        g[upper].walls[2] = true;
                        g[lower].walls[0] = true;
                    }
                }
            }
        } else {
            for (let r = task.y; r < task.y + task.h; r++) {
                if (r !== task.passage) {
                    const left = pidx(panel, r, task.x - 1);
                    const right = pidx(panel, r, task.x);
                    if (left >= 0 && right >= 0) {
                        g[left].walls[1] = true;
                        g[right].walls[3] = true;
                    }
                }
            }
        }
        return panel.divQueue.length > 0;
    }

    return false;
}

function drawPanel(panel) {
    const { ox, oy, pw, ph, cellSize, cols, rows, grid, algo } = panel;
    const mx = ox + (pw - cols * cellSize) / 2;
    const my = oy + (ph - rows * cellSize) / 2 + 10;

    // Panel border
    ctx.strokeStyle = 'rgba(138,154,91,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(ox, oy, pw, ph);

    // Label
    ctx.fillStyle = EARTH;
    ctx.font = '11px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(algo.name + (panel.done ? ' (done)' : ''), ox + pw / 2, oy + 14);
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText(`steps: ${panel.steps}`, ox + pw / 2, oy + 26);

    // Cells
    for (let i = 0; i < grid.length; i++) {
        const cell = grid[i];
        const x = cell.c * cellSize + mx;
        const y = cell.r * cellSize + my;
        ctx.fillStyle = cell.visited ? VISITED : '#1e1e3e';
        ctx.fillRect(x, y, cellSize, cellSize);
    }

    // Walls
    ctx.strokeStyle = SAGE;
    ctx.lineWidth = 1;
    for (const cell of grid) {
        const x = cell.c * cellSize + mx;
        const y = cell.r * cellSize + my;
        ctx.beginPath();
        if (cell.walls[0]) { ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); }
        if (cell.walls[1]) { ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); }
        if (cell.walls[2]) { ctx.moveTo(x, y + cellSize); ctx.lineTo(x + cellSize, y + cellSize); }
        if (cell.walls[3]) { ctx.moveTo(x, y); ctx.lineTo(x, y + cellSize); }
        ctx.stroke();
    }

    // DFS current cell highlight
    if (panel.algo.name === 'DFS Backtracker' && panel.current && !panel.done) {
        const x = panel.current.c * cellSize + mx;
        const y = panel.current.r * cellSize + my;
        ctx.fillStyle = EARTH;
        ctx.fillRect(x, y, cellSize, cellSize);
    }
}

function initPanels() {
    const w = canvas.width, h = canvas.height;
    const gap = 10;
    const pw = (w - gap * 3) / 2;
    const ph = (h - gap * 3) / 2;
    panels = ALGOS.map((algo, i) => {
        const col = i % 2, row = Math.floor(i / 2);
        const ox = gap + col * (pw + gap);
        const oy = gap + row * (ph + gap);
        return createPanel(algo, ox, oy, pw, ph);
    });
    generating = true;
}

function animate() {
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (generating) {
        stepsPerFrame = parseInt(document.getElementById('speedSlider').value);
        let allDone = true;
        for (const panel of panels) {
            for (let i = 0; i < stepsPerFrame; i++) {
                if (!stepPanel(panel)) break;
            }
            if (!panel.done) allDone = false;
        }
        if (allDone) generating = false;
    }

    for (const panel of panels) drawPanel(panel);
    requestAnimationFrame(animate);
}

function race() {
    initPanels();
}

function instant() {
    initPanels();
    for (const panel of panels) {
        while (stepPanel(panel)) {}
    }
    generating = false;
}

window.reset = race;

document.getElementById('btnRace').addEventListener('click', race);
document.getElementById('btnInstant').addEventListener('click', instant);
document.getElementById('sizeSlider').addEventListener('input', e => {
    document.getElementById('sizeVal').textContent = e.target.value;
});
document.getElementById('speedSlider').addEventListener('input', e => {
    document.getElementById('speedVal').textContent = e.target.value;
});

let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => { resize(); race(); }, 200);
});

resize();
race();
animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
