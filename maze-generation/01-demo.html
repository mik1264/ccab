<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFS Backtracker Maze - Maze Generation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a.back-link {
    position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none;
    z-index: 1000; font-size: 1.2rem;
}
a.back-link:hover { color: #DDA15E; }

.controls {
    position: fixed; top: 10px; right: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 16px; min-width: 200px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { font-size: 13px; color: #8A9A5B; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.controls label { display: block; font-size: 12px; color: #FEFAE0; margin-top: 6px; opacity: 0.8; }
.controls input[type=range] { width: 100%; margin: 4px 0; accent-color: #8A9A5B; }
.controls .value { font-size: 11px; color: #DDA15E; text-align: right; }
.btn {
    display: inline-block; margin: 3px 2px; padding: 6px 12px; border: none; border-radius: 6px;
    background: #606C38; color: #FEFAE0; font-size: 12px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #8A9A5B; }
.btn-row { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }

.info {
    position: fixed; bottom: 10px; left: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 12px 16px; max-width: 300px;
    border: 1px solid rgba(138,154,91,0.3); font-size: 12px; line-height: 1.5;
}
.info h4 { color: #DDA15E; margin-bottom: 4px; }
.info p { color: #FEFAE0; opacity: 0.8; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="controls">
    <h3>DFS Backtracker</h3>
    <label>Grid Size: <span id="sizeVal">25</span></label>
    <input type="range" id="sizeSlider" min="10" max="60" value="25">
    <label>Speed: <span id="speedVal">10</span> steps/frame</label>
    <input type="range" id="speedSlider" min="1" max="50" value="10">
    <div class="btn-row">
        <button class="btn" id="btnGenerate">Generate</button>
        <button class="btn" id="btnStep">Step</button>
        <button class="btn" id="btnInstant">Instant</button>
    </div>
</div>

<div class="info">
    <h4>DFS Recursive Backtracker</h4>
    <p>Carves passages using depth-first search with a stack. Creates long, winding corridors with few branches. The most common maze generation algorithm.</p>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let cols, rows, cellSize, grid, stack, current, generating, autoMode, stepsPerFrame;

const SAGE = '#8A9A5B';
const MOSS = '#606C38';
const EARTH = '#DDA15E';
const CREAM = '#FEFAE0';
const BG = '#1a1a2e';
const VISITED = '#2a2a4e';
const STACK_COLOR = '#3a5a3a';
const CURRENT_COLOR = '#DDA15E';

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function initGrid() {
    const size = parseInt(document.getElementById('sizeSlider').value);
    cellSize = Math.floor(Math.min(canvas.width, canvas.height) / (size + 2));
    cols = Math.floor((canvas.width - cellSize) / cellSize);
    rows = Math.floor((canvas.height - cellSize) / cellSize);
    grid = [];
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            grid.push({ r, c, walls: [true, true, true, true], visited: false });
        }
    }
    stack = [];
    current = grid[0];
    current.visited = true;
    stack.push(current);
    generating = true;
    autoMode = false;
}

function idx(r, c) {
    if (r < 0 || c < 0 || r >= rows || c >= cols) return -1;
    return r * cols + c;
}

function getUnvisitedNeighbors(cell) {
    const neighbors = [];
    const dirs = [
        { dr: -1, dc: 0, wall: 0, opp: 2 },
        { dr: 0, dc: 1, wall: 1, opp: 3 },
        { dr: 1, dc: 0, wall: 2, opp: 0 },
        { dr: 0, dc: -1, wall: 3, opp: 1 }
    ];
    for (const d of dirs) {
        const i = idx(cell.r + d.dr, cell.c + d.dc);
        if (i >= 0 && !grid[i].visited) {
            neighbors.push({ cell: grid[i], wall: d.wall, opp: d.opp });
        }
    }
    return neighbors;
}

function step() {
    if (!generating) return false;
    if (stack.length === 0) {
        generating = false;
        return false;
    }
    const neighbors = getUnvisitedNeighbors(current);
    if (neighbors.length > 0) {
        const chosen = neighbors[Math.floor(Math.random() * neighbors.length)];
        current.walls[chosen.wall] = false;
        chosen.cell.walls[chosen.opp] = false;
        chosen.cell.visited = true;
        stack.push(current);
        current = chosen.cell;
    } else {
        current = stack.pop();
    }
    return true;
}

function drawCell(cell, color) {
    const x = cell.c * cellSize + cellSize / 2;
    const y = cell.r * cellSize + cellSize / 2;
    ctx.fillStyle = color;
    ctx.fillRect(x, y, cellSize, cellSize);
}

function drawWalls(cell) {
    const x = cell.c * cellSize + cellSize / 2;
    const y = cell.r * cellSize + cellSize / 2;
    ctx.strokeStyle = SAGE;
    ctx.lineWidth = 2;
    ctx.beginPath();
    if (cell.walls[0]) { ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); }
    if (cell.walls[1]) { ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); }
    if (cell.walls[2]) { ctx.moveTo(x, y + cellSize); ctx.lineTo(x + cellSize, y + cellSize); }
    if (cell.walls[3]) { ctx.moveTo(x, y); ctx.lineTo(x, y + cellSize); }
    ctx.stroke();
}

function draw() {
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (const cell of grid) {
        if (cell.visited) {
            drawCell(cell, VISITED);
        }
    }
    for (const cell of stack) {
        drawCell(cell, STACK_COLOR);
    }
    if (generating && current) {
        drawCell(current, CURRENT_COLOR);
    }
    for (const cell of grid) {
        if (cell.visited) drawWalls(cell);
    }
}

function animate() {
    if (autoMode && generating) {
        stepsPerFrame = parseInt(document.getElementById('speedSlider').value);
        for (let i = 0; i < stepsPerFrame; i++) {
            if (!step()) break;
        }
    }
    draw();
    requestAnimationFrame(animate);
}

function generate() {
    initGrid();
    autoMode = true;
}

function stepOnce() {
    autoMode = false;
    step();
}

function instant() {
    initGrid();
    while (step()) {}
}

window.reset = generate;

document.getElementById('btnGenerate').addEventListener('click', generate);
document.getElementById('btnStep').addEventListener('click', stepOnce);
document.getElementById('btnInstant').addEventListener('click', instant);
document.getElementById('sizeSlider').addEventListener('input', e => {
    document.getElementById('sizeVal').textContent = e.target.value;
});
document.getElementById('speedSlider').addEventListener('input', e => {
    document.getElementById('speedVal').textContent = e.target.value;
});

let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => { resize(); generate(); }, 200);
});

resize();
generate();
animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
