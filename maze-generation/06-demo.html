<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eller's Algorithm - Maze Generation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a.back-link {
    position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none;
    z-index: 1000; font-size: 1.2rem;
}
a.back-link:hover { color: #DDA15E; }
.controls {
    position: fixed; top: 10px; right: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 16px; min-width: 200px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { font-size: 13px; color: #8A9A5B; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.controls label { display: block; font-size: 12px; color: #FEFAE0; margin-top: 6px; opacity: 0.8; }
.controls input[type=range] { width: 100%; margin: 4px 0; accent-color: #8A9A5B; }
.btn {
    display: inline-block; margin: 3px 2px; padding: 6px 12px; border: none; border-radius: 6px;
    background: #606C38; color: #FEFAE0; font-size: 12px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #8A9A5B; }
.btn-row { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
.info {
    position: fixed; bottom: 10px; left: 10px; z-index: 1000;
    background: rgba(20,20,40,0.85); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 12px 16px; max-width: 320px;
    border: 1px solid rgba(138,154,91,0.3); font-size: 12px; line-height: 1.5;
}
.info h4 { color: #DDA15E; margin-bottom: 4px; }
.info p { color: #FEFAE0; opacity: 0.8; }
.legend { margin-top: 6px; font-size: 11px; color: #DDA15E; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="controls">
    <h3>Eller's Algorithm</h3>
    <label>Grid Size: <span id="sizeVal">25</span></label>
    <input type="range" id="sizeSlider" min="10" max="50" value="25">
    <label>Speed: <span id="speedVal">3</span> rows/frame</label>
    <input type="range" id="speedSlider" min="1" max="20" value="3">
    <div class="btn-row">
        <button class="btn" id="btnGenerate">Generate</button>
        <button class="btn" id="btnInstant">Instant</button>
    </div>
</div>

<div class="info">
    <h4>Eller's Row-by-Row Algorithm</h4>
    <p>Processes one row at a time using disjoint sets. Randomly merges adjacent cells in the same row, then ensures at least one downward connection per set. Can generate infinitely tall mazes.</p>
    <div class="legend">Colors = disjoint sets | Active row highlighted</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let cols, rows, cellSize, grid, currentRow, setId, nextSetId, generating, autoMode, stepsPerFrame;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function hslColor(id) {
    return `hsl(${(id * 67) % 360}, 45%, 30%)`;
}

function initGrid() {
    const size = parseInt(document.getElementById('sizeSlider').value);
    cellSize = Math.floor(Math.min(canvas.width, canvas.height) / (size + 2));
    cols = Math.floor((canvas.width - cellSize) / cellSize);
    rows = Math.floor((canvas.height - cellSize) / cellSize);
    grid = [];
    for (let r = 0; r < rows; r++) {
        grid[r] = [];
        for (let c = 0; c < cols; c++) {
            grid[r][c] = { walls: { right: true, bottom: true }, setId: 0 };
        }
    }
    currentRow = 0;
    nextSetId = 1;
    // Assign initial sets to first row
    for (let c = 0; c < cols; c++) {
        grid[0][c].setId = nextSetId++;
    }
    generating = true;
    autoMode = false;
}

function processRow() {
    if (currentRow >= rows) {
        generating = false;
        return false;
    }
    const r = currentRow;
    const isLast = r === rows - 1;

    // Step 1: Randomly merge adjacent cells in same row
    for (let c = 0; c < cols - 1; c++) {
        const cell = grid[r][c];
        const right = grid[r][c + 1];
        if (cell.setId !== right.setId && (Math.random() < 0.5 || isLast)) {
            cell.walls.right = false;
            const oldSet = right.setId;
            const newSet = cell.setId;
            // Merge: change all cells in this row with oldSet to newSet
            for (let cc = 0; cc < cols; cc++) {
                if (grid[r][cc].setId === oldSet) grid[r][cc].setId = newSet;
            }
        }
    }

    if (!isLast) {
        // Step 2: For each set, ensure at least one downward connection
        const sets = {};
        for (let c = 0; c < cols; c++) {
            const sid = grid[r][c].setId;
            if (!sets[sid]) sets[sid] = [];
            sets[sid].push(c);
        }

        // Initialize next row sets
        for (let c = 0; c < cols; c++) {
            grid[r + 1][c].setId = nextSetId++;
        }

        for (const sid in sets) {
            const cells = sets[sid];
            // Randomly select which cells connect downward (at least one)
            const downs = cells.filter(() => Math.random() < 0.4);
            if (downs.length === 0) {
                downs.push(cells[Math.floor(Math.random() * cells.length)]);
            }
            for (const c of downs) {
                grid[r][c].walls.bottom = false;
                grid[r + 1][c].setId = parseInt(sid);
            }
        }
    }

    currentRow++;
    return currentRow < rows;
}

function draw() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const ox = cellSize / 2;
    const oy = cellSize / 2;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const x = c * cellSize + ox;
            const y = r * cellSize + oy;
            const cell = grid[r][c];
            // Fill with set color
            if (r < currentRow || !generating) {
                ctx.fillStyle = hslColor(cell.setId);
            } else if (r === currentRow) {
                ctx.fillStyle = 'rgba(221,161,94,0.3)';
            } else {
                ctx.fillStyle = '#1e1e3e';
            }
            ctx.fillRect(x, y, cellSize, cellSize);
        }
    }

    // Draw walls
    ctx.strokeStyle = '#8A9A5B';
    ctx.lineWidth = 2;
    // Border
    ctx.strokeRect(ox, oy, cols * cellSize, rows * cellSize);

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const x = c * cellSize + ox;
            const y = r * cellSize + oy;
            const cell = grid[r][c];
            ctx.beginPath();
            if (cell.walls.right && c < cols - 1) {
                ctx.moveTo(x + cellSize, y);
                ctx.lineTo(x + cellSize, y + cellSize);
            }
            if (cell.walls.bottom && r < rows - 1) {
                ctx.moveTo(x, y + cellSize);
                ctx.lineTo(x + cellSize, y + cellSize);
            }
            ctx.stroke();
        }
    }

    // Highlight current row
    if (generating && currentRow < rows) {
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 3;
        ctx.strokeRect(ox, currentRow * cellSize + oy, cols * cellSize, cellSize);
    }
}

function animate() {
    if (autoMode && generating) {
        stepsPerFrame = parseInt(document.getElementById('speedSlider').value);
        for (let i = 0; i < stepsPerFrame; i++) {
            if (!processRow()) break;
        }
    }
    draw();
    requestAnimationFrame(animate);
}

function generate() {
    initGrid();
    autoMode = true;
}

function instant() {
    initGrid();
    while (processRow()) {}
}

window.reset = generate;

document.getElementById('btnGenerate').addEventListener('click', generate);
document.getElementById('btnInstant').addEventListener('click', instant);
document.getElementById('sizeSlider').addEventListener('input', e => {
    document.getElementById('sizeVal').textContent = e.target.value;
});
document.getElementById('speedSlider').addEventListener('input', e => {
    document.getElementById('speedVal').textContent = e.target.value;
});

let resizeTimeout;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => { resize(); generate(); }, 200);
});

resize();
generate();
animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
