<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flute Air Jet &amp; Edge Tone - Wind Instrument Physics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a.back-link { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
a.back-link:hover { color: #DDA15E; }

.controls {
    position: fixed; top: 10px; right: 10px; z-index: 1000;
    background: rgba(26,26,46,0.92); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 16px; min-width: 220px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { font-size: 13px; color: #DDA15E; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.controls label { display: block; font-size: 12px; color: #8A9A5B; margin-top: 8px; }
.controls input[type=range] { width: 100%; margin: 4px 0; accent-color: #8A9A5B; }
.controls .value { font-size: 11px; color: #8A9A5B; text-align: right; }
.btn {
    display: inline-block; margin: 4px 2px; padding: 6px 12px; border: none; border-radius: 8px;
    background: #606C38; color: #FEFAE0; font-size: 12px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #8A9A5B; }
.btn.active { background: #DDA15E; color: #1a1a2e; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="controls">
    <h3>Air Jet &amp; Edge Tone</h3>
    <label>Jet Velocity: <span id="velVal" class="value">18 m/s</span></label>
    <input type="range" id="velocity" min="5" max="40" value="18" step="0.5">
    <label>Flue Width: <span id="flueVal" class="value">1.0 mm</span></label>
    <input type="range" id="flueWidth" min="0.3" max="3.0" value="1.0" step="0.1">
    <label>Jet-to-Edge Distance: <span id="distVal" class="value">8 mm</span></label>
    <input type="range" id="jetDist" min="3" max="20" value="8" step="0.5">
    <label>Tube Length: <span id="tubeVal" class="value">0.30 m</span></label>
    <input type="range" id="tubeLen" min="0.1" max="0.8" value="0.3" step="0.01">
    <div style="margin-top:10px;">
        <button class="btn" id="playBtn">Play Tone</button>
        <button class="btn" id="showVortex">Show Vortices</button>
    </div>
</div>

<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let velocity = 18;
let flueWidth = 1.0;
let jetDist = 8;
let tubeLen = 0.3;
let showVortices = false;
let time = 0;
let audioCtx = null;
let oscillator = null;
let gainNode = null;
let isPlaying = false;
let animId;

// Particle system for air jet
const particles = [];
const MAX_PARTICLES = 300;

const velEl = document.getElementById('velocity');
const flueEl = document.getElementById('flueWidth');
const distEl = document.getElementById('jetDist');
const tubeEl = document.getElementById('tubeLen');
const playBtn = document.getElementById('playBtn');
const vortexBtn = document.getElementById('showVortex');

velEl.addEventListener('input', e => { velocity = +e.target.value; document.getElementById('velVal').textContent = velocity.toFixed(1) + ' m/s'; updateSound(); });
flueEl.addEventListener('input', e => { flueWidth = +e.target.value; document.getElementById('flueVal').textContent = flueWidth.toFixed(1) + ' mm'; });
distEl.addEventListener('input', e => { jetDist = +e.target.value; document.getElementById('distVal').textContent = jetDist.toFixed(1) + ' mm'; updateSound(); });
tubeEl.addEventListener('input', e => { tubeLen = +e.target.value; document.getElementById('tubeVal').textContent = tubeLen.toFixed(2) + ' m'; updateSound(); });

playBtn.addEventListener('click', () => { if (isPlaying) stopSound(); else startSound(); });
vortexBtn.addEventListener('click', () => {
    showVortices = !showVortices;
    vortexBtn.classList.toggle('active');
});

function getEdgeToneFreq() {
    const strouhal = 0.2;
    return strouhal * velocity / (jetDist * 0.001);
}

function getResonantFreq() {
    return 343 / (2 * tubeLen);
}

function startSound() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    stopSound();

    const freq = getResonantFreq();
    oscillator = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();
    oscillator.type = 'triangle';
    oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
    isPlaying = true;
    playBtn.textContent = 'Stop';
    playBtn.classList.add('active');
}

function stopSound() {
    if (oscillator) {
        if (gainNode) gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
        oscillator.stop(audioCtx.currentTime + 0.06);
        oscillator = null;
    }
    isPlaying = false;
    playBtn.textContent = 'Play Tone';
    playBtn.classList.remove('active');
}

function updateSound() {
    if (isPlaying && oscillator) {
        oscillator.frequency.setValueAtTime(getResonantFreq(), audioCtx.currentTime);
    }
}

function spawnParticle(cx, cy, scale) {
    if (particles.length >= MAX_PARTICLES) return;
    const spread = flueWidth * scale * 0.5;
    particles.push({
        x: cx,
        y: cy + (Math.random() - 0.5) * spread,
        vx: velocity * scale * 0.15,
        vy: 0,
        life: 1.0,
        size: 1.5 + Math.random()
    });
}

function updateParticles(edgeX, edgeY, scale) {
    const freq = getEdgeToneFreq();
    const omega = freq * 2 * Math.PI;

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        const progress = (p.x - (edgeX - jetDist * scale * 5)) / (jetDist * scale * 5);
        const deflection = Math.sin(omega * time * 0.001 - progress * Math.PI * 2) * scale * 8 * progress;

        p.vy += deflection * 0.02;
        p.vy *= 0.95;
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.015;

        if (p.life <= 0 || p.x > edgeX + 100 * scale) {
            particles.splice(i, 1);
        }
    }
}

function draw() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    const scale = Math.min(W, H) / 700;
    const cx = W * 0.25;
    const cy = H * 0.4;

    // Title
    ctx.fillStyle = '#FEFAE0';
    ctx.font = `bold ${16 * scale}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText('Flute Embouchure: Air Jet & Edge Tone', W / 2, 30 * scale);

    // Draw flute head joint cross section
    const headX = cx + jetDist * scale * 6;
    const headW = W * 0.55;
    const headH = 40 * scale;

    // Tube body
    ctx.fillStyle = 'rgba(96,108,56,0.15)';
    ctx.strokeStyle = '#606C38';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.rect(headX, cy - headH, headW, headH * 2);
    ctx.fill();
    ctx.stroke();

    // Embouchure hole
    const holeW = 30 * scale;
    const holeX = headX;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(holeX - holeW / 2, cy - headH, holeW, headH * 0.8);

    // Edge (labium)
    ctx.strokeStyle = '#DDA15E';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(holeX + holeW / 2, cy - headH);
    ctx.lineTo(holeX + holeW / 2, cy - headH * 0.4);
    ctx.stroke();

    // Edge label
    ctx.fillStyle = '#DDA15E';
    ctx.font = `${10 * scale}px system-ui`;
    ctx.textAlign = 'left';
    ctx.fillText('Edge (labium)', holeX + holeW / 2 + 8, cy - headH * 0.5);

    // Flue channel
    const flueX = cx - 20 * scale;
    const flueY = cy;
    const flueH = flueWidth * scale * 5;
    ctx.strokeStyle = '#8A9A5B';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(flueX, flueY - flueH);
    ctx.lineTo(holeX - holeW / 2, flueY - flueH * 0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(flueX, flueY + flueH);
    ctx.lineTo(holeX - holeW / 2, flueY + flueH * 0.5);
    ctx.stroke();

    ctx.fillStyle = '#8A9A5B';
    ctx.font = `${10 * scale}px system-ui`;
    ctx.textAlign = 'right';
    ctx.fillText('Flue exit', flueX - 5, flueY);

    // Spawn and update particles
    for (let i = 0; i < 3; i++) {
        spawnParticle(flueX + 5, flueY, scale);
    }
    updateParticles(holeX + holeW / 2, cy - headH * 0.6, scale);

    // Draw particles
    for (const p of particles) {
        const alpha = p.life * 0.6;
        ctx.fillStyle = `rgba(138,154,91,${alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }

    // Draw jet oscillation path
    const edgeX = holeX + holeW / 2;
    const freq = getEdgeToneFreq();
    const omega = freq * 2 * Math.PI;

    ctx.strokeStyle = 'rgba(221,161,94,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const jetStartX = flueX + 10;
    const jetLen = edgeX - jetStartX;
    for (let i = 0; i <= 100; i++) {
        const frac = i / 100;
        const x = jetStartX + frac * jetLen;
        const growth = Math.pow(frac, 1.5);
        const deflect = Math.sin(omega * time * 0.001 - frac * Math.PI * 3) * growth * 15 * scale;
        const y = flueY + deflect;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Vortices
    if (showVortices) {
        for (let v = 0; v < 6; v++) {
            const t = (time * 0.003 * velocity / 18 + v / 6) % 1;
            const vx = jetStartX + t * jetLen;
            const growth = Math.pow(t, 1.5);
            const vy = flueY + Math.sin(omega * time * 0.001 - t * Math.PI * 3) * growth * 15 * scale;
            const size = (3 + growth * 8) * scale;
            const sign = v % 2 === 0 ? 1 : -1;

            ctx.strokeStyle = `rgba(221,161,94,${(1 - t) * 0.5})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(vx, vy, size, 0, Math.PI * 2);
            ctx.stroke();

            // Rotation arrows
            const angle = time * 0.01 * sign;
            for (let a = 0; a < 3; a++) {
                const theta = angle + a * Math.PI * 2 / 3;
                const ax = vx + Math.cos(theta) * size;
                const ay = vy + Math.sin(theta) * size;
                ctx.fillStyle = `rgba(221,161,94,${(1 - t) * 0.4})`;
                ctx.beginPath();
                ctx.arc(ax, ay, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // Standing wave in tube
    const tubeInnerX = headX + 15 * scale;
    const tubeInnerW = headW - 30 * scale;
    ctx.strokeStyle = 'rgba(138,154,91,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i <= 150; i++) {
        const frac = i / 150;
        const x = tubeInnerX + frac * tubeInnerW;
        const spatial = Math.sin(Math.PI * frac);
        const y = cy + spatial * headH * 0.5 * Math.cos(omega * time * 0.001 * 0.1);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Info panel
    const infoX = W * 0.05;
    const infoY = H * 0.65;
    ctx.fillStyle = '#FEFAE0';
    ctx.font = `bold ${13 * scale}px system-ui`;
    ctx.textAlign = 'left';
    ctx.fillText('Physics Parameters', infoX, infoY);

    ctx.font = `${12 * scale}px system-ui`;
    ctx.fillStyle = '#8A9A5B';
    const edgeToneF = getEdgeToneFreq();
    const resonantF = getResonantFreq();
    ctx.fillText(`Edge tone frequency: ${edgeToneF.toFixed(1)} Hz`, infoX, infoY + 22 * scale);
    ctx.fillText(`Tube resonant frequency: ${resonantF.toFixed(1)} Hz`, infoX, infoY + 42 * scale);
    ctx.fillText(`Jet Reynolds number: ~${(velocity * flueWidth * 0.001 / 1.5e-5).toFixed(0)}`, infoX, infoY + 62 * scale);

    const bernoulliV = Math.sqrt(2 * 200 / 1.2);
    ctx.fillText(`Bernoulli velocity (200 Pa): ${bernoulliV.toFixed(1)} m/s`, infoX, infoY + 82 * scale);

    // Feedback loop diagram
    const fbX = W * 0.55;
    const fbY = H * 0.68;
    ctx.fillStyle = '#FEFAE0';
    ctx.font = `bold ${12 * scale}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText('Feedback Loop', fbX + 80 * scale, fbY - 10 * scale);

    const boxes = [
        { label: 'Air Jet', x: fbX, y: fbY },
        { label: 'Edge Interaction', x: fbX + 160 * scale, y: fbY },
        { label: 'Pressure Wave', x: fbX + 160 * scale, y: fbY + 50 * scale },
        { label: 'Jet Deflection', x: fbX, y: fbY + 50 * scale }
    ];

    boxes.forEach(b => {
        ctx.fillStyle = 'rgba(138,154,91,0.2)';
        ctx.strokeStyle = '#8A9A5B';
        ctx.lineWidth = 1;
        const bw = 80 * scale;
        const bh = 22 * scale;
        ctx.fillRect(b.x - bw / 2, b.y - bh / 2, bw, bh);
        ctx.strokeRect(b.x - bw / 2, b.y - bh / 2, bw, bh);
        ctx.fillStyle = '#FEFAE0';
        ctx.font = `${9 * scale}px system-ui`;
        ctx.textAlign = 'center';
        ctx.fillText(b.label, b.x, b.y + 3 * scale);
    });

    // Arrows
    ctx.strokeStyle = '#DDA15E';
    ctx.lineWidth = 1.5;
    const drawArrow = (x1, y1, x2, y2) => {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        const angle = Math.atan2(y2 - y1, x2 - x1);
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - 6 * Math.cos(angle - 0.4), y2 - 6 * Math.sin(angle - 0.4));
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - 6 * Math.cos(angle + 0.4), y2 - 6 * Math.sin(angle + 0.4));
        ctx.stroke();
    };

    drawArrow(boxes[0].x + 40 * scale, boxes[0].y, boxes[1].x - 40 * scale, boxes[1].y);
    drawArrow(boxes[1].x, boxes[1].y + 11 * scale, boxes[2].x, boxes[2].y - 11 * scale);
    drawArrow(boxes[2].x - 40 * scale, boxes[2].y, boxes[3].x + 40 * scale, boxes[3].y);
    drawArrow(boxes[3].x, boxes[3].y - 11 * scale, boxes[0].x, boxes[0].y + 11 * scale);

    // Bottom note
    ctx.fillStyle = 'rgba(138,154,91,0.5)';
    ctx.font = `${10 * scale}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText('The air jet oscillates across the edge, creating alternating pressure pulses that excite the tube resonance', W / 2, H - 15);
}

function animate(ts) {
    time = ts || 0;
    draw();
    animId = requestAnimationFrame(animate);
}

animate();

window.reset = function() {
    velocity = 18;
    flueWidth = 1.0;
    jetDist = 8;
    tubeLen = 0.3;
    showVortices = false;
    velEl.value = 18;
    flueEl.value = 1.0;
    distEl.value = 8;
    tubeEl.value = 0.3;
    document.getElementById('velVal').textContent = '18 m/s';
    document.getElementById('flueVal').textContent = '1.0 mm';
    document.getElementById('distVal').textContent = '8 mm';
    document.getElementById('tubeVal').textContent = '0.30 m';
    vortexBtn.classList.remove('active');
    particles.length = 0;
    stopSound();
};
</script>
</body>
</html>
