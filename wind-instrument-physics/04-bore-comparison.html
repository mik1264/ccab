<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cylindrical vs Conical Bore - Wind Instrument Physics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a.back-link { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
a.back-link:hover { color: #DDA15E; }

.controls {
    position: fixed; top: 10px; right: 10px; z-index: 1000;
    background: rgba(26,26,46,0.92); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 16px; min-width: 220px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { font-size: 13px; color: #DDA15E; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.controls label { display: block; font-size: 12px; color: #8A9A5B; margin-top: 8px; }
.controls input[type=range] { width: 100%; margin: 4px 0; accent-color: #8A9A5B; }
.controls .value { font-size: 11px; color: #8A9A5B; text-align: right; }
.btn {
    display: inline-block; margin: 4px 2px; padding: 6px 12px; border: none; border-radius: 8px;
    background: #606C38; color: #FEFAE0; font-size: 12px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #8A9A5B; }
.btn.active { background: #DDA15E; color: #1a1a2e; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="controls">
    <h3>Bore Comparison</h3>
    <label>Fundamental: <span id="fundVal" class="value">220 Hz</span></label>
    <input type="range" id="fundamental" min="80" max="500" value="220">
    <label>Cone Angle: <span id="coneVal" class="value">3.0&deg;</span></label>
    <input type="range" id="coneAngle" min="0" max="8" value="3" step="0.5">
    <label>Bore Length: <span id="lenVal" class="value">0.60m</span></label>
    <input type="range" id="boreLen" min="0.2" max="1.5" value="0.6" step="0.05">
    <label>Harmonic: <span id="harmVal" class="value">1</span></label>
    <input type="range" id="harmonic" min="1" max="8" value="1" step="1">
    <div style="margin-top:10px;">
        <button class="btn" id="playCyl">Play Cylindrical</button>
        <button class="btn" id="playCon">Play Conical</button>
    </div>
</div>

<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let fundamental = 220;
let coneAngle = 3;
let boreLen = 0.6;
let harmonicN = 1;
let time = 0;
let audioCtx = null;
let currentOscs = [];
let animId;

const fundEl = document.getElementById('fundamental');
const coneEl = document.getElementById('coneAngle');
const lenEl = document.getElementById('boreLen');
const harmEl = document.getElementById('harmonic');

fundEl.addEventListener('input', e => { fundamental = +e.target.value; document.getElementById('fundVal').textContent = fundamental + ' Hz'; });
coneEl.addEventListener('input', e => { coneAngle = +e.target.value; document.getElementById('coneVal').textContent = coneAngle.toFixed(1) + '\u00B0'; });
lenEl.addEventListener('input', e => { boreLen = +e.target.value; document.getElementById('lenVal').textContent = boreLen.toFixed(2) + 'm'; });
harmEl.addEventListener('input', e => { harmonicN = +e.target.value; document.getElementById('harmVal').textContent = harmonicN; });

document.getElementById('playCyl').addEventListener('click', () => playBore('cylindrical'));
document.getElementById('playCon').addEventListener('click', () => playBore('conical'));

function playBore(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    stopAll();

    const master = audioCtx.createGain();
    master.gain.value = 0.1;
    master.connect(audioCtx.destination);

    const harmonics = type === 'cylindrical'
        ? [1, 3, 5, 7, 9, 11, 13, 15]
        : [1, 2, 3, 4, 5, 6, 7, 8];

    const amps = type === 'cylindrical'
        ? [1.0, 0.6, 0.3, 0.15, 0.08, 0.04, 0.02, 0.01]
        : [1.0, 0.5, 0.35, 0.25, 0.18, 0.12, 0.08, 0.05];

    for (let i = 0; i < 8; i++) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = fundamental * harmonics[i];
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(amps[i] * 0.2, audioCtx.currentTime + 0.05);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
        osc.connect(gain);
        gain.connect(master);
        osc.start();
        osc.stop(audioCtx.currentTime + 2.1);
        currentOscs.push(osc);
    }
}

function stopAll() {
    currentOscs.forEach(o => { try { o.stop(); } catch(e) {} });
    currentOscs = [];
}

function drawBore(x, y, w, h, type, label) {
    const radius = h * 0.15;
    const endRadius = type === 'conical' ? radius + w * Math.tan(coneAngle * Math.PI / 180) : radius;

    // Bore outline
    ctx.strokeStyle = type === 'cylindrical' ? '#8A9A5B' : '#DDA15E';
    ctx.lineWidth = 2;
    ctx.fillStyle = type === 'cylindrical' ? 'rgba(138,154,91,0.1)' : 'rgba(221,161,94,0.1)';

    ctx.beginPath();
    ctx.moveTo(x, y - radius);
    ctx.lineTo(x + w, y - endRadius);
    ctx.lineTo(x + w, y + endRadius);
    ctx.lineTo(x, y + radius);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Standing wave inside
    const numPts = 200;
    const freq = fundamental * harmonicN;
    const omega = freq * 2 * Math.PI;

    ctx.strokeStyle = type === 'cylindrical' ? '#8A9A5B' : '#DDA15E';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i <= numPts; i++) {
        const frac = i / numPts;
        const px = x + frac * w;
        const localRadius = radius + (endRadius - radius) * frac;

        let spatial;
        if (type === 'cylindrical') {
            spatial = Math.cos((2 * harmonicN - 1) * Math.PI * frac / 2);
        } else {
            spatial = Math.sin(harmonicN * Math.PI * frac);
        }

        const amp = localRadius * 0.6;
        const py = y + spatial * amp * Math.cos(omega * time * 0.001 * 0.01);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Label
    ctx.fillStyle = type === 'cylindrical' ? '#8A9A5B' : '#DDA15E';
    ctx.font = 'bold 14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(label, x + w / 2, y - h * 0.35);

    // End labels
    ctx.font = '11px system-ui';
    ctx.fillStyle = '#FEFAE0';
    ctx.textAlign = 'center';
    if (type === 'cylindrical') {
        ctx.fillText('Closed', x, y + radius + 18);
        ctx.fillText('Open', x + w, y + endRadius + 18);
    } else {
        ctx.fillText('Apex', x, y + radius + 18);
        ctx.fillText('Open', x + w, y + endRadius + 18);
    }
}

function drawSpectrum(x, y, w, h, type) {
    const harmonics = type === 'cylindrical' ? [1, 3, 5, 7, 9, 11] : [1, 2, 3, 4, 5, 6];
    const amps = type === 'cylindrical'
        ? [1.0, 0.6, 0.3, 0.15, 0.08, 0.04]
        : [1.0, 0.5, 0.35, 0.25, 0.18, 0.12];

    const color = type === 'cylindrical' ? '#8A9A5B' : '#DDA15E';

    // Axis
    ctx.strokeStyle = 'rgba(138,154,91,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, y + h);
    ctx.lineTo(x + w, y + h);
    ctx.stroke();

    // Bars
    const barW = w / 14;
    for (let i = 0; i < harmonics.length; i++) {
        const barH = amps[i] * h * 0.85;
        const bx = x + harmonics[i] * barW;

        ctx.fillStyle = color;
        ctx.globalAlpha = 0.4 + amps[i] * 0.6;
        ctx.fillRect(bx - barW * 0.3, y + h - barH, barW * 0.6, barH);
        ctx.globalAlpha = 1;

        ctx.fillStyle = color;
        ctx.font = '9px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(harmonics[i], bx, y + h + 12);
    }

    // Title
    ctx.fillStyle = color;
    ctx.font = '12px system-ui';
    ctx.textAlign = 'center';
    const title = type === 'cylindrical' ? 'Cylindrical (Odd harmonics)' : 'Conical (All harmonics)';
    ctx.fillText(title, x + w / 2, y - 8);
}

function drawComparison() {
    const mx = W * 0.05;
    const compY = H * 0.78;
    const compW = W * 0.9;
    const compH = H * 0.08;

    ctx.fillStyle = '#FEFAE0';
    ctx.font = 'bold 13px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Instruments by Bore Type', W / 2, compY - 15);

    // Cylindrical
    ctx.fillStyle = 'rgba(138,154,91,0.15)';
    ctx.fillRect(mx, compY, compW / 2 - 10, compH);
    ctx.strokeStyle = '#8A9A5B';
    ctx.lineWidth = 1;
    ctx.strokeRect(mx, compY, compW / 2 - 10, compH);

    ctx.fillStyle = '#8A9A5B';
    ctx.font = '12px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Cylindrical: Clarinet, Flute, Organ pipes', mx + compW / 4 - 5, compY + compH / 2 + 4);

    // Conical
    const cx = mx + compW / 2 + 10;
    ctx.fillStyle = 'rgba(221,161,94,0.15)';
    ctx.fillRect(cx, compY, compW / 2 - 10, compH);
    ctx.strokeStyle = '#DDA15E';
    ctx.lineWidth = 1;
    ctx.strokeRect(cx, compY, compW / 2 - 10, compH);

    ctx.fillStyle = '#DDA15E';
    ctx.fillText('Conical: Saxophone, Oboe, Bassoon, Brass', cx + compW / 4 - 5, compY + compH / 2 + 4);
}

function draw() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    const margin = W * 0.06;
    const boreW = W * 0.38;
    const boreH = H * 0.25;

    // Title
    ctx.fillStyle = '#FEFAE0';
    ctx.font = 'bold 16px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Cylindrical vs Conical Bore Acoustics', W / 2, 35);

    // Cylindrical bore (left)
    drawBore(margin, H * 0.25, boreW, boreH, 'cylindrical', 'Cylindrical Bore (Clarinet)');

    // Conical bore (right)
    drawBore(W - margin - boreW, H * 0.25, boreW, boreH, 'conical', 'Conical Bore (Saxophone)');

    // Spectra
    const specW = W * 0.38;
    const specH = H * 0.2;
    drawSpectrum(margin, H * 0.48, specW, specH, 'cylindrical');
    drawSpectrum(W - margin - specW, H * 0.48, specW, specH, 'conical');

    // Key difference annotation
    ctx.fillStyle = 'rgba(254,250,224,0.6)';
    ctx.font = '11px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Overblows at 12th (3x freq)', margin + boreW / 2, H * 0.42);
    ctx.fillText('Odd harmonics only', margin + boreW / 2, H * 0.44);
    ctx.fillText('Overblows at octave (2x freq)', W - margin - boreW / 2, H * 0.42);
    ctx.fillText('All harmonics present', W - margin - boreW / 2, H * 0.44);

    // Instrument comparison
    drawComparison();

    // Bottom physics note
    ctx.fillStyle = 'rgba(138,154,91,0.5)';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Cylindrical closed pipes support only odd modes (n=1,3,5...) | Conical pipes behave like open tubes supporting all modes (n=1,2,3...)', W / 2, H - 15);
}

function animate(ts) {
    time = ts || 0;
    draw();
    animId = requestAnimationFrame(animate);
}

animate();

window.reset = function() {
    fundamental = 220;
    coneAngle = 3;
    boreLen = 0.6;
    harmonicN = 1;
    fundEl.value = 220;
    coneEl.value = 3;
    lenEl.value = 0.6;
    harmEl.value = 1;
    document.getElementById('fundVal').textContent = '220 Hz';
    document.getElementById('coneVal').textContent = '3.0\u00B0';
    document.getElementById('lenVal').textContent = '0.60m';
    document.getElementById('harmVal').textContent = '1';
    stopAll();
};
</script>
</body>
</html>
