<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wind Ensemble Spectrum Analyzer - Wind Instrument Physics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; cursor: pointer; }
a.back-link { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
a.back-link:hover { color: #DDA15E; }

.controls {
    position: fixed; top: 10px; right: 10px; z-index: 1000;
    background: rgba(26,26,46,0.92); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 16px; min-width: 220px; max-height: 90vh; overflow-y: auto;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { font-size: 13px; color: #DDA15E; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.controls label { display: block; font-size: 12px; color: #8A9A5B; margin-top: 6px; }
.controls .value { font-size: 11px; color: #8A9A5B; text-align: right; }
.inst-btn {
    display: block; width: 100%; margin: 3px 0; padding: 8px 10px; border: 1px solid rgba(138,154,91,0.3);
    border-radius: 8px; background: rgba(96,108,56,0.1); color: #8A9A5B;
    font-size: 12px; cursor: pointer; text-align: left; transition: all 0.2s;
}
.inst-btn:hover { background: rgba(96,108,56,0.3); }
.inst-btn.active { background: rgba(221,161,94,0.3); border-color: #DDA15E; color: #DDA15E; }
.inst-btn .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.btn {
    display: inline-block; margin: 4px 2px; padding: 6px 12px; border: none; border-radius: 8px;
    background: #606C38; color: #FEFAE0; font-size: 12px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #8A9A5B; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="controls">
    <h3>Wind Ensemble</h3>
    <p style="font-size:11px;color:#8A9A5B;margin-bottom:8px;">Click instruments to toggle. Compare their spectral signatures.</p>
    <div id="instList"></div>
    <div style="margin-top:8px;">
        <button class="btn" id="playAll">Play Selected</button>
        <button class="btn" id="stopAll">Stop All</button>
    </div>
</div>

<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const instruments = [
    { name: 'Flute', freq: 523.25, color: '#88ccff', harmonics: [1.0, 0.2, 0.05, 0.02, 0.01, 0, 0, 0], type: 'woodwind', active: false },
    { name: 'Clarinet', freq: 261.63, color: '#8A9A5B', harmonics: [1.0, 0.05, 0.7, 0.03, 0.4, 0.02, 0.2, 0.01], type: 'woodwind', active: false },
    { name: 'Oboe', freq: 440, color: '#DDA15E', harmonics: [1.0, 0.8, 0.6, 0.65, 0.45, 0.35, 0.28, 0.2], type: 'woodwind', active: false },
    { name: 'Bassoon', freq: 130.81, color: '#BC6C25', harmonics: [1.0, 0.6, 0.5, 0.45, 0.35, 0.3, 0.25, 0.2], type: 'woodwind', active: false },
    { name: 'Saxophone', freq: 293.66, color: '#ffaa55', harmonics: [1.0, 0.7, 0.5, 0.4, 0.35, 0.25, 0.2, 0.15], type: 'woodwind', active: false },
    { name: 'Trumpet', freq: 349.23, color: '#ff6666', harmonics: [1.0, 0.85, 0.7, 0.55, 0.45, 0.35, 0.25, 0.18], type: 'brass', active: false },
    { name: 'French Horn', freq: 174.61, color: '#aa88dd', harmonics: [1.0, 0.7, 0.55, 0.4, 0.3, 0.22, 0.15, 0.1], type: 'brass', active: false },
    { name: 'Trombone', freq: 116.54, color: '#66bb66', harmonics: [1.0, 0.75, 0.6, 0.5, 0.4, 0.3, 0.22, 0.15], type: 'brass', active: false },
    { name: 'Tuba', freq: 65.41, color: '#8888cc', harmonics: [1.0, 0.65, 0.5, 0.4, 0.3, 0.2, 0.12, 0.08], type: 'brass', active: false }
];

let audioCtx = null;
let activeAudio = new Map();
let time = 0;
let animId;

// Build instrument buttons
const instListEl = document.getElementById('instList');
instruments.forEach((inst, i) => {
    const btn = document.createElement('button');
    btn.className = 'inst-btn';
    btn.dataset.index = i;
    btn.innerHTML = `<span class="dot" style="background:${inst.color}"></span>${inst.name} (${inst.freq.toFixed(0)} Hz)`;
    btn.addEventListener('click', () => {
        inst.active = !inst.active;
        btn.classList.toggle('active');
    });
    instListEl.appendChild(btn);
});

document.getElementById('playAll').addEventListener('click', playSelected);
document.getElementById('stopAll').addEventListener('click', stopAllSounds);

function playSelected() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    stopAllSounds();

    instruments.forEach((inst, idx) => {
        if (!inst.active) return;
        const master = audioCtx.createGain();
        master.gain.value = 0.04;
        master.connect(audioCtx.destination);

        const oscs = [];
        for (let h = 0; h < inst.harmonics.length; h++) {
            if (inst.harmonics[h] < 0.01) continue;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = inst.freq * (h + 1);
            gain.gain.value = inst.harmonics[h] * 0.15;
            osc.connect(gain);
            gain.connect(master);
            osc.start();
            oscs.push(osc);
        }
        activeAudio.set(idx, { oscs, master });
    });
}

function stopAllSounds() {
    activeAudio.forEach(a => {
        a.oscs.forEach(o => { try { o.stop(); } catch(e) {} });
        a.master.disconnect();
    });
    activeAudio.clear();
}

function drawSpectrumBars(inst, x, y, w, h, maxFreq) {
    const barW = 4;
    for (let i = 0; i < inst.harmonics.length; i++) {
        if (inst.harmonics[i] < 0.01) continue;
        const freq = inst.freq * (i + 1);
        if (freq > maxFreq) break;
        const bx = x + (freq / maxFreq) * w;
        const bh = inst.harmonics[i] * h * 0.8;

        ctx.fillStyle = inst.color;
        ctx.globalAlpha = 0.6;
        ctx.fillRect(bx - barW / 2, y + h - bh, barW, bh);
    }
    ctx.globalAlpha = 1;
}

function drawSpectralEnvelope(inst, x, y, w, h, maxFreq) {
    ctx.strokeStyle = inst.color;
    ctx.lineWidth = 2;
    ctx.beginPath();

    let started = false;
    for (let px = 0; px <= w; px++) {
        const freq = (px / w) * maxFreq;
        let amplitude = 0;

        for (let i = 0; i < inst.harmonics.length; i++) {
            const hFreq = inst.freq * (i + 1);
            const dist = Math.abs(freq - hFreq);
            const width = inst.freq * 0.15;
            amplitude += inst.harmonics[i] * Math.exp(-dist * dist / (2 * width * width));
        }

        const py = y + h - amplitude * h * 0.75;
        if (!started) { ctx.moveTo(x + px, py); started = true; }
        else ctx.lineTo(x + px, py);
    }
    ctx.stroke();
}

function drawWaveform(inst, x, y, w, h) {
    ctx.strokeStyle = inst.color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();

    const periods = 3;
    for (let i = 0; i <= w; i++) {
        const t = (i / w) * periods / inst.freq;
        let val = 0;
        let maxAmp = 0;
        for (let n = 0; n < inst.harmonics.length; n++) {
            val += inst.harmonics[n] * Math.sin(2 * Math.PI * inst.freq * (n + 1) * t);
            maxAmp += inst.harmonics[n];
        }
        if (maxAmp > 0) val /= maxAmp;
        const py = y + h / 2 - val * h * 0.4;
        if (i === 0) ctx.moveTo(x + i, py);
        else ctx.lineTo(x + i, py);
    }
    ctx.stroke();
}

function draw() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    const scale = Math.min(W, H) / 700;

    // Title
    ctx.fillStyle = '#FEFAE0';
    ctx.font = `bold ${16 * scale}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText('Wind Ensemble Spectral Comparison', W / 2, 30 * scale);

    const activeInsts = instruments.filter(i => i.active);
    const margin = 50;
    const chartW = W * 0.7 - margin;
    const maxFreq = 5000;

    if (activeInsts.length === 0) {
        ctx.fillStyle = '#8A9A5B';
        ctx.font = `${14 * scale}px system-ui`;
        ctx.textAlign = 'center';
        ctx.fillText('Select instruments from the panel to compare their spectra', W * 0.4, H * 0.45);
        ctx.fillText('Click instrument buttons to toggle them on/off', W * 0.4, H * 0.45 + 25 * scale);
    } else {
        // Main spectrum display
        const specY = 50 * scale;
        const specH = H * 0.4;

        // Frequency axis
        ctx.strokeStyle = 'rgba(138,154,91,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(margin, specY + specH);
        ctx.lineTo(margin + chartW, specY + specH);
        ctx.stroke();

        // Frequency labels
        ctx.fillStyle = '#8A9A5B';
        ctx.font = '10px system-ui';
        ctx.textAlign = 'center';
        for (let f = 0; f <= maxFreq; f += 500) {
            const x = margin + (f / maxFreq) * chartW;
            ctx.fillText(f + ' Hz', x, specY + specH + 15);
            ctx.strokeStyle = 'rgba(138,154,91,0.1)';
            ctx.beginPath();
            ctx.moveTo(x, specY);
            ctx.lineTo(x, specY + specH);
            ctx.stroke();
        }

        // Draw spectra for each active instrument
        activeInsts.forEach(inst => {
            drawSpectrumBars(inst, margin, specY, chartW, specH, maxFreq);
            drawSpectralEnvelope(inst, margin, specY, chartW, specH, maxFreq);
        });

        // Legend
        ctx.textAlign = 'left';
        activeInsts.forEach((inst, i) => {
            const lx = margin + chartW + 20;
            const ly = specY + 20 + i * 22;
            ctx.fillStyle = inst.color;
            ctx.fillRect(lx, ly - 6, 12, 12);
            ctx.fillStyle = '#FEFAE0';
            ctx.font = '11px system-ui';
            ctx.fillText(`${inst.name} (${inst.freq.toFixed(0)} Hz)`, lx + 18, ly + 4);
        });

        // Waveform comparison
        const waveY = specY + specH + 35;
        const waveH = (H - waveY - 40) / Math.max(activeInsts.length, 1);

        ctx.fillStyle = '#FEFAE0';
        ctx.font = `bold ${12 * scale}px system-ui`;
        ctx.textAlign = 'left';
        ctx.fillText('Waveform Shapes (3 periods)', margin, waveY - 5);

        activeInsts.forEach((inst, i) => {
            const wy = waveY + i * waveH + 10;
            const actualH = Math.min(waveH - 15, 80);

            // Center line
            ctx.strokeStyle = 'rgba(138,154,91,0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(margin, wy + actualH / 2);
            ctx.lineTo(margin + chartW, wy + actualH / 2);
            ctx.stroke();

            drawWaveform(inst, margin, wy, chartW * 0.6, actualH);

            // Label
            ctx.fillStyle = inst.color;
            ctx.font = '11px system-ui';
            ctx.textAlign = 'left';
            ctx.fillText(inst.name, margin + chartW * 0.65, wy + actualH / 2 + 4);

            // Type badge
            ctx.fillStyle = inst.type === 'brass' ? 'rgba(221,161,94,0.2)' : 'rgba(138,154,91,0.2)';
            const badgeX = margin + chartW * 0.65;
            const badgeW = inst.type === 'brass' ? 40 : 65;
            ctx.fillRect(badgeX, wy + actualH / 2 + 10, badgeW, 14);
            ctx.fillStyle = inst.type === 'brass' ? '#DDA15E' : '#8A9A5B';
            ctx.font = '9px system-ui';
            ctx.fillText(inst.type, badgeX + 3, wy + actualH / 2 + 21);
        });
    }

    // Info panel (always visible)
    ctx.fillStyle = 'rgba(138,154,91,0.5)';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Each instrument has a unique harmonic fingerprint shaped by bore geometry, reed type, and excitation mechanism', W * 0.4, H - 12);
}

function animate(ts) {
    time = ts || 0;
    draw();
    animId = requestAnimationFrame(animate);
}

animate();

window.reset = function() {
    instruments.forEach(i => { i.active = false; });
    document.querySelectorAll('.inst-btn').forEach(b => b.classList.remove('active'));
    stopAllSounds();
};
</script>
</body>
</html>
