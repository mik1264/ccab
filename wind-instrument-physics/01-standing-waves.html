<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standing Waves in Pipes - Wind Instrument Physics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a.back-link { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
a.back-link:hover { color: #DDA15E; }

.controls {
    position: fixed; top: 10px; right: 10px; z-index: 1000;
    background: rgba(26,26,46,0.92); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 16px; min-width: 240px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { font-size: 13px; color: #DDA15E; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.controls label { display: block; font-size: 12px; color: #8A9A5B; margin-top: 8px; }
.controls select, .controls input[type=range] { width: 100%; margin: 4px 0; accent-color: #8A9A5B; }
.controls select { background: #2a2a4e; color: #FEFAE0; border: 1px solid #606C38; border-radius: 6px; padding: 4px; }
.controls .value { font-size: 11px; color: #8A9A5B; text-align: right; }
.btn {
    display: inline-block; margin: 4px 2px; padding: 6px 14px; border: none; border-radius: 8px;
    background: #606C38; color: #FEFAE0; font-size: 12px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: #8A9A5B; }
.btn.active { background: #DDA15E; color: #1a1a2e; }

.info {
    position: fixed; bottom: 10px; left: 10px; right: 10px; z-index: 1000;
    background: rgba(26,26,46,0.88); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 12px 16px;
    border: 1px solid rgba(138,154,91,0.2);
    font-size: 12px; color: #8A9A5B; text-align: center;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="controls">
    <h3>Standing Waves</h3>
    <label>Pipe Type</label>
    <select id="pipeType">
        <option value="open">Open-Open</option>
        <option value="closed">Closed-Open</option>
    </select>
    <label>Harmonic: <span id="harmonicVal" class="value">1</span></label>
    <input type="range" id="harmonic" min="1" max="8" value="1" step="1">
    <label>Pipe Length: <span id="lengthVal" class="value">1.0m</span></label>
    <input type="range" id="pipeLength" min="0.2" max="3.0" value="1.0" step="0.1">
    <label>Animation Speed: <span id="speedVal" class="value">1.0x</span></label>
    <input type="range" id="speed" min="0.1" max="3.0" value="1.0" step="0.1">
    <div style="margin-top:10px;">
        <button class="btn" id="playBtn">Play Sound</button>
        <button class="btn" id="showPressure">Pressure</button>
        <button class="btn active" id="showDisplacement">Displacement</button>
    </div>
</div>

<div class="info" id="info">
    Open-Open Pipe | Harmonic 1 | f = 171.5 Hz | All harmonics present
</div>

<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

const SPEED_OF_SOUND = 343;
let pipeType = 'open';
let harmonicN = 1;
let pipeLength = 1.0;
let animSpeed = 1.0;
let showMode = 'displacement';
let time = 0;
let audioCtx = null;
let oscillator = null;
let gainNode = null;
let isPlaying = false;
let animId;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const pipeTypeEl = document.getElementById('pipeType');
const harmonicEl = document.getElementById('harmonic');
const pipeLengthEl = document.getElementById('pipeLength');
const speedEl = document.getElementById('speed');
const playBtn = document.getElementById('playBtn');
const showPressureBtn = document.getElementById('showPressure');
const showDisplacementBtn = document.getElementById('showDisplacement');
const infoEl = document.getElementById('info');

pipeTypeEl.addEventListener('change', e => { pipeType = e.target.value; updateInfo(); updateSound(); });
harmonicEl.addEventListener('input', e => { harmonicN = +e.target.value; document.getElementById('harmonicVal').textContent = harmonicN; updateInfo(); updateSound(); });
pipeLengthEl.addEventListener('input', e => { pipeLength = +e.target.value; document.getElementById('lengthVal').textContent = pipeLength.toFixed(1) + 'm'; updateInfo(); updateSound(); });
speedEl.addEventListener('input', e => { animSpeed = +e.target.value; document.getElementById('speedVal').textContent = animSpeed.toFixed(1) + 'x'; });

showPressureBtn.addEventListener('click', () => {
    showMode = 'pressure';
    showPressureBtn.classList.add('active');
    showDisplacementBtn.classList.remove('active');
});
showDisplacementBtn.addEventListener('click', () => {
    showMode = 'displacement';
    showDisplacementBtn.classList.add('active');
    showPressureBtn.classList.remove('active');
});

playBtn.addEventListener('click', () => {
    if (isPlaying) { stopSound(); } else { startSound(); }
});

function getFrequency() {
    if (pipeType === 'open') {
        return harmonicN * SPEED_OF_SOUND / (2 * pipeLength);
    } else {
        const oddHarmonic = 2 * harmonicN - 1;
        return oddHarmonic * SPEED_OF_SOUND / (4 * pipeLength);
    }
}

function updateInfo() {
    const freq = getFrequency();
    const typeLabel = pipeType === 'open' ? 'Open-Open Pipe' : 'Closed-Open Pipe';
    const harmonicInfo = pipeType === 'open' ? 'All harmonics present' : 'Odd harmonics only';
    const displayN = pipeType === 'closed' ? (2 * harmonicN - 1) : harmonicN;
    infoEl.textContent = `${typeLabel} | Harmonic ${displayN} | f = ${freq.toFixed(1)} Hz | ${harmonicInfo}`;
}

function startSound() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    stopSound();
    const freq = getFrequency();
    oscillator = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.05);
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start();
    isPlaying = true;
    playBtn.textContent = 'Stop Sound';
    playBtn.classList.add('active');
}

function stopSound() {
    if (oscillator) {
        if (gainNode) gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
        oscillator.stop(audioCtx.currentTime + 0.06);
        oscillator = null;
    }
    isPlaying = false;
    playBtn.textContent = 'Play Sound';
    playBtn.classList.remove('active');
}

function updateSound() {
    if (isPlaying && oscillator) {
        const freq = getFrequency();
        oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
    }
}

function draw() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    const pipeX = W * 0.12;
    const pipeEndX = W * 0.88;
    const pipeW = pipeEndX - pipeX;
    const pipeCY = H * 0.45;
    const pipeH = H * 0.25;
    const pipeTop = pipeCY - pipeH / 2;
    const pipeBot = pipeCY + pipeH / 2;

    // Draw pipe walls
    ctx.strokeStyle = '#606C38';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(pipeX, pipeTop);
    ctx.lineTo(pipeEndX, pipeTop);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pipeX, pipeBot);
    ctx.lineTo(pipeEndX, pipeBot);
    ctx.stroke();

    // Draw pipe ends
    if (pipeType === 'closed') {
        ctx.beginPath();
        ctx.moveTo(pipeX, pipeTop);
        ctx.lineTo(pipeX, pipeBot);
        ctx.stroke();
        ctx.fillStyle = 'rgba(96,108,56,0.3)';
        ctx.fillRect(pipeX - 8, pipeTop, 12, pipeH);
    } else {
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(pipeX, pipeTop);
        ctx.lineTo(pipeX, pipeBot);
        ctx.stroke();
        ctx.setLineDash([]);
    }
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(pipeEndX, pipeTop);
    ctx.lineTo(pipeEndX, pipeBot);
    ctx.stroke();
    ctx.setLineDash([]);

    // Labels
    ctx.font = '13px system-ui';
    ctx.fillStyle = '#8A9A5B';
    ctx.textAlign = 'center';
    if (pipeType === 'closed') {
        ctx.fillText('Closed', pipeX, pipeBot + 25);
    } else {
        ctx.fillText('Open', pipeX, pipeBot + 25);
    }
    ctx.fillText('Open', pipeEndX, pipeBot + 25);

    // Calculate wave parameters
    let wavelength, numHalfWaves;
    if (pipeType === 'open') {
        numHalfWaves = harmonicN;
        wavelength = 2 * pipeLength / harmonicN;
    } else {
        const oddN = 2 * harmonicN - 1;
        numHalfWaves = oddN / 2;
        wavelength = 4 * pipeLength / oddN;
    }

    const freq = getFrequency();
    const omega = 2 * Math.PI * freq;

    // Draw standing wave
    const numPoints = 400;
    const amplitude = pipeH * 0.35;

    // Displacement wave
    ctx.beginPath();
    ctx.strokeStyle = showMode === 'displacement' ? '#DDA15E' : 'rgba(221,161,94,0.25)';
    ctx.lineWidth = showMode === 'displacement' ? 2.5 : 1;
    for (let i = 0; i <= numPoints; i++) {
        const xFrac = i / numPoints;
        const x = pipeX + xFrac * pipeW;
        let spatialPart;
        if (pipeType === 'open') {
            spatialPart = Math.sin(harmonicN * Math.PI * xFrac);
        } else {
            const oddN = 2 * harmonicN - 1;
            spatialPart = Math.cos(oddN * Math.PI * xFrac / 2);
        }
        const y = pipeCY + spatialPart * amplitude * Math.cos(omega * time * 0.001 * animSpeed * 0.01);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Envelope
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = showMode === 'displacement' ? 'rgba(221,161,94,0.4)' : 'rgba(221,161,94,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i <= numPoints; i++) {
        const xFrac = i / numPoints;
        const x = pipeX + xFrac * pipeW;
        let spatialPart;
        if (pipeType === 'open') {
            spatialPart = Math.sin(harmonicN * Math.PI * xFrac);
        } else {
            const oddN = 2 * harmonicN - 1;
            spatialPart = Math.cos(oddN * Math.PI * xFrac / 2);
        }
        const y = pipeCY + spatialPart * amplitude;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.beginPath();
    for (let i = 0; i <= numPoints; i++) {
        const xFrac = i / numPoints;
        const x = pipeX + xFrac * pipeW;
        let spatialPart;
        if (pipeType === 'open') {
            spatialPart = Math.sin(harmonicN * Math.PI * xFrac);
        } else {
            const oddN = 2 * harmonicN - 1;
            spatialPart = Math.cos(oddN * Math.PI * xFrac / 2);
        }
        const y = pipeCY - spatialPart * amplitude;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Pressure wave (phase-shifted by 90 degrees spatially)
    const pressY = H * 0.78;
    const pressAmp = pipeH * 0.2;
    ctx.strokeStyle = showMode === 'pressure' ? '#8A9A5B' : 'rgba(138,154,91,0.25)';
    ctx.lineWidth = showMode === 'pressure' ? 2.5 : 1;
    ctx.beginPath();
    for (let i = 0; i <= numPoints; i++) {
        const xFrac = i / numPoints;
        const x = pipeX + xFrac * pipeW;
        let spatialPart;
        if (pipeType === 'open') {
            spatialPart = Math.cos(harmonicN * Math.PI * xFrac);
        } else {
            const oddN = 2 * harmonicN - 1;
            spatialPart = Math.sin(oddN * Math.PI * xFrac / 2);
        }
        const y = pressY + spatialPart * pressAmp * Math.cos(omega * time * 0.001 * animSpeed * 0.01);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Pressure label
    ctx.font = '12px system-ui';
    ctx.fillStyle = '#8A9A5B';
    ctx.textAlign = 'left';
    ctx.fillText('Pressure variation', pipeX, pressY - pressAmp - 15);
    ctx.fillStyle = '#DDA15E';
    ctx.fillText('Air displacement', pipeX, pipeTop - 15);

    // Draw node/antinode markers
    ctx.fillStyle = 'rgba(221,161,94,0.6)';
    ctx.font = '10px system-ui';
    ctx.textAlign = 'center';
    for (let i = 0; i <= numPoints; i += Math.round(numPoints / 80)) {
        const xFrac = i / numPoints;
        const x = pipeX + xFrac * pipeW;
        let spatialPart;
        if (pipeType === 'open') {
            spatialPart = Math.sin(harmonicN * Math.PI * xFrac);
        } else {
            const oddN = 2 * harmonicN - 1;
            spatialPart = Math.cos(oddN * Math.PI * xFrac / 2);
        }
        if (Math.abs(spatialPart) < 0.02) {
            ctx.beginPath();
            ctx.arc(x, pipeCY, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Wavelength indicator
    if (pipeW > 0) {
        const wlPx = (wavelength / pipeLength) * pipeW;
        if (wlPx > 40 && wlPx < pipeW) {
            const arrowY = pipeTop - 35;
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(pipeX, arrowY);
            ctx.lineTo(pipeX + wlPx, arrowY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pipeX, arrowY - 5);
            ctx.lineTo(pipeX, arrowY + 5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pipeX + wlPx, arrowY - 5);
            ctx.lineTo(pipeX + wlPx, arrowY + 5);
            ctx.stroke();
            ctx.font = '11px system-ui';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('\u03BB = ' + wavelength.toFixed(2) + ' m', pipeX + wlPx / 2, arrowY - 8);
        }
    }

    // Frequency display
    ctx.font = 'bold 16px system-ui';
    ctx.fillStyle = '#FEFAE0';
    ctx.textAlign = 'center';
    ctx.fillText('f = ' + freq.toFixed(1) + ' Hz', W / 2, H * 0.12);

    // Particle motion visualization
    const particleCount = 60;
    for (let i = 0; i < particleCount; i++) {
        const xFrac = (i + 0.5) / particleCount;
        const x = pipeX + xFrac * pipeW;
        let spatialPart;
        if (pipeType === 'open') {
            spatialPart = Math.sin(harmonicN * Math.PI * xFrac);
        } else {
            const oddN = 2 * harmonicN - 1;
            spatialPart = Math.cos(oddN * Math.PI * xFrac / 2);
        }
        const dx = spatialPart * 12 * Math.cos(omega * time * 0.001 * animSpeed * 0.01);
        const alpha = 0.3 + 0.4 * Math.abs(spatialPart);
        ctx.fillStyle = `rgba(254,250,224,${alpha})`;
        for (let row = 0; row < 3; row++) {
            const py = pipeCY - pipeH * 0.15 + row * pipeH * 0.15;
            ctx.beginPath();
            ctx.arc(x + dx, py, 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

function animate(ts) {
    time = ts || 0;
    draw();
    animId = requestAnimationFrame(animate);
}

updateInfo();
animate();

window.reset = function() {
    time = 0;
    harmonicN = 1;
    pipeType = 'open';
    pipeLength = 1.0;
    animSpeed = 1.0;
    showMode = 'displacement';
    harmonicEl.value = 1;
    pipeLengthEl.value = 1.0;
    speedEl.value = 1.0;
    pipeTypeEl.value = 'open';
    document.getElementById('harmonicVal').textContent = '1';
    document.getElementById('lengthVal').textContent = '1.0m';
    document.getElementById('speedVal').textContent = '1.0x';
    showDisplacementBtn.classList.add('active');
    showPressureBtn.classList.remove('active');
    stopSound();
    updateInfo();
};
</script>
</body>
</html>
