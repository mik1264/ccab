<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Origin V-Pattern - Forensic Science Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info-panel {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,30,0.92);
            backdrop-filter: blur(10px); padding: 15px 20px; border-radius: 12px;
            border: 1px solid rgba(138,154,91,0.3); z-index: 100; max-width: 300px;
            font-size: 0.85rem; line-height: 1.5;
        }
        #info-panel h3 { color: #DDA15E; margin-bottom: 8px; }
        .label { color: #8A9A5B; }
        .value { color: #FEFAE0; font-weight: bold; }
        #controls {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100; flex-wrap: wrap; justify-content: center;
            align-items: center;
        }
        #controls button, #controls label {
            background: rgba(96,108,56,0.8); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
        }
        #controls button:hover { background: rgba(138,154,91,0.9); }
        #controls label { display: flex; align-items: center; gap: 6px; cursor: default; }
        #controls input[type="range"] { width: 80px; }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <div id="info-panel">
        <h3>Fire Origin V-Pattern</h3>
        <p><span class="label">Time:</span> <span class="value" id="fire-time">0s</span></p>
        <p><span class="label">Spread:</span> <span class="value" id="fire-spread">0%</span></p>
        <p><span class="label">Origin:</span> <span class="value" id="fire-origin">Click to set</span></p>
        <p style="margin-top:8px;color:rgba(254,250,224,0.5);font-size:0.75rem;">
            Click on the wall to set the fire origin. Fire rises and spreads outward, creating a V-pattern. The apex of the V points to the origin.
        </p>
    </div>
    <div id="controls">
        <button onclick="resetFire()">Reset</button>
        <button onclick="toggleAnalysis()">Toggle V-Pattern Overlay</button>
        <label>Speed: <input type="range" id="speed" min="1" max="10" value="5"></label>
    </div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    const CELL = 6;
    let cols, rows;
    let grid = [];
    let fireOrigin = null;
    let fireActive = false;
    let startTime = 0;
    let showAnalysis = false;
    let particles = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cols = Math.ceil(W / CELL);
        rows = Math.ceil(H / CELL);
        initGrid();
    }

    function initGrid() {
        grid = [];
        for (let y = 0; y < rows; y++) {
            grid[y] = [];
            for (let x = 0; x < cols; x++) {
                grid[y][x] = {
                    fuel: 1.0,
                    temp: 0,
                    burning: false,
                    charDepth: 0,
                    burnTime: 0
                };
            }
        }
    }

    resize();
    window.addEventListener('resize', resize);

    // Wall regions - define combustible surfaces
    const wallLeft = 0.15;
    const wallRight = 0.85;
    const floorY = 0.85;
    const ceilingY = 0.1;

    function isWall(gx, gy) {
        const nx = gx / cols;
        const ny = gy / rows;
        // Back wall
        if (nx > wallLeft && nx < wallRight && ny > ceilingY && ny < floorY) return true;
        return false;
    }

    function ignite(gx, gy) {
        if (gx >= 0 && gx < cols && gy >= 0 && gy < rows && isWall(gx, gy)) {
            grid[gy][gx].temp = 1.0;
            grid[gy][gx].burning = true;
            fireOrigin = { gx, gy, px: gx * CELL, py: gy * CELL };
            fireActive = true;
            startTime = Date.now();
            document.getElementById('fire-origin').textContent = `(${gx}, ${gy})`;
        }
    }

    function updateFire() {
        if (!fireActive) return;

        const speed = parseInt(document.getElementById('speed').value);
        const dt = 0.01 * speed;
        let totalBurned = 0;
        let totalCells = 0;

        const newGrid = grid.map(row => row.map(cell => ({ ...cell })));

        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if (!isWall(x, y)) continue;
                totalCells++;
                const cell = grid[y][x];

                if (cell.burning) {
                    totalBurned++;
                    newGrid[y][x].fuel -= dt * 0.3;
                    newGrid[y][x].charDepth += dt * 0.2;
                    newGrid[y][x].burnTime += dt;

                    if (newGrid[y][x].fuel <= 0) {
                        newGrid[y][x].burning = false;
                        newGrid[y][x].fuel = 0;
                        newGrid[y][x].temp *= 0.95;
                    }

                    // Spread to neighbors - fire rises (upward bias)
                    const neighbors = [
                        [x-1, y], [x+1, y],   // horizontal
                        [x, y-1], [x, y-2],    // upward (stronger)
                        [x-1, y-1], [x+1, y-1], // diagonal up
                        [x, y+1],               // downward (weaker)
                        [x-2, y-1], [x+2, y-1]  // wide upward spread
                    ];
                    const probs = [0.3, 0.3, 0.6, 0.3, 0.4, 0.4, 0.1, 0.15, 0.15];

                    neighbors.forEach(([nx, ny], i) => {
                        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && isWall(nx, ny)) {
                            const n = grid[ny][nx];
                            if (!n.burning && n.fuel > 0.1) {
                                const heatTransfer = cell.temp * probs[i] * dt;
                                newGrid[ny][nx].temp += heatTransfer;
                                if (newGrid[ny][nx].temp > 0.4 && Math.random() < probs[i] * dt * 3) {
                                    newGrid[ny][nx].burning = true;
                                }
                            }
                        }
                    });

                    // Fire particles
                    if (Math.random() < 0.1) {
                        particles.push({
                            x: x * CELL + Math.random() * CELL,
                            y: y * CELL,
                            vx: (Math.random() - 0.5) * 2,
                            vy: -1 - Math.random() * 3,
                            life: 0.5 + Math.random() * 0.5,
                            maxLife: 0.5 + Math.random() * 0.5,
                            size: 2 + Math.random() * 3
                        });
                    }
                } else if (cell.temp > 0) {
                    newGrid[y][x].temp *= 0.99;
                }
            }
        }

        grid = newGrid;

        // Update particles
        particles = particles.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            p.vy -= 0.05;
            return p.life > 0;
        });

        const elapsed = (Date.now() - startTime) / 1000;
        document.getElementById('fire-time').textContent = elapsed.toFixed(1) + 's';
        document.getElementById('fire-spread').textContent = totalCells > 0 ? Math.round(totalBurned / totalCells * 100) + '%' : '0%';
    }

    function drawRoom() {
        // Floor
        ctx.fillStyle = '#2a2520';
        ctx.fillRect(0, floorY * H, W, H * (1 - floorY));

        // Back wall
        const wl = wallLeft * W, wr = wallRight * W;
        const ct = ceilingY * H, fl = floorY * H;
        ctx.fillStyle = '#3a3530';
        ctx.fillRect(wl, ct, wr - wl, fl - ct);

        // Wall border
        ctx.strokeStyle = 'rgba(138,154,91,0.2)';
        ctx.lineWidth = 2;
        ctx.strokeRect(wl, ct, wr - wl, fl - ct);
    }

    function drawFire() {
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if (!isWall(x, y)) continue;
                const cell = grid[y][x];

                if (cell.charDepth > 0) {
                    // Char marks - darker = more burned
                    const darkness = Math.min(1, cell.charDepth);
                    ctx.fillStyle = `rgba(${20 + (1 - darkness) * 30}, ${15 + (1 - darkness) * 20}, ${10 + (1 - darkness) * 15}, ${darkness})`;
                    ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
                }

                if (cell.burning) {
                    // Fire glow
                    const intensity = cell.fuel;
                    const r = 255;
                    const g = Math.floor(80 + intensity * 120);
                    const b = Math.floor(intensity * 30);
                    ctx.fillStyle = `rgba(${r},${g},${b},${0.6 + intensity * 0.4})`;
                    ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
                } else if (cell.temp > 0.05) {
                    // Heat glow
                    ctx.fillStyle = `rgba(255,100,20,${cell.temp * 0.3})`;
                    ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
                }
            }
        }

        // Fire particles
        particles.forEach(p => {
            const t = p.life / p.maxLife;
            ctx.fillStyle = `rgba(255,${Math.floor(150 * t + 50)},${Math.floor(30 * t)},${t})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * t, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function drawVPatternOverlay() {
        if (!showAnalysis || !fireOrigin) return;

        ctx.save();
        ctx.globalAlpha = 0.6;

        // Draw V-pattern lines from origin
        const ox = fireOrigin.px;
        const oy = fireOrigin.py;
        const vAngle = Math.PI / 6; // ~30 degree half-angle

        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 4]);

        // Left line of V
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(ox - Math.sin(vAngle) * 500, oy - Math.cos(vAngle) * 500);
        ctx.stroke();

        // Right line of V
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(ox + Math.sin(vAngle) * 500, oy - Math.cos(vAngle) * 500);
        ctx.stroke();

        ctx.setLineDash([]);

        // Origin marker
        ctx.strokeStyle = '#8A9A5B';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ox, oy, 12, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(ox - 6, oy);
        ctx.lineTo(ox + 6, oy);
        ctx.moveTo(ox, oy - 6);
        ctx.lineTo(ox, oy + 6);
        ctx.stroke();

        // Label
        ctx.fillStyle = '#DDA15E';
        ctx.font = 'bold 12px monospace';
        ctx.fillText('V-Pattern Apex (Origin)', ox + 18, oy + 4);
        ctx.fillStyle = '#8A9A5B';
        ctx.font = '11px monospace';
        ctx.fillText('Fire rises & spreads outward', ox + 18, oy + 18);

        ctx.restore();
    }

    function draw() {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, W, H);

        drawRoom();
        updateFire();
        drawFire();
        drawVPatternOverlay();

        requestAnimationFrame(draw);
    }

    canvas.addEventListener('click', e => {
        const gx = Math.floor(e.clientX / CELL);
        const gy = Math.floor(e.clientY / CELL);
        if (isWall(gx, gy)) {
            resetFire();
            ignite(gx, gy);
            // Ignite a small cluster
            for (let dx = -1; dx <= 1; dx++) {
                for (let dy = -1; dy <= 1; dy++) {
                    if (isWall(gx + dx, gy + dy)) {
                        grid[gy + dy][gx + dx].temp = 0.8;
                        grid[gy + dy][gx + dx].burning = true;
                    }
                }
            }
        }
    });

    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.touches[0];
        canvas.dispatchEvent(new MouseEvent('click', { clientX: t.clientX, clientY: t.clientY }));
    });

    function resetFire() {
        initGrid();
        fireOrigin = null;
        fireActive = false;
        particles = [];
        document.getElementById('fire-time').textContent = '0s';
        document.getElementById('fire-spread').textContent = '0%';
        document.getElementById('fire-origin').textContent = 'Click to set';
    }

    function toggleAnalysis() { showAnalysis = !showAnalysis; }

    window.reset = function() { resetFire(); };

    draw();
    </script>
</body>
</html>
