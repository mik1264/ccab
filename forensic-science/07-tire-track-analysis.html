<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tire Track Analysis - Forensic Science Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info-panel {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,30,0.92);
            backdrop-filter: blur(10px); padding: 15px 20px; border-radius: 12px;
            border: 1px solid rgba(138,154,91,0.3); z-index: 100; max-width: 320px;
            font-size: 0.85rem; line-height: 1.5;
        }
        #info-panel h3 { color: #DDA15E; margin-bottom: 8px; }
        .label { color: #8A9A5B; }
        .value { color: #FEFAE0; font-weight: bold; }
        #controls {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100; flex-wrap: wrap; justify-content: center;
        }
        #controls button, #controls select {
            background: rgba(96,108,56,0.8); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
        }
        #controls button:hover { background: rgba(138,154,91,0.9); }
        #controls select { background: #2a2a2a; }
        #db-panel {
            position: fixed; top: 10px; left: 80px; background: rgba(30,30,30,0.92);
            backdrop-filter: blur(10px); padding: 12px 16px; border-radius: 12px;
            border: 1px solid rgba(138,154,91,0.3); z-index: 100; max-width: 200px;
            font-size: 0.8rem; display: none;
        }
        #db-panel h4 { color: #DDA15E; margin-bottom: 6px; }
        .db-match { padding: 4px 0; border-bottom: 1px solid rgba(138,154,91,0.2); }
        .db-match .score { color: #8A9A5B; }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <div id="info-panel">
        <h3>Tire Track Analysis</h3>
        <p><span class="label">Track Width:</span> <span class="value" id="track-width">--</span></p>
        <p><span class="label">Tread Pattern:</span> <span class="value" id="tread-pattern">--</span></p>
        <p><span class="label">Wheelbase:</span> <span class="value" id="wheelbase">--</span></p>
        <p><span class="label">Vehicle Class:</span> <span class="value" id="vehicle-class">--</span></p>
        <p style="margin-top:8px;color:rgba(254,250,224,0.5);font-size:0.75rem;">
            Tire tracks reveal track width, tread pattern, and wheelbase. These class characteristics narrow down vehicle type. Click Analyze to query the database.
        </p>
    </div>
    <div id="db-panel">
        <h4>Database Matches</h4>
        <div id="db-results"></div>
    </div>
    <div id="controls">
        <select id="vehicle" onchange="changeVehicle()">
            <option value="sedan">Sedan</option>
            <option value="suv">SUV</option>
            <option value="truck">Pickup Truck</option>
            <option value="van">Van</option>
            <option value="sports">Sports Car</option>
        </select>
        <button onclick="generateNewTrack()">New Track</button>
        <button onclick="toggleMeasurements()">Toggle Measurements</button>
        <button onclick="analyzeTrack()">Analyze & Match</button>
    </div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let showMeasurements = false;
    let currentVehicle = 'sedan';

    const vehicles = {
        sedan:  { trackWidth: 60, wheelbase: 270, treadType: 'symmetric', treadWidth: 20, name: 'Sedan', tireSize: '205/55R16' },
        suv:    { trackWidth: 72, wheelbase: 300, treadType: 'aggressive', treadWidth: 26, name: 'SUV', tireSize: '265/70R17' },
        truck:  { trackWidth: 68, wheelbase: 340, treadType: 'mud-terrain', treadWidth: 28, name: 'Pickup Truck', tireSize: '275/65R18' },
        van:    { trackWidth: 66, wheelbase: 310, treadType: 'highway', treadWidth: 22, name: 'Van', tireSize: '235/65R16' },
        sports: { trackWidth: 56, wheelbase: 250, treadType: 'performance', treadWidth: 24, name: 'Sports Car', tireSize: '245/40R18' }
    };

    let trackData = null;
    let scrollOffset = 0;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        generateNewTrack();
    }
    resize();
    window.addEventListener('resize', resize);

    function generateTreadPattern(type, tireWidth) {
        const pattern = [];
        const blockLen = type === 'aggressive' ? 15 : type === 'mud-terrain' ? 20 : 10;
        const numBlocks = Math.floor(200 / blockLen);

        for (let i = 0; i < numBlocks; i++) {
            const y = i * blockLen;
            if (type === 'symmetric') {
                pattern.push({ y, blocks: [
                    { x: -tireWidth * 0.4, w: tireWidth * 0.15 },
                    { x: -tireWidth * 0.15, w: tireWidth * 0.15 },
                    { x: tireWidth * 0.1, w: tireWidth * 0.15 },
                    { x: tireWidth * 0.35, w: tireWidth * 0.12 }
                ], h: blockLen * 0.7 });
            } else if (type === 'aggressive') {
                pattern.push({ y, blocks: [
                    { x: -tireWidth * 0.35, w: tireWidth * 0.25 },
                    { x: tireWidth * 0.1, w: tireWidth * 0.25 },
                ], h: blockLen * 0.6 });
                if (i % 2 === 0) {
                    pattern.push({ y: y + blockLen * 0.3, blocks: [
                        { x: -tireWidth * 0.1, w: tireWidth * 0.2 }
                    ], h: blockLen * 0.4 });
                }
            } else if (type === 'mud-terrain') {
                const offset = (i % 2) * tireWidth * 0.15;
                pattern.push({ y, blocks: [
                    { x: -tireWidth * 0.4 + offset, w: tireWidth * 0.3 },
                    { x: tireWidth * 0.1 + offset, w: tireWidth * 0.3 }
                ], h: blockLen * 0.5 });
            } else if (type === 'highway') {
                pattern.push({ y, blocks: [
                    { x: -tireWidth * 0.4, w: tireWidth * 0.2 },
                    { x: -tireWidth * 0.1, w: tireWidth * 0.2 },
                    { x: tireWidth * 0.2, w: tireWidth * 0.2 }
                ], h: blockLen * 0.8 });
            } else { // performance
                const diag = (i % 3) * tireWidth * 0.05;
                pattern.push({ y, blocks: [
                    { x: -tireWidth * 0.35 + diag, w: tireWidth * 0.18 },
                    { x: -tireWidth * 0.05 + diag, w: tireWidth * 0.1 },
                    { x: tireWidth * 0.15 + diag, w: tireWidth * 0.18 }
                ], h: blockLen * 0.75 });
            }
        }
        return pattern;
    }

    function generateNewTrack() {
        const v = vehicles[currentVehicle];
        const tread = generateTreadPattern(v.treadType, v.treadWidth);

        // Add random wear patterns (individual characteristics)
        const wear = [];
        for (let i = 0; i < 3 + Math.floor(Math.random() * 4); i++) {
            wear.push({
                y: Math.random() * 200,
                x: (Math.random() - 0.5) * v.treadWidth,
                size: 2 + Math.random() * 4,
                type: Math.random() > 0.5 ? 'cut' : 'wear'
            });
        }

        trackData = {
            vehicle: v,
            tread, wear,
            curvature: (Math.random() - 0.5) * 0.002,
            noise: Math.random() * 2
        };

        document.getElementById('track-width').textContent = v.trackWidth + ' in';
        document.getElementById('tread-pattern').textContent = v.treadType;
        document.getElementById('wheelbase').textContent = v.wheelbase + ' cm';
        document.getElementById('vehicle-class').textContent = v.name;

        scrollOffset = 0;
    }

    function changeVehicle() {
        currentVehicle = document.getElementById('vehicle').value;
        generateNewTrack();
    }

    function drawTrack() {
        if (!trackData) return;
        const v = trackData.vehicle;
        const scale = 2.5;
        const treadRepeat = 200;

        // Ground
        ctx.fillStyle = '#3a3020';
        ctx.fillRect(0, 0, W, H);

        // Ground texture (dirt/mud)
        for (let i = 0; i < 500; i++) {
            const gx = Math.random() * W;
            const gy = Math.random() * H;
            ctx.fillStyle = `rgba(${50 + Math.random() * 30},${40 + Math.random() * 20},${20 + Math.random() * 15},0.3)`;
            ctx.fillRect(gx, gy, 2 + Math.random() * 3, 1 + Math.random() * 2);
        }

        // Left tire track
        const leftCenterX = W * 0.35;
        const rightCenterX = leftCenterX + v.trackWidth * scale;

        [leftCenterX, rightCenterX].forEach(centerX => {
            // Track depression
            ctx.fillStyle = 'rgba(25,20,12,0.5)';
            ctx.fillRect(centerX - v.treadWidth * scale / 2, 0, v.treadWidth * scale, H);

            // Tread pattern repeating
            for (let repeatY = -treadRepeat; repeatY < H + treadRepeat; repeatY += treadRepeat * scale) {
                const baseY = repeatY + scrollOffset;

                trackData.tread.forEach(row => {
                    const rowY = baseY + row.y * scale;
                    if (rowY < -30 || rowY > H + 30) return;

                    // Curvature offset
                    const curveOffset = trackData.curvature * (rowY - H / 2) * (rowY - H / 2);

                    row.blocks.forEach(block => {
                        const bx = centerX + block.x * scale + curveOffset;
                        const by = rowY;
                        const bw = block.w * scale;
                        const bh = row.h * scale;

                        // Tread block impression
                        ctx.fillStyle = 'rgba(40,35,25,0.7)';
                        ctx.fillRect(bx, by, bw, bh);

                        // Edge detail
                        ctx.strokeStyle = 'rgba(60,50,35,0.5)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(bx, by, bw, bh);
                    });
                });
            }

            // Wear marks
            trackData.wear.forEach(w => {
                for (let repeatY = 0; repeatY < H + treadRepeat * scale; repeatY += treadRepeat * scale) {
                    const wy = repeatY + w.y * scale + scrollOffset;
                    if (wy < 0 || wy > H) continue;
                    const wx = centerX + w.x * scale;

                    if (w.type === 'cut') {
                        ctx.strokeStyle = 'rgba(80,70,50,0.5)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(wx - w.size * scale, wy);
                        ctx.lineTo(wx + w.size * scale, wy + w.size * scale * 0.5);
                        ctx.stroke();
                    } else {
                        ctx.fillStyle = 'rgba(50,45,30,0.4)';
                        ctx.beginPath();
                        ctx.arc(wx, wy, w.size * scale, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });
        });

        // Measurement overlays
        if (showMeasurements) {
            ctx.save();
            ctx.strokeStyle = '#DDA15E';
            ctx.fillStyle = '#DDA15E';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);

            // Track width measurement
            const midY = H * 0.3;
            ctx.beginPath();
            ctx.moveTo(leftCenterX, midY);
            ctx.lineTo(rightCenterX, midY);
            ctx.stroke();

            // Arrows
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(leftCenterX, midY - 8);
            ctx.lineTo(leftCenterX, midY + 8);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(rightCenterX, midY - 8);
            ctx.lineTo(rightCenterX, midY + 8);
            ctx.stroke();

            ctx.font = '13px monospace';
            ctx.fillText(`Track Width: ${v.trackWidth}"`, (leftCenterX + rightCenterX) / 2 - 50, midY - 12);

            // Tread width
            const tw = v.treadWidth * scale;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(leftCenterX - tw / 2, H * 0.5);
            ctx.lineTo(leftCenterX + tw / 2, H * 0.5);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.font = '11px monospace';
            ctx.fillText(`${v.treadWidth}" tread`, leftCenterX - 20, H * 0.5 - 8);

            // Tire size
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText(`Tire: ${v.tireSize}`, leftCenterX - tw / 2, H * 0.55);

            ctx.restore();
        }
    }

    function draw() {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, W, H);

        drawTrack();
        scrollOffset += 0.5;

        requestAnimationFrame(draw);
    }

    function toggleMeasurements() { showMeasurements = !showMeasurements; }

    function analyzeTrack() {
        const panel = document.getElementById('db-panel');
        panel.style.display = 'block';
        const results = document.getElementById('db-results');
        results.innerHTML = '';

        // Simulate database matching
        const v = vehicles[currentVehicle];
        const allVehicles = Object.values(vehicles);
        const matches = allVehicles.map(candidate => {
            const widthScore = 1 - Math.abs(candidate.trackWidth - v.trackWidth) / 100;
            const wbScore = 1 - Math.abs(candidate.wheelbase - v.wheelbase) / 400;
            const treadScore = candidate.treadType === v.treadType ? 1 : 0.3;
            const total = ((widthScore + wbScore + treadScore) / 3 * 100).toFixed(0);
            return { name: candidate.name, tire: candidate.tireSize, score: total };
        }).sort((a, b) => b.score - a.score);

        matches.forEach(m => {
            const div = document.createElement('div');
            div.className = 'db-match';
            div.innerHTML = `<span style="color:#FEFAE0">${m.name}</span><br>
                <span style="color:rgba(254,250,224,0.5)">${m.tire}</span>
                <span class="score" style="float:right">${m.score}%</span>`;
            results.appendChild(div);
        });
    }

    window.reset = function() {
        generateNewTrack();
        document.getElementById('db-panel').style.display = 'none';
    };

    generateNewTrack();
    draw();
    </script>
</body>
</html>
