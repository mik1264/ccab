<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricochet Angle Calculator - Forensic Science Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info-panel {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,30,0.92);
            backdrop-filter: blur(10px); padding: 15px 20px; border-radius: 12px;
            border: 1px solid rgba(138,154,91,0.3); z-index: 100; max-width: 320px;
            font-size: 0.85rem; line-height: 1.5;
        }
        #info-panel h3 { color: #DDA15E; margin-bottom: 8px; }
        .label { color: #8A9A5B; }
        .value { color: #FEFAE0; font-weight: bold; }
        #controls {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100; flex-wrap: wrap; justify-content: center;
            align-items: center;
        }
        #controls button, #controls label {
            background: rgba(96,108,56,0.8); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
        }
        #controls label { display: flex; align-items: center; gap: 6px; cursor: default; }
        #controls select {
            background: #2a2a2a; color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 4px 8px; border-radius: 4px;
        }
        #controls button:hover { background: rgba(138,154,91,0.9); }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <div id="info-panel">
        <h3>Ricochet Angle Calculator</h3>
        <p><span class="label">Incidence Angle:</span> <span class="value" id="inc-angle">--</span></p>
        <p><span class="label">Ricochet Angle:</span> <span class="value" id="ric-angle">--</span></p>
        <p><span class="label">Critical Angle:</span> <span class="value" id="crit-angle">--</span></p>
        <p><span class="label">Result:</span> <span class="value" id="result">--</span></p>
        <p><span class="label">Surface:</span> <span class="value" id="surface-name">Concrete</span></p>
        <p style="margin-top:8px;color:rgba(254,250,224,0.5);font-size:0.75rem;">
            Click to set the origin, drag to aim. The angle of ricochet is always less than the angle of incidence. Above the critical angle, the bullet penetrates instead.
        </p>
    </div>
    <div id="controls">
        <label>Surface:
            <select id="surface-select" onchange="changeSurface()">
                <option value="concrete">Concrete</option>
                <option value="steel">Steel</option>
                <option value="wood">Wood</option>
                <option value="water">Water</option>
                <option value="glass">Glass</option>
            </select>
        </label>
        <button onclick="fire()">Fire!</button>
        <button onclick="clearTraces()">Clear Traces</button>
    </div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    const surfaces = {
        concrete: { criticalAngle: 15, restitution: 0.35, color: '#666', name: 'Concrete' },
        steel:    { criticalAngle: 10, restitution: 0.5,  color: '#888', name: 'Steel' },
        wood:     { criticalAngle: 12, restitution: 0.2,  color: '#8B6914', name: 'Wood' },
        water:    { criticalAngle: 7,  restitution: 0.15, color: '#2a5a8a', name: 'Water' },
        glass:    { criticalAngle: 14, restitution: 0.3,  color: '#6a8a9a', name: 'Glass' }
    };

    let currentSurface = 'concrete';
    let aimOrigin = null;
    let aimAngle = 0;
    let aiming = false;
    let bullets = [];
    let traces = [];
    let sparks = [];

    const surfaceY = 0.65; // Surface position as fraction of height

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function changeSurface() {
        currentSurface = document.getElementById('surface-select').value;
        const s = surfaces[currentSurface];
        document.getElementById('surface-name').textContent = s.name;
        document.getElementById('crit-angle').textContent = s.criticalAngle + '°';
    }
    changeSurface();

    function fire() {
        if (!aimOrigin) {
            aimOrigin = { x: W * 0.2, y: H * 0.2 };
        }

        const surfY = surfaceY * H;
        const speed = 8;
        const dx = Math.cos(aimAngle) * speed;
        const dy = Math.sin(aimAngle) * speed;

        bullets.push({
            x: aimOrigin.x, y: aimOrigin.y,
            vx: dx, vy: dy,
            trail: [{ x: aimOrigin.x, y: aimOrigin.y }],
            alive: true, bounced: false, penetrated: false
        });
    }

    function updateBullets() {
        const surfY = surfaceY * H;
        const surf = surfaces[currentSurface];

        bullets.forEach(b => {
            if (!b.alive) return;

            b.x += b.vx;
            b.y += b.vy;
            b.vy += 0.02; // Slight gravity
            b.trail.push({ x: b.x, y: b.y });

            // Hit surface
            if (b.y >= surfY && !b.bounced && !b.penetrated) {
                // Calculate incidence angle (from surface, not normal)
                const incidenceAngle = Math.atan2(Math.abs(b.vy), Math.abs(b.vx)) * 180 / Math.PI;

                document.getElementById('inc-angle').textContent = incidenceAngle.toFixed(1) + '°';

                if (incidenceAngle > surf.criticalAngle) {
                    // Penetration
                    b.penetrated = true;
                    b.alive = false;
                    document.getElementById('ric-angle').textContent = '--';
                    document.getElementById('result').textContent = 'PENETRATION';

                    // Penetration mark
                    traces.push({
                        type: 'penetration',
                        x: b.x, y: surfY,
                        time: Date.now()
                    });

                    // Debris sparks
                    for (let i = 0; i < 15; i++) {
                        sparks.push({
                            x: b.x, y: surfY,
                            vx: (Math.random() - 0.5) * 4,
                            vy: -Math.random() * 5,
                            life: 0.5 + Math.random() * 0.5
                        });
                    }
                } else {
                    // Ricochet
                    b.bounced = true;
                    b.y = surfY;

                    // Ricochet angle is less than incidence angle
                    const ricFraction = surf.restitution + Math.random() * 0.2;
                    const ricAngleRad = incidenceAngle * ricFraction * Math.PI / 180;
                    const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy) * (0.5 + ricFraction * 0.3);

                    b.vy = -Math.abs(Math.sin(ricAngleRad) * speed);
                    b.vx = Math.abs(Math.cos(ricAngleRad) * speed) * Math.sign(b.vx);

                    const ricAngle = Math.atan2(Math.abs(b.vy), Math.abs(b.vx)) * 180 / Math.PI;
                    document.getElementById('ric-angle').textContent = ricAngle.toFixed(1) + '°';
                    document.getElementById('result').textContent = 'RICOCHET';

                    // Ricochet mark
                    traces.push({
                        type: 'ricochet',
                        x: b.x, y: surfY,
                        incAngle: incidenceAngle,
                        ricAngle: ricAngle,
                        time: Date.now()
                    });

                    // Sparks
                    for (let i = 0; i < 20; i++) {
                        sparks.push({
                            x: b.x, y: surfY,
                            vx: (Math.random() - 0.5) * 6,
                            vy: -Math.random() * 4,
                            life: 0.3 + Math.random() * 0.5
                        });
                    }
                }
            }

            // Out of bounds
            if (b.x < -50 || b.x > W + 50 || b.y > H + 50 || b.y < -200) {
                b.alive = false;
            }
        });

        // Update sparks
        sparks = sparks.filter(s => {
            s.x += s.vx;
            s.y += s.vy;
            s.vy += 0.15;
            s.life -= 0.02;
            return s.life > 0;
        });
    }

    function drawSurface() {
        const surfY = surfaceY * H;
        const surf = surfaces[currentSurface];

        // Surface
        ctx.fillStyle = surf.color;
        ctx.fillRect(0, surfY, W, H - surfY);

        // Surface texture
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let x = 0; x < W; x += 20) {
            ctx.beginPath();
            ctx.moveTo(x, surfY);
            ctx.lineTo(x, H);
            ctx.stroke();
        }

        // Normal line
        ctx.strokeStyle = 'rgba(138,154,91,0.3)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        const midX = W / 2;
        ctx.beginPath();
        ctx.moveTo(midX, surfY);
        ctx.lineTo(midX, surfY - 200);
        ctx.stroke();
        ctx.setLineDash([]);

        // Surface label
        ctx.fillStyle = 'rgba(254,250,224,0.4)';
        ctx.font = '12px monospace';
        ctx.fillText(surf.name + ' Surface', 20, surfY + 20);
        ctx.fillText('Critical Angle: ' + surf.criticalAngle + '°', 20, surfY + 35);
    }

    function drawAimLine() {
        if (!aimOrigin) return;

        const surfY = surfaceY * H;
        ctx.save();

        // Origin point
        ctx.beginPath();
        ctx.arc(aimOrigin.x, aimOrigin.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#8A9A5B';
        ctx.fill();

        // Aim line
        const ext = 500;
        ctx.beginPath();
        ctx.moveTo(aimOrigin.x, aimOrigin.y);
        ctx.lineTo(aimOrigin.x + Math.cos(aimAngle) * ext, aimOrigin.y + Math.sin(aimAngle) * ext);
        ctx.strokeStyle = 'rgba(138,154,91,0.5)';
        ctx.lineWidth = 1;
        ctx.setLineDash([6, 3]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Angle arc at surface intersection
        const hitX = aimOrigin.x + (surfY - aimOrigin.y) / Math.tan(aimAngle);
        if (hitX > 0 && hitX < W) {
            const incAngle = Math.atan2(surfY - aimOrigin.y, hitX - aimOrigin.x);
            const surfAngle = Math.PI / 2 - incAngle;

            ctx.beginPath();
            ctx.arc(hitX, surfY, 30, -Math.PI / 2, -Math.PI / 2 + surfAngle);
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            ctx.stroke();

            const angleDeg = surfAngle * 180 / Math.PI;
            ctx.fillStyle = '#DDA15E';
            ctx.font = '11px monospace';
            ctx.fillText(angleDeg.toFixed(1) + '°', hitX + 35, surfY - 15);
        }

        ctx.restore();
    }

    function drawBullets() {
        bullets.forEach(b => {
            // Trail
            if (b.trail.length > 1) {
                ctx.beginPath();
                ctx.moveTo(b.trail[0].x, b.trail[0].y);
                for (let i = 1; i < b.trail.length; i++) {
                    ctx.lineTo(b.trail[i].x, b.trail[i].y);
                }
                ctx.strokeStyle = b.penetrated ? 'rgba(188,108,37,0.4)' : 'rgba(221,161,94,0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Bullet
            if (b.alive) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#DDA15E';
                ctx.fill();
            }
        });

        // Traces on surface
        traces.forEach(t => {
            if (t.type === 'ricochet') {
                ctx.beginPath();
                ctx.arc(t.x, t.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(221,161,94,0.6)';
                ctx.fill();
                ctx.fillStyle = 'rgba(254,250,224,0.5)';
                ctx.font = '9px monospace';
                ctx.fillText(`${t.incAngle.toFixed(1)}°->${t.ricAngle.toFixed(1)}°`, t.x - 20, t.y + 20);
            } else {
                ctx.beginPath();
                ctx.arc(t.x, t.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(180,50,50,0.6)';
                ctx.fill();
                ctx.fillStyle = 'rgba(254,250,224,0.5)';
                ctx.font = '9px monospace';
                ctx.fillText('PEN', t.x - 10, t.y + 20);
            }
        });

        // Sparks
        sparks.forEach(s => {
            ctx.beginPath();
            ctx.arc(s.x, s.y, 2 * s.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,${200 * s.life|0},50,${s.life})`;
            ctx.fill();
        });
    }

    function draw() {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, W, H);

        drawSurface();
        drawAimLine();
        updateBullets();
        drawBullets();

        requestAnimationFrame(draw);
    }

    canvas.addEventListener('mousedown', e => {
        aiming = true;
        aimOrigin = { x: e.clientX, y: e.clientY };
    });

    canvas.addEventListener('mousemove', e => {
        if (aiming && aimOrigin) {
            aimAngle = Math.atan2(e.clientY - aimOrigin.y, e.clientX - aimOrigin.x);
            const surfY = surfaceY * H;
            const incAngle = (Math.PI / 2 - Math.abs(aimAngle - Math.PI / 2));
            const hitX = aimOrigin.x + (surfY - aimOrigin.y) / Math.tan(aimAngle);
            if (hitX > 0 && hitX < W) {
                const surfAngle = Math.PI / 2 - aimAngle;
                document.getElementById('inc-angle').textContent = (surfAngle * 180 / Math.PI).toFixed(1) + '°';
            }
        }
    });

    canvas.addEventListener('mouseup', e => {
        aiming = false;
    });

    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.touches[0];
        canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY }));
    });
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = e.touches[0];
        canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY }));
    });
    canvas.addEventListener('touchend', e => {
        e.preventDefault();
        canvas.dispatchEvent(new MouseEvent('mouseup'));
    });

    function clearTraces() {
        bullets = [];
        traces = [];
        sparks = [];
        document.getElementById('inc-angle').textContent = '--';
        document.getElementById('ric-angle').textContent = '--';
        document.getElementById('result').textContent = '--';
    }

    window.reset = function() {
        clearTraces();
        aimOrigin = null;
    };

    draw();
    </script>
</body>
</html>
