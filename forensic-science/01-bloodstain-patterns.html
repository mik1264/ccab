<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloodstain Pattern Analysis - Forensic Science Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info-panel {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,30,0.9);
            backdrop-filter: blur(10px); padding: 15px 20px; border-radius: 12px;
            border: 1px solid rgba(138,154,91,0.3); z-index: 100; max-width: 320px;
            font-size: 0.85rem; line-height: 1.5;
        }
        #info-panel h3 { color: #DDA15E; margin-bottom: 8px; font-size: 1rem; }
        #info-panel .label { color: #8A9A5B; }
        #info-panel .value { color: #FEFAE0; font-weight: bold; }
        #controls {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100;
        }
        #controls button {
            background: rgba(96,108,56,0.8); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
        }
        #controls button:hover { background: rgba(138,154,91,0.9); }
        #instructions {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            color: rgba(254,250,224,0.6); font-size: 0.8rem; text-align: center; z-index: 100;
        }
        .stain-info {
            position: absolute; background: rgba(30,30,30,0.85); color: #FEFAE0;
            padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <div id="info-panel">
        <h3>Bloodstain Pattern Analysis</h3>
        <p><span class="label">Stains:</span> <span class="value" id="stain-count">0</span></p>
        <p><span class="label">Selected Angle:</span> <span class="value" id="sel-angle">--</span></p>
        <p><span class="label">Formula:</span> <span class="value">&theta; = arcsin(w/l)</span></p>
        <p style="margin-top:8px;color:rgba(254,250,224,0.6);font-size:0.75rem;">
            Click to place bloodstains. Drag to set the direction of travel.
            Stain ellipse shape reveals the impact angle.
        </p>
    </div>
    <div id="instructions">Click &amp; drag to create bloodstains. Lines converge at the area of origin.</div>
    <div id="controls">
        <button onclick="toggleConvergence()">Toggle Convergence Lines</button>
        <button onclick="clearStains()">Clear All</button>
        <button onclick="addPreset()">Add Preset Pattern</button>
    </div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let stains = [];
    let dragging = false;
    let dragStart = null;
    let showConvergence = true;
    let selectedStain = -1;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Blood color variations
    function bloodColor(alpha) {
        const r = 130 + Math.random() * 30;
        const g = 10 + Math.random() * 20;
        const b = 10 + Math.random() * 15;
        return `rgba(${r|0},${g|0},${b|0},${alpha})`;
    }

    function createStain(x, y, dirX, dirY) {
        const dist = Math.sqrt(dirX * dirX + dirY * dirY);
        const angle = dist > 5 ? Math.atan2(Math.abs(dirY), Math.abs(dirX)) : (Math.random() * Math.PI / 4 + Math.PI / 8);
        const impactAngle = Math.max(5, Math.min(85, (angle * 180 / Math.PI)));
        const impactAngleRad = impactAngle * Math.PI / 180;

        // Stain dimensions based on impact angle
        const dropDiameter = 3 + Math.random() * 4; // mm equivalent
        const width = dropDiameter;
        const length = dropDiameter / Math.sin(impactAngleRad);

        // Scale for display
        const scale = 8;
        const displayW = width * scale;
        const displayL = length * scale;

        // Direction angle (rotation)
        const rotation = dist > 5 ? Math.atan2(dirY, dirX) : Math.random() * Math.PI * 2;

        // Spatter tail
        const tailLength = (90 - impactAngle) / 90 * displayL * 0.6;

        stains.push({
            x, y, displayW, displayL, rotation, impactAngle,
            width, length, tailLength,
            color: bloodColor(0.9),
            darkColor: bloodColor(0.6),
            satellites: generateSatellites(x, y, rotation, impactAngle),
            time: Date.now()
        });

        document.getElementById('stain-count').textContent = stains.length;
    }

    function generateSatellites(x, y, rotation, impactAngle) {
        const sats = [];
        const count = Math.floor((90 - impactAngle) / 15);
        for (let i = 0; i < count; i++) {
            const dist = 20 + Math.random() * 40;
            const spreadAngle = rotation + (Math.random() - 0.5) * 0.8;
            sats.push({
                x: x + Math.cos(spreadAngle) * dist,
                y: y + Math.sin(spreadAngle) * dist,
                r: 1 + Math.random() * 2
            });
        }
        return sats;
    }

    function drawStain(s, index) {
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(s.rotation);

        // Main ellipse
        ctx.beginPath();
        ctx.ellipse(0, 0, s.displayL / 2, s.displayW / 2, 0, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.fill();

        // Darker center
        ctx.beginPath();
        ctx.ellipse(0, 0, s.displayL / 4, s.displayW / 4, 0, 0, Math.PI * 2);
        ctx.fillStyle = s.darkColor;
        ctx.fill();

        // Tail/spatter
        if (s.tailLength > 2) {
            ctx.beginPath();
            ctx.moveTo(s.displayL / 2, 0);
            ctx.lineTo(s.displayL / 2 + s.tailLength, -s.displayW / 6);
            ctx.lineTo(s.displayL / 2 + s.tailLength * 1.2, 0);
            ctx.lineTo(s.displayL / 2 + s.tailLength, s.displayW / 6);
            ctx.closePath();
            ctx.fillStyle = s.color;
            ctx.fill();
        }

        // Dimension lines when selected
        if (index === selectedStain) {
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);

            // Length line
            ctx.beginPath();
            ctx.moveTo(-s.displayL / 2, -s.displayW / 2 - 10);
            ctx.lineTo(s.displayL / 2, -s.displayW / 2 - 10);
            ctx.stroke();

            // Width line
            ctx.beginPath();
            ctx.moveTo(-s.displayL / 2 - 10, -s.displayW / 2);
            ctx.lineTo(-s.displayL / 2 - 10, s.displayW / 2);
            ctx.stroke();

            ctx.setLineDash([]);
        }

        ctx.restore();

        // Satellites
        s.satellites.forEach(sat => {
            ctx.beginPath();
            ctx.arc(sat.x, sat.y, sat.r, 0, Math.PI * 2);
            ctx.fillStyle = s.color;
            ctx.fill();
        });

        // Angle label
        ctx.fillStyle = index === selectedStain ? '#DDA15E' : 'rgba(254,250,224,0.5)';
        ctx.font = '11px monospace';
        ctx.fillText(`${s.impactAngle.toFixed(1)}°`, s.x + 15, s.y - 15);
    }

    function drawConvergenceLines() {
        if (!showConvergence || stains.length < 2) return;

        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = '#8A9A5B';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);

        // Extend each stain's major axis as a convergence line
        stains.forEach(s => {
            const ext = 2000;
            const dx = Math.cos(s.rotation);
            const dy = Math.sin(s.rotation);
            ctx.beginPath();
            ctx.moveTo(s.x - dx * ext, s.y - dy * ext);
            ctx.lineTo(s.x + dx * ext, s.y + dy * ext);
            ctx.stroke();
        });

        // Find approximate area of convergence (intersection of lines)
        if (stains.length >= 2) {
            let sumX = 0, sumY = 0, count = 0;
            for (let i = 0; i < stains.length; i++) {
                for (let j = i + 1; j < stains.length; j++) {
                    const pt = lineIntersection(stains[i], stains[j]);
                    if (pt && pt.x > 0 && pt.x < W && pt.y > 0 && pt.y < H) {
                        sumX += pt.x;
                        sumY += pt.y;
                        count++;
                    }
                }
            }
            if (count > 0) {
                const cx = sumX / count;
                const cy = sumY / count;

                ctx.setLineDash([]);
                ctx.globalAlpha = 0.6;
                ctx.strokeStyle = '#DDA15E';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy, 20, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx - 8, cy);
                ctx.lineTo(cx + 8, cy);
                ctx.moveTo(cx, cy - 8);
                ctx.lineTo(cx, cy + 8);
                ctx.stroke();

                ctx.globalAlpha = 0.8;
                ctx.fillStyle = '#DDA15E';
                ctx.font = '11px monospace';
                ctx.fillText('Area of Origin', cx + 25, cy - 5);
            }
        }
        ctx.restore();
    }

    function lineIntersection(s1, s2) {
        const x1 = s1.x, y1 = s1.y;
        const x2 = s1.x + Math.cos(s1.rotation) * 1000, y2 = s1.y + Math.sin(s1.rotation) * 1000;
        const x3 = s2.x, y3 = s2.y;
        const x4 = s2.x + Math.cos(s2.rotation) * 1000, y4 = s2.y + Math.sin(s2.rotation) * 1000;

        const denom = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
        if (Math.abs(denom) < 0.001) return null;

        const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / denom;
        return {
            x: x1 + t * (x2 - x1),
            y: y1 + t * (y2 - y1)
        };
    }

    function drawFloor() {
        // Grid pattern for floor reference
        ctx.strokeStyle = 'rgba(138,154,91,0.1)';
        ctx.lineWidth = 1;
        const spacing = 50;
        for (let x = 0; x < W; x += spacing) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, H);
            ctx.stroke();
        }
        for (let y = 0; y < H; y += spacing) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.stroke();
        }
    }

    function draw() {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, W, H);
        drawFloor();
        drawConvergenceLines();
        stains.forEach((s, i) => drawStain(s, i));

        // Drag preview
        if (dragging && dragStart) {
            ctx.strokeStyle = 'rgba(221,161,94,0.4)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(dragStart.x, dragStart.y);
            ctx.lineTo(dragStart.mx, dragStart.my);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        requestAnimationFrame(draw);
    }

    canvas.addEventListener('mousedown', e => {
        dragging = true;
        dragStart = { x: e.clientX, y: e.clientY, mx: e.clientX, my: e.clientY };

        // Check if clicking on existing stain
        selectedStain = -1;
        for (let i = stains.length - 1; i >= 0; i--) {
            const dx = e.clientX - stains[i].x;
            const dy = e.clientY - stains[i].y;
            if (Math.sqrt(dx * dx + dy * dy) < stains[i].displayL) {
                selectedStain = i;
                document.getElementById('sel-angle').textContent = stains[i].impactAngle.toFixed(1) + '°';
                break;
            }
        }
    });

    canvas.addEventListener('mousemove', e => {
        if (dragging && dragStart) {
            dragStart.mx = e.clientX;
            dragStart.my = e.clientY;
        }
    });

    canvas.addEventListener('mouseup', e => {
        if (dragging && dragStart) {
            const dx = e.clientX - dragStart.x;
            const dy = e.clientY - dragStart.y;
            if (selectedStain === -1) {
                createStain(dragStart.x, dragStart.y, dx, dy);
                selectedStain = stains.length - 1;
                document.getElementById('sel-angle').textContent = stains[selectedStain].impactAngle.toFixed(1) + '°';
            }
        }
        dragging = false;
        dragStart = null;
    });

    // Touch support
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.touches[0];
        canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY }));
    });
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = e.touches[0];
        canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY }));
    });
    canvas.addEventListener('touchend', e => {
        e.preventDefault();
        const t = e.changedTouches[0];
        canvas.dispatchEvent(new MouseEvent('mouseup', { clientX: t.clientX, clientY: t.clientY }));
    });

    function toggleConvergence() { showConvergence = !showConvergence; }

    function clearStains() {
        stains = [];
        selectedStain = -1;
        document.getElementById('stain-count').textContent = '0';
        document.getElementById('sel-angle').textContent = '--';
    }

    function addPreset() {
        const cx = W / 2 + (Math.random() - 0.5) * 200;
        const cy = H / 2 + (Math.random() - 0.5) * 200;
        // Create a radial pattern emanating from a central point
        const originX = cx;
        const originY = cy - 150;
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const dist = 80 + Math.random() * 120;
            const sx = originX + Math.cos(angle) * dist;
            const sy = originY + Math.sin(angle) * dist;
            const dx = sx - originX;
            const dy = sy - originY;
            createStain(sx, sy, dx, dy);
        }
    }

    window.reset = function() {
        clearStains();
    };

    draw();
    </script>
</body>
</html>
