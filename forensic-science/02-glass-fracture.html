<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Fracture Patterns - Forensic Science Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d1117; color: #FEFAE0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info-panel {
            position: fixed; top: 10px; right: 10px; background: rgba(13,17,23,0.92);
            backdrop-filter: blur(10px); padding: 15px 20px; border-radius: 12px;
            border: 1px solid rgba(138,154,91,0.3); z-index: 100; max-width: 300px;
            font-size: 0.85rem; line-height: 1.5;
        }
        #info-panel h3 { color: #DDA15E; margin-bottom: 8px; }
        .label { color: #8A9A5B; }
        .value { color: #FEFAE0; font-weight: bold; }
        #controls {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100; flex-wrap: wrap; justify-content: center;
        }
        #controls button {
            background: rgba(96,108,56,0.8); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
        }
        #controls button:hover { background: rgba(138,154,91,0.9); }
        #instructions {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            color: rgba(254,250,224,0.5); font-size: 0.8rem; text-align: center; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <div id="info-panel">
        <h3>Glass Fracture Patterns</h3>
        <p><span class="label">Impacts:</span> <span class="value" id="impact-count">0</span></p>
        <p><span class="label">3R Rule:</span> Radial fractures make right angles on the rear side</p>
        <p style="margin-top:8px;color:rgba(254,250,224,0.5);font-size:0.75rem;">
            Click to create impacts. Radial cracks appear first, then concentric rings connect them. Sequence is shown by crack termination at prior fractures.
        </p>
    </div>
    <div id="instructions">Click on the glass to create impact points</div>
    <div id="controls">
        <button onclick="clearGlass()">New Pane</button>
        <button onclick="toggleLabels()">Toggle Labels</button>
    </div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let impacts = [];
    let cracks = [];
    let animatingCracks = [];
    let showLabels = true;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function createImpact(x, y) {
        const impactNum = impacts.length + 1;
        const impact = { x, y, num: impactNum, time: Date.now() };
        impacts.push(impact);

        // Generate radial cracks
        const numRadial = 8 + Math.floor(Math.random() * 8);
        const radialCracks = [];
        for (let i = 0; i < numRadial; i++) {
            const baseAngle = (i / numRadial) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
            const length = 80 + Math.random() * 250;
            const segments = [];
            let cx = x, cy = y;
            const numSegs = 5 + Math.floor(Math.random() * 8);

            for (let s = 0; s < numSegs; s++) {
                const segLen = length / numSegs;
                const wobble = (Math.random() - 0.5) * 0.15;
                const angle = baseAngle + wobble;
                const nx = cx + Math.cos(angle) * segLen;
                const ny = cy + Math.sin(angle) * segLen;

                // Check if this crack intersects any existing crack from prior impacts
                let terminated = false;
                for (let c = 0; c < cracks.length; c++) {
                    const existingCrack = cracks[c];
                    if (existingCrack.impactNum < impactNum) {
                        for (let es = 0; es < existingCrack.segments.length - 1; es++) {
                            if (segmentsIntersect(cx, cy, nx, ny,
                                existingCrack.segments[es].x, existingCrack.segments[es].y,
                                existingCrack.segments[es+1].x, existingCrack.segments[es+1].y)) {
                                terminated = true;
                                break;
                            }
                        }
                        if (terminated) break;
                    }
                }

                segments.push({ x: nx, y: ny });
                if (terminated) break;
                cx = nx;
                cy = ny;
            }

            const crack = {
                impactNum, type: 'radial', angle: baseAngle,
                segments: [{ x, y }, ...segments],
                progress: 0, maxProgress: segments.length + 1,
                startTime: Date.now() + i * 30
            };
            radialCracks.push(crack);
            cracks.push(crack);
            animatingCracks.push(crack);
        }

        // Generate concentric cracks (rings)
        const numRings = 2 + Math.floor(Math.random() * 3);
        for (let r = 1; r <= numRings; r++) {
            const radius = 30 * r + Math.random() * 20;
            const ringSegments = [];
            const numPts = 24 + Math.floor(Math.random() * 12);
            for (let p = 0; p <= numPts; p++) {
                const a = (p / numPts) * Math.PI * 2;
                const wobble = (Math.random() - 0.5) * 8;
                ringSegments.push({
                    x: x + Math.cos(a) * (radius + wobble),
                    y: y + Math.sin(a) * (radius + wobble)
                });
            }
            const crack = {
                impactNum, type: 'concentric', radius,
                segments: ringSegments,
                progress: 0, maxProgress: ringSegments.length,
                startTime: Date.now() + numRadial * 30 + r * 100
            };
            cracks.push(crack);
            animatingCracks.push(crack);
        }

        document.getElementById('impact-count').textContent = impacts.length;
    }

    function segmentsIntersect(x1, y1, x2, y2, x3, y3, x4, y4) {
        const denom = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
        if (Math.abs(denom) < 0.0001) return false;
        const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / denom;
        const u = -((x1 - x2) * (y1 - y3) - (y1 - y2) * (x1 - x3)) / denom;
        return t > 0.05 && t < 0.95 && u > 0.05 && u < 0.95;
    }

    function drawGlassBackground() {
        // Glass pane appearance
        const grad = ctx.createLinearGradient(0, 0, W, H);
        grad.addColorStop(0, 'rgba(180,200,220,0.08)');
        grad.addColorStop(0.5, 'rgba(200,220,240,0.12)');
        grad.addColorStop(1, 'rgba(180,200,220,0.06)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Subtle reflection
        ctx.fillStyle = 'rgba(255,255,255,0.02)';
        ctx.beginPath();
        ctx.ellipse(W * 0.3, H * 0.3, W * 0.4, H * 0.2, -0.3, 0, Math.PI * 2);
        ctx.fill();

        // Frame
        ctx.strokeStyle = 'rgba(138,154,91,0.3)';
        ctx.lineWidth = 4;
        ctx.strokeRect(20, 20, W - 40, H - 40);
    }

    function drawCrack(crack, now) {
        const elapsed = now - crack.startTime;
        if (elapsed < 0) return;

        const speed = crack.type === 'radial' ? 0.15 : 0.08;
        crack.progress = Math.min(crack.maxProgress, elapsed * speed);
        const visibleSegs = Math.floor(crack.progress);

        if (visibleSegs < 1) return;

        ctx.beginPath();
        ctx.moveTo(crack.segments[0].x, crack.segments[0].y);
        for (let i = 1; i < Math.min(visibleSegs, crack.segments.length); i++) {
            ctx.lineTo(crack.segments[i].x, crack.segments[i].y);
        }

        // Fractional last segment
        const frac = crack.progress - visibleSegs;
        if (visibleSegs < crack.segments.length && frac > 0) {
            const prev = crack.segments[visibleSegs - 1] || crack.segments[0];
            const next = crack.segments[visibleSegs];
            if (next) {
                ctx.lineTo(
                    prev.x + (next.x - prev.x) * frac,
                    prev.y + (next.y - prev.y) * frac
                );
            }
        }

        if (crack.type === 'radial') {
            ctx.strokeStyle = 'rgba(200,220,240,0.7)';
            ctx.lineWidth = 1.5;
        } else {
            ctx.strokeStyle = 'rgba(200,220,240,0.4)';
            ctx.lineWidth = 1;
        }
        ctx.stroke();

        // Glass refraction effect along cracks
        if (crack.type === 'radial') {
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }
    }

    function drawImpactPoints() {
        impacts.forEach((imp, i) => {
            // Impact crater
            const grad = ctx.createRadialGradient(imp.x, imp.y, 0, imp.x, imp.y, 15);
            grad.addColorStop(0, 'rgba(255,255,255,0.3)');
            grad.addColorStop(0.5, 'rgba(200,220,240,0.15)');
            grad.addColorStop(1, 'rgba(200,220,240,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(imp.x, imp.y, 15, 0, Math.PI * 2);
            ctx.fill();

            if (showLabels) {
                ctx.fillStyle = '#DDA15E';
                ctx.font = 'bold 14px monospace';
                ctx.fillText(`#${imp.num}`, imp.x + 18, imp.y - 10);
            }
        });
    }

    function draw() {
        ctx.fillStyle = '#0d1117';
        ctx.fillRect(0, 0, W, H);
        drawGlassBackground();

        const now = Date.now();
        cracks.forEach(c => drawCrack(c, now));
        drawImpactPoints();

        requestAnimationFrame(draw);
    }

    canvas.addEventListener('click', e => {
        createImpact(e.clientX, e.clientY);
    });

    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.touches[0];
        createImpact(t.clientX, t.clientY);
    });

    function clearGlass() {
        impacts = [];
        cracks = [];
        animatingCracks = [];
        document.getElementById('impact-count').textContent = '0';
    }

    function toggleLabels() { showLabels = !showLabels; }

    window.reset = function() { clearGlass(); };

    draw();
    </script>
</body>
</html>
