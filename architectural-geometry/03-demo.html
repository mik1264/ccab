<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaudi Catenary Arches</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1815; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center;
            background: rgba(30,28,22,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(138,154,91,0.3);
            z-index: 100;
        }
        .controls label { color: #FEFAE0; font-size: 0.85rem; }
        .controls input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        .controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        .controls button:hover { background: #8A9A5B; }
        .info {
            position: fixed; top: 50px; right: 20px;
            background: rgba(30,28,22,0.9); backdrop-filter: blur(10px);
            padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(138,154,91,0.3);
            color: #FEFAE0; font-size: 0.8rem; max-width: 220px; line-height: 1.5; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Chains: <input type="range" id="chains" min="1" max="8" value="3"></label>
        <label>Gravity: <input type="range" id="gravity" min="10" max="200" value="80"></label>
        <label>Weight: <input type="range" id="weight" min="1" max="30" value="10"></label>
        <button id="toggleFlip">Flip (Show Arch)</button>
        <button id="toggleWeights">Toggle Weights</button>
    </div>
    <div class="info">
        <h3>Gaudi Catenary Arches</h3>
        Gaudi designed by hanging weighted chains upside-down. A catenary curve, when inverted, forms the ideal compressive arch. Drag anchor points to reshape the chains. Toggle to see the inverted arch form.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            initChains();
        }

        const sage = '#8A9A5B';
        const moss = '#606C38';
        const earth = '#DDA15E';
        const cream = '#FEFAE0';

        let flipped = false;
        let showWeights = true;
        let chains = [];
        let dragging = null;

        class ChainNode {
            constructor(x, y, fixed) {
                this.x = x; this.y = y;
                this.px = x; this.py = y;
                this.fixed = fixed;
            }
        }

        function initChains() {
            const numChains = parseInt(document.getElementById('chains').value);
            chains = [];
            const segCount = 20;
            const spacing = W / (numChains + 1);

            for (let c = 0; c < numChains; c++) {
                const chain = [];
                const startX = spacing * (c + 0.5);
                const endX = startX + spacing;
                const y = H * 0.25;

                for (let i = 0; i <= segCount; i++) {
                    const t = i / segCount;
                    const x = startX + (endX - startX) * t;
                    const sag = Math.sin(t * Math.PI) * 80;
                    const fixed = i === 0 || i === segCount;
                    chain.push(new ChainNode(x, y + sag, fixed));
                }
                chains.push(chain);
            }
        }

        function simulate() {
            const grav = parseInt(document.getElementById('gravity').value) * 0.01;
            const weightVal = parseInt(document.getElementById('weight').value);

            for (const chain of chains) {
                for (const node of chain) {
                    if (node.fixed) continue;
                    const vx = (node.x - node.px) * 0.99;
                    const vy = (node.y - node.py) * 0.99;
                    node.px = node.x;
                    node.py = node.y;
                    node.x += vx;
                    node.y += vy + grav;
                }

                const segLen = 15;
                for (let iter = 0; iter < 10; iter++) {
                    for (let i = 0; i < chain.length - 1; i++) {
                        const a = chain[i];
                        const b = chain[i + 1];
                        const dx = b.x - a.x;
                        const dy = b.y - a.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 0.001) continue;
                        const diff = (segLen - dist) / dist * 0.5;
                        const ox = dx * diff;
                        const oy = dy * diff;
                        if (!a.fixed) { a.x -= ox; a.y -= oy; }
                        if (!b.fixed) { b.x += ox; b.y += oy; }
                    }
                }

                for (const node of chain) {
                    if (node.y > H - 20) node.y = H - 20;
                    if (node.x < 10) node.x = 10;
                    if (node.x > W - 10) node.x = W - 10;
                }
            }
        }

        function draw() {
            simulate();
            ctx.clearRect(0, 0, W, H);

            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#1a1815');
            grad.addColorStop(1, '#252018');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            const mirrorY = H * 0.5;

            if (flipped) {
                ctx.save();
                ctx.globalAlpha = 0.15;
                drawChains(false, 0);
                ctx.restore();

                drawChains(true, mirrorY);

                ctx.fillStyle = `rgba(221,161,94,0.08)`;
                for (const chain of chains) {
                    ctx.beginPath();
                    for (let i = 0; i < chain.length; i++) {
                        const ny = mirrorY - (chain[i].y - mirrorY);
                        if (i === 0) ctx.moveTo(chain[i].x, ny);
                        else ctx.lineTo(chain[i].x, ny);
                    }
                    ctx.lineTo(chain[chain.length - 1].x, mirrorY);
                    ctx.lineTo(chain[0].x, mirrorY);
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = `rgba(254,250,224,0.2)`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, mirrorY);
                ctx.lineTo(W, mirrorY);
                ctx.stroke();
                ctx.setLineDash([]);
            } else {
                drawChains(false, 0);
            }

            requestAnimationFrame(draw);
        }

        function drawChains(invert, mirrorY) {
            const weightVal = parseInt(document.getElementById('weight').value);

            for (const chain of chains) {
                ctx.beginPath();
                for (let i = 0; i < chain.length; i++) {
                    let y = chain[i].y;
                    if (invert) y = mirrorY - (y - mirrorY);
                    if (i === 0) ctx.moveTo(chain[i].x, y);
                    else ctx.lineTo(chain[i].x, y);
                }
                ctx.strokeStyle = invert ? earth : cream;
                ctx.lineWidth = invert ? 4 : 2.5;
                ctx.stroke();

                if (invert) {
                    ctx.beginPath();
                    for (let i = 0; i < chain.length; i++) {
                        let y = mirrorY - (chain[i].y - mirrorY);
                        if (i === 0) ctx.moveTo(chain[i].x, y);
                        else ctx.lineTo(chain[i].x, y);
                    }
                    ctx.strokeStyle = `rgba(138,154,91,0.5)`;
                    ctx.lineWidth = 8;
                    ctx.stroke();
                }

                for (let i = 0; i < chain.length; i++) {
                    let y = chain[i].y;
                    if (invert) y = mirrorY - (y - mirrorY);

                    if (chain[i].fixed) {
                        ctx.beginPath();
                        ctx.arc(chain[i].x, y, 6, 0, Math.PI * 2);
                        ctx.fillStyle = sage;
                        ctx.fill();
                        ctx.strokeStyle = cream;
                        ctx.lineWidth = 2;
                        ctx.stroke();

                        if (!invert) {
                            ctx.beginPath();
                            ctx.moveTo(chain[i].x - 10, y - 8);
                            ctx.lineTo(chain[i].x + 10, y - 8);
                            ctx.lineTo(chain[i].x + 12, y - 12);
                            ctx.lineTo(chain[i].x - 12, y - 12);
                            ctx.closePath();
                            ctx.fillStyle = '#8B7D6B';
                            ctx.fill();
                        }
                    } else if (showWeights && !invert && i % 3 === 0) {
                        const wSize = weightVal * 0.5 + 3;
                        ctx.fillStyle = earth;
                        ctx.fillRect(chain[i].x - wSize / 2, y, wSize, wSize * 1.2);
                        ctx.strokeStyle = `rgba(188,108,37,0.6)`;
                        ctx.lineWidth = 1;
                        ctx.strokeRect(chain[i].x - wSize / 2, y, wSize, wSize * 1.2);
                    }
                }
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            for (const chain of chains) {
                for (const node of chain) {
                    if (node.fixed) {
                        const dx = e.clientX - node.x;
                        const dy = e.clientY - node.y;
                        if (dx * dx + dy * dy < 400) {
                            dragging = node;
                            return;
                        }
                    }
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (dragging) {
                dragging.x = dragging.px = e.clientX;
                dragging.y = dragging.py = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', () => { dragging = null; });
        canvas.addEventListener('mouseleave', () => { dragging = null; });

        document.getElementById('toggleFlip').addEventListener('click', () => {
            flipped = !flipped;
            document.getElementById('toggleFlip').textContent = flipped ? 'Show Chains' : 'Flip (Show Arch)';
        });

        document.getElementById('toggleWeights').addEventListener('click', () => {
            showWeights = !showWeights;
        });

        document.getElementById('chains').addEventListener('input', initChains);

        window.addEventListener('resize', resize);
        resize();

        window.reset = function() {
            flipped = false;
            showWeights = true;
            document.getElementById('chains').value = 3;
            document.getElementById('gravity').value = 80;
            document.getElementById('weight').value = 10;
            document.getElementById('toggleFlip').textContent = 'Flip (Show Arch)';
            initChains();
        };

        draw();
    </script>
</body>
</html>
