<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperbolic Paraboloid Shell</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #151820; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center;
            background: rgba(20,24,32,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(138,154,91,0.3);
            z-index: 100;
        }
        .controls label { color: #FEFAE0; font-size: 0.85rem; }
        .controls input[type="range"] { width: 90px; accent-color: #8A9A5B; }
        .controls select {
            background: #1a1e28; color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 4px 8px; border-radius: 6px; font-size: 0.8rem;
        }
        .info {
            position: fixed; top: 50px; right: 20px;
            background: rgba(20,24,32,0.9); backdrop-filter: blur(10px);
            padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(138,154,91,0.3);
            color: #FEFAE0; font-size: 0.8rem; max-width: 220px; line-height: 1.5; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Curvature: <input type="range" id="curvature" min="10" max="200" value="80"></label>
        <label>Resolution: <input type="range" id="resolution" min="8" max="40" value="20"></label>
        <label>Spin: <input type="range" id="spin" min="0" max="100" value="20"></label>
        <label>View:
            <select id="viewMode">
                <option value="surface">Surface</option>
                <option value="ruled">Ruled Lines</option>
                <option value="contour">Contours</option>
                <option value="wireframe">Wireframe</option>
            </select>
        </label>
    </div>
    <div class="info">
        <h3>Hyperbolic Paraboloid</h3>
        A saddle-shaped surface (z = x^2 - y^2) used in modernist roofs. It is doubly-ruled: every point lies on two straight lines across the surface, making it buildable from straight beams.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const sage = '#8A9A5B';
        const moss = '#606C38';
        const earth = '#DDA15E';
        const cream = '#FEFAE0';

        let rotX = 0.6, rotY = 0;
        let mouseDown = false, lastMX = 0, lastMY = 0;

        function project(x, y, z) {
            const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
            const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
            let nx = x * cosY - z * sinY;
            let nz = x * sinY + z * cosY;
            let ny = y * cosX - nz * sinX;
            nz = y * sinX + nz * cosX;
            const scale = Math.min(W, H) * 0.3;
            const perspective = 800 / (800 + nz * scale);
            return {
                x: W / 2 + nx * scale * perspective,
                y: H / 2 + ny * scale * perspective,
                z: nz
            };
        }

        function hypar(u, v, curv) {
            const c = curv * 0.01;
            return {
                x: u,
                y: (u * u - v * v) * c,
                z: v
            };
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.6);
            grad.addColorStop(0, '#1e2230');
            grad.addColorStop(1, '#151820');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            const curv = parseInt(document.getElementById('curvature').value);
            const res = parseInt(document.getElementById('resolution').value);
            const spinVal = parseInt(document.getElementById('spin').value) * 0.0002;
            const viewMode = document.getElementById('viewMode').value;

            if (!mouseDown) rotY += spinVal;

            const range = 1.2;
            const step = (range * 2) / res;

            if (viewMode === 'surface' || viewMode === 'wireframe') {
                const quads = [];
                for (let i = 0; i < res; i++) {
                    for (let j = 0; j < res; j++) {
                        const u0 = -range + i * step;
                        const v0 = -range + j * step;
                        const u1 = u0 + step;
                        const v1 = v0 + step;

                        const p00 = hypar(u0, v0, curv);
                        const p10 = hypar(u1, v0, curv);
                        const p11 = hypar(u1, v1, curv);
                        const p01 = hypar(u0, v1, curv);

                        const pp00 = project(p00.x, p00.y, p00.z);
                        const pp10 = project(p10.x, p10.y, p10.z);
                        const pp11 = project(p11.x, p11.y, p11.z);
                        const pp01 = project(p01.x, p01.y, p01.z);

                        const avgZ = (pp00.z + pp10.z + pp11.z + pp01.z) / 4;
                        quads.push({ pts: [pp00, pp10, pp11, pp01], z: avgZ, h: p00.y });
                    }
                }

                quads.sort((a, b) => a.z - b.z);

                for (const q of quads) {
                    ctx.beginPath();
                    ctx.moveTo(q.pts[0].x, q.pts[0].y);
                    ctx.lineTo(q.pts[1].x, q.pts[1].y);
                    ctx.lineTo(q.pts[2].x, q.pts[2].y);
                    ctx.lineTo(q.pts[3].x, q.pts[3].y);
                    ctx.closePath();

                    if (viewMode === 'surface') {
                        const light = Math.max(0.15, Math.min(1, 0.5 - q.z * 0.4));
                        const hNorm = (q.h + 2) / 4;
                        const r = Math.floor(96 + hNorm * 40);
                        const g = Math.floor(108 + hNorm * 20);
                        const b = Math.floor(56 + hNorm * 30);
                        ctx.fillStyle = `rgba(${Math.floor(r * light)},${Math.floor(g * light)},${Math.floor(b * light)},0.9)`;
                        ctx.fill();
                    }

                    ctx.strokeStyle = viewMode === 'wireframe' ?
                        `rgba(138,154,91,0.6)` : `rgba(254,250,224,0.1)`;
                    ctx.lineWidth = viewMode === 'wireframe' ? 1 : 0.5;
                    ctx.stroke();
                }
            } else if (viewMode === 'ruled') {
                ctx.lineWidth = 1.2;
                const numLines = res;
                for (let i = 0; i <= numLines; i++) {
                    const t = -range + (i / numLines) * range * 2;

                    ctx.beginPath();
                    let first = true;
                    for (let j = 0; j <= 40; j++) {
                        const s = -range + (j / 40) * range * 2;
                        const p = hypar(t, s, curv);
                        const pp = project(p.x, p.y, p.z);
                        if (first) { ctx.moveTo(pp.x, pp.y); first = false; }
                        else ctx.lineTo(pp.x, pp.y);
                    }
                    ctx.strokeStyle = `rgba(221,161,94,0.7)`;
                    ctx.stroke();

                    ctx.beginPath();
                    first = true;
                    for (let j = 0; j <= 40; j++) {
                        const s = -range + (j / 40) * range * 2;
                        const p = hypar(s, t, curv);
                        const pp = project(p.x, p.y, p.z);
                        if (first) { ctx.moveTo(pp.x, pp.y); first = false; }
                        else ctx.lineTo(pp.x, pp.y);
                    }
                    ctx.strokeStyle = `rgba(138,154,91,0.7)`;
                    ctx.stroke();
                }
            } else if (viewMode === 'contour') {
                const levels = 12;
                const maxH = curv * 0.01 * range * range;
                for (let lev = 0; lev < levels; lev++) {
                    const h = -maxH + (lev / (levels - 1)) * maxH * 2;
                    const pts = [];
                    for (let a = 0; a < 200; a++) {
                        const angle = (a / 200) * Math.PI * 2;
                        for (let r = 0; r < range; r += 0.02) {
                            const u = r * Math.cos(angle);
                            const v = r * Math.sin(angle);
                            const p = hypar(u, v, curv);
                            if (Math.abs(p.y - h) < 0.03) {
                                const pp = project(p.x, p.y, p.z);
                                pts.push(pp);
                            }
                        }
                    }
                    if (pts.length > 2) {
                        const t = lev / levels;
                        ctx.fillStyle = `rgba(${Math.floor(138 + t * 80)},${Math.floor(154 - t * 50)},${Math.floor(91 + t * 60)},0.6)`;
                        for (const p of pts) {
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
            }

            ctx.save();
            ctx.globalAlpha = 0.3;
            const axisLen = 1.5;
            const axes = [
                { from: [0, 0, 0], to: [axisLen, 0, 0], color: '#ff6666', label: 'X' },
                { from: [0, 0, 0], to: [0, axisLen, 0], color: '#66ff66', label: 'Y' },
                { from: [0, 0, 0], to: [0, 0, axisLen], color: '#6666ff', label: 'Z' }
            ];
            for (const ax of axes) {
                const pf = project(...ax.from);
                const pt = project(...ax.to);
                ctx.beginPath();
                ctx.moveTo(pf.x, pf.y);
                ctx.lineTo(pt.x, pt.y);
                ctx.strokeStyle = ax.color;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            ctx.restore();

            ctx.fillStyle = earth;
            ctx.font = '16px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Hyperbolic Paraboloid  z = x\u00B2 \u2212 y\u00B2', W / 2, 40);

            requestAnimationFrame(draw);
        }

        canvas.addEventListener('mousedown', (e) => { mouseDown = true; lastMX = e.clientX; lastMY = e.clientY; });
        canvas.addEventListener('mousemove', (e) => {
            if (mouseDown) {
                rotY += (e.clientX - lastMX) * 0.005;
                rotX += (e.clientY - lastMY) * 0.005;
                lastMX = e.clientX; lastMY = e.clientY;
            }
        });
        canvas.addEventListener('mouseup', () => { mouseDown = false; });
        canvas.addEventListener('mouseleave', () => { mouseDown = false; });

        window.reset = function() {
            rotX = 0.6; rotY = 0;
            document.getElementById('curvature').value = 80;
            document.getElementById('resolution').value = 20;
            document.getElementById('spin').value = 20;
            document.getElementById('viewMode').value = 'surface';
        };

        draw();
    </script>
</body>
</html>
