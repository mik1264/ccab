<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voronoi Facade Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #151820; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center;
            background: rgba(20,24,32,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(138,154,91,0.3);
            z-index: 100;
        }
        .controls label { color: #FEFAE0; font-size: 0.85rem; }
        .controls input[type="range"] { width: 90px; accent-color: #8A9A5B; }
        .controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        .controls button:hover { background: #8A9A5B; }
        .info {
            position: fixed; top: 50px; right: 20px;
            background: rgba(20,24,32,0.9); backdrop-filter: blur(10px);
            padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(138,154,91,0.3);
            color: #FEFAE0; font-size: 0.8rem; max-width: 220px; line-height: 1.5; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Seeds: <input type="range" id="seeds" min="5" max="80" value="30"></label>
        <label>Depth: <input type="range" id="depth" min="1" max="20" value="8"></label>
        <label>Movement: <input type="range" id="movement" min="0" max="100" value="30"></label>
        <button id="randomize">Randomize</button>
    </div>
    <div class="info">
        <h3>Voronoi Facade Generator</h3>
        Voronoi diagrams partition space into cells closest to each seed point. This organic pattern is used in modern architectural facades like the Beijing Water Cube. Click to add seed points.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const sage = '#8A9A5B';
        const moss = '#606C38';
        const earth = '#DDA15E';
        const cream = '#FEFAE0';

        let seeds = [];
        let seedVelocities = [];

        function initSeeds() {
            const n = parseInt(document.getElementById('seeds').value);
            seeds = [];
            seedVelocities = [];
            for (let i = 0; i < n; i++) {
                seeds.push({ x: Math.random() * W, y: Math.random() * H });
                seedVelocities.push({
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2
                });
            }
        }

        function closestSeed(px, py) {
            let minD = Infinity, idx = 0;
            for (let i = 0; i < seeds.length; i++) {
                const dx = px - seeds[i].x;
                const dy = py - seeds[i].y;
                const d = dx * dx + dy * dy;
                if (d < minD) { minD = d; idx = i; }
            }
            return idx;
        }

        function getEdgePixels(imageData) {
            const edges = [];
            const w = imageData.width;
            const h = imageData.height;
            const data = imageData.data;

            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const idx = (y * w + x) * 4;
                    const c = data[idx];
                    const r = data[((y) * w + x + 1) * 4];
                    const b = data[((y + 1) * w + x) * 4];
                    if (c !== r || c !== b) {
                        edges.push([x, y]);
                    }
                }
            }
            return edges;
        }

        function draw() {
            const movement = parseInt(document.getElementById('movement').value) * 0.01;
            const depth = parseInt(document.getElementById('depth').value);

            for (let i = 0; i < seeds.length; i++) {
                seeds[i].x += seedVelocities[i].vx * movement;
                seeds[i].y += seedVelocities[i].vy * movement;
                if (seeds[i].x < 0 || seeds[i].x > W) seedVelocities[i].vx *= -1;
                if (seeds[i].y < 0 || seeds[i].y > H) seedVelocities[i].vy *= -1;
                seeds[i].x = Math.max(0, Math.min(W, seeds[i].x));
                seeds[i].y = Math.max(0, Math.min(H, seeds[i].y));
            }

            const step = 4;
            const offscreen = document.createElement('canvas');
            offscreen.width = Math.ceil(W / step);
            offscreen.height = Math.ceil(H / step);
            const octx = offscreen.getContext('2d');

            const colors = seeds.map((_, i) => {
                const hue = (i * 137.5) % 360;
                return `hsl(${hue}, 30%, 25%)`;
            });

            for (let y = 0; y < offscreen.height; y++) {
                for (let x = 0; x < offscreen.width; x++) {
                    const px = x * step;
                    const py = y * step;
                    const idx = closestSeed(px, py);
                    octx.fillStyle = colors[idx];
                    octx.fillRect(x, y, 1, 1);
                }
            }

            ctx.clearRect(0, 0, W, H);

            const grad = ctx.createLinearGradient(0, 0, W, H);
            grad.addColorStop(0, '#1a1e28');
            grad.addColorStop(1, '#151820');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            const facadeX = W * 0.1;
            const facadeY = H * 0.08;
            const facadeW = W * 0.8;
            const facadeH = H * 0.78;

            ctx.save();
            ctx.beginPath();
            ctx.roundRect(facadeX, facadeY, facadeW, facadeH, 8);
            ctx.clip();

            for (let y = 0; y < Math.ceil(facadeH / step); y++) {
                for (let x = 0; x < Math.ceil(facadeW / step); x++) {
                    const px = facadeX + x * step;
                    const py = facadeY + y * step;
                    const idx = closestSeed(px, py);
                    const dx = px - seeds[idx].x;
                    const dy = py - seeds[idx].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const maxDist = 200;
                    const t = Math.min(1, dist / maxDist);

                    const depthFactor = depth * 0.05;
                    const shade = 0.12 + t * depthFactor;
                    const hue = (idx * 37) % 60 + 30;

                    ctx.fillStyle = `hsla(${hue}, 25%, ${shade * 100}%, 0.9)`;
                    ctx.fillRect(px, py, step, step);
                }
            }

            ctx.strokeStyle = `rgba(138,154,91,0.5)`;
            ctx.lineWidth = 1.5;
            for (let y = 1; y < Math.ceil(facadeH / step) - 1; y++) {
                for (let x = 1; x < Math.ceil(facadeW / step) - 1; x++) {
                    const px = facadeX + x * step;
                    const py = facadeY + y * step;
                    const c = closestSeed(px, py);
                    const r = closestSeed(px + step, py);
                    const b = closestSeed(px, py + step);
                    if (c !== r) {
                        ctx.beginPath();
                        ctx.moveTo(px + step, py);
                        ctx.lineTo(px + step, py + step);
                        ctx.stroke();
                    }
                    if (c !== b) {
                        ctx.beginPath();
                        ctx.moveTo(px, py + step);
                        ctx.lineTo(px + step, py + step);
                        ctx.stroke();
                    }
                }
            }

            ctx.restore();

            ctx.strokeStyle = `rgba(221,161,94,0.6)`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(facadeX, facadeY, facadeW, facadeH, 8);
            ctx.stroke();

            for (const s of seeds) {
                if (s.x >= facadeX && s.x <= facadeX + facadeW &&
                    s.y >= facadeY && s.y <= facadeY + facadeH) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = earth;
                    ctx.fill();
                    ctx.strokeStyle = cream;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }

            ctx.fillStyle = `rgba(254,250,224,0.4)`;
            ctx.font = '11px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText(`${seeds.length} seed points`, W / 2, facadeY + facadeH + 25);

            requestAnimationFrame(draw);
        }

        canvas.addEventListener('click', (e) => {
            seeds.push({ x: e.clientX, y: e.clientY });
            seedVelocities.push({
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2
            });
        });

        document.getElementById('seeds').addEventListener('input', initSeeds);
        document.getElementById('randomize').addEventListener('click', initSeeds);

        window.reset = function() {
            document.getElementById('seeds').value = 30;
            document.getElementById('depth').value = 8;
            document.getElementById('movement').value = 30;
            initSeeds();
        };

        initSeeds();
        draw();
    </script>
</body>
</html>
