<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geodesic Dome Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #151820; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center;
            background: rgba(20,24,32,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(138,154,91,0.3);
            z-index: 100;
        }
        .controls label { color: #FEFAE0; font-size: 0.85rem; }
        .controls input[type="range"] { width: 90px; accent-color: #8A9A5B; }
        .controls select {
            background: #1a1e28; color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 4px 8px; border-radius: 6px; font-size: 0.8rem;
        }
        .info {
            position: fixed; top: 50px; right: 20px;
            background: rgba(20,24,32,0.9); backdrop-filter: blur(10px);
            padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(138,154,91,0.3);
            color: #FEFAE0; font-size: 0.8rem; max-width: 220px; line-height: 1.5; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Frequency:
            <select id="freq">
                <option value="1">1V</option>
                <option value="2" selected>2V</option>
                <option value="3">3V</option>
                <option value="4">4V</option>
            </select>
        </label>
        <label>Dome Cut: <input type="range" id="domeCut" min="0" max="100" value="50"></label>
        <label>Spin: <input type="range" id="spin" min="0" max="100" value="20"></label>
        <label>Style:
            <select id="style">
                <option value="wireframe">Wireframe</option>
                <option value="solid">Solid Panels</option>
                <option value="dual">Dual (Hexagonal)</option>
            </select>
        </label>
    </div>
    <div class="info">
        <h3>Geodesic Dome Builder</h3>
        Explore geodesic domes at different frequencies. Higher frequency means more triangles subdividing each face. Adjust the dome cut to see half-domes, and switch between wireframe, solid, and dual views.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const sage = '#8A9A5B';
        const moss = '#606C38';
        const earth = '#DDA15E';
        const cream = '#FEFAE0';

        let rotX = 0.4, rotY = 0;
        let mouseDown = false, lastMX = 0, lastMY = 0;
        let vertices = [], faces = [];

        function normalize(v) {
            const len = Math.sqrt(v[0] * v[0] + v[1] * v[1] + v[2] * v[2]);
            return [v[0] / len, v[1] / len, v[2] / len];
        }

        function midpoint(a, b) {
            return normalize([(a[0] + b[0]) / 2, (a[1] + b[1]) / 2, (a[2] + b[2]) / 2]);
        }

        function buildIcosahedron() {
            const phi = (1 + Math.sqrt(5)) / 2;
            const verts = [
                [-1, phi, 0], [1, phi, 0], [-1, -phi, 0], [1, -phi, 0],
                [0, -1, phi], [0, 1, phi], [0, -1, -phi], [0, 1, -phi],
                [phi, 0, -1], [phi, 0, 1], [-phi, 0, -1], [-phi, 0, 1]
            ].map(normalize);

            const tris = [
                [0, 11, 5], [0, 5, 1], [0, 1, 7], [0, 7, 10], [0, 10, 11],
                [1, 5, 9], [5, 11, 4], [11, 10, 2], [10, 7, 6], [7, 1, 8],
                [3, 9, 4], [3, 4, 2], [3, 2, 6], [3, 6, 8], [3, 8, 9],
                [4, 9, 5], [2, 4, 11], [6, 2, 10], [8, 6, 7], [9, 8, 1]
            ];

            return { verts, tris };
        }

        function subdivide(verts, tris, freq) {
            let v = [...verts];
            let t = [...tris];

            for (let s = 0; s < freq; s++) {
                const newTris = [];
                const edgeMap = {};

                function getMid(i, j) {
                    const key = Math.min(i, j) + '_' + Math.max(i, j);
                    if (edgeMap[key] !== undefined) return edgeMap[key];
                    const m = midpoint(v[i], v[j]);
                    v.push(m);
                    edgeMap[key] = v.length - 1;
                    return v.length - 1;
                }

                for (const [a, b, c] of t) {
                    const ab = getMid(a, b);
                    const bc = getMid(b, c);
                    const ca = getMid(c, a);
                    newTris.push([a, ab, ca]);
                    newTris.push([b, bc, ab]);
                    newTris.push([c, ca, bc]);
                    newTris.push([ab, bc, ca]);
                }
                t = newTris;
            }
            return { verts: v, tris: t };
        }

        function buildDome() {
            const freq = parseInt(document.getElementById('freq').value);
            const ico = buildIcosahedron();
            const sub = subdivide(ico.verts, ico.tris, freq);
            vertices = sub.verts;
            faces = sub.tris;
        }

        function project(v) {
            const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
            const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
            let x = v[0] * cosY - v[2] * sinY;
            let z = v[0] * sinY + v[2] * cosY;
            let y = v[1] * cosX - z * sinX;
            z = v[1] * sinX + z * cosX;
            const r = Math.min(W, H) * 0.32;
            const perspective = 800 / (800 + z * r);
            return { x: W / 2 + x * r * perspective, y: H / 2 + y * r * perspective, z: z, s: perspective };
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.6);
            grad.addColorStop(0, '#1e2230');
            grad.addColorStop(1, '#151820');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            const spinVal = parseInt(document.getElementById('spin').value) * 0.0002;
            const domeCut = parseInt(document.getElementById('domeCut').value) / 100;
            const style = document.getElementById('style').value;

            if (!mouseDown) rotY += spinVal;

            const cutY = 1 - domeCut * 2;
            const projected = vertices.map(v => project(v));

            const visibleFaces = faces.filter(([a, b, c]) => {
                const avgY = (vertices[a][1] + vertices[b][1] + vertices[c][1]) / 3;
                return avgY >= cutY;
            });

            const sorted = visibleFaces.map(([a, b, c]) => {
                const avgZ = (projected[a].z + projected[b].z + projected[c].z) / 3;
                return { face: [a, b, c], z: avgZ };
            }).sort((a, b) => a.z - b.z);

            for (const { face } of sorted) {
                const [a, b, c] = face;
                const pa = projected[a], pb = projected[b], pc = projected[c];

                const nx = (pb.y - pa.y) * (pc.x - pa.x) - (pb.x - pa.x) * (pc.y - pa.y);
                const avgZ = (projected[a].z + projected[b].z + projected[c].z) / 3;
                const light = Math.max(0.2, Math.min(1, 0.5 - avgZ * 0.5));

                ctx.beginPath();
                ctx.moveTo(pa.x, pa.y);
                ctx.lineTo(pb.x, pb.y);
                ctx.lineTo(pc.x, pc.y);
                ctx.closePath();

                if (style === 'solid') {
                    const r = Math.floor(96 * light + 42);
                    const g = Math.floor(108 * light + 20);
                    const b2 = Math.floor(56 * light + 10);
                    ctx.fillStyle = `rgba(${r},${g},${b2},0.85)`;
                    ctx.fill();
                    ctx.strokeStyle = `rgba(254,250,224,0.15)`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                } else if (style === 'dual') {
                    ctx.fillStyle = `rgba(138,154,91,${light * 0.2})`;
                    ctx.fill();
                    const cx = (pa.x + pb.x + pc.x) / 3;
                    const cy = (pa.y + pb.y + pc.y) / 3;
                    ctx.beginPath();
                    ctx.moveTo((pa.x + pb.x) / 2, (pa.y + pb.y) / 2);
                    ctx.lineTo(cx, cy);
                    ctx.lineTo((pb.x + pc.x) / 2, (pb.y + pc.y) / 2);
                    ctx.moveTo(cx, cy);
                    ctx.lineTo((pc.x + pa.x) / 2, (pc.y + pa.y) / 2);
                    ctx.strokeStyle = `rgba(221,161,94,${light * 0.7})`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                } else {
                    ctx.strokeStyle = `rgba(138,154,91,${light * 0.8})`;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                }
            }

            if (style === 'wireframe') {
                for (let i = 0; i < projected.length; i++) {
                    if (vertices[i][1] < cutY) continue;
                    const p = projected[i];
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2 * p.s, 0, Math.PI * 2);
                    ctx.fillStyle = earth;
                    ctx.fill();
                }
            }

            const freq = document.getElementById('freq').value;
            ctx.fillStyle = earth;
            ctx.font = '16px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText(`${freq}V Geodesic Dome`, W / 2, 40);
            ctx.fillStyle = `rgba(254,250,224,0.5)`;
            ctx.font = '12px Georgia';
            ctx.fillText(`Vertices: ${vertices.length}  |  Faces: ${faces.length}  |  Visible: ${visibleFaces.length}`, W / 2, 60);

            requestAnimationFrame(draw);
        }

        canvas.addEventListener('mousedown', (e) => { mouseDown = true; lastMX = e.clientX; lastMY = e.clientY; });
        canvas.addEventListener('mousemove', (e) => {
            if (mouseDown) {
                rotY += (e.clientX - lastMX) * 0.005;
                rotX += (e.clientY - lastMY) * 0.005;
                lastMX = e.clientX; lastMY = e.clientY;
            }
        });
        canvas.addEventListener('mouseup', () => { mouseDown = false; });
        canvas.addEventListener('mouseleave', () => { mouseDown = false; });

        document.getElementById('freq').addEventListener('change', buildDome);

        window.reset = function() {
            rotX = 0.4; rotY = 0;
            document.getElementById('freq').value = '2';
            document.getElementById('domeCut').value = 50;
            document.getElementById('spin').value = 20;
            document.getElementById('style').value = 'wireframe';
            buildDome();
        };

        buildDome();
        draw();
    </script>
</body>
</html>
