<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci in Architecture</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1815; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center;
            background: rgba(30,28,22,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(138,154,91,0.3);
            z-index: 100;
        }
        .controls label { color: #FEFAE0; font-size: 0.85rem; }
        .controls input[type="range"] { width: 90px; accent-color: #8A9A5B; }
        .controls select {
            background: #2a2518; color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 4px 8px; border-radius: 6px; font-size: 0.8rem;
        }
        .controls input[type="checkbox"] { accent-color: #8A9A5B; }
        .info {
            position: fixed; top: 50px; right: 20px;
            background: rgba(30,28,22,0.9); backdrop-filter: blur(10px);
            padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(138,154,91,0.3);
            color: #FEFAE0; font-size: 0.8rem; max-width: 220px; line-height: 1.5; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>View:
            <select id="viewMode">
                <option value="facade">Facade Proportions</option>
                <option value="spiral">Golden Spiral</option>
                <option value="grid">Fibonacci Grid</option>
                <option value="floorplan">Floor Plan</option>
            </select>
        </label>
        <label>Depth: <input type="range" id="depth" min="3" max="12" value="8"></label>
        <label>Overlay: <input type="checkbox" id="showOverlay" checked></label>
        <label>Animate: <input type="checkbox" id="animate" checked></label>
    </div>
    <div class="info">
        <h3>Fibonacci in Architecture</h3>
        The golden ratio (1.618...) and Fibonacci sequence appear throughout architecture, from the Parthenon to Le Corbusier's Modulor. See how these proportions create visual harmony in facades, spirals, and floor plans.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const sage = '#8A9A5B';
        const moss = '#606C38';
        const earth = '#DDA15E';
        const cream = '#FEFAE0';
        const PHI = (1 + Math.sqrt(5)) / 2;

        let time = 0;

        function fibonacci(n) {
            const seq = [1, 1];
            for (let i = 2; i < n; i++) seq.push(seq[i - 1] + seq[i - 2]);
            return seq;
        }

        function drawFacade() {
            const depth = parseInt(document.getElementById('depth').value);
            const showOverlay = document.getElementById('showOverlay').checked;
            const animated = document.getElementById('animate').checked;

            const facadeW = W * 0.5;
            const facadeH = facadeW * PHI;
            const fx = (W - facadeW) / 2;
            const fy = (H - facadeH) / 2;

            ctx.fillStyle = `rgba(200,184,154,0.15)`;
            ctx.fillRect(fx, fy, facadeW, facadeH);
            ctx.strokeStyle = earth;
            ctx.lineWidth = 2;
            ctx.strokeRect(fx, fy, facadeW, facadeH);

            const pillarW = facadeW * 0.06;
            const numPillars = 6;
            const spacing = facadeW / (numPillars + 1);
            for (let i = 1; i <= numPillars; i++) {
                const px = fx + spacing * i - pillarW / 2;
                ctx.fillStyle = `rgba(168,152,128,0.4)`;
                ctx.fillRect(px, fy + facadeH * 0.15, pillarW, facadeH * 0.75);

                ctx.fillStyle = `rgba(200,184,154,0.5)`;
                ctx.fillRect(px - 3, fy + facadeH * 0.13, pillarW + 6, 8);
                ctx.fillRect(px - 3, fy + facadeH * 0.88, pillarW + 6, 8);
            }

            ctx.beginPath();
            const peakX = fx + facadeW / 2;
            const peakY = fy - facadeH * 0.15;
            ctx.moveTo(fx, fy);
            ctx.lineTo(peakX, peakY);
            ctx.lineTo(fx + facadeW, fy);
            ctx.strokeStyle = earth;
            ctx.lineWidth = 2;
            ctx.stroke();

            if (showOverlay) {
                const revealT = animated ? Math.min(1, time * 0.3) : 1;

                ctx.save();
                ctx.globalAlpha = 0.6 * revealT;
                ctx.setLineDash([5, 5]);

                ctx.strokeStyle = '#ff6644';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(fx, fy, facadeW, facadeW);

                ctx.strokeStyle = sage;
                const subW = facadeW / PHI;
                ctx.strokeRect(fx, fy, subW, subW);

                ctx.strokeStyle = '#6688ff';
                const subW2 = subW / PHI;
                ctx.strokeRect(fx + subW, fy, facadeW - subW, subW2);

                ctx.setLineDash([]);
                ctx.restore();

                ctx.fillStyle = `rgba(254,250,224,0.5)`;
                ctx.font = '11px Georgia';
                ctx.textAlign = 'left';
                ctx.fillText(`Width : Height = 1 : ${PHI.toFixed(3)}`, fx, fy + facadeH + 20);
                ctx.fillText(`\u03C6 = (1 + \u221A5) / 2 = ${PHI.toFixed(6)}...`, fx, fy + facadeH + 36);
            }
        }

        function drawSpiral() {
            const depth = parseInt(document.getElementById('depth').value);
            const animated = document.getElementById('animate').checked;
            const showOverlay = document.getElementById('showOverlay').checked;

            const fib = fibonacci(depth);
            const maxFib = fib[fib.length - 1];
            const unitSize = Math.min(W, H) * 0.6 / maxFib;

            let x = W / 2, y = H / 2;
            const dirs = [
                { dx: 1, dy: 0 },
                { dx: 0, dy: 1 },
                { dx: -1, dy: 0 },
                { dx: 0, dy: -1 }
            ];

            const revealCount = animated ? Math.floor(time * 2) : depth;
            const colors = [
                'rgba(138,154,91,0.25)',
                'rgba(221,161,94,0.20)',
                'rgba(96,108,56,0.25)',
                'rgba(188,108,37,0.20)'
            ];

            for (let i = 0; i < Math.min(depth, revealCount); i++) {
                const size = fib[i] * unitSize;
                const dir = dirs[i % 4];

                ctx.fillStyle = colors[i % 4];
                ctx.strokeStyle = earth;
                ctx.lineWidth = 1.5;

                let rx = x, ry = y;
                if (dir.dx === 1) { rx = x; ry = y - size; }
                else if (dir.dy === 1) { rx = x; ry = y; }
                else if (dir.dx === -1) { rx = x - size; ry = y; }
                else { rx = x - size; ry = y - size; }

                if (i > 0) {
                    ctx.fillRect(rx, ry, size, size);
                    ctx.strokeRect(rx, ry, size, size);
                } else {
                    ctx.fillRect(x, y - size, size, size);
                    ctx.strokeRect(x, y - size, size, size);
                    rx = x; ry = y - size;
                }

                if (showOverlay) {
                    ctx.fillStyle = `rgba(254,250,224,0.5)`;
                    ctx.font = `${Math.max(10, size * 0.3)}px Georgia`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(fib[i], rx + size / 2, ry + size / 2);
                }

                if (dir.dx === 1) { x += size; }
                else if (dir.dy === 1) { y += size; }
                else if (dir.dx === -1) { x -= size; }
                else { y -= size; }
            }

            ctx.beginPath();
            x = W / 2; y = H / 2;
            for (let i = 0; i < Math.min(depth, revealCount); i++) {
                const size = fib[i] * unitSize;
                const dir = dirs[i % 4];
                let startAngle;

                if (i % 4 === 0) startAngle = Math.PI;
                else if (i % 4 === 1) startAngle = Math.PI * 1.5;
                else if (i % 4 === 2) startAngle = 0;
                else startAngle = Math.PI * 0.5;

                ctx.arc(x, y, size, startAngle, startAngle + Math.PI / 2);

                if (dir.dx === 1) x += size;
                else if (dir.dy === 1) y += size;
                else if (dir.dx === -1) x -= size;
                else y -= size;
            }
            ctx.strokeStyle = cream;
            ctx.lineWidth = 2.5;
            ctx.stroke();
        }

        function drawGrid() {
            const depth = parseInt(document.getElementById('depth').value);
            const fib = fibonacci(depth);
            const total = fib.reduce((a, b) => a + b, 0);
            const unitW = W * 0.8 / total;
            const unitH = H * 0.7 / total;
            const unit = Math.min(unitW, unitH);

            const startX = (W - total * unit) / 2;
            const startY = (H - total * unit) / 2;

            for (let i = 0; i < depth; i++) {
                for (let j = 0; j < depth; j++) {
                    const w = fib[i] * unit;
                    const h = fib[j] * unit;
                    let x = startX;
                    let y = startY;
                    for (let k = 0; k < i; k++) x += fib[k] * unit;
                    for (let k = 0; k < j; k++) y += fib[k] * unit;

                    const hue = ((i + j) * 30 + 40) % 360;
                    const light = 15 + (i + j) * 3;
                    ctx.fillStyle = `hsla(${hue}, 25%, ${light}%, 0.6)`;
                    ctx.fillRect(x, y, w - 2, h - 2);

                    ctx.strokeStyle = `rgba(221,161,94,0.3)`;
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x, y, w - 2, h - 2);

                    if (w > 30 && h > 20) {
                        ctx.fillStyle = `rgba(254,250,224,0.3)`;
                        ctx.font = '10px Georgia';
                        ctx.textAlign = 'center';
                        ctx.fillText(`${fib[i]}x${fib[j]}`, x + w / 2, y + h / 2 + 4);
                    }
                }
            }
        }

        function drawFloorPlan() {
            const depth = parseInt(document.getElementById('depth').value);
            const showOverlay = document.getElementById('showOverlay').checked;
            const fib = fibonacci(depth);

            const mainW = W * 0.4;
            const mainH = mainW * PHI;
            const mx = (W - mainW) / 2;
            const my = (H - mainH) / 2;

            ctx.fillStyle = `rgba(200,184,154,0.08)`;
            ctx.strokeStyle = earth;
            ctx.lineWidth = 2;
            ctx.fillRect(mx, my, mainW, mainH);
            ctx.strokeRect(mx, my, mainW, mainH);

            const divX = mx + mainW / PHI;
            ctx.beginPath();
            ctx.moveTo(divX, my);
            ctx.lineTo(divX, my + mainH);
            ctx.strokeStyle = `rgba(138,154,91,0.6)`;
            ctx.lineWidth = 1.5;
            ctx.stroke();

            const divY = my + mainH / PHI;
            ctx.beginPath();
            ctx.moveTo(mx, divY);
            ctx.lineTo(mx + mainW, divY);
            ctx.stroke();

            const rooms = [
                { x: mx, y: my, w: divX - mx, h: divY - my, name: 'Main Hall' },
                { x: divX, y: my, w: mx + mainW - divX, h: (divY - my) / PHI, name: 'Study' },
                { x: divX, y: my + (divY - my) / PHI, w: mx + mainW - divX, h: divY - my - (divY - my) / PHI, name: 'Library' },
                { x: mx, y: divY, w: (divX - mx) / PHI, name: 'Kitchen' },
                { x: mx + (divX - mx) / PHI, y: divY, w: divX - mx - (divX - mx) / PHI, name: 'Dining' },
                { x: divX, y: divY, w: mx + mainW - divX, name: 'Garden' }
            ];

            for (let i = 0; i < rooms.length; i++) {
                const r = rooms[i];
                const h = r.h || (my + mainH - r.y);
                const hue = i * 50 + 30;
                ctx.fillStyle = `hsla(${hue}, 20%, 18%, 0.4)`;
                ctx.fillRect(r.x + 2, r.y + 2, r.w - 4, h - 4);

                ctx.fillStyle = cream;
                ctx.font = '13px Georgia';
                ctx.textAlign = 'center';
                ctx.fillText(r.name, r.x + r.w / 2, r.y + h / 2 + 4);

                if (showOverlay) {
                    const ratio = r.w / h;
                    ctx.fillStyle = `rgba(221,161,94,0.6)`;
                    ctx.font = '10px Georgia';
                    ctx.fillText(`ratio: ${ratio.toFixed(2)}`, r.x + r.w / 2, r.y + h / 2 + 20);
                }
            }

            if (showOverlay) {
                ctx.setLineDash([3, 3]);
                ctx.strokeStyle = `rgba(221,161,94,0.4)`;
                ctx.lineWidth = 1;
                for (let i = 2; i < 5; i++) {
                    const subX = mx + mainW * (1 - 1 / Math.pow(PHI, i));
                    const subY = my + mainH * (1 - 1 / Math.pow(PHI, i));
                    ctx.beginPath();
                    ctx.moveTo(subX, my);
                    ctx.lineTo(subX, my + mainH);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(mx, subY);
                    ctx.lineTo(mx + mainW, subY);
                    ctx.stroke();
                }
                ctx.setLineDash([]);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
            grad.addColorStop(0, '#252018');
            grad.addColorStop(1, '#1a1815');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            const mode = document.getElementById('viewMode').value;
            if (document.getElementById('animate').checked) time += 0.016;

            if (mode === 'facade') drawFacade();
            else if (mode === 'spiral') drawSpiral();
            else if (mode === 'grid') drawGrid();
            else if (mode === 'floorplan') drawFloorPlan();

            ctx.fillStyle = earth;
            ctx.font = '16px Georgia';
            ctx.textAlign = 'center';
            const titles = {
                facade: 'Golden Ratio Facade Proportions',
                spiral: 'Fibonacci Golden Spiral',
                grid: 'Fibonacci Proportional Grid',
                floorplan: 'Golden Ratio Floor Plan'
            };
            ctx.fillText(titles[mode], W / 2, 35);

            requestAnimationFrame(draw);
        }

        window.reset = function() {
            document.getElementById('viewMode').value = 'facade';
            document.getElementById('depth').value = 8;
            document.getElementById('showOverlay').checked = true;
            document.getElementById('animate').checked = true;
            time = 0;
        };

        draw();
    </script>
</body>
</html>
