<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flying Buttress Forces</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center;
            background: rgba(30,30,30,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(138,154,91,0.3);
            z-index: 100;
        }
        .controls label { color: #FEFAE0; font-size: 0.85rem; }
        .controls input[type="range"] { width: 90px; accent-color: #8A9A5B; }
        .controls input[type="checkbox"] { accent-color: #8A9A5B; }
        .info {
            position: fixed; top: 50px; right: 20px;
            background: rgba(30,30,30,0.9); backdrop-filter: blur(10px);
            padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(138,154,91,0.3);
            color: #FEFAE0; font-size: 0.8rem; max-width: 240px; line-height: 1.5; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Vault Load: <input type="range" id="vaultLoad" min="10" max="100" value="50"></label>
        <label>Wind: <input type="range" id="wind" min="0" max="100" value="20"></label>
        <label>Buttress Angle: <input type="range" id="buttAngle" min="20" max="70" value="45"></label>
        <label>Forces: <input type="checkbox" id="showForces" checked></label>
        <label>Labels: <input type="checkbox" id="showLabels" checked></label>
    </div>
    <div class="info">
        <h3>Flying Buttress Forces</h3>
        Gothic cathedrals use flying buttresses to transfer lateral thrust from the nave vault to external piers. The force diagram shows how the outward push of the vault is redirected safely to the ground through the buttress arc.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const sage = '#8A9A5B';
        const moss = '#606C38';
        const earth = '#DDA15E';
        const cream = '#FEFAE0';
        const stone1 = '#C8B89A';
        const stone2 = '#A89880';
        const stone3 = '#8B7D6B';

        function drawArrow(x1, y1, x2, y2, color, headSize) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const len = Math.sqrt(dx * dx + dy * dy);
            if (len < 1) return;
            const nx = dx / len;
            const ny = dy / len;

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - nx * headSize + ny * headSize * 0.4, y2 - ny * headSize - nx * headSize * 0.4);
            ctx.lineTo(x2 - nx * headSize - ny * headSize * 0.4, y2 - ny * headSize + nx * headSize * 0.4);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawStoneBlock(x, y, w, h, shade) {
            ctx.fillStyle = shade;
            ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = stone3;
            ctx.lineWidth = 0.5;
            ctx.strokeRect(x, y, w, h);
        }

        let time = 0;

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#151220');
            grad.addColorStop(0.6, '#1a1520');
            grad.addColorStop(1, '#201a15');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            time += 0.01;

            const vaultLoad = parseInt(document.getElementById('vaultLoad').value);
            const windForce = parseInt(document.getElementById('wind').value);
            const buttAngle = parseInt(document.getElementById('buttAngle').value);
            const showForces = document.getElementById('showForces').checked;
            const showLabels = document.getElementById('showLabels').checked;

            const cx = W * 0.4;
            const groundY = H * 0.85;
            const scale = Math.min(W, H) * 0.0035;

            const naveW = 80 * scale;
            const naveH = 200 * scale;
            const wallThick = 15 * scale;
            const naveTop = groundY - naveH;

            ctx.fillStyle = stone2;
            ctx.fillRect(cx - naveW / 2 - wallThick, naveTop, wallThick, naveH);
            ctx.fillRect(cx + naveW / 2, naveTop, wallThick, naveH);

            for (let row = 0; row < Math.floor(naveH / (12 * scale)); row++) {
                const ry = naveTop + row * 12 * scale;
                const offset = (row % 2) * 15 * scale;
                for (let col = 0; col < 3; col++) {
                    drawStoneBlock(
                        cx - naveW / 2 - wallThick + offset + col * 15 * scale,
                        ry, 14 * scale, 11 * scale, row % 2 ? stone1 : stone2
                    );
                }
            }

            const vaultR = naveW / 2;
            ctx.beginPath();
            ctx.arc(cx, naveTop + 20 * scale, vaultR, Math.PI, 0);
            ctx.strokeStyle = stone1;
            ctx.lineWidth = 8 * scale;
            ctx.stroke();

            for (let i = 0; i < 9; i++) {
                const a = Math.PI + (i / 8) * Math.PI;
                const r = vaultR;
                ctx.beginPath();
                ctx.moveTo(cx + (r - 4 * scale) * Math.cos(a), naveTop + 20 * scale + (r - 4 * scale) * Math.sin(a));
                ctx.lineTo(cx + (r + 4 * scale) * Math.cos(a), naveTop + 20 * scale + (r + 4 * scale) * Math.sin(a));
                ctx.strokeStyle = stone3;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            const windowY = naveTop + 40 * scale;
            const windowH = 60 * scale;
            const windowW = 15 * scale;
            ctx.fillStyle = '#2a3050';
            ctx.fillRect(cx - naveW / 2 - wallThick + 2 * scale, windowY, windowW, windowH);
            ctx.beginPath();
            ctx.arc(cx - naveW / 2 - wallThick + 2 * scale + windowW / 2, windowY, windowW / 2, Math.PI, 0);
            ctx.fillStyle = '#2a3050';
            ctx.fill();

            const buttBaseX = cx + naveW / 2 + wallThick + 60 * scale;
            const buttW = 25 * scale;
            const buttH = naveH * 0.9;
            const buttTop = groundY - buttH;

            ctx.fillStyle = stone2;
            ctx.fillRect(buttBaseX - buttW / 2, buttTop, buttW, buttH);

            for (let row = 0; row < Math.floor(buttH / (10 * scale)); row++) {
                const ry = buttTop + row * 10 * scale;
                drawStoneBlock(buttBaseX - buttW / 2, ry, buttW, 9 * scale,
                    row % 2 ? stone1 : stone2);
            }

            ctx.fillStyle = stone1;
            ctx.beginPath();
            ctx.moveTo(buttBaseX - buttW * 0.8, buttTop - 5 * scale);
            ctx.lineTo(buttBaseX + buttW * 0.8, buttTop - 5 * scale);
            ctx.lineTo(buttBaseX, buttTop - 25 * scale);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = stone3;
            ctx.lineWidth = 1;
            ctx.stroke();

            const flyerStartX = cx + naveW / 2 + wallThick;
            const flyerStartY = naveTop + 30 * scale;
            const flyerEndX = buttBaseX;
            const flyerEndY = buttTop + 20 * scale;

            const angleRad = buttAngle * Math.PI / 180;
            const flyerMidX = (flyerStartX + flyerEndX) / 2;
            const flyerMidY = Math.min(flyerStartY, flyerEndY) - 20 * scale;

            ctx.beginPath();
            ctx.moveTo(flyerStartX, flyerStartY);
            ctx.quadraticCurveTo(flyerMidX, flyerMidY, flyerEndX, flyerEndY);
            ctx.strokeStyle = stone1;
            ctx.lineWidth = 10 * scale;
            ctx.stroke();
            ctx.strokeStyle = stone3;
            ctx.lineWidth = 1;
            ctx.stroke();

            const aisleW = 35 * scale;
            const aisleH = naveH * 0.5;
            const aisleTop = groundY - aisleH;
            ctx.fillStyle = `rgba(139,125,107,0.3)`;
            ctx.fillRect(flyerStartX, aisleTop, aisleW, aisleH);

            ctx.fillStyle = stone2;
            ctx.fillRect(0, groundY, W, H - groundY);
            ctx.fillStyle = stone3;
            for (let i = 0; i < W; i += 40 * scale) {
                ctx.fillRect(i, groundY, 38 * scale, 15 * scale);
            }

            if (showForces) {
                const loadScale = vaultLoad * 0.01;
                const windScale = windForce * 0.01;
                const thrustY = naveTop + 20 * scale;
                const thrustX = cx + naveW / 2;

                drawArrow(cx, naveTop - 20 * scale, cx, naveTop + 30 * scale * loadScale, '#ff6644', 10);
                if (showLabels) {
                    ctx.fillStyle = '#ff6644';
                    ctx.font = '11px Georgia';
                    ctx.textAlign = 'center';
                    ctx.fillText('Vault Weight', cx, naveTop - 28 * scale);
                }

                const thrustLen = 60 * scale * loadScale;
                drawArrow(thrustX, thrustY, thrustX + thrustLen, thrustY, '#ff9944', 10);
                if (showLabels) {
                    ctx.fillStyle = '#ff9944';
                    ctx.fillText('Lateral Thrust', thrustX + thrustLen / 2, thrustY - 10);
                }

                const buttForceX = flyerEndX;
                const buttForceY = flyerEndY;
                const bfLen = 50 * scale * loadScale;
                const bfAngle = Math.atan2(flyerEndY - flyerStartY, flyerEndX - flyerStartX);
                drawArrow(flyerStartX + 10, flyerStartY,
                    flyerStartX + 10 + Math.cos(bfAngle) * bfLen,
                    flyerStartY + Math.sin(bfAngle) * bfLen, sage, 10);
                if (showLabels) {
                    ctx.fillStyle = sage;
                    ctx.fillText('Buttress Force', flyerMidX, flyerMidY - 15);
                }

                drawArrow(buttBaseX, groundY, buttBaseX, groundY + 40 * scale * loadScale, '#66aaff', 10);
                if (showLabels) {
                    ctx.fillStyle = '#66aaff';
                    ctx.fillText('Reaction', buttBaseX, groundY + 50 * scale);
                }

                if (windForce > 5) {
                    const windLen = 40 * scale * windScale;
                    for (let i = 0; i < 3; i++) {
                        const wy = naveTop + 30 * scale + i * 40 * scale;
                        drawArrow(cx - naveW - 30 * scale, wy, cx - naveW / 2 - wallThick, wy, '#88ccff', 8);
                    }
                    if (showLabels) {
                        ctx.fillStyle = '#88ccff';
                        ctx.fillText('Wind Load', cx - naveW - 40 * scale, naveTop + 20 * scale);
                    }
                }

                const pulsate = 0.7 + 0.3 * Math.sin(time * 2);
                ctx.save();
                ctx.globalAlpha = pulsate * 0.3;
                ctx.beginPath();
                ctx.moveTo(thrustX, thrustY);
                const fpLen = 40 * scale;
                ctx.lineTo(thrustX + Math.cos(bfAngle) * fpLen, thrustY + Math.sin(bfAngle) * fpLen);
                ctx.strokeStyle = earth;
                ctx.lineWidth = 4;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }

            ctx.fillStyle = earth;
            ctx.font = '16px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Gothic Cathedral Cross-Section', W / 2, 35);

            ctx.fillStyle = `rgba(254,250,224,0.4)`;
            ctx.font = '11px Georgia';
            ctx.fillText('Nave', cx, groundY - naveH / 2);
            ctx.fillText('Pier', buttBaseX, groundY - 15);

            requestAnimationFrame(draw);
        }

        canvas.addEventListener('mousedown', (e) => { mouseDown = true; lastMX = e.clientX; lastMY = e.clientY; });
        let lastMX2 = 0, lastMY2 = 0;

        window.reset = function() {
            document.getElementById('vaultLoad').value = 50;
            document.getElementById('wind').value = 20;
            document.getElementById('buttAngle').value = 45;
            document.getElementById('showForces').checked = true;
            document.getElementById('showLabels').checked = true;
            time = 0;
        };

        draw();
    </script>
</body>
</html>
