<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gothic Pointed Arches</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center;
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(138,154,91,0.3);
            z-index: 100;
        }
        .controls label { color: #FEFAE0; font-size: 0.85rem; }
        .controls input[type="range"] {
            width: 100px; accent-color: #8A9A5B;
        }
        .controls select {
            background: #2a2a2a; color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 4px 8px; border-radius: 6px; font-size: 0.8rem;
        }
        .info {
            position: fixed; top: 50px; right: 20px;
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(138,154,91,0.3);
            color: #FEFAE0; font-size: 0.8rem; max-width: 220px; line-height: 1.5;
            z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Arch Type:
            <select id="archType">
                <option value="equilateral">Equilateral</option>
                <option value="lancet">Lancet</option>
                <option value="drop">Drop</option>
                <option value="tudor">Tudor</option>
                <option value="horseshoe">Horseshoe</option>
            </select>
        </label>
        <label>Columns: <input type="range" id="columns" min="1" max="7" value="3"></label>
        <label>Height: <input type="range" id="heightMul" min="50" max="200" value="100"></label>
        <label>Voussoirs: <input type="range" id="voussoirs" min="5" max="25" value="11"></label>
    </div>
    <div class="info">
        <h3>Gothic Pointed Arches</h3>
        Explore the geometry of pointed arches used in Gothic cathedrals. Each type varies where the arc centers are placed relative to the span width. Voussoirs are the wedge-shaped stones forming the arch.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const sage = '#8A9A5B';
        const moss = '#606C38';
        const earth = '#DDA15E';
        const cream = '#FEFAE0';
        const stone1 = '#C8B89A';
        const stone2 = '#A89880';
        const stone3 = '#8B7D6B';

        function getArchPoints(type, cx, baseY, span, heightMul) {
            const hw = span / 2;
            const pts = [];
            const steps = 80;

            if (type === 'equilateral') {
                const r = span;
                const cL = cx - hw;
                const cR = cx + hw;
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const angle = Math.acos(hw / r);
                    const a = Math.PI / 2 + angle * (1 - t);
                    const x = cR + r * Math.cos(a);
                    const y = baseY - r * Math.sin(a) * (heightMul / 100);
                    pts.push({ x, y });
                }
                for (let i = steps; i >= 0; i--) {
                    const t = i / steps;
                    const angle = Math.acos(hw / r);
                    const a = Math.PI / 2 - angle * (1 - t);
                    const x = cL + r * Math.cos(a);
                    const y = baseY - r * Math.sin(a) * (heightMul / 100);
                    pts.push({ x, y });
                }
            } else if (type === 'lancet') {
                const offset = hw * 0.3;
                const r = Math.sqrt((hw - offset) * (hw - offset) + (span * 1.2) * (span * 1.2)) * 0.8;
                const cL = cx - offset;
                const cR = cx + offset;
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const startA = Math.atan2(0, cx + hw - cR);
                    const endA = Math.PI / 2 + 0.3;
                    const a = startA + (endA - startA) * t;
                    const x = cR + r * Math.cos(a);
                    const y = baseY - r * Math.sin(a) * (heightMul / 100);
                    if (x >= cx - hw && x <= cx + hw + 5) pts.push({ x, y });
                }
                for (let i = steps; i >= 0; i--) {
                    const t = i / steps;
                    const startA = Math.PI - Math.atan2(0, cx + hw - cR);
                    const endA = Math.PI / 2 - 0.3;
                    const a = startA + (endA - startA) * t;
                    const x = cL + r * Math.cos(a);
                    const y = baseY - r * Math.sin(a) * (heightMul / 100);
                    if (x >= cx - hw - 5 && x <= cx + hw) pts.push({ x, y });
                }
            } else if (type === 'drop') {
                const r = hw * 0.75;
                const cL = cx - hw * 0.6;
                const cR = cx + hw * 0.6;
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const a = 0 + Math.PI * 0.65 * t;
                    const x = cR + r * Math.cos(a);
                    const y = baseY - r * Math.sin(a) * (heightMul / 100);
                    pts.push({ x, y });
                }
                for (let i = steps; i >= 0; i--) {
                    const t = i / steps;
                    const a = Math.PI - Math.PI * 0.65 * t;
                    const x = cL + r * Math.cos(a);
                    const y = baseY - r * Math.sin(a) * (heightMul / 100);
                    pts.push({ x, y });
                }
            } else if (type === 'tudor') {
                for (let i = 0; i <= steps * 2; i++) {
                    const t = i / (steps * 2);
                    const x = cx - hw + t * span;
                    let y;
                    if (t < 0.15) {
                        const lt = t / 0.15;
                        const r = hw * 0.3;
                        const ca = Math.PI * 1.5 + lt * Math.PI * 0.5;
                        y = baseY - r + r * Math.cos(ca);
                    } else if (t > 0.85) {
                        const lt = (t - 0.85) / 0.15;
                        const r = hw * 0.3;
                        const ca = Math.PI * 2 + lt * Math.PI * 0.5;
                        y = baseY - r + r * Math.cos(ca);
                    } else {
                        const lt = (t - 0.15) / 0.7;
                        y = baseY - hw * 0.3 - Math.sin(lt * Math.PI) * hw * 0.5;
                    }
                    y = baseY - (baseY - y) * (heightMul / 100);
                    pts.push({ x, y });
                }
            } else if (type === 'horseshoe') {
                const r = hw * 1.1;
                const cX = cx;
                const centerY = baseY - hw * 0.2;
                for (let i = 0; i <= steps * 2; i++) {
                    const t = i / (steps * 2);
                    const a = -0.2 + (Math.PI + 0.4) * t;
                    const x = cX + r * Math.cos(a);
                    const y = centerY - r * Math.sin(a) * (heightMul / 100);
                    pts.push({ x, y });
                }
            }
            return pts;
        }

        function drawVoussoirs(pts, numV, archIdx) {
            if (pts.length < 4) return;
            const mid = Math.floor(pts.length / 2);
            const thickness = 18;

            for (let v = 0; v < numV; v++) {
                const t0 = v / numV;
                const t1 = (v + 1) / numV;
                const i0 = Math.floor(t0 * (pts.length - 1));
                const i1 = Math.floor(t1 * (pts.length - 1));
                const p0 = pts[i0];
                const p1 = pts[i1];
                if (!p0 || !p1) continue;

                const mx = (p0.x + p1.x) / 2;
                const my = (p0.y + p1.y) / 2;
                const dx = p1.x - p0.x;
                const dy = p1.y - p0.y;
                const len = Math.sqrt(dx * dx + dy * dy);
                if (len < 0.1) continue;
                const nx = -dy / len;
                const ny = dx / len;

                ctx.beginPath();
                ctx.moveTo(p0.x, p0.y);
                ctx.lineTo(p1.x, p1.y);
                ctx.lineTo(p1.x + nx * thickness, p1.y + ny * thickness);
                ctx.lineTo(p0.x + nx * thickness, p0.y + ny * thickness);
                ctx.closePath();

                const isKeystone = v === Math.floor(numV / 2);
                if (isKeystone) {
                    ctx.fillStyle = earth;
                } else {
                    ctx.fillStyle = v % 2 === 0 ? stone1 : stone2;
                }
                ctx.fill();
                ctx.strokeStyle = stone3;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function drawColumn(x, topY, baseY) {
            const colW = 16;
            ctx.fillStyle = stone2;
            ctx.fillRect(x - colW / 2, topY, colW, baseY - topY);

            ctx.fillStyle = stone1;
            ctx.fillRect(x - colW * 0.7, topY - 6, colW * 1.4, 8);
            ctx.fillRect(x - colW * 0.7, baseY - 2, colW * 1.4, 8);

            ctx.strokeStyle = stone3;
            ctx.lineWidth = 1;
            ctx.strokeRect(x - colW / 2, topY, colW, baseY - topY);
        }

        let time = 0;

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#1a1520');
            grad.addColorStop(0.5, '#201a28');
            grad.addColorStop(1, '#151020');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            time += 0.005;
            for (let i = 0; i < 50; i++) {
                const sx = ((i * 137.5 + time * 20) % W);
                const sy = ((i * 97.3 + time * 5) % (H * 0.4));
                const bright = 0.3 + 0.2 * Math.sin(time + i);
                ctx.fillStyle = `rgba(254,250,224,${bright})`;
                ctx.beginPath();
                ctx.arc(sx, sy, 1.2, 0, Math.PI * 2);
                ctx.fill();
            }

            const type = document.getElementById('archType').value;
            const numCols = parseInt(document.getElementById('columns').value);
            const heightMul = parseInt(document.getElementById('heightMul').value);
            const numV = parseInt(document.getElementById('voussoirs').value);

            const baseY = H * 0.78;
            const totalSpan = W * 0.7;
            const span = totalSpan / numCols;
            const startX = (W - totalSpan) / 2;

            for (let c = 0; c <= numCols; c++) {
                const colX = startX + c * span;
                drawColumn(colX, baseY - span * 1.2, baseY);
            }

            for (let c = 0; c < numCols; c++) {
                const archCx = startX + c * span + span / 2;
                const pts = getArchPoints(type, archCx, baseY, span * 0.92, heightMul);

                ctx.beginPath();
                if (pts.length > 0) {
                    ctx.moveTo(pts[0].x, pts[0].y);
                    for (let i = 1; i < pts.length; i++) {
                        ctx.lineTo(pts[i].x, pts[i].y);
                    }
                }
                ctx.strokeStyle = cream;
                ctx.lineWidth = 2;
                ctx.stroke();

                drawVoussoirs(pts, numV, c);

                ctx.fillStyle = stone3;
                ctx.fillRect(startX + c * span - 2, baseY - span * 1.2 - 3, span + 4, 6);
            }

            ctx.fillStyle = stone2;
            ctx.fillRect(0, baseY, W, H - baseY);
            ctx.fillStyle = stone3;
            for (let i = 0; i < W; i += 60) {
                ctx.fillRect(i, baseY, 58, 28);
                ctx.fillRect(i + 30, baseY + 30, 58, 28);
            }

            const label = type.charAt(0).toUpperCase() + type.slice(1) + ' Arch';
            ctx.fillStyle = earth;
            ctx.font = '18px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText(label, W / 2, 40);

            requestAnimationFrame(draw);
        }

        window.reset = function() {
            document.getElementById('archType').value = 'equilateral';
            document.getElementById('columns').value = 3;
            document.getElementById('heightMul').value = 100;
            document.getElementById('voussoirs').value = 11;
            time = 0;
        };

        draw();
    </script>
</body>
</html>
