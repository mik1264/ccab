<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tensegrity Structures</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #151820; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center;
            background: rgba(20,24,32,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(138,154,91,0.3);
            z-index: 100;
        }
        .controls label { color: #FEFAE0; font-size: 0.85rem; }
        .controls input[type="range"] { width: 90px; accent-color: #8A9A5B; }
        .controls select {
            background: #1a1e28; color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 4px 8px; border-radius: 6px; font-size: 0.8rem;
        }
        .info {
            position: fixed; top: 50px; right: 20px;
            background: rgba(20,24,32,0.9); backdrop-filter: blur(10px);
            padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(138,154,91,0.3);
            color: #FEFAE0; font-size: 0.8rem; max-width: 220px; line-height: 1.5; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Structure:
            <select id="structure">
                <option value="prism3">Triangular Prism</option>
                <option value="prism6">Hexagonal Prism</option>
                <option value="icosa">Icosahedron</option>
                <option value="tower">Tower</option>
            </select>
        </label>
        <label>Tension: <input type="range" id="tension" min="10" max="100" value="50"></label>
        <label>Spin: <input type="range" id="spin" min="0" max="100" value="30"></label>
        <label>Disturb: <input type="range" id="disturb" min="0" max="100" value="0"></label>
    </div>
    <div class="info">
        <h3>Tensegrity Structures</h3>
        Tensegrity uses isolated compression struts within a continuous tension cable network. The rigid bars never touch each other; only cables connect them. Drag to rotate, adjust tension to see equilibrium.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const sage = '#8A9A5B';
        const moss = '#606C38';
        const earth = '#DDA15E';
        const cream = '#FEFAE0';

        let rotX = 0.3, rotY = 0;
        let autoRotSpeed = 0.005;
        let mouseDown = false, lastMX = 0, lastMY = 0;

        let nodes = [], struts = [], cables = [];

        function project(x, y, z) {
            const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
            const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
            let nx = x * cosY - z * sinY;
            let nz = x * sinY + z * cosY;
            let ny = y * cosX - nz * sinX;
            nz = y * sinX + nz * cosX;
            const scale = 600 / (600 + nz);
            return { x: W / 2 + nx * scale, y: H / 2 + ny * scale, z: nz, scale };
        }

        function buildStructure(type) {
            nodes = []; struts = []; cables = [];
            const s = Math.min(W, H) * 0.2;

            if (type === 'prism3') {
                const r = s;
                const h = s * 1.5;
                for (let i = 0; i < 3; i++) {
                    const a = (i / 3) * Math.PI * 2;
                    nodes.push({ x: r * Math.cos(a), y: -h / 2, z: r * Math.sin(a) });
                }
                for (let i = 0; i < 3; i++) {
                    const a = (i / 3) * Math.PI * 2 + Math.PI / 6;
                    nodes.push({ x: r * Math.cos(a), y: h / 2, z: r * Math.sin(a) });
                }
                struts = [[0, 4], [1, 5], [2, 3]];
                cables = [[0, 1], [1, 2], [2, 0], [3, 4], [4, 5], [5, 3],
                          [0, 3], [1, 4], [2, 5]];
            } else if (type === 'prism6') {
                const r = s;
                const h = s * 1.2;
                for (let i = 0; i < 6; i++) {
                    const a = (i / 6) * Math.PI * 2;
                    nodes.push({ x: r * Math.cos(a), y: -h / 2, z: r * Math.sin(a) });
                }
                for (let i = 0; i < 6; i++) {
                    const a = (i / 6) * Math.PI * 2 + Math.PI / 12;
                    nodes.push({ x: r * Math.cos(a), y: h / 2, z: r * Math.sin(a) });
                }
                for (let i = 0; i < 6; i++) struts.push([i, (i + 2) % 6 + 6]);
                for (let i = 0; i < 6; i++) {
                    cables.push([i, (i + 1) % 6]);
                    cables.push([i + 6, (i + 1) % 6 + 6]);
                    cables.push([i, i + 6]);
                }
            } else if (type === 'icosa') {
                const phi = (1 + Math.sqrt(5)) / 2;
                const sc = s * 0.7;
                const rawNodes = [
                    [-1, phi, 0], [1, phi, 0], [-1, -phi, 0], [1, -phi, 0],
                    [0, -1, phi], [0, 1, phi], [0, -1, -phi], [0, 1, -phi],
                    [phi, 0, -1], [phi, 0, 1], [-phi, 0, -1], [-phi, 0, 1]
                ];
                for (const n of rawNodes) nodes.push({ x: n[0] * sc, y: n[1] * sc, z: n[2] * sc });
                struts = [[0, 3], [1, 2], [4, 7], [5, 6], [8, 11], [9, 10]];
                cables = [
                    [0, 1], [0, 5], [0, 7], [0, 10], [0, 11],
                    [1, 5], [1, 7], [1, 8], [1, 9],
                    [2, 3], [2, 4], [2, 6], [2, 10], [2, 11],
                    [3, 4], [3, 6], [3, 8], [3, 9],
                    [4, 5], [4, 9], [4, 11],
                    [5, 9], [5, 11],
                    [6, 7], [6, 8], [6, 10],
                    [7, 8], [7, 10],
                    [8, 9], [10, 11]
                ];
            } else if (type === 'tower') {
                const r = s * 0.6;
                const levels = 3;
                const h = s * 0.9;
                for (let lev = 0; lev < levels; lev++) {
                    for (let i = 0; i < 3; i++) {
                        const a = (i / 3) * Math.PI * 2 + lev * Math.PI / 9;
                        nodes.push({
                            x: r * Math.cos(a),
                            y: -h * levels / 2 + lev * h,
                            z: r * Math.sin(a)
                        });
                    }
                    for (let i = 0; i < 3; i++) {
                        const a = (i / 3) * Math.PI * 2 + Math.PI / 6 + lev * Math.PI / 9;
                        nodes.push({
                            x: r * Math.cos(a),
                            y: -h * levels / 2 + lev * h + h * 0.8,
                            z: r * Math.sin(a)
                        });
                    }
                }

                for (let lev = 0; lev < levels; lev++) {
                    const base = lev * 6;
                    struts.push([base + 0, base + 4]);
                    struts.push([base + 1, base + 5]);
                    struts.push([base + 2, base + 3]);

                    cables.push([base, base + 1]);
                    cables.push([base + 1, base + 2]);
                    cables.push([base + 2, base]);
                    cables.push([base + 3, base + 4]);
                    cables.push([base + 4, base + 5]);
                    cables.push([base + 5, base + 3]);
                    cables.push([base, base + 3]);
                    cables.push([base + 1, base + 4]);
                    cables.push([base + 2, base + 5]);
                }
                for (let lev = 0; lev < levels - 1; lev++) {
                    const base = lev * 6;
                    for (let i = 0; i < 3; i++) {
                        cables.push([base + 3 + i, base + 6 + i]);
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.6);
            grad.addColorStop(0, '#1e2230');
            grad.addColorStop(1, '#151820');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            const spinVal = parseInt(document.getElementById('spin').value) * 0.0001;
            const disturbVal = parseInt(document.getElementById('disturb').value);
            const tensionVal = parseInt(document.getElementById('tension').value);

            if (!mouseDown) rotY += spinVal;

            if (disturbVal > 0) {
                const d = disturbVal * 0.3;
                for (const n of nodes) {
                    n.x += (Math.random() - 0.5) * d;
                    n.y += (Math.random() - 0.5) * d;
                    n.z += (Math.random() - 0.5) * d;
                }
            }

            const projected = nodes.map(n => project(n.x, n.y, n.z));

            for (const [a, b] of cables) {
                const pa = projected[a], pb = projected[b];
                const alpha = 0.3 + tensionVal * 0.005;
                ctx.beginPath();
                ctx.moveTo(pa.x, pa.y);
                ctx.lineTo(pb.x, pb.y);
                ctx.strokeStyle = `rgba(138,154,91,${alpha})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();

                const mx = (pa.x + pb.x) / 2;
                const my = (pa.y + pb.y) / 2;
                const dx = pb.x - pa.x;
                const dy = pb.y - pa.y;
                const len = Math.sqrt(dx * dx + dy * dy);
                if (len > 30) {
                    const nx = -dy / len * 3;
                    const ny = dx / len * 3;
                    ctx.beginPath();
                    ctx.moveTo(mx - nx, my - ny);
                    ctx.lineTo(mx + nx, my + ny);
                    ctx.strokeStyle = `rgba(138,154,91,${alpha * 0.5})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }

            for (const [a, b] of struts) {
                const pa = projected[a], pb = projected[b];
                const avgZ = (pa.z + pb.z) / 2;
                const brightness = Math.max(0.5, Math.min(1, 1 - avgZ * 0.001));

                ctx.beginPath();
                ctx.moveTo(pa.x, pa.y);
                ctx.lineTo(pb.x, pb.y);

                const strutGrad = ctx.createLinearGradient(pa.x, pa.y, pb.x, pb.y);
                strutGrad.addColorStop(0, `rgba(221,161,94,${brightness})`);
                strutGrad.addColorStop(0.5, `rgba(254,250,224,${brightness})`);
                strutGrad.addColorStop(1, `rgba(221,161,94,${brightness})`);
                ctx.strokeStyle = strutGrad;
                ctx.lineWidth = 5 * pa.scale;
                ctx.lineCap = 'round';
                ctx.stroke();

                ctx.strokeStyle = `rgba(188,108,37,${brightness * 0.3})`;
                ctx.lineWidth = 7 * pa.scale;
                ctx.stroke();
            }

            for (let i = 0; i < projected.length; i++) {
                const p = projected[i];
                const r = 4 * p.scale;
                ctx.beginPath();
                ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
                ctx.fillStyle = cream;
                ctx.fill();
                ctx.strokeStyle = earth;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            const type = document.getElementById('structure').value;
            ctx.fillStyle = earth;
            ctx.font = '16px Georgia';
            ctx.textAlign = 'center';
            const labels = { prism3: 'Triangular Tensegrity Prism', prism6: 'Hexagonal Tensegrity Prism', icosa: 'Tensegrity Icosahedron', tower: 'Tensegrity Tower' };
            ctx.fillText(labels[type] || '', W / 2, 40);

            ctx.fillStyle = `rgba(254,250,224,0.5)`;
            ctx.font = '12px Georgia';
            ctx.fillText(`Struts: ${struts.length}  |  Cables: ${cables.length}  |  Nodes: ${nodes.length}`, W / 2, 60);

            requestAnimationFrame(draw);
        }

        canvas.addEventListener('mousedown', (e) => { mouseDown = true; lastMX = e.clientX; lastMY = e.clientY; });
        canvas.addEventListener('mousemove', (e) => {
            if (mouseDown) {
                rotY += (e.clientX - lastMX) * 0.005;
                rotX += (e.clientY - lastMY) * 0.005;
                lastMX = e.clientX; lastMY = e.clientY;
            }
        });
        canvas.addEventListener('mouseup', () => { mouseDown = false; });
        canvas.addEventListener('mouseleave', () => { mouseDown = false; });

        document.getElementById('structure').addEventListener('change', () => {
            buildStructure(document.getElementById('structure').value);
        });

        window.reset = function() {
            rotX = 0.3; rotY = 0;
            document.getElementById('structure').value = 'prism3';
            document.getElementById('tension').value = 50;
            document.getElementById('spin').value = 30;
            document.getElementById('disturb').value = 0;
            buildStructure('prism3');
        };

        buildStructure('prism3');
        draw();
    </script>
</body>
</html>
