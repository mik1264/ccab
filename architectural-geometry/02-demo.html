<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Star Patterns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1510; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center;
            background: rgba(30,25,15,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(221,161,94,0.3);
            z-index: 100;
        }
        .controls label { color: #FEFAE0; font-size: 0.85rem; }
        .controls input[type="range"] { width: 90px; accent-color: #DDA15E; }
        .controls select {
            background: #2a2518; color: #FEFAE0; border: 1px solid #DDA15E;
            padding: 4px 8px; border-radius: 6px; font-size: 0.8rem;
        }
        .info {
            position: fixed; top: 50px; right: 20px;
            background: rgba(30,25,15,0.9); backdrop-filter: blur(10px);
            padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(221,161,94,0.3);
            color: #FEFAE0; font-size: 0.8rem; max-width: 220px; line-height: 1.5; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Symmetry:
            <select id="symmetry">
                <option value="6">6-fold</option>
                <option value="8" selected>8-fold</option>
                <option value="10">10-fold</option>
                <option value="12">12-fold</option>
            </select>
        </label>
        <label>Scale: <input type="range" id="scale" min="30" max="150" value="80"></label>
        <label>Interlace: <input type="range" id="interlace" min="1" max="20" value="8"></label>
        <label>Rotation: <input type="range" id="rotation" min="0" max="360" value="0"></label>
    </div>
    <div class="info">
        <h3>Islamic Star Patterns</h3>
        Generate geometric star patterns inspired by Islamic art. These patterns use rotational symmetry and interlacing lines to create mesmerizing tessellations found in mosques and palaces.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const earth = '#DDA15E';
        const cream = '#FEFAE0';
        const sage = '#8A9A5B';
        const moss = '#606C38';

        function drawStarPattern(cx, cy, r, n, interlaceW, rot) {
            const angle = (Math.PI * 2) / n;
            const outerPts = [];
            const innerPts = [];
            const innerR = r * 0.38;

            for (let i = 0; i < n; i++) {
                const a = rot + i * angle - Math.PI / 2;
                outerPts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
                const aInner = rot + (i + 0.5) * angle - Math.PI / 2;
                innerPts.push({ x: cx + innerR * Math.cos(aInner), y: cy + innerR * Math.sin(aInner) });
            }

            for (let i = 0; i < n; i++) {
                const next = (i + 1) % n;
                const p1 = outerPts[i];
                const p2 = innerPts[i];
                const p3 = outerPts[next];

                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineTo(p3.x, p3.y);
                ctx.strokeStyle = earth;
                ctx.lineWidth = interlaceW;
                ctx.lineJoin = 'round';
                ctx.stroke();
            }

            const skip = Math.floor(n / 2.5);
            for (let i = 0; i < n; i++) {
                const target = (i + skip) % n;
                ctx.beginPath();
                ctx.moveTo(outerPts[i].x, outerPts[i].y);
                ctx.lineTo(outerPts[target].x, outerPts[target].y);
                ctx.strokeStyle = `rgba(138,154,91,0.6)`;
                ctx.lineWidth = interlaceW * 0.6;
                ctx.stroke();
            }

            ctx.beginPath();
            ctx.arc(cx, cy, innerR * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(221,161,94,0.15)`;
            ctx.fill();
            ctx.strokeStyle = earth;
            ctx.lineWidth = interlaceW * 0.5;
            ctx.stroke();

            for (let i = 0; i < n; i++) {
                ctx.beginPath();
                ctx.arc(outerPts[i].x, outerPts[i].y, 3, 0, Math.PI * 2);
                ctx.fillStyle = cream;
                ctx.fill();
            }
        }

        function drawRosette(cx, cy, r, n, interlaceW, rot) {
            const angle = (Math.PI * 2) / n;
            for (let i = 0; i < n; i++) {
                const a1 = rot + i * angle;
                const a2 = rot + (i + 1) * angle;
                const midA = rot + (i + 0.5) * angle;
                const petalR = r * 0.85;

                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.quadraticCurveTo(
                    cx + petalR * 1.1 * Math.cos(midA),
                    cy + petalR * 1.1 * Math.sin(midA),
                    cx + r * 0.5 * Math.cos(a2),
                    cy + r * 0.5 * Math.sin(a2)
                );
                ctx.strokeStyle = `rgba(221,161,94,0.4)`;
                ctx.lineWidth = interlaceW * 0.4;
                ctx.stroke();
            }
        }

        let animTime = 0;

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
            grad.addColorStop(0, '#2a2015');
            grad.addColorStop(1, '#1a1510');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            const n = parseInt(document.getElementById('symmetry').value);
            const scale = parseInt(document.getElementById('scale').value);
            const interlaceW = parseInt(document.getElementById('interlace').value) * 0.5;
            const userRot = parseInt(document.getElementById('rotation').value) * Math.PI / 180;

            animTime += 0.003;

            const tileSize = scale * 2.2;
            const cols = Math.ceil(W / tileSize) + 2;
            const rows = Math.ceil(H / tileSize) + 2;

            for (let row = -1; row < rows; row++) {
                for (let col = -1; col < cols; col++) {
                    const offsetX = (row % 2) * tileSize * 0.5;
                    const cx = col * tileSize + offsetX;
                    const cy = row * tileSize;

                    drawRosette(cx, cy, scale, n, interlaceW, userRot + animTime);
                    drawStarPattern(cx, cy, scale, n, interlaceW, userRot + animTime);
                }
            }

            ctx.strokeStyle = `rgba(221,161,94,0.15)`;
            ctx.lineWidth = 1;
            for (let row = -1; row < rows; row++) {
                for (let col = -1; col < cols; col++) {
                    const offsetX = (row % 2) * tileSize * 0.5;
                    const cx = col * tileSize + offsetX;
                    const cy = row * tileSize;
                    ctx.beginPath();
                    ctx.arc(cx, cy, scale * 1.05, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            requestAnimationFrame(draw);
        }

        window.reset = function() {
            document.getElementById('symmetry').value = '8';
            document.getElementById('scale').value = 80;
            document.getElementById('interlace').value = 8;
            document.getElementById('rotation').value = 0;
            animTime = 0;
        };

        draw();
    </script>
</body>
</html>
