<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muqarnas Vault Construction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1510; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center;
            background: rgba(30,25,15,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(221,161,94,0.3);
            z-index: 100;
        }
        .controls label { color: #FEFAE0; font-size: 0.85rem; }
        .controls input[type="range"] { width: 90px; accent-color: #DDA15E; }
        .controls select {
            background: #2a2518; color: #FEFAE0; border: 1px solid #DDA15E;
            padding: 4px 8px; border-radius: 6px; font-size: 0.8rem;
        }
        .info {
            position: fixed; top: 50px; right: 20px;
            background: rgba(30,25,15,0.9); backdrop-filter: blur(10px);
            padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(221,161,94,0.3);
            color: #FEFAE0; font-size: 0.8rem; max-width: 220px; line-height: 1.5; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Symmetry:
            <select id="symmetry">
                <option value="4">4-fold</option>
                <option value="6">6-fold</option>
                <option value="8" selected>8-fold</option>
                <option value="12">12-fold</option>
            </select>
        </label>
        <label>Layers: <input type="range" id="layers" min="2" max="8" value="5"></label>
        <label>Depth: <input type="range" id="depth" min="20" max="150" value="80"></label>
        <label>Spin: <input type="range" id="spin" min="0" max="100" value="15"></label>
    </div>
    <div class="info">
        <h3>Muqarnas Vault</h3>
        Muqarnas (stalactite vaulting) transitions between structural elements through cascading tiers of niche-like cells. The 2D plan generates a 3D vault by extruding concentric rings of geometric shapes downward.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const earth = '#DDA15E';
        const cream = '#FEFAE0';
        const sage = '#8A9A5B';
        const moss = '#606C38';

        let rotX = 0.5, rotY = 0;
        let mouseDown = false, lastMX = 0, lastMY = 0;

        function project(x, y, z) {
            const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
            const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
            let nx = x * cosY - z * sinY;
            let nz = x * sinY + z * cosY;
            let ny = y * cosX - nz * sinX;
            nz = y * sinX + nz * cosX;
            const scale = Math.min(W, H) * 0.25;
            const perspective = 800 / (800 + nz * scale);
            return {
                x: W / 2 + nx * scale * perspective,
                y: H / 2 + ny * scale * perspective,
                z: nz,
                s: perspective
            };
        }

        function generateMuqarnas(sym, numLayers, depthScale) {
            const cells = [];
            const d = depthScale * 0.01;

            for (let layer = 0; layer < numLayers; layer++) {
                const r = 0.3 + (layer / numLayers) * 0.9;
                const nextR = 0.3 + ((layer + 1) / numLayers) * 0.9;
                const yBase = -layer * d * 0.3;
                const yTop = yBase + d * 0.15;
                const subdivisions = sym * (layer + 1);
                const twist = layer * Math.PI / (sym * 2);

                for (let i = 0; i < subdivisions; i++) {
                    const a1 = (i / subdivisions) * Math.PI * 2 + twist;
                    const a2 = ((i + 1) / subdivisions) * Math.PI * 2 + twist;
                    const aMid = (a1 + a2) / 2;

                    const vertices = [
                        [r * Math.cos(a1), yBase, r * Math.sin(a1)],
                        [r * Math.cos(a2), yBase, r * Math.sin(a2)],
                        [r * Math.cos(aMid), yTop, r * Math.sin(aMid)],
                        [nextR * Math.cos(a1), yBase - d * 0.1, nextR * Math.sin(a1)],
                        [nextR * Math.cos(a2), yBase - d * 0.1, nextR * Math.sin(a2)],
                    ];

                    const faces = [
                        [0, 1, 2],
                        [0, 3, 4, 1],
                        [0, 2, 3],
                        [1, 4, 2]
                    ];

                    for (const face of faces) {
                        const projFace = face.map(idx => {
                            const v = vertices[idx];
                            return project(v[0], v[1], v[2]);
                        });

                        let avgZ = 0;
                        for (const p of projFace) avgZ += p.z;
                        avgZ /= projFace.length;

                        cells.push({
                            pts: projFace,
                            z: avgZ,
                            layer: layer,
                            idx: i
                        });
                    }
                }
            }

            const topR = 0.25;
            const topY = 0;
            const topPeakY = d * 0.2;
            for (let i = 0; i < sym * 2; i++) {
                const a1 = (i / (sym * 2)) * Math.PI * 2;
                const a2 = ((i + 1) / (sym * 2)) * Math.PI * 2;
                const v = [
                    project(topR * Math.cos(a1), topY, topR * Math.sin(a1)),
                    project(topR * Math.cos(a2), topY, topR * Math.sin(a2)),
                    project(0, topPeakY, 0)
                ];
                cells.push({ pts: v, z: (v[0].z + v[1].z + v[2].z) / 3, layer: -1, idx: i });
            }

            return cells;
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
            grad.addColorStop(0, '#2a2015');
            grad.addColorStop(1, '#1a1510');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            const sym = parseInt(document.getElementById('symmetry').value);
            const numLayers = parseInt(document.getElementById('layers').value);
            const depth = parseInt(document.getElementById('depth').value);
            const spinVal = parseInt(document.getElementById('spin').value) * 0.0002;

            if (!mouseDown) rotY += spinVal;

            const cells = generateMuqarnas(sym, numLayers, depth);
            cells.sort((a, b) => a.z - b.z);

            for (const cell of cells) {
                ctx.beginPath();
                for (let i = 0; i < cell.pts.length; i++) {
                    if (i === 0) ctx.moveTo(cell.pts[i].x, cell.pts[i].y);
                    else ctx.lineTo(cell.pts[i].x, cell.pts[i].y);
                }
                ctx.closePath();

                const light = Math.max(0.2, Math.min(1, 0.5 - cell.z * 0.4));
                const layerT = cell.layer >= 0 ? cell.layer / numLayers : 0;

                let r, g, b;
                if (cell.layer < 0) {
                    r = 221; g = 161; b = 94;
                } else {
                    r = Math.floor(180 + layerT * 40);
                    g = Math.floor(140 + layerT * 20);
                    b = Math.floor(80 + layerT * 40);
                }

                ctx.fillStyle = `rgba(${Math.floor(r * light)},${Math.floor(g * light)},${Math.floor(b * light)},0.85)`;
                ctx.fill();

                ctx.strokeStyle = `rgba(221,161,94,${light * 0.4})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }

            ctx.fillStyle = earth;
            ctx.font = '16px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText(`${sym}-Fold Muqarnas Vault`, W / 2, 40);
            ctx.fillStyle = `rgba(254,250,224,0.5)`;
            ctx.font = '12px Georgia';
            ctx.fillText(`${numLayers} tiers  |  ${cells.length} facets`, W / 2, 60);

            requestAnimationFrame(draw);
        }

        canvas.addEventListener('mousedown', (e) => { mouseDown = true; lastMX = e.clientX; lastMY = e.clientY; });
        canvas.addEventListener('mousemove', (e) => {
            if (mouseDown) {
                rotY += (e.clientX - lastMX) * 0.005;
                rotX += (e.clientY - lastMY) * 0.005;
                rotX = Math.max(-1, Math.min(1.5, rotX));
                lastMX = e.clientX; lastMY = e.clientY;
            }
        });
        canvas.addEventListener('mouseup', () => { mouseDown = false; });
        canvas.addEventListener('mouseleave', () => { mouseDown = false; });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseDown = true;
            lastMX = e.touches[0].clientX;
            lastMY = e.touches[0].clientY;
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (mouseDown) {
                rotY += (e.touches[0].clientX - lastMX) * 0.005;
                rotX += (e.touches[0].clientY - lastMY) * 0.005;
                rotX = Math.max(-1, Math.min(1.5, rotX));
                lastMX = e.touches[0].clientX;
                lastMY = e.touches[0].clientY;
            }
        }, { passive: false });
        canvas.addEventListener('touchend', () => { mouseDown = false; });

        window.reset = function() {
            rotX = 0.5; rotY = 0;
            document.getElementById('symmetry').value = '8';
            document.getElementById('layers').value = 5;
            document.getElementById('depth').value = 80;
            document.getElementById('spin').value = 15;
        };

        draw();
    </script>
</body>
</html>
