<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip - Lights Out Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --sage: #8A9A5B;
    --moss: #606C38;
    --earth: #DDA15E;
    --cream: #FEFAE0;
    --terracotta: #BC6C25;
    --dark-moss: #3d4423;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
    min-height: 100vh;
    color: var(--dark-moss);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.back-link {
    position: fixed;
    top: 20px;
    left: 20px;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    color: var(--moss);
    text-decoration: none;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    padding: 8px 16px;
    border-radius: 20px;
    z-index: 100;
    transition: all 0.3s;
}
.back-link:hover { background: rgba(255,255,255,0.9); transform: translateX(-3px); }

h1 {
    font-family: 'Lora', serif;
    font-size: 2rem;
    color: var(--moss);
    margin-top: 60px;
    margin-bottom: 5px;
}

.subtitle {
    color: var(--sage);
    font-size: 0.95rem;
    margin-bottom: 15px;
}

.controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 15px;
}

.btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 8px 18px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s;
}

.btn-primary {
    background: var(--moss);
    color: var(--cream);
}
.btn-primary:hover { background: var(--dark-moss); transform: translateY(-1px); }

.btn-secondary {
    background: rgba(255,255,255,0.6);
    color: var(--moss);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(138,154,91,0.3);
}
.btn-secondary:hover { background: rgba(255,255,255,0.9); }

.btn-diff {
    background: rgba(255,255,255,0.5);
    color: var(--dark-moss);
    border: 2px solid transparent;
}
.btn-diff.active {
    border-color: var(--moss);
    background: rgba(138,154,91,0.15);
    font-weight: 700;
}

.stats {
    display: flex;
    gap: 25px;
    margin-bottom: 15px;
    font-weight: 600;
    color: var(--moss);
}

.stats span { font-size: 0.95rem; }
.stats strong { color: var(--terracotta); }

#board {
    display: inline-grid;
    gap: 4px;
    padding: 12px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    touch-action: manipulation;
}

.cell {
    width: 70px;
    height: 70px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    border: 2px solid rgba(0,0,0,0.08);
}

.cell.on {
    background: var(--dark-moss);
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);
}

.cell.off {
    background: var(--cream);
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

.cell:hover { transform: scale(1.05); }
.cell:active { transform: scale(0.95); }

.cell.flash {
    animation: flashAnim 0.3s ease;
}

@keyframes flashAnim {
    0% { transform: scale(1); }
    50% { transform: scale(0.85); }
    100% { transform: scale(1); }
}

.win-msg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    padding: 40px 50px;
    border-radius: 24px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    z-index: 200;
    display: none;
}

.win-msg h2 {
    font-family: 'Lora', serif;
    color: var(--moss);
    font-size: 1.8rem;
    margin-bottom: 10px;
}

.win-msg p { color: var(--sage); margin-bottom: 20px; }

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 199;
    display: none;
}

.help-modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(20px);
    padding: 30px 35px;
    border-radius: 24px;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    z-index: 300;
    display: none;
}

.help-modal h2 {
    font-family: 'Lora', serif;
    color: var(--moss);
    margin-bottom: 12px;
}

.help-modal p, .help-modal li {
    font-size: 0.92rem;
    line-height: 1.6;
    color: var(--dark-moss);
    margin-bottom: 8px;
}

.help-modal ul { padding-left: 18px; }

.help-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 299;
    display: none;
}

@media (max-width: 500px) {
    h1 { font-size: 1.5rem; margin-top: 50px; }
    .cell { width: 55px; height: 55px; border-radius: 10px; }
    .controls { gap: 6px; }
    .btn { padding: 6px 14px; font-size: 0.82rem; }
}
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back to Puzzles</a>

<h1>Flip</h1>
<p class="subtitle">Turn all squares to light</p>

<div class="controls">
    <button class="btn btn-diff active" onclick="setSize(3)">3&times;3</button>
    <button class="btn btn-diff" onclick="setSize(4)">4&times;4</button>
    <button class="btn btn-diff" onclick="setSize(5)">5&times;5</button>
    <button class="btn btn-primary" onclick="newGame()">New Game</button>
    <button class="btn btn-secondary" onclick="showHelp()">?</button>
</div>

<div class="stats">
    <span>Moves: <strong id="moveCount">0</strong></span>
</div>

<div id="board"></div>

<div class="overlay" id="overlay" onclick="closeWin()"></div>
<div class="win-msg" id="winMsg">
    <h2>Solved!</h2>
    <p id="winText">You did it in 0 moves!</p>
    <button class="btn btn-primary" onclick="closeWin(); newGame();">Play Again</button>
</div>

<div class="help-overlay" id="helpOverlay" onclick="closeHelp()"></div>
<div class="help-modal" id="helpModal">
    <h2>How to Play</h2>
    <ul>
        <li>Click any dark square to toggle it and its orthogonal neighbors (up, down, left, right).</li>
        <li>Your goal: turn <strong>all squares light</strong>.</li>
        <li>Every puzzle generated is guaranteed solvable.</li>
    </ul>
    <br>
    <button class="btn btn-primary" onclick="closeHelp()">Got it</button>
</div>

<script>
let size = 3;
let grid = [];
let moves = 0;
let won = false;

function setSize(s) {
    size = s;
    document.querySelectorAll('.btn-diff').forEach((b, i) => {
        b.classList.toggle('active', i === s - 3);
    });
    newGame();
}

function newGame() {
    won = false;
    moves = 0;
    updateMoves();
    grid = Array.from({ length: size }, () => Array(size).fill(false));
    // Generate solvable puzzle by applying random moves from solved state
    const numMoves = Math.floor(Math.random() * (size * size - 1)) + size;
    const used = new Set();
    let count = 0;
    while (count < numMoves) {
        const r = Math.floor(Math.random() * size);
        const c = Math.floor(Math.random() * size);
        const key = r * size + c;
        if (!used.has(key)) {
            used.add(key);
            applyFlip(r, c, true);
            count++;
        }
        if (used.size >= size * size) break;
    }
    // Ensure not already solved
    if (isSolved()) {
        const r = Math.floor(Math.random() * size);
        const c = Math.floor(Math.random() * size);
        applyFlip(r, c, true);
    }
    render();
}

function applyFlip(r, c, silent) {
    const dirs = [[0,0],[0,1],[0,-1],[1,0],[-1,0]];
    dirs.forEach(([dr, dc]) => {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
            grid[nr][nc] = !grid[nr][nc];
        }
    });
}

function isSolved() {
    return grid.every(row => row.every(cell => !cell));
}

function cellClick(r, c) {
    if (won) return;
    applyFlip(r, c, false);
    moves++;
    updateMoves();
    render();
    // Flash affected cells
    const dirs = [[0,0],[0,1],[0,-1],[1,0],[-1,0]];
    dirs.forEach(([dr, dc]) => {
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
            const el = document.querySelector(`[data-r="${nr}"][data-c="${nc}"]`);
            if (el) {
                el.classList.remove('flash');
                void el.offsetWidth;
                el.classList.add('flash');
            }
        }
    });
    if (isSolved()) {
        won = true;
        setTimeout(() => {
            document.getElementById('winText').textContent = `You solved it in ${moves} move${moves !== 1 ? 's' : ''}!`;
            document.getElementById('winMsg').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }, 350);
    }
}

function updateMoves() {
    document.getElementById('moveCount').textContent = moves;
}

function render() {
    const board = document.getElementById('board');
    board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
    board.innerHTML = '';
    for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
            const cell = document.createElement('div');
            cell.className = `cell ${grid[r][c] ? 'on' : 'off'}`;
            cell.dataset.r = r;
            cell.dataset.c = c;
            cell.addEventListener('click', () => cellClick(r, c));
            board.appendChild(cell);
        }
    }
}

function closeWin() {
    document.getElementById('winMsg').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
}

function showHelp() {
    document.getElementById('helpModal').style.display = 'block';
    document.getElementById('helpOverlay').style.display = 'block';
}

function closeHelp() {
    document.getElementById('helpModal').style.display = 'none';
    document.getElementById('helpOverlay').style.display = 'none';
}

newGame();
</script>
</body>
</html>
