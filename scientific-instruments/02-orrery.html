<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orrery - Mechanical Solar System - Scientific Instruments</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12100e;
            overflow: hidden;
            font-family: 'Georgia', serif;
            color: #d4a857;
        }
        canvas { display: block; }
        #controls {
            position: fixed;
            top: 60px;
            right: 20px;
            background: rgba(30, 22, 15, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 168, 87, 0.3);
            border-radius: 12px;
            padding: 14px 18px;
            z-index: 100;
            font-size: 13px;
            min-width: 200px;
        }
        #controls label {
            display: block;
            margin: 6px 0 2px;
            color: #c4a060;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #controls input[type="range"] {
            width: 100%;
            accent-color: #d4a857;
        }
        #controls .val {
            color: #d4a857;
            font-weight: bold;
            float: right;
        }
        #planet-info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 22, 15, 0.92);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 168, 87, 0.3);
            border-radius: 12px;
            padding: 10px 20px;
            font-size: 13px;
            color: #c4a060;
            z-index: 100;
            text-align: center;
            white-space: nowrap;
        }
        #info-panel {
            position: fixed;
            bottom: 70px;
            right: 20px;
            background: rgba(30, 22, 15, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 168, 87, 0.3);
            border-radius: 12px;
            padding: 16px 20px;
            max-width: 300px;
            font-size: 13px;
            line-height: 1.6;
            color: #c4a060;
            z-index: 100;
        }
        #info-panel h3 {
            color: #d4a857;
            margin-bottom: 8px;
            font-size: 15px;
            border-bottom: 1px solid rgba(212, 168, 87, 0.3);
            padding-bottom: 6px;
        }
        #gears-toggle {
            margin-top: 10px;
            background: rgba(212, 168, 87, 0.2);
            border: 1px solid rgba(212, 168, 87, 0.4);
            color: #d4a857;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: Georgia, serif;
            font-size: 12px;
            width: 100%;
        }
        #gears-toggle:hover { background: rgba(212, 168, 87, 0.35); }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;z-index:1000;background:rgba(255,255,255,0.8);padding:6px 14px;border-radius:20px;text-decoration:none;color:#606C38;font-weight:600;backdrop-filter:blur(10px)">&larr; Back</a>

    <canvas id="canvas"></canvas>

    <div id="controls">
        <label>Time Speed <span class="val" id="speed-val">1x</span></label>
        <input type="range" id="speed" min="-50" max="50" value="1" step="1">
        <label>View Tilt <span class="val" id="tilt-val">30&deg;</span></label>
        <input type="range" id="tilt" min="0" max="80" value="30" step="1">
        <button id="gears-toggle">Show Gears</button>
    </div>

    <div id="planet-info"></div>

    <div id="info-panel">
        <h3>Orrery</h3>
        <p>A mechanical model of the solar system, named after Charles Boyle, 4th Earl of Orrery (1713). Clockwork gears drive planets at their correct relative orbital periods. The first modern orrery was built by George Graham and Thomas Tompion around 1704.</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const speedSlider = document.getElementById('speed');
        const tiltSlider = document.getElementById('tilt');
        const speedVal = document.getElementById('speed-val');
        const tiltVal = document.getElementById('tilt-val');
        const gearsToggle = document.getElementById('gears-toggle');
        const planetInfoEl = document.getElementById('planet-info');

        let showGears = false;
        gearsToggle.addEventListener('click', () => {
            showGears = !showGears;
            gearsToggle.textContent = showGears ? 'Hide Gears' : 'Show Gears';
        });

        speedSlider.addEventListener('input', () => {
            const v = parseInt(speedSlider.value);
            speedVal.textContent = v + 'x';
        });
        tiltSlider.addEventListener('input', () => {
            tiltVal.textContent = tiltSlider.value + '\u00B0';
        });

        // Planet data: name, orbital radius (scaled), period (Earth years), color, size, moons
        const planets = [
            { name: 'Mercury', dist: 0.08, period: 0.241, color: '#a89070', size: 3, moons: [] },
            { name: 'Venus', dist: 0.14, period: 0.615, color: '#e8c87a', size: 5, moons: [] },
            { name: 'Earth', dist: 0.20, period: 1.0, color: '#5588bb', size: 5, moons: [
                { name: 'Moon', dist: 0.02, period: 0.0748, color: '#bbb', size: 2 }
            ]},
            { name: 'Mars', dist: 0.28, period: 1.881, color: '#c06040', size: 4, moons: [] },
            { name: 'Jupiter', dist: 0.42, period: 11.86, color: '#d4a050', size: 10, moons: [] },
            { name: 'Saturn', dist: 0.58, period: 29.46, color: '#c8b070', size: 8, hasRing: true, moons: [] },
        ];

        let time = 0;
        let paused = false;

        function drawGear(cx, cy, radius, teeth, angle, color) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            ctx.beginPath();
            const toothH = radius * 0.15;
            for (let i = 0; i < teeth; i++) {
                const a1 = (i / teeth) * Math.PI * 2;
                const a2 = ((i + 0.3) / teeth) * Math.PI * 2;
                const a3 = ((i + 0.5) / teeth) * Math.PI * 2;
                const a4 = ((i + 0.8) / teeth) * Math.PI * 2;
                ctx.lineTo(Math.cos(a1) * radius, Math.sin(a1) * radius);
                ctx.lineTo(Math.cos(a2) * (radius + toothH), Math.sin(a2) * (radius + toothH));
                ctx.lineTo(Math.cos(a3) * (radius + toothH), Math.sin(a3) * (radius + toothH));
                ctx.lineTo(Math.cos(a4) * radius, Math.sin(a4) * radius);
            }
            ctx.closePath();
            ctx.stroke();
            // Hub
            ctx.beginPath();
            ctx.arc(0, 0, radius * 0.15, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        function animate() {
            requestAnimationFrame(animate);

            const speed = parseInt(speedSlider.value);
            const tilt = parseInt(tiltSlider.value) * Math.PI / 180;
            if (!paused) time += speed * 0.0005;

            ctx.fillStyle = '#12100e';
            ctx.fillRect(0, 0, W, H);

            const cx = W / 2;
            const cy = H / 2;
            const scale = Math.min(W, H) * 0.42;

            // Draw orbit paths
            ctx.setLineDash([2, 4]);
            planets.forEach(p => {
                const r = p.dist * scale;
                ctx.strokeStyle = 'rgba(212, 168, 87, 0.12)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.ellipse(cx, cy, r, r * Math.cos(tilt), 0, 0, Math.PI * 2);
                ctx.stroke();
            });
            ctx.setLineDash([]);

            // Draw gears layer (below planets)
            if (showGears) {
                planets.forEach((p, i) => {
                    const teeth = Math.max(8, Math.round(p.dist * 60));
                    const gearR = p.dist * scale * 0.12;
                    const angle = time / p.period;
                    drawGear(cx, cy, p.dist * scale * 0.5, teeth, angle, 'rgba(140, 110, 50, 0.3)');
                });
                // Central gear
                drawGear(cx, cy, 20, 12, time * 2, 'rgba(180, 140, 60, 0.4)');
            }

            // Draw mechanical arms
            planets.forEach(p => {
                const angle = (time / p.period) * Math.PI * 2;
                const r = p.dist * scale;
                const px = cx + Math.cos(angle) * r;
                const py = cy + Math.sin(angle) * r * Math.cos(tilt);
                ctx.strokeStyle = 'rgba(140, 110, 50, 0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(px, py);
                ctx.stroke();
            });

            // Draw Sun
            const sunGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 20);
            sunGrad.addColorStop(0, '#fff8e0');
            sunGrad.addColorStop(0.3, '#ffd040');
            sunGrad.addColorStop(0.7, '#e8a020');
            sunGrad.addColorStop(1, '#c06010');
            ctx.fillStyle = sunGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, 16, 0, Math.PI * 2);
            ctx.fill();
            // Glow
            const glowGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 60);
            glowGrad.addColorStop(0, 'rgba(255, 200, 50, 0.3)');
            glowGrad.addColorStop(1, 'rgba(255, 200, 50, 0)');
            ctx.fillStyle = glowGrad;
            ctx.beginPath();
            ctx.arc(cx, cy, 60, 0, Math.PI * 2);
            ctx.fill();

            // Draw planets
            let infoText = '';
            planets.forEach(p => {
                const angle = (time / p.period) * Math.PI * 2;
                const r = p.dist * scale;
                const px = cx + Math.cos(angle) * r;
                const py = cy + Math.sin(angle) * r * Math.cos(tilt);

                // Planet shadow/depth effect
                const depth = Math.sin(angle) * Math.cos(tilt);
                const alpha = 0.7 + 0.3 * (1 + depth) / 2;

                // Planet body
                const pGrad = ctx.createRadialGradient(px - p.size * 0.3, py - p.size * 0.3, 0, px, py, p.size);
                pGrad.addColorStop(0, p.color);
                pGrad.addColorStop(1, '#1a1410');
                ctx.globalAlpha = alpha;
                ctx.fillStyle = pGrad;
                ctx.beginPath();
                ctx.arc(px, py, p.size, 0, Math.PI * 2);
                ctx.fill();

                // Saturn ring
                if (p.hasRing) {
                    ctx.strokeStyle = 'rgba(200, 176, 112, 0.6)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.ellipse(px, py, p.size * 2.2, p.size * 0.6, 0.3, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Label
                ctx.fillStyle = 'rgba(212, 168, 87, 0.7)';
                ctx.font = '11px Georgia';
                ctx.textAlign = 'center';
                ctx.fillText(p.name, px, py - p.size - 6);
                ctx.globalAlpha = 1;

                // Moons
                p.moons.forEach(m => {
                    const mAngle = (time / m.period) * Math.PI * 2;
                    const mr = m.dist * scale;
                    const mx = px + Math.cos(mAngle) * mr;
                    const my = py + Math.sin(mAngle) * mr * Math.cos(tilt);
                    ctx.fillStyle = m.color;
                    ctx.beginPath();
                    ctx.arc(mx, my, m.size, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Collect info
                const degPos = ((angle * 180 / Math.PI) % 360 + 360) % 360;
                infoText += `${p.name}: ${degPos.toFixed(0)}\u00B0  `;
            });

            planetInfoEl.textContent = infoText;

            // Decorative brass base
            ctx.strokeStyle = 'rgba(140, 110, 50, 0.2)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.ellipse(cx, cy, scale * 0.65, scale * 0.65 * Math.cos(tilt), 0, 0, Math.PI * 2);
            ctx.stroke();

            // Degree markers on base
            for (let i = 0; i < 36; i++) {
                const a = (i / 36) * Math.PI * 2;
                const r1 = scale * 0.63;
                const r2 = scale * 0.65;
                ctx.strokeStyle = 'rgba(140, 110, 50, 0.15)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1 * Math.cos(tilt));
                ctx.lineTo(cx + Math.cos(a) * r2, cy + Math.sin(a) * r2 * Math.cos(tilt));
                ctx.stroke();
            }
        }

        window.reset = function() {
            time = 0;
            speedSlider.value = 1;
            speedVal.textContent = '1x';
            tiltSlider.value = 30;
            tiltVal.textContent = '30\u00B0';
            showGears = false;
            gearsToggle.textContent = 'Show Gears';
            paused = false;
        };

        animate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
