<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Lava Lamp - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls select { width: 170px; background: #1a1a2e; color: #e8e6e1; border: 1px solid #22d3ee; border-radius: 4px; padding: 3px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #22d3ee; font-size: 14px; font-weight: 600; z-index: 100; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); pointer-events: none; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div class="title">GPU Lava Lamp</div>

    <div class="controls">
        <label>Blob Count: <span id="blobVal">14</span></label>
        <input type="range" id="blobCount" min="6" max="20" step="1" value="14">
        <label>Speed: <span id="speedVal">1.0</span></label>
        <input type="range" id="speed" min="0.2" max="3.0" step="0.1" value="1.0">
        <label>Threshold: <span id="threshVal">1.0</span></label>
        <input type="range" id="threshold" min="0.3" max="2.0" step="0.1" value="1.0">
        <label>Viscosity: <span id="viscVal">0.5</span></label>
        <input type="range" id="viscosity" min="0.1" max="1.5" step="0.1" value="0.5">
        <label>Color Theme:</label>
        <select id="colorTheme">
            <option value="0">Lava</option>
            <option value="1">Slime</option>
            <option value="2">Plasma</option>
            <option value="3">Water</option>
        </select>
    </div>

    <div class="stats">FPS: <span id="fps">0</span></div>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'opaque' });

        const W = canvas.width, H = canvas.height;
        const MAX_BLOBS = 20;
        let blobCount = 14, speed = 1.0, threshold = 1.0, viscosity = 0.5, colorTheme = 0;

        // Blob data on CPU: x, y, vx, vy, radius, phase, hue, pad (8 floats each)
        const blobData = new Float32Array(MAX_BLOBS * 8);
        // GPU-side: just x, y, radius (3 floats per blob)
        const blobGPU = new Float32Array(MAX_BLOBS * 4); // x, y, radius, pad

        function initBlobs() {
            for (let i = 0; i < MAX_BLOBS; i++) {
                const b = i * 8;
                blobData[b + 0] = 0.3 + Math.random() * 0.4; // x (centered)
                blobData[b + 1] = Math.random(); // y
                blobData[b + 2] = (Math.random() - 0.5) * 0.02; // vx
                blobData[b + 3] = (Math.random() - 0.5) * 0.03; // vy
                blobData[b + 4] = 0.04 + Math.random() * 0.06; // radius
                blobData[b + 5] = Math.random() * Math.PI * 2; // phase
                blobData[b + 6] = i / MAX_BLOBS; // hue offset
                blobData[b + 7] = 0;
            }
        }
        initBlobs();

        const blobBuffer = device.createBuffer({ size: blobGPU.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        const uniformBuffer = device.createBuffer({ size: 64, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        function updateBlobs(dt, time) {
            const t = time * speed;
            for (let i = 0; i < blobCount; i++) {
                const b = i * 8;
                let x = blobData[b + 0];
                let y = blobData[b + 1];
                let vx = blobData[b + 2];
                let vy = blobData[b + 3];
                const r = blobData[b + 4];
                const phase = blobData[b + 5];

                // Lava lamp physics: buoyancy oscillation + lateral drift
                const buoyancy = Math.sin(t * 0.5 + phase) * 0.015 * (1.0 / viscosity);
                const drift = Math.sin(t * 0.3 + phase * 2.7) * 0.005;

                vy += buoyancy * dt;
                vx += drift * dt;

                // Damping (viscosity)
                vx *= (1.0 - viscosity * 0.5 * dt);
                vy *= (1.0 - viscosity * 0.3 * dt);

                x += vx;
                y += vy;

                // Contain within lamp body (narrower column)
                const lampLeft = 0.2, lampRight = 0.8;
                if (x < lampLeft + r) { x = lampLeft + r; vx = Math.abs(vx) * 0.5; }
                if (x > lampRight - r) { x = lampRight - r; vx = -Math.abs(vx) * 0.5; }
                if (y < r) { y = r; vy = Math.abs(vy) * 0.3; }
                if (y > 1.0 - r) { y = 1.0 - r; vy = -Math.abs(vy) * 0.3; }

                blobData[b + 0] = x;
                blobData[b + 1] = y;
                blobData[b + 2] = vx;
                blobData[b + 3] = vy;

                // Pack for GPU
                blobGPU[i * 4 + 0] = x;
                blobGPU[i * 4 + 1] = y;
                blobGPU[i * 4 + 2] = r;
                blobGPU[i * 4 + 3] = blobData[b + 6]; // hue
            }
            device.queue.writeBuffer(blobBuffer, 0, blobGPU);
        }

        const shaderCode = `
            struct Uniforms {
                resolution: vec2f,
                time: f32,
                blobCount: u32,
                threshold: f32,
                colorTheme: u32,
                aspect: f32,
                speed: f32,
                pad1: f32,
                pad2: f32,
                pad3: f32,
                pad4: f32,
                pad5: f32,
                pad6: f32,
                pad7: f32,
                pad8: f32,
            }

            @group(0) @binding(0) var outTex: texture_storage_2d<rgba8unorm, write>;
            @group(0) @binding(1) var<uniform> u: Uniforms;
            @group(0) @binding(2) var<storage, read> blobs: array<f32>;

            fn hsl2rgb(h: f32, s: f32, l: f32) -> vec3f {
                let c = (1.0 - abs(2.0 * l - 1.0)) * s;
                let x = c * (1.0 - abs((h * 6.0) % 2.0 - 1.0));
                let m = l - c * 0.5;
                let hi = u32(h * 6.0) % 6u;
                var rgb: vec3f;
                if (hi == 0u) { rgb = vec3f(c, x, 0.0); }
                else if (hi == 1u) { rgb = vec3f(x, c, 0.0); }
                else if (hi == 2u) { rgb = vec3f(0.0, c, x); }
                else if (hi == 3u) { rgb = vec3f(0.0, x, c); }
                else if (hi == 4u) { rgb = vec3f(x, 0.0, c); }
                else { rgb = vec3f(c, 0.0, x); }
                return rgb + vec3f(m);
            }

            fn getThemeColor(fieldVal: f32, dominantHue: f32) -> vec3f {
                let v = clamp(fieldVal, 0.0, 1.0);
                if (u.colorTheme == 0u) {
                    // Lava: dark red -> orange -> bright yellow
                    let r = smoothstep(0.0, 0.5, v) * 1.0;
                    let g = smoothstep(0.3, 0.8, v) * 0.7;
                    let b2 = smoothstep(0.6, 1.0, v) * 0.2;
                    return vec3f(r, g, b2);
                } else if (u.colorTheme == 1u) {
                    // Slime: dark green -> bright green -> yellow
                    let r = smoothstep(0.5, 1.0, v) * 0.6;
                    let g = smoothstep(0.0, 0.4, v) * 0.9;
                    let b2 = smoothstep(0.0, 0.3, v) * 0.2;
                    return vec3f(r, g, b2);
                } else if (u.colorTheme == 2u) {
                    // Plasma: purple -> pink -> white
                    let h = fract(0.75 + v * 0.2 + dominantHue * 0.1);
                    return hsl2rgb(h, 0.8, 0.3 + v * 0.5);
                } else {
                    // Water: deep blue -> cyan -> white
                    let h = fract(0.55 - v * 0.08);
                    return hsl2rgb(h, 0.7, 0.15 + v * 0.6);
                }
            }

            @compute @workgroup_size(8, 8)
            fn main(@builtin(global_invocation_id) id: vec3u) {
                let w = u32(u.resolution.x);
                let h = u32(u.resolution.y);
                if (id.x >= w || id.y >= h) { return; }

                let uv = vec2f(f32(id.x) / u.resolution.x, f32(id.y) / u.resolution.y);

                // Lamp container shape: tapered cylinder
                let lampCenter = 0.5;
                let lampWidth = 0.25 + 0.05 * sin(uv.y * 3.14159); // slight hourglass
                let distFromCenter = abs(uv.x - lampCenter);
                let insideLamp = step(distFromCenter, lampWidth);

                // Glass edge darkening
                let edgeDist = distFromCenter / lampWidth;
                let glassDark = smoothstep(1.0, 0.7, edgeDist);

                // Compute metaball field
                var field: f32 = 0.0;
                var dominantHue: f32 = 0.0;
                var maxContrib: f32 = 0.0;

                for (var i = 0u; i < u.blobCount; i++) {
                    let bx = blobs[i * 4u];
                    let by = blobs[i * 4u + 1u];
                    let br = blobs[i * 4u + 2u];
                    let bh = blobs[i * 4u + 3u];

                    let dx = (uv.x - bx) * u.aspect;
                    let dy = uv.y - by;
                    let dist2 = dx * dx + dy * dy;
                    let contribution = (br * br) / (dist2 + 0.0001);
                    field += contribution;

                    if (contribution > maxContrib) {
                        maxContrib = contribution;
                        dominantHue = bh;
                    }
                }

                // Threshold the field
                let thresh = u.threshold;
                let surfaceVal = smoothstep(thresh * 0.8, thresh * 1.2, field);

                // Color based on field strength
                let fieldNorm = clamp((field - thresh * 0.5) / (thresh * 2.0), 0.0, 1.0);
                var blobColor = getThemeColor(fieldNorm, dominantHue);

                // Add internal gradient / specular highlight
                let highlight = pow(clamp(fieldNorm, 0.0, 1.0), 3.0) * 0.4;
                blobColor += vec3f(highlight);

                // Ambient glow around blobs (even outside threshold)
                let ambientGlow = smoothstep(thresh * 0.3, thresh * 0.8, field);
                var glowColor = getThemeColor(0.3, dominantHue) * 0.15;

                // Container background
                var bgColor: vec3f;
                if (u.colorTheme == 0u) {
                    bgColor = vec3f(0.05, 0.01, 0.0); // dark red-brown
                } else if (u.colorTheme == 1u) {
                    bgColor = vec3f(0.01, 0.04, 0.02); // dark green
                } else if (u.colorTheme == 2u) {
                    bgColor = vec3f(0.03, 0.01, 0.05); // dark purple
                } else {
                    bgColor = vec3f(0.01, 0.02, 0.06); // dark blue
                }

                // Compose: background + glow + blobs
                var col = bgColor;
                col = mix(col, col + glowColor, ambientGlow);
                col = mix(col, blobColor, surfaceVal);

                // Apply glass container mask
                col *= insideLamp * glassDark;

                // Container border (glass edge)
                let borderDist = abs(distFromCenter - lampWidth);
                let borderGlow = exp(-borderDist * borderDist / 0.0001) * 0.3;
                col += vec3f(0.15, 0.15, 0.2) * borderGlow;

                // Cap top and bottom with metallic look
                let capTop = smoothstep(0.02, 0.0, uv.y) + smoothstep(0.98, 1.0, uv.y);
                col = mix(col, vec3f(0.12, 0.12, 0.15), capTop * insideLamp);

                // Outside the lamp: very dark
                let outsideColor = vec3f(0.015, 0.015, 0.02);
                col = mix(outsideColor, col, insideLamp);

                // Subtle reflection on glass
                let reflectX = smoothstep(lampWidth * 0.6, lampWidth * 0.7, distFromCenter) *
                               smoothstep(lampWidth, lampWidth * 0.8, distFromCenter);
                col += vec3f(0.04) * reflectX * insideLamp;

                col = clamp(col, vec3f(0.0), vec3f(1.0));
                textureStore(outTex, vec2u(id.x, id.y), vec4f(col, 1.0));
            }
        `;

        const outTexture = device.createTexture({
            size: [W, H], format: 'rgba8unorm',
            usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING
        });

        const bindGroupLayout = device.createBindGroupLayout({
            entries: [
                { binding: 0, visibility: GPUShaderStage.COMPUTE, storageTexture: { access: 'write-only', format: 'rgba8unorm', viewDimension: '2d' } },
                { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
                { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
            ],
        });
        const pipeline = device.createComputePipeline({
            layout: device.createPipelineLayout({ bindGroupLayouts: [bindGroupLayout] }),
            compute: { module: device.createShaderModule({ code: shaderCode }), entryPoint: 'main' },
        });
        const bindGroup = device.createBindGroup({
            layout: bindGroupLayout,
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: { buffer: uniformBuffer } },
                { binding: 2, resource: { buffer: blobBuffer } },
            ],
        });

        // Blit
        const blitModule = device.createShaderModule({ code: `
            @group(0) @binding(0) var tex: texture_2d<f32>;
            @group(0) @binding(1) var samp: sampler;
            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VSOut {
                var pos = array<vec2f, 6>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(-1,1), vec2f(1,-1), vec2f(1,1));
                var out: VSOut;
                out.pos = vec4f(pos[i], 0, 1);
                out.uv = pos[i] * 0.5 + 0.5;
                out.uv.y = 1.0 - out.uv.y;
                return out;
            }
            @fragment fn fs(inp: VSOut) -> @location(0) vec4f {
                return textureSample(tex, samp, inp.uv);
            }
        `});
        const blitBGL = device.createBindGroupLayout({
            entries: [
                { binding: 0, visibility: GPUShaderStage.FRAGMENT, texture: { sampleType: 'float' } },
                { binding: 1, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
            ],
        });
        const blitPipeline = device.createRenderPipeline({
            layout: device.createPipelineLayout({ bindGroupLayouts: [blitBGL] }),
            vertex: { module: blitModule, entryPoint: 'vs' },
            fragment: { module: blitModule, entryPoint: 'fs', targets: [{ format }] },
        });
        const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });
        const blitBG = device.createBindGroup({
            layout: blitBGL,
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: sampler },
            ],
        });

        let fpsC = 0, fpsT = performance.now(), lastTime = performance.now();

        function frame() {
            requestAnimationFrame(frame);
            const now = performance.now();
            const dt = Math.min((now - lastTime) * 0.001, 0.05);
            lastTime = now;
            fpsC++;
            if (now - fpsT > 500) {
                document.getElementById('fps').textContent = Math.round(fpsC / ((now - fpsT) / 1000));
                fpsC = 0; fpsT = now;
            }

            const time = now * 0.001;
            updateBlobs(dt, time);

            const uData = new Float32Array(16);
            const uInt = new Uint32Array(uData.buffer);
            uData[0] = W; uData[1] = H;
            uData[2] = time;
            uInt[3] = blobCount;
            uData[4] = threshold;
            uInt[5] = colorTheme;
            uData[6] = W / H;
            uData[7] = speed;
            device.queue.writeBuffer(uniformBuffer, 0, uData);

            const encoder = device.createCommandEncoder();
            const cp = encoder.beginComputePass();
            cp.setPipeline(pipeline);
            cp.setBindGroup(0, bindGroup);
            cp.dispatchWorkgroups(Math.ceil(W / 8), Math.ceil(H / 8));
            cp.end();

            const rp = encoder.beginRenderPass({
                colorAttachments: [{ view: context.getCurrentTexture().createView(), loadOp: 'clear', storeOp: 'store', clearValue: { r: 0, g: 0, b: 0, a: 1 } }],
            });
            rp.setPipeline(blitPipeline);
            rp.setBindGroup(0, blitBG);
            rp.draw(6);
            rp.end();
            device.queue.submit([encoder.finish()]);
        }

        document.getElementById('blobCount').oninput = e => { blobCount = +e.target.value; document.getElementById('blobVal').textContent = blobCount; };
        document.getElementById('speed').oninput = e => { speed = +e.target.value; document.getElementById('speedVal').textContent = speed.toFixed(1); };
        document.getElementById('threshold').oninput = e => { threshold = +e.target.value; document.getElementById('threshVal').textContent = threshold.toFixed(1); };
        document.getElementById('viscosity').oninput = e => { viscosity = +e.target.value; document.getElementById('viscVal').textContent = viscosity.toFixed(1); };
        document.getElementById('colorTheme').onchange = e => { colorTheme = +e.target.value; };

        requestAnimationFrame(frame);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
