<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPH Water Simulation - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 14px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input { width: 100%; }
        .controls button { margin-top: 8px; padding: 6px 14px; background: #22d3ee; color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; width: 100%; font-weight: 600; }
        .controls button:hover { background: #67e8f9; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        .title-overlay { position: fixed; top: 70px; left: 20px; z-index: 90; }
        .title-overlay h1 { font-size: 1.4rem; color: #22d3ee; margin: 0 0 4px 0; }
        .title-overlay p { font-size: 0.85rem; color: #888; margin: 0; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(220, 50, 50, 0.95); padding: 30px 40px; border-radius: 12px; display: none; text-align: center; max-width: 400px; line-height: 1.6; }
        .info { font-size: 10px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to WebGPU Gallery</a>

    <div class="title-overlay">
        <h1>SPH Water Simulation</h1>
        <p>Smoothed Particle Hydrodynamics on GPU</p>
    </div>

    <div class="controls">
        <label>Particles: <span id="countVal">8000</span></label>
        <input type="range" id="count" min="2000" max="15000" step="1000" value="8000">
        <label>Viscosity: <span id="viscVal">100</span></label>
        <input type="range" id="viscosity" min="10" max="500" step="10" value="100">
        <label>Stiffness: <span id="stiffVal">500</span></label>
        <input type="range" id="stiffness" min="100" max="2000" step="100" value="500">
        <label>Gravity: <span id="gravVal">9.8</span></label>
        <input type="range" id="gravity" min="0" max="30" step="0.5" value="9.8">
        <button onclick="resetSim()">Reset</button>
        <div class="info">Click to push water</div>
    </div>

    <div class="stats">
        FPS: <span id="fps">0</span> | Particles: <span id="particles">0</span>
    </div>

    <div id="error">
        <h2>WebGPU Not Supported</h2>
        <p>Please use Chrome 113+, Edge 113+, or Safari 18+.</p>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let NUM_PARTICLES = 8000;
        let viscosityCoeff = 100.0;
        let stiffness = 500.0;
        let gravityVal = 9.8;
        let mouseX = -1000, mouseY = -1000, mouseActive = 0;

        const H = 16.0;        // Smoothing radius
        const REST_DENSITY = 1.0;
        const MASS = 1.0;
        const DT = 0.004;

        // Simulation domain
        const DOMAIN_W = canvas.width;
        const DOMAIN_H = canvas.height;

        if (!navigator.gpu) {
            document.getElementById('error').style.display = 'block';
            throw new Error('WebGPU not supported');
        }

        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice({ requiredLimits: { maxStorageBufferBindingSize: 256 * 1024 * 1024 } });
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'premultiplied' });

        // SPH kernels and compute shader
        // We use a simple all-pairs approach but with spatial hashing for neighbor search
        // For simplicity and robustness, we'll use a brute-force approach with tiling

        const computeShader = `
            struct Particle {
                pos: vec2f,
                vel: vec2f,
                density: f32,
                pressure: f32,
                _pad0: f32,
                _pad1: f32,
            }

            struct Uniforms {
                numParticles: u32,
                h: f32,
                restDensity: f32,
                mass: f32,
                stiffness: f32,
                viscosity: f32,
                gravity: f32,
                dt: f32,
                domainW: f32,
                domainH: f32,
                mouseX: f32,
                mouseY: f32,
                mouseActive: f32,
                _pad0: f32,
                _pad1: f32,
                _pad2: f32,
            }

            @group(0) @binding(0) var<storage, read_write> particles: array<Particle>;
            @group(0) @binding(1) var<uniform> u: Uniforms;

            const PI: f32 = 3.14159265;

            // Poly6 kernel for density
            fn poly6(r: f32, h: f32) -> f32 {
                if (r >= h) { return 0.0; }
                let coeff = 4.0 / (PI * pow(h, 8.0));
                let diff = h * h - r * r;
                return coeff * diff * diff * diff;
            }

            // Spiky kernel gradient for pressure
            fn spikyGrad(r: f32, h: f32) -> f32 {
                if (r >= h || r < 0.001) { return 0.0; }
                let coeff = -10.0 / (PI * pow(h, 5.0));
                let diff = h - r;
                return coeff * diff * diff * diff / r;
            }

            // Viscosity laplacian
            fn viscLaplacian(r: f32, h: f32) -> f32 {
                if (r >= h) { return 0.0; }
                let coeff = 40.0 / (PI * pow(h, 5.0));
                return coeff * (h - r);
            }

            @compute @workgroup_size(256)
            fn computeDensity(@builtin(global_invocation_id) gid: vec3u) {
                let i = gid.x;
                if (i >= u.numParticles) { return; }

                var density: f32 = 0.0;
                let pi = particles[i].pos;

                for (var j = 0u; j < u.numParticles; j++) {
                    let diff = pi - particles[j].pos;
                    let r = length(diff);
                    density += u.mass * poly6(r, u.h);
                }

                particles[i].density = max(density, 0.001);
                // Tait equation of state
                particles[i].pressure = u.stiffness * (particles[i].density - u.restDensity);
            }

            @compute @workgroup_size(256)
            fn computeForces(@builtin(global_invocation_id) gid: vec3u) {
                let i = gid.x;
                if (i >= u.numParticles) { return; }

                var p = particles[i];
                var fPressure = vec2f(0.0);
                var fViscosity = vec2f(0.0);

                for (var j = 0u; j < u.numParticles; j++) {
                    if (j == i) { continue; }

                    let pj = particles[j];
                    let diff = p.pos - pj.pos;
                    let r = length(diff);
                    if (r >= u.h || r < 0.001) { continue; }

                    let dir = diff / r;

                    // Pressure force
                    let pressureForce = -u.mass * (p.pressure + pj.pressure) / (2.0 * pj.density) * spikyGrad(r, u.h);
                    fPressure += dir * pressureForce;

                    // Viscosity force
                    fViscosity += u.viscosity * u.mass * (pj.vel - p.vel) / pj.density * viscLaplacian(r, u.h);
                }

                // Gravity
                let fGravity = vec2f(0.0, u.gravity * p.density);

                // Mouse repulsion
                var fMouse = vec2f(0.0);
                if (u.mouseActive > 0.5) {
                    let mousePos = vec2f(u.mouseX, u.mouseY);
                    let toMouse = p.pos - mousePos;
                    let md = length(toMouse);
                    if (md < 100.0 && md > 1.0) {
                        fMouse = normalize(toMouse) * (100.0 - md) * 50.0;
                    }
                }

                let totalForce = fPressure + fViscosity + fGravity + fMouse;
                let acc = totalForce / max(p.density, 0.001);

                // Integration
                p.vel += acc * u.dt;
                p.pos += p.vel * u.dt;

                // Boundary conditions
                let margin: f32 = 5.0;
                let bounce: f32 = 0.3;

                if (p.pos.x < margin) { p.pos.x = margin; p.vel.x *= -bounce; }
                if (p.pos.x > u.domainW - margin) { p.pos.x = u.domainW - margin; p.vel.x *= -bounce; }
                if (p.pos.y < margin) { p.pos.y = margin; p.vel.y *= -bounce; }
                if (p.pos.y > u.domainH - margin) { p.pos.y = u.domainH - margin; p.vel.y *= -bounce; }

                particles[i] = p;
            }
        `;

        const renderShader = `
            struct Particle {
                pos: vec2f,
                vel: vec2f,
                density: f32,
                pressure: f32,
                _pad0: f32,
                _pad1: f32,
            }

            struct VertexOutput {
                @builtin(position) pos: vec4f,
                @location(0) color: vec4f,
                @location(1) center: vec2f,
                @location(2) pointCoord: vec2f,
            }

            @group(0) @binding(0) var<storage, read> particles: array<Particle>;
            @group(0) @binding(1) var<uniform> resolution: vec2f;

            @vertex
            fn vs(@builtin(vertex_index) vi: u32, @builtin(instance_index) ii: u32) -> VertexOutput {
                let p = particles[ii];

                // Quad vertices for instanced rendering
                let quadPos = array<vec2f, 6>(
                    vec2f(-1, -1), vec2f(1, -1), vec2f(-1, 1),
                    vec2f(-1, 1), vec2f(1, -1), vec2f(1, 1)
                );

                let size = 4.0;
                let offset = quadPos[vi] * size;

                let screenPos = p.pos + offset;
                let ndc = (screenPos / resolution) * 2.0 - 1.0;

                // Color by pressure
                let pressure = clamp(p.pressure * 0.005, 0.0, 1.0);
                let speed = length(p.vel);
                let speedT = clamp(speed * 0.01, 0.0, 1.0);

                let deepBlue = vec3f(0.05, 0.15, 0.6);
                let lightBlue = vec3f(0.3, 0.6, 0.95);
                let white = vec3f(0.9, 0.95, 1.0);

                var color: vec3f;
                if (pressure < 0.5) {
                    color = mix(deepBlue, lightBlue, pressure * 2.0);
                } else {
                    color = mix(lightBlue, white, (pressure - 0.5) * 2.0);
                }
                color = mix(color, white, speedT * 0.5);

                var out: VertexOutput;
                out.pos = vec4f(ndc.x, -ndc.y, 0.0, 1.0);
                out.color = vec4f(color, 0.85);
                out.center = p.pos;
                out.pointCoord = quadPos[vi];
                return out;
            }

            @fragment
            fn fs(@location(0) color: vec4f, @location(1) center: vec2f, @location(2) pc: vec2f) -> @location(0) vec4f {
                let d = length(pc);
                if (d > 1.0) { discard; }
                let alpha = smoothstep(1.0, 0.5, d) * color.a;
                return vec4f(color.rgb, alpha);
            }
        `;

        const densityPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: computeShader }), entryPoint: 'computeDensity' }
        });

        const forcesPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: computeShader }), entryPoint: 'computeForces' }
        });

        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: device.createShaderModule({ code: renderShader }), entryPoint: 'vs' },
            fragment: {
                module: device.createShaderModule({ code: renderShader }),
                entryPoint: 'fs',
                targets: [{
                    format,
                    blend: {
                        color: { srcFactor: 'src-alpha', dstFactor: 'one-minus-src-alpha', operation: 'add' },
                        alpha: { srcFactor: 'one', dstFactor: 'one-minus-src-alpha', operation: 'add' }
                    }
                }]
            },
            primitive: { topology: 'triangle-list' }
        });

        let particleBuffer, uniformBuffer, resolutionBuffer;
        let densityBindGroup, forcesBindGroup, renderBindGroup;

        function initParticles() {
            const data = new Float32Array(NUM_PARTICLES * 8);
            // Dam-break initial condition: block of water on the left
            const cols = Math.ceil(Math.sqrt(NUM_PARTICLES * 0.5));
            const spacing = H * 0.5;

            for (let i = 0; i < NUM_PARTICLES; i++) {
                const row = Math.floor(i / cols);
                const col = i % cols;
                data[i * 8]     = 50 + col * spacing + (Math.random() - 0.5) * 2;
                data[i * 8 + 1] = canvas.height - 50 - row * spacing + (Math.random() - 0.5) * 2;
                data[i * 8 + 2] = 0; // vx
                data[i * 8 + 3] = 0; // vy
                data[i * 8 + 4] = REST_DENSITY; // density
                data[i * 8 + 5] = 0; // pressure
                data[i * 8 + 6] = 0;
                data[i * 8 + 7] = 0;
            }

            particleBuffer = device.createBuffer({
                size: data.byteLength,
                usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
                mappedAtCreation: true
            });
            new Float32Array(particleBuffer.getMappedRange()).set(data);
            particleBuffer.unmap();

            uniformBuffer = device.createBuffer({ size: 64, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
            resolutionBuffer = device.createBuffer({ size: 8, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
            device.queue.writeBuffer(resolutionBuffer, 0, new Float32Array([canvas.width, canvas.height]));

            densityBindGroup = device.createBindGroup({
                layout: densityPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: particleBuffer } },
                    { binding: 1, resource: { buffer: uniformBuffer } }
                ]
            });

            forcesBindGroup = device.createBindGroup({
                layout: forcesPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: particleBuffer } },
                    { binding: 1, resource: { buffer: uniformBuffer } }
                ]
            });

            renderBindGroup = device.createBindGroup({
                layout: renderPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: particleBuffer } },
                    { binding: 1, resource: { buffer: resolutionBuffer } }
                ]
            });

            document.getElementById('particles').textContent = NUM_PARTICLES.toLocaleString();
        }

        initParticles();

        let lastTime = performance.now();
        let fpsFrames = 0, fpsTime = 0;

        function render() {
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            fpsFrames++;
            fpsTime += dt;
            if (fpsTime >= 1.0) {
                document.getElementById('fps').textContent = Math.round(fpsFrames / fpsTime);
                fpsFrames = 0; fpsTime = 0;
            }

            // Update uniforms
            const buf = new ArrayBuffer(64);
            const u32 = new Uint32Array(buf);
            const f32 = new Float32Array(buf);
            u32[0] = NUM_PARTICLES;
            f32[1] = H;
            f32[2] = REST_DENSITY;
            f32[3] = MASS;
            f32[4] = stiffness;
            f32[5] = viscosityCoeff;
            f32[6] = gravityVal;
            f32[7] = DT;
            f32[8] = canvas.width;
            f32[9] = canvas.height;
            f32[10] = mouseX;
            f32[11] = mouseY;
            f32[12] = mouseActive;
            device.queue.writeBuffer(uniformBuffer, 0, buf);

            const encoder = device.createCommandEncoder();

            // Substeps
            const substeps = 2;
            for (let s = 0; s < substeps; s++) {
                // Density pass
                const dp = encoder.beginComputePass();
                dp.setPipeline(densityPipeline);
                dp.setBindGroup(0, densityBindGroup);
                dp.dispatchWorkgroups(Math.ceil(NUM_PARTICLES / 256));
                dp.end();

                // Forces pass
                const fp = encoder.beginComputePass();
                fp.setPipeline(forcesPipeline);
                fp.setBindGroup(0, forcesBindGroup);
                fp.dispatchWorkgroups(Math.ceil(NUM_PARTICLES / 256));
                fp.end();
            }

            // Render
            const rp = encoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    loadOp: 'clear',
                    clearValue: { r: 0.02, g: 0.03, b: 0.08, a: 1 },
                    storeOp: 'store'
                }]
            });
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, renderBindGroup);
            rp.draw(6, NUM_PARTICLES);
            rp.end();

            device.queue.submit([encoder.finish()]);
            requestAnimationFrame(render);
        }

        function resetSim() { initParticles(); }
        window.resetSim = resetSim;

        // Controls
        document.getElementById('count').addEventListener('input', (e) => {
            NUM_PARTICLES = parseInt(e.target.value);
            document.getElementById('countVal').textContent = NUM_PARTICLES;
            initParticles();
        });
        document.getElementById('viscosity').addEventListener('input', (e) => {
            viscosityCoeff = parseFloat(e.target.value);
            document.getElementById('viscVal').textContent = viscosityCoeff;
        });
        document.getElementById('stiffness').addEventListener('input', (e) => {
            stiffness = parseFloat(e.target.value);
            document.getElementById('stiffVal').textContent = stiffness;
        });
        document.getElementById('gravity').addEventListener('input', (e) => {
            gravityVal = parseFloat(e.target.value);
            document.getElementById('gravVal').textContent = gravityVal.toFixed(1);
        });

        // Mouse
        canvas.addEventListener('mousedown', (e) => { mouseActive = 1; mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('mouseup', () => { mouseActive = 0; });
        canvas.addEventListener('mouseleave', () => { mouseActive = 0; });
        canvas.addEventListener('mousemove', (e) => { if (mouseActive) { mouseX = e.clientX; mouseY = e.clientY; } });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            context.configure({ device, format, alphaMode: 'premultiplied' });
            initParticles();
        });

        render();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
