<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFS Fractal Flames - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls select { width: 170px; background: #1a1a2e; color: #e8e6e1; border: 1px solid #22d3ee; border-radius: 4px; padding: 3px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; line-height: 1.6; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #22d3ee; font-size: 14px; font-weight: 600; z-index: 100; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); pointer-events: none; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div class="title">IFS Fractal Flames</div>

    <div class="controls">
        <label>Speed: <span id="speedVal">1.0</span></label>
        <input type="range" id="speed" min="0.1" max="3.0" step="0.1" value="1.0">
        <label>Variation Mix: <span id="mixVal">0.5</span></label>
        <input type="range" id="mix" min="0.0" max="1.0" step="0.05" value="0.5">
        <label>Color Theme:</label>
        <select id="theme">
            <option value="0">Fire</option>
            <option value="1">Ice</option>
            <option value="2">Neon</option>
            <option value="3">Rainbow</option>
        </select>
    </div>

    <div class="stats">
        FPS: <span id="fps">0</span> | Particles: 500K
    </div>

    <div id="error">
        WebGPU is not supported in your browser.<br>
        Please use Chrome 113+, Edge 113+, or Safari 18+.
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'opaque' });

        const W = canvas.width, H = canvas.height;
        const NUM_PARTICLES = 500000;
        const HIST_W = Math.min(W, 1920);
        const HIST_H = Math.min(H, 1080);

        let speed = 1.0, variationMix = 0.5, theme = 0;

        // Uniform buffer: time, speed, mix, theme, histW, histH, aspect
        const uniformBuffer = device.createBuffer({ size: 48, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        // Particle buffer: each particle has (x, y, colorIndex, pad) = 4 floats = 16 bytes
        const particleData = new Float32Array(NUM_PARTICLES * 4);
        for (let i = 0; i < NUM_PARTICLES; i++) {
            particleData[i * 4 + 0] = (Math.random() - 0.5) * 4.0; // x
            particleData[i * 4 + 1] = (Math.random() - 0.5) * 4.0; // y
            particleData[i * 4 + 2] = Math.random(); // color index
            particleData[i * 4 + 3] = 0; // pad
        }
        const particleBuffer = device.createBuffer({
            size: particleData.byteLength,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
        });
        device.queue.writeBuffer(particleBuffer, 0, particleData);

        // Histogram buffer: RGBA accumulator per pixel
        const histSize = HIST_W * HIST_H * 4 * 4; // 4 floats per pixel
        const histBuffer = device.createBuffer({
            size: histSize,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
        });

        // Output texture for rendering
        const outTexture = device.createTexture({
            size: [W, H], format: 'rgba8unorm',
            usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING
        });

        // ---- IFS Compute Shader: update particles and scatter to histogram ----
        const ifsShader = `
            struct Uniforms {
                time: f32,
                speed: f32,
                mix_val: f32,
                theme: u32,
                histW: u32,
                histH: u32,
                aspect: f32,
                frame: u32,
            }

            struct Particle {
                x: f32,
                y: f32,
                colorIdx: f32,
                pad: f32,
            }

            @group(0) @binding(0) var<storage, read_write> particles: array<Particle>;
            @group(0) @binding(1) var<storage, read_write> histogram: array<u32>;
            @group(0) @binding(2) var<uniform> u: Uniforms;

            // Simple hash for pseudo-random
            fn pcg(inp: u32) -> u32 {
                var state = inp * 747796405u + 2891336453u;
                var word = ((state >> ((state >> 28u) + 4u)) ^ state) * 277803737u;
                return (word >> 22u) ^ word;
            }

            fn randf(seed: u32) -> f32 {
                return f32(pcg(seed)) / 4294967296.0;
            }

            // IFS Variations
            fn sinusoidal(p: vec2f) -> vec2f {
                return vec2f(sin(p.x), sin(p.y));
            }

            fn spherical(p: vec2f) -> vec2f {
                let r2 = dot(p, p) + 1e-6;
                return p / r2;
            }

            fn swirl(p: vec2f) -> vec2f {
                let r2 = dot(p, p);
                let s = sin(r2);
                let c = cos(r2);
                return vec2f(p.x * s - p.y * c, p.x * c + p.y * s);
            }

            fn horseshoe(p: vec2f) -> vec2f {
                let r = length(p) + 1e-6;
                return vec2f((p.x - p.y) * (p.x + p.y), 2.0 * p.x * p.y) / r;
            }

            @compute @workgroup_size(256)
            fn main(@builtin(global_invocation_id) id: vec3u) {
                let idx = id.x;
                if (idx >= arrayLength(&particles)) { return; }

                var p = particles[idx];
                let pos = vec2f(p.x, p.y);

                // Use hash for random function selection
                let seed = idx * 1000u + u.frame;
                let r = randf(seed);
                let mixv = u.mix_val;

                // Animate affine transforms slightly over time
                let t = u.time * u.speed * 0.3;

                // Pick one of 4 IFS functions
                var newPos: vec2f;
                var newColor: f32;

                if (r < 0.25) {
                    // Affine transform 1 + sinusoidal
                    let ax = pos.x * 0.5 + 0.3 * cos(t * 0.7);
                    let ay = pos.y * 0.5 + 0.3 * sin(t * 0.5);
                    let affine = vec2f(ax, ay);
                    newPos = mix(affine, sinusoidal(affine), mixv);
                    newColor = 0.0;
                } else if (r < 0.5) {
                    // Affine transform 2 + spherical
                    let s = sin(t * 0.3); let c = cos(t * 0.3);
                    let ax = pos.x * c - pos.y * s;
                    let ay = pos.x * s + pos.y * c;
                    let affine = vec2f(ax * 0.6, ay * 0.6);
                    newPos = mix(affine, spherical(affine), mixv);
                    newColor = 0.33;
                } else if (r < 0.75) {
                    // Affine transform 3 + swirl
                    let ax = pos.x * 0.5 - 0.2 * sin(t * 0.4);
                    let ay = -pos.y * 0.5 + 0.2 * cos(t * 0.6);
                    let affine = vec2f(ax, ay);
                    newPos = mix(affine, swirl(affine), mixv);
                    newColor = 0.66;
                } else {
                    // Affine transform 4 + horseshoe
                    let ax = pos.x * 0.4 + 0.1;
                    let ay = pos.y * 0.4 + 0.1 * sin(t);
                    let affine = vec2f(ax, ay);
                    newPos = mix(affine, horseshoe(affine), mixv);
                    newColor = 1.0;
                }

                // Blend color with previous
                let blendedColor = mix(p.colorIdx, newColor, 0.5);

                // Clamp position to avoid runaways
                newPos = clamp(newPos, vec2f(-3.0), vec2f(3.0));

                p.x = newPos.x;
                p.y = newPos.y;
                p.colorIdx = blendedColor;
                particles[idx] = p;

                // Map position to histogram pixel
                let hw = f32(u.histW);
                let hh = f32(u.histH);
                let px = i32((newPos.x / 6.0 + 0.5) * hw);
                let py = i32((newPos.y / 6.0 + 0.5) * hh);

                if (px >= 0 && px < i32(u.histW) && py >= 0 && py < i32(u.histH)) {
                    let histIdx = (u32(py) * u.histW + u32(px)) * 4u;
                    // Encode color into RGB channels based on colorIdx
                    let ci = blendedColor;
                    // Use atomicAdd for density accumulation
                    // Pack color as weighted R,G,B channels
                    let rw = u32(max(0.0, (1.0 - ci * 3.0)) * 16.0 + 8.0);
                    let gw = u32(max(0.0, (1.0 - abs(ci - 0.5) * 3.0)) * 16.0 + 8.0);
                    let bw = u32(max(0.0, (ci * 3.0 - 2.0)) * 16.0 + 8.0);
                    atomicAdd(&histogram[histIdx], rw);
                    atomicAdd(&histogram[histIdx + 1u], gw);
                    atomicAdd(&histogram[histIdx + 2u], bw);
                    atomicAdd(&histogram[histIdx + 3u], 1u);
                }
            }
        `;

        // ---- Tone-map shader: convert histogram to display texture ----
        const tonemapShader = `
            struct Uniforms {
                time: f32,
                speed: f32,
                mix_val: f32,
                theme: u32,
                histW: u32,
                histH: u32,
                aspect: f32,
                frame: u32,
            }

            @group(0) @binding(0) var<storage, read> histogram: array<u32>;
            @group(0) @binding(1) var outTex: texture_storage_2d<rgba8unorm, write>;
            @group(0) @binding(2) var<uniform> u: Uniforms;

            fn hsl2rgb(h: f32, s: f32, l: f32) -> vec3f {
                let c = (1.0 - abs(2.0 * l - 1.0)) * s;
                let hp = fract(h) * 6.0;
                let x = c * (1.0 - abs(hp % 2.0 - 1.0));
                var rgb: vec3f;
                if (hp < 1.0) { rgb = vec3f(c, x, 0.0); }
                else if (hp < 2.0) { rgb = vec3f(x, c, 0.0); }
                else if (hp < 3.0) { rgb = vec3f(0.0, c, x); }
                else if (hp < 4.0) { rgb = vec3f(0.0, x, c); }
                else if (hp < 5.0) { rgb = vec3f(x, 0.0, c); }
                else { rgb = vec3f(c, 0.0, x); }
                return rgb + vec3f(l - c * 0.5);
            }

            @compute @workgroup_size(8, 8)
            fn main(@builtin(global_invocation_id) id: vec3u) {
                let texW = textureDimensions(outTex).x;
                let texH = textureDimensions(outTex).y;
                if (id.x >= texW || id.y >= texH) { return; }

                // Map output pixel to histogram
                let hx = u32(f32(id.x) / f32(texW) * f32(u.histW));
                let hy = u32(f32(id.y) / f32(texH) * f32(u.histH));
                let histIdx = (hy * u.histW + hx) * 4u;

                let rv = f32(histogram[histIdx]);
                let gv = f32(histogram[histIdx + 1u]);
                let bv = f32(histogram[histIdx + 2u]);
                let count = f32(histogram[histIdx + 3u]);

                var color = vec3f(0.0);

                if (count > 0.0) {
                    // Log-density mapping (standard fractal flame technique)
                    let logDensity = log(count + 1.0) / log(256.0);
                    let brightness = pow(clamp(logDensity, 0.0, 1.0), 0.6);

                    // Normalize color
                    let total = rv + gv + bv + 1.0;
                    let nr = rv / total;
                    let ng = gv / total;
                    let nb = bv / total;

                    // Apply theme
                    if (u.theme == 0u) {
                        // Fire: reds, oranges, yellows
                        color = vec3f(
                            brightness * (0.5 + nr * 2.0),
                            brightness * brightness * (0.2 + ng * 0.8),
                            brightness * brightness * brightness * 0.3
                        );
                    } else if (u.theme == 1u) {
                        // Ice: blues, cyans, whites
                        color = vec3f(
                            brightness * brightness * 0.5,
                            brightness * (0.3 + nb * 0.7),
                            brightness * (0.6 + nr * 0.4)
                        );
                    } else if (u.theme == 2u) {
                        // Neon: vivid magentas, cyans, greens
                        let hue = fract(nr * 0.5 + ng * 0.3 + u.time * 0.01);
                        color = hsl2rgb(hue, 0.9, brightness * 0.6);
                    } else {
                        // Rainbow: full spectrum based on color index
                        let hue = fract(nr * 0.8 + ng * 0.5 + nb * 0.3);
                        color = hsl2rgb(hue, 0.85, brightness * 0.55);
                    }

                    // Gamma correction
                    color = pow(color, vec3f(0.8));
                }

                textureStore(outTex, vec2i(id.xy), vec4f(color, 1.0));
            }
        `;

        // ---- Clear histogram shader ----
        const clearShader = `
            @group(0) @binding(0) var<storage, read_write> histogram: array<u32>;
            @compute @workgroup_size(256)
            fn main(@builtin(global_invocation_id) id: vec3u) {
                let idx = id.x * 4u;
                if (idx + 3u < arrayLength(&histogram)) {
                    histogram[idx] = 0u;
                    histogram[idx + 1u] = 0u;
                    histogram[idx + 2u] = 0u;
                    histogram[idx + 3u] = 0u;
                }
            }
        `;

        const displayShader = `
            @group(0) @binding(0) var tex: texture_2d<f32>;
            @group(0) @binding(1) var samp: sampler;
            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VSOut {
                var p = array<vec2f,4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var u = array<vec2f,4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var o: VSOut; o.pos = vec4f(p[i], 0, 1); o.uv = u[i]; return o;
            }
            @fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                return textureSample(tex, samp, uv);
            }
        `;

        // Create pipelines
        const ifsPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: ifsShader }), entryPoint: 'main' }
        });

        const tonemapPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: tonemapShader }), entryPoint: 'main' }
        });

        const clearPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: clearShader }), entryPoint: 'main' }
        });

        const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });

        const displayPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: device.createShaderModule({ code: displayShader }), entryPoint: 'vs' },
            fragment: { module: device.createShaderModule({ code: displayShader }), entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-strip' }
        });

        // Bind groups
        const ifsBG = device.createBindGroup({
            layout: ifsPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: particleBuffer } },
                { binding: 1, resource: { buffer: histBuffer } },
                { binding: 2, resource: { buffer: uniformBuffer } }
            ]
        });

        const tonemapBG = device.createBindGroup({
            layout: tonemapPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: histBuffer } },
                { binding: 1, resource: outTexture.createView() },
                { binding: 2, resource: { buffer: uniformBuffer } }
            ]
        });

        const clearBG = device.createBindGroup({
            layout: clearPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: histBuffer } }
            ]
        });

        const displayBG = device.createBindGroup({
            layout: displayPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: sampler }
            ]
        });

        let fpsC = 0, fpsT = performance.now();
        let startTime = performance.now();
        let frameCount = 0;

        function frame() {
            requestAnimationFrame(frame);
            const now = performance.now();
            fpsC++;
            if (now - fpsT > 500) {
                document.getElementById('fps').textContent = Math.round(fpsC / ((now - fpsT) / 1000));
                fpsC = 0; fpsT = now;
            }

            const time = (now - startTime) * 0.001;
            frameCount++;

            const buf = new ArrayBuffer(48);
            const f32 = new Float32Array(buf);
            const u32 = new Uint32Array(buf);
            f32[0] = time;
            f32[1] = speed;
            f32[2] = variationMix;
            u32[3] = theme;
            u32[4] = HIST_W;
            u32[5] = HIST_H;
            f32[6] = W / H;
            u32[7] = frameCount;

            device.queue.writeBuffer(uniformBuffer, 0, buf);

            const enc = device.createCommandEncoder();

            // Clear histogram
            const clearPass = enc.beginComputePass();
            clearPass.setPipeline(clearPipeline);
            clearPass.setBindGroup(0, clearBG);
            clearPass.dispatchWorkgroups(Math.ceil(HIST_W * HIST_H / 256));
            clearPass.end();

            // Run IFS iterations (multiple passes for density)
            for (let i = 0; i < 4; i++) {
                const ifsPass = enc.beginComputePass();
                ifsPass.setPipeline(ifsPipeline);
                ifsPass.setBindGroup(0, ifsBG);
                ifsPass.dispatchWorkgroups(Math.ceil(NUM_PARTICLES / 256));
                ifsPass.end();
            }

            // Tonemap histogram to texture
            const tmPass = enc.beginComputePass();
            tmPass.setPipeline(tonemapPipeline);
            tmPass.setBindGroup(0, tonemapBG);
            tmPass.dispatchWorkgroups(Math.ceil(W / 8), Math.ceil(H / 8));
            tmPass.end();

            // Display
            const rp = enc.beginRenderPass({
                colorAttachments: [{ view: context.getCurrentTexture().createView(), loadOp: 'clear', storeOp: 'store' }]
            });
            rp.setPipeline(displayPipeline);
            rp.setBindGroup(0, displayBG);
            rp.draw(4);
            rp.end();

            device.queue.submit([enc.finish()]);
        }

        document.getElementById('speed').addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
            document.getElementById('speedVal').textContent = speed.toFixed(1);
        });
        document.getElementById('mix').addEventListener('input', (e) => {
            variationMix = parseFloat(e.target.value);
            document.getElementById('mixVal').textContent = variationMix.toFixed(2);
        });
        document.getElementById('theme').addEventListener('change', (e) => {
            theme = parseInt(e.target.value);
        });

        requestAnimationFrame(frame);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
