<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddhabrot - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 220px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls button { margin: 3px 2px; padding: 5px 10px; background: #22d3ee; color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .controls .row { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
        .controls .row button { flex: 1; min-width: 70px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; line-height: 1.6; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #22d3ee; font-size: 14px; font-weight: 600; z-index: 100; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); pointer-events: none; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
        .info { font-size: 10px; color: #888; margin-top: 8px; line-height: 1.4; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div class="title">Buddhabrot</div>

    <div class="controls">
        <label>Exposure: <span id="expVal">1.0</span></label>
        <input type="range" id="exposure" min="0.1" max="5.0" step="0.1" value="1.0">
        <label>Samples/Frame: <span id="sampVal">262144</span></label>
        <input type="range" id="samples" min="16" max="20" step="1" value="18">
        <label>Red (short): <span id="rVal">50</span> iters</label>
        <input type="range" id="rIter" min="10" max="200" step="10" value="50">
        <label>Green (med): <span id="gVal">500</span> iters</label>
        <input type="range" id="gIter" min="100" max="2000" step="100" value="500">
        <label>Blue (long): <span id="bVal">5000</span> iters</label>
        <input type="range" id="bIter" min="500" max="10000" step="500" value="5000">
        <div class="row">
            <button onclick="window.clearAccum()">Clear</button>
            <button onclick="window.togglePause()">Pause</button>
        </div>
        <div class="info">
            Accumulates samples over time.<br>
            Image reveals itself gradually.<br>
            More samples = richer detail.
        </div>
    </div>

    <div class="stats">
        FPS: <span id="fps">0</span><br>
        Total Samples: <span id="totalSamples">0</span><br>
        Frames: <span id="frameCount">0</span>
    </div>

    <div id="error">
        WebGPU is not supported in your browser.<br>
        Please use Chrome 113+, Edge 113+, or Safari 18+.
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        const SIZE = Math.min(window.innerWidth, window.innerHeight);
        canvas.width = SIZE;
        canvas.height = SIZE;
        canvas.style.position = 'fixed';
        canvas.style.left = ((window.innerWidth - SIZE) / 2) + 'px';
        canvas.style.top = ((window.innerHeight - SIZE) / 2) + 'px';
        canvas.style.width = SIZE + 'px';
        canvas.style.height = SIZE + 'px';
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'opaque' });

        const W = canvas.width, H = canvas.height;

        let exposure = 1.0;
        let samplesPerFrame = 1 << 18; // 262144
        let rIter = 50, gIter = 500, bIter = 5000;
        let paused = false;
        let totalSamples = 0;
        let frameNum = 0;

        // Accumulation buffer: 3 channels (R, G, B) as u32 atomics
        const accumSize = W * H * 4; // 4 u32s per pixel (R, G, B, padding)
        const accumBuffer = device.createBuffer({
            size: accumSize * 4,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
        });

        const uniformBuffer = device.createBuffer({ size: 64, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        // Compute shader: sample random points, trace orbits, accumulate
        const sampleShader = `
            struct Uniforms {
                resolution: vec2f,
                seed: f32,
                samplesPerDispatch: u32,
                rIter: u32,
                gIter: u32,
                bIter: u32,
                frameNum: u32,
                exposure: f32,
                pad0: f32,
                pad1: f32,
                pad2: f32,
            }

            @group(0) @binding(0) var<storage, read_write> accum: array<atomic<u32>>;
            @group(0) @binding(1) var<uniform> u: Uniforms;

            // PCG random
            fn pcg(s: u32) -> u32 {
                var state = s * 747796405u + 2891336453u;
                let word = ((state >> ((state >> 28u) + 4u)) ^ state) * 277803737u;
                return (word >> 22u) ^ word;
            }

            fn randomF(seed: u32) -> f32 {
                return f32(pcg(seed)) / 4294967295.0;
            }

            @compute @workgroup_size(256)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let idx = gid.x;
                let w = u32(u.resolution.x);
                let h = u32(u.resolution.y);

                // Generate random c in [-2, 2] x [-2, 2]
                var s = idx * 3u + u32(u.seed * 1000000.0) + u.frameNum * 7919u;
                let cr = randomF(s) * 4.0 - 2.0;
                s = pcg(s);
                let ci = randomF(s) * 4.0 - 2.0;
                s = pcg(s);

                // Quick cardioid/bulb rejection
                let q = (cr - 0.25) * (cr - 0.25) + ci * ci;
                let inCardioid = q * (q + (cr - 0.25)) < 0.25 * ci * ci;
                let inBulb = (cr + 1.0) * (cr + 1.0) + ci * ci < 0.0625;
                if (inCardioid || inBulb) { return; }

                // Test if point escapes
                var zr = 0.0;
                var zi = 0.0;
                let maxTest = u.bIter; // test with longest iteration count
                var escaped = false;
                var escapeIter = 0u;

                for (var i = 0u; i < maxTest; i++) {
                    let zr2 = zr * zr;
                    let zi2 = zi * zi;
                    if (zr2 + zi2 > 4.0) {
                        escaped = true;
                        escapeIter = i;
                        break;
                    }
                    zi = 2.0 * zr * zi + ci;
                    zr = zr2 - zi2 + cr;
                }

                if (!escaped) { return; }

                // Re-trace orbit and accumulate into appropriate channel(s)
                zr = 0.0;
                zi = 0.0;

                for (var i = 0u; i < escapeIter; i++) {
                    let zr2 = zr * zr;
                    let zi2 = zi * zi;
                    zi = 2.0 * zr * zi + ci;
                    zr = zr2 - zi2 + cr;

                    // Map z to pixel coords: [-2,2] -> [0, w]
                    let px = u32((zr + 2.0) * 0.25 * f32(w));
                    let py = u32((zi + 2.0) * 0.25 * f32(h));

                    if (px < w && py < h) {
                        let pidx = (py * w + px) * 4u;
                        // Accumulate into R, G, B channels based on escape iteration
                        if (escapeIter <= u.rIter) {
                            atomicAdd(&accum[pidx + 0u], 1u);
                        }
                        if (escapeIter <= u.gIter && escapeIter > u.rIter) {
                            atomicAdd(&accum[pidx + 1u], 1u);
                        }
                        if (escapeIter > u.gIter) {
                            atomicAdd(&accum[pidx + 2u], 1u);
                        }
                    }
                }
            }
        `;

        // Display shader: read accumulation buffer, tone map, render
        const displayShader = `
            struct Uniforms {
                resolution: vec2f,
                seed: f32,
                samplesPerDispatch: u32,
                rIter: u32,
                gIter: u32,
                bIter: u32,
                frameNum: u32,
                exposure: f32,
                pad0: f32,
                pad1: f32,
                pad2: f32,
            }

            @group(0) @binding(0) var outTex: texture_storage_2d<rgba8unorm, write>;
            @group(0) @binding(1) var<storage, read> accum: array<u32>;
            @group(0) @binding(2) var<uniform> u: Uniforms;

            @compute @workgroup_size(8, 8)
            fn main(@builtin(global_invocation_id) id: vec3u) {
                let w = u32(u.resolution.x);
                let h = u32(u.resolution.y);
                if (id.x >= w || id.y >= h) { return; }

                let pidx = (id.y * w + id.x) * 4u;
                let r = f32(accum[pidx + 0u]);
                let g = f32(accum[pidx + 1u]);
                let b = f32(accum[pidx + 2u]);

                // Log tone mapping
                let exp = u.exposure;
                let scale = exp * 0.15;
                let tr = log(1.0 + r * scale) / log(1.0 + 5000.0 * scale);
                let tg = log(1.0 + g * scale) / log(1.0 + 5000.0 * scale);
                let tb = log(1.0 + b * scale) / log(1.0 + 5000.0 * scale);

                // Color enhance
                let color = vec3f(
                    pow(tr, 0.8),
                    pow(tg, 0.75),
                    pow(tb, 0.7)
                );

                textureStore(outTex, vec2i(id.xy), vec4f(color, 1.0));
            }
        `;

        const renderShader = `
            @group(0) @binding(0) var tex: texture_2d<f32>;
            @group(0) @binding(1) var samp: sampler;
            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VSOut {
                var p = array<vec2f,4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var u = array<vec2f,4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var o: VSOut; o.pos = vec4f(p[i], 0, 1); o.uv = u[i]; return o;
            }
            @fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                return textureSample(tex, samp, uv);
            }
        `;

        const outTexture = device.createTexture({
            size: [W, H], format: 'rgba8unorm',
            usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING
        });

        // Sample compute pipeline
        const samplePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: sampleShader }), entryPoint: 'main' }
        });

        // Display compute pipeline
        const displayPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: displayShader }), entryPoint: 'main' }
        });

        const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });

        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: device.createShaderModule({ code: renderShader }), entryPoint: 'vs' },
            fragment: { module: device.createShaderModule({ code: renderShader }), entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-strip' }
        });

        const sampleBG = device.createBindGroup({
            layout: samplePipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: accumBuffer } },
                { binding: 1, resource: { buffer: uniformBuffer } }
            ]
        });

        const displayBG = device.createBindGroup({
            layout: displayPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: { buffer: accumBuffer } },
                { binding: 2, resource: { buffer: uniformBuffer } }
            ]
        });

        const renderBG = device.createBindGroup({
            layout: renderPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: sampler }
            ]
        });

        function clearAccumBuffer() {
            const zeros = new Uint32Array(W * H * 4);
            device.queue.writeBuffer(accumBuffer, 0, zeros);
            totalSamples = 0;
            frameNum = 0;
        }

        let fpsC = 0, fpsT = performance.now();

        function formatNumber(n) {
            if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
            if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return n.toString();
        }

        function frame() {
            requestAnimationFrame(frame);
            const now = performance.now();
            fpsC++;
            if (now - fpsT > 500) {
                document.getElementById('fps').textContent = Math.round(fpsC / ((now - fpsT) / 1000));
                fpsC = 0; fpsT = now;
            }

            const buf = new ArrayBuffer(64);
            const f32 = new Float32Array(buf);
            const u32 = new Uint32Array(buf);
            f32[0] = W; f32[1] = H;
            f32[2] = Math.random();
            u32[3] = samplesPerFrame;
            u32[4] = rIter;
            u32[5] = gIter;
            u32[6] = bIter;
            u32[7] = frameNum;
            f32[8] = exposure;

            device.queue.writeBuffer(uniformBuffer, 0, buf);

            const enc = device.createCommandEncoder();

            if (!paused) {
                // Sample pass
                const sp = enc.beginComputePass();
                sp.setPipeline(samplePipeline);
                sp.setBindGroup(0, sampleBG);
                sp.dispatchWorkgroups(Math.ceil(samplesPerFrame / 256));
                sp.end();

                totalSamples += samplesPerFrame;
                frameNum++;
            }

            // Display pass: convert accumulation to texture
            const dp = enc.beginComputePass();
            dp.setPipeline(displayPipeline);
            dp.setBindGroup(0, displayBG);
            dp.dispatchWorkgroups(Math.ceil(W / 8), Math.ceil(H / 8));
            dp.end();

            // Render pass
            const rp = enc.beginRenderPass({
                colorAttachments: [{ view: context.getCurrentTexture().createView(), loadOp: 'clear', storeOp: 'store' }]
            });
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, renderBG);
            rp.draw(4);
            rp.end();

            device.queue.submit([enc.finish()]);

            document.getElementById('totalSamples').textContent = formatNumber(totalSamples);
            document.getElementById('frameCount').textContent = frameNum;
        }

        // Controls
        document.getElementById('exposure').addEventListener('input', (e) => {
            exposure = parseFloat(e.target.value);
            document.getElementById('expVal').textContent = exposure.toFixed(1);
        });
        document.getElementById('samples').addEventListener('input', (e) => {
            const power = parseInt(e.target.value);
            samplesPerFrame = 1 << power;
            document.getElementById('sampVal').textContent = samplesPerFrame;
        });
        document.getElementById('rIter').addEventListener('input', (e) => {
            rIter = parseInt(e.target.value);
            document.getElementById('rVal').textContent = rIter;
        });
        document.getElementById('gIter').addEventListener('input', (e) => {
            gIter = parseInt(e.target.value);
            document.getElementById('gVal').textContent = gIter;
        });
        document.getElementById('bIter').addEventListener('input', (e) => {
            bIter = parseInt(e.target.value);
            document.getElementById('bVal').textContent = bIter;
        });

        window.clearAccum = clearAccumBuffer;
        window.togglePause = () => {
            paused = !paused;
            document.querySelector('.controls .row button:last-child').textContent = paused ? 'Resume' : 'Pause';
        };

        requestAnimationFrame(frame);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
