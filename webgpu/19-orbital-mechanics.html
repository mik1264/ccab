<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Body Orbital Mechanics - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 14px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls button { margin-top: 10px; padding: 8px 16px; background: #22d3ee; color: #000; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: 600; }
        .controls button:hover { background: #67e8f9; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        .title-overlay { position: fixed; top: 70px; left: 20px; z-index: 90; }
        .title-overlay h1 { font-size: 1.4rem; color: #22d3ee; margin: 0 0 4px 0; }
        .title-overlay p { font-size: 0.85rem; color: #888; margin: 0; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(220, 50, 50, 0.95); padding: 30px 40px; border-radius: 12px; display: none; text-align: center; max-width: 400px; line-height: 1.6; }
        #error h2 { margin: 0 0 10px; }
        .info { font-size: 10px; color: #666; margin-top: 8px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to WebGPU Gallery</a>

    <div class="title-overlay">
        <h1>Multi-Body Orbital Mechanics</h1>
        <p>Solar system with 50K test particles in asteroid belt</p>
    </div>

    <div class="controls">
        <label>Time Scale: <span id="timeVal">100</span>x</label>
        <input type="range" id="timeScale" min="1" max="500" step="1" value="100">
        <label>Trail Length: <span id="trailVal">150</span></label>
        <input type="range" id="trailLen" min="10" max="300" step="10" value="150">
        <label>Particles: <span id="countVal">50000</span></label>
        <input type="range" id="count" min="10000" max="80000" step="5000" value="50000">
        <button onclick="resetSim()">Reset</button>
        <div class="info">Click to place a massive body</div>
    </div>

    <div class="stats">
        FPS: <span id="fps">0</span> | Particles: <span id="pcount">0</span>
    </div>

    <div id="error">
        <h2>WebGPU Not Supported</h2>
        <p>Your browser does not support WebGPU.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</p>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const ctx = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        ctx.configure({ device, format, alphaMode: 'premultiplied' });

        let numParticles = 50000;
        let timeScale = 100, trailLen = 150;
        const WG = 256;
        const MAX_BODIES = 12;  // Sun + 8 planets + 3 user-placed

        // Planet data: distance (AU scaled), orbital speed, mass, radius, color
        // Scaled so Sun is at center, distances compressed for visual appeal
        const planets = [
            { name: 'Sun',     dist: 0,   speed: 0,    mass: 1000, radius: 18, color: [1.0, 0.9, 0.3] },
            { name: 'Mercury', dist: 40,  speed: 4.8,  mass: 0.06, radius: 3,  color: [0.7, 0.6, 0.5] },
            { name: 'Venus',   dist: 65,  speed: 3.5,  mass: 0.8,  radius: 5,  color: [0.9, 0.7, 0.3] },
            { name: 'Earth',   dist: 90,  speed: 3.0,  mass: 1.0,  radius: 5,  color: [0.3, 0.5, 0.9] },
            { name: 'Mars',    dist: 120, speed: 2.4,  mass: 0.1,  radius: 4,  color: [0.9, 0.3, 0.2] },
            { name: 'Jupiter', dist: 180, speed: 1.3,  mass: 50,   radius: 12, color: [0.8, 0.6, 0.4] },
            { name: 'Saturn',  dist: 240, speed: 1.0,  mass: 30,   radius: 10, color: [0.9, 0.8, 0.5] },
            { name: 'Uranus',  dist: 300, speed: 0.7,  mass: 8,    radius: 7,  color: [0.5, 0.8, 0.9] },
            { name: 'Neptune', dist: 350, speed: 0.55, mass: 8,    radius: 7,  color: [0.3, 0.4, 0.9] },
        ];

        let numBodies = planets.length;
        let bodyPositions = new Float32Array(MAX_BODIES * 2); // x,y per body
        let bodyVelocities = new Float32Array(MAX_BODIES * 2);
        let bodyMasses = new Float32Array(MAX_BODIES);

        // Trail buffers for planets
        let planetTrails = [];
        for (let i = 0; i < planets.length; i++) {
            planetTrails.push({ positions: [], maxLen: 300 });
        }

        const cx = canvas.width / 2, cy = canvas.height / 2;

        function initBodies() {
            for (let i = 0; i < planets.length; i++) {
                const p = planets[i];
                const angle = Math.random() * Math.PI * 2;
                bodyPositions[i * 2]     = cx + Math.cos(angle) * p.dist;
                bodyPositions[i * 2 + 1] = cy + Math.sin(angle) * p.dist;
                bodyVelocities[i * 2]     = -Math.sin(angle) * p.speed;
                bodyVelocities[i * 2 + 1] = Math.cos(angle) * p.speed;
                bodyMasses[i] = p.mass;
            }
            numBodies = planets.length;
            planetTrails.forEach(t => t.positions = []);
        }

        initBodies();

        const computeCode = `
            struct Particle { pos: vec2f, vel: vec2f }
            struct Body { pos: vec2f, mass: f32, _pad: f32 }
            struct Uniforms {
                dt: f32, numParticles: u32, numBodies: u32, canvasW: f32,
                canvasH: f32, _pad1: f32, _pad2: f32, _pad3: f32,
            }

            @group(0) @binding(0) var<storage, read> pIn: array<Particle>;
            @group(0) @binding(1) var<storage, read_write> pOut: array<Particle>;
            @group(0) @binding(2) var<uniform> u: Uniforms;
            @group(0) @binding(3) var<storage, read> bodies: array<Body>;

            @compute @workgroup_size(${WG})
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let idx = gid.x;
                if (idx >= u.numParticles) { return; }

                var p = pIn[idx];
                var acc = vec2f(0.0, 0.0);

                for (var b = 0u; b < u.numBodies; b++) {
                    let diff = bodies[b].pos - p.pos;
                    let distSq = max(dot(diff, diff), 25.0);
                    let dist = sqrt(distSq);
                    let force = bodies[b].mass / distSq;
                    acc += normalize(diff) * force;
                }

                // Scale gravitational constant
                acc *= 50.0;

                p.vel += acc * u.dt;
                p.pos += p.vel * u.dt;

                // Remove particles that escape too far
                let dcx = p.pos.x - u.canvasW * 0.5;
                let dcy = p.pos.y - u.canvasH * 0.5;
                if (dcx * dcx + dcy * dcy > u.canvasW * u.canvasW * 4.0) {
                    // Reset to asteroid belt
                    let angle = f32(idx) * 0.618033988 * 6.283185;
                    let r = 140.0 + f32(idx % 100u) * 0.6;
                    p.pos = vec2f(u.canvasW * 0.5 + cos(angle) * r, u.canvasH * 0.5 + sin(angle) * r);
                    let orbSpeed = 1.8;
                    p.vel = vec2f(-sin(angle) * orbSpeed, cos(angle) * orbSpeed);
                }

                pOut[idx] = p;
            }
        `;

        const renderCode = `
            struct Particle { pos: vec2f, vel: vec2f }
            struct VertexOutput { @builtin(position) position: vec4f, @location(0) color: vec4f }
            @group(0) @binding(0) var<storage, read> particles: array<Particle>;
            @group(0) @binding(1) var<uniform> resolution: vec2f;

            @vertex fn vs(@builtin(vertex_index) idx: u32) -> VertexOutput {
                let p = particles[idx];
                let x = (p.pos.x / resolution.x) * 2.0 - 1.0;
                let y = (p.pos.y / resolution.y) * -2.0 + 1.0;
                let speed = length(p.vel);
                let t = clamp(speed * 0.15, 0.0, 1.0);
                let col = mix(vec3f(0.4, 0.35, 0.3), vec3f(0.9, 0.8, 0.5), t);
                var out: VertexOutput;
                out.position = vec4f(x, y, 0.0, 1.0);
                out.color = vec4f(col, 0.6);
                return out;
            }

            @fragment fn fs(@location(0) color: vec4f) -> @location(0) vec4f { return color; }
        `;

        const computePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: computeCode }), entryPoint: 'main' }
        });
        const renderModule = device.createShaderModule({ code: renderCode });
        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: renderModule, entryPoint: 'vs' },
            fragment: {
                module: renderModule, entryPoint: 'fs',
                targets: [{
                    format,
                    blend: {
                        color: { srcFactor: 'src-alpha', dstFactor: 'one', operation: 'add' },
                        alpha: { srcFactor: 'one', dstFactor: 'one', operation: 'add' }
                    }
                }]
            },
            primitive: { topology: 'point-list' }
        });

        let pBufs, uniformBuf, resBuf, bodyBuf;
        let computeBGs, renderBGs;
        let frame = 0;

        function initParticles() {
            const data = new Float32Array(numParticles * 4);
            for (let i = 0; i < numParticles; i++) {
                // Asteroid belt between Mars and Jupiter
                const angle = Math.random() * Math.PI * 2;
                const r = 130 + Math.random() * 60;
                data[i * 4]     = cx + Math.cos(angle) * r;
                data[i * 4 + 1] = cy + Math.sin(angle) * r;
                const orbSpeed = 1.5 + Math.random() * 1.0;
                data[i * 4 + 2] = -Math.sin(angle) * orbSpeed;
                data[i * 4 + 3] = Math.cos(angle) * orbSpeed;
            }

            pBufs = [
                device.createBuffer({ size: data.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST, mappedAtCreation: true }),
                device.createBuffer({ size: data.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST })
            ];
            new Float32Array(pBufs[0].getMappedRange()).set(data);
            pBufs[0].unmap();

            uniformBuf = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
            resBuf = device.createBuffer({ size: 8, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
            device.queue.writeBuffer(resBuf, 0, new Float32Array([canvas.width, canvas.height]));
            bodyBuf = device.createBuffer({ size: MAX_BODIES * 16, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });

            computeBGs = [0, 1].map(i => device.createBindGroup({
                layout: computePipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: pBufs[i] } },
                    { binding: 1, resource: { buffer: pBufs[1 - i] } },
                    { binding: 2, resource: { buffer: uniformBuf } },
                    { binding: 3, resource: { buffer: bodyBuf } }
                ]
            }));

            renderBGs = [0, 1].map(i => device.createBindGroup({
                layout: renderPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: pBufs[1 - i] } },
                    { binding: 1, resource: { buffer: resBuf } }
                ]
            }));

            frame = 0;
            document.getElementById('pcount').textContent = numParticles.toLocaleString();
        }

        initParticles();

        // 2D canvas overlay for planet rendering and trails
        const overlay = document.createElement('canvas');
        overlay.width = canvas.width; overlay.height = canvas.height;
        overlay.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:10;';
        document.body.appendChild(overlay);
        const oc = overlay.getContext('2d');

        let lastTime = performance.now(), fpsFrames = 0, fpsTime = 0;

        function updatePlanets(dt) {
            // Update planet positions (CPU, simple Verlet)
            for (let i = 1; i < numBodies; i++) {
                let ax = 0, ay = 0;
                for (let j = 0; j < numBodies; j++) {
                    if (i === j) continue;
                    const dx = bodyPositions[j * 2] - bodyPositions[i * 2];
                    const dy = bodyPositions[j * 2 + 1] - bodyPositions[i * 2 + 1];
                    const distSq = Math.max(dx * dx + dy * dy, 25);
                    const dist = Math.sqrt(distSq);
                    const force = bodyMasses[j] * 50 / distSq;
                    ax += (dx / dist) * force;
                    ay += (dy / dist) * force;
                }
                bodyVelocities[i * 2] += ax * dt;
                bodyVelocities[i * 2 + 1] += ay * dt;
            }
            for (let i = 1; i < numBodies; i++) {
                bodyPositions[i * 2] += bodyVelocities[i * 2] * dt;
                bodyPositions[i * 2 + 1] += bodyVelocities[i * 2 + 1] * dt;
            }

            // Record trails
            for (let i = 1; i < Math.min(numBodies, planets.length); i++) {
                const trail = planetTrails[i];
                trail.positions.push(bodyPositions[i * 2], bodyPositions[i * 2 + 1]);
                if (trail.positions.length > trailLen * 2) {
                    trail.positions.splice(0, 2);
                }
            }
        }

        function drawOverlay() {
            oc.clearRect(0, 0, overlay.width, overlay.height);

            // Draw trails
            for (let i = 1; i < Math.min(numBodies, planets.length); i++) {
                const trail = planetTrails[i];
                const col = planets[i].color;
                if (trail.positions.length < 4) continue;
                oc.beginPath();
                oc.moveTo(trail.positions[0], trail.positions[1]);
                for (let j = 2; j < trail.positions.length; j += 2) {
                    oc.lineTo(trail.positions[j], trail.positions[j + 1]);
                }
                const alpha = 0.4;
                oc.strokeStyle = `rgba(${col[0]*255|0},${col[1]*255|0},${col[2]*255|0},${alpha})`;
                oc.lineWidth = 1;
                oc.stroke();
            }

            // Draw planets
            for (let i = 0; i < Math.min(numBodies, planets.length); i++) {
                const p = planets[i];
                const px = bodyPositions[i * 2], py = bodyPositions[i * 2 + 1];

                // Glow
                const grad = oc.createRadialGradient(px, py, 0, px, py, p.radius * 3);
                grad.addColorStop(0, `rgba(${p.color[0]*255|0},${p.color[1]*255|0},${p.color[2]*255|0},0.5)`);
                grad.addColorStop(1, `rgba(${p.color[0]*255|0},${p.color[1]*255|0},${p.color[2]*255|0},0)`);
                oc.fillStyle = grad;
                oc.beginPath();
                oc.arc(px, py, p.radius * 3, 0, Math.PI * 2);
                oc.fill();

                // Body
                oc.fillStyle = `rgb(${p.color[0]*255|0},${p.color[1]*255|0},${p.color[2]*255|0})`;
                oc.beginPath();
                oc.arc(px, py, p.radius, 0, Math.PI * 2);
                oc.fill();
            }

            // Draw user-placed bodies
            for (let i = planets.length; i < numBodies; i++) {
                const px = bodyPositions[i * 2], py = bodyPositions[i * 2 + 1];
                const grad = oc.createRadialGradient(px, py, 0, px, py, 30);
                grad.addColorStop(0, 'rgba(255,100,200,0.6)');
                grad.addColorStop(1, 'rgba(255,100,200,0)');
                oc.fillStyle = grad;
                oc.beginPath();
                oc.arc(px, py, 30, 0, Math.PI * 2);
                oc.fill();
                oc.fillStyle = '#ff64c8';
                oc.beginPath();
                oc.arc(px, py, 8, 0, Math.PI * 2);
                oc.fill();
            }
        }

        function render() {
            const now = performance.now();
            const rawDt = Math.min((now - lastTime) / 1000, 0.033);
            lastTime = now;
            const dt = rawDt * timeScale * 0.01;

            fpsFrames++; fpsTime += rawDt;
            if (fpsTime >= 1.0) {
                document.getElementById('fps').textContent = Math.round(fpsFrames / fpsTime);
                fpsFrames = 0; fpsTime = 0;
            }

            // Update planet positions on CPU
            updatePlanets(dt);

            // Upload body data to GPU
            const bodyData = new Float32Array(MAX_BODIES * 4);
            for (let i = 0; i < numBodies; i++) {
                bodyData[i * 4]     = bodyPositions[i * 2];
                bodyData[i * 4 + 1] = bodyPositions[i * 2 + 1];
                bodyData[i * 4 + 2] = bodyMasses[i];
            }
            device.queue.writeBuffer(bodyBuf, 0, bodyData);

            // Uniforms
            const buf = new ArrayBuffer(32);
            const f = new Float32Array(buf);
            const u = new Uint32Array(buf);
            f[0] = dt; u[1] = numParticles; u[2] = numBodies; f[3] = canvas.width;
            f[4] = canvas.height;
            device.queue.writeBuffer(uniformBuf, 0, buf);

            const enc = device.createCommandEncoder();

            const cp = enc.beginComputePass();
            cp.setPipeline(computePipeline);
            cp.setBindGroup(0, computeBGs[frame % 2]);
            cp.dispatchWorkgroups(Math.ceil(numParticles / WG));
            cp.end();

            const rp = enc.beginRenderPass({
                colorAttachments: [{
                    view: ctx.getCurrentTexture().createView(),
                    loadOp: 'clear', clearValue: { r: 0.01, g: 0.01, b: 0.03, a: 1 }, storeOp: 'store'
                }]
            });
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, renderBGs[frame % 2]);
            rp.draw(numParticles);
            rp.end();

            device.queue.submit([enc.finish()]);

            drawOverlay();
            frame++;
            requestAnimationFrame(render);
        }

        function resetSim() {
            initBodies();
            initParticles();
        }
        window.resetSim = resetSim;

        // Click to add massive body
        canvas.addEventListener('click', e => {
            if (numBodies >= MAX_BODIES) return;
            const i = numBodies;
            bodyPositions[i * 2] = e.clientX;
            bodyPositions[i * 2 + 1] = e.clientY;
            bodyVelocities[i * 2] = 0;
            bodyVelocities[i * 2 + 1] = 0;
            bodyMasses[i] = 200;
            numBodies++;
        });

        document.getElementById('timeScale').addEventListener('input', e => {
            timeScale = parseInt(e.target.value);
            document.getElementById('timeVal').textContent = timeScale;
        });
        document.getElementById('trailLen').addEventListener('input', e => {
            trailLen = parseInt(e.target.value);
            document.getElementById('trailVal').textContent = trailLen;
        });
        document.getElementById('count').addEventListener('input', e => {
            numParticles = parseInt(e.target.value);
            document.getElementById('countVal').textContent = numParticles;
            initParticles();
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            overlay.width = canvas.width; overlay.height = canvas.height;
            ctx.configure({ device, format, alphaMode: 'premultiplied' });
            resetSim();
        });

        render();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
