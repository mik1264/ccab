<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Growth Simulation - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 210px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls button { padding: 6px 14px; background: rgba(6, 182, 212, 0.3); color: #22d3ee; border: 1px solid #22d3ee; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 5px; width: 100%; }
        .controls button:hover { background: rgba(6, 182, 212, 0.5); }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #22d3ee; font-size: 14px; font-weight: 600; z-index: 100; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); pointer-events: none; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div class="title">Crystal / Ice Crystal Growth</div>

    <div class="controls">
        <label>Vapor Density (&beta;): <span id="vaporVal">0.45</span></label>
        <input type="range" id="vaporDensity" min="0.25" max="0.70" step="0.01" value="0.45">
        <label>Growth Rate (&gamma;): <span id="growthVal">0.005</span></label>
        <input type="range" id="growthRate" min="0.001" max="0.02" step="0.001" value="0.005">
        <label>Diffusion (&alpha;): <span id="diffVal">0.50</span></label>
        <input type="range" id="diffusion" min="0.1" max="1.0" step="0.05" value="0.50">
        <label>Steps/Frame: <span id="stepsVal">4</span></label>
        <input type="range" id="stepsPerFrame" min="1" max="16" step="1" value="4">
        <label>Seed Count: <span id="seedCtVal">1</span></label>
        <input type="range" id="seedCountCtrl" min="1" max="6" step="1" value="1">
        <button id="resetBtn">Reset Simulation</button>
    </div>

    <div class="stats">FPS: <span id="fps">0</span> | Step: <span id="stepNum">0</span> | Ice Cells: <span id="iceCells">1</span></div>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'opaque' });

        let vaporDensity = 0.45, growthRate = 0.005, diffusion = 0.50, stepsPerFrame = 4, seedCount = 1;
        let stepNum = 0;

        document.getElementById('vaporDensity').oninput = e => { vaporDensity = +e.target.value; document.getElementById('vaporVal').textContent = vaporDensity.toFixed(2); };
        document.getElementById('growthRate').oninput = e => { growthRate = +e.target.value; document.getElementById('growthVal').textContent = growthRate.toFixed(3); };
        document.getElementById('diffusion').oninput = e => { diffusion = +e.target.value; document.getElementById('diffVal').textContent = diffusion.toFixed(2); };
        document.getElementById('stepsPerFrame').oninput = e => { stepsPerFrame = +e.target.value; document.getElementById('stepsVal').textContent = stepsPerFrame; };
        document.getElementById('seedCountCtrl').oninput = e => { seedCount = +e.target.value; document.getElementById('seedCtVal').textContent = seedCount; };

        // Simulation grid - use square grid approximating hexagonal neighbors
        // For hexagonal grid: even rows offset right, each cell has 6 neighbors
        const GRID = 512;
        // Each cell: u (diffusive water), v (non-diffusive water stored in receptive cells), ice (0 or 1), receptive flag
        // Pack as: u, v, ice, receptive = 4 floats per cell
        const CELL_FLOATS = 4;
        const gridData = new Float32Array(GRID * GRID * CELL_FLOATS);

        function initGrid() {
            stepNum = 0;
            for (let i = 0; i < GRID * GRID; i++) {
                gridData[i * CELL_FLOATS + 0] = vaporDensity; // u = background vapor
                gridData[i * CELL_FLOATS + 1] = 0.0;          // v = 0
                gridData[i * CELL_FLOATS + 2] = 0.0;          // not ice
                gridData[i * CELL_FLOATS + 3] = 0.0;          // not receptive
            }
            // Place seed(s)
            const cx = Math.floor(GRID / 2), cy = Math.floor(GRID / 2);
            if (seedCount === 1) {
                setSeed(cx, cy);
            } else {
                // Place seeds in a circle
                const radius = GRID * 0.25;
                for (let s = 0; s < seedCount; s++) {
                    const angle = (s / seedCount) * Math.PI * 2;
                    const sx = Math.floor(cx + Math.cos(angle) * radius);
                    const sy = Math.floor(cy + Math.sin(angle) * radius);
                    setSeed(sx, sy);
                }
            }
            device.queue.writeBuffer(gridBuffers[0], 0, gridData);
            device.queue.writeBuffer(gridBuffers[1], 0, gridData);
        }

        function setSeed(x, y) {
            const idx = (y * GRID + x) * CELL_FLOATS;
            gridData[idx + 0] = 0.0; // u
            gridData[idx + 1] = 0.0; // v
            gridData[idx + 2] = 1.0; // ice!
            gridData[idx + 3] = 1.0; // receptive
        }

        // Double-buffered grid
        const gridBuffers = [
            device.createBuffer({ size: gridData.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }),
            device.createBuffer({ size: gridData.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }),
        ];

        // Uniform buffer
        const uniformData = new Float32Array(8);
        const uniformBuffer = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        // Compute shader: Reiter's model step
        const computeShader = device.createShaderModule({ code: `
            struct Uniforms {
                gridSize: u32,
                alpha: f32,
                beta: f32,
                gamma: f32,
                time: f32,
                pad1: f32,
                pad2: f32,
                pad3: f32,
            }
            @group(0) @binding(0) var<storage, read> gridIn: array<f32>;
            @group(0) @binding(1) var<storage, read_write> gridOut: array<f32>;
            @group(0) @binding(2) var<uniform> u: Uniforms;

            fn idx(x: i32, y: i32) -> u32 {
                let gx = ((x % i32(u.gridSize)) + i32(u.gridSize)) % i32(u.gridSize);
                let gy = ((y % i32(u.gridSize)) + i32(u.gridSize)) % i32(u.gridSize);
                return u32(gy * i32(u.gridSize) + gx) * 4u;
            }

            fn isReceptive(x: i32, y: i32) -> bool {
                let i = idx(x, y);
                if (gridIn[i + 2u] > 0.5) { return true; }
                // Check if any neighbor is ice (hexagonal neighbors)
                let even = (y & 1) == 0;
                let offsets_even = array<vec2i, 6>(
                    vec2i(-1, 0), vec2i(1, 0),
                    vec2i(-1, -1), vec2i(0, -1),
                    vec2i(-1, 1), vec2i(0, 1)
                );
                let offsets_odd = array<vec2i, 6>(
                    vec2i(-1, 0), vec2i(1, 0),
                    vec2i(0, -1), vec2i(1, -1),
                    vec2i(0, 1), vec2i(1, 1)
                );
                for (var n = 0; n < 6; n++) {
                    var off: vec2i;
                    if (even) { off = offsets_even[n]; }
                    else { off = offsets_odd[n]; }
                    let ni = idx(x + off.x, y + off.y);
                    if (gridIn[ni + 2u] > 0.5) { return true; }
                }
                return false;
            }

            @compute @workgroup_size(16, 16)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let x = i32(gid.x);
                let y = i32(gid.y);
                if (gid.x >= u.gridSize || gid.y >= u.gridSize) { return; }

                let i = idx(x, y);
                let uVal = gridIn[i];
                let vVal = gridIn[i + 1u];
                let ice = gridIn[i + 2u];

                // If already ice, keep it
                if (ice > 0.5) {
                    gridOut[i] = 0.0;
                    gridOut[i + 1u] = vVal;
                    gridOut[i + 2u] = 1.0;
                    gridOut[i + 3u] = 1.0;
                    return;
                }

                let receptive = isReceptive(x, y);

                // Diffusion step: average of hexagonal neighbors (only non-receptive contribute)
                let even = (y & 1) == 0;
                let offsets_even = array<vec2i, 6>(
                    vec2i(-1, 0), vec2i(1, 0),
                    vec2i(-1, -1), vec2i(0, -1),
                    vec2i(-1, 1), vec2i(0, 1)
                );
                let offsets_odd = array<vec2i, 6>(
                    vec2i(-1, 0), vec2i(1, 0),
                    vec2i(0, -1), vec2i(1, -1),
                    vec2i(0, 1), vec2i(1, 1)
                );

                var neighborSum: f32 = 0.0;
                for (var n = 0; n < 6; n++) {
                    var off: vec2i;
                    if (even) { off = offsets_even[n]; }
                    else { off = offsets_odd[n]; }
                    let ni = idx(x + off.x, y + off.y);
                    neighborSum += gridIn[ni]; // u of neighbor
                }

                // Diffusion: u -> average with neighbors (Reiter's rule)
                let newU = uVal + u.alpha * (neighborSum / 6.0 - uVal);

                if (receptive) {
                    // Receptive cell: add vapor to non-diffusive portion
                    let newV = vVal + u.gamma;
                    let totalWater = newU + newV;

                    // Check crystallization: if total water >= 1, freeze
                    if (totalWater >= 1.0) {
                        gridOut[i] = 0.0;
                        gridOut[i + 1u] = totalWater;
                        gridOut[i + 2u] = 1.0; // becomes ice
                        gridOut[i + 3u] = 1.0;
                    } else {
                        gridOut[i] = newU;
                        gridOut[i + 1u] = newV;
                        gridOut[i + 2u] = 0.0;
                        gridOut[i + 3u] = 1.0; // receptive
                    }
                } else {
                    // Non-receptive: just diffusion
                    gridOut[i] = newU;
                    gridOut[i + 1u] = 0.0;
                    gridOut[i + 2u] = 0.0;
                    gridOut[i + 3u] = 0.0;
                }
            }
        `});

        // Render shader: visualize the grid
        const renderShader = device.createShaderModule({ code: `
            struct Uniforms {
                gridSize: u32,
                alpha: f32,
                beta: f32,
                gamma: f32,
                time: f32,
                pad1: f32,
                pad2: f32,
                pad3: f32,
            }
            @group(0) @binding(0) var outTex: texture_storage_2d<rgba8unorm, write>;
            @group(0) @binding(1) var<storage, read> grid: array<f32>;
            @group(0) @binding(2) var<uniform> u: Uniforms;

            @compute @workgroup_size(8, 8)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let px = gid.x;
                let py = gid.y;
                let texSize = textureDimensions(outTex);
                if (px >= texSize.x || py >= texSize.y) { return; }

                // Map pixel to grid
                let gridF = vec2f(f32(u.gridSize));
                let uv = vec2f(f32(px), f32(py)) / vec2f(f32(texSize.x), f32(texSize.y));
                let gx = i32(uv.x * gridF.x);
                let gy = i32(uv.y * gridF.y);
                let gi = u32(gy * i32(u.gridSize) + gx) * 4u;

                let uVal = grid[gi];
                let vVal = grid[gi + 1u];
                let ice = grid[gi + 2u];
                let receptive = grid[gi + 3u];

                var col: vec3f;

                if (ice > 0.5) {
                    // Ice crystal: bright cyan-white with variation
                    let waterAmount = vVal;
                    let shimmer = 0.85 + 0.15 * sin(f32(gx) * 0.5 + f32(gy) * 0.7 + u.time * 2.0);
                    let base = vec3f(0.6, 0.85, 1.0);
                    let bright = vec3f(0.95, 0.98, 1.0);
                    col = mix(base, bright, waterAmount * 0.5) * shimmer;

                    // Specular-like highlight near edges
                    let edgeDist = min(min(abs(uv.x - 0.5), abs(uv.y - 0.5)), 0.5);
                    col += vec3f(0.1, 0.15, 0.2) * (1.0 - smoothstep(0.0, 0.3, edgeDist));
                } else if (receptive > 0.5) {
                    // Receptive boundary: faint glow
                    let total = uVal + vVal;
                    col = vec3f(0.15, 0.25, 0.4) * total;
                } else {
                    // Background water vapor: dark blue gradient
                    let vapor = uVal / max(u.beta, 0.01);
                    col = mix(vec3f(0.01, 0.01, 0.04), vec3f(0.05, 0.08, 0.18), vapor);
                }

                col = clamp(col, vec3f(0.0), vec3f(1.0));
                textureStore(outTex, vec2u(px, py), vec4f(col, 1.0));
            }
        `});

        const computeBGL = device.createBindGroupLayout({
            entries: [
                { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
                { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
                { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
            ],
        });
        const computePipeline = device.createComputePipeline({
            layout: device.createPipelineLayout({ bindGroupLayouts: [computeBGL] }),
            compute: { module: computeShader, entryPoint: 'main' },
        });

        // Two bind groups for ping-pong
        const computeBGs = [
            device.createBindGroup({
                layout: computeBGL,
                entries: [
                    { binding: 0, resource: { buffer: gridBuffers[0] } },
                    { binding: 1, resource: { buffer: gridBuffers[1] } },
                    { binding: 2, resource: { buffer: uniformBuffer } },
                ],
            }),
            device.createBindGroup({
                layout: computeBGL,
                entries: [
                    { binding: 0, resource: { buffer: gridBuffers[1] } },
                    { binding: 1, resource: { buffer: gridBuffers[0] } },
                    { binding: 2, resource: { buffer: uniformBuffer } },
                ],
            }),
        ];

        const texW = canvas.width, texH = canvas.height;
        const outTexture = device.createTexture({
            size: [texW, texH], format: 'rgba8unorm',
            usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING,
        });

        const renderBGL = device.createBindGroupLayout({
            entries: [
                { binding: 0, visibility: GPUShaderStage.COMPUTE, storageTexture: { access: 'write-only', format: 'rgba8unorm', viewDimension: '2d' } },
                { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
                { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
            ],
        });
        const renderPipeline = device.createComputePipeline({
            layout: device.createPipelineLayout({ bindGroupLayouts: [renderBGL] }),
            compute: { module: renderShader, entryPoint: 'main' },
        });

        // Render BGs for both buffers
        const renderBGs = [
            device.createBindGroup({
                layout: renderBGL,
                entries: [
                    { binding: 0, resource: outTexture.createView() },
                    { binding: 1, resource: { buffer: gridBuffers[0] } },
                    { binding: 2, resource: { buffer: uniformBuffer } },
                ],
            }),
            device.createBindGroup({
                layout: renderBGL,
                entries: [
                    { binding: 0, resource: outTexture.createView() },
                    { binding: 1, resource: { buffer: gridBuffers[1] } },
                    { binding: 2, resource: { buffer: uniformBuffer } },
                ],
            }),
        ];

        // Blit pipeline
        const blitShader = device.createShaderModule({ code: `
            @group(0) @binding(0) var tex: texture_2d<f32>;
            @group(0) @binding(1) var samp: sampler;
            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VSOut {
                var pos = array<vec2f, 6>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(-1,1), vec2f(1,-1), vec2f(1,1));
                var out: VSOut;
                out.pos = vec4f(pos[i], 0, 1);
                out.uv = pos[i] * 0.5 + 0.5;
                out.uv.y = 1.0 - out.uv.y;
                return out;
            }
            @fragment fn fs(inp: VSOut) -> @location(0) vec4f {
                return textureSample(tex, samp, inp.uv);
            }
        `});
        const blitBGL = device.createBindGroupLayout({
            entries: [
                { binding: 0, visibility: GPUShaderStage.FRAGMENT, texture: { sampleType: 'float' } },
                { binding: 1, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
            ],
        });
        const blitPipeline = device.createRenderPipeline({
            layout: device.createPipelineLayout({ bindGroupLayouts: [blitBGL] }),
            vertex: { module: blitShader, entryPoint: 'vs' },
            fragment: { module: blitShader, entryPoint: 'fs', targets: [{ format }] },
        });
        const sampler = device.createSampler({ magFilter: 'nearest', minFilter: 'nearest' });
        const blitBG = device.createBindGroup({
            layout: blitBGL,
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: sampler },
            ],
        });

        let pingPong = 0;

        document.getElementById('resetBtn').onclick = () => { initGrid(); pingPong = 0; };
        initGrid();

        let frameCount = 0, lastFPSTime = performance.now();

        function frame(time) {
            const now = performance.now();
            frameCount++;
            if (now - lastFPSTime > 500) {
                document.getElementById('fps').textContent = Math.round(frameCount / ((now - lastFPSTime) / 1000));
                frameCount = 0; lastFPSTime = now;
            }

            const uintView = new Uint32Array(uniformData.buffer);
            uintView[0] = GRID;
            uniformData[1] = diffusion;
            uniformData[2] = vaporDensity;
            uniformData[3] = growthRate;
            uniformData[4] = time / 1000;
            device.queue.writeBuffer(uniformBuffer, 0, uniformData);

            const encoder = device.createCommandEncoder();

            // Run multiple simulation steps per frame
            for (let s = 0; s < stepsPerFrame; s++) {
                const computePass = encoder.beginComputePass();
                computePass.setPipeline(computePipeline);
                computePass.setBindGroup(0, computeBGs[pingPong]);
                computePass.dispatchWorkgroups(Math.ceil(GRID / 16), Math.ceil(GRID / 16));
                computePass.end();
                pingPong = 1 - pingPong;
                stepNum++;
            }
            document.getElementById('stepNum').textContent = stepNum;

            // Render visualization (read from current buffer)
            const vizPass = encoder.beginComputePass();
            vizPass.setPipeline(renderPipeline);
            vizPass.setBindGroup(0, renderBGs[pingPong]);
            vizPass.dispatchWorkgroups(Math.ceil(texW / 8), Math.ceil(texH / 8));
            vizPass.end();

            // Blit to screen
            const renderPass = encoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    loadOp: 'clear', storeOp: 'store', clearValue: { r: 0, g: 0, b: 0, a: 1 },
                }],
            });
            renderPass.setPipeline(blitPipeline);
            renderPass.setBindGroup(0, blitBG);
            renderPass.draw(6);
            renderPass.end();

            device.queue.submit([encoder.finish()]);
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    </script>
</body>
</html>
