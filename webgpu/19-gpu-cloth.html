<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Cloth with Wind - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 14px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input { width: 100%; }
        .controls button { margin-top: 8px; padding: 6px 14px; background: #22d3ee; color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; width: 100%; font-weight: 600; }
        .controls button:hover { background: #67e8f9; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        .title-overlay { position: fixed; top: 70px; left: 20px; z-index: 90; }
        .title-overlay h1 { font-size: 1.4rem; color: #22d3ee; margin: 0 0 4px 0; }
        .title-overlay p { font-size: 0.85rem; color: #888; margin: 0; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(220, 50, 50, 0.95); padding: 30px 40px; border-radius: 12px; display: none; text-align: center; max-width: 400px; line-height: 1.6; }
        .info { font-size: 10px; color: #666; margin-top: 10px; }
        .toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .toggle-row label { margin: 0; flex: 1; }
        .toggle-row input[type="checkbox"] { width: auto; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to WebGPU Gallery</a>

    <div class="title-overlay">
        <h1>GPU Cloth with Wind</h1>
        <p>Position-Based Dynamics on GPU compute</p>
    </div>

    <div class="controls">
        <label>Gravity: <span id="gravVal">1.0</span></label>
        <input type="range" id="gravity" min="0" max="3" step="0.1" value="1.0">
        <label>Wind Strength: <span id="windVal">0.8</span></label>
        <input type="range" id="wind" min="0" max="3" step="0.1" value="0.8">
        <label>Damping: <span id="dampVal">0.98</span></label>
        <input type="range" id="damping" min="0.9" max="1" step="0.01" value="0.98">
        <div class="toggle-row">
            <label>Wind Enabled</label>
            <input type="checkbox" id="windToggle" checked>
        </div>
        <button onclick="resetCloth()">Reset</button>
        <div class="info">Click and drag to interact with cloth</div>
    </div>

    <div class="stats">
        FPS: <span id="fps">0</span> | Particles: <span id="particles">0</span> | Constraints/frame: <span id="constraints">0</span>
    </div>

    <div id="error">
        <h2>WebGPU Not Supported</h2>
        <p>Please use Chrome 113+, Edge 113+, or Safari 18+.</p>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gravityStrength = 1.0;
        let windStrength = 0.8;
        let dampingFactor = 0.98;
        let windEnabled = true;
        let mousePos = { x: -1000, y: -1000 };
        let mouseDown = false;

        const CLOTH_W = 40;
        const CLOTH_H = 40;
        const PARTICLE_COUNT = CLOTH_W * CLOTH_H;
        const CONSTRAINT_ITERS = 6;
        const REST_LENGTH = 10;

        if (!navigator.gpu) {
            document.getElementById('error').style.display = 'block';
            throw new Error('WebGPU not supported');
        }

        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'premultiplied' });

        document.getElementById('particles').textContent = PARTICLE_COUNT;
        document.getElementById('constraints').textContent = CONSTRAINT_ITERS;

        // Particle struct: pos(vec3f), prevPos(vec3f), pinned(f32), pad(f32) = 32 bytes
        const computeShader = `
            struct Particle {
                pos: vec3f,
                _pad0: f32,
                prevPos: vec3f,
                pinned: f32,
            }

            struct Uniforms {
                dt: f32,
                gravity: f32,
                damping: f32,
                wind: f32,
                windEnabled: f32,
                time: f32,
                mouseX: f32,
                mouseY: f32,
                mouseActive: f32,
                clothW: u32,
                clothH: u32,
                restLength: f32,
                canvasW: f32,
                canvasH: f32,
                _pad0: f32,
                _pad1: f32,
            }

            @group(0) @binding(0) var<storage, read_write> particles: array<Particle>;
            @group(0) @binding(1) var<uniform> u: Uniforms;

            fn getIdx(x: u32, y: u32) -> u32 {
                return y * u.clothW + x;
            }

            @compute @workgroup_size(256)
            fn integrate(@builtin(global_invocation_id) gid: vec3u) {
                let idx = gid.x;
                if (idx >= u.clothW * u.clothH) { return; }

                var p = particles[idx];
                if (p.pinned > 0.5) { return; }

                let velocity = (p.pos - p.prevPos) * u.damping;

                // Gravity
                let gravity = vec3f(0.0, -u.gravity * 120.0, 0.0);

                // Wind
                var wind = vec3f(0.0);
                if (u.windEnabled > 0.5) {
                    let gx = f32(idx % u.clothW);
                    let gy = f32(idx / u.clothW);
                    wind = vec3f(
                        sin(u.time * 2.5 + gy * 0.2) * u.wind * 40.0,
                        cos(u.time * 1.8 + gx * 0.15) * u.wind * 15.0,
                        sin(u.time * 2.0 + gx * 0.2 + gy * 0.1) * u.wind * 25.0
                    );
                }

                // Mouse interaction
                if (u.mouseActive > 0.5) {
                    let mouseWorld = vec3f(
                        (u.mouseX / u.canvasW * 2.0 - 1.0) * 250.0,
                        -(u.mouseY / u.canvasH * 2.0 - 1.0) * 250.0,
                        0.0
                    );
                    let toMouse = mouseWorld - p.pos;
                    let dist = length(toMouse);
                    if (dist < 60.0 && dist > 0.1) {
                        let force = normalize(toMouse) * (60.0 - dist) * 3.0;
                        p.pos += force * u.dt;
                    }
                }

                p.prevPos = p.pos;
                p.pos += velocity + (gravity + wind) * u.dt * u.dt;

                particles[idx] = p;
            }

            @compute @workgroup_size(16, 16)
            fn constraints(@builtin(global_invocation_id) gid: vec3u) {
                let x = gid.x;
                let y = gid.y;
                if (x >= u.clothW || y >= u.clothH) { return; }

                let idx = getIdx(x, y);
                let restLen = u.restLength;

                // Structural constraints (right and down)
                if (x + 1u < u.clothW) {
                    let idx2 = getIdx(x + 1u, y);
                    var p1 = particles[idx];
                    var p2 = particles[idx2];
                    let diff = p2.pos - p1.pos;
                    let dist = length(diff);
                    if (dist > 0.001) {
                        let correction = diff * (1.0 - restLen / dist) * 0.5;
                        if (p1.pinned < 0.5) { p1.pos += correction; }
                        if (p2.pinned < 0.5) { p2.pos -= correction; }
                        particles[idx] = p1;
                        particles[idx2] = p2;
                    }
                }

                if (y + 1u < u.clothH) {
                    let idx2 = getIdx(x, y + 1u);
                    var p1 = particles[idx];
                    var p2 = particles[idx2];
                    let diff = p2.pos - p1.pos;
                    let dist = length(diff);
                    if (dist > 0.001) {
                        let correction = diff * (1.0 - restLen / dist) * 0.5;
                        if (p1.pinned < 0.5) { p1.pos += correction; }
                        if (p2.pinned < 0.5) { p2.pos -= correction; }
                        particles[idx] = p1;
                        particles[idx2] = p2;
                    }
                }

                // Shear constraints (diagonal)
                if (x + 1u < u.clothW && y + 1u < u.clothH) {
                    let idx2 = getIdx(x + 1u, y + 1u);
                    var p1 = particles[idx];
                    var p2 = particles[idx2];
                    let diff = p2.pos - p1.pos;
                    let dist = length(diff);
                    let diagRest = restLen * 1.414;
                    if (dist > 0.001) {
                        let correction = diff * (1.0 - diagRest / dist) * 0.5;
                        if (p1.pinned < 0.5) { p1.pos += correction; }
                        if (p2.pinned < 0.5) { p2.pos -= correction; }
                        particles[idx] = p1;
                        particles[idx2] = p2;
                    }
                }

                if (x > 0u && y + 1u < u.clothH) {
                    let idx2 = getIdx(x - 1u, y + 1u);
                    var p1 = particles[idx];
                    var p2 = particles[idx2];
                    let diff = p2.pos - p1.pos;
                    let dist = length(diff);
                    let diagRest = restLen * 1.414;
                    if (dist > 0.001) {
                        let correction = diff * (1.0 - diagRest / dist) * 0.5;
                        if (p1.pinned < 0.5) { p1.pos += correction; }
                        if (p2.pinned < 0.5) { p2.pos -= correction; }
                        particles[idx] = p1;
                        particles[idx2] = p2;
                    }
                }

                // Bend constraint (skip-one)
                if (x + 2u < u.clothW) {
                    let idx2 = getIdx(x + 2u, y);
                    var p1 = particles[idx];
                    var p2 = particles[idx2];
                    let diff = p2.pos - p1.pos;
                    let dist = length(diff);
                    let bendRest = restLen * 2.0;
                    if (dist > 0.001) {
                        let correction = diff * (1.0 - bendRest / dist) * 0.3;
                        if (p1.pinned < 0.5) { p1.pos += correction; }
                        if (p2.pinned < 0.5) { p2.pos -= correction; }
                        particles[idx] = p1;
                        particles[idx2] = p2;
                    }
                }

                if (y + 2u < u.clothH) {
                    let idx2 = getIdx(x, y + 2u);
                    var p1 = particles[idx];
                    var p2 = particles[idx2];
                    let diff = p2.pos - p1.pos;
                    let dist = length(diff);
                    let bendRest = restLen * 2.0;
                    if (dist > 0.001) {
                        let correction = diff * (1.0 - bendRest / dist) * 0.3;
                        if (p1.pinned < 0.5) { p1.pos += correction; }
                        if (p2.pinned < 0.5) { p2.pos -= correction; }
                        particles[idx] = p1;
                        particles[idx2] = p2;
                    }
                }
            }
        `;

        const renderShader = `
            struct Particle {
                pos: vec3f,
                _pad0: f32,
                prevPos: vec3f,
                pinned: f32,
            }

            struct Uniforms {
                viewProj: mat4x4f,
                lightDir: vec3f,
                _pad: f32,
                clothW: u32,
                clothH: u32,
            }

            struct VertexOutput {
                @builtin(position) position: vec4f,
                @location(0) color: vec4f,
                @location(1) normal: vec3f,
            }

            @group(0) @binding(0) var<storage, read> particles: array<Particle>;
            @group(0) @binding(1) var<uniform> u: Uniforms;

            @vertex
            fn vs(@builtin(vertex_index) idx: u32) -> VertexOutput {
                // 6 vertices per quad, (W-1)*(H-1) quads
                let quadIdx = idx / 6u;
                let vertIdx = idx % 6u;

                let quadX = quadIdx % (u.clothW - 1u);
                let quadY = quadIdx / (u.clothW - 1u);

                if (quadY >= u.clothH - 1u) {
                    var out: VertexOutput;
                    out.position = vec4f(0, 0, -10, 1);
                    out.color = vec4f(0);
                    out.normal = vec3f(0, 0, 1);
                    return out;
                }

                var pIdx: u32;
                switch vertIdx {
                    case 0u: { pIdx = quadY * u.clothW + quadX; }
                    case 1u: { pIdx = quadY * u.clothW + quadX + 1u; }
                    case 2u: { pIdx = (quadY + 1u) * u.clothW + quadX; }
                    case 3u: { pIdx = quadY * u.clothW + quadX + 1u; }
                    case 4u: { pIdx = (quadY + 1u) * u.clothW + quadX + 1u; }
                    case 5u: { pIdx = (quadY + 1u) * u.clothW + quadX; }
                    default: { pIdx = 0u; }
                }

                let p = particles[pIdx];

                // Compute face normal for lighting
                let p00 = particles[quadY * u.clothW + quadX].pos;
                let p10 = particles[quadY * u.clothW + quadX + 1u].pos;
                let p01 = particles[(quadY + 1u) * u.clothW + quadX].pos;
                let edge1 = p10 - p00;
                let edge2 = p01 - p00;
                let normal = normalize(cross(edge1, edge2));

                // Phong lighting
                let ambient = 0.25;
                let diffuse = max(dot(normal, u.lightDir), 0.0) * 0.6;
                let viewDir = vec3f(0.0, 0.0, 1.0);
                let halfDir = normalize(u.lightDir + viewDir);
                let specular = pow(max(dot(normal, halfDir), 0.0), 32.0) * 0.3;

                let lighting = ambient + diffuse + specular;

                // Color based on position and velocity
                let vel = length(p.pos - p.prevPos);
                let t = clamp(vel * 0.3, 0.0, 1.0);
                let baseColor = vec3f(0.85, 0.65, 0.45); // warm fabric
                let stretchColor = vec3f(0.3, 0.6, 0.95); // blue when stretched
                let color = mix(baseColor, stretchColor, t) * lighting;

                var out: VertexOutput;
                out.position = u.viewProj * vec4f(p.pos, 1.0);
                out.color = vec4f(color, 0.95);
                out.normal = normal;
                return out;
            }

            @fragment
            fn fs(@location(0) color: vec4f, @location(1) normal: vec3f) -> @location(0) vec4f {
                return color;
            }
        `;

        // Pipelines
        const integratePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: computeShader }), entryPoint: 'integrate' }
        });

        const constraintsPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: computeShader }), entryPoint: 'constraints' }
        });

        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: device.createShaderModule({ code: renderShader }), entryPoint: 'vs' },
            fragment: {
                module: device.createShaderModule({ code: renderShader }),
                entryPoint: 'fs',
                targets: [{
                    format,
                    blend: {
                        color: { srcFactor: 'src-alpha', dstFactor: 'one-minus-src-alpha', operation: 'add' },
                        alpha: { srcFactor: 'one', dstFactor: 'one', operation: 'add' }
                    }
                }]
            },
            primitive: { topology: 'triangle-list', cullMode: 'none' }
        });

        let particleBuffer, computeUniformBuffer, renderUniformBuffer;
        let integrateBindGroup, constraintsBindGroup, renderBindGroup;

        function initCloth() {
            // 32 bytes per particle: pos(3f+pad), prevPos(3f+pinned)
            const data = new Float32Array(PARTICLE_COUNT * 8);

            for (let y = 0; y < CLOTH_H; y++) {
                for (let x = 0; x < CLOTH_W; x++) {
                    const i = (y * CLOTH_W + x) * 8;
                    const px = (x - CLOTH_W / 2) * REST_LENGTH;
                    const py = -(y - CLOTH_H / 4) * REST_LENGTH + 80;
                    const pz = 0;

                    data[i]     = px;  // pos.x
                    data[i + 1] = py;  // pos.y
                    data[i + 2] = pz;  // pos.z
                    data[i + 3] = 0;   // pad
                    data[i + 4] = px;  // prevPos.x
                    data[i + 5] = py;  // prevPos.y
                    data[i + 6] = pz;  // prevPos.z

                    // Pin top-left and top-right corners
                    const pinned = (y === 0 && (x === 0 || x === CLOTH_W - 1)) ? 1.0 : 0.0;
                    data[i + 7] = pinned;
                }
            }

            particleBuffer = device.createBuffer({
                size: data.byteLength,
                usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
                mappedAtCreation: true
            });
            new Float32Array(particleBuffer.getMappedRange()).set(data);
            particleBuffer.unmap();

            computeUniformBuffer = device.createBuffer({ size: 64, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
            renderUniformBuffer = device.createBuffer({ size: 96, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

            integrateBindGroup = device.createBindGroup({
                layout: integratePipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: particleBuffer } },
                    { binding: 1, resource: { buffer: computeUniformBuffer } }
                ]
            });

            constraintsBindGroup = device.createBindGroup({
                layout: constraintsPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: particleBuffer } },
                    { binding: 1, resource: { buffer: computeUniformBuffer } }
                ]
            });

            renderBindGroup = device.createBindGroup({
                layout: renderPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: particleBuffer } },
                    { binding: 1, resource: { buffer: renderUniformBuffer } }
                ]
            });
        }

        initCloth();

        // Matrix helpers
        function ortho(l, r, b, t, n, f) {
            return new Float32Array([
                2/(r-l), 0, 0, 0,
                0, 2/(t-b), 0, 0,
                0, 0, -2/(f-n), 0,
                -(r+l)/(r-l), -(t+b)/(t-b), -(f+n)/(f-n), 1
            ]);
        }

        let time = 0;
        let lastTime = performance.now();
        let fpsFrames = 0, fpsTime = 0;

        function render() {
            const now = performance.now();
            const dt = Math.min((now - lastTime) / 1000, 0.033);
            lastTime = now;
            time += dt;

            fpsFrames++;
            fpsTime += dt;
            if (fpsTime >= 1.0) {
                document.getElementById('fps').textContent = Math.round(fpsFrames / fpsTime);
                fpsFrames = 0; fpsTime = 0;
            }

            // Compute uniforms
            const cu = new ArrayBuffer(64);
            const cf = new Float32Array(cu);
            const cu32 = new Uint32Array(cu);
            cf[0] = dt;
            cf[1] = gravityStrength;
            cf[2] = dampingFactor;
            cf[3] = windStrength;
            cf[4] = windEnabled ? 1.0 : 0.0;
            cf[5] = time;
            cf[6] = mousePos.x;
            cf[7] = mousePos.y;
            cf[8] = mouseDown ? 1.0 : 0.0;
            cu32[9] = CLOTH_W;
            cu32[10] = CLOTH_H;
            cf[11] = REST_LENGTH;
            cf[12] = canvas.width;
            cf[13] = canvas.height;
            device.queue.writeBuffer(computeUniformBuffer, 0, cu);

            // Render uniforms
            const aspect = canvas.width / canvas.height;
            const scale = 220;
            const viewProj = ortho(-scale * aspect, scale * aspect, -scale, scale, -1000, 1000);

            const ru = new ArrayBuffer(96);
            new Float32Array(ru, 0, 16).set(viewProj);
            // Light direction (normalized)
            const lx = 0.3, ly = 0.8, lz = 0.5;
            const lLen = Math.sqrt(lx*lx + ly*ly + lz*lz);
            new Float32Array(ru, 64, 4).set([lx/lLen, ly/lLen, lz/lLen, 0]);
            new Uint32Array(ru, 80, 2).set([CLOTH_W, CLOTH_H]);
            device.queue.writeBuffer(renderUniformBuffer, 0, ru);

            const encoder = device.createCommandEncoder();

            // Integrate
            const ip = encoder.beginComputePass();
            ip.setPipeline(integratePipeline);
            ip.setBindGroup(0, integrateBindGroup);
            ip.dispatchWorkgroups(Math.ceil(PARTICLE_COUNT / 256));
            ip.end();

            // Constraint solving iterations
            for (let i = 0; i < CONSTRAINT_ITERS; i++) {
                const cp = encoder.beginComputePass();
                cp.setPipeline(constraintsPipeline);
                cp.setBindGroup(0, constraintsBindGroup);
                cp.dispatchWorkgroups(Math.ceil(CLOTH_W / 16), Math.ceil(CLOTH_H / 16));
                cp.end();
            }

            // Render
            const numQuads = (CLOTH_W - 1) * (CLOTH_H - 1);
            const rp = encoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    loadOp: 'clear',
                    clearValue: { r: 0.03, g: 0.03, b: 0.06, a: 1 },
                    storeOp: 'store'
                }]
            });
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, renderBindGroup);
            rp.draw(numQuads * 6);
            rp.end();

            device.queue.submit([encoder.finish()]);
            requestAnimationFrame(render);
        }

        function resetCloth() { initCloth(); }
        window.resetCloth = resetCloth;

        // Controls
        document.getElementById('gravity').addEventListener('input', (e) => {
            gravityStrength = parseFloat(e.target.value);
            document.getElementById('gravVal').textContent = gravityStrength.toFixed(1);
        });
        document.getElementById('wind').addEventListener('input', (e) => {
            windStrength = parseFloat(e.target.value);
            document.getElementById('windVal').textContent = windStrength.toFixed(1);
        });
        document.getElementById('damping').addEventListener('input', (e) => {
            dampingFactor = parseFloat(e.target.value);
            document.getElementById('dampVal').textContent = dampingFactor.toFixed(2);
        });
        document.getElementById('windToggle').addEventListener('change', (e) => {
            windEnabled = e.target.checked;
        });

        canvas.addEventListener('mousedown', () => mouseDown = true);
        canvas.addEventListener('mouseup', () => mouseDown = false);
        canvas.addEventListener('mouseleave', () => mouseDown = false);
        canvas.addEventListener('mousemove', (e) => { mousePos.x = e.clientX; mousePos.y = e.clientY; });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            context.configure({ device, format, alphaMode: 'premultiplied' });
        });

        render();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
