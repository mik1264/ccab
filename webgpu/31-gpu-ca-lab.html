<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Cellular Automata Laboratory - WebGPU</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #3d4423;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
        .controls {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            padding: 18px; border-radius: 16px;
            border: 1px solid rgba(138,154,91,0.3);
            z-index: 100; min-width: 280px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            max-height: 90vh; overflow-y: auto;
        }
        h1 { font-family: 'Lora', serif; font-size: 1.2em; color: #606C38; margin-bottom: 10px; }
        .section-label { font-size: 0.78em; color: #8A9A5B; font-weight: 600; margin: 10px 0 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .rule-grid {
            display: flex; gap: 12px; margin-bottom: 8px;
        }
        .rule-col { flex: 1; }
        .rule-col-label { font-size: 0.75em; color: #606C38; font-weight: 600; margin-bottom: 4px; }
        .rule-checks { display: flex; flex-wrap: wrap; gap: 3px; }
        .rule-check {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(138,154,91,0.1);
            border: 1px solid rgba(138,154,91,0.3);
            border-radius: 6px; cursor: pointer;
            font-size: 0.75em; color: #606C38;
            transition: all 0.15s; user-select: none;
        }
        .rule-check.active {
            background: #8A9A5B; color: #fff; border-color: #606C38;
        }
        .presets { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .preset-btn {
            padding: 4px 9px;
            background: rgba(138,154,91,0.15);
            border: 1px solid rgba(138,154,91,0.3);
            border-radius: 8px; color: #606C38;
            font-size: 0.75em; cursor: pointer;
            font-family: 'Nunito', sans-serif; transition: all 0.2s;
        }
        .preset-btn:hover { background: #8A9A5B; color: #fff; border-color: #8A9A5B; }
        .slider-group { margin-bottom: 8px; }
        .slider-group label {
            display: flex; justify-content: space-between;
            margin-bottom: 3px; font-size: 0.82em; color: #606C38;
        }
        .slider-group input[type="range"] {
            width: 100%; height: 6px; -webkit-appearance: none;
            background: #d4d4aa; border-radius: 3px; outline: none;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            background: #8A9A5B; border-radius: 50%; cursor: pointer;
        }
        .btn-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .btn {
            flex: 1; padding: 7px; border: none; border-radius: 8px;
            background: #8A9A5B; color: #fff; cursor: pointer;
            font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.8em; transition: all 0.2s;
        }
        .btn:hover { background: #606C38; }
        .rule-string {
            font-family: monospace; font-size: 0.82em;
            color: #BC6C25; background: rgba(188,108,37,0.08);
            padding: 4px 8px; border-radius: 6px; margin-bottom: 8px;
        }
        .stats {
            margin-top: 8px; padding-top: 8px;
            border-top: 1px solid rgba(138,154,91,0.2);
            font-size: 0.82em; color: #606C38;
        }
        .stats div { margin-bottom: 2px; }
        .back-link {
            position: fixed; top: 20px; right: 20px;
            color: #606C38; text-decoration: none;
            font-family: 'Nunito', sans-serif; font-size: 0.9em; z-index: 100;
            background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
            padding: 8px 16px; border-radius: 10px;
            border: 1px solid rgba(138,154,91,0.3); transition: all 0.2s;
        }
        .back-link:hover { background: rgba(138,154,91,0.2); }
        .error-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(188,108,37,0.95); color: #fff; padding: 30px;
            border-radius: 16px; text-align: center; max-width: 420px;
            font-family: 'Nunito', sans-serif;
        }
        .error-msg h2 { font-family: 'Lora', serif; margin-bottom: 10px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <h1>CA Laboratory</h1>
        <div class="section-label">Presets</div>
        <div class="presets">
            <button class="preset-btn" data-b="3" data-s="23">Life</button>
            <button class="preset-btn" data-b="36" data-s="23">HighLife</button>
            <button class="preset-btn" data-b="3678" data-s="34678">Day&amp;Night</button>
            <button class="preset-btn" data-b="2" data-s="">Seeds</button>
            <button class="preset-btn" data-b="1" data-s="12">Replicator</button>
            <button class="preset-btn" data-b="368" data-s="245">Morley</button>
        </div>
        <div class="rule-string" id="ruleString">B3/S23</div>
        <div class="section-label">Rule Editor</div>
        <div class="rule-grid">
            <div class="rule-col">
                <div class="rule-col-label">Birth (B)</div>
                <div class="rule-checks" id="birthChecks"></div>
            </div>
            <div class="rule-col">
                <div class="rule-col-label">Survival (S)</div>
                <div class="rule-checks" id="survChecks"></div>
            </div>
        </div>
        <div class="slider-group">
            <label>Speed <span id="speedVal">5</span> steps/frame</label>
            <input type="range" id="speed" min="1" max="20" step="1" value="5">
        </div>
        <div class="btn-row">
            <button class="btn" id="randomBtn">Random</button>
            <button class="btn" id="clearBtn">Clear</button>
            <button class="btn" id="pauseBtn">Pause</button>
        </div>
        <div class="stats">
            <div>Grid: 512 x 512</div>
            <div>Generation: <span id="gen">0</span></div>
            <div>FPS: <span id="fps">0</span></div>
        </div>
    </div>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>

    <script type="module">
        const canvas = document.getElementById('canvas');

        if (!navigator.gpu) {
            document.body.innerHTML = '<div class="error-msg"><h2>WebGPU Not Supported</h2><p>Your browser does not support WebGPU. Try Chrome 113+ or Edge 113+.</p></div>';
            throw new Error('WebGPU not supported');
        }

        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) throw new Error('No adapter');
        const device = await adapter.requestDevice();
        const ctxGPU = canvas.getContext('webgpu');
        const presentFormat = navigator.gpu.getPreferredCanvasFormat();

        function resize() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
            ctxGPU.configure({ device, format: presentFormat, alphaMode: 'opaque' });
        }
        resize();
        window.addEventListener('resize', resize);

        const GRID = 512;
        let stepsPerFrame = 5;
        let paused = false;
        let generation = 0;

        // Birth and survival arrays (0-8 neighbor counts)
        let birth = new Set([3]);
        let survival = new Set([2, 3]);

        // Grid storage buffers (ping-pong)
        const gridSize = GRID * GRID * 4; // u32 per cell
        const gridBufA = device.createBuffer({ size: gridSize, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        const gridBufB = device.createBuffer({ size: gridSize, usage: GPUBufferUsage.STORAGE });

        // Rule buffer: 18 u32s (birth[0..8], survival[0..8])
        const ruleData = new Uint32Array(18);
        const ruleBuf = device.createBuffer({ size: 72, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });

        function updateRuleBuffer() {
            ruleData.fill(0);
            for (const b of birth) ruleData[b] = 1;
            for (const s of survival) ruleData[9 + s] = 1;
            device.queue.writeBuffer(ruleBuf, 0, ruleData);
            updateRuleString();
        }

        function updateRuleString() {
            const bStr = [...birth].sort().join('');
            const sStr = [...survival].sort().join('');
            document.getElementById('ruleString').textContent = `B${bStr}/S${sStr}`;
        }

        function randomGrid() {
            const data = new Uint32Array(GRID * GRID);
            for (let i = 0; i < data.length; i++) {
                data[i] = Math.random() < 0.3 ? 1 : 0;
            }
            device.queue.writeBuffer(gridBufA, 0, data);
            generation = 0;
        }

        function clearGrid() {
            const data = new Uint32Array(GRID * GRID);
            device.queue.writeBuffer(gridBufA, 0, data);
            generation = 0;
        }

        randomGrid();
        updateRuleBuffer();

        // Uniforms
        const uniformData = new Uint32Array([GRID, 0, 0, 0]);
        const uniformBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
        device.queue.writeBuffer(uniformBuf, 0, uniformData);

        // Compute shader
        const computeShader = device.createShaderModule({ code: `
            @group(0) @binding(0) var<storage, read> gridIn: array<u32>;
            @group(0) @binding(1) var<storage, read_write> gridOut: array<u32>;
            @group(0) @binding(2) var<storage, read> rules: array<u32>;
            @group(0) @binding(3) var<uniform> params: vec4u; // gridSize, pad, pad, pad

            @compute @workgroup_size(16, 16)
            fn step(@builtin(global_invocation_id) gid: vec3u) {
                let x = i32(gid.x);
                let y = i32(gid.y);
                let gs = i32(params.x);
                if (x >= gs || y >= gs) { return; }

                // Count Moore neighbors with wrapping
                var count = 0u;
                for (var dy = -1; dy <= 1; dy++) {
                    for (var dx = -1; dx <= 1; dx++) {
                        if (dx == 0 && dy == 0) { continue; }
                        let nx = (x + dx + gs) % gs;
                        let ny = (y + dy + gs) % gs;
                        count += gridIn[u32(ny * gs + nx)];
                    }
                }

                let idx = u32(y * gs + x);
                let alive = gridIn[idx];

                // Apply B/S rule
                if (alive == 0u) {
                    gridOut[idx] = rules[count]; // Birth check
                } else {
                    gridOut[idx] = rules[9u + count]; // Survival check
                }
            }
        `});

        const stepPipeline = device.createComputePipeline({ layout: 'auto', compute: { module: computeShader, entryPoint: 'step' } });

        const stepBG_AB = device.createBindGroup({
            layout: stepPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: gridBufA } },
                { binding: 1, resource: { buffer: gridBufB } },
                { binding: 2, resource: { buffer: ruleBuf } },
                { binding: 3, resource: { buffer: uniformBuf } },
            ],
        });
        const stepBG_BA = device.createBindGroup({
            layout: stepPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: gridBufB } },
                { binding: 1, resource: { buffer: gridBufA } },
                { binding: 2, resource: { buffer: ruleBuf } },
                { binding: 3, resource: { buffer: uniformBuf } },
            ],
        });

        // Render
        const renderShader = device.createShaderModule({ code: `
            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }

            @group(0) @binding(0) var<storage, read> grid: array<u32>;
            @group(0) @binding(1) var<uniform> params: vec4u;

            @vertex
            fn vs(@builtin(vertex_index) vi: u32) -> VSOut {
                var pos = array<vec2f, 6>(
                    vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1),
                    vec2f(-1,1), vec2f(1,-1), vec2f(1,1)
                );
                var out: VSOut;
                out.pos = vec4f(pos[vi], 0, 1);
                out.uv = pos[vi] * 0.5 + 0.5;
                return out;
            }

            @fragment
            fn fs(in: VSOut) -> @location(0) vec4f {
                let gs = params.x;
                let gx = u32(in.uv.x * f32(gs));
                let gy = u32((1.0 - in.uv.y) * f32(gs));
                let idx = gy * gs + gx;
                let alive = grid[idx];

                if (alive > 0u) {
                    return vec4f(0.376, 0.424, 0.220, 1.0); // moss
                }
                return vec4f(0.996, 0.980, 0.878, 1.0); // cream
            }
        `});

        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: renderShader, entryPoint: 'vs' },
            fragment: { module: renderShader, entryPoint: 'fs', targets: [{ format: presentFormat }] },
            primitive: { topology: 'triangle-list' },
        });

        const renderBG_A = device.createBindGroup({
            layout: renderPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: gridBufA } },
                { binding: 1, resource: { buffer: uniformBuf } },
            ],
        });
        const renderBG_B = device.createBindGroup({
            layout: renderPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: gridBufB } },
                { binding: 1, resource: { buffer: uniformBuf } },
            ],
        });

        // Mouse drawing
        let mouseDown = false;
        const drawData = new Uint32Array(GRID * GRID);
        let needUpload = false;

        canvas.addEventListener('mousedown', e => { mouseDown = true; draw(e); });
        canvas.addEventListener('mousemove', e => { if (mouseDown) draw(e); });
        canvas.addEventListener('mouseup', () => mouseDown = false);
        canvas.addEventListener('mouseleave', () => mouseDown = false);

        function draw(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX / rect.width) * GRID);
            const y = Math.floor((e.clientY / rect.height) * GRID);
            const radius = 3;
            for (let dy = -radius; dy <= radius; dy++) {
                for (let dx = -radius; dx <= radius; dx++) {
                    const nx = (x + dx + GRID) % GRID;
                    const ny = (y + dy + GRID) % GRID;
                    drawData[ny * GRID + nx] = 1;
                }
            }
            needUpload = true;
        }

        // Build rule checkboxes
        function buildRuleUI() {
            const birthEl = document.getElementById('birthChecks');
            const survEl = document.getElementById('survChecks');
            birthEl.innerHTML = '';
            survEl.innerHTML = '';
            for (let i = 0; i <= 8; i++) {
                const bDiv = document.createElement('div');
                bDiv.className = 'rule-check' + (birth.has(i) ? ' active' : '');
                bDiv.textContent = i;
                bDiv.addEventListener('click', () => {
                    if (birth.has(i)) birth.delete(i); else birth.add(i);
                    bDiv.classList.toggle('active');
                    updateRuleBuffer();
                });
                birthEl.appendChild(bDiv);

                const sDiv = document.createElement('div');
                sDiv.className = 'rule-check' + (survival.has(i) ? ' active' : '');
                sDiv.textContent = i;
                sDiv.addEventListener('click', () => {
                    if (survival.has(i)) survival.delete(i); else survival.add(i);
                    sDiv.classList.toggle('active');
                    updateRuleBuffer();
                });
                survEl.appendChild(sDiv);
            }
        }
        buildRuleUI();

        // Presets
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                birth = new Set(btn.dataset.b.split('').map(Number));
                survival = new Set(btn.dataset.s ? btn.dataset.s.split('').map(Number) : []);
                buildRuleUI();
                updateRuleBuffer();
                randomGrid();
            });
        });

        document.getElementById('speed').addEventListener('input', e => {
            stepsPerFrame = parseInt(e.target.value);
            document.getElementById('speedVal').textContent = stepsPerFrame;
        });
        document.getElementById('randomBtn').addEventListener('click', randomGrid);
        document.getElementById('clearBtn').addEventListener('click', clearGrid);
        document.getElementById('pauseBtn').addEventListener('click', () => {
            paused = !paused;
            document.getElementById('pauseBtn').textContent = paused ? 'Resume' : 'Pause';
        });

        let step = 0;
        let lastTime = performance.now(), frameCount = 0, fpsAccum = 0;

        function render() {
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            frameCount++; fpsAccum += dt;
            if (fpsAccum >= 1.0) {
                document.getElementById('fps').textContent = Math.round(frameCount / fpsAccum);
                frameCount = 0; fpsAccum = 0;
            }

            if (needUpload) {
                // Upload drawn cells
                device.queue.writeBuffer(step % 2 === 0 ? gridBufA : gridBufB, 0, drawData);
                drawData.fill(0);
                needUpload = false;
            }

            const enc = device.createCommandEncoder();

            if (!paused) {
                for (let i = 0; i < stepsPerFrame; i++) {
                    const cp = enc.beginComputePass();
                    cp.setPipeline(stepPipeline);
                    cp.setBindGroup(0, step % 2 === 0 ? stepBG_AB : stepBG_BA);
                    cp.dispatchWorkgroups(Math.ceil(GRID / 16), Math.ceil(GRID / 16));
                    cp.end();
                    step++;
                    generation++;
                }
                document.getElementById('gen').textContent = generation.toLocaleString();
            }

            const rp = enc.beginRenderPass({
                colorAttachments: [{
                    view: ctxGPU.getCurrentTexture().createView(),
                    loadOp: 'clear', storeOp: 'store',
                    clearValue: { r: 0.996, g: 0.98, b: 0.878, a: 1 },
                }],
            });
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, step % 2 === 0 ? renderBG_A : renderBG_B);
            rp.draw(6);
            rp.end();

            device.queue.submit([enc.finish()]);
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
