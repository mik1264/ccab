<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Surface with Caustics - WebGPU - CCAB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6,182,212,0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6,182,212,0.4); }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 15px; border-radius: 10px; z-index: 100; font-size: 12px; min-width: 210px; border: 1px solid rgba(6,182,212,0.15); }
        .controls h3 { color: #22d3ee; margin-bottom: 10px; font-size: 14px; }
        .controls label { display: block; margin: 8px 0 3px; color: #94a3b8; font-size: 11px; }
        .controls input[type=range] { width: 100%; height: 4px; -webkit-appearance: none; background: #1e293b; border-radius: 2px; outline: none; }
        .controls input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #22d3ee; border-radius: 50%; cursor: pointer; }
        .controls .val { float: right; color: #22d3ee; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; color: #94a3b8; }
        .stats span { color: #22d3ee; }
        .info { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.6); padding: 8px 14px; border-radius: 8px; font-size: 11px; color: #64748b; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(239,68,68,0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <div class="controls">
        <h3>Fluid Caustics</h3>
        <label>Gravity <span class="val" id="gravVal">9.8</span></label>
        <input type="range" id="gravity" min="1" max="30" step="0.5" value="9.8">
        <label>Damping <span class="val" id="dampVal">0.997</span></label>
        <input type="range" id="damping" min="0.98" max="0.999" step="0.001" value="0.997">
        <label>Light Angle <span class="val" id="lightVal">30</span>&deg;</label>
        <input type="range" id="lightAngle" min="10" max="70" step="1" value="30">
        <label>Splash Size <span class="val" id="splashVal">3.0</span></label>
        <input type="range" id="splashSize" min="1.0" max="8.0" step="0.5" value="3.0">
    </div>
    <div class="stats">
        Grid: <span>512x512</span> | FPS: <span id="fps">0</span>
    </div>
    <div class="info">Click to create splashes</div>
    <canvas id="canvas"></canvas>
    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();

        const SIM = 512;

        function resize() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
            context.configure({ device, format, alphaMode: 'opaque' });
        }
        resize();
        window.addEventListener('resize', resize);

        // Height fields: h (height), vh (velocity), vx, vy
        // Using 2 ping-pong buffers, each cell: h, vx, vy, pad
        const cellCount = SIM * SIM;
        const initData = new Float32Array(cellCount * 4);
        for (let i = 0; i < cellCount; i++) {
            initData[i * 4] = 1.0; // initial water height
        }

        const fieldBufA = device.createBuffer({ size: cellCount * 16, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        const fieldBufB = device.createBuffer({ size: cellCount * 16, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        device.queue.writeBuffer(fieldBufA, 0, initData);
        device.queue.writeBuffer(fieldBufB, 0, initData);

        // Splash buffer: x, y, radius, strength (up to 8 splashes)
        const splashBuf = device.createBuffer({ size: 128, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });

        // Uniform: simSize, gravity, damping, dt, lightAngleX, lightAngleZ, time, numSplashes
        const uniformBuf = device.createBuffer({ size: 48, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        // Compute: shallow water step
        const simModule = device.createShaderModule({ code: `
            struct Cell { h: f32, vx: f32, vy: f32, pad: f32 }
            struct Splash { x: f32, y: f32, radius: f32, strength: f32 }
            struct Uniforms {
                simSize: f32, gravity: f32, damping: f32, dt: f32,
                lightAngleX: f32, lightAngleZ: f32, time: f32, numSplashes: f32,
                canvasW: f32, canvasH: f32, pad1: f32, pad2: f32,
            }

            @group(0) @binding(0) var<storage, read> fieldIn: array<Cell>;
            @group(0) @binding(1) var<storage, read_write> fieldOut: array<Cell>;
            @group(0) @binding(2) var<uniform> u: Uniforms;
            @group(0) @binding(3) var<storage, read> splashes: array<Splash>;

            fn getH(x: i32, y: i32) -> f32 {
                let s = i32(u.simSize);
                let cx = clamp(x, 0, s - 1);
                let cy = clamp(y, 0, s - 1);
                return fieldIn[cy * s + cx].h;
            }

            @compute @workgroup_size(16, 16)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let x = i32(gid.x);
                let y = i32(gid.y);
                let s = i32(u.simSize);
                if (x >= s || y >= s) { return; }

                let idx = y * s + x;
                var cell = fieldIn[idx];
                let g = u.gravity;
                let dt = u.dt;

                // Shallow water equations
                // dh/dt = -h * (dvx/dx + dvy/dy)
                // dvx/dt = -g * dh/dx
                // dvy/dt = -g * dh/dy

                let hL = getH(x - 1, y);
                let hR = getH(x + 1, y);
                let hU = getH(x, y - 1);
                let hD = getH(x, y + 1);

                // Gradient of height
                let dhx = (hR - hL) * 0.5;
                let dhy = (hD - hU) * 0.5;

                // Update velocity
                var vx = cell.vx - g * dhx * dt;
                var vy = cell.vy - g * dhy * dt;

                // Damping
                vx *= u.damping;
                vy *= u.damping;

                // Divergence of velocity for height update
                let vxL = fieldIn[y * s + max(x - 1, 0)].vx;
                let vxR = fieldIn[y * s + min(x + 1, s - 1)].vx;
                let vyU = fieldIn[max(y - 1, 0) * s + x].vy;
                let vyD = fieldIn[min(y + 1, s - 1) * s + x].vy;
                let divV = (vxR - vxL + vyD - vyU) * 0.5;

                var h = cell.h - cell.h * divV * dt;

                // Clamp height
                h = max(h, 0.01);

                // Apply splashes
                let nSplash = i32(u.numSplashes);
                for (var i = 0; i < nSplash; i++) {
                    let sp = splashes[i];
                    let dx = f32(x) - sp.x;
                    let dy = f32(y) - sp.y;
                    let dist2 = dx * dx + dy * dy;
                    let r2 = sp.radius * sp.radius;
                    if (dist2 < r2 * 4.0) {
                        h += sp.strength * exp(-dist2 / r2);
                    }
                }

                // Boundary: absorb at edges
                let edgeDist = min(min(f32(x), f32(s - 1 - x)), min(f32(y), f32(s - 1 - y)));
                let edgeFade = smoothstep(0.0, 15.0, edgeDist);
                h = mix(1.0, h, edgeFade);
                vx *= edgeFade;
                vy *= edgeFade;

                fieldOut[idx] = Cell(h, vx, vy, 0.0);
            }
        `});

        // Render: fullscreen quad with caustics
        const renderModule = device.createShaderModule({ code: `
            struct Cell { h: f32, vx: f32, vy: f32, pad: f32 }
            struct Uniforms {
                simSize: f32, gravity: f32, damping: f32, dt: f32,
                lightAngleX: f32, lightAngleZ: f32, time: f32, numSplashes: f32,
                canvasW: f32, canvasH: f32, pad1: f32, pad2: f32,
            }

            @group(0) @binding(0) var<storage, read> field: array<Cell>;
            @group(0) @binding(1) var<uniform> u: Uniforms;

            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }

            @vertex
            fn vs(@builtin(vertex_index) vi: u32) -> VSOut {
                var pos = array<vec2f, 4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var uv = array<vec2f, 4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var out: VSOut;
                out.pos = vec4f(pos[vi], 0, 1);
                out.uv = uv[vi];
                return out;
            }

            fn sampleH(x: f32, y: f32) -> f32 {
                let s = i32(u.simSize);
                let ix = clamp(i32(floor(x)), 0, s - 1);
                let iy = clamp(i32(floor(y)), 0, s - 1);
                return field[iy * s + ix].h;
            }

            @fragment
            fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                let s = u.simSize;
                let aspect = u.canvasW / u.canvasH;

                // Map UV to grid
                var gx = uv.x * s;
                var gy = uv.y * s;

                // Adjust for aspect ratio
                if (aspect > 1.0) {
                    gx = (uv.x - 0.5) * aspect * s / 1.0 + s * 0.5;
                } else {
                    gy = (uv.y - 0.5) / aspect * s / 1.0 + s * 0.5;
                }

                let h = sampleH(gx, gy);

                // Normal from central differences
                let eps = 1.0;
                let hL = sampleH(gx - eps, gy);
                let hR = sampleH(gx + eps, gy);
                let hU = sampleH(gx, gy - eps);
                let hD = sampleH(gx, gy + eps);

                let nx = (hL - hR) * 3.0;
                let ny = (hU - hD) * 3.0;
                let nz = 1.0;
                let nLen = sqrt(nx * nx + ny * ny + nz * nz);
                let normal = vec3f(nx / nLen, ny / nLen, nz / nLen);

                // Light direction
                let la = radians(u.lightAngleX);
                let lightDir = normalize(vec3f(sin(la) * 0.7, 0.3, cos(la)));

                // Refraction for caustics (Snell's law approximation)
                let eta = 1.0 / 1.33; // air to water
                let cosI = dot(normal, lightDir);
                let sinT2 = eta * eta * (1.0 - cosI * cosI);
                let refracted = eta * lightDir + (eta * cosI - sqrt(max(0.0, 1.0 - sinT2))) * normal;

                // Caustic intensity: how much light concentrates
                // Jacobian determinant of refraction mapping
                let hLL = sampleH(gx - 2.0, gy);
                let hRR = sampleH(gx + 2.0, gy);
                let hUU = sampleH(gx, gy - 2.0);
                let hDD = sampleH(gx, gy + 2.0);
                let hLU = sampleH(gx - 1.0, gy - 1.0);
                let hRD = sampleH(gx + 1.0, gy + 1.0);
                let hRU = sampleH(gx + 1.0, gy - 1.0);
                let hLD = sampleH(gx - 1.0, gy + 1.0);

                let dxx = (hR - 2.0 * h + hL) * 8.0;
                let dyy = (hD - 2.0 * h + hU) * 8.0;
                let dxy = (hRD - hRU - hLD + hLU) * 2.0;

                // Caustic intensity based on curvature concentration
                let curvature = abs(dxx + dyy);
                let caustic = pow(curvature, 1.5) * 2.0;

                // Focus/defocus from second derivative
                let det = dxx * dyy - dxy * dxy;
                let focusCaustic = max(0.0, -det * 50.0);

                let totalCaustic = min(caustic + focusCaustic, 4.0);

                // Floor color: sandy beige with tile pattern
                let tileX = sin(gx * 0.2) * 0.03;
                let tileY = sin(gy * 0.2) * 0.03;
                let floorR = 0.76 + tileX;
                let floorG = 0.68 + tileY;
                let floorB = 0.52;

                // Caustic color: bright white-cyan
                let caustR = totalCaustic * 0.9;
                let caustG = totalCaustic * 0.95;
                let caustB = totalCaustic * 1.0;

                // Water tint based on height deviation
                let heightDev = h - 1.0;
                let waterTintR = -heightDev * 0.1;
                let waterTintG = abs(heightDev) * 0.05;
                let waterTintB = heightDev * 0.2;

                // Fresnel-like surface effect
                let viewAngle = max(0.0, normal.z);
                let fresnel = pow(1.0 - viewAngle, 3.0);

                // Surface specular
                let halfVec = normalize(lightDir + vec3f(0.0, 0.0, 1.0));
                let specAngle = max(0.0, dot(normal, halfVec));
                let specular = pow(specAngle, 80.0) * 1.5;

                // Compose
                var r = floorR + caustR - waterTintR + specular * 0.8;
                var g = floorG + caustG + waterTintG + specular * 0.9;
                var b = floorB + caustB + waterTintB + specular * 1.0;

                // Water surface overlay
                let surfaceBlue = 0.15 * (1.0 - viewAngle);
                r -= surfaceBlue * 0.3;
                g += surfaceBlue * 0.1;
                b += surfaceBlue * 0.4;

                // Fresnel reflection (sky color)
                r += fresnel * 0.15;
                g += fresnel * 0.25;
                b += fresnel * 0.35;

                // Ambient
                r += 0.05;
                g += 0.06;
                b += 0.08;

                return vec4f(clamp(r, 0.0, 1.0), clamp(g, 0.0, 1.0), clamp(b, 0.0, 1.0), 1.0);
            }
        `});

        const simPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: simModule, entryPoint: 'main' },
        });

        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: renderModule, entryPoint: 'vs' },
            fragment: { module: renderModule, entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-strip' },
        });

        // Bind groups for ping-pong
        const simBGA = device.createBindGroup({
            layout: simPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: fieldBufA } },
                { binding: 1, resource: { buffer: fieldBufB } },
                { binding: 2, resource: { buffer: uniformBuf } },
                { binding: 3, resource: { buffer: splashBuf } },
            ],
        });
        const simBGB = device.createBindGroup({
            layout: simPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: fieldBufB } },
                { binding: 1, resource: { buffer: fieldBufA } },
                { binding: 2, resource: { buffer: uniformBuf } },
                { binding: 3, resource: { buffer: splashBuf } },
            ],
        });

        const renderBGA = device.createBindGroup({
            layout: renderPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: fieldBufA } },
                { binding: 1, resource: { buffer: uniformBuf } },
            ],
        });
        const renderBGB = device.createBindGroup({
            layout: renderPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: fieldBufB } },
                { binding: 1, resource: { buffer: uniformBuf } },
            ],
        });

        let pingpong = 0;

        // Controls
        const gravSlider = document.getElementById('gravity');
        const dampSlider = document.getElementById('damping');
        const lightSlider = document.getElementById('lightAngle');
        const splashSlider = document.getElementById('splashSize');
        gravSlider.oninput = () => document.getElementById('gravVal').textContent = gravSlider.value;
        dampSlider.oninput = () => document.getElementById('dampVal').textContent = dampSlider.value;
        lightSlider.oninput = () => document.getElementById('lightVal').textContent = lightSlider.value;
        splashSlider.oninput = () => document.getElementById('splashVal').textContent = splashSlider.value;

        // Splash queue
        let pendingSplashes = [];

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) / rect.width;
            const my = (e.clientY - rect.top) / rect.height;
            const sx = mx * SIM;
            const sy = my * SIM;
            const r = parseFloat(splashSlider.value);
            pendingSplashes.push({ x: sx, y: sy, radius: r * 3, strength: 0.3 });
        });

        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons !== 1) return;
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) / rect.width;
            const my = (e.clientY - rect.top) / rect.height;
            const sx = mx * SIM;
            const sy = my * SIM;
            const r = parseFloat(splashSlider.value);
            pendingSplashes.push({ x: sx, y: sy, radius: r * 2, strength: 0.1 });
        });

        // Initial ripples to show the effect immediately
        pendingSplashes.push({ x: SIM * 0.35, y: SIM * 0.4, radius: 12, strength: 0.5 });
        pendingSplashes.push({ x: SIM * 0.65, y: SIM * 0.6, radius: 10, strength: 0.4 });
        pendingSplashes.push({ x: SIM * 0.5, y: SIM * 0.3, radius: 8, strength: 0.35 });

        let time = 0;
        let frameCount = 0, lastFpsTime = performance.now();
        let autoSplashTimer = 0;

        function frame() {
            time += 0.016;
            autoSplashTimer += 0.016;

            // Auto-generate gentle ripples periodically
            if (autoSplashTimer > 2.5) {
                autoSplashTimer = 0;
                const rx = Math.random() * SIM * 0.6 + SIM * 0.2;
                const ry = Math.random() * SIM * 0.6 + SIM * 0.2;
                pendingSplashes.push({ x: rx, y: ry, radius: 6 + Math.random() * 6, strength: 0.15 + Math.random() * 0.2 });
            }

            // Upload splashes
            const numSplashes = Math.min(pendingSplashes.length, 8);
            if (numSplashes > 0) {
                const splashData = new Float32Array(32);
                for (let i = 0; i < numSplashes; i++) {
                    const s = pendingSplashes[i];
                    splashData[i * 4] = s.x;
                    splashData[i * 4 + 1] = s.y;
                    splashData[i * 4 + 2] = s.radius;
                    splashData[i * 4 + 3] = s.strength;
                }
                device.queue.writeBuffer(splashBuf, 0, splashData);
                pendingSplashes = pendingSplashes.slice(numSplashes);
            }

            const dt = 0.15;
            const uniforms = new Float32Array([
                SIM, parseFloat(gravSlider.value), parseFloat(dampSlider.value), dt,
                parseFloat(lightSlider.value), 0, time, numSplashes > 0 ? numSplashes : 0,
                canvas.width, canvas.height, 0, 0,
            ]);
            device.queue.writeBuffer(uniformBuf, 0, uniforms);

            const encoder = device.createCommandEncoder();

            // Multiple sim steps per frame for speed
            const stepsPerFrame = 3;
            for (let i = 0; i < stepsPerFrame; i++) {
                const cp = encoder.beginComputePass();
                cp.setPipeline(simPipeline);
                cp.setBindGroup(0, pingpong === 0 ? simBGA : simBGB);
                cp.dispatchWorkgroups(Math.ceil(SIM / 16), Math.ceil(SIM / 16));
                cp.end();
                pingpong = 1 - pingpong;

                // Clear splashes after first step
                if (i === 0 && numSplashes > 0) {
                    const zeroUniforms = new Float32Array(uniforms);
                    zeroUniforms[7] = 0;
                    device.queue.writeBuffer(uniformBuf, 0, zeroUniforms);
                }
            }

            // Render
            const rp = encoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    clearValue: { r: 0.04, g: 0.06, b: 0.1, a: 1 },
                    loadOp: 'clear', storeOp: 'store',
                }],
            });
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, pingpong === 0 ? renderBGA : renderBGB);
            rp.draw(4);
            rp.end();

            device.queue.submit([encoder.finish()]);

            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime > 500) {
                document.getElementById('fps').textContent = Math.round(frameCount / ((now - lastFpsTime) / 1000));
                frameCount = 0; lastFpsTime = now;
            }

            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    </script>
</body>
</html>
