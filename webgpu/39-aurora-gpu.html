<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Borealis - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls select { width: 165px; background: #1a1a2e; color: #e8e6e1; border: 1px solid #333; padding: 4px; border-radius: 4px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        .title-overlay { position: fixed; top: 70px; left: 20px; z-index: 90; }
        .title-overlay h1 { font-size: 1.4rem; color: #22d3ee; margin: 0 0 4px 0; }
        .title-overlay p { font-size: 0.85rem; color: #888; margin: 0; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to WebGPU Gallery</a>
    <div class="title-overlay">
        <h1>Aurora Borealis</h1>
        <p>Northern lights - GPU particle ribbons with additive blending</p>
    </div>
    <div class="controls">
        <label>Intensity: <span id="intensityVal">0.80</span></label>
        <input type="range" id="intensity" min="0.1" max="1.5" step="0.01" value="0.80">
        <label>Wave Speed: <span id="speedVal">0.50</span></label>
        <input type="range" id="speed" min="0.1" max="2.0" step="0.05" value="0.50">
        <label>Ribbon Count: <span id="ribbonVal">6</span></label>
        <input type="range" id="ribbons" min="2" max="10" step="1" value="6">
        <label>Color Mode:</label>
        <select id="colorMode">
            <option value="0">Classic Green</option>
            <option value="1" selected>Full Spectrum</option>
            <option value="2">Solar Storm</option>
        </select>
    </div>
    <div class="stats">FPS: <span id="fps">0</span></div>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>
    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const ctx = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        ctx.configure({ device, format, alphaMode: 'opaque' });

        let intensity = 0.80, waveSpeed = 0.50, ribbonCount = 6, colorMode = 1;

        const uniformBuffer = device.createBuffer({ size: 48, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        const shaderCode = `
            struct Uniforms {
                time: f32,
                width: f32,
                height: f32,
                intensity: f32,
                waveSpeed: f32,
                ribbonCount: f32,
                colorMode: f32,
                pad: f32,
            }
            @group(0) @binding(0) var<uniform> u: Uniforms;

            struct VO { @builtin(position) pos: vec4f, @location(0) uv: vec2f }

            @vertex fn vs(@builtin(vertex_index) i: u32) -> VO {
                var p = array<vec2f, 4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var uv = array<vec2f, 4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var o: VO; o.pos = vec4f(p[i], 0, 1); o.uv = uv[i]; return o;
            }

            // Procedural hash for star positions
            fn hash21(p: vec2f) -> f32 {
                var p3 = fract(vec3f(p.x, p.y, p.x) * vec3f(0.1031, 0.1030, 0.0973));
                p3 += dot(p3, p3.yzx + 33.33);
                return fract((p3.x + p3.y) * p3.z);
            }

            fn hash22(p: vec2f) -> vec2f {
                let n = vec2f(dot(p, vec2f(127.1, 311.7)), dot(p, vec2f(269.5, 183.3)));
                return fract(sin(n) * 43758.5453);
            }

            // Smooth noise
            fn noise(p: vec2f) -> f32 {
                let ip = floor(p);
                let fp = fract(p);
                let u = fp * fp * (3.0 - 2.0 * fp);
                let a = hash21(ip);
                let b = hash21(ip + vec2f(1.0, 0.0));
                let c = hash21(ip + vec2f(0.0, 1.0));
                let d = hash21(ip + vec2f(1.0, 1.0));
                return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
            }

            fn fbm(p: vec2f) -> f32 {
                var val = 0.0;
                var amp = 0.5;
                var pos = p;
                for (var i = 0; i < 5; i++) {
                    val += amp * noise(pos);
                    pos *= 2.0;
                    amp *= 0.5;
                }
                return val;
            }

            fn auroraRibbon(uv: vec2f, ribbonIdx: f32, t: f32) -> vec4f {
                let n = u.ribbonCount;
                // Base Y position for this ribbon - spread across upper portion
                let baseY = 0.25 + ribbonIdx * 0.07;

                // Undulating wave shape
                let freq = 2.0 + ribbonIdx * 0.7;
                let phase = ribbonIdx * 1.5 + t * u.waveSpeed * (0.5 + ribbonIdx * 0.15);
                let waveY = baseY + sin(uv.x * freq + phase) * 0.08
                    + sin(uv.x * freq * 2.3 + phase * 1.7) * 0.03
                    + fbm(vec2f(uv.x * 3.0 + t * 0.2, ribbonIdx * 5.0)) * 0.06;

                // Ribbon thickness varies along x
                let thickness = 0.03 + 0.02 * sin(uv.x * 4.0 + t * 0.3 + ribbonIdx * 2.0);
                let dist = abs(uv.y - waveY);

                // Soft ribbon falloff
                let ribbonAlpha = exp(-dist * dist / (thickness * thickness * 2.0));

                // Vertical curtain effect (aurora drapes downward)
                let curtainDist = max(0.0, uv.y - waveY);
                let curtain = exp(-curtainDist * curtainDist / 0.015) * 0.6;
                let totalAlpha = (ribbonAlpha + curtain) * u.intensity;

                // Brightness pulsation
                let pulse = 0.7 + 0.3 * sin(t * u.waveSpeed * 0.8 + ribbonIdx * 1.3 + uv.x * 3.0);
                totalAlpha *= pulse;

                // Color based on mode
                var color: vec3f;
                let colorIdx = ribbonIdx / max(n - 1.0, 1.0);

                if (u.colorMode < 0.5) {
                    // Classic green
                    color = mix(
                        vec3f(0.0, 0.8, 0.3),
                        vec3f(0.0, 1.0, 0.5),
                        colorIdx
                    );
                    // Slight blue at edges
                    color = mix(color, vec3f(0.1, 0.4, 0.8), smoothstep(0.0, 0.03, curtainDist) * 0.3);
                } else if (u.colorMode < 1.5) {
                    // Full spectrum
                    let colors = array<vec3f, 5>(
                        vec3f(0.0, 1.0, 0.53),    // green
                        vec3f(0.0, 0.75, 1.0),     // cyan-blue
                        vec3f(1.0, 0.41, 0.71),    // pink
                        vec3f(0.55, 0.0, 1.0),     // purple
                        vec3f(0.0, 1.0, 0.8)       // turquoise
                    );
                    let ci = colorIdx * 4.0;
                    let i0 = i32(floor(ci)) % 5;
                    let i1 = (i0 + 1) % 5;
                    color = mix(colors[i0], colors[i1], fract(ci));
                    // Height-based color shift
                    color = mix(color, vec3f(0.1, 0.3, 0.8), smoothstep(0.0, 0.05, curtainDist) * 0.4);
                } else {
                    // Solar storm - reds and purples
                    color = mix(
                        vec3f(1.0, 0.1, 0.3),
                        vec3f(0.6, 0.0, 1.0),
                        colorIdx
                    );
                    color = mix(color, vec3f(1.0, 0.5, 0.0), sin(uv.x * 10.0 + t) * 0.2 + 0.2);
                }

                return vec4f(color, totalAlpha);
            }

            @fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                let aspect = u.width / u.height;
                var pos = uv;

                // Night sky gradient
                var sky = mix(
                    vec3f(0.0, 0.0, 0.02),  // near-black at top
                    vec3f(0.02, 0.02, 0.08), // very dark blue at horizon
                    pow(uv.y, 0.5)
                );

                // Stars
                let starGrid = floor(pos * vec2f(aspect, 1.0) * 200.0);
                let starRand = hash21(starGrid);
                if (starRand > 0.985) {
                    let starPos = hash22(starGrid);
                    let cellUV = fract(pos * vec2f(aspect, 1.0) * 200.0);
                    let starDist = distance(cellUV, starPos);
                    let twinkle = 0.5 + 0.5 * sin(u.time * (2.0 + starRand * 3.0) + starRand * 100.0);
                    let starBright = exp(-starDist * starDist * 200.0) * twinkle * (0.3 + starRand * 0.7);
                    let starColor = mix(vec3f(0.8, 0.85, 1.0), vec3f(1.0, 0.9, 0.7), hash21(starGrid + 99.0));
                    sky += starColor * starBright;
                }

                // Milky Way band (subtle)
                let milkyDist = abs(pos.y - 0.35 + sin(pos.x * 2.0) * 0.1);
                let milky = exp(-milkyDist * milkyDist * 30.0) * 0.015;
                sky += vec3f(0.6, 0.65, 0.9) * milky * fbm(pos * 50.0);

                // Aurora ribbons with additive blending
                var auroraColor = vec3f(0.0);
                let n = i32(u.ribbonCount);
                for (var i = 0; i < n; i++) {
                    let ribbon = auroraRibbon(pos, f32(i), u.time);
                    auroraColor += ribbon.rgb * ribbon.a;
                }

                // Additive blend aurora onto sky
                var color = sky + auroraColor;

                // Subtle ground silhouette
                let groundLine = 0.88 + fbm(vec2f(pos.x * 5.0, 0.0)) * 0.08;
                let ground = smoothstep(groundLine, groundLine + 0.01, pos.y);
                let groundColor = vec3f(0.01, 0.01, 0.02);
                // Ground reflects aurora light
                let groundReflect = auroraColor * 0.05 * (1.0 - smoothstep(groundLine, groundLine + 0.1, pos.y));
                color = mix(groundColor + groundReflect, color, ground);

                // Tone mapping
                color = color / (color + vec3f(1.0));

                return vec4f(color, 1.0);
            }
        `;

        const shaderModule = device.createShaderModule({ code: shaderCode });
        const pipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: shaderModule, entryPoint: 'vs' },
            fragment: { module: shaderModule, entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-strip' }
        });
        const bindGroup = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [{ binding: 0, resource: { buffer: uniformBuffer } }]
        });

        // UI
        document.getElementById('intensity').addEventListener('input', (e) => {
            intensity = parseFloat(e.target.value);
            document.getElementById('intensityVal').textContent = intensity.toFixed(2);
        });
        document.getElementById('speed').addEventListener('input', (e) => {
            waveSpeed = parseFloat(e.target.value);
            document.getElementById('speedVal').textContent = waveSpeed.toFixed(2);
        });
        document.getElementById('ribbons').addEventListener('input', (e) => {
            ribbonCount = parseInt(e.target.value);
            document.getElementById('ribbonVal').textContent = ribbonCount;
        });
        document.getElementById('colorMode').addEventListener('change', (e) => {
            colorMode = parseInt(e.target.value);
        });

        let lastTime = performance.now(), fpsFrames = 0, fpsTime = 0;
        const startTime = performance.now();

        function render() {
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            fpsFrames++; fpsTime += dt;
            if (fpsTime >= 1.0) {
                document.getElementById('fps').textContent = Math.round(fpsFrames / fpsTime);
                fpsFrames = 0; fpsTime = 0;
            }

            const time = (now - startTime) / 1000;
            device.queue.writeBuffer(uniformBuffer, 0, new Float32Array([
                time, canvas.width, canvas.height, intensity,
                waveSpeed, ribbonCount, colorMode, 0
            ]));

            const encoder = device.createCommandEncoder();
            const pass = encoder.beginRenderPass({
                colorAttachments: [{
                    view: ctx.getCurrentTexture().createView(),
                    loadOp: 'clear', storeOp: 'store', clearValue: { r: 0, g: 0, b: 0, a: 1 }
                }]
            });
            pass.setPipeline(pipeline);
            pass.setBindGroup(0, bindGroup);
            pass.draw(4);
            pass.end();
            device.queue.submit([encoder.finish()]);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.configure({ device, format, alphaMode: 'opaque' });
        });

        render();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
