<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Field Streamlines - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls select { width: 170px; background: #1a1a2e; color: #e8e6e1; border: 1px solid #22d3ee; border-radius: 4px; padding: 3px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; line-height: 1.6; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #22d3ee; font-size: 14px; font-weight: 600; z-index: 100; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); pointer-events: none; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div class="title">Vector Field Streamlines</div>

    <div class="controls">
        <label>Field Preset:</label>
        <select id="preset">
            <option value="0">Dipole</option>
            <option value="1">Vortex Lattice</option>
            <option value="2">Galaxy Arms</option>
            <option value="3">Turbulent Flow</option>
        </select>
        <label>Density: <span id="densityVal">1.0</span></label>
        <input type="range" id="density" min="0.2" max="3.0" step="0.1" value="1.0">
        <label>Speed: <span id="speedVal">1.0</span></label>
        <input type="range" id="speed" min="0.1" max="3.0" step="0.1" value="1.0">
        <label>Color Mode:</label>
        <select id="colorMode">
            <option value="0">Direction Hue</option>
            <option value="1">Speed Gradient</option>
            <option value="2">Cyan Glow</option>
            <option value="3">Warm Sunset</option>
        </select>
    </div>

    <div class="stats">FPS: <span id="fps">0</span></div>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'opaque' });

        let preset = 0, density = 1.0, speed = 1.0, colorMode = 0;

        document.getElementById('preset').onchange = e => { preset = +e.target.value; };
        document.getElementById('density').oninput = e => { density = +e.target.value; document.getElementById('densityVal').textContent = density.toFixed(1); };
        document.getElementById('speed').oninput = e => { speed = +e.target.value; document.getElementById('speedVal').textContent = speed.toFixed(1); };
        document.getElementById('colorMode').onchange = e => { colorMode = +e.target.value; };

        const uniformBuffer = device.createBuffer({ size: 48, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        const shaderCode = `
            struct Uniforms {
                resolution: vec2f,
                time: f32,
                speed: f32,
                density: f32,
                preset: u32,
                colorMode: u32,
                aspect: f32,
            }
            @group(0) @binding(0) var<uniform> u: Uniforms;

            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }

            @vertex fn vs(@builtin(vertex_index) i: u32) -> VSOut {
                var p = array<vec2f,6>(
                    vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1),
                    vec2f(-1,1), vec2f(1,-1), vec2f(1,1)
                );
                var o: VSOut;
                o.pos = vec4f(p[i], 0, 1);
                o.uv = p[i] * 0.5 + 0.5;
                return o;
            }

            fn hash21(p: vec2f) -> f32 {
                var p3 = fract(vec3f(p.x, p.y, p.x) * 0.1031);
                p3 += dot(p3, vec3f(p3.y + 33.33, p3.z + 33.33, p3.x + 33.33));
                return fract((p3.x + p3.y) * p3.z);
            }

            fn noise2(p: vec2f) -> f32 {
                let i = floor(p);
                let f = fract(p);
                let u2 = f * f * (3.0 - 2.0 * f);
                let a = hash21(i);
                let b = hash21(i + vec2f(1, 0));
                let c = hash21(i + vec2f(0, 1));
                let d = hash21(i + vec2f(1, 1));
                return mix(mix(a, b, u2.x), mix(c, d, u2.x), u2.y);
            }

            // Vector field functions
            fn fieldDipole(p: vec2f, t: f32) -> vec2f {
                let c1 = vec2f(-0.3 + 0.1 * sin(t * 0.3), 0.1 * cos(t * 0.4));
                let c2 = vec2f(0.3 + 0.1 * cos(t * 0.25), -0.1 * sin(t * 0.35));
                let d1 = p - c1;
                let d2 = p - c2;
                let r1sq = max(dot(d1, d1), 0.001);
                let r2sq = max(dot(d2, d2), 0.001);
                // Source at c1, sink at c2
                let v1 = d1 / r1sq;
                let v2 = -d2 / r2sq;
                return v1 + v2;
            }

            fn fieldVortexLattice(p: vec2f, t: f32) -> vec2f {
                var v = vec2f(0.0);
                let sc = 2.0;
                let pp = p * sc;
                // Multiple vortices in a grid pattern
                for (var ix = -1; ix <= 1; ix++) {
                    for (var iy = -1; iy <= 1; iy++) {
                        let center = vec2f(f32(ix), f32(iy)) * 0.8;
                        let d = pp - center;
                        let r2 = max(dot(d, d), 0.01);
                        let sign = select(-1.0, 1.0, (ix + iy) % 2 == 0);
                        v += sign * vec2f(-d.y, d.x) / r2 * 0.3;
                    }
                }
                // Add slow drift
                v += vec2f(sin(t * 0.1) * 0.1, cos(t * 0.15) * 0.1);
                return v;
            }

            fn fieldGalaxy(p: vec2f, t: f32) -> vec2f {
                let r = length(p);
                let theta = atan2(p.y, p.x);
                // Spiral with radial falloff
                let angVel = 1.0 / max(r, 0.1);
                let tangent = vec2f(-p.y, p.x) / max(r, 0.01);
                // Add inward spiral
                let radial = -p * 0.2 / max(r, 0.1);
                let spiral = tangent * angVel * 0.3 + radial;
                // Add noise perturbation
                let n = noise2(p * 3.0 + t * 0.2);
                return spiral + vec2f(sin(n * 6.28), cos(n * 6.28)) * 0.1;
            }

            fn fieldTurbulent(p: vec2f, t: f32) -> vec2f {
                let sc = 3.0;
                let pp = p * sc;
                let n1 = noise2(pp + vec2f(t * 0.3, 0.0));
                let n2 = noise2(pp + vec2f(0.0, t * 0.3) + vec2f(5.3, 1.7));
                let n3 = noise2(pp * 2.0 + vec2f(t * 0.5, t * 0.2) + vec2f(3.1, 7.9));
                let angle = (n1 + n3 * 0.5) * 6.28318;
                let mag = 0.5 + n2 * 0.5;
                return vec2f(cos(angle), sin(angle)) * mag;
            }

            fn getField(p: vec2f, t: f32, preset: u32) -> vec2f {
                if (preset == 0u) { return fieldDipole(p, t); }
                if (preset == 1u) { return fieldVortexLattice(p, t); }
                if (preset == 2u) { return fieldGalaxy(p, t); }
                return fieldTurbulent(p, t);
            }

            fn hsl2rgb(h: f32, s: f32, l: f32) -> vec3f {
                let c = (1.0 - abs(2.0 * l - 1.0)) * s;
                let hp = fract(h) * 6.0;
                let x = c * (1.0 - abs(hp % 2.0 - 1.0));
                var rgb: vec3f;
                if (hp < 1.0) { rgb = vec3f(c, x, 0); }
                else if (hp < 2.0) { rgb = vec3f(x, c, 0); }
                else if (hp < 3.0) { rgb = vec3f(0, c, x); }
                else if (hp < 4.0) { rgb = vec3f(0, x, c); }
                else if (hp < 5.0) { rgb = vec3f(x, 0, c); }
                else { rgb = vec3f(c, 0, x); }
                return rgb + vec3f(l - c * 0.5);
            }

            @fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                let aspect = u.resolution.x / u.resolution.y;
                let p = (uv - 0.5) * vec2f(aspect, 1.0) * 2.0;
                let t = u.time * u.speed;

                // Trace streamlines from this point
                var pos = p;
                var totalMag = 0.0;
                var totalAngle = 0.0;
                var lineVal = 0.0;
                let steps = 40;
                let dt = 0.02 / u.density;

                for (var i = 0; i < steps; i++) {
                    let field = getField(pos, t, u.preset);
                    let mag = length(field);
                    totalMag += mag;
                    totalAngle += atan2(field.y, field.x);

                    // Advance position along field
                    pos += normalize(field + vec2f(0.0001)) * dt;

                    // Line Integral Convolution: accumulate noise at traced positions
                    let noisePos = pos * 8.0 * u.density + vec2f(t * 0.5);
                    lineVal += noise2(noisePos);
                }

                // Trace backward too for symmetry
                pos = p;
                for (var i = 0; i < steps; i++) {
                    let field = getField(pos, t, u.preset);
                    let mag = length(field);
                    totalMag += mag;
                    pos -= normalize(field + vec2f(0.0001)) * dt;
                    let noisePos = pos * 8.0 * u.density + vec2f(t * 0.5);
                    lineVal += noise2(noisePos);
                }

                let totalSteps = f32(steps * 2);
                lineVal /= totalSteps;
                totalMag /= totalSteps;
                totalAngle /= f32(steps);

                // Enhance contrast of LIC
                let lic = smoothstep(0.3, 0.7, lineVal);

                // Get field at current point for direction coloring
                let fieldHere = getField(p, t, u.preset);
                let angle = atan2(fieldHere.y, fieldHere.x);
                let mag = length(fieldHere);

                var color: vec3f;

                if (u.colorMode == 0u) {
                    // Direction hue: angle maps to hue, magnitude to brightness
                    let hue = fract(angle / 6.28318 + 0.5);
                    color = hsl2rgb(hue, 0.85, 0.15 + lic * 0.5 * min(mag, 2.0));
                } else if (u.colorMode == 1u) {
                    // Speed gradient: blue (slow) to red (fast)
                    let spd = clamp(mag * 0.5, 0.0, 1.0);
                    let hue = 0.65 - spd * 0.65; // blue to red
                    color = hsl2rgb(hue, 0.9, 0.1 + lic * 0.5);
                } else if (u.colorMode == 2u) {
                    // Cyan glow
                    let intensity = lic * min(mag * 0.8, 1.5);
                    color = vec3f(0.0, 0.4, 0.5) * intensity + vec3f(0.0, 0.8, 1.0) * pow(intensity, 3.0) * 0.5;
                } else {
                    // Warm sunset
                    let spd = clamp(mag * 0.5, 0.0, 1.0);
                    let hue = 0.08 - spd * 0.05;
                    color = hsl2rgb(hue, 0.8, 0.05 + lic * 0.5);
                    color += vec3f(0.3, 0.1, 0.0) * pow(lic, 3.0) * mag * 0.3;
                }

                // Add subtle vignette
                let vignette = 1.0 - dot(p, p) * 0.15;
                color *= max(vignette, 0.0);

                return vec4f(color, 1.0);
            }
        `;

        const shaderModule = device.createShaderModule({ code: shaderCode });

        const pipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: shaderModule, entryPoint: 'vs' },
            fragment: { module: shaderModule, entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-list' },
        });

        const bindGroup = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [{ binding: 0, resource: { buffer: uniformBuffer } }],
        });

        let fpsC = 0, fpsT = performance.now(), startTime = performance.now();

        function frame() {
            requestAnimationFrame(frame);
            const now = performance.now();
            fpsC++;
            if (now - fpsT > 500) {
                document.getElementById('fps').textContent = Math.round(fpsC / ((now - fpsT) / 1000));
                fpsC = 0; fpsT = now;
            }

            const time = (now - startTime) * 0.001;
            const buf = new ArrayBuffer(48);
            const f32 = new Float32Array(buf);
            const u32 = new Uint32Array(buf);
            f32[0] = canvas.width; f32[1] = canvas.height;
            f32[2] = time;
            f32[3] = speed;
            f32[4] = density;
            u32[5] = preset;
            u32[6] = colorMode;
            f32[7] = canvas.width / canvas.height;

            device.queue.writeBuffer(uniformBuffer, 0, buf);

            const enc = device.createCommandEncoder();
            const rp = enc.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    loadOp: 'clear', storeOp: 'store',
                    clearValue: { r: 0.02, g: 0.02, b: 0.04, a: 1 },
                }],
            });
            rp.setPipeline(pipeline);
            rp.setBindGroup(0, bindGroup);
            rp.draw(6);
            rp.end();
            device.queue.submit([enc.finish()]);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            context.configure({ device, format, alphaMode: 'opaque' });
        });

        requestAnimationFrame(frame);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
