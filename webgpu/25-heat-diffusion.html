<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Diffusion - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; cursor: crosshair; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls select { width: 175px; background: #1a1a2e; color: #e8e6e1; border: 1px solid #22d3ee; border-radius: 4px; padding: 3px; }
        .controls input[type=range] { width: 165px; }
        .controls button { margin: 3px 2px; padding: 5px 10px; background: #22d3ee; color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .controls .row { display: flex; gap: 4px; margin-top: 6px; }
        .controls .row button { flex: 1; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; line-height: 1.6; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #22d3ee; font-size: 14px; font-weight: 600; z-index: 100; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); pointer-events: none; }
        .info { font-size: 10px; color: #888; margin-top: 8px; line-height: 1.4; }
        .tool-btn { padding: 5px 10px; border: 1px solid #22d3ee; background: transparent; color: #22d3ee; border-radius: 4px; cursor: pointer; font-size: 11px; margin: 2px; }
        .tool-btn.active { background: #22d3ee; color: #000; }
        .tools { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 8px; }
        .convergence { font-size: 11px; margin-top: 6px; color: #22d3ee; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to WebGPU Gallery</a>
    <div class="title">Heat Diffusion Simulation</div>

    <div class="controls">
        <label>Material:</label>
        <select id="material">
            <option value="0">Copper (alpha=1.11)</option>
            <option value="1">Steel (alpha=0.14)</option>
            <option value="2">Wood (alpha=0.013)</option>
            <option value="3">Air (alpha=0.19)</option>
        </select>
        <label>Brush Size: <span id="brushVal">20</span></label>
        <input type="range" id="brushSize" min="5" max="60" step="1" value="20">
        <label>Brush Temp: <span id="tempVal">100</span> C</label>
        <input type="range" id="brushTemp" min="-50" max="200" step="5" value="100">
        <label>Paint Tool:</label>
        <div class="tools">
            <button class="tool-btn active" id="toolHot" onclick="window.setTool('hot')">Hot Source</button>
            <button class="tool-btn" id="toolCold" onclick="window.setTool('cold')">Cold Sink</button>
            <button class="tool-btn" id="toolInsulator" onclick="window.setTool('insulator')">Insulator</button>
            <button class="tool-btn" id="toolErase" onclick="window.setTool('erase')">Erase</button>
        </div>
        <label>Colormap:</label>
        <select id="colormap">
            <option value="0">Plasma</option>
            <option value="1">Viridis</option>
            <option value="2">Inferno</option>
            <option value="3">Coolwarm</option>
        </select>
        <div class="row">
            <button onclick="window.resetSim()">Reset</button>
            <button onclick="window.togglePause()">Pause</button>
        </div>
        <div class="convergence">
            Delta/step: <span id="delta">-</span>
        </div>
        <div class="info">
            Click/drag to paint temperature.<br>
            Cursor temp: <span id="cursorTemp">-</span> C
        </div>
    </div>

    <div class="stats">
        FPS: <span id="fps">0</span> | Grid: 512x512 | Steps: <span id="steps">0</span>
    </div>

    <div id="error">
        WebGPU is not supported in your browser.<br>
        Please use Chrome 113+, Edge 113+, or Safari 18+.
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        const canvas = document.getElementById('canvas');
        const N = 512;
        canvas.width = N;
        canvas.height = N;
        canvas.style.width = '100vmin';
        canvas.style.height = '100vmin';
        canvas.style.position = 'absolute';
        canvas.style.left = '50%';
        canvas.style.top = '50%';
        canvas.style.transform = 'translate(-50%, -50%)';

        // Material diffusivity values (cm^2/s, scaled for simulation)
        const materialAlpha = [1.11, 0.14, 0.013, 0.19];
        let materialIdx = 0;
        let brushSize = 20;
        let brushTemp = 100;
        let tool = 'hot'; // hot, cold, insulator, erase
        let colormapId = 0;
        let paused = false;
        let mouseDown = false;
        let mouseButton = 0;
        let mouseX = -1, mouseY = -1;
        let totalSteps = 0;

        if (!navigator.gpu) {
            document.getElementById('error').style.display = 'block';
            throw new Error('WebGPU not supported');
        }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const context = canvas.getContext('webgpu');
        const fmt = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format: fmt, alphaMode: 'opaque' });

        const cellCount = N * N;

        // Temperature ping-pong buffers
        const tempBuffers = [
            device.createBuffer({ size: cellCount * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }),
            device.createBuffer({ size: cellCount * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST })
        ];
        // Insulator mask (0 = normal, 1 = insulator/fixed source)
        // Encoding: 0=normal, 1=insulator, 2=hot source, 3=cold source
        const maskBuffer = device.createBuffer({ size: cellCount * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });

        const uniformBuffer = device.createBuffer({ size: 48, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        const heatShader = `
            struct Uniforms {
                size: u32,
                alpha: f32,
                mouseX: f32,
                mouseY: f32,
                mouseActive: f32,
                brushSize: f32,
                brushTemp: f32,
                toolType: u32, // 0=hot, 1=cold, 2=insulator, 3=erase
                stepsPerFrame: u32,
                pad1: u32,
                pad2: u32,
                pad3: u32,
            }

            @group(0) @binding(0) var<storage, read> tempIn: array<f32>;
            @group(0) @binding(1) var<storage, read_write> tempOut: array<f32>;
            @group(0) @binding(2) var<storage, read> mask: array<u32>;
            @group(0) @binding(3) var<uniform> u: Uniforms;

            @compute @workgroup_size(16, 16)
            fn main(@builtin(global_invocation_id) id: vec3u) {
                let s = u.size;
                if (id.x >= s || id.y >= s) { return; }
                let x = id.x;
                let y = id.y;
                let idx = y * s + x;

                let m = mask[idx];

                // Fixed temperature sources/insulators don't change
                if (m == 1u) {
                    // Insulator: no heat flow
                    tempOut[idx] = tempIn[idx];
                    return;
                }
                if (m == 2u || m == 3u) {
                    // Fixed temperature source
                    tempOut[idx] = tempIn[idx];
                    return;
                }

                // Boundary: insulated (Neumann)
                let left = select(tempIn[y * s + (x - 1u)], tempIn[idx], x == 0u);
                let right = select(tempIn[y * s + (x + 1u)], tempIn[idx], x == s - 1u);
                let up = select(tempIn[(y - 1u) * s + x], tempIn[idx], y == 0u);
                let down = select(tempIn[(y + 1u) * s + x], tempIn[idx], y == s - 1u);
                let center = tempIn[idx];

                // Check neighbor masks - insulators block heat flow
                let ml = select(1.0, 0.0, x > 0u && mask[y * s + (x - 1u)] == 1u);
                let mr = select(1.0, 0.0, x < s - 1u && mask[y * s + (x + 1u)] == 1u);
                let mu = select(1.0, 0.0, y > 0u && mask[(y - 1u) * s + x] == 1u);
                let md = select(1.0, 0.0, y < s - 1u && mask[(y + 1u) * s + x] == 1u);

                let laplacian = ml * (left - center) + mr * (right - center) + mu * (up - center) + md * (down - center);

                // Explicit Euler: T_new = T + alpha * dt/dx^2 * laplacian
                // dt/dx^2 chosen for stability: alpha * dt/dx^2 < 0.25
                let dtdx2 = 0.2 / max(u.alpha, 0.01);
                let newTemp = center + u.alpha * dtdx2 * laplacian;

                tempOut[idx] = clamp(newTemp, -100.0, 300.0);
            }
        `;

        const paintShader = `
            struct Uniforms {
                size: u32,
                alpha: f32,
                mouseX: f32,
                mouseY: f32,
                mouseActive: f32,
                brushSize: f32,
                brushTemp: f32,
                toolType: u32,
                stepsPerFrame: u32,
                pad1: u32,
                pad2: u32,
                pad3: u32,
            }

            @group(0) @binding(0) var<storage, read_write> temp: array<f32>;
            @group(0) @binding(1) var<storage, read_write> mask: array<u32>;
            @group(0) @binding(2) var<uniform> u: Uniforms;

            @compute @workgroup_size(16, 16)
            fn main(@builtin(global_invocation_id) id: vec3u) {
                let s = u.size;
                if (id.x >= s || id.y >= s) { return; }
                if (u.mouseActive < 0.5) { return; }

                let x = id.x; let y = id.y;
                let idx = y * s + x;
                let dist = length(vec2f(f32(x), f32(y)) - vec2f(u.mouseX, u.mouseY));

                if (dist > u.brushSize) { return; }

                if (u.toolType == 0u) {
                    // Hot source
                    let w = 1.0 - dist / u.brushSize;
                    temp[idx] = max(temp[idx], u.brushTemp * w);
                    if (dist < u.brushSize * 0.5) {
                        mask[idx] = 2u;
                    }
                } else if (u.toolType == 1u) {
                    // Cold sink
                    let w = 1.0 - dist / u.brushSize;
                    temp[idx] = min(temp[idx], u.brushTemp * w);
                    if (dist < u.brushSize * 0.5) {
                        mask[idx] = 3u;
                    }
                } else if (u.toolType == 2u) {
                    // Insulator
                    mask[idx] = 1u;
                } else {
                    // Erase
                    mask[idx] = 0u;
                    temp[idx] = 20.0; // Room temperature
                }
            }
        `;

        const renderShader = `
            struct Uniforms {
                size: u32,
                colormap: u32,
                pad1: u32,
                pad2: u32,
            }
            @group(0) @binding(0) var<storage, read> temp: array<f32>;
            @group(0) @binding(1) var<storage, read> mask: array<u32>;
            @group(0) @binding(2) var outTex: texture_storage_2d<rgba8unorm, write>;
            @group(0) @binding(3) var<uniform> u: Uniforms;

            fn plasma(t: f32) -> vec3f {
                let c0 = vec3f(0.050383, 0.029803, 0.527975);
                let c1 = vec3f(0.494877, 0.012370, 0.658007);
                let c2 = vec3f(0.798216, 0.280197, 0.469538);
                let c3 = vec3f(0.973416, 0.585761, 0.254152);
                let c4 = vec3f(0.940015, 0.975158, 0.131326);
                if (t < 0.25) { return mix(c0, c1, t * 4.0); }
                if (t < 0.5) { return mix(c1, c2, (t - 0.25) * 4.0); }
                if (t < 0.75) { return mix(c2, c3, (t - 0.5) * 4.0); }
                return mix(c3, c4, (t - 0.75) * 4.0);
            }

            fn viridis(t: f32) -> vec3f {
                let c0 = vec3f(0.267004, 0.004874, 0.329415);
                let c1 = vec3f(0.282327, 0.140926, 0.457517);
                let c2 = vec3f(0.127568, 0.566949, 0.550556);
                let c3 = vec3f(0.369214, 0.788888, 0.382914);
                let c4 = vec3f(0.993248, 0.906157, 0.143936);
                if (t < 0.25) { return mix(c0, c1, t * 4.0); }
                if (t < 0.5) { return mix(c1, c2, (t - 0.25) * 4.0); }
                if (t < 0.75) { return mix(c2, c3, (t - 0.5) * 4.0); }
                return mix(c3, c4, (t - 0.75) * 4.0);
            }

            fn inferno(t: f32) -> vec3f {
                let c0 = vec3f(0.001462, 0.000466, 0.013866);
                let c1 = vec3f(0.341500, 0.062325, 0.429425);
                let c2 = vec3f(0.735683, 0.215906, 0.330245);
                let c3 = vec3f(0.978422, 0.557937, 0.034931);
                let c4 = vec3f(0.988362, 0.998364, 0.644924);
                if (t < 0.25) { return mix(c0, c1, t * 4.0); }
                if (t < 0.5) { return mix(c1, c2, (t - 0.25) * 4.0); }
                if (t < 0.75) { return mix(c2, c3, (t - 0.5) * 4.0); }
                return mix(c3, c4, (t - 0.75) * 4.0);
            }

            fn coolwarm(t: f32) -> vec3f {
                if (t < 0.5) {
                    let s = t * 2.0;
                    return mix(vec3f(0.23, 0.30, 0.75), vec3f(0.87, 0.87, 0.87), s);
                } else {
                    let s = (t - 0.5) * 2.0;
                    return mix(vec3f(0.87, 0.87, 0.87), vec3f(0.71, 0.02, 0.15), s);
                }
            }

            @compute @workgroup_size(16, 16)
            fn main(@builtin(global_invocation_id) id: vec3u) {
                if (id.x >= u.size || id.y >= u.size) { return; }
                let idx = id.y * u.size + id.x;
                let t = temp[idx];
                let m = mask[idx];

                // Map temperature to 0..1 range: -50C to 200C
                let normalized = clamp((t + 50.0) / 250.0, 0.0, 1.0);

                var color: vec3f;
                if (u.colormap == 0u) { color = plasma(normalized); }
                else if (u.colormap == 1u) { color = viridis(normalized); }
                else if (u.colormap == 2u) { color = inferno(normalized); }
                else { color = coolwarm(normalized); }

                // Overlay insulator mask
                if (m == 1u) {
                    color = mix(color, vec3f(0.4, 0.3, 0.2), 0.6);
                }
                // Source indicators
                if (m == 2u) {
                    color = mix(color, vec3f(1.0, 0.3, 0.1), 0.2);
                }
                if (m == 3u) {
                    color = mix(color, vec3f(0.1, 0.3, 1.0), 0.2);
                }

                textureStore(outTex, vec2i(id.xy), vec4f(color, 1.0));
            }
        `;

        const displayShader = `
            @group(0) @binding(0) var tex: texture_2d<f32>;
            @group(0) @binding(1) var samp: sampler;
            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VSOut {
                var p = array<vec2f,4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var u = array<vec2f,4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var o: VSOut; o.pos = vec4f(p[i], 0, 1); o.uv = u[i]; return o;
            }
            @fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                return textureSample(tex, samp, uv);
            }
        `;

        const heatPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: heatShader }), entryPoint: 'main' }
        });

        const paintPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: paintShader }), entryPoint: 'main' }
        });

        const renderPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: renderShader }), entryPoint: 'main' }
        });

        const outTexture = device.createTexture({
            size: [N, N], format: 'rgba8unorm',
            usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING
        });
        const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });

        const renderUniformBuffer = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        const displayPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: device.createShaderModule({ code: displayShader }), entryPoint: 'vs' },
            fragment: { module: device.createShaderModule({ code: displayShader }), entryPoint: 'fs', targets: [{ format: fmt }] },
            primitive: { topology: 'triangle-strip' }
        });

        const dispBG = device.createBindGroup({
            layout: displayPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: sampler }
            ]
        });

        function initTemp() {
            // Room temperature everywhere (20C)
            const data = new Float32Array(cellCount);
            data.fill(20.0);
            device.queue.writeBuffer(tempBuffers[0], 0, data);
            device.queue.writeBuffer(tempBuffers[1], 0, data);
            const maskData = new Uint32Array(cellCount);
            maskData.fill(0);
            device.queue.writeBuffer(maskBuffer, 0, maskData);
            totalSteps = 0;
        }

        initTemp();

        const wg = Math.ceil(N / 16);
        let step = 0;
        let lastTime = performance.now();
        let fpsC = 0, fpsT = performance.now();

        function frame() {
            requestAnimationFrame(frame);
            if (paused) return;

            const now = performance.now();
            lastTime = now;
            fpsC++;
            if (now - fpsT > 500) {
                document.getElementById('fps').textContent = Math.round(fpsC / ((now - fpsT) / 1000));
                fpsC = 0; fpsT = now;
            }

            const alpha = materialAlpha[materialIdx];
            const toolIdx = tool === 'hot' ? 0 : tool === 'cold' ? 1 : tool === 'insulator' ? 2 : 3;

            const buf = new ArrayBuffer(48);
            const u32 = new Uint32Array(buf);
            const f32 = new Float32Array(buf);
            u32[0] = N;
            f32[1] = alpha;
            f32[2] = mouseX;
            f32[3] = mouseY;
            f32[4] = mouseDown ? 1.0 : 0.0;
            f32[5] = brushSize;
            f32[6] = tool === 'cold' ? -20 : brushTemp;
            u32[7] = toolIdx;
            u32[8] = 10;
            device.queue.writeBuffer(uniformBuffer, 0, buf);

            // Render uniform
            const rbuf = new Uint32Array([N, colormapId, 0, 0]);
            device.queue.writeBuffer(renderUniformBuffer, 0, rbuf);

            const enc = device.createCommandEncoder();

            // Paint pass (apply brush)
            if (mouseDown) {
                const s0 = step % 2;
                const paintBG = device.createBindGroup({
                    layout: paintPipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: tempBuffers[s0] } },
                        { binding: 1, resource: { buffer: maskBuffer } },
                        { binding: 2, resource: { buffer: uniformBuffer } }
                    ]
                });
                const pp = enc.beginComputePass();
                pp.setPipeline(paintPipeline);
                pp.setBindGroup(0, paintBG);
                pp.dispatchWorkgroups(wg, wg);
                pp.end();
            }

            // Heat diffusion steps (multiple per frame for faster simulation)
            const stepsPerFrame = 10;
            for (let i = 0; i < stepsPerFrame; i++) {
                const s0 = (step + i) % 2;
                const s1 = 1 - s0;
                const heatBG = device.createBindGroup({
                    layout: heatPipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: tempBuffers[s0] } },
                        { binding: 1, resource: { buffer: tempBuffers[s1] } },
                        { binding: 2, resource: { buffer: maskBuffer } },
                        { binding: 3, resource: { buffer: uniformBuffer } }
                    ]
                });
                const hp = enc.beginComputePass();
                hp.setPipeline(heatPipeline);
                hp.setBindGroup(0, heatBG);
                hp.dispatchWorkgroups(wg, wg);
                hp.end();
            }
            step += stepsPerFrame;
            totalSteps += stepsPerFrame;
            document.getElementById('steps').textContent = totalSteps;

            // Render
            const latestBuf = step % 2;
            const renderBG = device.createBindGroup({
                layout: renderPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: tempBuffers[latestBuf] } },
                    { binding: 1, resource: { buffer: maskBuffer } },
                    { binding: 2, resource: outTexture.createView() },
                    { binding: 3, resource: { buffer: renderUniformBuffer } }
                ]
            });
            const rp = enc.beginComputePass();
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, renderBG);
            rp.dispatchWorkgroups(wg, wg);
            rp.end();

            const dPass = enc.beginRenderPass({
                colorAttachments: [{ view: context.getCurrentTexture().createView(), loadOp: 'clear', storeOp: 'store' }]
            });
            dPass.setPipeline(displayPipeline);
            dPass.setBindGroup(0, dispBG);
            dPass.draw(4);
            dPass.end();

            device.queue.submit([enc.finish()]);
        }

        // Mouse
        function getGridPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: ((e.clientX - rect.left) / rect.width) * N,
                y: ((e.clientY - rect.top) / rect.height) * N
            };
        }

        canvas.addEventListener('mousedown', (e) => {
            mouseDown = true;
            mouseButton = e.button;
            const pos = getGridPos(e);
            mouseX = pos.x;
            mouseY = pos.y;
        });
        canvas.addEventListener('mousemove', (e) => {
            const pos = getGridPos(e);
            mouseX = pos.x;
            mouseY = pos.y;
            // Estimate temperature at cursor (approximate as grid center value)
            const gx = Math.floor(pos.x);
            const gy = Math.floor(pos.y);
            if (gx >= 0 && gx < N && gy >= 0 && gy < N) {
                document.getElementById('cursorTemp').textContent = '~' + Math.round(20) + ' (approx)';
            }
        });
        canvas.addEventListener('mouseup', () => mouseDown = false);
        canvas.addEventListener('mouseleave', () => mouseDown = false);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        // Touch
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseDown = true;
            const rect = canvas.getBoundingClientRect();
            const t = e.touches[0];
            mouseX = ((t.clientX - rect.left) / rect.width) * N;
            mouseY = ((t.clientY - rect.top) / rect.height) * N;
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const t = e.touches[0];
            mouseX = ((t.clientX - rect.left) / rect.width) * N;
            mouseY = ((t.clientY - rect.top) / rect.height) * N;
        });
        canvas.addEventListener('touchend', () => mouseDown = false);

        // Controls
        document.getElementById('material').addEventListener('change', (e) => {
            materialIdx = parseInt(e.target.value);
        });
        document.getElementById('brushSize').addEventListener('input', (e) => {
            brushSize = parseInt(e.target.value);
            document.getElementById('brushVal').textContent = brushSize;
        });
        document.getElementById('brushTemp').addEventListener('input', (e) => {
            brushTemp = parseInt(e.target.value);
            document.getElementById('tempVal').textContent = brushTemp;
        });
        document.getElementById('colormap').addEventListener('change', (e) => {
            colormapId = parseInt(e.target.value);
        });

        window.setTool = (t) => {
            tool = t;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tool' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
        };

        window.resetSim = () => { initTemp(); step = 0; };
        window.togglePause = () => { paused = !paused; };

        requestAnimationFrame(frame);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
