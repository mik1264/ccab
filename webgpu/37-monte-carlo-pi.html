<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monte Carlo Pi Estimation - WebGPU</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #3d4423;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }
        .layout { display: flex; height: 100vh; }
        .left-panel { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .right-panel {
            width: 320px; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
        }
        canvas#gpuCanvas {
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .controls {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            padding: 18px; border-radius: 16px;
            border: 1px solid rgba(138,154,91,0.3);
            z-index: 100; min-width: 260px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        h1 { font-family: 'Lora', serif; font-size: 1.2em; color: #606C38; margin-bottom: 10px; }
        h3 { font-family: 'Lora', serif; font-size: 0.95em; color: #606C38; margin-bottom: 6px; }
        .pi-display {
            font-family: 'Lora', serif;
            font-size: 2.2em;
            color: #606C38;
            text-align: center;
            padding: 12px;
            background: rgba(138,154,91,0.08);
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .pi-actual {
            font-size: 0.42em;
            color: #8A9A5B;
            display: block;
            margin-top: 4px;
        }
        .btn-row { display: flex; gap: 6px; margin-bottom: 10px; }
        .btn {
            flex: 1; padding: 8px; border: none; border-radius: 8px;
            background: #8A9A5B; color: #fff; cursor: pointer;
            font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.82em; transition: all 0.2s;
        }
        .btn:hover { background: #606C38; }
        .stats {
            font-size: 0.82em; color: #606C38; line-height: 1.6;
        }
        .stats div { margin-bottom: 2px; }
        .highlight { color: #BC6C25; font-weight: 600; }
        .convergence-panel {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            border: 1px solid rgba(138,154,91,0.3);
            padding: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .convergence-canvas {
            width: 100%; height: 120px;
            border: 1px solid rgba(138,154,91,0.2);
            border-radius: 8px;
        }
        .js-panel {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            border: 1px solid rgba(138,154,91,0.3);
            padding: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .js-canvas {
            width: 100%; height: 100px;
            border: 1px solid rgba(138,154,91,0.2);
            border-radius: 8px;
        }
        .back-link {
            position: fixed; top: 20px; right: 20px;
            color: #606C38; text-decoration: none;
            font-family: 'Nunito', sans-serif; font-size: 0.9em; z-index: 100;
            background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
            padding: 8px 16px; border-radius: 10px;
            border: 1px solid rgba(138,154,91,0.3); transition: all 0.2s;
        }
        .back-link:hover { background: rgba(138,154,91,0.2); }
        .error-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(188,108,37,0.95); color: #fff; padding: 30px;
            border-radius: 16px; text-align: center; max-width: 420px;
            font-family: 'Nunito', sans-serif;
        }
        .error-msg h2 { font-family: 'Lora', serif; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="layout">
        <div class="left-panel">
            <canvas id="gpuCanvas" width="600" height="600"></canvas>
        </div>
        <div class="right-panel">
            <div class="controls" style="position:static; min-width:auto;">
                <h1>Monte Carlo Pi</h1>
                <div class="pi-display" id="piDisplay">
                    3.????
                    <span class="pi-actual">Actual: 3.14159265...</span>
                </div>
                <div class="btn-row">
                    <button class="btn" id="resetBtn">Reset</button>
                    <button class="btn" id="pauseBtn">Pause</button>
                </div>
                <div class="stats">
                    <div>GPU Samples: <span id="gpuSamples" class="highlight">0</span></div>
                    <div>GPU Hits: <span id="gpuHits">0</span></div>
                    <div>GPU Pi: <span id="gpuPi" class="highlight">-</span></div>
                    <div>GPU Error: <span id="gpuError">-</span></div>
                    <div>FPS: <span id="fps">0</span></div>
                </div>
            </div>

            <div class="convergence-panel">
                <h3>Convergence</h3>
                <canvas id="convCanvas" class="convergence-canvas" width="280" height="120"></canvas>
            </div>

            <div class="js-panel">
                <h3>JS Comparison (1K pts/frame)</h3>
                <canvas id="jsCanvas" class="js-canvas" width="280" height="100"></canvas>
                <div class="stats" style="margin-top:6px;">
                    <div>JS Samples: <span id="jsSamples">0</span></div>
                    <div>JS Pi: <span id="jsPi">-</span></div>
                </div>
            </div>
        </div>
    </div>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>

    <script type="module">
        const gpuCanvas = document.getElementById('gpuCanvas');

        if (!navigator.gpu) {
            document.body.innerHTML = '<div class="error-msg"><h2>WebGPU Not Supported</h2><p>Your browser does not support WebGPU. Try Chrome 113+ or Edge 113+.</p></div>';
            throw new Error('WebGPU not supported');
        }

        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) throw new Error('No adapter');
        const device = await adapter.requestDevice();
        const ctxGPU = gpuCanvas.getContext('webgpu');
        const presentFormat = navigator.gpu.getPreferredCanvasFormat();
        ctxGPU.configure({ device, format: presentFormat, alphaMode: 'opaque' });

        const POINTS_PER_FRAME = 65536; // GPU generates 64K points per frame
        const MAX_VISIBLE_POINTS = 200000; // Max points to render

        let paused = false;
        let totalSamples = 0;
        let totalHits = 0;

        // Point buffer: x, y, hit (1 or 0), pad - 4 floats per point
        const pointBuf = device.createBuffer({
            size: MAX_VISIBLE_POINTS * 16,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_SRC,
        });

        // Counter buffer: [hits, total]
        const counterBuf = device.createBuffer({
            size: 8,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST,
        });
        const counterReadBuf = device.createBuffer({
            size: 8,
            usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST,
        });

        // Params: seed, pointsPerFrame, totalPointsSoFar, writeOffset
        const paramData = new Uint32Array([0, POINTS_PER_FRAME, 0, 0]);
        const paramBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        // Compute shader: generate random points and test circle
        const computeShader = device.createShaderModule({ code: `
            @group(0) @binding(0) var<storage, read_write> points: array<vec4f>;
            @group(0) @binding(1) var<storage, read_write> counter: array<atomic<u32>>;
            @group(0) @binding(2) var<uniform> params: vec4u; // seed, numPoints, totalSoFar, writeOffset

            // xorshift128 PRNG
            fn xorshift(state: ptr<function, vec4u>) -> u32 {
                var s = *state;
                var t = s.x ^ (s.x << 11u);
                s.x = s.y; s.y = s.z; s.z = s.w;
                s.w = s.w ^ (s.w >> 19u) ^ t ^ (t >> 8u);
                *state = s;
                return s.w;
            }

            @compute @workgroup_size(256)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let idx = gid.x;
                if (idx >= params.y) { return; }

                // Initialize PRNG state from thread index + seed
                let seed = params.x;
                var state = vec4u(
                    idx * 1973u + seed * 7u + 1u,
                    idx * 9277u + seed * 13u + 1u,
                    idx * 26699u + seed * 37u + 1u,
                    idx * 4111u + seed * 97u + 1u
                );

                // Warm up PRNG
                for (var i = 0u; i < 4u; i++) {
                    _ = xorshift(&state);
                }

                let r1 = xorshift(&state);
                let r2 = xorshift(&state);
                let x = f32(r1) / 4294967295.0;
                let y = f32(r2) / 4294967295.0;

                let inCircle = select(0.0, 1.0, x * x + y * y <= 1.0);

                // Write to ring buffer
                let maxPts = ${MAX_VISIBLE_POINTS}u;
                let writeIdx = (params.w + idx) % maxPts;
                points[writeIdx] = vec4f(x, y, inCircle, 0.0);

                // Atomic add to hit counter
                if (inCircle > 0.5) {
                    atomicAdd(&counter[0], 1u);
                }
            }
        `});

        const computePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: computeShader, entryPoint: 'main' },
        });

        const computeBG = device.createBindGroup({
            layout: computePipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: pointBuf } },
                { binding: 1, resource: { buffer: counterBuf } },
                { binding: 2, resource: { buffer: paramBuf } },
            ],
        });

        // Render: draw points and circle
        const renderShader = device.createShaderModule({ code: `
            struct VSOut { @builtin(position) pos: vec4f, @location(0) color: vec4f }

            @vertex
            fn vs(@location(0) xy: vec2f, @location(1) hit: f32, @location(2) pad: f32) -> VSOut {
                var out: VSOut;
                // Map [0,1]x[0,1] to NDC with margin
                let ndc = xy * 1.8 - 0.9;
                out.pos = vec4f(ndc, 0, 1);

                if (hit > 0.5) {
                    out.color = vec4f(0.376, 0.55, 0.22, 0.5); // green/sage - inside
                } else {
                    out.color = vec4f(0.737, 0.424, 0.145, 0.5); // terracotta - outside
                }
                return out;
            }

            @fragment
            fn fs(@location(0) color: vec4f) -> @location(0) vec4f {
                return color;
            }

            // Circle outline
            struct CircleVS { @builtin(position) pos: vec4f, @location(0) color: vec4f }

            @vertex
            fn vsCircle(@builtin(vertex_index) vi: u32) -> CircleVS {
                let segments = 128u;
                let angle = f32(vi) / f32(segments) * 6.28318;
                let x = cos(angle) * 1.8 - 0.9 + 0.9;
                let y = sin(angle) * 1.8 - 0.9 + 0.9;
                // Actually: map unit circle [0..1] to NDC
                let cx = cos(angle) * 0.9 + 0.0;
                let cy = sin(angle) * 0.9 + 0.0;

                var out: CircleVS;
                out.pos = vec4f(cx, cy, 0, 1);
                out.color = vec4f(0.376, 0.424, 0.22, 0.8);
                return out;
            }

            @fragment
            fn fsCircle(@location(0) color: vec4f) -> @location(0) vec4f { return color; }
        `});

        const pointPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: {
                module: renderShader, entryPoint: 'vs',
                buffers: [{
                    arrayStride: 16,
                    attributes: [
                        { shaderLocation: 0, offset: 0, format: 'float32x2' },
                        { shaderLocation: 1, offset: 8, format: 'float32' },
                        { shaderLocation: 2, offset: 12, format: 'float32' },
                    ],
                }],
            },
            fragment: {
                module: renderShader, entryPoint: 'fs',
                targets: [{
                    format: presentFormat,
                    blend: {
                        color: { srcFactor: 'src-alpha', dstFactor: 'one-minus-src-alpha' },
                        alpha: { srcFactor: 'one', dstFactor: 'one' },
                    },
                }],
            },
            primitive: { topology: 'point-list' },
        });

        const circlePipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: renderShader, entryPoint: 'vsCircle' },
            fragment: {
                module: renderShader, entryPoint: 'fsCircle',
                targets: [{ format: presentFormat }],
            },
            primitive: { topology: 'line-strip' },
        });

        // Convergence history
        const convergenceHistory = [];
        const MAX_HISTORY = 200;

        function drawConvergence() {
            const c = document.getElementById('convCanvas');
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#FEFAE0';
            ctx.fillRect(0, 0, c.width, c.height);

            if (convergenceHistory.length < 2) return;

            // Draw pi reference line
            const piY = c.height / 2;
            ctx.strokeStyle = 'rgba(188,108,37,0.5)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(0, piY);
            ctx.lineTo(c.width, piY);
            ctx.stroke();
            ctx.setLineDash([]);

            // Scale: center on pi, show +-0.5
            const range = 0.2;
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            for (let i = 0; i < convergenceHistory.length; i++) {
                const x = (i / (MAX_HISTORY - 1)) * c.width;
                const diff = convergenceHistory[i] - Math.PI;
                const y = piY - (diff / range) * (c.height / 2);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Label
            ctx.fillStyle = '#606C38';
            ctx.font = '10px Nunito';
            ctx.fillText('pi', 2, piY - 4);
        }

        // JS comparison
        let jsSamples = 0, jsHits = 0;
        const jsPointsX = [];
        const jsPointsY = [];
        const jsPointsHit = [];
        const JS_PER_FRAME = 1000;

        function jsStep() {
            for (let i = 0; i < JS_PER_FRAME; i++) {
                const x = Math.random();
                const y = Math.random();
                const hit = (x * x + y * y <= 1) ? 1 : 0;
                jsSamples++;
                jsHits += hit;
                if (jsPointsX.length < 5000) {
                    jsPointsX.push(x);
                    jsPointsY.push(y);
                    jsPointsHit.push(hit);
                }
            }
            document.getElementById('jsSamples').textContent = jsSamples.toLocaleString();
            const jsPi = (4 * jsHits / jsSamples);
            document.getElementById('jsPi').textContent = jsPi.toFixed(6);
        }

        function drawJsCanvas() {
            const c = document.getElementById('jsCanvas');
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#FEFAE0';
            ctx.fillRect(0, 0, c.width, c.height);

            // Draw circle arc
            ctx.strokeStyle = 'rgba(96,108,56,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(0, 0, c.height, 0, Math.PI / 2);
            ctx.stroke();

            for (let i = 0; i < jsPointsX.length; i++) {
                const x = jsPointsX[i] * c.width;
                const y = (1 - jsPointsY[i]) * c.height;
                ctx.fillStyle = jsPointsHit[i] ? 'rgba(96,140,56,0.4)' : 'rgba(188,108,37,0.4)';
                ctx.fillRect(x, y, 1, 1);
            }
        }

        // Reset
        function reset() {
            totalSamples = 0;
            totalHits = 0;
            jsSamples = 0;
            jsHits = 0;
            jsPointsX.length = 0;
            jsPointsY.length = 0;
            jsPointsHit.length = 0;
            convergenceHistory.length = 0;
            device.queue.writeBuffer(counterBuf, 0, new Uint32Array([0, 0]));
            writeOffset = 0;
            framesSinceRead = 0;
        }

        document.getElementById('resetBtn').addEventListener('click', reset);
        document.getElementById('pauseBtn').addEventListener('click', () => {
            paused = !paused;
            document.getElementById('pauseBtn').textContent = paused ? 'Resume' : 'Pause';
        });

        let seed = 1;
        let writeOffset = 0;
        let pointsRendered = 0;
        let framesSinceRead = 0;
        let lastTime = performance.now(), frameCount = 0, fpsAccum = 0;

        async function render() {
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            frameCount++; fpsAccum += dt;
            if (fpsAccum >= 1.0) {
                document.getElementById('fps').textContent = Math.round(frameCount / fpsAccum);
                frameCount = 0; fpsAccum = 0;
            }

            if (!paused) {
                // Update params
                seed++;
                paramData[0] = seed;
                paramData[1] = POINTS_PER_FRAME;
                paramData[2] = totalSamples;
                paramData[3] = writeOffset;
                device.queue.writeBuffer(paramBuf, 0, paramData);

                const enc = device.createCommandEncoder();

                // Generate points
                const cp = enc.beginComputePass();
                cp.setPipeline(computePipeline);
                cp.setBindGroup(0, computeBG);
                cp.dispatchWorkgroups(Math.ceil(POINTS_PER_FRAME / 256));
                cp.end();

                // Render
                const rp = enc.beginRenderPass({
                    colorAttachments: [{
                        view: ctxGPU.getCurrentTexture().createView(),
                        loadOp: 'clear', storeOp: 'store',
                        clearValue: { r: 0.996, g: 0.98, b: 0.878, a: 1 },
                    }],
                });

                // Draw points
                rp.setPipeline(pointPipeline);
                rp.setVertexBuffer(0, pointBuf);
                rp.draw(Math.min(pointsRendered + POINTS_PER_FRAME, MAX_VISIBLE_POINTS));

                // Draw circle
                rp.setPipeline(circlePipeline);
                rp.draw(129);

                rp.end();

                device.queue.submit([enc.finish()]);

                totalSamples += POINTS_PER_FRAME;
                writeOffset = (writeOffset + POINTS_PER_FRAME) % MAX_VISIBLE_POINTS;
                pointsRendered = Math.min(pointsRendered + POINTS_PER_FRAME, MAX_VISIBLE_POINTS);

                // JS comparison step
                jsStep();
                drawJsCanvas();

                // Read back counter periodically
                framesSinceRead++;
                if (framesSinceRead >= 5) {
                    framesSinceRead = 0;
                    const readEnc = device.createCommandEncoder();
                    readEnc.copyBufferToBuffer(counterBuf, 0, counterReadBuf, 0, 8);
                    device.queue.submit([readEnc.finish()]);

                    try {
                        await counterReadBuf.mapAsync(GPUMapMode.READ);
                        const data = new Uint32Array(counterReadBuf.getMappedRange().slice(0));
                        counterReadBuf.unmap();
                        totalHits = data[0];

                        if (totalSamples > 0) {
                            const piEst = 4 * totalHits / totalSamples;
                            const error = Math.abs(piEst - Math.PI) / Math.PI;
                            document.getElementById('piDisplay').innerHTML =
                                piEst.toFixed(6) + '<span class="pi-actual">Actual: 3.14159265...</span>';
                            document.getElementById('gpuPi').textContent = piEst.toFixed(8);
                            document.getElementById('gpuError').textContent = (error * 100).toFixed(4) + '%';
                            document.getElementById('gpuSamples').textContent = totalSamples.toLocaleString();
                            document.getElementById('gpuHits').textContent = totalHits.toLocaleString();

                            convergenceHistory.push(piEst);
                            if (convergenceHistory.length > MAX_HISTORY) convergenceHistory.shift();
                            drawConvergence();
                        }
                    } catch (e) {
                        // Buffer mapping may fail if already mapped
                    }
                }
            } else {
                // Even when paused, render current state
                const enc = device.createCommandEncoder();
                const rp = enc.beginRenderPass({
                    colorAttachments: [{
                        view: ctxGPU.getCurrentTexture().createView(),
                        loadOp: 'clear', storeOp: 'store',
                        clearValue: { r: 0.996, g: 0.98, b: 0.878, a: 1 },
                    }],
                });
                rp.setPipeline(pointPipeline);
                rp.setVertexBuffer(0, pointBuf);
                rp.draw(Math.min(pointsRendered, MAX_VISIBLE_POINTS));
                rp.setPipeline(circlePipeline);
                rp.draw(129);
                rp.end();
                device.queue.submit([enc.finish()]);
            }

            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
