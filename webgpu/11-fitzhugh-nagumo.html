<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitzHugh-Nagumo Cardiac Waves - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 220px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 170px; }
        .controls button { margin: 3px 2px; padding: 6px 12px; background: #22d3ee; color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .controls button:hover { background: #67e8f9; }
        .btn-row { display: flex; gap: 6px; margin-top: 8px; }
        .btn-row button { flex: 1; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
        .title-overlay { position: fixed; top: 70px; left: 20px; z-index: 90; }
        .title-overlay h1 { font-size: 1.4rem; color: #22d3ee; margin: 0 0 4px 0; }
        .title-overlay p { font-size: 0.85rem; color: #888; margin: 0; }
        .info { font-size: 10px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to WebGPU Gallery</a>
    <div class="title-overlay">
        <h1>FitzHugh-Nagumo</h1>
        <p>Cardiac excitation waves and spiral dynamics</p>
    </div>
    <div class="controls">
        <label>Epsilon: <span id="epsVal">0.08</span></label>
        <input type="range" id="epsilon" min="0.04" max="0.20" step="0.005" value="0.08">
        <label>External Current (I): <span id="iextVal">0.00</span></label>
        <input type="range" id="iext" min="0.0" max="0.5" step="0.01" value="0.00">
        <label>Diffusion (D_u): <span id="duVal">0.10</span></label>
        <input type="range" id="du" min="0.02" max="0.30" step="0.01" value="0.10">
        <label>Steps/Frame: <span id="spfVal">8</span></label>
        <input type="range" id="spf" min="1" max="30" step="1" value="8">
        <div class="btn-row">
            <button onclick="window.addStimulus()">Stimulus</button>
            <button onclick="window.resetSim()">Reset</button>
        </div>
        <div class="btn-row">
            <button onclick="window.initSpiral()">Spiral Init</button>
            <button onclick="window.togglePause()"><span id="pauseLabel">Pause</span></button>
        </div>
        <div class="info">Click on canvas to add stimulus</div>
    </div>
    <div class="stats">
        FPS: <span id="fps">0</span> | Step: <span id="step">0</span>
    </div>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>
    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        const SIZE = 512;
        canvas.width = SIZE; canvas.height = SIZE;
        const ctx = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        ctx.configure({ device, format, alphaMode: 'opaque' });

        let epsilon = 0.08, beta = 0.7, gamma = 0.5, iext = 0.0, du = 0.10, simDt = 0.1;
        let stepsPerFrame = 8, paused = false, stepCount = 0;

        // Params: epsilon, beta, gamma, iext, du, dt, SIZE, pad
        const paramsBuffer = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
        function updateParams() {
            device.queue.writeBuffer(paramsBuffer, 0, new Float32Array([epsilon, beta, gamma, iext, du, simDt, SIZE, 0]));
        }
        updateParams();

        // State buffers: each cell has u and v (2 floats) - ping-pong
        const stateBuffers = [
            device.createBuffer({ size: SIZE * SIZE * 8, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST }),
            device.createBuffer({ size: SIZE * SIZE * 8, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST })
        ];

        // Stimulus buffer: temporary stimulus locations
        const stimBuffer = device.createBuffer({ size: SIZE * SIZE * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });

        // Render texture
        const renderTex = device.createTexture({
            size: [SIZE, SIZE], format: 'rgba8unorm',
            usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING
        });
        const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });

        // FHN compute shader
        const computeCode = `
            struct Params { epsilon: f32, beta: f32, gamma: f32, iext: f32, du: f32, dt: f32, size: f32, pad: f32 }

            @group(0) @binding(0) var<storage, read> stateIn: array<vec2f>;
            @group(0) @binding(1) var<storage, read_write> stateOut: array<vec2f>;
            @group(0) @binding(2) var<storage, read_write> stimulus: array<f32>;
            @group(0) @binding(3) var<uniform> params: Params;

            @compute @workgroup_size(16, 16)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let S = u32(params.size);
                if (gid.x >= S || gid.y >= S) { return; }
                let idx = gid.y * S + gid.x;
                let uv = stateIn[idx];
                let u_val = uv.x;
                let v_val = uv.y;

                // Laplacian of u (5-point stencil)
                let x = i32(gid.x);
                let y = i32(gid.y);
                let si = i32(S);
                let u_left  = stateIn[u32(y) * S + u32((x - 1 + si) % si)].x;
                let u_right = stateIn[u32(y) * S + u32((x + 1) % si)].x;
                let u_up    = stateIn[u32((y - 1 + si) % si) * S + u32(x)].x;
                let u_down  = stateIn[u32((y + 1) % si) * S + u32(x)].x;
                let laplacian = u_left + u_right + u_up + u_down - 4.0 * u_val;

                // FitzHugh-Nagumo equations
                // du/dt = D_u * laplacian(u) + u - u^3/3 - v + I_ext
                // dv/dt = epsilon * (u + beta - gamma * v)
                let stim = stimulus[idx];
                let du_dt = params.du * laplacian + u_val - (u_val * u_val * u_val) / 3.0 - v_val + params.iext + stim;
                let dv_dt = params.epsilon * (u_val + params.beta - params.gamma * v_val);

                let new_u = u_val + params.dt * du_dt;
                let new_v = v_val + params.dt * dv_dt;

                stateOut[idx] = vec2f(clamp(new_u, -3.0, 3.0), clamp(new_v, -3.0, 3.0));

                // Decay stimulus
                stimulus[idx] = stim * 0.9;
            }
        `;

        // Render shader
        const renderCode = `
            @group(0) @binding(0) var<storage, read> state: array<vec2f>;
            @group(0) @binding(1) var outTex: texture_storage_2d<rgba8unorm, write>;

            @compute @workgroup_size(16, 16)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                if (gid.x >= ${SIZE}u || gid.y >= ${SIZE}u) { return; }
                let uv = state[gid.y * ${SIZE}u + gid.x];
                let u_val = uv.x;

                // Map u from [-2,2] to [0,1] for coloring
                let t = clamp((u_val + 2.0) / 4.0, 0.0, 1.0);

                // Blue (resting) -> purple -> red (excited) -> yellow (peak)
                var color: vec3f;
                if (t < 0.3) {
                    let s = t / 0.3;
                    color = mix(vec3f(0.02, 0.02, 0.15), vec3f(0.15, 0.05, 0.4), s);
                } else if (t < 0.5) {
                    let s = (t - 0.3) / 0.2;
                    color = mix(vec3f(0.15, 0.05, 0.4), vec3f(0.7, 0.1, 0.2), s);
                } else if (t < 0.7) {
                    let s = (t - 0.5) / 0.2;
                    color = mix(vec3f(0.7, 0.1, 0.2), vec3f(1.0, 0.3, 0.1), s);
                } else {
                    let s = (t - 0.7) / 0.3;
                    color = mix(vec3f(1.0, 0.3, 0.1), vec3f(1.0, 0.95, 0.5), s);
                }

                textureStore(outTex, vec2i(gid.xy), vec4f(color, 1.0));
            }
        `;

        // Display shader
        const displayCode = `
            @group(0) @binding(0) var tex: texture_2d<f32>;
            @group(0) @binding(1) var samp: sampler;
            struct VO { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VO {
                var p = array<vec2f, 4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var u = array<vec2f, 4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var o: VO; o.pos = vec4f(p[i], 0, 1); o.uv = u[i]; return o;
            }
            @fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                return textureSample(tex, samp, uv);
            }
        `;

        const computePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: computeCode }), entryPoint: 'main' }
        });
        const renderPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: renderCode }), entryPoint: 'main' }
        });
        const displayPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: device.createShaderModule({ code: displayCode }), entryPoint: 'vs' },
            fragment: { module: device.createShaderModule({ code: displayCode }), entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-strip' }
        });

        // Bind groups
        const computeBindGroups = [0, 1].map(i => device.createBindGroup({
            layout: computePipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: stateBuffers[i] } },
                { binding: 1, resource: { buffer: stateBuffers[1 - i] } },
                { binding: 2, resource: { buffer: stimBuffer } },
                { binding: 3, resource: { buffer: paramsBuffer } }
            ]
        }));
        const renderBindGroups = [0, 1].map(i => device.createBindGroup({
            layout: renderPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: stateBuffers[i] } },
                { binding: 1, resource: renderTex.createView() }
            ]
        }));
        const displayBindGroup = device.createBindGroup({
            layout: displayPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: renderTex.createView() },
                { binding: 1, resource: sampler }
            ]
        });

        function initRandom() {
            const data = new Float32Array(SIZE * SIZE * 2);
            for (let i = 0; i < SIZE * SIZE; i++) {
                data[i * 2] = (Math.random() - 0.5) * 0.1;     // u: small perturbation
                data[i * 2 + 1] = (Math.random() - 0.5) * 0.1; // v: small perturbation
            }
            device.queue.writeBuffer(stateBuffers[0], 0, data);
            device.queue.writeBuffer(stateBuffers[1], 0, new Float32Array(SIZE * SIZE * 2));
            device.queue.writeBuffer(stimBuffer, 0, new Float32Array(SIZE * SIZE));
        }

        function initSpiralState() {
            const data = new Float32Array(SIZE * SIZE * 2);
            const cx = SIZE / 2, cy = SIZE / 2;
            // Create initial condition for spiral wave
            // Horizontal line excited on left half, recovery gradient top-to-bottom
            for (let y = 0; y < SIZE; y++) {
                for (let x = 0; x < SIZE; x++) {
                    const i = (y * SIZE + x) * 2;
                    if (x < cx) {
                        data[i] = 1.5;  // u: excited on left
                    } else {
                        data[i] = -1.5; // u: resting on right
                    }
                    if (y < cy) {
                        data[i + 1] = 0.5; // v: recovering on top
                    } else {
                        data[i + 1] = -0.5; // v: excitable on bottom
                    }
                }
            }
            device.queue.writeBuffer(stateBuffers[0], 0, data);
            device.queue.writeBuffer(stateBuffers[1], 0, new Float32Array(SIZE * SIZE * 2));
            device.queue.writeBuffer(stimBuffer, 0, new Float32Array(SIZE * SIZE));
        }

        function addStimulusAt(sx, sy, radius) {
            const data = new Float32Array(SIZE * SIZE);
            for (let y = Math.max(0, sy - radius); y < Math.min(SIZE, sy + radius); y++) {
                for (let x = Math.max(0, sx - radius); x < Math.min(SIZE, sx + radius); x++) {
                    const dx = x - sx, dy = y - sy;
                    if (dx * dx + dy * dy < radius * radius) {
                        data[y * SIZE + x] = 3.0;
                    }
                }
            }
            device.queue.writeBuffer(stimBuffer, 0, data);
        }

        let frame = 0;
        function resetSim() {
            frame = 0; stepCount = 0;
            initRandom();
            // Add initial stimulus to kick off wave
            setTimeout(() => addStimulusAt(SIZE / 2, SIZE / 2, 30), 100);
        }

        window.resetSim = resetSim;
        window.initSpiral = () => { frame = 0; stepCount = 0; initSpiralState(); };
        window.addStimulus = () => addStimulusAt(SIZE / 2, SIZE / 2, 25);
        window.togglePause = () => {
            paused = !paused;
            document.getElementById('pauseLabel').textContent = paused ? 'Resume' : 'Pause';
        };

        // Click to stimulate
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const sx = Math.floor((e.clientX - rect.left) / rect.width * SIZE);
            const sy = Math.floor((e.clientY - rect.top) / rect.height * SIZE);
            addStimulusAt(sx, sy, 20);
        });

        // Initialize with spiral condition
        initSpiralState();

        // UI
        document.getElementById('epsilon').addEventListener('input', e => { epsilon = parseFloat(e.target.value); document.getElementById('epsVal').textContent = epsilon.toFixed(3); updateParams(); });
        document.getElementById('iext').addEventListener('input', e => { iext = parseFloat(e.target.value); document.getElementById('iextVal').textContent = iext.toFixed(2); updateParams(); });
        document.getElementById('du').addEventListener('input', e => { du = parseFloat(e.target.value); document.getElementById('duVal').textContent = du.toFixed(2); updateParams(); });
        document.getElementById('spf').addEventListener('input', e => { stepsPerFrame = parseInt(e.target.value); document.getElementById('spfVal').textContent = stepsPerFrame; });

        let lastTime = performance.now(), fpsFrames = 0, fpsTime = 0;
        const WG = Math.ceil(SIZE / 16);

        function render() {
            const now = performance.now();
            const elapsed = (now - lastTime) / 1000;
            lastTime = now;
            fpsFrames++; fpsTime += elapsed;
            if (fpsTime >= 1.0) {
                document.getElementById('fps').textContent = Math.round(fpsFrames / fpsTime);
                fpsFrames = 0; fpsTime = 0;
            }

            if (!paused) {
                const enc = device.createCommandEncoder();
                for (let i = 0; i < stepsPerFrame; i++) {
                    const cp = enc.beginComputePass();
                    cp.setPipeline(computePipeline);
                    cp.setBindGroup(0, computeBindGroups[(frame + i) % 2]);
                    cp.dispatchWorkgroups(WG, WG);
                    cp.end();
                }
                device.queue.submit([enc.finish()]);
                frame += stepsPerFrame;
                stepCount += stepsPerFrame;
            }

            document.getElementById('step').textContent = stepCount.toLocaleString();

            // Render
            const enc2 = device.createCommandEncoder();
            const rcp = enc2.beginComputePass();
            rcp.setPipeline(renderPipeline);
            rcp.setBindGroup(0, renderBindGroups[frame % 2]);
            rcp.dispatchWorkgroups(WG, WG);
            rcp.end();

            const dp = enc2.beginRenderPass({
                colorAttachments: [{ view: ctx.getCurrentTexture().createView(), loadOp: 'clear', storeOp: 'store' }]
            });
            dp.setPipeline(displayPipeline);
            dp.setBindGroup(0, displayBindGroup);
            dp.draw(4);
            dp.end();

            device.queue.submit([enc2.finish()]);
            requestAnimationFrame(render);
        }
        render();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
