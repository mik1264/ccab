<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langton's Ant GPU - Massive Scale</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #3d4423;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            padding: 20px; border-radius: 16px;
            border: 1px solid rgba(138,154,91,0.3);
            z-index: 100; min-width: 260px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        h1 { font-family: 'Lora', serif; font-size: 1.3em; color: #606C38; margin-bottom: 12px; }
        .slider-group { margin-bottom: 10px; }
        .slider-group label {
            display: flex; justify-content: space-between;
            margin-bottom: 3px; font-size: 0.85em; color: #606C38;
        }
        .slider-group input[type="range"] {
            width: 100%; height: 6px; -webkit-appearance: none;
            background: #d4d4aa; border-radius: 3px; outline: none;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            background: #8A9A5B; border-radius: 50%; cursor: pointer;
        }
        .modes { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .mode-btn {
            padding: 5px 10px;
            background: rgba(138,154,91,0.15);
            border: 1px solid rgba(138,154,91,0.3);
            border-radius: 8px; color: #606C38;
            font-size: 0.78em; cursor: pointer;
            font-family: 'Nunito', sans-serif; transition: all 0.2s;
        }
        .mode-btn:hover, .mode-btn.active {
            background: #8A9A5B; color: #fff; border-color: #8A9A5B;
        }
        .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn {
            flex: 1; padding: 8px; border: none; border-radius: 8px;
            background: #8A9A5B; color: #fff; cursor: pointer;
            font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.85em; transition: all 0.2s;
        }
        .btn:hover { background: #606C38; }
        .stats {
            margin-top: 10px; padding-top: 10px;
            border-top: 1px solid rgba(138,154,91,0.2);
            font-size: 0.82em; color: #606C38;
        }
        .stats div { margin-bottom: 2px; }
        .back-link {
            position: fixed; top: 20px; right: 20px;
            color: #606C38; text-decoration: none;
            font-family: 'Nunito', sans-serif; font-size: 0.9em; z-index: 100;
            background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
            padding: 8px 16px; border-radius: 10px;
            border: 1px solid rgba(138,154,91,0.3); transition: all 0.2s;
        }
        .back-link:hover { background: rgba(138,154,91,0.2); }
        .error-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(188,108,37,0.95); color: #fff; padding: 30px;
            border-radius: 16px; text-align: center; max-width: 420px;
            font-family: 'Nunito', sans-serif;
        }
        .error-msg h2 { font-family: 'Lora', serif; margin-bottom: 10px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <h1>Langton's Ant GPU</h1>
        <div class="modes">
            <button class="mode-btn active" data-rule="RL">RL (Classic)</button>
            <button class="mode-btn" data-rule="LLRR">LLRR</button>
            <button class="mode-btn" data-rule="RLR">RLR</button>
            <button class="mode-btn" data-rule="RLLRR">RLLRR</button>
        </div>
        <div class="slider-group">
            <label>Ants <span id="antVal">1000</span></label>
            <input type="range" id="antCount" min="100" max="5000" step="100" value="1000">
        </div>
        <div class="slider-group">
            <label>Steps/Frame <span id="stepsVal">10</span></label>
            <input type="range" id="stepsPerFrame" min="1" max="50" step="1" value="10">
        </div>
        <div class="btn-row">
            <button class="btn" id="resetBtn">Reset</button>
            <button class="btn" id="pauseBtn">Pause</button>
        </div>
        <div class="stats">
            <div>Step: <span id="stepCount">0</span></div>
            <div>Grid: 1024 x 1024</div>
            <div>FPS: <span id="fps">0</span></div>
        </div>
    </div>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>

    <script type="module">
        const canvas = document.getElementById('canvas');

        if (!navigator.gpu) {
            document.body.innerHTML = '<div class="error-msg"><h2>WebGPU Not Supported</h2><p>Your browser does not support WebGPU. Try Chrome 113+ or Edge 113+.</p></div>';
            throw new Error('WebGPU not supported');
        }

        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) throw new Error('No adapter');
        const device = await adapter.requestDevice();
        const ctxGPU = canvas.getContext('webgpu');
        const presentFormat = navigator.gpu.getPreferredCanvasFormat();

        function resize() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
            ctxGPU.configure({ device, format: presentFormat, alphaMode: 'opaque' });
        }
        resize();
        window.addEventListener('resize', resize);

        const GRID = 1024;
        let numAnts = 1000;
        let stepsPerFrame = 10;
        let paused = false;
        let totalSteps = 0;

        // Rulesets: each char is L or R. Number of colors = rule length.
        const RULES = { RL: 'RL', LLRR: 'LLRR', RLR: 'RLR', RLLRR: 'RLLRR' };
        let currentRule = 'RL';

        // Grid texture: r32uint storing color state (0 to numColors-1)
        const gridBuf = device.createBuffer({
            size: GRID * GRID * 4,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
        });

        // Ant buffer: x(u32), y(u32), dir(u32), pad(u32)
        const MAX_ANTS = 5000;
        const antData = new Uint32Array(MAX_ANTS * 4);

        function initAnts() {
            for (let i = 0; i < MAX_ANTS; i++) {
                antData[i * 4] = Math.floor(Math.random() * GRID);
                antData[i * 4 + 1] = Math.floor(Math.random() * GRID);
                antData[i * 4 + 2] = Math.floor(Math.random() * 4); // 0=N,1=E,2=S,3=W
                antData[i * 4 + 3] = 0;
            }
        }
        initAnts();

        const antBuf = device.createBuffer({
            size: antData.byteLength,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
        });

        // Rule buffer: array of i32 (-1=L, +1=R) up to 8 entries
        const ruleBufData = new Int32Array(8);
        const ruleBuf = device.createBuffer({ size: 32, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });

        function setRule(ruleStr) {
            currentRule = ruleStr;
            for (let i = 0; i < 8; i++) {
                if (i < ruleStr.length) {
                    ruleBufData[i] = ruleStr[i] === 'R' ? 1 : -1;
                } else {
                    ruleBufData[i] = 0;
                }
            }
            device.queue.writeBuffer(ruleBuf, 0, ruleBufData);
        }
        setRule('RL');

        // Uniforms: gridSize, numAnts, numColors, pad
        const uniformData = new Uint32Array([GRID, numAnts, currentRule.length, 0]);
        const uniformBuf = device.createBuffer({ size: 16, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        function reset() {
            totalSteps = 0;
            initAnts();
            device.queue.writeBuffer(antBuf, 0, antData);
            // Clear grid
            const zeros = new Uint32Array(GRID * GRID);
            device.queue.writeBuffer(gridBuf, 0, zeros);
        }

        function uploadAll() {
            uniformData[1] = numAnts;
            uniformData[2] = currentRule.length;
            device.queue.writeBuffer(uniformBuf, 0, uniformData);
            device.queue.writeBuffer(antBuf, 0, antData);
        }
        uploadAll();
        reset();

        // Compute shader: step ants
        const computeShader = device.createShaderModule({ code: `
            struct Uniforms { gridSize: u32, numAnts: u32, numColors: u32, pad: u32 }
            @group(0) @binding(0) var<storage, read_write> grid: array<u32>;
            @group(0) @binding(1) var<storage, read_write> ants: array<vec4u>;
            @group(0) @binding(2) var<storage, read> rules: array<i32>;
            @group(0) @binding(3) var<uniform> u: Uniforms;

            @compute @workgroup_size(256)
            fn step(@builtin(global_invocation_id) gid: vec3u) {
                let idx = gid.x;
                if (idx >= u.numAnts) { return; }

                var ant = ants[idx];
                let x = ant.x;
                let y = ant.y;
                var dir = i32(ant.z); // 0=N,1=E,2=S,3=W

                let cellIdx = y * u.gridSize + x;
                let color = grid[cellIdx];

                // Turn based on rule
                let turn = rules[color % u.numColors];
                dir = (dir + turn + 4) % 4;

                // Advance color
                let newColor = (color + 1u) % u.numColors;
                grid[cellIdx] = newColor;

                // Move forward
                var nx = i32(x);
                var ny = i32(y);
                if (dir == 0) { ny -= 1; }
                else if (dir == 1) { nx += 1; }
                else if (dir == 2) { ny += 1; }
                else { nx -= 1; }

                // Wrap
                let gs = i32(u.gridSize);
                nx = (nx + gs) % gs;
                ny = (ny + gs) % gs;

                ants[idx] = vec4u(u32(nx), u32(ny), u32(dir), 0u);
            }
        `});

        const stepPipeline = device.createComputePipeline({ layout: 'auto', compute: { module: computeShader, entryPoint: 'step' } });

        const stepBG = device.createBindGroup({
            layout: stepPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: gridBuf } },
                { binding: 1, resource: { buffer: antBuf } },
                { binding: 2, resource: { buffer: ruleBuf } },
                { binding: 3, resource: { buffer: uniformBuf } },
            ],
        });

        // Render: read grid buffer, draw as fullscreen quad
        const renderShader = device.createShaderModule({ code: `
            struct Uniforms { gridSize: u32, numAnts: u32, numColors: u32, pad: u32 }
            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }

            @group(0) @binding(0) var<storage, read> grid: array<u32>;
            @group(0) @binding(1) var<storage, read> ants: array<vec4u>;
            @group(0) @binding(2) var<uniform> u: Uniforms;

            @vertex
            fn vs(@builtin(vertex_index) vi: u32) -> VSOut {
                var pos = array<vec2f, 6>(
                    vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1),
                    vec2f(-1,1), vec2f(1,-1), vec2f(1,1)
                );
                var out: VSOut;
                out.pos = vec4f(pos[vi], 0, 1);
                out.uv = pos[vi] * 0.5 + 0.5;
                return out;
            }

            fn colorForState(state: u32, numColors: u32) -> vec3f {
                if (numColors <= 2u) {
                    if (state == 0u) { return vec3f(0.996, 0.980, 0.878); } // cream
                    return vec3f(0.376, 0.424, 0.220); // moss
                }
                // Multi-color: use palette
                let t = f32(state) / f32(numColors);
                let r = 0.376 + t * 0.49;
                let g = 0.424 + sin(t * 3.14159) * 0.3;
                let b = 0.220 + t * 0.5;
                return vec3f(r, g, b);
            }

            @fragment
            fn fs(in: VSOut) -> @location(0) vec4f {
                let gx = u32(in.uv.x * f32(u.gridSize));
                let gy = u32((1.0 - in.uv.y) * f32(u.gridSize));
                let idx = gy * u.gridSize + gx;
                let state = grid[idx];
                var color = colorForState(state, u.numColors);

                // Highlight ant positions
                for (var i = 0u; i < min(u.numAnts, 200u); i++) {
                    let ant = ants[i];
                    let dx = i32(gx) - i32(ant.x);
                    let dy = i32(gy) - i32(ant.y);
                    if (dx * dx + dy * dy <= 1) {
                        color = vec3f(0.867, 0.424, 0.145); // terracotta for ants
                    }
                }

                return vec4f(color, 1.0);
            }
        `});

        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: renderShader, entryPoint: 'vs' },
            fragment: { module: renderShader, entryPoint: 'fs', targets: [{ format: presentFormat }] },
            primitive: { topology: 'triangle-list' },
        });

        const renderBG = device.createBindGroup({
            layout: renderPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: gridBuf } },
                { binding: 1, resource: { buffer: antBuf } },
                { binding: 2, resource: { buffer: uniformBuf } },
            ],
        });

        // UI
        document.getElementById('antCount').addEventListener('input', e => {
            numAnts = parseInt(e.target.value);
            document.getElementById('antVal').textContent = numAnts;
            uniformData[1] = numAnts;
            device.queue.writeBuffer(uniformBuf, 0, uniformData);
        });
        document.getElementById('stepsPerFrame').addEventListener('input', e => {
            stepsPerFrame = parseInt(e.target.value);
            document.getElementById('stepsVal').textContent = stepsPerFrame;
        });
        document.getElementById('resetBtn').addEventListener('click', () => { reset(); uploadAll(); });
        document.getElementById('pauseBtn').addEventListener('click', () => {
            paused = !paused;
            document.getElementById('pauseBtn').textContent = paused ? 'Resume' : 'Pause';
        });
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                setRule(btn.dataset.rule);
                uniformData[2] = currentRule.length;
                device.queue.writeBuffer(uniformBuf, 0, uniformData);
                reset();
                uploadAll();
            });
        });

        // FPS
        let lastTime = performance.now(), frameCount = 0, fpsAccum = 0;

        function render() {
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            frameCount++; fpsAccum += dt;
            if (fpsAccum >= 1.0) {
                document.getElementById('fps').textContent = Math.round(frameCount / fpsAccum);
                frameCount = 0; fpsAccum = 0;
            }

            const enc = device.createCommandEncoder();

            if (!paused) {
                for (let i = 0; i < stepsPerFrame; i++) {
                    const cp = enc.beginComputePass();
                    cp.setPipeline(stepPipeline);
                    cp.setBindGroup(0, stepBG);
                    cp.dispatchWorkgroups(Math.ceil(numAnts / 256));
                    cp.end();
                }
                totalSteps += stepsPerFrame;
                document.getElementById('stepCount').textContent = totalSteps.toLocaleString();
            }

            const rp = enc.beginRenderPass({
                colorAttachments: [{
                    view: ctxGPU.getCurrentTexture().createView(),
                    loadOp: 'clear', storeOp: 'store',
                    clearValue: { r: 0.996, g: 0.98, b: 0.878, a: 1 },
                }],
            });
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, renderBG);
            rp.draw(6);
            rp.end();

            device.queue.submit([enc.finish()]);
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
