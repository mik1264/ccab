<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypnotic Warp Tunnel - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls select { width: 160px; background: #1a1a2e; color: #e8e6e1; border: 1px solid #22d3ee; border-radius: 4px; padding: 3px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #22d3ee; font-size: 14px; font-weight: 600; z-index: 100; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); pointer-events: none; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div class="title">Hypnotic Warp Tunnel</div>

    <div class="controls">
        <label>Speed: <span id="speedVal">1.0</span></label>
        <input type="range" id="speed" min="0.1" max="4.0" step="0.1" value="1.0">
        <label>Twist: <span id="twistVal">1.0</span></label>
        <input type="range" id="twist" min="0" max="5.0" step="0.1" value="1.0">
        <label>Pattern:</label>
        <select id="patternSelect">
            <option value="0">Hexagonal Grid</option>
            <option value="1">Voronoi Cells</option>
            <option value="2">Checkerboard</option>
            <option value="3">Mandala Rings</option>
        </select>
        <label>Color Mode:</label>
        <select id="colorSelect">
            <option value="0">Rainbow</option>
            <option value="1">Neon Cyan</option>
            <option value="2">Fire</option>
            <option value="3">Vaporwave</option>
        </select>
        <label>Ring Intensity: <span id="ringVal">0.5</span></label>
        <input type="range" id="ringIntensity" min="0" max="1.0" step="0.05" value="0.5">
    </div>

    <div class="stats">FPS: <span id="fps">0</span></div>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'opaque' });

        let speed = 1.0, twist = 1.0, patternMode = 0, colorMode = 0, ringIntensity = 0.5;
        document.getElementById('speed').oninput = e => { speed = +e.target.value; document.getElementById('speedVal').textContent = speed.toFixed(1); };
        document.getElementById('twist').oninput = e => { twist = +e.target.value; document.getElementById('twistVal').textContent = twist.toFixed(1); };
        document.getElementById('patternSelect').onchange = e => { patternMode = +e.target.value; };
        document.getElementById('colorSelect').onchange = e => { colorMode = +e.target.value; };
        document.getElementById('ringIntensity').oninput = e => { ringIntensity = +e.target.value; document.getElementById('ringVal').textContent = ringIntensity.toFixed(2); };

        const uniformData = new Float32Array(12);
        const uniformBuffer = device.createBuffer({ size: 48, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        const shaderCode = `
            struct Uniforms {
                resolution: vec2f,
                time: f32,
                speed: f32,
                twist: f32,
                ringIntensity: f32,
                patternMode: u32,
                colorMode: u32,
                pad1: f32,
                pad2: f32,
                pad3: f32,
                pad4: f32,
            }

            @group(0) @binding(0) var outTex: texture_storage_2d<rgba8unorm, write>;
            @group(0) @binding(1) var<uniform> u: Uniforms;

            fn hash21(p: vec2f) -> f32 {
                var p3 = fract(vec3f(p.x, p.y, p.x) * 0.1031);
                p3 += dot(p3, p3.yzx + 33.33);
                return fract((p3.x + p3.y) * p3.z);
            }

            fn hash22(p: vec2f) -> vec2f {
                let n = vec2f(dot(p, vec2f(127.1, 311.7)), dot(p, vec2f(269.5, 183.3)));
                return fract(sin(n) * 43758.5453);
            }

            fn voronoi(p: vec2f) -> f32 {
                let n = floor(p);
                let f = fract(p);
                var md: f32 = 8.0;
                for (var j = -1; j <= 1; j++) {
                    for (var i = -1; i <= 1; i++) {
                        let g = vec2f(f32(i), f32(j));
                        let o = hash22(n + g);
                        let r = g + o - f;
                        let d = dot(r, r);
                        md = min(md, d);
                    }
                }
                return sqrt(md);
            }

            fn hexPattern(p: vec2f) -> f32 {
                let s = vec2f(1.0, 1.732);
                let a = (p / s) % 1.0;
                let b = ((p + s * 0.5) / s) % 1.0;
                let aa = abs(fract(a) - 0.5);
                let bb = abs(fract(b) - 0.5);
                let da = max(aa.x * 1.5 + aa.y, aa.y * 2.0);
                let db = max(bb.x * 1.5 + bb.y, bb.y * 2.0);
                return min(da, db);
            }

            fn hsl2rgb(h: f32, s: f32, l: f32) -> vec3f {
                let c = (1.0 - abs(2.0 * l - 1.0)) * s;
                let x = c * (1.0 - abs((h * 6.0) % 2.0 - 1.0));
                let m = l - c * 0.5;
                var rgb: vec3f;
                let hi = u32(h * 6.0) % 6u;
                if (hi == 0u) { rgb = vec3f(c, x, 0.0); }
                else if (hi == 1u) { rgb = vec3f(x, c, 0.0); }
                else if (hi == 2u) { rgb = vec3f(0.0, c, x); }
                else if (hi == 3u) { rgb = vec3f(0.0, x, c); }
                else if (hi == 4u) { rgb = vec3f(x, 0.0, c); }
                else { rgb = vec3f(c, 0.0, x); }
                return rgb + vec3f(m);
            }

            fn getColor(t: f32, depth: f32) -> vec3f {
                let tt = fract(t);
                if (u.colorMode == 0u) {
                    // Rainbow
                    return hsl2rgb(tt, 0.8, 0.55);
                } else if (u.colorMode == 1u) {
                    // Neon cyan
                    return mix(vec3f(0.0, 0.1, 0.2), vec3f(0.0, 1.0, 0.9), 0.5 + 0.5 * sin(tt * 6.28 + depth * 2.0));
                } else if (u.colorMode == 2u) {
                    // Fire
                    return mix(vec3f(0.8, 0.1, 0.0), vec3f(1.0, 0.9, 0.2), 0.5 + 0.5 * sin(tt * 6.28));
                } else {
                    // Vaporwave
                    let a = vec3f(1.0, 0.2, 0.6);
                    let b = vec3f(0.2, 0.1, 0.8);
                    let c = vec3f(0.0, 0.8, 0.8);
                    let s1 = 0.5 + 0.5 * sin(tt * 6.28);
                    let s2 = 0.5 + 0.5 * sin(tt * 6.28 + 2.0);
                    return mix(mix(a, b, s1), c, s2 * 0.5);
                }
            }

            @compute @workgroup_size(8, 8)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let x = gid.x;
                let y = gid.y;
                if (x >= u32(u.resolution.x) || y >= u32(u.resolution.y)) { return; }

                let uv = (vec2f(f32(x), f32(y)) - u.resolution * 0.5) / min(u.resolution.x, u.resolution.y);
                let t = u.time * u.speed;

                // Polar coordinates
                var r = length(uv);
                var angle = atan2(uv.y, uv.x);

                // Tunnel mapping: depth from polar radius
                let depth = 1.0 / (r + 0.001);

                // Apply twist
                let twistedAngle = angle + depth * u.twist * 0.3 + t * 0.2;

                // Tunnel texture coordinates
                let tx = twistedAngle / 3.14159 * 3.0;
                let ty = depth * 0.5 - t * 0.5;
                let tunnelUV = vec2f(tx, ty);

                // Pattern
                var pattern: f32 = 0.0;
                if (u.patternMode == 0u) {
                    // Hexagonal
                    pattern = hexPattern(tunnelUV * 6.0);
                    pattern = smoothstep(0.4, 0.5, pattern);
                } else if (u.patternMode == 1u) {
                    // Voronoi
                    pattern = voronoi(tunnelUV * 4.0);
                    pattern = smoothstep(0.0, 0.4, pattern);
                } else if (u.patternMode == 2u) {
                    // Checkerboard
                    let check = floor(tunnelUV * 6.0);
                    pattern = ((check.x + check.y) % 2.0 + 2.0) % 2.0;
                } else {
                    // Mandala rings
                    let rings = sin(tunnelUV.x * 12.0) * sin(tunnelUV.y * 12.0);
                    let radial = sin(twistedAngle * 6.0) * 0.5 + 0.5;
                    pattern = smoothstep(-0.2, 0.2, rings) * (0.5 + 0.5 * radial);
                }

                // Color based on position and time
                let colorT = fract(twistedAngle / 6.28 + t * 0.1 + depth * 0.02);
                var col = getColor(colorT, depth);

                // Apply pattern
                col *= (0.4 + 0.6 * pattern);

                // Depth fog (darker further away, or brighter at center)
                let fog = exp(-depth * 0.015);
                col *= (0.3 + 0.7 * (1.0 - fog));

                // Bright rings at regular depth intervals
                let ringDist = abs(fract(depth * 0.15 - t * 0.3) - 0.5);
                let ringBright = smoothstep(0.05, 0.0, ringDist) * u.ringIntensity;
                col += vec3f(ringBright * 0.5, ringBright * 0.8, ringBright);

                // Vignette from tunnel center
                let vignette = 1.0 - smoothstep(0.0, 0.02, r * r);
                col = mix(col, vec3f(1.0), vignette * 0.3);

                // Edge darkening
                let edgeDark = smoothstep(0.8, 0.1, r);
                col *= edgeDark;

                // Center glow
                let centerGlow = exp(-r * r * 30.0);
                col += vec3f(0.3, 0.5, 0.7) * centerGlow * 0.5;

                col = clamp(col, vec3f(0.0), vec3f(1.0));
                textureStore(outTex, vec2u(x, y), vec4f(col, 1.0));
            }
        `;

        const shaderModule = device.createShaderModule({ code: shaderCode });
        const texW = canvas.width, texH = canvas.height;
        const outTexture = device.createTexture({
            size: [texW, texH], format: 'rgba8unorm',
            usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING,
        });

        const bindGroupLayout = device.createBindGroupLayout({
            entries: [
                { binding: 0, visibility: GPUShaderStage.COMPUTE, storageTexture: { access: 'write-only', format: 'rgba8unorm', viewDimension: '2d' } },
                { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
            ],
        });

        const pipeline = device.createComputePipeline({
            layout: device.createPipelineLayout({ bindGroupLayouts: [bindGroupLayout] }),
            compute: { module: shaderModule, entryPoint: 'main' },
        });

        const bindGroup = device.createBindGroup({
            layout: bindGroupLayout,
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: { buffer: uniformBuffer } },
            ],
        });

        // Blit pipeline
        const blitShader = device.createShaderModule({ code: `
            @group(0) @binding(0) var tex: texture_2d<f32>;
            @group(0) @binding(1) var samp: sampler;
            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VSOut {
                var pos = array<vec2f, 6>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(-1,1), vec2f(1,-1), vec2f(1,1));
                var out: VSOut;
                out.pos = vec4f(pos[i], 0, 1);
                out.uv = pos[i] * 0.5 + 0.5;
                out.uv.y = 1.0 - out.uv.y;
                return out;
            }
            @fragment fn fs(inp: VSOut) -> @location(0) vec4f {
                return textureSample(tex, samp, inp.uv);
            }
        `});
        const blitBGL = device.createBindGroupLayout({
            entries: [
                { binding: 0, visibility: GPUShaderStage.FRAGMENT, texture: { sampleType: 'float' } },
                { binding: 1, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
            ],
        });
        const blitPipeline = device.createRenderPipeline({
            layout: device.createPipelineLayout({ bindGroupLayouts: [blitBGL] }),
            vertex: { module: blitShader, entryPoint: 'vs' },
            fragment: { module: blitShader, entryPoint: 'fs', targets: [{ format }] },
        });
        const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });
        const blitBG = device.createBindGroup({
            layout: blitBGL,
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: sampler },
            ],
        });

        let frameCount = 0, lastFPSTime = performance.now();

        function frame(time) {
            const now = performance.now();
            frameCount++;
            if (now - lastFPSTime > 500) {
                document.getElementById('fps').textContent = Math.round(frameCount / ((now - lastFPSTime) / 1000));
                frameCount = 0; lastFPSTime = now;
            }

            uniformData[0] = texW;
            uniformData[1] = texH;
            uniformData[2] = time / 1000;
            uniformData[3] = speed;
            uniformData[4] = twist;
            uniformData[5] = ringIntensity;
            const uintView = new Uint32Array(uniformData.buffer);
            uintView[6] = patternMode;
            uintView[7] = colorMode;
            device.queue.writeBuffer(uniformBuffer, 0, uniformData);

            const encoder = device.createCommandEncoder();
            const computePass = encoder.beginComputePass();
            computePass.setPipeline(pipeline);
            computePass.setBindGroup(0, bindGroup);
            computePass.dispatchWorkgroups(Math.ceil(texW / 8), Math.ceil(texH / 8));
            computePass.end();

            const renderPass = encoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    loadOp: 'clear', storeOp: 'store', clearValue: { r: 0, g: 0, b: 0, a: 1 },
                }],
            });
            renderPass.setPipeline(blitPipeline);
            renderPass.setBindGroup(0, blitBG);
            renderPass.draw(6);
            renderPass.end();
            device.queue.submit([encoder.finish()]);
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    </script>
</body>
</html>
