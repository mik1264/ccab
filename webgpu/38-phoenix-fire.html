<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Fire - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        .title-overlay { position: fixed; top: 70px; left: 20px; z-index: 90; }
        .title-overlay h1 { font-size: 1.4rem; color: #22d3ee; margin: 0 0 4px 0; }
        .title-overlay p { font-size: 0.85rem; color: #888; margin: 0; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to WebGPU Gallery</a>
    <div class="title-overlay">
        <h1>Phoenix Fire</h1>
        <p>GPU cellular automaton fire with rising phoenix</p>
    </div>
    <div class="controls">
        <label>Heat Intensity: <span id="heatVal">0.85</span></label>
        <input type="range" id="heat" min="0.3" max="1.0" step="0.01" value="0.85">
        <label>Decay Rate: <span id="decayVal">0.970</span></label>
        <input type="range" id="decay" min="0.940" max="0.995" step="0.001" value="0.970">
        <label>Wind: <span id="windVal">0.00</span></label>
        <input type="range" id="wind" min="-1.0" max="1.0" step="0.05" value="0.0">
        <label>Ember Count: <span id="emberVal">300</span></label>
        <input type="range" id="embers" min="50" max="600" step="10" value="300">
    </div>
    <div class="stats">FPS: <span id="fps">0</span> | Grid: 512x512 | Embers: <span id="emberCount">300</span></div>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>
    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const ctx = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        ctx.configure({ device, format, alphaMode: 'opaque' });

        const GRID = 512;
        let heatIntensity = 0.85, decayRate = 0.970, wind = 0.0, emberCount = 300;

        // Fire grid textures (r32float for temperature)
        const fireTex = [0, 1].map(() => device.createTexture({
            size: [GRID, GRID], format: 'r32float',
            usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.COPY_DST
        }));

        // Initialize fire grid to zeros
        const initData = new Float32Array(GRID * GRID);
        device.queue.writeTexture({ texture: fireTex[0] }, initData, { bytesPerRow: GRID * 4 }, { width: GRID, height: GRID });
        device.queue.writeTexture({ texture: fireTex[1] }, initData, { bytesPerRow: GRID * 4 }, { width: GRID, height: GRID });

        // Ember particles buffer: x, y, vx, vy, life, brightness per ember
        const MAX_EMBERS = 600;
        const emberBuffer = device.createBuffer({ size: MAX_EMBERS * 24, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        const emberData = new Float32Array(MAX_EMBERS * 6);
        for (let i = 0; i < MAX_EMBERS; i++) {
            emberData[i * 6 + 0] = 0.4 + Math.random() * 0.2; // x
            emberData[i * 6 + 1] = 0.7 + Math.random() * 0.1; // y (near heat source)
            emberData[i * 6 + 2] = (Math.random() - 0.5) * 0.02; // vx
            emberData[i * 6 + 3] = -Math.random() * 0.03 - 0.01; // vy (upward)
            emberData[i * 6 + 4] = Math.random(); // life
            emberData[i * 6 + 5] = 0.5 + Math.random() * 0.5; // brightness
        }
        device.queue.writeBuffer(emberBuffer, 0, emberData);

        const uniformBuffer = device.createBuffer({ size: 48, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        const fireComputeShader = `
            @group(0) @binding(0) var fireIn: texture_2d<f32>;
            @group(0) @binding(1) var fireOut: texture_storage_2d<r32float, write>;
            @group(0) @binding(2) var<uniform> params: array<vec4f, 3>;
            // params[0] = heatIntensity, decayRate, wind, time
            // params[1] = width, height, emberCount, dt

            fn hash(p: f32) -> f32 {
                var s = fract(p * 0.3183099 + 0.1);
                s *= s + 33.33;
                s *= s + s;
                return fract(s);
            }

            fn noise2d(x: f32, y: f32, t: f32) -> f32 {
                return hash(x * 127.1 + y * 311.7 + t * 17.3);
            }

            @compute @workgroup_size(16, 16)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let size = textureDimensions(fireIn);
                if (gid.x >= size.x || gid.y >= size.y) { return; }

                let x = i32(gid.x);
                let y = i32(gid.y);
                let w = i32(size.x);
                let h = i32(size.y);
                let heatIntensity = params[0].x;
                let decay = params[0].y;
                let windVal = params[0].z;
                let time = params[0].w;

                // Propagation: average from below with wind offset
                let windOff = i32(windVal * 3.0);
                let below1 = textureLoad(fireIn, vec2i(clamp(x - 1 + windOff, 0, w-1), min(y + 1, h-1)), 0).r;
                let below2 = textureLoad(fireIn, vec2i(clamp(x + windOff, 0, w-1), min(y + 1, h-1)), 0).r;
                let below3 = textureLoad(fireIn, vec2i(clamp(x + 1 + windOff, 0, w-1), min(y + 1, h-1)), 0).r;
                let cur = textureLoad(fireIn, vec2i(x, y), 0).r;
                let left = textureLoad(fireIn, vec2i(max(x-1,0), y), 0).r;
                let right = textureLoad(fireIn, vec2i(min(x+1,w-1), y), 0).r;

                var temp = (below1 + below2 + below3 + cur + left * 0.3 + right * 0.3) / 4.6;

                // Add noise for flicker
                let n = noise2d(f32(x), f32(y), time) * 0.15;
                temp = temp * decay + n * temp;

                // Phoenix wing heat source shape at bottom
                let fx = f32(x) / f32(w);
                let fy = f32(y) / f32(h);

                // Phoenix shape: body + spread wings
                let bodyDist = abs(fx - 0.5);
                let wingSpread = smoothstep(0.6, 0.85, fy); // wings wider at bottom
                let wingWidth = 0.15 + wingSpread * 0.3;
                let wingCurve = sin((fx - 0.5) * 3.14159 / wingWidth) * step(bodyDist, wingWidth);

                // Heat source region (bottom 15%)
                let isHeatZone = step(0.82, fy);
                let bodyHeat = smoothstep(0.08, 0.0, bodyDist) * isHeatZone;

                // Wing heat sources
                let leftWingDist = abs(fx - (0.5 - wingWidth * 0.6));
                let rightWingDist = abs(fx - (0.5 + wingWidth * 0.6));
                let wingTip = 0.03 + 0.05 * sin(time * 2.0 + fx * 10.0);
                let leftWingHeat = smoothstep(wingTip + 0.02, wingTip, leftWingDist) * step(0.78, fy);
                let rightWingHeat = smoothstep(wingTip + 0.02, wingTip, rightWingDist) * step(0.78, fy);

                // Central spine heat
                let spineHeat = smoothstep(0.04, 0.0, bodyDist) * smoothstep(0.5, 0.85, fy) * 0.5;

                // Combine heat sources
                let totalHeat = (bodyHeat + leftWingHeat + rightWingHeat + wingCurve * isHeatZone * 0.5 + spineHeat) * heatIntensity;

                // Random fuel injection
                let rn = noise2d(f32(x) * 0.5, f32(y) * 0.5, time * 3.0);
                let fuelNoise = step(0.7, rn) * isHeatZone * heatIntensity * 0.4;

                temp = max(temp, totalHeat + fuelNoise);
                temp = clamp(temp, 0.0, 1.0);

                textureStore(fireOut, vec2i(gid.xy), vec4f(temp, 0.0, 0.0, 0.0));
            }
        `;

        const renderShader = `
            @group(0) @binding(0) var fireTex: texture_2d<f32>;
            @group(0) @binding(1) var<storage, read> embers: array<vec4f>;
            @group(0) @binding(2) var<uniform> params: array<vec4f, 3>;

            struct VO { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VO {
                var p = array<vec2f, 4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var u = array<vec2f, 4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var o: VO; o.pos = vec4f(p[i], 0, 1); o.uv = u[i]; return o;
            }

            fn firePalette(t: f32) -> vec3f {
                // Black -> deep red -> orange -> yellow -> white
                if (t < 0.15) {
                    return mix(vec3f(0.0, 0.0, 0.0), vec3f(0.3, 0.0, 0.0), t / 0.15);
                } else if (t < 0.35) {
                    return mix(vec3f(0.3, 0.0, 0.0), vec3f(0.8, 0.2, 0.0), (t - 0.15) / 0.2);
                } else if (t < 0.6) {
                    return mix(vec3f(0.8, 0.2, 0.0), vec3f(1.0, 0.6, 0.0), (t - 0.35) / 0.25);
                } else if (t < 0.8) {
                    return mix(vec3f(1.0, 0.6, 0.0), vec3f(1.0, 0.9, 0.3), (t - 0.6) / 0.2);
                } else {
                    return mix(vec3f(1.0, 0.9, 0.3), vec3f(1.0, 1.0, 0.9), (t - 0.8) / 0.2);
                }
            }

            @fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                let size = textureDimensions(fireTex);
                let coord = vec2i(i32(uv.x * f32(size.x)), i32(uv.y * f32(size.y)));
                let temp = textureLoad(fireTex, coord, 0).r;

                var color = firePalette(temp);

                // Add ember particles as bright dots
                let numEmbers = i32(params[1].z);
                for (var i = 0; i < numEmbers; i += 1) {
                    // Embers stored as pairs: xy position, zw = life/brightness
                    let idx = i / 2;
                    var ex: f32; var ey: f32; var life: f32; var bright: f32;
                    if (i % 2 == 0) {
                        ex = embers[idx * 3].x;
                        ey = embers[idx * 3].y;
                        life = embers[idx * 3 + 1].x;
                        bright = embers[idx * 3 + 1].y;
                    } else {
                        ex = embers[idx * 3].z;
                        ey = embers[idx * 3].w;
                        life = embers[idx * 3 + 1].z;
                        bright = embers[idx * 3 + 1].w;
                    }
                    let d = distance(uv, vec2f(ex, ey));
                    let glow = exp(-d * d * 80000.0) * bright * life;
                    color += firePalette(0.7 + bright * 0.3) * glow * 3.0;
                }

                // Subtle ambient glow
                let glowDist = distance(uv, vec2f(0.5, 0.75));
                color += vec3f(0.15, 0.03, 0.0) * exp(-glowDist * glowDist * 3.0) * temp * 0.5;

                return vec4f(color, 1.0);
            }
        `;

        const simModule = device.createShaderModule({ code: fireComputeShader });
        const simPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: simModule, entryPoint: 'main' }
        });

        const renderModule = device.createShaderModule({ code: renderShader });
        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: renderModule, entryPoint: 'vs' },
            fragment: { module: renderModule, entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-strip' }
        });

        const simBindGroups = [
            device.createBindGroup({
                layout: simPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: fireTex[0].createView() },
                    { binding: 1, resource: fireTex[1].createView() },
                    { binding: 2, resource: { buffer: uniformBuffer } }
                ]
            }),
            device.createBindGroup({
                layout: simPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: fireTex[1].createView() },
                    { binding: 1, resource: fireTex[0].createView() },
                    { binding: 2, resource: { buffer: uniformBuffer } }
                ]
            })
        ];

        const renderBindGroups = [0, 1].map(i =>
            device.createBindGroup({
                layout: renderPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: fireTex[i].createView() },
                    { binding: 1, resource: { buffer: emberBuffer } },
                    { binding: 2, resource: { buffer: uniformBuffer } }
                ]
            })
        );

        // CPU-side ember update (simpler than a separate compute shader)
        function updateEmbers(dt, time) {
            for (let i = 0; i < MAX_EMBERS; i++) {
                let idx = i * 6;
                emberData[idx + 0] += emberData[idx + 2] * dt * 30; // x += vx
                emberData[idx + 1] += emberData[idx + 3] * dt * 30; // y += vy (upward = negative in screen space)
                emberData[idx + 2] += (Math.random() - 0.5) * 0.001 + wind * 0.0005; // turbulence + wind
                emberData[idx + 3] -= 0.0003; // accelerate upward
                emberData[idx + 4] -= dt * 0.5; // life decreases

                // Respawn dead embers
                if (emberData[idx + 4] <= 0 || emberData[idx + 1] < 0 || i >= emberCount) {
                    if (i < emberCount) {
                        // Spawn near heat source (phoenix shape)
                        const angle = Math.random() * Math.PI;
                        const wingOffset = Math.sin(angle) * 0.2 * (Math.random() > 0.5 ? 1 : -1);
                        emberData[idx + 0] = 0.5 + wingOffset * (0.3 + Math.random() * 0.3);
                        emberData[idx + 1] = 0.78 + Math.random() * 0.15;
                        emberData[idx + 2] = (Math.random() - 0.5) * 0.015;
                        emberData[idx + 3] = -Math.random() * 0.02 - 0.005;
                        emberData[idx + 4] = 0.5 + Math.random() * 0.5;
                        emberData[idx + 5] = 0.3 + Math.random() * 0.7;
                    } else {
                        emberData[idx + 4] = 0; // hide inactive embers
                        emberData[idx + 5] = 0;
                    }
                }
            }
            device.queue.writeBuffer(emberBuffer, 0, emberData);
        }

        // UI bindings
        document.getElementById('heat').addEventListener('input', (e) => {
            heatIntensity = parseFloat(e.target.value);
            document.getElementById('heatVal').textContent = heatIntensity.toFixed(2);
        });
        document.getElementById('decay').addEventListener('input', (e) => {
            decayRate = parseFloat(e.target.value);
            document.getElementById('decayVal').textContent = decayRate.toFixed(3);
        });
        document.getElementById('wind').addEventListener('input', (e) => {
            wind = parseFloat(e.target.value);
            document.getElementById('windVal').textContent = wind.toFixed(2);
        });
        document.getElementById('embers').addEventListener('input', (e) => {
            emberCount = parseInt(e.target.value);
            document.getElementById('emberVal').textContent = emberCount;
            document.getElementById('emberCount').textContent = emberCount;
        });

        let frame = 0;
        let lastTime = performance.now(), fpsFrames = 0, fpsTime = 0;
        const startTime = performance.now();

        function render() {
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            fpsFrames++; fpsTime += dt;
            if (fpsTime >= 1.0) {
                document.getElementById('fps').textContent = Math.round(fpsFrames / fpsTime);
                fpsFrames = 0; fpsTime = 0;
            }

            const time = (now - startTime) / 1000;
            updateEmbers(Math.min(dt, 0.033), time);

            device.queue.writeBuffer(uniformBuffer, 0, new Float32Array([
                heatIntensity, decayRate, wind, time,
                canvas.width, canvas.height, emberCount, dt,
                0, 0, 0, 0
            ]));

            const encoder = device.createCommandEncoder();

            // Fire simulation steps
            for (let s = 0; s < 3; s++) {
                const cp = encoder.beginComputePass();
                cp.setPipeline(simPipeline);
                cp.setBindGroup(0, simBindGroups[frame % 2]);
                cp.dispatchWorkgroups(Math.ceil(GRID / 16), Math.ceil(GRID / 16));
                cp.end();
                frame++;
            }

            // Render
            const rp = encoder.beginRenderPass({
                colorAttachments: [{
                    view: ctx.getCurrentTexture().createView(),
                    loadOp: 'clear', storeOp: 'store', clearValue: { r: 0, g: 0, b: 0, a: 1 }
                }]
            });
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, renderBindGroups[frame % 2]);
            rp.draw(4);
            rp.end();

            device.queue.submit([encoder.finish()]);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.configure({ device, format, alphaMode: 'opaque' });
        });

        render();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
