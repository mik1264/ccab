<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrofluid Simulation - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        .title-overlay { position: fixed; top: 70px; left: 20px; z-index: 90; }
        .title-overlay h1 { font-size: 1.4rem; color: #22d3ee; margin: 0 0 4px 0; }
        .title-overlay p { font-size: 0.85rem; color: #888; margin: 0; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
        .info { font-size: 10px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to WebGPU Gallery</a>
    <div class="title-overlay">
        <h1>Ferrofluid Simulation</h1>
        <p>Rosensweig instability - magnetic fluid spikes on GPU</p>
    </div>
    <div class="controls">
        <label>Magnetic Field: <span id="fieldVal">0.60</span></label>
        <input type="range" id="field" min="0.0" max="1.5" step="0.01" value="0.60">
        <label>Surface Tension: <span id="tensionVal">0.50</span></label>
        <input type="range" id="tension" min="0.05" max="1.5" step="0.01" value="0.50">
        <label>Viscosity: <span id="viscVal">0.95</span></label>
        <input type="range" id="visc" min="0.80" max="0.99" step="0.01" value="0.95">
        <label>Magnet Position X: <span id="magXVal">0.50</span></label>
        <input type="range" id="magX" min="0.1" max="0.9" step="0.01" value="0.50">
        <div class="info">Move magnet to create spike patterns</div>
    </div>
    <div class="stats">FPS: <span id="fps">0</span> | Grid: 512x512</div>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>
    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const ctx = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        ctx.configure({ device, format, alphaMode: 'opaque' });

        const GRID = 512;
        let magneticField = 0.60, surfaceTension = 0.50, viscosity = 0.95, magnetX = 0.50;

        // Height field stored in 2 textures for ping-pong
        const heightTextures = [0, 1].map(() => device.createTexture({
            size: [GRID, GRID], format: 'rg32float',
            usage: GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.COPY_DST
        }));

        // Initialize height field - flat surface at height 0.3
        const initData = new Float32Array(GRID * GRID * 2);
        for (let i = 0; i < GRID * GRID; i++) {
            initData[i * 2] = 0.3;    // height
            initData[i * 2 + 1] = 0.0; // velocity
        }
        device.queue.writeTexture({ texture: heightTextures[0] }, initData, { bytesPerRow: GRID * 8 }, { width: GRID, height: GRID });
        device.queue.writeTexture({ texture: heightTextures[1] }, initData, { bytesPerRow: GRID * 8 }, { width: GRID, height: GRID });

        const uniformBuffer = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        const simulateShader = `
            @group(0) @binding(0) var heightIn: texture_2d<f32>;
            @group(0) @binding(1) var heightOut: texture_storage_2d<rg32float, write>;
            @group(0) @binding(2) var<uniform> params: vec4f; // magneticField, surfaceTension, viscosity, magnetX

            @compute @workgroup_size(16, 16)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let size = textureDimensions(heightIn);
                if (gid.x >= size.x || gid.y >= size.y) { return; }
                let x = i32(gid.x);
                let y = i32(gid.y);
                let w = i32(size.x);
                let h = i32(size.y);

                let cur = textureLoad(heightIn, vec2i(x, y), 0).rg;
                let height = cur.r;
                let vel = cur.g;

                // Neighbors (clamped)
                let hL = textureLoad(heightIn, vec2i(max(x-1,0), y), 0).r;
                let hR = textureLoad(heightIn, vec2i(min(x+1,w-1), y), 0).r;
                let hU = textureLoad(heightIn, vec2i(x, max(y-1,0)), 0).r;
                let hD = textureLoad(heightIn, vec2i(x, min(y+1,h-1)), 0).r;

                // Laplacian for surface tension
                let laplacian = (hL + hR + hU + hD - 4.0 * height);

                // Surface tension force (smoothing)
                let tensionForce = params.y * laplacian * 4.0;

                // Magnetic field force - creates instability & spikes
                // Field strength varies with distance from magnet position
                let fx = f32(gid.x) / f32(size.x);
                let fy = f32(gid.y) / f32(size.y);
                let magnetPos = vec2f(params.w, 0.5);
                let dist = distance(vec2f(fx, fy), magnetPos);
                let fieldStrength = params.x * exp(-dist * dist * 3.0);

                // Rosensweig: magnetic pressure gradient drives instability
                // Higher regions feel stronger pull (positive feedback)
                let magneticForce = fieldStrength * (height - 0.3) * 2.0;

                // Gradient-driven instability: local maxima grow, minima shrink
                let gradient = length(vec2f(hR - hL, hD - hU)) * 0.5;
                let instability = fieldStrength * gradient * height * 1.5;

                // Gravity restoring force
                let gravity = -0.5 * (height - 0.3);

                // Biharmonic term for spike sharpening
                let hLL = textureLoad(heightIn, vec2i(max(x-2,0), y), 0).r;
                let hRR = textureLoad(heightIn, vec2i(min(x+2,w-1), y), 0).r;
                let hUU = textureLoad(heightIn, vec2i(x, max(y-2,0)), 0).r;
                let hDD = textureLoad(heightIn, vec2i(x, min(y+2,h-1)), 0).r;
                let biharmonic = hLL + hRR + hUU + hDD - 4.0 * height - 2.0 * laplacian;
                let sharpening = -0.02 * biharmonic * fieldStrength;

                // Update velocity and height
                let newVel = (vel + tensionForce + magneticForce + instability + gravity + sharpening) * params.z;
                let newHeight = clamp(height + newVel * 0.016, 0.01, 0.95);

                textureStore(heightOut, vec2i(gid.xy), vec4f(newHeight, newVel, 0.0, 0.0));
            }
        `;

        const renderShader = `
            @group(0) @binding(0) var heightTex: texture_2d<f32>;
            @group(0) @binding(1) var<uniform> params: vec4f;

            struct VO { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VO {
                var p = array<vec2f, 4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var u = array<vec2f, 4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var o: VO; o.pos = vec4f(p[i], 0, 1); o.uv = u[i]; return o;
            }

            @fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                let size = textureDimensions(heightTex);
                let coord = vec2i(i32(uv.x * f32(size.x)), i32(uv.y * f32(size.y)));

                let h = textureLoad(heightTex, coord, 0).r;
                let v = textureLoad(heightTex, coord, 0).g;

                // Sample neighbors for normal calculation
                let dx = 1;
                let hL = textureLoad(heightTex, vec2i(max(coord.x - dx, 0), coord.y), 0).r;
                let hR = textureLoad(heightTex, vec2i(min(coord.x + dx, i32(size.x) - 1), coord.y), 0).r;
                let hU = textureLoad(heightTex, vec2i(coord.x, max(coord.y - dx, 0)), 0).r;
                let hD = textureLoad(heightTex, vec2i(coord.x, min(coord.y + dx, i32(size.y) - 1)), 0).r;

                // Surface normal (height field gradient)
                let nx = (hR - hL) * 8.0;
                let ny = (hD - hU) * 8.0;
                let normal = normalize(vec3f(-nx, -ny, 1.0));

                // View and light direction
                let lightDir = normalize(vec3f(0.3, 0.5, 1.0));
                let viewDir = vec3f(0.0, 0.0, 1.0);
                let halfDir = normalize(lightDir + viewDir);

                // Ferrofluid is deep black with metallic specular
                let diffuse = max(dot(normal, lightDir), 0.0);
                let specular = pow(max(dot(normal, halfDir), 0.0), 120.0);
                let fresnel = pow(1.0 - max(dot(normal, viewDir), 0.0), 4.0);

                // Deep black base with metallic sheen
                let baseColor = vec3f(0.02, 0.02, 0.03);
                let specColor = vec3f(0.85, 0.88, 0.95); // Cool metallic
                let fresnelColor = vec3f(0.15, 0.2, 0.35); // Blue-ish edge reflection

                // Magnetic field glow (subtle)
                let magnetDist = distance(uv, vec2f(params.w, 0.5));
                let magnetGlow = exp(-magnetDist * magnetDist * 4.0) * params.x * 0.08;

                var color = baseColor * (0.3 + diffuse * 0.7)
                    + specColor * specular * 2.5
                    + fresnelColor * fresnel * 0.6
                    + vec3f(0.1, 0.15, 0.4) * magnetGlow;

                // Height-based brightness (spikes catch more light)
                let heightBoost = smoothstep(0.35, 0.7, h) * 0.15;
                color += vec3f(0.3, 0.35, 0.45) * heightBoost * specular;

                // Environment reflection on peaks
                let envReflect = pow(max(0.0, reflect(-viewDir, vec3f(normal.xy, normal.z)).z), 8.0);
                color += vec3f(0.05, 0.08, 0.15) * envReflect * h * 2.0;

                // Rim glow on spike edges
                let rim = pow(1.0 - abs(dot(normal, viewDir)), 3.0);
                color += vec3f(0.08, 0.12, 0.25) * rim * h * 1.5;

                return vec4f(color, 1.0);
            }
        `;

        // Compute pipeline
        const simModule = device.createShaderModule({ code: simulateShader });
        const simPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: simModule, entryPoint: 'main' }
        });

        // Render pipeline
        const renderModule = device.createShaderModule({ code: renderShader });
        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: renderModule, entryPoint: 'vs' },
            fragment: { module: renderModule, entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-strip' }
        });

        // Bind groups for ping-pong simulation
        const simBindGroups = [
            device.createBindGroup({
                layout: simPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: heightTextures[0].createView() },
                    { binding: 1, resource: heightTextures[1].createView() },
                    { binding: 2, resource: { buffer: uniformBuffer } }
                ]
            }),
            device.createBindGroup({
                layout: simPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: heightTextures[1].createView() },
                    { binding: 1, resource: heightTextures[0].createView() },
                    { binding: 2, resource: { buffer: uniformBuffer } }
                ]
            })
        ];

        const renderBindGroups = [0, 1].map(i =>
            device.createBindGroup({
                layout: renderPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: heightTextures[i].createView() },
                    { binding: 1, resource: { buffer: uniformBuffer } }
                ]
            })
        );

        // UI
        document.getElementById('field').addEventListener('input', (e) => {
            magneticField = parseFloat(e.target.value);
            document.getElementById('fieldVal').textContent = magneticField.toFixed(2);
        });
        document.getElementById('tension').addEventListener('input', (e) => {
            surfaceTension = parseFloat(e.target.value);
            document.getElementById('tensionVal').textContent = surfaceTension.toFixed(2);
        });
        document.getElementById('visc').addEventListener('input', (e) => {
            viscosity = parseFloat(e.target.value);
            document.getElementById('viscVal').textContent = viscosity.toFixed(2);
        });
        document.getElementById('magX').addEventListener('input', (e) => {
            magnetX = parseFloat(e.target.value);
            document.getElementById('magXVal').textContent = magnetX.toFixed(2);
        });

        let frame = 0;
        let lastTime = performance.now(), fpsFrames = 0, fpsTime = 0;

        function render() {
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            fpsFrames++; fpsTime += dt;
            if (fpsTime >= 1.0) {
                document.getElementById('fps').textContent = Math.round(fpsFrames / fpsTime);
                fpsFrames = 0; fpsTime = 0;
            }

            device.queue.writeBuffer(uniformBuffer, 0, new Float32Array([magneticField, surfaceTension, viscosity, magnetX]));

            const encoder = device.createCommandEncoder();

            // Multiple simulation steps per frame
            const stepsPerFrame = 4;
            for (let s = 0; s < stepsPerFrame; s++) {
                const cp = encoder.beginComputePass();
                cp.setPipeline(simPipeline);
                cp.setBindGroup(0, simBindGroups[frame % 2]);
                cp.dispatchWorkgroups(Math.ceil(GRID / 16), Math.ceil(GRID / 16));
                cp.end();
                frame++;
            }

            // Render
            const rp = encoder.beginRenderPass({
                colorAttachments: [{
                    view: ctx.getCurrentTexture().createView(),
                    loadOp: 'clear', storeOp: 'store', clearValue: { r: 0.02, g: 0.02, b: 0.04, a: 1 }
                }]
            });
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, renderBindGroups[frame % 2]);
            rp.draw(4);
            rp.end();

            device.queue.submit([encoder.finish()]);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.configure({ device, format, alphaMode: 'opaque' });
        });

        render();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
