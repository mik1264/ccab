<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newton's Method Fractal - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 210px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls select { width: 170px; background: #1a1a2e; color: #e8e6e1; border: 1px solid #22d3ee; border-radius: 4px; padding: 3px; }
        .controls button { margin: 3px 2px; padding: 5px 10px; background: #22d3ee; color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .controls .row { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
        .controls .row button { flex: 1; min-width: 70px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; line-height: 1.6; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #22d3ee; font-size: 14px; font-weight: 600; z-index: 100; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); pointer-events: none; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
        .info { font-size: 10px; color: #888; margin-top: 8px; line-height: 1.4; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div class="title">Newton's Method Fractal</div>

    <div class="controls">
        <label>Polynomial Degree: <span id="degreeVal">3</span></label>
        <select id="degree">
            <option value="3" selected>z^3 - 1 (3 roots)</option>
            <option value="4">z^4 - 1 (4 roots)</option>
            <option value="5">z^5 - 1 (5 roots)</option>
        </select>
        <label>Damping: <span id="dampVal">1.00</span></label>
        <input type="range" id="damping" min="0.5" max="2.0" step="0.01" value="1.0">
        <label>Max Iterations: <span id="iterVal">80</span></label>
        <input type="range" id="maxIter" min="20" max="200" step="5" value="80">
        <label>Color Palette:</label>
        <select id="palette">
            <option value="0">Stained Glass</option>
            <option value="1">Jewel Tones</option>
            <option value="2">Pastel</option>
            <option value="3">Neon</option>
        </select>
        <div class="row">
            <button onclick="window.resetView()">Reset View</button>
            <button onclick="window.toggleAnimate()">Pause Anim</button>
        </div>
        <div class="info">
            Scroll to zoom<br>
            Drag to pan<br>
            Damping animates automatically
        </div>
    </div>

    <div class="stats">
        FPS: <span id="fps">0</span><br>
        Zoom: <span id="zoom">1.00</span><br>
        Center: <span id="center">0.000, 0.000</span><br>
        Damping: <span id="dampDisplay">1.000</span>
    </div>

    <div id="error">
        WebGPU is not supported in your browser.<br>
        Please use Chrome 113+, Edge 113+, or Safari 18+.
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        ctx.configure({ device, format, alphaMode: 'opaque' });

        const W = canvas.width, H = canvas.height;

        let centerX = 0, centerY = 0;
        let zoomLevel = 1.0;
        let maxIter = 80;
        let paletteId = 0;
        let degree = 3;
        let damping = 1.0;
        let animate = true;
        let dragging = false, dragSX = 0, dragSY = 0, dragCX = 0, dragCY = 0;

        const uniformBuffer = device.createBuffer({ size: 64, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        const computeShader = `
            struct Uniforms {
                resolution: vec2f,
                center: vec2f,
                scale: f32,
                maxIter: u32,
                palette: u32,
                aspect: f32,
                damping: f32,
                degree: u32,
                pad0: f32,
                pad1: f32,
            }

            @group(0) @binding(0) var outTex: texture_storage_2d<rgba8unorm, write>;
            @group(0) @binding(1) var<uniform> u: Uniforms;

            // Complex multiply
            fn cmul(a: vec2f, b: vec2f) -> vec2f {
                return vec2f(a.x * b.x - a.y * b.y, a.x * b.y + a.y * b.x);
            }

            // Complex divide
            fn cdiv(a: vec2f, b: vec2f) -> vec2f {
                let d = b.x * b.x + b.y * b.y;
                return vec2f((a.x * b.x + a.y * b.y) / d, (a.y * b.x - a.x * b.y) / d);
            }

            // Complex power (integer)
            fn cpow(z: vec2f, n: u32) -> vec2f {
                var result = vec2f(1.0, 0.0);
                for (var i = 0u; i < n; i++) {
                    result = cmul(result, z);
                }
                return result;
            }

            // Root colors for different degrees
            fn rootColor(rootIdx: u32, shade: f32, pal: u32) -> vec3f {
                var hue: f32;
                if (pal == 0u) {
                    // Stained glass: warm jewel colors
                    let hues = array<f32, 5>(0.0, 0.3, 0.6, 0.12, 0.8);
                    hue = hues[rootIdx % 5u];
                    let s = 0.8 + 0.2 * shade;
                    let l = 0.15 + 0.65 * shade;
                    return hslToRgb(hue, s, l);
                } else if (pal == 1u) {
                    // Jewel tones
                    let hues = array<f32, 5>(0.95, 0.33, 0.55, 0.08, 0.75);
                    hue = hues[rootIdx % 5u];
                    let s = 0.9;
                    let l = 0.1 + 0.6 * shade;
                    return hslToRgb(hue, s, l);
                } else if (pal == 2u) {
                    // Pastel
                    let hues = array<f32, 5>(0.0, 0.25, 0.5, 0.75, 0.125);
                    hue = hues[rootIdx % 5u];
                    let s = 0.5 + 0.3 * shade;
                    let l = 0.5 + 0.4 * shade;
                    return hslToRgb(hue, s, l);
                } else {
                    // Neon
                    let hues = array<f32, 5>(0.83, 0.33, 0.0, 0.5, 0.16);
                    hue = hues[rootIdx % 5u];
                    let s = 1.0;
                    let l = 0.3 + 0.5 * shade * shade;
                    return hslToRgb(hue, s, l);
                }
            }

            fn hslToRgb(h: f32, s: f32, l: f32) -> vec3f {
                let c = (1.0 - abs(2.0 * l - 1.0)) * s;
                let hp = h * 6.0;
                let x = c * (1.0 - abs(hp % 2.0 - 1.0));
                var rgb: vec3f;
                if (hp < 1.0) { rgb = vec3f(c, x, 0.0); }
                else if (hp < 2.0) { rgb = vec3f(x, c, 0.0); }
                else if (hp < 3.0) { rgb = vec3f(0.0, c, x); }
                else if (hp < 4.0) { rgb = vec3f(0.0, x, c); }
                else if (hp < 5.0) { rgb = vec3f(x, 0.0, c); }
                else { rgb = vec3f(c, 0.0, x); }
                let m = l - c * 0.5;
                return rgb + vec3f(m);
            }

            @compute @workgroup_size(8, 8)
            fn main(@builtin(global_invocation_id) id: vec3u) {
                let w = u32(u.resolution.x);
                let h = u32(u.resolution.y);
                if (id.x >= w || id.y >= h) { return; }

                let px = (f32(id.x) / u.resolution.x - 0.5) * u.scale * u.aspect;
                let py = (f32(id.y) / u.resolution.y - 0.5) * u.scale;

                var z = vec2f(u.center.x + px, u.center.y + py);
                let deg = u.degree;
                let damp = u.damping;

                // Precompute roots of z^n = 1
                // roots are exp(2*pi*i*k/n) for k=0..n-1
                var convergedRoot = 0u;
                var iter = 0u;
                let tolerance = 1e-6;

                for (var i = 0u; i < u.maxIter; i++) {
                    // f(z) = z^n - 1
                    let zn = cpow(z, deg);
                    let fz = vec2f(zn.x - 1.0, zn.y);

                    // f'(z) = n * z^(n-1)
                    let zn1 = cpow(z, deg - 1u);
                    let fpz = vec2f(f32(deg) * zn1.x, f32(deg) * zn1.y);

                    // Newton step: z = z - damp * f(z)/f'(z)
                    let step = cdiv(fz, fpz);
                    z = vec2f(z.x - damp * step.x, z.y - damp * step.y);

                    iter = i + 1u;

                    // Check convergence to any root
                    let fzNew = cpow(z, deg);
                    let err = vec2f(fzNew.x - 1.0, fzNew.y);
                    if (dot(err, err) < tolerance) { break; }
                }

                // Determine which root we converged to
                var minDist = 1e10;
                for (var k = 0u; k < deg; k++) {
                    let angle = 6.2831853 * f32(k) / f32(deg);
                    let root = vec2f(cos(angle), sin(angle));
                    let d = z - root;
                    let dist = dot(d, d);
                    if (dist < minDist) {
                        minDist = dist;
                        convergedRoot = k;
                    }
                }

                let shade = 1.0 - f32(iter) / f32(u.maxIter);
                let color = rootColor(convergedRoot, shade, u.palette);

                textureStore(outTex, vec2i(id.xy), vec4f(color, 1.0));
            }
        `;

        const displayShader = `
            @group(0) @binding(0) var tex: texture_2d<f32>;
            @group(0) @binding(1) var samp: sampler;
            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VSOut {
                var p = array<vec2f,4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var u = array<vec2f,4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var o: VSOut; o.pos = vec4f(p[i], 0, 1); o.uv = u[i]; return o;
            }
            @fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                return textureSample(tex, samp, uv);
            }
        `;

        const outTexture = device.createTexture({
            size: [W, H], format: 'rgba8unorm',
            usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING
        });

        const computePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: computeShader }), entryPoint: 'main' }
        });

        const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });

        const displayPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: device.createShaderModule({ code: displayShader }), entryPoint: 'vs' },
            fragment: { module: device.createShaderModule({ code: displayShader }), entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-strip' }
        });

        const computeBG = device.createBindGroup({
            layout: computePipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: { buffer: uniformBuffer } }
            ]
        });

        const displayBG = device.createBindGroup({
            layout: displayPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: sampler }
            ]
        });

        function updateStats() {
            document.getElementById('zoom').textContent = zoomLevel < 1e6 ? zoomLevel.toFixed(2) : zoomLevel.toExponential(3);
            document.getElementById('center').textContent = centerX.toFixed(4) + ', ' + centerY.toFixed(4);
            document.getElementById('dampDisplay').textContent = damping.toFixed(3);
        }

        let fpsC = 0, fpsT = performance.now();
        let startTime = performance.now();

        function frame() {
            requestAnimationFrame(frame);
            const now = performance.now();
            fpsC++;
            if (now - fpsT > 500) {
                document.getElementById('fps').textContent = Math.round(fpsC / ((now - fpsT) / 1000));
                fpsC = 0; fpsT = now;
            }

            if (animate) {
                const t = (now - startTime) * 0.0003;
                damping = 1.0 + 0.3 * Math.sin(t) + 0.1 * Math.sin(t * 1.7);
                document.getElementById('damping').value = damping;
                document.getElementById('dampVal').textContent = damping.toFixed(2);
            }

            const scale = 4.0 / zoomLevel;
            const aspect = W / H;

            const buf = new ArrayBuffer(64);
            const f32 = new Float32Array(buf);
            const u32 = new Uint32Array(buf);
            f32[0] = W; f32[1] = H;
            f32[2] = centerX; f32[3] = centerY;
            f32[4] = scale;
            u32[5] = maxIter;
            u32[6] = paletteId;
            f32[7] = aspect;
            f32[8] = damping;
            u32[9] = degree;

            device.queue.writeBuffer(uniformBuffer, 0, buf);

            const enc = device.createCommandEncoder();
            const cp = enc.beginComputePass();
            cp.setPipeline(computePipeline);
            cp.setBindGroup(0, computeBG);
            cp.dispatchWorkgroups(Math.ceil(W / 8), Math.ceil(H / 8));
            cp.end();

            const rp = enc.beginRenderPass({
                colorAttachments: [{ view: ctx.getCurrentTexture().createView(), loadOp: 'clear', storeOp: 'store' }]
            });
            rp.setPipeline(displayPipeline);
            rp.setBindGroup(0, displayBG);
            rp.draw(4);
            rp.end();

            device.queue.submit([enc.finish()]);
            updateStats();
        }

        // Scroll zoom
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) / rect.width;
            const my = (e.clientY - rect.top) / rect.height;
            const scale = 4.0 / zoomLevel;
            const aspect = W / H;
            const cx = centerX + (mx - 0.5) * scale * aspect;
            const cy = centerY + (my - 0.5) * scale;
            const factor = e.deltaY > 0 ? 0.85 : 1.18;
            zoomLevel *= factor;
            const newScale = 4.0 / zoomLevel;
            centerX = cx - (mx - 0.5) * newScale * aspect;
            centerY = cy - (my - 0.5) * newScale;
        }, { passive: false });

        // Pan
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) { dragging = true; dragSX = e.clientX; dragSY = e.clientY; dragCX = centerX; dragCY = centerY; }
        });
        window.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            const scale = 4.0 / zoomLevel;
            const aspect = W / H;
            centerX = dragCX - (e.clientX - dragSX) / W * scale * aspect;
            centerY = dragCY - (e.clientY - dragSY) / H * scale;
        });
        window.addEventListener('mouseup', () => { dragging = false; });

        // Controls
        document.getElementById('maxIter').addEventListener('input', (e) => {
            maxIter = parseInt(e.target.value);
            document.getElementById('iterVal').textContent = maxIter;
        });
        document.getElementById('palette').addEventListener('change', (e) => { paletteId = parseInt(e.target.value); });
        document.getElementById('degree').addEventListener('change', (e) => {
            degree = parseInt(e.target.value);
            document.getElementById('degreeVal').textContent = degree;
        });
        document.getElementById('damping').addEventListener('input', (e) => {
            damping = parseFloat(e.target.value);
            document.getElementById('dampVal').textContent = damping.toFixed(2);
            animate = false;
            document.querySelector('.controls .row button:last-child').textContent = 'Resume Anim';
        });

        window.resetView = () => {
            centerX = 0; centerY = 0;
            zoomLevel = 1.0;
        };

        window.toggleAnimate = () => {
            animate = !animate;
            if (animate) startTime = performance.now();
            document.querySelector('.controls .row button:last-child').textContent = animate ? 'Pause Anim' : 'Resume Anim';
        };

        requestAnimationFrame(frame);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
