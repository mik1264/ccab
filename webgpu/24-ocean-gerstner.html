<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerstner Wave Ocean - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #22d3ee; font-size: 14px; font-weight: 600; z-index: 100; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); pointer-events: none; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div class="title">Gerstner Wave Ocean</div>

    <div class="controls">
        <label>Wave Height: <span id="heightVal">0.8</span></label>
        <input type="range" id="waveHeight" min="0.1" max="2.0" step="0.1" value="0.8">
        <label>Wind Direction: <span id="windVal">45</span>&deg;</label>
        <input type="range" id="windDir" min="0" max="360" step="5" value="45">
        <label>Wave Count: <span id="waveCountVal">5</span></label>
        <input type="range" id="waveCount" min="1" max="8" step="1" value="5">
        <label>Choppiness: <span id="chopVal">1.0</span></label>
        <input type="range" id="choppiness" min="0.0" max="2.0" step="0.1" value="1.0">
        <label>Sun Angle: <span id="sunVal">35</span>&deg;</label>
        <input type="range" id="sunAngle" min="5" max="85" step="5" value="35">
    </div>

    <div class="stats">FPS: <span id="fps">0</span> | Vertices: <span id="verts">0</span></div>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'opaque' });

        const W = canvas.width, H = canvas.height;
        let waveHeight = 0.8, windDir = 45, waveCount = 5, choppiness = 1.0, sunAngle = 35;

        // Create grid mesh
        const GRID = 256;
        const vertCount = GRID * GRID;
        const indexCount = (GRID - 1) * (GRID - 1) * 6;
        document.getElementById('verts').textContent = vertCount.toLocaleString();

        // Vertices: position (x, z) -- y computed in shader
        const positions = new Float32Array(vertCount * 2);
        for (let z = 0; z < GRID; z++) {
            for (let x = 0; x < GRID; x++) {
                const idx = (z * GRID + x) * 2;
                positions[idx + 0] = (x / (GRID - 1) - 0.5) * 20.0;
                positions[idx + 1] = (z / (GRID - 1) - 0.5) * 20.0;
            }
        }

        // Indices
        const indices = new Uint32Array(indexCount);
        let ii = 0;
        for (let z = 0; z < GRID - 1; z++) {
            for (let x = 0; x < GRID - 1; x++) {
                const tl = z * GRID + x;
                const tr = tl + 1;
                const bl = tl + GRID;
                const br = bl + 1;
                indices[ii++] = tl; indices[ii++] = bl; indices[ii++] = tr;
                indices[ii++] = tr; indices[ii++] = bl; indices[ii++] = br;
            }
        }

        const vertexBuffer = device.createBuffer({ size: positions.byteLength, usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST });
        device.queue.writeBuffer(vertexBuffer, 0, positions);

        const indexBuffer = device.createBuffer({ size: indices.byteLength, usage: GPUBufferUsage.INDEX | GPUBufferUsage.COPY_DST });
        device.queue.writeBuffer(indexBuffer, 0, indices);

        // Uniform buffer: larger for wave params
        const uniformBuffer = device.createBuffer({ size: 256, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        const shaderCode = `
            struct Uniforms {
                viewProj: mat4x4f,
                time: f32,
                waveHeight: f32,
                windDirX: f32,
                windDirZ: f32,
                waveCount: u32,
                choppiness: f32,
                sunDirX: f32,
                sunDirY: f32,
                sunDirZ: f32,
                camPosX: f32,
                camPosY: f32,
                camPosZ: f32,
            }

            @group(0) @binding(0) var<uniform> u: Uniforms;

            struct VSOut {
                @builtin(position) pos: vec4f,
                @location(0) worldPos: vec3f,
                @location(1) normal: vec3f,
                @location(2) viewDir: vec3f,
            }

            // Gerstner wave displacement
            fn gerstnerWave(pos: vec2f, dir: vec2f, steepness: f32, wavelength: f32, t: f32) -> vec3f {
                let k = 6.28318 / wavelength;
                let c = sqrt(9.8 / k);
                let d = normalize(dir);
                let f = k * (dot(d, pos) - c * t);
                let a = steepness / k;
                return vec3f(d.x * a * cos(f), a * sin(f), d.y * a * cos(f));
            }

            @vertex fn vs(@location(0) gridPos: vec2f) -> VSOut {
                let t = u.time;
                var p = vec3f(gridPos.x, 0.0, gridPos.y);

                // Wave directions - spread around wind direction
                let windDir = vec2f(u.windDirX, u.windDirZ);
                let wc = u.waveCount;
                let height = u.waveHeight;
                let chop = u.choppiness;

                // Sum of Gerstner waves with varying parameters
                var totalDisp = vec3f(0.0);

                // Wave 1: dominant
                if (wc >= 1u) {
                    totalDisp += gerstnerWave(gridPos, windDir, chop * 0.3 * height, 8.0, t);
                }
                // Wave 2
                if (wc >= 2u) {
                    let d2 = vec2f(windDir.x * 0.866 + windDir.y * 0.5, -windDir.x * 0.5 + windDir.y * 0.866);
                    totalDisp += gerstnerWave(gridPos, d2, chop * 0.25 * height, 5.0, t * 1.1);
                }
                // Wave 3
                if (wc >= 3u) {
                    let d3 = vec2f(windDir.x * 0.866 - windDir.y * 0.5, windDir.x * 0.5 + windDir.y * 0.866);
                    totalDisp += gerstnerWave(gridPos, d3, chop * 0.2 * height, 3.5, t * 0.9);
                }
                // Wave 4
                if (wc >= 4u) {
                    totalDisp += gerstnerWave(gridPos, -windDir * 0.7 + vec2f(0.3, -0.3), chop * 0.15 * height, 2.5, t * 1.3);
                }
                // Wave 5
                if (wc >= 5u) {
                    let d5 = normalize(windDir + vec2f(0.5, 0.3));
                    totalDisp += gerstnerWave(gridPos, d5, chop * 0.12 * height, 1.8, t * 1.5);
                }
                // Wave 6
                if (wc >= 6u) {
                    let d6 = normalize(windDir + vec2f(-0.4, 0.6));
                    totalDisp += gerstnerWave(gridPos, d6, chop * 0.1 * height, 1.2, t * 1.7);
                }
                // Wave 7
                if (wc >= 7u) {
                    totalDisp += gerstnerWave(gridPos, normalize(vec2f(0.8, -0.6)), chop * 0.08 * height, 0.8, t * 2.0);
                }
                // Wave 8
                if (wc >= 8u) {
                    totalDisp += gerstnerWave(gridPos, normalize(vec2f(-0.3, 0.9)), chop * 0.06 * height, 0.6, t * 2.3);
                }

                p += totalDisp;

                // Compute normal using finite differences
                let eps = 0.1;
                var pX = vec3f(gridPos.x + eps, 0.0, gridPos.y);
                var pZ = vec3f(gridPos.x, 0.0, gridPos.y + eps);

                var dX = vec3f(0.0);
                var dZ = vec3f(0.0);
                if (wc >= 1u) {
                    dX += gerstnerWave(vec2f(gridPos.x + eps, gridPos.y), windDir, chop * 0.3 * height, 8.0, t);
                    dZ += gerstnerWave(vec2f(gridPos.x, gridPos.y + eps), windDir, chop * 0.3 * height, 8.0, t);
                }
                if (wc >= 2u) {
                    let d2 = vec2f(windDir.x * 0.866 + windDir.y * 0.5, -windDir.x * 0.5 + windDir.y * 0.866);
                    dX += gerstnerWave(vec2f(gridPos.x + eps, gridPos.y), d2, chop * 0.25 * height, 5.0, t * 1.1);
                    dZ += gerstnerWave(vec2f(gridPos.x, gridPos.y + eps), d2, chop * 0.25 * height, 5.0, t * 1.1);
                }
                if (wc >= 3u) {
                    let d3 = vec2f(windDir.x * 0.866 - windDir.y * 0.5, windDir.x * 0.5 + windDir.y * 0.866);
                    dX += gerstnerWave(vec2f(gridPos.x + eps, gridPos.y), d3, chop * 0.2 * height, 3.5, t * 0.9);
                    dZ += gerstnerWave(vec2f(gridPos.x, gridPos.y + eps), d3, chop * 0.2 * height, 3.5, t * 0.9);
                }

                pX += dX;
                pZ += dZ;

                let tangent = normalize(pX - p);
                let bitangent = normalize(pZ - p);
                let normal = normalize(cross(bitangent, tangent));

                let camPos = vec3f(u.camPosX, u.camPosY, u.camPosZ);
                let viewDir = normalize(camPos - p);

                var out: VSOut;
                out.pos = u.viewProj * vec4f(p, 1.0);
                out.worldPos = p;
                out.normal = normal;
                out.viewDir = viewDir;
                return out;
            }

            @fragment fn fs(inp: VSOut) -> @location(0) vec4f {
                let normal = normalize(inp.normal);
                let viewDir = normalize(inp.viewDir);
                let sunDir = normalize(vec3f(u.sunDirX, u.sunDirY, u.sunDirZ));

                // Deep ocean color
                let deepColor = vec3f(0.01, 0.05, 0.12);
                let shallowColor = vec3f(0.02, 0.18, 0.25);

                // Subsurface scattering approximation
                let NdotV = max(dot(normal, viewDir), 0.0);
                let sss = pow(1.0 - NdotV, 3.0);
                let sssColor = vec3f(0.0, 0.4, 0.3) * sss * 0.3;

                // Diffuse (Lambert)
                let NdotL = max(dot(normal, sunDir), 0.0);
                let diffuse = NdotL * 0.4;

                // Specular (Blinn-Phong)
                let halfDir = normalize(sunDir + viewDir);
                let NdotH = max(dot(normal, halfDir), 0.0);
                let specular = pow(NdotH, 256.0) * 2.0;

                // Fresnel
                let fresnel = pow(1.0 - NdotV, 5.0);
                let skyColor = vec3f(0.3, 0.5, 0.7);
                let reflectColor = mix(skyColor * 0.3, skyColor, fresnel);

                // Water base color
                let baseColor = mix(deepColor, shallowColor, NdotV * 0.5);

                // Foam on peaks (where y displacement is high)
                let foamFactor = smoothstep(0.3 * u.waveHeight, 0.6 * u.waveHeight, inp.worldPos.y);
                let foamColor = vec3f(0.8, 0.85, 0.9);

                // Compose
                var col = baseColor + reflectColor * fresnel * 0.5;
                col += vec3f(1.0, 0.95, 0.8) * specular;
                col += vec3f(1.0, 0.9, 0.7) * diffuse * 0.2;
                col += sssColor;
                col = mix(col, foamColor, foamFactor * 0.6);

                // Sun reflection on water
                let sunReflect = pow(max(dot(reflect(-sunDir, normal), viewDir), 0.0), 128.0);
                col += vec3f(1.0, 0.9, 0.7) * sunReflect * 0.8;

                // Distance fog (horizon)
                let dist = length(inp.worldPos - vec3f(u.camPosX, u.camPosY, u.camPosZ));
                let fogColor = vec3f(0.5, 0.6, 0.75);
                let fogFactor = 1.0 - exp(-dist * 0.04);
                col = mix(col, fogColor, fogFactor);

                // Gamma
                col = pow(clamp(col, vec3f(0.0), vec3f(1.0)), vec3f(1.0 / 2.2));

                return vec4f(col, 1.0);
            }
        `;

        const shaderModule = device.createShaderModule({ code: shaderCode });

        const depthTexture = device.createTexture({
            size: [W, H], format: 'depth24plus',
            usage: GPUTextureUsage.RENDER_ATTACHMENT,
        });

        const pipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: {
                module: shaderModule,
                entryPoint: 'vs',
                buffers: [{
                    arrayStride: 8,
                    attributes: [{ shaderLocation: 0, offset: 0, format: 'float32x2' }],
                }],
            },
            fragment: {
                module: shaderModule,
                entryPoint: 'fs',
                targets: [{ format }],
            },
            primitive: {
                topology: 'triangle-list',
                cullMode: 'none',
            },
            depthStencil: {
                depthWriteEnabled: true,
                depthCompare: 'less',
                format: 'depth24plus',
            },
        });

        const bindGroup = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [{ binding: 0, resource: { buffer: uniformBuffer } }],
        });

        // Matrix math utilities
        function mat4Perspective(fov, aspect, near, far) {
            const f = 1.0 / Math.tan(fov / 2);
            const nf = 1 / (near - far);
            return new Float32Array([
                f / aspect, 0, 0, 0,
                0, f, 0, 0,
                0, 0, (far + near) * nf, -1,
                0, 0, 2 * far * near * nf, 0
            ]);
        }

        function mat4LookAt(eye, center, up) {
            const zx = eye[0] - center[0], zy = eye[1] - center[1], zz = eye[2] - center[2];
            let len = Math.sqrt(zx * zx + zy * zy + zz * zz);
            const fz = [zx / len, zy / len, zz / len];
            const sx = up[1] * fz[2] - up[2] * fz[1];
            const sy = up[2] * fz[0] - up[0] * fz[2];
            const sz = up[0] * fz[1] - up[1] * fz[0];
            len = Math.sqrt(sx * sx + sy * sy + sz * sz);
            const fs = [sx / len, sy / len, sz / len];
            const ux = fz[1] * fs[2] - fz[2] * fs[1];
            const uy = fz[2] * fs[0] - fz[0] * fs[2];
            const uz = fz[0] * fs[1] - fz[1] * fs[0];
            return new Float32Array([
                fs[0], ux, fz[0], 0,
                fs[1], uy, fz[1], 0,
                fs[2], uz, fz[2], 0,
                -(fs[0] * eye[0] + fs[1] * eye[1] + fs[2] * eye[2]),
                -(ux * eye[0] + uy * eye[1] + uz * eye[2]),
                -(fz[0] * eye[0] + fz[1] * eye[1] + fz[2] * eye[2]),
                1
            ]);
        }

        function mat4Multiply(a, b) {
            const out = new Float32Array(16);
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    out[j * 4 + i] = a[i] * b[j * 4] + a[4 + i] * b[j * 4 + 1] + a[8 + i] * b[j * 4 + 2] + a[12 + i] * b[j * 4 + 3];
                }
            }
            return out;
        }

        let fpsC = 0, fpsT = performance.now(), startTime = performance.now();

        function frame() {
            requestAnimationFrame(frame);
            const now = performance.now();
            fpsC++;
            if (now - fpsT > 500) {
                document.getElementById('fps').textContent = Math.round(fpsC / ((now - fpsT) / 1000));
                fpsC = 0; fpsT = now;
            }

            const time = (now - startTime) * 0.001;

            // Camera orbiting
            const camR = 12;
            const camAngle = time * 0.15;
            const camX = Math.sin(camAngle) * camR;
            const camZ = Math.cos(camAngle) * camR;
            const camY = 4.0 + Math.sin(time * 0.3) * 1.0;
            const eye = [camX, camY, camZ];
            const center = [0, 0, 0];
            const up = [0, 1, 0];

            const proj = mat4Perspective(Math.PI / 3, W / H, 0.1, 100);
            const view = mat4LookAt(eye, center, up);
            const viewProj = mat4Multiply(proj, view);

            // Wind direction
            const windRad = windDir * Math.PI / 180;
            const windDX = Math.cos(windRad);
            const windDZ = Math.sin(windRad);

            // Sun direction
            const sunRad = sunAngle * Math.PI / 180;
            const sunDirX = 0.5;
            const sunDirY = Math.sin(sunRad);
            const sunDirZ = 0.5;
            const sunLen = Math.sqrt(sunDirX * sunDirX + sunDirY * sunDirY + sunDirZ * sunDirZ);

            // Pack uniforms
            const buf = new ArrayBuffer(256);
            const f32 = new Float32Array(buf);
            const u32 = new Uint32Array(buf);

            // mat4x4f at offset 0 (16 floats)
            f32.set(viewProj, 0);
            // Scalars at offset 64 bytes = 16 floats
            f32[16] = time;
            f32[17] = waveHeight;
            f32[18] = windDX;
            f32[19] = windDZ;
            u32[20] = waveCount;
            f32[21] = choppiness;
            f32[22] = sunDirX / sunLen;
            f32[23] = sunDirY / sunLen;
            f32[24] = sunDirZ / sunLen;
            f32[25] = camX;
            f32[26] = camY;
            f32[27] = camZ;

            device.queue.writeBuffer(uniformBuffer, 0, buf);

            const encoder = device.createCommandEncoder();
            const rp = encoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    loadOp: 'clear',
                    storeOp: 'store',
                    clearValue: { r: 0.4, g: 0.55, b: 0.7, a: 1.0 }, // Sky blue
                }],
                depthStencilAttachment: {
                    view: depthTexture.createView(),
                    depthClearValue: 1.0,
                    depthLoadOp: 'clear',
                    depthStoreOp: 'store',
                },
            });
            rp.setPipeline(pipeline);
            rp.setBindGroup(0, bindGroup);
            rp.setVertexBuffer(0, vertexBuffer);
            rp.setIndexBuffer(indexBuffer, 'uint32');
            rp.drawIndexed(indexCount);
            rp.end();

            device.queue.submit([encoder.finish()]);
        }

        document.getElementById('waveHeight').oninput = e => { waveHeight = +e.target.value; document.getElementById('heightVal').textContent = waveHeight.toFixed(1); };
        document.getElementById('windDir').oninput = e => { windDir = +e.target.value; document.getElementById('windVal').textContent = windDir; };
        document.getElementById('waveCount').oninput = e => { waveCount = +e.target.value; document.getElementById('waveCountVal').textContent = waveCount; };
        document.getElementById('choppiness').oninput = e => { choppiness = +e.target.value; document.getElementById('chopVal').textContent = choppiness.toFixed(1); };
        document.getElementById('sunAngle').oninput = e => { sunAngle = +e.target.value; document.getElementById('sunVal').textContent = sunAngle; };

        requestAnimationFrame(frame);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
