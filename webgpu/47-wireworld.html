<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireworld Electronic Circuits - WebGPU - CCAB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6,182,212,0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6,182,212,0.4); }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); padding: 15px; border-radius: 10px; z-index: 100; font-size: 12px; min-width: 240px; border: 1px solid rgba(6,182,212,0.15); max-height: 90vh; overflow-y: auto; }
        .controls h3 { color: #22d3ee; margin-bottom: 8px; font-size: 14px; }
        .controls label { display: block; margin: 8px 0 3px; color: #94a3b8; font-size: 11px; }
        .controls input[type=range] { width: 100%; height: 4px; -webkit-appearance: none; background: #1e293b; border-radius: 2px; outline: none; }
        .controls input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #22d3ee; border-radius: 50%; cursor: pointer; }
        .controls .val { float: right; color: #22d3ee; }
        .controls select { width: 100%; padding: 6px; background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-radius: 4px; margin-top: 4px; font-size: 12px; }
        .btn-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .btn { padding: 6px 12px; background: rgba(6,182,212,0.2); color: #22d3ee; border: 1px solid rgba(6,182,212,0.3); border-radius: 5px; cursor: pointer; font-size: 11px; }
        .btn:hover { background: rgba(6,182,212,0.4); }
        .legend { margin-top: 12px; padding-top: 8px; border-top: 1px solid rgba(6,182,212,0.15); }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 11px; color: #94a3b8; }
        .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; color: #94a3b8; }
        .stats span { color: #22d3ee; }
        .info { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 11px; color: #64748b; max-width: 280px; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(239,68,68,0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <div class="controls">
        <h3>Wireworld Circuits</h3>
        <label>Circuit Preset</label>
        <select id="preset">
            <option value="signal">Signal Wire</option>
            <option value="clock">Clock Generator</option>
            <option value="and">AND Gate</option>
            <option value="or">OR Gate</option>
            <option value="xor" selected>XOR Gate</option>
            <option value="diode">Diode</option>
            <option value="adder">Full Adder</option>
        </select>
        <label>Speed <span class="val" id="speedVal">10</span> steps/s</label>
        <input type="range" id="speed" min="1" max="60" step="1" value="10">
        <label>Zoom <span class="val" id="zoomVal">4</span>x</label>
        <input type="range" id="zoom" min="1" max="16" step="1" value="4">
        <div class="btn-row">
            <button class="btn" id="playBtn">Pause</button>
            <button class="btn" id="stepBtn">Step</button>
            <button class="btn" id="clearBtn">Clear</button>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="legend-swatch" style="background:#111"></div> Empty</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#e89a2e"></div> Conductor</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#3bf"></div> Electron Head</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#234"></div> Electron Tail</div>
        </div>
    </div>
    <div class="stats">
        Step: <span id="stepCount">0</span> | FPS: <span id="fps">0</span>
    </div>
    <div class="info">Click to draw conductors. Right-click to place electron heads. Middle-click to erase.</div>
    <canvas id="canvas"></canvas>
    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();

        const GRID = 512;

        function resize() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
            context.configure({ device, format, alphaMode: 'opaque' });
        }
        resize();
        window.addEventListener('resize', resize);

        // State: 0=empty, 1=conductor, 2=electron head, 3=electron tail
        const gridData = new Uint32Array(GRID * GRID);

        const gridBufA = device.createBuffer({ size: GRID * GRID * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        const gridBufB = device.createBuffer({ size: GRID * GRID * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        const uniformBuf = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        // Compute: Wireworld rules
        const computeModule = device.createShaderModule({ code: `
            @group(0) @binding(0) var<storage, read> gridIn: array<u32>;
            @group(0) @binding(1) var<storage, read_write> gridOut: array<u32>;
            @group(0) @binding(2) var<uniform> params: vec4u; // width, height, pad, pad

            @compute @workgroup_size(16, 16)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let x = gid.x;
                let y = gid.y;
                let w = params.x;
                let h = params.y;
                if (x >= w || y >= h) { return; }

                let idx = y * w + x;
                let state = gridIn[idx];

                if (state == 0u) {
                    // Empty stays empty
                    gridOut[idx] = 0u;
                } else if (state == 2u) {
                    // Head -> Tail
                    gridOut[idx] = 3u;
                } else if (state == 3u) {
                    // Tail -> Conductor
                    gridOut[idx] = 1u;
                } else if (state == 1u) {
                    // Conductor -> Head if exactly 1 or 2 neighbor heads
                    var headCount = 0u;
                    for (var dy = -1; dy <= 1; dy++) {
                        for (var dx = -1; dx <= 1; dx++) {
                            if (dx == 0 && dy == 0) { continue; }
                            let nx = i32(x) + dx;
                            let ny = i32(y) + dy;
                            if (nx >= 0 && nx < i32(w) && ny >= 0 && ny < i32(h)) {
                                if (gridIn[u32(ny) * w + u32(nx)] == 2u) {
                                    headCount++;
                                }
                            }
                        }
                    }
                    if (headCount == 1u || headCount == 2u) {
                        gridOut[idx] = 2u;
                    } else {
                        gridOut[idx] = 1u;
                    }
                }
            }
        `});

        // Render: fullscreen quad with grid visualization
        const renderModule = device.createShaderModule({ code: `
            struct Uniforms { width: u32, height: u32, canvasW: u32, canvasH: u32, offsetX: f32, offsetY: f32, zoom: f32, pad: f32 }

            @group(0) @binding(0) var<storage, read> grid: array<u32>;
            @group(0) @binding(1) var<uniform> u: Uniforms;

            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }

            @vertex
            fn vs(@builtin(vertex_index) vi: u32) -> VSOut {
                var pos = array<vec2f, 4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var uv = array<vec2f, 4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var out: VSOut;
                out.pos = vec4f(pos[vi], 0, 1);
                out.uv = uv[vi];
                return out;
            }

            @fragment
            fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                let aspect = f32(u.canvasW) / f32(u.canvasH);
                let gridAspect = f32(u.width) / f32(u.height);

                // Map UV to grid coordinates with zoom and pan
                let cellSize = u.zoom;
                let viewW = f32(u.canvasW) / cellSize;
                let viewH = f32(u.canvasH) / cellSize;

                let gx = uv.x * viewW + u.offsetX;
                let gy = uv.y * viewH + u.offsetY;

                let ix = i32(floor(gx));
                let iy = i32(floor(gy));

                if (ix < 0 || ix >= i32(u.width) || iy < 0 || iy >= i32(u.height)) {
                    return vec4f(0.03, 0.03, 0.06, 1.0);
                }

                let state = grid[u32(iy) * u.width + u32(ix)];

                // Grid lines
                let fx = fract(gx);
                let fy = fract(gy);
                let gridLine = select(1.0, 0.85, fx < 0.06 || fy < 0.06);

                // Colors
                if (state == 0u) {
                    return vec4f(0.04 * gridLine, 0.04 * gridLine, 0.06 * gridLine, 1.0);
                } else if (state == 1u) {
                    // Conductor: warm gold/orange
                    return vec4f(0.91 * gridLine, 0.60 * gridLine, 0.18 * gridLine, 1.0);
                } else if (state == 2u) {
                    // Electron head: bright cyan-blue with glow
                    let glow = 1.0 + 0.3 * sin(fx * 3.14) * sin(fy * 3.14);
                    return vec4f(0.2 * glow, 0.73 * glow, 1.0 * glow, 1.0);
                } else {
                    // Electron tail: dim blue
                    return vec4f(0.1 * gridLine, 0.15 * gridLine, 0.25 * gridLine, 1.0);
                }
            }
        `});

        const computePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: computeModule, entryPoint: 'main' },
        });

        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: renderModule, entryPoint: 'vs' },
            fragment: { module: renderModule, entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-strip' },
        });

        // Bind groups for ping-pong
        const computeBGA = device.createBindGroup({
            layout: computePipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: gridBufA } },
                { binding: 1, resource: { buffer: gridBufB } },
                { binding: 2, resource: { buffer: uniformBuf } },
            ],
        });
        const computeBGB = device.createBindGroup({
            layout: computePipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: gridBufB } },
                { binding: 1, resource: { buffer: gridBufA } },
                { binding: 2, resource: { buffer: uniformBuf } },
            ],
        });

        const renderUniformBuf = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        const renderBGA = device.createBindGroup({
            layout: renderPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: gridBufA } },
                { binding: 1, resource: { buffer: renderUniformBuf } },
            ],
        });
        const renderBGB = device.createBindGroup({
            layout: renderPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: gridBufB } },
                { binding: 1, resource: { buffer: renderUniformBuf } },
            ],
        });

        let pingpong = 0;

        // Circuit presets
        function clearGrid() { gridData.fill(0); }

        function setCell(x, y, state) {
            if (x >= 0 && x < GRID && y >= 0 && y < GRID) gridData[y * GRID + x] = state;
        }
        function drawWire(x0, y0, x1, y1) {
            // Bresenham line for conductor
            let dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
            let sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
            let err = dx - dy;
            while (true) {
                setCell(x0, y0, 1);
                if (x0 === x1 && y0 === y1) break;
                let e2 = 2 * err;
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 < dx) { err += dx; y0 += sy; }
            }
        }
        function drawHLine(x, y, len) { for (let i = 0; i < len; i++) setCell(x + i, y, 1); }
        function drawVLine(x, y, len) { for (let i = 0; i < len; i++) setCell(x, y + i, 1); }

        function loadPreset(name) {
            clearGrid();
            const cx = Math.floor(GRID / 2), cy = Math.floor(GRID / 2);

            if (name === 'signal') {
                // Simple wire with electron signal
                drawHLine(cx - 40, cy, 80);
                setCell(cx - 38, cy, 2); // head
                setCell(cx - 39, cy, 3); // tail
            } else if (name === 'clock') {
                // Clock generator: loop with tail
                const ox = cx - 10, oy = cy - 5;
                // Loop (6-cell period)
                drawHLine(ox, oy, 6);
                drawHLine(ox, oy + 4, 6);
                drawVLine(ox, oy, 5);
                drawVLine(ox + 5, oy, 5);
                // Output wire
                drawHLine(ox + 5, oy + 2, 50);
                // Seed electron
                setCell(ox + 1, oy, 2);
                setCell(ox, oy, 3);
            } else if (name === 'and') {
                // AND gate
                const ox = cx - 30, oy = cy;
                // Input A (top)
                drawHLine(ox, oy - 5, 20);
                setCell(ox + 2, oy - 5, 2);
                setCell(ox + 1, oy - 5, 3);
                // Input B (bottom)
                drawHLine(ox, oy + 5, 20);
                setCell(ox + 2, oy + 5, 2);
                setCell(ox + 1, oy + 5, 3);
                // Converge to single point
                drawWire(ox + 19, oy - 5, ox + 25, oy - 1);
                drawWire(ox + 19, oy + 5, ox + 25, oy + 1);
                // Junction cell (AND behavior: needs 2 heads)
                setCell(ox + 25, oy, 1);
                setCell(ox + 25, oy - 1, 1);
                setCell(ox + 25, oy + 1, 1);
                // Output
                drawHLine(ox + 26, oy, 30);
            } else if (name === 'or') {
                // OR gate: two inputs merge into one wire
                const ox = cx - 30, oy = cy;
                // Input A
                drawHLine(ox, oy - 4, 22);
                setCell(ox + 2, oy - 4, 2);
                setCell(ox + 1, oy - 4, 3);
                // Input B
                drawHLine(ox, oy + 4, 22);
                setCell(ox + 2, oy + 4, 2);
                setCell(ox + 1, oy + 4, 3);
                // Merge
                drawVLine(ox + 21, oy - 4, 9);
                // Output
                drawHLine(ox + 22, oy, 30);
            } else if (name === 'xor') {
                // XOR gate circuit
                const ox = cx - 35, oy = cy;
                // Input A (top)
                drawHLine(ox, oy - 8, 15);
                setCell(ox + 2, oy - 8, 2);
                setCell(ox + 1, oy - 8, 3);
                // Split A
                drawVLine(ox + 14, oy - 8, 5);
                drawVLine(ox + 14, oy - 3, 1);
                drawHLine(ox + 14, oy - 3, 10);
                drawHLine(ox + 14, oy - 8, 10);

                // Input B (bottom)
                drawHLine(ox, oy + 8, 15);
                setCell(ox + 2, oy + 8, 2);
                setCell(ox + 1, oy + 8, 3);
                // Split B
                drawVLine(ox + 14, oy + 4, 5);
                drawHLine(ox + 14, oy + 3, 10);
                drawHLine(ox + 14, oy + 8, 10);

                // Cross connections for XOR logic
                drawWire(ox + 23, oy - 8, ox + 30, oy - 2);
                drawWire(ox + 23, oy + 8, ox + 30, oy + 2);
                drawWire(ox + 23, oy - 3, ox + 30, oy - 1);
                drawWire(ox + 23, oy + 3, ox + 30, oy + 1);

                // Output junction
                setCell(ox + 30, oy, 1);
                drawHLine(ox + 31, oy, 25);
            } else if (name === 'diode') {
                // Diode: allows signal in one direction only
                const ox = cx - 25, oy = cy;
                // Input wire
                drawHLine(ox, oy, 15);
                setCell(ox + 2, oy, 2);
                setCell(ox + 1, oy, 3);
                // Diode structure (fork and merge)
                setCell(ox + 15, oy - 1, 1);
                setCell(ox + 15, oy + 1, 1);
                setCell(ox + 16, oy - 2, 1);
                setCell(ox + 16, oy + 2, 1);
                setCell(ox + 17, oy - 1, 1);
                setCell(ox + 17, oy + 1, 1);
                setCell(ox + 17, oy, 1);
                // Output
                drawHLine(ox + 18, oy, 25);
            } else if (name === 'adder') {
                // Full adder circuit with multiple gates
                const ox = cx - 40, oy = cy - 15;

                // Input A
                drawHLine(ox, oy, 25);
                setCell(ox + 3, oy, 2);
                setCell(ox + 2, oy, 3);

                // Input B
                drawHLine(ox, oy + 10, 25);
                setCell(ox + 3, oy + 10, 2);
                setCell(ox + 2, oy + 10, 3);

                // Carry In
                drawHLine(ox, oy + 20, 25);
                setCell(ox + 3, oy + 20, 2);
                setCell(ox + 2, oy + 20, 3);

                // XOR A,B
                drawWire(ox + 24, oy, ox + 30, oy + 3);
                drawWire(ox + 24, oy + 10, ox + 30, oy + 7);
                setCell(ox + 30, oy + 5, 1);
                drawHLine(ox + 31, oy + 5, 10);

                // XOR result with Cin for Sum
                drawWire(ox + 40, oy + 5, ox + 48, oy + 8);
                drawWire(ox + 24, oy + 20, ox + 48, oy + 12);
                setCell(ox + 48, oy + 10, 1);
                drawHLine(ox + 49, oy + 10, 15);

                // AND A,B for carry
                drawWire(ox + 24, oy, ox + 30, oy + 23);
                drawWire(ox + 24, oy + 10, ox + 30, oy + 27);
                setCell(ox + 30, oy + 25, 1);
                drawHLine(ox + 31, oy + 25, 15);

                // OR for carry out
                drawWire(ox + 45, oy + 25, ox + 55, oy + 20);
                drawHLine(ox + 55, oy + 20, 10);
            }

            uploadGrid();
        }

        function uploadGrid() {
            const buf = pingpong === 0 ? gridBufA : gridBufB;
            device.queue.writeBuffer(buf, 0, gridData);
        }

        // Initial preset
        loadPreset('xor');

        // Upload compute params
        const computeParams = new Uint32Array([GRID, GRID, 0, 0]);
        device.queue.writeBuffer(uniformBuf, 0, computeParams);

        // Controls
        const speedSlider = document.getElementById('speed');
        const zoomSlider = document.getElementById('zoom');
        speedSlider.oninput = () => document.getElementById('speedVal').textContent = speedSlider.value;
        zoomSlider.oninput = () => document.getElementById('zoomVal').textContent = zoomSlider.value;

        document.getElementById('preset').onchange = (e) => { loadPreset(e.target.value); stepCount = 0; };
        document.getElementById('clearBtn').onclick = () => { clearGrid(); uploadGrid(); stepCount = 0; };

        let playing = true;
        document.getElementById('playBtn').onclick = () => {
            playing = !playing;
            document.getElementById('playBtn').textContent = playing ? 'Pause' : 'Play';
        };

        let doStep = false;
        document.getElementById('stepBtn').onclick = () => { doStep = true; };

        // Pan
        let offsetX = GRID / 2 - 50, offsetY = GRID / 2 - 30;
        let dragging = false, lastMX = 0, lastMY = 0;
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 1) { dragging = true; lastMX = e.clientX; lastMY = e.clientY; e.preventDefault(); return; }
            handleDraw(e);
        });
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        canvas.addEventListener('mouseup', (e) => { dragging = false; });
        canvas.addEventListener('mousemove', (e) => {
            if (dragging) {
                const z = parseFloat(zoomSlider.value);
                offsetX -= (e.clientX - lastMX) / z;
                offsetY -= (e.clientY - lastMY) / z;
                lastMX = e.clientX; lastMY = e.clientY;
            }
            if (e.buttons === 1 || e.buttons === 2) handleDraw(e);
        });

        function screenToGrid(mx, my) {
            const z = parseFloat(zoomSlider.value);
            const gx = Math.floor(mx / z + offsetX);
            const gy = Math.floor(my / z + offsetY);
            return [gx, gy];
        }

        function handleDraw(e) {
            const [gx, gy] = screenToGrid(e.clientX, e.clientY);
            if (gx < 0 || gx >= GRID || gy < 0 || gy >= GRID) return;
            if (e.button === 2) {
                // Right click: place electron head
                gridData[gy * GRID + gx] = 2;
            } else if (e.button === 1) {
                return; // middle = pan
            } else {
                // Left click: conductor
                gridData[gy * GRID + gx] = 1;
            }
            uploadGrid();
        }

        // Scroll to zoom
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const z = parseInt(zoomSlider.value);
            const newZ = Math.max(1, Math.min(16, z + (e.deltaY > 0 ? -1 : 1)));
            zoomSlider.value = newZ;
            document.getElementById('zoomVal').textContent = newZ;
        }, { passive: false });

        let stepCount = 0;
        let lastStepTime = 0;
        let frameCount = 0, lastFpsTime = performance.now();

        function frame(timestamp) {
            const stepsPerSec = parseInt(speedSlider.value);
            const stepInterval = 1000 / stepsPerSec;

            let shouldStep = false;
            if (playing && timestamp - lastStepTime >= stepInterval) {
                shouldStep = true;
                lastStepTime = timestamp;
            }
            if (doStep) { shouldStep = true; doStep = false; }

            const encoder = device.createCommandEncoder();

            if (shouldStep) {
                const cp = encoder.beginComputePass();
                cp.setPipeline(computePipeline);
                cp.setBindGroup(0, pingpong === 0 ? computeBGA : computeBGB);
                cp.dispatchWorkgroups(Math.ceil(GRID / 16), Math.ceil(GRID / 16));
                cp.end();
                pingpong = 1 - pingpong;
                stepCount++;

                // Read back to CPU for drawing
                // (We'll just keep gridData synced via the GPU)
            }

            // Update render uniforms
            const z = parseFloat(zoomSlider.value);
            const renderUniforms = new Float32Array([GRID, GRID, canvas.width, canvas.height, offsetX, offsetY, z, 0]);
            // Reinterpret first 4 as u32
            const uintView = new Uint32Array(renderUniforms.buffer);
            uintView[0] = GRID; uintView[1] = GRID; uintView[2] = canvas.width; uintView[3] = canvas.height;
            device.queue.writeBuffer(renderUniformBuf, 0, renderUniforms);

            const rp = encoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    clearValue: { r: 0.03, g: 0.03, b: 0.06, a: 1 },
                    loadOp: 'clear', storeOp: 'store',
                }],
            });
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, pingpong === 0 ? renderBGA : renderBGB);
            rp.draw(4);
            rp.end();

            device.queue.submit([encoder.finish()]);

            document.getElementById('stepCount').textContent = stepCount;
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime > 500) {
                document.getElementById('fps').textContent = Math.round(frameCount / ((now - lastFpsTime) / 1000));
                frameCount = 0; lastFpsTime = now;
            }

            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    </script>
</body>
</html>
