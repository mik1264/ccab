<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Voronoi - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 210px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls select { width: 160px; background: #1a1a2e; color: #e8e6e1; border: 1px solid #22d3ee; border-radius: 4px; padding: 3px; }
        .controls button { padding: 6px 14px; background: rgba(6, 182, 212, 0.3); color: #22d3ee; border: 1px solid #22d3ee; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 5px; }
        .controls button:hover { background: rgba(6, 182, 212, 0.5); }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #22d3ee; font-size: 14px; font-weight: 600; z-index: 100; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); pointer-events: none; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div class="title">Animated Voronoi Diagram</div>

    <div class="controls">
        <label>Seed Count: <span id="seedVal">80</span></label>
        <input type="range" id="seedCount" min="10" max="200" step="5" value="80">
        <label>Speed: <span id="speedVal">1.0</span></label>
        <input type="range" id="speed" min="0" max="3.0" step="0.1" value="1.0">
        <label>Border Width: <span id="borderVal">2.0</span></label>
        <input type="range" id="borderWidth" min="0.5" max="8.0" step="0.5" value="2.0">
        <label>Color Theme:</label>
        <select id="themeSelect">
            <option value="0">Pastel Watercolor</option>
            <option value="1">Cyberpunk Neon</option>
            <option value="2">Earth Tones</option>
            <option value="3">Ocean Blues</option>
        </select>
        <label>Display Mode:</label>
        <select id="modeSelect">
            <option value="0">Cells + Borders</option>
            <option value="1">F2-F1 Distance</option>
            <option value="2">Concentric Rings</option>
            <option value="3">Gradient Field</option>
        </select>
        <button id="lloydBtn">Lloyd Relaxation (1 step)</button>
    </div>

    <div class="stats">FPS: <span id="fps">0</span> | Seeds: <span id="seedsDisplay">80</span></div>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'opaque' });

        const MAX_SEEDS = 200;
        let seedCount = 80, speed = 1.0, borderWidth = 2.0, themeMode = 0, displayMode = 0;

        document.getElementById('seedCount').oninput = e => {
            seedCount = +e.target.value;
            document.getElementById('seedVal').textContent = seedCount;
            document.getElementById('seedsDisplay').textContent = seedCount;
            initSeeds();
        };
        document.getElementById('speed').oninput = e => { speed = +e.target.value; document.getElementById('speedVal').textContent = speed.toFixed(1); };
        document.getElementById('borderWidth').oninput = e => { borderWidth = +e.target.value; document.getElementById('borderVal').textContent = borderWidth.toFixed(1); };
        document.getElementById('themeSelect').onchange = e => { themeMode = +e.target.value; };
        document.getElementById('modeSelect').onchange = e => { displayMode = +e.target.value; };

        // Each seed: x, y, vx, vy, noisePhaseX, noisePhaseY, hue, pad (8 floats)
        const seedData = new Float32Array(MAX_SEEDS * 8);
        const seedBuffer = device.createBuffer({ size: seedData.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });

        function initSeeds() {
            for (let i = 0; i < MAX_SEEDS; i++) {
                const base = i * 8;
                seedData[base + 0] = Math.random(); // x (normalized 0-1)
                seedData[base + 1] = Math.random(); // y
                seedData[base + 2] = (Math.random() - 0.5) * 0.3; // vx
                seedData[base + 3] = (Math.random() - 0.5) * 0.3; // vy
                seedData[base + 4] = Math.random() * Math.PI * 2; // noise phase x
                seedData[base + 5] = Math.random() * Math.PI * 2; // noise phase y
                seedData[base + 6] = i / MAX_SEEDS; // hue
                seedData[base + 7] = 0;
            }
            device.queue.writeBuffer(seedBuffer, 0, seedData);
        }
        initSeeds();

        // Lloyd relaxation
        document.getElementById('lloydBtn').onclick = () => {
            // Compute centroid of each cell by averaging random samples
            const samples = 5000;
            const centroids = new Float32Array(MAX_SEEDS * 2).fill(0);
            const counts = new Uint32Array(MAX_SEEDS).fill(0);
            for (let s = 0; s < samples; s++) {
                const sx = Math.random(), sy = Math.random();
                let minD = 1e10, minI = 0;
                for (let i = 0; i < seedCount; i++) {
                    const dx = sx - seedData[i * 8], dy = sy - seedData[i * 8 + 1];
                    const d = dx * dx + dy * dy;
                    if (d < minD) { minD = d; minI = i; }
                }
                centroids[minI * 2] += sx;
                centroids[minI * 2 + 1] += sy;
                counts[minI]++;
            }
            for (let i = 0; i < seedCount; i++) {
                if (counts[i] > 0) {
                    seedData[i * 8] = centroids[i * 2] / counts[i];
                    seedData[i * 8 + 1] = centroids[i * 2 + 1] / counts[i];
                }
            }
            device.queue.writeBuffer(seedBuffer, 0, seedData);
        };

        // Uniforms
        const uniformData = new Float32Array(12);
        const uniformBuffer = device.createBuffer({ size: 48, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        const shaderCode = `
            struct Uniforms {
                resolution: vec2f,
                time: f32,
                speed: f32,
                borderWidth: f32,
                seedCount: u32,
                themeMode: u32,
                displayMode: u32,
                pad1: f32,
                pad2: f32,
                pad3: f32,
                pad4: f32,
            }

            @group(0) @binding(0) var outTex: texture_storage_2d<rgba8unorm, write>;
            @group(0) @binding(1) var<uniform> u: Uniforms;
            @group(0) @binding(2) var<storage, read> seeds: array<f32>;

            fn hsl2rgb(h: f32, s: f32, l: f32) -> vec3f {
                let c = (1.0 - abs(2.0 * l - 1.0)) * s;
                let x = c * (1.0 - abs((h * 6.0) % 2.0 - 1.0));
                let m = l - c * 0.5;
                var rgb: vec3f;
                let hi = u32(h * 6.0) % 6u;
                if (hi == 0u) { rgb = vec3f(c, x, 0.0); }
                else if (hi == 1u) { rgb = vec3f(x, c, 0.0); }
                else if (hi == 2u) { rgb = vec3f(0.0, c, x); }
                else if (hi == 3u) { rgb = vec3f(0.0, x, c); }
                else if (hi == 4u) { rgb = vec3f(x, 0.0, c); }
                else { rgb = vec3f(c, 0.0, x); }
                return rgb + vec3f(m);
            }

            fn getCellColor(seedIdx: u32) -> vec3f {
                let hue = seeds[seedIdx * 8u + 6u];
                if (u.themeMode == 0u) {
                    // Pastel watercolor
                    return hsl2rgb(hue, 0.5, 0.75);
                } else if (u.themeMode == 1u) {
                    // Cyberpunk neon
                    return hsl2rgb(fract(hue * 3.0), 1.0, 0.55);
                } else if (u.themeMode == 2u) {
                    // Earth tones
                    let h = fract(hue * 0.15 + 0.06);
                    return hsl2rgb(h, 0.45, 0.45);
                } else {
                    // Ocean blues
                    let h = fract(hue * 0.2 + 0.55);
                    return hsl2rgb(h, 0.7, 0.5);
                }
            }

            @compute @workgroup_size(8, 8)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let x = gid.x;
                let y = gid.y;
                if (x >= u32(u.resolution.x) || y >= u32(u.resolution.y)) { return; }

                let uv = vec2f(f32(x), f32(y)) / u.resolution;
                let aspect = u.resolution.x / u.resolution.y;

                // Find F1 (nearest) and F2 (second nearest) distances
                var f1Dist: f32 = 1e10;
                var f2Dist: f32 = 1e10;
                var f1Idx: u32 = 0u;

                for (var i = 0u; i < u.seedCount; i++) {
                    let base = i * 8u;
                    let sx = seeds[base + 0u];
                    let sy = seeds[base + 1u];
                    let dx = (uv.x - sx) * aspect;
                    let dy = uv.y - sy;
                    let d = dx * dx + dy * dy;
                    if (d < f1Dist) {
                        f2Dist = f1Dist;
                        f1Dist = d;
                        f1Idx = i;
                    } else if (d < f2Dist) {
                        f2Dist = d;
                    }
                }

                let f1 = sqrt(f1Dist);
                let f2 = sqrt(f2Dist);
                let border = f2 - f1;
                let bw = u.borderWidth / max(u.resolution.x, u.resolution.y);

                var col: vec3f;

                if (u.displayMode == 0u) {
                    // Cells + borders
                    col = getCellColor(f1Idx);
                    // Smooth border
                    let borderFade = smoothstep(0.0, bw, border);
                    let borderColor = vec3f(0.1, 0.1, 0.15);
                    if (u.themeMode == 1u) {
                        col = mix(vec3f(1.0, 1.0, 1.0), col, borderFade);
                    } else {
                        col = mix(borderColor, col, borderFade);
                    }
                    // Slight gradient within cell
                    col *= (0.85 + 0.15 * smoothstep(0.0, 0.08, f1));
                } else if (u.displayMode == 1u) {
                    // F2-F1 distance field
                    let norm = border / 0.15;
                    col = getCellColor(f1Idx) * norm;
                    // Bright border glow
                    let glow = exp(-border * border / (bw * bw * 4.0));
                    if (u.themeMode == 1u) {
                        col += vec3f(0.0, 1.0, 0.8) * glow;
                    } else {
                        col += vec3f(0.8, 0.9, 1.0) * glow;
                    }
                } else if (u.displayMode == 2u) {
                    // Concentric rings
                    let ring = sin(f1 * 150.0) * 0.5 + 0.5;
                    col = getCellColor(f1Idx) * (0.3 + 0.7 * ring);
                    let borderFade = smoothstep(0.0, bw, border);
                    col = mix(vec3f(0.0), col, borderFade);
                } else {
                    // Gradient field
                    col = getCellColor(f1Idx);
                    let grad = f1 * 8.0;
                    col *= smoothstep(0.0, 0.5, grad);
                    let borderFade = smoothstep(0.0, bw * 2.0, border);
                    let borderGlow = (1.0 - borderFade) * 0.6;
                    col = mix(col, vec3f(1.0), borderGlow);
                }

                col = clamp(col, vec3f(0.0), vec3f(1.0));
                textureStore(outTex, vec2u(x, y), vec4f(col, 1.0));
            }
        `;

        const shaderModule = device.createShaderModule({ code: shaderCode });
        const texW = canvas.width, texH = canvas.height;
        const outTexture = device.createTexture({
            size: [texW, texH], format: 'rgba8unorm',
            usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING,
        });

        const bindGroupLayout = device.createBindGroupLayout({
            entries: [
                { binding: 0, visibility: GPUShaderStage.COMPUTE, storageTexture: { access: 'write-only', format: 'rgba8unorm', viewDimension: '2d' } },
                { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
                { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
            ],
        });
        const pipeline = device.createComputePipeline({
            layout: device.createPipelineLayout({ bindGroupLayouts: [bindGroupLayout] }),
            compute: { module: shaderModule, entryPoint: 'main' },
        });
        const bindGroup = device.createBindGroup({
            layout: bindGroupLayout,
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: { buffer: uniformBuffer } },
                { binding: 2, resource: { buffer: seedBuffer } },
            ],
        });

        // Blit pipeline
        const blitShader = device.createShaderModule({ code: `
            @group(0) @binding(0) var tex: texture_2d<f32>;
            @group(0) @binding(1) var samp: sampler;
            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VSOut {
                var pos = array<vec2f, 6>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(-1,1), vec2f(1,-1), vec2f(1,1));
                var out: VSOut;
                out.pos = vec4f(pos[i], 0, 1);
                out.uv = pos[i] * 0.5 + 0.5;
                out.uv.y = 1.0 - out.uv.y;
                return out;
            }
            @fragment fn fs(inp: VSOut) -> @location(0) vec4f {
                return textureSample(tex, samp, inp.uv);
            }
        `});
        const blitBGL = device.createBindGroupLayout({
            entries: [
                { binding: 0, visibility: GPUShaderStage.FRAGMENT, texture: { sampleType: 'float' } },
                { binding: 1, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
            ],
        });
        const blitPipeline = device.createRenderPipeline({
            layout: device.createPipelineLayout({ bindGroupLayouts: [blitBGL] }),
            vertex: { module: blitShader, entryPoint: 'vs' },
            fragment: { module: blitShader, entryPoint: 'fs', targets: [{ format }] },
        });
        const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });
        const blitBG = device.createBindGroup({
            layout: blitBGL,
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: sampler },
            ],
        });

        let frameCount = 0, lastFPSTime = performance.now();

        function updateSeeds(dt) {
            const t = performance.now() / 1000;
            for (let i = 0; i < seedCount; i++) {
                const base = i * 8;
                const phaseX = seedData[base + 4];
                const phaseY = seedData[base + 5];
                // Smooth Perlin-like motion via sin combinations
                const vx = Math.sin(t * 0.3 * speed + phaseX) * 0.15 + Math.sin(t * 0.7 * speed + phaseX * 2.3) * 0.08;
                const vy = Math.cos(t * 0.4 * speed + phaseY) * 0.15 + Math.cos(t * 0.6 * speed + phaseY * 1.7) * 0.08;
                let x = seedData[base] + vx * dt * speed;
                let y = seedData[base + 1] + vy * dt * speed;
                // Bounce off edges
                if (x < 0) x = -x;
                if (x > 1) x = 2 - x;
                if (y < 0) y = -y;
                if (y > 1) y = 2 - y;
                seedData[base] = Math.max(0, Math.min(1, x));
                seedData[base + 1] = Math.max(0, Math.min(1, y));
            }
            device.queue.writeBuffer(seedBuffer, 0, seedData);
        }

        let lastTime = 0;
        function frame(time) {
            const now = performance.now();
            const dt = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;
            frameCount++;
            if (now - lastFPSTime > 500) {
                document.getElementById('fps').textContent = Math.round(frameCount / ((now - lastFPSTime) / 1000));
                frameCount = 0; lastFPSTime = now;
            }

            updateSeeds(dt);

            uniformData[0] = texW;
            uniformData[1] = texH;
            uniformData[2] = time / 1000;
            uniformData[3] = speed;
            uniformData[4] = borderWidth;
            const uintView = new Uint32Array(uniformData.buffer);
            uintView[5] = seedCount;
            uintView[6] = themeMode;
            uintView[7] = displayMode;
            device.queue.writeBuffer(uniformBuffer, 0, uniformData);

            const encoder = device.createCommandEncoder();
            const computePass = encoder.beginComputePass();
            computePass.setPipeline(pipeline);
            computePass.setBindGroup(0, bindGroup);
            computePass.dispatchWorkgroups(Math.ceil(texW / 8), Math.ceil(texH / 8));
            computePass.end();

            const renderPass = encoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    loadOp: 'clear', storeOp: 'store', clearValue: { r: 0, g: 0, b: 0, a: 1 },
                }],
            });
            renderPass.setPipeline(blitPipeline);
            renderPass.setBindGroup(0, blitBG);
            renderPass.draw(6);
            renderPass.end();
            device.queue.submit([encoder.finish()]);
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    </script>
</body>
</html>
