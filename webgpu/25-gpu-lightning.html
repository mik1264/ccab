<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Lightning Bolt - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls select { width: 160px; background: #1a1a2e; color: #e8e6e1; border: 1px solid #22d3ee; border-radius: 4px; padding: 3px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #22d3ee; font-size: 14px; font-weight: 600; z-index: 100; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); pointer-events: none; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div class="title">GPU Lightning Storm</div>

    <div class="controls">
        <label>Bolt Count: <span id="boltVal">5</span></label>
        <input type="range" id="boltCount" min="1" max="12" step="1" value="5">
        <label>Branch Prob: <span id="branchVal">0.35</span></label>
        <input type="range" id="branchProb" min="0" max="0.7" step="0.05" value="0.35">
        <label>Flash Rate: <span id="rateVal">1.5</span>s</label>
        <input type="range" id="flashRate" min="0.3" max="4" step="0.1" value="1.5">
        <label>Glow Width: <span id="glowVal">3.0</span></label>
        <input type="range" id="glowWidth" min="1" max="8" step="0.5" value="3.0">
        <label>Color:</label>
        <select id="colorSelect">
            <option value="0">Blue-White</option>
            <option value="1">Purple-Pink</option>
            <option value="2">Green</option>
            <option value="3">Red-Orange</option>
        </select>
    </div>

    <div class="stats">FPS: <span id="fps">0</span> | Bolts: <span id="activeBolts">0</span></div>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'opaque' });

        // Controls
        let boltCount = 5, branchProb = 0.35, flashRate = 1.5, glowWidth = 3.0, colorMode = 0;
        document.getElementById('boltCount').oninput = e => { boltCount = +e.target.value; document.getElementById('boltVal').textContent = boltCount; };
        document.getElementById('branchProb').oninput = e => { branchProb = +e.target.value; document.getElementById('branchVal').textContent = branchProb.toFixed(2); };
        document.getElementById('flashRate').oninput = e => { flashRate = +e.target.value; document.getElementById('rateVal').textContent = flashRate.toFixed(1); };
        document.getElementById('glowWidth').oninput = e => { glowWidth = +e.target.value; document.getElementById('glowVal').textContent = glowWidth.toFixed(1); };
        document.getElementById('colorSelect').onchange = e => { colorMode = +e.target.value; };

        // Max segments per bolt (main + branches)
        const MAX_SEGMENTS = 512;
        const MAX_BOLTS = 24;
        const SEGMENT_STRIDE = 4; // x1,y1,x2,y2 per segment (floats)
        const BOLT_HEADER = 4; // numSegments, brightness, pad, pad
        const BOLT_SIZE = BOLT_HEADER + MAX_SEGMENTS * SEGMENT_STRIDE;

        // Bolt data buffer (CPU side, uploaded each frame)
        const boltData = new Float32Array(MAX_BOLTS * BOLT_SIZE);
        const boltBuffer = device.createBuffer({ size: boltData.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });

        // Uniforms: resolution, time, glowWidth, colorMode, boltCount, pad
        const uniformData = new Float32Array(8);
        const uniformBuffer = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        const shaderCode = `
            struct Uniforms {
                resolution: vec2f,
                time: f32,
                glowWidth: f32,
                colorMode: u32,
                boltCount: u32,
                pad1: f32,
                pad2: f32,
            }

            @group(0) @binding(0) var outTex: texture_storage_2d<rgba8unorm, write>;
            @group(0) @binding(1) var<uniform> u: Uniforms;
            @group(0) @binding(2) var<storage, read> bolts: array<f32>;

            fn hash(p: vec2f) -> f32 {
                let h = dot(p, vec2f(127.1, 311.7));
                return fract(sin(h) * 43758.5453);
            }

            fn cloudNoise(uv: vec2f) -> f32 {
                let i = floor(uv);
                let f = fract(uv);
                let a = hash(i);
                let b = hash(i + vec2f(1.0, 0.0));
                let c = hash(i + vec2f(0.0, 1.0));
                let d = hash(i + vec2f(1.0, 1.0));
                let ff = f * f * (3.0 - 2.0 * f);
                return mix(mix(a, b, ff.x), mix(c, d, ff.x), ff.y);
            }

            fn fbmCloud(p: vec2f) -> f32 {
                var v: f32 = 0.0;
                var a: f32 = 0.5;
                var pp = p;
                for (var i = 0; i < 5; i++) {
                    v += a * cloudNoise(pp);
                    pp *= 2.0;
                    a *= 0.5;
                }
                return v;
            }

            fn distToSegment(p: vec2f, a: vec2f, b: vec2f) -> f32 {
                let pa = p - a;
                let ba = b - a;
                let h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
                return length(pa - ba * h);
            }

            fn getColor(brightness: f32) -> vec3f {
                if (u.colorMode == 0u) {
                    // Blue-white
                    let core = vec3f(0.85, 0.92, 1.0);
                    let glow = vec3f(0.2, 0.4, 1.0);
                    return mix(glow, core, brightness);
                } else if (u.colorMode == 1u) {
                    // Purple-pink
                    let core = vec3f(1.0, 0.85, 1.0);
                    let glow = vec3f(0.6, 0.1, 0.8);
                    return mix(glow, core, brightness);
                } else if (u.colorMode == 2u) {
                    // Green
                    let core = vec3f(0.85, 1.0, 0.9);
                    let glow = vec3f(0.0, 0.8, 0.3);
                    return mix(glow, core, brightness);
                } else {
                    // Red-orange
                    let core = vec3f(1.0, 0.95, 0.85);
                    let glow = vec3f(1.0, 0.3, 0.05);
                    return mix(glow, core, brightness);
                }
            }

            const BOLT_SIZE: u32 = ${BOLT_SIZE}u;
            const BOLT_HEADER: u32 = ${BOLT_HEADER}u;

            @compute @workgroup_size(8, 8)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let x = gid.x;
                let y = gid.y;
                if (x >= u32(u.resolution.x) || y >= u32(u.resolution.y)) { return; }
                let uv = vec2f(f32(x), f32(y));
                let nuv = uv / u.resolution;

                // Storm sky background
                let skyUV = nuv * vec2f(3.0, 2.0) + vec2f(u.time * 0.02, 0.0);
                let cloud = fbmCloud(skyUV);
                let sky = mix(vec3f(0.02, 0.02, 0.06), vec3f(0.08, 0.06, 0.12), cloud);
                var col = sky;

                // Lightning bolts
                var totalLight: f32 = 0.0;
                var bestBrightness: f32 = 0.0;
                for (var b = 0u; b < u.boltCount; b++) {
                    let base = b * BOLT_SIZE;
                    let numSeg = u32(bolts[base]);
                    let brightness = bolts[base + 1u];
                    if (brightness < 0.01) { continue; }

                    var minDist: f32 = 1e10;
                    for (var s = 0u; s < numSeg; s++) {
                        let si = base + BOLT_HEADER + s * 4u;
                        let a = vec2f(bolts[si], bolts[si + 1u]);
                        let bb = vec2f(bolts[si + 2u], bolts[si + 3u]);
                        let d = distToSegment(uv, a, bb);
                        minDist = min(minDist, d);
                    }

                    let gw = u.glowWidth;
                    // Core bright line
                    let core = exp(-minDist * minDist / (gw * 0.5));
                    // Inner glow
                    let innerGlow = exp(-minDist / (gw * 4.0));
                    // Outer glow
                    let outerGlow = exp(-minDist / (gw * 20.0));
                    let light = (core * 1.0 + innerGlow * 0.4 + outerGlow * 0.15) * brightness;
                    totalLight += light;
                    if (light > bestBrightness) { bestBrightness = light; }
                }

                let bColor = getColor(clamp(totalLight * 0.8, 0.0, 1.0));
                col += bColor * totalLight;

                // Flash ambient (brightens sky during lightning)
                col += vec3f(0.03, 0.04, 0.08) * bestBrightness * 2.0;

                col = clamp(col, vec3f(0.0), vec3f(1.0));
                textureStore(outTex, vec2u(x, y), vec4f(col, 1.0));
            }
        `;

        const shaderModule = device.createShaderModule({ code: shaderCode });

        const texW = canvas.width, texH = canvas.height;
        const outTexture = device.createTexture({
            size: [texW, texH], format: 'rgba8unorm',
            usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING | GPUTextureUsage.COPY_SRC,
        });

        const bindGroupLayout = device.createBindGroupLayout({
            entries: [
                { binding: 0, visibility: GPUShaderStage.COMPUTE, storageTexture: { access: 'write-only', format: 'rgba8unorm', viewDimension: '2d' } },
                { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
                { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
            ],
        });

        const pipeline = device.createComputePipeline({
            layout: device.createPipelineLayout({ bindGroupLayouts: [bindGroupLayout] }),
            compute: { module: shaderModule, entryPoint: 'main' },
        });

        const bindGroup = device.createBindGroup({
            layout: bindGroupLayout,
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: { buffer: uniformBuffer } },
                { binding: 2, resource: { buffer: boltBuffer } },
            ],
        });

        // Fullscreen quad render pipeline (blits compute texture to screen)
        const blitShader = device.createShaderModule({ code: `
            @group(0) @binding(0) var tex: texture_2d<f32>;
            @group(0) @binding(1) var samp: sampler;

            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }

            @vertex fn vs(@builtin(vertex_index) i: u32) -> VSOut {
                var pos = array<vec2f, 6>(
                    vec2f(-1, -1), vec2f(1, -1), vec2f(-1, 1),
                    vec2f(-1, 1), vec2f(1, -1), vec2f(1, 1)
                );
                var out: VSOut;
                out.pos = vec4f(pos[i], 0, 1);
                out.uv = pos[i] * 0.5 + 0.5;
                out.uv.y = 1.0 - out.uv.y;
                return out;
            }

            @fragment fn fs(inp: VSOut) -> @location(0) vec4f {
                return textureSample(tex, samp, inp.uv);
            }
        `});

        const blitBGL = device.createBindGroupLayout({
            entries: [
                { binding: 0, visibility: GPUShaderStage.FRAGMENT, texture: { sampleType: 'float' } },
                { binding: 1, visibility: GPUShaderStage.FRAGMENT, sampler: {} },
            ],
        });
        const blitPipeline = device.createRenderPipeline({
            layout: device.createPipelineLayout({ bindGroupLayouts: [blitBGL] }),
            vertex: { module: blitShader, entryPoint: 'vs' },
            fragment: { module: blitShader, entryPoint: 'fs', targets: [{ format }] },
        });
        const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });
        const blitBG = device.createBindGroup({
            layout: blitBGL,
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: sampler },
            ],
        });

        // CPU lightning generation with midpoint displacement
        function generateBolt(x1, y1, x2, y2, depth, maxDepth, segments) {
            if (depth >= maxDepth) {
                segments.push(x1, y1, x2, y2);
                return;
            }
            const mx = (x1 + x2) * 0.5;
            const my = (y1 + y2) * 0.5;
            const dx = x2 - x1, dy = y2 - y1;
            const len = Math.sqrt(dx * dx + dy * dy);
            const offset = (Math.random() - 0.5) * len * 0.4;
            const nx = -dy / len, ny = dx / len;
            const px = mx + nx * offset;
            const py = my + ny * offset;
            generateBolt(x1, y1, px, py, depth + 1, maxDepth, segments);
            generateBolt(px, py, x2, y2, depth + 1, maxDepth, segments);
        }

        function generateBranch(sx, sy, ex, ey, depth, segments) {
            const dx = ex - sx, dy = ey - sy;
            const len = Math.sqrt(dx * dx + dy * dy);
            if (len < 20 || depth > 3) {
                segments.push(sx, sy, ex, ey);
                return;
            }
            generateBolt(sx, sy, ex, ey, 0, Math.min(depth + 3, 5), segments);
        }

        class LightningBolt {
            constructor(w, h) {
                this.w = w; this.h = h;
                this.segments = [];
                this.brightness = 0;
                this.life = 0;
                this.maxLife = 0.3 + Math.random() * 0.3;
                this.generate();
            }
            generate() {
                this.segments = [];
                const startX = this.w * (0.15 + Math.random() * 0.7);
                const startY = 0;
                const endX = startX + (Math.random() - 0.5) * this.w * 0.5;
                const endY = this.h;
                // Main bolt
                generateBolt(startX, startY, endX, endY, 0, 6, this.segments);
                // Branches from main bolt
                const mainSegCount = this.segments.length / 4;
                for (let i = 0; i < mainSegCount; i++) {
                    if (Math.random() < branchProb) {
                        const si = i * 4;
                        const bx = this.segments[si + 2];
                        const by = this.segments[si + 3];
                        const angle = (Math.random() - 0.5) * Math.PI * 0.6;
                        const bLen = 50 + Math.random() * 150;
                        const bex = bx + Math.cos(Math.PI * 0.5 + angle) * bLen;
                        const bey = by + Math.sin(Math.PI * 0.5 + angle) * bLen;
                        generateBranch(bx, by, bex, bey, 1, this.segments);
                    }
                }
                // Limit to max segments
                if (this.segments.length > MAX_SEGMENTS * 4) {
                    this.segments.length = MAX_SEGMENTS * 4;
                }
            }
            update(dt) {
                this.life += dt;
                // Quick flash then fade
                const t = this.life / this.maxLife;
                if (t < 0.1) {
                    this.brightness = t / 0.1;
                } else {
                    this.brightness = Math.max(0, 1.0 - (t - 0.1) / 0.9);
                }
                // Add flickering
                this.brightness *= 0.8 + Math.random() * 0.4;
                return this.life < this.maxLife;
            }
        }

        let bolts = [];
        let timeSinceFlash = 0;

        // FPS tracking
        let frameCount = 0, lastFPSTime = performance.now();

        function frame(time) {
            const now = performance.now();
            const dt = Math.min((now - (frame.lastTime || now)) / 1000, 0.1);
            frame.lastTime = now;

            // FPS
            frameCount++;
            if (now - lastFPSTime > 500) {
                document.getElementById('fps').textContent = Math.round(frameCount / ((now - lastFPSTime) / 1000));
                frameCount = 0; lastFPSTime = now;
            }

            // Generate new bolts
            timeSinceFlash += dt;
            if (timeSinceFlash > flashRate) {
                timeSinceFlash = 0;
                const count = Math.ceil(boltCount * (0.5 + Math.random() * 0.5));
                for (let i = 0; i < count; i++) {
                    if (bolts.length < MAX_BOLTS) {
                        bolts.push(new LightningBolt(texW, texH));
                    }
                }
            }

            // Update bolts, remove dead
            bolts = bolts.filter(b => b.update(dt));
            document.getElementById('activeBolts').textContent = bolts.length;

            // Fill bolt data
            boltData.fill(0);
            for (let i = 0; i < bolts.length && i < MAX_BOLTS; i++) {
                const b = bolts[i];
                const base = i * BOLT_SIZE;
                boltData[base] = b.segments.length / 4;
                boltData[base + 1] = b.brightness;
                for (let s = 0; s < b.segments.length && s < MAX_SEGMENTS * 4; s++) {
                    boltData[base + BOLT_HEADER + s] = b.segments[s];
                }
            }

            device.queue.writeBuffer(boltBuffer, 0, boltData);

            uniformData[0] = texW;
            uniformData[1] = texH;
            uniformData[2] = time / 1000;
            uniformData[3] = glowWidth;
            const uintView = new Uint32Array(uniformData.buffer);
            uintView[4] = colorMode;
            uintView[5] = Math.min(bolts.length, MAX_BOLTS);
            uniformData[6] = 0;
            uniformData[7] = 0;
            device.queue.writeBuffer(uniformBuffer, 0, uniformData);

            const encoder = device.createCommandEncoder();
            const computePass = encoder.beginComputePass();
            computePass.setPipeline(pipeline);
            computePass.setBindGroup(0, bindGroup);
            computePass.dispatchWorkgroups(Math.ceil(texW / 8), Math.ceil(texH / 8));
            computePass.end();

            const renderPass = encoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    loadOp: 'clear', storeOp: 'store', clearValue: { r: 0, g: 0, b: 0, a: 1 },
                }],
            });
            renderPass.setPipeline(blitPipeline);
            renderPass.setBindGroup(0, blitBG);
            renderPass.draw(6);
            renderPass.end();

            device.queue.submit([encoder.finish()]);
            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    </script>
</body>
</html>
