<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Field Lines - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls button { margin: 4px 2px; padding: 6px 12px; background: #22d3ee; color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .controls button:hover { background: #67e8f9; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        .title-overlay { position: fixed; top: 70px; left: 20px; z-index: 90; }
        .title-overlay h1 { font-size: 1.4rem; color: #22d3ee; margin: 0 0 4px 0; }
        .title-overlay p { font-size: 0.85rem; color: #888; margin: 0; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
        .info { font-size: 10px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to WebGPU Gallery</a>
    <div class="title-overlay">
        <h1>Electric Field Lines</h1>
        <p>Interactive Coulomb field visualization on GPU</p>
    </div>
    <div class="controls">
        <label>Charges: <span id="chargeCountVal">6</span></label>
        <input type="range" id="chargeCount" min="2" max="12" step="2" value="6">
        <label>Field Line Density: <span id="densityVal">1.0</span></label>
        <input type="range" id="density" min="0.2" max="3.0" step="0.1" value="1.0">
        <label>Charge Strength: <span id="strengthVal">1.0</span></label>
        <input type="range" id="strength" min="0.2" max="3.0" step="0.1" value="1.0">
        <button onclick="window.resetCharges()">Reset Charges</button>
        <div class="info">Drag charges to move them</div>
    </div>
    <div class="stats">FPS: <span id="fps">0</span> | Charges: <span id="chargeInfo">6</span></div>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>
    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'opaque' });

        const MAX_CHARGES = 12;
        let numCharges = 6;
        let chargeStrength = 1.0;
        let fieldDensity = 1.0;
        // charges: x, y in normalized coords [0,1], q = charge sign*magnitude
        let charges = [];
        let dragIdx = -1;

        function initCharges(n) {
            charges = [];
            const cx = 0.5, cy = 0.5, r = 0.2;
            for (let i = 0; i < n; i++) {
                const angle = (i / n) * Math.PI * 2;
                charges.push({
                    x: cx + Math.cos(angle) * r,
                    y: cy + Math.sin(angle) * r,
                    q: (i % 2 === 0) ? 1.0 : -1.0
                });
            }
        }
        initCharges(numCharges);

        // Uniform buffer: time, width, height, numCharges, density, strength, pad, pad
        // + charges: vec4 each (x, y, q, pad)
        const uniformSize = 32 + MAX_CHARGES * 16;
        const uniformBuffer = device.createBuffer({ size: uniformSize, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        function updateUniforms(time) {
            const data = new Float32Array(8 + MAX_CHARGES * 4);
            data[0] = time;
            data[1] = canvas.width;
            data[2] = canvas.height;
            data[3] = numCharges;
            data[4] = fieldDensity;
            data[5] = chargeStrength;
            for (let i = 0; i < charges.length; i++) {
                data[8 + i * 4 + 0] = charges[i].x;
                data[8 + i * 4 + 1] = charges[i].y;
                data[8 + i * 4 + 2] = charges[i].q * chargeStrength;
                data[8 + i * 4 + 3] = 0;
            }
            device.queue.writeBuffer(uniformBuffer, 0, data);
        }

        const shaderCode = `
            struct Uniforms {
                time: f32,
                width: f32,
                height: f32,
                numCharges: f32,
                density: f32,
                strength: f32,
                pad1: f32,
                pad2: f32,
                charges: array<vec4f, ${MAX_CHARGES}>
            }
            @group(0) @binding(0) var<uniform> u: Uniforms;

            struct VO { @builtin(position) pos: vec4f, @location(0) uv: vec2f }

            @vertex fn vs(@builtin(vertex_index) i: u32) -> VO {
                var p = array<vec2f, 4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var uv = array<vec2f, 4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var o: VO; o.pos = vec4f(p[i], 0, 1); o.uv = uv[i]; return o;
            }

            fn electricPotential(pos: vec2f) -> f32 {
                var V = 0.0;
                let n = i32(u.numCharges);
                for (var i = 0; i < n; i++) {
                    let c = u.charges[i];
                    let d = distance(pos, c.xy);
                    let r = max(d, 0.005);
                    V += c.z / r;
                }
                return V;
            }

            fn electricField(pos: vec2f) -> vec2f {
                let eps = 0.001;
                let dVdx = electricPotential(vec2f(pos.x + eps, pos.y)) - electricPotential(vec2f(pos.x - eps, pos.y));
                let dVdy = electricPotential(vec2f(pos.x, pos.y + eps)) - electricPotential(vec2f(pos.x, pos.y - eps));
                return -vec2f(dVdx, dVdy) / (2.0 * eps);
            }

            fn hsl2rgb(h: f32, s: f32, l: f32) -> vec3f {
                let c = (1.0 - abs(2.0 * l - 1.0)) * s;
                let hp = h * 6.0;
                let x = c * (1.0 - abs(hp % 2.0 - 1.0));
                var rgb = vec3f(0.0);
                if (hp < 1.0) { rgb = vec3f(c, x, 0.0); }
                else if (hp < 2.0) { rgb = vec3f(x, c, 0.0); }
                else if (hp < 3.0) { rgb = vec3f(0.0, c, x); }
                else if (hp < 4.0) { rgb = vec3f(0.0, x, c); }
                else if (hp < 5.0) { rgb = vec3f(x, 0.0, c); }
                else { rgb = vec3f(c, 0.0, x); }
                let m = l - c * 0.5;
                return rgb + vec3f(m);
            }

            @fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                let aspect = u.width / u.height;
                var pos = uv;
                pos.x *= aspect;
                let centerX = aspect * 0.5;

                // Compute potential and field
                let V = electricPotential(pos);
                let E = electricField(pos);
                let Emag = length(E);

                // Equipotential lines
                let scaledV = V * u.density * 8.0;
                let lineV = abs(fract(scaledV) - 0.5);
                let equipLine = smoothstep(0.0, 0.06, lineV);

                // Field line pattern using stream function
                // For 2D E-field, use atan2-based approach
                var fieldLineIntensity = 0.0;
                let n = i32(u.numCharges);
                var streamFunc = 0.0;
                for (var i = 0; i < n; i++) {
                    let c = u.charges[i];
                    let dx = pos.x - c.x;
                    let dy = pos.y - c.y;
                    streamFunc += c.z * atan2(dy, dx);
                }
                let numLines = u.density * 12.0;
                let streamScaled = streamFunc * numLines / 3.14159;
                let lineS = abs(fract(streamScaled) - 0.5);
                let fieldLine = 1.0 - smoothstep(0.0, 0.08, lineS);
                fieldLineIntensity = fieldLine * min(Emag * 2.0, 1.0);

                // Background color based on potential
                let normV = clamp(V * 0.3, -1.0, 1.0);
                var bgColor: vec3f;
                if (normV > 0.0) {
                    bgColor = mix(vec3f(0.02, 0.04, 0.06), vec3f(0.6, 0.15, 0.05), normV * 0.7);
                } else {
                    bgColor = mix(vec3f(0.02, 0.04, 0.06), vec3f(0.05, 0.15, 0.5), -normV * 0.7);
                }

                // Equipotential line color
                let eqColor = mix(vec3f(0.15, 0.35, 0.15), vec3f(0.1, 0.6, 0.3), abs(normV));
                var color = mix(eqColor, bgColor, equipLine);

                // Field lines overlay (bright yellow-white)
                let flColor = vec3f(1.0, 0.95, 0.6);
                color = mix(color, flColor, fieldLineIntensity * 0.7);

                // Draw charges as glowing circles
                for (var i = 0; i < n; i++) {
                    let c = u.charges[i];
                    let d = distance(pos, c.xy);
                    let glow = exp(-d * d * 800.0) * 1.5;
                    let core = smoothstep(0.015, 0.01, d);
                    var chargeColor: vec3f;
                    if (c.z > 0.0) {
                        chargeColor = vec3f(1.0, 0.3, 0.2);
                    } else {
                        chargeColor = vec3f(0.2, 0.5, 1.0);
                    }
                    color = mix(color, chargeColor, glow);
                    color = mix(color, chargeColor * 1.5, core);

                    // +/- symbol
                    let lx = abs(pos.x - c.x);
                    let ly = abs(pos.y - c.y);
                    let crossH = step(ly, 0.002) * step(lx, 0.008);
                    let crossV = step(lx, 0.002) * step(ly, 0.008);
                    if (c.z > 0.0) {
                        color = mix(color, vec3f(1.0), (crossH + crossV) * core);
                    } else {
                        color = mix(color, vec3f(1.0), crossH * core);
                    }
                }

                // Field magnitude glow (subtle)
                let magGlow = clamp(log(Emag + 1.0) * 0.05, 0.0, 0.15);
                color += vec3f(magGlow * 0.3, magGlow * 0.5, magGlow * 0.8);

                return vec4f(color, 1.0);
            }
        `;

        const shaderModule = device.createShaderModule({ code: shaderCode });
        const pipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: shaderModule, entryPoint: 'vs' },
            fragment: { module: shaderModule, entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-strip' }
        });
        const bindGroup = device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: [{ binding: 0, resource: { buffer: uniformBuffer } }]
        });

        // Mouse interaction
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX / rect.width);
            const my = (e.clientY / rect.height);
            const aspect = canvas.width / canvas.height;
            const px = mx * aspect;
            const py = my;
            let minDist = 0.05;
            dragIdx = -1;
            for (let i = 0; i < charges.length; i++) {
                const d = Math.hypot(charges[i].x - px, charges[i].y - py);
                if (d < minDist) { minDist = d; dragIdx = i; }
            }
        });
        canvas.addEventListener('mousemove', (e) => {
            if (dragIdx < 0) return;
            const rect = canvas.getBoundingClientRect();
            const aspect = canvas.width / canvas.height;
            charges[dragIdx].x = (e.clientX / rect.width) * aspect;
            charges[dragIdx].y = e.clientY / rect.height;
        });
        canvas.addEventListener('mouseup', () => { dragIdx = -1; });
        canvas.addEventListener('mouseleave', () => { dragIdx = -1; });

        window.resetCharges = () => { initCharges(numCharges); };

        document.getElementById('chargeCount').addEventListener('input', (e) => {
            numCharges = parseInt(e.target.value);
            document.getElementById('chargeCountVal').textContent = numCharges;
            document.getElementById('chargeInfo').textContent = numCharges;
            initCharges(numCharges);
        });
        document.getElementById('density').addEventListener('input', (e) => {
            fieldDensity = parseFloat(e.target.value);
            document.getElementById('densityVal').textContent = fieldDensity.toFixed(1);
        });
        document.getElementById('strength').addEventListener('input', (e) => {
            chargeStrength = parseFloat(e.target.value);
            document.getElementById('strengthVal').textContent = chargeStrength.toFixed(1);
        });

        let lastTime = performance.now(), fpsFrames = 0, fpsTime = 0;
        const startTime = performance.now();

        function render() {
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            fpsFrames++; fpsTime += dt;
            if (fpsTime >= 1.0) {
                document.getElementById('fps').textContent = Math.round(fpsFrames / fpsTime);
                fpsFrames = 0; fpsTime = 0;
            }

            updateUniforms((now - startTime) / 1000);

            const encoder = device.createCommandEncoder();
            const pass = encoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    loadOp: 'clear', storeOp: 'store', clearValue: { r: 0, g: 0, b: 0, a: 1 }
                }]
            });
            pass.setPipeline(pipeline);
            pass.setBindGroup(0, bindGroup);
            pass.draw(4);
            pass.end();
            device.queue.submit([encoder.finish()]);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            context.configure({ device, format, alphaMode: 'opaque' });
        });

        render();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
