<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Spacetime Fabric - WebGPU - CCAB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #030308; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6,182,212,0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6,182,212,0.4); }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); padding: 15px; border-radius: 10px; z-index: 100; font-size: 12px; min-width: 220px; border: 1px solid rgba(6,182,212,0.15); }
        .controls h3 { color: #22d3ee; margin-bottom: 10px; font-size: 14px; }
        .controls label { display: block; margin: 8px 0 3px; color: #94a3b8; font-size: 11px; }
        .controls input[type=range] { width: 100%; height: 4px; -webkit-appearance: none; background: #1e293b; border-radius: 2px; outline: none; }
        .controls input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #22d3ee; border-radius: 50%; cursor: pointer; }
        .controls .val { float: right; color: #22d3ee; }
        .toggle-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .toggle-row label { margin: 0; }
        .toggle { width: 36px; height: 20px; background: #334155; border-radius: 10px; position: relative; cursor: pointer; transition: background 0.2s; }
        .toggle.on { background: #22d3ee; }
        .toggle::after { content:''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
        .toggle.on::after { transform: translateX(16px); }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; color: #94a3b8; }
        .stats span { color: #22d3ee; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(239,68,68,0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <div class="controls">
        <h3>Cosmic Fabric</h3>
        <label>Masses <span class="val" id="massCountVal">4</span></label>
        <input type="range" id="massCount" min="1" max="6" step="1" value="4">
        <label>Mass Strength <span class="val" id="massVal">1.0</span></label>
        <input type="range" id="massStrength" min="0.2" max="3.0" step="0.1" value="1.0">
        <label>Orbital Speed <span class="val" id="orbitVal">0.3</span></label>
        <input type="range" id="orbitSpeed" min="0.0" max="1.0" step="0.05" value="0.3">
        <label>Grid Glow <span class="val" id="glowVal">1.0</span></label>
        <input type="range" id="glow" min="0.2" max="2.0" step="0.1" value="1.0">
        <div class="toggle-row">
            <div class="toggle on" id="wavesToggle"></div>
            <label>Gravitational Waves</label>
        </div>
    </div>
    <div class="stats">
        Grid: <span>200x200</span> | Vertices: <span>40,000</span> | FPS: <span id="fps">0</span>
    </div>
    <canvas id="canvas"></canvas>
    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();

        const GRID_SIZE = 200;
        const GRID_SPAN = 20.0; // world units
        const MAX_MASSES = 6;

        function resize() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
            context.configure({ device, format, alphaMode: 'premultiplied' });
        }
        resize();
        window.addEventListener('resize', resize);

        // Generate grid vertices: x, y positions
        const vertCount = GRID_SIZE * GRID_SIZE;
        const vertData = new Float32Array(vertCount * 2);
        for (let iy = 0; iy < GRID_SIZE; iy++) {
            for (let ix = 0; ix < GRID_SIZE; ix++) {
                const idx = (iy * GRID_SIZE + ix) * 2;
                vertData[idx] = (ix / (GRID_SIZE - 1) - 0.5) * GRID_SPAN;
                vertData[idx + 1] = (iy / (GRID_SIZE - 1) - 0.5) * GRID_SPAN;
            }
        }

        // Generate line indices for grid
        const lines = [];
        for (let iy = 0; iy < GRID_SIZE; iy++) {
            for (let ix = 0; ix < GRID_SIZE - 1; ix++) {
                lines.push(iy * GRID_SIZE + ix, iy * GRID_SIZE + ix + 1);
            }
        }
        for (let ix = 0; ix < GRID_SIZE; ix++) {
            for (let iy = 0; iy < GRID_SIZE - 1; iy++) {
                lines.push(iy * GRID_SIZE + ix, (iy + 1) * GRID_SIZE + ix);
            }
        }
        const indexData = new Uint32Array(lines);

        const vertBuf = device.createBuffer({ size: vertData.byteLength, usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST });
        device.queue.writeBuffer(vertBuf, 0, vertData);

        const indexBuf = device.createBuffer({ size: indexData.byteLength, usage: GPUBufferUsage.INDEX | GPUBufferUsage.COPY_DST });
        device.queue.writeBuffer(indexBuf, 0, indexData);

        // Displacement buffer computed on GPU
        const dispBuf = device.createBuffer({ size: vertCount * 4, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.VERTEX });

        // Mass data: x, y, mass, orbitRadius (up to MAX_MASSES)
        const massBuf = device.createBuffer({ size: MAX_MASSES * 16, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });

        // Light particle buffer: x, y, vx, vy (1000 test particles)
        const NUM_PARTICLES = 2000;
        const particleBuf = device.createBuffer({ size: NUM_PARTICLES * 16, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST });

        // Initialize light particles in orbits
        function initParticles() {
            const data = new Float32Array(NUM_PARTICLES * 4);
            for (let i = 0; i < NUM_PARTICLES; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = 2 + Math.random() * 6;
                data[i * 4] = Math.cos(angle) * r;
                data[i * 4 + 1] = Math.sin(angle) * r;
                // Orbital velocity
                const v = Math.sqrt(3.0 / r) * 0.8;
                data[i * 4 + 2] = -Math.sin(angle) * v + (Math.random() - 0.5) * 0.2;
                data[i * 4 + 3] = Math.cos(angle) * v + (Math.random() - 0.5) * 0.2;
            }
            return data;
        }
        device.queue.writeBuffer(particleBuf, 0, initParticles());

        // Uniforms: gridSize, gridSpan, numMasses, time, massStrength, showWaves, glow, canvasW, canvasH, camAngleX, camAngleY, pad
        const uniformBuf = device.createBuffer({ size: 64, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        // Compute shader: displace grid vertices + update particles
        const computeModule = device.createShaderModule({ code: `
            struct Mass { x: f32, y: f32, mass: f32, pad: f32 }
            struct Uniforms {
                gridSize: f32, gridSpan: f32, numMasses: f32, time: f32,
                massStrength: f32, showWaves: f32, glow: f32, canvasW: f32,
                canvasH: f32, camAngleX: f32, camAngleY: f32, orbitSpeed: f32,
                numParticles: f32, pad1: f32, pad2: f32, pad3: f32,
            }

            @group(0) @binding(0) var<storage, read> gridPos: array<vec2f>;
            @group(0) @binding(1) var<storage, read_write> displacement: array<f32>;
            @group(0) @binding(2) var<storage, read> masses: array<Mass>;
            @group(0) @binding(3) var<uniform> u: Uniforms;

            @compute @workgroup_size(256)
            fn displace(@builtin(global_invocation_id) gid: vec3u) {
                let idx = gid.x;
                let total = u32(u.gridSize * u.gridSize);
                if (idx >= total) { return; }

                let pos = gridPos[idx];
                var z = 0.0;

                let nm = i32(u.numMasses);
                for (var i = 0; i < nm; i++) {
                    let m = masses[i];
                    let dx = pos.x - m.x;
                    let dy = pos.y - m.y;
                    let r = sqrt(dx * dx + dy * dy) + 0.3;

                    // Gravitational well: z = -mass / r
                    z -= m.mass * u.massStrength / r;

                    // Gravitational waves: ripples propagating outward
                    if (u.showWaves > 0.5) {
                        let wavePhase = r * 2.0 - u.time * 3.0;
                        let waveAmp = m.mass * 0.08 / (r + 1.0);
                        z += sin(wavePhase) * waveAmp;
                    }
                }

                // Clamp depth
                z = max(z, -6.0);

                displacement[idx] = z;
            }
        `});

        // Particle compute shader
        const particleComputeModule = device.createShaderModule({ code: `
            struct Mass { x: f32, y: f32, mass: f32, pad: f32 }
            struct Uniforms {
                gridSize: f32, gridSpan: f32, numMasses: f32, time: f32,
                massStrength: f32, showWaves: f32, glow: f32, canvasW: f32,
                canvasH: f32, camAngleX: f32, camAngleY: f32, orbitSpeed: f32,
                numParticles: f32, pad1: f32, pad2: f32, pad3: f32,
            }

            @group(0) @binding(0) var<storage, read_write> particles: array<vec4f>;
            @group(0) @binding(1) var<storage, read> masses: array<Mass>;
            @group(0) @binding(2) var<uniform> u: Uniforms;

            @compute @workgroup_size(256)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let idx = gid.x;
                if (idx >= u32(u.numParticles)) { return; }

                var p = particles[idx];
                let dt = 0.005;
                let nm = i32(u.numMasses);

                // Gravitational acceleration
                var ax = 0.0;
                var ay = 0.0;
                for (var i = 0; i < nm; i++) {
                    let m = masses[i];
                    let dx = m.x - p.x;
                    let dy = m.y - p.y;
                    let r2 = dx * dx + dy * dy + 0.5;
                    let r = sqrt(r2);
                    let f = m.mass * u.massStrength / (r2 * r);
                    ax += dx * f;
                    ay += dy * f;
                }

                p.z += ax * dt; // vx
                p.w += ay * dt; // vy

                p.x += p.z * dt;
                p.y += p.w * dt;

                // Reset if too far
                let r = sqrt(p.x * p.x + p.y * p.y);
                if (r > 12.0 || r < 0.15) {
                    let angle = f32(idx) * 0.618 + u.time;
                    let nr = 2.0 + fract(f32(idx) * 0.137) * 5.0;
                    p.x = cos(angle) * nr;
                    p.y = sin(angle) * nr;
                    let v = sqrt(3.0 * u.massStrength / nr) * 0.8;
                    p.z = -sin(angle) * v;
                    p.w = cos(angle) * v;
                }

                particles[idx] = p;
            }
        `});

        // Render shader: grid lines + mass objects + particles
        const renderModule = device.createShaderModule({ code: `
            struct Uniforms {
                gridSize: f32, gridSpan: f32, numMasses: f32, time: f32,
                massStrength: f32, showWaves: f32, glow: f32, canvasW: f32,
                canvasH: f32, camAngleX: f32, camAngleY: f32, orbitSpeed: f32,
                numParticles: f32, pad1: f32, pad2: f32, pad3: f32,
            }

            @group(0) @binding(0) var<uniform> u: Uniforms;
            @group(0) @binding(1) var<storage, read> displacement: array<f32>;

            struct VSOut { @builtin(position) pos: vec4f, @location(0) color: vec4f }

            @vertex
            fn vs(@location(0) xy: vec2f, @location(1) z: f32) -> VSOut {
                var out: VSOut;

                let camX = u.camAngleX;
                let camY = u.camAngleY;

                // Camera rotation
                let cy = cos(camY); let sy = sin(camY);
                let y1 = xy.y * cy - z * sy;
                let z1 = xy.y * sy + z * cy;

                let cx = cos(camX); let sx = sin(camX);
                let x2 = xy.x * cx - y1 * sx;
                let y2 = xy.x * sx + y1 * cx;

                let scale = 0.07;
                let depth = z1 + 30.0;
                let perspective = 30.0 / max(depth, 1.0);
                let aspect = u.canvasW / u.canvasH;

                out.pos = vec4f(x2 * scale * perspective / aspect, y2 * scale * perspective, 0.5, 1.0);

                // Color: cyan grid with curvature-based brightness
                let curvature = abs(z) * 0.4;
                let brightness = (0.15 + curvature * 0.5) * u.glow;
                let depthFade = clamp(perspective, 0.3, 1.0);

                // Color shifts with curvature: deep wells glow brighter, add purple
                let r = 0.05 + curvature * 0.3;
                let g = 0.7 + curvature * 0.2;
                let b = 0.9 + curvature * 0.1;

                out.color = vec4f(r * brightness * depthFade, g * brightness * depthFade, b * brightness * depthFade, 0.6 * depthFade);
                return out;
            }

            @fragment
            fn fs(@location(0) color: vec4f) -> @location(0) vec4f {
                return color;
            }
        `});

        // Mass rendering shader (points for gravitational objects)
        const massRenderModule = device.createShaderModule({ code: `
            struct Mass { x: f32, y: f32, mass: f32, pad: f32 }
            struct Uniforms {
                gridSize: f32, gridSpan: f32, numMasses: f32, time: f32,
                massStrength: f32, showWaves: f32, glow: f32, canvasW: f32,
                canvasH: f32, camAngleX: f32, camAngleY: f32, orbitSpeed: f32,
                numParticles: f32, pad1: f32, pad2: f32, pad3: f32,
            }

            @group(0) @binding(0) var<uniform> u: Uniforms;
            @group(0) @binding(1) var<storage, read> masses: array<Mass>;

            struct VSOut { @builtin(position) pos: vec4f, @location(0) color: vec4f }

            @vertex
            fn vs(@builtin(vertex_index) vi: u32) -> VSOut {
                var out: VSOut;

                if (vi >= u32(u.numMasses)) {
                    out.pos = vec4f(0, 0, -1, 1);
                    out.color = vec4f(0);
                    return out;
                }

                let m = masses[vi];
                let z = -m.mass * u.massStrength / 0.3;
                let zClamped = max(z, -6.0);

                let camX = u.camAngleX;
                let camY = u.camAngleY;
                let cy = cos(camY); let sy = sin(camY);
                let y1 = m.y * cy - zClamped * sy;
                let z1 = m.y * sy + zClamped * cy;
                let cx = cos(camX); let sx = sin(camX);
                let x2 = m.x * cx - y1 * sx;
                let y2 = m.x * sx + y1 * cx;

                let scale = 0.07;
                let depth = z1 + 30.0;
                let perspective = 30.0 / max(depth, 1.0);
                let aspect = u.canvasW / u.canvasH;

                out.pos = vec4f(x2 * scale * perspective / aspect, y2 * scale * perspective, 0.3, 1.0);

                // Pulsing golden color
                let pulse = 0.8 + 0.2 * sin(u.time * 2.0 + f32(vi) * 1.5);
                let brightness = (0.5 + m.mass * 0.2) * pulse;
                out.color = vec4f(1.0 * brightness, 0.85 * brightness, 0.3 * brightness, 1.0);
                return out;
            }

            @fragment
            fn fs(@location(0) color: vec4f) -> @location(0) vec4f {
                return color;
            }
        `});

        // Particle rendering shader
        const particleRenderModule = device.createShaderModule({ code: `
            struct Uniforms {
                gridSize: f32, gridSpan: f32, numMasses: f32, time: f32,
                massStrength: f32, showWaves: f32, glow: f32, canvasW: f32,
                canvasH: f32, camAngleX: f32, camAngleY: f32, orbitSpeed: f32,
                numParticles: f32, pad1: f32, pad2: f32, pad3: f32,
            }
            struct Mass { x: f32, y: f32, mass: f32, pad: f32 }

            @group(0) @binding(0) var<uniform> u: Uniforms;
            @group(0) @binding(1) var<storage, read> masses: array<Mass>;

            struct VSOut { @builtin(position) pos: vec4f, @location(0) color: vec4f }

            @vertex
            fn vs(@location(0) px: f32, @location(1) py: f32, @location(2) vx: f32, @location(3) vy: f32) -> VSOut {
                var out: VSOut;

                // Compute z from gravitational displacement
                var z = 0.0;
                let nm = i32(u.numMasses);
                for (var i = 0; i < nm; i++) {
                    let m = masses[i];
                    let dx = px - m.x;
                    let dy = py - m.y;
                    let r = sqrt(dx * dx + dy * dy) + 0.3;
                    z -= m.mass * u.massStrength / r;
                }
                z = max(z, -6.0) + 0.1; // Slightly above fabric

                let camX = u.camAngleX;
                let camY = u.camAngleY;
                let cy = cos(camY); let sy = sin(camY);
                let y1 = py * cy - z * sy;
                let z1 = py * sy + z * cy;
                let cx = cos(camX); let sx = sin(camX);
                let x2 = px * cx - y1 * sx;
                let y2 = px * sx + y1 * cx;

                let scale = 0.07;
                let depth = z1 + 30.0;
                let perspective = 30.0 / max(depth, 1.0);
                let aspect = u.canvasW / u.canvasH;

                out.pos = vec4f(x2 * scale * perspective / aspect, y2 * scale * perspective, 0.4, 1.0);

                let speed = sqrt(vx * vx + vy * vy);
                let t = clamp(speed * 0.5, 0.0, 1.0);
                out.color = vec4f(0.5 + t * 0.5, 0.8, 1.0 - t * 0.3, 0.4 + t * 0.3);
                return out;
            }

            @fragment
            fn fs(@location(0) color: vec4f) -> @location(0) vec4f {
                return color;
            }
        `});

        // Create pipelines
        const displacePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: computeModule, entryPoint: 'displace' },
        });

        const particleComputePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: particleComputeModule, entryPoint: 'main' },
        });

        const gridRenderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: {
                module: renderModule, entryPoint: 'vs',
                buffers: [
                    { arrayStride: 8, attributes: [{ shaderLocation: 0, offset: 0, format: 'float32x2' }] },
                    { arrayStride: 4, attributes: [{ shaderLocation: 1, offset: 0, format: 'float32' }] },
                ],
            },
            fragment: {
                module: renderModule, entryPoint: 'fs',
                targets: [{
                    format,
                    blend: {
                        color: { srcFactor: 'src-alpha', dstFactor: 'one', operation: 'add' },
                        alpha: { srcFactor: 'one', dstFactor: 'one', operation: 'add' },
                    },
                }],
            },
            primitive: { topology: 'line-list' },
        });

        const massRenderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: massRenderModule, entryPoint: 'vs' },
            fragment: {
                module: massRenderModule, entryPoint: 'fs',
                targets: [{
                    format,
                    blend: {
                        color: { srcFactor: 'src-alpha', dstFactor: 'one', operation: 'add' },
                        alpha: { srcFactor: 'one', dstFactor: 'one', operation: 'add' },
                    },
                }],
            },
            primitive: { topology: 'point-list' },
        });

        const particleRenderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: {
                module: particleRenderModule, entryPoint: 'vs',
                buffers: [{
                    arrayStride: 16,
                    attributes: [
                        { shaderLocation: 0, offset: 0, format: 'float32' },
                        { shaderLocation: 1, offset: 4, format: 'float32' },
                        { shaderLocation: 2, offset: 8, format: 'float32' },
                        { shaderLocation: 3, offset: 12, format: 'float32' },
                    ],
                }],
            },
            fragment: {
                module: particleRenderModule, entryPoint: 'fs',
                targets: [{
                    format,
                    blend: {
                        color: { srcFactor: 'src-alpha', dstFactor: 'one', operation: 'add' },
                        alpha: { srcFactor: 'one', dstFactor: 'one', operation: 'add' },
                    },
                }],
            },
            primitive: { topology: 'point-list' },
        });

        // Bind groups
        const displaceBG = device.createBindGroup({
            layout: displacePipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: vertBuf } },
                { binding: 1, resource: { buffer: dispBuf } },
                { binding: 2, resource: { buffer: massBuf } },
                { binding: 3, resource: { buffer: uniformBuf } },
            ],
        });

        const particleComputeBG = device.createBindGroup({
            layout: particleComputePipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: particleBuf } },
                { binding: 1, resource: { buffer: massBuf } },
                { binding: 2, resource: { buffer: uniformBuf } },
            ],
        });

        const gridRenderBG = device.createBindGroup({
            layout: gridRenderPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: uniformBuf } },
                { binding: 1, resource: { buffer: dispBuf } },
            ],
        });

        const massRenderBG = device.createBindGroup({
            layout: massRenderPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: uniformBuf } },
                { binding: 1, resource: { buffer: massBuf } },
            ],
        });

        const particleRenderBG = device.createBindGroup({
            layout: particleRenderPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: uniformBuf } },
                { binding: 1, resource: { buffer: massBuf } },
            ],
        });

        // Controls
        const massCountSlider = document.getElementById('massCount');
        const massStrengthSlider = document.getElementById('massStrength');
        const orbitSpeedSlider = document.getElementById('orbitSpeed');
        const glowSlider = document.getElementById('glow');
        const wavesToggle = document.getElementById('wavesToggle');
        let showWaves = true;

        massCountSlider.oninput = () => document.getElementById('massCountVal').textContent = massCountSlider.value;
        massStrengthSlider.oninput = () => document.getElementById('massVal').textContent = massStrengthSlider.value;
        orbitSpeedSlider.oninput = () => document.getElementById('orbitVal').textContent = orbitSpeedSlider.value;
        glowSlider.oninput = () => document.getElementById('glowVal').textContent = glowSlider.value;
        wavesToggle.onclick = () => { showWaves = !showWaves; wavesToggle.classList.toggle('on', showWaves); };

        // Camera
        let camAngleX = 0.5, camAngleY = 0.7;
        let dragging = false, lastMX = 0, lastMY = 0;
        canvas.addEventListener('mousedown', (e) => { dragging = true; lastMX = e.clientX; lastMY = e.clientY; });
        canvas.addEventListener('mouseup', () => dragging = false);
        canvas.addEventListener('mouseleave', () => dragging = false);
        canvas.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            camAngleX += (e.clientX - lastMX) * 0.005;
            camAngleY += (e.clientY - lastMY) * 0.005;
            camAngleY = Math.max(0.1, Math.min(1.5, camAngleY));
            lastMX = e.clientX; lastMY = e.clientY;
        });

        let time = 0;
        let frameCount = 0, lastFpsTime = performance.now();

        function frame() {
            time += 0.016;
            const numMasses = parseInt(massCountSlider.value);
            const orbitSpeed = parseFloat(orbitSpeedSlider.value);
            const massStrength = parseFloat(massStrengthSlider.value);

            // Update mass positions (orbiting)
            const massData = new Float32Array(MAX_MASSES * 4);
            for (let i = 0; i < numMasses; i++) {
                const angle = time * orbitSpeed * (1 + i * 0.3) + (i * Math.PI * 2 / numMasses);
                const orbitR = 2.5 + i * 1.5;
                massData[i * 4] = Math.cos(angle) * orbitR;
                massData[i * 4 + 1] = Math.sin(angle) * orbitR;
                massData[i * 4 + 2] = 1.5 + (i % 3) * 0.5; // mass
                massData[i * 4 + 3] = 0;
            }
            device.queue.writeBuffer(massBuf, 0, massData);

            // Update uniforms
            const uniforms = new Float32Array([
                GRID_SIZE, GRID_SPAN, numMasses, time,
                massStrength, showWaves ? 1 : 0, parseFloat(glowSlider.value), canvas.width,
                canvas.height, camAngleX, camAngleY, orbitSpeed,
                NUM_PARTICLES, 0, 0, 0,
            ]);
            device.queue.writeBuffer(uniformBuf, 0, uniforms);

            const encoder = device.createCommandEncoder();

            // Compute: displace grid
            const cp1 = encoder.beginComputePass();
            cp1.setPipeline(displacePipeline);
            cp1.setBindGroup(0, displaceBG);
            cp1.dispatchWorkgroups(Math.ceil(vertCount / 256));
            cp1.end();

            // Compute: update particles
            const cp2 = encoder.beginComputePass();
            cp2.setPipeline(particleComputePipeline);
            cp2.setBindGroup(0, particleComputeBG);
            cp2.dispatchWorkgroups(Math.ceil(NUM_PARTICLES / 256));
            cp2.end();

            // Render pass
            const rp = encoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    clearValue: { r: 0.01, g: 0.005, b: 0.025, a: 1 },
                    loadOp: 'clear', storeOp: 'store',
                }],
            });

            // Draw grid lines
            rp.setPipeline(gridRenderPipeline);
            rp.setBindGroup(0, gridRenderBG);
            rp.setVertexBuffer(0, vertBuf);
            rp.setVertexBuffer(1, dispBuf);
            rp.setIndexBuffer(indexBuf, 'uint32');
            rp.drawIndexed(indexData.length);

            // Draw masses as points
            rp.setPipeline(massRenderPipeline);
            rp.setBindGroup(0, massRenderBG);
            rp.draw(numMasses);

            // Draw light particles
            rp.setPipeline(particleRenderPipeline);
            rp.setBindGroup(0, particleRenderBG);
            rp.setVertexBuffer(0, particleBuf);
            rp.draw(NUM_PARTICLES);

            rp.end();

            device.queue.submit([encoder.finish()]);

            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime > 500) {
                document.getElementById('fps').textContent = Math.round(frameCount / ((now - lastFpsTime) / 1000));
                frameCount = 0; lastFpsTime = now;
            }

            requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
    </script>
</body>
</html>
