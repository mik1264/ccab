<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julia Set Explorer - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 210px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls select { width: 170px; background: #1a1a2e; color: #e8e6e1; border: 1px solid #22d3ee; border-radius: 4px; padding: 3px; }
        .controls button { margin: 3px 2px; padding: 5px 10px; background: #22d3ee; color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .controls .row { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
        .controls .row button { flex: 1; min-width: 70px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; line-height: 1.6; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #22d3ee; font-size: 14px; font-weight: 600; z-index: 100; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); pointer-events: none; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
        .info { font-size: 10px; color: #888; margin-top: 8px; line-height: 1.4; }
        .mandelbrot-overlay { position: fixed; bottom: 20px; right: 20px; width: 180px; height: 180px; border: 1px solid rgba(34, 211, 238, 0.4); border-radius: 8px; overflow: hidden; z-index: 100; opacity: 0.85; }
        .mandelbrot-overlay canvas { width: 100%; height: 100%; }
        .mandelbrot-label { position: absolute; top: 4px; left: 6px; font-size: 9px; color: #22d3ee; pointer-events: none; }
        .mandelbrot-dot { position: absolute; width: 6px; height: 6px; background: #f43f5e; border-radius: 50%; box-shadow: 0 0 8px #f43f5e; transform: translate(-50%, -50%); pointer-events: none; z-index: 101; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Back to WebGPU Gallery</a>
    <div class="title">Julia Set Explorer</div>

    <div class="controls">
        <label>Animation Speed: <span id="speedVal">1.0</span></label>
        <input type="range" id="speed" min="0.1" max="3.0" step="0.1" value="1.0">
        <label>Max Iterations: <span id="iterVal">300</span></label>
        <input type="range" id="maxIter" min="50" max="1000" step="50" value="300">
        <label>Zoom: <span id="zoomVal">1.0</span></label>
        <input type="range" id="zoom" min="0.5" max="10.0" step="0.1" value="1.0">
        <label>Color Theme:</label>
        <select id="theme">
            <option value="0">Electric Twilight</option>
            <option value="1">Molten Gold</option>
            <option value="2">Frozen</option>
            <option value="3">Nebula</option>
        </select>
        <label>Path:</label>
        <select id="path">
            <option value="0">Figure-8 (classic)</option>
            <option value="1">Cardioid Orbit</option>
            <option value="2">Spiral</option>
            <option value="3">Random Walk</option>
        </select>
        <div class="row">
            <button onclick="window.togglePause()">Pause</button>
            <button onclick="window.resetView()">Reset</button>
        </div>
        <div class="info">
            c traces a path in complex plane.<br>
            Scroll to zoom, drag to pan.<br>
            Mandelbrot overlay shows c position.
        </div>
    </div>

    <div class="stats">
        FPS: <span id="fps">0</span><br>
        c = <span id="cValue">0.000 + 0.000i</span><br>
        Zoom: <span id="zoomDisplay">1.00</span>
    </div>

    <div class="mandelbrot-overlay">
        <span class="mandelbrot-label">Mandelbrot (c position)</span>
        <canvas id="mbCanvas" width="180" height="180"></canvas>
        <div class="mandelbrot-dot" id="cDot"></div>
    </div>

    <div id="error">
        WebGPU is not supported in your browser.<br>
        Please use Chrome 113+, Edge 113+, or Safari 18+.
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'opaque' });

        const W = canvas.width, H = canvas.height;

        let centerX = 0, centerY = 0;
        let zoomLevel = 1.0;
        let maxIter = 300;
        let themeId = 0;
        let pathId = 0;
        let animSpeed = 1.0;
        let paused = false;
        let dragging = false, dragSX = 0, dragSY = 0, dragCX = 0, dragCY = 0;

        // Render mini Mandelbrot overlay using 2D canvas
        const mbCanvas = document.getElementById('mbCanvas');
        const mbCtx = mbCanvas.getContext('2d');
        function renderMiniMandelbrot() {
            const w = 180, h = 180;
            const img = mbCtx.createImageData(w, h);
            for (let py = 0; py < h; py++) {
                for (let px = 0; px < w; px++) {
                    const cr = (px / w - 0.5) * 4 - 0.5;
                    const ci = (py / h - 0.5) * 4;
                    let zr = 0, zi = 0;
                    let iter = 0;
                    for (; iter < 80; iter++) {
                        const zr2 = zr * zr, zi2 = zi * zi;
                        if (zr2 + zi2 > 4) break;
                        zi = 2 * zr * zi + ci;
                        zr = zr2 - zi2 + cr;
                    }
                    const idx = (py * w + px) * 4;
                    if (iter === 80) {
                        img.data[idx] = 10; img.data[idx+1] = 10; img.data[idx+2] = 30; img.data[idx+3] = 255;
                    } else {
                        const t = iter / 80;
                        img.data[idx] = Math.floor(t * 60);
                        img.data[idx+1] = Math.floor(t * 80);
                        img.data[idx+2] = Math.floor(t * 120 + 40);
                        img.data[idx+3] = 255;
                    }
                }
            }
            mbCtx.putImageData(img, 0, 0);
        }
        renderMiniMandelbrot();

        function updateCDot(cr, ci) {
            const dot = document.getElementById('cDot');
            const px = ((cr + 0.5) / 4 + 0.5) * 180;
            const py = (ci / 4 + 0.5) * 180;
            dot.style.left = Math.min(Math.max(px, 0), 180) + 'px';
            dot.style.top = Math.min(Math.max(py, 0), 180) + 'px';
        }

        const uniformBuffer = device.createBuffer({ size: 64, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        const computeShader = `
            struct Uniforms {
                resolution: vec2f,
                center: vec2f,
                scale: f32,
                maxIter: u32,
                theme: u32,
                aspect: f32,
                juliaR: f32,
                juliaI: f32,
                time: f32,
                pad: f32,
            }

            @group(0) @binding(0) var outTex: texture_storage_2d<rgba8unorm, write>;
            @group(0) @binding(1) var<uniform> u: Uniforms;

            fn palette0(t: f32) -> vec3f {
                // Electric Twilight: purples, blues, pinks
                return vec3f(
                    0.5 + 0.5 * cos(6.2832 * (t * 1.0 + 0.0)),
                    0.3 + 0.3 * cos(6.2832 * (t * 1.0 + 0.4)),
                    0.6 + 0.4 * cos(6.2832 * (t * 0.7 + 0.7))
                );
            }

            fn palette1(t: f32) -> vec3f {
                // Molten Gold
                return vec3f(
                    min(t * 2.5, 1.0),
                    min(t * 1.5, 0.85) * 0.8,
                    max(0.0, t * 3.0 - 2.0) * 0.3
                );
            }

            fn palette2(t: f32) -> vec3f {
                // Frozen: whites, light blues, ice
                return vec3f(
                    0.6 + 0.4 * cos(6.2832 * (t * 0.5 + 0.5)),
                    0.7 + 0.3 * cos(6.2832 * (t * 0.5 + 0.3)),
                    0.8 + 0.2 * cos(6.2832 * (t * 0.3 + 0.0))
                );
            }

            fn palette3(t: f32) -> vec3f {
                // Nebula: deep space colors
                return vec3f(
                    0.4 + 0.4 * cos(6.2832 * (t * 1.2 + 0.1)),
                    0.2 + 0.3 * cos(6.2832 * (t * 0.8 + 0.6)),
                    0.5 + 0.5 * cos(6.2832 * (t * 0.6 + 0.9))
                );
            }

            @compute @workgroup_size(8, 8)
            fn main(@builtin(global_invocation_id) id: vec3u) {
                let w = u32(u.resolution.x);
                let h = u32(u.resolution.y);
                if (id.x >= w || id.y >= h) { return; }

                let px = (f32(id.x) / u.resolution.x - 0.5) * u.scale * u.aspect;
                let py = (f32(id.y) / u.resolution.y - 0.5) * u.scale;

                // Julia set: z starts at pixel position, c is the parameter
                var zr = u.center.x + px;
                var zi = u.center.y + py;
                let cr = u.juliaR;
                let ci = u.juliaI;

                var iter = 0u;
                for (var i = 0u; i < u.maxIter; i++) {
                    let zr2 = zr * zr;
                    let zi2 = zi * zi;
                    if (zr2 + zi2 > 256.0) { break; }
                    zi = 2.0 * zr * zi + ci;
                    zr = zr2 - zi2 + cr;
                    iter = i + 1u;
                }

                var color: vec3f;
                if (iter >= u.maxIter) {
                    // Interior: subtle glow based on final magnitude
                    let mag = sqrt(zr * zr + zi * zi);
                    let glow = exp(-mag * 0.5) * 0.08;
                    color = vec3f(glow * 0.3, glow * 0.1, glow * 0.5);
                } else {
                    // Smooth coloring
                    let mag2 = zr * zr + zi * zi;
                    let logMag = log2(mag2) * 0.5;
                    let smooth_iter = f32(iter) + 1.0 - log2(max(logMag, 0.001));
                    let t = fract(smooth_iter / 40.0);

                    if (u.theme == 0u) { color = palette0(t); }
                    else if (u.theme == 1u) { color = palette1(t); }
                    else if (u.theme == 2u) { color = palette2(t); }
                    else { color = palette3(t); }

                    // Glow effect: brighter near set boundary
                    let proximity = 1.0 - f32(iter) / f32(u.maxIter);
                    let glowAmount = pow(proximity, 3.0) * 0.4;
                    color += vec3f(glowAmount);
                }

                textureStore(outTex, vec2i(id.xy), vec4f(color, 1.0));
            }
        `;

        const displayShader = `
            @group(0) @binding(0) var tex: texture_2d<f32>;
            @group(0) @binding(1) var samp: sampler;
            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VSOut {
                var p = array<vec2f,4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var u = array<vec2f,4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var o: VSOut; o.pos = vec4f(p[i], 0, 1); o.uv = u[i]; return o;
            }
            @fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                return textureSample(tex, samp, uv);
            }
        `;

        const outTexture = device.createTexture({
            size: [W, H], format: 'rgba8unorm',
            usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING
        });

        const computePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: computeShader }), entryPoint: 'main' }
        });

        const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });

        const displayPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: device.createShaderModule({ code: displayShader }), entryPoint: 'vs' },
            fragment: { module: device.createShaderModule({ code: displayShader }), entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-strip' }
        });

        const computeBG = device.createBindGroup({
            layout: computePipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: { buffer: uniformBuffer } }
            ]
        });

        const displayBG = device.createBindGroup({
            layout: displayPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: sampler }
            ]
        });

        // c-parameter path functions
        function getCParam(t, pathType) {
            switch (pathType) {
                case 0: // Figure-8
                    return [0.7885 * Math.cos(t), 0.7885 * Math.sin(t)];
                case 1: // Cardioid orbit - traces the Mandelbrot boundary
                    return [
                        0.25 * (2 * Math.cos(t) - Math.cos(2*t)),
                        0.25 * (2 * Math.sin(t) - Math.sin(2*t))
                    ];
                case 2: // Spiral: spiraling inward
                    const r = 0.7885 * (1 - 0.3 * Math.sin(t * 0.3));
                    return [r * Math.cos(t), r * Math.sin(t)];
                case 3: // Random walk through beautiful Julia c values
                    const presets = [
                        [-0.7, 0.27015], [0.355, 0.355], [-0.54, 0.54],
                        [0.355534, -0.337292], [-0.4, 0.6], [0.285, 0.01],
                        [-0.8, 0.156], [-0.1, 0.651], [0.0, -0.8],
                        [-0.75, 0.11], [-0.1, 0.956], [0.28, 0.008]
                    ];
                    const idx = Math.floor(t * 0.3) % presets.length;
                    const next = (idx + 1) % presets.length;
                    const blend = (t * 0.3) % 1;
                    const smooth = blend * blend * (3 - 2 * blend); // smoothstep
                    return [
                        presets[idx][0] * (1 - smooth) + presets[next][0] * smooth,
                        presets[idx][1] * (1 - smooth) + presets[next][1] * smooth
                    ];
                default:
                    return [0.7885 * Math.cos(t), 0.7885 * Math.sin(t)];
            }
        }

        let fpsC = 0, fpsT = performance.now();
        let startTime = performance.now();
        let animTime = 0;

        function frame() {
            requestAnimationFrame(frame);
            const now = performance.now();
            const dt = (now - (fpsT > 0 ? now - 1 : fpsT)) * 0.001;
            fpsC++;
            if (now - fpsT > 500) {
                document.getElementById('fps').textContent = Math.round(fpsC / ((now - fpsT) / 1000));
                fpsC = 0; fpsT = now;
            }

            if (!paused) {
                animTime += 0.008 * animSpeed;
            }

            const [cr, ci] = getCParam(animTime, pathId);
            updateCDot(cr, ci);

            const cStr = (cr >= 0 ? ' ' : '') + cr.toFixed(4) + (ci >= 0 ? ' + ' : ' - ') + Math.abs(ci).toFixed(4) + 'i';
            document.getElementById('cValue').textContent = cStr;
            document.getElementById('zoomDisplay').textContent = zoomLevel < 1e6 ? zoomLevel.toFixed(2) : zoomLevel.toExponential(3);

            const scale = 4.0 / zoomLevel;
            const aspect = W / H;

            const buf = new ArrayBuffer(64);
            const f32 = new Float32Array(buf);
            const u32 = new Uint32Array(buf);
            f32[0] = W; f32[1] = H;
            f32[2] = centerX; f32[3] = centerY;
            f32[4] = scale;
            u32[5] = maxIter;
            u32[6] = themeId;
            f32[7] = aspect;
            f32[8] = cr;
            f32[9] = ci;
            f32[10] = animTime;

            device.queue.writeBuffer(uniformBuffer, 0, buf);

            const enc = device.createCommandEncoder();
            const cp = enc.beginComputePass();
            cp.setPipeline(computePipeline);
            cp.setBindGroup(0, computeBG);
            cp.dispatchWorkgroups(Math.ceil(W / 8), Math.ceil(H / 8));
            cp.end();

            const rp = enc.beginRenderPass({
                colorAttachments: [{ view: context.getCurrentTexture().createView(), loadOp: 'clear', storeOp: 'store' }]
            });
            rp.setPipeline(displayPipeline);
            rp.setBindGroup(0, displayBG);
            rp.draw(4);
            rp.end();

            device.queue.submit([enc.finish()]);
        }

        // Scroll zoom
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) / rect.width;
            const my = (e.clientY - rect.top) / rect.height;
            const scale = 4.0 / zoomLevel;
            const aspect = W / H;
            const cx = centerX + (mx - 0.5) * scale * aspect;
            const cy = centerY + (my - 0.5) * scale;
            const factor = e.deltaY > 0 ? 0.85 : 1.18;
            zoomLevel *= factor;
            const newScale = 4.0 / zoomLevel;
            centerX = cx - (mx - 0.5) * newScale * aspect;
            centerY = cy - (my - 0.5) * newScale;
            document.getElementById('zoom').value = Math.min(zoomLevel, 10);
            document.getElementById('zoomVal').textContent = zoomLevel.toFixed(1);
        }, { passive: false });

        // Pan
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) { dragging = true; dragSX = e.clientX; dragSY = e.clientY; dragCX = centerX; dragCY = centerY; }
        });
        window.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            const scale = 4.0 / zoomLevel;
            const aspect = W / H;
            centerX = dragCX - (e.clientX - dragSX) / W * scale * aspect;
            centerY = dragCY - (e.clientY - dragSY) / H * scale;
        });
        window.addEventListener('mouseup', () => { dragging = false; });

        // Controls
        document.getElementById('speed').addEventListener('input', (e) => {
            animSpeed = parseFloat(e.target.value);
            document.getElementById('speedVal').textContent = animSpeed.toFixed(1);
        });
        document.getElementById('maxIter').addEventListener('input', (e) => {
            maxIter = parseInt(e.target.value);
            document.getElementById('iterVal').textContent = maxIter;
        });
        document.getElementById('zoom').addEventListener('input', (e) => {
            zoomLevel = parseFloat(e.target.value);
            document.getElementById('zoomVal').textContent = zoomLevel.toFixed(1);
        });
        document.getElementById('theme').addEventListener('change', (e) => { themeId = parseInt(e.target.value); });
        document.getElementById('path').addEventListener('change', (e) => {
            pathId = parseInt(e.target.value);
            animTime = 0;
        });

        window.togglePause = () => {
            paused = !paused;
            document.querySelector('.controls .row button:first-child').textContent = paused ? 'Resume' : 'Pause';
        };

        window.resetView = () => {
            centerX = 0; centerY = 0;
            zoomLevel = 1.0;
            document.getElementById('zoom').value = 1.0;
            document.getElementById('zoomVal').textContent = '1.0';
        };

        requestAnimationFrame(frame);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
