<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voronoi JFA - Jump Flood Algorithm</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #3d4423;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(138,154,91,0.3);
            z-index: 100;
            min-width: 260px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        h1 {
            font-family: 'Lora', serif;
            font-size: 1.3em;
            color: #606C38;
            margin-bottom: 15px;
        }
        .slider-group { margin-bottom: 12px; }
        .slider-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 0.85em;
            color: #606C38;
        }
        .slider-group input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: #d4d4aa;
            border-radius: 3px;
            outline: none;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            background: #8A9A5B;
            border-radius: 50%;
            cursor: pointer;
        }
        .modes {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .mode-btn {
            padding: 5px 10px;
            background: rgba(138,154,91,0.15);
            border: 1px solid rgba(138,154,91,0.3);
            border-radius: 8px;
            color: #606C38;
            font-size: 0.8em;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: all 0.2s;
        }
        .mode-btn:hover, .mode-btn.active {
            background: #8A9A5B;
            color: #fff;
            border-color: #8A9A5B;
        }
        .stats {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(138,154,91,0.2);
            font-size: 0.82em;
            color: #606C38;
        }
        .stats div { margin-bottom: 2px; }
        .back-link {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #606C38;
            text-decoration: none;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9em;
            z-index: 100;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid rgba(138,154,91,0.3);
            transition: all 0.2s;
        }
        .back-link:hover { background: rgba(138,154,91,0.2); }
        .error-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(188,108,37,0.95);
            color: #fff;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            max-width: 420px;
            font-family: 'Nunito', sans-serif;
        }
        .error-msg h2 { font-family: 'Lora', serif; margin-bottom: 10px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <h1>Voronoi JFA</h1>
        <div class="slider-group">
            <label>Seeds <span id="seedsVal">100</span></label>
            <input type="range" id="numSeeds" min="10" max="200" step="10" value="100">
        </div>
        <div class="slider-group">
            <label>Speed <span id="speedVal">1.0</span></label>
            <input type="range" id="speed" min="0" max="3" step="0.1" value="1.0">
        </div>
        <div class="modes">
            <button class="mode-btn active" data-mode="0">Colored Cells</button>
            <button class="mode-btn" data-mode="1">Distance Field</button>
            <button class="mode-btn" data-mode="2">Cell Outlines</button>
        </div>
        <div class="stats">
            <div>Seeds: <span id="seedCount">100</span></div>
            <div>Frame: <span id="frameTime">0</span> ms</div>
            <div>FPS: <span id="fps">0</span></div>
        </div>
    </div>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>

    <script type="module">
        const canvas = document.getElementById('canvas');

        if (!navigator.gpu) {
            document.body.innerHTML = '<div class="error-msg"><h2>WebGPU Not Supported</h2><p>Your browser does not support WebGPU. Try Chrome 113+ or Edge 113+.</p></div>';
            throw new Error('WebGPU not supported');
        }

        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) {
            document.body.innerHTML = '<div class="error-msg"><h2>No WebGPU Adapter</h2><p>Could not get a WebGPU adapter.</p></div>';
            throw new Error('No adapter');
        }
        const device = await adapter.requestDevice();
        const ctx = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();

        let W, H;
        function resize() {
            W = Math.min(window.innerWidth, 2048);
            H = Math.min(window.innerHeight, 2048);
            canvas.width = W;
            canvas.height = H;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.configure({ device, format, alphaMode: 'opaque' });
        }
        resize();
        window.addEventListener('resize', resize);

        let numSeeds = 100;
        let mode = 0;
        let speedMult = 1.0;

        // Seed data: x, y, r, g, b, pad, pad, pad (8 floats per seed)
        const MAX_SEEDS = 200;
        const seedCPU = new Float32Array(MAX_SEEDS * 4); // x, y, vx, vy
        const seedColorCPU = new Float32Array(MAX_SEEDS * 4); // r, g, b, a

        function initSeeds() {
            for (let i = 0; i < MAX_SEEDS; i++) {
                seedCPU[i * 4 + 0] = Math.random();
                seedCPU[i * 4 + 1] = Math.random();
                seedCPU[i * 4 + 2] = (Math.random() - 0.5) * 0.3;
                seedCPU[i * 4 + 3] = (Math.random() - 0.5) * 0.3;
                const h = Math.random() * 360;
                const s = 0.6 + Math.random() * 0.4;
                const l = 0.4 + Math.random() * 0.3;
                const c = (1 - Math.abs(2 * l - 1)) * s;
                const x = c * (1 - Math.abs((h / 60) % 2 - 1));
                const m = l - c / 2;
                let r, g, b;
                if (h < 60) { r=c;g=x;b=0; }
                else if (h < 120) { r=x;g=c;b=0; }
                else if (h < 180) { r=0;g=c;b=x; }
                else if (h < 240) { r=0;g=x;b=c; }
                else if (h < 300) { r=x;g=0;b=c; }
                else { r=c;g=0;b=x; }
                seedColorCPU[i * 4 + 0] = r + m;
                seedColorCPU[i * 4 + 1] = g + m;
                seedColorCPU[i * 4 + 2] = b + m;
                seedColorCPU[i * 4 + 3] = 1.0;
            }
        }
        initSeeds();

        // GPU buffers for seed positions + velocities
        const seedBuf = device.createBuffer({ size: seedCPU.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        const seedColorBuf = device.createBuffer({ size: seedColorCPU.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        device.queue.writeBuffer(seedBuf, 0, seedCPU);
        device.queue.writeBuffer(seedColorBuf, 0, seedColorCPU);

        // JFA textures: store closest seed index per pixel
        // We use two textures for ping-pong. Each pixel stores (seedIndex as f32, distance, 0, 0)
        // Actually, JFA stores closest seed coords. Let's store (seedX_pixel, seedY_pixel, seedIndex, dist)
        // as rgba32float
        function createJFATextures() {
            const desc = {
                size: [W, H],
                format: 'rgba32float',
                usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING,
            };
            return [device.createTexture(desc), device.createTexture(desc)];
        }
        let jfaTex = createJFATextures();

        // Uniform buffer
        const uniformData = new Float32Array(8); // W, H, numSeeds, mode, stepSize, time, 0, 0
        const uniformBuf = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        // --- SEED INIT COMPUTE: write seed positions into JFA texture ---
        const seedInitShader = device.createShaderModule({ code: `
            struct Uniforms { width: f32, height: f32, numSeeds: f32, mode: f32, stepSize: f32, time: f32, p1: f32, p2: f32 }
            @group(0) @binding(0) var output: texture_storage_2d<rgba32float, write>;
            @group(0) @binding(1) var<storage, read> seeds: array<vec4f>;
            @group(0) @binding(2) var<uniform> u: Uniforms;

            @compute @workgroup_size(16, 16)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let x = gid.x;
                let y = gid.y;
                let w = u32(u.width);
                let h = u32(u.height);
                if (x >= w || y >= h) { return; }
                // Initialize with "no seed" sentinel (-1)
                textureStore(output, vec2u(x, y), vec4f(-1.0, -1.0, -1.0, 1e10));
            }

            @compute @workgroup_size(64)
            fn seedWrite(@builtin(global_invocation_id) gid: vec3u) {
                let idx = gid.x;
                if (idx >= u32(u.numSeeds)) { return; }
                let s = seeds[idx];
                let px = u32(s.x * u.width);
                let py = u32(s.y * u.height);
                let w = u32(u.width);
                let h = u32(u.height);
                if (px < w && py < h) {
                    textureStore(output, vec2u(px, py), vec4f(f32(px), f32(py), f32(idx), 0.0));
                }
            }
        `});

        const seedInitClearPipeline = device.createComputePipeline({ layout: 'auto', compute: { module: seedInitShader, entryPoint: 'main' } });
        const seedWritePipeline = device.createComputePipeline({ layout: 'auto', compute: { module: seedInitShader, entryPoint: 'seedWrite' } });

        // --- JFA STEP COMPUTE ---
        const jfaStepShader = device.createShaderModule({ code: `
            struct Uniforms { width: f32, height: f32, numSeeds: f32, mode: f32, stepSize: f32, time: f32, p1: f32, p2: f32 }
            @group(0) @binding(0) var input: texture_storage_2d<rgba32float, read>;
            @group(0) @binding(1) var output: texture_storage_2d<rgba32float, write>;
            @group(0) @binding(2) var<uniform> u: Uniforms;

            @compute @workgroup_size(16, 16)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let x = i32(gid.x);
                let y = i32(gid.y);
                let w = i32(u.width);
                let h = i32(u.height);
                if (x >= w || y >= h) { return; }

                let step = i32(u.stepSize);
                var bestSeedX = -1.0;
                var bestSeedY = -1.0;
                var bestIdx = -1.0;
                var bestDist = 1e10;

                for (var dy = -1; dy <= 1; dy++) {
                    for (var dx = -1; dx <= 1; dx++) {
                        let nx = x + dx * step;
                        let ny = y + dy * step;
                        if (nx < 0 || nx >= w || ny < 0 || ny >= h) { continue; }
                        let val = textureLoad(input, vec2u(u32(nx), u32(ny)));
                        if (val.z < 0.0) { continue; } // no seed
                        let sdx = f32(x) - val.x;
                        let sdy = f32(y) - val.y;
                        let d = sdx * sdx + sdy * sdy;
                        if (d < bestDist) {
                            bestDist = d;
                            bestSeedX = val.x;
                            bestSeedY = val.y;
                            bestIdx = val.z;
                        }
                    }
                }
                textureStore(output, vec2u(u32(x), u32(y)), vec4f(bestSeedX, bestSeedY, bestIdx, bestDist));
            }
        `});

        const jfaStepPipeline = device.createComputePipeline({ layout: 'auto', compute: { module: jfaStepShader, entryPoint: 'main' } });

        // --- RENDER FULLSCREEN QUAD ---
        const renderShader = device.createShaderModule({ code: `
            struct Uniforms { width: f32, height: f32, numSeeds: f32, mode: f32, stepSize: f32, time: f32, p1: f32, p2: f32 }
            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }

            @group(0) @binding(0) var jfaTex: texture_2d<f32>;
            @group(0) @binding(1) var<storage, read> seedColors: array<vec4f>;
            @group(0) @binding(2) var<uniform> u: Uniforms;

            @vertex
            fn vs(@builtin(vertex_index) vi: u32) -> VSOut {
                var pos = array<vec2f, 6>(
                    vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1),
                    vec2f(-1,1), vec2f(1,-1), vec2f(1,1)
                );
                var out: VSOut;
                out.pos = vec4f(pos[vi], 0, 1);
                out.uv = pos[vi] * 0.5 + 0.5;
                return out;
            }

            @fragment
            fn fs(in: VSOut) -> @location(0) vec4f {
                let px = u32(in.uv.x * u.width);
                let py = u32((1.0 - in.uv.y) * u.height);
                let val = textureLoad(jfaTex, vec2u(px, py), 0);
                let seedIdx = i32(val.z);

                if (seedIdx < 0) { return vec4f(0.98, 0.98, 0.88, 1.0); }

                let dist = sqrt(val.w);
                let maxDim = max(u.width, u.height);

                // Check for edges: compare with neighbors
                var isEdge = false;
                if (px > 0u) {
                    let left = textureLoad(jfaTex, vec2u(px - 1u, py), 0);
                    if (i32(left.z) != seedIdx) { isEdge = true; }
                }
                if (py > 0u) {
                    let up = textureLoad(jfaTex, vec2u(px, py - 1u), 0);
                    if (i32(up.z) != seedIdx) { isEdge = true; }
                }

                let color = seedColors[seedIdx];
                let mode = i32(u.mode);

                if (mode == 0) {
                    // Colored cells
                    var c = color.rgb;
                    if (isEdge) { c = c * 0.3; }
                    return vec4f(c, 1.0);
                } else if (mode == 1) {
                    // Distance field grayscale
                    let d = dist / maxDim * 4.0;
                    let g = 1.0 - clamp(d, 0.0, 1.0);
                    return vec4f(vec3f(g), 1.0);
                } else {
                    // Cell outlines only
                    if (isEdge) {
                        return vec4f(0.376, 0.424, 0.220, 1.0); // moss color
                    }
                    return vec4f(0.996, 0.980, 0.878, 1.0); // cream bg
                }
            }
        `});

        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: renderShader, entryPoint: 'vs' },
            fragment: { module: renderShader, entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-list' },
        });

        // Update seed positions on CPU (sinusoidal motion)
        let time = 0;
        function updateSeeds(dt) {
            time += dt * speedMult;
            for (let i = 0; i < MAX_SEEDS; i++) {
                const base = i * 4;
                seedCPU[base + 0] += seedCPU[base + 2] * dt * speedMult;
                seedCPU[base + 1] += seedCPU[base + 3] * dt * speedMult;
                // Add sinusoidal wobble
                seedCPU[base + 0] += Math.sin(time * 2.0 + i * 0.7) * 0.0005;
                seedCPU[base + 1] += Math.cos(time * 1.5 + i * 1.1) * 0.0005;
                // Bounce
                if (seedCPU[base + 0] < 0) { seedCPU[base + 0] = 0; seedCPU[base + 2] *= -1; }
                if (seedCPU[base + 0] > 1) { seedCPU[base + 0] = 1; seedCPU[base + 2] *= -1; }
                if (seedCPU[base + 1] < 0) { seedCPU[base + 1] = 0; seedCPU[base + 3] *= -1; }
                if (seedCPU[base + 1] > 1) { seedCPU[base + 1] = 1; seedCPU[base + 3] *= -1; }
            }
            device.queue.writeBuffer(seedBuf, 0, seedCPU);
        }

        // UI
        document.getElementById('numSeeds').addEventListener('input', e => {
            numSeeds = parseInt(e.target.value);
            document.getElementById('seedsVal').textContent = numSeeds;
            document.getElementById('seedCount').textContent = numSeeds;
        });
        document.getElementById('speed').addEventListener('input', e => {
            speedMult = parseFloat(e.target.value);
            document.getElementById('speedVal').textContent = speedMult.toFixed(1);
        });
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                mode = parseInt(btn.dataset.mode);
            });
        });

        // FPS
        let lastTime = performance.now();
        let frameCount = 0;
        let fpsAccum = 0;

        function render() {
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            frameCount++;
            fpsAccum += dt;
            if (fpsAccum >= 1.0) {
                document.getElementById('fps').textContent = Math.round(frameCount / fpsAccum);
                frameCount = 0;
                fpsAccum = 0;
            }

            updateSeeds(Math.min(dt, 0.05));

            // Recreate JFA textures if size changed
            if (jfaTex[0].width !== W || jfaTex[0].height !== H) {
                jfaTex[0].destroy();
                jfaTex[1].destroy();
                jfaTex = createJFATextures();
            }

            const frameStart = performance.now();

            // Update uniforms
            uniformData[0] = W; uniformData[1] = H;
            uniformData[2] = numSeeds; uniformData[3] = mode;
            uniformData[4] = 0; uniformData[5] = time;
            device.queue.writeBuffer(uniformBuf, 0, uniformData);

            const enc = device.createCommandEncoder();

            // 1) Clear JFA texture
            const clearBG = device.createBindGroup({
                layout: seedInitClearPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: jfaTex[0].createView() },
                    { binding: 1, resource: { buffer: seedBuf } },
                    { binding: 2, resource: { buffer: uniformBuf } },
                ],
            });
            const clearPass = enc.beginComputePass();
            clearPass.setPipeline(seedInitClearPipeline);
            clearPass.setBindGroup(0, clearBG);
            clearPass.dispatchWorkgroups(Math.ceil(W / 16), Math.ceil(H / 16));
            clearPass.end();

            // 2) Write seeds
            const writeBG = device.createBindGroup({
                layout: seedWritePipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: jfaTex[0].createView() },
                    { binding: 1, resource: { buffer: seedBuf } },
                    { binding: 2, resource: { buffer: uniformBuf } },
                ],
            });
            const writePass = enc.beginComputePass();
            writePass.setPipeline(seedWritePipeline);
            writePass.setBindGroup(0, writeBG);
            writePass.dispatchWorkgroups(Math.ceil(numSeeds / 64));
            writePass.end();

            // 3) JFA passes: step sizes from N/2 down to 1
            let maxDim = Math.max(W, H);
            let stepSize = 1;
            while (stepSize < maxDim) stepSize *= 2;
            stepSize = Math.floor(stepSize / 2);

            let src = 0;
            while (stepSize >= 1) {
                const dst = 1 - src;
                uniformData[4] = stepSize;
                device.queue.writeBuffer(uniformBuf, 0, uniformData);

                const jfaBG = device.createBindGroup({
                    layout: jfaStepPipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: jfaTex[src].createView() },
                        { binding: 1, resource: jfaTex[dst].createView() },
                        { binding: 2, resource: { buffer: uniformBuf } },
                    ],
                });
                const pass = enc.beginComputePass();
                pass.setPipeline(jfaStepPipeline);
                pass.setBindGroup(0, jfaBG);
                pass.dispatchWorkgroups(Math.ceil(W / 16), Math.ceil(H / 16));
                pass.end();

                src = dst;
                stepSize = Math.floor(stepSize / 2);
            }

            // 4) Render
            const renderBG = device.createBindGroup({
                layout: renderPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: jfaTex[src].createView() },
                    { binding: 1, resource: { buffer: seedColorBuf } },
                    { binding: 2, resource: { buffer: uniformBuf } },
                ],
            });
            const rp = enc.beginRenderPass({
                colorAttachments: [{
                    view: ctx.getCurrentTexture().createView(),
                    loadOp: 'clear',
                    storeOp: 'store',
                    clearValue: { r: 0.996, g: 0.98, b: 0.878, a: 1 },
                }],
            });
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, renderBG);
            rp.draw(6);
            rp.end();

            device.queue.submit([enc.finish()]);

            const frameEnd = performance.now();
            document.getElementById('frameTime').textContent = (frameEnd - frameStart).toFixed(1);

            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
