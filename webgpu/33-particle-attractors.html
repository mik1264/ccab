<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strange Attractor Fields - WebGPU</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a08;
            color: #FEFAE0;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls {
            position: fixed; top: 20px; left: 20px;
            background: rgba(30,30,24,0.85);
            backdrop-filter: blur(12px);
            padding: 18px; border-radius: 16px;
            border: 1px solid rgba(138,154,91,0.3);
            z-index: 100; min-width: 260px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 { font-family: 'Lora', serif; font-size: 1.2em; color: #8A9A5B; margin-bottom: 12px; }
        .modes { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .mode-btn {
            padding: 5px 10px;
            background: rgba(138,154,91,0.15);
            border: 1px solid rgba(138,154,91,0.3);
            border-radius: 8px; color: #8A9A5B;
            font-size: 0.78em; cursor: pointer;
            font-family: 'Nunito', sans-serif; transition: all 0.2s;
        }
        .mode-btn:hover, .mode-btn.active {
            background: #8A9A5B; color: #0a0a08; border-color: #8A9A5B;
        }
        .slider-group { margin-bottom: 10px; }
        .slider-group label {
            display: flex; justify-content: space-between;
            margin-bottom: 3px; font-size: 0.82em; color: #8A9A5B;
        }
        .slider-group input[type="range"] {
            width: 100%; height: 6px; -webkit-appearance: none;
            background: #333; border-radius: 3px; outline: none;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            background: #8A9A5B; border-radius: 50%; cursor: pointer;
        }
        .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn {
            flex: 1; padding: 7px; border: none; border-radius: 8px;
            background: #8A9A5B; color: #0a0a08; cursor: pointer;
            font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.82em; transition: all 0.2s;
        }
        .btn:hover { background: #606C38; color: #FEFAE0; }
        .stats {
            margin-top: 10px; padding-top: 10px;
            border-top: 1px solid rgba(138,154,91,0.2);
            font-size: 0.82em; color: #8A9A5B;
        }
        .stats div { margin-bottom: 2px; }
        .back-link {
            position: fixed; top: 20px; right: 20px;
            color: #8A9A5B; text-decoration: none;
            font-family: 'Nunito', sans-serif; font-size: 0.9em; z-index: 100;
            background: rgba(30,30,24,0.7); backdrop-filter: blur(8px);
            padding: 8px 16px; border-radius: 10px;
            border: 1px solid rgba(138,154,91,0.3); transition: all 0.2s;
        }
        .back-link:hover { background: rgba(138,154,91,0.2); }
        .error-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(188,108,37,0.95); color: #fff; padding: 30px;
            border-radius: 16px; text-align: center; max-width: 420px;
            font-family: 'Nunito', sans-serif;
        }
        .error-msg h2 { font-family: 'Lora', serif; margin-bottom: 10px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <h1>Strange Attractors</h1>
        <div class="modes">
            <button class="mode-btn active" data-type="lorenz">Lorenz</button>
            <button class="mode-btn" data-type="rossler">Rossler</button>
            <button class="mode-btn" data-type="dadras">Dadras</button>
        </div>
        <div class="slider-group">
            <label>Particles <span id="partVal">500K</span></label>
            <input type="range" id="particles" min="100000" max="1000000" step="100000" value="500000">
        </div>
        <div class="slider-group">
            <label>Trail Fade <span id="fadeVal">0.98</span></label>
            <input type="range" id="fade" min="0.90" max="0.999" step="0.001" value="0.98">
        </div>
        <div class="slider-group">
            <label>Time Step <span id="dtVal">0.003</span></label>
            <input type="range" id="dt" min="0.0005" max="0.01" step="0.0005" value="0.003">
        </div>
        <div class="btn-row">
            <button class="btn" id="resetBtn">Reset</button>
        </div>
        <div class="stats">
            <div>Particles: <span id="count">500,000</span></div>
            <div>FPS: <span id="fps">0</span></div>
        </div>
    </div>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>

    <script type="module">
        const canvas = document.getElementById('canvas');

        if (!navigator.gpu) {
            document.body.innerHTML = '<div class="error-msg"><h2>WebGPU Not Supported</h2><p>Your browser does not support WebGPU. Try Chrome 113+ or Edge 113+.</p></div>';
            throw new Error('WebGPU not supported');
        }

        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) throw new Error('No adapter');
        const device = await adapter.requestDevice();
        const ctxGPU = canvas.getContext('webgpu');
        const presentFormat = navigator.gpu.getPreferredCanvasFormat();

        function resize() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
            ctxGPU.configure({ device, format: presentFormat, alphaMode: 'opaque' });
        }
        resize();
        window.addEventListener('resize', resize);

        let NUM_PARTICLES = 500000;
        let trailFade = 0.98;
        let dtParam = 0.003;
        let attractorType = 0; // 0=Lorenz, 1=Rossler, 2=Dadras

        // Particle data: x, y, z, speed
        function createParticles(n) {
            const data = new Float32Array(n * 4);
            for (let i = 0; i < n; i++) {
                // Random positions near attractor center
                data[i * 4] = (Math.random() - 0.5) * 40;
                data[i * 4 + 1] = (Math.random() - 0.5) * 40;
                data[i * 4 + 2] = (Math.random() - 0.5) * 40 + 25;
                data[i * 4 + 3] = 0; // speed
            }
            return data;
        }

        let particleData = createParticles(NUM_PARTICLES);

        const MAX_PARTICLES = 1000000;
        const particleBuf = device.createBuffer({
            size: MAX_PARTICLES * 16,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.VERTEX,
        });
        device.queue.writeBuffer(particleBuf, 0, particleData);

        // Uniforms: width, height, dt, fade, type, numParticles, time, pad
        const uniformData = new Float32Array(8);
        const uniformBuf = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        // Compute shader: integrate attractor equations
        const computeShader = device.createShaderModule({ code: `
            struct Uniforms { width: f32, height: f32, dt: f32, fade: f32, atype: f32, numP: f32, time: f32, pad: f32 }

            @group(0) @binding(0) var<storage, read_write> particles: array<vec4f>;
            @group(0) @binding(1) var<uniform> u: Uniforms;

            @compute @workgroup_size(256)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let idx = gid.x;
                if (idx >= u32(u.numP)) { return; }

                var p = particles[idx];
                let x = p.x;
                let y = p.y;
                let z = p.z;
                let dt = u.dt;

                var dx = 0.0; var dy = 0.0; var dz = 0.0;

                if (u.atype < 0.5) {
                    // Lorenz: sigma=10, rho=28, beta=8/3
                    let sigma = 10.0;
                    let rho = 28.0;
                    let beta = 2.6667;
                    dx = sigma * (y - x);
                    dy = x * (rho - z) - y;
                    dz = x * y - beta * z;
                } else if (u.atype < 1.5) {
                    // Rossler: a=0.2, b=0.2, c=5.7
                    let a = 0.2;
                    let b = 0.2;
                    let c = 5.7;
                    dx = -y - z;
                    dy = x + a * y;
                    dz = b + z * (x - c);
                } else {
                    // Dadras: p=3, q=2.7, r=1.7, s=2, e=9
                    let pp = 3.0;
                    let q = 2.7;
                    let r = 1.7;
                    let s = 2.0;
                    let e = 9.0;
                    dx = y - pp * x + q * y * z;
                    dy = r * y - x * z + z;
                    dz = s * x * y - e * z;
                }

                let nx = x + dx * dt;
                let ny = y + dy * dt;
                let nz = z + dz * dt;

                // Speed for coloring
                let speed = sqrt(dx * dx + dy * dy + dz * dz);

                // Reset if diverged
                if (abs(nx) > 200.0 || abs(ny) > 200.0 || abs(nz) > 200.0) {
                    // Reset to near center
                    let hash = f32(idx) * 0.00137 + u.time;
                    particles[idx] = vec4f(
                        sin(hash * 7.3) * 5.0,
                        cos(hash * 11.7) * 5.0,
                        sin(hash * 3.1) * 5.0 + 25.0,
                        0.0
                    );
                    return;
                }

                particles[idx] = vec4f(nx, ny, nz, speed);
            }
        `});

        const computePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: computeShader, entryPoint: 'main' },
        });

        const computeBG = device.createBindGroup({
            layout: computePipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: particleBuf } },
                { binding: 1, resource: { buffer: uniformBuf } },
            ],
        });

        // Render: draw particles as points, color by speed
        const renderShader = device.createShaderModule({ code: `
            struct Uniforms { width: f32, height: f32, dt: f32, fade: f32, atype: f32, numP: f32, time: f32, pad: f32 }
            struct VSOut { @builtin(position) pos: vec4f, @location(0) color: vec4f }

            @group(0) @binding(0) var<uniform> u: Uniforms;

            @vertex
            fn vs(@location(0) xyz: vec3f, @location(1) speed: f32) -> VSOut {
                var out: VSOut;

                // Project 3D to 2D with simple perspective
                let scale = 0.02;
                let zOff = 30.0;
                let perspective = zOff / max(xyz.z + zOff, 1.0);
                let px = xyz.x * scale * perspective;
                let py = xyz.y * scale * perspective;

                let aspect = u.width / u.height;
                out.pos = vec4f(px / aspect, py, 0.0, 1.0);

                // Color by speed: green -> orange -> white
                let t = clamp(speed * 0.02, 0.0, 1.0);
                let r = mix(0.376, 1.0, t);
                let g = mix(0.55, 0.7, t);
                let b = mix(0.22, 0.3, sqrt(t));
                out.color = vec4f(r, g, b, 0.15 + t * 0.3);

                return out;
            }

            @fragment
            fn fs(@location(0) color: vec4f) -> @location(0) vec4f {
                return color;
            }
        `});

        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: {
                module: renderShader,
                entryPoint: 'vs',
                buffers: [{
                    arrayStride: 16,
                    attributes: [
                        { shaderLocation: 0, offset: 0, format: 'float32x3' },
                        { shaderLocation: 1, offset: 12, format: 'float32' },
                    ],
                }],
            },
            fragment: {
                module: renderShader,
                entryPoint: 'fs',
                targets: [{
                    format: presentFormat,
                    blend: {
                        color: { srcFactor: 'src-alpha', dstFactor: 'one' },
                        alpha: { srcFactor: 'one', dstFactor: 'one' },
                    },
                }],
            },
            primitive: { topology: 'point-list' },
        });

        const renderBG = device.createBindGroup({
            layout: renderPipeline.getBindGroupLayout(0),
            entries: [{ binding: 0, resource: { buffer: uniformBuf } }],
        });

        // UI
        document.getElementById('particles').addEventListener('input', e => {
            NUM_PARTICLES = parseInt(e.target.value);
            document.getElementById('partVal').textContent = (NUM_PARTICLES / 1000) + 'K';
            document.getElementById('count').textContent = NUM_PARTICLES.toLocaleString();
        });
        document.getElementById('fade').addEventListener('input', e => {
            trailFade = parseFloat(e.target.value);
            document.getElementById('fadeVal').textContent = trailFade.toFixed(3);
        });
        document.getElementById('dt').addEventListener('input', e => {
            dtParam = parseFloat(e.target.value);
            document.getElementById('dtVal').textContent = dtParam.toFixed(4);
        });
        document.getElementById('resetBtn').addEventListener('click', () => {
            particleData = createParticles(NUM_PARTICLES);
            device.queue.writeBuffer(particleBuf, 0, particleData);
        });
        document.querySelectorAll('.mode-btn').forEach((btn, i) => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                attractorType = i;
                particleData = createParticles(NUM_PARTICLES);
                device.queue.writeBuffer(particleBuf, 0, particleData);
            });
        });

        let time = 0, lastTime = performance.now(), frameCount = 0, fpsAccum = 0;

        function render() {
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            time += dt;
            frameCount++; fpsAccum += dt;
            if (fpsAccum >= 1.0) {
                document.getElementById('fps').textContent = Math.round(frameCount / fpsAccum);
                frameCount = 0; fpsAccum = 0;
            }

            uniformData[0] = canvas.width;
            uniformData[1] = canvas.height;
            uniformData[2] = dtParam;
            uniformData[3] = trailFade;
            uniformData[4] = attractorType;
            uniformData[5] = NUM_PARTICLES;
            uniformData[6] = time;
            device.queue.writeBuffer(uniformBuf, 0, uniformData);

            const enc = device.createCommandEncoder();

            // Compute
            const cp = enc.beginComputePass();
            cp.setPipeline(computePipeline);
            cp.setBindGroup(0, computeBG);
            cp.dispatchWorkgroups(Math.ceil(NUM_PARTICLES / 256));
            cp.end();

            // Render
            const rp = enc.beginRenderPass({
                colorAttachments: [{
                    view: ctxGPU.getCurrentTexture().createView(),
                    loadOp: 'clear', storeOp: 'store',
                    clearValue: { r: 0.02, g: 0.02, b: 0.015, a: 1 },
                }],
            });
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, renderBG);
            rp.setVertexBuffer(0, particleBuf);
            rp.draw(NUM_PARTICLES);
            rp.end();

            device.queue.submit([enc.finish()]);
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
