<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worley Noise - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls select { width: 168px; background: #1a1a2e; color: #e8e6e1; border: 1px solid #22d3ee; border-radius: 4px; padding: 3px; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        .title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: #22d3ee; font-size: 14px; font-weight: 600; z-index: 100; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); pointer-events: none; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to WebGPU Gallery</a>
    <div class="title">Animated Worley / Cellular Noise</div>

    <div class="controls">
        <label>Points: <span id="pointsVal">64</span></label>
        <input type="range" id="points" min="20" max="200" step="1" value="64">
        <label>Speed: <span id="speedVal">1.0</span></label>
        <input type="range" id="speed" min="0.1" max="3.0" step="0.1" value="1.0">
        <label>Scale: <span id="scaleVal">1.0</span></label>
        <input type="range" id="scale" min="0.3" max="3.0" step="0.1" value="1.0">
        <label>Visual Mode:</label>
        <select id="modeSelect">
            <option value="0">F1 (Voronoi Cells)</option>
            <option value="1">F2 - F1 (Cell Borders)</option>
            <option value="2" selected>F1 * F2 (Complex)</option>
            <option value="3">Crackle (F2/F1)</option>
        </select>
        <label>Color Mode:</label>
        <select id="colorSelect">
            <option value="0">Lava Lamp</option>
            <option value="1">Ice</option>
            <option value="2" selected>Neon</option>
            <option value="3">Organic</option>
        </select>
    </div>

    <div class="stats">
        FPS: <span id="fps">0</span> | Resolution: <span id="res">0x0</span>
    </div>

    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        const W = Math.min(window.innerWidth, 1280);
        const H = Math.min(window.innerHeight, 960);
        canvas.width = W; canvas.height = H;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        document.getElementById('res').textContent = W + 'x' + H;

        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'opaque' });

        let numPoints = 64, animSpeed = 1.0, noiseScale = 1.0, visualMode = 2, colorMode = 2;

        // Max 200 feature points, each with vec4(x,y,z,phase) + vec4(vx,vy,vz,0)
        const MAX_POINTS = 200;
        const pointsBuffer = device.createBuffer({ size: MAX_POINTS * 32, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
        const uniformBuffer = device.createBuffer({ size: 48, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        // Generate initial points in 3D unit cube
        const pointData = new Float32Array(MAX_POINTS * 8);
        for (let i = 0; i < MAX_POINTS; i++) {
            const off = i * 8;
            pointData[off] = Math.random();     // x
            pointData[off+1] = Math.random();   // y
            pointData[off+2] = Math.random();   // z
            pointData[off+3] = Math.random() * 6.28; // phase
            pointData[off+4] = (Math.random() - 0.5) * 0.3; // vx freq
            pointData[off+5] = (Math.random() - 0.5) * 0.3; // vy freq
            pointData[off+6] = (Math.random() - 0.5) * 0.3; // vz freq
            pointData[off+7] = Math.random() * 0.15 + 0.05;  // amplitude
        }
        device.queue.writeBuffer(pointsBuffer, 0, pointData);

        const shader = `
            struct Uniforms {
                resolution: vec2f,
                time: f32,
                numPoints: u32,
                scale: f32,
                visualMode: u32,
                colorMode: u32,
                pad: u32,
            }

            struct Point {
                pos: vec4f,
                vel: vec4f,
            }

            @group(0) @binding(0) var outTex: texture_storage_2d<rgba8unorm, write>;
            @group(0) @binding(1) var<uniform> u: Uniforms;
            @group(0) @binding(2) var<storage, read> points: array<Point>;

            fn getPointPos(idx: u32, t: f32) -> vec3f {
                let p = points[idx];
                let phase = p.pos.w;
                let amp = p.vel.w;
                return vec3f(
                    p.pos.x + sin(t * p.vel.x * 6.28 + phase) * amp,
                    p.pos.y + sin(t * p.vel.y * 6.28 + phase * 1.3) * amp,
                    p.pos.z + sin(t * p.vel.z * 6.28 + phase * 0.7) * amp
                );
            }

            fn lavaColor(v: f32) -> vec3f {
                let t = clamp(v, 0.0, 1.0);
                let r = smoothstep(0.0, 0.5, t) * 1.2;
                let g = smoothstep(0.2, 0.7, t) * 0.6;
                let b = smoothstep(0.5, 1.0, t) * 0.15;
                return vec3f(min(r, 1.0), min(g, 1.0), b);
            }

            fn iceColor(v: f32) -> vec3f {
                let t = clamp(v, 0.0, 1.0);
                let r = smoothstep(0.6, 1.0, t) * 0.5;
                let g = smoothstep(0.3, 0.8, t) * 0.7 + 0.05;
                let b = 0.2 + t * 0.8;
                return vec3f(r, min(g, 1.0), min(b, 1.0));
            }

            fn neonColor(v: f32) -> vec3f {
                let t = clamp(v, 0.0, 1.0);
                let pulse = t * t * t;
                let hue = t * 4.0;
                let r = max(sin(hue) * 0.5 + 0.5, 0.0) * pulse * 2.0;
                let g = max(sin(hue + 2.09) * 0.5 + 0.5, 0.0) * pulse * 2.0;
                let b = max(sin(hue + 4.18) * 0.5 + 0.5, 0.0) * pulse * 2.0;
                return vec3f(min(r, 1.0), min(g, 1.0), min(b, 1.0));
            }

            fn organicColor(v: f32) -> vec3f {
                let t = clamp(v, 0.0, 1.0);
                let r = 0.35 + smoothstep(0.0, 0.6, t) * 0.45;
                let g = 0.25 + smoothstep(0.1, 0.5, t) * 0.35;
                let b = 0.15 + smoothstep(0.3, 0.8, t) * 0.2;
                return vec3f(r, g, b);
            }

            @compute @workgroup_size(8, 8)
            fn main(@builtin(global_invocation_id) id: vec3u) {
                let w = u32(u.resolution.x);
                let h = u32(u.resolution.y);
                if (id.x >= w || id.y >= h) { return; }

                let uv = vec2f(f32(id.x) / u.resolution.x, f32(id.y) / u.resolution.y);
                let zSlice = sin(u.time * 0.3) * 0.5 + 0.5;
                let samplePos = vec3f(uv.x * u.scale, uv.y * u.scale, zSlice * u.scale);

                // Find F1 and F2 distances (two closest points)
                var d1: f32 = 999.0;
                var d2: f32 = 999.0;

                for (var i = 0u; i < u.numPoints; i++) {
                    let pp = getPointPos(i, u.time) * u.scale;
                    // Wrap distance for seamless tiling
                    var delta = samplePos - pp;
                    delta = delta - round(delta / u.scale) * u.scale;
                    let dist = length(delta);
                    if (dist < d1) {
                        d2 = d1;
                        d1 = dist;
                    } else if (dist < d2) {
                        d2 = dist;
                    }
                }

                // Normalize distances
                let maxDist = 0.5 * u.scale / sqrt(f32(u.numPoints) * 0.3);
                let f1 = d1 / maxDist;
                let f2 = d2 / maxDist;

                // Visual mode
                var value: f32;
                if (u.visualMode == 0u) {
                    value = f1;
                } else if (u.visualMode == 1u) {
                    value = (f2 - f1) * 3.0;
                } else if (u.visualMode == 2u) {
                    value = f1 * f2 * 4.0;
                } else {
                    value = (f2 / max(f1, 0.001) - 1.0) * 0.8;
                }

                value = clamp(value, 0.0, 1.0);

                // Color mode
                var color: vec3f;
                if (u.colorMode == 0u) {
                    color = lavaColor(value);
                } else if (u.colorMode == 1u) {
                    color = iceColor(value);
                } else if (u.colorMode == 2u) {
                    color = neonColor(value);
                } else {
                    color = organicColor(value);
                }

                // Gamma correction
                color = pow(color, vec3f(1.0 / 2.2));
                textureStore(outTex, vec2i(id.xy), vec4f(color, 1.0));
            }
        `;

        const displayShader = `
            @group(0) @binding(0) var tex: texture_2d<f32>;
            @group(0) @binding(1) var samp: sampler;
            struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VSOut {
                var p = array<vec2f,4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var u = array<vec2f,4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var o: VSOut; o.pos = vec4f(p[i], 0, 1); o.uv = u[i]; return o;
            }
            @fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                return textureSample(tex, samp, uv);
            }
        `;

        const outTexture = device.createTexture({
            size: [W, H], format: 'rgba8unorm',
            usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING
        });

        const computePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: shader }), entryPoint: 'main' }
        });

        const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });

        const displayPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: device.createShaderModule({ code: displayShader }), entryPoint: 'vs' },
            fragment: { module: device.createShaderModule({ code: displayShader }), entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-strip' }
        });

        const computeBG = device.createBindGroup({
            layout: computePipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: { buffer: uniformBuffer } },
                { binding: 2, resource: { buffer: pointsBuffer } }
            ]
        });

        const displayBG = device.createBindGroup({
            layout: displayPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: outTexture.createView() },
                { binding: 1, resource: sampler }
            ]
        });

        let startTime = performance.now();
        let fpsC = 0, fpsT = performance.now();

        function frame() {
            requestAnimationFrame(frame);
            const now = performance.now();
            fpsC++;
            if (now - fpsT > 500) {
                document.getElementById('fps').textContent = Math.round(fpsC / ((now - fpsT) / 1000));
                fpsC = 0; fpsT = now;
            }

            const elapsed = (now - startTime) / 1000 * animSpeed;

            const buf = new ArrayBuffer(48);
            const f = new Float32Array(buf);
            const ui = new Uint32Array(buf);
            f[0] = W; f[1] = H;
            f[2] = elapsed;
            ui[3] = numPoints;
            f[4] = noiseScale;
            ui[5] = visualMode;
            ui[6] = colorMode;

            device.queue.writeBuffer(uniformBuffer, 0, buf);

            const enc = device.createCommandEncoder();
            const cp = enc.beginComputePass();
            cp.setPipeline(computePipeline);
            cp.setBindGroup(0, computeBG);
            cp.dispatchWorkgroups(Math.ceil(W / 8), Math.ceil(H / 8));
            cp.end();

            const rp = enc.beginRenderPass({
                colorAttachments: [{ view: context.getCurrentTexture().createView(), loadOp: 'clear', storeOp: 'store' }]
            });
            rp.setPipeline(displayPipeline);
            rp.setBindGroup(0, displayBG);
            rp.draw(4);
            rp.end();

            device.queue.submit([enc.finish()]);
        }

        document.getElementById('points').addEventListener('input', (e) => {
            numPoints = parseInt(e.target.value);
            document.getElementById('pointsVal').textContent = numPoints;
        });
        document.getElementById('speed').addEventListener('input', (e) => {
            animSpeed = parseFloat(e.target.value);
            document.getElementById('speedVal').textContent = animSpeed.toFixed(1);
        });
        document.getElementById('scale').addEventListener('input', (e) => {
            noiseScale = parseFloat(e.target.value);
            document.getElementById('scaleVal').textContent = noiseScale.toFixed(1);
        });
        document.getElementById('modeSelect').addEventListener('change', (e) => {
            visualMode = parseInt(e.target.value);
        });
        document.getElementById('colorSelect').addEventListener('change', (e) => {
            colorMode = parseInt(e.target.value);
        });

        requestAnimationFrame(frame);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
