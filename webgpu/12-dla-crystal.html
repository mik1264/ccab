<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diffusion-Limited Aggregation - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 13px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; width: 100vw; height: 100vh; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 220px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 170px; }
        .controls button { margin: 3px 2px; padding: 6px 12px; background: #22d3ee; color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .controls button:hover { background: #67e8f9; }
        .controls select { background: #1a1a2e; color: #e8e6e1; border: 1px solid #22d3ee; border-radius: 4px; padding: 4px 8px; font-size: 11px; width: 100%; }
        .btn-row { display: flex; gap: 6px; margin-top: 8px; }
        .btn-row button { flex: 1; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(239, 68, 68, 0.9); padding: 20px 40px; border-radius: 8px; display: none; text-align: center; max-width: 400px; }
        .title-overlay { position: fixed; top: 70px; left: 20px; z-index: 90; }
        .title-overlay h1 { font-size: 1.4rem; color: #22d3ee; margin: 0 0 4px 0; }
        .title-overlay p { font-size: 0.85rem; color: #888; margin: 0; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to WebGPU Gallery</a>
    <div class="title-overlay">
        <h1>Diffusion-Limited Aggregation</h1>
        <p>GPU-accelerated fractal crystal growth</p>
    </div>
    <div class="controls">
        <label>Mode</label>
        <select id="mode">
            <option value="normal">Normal Growth</option>
            <option value="snowflake">Snowflake (6-fold)</option>
        </select>
        <label>Walkers per Step: <span id="wpVal">1000</span></label>
        <input type="range" id="walkersPerStep" min="100" max="5000" step="100" value="1000">
        <label>Walk Steps: <span id="wsVal">200</span></label>
        <input type="range" id="walkSteps" min="50" max="500" step="10" value="200">
        <label>Color Scheme</label>
        <select id="colorScheme">
            <option value="rainbow">Rainbow</option>
            <option value="ice">Ice Crystal</option>
            <option value="fire">Fire</option>
        </select>
        <div class="btn-row">
            <button onclick="window.resetSim()">Reset</button>
            <button onclick="window.togglePause()"><span id="pauseLabel">Pause</span></button>
        </div>
    </div>
    <div class="stats">
        FPS: <span id="fps">0</span> | Particles: <span id="particles">1</span> | Fill: <span id="fill">0.0</span>%
    </div>
    <div id="error">WebGPU is not supported in your browser.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</div>
    <canvas id="canvas"></canvas>
    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        const SIZE = 1024;
        canvas.width = SIZE; canvas.height = SIZE;
        const ctx = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        ctx.configure({ device, format, alphaMode: 'opaque' });

        let walkersPerStep = 1000, walkSteps = 200;
        let paused = false, totalParticles = 1;
        let snowflakeMode = false, colorScheme = 0;

        // Grid buffer: stores distance from seed (0 = empty, >0 = stuck with distance)
        const gridBuffer = device.createBuffer({
            size: SIZE * SIZE * 4,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
        });

        // Walker buffer: x, y, alive, seed per walker
        const MAX_WALKERS = 5000;
        const walkerBuffer = device.createBuffer({
            size: MAX_WALKERS * 16,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
        });

        // Params: walkersPerStep, walkSteps, SIZE, seed, snowflake, colorScheme, totalParticles, pad
        const paramsBuffer = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

        // Counter buffer for particle count (atomics)
        const counterBuffer = device.createBuffer({
            size: 4,
            usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST | GPUBufferUsage.COPY_SRC
        });
        const readbackBuffer = device.createBuffer({
            size: 4,
            usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST
        });

        // Render texture
        const renderTex = device.createTexture({
            size: [SIZE, SIZE], format: 'rgba8unorm',
            usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING
        });
        const sampler = device.createSampler({ magFilter: 'nearest', minFilter: 'nearest' });

        let globalSeed = 1;
        function updateParams() {
            device.queue.writeBuffer(paramsBuffer, 0, new Uint32Array([
                walkersPerStep, walkSteps, SIZE, globalSeed++,
                snowflakeMode ? 1 : 0, colorScheme, totalParticles, 0
            ]));
        }

        // DLA walker shader - each walker does random walk and tries to stick
        const walkerCode = `
            struct Params { walkersPerStep: u32, walkSteps: u32, size: u32, seed: u32, snowflake: u32, colorScheme: u32, totalParticles: u32, pad: u32 }

            @group(0) @binding(0) var<storage, read_write> grid: array<atomic<u32>>;
            @group(0) @binding(1) var<storage, read_write> counter: array<atomic<u32>>;
            @group(0) @binding(2) var<uniform> params: Params;

            fn pcg(inp: u32) -> u32 {
                var state = inp * 747796405u + 2891336453u;
                var word = ((state >> ((state >> 28u) + 4u)) ^ state) * 277803737u;
                return (word >> 22u) ^ word;
            }

            @compute @workgroup_size(256)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                if (gid.x >= params.walkersPerStep) { return; }

                let S = i32(params.size);
                let cx = S / 2;
                let cy = S / 2;
                var rng = pcg(gid.x * 1337u + params.seed * 7919u);

                // Spawn walker on circle around center
                let maxR = S / 2 - 20;
                let spawnR = f32(maxR) * 0.85;
                rng = pcg(rng);
                let angle = f32(rng) / f32(0xFFFFFFFFu) * 6.283185;
                var wx = i32(f32(cx) + cos(angle) * spawnR);
                var wy = i32(f32(cy) + sin(angle) * spawnR);

                // Random walk
                for (var step = 0u; step < params.walkSteps; step++) {
                    rng = pcg(rng);
                    let dir = rng & 3u;
                    if (dir == 0u) { wx += 1; }
                    else if (dir == 1u) { wx -= 1; }
                    else if (dir == 2u) { wy += 1; }
                    else { wy -= 1; }

                    // Bounds check - kill walker if out of bounds
                    if (wx < 1 || wx >= S - 1 || wy < 1 || wy >= S - 1) {
                        return;
                    }

                    // Check if too far from center
                    let dx = wx - cx;
                    let dy = wy - cy;
                    if (dx * dx + dy * dy > maxR * maxR) {
                        return;
                    }

                    // Check neighbors for stuck particles
                    var hasNeighbor = false;
                    let offsets = array<vec2i, 4>(vec2i(1, 0), vec2i(-1, 0), vec2i(0, 1), vec2i(0, -1));
                    for (var n = 0u; n < 4u; n++) {
                        let nx = wx + offsets[n].x;
                        let ny = wy + offsets[n].y;
                        if (nx >= 0 && nx < S && ny >= 0 && ny < S) {
                            if (atomicLoad(&grid[u32(ny) * u32(S) + u32(nx)]) > 0u) {
                                hasNeighbor = true;
                            }
                        }
                    }

                    if (hasNeighbor) {
                        // Stick!
                        let gidx = u32(wy) * u32(S) + u32(wx);
                        let dist = u32(sqrt(f32(dx * dx + dy * dy))) + 1u;

                        if (params.snowflake == 1u) {
                            // 6-fold symmetry
                            let fwx = f32(wx - cx);
                            let fwy = f32(wy - cy);
                            let r = sqrt(fwx * fwx + fwy * fwy);
                            let a = atan2(fwy, fwx);
                            for (var s = 0u; s < 6u; s++) {
                                let sa = a + f32(s) * 1.0471976; // 60 degrees
                                let sx = i32(f32(cx) + cos(sa) * r);
                                let sy = i32(f32(cy) + sin(sa) * r);
                                if (sx >= 0 && sx < S && sy >= 0 && sy < S) {
                                    atomicMax(&grid[u32(sy) * u32(S) + u32(sx)], dist);
                                }
                                // Mirror
                                let ma = -sa;
                                let mx = i32(f32(cx) + cos(ma) * r);
                                let my = i32(f32(cy) + sin(ma) * r);
                                if (mx >= 0 && mx < S && my >= 0 && my < S) {
                                    atomicMax(&grid[u32(my) * u32(S) + u32(mx)], dist);
                                }
                            }
                        } else {
                            atomicMax(&grid[gidx], dist);
                        }

                        atomicAdd(&counter[0], 1u);
                        return;
                    }
                }
            }
        `;

        // Render shader
        const renderCode = `
            struct Params { walkersPerStep: u32, walkSteps: u32, size: u32, seed: u32, snowflake: u32, colorScheme: u32, totalParticles: u32, pad: u32 }

            @group(0) @binding(0) var<storage, read> grid: array<u32>;
            @group(0) @binding(1) var outTex: texture_storage_2d<rgba8unorm, write>;
            @group(0) @binding(2) var<uniform> params: Params;

            @compute @workgroup_size(16, 16)
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let S = params.size;
                if (gid.x >= S || gid.y >= S) { return; }
                let val = grid[gid.y * S + gid.x];

                var color: vec3f;
                if (val == 0u) {
                    color = vec3f(0.02, 0.02, 0.04);
                } else {
                    let t = clamp(f32(val) / f32(S / 2), 0.0, 1.0);

                    if (params.colorScheme == 0u) {
                        // Rainbow: inner yellow -> green -> cyan -> blue -> purple -> outer magenta
                        let hue = t * 5.0;
                        if (hue < 1.0) {
                            color = mix(vec3f(1.0, 0.9, 0.2), vec3f(0.2, 1.0, 0.3), hue);
                        } else if (hue < 2.0) {
                            color = mix(vec3f(0.2, 1.0, 0.3), vec3f(0.1, 0.9, 0.9), hue - 1.0);
                        } else if (hue < 3.0) {
                            color = mix(vec3f(0.1, 0.9, 0.9), vec3f(0.2, 0.3, 1.0), hue - 2.0);
                        } else if (hue < 4.0) {
                            color = mix(vec3f(0.2, 0.3, 1.0), vec3f(0.7, 0.2, 0.9), hue - 3.0);
                        } else {
                            color = mix(vec3f(0.7, 0.2, 0.9), vec3f(1.0, 0.3, 0.6), hue - 4.0);
                        }
                    } else if (params.colorScheme == 1u) {
                        // Ice crystal: white center -> light blue -> deep blue
                        if (t < 0.3) {
                            color = mix(vec3f(1.0, 1.0, 1.0), vec3f(0.7, 0.9, 1.0), t / 0.3);
                        } else if (t < 0.7) {
                            color = mix(vec3f(0.7, 0.9, 1.0), vec3f(0.2, 0.5, 0.9), (t - 0.3) / 0.4);
                        } else {
                            color = mix(vec3f(0.2, 0.5, 0.9), vec3f(0.05, 0.1, 0.4), (t - 0.7) / 0.3);
                        }
                    } else {
                        // Fire: white center -> yellow -> orange -> red -> dark red
                        if (t < 0.2) {
                            color = mix(vec3f(1.0, 1.0, 0.9), vec3f(1.0, 0.9, 0.3), t / 0.2);
                        } else if (t < 0.5) {
                            color = mix(vec3f(1.0, 0.9, 0.3), vec3f(1.0, 0.4, 0.05), (t - 0.2) / 0.3);
                        } else if (t < 0.8) {
                            color = mix(vec3f(1.0, 0.4, 0.05), vec3f(0.7, 0.1, 0.05), (t - 0.5) / 0.3);
                        } else {
                            color = mix(vec3f(0.7, 0.1, 0.05), vec3f(0.2, 0.02, 0.02), (t - 0.8) / 0.2);
                        }
                    }
                }

                textureStore(outTex, vec2i(gid.xy), vec4f(color, 1.0));
            }
        `;

        // Display shader
        const displayCode = `
            @group(0) @binding(0) var tex: texture_2d<f32>;
            @group(0) @binding(1) var samp: sampler;
            struct VO { @builtin(position) pos: vec4f, @location(0) uv: vec2f }
            @vertex fn vs(@builtin(vertex_index) i: u32) -> VO {
                var p = array<vec2f, 4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                var u = array<vec2f, 4>(vec2f(0,1), vec2f(1,1), vec2f(0,0), vec2f(1,0));
                var o: VO; o.pos = vec4f(p[i], 0, 1); o.uv = u[i]; return o;
            }
            @fragment fn fs(@location(0) uv: vec2f) -> @location(0) vec4f {
                return textureSample(tex, samp, uv);
            }
        `;

        const walkerPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: walkerCode }), entryPoint: 'main' }
        });
        const renderPipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: renderCode }), entryPoint: 'main' }
        });
        const displayPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: device.createShaderModule({ code: displayCode }), entryPoint: 'vs' },
            fragment: { module: device.createShaderModule({ code: displayCode }), entryPoint: 'fs', targets: [{ format }] },
            primitive: { topology: 'triangle-strip' }
        });

        const walkerBindGroup = device.createBindGroup({
            layout: walkerPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: gridBuffer } },
                { binding: 1, resource: { buffer: counterBuffer } },
                { binding: 2, resource: { buffer: paramsBuffer } }
            ]
        });
        const renderBindGroup = device.createBindGroup({
            layout: renderPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: { buffer: gridBuffer } },
                { binding: 1, resource: renderTex.createView() },
                { binding: 2, resource: { buffer: paramsBuffer } }
            ]
        });
        const displayBindGroup = device.createBindGroup({
            layout: displayPipeline.getBindGroupLayout(0),
            entries: [
                { binding: 0, resource: renderTex.createView() },
                { binding: 1, resource: sampler }
            ]
        });

        function initGrid() {
            const data = new Uint32Array(SIZE * SIZE);
            // Place seed at center
            const cx = SIZE / 2, cy = SIZE / 2;
            data[cy * SIZE + cx] = 1;
            // Small cross seed for snowflake
            if (snowflakeMode) {
                for (let d = 0; d < 3; d++) {
                    data[(cy + d) * SIZE + cx] = 1;
                    data[(cy - d) * SIZE + cx] = 1;
                    data[cy * SIZE + cx + d] = 1;
                    data[cy * SIZE + cx - d] = 1;
                }
            }
            device.queue.writeBuffer(gridBuffer, 0, data);
            device.queue.writeBuffer(counterBuffer, 0, new Uint32Array([0]));
            totalParticles = 1;
        }

        function resetSim() {
            totalParticles = 1;
            globalSeed = 1;
            initGrid();
        }
        window.resetSim = resetSim;
        window.togglePause = () => {
            paused = !paused;
            document.getElementById('pauseLabel').textContent = paused ? 'Resume' : 'Pause';
        };

        initGrid();

        // UI
        document.getElementById('walkersPerStep').addEventListener('input', e => { walkersPerStep = parseInt(e.target.value); document.getElementById('wpVal').textContent = walkersPerStep; });
        document.getElementById('walkSteps').addEventListener('input', e => { walkSteps = parseInt(e.target.value); document.getElementById('wsVal').textContent = walkSteps; });
        document.getElementById('mode').addEventListener('change', e => { snowflakeMode = e.target.value === 'snowflake'; resetSim(); });
        document.getElementById('colorScheme').addEventListener('change', e => {
            const schemes = { rainbow: 0, ice: 1, fire: 2 };
            colorScheme = schemes[e.target.value] || 0;
        });

        let lastTime = performance.now(), fpsFrames = 0, fpsTime = 0;
        const WG = Math.ceil(SIZE / 16);
        const WALKER_WG = Math.ceil(MAX_WALKERS / 256);

        async function render() {
            const now = performance.now();
            const elapsed = (now - lastTime) / 1000;
            lastTime = now;
            fpsFrames++; fpsTime += elapsed;
            if (fpsTime >= 1.0) {
                document.getElementById('fps').textContent = Math.round(fpsFrames / fpsTime);
                fpsFrames = 0; fpsTime = 0;
            }

            const fillPercent = (totalParticles / (SIZE * SIZE)) * 100;
            if (!paused && fillPercent < 70) {
                updateParams();

                const enc = device.createCommandEncoder();
                const cp = enc.beginComputePass();
                cp.setPipeline(walkerPipeline);
                cp.setBindGroup(0, walkerBindGroup);
                cp.dispatchWorkgroups(WALKER_WG);
                cp.end();

                // Read back counter
                enc.copyBufferToBuffer(counterBuffer, 0, readbackBuffer, 0, 4);

                device.queue.submit([enc.finish()]);

                // Read particle count periodically
                if (fpsFrames % 10 === 0) {
                    await readbackBuffer.mapAsync(GPUMapMode.READ);
                    const count = new Uint32Array(readbackBuffer.getMappedRange())[0];
                    readbackBuffer.unmap();
                    totalParticles = count + 1;
                }
            }

            if (fillPercent >= 70 && !paused) {
                // Auto-reset
                resetSim();
            }

            document.getElementById('particles').textContent = totalParticles.toLocaleString();
            document.getElementById('fill').textContent = fillPercent.toFixed(1);

            // Render
            const enc2 = device.createCommandEncoder();
            const rcp = enc2.beginComputePass();
            rcp.setPipeline(renderPipeline);
            rcp.setBindGroup(0, renderBindGroup);
            rcp.dispatchWorkgroups(WG, WG);
            rcp.end();

            const dp = enc2.beginRenderPass({
                colorAttachments: [{ view: ctx.getCurrentTexture().createView(), loadOp: 'clear', storeOp: 'store' }]
            });
            dp.setPipeline(displayPipeline);
            dp.setBindGroup(0, displayBindGroup);
            dp.draw(4);
            dp.end();

            device.queue.submit([enc2.finish()]);
            requestAnimationFrame(render);
        }
        render();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
