<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Body Gravity - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 14px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input { width: 100%; }
        .controls button { margin-top: 10px; padding: 8px 16px; background: #22d3ee; color: #000; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: 600; }
        .controls button:hover { background: #67e8f9; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        .title-overlay { position: fixed; top: 70px; left: 20px; z-index: 90; }
        .title-overlay h1 { font-size: 1.4rem; color: #22d3ee; margin: 0 0 4px 0; }
        .title-overlay p { font-size: 0.85rem; color: #888; margin: 0; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(220, 50, 50, 0.95); padding: 30px 40px; border-radius: 12px; display: none; text-align: center; max-width: 400px; line-height: 1.6; }
        #error h2 { margin: 0 0 10px; }
        .info { font-size: 10px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to WebGPU Gallery</a>

    <div class="title-overlay">
        <h1>N-Body Gravity</h1>
        <p>All-pairs gravitational simulation on the GPU</p>
    </div>

    <div class="controls">
        <label>Particles: <span id="countVal">50000</span></label>
        <input type="range" id="count" min="10000" max="100000" step="10000" value="50000">
        <label>Gravity: <span id="gravVal">1.0</span></label>
        <input type="range" id="gravity" min="0.1" max="5.0" step="0.1" value="1.0">
        <label>Softening: <span id="softVal">10.0</span></label>
        <input type="range" id="softening" min="1" max="50" step="1" value="10">
        <label>Damping: <span id="dampVal">0.999</span></label>
        <input type="range" id="damping" min="0.99" max="1.0" step="0.001" value="0.999">
        <button onclick="resetSimulation()">Reset</button>
        <div class="info">Click to attract particles</div>
    </div>

    <div class="stats">
        FPS: <span id="fps">0</span> | Particles: <span id="particles">0</span>
    </div>

    <div id="error">
        <h2>WebGPU Not Supported</h2>
        <p>Your browser does not support WebGPU.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</p>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let numParticles = 50000;
        let gravityScale = 1.0;
        let softening = 10.0;
        let damping = 0.999;
        let mouseX = -1, mouseY = -1, mouseActive = 0;

        if (!navigator.gpu) {
            document.getElementById('error').style.display = 'block';
            throw new Error('WebGPU not supported');
        }

        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) {
            document.getElementById('error').style.display = 'block';
            throw new Error('No WebGPU adapter found');
        }
        const device = await adapter.requestDevice();
        const context = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        context.configure({ device, format, alphaMode: 'premultiplied' });

        // N-Body compute: each particle sums forces from a tile of other particles
        // We use shared memory tiling for performance
        const WORKGROUP_SIZE = 256;

        const computeShader = `
            struct Particle {
                pos: vec2f,
                vel: vec2f,
            }

            struct Uniforms {
                dt: f32,
                gravity: f32,
                softening: f32,
                damping: f32,
                numParticles: u32,
                canvasW: f32,
                canvasH: f32,
                mouseX: f32,
                mouseY: f32,
                mouseActive: f32,
                _pad0: f32,
                _pad1: f32,
            }

            @group(0) @binding(0) var<storage, read> particlesIn: array<Particle>;
            @group(0) @binding(1) var<storage, read_write> particlesOut: array<Particle>;
            @group(0) @binding(2) var<uniform> u: Uniforms;

            var<workgroup> tile: array<vec2f, ${WORKGROUP_SIZE}>;

            @compute @workgroup_size(${WORKGROUP_SIZE})
            fn main(
                @builtin(global_invocation_id) gid: vec3u,
                @builtin(local_invocation_id) lid: vec3u,
                @builtin(workgroup_id) wid: vec3u
            ) {
                let idx = gid.x;
                if (idx >= u.numParticles) { return; }

                var p = particlesIn[idx];
                var acc = vec2f(0.0, 0.0);

                let numTiles = (u.numParticles + ${WORKGROUP_SIZE}u - 1u) / ${WORKGROUP_SIZE}u;

                for (var t = 0u; t < numTiles; t++) {
                    let loadIdx = t * ${WORKGROUP_SIZE}u + lid.x;
                    if (loadIdx < u.numParticles) {
                        tile[lid.x] = particlesIn[loadIdx].pos;
                    } else {
                        tile[lid.x] = vec2f(0.0, 0.0);
                    }
                    workgroupBarrier();

                    for (var j = 0u; j < ${WORKGROUP_SIZE}u; j++) {
                        let globalJ = t * ${WORKGROUP_SIZE}u + j;
                        if (globalJ >= u.numParticles || globalJ == idx) { continue; }

                        let diff = tile[j] - p.pos;
                        let distSq = dot(diff, diff) + u.softening * u.softening;
                        let invDist = 1.0 / sqrt(distSq);
                        let invDist3 = invDist * invDist * invDist;
                        acc += diff * invDist3;
                    }
                    workgroupBarrier();
                }

                // Apply gravity scaling
                acc *= u.gravity * 0.5;

                // Mouse attraction
                if (u.mouseActive > 0.5) {
                    let mousePos = vec2f(u.mouseX, u.mouseY);
                    let toMouse = mousePos - p.pos;
                    let mDistSq = dot(toMouse, toMouse) + 100.0;
                    let mInv = 1.0 / sqrt(mDistSq);
                    acc += toMouse * mInv * mInv * mInv * u.gravity * 5000.0;
                }

                // Integration
                p.vel = (p.vel + acc * u.dt) * u.damping;
                p.pos += p.vel * u.dt;

                // Boundary wrapping
                let w = u.canvasW;
                let h = u.canvasH;
                if (p.pos.x < 0.0) { p.pos.x += w; }
                if (p.pos.x > w) { p.pos.x -= w; }
                if (p.pos.y < 0.0) { p.pos.y += h; }
                if (p.pos.y > h) { p.pos.y -= h; }

                particlesOut[idx] = p;
            }
        `;

        const renderShader = `
            struct Particle {
                pos: vec2f,
                vel: vec2f,
            }

            struct VertexOutput {
                @builtin(position) position: vec4f,
                @location(0) color: vec4f,
            }

            @group(0) @binding(0) var<storage, read> particles: array<Particle>;
            @group(0) @binding(1) var<uniform> resolution: vec2f;

            @vertex
            fn vertexMain(@builtin(vertex_index) idx: u32) -> VertexOutput {
                let p = particles[idx];
                let x = (p.pos.x / resolution.x) * 2.0 - 1.0;
                let y = (p.pos.y / resolution.y) * -2.0 + 1.0;

                let speed = length(p.vel);
                // Color by speed: blue (slow) -> white (fast)
                let t = clamp(speed * 0.01, 0.0, 1.0);
                let slowColor = vec3f(0.15, 0.25, 0.8);
                let midColor = vec3f(0.3, 0.7, 1.0);
                let fastColor = vec3f(1.0, 1.0, 1.0);

                var rgb: vec3f;
                if (t < 0.5) {
                    rgb = mix(slowColor, midColor, t * 2.0);
                } else {
                    rgb = mix(midColor, fastColor, (t - 0.5) * 2.0);
                }

                var out: VertexOutput;
                out.position = vec4f(x, y, 0.0, 1.0);
                out.color = vec4f(rgb, 0.7 + t * 0.3);
                return out;
            }

            @fragment
            fn fragmentMain(@location(0) color: vec4f) -> @location(0) vec4f {
                return color;
            }
        `;

        const computePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: computeShader }), entryPoint: 'main' }
        });

        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: device.createShaderModule({ code: renderShader }), entryPoint: 'vertexMain' },
            fragment: {
                module: device.createShaderModule({ code: renderShader }),
                entryPoint: 'fragmentMain',
                targets: [{
                    format,
                    blend: {
                        color: { srcFactor: 'src-alpha', dstFactor: 'one', operation: 'add' },
                        alpha: { srcFactor: 'one', dstFactor: 'one', operation: 'add' }
                    }
                }]
            },
            primitive: { topology: 'point-list' }
        });

        let particleBuffers, uniformBuffer, resolutionBuffer;
        let computeBindGroups, renderBindGroups;
        let frame = 0;

        function initParticles() {
            const data = new Float32Array(numParticles * 4);
            const cx = canvas.width / 2, cy = canvas.height / 2;

            for (let i = 0; i < numParticles; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.random() * Math.min(cx, cy) * 0.6 + 30;
                data[i * 4]     = cx + Math.cos(angle) * r;
                data[i * 4 + 1] = cy + Math.sin(angle) * r;
                // Tangential velocity for orbital motion
                const speed = 20 + Math.random() * 40;
                data[i * 4 + 2] = Math.cos(angle + Math.PI / 2) * speed;
                data[i * 4 + 3] = Math.sin(angle + Math.PI / 2) * speed;
            }

            particleBuffers = [
                device.createBuffer({ size: data.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST, mappedAtCreation: true }),
                device.createBuffer({ size: data.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST })
            ];
            new Float32Array(particleBuffers[0].getMappedRange()).set(data);
            particleBuffers[0].unmap();

            uniformBuffer = device.createBuffer({ size: 48, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
            resolutionBuffer = device.createBuffer({ size: 8, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
            device.queue.writeBuffer(resolutionBuffer, 0, new Float32Array([canvas.width, canvas.height]));

            computeBindGroups = [
                device.createBindGroup({
                    layout: computePipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: particleBuffers[0] } },
                        { binding: 1, resource: { buffer: particleBuffers[1] } },
                        { binding: 2, resource: { buffer: uniformBuffer } }
                    ]
                }),
                device.createBindGroup({
                    layout: computePipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: particleBuffers[1] } },
                        { binding: 1, resource: { buffer: particleBuffers[0] } },
                        { binding: 2, resource: { buffer: uniformBuffer } }
                    ]
                })
            ];

            renderBindGroups = [
                device.createBindGroup({
                    layout: renderPipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: particleBuffers[1] } },
                        { binding: 1, resource: { buffer: resolutionBuffer } }
                    ]
                }),
                device.createBindGroup({
                    layout: renderPipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: particleBuffers[0] } },
                        { binding: 1, resource: { buffer: resolutionBuffer } }
                    ]
                })
            ];

            frame = 0;
            document.getElementById('particles').textContent = numParticles.toLocaleString();
        }

        initParticles();

        let lastTime = performance.now();
        let fpsFrames = 0, fpsTime = 0;

        function render() {
            const now = performance.now();
            const dt = Math.min((now - lastTime) / 1000, 0.05);
            lastTime = now;

            fpsFrames++;
            fpsTime += dt;
            if (fpsTime >= 1.0) {
                document.getElementById('fps').textContent = Math.round(fpsFrames / fpsTime);
                fpsFrames = 0;
                fpsTime = 0;
            }

            // Update uniforms
            const buf = new ArrayBuffer(48);
            const f = new Float32Array(buf);
            const u = new Uint32Array(buf);
            f[0] = dt;
            f[1] = gravityScale;
            f[2] = softening;
            f[3] = damping;
            u[4] = numParticles;
            f[5] = canvas.width;
            f[6] = canvas.height;
            f[7] = mouseX;
            f[8] = mouseY;
            f[9] = mouseActive;
            device.queue.writeBuffer(uniformBuffer, 0, buf);

            const encoder = device.createCommandEncoder();

            // Compute
            const cp = encoder.beginComputePass();
            cp.setPipeline(computePipeline);
            cp.setBindGroup(0, computeBindGroups[frame % 2]);
            cp.dispatchWorkgroups(Math.ceil(numParticles / WORKGROUP_SIZE));
            cp.end();

            // Render
            const rp = encoder.beginRenderPass({
                colorAttachments: [{
                    view: context.getCurrentTexture().createView(),
                    loadOp: 'clear',
                    clearValue: { r: 0.02, g: 0.02, b: 0.05, a: 1 },
                    storeOp: 'store'
                }]
            });
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, renderBindGroups[frame % 2]);
            rp.draw(numParticles);
            rp.end();

            device.queue.submit([encoder.finish()]);
            frame++;
            requestAnimationFrame(render);
        }

        function resetSimulation() { initParticles(); }
        window.resetSimulation = resetSimulation;

        // Controls
        document.getElementById('count').addEventListener('input', (e) => {
            numParticles = parseInt(e.target.value);
            document.getElementById('countVal').textContent = numParticles;
            initParticles();
        });
        document.getElementById('gravity').addEventListener('input', (e) => {
            gravityScale = parseFloat(e.target.value);
            document.getElementById('gravVal').textContent = gravityScale.toFixed(1);
        });
        document.getElementById('softening').addEventListener('input', (e) => {
            softening = parseFloat(e.target.value);
            document.getElementById('softVal').textContent = softening.toFixed(1);
        });
        document.getElementById('damping').addEventListener('input', (e) => {
            damping = parseFloat(e.target.value);
            document.getElementById('dampVal').textContent = damping.toFixed(3);
        });

        // Mouse
        canvas.addEventListener('mousedown', (e) => { mouseActive = 1; mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('mouseup', () => { mouseActive = 0; });
        canvas.addEventListener('mouseleave', () => { mouseActive = 0; });
        canvas.addEventListener('mousemove', (e) => { if (mouseActive) { mouseX = e.clientX; mouseY = e.clientY; } });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            context.configure({ device, format, alphaMode: 'premultiplied' });
            initParticles();
        });

        render();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
