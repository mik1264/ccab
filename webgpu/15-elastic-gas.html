<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Gas Molecular Dynamics - WebGPU - CCAB</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        .back-link { position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: rgba(6, 182, 212, 0.2); color: #22d3ee; text-decoration: none; border-radius: 6px; z-index: 100; font-size: 14px; }
        .back-link:hover { background: rgba(6, 182, 212, 0.4); }
        canvas { display: block; }
        .controls { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 8px; z-index: 100; font-size: 12px; min-width: 200px; }
        .controls label { display: block; margin: 8px 0 3px; color: #22d3ee; }
        .controls input[type=range] { width: 160px; }
        .controls button { margin-top: 10px; padding: 8px 16px; background: #22d3ee; color: #000; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: 600; }
        .controls button:hover { background: #67e8f9; }
        .stats { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 15px; border-radius: 8px; font-size: 12px; }
        .title-overlay { position: fixed; top: 70px; left: 20px; z-index: 90; }
        .title-overlay h1 { font-size: 1.4rem; color: #22d3ee; margin: 0 0 4px 0; }
        .title-overlay p { font-size: 0.85rem; color: #888; margin: 0; }
        #error { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(220, 50, 50, 0.95); padding: 30px 40px; border-radius: 12px; display: none; text-align: center; max-width: 400px; line-height: 1.6; }
        #error h2 { margin: 0 0 10px; }
        #histogram { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border-radius: 8px; z-index: 100; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to WebGPU Gallery</a>

    <div class="title-overlay">
        <h1>Elastic Gas Molecular Dynamics</h1>
        <p>100K particles with Maxwell-Boltzmann speed distribution</p>
    </div>

    <div class="controls">
        <label>Temperature: <span id="tempVal">1.0</span></label>
        <input type="range" id="temperature" min="0.1" max="5.0" step="0.1" value="1.0">
        <label>Particles: <span id="countVal">50000</span></label>
        <input type="range" id="count" min="10000" max="100000" step="10000" value="50000">
        <label>Gravity: <span id="gravVal">0.0</span></label>
        <input type="range" id="gravity" min="0" max="1.0" step="0.05" value="0">
        <label>Wall Elasticity: <span id="elastVal">1.0</span></label>
        <input type="range" id="elasticity" min="0.8" max="1.0" step="0.01" value="1.0">
        <button onclick="resetSim()">Reset</button>
    </div>

    <div class="stats">
        FPS: <span id="fps">0</span> | Particles: <span id="pcount">0</span>
    </div>

    <canvas id="histogram" width="220" height="130"></canvas>

    <div id="error">
        <h2>WebGPU Not Supported</h2>
        <p>Your browser does not support WebGPU.<br>Please use Chrome 113+, Edge 113+, or Safari 18+.</p>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        if (!navigator.gpu) { document.getElementById('error').style.display = 'block'; throw new Error('WebGPU not supported'); }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) { document.getElementById('error').style.display = 'block'; throw new Error('No adapter'); }
        const device = await adapter.requestDevice();
        const canvas = document.getElementById('canvas');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const ctx = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        ctx.configure({ device, format, alphaMode: 'premultiplied' });

        let numParticles = 50000;
        let temperature = 1.0, gravity = 0.0, elasticity = 1.0;
        const WG = 256;

        const histCanvas = document.getElementById('histogram');
        const histCtx = histCanvas.getContext('2d');

        const computeCode = `
            struct Particle { pos: vec2f, vel: vec2f }
            struct Uniforms {
                dt: f32, temperature: f32, gravity: f32, elasticity: f32,
                numParticles: u32, canvasW: f32, canvasH: f32, _pad: f32,
            }
            @group(0) @binding(0) var<storage, read> pIn: array<Particle>;
            @group(0) @binding(1) var<storage, read_write> pOut: array<Particle>;
            @group(0) @binding(2) var<uniform> u: Uniforms;
            @group(0) @binding(3) var<storage, read_write> speedHist: array<atomic<u32>>;

            @compute @workgroup_size(${WG})
            fn main(@builtin(global_invocation_id) gid: vec3u) {
                let idx = gid.x;
                if (idx >= u.numParticles) { return; }

                var p = pIn[idx];

                // Apply gravity
                p.vel.y += u.gravity * 200.0 * u.dt;

                // Update position
                p.pos += p.vel * u.dt;

                // Elastic wall bouncing
                if (p.pos.x < 0.0) { p.pos.x = -p.pos.x; p.vel.x = abs(p.vel.x) * u.elasticity; }
                if (p.pos.x > u.canvasW) { p.pos.x = 2.0 * u.canvasW - p.pos.x; p.vel.x = -abs(p.vel.x) * u.elasticity; }
                if (p.pos.y < 0.0) { p.pos.y = -p.pos.y; p.vel.y = abs(p.vel.y) * u.elasticity; }
                if (p.pos.y > u.canvasH) { p.pos.y = 2.0 * u.canvasH - p.pos.y; p.vel.y = -abs(p.vel.y) * u.elasticity; }

                pOut[idx] = p;

                // Accumulate speed histogram (32 bins, max speed ~600)
                let speed = length(p.vel);
                let bin = min(u32(speed / 20.0), 31u);
                atomicAdd(&speedHist[bin], 1u);
            }
        `;

        const renderCode = `
            struct Particle { pos: vec2f, vel: vec2f }
            struct VertexOutput { @builtin(position) position: vec4f, @location(0) color: vec4f }
            @group(0) @binding(0) var<storage, read> particles: array<Particle>;
            @group(0) @binding(1) var<uniform> resolution: vec2f;

            @vertex fn vs(@builtin(vertex_index) idx: u32) -> VertexOutput {
                let p = particles[idx];
                let x = (p.pos.x / resolution.x) * 2.0 - 1.0;
                let y = (p.pos.y / resolution.y) * -2.0 + 1.0;
                let speed = length(p.vel);
                let t = clamp(speed / 400.0, 0.0, 1.0);

                // blue -> cyan -> green -> yellow -> red
                var rgb: vec3f;
                if (t < 0.25) {
                    rgb = mix(vec3f(0.1, 0.2, 0.8), vec3f(0.0, 0.7, 0.9), t * 4.0);
                } else if (t < 0.5) {
                    rgb = mix(vec3f(0.0, 0.7, 0.9), vec3f(0.1, 0.9, 0.2), (t - 0.25) * 4.0);
                } else if (t < 0.75) {
                    rgb = mix(vec3f(0.1, 0.9, 0.2), vec3f(1.0, 0.9, 0.1), (t - 0.5) * 4.0);
                } else {
                    rgb = mix(vec3f(1.0, 0.9, 0.1), vec3f(1.0, 0.15, 0.05), (t - 0.75) * 4.0);
                }

                var out: VertexOutput;
                out.position = vec4f(x, y, 0.0, 1.0);
                out.color = vec4f(rgb, 0.85);
                return out;
            }

            @fragment fn fs(@location(0) color: vec4f) -> @location(0) vec4f { return color; }
        `;

        // Motion blur clear shader - draws a fullscreen quad with low-alpha dark color
        const blurCode = `
            @vertex fn vs(@builtin(vertex_index) idx: u32) -> @builtin(position) vec4f {
                var pos = array<vec2f, 4>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(1,1));
                return vec4f(pos[idx], 0.0, 1.0);
            }
            @fragment fn fs() -> @location(0) vec4f {
                return vec4f(0.02, 0.02, 0.04, 0.06);
            }
        `;

        const computePipeline = device.createComputePipeline({
            layout: 'auto',
            compute: { module: device.createShaderModule({ code: computeCode }), entryPoint: 'main' }
        });

        const blurModule = device.createShaderModule({ code: blurCode });
        const blurPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: blurModule, entryPoint: 'vs' },
            fragment: {
                module: blurModule, entryPoint: 'fs',
                targets: [{
                    format,
                    blend: {
                        color: { srcFactor: 'src-alpha', dstFactor: 'one-minus-src-alpha', operation: 'add' },
                        alpha: { srcFactor: 'one', dstFactor: 'one', operation: 'add' }
                    }
                }]
            },
            primitive: { topology: 'triangle-strip' }
        });

        const renderModule = device.createShaderModule({ code: renderCode });
        const renderPipeline = device.createRenderPipeline({
            layout: 'auto',
            vertex: { module: renderModule, entryPoint: 'vs' },
            fragment: {
                module: renderModule, entryPoint: 'fs',
                targets: [{
                    format,
                    blend: {
                        color: { srcFactor: 'src-alpha', dstFactor: 'one', operation: 'add' },
                        alpha: { srcFactor: 'one', dstFactor: 'one', operation: 'add' }
                    }
                }]
            },
            primitive: { topology: 'point-list' }
        });

        let pBufs, uniformBuf, resBuf, histBuf, histReadBuf;
        let computeBGs, renderBGs;
        let frame = 0;

        function initParticles() {
            const data = new Float32Array(numParticles * 4);
            const w = canvas.width, h = canvas.height;
            for (let i = 0; i < numParticles; i++) {
                data[i * 4]     = Math.random() * w;
                data[i * 4 + 1] = Math.random() * h;
                // Maxwell-Boltzmann-like initial speed distribution
                const speed = (Math.sqrt(-2 * Math.log(Math.random())) * 80 + 20) * temperature;
                const angle = Math.random() * Math.PI * 2;
                data[i * 4 + 2] = Math.cos(angle) * speed;
                data[i * 4 + 3] = Math.sin(angle) * speed;
            }

            pBufs = [
                device.createBuffer({ size: data.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST, mappedAtCreation: true }),
                device.createBuffer({ size: data.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST })
            ];
            new Float32Array(pBufs[0].getMappedRange()).set(data);
            pBufs[0].unmap();

            uniformBuf = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
            resBuf = device.createBuffer({ size: 8, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
            device.queue.writeBuffer(resBuf, 0, new Float32Array([w, h]));

            histBuf = device.createBuffer({ size: 128, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
            histReadBuf = device.createBuffer({ size: 128, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });

            computeBGs = [0, 1].map(i => device.createBindGroup({
                layout: computePipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: pBufs[i] } },
                    { binding: 1, resource: { buffer: pBufs[1 - i] } },
                    { binding: 2, resource: { buffer: uniformBuf } },
                    { binding: 3, resource: { buffer: histBuf } }
                ]
            }));

            renderBGs = [0, 1].map(i => device.createBindGroup({
                layout: renderPipeline.getBindGroupLayout(0),
                entries: [
                    { binding: 0, resource: { buffer: pBufs[1 - i] } },
                    { binding: 1, resource: { buffer: resBuf } }
                ]
            }));

            frame = 0;
            document.getElementById('pcount').textContent = numParticles.toLocaleString();
        }

        initParticles();

        let lastTime = performance.now(), fpsFrames = 0, fpsTime = 0;
        let histData = new Uint32Array(32);

        function drawHistogram() {
            const hc = histCtx;
            const w = histCanvas.width, h = histCanvas.height;
            hc.clearRect(0, 0, w, h);
            hc.fillStyle = 'rgba(0,0,0,0.5)';
            hc.fillRect(0, 0, w, h);

            let maxVal = 1;
            for (let i = 0; i < 32; i++) maxVal = Math.max(maxVal, histData[i]);

            const barW = (w - 20) / 32;
            for (let i = 0; i < 32; i++) {
                const t = i / 31;
                let r, g, b;
                if (t < 0.25) { r = 25; g = 50 + t * 4 * 130; b = 200; }
                else if (t < 0.5) { r = 25; g = 180; b = 200 - (t - 0.25) * 4 * 170; }
                else if (t < 0.75) { r = 25 + (t - 0.5) * 4 * 230; g = 180 + (t - 0.5) * 4 * 50; b = 30; }
                else { r = 255; g = 230 - (t - 0.75) * 4 * 190; b = 30 - (t - 0.75) * 4 * 20; }
                hc.fillStyle = `rgb(${r},${g},${b})`;
                const barH = (histData[i] / maxVal) * (h - 30);
                hc.fillRect(10 + i * barW, h - 10 - barH, barW - 1, barH);
            }
            hc.fillStyle = '#888';
            hc.font = '10px sans-serif';
            hc.fillText('Speed Distribution', 10, 14);
            hc.fillText('0', 10, h - 1);
            hc.fillText('fast', w - 30, h - 1);
        }

        async function render() {
            const now = performance.now();
            const dt = Math.min((now - lastTime) / 1000, 0.033);
            lastTime = now;

            fpsFrames++; fpsTime += dt;
            if (fpsTime >= 1.0) {
                document.getElementById('fps').textContent = Math.round(fpsFrames / fpsTime);
                fpsFrames = 0; fpsTime = 0;
            }

            // Clear histogram buffer
            device.queue.writeBuffer(histBuf, 0, new Uint32Array(32));

            // Uniforms
            const buf = new ArrayBuffer(32);
            const f = new Float32Array(buf);
            const u = new Uint32Array(buf);
            f[0] = dt; f[1] = temperature; f[2] = gravity; f[3] = elasticity;
            u[4] = numParticles; f[5] = canvas.width; f[6] = canvas.height;
            device.queue.writeBuffer(uniformBuf, 0, buf);

            const enc = device.createCommandEncoder();

            // Compute pass
            const cp = enc.beginComputePass();
            cp.setPipeline(computePipeline);
            cp.setBindGroup(0, computeBGs[frame % 2]);
            cp.dispatchWorkgroups(Math.ceil(numParticles / WG));
            cp.end();

            // Copy histogram for readback
            enc.copyBufferToBuffer(histBuf, 0, histReadBuf, 0, 128);

            // Render with motion blur: draw semi-transparent dark quad then particles
            const tex = ctx.getCurrentTexture().createView();
            const rp = enc.beginRenderPass({
                colorAttachments: [{
                    view: tex, loadOp: 'load', storeOp: 'store'
                }]
            });
            rp.setPipeline(blurPipeline);
            rp.draw(4);
            rp.setPipeline(renderPipeline);
            rp.setBindGroup(0, renderBGs[frame % 2]);
            rp.draw(numParticles);
            rp.end();

            device.queue.submit([enc.finish()]);
            frame++;

            // Read histogram every 10 frames
            if (frame % 10 === 0) {
                await histReadBuf.mapAsync(GPUMapMode.READ);
                histData = new Uint32Array(histReadBuf.getMappedRange().slice(0));
                histReadBuf.unmap();
                drawHistogram();
            }

            requestAnimationFrame(render);
        }

        function resetSim() { initParticles(); }
        window.resetSim = resetSim;

        document.getElementById('temperature').addEventListener('input', e => {
            temperature = parseFloat(e.target.value);
            document.getElementById('tempVal').textContent = temperature.toFixed(1);
        });
        document.getElementById('count').addEventListener('input', e => {
            numParticles = parseInt(e.target.value);
            document.getElementById('countVal').textContent = numParticles;
            initParticles();
        });
        document.getElementById('gravity').addEventListener('input', e => {
            gravity = parseFloat(e.target.value);
            document.getElementById('gravVal').textContent = gravity.toFixed(2);
        });
        document.getElementById('elasticity').addEventListener('input', e => {
            elasticity = parseFloat(e.target.value);
            document.getElementById('elastVal').textContent = elasticity.toFixed(2);
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.configure({ device, format, alphaMode: 'premultiplied' });
            initParticles();
        });

        render();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
