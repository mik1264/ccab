<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arch Bridge Thrust Lines</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .panel {
            position: fixed; top: 10px; right: 10px; background: rgba(254,250,224,0.92);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; z-index: 100;
            color: #283618; min-width: 220px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .panel h2 { font-size: 1rem; color: #606C38; margin-bottom: 8px; }
        .panel label { font-size: 0.78rem; display: block; margin: 6px 0 2px; }
        .panel input[type=range] { width: 100%; }
        .panel .val { font-weight: bold; color: #606C38; }
        .btn {
            background: #606C38; color: #FEFAE0; border: none; padding: 5px 10px;
            border-radius: 6px; cursor: pointer; font-size: 0.75rem; margin: 2px;
        }
        .btn:hover { background: #8A9A5B; }
        .btn.active { background: #DDA15E; }
        .info { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(254,250,224,0.88); backdrop-filter: blur(10px); border-radius: 10px;
            padding: 10px 18px; color: #283618; font-size: 0.8rem; z-index: 100; text-align: center;
            max-width: 600px; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="panel">
        <h2>Arch Parameters</h2>
        <label>Rise/Span Ratio: <span class="val" id="riseVal">0.30</span></label>
        <input type="range" id="riseSlider" min="10" max="60" value="30">
        <label>Load Position: <span class="val" id="loadPosVal">50</span>%</label>
        <input type="range" id="loadPosSlider" min="5" max="95" value="50">
        <label>Point Load: <span class="val" id="loadMagVal">10</span> kN</label>
        <input type="range" id="loadMagSlider" min="0" max="50" value="10">
        <p style="font-size:0.75rem; margin-top:8px;">Arch Type:</p>
        <div>
            <button class="btn active" id="parabolicBtn">Parabolic</button>
            <button class="btn" id="circularBtn">Circular</button>
            <button class="btn" id="catenaryBtn">Catenary</button>
        </div>
        <p style="font-size:0.72rem; margin-top:10px; color:#606C38;">
            When thrust line stays within the arch, the structure is stable.
        </p>
    </div>
    <div class="info">
        The <strong>thrust line</strong> shows the path of compressive force through an arch.
        If it exits the arch profile, tension develops &mdash; stone/concrete arches cannot resist tension and may crack.
    </div>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const riseSlider = document.getElementById('riseSlider');
    const loadPosSlider = document.getElementById('loadPosSlider');
    const loadMagSlider = document.getElementById('loadMagSlider');
    const riseVal = document.getElementById('riseVal');
    const loadPosVal = document.getElementById('loadPosVal');
    const loadMagVal = document.getElementById('loadMagVal');

    riseSlider.addEventListener('input', () => { riseVal.textContent = (riseSlider.value / 100).toFixed(2); });
    loadPosSlider.addEventListener('input', () => { loadPosVal.textContent = loadPosSlider.value; });
    loadMagSlider.addEventListener('input', () => { loadMagVal.textContent = loadMagSlider.value; });

    let archType = 'parabolic';
    const btns = { parabolic: document.getElementById('parabolicBtn'), circular: document.getElementById('circularBtn'), catenary: document.getElementById('catenaryBtn') };
    Object.keys(btns).forEach(k => {
        btns[k].addEventListener('click', () => {
            archType = k;
            Object.values(btns).forEach(b => b.classList.remove('active'));
            btns[k].classList.add('active');
        });
    });

    let time = 0;

    function archY(t, type, rise) {
        const x = t * 2 - 1; // -1 to 1
        if (type === 'parabolic') return rise * (1 - x * x);
        if (type === 'circular') {
            const r = (1 + rise * rise) / (2 * rise);
            return Math.sqrt(Math.max(0, r * r - x * x)) - (r - rise);
        }
        // catenary
        const a = 1 / (Math.acosh(1 + rise));
        return rise - a * (Math.cosh(x / a) - 1) * (rise / (a * (Math.cosh(1 / a) - 1)));
    }

    function draw() {
        time += 0.016;
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, W, H);

        const riseRatio = riseSlider.value / 100;
        const loadPos = loadPosSlider.value / 100;
        const loadMag = parseFloat(loadMagSlider.value);

        const span = Math.min(W * 0.65, 700);
        const rise = span * riseRatio;
        const cx = W / 2, baseY = H * 0.65;
        const x0 = cx - span / 2;

        // Ground
        ctx.fillStyle = 'rgba(96,108,56,0.15)';
        ctx.fillRect(0, baseY + 10, W, H - baseY - 10);
        // Hatch lines for ground
        ctx.strokeStyle = 'rgba(96,108,56,0.2)';
        ctx.lineWidth = 1;
        for (let x = 0; x < W; x += 12) {
            ctx.beginPath();
            ctx.moveTo(x, baseY + 10);
            ctx.lineTo(x - 15, baseY + 35);
            ctx.stroke();
        }

        // Draw arch outline (thick band)
        const archThickness = rise * 0.15;
        const steps = 100;

        // Arch fill
        ctx.beginPath();
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const ax = x0 + t * span;
            const ay = baseY - archY(t, archType, rise) - archThickness / 2;
            i === 0 ? ctx.moveTo(ax, ay) : ctx.lineTo(ax, ay);
        }
        for (let i = steps; i >= 0; i--) {
            const t = i / steps;
            const ax = x0 + t * span;
            const ay = baseY - archY(t, archType, rise) + archThickness / 2;
            ctx.lineTo(ax, ay);
        }
        ctx.closePath();
        ctx.fillStyle = 'rgba(96,108,56,0.35)';
        ctx.fill();
        ctx.strokeStyle = '#8A9A5B';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Compute thrust line
        // Uniform dead load thrust line follows the arch shape
        // Point load shifts the thrust line
        const thrustPoints = [];
        const w = 10; // uniform load per unit length
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const ax = x0 + t * span;
            // Base thrust from uniform load = arch shape
            let ty = baseY - archY(t, archType, rise);
            // Effect of point load - shifts thrust line
            if (loadMag > 0) {
                const loadX = loadPos;
                const moment = loadMag * span * (t < loadX ? t * (1 - loadX) : (1 - t) * loadX);
                const H0 = w * span * span / (8 * rise) + loadMag * span * loadPos * (1 - loadPos) / rise;
                const shift = moment / Math.max(H0, 1) * rise * 0.5;
                ty += shift;
            }
            thrustPoints.push({ x: ax, y: ty });
        }

        // Check if thrust line is within arch
        let isStable = true;
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const archCenter = baseY - archY(t, archType, rise);
            const dist = Math.abs(thrustPoints[i].y - archCenter);
            if (dist > archThickness / 2 + 2) { isStable = false; break; }
        }

        // Draw thrust line
        ctx.beginPath();
        thrustPoints.forEach((p, i) => {
            i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
        });
        ctx.strokeStyle = isStable ? '#DDA15E' : '#d94a4a';
        ctx.lineWidth = 3;
        ctx.shadowColor = isStable ? 'rgba(221,161,94,0.5)' : 'rgba(217,74,74,0.5)';
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Stability indicator
        ctx.fillStyle = isStable ? '#8A9A5B' : '#d94a4a';
        ctx.font = 'bold 14px "Segoe UI"';
        ctx.textAlign = 'center';
        ctx.fillText(isStable ? 'STABLE — Thrust line within arch' : 'UNSTABLE — Thrust line exits arch!', cx, baseY + 60);

        // Point load arrow
        if (loadMag > 0) {
            const lx = x0 + loadPos * span;
            const ly = baseY - archY(loadPos, archType, rise) - archThickness / 2;
            const pulse = 0.7 + 0.3 * Math.sin(time * 3);
            ctx.strokeStyle = `rgba(221,161,94,${pulse})`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(lx, ly - 80);
            ctx.lineTo(lx, ly - 5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(lx - 8, ly - 15);
            ctx.lineTo(lx, ly - 5);
            ctx.lineTo(lx + 8, ly - 15);
            ctx.stroke();
            ctx.fillStyle = '#DDA15E';
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(loadMag + ' kN', lx, ly - 88);
        }

        // Support reactions
        ctx.fillStyle = '#8A9A5B';
        // Left support
        ctx.beginPath();
        ctx.moveTo(x0 - 12, baseY + 10);
        ctx.lineTo(x0 + 12, baseY + 10);
        ctx.lineTo(x0, baseY - 2);
        ctx.closePath();
        ctx.fill();
        // Right support
        ctx.beginPath();
        ctx.moveTo(x0 + span - 12, baseY + 10);
        ctx.lineTo(x0 + span + 12, baseY + 10);
        ctx.lineTo(x0 + span, baseY - 2);
        ctx.closePath();
        ctx.fill();

        // Horizontal thrust arrows at supports
        const H0 = w * span / (8 * rise / span) * 0.01;
        ctx.strokeStyle = 'rgba(74,144,217,0.7)';
        ctx.lineWidth = 2;
        // Left
        ctx.beginPath(); ctx.moveTo(x0, baseY); ctx.lineTo(x0 - 40, baseY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x0 - 30, baseY - 5); ctx.lineTo(x0 - 40, baseY); ctx.lineTo(x0 - 30, baseY + 5); ctx.stroke();
        ctx.fillStyle = 'rgba(74,144,217,0.7)';
        ctx.font = '10px monospace';
        ctx.textAlign = 'right';
        ctx.fillText('H', x0 - 45, baseY + 4);
        // Right
        ctx.strokeStyle = 'rgba(74,144,217,0.7)';
        ctx.beginPath(); ctx.moveTo(x0 + span, baseY); ctx.lineTo(x0 + span + 40, baseY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x0 + span + 30, baseY - 5); ctx.lineTo(x0 + span + 40, baseY); ctx.lineTo(x0 + span + 30, baseY + 5); ctx.stroke();
        ctx.textAlign = 'left';
        ctx.fillText('H', x0 + span + 45, baseY + 4);

        // Title
        ctx.fillStyle = '#FEFAE0';
        ctx.font = 'bold 18px "Segoe UI"';
        ctx.textAlign = 'center';
        ctx.fillText('Arch Bridge Thrust Lines — ' + archType.charAt(0).toUpperCase() + archType.slice(1), W / 2, 30);

        // Uniform load visualization
        ctx.fillStyle = 'rgba(138,154,91,0.3)';
        for (let i = 0; i < 20; i++) {
            const t = (i + 0.5) / 20;
            const ax = x0 + t * span;
            const ay = baseY - archY(t, archType, rise) - archThickness / 2;
            ctx.beginPath();
            ctx.moveTo(ax, ay - 25);
            ctx.lineTo(ax, ay - 3);
            ctx.strokeStyle = 'rgba(138,154,91,0.35)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(ax - 3, ay - 8);
            ctx.lineTo(ax, ay - 3);
            ctx.lineTo(ax + 3, ay - 8);
            ctx.stroke();
        }

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        riseSlider.value = 30; riseVal.textContent = '0.30';
        loadPosSlider.value = 50; loadPosVal.textContent = '50';
        loadMagSlider.value = 10; loadMagVal.textContent = '10';
        archType = 'parabolic';
        Object.values(btns).forEach(b => b.classList.remove('active'));
        btns.parabolic.classList.add('active');
    };

    draw();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
