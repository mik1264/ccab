<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suspension Bridge Catenary Curves</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .panel {
            position: fixed; top: 10px; right: 10px; background: rgba(254,250,224,0.92);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; z-index: 100;
            color: #283618; min-width: 230px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .panel h2 { font-size: 1rem; color: #606C38; margin-bottom: 8px; }
        .panel label { font-size: 0.78rem; display: block; margin: 6px 0 2px; }
        .panel input[type=range] { width: 100%; }
        .panel .val { font-weight: bold; color: #606C38; }
        .legend { display: flex; gap: 12px; margin-top: 8px; font-size: 0.72rem; flex-wrap: wrap; }
        .legend span { display: flex; align-items: center; gap: 4px; }
        .legend .dot { width: 10px; height: 10px; border-radius: 50%; }
        .info { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(254,250,224,0.88); backdrop-filter: blur(10px); border-radius: 10px;
            padding: 10px 18px; color: #283618; font-size: 0.8rem; z-index: 100; text-align: center;
            max-width: 600px; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="panel">
        <h2>Cable Shape Parameters</h2>
        <label>Span: <span class="val" id="spanVal">400</span>m</label>
        <input type="range" id="spanSlider" min="200" max="800" value="400">
        <label>Sag: <span class="val" id="sagVal">50</span>m</label>
        <input type="range" id="sagSlider" min="10" max="150" value="50">
        <label>Cable Weight: <span class="val" id="cableVal">20</span> kg/m</label>
        <input type="range" id="cableSlider" min="1" max="100" value="20">
        <label>Deck Weight: <span class="val" id="deckVal">500</span> kg/m</label>
        <input type="range" id="deckSlider" min="100" max="2000" value="500">
        <div class="legend">
            <span><div class="dot" style="background:#DDA15E;"></div> Actual Shape</span>
            <span><div class="dot" style="background:#4a90d9;"></div> Parabola</span>
            <span><div class="dot" style="background:#d94a4a;"></div> Catenary</span>
        </div>
    </div>
    <div class="info">
        A suspension bridge cable forms a <strong>parabola</strong> when deck weight dominates,
        or a <strong>catenary</strong> (cosh) when cable self-weight dominates.
        Real bridges fall in between.
    </div>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const sliders = {
        span: document.getElementById('spanSlider'),
        sag: document.getElementById('sagSlider'),
        cable: document.getElementById('cableSlider'),
        deck: document.getElementById('deckSlider')
    };
    const vals = {
        span: document.getElementById('spanVal'),
        sag: document.getElementById('sagVal'),
        cable: document.getElementById('cableVal'),
        deck: document.getElementById('deckVal')
    };
    Object.keys(sliders).forEach(k => {
        sliders[k].addEventListener('input', () => { vals[k].textContent = sliders[k].value; });
    });

    let time = 0;
    const suspenders = [];

    function catenary(x, a) {
        return a * (Math.cosh(x / a) - 1);
    }

    function draw() {
        time += 0.016;
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, W, H);

        const span = parseFloat(sliders.span.value);
        const sag = parseFloat(sliders.sag.value);
        const cableW = parseFloat(sliders.cable.value);
        const deckW = parseFloat(sliders.deck.value);

        const scale = Math.min(W * 0.65 / span, H * 0.35 / sag);
        const cx = W / 2, towerY = H * 0.3;
        const towerH = sag * scale + 40;
        const halfSpan = span * scale / 2;

        // Draw water
        const waterY = towerY + towerH + 60;
        const gradient = ctx.createLinearGradient(0, waterY, 0, H);
        gradient.addColorStop(0, 'rgba(40,60,100,0.6)');
        gradient.addColorStop(1, 'rgba(20,30,60,0.8)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, waterY, W, H - waterY);

        // Water waves
        ctx.strokeStyle = 'rgba(74,144,217,0.2)';
        ctx.lineWidth = 1;
        for (let w = 0; w < 3; w++) {
            ctx.beginPath();
            for (let x = 0; x < W; x += 3) {
                const y = waterY + w * 15 + 5 * Math.sin(x * 0.01 + time * 0.5 + w);
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        // Towers
        ctx.fillStyle = '#606C38';
        const tw = 18;
        ctx.fillRect(cx - halfSpan - tw / 2, towerY - 20, tw, towerH + 80);
        ctx.fillRect(cx + halfSpan - tw / 2, towerY - 20, tw, towerH + 80);

        // Tower caps
        ctx.fillStyle = '#8A9A5B';
        ctx.fillRect(cx - halfSpan - tw, towerY - 25, tw * 2, 8);
        ctx.fillRect(cx + halfSpan - tw, towerY - 25, tw * 2, 8);

        // Deck
        const deckY = towerY + towerH - 10;
        ctx.fillStyle = '#4a3f35';
        ctx.fillRect(cx - halfSpan - 20, deckY, halfSpan * 2 + 40, 8);
        // Road markings
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 1;
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(cx - halfSpan, deckY + 4);
        ctx.lineTo(cx + halfSpan, deckY + 4);
        ctx.stroke();
        ctx.setLineDash([]);

        // Compute catenary parameter a for pure catenary
        // catenary: y = a*(cosh(x/a) - 1), at x=halfSpan, y=sag*scale
        // sag*scale = a*(cosh(halfSpan/a) - 1)
        let aCat = halfSpan; // initial guess
        for (let iter = 0; iter < 50; iter++) {
            const f = aCat * (Math.cosh(halfSpan / aCat) - 1) - sag * scale;
            const fp = Math.cosh(halfSpan / aCat) - 1 - (halfSpan / aCat) * Math.sinh(halfSpan / aCat);
            if (Math.abs(fp) > 1e-10) aCat -= f / fp;
        }

        // Draw curves
        const steps = 200;
        const ratio = deckW / (deckW + cableW); // 1 = pure parabola, 0 = pure catenary

        // Catenary curve (red)
        ctx.strokeStyle = 'rgba(217,74,74,0.7)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const x = -halfSpan + t * 2 * halfSpan;
            const y = catenary(x, aCat);
            const px = cx + x, py = towerY + y;
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.stroke();

        // Parabola curve (blue)
        ctx.strokeStyle = 'rgba(74,144,217,0.7)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const x = -halfSpan + t * 2 * halfSpan;
            const y = sag * scale * (x / halfSpan) ** 2;
            const px = cx + x, py = towerY + y;
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.stroke();

        // Actual bridge cable (weighted blend - orange)
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 3;
        ctx.shadowColor = 'rgba(221,161,94,0.4)';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const x = -halfSpan + t * 2 * halfSpan;
            const yPar = sag * scale * (x / halfSpan) ** 2;
            const yCat = catenary(x, aCat);
            const y = ratio * yPar + (1 - ratio) * yCat;
            const px = cx + x, py = towerY + y;
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Suspender cables
        ctx.strokeStyle = 'rgba(138,154,91,0.5)';
        ctx.lineWidth = 1;
        const numSuspenders = 20;
        for (let i = 1; i < numSuspenders; i++) {
            const t = i / numSuspenders;
            const x = -halfSpan + t * 2 * halfSpan;
            const yPar = sag * scale * (x / halfSpan) ** 2;
            const yCat = catenary(x, aCat);
            const y = ratio * yPar + (1 - ratio) * yCat;
            ctx.beginPath();
            ctx.moveTo(cx + x, towerY + y);
            ctx.lineTo(cx + x, deckY);
            ctx.stroke();
        }

        // Backstay cables
        ctx.strokeStyle = 'rgba(138,154,91,0.4)';
        ctx.lineWidth = 2;
        const anchorDist = halfSpan * 0.5;
        ctx.beginPath();
        ctx.moveTo(cx - halfSpan, towerY);
        ctx.lineTo(cx - halfSpan - anchorDist, deckY + 30);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx + halfSpan, towerY);
        ctx.lineTo(cx + halfSpan + anchorDist, deckY + 30);
        ctx.stroke();

        // Labels
        ctx.fillStyle = 'rgba(74,144,217,0.9)';
        ctx.font = '13px "Segoe UI"';
        ctx.textAlign = 'left';
        ctx.fillText('Parabola: y = (4s/L\u00B2)x\u00B2', cx + halfSpan * 0.3, towerY + sag * scale * 0.3);

        ctx.fillStyle = 'rgba(217,74,74,0.9)';
        ctx.fillText('Catenary: y = a(cosh(x/a) - 1)', cx + halfSpan * 0.3, towerY + sag * scale * 0.3 + 18);

        ctx.fillStyle = '#DDA15E';
        ctx.fillText('Actual: ' + (ratio * 100).toFixed(0) + '% parabola + ' + ((1 - ratio) * 100).toFixed(0) + '% catenary', cx + halfSpan * 0.3, towerY + sag * scale * 0.3 + 36);

        // Title
        ctx.fillStyle = '#FEFAE0';
        ctx.font = 'bold 18px "Segoe UI"';
        ctx.textAlign = 'center';
        ctx.fillText('Suspension Bridge Cable Curves', W / 2, 30);

        // Dimension annotations
        ctx.strokeStyle = 'rgba(254,250,224,0.3)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        // Span line
        ctx.beginPath();
        ctx.moveTo(cx - halfSpan, deckY + 25);
        ctx.lineTo(cx + halfSpan, deckY + 25);
        ctx.stroke();
        ctx.fillStyle = 'rgba(254,250,224,0.6)';
        ctx.font = '11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('L = ' + span + 'm', cx, deckY + 40);
        // Sag line
        ctx.beginPath();
        ctx.moveTo(cx - halfSpan - 30, towerY);
        ctx.lineTo(cx - halfSpan - 30, towerY + sag * scale);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.save();
        ctx.translate(cx - halfSpan - 40, towerY + sag * scale / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText('sag = ' + sag + 'm', 0, 0);
        ctx.restore();

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        sliders.span.value = 400; vals.span.textContent = '400';
        sliders.sag.value = 50; vals.sag.textContent = '50';
        sliders.cable.value = 20; vals.cable.textContent = '20';
        sliders.deck.value = 500; vals.deck.textContent = '500';
    };

    draw();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
