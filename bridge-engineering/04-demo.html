<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beam Bending Moment Diagrams</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .panel {
            position: fixed; top: 10px; right: 10px; background: rgba(254,250,224,0.92);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; z-index: 100;
            color: #283618; min-width: 220px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .panel h2 { font-size: 1rem; color: #606C38; margin-bottom: 8px; }
        .panel label { font-size: 0.78rem; display: block; margin: 5px 0 2px; }
        .panel input[type=range] { width: 100%; }
        .panel .val { font-weight: bold; color: #606C38; }
        .btn {
            background: #606C38; color: #FEFAE0; border: none; padding: 5px 10px;
            border-radius: 6px; cursor: pointer; font-size: 0.75rem; margin: 2px;
        }
        .btn:hover { background: #8A9A5B; }
        .btn.active { background: #DDA15E; }
        .info { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(254,250,224,0.88); backdrop-filter: blur(10px); border-radius: 10px;
            padding: 10px 18px; color: #283618; font-size: 0.8rem; z-index: 100; text-align: center;
            max-width: 650px; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="panel">
        <h2>Beam Parameters</h2>
        <p style="font-size:0.75rem; margin-bottom:6px;">Support Type:</p>
        <div>
            <button class="btn active" id="ssBtn">Simply Supported</button>
            <button class="btn" id="cantBtn">Cantilever</button>
            <button class="btn" id="fixBtn">Fixed-Fixed</button>
        </div>
        <p style="font-size:0.75rem; margin-top:8px; margin-bottom:4px;">Load Type:</p>
        <div>
            <button class="btn active" id="pointBtn">Point Load</button>
            <button class="btn" id="udlBtn">UDL</button>
            <button class="btn" id="triBtn">Triangular</button>
        </div>
        <label>Load Position: <span class="val" id="posVal">50</span>%</label>
        <input type="range" id="posSlider" min="5" max="95" value="50">
        <label>Load Magnitude: <span class="val" id="magVal">10</span> kN</label>
        <input type="range" id="magSlider" min="1" max="30" value="10">
    </div>
    <div class="info">
        <strong>Top:</strong> Beam with loading &nbsp;|&nbsp;
        <strong>Middle:</strong> Shear Force Diagram (V) &nbsp;|&nbsp;
        <strong>Bottom:</strong> Bending Moment Diagram (M) &mdash; dM/dx = V
    </div>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    let supportType = 'ss';
    let loadType = 'point';
    const posSlider = document.getElementById('posSlider');
    const magSlider = document.getElementById('magSlider');
    const posVal = document.getElementById('posVal');
    const magVal = document.getElementById('magVal');
    posSlider.addEventListener('input', () => { posVal.textContent = posSlider.value; });
    magSlider.addEventListener('input', () => { magVal.textContent = magSlider.value; });

    const sBtns = { ss: document.getElementById('ssBtn'), cant: document.getElementById('cantBtn'), fix: document.getElementById('fixBtn') };
    const lBtns = { point: document.getElementById('pointBtn'), udl: document.getElementById('udlBtn'), tri: document.getElementById('triBtn') };
    Object.keys(sBtns).forEach(k => sBtns[k].addEventListener('click', () => {
        supportType = k;
        Object.values(sBtns).forEach(b => b.classList.remove('active'));
        sBtns[k].classList.add('active');
    }));
    Object.keys(lBtns).forEach(k => lBtns[k].addEventListener('click', () => {
        loadType = k;
        Object.values(lBtns).forEach(b => b.classList.remove('active'));
        lBtns[k].classList.add('active');
    }));

    let time = 0;

    function computeDiagrams(pos, mag) {
        const n = 200;
        const shear = new Array(n + 1).fill(0);
        const moment = new Array(n + 1).fill(0);
        const L = 1.0;

        if (supportType === 'ss') {
            if (loadType === 'point') {
                const a = pos * L, b = L - a;
                const Ra = mag * b / L, Rb = mag * a / L;
                for (let i = 0; i <= n; i++) {
                    const x = (i / n) * L;
                    shear[i] = x < a ? Ra : Ra - mag;
                    moment[i] = x < a ? Ra * x : Ra * x - mag * (x - a);
                }
            } else if (loadType === 'udl') {
                const w = mag;
                const Ra = w * L / 2;
                for (let i = 0; i <= n; i++) {
                    const x = (i / n) * L;
                    shear[i] = Ra - w * x;
                    moment[i] = Ra * x - w * x * x / 2;
                }
            } else { // triangular
                const w0 = mag * 2;
                const Ra = w0 * L / 6, Rb = w0 * L / 3;
                for (let i = 0; i <= n; i++) {
                    const x = (i / n) * L;
                    const wx = w0 * x / L;
                    shear[i] = Ra - wx * x / (2 * L) * L;
                    shear[i] = Ra - w0 * x * x / (2 * L);
                    moment[i] = Ra * x - w0 * x * x * x / (6 * L);
                }
            }
        } else if (supportType === 'cant') {
            if (loadType === 'point') {
                const a = pos * L;
                for (let i = 0; i <= n; i++) {
                    const x = (i / n) * L;
                    shear[i] = x < a ? 0 : -mag;
                    moment[i] = x < a ? 0 : -mag * (x - a);
                }
            } else if (loadType === 'udl') {
                const w = mag;
                for (let i = 0; i <= n; i++) {
                    const x = (i / n) * L;
                    shear[i] = -w * x;
                    moment[i] = -w * x * x / 2;
                }
            } else {
                const w0 = mag * 2;
                for (let i = 0; i <= n; i++) {
                    const x = (i / n) * L;
                    shear[i] = -w0 * x * x / (2 * L);
                    moment[i] = -w0 * x * x * x / (6 * L);
                }
            }
        } else { // fixed-fixed
            if (loadType === 'point') {
                const a = pos * L, b = L - a;
                for (let i = 0; i <= n; i++) {
                    const x = (i / n) * L;
                    const Ra = mag * b * b * (3 * a + b) / (L * L * L);
                    const Ma = -mag * a * b * b / (L * L);
                    shear[i] = x < a ? Ra : Ra - mag;
                    moment[i] = x < a ? Ma + Ra * x : Ma + Ra * x - mag * (x - a);
                }
            } else if (loadType === 'udl') {
                const w = mag;
                const R = w * L / 2;
                const M0 = -w * L * L / 12;
                for (let i = 0; i <= n; i++) {
                    const x = (i / n) * L;
                    shear[i] = R - w * x;
                    moment[i] = M0 + R * x - w * x * x / 2;
                }
            } else {
                const w0 = mag * 2;
                const Ra = 3 * w0 * L / 20;
                const Ma = -w0 * L * L / 30;
                for (let i = 0; i <= n; i++) {
                    const x = (i / n) * L;
                    shear[i] = Ra - w0 * x * x / (2 * L);
                    moment[i] = Ma + Ra * x - w0 * x * x * x / (6 * L);
                }
            }
        }
        return { shear, moment };
    }

    function drawDiagram(data, y0, height, label, color, fillColor) {
        const n = data.length - 1;
        const maxVal = Math.max(...data.map(Math.abs), 0.001);
        const beamLeft = W * 0.12, beamRight = W * 0.75;
        const beamW = beamRight - beamLeft;

        // Axis
        ctx.strokeStyle = 'rgba(254,250,224,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(beamLeft, y0);
        ctx.lineTo(beamRight, y0);
        ctx.stroke();

        // Fill
        ctx.beginPath();
        ctx.moveTo(beamLeft, y0);
        for (let i = 0; i <= n; i++) {
            const x = beamLeft + (i / n) * beamW;
            const y = y0 - (data[i] / maxVal) * height * 0.4;
            ctx.lineTo(x, y);
        }
        ctx.lineTo(beamRight, y0);
        ctx.closePath();
        ctx.fillStyle = fillColor;
        ctx.fill();

        // Line
        ctx.beginPath();
        for (let i = 0; i <= n; i++) {
            const x = beamLeft + (i / n) * beamW;
            const y = y0 - (data[i] / maxVal) * height * 0.4;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // Label
        ctx.fillStyle = color;
        ctx.font = 'bold 13px "Segoe UI"';
        ctx.textAlign = 'left';
        ctx.fillText(label, beamRight + 15, y0 + 5);

        // Max value
        const maxI = data.reduce((mi, v, i) => Math.abs(v) > Math.abs(data[mi]) ? i : mi, 0);
        const maxX = beamLeft + (maxI / n) * beamW;
        const maxY = y0 - (data[maxI] / maxVal) * height * 0.4;
        ctx.fillStyle = '#FEFAE0';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText((data[maxI]).toFixed(1) + (label.includes('V') ? ' kN' : ' kNm'), maxX, maxY - 8);
    }

    function draw() {
        time += 0.016;
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, W, H);

        const pos = posSlider.value / 100;
        const mag = parseFloat(magSlider.value);
        const { shear, moment } = computeDiagrams(pos, mag);

        const beamLeft = W * 0.12, beamRight = W * 0.75;
        const beamW = beamRight - beamLeft;
        const beamY = H * 0.18;

        // Draw beam
        ctx.fillStyle = '#606C38';
        ctx.fillRect(beamLeft, beamY - 6, beamW, 12);
        ctx.strokeStyle = '#8A9A5B';
        ctx.lineWidth = 2;
        ctx.strokeRect(beamLeft, beamY - 6, beamW, 12);

        // Supports
        if (supportType === 'ss') {
            // Pin left
            ctx.beginPath();
            ctx.moveTo(beamLeft - 12, beamY + 22);
            ctx.lineTo(beamLeft + 12, beamY + 22);
            ctx.lineTo(beamLeft, beamY + 6);
            ctx.closePath();
            ctx.fillStyle = '#8A9A5B'; ctx.fill();
            // Roller right
            ctx.beginPath();
            ctx.moveTo(beamRight - 12, beamY + 22);
            ctx.lineTo(beamRight + 12, beamY + 22);
            ctx.lineTo(beamRight, beamY + 6);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.arc(beamRight - 6, beamY + 26, 4, 0, Math.PI * 2);
            ctx.arc(beamRight + 6, beamY + 26, 4, 0, Math.PI * 2);
            ctx.stroke();
        } else if (supportType === 'cant') {
            // Fixed left
            ctx.fillStyle = '#8A9A5B';
            ctx.fillRect(beamLeft - 12, beamY - 25, 12, 50);
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(beamLeft - 12, beamY - 20 + i * 10);
                ctx.lineTo(beamLeft - 20, beamY - 15 + i * 10);
                ctx.strokeStyle = '#8A9A5B'; ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        } else {
            // Fixed both
            ctx.fillStyle = '#8A9A5B';
            ctx.fillRect(beamLeft - 12, beamY - 25, 12, 50);
            ctx.fillRect(beamRight, beamY - 25, 12, 50);
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.moveTo(beamLeft - 12, beamY - 20 + i * 10);
                ctx.lineTo(beamLeft - 20, beamY - 15 + i * 10);
                ctx.strokeStyle = '#8A9A5B'; ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(beamRight + 12, beamY - 20 + i * 10);
                ctx.lineTo(beamRight + 20, beamY - 15 + i * 10);
                ctx.stroke();
            }
        }

        // Draw load
        if (loadType === 'point') {
            const lx = beamLeft + pos * beamW;
            const pulse = 0.7 + 0.3 * Math.sin(time * 3);
            ctx.strokeStyle = `rgba(221,161,94,${pulse})`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(lx, beamY - 60);
            ctx.lineTo(lx, beamY - 10);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(lx - 7, beamY - 18);
            ctx.lineTo(lx, beamY - 10);
            ctx.lineTo(lx + 7, beamY - 18);
            ctx.stroke();
            ctx.fillStyle = '#DDA15E';
            ctx.font = 'bold 11px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(mag + ' kN', lx, beamY - 65);
        } else {
            // Distributed load
            const numArrows = 15;
            for (let i = 0; i < numArrows; i++) {
                const t = (i + 0.5) / numArrows;
                const ax = beamLeft + t * beamW;
                const h = loadType === 'udl' ? 40 : 40 * t;
                ctx.strokeStyle = 'rgba(221,161,94,0.5)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(ax, beamY - h - 10);
                ctx.lineTo(ax, beamY - 10);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(ax - 3, beamY - 15);
                ctx.lineTo(ax, beamY - 10);
                ctx.lineTo(ax + 3, beamY - 15);
                ctx.stroke();
            }
            // Top line
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            ctx.beginPath();
            if (loadType === 'udl') {
                ctx.moveTo(beamLeft, beamY - 50);
                ctx.lineTo(beamRight, beamY - 50);
            } else {
                ctx.moveTo(beamLeft, beamY - 10);
                ctx.lineTo(beamRight, beamY - 50);
            }
            ctx.stroke();
        }

        // Deflected shape hint
        ctx.strokeStyle = 'rgba(138,154,91,0.3)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        for (let i = 0; i <= 100; i++) {
            const t = i / 100;
            const x = beamLeft + t * beamW;
            const defl = -moment[Math.round(t * 200)] * 0.3;
            i === 0 ? ctx.moveTo(x, beamY + defl) : ctx.lineTo(x, beamY + defl);
        }
        ctx.stroke();
        ctx.setLineDash([]);

        // Diagrams
        const sfdY = H * 0.42;
        const bmdY = H * 0.68;
        const diagH = H * 0.22;

        drawDiagram(shear, sfdY, diagH, 'V (Shear)', '#4a90d9', 'rgba(74,144,217,0.15)');
        drawDiagram(moment, bmdY, diagH, 'M (Moment)', '#DDA15E', 'rgba(221,161,94,0.15)');

        // Title
        ctx.fillStyle = '#FEFAE0';
        ctx.font = 'bold 18px "Segoe UI"';
        ctx.textAlign = 'center';
        ctx.fillText('Beam Bending: Shear Force & Bending Moment Diagrams', W / 2, H * 0.05);

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        supportType = 'ss'; loadType = 'point';
        posSlider.value = 50; posVal.textContent = '50';
        magSlider.value = 10; magVal.textContent = '10';
        Object.values(sBtns).forEach(b => b.classList.remove('active'));
        Object.values(lBtns).forEach(b => b.classList.remove('active'));
        sBtns.ss.classList.add('active');
        lBtns.point.classList.add('active');
    };

    draw();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
