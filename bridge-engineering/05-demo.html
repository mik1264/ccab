<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cable-Stayed Bridge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .panel {
            position: fixed; top: 10px; right: 10px; background: rgba(254,250,224,0.92);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; z-index: 100;
            color: #283618; min-width: 220px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .panel h2 { font-size: 1rem; color: #606C38; margin-bottom: 8px; }
        .panel label { font-size: 0.78rem; display: block; margin: 5px 0 2px; }
        .panel input[type=range] { width: 100%; }
        .panel .val { font-weight: bold; color: #606C38; }
        .btn {
            background: #606C38; color: #FEFAE0; border: none; padding: 5px 10px;
            border-radius: 6px; cursor: pointer; font-size: 0.75rem; margin: 2px;
        }
        .btn:hover { background: #8A9A5B; }
        .btn.active { background: #DDA15E; }
        .info { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(254,250,224,0.88); backdrop-filter: blur(10px); border-radius: 10px;
            padding: 10px 18px; color: #283618; font-size: 0.8rem; z-index: 100; text-align: center;
            max-width: 600px; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="panel">
        <h2>Cable-Stayed Bridge</h2>
        <p style="font-size:0.75rem; margin-bottom:6px;">Cable Pattern:</p>
        <div>
            <button class="btn active" id="fanBtn">Fan</button>
            <button class="btn" id="harpBtn">Harp</button>
            <button class="btn" id="semiBtn">Semi-Fan</button>
        </div>
        <label>Tower Height: <span class="val" id="towVal">120</span>m</label>
        <input type="range" id="towSlider" min="60" max="200" value="120">
        <label>Number of Cables: <span class="val" id="cabVal">8</span></label>
        <input type="range" id="cabSlider" min="3" max="16" value="8">
        <label>Vehicle Position: <span class="val" id="vehVal">50</span>%</label>
        <input type="range" id="vehSlider" min="0" max="100" value="50">
        <label>Vehicle Weight: <span class="val" id="wVal">20</span> tonnes</label>
        <input type="range" id="wSlider" min="0" max="80" value="20">
    </div>
    <div class="info">
        Cable-stayed bridges transfer deck loads through cables directly to the tower.
        Cable tensions vary with the <strong>cable pattern</strong> and <strong>load position</strong>.
    </div>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    let cablePattern = 'fan';
    const patBtns = { fan: document.getElementById('fanBtn'), harp: document.getElementById('harpBtn'), semi: document.getElementById('semiBtn') };
    Object.keys(patBtns).forEach(k => patBtns[k].addEventListener('click', () => {
        cablePattern = k;
        Object.values(patBtns).forEach(b => b.classList.remove('active'));
        patBtns[k].classList.add('active');
    }));

    const towSlider = document.getElementById('towSlider');
    const cabSlider = document.getElementById('cabSlider');
    const vehSlider = document.getElementById('vehSlider');
    const wSlider = document.getElementById('wSlider');
    const towVal = document.getElementById('towVal');
    const cabVal = document.getElementById('cabVal');
    const vehVal = document.getElementById('vehVal');
    const wVal = document.getElementById('wVal');
    towSlider.addEventListener('input', () => { towVal.textContent = towSlider.value; });
    cabSlider.addEventListener('input', () => { cabVal.textContent = cabSlider.value; });
    vehSlider.addEventListener('input', () => { vehVal.textContent = vehSlider.value; });
    wSlider.addEventListener('input', () => { wVal.textContent = wSlider.value; });

    let time = 0;

    function draw() {
        time += 0.016;
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, W, H);

        const towerHReal = parseFloat(towSlider.value);
        const numCables = parseInt(cabSlider.value);
        const vehPos = vehSlider.value / 100;
        const vehWeight = parseFloat(wSlider.value);

        const scale = Math.min(W, H) / 500;
        const cx = W / 2;
        const deckY = H * 0.62;
        const towerH = towerHReal * scale;
        const towerTopY = deckY - towerH;
        const span = Math.min(W * 0.8, 900);
        const halfSpan = span / 2;

        // Sky gradient
        const skyGrad = ctx.createLinearGradient(0, 0, 0, deckY);
        skyGrad.addColorStop(0, '#0d1b2a');
        skyGrad.addColorStop(1, '#1b2838');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, deckY);

        // Water
        const waterGrad = ctx.createLinearGradient(0, deckY + 20, 0, H);
        waterGrad.addColorStop(0, 'rgba(40,60,100,0.5)');
        waterGrad.addColorStop(1, 'rgba(20,30,60,0.7)');
        ctx.fillStyle = waterGrad;
        ctx.fillRect(0, deckY + 20, W, H - deckY - 20);

        // Water reflections
        ctx.globalAlpha = 0.1;
        ctx.strokeStyle = '#4a90d9';
        for (let w = 0; w < 5; w++) {
            ctx.beginPath();
            for (let x = 0; x < W; x += 3) {
                const y = deckY + 30 + w * 20 + 4 * Math.sin(x * 0.008 + time * 0.3 + w * 1.5);
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // Tower
        const towW = 14;
        ctx.fillStyle = '#606C38';
        ctx.fillRect(cx - towW / 2, towerTopY, towW, towerH + 25);
        // Tower crown
        ctx.fillStyle = '#8A9A5B';
        ctx.beginPath();
        ctx.moveTo(cx - towW, towerTopY);
        ctx.lineTo(cx + towW, towerTopY);
        ctx.lineTo(cx, towerTopY - 15);
        ctx.closePath();
        ctx.fill();

        // Deck
        ctx.fillStyle = '#4a3f35';
        ctx.fillRect(cx - halfSpan, deckY - 4, span, 10);
        // Road markings
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 1;
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(cx - halfSpan + 10, deckY + 1);
        ctx.lineTo(cx + halfSpan - 10, deckY + 1);
        ctx.stroke();
        ctx.setLineDash([]);

        // Cables
        for (let side = -1; side <= 1; side += 2) {
            for (let i = 1; i <= numCables; i++) {
                const t = i / (numCables + 1);
                const deckX = cx + side * t * halfSpan;

                let towerAnchorY;
                if (cablePattern === 'fan') {
                    towerAnchorY = towerTopY + 5;
                } else if (cablePattern === 'harp') {
                    towerAnchorY = towerTopY + t * towerH * 0.7;
                } else {
                    towerAnchorY = towerTopY + Math.pow(t, 0.3) * towerH * 0.15;
                }

                // Cable tension based on vehicle proximity
                const cableDist = Math.abs(vehPos - (0.5 + side * t * 0.5));
                const baseTension = 0.3;
                const vehTension = vehWeight > 0 ? Math.max(0, (0.3 - cableDist) * vehWeight * 0.02) : 0;
                const tension = baseTension + vehTension;
                const intensity = Math.min(tension, 1);

                const r = Math.round(74 + intensity * 150);
                const g = Math.round(144 - intensity * 80);
                const b = Math.round(217 - intensity * 150);

                ctx.strokeStyle = `rgba(${r},${g},${b},${0.5 + intensity * 0.5})`;
                ctx.lineWidth = 1 + intensity * 2.5;
                ctx.beginPath();
                ctx.moveTo(cx, towerAnchorY);
                ctx.lineTo(deckX, deckY - 4);
                ctx.stroke();

                // Tension label for first few
                if (i <= 3 && side === 1) {
                    const lx = (cx + deckX) / 2;
                    const ly = (towerAnchorY + deckY) / 2;
                    ctx.fillStyle = `rgba(${r},${g},${b},0.8)`;
                    ctx.font = '9px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText((tension * 100).toFixed(0) + 'kN', lx + 15, ly);
                }
            }
        }

        // Vehicle
        if (vehWeight > 0) {
            const vx = cx - halfSpan + vehPos * span;
            const vy = deckY - 8;
            const vw = 25 + vehWeight * 0.2;
            const vh = 10 + vehWeight * 0.1;
            ctx.fillStyle = '#DDA15E';
            ctx.fillRect(vx - vw / 2, vy - vh, vw, vh);
            ctx.fillStyle = '#FEFAE0';
            ctx.font = '9px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(vehWeight + 't', vx, vy - vh - 5);

            // Weight arrow
            ctx.strokeStyle = 'rgba(221,161,94,0.6)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(vx, vy);
            ctx.lineTo(vx, vy + 20);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(vx - 4, vy + 15);
            ctx.lineTo(vx, vy + 20);
            ctx.lineTo(vx + 4, vy + 15);
            ctx.stroke();
        }

        // Pier/foundation
        ctx.fillStyle = 'rgba(96,108,56,0.5)';
        ctx.fillRect(cx - 20, deckY + 6, 40, 40);

        // Title
        ctx.fillStyle = '#FEFAE0';
        ctx.font = 'bold 18px "Segoe UI"';
        ctx.textAlign = 'center';
        ctx.fillText('Cable-Stayed Bridge — ' + cablePattern.charAt(0).toUpperCase() + cablePattern.slice(1) + ' Pattern', W / 2, 30);

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        cablePattern = 'fan';
        Object.values(patBtns).forEach(b => b.classList.remove('active'));
        patBtns.fan.classList.add('active');
        towSlider.value = 120; towVal.textContent = '120';
        cabSlider.value = 8; cabVal.textContent = '8';
        vehSlider.value = 50; vehVal.textContent = '50';
        wSlider.value = 20; wVal.textContent = '20';
    };

    draw();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
