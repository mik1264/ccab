<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Load Testing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        .panel {
            position: fixed; top: 10px; right: 10px; background: rgba(254,250,224,0.92);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; z-index: 100;
            color: #283618; min-width: 220px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .panel h2 { font-size: 1rem; color: #606C38; margin-bottom: 8px; }
        .panel label { font-size: 0.78rem; display: block; margin: 5px 0 2px; }
        .panel input[type=range] { width: 100%; }
        .panel .val { font-weight: bold; color: #606C38; }
        .panel p { font-size: 0.75rem; line-height: 1.3; }
        .btn {
            background: #606C38; color: #FEFAE0; border: none; padding: 5px 10px;
            border-radius: 6px; cursor: pointer; font-size: 0.75rem; margin: 2px;
        }
        .btn:hover { background: #8A9A5B; }
        .info { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(254,250,224,0.88); backdrop-filter: blur(10px); border-radius: 10px;
            padding: 10px 18px; color: #283618; font-size: 0.8rem; z-index: 100; text-align: center;
            max-width: 600px; }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="panel">
        <h2>Bridge Load Testing</h2>
        <p>Click on the bridge deck to place loads. Double-click to remove.</p>
        <label>Material Stiffness (EI): <span class="val" id="eiVal">50</span></label>
        <input type="range" id="eiSlider" min="10" max="100" value="50">
        <label>Beam Depth: <span class="val" id="depthVal">1.0</span>m</label>
        <input type="range" id="depthSlider" min="3" max="20" value="10">
        <label>Load Magnitude: <span class="val" id="loadVal">10</span> kN</label>
        <input type="range" id="loadSlider" min="1" max="50" value="10">
        <p style="margin-top:8px;">Max Deflection: <strong id="maxDefl">0.0</strong> mm</p>
        <p>Max Stress: <strong id="maxStress">0.0</strong> MPa</p>
        <button class="btn" id="resetLoads" style="margin-top:6px;">Clear All Loads</button>
        <button class="btn" id="animateBtn">Animate Truck</button>
    </div>
    <div class="info">
        Click the bridge to place concentrated loads. Watch real-time <strong>deflection</strong>
        (blue, exaggerated 50x) and <strong>stress distribution</strong> (color gradient).
    </div>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const eiSlider = document.getElementById('eiSlider');
    const depthSlider = document.getElementById('depthSlider');
    const loadSlider = document.getElementById('loadSlider');
    const eiVal = document.getElementById('eiVal');
    const depthVal = document.getElementById('depthVal');
    const loadVal = document.getElementById('loadVal');
    const maxDefl = document.getElementById('maxDefl');
    const maxStress = document.getElementById('maxStress');

    eiSlider.addEventListener('input', () => { eiVal.textContent = eiSlider.value; });
    depthSlider.addEventListener('input', () => { depthVal.textContent = (depthSlider.value / 10).toFixed(1); });
    loadSlider.addEventListener('input', () => { loadVal.textContent = loadSlider.value; });

    let loads = [];
    let animating = false;
    let truckPos = -0.05;
    let time = 0;

    const beamLeft = () => W * 0.1;
    const beamRight = () => W * 0.78;
    const beamY = () => H * 0.4;
    const beamSpan = () => beamRight() - beamLeft();

    canvas.addEventListener('click', e => {
        if (animating) return;
        const x = e.clientX;
        const y = e.clientY;
        const bl = beamLeft(), br = beamRight(), by = beamY();
        if (x >= bl && x <= br && Math.abs(y - by) < 40) {
            const pos = (x - bl) / (br - bl);
            loads.push(pos);
        }
    });

    canvas.addEventListener('dblclick', e => {
        const x = e.clientX;
        const bl = beamLeft(), br = beamRight();
        const pos = (x - bl) / (br - bl);
        // Remove closest load
        let closest = -1, minDist = Infinity;
        loads.forEach((l, i) => {
            const d = Math.abs(l - pos);
            if (d < minDist) { minDist = d; closest = i; }
        });
        if (closest >= 0 && minDist < 0.05) loads.splice(closest, 1);
    });

    document.getElementById('resetLoads').addEventListener('click', () => { loads = []; animating = false; });
    document.getElementById('animateBtn').addEventListener('click', () => {
        animating = !animating;
        if (animating) { truckPos = -0.05; loads = []; }
    });

    function deflection(x, loadPos, EI) {
        // Simply supported beam, point load
        const L = 1.0;
        const a = loadPos * L, b = L - a;
        const P = parseFloat(loadSlider.value);
        if (x <= a) {
            return P * b * x * (L * L - x * x - b * b) / (6 * EI * L);
        }
        return P * a * (L - x) * (2 * L * (L - x) - a * a - (L - x) * (L - x)) / (6 * EI * L);
    }

    function draw() {
        time += 0.016;
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, W, H);

        const EI = parseFloat(eiSlider.value) * 0.1;
        const depth = parseFloat(depthSlider.value) / 10;
        const loadMag = parseFloat(loadSlider.value);
        const bl = beamLeft(), br = beamRight(), by = beamY();
        const span = beamSpan();

        // Truck animation
        if (animating) {
            truckPos += 0.002;
            if (truckPos > 1.05) truckPos = -0.05;
            loads = [truckPos, truckPos - 0.05, truckPos - 0.12].filter(p => p >= 0 && p <= 1);
        }

        // Compute total deflection curve
        const n = 200;
        const deflections = new Array(n + 1).fill(0);
        let maxD = 0;
        for (let i = 0; i <= n; i++) {
            const x = i / n;
            loads.forEach(lp => {
                if (lp >= 0 && lp <= 1) {
                    deflections[i] += deflection(x, lp, EI);
                }
            });
            maxD = Math.max(maxD, Math.abs(deflections[i]));
        }

        // Update stats
        maxDefl.textContent = (maxD * 1000).toFixed(1);
        const stress = maxD > 0 ? (loadMag * span * depth / (2 * EI * 100)).toFixed(1) : '0.0';
        maxStress.textContent = stress;

        // Grid
        ctx.strokeStyle = 'rgba(138,154,91,0.06)';
        ctx.lineWidth = 1;
        for (let x = 0; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

        // Original beam position (dashed)
        ctx.strokeStyle = 'rgba(254,250,224,0.15)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(bl, by);
        ctx.lineTo(br, by);
        ctx.stroke();
        ctx.setLineDash([]);

        // Deflected beam with stress coloring
        const exaggeration = 50;
        const beamH = depth * 15;

        // Draw stress-colored beam
        for (let i = 0; i < n; i++) {
            const x1 = bl + (i / n) * span;
            const x2 = bl + ((i + 1) / n) * span;
            const y1 = by + deflections[i] * exaggeration;
            const y2 = by + deflections[i + 1] * exaggeration;

            const stressLevel = maxD > 0 ? Math.abs(deflections[i]) / maxD : 0;
            const r = Math.round(96 + stressLevel * 121);
            const g = Math.round(108 - stressLevel * 40);
            const b2 = Math.round(56 - stressLevel * 20);

            ctx.fillStyle = `rgb(${r},${g},${b2})`;
            ctx.beginPath();
            ctx.moveTo(x1, y1 - beamH / 2);
            ctx.lineTo(x2, y2 - beamH / 2);
            ctx.lineTo(x2, y2 + beamH / 2);
            ctx.lineTo(x1, y1 + beamH / 2);
            ctx.closePath();
            ctx.fill();
        }

        // Beam outline
        ctx.strokeStyle = '#8A9A5B';
        ctx.lineWidth = 2;
        // Top edge
        ctx.beginPath();
        for (let i = 0; i <= n; i++) {
            const x = bl + (i / n) * span;
            const y = by + deflections[i] * exaggeration - beamH / 2;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
        // Bottom edge
        ctx.beginPath();
        for (let i = 0; i <= n; i++) {
            const x = bl + (i / n) * span;
            const y = by + deflections[i] * exaggeration + beamH / 2;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();

        // Deflection curve (below)
        ctx.strokeStyle = 'rgba(74,144,217,0.7)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i <= n; i++) {
            const x = bl + (i / n) * span;
            const y = by + deflections[i] * exaggeration;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();

        // Supports
        ctx.fillStyle = '#8A9A5B';
        // Pin
        ctx.beginPath();
        ctx.moveTo(bl - 12, by + beamH / 2 + 18);
        ctx.lineTo(bl + 12, by + beamH / 2 + 18);
        ctx.lineTo(bl, by + beamH / 2 + 3);
        ctx.closePath();
        ctx.fill();
        // Roller
        ctx.beginPath();
        ctx.moveTo(br - 12, by + beamH / 2 + 18);
        ctx.lineTo(br + 12, by + beamH / 2 + 18);
        ctx.lineTo(br, by + beamH / 2 + 3);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.arc(br - 5, by + beamH / 2 + 22, 3, 0, Math.PI * 2);
        ctx.arc(br + 5, by + beamH / 2 + 22, 3, 0, Math.PI * 2);
        ctx.strokeStyle = '#8A9A5B';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Load arrows
        loads.forEach(lp => {
            if (lp < 0 || lp > 1) return;
            const lx = bl + lp * span;
            const ly = by + (deflections[Math.round(lp * n)] || 0) * exaggeration;
            const pulse = 0.7 + 0.3 * Math.sin(time * 3);

            ctx.strokeStyle = `rgba(221,161,94,${pulse})`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(lx, ly - beamH / 2 - 60);
            ctx.lineTo(lx, ly - beamH / 2 - 5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(lx - 7, ly - beamH / 2 - 15);
            ctx.lineTo(lx, ly - beamH / 2 - 5);
            ctx.lineTo(lx + 7, ly - beamH / 2 - 15);
            ctx.stroke();

            if (animating) {
                // Truck body
                ctx.fillStyle = '#DDA15E';
                ctx.fillRect(lx - 15, ly - beamH / 2 - 50, 30, 20);
                ctx.fillStyle = '#606C38';
                ctx.fillRect(lx - 12, ly - beamH / 2 - 65, 14, 15);
            }

            ctx.fillStyle = '#DDA15E';
            ctx.font = '10px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(loadMag + 'kN', lx, ly - beamH / 2 - 65);
        });

        // Stress legend
        const legX = bl, legY = H * 0.75, legW = span, legH = 15;
        const grad = ctx.createLinearGradient(legX, 0, legX + legW, 0);
        grad.addColorStop(0, 'rgb(96,108,56)');
        grad.addColorStop(1, 'rgb(217,68,36)');
        ctx.fillStyle = grad;
        ctx.fillRect(legX, legY, legW, legH);
        ctx.strokeStyle = 'rgba(254,250,224,0.3)';
        ctx.strokeRect(legX, legY, legW, legH);
        ctx.fillStyle = '#FEFAE0';
        ctx.font = '10px "Segoe UI"';
        ctx.textAlign = 'left';
        ctx.fillText('Low Stress', legX, legY + legH + 14);
        ctx.textAlign = 'right';
        ctx.fillText('High Stress', legX + legW, legY + legH + 14);
        ctx.textAlign = 'center';
        ctx.fillText('Stress Distribution', legX + legW / 2, legY - 5);

        // Title
        ctx.fillStyle = '#FEFAE0';
        ctx.font = 'bold 18px "Segoe UI"';
        ctx.textAlign = 'center';
        ctx.fillText('Bridge Load Testing & Deflection Analysis', W / 2, 30);

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        loads = [];
        animating = false;
        truckPos = -0.05;
        eiSlider.value = 50; eiVal.textContent = '50';
        depthSlider.value = 10; depthVal.textContent = '1.0';
        loadSlider.value = 10; loadVal.textContent = '10';
    };

    draw();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
