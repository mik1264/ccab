<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milky Sea Phenomenon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #020208; overflow: hidden; font-family: 'Georgia', serif; }
canvas { display: block; }
#info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(2,2,12,0.85); backdrop-filter: blur(10px);
    color: #FEFAE0; padding: 15px 25px; border-radius: 12px;
    border: 1px solid rgba(138,154,91,0.3); max-width: 520px; text-align: center;
    font-size: 0.85rem; line-height: 1.5;
}
#info h3 { color: #8A9A5B; margin-bottom: 6px; }
#controls {
    position: fixed; top: 60px; right: 20px;
    background: rgba(2,2,12,0.85); backdrop-filter: blur(10px);
    color: #FEFAE0; padding: 12px 18px; border-radius: 10px;
    border: 1px solid rgba(138,154,91,0.3); font-size: 0.8rem;
}
#controls label { display: block; margin: 6px 0 2px; color: #8A9A5B; }
#controls input[type="range"] { width: 140px; accent-color: #8A9A5B; }
#controls span { color: #DDA15E; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="controls">
    <label>Bacteria Density: <span id="densVal">60</span>%</label>
    <input type="range" id="density" min="10" max="100" value="60">
    <label>Bloom Spread: <span id="spreadVal">50</span>%</label>
    <input type="range" id="spread" min="10" max="100" value="50">
    <label>View: <span id="viewVal">Ship deck</span></label>
    <input type="range" id="viewMode" min="0" max="1" value="0">
</div>
<div id="info">
    <h3>Milky Sea Phenomenon</h3>
    Rare events where 100,000+ km² of ocean glows uniformly for weeks, caused by vast colonies of
    <em>Vibrio harveyi</em> bacteria. First detected from space in 2005. Most sightings occur in the
    northwest Indian Ocean near Somalia. You are aboard a ship sailing through one.
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const densitySlider = document.getElementById('density');
const spreadSlider = document.getElementById('spread');
const viewSlider = document.getElementById('viewMode');
const densVal = document.getElementById('densVal');
const spreadVal = document.getElementById('spreadVal');
const viewVal = document.getElementById('viewVal');

densitySlider.oninput = () => densVal.textContent = densitySlider.value;
spreadSlider.oninput = () => spreadVal.textContent = spreadSlider.value;
viewSlider.oninput = () => viewVal.textContent = viewSlider.value === '0' ? 'Ship deck' : 'Satellite';

// Ocean glow grid
const CELL = 8;
let cols, rows;
let glowGrid;

function initGrid() {
    cols = Math.ceil(W / CELL);
    rows = Math.ceil(H / CELL);
    glowGrid = new Float32Array(cols * rows);
}
initGrid();
window.addEventListener('resize', () => { resize(); initGrid(); });

// Ship wake
let wakeTrail = [];
let shipX = W / 2, shipY = H * 0.5;

// Stars for sky
const stars = [];
for (let i = 0; i < 120; i++) {
    stars.push({
        x: Math.random(), y: Math.random() * 0.35,
        size: 0.3 + Math.random() * 1.2,
        twinkle: Math.random() * Math.PI * 2
    });
}

let time = 0;
let paused = false;

function init() {
    time = 0;
    glowGrid = new Float32Array(cols * rows);
    wakeTrail = [];
}

function update() {
    time += 0.016;
    const density = densitySlider.value / 100;
    const spread = spreadSlider.value / 100;
    const isSatellite = viewSlider.value === '1';

    // Ship movement
    shipX = W / 2 + Math.sin(time * 0.3) * W * 0.15;
    shipY = isSatellite ? H * 0.55 : H * 0.5;
    wakeTrail.push({ x: shipX, y: shipY + 20, age: 0 });
    if (wakeTrail.length > 200) wakeTrail.shift();
    for (const w of wakeTrail) w.age += 0.016;

    // Update glow grid
    const horizonY = isSatellite ? 0 : Math.floor(H * 0.35 / CELL);

    for (let gy = horizonY; gy < rows; gy++) {
        for (let gx = 0; gx < cols; gx++) {
            const idx = gy * cols + gx;
            const wx = gx * CELL;
            const wy = gy * CELL;

            // Base bacterial glow (perlin-like noise using sin)
            const n1 = Math.sin(gx * 0.05 + time * 0.2) * Math.cos(gy * 0.03 + time * 0.15);
            const n2 = Math.sin(gx * 0.12 - time * 0.1) * Math.sin(gy * 0.08 + time * 0.25);
            const n3 = Math.sin((gx + gy) * 0.02 + time * 0.05);
            const baseGlow = (n1 + n2 + n3) * 0.2 + 0.4;

            // Bloom pattern (concentrated patches)
            const bloomX = Math.sin(gx * 0.008 + time * 0.05) * Math.cos(gy * 0.006);
            const bloomY = Math.sin(gy * 0.01 + time * 0.03) * Math.cos(gx * 0.007);
            const bloom = Math.max(0, bloomX + bloomY) * spread;

            let glow = (baseGlow + bloom) * density;

            // Wake disturbance (stimulated glow)
            for (const w of wakeTrail) {
                if (w.age > 3) continue;
                const d = Math.hypot(wx - w.x, wy - w.y);
                if (d < 60) {
                    const wakeGlow = (1 - d / 60) * (1 - w.age / 3) * 0.5;
                    glow += wakeGlow;
                }
            }

            glowGrid[idx] = Math.min(1, Math.max(0, glow));
        }
    }
}

function drawShipView() {
    // Sky
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.35);
    skyGrad.addColorStop(0, '#04040c');
    skyGrad.addColorStop(1, '#060815');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H * 0.35);

    // Stars
    for (const s of stars) {
        const twinkle = 0.3 + Math.sin(time * 2 + s.twinkle) * 0.3;
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.size * twinkle, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,240,${twinkle + 0.3})`;
        ctx.fill();
    }

    // Ocean with bioluminescent glow
    const horizonRow = Math.floor(H * 0.35 / CELL);
    const imageData = ctx.createImageData(W, H);
    const data = imageData.data;

    for (let gy = horizonRow; gy < rows; gy++) {
        for (let gx = 0; gx < cols; gx++) {
            const val = glowGrid[gy * cols + gx];
            if (val < 0.01) continue;

            // Milky blue-white glow
            const v = val * val;
            const r = Math.floor(v * 80 + val * 30);
            const g = Math.floor(v * 120 + val * 60);
            const b = Math.floor(v * 180 + val * 80);

            const px = gx * CELL;
            const py = gy * CELL;
            for (let dy = 0; dy < CELL && py + dy < H; dy++) {
                for (let dx = 0; dx < CELL && px + dx < W; dx++) {
                    const idx = ((py + dy) * W + (px + dx)) * 4;
                    data[idx] = Math.min(255, data[idx] + r);
                    data[idx + 1] = Math.min(255, data[idx + 1] + g);
                    data[idx + 2] = Math.min(255, data[idx + 2] + b);
                    data[idx + 3] = 255;
                }
            }
        }
    }
    ctx.putImageData(imageData, 0, 0);

    // Redraw sky on top (imageData overwrote alpha)
    const skyGrad2 = ctx.createLinearGradient(0, 0, 0, H * 0.35);
    skyGrad2.addColorStop(0, '#04040c');
    skyGrad2.addColorStop(1, '#060815');
    ctx.fillStyle = skyGrad2;
    ctx.fillRect(0, 0, W, H * 0.35);
    for (const s of stars) {
        const twinkle = 0.3 + Math.sin(time * 2 + s.twinkle) * 0.3;
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.size * twinkle, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,240,${twinkle + 0.3})`;
        ctx.fill();
    }

    // Horizon glow
    const hGrad = ctx.createLinearGradient(0, H * 0.32, 0, H * 0.42);
    hGrad.addColorStop(0, 'rgba(40,60,100,0)');
    hGrad.addColorStop(0.5, `rgba(60,100,160,${densitySlider.value / 300})`);
    hGrad.addColorStop(1, 'rgba(40,80,140,0)');
    ctx.fillStyle = hGrad;
    ctx.fillRect(0, H * 0.32, W, H * 0.1);

    // Ship railing silhouette
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, H * 0.82, W, H * 0.18);
    // Railing posts
    for (let x = 30; x < W; x += 60) {
        ctx.fillRect(x, H * 0.75, 4, H * 0.07);
    }
    // Top rail
    ctx.fillRect(0, H * 0.75, W, 3);

    // Wake visible from ship
    ctx.strokeStyle = 'rgba(100,180,255,0.3)';
    ctx.lineWidth = 2;
    for (let i = 1; i < wakeTrail.length; i++) {
        const alpha = 1 - wakeTrail[i].age / 3;
        if (alpha <= 0) continue;
        ctx.strokeStyle = `rgba(100,180,255,${alpha * 0.3})`;
        ctx.beginPath();
        ctx.moveTo(wakeTrail[i - 1].x, wakeTrail[i - 1].y);
        ctx.lineTo(wakeTrail[i].x, wakeTrail[i].y);
        ctx.stroke();
    }
}

function drawSatelliteView() {
    // Dark background (Earth from space)
    ctx.fillStyle = '#010104';
    ctx.fillRect(0, 0, W, H);

    // Landmass outline (simplified Horn of Africa / Arabian coast)
    ctx.fillStyle = '#080808';
    ctx.beginPath();
    ctx.moveTo(W * 0.7, 0);
    ctx.lineTo(W * 0.75, H * 0.1);
    ctx.lineTo(W * 0.8, H * 0.2);
    ctx.quadraticCurveTo(W * 0.85, H * 0.35, W * 0.78, H * 0.5);
    ctx.lineTo(W * 0.82, H * 0.6);
    ctx.lineTo(W, H * 0.6);
    ctx.lineTo(W, 0);
    ctx.fill();

    // Somalia coast
    ctx.beginPath();
    ctx.moveTo(W * 0.6, H);
    ctx.quadraticCurveTo(W * 0.65, H * 0.8, W * 0.78, H * 0.5);
    ctx.lineTo(W, H * 0.6);
    ctx.lineTo(W, H);
    ctx.fill();

    // Milky sea glow from satellite
    const imageData = ctx.getImageData(0, 0, W, H);
    const data = imageData.data;

    for (let gy = 0; gy < rows; gy++) {
        for (let gx = 0; gx < cols; gx++) {
            const val = glowGrid[gy * cols + gx];
            if (val < 0.01) continue;

            const v = val * val * 0.6;
            const r = Math.floor(v * 60);
            const g = Math.floor(v * 100);
            const b = Math.floor(v * 160);

            const px = gx * CELL;
            const py = gy * CELL;
            for (let dy = 0; dy < CELL && py + dy < H; dy++) {
                for (let dx = 0; dx < CELL && px + dx < W; dx++) {
                    const idx = ((py + dy) * W + (px + dx)) * 4;
                    data[idx] = Math.min(255, data[idx] + r);
                    data[idx + 1] = Math.min(255, data[idx + 1] + g);
                    data[idx + 2] = Math.min(255, data[idx + 2] + b);
                    data[idx + 3] = 255;
                }
            }
        }
    }
    ctx.putImageData(imageData, 0, 0);

    // Redraw land
    ctx.fillStyle = '#080808';
    ctx.beginPath();
    ctx.moveTo(W * 0.7, 0);
    ctx.lineTo(W * 0.75, H * 0.1);
    ctx.lineTo(W * 0.8, H * 0.2);
    ctx.quadraticCurveTo(W * 0.85, H * 0.35, W * 0.78, H * 0.5);
    ctx.lineTo(W * 0.82, H * 0.6);
    ctx.lineTo(W, H * 0.6);
    ctx.lineTo(W, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(W * 0.6, H);
    ctx.quadraticCurveTo(W * 0.65, H * 0.8, W * 0.78, H * 0.5);
    ctx.lineTo(W, H * 0.6);
    ctx.lineTo(W, H);
    ctx.fill();

    // Ship icon
    ctx.fillStyle = '#ff6644';
    ctx.beginPath();
    ctx.arc(shipX, shipY, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#DDA15E';
    ctx.font = '10px Georgia';
    ctx.textAlign = 'left';
    ctx.fillText('Ship', shipX + 6, shipY + 3);

    // Scale bar
    ctx.strokeStyle = '#8A9A5B';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(20, H - 40);
    ctx.lineTo(120, H - 40);
    ctx.stroke();
    ctx.fillStyle = '#8A9A5B';
    ctx.font = '10px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('~200 km', 70, H - 45);

    // Label
    ctx.fillStyle = '#DDA15E';
    ctx.font = '12px Georgia';
    ctx.textAlign = 'right';
    ctx.fillText('DMSP-OLS Satellite View', W - 20, 30);
    ctx.fillText('NW Indian Ocean', W - 20, 48);
}

function draw() {
    const isSatellite = viewSlider.value === '1';
    if (isSatellite) {
        drawSatelliteView();
    } else {
        drawShipView();
    }

    // Area estimate
    const coverage = spreadSlider.value * densitySlider.value / 100;
    ctx.fillStyle = '#8A9A5B';
    ctx.font = '11px Georgia';
    ctx.textAlign = 'left';
    ctx.fillText(`Est. bloom area: ~${Math.round(coverage * 1000)} km²`, 14, 70);
}

function loop() {
    if (!paused) {
        update();
        draw();
    }
    requestAnimationFrame(loop);
}
loop();

window.reset = function() {
    init();
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); paused = !paused; }
});
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
