<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter-Illumination Camouflage</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #020210; overflow: hidden; font-family: 'Georgia', serif; }
canvas { display: block; }
#info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(2,2,16,0.85); backdrop-filter: blur(10px);
    color: #FEFAE0; padding: 15px 25px; border-radius: 12px;
    border: 1px solid rgba(138,154,91,0.3); max-width: 520px; text-align: center;
    font-size: 0.85rem; line-height: 1.5;
}
#info h3 { color: #8A9A5B; margin-bottom: 6px; }
#controls {
    position: fixed; top: 60px; right: 20px;
    background: rgba(2,2,16,0.85); backdrop-filter: blur(10px);
    color: #FEFAE0; padding: 12px 18px; border-radius: 10px;
    border: 1px solid rgba(138,154,91,0.3); font-size: 0.8rem;
}
#controls label { display: block; margin: 6px 0 2px; color: #8A9A5B; }
#controls input[type="range"] { width: 140px; accent-color: #8A9A5B; }
#controls span { color: #DDA15E; }
.btn {
    margin-top: 8px; padding: 5px 10px; background: rgba(138,154,91,0.2);
    border: 1px solid rgba(138,154,91,0.4); color: #FEFAE0; border-radius: 4px;
    cursor: pointer; font-family: Georgia; font-size: 0.75rem;
}
.btn:hover { background: rgba(138,154,91,0.3); }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="controls">
    <label>Depth (m): <span id="depthVal">200</span></label>
    <input type="range" id="depth" min="50" max="800" value="200">
    <label>Photophore Intensity: <span id="photoVal">Auto</span></label>
    <input type="range" id="photophore" min="0" max="100" value="50">
    <label>View Angle</label>
    <button class="btn" id="viewBelow">View from Below</button>
    <button class="btn" id="viewSide">Side View</button>
</div>
<div id="info">
    <h3>Counter-Illumination Camouflage</h3>
    Many mesopelagic fish use ventral photophores to match the intensity of downwelling light,
    eliminating their silhouette when seen from below. This evolved strategy lets prey avoid
    detection by predators looking upward against the dim surface light.
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const depthSlider = document.getElementById('depth');
const photoSlider = document.getElementById('photophore');
const depthVal = document.getElementById('depthVal');
const photoVal = document.getElementById('photoVal');
const viewBelowBtn = document.getElementById('viewBelow');
const viewSideBtn = document.getElementById('viewSide');

depthSlider.oninput = () => depthVal.textContent = depthSlider.value;
photoSlider.oninput = () => {
    photoVal.textContent = photoSlider.value === '50' ? 'Auto' : photoSlider.value + '%';
};

let viewMode = 'below'; // 'below' or 'side'
viewBelowBtn.onclick = () => viewMode = 'below';
viewSideBtn.onclick = () => viewMode = 'side';

// Fish with photophores
const fish = {
    x: 0, y: 0, angle: 0,
    bodyLen: 80, bodyH: 25,
    photophores: [],
    tailPhase: 0
};

// Create photophore positions along ventral side
for (let i = 0; i < 20; i++) {
    fish.photophores.push({
        offsetX: -fish.bodyLen * 0.4 + i * (fish.bodyLen * 0.8 / 19),
        offsetY: fish.bodyH * 0.4 + Math.random() * 3,
        size: 1.5 + Math.random() * 1.5,
        phase: Math.random() * Math.PI * 2
    });
}

// Other sea creatures
let creatures = [];
function createCreature() {
    return {
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.3,
        size: 5 + Math.random() * 15,
        hasCounter: Math.random() > 0.3,
        type: Math.random() < 0.5 ? 'fish' : 'squid'
    };
}

function init() {
    creatures = [];
    for (let i = 0; i < 8; i++) creatures.push(createCreature());
}
init();

let mouseX = W / 2, mouseY = H / 2;
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
}, { passive: false });

let time = 0;
let paused = false;

function getDownwellingLight(depth) {
    // Exponential decay of sunlight with depth
    return Math.exp(-depth / 200) * 0.8;
}

function update() {
    time += 0.016;
    const depth = parseInt(depthSlider.value);

    // Fish follows mouse
    fish.x += (mouseX - fish.x) * 0.03;
    fish.y += (mouseY - fish.y) * 0.03;
    const dx = mouseX - fish.x;
    fish.angle = dx > 0 ? 0 : Math.PI;
    fish.tailPhase += 0.1;

    // Update other creatures
    for (const c of creatures) {
        c.x += c.vx;
        c.y += c.vy;
        c.vx += (Math.random() - 0.5) * 0.02;
        c.vy += (Math.random() - 0.5) * 0.02;
        c.vx *= 0.99;
        c.vy *= 0.99;
        if (c.x < -50) c.x = W + 50;
        if (c.x > W + 50) c.x = -50;
        if (c.y < 50) c.vy += 0.01;
        if (c.y > H - 100) c.vy -= 0.01;
    }
}

function drawSideView() {
    const depth = parseInt(depthSlider.value);
    const downwelling = getDownwellingLight(depth);
    const photoIntensity = photoSlider.value / 50; // 1 = auto match

    // Water gradient (darker with depth)
    const waterGrad = ctx.createLinearGradient(0, 0, 0, H);
    const topLight = Math.min(0.3, downwelling + 0.05);
    waterGrad.addColorStop(0, `rgba(10,30,${Math.floor(80 * topLight)},1)`);
    waterGrad.addColorStop(1, `rgba(2,5,${Math.floor(30 * topLight)},1)`);
    ctx.fillStyle = waterGrad;
    ctx.fillRect(0, 0, W, H);

    // Light rays from above
    for (let i = 0; i < 8; i++) {
        const rx = (i / 8 + 0.06) * W;
        ctx.save();
        ctx.globalAlpha = downwelling * 0.1;
        ctx.beginPath();
        ctx.moveTo(rx - 20, 0);
        ctx.lineTo(rx - 60, H);
        ctx.lineTo(rx + 60, H);
        ctx.lineTo(rx + 20, 0);
        ctx.fillStyle = 'rgba(100,150,200,0.15)';
        ctx.fill();
        ctx.restore();
    }

    // Draw fish (side view)
    ctx.save();
    ctx.translate(fish.x, fish.y);
    const facing = fish.angle === 0 ? 1 : -1;
    ctx.scale(facing, 1);

    // Shadow beneath (what predators see without counter-illumination)
    ctx.fillStyle = `rgba(0,0,0,${0.3 * downwelling})`;
    ctx.beginPath();
    ctx.ellipse(0, fish.bodyH + 10, fish.bodyLen * 0.5, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.beginPath();
    ctx.ellipse(0, 0, fish.bodyLen * 0.5, fish.bodyH, 0, 0, Math.PI * 2);
    const bodyGrad = ctx.createLinearGradient(0, -fish.bodyH, 0, fish.bodyH);
    bodyGrad.addColorStop(0, '#4a6080');
    bodyGrad.addColorStop(0.4, '#2a3a4a');
    bodyGrad.addColorStop(1, '#1a2530');
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // Eye
    ctx.beginPath();
    ctx.arc(fish.bodyLen * 0.35, -5, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a2a';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(fish.bodyLen * 0.36, -5, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#ffcc44';
    ctx.fill();

    // Fins
    ctx.fillStyle = 'rgba(60,80,100,0.5)';
    ctx.beginPath();
    ctx.moveTo(-5, -fish.bodyH * 0.8);
    ctx.lineTo(-15, -fish.bodyH * 1.5);
    ctx.lineTo(10, -fish.bodyH * 0.9);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(5, fish.bodyH * 0.7);
    ctx.lineTo(-10, fish.bodyH * 1.3);
    ctx.lineTo(15, fish.bodyH * 0.8);
    ctx.fill();

    // Tail
    const tailSway = Math.sin(fish.tailPhase) * 5;
    ctx.beginPath();
    ctx.moveTo(-fish.bodyLen * 0.45, 0);
    ctx.lineTo(-fish.bodyLen * 0.7, -15 + tailSway);
    ctx.lineTo(-fish.bodyLen * 0.7, 15 + tailSway);
    ctx.closePath();
    ctx.fillStyle = '#2a3a4a';
    ctx.fill();

    // Ventral photophores
    for (const p of fish.photophores) {
        const intensity = downwelling * photoIntensity;
        const glow = intensity * (0.8 + Math.sin(time * 2 + p.phase) * 0.2);
        if (glow > 0.01) {
            // Glow halo
            const grad = ctx.createRadialGradient(
                p.offsetX, p.offsetY, 0,
                p.offsetX, p.offsetY, p.size * 8
            );
            grad.addColorStop(0, `rgba(120,180,255,${glow})`);
            grad.addColorStop(0.5, `rgba(80,140,220,${glow * 0.3})`);
            grad.addColorStop(1, 'rgba(40,80,150,0)');
            ctx.beginPath();
            ctx.arc(p.offsetX, p.offsetY, p.size * 8, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Core
            ctx.beginPath();
            ctx.arc(p.offsetX, p.offsetY, p.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180,220,255,${glow})`;
            ctx.fill();
        }
    }

    ctx.restore();

    // Effectiveness label
    const effectiveness = Math.abs(1 - photoIntensity) < 0.3 ? 'Excellent' :
                          Math.abs(1 - photoIntensity) < 0.6 ? 'Moderate' : 'Poor';
    ctx.fillStyle = '#DDA15E';
    ctx.font = '12px Georgia';
    ctx.textAlign = 'left';
    ctx.fillText(`Camouflage: ${effectiveness}`, 14, 70);
    ctx.fillText(`Downwelling light: ${(downwelling * 100).toFixed(0)}%`, 14, 88);
    ctx.fillText(`Photophore output: ${(downwelling * photoIntensity * 100).toFixed(0)}%`, 14, 106);
}

function drawBelowView() {
    const depth = parseInt(depthSlider.value);
    const downwelling = getDownwellingLight(depth);
    const photoIntensity = photoSlider.value / 50;

    // Looking up — blue-filtered surface light
    const skyGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
    skyGrad.addColorStop(0, `rgba(${Math.floor(40 + downwelling * 100)},${Math.floor(60 + downwelling * 120)},${Math.floor(100 + downwelling * 155)},1)`);
    skyGrad.addColorStop(1, `rgba(5,10,${Math.floor(30 + downwelling * 40)},1)`);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Snell's window (circular bright area looking up through water)
    const snellR = Math.min(W, H) * 0.35;
    const snellGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, snellR);
    snellGrad.addColorStop(0, `rgba(${Math.floor(100 + downwelling * 155)},${Math.floor(140 + downwelling * 115)},${Math.floor(200 + downwelling * 55)},${downwelling * 0.4})`);
    snellGrad.addColorStop(0.8, `rgba(60,100,160,${downwelling * 0.1})`);
    snellGrad.addColorStop(1, 'rgba(20,40,80,0)');
    ctx.beginPath();
    ctx.arc(W / 2, H / 2, snellR, 0, Math.PI * 2);
    ctx.fillStyle = snellGrad;
    ctx.fill();

    // Fish silhouette from below — how visible is it?
    const silhouetteAlpha = Math.max(0, 0.7 - (downwelling * photoIntensity));

    ctx.save();
    ctx.translate(fish.x, fish.y);
    const facing = fish.angle === 0 ? 1 : -1;
    ctx.scale(facing, 1);

    // Fish silhouette (dark shape against bright background)
    ctx.beginPath();
    ctx.ellipse(0, 0, fish.bodyLen * 0.5, fish.bodyH * 0.7, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,0,20,${silhouetteAlpha})`;
    ctx.fill();

    // Tail
    ctx.beginPath();
    ctx.moveTo(-fish.bodyLen * 0.45, 0);
    ctx.lineTo(-fish.bodyLen * 0.65, -12);
    ctx.lineTo(-fish.bodyLen * 0.65, 12);
    ctx.closePath();
    ctx.fillStyle = `rgba(0,0,20,${silhouetteAlpha * 0.8})`;
    ctx.fill();

    // Photophore glow (counteracting the silhouette)
    for (const p of fish.photophores) {
        const intensity = downwelling * photoIntensity;
        const glow = intensity * (0.8 + Math.sin(time * 2 + p.phase) * 0.2);
        if (glow > 0.01) {
            const grad = ctx.createRadialGradient(p.offsetX, 0, 0, p.offsetX, 0, p.size * 12);
            grad.addColorStop(0, `rgba(140,200,255,${glow * 0.8})`);
            grad.addColorStop(0.5, `rgba(80,150,220,${glow * 0.3})`);
            grad.addColorStop(1, 'rgba(40,80,150,0)');
            ctx.beginPath();
            ctx.arc(p.offsetX, 0, p.size * 12, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
        }
    }

    ctx.restore();

    // Other creatures' silhouettes
    for (const c of creatures) {
        const cAlpha = c.hasCounter ? Math.max(0, 0.3 - downwelling * 0.8) : 0.5;
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, c.size, c.size * 0.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,0,20,${cAlpha})`;
        ctx.fill();

        if (c.hasCounter) {
            // Tiny photophores
            for (let i = 0; i < 4; i++) {
                const px = c.x - c.size * 0.3 + i * c.size * 0.2;
                const grad = ctx.createRadialGradient(px, c.y, 0, px, c.y, 4);
                grad.addColorStop(0, `rgba(120,180,255,${downwelling * 0.5})`);
                grad.addColorStop(1, 'rgba(60,100,180,0)');
                ctx.beginPath();
                ctx.arc(px, c.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
            }
        }
    }

    // Labels
    ctx.fillStyle = '#DDA15E';
    ctx.font = '12px Georgia';
    ctx.textAlign = 'left';
    const match = Math.abs(1 - photoIntensity);
    const label = match < 0.15 ? 'Near-invisible!' : match < 0.4 ? 'Hard to spot' : 'Visible silhouette';
    ctx.fillText(`From predator's view: ${label}`, 14, 70);
    ctx.fillText('(Looking upward)', 14, 88);
}

function draw() {
    if (viewMode === 'below') {
        drawBelowView();
    } else {
        drawSideView();
    }
}

function loop() {
    if (!paused) {
        update();
        draw();
    }
    requestAnimationFrame(loop);
}
loop();

window.reset = function() {
    init();
    depthSlider.value = 200;
    photoSlider.value = 50;
    depthVal.textContent = '200';
    photoVal.textContent = 'Auto';
    viewMode = 'below';
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); paused = !paused; }
});
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
