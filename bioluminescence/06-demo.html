<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glowworm Cave</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #020204; overflow: hidden; font-family: 'Georgia', serif; }
canvas { display: block; }
#info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(2,2,8,0.85); backdrop-filter: blur(10px);
    color: #FEFAE0; padding: 15px 25px; border-radius: 12px;
    border: 1px solid rgba(138,154,91,0.3); max-width: 540px; text-align: center;
    font-size: 0.85rem; line-height: 1.5;
}
#info h3 { color: #8A9A5B; margin-bottom: 6px; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <h3>Glowworm Cave (Waitomo)</h3>
    <em>Arachnocampa luminosa</em> larvae glow blue-green (487 nm) from their Malpighian tubules,
    using a unique luciferin derived from xanthurenic acid. They dangle sticky silk threads to trap
    insects attracted to the light — a living constellation on the cave ceiling.
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let mouseX = W / 2, mouseY = H / 2;
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
}, { passive: false });

// Glowworms on cave ceiling
let worms = [];
let insects = [];
let caughtInsects = [];

// Cave ceiling profile
const ceilingPoints = [];
function initCeiling() {
    ceilingPoints.length = 0;
    for (let x = 0; x <= W; x += 8) {
        const baseY = 30 + Math.sin(x * 0.003) * 40 + Math.sin(x * 0.008) * 25 +
                      Math.sin(x * 0.02) * 12 + Math.random() * 10;
        ceilingPoints.push({ x, y: baseY });
    }
}

function createWorm() {
    const x = 30 + Math.random() * (W - 60);
    // Find ceiling Y at this x
    const ci = Math.floor(x / 8);
    const cy = ceilingPoints[ci] ? ceilingPoints[ci].y : 50;
    const threadLen = 40 + Math.random() * 120;
    return {
        x, y: cy,
        threadLen,
        glow: 0.3 + Math.random() * 0.7,
        glowTarget: 0.5 + Math.random() * 0.5,
        glowSpeed: 0.005 + Math.random() * 0.01,
        phase: Math.random() * Math.PI * 2,
        droplets: Math.floor(2 + Math.random() * 5),
        threadSway: 0,
        hasCatch: false
    };
}

function createInsect() {
    return {
        x: Math.random() * W,
        y: H * 0.3 + Math.random() * H * 0.5,
        vx: (Math.random() - 0.5) * 1.5,
        vy: (Math.random() - 0.5) * 1,
        size: 1.5 + Math.random() * 2,
        attracted: false,
        targetWorm: null,
        wingPhase: Math.random() * Math.PI * 2
    };
}

function init() {
    initCeiling();
    worms = [];
    for (let i = 0; i < 80; i++) worms.push(createWorm());
    insects = [];
    for (let i = 0; i < 20; i++) insects.push(createInsect());
    caughtInsects = [];
}
init();

window.addEventListener('resize', () => { resize(); init(); });

let time = 0;
let paused = false;

function update() {
    time += 0.016;

    // Update worms
    for (const w of worms) {
        // Glow pulsing
        w.glow += (w.glowTarget - w.glow) * w.glowSpeed;
        if (Math.abs(w.glow - w.glowTarget) < 0.05) {
            w.glowTarget = 0.2 + Math.random() * 0.8;
        }
        w.phase += 0.02;
        w.threadSway = Math.sin(time * 0.5 + w.x * 0.01) * 3;

        // Disturb when mouse is near (worms dim with disturbance)
        const dm = Math.hypot(mouseX - w.x, mouseY - w.y);
        if (dm < 100) {
            w.glow *= 0.95;
        }
    }

    // Update insects
    for (let i = insects.length - 1; i >= 0; i--) {
        const ins = insects[i];
        ins.wingPhase += 0.3;

        // Find nearest bright worm
        let nearestDist = Infinity;
        let nearestWorm = null;
        for (const w of worms) {
            if (w.glow < 0.3) continue;
            const d = Math.hypot(ins.x - w.x, ins.y - w.y);
            if (d < 200 && d < nearestDist) {
                nearestDist = d;
                nearestWorm = w;
            }
        }

        if (nearestWorm) {
            ins.attracted = true;
            ins.targetWorm = nearestWorm;
            // Fly toward worm with some spiral
            const dx = nearestWorm.x - ins.x;
            const dy = nearestWorm.y - ins.y;
            const d = Math.hypot(dx, dy);
            ins.vx += (dx / d) * 0.08 + Math.sin(time * 3 + i) * 0.05;
            ins.vy += (dy / d) * 0.08 + Math.cos(time * 3 + i) * 0.05;

            // Check if caught in thread
            if (d < nearestWorm.threadLen && Math.abs(ins.x - nearestWorm.x) < 5) {
                // Caught!
                caughtInsects.push({
                    x: ins.x, y: ins.y, worm: nearestWorm,
                    alpha: 1, time: 0
                });
                nearestWorm.hasCatch = true;
                nearestWorm.glow = 1;
                insects.splice(i, 1);
                continue;
            }
        } else {
            ins.attracted = false;
            ins.vx += (Math.random() - 0.5) * 0.1;
            ins.vy += (Math.random() - 0.5) * 0.1;
        }

        ins.vx *= 0.97;
        ins.vy *= 0.97;
        ins.x += ins.vx;
        ins.y += ins.vy;

        // Bounds
        if (ins.x < 0 || ins.x > W) ins.vx *= -1;
        if (ins.y < 50 || ins.y > H - 50) ins.vy *= -1;
    }

    // Spawn new insects
    if (insects.length < 20 && Math.random() < 0.02) {
        insects.push(createInsect());
    }

    // Fade caught insects
    for (let i = caughtInsects.length - 1; i >= 0; i--) {
        caughtInsects[i].time += 0.016;
        caughtInsects[i].alpha = Math.max(0, 1 - caughtInsects[i].time / 5);
        if (caughtInsects[i].alpha <= 0) {
            caughtInsects[i].worm.hasCatch = false;
            caughtInsects.splice(i, 1);
        }
    }
}

function draw() {
    ctx.fillStyle = '#020204';
    ctx.fillRect(0, 0, W, H);

    // Cave walls (subtle gradient)
    const wallGrad = ctx.createLinearGradient(0, 0, 0, H);
    wallGrad.addColorStop(0, '#0a0a10');
    wallGrad.addColorStop(0.5, '#020204');
    wallGrad.addColorStop(1, '#0a0808');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 0, W, H);

    // Water reflection at bottom
    const waterY = H * 0.85;
    const waterGrad = ctx.createLinearGradient(0, waterY, 0, H);
    waterGrad.addColorStop(0, 'rgba(0,5,15,0.5)');
    waterGrad.addColorStop(1, 'rgba(0,2,8,0.8)');
    ctx.fillStyle = waterGrad;
    ctx.fillRect(0, waterY, W, H - waterY);

    // Cave ceiling
    ctx.beginPath();
    ctx.moveTo(0, 0);
    for (const p of ceilingPoints) {
        ctx.lineTo(p.x, p.y);
    }
    ctx.lineTo(W, 0);
    ctx.closePath();
    ctx.fillStyle = '#080810';
    ctx.fill();

    // Draw threads and worms
    for (const w of worms) {
        const glow = w.glow;
        const endX = w.x + w.threadSway;
        const endY = w.y + w.threadLen;

        // Thread (silk line)
        ctx.strokeStyle = `rgba(180,200,220,${glow * 0.15})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(w.x, w.y);
        ctx.lineTo(endX, endY);
        ctx.stroke();

        // Sticky droplets on thread
        for (let d = 1; d <= w.droplets; d++) {
            const t = d / (w.droplets + 1);
            const dx = w.x + w.threadSway * t;
            const dy = w.y + w.threadLen * t;
            ctx.beginPath();
            ctx.arc(dx, dy, 1, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200,220,255,${glow * 0.3})`;
            ctx.fill();
        }

        // Worm glow (blue-green, 487nm)
        if (glow > 0.05) {
            const glowR = 8 + glow * 20;
            const grad = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, glowR);
            grad.addColorStop(0, `rgba(60,180,220,${glow * 0.9})`);
            grad.addColorStop(0.3, `rgba(40,140,200,${glow * 0.4})`);
            grad.addColorStop(0.7, `rgba(20,80,150,${glow * 0.1})`);
            grad.addColorStop(1, 'rgba(10,40,80,0)');
            ctx.beginPath();
            ctx.arc(w.x, w.y, glowR, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Worm body (tiny)
            ctx.beginPath();
            ctx.arc(w.x, w.y, 2, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(100,200,240,${glow})`;
            ctx.fill();

            // Water reflection
            if (waterY - w.y < 300) {
                const refY = waterY + (waterY - w.y) * 0.3;
                const refGlow = glow * 0.15 * (1 - (waterY - w.y) / 300);
                const refGrad = ctx.createRadialGradient(w.x, refY, 0, w.x, refY, glowR * 0.6);
                refGrad.addColorStop(0, `rgba(40,140,200,${refGlow})`);
                refGrad.addColorStop(1, 'rgba(10,40,80,0)');
                ctx.beginPath();
                ctx.arc(w.x, refY, glowR * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = refGrad;
                ctx.fill();
            }
        }
    }

    // Draw caught insects
    for (const ci of caughtInsects) {
        ctx.beginPath();
        ctx.arc(ci.x, ci.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,180,150,${ci.alpha * 0.5})`;
        ctx.fill();
    }

    // Draw free insects
    for (const ins of insects) {
        ctx.save();
        ctx.translate(ins.x, ins.y);

        // Wings
        const wingAngle = Math.sin(ins.wingPhase) * 0.5;
        ctx.fillStyle = ins.attracted ? 'rgba(200,200,180,0.4)' : 'rgba(150,150,140,0.3)';
        ctx.beginPath();
        ctx.ellipse(-ins.size, 0, ins.size * 0.8, ins.size * 0.3, wingAngle, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(ins.size, 0, ins.size * 0.8, ins.size * 0.3, -wingAngle, 0, Math.PI * 2);
        ctx.fill();

        // Body
        ctx.beginPath();
        ctx.arc(0, 0, ins.size * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(100,90,80,0.6)';
        ctx.fill();

        ctx.restore();
    }

    // Cave side walls (dark overlays)
    const leftWall = ctx.createLinearGradient(0, 0, W * 0.08, 0);
    leftWall.addColorStop(0, '#020204');
    leftWall.addColorStop(1, 'rgba(2,2,4,0)');
    ctx.fillStyle = leftWall;
    ctx.fillRect(0, 0, W * 0.08, H);

    const rightWall = ctx.createLinearGradient(W * 0.92, 0, W, 0);
    rightWall.addColorStop(0, 'rgba(2,2,4,0)');
    rightWall.addColorStop(1, '#020204');
    ctx.fillStyle = rightWall;
    ctx.fillRect(W * 0.92, 0, W * 0.08, H);

    // Stats
    ctx.fillStyle = '#8A9A5B';
    ctx.font = '11px Georgia';
    ctx.textAlign = 'left';
    ctx.fillText(`Glowworms: ${worms.length}`, 14, 70);
    ctx.fillText(`Insects: ${insects.length} free, ${caughtInsects.length} caught`, 14, 88);
    ctx.fillText('Move mouse near worms to disturb them', 14, 106);
}

function loop() {
    if (!paused) {
        update();
        draw();
    }
    requestAnimationFrame(loop);
}
loop();

window.reset = function() {
    init();
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); paused = !paused; }
});
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
