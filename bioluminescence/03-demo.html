<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bioluminescent Bay</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #040810; overflow: hidden; font-family: 'Georgia', serif; }
canvas { display: block; }
#info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(4,8,16,0.85); backdrop-filter: blur(10px);
    color: #FEFAE0; padding: 15px 25px; border-radius: 12px;
    border: 1px solid rgba(138,154,91,0.3); max-width: 520px; text-align: center;
    font-size: 0.85rem; line-height: 1.5;
}
#info h3 { color: #8A9A5B; margin-bottom: 6px; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <h3>Bioluminescent Bay</h3>
    Move your mouse (or touch) across the water to disturb the dinoflagellates.
    Mechanical shear stress triggers a proton influx into their scintillons, causing the enzyme
    luciferase to oxidize luciferin — producing brilliant blue-green flashes lasting ~100ms.
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Dinoflagellate grid
const CELL_SIZE = 6;
let cols, rows;
let grid = [];
let mouseX = -100, mouseY = -100;
let prevMouseX = -100, prevMouseY = -100;
let mouseSpeed = 0;
let wavePoints = [];

function initGrid() {
    cols = Math.ceil(W / CELL_SIZE);
    rows = Math.ceil(H / CELL_SIZE);
    grid = new Float32Array(cols * rows);
}
initGrid();

window.addEventListener('resize', () => {
    resize();
    initGrid();
});

// Track mouse/touch
function updateMouse(x, y) {
    prevMouseX = mouseX;
    prevMouseY = mouseY;
    mouseX = x;
    mouseY = y;
    mouseSpeed = Math.hypot(mouseX - prevMouseX, mouseY - prevMouseY);
}

canvas.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    updateMouse(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    updateMouse(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

// Wave simulation
let waveTime = 0;
const shoreline = [];
function initShoreline() {
    shoreline.length = 0;
    for (let x = 0; x <= W; x += 4) {
        shoreline.push({
            x,
            baseY: H * 0.45 + Math.sin(x * 0.005) * 20 + Math.sin(x * 0.013) * 10
        });
    }
}
initShoreline();

let time = 0;
let paused = false;

function update() {
    time += 0.016;
    waveTime += 0.02;

    // Stimulate grid from mouse movement
    if (mouseSpeed > 2) {
        const cx = Math.floor(mouseX / CELL_SIZE);
        const cy = Math.floor(mouseY / CELL_SIZE);
        const radius = Math.min(15, 3 + mouseSpeed * 0.3);
        const intensity = Math.min(1, mouseSpeed * 0.05);
        for (let dy = -radius; dy <= radius; dy++) {
            for (let dx = -radius; dx <= radius; dx++) {
                const gx = cx + dx;
                const gy = cy + dy;
                if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) continue;
                const d = Math.hypot(dx, dy);
                if (d < radius) {
                    const idx = gy * cols + gx;
                    grid[idx] = Math.min(1, grid[idx] + intensity * (1 - d / radius));
                }
            }
        }
    }

    // Wave-breaking stimulation along shore
    for (const s of shoreline) {
        const waveY = s.baseY + Math.sin(waveTime + s.x * 0.01) * 15 + Math.sin(waveTime * 1.5 + s.x * 0.02) * 8;
        const breakIntensity = Math.max(0, Math.sin(waveTime + s.x * 0.01)) * 0.15;
        if (breakIntensity > 0.05) {
            const gx = Math.floor(s.x / CELL_SIZE);
            const gy = Math.floor(waveY / CELL_SIZE);
            if (gx >= 0 && gx < cols && gy >= 0 && gy < rows) {
                const idx = gy * cols + gx;
                grid[idx] = Math.min(1, grid[idx] + breakIntensity * (0.5 + Math.random() * 0.5));
            }
        }
    }

    // Decay and spread
    const newGrid = new Float32Array(cols * rows);
    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
            const idx = y * cols + x;
            let val = grid[idx] * 0.94; // decay

            // Slight spread to neighbors
            if (val > 0.1) {
                const spread = val * 0.02;
                if (x > 0) newGrid[idx - 1] += spread;
                if (x < cols - 1) newGrid[idx + 1] += spread;
                if (y > 0) newGrid[idx - cols] += spread;
                if (y < rows - 1) newGrid[idx + cols] += spread;
            }
            newGrid[idx] += val;
        }
    }
    for (let i = 0; i < newGrid.length; i++) {
        grid[i] = Math.min(1, newGrid[i]);
    }
}

function draw() {
    // Dark ocean background
    ctx.fillStyle = '#040810';
    ctx.fillRect(0, 0, W, H);

    // Sky with moon
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.45);
    skyGrad.addColorStop(0, '#060812');
    skyGrad.addColorStop(1, '#0a0e18');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H * 0.45);

    // Moon
    const moonX = W * 0.75, moonY = H * 0.12;
    const moonGrad = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 80);
    moonGrad.addColorStop(0, 'rgba(220,220,200,0.3)');
    moonGrad.addColorStop(0.3, 'rgba(180,180,170,0.1)');
    moonGrad.addColorStop(1, 'rgba(100,100,100,0)');
    ctx.fillStyle = moonGrad;
    ctx.beginPath();
    ctx.arc(moonX, moonY, 80, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(moonX, moonY, 20, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(220,220,200,0.6)';
    ctx.fill();

    // Moon reflection on water
    ctx.fillStyle = 'rgba(180,180,170,0.03)';
    for (let y = H * 0.45; y < H; y += 4) {
        const w = 5 + Math.random() * 15;
        const rx = moonX + Math.sin(y * 0.05 + time) * 10;
        ctx.fillRect(rx - w / 2, y, w, 2);
    }

    // Draw bioluminescent grid
    const imageData = ctx.getImageData(0, 0, W, H);
    const data = imageData.data;

    for (let gy = 0; gy < rows; gy++) {
        for (let gx = 0; gx < cols; gx++) {
            const val = grid[gy * cols + gx];
            if (val < 0.02) continue;

            const px = gx * CELL_SIZE;
            const py = gy * CELL_SIZE;

            // Only render in water area
            if (py < H * 0.35) continue;

            const intensity = val * val; // quadratic for more pop
            const r = Math.floor(intensity * 20);
            const g = Math.floor(intensity * 160 + val * 80);
            const b = Math.floor(intensity * 255);

            for (let dy = 0; dy < CELL_SIZE && py + dy < H; dy++) {
                for (let dx = 0; dx < CELL_SIZE && px + dx < W; dx++) {
                    const idx = ((py + dy) * W + (px + dx)) * 4;
                    data[idx] = Math.min(255, data[idx] + r);
                    data[idx + 1] = Math.min(255, data[idx + 1] + g);
                    data[idx + 2] = Math.min(255, data[idx + 2] + b);
                }
            }
        }
    }
    ctx.putImageData(imageData, 0, 0);

    // Shore silhouette
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, H * 0.45);
    for (const s of shoreline) {
        const waveY = s.baseY + Math.sin(waveTime + s.x * 0.01) * 8;
        ctx.lineTo(s.x, waveY);
    }
    ctx.lineTo(W, 0);
    ctx.closePath();
    ctx.fillStyle = '#050a05';
    ctx.fill();

    // Palm tree silhouettes
    drawPalm(W * 0.1, H * 0.42, -0.3);
    drawPalm(W * 0.85, H * 0.4, 0.2);
    drawPalm(W * 0.05, H * 0.44, -0.5);
}

function drawPalm(x, y, lean) {
    ctx.save();
    ctx.translate(x, y);
    ctx.strokeStyle = '#020502';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(lean * 80, -80, lean * 50, -140);
    ctx.stroke();

    // Fronds
    ctx.fillStyle = '#030803';
    const tipX = lean * 50, tipY = -140;
    for (let i = 0; i < 7; i++) {
        const angle = (i / 7) * Math.PI * 1.5 - Math.PI * 0.4 + lean;
        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        const fx = tipX + Math.cos(angle) * 60;
        const fy = tipY + Math.sin(angle) * 50 + 15;
        const cx = tipX + Math.cos(angle) * 30;
        const cy = tipY + Math.sin(angle) * 20 - 5;
        ctx.quadraticCurveTo(cx, cy, fx, fy);
        ctx.quadraticCurveTo(cx + 5, cy + 5, tipX, tipY);
        ctx.fill();
    }
    ctx.restore();
}

function loop() {
    if (!paused) {
        update();
        draw();
    }
    requestAnimationFrame(loop);
}
loop();

window.reset = function() {
    grid.fill(0);
    mouseX = mouseY = prevMouseX = prevMouseY = -100;
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); paused = !paused; }
});
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
