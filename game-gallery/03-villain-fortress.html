<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villain's Fortress - Kingdoms of Shadow & Light</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a0f; font-family: 'Segoe UI', sans-serif; }
        #container { width: 100vw; height: 100vh; }
        .back-link {
            position: fixed; top: 10px; left: 10px; padding: 8px 16px;
            background: rgba(0,0,0,0.8); color: #ef4444; text-decoration: none;
            border-radius: 6px; font-size: 14px; z-index: 999; transition: all 0.3s;
        }
        .back-link:hover { background: rgba(239,68,68,0.2); transform: translateX(-4px); }
        #fps-counter {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8);
            color: #ef4444; padding: 8px 12px; border-radius: 6px;
            font-family: monospace; font-size: 14px; z-index: 999;
        }
        #hud {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(20,0,0,0.85); color: #ef4444; padding: 10px 24px;
            border-radius: 10px; font-size: 16px; z-index: 999; text-align: center;
            border: 1px solid rgba(239,68,68,0.4);
        }
        #hud h2 { font-size: 14px; color: #fca5a5; margin-bottom: 2px; }
        #command-panel {
            position: fixed; left: 10px; top: 50%; transform: translateY(-50%);
            background: rgba(20,0,0,0.9); padding: 16px; border-radius: 12px;
            z-index: 999; border: 1px solid rgba(239,68,68,0.3);
            display: flex; flex-direction: column; gap: 8px; min-width: 180px;
        }
        #command-panel h3 { color: #ef4444; font-size: 14px; margin-bottom: 4px; text-align: center; }
        .cmd-btn {
            background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4);
            color: #fca5a5; padding: 10px 14px; border-radius: 6px; cursor: pointer;
            font-size: 13px; transition: all 0.3s; text-align: left;
        }
        .cmd-btn:hover { background: rgba(239,68,68,0.3); color: #fff; }
        #feedback {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(239,68,68,0.2); color: #fca5a5; padding: 10px 20px;
            border-radius: 8px; z-index: 999; font-size: 16px; display: none;
            border: 1px solid rgba(239,68,68,0.4); transition: all 0.3s;
        }
        #stats {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 16px; z-index: 999;
        }
        .stat-box {
            background: rgba(20,0,0,0.85); padding: 8px 14px; border-radius: 8px;
            color: #fca5a5; font-size: 13px; border: 1px solid rgba(239,68,68,0.3);
        }
        .stat-box span { color: #ef4444; font-weight: bold; }
        #select-info {
            position: fixed; right: 10px; bottom: 60px; background: rgba(20,0,0,0.9);
            padding: 12px 16px; border-radius: 10px; z-index: 999; color: #fca5a5;
            font-size: 13px; border: 1px solid rgba(239,68,68,0.3); display: none;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Game Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-val">0</span></div>
    <div id="hud"><h2>DARK FORTRESS</h2>Commander Mode</div>
    <div id="command-panel">
        <h3>⚔️ Commands</h3>
        <button class="cmd-btn" onclick="doCommand('attack')">🏰 Attack Palace</button>
        <button class="cmd-btn" onclick="doCommand('spies')">🕵️ Send Spies</button>
        <button class="cmd-btn" onclick="doCommand('raid')">💰 Raid Caravan</button>
        <button class="cmd-btn" onclick="doCommand('recruit')">👥 Recruit Troops</button>
        <button class="cmd-btn" onclick="doCommand('fortify')">🛡️ Fortify Walls</button>
    </div>
    <div id="feedback"></div>
    <div id="stats">
        <div class="stat-box">Army: <span id="army">25</span></div>
        <div class="stat-box">Gold: <span id="gold">500</span></div>
        <div class="stat-box">Fear: <span id="fear">10</span></div>
    </div>
    <div id="select-info"></div>
    <div id="container"></div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.FogExp2(0x1a0505, 0.008);

        const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 500);
        camera.position.set(30, 40, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.getElementById('container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 5, 0);
        controls.enableDamping = true;
        controls.maxDistance = 80;
        controls.minDistance = 15;
        controls.maxPolarAngle = Math.PI / 2.2;

        // Lighting - ominous
        scene.add(new THREE.AmbientLight(0x330000, 0.5));
        const moonLight = new THREE.DirectionalLight(0x6666aa, 0.4);
        moonLight.position.set(-30, 50, 20);
        moonLight.castShadow = true;
        scene.add(moonLight);

        // Flickering torches
        const torches = [];
        function addTorch(x, y, z) {
            const light = new THREE.PointLight(0xff6622, 2, 20);
            light.position.set(x, y, z);
            scene.add(light);
            torches.push(light);
            // Torch post
            const post = new THREE.Mesh(
                new THREE.CylinderGeometry(0.1, 0.1, 2, 6),
                new THREE.MeshStandardMaterial({ color: 0x4a3520 })
            );
            post.position.set(x, y - 1, z);
            scene.add(post);
        }

        // Mountain terrain
        const terrainGeo = new THREE.PlaneGeometry(150, 150, 60, 60);
        const positions = terrainGeo.attributes.position.array;
        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i], y = positions[i+1];
            const dist = Math.sqrt(x*x + y*y);
            // Central mountain
            let h = Math.max(0, 15 - dist * 0.3) + Math.random() * 1.5;
            // Surrounding ridges
            h += Math.max(0, Math.sin(Math.atan2(y, x) * 3) * 5 - dist * 0.1 + 8);
            h = Math.max(0, h);
            positions[i+2] = h;
        }
        terrainGeo.computeVertexNormals();
        const terrain = new THREE.Mesh(terrainGeo,
            new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.95, flatShading: true })
        );
        terrain.rotation.x = -Math.PI / 2;
        terrain.receiveShadow = true;
        scene.add(terrain);

        // Fortress walls
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9 });
        function wall(w, h, d, x, y, z) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            m.position.set(x, y, z);
            m.castShadow = true;
            scene.add(m);
            return m;
        }

        // Fortress base at center on the mountain
        const fortY = 10;
        // Front wall
        wall(20, 6, 1.5, 0, fortY + 3, -8);
        // Back wall
        wall(20, 6, 1.5, 0, fortY + 3, 8);
        // Side walls
        wall(1.5, 6, 18, -10, fortY + 3, 0);
        wall(1.5, 6, 18, 10, fortY + 3, 0);

        // Towers
        const towerMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
        function tower(x, z) {
            const t = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 3, 12, 8), towerMat);
            t.position.set(x, fortY + 6, z);
            t.castShadow = true;
            scene.add(t);
            // Top
            const top = new THREE.Mesh(
                new THREE.ConeGeometry(3.5, 4, 8),
                new THREE.MeshStandardMaterial({ color: 0x330000 })
            );
            top.position.set(x, fortY + 14, z);
            scene.add(top);
            addTorch(x, fortY + 10, z + 3);
        }
        tower(-10, -8);
        tower(10, -8);
        tower(-10, 8);
        tower(10, 8);

        // Main keep
        const keep = new THREE.Mesh(
            new THREE.BoxGeometry(8, 10, 8),
            new THREE.MeshStandardMaterial({ color: 0x1a1a1a })
        );
        keep.position.set(0, fortY + 5, 0);
        keep.castShadow = true;
        scene.add(keep);

        // Keep spire
        const spire = new THREE.Mesh(
            new THREE.ConeGeometry(5, 8, 6),
            new THREE.MeshStandardMaterial({ color: 0x440000 })
        );
        spire.position.set(0, fortY + 14, 0);
        scene.add(spire);

        // Soldiers in courtyard
        const soldiers = [];
        let armyCount = 25;
        const soldierMat = new THREE.MeshStandardMaterial({ color: 0x660000 });
        const soldierHeadMat = new THREE.MeshStandardMaterial({ color: 0x222222 });

        function createSoldier(x, z) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.8, 4, 8), soldierMat);
            body.position.y = 0.9;
            g.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 6, 6), soldierHeadMat);
            head.position.y = 1.6;
            g.add(head);
            // Spear
            const spear = new THREE.Mesh(
                new THREE.CylinderGeometry(0.03, 0.03, 2, 4),
                new THREE.MeshStandardMaterial({ color: 0x8B7355 })
            );
            spear.position.set(0.3, 1.5, 0);
            g.add(spear);
            g.position.set(x, fortY, z);
            g.userData = { selected: false, targetX: x, targetZ: z, speed: 2 + Math.random() };
            scene.add(g);
            soldiers.push(g);
            return g;
        }

        // Formation
        for (let row = 0; row < 5; row++) {
            for (let col = 0; col < 5; col++) {
                createSoldier(-4 + col * 2, -4 + row * 2);
            }
        }

        // Selection
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedSoldiers = [];

        renderer.domElement.addEventListener('click', (e) => {
            mouse.x = (e.clientX / innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            for (const s of soldiers) {
                const hits = raycaster.intersectObjects(s.children, true);
                if (hits.length > 0) {
                    s.userData.selected = !s.userData.selected;
                    s.children[0].material = s.userData.selected
                        ? new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x440000 })
                        : soldierMat;
                    selectedSoldiers = soldiers.filter(s => s.userData.selected);
                    updateSelectInfo();
                    return;
                }
            }
        });

        renderer.domElement.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            mouse.x = (e.clientX / innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(terrain);
            if (hits.length > 0 && selectedSoldiers.length > 0) {
                const target = hits[0].point;
                selectedSoldiers.forEach((s, i) => {
                    s.userData.targetX = target.x + (i % 5 - 2) * 1.5;
                    s.userData.targetZ = target.z + (Math.floor(i / 5) - 2) * 1.5;
                });
                showFeedback(`Moving ${selectedSoldiers.length} units!`);
            }
        });

        function updateSelectInfo() {
            const el = document.getElementById('select-info');
            if (selectedSoldiers.length > 0) {
                el.style.display = 'block';
                el.textContent = `Selected: ${selectedSoldiers.length} soldiers`;
            } else {
                el.style.display = 'none';
            }
        }

        // Commands
        let gold = 500, fear = 10;
        const feedbackEl = document.getElementById('feedback');
        let feedbackTimer;

        window.doCommand = function(cmd) {
            let msg = '';
            switch(cmd) {
                case 'attack':
                    if (armyCount >= 10) {
                        msg = '⚔️ Your army marches on the Palace! Fear +5';
                        fear += 5;
                    } else msg = '❌ Not enough troops!';
                    break;
                case 'spies':
                    if (gold >= 50) {
                        gold -= 50; fear += 2;
                        msg = '🕵️ Spies dispatched to the Elf Forest! -50 gold, Fear +2';
                    } else msg = '❌ Not enough gold!';
                    break;
                case 'raid':
                    if (armyCount >= 5) {
                        gold += 100; fear += 1;
                        msg = '💰 Caravan raided! +100 gold, Fear +1';
                    } else msg = '❌ Not enough troops!';
                    break;
                case 'recruit':
                    if (gold >= 30) {
                        gold -= 30; armyCount += 3;
                        for (let i = 0; i < 3; i++) {
                            createSoldier(-4 + Math.random() * 8, -4 + Math.random() * 8);
                        }
                        msg = '👥 3 soldiers recruited! -30 gold';
                    } else msg = '❌ Not enough gold!';
                    break;
                case 'fortify':
                    if (gold >= 80) {
                        gold -= 80;
                        msg = '🛡️ Fortress walls reinforced! -80 gold';
                    } else msg = '❌ Not enough gold!';
                    break;
            }
            showFeedback(msg);
            document.getElementById('army').textContent = armyCount;
            document.getElementById('gold').textContent = gold;
            document.getElementById('fear').textContent = fear;
        };

        function showFeedback(msg) {
            feedbackEl.textContent = msg;
            feedbackEl.style.display = 'block';
            clearTimeout(feedbackTimer);
            feedbackTimer = setTimeout(() => { feedbackEl.style.display = 'none'; }, 3000);
        }

        // FPS
        let frames = 0, lastFPS = performance.now();
        function updateFPS() {
            frames++;
            const now = performance.now();
            if (now - lastFPS >= 1000) {
                document.getElementById('fps-val').textContent = frames;
                frames = 0;
                lastFPS = now;
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        // Animate
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            controls.update();
            updateFPS();

            // Flicker torches
            for (const t of torches) {
                t.intensity = 1.5 + Math.random() * 1;
            }

            // Move soldiers to targets
            for (const s of soldiers) {
                const dx = s.userData.targetX - s.position.x;
                const dz = s.userData.targetZ - s.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist > 0.3) {
                    s.position.x += (dx / dist) * s.userData.speed * dt;
                    s.position.z += (dz / dist) * s.userData.speed * dt;
                    // Keep on terrain height (approximate)
                    s.position.y = fortY;
                }
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
