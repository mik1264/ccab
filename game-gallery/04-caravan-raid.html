<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caravan Raid - Kingdoms of Shadow & Light</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0d1a0d; font-family: 'Segoe UI', sans-serif; }
        #container { width: 100vw; height: 100vh; }
        .back-link {
            position: fixed; top: 10px; left: 10px; padding: 8px 16px;
            background: rgba(0,0,0,0.7); color: #fbbf24; text-decoration: none;
            border-radius: 6px; font-size: 14px; z-index: 999; transition: all 0.3s;
        }
        .back-link:hover { background: rgba(251,191,36,0.2); transform: translateX(-4px); }
        #fps-counter {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            color: #22c55e; padding: 8px 12px; border-radius: 6px;
            font-family: monospace; font-size: 14px; z-index: 999;
        }
        #hud {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,15,0,0.85); color: #fbbf24; padding: 10px 24px;
            border-radius: 10px; z-index: 999; text-align: center;
            border: 1px solid rgba(251,191,36,0.4);
        }
        #hud h2 { font-size: 20px; margin-bottom: 2px; }
        #hud .subtitle { font-size: 12px; color: #4ade80; }
        #gold-display {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: rgba(251,191,36,0.2); color: #fbbf24; padding: 8px 20px;
            border-radius: 8px; font-size: 24px; font-weight: bold; z-index: 999;
            border: 1px solid rgba(251,191,36,0.4);
        }
        #inventory {
            position: fixed; right: 15px; top: 50%; transform: translateY(-50%);
            background: rgba(0,15,0,0.9); padding: 14px; border-radius: 10px;
            z-index: 999; border: 1px solid rgba(34,197,94,0.3);
            min-width: 160px; max-height: 300px; overflow-y: auto;
        }
        #inventory h3 { color: #4ade80; font-size: 14px; margin-bottom: 8px; }
        .inv-item { color: #ccc; font-size: 12px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #action-hint {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.6); font-size: 14px; z-index: 999;
            background: rgba(0,0,0,0.5); padding: 6px 16px; border-radius: 6px;
        }
        #big-text {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%);
            font-size: 48px; font-weight: bold; color: #fbbf24; z-index: 999;
            text-shadow: 0 0 30px rgba(251,191,36,0.8), 0 0 60px rgba(251,191,36,0.4);
            pointer-events: none; opacity: 0; transition: opacity 0.5s;
        }
        #loot-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-size: 32px; font-weight: bold; color: #fbbf24; z-index: 999;
            text-shadow: 0 0 20px rgba(251,191,36,0.6);
            pointer-events: none; display: none;
            animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp { to { transform: translate(-50%, -100%); opacity: 0; } }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Game Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-val">0</span></div>
    <div id="hud">
        <h2>⚔️ ГРАБИТЬ КОРОВАНЫ!</h2>
        <div class="subtitle">Caravan Raid — Forest Elves</div>
    </div>
    <div id="gold-display">💰 <span id="gold">0</span> gold</div>
    <div id="inventory"><h3>🎒 Loot</h3><div id="inv-list"></div></div>
    <div id="action-hint">WASD move · SPACE attack nearby caravan · Auto-collect loot</div>
    <div id="big-text">ГРАБИТЬ КОРОВАНЫ!</div>
    <div id="loot-popup">LOOT!</div>
    <div id="container"></div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a3a1a);
        scene.fog = new THREE.FogExp2(0x1a3a1a, 0.012);

        const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 300);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.getElementById('container').appendChild(renderer.domElement);

        // Lighting
        scene.add(new THREE.AmbientLight(0x2a4a2a, 0.8));
        const sun = new THREE.DirectionalLight(0x88cc44, 0.8);
        sun.position.set(30, 40, 20);
        sun.castShadow = true;
        scene.add(sun);

        // Ground
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(300, 300),
            new THREE.MeshStandardMaterial({ color: 0x2a5a1a, roughness: 0.95 })
        );
        ground.rotation.x = -Math.PI/2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Road (winding path)
        const roadPoints = [];
        for (let i = -100; i <= 100; i += 2) {
            roadPoints.push(new THREE.Vector3(i, 0.05, Math.sin(i * 0.05) * 15));
        }
        for (let i = 0; i < roadPoints.length - 1; i++) {
            const a = roadPoints[i], b = roadPoints[i+1];
            const dx = b.x - a.x, dz = b.z - a.z;
            const len = Math.sqrt(dx*dx + dz*dz);
            const road = new THREE.Mesh(
                new THREE.PlaneGeometry(len + 0.5, 4),
                new THREE.MeshStandardMaterial({ color: 0x8B7355 })
            );
            road.rotation.x = -Math.PI/2;
            road.position.set((a.x+b.x)/2, 0.06, (a.z+b.z)/2);
            road.rotation.z = Math.atan2(dz, dx);
            scene.add(road);
        }

        // Trees along road
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x3a2510 });
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
        for (let i = 0; i < 120; i++) {
            const x = (Math.random()-0.5) * 200;
            const roadZ = Math.sin(x * 0.05) * 15;
            const z = roadZ + (Math.random() > 0.5 ? 1 : -1) * (5 + Math.random() * 40);
            const s = 0.7 + Math.random() * 0.5;
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2*s, 0.3*s, 3*s, 5), trunkMat);
            trunk.position.set(x, 1.5*s, z); trunk.castShadow = true; scene.add(trunk);
            const leaf = new THREE.Mesh(new THREE.ConeGeometry(2*s, 4*s, 6), leafMat);
            leaf.position.set(x, 4.5*s, z); leaf.castShadow = true; scene.add(leaf);
        }

        // Player elf
        const player = new THREE.Group();
        // Body
        const pBody = new THREE.Mesh(
            new THREE.CapsuleGeometry(0.35, 0.9, 4, 8),
            new THREE.MeshStandardMaterial({ color: 0x228B22 })
        );
        pBody.position.y = 1.1; player.add(pBody);
        // Head
        const pHead = new THREE.Mesh(
            new THREE.SphereGeometry(0.25, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0xFFDBAC })
        );
        pHead.position.y = 1.9; player.add(pHead);
        // Pointed elf hat
        const pHat = new THREE.Mesh(
            new THREE.ConeGeometry(0.3, 0.6, 6),
            new THREE.MeshStandardMaterial({ color: 0x145a14 })
        );
        pHat.position.y = 2.3; player.add(pHat);
        player.position.set(0, 0, -10);
        player.castShadow = true;
        scene.add(player);

        // Caravans
        const caravans = [];
        const lootItems = ['Sword', 'Gold Pouch', 'Healing Potion', 'Silver Ring', 'Gemstone', 'Iron Shield', 'Spice Bundle', 'Silk Roll', 'Magic Scroll', 'Dragon Scale'];
        const lootValues = [50, 30, 20, 40, 80, 35, 15, 60, 100, 150];

        function createCaravan() {
            const group = new THREE.Group();
            // Horse (simplified)
            const horse = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 1.2, 0.8),
                new THREE.MeshStandardMaterial({ color: 0x8B4513 })
            );
            horse.position.set(-1.5, 0.8, 0);
            group.add(horse);
            const horseHead = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.5, 0.4),
                new THREE.MeshStandardMaterial({ color: 0x6B3510 })
            );
            horseHead.position.set(-2.5, 1.2, 0);
            group.add(horseHead);
            // Wagon
            const wagon = new THREE.Mesh(
                new THREE.BoxGeometry(2.5, 1.2, 1.5),
                new THREE.MeshStandardMaterial({ color: 0x6B4226 })
            );
            wagon.position.set(0.8, 0.8, 0);
            group.add(wagon);
            // Wheels
            for (const [wx, wz] of [[-0.2, 0.85], [-0.2, -0.85], [1.8, 0.85], [1.8, -0.85]]) {
                const wheel = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.4, 0.4, 0.15, 8),
                    new THREE.MeshStandardMaterial({ color: 0x3a2510 })
                );
                wheel.position.set(wx, 0.4, wz);
                wheel.rotation.x = Math.PI/2;
                group.add(wheel);
            }
            // Cargo
            const cargo = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 0.6, 1),
                new THREE.MeshStandardMaterial({ color: 0xDAA520 })
            );
            cargo.position.set(0.8, 1.7, 0);
            group.add(cargo);

            // Guards
            for (let g = 0; g < 2; g++) {
                const guard = new THREE.Mesh(
                    new THREE.CapsuleGeometry(0.25, 0.7, 4, 6),
                    new THREE.MeshStandardMaterial({ color: 0xcc3333 })
                );
                guard.position.set(2.5 + g * 1.2, 1, (g === 0 ? 1.5 : -1.5));
                group.add(guard);
                const gHead = new THREE.Mesh(
                    new THREE.SphereGeometry(0.2, 6, 6),
                    new THREE.MeshStandardMaterial({ color: 0xFFDBAC })
                );
                gHead.position.set(2.5 + g * 1.2, 1.8, (g === 0 ? 1.5 : -1.5));
                group.add(gHead);
            }

            // Start position
            const startX = -110;
            const startZ = Math.sin(startX * 0.05) * 15;
            group.position.set(startX, 0, startZ);
            group.userData = {
                alive: true, hp: 3, speed: 3 + Math.random() * 2,
                loot: lootItems[Math.floor(Math.random() * lootItems.length)],
                lootValue: lootValues[Math.floor(Math.random() * lootValues.length)]
            };
            scene.add(group);
            caravans.push(group);
        }

        // Dropped loot items
        const droppedLoot = [];
        function dropLoot(x, z, name, value) {
            const coin = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.3, 0.1, 8),
                new THREE.MeshStandardMaterial({ color: 0xfbbf24, emissive: 0xaa8800, emissiveIntensity: 0.5 })
            );
            coin.position.set(x, 1, z);
            scene.add(coin);
            droppedLoot.push({ mesh: coin, name, value });
        }

        // Game state
        let gold = 0;
        const inventory = [];
        const moveState = { forward: false, backward: false, left: false, right: false };

        document.addEventListener('keydown', e => {
            switch(e.code) {
                case 'KeyW': moveState.forward = true; break;
                case 'KeyS': moveState.backward = true; break;
                case 'KeyA': moveState.left = true; break;
                case 'KeyD': moveState.right = true; break;
                case 'Space': attackNearby(); break;
            }
        });
        document.addEventListener('keyup', e => {
            switch(e.code) {
                case 'KeyW': moveState.forward = false; break;
                case 'KeyS': moveState.backward = false; break;
                case 'KeyA': moveState.left = false; break;
                case 'KeyD': moveState.right = false; break;
            }
        });

        function attackNearby() {
            for (const c of caravans) {
                if (!c.userData.alive) continue;
                const dist = player.position.distanceTo(c.position);
                if (dist < 5) {
                    c.userData.hp--;
                    // Flash red
                    c.children.forEach(ch => {
                        if (ch.material) {
                            const orig = ch.material.color.getHex();
                            ch.material.emissive = new THREE.Color(0xff0000);
                            ch.material.emissiveIntensity = 1;
                            setTimeout(() => { ch.material.emissiveIntensity = 0; }, 200);
                        }
                    });
                    if (c.userData.hp <= 0) {
                        c.userData.alive = false;
                        // Drop loot
                        for (let i = 0; i < 3; i++) {
                            const li = Math.floor(Math.random() * lootItems.length);
                            dropLoot(
                                c.position.x + (Math.random()-0.5)*3,
                                c.position.z + (Math.random()-0.5)*3,
                                lootItems[li], lootValues[li]
                            );
                        }
                        // Topple wagon
                        c.rotation.z = Math.PI/6;
                        c.position.y = -0.3;

                        const bigText = document.getElementById('big-text');
                        bigText.style.opacity = '1';
                        setTimeout(() => { bigText.style.opacity = '0'; }, 2000);
                    }
                    break;
                }
            }
        }

        function updateInventoryUI() {
            const list = document.getElementById('inv-list');
            list.innerHTML = '';
            const counts = {};
            inventory.forEach(item => { counts[item] = (counts[item] || 0) + 1; });
            for (const [name, count] of Object.entries(counts)) {
                const div = document.createElement('div');
                div.className = 'inv-item';
                div.textContent = `${name} x${count}`;
                list.appendChild(div);
            }
        }

        // Spawn caravans periodically
        createCaravan();
        setInterval(() => {
            if (caravans.filter(c => c.userData.alive).length < 3) createCaravan();
        }, 8000);

        // Show initial text
        setTimeout(() => {
            document.getElementById('big-text').style.opacity = '1';
            setTimeout(() => { document.getElementById('big-text').style.opacity = '0'; }, 3000);
        }, 500);

        // FPS
        let frames = 0, lastFPS = performance.now();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth/innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            const now = performance.now();

            frames++;
            if (now - lastFPS >= 1000) {
                document.getElementById('fps-val').textContent = frames;
                frames = 0; lastFPS = now;
            }

            // Player movement
            const speed = 8;
            if (moveState.forward) player.position.x += speed * dt;
            if (moveState.backward) player.position.x -= speed * dt;
            if (moveState.left) player.position.z -= speed * dt;
            if (moveState.right) player.position.z += speed * dt;

            // Face direction
            if (moveState.forward || moveState.backward || moveState.left || moveState.right) {
                const angle = Math.atan2(
                    (moveState.right ? 1 : 0) - (moveState.left ? 1 : 0),
                    (moveState.forward ? 1 : 0) - (moveState.backward ? 1 : 0)
                );
                player.rotation.y = angle;
            }

            // Camera follow (third-person)
            const camOffset = new THREE.Vector3(-8, 6, 0);
            camera.position.lerp(player.position.clone().add(camOffset), 0.05);
            camera.lookAt(player.position.x + 5, 1, player.position.z);

            // Move caravans along road
            for (const c of caravans) {
                if (!c.userData.alive) continue;
                c.position.x += c.userData.speed * dt;
                c.position.z = Math.sin(c.position.x * 0.05) * 15;
                // Remove if off screen
                if (c.position.x > 110) {
                    c.userData.alive = false;
                    scene.remove(c);
                }
            }

            // Collect loot
            for (let i = droppedLoot.length - 1; i >= 0; i--) {
                const l = droppedLoot[i];
                l.mesh.rotation.y += 3 * dt;
                l.mesh.position.y = 1 + Math.sin(now * 0.003 + i) * 0.3;

                const dist = player.position.distanceTo(l.mesh.position);
                if (dist < 2) {
                    gold += l.value;
                    inventory.push(l.name);
                    document.getElementById('gold').textContent = gold;
                    updateInventoryUI();
                    scene.remove(l.mesh);
                    droppedLoot.splice(i, 1);

                    // Popup
                    const popup = document.getElementById('loot-popup');
                    popup.textContent = `+${l.value} 💰 ${l.name}!`;
                    popup.style.display = 'block';
                    popup.style.animation = 'none';
                    popup.offsetHeight;
                    popup.style.animation = 'floatUp 1s ease-out forwards';
                    setTimeout(() => { popup.style.display = 'none'; }, 1000);
                }
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
