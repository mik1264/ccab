<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Map - Kingdoms of Shadow & Light</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0e1a; font-family: 'Segoe UI', sans-serif; }
        #container { width: 100vw; height: 100vh; }
        .back-link {
            position: fixed; top: 10px; left: 10px; padding: 8px 16px;
            background: rgba(0,0,0,0.7); color: #60a5fa; text-decoration: none;
            border-radius: 6px; font-size: 14px; z-index: 999; transition: all 0.3s;
        }
        .back-link:hover { background: rgba(96,165,250,0.2); transform: translateX(-4px); }
        #fps-counter {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            color: #60a5fa; padding: 8px 12px; border-radius: 6px;
            font-family: monospace; font-size: 14px; z-index: 999;
        }
        #title {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #f0e68c; padding: 10px 24px;
            border-radius: 10px; font-size: 18px; z-index: 999; text-align: center;
            border: 1px solid rgba(240,230,140,0.3); font-weight: bold;
        }
        #legend {
            position: fixed; bottom: 15px; right: 15px; background: rgba(0,0,0,0.85);
            padding: 14px 18px; border-radius: 10px; z-index: 999;
            border: 1px solid rgba(255,255,255,0.15); font-size: 13px; color: #ccc;
        }
        #legend h4 { color: #f0e68c; margin-bottom: 8px; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        #zone-info {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); padding: 14px 24px; border-radius: 10px;
            z-index: 999; color: #fff; font-size: 14px; text-align: center;
            border: 1px solid rgba(255,255,255,0.15); display: none; max-width: 400px;
        }
        #zone-info h3 { color: #f0e68c; margin-bottom: 4px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Game Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-val">0</span></div>
    <div id="title">🗺️ World of Kingdoms — 4 Zones</div>
    <div id="legend">
        <h4>Zones</h4>
        <div class="legend-item"><div class="legend-dot" style="background:#d4a574"></div> Human Town (Neutral)</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div> Emperor's Palace</div>
        <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Elven Forest</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Villain's Mountains</div>
    </div>
    <div id="zone-info"><h3 id="zi-title"></h3><p id="zi-desc"></p></div>
    <div id="container"></div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 100, 250);

        const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 500);
        camera.position.set(0, 70, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.getElementById('container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2.5;
        controls.minDistance = 30;
        controls.maxDistance = 120;

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xfff8e0, 1);
        sun.position.set(40, 60, 30);
        sun.castShadow = true;
        scene.add(sun);

        // Base terrain
        const terrainGeo = new THREE.PlaneGeometry(150, 150, 50, 50);
        const tPos = terrainGeo.attributes.position.array;
        for (let i = 0; i < tPos.length; i += 3) {
            const x = tPos[i], y = tPos[i+1];
            // Mountains in north
            let h = 0;
            const distNorth = Math.sqrt(x*x + (y - 40)*(y - 40));
            h += Math.max(0, 12 - distNorth * 0.3) * (1 + Math.sin(x * 0.5) * 0.3);
            // Gentle hills elsewhere
            h += Math.sin(x * 0.1) * Math.cos(y * 0.08) * 1.5;
            h += Math.random() * 0.3;
            tPos[i+2] = h;
        }
        terrainGeo.computeVertexNormals();

        // Custom terrain colors (vertex colors)
        const colors = new Float32Array(tPos.length);
        for (let i = 0; i < tPos.length; i += 3) {
            const x = tPos[i], y = tPos[i+1], h = tPos[i+2];
            if (h > 6) { colors[i] = 0.4; colors[i+1] = 0.4; colors[i+2] = 0.4; } // Mountain gray
            else if (x < -20) { colors[i] = 0.2; colors[i+1] = 0.5; colors[i+2] = 0.15; } // Forest green
            else if (x > 20) { colors[i] = 0.6; colors[i+1] = 0.7; colors[i+2] = 0.3; } // Palace green
            else { colors[i] = 0.5; colors[i+1] = 0.6; colors[i+2] = 0.3; } // Neutral
        }
        terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const terrain = new THREE.Mesh(terrainGeo,
            new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.9, flatShading: true })
        );
        terrain.rotation.x = -Math.PI / 2;
        terrain.receiveShadow = true;
        scene.add(terrain);

        // Water (rivers)
        const waterMat = new THREE.MeshStandardMaterial({ color: 0x4488cc, transparent: true, opacity: 0.7 });
        function addRiver(points) {
            for (let i = 0; i < points.length - 1; i++) {
                const a = points[i], b = points[i+1];
                const dx = b[0] - a[0], dz = b[1] - a[1];
                const len = Math.sqrt(dx*dx + dz*dz);
                const river = new THREE.Mesh(new THREE.BoxGeometry(len, 0.1, 2), waterMat);
                river.position.set((a[0]+b[0])/2, 0.3, (a[1]+b[1])/2);
                river.rotation.y = -Math.atan2(dz, dx);
                scene.add(river);
            }
        }
        addRiver([[-60, 10], [-30, 5], [0, -5], [30, -10], [60, -5]]);
        addRiver([[0, -5], [5, 15], [0, 35]]);

        // Roads
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x8B7355 });
        function addRoad(points) {
            for (let i = 0; i < points.length - 1; i++) {
                const a = points[i], b = points[i+1];
                const dx = b[0] - a[0], dz = b[1] - a[1];
                const len = Math.sqrt(dx*dx + dz*dz);
                const road = new THREE.Mesh(new THREE.BoxGeometry(len, 0.05, 1.5), roadMat);
                road.position.set((a[0]+b[0])/2, 0.15, (a[1]+b[1])/2);
                road.rotation.y = -Math.atan2(dz, dx);
                scene.add(road);
            }
        }
        // Roads connecting zones
        addRoad([[0, -15], [0, 0], [-20, 0]]); // Town to Forest
        addRoad([[0, 0], [25, 0]]);             // Town to Palace
        addRoad([[0, 0], [5, 20], [5, 35]]);    // Town to Mountains

        // Zone markers (glowing rings)
        function zoneRing(x, z, color, radius) {
            const ringGeo = new THREE.RingGeometry(radius - 0.5, radius, 64);
            const ringMat = new THREE.MeshStandardMaterial({
                color, emissive: color, emissiveIntensity: 0.5,
                transparent: true, opacity: 0.6, side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = -Math.PI / 2;
            ring.position.set(x, 0.2, z);
            scene.add(ring);
        }
        zoneRing(0, -15, 0xd4a574, 15);   // Human Town
        zoneRing(30, 0, 0xfbbf24, 15);    // Palace
        zoneRing(-30, 0, 0x22c55e, 15);   // Forest
        zoneRing(5, 38, 0xef4444, 15);    // Mountains

        // === ZONE 1: Human Town (Center-South) ===
        const houseMat = new THREE.MeshStandardMaterial({ color: 0xd4a574 });
        const roofMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        function house(x, z, s) {
            const h = new THREE.Mesh(new THREE.BoxGeometry(s*2, s*1.5, s*2), houseMat);
            h.position.set(x, s*0.75, z); h.castShadow = true; scene.add(h);
            const r = new THREE.Mesh(new THREE.ConeGeometry(s*1.6, s, 4), roofMat);
            r.position.set(x, s*1.75, z); r.rotation.y = Math.PI/4; scene.add(r);
        }
        for (let i = 0; i < 8; i++) {
            house((Math.random()-0.5)*20, -15 + (Math.random()-0.5)*12, 1 + Math.random()*0.5);
        }
        // Market stalls
        for (let i = 0; i < 4; i++) {
            const stall = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 1.5),
                new THREE.MeshStandardMaterial({ color: 0xc4956a }));
            stall.position.set(-5 + i * 3, 0.75, -12);
            stall.castShadow = true;
            scene.add(stall);
        }

        // === ZONE 2: Emperor's Palace (East) ===
        const palaceMat = new THREE.MeshStandardMaterial({ color: 0xFFFFF0 });
        const goldMat = new THREE.MeshStandardMaterial({ color: 0xDAA520 });
        // Main building
        const palace = new THREE.Mesh(new THREE.BoxGeometry(10, 8, 8), palaceMat);
        palace.position.set(30, 4, 0); palace.castShadow = true; scene.add(palace);
        const pRoof = new THREE.Mesh(new THREE.ConeGeometry(8, 4, 4), goldMat);
        pRoof.position.set(30, 10, 0); pRoof.rotation.y = Math.PI/4; scene.add(pRoof);
        // Towers
        for (const [dx, dz] of [[-6,-4],[6,-4],[-6,4],[6,4]]) {
            const tw = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 10, 8), palaceMat);
            tw.position.set(30+dx, 5, dz); tw.castShadow = true; scene.add(tw);
            const tc = new THREE.Mesh(new THREE.ConeGeometry(2, 3, 8), goldMat);
            tc.position.set(30+dx, 11.5, dz); scene.add(tc);
        }
        // Walls
        const wMat = new THREE.MeshStandardMaterial({ color: 0xE8E0D0 });
        for (const [x,z,w,d] of [[30,-8,16,1],[30,8,16,1],[22,0,1,18],[38,0,1,18]]) {
            const wl = new THREE.Mesh(new THREE.BoxGeometry(w, 4, d), wMat);
            wl.position.set(x, 2, z); scene.add(wl);
        }

        // === ZONE 3: Elven Forest (West) ===
        const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3520 });
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
        function tree(x, z) {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 3, 6), treeTrunkMat);
            trunk.position.set(x, 1.5, z); scene.add(trunk);
            for (let i = 0; i < 3; i++) {
                const leaf = new THREE.Mesh(
                    new THREE.ConeGeometry(1.8 - i*0.4, 2, 7),
                    leafMat
                );
                leaf.position.set(x, 3 + i*1.2, z);
                leaf.castShadow = true;
                scene.add(leaf);
            }
        }
        for (let i = 0; i < 60; i++) {
            tree(-30 + (Math.random()-0.5)*25, (Math.random()-0.5)*25);
        }
        // Elf houses
        const elfHouseMat = new THREE.MeshStandardMaterial({ color: 0x6B4226 });
        for (let i = 0; i < 4; i++) {
            const eh = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, 2), elfHouseMat);
            eh.position.set(-28 + i*4, 0.75, -3 + (Math.random()-0.5)*6);
            eh.castShadow = true; scene.add(eh);
            const er = new THREE.Mesh(new THREE.ConeGeometry(1.8, 1, 4),
                new THREE.MeshStandardMaterial({ color: 0x2E8B57 }));
            er.position.set(eh.position.x, 2, eh.position.z);
            er.rotation.y = Math.PI/4; scene.add(er);
        }

        // === ZONE 4: Villain's Mountains (North) ===
        // Dark fortress on mountain
        const dkMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
        const fort = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 6), dkMat);
        fort.position.set(5, 11, 38); fort.castShadow = true; scene.add(fort);
        const fSpire = new THREE.Mesh(new THREE.ConeGeometry(4, 5, 6),
            new THREE.MeshStandardMaterial({ color: 0x330000 }));
        fSpire.position.set(5, 16.5, 38); scene.add(fSpire);
        // Fortress towers
        for (const dx of [-4, 4]) {
            const ft = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.5, 8, 6), dkMat);
            ft.position.set(5+dx, 11, 38); scene.add(ft);
        }
        // Red glow
        const redGlow = new THREE.PointLight(0xff2200, 2, 30);
        redGlow.position.set(5, 15, 38);
        scene.add(redGlow);

        // Animated units (moving dots)
        const unitGeo = new THREE.SphereGeometry(0.5, 6, 6);
        const units = [];
        function addUnit(color, pathPoints) {
            const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.3 });
            const unit = new THREE.Mesh(unitGeo, mat);
            unit.castShadow = true;
            scene.add(unit);
            units.push({ mesh: unit, path: pathPoints, t: Math.random(), speed: 0.02 + Math.random() * 0.02 });
        }

        // Soldiers moving between zones
        for (let i = 0; i < 5; i++) addUnit(0x4444ff, [[-30,0],[0,-15],[30,0]]); // Blue patrols
        for (let i = 0; i < 3; i++) addUnit(0x22cc22, [[-30,0],[0,0],[0,-15]]); // Elf scouts
        for (let i = 0; i < 3; i++) addUnit(0xff4444, [[5,38],[5,20],[0,0]]); // Villain scouts
        // Caravans
        for (let i = 0; i < 2; i++) addUnit(0xddaa44, [[0,-15],[30,0],[0,-15],[-30,0]]);

        // Click zones for info
        const zoneData = [
            { pos: new THREE.Vector3(0, 0, -15), r: 15, name: "Human Town (Neutral)", desc: "A bustling trade town where all factions mingle. Buy supplies, hire mercenaries, and trade goods." },
            { pos: new THREE.Vector3(30, 0, 0), r: 15, name: "Emperor's Palace", desc: "The grand Imperial Palace, defended by elite guards. Home of the Emperor and the seat of power." },
            { pos: new THREE.Vector3(-30, 0, 0), r: 15, name: "Elven Forest", desc: "Dense ancient forest home to the Wood Elves. Wooden houses hidden among the trees. Beware: they raid caravans!" },
            { pos: new THREE.Vector3(5, 0, 38), r: 15, name: "Villain's Mountains", desc: "Treacherous mountain fortress of the Dark Lord. An ancient fort from which he commands his army." }
        ];

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        renderer.domElement.addEventListener('click', (e) => {
            mouse.x = (e.clientX / innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(terrain);
            if (hits.length > 0) {
                const p = hits[0].point;
                for (const z of zoneData) {
                    if (new THREE.Vector2(p.x - z.pos.x, p.z - z.pos.z).length() < z.r) {
                        document.getElementById('zi-title').textContent = z.name;
                        document.getElementById('zi-desc').textContent = z.desc;
                        document.getElementById('zone-info').style.display = 'block';
                        return;
                    }
                }
                document.getElementById('zone-info').style.display = 'none';
            }
        });

        // FPS
        let frames = 0, lastFPS = performance.now();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            frames++;
            const now = performance.now();
            if (now - lastFPS >= 1000) {
                document.getElementById('fps-val').textContent = frames;
                frames = 0;
                lastFPS = now;
            }

            // Animate units along paths
            for (const u of units) {
                u.t += u.speed * 0.016;
                if (u.t >= u.path.length - 1) u.t = 0;
                const idx = Math.floor(u.t);
                const frac = u.t - idx;
                const a = u.path[idx], b = u.path[(idx + 1) % u.path.length];
                u.mesh.position.x = a[0] + (b[0] - a[0]) * frac;
                u.mesh.position.z = a[1] + (b[1] - a[1]) * frac;
                u.mesh.position.y = 1 + Math.sin(now * 0.003 + u.t * 10) * 0.3;
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
