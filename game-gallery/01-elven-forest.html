<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elven Forest - Kingdoms of Shadow & Light</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a1f0a; font-family: 'Segoe UI', sans-serif; }
        #container { width: 100vw; height: 100vh; }
        .back-link {
            position: fixed; top: 10px; left: 10px; padding: 8px 16px;
            background: rgba(0,0,0,0.7); color: #22c55e; text-decoration: none;
            border-radius: 6px; font-size: 14px; z-index: 999; transition: all 0.3s;
        }
        .back-link:hover { background: rgba(34,197,94,0.2); transform: translateX(-4px); }
        #fps-counter {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            color: #22c55e; padding: 8px 12px; border-radius: 6px;
            font-family: monospace; font-size: 14px; z-index: 999;
        }
        #hud {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,20,0,0.8); color: #4ade80; padding: 10px 24px;
            border-radius: 10px; font-size: 16px; z-index: 999; text-align: center;
            border: 1px solid rgba(34,197,94,0.3);
        }
        #hud h2 { font-size: 14px; color: #86efac; margin-bottom: 2px; }
        #health-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px;
            z-index: 999; overflow: hidden;
        }
        #health-fill { width: 100%; height: 100%; background: #22c55e; border-radius: 4px; transition: width 0.3s; }
        #controls-hint {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.5); font-size: 12px; z-index: 999;
        }
        #minimap {
            position: fixed; bottom: 15px; right: 15px; width: 150px; height: 150px;
            border-radius: 50%; overflow: hidden; z-index: 999;
            border: 2px solid rgba(34,197,94,0.5); background: rgba(0,20,0,0.8);
        }
        #minimap canvas { width: 100%; height: 100%; }
        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 16px; height: 16px; z-index: 998; pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(34,197,94,0.6);
        }
        #crosshair::before { width: 2px; height: 16px; left: 7px; }
        #crosshair::after { width: 16px; height: 2px; top: 7px; }
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,10,0,0.9); z-index: 1000; display: flex;
            flex-direction: column; align-items: center; justify-content: center; color: #fff;
        }
        #start-screen h1 { font-size: 36px; color: #22c55e; margin-bottom: 10px; }
        #start-screen p { font-size: 18px; opacity: 0.7; margin-bottom: 20px; }
        #start-screen .hint { font-size: 14px; opacity: 0.4; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Game Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-val">0</span></div>
    <div id="hud"><h2>ELVEN FOREST</h2>Exploration Zone</div>
    <div id="health-bar"><div id="health-fill"></div></div>
    <div id="controls-hint">WASD move · Mouse look · Space jump</div>
    <div id="minimap"><canvas id="minimap-canvas" width="150" height="150"></canvas></div>
    <div id="crosshair"></div>
    <div id="start-screen">
        <h1>🌲 Elven Forest</h1>
        <p>Explore the dense ancient woodland of the Forest Elves</p>
        <p>Click to enter the forest</p>
        <p class="hint">WASD to move · Mouse to look · Space to jump</p>
    </div>
    <div id="container"></div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1f0a);
        scene.fog = new THREE.FogExp2(0x0a2a0a, 0.02);

        const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 200);
        camera.position.set(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.getElementById('container').appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('start-screen').addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => document.getElementById('start-screen').style.display = 'none');
        controls.addEventListener('unlock', () => document.getElementById('start-screen').style.display = 'flex');

        // Lighting
        const ambient = new THREE.AmbientLight(0x1a4a1a, 0.8);
        scene.add(ambient);
        const sunLight = new THREE.DirectionalLight(0x88cc44, 0.6);
        sunLight.position.set(30, 50, 20);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.set(1024, 1024);
        scene.add(sunLight);
        // Dappled light spots
        for (let i = 0; i < 8; i++) {
            const spot = new THREE.PointLight(0x88ff44, 0.5, 15);
            spot.position.set((Math.random()-0.5)*80, 8, (Math.random()-0.5)*80);
            scene.add(spot);
        }

        // Ground
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a3a0a, roughness: 0.95 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI/2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Tree data for collision and minimap
        const treePositions = [];
        const LOD_DISTANCE = 30;

        // Create tree texture via canvas
        function makeTreeTexture() {
            const c = document.createElement('canvas');
            c.width = 64; c.height = 128;
            const ctx = c.getContext('2d');
            // Trunk
            ctx.fillStyle = '#3a2510';
            ctx.fillRect(28, 60, 8, 68);
            // Foliage layers
            const greens = ['#1a5a1a', '#228B22', '#2d8a2d'];
            for (let i = 0; i < 3; i++) {
                ctx.fillStyle = greens[i];
                ctx.beginPath();
                ctx.moveTo(32, 5 + i * 18);
                ctx.lineTo(8 + i * 4, 45 + i * 15);
                ctx.lineTo(56 - i * 4, 45 + i * 15);
                ctx.closePath();
                ctx.fill();
            }
            return new THREE.CanvasTexture(c);
        }
        const treeTex = makeTreeTexture();
        const billboardMat = new THREE.MeshBasicMaterial({ map: treeTex, transparent: true, alphaTest: 0.1, side: THREE.DoubleSide });

        // 3D tree materials
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x3a2510 });
        const leafMats = [
            new THREE.MeshStandardMaterial({ color: 0x1a5a1a }),
            new THREE.MeshStandardMaterial({ color: 0x228B22 }),
            new THREE.MeshStandardMaterial({ color: 0x2d8a2d })
        ];

        // Tree LOD system
        const trees3D = [];
        const treesBillboard = [];

        function createTree3D(x, z, scale) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2*scale, 0.3*scale, 4*scale, 6), trunkMat);
            trunk.position.y = 2*scale;
            trunk.castShadow = true;
            group.add(trunk);
            for (let i = 0; i < 3; i++) {
                const leaf = new THREE.Mesh(
                    new THREE.ConeGeometry((2.2-i*0.4)*scale, 2.5*scale, 7),
                    leafMats[i]
                );
                leaf.position.y = (4 + i*1.5)*scale;
                leaf.castShadow = true;
                group.add(leaf);
            }
            group.position.set(x, 0, z);
            group.visible = false;
            scene.add(group);
            return group;
        }

        function createBillboard(x, z, scale) {
            const billboard = new THREE.Mesh(
                new THREE.PlaneGeometry(4*scale, 8*scale),
                billboardMat
            );
            billboard.position.set(x, 4*scale, z);
            billboard.visible = false;
            scene.add(billboard);
            return billboard;
        }

        // Generate 250 trees
        for (let i = 0; i < 250; i++) {
            const x = (Math.random()-0.5) * 160;
            const z = (Math.random()-0.5) * 160;
            // Keep clearing around origin
            if (Math.abs(x) < 6 && Math.abs(z) < 6) continue;
            const scale = 0.7 + Math.random() * 0.6;
            treePositions.push({ x, z, r: 0.4 * scale });
            trees3D.push(createTree3D(x, z, scale));
            treesBillboard.push(createBillboard(x, z, scale));
        }

        // Elf houses in clearing
        const houseMat = new THREE.MeshStandardMaterial({ color: 0x6B4226 });
        const houseRoofMat = new THREE.MeshStandardMaterial({ color: 0x2E8B57 });
        for (let i = 0; i < 5; i++) {
            const hx = -8 + i * 4, hz = -3 + (Math.random()-0.5)*4;
            const house = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2, 2.5), houseMat);
            house.position.set(hx, 1, hz);
            house.castShadow = true;
            scene.add(house);
            const roof = new THREE.Mesh(new THREE.ConeGeometry(2.2, 1.5, 4), houseRoofMat);
            roof.position.set(hx, 2.75, hz);
            roof.rotation.y = Math.PI/4;
            scene.add(roof);
            treePositions.push({ x: hx, z: hz, r: 1.5 });
        }

        // Firefly particles
        const fireflyCount = 80;
        const fireflyGeo = new THREE.BufferGeometry();
        const ffPos = new Float32Array(fireflyCount * 3);
        const ffVel = [];
        for (let i = 0; i < fireflyCount; i++) {
            ffPos[i*3] = (Math.random()-0.5) * 100;
            ffPos[i*3+1] = 1 + Math.random() * 6;
            ffPos[i*3+2] = (Math.random()-0.5) * 100;
            ffVel.push({ x: (Math.random()-0.5)*0.5, y: (Math.random()-0.5)*0.3, z: (Math.random()-0.5)*0.5 });
        }
        fireflyGeo.setAttribute('position', new THREE.BufferAttribute(ffPos, 3));
        const fireflyMat = new THREE.PointsMaterial({ color: 0xaaff44, size: 0.3, transparent: true, opacity: 0.8 });
        const fireflies = new THREE.Points(fireflyGeo, fireflyMat);
        scene.add(fireflies);

        // Movement
        const moveState = { forward: false, backward: false, left: false, right: false };
        const velocity = new THREE.Vector3();
        let canJump = true;

        document.addEventListener('keydown', e => {
            switch(e.code) {
                case 'KeyW': moveState.forward = true; break;
                case 'KeyS': moveState.backward = true; break;
                case 'KeyA': moveState.left = true; break;
                case 'KeyD': moveState.right = true; break;
                case 'Space': if (canJump) { velocity.y = 7; canJump = false; } break;
            }
        });
        document.addEventListener('keyup', e => {
            switch(e.code) {
                case 'KeyW': moveState.forward = false; break;
                case 'KeyS': moveState.backward = false; break;
                case 'KeyA': moveState.left = false; break;
                case 'KeyD': moveState.right = false; break;
            }
        });

        // Minimap
        const mmCanvas = document.getElementById('minimap-canvas');
        const mmCtx = mmCanvas.getContext('2d');

        function drawMinimap() {
            mmCtx.fillStyle = '#0a200a';
            mmCtx.fillRect(0, 0, 150, 150);
            const scale = 150 / 160;
            const cx = camera.position.x, cz = camera.position.z;
            // Trees
            mmCtx.fillStyle = '#1a5a1a';
            for (const t of treePositions) {
                const sx = 75 + (t.x - cx) * scale;
                const sy = 75 + (t.z - cz) * scale;
                if (sx > 0 && sx < 150 && sy > 0 && sy < 150) {
                    mmCtx.beginPath();
                    mmCtx.arc(sx, sy, 2, 0, Math.PI*2);
                    mmCtx.fill();
                }
            }
            // Player
            mmCtx.fillStyle = '#4ade80';
            mmCtx.beginPath();
            mmCtx.arc(75, 75, 4, 0, Math.PI*2);
            mmCtx.fill();
            // Direction
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            mmCtx.strokeStyle = '#4ade80';
            mmCtx.lineWidth = 2;
            mmCtx.beginPath();
            mmCtx.moveTo(75, 75);
            mmCtx.lineTo(75 + dir.x * 12, 75 + dir.z * 12);
            mmCtx.stroke();
        }

        // Collision
        function checkCollision(newX, newZ) {
            for (const t of treePositions) {
                const dx = newX - t.x, dz = newZ - t.z;
                if (dx*dx + dz*dz < (t.r + 0.5) * (t.r + 0.5)) return true;
            }
            return false;
        }

        // FPS
        let frames = 0, lastFPS = performance.now();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth/innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            frames++;
            const now = performance.now();
            if (now - lastFPS >= 1000) {
                document.getElementById('fps-val').textContent = frames;
                frames = 0;
                lastFPS = now;
            }

            if (controls.isLocked) {
                const speed = 10;
                const dir = new THREE.Vector3();
                if (moveState.forward) dir.z -= 1;
                if (moveState.backward) dir.z += 1;
                if (moveState.left) dir.x -= 1;
                if (moveState.right) dir.x += 1;
                dir.normalize();

                const oldX = camera.position.x, oldZ = camera.position.z;
                controls.moveRight(dir.x * speed * dt);
                controls.moveForward(-dir.z * speed * dt);

                // Collision
                if (checkCollision(camera.position.x, camera.position.z)) {
                    camera.position.x = oldX;
                    camera.position.z = oldZ;
                }

                // Gravity
                velocity.y -= 18 * dt;
                camera.position.y += velocity.y * dt;
                if (camera.position.y < 2) {
                    camera.position.y = 2;
                    velocity.y = 0;
                    canJump = true;
                }

                // Bounds
                camera.position.x = Math.max(-95, Math.min(95, camera.position.x));
                camera.position.z = Math.max(-95, Math.min(95, camera.position.z));
            }

            // LOD: switch between 3D trees and billboards
            for (let i = 0; i < trees3D.length; i++) {
                const t = treePositions[i];
                if (!t) continue;
                const dx = camera.position.x - t.x;
                const dz = camera.position.z - t.z;
                const dist = Math.sqrt(dx*dx + dz*dz);
                if (dist < LOD_DISTANCE) {
                    trees3D[i].visible = true;
                    treesBillboard[i].visible = false;
                } else if (dist < 90) {
                    trees3D[i].visible = false;
                    treesBillboard[i].visible = true;
                    // Face camera
                    treesBillboard[i].lookAt(camera.position.x, treesBillboard[i].position.y, camera.position.z);
                } else {
                    trees3D[i].visible = false;
                    treesBillboard[i].visible = false;
                }
            }

            // Animate fireflies
            const positions = fireflyGeo.attributes.position.array;
            for (let i = 0; i < fireflyCount; i++) {
                positions[i*3] += ffVel[i].x * dt;
                positions[i*3+1] += Math.sin(now * 0.001 + i) * 0.01;
                positions[i*3+2] += ffVel[i].z * dt;
                // Wrap
                if (positions[i*3] > 50) positions[i*3] = -50;
                if (positions[i*3] < -50) positions[i*3] = 50;
                if (positions[i*3+2] > 50) positions[i*3+2] = -50;
                if (positions[i*3+2] < -50) positions[i*3+2] = 50;
            }
            fireflyGeo.attributes.position.needsUpdate = true;
            fireflyMat.opacity = 0.5 + Math.sin(now * 0.002) * 0.3;

            drawMinimap();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
