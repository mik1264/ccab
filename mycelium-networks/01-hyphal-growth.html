<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyphal Tip Growth - Mycelium Networks</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; }

.controls {
    position: fixed; top: 16px; right: 16px; z-index: 100;
    background: rgba(10,14,26,0.88); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 16px; min-width: 200px;
    border: 1px solid rgba(138,154,91,0.25);
}
.controls h3 { font-size: 13px; color: #8A9A5B; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.controls label { display: block; font-size: 12px; color: #9a9a7a; margin-top: 8px; }
.controls input[type=range] { width: 100%; margin: 4px 0; accent-color: #8A9A5B; }
.controls .value { font-size: 11px; color: #606C38; text-align: right; }
.btn {
    display: inline-block; margin: 4px 2px; padding: 6px 14px; border: none; border-radius: 6px;
    background: rgba(96,108,56,0.3); color: #8A9A5B; font-size: 12px; cursor: pointer;
    transition: background 0.2s; border: 1px solid rgba(138,154,91,0.2);
}
.btn:hover { background: rgba(96,108,56,0.5); }
.btn-row { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }

.info {
    position: fixed; bottom: 16px; left: 16px; z-index: 100;
    background: rgba(10,14,26,0.88); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 14px 18px; max-width: 360px;
    border: 1px solid rgba(138,154,91,0.25); font-size: 12px; color: #9a9a7a; line-height: 1.6;
}
.info h4 { color: #8A9A5B; margin-bottom: 6px; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="controls">
    <h3>Hyphal Growth</h3>
    <label>Branch Rate</label>
    <input type="range" id="branchRate" min="0.001" max="0.05" step="0.001" value="0.012">
    <div class="value" id="branchVal">0.012</div>
    <label>Growth Speed</label>
    <input type="range" id="speed" min="0.5" max="4" step="0.1" value="1.5">
    <div class="value" id="speedVal">1.5</div>
    <label>Wander Angle</label>
    <input type="range" id="wander" min="0.05" max="0.6" step="0.01" value="0.15">
    <div class="value" id="wanderVal">0.15</div>
    <label>Tropism Strength</label>
    <input type="range" id="tropism" min="0" max="0.1" step="0.005" value="0.02">
    <div class="value" id="tropismVal">0.02</div>
    <div class="btn-row">
        <button class="btn" onclick="window.reset()">Reset</button>
        <button class="btn" id="nutrientBtn" onclick="toggleNutrients()">Show Nutrients</button>
    </div>
</div>

<div class="info">
    <h4>Hyphal Tip Growth</h4>
    <p>Fungal hyphae grow by extending their tips, branching stochastically. Tips sense nutrient gradients (tropism) and wander randomly. The result is the characteristic fractal-like mycelial network that colonizes soil and organic matter.</p>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const branchRateEl = document.getElementById('branchRate');
const speedEl = document.getElementById('speed');
const wanderEl = document.getElementById('wander');
const tropismEl = document.getElementById('tropism');

let showNutrients = false;
function toggleNutrients() {
    showNutrients = !showNutrients;
    document.getElementById('nutrientBtn').textContent = showNutrients ? 'Hide Nutrients' : 'Show Nutrients';
}

class NutrientPatch {
    constructor(x, y, r, amount) {
        this.x = x; this.y = y; this.r = r; this.amount = amount;
    }
}

class Tip {
    constructor(x, y, angle, depth, energy) {
        this.x = x; this.y = y;
        this.angle = angle;
        this.depth = depth;
        this.energy = energy;
        this.alive = true;
        this.age = 0;
        this.trail = [{x, y}];
    }
}

let tips = [];
let segments = [];
let nutrients = [];

function initNutrients() {
    nutrients = [];
    for (let i = 0; i < 12; i++) {
        nutrients.push(new NutrientPatch(
            Math.random() * W * 0.8 + W * 0.1,
            Math.random() * H * 0.8 + H * 0.1,
            30 + Math.random() * 50,
            0.5 + Math.random() * 0.5
        ));
    }
}

function init() {
    tips = [];
    segments = [];
    initNutrients();
    const cx = W / 2, cy = H / 2;
    for (let i = 0; i < 5; i++) {
        const angle = (i / 5) * Math.PI * 2 + Math.random() * 0.3;
        tips.push(new Tip(cx, cy, angle, 0, 1.0));
    }
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);
}

function getNutrientGradient(x, y) {
    let gx = 0, gy = 0;
    for (const n of nutrients) {
        const dx = n.x - x, dy = n.y - y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < n.r * 4 && dist > 1) {
            const strength = n.amount / (dist * dist) * 1000;
            gx += (dx / dist) * strength;
            gy += (dy / dist) * strength;
        }
    }
    return { x: gx, y: gy };
}

function update() {
    const branchRate = parseFloat(branchRateEl.value);
    const speed = parseFloat(speedEl.value);
    const wanderAngle = parseFloat(wanderEl.value);
    const tropismStrength = parseFloat(tropismEl.value);

    document.getElementById('branchVal').textContent = branchRate.toFixed(3);
    document.getElementById('speedVal').textContent = speed.toFixed(1);
    document.getElementById('wanderVal').textContent = wanderAngle.toFixed(2);
    document.getElementById('tropismVal').textContent = tropismStrength.toFixed(3);

    const newTips = [];

    for (const tip of tips) {
        if (!tip.alive) continue;
        if (tip.energy <= 0) { tip.alive = false; continue; }

        const grad = getNutrientGradient(tip.x, tip.y);
        const tropAngle = Math.atan2(grad.y, grad.x);
        let angleDiff = tropAngle - tip.angle;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

        const gradMag = Math.sqrt(grad.x * grad.x + grad.y * grad.y);
        tip.angle += (Math.random() - 0.5) * wanderAngle;
        if (gradMag > 0.01) {
            tip.angle += angleDiff * tropismStrength * gradMag;
        }

        const ox = tip.x, oy = tip.y;
        tip.x += Math.cos(tip.angle) * speed;
        tip.y += Math.sin(tip.angle) * speed;
        tip.age++;
        tip.energy -= 0.0008;

        // Consume nutrients
        for (const n of nutrients) {
            const dx = n.x - tip.x, dy = n.y - tip.y;
            if (dx * dx + dy * dy < n.r * n.r) {
                tip.energy = Math.min(tip.energy + 0.002 * n.amount, 1.0);
                n.amount = Math.max(n.amount - 0.0005, 0.05);
            }
        }

        // Boundary
        if (tip.x < 5 || tip.x > W - 5 || tip.y < 5 || tip.y > H - 5) {
            tip.alive = false;
            continue;
        }

        segments.push({ x1: ox, y1: oy, x2: tip.x, y2: tip.y, depth: tip.depth, age: tip.age, energy: tip.energy });

        // Branch
        if (Math.random() < branchRate && tip.depth < 8 && tip.energy > 0.3) {
            const branchAngle = tip.angle + (Math.random() > 0.5 ? 1 : -1) * (0.4 + Math.random() * 0.8);
            newTips.push(new Tip(tip.x, tip.y, branchAngle, tip.depth + 1, tip.energy * 0.7));
            tip.energy *= 0.85;
        }
    }

    tips.push(...newTips);
}

function draw() {
    // Slight fade for trail effect
    ctx.fillStyle = 'rgba(10,14,26,0.02)';
    ctx.fillRect(0, 0, W, H);

    // Draw nutrients
    if (showNutrients) {
        for (const n of nutrients) {
            const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
            grad.addColorStop(0, `rgba(221,161,94,${0.3 * n.amount})`);
            grad.addColorStop(1, 'rgba(221,161,94,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Draw new segments
    const recent = segments.slice(-tips.length * 2);
    for (const s of recent) {
        const alpha = Math.max(0.15, Math.min(0.9, s.energy));
        const thickness = Math.max(0.4, 3 - s.depth * 0.35);
        const hue = 75 + s.depth * 8;
        const sat = 30 + s.energy * 30;
        const light = 25 + s.energy * 25;
        ctx.strokeStyle = `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`;
        ctx.lineWidth = thickness;
        ctx.beginPath();
        ctx.moveTo(s.x1, s.y1);
        ctx.lineTo(s.x2, s.y2);
        ctx.stroke();
    }

    // Glowing tips
    for (const tip of tips) {
        if (!tip.alive) continue;
        ctx.fillStyle = `rgba(138,154,91,${0.5 + tip.energy * 0.5})`;
        ctx.beginPath();
        ctx.arc(tip.x, tip.y, 2.5 - tip.depth * 0.2, 0, Math.PI * 2);
        ctx.fill();

        // Tip glow
        const glow = ctx.createRadialGradient(tip.x, tip.y, 0, tip.x, tip.y, 8);
        glow.addColorStop(0, `rgba(138,154,91,${0.2 * tip.energy})`);
        glow.addColorStop(1, 'rgba(138,154,91,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(tip.x, tip.y, 8, 0, Math.PI * 2);
        ctx.fill();
    }
}

let animId;
function animate() {
    for (let i = 0; i < 3; i++) update();
    draw();
    animId = requestAnimationFrame(animate);
}

window.reset = function() {
    cancelAnimationFrame(animId);
    init();
    animate();
};

// Click to add nutrient source
canvas.addEventListener('click', (e) => {
    if (e.target !== canvas) return;
    nutrients.push(new NutrientPatch(e.clientX, e.clientY, 40 + Math.random() * 30, 0.8));
});

init();
animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
