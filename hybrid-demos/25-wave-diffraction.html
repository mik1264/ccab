<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Diffraction + Intensity Profile - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:var(--earth);text-decoration:none;border-radius:6px;font-size:14px;z-index:999;transition:all 0.3s ease}
        .back-link:hover{background:rgba(221,161,94,0.2);transform:translateX(-4px)}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:var(--earth);padding:8px 12px;border-radius:6px;font-family:'Courier New',monospace;font-size:14px;z-index:999}
        #controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);border:1px solid rgba(221,161,94,0.3);border-radius:12px;padding:12px 20px;z-index:999;display:flex;gap:20px;align-items:center;font-size:13px}
        .ctrl-grp{display:flex;flex-direction:column;gap:3px;align-items:center}
        .ctrl-grp label{color:var(--earth);font-size:11px}
        .ctrl-grp input[type=range]{width:100px;accent-color:var(--earth)}
        .ctrl-grp span{color:#fff;font-family:'Courier New',monospace;font-size:11px}
        .mode-btn{background:rgba(221,161,94,0.15);border:1px solid rgba(221,161,94,0.4);color:var(--earth);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Nunito',sans-serif}
        .mode-btn.active{background:rgba(221,161,94,0.4)}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="controls">
        <div class="ctrl-grp">
            <label>Wavelength</label>
            <input type="range" id="wl" min="5" max="20" step="1" value="10">
            <span id="wl-val">10 px</span>
        </div>
        <div class="ctrl-grp">
            <label>Slit Width</label>
            <input type="range" id="sw" min="5" max="40" step="1" value="15">
            <span id="sw-val">15 px</span>
        </div>
        <div class="ctrl-grp">
            <label>Mode</label>
            <div style="display:flex;gap:6px">
                <button class="mode-btn active" id="btn-single">Single</button>
                <button class="mode-btn" id="btn-double">Double</button>
                <button class="mode-btn" id="btn-grating">Grating</button>
            </div>
        </div>
    </div>
    <script>
    (function(){
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';
        var W, H;

        var GRID_W=200, GRID_H=150;
        var u, u_prev, u_pprev; // wave amplitude grids
        var barrier; // 0=open 1=wall

        var wavelength=10, slitWidth=15, mode='single';
        var dt=0.4, dx=1, c=1;
        var damping=0.998;
        var t=0;

        function resize(){
            W=canvas.width=window.innerWidth;
            H=canvas.height=window.innerHeight;
            svg.setAttribute('width',W);
            svg.setAttribute('height',H);
            initWave();
        }

        function initWave(){
            u=new Float32Array(GRID_W*GRID_H);
            u_prev=new Float32Array(GRID_W*GRID_H);
            u_pprev=new Float32Array(GRID_W*GRID_H);
            barrier=new Uint8Array(GRID_W*GRID_H);
            buildBarrier();
        }

        function buildBarrier(){
            barrier.fill(0);
            var barrierX=Math.floor(GRID_W*0.45);
            var cy=Math.floor(GRID_H/2);

            if(mode==='single'){
                // Single slit: wall with one opening
                var halfSlit=Math.floor(slitWidth/2);
                for(var j=0;j<GRID_H;j++){
                    var inSlit=Math.abs(j-cy)<halfSlit;
                    if(!inSlit) barrier[j*GRID_W+barrierX]=1;
                }
            } else if(mode==='double'){
                // Double slit
                var halfSlit2=Math.floor(slitWidth/2);
                var gap=Math.floor(slitWidth*1.8);
                for(var j=0;j<GRID_H;j++){
                    var inSlit1=Math.abs(j-(cy-gap))<halfSlit2;
                    var inSlit2=Math.abs(j-(cy+gap))<halfSlit2;
                    if(!inSlit1 && !inSlit2) barrier[j*GRID_W+barrierX]=1;
                }
            } else if(mode==='grating'){
                // Diffraction grating: multiple slits
                var halfSlit3=Math.floor(slitWidth*0.4);
                var period=slitWidth+4;
                for(var j=0;j<GRID_H;j++){
                    var inSlit3=(j%period)<halfSlit3*2;
                    if(!inSlit3) barrier[j*GRID_W+barrierX]=1;
                }
            }
        }

        // Wave update (FDTD 2D wave equation)
        var r = c*dt/dx;
        var r2 = r*r;

        function stepWave(){
            t+=1;
            var k=Math.floor(GRID_W*0.08);

            // Source: plane wave from left
            var omega=2*Math.PI*c/(wavelength);
            for(var j2=0;j2<GRID_H;j2++){
                if(!barrier[j2*GRID_W+k]){
                    u[j2*GRID_W+k]=Math.sin(omega*t*dt)*1.5;
                }
            }

            // FDTD update
            var tmp=new Float32Array(GRID_W*GRID_H);
            for(var j2=1;j2<GRID_H-1;j2++){
                for(var i2=1;i2<GRID_W-1;i2++){
                    var idx2=j2*GRID_W+i2;
                    if(barrier[idx2]){ tmp[idx2]=0; continue; }
                    var lap=u[idx2-1]+u[idx2+1]+u[idx2-GRID_W]+u[idx2+GRID_W]-4*u[idx2];
                    tmp[idx2]=damping*(2*u[idx2]-u_pprev[idx2]+r2*lap);
                    // Clamp
                    if(tmp[idx2]>2) tmp[idx2]=2;
                    if(tmp[idx2]<-2) tmp[idx2]=-2;
                }
            }
            // Absorbing boundary (simple)
            for(var j2=0;j2<GRID_H;j2++){
                tmp[j2*GRID_W]=u[j2*GRID_W+1];
                tmp[j2*GRID_W+GRID_W-1]=u[j2*GRID_W+GRID_W-2];
            }
            for(var i2=0;i2<GRID_W;i2++){
                tmp[i2]=u[GRID_W+i2];
                tmp[(GRID_H-1)*GRID_W+i2]=u[(GRID_H-2)*GRID_W+i2];
            }

            u_pprev.set(u_prev);
            u_prev.set(u);
            u.set(tmp);
        }

        // Color mapping: crests=red, troughs=blue, zero=dark
        function waveColor(amp){
            var norm=Math.max(-1,Math.min(1,amp/1.5));
            if(norm>0){
                var r3=Math.round(norm*220+20);
                var g3=Math.round(20);
                var b3=Math.round(20);
                return [r3,g3,b3,Math.round(norm*200+20)];
            } else {
                var f=-norm;
                return [20,Math.round(30),Math.round(f*220+20),Math.round(f*200+20)];
            }
        }

        resize();
        window.addEventListener('resize', resize);

        // Controls
        document.getElementById('wl').addEventListener('input',function(){
            wavelength=parseInt(this.value);
            document.getElementById('wl-val').textContent=wavelength+' px';
            initWave();
        });
        document.getElementById('sw').addEventListener('input',function(){
            slitWidth=parseInt(this.value);
            document.getElementById('sw-val').textContent=slitWidth+' px';
            buildBarrier();
            u.fill(0); u_prev.fill(0); u_pprev.fill(0); t=0;
        });

        function setMode(m){
            mode=m;
            document.querySelectorAll('.mode-btn').forEach(function(b){ b.classList.remove('active'); });
            document.getElementById('btn-'+m).classList.add('active');
            buildBarrier();
            u.fill(0); u_prev.fill(0); u_pprev.fill(0); t=0;
        }
        document.getElementById('btn-single').addEventListener('click',function(){ setMode('single'); });
        document.getElementById('btn-double').addEventListener('click',function(){ setMode('double'); });
        document.getElementById('btn-grating').addEventListener('click',function(){ setMode('grating'); });

        // SVG elements
        function svgEl(tag,attrs){
            var el=document.createElementNS(svgNS,tag);
            for(var k in attrs) el.setAttribute(k,attrs[k]);
            return el;
        }

        // Right side intensity profile
        var PROF_W=100, PROF_H=0;
        var profG=svgEl('g',{});
        svg.appendChild(profG);
        var profBg=svgEl('rect',{rx:8,fill:'rgba(0,0,0,0.72)',stroke:'rgba(221,161,94,0.35)','stroke-width':1});
        profG.appendChild(profBg);
        var profTitle=svgEl('text',{fill:'#DDA15E','font-family':'Lora,serif','font-size':13,'font-weight':600,'text-anchor':'middle'});
        profTitle.textContent='Intensity';
        profG.appendChild(profTitle);
        var profPath=svgEl('path',{fill:'rgba(221,161,94,0.3)',stroke:'#DDA15E','stroke-width':1.5});
        profG.appendChild(profPath);
        var profAxisX=svgEl('line',{stroke:'rgba(255,255,255,0.2)','stroke-width':1});
        profG.appendChild(profAxisX);

        // Screen line
        var screenLine=svgEl('line',{stroke:'rgba(221,161,94,0.4)','stroke-width':1.5,'stroke-dasharray':'6,4'});
        svg.appendChild(screenLine);
        var screenLbl=svgEl('text',{fill:'rgba(221,161,94,0.6)','font-family':'Nunito,sans-serif','font-size':10,'text-anchor':'middle'});
        screenLbl.textContent='Detection Screen';
        svg.appendChild(screenLbl);

        // Param info panel
        var paramG=svgEl('g',{});
        svg.appendChild(paramG);
        var paramBg=svgEl('rect',{rx:8,fill:'rgba(0,0,0,0.7)',stroke:'rgba(138,154,91,0.3)','stroke-width':1,width:200,height:80});
        paramG.appendChild(paramBg);
        var p1=svgEl('text',{fill:'#DDA15E','font-family':'Lora,serif','font-size':13,'font-weight':600});
        p1.textContent='Wave Diffraction';
        paramG.appendChild(p1);
        var p2=svgEl('text',{fill:'#e8e6e1','font-family':'Courier New,monospace','font-size':10.5});
        paramG.appendChild(p2);
        var p3=svgEl('text',{fill:'#8A9A5B','font-family':'Courier New,monospace','font-size':10.5});
        paramG.appendChild(p3);
        var p4=svgEl('text',{fill:'rgba(255,255,255,0.45)','font-family':'Courier New,monospace','font-size':10});
        p4.textContent='sin\u03b8 = m\u03bb/a';
        paramG.appendChild(p4);

        var fps=0,fpsFrames=0,fpsLast=performance.now();
        var fpsEl=document.getElementById('fps-value');
        var frame=0;

        var imageData2; // reuse

        function animate(){
            requestAnimationFrame(animate);
            frame++;
            fpsFrames++;
            var now=performance.now();
            if(now-fpsLast>500){
                fps=Math.round(fpsFrames*1000/(now-fpsLast));
                fpsEl.textContent=fps;
                fpsFrames=0;fpsLast=now;
            }

            // Multiple wave steps per frame
            for(var s=0;s<3;s++) stepWave();

            ctx.clearRect(0,0,W,H);

            // Render wave field
            if(!imageData2 || imageData2.width!==W || imageData2.height!==H){
                imageData2=ctx.createImageData(W,H);
            }
            var data=imageData2.data;

            var cellW=W/GRID_W, cellH=H/GRID_H;

            for(var gj=0;gj<GRID_H;gj++){
                for(var gi=0;gi<GRID_W;gi++){
                    var idx=gj*GRID_W+gi;
                    var px1=Math.round(gi*cellW);
                    var py1=Math.round(gj*cellH);
                    var px2=Math.round((gi+1)*cellW);
                    var py2=Math.round((gj+1)*cellH);
                    var col;
                    if(barrier[idx]){
                        col=[50,50,60,255];
                    } else {
                        col=waveColor(u[idx]);
                    }
                    for(var py3=py1;py3<py2&&py3<H;py3++){
                        for(var px3=px1;px3<px2&&px3<W;px3++){
                            var pidx=(py3*W+px3)*4;
                            data[pidx]=col[0];
                            data[pidx+1]=col[1];
                            data[pidx+2]=col[2];
                            data[pidx+3]=col[3];
                        }
                    }
                }
            }
            ctx.putImageData(imageData2,0,0);

            // Screen marker (right side at 85% of grid)
            var screenGX=Math.floor(GRID_W*0.85);
            var screenPX=Math.round(screenGX*cellW);

            // Collect intensity at screen
            var intensityProfile=new Float32Array(GRID_H);
            for(var j=0;j<GRID_H;j++){
                var amp=u[j*GRID_W+screenGX];
                intensityProfile[j]=amp*amp;
            }

            // SVG intensity profile
            PROF_H=H-160;
            var PX=W-PROF_W-20, PY=80;
            profBg.setAttribute('x',PX-10);
            profBg.setAttribute('y',PY-28);
            profBg.setAttribute('width',PROF_W+20);
            profBg.setAttribute('height',PROF_H+48);
            profTitle.setAttribute('x',PX+PROF_W/2);
            profTitle.setAttribute('y',PY-12);
            profAxisX.setAttribute('x1',PX);
            profAxisX.setAttribute('y1',PY+PROF_H/2);
            profAxisX.setAttribute('x2',PX+PROF_W);
            profAxisX.setAttribute('y2',PY+PROF_H/2);

            var maxI=0;
            intensityProfile.forEach(function(v){ if(v>maxI) maxI=v; });
            if(maxI<0.01) maxI=0.01;

            // Build path
            var pts='';
            var ptsFill='';
            for(var j=0;j<GRID_H;j++){
                var norm2=intensityProfile[j]/maxI;
                var px4=PX+norm2*PROF_W;
                var py4=PY+(j/GRID_H)*PROF_H;
                if(j===0){
                    pts='M'+px4.toFixed(1)+','+py4.toFixed(1);
                    ptsFill='M'+PX+','+py4.toFixed(1);
                } else {
                    pts+=' L'+px4.toFixed(1)+','+py4.toFixed(1);
                    ptsFill+=' L'+px4.toFixed(1)+','+py4.toFixed(1);
                }
            }
            var lastPY=PY+PROF_H;
            ptsFill+=' L'+PX+','+lastPY+' Z';
            profPath.setAttribute('d',ptsFill+' '+pts.replace('M','M'));
            profPath.setAttribute('d',ptsFill);

            // Screen line
            screenLine.setAttribute('x1',screenPX);
            screenLine.setAttribute('y1',0);
            screenLine.setAttribute('x2',screenPX);
            screenLine.setAttribute('y2',H-80);
            screenLbl.setAttribute('x',screenPX);
            screenLbl.setAttribute('y',H-90);

            // Param panel
            var paramX=70, paramY=70;
            paramBg.setAttribute('x',paramX);
            paramBg.setAttribute('y',paramY);
            p1.setAttribute('x',paramX+12);
            p1.setAttribute('y',paramY+18);
            p2.setAttribute('x',paramX+12);
            p2.setAttribute('y',paramY+36);
            p2.textContent='\u03bb='+wavelength+'px  a='+slitWidth+'px';
            p3.setAttribute('x',paramX+12);
            p3.setAttribute('y',paramY+52);
            var modeStr={'single':'Single Slit','double':'Double Slit','grating':'Grating'}[mode];
            p3.textContent='Mode: '+modeStr;
            p4.setAttribute('x',paramX+12);
            p4.setAttribute('y',paramY+68);
        }

        animate();
    })();
    </script>
</body>
</html>
