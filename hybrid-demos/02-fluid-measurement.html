<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Simulation + Measurement Overlay - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; font-family:'Nunito',sans-serif; background:#0a0e1a; color:#e8e6e1; }
        .back-link { position:fixed; top:10px; left:10px; padding:8px 16px; background:rgba(0,0,0,0.7); color:var(--earth); text-decoration:none; border-radius:6px; font-size:14px; font-family:'Nunito',sans-serif; z-index:999; transition:all 0.3s ease; }
        .back-link:hover { background:rgba(221,161,94,0.2); transform:translateX(-4px); }
        #fps-counter { position:fixed; top:10px; right:10px; background:rgba(0,0,0,0.7); color:var(--earth); padding:8px 12px; border-radius:6px; font-family:'Courier New',monospace; font-size:14px; z-index:999; }
        .fps-good{color:#10b981}.fps-medium{color:#fbbf24}.fps-poor{color:#e11d48}
        #hybrid-container { position:relative; width:100vw; height:100vh; }
        #canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
        #svg-overlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }
        .interactive { pointer-events:all; cursor:pointer; }
        #loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:1000; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--earth); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #error { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(225,29,72,0.9); color:white; padding:2rem; border-radius:12px; text-align:center; max-width:400px; z-index:1001; }
        #error h2 { font-family:'Lora',serif; margin:0 0 1rem 0; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message"></p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
                    <polygon points="0 0, 6 2, 0 4" fill="rgba(221,161,94,0.7)"/>
                </marker>
            </defs>
        </svg>
    </div>

    <script>
        window.addEventListener('error',function(e){showError('Runtime Error: '+e.message);});
        function showError(m){document.getElementById('loading').style.display='none';document.getElementById('error').style.display='block';document.getElementById('error-message').textContent=m;}
        function hideLoading(){document.getElementById('loading').style.display='none';}

        class FPSCounter{constructor(){this.fps=0;this.frames=0;this.lastTime=performance.now();this.el=document.getElementById('fps-value');}update(){this.frames++;var n=performance.now(),d=n-this.lastTime;if(d>=1000){this.fps=Math.round(this.frames*1000/d);this.frames=0;this.lastTime=n;this.el.textContent=this.fps;this.el.className=this.fps>=55?'fps-good':this.fps>=30?'fps-medium':'fps-poor';}}}

        try {
            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');
            var svg = document.getElementById('svg-overlay');
            var svgNS = 'http://www.w3.org/2000/svg';
            var fpsCounter = new FPSCounter();
            var W, H;

            // Fluid grid
            var N = 128;
            var size = (N + 2) * (N + 2);
            var u = new Float32Array(size);
            var v = new Float32Array(size);
            var u_prev = new Float32Array(size);
            var v_prev = new Float32Array(size);
            var dens = new Float32Array(size);
            var dens_prev = new Float32Array(size);

            function IX(i, j) { return i + (N + 2) * j; }

            function addSource(x, s, dt) {
                for (var i = 0; i < size; i++) x[i] += dt * s[i];
            }

            function setBnd(b, x) {
                for (var i = 1; i <= N; i++) {
                    x[IX(0,   i)] = b === 1 ? -x[IX(1, i)] : x[IX(1, i)];
                    x[IX(N+1, i)] = b === 1 ? -x[IX(N, i)] : x[IX(N, i)];
                    x[IX(i,   0)] = b === 2 ? -x[IX(i, 1)] : x[IX(i, 1)];
                    x[IX(i, N+1)] = b === 2 ? -x[IX(i, N)] : x[IX(i, N)];
                }
                x[IX(0,0)] = 0.5 * (x[IX(1,0)] + x[IX(0,1)]);
                x[IX(0,N+1)] = 0.5 * (x[IX(1,N+1)] + x[IX(0,N)]);
                x[IX(N+1,0)] = 0.5 * (x[IX(N,0)] + x[IX(N+1,1)]);
                x[IX(N+1,N+1)] = 0.5 * (x[IX(N,N+1)] + x[IX(N+1,N)]);
            }

            function diffuse(b, x, x0, diff, dt) {
                var a = dt * diff * N * N;
                for (var k = 0; k < 4; k++) {
                    for (var j = 1; j <= N; j++) {
                        for (var i = 1; i <= N; i++) {
                            x[IX(i,j)] = (x0[IX(i,j)] + a * (x[IX(i-1,j)] + x[IX(i+1,j)] + x[IX(i,j-1)] + x[IX(i,j+1)])) / (1 + 4 * a);
                        }
                    }
                    setBnd(b, x);
                }
            }

            function advect(b, d, d0, uu, vv, dt) {
                var dt0 = dt * N;
                for (var j = 1; j <= N; j++) {
                    for (var i = 1; i <= N; i++) {
                        var x = i - dt0 * uu[IX(i,j)];
                        var y = j - dt0 * vv[IX(i,j)];
                        if (x < 0.5) x = 0.5; if (x > N + 0.5) x = N + 0.5;
                        if (y < 0.5) y = 0.5; if (y > N + 0.5) y = N + 0.5;
                        var i0 = Math.floor(x), i1 = i0 + 1;
                        var j0 = Math.floor(y), j1 = j0 + 1;
                        var s1 = x - i0, s0 = 1 - s1;
                        var t1 = y - j0, t0 = 1 - t1;
                        d[IX(i,j)] = s0 * (t0 * d0[IX(i0,j0)] + t1 * d0[IX(i0,j1)]) + s1 * (t0 * d0[IX(i1,j0)] + t1 * d0[IX(i1,j1)]);
                    }
                }
                setBnd(b, d);
            }

            function project(uu, vv, p, div) {
                var h = 1.0 / N;
                for (var j = 1; j <= N; j++) {
                    for (var i = 1; i <= N; i++) {
                        div[IX(i,j)] = -0.5 * h * (uu[IX(i+1,j)] - uu[IX(i-1,j)] + vv[IX(i,j+1)] - vv[IX(i,j-1)]);
                        p[IX(i,j)] = 0;
                    }
                }
                setBnd(0, div); setBnd(0, p);
                for (var k = 0; k < 10; k++) {
                    for (var j = 1; j <= N; j++) {
                        for (var i = 1; i <= N; i++) {
                            p[IX(i,j)] = (div[IX(i,j)] + p[IX(i-1,j)] + p[IX(i+1,j)] + p[IX(i,j-1)] + p[IX(i,j+1)]) / 4;
                        }
                    }
                    setBnd(0, p);
                }
                for (var j = 1; j <= N; j++) {
                    for (var i = 1; i <= N; i++) {
                        uu[IX(i,j)] -= 0.5 * N * (p[IX(i+1,j)] - p[IX(i-1,j)]);
                        vv[IX(i,j)] -= 0.5 * N * (p[IX(i,j+1)] - p[IX(i,j-1)]);
                    }
                }
                setBnd(1, uu); setBnd(2, vv);
            }

            function velStep(dt) {
                addSource(u, u_prev, dt); addSource(v, v_prev, dt);
                var tmp;
                tmp = u_prev; u_prev = u; u = tmp; diffuse(1, u, u_prev, 0.0001, dt);
                tmp = v_prev; v_prev = v; v = tmp; diffuse(2, v, v_prev, 0.0001, dt);
                project(u, v, u_prev, v_prev);
                tmp = u_prev; u_prev = u; u = tmp;
                tmp = v_prev; v_prev = v; v = tmp;
                advect(1, u, u_prev, u_prev, v_prev, dt);
                advect(2, v, v_prev, u_prev, v_prev, dt);
                project(u, v, u_prev, v_prev);
            }

            function densStep(dt) {
                addSource(dens, dens_prev, dt);
                var tmp = dens_prev; dens_prev = dens; dens = tmp;
                diffuse(0, dens, dens_prev, 0.0001, dt);
                tmp = dens_prev; dens_prev = dens; dens = tmp;
                advect(0, dens, dens_prev, u, v, dt);
            }

            // Mouse interaction
            var mouseDown = false, lastMX = 0, lastMY = 0;
            var dyeHue = 0;

            canvas.addEventListener('mousedown', function(e) { mouseDown = true; lastMX = e.clientX; lastMY = e.clientY; });
            canvas.addEventListener('mouseup', function() { mouseDown = false; });
            canvas.addEventListener('mousemove', function(e) {
                if (!mouseDown) return;
                var dx = e.clientX - lastMX;
                var dy = e.clientY - lastMY;
                var gi = Math.floor((e.clientX / W) * N) + 1;
                var gj = Math.floor((e.clientY / H) * N) + 1;
                if (gi > 0 && gi <= N && gj > 0 && gj <= N) {
                    u_prev[IX(gi, gj)] += dx * 5;
                    v_prev[IX(gi, gj)] += dy * 5;
                    dens_prev[IX(gi, gj)] += 50;
                    for (var di = -1; di <= 1; di++) {
                        for (var dj = -1; dj <= 1; dj++) {
                            var ni = gi + di, nj = gj + dj;
                            if (ni > 0 && ni <= N && nj > 0 && nj <= N) {
                                dens_prev[IX(ni, nj)] += 20;
                            }
                        }
                    }
                }
                lastMX = e.clientX; lastMY = e.clientY;
            });

            // SVG arrows
            var showArrows = true;
            var arrowGridN = 15;
            var arrows = [];

            function createSVGEl(tag, attrs) {
                var el = document.createElementNS(svgNS, tag);
                for (var k in attrs) el.setAttribute(k, attrs[k]);
                return el;
            }

            var arrowGroup = createSVGEl('g', { id: 'arrows' });
            svg.appendChild(arrowGroup);

            for (var aj = 0; aj < arrowGridN; aj++) {
                for (var ai = 0; ai < arrowGridN; ai++) {
                    var line = createSVGEl('line', {
                        stroke: 'rgba(221,161,94,0.6)',
                        'stroke-width': '1.5',
                        'marker-end': 'url(#arrowhead)'
                    });
                    arrowGroup.appendChild(line);
                    arrows.push(line);
                }
            }

            // Toggle buttons
            var toggleGroup = createSVGEl('g', { class: 'interactive' });
            svg.appendChild(toggleGroup);

            function makeToggle(x, y, label, active, onClick) {
                var g = createSVGEl('g', { transform: 'translate(' + x + ',' + y + ')', style: 'cursor:pointer' });
                g.classList.add('interactive');
                var r = createSVGEl('rect', { width: '130', height: '30', rx: '6', fill: active ? 'rgba(221,161,94,0.4)' : 'rgba(255,255,255,0.1)', stroke: 'rgba(221,161,94,0.4)', 'stroke-width': '1' });
                var t = createSVGEl('text', { x: '65', y: '20', 'text-anchor': 'middle', fill: '#DDA15E', 'font-family': 'Nunito, sans-serif', 'font-size': '12' });
                t.textContent = label;
                g.appendChild(r); g.appendChild(t);
                g.addEventListener('click', function() { onClick(r, t); });
                toggleGroup.appendChild(g);
                return { rect: r, text: t };
            }

            makeToggle(10, 50, 'Arrows: ON', true, function(r, t) {
                showArrows = !showArrows;
                t.textContent = showArrows ? 'Arrows: ON' : 'Arrows: OFF';
                r.setAttribute('fill', showArrows ? 'rgba(221,161,94,0.4)' : 'rgba(255,255,255,0.1)');
                arrowGroup.setAttribute('visibility', showArrows ? 'visible' : 'hidden');
            });

            // Label
            var infoLabel = createSVGEl('text', { x: '10', y: H - 20, fill: 'rgba(255,255,255,0.5)', 'font-family': 'Nunito, sans-serif', 'font-size': '13' });
            infoLabel.textContent = 'Drag to inject fluid';
            svg.appendChild(infoLabel);

            var velLabel = createSVGEl('text', { x: '10', y: '100', fill: 'rgba(221,161,94,0.8)', 'font-family': 'Nunito, sans-serif', 'font-size': '13' });
            velLabel.textContent = 'Velocity Field';
            svg.appendChild(velLabel);

            function resize() {
                W = window.innerWidth; H = window.innerHeight;
                canvas.width = W; canvas.height = H;
                svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
                svg.setAttribute('width', W); svg.setAttribute('height', H);
                infoLabel.setAttribute('y', H - 20);
            }
            var rt; window.addEventListener('resize', function() { clearTimeout(rt); rt = setTimeout(resize, 100); });
            resize();

            // Image data for fast rendering
            var imgData;

            function animate() {
                fpsCounter.update();
                dyeHue = (dyeHue + 0.3) % 360;

                velStep(0.1);
                densStep(0.1);

                // Decay density
                for (var i = 0; i < size; i++) {
                    dens[i] *= 0.995;
                    u_prev[i] = 0; v_prev[i] = 0; dens_prev[i] = 0;
                }

                // Render fluid
                imgData = ctx.createImageData(W, H);
                var data = imgData.data;
                var cellW = W / N;
                var cellH = H / N;

                for (var j = 1; j <= N; j++) {
                    for (var i = 1; i <= N; i++) {
                        var d = Math.min(dens[IX(i,j)], 5);
                        var uu = u[IX(i,j)];
                        var vv = v[IX(i,j)];
                        var speed = Math.sqrt(uu * uu + vv * vv);
                        var hue = (speed * 20 + dyeHue) % 360;
                        var brightness = Math.min(d / 3, 1);

                        // HSL to RGB simple
                        var h = hue / 60;
                        var c = brightness;
                        var x2 = c * (1 - Math.abs(h % 2 - 1));
                        var r = 0, g = 0, b = 0;
                        if (h < 1) { r = c; g = x2; }
                        else if (h < 2) { r = x2; g = c; }
                        else if (h < 3) { g = c; b = x2; }
                        else if (h < 4) { g = x2; b = c; }
                        else if (h < 5) { r = x2; b = c; }
                        else { r = c; b = x2; }

                        var px0 = Math.floor((i - 1) * cellW);
                        var py0 = Math.floor((j - 1) * cellH);
                        var px1 = Math.floor(i * cellW);
                        var py1 = Math.floor(j * cellH);

                        var rr = Math.floor((r + 0.05) * 255);
                        var gg = Math.floor((g + 0.05) * 255);
                        var bb = Math.floor((b + 0.05) * 255);

                        for (var py2 = py0; py2 < py1 && py2 < H; py2++) {
                            for (var px2 = px0; px2 < px1 && px2 < W; px2++) {
                                var idx = (py2 * W + px2) * 4;
                                data[idx] = rr;
                                data[idx + 1] = gg;
                                data[idx + 2] = bb;
                                data[idx + 3] = 255;
                            }
                        }
                    }
                }
                ctx.putImageData(imgData, 0, 0);

                // Update SVG arrows
                if (showArrows) {
                    var idx2 = 0;
                    for (var aj = 0; aj < arrowGridN; aj++) {
                        for (var ai = 0; ai < arrowGridN; ai++) {
                            var gi = Math.floor((ai + 0.5) * N / arrowGridN) + 1;
                            var gj = Math.floor((aj + 0.5) * N / arrowGridN) + 1;
                            var ax = (ai + 0.5) * W / arrowGridN;
                            var ay = (aj + 0.5) * H / arrowGridN;
                            var vu = u[IX(gi, gj)];
                            var vv2 = v[IX(gi, gj)];
                            var len = Math.sqrt(vu * vu + vv2 * vv2);
                            var maxLen = 25;
                            var scale = Math.min(len * 3, maxLen);

                            arrows[idx2].setAttribute('x1', ax);
                            arrows[idx2].setAttribute('y1', ay);
                            if (len > 0.01) {
                                arrows[idx2].setAttribute('x2', ax + (vu / len) * scale);
                                arrows[idx2].setAttribute('y2', ay + (vv2 / len) * scale);
                                arrows[idx2].setAttribute('stroke-opacity', Math.min(len * 0.5, 0.8));
                            } else {
                                arrows[idx2].setAttribute('x2', ax);
                                arrows[idx2].setAttribute('y2', ay);
                                arrows[idx2].setAttribute('stroke-opacity', '0.1');
                            }
                            idx2++;
                        }
                    }
                }

                requestAnimationFrame(animate);
            }

            hideLoading();
            animate();
        } catch(e) { showError('Init Error: ' + e.message); }
    </script>
</body>
</html>
