<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packet Routing - Hybrid Canvas+SVG</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; font-family:'Nunito',sans-serif; background:#0a0e1a; color:#e8e6e1; }
        .back-link { position:fixed; top:10px; left:10px; padding:8px 16px; background:rgba(0,0,0,0.7); color:var(--earth); text-decoration:none; border-radius:6px; font-size:14px; font-family:'Nunito',sans-serif; z-index:999; transition:all 0.3s ease; }
        .back-link:hover { background:rgba(221,161,94,0.2); transform:translateX(-4px); }
        #fps-counter { position:fixed; top:10px; right:10px; background:rgba(0,0,0,0.7); color:var(--earth); padding:8px 12px; border-radius:6px; font-family:'Courier New',monospace; font-size:14px; z-index:999; }
        .fps-good{color:#10b981} .fps-medium{color:#fbbf24} .fps-poor{color:#e11d48}
        #hybrid-container { position:relative; width:100vw; height:100vh; }
        #canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
        #svg-overlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }
        .interactive { pointer-events:all; cursor:pointer; }
        .svg-label { font-family:'Nunito',sans-serif; font-size:12px; fill:rgba(255,255,255,0.8); pointer-events:none; }
        .svg-title { font-family:'Lora',serif; font-size:16px; fill:var(--earth); pointer-events:none; }
        #loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:1000; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--earth); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #error { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(225,29,72,0.9); color:white; padding:2rem; border-radius:12px; text-align:center; max-width:400px; z-index:1001; }
        #error h2 { font-family:'Lora',serif; margin:0 0 1rem 0; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message"></p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"><defs></defs></svg>
    </div>
    <script>
    window.addEventListener('error', (e) => { showError('Runtime Error: ' + e.message); });
    function showError(m) { document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='block'; document.getElementById('error-message').textContent=m; }
    function hideLoading() { document.getElementById('loading').style.display='none'; }

    class FPSCounter {
        constructor(){this.fps=0;this.frames=0;this.lastTime=performance.now();this.el=document.getElementById('fps-value');}
        update(){this.frames++;const n=performance.now(),d=n-this.lastTime;if(d>=1000){this.fps=Math.round(this.frames*1000/d);this.frames=0;this.lastTime=n;this.el.textContent=this.fps;this.el.className=this.fps>=55?'fps-good':this.fps>=30?'fps-medium':'fps-poor';}}
    }

    try {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const svg = document.getElementById('svg-overlay');
        const ns = 'http://www.w3.org/2000/svg';
        const fpsCounter = new FPSCounter();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        let W, H;

        // Network topology - 15 nodes
        const nodePositions = [
            [0.15, 0.2], [0.35, 0.12], [0.55, 0.15], [0.75, 0.2], [0.9, 0.3],
            [0.1, 0.45], [0.3, 0.4], [0.5, 0.38], [0.7, 0.45], [0.88, 0.55],
            [0.15, 0.7], [0.35, 0.65], [0.52, 0.7], [0.72, 0.72], [0.85, 0.78]
        ];
        const edgeDefs = [
            [0,1], [1,2], [2,3], [3,4],
            [0,5], [1,6], [2,7], [3,8], [4,9],
            [5,6], [6,7], [7,8], [8,9],
            [5,10], [6,11], [7,12], [8,13], [9,14],
            [10,11], [11,12], [12,13], [13,14],
            [0,6], [2,8], [6,12], [8,14]
        ];

        let nodes = [];
        let edges = [];
        let packets = [];
        let totalDelivered = 0;
        let hoveredNode = -1;

        // Dijkstra shortest path
        function dijkstra(src, dst) {
            const n = nodes.length;
            const dist = new Array(n).fill(Infinity);
            const prev = new Array(n).fill(-1);
            const visited = new Array(n).fill(false);
            dist[src] = 0;

            for (let i = 0; i < n; i++) {
                let u = -1, minD = Infinity;
                for (let j = 0; j < n; j++) {
                    if (!visited[j] && dist[j] < minD) { minD = dist[j]; u = j; }
                }
                if (u === -1) break;
                visited[u] = true;
                for (const e of edges) {
                    let v = -1;
                    if (e.a === u) v = e.b;
                    else if (e.b === u) v = e.a;
                    if (v === -1 || visited[v]) continue;
                    const nd = dist[u] + e.latency;
                    if (nd < dist[v]) { dist[v] = nd; prev[v] = u; }
                }
            }

            const path = [];
            let cur = dst;
            while (cur !== -1) { path.unshift(cur); cur = prev[cur]; }
            return path[0] === src ? path : [];
        }

        function spawnPacket() {
            const src = Math.floor(Math.random() * nodes.length);
            let dst = src;
            while (dst === src) dst = Math.floor(Math.random() * nodes.length);
            const path = dijkstra(src, dst);
            if (path.length < 2) return;
            const hue = Math.random() * 360;
            packets.push({
                path: path,
                step: 0,
                progress: 0,
                hue: hue,
                speed: 0.015 + Math.random() * 0.01
            });
        }

        function initNetwork() {
            nodes = nodePositions.map((p, i) => ({
                x: p[0] * W, y: p[1] * H,
                id: i, throughput: 0
            }));
            edges = edgeDefs.map(([a, b]) => ({
                a, b,
                latency: 10 + Math.floor(Math.random() * 40),
                utilization: 0
            }));
            packets = [];
            totalDelivered = 0;
        }

        function updatePackets() {
            for (let i = packets.length - 1; i >= 0; i--) {
                const p = packets[i];
                p.progress += p.speed;
                if (p.progress >= 1) {
                    p.progress = 0;
                    p.step++;
                    // Update utilization
                    if (p.step < p.path.length) {
                        nodes[p.path[p.step]].throughput++;
                    }
                    if (p.step >= p.path.length - 1) {
                        totalDelivered++;
                        packets.splice(i, 1);
                    }
                }
            }

            // Spawn new packets
            if (Math.random() < 0.06 && packets.length < 30) {
                spawnPacket();
            }

            // Decay utilization
            for (const e of edges) e.utilization *= 0.99;
            // Count packets on edges for utilization
            for (const p of packets) {
                if (p.step < p.path.length - 1) {
                    const a = p.path[p.step], b = p.path[p.step + 1];
                    for (const e of edges) {
                        if ((e.a === a && e.b === b) || (e.a === b && e.b === a)) {
                            e.utilization = Math.min(e.utilization + 0.1, 5);
                        }
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, W, H);

            // Draw edges
            for (const e of edges) {
                const a = nodes[e.a], b = nodes[e.b];
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                const lw = 1 + e.utilization * 1.5;
                ctx.lineWidth = lw;
                ctx.strokeStyle = `rgba(138, 154, 91, ${0.2 + e.utilization * 0.15})`;
                ctx.stroke();
            }

            // Draw packets
            for (const p of packets) {
                if (p.step >= p.path.length - 1) continue;
                const a = nodes[p.path[p.step]], b = nodes[p.path[p.step + 1]];
                const x = a.x + (b.x - a.x) * p.progress;
                const y = a.y + (b.y - a.y) * p.progress;
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${p.hue}, 70%, 60%)`;
                ctx.fill();
                ctx.shadowColor = `hsl(${p.hue}, 70%, 60%)`;
                ctx.shadowBlur = 6;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Draw nodes
            for (let i = 0; i < nodes.length; i++) {
                const n = nodes[i];
                const isHovered = i === hoveredNode;
                ctx.beginPath();
                ctx.arc(n.x, n.y, isHovered ? 14 : 10, 0, Math.PI * 2);
                ctx.fillStyle = isHovered ? '#DDA15E' : '#2a3050';
                ctx.fill();
                ctx.strokeStyle = '#DDA15E';
                ctx.lineWidth = isHovered ? 2.5 : 1.5;
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.font = '10px Nunito, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(i.toString(), n.x, n.y);
            }
        }

        function createUI() {
            svg.innerHTML = '';
            const d = document.createElementNS(ns, 'defs'); svg.appendChild(d);

            const title = document.createElementNS(ns, 'text');
            title.setAttribute('class', 'svg-title');
            title.setAttribute('x', W / 2); title.setAttribute('y', 28);
            title.setAttribute('text-anchor', 'middle');
            title.textContent = 'Network Packet Routing';
            svg.appendChild(title);

            // Tooltip
            const tooltipG = document.createElementNS(ns, 'g');
            tooltipG.setAttribute('id', 'tooltip');
            tooltipG.setAttribute('style', 'display:none');
            const tooltipBg = document.createElementNS(ns, 'rect');
            tooltipBg.setAttribute('width', 160); tooltipBg.setAttribute('height', 70);
            tooltipBg.setAttribute('rx', 6); tooltipBg.setAttribute('fill', 'rgba(0,0,0,0.85)');
            tooltipBg.setAttribute('stroke', 'rgba(221,161,94,0.4)'); tooltipBg.setAttribute('stroke-width', 1);
            tooltipG.appendChild(tooltipBg);
            const ttLine1 = document.createElementNS(ns, 'text');
            ttLine1.setAttribute('id', 'tt-line1'); ttLine1.setAttribute('x', 10);
            ttLine1.setAttribute('y', 20); ttLine1.setAttribute('fill', '#DDA15E');
            ttLine1.setAttribute('font-size', '12px'); ttLine1.setAttribute('font-family', 'Nunito, sans-serif');
            tooltipG.appendChild(ttLine1);
            const ttLine2 = document.createElementNS(ns, 'text');
            ttLine2.setAttribute('id', 'tt-line2'); ttLine2.setAttribute('x', 10);
            ttLine2.setAttribute('y', 38); ttLine2.setAttribute('fill', '#e8e6e1');
            ttLine2.setAttribute('font-size', '11px'); ttLine2.setAttribute('font-family', 'Nunito, sans-serif');
            tooltipG.appendChild(ttLine2);
            const ttLine3 = document.createElementNS(ns, 'text');
            ttLine3.setAttribute('id', 'tt-line3'); ttLine3.setAttribute('x', 10);
            ttLine3.setAttribute('y', 54); ttLine3.setAttribute('fill', '#e8e6e1');
            ttLine3.setAttribute('font-size', '11px'); ttLine3.setAttribute('font-family', 'Nunito, sans-serif');
            tooltipG.appendChild(ttLine3);
            svg.appendChild(tooltipG);

            // Stats panel
            const fo = document.createElementNS(ns, 'foreignObject');
            fo.setAttribute('x', W - 200); fo.setAttribute('y', H - 80);
            fo.setAttribute('width', 190); fo.setAttribute('height', 72);
            fo.setAttribute('class', 'interactive');
            fo.innerHTML = `
                <div xmlns="http://www.w3.org/1999/xhtml" style="background:rgba(0,0,0,0.75);padding:10px 14px;border-radius:10px;font-family:Nunito,sans-serif;font-size:12px;color:#e8e6e1;">
                    <div style="color:#DDA15E;font-weight:600;margin-bottom:4px;">Network Stats</div>
                    <div id="stats-delivered">Delivered: 0</div>
                    <div id="stats-active">Active packets: 0</div>
                </div>
            `;
            svg.appendChild(fo);
        }

        canvas.addEventListener('mousemove', function(e) {
            const x = e.clientX, y = e.clientY;
            hoveredNode = -1;
            for (let i = 0; i < nodes.length; i++) {
                const dx = x - nodes[i].x, dy = y - nodes[i].y;
                if (dx * dx + dy * dy < 400) { hoveredNode = i; break; }
            }
            const tooltip = document.getElementById('tooltip');
            if (hoveredNode >= 0 && tooltip) {
                tooltip.style.display = 'block';
                tooltip.setAttribute('transform', `translate(${x + 15}, ${y - 40})`);
                const n = nodes[hoveredNode];
                const degree = edges.filter(e => e.a === hoveredNode || e.b === hoveredNode).length;
                document.getElementById('tt-line1').textContent = `Node ${hoveredNode}`;
                document.getElementById('tt-line2').textContent = `Degree: ${degree}`;
                document.getElementById('tt-line3').textContent = `Throughput: ${n.throughput}`;
            } else if (tooltip) {
                tooltip.style.display = 'none';
            }
        });

        function updateStats() {
            const del = document.getElementById('stats-delivered');
            const act = document.getElementById('stats-active');
            if (del) del.textContent = 'Delivered: ' + totalDelivered;
            if (act) act.textContent = 'Active packets: ' + packets.length;
        }

        function resize() {
            const rect = canvas.getBoundingClientRect();
            W = rect.width; H = rect.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svg.setAttribute('width', W); svg.setAttribute('height', H);
            initNetwork();
            createUI();
        }

        let resizeTimeout;
        window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 150); });
        resize();

        function animate() {
            fpsCounter.update();
            updatePackets();
            draw();
            updateStats();
            requestAnimationFrame(animate);
        }
        hideLoading();
        animate();
    } catch (err) { showError('Init Error: ' + err.message); }
    </script>
</body>
</html>
