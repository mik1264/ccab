<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epidemic SIR + R0 Counter - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:var(--earth);text-decoration:none;border-radius:6px;font-size:14px;font-family:'Nunito',sans-serif;z-index:999;transition:all 0.3s ease}
        .back-link:hover{background:rgba(221,161,94,0.2);transform:translateX(-4px)}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:var(--earth);padding:8px 12px;border-radius:6px;font-family:'Courier New',monospace;font-size:14px;z-index:999}
        .fps-good{color:#10b981}.fps-medium{color:#fbbf24}.fps-poor{color:#e11d48}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
        .interactive{pointer-events:all;cursor:pointer}
        #loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:1000}
        .spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,0.1);border-top-color:var(--earth);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem}
        @keyframes spin{to{transform:rotate(360deg)}}
        #error{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(225,29,72,0.9);color:white;padding:2rem;border-radius:12px;text-align:center;max-width:400px;z-index:1001}
        #error h2{font-family:'Lora',serif;margin:0 0 1rem 0}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message"></p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <script>
        window.addEventListener('error',function(e){showError('Runtime Error: '+e.message);});
        function showError(m){document.getElementById('loading').style.display='none';document.getElementById('error').style.display='block';document.getElementById('error-message').textContent=m;}
        function hideLoading(){document.getElementById('loading').style.display='none';}
        class FPSCounter{constructor(){this.fps=0;this.frames=0;this.lastTime=performance.now();this.el=document.getElementById('fps-value');}update(){this.frames++;var n=performance.now(),d=n-this.lastTime;if(d>=1000){this.fps=Math.round(this.frames*1000/d);this.frames=0;this.lastTime=n;this.el.textContent=this.fps;this.el.className=this.fps>=55?'fps-good':this.fps>=30?'fps-medium':'fps-poor';}}}

        try {
            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');
            var svg = document.getElementById('svg-overlay');
            var svgNS = 'http://www.w3.org/2000/svg';
            var fpsCounter = new FPSCounter();
            var W, H;

            // SIR parameters
            var beta = 0.3, gamma = 0.05;
            var NUM_AGENTS = 3000;
            var infectionRadius = 12;
            var agents = [];
            var day = 0;
            var moveScale = 1.0;
            var socialDistancing = false;

            // States: 0=S, 1=I, 2=R
            function initAgents(initialInfected) {
                agents = [];
                var simW = W - 290;
                for (var i = 0; i < NUM_AGENTS; i++) {
                    agents.push({
                        x: Math.random() * simW,
                        y: Math.random() * H,
                        vx: (Math.random() - 0.5) * 2,
                        vy: (Math.random() - 0.5) * 2,
                        state: 0,
                        infectedDay: 0
                    });
                }
                // Infect some
                for (var i = 0; i < (initialInfected || 5); i++) {
                    agents[i].state = 1;
                    agents[i].infectedDay = 0;
                }
            }

            // History for chart
            var history = { S: [], I: [], R: [] };
            var maxHistoryLen = 300;

            function createEl(tag, attrs) {
                var el = document.createElementNS(svgNS, tag);
                for (var k in attrs) el.setAttribute(k, attrs[k]);
                return el;
            }

            // SVG panel
            var panelW2 = 270;
            var panel = createEl('g', {});
            svg.appendChild(panel);
            var panelBg = createEl('rect', { rx: '12', fill: 'rgba(0,0,0,0.75)', stroke: 'rgba(221,161,94,0.3)', 'stroke-width': '1' });
            panel.appendChild(panelBg);
            var panelTitle = createEl('text', { fill: '#DDA15E', 'font-family': 'Lora, serif', 'font-size': '14', 'text-anchor': 'middle' });
            panelTitle.textContent = 'SIR Epidemic Model';
            panel.appendChild(panelTitle);

            // Chart
            var chartBg = createEl('rect', { fill: 'rgba(10,14,26,0.9)', stroke: 'rgba(255,255,255,0.1)', 'stroke-width': '1', rx: '4' });
            panel.appendChild(chartBg);

            var lineS = createEl('polyline', { fill: 'none', stroke: '#10b981', 'stroke-width': '1.5' });
            var lineI = createEl('polyline', { fill: 'none', stroke: '#e11d48', 'stroke-width': '1.5' });
            var lineR = createEl('polyline', { fill: 'none', stroke: '#6b7280', 'stroke-width': '1.5' });
            panel.appendChild(lineS); panel.appendChild(lineI); panel.appendChild(lineR);

            // Legend
            var legendItems = [
                { color: '#10b981', label: 'Susceptible' },
                { color: '#e11d48', label: 'Infected' },
                { color: '#6b7280', label: 'Recovered' }
            ];
            var legendTexts = [];
            legendItems.forEach(function(li) {
                var c = createEl('circle', { r: '4', fill: li.color });
                panel.appendChild(c);
                var t = createEl('text', { fill: li.color, 'font-family': 'Nunito, sans-serif', 'font-size': '11' });
                t.textContent = li.label;
                panel.appendChild(t);
                legendTexts.push({ circle: c, text: t });
            });

            // R0 display
            var r0Text = createEl('text', { fill: '#fbbf24', 'font-family': 'Courier New, monospace', 'font-size': '16' });
            panel.appendChild(r0Text);

            // Day counter
            var dayText = createEl('text', { fill: 'rgba(255,255,255,0.6)', 'font-family': 'Nunito, sans-serif', 'font-size': '12' });
            panel.appendChild(dayText);

            // Sliders
            var sliderFO = createEl('foreignObject', { class: 'interactive' });
            panel.appendChild(sliderFO);
            var sliderDiv = document.createElement('div');
            sliderDiv.style.cssText = 'font-family:Nunito,sans-serif;font-size:12px;color:#e8e6e1;padding:5px;';
            sliderFO.appendChild(sliderDiv);

            var sliderDefs = [
                { label: '\u03B2 (transmit)', key: 'beta', min: 0.05, max: 1, step: 0.05, val: 0.3 },
                { label: '\u03B3 (recover)', key: 'gamma', min: 0.01, max: 0.2, step: 0.01, val: 0.05 },
                { label: 'Init Infected', key: 'init', min: 1, max: 50, step: 1, val: 5 }
            ];

            sliderDefs.forEach(function(sd) {
                var row = document.createElement('div');
                row.style.cssText = 'margin-bottom:5px;display:flex;align-items:center;gap:4px;';
                var lbl = document.createElement('span');
                lbl.style.cssText = 'width:80px;color:#DDA15E;font-size:10px;';
                lbl.textContent = sd.label;
                var inp = document.createElement('input');
                inp.type = 'range'; inp.min = sd.min; inp.max = sd.max; inp.step = sd.step; inp.value = sd.val;
                inp.style.cssText = 'flex:1;accent-color:#DDA15E;height:3px;';
                var val = document.createElement('span');
                val.style.cssText = 'width:30px;text-align:right;font-size:10px;';
                val.textContent = sd.val;
                inp.addEventListener('input', function() {
                    val.textContent = parseFloat(inp.value).toFixed(sd.key === 'init' ? 0 : 2);
                    if (sd.key === 'beta') beta = parseFloat(inp.value);
                    if (sd.key === 'gamma') gamma = parseFloat(inp.value);
                });
                row.appendChild(lbl); row.appendChild(inp); row.appendChild(val);
                sliderDiv.appendChild(row);
            });

            // Toggle buttons
            var toggleGroup = createEl('g', {});
            panel.appendChild(toggleGroup);

            function makeToggle(idx, label, active, fn) {
                var g = createEl('g', { style: 'cursor:pointer' });
                g.classList.add('interactive');
                var r = createEl('rect', { width: '115', height: '24', rx: '5', fill: active ? 'rgba(16,185,129,0.3)' : 'rgba(255,255,255,0.1)', stroke: 'rgba(221,161,94,0.4)', 'stroke-width': '1' });
                var t = createEl('text', { x: '57', y: '16', 'text-anchor': 'middle', fill: '#DDA15E', 'font-family': 'Nunito, sans-serif', 'font-size': '10' });
                t.textContent = label;
                g.appendChild(r); g.appendChild(t);
                toggleGroup.appendChild(g);
                g.addEventListener('click', function() { fn(r, t); });
                return g;
            }

            makeToggle(0, 'Vaccinate 30%', false, function(r, t) {
                var count = 0;
                for (var i = 0; i < agents.length; i++) {
                    if (agents[i].state === 0 && count < NUM_AGENTS * 0.3) {
                        agents[i].state = 2;
                        count++;
                    }
                }
            });

            makeToggle(1, 'Social Distance', false, function(r, t) {
                socialDistancing = !socialDistancing;
                moveScale = socialDistancing ? 0.3 : 1.0;
                t.textContent = socialDistancing ? 'Normal Movement' : 'Social Distance';
                r.setAttribute('fill', socialDistancing ? 'rgba(16,185,129,0.3)' : 'rgba(255,255,255,0.1)');
            });

            // Reset button
            var resetG = createEl('g', { style: 'cursor:pointer' });
            resetG.classList.add('interactive');
            var resetR = createEl('rect', { width: '80', height: '24', rx: '5', fill: 'rgba(225,29,72,0.3)', stroke: 'rgba(225,29,72,0.5)', 'stroke-width': '1' });
            var resetT = createEl('text', { x: '40', y: '16', 'text-anchor': 'middle', fill: '#e11d48', 'font-family': 'Nunito, sans-serif', 'font-size': '11' });
            resetT.textContent = 'Reset';
            resetG.appendChild(resetR); resetG.appendChild(resetT);
            panel.appendChild(resetG);
            resetG.addEventListener('click', function() {
                day = 0; history = { S: [], I: [], R: [] };
                initAgents(parseInt(sliderDefs[2].val) || 5);
            });

            var chartX, chartY2, chartW2, chartH2;

            function resize() {
                W = window.innerWidth; H = window.innerHeight;
                canvas.width = W; canvas.height = H;
                svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
                svg.setAttribute('width', W); svg.setAttribute('height', H);

                var px = W - panelW2 - 15, py = 50, ph = 480;
                panelBg.setAttribute('x', px); panelBg.setAttribute('y', py);
                panelBg.setAttribute('width', panelW2); panelBg.setAttribute('height', ph);
                panelTitle.setAttribute('x', px + panelW2/2); panelTitle.setAttribute('y', py + 22);

                chartX = px + 15; chartY2 = py + 35; chartW2 = panelW2 - 30; chartH2 = 120;
                chartBg.setAttribute('x', chartX); chartBg.setAttribute('y', chartY2);
                chartBg.setAttribute('width', chartW2); chartBg.setAttribute('height', chartH2);

                // Legend
                for (var i = 0; i < legendTexts.length; i++) {
                    legendTexts[i].circle.setAttribute('cx', chartX + 10 + i * 85);
                    legendTexts[i].circle.setAttribute('cy', chartY2 + chartH2 + 14);
                    legendTexts[i].text.setAttribute('x', chartX + 18 + i * 85);
                    legendTexts[i].text.setAttribute('y', chartY2 + chartH2 + 18);
                }

                r0Text.setAttribute('x', px + 15); r0Text.setAttribute('y', chartY2 + chartH2 + 40);
                dayText.setAttribute('x', px + panelW2 - 80); dayText.setAttribute('y', chartY2 + chartH2 + 40);

                sliderFO.setAttribute('x', px + 5); sliderFO.setAttribute('y', chartY2 + chartH2 + 50);
                sliderFO.setAttribute('width', panelW2 - 10); sliderFO.setAttribute('height', 100);

                // Toggle buttons
                var tg0 = toggleGroup.children[0];
                var tg1 = toggleGroup.children[1];
                if (tg0) tg0.setAttribute('transform', 'translate(' + (px + 10) + ',' + (py + ph - 65) + ')');
                if (tg1) tg1.setAttribute('transform', 'translate(' + (px + 130) + ',' + (py + ph - 65) + ')');

                resetG.setAttribute('transform', 'translate(' + (px + panelW2/2 - 40) + ',' + (py + ph - 32) + ')');

                if (agents.length === 0) initAgents(5);
            }
            var rt; window.addEventListener('resize', function() { clearTimeout(rt); rt = setTimeout(resize, 100); });
            resize();

            var stepCounter = 0;

            function animate() {
                fpsCounter.update();
                stepCounter++;

                var simW = W - panelW2 - 30;
                var sCount = 0, iCount = 0, rCount = 0;

                // Update agents
                for (var i = 0; i < agents.length; i++) {
                    var a = agents[i];
                    a.x += a.vx * moveScale;
                    a.y += a.vy * moveScale;

                    // Brownian direction changes
                    if (Math.random() < 0.05) {
                        a.vx += (Math.random() - 0.5) * 1;
                        a.vy += (Math.random() - 0.5) * 1;
                        var spd = Math.sqrt(a.vx * a.vx + a.vy * a.vy);
                        if (spd > 2) { a.vx = (a.vx / spd) * 2; a.vy = (a.vy / spd) * 2; }
                    }

                    if (a.x < 0) { a.x = 0; a.vx *= -1; }
                    if (a.x > simW) { a.x = simW; a.vx *= -1; }
                    if (a.y < 0) { a.y = 0; a.vy *= -1; }
                    if (a.y > H) { a.y = H; a.vy *= -1; }

                    // Recovery
                    if (a.state === 1) {
                        if (Math.random() < gamma) {
                            a.state = 2;
                        }
                    }

                    if (a.state === 0) sCount++;
                    else if (a.state === 1) iCount++;
                    else rCount++;
                }

                // Infection (use spatial grid for performance)
                var cellSize = infectionRadius;
                var gridCols = Math.ceil(simW / cellSize) + 1;
                var gridRows = Math.ceil(H / cellSize) + 1;
                var grid = new Array(gridCols * gridRows);
                for (var i = 0; i < grid.length; i++) grid[i] = [];
                for (var i = 0; i < agents.length; i++) {
                    var gc = Math.floor(agents[i].x / cellSize);
                    var gr = Math.floor(agents[i].y / cellSize);
                    if (gc >= 0 && gc < gridCols && gr >= 0 && gr < gridRows)
                        grid[gr * gridCols + gc].push(i);
                }

                for (var i = 0; i < agents.length; i++) {
                    var a = agents[i];
                    if (a.state !== 1) continue;
                    var gc = Math.floor(a.x / cellSize);
                    var gr = Math.floor(a.y / cellSize);
                    for (var dj = -1; dj <= 1; dj++) {
                        for (var di = -1; di <= 1; di++) {
                            var nc = gc + di, nr = gr + dj;
                            if (nc < 0 || nc >= gridCols || nr < 0 || nr >= gridRows) continue;
                            var cell = grid[nr * gridCols + nc];
                            for (var ci = 0; ci < cell.length; ci++) {
                                var j = cell[ci];
                                if (agents[j].state !== 0) continue;
                                var dx = agents[j].x - a.x, dy = agents[j].y - a.y;
                                if (dx*dx + dy*dy < infectionRadius * infectionRadius) {
                                    if (Math.random() < beta * 0.1) {
                                        agents[j].state = 1;
                                    }
                                }
                            }
                        }
                    }
                }

                // Draw
                ctx.fillStyle = '#0a0e1a';
                ctx.fillRect(0, 0, W, H);

                var stateColors = ['#10b981', '#e11d48', '#6b7280'];
                for (var i = 0; i < agents.length; i++) {
                    var a = agents[i];
                    ctx.fillStyle = stateColors[a.state];
                    ctx.fillRect(a.x - 1.5, a.y - 1.5, 3, 3);
                }

                // Update history every 10 frames
                if (stepCounter % 10 === 0) {
                    day++;
                    history.S.push(sCount);
                    history.I.push(iCount);
                    history.R.push(rCount);
                    if (history.S.length > maxHistoryLen) {
                        history.S.shift(); history.I.shift(); history.R.shift();
                    }

                    // Update chart
                    function makePts(arr) {
                        var pts = '';
                        for (var i = 0; i < arr.length; i++) {
                            var x = chartX + (i / (maxHistoryLen - 1)) * chartW2;
                            var y = chartY2 + chartH2 - (arr[i] / NUM_AGENTS) * chartH2;
                            pts += x.toFixed(1) + ',' + y.toFixed(1) + ' ';
                        }
                        return pts;
                    }
                    lineS.setAttribute('points', makePts(history.S));
                    lineI.setAttribute('points', makePts(history.I));
                    lineR.setAttribute('points', makePts(history.R));

                    var r0 = beta / gamma;
                    r0Text.textContent = 'R\u2080 = ' + r0.toFixed(2);
                    dayText.textContent = 'Day ' + day;
                }

                requestAnimationFrame(animate);
            }

            hideLoading();
            animate();
        } catch(e) { showError('Init Error: ' + e.message); }
    </script>
</body>
</html>
