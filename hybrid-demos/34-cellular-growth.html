<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cellular Growth Simulation + Size Distribution - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:#DDA15E;text-decoration:none;border-radius:6px;font-size:14px;z-index:999}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#DDA15E;padding:8px 12px;border-radius:6px;font-size:14px;z-index:999}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <script>
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';

        var W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        var MAX_CELLS = 600;
        var GROW_RATE = 0.04;
        var MIN_DIVIDE_R = 14;
        var MAX_R = 18;
        var cells = [];
        var nextId = 0;

        function hsl(h,s,l) { return 'hsl('+h+','+s+'%,'+l+'%)'; }

        function spawnCell(x, y, hue, gen) {
            cells.push({
                id: nextId++,
                x: x || Math.random()*W,
                y: y || Math.random()*H,
                r: 4 + Math.random()*4,
                hue: hue !== undefined ? hue : Math.random()*360,
                gen: gen || 0,
                growRate: GROW_RATE * (0.7 + Math.random()*0.6),
                divideR: MIN_DIVIDE_R + Math.random()*6
            });
        }

        // Seed initial cells
        for (var i = 0; i < 8; i++) spawnCell();

        function stepCells() {
            var newCells = [];
            var toRemove = new Set();

            for (var i = 0; i < cells.length; i++) {
                var c = cells[i];
                c.r += c.growRate;

                // Divide when large enough
                if (c.r >= c.divideR && cells.length + newCells.length < MAX_CELLS) {
                    toRemove.add(i);
                    var angle = Math.random() * Math.PI * 2;
                    var offset = c.r * 0.5;
                    var hueShift = (Math.random()-0.5)*30;
                    var newHue = (c.hue + hueShift + 360) % 360;
                    newCells.push({
                        id: nextId++, x: c.x + Math.cos(angle)*offset, y: c.y + Math.sin(angle)*offset,
                        r: c.r*0.5, hue: c.hue, gen: c.gen+1,
                        growRate: GROW_RATE*(0.7+Math.random()*0.6), divideR: MIN_DIVIDE_R+Math.random()*6
                    });
                    newCells.push({
                        id: nextId++, x: c.x - Math.cos(angle)*offset, y: c.y - Math.sin(angle)*offset,
                        r: c.r*0.5, hue: newHue, gen: c.gen+1,
                        growRate: GROW_RATE*(0.7+Math.random()*0.6), divideR: MIN_DIVIDE_R+Math.random()*6
                    });
                }

                // Keep within bounds (soft)
                if (c.x < c.r) c.x = c.r;
                if (c.x > W-c.r) c.x = W-c.r;
                if (c.y < c.r) c.y = c.r;
                if (c.y > H-c.r) c.y = H-c.r;
            }

            // Remove dividing cells and add daughters
            var remaining = [];
            for (var i = 0; i < cells.length; i++) {
                if (!toRemove.has(i)) remaining.push(cells[i]);
            }
            cells = remaining.concat(newCells);

            // Pressure: separate overlapping cells (simplified)
            for (var i = 0; i < cells.length && i < 200; i++) {
                for (var j = i+1; j < cells.length && j < 200; j++) {
                    var dx = cells[j].x - cells[i].x;
                    var dy = cells[j].y - cells[i].y;
                    var dist = Math.sqrt(dx*dx+dy*dy);
                    var minDist = cells[i].r + cells[j].r;
                    if (dist < minDist && dist > 0.01) {
                        var push = (minDist - dist) * 0.08;
                        var nx = dx/dist, ny = dy/dist;
                        cells[i].x -= nx*push;
                        cells[i].y -= ny*push;
                        cells[j].x += nx*push;
                        cells[j].y += ny*push;
                    }
                }
            }

            // Repopulate if too few
            if (cells.length < 5) spawnCell();
        }

        // SVG histogram
        var histW = 240, histH = 140;
        var histX, histY;
        var histPanel, histBars = [];
        var NUM_BINS = 20;
        var histGroup;
        var totalText, genText;

        function buildSVG() {
            histX = 20; histY = H - histH - 60;
            svg.innerHTML = '';

            histPanel = document.createElementNS(svgNS, 'rect');
            histPanel.setAttribute('x', histX); histPanel.setAttribute('y', histY-28);
            histPanel.setAttribute('width', histW); histPanel.setAttribute('height', histH+60);
            histPanel.setAttribute('rx', '8');
            histPanel.setAttribute('fill', 'rgba(10,14,26,0.85)');
            histPanel.setAttribute('stroke', '#DDA15E'); histPanel.setAttribute('stroke-width', '1.2');
            svg.appendChild(histPanel);

            var title = document.createElementNS(svgNS, 'text');
            title.setAttribute('x', histX+histW/2); title.setAttribute('y', histY-10);
            title.setAttribute('text-anchor', 'middle');
            title.setAttribute('fill', '#DDA15E'); title.setAttribute('font-size', '12');
            title.setAttribute('font-family', 'Nunito, sans-serif');
            title.textContent = 'Cell Size Distribution';
            svg.appendChild(title);

            var ax = document.createElementNS(svgNS, 'line');
            ax.setAttribute('x1', histX+8); ax.setAttribute('y1', histY+histH);
            ax.setAttribute('x2', histX+histW-8); ax.setAttribute('y2', histY+histH);
            ax.setAttribute('stroke', '#606C38'); ax.setAttribute('stroke-width', '1');
            svg.appendChild(ax);

            histGroup = document.createElementNS(svgNS, 'g');
            svg.appendChild(histGroup);
            histBars = [];

            var barW = (histW-18)/NUM_BINS;
            for (var b = 0; b < NUM_BINS; b++) {
                var bar = document.createElementNS(svgNS, 'rect');
                var hue = (b/NUM_BINS)*260+30;
                bar.setAttribute('fill', 'hsl('+hue+',70%,55%)');
                bar.setAttribute('opacity', '0.85');
                histGroup.appendChild(bar);
                histBars.push(bar);
            }

            totalText = document.createElementNS(svgNS, 'text');
            totalText.setAttribute('x', histX+8); totalText.setAttribute('y', histY+histH+18);
            totalText.setAttribute('fill', '#8A9A5B'); totalText.setAttribute('font-size', '11');
            totalText.setAttribute('font-family', 'Nunito, sans-serif');
            svg.appendChild(totalText);

            genText = document.createElementNS(svgNS, 'text');
            genText.setAttribute('x', histX+histW-8); genText.setAttribute('y', histY+histH+18);
            genText.setAttribute('text-anchor', 'end');
            genText.setAttribute('fill', '#BC6C25'); genText.setAttribute('font-size', '11');
            genText.setAttribute('font-family', 'Nunito, sans-serif');
            svg.appendChild(genText);

            var xl = document.createElementNS(svgNS, 'text');
            xl.setAttribute('x', histX+histW/2); xl.setAttribute('y', histY+histH+32);
            xl.setAttribute('text-anchor', 'middle');
            xl.setAttribute('fill', '#606C38'); xl.setAttribute('font-size', '10');
            xl.setAttribute('font-family', 'Nunito, sans-serif');
            xl.textContent = 'Cell Radius (px)'; svg.appendChild(xl);
        }
        buildSVG();
        window.addEventListener('resize', buildSVG);

        function updateHistogram() {
            var bins = new Array(NUM_BINS).fill(0);
            var maxGen = 0;
            for (var i = 0; i < cells.length; i++) {
                var bin = Math.floor(((cells[i].r - 2) / (MAX_R - 2)) * NUM_BINS);
                if (bin < 0) bin = 0;
                if (bin >= NUM_BINS) bin = NUM_BINS-1;
                bins[bin]++;
                if (cells[i].gen > maxGen) maxGen = cells[i].gen;
            }
            var maxCount = Math.max(1, Math.max.apply(null, bins));
            var availH = histH - 10;
            var barW = (histW-18)/NUM_BINS;
            for (var b = 0; b < NUM_BINS; b++) {
                var bh = (bins[b]/maxCount)*availH;
                histBars[b].setAttribute('x', histX+9+b*barW);
                histBars[b].setAttribute('y', histY+histH-bh);
                histBars[b].setAttribute('width', Math.max(1,barW-1));
                histBars[b].setAttribute('height', bh);
            }
            totalText.textContent = 'Cells: ' + cells.length;
            genText.textContent = 'Max gen: ' + maxGen;
        }

        function draw() {
            ctx.fillStyle = 'rgba(10,14,26,0.5)';
            ctx.fillRect(0,0,W,H);

            for (var i = 0; i < cells.length; i++) {
                var c = cells[i];
                var l = 40 + (c.r/MAX_R)*25;

                // Cell body
                var grd = ctx.createRadialGradient(c.x-c.r*0.3, c.y-c.r*0.3, 0, c.x, c.y, c.r);
                grd.addColorStop(0, 'hsl('+c.hue+',80%,'+(l+20)+'%)');
                grd.addColorStop(0.5, 'hsl('+c.hue+',70%,'+l+'%)');
                grd.addColorStop(1, 'hsl('+c.hue+',60%,'+(l-10)+'%)');
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
                ctx.fillStyle = grd;
                ctx.fill();

                // Cell membrane
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
                ctx.strokeStyle = 'hsl('+c.hue+',60%,'+(l+30)+'%)';
                ctx.lineWidth = 1.5;
                ctx.globalAlpha = 0.7;
                ctx.stroke();
                ctx.globalAlpha = 1;

                // Nucleus
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.r*0.25, 0, Math.PI*2);
                ctx.fillStyle = 'hsl('+c.hue+',40%,80%)';
                ctx.globalAlpha = 0.5;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        var fpsCount = 0, fpsLast = performance.now();
        var fpsEl = document.getElementById('fps-value');
        var frame = 0;

        function animate() {
            requestAnimationFrame(animate);
            stepCells();
            draw();
            if (frame % 6 === 0) updateHistogram();
            frame++;
            fpsCount++;
            var now = performance.now();
            if (now - fpsLast >= 1000) { fpsEl.textContent = fpsCount; fpsCount = 0; fpsLast = now; }
        }
        animate();
    </script>
</body>
</html>
