<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Simulation + Temperature Legend - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:var(--earth);text-decoration:none;border-radius:6px;font-size:14px;font-family:'Nunito',sans-serif;z-index:999;transition:all 0.3s ease}
        .back-link:hover{background:rgba(221,161,94,0.2);transform:translateX(-4px)}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:var(--earth);padding:8px 12px;border-radius:6px;font-family:'Courier New',monospace;font-size:14px;z-index:999}
        .fps-good{color:#10b981}.fps-medium{color:#fbbf24}.fps-poor{color:#e11d48}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
        .interactive{pointer-events:all;cursor:pointer}
        #loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:1000}
        .spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,0.1);border-top-color:var(--earth);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem}
        @keyframes spin{to{transform:rotate(360deg)}}
        #error{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(225,29,72,0.9);color:white;padding:2rem;border-radius:12px;text-align:center;max-width:400px;z-index:1001}
        #error h2{font-family:'Lora',serif;margin:0 0 1rem 0}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message"></p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="fireLegend" x1="0" y1="1" x2="0" y2="0">
                    <stop offset="0%" stop-color="#000000"/>
                    <stop offset="15%" stop-color="#1a0020"/>
                    <stop offset="30%" stop-color="#800000"/>
                    <stop offset="50%" stop-color="#cc3300"/>
                    <stop offset="70%" stop-color="#ff8800"/>
                    <stop offset="85%" stop-color="#ffdd00"/>
                    <stop offset="100%" stop-color="#ffffff"/>
                </linearGradient>
            </defs>
        </svg>
    </div>

    <script>
        window.addEventListener('error',function(e){showError('Runtime Error: '+e.message);});
        function showError(m){document.getElementById('loading').style.display='none';document.getElementById('error').style.display='block';document.getElementById('error-message').textContent=m;}
        function hideLoading(){document.getElementById('loading').style.display='none';}
        class FPSCounter{constructor(){this.fps=0;this.frames=0;this.lastTime=performance.now();this.el=document.getElementById('fps-value');}update(){this.frames++;var n=performance.now(),d=n-this.lastTime;if(d>=1000){this.fps=Math.round(this.frames*1000/d);this.frames=0;this.lastTime=n;this.el.textContent=this.fps;this.el.className=this.fps>=55?'fps-good':this.fps>=30?'fps-medium':'fps-poor';}}}

        try {
            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');
            var svg = document.getElementById('svg-overlay');
            var svgNS = 'http://www.w3.org/2000/svg';
            var fpsCounter = new FPSCounter();
            var W, H;

            // Fire palette (36 colors from black to white)
            var palette = [];
            function buildPalette() {
                palette = [];
                for (var i = 0; i < 256; i++) {
                    var r, g, b;
                    if (i < 32) { r = i * 2; g = 0; b = i; }
                    else if (i < 96) { r = Math.min(255, 64 + (i - 32) * 3); g = 0; b = Math.max(0, 32 - (i - 32)); }
                    else if (i < 160) { r = 255; g = Math.min(255, (i - 96) * 4); b = 0; }
                    else if (i < 224) { r = 255; g = 255; b = Math.min(255, (i - 160) * 4); }
                    else { r = 255; g = 255; b = 255; }
                    palette.push([r, g, b]);
                }
            }
            buildPalette();

            var fireW, fireH, fireData;
            var wind = 0;

            function initFire() {
                fireW = Math.ceil(W / 2);
                fireH = Math.ceil(H / 2);
                fireData = new Uint8Array(fireW * fireH);
            }

            function createEl(tag, attrs) {
                var el = document.createElementNS(svgNS, tag);
                for (var k in attrs) el.setAttribute(k, attrs[k]);
                return el;
            }

            // SVG legend panel
            var legendGroup = createEl('g', {});
            svg.appendChild(legendGroup);

            var legendBg = createEl('rect', { rx: '12', fill: 'rgba(0,0,0,0.75)', stroke: 'rgba(221,161,94,0.3)', 'stroke-width': '1' });
            legendGroup.appendChild(legendBg);

            var legendTitle = createEl('text', { fill: '#DDA15E', 'font-family': 'Lora, serif', 'font-size': '14', 'text-anchor': 'middle' });
            legendTitle.textContent = 'Temperature';
            legendGroup.appendChild(legendTitle);

            var gradBar = createEl('rect', { fill: 'url(#fireLegend)', stroke: 'rgba(255,255,255,0.2)', 'stroke-width': '1', rx: '4' });
            legendGroup.appendChild(gradBar);

            // Temperature annotations
            var annotations = [
                { pct: 0, text: '0\u00B0C' },
                { pct: 0.21, text: '~300\u00B0C Ignition' },
                { pct: 0.5, text: '~700\u00B0C Red heat' },
                { pct: 0.75, text: '~1000\u00B0C Orange' },
                { pct: 1.0, text: '~1400\u00B0C White heat' }
            ];
            var annotTexts = [];
            var annotLines = [];
            annotations.forEach(function(a) {
                var t = createEl('text', { fill: 'rgba(255,255,255,0.7)', 'font-family': 'Nunito, sans-serif', 'font-size': '10' });
                t.textContent = a.text;
                legendGroup.appendChild(t);
                annotTexts.push(t);
                var l = createEl('line', { stroke: 'rgba(255,255,255,0.3)', 'stroke-width': '1' });
                legendGroup.appendChild(l);
                annotLines.push(l);
            });

            // Wind slider
            var sliderFO = createEl('foreignObject', { class: 'interactive' });
            legendGroup.appendChild(sliderFO);
            var sliderDiv = document.createElement('div');
            sliderDiv.style.cssText = 'font-family:Nunito,sans-serif;font-size:12px;color:#e8e6e1;padding:5px;';
            sliderFO.appendChild(sliderDiv);

            var windRow = document.createElement('div');
            windRow.style.cssText = 'display:flex;align-items:center;gap:5px;';
            var windLbl = document.createElement('span');
            windLbl.style.cssText = 'color:#DDA15E;font-size:11px;width:40px;';
            windLbl.textContent = 'Wind';
            var windInp = document.createElement('input');
            windInp.type = 'range'; windInp.min = -3; windInp.max = 3; windInp.step = 0.5; windInp.value = 0;
            windInp.style.cssText = 'flex:1;accent-color:#DDA15E;height:3px;';
            var windVal = document.createElement('span');
            windVal.style.cssText = 'width:25px;text-align:right;font-size:10px;';
            windVal.textContent = '0';
            windInp.addEventListener('input', function() {
                wind = parseFloat(windInp.value);
                windVal.textContent = wind.toFixed(1);
            });
            windRow.appendChild(windLbl); windRow.appendChild(windInp); windRow.appendChild(windVal);
            sliderDiv.appendChild(windRow);

            var legendX, legendY, legendW2 = 160, legendH2 = 350;
            var barX, barY, barW2 = 25, barH2 = 200;

            function resize() {
                W = window.innerWidth; H = window.innerHeight;
                canvas.width = W; canvas.height = H;
                svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
                svg.setAttribute('width', W); svg.setAttribute('height', H);

                initFire();

                legendX = W - legendW2 - 20;
                legendY = 50;
                legendBg.setAttribute('x', legendX); legendBg.setAttribute('y', legendY);
                legendBg.setAttribute('width', legendW2); legendBg.setAttribute('height', legendH2);

                legendTitle.setAttribute('x', legendX + legendW2 / 2); legendTitle.setAttribute('y', legendY + 25);

                barX = legendX + 15; barY = legendY + 40; barH2 = 200;
                gradBar.setAttribute('x', barX); gradBar.setAttribute('y', barY);
                gradBar.setAttribute('width', barW2); gradBar.setAttribute('height', barH2);

                for (var i = 0; i < annotations.length; i++) {
                    var y = barY + barH2 * (1 - annotations[i].pct);
                    annotTexts[i].setAttribute('x', barX + barW2 + 8);
                    annotTexts[i].setAttribute('y', y + 4);
                    annotLines[i].setAttribute('x1', barX + barW2);
                    annotLines[i].setAttribute('y1', y);
                    annotLines[i].setAttribute('x2', barX + barW2 + 5);
                    annotLines[i].setAttribute('y2', y);
                }

                sliderFO.setAttribute('x', legendX + 5);
                sliderFO.setAttribute('y', legendY + barH2 + 60);
                sliderFO.setAttribute('width', legendW2 - 10);
                sliderFO.setAttribute('height', 40);
            }
            var rt; window.addEventListener('resize', function() { clearTimeout(rt); rt = setTimeout(resize, 100); });
            resize();

            function animate() {
                fpsCounter.update();

                // Set bottom row hot
                for (var x = 0; x < fireW; x++) {
                    fireData[(fireH - 1) * fireW + x] = 200 + Math.floor(Math.random() * 56);
                }

                // Propagate fire upward
                for (var y = 0; y < fireH - 1; y++) {
                    for (var x = 0; x < fireW; x++) {
                        var windOffset = Math.round(wind);
                        var src1 = ((y + 1) * fireW) + Math.max(0, Math.min(fireW - 1, x - 1 + windOffset));
                        var src2 = ((y + 1) * fireW) + Math.max(0, Math.min(fireW - 1, x + windOffset));
                        var src3 = ((y + 1) * fireW) + Math.max(0, Math.min(fireW - 1, x + 1 + windOffset));
                        var val = (fireData[src1] + fireData[src2] + fireData[src3]) / 3 - Math.random() * 3;
                        fireData[y * fireW + x] = Math.max(0, Math.min(255, Math.floor(val)));
                    }
                }

                // Render to canvas with ImageData
                var imgData = ctx.createImageData(W, H);
                var data = imgData.data;
                var scaleX = fireW / W;
                var scaleY = fireH / H;

                for (var py = 0; py < H; py++) {
                    var fy = Math.floor(py * scaleY);
                    for (var px = 0; px < W; px++) {
                        var fx = Math.floor(px * scaleX);
                        var val = fireData[fy * fireW + fx];
                        var c = palette[val];
                        var idx = (py * W + px) * 4;
                        data[idx] = c[0];
                        data[idx + 1] = c[1];
                        data[idx + 2] = c[2];
                        data[idx + 3] = 255;
                    }
                }

                ctx.putImageData(imgData, 0, 0);
                requestAnimationFrame(animate);
            }

            hideLoading();
            animate();
        } catch(e) { showError('Init Error: ' + e.message); }
    </script>
</body>
</html>
