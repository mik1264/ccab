<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Interference - Hybrid Canvas+SVG</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; font-family:'Nunito',sans-serif; background:#0a0e1a; color:#e8e6e1; }
        .back-link { position:fixed; top:10px; left:10px; padding:8px 16px; background:rgba(0,0,0,0.7); color:var(--earth); text-decoration:none; border-radius:6px; font-size:14px; font-family:'Nunito',sans-serif; z-index:999; transition:all 0.3s ease; }
        .back-link:hover { background:rgba(221,161,94,0.2); transform:translateX(-4px); }
        #fps-counter { position:fixed; top:10px; right:10px; background:rgba(0,0,0,0.7); color:var(--earth); padding:8px 12px; border-radius:6px; font-family:'Courier New',monospace; font-size:14px; z-index:999; }
        .fps-good{color:#10b981} .fps-medium{color:#fbbf24} .fps-poor{color:#e11d48}
        #hybrid-container { position:relative; width:100vw; height:100vh; }
        #canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
        #svg-overlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }
        .interactive { pointer-events:all; cursor:pointer; }
        .svg-label { font-family:'Nunito',sans-serif; font-size:12px; fill:rgba(255,255,255,0.8); pointer-events:none; }
        .svg-title { font-family:'Lora',serif; font-size:16px; fill:var(--earth); pointer-events:none; }
        #loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:1000; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--earth); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #error { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(225,29,72,0.9); color:white; padding:2rem; border-radius:12px; text-align:center; max-width:400px; z-index:1001; }
        #error h2 { font-family:'Lora',serif; margin:0 0 1rem 0; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message"></p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"><defs></defs></svg>
    </div>
    <script>
    window.addEventListener('error', (e) => { showError('Runtime Error: ' + e.message); });
    function showError(m) { document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='block'; document.getElementById('error-message').textContent=m; }
    function hideLoading() { document.getElementById('loading').style.display='none'; }

    class FPSCounter {
        constructor(){this.fps=0;this.frames=0;this.lastTime=performance.now();this.el=document.getElementById('fps-value');}
        update(){this.frames++;const n=performance.now(),d=n-this.lastTime;if(d>=1000){this.fps=Math.round(this.frames*1000/d);this.frames=0;this.lastTime=n;this.el.textContent=this.fps;this.el.className=this.fps>=55?'fps-good':this.fps>=30?'fps-medium':'fps-poor';}}
    }

    try {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const svg = document.getElementById('svg-overlay');
        const ns = 'http://www.w3.org/2000/svg';
        const fpsCounter = new FPSCounter();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        let W, H;

        let sources = [];
        let wavelength = 40;
        let frequency = 0.05;
        let showIntensity = false;
        let t = 0;
        const MAX_SOURCES = 8;
        const STEP = 4; // render every 4th pixel for performance

        function addSource(x, y) {
            if (sources.length < MAX_SOURCES) {
                sources.push({ x, y });
            }
        }

        function removeNearest(x, y) {
            if (sources.length === 0) return;
            let minD = Infinity, minI = 0;
            for (let i = 0; i < sources.length; i++) {
                const dx = x - sources[i].x, dy = y - sources[i].y;
                const d = dx * dx + dy * dy;
                if (d < minD) { minD = d; minI = i; }
            }
            sources.splice(minI, 1);
        }

        function drawWaves() {
            ctx.clearRect(0, 0, W, H);
            const imgData = ctx.createImageData(W, H);
            const data = imgData.data;
            const k = 2 * Math.PI / wavelength;
            const omega = frequency * 2 * Math.PI;

            for (let py = 0; py < H; py += STEP) {
                for (let px = 0; px < W; px += STEP) {
                    let disp = 0;
                    for (const s of sources) {
                        const dx = px - s.x, dy = py - s.y;
                        const r = Math.sqrt(dx * dx + dy * dy);
                        disp += Math.sin(k * r - omega * t) / Math.max(Math.sqrt(r) * 0.1, 1);
                    }

                    let r, g, b;
                    if (showIntensity) {
                        const intensity = disp * disp;
                        const v = Math.min(intensity * 20, 255);
                        r = v * 0.3; g = v * 0.7; b = v;
                    } else {
                        // Blue-white-red color map
                        const norm = Math.max(-1, Math.min(1, disp * 0.3));
                        if (norm > 0) {
                            r = 200 + norm * 55; g = 200 * (1 - norm); b = 200 * (1 - norm);
                        } else {
                            const a = -norm;
                            r = 200 * (1 - a); g = 200 * (1 - a); b = 200 + a * 55;
                        }
                    }

                    for (let dy = 0; dy < STEP && py + dy < H; dy++) {
                        for (let dx = 0; dx < STEP && px + dx < W; dx++) {
                            const idx = ((py + dy) * W + (px + dx)) * 4;
                            data[idx] = r; data[idx + 1] = g; data[idx + 2] = b; data[idx + 3] = 255;
                        }
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);

            // Draw source markers
            for (const s of sources) {
                ctx.beginPath();
                ctx.arc(s.x, s.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#DDA15E';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function createUI() {
            svg.innerHTML = '';
            const d = document.createElementNS(ns, 'defs'); svg.appendChild(d);

            const title = document.createElementNS(ns, 'text');
            title.setAttribute('class', 'svg-title');
            title.setAttribute('x', W / 2); title.setAttribute('y', 28);
            title.setAttribute('text-anchor', 'middle');
            title.textContent = 'Wave Interference Pattern';
            svg.appendChild(title);

            // Source count
            const srcText = document.createElementNS(ns, 'text');
            srcText.setAttribute('id', 'src-count');
            srcText.setAttribute('class', 'svg-label');
            srcText.setAttribute('x', W / 2); srcText.setAttribute('y', 48);
            srcText.setAttribute('text-anchor', 'middle');
            srcText.setAttribute('fill', 'rgba(255,255,255,0.5)');
            svg.appendChild(srcText);

            // Controls
            const fo = document.createElementNS(ns, 'foreignObject');
            fo.setAttribute('x', 10); fo.setAttribute('y', H - 130);
            fo.setAttribute('width', 260); fo.setAttribute('height', 120);
            fo.setAttribute('class', 'interactive');
            fo.innerHTML = `
                <div xmlns="http://www.w3.org/1999/xhtml" style="background:rgba(0,0,0,0.75);padding:10px 14px;border-radius:10px;font-family:Nunito,sans-serif;font-size:12px;color:#e8e6e1;">
                    <div style="margin-bottom:6px;"><label style="color:#DDA15E;">Wavelength: <span id="wl-val">${wavelength}</span></label>
                    <input type="range" id="wl-slider" min="10" max="100" value="${wavelength}" style="width:100%;"></div>
                    <div style="margin-bottom:6px;"><label style="color:#DDA15E;">Frequency: <span id="freq-val">${frequency.toFixed(2)}</span></label>
                    <input type="range" id="freq-slider" min="0.01" max="0.15" step="0.005" value="${frequency}" style="width:100%;"></div>
                    <div style="display:flex;gap:8px;">
                        <button id="mode-btn" style="padding:4px 10px;border:1px solid #DDA15E;background:rgba(0,0,0,0.5);color:#DDA15E;border-radius:4px;cursor:pointer;font-size:11px;">Displacement</button>
                        <button id="clear-btn" style="padding:4px 10px;border:1px solid #666;background:rgba(0,0,0,0.5);color:#aaa;border-radius:4px;cursor:pointer;font-size:11px;">Clear Sources</button>
                    </div>
                    <p style="font-size:10px;color:#888;margin-top:4px;">Click = add source | Right-click = remove</p>
                </div>
            `;
            svg.appendChild(fo);
        }

        function bindUI() {
            document.getElementById('wl-slider').addEventListener('input', function() {
                wavelength = parseInt(this.value);
                document.getElementById('wl-val').textContent = wavelength;
            });
            document.getElementById('freq-slider').addEventListener('input', function() {
                frequency = parseFloat(this.value);
                document.getElementById('freq-val').textContent = frequency.toFixed(2);
            });
            document.getElementById('mode-btn').addEventListener('click', function() {
                showIntensity = !showIntensity;
                this.textContent = showIntensity ? 'Intensity' : 'Displacement';
            });
            document.getElementById('clear-btn').addEventListener('click', function() {
                sources = [];
            });
        }

        canvas.addEventListener('click', function(e) {
            addSource(e.clientX, e.clientY);
        });
        canvas.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            removeNearest(e.clientX, e.clientY);
        });

        function resize() {
            const rect = canvas.getBoundingClientRect();
            W = rect.width; H = rect.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svg.setAttribute('width', W); svg.setAttribute('height', H);
            createUI(); bindUI();
            if (sources.length === 0) {
                addSource(W / 3, H / 2);
                addSource(2 * W / 3, H / 2);
            }
        }

        let resizeTimeout;
        window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 150); });
        resize();

        function animate() {
            fpsCounter.update();
            t++;
            drawWaves();
            const srcEl = document.getElementById('src-count');
            if (srcEl) srcEl.textContent = `Sources: ${sources.length} / ${MAX_SOURCES}`;
            requestAnimationFrame(animate);
        }
        hideLoading();
        animate();
    } catch (err) { showError('Init Error: ' + err.message); }
    </script>
</body>
</html>
