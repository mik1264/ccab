<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Body Solar System + Period Chart - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:var(--earth);text-decoration:none;border-radius:6px;font-size:14px;z-index:999;transition:all 0.3s ease}
        .back-link:hover{background:rgba(221,161,94,0.2);transform:translateX(-4px)}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:var(--earth);padding:8px 12px;border-radius:6px;font-family:'Courier New',monospace;font-size:14px;z-index:999}
        #speed-ctrl{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);border:1px solid rgba(221,161,94,0.3);border-radius:10px;padding:10px 20px;z-index:999;display:flex;gap:16px;align-items:center;font-size:13px;color:var(--earth)}
        #speed-ctrl input[type=range]{width:140px;accent-color:var(--earth)}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="speed-ctrl">
        <span>Simulation Speed:</span>
        <input type="range" id="speed" min="0.2" max="5" step="0.1" value="1">
        <span id="speed-val">1.0x</span>
    </div>
    <script>
    (function(){
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';
        var W, H;

        function resize(){
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            svg.setAttribute('width', W);
            svg.setAttribute('height', H);
        }
        resize();
        window.addEventListener('resize', resize);

        var simSpeed = 1;
        document.getElementById('speed').addEventListener('input',function(){
            simSpeed = parseFloat(this.value);
            document.getElementById('speed-val').textContent = simSpeed.toFixed(1)+'x';
        });

        // Planet data: [name, color, orbitRadiusPx, size, periodEarth, mass_rel]
        var AU = Math.min(W,H)*0.45;
        var planets = [
            {name:'Mercury', color:'#b5b5b5', a:0.387, r:4,  period:0.241, mass:0.0553, angle:Math.random()*Math.PI*2, vr:0},
            {name:'Venus',   color:'#e8c07a', a:0.723, r:6,  period:0.615, mass:0.815,  angle:Math.random()*Math.PI*2, vr:0},
            {name:'Earth',   color:'#4fa3e0', a:1.000, r:7,  period:1.000, mass:1.0,    angle:Math.random()*Math.PI*2, vr:0},
            {name:'Mars',    color:'#c1440e', a:1.524, r:5,  period:1.881, mass:0.107,  angle:Math.random()*Math.PI*2, vr:0},
            {name:'Jupiter', color:'#c88b3a', a:2.7,   r:18, period:11.86, mass:317.8,  angle:Math.random()*Math.PI*2, vr:0},
            {name:'Saturn',  color:'#d4b483', a:3.4,   r:14, period:29.46, mass:95.16,  angle:Math.random()*Math.PI*2, vr:0},
            {name:'Uranus',  color:'#7de8e8', a:4.1,   r:11, period:84.01, mass:14.54,  angle:Math.random()*Math.PI*2, vr:0},
            {name:'Neptune', color:'#3f54ba', a:4.7,   r:10, period:164.8, mass:17.15,  angle:Math.random()*Math.PI*2, vr:0}
        ];

        // Scale orbits to fit screen
        var maxA = 4.7;
        var orbitScale = (Math.min(W,H)*0.44) / maxA;

        // Planet positions in cartesian
        planets.forEach(function(p){
            p.x = Math.cos(p.angle) * p.a * orbitScale;
            p.y = Math.sin(p.angle) * p.a * orbitScale;
            p.vx = -Math.sin(p.angle) * (2*Math.PI / p.period) * p.a * orbitScale * 0.016;
            p.vy =  Math.cos(p.angle) * (2*Math.PI / p.period) * p.a * orbitScale * 0.016;
        });

        // Star field
        var stars = [];
        for(var i=0;i<350;i++){
            stars.push({x:Math.random(), y:Math.random(), r:Math.random()*1.5, a:0.3+Math.random()*0.7});
        }

        // Trails
        var TRAIL_LEN = 80;
        planets.forEach(function(p){ p.trail = []; });

        // SVG chart elements (right panel)
        function svgEl(tag,attrs){
            var el = document.createElementNS(svgNS, tag);
            for(var k in attrs) el.setAttribute(k,attrs[k]);
            return el;
        }

        var chartG = svgEl('g',{});
        svg.appendChild(chartG);
        var CHART_W = 160, CHART_H = 240, CHART_X = 0, CHART_Y = 0; // positioned in render

        var chartBg = svgEl('rect',{rx:10,ry:10,fill:'rgba(0,0,0,0.72)',stroke:'rgba(221,161,94,0.35)','stroke-width':1});
        chartG.appendChild(chartBg);
        var chartTitle = svgEl('text',{fill:'#DDA15E','font-family':'Lora,serif','font-size':13,'font-weight':600});
        chartTitle.textContent = 'Orbital Periods';
        chartG.appendChild(chartTitle);

        var barEls = [], barBgEls = [], periodLabels = [], nameLabels = [];
        var maxPeriod = 165;
        planets.forEach(function(p,i){
            var bg = svgEl('rect',{fill:'rgba(255,255,255,0.05)',rx:2});
            chartG.appendChild(bg);
            barBgEls.push(bg);

            var bar = svgEl('rect',{fill:p.color,rx:2,opacity:0.85});
            chartG.appendChild(bar);
            barEls.push(bar);

            var nl = svgEl('text',{fill:'#e8e6e1','font-family':'Nunito,sans-serif','font-size':10.5});
            nl.textContent = p.name;
            chartG.appendChild(nl);
            nameLabels.push(nl);

            var pl = svgEl('text',{fill:'#aaa','font-family':'Courier New,monospace','font-size':9.5});
            chartG.appendChild(pl);
            periodLabels.push(pl);
        });

        // Scale bar (bottom left)
        var scaleG = svgEl('g',{});
        svg.appendChild(scaleG);
        var scaleBar = svgEl('line',{stroke:'rgba(221,161,94,0.6)','stroke-width':2});
        var scaleLbl = svgEl('text',{fill:'#DDA15E','font-family':'Nunito,sans-serif','font-size':11,'text-anchor':'middle'});
        scaleLbl.textContent = '1 AU';
        scaleG.appendChild(scaleBar);
        scaleG.appendChild(scaleLbl);

        // Label lines from planet to name (SVG)
        var labelLines = [], labelTexts = [];
        planets.forEach(function(p){
            var line = svgEl('line',{stroke:p.color,'stroke-width':0.8,'stroke-dasharray':'3,2',opacity:0.6});
            svg.appendChild(line);
            labelLines.push(line);
            var lt = svgEl('text',{'text-anchor':'middle',fill:p.color,'font-family':'Nunito,sans-serif','font-size':10,opacity:0.9});
            lt.textContent = p.name;
            svg.appendChild(lt);
            labelTexts.push(lt);
        });

        // Physics update
        var G = 0.0002;
        var sunMass = 333000;

        function updatePhysics(dt){
            var cx = W/2, cy = H/2;
            planets.forEach(function(p){
                // Gravity from sun
                var dx = -p.x, dy = -p.y;
                var dist2 = dx*dx + dy*dy;
                var dist = Math.sqrt(dist2);
                var force = G * sunMass / dist2;
                p.vx += force * (dx/dist) * dt;
                p.vy += force * (dy/dist) * dt;

                // Weak mutual gravity between planets (simplified)
                planets.forEach(function(q,qi){
                    if(q===p) return;
                    var qx = q.x - p.x, qy = q.y - p.y;
                    var qd2 = qx*qx + qy*qy;
                    var qd = Math.sqrt(qd2);
                    var qf = G * q.mass * 0.3 / qd2;
                    p.vx += qf * (qx/qd) * dt;
                    p.vy += qf * (qy/qd) * dt;
                });

                p.x += p.vx * dt;
                p.y += p.vy * dt;

                p.trail.push({x:cx+p.x, y:cy+p.y});
                if(p.trail.length > TRAIL_LEN) p.trail.shift();
            });
        }

        var fps=0,fpsFrames=0,fpsLast=performance.now();
        var fpsEl=document.getElementById('fps-value');
        var frame=0;
        var t = 0;

        function animate(){
            requestAnimationFrame(animate);
            frame++;
            fpsFrames++;
            var now=performance.now();
            if(now-fpsLast>500){
                fps=Math.round(fpsFrames*1000/(now-fpsLast));
                fpsEl.textContent=fps;
                fpsFrames=0; fpsLast=now;
            }

            var dt = simSpeed * 0.3;
            t += dt;
            updatePhysics(dt);

            var cx=W/2, cy=H/2;
            ctx.clearRect(0,0,W,H);

            // Stars
            stars.forEach(function(s){
                ctx.beginPath();
                ctx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255,255,255,'+s.a+')';
                ctx.fill();
            });

            // Orbit rings
            planets.forEach(function(p){
                ctx.beginPath();
                ctx.arc(cx, cy, p.a*orbitScale, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(255,255,255,0.07)';
                ctx.lineWidth = 1;
                ctx.stroke();
            });

            // Sun glow
            var sg = ctx.createRadialGradient(cx,cy,0,cx,cy,30);
            sg.addColorStop(0,'rgba(255,220,80,1)');
            sg.addColorStop(0.4,'rgba(255,160,30,0.8)');
            sg.addColorStop(1,'rgba(255,100,0,0)');
            ctx.beginPath();
            ctx.arc(cx,cy,30,0,Math.PI*2);
            ctx.fillStyle=sg;
            ctx.fill();

            // Planet trails
            planets.forEach(function(p){
                if(p.trail.length<2) return;
                ctx.beginPath();
                ctx.moveTo(p.trail[0].x, p.trail[0].y);
                for(var i=1;i<p.trail.length;i++){
                    ctx.lineTo(p.trail[i].x, p.trail[i].y);
                }
                ctx.strokeStyle = p.color;
                ctx.globalAlpha = 0.3;
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.globalAlpha = 1;
            });

            // Planets
            planets.forEach(function(p){
                var px=cx+p.x, py=cy+p.y;
                // Glow
                var pg = ctx.createRadialGradient(px,py,0,px,py,p.r*3);
                pg.addColorStop(0, p.color);
                pg.addColorStop(0.5, p.color+'80');
                pg.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.beginPath();
                ctx.arc(px,py,p.r*3,0,Math.PI*2);
                ctx.fillStyle = pg;
                ctx.fill();
                // Core
                ctx.beginPath();
                ctx.arc(px,py,p.r,0,Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.fill();
                // Saturn ring
                if(p.name==='Saturn'){
                    ctx.beginPath();
                    ctx.ellipse(px,py,p.r*2.4,p.r*0.7,0.3,0,Math.PI*2);
                    ctx.strokeStyle='rgba(212,180,131,0.5)';
                    ctx.lineWidth=3;
                    ctx.stroke();
                }
            });

            // SVG chart update (right panel)
            var PANEL_X = W - CHART_W - 16;
            var PANEL_Y = 70;
            chartBg.setAttribute('x', PANEL_X);
            chartBg.setAttribute('y', PANEL_Y);
            chartBg.setAttribute('width', CHART_W);
            chartBg.setAttribute('height', CHART_H + 30);
            chartTitle.setAttribute('x', PANEL_X + CHART_W/2);
            chartTitle.setAttribute('y', PANEL_Y + 22);
            chartTitle.setAttribute('text-anchor','middle');

            var ROW_H = 26, maxBarW = CHART_W - 70;
            planets.forEach(function(p,i){
                var ry = PANEL_Y + 38 + i*ROW_H;
                // background bar
                barBgEls[i].setAttribute('x', PANEL_X + 52);
                barBgEls[i].setAttribute('y', ry+2);
                barBgEls[i].setAttribute('width', maxBarW);
                barBgEls[i].setAttribute('height', ROW_H-6);

                // active bar with log scale
                var logVal = Math.log(p.period+1)/Math.log(maxPeriod+1);
                var bw = logVal * maxBarW;
                barEls[i].setAttribute('x', PANEL_X + 52);
                barEls[i].setAttribute('y', ry+2);
                barEls[i].setAttribute('width', bw);
                barEls[i].setAttribute('height', ROW_H-6);

                // Pulse highlight if planet is near x-axis (right side)
                var px2=cx+p.x, py2=cy+p.y;
                var isRight = p.x > 0 && Math.abs(p.y) < p.a*orbitScale*0.3;
                barEls[i].setAttribute('opacity', isRight ? '1' : '0.7');

                nameLabels[i].setAttribute('x', PANEL_X+4);
                nameLabels[i].setAttribute('y', ry+14);

                var pStr = p.period < 2 ? p.period.toFixed(2)+'y' : Math.round(p.period)+'y';
                periodLabels[i].setAttribute('x', PANEL_X + 52 + bw + 4);
                periodLabels[i].setAttribute('y', ry+13);
                periodLabels[i].textContent = pStr;
            });

            // Label lines planet->name
            planets.forEach(function(p,i){
                var px=cx+p.x, py=cy+p.y;
                // Offset labels so they don't stack
                var angle2 = Math.atan2(p.y, p.x);
                var lx2 = cx + p.x + Math.cos(angle2)*30;
                var ly2 = cy + p.y + Math.sin(angle2)*20;
                labelLines[i].setAttribute('x1',px);
                labelLines[i].setAttribute('y1',py);
                labelLines[i].setAttribute('x2',lx2);
                labelLines[i].setAttribute('y2',ly2);
                labelTexts[i].setAttribute('x',lx2);
                labelTexts[i].setAttribute('y',ly2-6);
                // hide if near panel
                var nearPanel = lx2 > W-CHART_W-60;
                labelLines[i].setAttribute('display', nearPanel?'none':'');
                labelTexts[i].setAttribute('display', nearPanel?'none':'');
            });

            // Scale bar
            var sbY = H - 40, sbX = 80;
            scaleBar.setAttribute('x1',sbX-orbitScale/2);
            scaleBar.setAttribute('y1',sbY);
            scaleBar.setAttribute('x2',sbX+orbitScale/2);
            scaleBar.setAttribute('y2',sbY);
            scaleLbl.setAttribute('x',sbX);
            scaleLbl.setAttribute('y',sbY-6);
        }
        animate();
    })();
    </script>
</body>
</html>
