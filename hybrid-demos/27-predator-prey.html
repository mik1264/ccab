<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predator-Prey + Lotka-Volterra - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:#DDA15E;text-decoration:none;border-radius:6px;font-size:14px;z-index:999}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#DDA15E;padding:8px 12px;border-radius:6px;font-size:14px;z-index:999}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <script>
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';

        var W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        var CELL = 8;
        var COLS, ROWS;
        var RABBIT_INIT = 200, FOX_INIT = 40;
        var RABBIT_REPRODUCE = 0.04;
        var FOX_STARVE = 0.008;
        var FOX_HUNT = 0.3;
        var FOOD_GROW = 0.03;

        var rabbits = [], foxes = [];

        function initPop() {
            COLS = Math.floor(W / CELL);
            ROWS = Math.floor(H / CELL);
            rabbits = [];
            foxes = [];
            for (var i = 0; i < RABBIT_INIT; i++) {
                rabbits.push({ x: Math.random()*W, y: Math.random()*H, energy: 1 });
            }
            for (var i = 0; i < FOX_INIT; i++) {
                foxes.push({ x: Math.random()*W, y: Math.random()*H, energy: 1.5 });
            }
        }
        initPop();

        var popHistory = [];
        var MAX_HIST = 300;

        // SVG chart
        var chartW = 320, chartH = 140;
        var chartX, chartY;
        var chartGroup, rabbitPath, foxPath, chartPanel, chartTitle, rCount, fCount;

        function buildChart() {
            chartX = W - chartW - 20;
            chartY = H - chartH - 50;
            svg.innerHTML = '';

            chartPanel = document.createElementNS(svgNS, 'rect');
            chartPanel.setAttribute('x', chartX); chartPanel.setAttribute('y', chartY - 28);
            chartPanel.setAttribute('width', chartW); chartPanel.setAttribute('height', chartH + 60);
            chartPanel.setAttribute('rx', '8');
            chartPanel.setAttribute('fill', 'rgba(10,14,26,0.85)');
            chartPanel.setAttribute('stroke', '#DDA15E'); chartPanel.setAttribute('stroke-width', '1.2');
            svg.appendChild(chartPanel);

            chartTitle = document.createElementNS(svgNS, 'text');
            chartTitle.setAttribute('x', chartX + chartW/2); chartTitle.setAttribute('y', chartY - 10);
            chartTitle.setAttribute('text-anchor', 'middle');
            chartTitle.setAttribute('fill', '#DDA15E'); chartTitle.setAttribute('font-size', '12');
            chartTitle.setAttribute('font-family', 'Nunito, sans-serif');
            chartTitle.textContent = 'Lotka-Volterra Population Cycles';
            svg.appendChild(chartTitle);

            // Axes
            var ax = document.createElementNS(svgNS, 'line');
            ax.setAttribute('x1', chartX+8); ax.setAttribute('y1', chartY+chartH-5);
            ax.setAttribute('x2', chartX+chartW-8); ax.setAttribute('y2', chartY+chartH-5);
            ax.setAttribute('stroke', '#606C38'); ax.setAttribute('stroke-width', '1');
            svg.appendChild(ax);

            chartGroup = document.createElementNS(svgNS, 'g');
            svg.appendChild(chartGroup);

            rabbitPath = document.createElementNS(svgNS, 'polyline');
            rabbitPath.setAttribute('fill', 'none');
            rabbitPath.setAttribute('stroke', '#4ade80');
            rabbitPath.setAttribute('stroke-width', '2');
            rabbitPath.setAttribute('opacity', '0.9');
            chartGroup.appendChild(rabbitPath);

            foxPath = document.createElementNS(svgNS, 'polyline');
            foxPath.setAttribute('fill', 'none');
            foxPath.setAttribute('stroke', '#f87171');
            foxPath.setAttribute('stroke-width', '2');
            foxPath.setAttribute('opacity', '0.9');
            chartGroup.appendChild(foxPath);

            // Legend
            var lg1 = document.createElementNS(svgNS, 'circle');
            lg1.setAttribute('cx', chartX+12); lg1.setAttribute('cy', chartY+chartH+15);
            lg1.setAttribute('r', '5'); lg1.setAttribute('fill', '#4ade80');
            svg.appendChild(lg1);
            var lt1 = document.createElementNS(svgNS, 'text');
            lt1.setAttribute('x', chartX+22); lt1.setAttribute('y', chartY+chartH+19);
            lt1.setAttribute('fill', '#4ade80'); lt1.setAttribute('font-size', '11');
            lt1.setAttribute('font-family', 'Nunito, sans-serif');
            lt1.textContent = 'Rabbits';
            svg.appendChild(lt1);
            rCount = document.createElementNS(svgNS, 'text');
            rCount.setAttribute('x', chartX+75); rCount.setAttribute('y', chartY+chartH+19);
            rCount.setAttribute('fill', '#4ade80'); rCount.setAttribute('font-size', '11');
            rCount.setAttribute('font-family', 'Nunito, sans-serif');
            svg.appendChild(rCount);

            var lg2 = document.createElementNS(svgNS, 'circle');
            lg2.setAttribute('cx', chartX+chartW/2); lg2.setAttribute('cy', chartY+chartH+15);
            lg2.setAttribute('r', '5'); lg2.setAttribute('fill', '#f87171');
            svg.appendChild(lg2);
            var lt2 = document.createElementNS(svgNS, 'text');
            lt2.setAttribute('x', chartX+chartW/2+10); lt2.setAttribute('y', chartY+chartH+19);
            lt2.setAttribute('fill', '#f87171'); lt2.setAttribute('font-size', '11');
            lt2.setAttribute('font-family', 'Nunito, sans-serif');
            lt2.textContent = 'Foxes';
            svg.appendChild(lt2);
            fCount = document.createElementNS(svgNS, 'text');
            fCount.setAttribute('x', chartX+chartW/2+55); fCount.setAttribute('y', chartY+chartH+19);
            fCount.setAttribute('fill', '#f87171'); fCount.setAttribute('font-size', '11');
            fCount.setAttribute('font-family', 'Nunito, sans-serif');
            svg.appendChild(fCount);
        }
        buildChart();

        function updateChart() {
            if (popHistory.length < 2) return;
            var maxPop = 0;
            for (var i = 0; i < popHistory.length; i++) {
                if (popHistory[i].r > maxPop) maxPop = popHistory[i].r;
                if (popHistory[i].f > maxPop) maxPop = popHistory[i].f;
            }
            if (maxPop < 1) maxPop = 1;
            var availW = chartW - 18, availH = chartH - 15;
            var rPts = '', fPts = '';
            for (var i = 0; i < popHistory.length; i++) {
                var xi = chartX + 9 + (i / (MAX_HIST-1)) * availW;
                var yr = chartY + chartH - 5 - (popHistory[i].r / maxPop) * availH;
                var yf = chartY + chartH - 5 - (popHistory[i].f / maxPop) * availH;
                rPts += xi.toFixed(1)+','+yr.toFixed(1)+' ';
                fPts += xi.toFixed(1)+','+yf.toFixed(1)+' ';
            }
            rabbitPath.setAttribute('points', rPts);
            foxPath.setAttribute('points', fPts);
            rCount.textContent = '(' + rabbits.length + ')';
            fCount.textContent = '(' + foxes.length + ')';
        }

        function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

        function stepSim() {
            // Move rabbits
            for (var i = 0; i < rabbits.length; i++) {
                var r = rabbits[i];
                r.x += (Math.random()-0.5)*6;
                r.y += (Math.random()-0.5)*6;
                r.x = (r.x+W)%W; r.y = (r.y+H)%H;
                // Reproduce
                if (Math.random() < RABBIT_REPRODUCE && rabbits.length < 600) {
                    rabbits.push({x:r.x+(Math.random()-0.5)*10, y:r.y+(Math.random()-0.5)*10, energy:1});
                }
            }

            // Foxes hunt and move
            var eatenSet = new Set();
            for (var i = 0; i < foxes.length; i++) {
                var f = foxes[i];
                f.x += (Math.random()-0.5)*9;
                f.y += (Math.random()-0.5)*9;
                f.x = (f.x+W)%W; f.y = (f.y+H)%H;
                f.energy -= FOX_STARVE;

                // Hunt nearest rabbit
                var bestDist = 25, bestIdx = -1;
                for (var j = 0; j < rabbits.length; j++) {
                    if (eatenSet.has(j)) continue;
                    var dx = f.x - rabbits[j].x, dy = f.y - rabbits[j].y;
                    var d2 = dx*dx + dy*dy;
                    if (d2 < bestDist*bestDist) { bestDist = Math.sqrt(d2); bestIdx = j; }
                }
                if (bestIdx >= 0) {
                    eatenSet.add(bestIdx);
                    f.energy += 0.6;
                    // Move toward rabbit
                    f.x += (rabbits[bestIdx].x - f.x) * 0.4;
                    f.y += (rabbits[bestIdx].y - f.y) * 0.4;
                }

                // Fox reproduces
                if (f.energy > 2.5 && foxes.length < 200 && Math.random() < 0.01) {
                    foxes.push({x:f.x+(Math.random()-0.5)*12, y:f.y+(Math.random()-0.5)*12, energy:1.2});
                    f.energy -= 1;
                }
            }

            // Remove eaten rabbits
            var newRabbits = [];
            for (var j = 0; j < rabbits.length; j++) {
                if (!eatenSet.has(j)) newRabbits.push(rabbits[j]);
            }
            rabbits = newRabbits;

            // Remove dead foxes
            foxes = foxes.filter(function(f){ return f.energy > 0; });

            // Repopulate if collapsed
            if (rabbits.length < 5) {
                for (var k = 0; k < 20; k++) rabbits.push({x:Math.random()*W, y:Math.random()*H, energy:1});
            }
            if (foxes.length < 2 && rabbits.length > 50) {
                for (var k = 0; k < 5; k++) foxes.push({x:Math.random()*W, y:Math.random()*H, energy:1.5});
            }

            popHistory.push({r: rabbits.length, f: foxes.length});
            if (popHistory.length > MAX_HIST) popHistory.shift();
        }

        function draw() {
            ctx.fillStyle = 'rgba(10,14,26,0.6)';
            ctx.fillRect(0, 0, W, H);

            // Draw grass patches
            ctx.fillStyle = 'rgba(60,100,40,0.06)';
            for (var i = 0; i < 30; i++) {
                ctx.beginPath();
                ctx.arc((i*137.5)%W, (i*71.3)%H, 30+i%20, 0, Math.PI*2);
                ctx.fill();
            }

            // Rabbits
            ctx.fillStyle = '#4ade80';
            for (var i = 0; i < rabbits.length; i++) {
                var r = rabbits[i];
                ctx.beginPath();
                ctx.arc(r.x, r.y, 3, 0, Math.PI*2);
                ctx.fill();
            }

            // Foxes
            for (var i = 0; i < foxes.length; i++) {
                var f = foxes[i];
                ctx.beginPath();
                ctx.arc(f.x, f.y, 5, 0, Math.PI*2);
                ctx.fillStyle = '#f87171';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(f.x, f.y, 5, 0, Math.PI*2);
                ctx.strokeStyle = '#ff4444';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        var fpsCount = 0, fpsLast = performance.now();
        var fpsEl = document.getElementById('fps-value');
        var frame = 0;

        function animate() {
            requestAnimationFrame(animate);
            stepSim();
            draw();
            if (frame % 5 === 0) updateChart();
            frame++;
            fpsCount++;
            var now = performance.now();
            if (now - fpsLast >= 1000) { fpsEl.textContent = fpsCount; fpsCount = 0; fpsLast = now; }
        }
        animate();
    </script>
</body>
</html>
