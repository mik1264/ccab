<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Pendulum + Phase Portrait - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:var(--earth);text-decoration:none;border-radius:6px;font-size:14px;font-family:'Nunito',sans-serif;z-index:999;transition:all 0.3s ease}
        .back-link:hover{background:rgba(221,161,94,0.2);transform:translateX(-4px)}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:var(--earth);padding:8px 12px;border-radius:6px;font-family:'Courier New',monospace;font-size:14px;z-index:999}
        .fps-good{color:#10b981}.fps-medium{color:#fbbf24}.fps-poor{color:#e11d48}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
        .interactive{pointer-events:all;cursor:pointer}
        #loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:1000}
        .spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,0.1);border-top-color:var(--earth);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem}
        @keyframes spin{to{transform:rotate(360deg)}}
        #error{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(225,29,72,0.9);color:white;padding:2rem;border-radius:12px;text-align:center;max-width:400px;z-index:1001}
        #error h2{font-family:'Lora',serif;margin:0 0 1rem 0}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message"></p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <script>
        window.addEventListener('error',function(e){showError('Runtime Error: '+e.message);});
        function showError(m){document.getElementById('loading').style.display='none';document.getElementById('error').style.display='block';document.getElementById('error-message').textContent=m;}
        function hideLoading(){document.getElementById('loading').style.display='none';}
        class FPSCounter{constructor(){this.fps=0;this.frames=0;this.lastTime=performance.now();this.el=document.getElementById('fps-value');}update(){this.frames++;var n=performance.now(),d=n-this.lastTime;if(d>=1000){this.fps=Math.round(this.frames*1000/d);this.frames=0;this.lastTime=n;this.el.textContent=this.fps;this.el.className=this.fps>=55?'fps-good':this.fps>=30?'fps-medium':'fps-poor';}}}

        try {
            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');
            var svg = document.getElementById('svg-overlay');
            var svgNS = 'http://www.w3.org/2000/svg';
            var fpsCounter = new FPSCounter();
            var W, H;
            var g = 9.81;

            // Three pendula for sensitivity demonstration
            var pendula = [];
            var trailColors = ['#DDA15E', '#10b981', '#e879f9'];
            var L1 = 150, L2 = 150, m1 = 1, m2 = 1;

            function initPendula(t1, t2) {
                pendula = [];
                for (var i = 0; i < 3; i++) {
                    pendula.push({
                        theta1: t1 + i * 0.001,
                        theta2: t2 + i * 0.001,
                        omega1: 0,
                        omega2: 0,
                        trail: []
                    });
                }
            }
            initPendula(Math.PI * 0.75, Math.PI * 0.5);

            // Phase portrait
            var phasePoints = [];
            var maxPhase = 500;

            // RK4 integration
            function derivs(th1, th2, w1, w2) {
                var ml1 = m1 + m2;
                var dt = th1 - th2;
                var cos_dt = Math.cos(dt);
                var sin_dt = Math.sin(dt);
                var den1 = ml1 * L1 - m2 * L1 * cos_dt * cos_dt;
                var den2 = (L2 / L1) * den1;

                var dw1 = (-g * ml1 * Math.sin(th1) - m2 * g * Math.sin(th1 - 2 * th2) / 2 - m2 * sin_dt * (w2 * w2 * L2 + w1 * w1 * L1 * cos_dt)) / den1;
                var dw2 = (sin_dt * (w1 * w1 * L1 * ml1 + g * ml1 * Math.cos(th1) + w2 * w2 * L2 * m2 * cos_dt)) / den2;

                return [w1, w2, dw1, dw2];
            }

            function rk4Step(p, dt) {
                var k1 = derivs(p.theta1, p.theta2, p.omega1, p.omega2);
                var k2 = derivs(p.theta1 + dt/2*k1[0], p.theta2 + dt/2*k1[1], p.omega1 + dt/2*k1[2], p.omega2 + dt/2*k1[3]);
                var k3 = derivs(p.theta1 + dt/2*k2[0], p.theta2 + dt/2*k2[1], p.omega1 + dt/2*k2[2], p.omega2 + dt/2*k2[3]);
                var k4 = derivs(p.theta1 + dt*k3[0], p.theta2 + dt*k3[1], p.omega1 + dt*k3[2], p.omega2 + dt*k3[3]);

                p.theta1 += dt/6 * (k1[0] + 2*k2[0] + 2*k3[0] + k4[0]);
                p.theta2 += dt/6 * (k1[1] + 2*k2[1] + 2*k3[1] + k4[1]);
                p.omega1 += dt/6 * (k1[2] + 2*k2[2] + 2*k3[2] + k4[2]);
                p.omega2 += dt/6 * (k1[3] + 2*k2[3] + 2*k3[3] + k4[3]);
            }

            // SVG panel
            var panelW = 280;
            function createEl(tag, attrs) {
                var el = document.createElementNS(svgNS, tag);
                for (var k in attrs) el.setAttribute(k, attrs[k]);
                return el;
            }

            var panel = createEl('g', {});
            svg.appendChild(panel);
            var panelBg = createEl('rect', { rx: '12', fill: 'rgba(0,0,0,0.75)', stroke: 'rgba(221,161,94,0.3)', 'stroke-width': '1' });
            panel.appendChild(panelBg);

            var panelTitle = createEl('text', { fill: '#DDA15E', 'font-family': 'Lora, serif', 'font-size': '14', 'text-anchor': 'middle' });
            panelTitle.textContent = 'Phase Portrait (\u03B81 vs \u03B82)';
            panel.appendChild(panelTitle);

            var chartBg = createEl('rect', { fill: 'rgba(10,14,26,0.9)', stroke: 'rgba(255,255,255,0.1)', 'stroke-width': '1', rx: '4' });
            panel.appendChild(chartBg);

            // Axis labels
            var xAxisLabel = createEl('text', { fill: 'rgba(255,255,255,0.5)', 'font-family': 'Nunito, sans-serif', 'font-size': '10', 'text-anchor': 'middle' });
            xAxisLabel.textContent = '\u03B81';
            panel.appendChild(xAxisLabel);

            var yAxisLabel = createEl('text', { fill: 'rgba(255,255,255,0.5)', 'font-family': 'Nunito, sans-serif', 'font-size': '10', 'text-anchor': 'middle' });
            yAxisLabel.textContent = '\u03B82';
            panel.appendChild(yAxisLabel);

            var phaseLine = createEl('polyline', { fill: 'none', stroke: '#DDA15E', 'stroke-width': '1.5', 'stroke-opacity': '0.8' });
            panel.appendChild(phaseLine);

            // Lyapunov indicator
            var lyapText = createEl('text', { fill: '#e879f9', 'font-family': 'Courier New, monospace', 'font-size': '11' });
            lyapText.textContent = 'Chaos indicator: computing...';
            panel.appendChild(lyapText);

            // Sliders
            var sliderFO = createEl('foreignObject', { class: 'interactive' });
            panel.appendChild(sliderFO);
            var sliderDiv = document.createElement('div');
            sliderDiv.style.cssText = 'font-family:Nunito,sans-serif;font-size:12px;color:#e8e6e1;padding:5px;';
            sliderFO.appendChild(sliderDiv);

            var sliderDefs = [
                { label: 'm2/m1', min: 0.1, max: 5, step: 0.1, val: 1, fn: function(v) { m2 = v * m1; } },
                { label: 'L2/L1', min: 0.1, max: 3, step: 0.1, val: 1, fn: function(v) { L2 = v * L1; } },
                { label: '\u03B81\u2080', min: 0, max: 3.14, step: 0.05, val: 2.36, fn: function(v) { initPendula(v, parseFloat(sliderDefs[3].inp.value)); phasePoints = []; } },
                { label: '\u03B82\u2080', min: 0, max: 3.14, step: 0.05, val: 1.57, fn: function(v) { initPendula(parseFloat(sliderDefs[2].inp.value), v); phasePoints = []; } }
            ];

            sliderDefs.forEach(function(sd) {
                var row = document.createElement('div');
                row.style.cssText = 'margin-bottom:5px;display:flex;align-items:center;gap:5px;';
                var lbl = document.createElement('span');
                lbl.style.cssText = 'width:45px;color:#DDA15E;font-size:11px;';
                lbl.textContent = sd.label;
                var inp = document.createElement('input');
                inp.type = 'range'; inp.min = sd.min; inp.max = sd.max; inp.step = sd.step; inp.value = sd.val;
                inp.style.cssText = 'flex:1;accent-color:#DDA15E;height:3px;';
                sd.inp = inp;
                var val = document.createElement('span');
                val.style.cssText = 'width:35px;text-align:right;font-size:10px;';
                val.textContent = parseFloat(sd.val).toFixed(2);
                inp.addEventListener('input', function() {
                    val.textContent = parseFloat(inp.value).toFixed(2);
                    sd.fn(parseFloat(inp.value));
                });
                row.appendChild(lbl); row.appendChild(inp); row.appendChild(val);
                sliderDiv.appendChild(row);
            });

            var panelX, panelY, panelH2, chartX, chartY2, chartW2, chartH2;

            function resize() {
                W = window.innerWidth; H = window.innerHeight;
                canvas.width = W; canvas.height = H;
                svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
                svg.setAttribute('width', W); svg.setAttribute('height', H);

                panelX = W - panelW - 20; panelY = 50; panelH2 = 430;
                panelBg.setAttribute('x', panelX); panelBg.setAttribute('y', panelY);
                panelBg.setAttribute('width', panelW); panelBg.setAttribute('height', panelH2);
                panelTitle.setAttribute('x', panelX + panelW/2); panelTitle.setAttribute('y', panelY + 25);

                chartX = panelX + 15; chartY2 = panelY + 40; chartW2 = panelW - 30; chartH2 = 180;
                chartBg.setAttribute('x', chartX); chartBg.setAttribute('y', chartY2);
                chartBg.setAttribute('width', chartW2); chartBg.setAttribute('height', chartH2);

                xAxisLabel.setAttribute('x', chartX + chartW2/2); xAxisLabel.setAttribute('y', chartY2 + chartH2 + 15);
                yAxisLabel.setAttribute('x', chartX - 10); yAxisLabel.setAttribute('y', chartY2 + chartH2/2);

                lyapText.setAttribute('x', panelX + 15); lyapText.setAttribute('y', chartY2 + chartH2 + 35);

                sliderFO.setAttribute('x', panelX + 5); sliderFO.setAttribute('y', chartY2 + chartH2 + 45);
                sliderFO.setAttribute('width', panelW - 10); sliderFO.setAttribute('height', 140);
            }
            var rt; window.addEventListener('resize', function() { clearTimeout(rt); rt = setTimeout(resize, 100); });
            resize();

            var frameCount = 0;
            var lyapSum = 0, lyapCount = 0;

            function animate() {
                fpsCounter.update();
                frameCount++;

                var dt = 0.02;
                for (var s = 0; s < 3; s++) {
                    for (var i = 0; i < pendula.length; i++) {
                        rk4Step(pendula[i], dt);
                    }
                }

                // Lyapunov estimate from divergence of nearby trajectories
                if (pendula.length >= 2) {
                    var dth1 = pendula[1].theta1 - pendula[0].theta1;
                    var dth2 = pendula[1].theta2 - pendula[0].theta2;
                    var dist = Math.sqrt(dth1*dth1 + dth2*dth2);
                    if (dist > 0) {
                        lyapSum += Math.log(dist / 0.001);
                        lyapCount++;
                    }
                }

                // Store phase
                var p0 = pendula[0];
                phasePoints.push([p0.theta1, p0.theta2]);
                if (phasePoints.length > maxPhase) phasePoints.shift();

                // Store trails
                var simCX = (W - panelW - 40) / 2;
                var simCY = H * 0.35;

                for (var i = 0; i < pendula.length; i++) {
                    var p = pendula[i];
                    var x2 = simCX + L1 * Math.sin(p.theta1) + L2 * Math.sin(p.theta2);
                    var y2 = simCY + L1 * Math.cos(p.theta1) + L2 * Math.cos(p.theta2);
                    p.trail.push([x2, y2]);
                    if (p.trail.length > 500) p.trail.shift();
                }

                // Draw
                ctx.fillStyle = 'rgba(10,14,26,0.15)';
                ctx.fillRect(0, 0, W, H);

                // Draw trails
                for (var i = 0; i < pendula.length; i++) {
                    var trail = pendula[i].trail;
                    if (trail.length < 2) continue;
                    ctx.strokeStyle = trailColors[i];
                    ctx.lineWidth = 1.5;
                    ctx.globalAlpha = 0.6;
                    ctx.beginPath();
                    ctx.moveTo(trail[0][0], trail[0][1]);
                    for (var j = 1; j < trail.length; j++) {
                        ctx.lineTo(trail[j][0], trail[j][1]);
                    }
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // Draw pendulum arms (first only)
                var p = pendula[0];
                var x1 = simCX + L1 * Math.sin(p.theta1);
                var y1 = simCY + L1 * Math.cos(p.theta1);
                var x2 = x1 + L2 * Math.sin(p.theta2);
                var y2 = y1 + L2 * Math.cos(p.theta2);

                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(simCX, simCY);
                ctx.lineTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();

                // Pivot
                ctx.fillStyle = '#666';
                ctx.beginPath();
                ctx.arc(simCX, simCY, 5, 0, Math.PI*2);
                ctx.fill();

                // Bobs
                ctx.fillStyle = '#DDA15E';
                ctx.beginPath();
                ctx.arc(x1, y1, 10, 0, Math.PI*2);
                ctx.fill();

                ctx.fillStyle = '#e879f9';
                ctx.beginPath();
                ctx.arc(x2, y2, 8, 0, Math.PI*2);
                ctx.fill();

                // Update phase portrait SVG
                if (phasePoints.length > 1) {
                    var pts = '';
                    for (var i = 0; i < phasePoints.length; i++) {
                        var px2 = chartX + ((phasePoints[i][0] + Math.PI) / (2 * Math.PI)) * chartW2;
                        var py2 = chartY2 + ((phasePoints[i][1] + Math.PI) / (2 * Math.PI)) * chartH2;
                        px2 = Math.max(chartX, Math.min(chartX + chartW2, px2));
                        py2 = Math.max(chartY2, Math.min(chartY2 + chartH2, py2));
                        pts += px2.toFixed(1) + ',' + py2.toFixed(1) + ' ';
                    }
                    phaseLine.setAttribute('points', pts);
                }

                // Update Lyapunov display
                if (frameCount % 60 === 0 && lyapCount > 0) {
                    var lyap = lyapSum / lyapCount;
                    lyapText.textContent = 'Lyapunov \u2248 ' + lyap.toFixed(3) + (lyap > 0 ? ' (chaotic)' : ' (stable)');
                }

                requestAnimationFrame(animate);
            }

            hideLoading();
            animate();
        } catch(e) { showError('Init Error: ' + e.message); }
    </script>
</body>
</html>
