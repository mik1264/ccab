<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sand Dune Formation + Wind Profile - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:#DDA15E;text-decoration:none;border-radius:6px;font-size:14px;z-index:999}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#DDA15E;padding:8px 12px;border-radius:6px;font-size:14px;z-index:999}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <script>
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';

        var W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; initSand(); buildSVG(); }
        resize();
        window.addEventListener('resize', resize);

        // Sand height field
        var COLS;
        var CELL_W = 4;
        var MAX_HEIGHT = 60;
        var SLIP_ANGLE = 0.6; // tan of angle of repose
        var heights;
        var grains = []; // airborne saltation grains
        var NUM_GRAINS = 120;
        var windSpeed = 2.5;

        function initSand() {
            COLS = Math.ceil(W / CELL_W);
            heights = new Float32Array(COLS);
            // Initial small random dunes
            for (var i = 0; i < COLS; i++) {
                heights[i] = Math.random() * 8;
            }
            // A couple of seed dunes
            var mid = Math.floor(COLS * 0.3);
            for (var i = -8; i <= 8; i++) {
                if (mid+i >= 0 && mid+i < COLS) heights[mid+i] += (8-Math.abs(i))*2;
            }
            var mid2 = Math.floor(COLS * 0.65);
            for (var i = -5; i <= 5; i++) {
                if (mid2+i >= 0 && mid2+i < COLS) heights[mid2+i] += (5-Math.abs(i))*1.5;
            }

            // Spawn saltation grains
            grains = [];
            for (var g = 0; g < NUM_GRAINS; g++) {
                spawnGrain();
            }
        }

        function spawnGrain() {
            var col = Math.floor(Math.random() * COLS);
            var surfY = getGroundY(col) - heights[col] * 1.5;
            grains.push({
                x: col * CELL_W,
                y: Math.random() * H * 0.4,
                vx: windSpeed + Math.random() * 1.5,
                vy: Math.random() * 2 - 0.5,
                r: 1.5 + Math.random(),
                bouncing: false
            });
        }

        var GROUND_Y;
        function getGroundY(col) {
            return H - 120;
        }

        function stepSand() {
            var groundBase = H - 120;

            // Move grains
            for (var g = 0; g < grains.length; g++) {
                var gr = grains[g];
                gr.x += gr.vx;
                gr.vy += 0.15; // gravity
                gr.y += gr.vy;

                var col = Math.floor(gr.x / CELL_W);
                if (col < 0) col = 0;
                if (col >= COLS) col = COLS-1;

                var surfY2 = groundBase - heights[col] * 1.5;

                // Hit ground/dune
                if (gr.y >= surfY2) {
                    gr.y = surfY2;
                    // Deposit some sand
                    if (col >= 0 && col < COLS) {
                        heights[col] += 0.12;
                    }
                    // Saltation: bounce or rest
                    if (gr.vy > 1) {
                        gr.vy = -gr.vy * 0.45;
                        gr.vx = windSpeed + Math.random();
                        // Knock out another grain
                        if (col+1 < COLS && heights[col+1] > 0) {
                            heights[col+1] -= 0.08;
                        }
                    } else {
                        // Respawn
                        grains[g] = null;
                    }
                }

                // Out of bounds: respawn
                if (gr.x > W + 20 || gr.x < -20 || gr.y < -50) {
                    grains[g] = null;
                }
            }

            // Remove null grains and respawn
            var alive = grains.filter(function(g){return g!==null;});
            while (alive.length < NUM_GRAINS) {
                var grain = {
                    x: -10,
                    y: groundBase - Math.random()*30,
                    vx: windSpeed + Math.random()*1.5,
                    vy: -(Math.random()*2+1),
                    r: 1.5 + Math.random(),
                    bouncing: false
                };
                alive.push(grain);
            }
            grains = alive;

            // Avalanche: enforce angle of repose (sand slides)
            for (var i = 0; i < COLS-1; i++) {
                var diff = heights[i] - heights[i+1];
                if (Math.abs(diff) > SLIP_ANGLE * 1.2) {
                    var transfer = (diff - Math.sign(diff) * SLIP_ANGLE) * 0.3;
                    heights[i] -= transfer;
                    heights[i+1] += transfer;
                }
            }

            // Cap heights
            for (var i = 0; i < COLS; i++) {
                if (heights[i] < 0) heights[i] = 0;
                if (heights[i] > MAX_HEIGHT) heights[i] = MAX_HEIGHT;
            }

            // Slowly add sand from left (wind transport)
            heights[0] += 0.02;
            // Remove from right edge (sand disappears)
            heights[COLS-1] = Math.max(0, heights[COLS-1] - 0.01);
        }

        // SVG overlay: height profile + wind indicator
        var profW = 300, profH = 120;
        var profX, profY;
        var profPanel, profPath;
        var windArrows = [];
        var grainCountText;

        function buildSVG() {
            profX = W - profW - 20; profY = 20;
            svg.innerHTML = '';

            // Height profile panel
            profPanel = document.createElementNS(svgNS, 'rect');
            profPanel.setAttribute('x', profX); profPanel.setAttribute('y', profY);
            profPanel.setAttribute('width', profW); profPanel.setAttribute('height', profH + 50);
            profPanel.setAttribute('rx', '8');
            profPanel.setAttribute('fill', 'rgba(10,14,26,0.85)');
            profPanel.setAttribute('stroke', '#DDA15E'); profPanel.setAttribute('stroke-width', '1.2');
            svg.appendChild(profPanel);

            var title = document.createElementNS(svgNS, 'text');
            title.setAttribute('x', profX+profW/2); title.setAttribute('y', profY+18);
            title.setAttribute('text-anchor', 'middle');
            title.setAttribute('fill', '#DDA15E'); title.setAttribute('font-size', '12');
            title.setAttribute('font-family', 'Nunito, sans-serif');
            title.textContent = 'Dune Height Profile';
            svg.appendChild(title);

            var ax = document.createElementNS(svgNS, 'line');
            ax.setAttribute('x1', profX+8); ax.setAttribute('y1', profY+profH+8);
            ax.setAttribute('x2', profX+profW-8); ax.setAttribute('y2', profY+profH+8);
            ax.setAttribute('stroke', '#8A9A5B'); ax.setAttribute('stroke-width', '1');
            svg.appendChild(ax);

            profPath = document.createElementNS(svgNS, 'polyline');
            profPath.setAttribute('fill', 'none');
            profPath.setAttribute('stroke', '#DDA15E');
            profPath.setAttribute('stroke-width', '2');
            svg.appendChild(profPath);

            // Fill under curve
            var profFill = document.createElementNS(svgNS, 'polygon');
            profFill.setAttribute('fill', 'rgba(221,161,94,0.2)');
            profFill.id = 'prof-fill';
            svg.appendChild(profFill);

            // Wind speed indicator
            var windPanel = document.createElementNS(svgNS, 'rect');
            windPanel.setAttribute('x', profX); windPanel.setAttribute('y', profY+profH+22);
            windPanel.setAttribute('width', profW); windPanel.setAttribute('height', 24);
            windPanel.setAttribute('rx', '4');
            windPanel.setAttribute('fill', 'rgba(10,14,26,0.7)');
            windPanel.setAttribute('stroke', '#606C38'); windPanel.setAttribute('stroke-width', '0.8');
            svg.appendChild(windPanel);

            var windLabel = document.createElementNS(svgNS, 'text');
            windLabel.setAttribute('x', profX+8); windLabel.setAttribute('y', profY+profH+38);
            windLabel.setAttribute('fill', '#60a5fa'); windLabel.setAttribute('font-size', '11');
            windLabel.setAttribute('font-family', 'Nunito, sans-serif');
            windLabel.textContent = 'Wind:'; svg.appendChild(windLabel);

            // Wind arrows
            windArrows = [];
            for (var i = 0; i < 5; i++) {
                var arrow = document.createElementNS(svgNS, 'text');
                arrow.setAttribute('x', profX+50+i*30); arrow.setAttribute('y', profY+profH+38);
                arrow.setAttribute('fill', '#60a5fa'); arrow.setAttribute('font-size', '14');
                arrow.setAttribute('font-family', 'Nunito, sans-serif');
                arrow.textContent = '→';
                svg.appendChild(arrow);
                windArrows.push(arrow);
            }

            grainCountText = document.createElementNS(svgNS, 'text');
            grainCountText.setAttribute('x', profX+profW-8); grainCountText.setAttribute('y', profY+profH+38);
            grainCountText.setAttribute('text-anchor', 'end');
            grainCountText.setAttribute('fill', '#DDA15E'); grainCountText.setAttribute('font-size', '11');
            grainCountText.setAttribute('font-family', 'Nunito, sans-serif');
            svg.appendChild(grainCountText);
        }

        var profFillEl;
        function updateSVG() {
            var availW = profW - 18, availH = profH - 22;
            var step = Math.max(1, Math.floor(COLS / 100));
            var pts = '', fillPts = '';
            var samples = [];
            for (var i = 0; i < COLS; i += step) {
                samples.push({c: i, h: heights[i]});
            }
            var maxH = Math.max(1, MAX_HEIGHT);
            for (var i = 0; i < samples.length; i++) {
                var xi = profX+9 + (samples[i].c/COLS)*availW;
                var yi = profY+profH+8 - (samples[i].h/maxH)*availH;
                pts += xi.toFixed(1)+','+yi.toFixed(1)+' ';
                fillPts += xi.toFixed(1)+','+yi.toFixed(1)+' ';
            }
            profPath.setAttribute('points', pts);

            // Update fill polygon
            var el = document.getElementById('prof-fill');
            if (el && samples.length > 0) {
                var first = profX+9; var firstY = profY+profH+8;
                var last = profX+9+(samples[samples.length-1].c/COLS)*availW;
                el.setAttribute('points', first+','+firstY+' '+fillPts+' '+last+','+firstY);
            }

            grainCountText.textContent = grains.length + ' grains';

            // Animate wind arrows
            var t = performance.now();
            for (var i = 0; i < windArrows.length; i++) {
                var phase = (t/300 + i*0.3) % 1;
                windArrows[i].setAttribute('opacity', (0.3 + phase*0.7).toFixed(2));
            }
        }

        function sandColor(height, maxH) {
            var t = height / maxH;
            // Deep sand = dark amber, tip = bright gold
            var r2 = Math.round(120 + t*110);
            var g2 = Math.round(70 + t*80);
            var b2 = Math.round(10 + t*30);
            return 'rgb('+r2+','+g2+','+b2+')';
        }

        function draw() {
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0,0,W,H);

            // Sky gradient
            var sky = ctx.createLinearGradient(0,0,0,H-140);
            sky.addColorStop(0, '#0a0518');
            sky.addColorStop(0.5, '#1a1030');
            sky.addColorStop(1, '#2a1a10');
            ctx.fillStyle = sky;
            ctx.fillRect(0,0,W,H-140);

            var groundBase = H - 120;

            // Draw dune terrain
            ctx.beginPath();
            ctx.moveTo(0, groundBase);
            for (var i = 0; i < COLS; i++) {
                var x = i * CELL_W;
                var y = groundBase - heights[i] * 1.5;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(W, groundBase);
            ctx.closePath();

            // Sand gradient
            var sandGrad = ctx.createLinearGradient(0, groundBase-MAX_HEIGHT*1.5, 0, groundBase);
            sandGrad.addColorStop(0, '#c8a050');
            sandGrad.addColorStop(0.4, '#b07820');
            sandGrad.addColorStop(1, '#6b4010');
            ctx.fillStyle = sandGrad;
            ctx.fill();

            // Dune surface shading (windward vs slip face)
            for (var i = 1; i < COLS; i++) {
                var slope = heights[i] - heights[i-1];
                var x = (i-1) * CELL_W;
                var y1 = groundBase - heights[i-1]*1.5;
                var y2 = groundBase - heights[i]*1.5;
                if (slope > 0.2) {
                    // Windward: lit
                    ctx.fillStyle = 'rgba(240,190,80,0.15)';
                } else if (slope < -0.5) {
                    // Slip face: shadowed
                    ctx.fillStyle = 'rgba(40,20,5,0.3)';
                } else continue;
                ctx.fillRect(x, Math.min(y1,y2), CELL_W, Math.abs(y1-y2)+1);
            }

            // Ground base
            ctx.fillStyle = '#3d1f08';
            ctx.fillRect(0, groundBase, W, H-groundBase);

            // Draw airborne grains (saltation)
            for (var g = 0; g < grains.length; g++) {
                var gr = grains[g];
                if (!gr) continue;
                var speed = Math.sqrt(gr.vx*gr.vx+gr.vy*gr.vy);
                ctx.beginPath();
                ctx.arc(gr.x, gr.y, gr.r, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(220,180,80,0.85)';
                ctx.fill();
                // Motion blur line
                if (speed > 2) {
                    ctx.beginPath();
                    ctx.moveTo(gr.x, gr.y);
                    ctx.lineTo(gr.x - gr.vx*2, gr.y - gr.vy*2);
                    ctx.strokeStyle = 'rgba(220,180,80,0.3)';
                    ctx.lineWidth = gr.r*0.8;
                    ctx.stroke();
                }
            }

            // Wind streaks in sky
            ctx.strokeStyle = 'rgba(200,200,255,0.04)';
            ctx.lineWidth = 1;
            var t2 = performance.now() * 0.0005;
            for (var s = 0; s < 20; s++) {
                var sy = (s*H/20 + t2*100) % (H-120);
                var sx = (s*137 + t2*200) % W;
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx + 80 + Math.sin(s)*40, sy);
                ctx.stroke();
            }

            // Labels
            ctx.fillStyle = 'rgba(221,161,94,0.8)';
            ctx.font = 'bold 14px Nunito';
            ctx.textAlign = 'center';
            ctx.fillText('Sand Dune Formation — Saltation Transport', W/2, 25);
            ctx.fillStyle = 'rgba(96,164,250,0.7)';
            ctx.font = '12px Nunito';
            ctx.fillText('Wind direction: \u2192', W/2, 45);
            ctx.textAlign = 'left';
        }

        var fpsCount = 0, fpsLast = performance.now();
        var fpsEl = document.getElementById('fps-value');
        var frame = 0;

        function animate() {
            requestAnimationFrame(animate);
            for (var i = 0; i < 3; i++) stepSand();
            draw();
            if (frame % 3 === 0) updateSVG();
            frame++;
            fpsCount++;
            var now = performance.now();
            if (now - fpsLast >= 1000) { fpsEl.textContent = fpsCount; fpsCount = 0; fpsLast = now; }
        }
        animate();
    </script>
</body>
</html>
