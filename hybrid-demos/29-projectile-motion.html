<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectile Motion + Range Analysis - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:#DDA15E;text-decoration:none;border-radius:6px;font-size:14px;z-index:999}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#DDA15E;padding:8px 12px;border-radius:6px;font-size:14px;z-index:999}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <script>
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';

        var W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; setupScene(); buildCharts(); }
        resize();
        window.addEventListener('resize', resize);

        var g = 9.8, v0 = 60;
        var angles = [15, 30, 45, 60, 75];
        var colors = ['#60a5fa','#34d399','#fbbf24','#f87171','#c084fc'];
        var groundY, originX;
        var trajectories = [];
        var animBalls = [];
        var selectedAngle = 2; // 45 degrees
        var animT = 0;
        var SCALE = 6;

        function setupScene() {
            groundY = H - 80;
            originX = 80;
            trajectories = [];
            animBalls = angles.map(function(a, i) {
                return { angle: a, color: colors[i], t: 0, done: false, trail: [] };
            });
            // Precompute trajectories
            for (var i = 0; i < angles.length; i++) {
                var a = angles[i] * Math.PI / 180;
                var vx = v0 * Math.cos(a), vy = v0 * Math.sin(a);
                var T = 2 * vy / g;
                var pts = [];
                var steps = 80;
                for (var s = 0; s <= steps; s++) {
                    var t = (s / steps) * T;
                    var x = vx * t;
                    var y = vy * t - 0.5 * g * t * t;
                    pts.push({ x: originX + x * SCALE, y: groundY - y * SCALE });
                }
                trajectories.push({ pts: pts, color: colors[i], angle: angles[i], range: vx*T });
            }
        }

        function buildCharts() {
            svg.innerHTML = '';
            // Range vs angle chart
            var cW = 240, cH = 140;
            var cX = W - cW - 20, cY = 20;

            var panel = document.createElementNS(svgNS, 'rect');
            panel.setAttribute('x', cX); panel.setAttribute('y', cY);
            panel.setAttribute('width', cW); panel.setAttribute('height', cH + 40);
            panel.setAttribute('rx', '8');
            panel.setAttribute('fill', 'rgba(10,14,26,0.85)');
            panel.setAttribute('stroke', '#DDA15E'); panel.setAttribute('stroke-width', '1.2');
            svg.appendChild(panel);

            var title = document.createElementNS(svgNS, 'text');
            title.setAttribute('x', cX + cW/2); title.setAttribute('y', cY + 18);
            title.setAttribute('text-anchor', 'middle');
            title.setAttribute('fill', '#DDA15E'); title.setAttribute('font-size', '12');
            title.setAttribute('font-family', 'Nunito, sans-serif');
            title.textContent = 'Range vs. Launch Angle';
            svg.appendChild(title);

            // Draw range bars
            var allAngles = [10,15,20,25,30,35,40,45,50,55,60,65,70,75,80];
            var maxRange = 0;
            var rangeData = allAngles.map(function(a) {
                var ar = a * Math.PI / 180;
                var r = v0*v0*Math.sin(2*ar)/g;
                if (r > maxRange) maxRange = r;
                return r;
            });
            var barW2 = (cW - 20) / allAngles.length;
            for (var i = 0; i < allAngles.length; i++) {
                var bh = (rangeData[i] / maxRange) * (cH - 25);
                var isSelected = (allAngles[i] === 45);
                var bar = document.createElementNS(svgNS, 'rect');
                bar.setAttribute('x', cX + 10 + i * barW2);
                bar.setAttribute('y', cY + cH - 10 - bh);
                bar.setAttribute('width', Math.max(1, barW2 - 1));
                bar.setAttribute('height', bh);
                bar.setAttribute('fill', isSelected ? '#DDA15E' : '#606C38');
                bar.setAttribute('opacity', isSelected ? '1' : '0.6');
                svg.appendChild(bar);
            }

            var ax = document.createElementNS(svgNS, 'line');
            ax.setAttribute('x1', cX+10); ax.setAttribute('y1', cY+cH-10);
            ax.setAttribute('x2', cX+cW-10); ax.setAttribute('y2', cY+cH-10);
            ax.setAttribute('stroke', '#8A9A5B'); ax.setAttribute('stroke-width', '1');
            svg.appendChild(ax);

            var lbl45 = document.createElementNS(svgNS, 'text');
            lbl45.setAttribute('x', cX + cW/2); lbl45.setAttribute('y', cY + cH + 20);
            lbl45.setAttribute('text-anchor', 'middle');
            lbl45.setAttribute('fill', '#DDA15E'); lbl45.setAttribute('font-size', '10');
            lbl45.setAttribute('font-family', 'Nunito, sans-serif');
            lbl45.textContent = '45° is optimal (highlighted)';
            svg.appendChild(lbl45);

            // Legend
            for (var i = 0; i < angles.length; i++) {
                var ly = groundY - 20 - i * 22;
                var circle = document.createElementNS(svgNS, 'circle');
                circle.setAttribute('cx', W - 160); circle.setAttribute('cy', ly);
                circle.setAttribute('r', '5'); circle.setAttribute('fill', colors[i]);
                svg.appendChild(circle);
                var lt = document.createElementNS(svgNS, 'text');
                lt.setAttribute('x', W - 150); lt.setAttribute('y', ly + 4);
                lt.setAttribute('fill', colors[i]); lt.setAttribute('font-size', '12');
                lt.setAttribute('font-family', 'Nunito, sans-serif');
                lt.textContent = angles[i] + '° - Range: ' + (trajectories[i] ? (trajectories[i].range * SCALE / SCALE).toFixed(0) + 'm' : '');
                svg.appendChild(lt);
            }
        }

        var ballT = [0, 0.15, 0.3, 0.45, 0.6];

        function draw() {
            ctx.fillStyle = 'rgba(10,14,26,0.5)';
            ctx.fillRect(0, 0, W, H);

            // Ground
            ctx.fillStyle = '#1a3020';
            ctx.fillRect(0, groundY, W, H - groundY);
            ctx.strokeStyle = '#4ade80';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, groundY); ctx.lineTo(W, groundY);
            ctx.stroke();

            // Trajectories
            for (var i = 0; i < trajectories.length; i++) {
                var traj = trajectories[i];
                if (traj.pts.length < 2) continue;
                ctx.beginPath();
                ctx.moveTo(traj.pts[0].x, traj.pts[0].y);
                for (var j = 1; j < traj.pts.length; j++) ctx.lineTo(traj.pts[j].x, traj.pts[j].y);
                ctx.strokeStyle = traj.color;
                ctx.lineWidth = i === selectedAngle ? 2.5 : 1.2;
                ctx.globalAlpha = i === selectedAngle ? 1 : 0.4;
                ctx.setLineDash(i === selectedAngle ? [] : [5,5]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.globalAlpha = 1;
            }

            // Animated balls
            for (var i = 0; i < angles.length; i++) {
                var a = angles[i] * Math.PI / 180;
                var vx = v0 * Math.cos(a), vy = v0 * Math.sin(a);
                var T = 2 * vy / g;
                var bt = (ballT[i] % 1) * T;
                var bx = vx * bt;
                var by = vy * bt - 0.5 * g * bt * bt;
                if (by < 0) by = 0;
                ctx.beginPath();
                ctx.arc(originX + bx * SCALE, groundY - by * SCALE, 6, 0, Math.PI * 2);
                ctx.fillStyle = colors[i];
                ctx.shadowColor = colors[i]; ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
                ballT[i] += 0.006;
            }

            // Launch point
            ctx.beginPath();
            ctx.arc(originX, groundY, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();

            // Angle labels at launch
            for (var i = 0; i < angles.length; i++) {
                var a = angles[i] * Math.PI / 180;
                ctx.fillStyle = colors[i];
                ctx.font = '11px Nunito';
                ctx.fillText(angles[i]+'°', originX + 15 + Math.cos(a)*30, groundY - Math.sin(a)*30);
            }
        }

        var fpsCount = 0, fpsLast = performance.now();
        var fpsEl = document.getElementById('fps-value');

        function animate() {
            requestAnimationFrame(animate);
            draw();
            fpsCount++;
            var now = performance.now();
            if (now - fpsLast >= 1000) { fpsEl.textContent = fpsCount; fpsCount = 0; fpsLast = now; }
        }
        animate();
    </script>
</body>
</html>
