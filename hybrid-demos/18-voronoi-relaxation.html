<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voronoi Relaxation - Hybrid Canvas+SVG</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; font-family:'Nunito',sans-serif; background:#0a0e1a; color:#e8e6e1; }
        .back-link { position:fixed; top:10px; left:10px; padding:8px 16px; background:rgba(0,0,0,0.7); color:var(--earth); text-decoration:none; border-radius:6px; font-size:14px; font-family:'Nunito',sans-serif; z-index:999; transition:all 0.3s ease; }
        .back-link:hover { background:rgba(221,161,94,0.2); transform:translateX(-4px); }
        #fps-counter { position:fixed; top:10px; right:10px; background:rgba(0,0,0,0.7); color:var(--earth); padding:8px 12px; border-radius:6px; font-family:'Courier New',monospace; font-size:14px; z-index:999; }
        .fps-good{color:#10b981} .fps-medium{color:#fbbf24} .fps-poor{color:#e11d48}
        #hybrid-container { position:relative; width:100vw; height:100vh; }
        #canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
        #svg-overlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }
        .interactive { pointer-events:all; cursor:pointer; }
        .svg-label { font-family:'Nunito',sans-serif; font-size:12px; fill:rgba(255,255,255,0.8); pointer-events:none; }
        .svg-title { font-family:'Lora',serif; font-size:16px; fill:var(--earth); pointer-events:none; }
        #loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:1000; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--earth); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #error { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(225,29,72,0.9); color:white; padding:2rem; border-radius:12px; text-align:center; max-width:400px; z-index:1001; }
        #error h2 { font-family:'Lora',serif; margin:0 0 1rem 0; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message"></p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"><defs></defs></svg>
    </div>
    <script>
    window.addEventListener('error', (e) => { showError('Runtime Error: ' + e.message); });
    function showError(m) { document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='block'; document.getElementById('error-message').textContent=m; }
    function hideLoading() { document.getElementById('loading').style.display='none'; }

    class FPSCounter {
        constructor(){this.fps=0;this.frames=0;this.lastTime=performance.now();this.el=document.getElementById('fps-value');}
        update(){this.frames++;const n=performance.now(),d=n-this.lastTime;if(d>=1000){this.fps=Math.round(this.frames*1000/d);this.frames=0;this.lastTime=n;this.el.textContent=this.fps;this.el.className=this.fps>=55?'fps-good':this.fps>=30?'fps-medium':'fps-poor';}}
    }

    try {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const svg = document.getElementById('svg-overlay');
        const ns = 'http://www.w3.org/2000/svg';
        const fpsCounter = new FPSCounter();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        let W, H;

        let seedCount = 80;
        let points = [];
        let iteration = 0;
        let autoRun = false;
        let converged = false;
        let convergenceHistory = [];
        const THRESHOLD = 0.5;

        function initPoints() {
            points = [];
            for (let i = 0; i < seedCount; i++) {
                points.push({ x: 30 + Math.random() * (W - 60), y: 30 + Math.random() * (H - 60) });
            }
            iteration = 0;
            converged = false;
            convergenceHistory = [];
        }

        // Nearest-point Voronoi using pixel sampling
        function computeVoronoiAndCentroids() {
            const step = 4; // sample every 4 pixels for speed
            const sums = points.map(() => ({ sx: 0, sy: 0, count: 0 }));
            const cellAreas = points.map(() => 0);

            for (let y = 0; y < H; y += step) {
                for (let x = 0; x < W; x += step) {
                    let minD = Infinity, minI = 0;
                    for (let i = 0; i < points.length; i++) {
                        const dx = x - points[i].x, dy = y - points[i].y;
                        const d = dx * dx + dy * dy;
                        if (d < minD) { minD = d; minI = i; }
                    }
                    sums[minI].sx += x;
                    sums[minI].sy += y;
                    sums[minI].count++;
                    cellAreas[minI]++;
                }
            }

            const centroids = points.map((p, i) => {
                if (sums[i].count === 0) return { x: p.x, y: p.y };
                return { x: sums[i].sx / sums[i].count, y: sums[i].sy / sums[i].count };
            });

            return { centroids, cellAreas };
        }

        function lloydStep() {
            if (converged) return;
            const { centroids, cellAreas } = computeVoronoiAndCentroids();
            let maxDelta = 0;
            for (let i = 0; i < points.length; i++) {
                const dx = centroids[i].x - points[i].x;
                const dy = centroids[i].y - points[i].y;
                const d = Math.sqrt(dx * dx + dy * dy);
                if (d > maxDelta) maxDelta = d;
                points[i].x = centroids[i].x;
                points[i].y = centroids[i].y;
            }
            iteration++;
            convergenceHistory.push(maxDelta);
            if (maxDelta < THRESHOLD) converged = true;
        }

        function drawVoronoi() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, W, H);

            // Draw colored Voronoi cells using pixel nearest-point
            const imgData = ctx.createImageData(W, H);
            const data = imgData.data;

            // Precompute colors per point
            const colors = points.map((_, i) => {
                // Color by area estimation - we'll use a default hue spread
                const hue = (i / points.length) * 300;
                const r = Math.round(128 + 80 * Math.sin(hue * Math.PI / 180));
                const g = Math.round(128 + 80 * Math.sin((hue + 120) * Math.PI / 180));
                const b = Math.round(128 + 80 * Math.sin((hue + 240) * Math.PI / 180));
                return [r, g, b];
            });

            for (let y = 0; y < H; y++) {
                for (let x = 0; x < W; x++) {
                    let minD = Infinity, minI = 0;
                    for (let i = 0; i < points.length; i++) {
                        const dx = x - points[i].x, dy = y - points[i].y;
                        const d = dx * dx + dy * dy;
                        if (d < minD) { minD = d; minI = i; }
                    }
                    const idx = (y * W + x) * 4;
                    const c = colors[minI];
                    data[idx] = c[0]; data[idx + 1] = c[1]; data[idx + 2] = c[2]; data[idx + 3] = 180;
                }
            }
            ctx.putImageData(imgData, 0, 0);

            // Draw edges (approximate by drawing cell borders)
            // Draw seed points
            for (const p of points) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            }
        }

        function drawConvergenceGraph() {
            const graphEl = document.getElementById('conv-graph');
            if (!graphEl || convergenceHistory.length < 2) return;

            const gW = 180, gH = 80;
            let pathD = '';
            const maxVal = Math.max(...convergenceHistory, THRESHOLD * 2);
            for (let i = 0; i < convergenceHistory.length; i++) {
                const x = (i / Math.max(convergenceHistory.length - 1, 1)) * gW;
                const y = gH - (convergenceHistory[i] / maxVal) * gH;
                pathD += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
            }
            graphEl.setAttribute('d', pathD);

            // Threshold line
            const thrEl = document.getElementById('threshold-line');
            if (thrEl) {
                const ty = gH - (THRESHOLD / maxVal) * gH;
                thrEl.setAttribute('y1', ty); thrEl.setAttribute('y2', ty);
            }
        }

        function createUI() {
            svg.innerHTML = '';
            const d = document.createElementNS(ns, 'defs'); svg.appendChild(d);

            // Title
            const title = document.createElementNS(ns, 'text');
            title.setAttribute('class', 'svg-title');
            title.setAttribute('x', W / 2); title.setAttribute('y', 28);
            title.setAttribute('text-anchor', 'middle');
            title.textContent = 'Voronoi Relaxation (Lloyd\'s Algorithm)';
            svg.appendChild(title);

            // Iteration counter
            const iterText = document.createElementNS(ns, 'text');
            iterText.setAttribute('id', 'iter-text');
            iterText.setAttribute('class', 'svg-label');
            iterText.setAttribute('x', W / 2); iterText.setAttribute('y', 50);
            iterText.setAttribute('text-anchor', 'middle');
            iterText.setAttribute('fill', '#DDA15E');
            svg.appendChild(iterText);

            // Converged badge
            const badge = document.createElementNS(ns, 'g');
            badge.setAttribute('id', 'converged-badge');
            badge.setAttribute('transform', `translate(${W / 2 - 50}, 55)`);
            badge.setAttribute('style', 'display:none');
            const br = document.createElementNS(ns, 'rect');
            br.setAttribute('width', 100); br.setAttribute('height', 24); br.setAttribute('rx', 12);
            br.setAttribute('fill', 'rgba(16,185,129,0.3)'); br.setAttribute('stroke', '#10b981');
            badge.appendChild(br);
            const bt = document.createElementNS(ns, 'text');
            bt.setAttribute('x', 50); bt.setAttribute('y', 16); bt.setAttribute('text-anchor', 'middle');
            bt.setAttribute('fill', '#10b981'); bt.setAttribute('font-size', '12px');
            bt.setAttribute('font-family', 'Nunito, sans-serif');
            bt.textContent = 'Converged';
            badge.appendChild(bt);
            svg.appendChild(badge);

            // Convergence graph
            const graphG = document.createElementNS(ns, 'g');
            graphG.setAttribute('transform', `translate(${W - 210}, 60)`);
            // Background
            const gBg = document.createElementNS(ns, 'rect');
            gBg.setAttribute('width', 200); gBg.setAttribute('height', 100);
            gBg.setAttribute('fill', 'rgba(0,0,0,0.6)'); gBg.setAttribute('rx', 6);
            graphG.appendChild(gBg);
            const gTitle = document.createElementNS(ns, 'text');
            gTitle.setAttribute('x', 10); gTitle.setAttribute('y', 16);
            gTitle.setAttribute('fill', '#DDA15E'); gTitle.setAttribute('font-size', '10px');
            gTitle.setAttribute('font-family', 'Nunito, sans-serif');
            gTitle.textContent = 'Max Displacement / Iteration';
            graphG.appendChild(gTitle);
            // Graph area
            const inner = document.createElementNS(ns, 'g');
            inner.setAttribute('transform', 'translate(10, 20)');
            const thrLine = document.createElementNS(ns, 'line');
            thrLine.setAttribute('id', 'threshold-line');
            thrLine.setAttribute('x1', 0); thrLine.setAttribute('x2', 180);
            thrLine.setAttribute('y1', 70); thrLine.setAttribute('y2', 70);
            thrLine.setAttribute('stroke', '#e11d48'); thrLine.setAttribute('stroke-width', 0.5);
            thrLine.setAttribute('stroke-dasharray', '4,4');
            inner.appendChild(thrLine);
            const graphPath = document.createElementNS(ns, 'path');
            graphPath.setAttribute('id', 'conv-graph');
            graphPath.setAttribute('fill', 'none'); graphPath.setAttribute('stroke', '#10b981');
            graphPath.setAttribute('stroke-width', 1.5);
            inner.appendChild(graphPath);
            graphG.appendChild(inner);
            svg.appendChild(graphG);

            // Controls
            const fo = document.createElementNS(ns, 'foreignObject');
            fo.setAttribute('x', 10); fo.setAttribute('y', H - 90);
            fo.setAttribute('width', 320); fo.setAttribute('height', 82);
            fo.setAttribute('class', 'interactive');
            fo.innerHTML = `
                <div xmlns="http://www.w3.org/1999/xhtml" style="background:rgba(0,0,0,0.75);padding:10px 14px;border-radius:10px;font-family:Nunito,sans-serif;font-size:12px;color:#e8e6e1;">
                    <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
                        <button id="step-btn" style="padding:4px 12px;border:1px solid #DDA15E;background:rgba(0,0,0,0.5);color:#DDA15E;border-radius:4px;cursor:pointer;font-size:12px;">Step</button>
                        <button id="auto-btn" style="padding:4px 12px;border:1px solid #8A9A5B;background:rgba(0,0,0,0.5);color:#8A9A5B;border-radius:4px;cursor:pointer;font-size:12px;">Auto: OFF</button>
                        <button id="reset-btn" style="padding:4px 12px;border:1px solid #666;background:rgba(0,0,0,0.5);color:#aaa;border-radius:4px;cursor:pointer;font-size:12px;">Reset</button>
                    </div>
                    <div><label style="color:#DDA15E;">Seeds: <span id="seed-val">${seedCount}</span></label>
                    <input type="range" id="seed-slider" min="20" max="200" step="5" value="${seedCount}" style="width:200px;vertical-align:middle;"></div>
                </div>
            `;
            svg.appendChild(fo);
        }

        function bindUI() {
            document.getElementById('step-btn').addEventListener('click', function() { lloydStep(); drawVoronoi(); });
            document.getElementById('auto-btn').addEventListener('click', function() {
                autoRun = !autoRun;
                this.textContent = 'Auto: ' + (autoRun ? 'ON' : 'OFF');
            });
            document.getElementById('reset-btn').addEventListener('click', function() { initPoints(); drawVoronoi(); });
            document.getElementById('seed-slider').addEventListener('input', function() {
                seedCount = parseInt(this.value);
                document.getElementById('seed-val').textContent = seedCount;
                initPoints(); drawVoronoi();
            });
        }

        function updateSVG() {
            const iterText = document.getElementById('iter-text');
            if (iterText) iterText.textContent = `Iteration: ${iteration}`;
            const badge = document.getElementById('converged-badge');
            if (badge) badge.style.display = converged ? 'block' : 'none';
            drawConvergenceGraph();
        }

        function resize() {
            const rect = canvas.getBoundingClientRect();
            W = rect.width; H = rect.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svg.setAttribute('width', W); svg.setAttribute('height', H);
            createUI(); bindUI();
            initPoints();
        }

        let resizeTimeout;
        window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 150); });
        resize();

        let autoInterval = 0;
        function animate() {
            fpsCounter.update();
            autoInterval++;
            if (autoRun && autoInterval % 10 === 0) {
                lloydStep();
            }
            drawVoronoi();
            updateSVG();
            requestAnimationFrame(animate);
        }
        hideLoading();
        animate();
    } catch (err) { showError('Init Error: ' + err.message); }
    </script>
</body>
</html>
