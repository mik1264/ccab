<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System + Info Cards - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:var(--earth);text-decoration:none;border-radius:6px;font-size:14px;font-family:'Nunito',sans-serif;z-index:999;transition:all 0.3s ease}
        .back-link:hover{background:rgba(221,161,94,0.2);transform:translateX(-4px)}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:var(--earth);padding:8px 12px;border-radius:6px;font-family:'Courier New',monospace;font-size:14px;z-index:999}
        .fps-good{color:#10b981}.fps-medium{color:#fbbf24}.fps-poor{color:#e11d48}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
        .interactive{pointer-events:all;cursor:pointer}
        #loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:1000}
        .spinner{width:50px;height:50px;border:4px solid rgba(255,255,255,0.1);border-top-color:var(--earth);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem}
        @keyframes spin{to{transform:rotate(360deg)}}
        #error{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(225,29,72,0.9);color:white;padding:2rem;border-radius:12px;text-align:center;max-width:400px;z-index:1001}
        #error h2{font-family:'Lora',serif;margin:0 0 1rem 0}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message"></p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <script>
        window.addEventListener('error',function(e){showError('Runtime Error: '+e.message);});
        function showError(m){document.getElementById('loading').style.display='none';document.getElementById('error').style.display='block';document.getElementById('error-message').textContent=m;}
        function hideLoading(){document.getElementById('loading').style.display='none';}
        class FPSCounter{constructor(){this.fps=0;this.frames=0;this.lastTime=performance.now();this.el=document.getElementById('fps-value');}update(){this.frames++;var n=performance.now(),d=n-this.lastTime;if(d>=1000){this.fps=Math.round(this.frames*1000/d);this.frames=0;this.lastTime=n;this.el.textContent=this.fps;this.el.className=this.fps>=55?'fps-good':this.fps>=30?'fps-medium':'fps-poor';}}}

        try {
            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');
            var svg = document.getElementById('svg-overlay');
            var svgNS = 'http://www.w3.org/2000/svg';
            var fpsCounter = new FPSCounter();
            var W, H, cx, cy;

            var planets = [
                { name:'Mercury', color:'#b5b5b5', dist:0.39, period:0.24, size:3, diameter:'4,879 km', mass:'0.055', moons:0, fact:'A day on Mercury is 59 Earth days long' },
                { name:'Venus', color:'#e8c56d', dist:0.72, period:0.62, size:5, diameter:'12,104 km', mass:'0.815', moons:0, fact:'Venus rotates backwards compared to most planets' },
                { name:'Earth', color:'#4a90d9', dist:1.0, period:1.0, size:5, diameter:'12,756 km', mass:'1.000', moons:1, fact:'Only known planet with liquid surface water' },
                { name:'Mars', color:'#c1440e', dist:1.52, period:1.88, size:4, diameter:'6,792 km', mass:'0.107', moons:2, fact:'Home to Olympus Mons, the tallest volcano in the solar system' },
                { name:'Jupiter', color:'#d4a574', dist:5.2, period:11.86, size:14, diameter:'142,984 km', mass:'317.8', moons:95, fact:'The Great Red Spot is a storm larger than Earth' },
                { name:'Saturn', color:'#e8d5a0', dist:9.54, period:29.46, size:12, diameter:'120,536 km', mass:'95.16', moons:146, fact:'Saturn could float in water due to low density', rings:true },
                { name:'Uranus', color:'#7ec8e3', dist:19.2, period:84.01, size:8, diameter:'51,118 km', mass:'14.54', moons:28, fact:'Uranus rotates on its side at a 98 degree tilt' },
                { name:'Neptune', color:'#3f51b5', dist:30.06, period:164.8, size:7, diameter:'49,528 km', mass:'17.15', moons:16, fact:'Winds reach over 2,000 km/h, fastest in the solar system' },
                { name:'Pluto', color:'#c2a68c', dist:39.48, period:248.0, size:2, diameter:'2,377 km', mass:'0.002', moons:5, fact:'Pluto has a heart-shaped nitrogen ice glacier' }
            ];

            // Scale orbits to fit screen
            var maxDist = 40;
            var time = 0;
            var openCards = {};

            function createEl(tag, attrs) {
                var el = document.createElementNS(svgNS, tag);
                for (var k in attrs) el.setAttribute(k, attrs[k]);
                return el;
            }

            // Orbit period labels
            var orbitLabels = [];
            planets.forEach(function(p) {
                var t = createEl('text', { fill: 'rgba(255,255,255,0.2)', 'font-family': 'Nunito, sans-serif', 'font-size': '9' });
                t.textContent = p.period.toFixed(p.period < 1 ? 2 : 1) + ' yr';
                svg.appendChild(t);
                orbitLabels.push(t);
            });

            // Card group
            var cardGroup = createEl('g', {});
            svg.appendChild(cardGroup);

            function createInfoCard(planet, px, py) {
                if (openCards[planet.name]) return;

                var cardW = 200, cardH = 165;
                var cx2 = Math.min(W - cardW - 10, Math.max(10, px + 15));
                var cy2 = Math.min(H - cardH - 10, Math.max(10, py - cardH / 2));

                var g = createEl('g', { 'data-planet': planet.name });
                var bg = createEl('rect', { x: cx2, y: cy2, width: cardW, height: cardH, rx: '10', fill: 'rgba(0,0,0,0.9)', stroke: planet.color, 'stroke-width': '2' });
                g.appendChild(bg);

                var lines = [
                    { text: planet.name, y: cy2 + 22, size: '16', fill: planet.color, family: 'Lora, serif', weight: '700' },
                    { text: 'Diameter: ' + planet.diameter, y: cy2 + 42, size: '11', fill: '#e8e6e1' },
                    { text: 'Mass: ' + planet.mass + ' Earth masses', y: cy2 + 57, size: '11', fill: '#e8e6e1' },
                    { text: 'Orbital period: ' + planet.period + ' years', y: cy2 + 72, size: '11', fill: '#e8e6e1' },
                    { text: 'Moons: ' + planet.moons, y: cy2 + 87, size: '11', fill: '#e8e6e1' },
                    { text: planet.fact, y: cy2 + 107, size: '10', fill: '#DDA15E' }
                ];

                lines.forEach(function(l) {
                    var t = createEl('text', { x: cx2 + 12, y: l.y, fill: l.fill, 'font-family': l.family || 'Nunito, sans-serif', 'font-size': l.size });
                    if (l.weight) t.setAttribute('font-weight', l.weight);
                    // Word wrap for long text
                    if (l.text.length > 30) {
                        var words = l.text.split(' ');
                        var line1 = '', line2 = '';
                        for (var i = 0; i < words.length; i++) {
                            if ((line1 + ' ' + words[i]).length < 30) {
                                line1 += (line1 ? ' ' : '') + words[i];
                            } else {
                                line2 += (line2 ? ' ' : '') + words[i];
                            }
                        }
                        t.textContent = line1;
                        g.appendChild(t);
                        if (line2) {
                            var t2 = createEl('text', { x: cx2 + 12, y: parseFloat(l.y) + 13, fill: l.fill, 'font-family': l.family || 'Nunito, sans-serif', 'font-size': l.size });
                            t2.textContent = line2;
                            g.appendChild(t2);
                        }
                    } else {
                        t.textContent = l.text;
                        g.appendChild(t);
                    }
                });

                // Close button
                var closeG = createEl('g', { transform: 'translate(' + (cx2 + cardW - 25) + ',' + (cy2 + 5) + ')', style: 'cursor:pointer' });
                closeG.classList.add('interactive');
                var closeBg = createEl('rect', { width: '20', height: '20', rx: '4', fill: 'rgba(255,255,255,0.1)' });
                var closeX = createEl('text', { x: '10', y: '15', 'text-anchor': 'middle', fill: '#e11d48', 'font-family': 'sans-serif', 'font-size': '14' });
                closeX.textContent = '\u00D7';
                closeG.appendChild(closeBg); closeG.appendChild(closeX);
                g.appendChild(closeG);

                closeG.addEventListener('click', function() {
                    cardGroup.removeChild(g);
                    delete openCards[planet.name];
                });

                cardGroup.appendChild(g);
                openCards[planet.name] = g;
            }

            // Click handling on canvas
            canvas.style.pointerEvents = 'all';
            canvas.addEventListener('click', function(e) {
                var mx = e.clientX, my = e.clientY;
                var orbitScale = Math.min(W, H) * 0.4 / maxDist;

                for (var i = planets.length - 1; i >= 0; i--) {
                    var p = planets[i];
                    var angle = (time / p.period) * Math.PI * 2;
                    var orbitR = p.dist * orbitScale;
                    var px = cx + Math.cos(angle) * orbitR;
                    var py = cy + Math.sin(angle) * orbitR * 0.4; // elliptical view
                    var dist = Math.sqrt((mx - px) * (mx - px) + (my - py) * (my - py));
                    if (dist < p.size + 8) {
                        createInfoCard(p, px, py);
                        return;
                    }
                }
            });

            function resize() {
                W = window.innerWidth; H = window.innerHeight;
                cx = W / 2; cy = H / 2;
                canvas.width = W; canvas.height = H;
                svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
                svg.setAttribute('width', W); svg.setAttribute('height', H);
            }
            var rt; window.addEventListener('resize', function() { clearTimeout(rt); rt = setTimeout(resize, 100); });
            resize();

            function animate() {
                fpsCounter.update();
                time += 0.002;

                ctx.fillStyle = '#0a0e1a';
                ctx.fillRect(0, 0, W, H);

                // Stars background
                if (!animate.stars) {
                    animate.stars = [];
                    for (var i = 0; i < 200; i++) {
                        animate.stars.push({ x: Math.random() * 2000, y: Math.random() * 2000, r: Math.random() * 1.5 + 0.5, b: Math.random() * 0.5 + 0.5 });
                    }
                }
                ctx.fillStyle = 'white';
                for (var i = 0; i < animate.stars.length; i++) {
                    var s = animate.stars[i];
                    ctx.globalAlpha = s.b * (0.7 + 0.3 * Math.sin(time * 2 + i));
                    ctx.fillRect(s.x % W, s.y % H, s.r, s.r);
                }
                ctx.globalAlpha = 1;

                // Sun
                var sunGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 25);
                sunGrad.addColorStop(0, '#ffdd00');
                sunGrad.addColorStop(0.5, '#ff8800');
                sunGrad.addColorStop(1, 'rgba(255,136,0,0)');
                ctx.fillStyle = sunGrad;
                ctx.beginPath();
                ctx.arc(cx, cy, 25, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffdd00';
                ctx.beginPath();
                ctx.arc(cx, cy, 12, 0, Math.PI * 2);
                ctx.fill();

                var orbitScale = Math.min(W, H) * 0.4 / maxDist;

                // Draw orbits and planets
                for (var i = 0; i < planets.length; i++) {
                    var p = planets[i];
                    var orbitR = p.dist * orbitScale;
                    var angle = (time / p.period) * Math.PI * 2;

                    // Orbit ellipse
                    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, orbitR, orbitR * 0.4, 0, 0, Math.PI * 2);
                    ctx.stroke();

                    var px = cx + Math.cos(angle) * orbitR;
                    var py = cy + Math.sin(angle) * orbitR * 0.4;

                    // Saturn rings
                    if (p.rings) {
                        ctx.strokeStyle = 'rgba(232,213,160,0.4)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.ellipse(px, py, p.size + 6, (p.size + 6) * 0.3, 0.3, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.ellipse(px, py, p.size + 9, (p.size + 9) * 0.3, 0.3, 0, Math.PI * 2);
                        ctx.stroke();
                    }

                    // Planet
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(px, py, p.size, 0, Math.PI * 2);
                    ctx.fill();

                    // Planet name label
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.font = '10px Nunito, sans-serif';
                    ctx.fillText(p.name, px + p.size + 4, py + 4);

                    // Update orbit label position
                    orbitLabels[i].setAttribute('x', cx + orbitR + 5);
                    orbitLabels[i].setAttribute('y', cy + 4);
                }

                requestAnimationFrame(animate);
            }

            hideLoading();
            animate();
        } catch(e) { showError('Init Error: ' + e.message); }
    </script>
</body>
</html>
