<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Sandbox - Hybrid Canvas+SVG</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; font-family:'Nunito',sans-serif; background:#0a0e1a; color:#e8e6e1; }
        .back-link { position:fixed; top:10px; left:10px; padding:8px 16px; background:rgba(0,0,0,0.7); color:var(--earth); text-decoration:none; border-radius:6px; font-size:14px; font-family:'Nunito',sans-serif; z-index:999; transition:all 0.3s ease; }
        .back-link:hover { background:rgba(221,161,94,0.2); transform:translateX(-4px); }
        #fps-counter { position:fixed; top:10px; right:10px; background:rgba(0,0,0,0.7); color:var(--earth); padding:8px 12px; border-radius:6px; font-family:'Courier New',monospace; font-size:14px; z-index:999; }
        .fps-good{color:#10b981} .fps-medium{color:#fbbf24} .fps-poor{color:#e11d48}
        #hybrid-container { position:relative; width:100vw; height:100vh; }
        #canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
        #svg-overlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }
        .interactive { pointer-events:all; cursor:pointer; }
        .svg-label { font-family:'Nunito',sans-serif; font-size:12px; fill:rgba(255,255,255,0.8); pointer-events:none; }
        .svg-title { font-family:'Lora',serif; font-size:16px; fill:var(--earth); pointer-events:none; }
        #loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:1000; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--earth); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #error { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(225,29,72,0.9); color:white; padding:2rem; border-radius:12px; text-align:center; max-width:400px; z-index:1001; }
        #error h2 { font-family:'Lora',serif; margin:0 0 1rem 0; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading Matter.js...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message"></p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"><defs></defs></svg>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
    window.addEventListener('error', (e) => { showError('Runtime Error: ' + e.message); });
    function showError(m) { document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='block'; document.getElementById('error-message').textContent=m; }
    function hideLoading() { document.getElementById('loading').style.display='none'; }

    class FPSCounter {
        constructor(){this.fps=0;this.frames=0;this.lastTime=performance.now();this.el=document.getElementById('fps-value');}
        update(){this.frames++;const n=performance.now(),d=n-this.lastTime;if(d>=1000){this.fps=Math.round(this.frames*1000/d);this.frames=0;this.lastTime=n;this.el.textContent=this.fps;this.el.className=this.fps>=55?'fps-good':this.fps>=30?'fps-medium':'fps-poor';}}
    }

    if (typeof Matter === 'undefined') {
        showError('Failed to load Matter.js. Please check your internet connection.');
    } else {
    try {
        const canvasEl = document.getElementById('canvas');
        const ctx = canvasEl.getContext('2d');
        const svgEl = document.getElementById('svg-overlay');
        const ns = 'http://www.w3.org/2000/svg';
        const fpsCounter = new FPSCounter();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        let W, H;

        const { Engine, World, Bodies, Body, Composite, Mouse, MouseConstraint, Events } = Matter;
        const engine = Engine.create();
        let walls = [];
        let objectCount = 0;
        let selectedBody = null;
        let tool = 'circle';
        let gravityAngle = -Math.PI / 2; // downward

        function createWalls() {
            Composite.clear(engine.world, false, true);
            walls = [
                Bodies.rectangle(W / 2, H + 25, W + 100, 50, { isStatic: true }),
                Bodies.rectangle(-25, H / 2, 50, H + 100, { isStatic: true }),
                Bodies.rectangle(W + 25, H / 2, 50, H + 100, { isStatic: true }),
                Bodies.rectangle(W / 2, -25, W + 100, 50, { isStatic: true })
            ];
            Composite.add(engine.world, walls);
            objectCount = 0;
        }

        function spawnBody(x, y, type) {
            const hue = Math.random() * 360;
            let body;
            if (type === 'circle') {
                const r = 15 + Math.random() * 20;
                body = Bodies.circle(x, y, r, { restitution: 0.6, friction: 0.3 });
            } else if (type === 'rectangle') {
                const w = 20 + Math.random() * 40, h = 20 + Math.random() * 40;
                body = Bodies.rectangle(x, y, w, h, { restitution: 0.5, friction: 0.4 });
            } else {
                const sides = 5 + Math.floor(Math.random() * 4);
                const r = 15 + Math.random() * 20;
                body = Bodies.polygon(x, y, sides, r, { restitution: 0.5, friction: 0.3 });
            }
            body._hue = hue;
            Composite.add(engine.world, body);
            objectCount++;
        }

        function drawBodies() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, W, H);

            const bodies = Composite.allBodies(engine.world);
            for (const b of bodies) {
                if (b.isStatic) {
                    ctx.beginPath();
                    const verts = b.vertices;
                    ctx.moveTo(verts[0].x, verts[0].y);
                    for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i].x, verts[i].y);
                    ctx.closePath();
                    ctx.fillStyle = '#1a1e2e';
                    ctx.fill();
                    continue;
                }
                const verts = b.vertices;
                ctx.beginPath();
                ctx.moveTo(verts[0].x, verts[0].y);
                for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i].x, verts[i].y);
                ctx.closePath();
                const hue = b._hue || 200;
                const isSelected = b === selectedBody;
                ctx.fillStyle = `hsla(${hue}, 60%, ${isSelected ? 65 : 45}%, 0.85)`;
                ctx.fill();
                ctx.strokeStyle = isSelected ? '#fff' : `hsla(${hue}, 60%, 60%, 0.5)`;
                ctx.lineWidth = isSelected ? 2 : 1;
                ctx.stroke();
            }
        }

        // Mouse interaction
        const mouse = Mouse.create(canvasEl);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });
        Composite.add(engine.world, mouseConstraint);

        canvasEl.addEventListener('click', function(e) {
            if (tool === 'delete') {
                const bodies = Composite.allBodies(engine.world);
                for (const b of bodies) {
                    if (b.isStatic) continue;
                    const dx = e.clientX - b.position.x, dy = e.clientY - b.position.y;
                    if (dx * dx + dy * dy < 900) {
                        Composite.remove(engine.world, b);
                        objectCount--;
                        break;
                    }
                }
            } else {
                spawnBody(e.clientX, e.clientY, tool);
            }
        });

        canvasEl.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            spawnBody(e.clientX, e.clientY, 'rectangle');
        });

        canvasEl.addEventListener('mousemove', function(e) {
            selectedBody = null;
            const bodies = Composite.allBodies(engine.world);
            for (const b of bodies) {
                if (b.isStatic) continue;
                const dx = e.clientX - b.position.x, dy = e.clientY - b.position.y;
                if (dx * dx + dy * dy < 900) { selectedBody = b; break; }
            }
        });

        function createUI() {
            svgEl.innerHTML = '';
            const d = document.createElementNS(ns, 'defs'); svgEl.appendChild(d);

            const title = document.createElementNS(ns, 'text');
            title.setAttribute('class', 'svg-title');
            title.setAttribute('x', W / 2); title.setAttribute('y', 28);
            title.setAttribute('text-anchor', 'middle');
            title.textContent = 'Physics Sandbox (Matter.js)';
            svgEl.appendChild(title);

            // Inspector panel
            const inspectorFo = document.createElementNS(ns, 'foreignObject');
            inspectorFo.setAttribute('id', 'inspector-fo');
            inspectorFo.setAttribute('x', W - 210); inspectorFo.setAttribute('y', 50);
            inspectorFo.setAttribute('width', 200); inspectorFo.setAttribute('height', 120);
            inspectorFo.setAttribute('style', 'display:none');
            inspectorFo.innerHTML = `
                <div xmlns="http://www.w3.org/1999/xhtml" id="inspector-panel" style="background:rgba(0,0,0,0.85);padding:10px;border-radius:8px;font-family:Nunito,sans-serif;font-size:11px;color:#e8e6e1;border:1px solid rgba(221,161,94,0.3);">
                    <div style="color:#DDA15E;font-weight:600;margin-bottom:4px;">Inspector</div>
                    <div id="insp-mass">Mass: -</div>
                    <div id="insp-vel">Velocity: -</div>
                    <div id="insp-angvel">Angular Vel: -</div>
                    <div id="insp-friction">Friction: -</div>
                    <div id="insp-restitution">Restitution: -</div>
                </div>
            `;
            svgEl.appendChild(inspectorFo);

            // Controls
            const fo = document.createElementNS(ns, 'foreignObject');
            fo.setAttribute('x', 10); fo.setAttribute('y', H - 100);
            fo.setAttribute('width', 400); fo.setAttribute('height', 90);
            fo.setAttribute('class', 'interactive');
            fo.innerHTML = `
                <div xmlns="http://www.w3.org/1999/xhtml" style="background:rgba(0,0,0,0.75);padding:10px 14px;border-radius:10px;font-family:Nunito,sans-serif;font-size:12px;display:flex;flex-direction:column;gap:6px;">
                    <div style="display:flex;gap:6px;align-items:center;">
                        <span style="color:#DDA15E;">Tool:</span>
                        <button class="tool-btn" data-tool="circle" style="padding:3px 10px;border:1px solid #DDA15E;background:rgba(0,0,0,0.5);color:#DDA15E;border-radius:4px;cursor:pointer;font-size:11px;">Circle</button>
                        <button class="tool-btn" data-tool="rectangle" style="padding:3px 10px;border:1px solid #666;background:rgba(0,0,0,0.5);color:#aaa;border-radius:4px;cursor:pointer;font-size:11px;">Rect</button>
                        <button class="tool-btn" data-tool="polygon" style="padding:3px 10px;border:1px solid #666;background:rgba(0,0,0,0.5);color:#aaa;border-radius:4px;cursor:pointer;font-size:11px;">Polygon</button>
                        <button class="tool-btn" data-tool="delete" style="padding:3px 10px;border:1px solid #666;background:rgba(0,0,0,0.5);color:#aaa;border-radius:4px;cursor:pointer;font-size:11px;">Delete</button>
                        <button id="clear-all" style="padding:3px 10px;border:1px solid #e11d48;background:rgba(0,0,0,0.5);color:#e11d48;border-radius:4px;cursor:pointer;font-size:11px;">Clear All</button>
                    </div>
                    <div style="display:flex;gap:12px;align-items:center;">
                        <span style="color:#aaa;" id="obj-count">Objects: 0</span>
                        <span style="color:#DDA15E;">Gravity:</span>
                        <button id="grav-down" style="padding:2px 8px;border:1px solid #606C38;background:rgba(0,0,0,0.5);color:#8A9A5B;border-radius:3px;cursor:pointer;font-size:11px;">Down</button>
                        <button id="grav-up" style="padding:2px 8px;border:1px solid #666;background:rgba(0,0,0,0.5);color:#aaa;border-radius:3px;cursor:pointer;font-size:11px;">Up</button>
                        <button id="grav-left" style="padding:2px 8px;border:1px solid #666;background:rgba(0,0,0,0.5);color:#aaa;border-radius:3px;cursor:pointer;font-size:11px;">Left</button>
                        <button id="grav-right" style="padding:2px 8px;border:1px solid #666;background:rgba(0,0,0,0.5);color:#aaa;border-radius:3px;cursor:pointer;font-size:11px;">Right</button>
                        <button id="grav-none" style="padding:2px 8px;border:1px solid #666;background:rgba(0,0,0,0.5);color:#aaa;border-radius:3px;cursor:pointer;font-size:11px;">None</button>
                    </div>
                </div>
            `;
            svgEl.appendChild(fo);
        }

        function bindUI() {
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    tool = this.dataset.tool;
                    document.querySelectorAll('.tool-btn').forEach(b => { b.style.color = '#aaa'; b.style.borderColor = '#666'; });
                    this.style.color = '#DDA15E'; this.style.borderColor = '#DDA15E';
                });
            });
            document.getElementById('clear-all').addEventListener('click', createWalls);

            const gravBtns = { 'grav-down': [0, 1], 'grav-up': [0, -1], 'grav-left': [-1, 0], 'grav-right': [1, 0], 'grav-none': [0, 0] };
            Object.entries(gravBtns).forEach(([id, [gx, gy]]) => {
                document.getElementById(id).addEventListener('click', function() {
                    engine.gravity.x = gx; engine.gravity.y = gy;
                    ['grav-down','grav-up','grav-left','grav-right','grav-none'].forEach(bid => {
                        document.getElementById(bid).style.color = '#aaa';
                        document.getElementById(bid).style.borderColor = '#666';
                    });
                    this.style.color = '#8A9A5B'; this.style.borderColor = '#606C38';
                });
            });
        }

        function updateInspector() {
            const fo = document.getElementById('inspector-fo');
            if (!fo) return;
            if (selectedBody) {
                fo.style.display = 'block';
                document.getElementById('insp-mass').textContent = 'Mass: ' + selectedBody.mass.toFixed(2);
                document.getElementById('insp-vel').textContent = 'Velocity: (' + selectedBody.velocity.x.toFixed(1) + ', ' + selectedBody.velocity.y.toFixed(1) + ')';
                document.getElementById('insp-angvel').textContent = 'Angular Vel: ' + selectedBody.angularVelocity.toFixed(3);
                document.getElementById('insp-friction').textContent = 'Friction: ' + selectedBody.friction.toFixed(2);
                document.getElementById('insp-restitution').textContent = 'Restitution: ' + selectedBody.restitution.toFixed(2);
            } else {
                fo.style.display = 'none';
            }
            const oc = document.getElementById('obj-count');
            if (oc) oc.textContent = 'Objects: ' + objectCount;
        }

        function resize() {
            const rect = canvasEl.getBoundingClientRect();
            W = rect.width; H = rect.height;
            canvasEl.width = W * dpr; canvasEl.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svgEl.setAttribute('width', W); svgEl.setAttribute('height', H);
            createWalls();
            createUI(); bindUI();
        }

        let resizeTimeout;
        window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 150); });
        resize();

        function animate() {
            fpsCounter.update();
            Engine.update(engine, 1000 / 60);
            drawBodies();
            updateInspector();
            requestAnimationFrame(animate);
        }
        hideLoading();
        animate();
    } catch (err) { showError('Init Error: ' + err.message); }
    }
    </script>
</body>
</html>
