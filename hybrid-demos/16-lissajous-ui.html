<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lissajous UI - Hybrid Canvas+SVG</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; font-family:'Nunito',sans-serif; background:#0a0e1a; color:#e8e6e1; }
        .back-link { position:fixed; top:10px; left:10px; padding:8px 16px; background:rgba(0,0,0,0.7); color:var(--earth); text-decoration:none; border-radius:6px; font-size:14px; font-family:'Nunito',sans-serif; z-index:999; transition:all 0.3s ease; }
        .back-link:hover { background:rgba(221,161,94,0.2); transform:translateX(-4px); }
        #fps-counter { position:fixed; top:10px; right:10px; background:rgba(0,0,0,0.7); color:var(--earth); padding:8px 12px; border-radius:6px; font-family:'Courier New',monospace; font-size:14px; z-index:999; }
        .fps-good{color:#10b981} .fps-medium{color:#fbbf24} .fps-poor{color:#e11d48}
        #hybrid-container { position:relative; width:100vw; height:100vh; }
        #canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
        #svg-overlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }
        .interactive { pointer-events:all; cursor:pointer; }
        .svg-label { font-family:'Nunito',sans-serif; font-size:12px; fill:rgba(255,255,255,0.8); pointer-events:none; }
        .svg-title { font-family:'Lora',serif; font-size:16px; fill:var(--earth); pointer-events:none; }
        #loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:1000; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--earth); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #error { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(225,29,72,0.9); color:white; padding:2rem; border-radius:12px; text-align:center; max-width:400px; z-index:1001; }
        #error h2 { font-family:'Lora',serif; margin:0 0 1rem 0; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message"></p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"><defs></defs></svg>
    </div>
    <script>
    window.addEventListener('error', (e) => { showError('Runtime Error: ' + e.message); });
    function showError(m) { document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='block'; document.getElementById('error-message').textContent=m; }
    function hideLoading() { document.getElementById('loading').style.display='none'; }

    class FPSCounter {
        constructor(){this.fps=0;this.frames=0;this.lastTime=performance.now();this.el=document.getElementById('fps-value');}
        update(){this.frames++;const n=performance.now(),d=n-this.lastTime;if(d>=1000){this.fps=Math.round(this.frames*1000/d);this.frames=0;this.lastTime=n;this.el.textContent=this.fps;this.el.className=this.fps>=55?'fps-good':this.fps>=30?'fps-medium':'fps-poor';}}
    }

    try {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const svg = document.getElementById('svg-overlay');
        const ns = 'http://www.w3.org/2000/svg';
        const fpsCounter = new FPSCounter();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        let W, H;

        let wx = 3, wy = 2, phase = Math.PI / 2;
        let trailLen = 1000;
        let speedMul = 1;
        let t = 0;
        let trail = [];

        const presets = [
            { name: 'Circle', wx: 1, wy: 1, phase: Math.PI / 2 },
            { name: 'Figure-8', wx: 1, wy: 2, phase: 0 },
            { name: '3-Leaf', wx: 1, wy: 3, phase: Math.PI / 2 },
            { name: 'Bow', wx: 2, wy: 3, phase: 0 },
            { name: 'Star', wx: 3, wy: 4, phase: Math.PI / 4 },
            { name: 'Complex', wx: 5, wy: 4, phase: Math.PI / 3 }
        ];

        function drawTrail() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, W, H);

            const cx = W / 2, cy = H / 2;
            const amp = Math.min(W, H) * 0.35;

            // Update trail
            const x = cx + amp * Math.sin(wx * t + phase);
            const y = cy + amp * Math.sin(wy * t);
            trail.push({ x, y, t });
            if (trail.length > trailLen) trail.shift();

            // Draw trail
            if (trail.length > 1) {
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                for (let i = 1; i < trail.length; i++) {
                    const alpha = i / trail.length;
                    const hue = (trail[i].t * 30) % 360;
                    ctx.beginPath();
                    ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
                    ctx.lineTo(trail[i].x, trail[i].y);
                    ctx.strokeStyle = `hsla(${hue}, 75%, 60%, ${alpha * 0.9})`;
                    ctx.stroke();
                }
            }

            // Current point
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.shadowColor = '#DDA15E';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function createUI() {
            svg.innerHTML = '';
            const d = document.createElementNS(ns, 'defs'); svg.appendChild(d);

            // Title
            const title = document.createElementNS(ns, 'text');
            title.setAttribute('class', 'svg-title');
            title.setAttribute('x', W / 2); title.setAttribute('y', 28);
            title.setAttribute('text-anchor', 'middle');
            title.textContent = 'Lissajous Curves';
            svg.appendChild(title);

            // Equation
            const eq = document.createElementNS(ns, 'text');
            eq.setAttribute('id', 'equation');
            eq.setAttribute('class', 'svg-label');
            eq.setAttribute('x', W / 2); eq.setAttribute('y', 50);
            eq.setAttribute('text-anchor', 'middle');
            eq.setAttribute('fill', 'rgba(255,255,255,0.6)');
            eq.setAttribute('font-size', '14px');
            svg.appendChild(eq);

            // Controls panel
            const fo = document.createElementNS(ns, 'foreignObject');
            fo.setAttribute('x', 10); fo.setAttribute('y', H - 240);
            fo.setAttribute('width', 220); fo.setAttribute('height', 232);
            fo.setAttribute('class', 'interactive');
            fo.innerHTML = `
                <div xmlns="http://www.w3.org/1999/xhtml" style="background:rgba(0,0,0,0.8);padding:12px;border-radius:10px;font-family:Nunito,sans-serif;color:#e8e6e1;font-size:12px;">
                    <div style="margin-bottom:6px;"><label style="color:#DDA15E;">Freq X (wx): <span id="wx-val">${wx}</span></label><br>
                    <input type="range" id="wx-slider" min="1" max="6" step="1" value="${wx}" style="width:100%;"></div>
                    <div style="margin-bottom:6px;"><label style="color:#DDA15E;">Freq Y (wy): <span id="wy-val">${wy}</span></label><br>
                    <input type="range" id="wy-slider" min="1" max="6" step="1" value="${wy}" style="width:100%;"></div>
                    <div style="margin-bottom:6px;"><label style="color:#DDA15E;">Phase (d): <span id="ph-val">${(phase / Math.PI).toFixed(2)}p</span></label><br>
                    <input type="range" id="ph-slider" min="0" max="6.283" step="0.05" value="${phase}" style="width:100%;"></div>
                    <div style="margin-bottom:6px;"><label style="color:#DDA15E;">Trail: <span id="trail-val">${trailLen}</span></label><br>
                    <input type="range" id="trail-slider" min="100" max="3000" step="100" value="${trailLen}" style="width:100%;"></div>
                    <div style="margin-bottom:6px;"><label style="color:#DDA15E;">Speed: <span id="spd-val">${speedMul}</span></label><br>
                    <input type="range" id="spd-slider" min="0.2" max="3" step="0.1" value="${speedMul}" style="width:100%;"></div>
                    <div style="display:flex;flex-wrap:wrap;gap:4px;" id="presets-container"></div>
                </div>
            `;
            svg.appendChild(fo);
        }

        function bindUI() {
            document.getElementById('wx-slider').addEventListener('input', function() { wx = parseInt(this.value); document.getElementById('wx-val').textContent = wx; trail = []; });
            document.getElementById('wy-slider').addEventListener('input', function() { wy = parseInt(this.value); document.getElementById('wy-val').textContent = wy; trail = []; });
            document.getElementById('ph-slider').addEventListener('input', function() { phase = parseFloat(this.value); document.getElementById('ph-val').textContent = (phase / Math.PI).toFixed(2) + 'p'; trail = []; });
            document.getElementById('trail-slider').addEventListener('input', function() { trailLen = parseInt(this.value); document.getElementById('trail-val').textContent = trailLen; });
            document.getElementById('spd-slider').addEventListener('input', function() { speedMul = parseFloat(this.value); document.getElementById('spd-val').textContent = speedMul.toFixed(1); });

            const container = document.getElementById('presets-container');
            presets.forEach(p => {
                const btn = document.createElement('button');
                btn.textContent = p.name;
                btn.style.cssText = 'padding:2px 8px;border:1px solid #606C38;background:rgba(0,0,0,0.5);color:#8A9A5B;border-radius:3px;cursor:pointer;font-size:10px;';
                btn.addEventListener('click', function() {
                    wx = p.wx; wy = p.wy; phase = p.phase; trail = [];
                    document.getElementById('wx-slider').value = wx;
                    document.getElementById('wy-slider').value = wy;
                    document.getElementById('ph-slider').value = phase;
                    document.getElementById('wx-val').textContent = wx;
                    document.getElementById('wy-val').textContent = wy;
                    document.getElementById('ph-val').textContent = (phase / Math.PI).toFixed(2) + 'p';
                });
                container.appendChild(btn);
            });
        }

        function updateEquation() {
            const eq = document.getElementById('equation');
            if (eq) eq.textContent = `x = sin(${wx}t + ${(phase / Math.PI).toFixed(2)}pi)   y = sin(${wy}t)`;
        }

        function resize() {
            const rect = canvas.getBoundingClientRect();
            W = rect.width; H = rect.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svg.setAttribute('width', W); svg.setAttribute('height', H);
            createUI(); bindUI();
            trail = [];
        }

        let resizeTimeout;
        window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 150); });
        resize();

        function animate() {
            fpsCounter.update();
            t += 0.015 * speedMul;
            drawTrail();
            updateEquation();
            requestAnimationFrame(animate);
        }
        hideLoading();
        animate();
    } catch (err) { showError('Init Error: ' + err.message); }
    </script>
</body>
</html>
