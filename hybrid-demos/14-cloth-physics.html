<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloth Physics - Hybrid Canvas+SVG</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background: #0a0e1a;
            color: #e8e6e1;
        }
        .back-link {
            position: fixed; top: 10px; left: 10px; padding: 8px 16px;
            background: rgba(0,0,0,0.7); color: var(--earth);
            text-decoration: none; border-radius: 6px; font-size: 14px;
            font-family: 'Nunito', sans-serif; z-index: 999; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(221,161,94,0.2); transform: translateX(-4px); }
        #fps-counter {
            position: fixed; top: 10px; right: 10px;
            background: rgba(0,0,0,0.7); color: var(--earth);
            padding: 8px 12px; border-radius: 6px;
            font-family: 'Courier New', monospace; font-size: 14px; z-index: 999;
        }
        .fps-good { color: #10b981; }
        .fps-medium { color: #fbbf24; }
        .fps-poor { color: #e11d48; }
        #hybrid-container { position: relative; width: 100vw; height: 100vh; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        #svg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        .interactive { pointer-events: all; cursor: pointer; }
        .svg-label { font-family: 'Nunito', sans-serif; font-size: 12px; fill: rgba(255,255,255,0.8); pointer-events: none; }
        .svg-title { font-family: 'Lora', serif; font-size: 16px; fill: var(--earth); pointer-events: none; }
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            text-align: center; z-index: 1000;
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--earth); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%); background: rgba(225,29,72,0.9);
            color: white; padding: 2rem; border-radius: 12px;
            text-align: center; max-width: 400px; z-index: 1001;
        }
        #error h2 { font-family: 'Lora', serif; margin: 0 0 1rem 0; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message">An unexpected error occurred.</p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg">
            <defs></defs>
            <text class="svg-title" x="50%" y="30" text-anchor="middle">Cloth Physics Simulation</text>
        </svg>
    </div>
    <script>
    window.addEventListener('error', (e) => { showError('Runtime Error: ' + e.message); });
    function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error-message').textContent = msg;
    }
    function hideLoading() { document.getElementById('loading').style.display = 'none'; }

    class FPSCounter {
        constructor() { this.fps = 0; this.frames = 0; this.lastTime = performance.now(); this.el = document.getElementById('fps-value'); }
        update() {
            this.frames++;
            const now = performance.now(), d = now - this.lastTime;
            if (d >= 1000) {
                this.fps = Math.round(this.frames * 1000 / d);
                this.frames = 0; this.lastTime = now;
                this.el.textContent = this.fps;
                this.el.className = this.fps >= 55 ? 'fps-good' : this.fps >= 30 ? 'fps-medium' : 'fps-poor';
            }
        }
    }

    try {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const svg = document.getElementById('svg-overlay');
        const ns = 'http://www.w3.org/2000/svg';
        const fpsCounter = new FPSCounter();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        let W, H;

        // Cloth parameters
        const COLS = 25, ROWS = 25;
        const REST_DIST = 18;
        const GRAVITY = 0.5;
        const DAMPING = 0.99;
        const CONSTRAINT_ITERS = 4;
        let windStrength = 0;
        let stiffness = 1.0;
        let cutMode = false;
        let mouseX = 0, mouseY = 0;

        // Particle system
        let particles = [];
        let constraints = [];

        function createCloth() {
            particles = [];
            constraints = [];
            const offsetX = (W - (COLS - 1) * REST_DIST) / 2;
            const offsetY = 60;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    particles.push({
                        x: offsetX + c * REST_DIST,
                        y: offsetY + r * REST_DIST,
                        px: offsetX + c * REST_DIST,
                        py: offsetY + r * REST_DIST,
                        pinned: false
                    });
                }
            }
            // Pin top corners
            particles[0].pinned = true;
            particles[COLS - 1].pinned = true;

            // Structural
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const i = r * COLS + c;
                    if (c < COLS - 1) constraints.push({ a: i, b: i + 1, rest: REST_DIST, active: true });
                    if (r < ROWS - 1) constraints.push({ a: i, b: i + COLS, rest: REST_DIST, active: true });
                    // Shear
                    if (c < COLS - 1 && r < ROWS - 1) {
                        constraints.push({ a: i, b: i + COLS + 1, rest: REST_DIST * Math.SQRT2, active: true });
                        constraints.push({ a: i + 1, b: i + COLS, rest: REST_DIST * Math.SQRT2, active: true });
                    }
                }
            }
        }

        function simulate() {
            const windForce = windStrength * Math.sin(performance.now() * 0.002);
            for (const p of particles) {
                if (p.pinned) continue;
                const vx = (p.x - p.px) * DAMPING;
                const vy = (p.y - p.py) * DAMPING;
                p.px = p.x;
                p.py = p.y;
                p.x += vx + windForce * 0.3;
                p.y += vy + GRAVITY;
            }
            for (let iter = 0; iter < CONSTRAINT_ITERS; iter++) {
                for (const c of constraints) {
                    if (!c.active) continue;
                    const a = particles[c.a], b = particles[c.b];
                    const dx = b.x - a.x, dy = b.y - a.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 0.001) continue;
                    const diff = (c.rest - dist) / dist * stiffness * 0.5;
                    const ox = dx * diff, oy = dy * diff;
                    if (!a.pinned) { a.x -= ox; a.y -= oy; }
                    if (!b.pinned) { b.x += ox; b.y += oy; }
                }
            }
        }

        function drawCloth() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, W, H);

            // Draw triangles
            for (let r = 0; r < ROWS - 1; r++) {
                for (let c = 0; c < COLS - 1; c++) {
                    const i = r * COLS + c;
                    const p1 = particles[i], p2 = particles[i + 1];
                    const p3 = particles[i + COLS], p4 = particles[i + COLS + 1];

                    // Check if constraints exist
                    const t = r / (ROWS - 1);
                    const h = 200 + t * 60;
                    const s = 60 + t * 20;

                    // Triangle 1
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.lineTo(p3.x, p3.y);
                    ctx.closePath();
                    ctx.fillStyle = `hsla(${h}, ${s}%, 45%, 0.7)`;
                    ctx.fill();
                    ctx.strokeStyle = `hsla(${h}, ${s}%, 60%, 0.3)`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();

                    // Triangle 2
                    ctx.beginPath();
                    ctx.moveTo(p2.x, p2.y);
                    ctx.lineTo(p4.x, p4.y);
                    ctx.lineTo(p3.x, p3.y);
                    ctx.closePath();
                    ctx.fillStyle = `hsla(${h + 10}, ${s}%, 40%, 0.7)`;
                    ctx.fill();
                    ctx.strokeStyle = `hsla(${h + 10}, ${s}%, 55%, 0.3)`;
                    ctx.stroke();
                }
            }

            // Draw pinned particles
            for (const p of particles) {
                if (p.pinned) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                    ctx.fillStyle = '#DDA15E';
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }

        // SVG Controls
        function createSVGControls() {
            svg.innerHTML = '';
            const defs = document.createElementNS(ns, 'defs');
            svg.appendChild(defs);

            // Title
            const title = document.createElementNS(ns, 'text');
            title.setAttribute('class', 'svg-title');
            title.setAttribute('x', W / 2);
            title.setAttribute('y', 30);
            title.setAttribute('text-anchor', 'middle');
            title.textContent = 'Cloth Physics Simulation';
            svg.appendChild(title);

            // Control panel
            const panelX = 10, panelY = H - 180;
            const panel = document.createElementNS(ns, 'foreignObject');
            panel.setAttribute('x', panelX);
            panel.setAttribute('y', panelY);
            panel.setAttribute('width', 240);
            panel.setAttribute('height', 170);
            panel.setAttribute('class', 'interactive');
            panel.innerHTML = `
                <div xmlns="http://www.w3.org/1999/xhtml" style="background:rgba(0,0,0,0.75);padding:12px;border-radius:10px;font-family:Nunito,sans-serif;color:#e8e6e1;font-size:13px;">
                    <div style="margin-bottom:8px;">
                        <label style="color:#DDA15E;">Wind: <span id="wind-val">0</span></label><br>
                        <input type="range" id="wind-slider" min="0" max="5" step="0.1" value="0" style="width:100%;">
                    </div>
                    <div style="margin-bottom:8px;">
                        <label style="color:#DDA15E;">Stiffness: <span id="stiff-val">1.0</span></label><br>
                        <input type="range" id="stiff-slider" min="0.1" max="1" step="0.05" value="1" style="width:100%;">
                    </div>
                    <div style="display:flex;gap:6px;flex-wrap:wrap;">
                        <button id="cut-btn" style="padding:4px 10px;border:1px solid #DDA15E;background:rgba(0,0,0,0.5);color:#DDA15E;border-radius:4px;cursor:pointer;font-size:12px;">Cut Tool: OFF</button>
                        <button id="reset-btn" style="padding:4px 10px;border:1px solid #8A9A5B;background:rgba(0,0,0,0.5);color:#8A9A5B;border-radius:4px;cursor:pointer;font-size:12px;">Reset</button>
                    </div>
                    <p style="font-size:10px;color:#888;margin-top:6px;">Click pins to toggle. Cut mode: click to sever.</p>
                </div>
            `;
            svg.appendChild(panel);
        }

        function resize() {
            const rect = canvas.getBoundingClientRect();
            W = rect.width; H = rect.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svg.setAttribute('width', W);
            svg.setAttribute('height', H);
            createSVGControls();
            bindControls();
            createCloth();
        }

        function bindControls() {
            const windSlider = document.getElementById('wind-slider');
            const stiffSlider = document.getElementById('stiff-slider');
            const cutBtn = document.getElementById('cut-btn');
            const resetBtn = document.getElementById('reset-btn');

            if (windSlider) windSlider.addEventListener('input', function() {
                windStrength = parseFloat(this.value);
                document.getElementById('wind-val').textContent = this.value;
            });
            if (stiffSlider) stiffSlider.addEventListener('input', function() {
                stiffness = parseFloat(this.value);
                document.getElementById('stiff-val').textContent = this.value;
            });
            if (cutBtn) cutBtn.addEventListener('click', function() {
                cutMode = !cutMode;
                this.textContent = 'Cut Tool: ' + (cutMode ? 'ON' : 'OFF');
                this.style.color = cutMode ? '#e11d48' : '#DDA15E';
                this.style.borderColor = cutMode ? '#e11d48' : '#DDA15E';
            });
            if (resetBtn) resetBtn.addEventListener('click', function() { createCloth(); });
        }

        canvas.addEventListener('mousemove', function(e) {
            mouseX = e.clientX; mouseY = e.clientY;
        });

        canvas.addEventListener('click', function(e) {
            const x = e.clientX, y = e.clientY;
            if (cutMode) {
                let best = -1, bestD = 30;
                for (let i = 0; i < constraints.length; i++) {
                    if (!constraints[i].active) continue;
                    const a = particles[constraints[i].a], b = particles[constraints[i].b];
                    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
                    const d = Math.sqrt((x - mx) ** 2 + (y - my) ** 2);
                    if (d < bestD) { bestD = d; best = i; }
                }
                if (best >= 0) constraints[best].active = false;
            } else {
                // Toggle pin
                let best = -1, bestD = 20;
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    const d = Math.sqrt((x - p.x) ** 2 + (y - p.y) ** 2);
                    if (d < bestD) { bestD = d; best = i; }
                }
                if (best >= 0) {
                    particles[best].pinned = !particles[best].pinned;
                    if (particles[best].pinned) {
                        particles[best].px = particles[best].x;
                        particles[best].py = particles[best].y;
                    }
                }
            }
        });

        let resizeTimeout;
        window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 150); });
        resize();

        function animate() {
            fpsCounter.update();
            simulate();
            drawCloth();
            requestAnimationFrame(animate);
        }
        hideLoading();
        animate();
    } catch (err) { showError('Init Error: ' + err.message); }
    </script>
</body>
</html>
