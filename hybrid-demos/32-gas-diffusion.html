<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gas Diffusion Simulation + Concentration Gradient - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:#DDA15E;text-decoration:none;border-radius:6px;font-size:14px;z-index:999}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#DDA15E;padding:8px 12px;border-radius:6px;font-size:14px;z-index:999}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <script>
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';

        var W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; init(); buildSVG(); }
        resize();
        window.addEventListener('resize', resize);

        var NUM_PARTICLES = 400;
        var SPEED = 2.2;
        var particles = [];
        var sparks = [];

        function init() {
            particles = [];
            for (var i = 0; i < NUM_PARTICLES; i++) {
                var isRed = i < NUM_PARTICLES/2;
                particles.push({
                    x: isRed ? Math.random()*W*0.48 : W*0.52 + Math.random()*W*0.48,
                    y: Math.random()*H,
                    vx: (Math.random()-0.5)*SPEED*2,
                    vy: (Math.random()-0.5)*SPEED*2,
                    type: isRed ? 0 : 1, // 0=red, 1=blue
                    r: 3
                });
            }
        }

        function step() {
            var memX = W / 2;
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.x += p.vx;
                p.y += p.vy;

                // Wall bounces
                if (p.x < p.r) { p.x = p.r; p.vx *= -1; }
                if (p.x > W-p.r) { p.x = W-p.r; p.vx *= -1; }
                if (p.y < p.r) { p.y = p.r; p.vy *= -1; }
                if (p.y > H-p.r) { p.y = H-p.r; p.vy *= -1; }

                // Membrane: let particles through with 20% probability
                // Detect membrane crossing
                if (p.prevX !== undefined) {
                    var crossed = (p.prevX < memX && p.x >= memX) || (p.prevX > memX && p.x <= memX);
                    if (crossed && Math.random() > 0.2) {
                        p.vx *= -1;
                        p.x = p.prevX;
                        // Spark
                        sparks.push({x: memX, y: p.y, life: 15, type: p.type});
                    }
                }
                p.prevX = p.x;

                // Randomize velocity slightly (thermal motion)
                var speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
                var targetSpeed = SPEED;
                var scale = targetSpeed / Math.max(speed, 0.01);
                p.vx = (p.vx * scale + (Math.random()-0.5)*0.3);
                p.vy = (p.vy * scale + (Math.random()-0.5)*0.3);
            }

            // Update sparks
            sparks = sparks.filter(function(s){ s.life--; return s.life > 0; });
        }

        // Concentration profile chart
        var chartW = 220, chartH = 180;
        var chartX, chartY;
        var chartPanel, chartGroup;
        var redPath, bluePath, concAxisY;
        var BINS = 30;

        function buildSVG() {
            chartX = 20; chartY = 20;
            svg.innerHTML = '';

            chartPanel = document.createElementNS(svgNS, 'rect');
            chartPanel.setAttribute('x', chartX); chartPanel.setAttribute('y', chartY);
            chartPanel.setAttribute('width', chartW); chartPanel.setAttribute('height', chartH + 40);
            chartPanel.setAttribute('rx', '8');
            chartPanel.setAttribute('fill', 'rgba(10,14,26,0.85)');
            chartPanel.setAttribute('stroke', '#DDA15E'); chartPanel.setAttribute('stroke-width', '1.2');
            svg.appendChild(chartPanel);

            var title = document.createElementNS(svgNS, 'text');
            title.setAttribute('x', chartX + chartW/2); title.setAttribute('y', chartY + 18);
            title.setAttribute('text-anchor', 'middle');
            title.setAttribute('fill', '#DDA15E'); title.setAttribute('font-size', '12');
            title.setAttribute('font-family', 'Nunito, sans-serif');
            title.textContent = 'Concentration Profile';
            svg.appendChild(title);

            var ax = document.createElementNS(svgNS, 'line');
            ax.setAttribute('x1', chartX+8); ax.setAttribute('y1', chartY+chartH+5);
            ax.setAttribute('x2', chartX+chartW-8); ax.setAttribute('y2', chartY+chartH+5);
            ax.setAttribute('stroke', '#8A9A5B'); ax.setAttribute('stroke-width', '1');
            svg.appendChild(ax);

            // Membrane marker
            var memLine = document.createElementNS(svgNS, 'line');
            memLine.setAttribute('x1', chartX+chartW/2); memLine.setAttribute('y1', chartY+22);
            memLine.setAttribute('x2', chartX+chartW/2); memLine.setAttribute('y2', chartY+chartH+5);
            memLine.setAttribute('stroke', '#DDA15E'); memLine.setAttribute('stroke-width', '1');
            memLine.setAttribute('stroke-dasharray', '4,3');
            svg.appendChild(memLine);

            chartGroup = document.createElementNS(svgNS, 'g');
            svg.appendChild(chartGroup);

            redPath = document.createElementNS(svgNS, 'polyline');
            redPath.setAttribute('fill', 'none');
            redPath.setAttribute('stroke', '#f87171');
            redPath.setAttribute('stroke-width', '2');
            chartGroup.appendChild(redPath);

            bluePath = document.createElementNS(svgNS, 'polyline');
            bluePath.setAttribute('fill', 'none');
            bluePath.setAttribute('stroke', '#60a5fa');
            bluePath.setAttribute('stroke-width', '2');
            chartGroup.appendChild(bluePath);

            // Legend
            var lr = document.createElementNS(svgNS, 'text');
            lr.setAttribute('x', chartX+10); lr.setAttribute('y', chartY+chartH+25);
            lr.setAttribute('fill', '#f87171'); lr.setAttribute('font-size', '11');
            lr.setAttribute('font-family', 'Nunito, sans-serif');
            lr.textContent = '--- Red gas'; svg.appendChild(lr);
            var lb = document.createElementNS(svgNS, 'text');
            lb.setAttribute('x', chartX+chartW/2); lb.setAttribute('y', chartY+chartH+25);
            lb.setAttribute('fill', '#60a5fa'); lb.setAttribute('font-size', '11');
            lb.setAttribute('font-family', 'Nunito, sans-serif');
            lb.textContent = '--- Blue gas'; svg.appendChild(lb);

            // X labels
            var xl0 = document.createElementNS(svgNS, 'text');
            xl0.setAttribute('x', chartX+12); xl0.setAttribute('y', chartY+chartH+16);
            xl0.setAttribute('fill', '#8A9A5B'); xl0.setAttribute('font-size', '9');
            xl0.setAttribute('font-family', 'Nunito, sans-serif');
            xl0.textContent = 'Left'; svg.appendChild(xl0);
            var xl1 = document.createElementNS(svgNS, 'text');
            xl1.setAttribute('x', chartX+chartW-12); xl1.setAttribute('y', chartY+chartH+16);
            xl1.setAttribute('text-anchor', 'end');
            xl1.setAttribute('fill', '#8A9A5B'); xl1.setAttribute('font-size', '9');
            xl1.setAttribute('font-family', 'Nunito, sans-serif');
            xl1.textContent = 'Right'; svg.appendChild(xl1);
        }

        function updateChart() {
            var redBins = new Array(BINS).fill(0);
            var blueBins = new Array(BINS).fill(0);
            for (var i = 0; i < particles.length; i++) {
                var bin = Math.floor((particles[i].x / W) * BINS);
                if (bin >= BINS) bin = BINS-1;
                if (particles[i].type === 0) redBins[bin]++;
                else blueBins[bin]++;
            }
            var maxCount = Math.max(1, Math.max.apply(null, redBins.concat(blueBins)));
            var availW = chartW - 18, availH = chartH - 28;
            var rPts = '', bPts = '';
            for (var i = 0; i < BINS; i++) {
                var xi = chartX + 9 + (i+0.5)/BINS * availW;
                var yr = chartY + chartH + 5 - (redBins[i]/maxCount) * availH;
                var yb = chartY + chartH + 5 - (blueBins[i]/maxCount) * availH;
                rPts += xi.toFixed(1)+','+yr.toFixed(1)+' ';
                bPts += xi.toFixed(1)+','+yb.toFixed(1)+' ';
            }
            redPath.setAttribute('points', rPts);
            bluePath.setAttribute('points', bPts);
        }

        function draw() {
            ctx.fillStyle = 'rgba(10,14,26,0.55)';
            ctx.fillRect(0, 0, W, H);

            // Membrane
            ctx.strokeStyle = 'rgba(221,161,94,0.6)';
            ctx.lineWidth = 2;
            ctx.setLineDash([8,6]);
            ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
            ctx.setLineDash([]);

            // Background gradient
            var gl = ctx.createLinearGradient(0,0,W,0);
            gl.addColorStop(0, 'rgba(200,60,60,0.04)');
            gl.addColorStop(0.5, 'rgba(0,0,0,0)');
            gl.addColorStop(1, 'rgba(60,100,200,0.04)');
            ctx.fillStyle = gl;
            ctx.fillRect(0,0,W,H);

            // Sparks
            for (var s = 0; s < sparks.length; s++) {
                var sp = sparks[s];
                var col = sp.type === 0 ? '#f87171' : '#60a5fa';
                ctx.beginPath();
                ctx.arc(sp.x, sp.y, 3 * (sp.life/15), 0, Math.PI*2);
                ctx.fillStyle = col;
                ctx.globalAlpha = sp.life/15;
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            // Particles
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                if (p.type === 0) {
                    ctx.fillStyle = '#f87171';
                    ctx.shadowColor = '#f87171';
                } else {
                    ctx.fillStyle = '#60a5fa';
                    ctx.shadowColor = '#60a5fa';
                }
                ctx.shadowBlur = 4;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Membrane label
            ctx.fillStyle = 'rgba(221,161,94,0.9)';
            ctx.font = '11px Nunito';
            ctx.textAlign = 'center';
            ctx.fillText('MEMBRANE', W/2, 20);
            ctx.textAlign = 'left';
        }

        var fpsCount = 0, fpsLast = performance.now();
        var fpsEl = document.getElementById('fps-value');
        var frame = 0;

        function animate() {
            requestAnimationFrame(animate);
            step();
            draw();
            if (frame % 4 === 0) updateChart();
            frame++;
            fpsCount++;
            var now = performance.now();
            if (now - fpsLast >= 1000) { fpsEl.textContent = fpsCount; fpsCount = 0; fpsLast = now; }
        }
        animate();
    </script>
</body>
</html>
