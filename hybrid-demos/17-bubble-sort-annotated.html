<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithms Annotated - Hybrid Canvas+SVG</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; font-family:'Nunito',sans-serif; background:#0a0e1a; color:#e8e6e1; }
        .back-link { position:fixed; top:10px; left:10px; padding:8px 16px; background:rgba(0,0,0,0.7); color:var(--earth); text-decoration:none; border-radius:6px; font-size:14px; font-family:'Nunito',sans-serif; z-index:999; transition:all 0.3s ease; }
        .back-link:hover { background:rgba(221,161,94,0.2); transform:translateX(-4px); }
        #fps-counter { position:fixed; top:10px; right:10px; background:rgba(0,0,0,0.7); color:var(--earth); padding:8px 12px; border-radius:6px; font-family:'Courier New',monospace; font-size:14px; z-index:999; }
        .fps-good{color:#10b981} .fps-medium{color:#fbbf24} .fps-poor{color:#e11d48}
        #hybrid-container { position:relative; width:100vw; height:100vh; }
        #canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
        #svg-overlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }
        .interactive { pointer-events:all; cursor:pointer; }
        .svg-label { font-family:'Nunito',sans-serif; font-size:12px; fill:rgba(255,255,255,0.8); pointer-events:none; }
        .svg-title { font-family:'Lora',serif; font-size:16px; fill:var(--earth); pointer-events:none; }
        #loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:1000; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--earth); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #error { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(225,29,72,0.9); color:white; padding:2rem; border-radius:12px; text-align:center; max-width:400px; z-index:1001; }
        #error h2 { font-family:'Lora',serif; margin:0 0 1rem 0; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message"></p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"><defs></defs></svg>
    </div>
    <script>
    window.addEventListener('error', (e) => { showError('Runtime Error: ' + e.message); });
    function showError(m) { document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='block'; document.getElementById('error-message').textContent=m; }
    function hideLoading() { document.getElementById('loading').style.display='none'; }

    class FPSCounter {
        constructor(){this.fps=0;this.frames=0;this.lastTime=performance.now();this.el=document.getElementById('fps-value');}
        update(){this.frames++;const n=performance.now(),d=n-this.lastTime;if(d>=1000){this.fps=Math.round(this.frames*1000/d);this.frames=0;this.lastTime=n;this.el.textContent=this.fps;this.el.className=this.fps>=55?'fps-good':this.fps>=30?'fps-medium':'fps-poor';}}
    }

    try {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const svg = document.getElementById('svg-overlay');
        const ns = 'http://www.w3.org/2000/svg';
        const fpsCounter = new FPSCounter();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        let W, H;

        const N = 100;
        let stepsPerFrame = 5;
        let paused = false;

        // Bubble sort state
        let bubbleArr = [], bubbleI = 0, bubbleJ = 0, bubblePass = 0;
        let bubbleComps = 0, bubbleSwaps = 0, bubbleDone = false;

        // Insertion sort state
        let insertArr = [], insertI = 1, insertJ = 0;
        let insertComps = 0, insertSwaps = 0, insertDone = false;

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function resetArrays() {
            bubbleArr = []; insertArr = [];
            for (let i = 0; i < N; i++) bubbleArr.push(i + 1);
            shuffle(bubbleArr);
            insertArr = bubbleArr.slice();
            bubbleI = 0; bubbleJ = 0; bubblePass = 0;
            bubbleComps = 0; bubbleSwaps = 0; bubbleDone = false;
            insertI = 1; insertJ = 0;
            insertComps = 0; insertSwaps = 0; insertDone = false;
        }

        function stepBubble() {
            if (bubbleDone) return;
            bubbleComps++;
            if (bubbleArr[bubbleJ] > bubbleArr[bubbleJ + 1]) {
                [bubbleArr[bubbleJ], bubbleArr[bubbleJ + 1]] = [bubbleArr[bubbleJ + 1], bubbleArr[bubbleJ]];
                bubbleSwaps++;
            }
            bubbleJ++;
            if (bubbleJ >= N - 1 - bubblePass) {
                bubbleJ = 0;
                bubblePass++;
                if (bubblePass >= N - 1) bubbleDone = true;
            }
        }

        function stepInsert() {
            if (insertDone) return;
            insertComps++;
            if (insertJ > 0 && insertArr[insertJ - 1] > insertArr[insertJ]) {
                [insertArr[insertJ - 1], insertArr[insertJ]] = [insertArr[insertJ], insertArr[insertJ - 1]];
                insertSwaps++;
                insertJ--;
            } else {
                insertI++;
                if (insertI >= N) { insertDone = true; return; }
                insertJ = insertI;
            }
        }

        function drawBars(arr, x0, barW, maxH, topY, highlightA, highlightB) {
            for (let i = 0; i < arr.length; i++) {
                const h = (arr[i] / N) * maxH;
                const bx = x0 + i * barW;
                const by = topY + maxH - h;
                const hue = (arr[i] / N) * 300;
                if (i === highlightA || i === highlightB) {
                    ctx.fillStyle = '#fff';
                    ctx.shadowColor = '#fff';
                    ctx.shadowBlur = 8;
                } else {
                    ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
                    ctx.shadowBlur = 0;
                }
                ctx.fillRect(bx, by, Math.max(barW - 1, 1), h);
                ctx.shadowBlur = 0;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, W, H);

            const gap = 40;
            const halfW = (W - gap) / 2;
            const barW = halfW / N;
            const maxH = H - 120;
            const topY = 70;

            // Divider
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(W / 2, topY);
            ctx.lineTo(W / 2, topY + maxH);
            ctx.stroke();

            // Bubble sort bars
            drawBars(bubbleArr, 10, barW, maxH, topY, bubbleJ, bubbleJ + 1);

            // Insertion sort bars
            drawBars(insertArr, W / 2 + gap / 2, barW, maxH, topY, insertJ, insertJ - 1);
        }

        function createUI() {
            svg.innerHTML = '';
            const d = document.createElementNS(ns, 'defs'); svg.appendChild(d);

            // Left title
            const t1 = document.createElementNS(ns, 'text');
            t1.setAttribute('class', 'svg-title'); t1.setAttribute('x', W / 4);
            t1.setAttribute('y', 28); t1.setAttribute('text-anchor', 'middle');
            t1.textContent = 'Bubble Sort O(n\u00B2)';
            svg.appendChild(t1);

            // Right title
            const t2 = document.createElementNS(ns, 'text');
            t2.setAttribute('class', 'svg-title'); t2.setAttribute('x', W * 3 / 4);
            t2.setAttribute('y', 28); t2.setAttribute('text-anchor', 'middle');
            t2.textContent = 'Insertion Sort O(n\u00B2)';
            svg.appendChild(t2);

            // Stats
            const makeStats = (id, x, y) => {
                const txt = document.createElementNS(ns, 'text');
                txt.setAttribute('id', id); txt.setAttribute('class', 'svg-label');
                txt.setAttribute('x', x); txt.setAttribute('y', y);
                txt.setAttribute('text-anchor', 'middle');
                svg.appendChild(txt);
                return txt;
            };
            makeStats('bubble-stats', W / 4, 52);
            makeStats('insert-stats', W * 3 / 4, 52);

            // Controls
            const fo = document.createElementNS(ns, 'foreignObject');
            fo.setAttribute('x', W / 2 - 170); fo.setAttribute('y', H - 50);
            fo.setAttribute('width', 340); fo.setAttribute('height', 44);
            fo.setAttribute('class', 'interactive');
            fo.innerHTML = `
                <div xmlns="http://www.w3.org/1999/xhtml" style="background:rgba(0,0,0,0.75);padding:8px 14px;border-radius:10px;font-family:Nunito,sans-serif;display:flex;gap:8px;align-items:center;justify-content:center;">
                    <button id="pause-btn" style="padding:4px 12px;border:1px solid #DDA15E;background:rgba(0,0,0,0.5);color:#DDA15E;border-radius:4px;cursor:pointer;font-size:12px;">Pause</button>
                    <button id="reset-btn" style="padding:4px 12px;border:1px solid #8A9A5B;background:rgba(0,0,0,0.5);color:#8A9A5B;border-radius:4px;cursor:pointer;font-size:12px;">Reset</button>
                    <button id="step-btn" style="padding:4px 12px;border:1px solid #666;background:rgba(0,0,0,0.5);color:#aaa;border-radius:4px;cursor:pointer;font-size:12px;">Step</button>
                    <label style="color:#aaa;font-size:11px;">Speed:</label>
                    <input type="range" id="speed-slider" min="1" max="100" value="${stepsPerFrame}" style="width:80px;">
                </div>
            `;
            svg.appendChild(fo);
        }

        function bindUI() {
            document.getElementById('pause-btn').addEventListener('click', function() {
                paused = !paused;
                this.textContent = paused ? 'Resume' : 'Pause';
            });
            document.getElementById('reset-btn').addEventListener('click', function() { resetArrays(); });
            document.getElementById('step-btn').addEventListener('click', function() {
                stepBubble(); stepInsert();
            });
            document.getElementById('speed-slider').addEventListener('input', function() {
                stepsPerFrame = parseInt(this.value);
            });
        }

        function updateStats() {
            const bs = document.getElementById('bubble-stats');
            const is_ = document.getElementById('insert-stats');
            if (bs) bs.textContent = `Comparisons: ${bubbleComps} | Swaps: ${bubbleSwaps} | Pass: ${bubblePass}${bubbleDone ? ' | DONE' : ''}`;
            if (is_) is_.textContent = `Comparisons: ${insertComps} | Swaps: ${insertSwaps}${insertDone ? ' | DONE' : ''}`;
        }

        function resize() {
            const rect = canvas.getBoundingClientRect();
            W = rect.width; H = rect.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svg.setAttribute('width', W); svg.setAttribute('height', H);
            createUI(); bindUI();
        }

        resetArrays();

        let resizeTimeout;
        window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 150); });
        resize();

        function animate() {
            fpsCounter.update();
            if (!paused) {
                for (let i = 0; i < stepsPerFrame; i++) {
                    stepBubble();
                    stepInsert();
                }
            }
            draw();
            updateStats();
            requestAnimationFrame(animate);
        }
        hideLoading();
        animate();
    } catch (err) { showError('Init Error: ' + err.message); }
    </script>
</body>
</html>
