<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Slit Experiment - Hybrid Canvas+SVG</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; font-family:'Nunito',sans-serif; background:#0a0e1a; color:#e8e6e1; }
        .back-link { position:fixed; top:10px; left:10px; padding:8px 16px; background:rgba(0,0,0,0.7); color:var(--earth); text-decoration:none; border-radius:6px; font-size:14px; font-family:'Nunito',sans-serif; z-index:999; transition:all 0.3s ease; }
        .back-link:hover { background:rgba(221,161,94,0.2); transform:translateX(-4px); }
        #fps-counter { position:fixed; top:10px; right:10px; background:rgba(0,0,0,0.7); color:var(--earth); padding:8px 12px; border-radius:6px; font-family:'Courier New',monospace; font-size:14px; z-index:999; }
        .fps-good{color:#10b981} .fps-medium{color:#fbbf24} .fps-poor{color:#e11d48}
        #hybrid-container { position:relative; width:100vw; height:100vh; }
        #canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
        #svg-overlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }
        .interactive { pointer-events:all; cursor:pointer; }
        .svg-label { font-family:'Nunito',sans-serif; font-size:12px; fill:rgba(255,255,255,0.8); pointer-events:none; }
        .svg-title { font-family:'Lora',serif; font-size:16px; fill:var(--earth); pointer-events:none; }
        #loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:1000; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--earth); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #error { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(225,29,72,0.9); color:white; padding:2rem; border-radius:12px; text-align:center; max-width:400px; z-index:1001; }
        #error h2 { font-family:'Lora',serif; margin:0 0 1rem 0; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message"></p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"><defs></defs></svg>
    </div>
    <script>
    window.addEventListener('error', (e) => { showError('Runtime Error: ' + e.message); });
    function showError(m) { document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='block'; document.getElementById('error-message').textContent=m; }
    function hideLoading() { document.getElementById('loading').style.display='none'; }

    class FPSCounter {
        constructor(){this.fps=0;this.frames=0;this.lastTime=performance.now();this.el=document.getElementById('fps-value');}
        update(){this.frames++;const n=performance.now(),d=n-this.lastTime;if(d>=1000){this.fps=Math.round(this.frames*1000/d);this.frames=0;this.lastTime=n;this.el.textContent=this.fps;this.el.className=this.fps>=55?'fps-good':this.fps>=30?'fps-medium':'fps-poor';}}
    }

    try {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const svgEl = document.getElementById('svg-overlay');
        const ns = 'http://www.w3.org/2000/svg';
        const fpsCounter = new FPSCounter();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        let W, H;

        let slitWidth = 8;
        let slitSep = 50;
        let wavelength = 20;
        let mode = 'wave'; // wave | particle | both
        let t = 0;
        let photonCount = 0;

        // Particle mode accumulation
        let screenHits = [];
        const SCREEN_BINS = 400;

        // Intensity distribution
        function computeIntensity(y, screenX) {
            const barrierX = W * 0.35;
            const cy = H / 2;
            const slit1Y = cy - slitSep / 2;
            const slit2Y = cy + slitSep / 2;

            const L = screenX - barrierX;
            const d1 = Math.sqrt(L * L + (y - slit1Y) ** 2);
            const d2 = Math.sqrt(L * L + (y - slit2Y) ** 2);

            const k = 2 * Math.PI / wavelength;
            const phase1 = k * d1;
            const phase2 = k * d2;

            // Single slit diffraction
            const halfW = slitWidth / 2;
            const sinTheta1 = (y - slit1Y) / d1;
            const sinTheta2 = (y - slit2Y) / d2;
            const alpha1 = k * halfW * sinTheta1;
            const alpha2 = k * halfW * sinTheta2;
            const sinc1 = Math.abs(alpha1) < 0.001 ? 1 : Math.sin(alpha1) / alpha1;
            const sinc2 = Math.abs(alpha2) < 0.001 ? 1 : Math.sin(alpha2) / alpha2;

            // Superposition
            const a1 = sinc1 / Math.sqrt(d1);
            const a2 = sinc2 / Math.sqrt(d2);
            const re = a1 * Math.cos(phase1) + a2 * Math.cos(phase2);
            const im = a1 * Math.sin(phase1) + a2 * Math.sin(phase2);
            return re * re + im * im;
        }

        function sampleFromDistribution() {
            // Rejection sampling from intensity distribution
            const screenX = W * 0.85;
            let maxI = 0;
            for (let y = 0; y < H; y += 4) {
                const v = computeIntensity(y, screenX);
                if (v > maxI) maxI = v;
            }
            for (let attempt = 0; attempt < 100; attempt++) {
                const y = Math.random() * H;
                const v = computeIntensity(y, screenX);
                if (Math.random() < v / maxI) return y;
            }
            return H / 2;
        }

        function resetParticles() {
            screenHits = new Float64Array(SCREEN_BINS);
            photonCount = 0;
        }

        function drawWaveMode() {
            const barrierX = W * 0.35;
            const cy = H / 2;
            const slit1Y = cy - slitSep / 2;
            const slit2Y = cy + slitSep / 2;
            const k = 2 * Math.PI / wavelength;
            const omega = 0.08;

            const STEP = 3;
            const imgData = ctx.createImageData(W, H);
            const data = imgData.data;

            for (let py = 0; py < H; py += STEP) {
                for (let px = 0; px < W; px += STEP) {
                    let val = 0;

                    if (px < barrierX - 5) {
                        // Incoming plane wave
                        val = Math.sin(k * px - omega * t) * 0.5;
                    } else if (px > barrierX + 5) {
                        // Diffracted waves from slits
                        const d1 = Math.sqrt((px - barrierX) ** 2 + (py - slit1Y) ** 2);
                        const d2 = Math.sqrt((px - barrierX) ** 2 + (py - slit2Y) ** 2);
                        const a1 = Math.sin(k * d1 - omega * t) / Math.max(Math.sqrt(d1) * 0.15, 1);
                        const a2 = Math.sin(k * d2 - omega * t) / Math.max(Math.sqrt(d2) * 0.15, 1);
                        val = a1 + a2;
                    }

                    // Color mapping
                    const norm = Math.max(-1, Math.min(1, val * 0.4));
                    let r, g, b;

                    // Map wavelength to visible color
                    const wlNorm = (wavelength - 10) / 90; // 0-1
                    const baseHue = 240 - wlNorm * 240; // blue to red

                    if (norm > 0) {
                        r = 20 + norm * 200;
                        g = 20 + norm * 100;
                        b = 20 + norm * 235;
                    } else {
                        r = 20; g = 20; b = 20;
                    }

                    for (let dy = 0; dy < STEP && py + dy < H; dy++) {
                        for (let dx = 0; dx < STEP && px + dx < W; dx++) {
                            const idx = ((py + dy) * W + (px + dx)) * 4;
                            data[idx] = r; data[idx+1] = g; data[idx+2] = b; data[idx+3] = 255;
                        }
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);

            // Draw barrier
            ctx.fillStyle = '#2a2e3e';
            ctx.fillRect(barrierX - 3, 0, 6, slit1Y - slitWidth / 2);
            ctx.fillRect(barrierX - 3, slit1Y + slitWidth / 2, 6, slit2Y - slitWidth / 2 - slit1Y - slitWidth / 2);
            ctx.fillRect(barrierX - 3, slit2Y + slitWidth / 2, 6, H - slit2Y - slitWidth / 2);
        }

        function drawParticleMode() {
            ctx.fillStyle = 'rgba(10, 14, 26, 0.03)';
            ctx.fillRect(0, 0, W, H);

            const barrierX = W * 0.35;
            const cy = H / 2;
            const slit1Y = cy - slitSep / 2;
            const slit2Y = cy + slitSep / 2;
            const screenX = W * 0.85;

            // Emit photons
            for (let i = 0; i < 5; i++) {
                const y = sampleFromDistribution();
                const bin = Math.floor((y / H) * SCREEN_BINS);
                if (bin >= 0 && bin < SCREEN_BINS) {
                    screenHits[bin]++;
                    photonCount++;
                }

                // Draw dot on screen
                ctx.beginPath();
                ctx.arc(screenX + (Math.random() - 0.5) * 4, y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(200, 180, 255, 0.6)';
                ctx.fill();
            }

            // Draw barrier
            ctx.fillStyle = '#2a2e3e';
            ctx.fillRect(barrierX - 3, 0, 6, slit1Y - slitWidth / 2);
            ctx.fillRect(barrierX - 3, slit1Y + slitWidth / 2, 6, slit2Y - slitWidth / 2 - slit1Y - slitWidth / 2);
            ctx.fillRect(barrierX - 3, slit2Y + slitWidth / 2, 6, H - slit2Y - slitWidth / 2);

            // Draw intensity bar on right
            const barX = W * 0.92;
            const barW = 20;
            let maxH = 1;
            for (let i = 0; i < SCREEN_BINS; i++) {
                if (screenHits[i] > maxH) maxH = screenHits[i];
            }
            for (let i = 0; i < SCREEN_BINS; i++) {
                const y = (i / SCREEN_BINS) * H;
                const bh = H / SCREEN_BINS;
                const v = screenHits[i] / maxH;
                ctx.fillStyle = `rgba(200, 180, 255, ${v * 0.8})`;
                ctx.fillRect(barX, y, barW * v, bh);
            }
        }

        function draw() {
            if (mode === 'wave') {
                drawWaveMode();
            } else if (mode === 'particle') {
                drawParticleMode();
            } else {
                // Both: wave in background, particles on top
                drawWaveMode();
                // Also accumulate
                const screenX = W * 0.85;
                for (let i = 0; i < 3; i++) {
                    const y = sampleFromDistribution();
                    const bin = Math.floor((y / H) * SCREEN_BINS);
                    if (bin >= 0 && bin < SCREEN_BINS) {
                        screenHits[bin]++;
                        photonCount++;
                    }
                    ctx.beginPath();
                    ctx.arc(screenX + (Math.random() - 0.5) * 4, y, 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 200, 0.7)';
                    ctx.fill();
                }
            }
        }

        function createUI() {
            svgEl.innerHTML = '';
            const d = document.createElementNS(ns, 'defs'); svgEl.appendChild(d);

            const title = document.createElementNS(ns, 'text');
            title.setAttribute('class', 'svg-title');
            title.setAttribute('x', W / 2); title.setAttribute('y', 28);
            title.setAttribute('text-anchor', 'middle');
            title.textContent = 'Double-Slit Experiment';
            svgEl.appendChild(title);

            // Photon counter
            const pText = document.createElementNS(ns, 'text');
            pText.setAttribute('id', 'photon-count');
            pText.setAttribute('class', 'svg-label');
            pText.setAttribute('x', W - 80); pText.setAttribute('y', 28);
            pText.setAttribute('text-anchor', 'end');
            pText.setAttribute('fill', 'rgba(255,255,255,0.5)');
            svgEl.appendChild(pText);

            // Fringe spacing info
            const fringeText = document.createElementNS(ns, 'text');
            fringeText.setAttribute('id', 'fringe-info');
            fringeText.setAttribute('class', 'svg-label');
            fringeText.setAttribute('x', W / 2); fringeText.setAttribute('y', 48);
            fringeText.setAttribute('text-anchor', 'middle');
            fringeText.setAttribute('fill', 'rgba(255,255,255,0.4)');
            svgEl.appendChild(fringeText);

            // Slit labels
            const barrierX = W * 0.35;
            const cy = H / 2;
            const s1 = document.createElementNS(ns, 'text');
            s1.setAttribute('x', barrierX + 12); s1.setAttribute('y', cy - slitSep / 2 + 4);
            s1.setAttribute('fill', '#DDA15E'); s1.setAttribute('font-size', '10px'); s1.setAttribute('font-family', 'Nunito');
            s1.textContent = 'Slit 1';
            svgEl.appendChild(s1);
            const s2 = document.createElementNS(ns, 'text');
            s2.setAttribute('x', barrierX + 12); s2.setAttribute('y', cy + slitSep / 2 + 4);
            s2.setAttribute('fill', '#DDA15E'); s2.setAttribute('font-size', '10px'); s2.setAttribute('font-family', 'Nunito');
            s2.textContent = 'Slit 2';
            svgEl.appendChild(s2);

            // Controls
            const fo = document.createElementNS(ns, 'foreignObject');
            fo.setAttribute('x', 10); fo.setAttribute('y', H - 180);
            fo.setAttribute('width', 240); fo.setAttribute('height', 172);
            fo.setAttribute('class', 'interactive');
            fo.innerHTML = `
                <div xmlns="http://www.w3.org/1999/xhtml" style="background:rgba(0,0,0,0.8);padding:12px;border-radius:10px;font-family:Nunito,sans-serif;font-size:12px;color:#e8e6e1;">
                    <div style="margin-bottom:6px;"><label style="color:#DDA15E;">Slit Width: <span id="sw-val">${slitWidth}</span></label>
                    <input type="range" id="sw-slider" min="2" max="30" value="${slitWidth}" style="width:100%;"></div>
                    <div style="margin-bottom:6px;"><label style="color:#DDA15E;">Slit Separation: <span id="ss-val">${slitSep}</span></label>
                    <input type="range" id="ss-slider" min="10" max="150" value="${slitSep}" style="width:100%;"></div>
                    <div style="margin-bottom:6px;"><label style="color:#DDA15E;">Wavelength: <span id="wl-val">${wavelength}</span></label>
                    <input type="range" id="wl-slider" min="8" max="60" value="${wavelength}" style="width:100%;"></div>
                    <div style="display:flex;gap:6px;">
                        <button class="mode-btn" data-mode="wave" style="padding:3px 10px;border:1px solid #DDA15E;background:rgba(0,0,0,0.5);color:#DDA15E;border-radius:4px;cursor:pointer;font-size:11px;">Wave</button>
                        <button class="mode-btn" data-mode="particle" style="padding:3px 10px;border:1px solid #666;background:rgba(0,0,0,0.5);color:#aaa;border-radius:4px;cursor:pointer;font-size:11px;">Particle</button>
                        <button class="mode-btn" data-mode="both" style="padding:3px 10px;border:1px solid #666;background:rgba(0,0,0,0.5);color:#aaa;border-radius:4px;cursor:pointer;font-size:11px;">Both</button>
                    </div>
                </div>
            `;
            svgEl.appendChild(fo);
        }

        function bindUI() {
            document.getElementById('sw-slider').addEventListener('input', function() {
                slitWidth = parseInt(this.value);
                document.getElementById('sw-val').textContent = slitWidth;
                resetParticles();
            });
            document.getElementById('ss-slider').addEventListener('input', function() {
                slitSep = parseInt(this.value);
                document.getElementById('ss-val').textContent = slitSep;
                resetParticles();
                createUI(); bindUI();
            });
            document.getElementById('wl-slider').addEventListener('input', function() {
                wavelength = parseInt(this.value);
                document.getElementById('wl-val').textContent = wavelength;
                resetParticles();
            });
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    mode = this.dataset.mode;
                    document.querySelectorAll('.mode-btn').forEach(b => { b.style.color = '#aaa'; b.style.borderColor = '#666'; });
                    this.style.color = '#DDA15E'; this.style.borderColor = '#DDA15E';
                    resetParticles();
                    ctx.clearRect(0, 0, W, H);
                });
            });
        }

        function updateSVG() {
            const pc = document.getElementById('photon-count');
            if (pc && (mode === 'particle' || mode === 'both')) {
                pc.textContent = 'Photons: ' + photonCount.toLocaleString();
            } else if (pc) {
                pc.textContent = '';
            }
            const fi = document.getElementById('fringe-info');
            if (fi) {
                const L = W * 0.5; // approximate barrier-to-screen distance
                const fringeSpacing = (wavelength * L / slitSep).toFixed(1);
                fi.textContent = `Fringe spacing: ${fringeSpacing} px  |  d=${slitSep}  lambda=${wavelength}`;
            }
        }

        function resize() {
            const rect = canvas.getBoundingClientRect();
            W = rect.width; H = rect.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svgEl.setAttribute('width', W); svgEl.setAttribute('height', H);
            createUI(); bindUI();
            resetParticles();
        }

        let resizeTimeout;
        window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 150); });
        resize();

        function animate() {
            fpsCounter.update();
            t++;
            draw();
            updateSVG();
            requestAnimationFrame(animate);
        }
        hideLoading();
        animate();
    } catch (err) { showError('Init Error: ' + err.message); }
    </script>
</body>
</html>
