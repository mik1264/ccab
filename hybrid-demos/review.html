<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybrid Canvas + SVG — Review Interface</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f0f12;
    --panel: #1a1a22;
    --border: #2a2a38;
    --text: #ccc;
    --dim: #666;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #facc15;
    --blue: #60a5fa;
    --accent: #BC6C25;
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  #topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 14px; background: var(--panel);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #topbar h1 { font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap; }
  #topbar a { color: var(--dim); font-size: 11px; text-decoration: none; padding: 3px 8px; border: 1px solid var(--border); border-radius: 4px; }
  #topbar a:hover { color: var(--text); }
  #progress-wrap { flex: 1; display: flex; align-items: center; gap: 8px; }
  #progress-bar-bg { flex: 1; height: 6px; background: var(--border); border-radius: 3px; }
  #progress-bar { height: 6px; background: var(--accent); border-radius: 3px; width: 0%; transition: width 0.3s; }
  #progress-text { color: var(--dim); white-space: nowrap; }
  #export-btn {
    padding: 5px 14px; background: #2a2a38; border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; cursor: pointer; font-size: 12px;
    transition: background 0.15s;
  }
  #export-btn:hover { background: #3a3a50; }

  #main { display: flex; flex: 1; overflow: hidden; }

  #sidebar {
    width: 240px; flex-shrink: 0; background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto; display: flex; flex-direction: column;
  }
  #sidebar-search { padding: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #sidebar-search input {
    width: 100%; padding: 5px 8px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text); font-size: 12px; outline: none;
  }
  #demo-list { flex: 1; overflow-y: auto; }
  .demo-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; cursor: pointer; border-bottom: 1px solid #1e1e2a;
    transition: background 0.1s;
  }
  .demo-item:hover { background: #22222e; }
  .demo-item.active { background: #201610; border-left: 2px solid var(--accent); }
  .demo-item .num { color: var(--dim); font-size: 11px; width: 24px; flex-shrink: 0; }
  .demo-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .demo-item .badge {
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 11px;
  }
  .badge-good { background: rgba(74,222,128,0.2); color: var(--green); }
  .badge-bad  { background: rgba(248,113,113,0.2); color: var(--red); }
  .badge-meh  { background: rgba(250,204,21,0.15); color: var(--yellow); }
  .badge-none { background: transparent; }

  #content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #demo-header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: var(--panel);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #demo-title { font-size: 15px; font-weight: 600; color: #fff; flex: 1; }
  #demo-filename { color: var(--dim); font-size: 11px; font-family: monospace; }
  #open-tab { padding: 4px 10px; background: #22222e; border: 1px solid var(--border); color: var(--text); border-radius: 5px; cursor: pointer; font-size: 11px; text-decoration: none; }
  #open-tab:hover { background: #2a2a3e; }

  #iframe-wrap { flex: 1; position: relative; }
  #demo-frame { width: 100%; height: 100%; border: none; display: block; }
  #frame-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--dim); font-size: 14px; pointer-events: none;
    background: var(--bg); opacity: 0; transition: opacity 0.2s;
  }
  #frame-overlay.visible { opacity: 1; }

  #rating-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--panel);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  #rating-label { color: var(--dim); font-size: 12px; white-space: nowrap; }
  .rate-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 16px; border-radius: 7px; cursor: pointer;
    border: 2px solid transparent; font-size: 13px; font-weight: 600;
    transition: all 0.15s;
  }
  .rate-btn.active { transform: scale(1.05); }
  #btn-good  { background: rgba(74,222,128,0.12); color: var(--green); border-color: rgba(74,222,128,0.2); }
  #btn-good:hover, #btn-good.active  { background: rgba(74,222,128,0.25); border-color: var(--green); }
  #btn-meh   { background: rgba(250,204,21,0.1);  color: var(--yellow); border-color: rgba(250,204,21,0.2); }
  #btn-meh:hover, #btn-meh.active   { background: rgba(250,204,21,0.22); border-color: var(--yellow); }
  #btn-bad   { background: rgba(248,113,113,0.12); color: var(--red);   border-color: rgba(248,113,113,0.2); }
  #btn-bad:hover, #btn-bad.active   { background: rgba(248,113,113,0.25); border-color: var(--red); }

  #notes-input {
    flex: 1; padding: 6px 10px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 12px; outline: none;
    transition: border-color 0.15s;
  }
  #notes-input:focus { border-color: var(--accent); }
  #notes-input::placeholder { color: var(--dim); }

  #nav-prev, #nav-next {
    padding: 6px 14px; background: #22222e; border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: background 0.15s;
  }
  #nav-prev:hover, #nav-next:hover { background: #2a2a3e; }
  #nav-prev:disabled, #nav-next:disabled { opacity: 0.35; cursor: default; }

  #modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center; z-index: 999;
  }
  #modal-bg.open { display: flex; }
  #modal {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; width: 700px; max-width: 95vw; max-height: 85vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #modal-header { display: flex; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  #modal-header h2 { flex: 1; font-size: 15px; color: #fff; }
  #modal-close { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 20px; line-height: 1; }
  #modal-close:hover { color: #fff; }
  #modal-body { flex: 1; overflow: auto; padding: 14px 18px; }
  #report-out {
    width: 100%; min-height: 300px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: #aef; font-family: monospace; font-size: 12px;
    padding: 12px; resize: vertical; outline: none;
  }
  #modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn { padding: 7px 18px; border-radius: 7px; cursor: pointer; border: 1px solid var(--border); font-size: 13px; }
  #copy-btn { background: var(--accent); color: #fff; font-weight: 600; border-color: var(--accent); }
  #copy-btn:hover { opacity: 0.85; }
  #close-btn2 { background: #22222e; color: var(--text); }
  #close-btn2:hover { background: #2a2a3e; }

  #demo-list::-webkit-scrollbar { width: 4px; }
  #demo-list::-webkit-scrollbar-track { background: transparent; }
  #demo-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>

<div id="topbar">
  <h1>Hybrid Canvas+SVG Review</h1>
  <a href="index.html">← Gallery</a>
  <div id="progress-wrap">
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
    <span id="progress-text">0 / 25 rated</span>
  </div>
  <button id="export-btn">Export Report</button>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-search">
      <input type="text" id="search-input" placeholder="Filter demos…">
    </div>
    <div id="demo-list"></div>
  </div>

  <div id="content">
    <div id="demo-header">
      <span id="demo-title">Select a demo</span>
      <span id="demo-filename"></span>
      <a id="open-tab" href="#" target="_blank">Open in tab ↗</a>
    </div>
    <div id="iframe-wrap">
      <iframe id="demo-frame" src="about:blank" sandbox="allow-scripts allow-same-origin"></iframe>
      <div id="frame-overlay" class="visible">← Select a demo from the list</div>
    </div>
    <div id="rating-bar">
      <span id="rating-label">Rate:</span>
      <button class="rate-btn" id="btn-good">✓ Good</button>
      <button class="rate-btn" id="btn-meh">~ Okay</button>
      <button class="rate-btn" id="btn-bad">✗ Bad</button>
      <input type="text" id="notes-input" placeholder="Optional notes…">
      <button id="nav-prev">← Prev</button>
      <button id="nav-next">Next →</button>
    </div>
  </div>
</div>

<div id="modal-bg">
  <div id="modal">
    <div id="modal-header">
      <h2>Review Report</h2>
      <button id="modal-close">×</button>
    </div>
    <div id="modal-body"><textarea id="report-out" readonly></textarea></div>
    <div id="modal-footer">
      <button class="modal-btn" id="copy-btn">Copy to clipboard</button>
      <button class="modal-btn" id="close-btn2">Close</button>
    </div>
  </div>
</div>

<script>
const DEMOS = [
  ['01-particle-attractor',    'Particle Attractor + Phase Portrait',           false],
  ['02-fluid-measurement',     'Fluid Simulation + Measurement Overlay',        false],
  ['03-boids-statistics',      'Boids + Live Statistics',                       false],
  ['04-lorenz-attractor',      'Lorenz Attractor + Bifurcation Display',        true],
  ['05-double-pendulum',       'Double Pendulum + Phase Portrait',              false],
  ['06-mandelbrot-crosshair',  'Mandelbrot + Coordinate Crosshair',             false],
  ['07-terrain-contour',       'Terrain Generator + Contour Lines',             false],
  ['08-reaction-diffusion',    'Reaction-Diffusion + Parameter Sliders',        false],
  ['09-n-body-solar',          'N-Body Solar System + Period Chart',            true],
  ['10-audio-spectrum',        'Audio Spectrum + Note Labels',                  false],
  ['11-neural-network',        'Neural Network Training + Live Loss Chart',     true],
  ['12-ant-colony',            'Ant Colony + Pheromone Legend',                 false],
  ['13-fluid-velocity',        'Fluid Velocity Field + Streamlines',            true],
  ['14-rope-physics',          'Rope Physics + Tension Map',                    true],
  ['15-galaxy-collision',      'Galaxy Collision + Scale Bar',                  false],
  ['16-lissajous-ui',          'Lissajous + Frequency Ratio UI',                false],
  ['17-bubble-sort-annotated', 'Bubble Sort + Algorithm Annotations',           false],
  ['18-voronoi-3d',            '3D Voronoi Projection + Area Stats',            true],
  ['19-wave-interference',     'Wave Interference + Wavelength Ruler',          false],
  ['20-flow-field',            'Flow Field + Seed UI',                          false],
  ['21-packet-routing',        'Network Packet Routing',                        false],
  ['22-physics-sandbox',       '2D Physics Sandbox',                            false],
  ['23-procedural-city',       'Procedural City + Building Info',               false],
  ['24-langtons-ant-rules',    "Langton's Ant + Rule Editor",                   false],
  ['25-wave-diffraction',      'Wave Diffraction + Intensity Profile',          true],
  ['26-brownian-motion',       'Brownian Motion + Distribution Histogram',      true],
  ['27-predator-prey',         'Predator-Prey + Lotka-Volterra Chart',          true],
  ['28-fourier-drawing',       'Fourier Drawing Machine + Frequency Spectrum',  true],
  ['29-projectile-motion',     'Projectile Motion + Range Analysis',            true],
  ['30-cellular-automata-lab', 'Cellular Automata Lab + Entropy Monitor',       true],
  ['31-spring-oscillator',     'Coupled Spring Oscillators + Phase Diagram',    true],
  ['32-gas-diffusion',         'Gas Diffusion Simulation + Concentration Gradient', true],
  ['33-ising-model',           'Ising Model + Magnetization Chart',             true],
  ['34-cellular-growth',       'Cellular Growth Simulation + Size Distribution', true],
  ['35-sand-dunes',            'Sand Dune Formation + Wind Profile',            true],
];

const STORAGE_KEY = 'hybrid-review-v1';
let ratings = {};
let currentIdx = -1;
let filteredIdxs = DEMOS.map((_, i) => i);

function load() {
  try { ratings = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { ratings = {}; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(ratings)); }

const demoList = document.getElementById('demo-list');

function ratingIcon(r) {
  if (!r) return ['none', ''];
  return { good: ['good','✓'], meh: ['meh','~'], bad: ['bad','✗'] }[r.rating] || ['none',''];
}

function renderList() {
  const q = document.getElementById('search-input').value.toLowerCase();
  filteredIdxs = [];
  demoList.innerHTML = '';
  DEMOS.forEach(([file, name], i) => {
    const num = file.split('-')[0];
    if (q && !name.toLowerCase().includes(q) && !num.includes(q)) return;
    filteredIdxs.push(i);
    const r = ratings[file];
    const [cls, icon] = ratingIcon(r);
    const el = document.createElement('div');
    el.className = 'demo-item' + (i === currentIdx ? ' active' : '');
    el.dataset.idx = i;
    el.innerHTML = `
      <span class="num">${num}</span>
      <span class="name">${name}</span>
      <span class="badge badge-${cls}">${icon}</span>
    `;
    el.addEventListener('click', () => selectDemo(i));
    demoList.appendChild(el);
  });
}

function selectDemo(idx) {
  currentIdx = idx;
  const [file, name] = DEMOS[idx];
  const filename = file + '.html';
  document.getElementById('demo-title').textContent = name;
  document.getElementById('demo-filename').textContent = filename;
  document.getElementById('open-tab').href = filename;

  const overlay = document.getElementById('frame-overlay');
  overlay.textContent = 'Loading…';
  overlay.classList.add('visible');

  const frame = document.getElementById('demo-frame');
  frame.src = filename;
  frame.onload = () => overlay.classList.remove('visible');

  const r = ratings[file];
  setRatingUI(r ? r.rating : null);
  document.getElementById('notes-input').value = r ? (r.notes || '') : '';

  renderList();
  scrollToActive();
  updateProgress();
  updateNav();
}

function scrollToActive() {
  const active = demoList.querySelector('.demo-item.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function setRatingUI(rating) {
  ['good','meh','bad'].forEach(r => {
    document.getElementById('btn-' + r).classList.toggle('active', r === rating);
  });
}

function rate(rating) {
  if (currentIdx < 0) return;
  const [file] = DEMOS[currentIdx];
  const notes = document.getElementById('notes-input').value.trim();
  const prev = ratings[file];
  if (prev && prev.rating === rating && !notes) {
    delete ratings[file];
    setRatingUI(null);
  } else {
    ratings[file] = { rating, notes };
    setRatingUI(rating);
  }
  save();
  renderList();
  updateProgress();
  if (rating !== null) setTimeout(() => advanceNext(), 320);
}

document.getElementById('btn-good').addEventListener('click', () => rate('good'));
document.getElementById('btn-meh').addEventListener('click',  () => rate('meh'));
document.getElementById('btn-bad').addEventListener('click',  () => rate('bad'));

document.getElementById('notes-input').addEventListener('change', () => {
  if (currentIdx < 0) return;
  const [file] = DEMOS[currentIdx];
  const notes = document.getElementById('notes-input').value.trim();
  if (ratings[file]) { ratings[file].notes = notes; save(); }
});

function advanceNext() {
  const pos = filteredIdxs.indexOf(currentIdx);
  if (pos < filteredIdxs.length - 1) selectDemo(filteredIdxs[pos + 1]);
}

document.getElementById('nav-prev').addEventListener('click', () => {
  const pos = filteredIdxs.indexOf(currentIdx);
  if (pos > 0) selectDemo(filteredIdxs[pos - 1]);
});
document.getElementById('nav-next').addEventListener('click', () => {
  const pos = filteredIdxs.indexOf(currentIdx);
  if (pos < filteredIdxs.length - 1) selectDemo(filteredIdxs[pos + 1]);
});

function updateNav() {
  const pos = filteredIdxs.indexOf(currentIdx);
  document.getElementById('nav-prev').disabled = pos <= 0;
  document.getElementById('nav-next').disabled = pos >= filteredIdxs.length - 1;
}

window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); document.getElementById('nav-next').click(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); document.getElementById('nav-prev').click(); }
  if (e.key === 'g') rate('good');
  if (e.key === 'b') rate('bad');
  if (e.key === 'o') rate('meh');
});

function updateProgress() {
  const rated = Object.keys(ratings).length;
  const pct = (rated / DEMOS.length * 100).toFixed(0);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${rated} / ${DEMOS.length} rated`;
}

document.getElementById('search-input').addEventListener('input', renderList);

function generateReport() {
  const now = new Date().toISOString().slice(0,16).replace('T',' ');
  const goodList = DEMOS.filter(([f]) => ratings[f]?.rating === 'good');
  const mehList  = DEMOS.filter(([f]) => ratings[f]?.rating === 'meh');
  const badList  = DEMOS.filter(([f]) => ratings[f]?.rating === 'bad');
  const skipList = DEMOS.filter(([f]) => !ratings[f]);

  const fmt = ([file, name]) => {
    const r = ratings[file];
    const note = r?.notes ? `  → ${r.notes}` : '';
    return `  ${file}  ${name}${note}`;
  };

  return [
    `# Hybrid Canvas+SVG Review Report`,
    `Generated: ${now}`,
    `Reviewed: ${Object.keys(ratings).length} / ${DEMOS.length} demos`,
    ``,
    `## ✓ GOOD (${goodList.length})`,
    ...goodList.map(fmt),
    ``,
    `## ~ OKAY (${mehList.length})`,
    ...mehList.map(fmt),
    ``,
    `## ✗ BAD (${badList.length})`,
    ...badList.map(fmt),
    ``,
    `## — NOT REVIEWED (${skipList.length})`,
    ...skipList.map(fmt),
    ``,
    `## Raw JSON`,
    JSON.stringify(ratings, null, 2),
  ].join('\n');
}

document.getElementById('export-btn').addEventListener('click', () => {
  document.getElementById('report-out').value = generateReport();
  document.getElementById('modal-bg').classList.add('open');
});
document.getElementById('modal-close').addEventListener('click', () => document.getElementById('modal-bg').classList.remove('open'));
document.getElementById('close-btn2').addEventListener('click', () => document.getElementById('modal-bg').classList.remove('open'));
document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('report-out').value);
  document.getElementById('copy-btn').textContent = 'Copied!';
  setTimeout(() => document.getElementById('copy-btn').textContent = 'Copy to clipboard', 1500);
});
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) document.getElementById('modal-bg').classList.remove('open');
});

load();
renderList();
updateProgress();
const firstUnrated = DEMOS.findIndex(([f]) => !ratings[f]);
selectDemo(firstUnrated >= 0 ? firstUnrated : 0);
</script>
</body>
</html>
