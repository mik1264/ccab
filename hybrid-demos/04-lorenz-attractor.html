<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorenz Attractor + Bifurcation Display - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:var(--earth);text-decoration:none;border-radius:6px;font-size:14px;z-index:999;transition:all 0.3s ease}
        .back-link:hover{background:rgba(221,161,94,0.2);transform:translateX(-4px)}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:var(--earth);padding:8px 12px;border-radius:6px;font-family:'Courier New',monospace;font-size:14px;z-index:999}
        #controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);border:1px solid rgba(221,161,94,0.3);border-radius:12px;padding:14px 24px;z-index:999;display:flex;gap:24px;align-items:center;font-size:13px}
        .ctrl-group{display:flex;flex-direction:column;gap:4px;align-items:center}
        .ctrl-group label{color:var(--earth);font-size:12px;font-family:'Nunito',sans-serif}
        .ctrl-group input[type=range]{width:120px;accent-color:var(--earth)}
        .ctrl-val{color:#fff;font-family:'Courier New',monospace;font-size:12px}
        .ctrl-btn{background:rgba(221,161,94,0.2);border:1px solid rgba(221,161,94,0.5);color:var(--earth);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px}
        .ctrl-btn:hover{background:rgba(221,161,94,0.4)}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="controls">
        <div class="ctrl-group">
            <label>rho (&#961;)</label>
            <input type="range" id="rho-slider" min="20" max="35" step="0.1" value="28">
            <span class="ctrl-val" id="rho-val">28.0</span>
        </div>
        <div class="ctrl-group">
            <label>sigma (&#963;)</label>
            <input type="range" id="sigma-slider" min="5" max="20" step="0.1" value="10">
            <span class="ctrl-val" id="sigma-val">10.0</span>
        </div>
        <div class="ctrl-group">
            <label>Rotation</label>
            <button class="ctrl-btn" id="rot-btn">Auto: ON</button>
        </div>
        <div class="ctrl-group">
            <label>Reset</label>
            <button class="ctrl-btn" id="reset-btn">New Trail</button>
        </div>
    </div>
    <script>
    (function(){
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';

        var W, H;
        function resize(){
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            svg.setAttribute('width', W);
            svg.setAttribute('height', H);
        }
        resize();
        window.addEventListener('resize', resize);

        // Lorenz params
        var sigma = 10, beta = 8/3, rho = 28;
        var dt = 0.005;
        var autoRotate = true;
        var viewAngleY = 0.4, viewAngleX = 0.2;

        // Trail
        var TRAIL = 3000;
        var trailX = new Float32Array(TRAIL);
        var trailY = new Float32Array(TRAIL);
        var trailZ = new Float32Array(TRAIL);
        var trailHead = 0;
        var trailCount = 0;

        // Current point
        var lx = 0.1, ly = 0, lz = 0;

        function resetTrail(){
            lx = (Math.random()-0.5)*2;
            ly = (Math.random()-0.5)*2;
            lz = rho * 0.5 + (Math.random()-0.5)*5;
            trailHead = 0;
            trailCount = 0;
        }
        resetTrail();

        function stepLorenz(){
            var dx = sigma*(ly - lx);
            var dy = lx*(rho - lz) - ly;
            var dz = lx*ly - beta*lz;
            lx += dx*dt;
            ly += dy*dt;
            lz += dz*dt;
            trailX[trailHead] = lx;
            trailY[trailHead] = ly;
            trailZ[trailHead] = lz;
            trailHead = (trailHead+1) % TRAIL;
            if(trailCount < TRAIL) trailCount++;
        }

        function project3d(x, y, z){
            // center at attractor midpoint ~(0,0,rho/2)
            var cx = 0, cy = 0, cz = rho * 0.9;
            var px = x - cx, py = y - cy, pz = z - cz;
            // Rotate around Y axis
            var cosY = Math.cos(viewAngleY), sinY = Math.sin(viewAngleY);
            var tx = px*cosY + pz*sinY;
            var tz = -px*sinY + pz*cosY;
            px = tx; pz = tz;
            // Rotate around X axis
            var cosX = Math.cos(viewAngleX), sinX = Math.sin(viewAngleX);
            var ty = py*cosX - pz*sinX;
            tz = py*sinX + pz*cosX;
            py = ty; pz = tz;
            // Simple perspective
            var scale = 12;
            var sx = W/2 + px * scale;
            var sy = H/2 - py * scale;
            return {sx:sx, sy:sy, pz:pz};
        }

        // SVG elements
        function svgEl(tag, attrs){
            var el = document.createElementNS(svgNS, tag);
            for(var k in attrs) el.setAttribute(k, attrs[k]);
            return el;
        }

        // Build SVG overlay elements once
        var svgPanel = svgEl('g', {});
        svg.appendChild(svgPanel);

        var panelBg = svgEl('rect',{x:20,y:70,width:180,height:140,rx:10,ry:10,fill:'rgba(0,0,0,0.65)',stroke:'rgba(221,161,94,0.4)','stroke-width':1});
        svgPanel.appendChild(panelBg);

        var lblParams = svgEl('text',{x:30,y:92,fill:'#DDA15E','font-family':'Lora,serif','font-size':13,'font-weight':600});
        lblParams.textContent = 'Lorenz Attractor';
        svgPanel.appendChild(lblParams);

        var rhoLbl = svgEl('text',{x:30,y:116,fill:'#e8e6e1','font-family':'Courier New,monospace','font-size':12});
        rhoLbl.textContent = '\u03c1 (rho) = 28.0';
        svgPanel.appendChild(rhoLbl);

        var sigmaLbl = svgEl('text',{x:30,y:136,fill:'#e8e6e1','font-family':'Courier New,monospace','font-size':12});
        sigmaLbl.textContent = '\u03c3 (sigma) = 10.0';
        svgPanel.appendChild(sigmaLbl);

        var betaLbl = svgEl('text',{x:30,y:156,fill:'#e8e6e1','font-family':'Courier New,monospace','font-size':12});
        betaLbl.textContent = '\u03b2 (beta) = 2.667';
        svgPanel.appendChild(betaLbl);

        // Chaos indicator
        var chaosBg = svgEl('rect',{x:30,y:168,width:60,height:20,rx:4,fill:'rgba(188,108,37,0.2)',stroke:'rgba(188,108,37,0.6)','stroke-width':1});
        svgPanel.appendChild(chaosBg);
        var chaosLbl = svgEl('text',{x:60,y:182,'text-anchor':'middle',fill:'#BC6C25','font-family':'Nunito,sans-serif','font-size':11,'font-weight':700});
        chaosLbl.textContent = 'CHAOTIC';
        svgPanel.appendChild(chaosLbl);

        // Lyapunov indicator
        var lyapLbl = svgEl('text',{x:30,y:200,fill:'#8A9A5B','font-family':'Courier New,monospace','font-size':11});
        lyapLbl.textContent = '\u03bb\u2081 > 0';
        svgPanel.appendChild(lyapLbl);

        // Butterfly wings hint
        var wingsG = svgEl('g',{transform:'translate(148,185)'});
        svgPanel.appendChild(wingsG);
        var wing1 = svgEl('ellipse',{cx:-10,cy:0,rx:14,ry:9,fill:'none',stroke:'rgba(221,161,94,0.5)','stroke-width':1.5,transform:'rotate(-30)'});
        var wing2 = svgEl('ellipse',{cx:10,cy:0,rx:14,ry:9,fill:'none',stroke:'rgba(221,161,94,0.5)','stroke-width':1.5,transform:'rotate(30)'});
        wingsG.appendChild(wing1);
        wingsG.appendChild(wing2);

        // Current position dot on SVG
        var posDot = svgEl('circle',{r:5,fill:'white',opacity:0.9});
        svgPanel.appendChild(posDot);

        // Colorbar
        var cbG = svgEl('g',{});
        svg.appendChild(cbG);
        // will position in render

        // Controls
        document.getElementById('rho-slider').addEventListener('input', function(){
            rho = parseFloat(this.value);
            document.getElementById('rho-val').textContent = rho.toFixed(1);
            rhoLbl.textContent = '\u03c1 (rho) = '+rho.toFixed(1);
            // Assess chaos
            var chaotic = rho > 24.74;
            chaosLbl.textContent = chaotic ? 'CHAOTIC' : 'PERIODIC';
            chaosBg.setAttribute('fill', chaotic ? 'rgba(188,108,37,0.2)' : 'rgba(96,108,56,0.2)');
            chaosBg.setAttribute('stroke', chaotic ? 'rgba(188,108,37,0.6)' : 'rgba(96,108,56,0.6)');
            chaosLbl.setAttribute('fill', chaotic ? '#BC6C25' : '#8A9A5B');
            lyapLbl.textContent = chaotic ? '\u03bb\u2081 > 0' : '\u03bb\u2081 \u2264 0';
        });
        document.getElementById('sigma-slider').addEventListener('input', function(){
            sigma = parseFloat(this.value);
            document.getElementById('sigma-val').textContent = sigma.toFixed(1);
            sigmaLbl.textContent = '\u03c3 (sigma) = '+sigma.toFixed(1);
        });
        document.getElementById('rot-btn').addEventListener('click', function(){
            autoRotate = !autoRotate;
            this.textContent = 'Auto: '+(autoRotate?'ON':'OFF');
        });
        document.getElementById('reset-btn').addEventListener('click', resetTrail);

        // FPS
        var fps=0, fpsFrames=0, fpsLast=performance.now();
        var fpsEl = document.getElementById('fps-value');

        // Render offscreen for trail (accumulate)
        var offscreen = document.createElement('canvas');
        var octx = offscreen.getContext('2d');

        function ensureOffscreen(){
            if(offscreen.width!==W || offscreen.height!==H){
                offscreen.width=W; offscreen.height=H;
            }
        }

        var frame=0;
        function animate(){
            requestAnimationFrame(animate);
            frame++;

            // FPS
            fpsFrames++;
            var now = performance.now();
            if(now - fpsLast > 500){
                fps = Math.round(fpsFrames*1000/(now-fpsLast));
                fpsEl.textContent = fps;
                fpsFrames=0; fpsLast=now;
            }

            // Step Lorenz many times per frame
            for(var i=0;i<8;i++) stepLorenz();

            if(autoRotate) viewAngleY += 0.003;

            ensureOffscreen();

            // Draw trail
            ctx.clearRect(0,0,W,H);

            // Draw ALL trail points
            var steps = trailCount;
            var start = trailCount < TRAIL ? 0 : trailHead;

            for(var i=0;i<steps;i++){
                var idx = (start+i) % TRAIL;
                var age = i/steps; // 0=oldest 1=newest

                var px = trailX[idx], py = trailY[idx], pz = trailZ[idx];
                var proj = project3d(px, py, pz);

                // Color: hue based on z height (normalized to 0-50 range)
                var zNorm = Math.max(0, Math.min(1, (pz - (-5)) / 55));
                var hue = 240 - zNorm*240; // blue(240) -> green(120) -> red(0)
                var alpha = age * 0.8;

                ctx.fillStyle = 'hsla('+hue+',90%,60%,'+alpha+')';
                ctx.fillRect(proj.sx-0.5, proj.sy-0.5, 1.5, 1.5);
            }

            // Draw current point bright
            var cp = project3d(lx,ly,lz);
            ctx.beginPath();
            ctx.arc(cp.sx, cp.sy, 4, 0, Math.PI*2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cp.sx, cp.sy, 8, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fill();

            // Update SVG current position dot
            if(cp.sx>20 && cp.sx<W-20 && cp.sy>70){
                posDot.setAttribute('cx', cp.sx);
                posDot.setAttribute('cy', cp.sy);
                posDot.setAttribute('display','');
            } else {
                posDot.setAttribute('display','none');
            }

            // Animate butterfly wings
            var wingScale = 0.8 + 0.2*Math.sin(frame*0.05);
            wing1.setAttribute('transform','rotate(-30) scale('+wingScale+')');
            wing2.setAttribute('transform','rotate(30) scale('+wingScale+')');

            // Blink chaos indicator
            if(frame%60 < 30){
                chaosBg.setAttribute('opacity','1');
            } else {
                chaosBg.setAttribute('opacity','0.6');
            }
        }
        animate();
    })();
    </script>
</body>
</html>
