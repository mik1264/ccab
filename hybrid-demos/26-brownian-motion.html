<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brownian Motion + Distribution Histogram - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:#DDA15E;text-decoration:none;border-radius:6px;font-size:14px;z-index:999}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#DDA15E;padding:8px 12px;border-radius:6px;font-size:14px;z-index:999}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <script>
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';

        var W, H, cx, cy;
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cx = W / 2; cy = H / 2;
        }
        resize();
        window.addEventListener('resize', resize);

        var NUM_PARTICLES = 500;
        var TRAIL_LEN = 50;
        var STEP_SIZE = 3;
        var particles = [];

        for (var i = 0; i < NUM_PARTICLES; i++) {
            particles.push({
                x: 0, y: 0,
                trail: [],
                color: '#4488ff'
            });
        }

        function distColor(d, maxD) {
            var t = Math.min(d / maxD, 1);
            var r = Math.round(t * 220 + (1-t) * 40);
            var g = Math.round((1-t) * 80 + t * 40);
            var b = Math.round((1-t) * 220 + t * 60);
            return 'rgb('+r+','+g+','+b+')';
        }

        // SVG histogram setup
        var histW = 220, histH = 130;
        var histX = 20, histY;
        var NUM_BINS = 30;
        var histBins = new Array(NUM_BINS).fill(0);
        var histBars = [];
        var histGroup, histTitle, histAxisX, histAxisY;
        var maxDist = 200;

        function buildHistSVG() {
            histY = H - histH - 30;
            svg.innerHTML = '';

            // Background panel
            var panel = document.createElementNS(svgNS, 'rect');
            panel.setAttribute('x', histX); panel.setAttribute('y', histY - 30);
            panel.setAttribute('width', histW); panel.setAttribute('height', histH + 50);
            panel.setAttribute('rx', '8');
            panel.setAttribute('fill', 'rgba(10,14,26,0.82)');
            panel.setAttribute('stroke', '#DDA15E'); panel.setAttribute('stroke-width', '1.2');
            svg.appendChild(panel);

            // Title
            histTitle = document.createElementNS(svgNS, 'text');
            histTitle.setAttribute('x', histX + histW/2); histTitle.setAttribute('y', histY - 10);
            histTitle.setAttribute('text-anchor', 'middle');
            histTitle.setAttribute('fill', '#DDA15E'); histTitle.setAttribute('font-size', '12');
            histTitle.setAttribute('font-family', 'Nunito, sans-serif');
            histTitle.textContent = 'Distance Distribution (Maxwell-Boltzmann)';
            svg.appendChild(histTitle);

            // Axis
            var ax = document.createElementNS(svgNS, 'line');
            ax.setAttribute('x1', histX+10); ax.setAttribute('y1', histY+histH-5);
            ax.setAttribute('x2', histX+histW-10); ax.setAttribute('y2', histY+histH-5);
            ax.setAttribute('stroke', '#8A9A5B'); ax.setAttribute('stroke-width', '1');
            svg.appendChild(ax);

            var ay = document.createElementNS(svgNS, 'line');
            ay.setAttribute('x1', histX+10); ay.setAttribute('y1', histY+5);
            ay.setAttribute('x2', histX+10); ay.setAttribute('y2', histY+histH-5);
            ay.setAttribute('stroke', '#8A9A5B'); ay.setAttribute('stroke-width', '1');
            svg.appendChild(ay);

            histGroup = document.createElementNS(svgNS, 'g');
            svg.appendChild(histGroup);

            var binW = (histW - 22) / NUM_BINS;
            for (var b = 0; b < NUM_BINS; b++) {
                var bar = document.createElementNS(svgNS, 'rect');
                bar.setAttribute('x', histX + 10 + b * binW);
                bar.setAttribute('y', histY + histH - 5);
                bar.setAttribute('width', Math.max(1, binW - 1));
                bar.setAttribute('height', 0);
                var t = b / NUM_BINS;
                var r2 = Math.round(t*220+(1-t)*40);
                var g2 = Math.round((1-t)*80+t*40);
                var b2 = Math.round((1-t)*220+t*60);
                bar.setAttribute('fill', 'rgb('+r2+','+g2+','+b2+')');
                bar.setAttribute('opacity', '0.85');
                histGroup.appendChild(bar);
                histBars.push(bar);
            }

            // X label
            var xl = document.createElementNS(svgNS, 'text');
            xl.setAttribute('x', histX+histW/2); xl.setAttribute('y', histY+histH+18);
            xl.setAttribute('text-anchor', 'middle');
            xl.setAttribute('fill', '#8A9A5B'); xl.setAttribute('font-size', '10');
            xl.setAttribute('font-family', 'Nunito, sans-serif');
            xl.textContent = 'Distance from origin';
            svg.appendChild(xl);
        }
        buildHistSVG();

        function updateHistogram() {
            histBins = new Array(NUM_BINS).fill(0);
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                var d = Math.sqrt(p.x*p.x + p.y*p.y);
                var bin = Math.floor((d / maxDist) * NUM_BINS);
                if (bin >= NUM_BINS) bin = NUM_BINS - 1;
                histBins[bin]++;
            }
            var maxCount = Math.max(1, Math.max.apply(null, histBins));
            var availH = histH - 15;
            var binW = (histW - 22) / NUM_BINS;
            for (var b = 0; b < NUM_BINS; b++) {
                var barH = (histBins[b] / maxCount) * availH;
                histBars[b].setAttribute('height', barH);
                histBars[b].setAttribute('y', histY + histH - 5 - barH);
                histBars[b].setAttribute('x', histX + 10 + b * binW);
                histBars[b].setAttribute('width', Math.max(1, binW - 1));
            }
        }

        // FPS
        var fps = 0, fpsLast = performance.now(), fpsCount = 0;
        var fpsEl = document.getElementById('fps-value');

        function step() {
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                var angle = Math.random() * Math.PI * 2;
                var mag = Math.random() * STEP_SIZE + 0.5;
                p.trail.push({x: p.x, y: p.y});
                if (p.trail.length > TRAIL_LEN) p.trail.shift();
                p.x += Math.cos(angle) * mag;
                p.y += Math.sin(angle) * mag;
                // Soft boundary
                var d = Math.sqrt(p.x*p.x + p.y*p.y);
                if (d > maxDist * 1.5) { p.x *= 0.85; p.y *= 0.85; }
                p.dist = Math.sqrt(p.x*p.x + p.y*p.y);
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(10,14,26,0.35)';
            ctx.fillRect(0, 0, W, H);

            // Center glow
            var grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
            grd.addColorStop(0, 'rgba(100,150,255,0.08)');
            grd.addColorStop(1, 'rgba(10,14,26,0)');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, W, H);

            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                var col = distColor(p.dist || 0, maxDist);

                // Draw trail
                if (p.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(cx + p.trail[0].x, cy + p.trail[0].y);
                    for (var t = 1; t < p.trail.length; t++) {
                        ctx.lineTo(cx + p.trail[t].x, cy + p.trail[t].y);
                    }
                    ctx.strokeStyle = col;
                    ctx.globalAlpha = 0.18;
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // Draw particle
                ctx.beginPath();
                ctx.arc(cx + p.x, cy + p.y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = col;
                ctx.fill();
            }
        }

        var frameCount = 0;
        function animate() {
            requestAnimationFrame(animate);
            step();
            draw();

            if (frameCount % 3 === 0) updateHistogram();
            frameCount++;

            fpsCount++;
            var now = performance.now();
            if (now - fpsLast >= 1000) {
                fpsEl.textContent = fpsCount;
                fpsCount = 0; fpsLast = now;
            }
        }
        animate();
    </script>
</body>
</html>
