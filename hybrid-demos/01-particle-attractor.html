<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Attractor + Phase Portrait - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background: #0a0e1a;
            color: #e8e6e1;
        }
        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 8px 16px;
            background: rgba(0,0,0,0.7);
            color: var(--earth);
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Nunito', sans-serif;
            z-index: 999;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            background: rgba(221,161,94,0.2);
            transform: translateX(-4px);
        }
        #fps-counter {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: var(--earth);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            z-index: 999;
        }
        .fps-good { color: #10b981; }
        .fps-medium { color: #fbbf24; }
        .fps-poor { color: #e11d48; }
        #hybrid-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        #canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }
        #svg-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .interactive {
            pointer-events: all;
            cursor: pointer;
        }
        .svg-label {
            font-family: 'Nunito', sans-serif;
            font-size: 12px;
            fill: rgba(255,255,255,0.8);
            pointer-events: none;
        }
        .svg-title {
            font-family: 'Lora', serif;
            font-size: 16px;
            fill: var(--earth);
            pointer-events: none;
        }
        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            text-align: center;
            z-index: 1000;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--earth);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            background: rgba(225,29,72,0.9);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            z-index: 1001;
        }
        #error h2 { font-family: 'Lora', serif; margin: 0 0 1rem 0; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message">An unexpected error occurred.</p></div>

    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="chartBg" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="rgba(0,0,0,0.8)"/>
                    <stop offset="100%" stop-color="rgba(0,0,0,0.6)"/>
                </linearGradient>
            </defs>
        </svg>
    </div>

    <script>
        window.addEventListener('error', (e) => { showError('Runtime Error: ' + e.message); });
        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-message').textContent = msg;
        }
        function hideLoading() { document.getElementById('loading').style.display = 'none'; }

        class FPSCounter {
            constructor() { this.fps = 0; this.frames = 0; this.lastTime = performance.now(); this.el = document.getElementById('fps-value'); }
            update() {
                this.frames++;
                var now = performance.now(), dt = now - this.lastTime;
                if (dt >= 1000) {
                    this.fps = Math.round(this.frames * 1000 / dt);
                    this.frames = 0; this.lastTime = now;
                    this.el.textContent = this.fps;
                    this.el.className = this.fps >= 55 ? 'fps-good' : this.fps >= 30 ? 'fps-medium' : 'fps-poor';
                }
            }
        }

        try {
            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');
            var svg = document.getElementById('svg-overlay');
            var svgNS = 'http://www.w3.org/2000/svg';
            var fpsCounter = new FPSCounter();
            var W, H;

            // Attractor parameters
            var attractors = {
                lorenz:  { sigma: 10, rho: 28, beta: 8/3, name: 'Lorenz' },
                rossler: { a: 0.2, b: 0.2, c: 5.7, name: 'Rossler' },
                dadras:  { a: 3, b: 2.7, c: 1.7, d: 2, e: 9, name: 'Dadras' }
            };
            var currentAttractor = 'lorenz';
            var params = { sigma: 10, rho: 28, beta: 2.667 };

            // Particles
            var NUM = 50000;
            var px = new Float32Array(NUM);
            var py = new Float32Array(NUM);
            var pz = new Float32Array(NUM);

            function initParticles() {
                for (var i = 0; i < NUM; i++) {
                    px[i] = (Math.random() - 0.5) * 50;
                    py[i] = (Math.random() - 0.5) * 50;
                    pz[i] = Math.random() * 50;
                }
            }
            initParticles();

            // Phase portrait history
            var phaseHistory = [];
            var maxPhasePoints = 200;

            // SVG panel setup
            var panelW = 280;
            var panelX, panelY, panelH, chartX, chartY, chartW, chartH;

            function createSVGElement(tag, attrs) {
                var el = document.createElementNS(svgNS, tag);
                for (var k in attrs) el.setAttribute(k, attrs[k]);
                return el;
            }

            // Build SVG UI
            var panelGroup = createSVGElement('g', { id: 'panel' });
            svg.appendChild(panelGroup);

            var panelBg = createSVGElement('rect', { rx: '12', fill: 'rgba(0,0,0,0.75)', stroke: 'rgba(221,161,94,0.3)', 'stroke-width': '1' });
            panelGroup.appendChild(panelBg);

            var panelTitle = createSVGElement('text', { class: 'svg-title', 'text-anchor': 'middle' });
            panelTitle.textContent = 'Phase Portrait (x vs z)';
            panelGroup.appendChild(panelTitle);

            // Phase chart area
            var chartBorder = createSVGElement('rect', { fill: 'rgba(10,14,26,0.9)', stroke: 'rgba(255,255,255,0.15)', 'stroke-width': '1', rx: '4' });
            panelGroup.appendChild(chartBorder);

            var phasePath = createSVGElement('polyline', { fill: 'none', stroke: '#DDA15E', 'stroke-width': '1.5', 'stroke-opacity': '0.8' });
            panelGroup.appendChild(phasePath);

            var phaseDots = createSVGElement('g', {});
            panelGroup.appendChild(phaseDots);

            // Attractor buttons
            var btnGroup = createSVGElement('g', { class: 'interactive' });
            panelGroup.appendChild(btnGroup);

            var btnLabels = ['Lorenz', 'Rossler', 'Dadras'];
            var btnKeys = ['lorenz', 'rossler', 'dadras'];
            var btnElements = [];

            for (var i = 0; i < 3; i++) {
                var bg = createSVGElement('g', { 'data-key': btnKeys[i], style: 'cursor:pointer' });
                bg.classList.add('interactive');
                var r = createSVGElement('rect', { width: '75', height: '28', rx: '6', fill: i === 0 ? 'rgba(221,161,94,0.4)' : 'rgba(255,255,255,0.1)', stroke: 'rgba(221,161,94,0.5)', 'stroke-width': '1' });
                var t = createSVGElement('text', { x: '37.5', y: '18', 'text-anchor': 'middle', fill: '#DDA15E', 'font-family': 'Nunito, sans-serif', 'font-size': '12' });
                t.textContent = btnLabels[i];
                bg.appendChild(r);
                bg.appendChild(t);
                btnGroup.appendChild(bg);
                btnElements.push({ g: bg, rect: r });

                (function(idx) {
                    bg.addEventListener('click', function() {
                        currentAttractor = btnKeys[idx];
                        phaseHistory = [];
                        for (var j = 0; j < btnElements.length; j++) {
                            btnElements[j].rect.setAttribute('fill', j === idx ? 'rgba(221,161,94,0.4)' : 'rgba(255,255,255,0.1)');
                        }
                        if (currentAttractor === 'lorenz') {
                            params = { sigma: 10, rho: 28, beta: 2.667 };
                        } else if (currentAttractor === 'rossler') {
                            params = { a: 0.2, b: 0.2, c: 5.7 };
                        } else {
                            params = { a: 3, b: 2.7, c: 1.7, d: 2, e: 9 };
                        }
                        updateSliders();
                        initParticles();
                    });
                })(i);
            }

            // Sliders via foreignObject
            var sliderFO = createSVGElement('foreignObject', { class: 'interactive' });
            panelGroup.appendChild(sliderFO);

            var sliderDiv = document.createElement('div');
            sliderDiv.style.cssText = 'font-family:Nunito,sans-serif;font-size:12px;color:#e8e6e1;padding:5px;';
            sliderFO.appendChild(sliderDiv);

            var sliderData = [
                { label: '\u03C3 (sigma)', key: 'sigma', min: 1, max: 30, step: 0.5, val: 10 },
                { label: '\u03C1 (rho)', key: 'rho', min: 1, max: 50, step: 0.5, val: 28 },
                { label: '\u03B2 (beta)', key: 'beta', min: 0.1, max: 10, step: 0.1, val: 2.667 }
            ];

            var sliders = {};
            sliderData.forEach(function(sd) {
                var row = document.createElement('div');
                row.style.cssText = 'margin-bottom:6px;display:flex;align-items:center;gap:6px;';
                var lbl = document.createElement('span');
                lbl.style.cssText = 'width:70px;color:#DDA15E;';
                lbl.textContent = sd.label;
                var inp = document.createElement('input');
                inp.type = 'range';
                inp.min = sd.min; inp.max = sd.max; inp.step = sd.step; inp.value = sd.val;
                inp.style.cssText = 'flex:1;accent-color:#DDA15E;height:4px;';
                var val = document.createElement('span');
                val.style.cssText = 'width:40px;text-align:right;font-size:11px;';
                val.textContent = sd.val;
                inp.addEventListener('input', function() {
                    params[sd.key] = parseFloat(inp.value);
                    val.textContent = parseFloat(inp.value).toFixed(1);
                });
                row.appendChild(lbl);
                row.appendChild(inp);
                row.appendChild(val);
                sliderDiv.appendChild(row);
                sliders[sd.key] = { input: inp, display: val };
            });

            function updateSliders() {
                if (currentAttractor === 'lorenz') {
                    sliderData[0].key = 'sigma'; sliderData[1].key = 'rho'; sliderData[2].key = 'beta';
                    sliders.sigma.input.min = 1; sliders.sigma.input.max = 30; sliders.sigma.input.step = 0.5;
                    sliders.sigma.input.value = params.sigma || 10;
                    sliders.sigma.display.textContent = (params.sigma || 10).toFixed(1);
                    sliders.rho.input.min = 1; sliders.rho.input.max = 50; sliders.rho.input.step = 0.5;
                    sliders.rho.input.value = params.rho || 28;
                    sliders.rho.display.textContent = (params.rho || 28).toFixed(1);
                    sliders.beta.input.min = 0.1; sliders.beta.input.max = 10; sliders.beta.input.step = 0.1;
                    sliders.beta.input.value = params.beta || 2.667;
                    sliders.beta.display.textContent = (params.beta || 2.667).toFixed(1);
                }
            }

            function resize() {
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = W; canvas.height = H;
                svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
                svg.setAttribute('width', W);
                svg.setAttribute('height', H);

                panelX = W - panelW - 20;
                panelY = 50;
                panelH = 380;
                panelBg.setAttribute('x', panelX);
                panelBg.setAttribute('y', panelY);
                panelBg.setAttribute('width', panelW);
                panelBg.setAttribute('height', panelH);

                panelTitle.setAttribute('x', panelX + panelW / 2);
                panelTitle.setAttribute('y', panelY + 25);

                chartX = panelX + 15;
                chartY = panelY + 40;
                chartW = panelW - 30;
                chartH = 160;
                chartBorder.setAttribute('x', chartX);
                chartBorder.setAttribute('y', chartY);
                chartBorder.setAttribute('width', chartW);
                chartBorder.setAttribute('height', chartH);

                // Buttons
                for (var i = 0; i < btnElements.length; i++) {
                    btnElements[i].g.setAttribute('transform', 'translate(' + (panelX + 15 + i * 85) + ',' + (chartY + chartH + 15) + ')');
                }

                // Sliders
                sliderFO.setAttribute('x', panelX + 5);
                sliderFO.setAttribute('y', chartY + chartH + 55);
                sliderFO.setAttribute('width', panelW - 10);
                sliderFO.setAttribute('height', 120);
            }

            var resizeTimeout;
            window.addEventListener('resize', function() { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 100); });
            resize();

            // Attractor step functions
            function stepLorenz(x, y, z, dt) {
                var dx = params.sigma * (y - x);
                var dy = x * (params.rho - z) - y;
                var dz = x * y - params.beta * z;
                return [x + dx * dt, y + dy * dt, z + dz * dt, Math.sqrt(dx*dx + dy*dy + dz*dz)];
            }

            function stepRossler(x, y, z, dt) {
                var a = params.a || 0.2, b = params.b || 0.2, c = params.c || 5.7;
                var dx = -y - z;
                var dy = x + a * y;
                var dz = b + z * (x - c);
                return [x + dx * dt, y + dy * dt, z + dz * dt, Math.sqrt(dx*dx + dy*dy + dz*dz)];
            }

            function stepDadras(x, y, z, dt) {
                var a = params.a || 3, b = params.b || 2.7, c = params.c || 1.7, d = params.d || 2, e = params.e || 9;
                var dx = y - a * x + b * y * z;
                var dy = c * y - x * z + z;
                var dz = d * x * y - e * z;
                return [x + dx * dt, y + dy * dt, z + dz * dt, Math.sqrt(dx*dx + dy*dy + dz*dz)];
            }

            var stepFn = { lorenz: stepLorenz, rossler: stepRossler, dadras: stepDadras };

            // Reference point for phase portrait
            var refX = 0.1, refY = 0.1, refZ = 0.1;

            function animate() {
                fpsCounter.update();
                var dt = 0.005;
                var step = stepFn[currentAttractor];

                // Update reference point
                var ref = step(refX, refY, refZ, dt);
                refX = ref[0]; refY = ref[1]; refZ = ref[2];

                // Clamp reference
                if (Math.abs(refX) > 200 || Math.abs(refY) > 200 || Math.abs(refZ) > 200) {
                    refX = (Math.random() - 0.5) * 10;
                    refY = (Math.random() - 0.5) * 10;
                    refZ = Math.random() * 10;
                }

                phaseHistory.push([refX, refZ]);
                if (phaseHistory.length > maxPhasePoints) phaseHistory.shift();

                // Trail fade
                ctx.fillStyle = 'rgba(10,14,26,0.05)';
                ctx.fillRect(0, 0, W, H);

                // Draw particles
                var simW = W - panelW - 40;
                var cx = simW / 2;
                var cy = H / 2;
                var scale = currentAttractor === 'lorenz' ? 8 : currentAttractor === 'rossler' ? 12 : 6;

                for (var i = 0; i < NUM; i++) {
                    var r = step(px[i], py[i], pz[i], dt);
                    px[i] = r[0]; py[i] = r[1]; pz[i] = r[2];
                    var speed = r[3];

                    // Reset divergent particles
                    if (Math.abs(px[i]) > 500 || Math.abs(py[i]) > 500 || Math.abs(pz[i]) > 500 || isNaN(px[i])) {
                        px[i] = (Math.random() - 0.5) * 50;
                        py[i] = (Math.random() - 0.5) * 50;
                        pz[i] = Math.random() * 50;
                        continue;
                    }

                    var sx = cx + px[i] * scale;
                    var sy = cy - pz[i] * scale + 100;

                    if (sx < 0 || sx > simW || sy < 0 || sy > H) continue;

                    var hue = Math.min(speed * 2, 300);
                    ctx.fillStyle = 'hsla(' + hue + ',80%,60%,0.4)';
                    ctx.fillRect(sx, sy, 1.5, 1.5);
                }

                // Update phase portrait SVG
                if (phaseHistory.length > 1) {
                    var xMin = -30, xMax = 30, zMin = 0, zMax = 55;
                    if (currentAttractor === 'rossler') { xMin = -15; xMax = 15; zMin = 0; zMax = 25; }
                    if (currentAttractor === 'dadras') { xMin = -20; xMax = 20; zMin = -5; zMax = 30; }

                    var pts = '';
                    for (var i = 0; i < phaseHistory.length; i++) {
                        var px2 = chartX + ((phaseHistory[i][0] - xMin) / (xMax - xMin)) * chartW;
                        var py2 = chartY + chartH - ((phaseHistory[i][1] - zMin) / (zMax - zMin)) * chartH;
                        px2 = Math.max(chartX, Math.min(chartX + chartW, px2));
                        py2 = Math.max(chartY, Math.min(chartY + chartH, py2));
                        pts += px2.toFixed(1) + ',' + py2.toFixed(1) + ' ';
                    }
                    phasePath.setAttribute('points', pts);
                }

                requestAnimationFrame(animate);
            }

            hideLoading();
            animate();
        } catch (e) {
            showError('Initialization Error: ' + e.message);
        }
    </script>
</body>
</html>
