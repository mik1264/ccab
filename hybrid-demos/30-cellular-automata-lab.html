<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cellular Automata Lab + Entropy Monitor - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:#DDA15E;text-decoration:none;border-radius:6px;font-size:14px;z-index:999}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#DDA15E;padding:8px 12px;border-radius:6px;font-size:14px;z-index:999}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <script>
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';

        var W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; initCA(); buildSVG(); }
        resize();
        window.addEventListener('resize', resize);

        // 4 CA rules in 4 quadrants
        var rules = [
            { name: 'Game of Life', color0: '#0a0e1a', color1: '#4ade80', survive: [2,3], born: [3] },
            { name: 'Seeds', color0: '#0a0e1a', color1: '#60a5fa', survive: [], born: [2] },
            { name: 'HighLife', color0: '#0a0e1a', color1: '#f59e0b', survive: [2,3], born: [3,6] },
            { name: 'Day & Night', color0: '#0a0e1a', color1: '#e879f9', survive: [3,4,6,7,8], born: [3,6,7,8] }
        ];

        var CELL = 4;
        var grids = [], nextGrids = [];
        var qW, qH, qCols, qRows;

        function initCA() {
            qW = Math.floor(W / 2);
            qH = Math.floor(H / 2);
            qCols = Math.floor(qW / CELL);
            qRows = Math.floor(qH / CELL);
            grids = [];
            nextGrids = [];
            for (var r = 0; r < 4; r++) {
                var g = new Uint8Array(qCols * qRows);
                for (var i = 0; i < g.length; i++) g[i] = Math.random() < 0.3 ? 1 : 0;
                grids.push(g);
                nextGrids.push(new Uint8Array(qCols * qRows));
            }
        }

        function getCell(grid, x, y) {
            x = (x + qCols) % qCols; y = (y + qRows) % qRows;
            return grid[y * qCols + x];
        }

        function stepRule(ruleIdx) {
            var rule = rules[ruleIdx];
            var g = grids[ruleIdx], ng = nextGrids[ruleIdx];
            for (var y = 0; y < qRows; y++) {
                for (var x = 0; x < qCols; x++) {
                    var n = 0;
                    for (var dy = -1; dy <= 1; dy++) for (var dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        n += getCell(g, x+dx, y+dy);
                    }
                    var cur = g[y * qCols + x];
                    var next = 0;
                    if (cur === 1 && rule.survive.indexOf(n) >= 0) next = 1;
                    if (cur === 0 && rule.born.indexOf(n) >= 0) next = 1;
                    ng[y * qCols + x] = next;
                }
            }
            grids[ruleIdx] = ng;
            nextGrids[ruleIdx] = g;
        }

        function computeEntropy(ruleIdx) {
            var g = grids[ruleIdx];
            var alive = 0;
            for (var i = 0; i < g.length; i++) alive += g[i];
            var p = alive / g.length;
            if (p <= 0 || p >= 1) return 0;
            return -(p * Math.log2(p) + (1-p) * Math.log2(1-p));
        }

        // SVG sparklines
        var sparkW = 180, sparkH = 50;
        var sparkHistories = [[], [], [], []];
        var MAX_HIST = 100;
        var sparkLines = [];
        var sparkPanels = [];
        var sparkTexts = [];
        var entropyVals = [];

        function buildSVG() {
            svg.innerHTML = '';
            sparkLines = []; sparkPanels = []; sparkTexts = []; entropyVals = [];
            var positions = [
                {x: qW - sparkW - 10, y: qH - sparkH - 30},
                {x: W - sparkW - 10, y: qH - sparkH - 30},
                {x: qW - sparkW - 10, y: H - sparkH - 30},
                {x: W - sparkW - 10, y: H - sparkH - 30}
            ];
            var ruleColors = ['#4ade80','#60a5fa','#f59e0b','#e879f9'];
            for (var r = 0; r < 4; r++) {
                var p = positions[r];

                var panel = document.createElementNS(svgNS, 'rect');
                panel.setAttribute('x', p.x); panel.setAttribute('y', p.y - 20);
                panel.setAttribute('width', sparkW); panel.setAttribute('height', sparkH + 30);
                panel.setAttribute('rx', '6');
                panel.setAttribute('fill', 'rgba(10,14,26,0.85)');
                panel.setAttribute('stroke', ruleColors[r]); panel.setAttribute('stroke-width', '1');
                svg.appendChild(panel);
                sparkPanels.push(panel);

                var title = document.createElementNS(svgNS, 'text');
                title.setAttribute('x', p.x + 6); title.setAttribute('y', p.y - 5);
                title.setAttribute('fill', ruleColors[r]); title.setAttribute('font-size', '11');
                title.setAttribute('font-family', 'Nunito, sans-serif');
                title.setAttribute('font-weight', 'bold');
                title.textContent = rules[r].name;
                svg.appendChild(title);

                var ent = document.createElementNS(svgNS, 'text');
                ent.setAttribute('x', p.x + sparkW - 6); ent.setAttribute('y', p.y - 5);
                ent.setAttribute('text-anchor', 'end');
                ent.setAttribute('fill', '#DDA15E'); ent.setAttribute('font-size', '10');
                ent.setAttribute('font-family', 'Nunito, sans-serif');
                ent.textContent = 'H=0.00';
                svg.appendChild(ent);
                entropyVals.push(ent);

                var line = document.createElementNS(svgNS, 'polyline');
                line.setAttribute('fill', 'none');
                line.setAttribute('stroke', ruleColors[r]);
                line.setAttribute('stroke-width', '1.5');
                svg.appendChild(line);
                sparkLines.push({line: line, p: p});

                // Axis
                var ax = document.createElementNS(svgNS, 'line');
                ax.setAttribute('x1', p.x+2); ax.setAttribute('y1', p.y+sparkH);
                ax.setAttribute('x2', p.x+sparkW-2); ax.setAttribute('y2', p.y+sparkH);
                ax.setAttribute('stroke', 'rgba(138,154,91,0.3)'); ax.setAttribute('stroke-width', '0.8');
                svg.appendChild(ax);
            }

            // Quadrant labels
            var qlabels = ['I','II','III','IV'];
            var qpos = [
                {x: 8, y: qH - 8},
                {x: qW + 8, y: qH - 8},
                {x: 8, y: H - 8},
                {x: qW + 8, y: H - 8}
            ];
        }

        function updateSparklines() {
            for (var r = 0; r < 4; r++) {
                var e = computeEntropy(r);
                sparkHistories[r].push(e);
                if (sparkHistories[r].length > MAX_HIST) sparkHistories[r].shift();
                entropyVals[r].textContent = 'H=' + e.toFixed(3);

                var sl = sparkLines[r];
                var pts = '';
                var hist = sparkHistories[r];
                for (var i = 0; i < hist.length; i++) {
                    var xi = sl.p.x + (i / (MAX_HIST-1)) * (sparkW - 4) + 2;
                    var yi = sl.p.y + sparkH - (hist[i]) * sparkH;
                    pts += xi.toFixed(1) + ',' + yi.toFixed(1) + ' ';
                }
                sl.line.setAttribute('points', pts);
            }
        }

        function drawQuadrant(ruleIdx) {
            var qx = (ruleIdx % 2) * qW;
            var qy = Math.floor(ruleIdx / 2) * qH;
            var rule = rules[ruleIdx];
            var g = grids[ruleIdx];

            var imgData = ctx.createImageData(qCols * CELL, qRows * CELL);
            var d = imgData.data;
            var c1 = parseColor(rule.color1);

            for (var y = 0; y < qRows; y++) {
                for (var x = 0; x < qCols; x++) {
                    var alive = g[y * qCols + x];
                    for (var py = 0; py < CELL; py++) {
                        for (var px = 0; px < CELL; px++) {
                            var idx = ((y * CELL + py) * (qCols * CELL) + (x * CELL + px)) * 4;
                            if (alive) {
                                d[idx] = c1[0]; d[idx+1] = c1[1]; d[idx+2] = c1[2]; d[idx+3] = 255;
                            } else {
                                d[idx] = 10; d[idx+1] = 14; d[idx+2] = 26; d[idx+3] = 255;
                            }
                        }
                    }
                }
            }
            ctx.putImageData(imgData, qx, qy);
        }

        var colorCache = {};
        function parseColor(hex) {
            if (colorCache[hex]) return colorCache[hex];
            var r2 = parseInt(hex.slice(1,3),16);
            var g2 = parseInt(hex.slice(3,5),16);
            var b2 = parseInt(hex.slice(5,7),16);
            colorCache[hex] = [r2,g2,b2];
            return [r2,g2,b2];
        }

        function draw() {
            for (var r = 0; r < 4; r++) drawQuadrant(r);

            // Divider lines
            ctx.strokeStyle = 'rgba(221,161,94,0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(qW, 0); ctx.lineTo(qW, H);
            ctx.moveTo(0, qH); ctx.lineTo(W, qH);
            ctx.stroke();

            // Rule labels in quadrant corners
            var labels = ['Game of Life', 'Seeds', 'HighLife', 'Day & Night'];
            var lcolors = ['#4ade80','#60a5fa','#f59e0b','#e879f9'];
            var lpos = [{x:8,y:20},{x:qW+8,y:20},{x:8,y:qH+20},{x:qW+8,y:qH+20}];
            for (var r2 = 0; r2 < 4; r2++) {
                ctx.fillStyle = lcolors[r2];
                ctx.font = 'bold 13px Nunito';
                ctx.fillText(labels[r2], lpos[r2].x, lpos[r2].y);
            }
        }

        var fpsCount = 0, fpsLast = performance.now();
        var fpsEl = document.getElementById('fps-value');
        var frame = 0;

        function animate() {
            requestAnimationFrame(animate);
            for (var r = 0; r < 4; r++) stepRule(r);
            draw();
            if (frame % 4 === 0) updateSparklines();
            frame++;
            fpsCount++;
            var now = performance.now();
            if (now - fpsLast >= 1000) { fpsEl.textContent = fpsCount; fpsCount = 0; fpsLast = now; }
        }
        animate();
    </script>
</body>
</html>
