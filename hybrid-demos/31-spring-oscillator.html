<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupled Spring Oscillators + Phase Diagram - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:#DDA15E;text-decoration:none;border-radius:6px;font-size:14px;z-index:999}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#DDA15E;padding:8px 12px;border-radius:6px;font-size:14px;z-index:999}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <script>
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';

        var W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; initGrid(); buildSVG(); }
        resize();
        window.addEventListener('resize', resize);

        var ROWS = 20, COLS = 20;
        var k = 0.3; // spring constant
        var damping = 0.002;
        var dt = 0.12;
        var SPACING_X, SPACING_Y, MARGIN_X, MARGIN_Y;
        var displacements, velocities;

        function initGrid() {
            MARGIN_X = 60; MARGIN_Y = 60;
            SPACING_X = (W - 2*MARGIN_X) / (COLS-1);
            SPACING_Y = (H - 2*MARGIN_Y) / (ROWS-1);
            displacements = new Float32Array(ROWS * COLS);
            velocities = new Float32Array(ROWS * COLS);
            // Initial perturbation: gaussian bump at center
            var cr = Math.floor(ROWS/2), cc = Math.floor(COLS/2);
            for (var r = 0; r < ROWS; r++) {
                for (var c = 0; c < COLS; c++) {
                    var dr = r-cr, dc = c-cc;
                    displacements[r*COLS+c] = 15*Math.exp(-(dr*dr+dc*dc)/8);
                }
            }
        }

        function stepGrid() {
            var nd = new Float32Array(ROWS*COLS);
            var nv = new Float32Array(ROWS*COLS);
            for (var r = 0; r < ROWS; r++) {
                for (var c = 0; c < COLS; c++) {
                    var idx = r*COLS+c;
                    var d = displacements[idx];
                    var v = velocities[idx];
                    // Spring force from neighbors
                    var force = 0;
                    var neighbors = 0;
                    if (r > 0)    { force += (displacements[(r-1)*COLS+c] - d); neighbors++; }
                    if (r < ROWS-1){ force += (displacements[(r+1)*COLS+c] - d); neighbors++; }
                    if (c > 0)    { force += (displacements[r*COLS+c-1] - d); neighbors++; }
                    if (c < COLS-1){ force += (displacements[r*COLS+c+1] - d); neighbors++; }
                    // Restoring force toward equilibrium
                    force -= d * 0.1;
                    force *= k;
                    var nv2 = v + force * dt - damping * v;
                    nd[idx] = d + nv2 * dt;
                    nv[idx] = nv2;
                }
            }
            displacements = nd;
            velocities = nv;
        }

        // Phase diagram
        var phaseW = 200, phaseH = 200;
        var phaseX, phaseY;
        var phasePanel, phasePath, phaseDot;
        var phaseHistory = [];
        var MAX_PHASE = 400;

        function buildSVG() {
            phaseX = W - phaseW - 20; phaseY = H - phaseH - 50;
            svg.innerHTML = '';

            phasePanel = document.createElementNS(svgNS, 'rect');
            phasePanel.setAttribute('x', phaseX-5); phasePanel.setAttribute('y', phaseY-30);
            phasePanel.setAttribute('width', phaseW+10); phasePanel.setAttribute('height', phaseH+50);
            phasePanel.setAttribute('rx', '8');
            phasePanel.setAttribute('fill', 'rgba(10,14,26,0.88)');
            phasePanel.setAttribute('stroke', '#DDA15E'); phasePanel.setAttribute('stroke-width', '1.2');
            svg.appendChild(phasePanel);

            var title = document.createElementNS(svgNS, 'text');
            title.setAttribute('x', phaseX+phaseW/2); title.setAttribute('y', phaseY-12);
            title.setAttribute('text-anchor', 'middle');
            title.setAttribute('fill', '#DDA15E'); title.setAttribute('font-size', '12');
            title.setAttribute('font-family', 'Nunito, sans-serif');
            title.textContent = 'Phase Space: x vs dx/dt (center)';
            svg.appendChild(title);

            // Axes
            var ax = document.createElementNS(svgNS, 'line');
            ax.setAttribute('x1', phaseX); ax.setAttribute('y1', phaseY+phaseH/2);
            ax.setAttribute('x2', phaseX+phaseW); ax.setAttribute('y2', phaseY+phaseH/2);
            ax.setAttribute('stroke', '#606C38'); ax.setAttribute('stroke-width', '1');
            svg.appendChild(ax);
            var ay = document.createElementNS(svgNS, 'line');
            ay.setAttribute('x1', phaseX+phaseW/2); ay.setAttribute('y1', phaseY);
            ay.setAttribute('x2', phaseX+phaseW/2); ay.setAttribute('y2', phaseY+phaseH);
            ay.setAttribute('stroke', '#606C38'); ay.setAttribute('stroke-width', '1');
            svg.appendChild(ay);

            // Axis labels
            var xl = document.createElementNS(svgNS, 'text');
            xl.setAttribute('x', phaseX+phaseW-2); xl.setAttribute('y', phaseY+phaseH/2+14);
            xl.setAttribute('text-anchor', 'end');
            xl.setAttribute('fill', '#8A9A5B'); xl.setAttribute('font-size', '10');
            xl.setAttribute('font-family', 'Nunito, sans-serif');
            xl.textContent = 'x'; svg.appendChild(xl);
            var yl = document.createElementNS(svgNS, 'text');
            yl.setAttribute('x', phaseX+phaseW/2+4); yl.setAttribute('y', phaseY+10);
            yl.setAttribute('fill', '#8A9A5B'); yl.setAttribute('font-size', '10');
            yl.setAttribute('font-family', 'Nunito, sans-serif');
            yl.textContent = 'v'; svg.appendChild(yl);

            phasePath = document.createElementNS(svgNS, 'polyline');
            phasePath.setAttribute('fill', 'none');
            phasePath.setAttribute('stroke', '#BC6C25');
            phasePath.setAttribute('stroke-width', '1.5');
            phasePath.setAttribute('opacity', '0.85');
            svg.appendChild(phasePath);

            phaseDot = document.createElementNS(svgNS, 'circle');
            phaseDot.setAttribute('r', '4');
            phaseDot.setAttribute('fill', '#DDA15E');
            svg.appendChild(phaseDot);
        }

        function updatePhase() {
            var ci = Math.floor(ROWS/2)*COLS + Math.floor(COLS/2);
            var x = displacements[ci], v = velocities[ci];
            phaseHistory.push({x:x, v:v});
            if (phaseHistory.length > MAX_PHASE) phaseHistory.shift();

            var maxX = 16, maxV = 4;
            for (var i = 0; i < phaseHistory.length; i++) {
                if (Math.abs(phaseHistory[i].x) > maxX) maxX = Math.abs(phaseHistory[i].x);
                if (Math.abs(phaseHistory[i].v) > maxV) maxV = Math.abs(phaseHistory[i].v);
            }

            var pts = '';
            for (var i = 0; i < phaseHistory.length; i++) {
                var px = phaseX + phaseW/2 + (phaseHistory[i].x / maxX) * phaseW/2;
                var py = phaseY + phaseH/2 - (phaseHistory[i].v / maxV) * phaseH/2;
                pts += px.toFixed(1)+','+py.toFixed(1)+' ';
            }
            phasePath.setAttribute('points', pts);

            var cpx = phaseX + phaseW/2 + (x / maxX) * phaseW/2;
            var cpy = phaseY + phaseH/2 - (v / maxV) * phaseH/2;
            phaseDot.setAttribute('cx', cpx); phaseDot.setAttribute('cy', cpy);
        }

        function colorByDisp(d) {
            var t = Math.max(-1, Math.min(1, d / 15));
            if (t > 0) {
                var r2 = Math.round(t * 221 + 60);
                var g2 = Math.round((1-t)*150 + 60);
                var b2 = Math.round(60);
                return [r2,g2,b2];
            } else {
                var tt = -t;
                return [Math.round(40), Math.round(tt*100+60), Math.round(tt*200+80)];
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, W, H);

            // Draw grid masses
            for (var r = 0; r < ROWS; r++) {
                for (var c = 0; c < COLS; c++) {
                    var idx = r*COLS+c;
                    var d = displacements[idx];
                    var x = MARGIN_X + c * SPACING_X;
                    var y = MARGIN_Y + r * SPACING_Y + d;
                    var col = colorByDisp(d);
                    var bright = Math.min(1, Math.abs(d)/10);

                    // Draw spring connections
                    if (c < COLS-1) {
                        var nx = MARGIN_X + (c+1)*SPACING_X;
                        var ny = MARGIN_Y + r*SPACING_Y + displacements[r*COLS+c+1];
                        ctx.beginPath();
                        ctx.moveTo(x,y); ctx.lineTo(nx,ny);
                        ctx.strokeStyle = 'rgba('+col[0]+','+col[1]+','+col[2]+',0.25)';
                        ctx.lineWidth = 0.7;
                        ctx.stroke();
                    }
                    if (r < ROWS-1) {
                        var nx2 = MARGIN_X + c*SPACING_X;
                        var ny2 = MARGIN_Y + (r+1)*SPACING_Y + displacements[(r+1)*COLS+c];
                        ctx.beginPath();
                        ctx.moveTo(x,y); ctx.lineTo(nx2,ny2);
                        ctx.strokeStyle = 'rgba('+col[0]+','+col[1]+','+col[2]+',0.25)';
                        ctx.lineWidth = 0.7;
                        ctx.stroke();
                    }

                    // Draw mass
                    var radius = 2.5 + bright * 3;
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI*2);
                    ctx.fillStyle = 'rgb('+col[0]+','+col[1]+','+col[2]+')';
                    if (bright > 0.3) { ctx.shadowColor = 'rgb('+col[0]+','+col[1]+','+col[2]+')'; ctx.shadowBlur = 6*bright; }
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        }

        var fpsCount = 0, fpsLast = performance.now();
        var fpsEl = document.getElementById('fps-value');
        var frame = 0;

        function animate() {
            requestAnimationFrame(animate);
            stepGrid();
            draw();
            if (frame % 2 === 0) updatePhase();
            frame++;
            fpsCount++;
            var now = performance.now();
            if (now - fpsLast >= 1000) { fpsEl.textContent = fpsCount; fpsCount = 0; fpsLast = now; }
        }
        animate();
    </script>
</body>
</html>
