<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourier Drawing Machine + Frequency Spectrum - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:#DDA15E;text-decoration:none;border-radius:6px;font-size:14px;z-index:999}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#DDA15E;padding:8px 12px;border-radius:6px;font-size:14px;z-index:999}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <script>
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';

        var W, H, cx, cy;
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cx = W * 0.4; cy = H / 2;
            buildSpectrum();
        }
        resize();
        window.addEventListener('resize', resize);

        // Build star shape fourier series
        var N = 12; // number of harmonics
        // We'll do a star using odd harmonics
        var harmonics = [];
        for (var k = 0; k < N; k++) {
            var freq = 2*k + 1; // odd harmonics: 1, 3, 5, ...
            var amp = 1.0 / freq; // 1/n amplitude for square wave
            harmonics.push({ freq: freq, amp: amp * 120, phase: 0 });
        }

        var tracePoints = [];
        var MAX_TRACE = 1500;
        var t = 0;

        // SVG spectrum
        var specW = 280, specH = 140;
        var specX, specY;
        var specBars = [];
        var specGroup, specPanel;

        function buildSpectrum() {
            specX = W - specW - 20;
            specY = 20;
            svg.innerHTML = '';

            specPanel = document.createElementNS(svgNS, 'rect');
            specPanel.setAttribute('x', specX); specPanel.setAttribute('y', specY);
            specPanel.setAttribute('width', specW); specPanel.setAttribute('height', specH + 40);
            specPanel.setAttribute('rx', '8');
            specPanel.setAttribute('fill', 'rgba(10,14,26,0.85)');
            specPanel.setAttribute('stroke', '#DDA15E'); specPanel.setAttribute('stroke-width', '1.2');
            svg.appendChild(specPanel);

            var title = document.createElementNS(svgNS, 'text');
            title.setAttribute('x', specX + specW/2); title.setAttribute('y', specY + 18);
            title.setAttribute('text-anchor', 'middle');
            title.setAttribute('fill', '#DDA15E'); title.setAttribute('font-size', '12');
            title.setAttribute('font-family', 'Nunito, sans-serif');
            title.textContent = 'Frequency Spectrum (Harmonics)';
            svg.appendChild(title);

            var ax = document.createElementNS(svgNS, 'line');
            ax.setAttribute('x1', specX+10); ax.setAttribute('y1', specY+specH+5);
            ax.setAttribute('x2', specX+specW-10); ax.setAttribute('y2', specY+specH+5);
            ax.setAttribute('stroke', '#606C38'); ax.setAttribute('stroke-width', '1');
            svg.appendChild(ax);

            specGroup = document.createElementNS(svgNS, 'g');
            svg.appendChild(specGroup);
            specBars = [];

            var barW = (specW - 24) / N;
            for (var i = 0; i < N; i++) {
                var bar = document.createElementNS(svgNS, 'rect');
                var hue = (i / N) * 200 + 160;
                bar.setAttribute('fill', 'hsl('+hue+',80%,60%)');
                bar.setAttribute('opacity', '0.9');
                specGroup.appendChild(bar);
                specBars.push(bar);

                var lbl = document.createElementNS(svgNS, 'text');
                lbl.setAttribute('x', specX + 12 + i * barW + barW/2);
                lbl.setAttribute('y', specY + specH + 18);
                lbl.setAttribute('text-anchor', 'middle');
                lbl.setAttribute('fill', '#8A9A5B'); lbl.setAttribute('font-size', '9');
                lbl.setAttribute('font-family', 'Nunito, sans-serif');
                lbl.textContent = harmonics[i].freq;
                svg.appendChild(lbl);
            }

            // Y label
            var yl = document.createElementNS(svgNS, 'text');
            yl.setAttribute('x', specX + 4); yl.setAttribute('y', specY + 60);
            yl.setAttribute('text-anchor', 'middle');
            yl.setAttribute('fill', '#8A9A5B'); yl.setAttribute('font-size', '9');
            yl.setAttribute('font-family', 'Nunito, sans-serif');
            yl.setAttribute('transform', 'rotate(-90,' + (specX+4) + ',' + (specY+60) + ')');
            yl.textContent = 'Amplitude';
            svg.appendChild(yl);
        }

        function updateSpectrum() {
            var maxAmp = harmonics[0].amp;
            var availH = specH - 20;
            var barW = (specW - 24) / N;
            for (var i = 0; i < N; i++) {
                var barH = (harmonics[i].amp / maxAmp) * availH;
                specBars[i].setAttribute('height', barH);
                specBars[i].setAttribute('y', specY + specH + 5 - barH);
                specBars[i].setAttribute('x', specX + 12 + i * barW);
                specBars[i].setAttribute('width', Math.max(1, barW - 2));
            }
        }

        function getEpicyclePos(time) {
            var x = cx, y = cy;
            for (var i = 0; i < harmonics.length; i++) {
                var h = harmonics[i];
                x += h.amp * Math.cos(h.freq * time + h.phase);
                y += h.amp * Math.sin(h.freq * time + h.phase);
            }
            return {x: x, y: y};
        }

        function draw() {
            ctx.fillStyle = 'rgba(10,14,26,0.3)';
            ctx.fillRect(0, 0, W, H);

            // Draw epicycles
            var px = cx, py = cy;
            for (var i = 0; i < harmonics.length; i++) {
                var h = harmonics[i];
                var nx = px + h.amp * Math.cos(h.freq * t + h.phase);
                var ny = py + h.amp * Math.sin(h.freq * t + h.phase);

                // Circle
                ctx.beginPath();
                ctx.arc(px, py, h.amp, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(138,154,91,' + (0.15 + 0.4 * (1-i/harmonics.length)) + ')';
                ctx.lineWidth = 0.8;
                ctx.stroke();

                // Arm
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(nx, ny);
                ctx.strokeStyle = 'rgba(221,161,94,0.7)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Tip dot
                ctx.beginPath();
                ctx.arc(nx, ny, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = '#DDA15E';
                ctx.fill();

                px = nx; py = ny;
            }

            // Trace
            if (tracePoints.length > 1) {
                ctx.beginPath();
                ctx.moveTo(tracePoints[0].x, tracePoints[0].y);
                for (var j = 1; j < tracePoints.length; j++) {
                    ctx.lineTo(tracePoints[j].x, tracePoints[j].y);
                }
                ctx.strokeStyle = '#BC6C25';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#DDA15E';
                ctx.shadowBlur = 8;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        var fpsCount = 0, fpsLast = performance.now();
        var fpsEl = document.getElementById('fps-value');
        var frame = 0;

        function animate() {
            requestAnimationFrame(animate);

            t += 0.008;
            var pos = getEpicyclePos(t);
            tracePoints.push({x: pos.x, y: pos.y});
            if (tracePoints.length > MAX_TRACE) tracePoints.shift();

            draw();

            if (frame % 10 === 0) updateSpectrum();
            frame++;

            fpsCount++;
            var now = performance.now();
            if (now - fpsLast >= 1000) { fpsEl.textContent = fpsCount; fpsCount = 0; fpsLast = now; }
        }
        animate();
    </script>
</body>
</html>
