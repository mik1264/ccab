<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ising Model + Magnetization Chart - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:#DDA15E;text-decoration:none;border-radius:6px;font-size:14px;z-index:999}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#DDA15E;padding:8px 12px;border-radius:6px;font-size:14px;z-index:999}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <script>
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';

        var W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; initIsing(); buildSVG(); }
        resize();
        window.addEventListener('resize', resize);

        var N = 160; // grid size
        var CELL;
        var spins;
        var T = 1.5; // temperature, critical ~ 2.27
        var T_CRIT = 2.269;
        var T_MIN = 1.0, T_MAX = 4.0;
        var magHistory = [];
        var MAX_HIST = 200;
        var tSweep = 0;
        var tCycleSpeed = 0.003;

        function initIsing() {
            CELL = Math.floor(Math.min(W, H) / N);
            spins = new Int8Array(N*N);
            for (var i = 0; i < N*N; i++) spins[i] = Math.random() < 0.5 ? 1 : -1;
        }

        function getSpin(x, y) {
            x = (x+N)%N; y = (y+N)%N;
            return spins[y*N+x];
        }

        function metropolisStep() {
            // Do N*N random updates per call
            for (var k = 0; k < N*N; k++) {
                var x = Math.floor(Math.random()*N);
                var y = Math.floor(Math.random()*N);
                var s = spins[y*N+x];
                var sumNeighbors = getSpin(x+1,y)+getSpin(x-1,y)+getSpin(x,y+1)+getSpin(x,y-1);
                var dE = 2 * s * sumNeighbors;
                if (dE <= 0 || Math.random() < Math.exp(-dE / T)) {
                    spins[y*N+x] = -s;
                }
            }
        }

        function getMagnetization() {
            var sum = 0;
            for (var i = 0; i < N*N; i++) sum += spins[i];
            return Math.abs(sum) / (N*N);
        }

        // SVG charts
        var chartW = 260, chartH = 140;
        var magX, magY;
        var magPanel, magPath, tempMarker, tempText, magText, susceptText;

        // T vs M curve
        var tvmW = 260, tvmH = 130;
        var tvmX, tvmY;
        var tvmPanel, tvmPath2, tvmDot;
        // Precompute theoretical M(T) (mean field approx)
        var tvmPoints = [];

        function theoreticalM(temp) {
            if (temp >= T_CRIT) return 0;
            // Simple approximation: M ~ (1 - (T/Tc)^4)^(1/8)
            var ratio = temp / T_CRIT;
            return Math.pow(Math.max(0, 1 - ratio*ratio*ratio*ratio), 0.125);
        }

        function buildSVG() {
            magX = W - chartW - 20; magY = 20;
            tvmX = W - tvmW - 20; tvmY = magY + chartH + 60;
            svg.innerHTML = '';

            // Magnetization over time
            magPanel = document.createElementNS(svgNS, 'rect');
            magPanel.setAttribute('x', magX); magPanel.setAttribute('y', magY);
            magPanel.setAttribute('width', chartW); magPanel.setAttribute('height', chartH + 50);
            magPanel.setAttribute('rx', '8');
            magPanel.setAttribute('fill', 'rgba(10,14,26,0.87)');
            magPanel.setAttribute('stroke', '#DDA15E'); magPanel.setAttribute('stroke-width', '1.2');
            svg.appendChild(magPanel);

            var t1 = document.createElementNS(svgNS, 'text');
            t1.setAttribute('x', magX+chartW/2); t1.setAttribute('y', magY+18);
            t1.setAttribute('text-anchor', 'middle');
            t1.setAttribute('fill', '#DDA15E'); t1.setAttribute('font-size', '12');
            t1.setAttribute('font-family', 'Nunito, sans-serif');
            t1.textContent = 'Magnetization Over Time';
            svg.appendChild(t1);

            var ax = document.createElementNS(svgNS, 'line');
            ax.setAttribute('x1', magX+8); ax.setAttribute('y1', magY+chartH+8);
            ax.setAttribute('x2', magX+chartW-8); ax.setAttribute('y2', magY+chartH+8);
            ax.setAttribute('stroke', '#606C38'); ax.setAttribute('stroke-width', '1');
            svg.appendChild(ax);
            var ay = document.createElementNS(svgNS, 'line');
            ay.setAttribute('x1', magX+8); ay.setAttribute('y1', magY+22);
            ay.setAttribute('x2', magX+8); ay.setAttribute('y2', magY+chartH+8);
            ay.setAttribute('stroke', '#606C38'); ay.setAttribute('stroke-width', '1');
            svg.appendChild(ay);

            magPath = document.createElementNS(svgNS, 'polyline');
            magPath.setAttribute('fill', 'none');
            magPath.setAttribute('stroke', '#BC6C25');
            magPath.setAttribute('stroke-width', '2');
            svg.appendChild(magPath);

            magText = document.createElementNS(svgNS, 'text');
            magText.setAttribute('x', magX+8); magText.setAttribute('y', magY+chartH+28);
            magText.setAttribute('fill', '#BC6C25'); magText.setAttribute('font-size', '11');
            magText.setAttribute('font-family', 'Nunito, sans-serif');
            svg.appendChild(magText);

            tempText = document.createElementNS(svgNS, 'text');
            tempText.setAttribute('x', magX+chartW-8); tempText.setAttribute('y', magY+chartH+28);
            tempText.setAttribute('text-anchor', 'end');
            tempText.setAttribute('fill', '#8A9A5B'); tempText.setAttribute('font-size', '11');
            tempText.setAttribute('font-family', 'Nunito, sans-serif');
            svg.appendChild(tempText);

            susceptText = document.createElementNS(svgNS, 'text');
            susceptText.setAttribute('x', magX+chartW/2); susceptText.setAttribute('y', magY+chartH+44);
            susceptText.setAttribute('text-anchor', 'middle');
            susceptText.setAttribute('fill', '#4ade80'); susceptText.setAttribute('font-size', '10');
            susceptText.setAttribute('font-family', 'Nunito, sans-serif');
            svg.appendChild(susceptText);

            // T vs M curve
            tvmPanel = document.createElementNS(svgNS, 'rect');
            tvmPanel.setAttribute('x', tvmX); tvmPanel.setAttribute('y', tvmY);
            tvmPanel.setAttribute('width', tvmW); tvmPanel.setAttribute('height', tvmH + 40);
            tvmPanel.setAttribute('rx', '8');
            tvmPanel.setAttribute('fill', 'rgba(10,14,26,0.87)');
            tvmPanel.setAttribute('stroke', '#DDA15E'); tvmPanel.setAttribute('stroke-width', '1.2');
            svg.appendChild(tvmPanel);

            var t2 = document.createElementNS(svgNS, 'text');
            t2.setAttribute('x', tvmX+tvmW/2); t2.setAttribute('y', tvmY+18);
            t2.setAttribute('text-anchor', 'middle');
            t2.setAttribute('fill', '#DDA15E'); t2.setAttribute('font-size', '12');
            t2.setAttribute('font-family', 'Nunito, sans-serif');
            t2.textContent = 'M vs Temperature';
            svg.appendChild(t2);

            var ax2 = document.createElementNS(svgNS, 'line');
            ax2.setAttribute('x1', tvmX+8); ax2.setAttribute('y1', tvmY+tvmH+8);
            ax2.setAttribute('x2', tvmX+tvmW-8); ax2.setAttribute('y2', tvmY+tvmH+8);
            ax2.setAttribute('stroke', '#606C38'); ax2.setAttribute('stroke-width', '1');
            svg.appendChild(ax2);

            // Critical temp marker
            var tcx = tvmX+8 + ((T_CRIT-T_MIN)/(T_MAX-T_MIN)) * (tvmW-18);
            var tcLine = document.createElementNS(svgNS, 'line');
            tcLine.setAttribute('x1', tcx); tcLine.setAttribute('y1', tvmY+22);
            tcLine.setAttribute('x2', tcx); tcLine.setAttribute('y2', tvmY+tvmH+8);
            tcLine.setAttribute('stroke', '#f87171'); tcLine.setAttribute('stroke-width', '1');
            tcLine.setAttribute('stroke-dasharray', '4,3');
            svg.appendChild(tcLine);
            var tcLbl = document.createElementNS(svgNS, 'text');
            tcLbl.setAttribute('x', tcx+2); tcLbl.setAttribute('y', tvmY+35);
            tcLbl.setAttribute('fill', '#f87171'); tcLbl.setAttribute('font-size', '9');
            tcLbl.setAttribute('font-family', 'Nunito, sans-serif');
            tcLbl.textContent = 'Tc'; svg.appendChild(tcLbl);

            // Theoretical curve
            tvmPoints = [];
            for (var i = 0; i <= 60; i++) {
                var temp = T_MIN + (i/60)*(T_MAX-T_MIN);
                tvmPoints.push({t: temp, m: theoreticalM(temp)});
            }
            var pts2 = '';
            for (var i = 0; i < tvmPoints.length; i++) {
                var xi = tvmX+8 + ((tvmPoints[i].t-T_MIN)/(T_MAX-T_MIN)) * (tvmW-18);
                var yi = tvmY+tvmH+8 - tvmPoints[i].m * (tvmH-20);
                pts2 += xi.toFixed(1)+','+yi.toFixed(1)+' ';
            }
            tvmPath2 = document.createElementNS(svgNS, 'polyline');
            tvmPath2.setAttribute('fill', 'none');
            tvmPath2.setAttribute('stroke', '#8A9A5B');
            tvmPath2.setAttribute('stroke-width', '1.5');
            tvmPath2.setAttribute('points', pts2);
            tvmPath2.setAttribute('opacity', '0.7');
            svg.appendChild(tvmPath2);

            tvmDot = document.createElementNS(svgNS, 'circle');
            tvmDot.setAttribute('r', '5');
            tvmDot.setAttribute('fill', '#DDA15E');
            tvmDot.setAttribute('stroke', '#f87171');
            tvmDot.setAttribute('stroke-width', '1.5');
            svg.appendChild(tvmDot);

            var xl = document.createElementNS(svgNS, 'text');
            xl.setAttribute('x', tvmX+tvmW-8); xl.setAttribute('y', tvmY+tvmH+22);
            xl.setAttribute('text-anchor', 'end');
            xl.setAttribute('fill', '#8A9A5B'); xl.setAttribute('font-size', '9');
            xl.setAttribute('font-family', 'Nunito, sans-serif');
            xl.textContent = 'Temperature'; svg.appendChild(xl);
        }

        function updateSVG() {
            var mag = getMagnetization();
            magHistory.push(mag);
            if (magHistory.length > MAX_HIST) magHistory.shift();

            var availW = chartW - 18, availH = chartH - 20;
            var pts = '';
            for (var i = 0; i < magHistory.length; i++) {
                var xi = magX+8 + (i/(MAX_HIST-1))*availW;
                var yi = magY+chartH+8 - magHistory[i] * availH;
                pts += xi.toFixed(1)+','+yi.toFixed(1)+' ';
            }
            magPath.setAttribute('points', pts);
            magText.textContent = 'M=' + mag.toFixed(3);
            tempText.textContent = 'T=' + T.toFixed(2) + (T < T_CRIT ? ' (ordered)' : ' (disordered)');

            // Susceptibility: variance of M
            if (magHistory.length > 10) {
                var mean = magHistory.reduce(function(a,b){return a+b;},0)/magHistory.length;
                var variance = 0;
                for (var i = 0; i < magHistory.length; i++) variance += (magHistory[i]-mean)*(magHistory[i]-mean);
                variance /= magHistory.length;
                susceptText.textContent = 'Susceptibility χ ~ ' + (variance*1000).toFixed(2);
            }

            // Update T vs M dot
            var tdx = tvmX+8 + ((T-T_MIN)/(T_MAX-T_MIN)) * (tvmW-18);
            var tdy = tvmY+tvmH+8 - mag * (tvmH-20);
            tvmDot.setAttribute('cx', tdx);
            tvmDot.setAttribute('cy', tdy);
        }

        function draw() {
            // Draw Ising grid as pixels
            var imgData = ctx.createImageData(N*CELL, N*CELL);
            var d = imgData.data;
            for (var y = 0; y < N; y++) {
                for (var x = 0; x < N; x++) {
                    var s = spins[y*N+x];
                    var r2, g2, b2;
                    if (s === 1) {
                        // Near critical: fractal-like golden domains
                        if (T > T_CRIT - 0.3 && T < T_CRIT + 0.3) {
                            r2 = 200; g2 = 120; b2 = 30;
                        } else {
                            r2 = 240; g2 = 200; b2 = 100;
                        }
                    } else {
                        r2 = 20; g2 = 25; b2 = 50;
                    }
                    for (var py = 0; py < CELL; py++) for (var px = 0; px < CELL; px++) {
                        var idx = ((y*CELL+py)*N*CELL+(x*CELL+px))*4;
                        d[idx]=r2; d[idx+1]=g2; d[idx+2]=b2; d[idx+3]=255;
                    }
                }
            }
            // Center canvas
            var offX = Math.floor((W - N*CELL)/2);
            var offY = Math.floor((H - N*CELL)/2);
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0,0,W,H);
            ctx.putImageData(imgData, offX, offY);

            // Temperature label on canvas
            var phase = T < T_CRIT ? 'Ferromagnetic' : 'Paramagnetic';
            ctx.fillStyle = T < T_CRIT ? '#fbbf24' : '#60a5fa';
            ctx.font = 'bold 15px Nunito';
            ctx.textAlign = 'center';
            ctx.fillText('T=' + T.toFixed(2) + '  [' + phase + ']', W/2, offY - 12);
            ctx.textAlign = 'left';
        }

        var fpsCount = 0, fpsLast = performance.now();
        var fpsEl = document.getElementById('fps-value');
        var frame = 0;

        function animate() {
            requestAnimationFrame(animate);

            // Slowly cycle temperature
            tSweep += tCycleSpeed;
            T = T_MIN + (T_MAX-T_MIN) * (0.5 + 0.5*Math.sin(tSweep));

            metropolisStep();
            draw();

            if (frame % 5 === 0) updateSVG();
            frame++;
            fpsCount++;
            var now = performance.now();
            if (now - fpsLast >= 1000) { fpsEl.textContent = fpsCount; fpsCount = 0; fpsLast = now; }
        }
        animate();
    </script>
</body>
</html>
