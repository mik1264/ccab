<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Velocity Field + Streamlines - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1;cursor:crosshair}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:var(--earth);text-decoration:none;border-radius:6px;font-size:14px;z-index:999;transition:all 0.3s ease;cursor:default}
        .back-link:hover{background:rgba(221,161,94,0.2);transform:translateX(-4px)}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:var(--earth);padding:8px 12px;border-radius:6px;font-family:'Courier New',monospace;font-size:14px;z-index:999}
        #hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);border:1px solid rgba(221,161,94,0.3);border-radius:8px;padding:8px 20px;font-size:13px;color:var(--earth);z-index:999;pointer-events:none}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="hint">Click anywhere to add a vortex</div>
    <script>
    (function(){
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';
        var W, H;

        var GRID = 48; // velocity field grid resolution
        var vx, vy; // velocity arrays [GRID*GRID]

        function resize(){
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            svg.setAttribute('width', W);
            svg.setAttribute('height', H);
        }
        resize();
        window.addEventListener('resize', resize);

        // Vortex sources
        var vortices = [];
        function addVortex(x, y, strength){
            vortices.push({
                x: x/W, y: y/H,
                strength: strength || (Math.random()>0.5 ? 1 : -1) * (0.3 + Math.random()*0.7),
                life: 1.0,
                decay: 0.001 + Math.random()*0.002
            });
        }

        // Seed some initial vortices
        addVortex(W*0.3, H*0.4, 1.0);
        addVortex(W*0.7, H*0.6, -0.8);
        addVortex(W*0.5, H*0.3, 0.6);

        canvas.addEventListener('click', function(e){
            addVortex(e.clientX, e.clientY);
            if(vortices.length > 8) vortices.shift();
        });

        // Compute velocity field from vortex superposition
        vx = new Float32Array(GRID*GRID);
        vy = new Float32Array(GRID*GRID);

        function computeField(){
            for(var gj=0;gj<GRID;gj++){
                for(var gi=0;gi<GRID;gi++){
                    var fx = (gi+0.5)/GRID;
                    var fy = (gj+0.5)/GRID;
                    var u=0, v=0;
                    // Background flow (gentle rightward)
                    u += 0.08;
                    vortices.forEach(function(vo){
                        var dx = fx - vo.x, dy = fy - vo.y;
                        var r2 = dx*dx + dy*dy + 0.001;
                        var fac = vo.strength * vo.life / r2;
                        // Rotational velocity
                        u += -dy * fac * 0.5;
                        v +=  dx * fac * 0.5;
                    });
                    vx[gj*GRID+gi] = u;
                    vy[gj*GRID+gi] = v;
                }
            }
        }

        // Tracer particles
        var N_PARTICLES = 600;
        var px = new Float32Array(N_PARTICLES);
        var py = new Float32Array(N_PARTICLES);
        var pa = new Float32Array(N_PARTICLES); // age
        var plife = new Float32Array(N_PARTICLES);
        var phue = new Float32Array(N_PARTICLES);

        for(var i=0;i<N_PARTICLES;i++){
            px[i] = Math.random();
            py[i] = Math.random();
            pa[i] = Math.random();
            plife[i] = 0.5 + Math.random()*0.5;
            phue[i] = Math.random()*360;
        }

        function bilinearSample(arr, fx, fy){
            var gx = fx * GRID - 0.5, gy = fy * GRID - 0.5;
            var x0 = Math.floor(gx), y0 = Math.floor(gy);
            var tx = gx - x0, ty = gy - y0;
            x0 = Math.max(0,Math.min(GRID-2,x0));
            y0 = Math.max(0,Math.min(GRID-2,y0));
            var v00=arr[y0*GRID+x0], v10=arr[y0*GRID+x0+1];
            var v01=arr[(y0+1)*GRID+x0], v11=arr[(y0+1)*GRID+x0+1];
            return v00*(1-tx)*(1-ty)+v10*tx*(1-ty)+v01*(1-tx)*ty+v11*tx*ty;
        }

        function advectParticles(dt){
            for(var i=0;i<N_PARTICLES;i++){
                pa[i] += dt * 0.5;
                if(pa[i] > plife[i]){
                    // Respawn
                    px[i] = Math.random();
                    py[i] = Math.random();
                    pa[i] = 0;
                    plife[i] = 0.5 + Math.random()*1.5;
                    phue[i] = Math.random()*360;
                    continue;
                }
                var u = bilinearSample(vx, px[i], py[i]);
                var v = bilinearSample(vy, px[i], py[i]);
                px[i] += u * dt * 0.08;
                py[i] += v * dt * 0.08;
                // Wrap
                if(px[i]<0) px[i]+=1; if(px[i]>1) px[i]-=1;
                if(py[i]<0) py[i]+=1; if(py[i]>1) py[i]-=1;
            }
        }

        // SVG elements
        function svgEl(tag,attrs){
            var el = document.createElementNS(svgNS,tag);
            for(var k in attrs) el.setAttribute(k,attrs[k]);
            return el;
        }

        // Arrow grid (16x12 arrows)
        var ARROW_GRID_X = 16, ARROW_GRID_Y = 12;
        var arrowEls = [];
        for(var aj=0;aj<ARROW_GRID_Y;aj++){
            for(var ai=0;ai<ARROW_GRID_X;ai++){
                var arrG = svgEl('g',{});
                svg.appendChild(arrG);
                var arrLine = svgEl('line',{'stroke-width':1.5,'stroke-linecap':'round'});
                var arrHead = svgEl('polygon',{});
                arrG.appendChild(arrLine);
                arrG.appendChild(arrHead);
                arrowEls.push({g:arrG, line:arrLine, head:arrHead});
            }
        }

        // Colorbar (right side)
        var cbG = svgEl('g',{});
        svg.appendChild(cbG);
        // Create gradient
        var defs = svgEl('defs',{});
        svg.insertBefore(defs, svg.firstChild);
        var grad = svgEl('linearGradient',{id:'velGrad',x1:'0',y1:'1',x2:'0',y2:'0'});
        defs.appendChild(grad);
        var stops = [
            [0,'#1a237e'],[0.2,'#1565c0'],[0.4,'#00897b'],[0.6,'#f9a825'],[0.8,'#e65100'],[1,'#b71c1c']
        ];
        stops.forEach(function(s){
            var st = svgEl('stop',{offset:s[0],'stop-color':s[1]});
            grad.appendChild(st);
        });
        var cbRect = svgEl('rect',{width:14,height:160,fill:'url(#velGrad)',rx:4,stroke:'rgba(255,255,255,0.2)','stroke-width':1});
        cbG.appendChild(cbRect);
        var cbLow = svgEl('text',{fill:'#aaa','font-family':'Nunito,sans-serif','font-size':10,'text-anchor':'middle'});
        cbLow.textContent = 'Low';
        cbG.appendChild(cbLow);
        var cbHigh = svgEl('text',{fill:'#aaa','font-family':'Nunito,sans-serif','font-size':10,'text-anchor':'middle'});
        cbHigh.textContent = 'High';
        cbG.appendChild(cbHigh);
        var cbTitle = svgEl('text',{fill:'#DDA15E','font-family':'Lora,serif','font-size':12,'font-weight':600,'text-anchor':'middle'});
        cbTitle.textContent = 'Velocity';
        cbG.appendChild(cbTitle);

        // Info panel (top)
        var infoG = svgEl('g',{});
        svg.appendChild(infoG);
        var infoBg = svgEl('rect',{rx:8,fill:'rgba(0,0,0,0.7)',stroke:'rgba(221,161,94,0.3)','stroke-width':1,width:200,height:54});
        infoG.appendChild(infoBg);
        var keTitle = svgEl('text',{fill:'#DDA15E','font-family':'Lora,serif','font-size':13,'font-weight':600});
        keTitle.textContent = 'Fluid Dynamics';
        infoG.appendChild(keTitle);
        var keTxt = svgEl('text',{fill:'#e8e6e1','font-family':'Courier New,monospace','font-size':11});
        infoG.appendChild(keTxt);
        var vortexTxt = svgEl('text',{fill:'#8A9A5B','font-family':'Courier New,monospace','font-size':11});
        infoG.appendChild(vortexTxt);

        var fps=0,fpsFrames=0,fpsLast=performance.now();
        var fpsEl=document.getElementById('fps-value');
        var frame=0;
        var lastTime=performance.now();

        // Trail canvas for accumulation
        var trailCanvas = document.createElement('canvas');
        var tctx = trailCanvas.getContext('2d');

        function ensureTrail(){
            if(trailCanvas.width!==W||trailCanvas.height!==H){
                trailCanvas.width=W; trailCanvas.height=H;
            }
        }

        function animate(){
            requestAnimationFrame(animate);
            frame++;
            fpsFrames++;
            var now=performance.now();
            var dt=Math.min((now-lastTime)/1000, 0.05);
            lastTime=now;
            if(now-fpsLast>500){
                fps=Math.round(fpsFrames*1000/(now-fpsLast));
                fpsEl.textContent=fps;
                fpsFrames=0;fpsLast=now;
            }

            // Decay vortices
            vortices.forEach(function(vo){ vo.life-=vo.decay; });
            vortices = vortices.filter(function(vo){ return vo.life>0; });
            if(vortices.length<2 && frame%180===0){
                addVortex(Math.random()*W, Math.random()*H);
            }

            computeField();
            advectParticles(dt);

            ensureTrail();

            // Trail fade
            tctx.fillStyle='rgba(10,14,26,0.18)';
            tctx.fillRect(0,0,W,H);

            // Draw particles onto trail canvas
            for(var i=0;i<N_PARTICLES;i++){
                var age = pa[i]/plife[i];
                var alpha = Math.sin(age*Math.PI)*0.8;
                var u = bilinearSample(vx, px[i], py[i]);
                var v = bilinearSample(vy, px[i], py[i]);
                var spd = Math.sqrt(u*u+v*v);
                var hue2 = (spd*400) % 360;
                tctx.beginPath();
                tctx.arc(px[i]*W, py[i]*H, 1.5, 0, Math.PI*2);
                tctx.fillStyle='hsla('+hue2+',80%,65%,'+alpha+')';
                tctx.fill();
            }

            // Draw to main canvas
            ctx.clearRect(0,0,W,H);
            ctx.drawImage(trailCanvas,0,0);

            // Vortex centers
            vortices.forEach(function(vo){
                var vx2=vo.x*W, vy2=vo.y*H;
                ctx.beginPath();
                ctx.arc(vx2,vy2,6,0,Math.PI*2);
                ctx.strokeStyle='rgba(221,161,94,'+(vo.life*0.8)+')';
                ctx.lineWidth=2;
                ctx.stroke();
                // Spiral
                for(var a=0;a<Math.PI*4;a+=0.2){
                    var r2=a*3;
                    var cx2=vx2+Math.cos(a*(vo.strength>0?1:-1))*r2;
                    var cy2=vy2+Math.sin(a*(vo.strength>0?1:-1))*r2;
                    ctx.beginPath();
                    ctx.arc(cx2,cy2,0.8,0,Math.PI*2);
                    ctx.fillStyle='rgba(221,161,94,'+(0.15*vo.life)+')';
                    ctx.fill();
                }
            });

            // Update SVG arrows
            var totalKE = 0;
            for(var aj=0;aj<ARROW_GRID_Y;aj++){
                for(var ai=0;ai<ARROW_GRID_X;ai++){
                    var fx = (ai+0.5)/ARROW_GRID_X;
                    var fy = (aj+0.5)/ARROW_GRID_Y;
                    var u2 = bilinearSample(vx, fx, fy);
                    var v2 = bilinearSample(vy, fx, fy);
                    var spd2 = Math.sqrt(u2*u2+v2*v2);
                    totalKE += spd2*spd2;
                    var ax2 = fx*W, ay2 = fy*H;
                    var angle2 = Math.atan2(v2,u2);
                    var len = Math.min(spd2*60, 22);
                    var ex = ax2+Math.cos(angle2)*len, ey = ay2+Math.sin(angle2)*len;
                    var normSpd = Math.min(1, spd2/0.5);
                    var hue3 = (1-normSpd)*240; // blue=slow, red=fast
                    var col2 = 'hsla('+hue3+',85%,65%,0.65)';
                    var idx2 = aj*ARROW_GRID_X+ai;
                    arrowEls[idx2].line.setAttribute('x1',ax2);
                    arrowEls[idx2].line.setAttribute('y1',ay2);
                    arrowEls[idx2].line.setAttribute('x2',ex);
                    arrowEls[idx2].line.setAttribute('y2',ey);
                    arrowEls[idx2].line.setAttribute('stroke',col2);
                    // Arrowhead
                    var hw=4, hl=7;
                    var cos2=Math.cos(angle2), sin2=Math.sin(angle2);
                    var hx1=ex-hl*cos2+hw*sin2, hy1=ey-hl*sin2-hw*cos2;
                    var hx2=ex-hl*cos2-hw*sin2, hy2=ey-hl*sin2+hw*cos2;
                    arrowEls[idx2].head.setAttribute('points',ex+','+ey+' '+hx1+','+hy1+' '+hx2+','+hy2);
                    arrowEls[idx2].head.setAttribute('fill',col2);
                }
            }

            // Colorbar position
            var CBX = W-50, CBY = H/2-80;
            cbRect.setAttribute('x',CBX);
            cbRect.setAttribute('y',CBY);
            cbLow.setAttribute('x',CBX+7);
            cbLow.setAttribute('y',CBY+175);
            cbHigh.setAttribute('x',CBX+7);
            cbHigh.setAttribute('y',CBY-6);
            cbTitle.setAttribute('x',CBX+7);
            cbTitle.setAttribute('y',CBY-18);

            // Info panel
            var IX=70, IY=70;
            infoBg.setAttribute('x',IX);
            infoBg.setAttribute('y',IY);
            keTitle.setAttribute('x',IX+14);
            keTitle.setAttribute('y',IY+18);
            keTxt.setAttribute('x',IX+14);
            keTxt.setAttribute('y',IY+35);
            keTxt.textContent='KE: '+(totalKE/100).toFixed(3)+' (norm)';
            vortexTxt.setAttribute('x',IX+14);
            vortexTxt.setAttribute('y',IY+50);
            vortexTxt.textContent='Vortices: '+vortices.length;
        }

        function bilinearSample(arr, fx, fy){
            var gx=fx*GRID-0.5, gy=fy*GRID-0.5;
            var x0=Math.floor(gx), y0=Math.floor(gy);
            var tx=gx-x0, ty=gy-y0;
            x0=Math.max(0,Math.min(GRID-2,x0));
            y0=Math.max(0,Math.min(GRID-2,y0));
            var v00=arr[y0*GRID+x0], v10=arr[y0*GRID+x0+1];
            var v01=arr[(y0+1)*GRID+x0], v11=arr[(y0+1)*GRID+x0+1];
            return v00*(1-tx)*(1-ty)+v10*tx*(1-ty)+v01*(1-tx)*ty+v11*tx*ty;
        }

        computeField();
        animate();
    })();
    </script>
</body>
</html>
