<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langton's Ant Rules - Hybrid Canvas+SVG</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; font-family:'Nunito',sans-serif; background:#0a0e1a; color:#e8e6e1; }
        .back-link { position:fixed; top:10px; left:10px; padding:8px 16px; background:rgba(0,0,0,0.7); color:var(--earth); text-decoration:none; border-radius:6px; font-size:14px; font-family:'Nunito',sans-serif; z-index:999; transition:all 0.3s ease; }
        .back-link:hover { background:rgba(221,161,94,0.2); transform:translateX(-4px); }
        #fps-counter { position:fixed; top:10px; right:10px; background:rgba(0,0,0,0.7); color:var(--earth); padding:8px 12px; border-radius:6px; font-family:'Courier New',monospace; font-size:14px; z-index:999; }
        .fps-good{color:#10b981} .fps-medium{color:#fbbf24} .fps-poor{color:#e11d48}
        #hybrid-container { position:relative; width:100vw; height:100vh; }
        #canvas { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
        #svg-overlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }
        .interactive { pointer-events:all; cursor:pointer; }
        .svg-label { font-family:'Nunito',sans-serif; font-size:12px; fill:rgba(255,255,255,0.8); pointer-events:none; }
        .svg-title { font-family:'Lora',serif; font-size:16px; fill:var(--earth); pointer-events:none; }
        #loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:1000; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.1); border-top-color:var(--earth); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #error { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(225,29,72,0.9); color:white; padding:2rem; border-radius:12px; text-align:center; max-width:400px; z-index:1001; }
        #error h2 { font-family:'Lora',serif; margin:0 0 1rem 0; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="loading"><div class="spinner"></div><p>Loading demo...</p></div>
    <div id="error"><h2>Error</h2><p id="error-message"></p></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"><defs></defs></svg>
    </div>
    <script>
    window.addEventListener('error', (e) => { showError('Runtime Error: ' + e.message); });
    function showError(m) { document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='block'; document.getElementById('error-message').textContent=m; }
    function hideLoading() { document.getElementById('loading').style.display='none'; }

    class FPSCounter {
        constructor(){this.fps=0;this.frames=0;this.lastTime=performance.now();this.el=document.getElementById('fps-value');}
        update(){this.frames++;const n=performance.now(),d=n-this.lastTime;if(d>=1000){this.fps=Math.round(this.frames*1000/d);this.frames=0;this.lastTime=n;this.el.textContent=this.fps;this.el.className=this.fps>=55?'fps-good':this.fps>=30?'fps-medium':'fps-poor';}}
    }

    try {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const svgEl = document.getElementById('svg-overlay');
        const ns = 'http://www.w3.org/2000/svg';
        const fpsCounter = new FPSCounter();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        let W, H;

        const GRID_SIZE = 500;
        let grid = new Uint8Array(GRID_SIZE * GRID_SIZE);
        let ant = { x: Math.floor(GRID_SIZE / 2), y: Math.floor(GRID_SIZE / 2), dir: 0 };
        let stepsPerFrame = 100;
        let totalSteps = 0;

        // Rule: array of {turn, nextColor} per color index
        // turn: 'R'=right, 'L'=left, 'U'=180, 'N'=none
        let rules = [
            { turn: 'R', nextColor: 1 },
            { turn: 'L', nextColor: 0 }
        ];

        const colorPalette = [
            '#0a0e1a', '#DDA15E', '#8A9A5B', '#BC6C25',
            '#606C38', '#5B8A9A', '#9A5B8A', '#5B9A60'
        ];

        const presets = {
            'RL (Classic)': [{ turn:'R', nextColor:1 }, { turn:'L', nextColor:0 }],
            'LLRR': [{ turn:'L', nextColor:1 }, { turn:'L', nextColor:2 }, { turn:'R', nextColor:3 }, { turn:'R', nextColor:0 }],
            'RLR': [{ turn:'R', nextColor:1 }, { turn:'L', nextColor:2 }, { turn:'R', nextColor:0 }],
            'RLLR': [{ turn:'R', nextColor:1 }, { turn:'L', nextColor:2 }, { turn:'L', nextColor:3 }, { turn:'R', nextColor:0 }]
        };

        // Direction: 0=up, 1=right, 2=down, 3=left
        const dx = [0, 1, 0, -1];
        const dy = [-1, 0, 1, 0];

        function turnDir(dir, turn) {
            if (turn === 'R') return (dir + 1) % 4;
            if (turn === 'L') return (dir + 3) % 4;
            if (turn === 'U') return (dir + 2) % 4;
            return dir; // N
        }

        function step() {
            const idx = ant.y * GRID_SIZE + ant.x;
            const color = grid[idx];
            const rule = rules[color] || rules[0];

            ant.dir = turnDir(ant.dir, rule.turn);
            grid[idx] = rule.nextColor;

            ant.x += dx[ant.dir];
            ant.y += dy[ant.dir];

            // Wrap
            if (ant.x < 0) ant.x = GRID_SIZE - 1;
            if (ant.x >= GRID_SIZE) ant.x = 0;
            if (ant.y < 0) ant.y = GRID_SIZE - 1;
            if (ant.y >= GRID_SIZE) ant.y = 0;

            totalSteps++;
        }

        function resetGrid() {
            grid.fill(0);
            ant = { x: Math.floor(GRID_SIZE / 2), y: Math.floor(GRID_SIZE / 2), dir: 0 };
            totalSteps = 0;
        }

        function drawGrid() {
            const cellW = W / GRID_SIZE;
            const cellH = H / GRID_SIZE;

            const imgData = ctx.createImageData(W, H);
            const data = imgData.data;

            // Pre-parse colors
            const parsedColors = colorPalette.map(c => {
                const m = c.match(/^#([\da-f]{2})([\da-f]{2})([\da-f]{2})$/i);
                return m ? [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)] : [10,14,26];
            });

            for (let py = 0; py < H; py++) {
                const gy = Math.floor(py / cellH);
                for (let px = 0; px < W; px++) {
                    const gx = Math.floor(px / cellW);
                    const ci = grid[gy * GRID_SIZE + gx];
                    const col = parsedColors[ci] || parsedColors[0];
                    const idx = (py * W + px) * 4;
                    data[idx] = col[0]; data[idx+1] = col[1]; data[idx+2] = col[2]; data[idx+3] = 255;
                }
            }
            ctx.putImageData(imgData, 0, 0);

            // Draw ant
            const ax = ant.x * cellW + cellW / 2;
            const ay = ant.y * cellH + cellH / 2;
            ctx.beginPath();
            ctx.arc(ax, ay, Math.max(2, cellW), 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        }

        function createUI() {
            svgEl.innerHTML = '';
            const d = document.createElementNS(ns, 'defs'); svgEl.appendChild(d);

            const title = document.createElementNS(ns, 'text');
            title.setAttribute('class', 'svg-title');
            title.setAttribute('x', W / 2); title.setAttribute('y', 28);
            title.setAttribute('text-anchor', 'middle');
            title.textContent = 'Langton\'s Ant - Custom Rules';
            svgEl.appendChild(title);

            // Step counter
            const stepText = document.createElementNS(ns, 'text');
            stepText.setAttribute('id', 'step-counter');
            stepText.setAttribute('class', 'svg-label');
            stepText.setAttribute('x', W / 2); stepText.setAttribute('y', 48);
            stepText.setAttribute('text-anchor', 'middle');
            stepText.setAttribute('fill', 'rgba(255,255,255,0.5)');
            svgEl.appendChild(stepText);

            // Rule editor + controls
            const fo = document.createElementNS(ns, 'foreignObject');
            fo.setAttribute('x', 10); fo.setAttribute('y', 60);
            fo.setAttribute('width', 260); fo.setAttribute('height', H - 70);
            fo.setAttribute('class', 'interactive');

            let rulesHTML = '';
            rules.forEach((r, i) => {
                rulesHTML += `
                <tr>
                    <td><div style="width:16px;height:16px;background:${colorPalette[i]};border:1px solid #666;border-radius:2px;"></div></td>
                    <td><select class="turn-sel" data-idx="${i}" style="background:#1a1e2e;border:1px solid #444;color:#e8e6e1;border-radius:3px;padding:1px 4px;font-size:11px;">
                        <option value="L" ${r.turn==='L'?'selected':''}>L (Left)</option>
                        <option value="R" ${r.turn==='R'?'selected':''}>R (Right)</option>
                        <option value="U" ${r.turn==='U'?'selected':''}>U (180)</option>
                        <option value="N" ${r.turn==='N'?'selected':''}>N (None)</option>
                    </select></td>
                    <td style="font-size:10px;color:#888;">&rarr; ${r.nextColor}</td>
                </tr>`;
            });

            let presetsHTML = '';
            Object.keys(presets).forEach(name => {
                presetsHTML += `<button class="preset-btn" data-preset="${name}" style="padding:2px 8px;border:1px solid #606C38;background:rgba(0,0,0,0.5);color:#8A9A5B;border-radius:3px;cursor:pointer;font-size:10px;margin:2px;">${name}</button>`;
            });

            fo.innerHTML = `
                <div xmlns="http://www.w3.org/1999/xhtml" style="background:rgba(0,0,0,0.8);padding:12px;border-radius:10px;font-family:Nunito,sans-serif;font-size:12px;color:#e8e6e1;">
                    <div style="color:#DDA15E;font-weight:600;margin-bottom:6px;">Rule Editor</div>
                    <table style="margin-bottom:8px;" id="rules-table">
                        <tr><th style="font-size:10px;color:#888;">Color</th><th style="font-size:10px;color:#888;">Turn</th><th style="font-size:10px;color:#888;">Next</th></tr>
                        ${rulesHTML}
                    </table>
                    <div style="display:flex;gap:4px;margin-bottom:8px;">
                        <button id="add-color" style="padding:3px 8px;border:1px solid #DDA15E;background:rgba(0,0,0,0.5);color:#DDA15E;border-radius:3px;cursor:pointer;font-size:10px;">+ Add Color</button>
                        <button id="rm-color" style="padding:3px 8px;border:1px solid #e11d48;background:rgba(0,0,0,0.5);color:#e11d48;border-radius:3px;cursor:pointer;font-size:10px;">- Remove</button>
                    </div>
                    <div style="color:#DDA15E;font-weight:600;margin-bottom:4px;">Presets</div>
                    <div style="margin-bottom:8px;">${presetsHTML}</div>
                    <div style="margin-bottom:6px;"><label style="color:#DDA15E;">Speed: <span id="speed-val">${stepsPerFrame}</span>/frame</label>
                    <input type="range" id="speed-slider" min="1" max="10000" value="${stepsPerFrame}" style="width:100%;"></div>
                    <button id="reset-btn" style="padding:4px 12px;border:1px solid #8A9A5B;background:rgba(0,0,0,0.5);color:#8A9A5B;border-radius:4px;cursor:pointer;font-size:12px;">Reset</button>
                </div>
            `;
            svgEl.appendChild(fo);
        }

        function bindUI() {
            document.querySelectorAll('.turn-sel').forEach(sel => {
                sel.addEventListener('change', function() {
                    const idx = parseInt(this.dataset.idx);
                    rules[idx].turn = this.value;
                    resetGrid();
                });
            });

            document.getElementById('add-color').addEventListener('click', function() {
                if (rules.length >= 8) return;
                rules.push({ turn: 'R', nextColor: 0 });
                // Fix nextColor chain
                for (let i = 0; i < rules.length; i++) {
                    rules[i].nextColor = (i + 1) % rules.length;
                }
                resetGrid();
                createUI(); bindUI();
            });

            document.getElementById('rm-color').addEventListener('click', function() {
                if (rules.length <= 2) return;
                rules.pop();
                for (let i = 0; i < rules.length; i++) {
                    rules[i].nextColor = (i + 1) % rules.length;
                }
                resetGrid();
                createUI(); bindUI();
            });

            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const name = this.dataset.preset;
                    rules = JSON.parse(JSON.stringify(presets[name]));
                    resetGrid();
                    createUI(); bindUI();
                });
            });

            document.getElementById('speed-slider').addEventListener('input', function() {
                stepsPerFrame = parseInt(this.value);
                document.getElementById('speed-val').textContent = stepsPerFrame;
            });

            document.getElementById('reset-btn').addEventListener('click', function() {
                resetGrid();
            });
        }

        function resize() {
            const rect = canvas.getBoundingClientRect();
            W = rect.width; H = rect.height;
            canvas.width = W * dpr; canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
            svgEl.setAttribute('width', W); svgEl.setAttribute('height', H);
            createUI(); bindUI();
            resetGrid();
        }

        let resizeTimeout;
        window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(resize, 150); });
        resize();

        function animate() {
            fpsCounter.update();
            for (let i = 0; i < stepsPerFrame; i++) step();
            drawGrid();
            const sc = document.getElementById('step-counter');
            if (sc) sc.textContent = `Steps: ${totalSteps.toLocaleString()}`;
            requestAnimationFrame(animate);
        }
        hideLoading();
        animate();
    } catch (err) { showError('Init Error: ' + err.message); }
    </script>
</body>
</html>
