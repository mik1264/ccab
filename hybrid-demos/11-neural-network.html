<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Training + Live Loss Chart - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--sage:#8A9A5B;--moss:#606C38;--earth:#DDA15E;--cream:#FEFAE0;--terracotta:#BC6C25;--dark-moss:#3d4423}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;background:#0a0e1a;color:#e8e6e1}
        .back-link{position:fixed;top:10px;left:10px;padding:8px 16px;background:rgba(0,0,0,0.7);color:var(--earth);text-decoration:none;border-radius:6px;font-size:14px;z-index:999;transition:all 0.3s ease}
        .back-link:hover{background:rgba(221,161,94,0.2);transform:translateX(-4px)}
        #fps-counter{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:var(--earth);padding:8px 12px;border-radius:6px;font-family:'Courier New',monospace;font-size:14px;z-index:999}
        #hybrid-container{position:relative;width:100vw;height:100vh}
        #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
        #svg-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>
    <div id="hybrid-container">
        <canvas id="canvas"></canvas>
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <script>
    (function(){
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var svg = document.getElementById('svg-overlay');
        var svgNS = 'http://www.w3.org/2000/svg';
        var W, H;

        function resize(){
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            svg.setAttribute('width', W);
            svg.setAttribute('height', H);
        }
        resize();
        window.addEventListener('resize', resize);

        // Network topology
        var LAYERS = [4, 6, 4, 2];
        var layerColors = ['#4fa3e0','#8A9A5B','#DDA15E','#BC6C25'];

        // Weights and biases (initialized randomly)
        var weights = []; // weights[l] = matrix [LAYERS[l+1]][LAYERS[l]]
        var biases = [];  // biases[l] = vector [LAYERS[l+1]]
        var activations = []; // activations[l] = vector [LAYERS[l]]

        function initNetwork(){
            weights = [];
            biases = [];
            for(var l=0;l<LAYERS.length-1;l++){
                var w = [];
                for(var j=0;j<LAYERS[l+1];j++){
                    var row = [];
                    for(var i=0;i<LAYERS[l];i++){
                        row.push((Math.random()-0.5)*2);
                    }
                    w.push(row);
                }
                weights.push(w);
                var b = [];
                for(var j=0;j<LAYERS[l+1];j++) b.push((Math.random()-0.5)*0.5);
                biases.push(b);
            }
            activations = LAYERS.map(function(n){ return new Array(n).fill(0); });
        }
        initNetwork();

        function sigmoid(x){ return 1/(1+Math.exp(-x)); }
        function relu(x){ return Math.max(0,x); }

        function forward(input){
            activations[0] = input.slice();
            for(var l=0;l<weights.length;l++){
                var next = [];
                for(var j=0;j<LAYERS[l+1];j++){
                    var sum = biases[l][j];
                    for(var i=0;i<LAYERS[l];i++) sum += weights[l][j][i] * activations[l][i];
                    next.push(sigmoid(sum));
                }
                activations[l+1] = next;
            }
            return activations[activations.length-1].slice();
        }

        // Spiral dataset (2 classes)
        var dataX = [], dataY = [];
        for(var c=0;c<2;c++){
            for(var i=0;i<50;i++){
                var r = 0.1 + 0.8*(i/50);
                var angle = (i/50)*4*Math.PI + c*Math.PI + (Math.random()-0.5)*0.5;
                dataX.push([
                    Math.cos(angle)*r, Math.sin(angle)*r,
                    Math.cos(angle*2)*r*0.5, Math.sin(angle*2)*r*0.5
                ]);
                dataY.push(c===0 ? [1,0] : [0,1]);
            }
        }

        // Training state
        var epoch = 0;
        var lossHistory = [];
        var accuracy = 0;
        var lr = 0.05;

        function trainStep(){
            var totalLoss = 0;
            var correct = 0;
            // Mini-batch SGD
            for(var bi=0;bi<8;bi++){
                var idx = Math.floor(Math.random()*dataX.length);
                var x = dataX[idx], y = dataY[idx];
                var out = forward(x);

                // Loss (MSE)
                var loss = 0;
                for(var k=0;k<out.length;k++) loss += (out[k]-y[k])*(out[k]-y[k]);
                totalLoss += loss;

                // Backprop (simplified SGD)
                var delta = [[], [], []];
                // Output layer error
                var outErr = [];
                for(var k=0;k<out.length;k++){
                    outErr.push(2*(out[k]-y[k])*out[k]*(1-out[k]));
                }
                delta[weights.length-1] = outErr;

                // Hidden layer errors
                for(var l=weights.length-2;l>=0;l--){
                    var err = new Array(LAYERS[l+1]).fill(0);
                    for(var j=0;j<LAYERS[l+1];j++){
                        var s = 0;
                        for(var k=0;k<LAYERS[l+2];k++){
                            s += weights[l+1][k][j] * delta[l+1][k];
                        }
                        err[j] = s * activations[l+1][j] * (1-activations[l+1][j]);
                    }
                    delta[l] = err;
                }

                // Update weights
                for(var l=0;l<weights.length;l++){
                    for(var j=0;j<LAYERS[l+1];j++){
                        for(var i=0;i<LAYERS[l];i++){
                            weights[l][j][i] -= lr * delta[l][j] * activations[l][i];
                        }
                        biases[l][j] -= lr * delta[l][j];
                    }
                }

                // Accuracy check
                var pred = out[0] > out[1] ? 0 : 1;
                var actual = y[0] > y[1] ? 0 : 1;
                if(pred === actual) correct++;
            }
            epoch++;
            var avgLoss = totalLoss/8;
            lossHistory.push(avgLoss);
            if(lossHistory.length > 200) lossHistory.shift();
            accuracy = correct/8;
        }

        // Animated pulse particles
        var pulses = [];
        function spawnPulse(){
            var sample = Math.floor(Math.random()*dataX.length);
            pulses.push({
                input: dataX[sample],
                label: dataY[sample],
                layerIdx: 0,
                nodeIdx: 0,
                t: 0,
                speed: 0.04 + Math.random()*0.02,
                out: null
            });
        }

        // SVG elements
        function svgEl(tag,attrs){
            var el = document.createElementNS(svgNS, tag);
            for(var k in attrs) el.setAttribute(k,attrs[k]);
            return el;
        }

        // Loss chart at bottom
        var CHART_H = 100, CHART_PAD = 60;
        var chartG = svgEl('g',{});
        svg.appendChild(chartG);
        var chartBg = svgEl('rect',{rx:8,fill:'rgba(0,0,0,0.7)',stroke:'rgba(221,161,94,0.3)','stroke-width':1});
        chartG.appendChild(chartBg);
        var chartTitle = svgEl('text',{fill:'#DDA15E','font-family':'Lora,serif','font-size':13,'font-weight':600});
        chartTitle.textContent = 'Training Loss';
        chartG.appendChild(chartTitle);
        var lossPath = svgEl('path',{fill:'none',stroke:'#DDA15E','stroke-width':1.5});
        chartG.appendChild(lossPath);
        var chartAxisX = svgEl('line',{stroke:'rgba(255,255,255,0.2)','stroke-width':1});
        var chartAxisY = svgEl('line',{stroke:'rgba(255,255,255,0.2)','stroke-width':1});
        chartG.appendChild(chartAxisX);
        chartG.appendChild(chartAxisY);

        // Info panel (top center)
        var infoG = svgEl('g',{});
        svg.appendChild(infoG);
        var infoBg = svgEl('rect',{rx:8,fill:'rgba(0,0,0,0.7)',stroke:'rgba(221,161,94,0.3)','stroke-width':1,width:280,height:56});
        infoG.appendChild(infoBg);
        var epochTxt = svgEl('text',{fill:'#e8e6e1','font-family':'Courier New,monospace','font-size':12});
        epochTxt.textContent = 'Epoch: 0';
        infoG.appendChild(epochTxt);
        var accTxt = svgEl('text',{fill:'#8A9A5B','font-family':'Courier New,monospace','font-size':12});
        accTxt.textContent = 'Accuracy: --%';
        infoG.appendChild(accTxt);
        var lossTxt = svgEl('text',{fill:'#DDA15E','font-family':'Courier New,monospace','font-size':12});
        lossTxt.textContent = 'Loss: --.---';
        infoG.appendChild(lossTxt);

        // Layer labels
        var layerLabelEls = [];
        LAYERS.forEach(function(n,li){
            var el = svgEl('text',{'text-anchor':'middle',fill:'rgba(255,255,255,0.5)','font-family':'Nunito,sans-serif','font-size':11});
            var lname = ['Input','Hidden 1','Hidden 2','Output'][li];
            el.textContent = lname;
            svg.appendChild(el);
            layerLabelEls.push(el);
        });

        function getNodePos(li, ni){
            var NET_W = Math.min(W*0.55, 600);
            var NET_X = (W - NET_W)/2;
            var NET_Y_START = H*0.12, NET_Y_END = H*0.75;
            var x = NET_X + li * (NET_W / (LAYERS.length-1));
            var n = LAYERS[li];
            var spacing = (NET_Y_END - NET_Y_START) / (n+1);
            var y = NET_Y_START + (ni+1)*spacing;
            return {x:x, y:y};
        }

        var fps=0,fpsFrames=0,fpsLast=performance.now();
        var fpsEl=document.getElementById('fps-value');
        var frame=0;

        function animate(){
            requestAnimationFrame(animate);
            frame++;
            fpsFrames++;
            var now=performance.now();
            if(now-fpsLast>500){
                fps=Math.round(fpsFrames*1000/(now-fpsLast));
                fpsEl.textContent=fps;
                fpsFrames=0;fpsLast=now;
            }

            // Train every other frame
            if(frame%2===0) trainStep();

            // Spawn pulses
            if(frame%30===0 && pulses.length<5) spawnPulse();

            ctx.clearRect(0,0,W,H);

            // Background gradient
            var bg = ctx.createLinearGradient(0,0,W,H);
            bg.addColorStop(0,'#0a0e1a');
            bg.addColorStop(1,'#0d1228');
            ctx.fillStyle=bg;
            ctx.fillRect(0,0,W,H);

            // Draw connections
            for(var l=0;l<LAYERS.length-1;l++){
                for(var j=0;j<LAYERS[l+1];j++){
                    for(var i=0;i<LAYERS[l];i++){
                        var p1 = getNodePos(l,i), p2 = getNodePos(l+1,j);
                        var w = weights[l][j][i];
                        var alpha = Math.min(1, Math.abs(w)*0.4);
                        var col = w>0 ? '80,163,224' : '188,108,37';
                        var lw = Math.min(3, Math.abs(w)*1.2);
                        ctx.beginPath();
                        ctx.moveTo(p1.x,p1.y);
                        ctx.lineTo(p2.x,p2.y);
                        ctx.strokeStyle='rgba('+col+','+alpha+')';
                        ctx.lineWidth=lw;
                        ctx.stroke();
                    }
                }
            }

            // Draw nodes
            for(var l=0;l<LAYERS.length;l++){
                for(var ni=0;ni<LAYERS[l];ni++){
                    var pos = getNodePos(l,ni);
                    var act = activations[l][ni];
                    var baseCol = layerColors[l];

                    // Glow
                    var glow = ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,22);
                    glow.addColorStop(0, hexToRgba(baseCol, act*0.6));
                    glow.addColorStop(1,'rgba(0,0,0,0)');
                    ctx.beginPath();
                    ctx.arc(pos.x,pos.y,22,0,Math.PI*2);
                    ctx.fillStyle=glow;
                    ctx.fill();

                    // Node circle
                    ctx.beginPath();
                    ctx.arc(pos.x,pos.y,12,0,Math.PI*2);
                    ctx.fillStyle=hexToRgba(baseCol, 0.2+act*0.6);
                    ctx.fill();
                    ctx.strokeStyle=hexToRgba(baseCol, 0.5+act*0.5);
                    ctx.lineWidth=2;
                    ctx.stroke();

                    // Activation value
                    ctx.fillStyle='rgba(255,255,255,'+(0.4+act*0.6)+')';
                    ctx.font='9px Courier New';
                    ctx.textAlign='center';
                    ctx.textBaseline='middle';
                    ctx.fillText(act.toFixed(2), pos.x, pos.y);
                }
            }
            ctx.textAlign='left';
            ctx.textBaseline='alphabetic';

            // Draw pulse particles
            for(var pi=pulses.length-1;pi>=0;pi--){
                var pulse = pulses[pi];
                // Get current and next position
                if(pulse.layerIdx >= LAYERS.length-1){
                    pulses.splice(pi,1);
                    continue;
                }
                var fromNode = pulse.nodeIdx % LAYERS[pulse.layerIdx];
                var toNode = Math.floor(Math.random()*LAYERS[pulse.layerIdx+1]);
                var p1 = getNodePos(pulse.layerIdx, fromNode);
                var p2 = getNodePos(pulse.layerIdx+1, toNode);
                pulse.t += pulse.speed;
                if(pulse.t >= 1){
                    pulse.t = 0;
                    pulse.layerIdx++;
                    pulse.nodeIdx = toNode;
                    if(pulse.layerIdx >= LAYERS.length){
                        pulses.splice(pi,1);
                        continue;
                    }
                }
                var px2 = p1.x + (p2.x-p1.x)*pulse.t;
                var py2 = p1.y + (p2.y-p1.y)*pulse.t;
                ctx.beginPath();
                ctx.arc(px2,py2,5,0,Math.PI*2);
                var isClass0 = pulse.label[0] > 0.5;
                ctx.fillStyle = isClass0 ? 'rgba(79,163,224,0.9)' : 'rgba(188,108,37,0.9)';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(px2,py2,9,0,Math.PI*2);
                ctx.fillStyle = isClass0 ? 'rgba(79,163,224,0.3)' : 'rgba(188,108,37,0.3)';
                ctx.fill();
            }

            // Update SVG layer labels
            LAYERS.forEach(function(n,li){
                var pos = getNodePos(li,0);
                layerLabelEls[li].setAttribute('x', pos.x);
                layerLabelEls[li].setAttribute('y', H*0.78);
            });

            // Info panel
            var infoX = W/2 - 140, infoY = 14;
            infoBg.setAttribute('x', infoX);
            infoBg.setAttribute('y', infoY);
            epochTxt.setAttribute('x', infoX+14);
            epochTxt.setAttribute('y', infoY+20);
            accTxt.setAttribute('x', infoX+14);
            accTxt.setAttribute('y', infoY+38);
            lossTxt.setAttribute('x', infoX+150);
            lossTxt.setAttribute('y', infoY+38);
            epochTxt.textContent = 'Epoch: '+epoch;
            accTxt.textContent = 'Acc: '+(accuracy*100).toFixed(0)+'%';
            var lastLoss = lossHistory.length>0 ? lossHistory[lossHistory.length-1] : 0;
            lossTxt.textContent = 'Loss: '+lastLoss.toFixed(4);

            // Loss chart
            var CX = 60, CY = H - CHART_H - 20, CW = W - 120;
            chartBg.setAttribute('x', CX-10);
            chartBg.setAttribute('y', CY-24);
            chartBg.setAttribute('width', CW+20);
            chartBg.setAttribute('height', CHART_H+30);
            chartTitle.setAttribute('x', CX);
            chartTitle.setAttribute('y', CY-8);

            chartAxisX.setAttribute('x1',CX); chartAxisX.setAttribute('y1',CY+CHART_H);
            chartAxisX.setAttribute('x2',CX+CW); chartAxisX.setAttribute('y2',CY+CHART_H);
            chartAxisY.setAttribute('x1',CX); chartAxisY.setAttribute('y1',CY);
            chartAxisY.setAttribute('x2',CX); chartAxisY.setAttribute('y2',CY+CHART_H);

            if(lossHistory.length>1){
                var maxL = 2, minL = 0;
                var pts = '';
                lossHistory.forEach(function(l2,i){
                    var px3 = CX + (i/(lossHistory.length-1))*CW;
                    var py3 = CY + CHART_H - ((l2-minL)/(maxL-minL))*CHART_H;
                    py3 = Math.max(CY, Math.min(CY+CHART_H, py3));
                    pts += (i===0?'M':'L')+px3.toFixed(1)+','+py3.toFixed(1);
                });
                lossPath.setAttribute('d', pts);
            }
        }

        function hexToRgba(hex, alpha){
            var r=parseInt(hex.slice(1,3),16);
            var g=parseInt(hex.slice(3,5),16);
            var b=parseInt(hex.slice(5,7),16);
            return 'rgba('+r+','+g+','+b+','+alpha+')';
        }

        // Run a forward pass to initialize activations
        var sample0 = dataX[0];
        forward(sample0);

        animate();
    })();
    </script>
</body>
</html>
