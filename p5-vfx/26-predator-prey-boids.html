<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predator-Prey Boids | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

// Predator-Prey Boids
// 1000 cyan prey + 30 red/orange predators

var prey = [];
var predators = [];
var NUM_PREY = 1000;
var NUM_PRED = 30;

// Prey params
var PREY_MAX_SPEED = 3.2;
var PREY_MAX_FORCE = 0.12;
var PREY_PERCEPTION = 60;
var PREY_SEP_DIST = 25;
var FLEE_RADIUS = 100;
var FLEE_FORCE = 0.35;

// Predator params
var PRED_MAX_SPEED = 3.8;
var PRED_MAX_FORCE = 0.15;
var PRED_PERCEPTION = 120;
var CATCH_DIST = 15;

// Eat flash: array of {x, y, life}
var flashes = [];

function setup() {
    createCanvas(windowWidth, windowHeight);
    colorMode(HSB, 360, 100, 100, 100);
    blendMode(ADD);
    noStroke();

    for (var i = 0; i < NUM_PREY; i++) {
        prey.push(new Prey());
    }
    for (var i = 0; i < NUM_PRED; i++) {
        predators.push(new Predator());
    }
}

function draw() {
    background(0, 0, 5, 18);

    // Update and draw prey
    for (var i = 0; i < prey.length; i++) {
        prey[i].flock(prey, predators);
        prey[i].update();
        prey[i].edges();
        prey[i].show();
    }

    // Update and draw predators
    for (var i = 0; i < predators.length; i++) {
        predators[i].hunt(prey);
        predators[i].update();
        predators[i].edges();
        predators[i].show();
    }

    // Draw eat flashes
    for (var i = flashes.length - 1; i >= 0; i--) {
        var f = flashes[i];
        var alpha = (f.life / 20) * 80;
        var sz = (1 - f.life / 20) * 40 + 5;
        fill(30, 100, 100, alpha);
        ellipse(f.x, f.y, sz, sz);
        f.life--;
        if (f.life <= 0) flashes.splice(i, 1);
    }

    // HUD
    blendMode(BLEND);
    fill(0, 0, 80, 90);
    noStroke();
    textFont('monospace');
    textSize(12);
    textAlign(RIGHT);
    text('Prey: ' + prey.length, width - 14, height - 28);
    text('Predators: ' + predators.length, width - 14, height - 12);

    // Title
    textAlign(LEFT);
    fill(0, 0, 60, 70);
    textSize(13);
    text('Predator-Prey Boids', 14, height - 12);
    blendMode(ADD);
}

// --- Prey class ---
function Prey() {
    this.pos = createVector(random(width), random(height));
    this.vel = p5.Vector.random2D().mult(random(1.5, 2.5));
    this.acc = createVector(0, 0);
    this.hue = random(180, 200);
}

Prey.prototype.flock = function(others, preds) {
    var ali = createVector(0, 0);
    var coh = createVector(0, 0);
    var sep = createVector(0, 0);
    var flee = createVector(0, 0);
    var aliCount = 0, cohCount = 0, sepCount = 0, fleeCount = 0;

    for (var i = 0; i < others.length; i++) {
        if (others[i] === this) continue;
        var d = dist(this.pos.x, this.pos.y, others[i].pos.x, others[i].pos.y);
        if (d < PREY_PERCEPTION) {
            ali.add(others[i].vel);
            aliCount++;
            coh.add(others[i].pos);
            cohCount++;
        }
        if (d < PREY_SEP_DIST && d > 0) {
            var diff = p5.Vector.sub(this.pos, others[i].pos);
            diff.div(d);
            sep.add(diff);
            sepCount++;
        }
    }

    for (var j = 0; j < preds.length; j++) {
        var dp = dist(this.pos.x, this.pos.y, preds[j].pos.x, preds[j].pos.y);
        if (dp < FLEE_RADIUS) {
            var away = p5.Vector.sub(this.pos, preds[j].pos);
            away.div(dp * dp + 1);
            flee.add(away);
            fleeCount++;
        }
    }

    if (aliCount > 0) {
        ali.div(aliCount);
        ali.setMag(PREY_MAX_SPEED);
        ali.sub(this.vel);
        ali.limit(PREY_MAX_FORCE);
    }
    if (cohCount > 0) {
        coh.div(cohCount);
        coh.sub(this.pos);
        coh.setMag(PREY_MAX_SPEED);
        coh.sub(this.vel);
        coh.limit(PREY_MAX_FORCE);
    }
    if (sepCount > 0) {
        sep.div(sepCount);
        sep.setMag(PREY_MAX_SPEED);
        sep.sub(this.vel);
        sep.limit(PREY_MAX_FORCE * 1.5);
    }
    if (fleeCount > 0) {
        flee.normalize();
        flee.setMag(PREY_MAX_SPEED);
        flee.sub(this.vel);
        flee.limit(FLEE_FORCE);
    }

    this.acc.add(ali.mult(1.0));
    this.acc.add(coh.mult(0.8));
    this.acc.add(sep.mult(1.2));
    this.acc.add(flee.mult(3.5));
};

Prey.prototype.update = function() {
    this.vel.add(this.acc);
    this.vel.limit(PREY_MAX_SPEED);
    this.pos.add(this.vel);
    this.acc.set(0, 0);
};

Prey.prototype.edges = function() {
    if (this.pos.x < 0) this.pos.x = width;
    if (this.pos.x > width) this.pos.x = 0;
    if (this.pos.y < 0) this.pos.y = height;
    if (this.pos.y > height) this.pos.y = 0;
};

Prey.prototype.show = function() {
    var spd = this.vel.mag();
    var bright = map(spd, 0, PREY_MAX_SPEED, 60, 100);
    fill(this.hue, 80, bright, 75);
    ellipse(this.pos.x, this.pos.y, 4, 4);
};

Prey.prototype.respawn = function() {
    this.pos = createVector(random(width), random(height));
    this.vel = p5.Vector.random2D().mult(random(1, 2));
};

// --- Predator class ---
function Predator() {
    this.pos = createVector(random(width), random(height));
    this.vel = p5.Vector.random2D().mult(random(1, 2));
    this.acc = createVector(0, 0);
    this.hue = random(0, 20);
    this.eatGlow = 0;
}

Predator.prototype.hunt = function(preyArr) {
    // Find centroid of nearby prey
    var target = createVector(0, 0);
    var count = 0;
    var closestDist = 999999;
    var closestIdx = -1;

    for (var i = 0; i < preyArr.length; i++) {
        var d = dist(this.pos.x, this.pos.y, preyArr[i].pos.x, preyArr[i].pos.y);
        if (d < PRED_PERCEPTION) {
            target.add(preyArr[i].pos);
            count++;
        }
        if (d < closestDist) {
            closestDist = d;
            closestIdx = i;
        }
    }

    // Eat closest if in range
    if (closestIdx >= 0 && closestDist < CATCH_DIST) {
        flashes.push({ x: preyArr[closestIdx].pos.x, y: preyArr[closestIdx].pos.y, life: 20 });
        preyArr[closestIdx].respawn();
        this.eatGlow = 15;
    }

    var steer = createVector(0, 0);
    if (count > 0) {
        target.div(count);
        target.sub(this.pos);
        target.setMag(PRED_MAX_SPEED);
        steer = p5.Vector.sub(target, this.vel);
        steer.limit(PRED_MAX_FORCE);
    } else if (closestIdx >= 0) {
        // Chase the single closest prey
        var dir = p5.Vector.sub(preyArr[closestIdx].pos, this.pos);
        dir.setMag(PRED_MAX_SPEED);
        steer = p5.Vector.sub(dir, this.vel);
        steer.limit(PRED_MAX_FORCE);
    }
    this.acc.add(steer);

    // Predator-predator separation
    var sep = createVector(0, 0);
    var sc = 0;
    for (var j = 0; j < predators.length; j++) {
        if (predators[j] === this) continue;
        var dp = dist(this.pos.x, this.pos.y, predators[j].pos.x, predators[j].pos.y);
        if (dp < 50 && dp > 0) {
            var diff = p5.Vector.sub(this.pos, predators[j].pos);
            diff.div(dp);
            sep.add(diff);
            sc++;
        }
    }
    if (sc > 0) {
        sep.div(sc);
        sep.setMag(PRED_MAX_SPEED);
        sep.sub(this.vel);
        sep.limit(PRED_MAX_FORCE);
        this.acc.add(sep.mult(1.5));
    }
};

Predator.prototype.update = function() {
    this.vel.add(this.acc);
    this.vel.limit(PRED_MAX_SPEED);
    this.pos.add(this.vel);
    this.acc.set(0, 0);
    if (this.eatGlow > 0) this.eatGlow--;
};

Predator.prototype.edges = function() {
    if (this.pos.x < 0) this.pos.x = width;
    if (this.pos.x > width) this.pos.x = 0;
    if (this.pos.y < 0) this.pos.y = height;
    if (this.pos.y > height) this.pos.y = 0;
};

Predator.prototype.show = function() {
    var baseHue = this.hue;
    var bright = 85;
    if (this.eatGlow > 0) {
        baseHue = 40;
        bright = 100;
        // Extra glow ring
        fill(30, 100, 100, (this.eatGlow / 15) * 60);
        ellipse(this.pos.x, this.pos.y, 28, 28);
    }
    fill(baseHue, 90, bright, 90);
    ellipse(this.pos.x, this.pos.y, 8, 8);
};

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
    </script>
</body>
</html>
