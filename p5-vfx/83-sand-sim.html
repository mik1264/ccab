<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falling Sand Simulation | P5 VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#toolbar { position:fixed; top:12px; right:12px; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.75); padding:10px 14px; border-radius:8px; z-index:999; color:#aaa; line-height:2; }
#toolbar span { cursor:pointer; padding:2px 8px; border-radius:4px; margin:2px; display:inline-block; }
#toolbar span.active { outline:2px solid #fff; }
#fps { position:fixed; bottom:12px; right:12px; color:#555; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:4px; z-index:999; }
#keys { position:fixed; bottom:12px; left:12px; color:#444; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:4px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="toolbar">
  Material:<br>
  <span id="btn-sand" onclick="setMat(1)" style="color:#e8c46a">■ Sand (S)</span><br>
  <span id="btn-water" onclick="setMat(2)" style="color:#4488ff">■ Water (W)</span><br>
  <span id="btn-fire" onclick="setMat(3)" style="color:#ff6620">■ Fire (F)</span><br>
  <span id="btn-wood" onclick="setMat(4)" style="color:#8B5E3C">■ Wood (X)</span><br>
  <span id="btn-oil" onclick="setMat(5)" style="color:#aa8833">■ Oil (O)</span><br>
  <span id="btn-erase" onclick="setMat(0)" style="color:#555">■ Erase (E)</span>
</div>
<div id="fps">FPS: 0</div>
<div id="keys">click/drag to spawn · S W F X O E</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const CS = 3;
  const EMPTY=0, SAND=1, WATER=2, FIRE=3, WOOD=4, OIL=5;
  let cols, rows, grid, updated;
  let curMat = 1;
  let fpsTimer = 0, fpsCount = 0, fpsVal = 0;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    cols = Math.floor(p.width / CS);
    rows = Math.floor(p.height / CS);
    grid = new Uint8Array(cols * rows);
    updated = new Uint8Array(cols * rows);
    setActive();
  };

  function g(c, r) {
    if (c < 0 || c >= cols || r < 0 || r >= rows) return -1;
    return grid[r * cols + c];
  }
  function s(c, r, v) {
    if (c < 0 || c >= cols || r < 0 || r >= rows) return;
    grid[r * cols + c] = v;
    updated[r * cols + c] = 1;
  }

  function swap(c1,r1,c2,r2) {
    const i1=r1*cols+c1, i2=r2*cols+c2;
    const tmp=grid[i1]; grid[i1]=grid[i2]; grid[i2]=tmp;
    updated[i1]=1; updated[i2]=1;
  }

  // Per-material noise for color variation
  function matColor(mat, c, r) {
    const noise = ((c*7+r*13) % 20) / 20;
    if (mat===SAND) {
      const h = 38+noise*12, sat=55+noise*20, bri=65+noise*20;
      return hsbToRgb(h,sat,bri);
    }
    if (mat===WATER) return hsbToRgb(210+noise*15, 80, 60+noise*20);
    if (mat===FIRE) {
      const age = Math.random();
      return hsbToRgb(15+age*30, 90, 80+noise*20);
    }
    if (mat===WOOD) return hsbToRgb(25+noise*10, 55+noise*20, 30+noise*15);
    if (mat===OIL)  return hsbToRgb(45+noise*20, 60+noise*20, 35+noise*20);
    return [0,0,0];
  }

  function simulate() {
    updated.fill(0);
    // Update bottom-to-top, randomize left/right order
    for (let r = rows - 1; r >= 0; r--) {
      const leftRight = Math.random() < 0.5;
      for (let ci = 0; ci < cols; ci++) {
        const c = leftRight ? ci : cols - 1 - ci;
        if (updated[r*cols+c]) continue;
        const mat = g(c,r);
        if (mat === EMPTY) continue;

        if (mat === SAND) {
          if (g(c,r+1)===EMPTY || g(c,r+1)===WATER) { swap(c,r,c,r+1); }
          else {
            const d = Math.random()<0.5?1:-1;
            if (g(c+d,r+1)===EMPTY || g(c+d,r+1)===WATER) swap(c,r,c+d,r+1);
            else if (g(c-d,r+1)===EMPTY || g(c-d,r+1)===WATER) swap(c,r,c-d,r+1);
          }
        }
        else if (mat === WATER) {
          if (g(c,r+1)===EMPTY) { swap(c,r,c,r+1); }
          else {
            const d = Math.random()<0.5?1:-1;
            if (g(c+d,r)===EMPTY) swap(c,r,c+d,r);
            else if (g(c-d,r)===EMPTY) swap(c,r,c-d,r);
          }
        }
        else if (mat === OIL) {
          // Float on water, sink through empty but not water bottom
          if (g(c,r+1)===EMPTY) { swap(c,r,c,r+1); }
          else if (g(c,r-1)===WATER) { swap(c,r,c,r-1); } // rise through water
          else {
            const d = Math.random()<0.5?1:-1;
            if (g(c+d,r)===EMPTY) swap(c,r,c+d,r);
            else if (g(c-d,r)===EMPTY) swap(c,r,c-d,r);
          }
        }
        else if (mat === FIRE) {
          // Rise
          if (g(c,r-1)===EMPTY && Math.random()<0.3) { swap(c,r,c,r-1); }
          else if (Math.random()<0.15) s(c,r,EMPTY); // extinguish
          // Ignite neighbors
          for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
            const nb = g(c+dc,r+dr);
            if ((nb===WOOD||nb===OIL) && Math.random()<0.04) s(c+dc,r+dr,FIRE);
            if (nb===WATER && Math.random()<0.05) s(c,r,EMPTY);
          }
        }
        // WOOD: static, does nothing on its own
      }
    }
  }

  p.draw = function() {
    fpsCount++;
    const now = performance.now();
    if (now - fpsTimer >= 500) {
      fpsVal = Math.round(fpsCount / ((now - fpsTimer)/1000));
      fpsCount = 0; fpsTimer = now;
      document.getElementById('fps').textContent = 'FPS: '+fpsVal;
    }

    // Spawn
    if (p.mouseIsPressed) {
      const mc = Math.floor(p.mouseX / CS);
      const mr = Math.floor(p.mouseY / CS);
      const R = curMat===0?4:3;
      for (let dr=-R;dr<=R;dr++) for (let dc=-R;dc<=R;dc++) {
        if (dc*dc+dr*dr>R*R) continue;
        const cc=mc+dc, rr=mr+dr;
        if (cc>=0&&cc<cols&&rr>=0&&rr<rows) {
          if (curMat===0) grid[rr*cols+cc]=EMPTY;
          else if (grid[rr*cols+cc]===EMPTY || (curMat===FIRE && grid[rr*cols+cc]!==WOOD)) {
            grid[rr*cols+cc]=curMat;
          }
        }
      }
    }

    for (let step=0;step<3;step++) simulate();

    p.loadPixels();
    for (let r=0;r<rows;r++) {
      for (let c=0;c<cols;c++) {
        const mat = g(c,r);
        let R=0,G=0,B=0;
        if (mat!==EMPTY) [R,G,B]=matColor(mat,c,r);
        for (let py=0;py<CS;py++) for (let px=0;px<CS;px++) {
          const pi=4*((r*CS+py)*p.width+(c*CS+px));
          p.pixels[pi]=R; p.pixels[pi+1]=G; p.pixels[pi+2]=B; p.pixels[pi+3]=255;
        }
      }
    }
    p.updatePixels();
  };

  function hsbToRgb(h,s,b) {
    h=((h%360)+360)%360; s/=100; b/=100;
    const c=b*s,x=c*(1-Math.abs((h/60)%2-1)),m=b-c;
    let r=0,g=0,bl=0;
    if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;bl=x;}
    else if(h<240){g=x;bl=c;}else if(h<300){r=x;bl=c;}else{r=c;bl=x;}
    return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((bl+m)*255)];
  }

  function setMat(m) { curMat = m; setActive(); }
  function setActive() {
    const ids=['btn-erase','btn-sand','btn-water','btn-fire','btn-wood','btn-oil'];
    ids.forEach((id,i)=>{
      const el=document.getElementById(id);
      if(el) el.classList.toggle('active', i===curMat);
    });
  }

  p.keyPressed = function() {
    const k = p.key.toLowerCase();
    if(k==='s') setMat(SAND);
    else if(k==='w') setMat(WATER);
    else if(k==='f') setMat(FIRE);
    else if(k==='x') setMat(WOOD);
    else if(k==='o') setMat(OIL);
    else if(k==='e') setMat(EMPTY);
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    cols=Math.floor(p.width/CS); rows=Math.floor(p.height/CS);
    grid=new Uint8Array(cols*rows);
    updated=new Uint8Array(cols*rows);
  };
});
</script>
</body>
</html>
