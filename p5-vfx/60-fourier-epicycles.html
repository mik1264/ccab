<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fourier Epicycles Drawing Machine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: monospace; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#fps { position:fixed; top:12px; left:50%; transform:translateX(-50%); color:#0f0; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:5px; z-index:999; }
#ui { position:fixed; top:12px; right:12px; display:flex; flex-direction:column; gap:6px; z-index:999; }
#ui button {
  background: rgba(0,0,0,0.7); color:#ccc; border:1px solid rgba(255,255,255,0.2);
  padding:5px 12px; border-radius:5px; cursor:pointer; font-family:monospace; font-size:12px;
}
#ui button:hover { background:rgba(255,255,255,0.1); }
#ui button.active { border-color:#f90; color:#f90; }
#hint { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#888; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 14px; border-radius:6px; z-index:999; }
#spectrum {
  position:fixed; bottom:60px; right:12px;
  background:rgba(0,0,0,0.7); border-radius:6px;
  padding:6px; z-index:999;
  border:1px solid rgba(255,255,255,0.1);
}
#spectrumCanvas { display:block; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="ui">
  <button id="btnDraw" onclick="startDrawMode()">Draw Path</button>
  <button onclick="loadPreset('star')">Star</button>
  <button onclick="loadPreset('heart')">Heart</button>
  <button onclick="loadPreset('pi')">π Symbol</button>
  <button onclick="loadPreset('spiral')">Spiral</button>
</div>
<div id="hint" id="hint">Drawing paused – draw a path with mouse, or pick a preset</div>
<div id="spectrum"><canvas id="spectrumCanvas" width="150" height="80"></canvas></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
let drawMode = false;
function startDrawMode() {
  drawMode = true;
  document.getElementById('btnDraw').classList.add('active');
  document.getElementById('hint').textContent = 'Draw your path! Release to compute DFT.';
  if (window._resetDrawing) window._resetDrawing();
}
function loadPreset(name) {
  drawMode = false;
  document.getElementById('btnDraw').classList.remove('active');
  if (window._loadPreset) window._loadPreset(name);
}

new p5(function(p) {
  let fourierX = [], fourierY = [];
  let path = [];
  let drawnPath = [];
  let time = 0;
  let N = 0;
  let animating = false;
  let drawing = false;
  let fpsDiv = document.getElementById('fps');
  let hintDiv = document.getElementById('hint');
  let specCanvas = document.getElementById('spectrumCanvas');
  let specCtx = specCanvas.getContext('2d');

  // DFT
  function dft(signal) {
    let N = signal.length;
    let result = [];
    for (let k = 0; k < N; k++) {
      let re = 0, im = 0;
      for (let n = 0; n < N; n++) {
        let phi = (2 * Math.PI * k * n) / N;
        re += signal[n].re * Math.cos(phi) + signal[n].im * Math.sin(phi);
        im += -signal[n].re * Math.sin(phi) + signal[n].im * Math.cos(phi);
      }
      re /= N; im /= N;
      let amp = Math.sqrt(re*re + im*im);
      let phase = Math.atan2(im, re);
      let freq = k;
      result.push({re, im, amp, phase, freq});
    }
    return result.sort((a,b) => b.amp - a.amp);
  }

  function computeDFT(pts) {
    // Resample to power of 2 or fixed count
    let target = Math.min(pts.length, 256);
    let resampled = [];
    for (let i = 0; i < target; i++) {
      let t = i / target;
      let idx = t * (pts.length - 1);
      let lo = Math.floor(idx), hi = Math.ceil(idx);
      let frac = idx - lo;
      resampled.push({
        re: pts[lo].x * (1-frac) + (pts[hi] ? pts[hi].x * frac : pts[lo].x),
        im: pts[lo].y * (1-frac) + (pts[hi] ? pts[hi].y * frac : pts[lo].y)
      });
    }
    let result = dft(resampled);
    N = resampled.length;
    return result;
  }

  function starPath(cx, cy, R) {
    let pts = [];
    let nPoints = 5;
    for (let i = 0; i < 200; i++) {
      let t = i / 200;
      let angle = t * 2 * Math.PI;
      let a = Math.floor(t * 2 * nPoints);
      let r = (a % 2 === 0) ? R : R * 0.45;
      // interpolate between star points
      let innerAngle = Math.floor(angle / (Math.PI / nPoints)) * (Math.PI / nPoints) + Math.PI / nPoints;
      let outerAngle = Math.floor(angle / (Math.PI / nPoints)) * (Math.PI / nPoints);
      let localT = (angle % (Math.PI / nPoints)) / (Math.PI / nPoints);
      let r1 = R, r2 = R * 0.45;
      let a1 = outerAngle, a2 = outerAngle + Math.PI/nPoints;
      let curR = (localT < 0.5) ? p.lerp(r1, r2, localT*2) : p.lerp(r2, r1, (localT-0.5)*2);
      pts.push({x: cx + Math.cos(angle) * curR, y: cy + Math.sin(angle) * curR});
    }
    return pts;
  }

  function heartPath(cx, cy, R) {
    let pts = [];
    for (let i = 0; i < 250; i++) {
      let t = i / 250 * 2 * Math.PI;
      let x = cx + R * 0.8 * 16 * Math.pow(Math.sin(t), 3) / 16;
      let y = cy - R * 0.8 * (13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)) / 16;
      pts.push({x, y});
    }
    return pts;
  }

  function piPath(cx, cy, R) {
    // Approximate π symbol as series of line segments
    let scale = R / 100;
    let segs = [
      // top bar
      [-80,-60],[80,-60],
      // left leg
      [-40,-60],[-60,80],
      // right leg
      [20,-60],[40,80],
      // back to top
      [80,-60]
    ];
    let pts = [];
    for (let i = 0; i < segs.length-1; i++) {
      let [x1,y1] = segs[i], [x2,y2] = segs[i+1];
      for (let t = 0; t < 1; t += 0.04) {
        pts.push({x: cx + p.lerp(x1, x2, t)*scale, y: cy + p.lerp(y1, y2, t)*scale});
      }
    }
    return pts;
  }

  function spiralPath(cx, cy, R) {
    let pts = [];
    for (let i = 0; i < 300; i++) {
      let t = i / 300;
      let angle = t * 6 * Math.PI;
      let r = t * R * 0.9;
      pts.push({x: cx + Math.cos(angle)*r, y: cy + Math.sin(angle)*r});
    }
    return pts;
  }

  window._resetDrawing = function() {
    drawnPath = [];
    path = [];
    fourierX = []; fourierY = [];
    animating = false;
    drawing = false;
    time = 0;
  };

  window._loadPreset = function(name) {
    let cx = p.width/2, cy = p.height/2;
    let R = Math.min(p.width, p.height) * 0.3;
    let pts;
    if (name === 'star') pts = starPath(cx, cy, R);
    else if (name === 'heart') pts = heartPath(cx, cy, R);
    else if (name === 'pi') pts = piPath(cx, cy, R);
    else if (name === 'spiral') pts = spiralPath(cx, cy, R);
    drawnPath = pts;
    path = [];
    time = 0;
    if (pts.length > 10) {
      let signal = pts.map(pt => ({re: pt.x - cx, im: pt.y - cy}));
      let result = dft(signal.map(s => ({re:s.re, im:s.im})));
      // split into X and Y
      fourierX = computeDFT(pts.map(pt => ({x: pt.x - cx, y: 0})));
      fourierY = computeDFT(pts.map(pt => ({x: 0, y: pt.y - cy})));
      N = pts.length;
      animating = true;
      hintDiv.textContent = 'Epicycle reconstruction running!';
      drawSpectrum(fourierX);
    }
  };

  function drawSpectrum(freqs) {
    specCtx.clearRect(0, 0, 150, 80);
    specCtx.fillStyle = 'rgba(0,0,0,0.8)';
    specCtx.fillRect(0,0,150,80);
    let maxAmp = Math.max(...freqs.slice(0,20).map(f=>f.amp), 0.001);
    let bW = 150 / 20;
    for (let i = 0; i < Math.min(20, freqs.length); i++) {
      let t = freqs[i].amp / maxAmp;
      let h = t * 60;
      let hue = 200 - t * 160;
      specCtx.fillStyle = `hsl(${hue},80%,50%)`;
      specCtx.fillRect(i*bW, 80-h, bW-1, h);
    }
    specCtx.fillStyle = '#666';
    specCtx.font = '9px monospace';
    specCtx.fillText('Frequency spectrum', 5, 78);
  }

  p.setup = function() {
    let cnv = p.createCanvas(p.windowWidth, p.windowHeight);
    cnv.parent(document.body);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    // Load default
    window._loadPreset('heart');
  };

  p.mousePressed = function() {
    if (drawMode) {
      drawnPath = [];
      path = [];
      fourierX = []; fourierY = [];
      animating = false;
      drawing = true;
      time = 0;
    }
  };

  p.mouseDragged = function() {
    if (drawMode && drawing) {
      drawnPath.push({x: p.mouseX, y: p.mouseY});
    }
  };

  p.mouseReleased = function() {
    if (drawMode && drawing && drawnPath.length > 10) {
      drawing = false;
      drawMode = false;
      document.getElementById('btnDraw').classList.remove('active');
      let cx = p.width/2, cy = p.height/2;
      fourierX = computeDFT(drawnPath.map(pt => ({x: pt.x - cx, y: 0})));
      fourierY = computeDFT(drawnPath.map(pt => ({x: 0, y: pt.y - cy})));
      animating = true;
      hintDiv.textContent = 'Reconstructing with ' + Math.min(drawnPath.length, 256) + ' epicycles';
      drawSpectrum(fourierX);
    }
  };

  function epicycles(startX, startY, rotation, fourier, t) {
    let x = startX, y = startY;
    p.strokeWeight(1);
    for (let i = 0; i < fourier.length; i++) {
      let fx = fourier[i];
      let prevX = x, prevY = y;
      let freq = fx.freq;
      let angle = freq * t * 2 * Math.PI / N + fx.phase;
      x += fx.amp * Math.cos(angle);
      y += fx.amp * Math.sin(angle);

      // Draw circle
      if (fx.amp > 0.5) {
        p.noFill();
        let alpha = p.map(i, 0, Math.min(fourier.length, 60), 35, 5);
        p.stroke(0, 0, 60, alpha);
        p.circle(prevX, prevY, fx.amp * 2);
        // Draw arm
        p.stroke(180, 70, 80, p.map(i, 0, 40, 80, 15));
        p.strokeWeight(p.map(i, 0, 40, 1.5, 0.3));
        p.line(prevX, prevY, x, y);
      }
    }
    return {x, y};
  }

  p.draw = function() {
    p.background(0, 0, 5, 25);

    let W = p.width, H = p.height;
    let cx = W/2, cy = H/2;

    // Draw original path (faint)
    if (drawnPath.length > 1) {
      p.noFill();
      p.stroke(0, 0, 30, 30);
      p.strokeWeight(1);
      p.beginShape();
      for (let pt of drawnPath) p.vertex(pt.x, pt.y);
      p.endShape();
    }

    if (animating && fourierX.length > 0 && fourierY.length > 0) {
      // Use separate X/Y epicycle chains
      let t = time;

      // X epicycles (left panel → drive x)
      let xChain = epicycles(cx, H * 0.22, 0, fourierX.slice(0, 60), t);
      // Y epicycles (right panel → drive y)
      let yChain = epicycles(W * 0.22, cy, Math.PI/2, fourierY.slice(0, 60), t);

      // Actually just use a single combined complex DFT approach:
      // The tip of xChain gives x, tip of yChain gives y
      // Connect with dotted line to the actual point
      let ptX = xChain.x, ptY = yChain.y;

      p.stroke(0, 0, 50, 30);
      p.strokeWeight(0.5);
      p.line(xChain.x, xChain.y, ptX, ptY);
      p.line(yChain.x, yChain.y, ptX, ptY);

      path.push({x: ptX, y: ptY});
      if (path.length > N) path.shift();

      // Draw traced path
      p.noFill();
      p.strokeWeight(1.5);
      for (let i = 1; i < path.length; i++) {
        let t2 = i / path.length;
        let hue = p.map(t2, 0, 1, 200, 30);
        p.stroke(hue, 90, 90, t2 * 90);
        p.line(path[i-1].x, path[i-1].y, path[i].x, path[i].y);
      }

      // Current point dot
      p.noStroke();
      p.fill(50, 100, 100, 95);
      p.circle(ptX, ptY, 6);

      time++;
      if (time >= N) {
        time = 0;
        path = [];
      }
    }

    if (p.frameCount % 20 === 0) fpsDiv.textContent = 'FPS: ' + Math.round(p.frameRate());
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    window._loadPreset('heart');
  };
});
</script>
</body>
</html>
