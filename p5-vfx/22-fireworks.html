<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireworks Display</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#0f0; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const sketch = (p) => {
  let rockets = [], particles = [], sparks = [];
  let skylinePoints = [];
  let fpsEl, frameCount2 = 0, fpsTimer = 0;

  function buildSkyline() {
    skylinePoints = [];
    let x = 0;
    while (x < p.width) {
      let bw = p.random(30, 90);
      let bh = p.random(40, 160);
      skylinePoints.push({ x, w: bw, h: bh });
      x += bw + p.random(2, 12);
    }
  }

  class Rocket {
    constructor() {
      this.x = p.random(p.width * 0.1, p.width * 0.9);
      this.y = p.height;
      this.targetY = p.random(p.height * 0.1, p.height * 0.45);
      this.speed = p.random(6, 12);
      this.hue = p.random(360);
      this.trail = [];
      this.exploded = false;
    }
    update() {
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > 12) this.trail.shift();
      this.y -= this.speed;
      this.speed *= 0.97;
      if (this.y <= this.targetY || this.speed < 1.5) {
        this.exploded = true;
        explode(this.x, this.y, this.hue);
      }
    }
    draw() {
      p.noFill();
      for (let i = 1; i < this.trail.length; i++) {
        let a = p.map(i, 0, this.trail.length, 0, 100);
        p.strokeWeight(p.map(i, 0, this.trail.length, 0.5, 2.5));
        p.stroke(this.hue, 70, 100, a);
        p.line(this.trail[i-1].x, this.trail[i-1].y, this.trail[i].x, this.trail[i].y);
      }
      p.noStroke();
      p.fill(this.hue, 30, 100, 100);
      p.circle(this.x, this.y, 5);
    }
  }

  class Particle {
    constructor(x, y, hue) {
      this.x = x; this.y = y;
      this.hue = hue + p.random(-20, 20);
      let angle = p.random(p.TWO_PI);
      let speed = p.random(1.5, 8);
      this.vx = p.cos(angle) * speed;
      this.vy = p.sin(angle) * speed;
      this.life = 1.0;
      this.decay = p.random(0.012, 0.028);
      this.trail = [];
      this.gravity = p.random(0.06, 0.14);
      this.drag = p.random(0.92, 0.97);
    }
    update() {
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > 10) this.trail.shift();
      this.vy += this.gravity;
      this.vx *= this.drag;
      this.vy *= this.drag;
      this.x += this.vx;
      this.y += this.vy;
      this.life -= this.decay;
      // Spawn mini spark
      if (p.random() < 0.02 && this.life > 0.3) {
        sparks.push(new Spark(this.x, this.y, this.hue));
      }
    }
    draw() {
      p.noFill();
      for (let i = 1; i < this.trail.length; i++) {
        let a = this.life * p.map(i, 0, this.trail.length, 0, 90);
        p.strokeWeight(p.map(i, 0, this.trail.length, 0.3, 2));
        p.stroke(this.hue, 80, 100, a);
        p.line(this.trail[i-1].x, this.trail[i-1].y, this.trail[i].x, this.trail[i].y);
      }
      p.noStroke();
      p.fill(this.hue, 40, 100, this.life * 100);
      p.circle(this.x, this.y, 3);
    }
    isDead() { return this.life <= 0; }
  }

  class Spark {
    constructor(x, y, hue) {
      this.x = x; this.y = y;
      this.hue = hue + p.random(-10, 10);
      let angle = p.random(p.TWO_PI);
      let speed = p.random(0.5, 3);
      this.vx = p.cos(angle) * speed;
      this.vy = p.sin(angle) * speed;
      this.life = p.random(0.3, 0.7);
      this.decay = 0.04;
    }
    update() {
      this.vy += 0.1;
      this.x += this.vx; this.y += this.vy;
      this.life -= this.decay;
    }
    draw() {
      p.noStroke();
      p.fill(this.hue, 50, 100, this.life * 100);
      p.circle(this.x, this.y, 2);
    }
    isDead() { return this.life <= 0; }
  }

  function explode(x, y, hue) {
    let count = p.floor(p.random(80, 150));
    for (let i = 0; i < count; i++) particles.push(new Particle(x, y, hue));
  }

  p.setup = () => {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    buildSkyline();
  };

  p.draw = () => {
    p.blendMode(p.BLEND);
    p.background(240, 30, 4, 30);
    p.blendMode(p.ADD);

    // Launch rockets
    if (p.frameCount % 45 === 0) rockets.push(new Rocket());

    // Update & draw
    for (let i = rockets.length - 1; i >= 0; i--) {
      rockets[i].update();
      rockets[i].draw();
      if (rockets[i].exploded) rockets.splice(i, 1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].draw();
      if (particles[i].isDead()) particles.splice(i, 1);
    }
    for (let i = sparks.length - 1; i >= 0; i--) {
      sparks[i].update();
      sparks[i].draw();
      if (sparks[i].isDead()) sparks.splice(i, 1);
    }

    // Draw skyline (BLEND mode)
    p.blendMode(p.BLEND);
    p.noStroke();
    p.fill(0, 0, 6);
    for (let b of skylinePoints) {
      p.rect(b.x, p.height - b.h, b.w, b.h);
      // Windows
      p.fill(40, 60, 90, 30);
      for (let wy = p.height - b.h + 8; wy < p.height - 8; wy += 14) {
        for (let wx = b.x + 5; wx < b.x + b.w - 5; wx += 10) {
          if (p.random() < 0.55) p.rect(wx, wy, 5, 7);
        }
      }
      p.fill(0, 0, 6);
    }

    // FPS
    frameCount2++;
    let now = p.millis();
    if (now - fpsTimer > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(frameCount2 / ((now - fpsTimer) / 1000));
      frameCount2 = 0; fpsTimer = now;
    }
  };

  p.windowResized = () => { p.resizeCanvas(window.innerWidth, window.innerHeight); buildSkyline(); };
};
new p5(sketch);
</script>
</body>
</html>
