<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turing Morphogenesis Patterns — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<div id="info">Pattern: zebra stripes</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const GW = 256, GH = 256;
const STEPS_PER_FRAME = 6;

// Activator-inhibitor (Gray-Scott variant)
const PRESETS = [
  { name: 'zebra stripes',       Du: 0.16, Dv: 0.08, F: 0.035, k: 0.065 },
  { name: 'leopard spots',       Du: 0.16, Dv: 0.08, F: 0.060, k: 0.062 },
  { name: 'labyrinthine',        Du: 0.16, Dv: 0.08, F: 0.040, k: 0.058 },
  { name: 'coral / branching',   Du: 0.16, Dv: 0.08, F: 0.054, k: 0.063 },
];
let presetIdx = 0;
let Du, Dv, F, k;

let u, v, nextU, nextV;
let pg;
let fpsEl, infoEl;
let lastFpsTime = 0, frameCount2 = 0;
let presetTimer = 0;
const CYCLE_TIME = 25000;

// Color palettes per preset: [hue_low, hue_high, sat, brightness variation]
const PALETTES = [
  { hLow: 30,  hHigh: 200, s: 80 },  // warm orange → cool blue (zebra)
  { hLow: 25,  hHigh: 110, s: 75 },  // golden → green (leopard)
  { hLow: 260, hHigh: 180, s: 85 },  // purple → cyan (labyrinthine)
  { hLow: 0,   hHigh: 55,  s: 80 },  // red → gold (coral)
];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(1);
  pg = createGraphics(GW, GH);
  pg.pixelDensity(1);
  fpsEl = document.getElementById('fps');
  infoEl = document.getElementById('info');
  lastFpsTime = millis();
  imageMode(CORNER);
  noSmooth();
  setPreset(0);
}

function setPreset(idx) {
  presetIdx = idx % PRESETS.length;
  let p = PRESETS[presetIdx];
  Du = p.Du; Dv = p.Dv; F = p.F; k = p.k;
  infoEl.textContent = 'Pattern: ' + p.name + ' (auto-cycles every 25s)';
  initGrids();
}

function initGrids() {
  u = new Float32Array(GW * GH);
  v = new Float32Array(GW * GH);
  nextU = new Float32Array(GW * GH);
  nextV = new Float32Array(GW * GH);
  for (let i = 0; i < GW * GH; i++) {
    u[i] = 1.0 + random(-0.05, 0.05);
    v[i] = random(-0.05, 0.05);
  }
  // Multiple perturbation seeds
  let seeds = 20;
  for (let s = 0; s < seeds; s++) {
    let cx = floor(random(GW)), cy = floor(random(GH));
    let r = floor(random(3, 8));
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        if (dx*dx + dy*dy <= r*r) {
          let nx = (cx+dx+GW)%GW, ny = (cy+dy+GH)%GH;
          u[ny*GW+nx] = 0.5;
          v[ny*GW+nx] = 0.25;
        }
      }
    }
  }
}

function lap(arr, x, y) {
  let idx = y*GW+x;
  let l = x>0    ? arr[idx-1]      : arr[y*GW+GW-1];
  let r = x<GW-1 ? arr[idx+1]      : arr[y*GW];
  let uu= y>0    ? arr[(y-1)*GW+x] : arr[(GH-1)*GW+x];
  let d = y<GH-1 ? arr[(y+1)*GW+x] : arr[x];
  return l + r + uu + d - 4*arr[idx];
}

function step() {
  for (let y = 0; y < GH; y++) {
    for (let x = 0; x < GW; x++) {
      let i = y*GW+x;
      let a = u[i], b = v[i];
      let ab2 = a*b*b;
      let lu = lap(u,x,y), lv = lap(v,x,y);
      nextU[i] = constrain(a + (Du*lu - ab2 + F*(1-a)), 0, 1);
      nextV[i] = constrain(b + (Dv*lv + ab2 - (F+k)*b), 0, 1);
    }
  }
  let tu = u; u = nextU; nextU = tu;
  let tv = v; v = nextV; nextV = tv;
}

function draw() {
  presetTimer += deltaTime;
  if (presetTimer > CYCLE_TIME) {
    presetTimer = 0;
    setPreset(presetIdx + 1);
  }

  for (let s = 0; s < STEPS_PER_FRAME; s++) step();

  let pal = PALETTES[presetIdx];
  pg.loadPixels();
  let pd = pg.pixels;
  for (let i = 0; i < GW*GH; i++) {
    let uv = u[i], vv = v[i];
    // Map u to hue (activator drives pattern)
    let uNorm = constrain(uv, 0, 1);
    let h = lerp(pal.hLow, pal.hHigh, uNorm);
    let s = pal.s;
    let bv = lerp(15, 95, uNorm);
    // v adds brightness variation
    bv = constrain(bv + vv * 20, 0, 100);

    // HSB to RGB
    let [r, g, b] = hsbToRgb(h, s, bv);
    let pi = i*4;
    pd[pi]   = r;
    pd[pi+1] = g;
    pd[pi+2] = b;
    pd[pi+3] = 255;
  }
  pg.updatePixels();
  image(pg, 0, 0, width, height);

  frameCount2++;
  let now = millis();
  if (now - lastFpsTime > 500) {
    fpsEl.textContent = (frameCount2 / ((now - lastFpsTime) / 1000)).toFixed(1) + ' fps';
    frameCount2 = 0; lastFpsTime = now;
  }
}

function hsbToRgb(h, s, b) {
  s /= 100; b /= 100;
  let c = b * s, x = c * (1 - abs((h/60)%2 - 1)), m = b - c;
  let r,g,bl;
  h = ((h % 360) + 360) % 360;
  if      (h<60)  {r=c;g=x;bl=0;}
  else if (h<120) {r=x;g=c;bl=0;}
  else if (h<180) {r=0;g=c;bl=x;}
  else if (h<240) {r=0;g=x;bl=c;}
  else if (h<300) {r=x;g=0;bl=c;}
  else            {r=c;g=0;bl=x;}
  return [floor((r+m)*255), floor((g+m)*255), floor((bl+m)*255)];
}

function mousePressed() { setPreset(presetIdx + 1); presetTimer = 0; }
function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body></html>
