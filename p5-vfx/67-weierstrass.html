<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weierstrass Function | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        // Weierstrass: f(x) = sum_{n=0}^{N} a^n * cos(b^n * PI * x)
        // a=0.5, b=9 (b must be odd integer for classic result, and ab > 1+3*PI/2)
        const A = 0.5;
        const B = 9;
        const N_MAX = 14;

        let currentN = 0;        // Currently shown number of terms (animated)
        let xOffset = 0;         // Scrolling x-range
        let zoomLevel = 1;       // Zoom into x-range
        let zoomTarget = 1;
        let zoomCenterX = 1.0;
        let phase = 'grow';       // 'grow' | 'scroll' | 'zoom'
        let phaseTimer = 0;
        let termTimer = 0;
        const TERM_INTERVAL = 800;   // ms per term added
        const SAMPLES = 800;
        const SCROLL_SPEED = 0.0004;

        function weierstrass(x, nTerms) {
            let sum = 0;
            let an = 1;
            let bn = 1;
            for (let n = 0; n <= nTerms; n++) {
                sum += an * Math.cos(bn * Math.PI * x);
                an *= A;
                bn *= B;
            }
            return sum;
        }

        // Compute plot y values for a given x range and n terms
        function computeCurve(xMin, xMax, nTerms) {
            let pts = [];
            for (let i = 0; i < SAMPLES; i++) {
                let x = xMin + (i / (SAMPLES - 1)) * (xMax - xMin);
                pts.push(weierstrass(x, nTerms));
            }
            return pts;
        }

        // Smooth auto-ranging
        let yRange = 2.5;
        let targetYRange = 2.5;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
        }

        function draw() {
            background(240, 20, 4, 100);

            let dt = deltaTime;

            // Phase management
            phaseTimer += dt;
            if (phase === 'grow') {
                termTimer += dt;
                if (termTimer > TERM_INTERVAL) {
                    termTimer -= TERM_INTERVAL;
                    if (currentN < N_MAX) {
                        currentN++;
                    } else {
                        // Switch to scroll phase
                        phase = 'scroll';
                        phaseTimer = 0;
                    }
                }
            } else if (phase === 'scroll') {
                xOffset += SCROLL_SPEED * dt;
                if (phaseTimer > 8000) {
                    phase = 'zoom';
                    phaseTimer = 0;
                    zoomCenterX = xOffset + 1.0;
                }
            } else if (phase === 'zoom') {
                zoomTarget = 1 + phaseTimer / 1500;
                zoomLevel += (zoomTarget - zoomLevel) * 0.05;
                if (phaseTimer > 10000) {
                    // Reset
                    phase = 'grow';
                    phaseTimer = 0;
                    currentN = 0;
                    xOffset = 0;
                    zoomLevel = 1;
                    zoomTarget = 1;
                    termTimer = 0;
                }
            }

            // X range
            let xSpan = 2.0 / zoomLevel;
            let xMin, xMax;
            if (phase === 'zoom') {
                xMin = zoomCenterX - xSpan / 2;
                xMax = zoomCenterX + xSpan / 2;
            } else {
                xMin = xOffset;
                xMax = xOffset + 2.0;
            }

            // Layout
            let marginL = 60, marginR = 40, marginT = 80, marginB = 60;
            let plotW = width - marginL - marginR;
            let plotH = height - marginT - marginB;
            let cx = marginL, cy = marginT;

            // Determine y range from current curve
            let pts = computeCurve(xMin, xMax, currentN);
            let yMin = Math.min(...pts), yMax = Math.max(...pts);
            let yPad = (yMax - yMin) * 0.1 + 0.1;
            yMin -= yPad; yMax += yPad;
            // Smooth range
            targetYRange = yMax - yMin;
            yRange += (targetYRange - yRange) * 0.1;
            let yMid = (yMin + yMax) / 2;
            yMin = yMid - yRange / 2;
            yMax = yMid + yRange / 2;

            function mapXY(xi, yi) {
                return {
                    px: cx + (xi / (SAMPLES - 1)) * plotW,
                    py: cy + plotH - ((yi - yMin) / (yMax - yMin)) * plotH
                };
            }

            // Draw faint grid
            stroke(220, 10, 20, 40);
            strokeWeight(0.5);
            let gridN = 8;
            for (let i = 0; i <= gridN; i++) {
                let px = cx + (i / gridN) * plotW;
                let py = cy + (i / gridN) * plotH;
                line(px, cy, px, cy + plotH);
                line(cx, py, cx + plotW, py);
            }

            // Axes
            stroke(0, 0, 40, 60);
            strokeWeight(1);
            let zeroY = cy + plotH - ((0 - yMin) / (yMax - yMin)) * plotH;
            line(cx, zeroY, cx + plotW, zeroY);

            // Draw background term layers (individual terms)
            blendMode(ADD);
            if (currentN > 0) {
                for (let n = 0; n < currentN; n++) {
                    let layerPts = computeCurve(xMin, xMax, n);
                    let alpha = map(n, 0, currentN, 60, 8);
                    let hue = map(n, 0, N_MAX, 180, 0);
                    stroke(hue, 70, 60, alpha);
                    strokeWeight(0.5);
                    noFill();
                    beginShape();
                    for (let i = 0; i < SAMPLES; i++) {
                        let { px, py } = mapXY(i, layerPts[i]);
                        vertex(px, py);
                    }
                    endShape();
                }
            }

            // Main curve — current accumulated sum
            // Color: shifts from cool blue (few terms) to hot orange (many terms)
            let mainHue = map(currentN, 0, N_MAX, 200, 30);
            // Glow pass
            stroke(mainHue, 90, 100, 20);
            strokeWeight(5);
            noFill();
            beginShape();
            for (let i = 0; i < SAMPLES; i++) {
                let { px, py } = mapXY(i, pts[i]);
                vertex(px, py);
            }
            endShape();

            // Bright pass
            stroke(mainHue, 80, 100, 90);
            strokeWeight(1.5);
            beginShape();
            for (let i = 0; i < SAMPLES; i++) {
                let { px, py } = mapXY(i, pts[i]);
                vertex(px, py);
            }
            endShape();

            blendMode(BLEND);

            // Border box
            noFill();
            stroke(0, 0, 30, 80);
            strokeWeight(1);
            rect(cx, cy, plotW, plotH);

            // Labels
            noStroke();
            fill(0, 0, 70, 90);
            textSize(11);
            textFont('monospace');
            textAlign(CENTER, TOP);

            // X axis ticks
            for (let i = 0; i <= 4; i++) {
                let xVal = xMin + (i / 4) * (xMax - xMin);
                let px = cx + (i / 4) * plotW;
                stroke(0, 0, 40, 40);
                strokeWeight(0.5);
                line(px, cy + plotH, px, cy + plotH + 5);
                noStroke();
                fill(0, 0, 60, 80);
                text(xVal.toFixed(2), px, cy + plotH + 8);
            }

            // Title & info
            fill(mainHue, 60, 100, 100);
            textSize(16);
            textAlign(CENTER, TOP);
            text('Weierstrass Function', width / 2, 14);

            fill(0, 0, 70, 80);
            textSize(11);
            text('f(x) = Σ (0.5)ⁿ cos(9ⁿ π x),  n = 0 … ' + currentN, width / 2, 36);
            text('continuous everywhere, differentiable nowhere', width / 2, 52);

            // Phase label
            let phaseLabel = phase === 'grow' ? 'Adding terms...' :
                             phase === 'scroll' ? 'Scrolling x-range...' : 'Zooming in...';
            fill(60, 80, 100, 80);
            textAlign(RIGHT, TOP);
            textSize(11);
            text(phaseLabel, cx + plotW, cy + plotH + 8);

            // FPS
            fill(0, 0, 0, 60);
            rect(width - 80, 10, 70, 28, 14);
            let fps = Math.round(frameRate());
            fill(120, 60, 100);
            textSize(13);
            textFont('monospace');
            textAlign(RIGHT, TOP);
            text(fps + ' fps', width - 14, 18);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
