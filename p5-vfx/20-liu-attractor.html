<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liu Attractor | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        // Liu system: dx=a(y-x), dy=bx-kxz, dz=-cz+hx^2
        const LA = 10, LB = 40, LC = 2.5, LK = 1, LH = 4;
        const DT = 0.002;
        const TRAIL_LEN = 9000;
        const NUM_TRAJ = 5;
        const SCALE = 8.5;

        const INITS = [
            [0.20, 0.00, 0.50],
            [0.21, 0.00, 0.50],
            [0.20, 0.01, 0.50],
            [0.19, 0.00, 0.51],
            [0.20, 0.00, 0.49],
        ];
        // Shifted hues: violet, cyan, lime, gold, rose
        const HUE_BASES = [270, 185, 105, 45, 330];

        let trajectories = [];
        let camAngleY = 0;
        let camAngleX = 0.20;

        function liuDeriv(x, y, z) {
            let dx = LA * (y - x);
            let dy = LB * x - LK * x * z;
            let dz = -LC * z + LH * x * x;
            return [dx, dy, dz];
        }

        function rk4Step(x, y, z) {
            let [k1x, k1y, k1z] = liuDeriv(x, y, z);
            let [k2x, k2y, k2z] = liuDeriv(x+DT/2*k1x, y+DT/2*k1y, z+DT/2*k1z);
            let [k3x, k3y, k3z] = liuDeriv(x+DT/2*k2x, y+DT/2*k2y, z+DT/2*k2z);
            let [k4x, k4y, k4z] = liuDeriv(x+DT*k3x, y+DT*k3y, z+DT*k3z);
            return [
                x + DT/6*(k1x+2*k2x+2*k3x+k4x),
                y + DT/6*(k1y+2*k2y+2*k3y+k4y),
                z + DT/6*(k1z+2*k2z+2*k3z+k4z),
            ];
        }

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);
            blendMode(ADD);
            strokeWeight(0.9);

            for (let t = 0; t < NUM_TRAJ; t++) {
                trajectories.push({
                    pts: [INITS[t].slice()],
                    head: INITS[t].slice(),
                    hueBase: HUE_BASES[t],
                    zOffset: 0,
                });
            }

            // Pre-warm
            for (let w = 0; w < 2500; w++) {
                for (let t = 0; t < NUM_TRAJ; t++) {
                    let tr = trajectories[t];
                    let [nx, ny, nz] = rk4Step(tr.head[0], tr.head[1], tr.head[2]);
                    tr.head = [nx, ny, nz];
                    tr.pts.push([nx, ny, nz]);
                    if (tr.pts.length > TRAIL_LEN) tr.pts.shift();
                }
            }

            // Compute z centroid to center the attractor vertically
            let zSum = 0, count = 0;
            for (let t = 0; t < NUM_TRAJ; t++) {
                for (let p of trajectories[t].pts) { zSum += p[2]; count++; }
            }
            let zMean = zSum / count;
            for (let t = 0; t < NUM_TRAJ; t++) trajectories[t].zOffset = zMean;
        }

        function draw() {
            background(0, 0, 4, 45);
            blendMode(ADD);

            camAngleY += 0.0035;

            // 45 steps per frame
            for (let s = 0; s < 45; s++) {
                for (let t = 0; t < NUM_TRAJ; t++) {
                    let tr = trajectories[t];
                    let [nx, ny, nz] = rk4Step(tr.head[0], tr.head[1], tr.head[2]);
                    tr.head = [nx, ny, nz];
                    tr.pts.push([nx, ny, nz]);
                    if (tr.pts.length > TRAIL_LEN) tr.pts.shift();
                }
            }

            rotateY(camAngleY);
            rotateX(camAngleX);

            // Centered z offset
            let zOff = trajectories[0].zOffset;

            for (let t = 0; t < NUM_TRAJ; t++) {
                let tr = trajectories[t];
                let pts = tr.pts;
                let len = pts.length;

                for (let i = 1; i < len; i++) {
                    let frac = i / len;
                    // Ribbon-like hue sweep
                    let hue = (tr.hueBase + frac * 60 + Math.sin(frac * 20) * 15) % 360;
                    let sat = 90;
                    let bri = frac * frac * 95;
                    let alpha = frac * 60;
                    stroke(hue, sat, bri, alpha);
                    let p0 = pts[i-1], p1 = pts[i];
                    line(p0[0]*SCALE, (p0[2]-zOff)*SCALE, p0[1]*SCALE,
                         p1[0]*SCALE, (p1[2]-zOff)*SCALE, p1[1]*SCALE);
                }
            }

            // Glowing heads
            noStroke();
            for (let t = 0; t < NUM_TRAJ; t++) {
                let tr = trajectories[t];
                let h = tr.head;
                fill(tr.hueBase, 50, 100, 90);
                push();
                translate(h[0]*SCALE, (h[2]-zOff)*SCALE, h[1]*SCALE);
                sphere(3);
                pop();
            }

            // FPS
            resetMatrix();
            blendMode(BLEND);
            fill(255, 0, 80, 90);
            noStroke();
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width/2 - 16, -height/2 + 16);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
