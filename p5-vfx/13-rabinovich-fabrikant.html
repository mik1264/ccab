<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabinovich-Fabrikant Attractor | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const TRAIL_LEN = 5000;
        const DT = 0.002;
        const SCALE = 80;
        const NUM_TRAJ = 4;
        const ALPHA = 0.14, GAMMA = 0.10;

        function rf(x, y, z) {
            return {
                dx: y * (z - 1 + x * x) + GAMMA * x,
                dy: x * (3 * z + 1 - x * x) + GAMMA * y,
                dz: -2 * z * (ALPHA + x * y)
            };
        }

        function rk4(x, y, z, dt) {
            let k1 = rf(x, y, z);
            let k2 = rf(x + dt/2 * k1.dx, y + dt/2 * k1.dy, z + dt/2 * k1.dz);
            let k3 = rf(x + dt/2 * k2.dx, y + dt/2 * k2.dy, z + dt/2 * k2.dz);
            let k4 = rf(x + dt * k3.dx, y + dt * k3.dy, z + dt * k3.dz);
            return {
                x: x + dt/6 * (k1.dx + 2*k2.dx + 2*k3.dx + k4.dx),
                y: y + dt/6 * (k1.dy + 2*k2.dy + 2*k3.dy + k4.dy),
                z: z + dt/6 * (k1.dz + 2*k2.dz + 2*k3.dz + k4.dz)
            };
        }

        // 4 trajectories — RF is very sensitive to ICs
        let inits = [
            { x: -1.0,  y: 0.0,   z: 0.5  },
            { x: -1.01, y: 0.005, z: 0.502},
            { x: -0.99, y: -0.005,z: 0.498},
            { x: -1.0,  y: 0.01,  z: 0.505}
        ];
        let trajectories = [];
        for (let i = 0; i < NUM_TRAJ; i++) {
            trajectories.push({
                pts: [],
                x: inits[i].x, y: inits[i].y, z: inits[i].z,
                hueOffset: i * 90
            });
        }

        let globalIter = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);
            // Warm up
            for (let w = 0; w < 2000; w++) {
                for (let t of trajectories) {
                    let nxt = rk4(t.x, t.y, t.z, DT);
                    // Guard against numerical blow-up
                    if (isFinite(nxt.x) && isFinite(nxt.y) && isFinite(nxt.z)) {
                        t.x = nxt.x; t.y = nxt.y; t.z = nxt.z;
                    }
                }
            }
        }

        function draw() {
            orbitControl(2, 2, 0.1);

            background(0, 0, 5, 20);
            blendMode(ADD);

            rotateY(frameCount * 0.003);
            rotateX(sin(frameCount * 0.001) * 0.3);

            for (let s = 0; s < 10; s++) {
                for (let t of trajectories) {
                    let nxt = rk4(t.x, t.y, t.z, DT);
                    if (isFinite(nxt.x) && isFinite(nxt.y) && isFinite(nxt.z)) {
                        t.x = nxt.x; t.y = nxt.y; t.z = nxt.z;
                        t.pts.push([t.x * SCALE, t.y * SCALE, t.z * SCALE]);
                        if (t.pts.length > TRAIL_LEN) t.pts.shift();
                    }
                }
            }
            globalIter++;

            noFill();
            strokeWeight(1.2);
            for (let t of trajectories) {
                let n = t.pts.length;
                for (let i = 1; i < n; i++) {
                    let ageFrac = i / n;
                    // RF has beautiful wing-like structure — use magenta-to-cyan palette
                    let hue = (t.hueOffset + 270 + ageFrac * 160) % 360;
                    let alpha = ageFrac * 70;
                    stroke(hue, 85, 100, alpha);
                    let p0 = t.pts[i - 1];
                    let p1 = t.pts[i];
                    line(p0[0], p0[1], p0[2], p1[0], p1[1], p1[2]);
                }
                if (t.pts.length > 0) {
                    let head = t.pts[t.pts.length - 1];
                    stroke((t.hueOffset + 270) % 360, 50, 100, 100);
                    strokeWeight(4);
                    point(head[0], head[1], head[2]);
                    strokeWeight(1.2);
                }
            }

            blendMode(BLEND);

            let fps = frameRate();
            resetMatrix();
            noStroke();
            fill(255, 255, 255, 180);
            textSize(12);
            textAlign(RIGHT, TOP);
            textFont('monospace');
            text(fps.toFixed(0) + ' fps', width / 2 - 16, -height / 2 + 16);

            textAlign(CENTER, BOTTOM);
            textSize(14);
            fill(255, 255, 255, 100);
            text('Rabinovich-Fabrikant  \u03b1=0.14  \u03b3=0.10', 0, height / 2 - 16);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
