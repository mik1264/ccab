<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Jets | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const NUM_PARTICLES = 3000;

        let particles = [];
        let rings = [];
        let leftEmit, rightEmit;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
            pixelDensity(Math.min(pixelDensity(), 2));
            background(0, 0, 5);

            leftEmit  = { x: width / 3,       y: height / 2 };
            rightEmit = { x: (2 * width) / 3, y: height / 2 };

            for (let i = 0; i < NUM_PARTICLES; i++) {
                particles.push(newParticle(i % 2 === 0 ? 'left' : 'right', true));
            }
        }

        function newParticle(side, randomInit) {
            let ex = side === 'left' ? width / 3 : (2 * width) / 3;
            let ey = height / 2;

            // Direction toward center
            let cx = width / 2;
            let toCenter = cx - ex;
            let speed = random(2.5, 5.0);
            let angle = toCenter > 0 ? 0 : PI;
            let vx = cos(angle) * speed;
            let vy = (random() - 0.5) * speed * 0.25;

            let p = {
                x: randomInit ? random(width) : ex + random(-8, 8),
                y: randomInit ? random(height) : ey + random(-20, 20),
                vx, vy,
                side,
                hue: side === 'left' ? random(180, 220) : random(0, 30),
                alpha: 80,
                life: randomInit ? random(0, 120) : 0,
                maxLife: random(80, 160),
                deflected: false,
                deflectVx: 0,
                deflectVy: 0,
                size: random(0.8, 1.8)
            };
            return p;
        }

        function spawnRing(x, y, vx, vy) {
            rings.push({
                x, y,
                vx: vx * 0.15,
                vy: vy * 0.15 + (random() - 0.5) * 1.5,
                r: random(5, 20),
                maxR: random(40, 120),
                alpha: 70,
                hue: random(200, 280),
                life: 0,
                maxLife: random(60, 140)
            });
        }

        function updateParticles() {
            blendMode(ADD);
            strokeWeight(1.0);
            noFill();

            let cx = width / 2;
            let meetZone = 40; // collision radius around center

            for (let p of particles) {
                p.life++;
                if (p.life > p.maxLife) {
                    // Respawn
                    let s = p.side;
                    let np = newParticle(s, false);
                    Object.assign(p, np);
                    continue;
                }

                let px = p.x;
                let py = p.y;

                if (!p.deflected) {
                    // Move toward center
                    p.x += p.vx;
                    p.y += p.vy;

                    // Turbulence
                    let n = noise(p.x * 0.005, p.y * 0.005, frameCount * 0.008);
                    p.vy += map(n, 0, 1, -0.12, 0.12);
                    p.vy *= 0.98;

                    // Check if near center
                    let dx = p.x - cx;
                    let dy = p.y - height / 2;
                    if (abs(dx) < meetZone && abs(dy) < meetZone * 2) {
                        // Deflect perpendicular
                        p.deflected = true;
                        let deflectDir = (random() < 0.5 ? 1 : -1);
                        let perpSpeed = sqrt(p.vx * p.vx + p.vy * p.vy) * random(0.7, 1.2);
                        p.deflectVx = (random() - 0.5) * perpSpeed * 0.4;
                        p.deflectVy = deflectDir * perpSpeed;

                        // Occasionally spawn a ring
                        if (random() < 0.03) {
                            spawnRing(p.x, p.y, p.vx, p.deflectVy);
                        }
                    }
                } else {
                    // Post-deflection arc motion
                    p.x += p.deflectVx;
                    p.y += p.deflectVy;
                    p.deflectVx *= 0.98;
                    p.deflectVy *= 0.99;
                    p.deflectVy += (random() - 0.5) * 0.08;
                    p.alpha *= 0.992;
                }

                // Age fade
                let lifeFrac = p.life / p.maxLife;
                let al = p.alpha * (1 - lifeFrac * lifeFrac) * (p.deflected ? 0.7 : 1.0);

                // Velocity-based brightness
                let spd = sqrt(p.vx * p.vx + p.vy * p.vy + p.deflectVx * p.deflectVx + p.deflectVy * p.deflectVy);
                let sat = map(spd, 0, 5, 60, 90);
                let bri = map(spd, 0, 5, 70, 100);

                stroke(p.hue, sat, bri, al);
                line(px, py, p.x, p.y);
            }
        }

        function updateRings() {
            blendMode(ADD);
            noFill();
            strokeWeight(1.2);

            for (let i = rings.length - 1; i >= 0; i--) {
                let rg = rings[i];
                rg.life++;
                if (rg.life > rg.maxLife || rg.r > rg.maxR) {
                    rings.splice(i, 1);
                    continue;
                }
                rg.x += rg.vx;
                rg.y += rg.vy;
                rg.r += 1.2;
                rg.alpha *= 0.97;

                let lifeFrac = rg.life / rg.maxLife;
                let al = rg.alpha * (1 - lifeFrac);
                stroke(rg.hue, 70, 100, al);
                ellipse(rg.x, rg.y, rg.r * 2, rg.r * 0.6 * 2);
            }
        }

        function draw() {
            blendMode(BLEND);
            fill(0, 0, 5, 12);
            noStroke();
            rect(0, 0, width, height);

            updateParticles();
            updateRings();

            // Emitter glow
            blendMode(ADD);
            noStroke();
            [leftEmit, rightEmit].forEach((em, idx) => {
                let h = idx === 0 ? 200 : 10;
                let pulse = sin(frameCount * 0.06 + idx * PI) * 4;
                for (let g = 5; g >= 1; g--) {
                    fill(h, 80, 100, map(g, 1, 5, 18, 4));
                    ellipse(em.x, em.y, (15 + pulse + g * 8) * 2, (15 + pulse + g * 5) * 2);
                }
                fill(h, 40, 100, 90);
                ellipse(em.x, em.y, (8 + pulse) * 2, (8 + pulse) * 2);
            });

            // Title + FPS
            blendMode(BLEND);
            noStroke();
            fill(0, 0, 80, 50);
            textSize(18);
            textAlign(CENTER, BOTTOM);
            textFont('monospace');
            text('Particle Jets', width / 2, height - 20);

            fill(0, 0, 80, 60);
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width - 16, 16);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            leftEmit  = { x: width / 3,       y: height / 2 };
            rightEmit = { x: (2 * width) / 3, y: height / 2 };
            background(0, 0, 5);
        }
    </script>
</body>
</html>
