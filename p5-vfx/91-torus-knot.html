<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torus Knot 3D — p5-vfx</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  .back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  .back-link:hover { color:#fff; }
  #fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  #info { position:fixed; bottom:12px; left:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; line-height:1.6; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Torus Knot 3D<br>Drag to orbit | Auto-morphing (p,q)</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const TUBE_SEGMENTS = 280;
  const TUBE_SIDES    = 14;
  const KNOTS = [
    [2,3],[3,4],[5,2],[3,5],[4,3],[5,3],[7,2],[3,7]
  ];
  let knotIdx = 0;
  let nextIdx  = 1;
  let morphT   = 0;
  let morphSpeed = 0.003;
  let fpsArr = [];
  let lastTime = 0;

  // Precomputed geometry for a knot config
  function knotPoint(t, pk, qk) {
    const phi = t * p.TWO_PI;
    const r = p.cos(qk * phi) + 2;
    return p.createVector(
      r * p.cos(pk * phi),
      r * p.sin(pk * phi),
      -p.sin(qk * phi)
    );
  }

  function buildKnotVerts(pk, qk) {
    let pts = [];
    for (let i = 0; i <= TUBE_SEGMENTS; i++) {
      pts.push(knotPoint(i / TUBE_SEGMENTS, pk, qk));
    }
    return pts;
  }

  // Build tube triangles from center-line points
  function buildTube(pts, radius) {
    // Returns array of {verts: [v0..v(SIDES-1)], t: 0..1} per ring
    let rings = [];
    for (let i = 0; i < pts.length - 1; i++) {
      const curr = pts[i];
      const next = pts[i + 1];
      const tangent = p5.Vector.sub(next, curr).normalize();
      // Arbitrary perpendicular
      let up = p.createVector(0, 1, 0);
      if (Math.abs(p5.Vector.dot(tangent, up)) > 0.9) up = p.createVector(1, 0, 0);
      const norm  = p5.Vector.cross(tangent, up).normalize();
      const binorm = p5.Vector.cross(tangent, norm).normalize();
      let ring = [];
      for (let s = 0; s < TUBE_SIDES; s++) {
        const angle = (s / TUBE_SIDES) * p.TWO_PI;
        ring.push(p5.Vector.add(curr,
          p5.Vector.add(
            p5.Vector.mult(norm,   radius * Math.cos(angle)),
            p5.Vector.mult(binorm, radius * Math.sin(angle))
          )
        ));
      }
      rings.push({ verts: ring, t: i / TUBE_SEGMENTS });
    }
    return rings;
  }

  let rings1, rings2;
  let rotY = 0;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    rings1 = buildTube(buildKnotVerts(...KNOTS[knotIdx]),  28);
    rings2 = buildTube(buildKnotVerts(...KNOTS[nextIdx]),  28);
  };

  p.draw = function() {
    p.background(0, 0, 5, 100);
    p.orbitControl(3, 3, 0.05);

    // Lighting
    p.ambientLight(30);
    p.directionalLight(255, 255, 255, 0.5, -1, -0.5);
    p.directionalLight(200, 200, 255, -1, 0.5, 0.3);

    rotY += 0.006;
    p.rotateY(rotY);
    p.rotateX(0.3);
    p.scale(22);

    // Draw tube by lerping between two knot geometries
    morphT += morphSpeed;
    if (morphT >= 1) {
      morphT = 0;
      knotIdx = nextIdx;
      nextIdx = (nextIdx + 1) % KNOTS.length;
      rings1 = buildTube(buildKnotVerts(...KNOTS[knotIdx]), 28 / 22);
      rings2 = buildTube(buildKnotVerts(...KNOTS[nextIdx]), 28 / 22);
    }

    const ease = morphT < 0.5
      ? 4 * morphT * morphT * morphT
      : 1 - Math.pow(-2 * morphT + 2, 3) / 2;

    p.noStroke();
    for (let i = 0; i < rings1.length - 1; i++) {
      const r1a = rings1[i],   r1b = rings1[i + 1];
      const r2a = rings2[i],   r2b = rings2[i + 1];
      const t = r1a.t;
      const hue = (t * 360 + p.frameCount * 0.5) % 360;

      // Lerp verts
      const va = r1a.verts.map((v, j) => p5.Vector.lerp(v, r2a.verts[j], ease));
      const vb = r1b.verts.map((v, j) => p5.Vector.lerp(v, r2b.verts[j], ease));

      for (let s = 0; s < TUBE_SIDES; s++) {
        const s2 = (s + 1) % TUBE_SIDES;
        const sat = 80 + 20 * Math.sin(s / TUBE_SIDES * p.TWO_PI);
        const bri = 85 + 15 * Math.cos(t * p.TWO_PI * 3);
        p.fill(hue, sat, bri, 100);
        p.beginShape(p.TRIANGLES);
        p.vertex(va[s].x,  va[s].y,  va[s].z);
        p.vertex(vb[s].x,  vb[s].y,  vb[s].z);
        p.vertex(va[s2].x, va[s2].y, va[s2].z);
        p.vertex(vb[s].x,  vb[s].y,  vb[s].z);
        p.vertex(vb[s2].x, vb[s2].y, vb[s2].z);
        p.vertex(va[s2].x, va[s2].y, va[s2].z);
        p.endShape();
      }
    }

    // FPS
    const now = p.millis();
    const dt = now - lastTime; lastTime = now;
    fpsArr.push(1000 / dt);
    if (fpsArr.length > 30) fpsArr.shift();
    const fps = Math.round(fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length);
    document.getElementById('fps').textContent = `FPS: ${fps}`;
    document.getElementById('info').innerHTML =
      `Torus Knot (p=${KNOTS[knotIdx][0]}, q=${KNOTS[knotIdx][1]}) → (p=${KNOTS[nextIdx][0]}, q=${KNOTS[nextIdx][1]})<br>Drag to orbit`;
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
  };
});
</script>
</body>
</html>
