<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrofluid Simulation | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

const sketch = (p) => {
    const N = 220;
    let surface, velocity, prevSurface;
    let fieldX, fieldY;
    let autoAngle = 0;
    let lastMouseX = -1, lastMouseY = -1;
    let autoMode = true;
    let autoTimer = 0;
    let fpsDisplay;

    p.setup = () => {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.colorMode(p.HSB, 360, 100, 100, 100);
        p.frameRate(60);
        initSurface();
        fieldX = p.width / 2;
        fieldY = p.height * 0.35;
        fpsDisplay = 0;
    };

    function initSurface() {
        surface = new Array(N).fill(0);
        velocity = new Array(N).fill(0);
        prevSurface = new Array(N).fill(0);
    }

    p.mouseMoved = () => {
        lastMouseX = p.mouseX;
        lastMouseY = p.mouseY;
        autoMode = false;
        autoTimer = 300;
    };

    p.draw = () => {
        p.background(0, 0, 5);

        autoTimer--;
        if (autoTimer <= 0) autoMode = true;

        if (autoMode) {
            autoAngle += 0.008;
            let r1 = p.height * 0.18;
            let r2 = p.height * 0.07;
            fieldX = p.width / 2 + Math.cos(autoAngle) * r1 + Math.cos(autoAngle * 3.1) * r2;
            fieldY = p.height * 0.58 + Math.sin(autoAngle * 0.7) * p.height * 0.08 + Math.sin(autoAngle * 2.3) * r2;
        } else {
            fieldX = p.mouseX;
            fieldY = p.mouseY;
        }

        updateSurface();
        drawFluid();
        drawFieldSource();
        drawFPS();
    };

    function updateSurface() {
        const baseY = p.height * 0.62;
        const dx = p.width / N;
        const tension = 0.94;
        const damping = 0.991;
        const gravity = 0.18;
        const magStrength = 520;
        const magFalloff = 0.00018;

        for (let i = 1; i < N - 1; i++) {
            const x = i * dx;
            const worldY = baseY - surface[i];
            const distSq = (x - fieldX) * (x - fieldX) + (worldY - fieldY) * (worldY - fieldY);
            const magForce = magStrength / (1 + magFalloff * distSq);
            const smooth = tension * (surface[i - 1] + surface[i + 1] - 2 * surface[i]);
            velocity[i] += smooth - gravity * (surface[i] * 0.001) + magForce * 0.0032;
            velocity[i] *= damping;
        }

        prevSurface = surface.slice();
        for (let i = 1; i < N - 1; i++) {
            surface[i] += velocity[i];
            if (surface[i] < 0) { surface[i] = 0; velocity[i] *= -0.3; }
            if (surface[i] > p.height * 0.55) { surface[i] = p.height * 0.55; velocity[i] *= -0.5; }
        }
        surface[0] = surface[1];
        surface[N - 1] = surface[N - 2];
    }

    function drawFluid() {
        const baseY = p.height * 0.62;
        const dx = p.width / N;

        // Draw main fluid body
        p.noStroke();
        p.fill(220, 15, 10, 100);
        p.beginShape();
        p.vertex(0, p.height);
        for (let i = 0; i < N; i++) {
            const x = i * dx;
            const y = baseY - surface[i];
            p.vertex(x, y);
        }
        p.vertex(p.width, p.height);
        p.endShape(p.CLOSE);

        // Draw metallic sheen layer
        p.fill(210, 20, 20, 100);
        p.beginShape();
        p.vertex(0, p.height);
        for (let i = 0; i < N; i++) {
            const x = i * dx;
            const y = baseY - surface[i] * 0.85;
            p.vertex(x, y);
        }
        p.vertex(p.width, p.height);
        p.endShape(p.CLOSE);

        // Draw spike highlights - bright metallic tops
        drawSpikeHighlights(baseY, dx);

        // Surface line with blue sheen
        p.noFill();
        for (let pass = 0; pass < 3; pass++) {
            const alpha = [60, 35, 15][pass];
            const bright = [80, 60, 40][pass];
            const bShift = [0, 8, 15][pass];
            p.stroke(210 + bShift, 40, bright, alpha);
            p.strokeWeight([1.5, 3, 6][pass]);
            p.beginShape();
            for (let i = 0; i < N; i++) {
                const x = i * dx;
                const y = baseY - surface[i];
                p.curveVertex(x, y);
            }
            p.endShape();
        }
    }

    function drawSpikeHighlights(baseY, dx) {
        // Find local maxima (spike tips) and draw metallic highlights
        for (let i = 2; i < N - 2; i++) {
            const h = surface[i];
            if (h < 8) continue;
            const isSpike = h > surface[i-1] && h > surface[i+1] && h > surface[i-2] && h > surface[i+2];
            if (!isSpike) continue;

            const x = i * dx;
            const tipY = baseY - h;
            const leftX = x - dx * 2.5;
            const rightX = x + dx * 2.5;
            const baseY2 = baseY - Math.max(surface[i-2], surface[i+2]) * 0.6;

            // Metallic spike triangle
            const t = p.constrain(h / (p.height * 0.3), 0, 1);
            const bright = p.lerp(55, 92, t);

            p.noStroke();
            p.fill(210, 15, bright, 90);
            p.beginShape();
            p.vertex(leftX, baseY2);
            p.vertex(x, tipY);
            p.vertex(rightX, baseY2);
            p.endShape(p.CLOSE);

            // Specular highlight on spike
            p.fill(205, 5, 97, p.lerp(0, 75, t));
            p.beginShape();
            p.vertex(x - dx * 0.4, tipY + h * 0.15);
            p.vertex(x, tipY);
            p.vertex(x + dx * 0.4, tipY + h * 0.15);
            p.endShape(p.CLOSE);
        }
    }

    function drawFieldSource() {
        p.push();
        p.translate(fieldX, fieldY);
        p.noFill();

        // Outer glow rings
        for (let r = 40; r >= 8; r -= 4) {
            const alpha = p.map(r, 8, 40, 45, 0);
            p.stroke(200, 70, 90, alpha);
            p.strokeWeight(1);
            p.ellipse(0, 0, r * 2, r * 2);
        }

        // Animated ring
        const pulse = (Math.sin(p.frameCount * 0.08) + 1) * 0.5;
        p.stroke(200, 60, 95, 80);
        p.strokeWeight(1.5);
        p.ellipse(0, 0, 22 + pulse * 6, 22 + pulse * 6);

        // Inner bright ring
        p.stroke(200, 30, 100, 90);
        p.strokeWeight(2);
        p.ellipse(0, 0, 12, 12);

        // Center dot
        p.fill(200, 20, 100, 95);
        p.noStroke();
        p.ellipse(0, 0, 5, 5);

        p.pop();
    }

    function drawFPS() {
        fpsDisplay = p.lerp(fpsDisplay, p.frameRate(), 0.05);
        p.fill(0, 0, 85, 90);
        p.noStroke();
        p.textFont('monospace');
        p.textSize(12);
        p.textAlign(p.RIGHT, p.TOP);
        p.text(Math.round(fpsDisplay) + ' fps', p.width - 14, 14);
    }

    p.windowResized = () => {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        initSurface();
    };
};

new p5(sketch);
    </script>
</body>
</html>
