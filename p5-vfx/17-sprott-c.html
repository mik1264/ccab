<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprott C Attractor | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        // Sprott C: dx=y+z, dy=-x+y/2, dz=x^2-z
        // Toroidal / torus-knot-like structure
        const DT = 0.012;
        const TRAIL_LEN = 10000;
        const NUM_TRAJ = 3;
        const SCALE = 65;

        const INITS = [
            [0.0, 1.0, 0.0],
            [0.01, 1.0, 0.0],
            [-0.01, 1.0, 0.0],
        ];
        const HUE_BASES = [190, 300, 50];

        let trajectories = [];
        let camAngleY = 0;
        let camAngleX = 0.25;

        function sprottDeriv(x, y, z) {
            let dx = y + z;
            let dy = -x + 0.5 * y;
            let dz = x * x - z;
            return [dx, dy, dz];
        }

        function rk4Step(x, y, z) {
            let [k1x, k1y, k1z] = sprottDeriv(x, y, z);
            let [k2x, k2y, k2z] = sprottDeriv(x+DT/2*k1x, y+DT/2*k1y, z+DT/2*k1z);
            let [k3x, k3y, k3z] = sprottDeriv(x+DT/2*k2x, y+DT/2*k2y, z+DT/2*k2z);
            let [k4x, k4y, k4z] = sprottDeriv(x+DT*k3x, y+DT*k3y, z+DT*k3z);
            return [
                x + DT/6*(k1x+2*k2x+2*k3x+k4x),
                y + DT/6*(k1y+2*k2y+2*k3y+k4y),
                z + DT/6*(k1z+2*k2z+2*k3z+k4z),
            ];
        }

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);
            blendMode(ADD);
            strokeWeight(1.1);

            for (let t = 0; t < NUM_TRAJ; t++) {
                trajectories.push({
                    pts: [INITS[t].slice()],
                    head: INITS[t].slice(),
                    hueBase: HUE_BASES[t],
                });
            }

            // Pre-warm
            for (let w = 0; w < 3000; w++) {
                for (let t = 0; t < NUM_TRAJ; t++) {
                    let tr = trajectories[t];
                    let [nx, ny, nz] = rk4Step(tr.head[0], tr.head[1], tr.head[2]);
                    tr.head = [nx, ny, nz];
                    tr.pts.push([nx, ny, nz]);
                    if (tr.pts.length > TRAIL_LEN) tr.pts.shift();
                }
            }
        }

        function draw() {
            background(0, 0, 4, 50);
            blendMode(ADD);

            camAngleY += 0.003;

            // Advance integration
            for (let s = 0; s < 50; s++) {
                for (let t = 0; t < NUM_TRAJ; t++) {
                    let tr = trajectories[t];
                    let [nx, ny, nz] = rk4Step(tr.head[0], tr.head[1], tr.head[2]);
                    tr.head = [nx, ny, nz];
                    tr.pts.push([nx, ny, nz]);
                    if (tr.pts.length > TRAIL_LEN) tr.pts.shift();
                }
            }

            rotateY(camAngleY);
            rotateX(camAngleX);

            for (let t = 0; t < NUM_TRAJ; t++) {
                let tr = trajectories[t];
                let pts = tr.pts;
                let len = pts.length;

                for (let i = 1; i < len; i++) {
                    let frac = i / len;
                    // Cycle hue across the trail for rainbow wrapping on the torus
                    let hue = (tr.hueBase + frac * 120) % 360;
                    let sat = 85;
                    let bri = frac * frac * 95;
                    let alpha = frac * 65;
                    stroke(hue, sat, bri, alpha);
                    let p0 = pts[i-1], p1 = pts[i];
                    line(p0[0]*SCALE, p0[2]*SCALE, p0[1]*SCALE,
                         p1[0]*SCALE, p1[2]*SCALE, p1[1]*SCALE);
                }
            }

            // Draw glowing head markers
            noStroke();
            for (let t = 0; t < NUM_TRAJ; t++) {
                let tr = trajectories[t];
                let h = tr.head;
                fill(tr.hueBase, 60, 100, 80);
                push();
                translate(h[0]*SCALE, h[2]*SCALE, h[1]*SCALE);
                sphere(2.5);
                pop();
            }

            // FPS
            resetMatrix();
            blendMode(BLEND);
            fill(255, 0, 80, 90);
            noStroke();
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width/2 - 16, -height/2 + 16);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
