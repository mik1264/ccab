<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spherical Harmonics 3D — p5-vfx</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  .back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  .back-link:hover { color:#fff; }
  #fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  #info { position:fixed; bottom:12px; left:12px; color:#888; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:8px 14px; border-radius:6px; z-index:999; line-height:1.8; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Spherical Harmonics Y(l,m)<br>l=0, m=0</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const THETA_SEGS = 60;
  const PHI_SEGS   = 120;

  // Associated Legendre Polynomials P_l^|m|(x)
  function assocLegendre(l, m, x) {
    const am = Math.abs(m);
    // Compute P_am^am first
    let pmm = 1;
    if (am > 0) {
      const omx2 = (1 - x) * (1 + x);
      let fact = 1;
      for (let i = 1; i <= am; i++) { pmm *= -fact * Math.sqrt(omx2); fact += 2; }
    }
    if (l === am) return pmm;
    let pmmp1 = x * (2 * am + 1) * pmm;
    if (l === am + 1) return pmmp1;
    let pll = 0;
    for (let ll = am + 2; ll <= l; ll++) {
      pll = ((2 * ll - 1) * x * pmmp1 - (ll + am - 1) * pmm) / (ll - am);
      pmm = pmmp1; pmmp1 = pll;
    }
    return pll;
  }

  // Real spherical harmonic Y_l^m(theta, phi)
  function Y(l, m, theta, phi) {
    const am = Math.abs(m);
    // Normalization
    let norm = Math.sqrt((2 * l + 1) / (4 * Math.PI));
    let fac = 1;
    for (let i = l - am + 1; i <= l + am; i++) fac *= i;
    norm *= Math.sqrt(1 / fac);
    const P = assocLegendre(l, am, Math.cos(theta));
    if (m === 0) return norm * P;
    if (m > 0)  return Math.SQRT2 * norm * P * Math.cos(am * phi);
    return       Math.SQRT2 * norm * P * Math.sin(am * phi);
  }

  // Sequence of (l,m) to cycle through
  const MODES = [
    [0,0],[1,0],[1,1],[2,0],[2,1],[2,2],
    [3,0],[3,1],[3,2],[3,3],[4,0],[4,2],[4,4]
  ];
  let modeIdx  = 0;
  let nextMode = 1;
  let morphT   = 0;
  let phase    = 'hold';
  let holdCnt  = 0;
  const HOLD_F  = 200;
  const MORPH_S = 0.008;

  let mesh1, mesh2; // flat arrays [x,y,z,sign] per vertex
  let rotX = 0, rotY = 0;
  let fpsArr = [], lastTime = 0;

  function buildMesh(l, m) {
    const pts = [];
    for (let ti = 0; ti <= THETA_SEGS; ti++) {
      const theta = (ti / THETA_SEGS) * Math.PI;
      const row = [];
      for (let pi2 = 0; pi2 <= PHI_SEGS; pi2++) {
        const phi = (pi2 / PHI_SEGS) * Math.TWO_PI;
        const y   = Y(l, m, theta, phi);
        const r   = 1 + 0.6 * Math.abs(y);
        row.push([
          r * Math.sin(theta) * Math.cos(phi),
          r * Math.sin(theta) * Math.sin(phi),
          r * Math.cos(theta),
          Math.sign(y)
        ]);
      }
      pts.push(row);
    }
    return pts;
  }

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    mesh1 = buildMesh(...MODES[modeIdx]);
    mesh2 = buildMesh(...MODES[nextMode]);
  };

  p.draw = function() {
    p.background(0, 0, 5);
    p.orbitControl(3, 3, 0.05);

    p.ambientLight(20);
    p.directionalLight(255, 255, 255,  0.3, -1, -0.5);
    p.directionalLight(200, 180, 255, -0.5,  0.5, 0.3);

    rotY += 0.008;
    p.rotateY(rotY);
    p.scale(120);

    // State machine
    if (phase === 'hold') {
      holdCnt++;
      if (holdCnt > HOLD_F) { phase = 'morph'; holdCnt = 0; morphT = 0; }
    } else {
      morphT = Math.min(1, morphT + MORPH_S);
      if (morphT >= 1) {
        modeIdx = nextMode;
        nextMode = (nextMode + 1) % MODES.length;
        mesh1 = buildMesh(...MODES[modeIdx]);
        mesh2 = buildMesh(...MODES[nextMode]);
        phase = 'hold'; morphT = 0;
      }
    }

    const ease = morphT < 0.5 ? 4*morphT*morphT*morphT : 1-Math.pow(-2*morphT+2,3)/2;

    p.noStroke();
    for (let ti = 0; ti < THETA_SEGS; ti++) {
      for (let pi2 = 0; pi2 < PHI_SEGS; pi2++) {
        const A1 = mesh1[ti][pi2],    B1 = mesh1[ti][pi2+1];
        const C1 = mesh1[ti+1][pi2+1], D1 = mesh1[ti+1][pi2];
        const A2 = mesh2[ti][pi2],    B2 = mesh2[ti][pi2+1];
        const C2 = mesh2[ti+1][pi2+1], D2 = mesh2[ti+1][pi2];

        const lerpP = (a, b, t) => [
          a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t, a[3]+(b[3]-a[3])*t
        ];

        const A = lerpP(A1, A2, ease), B = lerpP(B1, B2, ease);
        const C = lerpP(C1, C2, ease), D = lerpP(D1, D2, ease);

        // Color: positive=warm, negative=cool
        const sign = A[3];
        const hue  = sign >= 0 ? 15 : 210; // warm=orange, cool=blue
        const sat  = 85 + 15 * Math.abs(sign);
        const bri  = 55 + 35 * Math.abs(sign);
        p.fill(hue, sat, bri, 88);

        p.beginShape(p.TRIANGLES);
        p.vertex(A[0],A[1],A[2]); p.vertex(B[0],B[1],B[2]); p.vertex(C[0],C[1],C[2]);
        p.vertex(A[0],A[1],A[2]); p.vertex(C[0],C[1],C[2]); p.vertex(D[0],D[1],D[2]);
        p.endShape();
      }
    }

    // FPS
    const now = p.millis();
    const dt  = now - lastTime; lastTime = now;
    fpsArr.push(1000/dt);
    if (fpsArr.length > 30) fpsArr.shift();
    const fps = Math.round(fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length);
    document.getElementById('fps').textContent = `FPS: ${fps}`;
    const [cl, cm] = MODES[modeIdx], [nl, nm] = MODES[nextMode];
    document.getElementById('info').innerHTML =
      `Spherical Harmonics Y(l,m)<br>Current: l=${cl}, m=${cm}<br>Next: l=${nl}, m=${nm}<br>Orange=positive &nbsp; Blue=negative<br>Drag to orbit`;
  };

  p.windowResized = function() { p.resizeCanvas(p.windowWidth, p.windowHeight); };
});
</script>
</body>
</html>
