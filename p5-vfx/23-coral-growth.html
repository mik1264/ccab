<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coral Growth | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #040d0d; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

// DLA Coral Growth Simulation
// Multiple coral colonies grow upward from a base line

var particles = [];
var coralCells = [];
var coralGrid = {};
var colonies = [];
var maxParticles = 300;
var stepsPerFrame = 12;
var gridSize = 4;

function gridKey(x, y) {
    return Math.floor(x / gridSize) + ',' + Math.floor(y / gridSize);
}

function setup() {
    createCanvas(windowWidth, windowHeight);
    colorMode(HSB, 360, 100, 100, 100);
    frameRate(60);

    // Create colony base points along the bottom
    var numColonies = 5;
    var spacing = width / (numColonies + 1);
    for (var i = 0; i < numColonies; i++) {
        var bx = spacing * (i + 1);
        // Seed each colony with a few base cells along the bottom line
        for (var dx = -3; dx <= 3; dx++) {
            var cell = {
                x: bx + dx * gridSize,
                y: height - 30 + Math.floor(Math.random() * 6) * gridSize,
                colony: i,
                age: 0
            };
            coralCells.push(cell);
            coralGrid[gridKey(cell.x, cell.y)] = true;
        }
        colonies.push({ x: bx, baseY: height - 30 });
    }

    // Spawn initial particles
    for (var j = 0; j < maxParticles; j++) {
        spawnParticle();
    }
}

function spawnParticle() {
    // Spawn from top with horizontal spread
    particles.push({
        x: Math.random() * width,
        y: Math.random() * height * 0.3,
        vx: (Math.random() - 0.5) * 2,
        vy: Math.random() * 0.5 + 0.2
    });
}

function draw() {
    // Deep ocean background with slight blue-green tint
    background(185, 90, 4, 100);

    // Draw subtle water caustic lines
    push();
    stroke(185, 60, 15, 30);
    strokeWeight(0.5);
    noFill();
    for (var w = 0; w < 8; w++) {
        var wY = (frameCount * 0.3 + w * 120) % height;
        beginShape();
        for (var wx = 0; wx <= width; wx += 40) {
            var wy = wY + sin(wx * 0.02 + frameCount * 0.01 + w) * 15;
            curveVertex(wx, wy);
        }
        endShape();
    }
    pop();

    // Run multiple DLA steps per frame
    for (var step = 0; step < stepsPerFrame; step++) {
        updateParticles();
    }

    // Draw base line
    push();
    stroke(15, 60, 40, 80);
    strokeWeight(3);
    line(0, height - 28, width, height - 28);
    stroke(20, 70, 60, 50);
    strokeWeight(1);
    line(0, height - 24, width, height - 24);
    pop();

    // Draw coral structure
    drawCoral();

    // Draw active particles
    push();
    noStroke();
    for (var p = 0; p < particles.length; p++) {
        var pt = particles[p];
        var alpha = map(pt.y, 0, height, 10, 40);
        fill(190, 40, 80, alpha);
        ellipse(pt.x, pt.y, 2, 2);
    }
    pop();

    // FPS counter
    push();
    fill(0, 0, 100, 50);
    noStroke();
    textFont('monospace');
    textSize(12);
    textAlign(RIGHT, TOP);
    text(Math.round(frameRate()) + ' fps', width - 16, 16);
    pop();

    // Info text
    push();
    fill(185, 40, 80, 60);
    noStroke();
    textFont('sans-serif');
    textSize(12);
    textAlign(LEFT, BOTTOM);
    text('Diffusion Limited Aggregation — Coral Growth', 16, height - 12);
    pop();
}

function updateParticles() {
    var toRemove = [];
    for (var i = 0; i < particles.length; i++) {
        var p = particles[i];

        // Random walk with upward bias (for "rising" particles)
        p.x += p.vx + (Math.random() - 0.5) * 3;
        p.y += p.vy + (Math.random() - 0.5) * 3 - 0.1;

        // Slight drift from sides
        p.vx *= 0.98;
        p.vy *= 0.98;
        p.vx += (Math.random() - 0.5) * 0.5;
        p.vy += (Math.random() - 0.5) * 0.5 + 0.05;

        // Wrap horizontally
        if (p.x < 0) p.x += width;
        if (p.x > width) p.x -= width;

        // If went above top, respawn
        if (p.y < 0) {
            p.x = Math.random() * width;
            p.y = Math.random() * height * 0.2;
            p.vx = (Math.random() - 0.5) * 2;
            p.vy = Math.random() * 0.5 + 0.2;
            continue;
        }

        // Check adjacency to coral structure (8-neighbor check)
        var gx = Math.floor(p.x / gridSize);
        var gy = Math.floor(p.y / gridSize);
        var stuck = false;
        for (var dy = -1; dy <= 1 && !stuck; dy++) {
            for (var dx = -1; dx <= 1 && !stuck; dx++) {
                var key = (gx + dx) + ',' + (gy + dy);
                if (coralGrid[key]) {
                    stuck = true;
                }
            }
        }

        // Also check against base line
        if (p.y >= height - 32 && p.y <= height - 20) {
            stuck = true;
        }

        if (stuck) {
            // Snap to grid
            var cx = gx * gridSize;
            var cy = gy * gridSize;
            var cell = { x: cx, y: cy, colony: -1, age: 0 };

            // Assign to nearest colony
            var minDist = Infinity;
            for (var c = 0; c < colonies.length; c++) {
                var d = Math.abs(cx - colonies[c].x);
                if (d < minDist) {
                    minDist = d;
                    cell.colony = c;
                }
            }

            coralCells.push(cell);
            coralGrid[gridKey(cx, cy)] = true;
            toRemove.push(i);
        }
    }

    // Remove stuck particles and spawn new ones
    for (var r = toRemove.length - 1; r >= 0; r--) {
        particles.splice(toRemove[r], 1);
    }
    while (particles.length < maxParticles) {
        spawnParticle();
    }

    // Age cells
    for (var ci = 0; ci < coralCells.length; ci++) {
        coralCells[ci].age++;
    }
}

function drawCoral() {
    push();
    noStroke();
    for (var i = 0; i < coralCells.length; i++) {
        var cell = coralCells[i];
        // Color by height: bottom = deep orange, top = pink-white
        var heightRatio = 1.0 - (cell.y / height);
        heightRatio = constrain(heightRatio, 0, 1);

        // Hue: 25 (orange) → 350 (pink) → 0 (red-white)
        var h, s, b;
        if (heightRatio < 0.5) {
            h = lerp(25, 355, heightRatio * 2);
            s = lerp(90, 70, heightRatio * 2);
            b = lerp(75, 90, heightRatio * 2);
        } else {
            h = lerp(355, 10, (heightRatio - 0.5) * 2);
            s = lerp(70, 20, (heightRatio - 0.5) * 2);
            b = lerp(90, 100, (heightRatio - 0.5) * 2);
        }

        // Shimmer effect
        var shimmer = sin(frameCount * 0.03 + cell.x * 0.05 + cell.y * 0.03) * 5;
        b = constrain(b + shimmer, 0, 100);

        fill(h, s, b, 95);
        // Slightly organic blob shape
        var sz = gridSize + 1;
        ellipse(cell.x + gridSize / 2, cell.y + gridSize / 2, sz, sz);
    }
    pop();
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
    </script>
</body>
</html>
