<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comet Shower</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#0f0; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const sketch = (p) => {
  let comets = [];
  let stars = [];
  let fpsEl, frameCount2 = 0, fpsTimer = 0;
  const MAX_COMETS = 22;

  class Star {
    constructor() {
      this.x = p.random(p.width);
      this.y = p.random(p.height);
      this.r = p.random(0.4, 2);
      this.twinkleSpeed = p.random(0.02, 0.06);
      this.twinkleOff = p.random(100);
      this.hue = p.random([200, 210, 220, 40, 50]);
      this.sat = p.random(0, 30);
    }
    draw() {
      let a = p.map(p.sin(p.frameCount * this.twinkleSpeed + this.twinkleOff), -1, 1, 40, 100);
      p.noStroke();
      p.fill(this.hue, this.sat, 100, a);
      p.circle(this.x, this.y, this.r * 2);
    }
  }

  class Comet {
    constructor() {
      this.isFireball = p.random() < 0.08;
      let scale = this.isFireball ? 3.2 : 1;
      this.nucleusR = p.random(2, 5) * scale;
      // Launch from off-screen edges
      let edge = p.floor(p.random(4));
      let margin = 50;
      if (edge === 0) { this.x = p.random(p.width); this.y = -margin; }
      else if (edge === 1) { this.x = p.width + margin; this.y = p.random(p.height * 0.6); }
      else if (edge === 2) { this.x = -margin; this.y = p.random(p.height * 0.6); }
      else { this.x = p.random(p.width * 0.2, p.width * 0.8); this.y = -margin; }

      // Direction: generally downward-ish, varying angle
      let angle = p.random(p.PI * 0.1, p.PI * 0.9);
      this.speed = p.random(3, 8) * (this.isFireball ? 1.3 : 1);
      this.vx = p.cos(angle) * this.speed;
      this.vy = p.sin(angle) * this.speed;

      this.hue = p.random(360);
      this.trail = [];
      this.maxTrail = this.isFireball ? 80 : 55;
      this.noiseOff = p.random(1000);
      this.noiseT = 0;
    }

    update() {
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > this.maxTrail) this.trail.shift();
      this.x += this.vx;
      this.y += this.vy;
      this.noiseT += 0.03;
    }

    draw() {
      let tLen = this.trail.length;

      // Dust tail (warm, curves slightly with noise)
      p.noFill();
      for (let i = 1; i < tLen; i++) {
        let a = p.map(i, 0, tLen, 0, 60) * (this.isFireball ? 1.4 : 1);
        let w = p.map(i, 0, tLen, 0.3, this.nucleusR * 1.8);
        let curl = p.noise(i * 0.05 + this.noiseOff) * 8 - 4;
        p.strokeWeight(w);
        p.stroke(35, 80, 95, a); // warm orange
        let t1 = this.trail[i-1], t2 = this.trail[i];
        let perpX = -(t2.y - t1.y), perpY = (t2.x - t1.x);
        let pLen = p.sqrt(perpX*perpX + perpY*perpY) || 1;
        perpX /= pLen; perpY /= pLen;
        p.line(
          t1.x + perpX * curl * 0.5,
          t1.y + perpY * curl * 0.5,
          t2.x + perpX * curl * 0.5,
          t2.y + perpY * curl * 0.5
        );
      }

      // Ion tail (blue-white, straight back)
      for (let i = 1; i < tLen; i++) {
        let a = p.map(i, 0, tLen, 0, 85) * (this.isFireball ? 1.5 : 1);
        let w = p.map(i, 0, tLen, 0.2, this.nucleusR * 0.9);
        p.strokeWeight(w);
        p.stroke(200, 60, 100, a);
        p.line(this.trail[i-1].x, this.trail[i-1].y, this.trail[i].x, this.trail[i].y);
      }

      // Bright nucleus
      p.noStroke();
      // Glow layers
      p.fill(200, 30, 100, 20);
      p.circle(this.x, this.y, this.nucleusR * 8);
      p.fill(200, 20, 100, 50);
      p.circle(this.x, this.y, this.nucleusR * 4);
      p.fill(40, 10, 100, 90);
      p.circle(this.x, this.y, this.nucleusR * 2.2);
      // Core
      p.fill(0, 0, 100, 100);
      p.circle(this.x, this.y, this.nucleusR * 1.1);

      if (this.isFireball) {
        // Extra radial glow
        p.fill(35, 80, 100, 30);
        p.circle(this.x, this.y, this.nucleusR * 12);
      }
    }

    isOffScreen() {
      let margin = 150;
      return this.x < -margin || this.x > p.width + margin ||
             this.y < -margin || this.y > p.height + margin;
    }
  }

  p.setup = () => {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    for (let i = 0; i < 1000; i++) stars.push(new Star());
    // Seed some comets
    for (let i = 0; i < 8; i++) comets.push(new Comet());
  };

  p.draw = () => {
    p.blendMode(p.BLEND);
    p.background(230, 35, 5);

    // Draw stars
    for (let s of stars) s.draw();

    // Spawn comets
    if (p.frameCount % 75 === 0 && comets.length < MAX_COMETS) {
      comets.push(new Comet());
    }

    p.blendMode(p.ADD);

    // Update & draw comets
    for (let i = comets.length - 1; i >= 0; i--) {
      comets[i].update();
      comets[i].draw();
      if (comets[i].isOffScreen()) comets.splice(i, 1);
    }

    frameCount2++;
    let now = p.millis();
    if (now - fpsTimer > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(frameCount2 / ((now - fpsTimer) / 1000));
      frameCount2 = 0; fpsTimer = now;
    }
  };

  p.windowResized = () => {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    stars = [];
    for (let i = 0; i < 1000; i++) stars.push(new Star());
  };
};
new p5(sketch);
</script>
</body>
</html>
