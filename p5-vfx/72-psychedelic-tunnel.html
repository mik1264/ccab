<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psychedelic Tunnel — p5 VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; font-family:monospace; font-size:13px; color:#0f0; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; font-family:monospace; font-size:12px; color:#888; background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Mouse warps tunnel twist</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let t = 0;
  let fpsEl = document.getElementById('fps');
  let frameAcc = 0, fpsTimer = 0, lastFps = 0;

  // Precompute noise table for organic warp
  const NOISE_SIZE = 256;
  let noiseTable;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);

    // Build a tileable noise table
    noiseTable = new Float32Array(NOISE_SIZE * NOISE_SIZE);
    for (let y = 0; y < NOISE_SIZE; y++) {
      for (let x = 0; x < NOISE_SIZE; x++) {
        noiseTable[y * NOISE_SIZE + x] = p.noise(x * 0.05, y * 0.05);
      }
    }
  };

  // Inline fast fract
  function fract(v) { return v - Math.floor(v); }

  // Bilinear noise lookup from table (tileable)
  function lookupNoise(u, v) {
    let x = ((u % 1.0) + 1.0) % 1.0 * (NOISE_SIZE - 1);
    let y = ((v % 1.0) + 1.0) % 1.0 * (NOISE_SIZE - 1);
    let ix = Math.floor(x) | 0, iy = Math.floor(y) | 0;
    let fx = x - ix, fy = y - iy;
    let x1 = (ix + 1) % NOISE_SIZE, y1 = (iy + 1) % NOISE_SIZE;
    let a = noiseTable[iy * NOISE_SIZE + ix];
    let b = noiseTable[iy * NOISE_SIZE + x1];
    let c = noiseTable[y1 * NOISE_SIZE + ix];
    let d = noiseTable[y1 * NOISE_SIZE + x1];
    return a + (b - a) * fx + (c - a) * fy + (a - b - c + d) * fx * fy;
  }

  p.draw = function() {
    p.loadPixels();
    let W = p.width, H = p.height;
    let cx = W * 0.5, cy = H * 0.5;
    let mx = (p.mouseX - cx) / W * 0.8;  // twist offset from mouse
    let my = (p.mouseY - cy) / H * 0.8;

    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        let dx = (x - cx) / cx;   // [-1,1]
        let dy = (y - cy) / cy;
        let r = Math.sqrt(dx * dx + dy * dy) + 0.0001;
        let theta = Math.atan2(dy + my, dx + mx);

        // tunnel depth with fract rings
        let depth = 0.3 / r;
        let fDepth = fract(depth + t * 0.5);

        // angle offset scrolls
        let angleOff = theta + t * 0.4 + mx * 2.0;

        // noise warp on tunnel walls
        let nu = fract(depth * 0.15 + 0.0) ;
        let nv = fract(theta / (2 * Math.PI) + 0.0);
        let warp = lookupNoise(nu + t * 0.07, nv + t * 0.05) * 0.4;

        let hue = ((angleOff * 3.0 + fDepth * 220.0 + warp * 180.0) % 360 + 360) % 360;
        // brightness falls near center (infinity) and near edge
        let bri = 50 + 45 * Math.pow(fDepth, 0.4) * (1 - Math.pow(Math.max(0, r - 0.8), 2));
        let sat = 90 + 10 * Math.sin(fDepth * Math.PI * 4);

        let idx = 4 * (y * W + x);
        // HSB to RGB inline
        let h = hue / 60.0;
        let s = sat / 100.0;
        let br = bri / 100.0;
        let hi = Math.floor(h) % 6;
        let f2 = h - Math.floor(h);
        let pv = br * (1 - s);
        let qv = br * (1 - s * f2);
        let tv = br * (1 - s * (1 - f2));
        let r2, g2, b2;
        if (hi===0){r2=br;g2=tv;b2=pv;}
        else if(hi===1){r2=qv;g2=br;b2=pv;}
        else if(hi===2){r2=pv;g2=br;b2=tv;}
        else if(hi===3){r2=pv;g2=qv;b2=br;}
        else if(hi===4){r2=tv;g2=pv;b2=br;}
        else{r2=br;g2=pv;b2=qv;}

        p.pixels[idx]   = r2 * 255;
        p.pixels[idx+1] = g2 * 255;
        p.pixels[idx+2] = b2 * 255;
        p.pixels[idx+3] = 255;
      }
    }
    p.updatePixels();
    t += 0.018;

    // FPS counter
    frameAcc++;
    fpsTimer += p.deltaTime;
    if (fpsTimer >= 500) {
      lastFps = Math.round(frameAcc * 1000 / fpsTimer);
      frameAcc = 0; fpsTimer = 0;
      fpsEl.textContent = lastFps + ' fps';
      fpsEl.style.color = lastFps >= 50 ? '#0f0' : lastFps >= 30 ? '#ff0' : '#f44';
    }
  };

  p.windowResized = function() { p.resizeCanvas(p.windowWidth, p.windowHeight); };
});
</script>
</body>
</html>
