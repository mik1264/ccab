<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brian's Brain | P5 VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#hud { position:fixed; top:12px; right:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.75); padding:8px 12px; border-radius:6px; z-index:999; line-height:1.9; }
#keys { position:fixed; bottom:12px; left:12px; color:#444; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:4px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="hud">
  FPS: <span id="fps">0</span><br>
  GEN: <span id="gen">0</span><br>
  ON: <span id="on">0</span><br>
  DYING: <span id="dying">0</span>
</div>
<div id="keys">SPACE pause · R reset · click paint</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const CS=2;
  const OFF=0, DYING=1, ON=2;
  let cols,rows,grid,next;
  let paused=false, gen=0;
  let fpsTimer=0,fpsCount=0,fpsVal=0;
  let t=0; // global time for dying color cycle

  p.setup=function(){
    p.createCanvas(p.windowWidth,p.windowHeight);
    p.colorMode(p.HSB,360,100,100,100);
    p.pixelDensity(1);
    cols=Math.floor(p.width/CS); rows=Math.floor(p.height/CS);
    grid=new Uint8Array(cols*rows); next=new Uint8Array(cols*rows);
    reset();
  };

  function reset(){
    gen=0;
    for(let i=0;i<cols*rows;i++){
      const r=Math.random();
      if(r<0.25) grid[i]=ON;
      else if(r<0.35) grid[i]=DYING;
      else grid[i]=OFF;
    }
  }

  function step(){
    let onCnt=0, dyingCnt=0;
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const i=r*cols+c;
        const v=grid[i];
        if(v===ON){ next[i]=DYING; dyingCnt++; }
        else if(v===DYING){ next[i]=OFF; }
        else {
          // OFF: turn ON if exactly 2 ON neighbors
          let cnt=0;
          for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
            if(dr===0&&dc===0) continue;
            const rr=(r+dr+rows)%rows, cc=(c+dc+cols)%cols;
            if(grid[rr*cols+cc]===ON) cnt++;
          }
          if(cnt===2){ next[i]=ON; onCnt++; }
          else next[i]=OFF;
        }
      }
    }
    const tmp=grid; grid=next; next=tmp;
    gen++;
    return{onCnt,dyingCnt};
  }

  p.draw=function(){
    fpsCount++;
    const now=performance.now();
    if(now-fpsTimer>=500){
      fpsVal=Math.round(fpsCount/((now-fpsTimer)/1000));
      fpsCount=0; fpsTimer=now;
    }

    if(p.mouseIsPressed){
      const mc=Math.floor(p.mouseX/CS), mr=Math.floor(p.mouseY/CS);
      for(let dr=-3;dr<=3;dr++) for(let dc=-3;dc<=3;dc++){
        const c=mc+dc,r=mr+dr;
        if(c>=0&&c<cols&&r>=0&&r<rows) grid[r*cols+c]=ON;
      }
    }

    t++;
    let onCnt=0,dyingCnt=0;
    if(!paused){ const c=step(); onCnt=c.onCnt; dyingCnt=c.dyingCnt; }

    p.loadPixels();
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const v=grid[r*cols+c];
        let R=0,G=0,B=0;
        if(v===ON){
          // White/bright with slight hue variation
          R=255; G=255; B=255;
        } else if(v===DYING){
          // Cycle through HSB spectrum as dying
          const hue=(t*3+(r+c)*0.5)%360;
          [R,G,B]=hsbToRgb(hue,90,70);
        }
        for(let py=0;py<CS;py++) for(let px=0;px<CS;px++){
          const pi=4*((r*CS+py)*p.width+(c*CS+px));
          p.pixels[pi]=R; p.pixels[pi+1]=G; p.pixels[pi+2]=B; p.pixels[pi+3]=255;
        }
      }
    }
    p.updatePixels();

    document.getElementById('fps').textContent=fpsVal;
    document.getElementById('gen').textContent=gen;
    document.getElementById('on').textContent=onCnt;
    document.getElementById('dying').textContent=dyingCnt;
  };

  function hsbToRgb(h,s,b){
    h=((h%360)+360)%360; s/=100; b/=100;
    const c=b*s,x=c*(1-Math.abs((h/60)%2-1)),m=b-c;
    let r=0,g=0,bl=0;
    if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;bl=x;}
    else if(h<240){g=x;bl=c;}else if(h<300){r=x;bl=c;}else{r=c;bl=x;}
    return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((bl+m)*255)];
  }

  p.keyPressed=function(){
    if(p.key===' '){paused=!paused;return false;}
    if(p.key==='r'||p.key==='R') reset();
  };

  p.windowResized=function(){
    p.resizeCanvas(p.windowWidth,p.windowHeight);
    cols=Math.floor(p.width/CS); rows=Math.floor(p.height/CS);
    grid=new Uint8Array(cols*rows); next=new Uint8Array(cols*rows);
    reset();
  };
});
</script>
</body>
</html>
