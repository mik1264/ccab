<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Four-Wing Attractor | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const TRAIL_LEN = 5000;
        const DT = 0.005;
        const SCALE = 50;
        const NUM_TRAJ = 6;
        const fa = 0.2, fb = -0.01, fc = 0.4;

        function fourWing(x, y, z) {
            return {
                dx: fa * x + y * z,
                dy: fb * x + fc * y - x * z,
                dz: -z - x * y
            };
        }

        function rk4(x, y, z, dt) {
            let k1 = fourWing(x, y, z);
            let k2 = fourWing(x + dt/2 * k1.dx, y + dt/2 * k1.dy, z + dt/2 * k1.dz);
            let k3 = fourWing(x + dt/2 * k2.dx, y + dt/2 * k2.dy, z + dt/2 * k2.dz);
            let k4 = fourWing(x + dt * k3.dx, y + dt * k3.dy, z + dt * k3.dz);
            return {
                x: x + dt/6 * (k1.dx + 2*k2.dx + 2*k3.dx + k4.dx),
                y: y + dt/6 * (k1.dy + 2*k2.dy + 2*k3.dy + k4.dy),
                z: z + dt/6 * (k1.dz + 2*k2.dz + 2*k3.dz + k4.dz)
            };
        }

        // 6 trajectories, 60° hue separation
        let trajectories = [];
        for (let i = 0; i < NUM_TRAJ; i++) {
            let angle = (i / NUM_TRAJ) * Math.PI * 2;
            let r = 0.015;
            trajectories.push({
                pts: [],
                x: 1.0 + Math.cos(angle) * r,
                y: 0.5 + Math.sin(angle) * r,
                z: 0.0 + (i % 2 === 0 ? 0.005 : -0.005),
                hueOffset: i * 60
            });
        }

        let globalIter = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);
            // Warm up
            for (let w = 0; w < 2000; w++) {
                for (let t of trajectories) {
                    let nxt = rk4(t.x, t.y, t.z, DT);
                    t.x = nxt.x; t.y = nxt.y; t.z = nxt.z;
                }
            }
        }

        function draw() {
            orbitControl(2, 2, 0.1);

            background(0, 0, 5, 18);
            blendMode(ADD);

            // The four-wing looks best from a slightly elevated angle
            rotateY(frameCount * 0.003);
            rotateX(sin(frameCount * 0.001) * 0.3);

            for (let s = 0; s < 6; s++) {
                for (let t of trajectories) {
                    let nxt = rk4(t.x, t.y, t.z, DT);
                    t.x = nxt.x; t.y = nxt.y; t.z = nxt.z;
                    t.pts.push([t.x * SCALE, t.y * SCALE, t.z * SCALE]);
                    if (t.pts.length > TRAIL_LEN) t.pts.shift();
                }
            }
            globalIter++;

            noFill();
            strokeWeight(1.0);
            for (let t of trajectories) {
                let n = t.pts.length;
                for (let i = 1; i < n; i++) {
                    let ageFrac = i / n;
                    // Each of the 6 wings gets a distinct hue that slowly shifts
                    let hue = (t.hueOffset + ageFrac * 100 + globalIter * 0.2) % 360;
                    let alpha = ageFrac * 60;
                    stroke(hue, 90, 100, alpha);
                    let p0 = t.pts[i - 1];
                    let p1 = t.pts[i];
                    line(p0[0], p0[1], p0[2], p1[0], p1[1], p1[2]);
                }
                if (t.pts.length > 0) {
                    let head = t.pts[t.pts.length - 1];
                    stroke(t.hueOffset, 50, 100, 100);
                    strokeWeight(5);
                    point(head[0], head[1], head[2]);
                    strokeWeight(1.0);
                }
            }

            blendMode(BLEND);

            let fps = frameRate();
            resetMatrix();
            noStroke();
            fill(255, 255, 255, 180);
            textSize(12);
            textAlign(RIGHT, TOP);
            textFont('monospace');
            text(fps.toFixed(0) + ' fps', width / 2 - 16, -height / 2 + 16);

            textAlign(CENTER, BOTTOM);
            textSize(14);
            fill(255, 255, 255, 100);
            text('Four-Wing Attractor  a=0.2  b=-0.01  c=0.4', 0, height / 2 - 16);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
