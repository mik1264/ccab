<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kármán Vortex Street | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #030312; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const N_PARTICLES = 2000;
        let particles = [];
        let vortices  = [];

        // Cylinder
        let cylX, cylY, cylR;

        // Flow parameters
        const U0 = 1.8;          // freestream speed (px/step)
        const SHED_INTERVAL = 28; // frames between vortex shedding
        const MAX_VORTICES  = 40;
        const VORTEX_STRENGTH = 4.5;
        const VORTEX_DECAY   = 0.994;

        let frameCount2 = 0;
        let shedSign = 1;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
            pixelDensity(1);

            cylX = width * 0.28;
            cylY = height * 0.5;
            cylR = min(width, height) * 0.07;

            spawnParticles();
        }

        function spawnParticles() {
            particles = [];
            for (let i = 0; i < N_PARTICLES; i++) {
                particles.push(newParticle());
            }
        }

        function newParticle() {
            return {
                x: random(-cylR * 3, cylX - cylR - 2),
                y: random(0, height),
                age: random(0, 200)
            };
        }

        // Velocity at point (px,py) due to one vortex
        function vortexVelocity(px, py, vx, vy, gamma, core) {
            let dx = px - vx, dy = py - vy;
            let r2 = dx*dx + dy*dy + core*core;
            // Rankine vortex: v_theta = gamma / (2*PI*r), clamp near core
            let factor = gamma / (TWO_PI * r2);
            return { ux: -dy * factor, uy: dx * factor };
        }

        function totalVelocity(px, py) {
            let ux = U0, uy = 0;

            // Cylinder potential flow: doublet
            let dx = px - cylX, dy = py - cylY;
            let r2 = dx*dx + dy*dy;
            if (r2 > 1) {
                let R2 = cylR * cylR;
                let coeff = U0 * R2 / (r2 * r2);
                ux += coeff * (dx*dx - dy*dy);
                uy += coeff * 2 * dx * dy;
            }

            // All vortices
            const core = cylR * 0.4;
            for (let v of vortices) {
                let dv = vortexVelocity(px, py, v.x, v.y, v.gamma, core);
                ux += dv.ux;
                uy += dv.uy;
            }

            return { ux, uy };
        }

        function draw() {
            // Fading trail
            noStroke();
            fill(235, 40, 3, 22);
            rect(0, 0, width, height);

            frameCount2++;

            // Shed new vortex alternating top/bottom
            if (frameCount2 % SHED_INTERVAL === 0) {
                let offsetY = shedSign * (cylR * 1.15);
                vortices.push({
                    x: cylX + cylR * 1.3,
                    y: cylY + offsetY,
                    gamma: shedSign * VORTEX_STRENGTH,
                    strength: 1.0
                });
                shedSign *= -1;
                if (vortices.length > MAX_VORTICES) vortices.shift();
            }

            // Move and decay vortices
            for (let v of vortices) {
                let vel = totalVelocity(v.x, v.y);
                v.x += vel.ux * 0.5;
                v.y += vel.uy * 0.5;
                v.strength *= VORTEX_DECAY;
                v.gamma    = v.gamma > 0
                    ? abs(v.gamma) * VORTEX_DECAY
                    : -abs(v.gamma) * VORTEX_DECAY;
            }
            vortices = vortices.filter(v => abs(v.gamma) > 0.05 && v.x < width + 50);

            // Move particles
            for (let p of particles) {
                let vel = totalVelocity(p.x, p.y);
                p.x += vel.ux;
                p.y += vel.uy;
                p.age++;

                // Inside cylinder → recycle
                let dx = p.x - cylX, dy = p.y - cylY;
                if (dx*dx + dy*dy < cylR*cylR || p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
                    p.x = random(-cylR*2, cylX - cylR - 4);
                    p.y = random(0, height);
                    p.age = 0;
                }

                // Color by speed
                let speed = sqrt(vel.ux*vel.ux + vel.uy*vel.uy);
                let h = map(speed, 0, U0*2.5, 230, 20);
                let s = map(speed, 0, U0*2.5, 50, 100);
                let b = map(speed, 0, U0*2.5, 60, 100);
                let alpha = min(90, p.age * 0.8);
                stroke(h, s, b, alpha);
                strokeWeight(1.4);
                point(p.x, p.y);
            }

            // Draw cylinder (solid)
            noStroke();
            // Shadow/wake
            for (let r = cylR + 12; r >= cylR; r -= 3) {
                fill(230, 40, 10, map(r, cylR, cylR+12, 0, 30));
                ellipse(cylX + (r - cylR)*0.5, cylY, r*2, r*2);
            }
            // Cylinder body
            fill(0, 0, 55);
            ellipse(cylX, cylY, cylR*2, cylR*2);
            // Highlight
            fill(0, 0, 80, 40);
            ellipse(cylX - cylR*0.3, cylY - cylR*0.3, cylR*0.7, cylR*0.7);
            stroke(0, 0, 70, 40);
            strokeWeight(1.5);
            noFill();
            ellipse(cylX, cylY, cylR*2, cylR*2);

            // Flow arrow indicator (far left)
            noFill();
            stroke(210, 40, 70, 40);
            strokeWeight(1);
            let arrowY = height * 0.5;
            for (let ay = height * 0.1; ay < height * 0.9; ay += 30) {
                drawArrow(20, ay, 55, ay, color(210, 30, 70, 25));
            }

            // FPS
            noStroke();
            fill(0, 0, 0, 60);
            rect(width - 80, 8, 72, 22, 4);
            fill(0, 0, 100, 80);
            textSize(13);
            textAlign(RIGHT, TOP);
            textFont('monospace');
            text(nf(frameRate(), 1, 1) + ' fps', width - 12, 13);

            fill(0, 0, 80, 50);
            textSize(11);
            textAlign(LEFT, BOTTOM);
            text('Kármán Vortex Street  |  ' + vortices.length + ' vortices active', 80, height - 12);
        }

        function drawArrow(x1, y1, x2, y2, col) {
            stroke(col);
            strokeWeight(1);
            line(x1, y1, x2, y2);
            let angle = atan2(y2-y1, x2-x1);
            let hs = 6;
            line(x2, y2, x2 - hs*cos(angle-0.4), y2 - hs*sin(angle-0.4));
            line(x2, y2, x2 - hs*cos(angle+0.4), y2 - hs*sin(angle+0.4));
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            cylX = width * 0.28;
            cylY = height * 0.5;
            cylR = min(width, height) * 0.07;
            vortices = [];
            spawnParticles();
        }
    </script>
</body>
</html>
