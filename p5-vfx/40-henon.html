<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hénon Map — Chaos/Attractors</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#666; font-family:monospace; font-size:12px; text-align:center; pointer-events:none; }
#controls { position:fixed; bottom:46px; left:50%; transform:translateX(-50%); display:flex; gap:16px; align-items:center; background:rgba(0,0,0,0.7); padding:8px 16px; border-radius:8px; z-index:999; }
#controls label { color:#888; font-family:monospace; font-size:12px; }
#controls input[type=range] { width:90px; accent-color:#888; }
#ptcount { position:fixed; top:44px; right:12px; color:#666; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="ptcount">Points: 0</div>
<div id="controls">
  <label>a: <span id="aVal">1.40</span> <input type="range" id="aSlider" min="0.5" max="1.8" step="0.01" value="1.4"></label>
  <label>b: <span id="bVal">0.30</span> <input type="range" id="bSlider" min="0.1" max="0.5" step="0.01" value="0.3"></label>
  <label style="color:#aaa; cursor:pointer;">Click canvas to zoom</label>
</div>
<div id="info">Hénon Map · x'=1-ax²+y · y'=bx · 1,000,000 pts · color=iteration · click to zoom</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let aParm = 1.4, bParm = 0.3;
  let pg; // pixel buffer
  let fpsEl, ptEl;
  let fpsTime = 0, fpsFrames = 0;

  // View: bounds in attractor coords
  let viewX = -1.6, viewY = -0.55, viewW = 3.2, viewH = 1.1;
  let zoomStack = [];
  let totalPts = 0;
  const BATCH = 5000;
  const MAX_PTS = 1000000;
  let tx = 0, ty = 0;
  let iterCount = 0;
  let needsReset = false;

  function hsbToRgb(h, s, v) {
    const i = Math.floor(h * 6);
    const f = h*6 - i, p2 = v*(1-s), q = v*(1-f*s), t = v*(1-(1-f)*s);
    let r, g, b;
    switch (i%6) {
      case 0: r=v;g=t;b=p2;break; case 1: r=q;g=v;b=p2;break;
      case 2: r=p2;g=v;b=t;break; case 3: r=p2;g=q;b=v;break;
      case 4: r=t;g=p2;b=v;break; case 5: r=v;g=p2;b=q;break;
    }
    return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
  }

  function resetMap() {
    pg.background(0, 0, 5);
    pg.loadPixels();
    tx = 0; ty = 0;
    iterCount = 0; totalPts = 0;
    needsReset = false;
  }

  function attToScreen(ax, ay) {
    const sx = Math.round(p.map(ax, viewX, viewX+viewW, 0, pg.width));
    const sy = Math.round(p.map(ay, viewY, viewY+viewH, pg.height, 0));
    return [sx, sy];
  }

  function iterateBatch() {
    if (totalPts >= MAX_PTS) return;
    const n = Math.min(BATCH, MAX_PTS - totalPts);
    for (let i = 0; i < n; i++) {
      const nx = 1 - aParm * tx * tx + ty;
      const ny = bParm * tx;
      tx = nx; ty = ny;

      // Check escape
      if (Math.abs(tx) > 10 || Math.abs(ty) > 10) {
        tx = Math.random() * 0.01; ty = Math.random() * 0.01;
        continue;
      }

      const [sx, sy] = attToScreen(tx, ty);
      if (sx < 0 || sx >= pg.width || sy < 0 || sy >= pg.height) continue;

      const pidx = (sy * pg.width + sx) * 4;
      const h = ((iterCount / MAX_PTS) * 360) % 360;
      const [r, g, b] = hsbToRgb(h/360, 0.9, 1.0);
      // Additive blending — accumulate brightness
      pg.pixels[pidx]   = Math.min(255, pg.pixels[pidx]   + 40);
      pg.pixels[pidx+1] = Math.min(255, pg.pixels[pidx+1] + Math.round(g * 0.15));
      pg.pixels[pidx+2] = Math.min(255, pg.pixels[pidx+2] + Math.round(b * 0.15));
      // Color channel from hue
      if (h < 120) {
        pg.pixels[pidx]   = Math.min(255, pg.pixels[pidx]   + 15);
      } else if (h < 240) {
        pg.pixels[pidx+1] = Math.min(255, pg.pixels[pidx+1] + 15);
      } else {
        pg.pixels[pidx+2] = Math.min(255, pg.pixels[pidx+2] + 15);
      }
      pg.pixels[pidx+3] = 255;
      totalPts++;
      iterCount++;
    }
    pg.updatePixels();
  }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    ptEl = document.getElementById('ptcount');
    pg = p.createGraphics(p.width, p.height);
    pg.colorMode(p.HSB, 360, 100, 100, 100);
    pg.background(0, 0, 5);
    pg.loadPixels();

    // Sliders
    document.getElementById('aSlider').addEventListener('input', function() {
      aParm = parseFloat(this.value);
      document.getElementById('aVal').textContent = aParm.toFixed(2);
      needsReset = true;
    });
    document.getElementById('bSlider').addEventListener('input', function() {
      bParm = parseFloat(this.value);
      document.getElementById('bVal').textContent = bParm.toFixed(2);
      needsReset = true;
    });
  };

  p.draw = function() {
    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(fpsFrames * 1000 / (now - fpsTime));
      fpsFrames = 0; fpsTime = now;
    }

    if (needsReset) resetMap();
    iterateBatch();
    ptEl.textContent = 'Points: ' + (totalPts / 1000).toFixed(0) + 'k / 1000k';

    p.image(pg, 0, 0);

    // Axis labels
    p.noStroke();
    p.fill(0, 0, 50, 70);
    p.textFont('monospace');
    p.textSize(10);
    p.textAlign(p.LEFT);
    p.text('x: ' + viewX.toFixed(2) + ' → ' + (viewX+viewW).toFixed(2), 10, p.height - 28);
    p.text('y: ' + viewY.toFixed(2) + ' → ' + (viewY+viewH).toFixed(2), 10, p.height - 14);
    if (zoomStack.length > 0) {
      p.fill(60, 80, 90, 80);
      p.text('[Click anywhere to zoom out]', 10, p.height - 42);
    }
  };

  p.mousePressed = function() {
    if (p.mouseY > p.height - 80) return; // avoid controls area

    const ax = p.map(p.mouseX, 0, p.width, viewX, viewX + viewW);
    const ay = p.map(p.mouseY, 0, p.height, viewY + viewH, viewY);

    if (zoomStack.length >= 4) {
      // Zoom back out to default
      viewX = -1.6; viewY = -0.55; viewW = 3.2; viewH = 1.1;
      zoomStack = [];
    } else {
      // Zoom in 3x centered on click
      zoomStack.push({ viewX, viewY, viewW, viewH });
      viewW /= 3; viewH /= 3;
      viewX = ax - viewW / 2;
      viewY = ay - viewH / 2;
    }
    needsReset = true;
  };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    pg = p.createGraphics(p.width, p.height);
    pg.colorMode(p.HSB, 360, 100, 100, 100);
    pg.background(0, 0, 5);
    pg.loadPixels();
    tx = 0; ty = 0; iterCount = 0; totalPts = 0;
  };
});
</script>
</body>
</html>
