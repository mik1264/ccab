<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendulum Wave | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

const sketch = (p) => {
    const N = 15;
    const CYCLE_DURATION = 60; // seconds
    const g = 9.81;
    const BASE_OSCILLATIONS = 51;
    const TRAIL_LEN = 80;

    let pendulums = [];
    let t = 0;
    let fpsVal = 0;
    let pivotY, pivotXStart, pivotXEnd, spacing;
    let trails = [];

    p.setup = () => {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.colorMode(p.HSB, 360, 100, 100, 100);
        p.frameRate(60);
        init();
    };

    function init() {
        t = 0;
        pendulums = [];
        trails = [];
        pivotY = p.height * 0.08;
        spacing = p.width / (N + 1);
        pivotXStart = spacing;

        for (let i = 0; i < N; i++) {
            const osc = BASE_OSCILLATIONS + i; // oscillations in CYCLE_DURATION seconds
            const period = CYCLE_DURATION / osc;
            const L = g * (period / (2 * Math.PI)) ** 2;
            const hue = p.map(i, 0, N - 1, 0, 270);
            pendulums.push({ L, osc, period, hue, x: 0, y: 0 });
            trails.push([]);
        }
    }

    p.draw = () => {
        // Fading background for trail effect
        p.background(240, 10, 4, 100);

        t += 1 / 60;
        const elapsed = t % CYCLE_DURATION;

        // Draw rod
        const rodY = pivotY - 6;
        for (let pass = 0; pass < 2; pass++) {
            p.stroke(0, 0, pass === 0 ? 50 : 75, pass === 0 ? 60 : 90);
            p.strokeWeight(pass === 0 ? 6 : 2);
            p.line(pivotXStart - spacing * 0.5, rodY, pivotXStart + spacing * (N - 0.5), rodY);
        }

        // Compute positions
        const maxL = g * ((CYCLE_DURATION / BASE_OSCILLATIONS) / (2 * Math.PI)) ** 2;
        const pixScale = (p.height * 0.78) / maxL;

        for (let i = 0; i < N; i++) {
            const pend = pendulums[i];
            const px = pivotXStart + i * spacing;
            const angle = Math.PI / 4.5 * Math.cos(2 * Math.PI * elapsed / pend.period);
            const bobX = px + Math.sin(angle) * pend.L * pixScale;
            const bobY = pivotY + Math.cos(angle) * pend.L * pixScale;
            pend.x = bobX; pend.y = bobY;

            // Update trail
            trails[i].push({ x: bobX, y: bobY });
            if (trails[i].length > TRAIL_LEN) trails[i].shift();
        }

        // Draw trails
        p.noFill();
        for (let i = 0; i < N; i++) {
            const tr = trails[i];
            const hue = pendulums[i].hue;
            if (tr.length < 2) continue;
            for (let j = 1; j < tr.length; j++) {
                const alpha = p.map(j, 0, tr.length - 1, 0, 55);
                const sw = p.map(j, 0, tr.length - 1, 0.5, 2.5);
                p.stroke(hue, 90, 95, alpha);
                p.strokeWeight(sw);
                p.line(tr[j-1].x, tr[j-1].y, tr[j].x, tr[j].y);
            }
        }

        // Draw strings and bobs
        for (let i = 0; i < N; i++) {
            const pend = pendulums[i];
            const px = pivotXStart + i * spacing;
            const hue = pend.hue;

            // String
            p.stroke(hue, 15, 60, 70);
            p.strokeWeight(1);
            p.line(px, pivotY, pend.x, pend.y);

            // Bob glow layers
            p.noStroke();
            const glowSizes = [28, 18, 12, 7];
            const glowAlphas = [8, 18, 35, 70];
            for (let g = 0; g < glowSizes.length; g++) {
                p.fill(hue, 90, 100, glowAlphas[g]);
                p.ellipse(pend.x, pend.y, glowSizes[g], glowSizes[g]);
            }

            // Bob core
            p.fill(hue, 60, 100, 100);
            p.ellipse(pend.x, pend.y, 8, 8);

            // Specular
            p.fill(hue, 10, 100, 85);
            p.ellipse(pend.x - 1.5, pend.y - 1.5, 3, 3);

            // Pivot pin
            p.fill(0, 0, 80, 80);
            p.ellipse(px, pivotY, 5, 5);
        }

        // Cycle progress indicator
        const cycleProgress = elapsed / CYCLE_DURATION;
        const barW = 180;
        const barH = 4;
        const bx = p.width / 2 - barW / 2;
        const by = p.height - 28;
        p.noStroke();
        p.fill(0, 0, 20, 80);
        p.rect(bx, by, barW, barH, 2);
        p.fill(60, 80, 100, 90);
        p.rect(bx, by, barW * cycleProgress, barH, 2);
        p.fill(0, 0, 65, 70);
        p.textFont('monospace');
        p.textSize(11);
        p.textAlign(p.CENTER, p.BOTTOM);
        p.text('cycle ' + Math.floor(t / CYCLE_DURATION + 1) + '  |  ' + Math.floor(elapsed) + 's / ' + CYCLE_DURATION + 's', p.width / 2, by - 4);

        // FPS
        fpsVal = p.lerp(fpsVal, p.frameRate(), 0.05);
        p.fill(0, 0, 85, 90);
        p.noStroke();
        p.textFont('monospace');
        p.textSize(12);
        p.textAlign(p.RIGHT, p.TOP);
        p.text(Math.round(fpsVal) + ' fps', p.width - 14, 14);
    };

    p.mousePressed = () => {
        init();
    };

    p.windowResized = () => {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        init();
    };
};

new p5(sketch);
    </script>
</body>
</html>
