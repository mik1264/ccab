<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Resonance | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #030308; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        // Laplace resonance 1:2:4 (Io, Europa, Ganymede)
        // Orbital periods in arbitrary units; radii from Kepler's third law (T² ∝ r³)
        const SPEED_MULT = 100;
        let t = 0;
        let relativeMode = false; // click to toggle

        // Moon data: name, period, color (H,S,B), trail length
        const moons = [
            { name: 'Io',       period: 1.0, color: [30,  95, 100], trail: [], trailLen: 300 },
            { name: 'Europa',   period: 2.0, color: [195, 80,  95], trail: [], trailLen: 200 },
            { name: 'Ganymede', period: 4.0, color: [90,  60,  70], trail: [], trailLen: 120 }
        ];

        // Orbital radii: r ∝ T^(2/3)
        const baseR = 80;
        moons.forEach(m => { m.r = baseR * pow(m.period, 2/3); });

        let cx, cy;
        let relTrail = [];  // trail of moon0 relative to moon1
        let bgGraphics;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
            pixelDensity(1);
            cx = width / 2;
            cy = height / 2;
            buildBgGraphics();
        }

        function buildBgGraphics() {
            // Pre-render starfield
            bgGraphics = createGraphics(width, height);
            bgGraphics.colorMode(HSB, 360, 100, 100, 100);
            bgGraphics.background(240, 30, 3);
            bgGraphics.noStroke();
            for (let i = 0; i < 800; i++) {
                let x = random(width), y = random(height);
                let sz = random(0.5, 2.5);
                let br = random(30, 90);
                bgGraphics.fill(220, 10, br, random(40, 90));
                bgGraphics.ellipse(x, y, sz);
            }
        }

        function getMoonPos(moon, time) {
            let angle = (TWO_PI / moon.period) * time;
            return createVector(cx + moon.r * cos(angle), cy + moon.r * sin(angle));
        }

        function draw() {
            let dt = SPEED_MULT * deltaTime / 1000.0;
            t += dt;

            // Update trails
            if (!relativeMode) {
                moons.forEach(m => {
                    let pos = getMoonPos(m, t);
                    m.trail.push({ x: pos.x, y: pos.y });
                    if (m.trail.length > m.trailLen) m.trail.shift();
                });
            } else {
                // Trail of moon0 relative to moon1 (spirograph)
                let p0 = getMoonPos(moons[0], t);
                let p1 = getMoonPos(moons[1], t);
                let rx = p0.x - p1.x + cx;
                let ry = p0.y - p1.y + cy;
                relTrail.push({ x: rx, y: ry });
                if (relTrail.length > 3000) relTrail.shift();
            }

            // Draw
            image(bgGraphics, 0, 0);

            if (!relativeMode) {
                drawAbsoluteMode();
            } else {
                drawRelativeMode();
            }

            // FPS
            noStroke();
            fill(0, 0, 0, 60);
            rect(width - 80, 8, 72, 22, 4);
            fill(0, 0, 100, 80);
            textSize(13);
            textAlign(RIGHT, TOP);
            textFont('monospace');
            text(nf(frameRate(), 1, 1) + ' fps', width - 12, 13);

            // Mode label
            fill(0, 0, 80, 70);
            textSize(11);
            textAlign(CENTER, BOTTOM);
            text('click to toggle: ' + (relativeMode ? 'RELATIVE view (Io / Europa spirograph)' : 'ABSOLUTE view — Laplace 1:2:4 resonance'), width/2, height - 12);
        }

        function drawAbsoluteMode() {
            push();
            // Orbit circles
            noFill();
            moons.forEach(m => {
                stroke(m.color[0], m.color[1], m.color[2], 15);
                strokeWeight(1);
                ellipse(cx, cy, m.r * 2, m.r * 2);
            });

            // Trails
            moons.forEach(m => {
                let n = m.trail.length;
                for (let i = 1; i < n; i++) {
                    let alpha = map(i, 0, n, 2, 55);
                    stroke(m.color[0], m.color[1], m.color[2], alpha);
                    strokeWeight(1.5);
                    line(m.trail[i-1].x, m.trail[i-1].y, m.trail[i].x, m.trail[i].y);
                }
            });

            // Conjunction lines (when moons close in angle)
            let angles = moons.map(m => (TWO_PI / m.period) * t);
            for (let a = 0; a < moons.length; a++) {
                for (let b = a+1; b < moons.length; b++) {
                    let diff = abs(angles[a] - angles[b]) % TWO_PI;
                    if (diff > PI) diff = TWO_PI - diff;
                    if (diff < 0.15) {
                        let pa = getMoonPos(moons[a], t);
                        let pb = getMoonPos(moons[b], t);
                        let alpha = map(diff, 0, 0.15, 80, 0);
                        stroke(55, 100, 100, alpha);
                        strokeWeight(1);
                        line(pa.x, pa.y, pb.x, pb.y);
                    }
                }
            }

            // Jupiter (central body)
            noStroke();
            for (let r = 28; r >= 4; r -= 4) {
                fill(35, map(r,4,28,30,80), map(r,4,28,100,60), map(r,4,28,100,0));
                ellipse(cx, cy, r*2);
            }
            // Belt bands
            stroke(35, 60, 90, 30);
            strokeWeight(2);
            noFill();
            ellipse(cx, cy, 44, 14);

            // Moons
            moons.forEach(m => {
                let pos = getMoonPos(m, t);
                noStroke();
                // Glow
                for (let r = 10; r >= 3; r -= 2) {
                    fill(m.color[0], m.color[1], m.color[2], map(r, 3, 10, 50, 5));
                    ellipse(pos.x, pos.y, r*2);
                }
                fill(m.color[0], m.color[1], m.color[2], 100);
                ellipse(pos.x, pos.y, 7);

                // Name label
                fill(m.color[0], m.color[1], m.color[2], 60);
                textSize(10);
                textAlign(CENTER, BOTTOM);
                noStroke();
                text(m.name, pos.x, pos.y - 8);
            });

            pop();
        }

        function drawRelativeMode() {
            push();

            // Draw spirograph trail: Io relative to Europa
            let n = relTrail.length;
            if (n > 1) {
                noFill();
                for (let i = 1; i < n; i++) {
                    let alpha = map(i, 0, n, 0, 70);
                    let h = map(i, 0, n, 280, 60);
                    stroke(h, 90, 100, alpha);
                    strokeWeight(1.2);
                    line(relTrail[i-1].x, relTrail[i-1].y, relTrail[i].x, relTrail[i].y);
                }
            }

            // Reference point (Europa at center)
            noStroke();
            fill(0, 0, 80, 50);
            textSize(12);
            textAlign(CENTER, CENTER);
            text('Europa (reference)', cx, cy + 20);

            // Center dot
            fill(195, 80, 95, 80);
            ellipse(cx, cy, 8);

            // Current Io pos relative
            if (relTrail.length > 0) {
                let last = relTrail[relTrail.length-1];
                fill(moons[0].color[0], moons[0].color[1], moons[0].color[2]);
                ellipse(last.x, last.y, 10);
            }

            pop();

            // Label
            fill(0, 0, 80, 60);
            textSize(13);
            textAlign(CENTER, TOP);
            noStroke();
            text('Io relative to Europa — Laplace resonance spirograph', width/2, 16);
        }

        function mousePressed() {
            relativeMode = !relativeMode;
            relTrail = [];
            moons.forEach(m => m.trail = []);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            cx = width / 2;
            cy = height / 2;
            buildBgGraphics();
        }
    </script>
</body>
</html>
