<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electromagnetic Plasma — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#hint { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#555; font-family:monospace; font-size:12px; pointer-events:none; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<div id="hint">Click to toggle charge sign — drag to move sources</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const NUM_PARTICLES = 200;
const NUM_SOURCES = 3;
const ARROW_STEP = 50;
const FORCE_SCALE = 8000;
const MAX_SPEED = 5;
const FIELD_LINE_STEPS = 60;
const FIELD_LINE_STEP_SIZE = 8;

let sources = [];
let particles = [];
let t = 0;
let fpsEl, fpsTimer = 0, fpsFrames = 0;
let dragging = -1;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(min(pixelDensity(), 2));
  background(0, 0, 8);
  fpsEl = document.getElementById('fps');

  // Initialize 3 sources
  let signs = [1, -1, 1];
  for (let i = 0; i < NUM_SOURCES; i++) {
    sources.push({
      x: width * (0.25 + i * 0.25),
      y: height * 0.5 + sin(i * 2) * height * 0.15,
      q: signs[i],  // charge sign
      strength: 1.0 + random(0.3)
    });
  }

  // Initialize particles
  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push({
      x: random(width),
      y: random(height),
      vx: random(-1, 1),
      vy: random(-1, 1),
      q: random() < 0.5 ? 1 : -1, // particle charge
      mass: random(0.5, 2.0)
    });
  }
}

function electricField(x, y) {
  let fx = 0, fy = 0;
  for (let s of sources) {
    let dx = x - s.x;
    let dy = y - s.y;
    let d2 = dx * dx + dy * dy + 100;
    let d = sqrt(d2);
    let mag = FORCE_SCALE * s.q * s.strength / d2;
    fx += mag * dx / d;
    fy += mag * dy / d;
  }
  return { x: fx, y: fy };
}

function drawFieldLines() {
  for (let si = 0; si < sources.length; si++) {
    let s = sources[si];
    if (s.q <= 0) continue; // only draw from positive charges

    let numLines = 16;
    for (let li = 0; li < numLines; li++) {
      let startAngle = (li / numLines) * TWO_PI;
      let px = s.x + cos(startAngle) * 15;
      let py = s.y + sin(startAngle) * 15;

      noFill();
      beginShape();
      for (let step = 0; step < FIELD_LINE_STEPS; step++) {
        let f = electricField(px, py);
        let fmag = sqrt(f.x * f.x + f.y * f.y);
        if (fmag < 0.001) break;

        let alpha = map(step, 0, FIELD_LINE_STEPS, 45, 0);
        let hue = map(step, 0, FIELD_LINE_STEPS, 60, 200);
        stroke(hue, 70, 100, alpha);
        strokeWeight(0.8);
        vertex(px, py);

        px += (f.x / fmag) * FIELD_LINE_STEP_SIZE;
        py += (f.y / fmag) * FIELD_LINE_STEP_SIZE;
        if (px < 0 || px > width || py < 0 || py > height) break;

        // Stop near negative charges
        let nearNeg = false;
        for (let s2 of sources) {
          if (s2.q < 0 && dist(px, py, s2.x, s2.y) < 20) { nearNeg = true; break; }
        }
        if (nearNeg) break;
      }
      endShape();
    }
  }
}

function drawArrows() {
  for (let y = ARROW_STEP; y < height; y += ARROW_STEP) {
    for (let x = ARROW_STEP; x < width; x += ARROW_STEP) {
      let f = electricField(x, y);
      let fmag = sqrt(f.x * f.x + f.y * f.y);
      if (fmag < 0.1) continue;
      let len = constrain(log(fmag + 1) * 2.5, 2, 18);
      let nx = f.x / fmag, ny = f.y / fmag;
      let ex = x + nx * len, ey = y + ny * len;

      let hue = map(log(fmag + 1), 0, 5, 200, 60);
      stroke(hue, 60, 80, 35);
      strokeWeight(0.7);
      line(x, y, ex, ey);
      // Arrowhead
      let ang = atan2(ny, nx);
      let asize = min(len * 0.4, 5);
      line(ex, ey, ex - asize * cos(ang - 0.5), ey - asize * sin(ang - 0.5));
      line(ex, ey, ex - asize * cos(ang + 0.5), ey - asize * sin(ang + 0.5));
    }
  }
}

function draw() {
  fpsFrames++;
  let now = millis();
  if (now - fpsTimer > 500) {
    fpsEl.textContent = round(fpsFrames / ((now - fpsTimer) / 1000)) + ' fps';
    fpsFrames = 0; fpsTimer = now;
  }

  background(0, 0, 8, 20);
  blendMode(ADD);

  // Draw field lines
  drawFieldLines();

  // Draw arrows
  drawArrows();

  // Update and draw particles
  noStroke();
  for (let p of particles) {
    let f = electricField(p.x, p.y);
    // Force on particle: F = q * E
    let ax = p.q * f.x / (p.mass * 100);
    let ay = p.q * f.y / (p.mass * 100);

    p.vx += ax;
    p.vy += ay;

    // Speed limit
    let spd = sqrt(p.vx * p.vx + p.vy * p.vy);
    if (spd > MAX_SPEED) { p.vx *= MAX_SPEED / spd; p.vy *= MAX_SPEED / spd; }

    p.x += p.vx;
    p.y += p.vy;

    // Bounce off walls
    if (p.x < 5 || p.x > width - 5) { p.vx *= -0.85; p.x = constrain(p.x, 5, width - 5); }
    if (p.y < 5 || p.y > height - 5) { p.vy *= -0.85; p.y = constrain(p.y, 5, height - 5); }

    // Color by kinetic energy (speed)
    let energy = sqrt(p.vx * p.vx + p.vy * p.vy);
    let h = map(energy, 0, MAX_SPEED, 220, 0); // blue slow → red fast
    let alpha = map(energy, 0, MAX_SPEED, 40, 90);
    let size = map(p.mass, 0.5, 2.0, 3, 6);

    // Glow
    fill(h, 80, 100, alpha * 0.3);
    ellipse(p.x, p.y, size * 3, size * 3);
    fill(h, 70, 100, alpha);
    ellipse(p.x, p.y, size, size);
  }

  // Draw source charges
  blendMode(ADD);
  for (let s of sources) {
    // Glow ring
    let h = s.q > 0 ? 55 : 220;
    for (let g = 6; g >= 0; g--) {
      let gr = g * 10;
      fill(h, 80, 100, 8 - g);
      ellipse(s.x, s.y, gr * 2, gr * 2);
    }
    fill(h, 50, 100, 90);
    ellipse(s.x, s.y, 22, 22);
    fill(h, 20, 100, 100);
    ellipse(s.x, s.y, 8, 8);
  }

  blendMode(BLEND);

  // Labels
  textSize(13);
  textAlign(CENTER, CENTER);
  noStroke();
  for (let s of sources) {
    fill(0, 0, 100, 80);
    text(s.q > 0 ? '+' : '−', s.x, s.y);
  }

  t++;
}

function mousePressed() {
  // Check if clicking near a source
  for (let i = 0; i < sources.length; i++) {
    if (dist(mouseX, mouseY, sources[i].x, sources[i].y) < 30) {
      dragging = i;
      return;
    }
  }
  // Toggle charge sign of nearest
  let minD = Infinity, minI = 0;
  for (let i = 0; i < sources.length; i++) {
    let d = dist(mouseX, mouseY, sources[i].x, sources[i].y);
    if (d < minD) { minD = d; minI = i; }
  }
  sources[minI].q *= -1;
}

function mouseDragged() {
  if (dragging >= 0) {
    sources[dragging].x = mouseX;
    sources[dragging].y = mouseY;
  }
}

function mouseReleased() {
  dragging = -1;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(0, 0, 8);
}
</script>
</body></html>
