<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burning Ship Fractal</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#fa0; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#fa6; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:6px; line-height:1.7; z-index:999; pointer-events:none; }
#title { position:fixed; top:12px; left:50%; transform:translateX(-50%); color:#f84; font-family:monospace; font-size:15px; font-weight:bold; background:rgba(0,0,0,0.6); padding:6px 16px; border-radius:6px; z-index:999; pointer-events:none; letter-spacing:2px; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="title">BURNING SHIP</div>
<div id="info">Click to zoom | Scroll to zoom | Right-click to zoom out</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  // Default view: show the ship and antenna
  let cx = -0.45, cy = -0.55, zoom = 2.8;
  let maxIter = 200;
  let needsRender = true;
  let fpsArr = [], lastTime = 0;
  let tileSize = 56;
  let tiles = [], tileIndex = 0, rendering = false;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.pixelDensity(1);
    buildTiles();
  };

  function buildTiles() {
    tiles = [];
    let cols = Math.ceil(p.width / tileSize);
    let rows = Math.ceil(p.height / tileSize);
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        tiles.push({ x: c * tileSize, y: r * tileSize });
    // shuffle
    for (let i = tiles.length - 1; i > 0; i--) {
      let j = Math.floor(Math.random() * (i + 1));
      [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }
    tileIndex = 0;
    rendering = false;
  }

  // Inferno palette: black -> dark red -> orange -> yellow -> white
  function inferno(t) {
    // t in [0,1]
    t = Math.max(0, Math.min(1, t));
    // piecewise linear inferno approximation
    const stops = [
      [0,   0,   4,   68],
      [0.1, 40,  11,  84],
      [0.2, 101, 21,  110],
      [0.3, 159, 42,  99],
      [0.4, 212, 72,  66],
      [0.5, 245, 110, 25],
      [0.6, 253, 155, 0],
      [0.7, 253, 199, 0],
      [0.8, 252, 237, 61],
      [0.9, 252, 255, 164],
      [1.0, 252, 255, 255],
    ];
    for (let i = 0; i < stops.length - 1; i++) {
      if (t <= stops[i+1][0]) {
        let f = (t - stops[i][0]) / (stops[i+1][0] - stops[i][0]);
        return [
          stops[i][1] + (stops[i+1][1] - stops[i][1]) * f,
          stops[i][2] + (stops[i+1][2] - stops[i][2]) * f,
          stops[i][3] + (stops[i+1][3] - stops[i][3]) * f,
        ];
      }
    }
    return [252, 255, 255];
  }

  function burningShip(cr, ci, maxIt) {
    let zr = 0, zi = 0;
    for (let i = 0; i < maxIt; i++) {
      let zr2 = zr * zr, zi2 = zi * zi;
      if (zr2 + zi2 > 4) {
        let smooth = i + 1 - Math.log(Math.log(Math.sqrt(zr2 + zi2))) / Math.log(2);
        return smooth;
      }
      // Key: take absolute value before squaring
      let nzr = zr2 - zi2 + cr;
      zi = Math.abs(2 * zr * zi) + ci;
      zr = Math.abs(nzr);
    }
    return -1;
  }

  function renderTile(tile) {
    let pw = p.width, ph = p.height;
    let x0 = tile.x, y0 = tile.y;
    let x1 = Math.min(x0 + tileSize, pw);
    let y1 = Math.min(y0 + tileSize, ph);

    for (let py = y0; py < y1; py++) {
      for (let px = x0; px < x1; px++) {
        let cr = cx + (px - pw / 2) * zoom / pw;
        let ci = cy + (py - ph / 2) * zoom / pw;
        let s = burningShip(cr, ci, maxIter);
        let idx = 4 * (py * pw + px);
        if (s < 0) {
          p.pixels[idx] = 2; p.pixels[idx+1] = 0; p.pixels[idx+2] = 10; p.pixels[idx+3] = 255;
        } else {
          let t = Math.min(1, s / 60);
          let [r, g, b] = inferno(t);
          p.pixels[idx] = r; p.pixels[idx+1] = g; p.pixels[idx+2] = b; p.pixels[idx+3] = 255;
        }
      }
    }
  }

  p.draw = function() {
    let now = performance.now();
    let dt = now - lastTime; lastTime = now;
    if (dt > 0) {
      fpsArr.push(1000 / dt);
      if (fpsArr.length > 30) fpsArr.shift();
      document.getElementById('fps').textContent = 'FPS: ' + (fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length).toFixed(1);
    }

    if (needsRender) {
      needsRender = false;
      buildTiles();
      rendering = true;
      p.loadPixels();
    }

    if (rendering) {
      for (let t = 0; t < 5 && tileIndex < tiles.length; t++, tileIndex++) {
        renderTile(tiles[tileIndex]);
      }
      p.updatePixels();
      if (tileIndex >= tiles.length) {
        rendering = false;
        updateInfo();
      }
    }
  };

  function updateInfo() {
    document.getElementById('info').innerHTML =
      'Center: (' + cx.toFixed(8) + ', ' + cy.toFixed(8) + 'i)<br>' +
      'Zoom: 1/' + zoom.toFixed(6) + '<br>' +
      'Max iter: ' + maxIter + '<br>' +
      'Click: zoom in | Right-click: zoom out | Scroll: zoom';
  }

  p.mouseClicked = function() {
    let mx = p.mouseX, my = p.mouseY;
    let worldX = cx + (mx - p.width / 2) * zoom / p.width;
    let worldY = cy + (my - p.height / 2) * zoom / p.width;
    cx = worldX; cy = worldY;
    zoom *= 0.4;
    maxIter = Math.min(800, Math.floor(200 + 50 * Math.log(3.5 / zoom)));
    needsRender = true;
    return false;
  };

  p.contextMenued = function() { return false; };

  p.mouseWheel = function(e) {
    let factor = e.delta > 0 ? 1.2 : 0.83;
    let mx = p.mouseX, my = p.mouseY;
    let worldX = cx + (mx - p.width / 2) * zoom / p.width;
    let worldY = cy + (my - p.height / 2) * zoom / p.width;
    zoom *= factor;
    cx = worldX - (mx - p.width / 2) * zoom / p.width;
    cy = worldY - (my - p.height / 2) * zoom / p.width;
    maxIter = Math.min(800, Math.floor(200 + 50 * Math.log(Math.max(1, 3.5 / zoom))));
    needsRender = true;
    return false;
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    needsRender = true;
  };

  updateInfo();
});
</script>
</body>
</html>
