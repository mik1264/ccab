<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Sorting Glitch Art — p5 VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; font-family:monospace; font-size:13px; color:#0f0; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; font-family:monospace; font-size:12px; color:#888; background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Pixel sorting glitch — threshold animates over time</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let t = 0;
  let fpsEl = document.getElementById('fps');
  let frameAcc = 0, fpsTimer = 0, lastFps = 0;
  // We render at half resolution for performance, then display scaled
  const SCALE = 2;
  let W, H;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    W = Math.ceil(p.width / SCALE);
    H = Math.ceil(p.height / SCALE);
  };

  // Build Perlin noise image buffer
  function buildNoiseImage() {
    // Returns flat Uint8 array [R,G,B,A, R,G,B,A, ...]
    let buf = new Uint8Array(W * H * 4);
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        let nx = x / W, ny = y / H;
        // Multi-octave noise
        let v = p.noise(nx * 3.0 + t * 0.3, ny * 3.0 + t * 0.2)
              + 0.5 * p.noise(nx * 6.0 + 50 + t * 0.5, ny * 6.0 + 50 + t * 0.4)
              + 0.25 * p.noise(nx * 12.0 + 100 + t * 0.8, ny * 12.0 + 100 + t * 0.7);
        v /= 1.75;

        // HSB to RGB inline
        let hue = (v * 280.0 + t * 30.0 + x * 0.15) % 360;
        let sat = 80 + 20 * v;
        let bri = 30 + 65 * v;
        let h = hue / 60.0, s = sat / 100.0, b = bri / 100.0;
        let hi = Math.floor(h) % 6, f = h - Math.floor(h);
        let pv=b*(1-s), qv=b*(1-s*f), tv=b*(1-s*(1-f));
        let r,g,bl;
        if(hi===0){r=b;g=tv;bl=pv;}
        else if(hi===1){r=qv;g=b;bl=pv;}
        else if(hi===2){r=pv;g=b;bl=tv;}
        else if(hi===3){r=pv;g=qv;bl=b;}
        else if(hi===4){r=tv;g=pv;bl=b;}
        else{r=b;g=pv;bl=qv;}

        let idx = 4 * (y * W + x);
        buf[idx]   = r * 255;
        buf[idx+1] = g * 255;
        buf[idx+2] = bl * 255;
        buf[idx+3] = 255;
      }
    }
    return buf;
  }

  // Pixel sort column segment in-place
  function sortColumns(buf, threshold) {
    for (let x = 0; x < W; x++) {
      let segStart = -1;
      for (let y = 0; y <= H; y++) {
        let bri = 0;
        if (y < H) {
          let idx = 4 * (y * W + x);
          bri = (buf[idx] + buf[idx+1] + buf[idx+2]) / 765.0; // 0..1
        }
        if (y < H && bri > threshold) {
          if (segStart < 0) segStart = y;
        } else {
          if (segStart >= 0 && y - segStart > 1) {
            // Sort pixels in [segStart, y) by brightness
            let seg = [];
            for (let sy = segStart; sy < y; sy++) {
              let idx = 4 * (sy * W + x);
              seg.push({
                r: buf[idx], g: buf[idx+1], b: buf[idx+2], a: buf[idx+3],
                lum: buf[idx] + buf[idx+1] + buf[idx+2]
              });
            }
            seg.sort((a, b2) => a.lum - b2.lum);
            for (let k = 0; k < seg.length; k++) {
              let sy = segStart + k;
              let idx = 4 * (sy * W + x);
              buf[idx]   = seg[k].r;
              buf[idx+1] = seg[k].g;
              buf[idx+2] = seg[k].b;
            }
          }
          segStart = -1;
        }
      }
    }
  }

  // Pixel sort rows
  function sortRows(buf, threshold) {
    for (let y = 0; y < H; y++) {
      let segStart = -1;
      for (let x = 0; x <= W; x++) {
        let bri = 0;
        if (x < W) {
          let idx = 4 * (y * W + x);
          bri = (buf[idx] + buf[idx+1] + buf[idx+2]) / 765.0;
        }
        if (x < W && bri > threshold) {
          if (segStart < 0) segStart = x;
        } else {
          if (segStart >= 0 && x - segStart > 1) {
            let seg = [];
            for (let sx = segStart; sx < x; sx++) {
              let idx = 4 * (y * W + sx);
              seg.push({r:buf[idx],g:buf[idx+1],b:buf[idx+2],lum:buf[idx]+buf[idx+1]+buf[idx+2]});
            }
            seg.sort((a,b2)=>a.lum-b2.lum);
            for (let k = 0; k < seg.length; k++) {
              let sx = segStart + k;
              let idx = 4 * (y * W + sx);
              buf[idx]   = seg[k].r;
              buf[idx+1] = seg[k].g;
              buf[idx+2] = seg[k].b;
            }
          }
          segStart = -1;
        }
      }
    }
  }

  p.draw = function() {
    // Threshold oscillates
    let threshold = 0.3 + 0.28 * Math.sin(t * 0.4) + 0.1 * Math.sin(t * 1.1);

    let buf = buildNoiseImage();
    // Alternate between column sort and row+column sort
    sortColumns(buf, threshold);
    if (Math.sin(t * 0.15) > 0) sortRows(buf, threshold + 0.1);

    // Write to canvas pixels (scaled up)
    p.loadPixels();
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        let si = 4 * (y * W + x);
        let r = buf[si], g = buf[si+1], b = buf[si+2];
        for (let dy = 0; dy < SCALE; dy++) {
          for (let dx = 0; dx < SCALE; dx++) {
            let px = x * SCALE + dx, py = y * SCALE + dy;
            if (px >= p.width || py >= p.height) continue;
            let di = 4 * (py * p.width + px);
            p.pixels[di]   = r;
            p.pixels[di+1] = g;
            p.pixels[di+2] = b;
            p.pixels[di+3] = 255;
          }
        }
      }
    }
    p.updatePixels();

    t += 0.018;

    // FPS
    frameAcc++;
    fpsTimer += p.deltaTime;
    if (fpsTimer >= 500) {
      lastFps = Math.round(frameAcc * 1000 / fpsTimer);
      frameAcc = 0; fpsTimer = 0;
      fpsEl.textContent = lastFps + ' fps';
      fpsEl.style.color = lastFps >= 50 ? '#0f0' : lastFps >= 30 ? '#ff0' : '#f44';
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    W = Math.ceil(p.width / SCALE);
    H = Math.ceil(p.height / SCALE);
  };
});
</script>
</body>
</html>
