<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-Body Gravity</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#0f0; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const sketch = (p) => {
  const TRAIL_LEN = 200;
  const G = 0.5;
  let bodies = [];
  let fpsEl;
  let lastFps = 0, frameCount2 = 0, fpsTimer = 0;

  class Body {
    constructor(x, y, mass, hue, vx, vy) {
      this.pos = p.createVector(x, y);
      this.vel = p.createVector(vx || 0, vy || 0);
      this.acc = p.createVector(0, 0);
      this.mass = mass;
      this.r = p.sqrt(mass) * 2.5;
      this.hue = hue;
      this.trail = [];
      this.merged = false;
    }

    addForce(other) {
      let d = p.dist(this.pos.x, this.pos.y, other.pos.x, other.pos.y);
      d = p.max(d, this.r + other.r);
      let F = (G * this.mass * other.mass) / (d * d);
      let dir = p5.Vector.sub(other.pos, this.pos).normalize();
      dir.mult(F / this.mass);
      this.acc.add(dir);
    }

    update() {
      this.vel.add(this.acc);
      this.vel.limit(8);
      this.pos.add(this.vel);
      this.acc.set(0, 0);
      this.trail.push(this.pos.copy());
      if (this.trail.length > TRAIL_LEN) this.trail.shift();
    }

    draw() {
      // Draw trail
      p.noFill();
      for (let i = 1; i < this.trail.length; i++) {
        let a = p.map(i, 0, this.trail.length, 0, 80);
        p.strokeWeight(p.map(i, 0, this.trail.length, 0.3, 1.5));
        p.stroke(this.hue, 80, 100, a);
        p.line(this.trail[i-1].x, this.trail[i-1].y, this.trail[i].x, this.trail[i].y);
      }
      // Draw body
      p.noStroke();
      // Outer glow
      p.fill(this.hue, 60, 100, 20);
      p.circle(this.pos.x, this.pos.y, this.r * 5);
      p.fill(this.hue, 80, 100, 60);
      p.circle(this.pos.x, this.pos.y, this.r * 2.5);
      // Core
      p.fill(this.hue, 20, 100, 100);
      p.circle(this.pos.x, this.pos.y, this.r * 1.2);
    }
  }

  p.setup = () => {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');

    // Central sun
    let cx = p.width / 2, cy = p.height / 2;
    bodies.push(new Body(cx, cy, 800, 40, 0, 0));

    // Orbiting bodies
    for (let i = 0; i < 49; i++) {
      let angle = p.random(p.TWO_PI);
      let dist = p.random(80, p.min(p.width, p.height) * 0.42);
      let x = cx + p.cos(angle) * dist;
      let y = cy + p.sin(angle) * dist;
      let mass = p.random(5, 60);
      let hue = p.random(360);
      // Circular orbit velocity
      let speed = p.sqrt((G * 800) / dist) * p.random(0.7, 1.15);
      let vx = -p.sin(angle) * speed * p.random(-1, 1 < 0.5 ? -1 : 1);
      let vy =  p.cos(angle) * speed;
      // Ensure roughly circular
      vx = -p.sin(angle) * speed;
      vy =  p.cos(angle) * speed;
      bodies.push(new Body(x, y, mass, hue, vx, vy));
    }
  };

  p.draw = () => {
    // Trails need semi-transparent bg
    p.blendMode(p.BLEND);
    p.background(0, 0, 3, 30);
    p.blendMode(p.ADD);

    // Compute forces
    for (let i = 0; i < bodies.length; i++) {
      if (bodies[i].merged) continue;
      for (let j = i + 1; j < bodies.length; j++) {
        if (bodies[j].merged) continue;
        bodies[i].addForce(bodies[j]);
        bodies[j].addForce(bodies[i]);
      }
    }

    // Check collisions & merge
    for (let i = 0; i < bodies.length; i++) {
      if (bodies[i].merged) continue;
      for (let j = i + 1; j < bodies.length; j++) {
        if (bodies[j].merged) continue;
        let d = p.dist(bodies[i].pos.x, bodies[i].pos.y, bodies[j].pos.x, bodies[j].pos.y);
        if (d < bodies[i].r + bodies[j].r) {
          // Merge j into i
          let total = bodies[i].mass + bodies[j].mass;
          bodies[i].vel.mult(bodies[i].mass / total).add(p5.Vector.mult(bodies[j].vel, bodies[j].mass / total));
          bodies[i].mass = total;
          bodies[i].r = p.sqrt(total) * 2.5;
          bodies[j].merged = true;
        }
      }
    }

    // Update & draw
    for (let b of bodies) {
      if (b.merged) continue;
      b.update();
      b.draw();
    }

    // FPS
    frameCount2++;
    let now = p.millis();
    if (now - fpsTimer > 500) {
      lastFps = Math.round(frameCount2 / ((now - fpsTimer) / 1000));
      frameCount2 = 0;
      fpsTimer = now;
      fpsEl.textContent = 'FPS: ' + lastFps;
    }
  };

  p.windowResized = () => {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
  };
};

new p5(sketch);
</script>
</body>
</html>
