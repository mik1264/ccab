<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rose Curves — P5.js VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:50%; transform:translateX(-50%); color:#bbb; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.55); padding:6px 16px; border-radius:6px; z-index:999; text-align:center; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">r = cos(k·θ)</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let t = 0;
  let fpsEl, infoEl;
  let lastFpsTime = 0;

  // Multiple overlapping rose layers
  const LAYERS = [
    { nOffset: 0, dOffset: 0, scaleF: 1.00, alphaBase: 80, hueOff: 0   },
    { nOffset: 1, dOffset: 0, scaleF: 0.70, alphaBase: 55, hueOff: 120 },
    { nOffset: 0, dOffset: 1, scaleF: 0.50, alphaBase: 40, hueOff: 240 },
    { nOffset: 2, dOffset: 1, scaleF: 0.35, alphaBase: 30, hueOff: 60  },
  ];

  // Rational sequence for n and d — step through 1..8 slowly
  // k = n/d, closed curve when rational
  let kPhase = 0; // drives n,d selection

  function getND(phase, nOff, dOff) {
    // n cycles 1-8, d cycles 1-8 but offset
    let nf = ((phase + nOff * 0.7) % 8) + 1;
    let df = ((phase * 0.6 + dOff * 0.5) % 7) + 1;
    // Snap to integers for closed curves, with smooth morph between
    let nA = Math.floor(nf), nB = Math.ceil(nf);
    let dA = Math.floor(df), dB = Math.ceil(df);
    let fn = nf % 1, fd = df % 1;
    // Return smooth k = n/d (for display) and also integer snap values for rendering
    return { nA, nB, dA, dB, fn, fd, k: nf / df };
  }

  function drawRose(cx, cy, radius, n, d, hueBase, alpha, fillMode) {
    // Full period is 2π*d if n+d is odd, 4π*d if even (for integer n,d)
    // Use 2π*d*2 to be safe
    let period = p.TWO_PI * Math.max(n, d) * 2;
    let steps = 400;
    let dt = period / steps;

    p.beginShape();
    for (let i = 0; i <= steps; i++) {
      let theta = i * dt;
      let r = Math.cos((n / d) * theta) * radius;
      let hue = (hueBase + theta * (180 / Math.PI)) % 360;
      if (fillMode) {
        // Filled with color based on angle
        if (i === 0) {
          p.fill(hue, 75, 90, alpha * 0.6);
        }
      }
      let x = cx + r * Math.cos(theta);
      let y = cy + r * Math.sin(theta);
      p.vertex(x, y);
    }
    p.endShape(p.CLOSE);
  }

  // Draw using lines with HSB gradient
  function drawRoseLines(cx, cy, radius, n, d, hueBase, alpha, weight) {
    let period = p.TWO_PI * Math.max(n, d) * 2;
    let steps = 500;
    let dt = period / steps;
    p.strokeWeight(weight);
    p.noFill();
    let prevX = null, prevY = null;
    for (let i = 0; i <= steps; i++) {
      let theta = i * dt;
      let r = Math.cos((n / d) * theta) * radius;
      let hue = (hueBase + (theta / period) * 360) % 360;
      p.stroke(hue, 88, 95, alpha);
      let x = cx + r * Math.cos(theta);
      let y = cy + r * Math.sin(theta);
      if (prevX !== null) p.line(prevX, prevY, x, y);
      prevX = x; prevY = y;
    }
  }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    infoEl = document.getElementById('info');
  };

  p.draw = function() {
    // Very slow fade for trail effect
    p.background(0, 0, 0, 18);

    let now = p.millis() / 1000;
    if (p.frameCount % 15 === 0) {
      fpsEl.textContent = Math.round(p.frameRate()) + ' fps';
    }

    kPhase += 0.003; // slowly sweep k

    let cx = p.width / 2;
    let cy = p.height / 2;
    let maxR = Math.min(p.width, p.height) * 0.42;

    // Draw background grid of small roses (all different n/d combos)
    if (p.frameCount % 3 === 0) {
      let gridN = 4, gridD = 4;
      let cellW = p.width / gridN, cellH = p.height / gridD;
      p.blendMode(p.ADD);
      for (let gi = 0; gi < gridN; gi++) {
        for (let gj = 0; gj < gridD; gj++) {
          let n = gi + 1, d = gj + 1;
          let gcx = cellW * (gi + 0.5);
          let gcy = cellH * (gj + 0.5);
          let gr = Math.min(cellW, cellH) * 0.38;
          let hueOff = (gi * 90 + gj * 45 + now * 20) % 360;
          drawRoseLines(gcx, gcy, gr, n, d, hueOff, 8, 0.5);
        }
      }
      p.blendMode(p.BLEND);
    }

    // Main large central rose with animated n/d
    p.blendMode(p.ADD);
    for (let li = 0; li < LAYERS.length; li++) {
      let layer = LAYERS[li];
      let nd = getNDSmooth(kPhase + layer.nOffset * 0.4, layer.dOffset);
      let n = nd.n, d = nd.d;

      drawRoseLines(cx, cy, maxR * layer.scaleF, n, d,
        (layer.hueOff + now * 25) % 360,
        layer.alphaBase, li === 0 ? 1.5 : 1.0);
    }
    p.blendMode(p.BLEND);

    // Current k display
    let mainND = getNDSmooth(kPhase, 0);
    infoEl.innerHTML = `r = cos(k·θ)   k = ${mainND.n}/${mainND.d} = ${(mainND.n/mainND.d).toFixed(3)}   petals = ${mainND.petals}`;

    t = now;
  };

  function getNDSmooth(phase, dOff) {
    // Sweep n from 1-8 and d from 1-8 slowly
    let nSeq = [1,2,3,4,5,6,7,8,3,5,7,2,4,6];
    let dSeq = [1,2,3,1,2,3,4,5,2,3,4,1,3,2];
    let idx = phase % nSeq.length;
    let iA = Math.floor(idx) % nSeq.length;
    let iB = (iA + 1) % nSeq.length;
    let f = idx % 1;
    // For display: use integer values
    let n = nSeq[iA], d = dSeq[(iA + dOff) % dSeq.length];
    // Petals formula
    let petals = (n % d === 0) ? n : ((n + d) % 2 === 0 ? 2 * n : n);
    return { n, d, petals };
  }

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
  };
});
</script>
</body>
</html>
