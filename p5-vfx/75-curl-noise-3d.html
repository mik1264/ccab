<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Curl Noise Flow | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const NUM_PARTICLES = 7000;
        const TRAIL_LEN = 38;
        const BOX = 300;
        const EPS = 4.0;
        const DT = 1.8;
        const NOISE_SCALE = 0.0038;
        const TIME_SCALE = 0.00025;

        let particles = [];

        class Particle {
            constructor() {
                this.reset();
                // Spread out initial trail
                this.trail = [];
                for (let i = 0; i < TRAIL_LEN; i++) {
                    this.trail.push({ x: this.x, y: this.y, z: this.z });
                }
                this.hueBase = random(360);
                this.life = random(TRAIL_LEN, TRAIL_LEN * 3);
                this.age = random(this.life);
            }

            reset() {
                this.x = random(-BOX, BOX);
                this.y = random(-BOX, BOX);
                this.z = random(-BOX, BOX);
                this.trail = [];
                this.hueBase = random(360);
                this.life = int(random(TRAIL_LEN, TRAIL_LEN * 4));
                this.age = 0;
            }

            curlAt(x, y, z, t) {
                // curl of (N1(y,z,t), N2(z,x,t), N3(x,y,t))
                let ns = NOISE_SCALE;
                let nt = t * TIME_SCALE;

                // Partial derivatives via finite differences
                let B2_zp = noise((z + EPS) * ns, x * ns, nt);
                let B2_zm = noise((z - EPS) * ns, x * ns, nt);
                let B3_yp = noise(x * ns, (y + EPS) * ns, nt);
                let B3_ym = noise(x * ns, (y - EPS) * ns, nt);

                let B1_zp = noise(y * ns, (z + EPS) * ns, nt + 13.7);
                let B1_zm = noise(y * ns, (z - EPS) * ns, nt + 13.7);
                let B3_xp = noise((x + EPS) * ns, y * ns, nt + 7.3);
                let B3_xm = noise((x - EPS) * ns, y * ns, nt + 7.3);

                let B1_yp = noise((y + EPS) * ns, z * ns, nt + 31.2);
                let B1_ym = noise((y - EPS) * ns, z * ns, nt + 31.2);
                let B2_xp = noise(z * ns, (x + EPS) * ns, nt + 19.5);
                let B2_xm = noise(z * ns, (x - EPS) * ns, nt + 19.5);

                let inv2e = 1 / (2 * EPS);
                let cx = (B3_yp - B3_ym) * inv2e - (B2_zp - B2_zm) * inv2e;
                let cy = (B1_zp - B1_zm) * inv2e - (B3_xp - B3_xm) * inv2e;
                let cz = (B2_xp - B2_xm) * inv2e - (B1_yp - B1_ym) * inv2e;

                // Scale up
                return { x: cx * 120, y: cy * 120, z: cz * 120 };
            }

            step(t) {
                let c = this.curlAt(this.x, this.y, this.z, t);
                this.x += c.x * DT;
                this.y += c.y * DT;
                this.z += c.z * DT;

                // Wrap
                if (this.x > BOX)  this.x -= BOX * 2;
                if (this.x < -BOX) this.x += BOX * 2;
                if (this.y > BOX)  this.y -= BOX * 2;
                if (this.y < -BOX) this.y += BOX * 2;
                if (this.z > BOX)  this.z -= BOX * 2;
                if (this.z < -BOX) this.z += BOX * 2;

                this.trail.push({ x: this.x, y: this.y, z: this.z });
                if (this.trail.length > TRAIL_LEN) this.trail.shift();

                this.age++;
                if (this.age > this.life) this.reset();
            }
        }

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);
            noiseDetail(3, 0.5);
            for (let i = 0; i < NUM_PARTICLES; i++) {
                particles.push(new Particle());
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        function draw() {
            // Ghost trails via translucent background
            background(240, 20, 5, 18);

            orbitControl(2, 2, 0.05);

            blendMode(ADD);

            // Auto-rotate
            rotateY(frameCount * 0.004);
            rotateX(sin(frameCount * 0.0025) * 0.3);

            let t = frameCount;

            // Draw particles in batches
            let batchSize = 200;
            let batchCount = Math.ceil(NUM_PARTICLES / batchSize);

            for (let b = 0; b < batchCount; b++) {
                let start = b * batchSize;
                let end = min(start + batchSize, NUM_PARTICLES);

                for (let i = start; i < end; i++) {
                    let p = particles[i];
                    p.step(t);

                    let tlen = p.trail.length;
                    if (tlen < 2) continue;

                    beginShape();
                    noFill();
                    for (let j = 0; j < tlen; j++) {
                        let pt = p.trail[j];
                        let frac = j / tlen;
                        let h = (p.hueBase + pt.y * 0.25 + t * 0.15) % 360;
                        let alpha = frac * frac * 72;
                        stroke(h, 85, 100, alpha);
                        strokeWeight(frac * 1.4 + 0.3);
                        vertex(pt.x, pt.y, pt.z);
                    }
                    endShape();
                }
            }

            blendMode(BLEND);

            // Bounding box wireframe
            noFill();
            stroke(200, 40, 40, 20);
            strokeWeight(0.5);
            let b2 = BOX;
            // 12 edges of the cube
            let corners = [
                [-b2,-b2,-b2],[b2,-b2,-b2],[b2,b2,-b2],[-b2,b2,-b2],
                [-b2,-b2,b2],[b2,-b2,b2],[b2,b2,b2],[-b2,b2,b2]
            ];
            let edges = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
            for (let e of edges) {
                let a = corners[e[0]], bb = corners[e[1]];
                line(a[0],a[1],a[2],bb[0],bb[1],bb[2]);
            }

            // FPS
            resetMatrix();
            noStroke();
            fill(60, 0, 70);
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width/2 - 16, -height/2 + 16);

            textAlign(LEFT, TOP);
            fill(200, 60, 90);
            textSize(13);
            text('3D Curl Noise Flow — ' + NUM_PARTICLES + ' particles', -width/2 + 16, -height/2 + 16);
        }
    </script>
</body>
</html>
