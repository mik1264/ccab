<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 — Infinite Fractal Zoom | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none;
            font-size: 13px;
            background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 20px;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s;
        }
        .back-link:hover { color: #fff; background: rgba(0,0,0,0.7); }
        #fps {
            position: fixed; top: 16px; right: 16px; z-index: 100;
            color: #0f0; font-family: monospace; font-size: 12px;
            background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px;
        }
        #info {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.5); font-family: monospace; font-size: 11px;
            background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 4px;
            pointer-events: none; white-space: nowrap;
        }
    </style>
</head>
<body>
<a href="index.html" class="back-link">← Gallery</a>
<div id="fps">-- FPS</div>
<div id="info">Auto-zooming Julia set &nbsp;|&nbsp; click to zoom into that point</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

new p5(function(p) {
    const MAX_ITER = 256;

    let pg;
    let centerX = 0, centerY = 0;
    let zoom = 1.0;
    const ZOOM_SPEED = 1.016;
    const MAX_ZOOM = 1e11;

    // Julia c-parameter slowly orbits
    let cAngle = 0;
    const C_RADIUS = 0.7885;
    let cX, cY;

    // Progressive rendering
    let renderRow = 0;
    const ROWS_PER_FRAME = 8;

    // FPS tracking
    let fpsFrames = 0, fpsLast = 0, fpsVal = 0;

    function juliaSmooth(x0, y0) {
        let x = x0, y = y0;
        for (let i = 0; i < MAX_ITER; i++) {
            let x2 = x * x, y2 = y * y;
            if (x2 + y2 > 16) {
                let logz = Math.log(x2 + y2) * 0.5;
                let nu = Math.log(logz / Math.LN2) / Math.LN2;
                return i + 1 - nu;
            }
            y = 2 * x * y + cY;
            x = x2 - y2 + cX;
        }
        return -1;
    }

    function hsbToRgb(h, s, v) {
        // h: 0-360, s: 0-1, v: 0-1 => [r,g,b] 0-255
        let h6 = h / 60;
        let c = v * s, x = c * (1 - Math.abs(h6 % 2 - 1)), m = v - c;
        let r, g, b;
        let f = Math.floor(h6);
        if      (f === 0) { r=c; g=x; b=0; }
        else if (f === 1) { r=x; g=c; b=0; }
        else if (f === 2) { r=0; g=c; b=x; }
        else if (f === 3) { r=0; g=x; b=c; }
        else if (f === 4) { r=x; g=0; b=c; }
        else              { r=c; g=0; b=x; }
        return [(r+m)*255|0, (g+m)*255|0, (b+m)*255|0];
    }

    p.setup = function() {
        let cnv = p.createCanvas(p.windowWidth, p.windowHeight);
        p.pixelDensity(1);
        cnv.mouseClicked(function() {
            let W = p.width, H = p.height;
            let scl = Math.min(W, H) * zoom / 4;
            centerX += (p.mouseX - W/2) / scl;
            centerY += (p.mouseY - H/2) / scl;
            renderRow = 0;
        });
        pg = p.createGraphics(p.width, p.height);
        pg.pixelDensity(1);
    };

    p.windowResized = function() {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        pg.resizeCanvas(p.width, p.height);
        renderRow = 0;
    };

    p.draw = function() {
        // FPS
        fpsFrames++;
        let now = p.millis();
        if (now - fpsLast >= 1000) {
            fpsVal = fpsFrames;
            fpsFrames = 0; fpsLast = now;
            let el = document.getElementById('fps');
            if (el) {
                el.textContent = fpsVal + ' FPS';
                el.style.color = fpsVal >= 50 ? '#0f0' : fpsVal >= 30 ? '#fa0' : '#f00';
            }
        }

        // Drift c
        cAngle += 0.004;
        cX = C_RADIUS * Math.cos(cAngle);
        cY = C_RADIUS * Math.sin(cAngle);

        // Advance zoom
        zoom *= ZOOM_SPEED;
        if (zoom > MAX_ZOOM) {
            zoom = 1; centerX = 0; centerY = 0; renderRow = 0;
        }

        let W = pg.width, H = pg.height;
        let scl = Math.min(W, H) * zoom / 4.0;
        let hueShift = (zoom * 0.4) % 360;

        pg.loadPixels();
        let endRow = Math.min(renderRow + ROWS_PER_FRAME, H);
        for (let j = renderRow; j < endRow; j++) {
            for (let i = 0; i < W; i++) {
                let x0 = (i - W * 0.5) / scl + centerX;
                let y0 = (j - H * 0.5) / scl + centerY;
                let t = juliaSmooth(x0, y0);
                let idx = (j * W + i) * 4;
                if (t < 0) {
                    // In-set: near-black with subtle hue
                    pg.pixels[idx]   = 4;
                    pg.pixels[idx+1] = 6;
                    pg.pixels[idx+2] = 18;
                    pg.pixels[idx+3] = 255;
                } else {
                    let norm = (t % MAX_ITER) / MAX_ITER;
                    let hue = (norm * 360 + hueShift) % 360;
                    let sat = 0.8 + 0.2 * Math.sin(norm * Math.PI * 6);
                    let val = 0.15 + 0.8 * Math.pow(norm, 0.35);
                    let rgb = hsbToRgb(hue, sat, val);
                    pg.pixels[idx]   = rgb[0];
                    pg.pixels[idx+1] = rgb[1];
                    pg.pixels[idx+2] = rgb[2];
                    pg.pixels[idx+3] = 255;
                }
            }
        }
        pg.updatePixels();
        renderRow = endRow >= H ? 0 : endRow;

        p.image(pg, 0, 0);

        // HUD
        p.fill(255, 100);
        p.noStroke();
        p.textFont('monospace');
        p.textSize(10);
        p.text('zoom ' + zoom.toExponential(2) + '×  c=' + cX.toFixed(4) + '+' + cY.toFixed(4) + 'i', 16, p.height - 20);
    };
});
</script>
</body>
</html>
