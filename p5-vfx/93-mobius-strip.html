<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Möbius Strip — p5-vfx</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  .back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  .back-link:hover { color:#fff; }
  #fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  #info { position:fixed; bottom:12px; left:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; line-height:1.6; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Möbius Strip<br>One-sided surface — watch the color flow<br>Drag to orbit</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const U_SEGS = 200;
  const V_SEGS = 30;
  const SCALE  = 130;

  function mobiusPoint(u, v) {
    // u in [0, 2*PI], v in [-1, 1]
    const R = 1.7;
    const w = 0.5;
    const x = (R + w * v * Math.cos(u / 2)) * Math.cos(u);
    const y = (R + w * v * Math.cos(u / 2)) * Math.sin(u);
    const z = w * v * Math.sin(u / 2);
    return [x, y, z];
  }

  // Precompute mesh
  let mesh = [];
  for (let i = 0; i <= U_SEGS; i++) {
    let row = [];
    for (let j = 0; j <= V_SEGS; j++) {
      const u = (i / U_SEGS) * Math.PI * 2;
      const v = (j / V_SEGS) * 2 - 1;
      row.push({ pt: mobiusPoint(u, v), u: u / (Math.PI*2), v: (v+1)/2 });
    }
    mesh.push(row);
  }

  let rotY = 0;
  let sphereT = 0;
  let fpsArr = [], lastTime = 0;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
  };

  p.draw = function() {
    p.background(0, 0, 5);
    p.orbitControl(3, 3, 0.05);

    p.ambientLight(20);
    p.directionalLight(255, 240, 200,  0.3, -1, -0.5);
    p.directionalLight(150, 180, 255, -0.5,  0.8,  0.3);

    rotY += 0.007;
    p.rotateY(rotY);
    p.rotateX(0.25);
    p.scale(SCALE);

    // Draw mesh — color by v parameter to show one-sidedness
    p.noStroke();
    for (let i = 0; i < U_SEGS; i++) {
      const next = i + 1;
      for (let j = 0; j < V_SEGS; j++) {
        const jn = j + 1;
        const A = mesh[i][j],   B = mesh[next][j];
        const C = mesh[next][jn], D = mesh[i][jn];

        // Color: hue from u (sweeps 0-720 around one full loop to show twist)
        const hue = (A.u * 720 + A.v * 60 + p.frameCount * 0.2) % 360;
        const sat = 80 + 20 * A.v;
        const bri = 60 + 30 * (0.5 + 0.5 * Math.sin(A.u * Math.PI * 4));
        p.fill(hue, sat, bri, 90);

        p.beginShape(p.TRIANGLES);
        p.vertex(...A.pt); p.vertex(...B.pt); p.vertex(...C.pt);
        p.vertex(...A.pt); p.vertex(...C.pt); p.vertex(...D.pt);
        p.endShape();

        // Subtle wireframe
        p.stroke(hue, 40, 100, 18);
        p.strokeWeight(0.004);
        p.noFill();
        p.beginShape(p.LINES);
        p.vertex(...A.pt); p.vertex(...B.pt);
        p.vertex(...A.pt); p.vertex(...D.pt);
        p.endShape();
        p.noStroke();
      }
    }

    // Sphere traveling along the center line (v=0)
    sphereT = (sphereT + 0.004) % 1;
    const su = sphereT * Math.PI * 2;
    const spt = mobiusPoint(su, 0);
    const hue2 = (sphereT * 360 + 200) % 360;
    p.noStroke();
    p.fill(hue2, 80, 100, 95);
    p.emissiveMaterial(hue2, 100, 100, 80);
    p.push();
    p.translate(...spt);
    p.sphere(0.055, 8, 8);
    p.pop();
    p.emissiveMaterial(0, 0, 0);

    // Trailing particles
    for (let k = 1; k <= 6; k++) {
      const tu = ((sphereT - k * 0.015 + 1) % 1) * Math.PI * 2;
      const tpt = mobiusPoint(tu, 0);
      p.fill(hue2, 80, 100, 60 - k * 8);
      p.push();
      p.translate(...tpt);
      p.sphere(0.03 * (1 - k/8), 5, 5);
      p.pop();
    }

    // FPS
    const now = p.millis();
    const dt  = now - lastTime; lastTime = now;
    fpsArr.push(1000/dt);
    if (fpsArr.length > 30) fpsArr.shift();
    const fps = Math.round(fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length);
    document.getElementById('fps').textContent = `FPS: ${fps}`;
  };

  p.windowResized = function() { p.resizeCanvas(p.windowWidth, p.windowHeight); };
});
</script>
</body>
</html>
