<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wormhole Flight 3D — p5-vfx</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  .back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  .back-link:hover { color:#fff; }
  #fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  #info { position:fixed; bottom:12px; left:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; line-height:1.6; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Wormhole Flight<br>First-person tunnel traversal<br>Drag to look around</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  // Catmull-Rom spline through random control points
  const N_CP = 12;
  const controlPoints = [];

  function genControlPoints() {
    controlPoints.length = 0;
    // Spiral + noise path
    for (let i = 0; i < N_CP; i++) {
      const t = i / (N_CP - 1);
      const angle = t * Math.PI * 4;
      const r = 80 + Math.sin(t * Math.PI * 3) * 50;
      controlPoints.push([
        r * Math.cos(angle) + (Math.random() - 0.5) * 40,
        (t - 0.5) * 600 + (Math.random() - 0.5) * 60,
        r * Math.sin(angle) + (Math.random() - 0.5) * 40
      ]);
    }
  }

  function catmullRom(p0, p1, p2, p3, t) {
    const t2 = t * t, t3 = t2 * t;
    return [
      0.5 * ((2*p1[0]) + (-p0[0]+p2[0])*t + (2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2 + (-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
      0.5 * ((2*p1[1]) + (-p0[1]+p2[1])*t + (2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2 + (-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3),
      0.5 * ((2*p1[2]) + (-p0[2]+p2[2])*t + (2*p0[2]-5*p1[2]+4*p2[2]-p3[2])*t2 + (-p0[2]+3*p1[2]-3*p2[2]+p3[2])*t3)
    ];
  }

  function splinePoint(u) {
    u = ((u % 1) + 1) % 1;
    const n = controlPoints.length;
    const seg = Math.floor(u * (n - 1));
    const t = u * (n - 1) - seg;
    const i1 = Math.max(0, seg - 1);
    const i2 = seg;
    const i3 = Math.min(n - 1, seg + 1);
    const i4 = Math.min(n - 1, seg + 2);
    return catmullRom(controlPoints[i1], controlPoints[i2], controlPoints[i3], controlPoints[i4], t);
  }

  genControlPoints();

  // Build ring cross-sections
  const N_RINGS   = 200;
  const RING_SIDES = 24;
  const TUNNEL_R  = 90;

  function buildRing(center, tangent, idx) {
    // Build a ring of vertices around `center` perpendicular to `tangent`
    const tx = tangent[0], ty = tangent[1], tz = tangent[2];
    const len = Math.sqrt(tx*tx+ty*ty+tz*tz);
    const tn = [tx/len, ty/len, tz/len];
    let up = [0, 1, 0];
    if (Math.abs(tn[1]) > 0.9) up = [1, 0, 0];
    // right = tn x up
    const rx = tn[1]*up[2]-tn[2]*up[1], ry = tn[2]*up[0]-tn[0]*up[2], rz = tn[0]*up[1]-tn[1]*up[0];
    const rl = Math.sqrt(rx*rx+ry*ry+rz*rz);
    const r = [rx/rl, ry/rl, rz/rl];
    // up2 = r x tn
    const u2x = r[1]*tn[2]-r[2]*tn[1], u2y = r[2]*tn[0]-r[0]*tn[2], u2z = r[0]*tn[1]-r[1]*tn[0];

    const verts = [];
    for (let s = 0; s < RING_SIDES; s++) {
      const ang = (s / RING_SIDES) * Math.PI * 2;
      const c = Math.cos(ang), si = Math.sin(ang);
      verts.push([
        center[0] + TUNNEL_R * (c * r[0] + si * u2x),
        center[1] + TUNNEL_R * (c * r[1] + si * u2y),
        center[2] + TUNNEL_R * (c * r[2] + si * u2z)
      ]);
    }
    return verts;
  }

  let camT = 0;
  let fpsArr = [], lastTime = 0;
  let colorOffset = 0;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
  };

  p.draw = function() {
    p.background(0, 0, 3);

    colorOffset = (colorOffset + 0.8) % 360;
    camT = (camT + 0.0018) % 1;

    // Camera follows the spline
    const camPos   = splinePoint(camT);
    const lookAhead = splinePoint((camT + 0.015) % 1);
    const dx = lookAhead[0]-camPos[0], dy = lookAhead[1]-camPos[1], dz = lookAhead[2]-camPos[2];

    p.camera(
      camPos[0],   camPos[1],   camPos[2],
      lookAhead[0], lookAhead[1], lookAhead[2],
      0, 1, 0
    );

    p.ambientLight(15);
    p.pointLight(
      (colorOffset % 360) > 180 ? 255 : 100,
      100,
      (colorOffset % 360) < 180 ? 255 : 100,
      lookAhead[0], lookAhead[1], lookAhead[2]
    );

    // Build and draw all rings
    const rings = [];
    for (let ri = 0; ri < N_RINGS; ri++) {
      const u  = (camT - 0.05 + ri / N_RINGS * 1.2) % 1;
      const up1 = splinePoint(u);
      const up2 = splinePoint((u + 0.005) % 1);
      const tan = [up2[0]-up1[0], up2[1]-up1[1], up2[2]-up1[2]];
      rings.push({ center: up1, ring: buildRing(up1, tan, ri), u });
    }

    // Draw tunnel faces between consecutive rings
    p.noStroke();
    for (let ri = 0; ri < rings.length - 1; ri++) {
      const rA = rings[ri].ring,   rB = rings[ri+1].ring;
      const t  = rings[ri].u;
      const hue = (t * 720 + colorOffset) % 360;
      const pulse = 0.5 + 0.5 * Math.sin(t * Math.PI * 20 + p.frameCount * 0.08);
      const sat = 70 + 25 * pulse;
      const bri = 30 + 45 * pulse;

      for (let s = 0; s < RING_SIDES; s++) {
        const sn = (s + 1) % RING_SIDES;
        const edgeHue = (hue + s * 5) % 360;
        p.fill(edgeHue, sat, bri, 85);
        p.beginShape(p.TRIANGLES);
        p.vertex(...rA[s]);  p.vertex(...rB[s]);  p.vertex(...rA[sn]);
        p.vertex(...rB[s]);  p.vertex(...rB[sn]); p.vertex(...rA[sn]);
        p.endShape();
      }
    }

    // Portal glow at far end
    const farPt = splinePoint((camT + 0.5) % 1);
    p.push();
    p.translate(...farPt);
    p.noStroke();
    p.fill((colorOffset + 180) % 360, 80, 100, 50);
    p.sphere(30, 8, 8);
    p.fill((colorOffset + 180) % 360, 40, 100, 20);
    p.sphere(80, 8, 8);
    p.pop();

    // FPS
    const now = p.millis();
    const dt  = now - lastTime; lastTime = now;
    fpsArr.push(1000/dt);
    if (fpsArr.length > 30) fpsArr.shift();
    const fps = Math.round(fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length);
    document.getElementById('fps').textContent = `FPS: ${fps}`;
  };

  p.windowResized = function() { p.resizeCanvas(p.windowWidth, p.windowHeight); };
});
</script>
</body>
</html>
