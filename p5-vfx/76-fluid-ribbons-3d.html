<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Ribbons 3D | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const NUM_RIBBONS = 48;
        const CTRL_PTS = 58;
        const SPHERE_R = 290;
        const EPS = 5.0;
        const DT = 1.6;
        const NS = 0.0028;  // noise scale
        const TS = 0.00018; // time scale
        const MAX_WIDTH = 12;

        let ribbons = [];

        class Ribbon {
            constructor(i) {
                // Random starting point on sphere surface
                let theta = random(TWO_PI);
                let phi = acos(random(-1, 1));
                let r = random(SPHERE_R * 0.3, SPHERE_R);
                this.origin = {
                    x: r * sin(phi) * cos(theta),
                    y: r * cos(phi),
                    z: r * sin(phi) * sin(theta)
                };
                this.hueBase = (i / NUM_RIBBONS) * 360;
                this.hueSpeed = random(-0.4, 0.4);
                this.widthScale = random(0.5, 1.0);
                this.pts = [];
                // Initialize control points
                let cx = this.origin.x, cy = this.origin.y, cz = this.origin.z;
                for (let j = 0; j < CTRL_PTS; j++) {
                    this.pts.push({ x: cx, y: cy, z: cz });
                }
            }

            curlAt(x, y, z, t) {
                let nt = t * TS;
                // Three noise fields with offsets
                let B2zp = noise((z + EPS) * NS, x * NS, nt);
                let B2zm = noise((z - EPS) * NS, x * NS, nt);
                let B3yp = noise(x * NS, (y + EPS) * NS, nt + 7.1);
                let B3ym = noise(x * NS, (y - EPS) * NS, nt + 7.1);

                let B1zp = noise(y * NS, (z + EPS) * NS, nt + 14.3);
                let B1zm = noise(y * NS, (z - EPS) * NS, nt + 14.3);
                let B3xp = noise((x + EPS) * NS, y * NS, nt + 7.1);
                let B3xm = noise((x - EPS) * NS, y * NS, nt + 7.1);

                let B1yp = noise((y + EPS) * NS, z * NS, nt + 28.6);
                let B1ym = noise((y - EPS) * NS, z * NS, nt + 28.6);
                let B2xp = noise(z * NS, (x + EPS) * NS, nt);
                let B2xm = noise(z * NS, (x - EPS) * NS, nt);

                let inv = 1 / (2 * EPS);
                return {
                    x: ((B3yp - B3ym) - (B2zp - B2zm)) * inv * 140,
                    y: ((B1zp - B1zm) - (B3xp - B3xm)) * inv * 140,
                    z: ((B2xp - B2xm) - (B1yp - B1ym)) * inv * 140
                };
            }

            step(t) {
                // Move all control points forward one step in the curl field
                // Each point is advected independently with a slight lag
                let newPts = [];
                for (let j = 0; j < this.pts.length; j++) {
                    let p = this.pts[j];
                    let phaseT = t - j * 1.5; // staggered time
                    let c = this.curlAt(p.x, p.y, p.z, phaseT);
                    let nx = p.x + c.x * DT;
                    let ny = p.y + c.y * DT;
                    let nz = p.z + c.z * DT;
                    // Soft boundary: pull back if too far
                    let dist = sqrt(nx*nx + ny*ny + nz*nz);
                    if (dist > SPHERE_R) {
                        let scale = SPHERE_R / dist;
                        nx *= scale; ny *= scale; nz *= scale;
                    }
                    newPts.push({ x: nx, y: ny, z: nz });
                }
                this.pts = newPts;
            }

            draw(t) {
                let n = this.pts.length;
                if (n < 2) return;

                beginShape(QUAD_STRIP);
                noStroke();

                for (let j = 0; j < n - 1; j++) {
                    let p = this.pts[j];
                    let q = this.pts[j + 1];

                    // Compute ribbon normal: cross of direction with up
                    let dx = q.x - p.x, dy = q.y - p.y, dz = q.z - p.z;
                    let len = sqrt(dx*dx + dy*dy + dz*dz);
                    if (len < 0.001) len = 0.001;
                    dx /= len; dy /= len; dz /= len;

                    // Use a consistent up vector; fall back if parallel
                    let ux = 0, uy = 1, uz = 0;
                    if (abs(dy) > 0.95) { ux = 0; uy = 0; uz = 1; }
                    // Cross product: dir x up
                    let nx2 = dy * uz - dz * uy;
                    let ny2 = dz * ux - dx * uz;
                    let nz2 = dx * uy - dy * ux;
                    let nlen = sqrt(nx2*nx2 + ny2*ny2 + nz2*nz2);
                    if (nlen < 0.001) nlen = 0.001;
                    nx2 /= nlen; ny2 /= nlen; nz2 /= nlen;

                    // Width envelope: 0 at ends, max in middle
                    let frac = j / (n - 1);
                    let envelope = sin(frac * PI);
                    let w = envelope * MAX_WIDTH * this.widthScale;

                    // Iridescent color
                    let h = (this.hueBase + j * 3.5 + t * 0.2 + this.hueSpeed * frameCount) % 360;
                    let alpha = envelope * 72 + 12;

                    fill(h, 82, 95, alpha);

                    vertex(p.x + nx2 * w, p.y + ny2 * w, p.z + nz2 * w);
                    vertex(p.x - nx2 * w, p.y - ny2 * w, p.z - nz2 * w);
                }
                endShape();

                // Spine glow line
                beginShape();
                noFill();
                for (let j = 0; j < n; j++) {
                    let p = this.pts[j];
                    let frac = j / (n - 1);
                    let h = (this.hueBase + frac * 60 + t * 0.15) % 360;
                    let alpha = sin(frac * PI) * 50;
                    stroke(h, 70, 100, alpha);
                    strokeWeight(0.8);
                    vertex(p.x, p.y, p.z);
                }
                endShape();
            }
        }

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);
            noiseDetail(4, 0.5);
            for (let i = 0; i < NUM_RIBBONS; i++) {
                ribbons.push(new Ribbon(i));
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        function draw() {
            // Ghost trails: very dark background with low alpha
            background(240, 20, 4, 22);

            orbitControl(2, 2, 0.05);

            blendMode(ADD);

            // Slow camera orbit
            rotateY(frameCount * 0.003);
            rotateX(sin(frameCount * 0.002) * 0.18);

            let t = frameCount;

            // Step and draw all ribbons
            for (let i = 0; i < ribbons.length; i++) {
                ribbons[i].step(t);
                ribbons[i].draw(t);
            }

            blendMode(BLEND);

            // FPS
            resetMatrix();
            noStroke();
            fill(60, 0, 70);
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width/2 - 16, -height/2 + 16);

            textAlign(LEFT, TOP);
            fill(280, 60, 90);
            textSize(13);
            text('Fluid Ribbons 3D — ' + NUM_RIBBONS + ' silk ribbons', -width/2 + 16, -height/2 + 16);
        }
    </script>
</body>
</html>
