<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arneodo Attractor | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        // Arneodo attractor: dx=y, dy=z, dz=-a*z - b*y - c*x + d*x^3
        const A = 0.0, B = -3.5, C = -2.5, D = 0.7;
        const DT = 0.008;
        const TRAIL_LEN = 8000;
        const NUM_TRAJ = 4;
        const SCALE = 40;

        // Small offsets so the 4 trajectories diverge nicely
        const INITS = [
            [0.10, 0.00, 0.00],
            [0.10, 0.01, 0.00],
            [0.10, 0.00, 0.01],
            [0.11, 0.00, 0.00],
        ];
        // HSB hue bases for each trajectory
        const HUE_BASES = [200, 280, 140, 60];

        let trajectories = [];
        let camAngleX = 0.3;
        let camAngleY = 0;
        let autoRotate = true;

        function arneodoDeriv(x, y, z) {
            let dx = y;
            let dy = z;
            let dz = -A * z - B * y - C * x + D * x * x * x;
            return [dx, dy, dz];
        }

        function rk4Step(x, y, z) {
            let [k1x, k1y, k1z] = arneodoDeriv(x, y, z);
            let [k2x, k2y, k2z] = arneodoDeriv(x + DT/2*k1x, y + DT/2*k1y, z + DT/2*k1z);
            let [k3x, k3y, k3z] = arneodoDeriv(x + DT/2*k2x, y + DT/2*k2y, z + DT/2*k2z);
            let [k4x, k4y, k4z] = arneodoDeriv(x + DT*k3x, y + DT*k3y, z + DT*k3z);
            return [
                x + DT/6*(k1x + 2*k2x + 2*k3x + k4x),
                y + DT/6*(k1y + 2*k2y + 2*k3y + k4y),
                z + DT/6*(k1z + 2*k2z + 2*k3z + k4z),
            ];
        }

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);
            blendMode(ADD);
            strokeWeight(1.0);

            for (let t = 0; t < NUM_TRAJ; t++) {
                trajectories.push({
                    pts: [INITS[t].slice()],
                    head: INITS[t].slice(),
                    hueBase: HUE_BASES[t],
                    steps: 0,
                });
            }
            // Pre-warm to fill trails from the start
            for (let warmup = 0; warmup < 2000; warmup++) {
                for (let t = 0; t < NUM_TRAJ; t++) {
                    let tr = trajectories[t];
                    let [nx, ny, nz] = rk4Step(tr.head[0], tr.head[1], tr.head[2]);
                    tr.head = [nx, ny, nz];
                    tr.pts.push([nx, ny, nz]);
                    tr.steps++;
                    if (tr.pts.length > TRAIL_LEN) tr.pts.shift();
                }
            }
        }

        function draw() {
            background(0, 0, 5, 60);
            blendMode(ADD);

            // Auto-rotate camera
            camAngleY += 0.004;

            // 40 new integration steps per frame
            for (let s = 0; s < 40; s++) {
                for (let t = 0; t < NUM_TRAJ; t++) {
                    let tr = trajectories[t];
                    let [nx, ny, nz] = rk4Step(tr.head[0], tr.head[1], tr.head[2]);
                    tr.head = [nx, ny, nz];
                    tr.pts.push([nx, ny, nz]);
                    tr.steps++;
                    if (tr.pts.length > TRAIL_LEN) tr.pts.shift();
                }
            }

            rotateY(camAngleY);
            rotateX(camAngleX);

            // Draw each trajectory as a color trail
            for (let t = 0; t < NUM_TRAJ; t++) {
                let tr = trajectories[t];
                let pts = tr.pts;
                let len = pts.length;
                for (let i = 1; i < len; i++) {
                    let frac = i / len;
                    let hue = (tr.hueBase + frac * 80) % 360;
                    let sat = 80 + frac * 20;
                    let bri = frac * frac * 90;
                    let alpha = frac * 70;
                    stroke(hue, sat, bri, alpha);
                    let p0 = pts[i-1], p1 = pts[i];
                    line(p0[0]*SCALE, p0[2]*SCALE, p0[1]*SCALE,
                         p1[0]*SCALE, p1[2]*SCALE, p1[1]*SCALE);
                }
            }

            // FPS counter in screen space
            resetMatrix();
            blendMode(BLEND);
            fill(255, 0, 80, 90);
            noStroke();
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width/2 - 16, -height/2 + 16);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
