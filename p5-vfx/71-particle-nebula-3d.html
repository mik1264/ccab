<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Nebula 3D | P5.js VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#666; font-family:monospace; font-size:12px; text-align:center; pointer-events:none; }
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Gallery</a>
<div id="fps">FPS: --</div>
<div id="info">Particle Nebula 3D · 50,000 particles · Drag to rotate</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

new p5(function(p) {
  const N = 50000;
  const NUM_ARMS = 3;

  // Particle data as typed arrays for performance
  let px, py, pz;   // positions
  let vx, vy, vz;   // velocities (thermal motion)
  let ph, ps, pb;   // HSB color (fixed per particle)
  let pnoise;        // noise offset for twinkle

  let angleY = 0;
  let fpsEl;
  let fpsTime = 0, fpsFrames = 0;

  function gaussRand() {
    // Box-Muller
    const u = 1 - Math.random();
    const v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    fpsEl = document.getElementById('fps');

    px = new Float32Array(N);
    py = new Float32Array(N);
    pz = new Float32Array(N);
    vx = new Float32Array(N);
    vy = new Float32Array(N);
    vz = new Float32Array(N);
    ph = new Float32Array(N);
    ps = new Float32Array(N);
    pb = new Float32Array(N);
    pnoise = new Float32Array(N);

    const coreCount   = Math.floor(N * 0.25);
    const armCount    = Math.floor(N * 0.65);
    const hazeCount   = N - coreCount - armCount;

    // Core particles
    for (let i = 0; i < coreCount; i++) {
      const r = Math.abs(gaussRand()) * 30;
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);
      px[i] = r * Math.sin(phi) * Math.cos(theta);
      py[i] = r * Math.sin(phi) * Math.sin(theta);
      pz[i] = r * Math.cos(phi) * 0.3; // flatten slightly
      ph[i] = 200 + Math.random() * 20;
      ps[i] = 20 + Math.random() * 40;
      pb[i] = 70 + Math.random() * 30;
      pnoise[i] = Math.random() * 1000;
      vx[i] = gaussRand() * 0.02;
      vy[i] = gaussRand() * 0.02;
      vz[i] = gaussRand() * 0.02;
    }

    // Spiral arm particles
    const perArm = Math.floor(armCount / NUM_ARMS);
    let idx = coreCount;
    for (let arm = 0; arm < NUM_ARMS; arm++) {
      const armOffset = (arm / NUM_ARMS) * Math.PI * 2;
      for (let j = 0; j < perArm; j++) {
        const t = (j / perArm);
        const armAngle = armOffset + t * Math.PI * 4;
        const armR     = 30 + t * 220;
        const scatter  = 15 + t * 30;
        const cx = armR * Math.cos(armAngle);
        const cy = armR * Math.sin(armAngle);
        const cz = (Math.random() - 0.5) * scatter * 0.3;
        px[idx] = cx + gaussRand() * scatter;
        py[idx] = cy + gaussRand() * scatter;
        pz[idx] = cz + gaussRand() * 5;

        // Color gradient: yellow mid, red/purple outer
        const frac = t;
        if (frac < 0.4) {
          ph[idx] = 50 + Math.random() * 15;
          ps[idx] = 70 + Math.random() * 30;
          pb[idx] = 60 + Math.random() * 30;
        } else {
          ph[idx] = 280 + Math.random() * 30;
          ps[idx] = 60 + Math.random() * 40;
          pb[idx] = 40 + Math.random() * 40;
        }
        pnoise[idx] = Math.random() * 1000;
        vx[idx] = gaussRand() * 0.015;
        vy[idx] = gaussRand() * 0.015;
        vz[idx] = gaussRand() * 0.015;
        idx++;
      }
    }

    // Outer haze
    for (let i = idx; i < N; i++) {
      const r = 200 + Math.random() * 150;
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);
      px[i] = r * Math.sin(phi) * Math.cos(theta);
      py[i] = r * Math.sin(phi) * Math.sin(theta) * 0.3;
      pz[i] = r * Math.cos(phi) * 0.3;
      ph[i] = 290 + Math.random() * 30;
      ps[i] = 40 + Math.random() * 40;
      pb[i] = 15 + Math.random() * 25;
      pnoise[i] = Math.random() * 1000;
      vx[i] = gaussRand() * 0.01;
      vy[i] = gaussRand() * 0.01;
      vz[i] = gaussRand() * 0.01;
    }

    p.strokeWeight(1);
    p.noFill();
  };

  p.draw = function() {
    p.background(0, 0, 4, 100);
    p.blendMode(p.ADD);

    // FPS (DOM overlay — no resetMatrix needed here)
    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(fpsFrames * 1000 / (now - fpsTime));
      fpsFrames = 0; fpsTime = now;
    }

    // Slow auto-rotation
    angleY += 0.003;
    p.rotateX(0.25);
    p.rotateY(angleY);

    const t = p.frameCount * 0.02;

    // Draw particles in batches — p5 beginShape POINTS
    p.beginShape(p.POINTS);
    for (let i = 0; i < N; i++) {
      // Thermal drift
      px[i] += vx[i];
      py[i] += vy[i];
      pz[i] += vz[i];
      // Soft rebound toward center
      if (Math.abs(px[i]) > 400) vx[i] *= -1;
      if (Math.abs(py[i]) > 400) vy[i] *= -1;
      if (Math.abs(pz[i]) > 200) vz[i] *= -1;

      // Twinkle: brightness oscillates with noise
      const twinkle = p.noise(pnoise[i] + t) * 40 - 10;
      const bFinal = Math.max(5, Math.min(100, pb[i] + twinkle));
      const aFinal = Math.max(10, Math.min(90, bFinal * 0.85));

      p.stroke(ph[i], ps[i], bFinal, aFinal);
      p.vertex(px[i], py[i], pz[i]);
    }
    p.endShape();

    p.blendMode(p.BLEND);
  };

  p.windowResized = function() { p.resizeCanvas(window.innerWidth, window.innerHeight); };
});
</script>
</body>
</html>
