<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Light Trails — p5 VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; font-family:monospace; font-size:13px; color:#0f0; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; font-family:monospace; font-size:12px; color:#888; background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Move mouse to paint neon trails</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let fpsEl = document.getElementById('fps');
  let frameAcc = 0, fpsTimer = 0, lastFps = 0;

  const NUM_PARTICLES = 20;
  let particles = [];
  let mouseTrail = [];
  let prevMX = -1, prevMY = -1;

  // Sparks
  let sparks = [];

  class Particle {
    constructor(id) {
      this.id = id;
      this.reset();
      // Start spread out
      this.age = Math.random() * this.maxAge;
    }
    reset() {
      this.cx = p.random(p.width);
      this.cy = p.random(p.height);
      this.rx = p.random(60, 200);
      this.ry = p.random(60, 200);
      this.phaseX = p.random(Math.PI * 2);
      this.phaseY = p.random(Math.PI * 2);
      // Lissajous frequency ratios
      this.freqX = p.random([1, 2, 3, 4, 5]);
      this.freqY = p.random([1, 2, 3, 4, 5]);
      this.speed = p.random(0.008, 0.025);
      this.hue = p.random(360);
      this.trail = [];
      this.age = 0;
      this.maxAge = p.random(300, 600);
    }
    update() {
      this.age++;
      if (this.age > this.maxAge) this.reset();
      let angle = this.age * this.speed;
      let x = this.cx + this.rx * Math.sin(this.freqX * angle + this.phaseX);
      let y = this.cy + this.ry * Math.sin(this.freqY * angle + this.phaseY);
      this.trail.push({x, y});
      if (this.trail.length > 80) this.trail.shift();
      this.hue = (this.hue + 0.4) % 360;
    }
    draw() {
      if (this.trail.length < 2) return;
      let hue = this.hue;
      for (let i = 1; i < this.trail.length; i++) {
        let alpha = i / this.trail.length;
        let a = this.trail[i-1], b = this.trail[i];
        // 4-layer glow
        // Outer wide halo
        p.stroke(hue, 80, 60, alpha * 12);
        p.strokeWeight(14);
        p.line(a.x, a.y, b.x, b.y);
        // Mid halo
        p.stroke(hue, 90, 80, alpha * 25);
        p.strokeWeight(7);
        p.line(a.x, a.y, b.x, b.y);
        // Inner glow
        p.stroke(hue, 70, 95, alpha * 55);
        p.strokeWeight(3);
        p.line(a.x, a.y, b.x, b.y);
        // Bright white core
        p.stroke(hue, 20, 100, alpha * 85);
        p.strokeWeight(1);
        p.line(a.x, a.y, b.x, b.y);
      }
      // Spark at tip
      if (Math.random() < 0.08) {
        let tip = this.trail[this.trail.length - 1];
        sparks.push({x: tip.x, y: tip.y, hue: hue, life: 1.0,
          vx: p.random(-3, 3), vy: p.random(-3, 3)});
      }
    }
  }

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    for (let i = 0; i < NUM_PARTICLES; i++) {
      particles.push(new Particle(i));
    }
    p.background(0);
  };

  p.draw = function() {
    // Fade background — additive feel
    p.blendMode(p.BLEND);
    p.noStroke();
    p.fill(0, 0, 0, 18);
    p.rect(0, 0, p.width, p.height);

    p.blendMode(p.ADD);
    p.noFill();

    // Autonomous particles
    for (let part of particles) {
      part.update();
      part.draw();
    }

    // Mouse trail
    if (p.mouseIsPressed || p.dist(p.mouseX, p.mouseY, p.pmouseX, p.pmouseY) > 2) {
      if (p.mouseX > 0 && p.mouseX < p.width) {
        mouseTrail.push({x: p.mouseX, y: p.mouseY, hue: (p.frameCount * 1.2) % 360});
      }
    }
    if (mouseTrail.length > 120) mouseTrail.shift();

    // Draw mouse trail
    if (mouseTrail.length > 1) {
      for (let i = 1; i < mouseTrail.length; i++) {
        let alpha = i / mouseTrail.length;
        let a = mouseTrail[i-1], b = mouseTrail[i];
        let hue = b.hue;
        // Wide outer halo
        p.stroke(hue, 70, 50, alpha * 18);
        p.strokeWeight(20);
        p.line(a.x, a.y, b.x, b.y);
        // Mid glow
        p.stroke(hue, 85, 85, alpha * 35);
        p.strokeWeight(9);
        p.line(a.x, a.y, b.x, b.y);
        // Inner bright
        p.stroke(hue, 60, 100, alpha * 70);
        p.strokeWeight(3);
        p.line(a.x, a.y, b.x, b.y);
        // White core
        p.stroke(0, 0, 100, alpha * 90);
        p.strokeWeight(1);
        p.line(a.x, a.y, b.x, b.y);
      }
      // Electric spark at mouse tip
      if (Math.random() < 0.15) {
        let tip = mouseTrail[mouseTrail.length - 1];
        for (let k = 0; k < 3; k++) {
          sparks.push({x: tip.x, y: tip.y, hue: tip.hue, life: 1.0,
            vx: p.random(-5, 5), vy: p.random(-5, 5)});
        }
      }
    }

    // Draw and update sparks
    for (let i = sparks.length - 1; i >= 0; i--) {
      let s = sparks[i];
      s.x += s.vx;
      s.y += s.vy;
      s.vx *= 0.9;
      s.vy *= 0.9;
      s.life -= 0.06;
      if (s.life <= 0) { sparks.splice(i, 1); continue; }
      p.stroke(s.hue, 50, 100, s.life * 90);
      p.strokeWeight(2);
      p.point(s.x, s.y);
      // Flash burst
      p.stroke(s.hue, 20, 100, s.life * 40);
      p.strokeWeight(5);
      p.point(s.x, s.y);
    }

    p.blendMode(p.BLEND);

    // FPS
    frameAcc++;
    fpsTimer += p.deltaTime;
    if (fpsTimer >= 500) {
      lastFps = Math.round(frameAcc * 1000 / fpsTimer);
      frameAcc = 0; fpsTimer = 0;
      fpsEl.textContent = lastFps + ' fps';
      fpsEl.style.color = lastFps >= 50 ? '#0f0' : lastFps >= 30 ? '#ff0' : '#f44';
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    p.background(0);
  };
});
</script>
</body>
</html>
