<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duffing Oscillator — Chaos/Attractors</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#666; font-family:monospace; font-size:12px; text-align:center; pointer-events:none; }
#params { position:fixed; top:44px; right:12px; color:#666; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; line-height:1.6; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="params">δ=0.3 γ=0.5 ω=1.2<br>Poincaré section<br>color=drive phase</div>
<div id="info">Duffing Oscillator Strange Attractor · Poincaré section (sampled once/period) · Left: phase orbit · Right: Poincaré</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  // Duffing: ẍ + δẋ - x + x³ = γcos(ωt)
  const DELTA = 0.3, GAMMA = 0.5, OMEGA = 1.2;
  const T_DRIVE = 2 * Math.PI / OMEGA;
  const dt = 0.005;
  const STEPS_PER_FRAME = 60;
  const TRANSIENT_PERIODS = 100;

  let tx, tvx, tt;
  let fpsEl;
  let fpsTime = 0, fpsFrames = 0;
  let pg; // pixel graphics for Poincaré
  let phaseTrail = []; // for phase portrait animation
  const PHASE_LEN = 600;
  let transientDone = false;
  let poincare_count = 0;
  let lastPeriodTime = 0;

  function duffing(x, vx, t) {
    const ax = -DELTA * vx + x - x*x*x + GAMMA * Math.cos(OMEGA * t);
    return ax;
  }

  function rk4Step() {
    const k1x = tvx;
    const k1v = duffing(tx, tvx, tt);
    const k2x = tvx + 0.5*dt*k1v;
    const k2v = duffing(tx + 0.5*dt*k1x, tvx + 0.5*dt*k1v, tt + 0.5*dt);
    const k3x = tvx + 0.5*dt*k2v;
    const k3v = duffing(tx + 0.5*dt*k2x, tvx + 0.5*dt*k2v, tt + 0.5*dt);
    const k4x = tvx + dt*k3v;
    const k4v = duffing(tx + dt*k3x, tvx + dt*k3v, tt + dt);
    tx  += dt/6*(k1x + 2*k2x + 2*k3x + k4x);
    tvx += dt/6*(k1v + 2*k2v + 2*k3v + k4v);
    tt  += dt;
  }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');

    tx = 1.0; tvx = 0.0; tt = 0.0;

    // Create off-screen Poincaré canvas (right half)
    const pw = Math.floor(p.width / 2);
    pg = p.createGraphics(pw, p.height);
    pg.colorMode(p.HSB, 360, 100, 100, 100);
    pg.background(0, 0, 4);

    // Run transient
    const transientSteps = Math.ceil(TRANSIENT_PERIODS * T_DRIVE / dt);
    for (let i = 0; i < transientSteps; i++) rk4Step();
    transientDone = true;
    lastPeriodTime = tt;
  };

  // Map Poincaré point to pixel on right-half canvas
  // x roughly in [-2, 2], vx in [-1.5, 1.5]
  function poincareToScreen(x, vx) {
    const pw = pg.width, ph = pg.height;
    const px = p.map(x, -2.2, 2.2, 20, pw - 20);
    const py = p.map(vx, -1.8, 1.8, ph - 20, 20);
    return [px, py];
  }

  p.draw = function() {
    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(fpsFrames * 1000 / (now - fpsTime));
      fpsFrames = 0; fpsTime = now;
    }

    // Integrate
    for (let s = 0; s < STEPS_PER_FRAME; s++) {
      rk4Step();
      // Check if we crossed a period boundary (Poincaré sampling)
      if (tt - lastPeriodTime >= T_DRIVE) {
        lastPeriodTime += T_DRIVE;
        // Plot Poincaré point
        const phase = ((tt % T_DRIVE) / T_DRIVE) * 360; // drive phase → hue
        const [px, py] = poincareToScreen(tx, tvx);
        pg.noStroke();
        pg.fill(phase, 85, 95, 80);
        pg.circle(px, py, 2);
        poincare_count++;
      }
      // Phase trail
      phaseTrail.push({ x: tx, vx: tvx });
      if (phaseTrail.length > PHASE_LEN) phaseTrail.shift();
    }

    // Left half: phase portrait
    const halfW = p.width / 2;
    // Dark overlay for fade effect
    p.fill(0, 0, 3, 30);
    p.noStroke();
    p.rect(0, 0, halfW, p.height);

    // Draw phase trail
    p.noFill();
    p.beginShape();
    for (let j = 0; j < phaseTrail.length; j++) {
      const age = j / phaseTrail.length;
      const pt = phaseTrail[j];
      // Map x: [-2.2, 2.2] → [20, halfW-20], vx: [-1.8, 1.8] → [height-20, 20]
      const sx = p.map(pt.x, -2.2, 2.2, 20, halfW - 20);
      const sy = p.map(pt.vx, -1.8, 1.8, p.height - 20, 20);
      const h = p.map(age, 0, 1, 180, 360);
      const al = age * age * 90;
      const bright = p.map(age, 0, 1, 20, 100);
      p.stroke(h, 80, bright, al);
      p.vertex(sx, sy);
    }
    p.endShape();

    // Current point
    const curSX = p.map(tx, -2.2, 2.2, 20, halfW - 20);
    const curSY = p.map(tvx, -1.8, 1.8, p.height - 20, 20);
    p.noStroke();
    p.fill(60, 90, 100, 95);
    p.circle(curSX, curSY, 8);

    // Axes for phase portrait
    p.stroke(0, 0, 35, 70);
    p.strokeWeight(1);
    p.line(0, p.height/2, halfW, p.height/2);
    p.line(halfW/2, 0, halfW/2, p.height);

    // Labels
    p.noStroke();
    p.fill(0, 0, 60, 80);
    p.textFont('monospace');
    p.textSize(11);
    p.textAlign(p.LEFT);
    p.text('Phase Portrait', 12, p.height - 8);
    p.text('x →', halfW - 40, p.height/2 - 6);
    p.text('ẋ ↑', halfW/2 + 6, 16);

    // Right half: Poincaré section
    p.image(pg, halfW, 0);

    // Divider
    p.stroke(0, 0, 30, 60);
    p.strokeWeight(1);
    p.line(halfW, 0, halfW, p.height);

    // Poincaré label
    p.noStroke();
    p.fill(0, 0, 60, 80);
    p.textAlign(p.LEFT);
    p.text('Poincaré Section · ' + poincare_count + ' pts', halfW + 8, p.height - 8);
  };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    const pw = Math.floor(p.width / 2);
    const oldPg = pg;
    pg = p.createGraphics(pw, p.height);
    pg.colorMode(p.HSB, 360, 100, 100, 100);
    pg.background(0, 0, 4);
    pg.image(oldPg, 0, 0);
  };
});
</script>
</body>
</html>
