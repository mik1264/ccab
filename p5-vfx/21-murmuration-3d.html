<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murmuration 3D | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const NUM_BIRDS = 2000;
        const BOUND = 600;
        const HALF = BOUND / 2;
        const SEP_RADIUS = 25;
        const ALIGN_RADIUS = 80;
        const COH_RADIUS = 80;
        const SEP_FORCE = 1.8;
        const ALIGN_FORCE = 1.0;
        const COH_FORCE = 0.9;
        const MIN_SPEED = 1.5;
        const MAX_SPEED = 3.5;

        // Spatial grid for neighbor lookup
        const CELL = 80; // grid cell size (must cover COH_RADIUS)
        const GCOLS = Math.ceil(BOUND / CELL) + 1;

        let birds = [];

        function createBird() {
            return {
                px: random(-HALF, HALF),
                py: random(-HALF, HALF),
                pz: random(-HALF, HALF),
                vx: random(-2, 2),
                vy: random(-2, 2),
                vz: random(-2, 2),
                ax: 0, ay: 0, az: 0,
            };
        }

        function gridKey(x, y, z) {
            let gx = Math.floor((x + HALF) / CELL);
            let gy = Math.floor((y + HALF) / CELL);
            let gz = Math.floor((z + HALF) / CELL);
            return gx + gy * GCOLS + gz * GCOLS * GCOLS;
        }

        function buildGrid() {
            let grid = {};
            for (let i = 0; i < birds.length; i++) {
                let b = birds[i];
                let k = gridKey(b.px, b.py, b.pz);
                if (!grid[k]) grid[k] = [];
                grid[k].push(i);
            }
            return grid;
        }

        function getNeighborIndices(grid, b) {
            let gx = Math.floor((b.px + HALF) / CELL);
            let gy = Math.floor((b.py + HALF) / CELL);
            let gz = Math.floor((b.pz + HALF) / CELL);
            let result = [];
            for (let dx = -1; dx <= 1; dx++) {
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dz = -1; dz <= 1; dz++) {
                        let k = (gx+dx) + (gy+dy)*GCOLS + (gz+dz)*GCOLS*GCOLS;
                        if (grid[k]) {
                            for (let idx of grid[k]) result.push(idx);
                        }
                    }
                }
            }
            return result;
        }

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);
            for (let i = 0; i < NUM_BIRDS; i++) birds.push(createBird());
            // Give all birds a coherent initial drift
            for (let b of birds) {
                let spd = random(MIN_SPEED, MAX_SPEED);
                let ang = random(TWO_PI);
                b.vx = cos(ang) * spd * 0.8;
                b.vz = sin(ang) * spd * 0.8;
                b.vy = random(-0.5, 0.5);
            }
            orbitControl(1, 1, 0.1);
        }

        // Density map for hue coloring — track neighbor count
        let densities = new Float32Array(NUM_BIRDS);

        function draw() {
            // Dark translucent background for trail effect
            background(0, 0, 5, 20);
            blendMode(ADD);

            // Build spatial grid
            let grid = buildGrid();

            // Update boids
            for (let i = 0; i < NUM_BIRDS; i++) {
                let b = birds[i];
                let neighs = getNeighborIndices(grid, b);

                let sepX = 0, sepY = 0, sepZ = 0;
                let alignX = 0, alignY = 0, alignZ = 0, alignCount = 0;
                let cohX = 0, cohY = 0, cohZ = 0, cohCount = 0;
                let density = 0;

                for (let j of neighs) {
                    if (j === i) continue;
                    let other = birds[j];
                    let dx = b.px - other.px;
                    let dy = b.py - other.py;
                    let dz = b.pz - other.pz;
                    let d2 = dx*dx + dy*dy + dz*dz;

                    if (d2 < SEP_RADIUS*SEP_RADIUS && d2 > 0) {
                        let d = Math.sqrt(d2);
                        sepX += dx / d;
                        sepY += dy / d;
                        sepZ += dz / d;
                    }
                    if (d2 < ALIGN_RADIUS*ALIGN_RADIUS) {
                        alignX += other.vx;
                        alignY += other.vy;
                        alignZ += other.vz;
                        alignCount++;
                    }
                    if (d2 < COH_RADIUS*COH_RADIUS) {
                        cohX += other.px;
                        cohY += other.py;
                        cohZ += other.pz;
                        cohCount++;
                        density++;
                    }
                }

                densities[i] = density;

                b.ax = sepX * SEP_FORCE;
                b.ay = sepY * SEP_FORCE;
                b.az = sepZ * SEP_FORCE;

                if (alignCount > 0) {
                    b.ax += (alignX / alignCount - b.vx) * ALIGN_FORCE;
                    b.ay += (alignY / alignCount - b.vy) * ALIGN_FORCE;
                    b.az += (alignZ / alignCount - b.vz) * ALIGN_FORCE;
                }
                if (cohCount > 0) {
                    b.ax += (cohX / cohCount - b.px) * COH_FORCE * 0.01;
                    b.ay += (cohY / cohCount - b.py) * COH_FORCE * 0.01;
                    b.az += (cohZ / cohCount - b.pz) * COH_FORCE * 0.01;
                }

                b.vx += b.ax * 0.1;
                b.vy += b.ay * 0.1;
                b.vz += b.az * 0.1;

                // Clamp speed
                let spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy + b.vz*b.vz);
                if (spd < MIN_SPEED) { let s = MIN_SPEED/spd; b.vx*=s; b.vy*=s; b.vz*=s; }
                if (spd > MAX_SPEED) { let s = MAX_SPEED/spd; b.vx*=s; b.vy*=s; b.vz*=s; }

                b.px += b.vx;
                b.py += b.vy;
                b.pz += b.vz;

                // Wrap boundaries
                if (b.px >  HALF) b.px -= BOUND;
                if (b.px < -HALF) b.px += BOUND;
                if (b.py >  HALF) b.py -= BOUND;
                if (b.py < -HALF) b.py += BOUND;
                if (b.pz >  HALF) b.pz -= BOUND;
                if (b.pz < -HALF) b.pz += BOUND;
            }

            // Auto-rotate slowly
            rotateY(frameCount * 0.003);
            rotateX(sin(frameCount * 0.0007) * 0.3);

            // Draw birds as elongated strokes
            for (let i = 0; i < NUM_BIRDS; i++) {
                let b = birds[i];
                let density = densities[i];

                // Hue: dense=warm (red/orange), sparse=cool (cyan/blue)
                let hue = map(density, 0, 30, 200, 20);
                let sat = map(density, 0, 30, 60, 90);
                let bri = 70 + density * 0.8;
                let alpha = 55 + density * 0.5;

                stroke(hue % 360, sat, min(bri, 100), min(alpha, 85));
                strokeWeight(1.0);

                // Draw as short line in velocity direction
                let spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy + b.vz*b.vz);
                let tail = 4.5 / (spd + 0.001);
                line(b.px, b.py, b.pz,
                     b.px - b.vx * tail, b.py - b.vy * tail, b.pz - b.vz * tail);
            }

            // FPS
            resetMatrix();
            blendMode(BLEND);
            fill(255, 0, 80, 90);
            noStroke();
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width/2 - 16, -height/2 + 16);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
