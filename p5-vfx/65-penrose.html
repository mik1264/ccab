<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penrose P3 Tiling — P5.js VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:50%; transform:translateX(-50%); color:#bbb; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.55); padding:6px 16px; border-radius:6px; z-index:999; text-align:center; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Penrose P3 Tiling — 5-fold symmetry — aperiodic</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const PHI = (1 + Math.sqrt(5)) / 2;
  let triangles = [];
  let fpsEl, infoEl;
  let zoomT = 0;
  let pulseBrightness = 0;

  // Triangle types: 'thin' (dart-like) and 'thick' (kite-like) golden gnomons
  // Using P3 Robinson triangles
  // Thick: isoceles with apex angle 36°, base angles 72°
  // Thin: isoceles with apex angle 108°, base angles 36°

  function newTriangle(type, ax, ay, bx, by, cx, cy) {
    return { type, ax, ay, bx, by, cx, cy };
  }

  function inflate(tri) {
    let { type, ax, ay, bx, by, cx, cy } = tri;
    let result = [];

    if (type === 'thick') {
      // Thick triangle: A is apex (36°), B and C are base (72°)
      // Split into: 1 thick + 1 thin
      // New point P on AB: AP/AB = 1/PHI
      let px = ax + (bx - ax) / PHI;
      let py = ay + (by - ay) / PHI;
      result.push(newTriangle('thick', cx, cy, px, py, bx, by));
      result.push(newTriangle('thin',  px, py, cx, cy, ax, ay));
    } else {
      // Thin triangle: A is apex (108°), B and C are base (36°)
      // New points Q on AB, R on AC
      let qx = bx + (ax - bx) / PHI;
      let qy = by + (ay - by) / PHI;
      let rx = cx + (ax - cx) / PHI;  // by symmetry
      let ry = cy + (ay - cy) / PHI;
      result.push(newTriangle('thin',  rx, ry, bx, by, qx, qy));
      result.push(newTriangle('thick', qx, qy, ax, ay, rx, ry));
      result.push(newTriangle('thin',  cx, cy, rx, ry, bx, by));
    }
    return result;
  }

  function buildTiling(generations) {
    // Start with a ring of 10 thick triangles (forming a star)
    let tris = [];
    for (let i = 0; i < 10; i++) {
      let angle = (i * Math.PI * 2) / 10;
      let a2 = ((i + 1) * Math.PI * 2) / 10;
      let r = 1.0;
      // Alternating orientation for the 10 triangles
      if (i % 2 === 0) {
        tris.push(newTriangle('thick',
          0, 0,
          r * Math.cos(angle), r * Math.sin(angle),
          r * Math.cos(a2), r * Math.sin(a2)));
      } else {
        tris.push(newTriangle('thick',
          0, 0,
          r * Math.cos(a2), r * Math.sin(a2),
          r * Math.cos(angle), r * Math.sin(angle)));
      }
    }

    // Inflate multiple times
    for (let gen = 0; gen < generations; gen++) {
      let next = [];
      for (let tri of tris) {
        let sub = inflate(tri);
        next = next.concat(sub);
      }
      tris = next;
    }
    return tris;
  }

  let generatedTriangles = [];
  let tileScale = 1;

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    infoEl = document.getElementById('info');

    // Build with 6 inflation generations
    let rawTris = buildTiling(6);
    // Compute scale to fit screen
    // With 6 inflations, scale by PHI^6 ≈ 17.9
    tileScale = Math.min(p.width, p.height) * 0.48 / (PHI * PHI * PHI * PHI * PHI * PHI);
    generatedTriangles = rawTris;
    infoEl.innerHTML = `Penrose P3 — ${rawTris.length} triangles — aperiodic 5-fold symmetry`;
  };

  p.draw = function() {
    p.background(0, 0, 4);
    if (p.frameCount % 15 === 0) fpsEl.textContent = Math.round(p.frameRate()) + ' fps';

    let t = p.millis() / 1000;
    // Slow pulsing zoom
    let zoom = 1.0 + 0.06 * Math.sin(t * 0.3);
    let scale = tileScale * zoom;

    // Slow color wave rotation
    let colorRotation = t * 18; // degrees per second

    p.push();
    p.translate(p.width / 2, p.height / 2);
    p.scale(scale);

    // Draw all triangles
    for (let tri of generatedTriangles) {
      let ax = tri.ax, ay = tri.ay;
      let bx = tri.bx, by = tri.by;
      let cx = tri.cx, cy = tri.cy;

      // Check rough visibility
      let centX = (ax + bx + cx) / 3 * scale;
      let centY = (ay + by + cy) / 3 * scale;
      if (Math.abs(centX) > p.width * 0.7 || Math.abs(centY) > p.height * 0.7) continue;

      // Color based on type and local angle
      let localAngle = Math.atan2(ay + by + cy, ax + bx + cx);
      let dist = Math.sqrt(((ax+bx+cx)/3)**2 + ((ay+by+cy)/3)**2);

      let hue, sat, bri;
      if (tri.type === 'thick') {
        hue = (200 + colorRotation + localAngle * (180 / Math.PI) + dist * 5) % 360;
        sat = 75;
        bri = 72;
      } else {
        hue = (30 + colorRotation + localAngle * (180 / Math.PI) + dist * 5) % 360;
        sat = 80;
        bri = 85;
      }

      // Pulse brightness
      let pulse = 1.0 + 0.12 * Math.sin(t * 0.8 + dist * 0.3);
      bri = Math.min(100, bri * pulse);

      p.fill(hue, sat, bri, 92);
      p.stroke(0, 0, 0, 50);
      p.strokeWeight(0.5 / scale);

      p.beginShape();
      p.vertex(ax, ay);
      p.vertex(bx, by);
      p.vertex(cx, cy);
      p.endShape(p.CLOSE);
    }

    // Draw subtle edges on top for crispness
    p.noFill();
    p.stroke(0, 0, 100, 12);
    p.strokeWeight(0.3 / scale);
    for (let tri of generatedTriangles) {
      let centX = (tri.ax + tri.bx + tri.cx) / 3 * scale;
      let centY = (tri.ay + tri.by + tri.cy) / 3 * scale;
      if (Math.abs(centX) > p.width * 0.7 || Math.abs(centY) > p.height * 0.7) continue;
      p.beginShape();
      p.vertex(tri.ax, tri.ay);
      p.vertex(tri.bx, tri.by);
      p.vertex(tri.cx, tri.cy);
      p.endShape(p.CLOSE);
    }

    p.pop();
  };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
  };
});
</script>
</body>
</html>
