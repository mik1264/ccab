<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyclic Cellular Automaton | P5 VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#hud { position:fixed; top:12px; right:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.75); padding:8px 12px; border-radius:6px; z-index:999; line-height:1.9; }
#keys { position:fixed; bottom:12px; left:12px; color:#444; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:4px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="hud">N: <span id="nstates">8</span><br>Thresh: <span id="thresh">2</span><br>FPS: <span id="fps">0</span><br>GEN: <span id="gen">0</span></div>
<div id="keys">R: reset · N: next preset</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  // 1px cells for full-canvas density
  let cols, rows;
  let grid, next;
  let N = 8, THRESH = 2;
  let gen = 0;
  let fpsTimer=0,fpsCount=0,fpsVal=0;
  let presetIdx=0;

  // Interesting presets: [N, threshold]
  const PRESETS=[
    [8,2],[16,2],[5,2],[3,3],[12,3],[6,1],[10,3],[4,2]
  ];

  p.setup=function(){
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB,360,100,100,100);
    p.pixelDensity(1);
    cols=p.width; rows=p.height;
    grid=new Uint8Array(cols*rows);
    next=new Uint8Array(cols*rows);
    reset();
  };

  function reset(){
    [N,THRESH]=PRESETS[presetIdx];
    gen=0;
    for(let i=0;i<cols*rows;i++) grid[i]=Math.floor(Math.random()*N);
    document.getElementById('nstates').textContent=N;
    document.getElementById('thresh').textContent=THRESH;
  }

  function step(){
    const succ=(v)=>(v+1)%N;
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const i=r*cols+c;
        const v=grid[i];
        const s=succ(v);
        let cnt=0;
        // Moore neighborhood
        for(let dr=-1;dr<=1;dr++){
          const rr=(r+dr+rows)%rows;
          for(let dc=-1;dc<=1;dc++){
            if(dr===0&&dc===0) continue;
            const cc=(c+dc+cols)%cols;
            if(grid[rr*cols+cc]===s) cnt++;
          }
        }
        next[i]=cnt>=THRESH?s:v;
      }
    }
    const tmp=grid; grid=next; next=tmp;
    gen++;
  }

  p.draw=function(){
    fpsCount++;
    const now=performance.now();
    if(now-fpsTimer>=500){
      fpsVal=Math.round(fpsCount/((now-fpsTimer)/1000));
      fpsCount=0; fpsTimer=now;
    }

    step();

    p.loadPixels();
    for(let i=0;i<cols*rows;i++){
      const v=grid[i];
      const hue=(v/N)*360;
      const sat=90;
      const bri=v===0?15:75;
      const [R,G,B]=hsbToRgb(hue,sat,bri);
      p.pixels[i*4]=R; p.pixels[i*4+1]=G; p.pixels[i*4+2]=B; p.pixels[i*4+3]=255;
    }
    p.updatePixels();

    document.getElementById('fps').textContent=fpsVal;
    document.getElementById('gen').textContent=gen;

    // Auto-cycle presets every 600 gens
    if(gen>0&&gen%600===0){
      presetIdx=(presetIdx+1)%PRESETS.length;
      reset();
    }
  };

  function hsbToRgb(h,s,b){
    h=((h%360)+360)%360; s/=100; b/=100;
    const c=b*s,x=c*(1-Math.abs((h/60)%2-1)),m=b-c;
    let r=0,g=0,bl=0;
    if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;bl=x;}
    else if(h<240){g=x;bl=c;}else if(h<300){r=x;bl=c;}else{r=c;bl=x;}
    return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((bl+m)*255)];
  }

  p.keyPressed=function(){
    if(p.key==='r'||p.key==='R') reset();
    if(p.key==='n'||p.key==='N'){
      presetIdx=(presetIdx+1)%PRESETS.length;
      reset();
    }
  };

  p.windowResized=function(){
    p.resizeCanvas(p.windowWidth,p.windowHeight);
    cols=p.width; rows=p.height;
    grid=new Uint8Array(cols*rows); next=new Uint8Array(cols*rows);
    reset();
  };
});
</script>
</body>
</html>
