<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupled Oscillator Lattice</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#fps { position:fixed; top:12px; left:50%; transform:translateX(-50%); color:#0f0; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:5px; z-index:999; }
#hint {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  color: #888;
  font-family: monospace;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
  padding: 6px 14px;
  border-radius: 6px;
  z-index: 999;
}
#modes {
  position: fixed;
  top: 12px;
  right: 12px;
  color: #aaa;
  font-family: monospace;
  font-size: 11px;
  background: rgba(0,0,0,0.7);
  padding: 8px 12px;
  border-radius: 6px;
  z-index: 999;
  line-height: 1.8;
  min-width: 160px;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="hint">Click to kick oscillator · [1-5] load modes</div>
<div id="modes">Mode energies:<br><span id="modeList">-</span></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const N = 20;
  const K_spring = 0.08;    // coupling constant
  const K_self = 0.015;     // self restoring
  const DAMPING = 0.9992;

  let u = [], v = []; // displacement, velocity
  let cellW, cellH;
  let fpsDiv = document.getElementById('fps');
  let modeListDiv = document.getElementById('modeList');
  let time = 0;

  p.setup = function() {
    let cnv = p.createCanvas(p.windowWidth, p.windowHeight);
    cnv.parent(document.body);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    initArrays();
    loadMode(1);
    cellW = p.width / N;
    cellH = p.height / N;
  };

  function initArrays() {
    u = Array.from({length: N}, () => new Float32Array(N));
    v = Array.from({length: N}, () => new Float32Array(N));
  }

  function loadMode(mode) {
    initArrays();
    switch(mode) {
      case 1: // (1,1) fundamental
        for (let r = 0; r < N; r++)
          for (let c = 0; c < N; c++)
            u[r][c] = 3 * Math.sin(Math.PI * r/(N-1)) * Math.sin(Math.PI * c/(N-1));
        break;
      case 2: // (2,1)
        for (let r = 0; r < N; r++)
          for (let c = 0; c < N; c++)
            u[r][c] = 3 * Math.sin(2*Math.PI * r/(N-1)) * Math.sin(Math.PI * c/(N-1));
        break;
      case 3: // (2,2)
        for (let r = 0; r < N; r++)
          for (let c = 0; c < N; c++)
            u[r][c] = 3 * Math.sin(2*Math.PI * r/(N-1)) * Math.sin(2*Math.PI * c/(N-1));
        break;
      case 4: // checkerboard (N/2, N/2) fast mode
        for (let r = 0; r < N; r++)
          for (let c = 0; c < N; c++)
            u[r][c] = 2 * (((r+c) % 2 === 0) ? 1 : -1);
        break;
      case 5: // random
        for (let r = 0; r < N; r++)
          for (let c = 0; c < N; c++)
            u[r][c] = p.random(-3, 3);
        break;
    }
  }

  function step() {
    let nu = Array.from({length: N}, () => new Float32Array(N));
    let nv = Array.from({length: N}, () => new Float32Array(N));

    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        let laplacian = 0;
        if (r > 0)   laplacian += u[r-1][c] - u[r][c];
        if (r < N-1) laplacian += u[r+1][c] - u[r][c];
        if (c > 0)   laplacian += u[r][c-1] - u[r][c];
        if (c < N-1) laplacian += u[r][c+1] - u[r][c];

        let acc = K_spring * laplacian - K_self * u[r][c];
        nv[r][c] = (v[r][c] + acc) * DAMPING;
        nu[r][c] = u[r][c] + nv[r][c];
      }
    }
    u = nu; v = nv;
    time++;
  }

  function computeModeEnergies() {
    // Approximate first 5 mode energies via projection
    let modes = [[1,1],[2,1],[1,2],[2,2],[3,1]];
    let energies = modes.map(([m, n]) => {
      let e = 0;
      for (let r = 0; r < N; r++)
        for (let c = 0; c < N; c++)
          e += u[r][c] * Math.sin(m*Math.PI*r/(N-1)) * Math.sin(n*Math.PI*c/(N-1));
      return Math.abs(e) / (N*N);
    });
    return {modes, energies};
  }

  p.mousePressed = function() {
    let r = Math.floor(p.mouseY / cellH);
    let c = Math.floor(p.mouseX / cellW);
    if (r >= 0 && r < N && c >= 0 && c < N) {
      // Gaussian kick
      for (let dr = -3; dr <= 3; dr++)
        for (let dc = -3; dc <= 3; dc++) {
          let rr = r+dr, cc = c+dc;
          if (rr < 0 || rr >= N || cc < 0 || cc >= N) continue;
          u[rr][cc] += 4 * Math.exp(-(dr*dr+dc*dc)/4);
        }
    }
  };

  p.keyPressed = function() {
    let k = parseInt(p.key);
    if (k >= 1 && k <= 5) loadMode(k);
  };

  p.draw = function() {
    p.background(0, 0, 5);

    for (let s = 0; s < 4; s++) step();

    cellW = p.width / N;
    cellH = p.height / N;

    // Render cells
    p.noStroke();
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        let val = u[r][c];
        let t = p.constrain(val / 4, -1, 1);
        let hue, sat, bri;
        if (t > 0) {
          hue = p.map(t, 0, 1, 200, 0);   // blue->red
          sat = 80 + t * 20;
          bri = 20 + t * 80;
        } else {
          hue = p.map(-t, 0, 1, 200, 240); // blue->indigo
          sat = 80 + (-t) * 20;
          bri = 20 + (-t) * 80;
        }
        p.fill(hue, sat, bri, 95);
        let offX = t * 2;
        let offY = t * 2;
        p.rect(c*cellW + offX, r*cellH + offY, cellW - 0.5, cellH - 0.5, 1);
      }
    }

    // Grid lines (subtle)
    p.stroke(0, 0, 20, 30);
    p.strokeWeight(0.3);
    for (let r = 0; r <= N; r++) p.line(0, r*cellH, p.width, r*cellH);
    for (let c = 0; c <= N; c++) p.line(c*cellW, 0, c*cellW, p.height);

    if (p.frameCount % 30 === 0) {
      fpsDiv.textContent = 'FPS: ' + Math.round(p.frameRate());
      let {modes, energies} = computeModeEnergies();
      let maxE = Math.max(...energies, 0.001);
      let lines = modes.map(([m,n], i) => {
        let bar = '█'.repeat(Math.round(energies[i]/maxE * 8));
        return `(${m},${n}): ${bar} ${energies[i].toFixed(2)}`;
      });
      modeListDiv.innerHTML = lines.join('<br>');
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    cellW = p.width / N;
    cellH = p.height / N;
  };
});
</script>
</body>
</html>
