<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starfield Warp Speed</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#0f0; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#speed-label { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); color:#aaa; font-family:monospace; font-size:12px; letter-spacing:2px; z-index:999; }
#speed-bar-wrap { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:200px; height:6px; background:rgba(255,255,255,0.1); border-radius:3px; z-index:999; }
#speed-bar { height:100%; width:0%; background:linear-gradient(90deg,#00f,#fff); border-radius:3px; transition:width 0.1s; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="speed-label">CLICK TO ENGAGE WARP</div>
<div id="speed-bar-wrap"><div id="speed-bar"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const sketch = (p) => {
  const NUM_STARS = 500;
  let stars = [];
  let speed = 2, targetSpeed = 2;
  let warp = false;
  let fpsEl, speedBar, speedLabel, frameCount2 = 0, fpsTimer = 0;

  class Star {
    constructor() { this.reset(true); }
    reset(initial) {
      this.x = p.random(-p.width/2, p.width/2);
      this.y = p.random(-p.height/2, p.height/2);
      this.z = initial ? p.random(1, p.width) : p.width;
      this.pz = this.z;
    }
    update() {
      this.pz = this.z;
      this.z -= speed;
      if (this.z <= 1) this.reset(false);
    }
    draw() {
      let sx = p.map(this.x / this.z, 0, 1, 0, p.width);
      let sy = p.map(this.y / this.z, 0, 1, 0, p.height);
      let px2 = p.map(this.x / this.pz, 0, 1, 0, p.width);
      let py2 = p.map(this.y / this.pz, 0, 1, 0, p.height);

      let r = p.map(this.z, 0, p.width, 4, 0.2);
      let brightness = p.map(this.z, 0, p.width, 100, 15);
      // Color by depth: far=blue, close=white
      let hue = p.map(this.z, 0, p.width, 200, 220);
      let sat = p.map(this.z, 0, p.width, 5, 70);

      if (speed > 8) {
        // Draw streak
        let sw = p.max(0.3, p.map(speed, 8, 60, 0.5, 2.5));
        p.strokeWeight(sw);
        p.stroke(hue, sat, brightness, p.map(this.z, 0, p.width, 100, 10));
        p.line(px2, py2, sx, sy);
      } else {
        p.noStroke();
        p.fill(hue, sat, brightness, p.map(this.z, 0, p.width, 100, 5));
        p.circle(sx, sy, r);
      }
    }
  }

  p.setup = () => {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    speedBar = document.getElementById('speed-bar');
    speedLabel = document.getElementById('speed-label');
    for (let i = 0; i < NUM_STARS; i++) stars.push(new Star());
  };

  p.mousePressed = () => {
    warp = !warp;
    targetSpeed = warp ? 55 : 2;
    speedLabel.textContent = warp ? 'WARP ENGAGED' : 'CLICK TO ENGAGE WARP';
  };

  p.draw = () => {
    p.blendMode(p.BLEND);
    p.background(0, 0, 2);
    p.blendMode(p.ADD);

    speed = p.lerp(speed, targetSpeed, 0.04);
    speedBar.style.width = p.map(speed, 2, 55, 2, 100) + '%';

    // Faint grid for depth reference
    if (speed > 5) {
      p.blendMode(p.BLEND);
      p.stroke(220, 50, 20, p.map(speed, 5, 55, 0, 15));
      p.strokeWeight(0.5);
      let gridSize = 80;
      for (let gx = 0; gx < p.width; gx += gridSize) {
        p.line(gx, 0, gx, p.height);
      }
      for (let gy = 0; gy < p.height; gy += gridSize) {
        p.line(0, gy, p.width, gy);
      }
      p.blendMode(p.ADD);
    }

    p.translate(p.width / 2, p.height / 2);
    for (let s of stars) { s.update(); s.draw(); }

    frameCount2++;
    let now = p.millis();
    if (now - fpsTimer > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(frameCount2 / ((now - fpsTimer) / 1000));
      frameCount2 = 0; fpsTimer = now;
    }
  };

  p.windowResized = () => {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    stars.forEach(s => s.reset(true));
  };
};
new p5(sketch);
</script>
</body>
</html>
