<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acid Wave — Domain-Warped Color — p5 VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; font-family:monospace; font-size:13px; color:#0f0; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; font-family:monospace; font-size:12px; color:#888; background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Domain-warped Perlin noise — 3 levels of warping</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let t = 0;
  let fpsEl = document.getElementById('fps');
  let frameAcc = 0, fpsTimer = 0, lastFps = 0;
  const SCALE = 2;
  let W, H;
  // Warp strength animated
  let warpAmp = 1.8;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    W = Math.ceil(p.width / SCALE);
    H = Math.ceil(p.height / SCALE);
  };

  // Domain warped noise — 3 levels
  function domainWarpedNoise(x, y, time) {
    let freq = 1.5;
    // Level 1 warp
    let w1x = p.noise(x * freq + 0.0, y * freq + 0.0, time * 0.4) - 0.5;
    let w1y = p.noise(x * freq + 5.2, y * freq + 1.3, time * 0.4) - 0.5;

    // Level 2 warp — using level 1 output
    let q1x = x + warpAmp * w1x;
    let q1y = y + warpAmp * w1y;
    let w2x = p.noise(q1x * freq + 1.7, q1y * freq + 9.2, time * 0.35) - 0.5;
    let w2y = p.noise(q1x * freq + 8.3, q1y * freq + 2.8, time * 0.35) - 0.5;

    // Level 3 warp — using level 2 output
    let q2x = q1x + warpAmp * 0.7 * w2x;
    let q2y = q1y + warpAmp * 0.7 * w2y;
    let w3x = p.noise(q2x * freq + 3.3, q2y * freq + 6.1, time * 0.3) - 0.5;
    let w3y = p.noise(q2x * freq + 11.4, q2y * freq + 4.7, time * 0.3) - 0.5;

    // Final sample at triply-warped position
    let q3x = q2x + warpAmp * 0.5 * w3x;
    let q3y = q2y + warpAmp * 0.5 * w3y;

    // Multi-octave sample at warped position
    let v = p.noise(q3x * 2.0, q3y * 2.0, time * 0.5)
          + 0.5 * p.noise(q3x * 4.0 + 20, q3y * 4.0 + 20, time * 0.7)
          + 0.25 * p.noise(q3x * 8.0 + 40, q3y * 8.0 + 40, time * 0.9);
    v /= 1.75;
    return v;
  }

  p.draw = function() {
    // Pulse warp amplitude
    warpAmp = 1.5 + 0.8 * Math.sin(t * 0.3);

    p.loadPixels();
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        let nx = x / W * 3.0; // scale to noise space
        let ny = y / H * 3.0;

        let v = domainWarpedNoise(nx, ny, t);

        // Map noise → vivid HSB
        // Full color cycle with smooth, lava-lamp continuity
        let hue = (v * 360.0 + t * 25.0) % 360;
        let sat = 92 + 8 * Math.sin(v * Math.PI * 6 + t);
        let bri = 45 + 50 * v + 5 * Math.sin(v * Math.PI * 4);

        let h = hue / 60.0, s = sat / 100.0, b = bri / 100.0;
        let hi = Math.floor(h) % 6, f = h - Math.floor(h);
        let pv=b*(1-s), qv=b*(1-s*f), tv=b*(1-s*(1-f));
        let r,g,b2;
        if(hi===0){r=b;g=tv;b2=pv;}
        else if(hi===1){r=qv;g=b;b2=pv;}
        else if(hi===2){r=pv;g=b;b2=tv;}
        else if(hi===3){r=pv;g=qv;b2=b;}
        else if(hi===4){r=tv;g=pv;b2=b;}
        else{r=b;g=pv;b2=qv;}

        for (let dy = 0; dy < SCALE; dy++) {
          for (let dx = 0; dx < SCALE; dx++) {
            let px = x * SCALE + dx, py = y * SCALE + dy;
            if (px >= p.width || py >= p.height) continue;
            let idx = 4 * (py * p.width + px);
            p.pixels[idx]   = r * 255;
            p.pixels[idx+1] = g * 255;
            p.pixels[idx+2] = b2 * 255;
            p.pixels[idx+3] = 255;
          }
        }
      }
    }
    p.updatePixels();
    t += 0.012;

    // FPS
    frameAcc++;
    fpsTimer += p.deltaTime;
    if (fpsTimer >= 500) {
      lastFps = Math.round(frameAcc * 1000 / fpsTimer);
      frameAcc = 0; fpsTimer = 0;
      fpsEl.textContent = lastFps + ' fps';
      fpsEl.style.color = lastFps >= 50 ? '#0f0' : lastFps >= 30 ? '#ff0' : '#f44';
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    W = Math.ceil(p.width / SCALE);
    H = Math.ceil(p.height / SCALE);
  };
});
</script>
</body>
</html>
