<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bifurcation Diagram — Chaos/Attractors</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#666; font-family:monospace; font-size:12px; text-align:center; pointer-events:none; }
#rval { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); color:#999; font-family:monospace; font-size:13px; text-align:center; pointer-events:none; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="rval"></div>
<div id="info">Logistic Map Bifurcation · x = rx(1-x) · r: 2.5 → 4.0 · Move mouse to explore</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const TRANSIENT = 300;
  const PLOT_ITERS = 200;
  const R_MIN = 2.5, R_MAX = 4.0;

  let fpsEl, rvalEl;
  let fpsTime = 0, fpsFrames = 0;
  let scanX = 0;
  let scanPhase = 0; // 0=initial build, 1=highlight sweep
  let pg; // off-screen graphics for the diagram

  // Bifurcation points for annotation
  const BIFS = [
    { r: 3.0,     label: 'r=3.0\nPeriod 2', period: 2 },
    { r: 3.449,   label: 'r=3.449\nPeriod 4', period: 4 },
    { r: 3.544,   label: 'r=3.544\nPeriod 8', period: 8 },
    { r: 3.5688,  label: 'Chaos onset', period: 0 },
  ];

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    rvalEl = document.getElementById('rval');
    pg = p.createGraphics(p.width, p.height);
    pg.colorMode(p.HSB, 360, 100, 100, 100);
    pg.background(0, 0, 5);
    pg.loadPixels();
    scanX = 0;
  };

  function rFromX(x) {
    return p.map(x, 0, p.width, R_MIN, R_MAX);
  }
  function yFromX(x) {
    return p.map(x, 0, p.height, 1, 0);
  }

  function drawColumn(col) {
    const r = rFromX(col);
    let x = 0.5;
    // Transient
    for (let i = 0; i < TRANSIENT; i++) {
      x = r * x * (1 - x);
    }
    // Plot
    for (let i = 0; i < PLOT_ITERS; i++) {
      x = r * x * (1 - x);
      const py = Math.floor(p.map(x, 0, 1, p.height - 1, 0));
      if (py < 0 || py >= p.height) continue;
      const pidx = (py * p.width + col) * 4;
      // color: hue = r mapped to full spectrum
      const hue = p.map(r, R_MIN, R_MAX, 200, 0);
      const [r2, g2, b2] = hsbToRgb(hue / 360, 0.9, 1.0);
      // accumulate brightness
      pg.pixels[pidx]   = Math.min(255, pg.pixels[pidx]   + r2 * 60);
      pg.pixels[pidx+1] = Math.min(255, pg.pixels[pidx+1] + g2 * 60);
      pg.pixels[pidx+2] = Math.min(255, pg.pixels[pidx+2] + b2 * 60);
      pg.pixels[pidx+3] = 255;
    }
  }

  function hsbToRgb(h, s, v) {
    let r, g, b;
    const i = Math.floor(h * 6);
    const f = h * 6 - i;
    const p2 = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
    switch (i % 6) {
      case 0: r=v; g=t; b=p2; break; case 1: r=q; g=v; b=p2; break;
      case 2: r=p2; g=v; b=t; break; case 3: r=p2; g=q; b=v; break;
      case 4: r=t; g=p2; b=v; break; case 5: r=v; g=p2; b=q; break;
    }
    return [r * 255, g * 255, b * 255];
  }

  const COLS_PER_FRAME = 8;

  p.draw = function() {
    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(fpsFrames * 1000 / (now - fpsTime));
      fpsFrames = 0; fpsTime = now;
    }

    // Build diagram column by column
    if (scanX < p.width) {
      pg.loadPixels();
      for (let c = 0; c < COLS_PER_FRAME && scanX < p.width; c++, scanX++) {
        drawColumn(scanX);
      }
      pg.updatePixels();
    }

    p.image(pg, 0, 0);

    // Axes labels
    p.noStroke();
    p.fill(0, 0, 60, 80);
    p.textFont('monospace');
    p.textSize(11);
    p.textAlign(p.LEFT);
    p.text('r=2.5', 4, p.height - 4);
    p.textAlign(p.RIGHT);
    p.text('r=4.0', p.width - 4, p.height - 4);
    p.textAlign(p.LEFT);
    p.text('x=1.0', 4, 14);
    p.text('x=0.0', 4, p.height - 14);

    // Bifurcation markers
    for (const bif of BIFS) {
      const bx = p.map(bif.r, R_MIN, R_MAX, 0, p.width);
      p.stroke(0, 0, 70, 60);
      p.strokeWeight(1);
      p.drawingContext.setLineDash([4, 4]);
      p.line(bx, 0, bx, p.height);
      p.drawingContext.setLineDash([]);
      p.noStroke();
      p.fill(50, 80, 100, 90);
      p.textAlign(p.LEFT);
      p.textSize(10);
      p.text(bif.label.split('\n')[0], bx + 3, 30 + BIFS.indexOf(bif) * 30);
      p.fill(0, 0, 70, 70);
      p.text(bif.label.split('\n')[1] || '', bx + 3, 42 + BIFS.indexOf(bif) * 30);
    }

    // Mouse: show r value under cursor
    if (p.mouseX >= 0 && p.mouseX < p.width) {
      const r = rFromX(p.mouseX);
      rvalEl.textContent = 'r = ' + r.toFixed(4);
      // Vertical line at mouse
      p.stroke(0, 0, 100, 40);
      p.strokeWeight(1);
      p.line(p.mouseX, 0, p.mouseX, p.height);
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    pg = p.createGraphics(p.width, p.height);
    pg.colorMode(p.HSB, 360, 100, 100, 100);
    pg.background(0, 0, 5);
    pg.loadPixels();
    scanX = 0;
  };
});
</script>
</body>
</html>
