<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4D Tesseract Shadow — p5-vfx</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  .back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  .back-link:hover { color:#fff; }
  #fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  #info { position:fixed; bottom:12px; left:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; line-height:1.6; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">4D Tesseract (Hypercube)<br>Rotating in XW, YW, ZW planes<br>Color: W coordinate (blue=-1, red=+1)<br>Drag to orbit</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  // 16 vertices of 4D hypercube: ±1 in all 4 dimensions
  const verts4D = [];
  for (let x = -1; x <= 1; x += 2)
    for (let y = -1; y <= 1; y += 2)
      for (let z = -1; z <= 1; z += 2)
        for (let w = -1; w <= 1; w += 2)
          verts4D.push([x, y, z, w]);

  // 32 edges: pairs that differ in exactly one coordinate
  const edges = [];
  for (let i = 0; i < 16; i++)
    for (let j = i+1; j < 16; j++) {
      let diff = 0;
      for (let k = 0; k < 4; k++) if (verts4D[i][k] !== verts4D[j][k]) diff++;
      if (diff === 1) edges.push([i, j]);
    }

  let angXW = 0, angYW = 0, angZW = 0;
  let fpsArr = [], lastTime = 0;

  // 4D rotation matrices
  function rotXW(v, a) {
    const c = Math.cos(a), s = Math.sin(a);
    return [c*v[0]-s*v[3], v[1], v[2], s*v[0]+c*v[3]];
  }
  function rotYW(v, a) {
    const c = Math.cos(a), s = Math.sin(a);
    return [v[0], c*v[1]-s*v[3], v[2], s*v[1]+c*v[3]];
  }
  function rotZW(v, a) {
    const c = Math.cos(a), s = Math.sin(a);
    return [v[0], v[1], c*v[2]-s*v[3], s*v[2]+c*v[3]];
  }
  function rotXY(v, a) {
    const c = Math.cos(a), s = Math.sin(a);
    return [c*v[0]-s*v[1], s*v[0]+c*v[1], v[2], v[3]];
  }
  function rotYZ(v, a) {
    const c = Math.cos(a), s = Math.sin(a);
    return [v[0], c*v[1]-s*v[2], s*v[1]+c*v[2], v[3]];
  }

  // Project 4D → 3D via perspective (w-distance)
  function project4Dto3D(v) {
    const wDist = 3;
    const wFactor = 1 / (wDist - v[3]);
    return [v[0] * wFactor, v[1] * wFactor, v[2] * wFactor, v[3]];
  }

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
  };

  p.draw = function() {
    p.background(0, 0, 5);
    p.orbitControl(3, 3, 0.05);
    p.ambientLight(60);
    p.directionalLight(255, 255, 255, 0, -1, -0.5);

    angXW += 0.007;
    angYW += 0.011;
    angZW += 0.005;

    // Transform all verts
    const projected = verts4D.map(v => {
      let r = rotXW(v, angXW);
      r = rotYW(r, angYW);
      r = rotZW(r, angZW);
      r = rotXY(r, angXW * 0.4);
      r = rotYZ(r, angYW * 0.3);
      return project4Dto3D(r);
    });

    const S = 160;

    // Draw edges
    for (const [i, j] of edges) {
      const a = projected[i], b = projected[j];
      const midW = (a[3] + b[3]) / 2;
      // Map w: -1..+1 → blue→red (hue 240→0)
      const hue = ((1 - (midW + 1) / 2) * 240) % 360;
      const sat = 90;
      const bri = 70 + 25 * Math.abs(midW);
      const alpha = 60 + 30 * Math.abs(midW);

      p.stroke(hue, sat, bri, alpha);
      p.strokeWeight(1.5 + 2 * Math.abs(midW));
      p.beginShape(p.LINES);
      p.vertex(a[0]*S, a[1]*S, a[2]*S);
      p.vertex(b[0]*S, b[1]*S, b[2]*S);
      p.endShape();
    }

    // Draw vertex spheres colored by W
    p.noStroke();
    for (const v of projected) {
      const hue = ((1 - (v[3] + 1) / 2) * 240) % 360;
      p.fill(hue, 90, 95, 85);
      p.ambientMaterial(hue, 90, 95);
      const sz = 4 + 5 * Math.abs(v[3]);
      p.push();
      p.translate(v[0]*S, v[1]*S, v[2]*S);
      p.sphere(sz, 8, 8);
      p.pop();
    }

    // FPS
    const now = p.millis();
    const dt  = now - lastTime; lastTime = now;
    fpsArr.push(1000/dt);
    if (fpsArr.length > 30) fpsArr.shift();
    const fps = Math.round(fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length);
    document.getElementById('fps').textContent = `FPS: ${fps}`;
  };

  p.windowResized = function() { p.resizeCanvas(p.windowWidth, p.windowHeight); };
});
</script>
</body>
</html>
