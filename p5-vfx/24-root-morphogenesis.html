<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root Morphogenesis | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0605; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

// Space Colonization Root Morphogenesis
// Root system grows toward scattered nutrient points

var nutrients = [];
var rootSegments = [];
var rootTips = [];
var stepsPerFrame = 5;
var influenceRadius = 180;
var killRadius = 12;
var segmentLength = 6;
var maxNutrients = 900;
var nutrientFlashes = [];

function setup() {
    createCanvas(windowWidth, windowHeight);
    colorMode(HSB, 360, 100, 100, 100);
    frameRate(60);

    scatterNutrients();

    // Start with a single root at top-center going downward
    var startX = width / 2;
    var startY = height * 0.05;

    // Trunk node
    rootSegments.push({
        x: startX, y: startY,
        px: startX, py: startY - segmentLength,
        generation: 0,
        thickness: 5
    });

    // Initial root tip
    rootTips.push({
        x: startX, y: startY,
        dx: 0, dy: 1,
        generation: 0,
        active: true
    });
}

function scatterNutrients() {
    nutrients = [];
    for (var i = 0; i < maxNutrients; i++) {
        nutrients.push({
            x: Math.random() * width,
            y: height * 0.1 + Math.random() * height * 0.88,
            alive: true,
            flashAge: -1
        });
    }
}

function draw() {
    // Dark soil background
    background(20, 70, 4, 100);

    // Draw soil texture (subtle noise lines)
    push();
    stroke(25, 50, 12, 25);
    strokeWeight(0.5);
    for (var sy = 0; sy < height; sy += 8) {
        var xOff = noise(sy * 0.02, frameCount * 0.001) * 40 - 20;
        line(xOff, sy, width + xOff, sy);
    }
    pop();

    // Run growth steps
    for (var s = 0; s < stepsPerFrame; s++) {
        growRoots();
    }

    // Draw nutrient flashes
    drawNutrientFlashes();

    // Draw nutrients
    push();
    noStroke();
    for (var n = 0; n < nutrients.length; n++) {
        var nut = nutrients[n];
        if (!nut.alive) continue;
        // Faint moisture dot
        var pulse = sin(frameCount * 0.04 + nut.x * 0.05) * 5;
        fill(140, 60, 30 + pulse, 40);
        ellipse(nut.x, nut.y, 3, 3);
    }
    pop();

    // Draw root segments
    push();
    for (var i = 0; i < rootSegments.length; i++) {
        var seg = rootSegments[i];
        var gen = seg.generation;
        // Thickness decreases with generation
        var thickness = max(0.4, 4.5 - gen * 0.4);
        strokeWeight(thickness);

        // Color: dark amber trunk → bright golden tips
        var hue = lerp(22, 40, min(gen / 12, 1));
        var sat = lerp(85, 65, min(gen / 12, 1));
        var bri = lerp(40, 78, min(gen / 12, 1));
        stroke(hue, sat, bri, 92);
        noFill();
        line(seg.px, seg.py, seg.x, seg.y);
    }
    pop();

    // Draw active root tips with glow
    push();
    noStroke();
    for (var t = 0; t < rootTips.length; t++) {
        var tip = rootTips[t];
        if (!tip.active) continue;
        fill(45, 80, 100, 70);
        ellipse(tip.x, tip.y, 3, 3);
        fill(45, 60, 100, 30);
        ellipse(tip.x, tip.y, 7, 7);
    }
    pop();

    // FPS
    push();
    fill(0, 0, 100, 50);
    noStroke();
    textFont('monospace');
    textSize(12);
    textAlign(RIGHT, TOP);
    text(Math.round(frameRate()) + ' fps', width - 16, 16);
    pop();

    // Info
    push();
    fill(30, 60, 80, 50);
    noStroke();
    textFont('sans-serif');
    textSize(12);
    textAlign(LEFT, BOTTOM);
    text('Space Colonization Algorithm — Root Morphogenesis', 16, height - 12);
    pop();
}

function growRoots() {
    // For each active tip, find attracting nutrients
    var attractors = []; // [tipIdx] -> list of nutrient directions

    for (var t = 0; t < rootTips.length; t++) {
        attractors.push({ count: 0, dx: 0, dy: 0 });
    }

    var aliveNutrients = [];
    for (var n = 0; n < nutrients.length; n++) {
        var nut = nutrients[n];
        if (!nut.alive) continue;

        // Find closest tip within influence radius
        var minDist = Infinity;
        var closestTip = -1;
        for (var t2 = 0; t2 < rootTips.length; t2++) {
            if (!rootTips[t2].active) continue;
            var d = dist(nut.x, nut.y, rootTips[t2].x, rootTips[t2].y);
            if (d < influenceRadius && d < minDist) {
                minDist = d;
                closestTip = t2;
            }
        }

        if (closestTip >= 0) {
            var tip = rootTips[closestTip];
            var dx = nut.x - tip.x;
            var dy = nut.y - tip.y;
            var len = Math.sqrt(dx * dx + dy * dy) || 1;
            attractors[closestTip].dx += dx / len;
            attractors[closestTip].dy += dy / len;
            attractors[closestTip].count++;
        }

        aliveNutrients.push(n);
    }

    // Move tips toward attractors, or in current direction if no attractors
    var newTips = [];
    for (var t3 = 0; t3 < rootTips.length; t3++) {
        var tip = rootTips[t3];
        if (!tip.active) continue;

        var att = attractors[t3];
        var moveX, moveY;

        if (att.count > 0) {
            // Normalize attractor direction
            var len2 = Math.sqrt(att.dx * att.dx + att.dy * att.dy) || 1;
            moveX = att.dx / len2;
            moveY = att.dy / len2;
        } else {
            // No attractors: continue in current direction with gravitropism
            moveX = tip.dx;
            moveY = tip.dy;
        }

        // Add gravitropism (slight downward bias)
        moveY += 0.3;

        // Add random jitter
        moveX += (Math.random() - 0.5) * 0.5;
        moveY += (Math.random() - 0.5) * 0.3;

        // Normalize
        var moveLen = Math.sqrt(moveX * moveX + moveY * moveY) || 1;
        moveX = moveX / moveLen;
        moveY = moveY / moveLen;

        // Update direction (smooth steering)
        tip.dx = lerp(tip.dx, moveX, 0.3);
        tip.dy = lerp(tip.dy, moveY, 0.3);

        // Normalize steering
        var steerLen = Math.sqrt(tip.dx * tip.dx + tip.dy * tip.dy) || 1;
        tip.dx /= steerLen;
        tip.dy /= steerLen;

        var nx = tip.x + tip.dx * segmentLength;
        var ny = tip.y + tip.dy * segmentLength;

        // Boundary check
        if (nx < 5 || nx > width - 5 || ny < 5 || ny > height - 5) {
            tip.active = false;
            continue;
        }

        // Add segment
        rootSegments.push({
            x: nx, y: ny,
            px: tip.x, py: tip.y,
            generation: tip.generation,
            thickness: max(0.4, 4.5 - tip.generation * 0.4)
        });

        // Check if we consumed any nutrients and kill them
        var consumedAny = false;
        for (var n2 = 0; n2 < nutrients.length; n2++) {
            if (!nutrients[n2].alive) continue;
            if (dist(nx, ny, nutrients[n2].x, nutrients[n2].y) < killRadius) {
                nutrients[n2].alive = false;
                nutrients[n2].flashAge = 0;
                nutrientFlashes.push({ x: nutrients[n2].x, y: nutrients[n2].y, age: 0 });
                consumedAny = true;
            }
        }

        // Branching: if no attractors and randomly, spawn branch
        if (att.count === 0 && Math.random() < 0.015 && tip.generation < 14 && rootTips.length < 600) {
            var branchAngle = (Math.random() - 0.5) * PI * 0.6;
            var cos = Math.cos(branchAngle);
            var sin = Math.sin(branchAngle);
            var bDx = tip.dx * cos - tip.dy * sin;
            var bDy = tip.dx * sin + tip.dy * cos;
            newTips.push({
                x: nx, y: ny,
                dx: bDx, dy: bDy,
                generation: tip.generation + 1,
                active: true
            });
        }

        tip.x = nx;
        tip.y = ny;
    }

    // Add new branch tips
    for (var nt = 0; nt < newTips.length; nt++) {
        rootTips.push(newTips[nt]);
    }

    // If no active tips and there are still nutrients, add a new tip from an existing segment
    var anyActive = false;
    for (var t4 = 0; t4 < rootTips.length; t4++) {
        if (rootTips[t4].active) { anyActive = true; break; }
    }

    if (!anyActive && rootSegments.length > 0) {
        // Respawn from end of random segment
        var seg = rootSegments[Math.floor(Math.random() * rootSegments.length)];
        rootTips.push({
            x: seg.x, y: seg.y,
            dx: (Math.random() - 0.5) * 0.5,
            dy: 1,
            generation: seg.generation + 2,
            active: true
        });
    }
}

function drawNutrientFlashes() {
    var toRemove = [];
    for (var i = 0; i < nutrientFlashes.length; i++) {
        var f = nutrientFlashes[i];
        f.age++;
        if (f.age > 20) {
            toRemove.push(i);
            continue;
        }
        var alpha = map(f.age, 0, 20, 80, 0);
        var sz = map(f.age, 0, 20, 2, 18);
        push();
        noStroke();
        fill(45, 90, 100, alpha);
        ellipse(f.x, f.y, sz, sz);
        fill(50, 60, 100, alpha * 0.4);
        ellipse(f.x, f.y, sz * 2, sz * 2);
        pop();
    }
    for (var r = toRemove.length - 1; r >= 0; r--) {
        nutrientFlashes.splice(toRemove[r], 1);
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
    </script>
</body>
</html>
