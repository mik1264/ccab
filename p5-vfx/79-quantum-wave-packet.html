<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Wave Packet | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        // 1D Schrödinger equation via split-operator method
        // We work in natural units: hbar=1, m=1/2 (so kinetic = -d²/dx²)
        // ψ(x,t+dt) ≈ exp(-iV(x)dt/2) * IFFT[exp(-ik²dt) * FFT[exp(-iV(x)dt/2) * ψ]]

        const NX = 512;          // grid points (power of 2 for FFT)
        const L  = 100.0;        // domain length
        const dx = L / NX;

        // We implement our own DFT-based propagation (no FFT library needed)
        // Instead, use Crank-Nicolson finite difference (simpler, no FFT)
        // ψ_new = (1 - i*H*dt/2)^{-1} * (1 + i*H*... wait, let's use explicit method with small dt

        // Simpler: real-space explicit Schrödinger (Visscher method)
        // Split real and imaginary parts:
        // Re(ψ)(t+dt/2) = Re(ψ)(t) + [-∂²Im(ψ)/∂x² + V*Im(ψ)] * dt
        // Im(ψ)(t+dt)   = Im(ψ)(t) - [-∂²Re(ψ)/∂x²(t+dt/2) + V*Re(ψ)(t+dt/2)] * dt
        // This is the Visscher leapfrog method

        let psiR = new Float64Array(NX); // Real part
        let psiI = new Float64Array(NX); // Imaginary part
        let V    = new Float64Array(NX); // Potential
        let prob = new Float64Array(NX); // |ψ|²

        // Parameters for initial Gaussian wave packet
        let x0, k0, sigma;
        let barrierX, barrierW, barrierV;
        let runIndex = 0;
        let simTime = 0;
        let maxSimTime = 200;
        let resetTimer = 0;

        function initParams() {
            // Slightly vary k0 each run for educational variation
            k0 = 1.2 + runIndex * 0.3;
            sigma = 6.0;
            x0 = L * 0.2;
            barrierX = L * 0.5;
            barrierW = L * 0.04;
            barrierV = k0 * k0 * 1.3; // barrier higher than kinetic energy for tunneling
            runIndex++;
        }

        function setupPotential() {
            for (let i = 0; i < NX; i++) {
                let x = i * dx;
                // Rectangular barrier
                if (x >= barrierX - barrierW / 2 && x <= barrierX + barrierW / 2) {
                    V[i] = barrierV;
                } else {
                    V[i] = 0;
                }
                // Absorbing walls (imaginary potential at edges)
                let absorbL = 0.05 * L;
                let absorbR = 0.95 * L;
                if (x < absorbL) {
                    V[i] -= 5.0 * (1 - x / absorbL) * (1 - x / absorbL);
                }
                if (x > absorbR) {
                    V[i] -= 5.0 * ((x - absorbR) / (L - absorbR)) * ((x - absorbR) / (L - absorbR));
                }
            }
        }

        function initWavePacket() {
            let norm = 0;
            for (let i = 0; i < NX; i++) {
                let x = i * dx;
                let gauss = Math.exp(-(x - x0) * (x - x0) / (4 * sigma * sigma));
                psiR[i] = gauss * Math.cos(k0 * x);
                psiI[i] = gauss * Math.sin(k0 * x);
                norm += (psiR[i] * psiR[i] + psiI[i] * psiI[i]) * dx;
            }
            norm = Math.sqrt(norm);
            for (let i = 0; i < NX; i++) {
                psiR[i] /= norm;
                psiI[i] /= norm;
            }
        }

        function resetSimulation() {
            initParams();
            setupPotential();
            initWavePacket();
            simTime = 0;
        }

        // Visscher leapfrog step
        // psiR is at t, psiI is at t - dt/2 (offset by half step)
        const DT = 0.08;
        const dx2 = dx * dx;

        function stepSimulation(steps) {
            for (let s = 0; s < steps; s++) {
                // Update Re using Im (at t-dt/2)
                for (let i = 1; i < NX - 1; i++) {
                    let lap = (psiI[i - 1] - 2 * psiI[i] + psiI[i + 1]) / dx2;
                    psiR[i] += DT * (-lap + V[i] * psiI[i]);
                }
                psiR[0] = 0; psiR[NX - 1] = 0;

                // Update Im using Re (now at t)
                for (let i = 1; i < NX - 1; i++) {
                    let lap = (psiR[i - 1] - 2 * psiR[i] + psiR[i + 1]) / dx2;
                    psiI[i] -= DT * (-lap + V[i] * psiR[i]);
                }
                psiI[0] = 0; psiI[NX - 1] = 0;

                simTime += DT;
            }

            // Compute probability density
            for (let i = 0; i < NX; i++) {
                prob[i] = psiR[i] * psiR[i] + psiI[i] * psiI[i];
            }
        }

        let maxProb = 0.1;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
            resetSimulation();
        }

        function draw() {
            background(240, 20, 4, 100);

            // Step simulation
            let steps = 4;
            stepSimulation(steps);

            // Auto-reset
            if (simTime > maxSimTime) {
                setTimeout(resetSimulation, 1500);
                maxSimTime = simTime + 1e9; // prevent multiple resets
            }

            // Smooth max probability for scaling
            let curMax = 0;
            for (let i = 0; i < NX; i++) curMax = Math.max(curMax, prob[i]);
            maxProb += (Math.max(curMax, 0.001) - maxProb) * 0.05;

            // Layout
            let marginL = 60, marginR = 30, marginT = 80, marginB = 60;
            let plotW = width - marginL - marginR;
            let plotH = (height - marginT - marginB) * 0.75;
            let plotY = marginT + (height - marginT - marginB) * 0.1;
            let cx = marginL;

            // Grid
            stroke(220, 10, 15, 30);
            strokeWeight(0.5);
            let nGridV = 8, nGridH = 6;
            for (let i = 0; i <= nGridV; i++) {
                let px = cx + (i / nGridV) * plotW;
                line(px, plotY, px, plotY + plotH);
            }
            for (let i = 0; i <= nGridH; i++) {
                let py = plotY + (i / nGridH) * plotH;
                line(cx, py, cx + plotW, py);
            }

            // X-axis line
            let zeroY = plotY + plotH * 0.5;
            stroke(0, 0, 30, 60);
            strokeWeight(1);
            line(cx, zeroY, cx + plotW, zeroY);

            // Potential barrier
            let bxL = cx + (barrierX - barrierW / 2) / L * plotW;
            let bxR = cx + (barrierX + barrierW / 2) / L * plotW;
            noStroke();
            fill(30, 70, 50, 40);
            rect(bxL, plotY, bxR - bxL, plotH);
            stroke(30, 80, 90, 70);
            strokeWeight(1.5);
            noFill();
            line(bxL, plotY, bxL, plotY + plotH);
            line(bxR, plotY, bxR, plotY + plotH);
            line(bxL, plotY + 5, bxR, plotY + 5);
            noStroke();
            fill(30, 80, 90, 70);
            textSize(9);
            textFont('monospace');
            textAlign(CENTER, TOP);
            text('V₀', (bxL + bxR) / 2, plotY + 8);

            // Wave functions
            function mapX(i) { return cx + (i / NX) * plotW; }
            function mapY(val, scale) { return zeroY - val * scale; }

            let scale = plotH * 0.4 / Math.max(maxProb, 0.001);

            // Re(ψ) — cyan
            blendMode(ADD);
            stroke(185, 90, 80, 50);
            strokeWeight(1.2);
            noFill();
            beginShape();
            for (let i = 0; i < NX; i++) {
                vertex(mapX(i), mapY(psiR[i], scale));
            }
            endShape();

            // Im(ψ) — magenta
            stroke(300, 90, 80, 50);
            strokeWeight(1.2);
            noFill();
            beginShape();
            for (let i = 0; i < NX; i++) {
                vertex(mapX(i), mapY(psiI[i], scale));
            }
            endShape();

            // |ψ|² — bright white/cyan with glow
            // Glow pass
            stroke(185, 60, 100, 20);
            strokeWeight(6);
            noFill();
            beginShape();
            for (let i = 0; i < NX; i++) {
                vertex(mapX(i), mapY(prob[i], scale));
            }
            endShape();

            // Main |ψ|² line
            stroke(185, 20, 100, 80);
            strokeWeight(2);
            beginShape();
            for (let i = 0; i < NX; i++) {
                vertex(mapX(i), mapY(prob[i], scale));
            }
            endShape();

            // Filled area under |ψ|² (gradient fill using quads)
            noStroke();
            for (let i = 0; i < NX - 1; i++) {
                let p0 = prob[i], p1 = prob[i + 1];
                let avg = (p0 + p1) / 2;
                let hue = map(avg, 0, maxProb * 0.8, 200, 60);
                let bri = map(avg, 0, maxProb * 0.5, 20, 80);
                let alph = map(avg, 0, maxProb * 0.5, 10, 50);
                fill(hue, 80, bri, alph);
                quad(
                    mapX(i),   zeroY,
                    mapX(i+1), zeroY,
                    mapX(i+1), mapY(p1, scale),
                    mapX(i),   mapY(p0, scale)
                );
            }

            blendMode(BLEND);

            // Border
            noFill();
            stroke(0, 0, 25, 60);
            strokeWeight(1);
            rect(cx, plotY, plotW, plotH);

            // Legend
            let legX = cx + plotW - 200;
            let legY = plotY + 10;
            fill(0, 0, 0, 60);
            rect(legX - 8, legY - 6, 195, 65, 6);

            noStroke();
            fill(185, 90, 100);
            rect(legX, legY + 3, 20, 2);
            fill(0, 0, 80);
            textSize(10);
            textAlign(LEFT, TOP);
            text('Re(ψ)', legX + 25, legY);

            fill(300, 90, 100);
            rect(legX, legY + 18, 20, 2);
            fill(0, 0, 80);
            text('Im(ψ)', legX + 25, legY + 15);

            fill(185, 30, 100);
            rect(legX, legY + 33, 20, 3);
            fill(0, 0, 80);
            text('|ψ|² probability density', legX + 25, legY + 30);

            fill(30, 60, 90);
            rect(legX, legY + 48, 20, 10);
            fill(0, 0, 80);
            text('Potential barrier V₀', legX + 25, legY + 47);

            // Title
            noStroke();
            fill(185, 60, 100, 90);
            textSize(17);
            textFont('monospace');
            textAlign(CENTER, TOP);
            text('Quantum Wave Packet Tunneling', width / 2, 14);

            fill(0, 0, 70, 70);
            textSize(11);
            text('k₀ = ' + k0.toFixed(1) + ',  σ = ' + sigma.toFixed(1) + ',  V₀ = ' + barrierV.toFixed(1) + ',  t = ' + simTime.toFixed(1), width / 2, 36);
            text('Tunneling: kinetic energy E = k₀²/2 = ' + (k0*k0/2).toFixed(2) + ' < V₀ = ' + barrierV.toFixed(2), width / 2, 52);

            // FPS
            fill(0, 0, 0, 60);
            rect(width - 80, 10, 70, 28, 14);
            let fps = Math.round(frameRate());
            fill(120, 60, 100);
            textSize(13);
            textFont('monospace');
            textAlign(RIGHT, TOP);
            text(fps + ' fps', width - 14, 18);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
