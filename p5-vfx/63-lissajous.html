<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lissajous 3D — P5.js VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:50%; transform:translateX(-50%); color:#bbb; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.55); padding:6px 16px; border-radius:6px; z-index:999; text-align:center; white-space:nowrap; }
#ratio { position:fixed; top:50px; right:12px; color:#888; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.5); padding:6px 12px; border-radius:6px; z-index:999; line-height:1.8; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">x=sin(at+δ)  y=sin(bt)  z=sin(ct+φ)</div>
<div id="ratio">a:b:c = ?</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let fpsEl, infoEl, ratioEl;
  let t = 0;
  let autoRotX = 0, autoRotY = 0;
  let isDragging = false;
  let prevMX = 0, prevMY = 0;
  let rotX = 0.4, rotY = 0.3;

  // Phase parameters
  let delta = 0, phi = 0;
  let phaseT = 0; // drives slow phase sweep

  // Ratio presets [a, b, c, label]
  const PRESETS = [
    [1, 1, 1, '1:1:1'],
    [1, 2, 3, '1:2:3'],
    [2, 3, 4, '2:3:4'],
    [3, 4, 5, '3:4:5'],
    [1, 3, 5, '1:3:5'],
    [2, 3, 7, '2:3:7'],
    [1, 2, 5, '1:2:5'],
    [3, 5, 7, '3:5:7'],
  ];
  let presetIdx = 0;
  let presetT = 0;
  let presetMorphF = 0;

  // Multiple simultaneous figures
  const FIGURES = [
    { scale: 1.0, hueOff: 0,   alphaScale: 1.0, presetOff: 0 },
    { scale: 0.6, hueOff: 120, alphaScale: 0.5, presetOff: 2 },
    { scale: 0.35, hueOff: 240, alphaScale: 0.3, presetOff: 4 },
  ];

  const CURVE_STEPS = 1200;

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    infoEl = document.getElementById('info');
    ratioEl = document.getElementById('ratio');
  };

  p.draw = function() {
    p.background(0, 0, 0, 100);
    // Overlay fade (WEBGL mode needs manual approach)
    // We just clear and redraw full curve each frame

    if (p.frameCount % 15 === 0) {
      fpsEl.textContent = Math.round(p.frameRate()) + ' fps';
    }

    let dt = 0.016;
    t += dt;
    phaseT += dt * 0.25;
    presetT += dt * 0.06;

    // Morph between presets
    let currentPreset = Math.floor(presetT) % PRESETS.length;
    let nextPreset = (currentPreset + 1) % PRESETS.length;
    let morphF = presetT % 1;

    // Auto-rotation (slow)
    autoRotY += 0.003;
    autoRotX = Math.sin(t * 0.15) * 0.4;

    // Camera rotation
    let totalRotX = rotX + autoRotX;
    let totalRotY = rotY + autoRotY;

    p.rotateX(totalRotX);
    p.rotateY(totalRotY);

    // Phase sweep
    delta = phaseT * 1.3;
    phi = phaseT * 0.7;

    // Draw all figures
    for (let fi = 0; fi < FIGURES.length; fi++) {
      let fig = FIGURES[fi];
      let pidxA = (currentPreset + fig.presetOff) % PRESETS.length;
      let pidxB = (nextPreset + fig.presetOff) % PRESETS.length;

      let a = lerp(PRESETS[pidxA][0], PRESETS[pidxB][0], morphF);
      let b = lerp(PRESETS[pidxA][1], PRESETS[pidxB][1], morphF);
      let c = lerp(PRESETS[pidxA][2], PRESETS[pidxB][2], morphF);

      let scale = Math.min(p.width, p.height) * 0.30 * fig.scale;
      drawLissajous3D(a, b, c, scale, fig.hueOff, fig.alphaScale);

      if (fi === 0) {
        ratioEl.innerHTML = `a : b : c<br>${PRESETS[pidxA][0]}:${PRESETS[pidxA][1]}:${PRESETS[pidxA][2]}<br>→ ${PRESETS[pidxB][0]}:${PRESETS[pidxB][1]}:${PRESETS[pidxB][2]}<br>δ=${(delta%(2*Math.PI)).toFixed(2)}<br>φ=${(phi%(2*Math.PI)).toFixed(2)}`;
      }
    }

    // Axes (subtle)
    drawAxes(Math.min(p.width, p.height) * 0.35);
  };

  function drawLissajous3D(a, b, c, scale, hueOff, alphaScale) {
    let totalLen = 0;
    let pts = [];
    // Generate all points and measure arc length
    let px = null, py = null, pz = null;
    for (let i = 0; i <= CURVE_STEPS; i++) {
      let th = (i / CURVE_STEPS) * p.TWO_PI * 6; // 6 full rotations for complex forms
      let x = Math.sin(a * th + delta) * scale;
      let y = Math.sin(b * th) * scale;
      let z = Math.sin(c * th + phi) * scale;
      if (px !== null) {
        let dl = Math.sqrt((x-px)*(x-px)+(y-py)*(y-py)+(z-pz)*(z-pz));
        totalLen += dl;
      }
      pts.push({x, y, z});
      px = x; py = y; pz = z;
    }

    // Draw curve colored by arc length
    p.strokeWeight(2.0 * alphaScale + 0.5);
    p.noFill();
    let cumLen = 0;
    for (let i = 1; i < pts.length; i++) {
      let a_ = pts[i-1], b_ = pts[i];
      let dl = Math.sqrt((b_.x-a_.x)**2+(b_.y-a_.y)**2+(b_.z-a_.z)**2);
      cumLen += dl;
      let progress = cumLen / totalLen;
      let hue = (hueOff + progress * 360) % 360;
      let alpha = 70 * alphaScale;
      p.stroke(hue, 90, 95, alpha);
      p.line(a_.x, a_.y, a_.z, b_.x, b_.y, b_.z);
    }

    // Glowing dot at head
    let head = pts[pts.length - 1];
    p.fill(hueOff, 60, 100, 90 * alphaScale);
    p.noStroke();
    p.push();
    p.translate(head.x, head.y, head.z);
    p.sphere(4 * alphaScale);
    p.pop();
  }

  function drawAxes(len) {
    p.strokeWeight(0.5);
    p.stroke(0, 0, 50, 25);
    p.line(-len, 0, 0, len, 0, 0);
    p.line(0, -len, 0, 0, len, 0);
    p.line(0, 0, -len, 0, 0, len);
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  p.mousePressed = function() {
    isDragging = true;
    prevMX = p.mouseX;
    prevMY = p.mouseY;
  };
  p.mouseDragged = function() {
    if (isDragging) {
      rotY += (p.mouseX - prevMX) * 0.01;
      rotX += (p.mouseY - prevMY) * 0.01;
      prevMX = p.mouseX;
      prevMY = p.mouseY;
    }
  };
  p.mouseReleased = function() { isDragging = false; };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
  };
});
</script>
</body>
</html>
