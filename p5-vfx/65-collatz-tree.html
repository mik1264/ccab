<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collatz Conjecture Tree | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const MAX_N = 200;

        // Collatz: stopping time for each number
        let stoppingTime = {};
        let maxStop = 0;

        function collatzSteps(n) {
            let steps = 0;
            while (n !== 1) {
                n = (n % 2 === 0) ? n / 2 : 3 * n + 1;
                steps++;
                if (steps > 1000) break;
            }
            return steps;
        }

        // Tree edges: child -> parent in Collatz graph
        // parent of n: if n is even, n/2; if n%6==4, (n-1)/3
        // We build the reverse: for each n, its parent is n*2 (always)
        // and if (n-1)%3==0 and (n-1)/3 is odd, also (n-1)/3
        // Root is 1. Children of n are: 2n, and (n-1)/3 if odd integer > 1

        let nodes = {};   // id -> {x, y, parent, stoppingTime, label, visible, angle}
        let edges = [];   // {from, to, visible}
        let revealQueue = [];
        let revealTimer = 0;
        let revealInterval = 120; // ms between reveals

        function buildTree() {
            // BFS from 1
            nodes[1] = { id: 1, parent: null, stoppingTime: 0, visible: false };
            let queue = [1];
            let visited = new Set([1]);

            while (queue.length > 0) {
                let n = queue.shift();
                // children: 2n
                let c1 = 2 * n;
                if (c1 <= MAX_N && !visited.has(c1)) {
                    visited.add(c1);
                    nodes[c1] = { id: c1, parent: n, stoppingTime: collatzSteps(c1), visible: false };
                    edges.push({ from: n, to: c1, visible: false });
                    queue.push(c1);
                }
                // (n-1)/3 if n%3==1 and (n-1)/3 odd and > 1
                if (n % 3 === 1) {
                    let c2 = (n - 1) / 3;
                    if (c2 > 1 && c2 % 2 === 1 && c2 <= MAX_N && !visited.has(c2)) {
                        visited.add(c2);
                        nodes[c2] = { id: c2, parent: n, stoppingTime: collatzSteps(c2), visible: false };
                        edges.push({ from: n, to: c2, visible: false });
                        queue.push(c2);
                    }
                }
            }

            // BFS order for reveal
            revealQueue = [];
            let bfsQ = [1];
            let seen = new Set([1]);
            while (bfsQ.length > 0) {
                let n = bfsQ.shift();
                revealQueue.push(n);
                for (let e of edges) {
                    if (e.from === n && !seen.has(e.to)) {
                        seen.add(e.to);
                        bfsQ.push(e.to);
                    }
                }
            }

            // Stopping times
            for (let k in nodes) {
                maxStop = Math.max(maxStop, nodes[k].stoppingTime);
            }
        }

        // Radial layout
        function layoutTree() {
            // Assign depth
            let depth = {};
            depth[1] = 0;
            let maxDepth = 0;
            let bfsQ = [1];
            while (bfsQ.length > 0) {
                let n = bfsQ.shift();
                for (let e of edges) {
                    if (e.from === n) {
                        depth[e.to] = depth[n] + 1;
                        maxDepth = Math.max(maxDepth, depth[e.to]);
                        bfsQ.push(e.to);
                    }
                }
            }

            // Count nodes per depth for angle spacing
            let depthCount = {};
            let depthIndex = {};
            for (let k in nodes) {
                let d = depth[k] || 0;
                if (!depthCount[d]) depthCount[d] = 0;
                depthIndex[k] = depthCount[d];
                depthCount[d]++;
            }

            let cx = 0, cy = 0;
            nodes[1].x = cx;
            nodes[1].y = cy;
            nodes[1].depth = 0;

            // For each node set x,y based on depth and angle
            for (let k in nodes) {
                let n = nodes[k];
                let d = depth[k] || 0;
                n.depth = d;
                let cnt = depthCount[d] || 1;
                let idx = depthIndex[k];
                let angle = (idx / cnt) * TWO_PI - PI / 2;
                let r = d * 55 + (d > 0 ? 30 : 0);
                n.x = cx + r * Math.cos(angle);
                n.y = cy + r * Math.sin(angle);
            }
        }

        let revealIndex = 0;
        let pan = { x: 0, y: 0 };
        let zoom = 1;
        let targetZoom = 1;
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let panStart = { x: 0, y: 0 };

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);

            buildTree();
            layoutTree();

            pan.x = width / 2;
            pan.y = height / 2;
        }

        function draw() {
            background(240, 20, 4, 100);

            // Auto-reveal nodes
            revealTimer += deltaTime;
            while (revealTimer > revealInterval && revealIndex < revealQueue.length) {
                revealTimer -= revealInterval;
                let n = revealQueue[revealIndex];
                if (nodes[n]) nodes[n].visible = true;
                // Also mark edge visible
                for (let e of edges) {
                    if (e.to === n) e.visible = true;
                }
                revealIndex++;
                if (revealIndex >= revealQueue.length) {
                    // Loop: reset after pause
                    setTimeout(() => {
                        for (let k in nodes) nodes[k].visible = false;
                        for (let e of edges) e.visible = false;
                        revealIndex = 0;
                        revealTimer = 0;
                    }, 3000);
                }
            }

            push();
            translate(pan.x, pan.y);
            scale(zoom);

            // Draw edges
            strokeWeight(1);
            noFill();
            for (let e of edges) {
                if (!e.visible || !nodes[e.from] || !nodes[e.to]) continue;
                let nA = nodes[e.from], nB = nodes[e.to];
                let st = nodes[e.to].stoppingTime;
                let hue = map(st, 0, maxStop, 200, 0);
                stroke(hue, 80, 70, 50);
                line(nA.x, nA.y, nB.x, nB.y);
            }

            // Draw nodes
            noStroke();
            for (let k in nodes) {
                let n = nodes[k];
                if (!n.visible) continue;
                let hue = map(n.stoppingTime, 0, maxStop, 200, 0);
                let r = n.id === 1 ? 8 : map(n.stoppingTime, 0, maxStop, 3, 7);

                // Glow
                fill(hue, 90, 100, 20);
                ellipse(n.x, n.y, r * 4, r * 4);
                fill(hue, 80, 100, 60);
                ellipse(n.x, n.y, r * 2, r * 2);
                fill(hue, 60, 100, 100);
                ellipse(n.x, n.y, r, r);

                // Label for notable numbers
                if (n.id === 1 || n.id === 27 || n.stoppingTime > 80) {
                    fill(0, 0, 100, 80);
                    textSize(9);
                    textFont('monospace');
                    textAlign(CENTER, BOTTOM);
                    text(n.id, n.x, n.y - r / 2 - 2);
                }
            }

            pop();

            // UI
            noStroke();
            fill(0, 0, 0, 60);
            rect(width - 80, 10, 70, 28, 14);
            let fps = Math.round(frameRate());
            fill(120, 60, 100);
            textSize(13);
            textFont('monospace');
            textAlign(RIGHT, TOP);
            text(fps + ' fps', width - 14, 18);

            // Legend
            fill(0, 0, 0, 50);
            rect(14, height - 70, 200, 56, 8);
            textSize(11);
            textAlign(LEFT, TOP);
            fill(200, 80, 100);
            text('Blue = fast convergence', 22, height - 62);
            fill(30, 80, 100);
            text('Red = slow convergence (e.g. 27: 111 steps)', 22, height - 48);
            fill(0, 0, 80);
            text('Nodes: ' + Object.values(nodes).filter(n => n.visible).length + ' / ' + Object.keys(nodes).length, 22, height - 34);
        }

        function mousePressed() {
            isDragging = true;
            dragStart.x = mouseX;
            dragStart.y = mouseY;
            panStart.x = pan.x;
            panStart.y = pan.y;
        }
        function mouseDragged() {
            if (isDragging) {
                pan.x = panStart.x + (mouseX - dragStart.x);
                pan.y = panStart.y + (mouseY - dragStart.y);
            }
        }
        function mouseReleased() { isDragging = false; }
        function mouseWheel(e) {
            zoom *= (1 - e.delta * 0.001);
            zoom = Math.max(0.2, Math.min(5, zoom));
            return false;
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            pan.x = width / 2;
            pan.y = height / 2;
        }
    </script>
</body>
</html>
