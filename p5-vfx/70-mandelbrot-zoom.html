<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandelbrot Zoom | P5.js VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#666; font-family:monospace; font-size:12px; text-align:center; pointer-events:none; }
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Gallery</a>
<div id="fps">FPS: --</div>
<div id="info">Mandelbrot Zoom · Rendering...</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

new p5(function(p) {
  const CENTER_X = -0.7269;
  const CENTER_Y =  0.1889;

  let zoom = 1.0;
  let maxIter = 128;
  let fpsEl, infoEl;
  let fpsTime = 0, fpsFrames = 0;

  // Half-resolution buffer
  let halfW, halfH;
  let pixBuf;

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    fpsEl  = document.getElementById('fps');
    infoEl = document.getElementById('info');

    halfW = Math.floor(p.width  / 2);
    halfH = Math.floor(p.height / 2);
    pixBuf = new Float64Array(halfW * halfH); // store smooth iteration counts
  };

  function computeMandelbrot() {
    const scale = 3.5 / zoom;
    const x0min = CENTER_X - scale * (halfW / halfH) * 0.5;
    const y0min = CENTER_Y - scale * 0.5;
    const dx = scale * (halfW / halfH) / halfW;
    const dy = scale / halfH;

    for (let py = 0; py < halfH; py++) {
      const c_im = y0min + py * dy;
      for (let px = 0; px < halfW; px++) {
        const c_re = x0min + px * dx;
        let zr = 0, zi = 0;
        let iter = 0;
        while (iter < maxIter) {
          const zr2 = zr * zr, zi2 = zi * zi;
          if (zr2 + zi2 > 256) break;
          zi = 2 * zr * zi + c_im;
          zr = zr2 - zi2 + c_re;
          iter++;
        }
        let smooth = iter;
        if (iter < maxIter) {
          const log2 = Math.log(Math.log(Math.sqrt(zr * zr + zi * zi))) / Math.LN2;
          smooth = iter + 1 - log2;
        }
        pixBuf[py * halfW + px] = (iter >= maxIter) ? -1 : smooth;
      }
    }
  }

  p.draw = function() {
    // FPS
    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(fpsFrames * 1000 / (now - fpsTime));
      fpsFrames = 0; fpsTime = now;
    }

    // Update zoom
    zoom *= 1.005;
    maxIter = Math.floor(128 + Math.log2(zoom) * 20);
    if (maxIter > 1024) maxIter = 1024;

    computeMandelbrot();

    // Draw to pixel array at half-res then scale up via 2x squares
    p.noStroke();
    for (let py = 0; py < halfH; py++) {
      for (let px = 0; px < halfW; px++) {
        const v = pixBuf[py * halfW + px];
        if (v < 0) {
          p.fill(0, 0, 0);
        } else {
          const h = (v * 8 + 200) % 360;
          const s = 90;
          const b = Math.min(100, 30 + v * 2);
          p.fill(h, s, b);
        }
        p.rect(px * 2, py * 2, 2, 2);
      }
    }

    // Overlay info
    const zoomLog = Math.log10(zoom);
    infoEl.textContent = 'Mandelbrot Zoom · Zoom: 10^' + zoomLog.toFixed(2) + ' · MaxIter: ' + maxIter;
  };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    halfW = Math.floor(p.width  / 2);
    halfH = Math.floor(p.height / 2);
    pixBuf = new Float64Array(halfW * halfH);
  };
});
</script>
</body>
</html>
