<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Particles | P5.js VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
.back-link {
  position: fixed; top: 16px; left: 16px; z-index: 100;
  color: rgba(255,255,255,0.6); text-decoration: none;
  font-size: 13px; letter-spacing: 0.05em;
  background: rgba(255,255,255,0.08);
  padding: 6px 12px; border-radius: 20px;
  transition: background 0.2s;
}
.back-link:hover { background: rgba(255,255,255,0.18); color: #fff; }
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Gallery</a>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

const N_PARTICLES = 100000;
const N_CLUSTERS = 8;
const BOX = 400;
const GRAVITY = 0.012;
const DAMPING = 0.998;
const UPDATE_INTERVAL = 5; // update gravity every N frames

// Use typed arrays for performance
let px, py, pz;
let vx, vy, vz;
let speeds; // cached speed magnitude

// Cluster centers (octant-based)
let clusterCenters;

let fpsArr = [];
let lastFPS = 60;

function gaussRand() {
  // Box-Muller
  let u = random(0.0001, 1);
  let v = random(0.0001, 1);
  return sqrt(-2 * log(u)) * cos(TWO_PI * v);
}

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  colorMode(HSB, 360, 100, 100, 100);

  px = new Float32Array(N_PARTICLES);
  py = new Float32Array(N_PARTICLES);
  pz = new Float32Array(N_PARTICLES);
  vx = new Float32Array(N_PARTICLES);
  vy = new Float32Array(N_PARTICLES);
  vz = new Float32Array(N_PARTICLES);
  speeds = new Float32Array(N_PARTICLES);

  // Place cluster centers in octants
  clusterCenters = [];
  for (let i = 0; i < N_CLUSTERS; i++) {
    let ox = (i & 1) ? 1 : -1;
    let oy = (i & 2) ? 1 : -1;
    let oz = (i & 4) ? 1 : -1;
    clusterCenters.push({
      x: ox * BOX * 0.28 + gaussRand() * 20,
      y: oy * BOX * 0.28 + gaussRand() * 20,
      z: oz * BOX * 0.28 + gaussRand() * 20
    });
  }

  // Initialize particles clustered around centers
  for (let i = 0; i < N_PARTICLES; i++) {
    let ci = floor(random(N_CLUSTERS));
    let c = clusterCenters[ci];
    let spread = BOX * 0.15;
    px[i] = c.x + gaussRand() * spread;
    py[i] = c.y + gaussRand() * spread;
    pz[i] = c.z + gaussRand() * spread;
    // Small random initial velocities
    vx[i] = gaussRand() * 0.1;
    vy[i] = gaussRand() * 0.1;
    vz[i] = gaussRand() * 0.1;
    speeds[i] = 0;
  }
}

function updateGravity() {
  // Compute center of mass of each octant
  let ocx = new Float32Array(8);
  let ocy = new Float32Array(8);
  let ocz = new Float32Array(8);
  let ocn = new Float32Array(8);

  for (let i = 0; i < N_PARTICLES; i++) {
    let ox = px[i] >= 0 ? 1 : 0;
    let oy = py[i] >= 0 ? 2 : 0;
    let oz = pz[i] >= 0 ? 4 : 0;
    let oi = ox | oy | oz;
    ocx[oi] += px[i];
    ocy[oi] += py[i];
    ocz[oi] += pz[i];
    ocn[oi]++;
  }

  for (let o = 0; o < 8; o++) {
    if (ocn[o] > 0) {
      ocx[o] /= ocn[o];
      ocy[o] /= ocn[o];
      ocz[o] /= ocn[o];
    }
  }

  // Apply gravity toward octant center of mass + cluster center attraction
  for (let i = 0; i < N_PARTICLES; i++) {
    let ox = px[i] >= 0 ? 1 : 0;
    let oy = py[i] >= 0 ? 2 : 0;
    let oz = pz[i] >= 0 ? 4 : 0;
    let oi = ox | oy | oz;

    let dgx = ocx[oi] - px[i];
    let dgy = ocy[oi] - py[i];
    let dgz = ocz[oi] - pz[i];

    vx[i] += dgx * GRAVITY * UPDATE_INTERVAL;
    vy[i] += dgy * GRAVITY * UPDATE_INTERVAL;
    vz[i] += dgz * GRAVITY * UPDATE_INTERVAL;
  }
}

function draw() {
  // Update gravity periodically
  if (frameCount % UPDATE_INTERVAL === 0) {
    updateGravity();
  }

  // Move particles + damping
  for (let i = 0; i < N_PARTICLES; i++) {
    vx[i] *= DAMPING;
    vy[i] *= DAMPING;
    vz[i] *= DAMPING;
    px[i] += vx[i];
    py[i] += vy[i];
    pz[i] += vz[i];
    // Soft boundary: if too far, gently nudge back
    let d2 = px[i]*px[i] + py[i]*py[i] + pz[i]*pz[i];
    if (d2 > BOX * BOX * 2) {
      vx[i] -= px[i] * 0.001;
      vy[i] -= py[i] * 0.001;
      vz[i] -= pz[i] * 0.001;
    }
    speeds[i] = sqrt(vx[i]*vx[i] + vy[i]*vy[i] + vz[i]*vz[i]);
  }

  background(240, 20, 3);
  blendMode(ADD);

  orbitControl(2, 2, 0.1);
  rotateY(frameCount * 0.002);
  rotateX(frameCount * 0.0008);

  // Draw particles
  strokeWeight(1);
  // Find max speed for normalization
  let maxSpeed = 0.5;
  for (let i = 0; i < N_PARTICLES; i += 10) {
    if (speeds[i] > maxSpeed) maxSpeed = speeds[i];
  }

  beginShape(POINTS);
  for (let i = 0; i < N_PARTICLES; i++) {
    let s = speeds[i] / maxSpeed;
    // slow = dark blue (hue 240), fast = white/yellow (hue 60)
    let hue = lerp(240, 60, min(s * 4, 1));
    let sat = lerp(90, 20, min(s * 3, 1));
    let bri = lerp(20, 100, min(s * 5, 1));
    let alpha = lerp(40, 90, min(s * 3, 1));
    stroke(hue, sat, bri, alpha);
    vertex(px[i], py[i], pz[i]);
  }
  endShape();

  blendMode(BLEND);

  // FPS counter
  fpsArr.push(frameRate());
  if (fpsArr.length > 30) fpsArr.shift();
  lastFPS = fpsArr.reduce((a, b) => a + b, 0) / fpsArr.length;

  // Text overlay
  resetMatrix();
  fill(60, 20, 100, 70);
  noStroke();
  textSize(14);
  textAlign(LEFT);
  text('Cosmic Particles', -width / 2 + 20, -height / 2 + 40);
  fill(0, 0, 80, 50);
  textSize(11);
  text('100,000 particles  |  octant gravity  |  drag to orbit', -width / 2 + 20, -height / 2 + 58);

  // FPS
  let fpsColor = lastFPS > 45 ? [120, 80, 90] : lastFPS > 25 ? [60, 80, 90] : [0, 80, 90];
  fill(fpsColor[0], fpsColor[1], fpsColor[2], 80);
  textAlign(RIGHT);
  textSize(12);
  text('FPS: ' + floor(lastFPS), width / 2 - 20, -height / 2 + 40);

  fill(0, 0, 60, 40);
  textSize(11);
  textAlign(RIGHT);
  text('dark matter filaments forming...', width / 2 - 20, height / 2 - 20);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
