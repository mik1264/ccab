<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyapunov Fractal</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#8af; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#aaf; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:6px; line-height:1.7; z-index:999; pointer-events:none; }
#seqLabel { position:fixed; top:12px; left:50%; transform:translateX(-50%); color:#ddf; font-family:monospace; font-size:14px; font-weight:bold; background:rgba(0,0,0,0.6); padding:6px 16px; border-radius:6px; z-index:999; pointer-events:none; letter-spacing:3px; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="seqLabel">SEQUENCE: AB</div>
<div id="info">Lyapunov Fractal<br>Blue = stable | Red = chaotic<br>Rendering...</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let fpsArr = [], lastTime = 0;

  const SEQUENCES = [
    'AB',
    'AABAB',
    'ABBA',
    'BBBABA',
    'ABABAB',
    'AABB',
    'ABBB',
    'BBBBA',
  ];

  let seqIdx = 0;
  let sequence = SEQUENCES[seqIdx];
  let needsRender = true;
  let lastSeqIdx = -1;

  // View region
  let viewMinX = 2.1, viewMaxX = 4.0;
  let viewMinY = 2.1, viewMaxY = 4.0;

  let tileSize = 40;
  let tiles = [], tileIndex = 0, rendering = false;
  let switchTimer = 0;
  let switchInterval = 8000; // ms between sequence switches

  function buildTiles() {
    tiles = [];
    let cols = Math.ceil(p.width / tileSize);
    let rows = Math.ceil(p.height / tileSize);
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        tiles.push({ x: c * tileSize, y: r * tileSize });
    // shuffle for visual effect
    for (let i = tiles.length - 1; i > 0; i--) {
      let j = Math.floor(Math.random() * (i + 1));
      [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }
    tileIndex = 0;
    rendering = false;
  }

  function lyapunov(rA, rB, seq, iters) {
    let warmup = 100;
    let x = 0.5;
    let seq_len = seq.length;
    let sum = 0;

    for (let n = 0; n < warmup + iters; n++) {
      let r = seq[n % seq_len] === 'A' ? rA : rB;
      x = r * x * (1 - x);
      if (n >= warmup) {
        let absDeriv = Math.abs(r * (1 - 2 * x));
        if (absDeriv < 1e-12) return -10;
        sum += Math.log(absDeriv);
      }
    }
    return sum / iters;
  }

  // Color mapping
  // negative λ = stable = blue-purple
  // positive λ = chaotic = red-orange-yellow
  function lyapunovColor(lam) {
    if (lam < -8) return [0, 0, 0]; // deeply stable = black
    if (lam < 0) {
      // negative: blue (240) to cyan (180) based on magnitude
      let t = Math.min(1, -lam / 5);
      // t=0 (just stable): bright cyan, t=1 (very stable): deep blue
      let h = 240 - t * 60; // 240 to 180
      let s = 80 + t * 15;
      let b = 30 + (1 - t) * 60;
      return hsbToRgb(h, s, b);
    } else {
      // positive: orange (20) to yellow (60) to white
      let t = Math.min(1, lam / 1.5);
      let h = 20 + t * 40; // orange to yellow
      let s = 90 - t * 40;
      let b = 50 + t * 50;
      return hsbToRgb(h, s, b);
    }
  }

  function hsbToRgb(h, s, b) {
    h = ((h % 360) + 360) % 360;
    s /= 100; b /= 100;
    let c = b * s, x2 = c * (1 - Math.abs((h / 60) % 2 - 1)), m = b - c;
    let r, g, bv;
    let hi = Math.floor(h / 60);
    if (hi === 0) { r=c; g=x2; bv=0; }
    else if (hi === 1) { r=x2; g=c; bv=0; }
    else if (hi === 2) { r=0; g=c; bv=x2; }
    else if (hi === 3) { r=0; g=x2; bv=c; }
    else if (hi === 4) { r=x2; g=0; bv=c; }
    else { r=c; g=0; bv=x2; }
    return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((bv+m)*255)];
  }

  function renderTile(tile) {
    let pw = p.width, ph = p.height;
    let x0 = tile.x, y0 = tile.y;
    let x1 = Math.min(x0 + tileSize, pw);
    let y1 = Math.min(y0 + tileSize, ph);

    for (let py = y0; py < y1; py++) {
      for (let px = x0; px < x1; px++) {
        let rA = p.map(px, 0, pw, viewMinX, viewMaxX);
        let rB = p.map(py, 0, ph, viewMinY, viewMaxY);
        let lam = lyapunov(rA, rB, sequence, 200);
        let [r, g, b] = lyapunovColor(lam);
        let idx = 4 * (py * pw + px);
        p.pixels[idx] = r; p.pixels[idx+1] = g; p.pixels[idx+2] = b; p.pixels[idx+3] = 255;
      }
    }
  }

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.pixelDensity(1);
    buildTiles();
    needsRender = true;
  };

  p.draw = function() {
    let now = performance.now();
    let dt = now - lastTime; lastTime = now;
    if (dt > 0) {
      fpsArr.push(1000 / dt);
      if (fpsArr.length > 30) fpsArr.shift();
      document.getElementById('fps').textContent = 'FPS: ' + (fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length).toFixed(1);
    }

    // Auto-switch sequences
    switchTimer += dt;
    if (switchTimer > switchInterval && !rendering) {
      switchTimer = 0;
      seqIdx = (seqIdx + 1) % SEQUENCES.length;
      sequence = SEQUENCES[seqIdx];
      needsRender = true;
    }

    if (needsRender || seqIdx !== lastSeqIdx) {
      needsRender = false;
      lastSeqIdx = seqIdx;
      buildTiles();
      rendering = true;
      p.loadPixels();
      document.getElementById('seqLabel').textContent = 'SEQUENCE: ' + sequence;
    }

    if (rendering) {
      let tilesPerFrame = 3;
      for (let t = 0; t < tilesPerFrame && tileIndex < tiles.length; t++, tileIndex++) {
        renderTile(tiles[tileIndex]);
      }
      p.updatePixels();
      if (tileIndex >= tiles.length) {
        rendering = false;
        updateInfo();
      } else {
        document.getElementById('info').innerHTML =
          'Sequence: ' + sequence + '<br>' +
          'Rendering: ' + Math.floor(tileIndex / tiles.length * 100) + '%<br>' +
          'Blue = stable (λ<0)<br>Red = chaotic (λ>0)';
      }
    }
  };

  function updateInfo() {
    document.getElementById('info').innerHTML =
      'Sequence: ' + sequence + '<br>' +
      'rA ∈ [' + viewMinX.toFixed(2) + ', ' + viewMaxX.toFixed(2) + ']<br>' +
      'rB ∈ [' + viewMinY.toFixed(2) + ', ' + viewMaxY.toFixed(2) + ']<br>' +
      'Auto-cycles through 8 sequences';
  }

  p.mouseWheel = function(e) {
    let factor = e.delta > 0 ? 1.15 : 0.87;
    let mx = p.map(p.mouseX, 0, p.width, viewMinX, viewMaxX);
    let my = p.map(p.mouseY, 0, p.height, viewMinY, viewMaxY);
    let rangeX = (viewMaxX - viewMinX) * factor;
    let rangeY = (viewMaxY - viewMinY) * factor;
    viewMinX = mx - rangeX * (p.mouseX / p.width);
    viewMaxX = mx + rangeX * (1 - p.mouseX / p.width);
    viewMinY = my - rangeY * (p.mouseY / p.height);
    viewMaxY = my + rangeY * (1 - p.mouseY / p.height);
    needsRender = true;
    return false;
  };

  let isDragging = false;
  let dragStart = {};

  p.mousePressed = function() {
    isDragging = true;
    dragStart = { mx: p.mouseX, my: p.mouseY, vx: viewMinX, vy: viewMinY };
  };

  p.mouseDragged = function() {
    if (!isDragging) return;
    let dx = (p.mouseX - dragStart.mx) / p.width * (viewMaxX - viewMinX);
    let dy = (p.mouseY - dragStart.my) / p.height * (viewMaxY - viewMinY);
    let rangeX = viewMaxX - viewMinX, rangeY = viewMaxY - viewMinY;
    viewMinX = dragStart.vx - dx;
    viewMaxX = viewMinX + rangeX;
    viewMinY = dragStart.vy - dy;
    viewMaxY = viewMinY + rangeY;
    needsRender = true;
  };

  p.mouseReleased = function() { isDragging = false; };

  p.keyPressed = function() {
    if (p.key === ' ') {
      seqIdx = (seqIdx + 1) % SEQUENCES.length;
      sequence = SEQUENCES[seqIdx];
      needsRender = true;
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    needsRender = true;
  };
});
</script>
</body>
</html>
