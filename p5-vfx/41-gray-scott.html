<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gray-Scott Reaction-Diffusion — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<div id="info">Preset: coral</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const GW = 256, GH = 256;
const Da = 1.0, Db = 0.5;
const STEPS_PER_FRAME = 8;
const dt = 1.0;

const PRESETS = [
  { name: 'coral',       f: 0.0545, k: 0.062 },
  { name: 'fingerprint', f: 0.037,  k: 0.060 },
  { name: 'mitosis',     f: 0.028,  k: 0.062 },
  { name: 'worms',       f: 0.058,  k: 0.065 },
];
let presetIdx = 0;
let f, k;

let A, B, nextA, nextB;
let pg;
let fpsEl, infoEl;
let lastFpsTime, frameCount2 = 0;
let presetTimer = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(1);
  pg = createGraphics(GW, GH);
  pg.pixelDensity(1);
  fpsEl = document.getElementById('fps');
  infoEl = document.getElementById('info');
  lastFpsTime = millis();
  initGrids();
  setPreset(0);
  noSmooth();
  imageMode(CORNER);
}

function setPreset(idx) {
  presetIdx = idx % PRESETS.length;
  f = PRESETS[presetIdx].f;
  k = PRESETS[presetIdx].k;
  infoEl.textContent = 'Preset: ' + PRESETS[presetIdx].name + ' (auto-cycles every 30s)';
  initGrids();
}

function initGrids() {
  A = new Float32Array(GW * GH);
  B = new Float32Array(GW * GH);
  nextA = new Float32Array(GW * GH);
  nextB = new Float32Array(GW * GH);
  for (let i = 0; i < GW * GH; i++) { A[i] = 1.0; B[i] = 0.0; }
  // Seed center with several random spots
  let seeds = 12;
  for (let s = 0; s < seeds; s++) {
    let cx = floor(random(GW * 0.25, GW * 0.75));
    let cy = floor(random(GH * 0.25, GH * 0.75));
    let r = floor(random(4, 10));
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        if (dx*dx + dy*dy <= r*r) {
          let nx = (cx + dx + GW) % GW;
          let ny = (cy + dy + GH) % GH;
          A[ny * GW + nx] = 0.5 + random(-0.05, 0.05);
          B[ny * GW + nx] = 0.25 + random(-0.05, 0.05);
        }
      }
    }
  }
}

function laplacianA(x, y) {
  let idx = y * GW + x;
  let l = x > 0 ? A[idx - 1] : A[y * GW + (GW - 1)];
  let r = x < GW - 1 ? A[idx + 1] : A[y * GW];
  let u = y > 0 ? A[(y - 1) * GW + x] : A[(GH - 1) * GW + x];
  let d = y < GH - 1 ? A[(y + 1) * GW + x] : A[x];
  return l + r + u + d - 4.0 * A[idx];
}

function laplacianB(x, y) {
  let idx = y * GW + x;
  let l = x > 0 ? B[idx - 1] : B[y * GW + (GW - 1)];
  let r = x < GW - 1 ? B[idx + 1] : B[y * GW];
  let u = y > 0 ? B[(y - 1) * GW + x] : B[(GH - 1) * GW + x];
  let d = y < GH - 1 ? B[(y + 1) * GW + x] : B[x];
  return l + r + u + d - 4.0 * B[idx];
}

function stepReaction() {
  for (let y = 0; y < GH; y++) {
    for (let x = 0; x < GW; x++) {
      let idx = y * GW + x;
      let a = A[idx], b = B[idx];
      let ab2 = a * b * b;
      let la = laplacianA(x, y);
      let lb = laplacianB(x, y);
      nextA[idx] = constrain(a + (Da * la - ab2 + f * (1.0 - a)) * dt, 0, 1);
      nextB[idx] = constrain(b + (Db * lb + ab2 - (f + k) * b) * dt, 0, 1);
    }
  }
  let tmp = A; A = nextA; nextA = tmp;
  tmp = B; B = nextB; nextB = tmp;
}

function draw() {
  // Preset cycling
  presetTimer += deltaTime;
  if (presetTimer > 30000) {
    presetTimer = 0;
    setPreset(presetIdx + 1);
  }

  for (let s = 0; s < STEPS_PER_FRAME; s++) stepReaction();

  // Render to graphics buffer
  pg.loadPixels();
  let pd = pg.pixels;
  for (let i = 0; i < GW * GH; i++) {
    let b = B[i];
    // Map b: 0→black, 0.25→deep blue, 0.5→cyan, 0.75→white-cyan, 1→white
    let r, g, bl;
    if (b < 0.25) {
      let t = b / 0.25;
      r = 0; g = 0; bl = floor(t * 80);
    } else if (b < 0.5) {
      let t = (b - 0.25) / 0.25;
      r = 0; g = floor(t * 200); bl = floor(80 + t * 175);
    } else if (b < 0.75) {
      let t = (b - 0.5) / 0.25;
      r = floor(t * 80); g = floor(200 + t * 55); bl = 255;
    } else {
      let t = (b - 0.75) / 0.25;
      r = floor(80 + t * 175); g = 255; bl = 255;
    }
    let pi = i * 4;
    pd[pi]   = r;
    pd[pi+1] = g;
    pd[pi+2] = bl;
    pd[pi+3] = 255;
  }
  pg.updatePixels();

  // Scale to canvas
  image(pg, 0, 0, width, height);

  // FPS
  frameCount2++;
  let now = millis();
  if (now - lastFpsTime > 500) {
    let fps = (frameCount2 / ((now - lastFpsTime) / 1000)).toFixed(1);
    fpsEl.textContent = fps + ' fps';
    frameCount2 = 0;
    lastFpsTime = now;
  }
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }

function mousePressed() {
  // Add disturbance at mouse position
  let gx = floor(map(mouseX, 0, width, 0, GW));
  let gy = floor(map(mouseY, 0, height, 0, GH));
  let r = 6;
  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      if (dx*dx + dy*dy <= r*r) {
        let nx = (gx + dx + GW) % GW;
        let ny = (gy + dy + GH) % GH;
        A[ny * GW + nx] = 0.5;
        B[ny * GW + nx] = 0.25;
      }
    }
  }
}
</script>
</body></html>
