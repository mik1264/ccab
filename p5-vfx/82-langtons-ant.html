<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Langton's Ant | P5 VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#hud { position:fixed; top:12px; right:12px; color:#888; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.75); padding:8px 12px; border-radius:6px; z-index:999; line-height:1.9; max-width:260px; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="hud">
  <div>FPS: <span id="fps">0</span> &nbsp; STEPS: <span id="steps">0</span></div>
  <div id="antinfo"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const CS = 2; // cell size
  const STEPS_PER_FRAME = 200;
  let cols, rows;
  // Each cell stores: which ant's color (0=unvisited), state index 0..N
  // We use a separate grid per ant for state (to allow multi-color rules)
  let ants;
  let cellAntColor; // which ant last painted this cell
  let cellState;    // per-ant grid
  let totalSteps = 0;
  let frameCount0 = 0, lastFPS = 0, lastFPSTime = 0;

  // Ant definitions: {rule, hue, x, y, dir}
  // rule: string of 'R'/'L' — at state k, turn that direction, advance state
  const ANT_DEFS = [
    { rule: 'RL',   hue: 180 }, // classic Langton: RL
    { rule: 'RRL',  hue: 30  }, // orange
    { rule: 'LLRR', hue: 300 }, // magenta
    { rule: 'RLLR', hue: 90  }, // lime
    { rule: 'LRRL', hue: 0   }, // red
  ];

  // Directions: 0=up,1=right,2=down,3=left
  const DX = [0, 1, 0, -1];
  const DY = [-1, 0, 1, 0];

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    cols = Math.floor(p.width / CS);
    rows = Math.floor(p.height / CS);
    initSim();
  };

  function initSim() {
    totalSteps = 0;
    cellState = []; // cellState[antIdx] = Uint8Array
    cellAntColor = new Int8Array(cols * rows).fill(-1);

    ants = ANT_DEFS.map((def, i) => {
      cellState.push(new Uint8Array(cols * rows));
      return {
        rule: def.rule,
        n: def.rule.length,
        hue: def.hue,
        x: Math.floor(cols / 2) + (i - 2) * 40,
        y: Math.floor(rows / 2) + (i - 2) * 20,
        dir: i % 4,
        steps: 0
      };
    });
  }

  function stepAnt(a, ai) {
    const i = a.y * cols + a.x;
    const state = cellState[ai][i];
    const turn = a.rule[state % a.n];
    if (turn === 'R') a.dir = (a.dir + 1) % 4;
    else              a.dir = (a.dir + 3) % 4;
    cellState[ai][i] = (state + 1) % a.n;
    cellAntColor[i] = ai; // last writer wins for color
    a.x = ((a.x + DX[a.dir]) + cols) % cols;
    a.y = ((a.y + DY[a.dir]) + rows) % rows;
    a.steps++;
  }

  p.draw = function() {
    frameCount0++;
    const now = performance.now();
    if (now - lastFPSTime >= 500) {
      lastFPS = Math.round(frameCount0 / ((now - lastFPSTime) / 1000));
      frameCount0 = 0; lastFPSTime = now;
    }

    for (let s = 0; s < STEPS_PER_FRAME; s++) {
      ants.forEach((a, ai) => stepAnt(a, ai));
      totalSteps++;
    }

    // Render
    p.loadPixels();
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const ci = r * cols + c;
        let R = 0, G = 0, B = 0;
        const ai = cellAntColor[ci];
        if (ai >= 0) {
          const ant = ants[ai];
          const state = cellState[ai][ci];
          const n = ant.n;
          // Brightness varies by state
          const bri = 20 + (state / Math.max(n - 1, 1)) * 75;
          const sat = 70 + (state / Math.max(n - 1, 1)) * 30;
          [R, G, B] = hsbToRgb(ant.hue, sat, bri);
        }
        for (let py = 0; py < CS; py++) {
          for (let px = 0; px < CS; px++) {
            const pi = 4 * ((r * CS + py) * p.width + (c * CS + px));
            p.pixels[pi]   = R;
            p.pixels[pi+1] = G;
            p.pixels[pi+2] = B;
            p.pixels[pi+3] = 255;
          }
        }
      }
    }
    // Draw ant positions
    ants.forEach(a => {
      const pi = 4 * ((a.y * CS) * p.width + (a.x * CS));
      p.pixels[pi] = 255; p.pixels[pi+1] = 255; p.pixels[pi+2] = 255; p.pixels[pi+3] = 255;
    });
    p.updatePixels();

    // HUD
    document.getElementById('fps').textContent = lastFPS;
    document.getElementById('steps').textContent = totalSteps.toLocaleString();
    document.getElementById('antinfo').innerHTML = ants.map((a, i) =>
      `<span style="color:hsl(${a.hue},80%,60%)">Ant${i+1}: ${a.rule}</span>`
    ).join('<br>');
  };

  function hsbToRgb(h, s, b) {
    h = ((h % 360) + 360) % 360; s /= 100; b /= 100;
    const c = b*s, x = c*(1-Math.abs((h/60)%2-1)), m = b-c;
    let r=0,g=0,bl=0;
    if (h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;bl=x;}
    else if(h<240){g=x;bl=c;}else if(h<300){r=x;bl=c;}else{r=c;bl=x;}
    return [Math.round((r+m)*255),Math.round((g+m)*255),Math.round((bl+m)*255)];
  }

  p.keyPressed = function() {
    if (p.key === 'r' || p.key === 'R') { initSim(); p.background(0); }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    cols = Math.floor(p.width / CS);
    rows = Math.floor(p.height / CS);
    initSim();
  };
});
</script>
</body>
</html>
