<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torus Knot 3D | P5.js VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
.back-link {
  position: fixed; top: 16px; left: 16px; z-index: 100;
  color: rgba(255,255,255,0.6); text-decoration: none;
  font-size: 13px; letter-spacing: 0.05em;
  background: rgba(255,255,255,0.08);
  padding: 6px 12px; border-radius: 20px;
  transition: background 0.2s;
}
.back-link:hover { background: rgba(255,255,255,0.18); color: #fff; }
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Gallery</a>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

// Knot sequence: [p, q] pairs
const KNOT_SEQUENCE = [
  [2, 3], [3, 4], [3, 5], [4, 5],
  [5, 6], [2, 5], [3, 7], [5, 7]
];
const MORPH_TIME = 3.0; // seconds to morph
const PAUSE_TIME = 2.0; // seconds to pause

let knotIdx = 0;
let morphT = 0; // 0 = start, 1 = end
let phase = 'pause'; // 'morph' or 'pause'
let phaseTimer = 0;

let currentP = 2, currentQ = 3;
let targetP = 2, targetQ = 3;

const STEPS = 800;
const SCALE = 100;
const GHOST_COUNT = 4;
let ghostKnots = [];

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  colorMode(HSB, 360, 100, 100, 100);
  strokeWeight(2);
  noFill();
}

function torusKnotPoints(p, q) {
  let pts = [];
  let total = STEPS;
  for (let i = 0; i <= total; i++) {
    let t = (i / total) * TWO_PI * q;
    let r = cos(q * t) + 2;
    let x = r * cos(p * t) * SCALE;
    let y = r * sin(p * t) * SCALE;
    let z = -sin(q * t) * SCALE;
    pts.push([x, y, z]);
  }
  return pts;
}

function drawKnot(pts, alpha, hueShift) {
  beginShape();
  for (let i = 0; i < pts.length; i++) {
    let hue = ((i / pts.length) * 360 + hueShift) % 360;
    stroke(hue, 90, 100, alpha);
    vertex(pts[i][0], pts[i][1], pts[i][2]);
  }
  endShape();
}

let lastTime = 0;

function draw() {
  let nowMs = millis();
  let dt = (nowMs - lastTime) / 1000;
  if (lastTime === 0) dt = 0;
  lastTime = nowMs;

  // Phase management
  phaseTimer += dt;
  if (phase === 'pause') {
    if (phaseTimer >= PAUSE_TIME) {
      phase = 'morph';
      phaseTimer = 0;
      morphT = 0;
      knotIdx = (knotIdx + 1) % KNOT_SEQUENCE.length;
      targetP = KNOT_SEQUENCE[knotIdx][0];
      targetQ = KNOT_SEQUENCE[knotIdx][1];
      // Save ghost
      ghostKnots.push({
        pts: torusKnotPoints(currentP, currentQ),
        born: frameCount
      });
      if (ghostKnots.length > GHOST_COUNT) ghostKnots.shift();
    }
  } else {
    morphT = min(phaseTimer / MORPH_TIME, 1);
    // Smooth ease in-out
    let ease = morphT * morphT * (3 - 2 * morphT);
    currentP = lerp(KNOT_SEQUENCE[(knotIdx - 1 + KNOT_SEQUENCE.length) % KNOT_SEQUENCE.length][0], targetP, ease);
    currentQ = lerp(KNOT_SEQUENCE[(knotIdx - 1 + KNOT_SEQUENCE.length) % KNOT_SEQUENCE.length][1], targetQ, ease);
    if (morphT >= 1) {
      phase = 'pause';
      phaseTimer = 0;
      currentP = targetP;
      currentQ = targetQ;
    }
  }

  background(240, 20, 3, 25);
  blendMode(ADD);

  orbitControl(2, 2, 0.1);
  rotateY(frameCount * 0.005);

  // Draw ghost trails
  for (let gi = 0; gi < ghostKnots.length; gi++) {
    let age = frameCount - ghostKnots[gi].born;
    let fadeAlpha = max(0, 30 - age * 0.4);
    if (fadeAlpha <= 0) continue;
    strokeWeight(0.8);
    drawKnot(ghostKnots[gi].pts, fadeAlpha, gi * 40);
  }

  // Draw current knot
  let pts = torusKnotPoints(currentP, currentQ);
  strokeWeight(2);
  drawKnot(pts, 85, frameCount * 0.3);

  // Inner glow pass
  strokeWeight(1);
  drawKnot(pts, 30, frameCount * 0.3 + 30);

  blendMode(BLEND);

  // Text overlay — must use resetMatrix() in WEBGL
  resetMatrix();
  let dispP = round(currentP * 10) / 10;
  let dispQ = round(currentQ * 10) / 10;
  let pInt = round(targetP);
  let qInt = round(targetQ);

  fill(60, 20, 100, 80);
  noStroke();
  textSize(15);
  textAlign(LEFT);
  text('Torus Knot (p,q)', -width / 2 + 20, -height / 2 + 40);

  fill(180, 80, 100, 80);
  textSize(22);
  text('p = ' + nf(dispP, 1, 1) + '  q = ' + nf(dispQ, 1, 1), -width / 2 + 20, -height / 2 + 70);

  fill(0, 0, 70, 50);
  textSize(11);
  text('target: (' + pInt + ',' + qInt + ')  ' + phase, -width / 2 + 20, -height / 2 + 88);
  text('drag to orbit • sequence cycles automatically', -width / 2 + 20, height / 2 - 20);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
