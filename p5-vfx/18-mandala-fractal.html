<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandala Fractal</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#faf; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#d8d; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:6px; line-height:1.7; z-index:999; pointer-events:none; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">12-fold Mandala Fractal<br>Depth-5 recursive branching<br>Mouse: modulate branch angle</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let fpsArr = [], lastTime = 0;
  let symmetry = 12;
  let maxDepth = 5;

  function branch(len, depth, hueBase, t, branchAngle) {
    if (depth === 0 || len < 1.5) return;

    let hue = (hueBase + depth * 35 + t * 20) % 360;
    let sat = 85;
    let bri = 60 + depth * 8;
    let alpha = 70 + depth * 6;

    // Draw with glow (multiple passes, decreasing alpha)
    for (let g = 0; g < 3; g++) {
      let sw = (depth * 0.6 + g * 0.3);
      let al = alpha / (g + 1);
      p.strokeWeight(Math.max(0.3, sw));
      p.stroke(hue, sat - g * 15, bri + g * 10, al);
      p.line(0, 0, 0, -len);
    }

    p.translate(0, -len);

    let n = 3; // 3 children per branch
    for (let i = 0; i < n; i++) {
      let angle = p.map(i, 0, n, -branchAngle, branchAngle);
      p.push();
      p.rotate(angle);
      branch(len * 0.62, depth - 1, hueBase, t, branchAngle * 0.9);
      p.pop();
    }
  }

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
  };

  p.draw = function() {
    let now = performance.now();
    let dt = now - lastTime; lastTime = now;
    if (dt > 0) {
      fpsArr.push(1000 / dt);
      if (fpsArr.length > 30) fpsArr.shift();
      document.getElementById('fps').textContent = 'FPS: ' + (fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length).toFixed(1);
    }

    p.background(0, 0, 0, 18); // trail effect

    let t = p.millis() / 1000;
    let cx = p.width / 2, cy = p.height / 2;
    let baseLen = Math.min(p.width, p.height) * 0.23;

    // Mouse modulates branch angle
    let mouseInfluence = p.map(p.mouseX, 0, p.width, 0.2, 1.0);
    let branchAngle = (0.35 + Math.sin(t * 0.3) * 0.1) * mouseInfluence * Math.PI;

    // Hue slowly cycles
    let hueBase = (t * 25) % 360;

    // Outer glow ring
    p.noFill();
    for (let g = 0; g < 4; g++) {
      p.strokeWeight(g + 0.5);
      p.stroke(hueBase, 60, 80, 8 - g * 2);
      p.circle(cx, cy, baseLen * 0.4 * 2);
    }

    // Draw 12-fold symmetric mandala
    let globalRot = t * 0.08; // slow global rotation

    for (let i = 0; i < symmetry; i++) {
      let angle = (Math.PI * 2 * i / symmetry) + globalRot;
      p.push();
      p.translate(cx, cy);
      p.rotate(angle);
      branch(baseLen, maxDepth, hueBase + i * (360 / symmetry), t, branchAngle);
      p.pop();
    }

    // Center decoration
    p.push();
    p.translate(cx, cy);
    for (let ring = 1; ring <= 4; ring++) {
      let r = baseLen * 0.04 * ring;
      p.noFill();
      for (let g = 0; g < 3; g++) {
        p.strokeWeight(1.5 - g * 0.4);
        p.stroke((hueBase + ring * 30) % 360, 80, 90, 50 - g * 15);
        p.circle(0, 0, r * 2);
      }
    }
    p.pop();

    document.getElementById('info').innerHTML =
      '12-fold Mandala Fractal<br>' +
      'Branch angle: ' + (branchAngle * 180 / Math.PI).toFixed(1) + '°<br>' +
      'Depth: ' + maxDepth + ' | Branches: 3 per node<br>' +
      'Mouse X: branch angle';
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
  };
});
</script>
</body>
</html>
