<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smoke Tendrils — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
let particles = [];
let t = 0;
let fpsEl, fpsTimer = 0, fpsFrames = 0;
const EMIT_PER_FRAME = 6;
const NOISE_SCALE = 0.004;
const EPSILON = 0.08;

// 3 source points
let sources;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(min(pixelDensity(), 2));
  background(0, 0, 6);
  fpsEl = document.getElementById('fps');
  sources = [
    { x: width * 0.25, y: height - 30 },
    { x: width * 0.5,  y: height - 30 },
    { x: width * 0.75, y: height - 30 },
  ];
}

function curlAt(x, y, z) {
  let n1 = noise(x * NOISE_SCALE, y * NOISE_SCALE, z);
  let n1dy = noise(x * NOISE_SCALE, (y + EPSILON) * NOISE_SCALE, z);
  let n2 = noise(x * NOISE_SCALE + 77, y * NOISE_SCALE + 77, z);
  let n2dx = noise((x + EPSILON) * NOISE_SCALE + 77, y * NOISE_SCALE + 77, z);
  return { x: (n1dy - n1) / EPSILON * 12, y: -(n2dx - n2) / EPSILON * 12 };
}

function spawnParticle(src) {
  let maxLife = floor(random(180, 360));
  return {
    x: src.x + random(-12, 12),
    y: src.y,
    vx: random(-0.3, 0.3),
    vy: random(-1.5, -0.5),
    life: maxLife,
    maxLife: maxLife,
    noiseOff: random(1000),
    size: random(6, 18),
    hue: random(25, 50), // warm white/yellow start
  };
}

function drawSoftCircle(x, y, r, h, s, b, a) {
  noStroke();
  let layers = 5;
  for (let i = layers; i >= 0; i--) {
    let lr = r * (1 + i * 0.5);
    let la = a / (i + 1);
    fill(h, s, b, la);
    ellipse(x, y, lr * 2, lr * 2);
  }
}

function draw() {
  fpsFrames++;
  let now = millis();
  if (now - fpsTimer > 500) {
    fpsEl.textContent = round(fpsFrames / ((now - fpsTimer) / 1000)) + ' fps';
    fpsFrames = 0; fpsTimer = now;
  }

  // Dark background — no trail (smoke opacity handles it)
  background(0, 0, 6, 18);
  blendMode(SCREEN);

  // Emit new particles
  for (let src of sources) {
    for (let i = 0; i < EMIT_PER_FRAME; i++) {
      particles.push(spawnParticle(src));
    }
  }

  // Global wind varying with noise
  let windX = (noise(t * 0.005) - 0.5) * 0.8;

  let z = t * 0.003;

  // Update and draw
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    let curl = curlAt(p.x + p.noiseOff, p.y, z);

    p.vx += curl.x * 0.06 + windX * 0.04;
    p.vy += curl.y * 0.04 - 0.15; // rising
    p.vx *= 0.97;
    p.vy *= 0.97;
    p.x += p.vx;
    p.y += p.vy;

    let lifeRatio = p.life / p.maxLife;
    let age = 1 - lifeRatio;

    // Size grows as smoke expands
    let sz = p.size * (1 + age * 3.5);

    // Color: warm white/yellow → grey → transparent
    let h = lerp(45, 200, age);
    let s = lerp(30, 0, age);
    let b = lerp(90, 55, age);
    let a = lifeRatio * lifeRatio * 22;

    drawSoftCircle(p.x, p.y, sz, h, s, b, a);

    p.life--;
    if (p.life <= 0 || p.y < -50) {
      particles.splice(i, 1);
    }
  }

  // Cap particle count
  if (particles.length > 3000) {
    particles.splice(0, particles.length - 3000);
  }

  blendMode(BLEND);

  // Glow at sources
  noStroke();
  for (let src of sources) {
    let gFlicker = noise(src.x * 0.01, t * 0.07) * 0.5 + 0.5;
    fill(40, 70, 95, 15 * gFlicker);
    ellipse(src.x, src.y, 60, 20);
  }

  t++;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  sources = [
    { x: width * 0.25, y: height - 30 },
    { x: width * 0.5,  y: height - 30 },
    { x: width * 0.75, y: height - 30 },
  ];
  background(0, 0, 6);
}
</script>
</body></html>
