<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Fire Model | P5 VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#hud { position:fixed; top:12px; right:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.75); padding:8px 12px; border-radius:6px; z-index:999; line-height:1.9; }
#graphs { position:fixed; top:80px; right:12px; background:rgba(0,0,0,0.7); border-radius:6px; z-index:999; }
#keys { position:fixed; bottom:12px; left:12px; color:#444; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:4px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="hud">
  FPS: <span id="fps">0</span><br>
  GEN: <span id="gen">0</span><br>
  TREES: <span id="trees">0</span>%<br>
  FIRES: <span id="fires">0</span>
</div>
<canvas id="graphs" width="130" height="80"></canvas>
<div id="keys">R reset · click ignite</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const CS=3;
  const EMPTY=0, TREE=1, BURNING=2;
  // P(empty->tree) per step, P(tree->fire) lightning
  const P_GROW=0.006, P_LIGHTNING=0.00003;
  let cols,rows,grid,next,treeAge;
  let gen=0;
  let fpsTimer=0,fpsCount=0,fpsVal=0;
  let densityHist=[],fireHist=[];
  const HIST=130;
  let t=0;

  p.setup=function(){
    p.createCanvas(p.windowWidth,p.windowHeight);
    p.colorMode(p.HSB,360,100,100,100);
    p.pixelDensity(1);
    cols=Math.floor(p.width/CS); rows=Math.floor(p.height/CS);
    grid=new Uint8Array(cols*rows);
    next=new Uint8Array(cols*rows);
    treeAge=new Uint16Array(cols*rows);
    reset();
  };

  function reset(){
    gen=0; t=0;
    for(let i=0;i<cols*rows;i++){
      if(Math.random()<0.6){ grid[i]=TREE; treeAge[i]=Math.floor(Math.random()*200); }
      else { grid[i]=EMPTY; treeAge[i]=0; }
    }
    densityHist=[]; fireHist=[];
  }

  function step(){
    let treeCnt=0, fireCnt=0;
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const i=r*cols+c;
        const v=grid[i];
        if(v===BURNING){ next[i]=EMPTY; treeAge[i]=0; fireCnt++; }
        else if(v===TREE){
          treeCnt++;
          let burn=false;
          // Check 4-neighbors for fire
          const nb=[[-1,0],[1,0],[0,-1],[0,1]];
          for(const[dr,dc]of nb){
            const rr=(r+dr+rows)%rows, cc=(c+dc+cols)%cols;
            if(grid[rr*cols+cc]===BURNING){ burn=true; break; }
          }
          if(burn||(Math.random()<P_LIGHTNING)){ next[i]=BURNING; treeAge[i]=0; }
          else{ next[i]=TREE; treeAge[i]=Math.min(treeAge[i]+1,500); }
        } else {
          // EMPTY: maybe grow a tree
          if(Math.random()<P_GROW){ next[i]=TREE; treeAge[i]=0; }
          else next[i]=EMPTY;
        }
      }
    }
    const tmp=grid; grid=next; next=tmp;
    gen++;
    return{treeCnt,fireCnt};
  }

  p.draw=function(){
    fpsCount++; t++;
    const now=performance.now();
    if(now-fpsTimer>=500){
      fpsVal=Math.round(fpsCount/((now-fpsTimer)/1000));
      fpsCount=0; fpsTimer=now;
    }

    if(p.mouseIsPressed){
      const mc=Math.floor(p.mouseX/CS), mr=Math.floor(p.mouseY/CS);
      for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){
        const c=mc+dc, r=mr+dr;
        if(c>=0&&c<cols&&r>=0&&r<rows&&grid[r*cols+c]===TREE) grid[r*cols+c]=BURNING;
      }
    }

    const{treeCnt,fireCnt}=step();

    p.loadPixels();
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const i=r*cols+c;
        const v=grid[i];
        let R=0,G=0,B=0;
        if(v===TREE){
          // Young trees bright green, old trees dark green
          const age=treeAge[i];
          const t2=Math.min(age/200,1);
          const hue=110+t2*20; // bright yellow-green to deep green
          const sat=75+t2*15;
          const bri=50+t2*30;
          [R,G,B]=hsbToRgb(hue,sat,bri);
        } else if(v===BURNING){
          // Flickering orange-red fire
          const flicker=Math.random()*30;
          const hue=15+flicker;
          [R,G,B]=hsbToRgb(hue,90,80+Math.random()*20);
        }
        // EMPTY = black (R=G=B=0)
        for(let py=0;py<CS;py++) for(let px=0;px<CS;px++){
          const pi=4*((r*CS+py)*p.width+(c*CS+px));
          p.pixels[pi]=R; p.pixels[pi+1]=G; p.pixels[pi+2]=B; p.pixels[pi+3]=255;
        }
      }
    }
    p.updatePixels();

    // Graph
    const pct=Math.round(treeCnt/(cols*rows)*100);
    densityHist.push(pct); fireHist.push(Math.min(fireCnt,200));
    if(densityHist.length>HIST){ densityHist.shift(); fireHist.shift(); }
    drawGraphs(pct,fireCnt);

    document.getElementById('fps').textContent=fpsVal;
    document.getElementById('gen').textContent=gen;
    document.getElementById('trees').textContent=pct;
    document.getElementById('fires').textContent=fireCnt;
  };

  function drawGraphs(pct,fire){
    const gc=document.getElementById('graphs');
    const ctx=gc.getContext('2d');
    ctx.clearRect(0,0,gc.width,gc.height);
    const W=gc.width, H=gc.height;
    const h2=H/2;
    // Density graph (top half)
    ctx.strokeStyle='#4a8';
    ctx.lineWidth=1;
    ctx.beginPath();
    densityHist.forEach((v,i)=>{
      const x=(i/HIST)*W, y=h2-(v/100)*h2;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
    // Fire graph (bottom half)
    const fireMax=Math.max(...fireHist,1);
    ctx.strokeStyle='#f62';
    ctx.beginPath();
    fireHist.forEach((v,i)=>{
      const x=(i/HIST)*W, y=H-(v/fireMax)*h2;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
    // Labels
    ctx.fillStyle='#4a8'; ctx.font='9px monospace'; ctx.fillText('density',2,10);
    ctx.fillStyle='#f62'; ctx.fillText('fire',2,h2+10);
  }

  function hsbToRgb(h,s,b){
    h=((h%360)+360)%360; s/=100; b/=100;
    const c=b*s,x=c*(1-Math.abs((h/60)%2-1)),m=b-c;
    let r=0,g=0,bl=0;
    if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;bl=x;}
    else if(h<240){g=x;bl=c;}else if(h<300){r=x;bl=c;}else{r=c;bl=x;}
    return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((bl+m)*255)];
  }

  p.keyPressed=function(){
    if(p.key==='r'||p.key==='R') reset();
  };

  p.windowResized=function(){
    p.resizeCanvas(p.windowWidth,p.windowHeight);
    cols=Math.floor(p.width/CS); rows=Math.floor(p.height/CS);
    grid=new Uint8Array(cols*rows); next=new Uint8Array(cols*rows);
    treeAge=new Uint16Array(cols*rows);
    reset();
  };
});
</script>
</body>
</html>
