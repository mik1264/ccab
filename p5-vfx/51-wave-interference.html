<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Interference</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#ui {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 18px;
  background: rgba(0,0,0,0.7);
  padding: 10px 20px;
  border-radius: 10px;
  color: #ccc;
  font-family: monospace;
  font-size: 13px;
  z-index: 999;
  border: 1px solid rgba(255,255,255,0.1);
}
#ui label { display:flex; align-items:center; gap:8px; }
#ui input[type=range] { width: 100px; accent-color: #f90; }
#hint {
  position: fixed;
  top: 12px;
  right: 12px;
  color: #888;
  font-family: monospace;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
  padding: 8px 12px;
  border-radius: 6px;
  line-height: 1.7;
  z-index: 999;
}
#fps {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  color: #0f0;
  font-family: monospace;
  font-size: 12px;
  background: rgba(0,0,0,0.6);
  padding: 4px 10px;
  border-radius: 5px;
  z-index: 999;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="hint">Drag sources · Press [3] for 3rd source · Slider = frequency</div>
<div id="ui">
  <label>Frequency <input type="range" id="freqSlider" min="1" max="8" step="0.1" value="3"></label>
  <span id="freqVal">3.0</span>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let sources = [];
  let freq = 3;
  let time = 0;
  let dragIdx = -1;
  let pxBuffer;
  let lastFPS = 0;
  let fpsDiv = document.getElementById('fps');
  let freqSlider = document.getElementById('freqSlider');
  let freqVal = document.getElementById('freqVal');

  freqSlider.addEventListener('input', () => {
    freq = parseFloat(freqSlider.value);
    freqVal.textContent = freq.toFixed(1);
  });

  p.setup = function() {
    let cnv = p.createCanvas(p.windowWidth, p.windowHeight);
    cnv.parent(document.body);
    p.pixelDensity(1);
    sources = [
      p.createVector(p.width * 0.35, p.height * 0.5),
      p.createVector(p.width * 0.65, p.height * 0.5)
    ];
    p.colorMode(p.HSB, 360, 100, 100, 100);
  };

  p.draw = function() {
    p.loadPixels();
    let w = p.width, h = p.height;
    let k = freq * 0.08;
    let omega = freq * 0.06;
    let t = time;
    let A = 127;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        let amp = 0;
        for (let s = 0; s < sources.length; s++) {
          let dx = x - sources[s].x;
          let dy = y - sources[s].y;
          let r = Math.sqrt(dx*dx + dy*dy);
          amp += Math.sin(k * r - omega * t) / (1 + r * 0.012);
        }
        let norm = amp / sources.length;
        let idx = (y * w + x) * 4;
        if (norm > 0.01) {
          // warm: orange-red
          let br = Math.min(255, norm * 140 + 30);
          p.pixels[idx]   = br * 1.0;
          p.pixels[idx+1] = br * 0.45;
          p.pixels[idx+2] = 0;
        } else if (norm < -0.01) {
          // cool: blue-cyan
          let br = Math.min(255, -norm * 140 + 30);
          p.pixels[idx]   = 0;
          p.pixels[idx+1] = br * 0.4;
          p.pixels[idx+2] = br;
        } else {
          p.pixels[idx]   = 0;
          p.pixels[idx+1] = 0;
          p.pixels[idx+2] = 0;
        }
        p.pixels[idx+3] = 255;
      }
    }
    p.updatePixels();

    // Draw source dots
    p.noStroke();
    for (let s = 0; s < sources.length; s++) {
      p.fill(0, 0, 100, 90);
      p.circle(sources[s].x, sources[s].y, 14);
      p.fill(40, 100, 100, 100);
      p.circle(sources[s].x, sources[s].y, 8);
    }

    time++;
    if (p.frameCount % 20 === 0) {
      fpsDiv.textContent = 'FPS: ' + Math.round(p.frameRate());
    }
  };

  p.mousePressed = function() {
    let minD = 30;
    dragIdx = -1;
    for (let i = 0; i < sources.length; i++) {
      let d = p.dist(p.mouseX, p.mouseY, sources[i].x, sources[i].y);
      if (d < Math.max(minD, 20)) {
        minD = d;
        dragIdx = i;
      }
    }
  };

  p.mouseDragged = function() {
    if (dragIdx >= 0) {
      sources[dragIdx].x = p.mouseX;
      sources[dragIdx].y = p.mouseY;
    }
  };

  p.mouseReleased = function() { dragIdx = -1; };

  p.keyPressed = function() {
    if (p.key === '3' && sources.length < 3) {
      sources.push(p.createVector(p.width * 0.5, p.height * 0.3));
    }
    if (p.key === '2' && sources.length > 2) {
      sources.pop();
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
  };
});
</script>
</body>
</html>
