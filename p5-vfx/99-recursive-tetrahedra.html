<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sierpinski Tetrahedron 3D — p5-vfx</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  .back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  .back-link:hover { color:#fff; }
  #fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  #info { position:fixed; bottom:12px; left:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; line-height:1.6; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Sierpinski Tetrahedron<br>Depth 5 — 1,024 tetrahedra<br>Drag to orbit</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const MAX_DEPTH = 5;

  // Tetrahedron base vertices (unit tetrahedron inscribed in sphere)
  const S = 200;
  const H = Math.sqrt(2/3);
  const BASE_VERTS = [
    [ 0,      S,       0      ],
    [ S*0.943, -S*0.333, 0      ],
    [-S*0.471, -S*0.333,  S*0.816],
    [-S*0.471, -S*0.333, -S*0.816]
  ];

  // Triangular faces of a tetrahedron (indices into 4 verts)
  const FACES = [[0,1,2],[0,2,3],[0,3,1],[1,3,2]];

  // Store all leaf triangles: [v0, v1, v2, depth]
  let triangles = [];

  function midpoint(a, b) {
    return [(a[0]+b[0])/2, (a[1]+b[1])/2, (a[2]+b[2])/2];
  }

  function subdivide(v0, v1, v2, v3, depth) {
    if (depth === 0) {
      // Add all 4 faces of this tetrahedron
      for (const [a, b, c] of FACES) {
        const vs = [v0, v1, v2, v3];
        triangles.push([vs[a], vs[b], vs[c], MAX_DEPTH]);
      }
      return;
    }
    // 4 midpoints
    const m01 = midpoint(v0, v1), m02 = midpoint(v0, v2), m03 = midpoint(v0, v3);
    const m12 = midpoint(v1, v2), m13 = midpoint(v1, v3), m23 = midpoint(v2, v3);

    // 4 corner sub-tetrahedra
    subdivide(v0,  m01, m02, m03, depth - 1);
    subdivide(m01, v1,  m12, m13, depth - 1);
    subdivide(m02, m12, v2,  m23, depth - 1);
    subdivide(m03, m13, m23, v3,  depth - 1);
  }

  // Build at depth
  function buildAtDepth(depth) {
    triangles = [];
    subdivide(...BASE_VERTS, depth);
  }

  let currentDepth = 1;
  let targetDepth  = 5;
  let depthTimer   = 0;
  const DEPTH_HOLD = 120;

  buildAtDepth(currentDepth);

  let rotX = 0, rotY = 0, rotZ = 0;
  let fpsArr = [], lastTime = 0;

  // Per-depth hue mapping
  const DEPTH_HUES = [0, 60, 130, 200, 270, 320];

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
  };

  p.draw = function() {
    p.background(0, 0, 4);
    p.orbitControl(3, 3, 0.05);

    p.ambientLight(25);
    p.directionalLight(255, 255, 255,  0.5, -1, -0.3);
    p.directionalLight(150, 200, 255, -0.5,  0.5,  0.4);
    p.directionalLight(255, 150, 100,  0.3,  0.3, -0.8);

    rotX += 0.003;
    rotY += 0.007;
    rotZ += 0.002;
    p.rotateX(rotX);
    p.rotateY(rotY);
    p.rotateZ(rotZ);

    // Depth sequencer
    depthTimer++;
    if (depthTimer > DEPTH_HOLD) {
      depthTimer = 0;
      currentDepth = Math.min(MAX_DEPTH, currentDepth + 1);
      if (currentDepth > MAX_DEPTH) currentDepth = 1;
      buildAtDepth(currentDepth);
    }

    p.noStroke();
    const triCount = triangles.length;

    for (let i = 0; i < triCount; i++) {
      const [v0, v1, v2] = triangles[i];

      // Compute face normal for shading
      const ux = v1[0]-v0[0], uy = v1[1]-v0[1], uz = v1[2]-v0[2];
      const wx = v2[0]-v0[0], wy = v2[1]-v0[1], wz = v2[2]-v0[2];
      const nx = uy*wz-uz*wy, ny = uz*wx-ux*wz, nz = ux*wy-uy*wx;
      const nl = Math.sqrt(nx*nx+ny*ny+nz*nz) || 1;

      // Color by depth level
      const depth = currentDepth;
      const hue   = (DEPTH_HUES[depth] + (i / triCount) * 60 + p.frameCount * 0.2) % 360;
      const sat   = 75 + 20 * (depth / MAX_DEPTH);
      const bri   = 45 + 40 * Math.abs(ny / nl);
      const alpha = depth < MAX_DEPTH ? 60 : 88;

      p.fill(hue, sat, bri, alpha);
      p.beginShape(p.TRIANGLES);
      p.vertex(...v0); p.vertex(...v1); p.vertex(...v2);
      p.endShape();

      // Wireframe overlay for inner structure visibility
      if (currentDepth <= 3) {
        p.stroke(hue, 30, 100, 30);
        p.strokeWeight(0.5);
        p.noFill();
        p.beginShape(p.TRIANGLES);
        p.vertex(...v0); p.vertex(...v1); p.vertex(...v2);
        p.endShape(p.CLOSE);
        p.noStroke();
      }
    }

    // FPS
    const now = p.millis();
    const dt  = now - lastTime; lastTime = now;
    fpsArr.push(1000/dt);
    if (fpsArr.length > 30) fpsArr.shift();
    const fps = Math.round(fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length);
    document.getElementById('fps').textContent = `FPS: ${fps}`;
    document.getElementById('info').innerHTML =
      `Sierpinski Tetrahedron<br>Depth ${currentDepth} — ${triCount} triangles<br>Drag to orbit`;
  };

  p.windowResized = function() { p.resizeCanvas(p.windowWidth, p.windowHeight); };
});
</script>
</body>
</html>
