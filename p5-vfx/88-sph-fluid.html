<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPH Fluid Simulation | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

new p5(function(p) {
    const N = 400;
    const H = 22;          // smoothing radius
    const MASS = 1.0;
    const REST_DENSITY = 1.0;
    const K_PRESSURE  = 200;
    const VISCOSITY   = 0.3;
    const GRAVITY     = 180;
    const DT          = 0.008;
    const DAMP        = 0.65;
    const CELL        = Math.ceil(H);

    // Container
    let CX, CY, CW, CH; // container rect

    let px2 = [], py = [], vx = [], vy = [], rho = [], pres = [];
    let fpsVal = 0, fpsLast = 0, fpsFrames = 0;

    // Spatial hash
    let grid = {};

    function cellKey(cx, cy) { return cx + ',' + cy; }
    function worldToCell(wx, wy) {
        return { cx: Math.floor((wx - CX) / CELL), cy: Math.floor((wy - CY) / CELL) };
    }

    function buildGrid() {
        grid = {};
        for (let i = 0; i < N; i++) {
            const { cx, cy } = worldToCell(px2[i], py[i]);
            const k = cellKey(cx, cy);
            if (!grid[k]) grid[k] = [];
            grid[k].push(i);
        }
    }

    function neighbors(i) {
        const { cx, cy } = worldToCell(px2[i], py[i]);
        const result = [];
        for (let dcx = -2; dcx <= 2; dcx++) {
            for (let dcy = -2; dcy <= 2; dcy++) {
                const k = cellKey(cx + dcx, cy + dcy);
                if (grid[k]) {
                    for (let j of grid[k]) result.push(j);
                }
            }
        }
        return result;
    }

    // Poly6 kernel
    function W_poly6(r2, h) {
        if (r2 >= h * h) return 0;
        const t = h * h - r2;
        return (315 / (64 * Math.PI * Math.pow(h, 9))) * t * t * t;
    }

    // Spiky kernel gradient magnitude (negative r direction)
    function W_spiky_grad(r, h) {
        if (r >= h || r < 0.001) return 0;
        const t = h - r;
        return -(45 / (Math.PI * Math.pow(h, 6))) * t * t;
    }

    // Viscosity laplacian kernel
    function W_visc_lap(r, h) {
        if (r >= h) return 0;
        return (45 / (Math.PI * Math.pow(h, 6))) * (h - r);
    }

    function init() {
        const cols = Math.floor(CW / (H * 0.7));
        for (let i = 0; i < N; i++) {
            const col = i % cols;
            const row = Math.floor(i / cols);
            px2[i] = CX + 10 + col * (H * 0.7) + p.random(-2, 2);
            py[i]  = CY + 10 + row * (H * 0.7) + p.random(-2, 2);
            vx[i]  = p.random(-10, 10);
            vy[i]  = p.random(-5, 5);
            rho[i] = REST_DENSITY;
            pres[i] = 0;
        }
    }

    p.setup = function() {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.colorMode(p.HSB, 360, 100, 100, 100);
        p.pixelDensity(1);
        computeContainer();
        init();
    };

    function computeContainer() {
        const margin = 50;
        CW = Math.min(p.width - margin * 2, 700);
        CH = Math.min(p.height - margin * 2, 500);
        CX = (p.width - CW) / 2;
        CY = (p.height - CH) / 2;
    }

    function sphStep() {
        buildGrid();

        // Compute densities
        for (let i = 0; i < N; i++) {
            rho[i] = 0;
            for (let j of neighbors(i)) {
                const dx = px2[i] - px2[j];
                const dy2 = py[i] - py[j];
                const r2 = dx*dx + dy2*dy2;
                rho[i] += MASS * W_poly6(r2, H);
            }
            rho[i] = Math.max(rho[i], 0.001);
            pres[i] = K_PRESSURE * (rho[i] - REST_DENSITY);
        }

        // Compute forces and integrate
        for (let i = 0; i < N; i++) {
            let fx = 0, fy = GRAVITY * rho[i]; // gravity acts downward

            for (let j of neighbors(i)) {
                if (i === j) continue;
                const dx = px2[i] - px2[j];
                const dy2 = py[i] - py[j];
                const r2 = dx*dx + dy2*dy2;
                const r  = Math.sqrt(r2);
                if (r < 0.001) continue;

                // Pressure force
                const pGrad = W_spiky_grad(r, H);
                const pForce = -MASS * (pres[i] + pres[j]) / (2 * rho[j]) * pGrad;
                fx += pForce * (dx / r);
                fy += pForce * (dy2 / r);

                // Viscosity force
                if (r < H) {
                    const vLap = W_visc_lap(r, H);
                    fx += VISCOSITY * MASS * (vx[j] - vx[i]) / rho[j] * vLap;
                    fy += VISCOSITY * MASS * (vy[j] - vy[i]) / rho[j] * vLap;
                }
            }

            // Integrate
            vx[i] += DT * fx / rho[i];
            vy[i] += DT * fy / rho[i];
            px2[i] += DT * vx[i];
            py[i]  += DT * vy[i];

            // Boundary collisions
            const margin2 = 3;
            if (px2[i] < CX + margin2)        { px2[i] = CX + margin2;        vx[i] *= -DAMP; }
            if (px2[i] > CX + CW - margin2)   { px2[i] = CX + CW - margin2;   vx[i] *= -DAMP; }
            if (py[i]  < CY + margin2)         { py[i]  = CY + margin2;        vy[i] *= -DAMP; }
            if (py[i]  > CY + CH - margin2)    { py[i]  = CY + CH - margin2;   vy[i] *= -DAMP; }
        }
    }

    p.draw = function() {
        fpsFrames++;
        const now = performance.now();
        if (now - fpsLast >= 600) {
            fpsVal = Math.round(fpsFrames / ((now - fpsLast) / 1000));
            fpsFrames = 0; fpsLast = now;
        }

        // Trail fade
        p.colorMode(p.RGB);
        p.fill(10, 10, 15, 45);
        p.noStroke();
        p.rect(0, 0, p.width, p.height);
        p.colorMode(p.HSB, 360, 100, 100, 100);

        sphStep();

        // Render particles
        p.drawingContext.globalCompositeOperation = 'lighter';
        p.noStroke();
        for (let i = 0; i < N; i++) {
            const speed = Math.sqrt(vx[i]*vx[i] + vy[i]*vy[i]);
            const norm = Math.min(speed / 300, 1.0);
            // slow = deep blue (210), fast = cyan (180) → white
            const hue = p.lerp(220, 185, norm);
            const sat = p.lerp(100, 60, norm);
            const bri = p.lerp(55, 100, norm);

            // Outer glow
            p.fill(hue, sat, bri, 18);
            p.ellipse(px2[i], py[i], H * 1.1, H * 1.1);
            // Core
            p.fill(hue, sat * 0.7, bri, 70);
            p.ellipse(px2[i], py[i], 5, 5);
        }
        p.drawingContext.globalCompositeOperation = 'source-over';

        // Container outline
        p.noFill();
        p.stroke(200, 40, 50, 50);
        p.strokeWeight(1.5);
        p.rect(CX, CY, CW, CH, 4);

        // FPS
        p.textFont('monospace');
        p.textSize(12);
        p.textAlign(p.RIGHT, p.TOP);
        p.noStroke();
        p.fill(0, 0, 70, 70);
        p.text('FPS: ' + fpsVal, p.width - 12, 12);

        // Hint
        p.textAlign(p.CENTER, p.BOTTOM);
        p.fill(0, 0, 50, 55);
        p.textSize(11);
        p.text('SPH Fluid — ' + N + ' particles  |  click to splash', p.width / 2, p.height - 8);
    };

    p.mousePressed = function() {
        // Drop 20 fast particles from click position
        const clickX = p.mouseX;
        const clickY = p.mouseY;
        for (let i = 0; i < N; i += Math.floor(N / 20)) {
            const dx2 = clickX - px2[i];
            const dy2 = clickY - py[i];
            const dist = Math.sqrt(dx2*dx2 + dy2*dy2) + 1;
            const force = 800 / dist;
            vx[i] += (dx2 / dist) * force;
            vy[i] += (dy2 / dist) * force;
        }
    };

    p.windowResized = function() {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        computeContainer();
        init();
    };
});
    </script>
</body>
</html>
