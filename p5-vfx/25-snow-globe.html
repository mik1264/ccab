<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snow Globe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0612; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#0f0; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#hint { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); color:#888; font-family:monospace; font-size:12px; letter-spacing:2px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="hint">CLICK TO SHAKE</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const sketch = (p) => {
  const NUM_SNOW = 400;
  let flakes = [];
  let settled = []; // settled snow accumulation map by x bucket
  let domeCx, domeCy, domeR;
  let fpsEl, frameCount2 = 0, fpsTimer = 0;
  let noiseOff = 0;
  let groundLevel;

  // Settled snow: array of y-levels by x bucket (4px wide)
  let snowLevel;

  function initGlobe() {
    domeCx = p.width / 2;
    domeCy = p.height * 0.52;
    domeR = Math.min(p.width, p.height) * 0.36;
    groundLevel = domeCy + domeR * 0.72;
    snowLevel = new Float32Array(p.width).fill(groundLevel);
  }

  class Flake {
    constructor(settled2) {
      this.reset(settled2);
    }
    reset(onGround) {
      // Random position inside dome
      let angle = p.random(p.TWO_PI);
      let r = p.random(0, domeR * 0.9);
      this.x = domeCx + p.cos(angle) * r;
      this.y = onGround ? p.random(-domeR, domeCy - domeR * 0.3) + domeCy - domeR * 0.5
                        : p.random(domeCy - domeR * 0.9, domeCy - domeR * 0.3);
      this.r = p.random(1.5, 4.5);
      this.vx = p.random(-0.3, 0.3);
      this.vy = p.random(0.3, 1.2);
      this.noiseOff = p.random(1000);
      this.settled2 = false;
      this.alpha = p.random(70, 100);
    }
    update() {
      if (this.settled2) return;
      // Turbulence
      let nx = p.noise(this.x * 0.003, this.y * 0.003, noiseOff) * 2 - 1;
      this.vx = p.lerp(this.vx, nx * 0.8, 0.05);
      this.vy = p.lerp(this.vy, 0.6 + this.r * 0.15, 0.02);
      this.x += this.vx;
      this.y += this.vy;

      // Reflect off dome walls
      let dx = this.x - domeCx, dy = this.y - domeCy;
      let dist = p.sqrt(dx*dx + dy*dy);
      if (dist + this.r > domeR * 0.97) {
        let nx2 = dx / dist, ny2 = dy / dist;
        this.vx -= 2 * (this.vx * nx2 + this.vy * ny2) * nx2;
        this.vy -= 2 * (this.vx * nx2 + this.vy * ny2) * ny2;
        this.x = domeCx + nx2 * (domeR * 0.95 - this.r);
        this.y = domeCy + ny2 * (domeR * 0.95 - this.r);
      }

      // Settle at bottom
      let bx = Math.round(this.x);
      if (bx >= 0 && bx < p.width) {
        let sl = snowLevel[bx] - this.r;
        if (this.y >= sl) {
          this.y = sl;
          snowLevel[bx] = Math.max(snowLevel[bx] - this.r * 0.6, groundLevel - domeR * 0.35);
          this.settled2 = true;
        }
      }
    }
    draw() {
      p.blendMode(p.ADD);
      p.noStroke();
      // Glow
      p.fill(200, 10, 100, this.alpha * 0.25);
      p.circle(this.x, this.y, this.r * 3.5);
      p.fill(200, 5, 100, this.alpha);
      p.circle(this.x, this.y, this.r * 1.6);
    }
    shake() {
      this.settled2 = false;
      this.vx += p.random(-4, 4);
      this.vy += p.random(-6, -1);
    }
  }

  p.setup = () => {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    initGlobe();
    for (let i = 0; i < NUM_SNOW; i++) flakes.push(new Flake(true));
  };

  p.mousePressed = () => {
    // Shake
    snowLevel.fill(groundLevel);
    for (let f of flakes) f.shake();
  };

  function drawTree(x, y, h, w) {
    // Simple fir tree
    p.noStroke();
    p.fill(130, 70, 25, 100);
    // Trunk
    p.rect(x - w*0.08, y, w*0.16, h*0.25);
    // Layers
    for (let layer = 0; layer < 4; layer++) {
      let ly = y - h * (0.15 + layer * 0.22);
      let lw = w * (0.9 - layer * 0.18);
      p.fill(130, 80, 30 + layer * 5, 100);
      p.triangle(x - lw/2, ly + h*0.25, x + lw/2, ly + h*0.25, x, ly - h*0.05);
      // Snow on branches
      p.fill(200, 10, 95, 80);
      p.triangle(x - lw*0.5, ly + h*0.25, x + lw*0.5, ly + h*0.25, x, ly + h*0.12);
    }
  }

  p.draw = () => {
    // Dark purple-blue night sky
    p.background(240, 40, 8);
    noiseOff += 0.003;

    // Outer glow of lamp/base
    p.noStroke();
    let baseY = domeCy + domeR * 0.98;
    p.fill(35, 60, 70, 30);
    p.ellipse(domeCx, baseY + 20, domeR * 2.2, 50);
    p.fill(35, 70, 80, 60);
    p.ellipse(domeCx, baseY + 10, domeR * 1.6, 28);

    // Base
    p.fill(25, 50, 35);
    p.ellipse(domeCx, baseY + 12, domeR * 2.0, 42);
    p.fill(25, 60, 45);
    p.rect(domeCx - domeR * 0.9, baseY, domeR * 1.8, 30, 8);

    // Interior warm glow from below
    p.drawingContext.save();
    let grad = p.drawingContext.createRadialGradient(domeCx, groundLevel, 0, domeCx, groundLevel, domeR * 1.1);
    grad.addColorStop(0, 'rgba(255,200,80,0.18)');
    grad.addColorStop(1, 'rgba(255,200,80,0)');
    p.drawingContext.fillStyle = grad;
    p.drawingContext.beginPath();
    p.drawingContext.arc(domeCx, domeCy, domeR, 0, Math.PI * 2);
    p.drawingContext.fill();
    p.drawingContext.restore();

    // Clip to dome for interior
    p.drawingContext.save();
    p.drawingContext.beginPath();
    p.drawingContext.arc(domeCx, domeCy, domeR * 0.97, 0, Math.PI * 2);
    p.drawingContext.clip();

    // Ground snow
    p.fill(200, 15, 92);
    p.ellipse(domeCx, groundLevel + 8, domeR * 1.85, 50);

    // Snow accumulation
    p.fill(200, 10, 96);
    p.beginShape();
    p.vertex(domeCx - domeR, groundLevel + 8);
    for (let sx = domeCx - domeR; sx <= domeCx + domeR; sx += 3) {
      let idx = Math.round(p.constrain(sx, 0, p.width - 1));
      p.vertex(sx, snowLevel[idx]);
    }
    p.vertex(domeCx + domeR, groundLevel + 8);
    p.endShape(p.CLOSE);

    // Trees
    drawTree(domeCx - domeR * 0.38, groundLevel - 2, domeR * 0.55, domeR * 0.32);
    drawTree(domeCx + domeR * 0.22, groundLevel - 2, domeR * 0.45, domeR * 0.26);
    drawTree(domeCx - domeR * 0.1, groundLevel - 2, domeR * 0.62, domeR * 0.36);

    // Snowflakes
    for (let f of flakes) { f.update(); f.draw(); }

    p.drawingContext.restore();

    // Glass dome
    p.noFill();
    // Inner highlight
    p.strokeWeight(3);
    p.stroke(200, 20, 100, 25);
    p.arc(domeCx, domeCy, domeR * 1.92, domeR * 1.92, -p.PI * 0.85, -p.PI * 0.15);
    // Dome outline
    p.strokeWeight(2.5);
    p.stroke(210, 10, 90, 50);
    p.circle(domeCx, domeCy, domeR * 2);
    // Refraction inner ring
    p.strokeWeight(1);
    p.stroke(210, 5, 100, 15);
    p.circle(domeCx, domeCy, domeR * 1.85);

    // FPS
    frameCount2++;
    let now = p.millis();
    if (now - fpsTimer > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(frameCount2 / ((now - fpsTimer) / 1000));
      frameCount2 = 0; fpsTimer = now;
    }
  };

  p.windowResized = () => {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    initGlobe();
  };
};
new p5(sketch);
</script>
</body>
</html>
