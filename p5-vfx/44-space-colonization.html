<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Colonization Trees — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<div id="info">Segments: 0 | Attractors: 500 | Click to reset</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const NUM_ATTRACTORS = 500;
const SEG_LEN = 5;
const INFLUENCE_RADIUS = 80;
const KILL_RADIUS = 10;
const GROWTH_PER_FRAME = 8;

let attractors = [];
let segments = [];    // { x, y, px, py, depth }
let tips = [];        // active growing tips
let done = false;

let fpsEl, infoEl;
let lastFpsTime = 0, frameCount2 = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(min(pixelDensity(), 2));
  background(0, 0, 5);
  fpsEl = document.getElementById('fps');
  infoEl = document.getElementById('info');
  lastFpsTime = millis();
  initTree();
}

function initTree() {
  attractors = [];
  segments = [];
  tips = [];
  done = false;
  background(0, 0, 5);

  // Scatter attractors in upper 2/3 of canvas, avoiding edges
  let marginX = width * 0.1, marginY = height * 0.05;
  let treeBase = height * 0.35; // upper 2/3
  for (let i = 0; i < NUM_ATTRACTORS; i++) {
    attractors.push({
      x: random(marginX, width - marginX),
      y: random(marginY, treeBase),
      alive: true
    });
  }

  // Root: single trunk tip at bottom center
  let rootX = width / 2, rootY = height * 0.92;
  let root = { x: rootX, y: rootY, px: rootX, py: rootY + 1, depth: 0 };
  segments.push(root);
  tips.push(root);
}

function growTip(tip) {
  // Find attractors within influence radius
  let sumX = 0, sumY = 0, count = 0;
  let toKill = [];
  for (let a of attractors) {
    if (!a.alive) continue;
    let dx = a.x - tip.x, dy = a.y - tip.y;
    let d = sqrt(dx*dx + dy*dy);
    if (d < KILL_RADIUS) {
      a.alive = false;
      continue;
    }
    if (d < INFLUENCE_RADIUS) {
      sumX += dx / d;
      sumY += dy / d;
      count++;
    }
  }
  if (count === 0) return null;

  // Normalize direction
  let len = sqrt(sumX*sumX + sumY*sumY);
  let dirX = sumX / len, dirY = sumY / len;

  // Add slight upward bias
  dirY -= 0.1;
  let dlen = sqrt(dirX*dirX + dirY*dirY);
  dirX /= dlen; dirY /= dlen;

  let nx = tip.x + dirX * SEG_LEN;
  let ny = tip.y + dirY * SEG_LEN;

  if (nx < 0 || nx > width || ny < 0 || ny > height) return null;

  return { x: nx, y: ny, px: tip.x, py: tip.y, depth: tip.depth + 1 };
}

function draw() {
  if (done) {
    // Redraw glow periodically
    frameCount2++;
    let now = millis();
    if (now - lastFpsTime > 500) {
      fpsEl.textContent = (frameCount2 / ((now - lastFpsTime) / 1000)).toFixed(1) + ' fps';
      frameCount2 = 0; lastFpsTime = now;
    }
    return;
  }

  for (let g = 0; g < GROWTH_PER_FRAME; g++) {
    if (tips.length === 0 || done) break;
    let newTips = [];
    for (let tip of tips) {
      let newSeg = growTip(tip);
      if (newSeg) {
        segments.push(newSeg);
        newTips.push(newSeg);
        // Draw segment
        drawSegment(newSeg);
      }
    }
    tips = newTips;
    // Check if all attractors killed
    if (attractors.every(a => !a.alive) || tips.length === 0) {
      done = true;
    }
  }

  // Draw attractor points (faint)
  noStroke();
  for (let a of attractors) {
    if (!a.alive) continue;
    fill(120, 70, 40, 15);
    ellipse(a.x, a.y, 3, 3);
  }

  frameCount2++;
  let now = millis();
  if (now - lastFpsTime > 500) {
    fpsEl.textContent = (frameCount2 / ((now - lastFpsTime) / 1000)).toFixed(1) + ' fps';
    frameCount2 = 0; lastFpsTime = now;
    let alive = attractors.filter(a => a.alive).length;
    infoEl.textContent = `Segments: ${segments.length} | Attractors left: ${alive} | Click to reset`;
  }
}

function drawSegment(seg) {
  let depth = seg.depth;
  let maxDepth = 300;
  let t = constrain(depth / maxDepth, 0, 1);

  // Trunk: warm brown → branches light green → tips bright green
  let h, s, b, sw;
  if (t < 0.2) {
    // Trunk: dark brown-orange
    h = lerp(25, 35, t / 0.2);
    s = lerp(70, 60, t / 0.2);
    b = lerp(35, 50, t / 0.2);
    sw = lerp(5, 3, t / 0.2);
  } else if (t < 0.6) {
    // Branches: warm to green
    let tt = (t - 0.2) / 0.4;
    h = lerp(35, 100, tt);
    s = lerp(60, 70, tt);
    b = lerp(50, 65, tt);
    sw = lerp(3, 1.5, tt);
  } else {
    // Tips: bright green-yellow
    let tt = (t - 0.6) / 0.4;
    h = lerp(100, 130, tt);
    s = lerp(70, 60, tt);
    b = lerp(65, 95, tt);
    sw = 1;
  }

  stroke(h, s, b, 90);
  strokeWeight(sw);
  line(seg.px, seg.py, seg.x, seg.y);

  // Glow for tips
  if (t > 0.7) {
    stroke(h, s, b, 25);
    strokeWeight(sw * 3);
    line(seg.px, seg.py, seg.x, seg.y);
  }
}

function mousePressed() { initTree(); }

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  initTree();
}
</script>
</body></html>
