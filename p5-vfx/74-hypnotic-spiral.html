<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypnotic Spiral — p5 VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; font-family:monospace; font-size:13px; color:#0f0; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; font-family:monospace; font-size:12px; color:#888; background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Stare at the center — then look away</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let t = 0;
  let fpsEl = document.getElementById('fps');
  let frameAcc = 0, fpsTimer = 0, lastFps = 0;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
  };

  p.draw = function() {
    p.loadPixels();
    let W = p.width, H = p.height;
    let cx = W * 0.5, cy = H * 0.5;
    let maxR = Math.sqrt(cx * cx + cy * cy);

    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        let dx = x - cx, dy = y - cy;
        let r = Math.sqrt(dx * dx + dy * dy) + 0.5;
        let theta = Math.atan2(dy, dx); // [-PI, PI]

        // Logarithmic spiral phase
        // log(r) grows slowly → bands compress toward center
        let phase = Math.log(r) * 28.0 - theta * (180.0 / Math.PI) - t * 22.0;

        // Two interleaved spirals for Pinna-Brelstaff feel
        let band = Math.sin(phase * Math.PI / 180.0);
        let band2 = Math.sin((phase + theta * 40.0) * Math.PI / 180.0);

        // Brightness illusion: sharp alternation
        let sharp = Math.sin(phase * 0.0349); // degrees→radians already done
        let illusion = (sharp + 1.0) * 0.5; // [0,1]

        // Color: the illusion is strongest BW, but add gentle hue for beauty
        let hue = ((phase * 0.5 + t * 15.0) % 360 + 360) % 360;
        // mostly desaturated; rings of color pulse in
        let sat = 60 + 35 * Math.abs(Math.sin(r * 0.03 + t * 0.5));
        let bri = illusion * 90 + 5;

        // Edge fade
        let edgeFade = Math.max(0, 1 - Math.pow(r / maxR, 2.0));
        bri *= edgeFade;

        let idx = 4 * (y * W + x);
        let h = hue / 60.0;
        let s = sat / 100.0;
        let b = bri / 100.0;
        let hi = Math.floor(h) % 6;
        let f = h - Math.floor(h);
        let pv=b*(1-s), qv=b*(1-s*f), tv=b*(1-s*(1-f));
        let r2,g2,b2;
        if(hi===0){r2=b;g2=tv;b2=pv;}
        else if(hi===1){r2=qv;g2=b;b2=pv;}
        else if(hi===2){r2=pv;g2=b;b2=tv;}
        else if(hi===3){r2=pv;g2=qv;b2=b;}
        else if(hi===4){r2=tv;g2=pv;b2=b;}
        else{r2=b;g2=pv;b2=qv;}

        p.pixels[idx]   = r2 * 255;
        p.pixels[idx+1] = g2 * 255;
        p.pixels[idx+2] = b2 * 255;
        p.pixels[idx+3] = 255;
      }
    }
    p.updatePixels();
    t += 0.025;

    // FPS
    frameAcc++;
    fpsTimer += p.deltaTime;
    if (fpsTimer >= 500) {
      lastFps = Math.round(frameAcc * 1000 / fpsTimer);
      frameAcc = 0; fpsTimer = 0;
      fpsEl.textContent = lastFps + ' fps';
      fpsEl.style.color = lastFps >= 50 ? '#0f0' : lastFps >= 30 ? '#ff0' : '#f44';
    }
  };

  p.windowResized = function() { p.resizeCanvas(p.windowWidth, p.windowHeight); };
});
</script>
</body>
</html>
