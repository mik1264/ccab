<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explosion Shockwave</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#0f0; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#hint { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); color:#aaa; font-family:monospace; font-size:12px; letter-spacing:2px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="hint">CLICK ANYWHERE TO EXPLODE</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const sketch = (p) => {
  let sparks = [], embers = [], smoke = [], shockwaves = [];
  let fpsEl, frameCount2 = 0, fpsTimer = 0;
  let groundY;
  let flashAlpha = 0;
  let noiseOff = 0;

  class Shockwave {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.r = 5;
      this.maxR = p.random(180, 320);
      this.life = 1.0;
      this.decay = 0.04;
      this.noiseOff = p.random(100);
    }
    update() {
      this.r = p.lerp(this.r, this.maxR, 0.1);
      this.life -= this.decay;
    }
    draw() {
      p.blendMode(p.ADD);
      p.noFill();
      // Distorted ring using noise
      let numPts = 60;
      p.beginShape();
      for (let i = 0; i <= numPts; i++) {
        let angle = (i / numPts) * p.TWO_PI;
        let noiseDist = p.noise(p.cos(angle) + this.noiseOff, p.sin(angle) + this.noiseOff + noiseOff) * 20 - 10;
        let vr = this.r + noiseDist * this.life;
        p.vertex(this.x + p.cos(angle) * vr, this.y + p.sin(angle) * vr);
      }
      p.endShape(p.CLOSE);
      p.strokeWeight(p.map(this.life, 0, 1, 0.5, 4));
      p.stroke(30, 60, 100, this.life * 80);

      // Second outer ring
      p.strokeWeight(1);
      p.stroke(30, 40, 100, this.life * 30);
      p.circle(this.x, this.y, (this.r + 30) * 2);
    }
    isDead() { return this.life <= 0; }
  }

  class Spark {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.px = x; this.py = y;
      let angle = p.random(p.TWO_PI);
      let speed = p.random(3, 14);
      this.vx = p.cos(angle) * speed;
      this.vy = p.sin(angle) * speed - p.random(2, 5);
      this.life = 1.0;
      this.decay = p.random(0.018, 0.04);
      this.hue = p.random([35, 40, 45, 20, 50, 0, 10]);
      this.isSpark = true;
      this.canBounce = this.y >= groundY - 30;
    }
    update() {
      this.px = this.x; this.py = this.y;
      this.vy += 0.35; // gravity
      this.vx *= 0.985; this.vy *= 0.985; // drag
      this.x += this.vx; this.y += this.vy;
      this.life -= this.decay;
      // Ground bounce -> mini explosion
      if (this.y >= groundY && !this.bounced) {
        if (p.random() < 0.2) {
          miniExplode(this.x, groundY);
        }
        this.vy *= -0.3;
        this.vx *= 0.7;
        this.y = groundY - 2;
        this.bounced = true;
        this.decay *= 3;
      }
    }
    draw() {
      p.blendMode(p.ADD);
      let sat = p.map(this.life, 0, 1, 20, 85);
      let bri = p.map(this.life, 0, 1, 40, 100);
      p.stroke(this.hue, sat, bri, this.life * 100);
      p.strokeWeight(p.map(this.life, 0, 1, 0.3, 2));
      p.line(this.px, this.py, this.x, this.y);
      // Bright head
      p.noStroke();
      p.fill(this.hue, 30, 100, this.life * 90);
      p.circle(this.x, this.y, 2.5);
    }
    isDead() { return this.life <= 0 || this.x < -50 || this.x > p.width + 50; }
  }

  class Ember {
    constructor(x, y) {
      this.x = x; this.y = y;
      let angle = p.random(p.TWO_PI);
      let speed = p.random(0.5, 4);
      this.vx = p.cos(angle) * speed;
      this.vy = p.sin(angle) * speed - p.random(0.5, 2);
      this.r = p.random(2, 6);
      this.life = 1.0;
      this.decay = p.random(0.01, 0.025);
      this.hue = p.random(0, 40); // orange-red
      this.noiseOff = p.random(1000);
    }
    update() {
      this.vy += 0.06; // gentle gravity
      this.vx += (p.noise(this.noiseOff, noiseOff) * 2 - 1) * 0.1; // drift
      this.vx *= 0.98; this.vy *= 0.98;
      this.x += this.vx; this.y += this.vy;
      this.life -= this.decay;
      if (this.y > groundY) { this.vy *= -0.5; this.y = groundY; this.decay *= 2; }
    }
    draw() {
      p.blendMode(p.ADD);
      p.noStroke();
      // Glow
      p.fill(this.hue, 80, 90, this.life * 30);
      p.circle(this.x, this.y, this.r * 4);
      p.fill(this.hue, 90, 100, this.life * 85);
      p.circle(this.x, this.y, this.r * 1.4);
    }
    isDead() { return this.life <= 0; }
  }

  class Smoke {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.vx = p.random(-0.5, 0.5);
      this.vy = p.random(-2, -0.5);
      this.r = p.random(15, 35);
      this.life = 1.0;
      this.decay = p.random(0.006, 0.014);
      this.grey = p.random(20, 55);
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy *= 0.99;
      this.r += 0.5;
      this.life -= this.decay;
    }
    draw() {
      p.blendMode(p.SCREEN);
      p.noStroke();
      p.fill(0, 0, this.grey, this.life * 20);
      p.circle(this.x, this.y, this.r * 2);
    }
    isDead() { return this.life <= 0 || this.y < -100; }
  }

  function explode(x, y) {
    flashAlpha = 100;
    shockwaves.push(new Shockwave(x, y));
    // Sparks
    for (let i = 0; i < 200; i++) sparks.push(new Spark(x, y));
    // Embers
    for (let i = 0; i < 50; i++) embers.push(new Ember(x, y));
    // Smoke
    for (let i = 0; i < 50; i++) smoke.push(new Smoke(x + p.random(-30,30), y + p.random(-10,10)));
  }

  function miniExplode(x, y) {
    shockwaves.push(new Shockwave(x, y - 5));
    for (let i = 0; i < 15; i++) sparks.push(new Spark(x, y));
    for (let i = 0; i < 8; i++) embers.push(new Ember(x, y));
    for (let i = 0; i < 8; i++) smoke.push(new Smoke(x, y));
  }

  p.setup = () => {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    groundY = p.height - 45;
    // Auto-trigger on load
    setTimeout(() => explode(p.width/2, p.height*0.55), 500);
  };

  p.mouseClicked = () => { explode(p.mouseX, p.mouseY); };

  p.draw = () => {
    noiseOff += 0.005;

    p.blendMode(p.BLEND);
    // Flash
    if (flashAlpha > 0) {
      p.background(35, 50, p.map(flashAlpha, 0, 100, 5, 90));
      flashAlpha = p.lerp(flashAlpha, 0, 0.12);
    } else {
      p.background(0, 0, 4, 28);
    }

    // Ground
    p.blendMode(p.BLEND);
    p.noStroke();
    p.fill(0, 0, 10);
    p.rect(0, groundY, p.width, p.height - groundY);
    // Ground highlight
    p.fill(25, 40, 35);
    p.rect(0, groundY, p.width, 3);

    // Smoke first (behind everything)
    for (let i = smoke.length - 1; i >= 0; i--) {
      smoke[i].update(); smoke[i].draw();
      if (smoke[i].isDead()) smoke.splice(i, 1);
    }

    // Shockwaves
    p.noFill();
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      shockwaves[i].update(); shockwaves[i].draw();
      if (shockwaves[i].isDead()) shockwaves.splice(i, 1);
    }

    // Embers
    for (let i = embers.length - 1; i >= 0; i--) {
      embers[i].update(); embers[i].draw();
      if (embers[i].isDead()) embers.splice(i, 1);
    }

    // Sparks
    for (let i = sparks.length - 1; i >= 0; i--) {
      sparks[i].update(); sparks[i].draw();
      if (sparks[i].isDead()) sparks.splice(i, 1);
    }

    frameCount2++;
    let now = p.millis();
    if (now - fpsTimer > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(frameCount2 / ((now - fpsTimer) / 1000));
      frameCount2 = 0; fpsTimer = now;
    }
  };

  p.windowResized = () => {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    groundY = p.height - 45;
  };
};
new p5(sketch);
</script>
</body>
</html>
