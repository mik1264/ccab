<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chladni Sound Patterns</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#fps { position:fixed; top:12px; left:50%; transform:translateX(-50%); color:#0f0; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:5px; z-index:999; }
#info { position:fixed; top:12px; right:12px; color:#dda; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.7); padding:8px 14px; border-radius:6px; z-index:999; line-height:1.6; }
#hint { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 14px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info" id="info">Mode (1,1)<br>f ∝ n²+m² = 2</div>
<div id="hint">Auto-cycling modes · Click to advance</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const N_PARTICLES = 3000;
  const MODES = [
    [1,1],[1,2],[2,1],[2,2],[1,3],[3,1],[2,3],[3,2],[3,3],[1,4],[4,1],[2,4]
  ];
  let modeIdx = 0;
  let particles = [];
  let transitioning = false;
  let transitionT = 0;
  const TRANSITION_FRAMES = 40;
  const SETTLE_FRAMES = 220;
  let frameInMode = 0;
  let infoDiv = document.getElementById('info');
  let fpsDiv = document.getElementById('fps');

  let plateX, plateY, plateSize;

  function waveVal(x, y, n, m) {
    let nx = (x - plateX) / plateSize;
    let ny = (y - plateY) / plateSize;
    return Math.sin(n * Math.PI * nx) * Math.sin(m * Math.PI * ny);
  }

  function isInPlate(x, y) {
    return x >= plateX && x <= plateX + plateSize && y >= plateY && y <= plateY + plateSize;
  }

  function gradient(x, y, n, m) {
    let eps = 2;
    let gx = (waveVal(x+eps, y, n, m) - waveVal(x-eps, y, n, m)) / (2*eps);
    let gy = (waveVal(x, y+eps, n, m) - waveVal(x, y-eps, n, m)) / (2*eps);
    return {gx, gy};
  }

  function initParticles(scatter) {
    for (let i = 0; i < N_PARTICLES; i++) {
      if (scatter || !particles[i]) {
        particles[i] = {
          x: plateX + p.random() * plateSize,
          y: plateY + p.random() * plateSize,
          vx: p.random(-3, 3),
          vy: p.random(-3, 3),
          settled: false
        };
      } else {
        // scatter existing particle
        particles[i].vx = p.random(-5, 5);
        particles[i].vy = p.random(-5, 5);
        particles[i].settled = false;
      }
    }
  }

  p.setup = function() {
    let cnv = p.createCanvas(p.windowWidth, p.windowHeight);
    cnv.parent(document.body);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    plateSize = Math.min(p.width, p.height) * 0.82;
    plateX = (p.width - plateSize) / 2;
    plateY = (p.height - plateSize) / 2;
    initParticles(true);
  };

  function currentMode() { return MODES[modeIdx]; }

  function advanceMode() {
    modeIdx = (modeIdx + 1) % MODES.length;
    initParticles(false);
    frameInMode = 0;
    transitioning = true;
    transitionT = 0;
  }

  p.mousePressed = advanceMode;

  function updateParticles() {
    let [n, m] = currentMode();
    let friction = transitioning ? 0.82 : 0.88;
    let force = transitioning ? 0.3 : 0.18;

    for (let pt of particles) {
      if (pt.settled) continue;
      let v = waveVal(pt.x, pt.y, n, m);
      let {gx, gy} = gradient(pt.x, pt.y, n, m);
      // Move toward nodes (where v ≈ 0) → descend |v|, so force = -sign(v) * grad
      let mag = Math.sqrt(gx*gx + gy*gy);
      if (mag > 1e-6) {
        let scale = force * Math.abs(v) / mag;
        pt.vx -= gx * scale * Math.sign(v);
        pt.vy -= gy * scale * Math.sign(v);
      }
      // Add small random vibration (acoustic)
      pt.vx += p.random(-0.4, 0.4);
      pt.vy += p.random(-0.4, 0.4);
      pt.vx *= friction;
      pt.vy *= friction;
      pt.x += pt.vx;
      pt.y += pt.vy;

      // Bounce off plate edges
      if (pt.x < plateX) { pt.x = plateX; pt.vx *= -0.5; }
      if (pt.x > plateX+plateSize) { pt.x = plateX+plateSize; pt.vx *= -0.5; }
      if (pt.y < plateY) { pt.y = plateY; pt.vy *= -0.5; }
      if (pt.y > plateY+plateSize) { pt.y = plateY+plateSize; pt.vy *= -0.5; }

      let speed = Math.sqrt(pt.vx*pt.vx + pt.vy*pt.vy);
      if (speed < 0.08 && Math.abs(v) < 0.04) pt.settled = true;
    }
  }

  p.draw = function() {
    p.background(0, 0, 6);

    if (transitioning) {
      transitionT++;
      if (transitionT > TRANSITION_FRAMES) transitioning = false;
    }

    frameInMode++;
    if (frameInMode > SETTLE_FRAMES + TRANSITION_FRAMES) advanceMode();

    updateParticles();

    // Draw plate background
    let [n, m] = currentMode();
    p.noFill();
    p.stroke(0, 0, 20, 50);
    p.strokeWeight(1);
    p.rect(plateX, plateY, plateSize, plateSize);

    // Draw wave pattern as faint background
    let step = 4;
    p.strokeWeight(0.4);
    for (let py = plateY; py < plateY+plateSize; py += step) {
      for (let px = plateX; px < plateX+plateSize; px += step) {
        let v = waveVal(px, py, n, m);
        let t = Math.abs(v);
        if (t < 0.05) continue;
        let hue = v > 0 ? 200 : 340;
        p.stroke(hue, 60, t*30, 25);
        p.point(px, py);
      }
    }

    // Draw particles
    p.noStroke();
    for (let pt of particles) {
      let v = waveVal(pt.x, pt.y, n, m);
      let atNode = Math.abs(v) < 0.12;
      let speed = Math.sqrt(pt.vx*pt.vx + pt.vy*pt.vy);
      if (atNode || pt.settled) {
        // golden sand
        let brightness = p.map(speed, 0, 2, 85, 100);
        p.fill(42, 85, brightness, 90);
        p.circle(pt.x, pt.y, 2.5);
      } else {
        // flying particle
        let alpha = p.map(speed, 0, 5, 20, 55);
        p.fill(30, 60, 80, alpha);
        p.circle(pt.x, pt.y, 2);
      }
    }

    // Info
    let freq = n*n + m*m;
    infoDiv.innerHTML = `Mode (${n},${m})<br>f ∝ n²+m² = ${freq}<br>Frame: ${frameInMode}/${SETTLE_FRAMES+TRANSITION_FRAMES}`;

    if (p.frameCount % 20 === 0) {
      fpsDiv.textContent = 'FPS: ' + Math.round(p.frameRate());
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    plateSize = Math.min(p.width, p.height) * 0.82;
    plateX = (p.width - plateSize) / 2;
    plateY = (p.height - plateSize) / 2;
    initParticles(true);
  };
});
</script>
</body>
</html>
