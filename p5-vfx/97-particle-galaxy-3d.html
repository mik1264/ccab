<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Galaxy 3D — p5-vfx</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  .back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  .back-link:hover { color:#fff; }
  #fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
  #info { position:fixed; bottom:12px; left:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; line-height:1.6; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Particle Galaxy 3D<br>~80K particles &nbsp; 4 spiral arms<br>Drag to orbit</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const N_PARTICLES = 80000;
  const N_ARMS      = 4;
  const ARM_HUES    = [200, 30, 280, 120]; // blue, orange, purple, green

  // Particle data: Float32Array for performance
  // [x, y, z, hue, brightness]
  const px = new Float32Array(N_PARTICLES);
  const py = new Float32Array(N_PARTICLES);
  const pz = new Float32Array(N_PARTICLES);
  const ph = new Float32Array(N_PARTICLES);
  const pb = new Float32Array(N_PARTICLES);

  function gaussRand() {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }

  function initGalaxy() {
    // Core particles
    const coreCount = Math.floor(N_PARTICLES * 0.12);
    for (let i = 0; i < coreCount; i++) {
      const r = Math.random() * 40;
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.random() * Math.PI;
      px[i] = r * Math.sin(phi) * Math.cos(theta);
      py[i] = r * Math.sin(phi) * Math.sin(theta) * 0.3;
      pz[i] = r * Math.cos(phi);
      ph[i] = 50 + Math.random() * 40; // yellowish core
      pb[i] = 60 + Math.random() * 40;
    }

    // Arm particles
    const armCount = Math.floor((N_PARTICLES - coreCount) / N_ARMS);
    for (let arm = 0; arm < N_ARMS; arm++) {
      const armOffset = (arm / N_ARMS) * Math.PI * 2;
      const baseHue   = ARM_HUES[arm];
      const base      = coreCount + arm * armCount;
      for (let i = 0; i < armCount; i++) {
        const t   = Math.random();
        const r   = 50 + t * 320;
        const angle = armOffset + t * Math.PI * 3.5 + gaussRand() * 0.15;
        const scatter = gaussRand() * (r * 0.06 + 5);
        const zScatter = gaussRand() * (r * 0.03 + 3);

        px[base + i] = r * Math.cos(angle) + scatter;
        py[base + i] = zScatter;
        pz[base + i] = r * Math.sin(angle) + scatter;

        const hVariance = gaussRand() * 25;
        ph[base + i] = baseHue + hVariance;
        pb[base + i] = 40 + (1 - t) * 50 + Math.random() * 20;
      }
    }
  }

  initGalaxy();

  let rotY = 0;
  let fpsArr = [], lastTime = 0;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
  };

  p.draw = function() {
    p.background(0, 0, 3);
    p.orbitControl(3, 3, 0.05);

    rotY += 0.004;
    p.rotateY(rotY);
    p.rotateX(0.53); // ~30 degree tilt

    p.strokeWeight(1.2);
    p.noFill();

    // Render all particles as points
    // Group by hue bands for fewer stroke calls
    for (let i = 0; i < N_PARTICLES; i++) {
      const h = (ph[i] + rotY * 15) % 360;
      const bri = pb[i];
      // Vary saturation by distance from center
      const dist = Math.sqrt(px[i]*px[i] + pz[i]*pz[i]);
      const sat = dist < 50 ? 30 + dist * 0.5 : 70 + Math.random() * 20;
      const alpha = bri * 0.9;
      p.stroke(h, sat, bri, alpha);
      p.point(px[i], py[i], pz[i]);
    }

    // Bright central glow
    p.noStroke();
    p.fill(55, 40, 100, 70);
    p.ambientMaterial(55, 40, 100);
    p.sphere(8, 8, 8);
    p.fill(55, 20, 100, 40);
    p.sphere(20, 8, 8);

    // FPS
    const now = p.millis();
    const dt  = now - lastTime; lastTime = now;
    fpsArr.push(1000/dt);
    if (fpsArr.length > 30) fpsArr.shift();
    const fps = Math.round(fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length);
    document.getElementById('fps').textContent = `FPS: ${fps}`;
  };

  p.windowResized = function() { p.resizeCanvas(p.windowWidth, p.windowHeight); };
});
</script>
</body>
</html>
