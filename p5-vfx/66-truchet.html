<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truchet Tiles — P5.js VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:50%; transform:translateX(-50%); color:#bbb; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.55); padding:6px 16px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Truchet Tile Variations — Diagonal Arcs · Smith Tiles · Dots</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let grid = [];
  let cellSize = 60;
  let cols, rows;
  let fpsEl, infoEl;
  let t = 0;
  let noiseOffset = 0;
  let regenerateTimer = 0;
  let targetGrid = [];

  // Tile types: 0 = diagonal arc variant A, 1 = diagonal arc variant B,
  //             2 = Smith type A, 3 = Smith type B,
  //             4 = dots/circles type A, 5 = dots/circles type B

  function buildGrid(noiseZ) {
    let g = [];
    for (let r = 0; r < rows; r++) {
      let row = [];
      for (let c = 0; c < cols; c++) {
        let nx = c / cols;
        let ny = r / rows;
        let noiseVal = p.noise(nx * 3, ny * 3, noiseZ);

        // Use noise to determine region (3 regions)
        let region, variant;
        if (noiseVal < 0.38) {
          region = 0; // arc region (top-left cool)
          variant = Math.random() < 0.5 ? 0 : 1;
        } else if (noiseVal < 0.68) {
          region = 1; // Smith region (center)
          variant = Math.random() < 0.5 ? 2 : 3;
        } else {
          region = 2; // dots region (bottom-right warm)
          variant = Math.random() < 0.5 ? 4 : 5;
        }
        row.push({ type: variant, region });
      }
      g.push(row);
    }
    return g;
  }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    infoEl = document.getElementById('info');
    cols = Math.ceil(p.width / cellSize) + 1;
    rows = Math.ceil(p.height / cellSize) + 1;
    grid = buildGrid(0);
    targetGrid = buildGrid(0.5);
  };

  p.draw = function() {
    p.background(0, 0, 8);
    if (p.frameCount % 15 === 0) fpsEl.textContent = Math.round(p.frameRate()) + ' fps';

    t = p.millis() / 1000;
    noiseOffset += 0.003;

    // Slow morph between grids
    regenerateTimer += 0.016;
    if (regenerateTimer > 5.0) {
      grid = targetGrid;
      targetGrid = buildGrid(noiseOffset);
      regenerateTimer = 0;
    }
    let morphF = regenerateTimer / 5.0;

    // Draw tiles
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        let x = c * cellSize;
        let y = r * cellSize;

        let cell = grid[r] && grid[r][c] ? grid[r][c] : { type: 0, region: 0 };

        // Color gradient: cool left to warm right
        let hxFrac = c / cols;
        let hyFrac = r / rows;
        let baseHue = (200 + hxFrac * 160 + t * 15) % 360;
        let brightness = 70 + hyFrac * 20;

        drawTile(x, y, cellSize, cell.type, baseHue, brightness);
      }
    }

    infoEl.innerHTML = 'Truchet Tiles — noise-biased placement — cool→warm gradient | 3 tile families';
  };

  function drawTile(x, y, s, type, hue, bri) {
    let hs = s / 2;
    let sw = s * 0.12;

    p.push();
    p.translate(x + hs, y + hs);

    p.noFill();
    p.stroke(hue, 80, bri, 88);
    p.strokeWeight(sw);
    p.strokeCap(p.ROUND);

    if (type === 0) {
      // Diagonal arc A: quarter circles in top-left and bottom-right corners
      p.arc(-hs, -hs, s, s, 0, p.HALF_PI);
      p.arc(hs, hs, s, s, p.PI, p.PI + p.HALF_PI);
    } else if (type === 1) {
      // Diagonal arc B: quarter circles in top-right and bottom-left corners
      p.arc(hs, -hs, s, s, p.HALF_PI, p.PI);
      p.arc(-hs, hs, s, s, p.PI + p.HALF_PI, p.TWO_PI);
    } else if (type === 2) {
      // Smith tile A: concentric quarter circles + diagonal line
      p.stroke(hue, 75, bri, 80);
      p.strokeWeight(sw * 0.7);
      p.arc(-hs, -hs, s * 0.8, s * 0.8, 0, p.HALF_PI);
      p.arc(hs, hs, s * 0.8, s * 0.8, p.PI, p.PI + p.HALF_PI);
      p.strokeWeight(sw * 0.4);
      p.stroke(hue, 50, bri + 10, 60);
      p.line(-hs, hs, hs, -hs); // diagonal
    } else if (type === 3) {
      // Smith tile B: opposite orientation
      p.stroke(hue, 75, bri, 80);
      p.strokeWeight(sw * 0.7);
      p.arc(hs, -hs, s * 0.8, s * 0.8, p.HALF_PI, p.PI);
      p.arc(-hs, hs, s * 0.8, s * 0.8, p.PI + p.HALF_PI, p.TWO_PI);
      p.strokeWeight(sw * 0.4);
      p.stroke(hue, 50, bri + 10, 60);
      p.line(-hs, -hs, hs, hs); // diagonal
    } else if (type === 4) {
      // Dots and cross A
      p.stroke(hue, 85, bri, 85);
      p.strokeWeight(sw * 0.9);
      // Cross lines
      p.line(0, -hs, 0, hs);
      // Dots at corners
      p.fill((hue + 30) % 360, 80, bri, 80);
      p.noStroke();
      p.circle(-hs * 0.5, -hs * 0.5, sw * 1.4);
      p.circle(hs * 0.5, hs * 0.5, sw * 1.4);
      p.noFill();
      p.stroke(hue, 85, bri, 85);
    } else {
      // Dots and cross B
      p.stroke(hue, 85, bri, 85);
      p.strokeWeight(sw * 0.9);
      p.line(-hs, 0, hs, 0);
      p.fill((hue + 30) % 360, 80, bri, 80);
      p.noStroke();
      p.circle(-hs * 0.5, hs * 0.5, sw * 1.4);
      p.circle(hs * 0.5, -hs * 0.5, sw * 1.4);
    }

    p.pop();
  }

  p.mousePressed = function() {
    // Regenerate on click
    grid = buildGrid(p.random(100));
    targetGrid = buildGrid(p.random(100));
    regenerateTimer = 0;
  };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    cols = Math.ceil(p.width / cellSize) + 1;
    rows = Math.ceil(p.height / cellSize) + 1;
    grid = buildGrid(noiseOffset);
    targetGrid = buildGrid(noiseOffset + 0.5);
  };
});
</script>
</body>
</html>
