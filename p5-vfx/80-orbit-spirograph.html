<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit Spirograph | P5.js VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
.back-link {
  position: fixed; top: 16px; left: 16px; z-index: 100;
  color: rgba(255,255,255,0.6); text-decoration: none;
  font-size: 13px; letter-spacing: 0.05em;
  background: rgba(255,255,255,0.08);
  padding: 6px 12px; border-radius: 20px;
  transition: background 0.2s;
}
.back-link:hover { background: rgba(255,255,255,0.18); color: #fff; }
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Gallery</a>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

let trail = [];
const MAX_TRAIL = 3000;

// Epicycle configuration
const radiiBase = [200, 100, 60, 35, 20, 12, 7, 4];
const velocities = [1, -2, 3, -4, 5, -7, 11, -13];
let angles = [];
let scaleFactor = 1;
let baseSpeed = 0.005;
let hueOffset = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  for (let i = 0; i < radiiBase.length; i++) {
    angles.push(0);
  }
  scaleFactor = min(width, height) / 600;
}

function draw() {
  // Fade background slowly to create trail persistence
  background(240, 20, 3, 18);

  // Animate baseSpeed slowly
  baseSpeed = 0.004 + 0.003 * sin(frameCount * 0.001);

  // Update angles
  for (let i = 0; i < angles.length; i++) {
    angles[i] += velocities[i] * baseSpeed;
  }

  hueOffset = (hueOffset + 0.15) % 360;

  // Compute positions of each epicycle center
  let cx = width / 2;
  let cy = height / 2;
  let positions = [[cx, cy]];

  for (let i = 0; i < radiiBase.length; i++) {
    let r = radiiBase[i] * scaleFactor;
    let prev = positions[positions.length - 1];
    let nx = prev[0] + r * cos(angles[i]);
    let ny = prev[1] + r * sin(angles[i]);
    positions.push([nx, ny]);
  }

  // Record tip position
  let tip = positions[positions.length - 1];
  trail.push({ x: tip[0], y: tip[1], hue: hueOffset });
  if (trail.length > MAX_TRAIL) trail.shift();

  // Draw faint circle outlines
  noFill();
  for (let i = 0; i < radiiBase.length; i++) {
    let r = radiiBase[i] * scaleFactor;
    let pos = positions[i];
    stroke(0, 0, 100, 6);
    strokeWeight(0.8);
    circle(pos[0], pos[1], r * 2);
    // Draw arm line
    stroke(0, 0, 100, 12);
    strokeWeight(0.6);
    line(pos[0], pos[1], positions[i + 1][0], positions[i + 1][1]);
  }

  // Draw trail with blendMode ADD
  blendMode(ADD);
  noFill();
  for (let i = 1; i < trail.length; i++) {
    let t = i / trail.length;
    let alpha = t * t * 70;
    let hue = (trail[i].hue) % 360;
    strokeWeight(lerp(0.5, 2, t));
    stroke(hue, 90, 100, alpha);
    line(trail[i - 1].x, trail[i - 1].y, trail[i].x, trail[i].y);
  }

  // Glowing tip
  let tipHue = hueOffset;
  for (let r = 12; r >= 1; r--) {
    stroke(tipHue, 80, 100, (14 - r) * 5);
    strokeWeight(r * 0.8);
    point(tip[0], tip[1]);
  }

  blendMode(BLEND);

  // Title overlay
  noStroke();
  fill(0, 0, 100, 50);
  textSize(13);
  textAlign(RIGHT);
  text('Orbit Spirograph', width - 20, height - 20);
  fill(0, 0, 70, 40);
  textSize(11);
  text(`speed: ${nf(baseSpeed, 1, 4)}`, width - 20, height - 6);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  scaleFactor = min(width, height) / 600;
  trail = [];
}
</script>
</body>
</html>
