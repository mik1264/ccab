<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypocycloid / Epicycloid Gallery — P5.js VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:50%; transform:translateX(-50%); color:#bbb; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.55); padding:6px 16px; border-radius:6px; z-index:999; text-align:center; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Rolling circle curves — hypo &amp; epicycloids</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let phase = 0;
  let fpsEl, infoEl;
  let selectedIdx = 0;
  let selectionT = 0;

  // Named curves: [k, type, name, description]
  // type 'hypo': rolling inside (hypocycloid), 'epi': rolling outside (epicycloid)
  const CURVES = [
    { k: 3,  type: 'hypo', name: 'Deltoid',     desc: 'k=3 hypocycloid — 3 cusps' },
    { k: 4,  type: 'hypo', name: 'Astroid',     desc: 'k=4 hypocycloid — 4 cusps' },
    { k: 5,  type: 'hypo', name: 'Ranunculoid', desc: 'k=5 hypocycloid — 5 cusps' },
    { k: 6,  type: 'hypo', name: 'Hexacycloid', desc: 'k=6 hypocycloid — 6 cusps' },
    { k: 1,  type: 'epi',  name: 'Cardioid',    desc: 'k=1 epicycloid — 1 loop' },
    { k: 2,  type: 'epi',  name: 'Nephroid',    desc: 'k=2 epicycloid — 2 loops' },
    { k: 3,  type: 'epi',  name: 'Trefoil',     desc: 'k=3 epicycloid — 3 loops' },
    { k: 5,  type: 'epi',  name: 'Pentafoil',   desc: 'k=5 epicycloid — 5 loops' },
    { k: 7,  type: 'epi',  name: 'Heptafoil',   desc: 'k=7 epicycloid — 7 loops' },
    { k: 2.5,type: 'hypo', name: 'Rose Hypo',   desc: 'k=2.5 — non-integer' },
  ];

  // Grid: 5 columns × 2 rows for small previews
  const GRID_COLS = 5;
  const GRID_ROWS = 2;

  // Trail for main curve
  let mainTrail = [];
  let mainHead = 0;
  const TRAIL_LEN = 800;

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    infoEl = document.getElementById('info');
  };

  function hypoCurve(k, t, R) {
    // Hypocycloid: rolling circle of radius r inside circle of radius R
    // r = R/k
    let r = R / k;
    let x = (R - r) * Math.cos(t) + r * Math.cos((R - r) * t / r);
    let y = (R - r) * Math.sin(t) - r * Math.sin((R - r) * t / r);
    return { x, y };
  }

  function epiCurve(k, t, R) {
    // Epicycloid: rolling circle of radius r outside circle of radius R
    // r = R/k
    let r = R / k;
    let x = (R + r) * Math.cos(t) - r * Math.cos((R + r) * t / r);
    let y = (R + r) * Math.sin(t) - r * Math.sin((R + r) * t / r);
    return { x, y };
  }

  function evalCurve(curve, t, R) {
    if (curve.type === 'hypo') return hypoCurve(curve.k, t, R);
    else return epiCurve(curve.k, t, R);
  }

  p.draw = function() {
    p.background(0, 0, 4, 100);
    if (p.frameCount % 15 === 0) fpsEl.textContent = Math.round(p.frameRate()) + ' fps';

    let dt = 0.016;
    phase += dt * 0.6;
    selectionT += dt * 0.08;
    selectedIdx = Math.floor(selectionT) % CURVES.length;
    let morphF = selectionT % 1;

    // Layout: top 35% = main central display, bottom 65% = grid
    let mainAreaH = p.height * 0.48;
    let gridAreaY = mainAreaH + 10;
    let gridAreaH = p.height - gridAreaY;

    // === Main large central display ===
    let mainCX = p.width / 2;
    let mainCY = mainAreaH / 2;
    let mainR = Math.min(mainAreaH, p.width * 0.3) * 0.42;

    // Fade background for trail
    p.fill(0, 0, 0, 15);
    p.noStroke();
    p.rect(0, 0, p.width, mainAreaH);

    // Build main trail
    let cur = CURVES[selectedIdx];
    let stepsPerFrame = 4;
    for (let step = 0; step < stepsPerFrame; step++) {
      mainHead += 0.025;
      let pt = evalCurve(cur, mainHead, mainR * (cur.type === 'hypo' ? 1.0 : 0.65));
      let hue = (mainHead * 30) % 360;
      mainTrail.push({ x: mainCX + pt.x, y: mainCY + pt.y, hue });
      if (mainTrail.length > TRAIL_LEN) mainTrail.shift();
    }

    // Draw main trail
    p.strokeWeight(2.2);
    p.noFill();
    for (let i = 1; i < mainTrail.length; i++) {
      let a = mainTrail[i-1], b = mainTrail[i];
      let alpha = p.map(i, 0, mainTrail.length, 0, 90);
      p.stroke(b.hue, 90, 95, alpha);
      p.line(a.x, a.y, b.x, b.y);
    }

    // Rolling circle geometry for main
    let eR = cur.type === 'hypo' ? mainR : mainR * 0.65;
    let rollR = eR / cur.k;
    let innerCX_main, innerCY_main;
    if (cur.type === 'hypo') {
      innerCX_main = mainCX + (eR - rollR) * Math.cos(mainHead);
      innerCY_main = mainCY + (eR - rollR) * Math.sin(mainHead);
    } else {
      innerCX_main = mainCX + (eR + rollR) * Math.cos(mainHead);
      innerCY_main = mainCY + (eR + rollR) * Math.sin(mainHead);
    }

    // Fixed circle
    p.noFill();
    p.stroke(180, 30, 60, 30);
    p.strokeWeight(0.7);
    p.circle(mainCX, mainCY, eR * 2);
    // Rolling circle
    p.stroke(60, 50, 70, 40);
    p.circle(innerCX_main, innerCY_main, rollR * 2);
    // Arm
    let headPt = evalCurve(cur, mainHead, eR);
    p.stroke(60, 80, 95, 60);
    p.strokeWeight(0.8);
    p.line(innerCX_main, innerCY_main, mainCX + headPt.x, mainCY + headPt.y);
    // Dot
    p.fill(0, 0, 100, 95);
    p.noStroke();
    p.circle(mainCX + headPt.x, mainCY + headPt.y, 7);

    // Label
    p.fill(0, 0, 80, 90);
    p.noStroke();
    p.textSize(15);
    p.textAlign(p.CENTER);
    p.text(cur.name + ' — ' + cur.desc, mainCX, mainAreaH - 12);

    // Divider line
    p.stroke(180, 20, 40, 40);
    p.strokeWeight(1);
    p.line(20, mainAreaH + 5, p.width - 20, mainAreaH + 5);

    // === Grid of small previews ===
    let cellW = p.width / GRID_COLS;
    let cellH = gridAreaH / GRID_ROWS;

    for (let i = 0; i < CURVES.length; i++) {
      let col = i % GRID_COLS;
      let row = Math.floor(i / GRID_COLS);
      let cx = col * cellW + cellW / 2;
      let cy = gridAreaY + row * cellH + cellH / 2;
      let r = Math.min(cellW, cellH) * 0.34;
      let curve = CURVES[i];
      let isSelected = (i === selectedIdx);

      // Background highlight for selected
      if (isSelected) {
        p.fill(0, 0, 15, 100);
        p.noStroke();
        p.rect(col * cellW + 2, gridAreaY + row * cellH + 2, cellW - 4, cellH - 4, 8);
      }

      // Draw the full curve (completed)
      let hueBase = (i * 36 + phase * 25) % 360;
      let eR2 = curve.type === 'hypo' ? r : r * 0.65;
      let period = p.TWO_PI * Math.max(curve.k, 1);
      let steps = 300;
      let prevX = null, prevY = null;

      p.strokeWeight(1.2);
      p.noFill();
      for (let s = 0; s <= steps; s++) {
        let ang = (s / steps) * period * 2;
        let pt2 = evalCurve(curve, ang, eR2);
        let hue2 = (hueBase + ang * 30) % 360;
        p.stroke(hue2, 85, 90, isSelected ? 85 : 60);
        if (prevX !== null) p.line(prevX + cx, prevY + cy, pt2.x + cx, pt2.y + cy);
        prevX = pt2.x;
        prevY = pt2.y;
      }

      // Animated dot on small curves
      let dotAngle = phase * 2.0 + i * 0.4;
      let dotPt = evalCurve(curve, dotAngle, eR2);
      p.fill(hueBase, 70, 100, 90);
      p.noStroke();
      p.circle(cx + dotPt.x, cy + dotPt.y, isSelected ? 5 : 4);

      // Name label
      p.fill(0, 0, isSelected ? 90 : 65, 100);
      p.noStroke();
      p.textSize(10);
      p.textAlign(p.CENTER);
      p.text(curve.name, cx, cy + r + 16);
    }

    infoEl.innerHTML = `${cur.name} | ${cur.type === 'hypo' ? 'Hypocycloid' : 'Epicycloid'} k=${cur.k} | ${cur.desc}`;
  };

  p.mouseClicked = function() {
    // Click grid to select
    let gridAreaY = p.height * 0.48 + 10;
    let gridAreaH = p.height - gridAreaY;
    if (p.mouseY < gridAreaY) return;
    let cellW = p.width / GRID_COLS;
    let cellH = gridAreaH / GRID_ROWS;
    let col = Math.floor(p.mouseX / cellW);
    let row = Math.floor((p.mouseY - gridAreaY) / cellH);
    let idx = row * GRID_COLS + col;
    if (idx >= 0 && idx < CURVES.length) {
      selectedIdx = idx;
      selectionT = idx;
      mainTrail = [];
      mainHead = 0;
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    mainTrail = [];
  };
});
</script>
</body>
</html>
