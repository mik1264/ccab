<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Whirlpool — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const NUM_PARTICLES = 5000;
const NUM_CORE = 200;
const SPIRAL_K = 0.012; // spiral tightness
const MAX_RADIUS = 420;
const MIN_RADIUS = 2;
const DRIFT_RATE = 0.0008; // how fast particles drift inward

let particles = [];
let coreParticles = [];
let cx, cy;
let t = 0;
let fpsEl, fpsTimer = 0, fpsFrames = 0;

function makeParticle(forceRadius) {
  let r = forceRadius !== undefined ? forceRadius : random(MIN_RADIUS, MAX_RADIUS);
  let angle = random(TWO_PI);
  // Add spiral arm structure: 2 arms
  let armCount = 2;
  let armIdx = floor(random(armCount));
  let armAngle = (armIdx / armCount) * TWO_PI;
  // Logarithmic spiral offset
  let spiralOffset = log(r + 1) * 3.5;
  angle = armAngle + spiralOffset + random(-0.35, 0.35);

  return {
    r: r,
    angle: angle,
    x: cx + cos(angle) * r,
    y: cy + sin(angle) * r,
    speed: 0,
    life: random(0.7, 1),
  };
}

function makeCoreParticle() {
  let r = random(0, 25);
  let angle = random(TWO_PI);
  return {
    x: cx + cos(angle) * r,
    y: cy + sin(angle) * r,
    r: r,
    angle: angle,
    life: random(0.5, 1),
  };
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(min(pixelDensity(), 2));
  background(0, 0, 5);
  cx = width / 2; cy = height / 2;
  fpsEl = document.getElementById('fps');

  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push(makeParticle());
  }
  for (let i = 0; i < NUM_CORE; i++) {
    coreParticles.push(makeCoreParticle());
  }
}

function getParticleColor(r) {
  // Blue core → purple → red outer
  let frac = r / MAX_RADIUS;
  let h = lerp(220, 0, frac); // 220=blue, 0=red
  if (frac > 0.6) h = lerp(280, 350, (frac - 0.6) / 0.4); // purple to red
  let s = lerp(60, 95, frac);
  let b = lerp(100, 70, frac);
  return [h, s, b];
}

function draw() {
  fpsFrames++;
  let now = millis();
  if (now - fpsTimer > 500) {
    fpsEl.textContent = round(fpsFrames / ((now - fpsTimer) / 1000)) + ' fps';
    fpsFrames = 0; fpsTimer = now;
  }

  background(0, 0, 5, 18);
  blendMode(ADD);
  noStroke();

  // Draw galaxy particles
  for (let p of particles) {
    // Keplerian speed: inversely proportional to sqrt(r)
    let kepSpeed = 0.015 / sqrt(p.r + 1) * (MAX_RADIUS * 0.3);
    p.angle += kepSpeed;

    // Inward drift
    p.r -= DRIFT_RATE * (p.r * 0.4 + 5);

    // Update position
    p.x = cx + cos(p.angle) * p.r;
    p.y = cy + sin(p.angle) * p.r;

    if (p.r < MIN_RADIUS) {
      let np = makeParticle(MAX_RADIUS * (0.85 + random(0.15)));
      p.r = np.r; p.angle = np.angle;
      p.x = cx + cos(p.angle) * p.r;
      p.y = cy + sin(p.angle) * p.r;
    }

    let [h, s, b] = getParticleColor(p.r);
    let size = map(p.r, MIN_RADIUS, MAX_RADIUS, 3.5, 1.0);
    let alpha = map(p.r, MIN_RADIUS, MAX_RADIUS, 90, 40) * p.life;

    fill(h, s, b, alpha);
    ellipse(p.x, p.y, size, size);
  }

  // Draw bright core
  for (let cp of coreParticles) {
    cp.angle += 0.04 / sqrt(cp.r + 1) * 8;
    cp.x = cx + cos(cp.angle) * cp.r;
    cp.y = cy + sin(cp.angle) * cp.r;

    fill(200, 30, 100, 80);
    ellipse(cp.x, cp.y, 3, 3);
  }

  // Central glow
  for (let g = 8; g >= 0; g--) {
    let gr = g * 12;
    let ga = map(g, 0, 8, 40, 2);
    fill(210, 40, 100, ga);
    ellipse(cx, cy, gr * 2, gr * 2);
  }

  blendMode(BLEND);
  t++;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cx = width / 2; cy = height / 2;
  background(0, 0, 5);
}
</script>
</body></html>
