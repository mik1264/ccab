<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chromatic Aberration Art — p5 VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; font-family:monospace; font-size:13px; color:#0f0; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; font-family:monospace; font-size:12px; color:#888; background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Mouse warps the aberration field</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let t = 0;
  let fpsEl = document.getElementById('fps');
  let frameAcc = 0, fpsTimer = 0, lastFps = 0;
  const SCALE = 2; // render at half res
  let W, H;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    W = Math.ceil(p.width / SCALE);
    H = Math.ceil(p.height / SCALE);
  };

  // Evaluate the "scene" luminance at a given subpixel offset
  // Returns a 0..1 value (before channel split)
  function sceneLum(px, py) {
    let cx = W * 0.5, cy = H * 0.5;
    let dx = px - cx, dy = py - cy;
    let r = Math.sqrt(dx * dx + dy * dy);
    let theta = Math.atan2(dy, dx);

    // Animated noise blob shape
    let angle = theta + t * 0.3;
    let noiseR = 80 + 40 * p.noise(Math.cos(angle) * 1.5 + 3, Math.sin(angle) * 1.5 + 3, t * 0.4)
               + 20 * p.noise(Math.cos(angle * 3) * 2 + 8, Math.sin(angle * 3) * 2 + 8, t * 0.6);

    // Interior + bloom falloff
    let inside = 1.0 - p.constrain((r - noiseR) / 30.0, 0, 1);
    // Interior texture
    let texU = px / W + t * 0.05;
    let texV = py / H + t * 0.04;
    let tex = 0.5 + 0.5 * p.noise(texU * 4, texV * 4, t * 0.3);
    return inside * (0.6 + 0.4 * tex);
  }

  p.draw = function() {
    p.loadPixels();
    let cx = W * 0.5, cy = H * 0.5;
    // Aberration strength animated + mouse
    let abBase = 6 + 4 * Math.sin(t * 0.5);
    let mx = (p.mouseX / p.width - 0.5);
    let my = (p.mouseY / p.height - 0.5);

    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        let dx = x - cx, dy = y - cy;
        let r = Math.sqrt(dx * dx + dy * dy) + 0.001;
        let nx = dx / r, ny = dy / r; // outward unit vector

        // Mouse adds directional aberration
        let mab = (mx * nx + my * ny) * 8.0;
        let abStr = abBase + mab;

        // Sample R channel: pushed outward
        let rLum = sceneLum(x + nx * abStr, y + ny * abStr);
        // G channel: center (no offset)
        let gLum = sceneLum(x, y);
        // B channel: pushed inward
        let bLum = sceneLum(x - nx * abStr * 0.7, y - ny * abStr * 0.7);

        // Color: hue from polar angle + time
        let hue = ((Math.atan2(dy, dx) / Math.PI * 180.0) + t * 20.0 + 200) % 360;
        // Each channel gets its own hue shift
        let rHue = (hue + 0) % 360;
        let gHue = (hue + 120) % 360;
        let bHue = (hue + 240) % 360;

        // Combine: final pixel is additive mix
        // Convert each channel luminance + hue to RGB, then add
        function hsbToRgb(h, s, bri) {
          let hh = h / 60.0, ss = s / 100.0, bb = bri / 100.0;
          let hi = Math.floor(hh) % 6, ff = hh - Math.floor(hh);
          let pv=bb*(1-ss), qv=bb*(1-ss*ff), tv=bb*(1-ss*(1-ff));
          if(hi===0) return [bb,tv,pv];
          if(hi===1) return [qv,bb,pv];
          if(hi===2) return [pv,bb,tv];
          if(hi===3) return [pv,qv,bb];
          if(hi===4) return [tv,pv,bb];
          return [bb,pv,qv];
        }

        let [rr1,rg1,rb1] = hsbToRgb(rHue, 95, rLum * 95);
        let [gr1,gg1,gb1] = hsbToRgb(gHue, 85, gLum * 90);
        let [br1,bg1,bb1] = hsbToRgb(bHue, 90, bLum * 95);

        // Weighted additive — avoid pure white blowout
        let finalR = Math.min(255, (rr1 * 0.7 + gr1 * 0.15 + br1 * 0.15) * 255);
        let finalG = Math.min(255, (rg1 * 0.15 + gg1 * 0.7 + bg1 * 0.15) * 255);
        let finalB = Math.min(255, (rb1 * 0.15 + gb1 * 0.15 + bb1 * 0.7) * 255);

        for (let dy2 = 0; dy2 < SCALE; dy2++) {
          for (let dx2 = 0; dx2 < SCALE; dx2++) {
            let px2 = x * SCALE + dx2, py2 = y * SCALE + dy2;
            if (px2 >= p.width || py2 >= p.height) continue;
            let idx = 4 * (py2 * p.width + px2);
            p.pixels[idx]   = finalR;
            p.pixels[idx+1] = finalG;
            p.pixels[idx+2] = finalB;
            p.pixels[idx+3] = 255;
          }
        }
      }
    }
    p.updatePixels();
    t += 0.02;

    // FPS
    frameAcc++;
    fpsTimer += p.deltaTime;
    if (fpsTimer >= 500) {
      lastFps = Math.round(frameAcc * 1000 / fpsTimer);
      frameAcc = 0; fpsTimer = 0;
      fpsEl.textContent = lastFps + ' fps';
      fpsEl.style.color = lastFps >= 50 ? '#0f0' : lastFps >= 30 ? '#ff0' : '#f44';
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    W = Math.ceil(p.width / SCALE);
    H = Math.ceil(p.height / SCALE);
  };
});
</script>
</body>
</html>
