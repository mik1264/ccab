<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oil Slick Iridescence — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
// Downsampled resolution for performance
const SCALE = 3; // render every SCALE pixels
let t = 0;
let fpsEl, fpsTimer = 0, fpsFrames = 0;
let W, H;

// Wavelengths for RGB channels (nm)
const LAMBDA_R = 680;
const LAMBDA_G = 530;
const LAMBDA_B = 450;
const N_FILM = 1.45; // refractive index of oil

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  noSmooth();
  fpsEl = document.getElementById('fps');
  W = width;
  H = height;
}

function hsvToRgb(h, s, v) {
  // h 0-360, s,v 0-1
  let c = v * s;
  let x = c * (1 - abs((h / 60) % 2 - 1));
  let m = v - c;
  let r, g, b;
  if (h < 60)       { r = c; g = x; b = 0; }
  else if (h < 120) { r = x; g = c; b = 0; }
  else if (h < 180) { r = 0; g = c; b = x; }
  else if (h < 240) { r = 0; g = x; b = c; }
  else if (h < 300) { r = x; g = 0; b = c; }
  else              { r = c; g = 0; b = x; }
  return [(r + m) * 255, (g + m) * 255, (b + m) * 255];
}

function thinFilmReflectance(thickness, lambda) {
  // Phase difference for thin film: delta = 4*pi*n*d / lambda
  let delta = (4 * Math.PI * N_FILM * thickness) / lambda;
  // Reflectance ~ (1 + cos(delta)) / 2
  return (1 + cos(delta)) * 0.5;
}

function draw() {
  fpsFrames++;
  let now = millis();
  if (now - fpsTimer > 500) {
    fpsEl.textContent = round(fpsFrames / ((now - fpsTimer) / 1000)) + ' fps';
    fpsFrames = 0; fpsTimer = now;
  }

  loadPixels();

  let noiseZ = t * 0.008;
  let rippleZ = t * 0.015;

  for (let py = 0; py < H; py += SCALE) {
    for (let px = 0; px < W; px += SCALE) {
      let nx = px / W;
      let ny = py / H;

      // Primary noise layer for thickness (0-800nm range)
      let n1 = noise(nx * 3.5, ny * 3.5, noiseZ);
      // Secondary ripple displacement
      let n2 = noise(nx * 8.0 + 50, ny * 8.0 + 50, rippleZ);
      let dx = (noise(nx * 5 + 100, ny * 5 + 100, noiseZ * 0.5) - 0.5) * 0.04;
      let dy = (noise(nx * 5 + 200, ny * 5 + 200, noiseZ * 0.5) - 0.5) * 0.04;

      // Warped position
      let wn1 = noise((nx + dx) * 3.5, (ny + dy) * 3.5, noiseZ);
      let thickness = wn1 * 900 + n2 * 80 + 50; // 50-1030nm

      // Mouse interaction: thin near mouse
      let mdx = (mouseX - px) / W;
      let mdy = (mouseY - py) / H;
      let md = sqrt(mdx*mdx + mdy*mdy);
      if (md < 0.15) {
        thickness += (1 - md / 0.15) * 200 * sin(t * 0.1);
      }

      // Compute thin-film reflectance for R, G, B channels
      let rR = thinFilmReflectance(thickness, LAMBDA_R);
      let rG = thinFilmReflectance(thickness, LAMBDA_G);
      let rB = thinFilmReflectance(thickness, LAMBDA_B);

      // Add slight water surface darkness
      let waterDark = 0.3 + n2 * 0.15;
      rR *= waterDark + 0.7;
      rG *= waterDark + 0.7;
      rB *= waterDark + 0.7;

      let r = min(255, rR * 255 * 1.2);
      let g = min(255, rG * 255 * 1.2);
      let b = min(255, rB * 255 * 1.2);

      // Fill SCALE x SCALE block
      for (let bpy = py; bpy < min(py + SCALE, H); bpy++) {
        for (let bpx = px; bpx < min(px + SCALE, W); bpx++) {
          let pidx = (bpy * W + bpx) * 4;
          pixels[pidx]   = r;
          pixels[pidx+1] = g;
          pixels[pidx+2] = b;
          pixels[pidx+3] = 255;
        }
      }
    }
  }

  updatePixels();
  t++;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  W = width; H = height;
}
</script>
</body></html>
