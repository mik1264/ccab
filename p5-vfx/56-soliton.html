<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KdV Soliton Waves</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: monospace; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#fps { position:fixed; top:12px; left:50%; transform:translateX(-50%); color:#0f0; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:5px; z-index:999; }
#info { position:fixed; top:12px; right:12px; color:#999; font-size:11px; background:rgba(0,0,0,0.65); padding:8px 12px; border-radius:6px; z-index:999; line-height:1.7; }
#hint { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#888; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 14px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">KdV: u_t + 6u·u_x + u_xxx = 0<br>Soliton: 2c·sech²(√c(x-4ct))<br>Taller = faster · pass unchanged</div>
<div id="hint">Waterfall view: time flows downward</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const NX = 512;
  const DX = 0.12;
  const DT = 0.0003;
  const STEPS_PER_FRAME = 12;

  let u, uOld;
  let waterfall = []; // stores recent snapshots for waterfall
  const WATERFALL_ROWS = 80;
  let fpsDiv = document.getElementById('fps');

  function soliton(x, c, x0) {
    let arg = Math.sqrt(Math.abs(c)) * (x - x0);
    let s = 1 / Math.cosh(arg);
    return 2 * c * s * s;
  }

  function initSim() {
    u = new Float64Array(NX);
    uOld = new Float64Array(NX);
    // Two solitons: fast (tall) on left, slow (short) on right
    // fast soliton will catch and pass through slow one
    for (let i = 0; i < NX; i++) {
      let x = i * DX;
      u[i] = soliton(x, 1.4, NX*DX*0.22) + soliton(x, 0.5, NX*DX*0.48);
    }
    uOld.set(u);
    waterfall = [];
  }

  // KdV using finite difference (explicit scheme)
  // u_t = -6u*u_x - u_xxx
  // Using periodic BC
  function kdvStep() {
    let nu = new Float64Array(NX);
    for (let i = 0; i < NX; i++) {
      let im2 = (i-2+NX)%NX, im1 = (i-1+NX)%NX;
      let ip1 = (i+1)%NX, ip2 = (i+2)%NX;

      // First derivative (central)
      let ux = (u[ip1] - u[im1]) / (2*DX);
      // Third derivative
      let uxxx = (u[ip2] - 2*u[ip1] + 2*u[im1] - u[im2]) / (2*DX*DX*DX);
      nu[i] = u[i] + DT * (-6 * u[i] * ux - uxxx);
    }
    // Clamp to prevent blow-up
    for (let i = 0; i < NX; i++) {
      if (!isFinite(nu[i]) || Math.abs(nu[i]) > 20) nu[i] = 0;
    }
    uOld.set(u);
    u.set(nu);
  }

  p.setup = function() {
    let cnv = p.createCanvas(p.windowWidth, p.windowHeight);
    cnv.parent(document.body);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    initSim();
  };

  p.draw = function() {
    p.background(0, 0, 5);

    for (let s = 0; s < STEPS_PER_FRAME; s++) kdvStep();

    // Save snapshot for waterfall
    waterfall.unshift(u.slice());
    if (waterfall.length > WATERFALL_ROWS) waterfall.pop();

    let W = p.width, H = p.height;
    // Waterfall: each row is a time slice, newest at top
    let rowH = H / WATERFALL_ROWS;
    let wavePanelH = H * 0.35;
    let waterfallY = wavePanelH + 20;
    let waterfallH = H - waterfallY - 10;
    let wRowH = waterfallH / WATERFALL_ROWS;

    // Draw waterfall (heat map)
    p.noStroke();
    for (let row = 0; row < waterfall.length; row++) {
      let snap = waterfall[row];
      for (let i = 0; i < NX; i++) {
        let x = p.map(i, 0, NX-1, 0, W);
        let val = snap[i];
        let t = p.constrain(val / 3, 0, 1);
        if (t < 0.02) continue;
        let hue = p.map(t, 0, 1, 200, 30);
        let sat = 90;
        let bri = p.map(t, 0, 1, 20, 100);
        let alpha = p.map(row, 0, waterfall.length, 90, 20);
        p.fill(hue, sat, bri, alpha);
        p.rect(x, waterfallY + row*wRowH, W/NX + 0.5, wRowH + 0.3);
      }
    }

    // Draw current wave profile (top panel)
    let baseline = wavePanelH * 0.8;
    let scale = 28;

    // Gradient fill under wave
    for (let i = 0; i < NX-1; i++) {
      let x1 = p.map(i, 0, NX-1, 0, W);
      let x2 = p.map(i+1, 0, NX-1, 0, W);
      let y1 = baseline - u[i] * scale;
      let y2 = baseline - u[i+1] * scale;
      let val = (u[i] + u[i+1]) / 2;
      let t = p.constrain(val / 3, -1, 1);
      let hue = t > 0 ? p.map(t, 0, 1, 190, 30) : 240;
      let bri = t > 0 ? p.map(t, 0, 1, 30, 100) : 20;
      p.stroke(hue, 90, bri, 85);
      p.strokeWeight(1.5);
      p.line(x1, y1, x2, y2);

      // fill beneath
      p.strokeWeight(0.4);
      p.stroke(hue, 60, bri, 25);
      p.line(x1, y1, x1, baseline);
    }

    // Baseline
    p.stroke(0, 0, 30, 50);
    p.strokeWeight(0.5);
    p.line(0, baseline, W, baseline);

    // Label
    p.noStroke();
    p.fill(0, 0, 50, 70);
    p.textSize(11);
    p.text('← Current wave →', 10, 18);
    p.text('← Waterfall (time history) →', 10, waterfallY + 14);

    if (p.frameCount % 20 === 0) {
      fpsDiv.textContent = 'FPS: ' + Math.round(p.frameRate());
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
  };
});
</script>
</body>
</html>
