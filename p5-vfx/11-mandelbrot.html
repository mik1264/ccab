<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandelbrot Explorer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#info { position:fixed; bottom:12px; left:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:8px 12px; border-radius:6px; line-height:1.6; z-index:999; pointer-events:none; }
#fps { position:fixed; top:12px; right:12px; color:#0f0; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Loading...</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let cx = -0.5, cy = 0.0, zoom = 3.5;
  let maxIter = 200;
  let isDragging = false;
  let dragStart = {};
  let panStart = {};
  let needsRender = true;
  let fpsArr = [];
  let lastTime = 0;

  // Tile-based incremental rendering
  let tileSize = 64;
  let tiles = [];
  let tileIndex = 0;
  let rendering = false;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.pixelDensity(1);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    buildTiles();
    needsRender = true;
  };

  function buildTiles() {
    tiles = [];
    let cols = Math.ceil(p.width / tileSize);
    let rows = Math.ceil(p.height / tileSize);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        tiles.push({ x: c * tileSize, y: r * tileSize });
      }
    }
    // shuffle for nice progressive reveal
    for (let i = tiles.length - 1; i > 0; i--) {
      let j = Math.floor(Math.random() * (i + 1));
      [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }
    tileIndex = 0;
    rendering = false;
  }

  function startRender() {
    buildTiles();
    rendering = true;
    p.loadPixels();
  }

  function mandelbrot(cr, ci, maxIt) {
    let zr = 0, zi = 0, zr2 = 0, zi2 = 0;
    for (let i = 0; i < maxIt; i++) {
      zi = 2 * zr * zi + ci;
      zr = zr2 - zi2 + cr;
      zr2 = zr * zr;
      zi2 = zi * zi;
      if (zr2 + zi2 > 4) {
        // smooth iteration
        let smooth = i + 1 - Math.log(Math.log(Math.sqrt(zr2 + zi2))) / Math.log(2);
        return smooth;
      }
    }
    return -1;
  }

  function renderTile(tile) {
    let pw = p.width, ph = p.height;
    let x0 = tile.x, y0 = tile.y;
    let x1 = Math.min(x0 + tileSize, pw);
    let y1 = Math.min(y0 + tileSize, ph);

    for (let py = y0; py < y1; py++) {
      for (let px = x0; px < x1; px++) {
        let cr = cx + (px - pw / 2) * zoom / pw;
        let ci = cy + (py - ph / 2) * zoom / pw;
        let s = mandelbrot(cr, ci, maxIter);
        let idx = 4 * (py * pw + px);
        if (s < 0) {
          p.pixels[idx] = 0;
          p.pixels[idx+1] = 0;
          p.pixels[idx+2] = 0;
          p.pixels[idx+3] = 255;
        } else {
          let hue = (s * 4.5) % 360;
          let sat = 90;
          let bri = 90;
          // convert HSB to RGB manually
          let h = hue / 60;
          let f = h - Math.floor(h);
          let v = bri / 100 * 255;
          let sv = sat / 100;
          let p1 = v * (1 - sv);
          let p2 = v * (1 - sv * f);
          let p3 = v * (1 - sv * (1 - f));
          let hi = Math.floor(h) % 6;
          let r, g, b;
          if (hi === 0) { r=v; g=p3; b=p1; }
          else if (hi === 1) { r=p2; g=v; b=p1; }
          else if (hi === 2) { r=p1; g=v; b=p3; }
          else if (hi === 3) { r=p1; g=p2; b=v; }
          else if (hi === 4) { r=p3; g=p1; b=v; }
          else { r=v; g=p1; b=p2; }
          p.pixels[idx] = r;
          p.pixels[idx+1] = g;
          p.pixels[idx+2] = b;
          p.pixels[idx+3] = 255;
        }
      }
    }
  }

  p.draw = function() {
    let now = performance.now();
    let dt = now - lastTime;
    lastTime = now;
    if (dt > 0) {
      fpsArr.push(1000 / dt);
      if (fpsArr.length > 30) fpsArr.shift();
      let avg = fpsArr.reduce((a, b) => a + b, 0) / fpsArr.length;
      document.getElementById('fps').textContent = 'FPS: ' + avg.toFixed(1);
    }

    if (needsRender) {
      needsRender = false;
      startRender();
    }

    if (rendering) {
      // render several tiles per frame
      let tilesPerFrame = 4;
      for (let t = 0; t < tilesPerFrame && tileIndex < tiles.length; t++, tileIndex++) {
        renderTile(tiles[tileIndex]);
      }
      p.updatePixels();
      if (tileIndex >= tiles.length) {
        rendering = false;
        updateInfo();
      }
    }
  };

  function updateInfo() {
    document.getElementById('info').innerHTML =
      'Center: (' + cx.toFixed(8) + ', ' + ci_str() + 'i)<br>' +
      'Zoom: ' + (3.5 / zoom).toExponential(3) + 'x<br>' +
      'Max iter: ' + maxIter + '<br>' +
      'Scroll: zoom | Drag: pan';
  }

  function ci_str() {
    return (cy >= 0 ? '+' : '') + cy.toFixed(8);
  }

  p.mousePressed = function() {
    if (p.mouseX < 0 || p.mouseX > p.width || p.mouseY < 0 || p.mouseY > p.height) return;
    isDragging = true;
    dragStart = { x: p.mouseX, y: p.mouseY };
    panStart = { cx, cy };
  };

  p.mouseDragged = function() {
    if (!isDragging) return;
    let dx = p.mouseX - dragStart.x;
    let dy = p.mouseY - dragStart.y;
    cx = panStart.cx - dx * zoom / p.width;
    cy = panStart.cy - dy * zoom / p.width;
    needsRender = true;
  };

  p.mouseReleased = function() {
    isDragging = false;
  };

  p.mouseWheel = function(e) {
    let factor = e.delta > 0 ? 1.15 : 0.87;
    // zoom toward mouse
    let mx = p.mouseX, my = p.mouseY;
    let worldX = cx + (mx - p.width / 2) * zoom / p.width;
    let worldY = cy + (my - p.height / 2) * zoom / p.width;
    zoom *= factor;
    cx = worldX - (mx - p.width / 2) * zoom / p.width;
    cy = worldY - (my - p.height / 2) * zoom / p.width;
    maxIter = Math.min(800, Math.floor(200 * Math.sqrt(3.5 / zoom)));
    needsRender = true;
    return false;
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    needsRender = true;
  };

  updateInfo();
});
</script>
</body>
</html>
