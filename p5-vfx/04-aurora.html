<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Borealis — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
let t = 0;
let stars = [];
let fpsEl, fpsTimer = 0, fpsFrames = 0;
const NUM_BANDS = 8;
const NUM_STARS = 300;

// Band configs: [y-fraction, freq, speed, phase, amp, hue-base]
let bands = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(min(pixelDensity(), 2));
  fpsEl = document.getElementById('fps');

  // Stars
  for (let i = 0; i < NUM_STARS; i++) {
    stars.push({
      x: random(width),
      y: random(height * 0.65),
      r: random(0.5, 2.5),
      bright: random(60, 100),
      twinkle: random(TWO_PI)
    });
  }

  // Bands from bottom 35% to top 5%
  for (let i = 0; i < NUM_BANDS; i++) {
    let t2 = i / (NUM_BANDS - 1);
    bands.push({
      yFrac: 0.35 - t2 * 0.30,
      freq: random(0.003, 0.007),
      speed: random(0.3, 0.9) * (random() < 0.5 ? 1 : -1),
      phase: random(TWO_PI),
      amp: random(0.04, 0.1),
      noiseFreq: 0.005,
      noiseOff: random(1000),
      hueShift: t2,
      thickness: map(t2, 0, 1, height * 0.12, height * 0.06),
      alpha: map(t2, 0, 1, 30, 15)
    });
  }
}

function fbm(x, y, octaves) {
  let val = 0, amp = 0.5, freq = 1;
  for (let o = 0; o < octaves; o++) {
    val += noise(x * freq, y * freq) * amp;
    amp *= 0.5; freq *= 2.1;
  }
  return val;
}

function getBandHue(band, time) {
  // Hue cycles: green → teal → violet → magenta
  let base = 120; // green
  let cycle = (band.hueShift * 200 + time * 8) % 360;
  return (base + cycle) % 360;
}

function drawStars() {
  noStroke();
  for (let s of stars) {
    let tw = sin(t * 0.05 + s.twinkle) * 0.5 + 0.5;
    let br = s.bright * (0.6 + 0.4 * tw);
    fill(200, 10, br, 80);
    ellipse(s.x, s.y, s.r * (0.7 + 0.3 * tw));
  }
}

function drawBand(band, time) {
  let noiseZ = time * 0.005 + band.noiseOff;
  let hue = getBandHue(band, time);

  // Draw band as filled shape with wavy top and straight bottom
  beginShape();
  // Top edge (wavy upper boundary)
  for (let x = -10; x <= width + 10; x += 4) {
    let sinWave = sin(x * band.freq + time * band.speed + band.phase) * band.amp * height;
    let nWarp = fbm(x * band.noiseFreq + noiseZ, 0, 3) * 180 - 90;
    let yTop = band.yFrac * height + sinWave + nWarp;
    vertex(x, yTop);
  }
  // Bottom edge (wavy lower boundary)
  for (let x = width + 10; x >= -10; x -= 4) {
    let sinWave = sin(x * band.freq * 1.1 + time * band.speed * 0.9 + band.phase + 1) * band.amp * height;
    let nWarp = fbm(x * band.noiseFreq * 1.1 + noiseZ + 5, 0.5, 3) * 120 - 60;
    let yBot = (band.yFrac + 0.12) * height + sinWave + nWarp;
    vertex(x, yBot);
  }
  endShape(CLOSE);
}

function draw() {
  fpsFrames++;
  let now = millis();
  if (now - fpsTimer > 500) {
    fpsEl.textContent = round(fpsFrames / ((now - fpsTimer) / 1000)) + ' fps';
    fpsFrames = 0; fpsTimer = now;
  }

  // Deep space background
  background(230, 60, 5);

  // Stars
  drawStars();

  blendMode(ADD);
  noStroke();

  // Draw each aurora band multiple times with slight shifts for glow
  for (let pass = 0; pass < 3; pass++) {
    let alphaScale = [1.0, 0.5, 0.25][pass];
    for (let bi = 0; bi < bands.length; bi++) {
      let band = bands[bi];
      let hue = getBandHue(band, t);
      // Inner bright core
      let sat = map(bi, 0, NUM_BANDS - 1, 70, 90);
      let bright = map(bi, 0, NUM_BANDS - 1, 95, 70);
      fill(hue, sat, bright, band.alpha * alphaScale);
      drawBand(band, t + pass * 1.5);
    }
  }

  // Gradient horizon fog
  blendMode(BLEND);
  for (let y = height * 0.6; y < height; y++) {
    let a = map(y, height * 0.6, height, 0, 98);
    stroke(230, 60, 3, a);
    line(0, y, width, y);
  }

  t += 0.5;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  stars = [];
  for (let i = 0; i < NUM_STARS; i++) {
    stars.push({ x: random(width), y: random(height * 0.65), r: random(0.5, 2.5), bright: random(60, 100), twinkle: random(TWO_PI) });
  }
}
</script>
</body></html>
