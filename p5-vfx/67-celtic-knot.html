<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celtic Knot Generator — P5.js VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:50%; transform:translateX(-50%); color:#bbb; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.55); padding:6px 16px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Celtic Knot — interlacing strands — over/under weaving</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let fpsEl, infoEl;
  let t = 0;
  let rotAngle = 0;

  // Grid dimensions for knot
  const GRID_W = 7;  // must be odd for proper weaving
  const GRID_H = 7;

  // Strand paths as polylines
  let strands = [];
  let strandColors = [];

  // Cell size
  let cellSize, offsetX, offsetY;

  // Directions
  const DIRS = { R: 0, U: 1, L: 2, D: 3 };
  const DX = [1, 0, -1, 0];
  const DY = [0, -1, 0, 1];

  // Simple approach: generate a braided knot pattern
  // Use a checkerboard crossing pattern
  // At each crossing: if (row+col) is even -> horizontal over vertical
  //                   else -> vertical over horizontal

  // We generate a set of continuous strands by following the crossing rules
  function generateStrands() {
    strands = [];
    strandColors = [];

    // Generate a set of Bezier-path strands through the knot grid
    // Use a simplified representation: horizontal and vertical strands woven together

    // Horizontal strands: one per row, going left to right
    // Vertical strands: one per col, going top to bottom

    let hHue = 30;
    // Horizontal strands
    for (let row = 0; row < GRID_H; row++) {
      let pts = [];
      for (let col = 0; col <= GRID_W; col++) {
        let x = offsetX + col * cellSize;
        let y = offsetY + (row + 0.5) * cellSize;
        pts.push({ x, y });
      }
      let over = []; // which crossings this strand is over
      for (let col = 0; col < GRID_W; col++) {
        // crossing at col+0.5, row
        // over if (row + col) is even
        over.push((row + col) % 2 === 0);
      }
      strands.push({ pts, over, dir: 'h', row });
      strandColors.push((hHue + row * 47) % 360);
    }

    // Vertical strands
    for (let col = 0; col < GRID_W; col++) {
      let pts = [];
      for (let row = 0; row <= GRID_H; row++) {
        let x = offsetX + (col + 0.5) * cellSize;
        let y = offsetY + row * cellSize;
        pts.push({ x, y });
      }
      let over = [];
      for (let row = 0; row < GRID_H; row++) {
        over.push((row + col) % 2 !== 0);
      }
      strands.push({ pts, over, dir: 'v', col });
      strandColors.push((200 + col * 53) % 360);
    }
  }

  // Draw a single strand with Bezier smoothing and over/under breaks
  function drawStrand(strand, hue, weight, shadowMode) {
    let pts = strand.pts;
    let strandW = weight;
    let strandW_inner = weight * 0.55;
    let gap = weight * 0.9; // gap for under-crossings

    if (shadowMode) {
      // Dark outline pass
      p.strokeWeight(strandW + 3);
      p.stroke(0, 0, 0, 90);
      p.noFill();
      for (let i = 0; i < pts.length - 1; i++) {
        p.line(pts[i].x, pts[i].y, pts[i+1].x, pts[i+1].y);
      }
      return;
    }

    // Main strand color
    p.strokeWeight(strandW);
    p.stroke(hue, 80, 85, 95);
    p.noFill();

    // Draw segments with gaps for under-crossings
    if (strand.dir === 'h') {
      for (let i = 0; i < strand.over.length; i++) {
        let x1 = pts[i].x, y1 = pts[i].y;
        let x2 = pts[i+1].x, y2 = pts[i+1].y;
        let cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;

        if (strand.over[i]) {
          // Over: draw full segment
          p.line(x1, y1, x2, y2);
        } else {
          // Under: draw with gap in center
          let gapFrac = gap / cellSize;
          let gEnd = gapFrac / 2;
          // Draw two segments with gap in middle
          p.line(x1, y1, cx - gap * 0.45, cy);
          p.line(cx + gap * 0.45, cy, x2, y2);
        }
      }
    } else {
      for (let i = 0; i < strand.over.length; i++) {
        let x1 = pts[i].x, y1 = pts[i].y;
        let x2 = pts[i+1].x, y2 = pts[i+1].y;
        let cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;

        if (strand.over[i]) {
          p.line(x1, y1, x2, y2);
        } else {
          p.line(x1, y1, cx, cy - gap * 0.45);
          p.line(cx, cy + gap * 0.45, x2, y2);
        }
      }
    }

    // Bright highlight line on top
    p.strokeWeight(strandW_inner);
    p.stroke(hue, 50, 98, 70);
    if (strand.dir === 'h') {
      for (let i = 0; i < strand.over.length; i++) {
        let x1 = pts[i].x, y1 = pts[i].y;
        let x2 = pts[i+1].x, y2 = pts[i+1].y;
        let cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
        if (strand.over[i]) {
          p.line(x1, y1, x2, y2);
        } else {
          p.line(x1, y1, cx - gap * 0.45, cy);
          p.line(cx + gap * 0.45, cy, x2, y2);
        }
      }
    } else {
      for (let i = 0; i < strand.over.length; i++) {
        let x1 = pts[i].x, y1 = pts[i].y;
        let x2 = pts[i+1].x, y2 = pts[i+1].y;
        let cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
        if (strand.over[i]) {
          p.line(x1, y1, x2, y2);
        } else {
          p.line(x1, y1, cx, cy - gap * 0.45);
          p.line(cx, cy + gap * 0.45, x2, y2);
        }
      }
    }
  }

  // Celtic border
  function drawBorder(x, y, w, h, segments, hue) {
    let bw = Math.min(w, h) * 0.06;
    let strandW = bw * 0.5;
    let step = bw * 1.3;

    p.strokeCap(p.ROUND);
    p.noFill();

    // Outer rectangle border — interlaced horizontal bands
    for (let band = -1; band <= 1; band += 2) {
      let offset = band * bw * 0.3;
      p.stroke(hue, 75, 80, 70);
      p.strokeWeight(strandW);
      // Top
      p.line(x + bw, y + bw + offset, x + w - bw, y + bw + offset);
      // Bottom
      p.line(x + bw, y + h - bw + offset, x + w - bw, y + h - bw + offset);
      // Left
      p.line(x + bw + offset, y + bw, x + bw + offset, y + h - bw);
      // Right
      p.line(x + w - bw + offset, y + bw, x + w - bw + offset, y + h - bw);
    }
  }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    infoEl = document.getElementById('info');
    computeLayout();
    generateStrands();
  };

  function computeLayout() {
    let maxDim = Math.min(p.width * 0.82, p.height * 0.82);
    cellSize = maxDim / Math.max(GRID_W, GRID_H);
    offsetX = (p.width - GRID_W * cellSize) / 2;
    offsetY = (p.height - GRID_H * cellSize) / 2;
  }

  p.draw = function() {
    p.background(0, 0, 6);
    if (p.frameCount % 15 === 0) fpsEl.textContent = Math.round(p.frameRate()) + ' fps';

    t = p.millis() / 1000;
    rotAngle = t * 2.5; // slow rotation in degrees

    let cx = p.width / 2;
    let cy = p.height / 2;

    p.push();
    p.translate(cx, cy);
    p.rotate(p.radians(rotAngle));
    p.translate(-cx, -cy);

    // Recompute strand positions (since rotation is done via transform)
    computeLayout();
    generateStrands();

    let strandWeight = cellSize * 0.22;

    // Pass 1: Shadow/outline
    p.strokeCap(p.SQUARE);
    for (let i = 0; i < strands.length; i++) {
      drawStrand(strands[i], strandColors[i], strandWeight, true);
    }

    // Pass 2: Under strands
    p.strokeCap(p.SQUARE);
    for (let i = 0; i < strands.length; i++) {
      let s = strands[i];
      // Only draw under portions in pass 2 doesn't work cleanly...
      // instead draw all strands with full coloring, shadow = false
      drawStrand(s, (strandColors[i] + t * 20) % 360, strandWeight, false);
    }

    // Celtic knotwork border
    let bx = offsetX - cellSize * 0.7;
    let by = offsetY - cellSize * 0.7;
    let bw = GRID_W * cellSize + cellSize * 1.4;
    let bh = GRID_H * cellSize + cellSize * 1.4;
    drawBorder(bx, by, bw, bh, 12, (t * 30) % 360);

    p.pop();

    infoEl.innerHTML = `Celtic Knot ${GRID_W}×${GRID_H} — ${GRID_H + GRID_W} interlacing strands — rotating`;
  };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    computeLayout();
    generateStrands();
  };
});
</script>
</body>
</html>
