<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Spiral Arms</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#0f0; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const sketch = (p) => {
  const NUM_PARTICLES = 120000;
  const NUM_ARMS = 4;
  const a = 0.3, b = 0.18;
  let particles = [];
  let fpsEl, frameCount2 = 0, fpsTimer = 0;
  let rotOffset = 0;
  let pg; // offscreen — we'll re-render each frame via pixels

  // Pre-compute particle positions (polar), animate by adding rotOffset
  // Store as Float32Array for perf: [r, theta, scatter_r, scatter_perp, hue_base, brightness]
  let pdata; // Float32Array, 6 floats per particle

  p.setup = () => {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 255);
    p.pixelDensity(1);
    fpsEl = document.getElementById('fps');

    pdata = new Float32Array(NUM_PARTICLES * 6);

    let maxR = Math.min(p.width, p.height) * 0.44;

    for (let i = 0; i < NUM_PARTICLES; i++) {
      let arm = Math.floor(Math.random() * NUM_ARMS);
      let armOffset = (arm / NUM_ARMS) * Math.PI * 2;

      // Logarithmic spiral: r = a * exp(b * theta)
      let r, theta;
      let isCore = Math.random() < 0.04; // 4% core particles
      if (isCore) {
        r = Math.random() * maxR * 0.08;
        theta = Math.random() * Math.PI * 2;
        armOffset = 0;
      } else {
        theta = Math.random() * Math.PI * 4; // 2 full winds
        r = a * Math.exp(b * theta) * (maxR / (a * Math.exp(b * Math.PI * 4)));
        r = Math.min(r, maxR);
      }

      // Gaussian scatter perpendicular to arm
      let scatterScale = isCore ? 0.05 : (0.04 + 0.08 * (r / maxR));
      let perpScatter = gaussRandom() * scatterScale * maxR;
      let radScatter   = gaussRandom() * scatterScale * maxR * 0.4;

      // Hue by radius: 220=blue (core) -> 270=purple -> 0=red (outer)
      let hue, sat, bright;
      let t = r / maxR;
      if (isCore) {
        hue = 50 + Math.random() * 20; // warm white-yellow core
        sat = 10 + Math.random() * 30;
        bright = 80 + Math.random() * 20;
      } else {
        hue = 220 - t * 220 + (Math.random() - 0.5) * 15; // 220→0
        if (hue < 0) hue += 360;
        sat = 60 + t * 30;
        bright = 55 + (1-t) * 40 + Math.random() * 10;
      }

      let base = i * 6;
      pdata[base]   = r + radScatter;
      pdata[base+1] = theta + armOffset;
      pdata[base+2] = perpScatter;
      pdata[base+3] = hue;
      pdata[base+4] = sat;
      pdata[base+5] = bright;
    }
  };

  function gaussRandom() {
    // Box-Muller
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }

  p.draw = () => {
    p.background(0);
    p.loadPixels();

    let cx = p.width / 2, cy = p.height / 2;
    let rot = rotOffset;

    for (let i = 0; i < NUM_PARTICLES; i++) {
      let base = i * 6;
      let r     = pdata[base];
      let theta = pdata[base+1] + rot;
      let perp  = pdata[base+2];
      let hue   = pdata[base+3];
      let sat   = pdata[base+4];
      let bri   = pdata[base+5];

      // Position on spiral
      let spiralX = r * Math.cos(theta);
      let spiralY = r * Math.sin(theta);

      // Perpendicular direction
      let px = spiralX + perp * Math.cos(theta + Math.PI/2);
      let py = spiralY + perp * Math.sin(theta + Math.PI/2);

      let sx = Math.round(cx + px);
      let sy = Math.round(cy + py);

      if (sx < 0 || sx >= p.width || sy < 0 || sy >= p.height) continue;

      // HSB to RGB
      let rgb = hsbToRgb(hue, sat, bri);
      let idx = (sx + sy * p.width) * 4;

      // ADD blend
      p.pixels[idx]   = Math.min(255, p.pixels[idx]   + rgb[0]);
      p.pixels[idx+1] = Math.min(255, p.pixels[idx+1] + rgb[1]);
      p.pixels[idx+2] = Math.min(255, p.pixels[idx+2] + rgb[2]);
      p.pixels[idx+3] = 255;
    }

    p.updatePixels();
    rotOffset += 0.0004;

    // FPS
    frameCount2++;
    let now = p.millis();
    if (now - fpsTimer > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(frameCount2 / ((now - fpsTimer) / 1000));
      frameCount2 = 0; fpsTimer = now;
    }
  };

  function hsbToRgb(h, s, v) {
    h /= 360; s /= 100; v /= 100;
    let r, g, b;
    let i = Math.floor(h * 6);
    let f = h * 6 - i;
    let p2 = v * (1 - s);
    let q = v * (1 - f * s);
    let t = v * (1 - (1 - f) * s);
    switch (i % 6) {
      case 0: r=v;g=t;b=p2;break;
      case 1: r=q;g=v;b=p2;break;
      case 2: r=p2;g=v;b=t;break;
      case 3: r=p2;g=q;b=v;break;
      case 4: r=t;g=p2;b=v;break;
      case 5: r=v;g=p2;b=q;break;
    }
    return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
  }

  p.windowResized = () => { p.resizeCanvas(window.innerWidth, window.innerHeight); };
};
new p5(sketch);
</script>
</body>
</html>
