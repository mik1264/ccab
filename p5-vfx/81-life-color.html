<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game of Life — Color Age | P5 VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#hud { position:fixed; top:12px; right:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:6px; z-index:999; line-height:1.8; }
#sparkline { position:fixed; top:80px; right:12px; background:rgba(0,0,0,0.7); border-radius:6px; z-index:999; }
#keys { position:fixed; bottom:12px; left:12px; color:#555; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.6); padding:6px 10px; border-radius:6px; z-index:999; line-height:1.7; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="hud">
  <div>GEN: <span id="gen">0</span></div>
  <div>POP: <span id="pop">0</span></div>
  <div>FPS: <span id="fps">0</span></div>
  <div>SPD: <span id="spd">1</span>x</div>
</div>
<canvas id="sparkline" width="120" height="50"></canvas>
<div id="keys">SPACE pause · +/- speed · click paint</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const CS = 3; // cell size px
  let cols, rows;
  let grid, age, ghost; // age: generations alive; ghost: frames since death
  let paused = false;
  let speed = 1; // steps per frame
  let gen = 0;
  let popHistory = [];
  const MAX_HIST = 120;
  let frameCount0 = 0, lastFPS = 0, lastFPSTime = 0;
  let painting = false;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    cols = Math.floor(p.width / CS);
    rows = Math.floor(p.height / CS);
    initGrid();
  };

  function initGrid() {
    grid = new Uint8Array(cols * rows);
    age  = new Int32Array(cols * rows);
    ghost = new Int32Array(cols * rows);
    // Random seed
    for (let i = 0; i < cols * rows; i++) {
      if (Math.random() < 0.3) { grid[i] = 1; age[i] = 0; }
    }
    // Glider at top-left region
    placePattern(10, 10, [[0,1],[1,2],[2,0],[2,1],[2,2]]);
    // R-pentomino near center
    placePattern(Math.floor(cols/2), Math.floor(rows/2), [[0,1],[0,2],[1,0],[1,1],[2,1]]);
  }

  function placePattern(ox, oy, cells) {
    cells.forEach(([r, c]) => {
      const idx = (oy + r) * cols + (ox + c);
      if (idx >= 0 && idx < grid.length) { grid[idx] = 1; age[idx] = 0; }
    });
  }

  function idx(c, r) { return r * cols + c; }

  function step() {
    const next = new Uint8Array(cols * rows);
    const nextAge = new Int32Array(cols * rows);
    const nextGhost = new Int32Array(cols * rows);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        let n = 0;
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = (r + dr + rows) % rows;
            const nc = (c + dc + cols) % cols;
            n += grid[idx(nc, nr)];
          }
        }
        const i = idx(c, r);
        const alive = grid[i];
        if (alive) {
          if (n === 2 || n === 3) { next[i] = 1; nextAge[i] = age[i] + 1; }
          else { next[i] = 0; nextGhost[i] = 5; }
        } else {
          if (n === 3) { next[i] = 1; nextAge[i] = 0; }
          else { nextGhost[i] = Math.max(0, ghost[i] - 1); }
        }
      }
    }
    grid = next; age = nextAge; ghost = nextGhost;
    gen++;
  }

  p.draw = function() {
    // FPS
    frameCount0++;
    const now = performance.now();
    if (now - lastFPSTime >= 500) {
      lastFPS = Math.round(frameCount0 / ((now - lastFPSTime) / 1000));
      frameCount0 = 0; lastFPSTime = now;
    }

    // Painting
    if (p.mouseIsPressed && !painting) painting = true;
    if (!p.mouseIsPressed) painting = false;
    if (painting) {
      const mc = Math.floor(p.mouseX / CS);
      const mr = Math.floor(p.mouseY / CS);
      for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++) {
        const c = mc + dc, r = mr + dr;
        if (c >= 0 && c < cols && r >= 0 && r < rows) {
          grid[idx(c, r)] = 1; age[idx(c, r)] = 0;
        }
      }
    }

    if (!paused) for (let s = 0; s < speed; s++) step();

    // Render via pixels[]
    p.loadPixels();
    let pop = 0;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const i = idx(c, r);
        let R = 0, G = 0, B = 0;
        if (grid[i]) {
          pop++;
          const a = age[i];
          if (a === 0) {
            // Newborn: bright green flash
            R = 120; G = 255; B = 80;
          } else {
            // Age color: blue (young) -> cyan -> white-yellow (old)
            const t = Math.min(a / 200, 1);
            const hue = 240 - t * 200; // 240 blue -> 40 yellow
            const sat = 100 - t * 60;
            const bri = 60 + t * 40;
            const [r2,g2,b2] = hsbToRgb(hue, sat, bri);
            R = r2; G = g2; B = b2;
          }
        } else if (ghost[i] > 0) {
          // Ghost: fade to dark red
          const fade = ghost[i] / 5;
          R = Math.floor(120 * fade); G = 0; B = 0;
        }
        for (let py = 0; py < CS; py++) {
          for (let px = 0; px < CS; px++) {
            const pi = 4 * ((r * CS + py) * p.width + (c * CS + px));
            p.pixels[pi]   = R;
            p.pixels[pi+1] = G;
            p.pixels[pi+2] = B;
            p.pixels[pi+3] = 255;
          }
        }
      }
    }
    p.updatePixels();

    // Sparkline
    popHistory.push(pop);
    if (popHistory.length > MAX_HIST) popHistory.shift();
    drawSparkline(pop);

    // HUD
    document.getElementById('gen').textContent = gen;
    document.getElementById('pop').textContent = pop;
    document.getElementById('fps').textContent = lastFPS;
    document.getElementById('spd').textContent = speed;
  };

  function drawSparkline(pop) {
    const sc = document.getElementById('sparkline');
    const ctx = sc.getContext('2d');
    ctx.clearRect(0, 0, sc.width, sc.height);
    if (popHistory.length < 2) return;
    const max = Math.max(...popHistory) || 1;
    ctx.strokeStyle = '#0f8';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    popHistory.forEach((v, i) => {
      const x = (i / (MAX_HIST - 1)) * sc.width;
      const y = sc.height - (v / max) * sc.height;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  function hsbToRgb(h, s, b) {
    h = ((h % 360) + 360) % 360;
    s /= 100; b /= 100;
    const c = b * s, x = c * (1 - Math.abs((h/60) % 2 - 1)), m = b - c;
    let r=0,g=0,bl=0;
    if (h<60) {r=c;g=x;} else if (h<120) {r=x;g=c;} else if (h<180) {g=c;bl=x;}
    else if (h<240) {g=x;bl=c;} else if (h<300) {r=x;bl=c;} else {r=c;bl=x;}
    return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((bl+m)*255)];
  }

  p.keyPressed = function() {
    if (p.key === ' ') { paused = !paused; return false; }
    if (p.key === '+' || p.key === '=') speed = Math.min(speed + 1, 20);
    if (p.key === '-') speed = Math.max(speed - 1, 1);
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    cols = Math.floor(p.width / CS);
    rows = Math.floor(p.height / CS);
    initGrid();
    gen = 0; popHistory = [];
  };
});
</script>
</body>
</html>
