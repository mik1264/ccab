<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noise Terrain 3D | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const COLS = 72;
        const ROWS = 72;
        const TILE_W = 32;
        const TILE_D = 32;
        const AMP = 200;
        const FREQ = 0.038;
        const FLY_SPEED = 0.008;

        // Stars
        let stars = [];
        const NUM_STARS = 280;

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);
            noiseDetail(6, 0.48);
            for (let i = 0; i < NUM_STARS; i++) {
                stars.push({
                    x: random(-width * 0.6, width * 0.6),
                    y: random(-height * 0.5, -30),
                    z: random(-800, -200),
                    r: random(1, 2.5)
                });
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        function getHeight(cx, cz, t) {
            // FBM: 4 octaves
            let nx = cx * FREQ;
            let nz = cz * FREQ + t;
            let h = noise(nx, nz) * 1.0
                  + noise(nx * 2.1, nz * 2.1) * 0.5
                  + noise(nx * 4.3, nz * 4.3) * 0.25
                  + noise(nx * 8.7, nz * 8.7) * 0.125;
            h /= 1.875;
            return (h - 0.5) * 2 * AMP;
        }

        function heightToColor(h) {
            // Deep water → shallow → beach → grass → mountain → snow
            let hn = (h + AMP) / (2 * AMP); // 0..1
            if (hn < 0.18) return [220, 80, 40, 100];         // deep water navy
            if (hn < 0.28) return [190, 65, 62, 100];         // shallow teal
            if (hn < 0.34) return [40,  55, 82, 100];         // sand/beach
            if (hn < 0.52) return [105, 72, 52, 100];         // grass green
            if (hn < 0.68) return [95,  50, 40, 100];         // dark forest
            if (hn < 0.80) return [20,  20, 58, 100];         // rocky grey
            return [0, 0, 96, 100];                            // snow white
        }

        function draw() {
            let t = frameCount * FLY_SPEED;

            // Sky gradient via rect background
            background(230, 55, 8);

            orbitControl(2, 2, 0.1);

            // Camera tilt: flying forward
            let bankAngle = sin(t * 0.3) * 0.04;
            rotateZ(bankAngle);
            rotateX(0.44); // look down at terrain

            // Directional light from upper left
            directionalLight(40, 30, 90, -0.6, -1, 0.4);
            ambientLight(210, 30, 18);

            // Draw stars in screen space before 3D
            resetMatrix();
            noStroke();
            for (let s of stars) {
                let flicker = 0.7 + 0.3 * sin(frameCount * 0.04 + s.x);
                fill(220, 10, 100 * flicker, 85 * flicker);
                ellipse(s.x, s.y, s.r, s.r);
            }

            // Re-enter 3D for terrain
            rotateZ(bankAngle);
            rotateX(0.44);

            // Terrain mesh
            let totalW = COLS * TILE_W;
            let totalD = ROWS * TILE_D;
            let offX = -totalW / 2;
            let offZ = -totalD * 0.3; // center forward

            // Build height grid
            let heights = [];
            for (let row = 0; row <= ROWS; row++) {
                heights[row] = [];
                for (let col = 0; col <= COLS; col++) {
                    let worldX = (col - COLS / 2) * TILE_W;
                    let worldZ = (row - ROWS * 0.3) * TILE_D;
                    heights[row][col] = getHeight(worldX * 0.1, worldZ * 0.1, t);
                }
            }

            noStroke();
            for (let row = 0; row < ROWS; row++) {
                beginShape(TRIANGLE_STRIP);
                for (let col = 0; col <= COLS; col++) {
                    let wx = (col - COLS / 2) * TILE_W;

                    for (let r = row; r <= row + 1; r++) {
                        let wz = (r - ROWS * 0.3) * TILE_D;
                        let h = heights[r][col];
                        // Fog: blend towards sky color with distance
                        let fogDist = r / ROWS;
                        let fogAlpha = map(fogDist, 0.1, 0.9, 100, 0);
                        let [hue, sat, bri, alp] = heightToColor(h);
                        // Darken far geometry
                        bri = lerp(bri * 0.3, bri, fogDist);
                        sat = lerp(sat * 0.2, sat, fogDist);
                        fill(hue, sat, bri, min(fogAlpha, 100));
                        vertex(wx, -h, wz);
                    }
                }
                endShape();
            }

            // Water plane
            fill(215, 72, 48, 70);
            let waterH = getHeight(0, 0, t) * 0 - AMP * 0.64;
            beginShape();
            vertex(-totalW / 2, waterH, offZ);
            vertex(totalW / 2, waterH, offZ);
            vertex(totalW / 2, waterH, offZ + totalD);
            vertex(-totalW / 2, waterH, offZ + totalD);
            endShape(CLOSE);

            // FPS
            resetMatrix();
            noStroke();
            fill(60, 0, 70);
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width/2 - 16, -height/2 + 16);

            textAlign(LEFT, TOP);
            fill(190, 50, 90);
            textSize(13);
            text('Noise Terrain — FBM Fly-Through', -width/2 + 16, -height/2 + 16);
        }
    </script>
</body>
</html>
