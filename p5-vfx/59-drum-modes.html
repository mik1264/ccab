<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circular Drum Vibration Modes</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#fps { position:fixed; top:12px; left:50%; transform:translateX(-50%); color:#0f0; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:5px; z-index:999; }
#info { position:fixed; top:12px; right:12px; color:#ccc; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:6px; z-index:999; line-height:1.7; }
#modeGrid {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  background: rgba(0,0,0,0.7);
  padding: 8px 12px;
  border-radius: 8px;
  z-index: 999;
}
#modeGrid button {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  color: #aaa;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-family: monospace;
  font-size: 11px;
}
#modeGrid button.active { background: rgba(80,200,255,0.2); border-color: #5cf; color: #5cf; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Mode (m=0, n=1)<br>J₀(α₀₁ · r/R)·cos(ωt)<br>α₀₁ ≈ 2.405</div>
<div id="modeGrid" id="modeGrid"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
// Bessel zeros J_m
const BESSEL_ZEROS = {
  0: [2.4048, 5.5201, 8.6537],
  1: [3.8317, 7.0156, 10.1735],
  2: [5.1356, 8.4172, 11.6198]
};

// Bessel J_m(x) approximation using power series / recurrence
function J0(x) {
  // Polynomial approximation (Abramowitz & Stegun)
  if (Math.abs(x) < 8) {
    let y = x * x;
    return 1 - y*(0.25 - y*(0.015625 - y*(4.340278e-4 - y*(6.781684e-6 - y*(6.781684e-8 - y*3.967059e-10)))));
    // better: use series
  }
  return Math.sqrt(2/(Math.PI*x)) * Math.cos(x - Math.PI/4);
}

function J1(x) {
  if (Math.abs(x) < 1e-10) return 0;
  if (Math.abs(x) < 8) {
    let y = x*x;
    let num = x*(0.5 - y*(0.0625 - y*(0.0026042 - y*(5.425347e-5 - y*(6.781684e-7 - y*5.235197e-9)))));
    return num;
  }
  return Math.sqrt(2/(Math.PI*x)) * Math.cos(x - 3*Math.PI/4);
}

function J2(x) {
  if (Math.abs(x) < 1e-10) return 0;
  return 2/x * J1(x) - J0(x);
}

function Jm(m, x) {
  if (m === 0) return J0(x);
  if (m === 1) return J1(x);
  if (m === 2) return J2(x);
  // Upward recurrence
  let jPrev = J0(x), jCurr = J1(x);
  for (let k = 1; k < m; k++) {
    let jNext = 2*k/x * jCurr - jPrev;
    jPrev = jCurr; jCurr = jNext;
  }
  return jCurr;
}

const MODES = [];
for (let m = 0; m < 3; m++)
  for (let n = 0; n < 3; n++)
    MODES.push({m, n, alpha: BESSEL_ZEROS[m][n]});

new p5(function(p) {
  let selMode = 0;
  let time = 0;
  let fpsDiv = document.getElementById('fps');
  let infoDiv = document.getElementById('info');
  let autoAngle = 0;

  // Perspective tilt
  const TILT = 0.48; // y compression for 3D effect
  const SHADE_DIR = {x: -0.6, y: -0.8}; // light direction

  let RES = 120; // render resolution
  let drumR; // radius of drum on screen

  p.setup = function() {
    let cnv = p.createCanvas(p.windowWidth, p.windowHeight);
    cnv.parent(document.body);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    drumR = Math.min(p.width, p.height) * 0.36;
    buildModeButtons();
  };

  function buildModeButtons() {
    let grid = document.getElementById('modeGrid');
    grid.innerHTML = '';
    MODES.forEach((md, i) => {
      let btn = document.createElement('button');
      btn.textContent = `(${md.m},${md.n+1})`;
      btn.className = i === selMode ? 'active' : '';
      btn.onclick = () => { selMode = i; refreshButtons(); };
      grid.appendChild(btn);
    });
  }

  function refreshButtons() {
    let btns = document.querySelectorAll('#modeGrid button');
    btns.forEach((b, i) => b.classList.toggle('active', i === selMode));
  }

  p.keyPressed = function() {
    let k = parseInt(p.key);
    if (!isNaN(k) && k >= 1 && k <= 9 && k-1 < MODES.length) {
      selMode = k-1;
      refreshButtons();
    }
    if (p.keyCode === p.RIGHT_ARROW) { selMode = (selMode+1) % MODES.length; refreshButtons(); }
    if (p.keyCode === p.LEFT_ARROW) { selMode = (selMode+MODES.length-1) % MODES.length; refreshButtons(); }
  };

  p.mousePressed = function() {
    selMode = (selMode+1) % MODES.length;
    refreshButtons();
  };

  p.draw = function() {
    p.background(0, 0, 6);

    let {m, n, alpha} = MODES[selMode];
    let omega = alpha * 0.022;
    let tCos = Math.cos(omega * time);

    let cx = p.width / 2;
    let cy = p.height / 2;

    // Render drum using point grid
    let step = drumR * 2 / RES;

    p.noStroke();
    for (let iy = 0; iy < RES; iy++) {
      for (let ix = 0; ix < RES; ix++) {
        let lx = (ix / (RES-1) - 0.5) * 2;  // -1..1
        let ly = (iy / (RES-1) - 0.5) * 2;  // -1..1
        let r = Math.sqrt(lx*lx + ly*ly);
        if (r > 1) continue;

        let theta = Math.atan2(ly, lx);
        let besselArg = alpha * r;
        let J = Jm(m, besselArg);
        let angPart = (m === 0) ? 1 : Math.cos(m * theta);
        let height = J * angPart * tCos;  // [-1, 1] range approx

        // 3D projection: tilt drum
        let sx = cx + lx * drumR;
        let sy = cy + ly * drumR * TILT - height * drumR * 0.28;

        // Color by height
        let t = p.constrain(height, -1, 1);
        let hue, sat, bri;
        if (t > 0) {
          hue = p.map(t, 0, 1, 200, 0);
          sat = 85;
          bri = p.map(t, 0, 1, 35, 100);
        } else {
          hue = p.map(-t, 0, 1, 200, 260);
          sat = 85;
          bri = p.map(-t, 0, 1, 35, 95);
        }

        // Lighting: approximate normal from neighboring heights
        let specular = Math.max(0, height) * 0.4;
        bri = p.constrain(bri + specular * 30, 0, 100);

        let sz = Math.max(step * 0.95, 1.5);
        p.fill(hue, sat, bri, 95);
        p.rect(sx, sy, sz * 1.05, sz * TILT * 1.05);
      }
    }

    // Draw rim (ellipse)
    p.noFill();
    p.stroke(0, 0, 50, 70);
    p.strokeWeight(2);
    p.ellipse(cx, cy, drumR*2, drumR*2*TILT);

    time++;

    // Auto-cycle mode every 300 frames
    if (time % 420 === 0) {
      selMode = (selMode+1) % MODES.length;
      refreshButtons();
    }

    // Info
    let {m: cm, n: cn, alpha: ca} = MODES[selMode];
    infoDiv.innerHTML = `Mode (m=${cm}, n=${cn+1})<br>J${cm}(α·r/R)·cos(${cm > 0 ? cm+'θ,' : ''}ωt)<br>α ≈ ${ca.toFixed(3)}<br>ω = α · c/R`;

    if (p.frameCount % 20 === 0) fpsDiv.textContent = 'FPS: ' + Math.round(p.frameRate());
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    drumR = Math.min(p.width, p.height) * 0.36;
  };
});
</script>
</body>
</html>
