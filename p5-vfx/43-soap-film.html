<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soap Film | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

const sketch = (p) => {
    const COLS = 90;
    const ROWS = 60;
    let thickness; // 2D array, thickness in nm
    let velocity; // vertical velocity for oscillation
    let temp;     // swap buffer
    let filmLeft, filmTop, filmW, filmH, cellW, cellH;
    let drainAccum = 0;
    let time = 0;
    let fpsVal = 0;
    let filmImg;

    // Thin-film interference: map thickness (nm) to HSB color
    // Returns [h, s, b] in HSB 360/100/100
    function thicknessToHSB(nm) {
        // Multiple reflections create color bands
        const t = nm % 550; // approximate wavelength cycle

        let h, s, b;
        if (nm < 30) {
            // Very thin - silver/white
            h = 200; s = 5; b = 92;
        } else if (t < 80) {
            // Silver
            h = 200; s = 8; b = 88;
        } else if (t < 150) {
            // Yellow-green
            const f = (t - 80) / 70;
            h = p.lerp(60, 110, f); s = p.lerp(80, 70, f); b = p.lerp(88, 82, f);
        } else if (t < 230) {
            // Magenta
            const f = (t - 150) / 80;
            h = p.lerp(330, 300, f); s = p.lerp(75, 80, f); b = p.lerp(82, 80, f);
        } else if (t < 320) {
            // Cyan/Blue
            const f = (t - 230) / 90;
            h = p.lerp(190, 220, f); s = p.lerp(85, 80, f); b = p.lerp(85, 82, f);
        } else if (t < 400) {
            // Orange
            const f = (t - 320) / 80;
            h = p.lerp(25, 15, f); s = p.lerp(90, 85, f); b = p.lerp(85, 80, f);
        } else if (t < 480) {
            // Green
            const f = (t - 400) / 80;
            h = p.lerp(130, 155, f); s = p.lerp(75, 65, f); b = p.lerp(82, 80, f);
        } else {
            // Blue-violet
            const f = (t - 480) / 70;
            h = p.lerp(250, 280, f); s = p.lerp(80, 60, f); b = p.lerp(80, 75, f);
        }
        return [h, s, b];
    }

    p.setup = () => {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.colorMode(p.HSB, 360, 100, 100, 100);
        p.frameRate(60);
        init();
    };

    function init() {
        filmW = p.width * 0.52;
        filmH = p.height * 0.72;
        filmLeft = (p.width - filmW) / 2;
        filmTop = p.height * 0.1;
        cellW = filmW / COLS;
        cellH = filmH / ROWS;

        thickness = [];
        velocity = [];
        temp = [];
        for (let r = 0; r < ROWS; r++) {
            thickness[r] = [];
            velocity[r] = [];
            temp[r] = [];
            for (let c = 0; c < COLS; c++) {
                // Gradient from top (thin) to bottom (thick) + noise
                const base = p.lerp(40, 520, r / (ROWS - 1));
                const noise = (Math.random() - 0.5) * 30;
                thickness[r][c] = base + noise;
                velocity[r][c] = 0;
                temp[r][c] = 0;
            }
        }
        filmImg = p.createImage(COLS, ROWS);
    }

    function updateFilm() {
        time += 1 / 60;

        // Gravity drainage: thickness flows downward
        drainAccum += 0.55; // nm per frame average drain
        const drainRate = 0.28;

        // Wave oscillation of frame (top and bottom wiggle a bit)
        const wobbleAmp = 12;
        const wobbleFreq = 0.7;

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                // Diffusion for surface tension smoothing
                let sumT = 0, n = 0;
                if (r > 0) { sumT += thickness[r-1][c]; n++; }
                if (r < ROWS-1) { sumT += thickness[r+1][c]; n++; }
                if (c > 0) { sumT += thickness[r][c-1]; n++; }
                if (c < COLS-1) { sumT += thickness[r][c+1]; n++; }
                const avgT = n > 0 ? sumT / n : thickness[r][c];

                // Wave from oscillating frame
                const edgeFactor = Math.min(r / 6, (ROWS - 1 - r) / 6, c / 6, (COLS - 1 - c) / 6, 1);
                const wave = Math.sin(time * wobbleFreq * p.TWO_PI + r * 0.2 + c * 0.15) * wobbleAmp * edgeFactor;
                const waveVert = Math.sin(time * wobbleFreq * 0.73 * p.TWO_PI + r * 0.31 - c * 0.12) * wobbleAmp * 0.6 * edgeFactor;

                // Gravity drain (more drain at top of film, less at bottom)
                const drainFactor = p.map(r, 0, ROWS - 1, 1.5, 0.1);
                const drain = drainRate * drainFactor;

                temp[r][c] = thickness[r][c] + (avgT - thickness[r][c]) * 0.04 + wave + waveVert - drain;

                // Clamp
                temp[r][c] = p.constrain(temp[r][c], 15, 700);
            }
        }

        // Swap
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                thickness[r][c] = temp[r][c];
            }
        }
    }

    p.draw = () => {
        p.background(14, 0, 7, 100);

        updateFilm();

        // Draw film into pixel image for speed
        filmImg.loadPixels();
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const nm = thickness[r][c];
                const [h, s, b] = thicknessToHSB(nm);
                // Convert HSB to RGB manually since p5 pixel arrays use RGB
                const rgb = hsbToRgb(h, s / 100, b / 100);
                const idx = (r * COLS + c) * 4;
                filmImg.pixels[idx] = rgb[0];
                filmImg.pixels[idx+1] = rgb[1];
                filmImg.pixels[idx+2] = rgb[2];
                filmImg.pixels[idx+3] = 210;
            }
        }
        filmImg.updatePixels();

        // Draw scaled film
        p.noSmooth();
        p.image(filmImg, filmLeft, filmTop, filmW, filmH);
        p.smooth();

        // Shimmer overlay using ADD blend
        p.drawingContext.globalCompositeOperation = 'screen';
        for (let i = 0; i < 3; i++) {
            const shimX = filmLeft + filmW * (0.25 + i * 0.25);
            const shimY = filmTop + filmH * (0.2 + Math.sin(time * 1.1 + i) * 0.15);
            const shimR = filmH * 0.08;
            const shimAlpha = 6 + Math.sin(time * 2 + i * 2.1) * 3;
            p.noStroke();
            p.fill(40, 30, 100, shimAlpha);
            p.ellipse(shimX, shimY, shimR * 2, shimR * 2);
        }
        p.drawingContext.globalCompositeOperation = 'source-over';

        // Wire frame border
        drawWireFrame();

        // Labels
        p.fill(0, 0, 70, 70);
        p.noStroke();
        p.textFont('monospace');
        p.textSize(11);
        p.textAlign(p.LEFT, p.CENTER);
        p.text('thin', filmLeft - 34, filmTop + 16);
        p.textAlign(p.LEFT, p.CENTER);
        p.text('thick', filmLeft - 40, filmTop + filmH - 12);

        // Arrow indicating drain direction
        p.stroke(0, 0, 50, 60);
        p.strokeWeight(1);
        p.line(filmLeft - 18, filmTop + 30, filmLeft - 18, filmTop + filmH - 30);
        p.fill(0, 0, 50, 60);
        p.noStroke();
        p.triangle(filmLeft - 18, filmTop + filmH - 24,
                   filmLeft - 23, filmTop + filmH - 38,
                   filmLeft - 13, filmTop + filmH - 38);

        // FPS
        fpsVal = p.lerp(fpsVal, p.frameRate(), 0.05);
        p.fill(0, 0, 85, 90);
        p.noStroke();
        p.textFont('monospace');
        p.textSize(12);
        p.textAlign(p.RIGHT, p.TOP);
        p.text(Math.round(fpsVal) + ' fps', p.width - 14, 14);
    };

    function drawWireFrame() {
        const cr = 3; // corner radius visual
        // Wire frame - two vertical posts + top/bottom horizontal bars
        p.stroke(0, 0, 75, 80);
        p.strokeWeight(2.5);
        p.noFill();

        // Top bar
        p.line(filmLeft - 8, filmTop - 6, filmLeft + filmW + 8, filmTop - 6);
        // Bottom bar
        p.line(filmLeft - 8, filmTop + filmH + 6, filmLeft + filmW + 8, filmTop + filmH + 6);
        // Left post
        p.line(filmLeft - 8, filmTop - 6, filmLeft - 8, filmTop + filmH + 6);
        // Right post
        p.line(filmLeft + filmW + 8, filmTop - 6, filmLeft + filmW + 8, filmTop + filmH + 6);

        // Corner accents
        p.stroke(0, 0, 90, 90);
        p.strokeWeight(3);
        const corners = [
            [filmLeft - 8, filmTop - 6],
            [filmLeft + filmW + 8, filmTop - 6],
            [filmLeft - 8, filmTop + filmH + 6],
            [filmLeft + filmW + 8, filmTop + filmH + 6]
        ];
        for (let [cx, cy] of corners) {
            p.ellipse(cx, cy, 7, 7);
        }
    }

    // Convert HSB (0-360, 0-1, 0-1) to RGB (0-255)
    function hsbToRgb(h, s, b) {
        let r, g, bl;
        if (s === 0) { r = g = bl = b * 255; return [r, g, bl]; }
        const i = Math.floor(h / 60) % 6;
        const f = h / 60 - Math.floor(h / 60);
        const p2 = b * (1 - s);
        const q = b * (1 - f * s);
        const t = b * (1 - (1 - f) * s);
        switch(i) {
            case 0: r=b; g=t; bl=p2; break;
            case 1: r=q; g=b; bl=p2; break;
            case 2: r=p2; g=b; bl=t; break;
            case 3: r=p2; g=q; bl=b; break;
            case 4: r=t; g=p2; bl=b; break;
            case 5: r=b; g=p2; bl=q; break;
        }
        return [Math.round(r*255), Math.round(g*255), Math.round(bl*255)];
    }

    p.mousePressed = () => {
        // Disturb film at mouse position
        const c = Math.floor((p.mouseX - filmLeft) / cellW);
        const r = Math.floor((p.mouseY - filmTop) / cellH);
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
            for (let dr = -4; dr <= 4; dr++) {
                for (let dc = -4; dc <= 4; dc++) {
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 1 && nr < ROWS-1 && nc >= 1 && nc < COLS-1) {
                        const dist = Math.sqrt(dr*dr+dc*dc);
                        thickness[nr][nc] += (4 - dist) * 18;
                    }
                }
            }
        }
    };

    p.windowResized = () => {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        init();
    };
};

new p5(sketch);
    </script>
</body>
</html>
