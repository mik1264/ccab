<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rope Bridge | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

const sketch = (p) => {
    const NODES = 42;
    const ITERS = 24;
    const GRAVITY = 0.22;
    const DAMPING = 0.993;
    const BOUNCE = 0.35;
    const ROPE_SAG = 0.35; // catenary sag factor

    let topNodes = [], botNodes = [];
    let topPrev = [], botPrev = [];
    let topRestLen = [], botRestLen = [];
    let weights = [];       // user-dropped weights
    let walker = null;      // auto-walking person
    let windTime = 0;
    let fpsVal = 0;
    let bridgeLeft, bridgeRight, bridgeY;

    function initBridge() {
        topNodes = []; botNodes = [];
        topPrev = []; botPrev = [];
        topRestLen = []; botRestLen = [];

        const span = bridgeRight - bridgeLeft;
        const slotW = span / (NODES - 1);
        const ropeSep = 34;

        for (let i = 0; i < NODES; i++) {
            const t = i / (NODES - 1);
            // Catenary shape: y offset = sag * 4 * t * (1-t)
            const sag = p.height * ROPE_SAG * 4 * t * (1 - t);
            const x = bridgeLeft + t * span;
            const topY = bridgeY - ropeSep / 2 + sag;
            const botY = bridgeY + ropeSep / 2 + sag;

            topNodes.push({ x, y: topY });
            botNodes.push({ x, y: botY });
            topPrev.push({ x, y: topY });
            botPrev.push({ x, y: botY });
        }

        // Rest lengths
        for (let i = 0; i < NODES - 1; i++) {
            topRestLen.push(p.dist(topNodes[i].x, topNodes[i].y, topNodes[i+1].x, topNodes[i+1].y));
            botRestLen.push(p.dist(botNodes[i].x, botNodes[i].y, botNodes[i+1].x, botNodes[i+1].y));
        }
    }

    class Walker {
        constructor() {
            this.t = 0;       // 0 to 1 across bridge
            this.speed = 0.0025 + Math.random() * 0.001;
            this.mass = 14 + Math.random() * 10;
            this.dir = 1;
            this.y = 0;
            this.bobPhase = 0;
        }

        update() {
            this.t += this.speed * this.dir;
            this.bobPhase += 0.25;
            if (this.t >= 1) { this.dir = -1; }
            if (this.t <= 0) { this.dir = 1; }
        }

        applyWeight() {
            const idx = Math.round(this.t * (NODES - 1));
            if (idx >= 0 && idx < NODES) {
                const spread = 3;
                for (let di = -spread; di <= spread; di++) {
                    const ni = p.constrain(idx + di, 1, NODES - 2);
                    const f = p.map(Math.abs(di), 0, spread, 1, 0.1);
                    if (!topNodes[ni].pinned) topNodes[ni].y += this.mass * f * 0.04;
                    if (!botNodes[ni].pinned) botNodes[ni].y += this.mass * f * 0.04;
                }
            }
        }

        getPos() {
            const idx = this.t * (NODES - 1);
            const i0 = Math.floor(idx);
            const i1 = Math.min(i0 + 1, NODES - 1);
            const frac = idx - i0;
            const bx = p.lerp(botNodes[i0].x, botNodes[i1].x, frac);
            const by = p.lerp(botNodes[i0].y, botNodes[i1].y, frac);
            return { x: bx, y: by };
        }

        draw() {
            const pos = this.getPos();
            const bob = Math.sin(this.bobPhase) * 1.5;
            const wx = pos.x;
            const wy = pos.y - 18 + bob;

            // Body
            p.noStroke();
            p.fill(30, 60, 80, 90);
            p.ellipse(wx, wy + 4, 10, 16); // torso
            p.fill(25, 40, 90, 95);
            p.ellipse(wx, wy - 6, 10, 10); // head

            // Legs (animated)
            const legSwing = Math.sin(this.bobPhase * 2) * 5;
            p.stroke(30, 50, 70, 80);
            p.strokeWeight(2);
            p.line(wx, wy + 10, wx - 3 + legSwing, wy + 20);
            p.line(wx, wy + 10, wx + 3 - legSwing, wy + 20);
        }
    }

    class Weight {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.prevX = x;
            this.prevY = y - 2;
            this.r = 9 + Math.random() * 6;
            this.mass = this.r * 1.4;
            this.onBridge = false;
            this.bridgeIdx = -1;
            this.hue = Math.random() * 360;
        }

        update() {
            const vx = (this.x - this.prevX) * DAMPING;
            const vy = (this.y - this.prevY) * DAMPING;
            this.prevX = this.x;
            this.prevY = this.y;
            this.x += vx;
            this.y += vy + GRAVITY * 1.5;

            // Find nearest bridge segment to land on
            this.onBridge = false;
            for (let i = 0; i < NODES - 1; i++) {
                // Check against bottom rope segment
                const ax = botNodes[i].x, ay = botNodes[i].y;
                const bx = botNodes[i+1].x, by2 = botNodes[i+1].y;
                if (this.x >= ax && this.x <= bx) {
                    const t = (this.x - ax) / (bx - ax);
                    const bridgeSurfY = p.lerp(ay, by2, t) - 8;
                    if (this.y > bridgeSurfY && this.y < bridgeSurfY + 20) {
                        this.y = bridgeSurfY;
                        this.prevY = this.y + vy * BOUNCE;
                        this.onBridge = true;
                        this.bridgeIdx = i;

                        // Press bridge down
                        const ni = Math.round(t + i);
                        const spread = 2;
                        for (let di = -spread; di <= spread; di++) {
                            const nni = p.constrain(ni + di, 1, NODES - 2);
                            const f = p.map(Math.abs(di), 0, spread, 0.6, 0.05);
                            botNodes[nni].y += this.mass * f * 0.03;
                            topNodes[nni].y += this.mass * f * 0.015;
                        }
                        break;
                    }
                }
            }

            // Floor
            if (this.y > p.height - 20) {
                this.y = p.height - 20;
                this.prevY = this.y + vy * BOUNCE;
            }
        }

        draw() {
            p.noStroke();
            // Shadow
            p.fill(0, 0, 0, 30);
            p.ellipse(this.x + 3, this.y + this.r + 2, this.r * 2, this.r * 0.5);
            // Ball
            for (let r2 = this.r; r2 >= 0; r2 -= 2) {
                const a = p.map(r2, 0, this.r, 90, 15);
                p.fill(this.hue, 80, 90, a);
                p.ellipse(this.x, this.y, r2 * 2, r2 * 2);
            }
            p.fill(this.hue, 20, 100, 70);
            p.ellipse(this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.5, this.r * 0.5);
        }
    }

    function verletStep() {
        windTime += 0.015;
        const wind = Math.sin(windTime * p.TWO_PI * 0.3) * 0.12 +
                     Math.sin(windTime * p.TWO_PI * 0.7) * 0.06;

        const updateArr = (nodes, prevNodes) => {
            for (let i = 1; i < NODES - 1; i++) {
                const n = nodes[i], pn = prevNodes[i];
                const vx = (n.x - pn.x) * DAMPING + wind;
                const vy = (n.y - pn.y) * DAMPING;
                pn.x = n.x; pn.y = n.y;
                n.x += vx;
                n.y += vy + GRAVITY;
            }
        };

        updateArr(topNodes, topPrev);
        updateArr(botNodes, botPrev);

        // Pin endpoints
        const pinEndpoints = (nodes, prevNodes) => {
            nodes[0].x = bridgeLeft; nodes[0].y = bridgeY - 17;
            prevNodes[0].x = bridgeLeft; prevNodes[0].y = bridgeY - 17;
            nodes[NODES-1].x = bridgeRight; nodes[NODES-1].y = bridgeY - 17;
            prevNodes[NODES-1].x = bridgeRight; prevNodes[NODES-1].y = bridgeY - 17;
        };
        pinEndpoints(topNodes, topPrev);
        pinEndpoints(botNodes, botPrev);

        // Constraint iterations
        for (let iter = 0; iter < ITERS; iter++) {
            for (let i = 0; i < NODES - 1; i++) {
                solveConstraint(topNodes[i], topNodes[i+1], topRestLen[i]);
                solveConstraint(botNodes[i], botNodes[i+1], botRestLen[i]);
                // Vertical slat constraint (light - keeps top and bottom ropes aligned)
                if (i > 0 && i < NODES - 1) {
                    solveConstraint(topNodes[i], botNodes[i], 34, 0.15);
                }
            }
            // Re-pin after each iteration
            pinEndpoints(topNodes, topPrev);
            pinEndpoints(botNodes, botPrev);
        }
    }

    function solveConstraint(a, b, restLen, stiffness = 0.5) {
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
        const diff = (dist - restLen) / dist * stiffness;
        const isPinA = a === topNodes[0] || a === topNodes[NODES-1] || a === botNodes[0] || a === botNodes[NODES-1];
        const isPinB = b === topNodes[0] || b === topNodes[NODES-1] || b === botNodes[0] || b === botNodes[NODES-1];
        if (!isPinA) { a.x += dx * diff * 0.5; a.y += dy * diff * 0.5; }
        if (!isPinB) { b.x -= dx * diff * 0.5; b.y -= dy * diff * 0.5; }
    }

    p.setup = () => {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.colorMode(p.HSB, 360, 100, 100, 100);
        p.frameRate(60);
        bridgeLeft = p.width * 0.08;
        bridgeRight = p.width * 0.92;
        bridgeY = p.height * 0.42;
        initBridge();
        walker = new Walker();
    };

    p.draw = () => {
        // Misty dark gradient background
        p.background(220, 25, 7, 100);
        drawBackground();

        // Update physics
        verletStep();
        walker.update();
        walker.applyWeight();
        for (let w of weights) w.update();

        // Draw everything
        drawBridge();
        for (let w of weights) w.draw();
        walker.draw();

        // FPS
        fpsVal = p.lerp(fpsVal, p.frameRate(), 0.05);
        p.fill(0, 0, 85, 90);
        p.noStroke();
        p.textFont('monospace');
        p.textSize(12);
        p.textAlign(p.RIGHT, p.TOP);
        p.text(Math.round(fpsVal) + ' fps', p.width - 14, 14);

        // Hint
        p.fill(0, 0, 55, 60);
        p.textSize(11);
        p.textAlign(p.CENTER, p.BOTTOM);
        p.text('Click to drop weights', p.width / 2, p.height - 4);
    };

    function drawBackground() {
        // Misty cliffs on sides
        p.noStroke();
        const cliffH = p.height * 0.65;

        // Left cliff
        p.fill(220, 20, 14, 100);
        p.rect(0, bridgeY - 20, bridgeLeft + 10, cliffH);
        // Right cliff
        p.fill(220, 20, 14, 100);
        p.rect(bridgeRight - 10, bridgeY - 20, p.width - bridgeRight + 10, cliffH);

        // Cliff edges
        p.fill(220, 15, 22, 100);
        p.rect(0, bridgeY - 20, bridgeLeft + 10, 30);
        p.rect(bridgeRight - 10, bridgeY - 20, p.width - bridgeRight + 10, 30);

        // Anchor stones
        const stoneColor = [220, 18, 28];
        p.fill(stoneColor[0], stoneColor[1], stoneColor[2], 100);
        p.rect(bridgeLeft - 20, bridgeY - 80, 50, 65, 4);
        p.rect(bridgeRight - 30, bridgeY - 80, 50, 65, 4);

        // Mist
        for (let i = 0; i < 4; i++) {
            const mY = p.height * 0.6 + i * p.height * 0.1;
            p.fill(210, 20, 30, p.map(i, 0, 3, 15, 5));
            p.rect(0, mY, p.width, p.height * 0.15);
        }
    }

    function drawBridge() {
        // Draw vertical slats
        for (let i = 1; i < NODES - 1; i += 2) {
            const t = topNodes[i], b = botNodes[i];
            p.stroke(25, 40, 38, 80);
            p.strokeWeight(2);
            p.line(t.x, t.y, b.x, b.y);
        }

        // Draw planks (horizontal)
        for (let i = 1; i < NODES - 1; i += 2) {
            const b1 = botNodes[i];
            const b2 = botNodes[Math.min(i + 1, NODES - 1)];
            const cx = (b1.x + b2.x) * 0.5;
            const cy = (b1.y + b2.y) * 0.5;
            const angle = Math.atan2(b2.y - b1.y, b2.x - b1.x);
            const plankW = p.dist(b1.x, b1.y, b2.x, b2.y) + 2;

            p.push();
            p.translate(cx, cy);
            p.rotate(angle);
            p.noStroke();
            p.fill(22, 35, 35, 90);
            p.rect(-plankW / 2, -5, plankW, 10, 1);
            p.fill(22, 25, 45, 70);
            p.rect(-plankW / 2, -5, plankW, 4, 1);
            p.pop();
        }

        // Draw ropes (top and bottom with thickness)
        const drawRope = (nodes, h, s, b, weight) => {
            p.noFill();
            // Glow
            p.stroke(h, s, b, 20);
            p.strokeWeight(weight + 4);
            p.beginShape();
            for (let i = 0; i < NODES; i++) p.vertex(nodes[i].x, nodes[i].y);
            p.endShape();
            // Main rope
            p.stroke(h, s, b, 88);
            p.strokeWeight(weight);
            p.beginShape();
            for (let i = 0; i < NODES; i++) p.vertex(nodes[i].x, nodes[i].y);
            p.endShape();
            // Highlight
            p.stroke(h, s * 0.5, b + 20, 45);
            p.strokeWeight(weight * 0.35);
            p.beginShape();
            for (let i = 0; i < NODES; i++) p.vertex(nodes[i].x, nodes[i].y - 1);
            p.endShape();
        };

        drawRope(topNodes, 28, 55, 52, 4);
        drawRope(botNodes, 28, 55, 52, 4);

        // Anchor ropes to cliff walls (visual only)
        p.stroke(28, 50, 50, 70);
        p.strokeWeight(3);
        p.line(bridgeLeft - 18, bridgeY - 55, topNodes[0].x, topNodes[0].y);
        p.line(bridgeRight + 18, bridgeY - 55, topNodes[NODES-1].x, topNodes[NODES-1].y);
        p.line(bridgeLeft - 18, bridgeY - 55, botNodes[0].x, botNodes[0].y);
        p.line(bridgeRight + 18, bridgeY - 55, botNodes[NODES-1].x, botNodes[NODES-1].y);
    }

    p.mousePressed = () => {
        if (p.mouseY > 60 && weights.length < 18) {
            weights.push(new Weight(p.mouseX, p.mouseY));
        }
    };

    p.windowResized = () => {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        bridgeLeft = p.width * 0.08;
        bridgeRight = p.width * 0.92;
        bridgeY = p.height * 0.42;
        weights = [];
        initBridge();
        walker = new Walker();
    };
};

new p5(sketch);
    </script>
</body>
</html>
