<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koch Snowflake Color Waves</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#8ff; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#aff; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:6px; line-height:1.7; z-index:999; pointer-events:none; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Koch Snowflake — Generation 0</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let fpsArr = [], lastTime = 0;
  let maxGen = 6;
  let cachedVerts = {}; // gen -> vertex array

  function kochSegment(ax, ay, bx, by) {
    // Divide segment into Koch curve
    let dx = bx - ax, dy = by - ay;
    // 1/3 and 2/3 points
    let x1 = ax + dx/3, y1 = ay + dy/3;
    let x2 = ax + 2*dx/3, y2 = ay + 2*dy/3;
    // Peak: rotate 60° counterclockwise
    let mx = (ax + bx) / 2 - (dy * Math.sqrt(3) / 6);
    let my = (ay + by) / 2 + (dx * Math.sqrt(3) / 6);
    return [[ax, ay], [x1, y1], [mx, my], [x2, y2], [bx, by]];
  }

  function kochSnowflake(gen) {
    // Start with equilateral triangle
    let r = Math.min(p.width, p.height) * 0.38;
    let cx = p.width / 2, cy = p.height / 2;

    let pts = [];
    for (let i = 0; i < 3; i++) {
      let a = (Math.PI * 2 * i / 3) - Math.PI / 6;
      pts.push([cx + r * Math.cos(a), cy + r * Math.sin(a)]);
    }

    let segments = [];
    for (let i = 0; i < 3; i++) {
      segments.push([pts[i], pts[(i+1) % 3]]);
    }

    for (let g = 0; g < gen; g++) {
      let newSegs = [];
      for (let [a, b] of segments) {
        let sub = kochSegment(a[0], a[1], b[0], b[1]);
        for (let k = 0; k < sub.length - 1; k++) {
          newSegs.push([sub[k], sub[k+1]]);
        }
      }
      segments = newSegs;
    }

    // Build vertex array
    let verts = [];
    for (let [a, b] of segments) verts.push(a);
    verts.push(segments[segments.length - 1][1]);
    return verts;
  }

  function buildAllGens() {
    for (let g = 0; g <= maxGen; g++) {
      cachedVerts[g] = kochSnowflake(g);
    }
  }

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.blendMode(p.ADD);
    buildAllGens();
  };

  function hsbToRgbStr(h, s, b, a) {
    h = ((h % 360) + 360) % 360;
    s /= 100; b /= 100; a /= 100;
    let c = b * s, x2 = c * (1 - Math.abs((h / 60) % 2 - 1)), m = b - c;
    let r, g, bv;
    let hi = Math.floor(h / 60);
    if (hi === 0) { r=c; g=x2; bv=0; }
    else if (hi === 1) { r=x2; g=c; bv=0; }
    else if (hi === 2) { r=0; g=c; bv=x2; }
    else if (hi === 3) { r=0; g=x2; bv=c; }
    else if (hi === 4) { r=x2; g=0; bv=c; }
    else { r=c; g=0; bv=x2; }
    return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((bv+m)*255)];
  }

  p.draw = function() {
    let now = performance.now();
    let dt = now - lastTime; lastTime = now;
    if (dt > 0) {
      fpsArr.push(1000 / dt);
      if (fpsArr.length > 30) fpsArr.shift();
      document.getElementById('fps').textContent = 'FPS: ' + (fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length).toFixed(1);
    }

    p.background(0, 0, 0);

    let t = p.millis() / 1000;
    // Animate generation: 0 → maxGen → 0
    let genCycle = (maxGen + 1) * 2;
    let genPhase = (t * 0.3) % genCycle;
    let genFloat;
    if (genPhase < maxGen + 1) {
      genFloat = genPhase;
    } else {
      genFloat = genCycle - genPhase;
    }
    let gen = Math.min(maxGen, Math.floor(genFloat));
    let frac = genFloat - Math.floor(genFloat);

    let verts = cachedVerts[gen] || cachedVerts[maxGen];
    let n = verts.length;

    let waveSpeed = 120; // degrees per second

    // Draw with additive glow — multiple passes
    for (let pass = 0; pass < 3; pass++) {
      let sw = pass === 0 ? 2.0 : (pass === 1 ? 4.0 : 8.0);
      let alphaMult = pass === 0 ? 90 : (pass === 1 ? 30 : 10);
      p.strokeWeight(sw);
      p.noFill();

      p.beginShape();
      for (let i = 0; i < n; i++) {
        let posRatio = i / (n - 1);
        let hue = (posRatio * 360 + t * waveSpeed) % 360;
        let sat = 80;
        let bri = 90;
        p.stroke(hue, sat, bri, alphaMult);
        p.vertex(verts[i][0], verts[i][1]);
      }
      p.endShape(p.CLOSE);
    }

    // Partial snowflake for next gen during transition
    if (gen < maxGen && frac > 0.3 && cachedVerts[gen + 1]) {
      let nextVerts = cachedVerts[gen + 1];
      let showN = Math.floor(frac * nextVerts.length);
      if (showN > 1) {
        p.strokeWeight(1.0);
        p.noFill();
        p.beginShape();
        for (let i = 0; i < showN; i++) {
          let posRatio = i / nextVerts.length;
          let hue = (posRatio * 360 + t * waveSpeed) % 360;
          p.stroke(hue, 80, 80, 40);
          p.vertex(nextVerts[i][0], nextVerts[i][1]);
        }
        p.endShape();
      }
    }

    document.getElementById('info').innerHTML =
      'Koch Snowflake — Generation ' + gen + '<br>' +
      'Vertices: ' + n.toLocaleString() + '<br>' +
      'Color wave speed: ' + waveSpeed + '°/s<br>' +
      'Cycling gen 0→' + maxGen + '→0';
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    buildAllGens();
  };
});
</script>
</body>
</html>
