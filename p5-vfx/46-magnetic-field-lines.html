<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Field Lines 3D | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        // Magnetic dipole field: B = (3(m·r̂)r̂ - m) / r^3
        // Dipole moment m = [0,0,1] (along +Z)
        // We work in arbitrary units; scale factor gives nice visuals

        const NUM_LINES = 60;
        const STEPS = 300;
        const STEP_SIZE = 3.0;
        const MAX_DIST = 380;
        const MIN_DIST = 12;

        let fieldLines = [];
        let autoAngle = 0;

        // Compute B field at position (px,py,pz); dipole at origin, m=[0,0,1]
        function dipoleField(px, py, pz) {
            let r2 = px*px + py*py + pz*pz;
            if (r2 < 0.0001) return [0, 0, 0];
            let r = Math.sqrt(r2);
            let r3 = r2 * r;
            // m · r̂ = pz / r
            let mDotR = pz / r;
            // B = (3*(m·r̂)*r̂ - m) / r^3
            let bx = (3 * mDotR * px/r) / r3;
            let by = (3 * mDotR * py/r) / r3;
            let bz = (3 * mDotR * pz/r - 1.0) / r3;
            return [bx, by, bz];
        }

        function traceLine(sx, sy, sz, forward) {
            let pts = [];
            let x = sx, y = sy, z = sz;
            let dir = forward ? 1 : -1;
            for (let s = 0; s < STEPS; s++) {
                pts.push([x, y, z]);
                let [bx, by, bz] = dipoleField(x, y, z);
                let blen = Math.sqrt(bx*bx + by*by + bz*bz);
                if (blen < 1e-10) break;
                let scale = STEP_SIZE / blen;
                x += dir * bx * scale;
                y += dir * by * scale;
                z += dir * bz * scale;
                let dist = Math.sqrt(x*x + y*y + z*z);
                if (dist > MAX_DIST || dist < MIN_DIST) break;
            }
            return pts;
        }

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);

            // Trace field lines starting from near the north pole (+Z)
            // and spreading to cover latitudes from ~5° to ~85°
            let lineIdx = 0;
            for (let lat = 0; lat < NUM_LINES; lat++) {
                // Latitude angle from pole: from 5° to 85°
                let theta = map(lat, 0, NUM_LINES - 1, 5, 85) * PI / 180;
                // Azimuth: evenly spaced
                let phi = (lat / NUM_LINES) * TWO_PI;

                // Start near the north pole surface (radius 15)
                let R0 = 15;
                let sx = R0 * sin(theta) * cos(phi);
                let sy = R0 * sin(theta) * sin(phi);
                let sz = R0 * cos(theta);

                // Hue based on latitude: pole=arctic blue(210), equator=aurora green/violet(140-280)
                let hue = map(sin(theta), 0, 1, 210, 160);

                let pts = traceLine(sx, sy, sz, true);
                fieldLines.push({ pts, hue, lat: theta });
            }

            orbitControl(2, 2, 0.05);
        }

        function draw() {
            background(0, 0, 4);
            blendMode(ADD);

            autoAngle += 0.005;
            rotateY(autoAngle);
            rotateX(0.25);

            // Draw dipole as a glowing sphere at origin
            noStroke();
            // Outer glow layers
            fill(220, 70, 60, 15);
            sphere(28);
            fill(220, 60, 80, 25);
            sphere(20);
            fill(200, 40, 100, 60);
            sphere(13);
            fill(180, 20, 100, 100);
            sphere(9);

            // North pole indicator
            fill(200, 90, 100, 80);
            push();
            translate(0, 0, 22);
            sphere(4);
            pop();

            // South pole indicator
            fill(0, 80, 100, 80);
            push();
            translate(0, 0, -22);
            sphere(4);
            pop();

            // Axis line
            stroke(200, 50, 70, 40);
            strokeWeight(1);
            line(0, 0, -30, 0, 0, 30);

            // Draw field lines
            strokeWeight(1.3);
            for (let fl of fieldLines) {
                let pts = fl.pts;
                let len = pts.length;
                if (len < 2) continue;

                for (let i = 1; i < len; i++) {
                    let frac = i / len;
                    // Brighter toward the middle of the arc, dimmer at ends
                    let midFrac = 1 - Math.abs(frac - 0.5) * 2;
                    let bri = 40 + midFrac * 60;
                    let sat = 70 + midFrac * 25;
                    let alpha = 30 + midFrac * 55;

                    // Hue shifts slightly along line path for aurora shimmer
                    let hue = (fl.hue + frac * 40 - 20) % 360;
                    stroke(hue, sat, bri, alpha);

                    let p0 = pts[i-1], p1 = pts[i];
                    line(p0[0], p0[2], p0[1],
                         p1[0], p1[2], p1[1]);
                }
            }

            // FPS
            resetMatrix();
            blendMode(BLEND);
            fill(255, 0, 80, 90);
            noStroke();
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width/2 - 16, -height/2 + 16);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
