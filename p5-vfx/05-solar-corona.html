<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Corona | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const NUM_PARTICLES = 2000;
        const NUM_ARCS = 200;
        const SUN_RADIUS = 100;

        let particles = [];
        let arcs = [];
        let cx, cy;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
            pixelDensity(Math.min(pixelDensity(), 2));
            cx = width / 2;
            cy = height / 2;
            background(0, 0, 5);

            // Build magnetic field arcs
            for (let i = 0; i < NUM_ARCS; i++) {
                arcs.push(newArc());
            }

            // Build solar wind particles
            for (let i = 0; i < NUM_PARTICLES; i++) {
                particles.push(newParticle(true));
            }
        }

        function newArc() {
            // Angle on sun surface where arc starts
            let startAngle = random(TWO_PI);
            // Arc sweeps a random angular span before returning
            let span = random(PI * 0.3, PI * 0.9);
            // Peak height above sun surface
            let peakDist = random(SUN_RADIUS * 0.6, SUN_RADIUS * 2.8);
            // Phase offset for animation
            let phase = random(TWO_PI);
            let speed = random(0.003, 0.012);
            let progress = random(1.0);  // 0..1 drawing progress
            let hue = random(20, 55);
            return { startAngle, span, peakDist, phase, speed, progress, hue };
        }

        function newParticle(randomInit) {
            // Spawn on sun surface
            let angle = random(TWO_PI);
            let r = randomInit ? random(SUN_RADIUS, max(width, height) * 0.6) : SUN_RADIUS + random(4);
            let nx = cx + cos(angle) * r;
            let ny = cy + sin(angle) * r;
            return {
                x: nx,
                y: ny,
                angle: angle,
                r: r,
                speed: randomInit ? random(0.8, 3.5) : random(1.5, 4.0),
                hue: random(20, 60),
                alpha: randomInit ? random(30, 80) : 70,
                life: randomInit ? random(0, 200) : 200,
                maxLife: random(150, 300)
            };
        }

        function drawSun(pulse) {
            let r = SUN_RADIUS + pulse;

            // Outer glow layers (additive)
            blendMode(ADD);
            noStroke();
            for (let g = 8; g >= 1; g--) {
                let gr = r + g * 22;
                let alpha = map(g, 1, 8, 18, 4);
                let h = map(g, 1, 8, 45, 25);
                fill(h, 90, 100, alpha);
                ellipse(cx, cy, gr * 2, gr * 2);
            }

            // Core disc
            fill(50, 20, 100, 95);
            ellipse(cx, cy, r * 2, r * 2);

            // Inner bright core
            fill(45, 10, 100, 100);
            ellipse(cx, cy, r * 0.7 * 2, r * 0.7 * 2);
            fill(0, 0, 100, 80);
            ellipse(cx, cy, r * 0.3 * 2, r * 0.3 * 2);
        }

        function drawArcs(pulse) {
            blendMode(ADD);
            noFill();

            for (let arc of arcs) {
                arc.progress += arc.speed;
                if (arc.progress > 1.0) {
                    // Reset arc
                    arc.startAngle = random(TWO_PI);
                    arc.span = random(PI * 0.3, PI * 0.9);
                    arc.peakDist = random(SUN_RADIUS * 0.5, SUN_RADIUS * 2.5);
                    arc.speed = random(0.003, 0.012);
                    arc.progress = 0;
                    arc.hue = random(20, 55);
                }

                let r = SUN_RADIUS + pulse;
                let t = arc.progress;

                // Draw arc as bezier using parameterized steps
                // Start and end on sun surface, peak at midpoint
                let sa = arc.startAngle;
                let ea = arc.startAngle + arc.span;
                let sx = cx + cos(sa) * r;
                let sy = cy + sin(sa) * r;
                let ex = cx + cos(ea) * r;
                let ey = cy + sin(ea) * r;

                // Control point at midpoint angle, at peakDist from sun center
                let midAngle = (sa + ea) / 2;
                let cpDist = r + arc.peakDist;
                let cpx = cx + cos(midAngle) * cpDist;
                let cpy = cy + sin(midAngle) * cpDist;

                // Trace arc up to t using segmented bezier
                let steps = Math.max(2, Math.floor(t * 40));
                beginShape();
                for (let s = 0; s <= steps; s++) {
                    let u = (s / 40) * t;  // param from 0..t
                    // Quadratic bezier
                    let bx = (1 - u) * (1 - u) * sx + 2 * (1 - u) * u * cpx + u * u * ex;
                    let by = (1 - u) * (1 - u) * sy + 2 * (1 - u) * u * cpy + u * u * ey;

                    let ageFrac = s / steps;
                    // Head brighter
                    let headness = s === steps ? 1.0 : ageFrac * 0.8;
                    let h = map(ageFrac, 0, 1, arc.hue, arc.hue + 20 > 60 ? 55 : arc.hue + 20);
                    let sat = map(headness, 0, 1, 80, 30);
                    let bri = map(headness, 0, 1, 70, 100);
                    let al = map(ageFrac, 0, 1, 15, 50);
                    stroke(h, sat, bri, al);
                    vertex(bx, by);
                }
                endShape();
            }
        }

        function updateParticles() {
            blendMode(ADD);
            noFill();
            strokeWeight(1.2);

            for (let p of particles) {
                p.life--;
                if (p.life <= 0 || p.r > max(width, height) * 0.7) {
                    // Respawn on sun surface
                    let angle = random(TWO_PI);
                    p.x = cx + cos(angle) * (SUN_RADIUS + 5);
                    p.y = cy + sin(angle) * (SUN_RADIUS + 5);
                    p.angle = angle;
                    p.r = SUN_RADIUS + 5;
                    p.speed = random(1.5, 4.0);
                    p.hue = random(20, 60);
                    p.life = random(150, 300);
                    p.alpha = 70;
                    continue;
                }

                // Compute angle from center
                let dx = p.x - cx;
                let dy = p.y - cy;
                p.r = sqrt(dx * dx + dy * dy);
                p.angle = atan2(dy, dx);

                // Perlin noise deflection for solar wind texture
                let nx = p.x * 0.003;
                let ny = p.y * 0.003;
                let noiseVal = noise(nx, ny, frameCount * 0.005);
                let deflect = map(noiseVal, 0, 1, -0.3, 0.3);

                // Radial outward velocity + slight angular deflection
                let speed = p.speed * (1.0 + 0.3 / max(p.r / SUN_RADIUS, 0.5));
                let vx = cos(p.angle + deflect) * speed;
                let vy = sin(p.angle + deflect) * speed;

                let px = p.x;
                let py = p.y;
                p.x += vx;
                p.y += vy;

                // Fade near edge
                let edgeFade = map(p.r, SUN_RADIUS, max(width, height) * 0.6, 100, 0);
                let al = p.alpha * (edgeFade / 100) * map(p.life, 0, 30, 0, 1, true);
                stroke(p.hue, 85, 100, al);
                line(px, py, p.x, p.y);
            }
            strokeWeight(1);
        }

        function draw() {
            // Semi-transparent fade
            blendMode(BLEND);
            fill(0, 0, 5, 18);
            noStroke();
            rect(0, 0, width, height);

            let pulse = sin(frameCount * 0.04) * 6 + cos(frameCount * 0.027) * 4;

            // Draw in order: particles behind, then arcs, then sun on top
            updateParticles();
            drawArcs(pulse);
            drawSun(pulse);

            // Title
            blendMode(BLEND);
            noStroke();
            fill(40, 70, 100, 70);
            textSize(18);
            textAlign(CENTER, BOTTOM);
            textFont('monospace');
            text('Solar Corona', width / 2, height - 20);

            // FPS
            fill(0, 0, 80, 60);
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width - 16, 16);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            cx = width / 2;
            cy = height / 2;
            background(0, 0, 5);
        }
    </script>
</body>
</html>
