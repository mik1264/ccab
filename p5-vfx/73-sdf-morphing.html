<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDF Morphing Shapes | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        // Shape cycle: sphere → torus → box → cylinder → sphere
        const SHAPES = ['Sphere', 'Torus', 'Box', 'Cylinder'];
        const CYCLE_FRAMES = 180; // 3 seconds each
        let shapeIdx = 0;
        let nextIdx = 1;
        let morphT = 0;

        // Hue cycles
        let globalHue = 0;

        // Particle ring system for glow
        let rings = [];
        const NUM_RINGS = 5;

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);
            // Orbital rings
            for (let i = 0; i < NUM_RINGS; i++) {
                rings.push({
                    radius: 120 + i * 40,
                    tilt: random(PI),
                    speed: random(0.003, 0.008) * (random() > 0.5 ? 1 : -1),
                    hueOff: i * 72
                });
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        function drawSphere(r, detail) {
            noStroke();
            sphere(r, detail, detail);
        }

        function drawTorus(r, tube, detail) {
            noStroke();
            torus(r, tube, detail, detail);
        }

        function drawBox(s, detail) {
            noStroke();
            box(s, s, s);
        }

        function drawCylinder(r, h, detail) {
            noStroke();
            cylinder(r, h, detail, 1, true, true);
        }

        // Draw shape by index
        function drawShape(idx, t_lerp, fromIdx) {
            // Lerp parameters
            let sphereR = 110;
            let torusR = 90, torusTube = 38;
            let boxS = 155;
            let cylR = 75, cylH = 160;
            let detail = 36;

            // Main shape: cross-dissolve via transparency
            // We draw "from" shape fading out, "to" shape fading in
            let alpha1 = (1 - t_lerp) * 100;
            let alpha2 = t_lerp * 100;

            push();
            // Hue for current phase
            let h1 = (globalHue) % 360;
            let h2 = (globalHue + 40) % 360;

            // From shape
            if (alpha1 > 1) {
                fill(h1, 80, 90, alpha1);
                specularMaterial(h1, 60, 100);
                if (fromIdx === 0) drawSphere(sphereR, detail);
                else if (fromIdx === 1) drawTorus(torusR, torusTube, detail);
                else if (fromIdx === 2) drawBox(boxS, detail);
                else drawCylinder(cylR, cylH, detail);
            }
            pop();

            // To shape
            push();
            if (alpha2 > 1) {
                fill(h2, 75, 95, alpha2);
                specularMaterial(h2, 50, 100);
                if (idx === 0) drawSphere(sphereR + lerp(20, 0, t_lerp), detail);
                else if (idx === 1) drawTorus(torusR, lerp(5, torusTube, t_lerp), detail);
                else if (idx === 2) drawBox(lerp(20, boxS, t_lerp), detail);
                else drawCylinder(lerp(10, cylR, t_lerp), lerp(20, cylH, t_lerp), detail);
            }
            pop();

            // Wireframe overlay of next shape (glow shell)
            push();
            noFill();
            stroke(h2, 60, 100, 35 * t_lerp);
            strokeWeight(0.5);
            let ws = (idx === 0) ? sphereR + 14 : (idx === 1) ? torusR + 10 : (idx === 2) ? boxS + 14 : cylR + 10;
            if (idx === 0) sphere(ws, 12, 12);
            else if (idx === 1) torus(torusR + 12, torusTube + 6, 14, 14);
            else if (idx === 2) box(boxS + 16, boxS + 16, boxS + 16);
            else cylinder(cylR + 12, cylH + 16, 14, 1, true, true);
            pop();
        }

        function draw() {
            background(240, 30, 5);

            // Advance morph
            morphT += 1 / CYCLE_FRAMES;
            if (morphT >= 1) {
                morphT = 0;
                shapeIdx = nextIdx;
                nextIdx = (nextIdx + 1) % SHAPES.length;
            }

            globalHue = (frameCount * 0.5) % 360;

            orbitControl(2, 2, 0.1);

            // Lighting
            ambientLight(0, 0, 12);
            directionalLight(
                color(globalHue, 60, 100),
                0.8, -0.6, -0.5
            );
            directionalLight(
                color((globalHue + 180) % 360, 50, 80),
                -0.6, 0.4, 0.5
            );
            pointLight(
                color((globalHue + 90) % 360, 80, 100),
                sin(frameCount * 0.02) * 200, -150, cos(frameCount * 0.02) * 200
            );

            // Auto rotation
            rotateY(frameCount * 0.007);
            rotateX(sin(frameCount * 0.004) * 0.25);

            // Main morphing shape
            drawShape(nextIdx, morphT, shapeIdx);

            // Orbital rings
            for (let i = 0; i < rings.length; i++) {
                let r = rings[i];
                r.angle = (r.angle || 0) + r.speed;
                push();
                rotateX(r.tilt);
                rotateY(r.angle);
                let rh = (globalHue + r.hueOff) % 360;
                noFill();
                stroke(rh, 90, 100, 55);
                strokeWeight(1.5);
                // Small dots on ring
                beginShape(POINTS);
                for (let a = 0; a < TWO_PI; a += 0.12) {
                    vertex(cos(a) * r.radius, sin(a) * r.radius, 0);
                }
                endShape();
                pop();
            }

            // Particle halo
            push();
            noStroke();
            for (let i = 0; i < 60; i++) {
                let a = i / 60 * TWO_PI + frameCount * 0.01;
                let rad = 185 + sin(frameCount * 0.03 + i) * 30;
                let ph = (globalHue + i * 6) % 360;
                fill(ph, 80, 100, 50);
                let px = cos(a) * rad;
                let py = sin(a * 1.3) * 80;
                let pz = sin(a) * rad;
                push();
                translate(px, py, pz);
                sphere(2.5, 4, 4);
                pop();
            }
            pop();

            // FPS
            resetMatrix();
            noStroke();
            fill(60, 0, 70);
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width/2 - 16, -height/2 + 16);

            // Shape name
            let eased = morphT < 0.5 ? morphT * 2 : 2 - morphT * 2;
            let fromName = SHAPES[shapeIdx];
            let toName = SHAPES[nextIdx];
            resetMatrix();
            textAlign(CENTER, BOTTOM);
            fill((globalHue + 30) % 360, 60, 95, 80);
            textSize(18);
            let displayName = morphT > 0.5 ? toName : fromName;
            text(displayName, 0, height/2 - 22);
            textSize(11);
            fill(0, 0, 60);
            text('SDF Morphing — drag to orbit', 0, height/2 - 6);
        }
    </script>
</body>
</html>
