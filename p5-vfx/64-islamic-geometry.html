<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islamic Star Patterns — P5.js VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:50%; transform:translateX(-50%); color:#bbb; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.55); padding:6px 16px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Islamic Star Pattern — 10-fold Symmetry</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let t = 0;
  let fpsEl, infoEl;
  let tiles = [];
  let waveOffset = 0;

  // 10-pointed star geometry parameters
  const STAR_POINTS = 10;
  const PHI = (1 + Math.sqrt(5)) / 2;

  // Precompute the star polygon vertices
  function starPolygon(cx, cy, outerR, innerR, n) {
    let pts = [];
    for (let i = 0; i < n * 2; i++) {
      let angle = (i * Math.PI / n) - Math.PI / 2;
      let r = (i % 2 === 0) ? outerR : innerR;
      pts.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
    }
    return pts;
  }

  // Regular polygon
  function polygon(cx, cy, r, n, rotOffset) {
    let pts = [];
    for (let i = 0; i < n; i++) {
      let angle = (i * p.TWO_PI / n) + (rotOffset || 0);
      pts.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
    }
    return pts;
  }

  function drawPoly(pts, fillH, fillS, fillB, fillA, strokeH, strokeS, strokeB, strokeA, sw) {
    p.fill(fillH, fillS, fillB, fillA);
    p.stroke(strokeH, strokeS, strokeB, strokeA);
    p.strokeWeight(sw);
    p.beginShape();
    for (let pt of pts) p.vertex(pt.x, pt.y);
    p.endShape(p.CLOSE);
  }

  // Strap (interlacing ribbon) along an edge
  function drawStrap(x1, y1, x2, y2, width, hue, alpha) {
    let dx = x2 - x1, dy = y2 - y1;
    let len = Math.sqrt(dx*dx + dy*dy);
    let nx = -dy / len * width, ny = dx / len * width;
    p.fill(hue, 80, 85, alpha);
    p.noStroke();
    p.beginShape();
    p.vertex(x1 + nx, y1 + ny);
    p.vertex(x2 + nx, y2 + ny);
    p.vertex(x2 - nx, y2 - ny);
    p.vertex(x1 - nx, y1 - ny);
    p.endShape(p.CLOSE);
  }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    infoEl = document.getElementById('info');
  };

  p.draw = function() {
    p.background(0, 0, 5);
    if (p.frameCount % 15 === 0) fpsEl.textContent = Math.round(p.frameRate()) + ' fps';

    t = p.millis() / 1000;
    waveOffset = t * 0.35;

    let cx = p.width / 2;
    let cy = p.height / 2;
    // Tile size for 10-fold symmetry
    // Use a hex-like tiling adapted for 10-fold
    let R = Math.min(p.width, p.height) / 5.5;

    // Generate grid of star positions for 10-fold tiling
    // For 10-fold, we use a rhombitriheptagonal-like layout adapted to decagonal
    // Use a practical approach: row/column layout with 10-gon + pentagon + decagon

    // Actually use a simpler but beautiful approach:
    // Large decagonal stars on a square-ish grid with bridging pentagons
    let tilingPositions = [];
    let cols = Math.ceil(p.width / (R * 1.9)) + 2;
    let rows = Math.ceil(p.height / (R * 1.85)) + 2;

    for (let row = -1; row < rows; row++) {
      for (let col = -1; col < cols; col++) {
        let x = col * R * 1.902 + (row % 2) * R * 0.951;
        let y = row * R * 1.851;
        tilingPositions.push({ x, y });
      }
    }

    // Draw for each tile position
    for (let pos of tilingPositions) {
      let x = pos.x, y = pos.y;
      // Distance-based wave for color animation
      let dist = Math.sqrt((x - cx) * (x - cx) + (y - cy) * (y - cy));
      let wavePhase = dist * 0.008 - waveOffset;
      let hueShift = (wavePhase * 60) % 360;
      if (hueShift < 0) hueShift += 360;

      let baseHue = (30 + hueShift) % 360; // warm gold to blue range

      drawIslamicStar(x, y, R, baseHue);
    }

    infoEl.innerHTML = `Islamic 10-fold Star Pattern  |  Animated color wave`;
  };

  function drawIslamicStar(cx, cy, R, baseHue) {
    let innerR = R * 0.38;  // inner radius of 10-pointed star
    let strapW = R * 0.045;

    // Background decagon (slightly lighter)
    let decPts = polygon(cx, cy, R * 0.98, 10, -Math.PI / 2);
    drawPoly(decPts,
      baseHue, 55, 15, 100,
      baseHue, 70, 40, 80, 0.5);

    // The 10-pointed star
    let starPts = starPolygon(cx, cy, R * 0.85, innerR, 10);

    // Star fill — gradient-ish using multiple triangular sectors
    for (let i = 0; i < 10; i++) {
      let hue = (baseHue + i * 9) % 360;
      let a = starPts[i * 2];
      let b = starPts[(i * 2 + 1) % 20];
      let c = starPts[(i * 2 + 2) % 20];
      p.fill(hue, 85, 90, 90);
      p.noStroke();
      p.beginShape();
      p.vertex(cx, cy);
      p.vertex(a.x, a.y);
      p.vertex(b.x, b.y);
      p.vertex(c.x, c.y);
      p.endShape(p.CLOSE);
    }

    // Star outline
    p.stroke(baseHue, 60, 100, 60);
    p.strokeWeight(0.8);
    p.noFill();
    p.beginShape();
    for (let pt of starPts) p.vertex(pt.x, pt.y);
    p.endShape(p.CLOSE);

    // Interlacing straps along each edge of the star's outer polygon
    for (let i = 0; i < 10; i++) {
      let a = starPts[i * 2];
      let b = starPts[(i * 2 + 2) % 20];
      let strapHue = (baseHue + 180 + i * 8) % 360;
      drawStrap(a.x, a.y, b.x, b.y, strapW, strapHue, 50);
    }

    // Pentagon in center (inner star shape)
    let pentPts = polygon(cx, cy, innerR * 0.75, 5, -Math.PI / 2);
    drawPoly(pentPts,
      (baseHue + 180) % 360, 70, 80, 70,
      (baseHue + 180) % 360, 60, 100, 80, 0.6);
  }

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
  };
});
</script>
</body>
</html>
