<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apollonian Gasket</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#020008; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaf; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#aaf; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:6px; line-height:1.7; z-index:999; pointer-events:none; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Apollonian Gasket<br>Descartes Circle Theorem<br>Depth 7</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let fpsArr = [], lastTime = 0;
  let circles = [];
  let maxDepth = 7;
  let animTime = 0;
  let built = false;

  function hsbToRgb(h, s, b) {
    h = ((h % 360) + 360) % 360;
    s /= 100; b /= 100;
    let c = b * s, x2 = c * (1 - Math.abs((h / 60) % 2 - 1)), m = b - c;
    let r, g, bv;
    let hi = Math.floor(h / 60);
    if (hi === 0) { r=c; g=x2; bv=0; }
    else if (hi === 1) { r=x2; g=c; bv=0; }
    else if (hi === 2) { r=0; g=c; bv=x2; }
    else if (hi === 3) { r=0; g=x2; bv=c; }
    else if (hi === 4) { r=x2; g=0; bv=c; }
    else { r=c; g=0; bv=x2; }
    return [(r+m)*255, (g+m)*255, (bv+m)*255];
  }

  // Descartes: given 3 tangent circles with curvatures k1,k2,k3,
  // 4th curvature: k4 = k1+k2+k3 ± 2*sqrt(k1*k2+k2*k3+k3*k1)
  // For centers: complex arithmetic
  function descartes(c1, c2, c3) {
    let k1 = c1.k, k2 = c2.k, k3 = c3.k;
    let k4 = k1 + k2 + k3 + 2 * Math.sqrt(Math.abs(k1*k2 + k2*k3 + k3*k1));
    // Center: (k1*z1 + k2*z2 + k3*z3 ± 2*sqrt(k1*k2*z1*z2+k2*k3*z2*z3+k1*k3*z1*z3)) / k4
    // Using complex: z = x + iy
    let z1r = c1.x * k1, z1i = c1.y * k1;
    let z2r = c2.x * k2, z2i = c2.y * k2;
    let z3r = c3.x * k3, z3i = c3.y * k3;

    // Product k1*k2*z1*z2 etc (complex multiply)
    function cmul(ar, ai, br, bi) { return [ar*br - ai*bi, ar*bi + ai*br]; }
    function csqrt(re, im) {
      let r = Math.sqrt(re*re + im*im);
      let angle = Math.atan2(im, re) / 2;
      return [Math.sqrt(r) * Math.cos(angle), Math.sqrt(r) * Math.sin(angle)];
    }

    let [p12r, p12i] = cmul(k1*k2*c1.x, k1*k2*c1.y, c2.x, c2.y);
    // Wait — simpler: use the formula for new center directly
    // new_z = (z1*k1 + z2*k2 + z3*k3 ± 2*sqrt(k1*k2*z1*z2 + k2*k3*z2*z3 + k3*k1*z3*z1)) / k4

    // term under sqrt: k1*k2*z1*z2 + k2*k3*z2*z3 + k3*k1*z3*z1
    // z1*z2 = (x1+iy1)(x2+iy2)
    function zprod(x1, y1, k1v, x2, y2, k2v) {
      return [k1v*k2v*(x1*x2 - y1*y2), k1v*k2v*(x1*y2 + y1*x2)];
    }
    let [t1r, t1i] = zprod(c1.x, c1.y, k1, c2.x, c2.y, k2);
    let [t2r, t2i] = zprod(c2.x, c2.y, k2, c3.x, c3.y, k3);
    let [t3r, t3i] = zprod(c3.x, c3.y, k3, c1.x, c1.y, k1);
    let sumR = t1r + t2r + t3r, sumI = t1i + t2i + t3i;
    let [sqR, sqI] = csqrt(sumR, sumI);

    let numR = z1r + z2r + z3r;
    let numI = z1i + z2i + z3i;

    let x4a = (numR + 2*sqR) / k4;
    let y4a = (numI + 2*sqI) / k4;
    let x4b = (numR - 2*sqR) / k4;
    let y4b = (numI - 2*sqI) / k4;

    return [
      { x: x4a, y: y4a, k: k4 },
      { x: x4b, y: y4b, k: -k4 } // inner tangent (negative k = enclosing)
    ];
  }

  function isValid(c) {
    return isFinite(c.x) && isFinite(c.y) && isFinite(c.k) && c.k > 0 && 1/c.k > 1;
  }

  function isDuplicate(c) {
    for (let existing of circles) {
      let dx = c.x - existing.x, dy = c.y - existing.y;
      if (Math.abs(c.k - existing.k) < 0.1 && dx*dx + dy*dy < 0.001) return true;
    }
    return false;
  }

  function buildGasket() {
    circles = [];
    // Start with the classic: 3 mutually tangent circles inside a large enclosing circle
    // Curvatures for Apollonian gasket starting config: k0 = -(1), k1=k2=k3=1... but let's use:
    // Inner 3 mutually tangent circles of equal radius r, inside enclosing circle of radius R
    // For 3 equal circles touching each other and enclosing circle:
    // r / R = 2*sin(30°) / (1 + 2*sin(30°)) wait... actually:
    // 3 equal circles tangent to each other: r = R / (1 + 2/sqrt(3))

    let R = Math.min(p.width, p.height) * 0.44;
    let cx = p.width / 2, cy = p.height / 2;

    // Curvature of enclosing circle is negative: k0 = -1/R
    let k0 = -1 / R;
    // 3 inner equal circles: r = R * sqrt(3) / (2 + sqrt(3))
    let r = R * Math.sqrt(3) / (2 + Math.sqrt(3));
    let k1 = 1 / r;

    // Centers of 3 inner circles at 120° apart
    let dist = R - r; // distance from center to each circle center

    let c1 = { x: cx + dist * Math.cos(Math.PI/2), y: cy + dist * Math.sin(Math.PI/2), k: k1, depth: 0 };
    let c2 = { x: cx + dist * Math.cos(Math.PI/2 + 2*Math.PI/3), y: cy + dist * Math.sin(Math.PI/2 + 2*Math.PI/3), k: k1, depth: 0 };
    let c3 = { x: cx + dist * Math.cos(Math.PI/2 + 4*Math.PI/3), y: cy + dist * Math.sin(Math.PI/2 + 4*Math.PI/3), k: k1, depth: 0 };
    let c0 = { x: cx, y: cy, k: k0, depth: 0 };

    circles.push(c0, c1, c2, c3);

    // Find 4th circle in the central gap using Descartes
    let [c4a, c4b] = descartes(c1, c2, c3);
    if (isValid(c4a)) { c4a.depth = 1; circles.push(c4a); }

    // BFS expansion
    let queue = [
      [c0, c1, c2, c3, 1],
      [c0, c1, c3, c4a, 1],
      [c0, c2, c3, c4a, 1],
      [c0, c1, c2, c4a, 1],
    ];

    let iters = 0;
    while (queue.length > 0 && iters < 50000) {
      iters++;
      let [a, b, c, d, depth] = queue.shift();
      if (depth >= maxDepth) continue;

      // Find the new circle tangent to 3 of the 4, excluding each one
      let combos = [[a,b,c,d],[a,b,d,c],[a,c,d,b],[b,c,d,a]];
      for (let [x1,x2,x3,exclude] of combos) {
        let [na, nb] = descartes(x1, x2, x3);
        for (let nc of [na, nb]) {
          if (!isValid(nc)) continue;
          // check it's not basically the same as exclude
          let dx = nc.x - exclude.x, dy = nc.y - exclude.y;
          let dk = Math.abs(nc.k - exclude.k);
          if (dk < 0.5 && dx*dx + dy*dy < 0.01) continue;
          if (isDuplicate(nc)) continue;
          nc.depth = depth;
          circles.push(nc);
          if (depth < maxDepth - 1) {
            queue.push([x1, x2, x3, nc, depth + 1]);
          }
        }
      }
    }
  }

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    buildGasket();
    built = true;
  };

  p.draw = function() {
    let now = performance.now();
    let dt = now - lastTime; lastTime = now;
    if (dt > 0) {
      fpsArr.push(1000 / dt);
      if (fpsArr.length > 30) fpsArr.shift();
      document.getElementById('fps').textContent = 'FPS: ' + (fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length).toFixed(1);
    }

    animTime += dt / 1000;
    p.background(2, 0, 3);

    let colorShift = animTime * 15; // slow color rotation

    p.noFill();
    let maxK = 0;
    for (let c of circles) if (c.k > 0) maxK = Math.max(maxK, c.k);

    for (let c of circles) {
      let r = Math.abs(1 / c.k);
      if (r < 0.8) continue; // skip tiny invisible circles

      // Map radius to color: large = cool (blue-cyan), small = warm (orange-red)
      let logK = c.k > 0 ? Math.log(c.k) / Math.log(maxK) : 0;
      // logK near 0 = large circle, near 1 = tiny circle
      let hue = (240 - logK * 200 + colorShift) % 360;
      hue = (hue + 360) % 360;

      let alpha = c.k < 0 ? 60 : 80; // enclosing circle is more transparent
      let sat = 80;
      let bri = c.k < 0 ? 40 : 70 + (1 - logK) * 20;

      // Glow effect
      p.strokeWeight(r < 5 ? 0.5 : (r < 20 ? 1 : 1.5));
      p.stroke(hue, sat, bri, alpha);
      p.circle(c.x, c.y, r * 2);

      // Inner glow
      if (r > 3) {
        p.strokeWeight(r < 10 ? 1 : 2.5);
        p.stroke(hue, 40, 100, 20);
        p.circle(c.x, c.y, r * 2);
      }
    }

    document.getElementById('info').innerHTML =
      'Apollonian Gasket<br>' +
      'Circles: ' + circles.length + '<br>' +
      'Depth: ' + maxDepth + '<br>' +
      'Blue = large | Red = tiny';
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    buildGasket();
  };
});
</script>
</body>
</html>
