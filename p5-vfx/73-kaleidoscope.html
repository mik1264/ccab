<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaleidoscope — p5 VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; font-family:monospace; font-size:13px; color:#0f0; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; font-family:monospace; font-size:12px; color:#aaa; background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">← → Arrow keys: change symmetry (N=8) | Mouse: shift pattern</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let N = 8; // number of mirror slices
  let t = 0;
  let fpsEl = document.getElementById('fps');
  let infoEl = document.getElementById('info');
  let frameAcc = 0, fpsTimer = 0, lastFps = 0;
  // Off-screen buffer for one sector
  let sectorBuf;
  let R; // radius of kaleidoscope

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    R = Math.min(p.width, p.height) * 0.5;
    // sector buffer — square, big enough to cover the sector
    sectorBuf = p.createGraphics(Math.ceil(R) + 2, Math.ceil(R) + 2);
    sectorBuf.colorMode(p.HSB, 360, 100, 100, 100);
    sectorBuf.pixelDensity(1);
    p.pixelDensity(1);
  };

  // Draw animated Perlin noise color field into sectorBuf
  function drawSector() {
    sectorBuf.loadPixels();
    let W = sectorBuf.width, H = sectorBuf.height;
    let mox = (p.mouseX / p.width - 0.5) * 2.0;
    let moy = (p.mouseY / p.height - 0.5) * 2.0;

    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        let nx = x / W + mox * 0.15 + t * 0.04;
        let ny = y / H + moy * 0.15 + t * 0.03;
        // multi-octave Perlin for rich texture
        let v = p.noise(nx * 2.5, ny * 2.5, t * 0.5)
              + 0.5 * p.noise(nx * 5.0 + 10, ny * 5.0 + 10, t * 0.7)
              + 0.25 * p.noise(nx * 10.0 + 20, ny * 10.0 + 20, t * 1.1);
        v /= 1.75;

        // spiral swirl
        let dist = Math.sqrt(x * x + y * y) / R;
        let swirl = dist * dist * 120.0 - t * 40.0;
        let hue = (v * 360.0 + swirl + t * 30.0) % 360;
        let sat = 88 + 12 * Math.sin(v * Math.PI * 4);
        let bri = 55 + 40 * v;

        let idx = 4 * (y * W + x);
        // HSB→RGB inline
        let h = hue / 60.0;
        let s = sat / 100.0;
        let b = bri / 100.0;
        let hi = Math.floor(h) % 6;
        let f2 = h - Math.floor(h);
        let pv = b*(1-s), qv = b*(1-s*f2), tv = b*(1-s*(1-f2));
        let r2, g2, b2;
        if(hi===0){r2=b;g2=tv;b2=pv;}
        else if(hi===1){r2=qv;g2=b;b2=pv;}
        else if(hi===2){r2=pv;g2=b;b2=tv;}
        else if(hi===3){r2=pv;g2=qv;b2=b;}
        else if(hi===4){r2=tv;g2=pv;b2=b;}
        else{r2=b;g2=pv;b2=qv;}

        sectorBuf.pixels[idx]   = r2 * 255;
        sectorBuf.pixels[idx+1] = g2 * 255;
        sectorBuf.pixels[idx+2] = b2 * 255;
        sectorBuf.pixels[idx+3] = 255;
      }
    }
    sectorBuf.updatePixels();
  }

  p.draw = function() {
    p.background(0);
    drawSector();

    let cx = p.width * 0.5, cy = p.height * 0.5;
    let sliceAngle = (2 * Math.PI) / N;

    p.push();
    p.translate(cx, cy);

    // Draw N rotated/reflected copies
    for (let i = 0; i < N; i++) {
      let angle = i * sliceAngle + t * 0.08; // slowly rotate
      p.push();
      p.rotate(angle);

      // clip to sector wedge via drawingContext
      let ctx = p.drawingContext;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(0, 0);
      let half = sliceAngle * 0.5;
      ctx.arc(0, 0, R, -half, half);
      ctx.closePath();
      ctx.clip();

      // alternate between normal and flipped (mirror)
      if (i % 2 === 0) {
        p.image(sectorBuf, 0, -sectorBuf.height * 0.5);
      } else {
        p.scale(-1, 1);
        p.image(sectorBuf, 0, -sectorBuf.height * 0.5);
      }
      ctx.restore();
      p.pop();
    }

    // Vignette circle
    let ctx2 = p.drawingContext;
    let grad = ctx2.createRadialGradient(0, 0, R * 0.7, 0, 0, R * 1.05);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.95)');
    ctx2.fillStyle = grad;
    ctx2.beginPath();
    ctx2.arc(0, 0, R * 1.05, 0, Math.PI * 2);
    ctx2.fill();

    p.pop();

    t += 0.012;

    // FPS
    frameAcc++;
    fpsTimer += p.deltaTime;
    if (fpsTimer >= 500) {
      lastFps = Math.round(frameAcc * 1000 / fpsTimer);
      frameAcc = 0; fpsTimer = 0;
      fpsEl.textContent = lastFps + ' fps';
      fpsEl.style.color = lastFps >= 50 ? '#0f0' : lastFps >= 30 ? '#ff0' : '#f44';
    }
  };

  p.keyPressed = function() {
    if (p.keyCode === p.RIGHT_ARROW) { N = Math.min(24, N + 2); updateInfo(); }
    if (p.keyCode === p.LEFT_ARROW)  { N = Math.max(4, N - 2);  updateInfo(); }
  };

  function updateInfo() {
    infoEl.textContent = '← → Arrow keys: change symmetry (N=' + N + ') | Mouse: shift pattern';
  }

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    R = Math.min(p.width, p.height) * 0.5;
    sectorBuf.resizeCanvas(Math.ceil(R) + 2, Math.ceil(R) + 2);
  };
});
</script>
</body>
</html>
