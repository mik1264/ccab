<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halvorsen Attractor 3D — Chaos/Attractors</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#666; font-family:monospace; font-size:12px; text-align:center; pointer-events:none; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Halvorsen Attractor · 3-fold cyclic symmetry · a=1.89 · Drag to rotate</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const MAX_PTS = 6000;
  const STEPS = 35;
  const dt = 0.006;
  const av = 1.89;

  // 3 symmetric copies, hues at 0°, 120°, 240°
  const INITS = [
    { x: -5, y: 0, z: 0, hue: 0 },
    { x: 0, y: -5, z: 0, hue: 120 },
    { x: 0, y: 0, z: -5, hue: 240 }
  ];

  let trails = [];
  let angleY = 0, angleX = 0.3;
  let dragging = false, lastMX = 0, lastMY = 0;
  let fpsEl, fpsTime = 0, fpsFrames = 0;
  const SCALE = 28;

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    p.strokeWeight(1.3);
    p.noFill();

    for (let i = 0; i < 3; i++) {
      trails.push({
        buf: new Float32Array(MAX_PTS * 3),
        head: 0, count: 0,
        x: INITS[i].x, y: INITS[i].y, z: INITS[i].z,
        hue: INITS[i].hue
      });
    }
  };

  function halvorsenStep(t) {
    for (let s = 0; s < STEPS; s++) {
      const dx = -av * t.x - 4 * t.y - 4 * t.z - t.y * t.y;
      const dy = -av * t.y - 4 * t.z - 4 * t.x - t.z * t.z;
      const dz = -av * t.z - 4 * t.x - 4 * t.y - t.x * t.x;
      t.x += dx * dt;
      t.y += dy * dt;
      t.z += dz * dt;
      const idx = t.head * 3;
      t.buf[idx] = t.x; t.buf[idx+1] = t.y; t.buf[idx+2] = t.z;
      t.head = (t.head + 1) % MAX_PTS;
      if (t.count < MAX_PTS) t.count++;
    }
  }

  p.draw = function() {
    p.background(0, 0, 3);

    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(fpsFrames * 1000 / (now - fpsTime));
      fpsFrames = 0; fpsTime = now;
    }

    for (let i = 0; i < 3; i++) halvorsenStep(trails[i]);

    angleY += 0.004;
    p.rotateX(angleX);
    p.rotateY(angleY);

    for (let i = 0; i < 3; i++) {
      const t = trails[i];
      if (t.count < 2) continue;
      p.beginShape(p.LINE_STRIP);
      for (let j = 0; j < t.count; j++) {
        const age = j / t.count;
        const pIdx = ((t.head - t.count + j + MAX_PTS) % MAX_PTS) * 3;
        const px = t.buf[pIdx] * SCALE;
        const py = t.buf[pIdx+1] * SCALE;
        const pz = t.buf[pIdx+2] * SCALE;
        const h = (t.hue + age * 40) % 360;
        const bright = p.map(age, 0, 1, 10, 100);
        const al = p.map(age, 0, 1, 0, 88);
        p.stroke(h, 90, bright, al);
        p.vertex(px, -pz, py);
      }
      p.endShape();
    }
  };

  p.mousePressed = function() { dragging = true; lastMX = p.mouseX; lastMY = p.mouseY; };
  p.mouseReleased = function() { dragging = false; };
  p.mouseDragged = function() {
    angleY += (p.mouseX - lastMX) * 0.01;
    angleX += (p.mouseY - lastMY) * 0.01;
    lastMX = p.mouseX; lastMY = p.mouseY;
  };
  p.windowResized = function() { p.resizeCanvas(window.innerWidth, window.innerHeight); };
});
</script>
</body>
</html>
