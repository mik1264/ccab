<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightning Bolt</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#0f0; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#hint { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); color:#aaa; font-family:monospace; font-size:12px; letter-spacing:2px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="hint">CLICK TO STRIKE</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const sketch = (p) => {
  let bolts = [];
  let fpsEl, frameCount2 = 0, fpsTimer = 0;
  let flashAlpha = 0;
  let shakeX = 0, shakeY = 0;
  let cloudPoints = [];
  let targetX = p.windowWidth/2, targetY = p.windowHeight*0.8;

  function buildClouds() {
    cloudPoints = [];
    for (let i = 0; i < 6; i++) {
      cloudPoints.push({
        x: p.random(p.width * 0.1, p.width * 0.9),
        y: p.random(20, 90),
        r: p.random(50, 130)
      });
    }
  }

  // Midpoint displacement lightning segment
  function lightningSegment(x1, y1, x2, y2, depth, segments, dimFactor) {
    if (depth <= 0) {
      segments.push({ x1, y1, x2, y2, dim: dimFactor });
      return;
    }
    let mx = (x1 + x2) / 2 + p.random(-40, 40) * p.pow(0.55, 4 - depth);
    let my = (y1 + y2) / 2 + p.random(-25, 25) * p.pow(0.55, 4 - depth);
    lightningSegment(x1, y1, mx, my, depth - 1, segments, dimFactor);
    lightningSegment(mx, my, x2, y2, depth - 1, segments, dimFactor);

    // Branch
    if (depth === 3 && p.random() < 0.55) {
      let bx = mx + p.random(30, 120) * (p.random() < 0.5 ? -1 : 1);
      let by = my + p.random(40, 120);
      lightningSegment(mx, my, bx, by, depth - 1, segments, dimFactor * 0.5);
    }
    if (depth === 2 && p.random() < 0.3) {
      let bx = mx + p.random(20, 70) * (p.random() < 0.5 ? -1 : 1);
      let by = my + p.random(25, 70);
      lightningSegment(mx, my, bx, by, depth - 1, segments, dimFactor * 0.25);
    }
  }

  class Bolt {
    constructor(tx, ty) {
      this.tx = tx;
      this.ty = ty;
      this.age = 0;
      this.maxAge = 22;
      this.segments = [];
      // Generate from random cloud point above
      let cx2 = p.random(p.width * 0.2, p.width * 0.8);
      let cy2 = p.random(10, 80);
      lightningSegment(cx2, cy2, tx, ty, 4, this.segments, 1.0);
      flashAlpha = 100;
      shakeX = p.random(-5, 5);
      shakeY = p.random(-3, 3);
    }
    draw() {
      let life = 1 - this.age / this.maxAge;
      // Draw 3 passes: wide dim halo → medium glow → thin bright core
      let passes = [
        { w: 12, hue: 220, sat: 70, bri: 60, aFactor: 0.25 },
        { w: 5,  hue: 210, sat: 50, bri: 85, aFactor: 0.55 },
        { w: 1.5, hue: 190, sat: 10, bri: 100, aFactor: 1.0 },
      ];
      for (let pass of passes) {
        p.strokeWeight(pass.w);
        for (let seg of this.segments) {
          let a = life * pass.aFactor * seg.dim * 100;
          p.stroke(pass.hue, pass.sat, pass.bri, a);
          p.line(seg.x1, seg.y1, seg.x2, seg.y2);
        }
      }
      this.age++;
    }
    isDead() { return this.age >= this.maxAge; }
  }

  p.setup = () => {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    buildClouds();
    // Auto-strike on load
    setTimeout(() => strike(p.width/2, p.height*0.8), 400);
  };

  function strike(x, y) {
    bolts.push(new Bolt(x, y));
  }

  p.mouseClicked = () => {
    strike(p.mouseX, p.mouseY);
  };

  p.draw = () => {
    p.blendMode(p.BLEND);
    // Full-screen flash
    if (flashAlpha > 0) {
      p.background(210, 30, p.map(flashAlpha, 0, 100, 5, 70), 100);
      flashAlpha = p.lerp(flashAlpha, 0, 0.18);
    } else {
      p.background(230, 25, 6);
    }

    // Rumble shake
    shakeX = p.lerp(shakeX, 0, 0.2);
    shakeY = p.lerp(shakeY, 0, 0.2);
    if (bolts.length > 0) {
      shakeX += p.random(-1.5, 1.5) * (bolts[0].maxAge - bolts[0].age) / bolts[0].maxAge;
      shakeY += p.random(-1.0, 1.0) * (bolts[0].maxAge - bolts[0].age) / bolts[0].maxAge;
    }
    p.translate(shakeX, shakeY);

    // Cloud silhouettes
    p.blendMode(p.BLEND);
    p.noStroke();
    for (let c of cloudPoints) {
      p.fill(220, 20, 20, 80);
      p.circle(c.x, c.y, c.r * 2);
      p.fill(220, 15, 25, 90);
      p.circle(c.x + c.r * 0.3, c.y + c.r * 0.15, c.r * 1.4);
      p.fill(220, 10, 15, 95);
      p.circle(c.x - c.r * 0.25, c.y + c.r * 0.2, c.r * 1.2);
    }

    // Hilly ground silhouette
    p.fill(230, 20, 8);
    p.beginShape();
    p.vertex(0, p.height);
    let hillOff = 0;
    for (let hx = 0; hx <= p.width; hx += 20) {
      let hy = p.height - p.noise(hx * 0.004) * 80 - 30;
      p.vertex(hx, hy);
    }
    p.vertex(p.width, p.height);
    p.endShape(p.CLOSE);

    // Bolts
    p.blendMode(p.ADD);
    p.noFill();
    for (let i = bolts.length - 1; i >= 0; i--) {
      bolts[i].draw();
      if (bolts[i].isDead()) bolts.splice(i, 1);
    }

    frameCount2++;
    let now = p.millis();
    if (now - fpsTimer > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(frameCount2 / ((now - fpsTimer) / 1000));
      frameCount2 = 0; fpsTimer = now;
    }
  };

  p.windowResized = () => {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    buildClouds();
  };
};
new p5(sketch);
</script>
</body>
</html>
