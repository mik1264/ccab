<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bénard Convection Cells | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const GW = 160, GH = 100;
        let T, Tnew;   // temperature field
        let vx, vy;    // velocity field
        let pxW, pxH, offX, offY;
        let simTime = 0;

        const T_HOT  =  1.0;   // bottom
        const T_COLD =  0.0;   // top
        const BUOY   = 0.22;   // buoyancy coefficient
        const DIFF_T = 0.004;  // thermal diffusivity
        const VISC   = 0.002;  // kinematic viscosity
        const DT     = 0.4;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
            pixelDensity(1);
            computeLayout();
            initSim();
        }

        function computeLayout() {
            let sx = width  / GW;
            let sy = height / GH;
            let s  = min(sx, sy);
            pxW = max(1, floor(s));
            pxH = max(1, floor(s));
            offX = floor((width  - GW * pxW) / 2);
            offY = floor((height - GH * pxH) / 2);
        }

        function initSim() {
            T    = new Float32Array(GW * GH);
            Tnew = new Float32Array(GW * GH);
            vx   = new Float32Array(GW * GH);
            vy   = new Float32Array(GW * GH);
            simTime = 0;

            for (let j = 0; j < GH; j++) {
                for (let i = 0; i < GW; i++) {
                    let idx = j * GW + i;
                    let fj  = j / (GH - 1);
                    // Linear gradient: hot at bottom (j=GH-1), cold at top (j=0)
                    let baseT = 1.0 - fj;
                    // Perturbation to seed instability
                    let noise = 0.06 * (Math.random() - 0.5)
                              + 0.03 * sin(i / GW * TWO_PI * 5)
                              + 0.02 * sin(j / GH * TWO_PI * 3 + 1.2);
                    T[idx] = baseT + noise;
                    T[idx] = max(0, min(1, T[idx]));
                    vx[idx] = 0;
                    vy[idx] = 0;
                }
            }
        }

        function idx(i, j) {
            // Periodic X, clamped Y
            i = ((i % GW) + GW) % GW;
            j = max(0, min(GH - 1, j));
            return j * GW + i;
        }

        function bilinearSample(field, fx, fy) {
            fx = ((fx % GW) + GW) % GW;
            fy = max(0.5, min(GH - 1.5, fy));
            let ix = floor(fx), iy = floor(fy);
            let tx = fx - ix, ty = fy - iy;
            let nx = (ix + 1) % GW;
            return field[iy*GW+ix]*(1-tx)*(1-ty)
                 + field[iy*GW+nx]*tx*(1-ty)
                 + field[(iy+1)*GW+ix]*(1-tx)*ty
                 + field[(iy+1)*GW+nx]*tx*ty;
        }

        function stepSim() {
            // 1. Advect temperature semi-Lagrangian
            for (let j = 0; j < GH; j++) {
                for (let i = 0; i < GW; i++) {
                    let c = j * GW + i;
                    let srcX = i - DT * vx[c];
                    let srcY = j - DT * vy[c];
                    Tnew[c] = bilinearSample(T, srcX, srcY);
                }
            }

            // 2. Enforce BC on temperature
            for (let i = 0; i < GW; i++) {
                Tnew[i]            = T_COLD; // top (j=0)
                Tnew[(GH-1)*GW+i] = T_HOT;  // bottom (j=GH-1)
            }

            // 3. Diffuse temperature
            for (let iter = 0; iter < 3; iter++) {
                for (let j = 1; j < GH-1; j++) {
                    for (let i = 0; i < GW; i++) {
                        let c = j * GW + i;
                        let il = ((i-1+GW)%GW), ir = (i+1)%GW;
                        let nb = Tnew[j*GW+il]+Tnew[j*GW+ir]+Tnew[(j-1)*GW+i]+Tnew[(j+1)*GW+i];
                        Tnew[c] = (Tnew[c] + DIFF_T*DT*nb) / (1 + 4*DIFF_T*DT);
                    }
                }
                for (let i = 0; i < GW; i++) {
                    Tnew[i]            = T_COLD;
                    Tnew[(GH-1)*GW+i] = T_HOT;
                }
            }

            // Swap T
            let tmp = T; T = Tnew; Tnew = tmp;

            // 4. Update velocity from buoyancy + diffusion
            for (let j = 1; j < GH-1; j++) {
                for (let i = 0; i < GW; i++) {
                    let c  = j * GW + i;
                    let il = ((i-1+GW)%GW), ir = (i+1)%GW;

                    // Buoyancy: hot fluid (T=1) rises (vy negative = up on screen)
                    // screen: j increases downward, so "up" = negative j direction
                    let buoyForce = -BUOY * (T[c] - 0.5);

                    // Advect velocity
                    let srcX = i - DT * vx[c];
                    let srcY = j - DT * vy[c];
                    let nvx  = bilinearSample(vx, srcX, srcY);
                    let nvy  = bilinearSample(vy, srcX, srcY) + DT * buoyForce;

                    // Diffuse velocity
                    let nvxn = vx[j*GW+il]+vx[j*GW+ir]+vx[(j-1)*GW+i]+vx[(j+1)*GW+i];
                    let nvyn = vy[j*GW+il]+vy[j*GW+ir]+vy[(j-1)*GW+i]+vy[(j+1)*GW+i];
                    vx[c] = (nvx + VISC*DT*nvxn) / (1 + 4*VISC*DT);
                    vy[c] = (nvy + VISC*DT*nvyn) / (1 + 4*VISC*DT);
                }
            }

            // Velocity BC: no-slip top/bottom, periodic left/right
            for (let i = 0; i < GW; i++) {
                vx[i] = 0; vy[i] = 0;
                vx[(GH-1)*GW+i] = 0; vy[(GH-1)*GW+i] = 0;
            }

            simTime += DT;

            if (simTime > 1200) {
                initSim();
            }
        }

        function draw() {
            for (let s = 0; s < 4; s++) stepSim();

            loadPixels();

            // Background
            for (let k = 0; k < width * height * 4; k += 4) {
                pixels[k]   = 5;
                pixels[k+1] = 5;
                pixels[k+2] = 16;
                pixels[k+3] = 255;
            }

            for (let j = 0; j < GH; j++) {
                for (let i = 0; i < GW; i++) {
                    let temp = T[j * GW + i]; // 0 = cold (top), 1 = hot (bottom)

                    // Cold: deep blue (H=225, S=90, B=60)
                    // Hot: glowing orange-red (H=20, S=100, B=100)
                    let r, g, b;
                    if (temp < 0.5) {
                        // Cold to mid: blue → purple
                        let t2 = temp * 2;
                        r = floor(lerp(10,  120, t2));
                        g = floor(lerp(30,  20,  t2));
                        b = floor(lerp(180, 80,  t2));
                    } else {
                        // Mid to hot: red-orange glow
                        let t2 = (temp - 0.5) * 2;
                        r = floor(lerp(120, 255, t2));
                        g = floor(lerp(20,  100, t2));
                        b = floor(lerp(80,  10,  t2));
                    }

                    r = min(255, max(0, r));
                    g = min(255, max(0, g));
                    b = min(255, max(0, b));

                    for (let dj = 0; dj < pxH; dj++) {
                        for (let di = 0; di < pxW; di++) {
                            let px = offX + i * pxW + di;
                            let py = offY + j * pxH + dj;
                            if (px < 0 || px >= width || py < 0 || py >= height) continue;
                            let pidx = (py * width + px) * 4;
                            pixels[pidx]   = r;
                            pixels[pidx+1] = g;
                            pixels[pidx+2] = b;
                            pixels[pidx+3] = 255;
                        }
                    }
                }
            }
            updatePixels();

            // Velocity arrows (sparse grid)
            const arrowStep = 12;
            stroke(0, 0, 100, 25);
            strokeWeight(1);
            for (let j = arrowStep; j < GH - arrowStep; j += arrowStep) {
                for (let i = arrowStep/2; i < GW; i += arrowStep) {
                    let c  = j * GW + i;
                    let vxc = vx[c], vyc = vy[c];
                    let spd = sqrt(vxc*vxc + vyc*vyc);
                    if (spd < 0.001) continue;
                    let nx  = vxc / spd, ny = vyc / spd;
                    let len = min(spd * 8, 7);
                    let px = offX + i * pxW + pxW/2;
                    let py = offY + j * pxH + pxH/2;
                    let ex = px + nx * len, ey = py + ny * len;
                    line(px, py, ex, ey);
                }
            }

            // FPS
            noStroke();
            fill(0, 0, 0, 60);
            rect(width - 80, 8, 72, 22, 4);
            fill(0, 0, 100, 80);
            textSize(13);
            textAlign(RIGHT, TOP);
            textFont('monospace');
            text(nf(frameRate(), 1, 1) + ' fps', width - 12, 13);

            fill(0, 0, 80, 50);
            textSize(11);
            textAlign(LEFT, BOTTOM);
            text('Bénard Convection Cells  |  t=' + nf(simTime/40, 1, 0) + 's  (hot bottom → cold top)', offX + 4, offY + GH*pxH - 4);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            computeLayout();
        }
    </script>
</body>
</html>
