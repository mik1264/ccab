<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sacred Geometry — P5.js VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:50%; transform:translateX(-50%); color:#bbb; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.55); padding:6px 16px; border-radius:6px; z-index:999; text-align:center; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Flower of Life → Metatron's Cube</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let fpsEl, infoEl;
  let t = 0;
  let constructionT = 0;  // drives step-by-step construction
  let constructionDone = false;
  let pulseT = 0;

  // Construction stages
  // Stage 0: center circle drawn
  // Stage 1-6: 6 outer circles drawn one by one
  // Stage 7-12: second ring (12 circles)
  // Stage 13: Metatron's cube lines
  // Stage 14: pulsing

  const TOTAL_STAGES = 14;
  const STAGE_DURATION = 1.2; // seconds per stage

  let circles = []; // { cx, cy, r, ring, born }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    infoEl = document.getElementById('info');
  };

  p.draw = function() {
    p.background(0, 0, 4);
    if (p.frameCount % 15 === 0) fpsEl.textContent = Math.round(p.frameRate()) + ' fps';

    t = p.millis() / 1000;
    constructionT = t / STAGE_DURATION;

    let cx = p.width / 2;
    let cy = p.height / 2;
    let R = Math.min(p.width, p.height) * 0.17; // circle radius

    let currentStage = Math.floor(constructionT);
    let stageFrac = constructionT % 1; // 0-1 within current stage

    if (currentStage >= TOTAL_STAGES) {
      currentStage = TOTAL_STAGES - 1;
      stageFrac = 1.0;
      constructionDone = true;
    }

    pulseT = t * 1.2;

    // ====== DRAW ======

    // First: draw all completed circles
    // Ring 0: center
    if (currentStage >= 0) {
      let alpha = currentStage === 0 ? stageFrac * 85 : 85;
      let hue = (0 + pulseT * 15) % 360;
      drawFlowerCircle(cx, cy, R, hue, alpha, currentStage === 0 ? stageFrac : 1.0);
    }

    // Ring 1: 6 circles at distance R from center
    for (let i = 0; i < 6; i++) {
      let stage = i + 1;
      if (currentStage >= stage) {
        let angle = i * p.TWO_PI / 6;
        let ocx = cx + R * Math.cos(angle);
        let ocy = cy + R * Math.sin(angle);
        let alpha = currentStage === stage ? stageFrac * 80 : 80;
        let hue = (i * 60 + pulseT * 15) % 360;
        drawFlowerCircle(ocx, ocy, R, hue, alpha, currentStage === stage ? stageFrac : 1.0);
      }
    }

    // Ring 2: 6 more circles (forming full flower)
    for (let i = 0; i < 6; i++) {
      let stage = i + 7;
      if (currentStage >= stage) {
        let angle = (i + 0.5) * p.TWO_PI / 6;
        let dist = R * Math.sqrt(3);
        let ocx = cx + dist * Math.cos(angle - p.TWO_PI / 12);
        let ocy = cy + dist * Math.sin(angle - p.TWO_PI / 12);
        let alpha = currentStage === stage ? stageFrac * 60 : 60;
        let hue = (i * 60 + 30 + pulseT * 15) % 360;
        drawFlowerCircle(ocx, ocy, R, hue, alpha, currentStage === stage ? stageFrac : 1.0);
      }
    }

    // Metatron's Cube: connect all centers
    if (currentStage >= 13) {
      let alpha = (currentStage === 13 ? stageFrac : 1.0) * 55;
      drawMetatronLines(cx, cy, R, alpha);
    }

    // Pulse after construction done
    if (constructionDone) {
      drawPulse(cx, cy, R);
    }

    // Info
    let stageNames = [
      'Drawing center circle...', 'First petal...', 'Second petal...', 'Third petal...',
      'Fourth petal...', 'Fifth petal...', 'Sixth petal...', 'Expanding ring...',
      'Expanding ring...', 'Expanding ring...', 'Expanding ring...', 'Expanding ring...',
      'Completing flower...', 'Drawing Metatron\'s Cube...', 'Flower of Life — Complete'
    ];
    let stageIdx = Math.min(currentStage, stageNames.length - 1);
    infoEl.innerHTML = `Sacred Geometry: ${stageNames[stageIdx]}`;
  };

  function drawFlowerCircle(cx, cy, r, hue, alpha, completeFrac) {
    // Draw circle arc from 0 to completeFrac * 2PI
    let endAngle = completeFrac * p.TWO_PI;
    let pulse = constructionDone ? 1.0 + 0.04 * Math.sin(pulseT * 2 + cx * 0.01) : 1.0;

    p.push();
    p.noFill();
    p.stroke(hue, 70, 85, alpha);
    p.strokeWeight(1.4);

    if (completeFrac >= 0.999) {
      p.circle(cx, cy, r * 2 * pulse);
    } else {
      // Draw arc from top, sweeping clockwise
      p.arc(cx, cy, r * 2, r * 2, -p.HALF_PI, -p.HALF_PI + endAngle);
    }
    p.pop();
  }

  function drawMetatronLines(cx, cy, R, alpha) {
    // Centers of the 7 main circles (center + 6 ring 1)
    let centers = [{ x: cx, y: cy }];
    for (let i = 0; i < 6; i++) {
      let angle = i * p.TWO_PI / 6;
      centers.push({ x: cx + R * Math.cos(angle), y: cy + R * Math.sin(angle) });
    }

    // Connect all pairs
    p.stroke(180, 60, 85, alpha * 0.7);
    p.strokeWeight(0.6);
    p.noFill();
    for (let i = 0; i < centers.length; i++) {
      for (let j = i + 1; j < centers.length; j++) {
        let hue = ((i * 7 + j * 13) * 12 + pulseT * 20) % 360;
        p.stroke(hue, 60, 80, alpha * 0.65);
        p.line(centers[i].x, centers[i].y, centers[j].x, centers[j].y);
      }
    }

    // Draw inscribed hexagon
    p.stroke(60, 70, 90, alpha);
    p.strokeWeight(1.2);
    p.noFill();
    p.beginShape();
    for (let i = 0; i < 6; i++) {
      let angle = i * p.TWO_PI / 6;
      p.vertex(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
    }
    p.endShape(p.CLOSE);

    // Two interlocking triangles (Star of David / hexagram)
    for (let offset = 0; offset < 2; offset++) {
      let startAngle = offset * (p.TWO_PI / 6);
      p.stroke(offset === 0 ? 30 : 200, 80, 90, alpha);
      p.strokeWeight(1.0);
      p.noFill();
      p.beginShape();
      for (let i = 0; i < 3; i++) {
        let angle = startAngle + i * (p.TWO_PI / 3);
        p.vertex(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
      }
      p.endShape(p.CLOSE);
    }
  }

  function drawPulse(cx, cy, R) {
    // Concentric pulsing rings emanating outward
    let numRings = 4;
    for (let i = 0; i < numRings; i++) {
      let phase = (pulseT * 0.5 + i / numRings) % 1;
      let r = R * (1 + phase * 2.5);
      let alpha = (1 - phase) * 35;
      let hue = (pulseT * 20 + i * 90) % 360;
      p.noFill();
      p.stroke(hue, 60, 90, alpha);
      p.strokeWeight(1.5 * (1 - phase));
      p.circle(cx, cy, r * 2);
    }
  }

  p.mouseClicked = function() {
    // Restart construction
    constructionT = 0;
    constructionDone = false;
    // Reset by restarting millis reference via t offset
    t = 0;
    // We can't reset millis() in p5, so restart via p.millis() offset
    // Simplest: just add a large negative offset to constructionT tracking
    // Actually just reset the draw loop state via a flag
    p.setup(); // re-setup (safe in this case since no heavy resources)
  };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
  };
});
</script>
</body>
</html>
