<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmoothLife | P5 VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#hud { position:fixed; top:12px; right:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.75); padding:8px 12px; border-radius:6px; z-index:999; line-height:1.9; }
#keys { position:fixed; bottom:12px; left:12px; color:#444; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:4px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="hud">
  FPS: <span id="fps">0</span><br>
  GEN: <span id="gen">0</span><br>
  <span style="color:#666;font-size:10px">SmoothLife</span>
</div>
<div id="keys">R reset · click splash</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  // SmoothLife parameters
  // Inner radius ri, outer radius ro
  // Birth interval [b1,b2], survival interval [d1,d2]
  // Alpha_n, alpha_m smoothing
  const RI=3.0, RO=9.0;
  const B1=0.257, B2=0.336, D1=0.365, D2=0.549;
  const ALPHA_N=0.028, ALPHA_M=0.147;
  const DT=0.15;
  const CS=2;
  let cols,rows,grid,next;
  let gen=0;
  let fpsTimer=0,fpsCount=0,fpsVal=0;
  // Precomputed kernel tables
  let innerKernel=[], outerKernel=[];
  let innerNorm=0, outerNorm=0;

  p.setup=function(){
    p.createCanvas(p.windowWidth,p.windowHeight);
    p.colorMode(p.HSB,360,100,100,100);
    p.pixelDensity(1);
    cols=Math.floor(p.width/CS); rows=Math.floor(p.height/CS);
    grid=new Float32Array(cols*rows); next=new Float32Array(cols*rows);
    buildKernels();
    reset();
  };

  function smooth(x,w){ return 1/(1+Math.exp(-4*(x-0.5)/w)); }
  function sigma1(x,a,w){ return smooth(x-a,w); }
  function sigma2(x,a,b,w){ return smooth(x-a,w)-smooth(x-b,w); }
  function sigmam(x,y,m,w){ return x*(1-smooth(m,w))+y*smooth(m,w); }

  function transition(n,m){
    return sigma2(n, sigmam(B1,D1,m,ALPHA_M), sigmam(B2,D2,m,ALPHA_M), ALPHA_N);
  }

  function buildKernels(){
    const roI=Math.ceil(RO);
    innerKernel=[]; outerKernel=[];
    innerNorm=0; outerNorm=0;
    for(let dy=-roI;dy<=roI;dy++){
      for(let dx=-roI;dx<=roI;dx++){
        const r=Math.sqrt(dx*dx+dy*dy);
        // Smooth disk kernel using logistic cutoffs
        const inner=smooth(r,0.5)-smooth(r-RI,0.5);
        const outer=(smooth(r-RI,0.5)-smooth(r-RO,0.5));
        if(inner>1e-6){ innerKernel.push({dx,dy,v:inner}); innerNorm+=inner; }
        if(outer>1e-6){ outerKernel.push({dx,dy,v:outer}); outerNorm+=outer; }
      }
    }
  }

  function reset(){
    grid.fill(0);
    gen=0;
    // Seed blobs
    for(let i=0;i<60;i++){
      const cx=Math.floor(Math.random()*cols), cy=Math.floor(Math.random()*rows);
      const rr=5+Math.random()*10;
      for(let dy=-Math.ceil(rr);dy<=Math.ceil(rr);dy++){
        for(let dx=-Math.ceil(rr);dx<=Math.ceil(rr);dx++){
          if(dx*dx+dy*dy<=rr*rr){
            const c=(cx+dx+cols)%cols, r=(cy+dy+rows)%rows;
            grid[r*cols+c]=Math.min(1,grid[r*cols+c]+Math.random()*0.9);
          }
        }
      }
    }
  }

  function step(){
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        let M=0, N=0;
        for(let ki=0;ki<innerKernel.length;ki++){
          const k=innerKernel[ki];
          const rr=(r+k.dy+rows)%rows, cc=(c+k.dx+cols)%cols;
          M+=grid[rr*cols+cc]*k.v;
        }
        for(let ki=0;ki<outerKernel.length;ki++){
          const k=outerKernel[ki];
          const rr=(r+k.dy+rows)%rows, cc=(c+k.dx+cols)%cols;
          N+=grid[rr*cols+cc]*k.v;
        }
        M/=innerNorm; N/=outerNorm;
        const s=transition(N,M);
        const cur=grid[r*cols+c];
        next[r*cols+c]=Math.max(0,Math.min(1,cur+DT*(2*s-1)));
      }
    }
    const tmp=grid; grid=next; next=tmp;
    gen++;
  }

  p.draw=function(){
    fpsCount++;
    const now=performance.now();
    if(now-fpsTimer>=500){
      fpsVal=Math.round(fpsCount/((now-fpsTimer)/1000));
      fpsCount=0; fpsTimer=now;
    }

    if(p.mouseIsPressed){
      const mc=Math.floor(p.mouseX/CS), mr=Math.floor(p.mouseY/CS);
      const R2=8;
      for(let dy=-R2;dy<=R2;dy++) for(let dx=-R2;dx<=R2;dx++){
        if(dx*dx+dy*dy>R2*R2) continue;
        const c=(mc+dx+cols)%cols, r=(mr+dy+rows)%rows;
        grid[r*cols+c]=Math.min(1,grid[r*cols+c]+0.8);
      }
    }

    step();

    p.loadPixels();
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const v=grid[r*cols+c];
        let R2=0,G2=0,B2=0;
        if(v>0.02){
          // Vivid HSB coloring based on value
          const hue=(gen*0.5+v*200)%360;
          const sat=80+v*20;
          const bri=Math.pow(v,0.5)*95;
          [R2,G2,B2]=hsbToRgb(hue,sat,bri);
        }
        for(let py=0;py<CS;py++) for(let px=0;px<CS;px++){
          const pi=4*((r*CS+py)*p.width+(c*CS+px));
          p.pixels[pi]=R2; p.pixels[pi+1]=G2; p.pixels[pi+2]=B2; p.pixels[pi+3]=255;
        }
      }
    }
    p.updatePixels();

    document.getElementById('fps').textContent=fpsVal;
    document.getElementById('gen').textContent=gen;
  };

  function hsbToRgb(h,s,b){
    h=((h%360)+360)%360; s/=100; b/=100;
    const c=b*s,x=c*(1-Math.abs((h/60)%2-1)),m=b-c;
    let r=0,g=0,bl=0;
    if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;bl=x;}
    else if(h<240){g=x;bl=c;}else if(h<300){r=x;bl=c;}else{r=c;bl=x;}
    return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((bl+m)*255)];
  }

  p.keyPressed=function(){
    if(p.key==='r'||p.key==='R') reset();
  };

  p.windowResized=function(){
    p.resizeCanvas(p.windowWidth,p.windowHeight);
    cols=Math.floor(p.width/CS); rows=Math.floor(p.height/CS);
    grid=new Float32Array(cols*rows); next=new Float32Array(cols*rows);
    buildKernels(); reset();
  };
});
</script>
</body>
</html>
