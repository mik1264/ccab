<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Slit Experiment</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: monospace; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#fps { position:fixed; top:12px; left:50%; transform:translateX(-50%); color:#0f0; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:5px; z-index:999; }
#ui {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  background: rgba(0,0,0,0.75);
  padding: 10px 18px;
  border-radius: 10px;
  z-index: 999;
  border: 1px solid rgba(255,255,255,0.1);
}
#ui button {
  background: rgba(255,255,255,0.1);
  color: #eee;
  border: 1px solid rgba(255,255,255,0.25);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-family: monospace;
  font-size: 12px;
  transition: background 0.2s;
}
#ui button:hover { background: rgba(255,255,255,0.2); }
#ui button.active { background: rgba(80,200,120,0.35); border-color: #5c8; color: #5c8; }
#info {
  position: fixed;
  top: 12px;
  right: 12px;
  color: #999;
  font-size: 12px;
  background: rgba(0,0,0,0.65);
  padding: 8px 12px;
  border-radius: 6px;
  line-height: 1.7;
  z-index: 999;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Particles: 0 | Hits: 0</div>
<div id="ui">
  <button id="btnQuantum" class="active" onclick="setMode('quantum')">Quantum</button>
  <button id="btnClassical" onclick="setMode('classical')">Classical</button>
  <button id="btnWhichPath" onclick="toggleWhichPath()">Which-Path OFF</button>
  <button onclick="resetSim()">Reset</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
let mode = 'quantum';
let whichPath = false;

function setMode(m) {
  mode = m;
  document.getElementById('btnQuantum').classList.toggle('active', m === 'quantum');
  document.getElementById('btnClassical').classList.toggle('active', m === 'classical');
  resetSim();
}

function toggleWhichPath() {
  whichPath = !whichPath;
  document.getElementById('btnWhichPath').textContent = 'Which-Path ' + (whichPath ? 'ON' : 'OFF');
  document.getElementById('btnWhichPath').classList.toggle('active', whichPath);
  resetSim();
}

function resetSim() {
  if (window._simReset) window._simReset();
}

new p5(function(p) {
  let W, H;
  let slitX, screenX;
  let slitSep = 60;
  let slitWidth = 12;
  let lambda = 18;
  let particles = [];
  let detector; // array of hit counts per y pixel
  let detectorMax = 1;
  let totalParticles = 0;
  let totalHits = 0;
  let infoDiv = document.getElementById('info');
  let fpsDiv = document.getElementById('fps');

  // Particle: { x, y, vx, vy, alive, slit (0 or 1 or -1 if not yet through), phase }
  const SPAWN_RATE = 4; // particles per frame
  const MAX_PARTICLES = 600;

  p.setup = function() {
    let cnv = p.createCanvas(p.windowWidth, p.windowHeight);
    cnv.parent(document.body);
    p.pixelDensity(1);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    W = p.width; H = p.height;
    slitX = W * 0.42;
    screenX = W * 0.78;
    detector = new Float32Array(H);
    window._simReset = resetAll;
  };

  function resetAll() {
    particles = [];
    detector.fill(0);
    detectorMax = 1;
    totalParticles = 0;
    totalHits = 0;
  }

  function probDensity(y) {
    let yC = H / 2;
    let d = slitSep;
    let a = slitWidth;
    let L = screenX - slitX;
    let theta = Math.atan2(y - yC, L);
    let sinT = Math.sin(theta);

    if (mode === 'classical' || whichPath) {
      // classical: two gaussians from slits
      let s1 = H/2 - d/2, s2 = H/2 + d/2;
      let sig = 40;
      return Math.exp(-(y-s1)*(y-s1)/(2*sig*sig)) + Math.exp(-(y-s2)*(y-s2)/(2*sig*sig));
    }

    // quantum double slit interference
    let beta = Math.PI * a * sinT / lambda;
    let delta = Math.PI * d * sinT / lambda;
    let single = (Math.abs(beta) < 1e-9) ? 1 : Math.pow(Math.sin(beta)/beta, 2);
    let interfere = Math.pow(Math.cos(delta), 2);
    return single * interfere;
  }

  // rejection-sample y position on screen
  function sampleY() {
    for (let i = 0; i < 200; i++) {
      let y = p.random(H);
      let prob = probDensity(y);
      if (p.random() < prob) return y;
    }
    return H/2 + p.random(-100, 100);
  }

  function spawnParticle() {
    let srcX = 30 + p.random(-3, 3);
    let srcY = H/2 + p.random(-3, 3);
    let targetY = sampleY();
    // shoot toward slit region first, then deflect toward target screen y
    // simplified: straight line from source to (slitX, midSlitY) then to (screenX, targetY)
    let midY = H/2 + p.random(-slitSep/2 - slitWidth/2, slitSep/2 + slitWidth/2);
    // pick a slit to aim for
    let slitChoice = p.random() < 0.5 ? -1 : 1;
    let aimY = H/2 + slitChoice * slitSep/2 + p.random(-slitWidth/2, slitWidth/2);

    let speed = p.random(3.5, 5.5);
    let dx = slitX - srcX;
    let dy = aimY - srcY;
    let dist = Math.sqrt(dx*dx + dy*dy);

    return {
      x: srcX, y: srcY,
      vx: dx/dist * speed,
      vy: dy/dist * speed,
      targetY: targetY,
      phase: 1, // 1=heading to slit, 2=heading to screen
      slitChoice,
      aimY,
      alive: true,
      alpha: 80
    };
  }

  p.draw = function() {
    p.background(0, 0, 4);

    // spawn
    if (totalParticles < 20000) {
      for (let i = 0; i < SPAWN_RATE && particles.length < MAX_PARTICLES; i++) {
        particles.push(spawnParticle());
        totalParticles++;
      }
    }

    // update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      let pt = particles[i];
      pt.x += pt.vx;
      pt.y += pt.vy;

      // Phase transition at slit wall
      if (pt.phase === 1 && pt.x >= slitX - 1) {
        let yC = H/2;
        let s1lo = yC - slitSep/2 - slitWidth/2, s1hi = yC - slitSep/2 + slitWidth/2;
        let s2lo = yC + slitSep/2 - slitWidth/2, s2hi = yC + slitSep/2 + slitWidth/2;
        let passedSlit = (pt.y >= s1lo && pt.y <= s1hi) || (pt.y >= s2lo && pt.y <= s2hi);
        if (passedSlit) {
          pt.phase = 2;
          // redirect toward target on screen
          let dx2 = screenX - pt.x;
          let dy2 = pt.targetY - pt.y;
          let dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);
          let speed = Math.sqrt(pt.vx*pt.vx + pt.vy*pt.vy);
          pt.vx = dx2/dist2 * speed;
          pt.vy = dy2/dist2 * speed;
        } else {
          // hit the wall
          pt.alive = false;
          particles.splice(i, 1);
          continue;
        }
      }

      // reached screen
      if (pt.x >= screenX) {
        let iy = Math.floor(pt.y);
        if (iy >= 0 && iy < H) {
          detector[iy] += 1;
          if (detector[iy] > detectorMax) detectorMax = detector[iy];
          totalHits++;
        }
        pt.alive = false;
        particles.splice(i, 1);
        continue;
      }

      // out of bounds
      if (pt.y < 0 || pt.y > H || pt.x < 0) {
        particles.splice(i, 1);
        continue;
      }
    }

    // Draw detector accumulation (left of screen line, as heat map)
    let barW = 18;
    for (let y = 0; y < H; y++) {
      let v = detector[y] / detectorMax;
      if (v < 0.01) continue;
      let hue = p.map(v, 0, 1, 200, 30);
      let sat = 90;
      let bri = p.map(v, 0, 1, 20, 100);
      p.stroke(hue, sat, bri, 90);
      p.line(screenX, y, screenX + barW, y);
    }

    // Draw slit barrier
    let yC = H/2;
    let s1lo = yC - slitSep/2 - slitWidth/2, s1hi = yC - slitSep/2 + slitWidth/2;
    let s2lo = yC + slitSep/2 - slitWidth/2, s2hi = yC + slitSep/2 + slitWidth/2;
    p.stroke(180, 40, 80, 90);
    p.strokeWeight(4);
    p.line(slitX, 0, slitX, s1lo);
    p.line(slitX, s1hi, slitX, s2lo);
    p.line(slitX, s2hi, slitX, H);
    p.strokeWeight(1);

    // Label slits
    p.noStroke();
    p.fill(0, 0, 60, 80);
    p.textSize(11);
    p.text('Slit A', slitX + 6, s1hi - slitWidth/2 + 4);
    p.text('Slit B', slitX + 6, s2hi - slitWidth/2 + 4);

    // Draw particles
    p.noStroke();
    for (let pt of particles) {
      let col = (pt.phase === 1) ? [50, 80, 90] : [160, 80, 100];
      p.fill(col[0], col[1], col[2], 70);
      p.circle(pt.x, pt.y, 3);
    }

    // Source glow
    p.fill(60, 100, 100, 40);
    p.circle(30, H/2, 24);
    p.fill(60, 100, 100, 80);
    p.circle(30, H/2, 8);

    // Screen label
    p.fill(0, 0, 55, 80);
    p.textSize(11);
    p.text('DETECTOR', screenX + 4, 18);

    // Mode label
    p.textSize(14);
    p.fill(whichPath ? [30,90,100] : mode === 'quantum' ? [160,80,100] : [50,80,100]);
    let modeText = whichPath ? 'WHICH-PATH (collapsed)' : mode === 'quantum' ? 'QUANTUM' : 'CLASSICAL';
    p.fill(0,0,80,90);
    p.text(modeText, W/2, 20);

    if (p.frameCount % 20 === 0) {
      fpsDiv.textContent = 'FPS: ' + Math.round(p.frameRate());
      infoDiv.textContent = 'Particles: ' + totalParticles.toLocaleString() + ' | Hits: ' + totalHits.toLocaleString();
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    W = p.width; H = p.height;
    slitX = W * 0.42; screenX = W * 0.78;
    detector = new Float32Array(H);
    resetAll();
  };
});
</script>
</body>
</html>
