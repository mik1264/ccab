<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plasma Color Field — p5 VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; font-family:monospace; font-size:13px; color:#0f0; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; font-family:monospace; font-size:12px; color:#888; background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Move mouse to warp frequency</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let t = 0;
  let fpsEl = document.getElementById('fps');
  let lastFps = 0, frameAcc = 0, fpsTimer = 0;
  let px, py; // mouse normalized

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    px = 0.5; py = 0.5;
  };

  p.draw = function() {
    p.loadPixels();
    let W = p.width, H = p.height;
    let cx = W * 0.5, cy = H * 0.5;
    // mouse modulates frequency
    let mfx = 4.0 + (p.mouseX / W - 0.5) * 3.0;
    let mfy = 3.0 + (p.mouseY / H - 0.5) * 2.0;

    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        // normalize coords so plasma doesn't scale with window
        let nx = (x - cx) / 80.0;
        let ny = (y - cy) / 80.0;
        let r = Math.sqrt(nx * nx + ny * ny);

        // Classic demoscene plasma — 7 harmonic terms
        let v = Math.sin(nx / mfx + t * 1.1)
              + Math.sin(ny / mfy + t * 0.9)
              + Math.sin((nx + ny) / 6.0 + t * 0.7)
              + Math.sin(r / 4.0 + t * 1.3)
              + 0.5 * Math.sin(nx * 0.7 - t * 0.5)
              + 0.5 * Math.sin(ny * 0.9 + t * 0.6)
              + 0.3 * Math.sin((nx - ny) * 0.5 + t * 0.4);
        // v ranges ≈ [-4, 4]
        let hue = (v + 4.0) / 8.0 * 360.0;
        // slight brightness modulation for depth
        let bri = 85 + 15 * Math.sin(v * 1.5);
        let sat = 95 + 5 * Math.cos(v * 2.0);

        let idx = 4 * (y * W + x);
        // fast HSB→RGB inline (p5 colorMode won't work in pixel loop)
        let h = hue / 60.0;
        let s = sat / 100.0;
        let br = bri / 100.0;
        let hi = Math.floor(h) % 6;
        let f = h - Math.floor(h);
        let pv = br * (1 - s);
        let qv = br * (1 - s * f);
        let tv = br * (1 - s * (1 - f));
        let r2, g2, b2;
        if (hi === 0) { r2=br; g2=tv; b2=pv; }
        else if (hi === 1) { r2=qv; g2=br; b2=pv; }
        else if (hi === 2) { r2=pv; g2=br; b2=tv; }
        else if (hi === 3) { r2=pv; g2=qv; b2=br; }
        else if (hi === 4) { r2=tv; g2=pv; b2=br; }
        else { r2=br; g2=pv; b2=qv; }

        p.pixels[idx]   = r2 * 255;
        p.pixels[idx+1] = g2 * 255;
        p.pixels[idx+2] = b2 * 255;
        p.pixels[idx+3] = 255;
      }
    }
    p.updatePixels();
    t += 0.022;

    // FPS
    frameAcc++;
    fpsTimer += p.deltaTime;
    if (fpsTimer >= 500) {
      lastFps = Math.round(frameAcc * 1000 / fpsTimer);
      frameAcc = 0; fpsTimer = 0;
      fpsEl.textContent = lastFps + ' fps';
      fpsEl.style.color = lastFps >= 50 ? '#0f0' : lastFps >= 30 ? '#ff0' : '#f44';
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
  };
});
</script>
</body>
</html>
