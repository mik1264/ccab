<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Growth CA | P5 VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#hud { position:fixed; top:12px; right:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.75); padding:8px 12px; border-radius:6px; z-index:999; line-height:2; min-width:160px; }
#keys { position:fixed; bottom:12px; left:12px; color:#444; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:4px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="hud">
  FPS: <span id="fps">0</span><br>
  GEN: <span id="gen">0</span><br>
  <span style="color:#1a5c1a">■</span> Wild: <span id="p0">0</span>%<br>
  <span style="color:#5cb85c">■</span> Suburban: <span id="p1">0</span>%<br>
  <span style="color:#e8d44d">■</span> Residential: <span id="p2">0</span>%<br>
  <span style="color:#e87d00">■</span> Commercial: <span id="p3">0</span>%<br>
  <span style="color:#d9534f">■</span> Industrial: <span id="p4">0</span>%<br>
  <span style="color:#888">■</span> Road: <span id="p5">0</span>%
</div>
<div id="keys">R reset · click seed city</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const CS=4;
  // Zone types
  const WILD=0, SUBURBAN=1, RESIDENTIAL=2, COMMERCIAL=3, INDUSTRIAL=4, ROAD=5;
  // HSB colors per zone
  const ZONE_COLORS=[
    [115,80,20],   // WILD: dark green
    [100,60,55],   // SUBURBAN: medium green
    [55,75,85],    // RESIDENTIAL: yellow
    [30,85,80],    // COMMERCIAL: orange
    [0,75,70],     // INDUSTRIAL: red
    [0,0,35],      // ROAD: dark grey
  ];
  let cols,rows,grid,next;
  let gen=0;
  let fpsTimer=0,fpsCount=0,fpsVal=0;

  p.setup=function(){
    p.createCanvas(p.windowWidth,p.windowHeight);
    p.colorMode(p.HSB,360,100,100,100);
    p.pixelDensity(1);
    cols=Math.floor(p.width/CS); rows=Math.floor(p.height/CS);
    grid=new Uint8Array(cols*rows);
    next=new Uint8Array(cols*rows);
    reset();
  };

  function idx(c,r){ return r*cols+c; }
  function g(c,r){ if(c<0||c>=cols||r<0||r>=rows)return-1; return grid[idx(c,r)]; }

  function placeRoads(){
    // Major arteries: horizontal and vertical
    const roadSpacing=Math.floor(Math.min(rows,cols)/6);
    // Horizontals
    for(let r=roadSpacing;r<rows;r+=roadSpacing){
      for(let c=0;c<cols;c++) grid[idx(c,r)]=ROAD;
    }
    // Verticals
    for(let c=roadSpacing;c<cols;c+=roadSpacing){
      for(let r=0;r<rows;r++) grid[idx(c,r)]=ROAD;
    }
  }

  function isNearRoad(c,r,radius){
    for(let dr=-radius;dr<=radius;dr++) for(let dc=-radius;dc<=radius;dc++){
      if(g(c+dc,r+dr)===ROAD) return true;
    }
    return false;
  }

  function countZone(c,r,zone,radius){
    let cnt=0;
    for(let dr=-radius;dr<=radius;dr++) for(let dc=-radius;dc<=radius;dc++){
      if(dr===0&&dc===0) continue;
      if(g(c+dc,r+dr)===zone) cnt++;
    }
    return cnt;
  }

  function reset(){
    gen=0;
    grid.fill(WILD);
    placeRoads();
    // Seed one city center
    const cx=Math.floor(cols/2), cy=Math.floor(rows/2);
    for(let dr=-3;dr<=3;dr++) for(let dc=-3;dc<=3;dc++){
      const c=cx+dc, r=cy+dr;
      if(c>=0&&c<cols&&r>=0&&r<rows&&grid[idx(c,r)]!==ROAD)
        grid[idx(c,r)]=COMMERCIAL;
    }
    // A few suburban seeds near roads
    for(let i=0;i<20;i++){
      const c=Math.floor(Math.random()*cols), r=Math.floor(Math.random()*rows);
      if(grid[idx(c,r)]===WILD&&isNearRoad(c,r,2)) grid[idx(c,r)]=SUBURBAN;
    }
  }

  function step(){
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const i=idx(c,r);
        const v=grid[i];
        if(v===ROAD){ next[i]=ROAD; continue; }

        const nearRoad=isNearRoad(c,r,1);
        const nearRoad3=isNearRoad(c,r,3);
        const subCount=countZone(c,r,SUBURBAN,2);
        const resCount=countZone(c,r,RESIDENTIAL,2);
        const comCount=countZone(c,r,COMMERCIAL,2);
        const indCount=countZone(c,r,INDUSTRIAL,2);

        let newZone=v;
        const rnd=Math.random();

        if(v===WILD){
          // Grow to suburban if near road and near other development
          if(nearRoad3&&(subCount>0||resCount>0)&&rnd<0.003) newZone=SUBURBAN;
          else if(nearRoad&&rnd<0.001) newZone=SUBURBAN;
        }
        else if(v===SUBURBAN){
          // Upgrade to residential if dense suburban/road pressure
          if(subCount>=3&&nearRoad&&rnd<0.005) newZone=RESIDENTIAL;
        }
        else if(v===RESIDENTIAL){
          // Upgrade to commercial if near road intersection and commercial neighbors
          if(comCount>=1&&nearRoad&&rnd<0.003) newZone=COMMERCIAL;
          // Some become industrial away from center
          else if(indCount>=1&&!nearRoad&&rnd<0.002) newZone=INDUSTRIAL;
        }
        else if(v===COMMERCIAL){
          // Attract industrial neighbors
          if(indCount===0&&rnd<0.002) newZone=INDUSTRIAL;
        }
        // Rarely downgrade (urban decay)
        if(newZone>WILD&&Math.random()<0.00005) newZone=Math.max(WILD,newZone-1);

        next[i]=newZone;
      }
    }
    const tmp=grid; grid=next; next=tmp;
    gen++;
  }

  p.draw=function(){
    fpsCount++;
    const now=performance.now();
    if(now-fpsTimer>=500){
      fpsVal=Math.round(fpsCount/((now-fpsTimer)/1000));
      fpsCount=0; fpsTimer=now;
    }

    if(p.mouseIsPressed){
      const mc=Math.floor(p.mouseX/CS), mr=Math.floor(p.mouseY/CS);
      for(let dr=-4;dr<=4;dr++) for(let dc=-4;dc<=4;dc++){
        const c=mc+dc, r=mr+dr;
        if(c>=0&&c<cols&&r>=0&&r<rows&&grid[idx(c,r)]!==ROAD)
          grid[idx(c,r)]=COMMERCIAL;
      }
    }

    for(let s=0;s<2;s++) step();

    // Count zones
    const cnts=new Array(6).fill(0);
    for(let i=0;i<cols*rows;i++) cnts[grid[i]]++;
    const total=cols*rows;

    p.loadPixels();
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const v=grid[idx(c,r)];
        const[h,s2,b]=ZONE_COLORS[v];
        // Add slight noise for texture
        const noise=((c*3+r*7)%17)/17;
        const[R,G,B]=hsbToRgb(h+noise*8,s2+noise*10,b+noise*15);
        for(let py=0;py<CS;py++) for(let px=0;px<CS;px++){
          const pi=4*((r*CS+py)*p.width+(c*CS+px));
          p.pixels[pi]=R; p.pixels[pi+1]=G; p.pixels[pi+2]=B; p.pixels[pi+3]=255;
        }
      }
    }
    p.updatePixels();

    // Road grid overlay (draw roads slightly brighter)
    // (Already handled by ROAD zone color in pixels above)

    document.getElementById('fps').textContent=fpsVal;
    document.getElementById('gen').textContent=gen;
    ['p0','p1','p2','p3','p4','p5'].forEach((id,i)=>{
      document.getElementById(id).textContent=Math.round(cnts[i]/total*100);
    });
  };

  function hsbToRgb(h,s,b){
    h=((h%360)+360)%360; s/=100; b/=100;
    const c=b*s,x=c*(1-Math.abs((h/60)%2-1)),m=b-c;
    let r=0,g=0,bl=0;
    if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;bl=x;}
    else if(h<240){g=x;bl=c;}else if(h<300){r=x;bl=c;}else{r=c;bl=x;}
    return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((bl+m)*255)];
  }

  p.keyPressed=function(){
    if(p.key==='r'||p.key==='R') reset();
  };

  p.windowResized=function(){
    p.resizeCanvas(p.windowWidth,p.windowHeight);
    cols=Math.floor(p.width/CS); rows=Math.floor(p.height/CS);
    grid=new Uint8Array(cols*rows); next=new Uint8Array(cols*rows);
    reset();
  };
});
</script>
</body>
</html>
