<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curl Noise Flow Field — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const NUM_PARTICLES = 3000;
const SPEED = 2.2;
const NOISE_SCALE = 0.0018;
const NOISE_Z_SCALE = 0.003;
const EPSILON = 0.1;

let particles = [];
let t = 0;
let fpsEl;
let lastFpsTime = 0;
let frameCount2 = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(min(pixelDensity(), 2));
  background(0, 0, 8);
  fpsEl = document.getElementById('fps');
  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push(newParticle());
  }
  strokeWeight(1.5);
  noFill();
}

function newParticle() {
  return {
    x: random(width),
    y: random(height),
    life: random(80, 220),
    maxLife: 0,
    hue: random(360),
    speed: random(0.7, 1.4),
    px: 0,
    py: 0,
    born: false
  };
}

function curlNoise(x, y, z) {
  // Compute curl of 3D noise field (divergence-free)
  // curl(F) where F = (n1, n2, n3): x-component = dn3/dy - dn2/dz, y-component = dn1/dz - dn3/dx
  let n1 = noise(x * NOISE_SCALE, y * NOISE_SCALE, z);
  let n1dy = noise(x * NOISE_SCALE, (y + EPSILON) * NOISE_SCALE, z);
  let n1dz = noise(x * NOISE_SCALE, y * NOISE_SCALE, z + EPSILON);

  let n2 = noise(x * NOISE_SCALE + 100, y * NOISE_SCALE + 100, z);
  let n2dz = noise(x * NOISE_SCALE + 100, y * NOISE_SCALE + 100, z + EPSILON);
  let n2dx = noise((x + EPSILON) * NOISE_SCALE + 100, y * NOISE_SCALE + 100, z);

  let n3 = noise(x * NOISE_SCALE + 200, y * NOISE_SCALE + 200, z);
  let n3dx = noise((x + EPSILON) * NOISE_SCALE + 200, y * NOISE_SCALE + 200, z);
  let n3dy = noise(x * NOISE_SCALE + 200, (y + EPSILON) * NOISE_SCALE + 200, z);

  let curlX = ((n3dy - n2dz) / EPSILON) * 2;
  let curlY = ((n1dz - n3dx) / EPSILON) * 2;

  return { x: curlX, y: curlY };
}

function draw() {
  // Semi-transparent background for trails
  background(0, 0, 8, 10);
  blendMode(ADD);

  frameCount2++;
  let now = millis();
  if (now - lastFpsTime > 500) {
    let fps = round(frameCount2 / ((now - lastFpsTime) / 1000));
    fpsEl.textContent = fps + ' fps';
    frameCount2 = 0;
    lastFpsTime = now;
  }

  let z = t * NOISE_Z_SCALE;

  for (let p of particles) {
    if (!p.born) {
      p.px = p.x;
      p.py = p.y;
      p.maxLife = p.life;
      p.born = true;
    }

    let curl = curlNoise(p.x, p.y, z);

    let angle = atan2(curl.y, curl.x);
    // Hue follows direction
    p.hue = (degrees(angle) + 360 + frameCount * 0.03) % 360;

    let vx = curl.x * SPEED * p.speed;
    let vy = curl.y * SPEED * p.speed;

    p.px = p.x;
    p.py = p.y;
    p.x += vx;
    p.y += vy;

    // Wrap edges
    if (p.x < 0) { p.x += width; p.px = p.x; }
    if (p.x > width) { p.x -= width; p.px = p.x; }
    if (p.y < 0) { p.y += height; p.py = p.y; }
    if (p.y > height) { p.y -= height; p.py = p.y; }

    p.life--;
    let alpha = map(p.life, 0, p.maxLife, 0, 80) * min(1, (p.maxLife - p.life) / 20);

    stroke(p.hue, 90, 100, alpha);
    line(p.px, p.py, p.x, p.y);

    if (p.life <= 0) {
      let np = newParticle();
      p.x = np.x; p.y = np.y; p.life = np.life;
      p.maxLife = 0; p.born = false;
      p.speed = np.speed; p.hue = np.hue;
    }
  }

  blendMode(BLEND);
  t++;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(0, 0, 8);
}
</script>
</body></html>
