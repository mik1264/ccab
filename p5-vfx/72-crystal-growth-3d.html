<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystal Growth 3D | P5.js VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#666; font-family:monospace; font-size:12px; text-align:center; pointer-events:none; }
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Gallery</a>
<div id="fps">FPS: --</div>
<div id="info">Crystal Growth 3D · DLA · Drag to rotate</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

new p5(function(p) {
  const MAX_AGGREGATE = 2000;
  const NUM_WALKERS = 5;
  const STICK_DIST = 2.2;
  const SPAWN_RADIUS = 80;
  const STEPS_PER_FRAME = 60; // walker steps per frame

  // Aggregate: arrays of positions + distance-from-origin
  let aggX = [], aggY = [], aggZ = [], aggDist = [];
  let aggCount = 0;
  let maxDist = 1; // for color normalization

  // Walkers
  let walkers = [];

  let fpsEl, infoEl;
  let fpsTime = 0, fpsFrames = 0;
  let done = false;

  function spawnWalker() {
    // Spawn on sphere slightly outside current aggregate
    const r = Math.max(SPAWN_RADIUS, maxDist * 1.5);
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    return {
      x: r * Math.sin(phi) * Math.cos(theta),
      y: r * Math.sin(phi) * Math.sin(theta),
      z: r * Math.cos(phi)
    };
  }

  function checkStick(w) {
    // Check against all aggregate points
    for (let i = 0; i < aggCount; i++) {
      const dx = w.x - aggX[i];
      const dy = w.y - aggY[i];
      const dz = w.z - aggZ[i];
      if (dx*dx + dy*dy + dz*dz < STICK_DIST * STICK_DIST) return true;
    }
    return false;
  }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    fpsEl  = document.getElementById('fps');
    infoEl = document.getElementById('info');

    // Seed at origin
    aggX.push(0); aggY.push(0); aggZ.push(0); aggDist.push(0);
    aggCount = 1;

    // Initial walkers
    for (let i = 0; i < NUM_WALKERS; i++) walkers.push(spawnWalker());
  };

  p.draw = function() {
    p.background(0, 0, 4, 100);
    p.blendMode(p.ADD);

    // FPS
    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(fpsFrames * 1000 / (now - fpsTime));
      fpsFrames = 0; fpsTime = now;
    }

    // Auto-rotate
    p.rotateX(0.3);
    p.rotateY(p.frameCount * 0.005);

    // DLA: step walkers
    if (!done) {
      for (let step = 0; step < STEPS_PER_FRAME; step++) {
        if (aggCount >= MAX_AGGREGATE) { done = true; break; }

        for (let wi = 0; wi < walkers.length; wi++) {
          const w = walkers[wi];

          // Kill if too far
          const dist2 = w.x*w.x + w.y*w.y + w.z*w.z;
          if (dist2 > (maxDist * 3 + SPAWN_RADIUS) * (maxDist * 3 + SPAWN_RADIUS)) {
            walkers[wi] = spawnWalker();
            continue;
          }

          // Random step
          w.x += (Math.random() - 0.5) * 2;
          w.y += (Math.random() - 0.5) * 2;
          w.z += (Math.random() - 0.5) * 2;

          // Check stick
          if (checkStick(w) || (aggCount === 1 && w.x*w.x + w.y*w.y + w.z*w.z < STICK_DIST * STICK_DIST)) {
            const d = Math.sqrt(w.x*w.x + w.y*w.y + w.z*w.z);
            aggX.push(w.x); aggY.push(w.y); aggZ.push(w.z); aggDist.push(d);
            aggCount++;
            if (d > maxDist) maxDist = d;
            walkers[wi] = spawnWalker();
          }
        }
      }
    }

    // Draw aggregate as glowing points
    p.strokeWeight(3);
    p.beginShape(p.POINTS);
    for (let i = 0; i < aggCount; i++) {
      const t = aggDist[i] / (maxDist + 0.001);
      // center = white/cyan (hue 180), outer = blue/violet (hue 250)
      const h = p.lerp(180, 260, t);
      const s = p.lerp(20, 90, t);
      const b = p.lerp(100, 60, t);
      const a = p.lerp(90, 60, t);
      p.stroke(h, s, b, a);
      p.vertex(aggX[i], aggY[i], aggZ[i]);
    }
    p.endShape();

    // Inner glow pass (larger points, lower alpha)
    p.strokeWeight(7);
    p.beginShape(p.POINTS);
    for (let i = 0; i < aggCount; i++) {
      const t = aggDist[i] / (maxDist + 0.001);
      const h = p.lerp(180, 260, t);
      const s = p.lerp(20, 90, t);
      const b = p.lerp(100, 60, t);
      p.stroke(h, s, b, 15);
      p.vertex(aggX[i], aggY[i], aggZ[i]);
    }
    p.endShape();

    p.blendMode(p.BLEND);

    // Overlay text using resetMatrix
    p.resetMatrix();
    const label = done ? 'Crystal complete · ' + MAX_AGGREGATE + ' points' : 'Growing · ' + aggCount + ' / ' + MAX_AGGREGATE + ' points';
    infoEl.textContent = 'Crystal Growth 3D · DLA · ' + label + ' · Drag to rotate';
  };

  p.windowResized = function() { p.resizeCanvas(window.innerWidth, window.innerHeight); };
});
</script>
</body>
</html>
