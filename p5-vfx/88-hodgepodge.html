<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hodgepodge Machine | P5.js VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
.back-link {
  position: fixed; top: 16px; left: 16px; z-index: 100;
  color: rgba(255,255,255,0.6); text-decoration: none;
  font-size: 13px; letter-spacing: 0.05em;
  background: rgba(255,255,255,0.08);
  padding: 6px 12px; border-radius: 20px;
  transition: background 0.2s;
}
.back-link:hover { background: rgba(255,255,255,0.18); color: #fff; }
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Gallery</a>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

const COLS = 300;
const ROWS = 300;
const N = 100;
const K1 = 2;
const K2 = 3;
const G = 10;

let grid, next;
let pg;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(1);

  grid = new Uint8Array(COLS * ROWS);
  next = new Uint8Array(COLS * ROWS);

  // Random init
  for (let i = 0; i < grid.length; i++) {
    grid[i] = floor(random(N + 1));
  }

  pg = createGraphics(COLS, ROWS);
  pg.pixelDensity(1);
}

function idx(x, y) {
  return ((y + ROWS) % ROWS) * COLS + ((x + COLS) % COLS);
}

function stepHodgepodge() {
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      let val = grid[idx(x, y)];

      // Count neighbors
      let infectedCount = 0; // val > 0
      let illCount = 0;       // 0 < val < N
      let sumIll = 0;
      let numIll = 0;

      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          if (dx === 0 && dy === 0) continue;
          let nv = grid[idx(x + dx, y + dy)];
          if (nv > 0) infectedCount++;
          if (nv > 0 && nv < N) {
            illCount++;
            sumIll += nv;
            numIll++;
          }
        }
      }

      let newVal;
      if (val === 0) {
        // Healthy: becomes infected based on neighbors
        newVal = floor(infectedCount / K1) + floor(illCount / K2);
        newVal = min(newVal, N);
      } else if (val === N) {
        // Fully infected: recovers to healthy... wait, Dewdney says N goes to 0
        // Actually: cells at N are "sick" and become 0 next step (recovered)
        newVal = 0;
      } else {
        // Ill: average of ill neighbors + g
        if (numIll > 0) {
          newVal = floor(sumIll / numIll) + G;
        } else {
          newVal = val + G;
        }
        newVal = min(newVal, N);
      }

      next[idx(x, y)] = newVal;
    }
  }

  let tmp = grid;
  grid = next;
  next = tmp;
}

function valToColor(v) {
  // 0 = dark blue, N/2 = green, N = hot red/white
  let t = v / N;
  let hue, sat, bri;
  if (t < 0.5) {
    // blue -> green
    hue = lerp(240, 120, t * 2);
    sat = lerp(80, 90, t * 2);
    bri = lerp(20, 75, t * 2);
  } else {
    // green -> red/white
    hue = lerp(120, 0, (t - 0.5) * 2);
    sat = lerp(90, 60, (t - 0.5) * 2);
    bri = lerp(75, 100, (t - 0.5) * 2);
  }
  if (v === N) { hue = 50; sat = 20; bri = 100; }
  return [hue, sat, bri];
}

function draw() {
  // 3 steps per frame
  stepHodgepodge();
  stepHodgepodge();
  stepHodgepodge();

  pg.loadPixels();
  for (let i = 0; i < COLS * ROWS; i++) {
    let v = grid[i];
    let [h, s, b] = valToColor(v);
    // Convert HSB to RGB manually
    let r, g, bl;
    if (s === 0) {
      r = g = bl = floor(b * 2.55);
    } else {
      let hh = h / 60;
      let fi = floor(hh);
      let f = hh - fi;
      let p = b * (1 - s / 100) * 2.55;
      let q = b * (1 - s / 100 * f) * 2.55;
      let t2 = b * (1 - s / 100 * (1 - f)) * 2.55;
      let bv = b * 2.55;
      switch (fi % 6) {
        case 0: r = bv; g = t2; bl = p; break;
        case 1: r = q;  g = bv; bl = p; break;
        case 2: r = p;  g = bv; bl = t2; break;
        case 3: r = p;  g = q;  bl = bv; break;
        case 4: r = t2; g = p;  bl = bv; break;
        case 5: r = bv; g = p;  bl = q; break;
        default: r = g = bl = 0;
      }
    }
    let pi = i * 4;
    pg.pixels[pi]     = floor(r);
    pg.pixels[pi + 1] = floor(g);
    pg.pixels[pi + 2] = floor(bl);
    pg.pixels[pi + 3] = 255;
  }
  pg.updatePixels();

  background(0);
  let sz = min(width, height);
  let ox = (width - sz) / 2;
  let oy = (height - sz) / 2;
  image(pg, ox, oy, sz, sz);

  // ADD blend glow for fully-infected (N) cells
  blendMode(ADD);
  noStroke();
  for (let gy = 0; gy < ROWS; gy += 3) {
    for (let gx = 0; gx < COLS; gx += 3) {
      let v = grid[gy * COLS + gx];
      if (v >= N - 5) {
        fill(50, 80, 100, 20);
        let px2 = ox + gx / COLS * sz;
        let py2 = oy + gy / ROWS * sz;
        circle(px2, py2, 10);
      }
    }
  }
  blendMode(BLEND);

  // Title
  fill(30, 90, 100, 70);
  noStroke();
  textSize(13);
  textAlign(RIGHT);
  text('Hodgepodge Machine', width - 20, height - 20);
  fill(0, 0, 70, 40);
  textSize(11);
  text('Belousov-Zhabotinsky reaction  k1=' + K1 + ' k2=' + K2 + ' g=' + G, width - 20, height - 6);
}

function mousePressed() {
  // Seed a small random patch
  let sz = min(width, height);
  let ox = (width - sz) / 2;
  let oy = (height - sz) / 2;
  let gx = floor((mouseX - ox) / sz * COLS);
  let gy = floor((mouseY - oy) / sz * ROWS);
  for (let dy = -5; dy <= 5; dy++) {
    for (let dx = -5; dx <= 5; dx++) {
      let ix = ((gx + dx) % COLS + COLS) % COLS;
      let iy = ((gy + dy) % ROWS + ROWS) % ROWS;
      grid[iy * COLS + ix] = floor(random(N + 1));
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
