<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Game IFS | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        new p5(function(p) {
            // Each IFS: array of transforms {a,b,c,d,e,f,prob,hue}
            // Apply: x' = a*x + b*y + e,  y' = c*x + d*y + f
            const IFS_SYSTEMS = [
                // 0: Sierpinski Triangle
                {
                    name: 'Sierpinski Triangle',
                    baseHue: 120,
                    transforms: [
                        { a:0.5,  b:0,    c:0,    d:0.5,  e:-1,   f:-1,   p:0.333 },
                        { a:0.5,  b:0,    c:0,    d:0.5,  e:1,    f:-1,   p:0.333 },
                        { a:0.5,  b:0,    c:0,    d:0.5,  e:0,    f:1,    p:0.334 }
                    ]
                },
                // 1: Barnsley Fern
                {
                    name: 'Barnsley Fern',
                    baseHue: 100,
                    transforms: [
                        { a:0,    b:0,    c:0,    d:0.16, e:0,    f:0,    p:0.01  },
                        { a:0.85, b:0.04, c:-0.04,d:0.85, e:0,    f:1.6,  p:0.85  },
                        { a:0.2,  b:-0.26,c:0.23, d:0.22, e:0,    f:1.6,  p:0.07  },
                        { a:-0.15,b:0.28, c:0.26, d:0.24, e:0,    f:0.44, p:0.07  }
                    ]
                },
                // 2: Dragon Curve
                {
                    name: 'Dragon Curve',
                    baseHue: 200,
                    transforms: [
                        { a:0.5,  b:-0.5, c:0.5,  d:0.5,  e:0,    f:0,    p:0.5   },
                        { a:-0.5, b:-0.5, c:0.5,  d:-0.5, e:1,    f:0,    p:0.5   }
                    ]
                },
                // 3: Levy C Curve
                {
                    name: 'Lévy C Curve',
                    baseHue: 270,
                    transforms: [
                        { a:0.5,  b:-0.5, c:0.5,  d:0.5,  e:0,    f:0,    p:0.5   },
                        { a:0.5,  b:0.5,  c:-0.5, d:0.5,  e:0.5,  f:0.5,  p:0.5   }
                    ]
                },
                // 4: Pentaflake
                {
                    name: 'Pentaflake',
                    baseHue: 40,
                    transforms: (function() {
                        const s = 1 / (1 + (1 + Math.sqrt(5)) / 2);
                        const transforms = [];
                        // Center
                        transforms.push({ a:s, b:0, c:0, d:s, e:0, f:0, p:1/6 });
                        // 5 outer
                        for (let k = 0; k < 5; k++) {
                            const ang = (k / 5) * Math.PI * 2 - Math.PI / 2;
                            const ex = (1 - s) * Math.cos(ang);
                            const fy = (1 - s) * Math.sin(ang);
                            transforms.push({ a:s, b:0, c:0, d:s, e:ex, f:fy, p:1/6 });
                        }
                        return transforms;
                    })()
                },
                // 5: Custom "Crystal Star"
                {
                    name: 'Crystal Star',
                    baseHue: 300,
                    transforms: [
                        { a:0.382,b:-0.322,c:0.322,d:0.382, e:0.5,  f:0,    p:0.2   },
                        { a:0.382,b:0.322, c:-0.322,d:0.382,e:-0.5, f:0,    p:0.2   },
                        { a:0.382,b:-0.322,c:0.322, d:0.382,e:0,    f:0.5,  p:0.2   },
                        { a:0.382,b:0.322, c:-0.322,d:0.382,e:0,    f:-0.5, p:0.2   },
                        { a:0.5,  b:0,     c:0,     d:0.5,  e:0,    f:0,    p:0.2   }
                    ]
                }
            ];

            const POINTS_PER_FRAME = 6000;
            const MORPH_DURATION   = 120; // frames
            const HOLD_DURATION    = 240; // frames (~4s at 60fps)

            let currentIdx = 0;
            let nextIdx    = 1;
            let phase      = 'hold'; // 'hold' | 'morph'
            let timer      = 0;
            let morphT     = 0;

            // Current "active" transforms (blended)
            let activeTransforms = [];

            // IFS state
            let cx = 0, cy = 0;
            let fpsArr = [], lastTime = 0;

            function buildCDF(transforms) {
                const cdf = [];
                let acc = 0;
                for (const t of transforms) { acc += t.p; cdf.push(acc); }
                return cdf;
            }

            function chooseTransform(transforms, cdf) {
                const r = Math.random();
                for (let i = 0; i < cdf.length; i++) {
                    if (r <= cdf[i]) return transforms[i];
                }
                return transforms[transforms.length - 1];
            }

            function lerpTransform(ta, tb, t) {
                return {
                    a: ta.a + (tb.a - ta.a) * t,
                    b: ta.b + (tb.b - ta.b) * t,
                    c: ta.c + (tb.c - ta.c) * t,
                    d: ta.d + (tb.d - ta.d) * t,
                    e: ta.e + (tb.e - ta.e) * t,
                    f: ta.f + (tb.f - ta.f) * t,
                    p: ta.p + (tb.p - ta.p) * t,
                    hue: (ta.hue || 0) + ((tb.hue || 0) - (ta.hue || 0)) * t
                };
            }

            function blendSystems(sysA, sysB, t) {
                // Pad shorter system to match longer
                const lenA = sysA.transforms.length;
                const lenB = sysB.transforms.length;
                const maxLen = Math.max(lenA, lenB);
                const result = [];
                for (let i = 0; i < maxLen; i++) {
                    const tA = sysA.transforms[i % lenA];
                    const tB = sysB.transforms[i % lenB];
                    const blended = lerpTransform(tA, tB, t);
                    // Hue blend from baseHue
                    blended.hue = sysA.baseHue + (sysB.baseHue - sysA.baseHue) * t + i * 30;
                    blended.p = 1 / maxLen; // normalize probabilities
                    result.push(blended);
                }
                return result;
            }

            function getActiveTransforms() {
                if (phase === 'hold') {
                    const sys = IFS_SYSTEMS[currentIdx];
                    return sys.transforms.map((t, i) => ({
                        ...t, hue: sys.baseHue + i * 30
                    }));
                } else {
                    return blendSystems(IFS_SYSTEMS[currentIdx], IFS_SYSTEMS[nextIdx], morphT);
                }
            }

            // Scale/offset for display
            function getScaleBounds() {
                const sys = IFS_SYSTEMS[currentIdx];
                // Different fractals have different coordinate ranges
                const scales = [
                    { sx: 280, sy: 280, ox: 0, oy: 0 },     // Sierpinski
                    { sx: 90,  sy: -90, ox: 0, oy: 230 },    // Barnsley Fern
                    { sx: 200, sy: 200, ox: 0, oy: 0 },      // Dragon
                    { sx: 250, sy: -250, ox: 0, oy: 200 },   // Levy
                    { sx: 260, sy: 260, ox: 0, oy: 0 },      // Pentaflake
                    { sx: 260, sy: 260, ox: 0, oy: 0 }       // Crystal
                ];
                const sA = scales[currentIdx];
                const sB = scales[nextIdx];
                return {
                    sx: sA.sx + (sB.sx - sA.sx) * (phase === 'morph' ? morphT : 0),
                    sy: sA.sy + (sB.sy - sA.sy) * (phase === 'morph' ? morphT : 0),
                    ox: sA.ox + (sB.ox - sA.ox) * (phase === 'morph' ? morphT : 0),
                    oy: sA.oy + (sB.oy - sA.oy) * (phase === 'morph' ? morphT : 0)
                };
            }

            p.setup = function() {
                p.createCanvas(p.windowWidth, p.windowHeight);
                p.colorMode(p.HSB, 360, 100, 100, 100);
                p.background(240, 30, 4);
                p.blendMode(p.ADD);
                activeTransforms = getActiveTransforms();
            };

            p.draw = function() {
                // Fade background slowly for density accumulation
                p.blendMode(p.BLEND);
                p.fill(240, 30, 4, 8);
                p.noStroke();
                p.rect(0, 0, p.width, p.height);
                p.blendMode(p.ADD);

                // Update state machine
                timer++;
                if (phase === 'hold' && timer >= HOLD_DURATION) {
                    phase = 'morph';
                    timer = 0;
                    morphT = 0;
                    nextIdx = (currentIdx + 1) % IFS_SYSTEMS.length;
                } else if (phase === 'morph') {
                    morphT = Math.min(timer / MORPH_DURATION, 1);
                    if (morphT >= 1) {
                        phase = 'hold';
                        currentIdx = nextIdx;
                        timer = 0;
                        morphT = 0;
                    }
                }

                activeTransforms = getActiveTransforms();
                const cdf = buildCDF(activeTransforms);
                const bounds = getScaleBounds();
                const cx2 = p.width  / 2 + bounds.ox;
                const cy2 = p.height / 2 + bounds.oy;

                // Iterate chaos game
                for (let i = 0; i < POINTS_PER_FRAME; i++) {
                    const t = chooseTransform(activeTransforms, cdf);
                    const nx = t.a * cx + t.b * cy + t.e;
                    const ny = t.c * cx + t.d * cy + t.f;
                    cx = nx; cy = ny;

                    const sx = cx * bounds.sx + cx2;
                    const sy = cy * bounds.sy + cy2;

                    if (sx < 0 || sx > p.width || sy < 0 || sy > p.height) continue;

                    const hue = (t.hue + p.frameCount * 0.3) % 360;
                    p.stroke(hue, 75, 90, 18);
                    p.point(sx, sy);
                }

                // FPS overlay
                p.blendMode(p.BLEND);
                const now = p.millis();
                const dt = now - lastTime; lastTime = now;
                fpsArr.push(1000 / Math.max(dt, 1));
                if (fpsArr.length > 30) fpsArr.shift();
                const fps = Math.round(fpsArr.reduce((a, b) => a + b, 0) / fpsArr.length);
                p.noStroke();
                p.fill(0, 0, 0, 60);
                p.rect(p.width - 82, 8, 74, 26, 4);
                p.fill(0, 0, 100, 80);
                p.textFont('monospace');
                p.textSize(13);
                p.textAlign(p.RIGHT);
                p.text(`FPS: ${fps}`, p.width - 12, 26);

                // Name label
                const sysName = IFS_SYSTEMS[currentIdx].name;
                const nextName = IFS_SYSTEMS[nextIdx].name;
                const label = phase === 'morph'
                    ? `${sysName} → ${nextName}`
                    : sysName;
                p.fill(0, 0, 0, 60);
                p.rect(8, p.height - 36, label.length * 8 + 16, 26, 4);
                p.fill(0, 0, 80, 80);
                p.textAlign(p.LEFT);
                p.textSize(13);
                p.text(label, 16, p.height - 18);

                p.blendMode(p.ADD);
            };

            p.windowResized = function() {
                p.resizeCanvas(p.windowWidth, p.windowHeight);
                p.background(240, 30, 4);
            };
        });
    </script>
</body>
</html>
