<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lenia — Continuous CA | P5 VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#hud { position:fixed; top:12px; right:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.75); padding:8px 12px; border-radius:6px; z-index:999; line-height:1.9; }
#keys { position:fixed; bottom:12px; left:12px; color:#444; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:4px; z-index:999; line-height:1.6; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="hud">
  FPS: <span id="fps">0</span><br>
  GEN: <span id="gen">0</span><br>
  μ=0.15 σ=0.015<br>
  R=13
</div>
<div id="keys">R reset · click add organism</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  // Lenia parameters (Orbium)
  const MU = 0.15, SIGMA = 0.015, R = 13;
  const DT = 0.1;
  const CS = 2; // render scale
  let cols, rows;
  let grid, next;
  let kernel; // precomputed kernel (2R+1)^2
  let gen=0;
  let fpsTimer=0,fpsCount=0,fpsVal=0;
  let kernelR=[];

  p.setup=function(){
    p.createCanvas(p.windowWidth,p.windowHeight);
    p.colorMode(p.HSB,360,100,100,100);
    p.pixelDensity(1);
    cols=Math.floor(p.width/CS);
    rows=Math.floor(p.height/CS);
    grid=new Float32Array(cols*rows);
    next=new Float32Array(cols*rows);
    buildKernel();
    reset();
  };

  function buildKernel(){
    // Bell-curve kernel: K(r) = exp(4 * (1 - (r/R)^2)) * (r < R)
    // Normalize so sum = 1
    const D=2*R+1;
    kernelR=[];
    let sum=0;
    for(let dy=-R;dy<=R;dy++){
      for(let dx=-R;dx<=R;dx++){
        const r=Math.sqrt(dx*dx+dy*dy)/R;
        const v=r<=1?Math.exp(4*(1-r*r)):0;
        kernelR.push({dx,dy,v});
        sum+=v;
      }
    }
    kernelR.forEach(k=>k.v/=sum);
  }

  function growthFn(u){
    // Growth = 2 * exp(-(u-MU)^2 / (2*SIGMA^2)) - 1
    const d=(u-MU)/SIGMA;
    return 2*Math.exp(-0.5*d*d)-1;
  }

  // Place Orbium pattern (approximation of the known stable creature)
  function placeOrbium(cx,cy){
    // Circular patch with specific profile
    for(let dy=-R;dy<=R;dy++){
      for(let dx=-R;dx<=R;dx++){
        const r=Math.sqrt(dx*dx+dy*dy)/R;
        if(r<=1){
          const v=Math.exp(4*(1-r*r));
          const c=(cx+dx+cols)%cols, row=(cy+dy+rows)%rows;
          grid[row*cols+c]=Math.min(1,grid[row*cols+c]+v*0.25);
        }
      }
    }
  }

  function reset(){
    grid.fill(0);
    gen=0;
    // Seed with multiple Orbiums
    const positions=[
      [Math.floor(cols*0.3),Math.floor(rows*0.3)],
      [Math.floor(cols*0.7),Math.floor(rows*0.3)],
      [Math.floor(cols*0.5),Math.floor(rows*0.65)],
      [Math.floor(cols*0.2),Math.floor(rows*0.7)],
      [Math.floor(cols*0.8),Math.floor(rows*0.7)],
    ];
    positions.forEach(([cx,cy])=>placeOrbium(cx,cy));
    // Random noise spots to seed more creatures
    for(let i=0;i<3000;i++){
      const c=Math.floor(Math.random()*cols), r=Math.floor(Math.random()*rows);
      grid[r*cols+c]=Math.random()*0.5;
    }
  }

  function step(){
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        let u=0;
        for(let ki=0;ki<kernelR.length;ki++){
          const k=kernelR[ki];
          const rr=(r+k.dy+rows)%rows, cc=(c+k.dx+cols)%cols;
          u+=grid[rr*cols+cc]*k.v;
        }
        const g=growthFn(u);
        next[r*cols+c]=Math.max(0,Math.min(1,grid[r*cols+c]+DT*g));
      }
    }
    const tmp=grid; grid=next; next=tmp;
    gen++;
  }

  p.draw=function(){
    fpsCount++;
    const now=performance.now();
    if(now-fpsTimer>=500){
      fpsVal=Math.round(fpsCount/((now-fpsTimer)/1000));
      fpsCount=0; fpsTimer=now;
    }

    if(p.mouseIsPressed){
      const mc=Math.floor(p.mouseX/CS), mr=Math.floor(p.mouseY/CS);
      placeOrbium(mc,mr);
    }

    step();

    p.loadPixels();
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const v=grid[r*cols+c];
        let R2=0,G2=0,B2=0;
        if(v>0.001){
          // Palette: black->deep blue->cyan->white
          const t=Math.pow(v,0.7);
          if(t<0.25){
            const f=t/0.25;
            R2=0; G2=0; B2=Math.round(f*200);
          } else if(t<0.5){
            const f=(t-0.25)/0.25;
            R2=0; G2=Math.round(f*200); B2=200;
          } else if(t<0.75){
            const f=(t-0.5)/0.25;
            R2=Math.round(f*100); G2=200; B2=255;
          } else {
            const f=(t-0.75)/0.25;
            R2=Math.round(100+f*155); G2=Math.round(200+f*55); B2=255;
          }
        }
        for(let py=0;py<CS;py++) for(let px=0;px<CS;px++){
          const pi=4*((r*CS+py)*p.width+(c*CS+px));
          p.pixels[pi]=R2; p.pixels[pi+1]=G2; p.pixels[pi+2]=B2; p.pixels[pi+3]=255;
        }
      }
    }
    p.updatePixels();

    document.getElementById('fps').textContent=fpsVal;
    document.getElementById('gen').textContent=gen;
  };

  p.keyPressed=function(){
    if(p.key==='r'||p.key==='R') reset();
  };

  p.windowResized=function(){
    p.resizeCanvas(p.windowWidth,p.windowHeight);
    cols=Math.floor(p.width/CS); rows=Math.floor(p.height/CS);
    grid=new Float32Array(cols*rows); next=new Float32Array(cols*rows);
    buildKernel(); reset();
  };
});
</script>
</body>
</html>
