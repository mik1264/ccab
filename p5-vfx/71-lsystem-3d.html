<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-System Tree 3D | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        let lstring = '';
        let generation = 0;
        let maxGen = 5;
        let lastGrowTime = 0;
        let segments = [];
        let treeAngle = 25;
        let windTime = 0;

        // Stack-based 3D turtle state
        function buildSegments(str, branchLen, angle, windT) {
            let stack = [];
            let x = 0, y = 0, z = 0;
            let dirX = 0, dirY = -1, dirZ = 0;
            let upX = 1, upY = 0, upZ = 0;
            let depth = 0;
            let segs = [];

            function cross(ax, ay, az, bx, by, bz) {
                return [ay*bz - az*by, az*bx - ax*bz, ax*by - ay*bx];
            }
            function normalize(ax, ay, az) {
                let len = Math.sqrt(ax*ax + ay*ay + az*az);
                if (len < 0.0001) return [0, 0, 0];
                return [ax/len, ay/len, az/len];
            }
            function rotateAround(vx, vy, vz, ax, ay, az, theta) {
                // Rodrigues
                let c = Math.cos(theta), s = Math.sin(theta);
                let dot = vx*ax + vy*ay + vz*az;
                let crx = ay*vz - az*vy, cry = az*vx - ax*vz, crz = ax*vy - ay*vx;
                return [
                    vx*c + crx*s + ax*dot*(1-c),
                    vy*c + cry*s + ay*dot*(1-c),
                    vz*c + crz*s + az*dot*(1-c)
                ];
            }

            let rad = angle * Math.PI / 180;
            // Wind: small oscillation
            let wind = Math.sin(windT * 0.8) * 0.03;

            for (let i = 0; i < str.length; i++) {
                let ch = str[i];
                if (ch === 'F') {
                    // Forward
                    let windRad = wind * depth;
                    let nx = x + dirX * branchLen + windRad;
                    let ny = y + dirY * branchLen;
                    let nz = z + dirZ * branchLen + windRad;
                    segs.push({ x1: x, y1: y, z1: z, x2: nx, y2: ny, z2: nz, depth: depth });
                    x = nx; y = ny; z = nz;
                } else if (ch === '+') {
                    // Turn around up vector
                    let right = cross(dirX, dirY, dirZ, upX, upY, upZ);
                    right = normalize(right[0], right[1], right[2]);
                    let d = rotateAround(dirX, dirY, dirZ, right[0], right[1], right[2], rad);
                    dirX = d[0]; dirY = d[1]; dirZ = d[2];
                    let u = rotateAround(upX, upY, upZ, right[0], right[1], right[2], rad);
                    upX = u[0]; upY = u[1]; upZ = u[2];
                } else if (ch === '-') {
                    let right = cross(dirX, dirY, dirZ, upX, upY, upZ);
                    right = normalize(right[0], right[1], right[2]);
                    let d = rotateAround(dirX, dirY, dirZ, right[0], right[1], right[2], -rad);
                    dirX = d[0]; dirY = d[1]; dirZ = d[2];
                    let u = rotateAround(upX, upY, upZ, right[0], right[1], right[2], -rad);
                    upX = u[0]; upY = u[1]; upZ = u[2];
                } else if (ch === '[') {
                    stack.push({ x, y, z, dirX, dirY, dirZ, upX, upY, upZ, depth });
                    depth++;
                    // 3D branching: rotate around the forward direction
                    let twistAngle = (Math.random() * 2 - 1) * 60 * Math.PI / 180;
                    let u = rotateAround(upX, upY, upZ, dirX, dirY, dirZ, twistAngle);
                    upX = u[0]; upY = u[1]; upZ = u[2];
                } else if (ch === ']') {
                    let s = stack.pop();
                    if (s) { x = s.x; y = s.y; z = s.z; dirX = s.dirX; dirY = s.dirY; dirZ = s.dirZ; upX = s.upX; upY = s.upY; upZ = s.upZ; depth = s.depth; }
                }
            }
            return segs;
        }

        function applyRules(str) {
            let result = '';
            for (let i = 0; i < str.length; i++) {
                let c = str[i];
                if (c === 'F') result += 'FF-[-F+F+F]+[+F-F-F]';
                else result += c;
            }
            return result;
        }

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);
            lstring = 'F';
            generation = 1;
            lastGrowTime = 0;
            rebuildTree();
        }

        function rebuildTree() {
            let branchLen = 120 / Math.pow(1.9, generation - 1);
            segments = buildSegments(lstring, branchLen, treeAngle, windTime);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        function draw() {
            background(120, 30, 5);
            windTime = frameCount * 0.02;

            // Grow every 3 seconds
            if (frameCount - lastGrowTime > 180 && generation < maxGen) {
                lstring = applyRules(lstring);
                generation++;
                lastGrowTime = frameCount;
                rebuildTree();
            } else if (frameCount % 3 === 0) {
                rebuildTree(); // update wind
            }

            orbitControl(2, 2, 0.1);

            // Position camera to see the tree
            translate(0, 150, 0);
            rotateY(frameCount * 0.005);

            // Ground glow
            ambientLight(30, 60, 20);
            directionalLight(30, 40, 65, 0.3, -1, 0.2);

            let totalSegs = segments.length;
            for (let i = 0; i < totalSegs; i++) {
                let seg = segments[i];
                let t = seg.depth / (maxGen + 1);
                // trunk=brown, tips=green
                let h = lerp(28, 110, t);
                let s = lerp(80, 75, t);
                let b = lerp(38, 62, t);
                let thickness = max(1, 4 - seg.depth * 0.7);

                stroke(h, s, b, 95);
                strokeWeight(thickness);
                line(seg.x1, seg.y1, seg.z1, seg.x2, seg.y2, seg.z2);
            }

            // Ground circle
            noStroke();
            fill(100, 40, 15, 60);
            rotateX(HALF_PI);
            ellipse(0, 0, 320, 320);

            // FPS
            resetMatrix();
            noStroke();
            fill(60, 0, 70);
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width/2 - 16, -height/2 + 16);

            // Gen info
            textAlign(LEFT, TOP);
            fill(90, 60, 85);
            textSize(13);
            text('Gen ' + generation + ' / ' + maxGen + '  |  ' + segments.length + ' segments', -width/2 + 16, -height/2 + 16);
        }
    </script>
</body>
</html>
