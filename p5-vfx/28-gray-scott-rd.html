<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gray-Scott RD | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
        #info {
            position: fixed; bottom: 14px; left: 14px; z-index: 100;
            color: rgba(255,255,255,0.55); font-family: monospace; font-size: 12px;
            pointer-events: none;
        }
        #title {
            position: fixed; bottom: 14px; right: 14px; z-index: 100;
            color: rgba(255,255,255,0.55); font-family: monospace; font-size: 13px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <div id="info">f=0.055  k=0.062  Du=0.2097  Dv=0.105</div>
    <div id="title">Gray-Scott RD</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

// Gray-Scott Reaction-Diffusion
// Grid 200x200, scaled to fill canvas

var COLS = 200;
var ROWS = 200;
var Du = 0.2097;
var Dv = 0.105;
var f  = 0.055;
var k  = 0.062;
var dt = 1.0;
var STEPS_PER_FRAME = 8;

var u, v, uNext, vNext;
var scaleX, scaleY;
var img;

function idx(x, y) {
    return y * COLS + x;
}

function setup() {
    createCanvas(windowWidth, windowHeight);
    colorMode(HSB, 360, 100, 100, 100);
    // No blendMode ADD here — direct pixel rendering

    scaleX = width / COLS;
    scaleY = height / ROWS;

    var N = COLS * ROWS;
    u = new Float32Array(N);
    v = new Float32Array(N);
    uNext = new Float32Array(N);
    vNext = new Float32Array(N);

    // Initialize: u=1 everywhere, v=0 except center patch
    for (var i = 0; i < N; i++) {
        u[i] = 1.0;
        v[i] = 0.0;
    }

    // Seed center 20x20 patch with v=1, some noise
    var cx = floor(COLS / 2);
    var cy = floor(ROWS / 2);
    for (var py = cy - 10; py < cy + 10; py++) {
        for (var px = cx - 10; px < cx + 10; px++) {
            v[idx(px, py)] = 1.0;
            u[idx(px, py)] = 0.0;
        }
    }
    // Add a few extra seeds for richer patterns
    var seeds = [[40,40],[160,40],[40,160],[160,160],[100,30],[100,170],[30,100],[170,100]];
    for (var s = 0; s < seeds.length; s++) {
        var sx = seeds[s][0], sy = seeds[s][1];
        for (var py2 = sy - 5; py2 < sy + 5; py2++) {
            for (var px2 = sx - 5; px2 < sx + 5; px2++) {
                if (px2 >= 0 && px2 < COLS && py2 >= 0 && py2 < ROWS) {
                    v[idx(px2, py2)] = 0.9;
                    u[idx(px2, py2)] = 0.1;
                }
            }
        }
    }

    img = createImage(COLS, ROWS);
    frameRate(60);
}

function laplacianU(x, y) {
    var i = idx(x, y);
    var l = idx((x - 1 + COLS) % COLS, y);
    var r = idx((x + 1) % COLS, y);
    var t = idx(x, (y - 1 + ROWS) % ROWS);
    var b = idx(x, (y + 1) % ROWS);
    var tl = idx((x - 1 + COLS) % COLS, (y - 1 + ROWS) % ROWS);
    var tr = idx((x + 1) % COLS,        (y - 1 + ROWS) % ROWS);
    var bl = idx((x - 1 + COLS) % COLS, (y + 1) % ROWS);
    var br = idx((x + 1) % COLS,        (y + 1) % ROWS);
    return (
        0.05 * u[tl] + 0.2 * u[t] + 0.05 * u[tr] +
        0.2  * u[l]  - 1.0 * u[i] + 0.2  * u[r] +
        0.05 * u[bl] + 0.2 * u[b] + 0.05 * u[br]
    );
}

function laplacianV(x, y) {
    var i = idx(x, y);
    var l = idx((x - 1 + COLS) % COLS, y);
    var r = idx((x + 1) % COLS, y);
    var t = idx(x, (y - 1 + ROWS) % ROWS);
    var b = idx(x, (y + 1) % ROWS);
    var tl = idx((x - 1 + COLS) % COLS, (y - 1 + ROWS) % ROWS);
    var tr = idx((x + 1) % COLS,        (y - 1 + ROWS) % ROWS);
    var bl = idx((x - 1 + COLS) % COLS, (y + 1) % ROWS);
    var br = idx((x + 1) % COLS,        (y + 1) % ROWS);
    return (
        0.05 * v[tl] + 0.2 * v[t] + 0.05 * v[tr] +
        0.2  * v[l]  - 1.0 * v[i] + 0.2  * v[r] +
        0.05 * v[bl] + 0.2 * v[b] + 0.05 * v[br]
    );
}

function stepSimulation() {
    for (var y = 0; y < ROWS; y++) {
        for (var x = 0; x < COLS; x++) {
            var i = idx(x, y);
            var ui = u[i];
            var vi = v[i];
            var uvv = ui * vi * vi;
            var lu = laplacianU(x, y);
            var lv = laplacianV(x, y);

            uNext[i] = ui + (Du * lu - uvv + f * (1.0 - ui)) * dt;
            vNext[i] = vi + (Dv * lv + uvv - (f + k) * vi) * dt;

            if (uNext[i] < 0) uNext[i] = 0;
            if (uNext[i] > 1) uNext[i] = 1;
            if (vNext[i] < 0) vNext[i] = 0;
            if (vNext[i] > 1) vNext[i] = 1;
        }
    }
    // Swap buffers
    var tmp = u; u = uNext; uNext = tmp;
    var tmp2 = v; v = vNext; vNext = tmp2;
}

function renderToImage() {
    img.loadPixels();
    for (var y = 0; y < ROWS; y++) {
        for (var x = 0; x < COLS; x++) {
            var vv = v[idx(x, y)];
            var uu = u[idx(x, y)];

            // Map v to HSB color
            // Low v (empty) => dark blue-purple
            // High v (active) => bright cyan/white
            var hue, sat, bri;
            if (vv < 0.1) {
                hue = 240;
                sat = 80;
                bri = map(vv, 0, 0.1, 5, 25);
            } else if (vv < 0.4) {
                hue = map(vv, 0.1, 0.4, 240, 195);
                sat = 90;
                bri = map(vv, 0.1, 0.4, 25, 65);
            } else if (vv < 0.7) {
                hue = map(vv, 0.4, 0.7, 195, 175);
                sat = 85;
                bri = map(vv, 0.4, 0.7, 65, 90);
            } else {
                hue = map(vv, 0.7, 1.0, 175, 160);
                sat = map(vv, 0.7, 1.0, 70, 20);
                bri = map(vv, 0.7, 1.0, 90, 100);
            }

            // Convert HSB to RGB for direct pixel write
            var rgb = hsbToRgb(hue / 360, sat / 100, bri / 100);
            var pIdx = (y * COLS + x) * 4;
            img.pixels[pIdx]     = rgb[0];
            img.pixels[pIdx + 1] = rgb[1];
            img.pixels[pIdx + 2] = rgb[2];
            img.pixels[pIdx + 3] = 255;
        }
    }
    img.updatePixels();
}

function hsbToRgb(h, s, b) {
    var r, g, bl;
    if (s === 0) { r = g = bl = b; }
    else {
        var sector = floor(h * 6);
        var f2 = h * 6 - sector;
        var p = b * (1 - s);
        var q = b * (1 - f2 * s);
        var t = b * (1 - (1 - f2) * s);
        switch (sector % 6) {
            case 0: r=b; g=t; bl=p; break;
            case 1: r=q; g=b; bl=p; break;
            case 2: r=p; g=b; bl=t; break;
            case 3: r=p; g=q; bl=b; break;
            case 4: r=t; g=p; bl=b; break;
            case 5: r=b; g=p; bl=q; break;
        }
    }
    return [floor(r*255), floor(g*255), floor(bl*255)];
}

function draw() {
    for (var s = 0; s < STEPS_PER_FRAME; s++) {
        stepSimulation();
    }
    renderToImage();
    // Scale up image to fill canvas
    noSmooth();
    image(img, 0, 0, width, height);
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
    </script>
</body>
</html>
