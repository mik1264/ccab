<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime Mold Physarum — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<div id="info">5000 Physarum agents | Click to add attractors</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const NUM_AGENTS = 5000;
const SENSE_DIST = 9;
const SENSE_ANGLE = radians(22.5);
const TURN_SPEED = radians(45);
const AGENT_SPEED = 1.5;
const DECAY = 0.92;
const DEPOSIT = 1.2;

let agents = [];
let trail;
let diffusedTrail;
let TW, TH;
let pg;
let fpsEl;
let lastFpsTime = 0, frameCount2 = 0;
let attractors = [];

function radians(d) { return d * Math.PI / 180; }

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(1);
  TW = floor(width / 2);
  TH = floor(height / 2);
  trail = new Float32Array(TW * TH);
  diffusedTrail = new Float32Array(TW * TH);
  pg = createGraphics(TW, TH);
  pg.pixelDensity(1);
  fpsEl = document.getElementById('fps');
  lastFpsTime = millis();

  // Spawn agents in a circle at center
  let cx = TW / 2, cy = TH / 2;
  let spawnR = min(TW, TH) * 0.15;
  for (let i = 0; i < NUM_AGENTS; i++) {
    let angle = random(TWO_PI);
    let r = random(spawnR);
    agents.push({
      x: cx + cos(angle) * r,
      y: cy + sin(angle) * r,
      angle: random(TWO_PI)
    });
  }

  imageMode(CORNER);
  noSmooth();
}

function senseTrail(x, y, angle) {
  let sx = floor(x + cos(angle) * SENSE_DIST);
  let sy = floor(y + sin(angle) * SENSE_DIST);
  if (sx < 0 || sx >= TW || sy < 0 || sy >= TH) return 0;
  return trail[sy * TW + sx];
}

function draw() {
  // Update agents
  for (let ag of agents) {
    let fwd = senseTrail(ag.x, ag.y, ag.angle);
    let lft = senseTrail(ag.x, ag.y, ag.angle - SENSE_ANGLE);
    let rgt = senseTrail(ag.x, ag.y, ag.angle + SENSE_ANGLE);

    if (fwd >= lft && fwd >= rgt) {
      // Continue forward
    } else if (lft > rgt) {
      ag.angle -= TURN_SPEED * random(0.5, 1.5);
    } else if (rgt > lft) {
      ag.angle += TURN_SPEED * random(0.5, 1.5);
    } else {
      ag.angle += random(-TURN_SPEED, TURN_SPEED);
    }

    // Also pull toward attractors
    for (let att of attractors) {
      let dx = att.x - ag.x, dy = att.y - ag.y;
      let dist = sqrt(dx*dx + dy*dy);
      if (dist < 40 && dist > 1) {
        let toward = atan2(dy, dx);
        let diff = toward - ag.angle;
        while (diff > PI) diff -= TWO_PI;
        while (diff < -PI) diff += TWO_PI;
        ag.angle += diff * 0.1;
      }
    }

    ag.x += cos(ag.angle) * AGENT_SPEED;
    ag.y += sin(ag.angle) * AGENT_SPEED;

    // Bounce off walls
    if (ag.x < 0) { ag.x = 0; ag.angle = PI - ag.angle; }
    if (ag.x >= TW) { ag.x = TW - 1; ag.angle = PI - ag.angle; }
    if (ag.y < 0) { ag.y = 0; ag.angle = -ag.angle; }
    if (ag.y >= TH) { ag.y = TH - 1; ag.angle = -ag.angle; }

    // Deposit
    let ix = floor(ag.x), iy = floor(ag.y);
    if (ix >= 0 && ix < TW && iy >= 0 && iy < TH) {
      trail[iy * TW + ix] = min(trail[iy * TW + ix] + DEPOSIT, 10.0);
    }
  }

  // Diffuse and decay trail
  for (let y = 1; y < TH - 1; y++) {
    for (let x = 1; x < TW - 1; x++) {
      let idx = y * TW + x;
      let avg = (
        trail[idx] +
        trail[idx - 1] + trail[idx + 1] +
        trail[(y-1)*TW+x] + trail[(y+1)*TW+x] +
        trail[(y-1)*TW+x-1] + trail[(y-1)*TW+x+1] +
        trail[(y+1)*TW+x-1] + trail[(y+1)*TW+x+1]
      ) / 9.0;
      diffusedTrail[idx] = avg * DECAY;
    }
  }
  let tmp = trail; trail = diffusedTrail; diffusedTrail = tmp;

  // Render
  pg.loadPixels();
  let pd = pg.pixels;
  for (let i = 0; i < TW * TH; i++) {
    let t = trail[i] / 10.0;
    let pi = i * 4;
    if (t < 0.001) {
      pd[pi] = 0; pd[pi+1] = 0; pd[pi+2] = 2; pd[pi+3] = 255;
    } else if (t < 0.3) {
      // Dark teal
      let v = t / 0.3;
      pd[pi] = 0; pd[pi+1] = floor(v * 120); pd[pi+2] = floor(v * 100); pd[pi+3] = 255;
    } else if (t < 0.7) {
      // Cyan
      let v = (t - 0.3) / 0.4;
      pd[pi] = floor(v * 80); pd[pi+1] = floor(120 + v * 135); pd[pi+2] = floor(100 + v * 155); pd[pi+3] = 255;
    } else {
      // Bright white-cyan
      let v = (t - 0.7) / 0.3;
      pd[pi] = floor(80 + v * 175); pd[pi+1] = 255; pd[pi+2] = 255; pd[pi+3] = 255;
    }
  }
  pg.updatePixels();
  image(pg, 0, 0, width, height);

  // Draw attractors
  noStroke();
  fill(60, 100, 100, 80);
  for (let att of attractors) {
    let sx = att.x * 2, sy = att.y * 2;
    ellipse(sx, sy, 8, 8);
  }

  // FPS
  frameCount2++;
  let now = millis();
  if (now - lastFpsTime > 500) {
    fpsEl.textContent = (frameCount2 / ((now - lastFpsTime) / 1000)).toFixed(1) + ' fps';
    frameCount2 = 0;
    lastFpsTime = now;
  }
}

function mousePressed() {
  attractors.push({ x: mouseX / 2, y: mouseY / 2 });
  if (attractors.length > 8) attractors.shift();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  TW = floor(width / 2);
  TH = floor(height / 2);
  trail = new Float32Array(TW * TH);
  diffusedTrail = new Float32Array(TW * TH);
  pg = createGraphics(TW, TH);
  pg.pixelDensity(1);
}
</script>
</body></html>
