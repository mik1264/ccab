<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julia Set Zoo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#0f0; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#ddd; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.7); padding:10px 14px; border-radius:6px; line-height:1.8; z-index:999; pointer-events:none; }
#label { position:fixed; top:50px; left:50%; transform:translateX(-50%); color:#fff; font-family:monospace; font-size:18px; background:rgba(0,0,0,0.6); padding:8px 20px; border-radius:8px; z-index:999; pointer-events:none; text-align:center; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="label">Julia Set Zoo</div>
<div id="info">c = 0 + 0i</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  // 20 beautiful Julia set parameter values with names
  const juliaParams = [
    { cr: -0.7,    ci:  0.27015, name: 'Spiral Galaxy' },
    { cr: -0.77,   ci:  0.12,   name: 'Dendrite' },
    { cr: -0.12,   ci:  0.74,   name: "Douady's Rabbit" },
    { cr: -0.39,   ci: -0.59,   name: 'Siegel Disk' },
    { cr:  0.28,   ci:  0.008,  name: 'Cantor Dust' },
    { cr: -0.835,  ci: -0.232,  name: 'Lightning' },
    { cr: -0.54,   ci:  0.54,   name: 'Flame Spiral' },
    { cr:  0.285,  ci:  0.01,   name: 'Brain' },
    { cr: -1.476,  ci:  0.0,    name: 'Airplane' },
    { cr: -0.8,    ci:  0.156,  name: 'San Marco' },
    { cr:  0.0,    ci:  1.0,    name: 'Basilica' },
    { cr: -0.4,    ci:  0.6,    name: 'Twin Spirals' },
    { cr:  0.36,   ci:  0.1,    name: 'Seahorse Valley' },
    { cr: -0.70176, ci: -0.3842, name: 'Elephant Valley' },
    { cr:  0.26,   ci:  0.0015, name: 'Canopy' },
    { cr: -0.1,    ci:  0.651,  name: 'Swirl' },
    { cr:  0.45,   ci:  0.1428, name: 'Needle' },
    { cr: -0.624,  ci:  0.435,  name: 'Galaxy Arm' },
    { cr: -0.55,   ci: -0.55,   name: 'Diamond' },
    { cr:  0.0,    ci: -0.8,    name: 'Dual Spiral' },
  ];

  let cycleDuration = 20; // seconds per full cycle
  let maxIter = 180;
  let needsRender = true;
  let lastCr = 0, lastCi = 0;
  let fpsArr = [], lastTime = 0;

  // Tile rendering
  let tileSize = 48;
  let tiles = [], tileIndex = 0, rendering = false;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.pixelDensity(1);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    buildTiles();
    needsRender = true;
  };

  function buildTiles() {
    tiles = [];
    let cols = Math.ceil(p.width / tileSize);
    let rows = Math.ceil(p.height / tileSize);
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        tiles.push({ x: c * tileSize, y: r * tileSize });
    // center-out sort
    let cx = p.width / 2, cy = p.height / 2;
    tiles.sort((a, b) => {
      let da = (a.x - cx) ** 2 + (a.y - cy) ** 2;
      let db = (b.x - cx) ** 2 + (b.y - cy) ** 2;
      return da - db;
    });
    tileIndex = 0;
    rendering = false;
  }

  function getC() {
    let n = juliaParams.length;
    let totalTime = cycleDuration;
    let t = (p.millis() / 1000) % totalTime;
    let rawIdx = (t / totalTime) * n;
    let idx0 = Math.floor(rawIdx) % n;
    let idx1 = (idx0 + 1) % n;
    let frac = rawIdx - Math.floor(rawIdx);
    // smooth step
    frac = frac * frac * (3 - 2 * frac);
    let p0 = juliaParams[idx0];
    let p1 = juliaParams[idx1];
    return {
      cr: p0.cr + (p1.cr - p0.cr) * frac,
      ci: p0.ci + (p1.ci - p0.ci) * frac,
      name0: p0.name,
      name1: p1.name,
      frac
    };
  }

  function julia(zr, zi, cr, ci, maxIt) {
    for (let i = 0; i < maxIt; i++) {
      let zr2 = zr * zr, zi2 = zi * zi;
      if (zr2 + zi2 > 4) {
        let smooth = i + 1 - Math.log(Math.log(Math.sqrt(zr2 + zi2))) / Math.log(2);
        return smooth;
      }
      let nzr = zr2 - zi2 + cr;
      zi = 2 * zr * zi + ci;
      zr = nzr;
    }
    return -1;
  }

  function hsbToRgb(h, s, b) {
    h = ((h % 360) + 360) % 360;
    s /= 100; b /= 100;
    let c = b * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = b - c;
    let r, g, bv;
    let hi = Math.floor(h / 60);
    if (hi === 0) { r=c; g=x; bv=0; }
    else if (hi === 1) { r=x; g=c; bv=0; }
    else if (hi === 2) { r=0; g=c; bv=x; }
    else if (hi === 3) { r=0; g=x; bv=c; }
    else if (hi === 4) { r=x; g=0; bv=c; }
    else { r=c; g=0; bv=x; }
    return [(r+m)*255, (g+m)*255, (bv+m)*255];
  }

  function renderTile(tile, cr, ci) {
    let pw = p.width, ph = p.height;
    let scale = 3.0 / Math.min(pw, ph);
    let x0 = tile.x, y0 = tile.y;
    let x1 = Math.min(x0 + tileSize, pw);
    let y1 = Math.min(y0 + tileSize, ph);

    for (let py = y0; py < y1; py++) {
      for (let px = x0; px < x1; px++) {
        let zr = (px - pw / 2) * scale;
        let zi = (py - ph / 2) * scale;
        let s = julia(zr, zi, cr, ci, maxIter);
        let idx = 4 * (py * pw + px);
        if (s < 0) {
          p.pixels[idx] = 5; p.pixels[idx+1] = 5; p.pixels[idx+2] = 15; p.pixels[idx+3] = 255;
        } else {
          let hue = (s * 6.0 + 200) % 360;
          let sat = 85;
          let bri = Math.min(100, 40 + s * 3);
          let [r, g, b] = hsbToRgb(hue, sat, bri);
          p.pixels[idx] = r; p.pixels[idx+1] = g; p.pixels[idx+2] = b; p.pixels[idx+3] = 255;
        }
      }
    }
  }

  p.draw = function() {
    let now = performance.now();
    let dt = now - lastTime; lastTime = now;
    if (dt > 0) {
      fpsArr.push(1000 / dt);
      if (fpsArr.length > 30) fpsArr.shift();
      document.getElementById('fps').textContent = 'FPS: ' + (fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length).toFixed(1);
    }

    let c = getC();
    let moved = Math.abs(c.cr - lastCr) > 0.001 || Math.abs(c.ci - lastCi) > 0.001;

    if (moved || needsRender) {
      lastCr = c.cr; lastCi = c.ci;
      needsRender = false;
      buildTiles();
      rendering = true;
      p.loadPixels();

      // update label
      let sign = c.ci >= 0 ? '+' : '';
      document.getElementById('label').textContent = c.name0 + ' → ' + c.name1;
      document.getElementById('info').textContent =
        'c = ' + c.cr.toFixed(5) + ' ' + sign + c.ci.toFixed(5) + 'i\n' +
        'Interpolating between beautiful Julia sets\nMove mouse to override c';
    }

    if (rendering) {
      for (let t = 0; t < 6 && tileIndex < tiles.length; t++, tileIndex++) {
        renderTile(tiles[tileIndex], lastCr, lastCi);
      }
      p.updatePixels();
      if (tileIndex >= tiles.length) rendering = false;
    }
  };

  p.mouseMoved = function() {
    // mouse override
    lastCr = p.map(p.mouseX, 0, p.width, -1.5, 1.5);
    lastCi = p.map(p.mouseY, 0, p.height, -1.5, 1.5);
    needsRender = true;
    let sign = lastCi >= 0 ? '+' : '';
    document.getElementById('info').textContent =
      'c = ' + lastCr.toFixed(5) + ' ' + sign + lastCi.toFixed(5) + 'i  [mouse override]';
    document.getElementById('label').textContent = 'Custom c';
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    needsRender = true;
  };
});
</script>
</body>
</html>
