<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hilbert Curve | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        // Hilbert curve generation via L-system / lookup table approach
        // We pre-compute points for orders 1..7, then interpolate between them

        let orderPoints = [];  // orderPoints[o] = array of {x,y} normalized [0,1]
        const MAX_ORDER = 7;

        // Hilbert curve via recursive subdivision
        function hilbert(x, y, ax, ay, bx, by, n, pts) {
            if (n === 0) {
                pts.push({ x: x + (ax + bx) / 2, y: y + (ay + by) / 2 });
                return;
            }
            hilbert(x,           y,           ay/2, ax/2, by/2, bx/2, n-1, pts);
            hilbert(x+ax/2,      y+ay/2,      ax/2, ay/2, bx/2, by/2, n-1, pts);
            hilbert(x+ax/2+bx/2, y+ay/2+by/2, ax/2, ay/2, bx/2, by/2, n-1, pts);
            hilbert(x+bx,        y+by,        -ay/2,-ax/2,-by/2,-bx/2, n-1, pts);
        }

        function genHilbert(order) {
            let pts = [];
            hilbert(0, 0, 1, 0, 0, 1, order, pts);
            return pts;
        }

        // Interpolate between two point arrays (resample to same length)
        function resample(pts, n) {
            if (pts.length === n) return pts;
            let result = [];
            let len = pts.length - 1;
            for (let i = 0; i < n; i++) {
                let t = (i / (n - 1)) * len;
                let lo = Math.floor(t), hi = Math.min(lo + 1, len);
                let f = t - lo;
                result.push({
                    x: pts[lo].x * (1 - f) + pts[hi].x * f,
                    y: pts[lo].y * (1 - f) + pts[hi].y * f
                });
            }
            return result;
        }

        let t = 0;          // overall animation time (seconds)
        let colorOffset = 0; // continuous hue cycling

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
            noFill();

            // Pre-generate all orders
            for (let o = 1; o <= MAX_ORDER; o++) {
                orderPoints.push(genHilbert(o));
            }
        }

        function draw() {
            // Subtle dark background each frame (trail effect)
            background(240, 20, 4);

            // Faint grid
            stroke(220, 10, 15, 30);
            strokeWeight(0.5);
            let gridStep = 40;
            for (let x = 0; x < width; x += gridStep) line(x, 0, x, height);
            for (let y = 0; y < height; y += gridStep) line(0, y, width, y);

            // Time drives order interpolation: each order visible for 2s, transition 1s
            let cycleDur = 3.0; // seconds per order transition
            let totalCycle = cycleDur * (MAX_ORDER - 1);
            t += deltaTime / 1000;
            colorOffset += deltaTime / 1000 * 30; // hue cycling speed

            let phase = (t % totalCycle) / cycleDur;
            let orderA = Math.min(Math.floor(phase), MAX_ORDER - 2);
            let orderB = orderA + 1;
            let blend = phase - orderA;
            // Smooth the blend
            blend = blend * blend * (3 - 2 * blend);

            let ptsA = orderPoints[orderA];
            let ptsB = orderPoints[orderB];
            let n = ptsB.length; // use higher order's point count
            let ptsAr = resample(ptsA, n);

            // Canvas margins
            let margin = 60;
            let S = Math.min(width, height) - margin * 2;
            let ox = (width - S) / 2;
            let oy = (height - S) / 2;

            // Stroke weight: thick at order 1, thin at order 7
            let currentOrder = orderA + 1 + blend;
            let sw = map(currentOrder, 1, 7, 6, 0.8);

            // Draw glow layers (blendMode ADD)
            blendMode(ADD);
            for (let pass = 0; pass < 2; pass++) {
                let alpha = pass === 0 ? 25 : 60;
                let extraSW = pass === 0 ? sw * 3 : sw * 1.5;
                beginShape();
                noFill();
                for (let i = 0; i < n; i++) {
                    let px = ptsAr[i].x * (1 - blend) + ptsB[i].x * blend;
                    let py = ptsAr[i].y * (1 - blend) + ptsB[i].y * blend;
                    let hue = (i / (n - 1) * 360 + colorOffset) % 360;
                    stroke(hue, 90, 100, alpha);
                    strokeWeight(extraSW);
                    if (i === 0) {
                        beginShape();
                    }
                    vertex(ox + px * S, oy + py * S);
                }
                endShape();
            }
            blendMode(BLEND);

            // Main bright curve
            strokeWeight(sw);
            beginShape();
            noFill();
            for (let i = 0; i < n; i++) {
                let px = ptsAr[i].x * (1 - blend) + ptsB[i].x * blend;
                let py = ptsAr[i].y * (1 - blend) + ptsB[i].y * blend;
                let hue = (i / (n - 1) * 360 + colorOffset) % 360;
                stroke(hue, 85, 100, 90);
                if (i % 1 === 0) {
                    vertex(ox + px * S, oy + py * S);
                }
            }
            endShape();

            // FPS counter
            blendMode(BLEND);
            let fps = Math.round(frameRate());
            noStroke();
            fill(0, 0, 0, 60);
            rect(width - 80, 10, 70, 28, 14);
            fill(120, 60, 100);
            textSize(13);
            textFont('monospace');
            textAlign(RIGHT, TOP);
            text(fps + ' fps', width - 14, 18);

            // Order label
            fill(0, 0, 0, 60);
            rect(width / 2 - 60, 10, 120, 28, 14);
            fill(60, 80, 100);
            textAlign(CENTER, TOP);
            text('Order ' + (orderA + 1) + ' → ' + (orderB + 1), width / 2, 18);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
