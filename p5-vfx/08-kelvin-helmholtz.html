<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelvin-Helmholtz Instability | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const GW = 256, GH = 128;
        let density, vx, vy, density2, vx2, vy2;
        let pxW, pxH, offX, offY;
        let simTime = 0;
        let resetFade = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
            pixelDensity(1);
            computeLayout();
            initSim();
        }

        function computeLayout() {
            let scaleX = width  / GW;
            let scaleY = height / GH;
            let scale  = min(scaleX, scaleY);
            pxW = floor(scale);
            pxH = floor(scale);
            offX = floor((width  - GW * pxW) / 2);
            offY = floor((height - GH * pxH) / 2);
        }

        function initSim() {
            density  = new Float32Array(GW * GH);
            vx       = new Float32Array(GW * GH);
            vy       = new Float32Array(GW * GH);
            density2 = new Float32Array(GW * GH);
            vx2      = new Float32Array(GW * GH);
            vy2      = new Float32Array(GW * GH);
            simTime  = 0;

            let sharpness = 12.0;
            let pertAmp   = 0.025;

            for (let j = 0; j < GH; j++) {
                for (let i = 0; i < GW; i++) {
                    let idx = j * GW + i;
                    let fi = i / GW, fj = j / GH;

                    // Interface at y=0.5 with multi-mode perturbation
                    let pert = pertAmp * sin(fi * TWO_PI * 2)
                             + pertAmp * 0.5 * sin(fi * TWO_PI * 5 + 0.8)
                             + pertAmp * 0.3 * sin(fi * TWO_PI * 8 + 2.1);
                    let relY = fj - 0.5 - pert;

                    // Smooth step: density=1 bottom layer (golden), density=0 top (ocean blue)
                    density[idx] = 1.0 / (1.0 + Math.exp(relY * sharpness * GH));

                    // Shear velocity: top flows right (+), bottom flows left (-)
                    let shear = tanh(relY * sharpness * GH);
                    vx[idx] = shear; // +1 top, -1 bottom
                    vy[idx] = 0.0;
                }
            }
        }

        function bilinearSample(field, fx, fy) {
            // Periodic X, clamped Y
            fx = ((fx % GW) + GW) % GW;
            fy = max(0.5, min(GH - 1.5, fy));
            let ix = Math.floor(fx), iy = Math.floor(fy);
            let tx = fx - ix, ty = fy - iy;
            let nx = (ix + 1) % GW;
            let i00 = iy * GW + ix,  i10 = iy * GW + nx;
            let i01 = (iy+1)*GW + ix, i11 = (iy+1)*GW + nx;
            return field[i00]*(1-tx)*(1-ty) + field[i10]*tx*(1-ty)
                 + field[i01]*(1-tx)*ty     + field[i11]*tx*ty;
        }

        function stepSim() {
            const dt = 0.3;
            const diff = 0.0006;
            const viscosity = 0.0003;

            // Semi-Lagrangian advection
            for (let j = 0; j < GH; j++) {
                for (let i = 0; i < GW; i++) {
                    let idx = j * GW + i;
                    let srcX = i - dt * vx[idx];
                    let srcY = j - dt * vy[idx];
                    density2[idx] = bilinearSample(density, srcX, srcY);
                    vx2[idx] = bilinearSample(vx, srcX, srcY);
                    vy2[idx] = bilinearSample(vy, srcX, srcY);
                }
            }

            // Diffusion (Gauss-Seidel 2 iters)
            for (let iter = 0; iter < 2; iter++) {
                for (let j = 1; j < GH-1; j++) {
                    for (let i = 0; i < GW; i++) {
                        let idx = j * GW + i;
                        let il = (i - 1 + GW) % GW, ir = (i + 1) % GW;
                        let nd = density2[j*GW+il] + density2[j*GW+ir]
                               + density2[(j-1)*GW+i] + density2[(j+1)*GW+i];
                        density2[idx] = (density2[idx] + diff*dt*nd)/(1+4*diff*dt);

                        let nvx = vx2[j*GW+il]+vx2[j*GW+ir]+vx2[(j-1)*GW+i]+vx2[(j+1)*GW+i];
                        let nvy = vy2[j*GW+il]+vy2[j*GW+ir]+vy2[(j-1)*GW+i]+vy2[(j+1)*GW+i];
                        vx2[idx] = (vx2[idx] + viscosity*dt*nvx)/(1+4*viscosity*dt);
                        vy2[idx] = (vy2[idx] + viscosity*dt*nvy)/(1+4*viscosity*dt);
                    }
                }
            }

            // Top/bottom boundary: no-flux
            for (let i = 0; i < GW; i++) {
                density2[i] = density2[GW + i];
                density2[(GH-1)*GW+i] = density2[(GH-2)*GW+i];
                vy2[i] = 0; vy2[(GH-1)*GW+i] = 0;
            }

            let tmp;
            tmp = density; density = density2; density2 = tmp;
            tmp = vx; vx = vx2; vx2 = tmp;
            tmp = vy; vy = vy2; vy2 = tmp;

            simTime += dt;
            if (simTime > 500) {
                resetFade = 1.0;
                initSim();
            }
        }

        function draw() {
            for (let s = 0; s < 3; s++) stepSim();

            loadPixels();

            // Clear background
            for (let k = 0; k < width * height * 4; k += 4) {
                pixels[k]   = 3;
                pixels[k+1] = 3;
                pixels[k+2] = 18;
                pixels[k+3] = 255;
            }

            for (let j = 0; j < GH; j++) {
                for (let i = 0; i < GW; i++) {
                    let d = density[j * GW + i];
                    // d=0: top layer = deep ocean blue-teal (H≈200, S=90, B=70)
                    // d=1: bottom = golden amber (H≈40, S=95, B=90)
                    // Blend in RGB
                    // Ocean blue: r=10, g=100, b=180
                    // Golden:     r=230, g=160, b=20
                    let r = d * 230 + (1-d) * 10;
                    let g = d * 160 + (1-d) * 100;
                    let b = d * 20  + (1-d) * 180;

                    // Vorticity tint at mixing layer
                    let mix = 4 * d * (1-d);
                    r += mix * 120;
                    g += mix * 40;
                    b += mix * 80;

                    let pr = min(255, max(0, floor(r)));
                    let pg = min(255, max(0, floor(g)));
                    let pb = min(255, max(0, floor(b)));

                    for (let dj = 0; dj < pxH; dj++) {
                        for (let di = 0; di < pxW; di++) {
                            let px = offX + i * pxW + di;
                            let py = offY + j * pxH + dj;
                            if (px < 0 || px >= width || py < 0 || py >= height) continue;
                            let pidx = (py * width + px) * 4;
                            pixels[pidx]   = pr;
                            pixels[pidx+1] = pg;
                            pixels[pidx+2] = pb;
                            pixels[pidx+3] = 255;
                        }
                    }
                }
            }
            updatePixels();

            // FPS
            noStroke();
            fill(0, 0, 0, 60);
            rect(width - 80, 8, 72, 22, 4);
            fill(0, 0, 100, 80);
            textSize(13);
            textAlign(RIGHT, TOP);
            textFont('monospace');
            text(nf(frameRate(), 1, 1) + ' fps', width - 12, 13);

            fill(0, 0, 100, 50);
            textSize(11);
            textAlign(LEFT, BOTTOM);
            text('Kelvin-Helmholtz Instability  |  t=' + nf(simTime/30, 1, 1), offX + 4, offY + GH * pxH - 4);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            computeLayout();
        }
    </script>
</body>
</html>
