<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametric Surface Gallery | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const SURFACES = [
            { name: 'Klein Bottle', uMin: 0, uMax: TWO_PI, vMin: 0, vMax: TWO_PI, detail: 48 },
            { name: "Boy's Surface", uMin: 0, uMax: PI, vMin: 0, vMax: PI, detail: 44 },
            { name: 'Catenoid', uMin: 0, uMax: TWO_PI, vMin: -1.4, vMax: 1.4, detail: 48 },
            { name: "Dini's Surface", uMin: 0, uMax: TWO_PI * 3, vMin: 0.08, vMax: PI * 0.94, detail: 52 },
            { name: 'Pseudosphere', uMin: 0, uMax: TWO_PI, vMin: -3, vMax: 3, detail: 44 },
            { name: 'Seashell Surface', uMin: 0, uMax: TWO_PI * 3, vMin: 0, vMax: TWO_PI, detail: 48 },
        ];

        let surfaceIdx = 0;
        let nextSurfaceIdx = 1;
        let cycleFrames = 300; // 5 sec
        let frameInCycle = 0;
        let meshCurrent = [];
        let meshNext = [];
        let showWire = false;
        let wireToggleFrame = 0;
        let globalHue = 0;

        // Parametric functions
        function evalSurface(idx, u, v) {
            if (idx === 0) return kleinBottle(u, v);
            if (idx === 1) return boysSurface(u, v);
            if (idx === 2) return catenoid(u, v);
            if (idx === 3) return dini(u, v);
            if (idx === 4) return pseudosphere(u, v);
            if (idx === 5) return seashell(u, v);
            return [0, 0, 0];
        }

        function kleinBottle(u, v) {
            let a = 2.5;
            let x, y, z;
            if (u < PI) {
                x = a * (1 - cos(u) / 2) * cos(u) * cos(v);
                y = a * sin(u) * (1 + sin(u) / 2);
                z = a * (1 - cos(u) / 2) * sin(v);
            } else {
                x = a * (1 - cos(u) / 2) * cos(u) * cos(v);
                y = a * -sin(u) * (1 + sin(u) / 2);
                z = a * (1 - cos(u) / 2) * sin(v);
            }
            let scl = 80;
            return [x * scl, -y * scl + 30, z * scl];
        }

        function boysSurface(u, v) {
            // Bryant-Kusner parameterization
            let x, y, z;
            let cu = cos(u), su = sin(u);
            let cv = cos(v), sv = sin(v);
            let e = 2 * Math.sqrt(3);
            let d = cv * cv * cv + e * cu * su * sv * cv - su * su * sv * sv;
            if (abs(d) < 0.001) d = 0.001;
            let f1 = cu * (3 * (cv * cv - cv * cv) + e * cu * su * sv * cv * (cv * cv - su * su));
            // Simple approximation for Boy's surface
            x = 2 / 3 * cos(u) * cos(2 * v) + sqrt(2) * cos(2 * u) * cos(v) * sin(v);
            y = 2 / 3 * cos(u) * sin(2 * v) - sqrt(2) * cos(2 * u) * sin(v) * cos(v);
            z = 2 / 3 * cos(u) * (sin(v) * sin(v) + 1) + sin(2 * u);
            let scl = 110;
            return [x * scl, -z * scl, y * scl];
        }

        function catenoid(u, v) {
            let x = cosh(v) * cos(u);
            let y = cosh(v) * sin(u);
            let z = v;
            let scl = 70;
            return [x * scl, -z * scl * 70, y * scl];
        }

        function dini(u, v) {
            let a = 1.0, b = 0.18;
            let sinv = sin(v), cosv = cos(v);
            let tanv2 = tan(v / 2);
            let logtan = (abs(tanv2) < 0.001) ? -10 : log(abs(tanv2));
            let x = a * cos(u) * sinv;
            let y = a * sin(u) * sinv;
            let z = a * (cosv + logtan) + b * u;
            let scl = 50;
            return [x * scl, -z * scl + 30, y * scl];
        }

        function pseudosphere(u, v) {
            let sechv = 1 / cosh(v);
            let tanhv = tanh(v);
            let x = sechv * cos(u);
            let y = sechv * sin(u);
            let z = v - tanhv;
            let scl = 90;
            return [x * scl, -z * scl * 0.7, y * scl];
        }

        function seashell(u, v) {
            // Seashell / snail shell parametric surface
            let R = 1, N = 5, H = 3.5, W = 0.5, P = 0;
            let r = (R * exp(W * u)) * cos(N * u / 2) + H * u / (2 * PI);
            let x = r * cos(v);
            let y = r * sin(v);
            let z = R * exp(W * u) * sin(N * u / 2) - H * u / (2 * PI) * 0.4;
            let scl = 18;
            return [x * scl, -z * scl, y * scl];
        }

        function buildMesh(idx, detail) {
            let s = SURFACES[idx];
            let mesh = [];
            let du = (s.uMax - s.uMin) / detail;
            let dv = (s.vMax - s.vMin) / detail;
            for (let ui = 0; ui <= detail; ui++) {
                let row = [];
                for (let vi = 0; vi <= detail; vi++) {
                    let u = s.uMin + ui * du;
                    let v = s.vMin + vi * dv;
                    let [x, y, z] = evalSurface(idx, u, v);
                    // Guard NaN/Inf
                    if (!isFinite(x)) x = 0;
                    if (!isFinite(y)) y = 0;
                    if (!isFinite(z)) z = 0;
                    row.push({ x, y, z, u: ui / detail, v: vi / detail });
                }
                mesh.push(row);
            }
            return mesh;
        }

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);
            meshCurrent = buildMesh(surfaceIdx, SURFACES[surfaceIdx].detail);
            meshNext = buildMesh(nextSurfaceIdx, SURFACES[nextSurfaceIdx].detail);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        function drawMesh(mesh, alpha, hueBase, wireframe) {
            let detail = mesh.length - 1;
            for (let ui = 0; ui < detail; ui++) {
                beginShape(TRIANGLE_STRIP);
                for (let vi = 0; vi <= detail; vi++) {
                    for (let dui = 0; dui <= 1; dui++) {
                        let p = mesh[ui + dui][vi];
                        let h = (hueBase + p.u * 120 + p.v * 60) % 360;
                        if (wireframe) {
                            noFill();
                            stroke(h, 80, 100, alpha * 0.6);
                            strokeWeight(0.5);
                        } else {
                            noStroke();
                            fill(h, 75, 88, alpha);
                        }
                        vertex(p.x, p.y, p.z);
                    }
                }
                endShape();
            }
        }

        function draw() {
            background(240, 25, 5);
            globalHue = (frameCount * 0.3) % 360;

            frameInCycle++;
            if (frameInCycle >= cycleFrames) {
                frameInCycle = 0;
                surfaceIdx = nextSurfaceIdx;
                nextSurfaceIdx = (nextSurfaceIdx + 1) % SURFACES.length;
                meshCurrent = meshNext;
                meshNext = buildMesh(nextSurfaceIdx, SURFACES[nextSurfaceIdx].detail);
            }

            // Toggle wireframe every 150 frames
            if (frameCount - wireToggleFrame > 150) {
                showWire = !showWire;
                wireToggleFrame = frameCount;
            }

            orbitControl(2, 2, 0.1);
            ambientLight(0, 0, 15);
            directionalLight(color(globalHue, 60, 100), 0.6, -0.8, -0.3);
            directionalLight(color((globalHue + 160) % 360, 50, 80), -0.4, 0.5, 0.6);

            rotateY(frameCount * 0.006);
            rotateX(sin(frameCount * 0.003) * 0.2);

            // Transition
            let t = frameInCycle / cycleFrames;
            let fadeLen = 0.2;
            let alpha1 = 100, alpha2 = 0;
            if (t > 1 - fadeLen) {
                let ft = (t - (1 - fadeLen)) / fadeLen;
                alpha1 = (1 - ft) * 100;
                alpha2 = ft * 100;
            }

            if (alpha1 > 1) drawMesh(meshCurrent, alpha1, globalHue, false);
            if (showWire && alpha1 > 1) drawMesh(meshCurrent, alpha1 * 0.3, globalHue, true);
            if (alpha2 > 1) drawMesh(meshNext, alpha2, (globalHue + 60) % 360, false);

            // FPS
            resetMatrix();
            noStroke();
            fill(60, 0, 70);
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width/2 - 16, -height/2 + 16);

            // Surface name
            textAlign(CENTER, BOTTOM);
            fill((globalHue + 40) % 360, 70, 100, 90);
            textSize(20);
            text(SURFACES[surfaceIdx].name, 0, height/2 - 20);
            textSize(11);
            fill(0, 0, 55);
            text('Parametric Surface Gallery — drag to orbit', 0, height/2 - 4);
        }
    </script>
</body>
</html>
