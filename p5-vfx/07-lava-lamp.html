<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lava Lamp Metaballs — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const GRID_RES = 5;
const THRESHOLD = 1.0;
const NUM_BLOBS = 8;
let blobs = [];
let t = 0;
let fpsEl, fpsTimer = 0, fpsFrames = 0;
let cols, rows;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(min(pixelDensity(), 2));
  background(15, 40, 8);
  fpsEl = document.getElementById('fps');
  cols = floor(width / GRID_RES) + 2;
  rows = floor(height / GRID_RES) + 2;

  for (let i = 0; i < NUM_BLOBS; i++) {
    blobs.push({
      cx: width * 0.2 + random(width * 0.6),
      cy: height * 0.3 + random(height * 0.4),
      r: random(60, 130),
      sxAmp: random(30, 100),
      syAmp: random(30, 80),
      sxFreq: random(0.003, 0.008),
      syFreq: random(0.002, 0.007),
      sxPhase: random(TWO_PI),
      syPhase: random(TWO_PI),
    });
  }
}

function blobField(x, y) {
  let sum = 0;
  for (let b of blobs) {
    let dx = x - b.cx;
    let dy = y - b.cy;
    let d2 = dx * dx + dy * dy;
    sum += (b.r * b.r) / (d2 + 1);
  }
  return sum;
}

// Marching squares lookup: edge midpoints for each case
// Returns segments to draw for a given case
function marchingSquaresEdges(case4) {
  // Simplified: return line segment endpoints as edge indices (0=top,1=right,2=bottom,3=left)
  const table = [
    [], // 0000
    [[3,2]], // 0001
    [[2,1]], // 0010
    [[3,1]], // 0011
    [[1,0]], // 0100
    [[3,0],[2,1]], // 0101
    [[2,0]], // 0110
    [[3,0]], // 0111
    [[0,3]], // 1000
    [[0,2]], // 1001
    [[0,1],[2,3]], // 1010
    [[0,1]], // 1011
    [[1,3]], // 1100
    [[1,2]], // 1101
    [[2,3]], // 1110
    [], // 1111
  ];
  return table[case4];
}

function getEdgePt(x0, y0, x1, y1, v00, v10, v01, v11, edge) {
  // Return interpolated point on given edge (0=top, 1=right, 2=bottom, 3=left)
  let gx = x0 * GRID_RES, gy = y0 * GRID_RES;
  let gx2 = x1 * GRID_RES, gy2 = y1 * GRID_RES;
  if (edge === 0) { // top
    let t = (THRESHOLD - v00) / (v10 - v00 + 0.0001);
    return [lerp(gx, gx2, t), gy];
  } else if (edge === 1) { // right
    let t = (THRESHOLD - v10) / (v11 - v10 + 0.0001);
    return [gx2, lerp(gy, gy2, t)];
  } else if (edge === 2) { // bottom
    let t = (THRESHOLD - v01) / (v11 - v01 + 0.0001);
    return [lerp(gx, gx2, t), gy2];
  } else { // left
    let t = (THRESHOLD - v00) / (v01 - v00 + 0.0001);
    return [gx, lerp(gy, gy2, t)];
  }
}

function draw() {
  fpsFrames++;
  let now2 = millis();
  if (now2 - fpsTimer > 500) {
    fpsEl.textContent = round(fpsFrames / ((now2 - fpsTimer) / 1000)) + ' fps';
    fpsFrames = 0; fpsTimer = now2;
  }

  background(15, 50, 8);

  // Update blob positions
  for (let b of blobs) {
    b.cx = b.cx + sin(t * b.sxFreq + b.sxPhase) * 0.8;
    b.cy = b.cy + cos(t * b.syFreq + b.syPhase) * 0.6;

    // Bounce off walls
    let margin = b.r;
    if (b.cx < margin || b.cx > width - margin) b.sxPhase += PI;
    if (b.cy < margin || b.cy > height - margin) b.syPhase += PI;
    b.cx = constrain(b.cx, margin, width - margin);
    b.cy = constrain(b.cy, margin, height - margin);
  }

  // Compute grid field values
  let field = [];
  for (let j = 0; j <= rows; j++) {
    field.push([]);
    for (let i = 0; i <= cols; i++) {
      field[j].push(blobField(i * GRID_RES, j * GRID_RES));
    }
  }

  // Fill inside blobs with gradient
  noStroke();
  loadPixels();
  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      let v = field[j][i];
      if (v >= THRESHOLD) {
        // Color by vertical position: crimson at bottom → orange → yellow-white at top
        let yFrac = (j * GRID_RES) / height;
        // Add noise texture
        let nv = noise(i * 0.05, j * 0.05, t * 0.02) * 0.3;
        let h = lerp(350, 40, 1 - yFrac + nv * 0.4);
        let s = lerp(95, 60, 1 - yFrac);
        let b2 = lerp(80, 100, 1 - yFrac + nv * 0.2);

        colorMode(RGB, 255);
        let col = color(h, s, b2);
        colorMode(HSB, 360, 100, 100, 100);

        // Fill this grid cell
        let px0 = i * GRID_RES, py0 = j * GRID_RES;
        let px1 = min(px0 + GRID_RES, width);
        let py1 = min(py0 + GRID_RES, height);

        // Get HSB color
        let hh = lerp(350, 45, 1 - yFrac + nv * 0.3);
        let ss = lerp(95, 55, 1 - yFrac);
        let bb = lerp(78, 100, 1 - yFrac);

        // Convert HSB to RGB manually
        let hNorm = hh / 60;
        let c2 = (ss / 100) * (bb / 100);
        let x2 = c2 * (1 - abs(hNorm % 2 - 1));
        let r1 = 0, g1 = 0, b1 = 0;
        if (hNorm < 1) { r1 = c2; g1 = x2; }
        else if (hNorm < 2) { r1 = x2; g1 = c2; }
        else if (hNorm < 3) { g1 = c2; b1 = x2; }
        else if (hNorm < 4) { g1 = x2; b1 = c2; }
        else if (hNorm < 5) { r1 = x2; b1 = c2; }
        else { r1 = c2; b1 = x2; }
        let m = bb / 100 - c2;
        let pr = floor((r1 + m) * 255);
        let pg = floor((g1 + m) * 255);
        let pb = floor((b1 + m) * 255);

        for (let py = py0; py < py1; py++) {
          for (let px = px0; px < px1; px++) {
            if (px >= width || py >= height) continue;
            let idx = (py * width + px) * 4;
            pixels[idx] = pr; pixels[idx+1] = pg; pixels[idx+2] = pb; pixels[idx+3] = 255;
          }
        }
      }
    }
  }
  updatePixels();

  // Draw iso-contour lines
  stroke(255, 255, 255, 200);
  strokeWeight(1.8);
  noFill();
  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      let v00 = field[j][i];
      let v10 = field[j][i+1] || 0;
      let v01 = field[j+1] ? field[j+1][i] : 0;
      let v11 = (field[j+1] && field[j+1][i+1]) ? field[j+1][i+1] : 0;

      let b00 = v00 >= THRESHOLD ? 1 : 0;
      let b10 = v10 >= THRESHOLD ? 1 : 0;
      let b01 = v01 >= THRESHOLD ? 1 : 0;
      let b11 = v11 >= THRESHOLD ? 1 : 0;
      let caseIdx = b11 * 8 + b10 * 4 + b01 * 2 + b00;

      let edges = marchingSquaresEdges(caseIdx);
      for (let seg of edges) {
        let p1 = getEdgePt(i, j, i+1, j+1, v00, v10, v01, v11, seg[0]);
        let p2 = getEdgePt(i, j, i+1, j+1, v00, v10, v01, v11, seg[1]);
        colorMode(RGB, 255);
        stroke(255, 220, 180, 160);
        colorMode(HSB, 360, 100, 100, 100);
        line(p1[0], p1[1], p2[0], p2[1]);
      }
    }
  }

  t++;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = floor(width / GRID_RES) + 2;
  rows = floor(height / GRID_RES) + 2;
}
</script>
</body></html>
