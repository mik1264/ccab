<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dequan Li Attractor | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const TRAIL_LEN  = 4000;
        const DT         = 0.0001;
        const SCALE      = 3;
        const NUM_TRAJ   = 3;
        const STEPS_PER_FRAME = 8;
        const WARMUP     = 3000;

        // Dequan Li: a=40, b=1.833, c=0.16, d=0.65, e=55, f=20
        const A = 40, B = 1.833, C = 0.16, D = 0.65, E = 55, F = 20;

        function dequanLi(x, y, z) {
            return {
                dx: A * (y - x) + D * x * z,
                dy: E * x + F * y - x * z,
                dz: B * z + x * y - C * x * x
            };
        }

        function rk4(x, y, z, dt) {
            let k1 = dequanLi(x, y, z);
            let k2 = dequanLi(x + dt/2 * k1.dx, y + dt/2 * k1.dy, z + dt/2 * k1.dz);
            let k3 = dequanLi(x + dt/2 * k2.dx, y + dt/2 * k2.dy, z + dt/2 * k2.dz);
            let k4 = dequanLi(x + dt * k3.dx, y + dt * k3.dy, z + dt * k3.dz);
            return {
                x: x + dt/6 * (k1.dx + 2*k2.dx + 2*k3.dx + k4.dx),
                y: y + dt/6 * (k1.dy + 2*k2.dy + 2*k3.dy + k4.dy),
                z: z + dt/6 * (k1.dz + 2*k2.dz + 2*k3.dz + k4.dz)
            };
        }

        let trajectories = [];
        for (let i = 0; i < NUM_TRAJ; i++) {
            trajectories.push({
                pts: [],
                x: 0.1  + i * 0.001,
                y: 0.0  + i * 0.0007,
                z: -0.5 + i * 0.0005,
                hueOffset: i * 120
            });
        }

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);

            // Warm up
            for (let w = 0; w < WARMUP; w++) {
                for (let t of trajectories) {
                    let nxt = rk4(t.x, t.y, t.z, DT);
                    // Sanity check for blow-up
                    if (!isFinite(nxt.x) || !isFinite(nxt.y) || !isFinite(nxt.z)) {
                        t.x = 0.1; t.y = 0.0; t.z = -0.5;
                    } else {
                        t.x = nxt.x; t.y = nxt.y; t.z = nxt.z;
                    }
                }
            }
        }

        function draw() {
            orbitControl(2, 2, 0.1);
            background(0, 0, 5, 20);
            blendMode(ADD);

            // Auto-rotate
            rotateY(frameCount * 0.003);
            rotateX(sin(frameCount * 0.001) * 0.3);

            // Advance trajectories
            for (let s = 0; s < STEPS_PER_FRAME; s++) {
                for (let t of trajectories) {
                    let nxt = rk4(t.x, t.y, t.z, DT);
                    if (!isFinite(nxt.x) || !isFinite(nxt.y) || !isFinite(nxt.z)) continue;
                    t.x = nxt.x; t.y = nxt.y; t.z = nxt.z;
                    // Center: x ~ ±20, y ~ ±30, z ~ ±10 — scale visually
                    t.pts.push([t.x * SCALE, t.z * SCALE, t.y * SCALE]);
                    if (t.pts.length > TRAIL_LEN) t.pts.shift();
                }
            }

            // Draw trails
            noFill();
            strokeWeight(1.0);
            for (let t of trajectories) {
                let n = t.pts.length;
                for (let i = 1; i < n; i++) {
                    let ageFrac = i / n;
                    let hue = (t.hueOffset + ageFrac * 120) % 360;
                    let alpha = ageFrac * 70;
                    stroke(hue, 80, 100, alpha);
                    let p0 = t.pts[i - 1];
                    let p1 = t.pts[i];
                    line(p0[0], p0[1], p0[2], p1[0], p1[1], p1[2]);
                }
                // Bright head
                if (t.pts.length > 0) {
                    let head = t.pts[t.pts.length - 1];
                    strokeWeight(4);
                    stroke(t.hueOffset, 40, 100, 95);
                    point(head[0], head[1], head[2]);
                    strokeWeight(1.0);
                }
            }

            // Screen-space overlays
            blendMode(BLEND);
            resetMatrix();
            noStroke();
            fill(0, 0, 90, 180);
            textFont('monospace');
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width / 2 - 16, -height / 2 + 16);

            textAlign(CENTER, BOTTOM);
            textSize(14);
            fill(0, 0, 80, 100);
            text('Dequan Li Attractor  a=40  b=1.833  c=0.16  d=0.65  e=55  f=20', 0, height / 2 - 16);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
