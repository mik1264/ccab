<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Möbius Particles | P5.js VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#666; font-family:monospace; font-size:12px; text-align:center; pointer-events:none; }
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Gallery</a>
<div id="fps">FPS: --</div>
<div id="info">Möbius Particles · 3,000 particles on Möbius strip · Drag to rotate</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

new p5(function(p) {
  const N = 3000;
  const SCALE = 150;
  const SPEED = 0.0008;   // ds per frame
  const WIRE_STEPS_S = 80;
  const WIRE_STEPS_T = 12;

  let pS = new Float32Array(N); // s param [0,1)
  let pT = new Float32Array(N); // t param [-1,1]

  let fpsEl;
  let fpsTime = 0, fpsFrames = 0;
  let angleY = 0;

  // Precomputed wireframe geometry
  let wireLines = []; // array of {x0,y0,z0, x1,y1,z1}

  function mobiusPoint(s, t) {
    const halfTwist = s * Math.PI; // half rotation over full loop
    const theta = s * Math.PI * 2;
    const x = (1 + (t / 2) * Math.cos(halfTwist)) * Math.cos(theta);
    const y = (1 + (t / 2) * Math.cos(halfTwist)) * Math.sin(theta);
    const z =         (t / 2) * Math.sin(halfTwist);
    return { x: x * SCALE, y: y * SCALE, z: z * SCALE };
  }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    fpsEl = document.getElementById('fps');

    // Init particles uniformly on strip
    for (let i = 0; i < N; i++) {
      pS[i] = Math.random();
      pT[i] = (Math.random() * 2 - 1) * 0.95;
    }

    // Build wireframe lines
    // s-direction lines (fixed t)
    for (let tj = 0; tj <= WIRE_STEPS_T; tj++) {
      const t = -1 + (tj / WIRE_STEPS_T) * 2;
      for (let si = 0; si < WIRE_STEPS_S; si++) {
        const s0 = si / WIRE_STEPS_S;
        const s1 = (si + 1) / WIRE_STEPS_S;
        const p0 = mobiusPoint(s0, t);
        const p1 = mobiusPoint(s1, t);
        wireLines.push(p0.x, p0.y, p0.z, p1.x, p1.y, p1.z);
      }
    }
    // t-direction lines (fixed s)
    for (let si = 0; si < WIRE_STEPS_S; si++) {
      const s = si / WIRE_STEPS_S;
      for (let tj = 0; tj < WIRE_STEPS_T; tj++) {
        const t0 = -1 + (tj / WIRE_STEPS_T) * 2;
        const t1 = -1 + ((tj + 1) / WIRE_STEPS_T) * 2;
        const p0 = mobiusPoint(s, t0);
        const p1 = mobiusPoint(s, t1);
        wireLines.push(p0.x, p0.y, p0.z, p1.x, p1.y, p1.z);
      }
    }

    p.noFill();
  };

  p.draw = function() {
    p.background(0, 0, 5, 100);
    p.blendMode(p.ADD);

    // FPS
    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(fpsFrames * 1000 / (now - fpsTime));
      fpsFrames = 0; fpsTime = now;
    }

    // Slow auto-rotation
    angleY += 0.004;
    p.rotateX(0.3);
    p.rotateY(angleY);

    // Advance particles along s
    for (let i = 0; i < N; i++) {
      pS[i] += SPEED;
      if (pS[i] >= 1) {
        pS[i] -= 1;
        // Möbius topology: flip t when completing full loop
        pT[i] = -pT[i];
      }
    }

    // Draw wireframe (low-opacity cyan)
    p.strokeWeight(0.5);
    for (let i = 0; i < wireLines.length; i += 6) {
      p.stroke(185, 80, 60, 12);
      p.line(wireLines[i],   wireLines[i+1], wireLines[i+2],
             wireLines[i+3], wireLines[i+4], wireLines[i+5]);
    }

    // Draw particles
    p.strokeWeight(2);
    const fc = p.frameCount * 0.5;
    p.beginShape(p.POINTS);
    for (let i = 0; i < N; i++) {
      const s = pS[i];
      const t = pT[i];
      const pt = mobiusPoint(s, t);
      const h = (s * 360 + fc) % 360;
      const sat = 70 + Math.abs(t) * 30;
      const bri = 60 + Math.abs(t) * 30;
      p.stroke(h, sat, bri, 80);
      p.vertex(pt.x, pt.y, pt.z);
    }
    p.endShape();

    p.blendMode(p.BLEND);

    // FPS text overlay — resetMatrix to 2D
    p.resetMatrix();
  };

  p.windowResized = function() { p.resizeCanvas(window.innerWidth, window.innerHeight); };
});
</script>
</body>
</html>
