<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Body Dance | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

// N-Body Gravitational Dance
// 80 particles, O(N²) gravity with softening
// 2D canvas with fading trails

var N = 80;
var G = 1.0;
var MASS = 1.0;
var DT = 0.2;
var SOFTENING_SQ = 50;   // r_soft² = r² + 50
var TRAIL_LEN = 80;
var SPAWN_RADIUS = 180;

var particles = [];
var lastFPS = 60;
var fpsSmooth = 60;

function Particle() {
    // Random position inside circle
    var angle = random(TWO_PI);
    var r = sqrt(random()) * SPAWN_RADIUS;
    this.x = width / 2 + cos(angle) * r;
    this.y = height / 2 + sin(angle) * r;

    // Zero initial velocity
    this.vx = 0;
    this.vy = 0;

    this.ax = 0;
    this.ay = 0;

    // Trail history
    this.trail = [];
    this.speed = 0;
}

function setup() {
    createCanvas(windowWidth, windowHeight);
    colorMode(HSB, 360, 100, 100, 100);
    blendMode(ADD);
    noStroke();

    for (var i = 0; i < N; i++) {
        particles.push(new Particle());
    }
}

function computeForces() {
    // Reset accelerations
    for (var i = 0; i < N; i++) {
        particles[i].ax = 0;
        particles[i].ay = 0;
    }

    // O(N²) pairwise gravity
    for (var i = 0; i < N; i++) {
        for (var j = i + 1; j < N; j++) {
            var pi = particles[i];
            var pj = particles[j];
            var dx = pj.x - pi.x;
            var dy = pj.y - pi.y;
            var r2 = dx * dx + dy * dy + SOFTENING_SQ;
            var r = sqrt(r2);
            var F = G * MASS * MASS / r2;
            var fx = F * dx / r;
            var fy = F * dy / r;

            pi.ax += fx / MASS;
            pi.ay += fy / MASS;
            pj.ax -= fx / MASS;
            pj.ay -= fy / MASS;
        }
    }
}

function integrateParticles() {
    for (var i = 0; i < N; i++) {
        var p = particles[i];

        // Velocity Verlet (simplified leapfrog)
        p.vx += p.ax * DT;
        p.vy += p.ay * DT;

        p.x += p.vx * DT;
        p.y += p.vy * DT;

        p.speed = sqrt(p.vx * p.vx + p.vy * p.vy);

        // Append to trail
        p.trail.push({ x: p.x, y: p.y, spd: p.speed });
        if (p.trail.length > TRAIL_LEN) {
            p.trail.shift();
        }
    }
}

function draw() {
    background(0, 0, 5, 8);

    // Physics
    computeForces();
    integrateParticles();

    // Draw trails and particles
    for (var i = 0; i < N; i++) {
        var p = particles[i];
        var tlen = p.trail.length;
        if (tlen < 2) continue;

        // Draw trail as connected dots
        for (var t = 1; t < tlen; t++) {
            var frac = t / tlen;
            var pt = p.trail[t];
            var spd = pt.spd;

            // Color: slow = blue (240), medium = teal-green (150), fast = yellow/white (60)
            var maxSpd = 8.0;
            var speedT = min(spd / maxSpd, 1.0);
            var hue, sat, bri;
            if (speedT < 0.3) {
                hue = map(speedT, 0, 0.3, 240, 200);
                sat = 90;
                bri = map(speedT, 0, 0.3, 50, 70);
            } else if (speedT < 0.7) {
                hue = map(speedT, 0.3, 0.7, 200, 120);
                sat = 85;
                bri = map(speedT, 0.3, 0.7, 70, 90);
            } else {
                hue = map(speedT, 0.7, 1.0, 120, 60);
                sat = map(speedT, 0.7, 1.0, 80, 30);
                bri = map(speedT, 0.7, 1.0, 90, 100);
            }

            var alpha = frac * frac * 65;
            var sz = map(frac, 0, 1, 1, 3.5);
            fill(hue, sat, bri, alpha);
            ellipse(pt.x, pt.y, sz, sz);
        }

        // Draw particle head
        var headSpd = p.speed;
        var maxSpd2 = 8.0;
        var st = min(headSpd / maxSpd2, 1.0);
        var headHue, headSat, headBri;
        if (st < 0.3) {
            headHue = map(st, 0, 0.3, 240, 200);
            headSat = 90; headBri = 80;
        } else if (st < 0.7) {
            headHue = map(st, 0.3, 0.7, 200, 120);
            headSat = 85; headBri = 95;
        } else {
            headHue = map(st, 0.7, 1.0, 120, 60);
            headSat = 50; headBri = 100;
        }
        // Glow
        fill(headHue, headSat, headBri, 25);
        ellipse(p.x, p.y, 12, 12);
        fill(headHue, headSat, headBri, 90);
        ellipse(p.x, p.y, 5, 5);
    }

    // FPS display
    fpsSmooth = fpsSmooth * 0.95 + frameRate() * 0.05;

    blendMode(BLEND);
    fill(0, 0, 60, 70);
    noStroke();
    textFont('monospace');
    textSize(13);
    textAlign(LEFT);
    text('N-Body Dance', 14, height - 28);
    textSize(11);
    fill(0, 0, 45, 65);
    text('N=' + N + '  FPS: ' + floor(fpsSmooth), 14, height - 12);
    blendMode(ADD);
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
    </script>
</body>
</html>
