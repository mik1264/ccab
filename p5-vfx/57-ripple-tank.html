<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Ripple Tank</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#fps { position:fixed; top:12px; left:50%; transform:translateX(-50%); color:#0f0; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:5px; z-index:999; }
#hint { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 14px; border-radius:6px; z-index:999; }
#ui { position:fixed; top:12px; right:12px; display:flex; flex-direction:column; gap:6px; z-index:999; }
#ui button {
  background: rgba(0,0,0,0.7);
  color: #ccc;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 5px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-family: monospace;
  font-size: 12px;
}
#ui button:hover { background: rgba(255,255,255,0.1); }
#ui button.active { border-color: #f90; color: #f90; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="hint">Click to drop stone · Right-click to add barrier</div>
<div id="ui">
  <button id="btnBarrier" onclick="toggleBarrierMode()">Add Barrier</button>
  <button onclick="clearBarriers()">Clear Barriers</button>
  <button onclick="clearWaves()">Clear Waves</button>
  <button onclick="addDoubleBarrier()">Double Slit</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
let barrierMode = false;
function toggleBarrierMode() {
  barrierMode = !barrierMode;
  document.getElementById('btnBarrier').classList.toggle('active', barrierMode);
}
function clearBarriers() { if (window._clearBarriers) window._clearBarriers(); }
function clearWaves() { if (window._clearWaves) window._clearWaves(); }
function addDoubleBarrier() { if (window._addDoubleBarrier) window._addDoubleBarrier(); }

new p5(function(p) {
  // Use reduced resolution for performance
  let SCALE = 3;
  let GW, GH;
  let u, uPrev, barrier;
  const C2 = 0.18;     // wave speed squared (must be < 0.5 for stability)
  const DAMP = 0.993;  // damping factor
  const BEACH = 14;    // absorbing beach width
  let fpsDiv = document.getElementById('fps');

  p.setup = function() {
    let cnv = p.createCanvas(p.windowWidth, p.windowHeight);
    cnv.parent(document.body);
    p.pixelDensity(1);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    GW = Math.floor(p.width / SCALE);
    GH = Math.floor(p.height / SCALE);
    initArrays();
    window._clearBarriers = () => { barrier.fill(0); };
    window._clearWaves = () => { u.fill(0); uPrev.fill(0); };
    window._addDoubleBarrier = addDoubleBarrier;
  };

  function initArrays() {
    u = new Float32Array(GW * GH);
    uPrev = new Float32Array(GW * GH);
    barrier = new Uint8Array(GW * GH);
  }

  function idx(x, y) { return y * GW + x; }

  function dropStone(px, py, amp) {
    let gx = Math.floor(px / SCALE);
    let gy = Math.floor(py / SCALE);
    let r = 3;
    for (let dy = -r; dy <= r; dy++)
      for (let dx = -r; dx <= r; dx++) {
        let nx = gx+dx, ny = gy+dy;
        if (nx < 1 || nx >= GW-1 || ny < 1 || ny >= GH-1) continue;
        let d2 = dx*dx+dy*dy;
        if (d2 <= r*r) {
          u[idx(nx,ny)] = amp * Math.exp(-d2/4);
          uPrev[idx(nx,ny)] = u[idx(nx,ny)];
        }
      }
  }

  function addBarrier(px, py) {
    let gx = Math.floor(px / SCALE);
    let gy = Math.floor(py / SCALE);
    for (let dy = -1; dy <= 1; dy++)
      for (let dx = -1; dx <= 1; dx++) {
        let nx = gx+dx, ny = gy+dy;
        if (nx < 1 || nx >= GW-1 || ny < 1 || ny >= GH-1) continue;
        barrier[idx(nx,ny)] = 1;
      }
  }

  function addDoubleBarrier() {
    let cx = Math.floor(GW / 2);
    let slitSep = Math.floor(GH * 0.1);
    let slitW = Math.floor(GH * 0.04);
    let half = Math.floor(GH * 0.5);
    for (let y = 2; y < GH-2; y++) {
      let inSlit1 = y >= half - slitSep/2 - slitW/2 && y <= half - slitSep/2 + slitW/2;
      let inSlit2 = y >= half + slitSep/2 - slitW/2 && y <= half + slitSep/2 + slitW/2;
      if (!inSlit1 && !inSlit2) {
        for (let dx = -1; dx <= 1; dx++) {
          if (cx+dx < 1 || cx+dx >= GW-1) continue;
          barrier[idx(cx+dx, y)] = 1;
        }
      }
    }
  }

  function step() {
    let nu = new Float32Array(GW * GH);
    for (let y = 1; y < GH-1; y++) {
      for (let x = 1; x < GW-1; x++) {
        let i = idx(x,y);
        if (barrier[i]) { nu[i] = 0; continue; }
        let laplacian = u[idx(x+1,y)] + u[idx(x-1,y)] + u[idx(x,y+1)] + u[idx(x,y-1)] - 4*u[i];
        // beach damping
        let bx = Math.min(x, GW-1-x, BEACH) / BEACH;
        let by = Math.min(y, GH-1-y, BEACH) / BEACH;
        let damp = DAMP * Math.min(bx, by);
        nu[i] = damp * (2*u[i] - uPrev[i] + C2 * laplacian);
      }
    }
    uPrev.set(u);
    u.set(nu);
  }

  p.mousePressed = function() {
    if (p.mouseButton === p.RIGHT || barrierMode) {
      addBarrier(p.mouseX, p.mouseY);
    } else {
      dropStone(p.mouseX, p.mouseY, 5.5);
    }
  };

  p.mouseDragged = function() {
    if (p.mouseButton === p.RIGHT || barrierMode) {
      addBarrier(p.mouseX, p.mouseY);
    } else if (p.frameCount % 3 === 0) {
      dropStone(p.mouseX, p.mouseY, 3.0);
    }
  };

  p.draw = function() {
    for (let s = 0; s < 3; s++) step();

    p.loadPixels();
    let pw = p.width, ph = p.height;

    for (let gy = 0; gy < GH; gy++) {
      for (let gx = 0; gx < GW; gx++) {
        let gi = gy * GW + gx;
        let isBarrier = barrier[gi];
        let val = u[gi];

        let r, g, b;
        if (isBarrier) {
          r = 60; g = 65; b = 70;
        } else {
          let norm = val / 3;
          if (norm > 0.04) {
            // warm (orange-yellow)
            let t = Math.min(norm, 1);
            r = Math.floor(200 + t * 55);
            g = Math.floor(t * 160);
            b = 0;
          } else if (norm < -0.04) {
            // cool (cyan-blue)
            let t = Math.min(-norm, 1);
            r = 0;
            g = Math.floor(t * 120);
            b = Math.floor(100 + t * 155);
          } else {
            r = g = b = 4;
          }
        }

        // Paint SCALE x SCALE block
        for (let sy = 0; sy < SCALE; sy++) {
          for (let sx = 0; sx < SCALE; sx++) {
            let px = gx*SCALE + sx;
            let py = gy*SCALE + sy;
            if (px >= pw || py >= ph) continue;
            let pi = (py * pw + px) * 4;
            p.pixels[pi]   = r;
            p.pixels[pi+1] = g;
            p.pixels[pi+2] = b;
            p.pixels[pi+3] = 255;
          }
        }
      }
    }
    p.updatePixels();

    if (p.frameCount % 20 === 0) {
      fpsDiv.textContent = 'FPS: ' + Math.round(p.frameRate());
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    GW = Math.floor(p.width / SCALE);
    GH = Math.floor(p.height / SCALE);
    initArrays();
  };

  // prevent right-click menu
  document.addEventListener('contextmenu', e => e.preventDefault());
});
</script>
</body>
</html>
