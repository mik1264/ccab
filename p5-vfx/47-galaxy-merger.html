<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Merger | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const N_STARS = 3000; // per galaxy
        const G_MASS = 12000; // gravitational mass of each galactic center
        const G_CONST = 1.0;
        const SOFTENING = 22; // softening length to avoid singularity
        const DT = 0.18;
        const DISK_RADIUS = 160;
        const NUM_ARMS = 3;

        // Galaxy centers: positions, velocities
        let gc = [
            { x: -210, y: -40, vx: 0.55, vy: 0.35, mass: G_MASS },
            { x:  210, y:  40, vx: -0.55, vy: -0.35, mass: G_MASS }
        ];

        // Stars: [x, y, vx, vy, which galaxy (0 or 1), arm index]
        let stars = [];

        // Log-spiral distribution for a galaxy
        function initGalaxy(cx, cy, cvx, cvy, gIdx) {
            let armColors = [];
            for (let a = 0; a < NUM_ARMS; a++) {
                let baseAngle = (a / NUM_ARMS) * TWO_PI;
                let count = Math.floor(N_STARS / NUM_ARMS);
                for (let i = 0; i < count; i++) {
                    // Log spiral: r = a * e^(b*theta)
                    let t = random(0.4, 5.5); // wind amount
                    let r = random(8, DISK_RADIUS) * (0.3 + 0.7 * (t / 5.5));
                    let spread = random(-0.32, 0.32);
                    let ang = baseAngle + t + spread;
                    let sx = cx + r * cos(ang);
                    let sy = cy + r * sin(ang);

                    // Circular orbit velocity around galactic center
                    let dist = max(r, 12);
                    let orbV = sqrt(G_CONST * G_MASS / dist);

                    // Tangential velocity
                    let tangX = -sin(ang) * orbV;
                    let tangY =  cos(ang) * orbV;

                    // Velocity dispersion (spread)
                    let disp = random(0.4);
                    stars.push({
                        x: sx, y: sy,
                        vx: cvx + tangX + random(-disp, disp),
                        vy: cvy + tangY + random(-disp, disp),
                        gIdx,
                        arm: a,
                        brightness: random(0.3, 1.0),
                    });
                }
            }
            // Bulge stars
            for (let i = 0; i < N_STARS - Math.floor(N_STARS / NUM_ARMS) * NUM_ARMS + 60; i++) {
                let r = random(0, 30);
                let ang = random(TWO_PI);
                let dist = max(r, 5);
                let orbV = sqrt(G_CONST * G_MASS / dist) * 0.6;
                let tangX = -sin(ang) * orbV;
                let tangY =  cos(ang) * orbV;
                stars.push({
                    x: cx + r * cos(ang),
                    y: cy + r * sin(ang),
                    vx: cvx + tangX,
                    vy: cvy + tangY,
                    gIdx,
                    arm: -1,
                    brightness: random(0.6, 1.0),
                });
            }
        }

        let pg; // persistent graphics layer for trail accumulation

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);

            pg = createGraphics(windowWidth, windowHeight);
            pg.colorMode(HSB, 360, 100, 100, 100);
            pg.background(240, 30, 4);

            initGalaxy(gc[0].x + width/2, gc[0].y + height/2, gc[0].vx, gc[0].vy, 0);
            initGalaxy(gc[1].x + width/2, gc[1].y + height/2, gc[1].vx, gc[1].vy, 1);

            // Offset gc positions to canvas coordinates
            gc[0].x += width/2;  gc[0].y += height/2;
            gc[1].x += width/2;  gc[1].y += height/2;

            // Tilt galaxy 2 slightly for visual interest
            for (let s of stars) {
                if (s.gIdx === 1) {
                    // Rotate star position around gc[1] by 30 degrees
                    let dx = s.x - gc[1].x;
                    let dy = s.y - gc[1].y;
                    let tilt = 0.5;
                    s.x = gc[1].x + dx * cos(tilt) - dy * sin(tilt);
                    s.y = gc[1].y + dx * sin(tilt) + dy * cos(tilt);
                    s.vx = gc[1].vx + (s.vx - gc[1].vx) * cos(tilt) - (s.vy - gc[1].vy) * sin(tilt);
                    s.vy = gc[1].vy + (s.vx - gc[1].vx) * sin(tilt) + (s.vy - gc[1].vy) * cos(tilt);
                }
            }

            frameRate(60);
        }

        // Galaxy center gravity on a star
        function gravAccel(sx, sy) {
            let ax = 0, ay = 0;
            for (let g of gc) {
                let dx = g.x - sx;
                let dy = g.y - sy;
                let r2 = dx*dx + dy*dy + SOFTENING*SOFTENING;
                let r  = sqrt(r2);
                let f  = G_CONST * g.mass / r2;
                ax += f * dx / r;
                ay += f * dy / r;
            }
            return [ax, ay];
        }

        // Galaxy center mutual gravity
        function gravGC(i, j) {
            let dx = gc[j].x - gc[i].x;
            let dy = gc[j].y - gc[i].y;
            let r2 = dx*dx + dy*dy + SOFTENING*SOFTENING;
            let r  = sqrt(r2);
            let f  = G_CONST * gc[j].mass / r2;
            return [f * dx / r, f * dy / r];
        }

        function draw() {
            // Fade the persistent canvas very slightly for trailing
            pg.blendMode(BLEND);
            pg.fill(240, 30, 4, 6);
            pg.noStroke();
            pg.rect(0, 0, width, height);

            pg.blendMode(ADD);

            // Update galaxy centers
            let [ax01, ay01] = gravGC(0, 1);
            let [ax10, ay10] = gravGC(1, 0);
            gc[0].vx += ax01 * DT; gc[0].vy += ay01 * DT;
            gc[1].vx += ax10 * DT; gc[1].vy += ay10 * DT;
            gc[0].x += gc[0].vx * DT; gc[0].y += gc[0].vy * DT;
            gc[1].x += gc[1].vx * DT; gc[1].y += gc[1].vy * DT;

            // Update stars
            for (let s of stars) {
                let [ax, ay] = gravAccel(s.x, s.y);
                s.vx += ax * DT;
                s.vy += ay * DT;
                s.x  += s.vx * DT;
                s.y  += s.vy * DT;
            }

            // Draw galaxy center glows
            pg.noStroke();
            // Glow rings
            for (let layer = 0; layer < 4; layer++) {
                let r = (4 - layer) * 9;
                let alpha = layer * 12;
                pg.fill(200, 70, 100, alpha);
                pg.ellipse(gc[0].x, gc[0].y, r*2);
                pg.fill(35, 80, 100, alpha);
                pg.ellipse(gc[1].x, gc[1].y, r*2);
            }
            pg.fill(200, 30, 100, 90);
            pg.ellipse(gc[0].x, gc[0].y, 10);
            pg.fill(45, 20, 100, 90);
            pg.ellipse(gc[1].x, gc[1].y, 10);

            // Draw stars
            pg.strokeWeight(1.2);
            for (let s of stars) {
                let bri = s.brightness;
                if (s.gIdx === 0) {
                    // Cyan/blue: hue 185-220
                    if (s.arm === -1) {
                        // Bulge: warm white-blue
                        pg.stroke(210, 30, 95 * bri, 80 * bri);
                    } else {
                        let hue = 185 + s.arm * 15;
                        pg.stroke(hue, 65, 85 * bri, 65 * bri);
                    }
                } else {
                    // Orange/gold: hue 20-50
                    if (s.arm === -1) {
                        // Bulge: warm white-gold
                        pg.stroke(45, 30, 95 * bri, 80 * bri);
                    } else {
                        let hue = 25 + s.arm * 12;
                        pg.stroke(hue, 75, 85 * bri, 65 * bri);
                    }
                }
                pg.point(s.x, s.y);
            }

            // Blit pg to main canvas
            image(pg, 0, 0);

            // FPS counter (on main canvas, no blendMode ADD)
            blendMode(BLEND);
            fill(255, 0, 80, 90);
            noStroke();
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width - 16, 16);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            pg.resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
