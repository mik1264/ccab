<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Discharge | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        new p5(function(p) {
            // Recursive branching Lichtenberg figure with animated growth
            const MAX_BRANCHES = 2200;
            const BRANCH_SPEED = 8;  // new segments added per frame during growth

            let branches = [];      // {x1,y1,x2,y2,depth,age,maxAge}
            let growQueue = [];     // segments yet to sprout children
            let phase = 'growing'; // 'growing' | 'flashing' | 'fading' | 'reset'
            let flashAlpha = 0;
            let phaseTimer = 0;
            let overallAlpha = 100;

            let fpsArr = [], lastTime = 0;

            function resetDischarge() {
                branches = [];
                growQueue = [];
                phase = 'growing';
                phaseTimer = 0;
                flashAlpha = 0;
                overallAlpha = 100;

                // Seed: start from center-top area
                const cx = p.width  * 0.5;
                const cy = p.height * 0.08;

                // Spawn 5 initial bolts spreading downward
                for (let b = 0; b < 5; b++) {
                    const ang = p.radians(-80 + b * 40) + p.random(-0.2, 0.2);
                    spawnBranch(cx, cy, ang, 0, 160);
                }
            }

            function spawnBranch(x, y, angle, depth, length) {
                if (depth > 9 || branches.length >= MAX_BRANCHES) return;
                const len = length * (0.6 + p.random(0.25));
                const ang = angle + p.random(-0.5, 0.5);
                const x2  = x + Math.cos(ang) * len;
                const y2  = y + Math.sin(ang) * len;

                const seg = { x1: x, y1: y, x2, y2, depth, drawn: false };
                branches.push(seg);
                growQueue.push({ x2, y2, angle: ang, depth: depth + 1, length: len });
            }

            function growStep() {
                const toProcess = Math.min(BRANCH_SPEED, growQueue.length);
                for (let i = 0; i < toProcess; i++) {
                    const item = growQueue.shift();
                    if (branches.length >= MAX_BRANCHES) continue;

                    // Main branch continues
                    spawnBranch(item.x2, item.y2, item.angle, item.depth, item.length);

                    // Random sub-branches
                    const numSub = item.depth < 3 ? p.floor(p.random(1, 3)) : p.floor(p.random(0, 2));
                    for (let s = 0; s < numSub; s++) {
                        const sideAng = item.angle + p.random(-1.1, 1.1);
                        spawnBranch(item.x2, item.y2, sideAng, item.depth + 1, item.length * 0.65);
                    }
                }
            }

            // Precompute glow layers
            function drawBranch(seg) {
                const depth = seg.depth;
                const maxDepth = 9;
                const t = depth / maxDepth;

                // Core brightness: bright at root, dim at tips
                const bright = 100 - t * 55;
                // Hue: white-blue core, purple tips
                const hue = p.lerp(200, 280, t);
                const sat = p.lerp(20, 90, t);

                // Width: thick at root, thin at tips
                const w = p.lerp(3.5, 0.5, t);

                // Glow layers (outer to inner)
                const layers = [
                    { aw: w * 8,  alpha: 6  * overallAlpha / 100 },
                    { aw: w * 4,  alpha: 15 * overallAlpha / 100 },
                    { aw: w * 2,  alpha: 35 * overallAlpha / 100 },
                    { aw: w,      alpha: 70 * overallAlpha / 100 }
                ];

                for (const layer of layers) {
                    p.strokeWeight(layer.aw);
                    p.stroke(hue, sat, bright, layer.alpha + flashAlpha * 0.4);
                    p.line(seg.x1, seg.y1, seg.x2, seg.y2);
                }

                // Bright white core at shallow depths
                if (depth < 4) {
                    p.strokeWeight(p.max(0.5, w * 0.4));
                    p.stroke(200, 10, 100, 90 * overallAlpha / 100 + flashAlpha * 0.5);
                    p.line(seg.x1, seg.y1, seg.x2, seg.y2);
                }
            }

            p.setup = function() {
                p.createCanvas(p.windowWidth, p.windowHeight);
                p.colorMode(p.HSB, 360, 100, 100, 100);
                p.background(240, 30, 3);
                resetDischarge();
            };

            p.mousePressed = function() {
                resetDischarge();
            };

            p.draw = function() {
                p.blendMode(p.BLEND);
                p.background(240, 30, 3);
                p.blendMode(p.ADD);

                if (phase === 'growing') {
                    if (growQueue.length > 0) {
                        growStep();
                    } else {
                        phase = 'flashing';
                        phaseTimer = 0;
                    }
                } else if (phase === 'flashing') {
                    phaseTimer++;
                    flashAlpha = 60 * Math.sin(phaseTimer * 0.35) * Math.exp(-phaseTimer * 0.015);
                    if (phaseTimer > 80) {
                        phase = 'fading';
                        phaseTimer = 0;
                        flashAlpha = 0;
                    }
                } else if (phase === 'fading') {
                    phaseTimer++;
                    overallAlpha = 100 * Math.max(0, 1 - phaseTimer / 100);
                    if (phaseTimer > 100) {
                        phase = 'reset';
                        phaseTimer = 0;
                    }
                } else if (phase === 'reset') {
                    phaseTimer++;
                    if (phaseTimer > 30) resetDischarge();
                }

                // Draw all branches
                p.noFill();
                for (const seg of branches) {
                    drawBranch(seg);
                }

                // Source glow at origin
                if (phase === 'growing' || phase === 'flashing') {
                    const cx = p.width * 0.5;
                    const cy = p.height * 0.08;
                    for (let r = 30; r > 0; r -= 5) {
                        p.noStroke();
                        p.fill(200, 40, 100, (3 + flashAlpha * 0.1) * overallAlpha / 100);
                        p.ellipse(cx, cy, r * 2, r * 1.2);
                    }
                }

                // FPS overlay
                p.blendMode(p.BLEND);
                const now = p.millis();
                const dt = now - lastTime; lastTime = now;
                fpsArr.push(1000 / Math.max(dt, 1));
                if (fpsArr.length > 30) fpsArr.shift();
                const fps = Math.round(fpsArr.reduce((a, b) => a + b, 0) / fpsArr.length);

                p.noStroke();
                p.fill(0, 0, 0, 60);
                p.rect(p.width - 82, 8, 74, 26, 4);
                p.fill(0, 0, 100, 80);
                p.textFont('monospace');
                p.textSize(13);
                p.textAlign(p.RIGHT);
                p.text(`FPS: ${fps}`, p.width - 12, 26);

                p.fill(0, 0, 60, 60);
                p.textAlign(p.LEFT);
                p.textSize(12);
                p.text('Click to restart', 12, p.height - 16);

                p.blendMode(p.ADD);
            };

            p.windowResized = function() {
                p.resizeCanvas(p.windowWidth, p.windowHeight);
                p.background(240, 30, 3);
                resetDischarge();
            };
        });
    </script>
</body>
</html>
