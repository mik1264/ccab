<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metaballs | P5.js VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
.back-link {
  position: fixed; top: 16px; left: 16px; z-index: 100;
  color: rgba(255,255,255,0.6); text-decoration: none;
  font-size: 13px; letter-spacing: 0.05em;
  background: rgba(255,255,255,0.08);
  padding: 6px 12px; border-radius: 20px;
  transition: background 0.2s;
}
.back-link:hover { background: rgba(255,255,255,0.18); color: #fff; }
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Gallery</a>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

const RES = 4; // marching squares grid resolution
const THRESHOLD = 1.0;
const NUM_BALLS = 8;

let balls = [];
let cols, rows;

// Marching squares edge table
// Each cell has 4 corners (TL, TR, BR, BL) -> 16 cases
// We store line segments as pairs of edge midpoints
// Edges: 0=top, 1=right, 2=bottom, 3=left
const MC_EDGES = [
  [],          // 0000
  [[3,2]],     // 0001
  [[1,2]],     // 0010
  [[3,1]],     // 0011
  [[0,1]],     // 0100
  [[0,1],[3,2]], // 0101 - saddle (pick one)
  [[0,2]],     // 0110
  [[0,3]],     // 0111
  [[0,3]],     // 1000
  [[0,2]],     // 1001
  [[0,3],[1,2]], // 1010 - saddle
  [[0,1]],     // 1011
  [[3,1]],     // 1100
  [[1,2]],     // 1101
  [[3,2]],     // 1110
  []           // 1111
];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  cols = floor(width / RES) + 2;
  rows = floor(height / RES) + 2;

  // Initialize metaballs with orbital paths
  for (let i = 0; i < NUM_BALLS; i++) {
    let t = i / NUM_BALLS * TWO_PI;
    let r = random(40, 80);
    balls.push({
      x: width / 2,
      y: height / 2,
      r: r,
      // Lissajous-like orbit parameters
      ax: random(100, min(width, height) * 0.35),
      ay: random(80, min(width, height) * 0.35),
      fx: random(0.3, 1.2),
      fy: random(0.3, 1.2),
      phase: t,
      speed: random(0.3, 0.8) * (random() > 0.5 ? 1 : -1)
    });
  }
}

function field(x, y) {
  let sum = 0;
  for (let b of balls) {
    let dx = x - b.x;
    let dy = y - b.y;
    let d2 = dx * dx + dy * dy;
    if (d2 < 1) d2 = 1;
    sum += (b.r * b.r) / d2;
  }
  return sum;
}

function edgeMidpoint(ex, ey, edge, cellX, cellY) {
  let x0 = cellX * RES;
  let y0 = cellY * RES;
  let x1 = x0 + RES;
  let y1 = y0 + RES;
  switch (edge) {
    case 0: return [(x0 + x1) / 2, y0];
    case 1: return [x1, (y0 + y1) / 2];
    case 2: return [(x0 + x1) / 2, y1];
    case 3: return [x0, (y0 + y1) / 2];
  }
}

function draw() {
  let t = frameCount * 0.008;

  // Update ball positions
  for (let i = 0; i < balls.length; i++) {
    let b = balls[i];
    let angle = t * b.speed + b.phase;
    b.x = width / 2 + b.ax * cos(b.fx * angle);
    b.y = height / 2 + b.ay * sin(b.fy * angle + 0.7);
  }

  background(240, 20, 3);

  // --- Fill interior using marching squares polygon fill ---
  blendMode(BLEND);

  // Sample field on grid
  let fieldVals = new Float32Array(cols * rows);
  for (let gy = 0; gy < rows; gy++) {
    for (let gx = 0; gx < cols; gx++) {
      fieldVals[gy * cols + gx] = field(gx * RES, gy * RES);
    }
  }

  // Collect inside cells and draw filled rectangles with color gradient
  for (let gy = 0; gy < rows - 1; gy++) {
    for (let gx = 0; gx < cols - 1; gx++) {
      let f00 = fieldVals[gy * cols + gx];
      let f10 = fieldVals[gy * cols + gx + 1];
      let f11 = fieldVals[(gy + 1) * cols + gx + 1];
      let f01 = fieldVals[(gy + 1) * cols + gx];

      let maxF = max(f00, f10, f11, f01);
      if (maxF < THRESHOLD * 0.3) continue;

      // Determine if inside
      let inside = (f00 + f10 + f11 + f01) / 4;
      if (inside >= THRESHOLD) {
        // Map field to color
        let strength = min(inside / 3, 1);
        let hue = lerp(280, 180, strength); // violet -> cyan
        let sat = lerp(60, 100, strength);
        let bri = lerp(40, 85, strength);
        noStroke();
        fill(hue, sat, bri, 90);
        rect(gx * RES, gy * RES, RES, RES);
      }
    }
  }

  // Draw contour lines via marching squares
  blendMode(ADD);
  for (let gy = 0; gy < rows - 1; gy++) {
    for (let gx = 0; gx < cols - 1; gx++) {
      let f00 = fieldVals[gy * cols + gx];
      let f10 = fieldVals[gy * cols + gx + 1];
      let f11 = fieldVals[(gy + 1) * cols + gx + 1];
      let f01 = fieldVals[(gy + 1) * cols + gx];

      let c0 = f00 >= THRESHOLD ? 1 : 0; // TL
      let c1 = f10 >= THRESHOLD ? 1 : 0; // TR
      let c2 = f11 >= THRESHOLD ? 1 : 0; // BR
      let c3 = f01 >= THRESHOLD ? 1 : 0; // BL
      let caseIdx = (c0 << 3) | (c1 << 2) | (c2 << 1) | c3;

      let segs = MC_EDGES[caseIdx];
      if (!segs || segs.length === 0) continue;

      for (let seg of segs) {
        let [e0, e1] = seg;
        let [ax, ay] = edgeMidpoint(gx, gy, e0, gx, gy);
        let [bx, by] = edgeMidpoint(gx, gy, e1, gx, gy);
        stroke(180, 90, 100, 70);
        strokeWeight(1.5);
        line(ax, ay, bx, by);
      }
    }
  }

  // Draw glow on metaball centers
  noStroke();
  for (let b of balls) {
    for (let r2 = 30; r2 >= 2; r2 -= 2) {
      let alpha = (32 - r2) * 2.5;
      fill(180, 90, 100, alpha);
      circle(b.x, b.y, r2 * 1.5);
    }
    fill(60, 10, 100, 90);
    circle(b.x, b.y, 6);
  }

  blendMode(BLEND);

  // Title
  fill(180, 80, 100, 60);
  noStroke();
  textSize(13);
  textAlign(RIGHT);
  text('Metaballs', width - 20, height - 20);
  fill(0, 0, 70, 40);
  textSize(11);
  text('marching squares isosurface', width - 20, height - 6);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = floor(width / RES) + 2;
  rows = floor(height / RES) + 2;
}
</script>
</body>
</html>
