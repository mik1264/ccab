<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Membrane | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        new p5(function(p) {
            // Wave equation on a grid: d2u/dt2 = c2*(laplacian u) - damping*du/dt
            const N = 80;          // grid size NxN
            const C2 = 0.24;       // wave speed squared (c^2)
            const DAMP = 0.0018;   // damping coefficient
            const DT = 1.0;        // time step
            const SCALE = 3.2;     // z scale for display

            // Double-buffer the field
            let u    = new Float32Array(N * N);
            let uPrv = new Float32Array(N * N);
            let uVel = new Float32Array(N * N);

            // Periodic forcing point
            let forceX = Math.floor(N * 0.35);
            let forceY = Math.floor(N * 0.35);
            let forceTimer = 0;
            const FORCE_PERIOD = 18;

            function idx(ix, iy) { return ix + N * iy; }

            function initMembrane() {
                u.fill(0); uPrv.fill(0); uVel.fill(0);
                // Initial pluck at center
                pluck(Math.floor(N / 2), Math.floor(N / 2), 40, 2.5);
            }

            function pluck(cx, cy, radius, amplitude) {
                for (let ix = 0; ix < N; ix++) {
                    for (let iy = 0; iy < N; iy++) {
                        const d = Math.sqrt((ix - cx)**2 + (iy - cy)**2);
                        if (d < radius) {
                            const gauss = Math.exp(-d * d / (2 * (radius * 0.35)**2));
                            u[idx(ix, iy)]    += amplitude * gauss;
                            uPrv[idx(ix, iy)] += amplitude * gauss;
                        }
                    }
                }
            }

            function stepWave() {
                const uNew = new Float32Array(N * N);
                for (let ix = 1; ix < N - 1; ix++) {
                    for (let iy = 1; iy < N - 1; iy++) {
                        const i = idx(ix, iy);
                        const lap = u[idx(ix+1,iy)] + u[idx(ix-1,iy)]
                                  + u[idx(ix,iy+1)] + u[idx(ix,iy-1)]
                                  - 4 * u[i];
                        const vel = u[i] - uPrv[i];
                        uNew[i] = u[i] + vel * (1 - DAMP) + C2 * lap * DT * DT;
                    }
                }
                // Fixed boundary: edges stay 0
                uPrv.set(u);
                u.set(uNew);
            }

            initMembrane();

            let autoRotY = 0;
            let fpsArr = [], lastTime = 0;
            let autoForceTimer = 0;

            p.setup = function() {
                p.createCanvas(p.windowWidth, p.windowHeight, p.WEBGL);
                p.colorMode(p.HSB, 360, 100, 100, 100);
            };

            p.mousePressed = function() {
                // Map screen click to grid coords (very approximate)
                const gx = p.constrain(Math.round(p.mouseX / p.width * N), 2, N - 3);
                const gy = p.constrain(Math.round(p.mouseY / p.height * N), 2, N - 3);
                pluck(gx, gy, 8, 3.5);
            };

            p.draw = function() {
                p.background(220, 60, 5);
                p.orbitControl(3, 3, 0.05);

                autoRotY += 0.005;
                p.rotateY(autoRotY);
                p.rotateX(0.65);

                p.ambientLight(20, 15, 25);
                p.directionalLight(200, 50, 90,  0.5, -1, -0.4);
                p.directionalLight(30,  80, 85, -0.5, -0.3, 0.7);

                // Periodic forcing at a point to sustain oscillation
                autoForceTimer++;
                if (autoForceTimer % FORCE_PERIOD === 0) {
                    const f = 0.6 * Math.sin(autoForceTimer * 0.08);
                    u[idx(forceX, forceY)] += f;
                    // Second forcing at different point, different mode
                    const fx2 = Math.floor(N * 0.65), fy2 = Math.floor(N * 0.65);
                    u[idx(fx2, fy2)] += 0.4 * Math.sin(autoForceTimer * 0.11 + 1.2);
                }

                // Physics steps
                for (let s = 0; s < 2; s++) stepWave();

                // Render as 3D surface using TRIANGLE_STRIP per row
                const step = p.constrain(Math.floor(N / 40), 1, 4); // thin out for perf
                const displayW = 360;
                const displayH = 360;
                const cellW = displayW / N;
                const cellH = displayH / N;

                p.noStroke();
                for (let iy = 0; iy < N - step; iy += step) {
                    p.beginShape(p.TRIANGLE_STRIP);
                    for (let ix = 0; ix < N; ix += step) {
                        for (let row = 0; row <= step; row += step) {
                            const iy2 = iy + row;
                            if (iy2 >= N) continue;
                            const i = idx(ix, iy2);
                            const val = u[i];
                            const z = val * SCALE;
                            const x = (ix / (N-1) - 0.5) * displayW;
                            const y = (iy2 / (N-1) - 0.5) * displayH;

                            // Color by z
                            let hue, sat, bri;
                            if (val > 0) {
                                hue = 35 - val * 5;
                                sat = 70 + val * 10;
                                bri = 50 + val * 25;
                            } else {
                                hue = 200 + val * (-15);
                                sat = 75;
                                bri = 40 + val * (-20);
                            }
                            p.fill(
                                p.constrain(hue, 0, 360),
                                p.constrain(sat, 40, 100),
                                p.constrain(bri, 10, 100),
                                95
                            );
                            p.vertex(x, y, z);
                        }
                    }
                    p.endShape();
                }

                // FPS in screen space
                const now = p.millis();
                const dt = now - lastTime; lastTime = now;
                fpsArr.push(1000 / Math.max(dt, 1));
                if (fpsArr.length > 30) fpsArr.shift();
                const fps = Math.round(fpsArr.reduce((a, b) => a + b, 0) / fpsArr.length);

                p.resetMatrix();
                p.noLights();
                p.noStroke();
                p.fill(0, 0, 100, 70);
                p.textFont('monospace');
                p.textSize(13);
                p.textAlign(p.RIGHT);
                p.text(`FPS: ${fps}`, p.width / 2 - 12, -p.height / 2 + 28);

                p.textAlign(p.LEFT);
                p.fill(0, 0, 70, 70);
                p.textSize(12);
                p.text('Click to pluck', -p.width / 2 + 80, p.height / 2 - 20);
            };

            p.windowResized = function() { p.resizeCanvas(p.windowWidth, p.windowHeight); };
        });
    </script>
</body>
</html>
