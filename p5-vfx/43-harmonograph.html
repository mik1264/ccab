<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonograph | P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#0a0a0f; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#info { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:8px 12px; border-radius:6px; z-index:999; line-height:1.7; text-align:right; }
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Gallery</a>
<div id="info" id="info">Harmonograph<br><span id="ratio">2:3</span></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

// Frequency ratio presets [f1_num, f1_den, f2_num, f2_den]
const RATIOS = [
  [1, 1,  "1:1"],
  [2, 3,  "2:3"],
  [3, 4,  "3:4"],
  [3, 5,  "3:5"],
  [4, 5,  "4:5"],
  [5, 6,  "5:6"],
  [5, 7,  "5:7"],
  [6, 7,  "6:7"],
  [7, 8,  "7:8"],
  [2, 1,  "2:1"],
];

// Damping params
const D1 = 0.002, D2 = 0.0015;
// Points per frame
const PTS_PER_FRAME = 300;
// dt per point
const DT = 0.01;

let t = 0;
let ratioIdx = 0;
let f1, f2;
let p1 = 0, p2;
let A;
let fadeMode = false;
let fadeAlpha = 0;
let offscreen;        // accumulation layer
let infoEl, ratioEl;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(min(pixelDensity(), 2));
  A = min(width, height) * 0.42;

  offscreen = createGraphics(width, height);
  offscreen.colorMode(HSB, 360, 100, 100, 100);
  offscreen.background(0, 0, 3);
  offscreen.noFill();
  offscreen.blendMode(ADD);

  ratioEl = document.getElementById('ratio');
  loadRatio(ratioIdx);
}

function loadRatio(idx) {
  let r = RATIOS[idx];
  f1 = r[0]; f2 = r[1];
  p2 = PI / 4;
  t = 0;
  fadeMode = false;
  fadeAlpha = 0;
  offscreen.background(0, 0, 3);
  ratioEl.textContent = r[2];
}

function harmonX(tt) {
  return A * sin(f1 * tt + p1) * exp(-D1 * tt);
}
function harmonY(tt) {
  return A * sin(f2 * tt + p2) * exp(-D2 * tt);
}

function draw() {
  if (fadeMode) {
    // Slow fade to black then switch
    fadeAlpha += 1.2;
    background(0, 0, 3, min(fadeAlpha, 100));
    image(offscreen, 0, 0);
    if (fadeAlpha >= 100) {
      ratioIdx = (ratioIdx + 1) % RATIOS.length;
      loadRatio(ratioIdx);
    }
    return;
  }

  // Draw accumulated offscreen
  background(0, 0, 3);
  image(offscreen, 0, 0);

  // Draw new points onto offscreen
  offscreen.strokeWeight(1.2);
  let done = false;
  for (let i = 0; i < PTS_PER_FRAME; i++) {
    let x0 = harmonX(t);
    let y0 = harmonY(t);
    t += DT;
    let x1 = harmonX(t);
    let y1 = harmonY(t);

    let decay = exp(-D1 * t);
    if (decay < 0.001) { done = true; break; }

    // Hue cycles with t, mapped to avoid monotony
    let hue = (t * 3.5) % 360;
    let sat = 90;
    let bri = 75 + 25 * decay;
    let alpha = map(decay, 0.001, 1, 10, 60);

    offscreen.stroke(hue, sat, bri, alpha);
    offscreen.line(
      width/2 + x0, height/2 + y0,
      width/2 + x1, height/2 + y1
    );
  }

  if (done) {
    fadeMode = true;
    fadeAlpha = 0;
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  A = min(width, height) * 0.42;
  offscreen.resizeCanvas(width, height);
  offscreen.background(0, 0, 3);
  loadRatio(ratioIdx);
}
</script>
</body></html>
