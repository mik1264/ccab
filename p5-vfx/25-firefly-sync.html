<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firefly Synchronization | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020904; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

// Kuramoto / Mirollo-Strogatz Firefly Synchronization
// 200 oscillators coupling together into synchronized flashing

var fireflies = [];
var N = 200;
var dt = 0.04;
var K = 0;           // coupling strength
var K_target = 0;
var K_max = 4.0;
var cycleTime = 600; // frames for full K cycle
var glows = [];      // flash bursts

// Order parameter history for bar
var orderHistory = [];
var maxHistory = 200;

function setup() {
    createCanvas(windowWidth, windowHeight);
    colorMode(HSB, 360, 100, 100, 100);
    frameRate(60);

    // Scatter fireflies in canvas
    for (var i = 0; i < N; i++) {
        fireflies.push({
            x: random(width * 0.05, width * 0.95),
            y: random(height * 0.08, height * 0.92),
            phase: random(TWO_PI),          // θ ∈ [0, 2π)
            omega: random(0.8, 1.2) * PI,  // natural frequency ωᵢ
            lastFlash: -100
        });
    }
}

function draw() {
    // Dark forest night background
    background(130, 80, 2, 100);

    // Draw canopy silhouette
    drawForest();

    // Update coupling strength K (oscillates)
    var t = frameCount / cycleTime;
    // K follows a smooth sine wave: 0 → K_max → 0 → ...
    K = K_max * 0.5 * (1 - cos(t * TWO_PI * 0.5));

    // Kuramoto update
    updateFireflies();

    // Compute order parameter r = |Σ exp(iθ)| / N
    var re = 0, im = 0;
    for (var i = 0; i < N; i++) {
        re += cos(fireflies[i].phase);
        im += sin(fireflies[i].phase);
    }
    var r = Math.sqrt(re * re + im * im) / N;
    orderHistory.push(r);
    if (orderHistory.length > maxHistory) orderHistory.shift();

    // Draw glow bursts
    drawGlows();

    // Draw fireflies
    drawFireflies();

    // Draw order parameter UI
    drawOrderBar(r);

    // Draw K strength indicator
    drawKGauge();

    // FPS
    push();
    fill(0, 0, 100, 50);
    noStroke();
    textFont('monospace');
    textSize(12);
    textAlign(RIGHT, TOP);
    text(Math.round(frameRate()) + ' fps', width - 16, 16);
    pop();
}

function updateFireflies() {
    var phases = [];
    for (var i = 0; i < N; i++) phases.push(fireflies[i].phase);

    for (var i = 0; i < N; i++) {
        var ff = fireflies[i];
        // Kuramoto: dθᵢ/dt = ωᵢ + (K/N) * Σⱼ sin(θⱼ - θᵢ)
        var coupling = 0;
        for (var j = 0; j < N; j++) {
            if (i !== j) coupling += sin(phases[j] - phases[i]);
        }
        ff.phase += (ff.omega + (K / N) * coupling) * dt;

        // Detect flash: phase crosses 2π
        if (ff.phase >= TWO_PI) {
            ff.phase -= TWO_PI;
            // Create glow burst
            glows.push({ x: ff.x, y: ff.y, age: 0, maxAge: 25 });
            ff.lastFlash = frameCount;
        }
    }
}

function drawFireflies() {
    push();
    for (var i = 0; i < N; i++) {
        var ff = fireflies[i];
        // Brightness based on phase proximity to flash point (approaching 2π)
        var brightness = pow(ff.phase / TWO_PI, 4); // dim most of cycle, bright near flash
        var alpha = lerp(8, 85, brightness);
        var size = lerp(2, 7, brightness);

        // Yellow-green glow
        fill(72, 90, 100, alpha);
        noStroke();
        ellipse(ff.x, ff.y, size, size);

        // Halo
        if (brightness > 0.5) {
            fill(72, 70, 100, alpha * 0.3);
            ellipse(ff.x, ff.y, size * 3, size * 3);
        }
    }
    pop();
}

function drawGlows() {
    var toRemove = [];
    push();
    noStroke();
    for (var i = 0; i < glows.length; i++) {
        var g = glows[i];
        g.age++;
        if (g.age >= g.maxAge) { toRemove.push(i); continue; }
        var t = g.age / g.maxAge;
        var alpha = lerp(90, 0, t);
        var sz = lerp(4, 60, t);
        // Bright core
        fill(65, 80, 100, alpha);
        ellipse(g.x, g.y, sz * 0.4, sz * 0.4);
        // Wide soft halo
        fill(75, 60, 100, alpha * 0.25);
        ellipse(g.x, g.y, sz, sz);
        fill(80, 40, 100, alpha * 0.1);
        ellipse(g.x, g.y, sz * 1.6, sz * 1.6);
    }
    pop();
    for (var r = toRemove.length - 1; r >= 0; r--) {
        glows.splice(toRemove[r], 1);
    }
}

function drawOrderBar(r) {
    var barX = 16;
    var barY = height - 70;
    var barW = 180;
    var barH = 8;

    push();
    noStroke();
    // Label
    fill(0, 0, 80, 70);
    textFont('monospace');
    textSize(11);
    textAlign(LEFT, BOTTOM);
    text('Synchrony r = ' + r.toFixed(2), barX, barY - 2);

    // Background
    fill(0, 0, 20, 70);
    rect(barX, barY, barW, barH, 4);

    // Order bar (green when synced, dim when not)
    var barHue = lerp(0, 75, r);
    fill(barHue, 80, 90, 85);
    rect(barX, barY, barW * r, barH, 4);

    // History sparkline
    stroke(75, 70, 90, 50);
    strokeWeight(1);
    noFill();
    beginShape();
    for (var h = 0; h < orderHistory.length; h++) {
        var hx = barX + (h / maxHistory) * barW;
        var hy = barY - 4 - orderHistory[h] * 25;
        vertex(hx, hy);
    }
    endShape();

    pop();
}

function drawKGauge() {
    var gx = width - 80;
    var gy = height - 60;

    push();
    noStroke();
    fill(0, 0, 80, 60);
    textFont('monospace');
    textSize(11);
    textAlign(CENTER, BOTTOM);
    text('K = ' + K.toFixed(2), gx + 30, gy - 2);

    fill(0, 0, 15, 70);
    rect(gx, gy, 60, 8, 4);
    fill(200, 70, 90, 80);
    rect(gx, gy, 60 * (K / K_max), 8, 4);
    pop();
}

function drawForest() {
    push();
    noStroke();
    // Simple silhouette tree shapes at bottom
    for (var i = 0; i < 18; i++) {
        var tx = (i / 17) * width;
        var th = random(height * 0.15, height * 0.3);
        var tw = random(30, 70);
        fill(130, 60, 4, 90);
        // Triangle tree
        triangle(tx, height, tx - tw / 2, height - th, tx + tw / 2, height - th);
        // Trunk
        fill(25, 50, 8, 90);
        rect(tx - 4, height - 20, 8, 20);
    }
    pop();
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
    </script>
</body>
</html>
