<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Field Painting — p5 VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; font-family:monospace; font-size:13px; color:#0f0; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; font-family:monospace; font-size:12px; color:#888; background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">New composition every 30s — Rothko-inspired color field painting</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let t = 0;
  let fpsEl = document.getElementById('fps');
  let frameAcc = 0, fpsTimer = 0, lastFps = 0;

  // Color theory palettes (HSB)
  const PALETTES = [
    // Warm-cool contrast (complementary)
    [{h:15,s:80,b:70},{h:195,s:60,b:55},{h:30,s:70,b:80},{h:210,s:50,b:45}],
    // Triadic: red, yellow, blue
    [{h:355,s:75,b:65},{h:45,s:70,b:80},{h:220,s:65,b:55},{h:0,s:5,b:15}],
    // Split-complementary: orange base with blue-green, blue-violet
    [{h:28,s:85,b:75},{h:175,s:55,b:50},{h:255,s:60,b:45},{h:40,s:40,b:88}],
    // Analogous warm: red-orange-yellow
    [{h:0,s:70,b:60},{h:25,s:75,b:70},{h:50,s:65,b:75},{h:10,s:20,b:20}],
    // Cool contemplative: deep blue, violet, grey
    [{h:240,s:55,b:40},{h:270,s:50,b:35},{h:200,s:40,b:55},{h:250,s:10,b:15}],
    // Rothko red-maroon
    [{h:5,s:85,b:55},{h:350,s:70,b:35},{h:20,s:60,b:60},{h:0,s:10,b:10}],
  ];

  let currentPalette = 0;
  let nextPalette = 1;
  let crossfade = 0; // 0..1
  let compTimer = 0;
  const COMP_DURATION = 30; // seconds

  // Each composition: 3-4 bands
  let bands = [];

  function makeBands(palIdx) {
    let pal = PALETTES[palIdx];
    let numBands = 3 + Math.floor(Math.random() * 2);
    let bds = [];
    let yPos = 0;
    for (let i = 0; i < numBands; i++) {
      let col = pal[i % pal.length];
      let heightFrac = i === numBands - 1 ? 1.0 - yPos : 0.2 + Math.random() * 0.35;
      heightFrac = Math.min(heightFrac, 1.0 - yPos - (numBands - i - 1) * 0.1);
      bds.push({
        y: yPos,
        h: heightFrac,
        hue: col.h + (Math.random() - 0.5) * 20,
        sat: col.s + (Math.random() - 0.5) * 15,
        bri: col.b + (Math.random() - 0.5) * 10,
        breathPhase: Math.random() * Math.PI * 2,
        breathSpeed: 0.3 + Math.random() * 0.4,
      });
      yPos += heightFrac;
    }
    return bds;
  }

  let bandsA, bandsB;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    bandsA = makeBands(currentPalette);
    bandsB = makeBands(nextPalette);
  };

  // Gaussian soft edge between bands
  function softEdge(y, bandY, bandH, edgeWidth) {
    let top = bandY;
    let bot = bandY + bandH;
    let topFade = p.constrain((y - top) / edgeWidth, 0, 1);
    let botFade = p.constrain((bot - y) / edgeWidth, 0, 1);
    return Math.min(topFade, botFade);
  }

  // Render a set of bands at a given time offset
  function renderBands(bands, tx) {
    let W = p.width, H = p.height;
    for (let band of bands) {
      let breathe = 0.012 * Math.sin(tx * band.breathSpeed + band.breathPhase);
      let yTop    = (band.y - breathe) * H;
      let yBot    = (band.y + band.h + breathe * 2) * H;
      let edgeH   = H * 0.06; // soft edge height

      // Draw soft rectangle via pixels — but that's slow; use gradient rects
      // Use drawingContext for linear gradients (fast)
      let ctx = p.drawingContext;
      // Grain noise pass: we'll use p5 noise applied per band rect
      // Simple approach: paint band color with alpha gradient top and bottom
      let [r1, g1, b1] = hsbToRgb(band.hue, band.sat, band.bri);
      // Body rect
      ctx.fillStyle = `rgb(${r1},${g1},${b1})`;
      ctx.fillRect(0, yTop + edgeH, W, yBot - yTop - edgeH * 2);
      // Top edge gradient
      let gtop = ctx.createLinearGradient(0, yTop, 0, yTop + edgeH);
      gtop.addColorStop(0, `rgba(${r1},${g1},${b1},0)`);
      gtop.addColorStop(1, `rgba(${r1},${g1},${b1},1)`);
      ctx.fillStyle = gtop;
      ctx.fillRect(0, yTop, W, edgeH);
      // Bottom edge gradient
      let gbot = ctx.createLinearGradient(0, yBot - edgeH, 0, yBot);
      gbot.addColorStop(0, `rgba(${r1},${g1},${b1},1)`);
      gbot.addColorStop(1, `rgba(${r1},${g1},${b1},0)`);
      ctx.fillStyle = gbot;
      ctx.fillRect(0, yBot - edgeH, W, edgeH);
    }
  }

  // Add grain texture via pixel loop
  function addGrain() {
    p.loadPixels();
    let arr = p.pixels;
    for (let i = 0; i < arr.length; i += 4) {
      let n = (Math.random() - 0.5) * 18;
      arr[i]   = Math.max(0, Math.min(255, arr[i]   + n));
      arr[i+1] = Math.max(0, Math.min(255, arr[i+1] + n));
      arr[i+2] = Math.max(0, Math.min(255, arr[i+2] + n));
    }
    p.updatePixels();
  }

  function hsbToRgb(h, s, b) {
    let hh = h/60, ss = s/100, bb = b/100;
    let hi = Math.floor(hh)%6, f = hh - Math.floor(hh);
    let pv=bb*(1-ss), qv=bb*(1-ss*f), tv=bb*(1-ss*(1-f));
    if(hi===0) return [Math.round(bb*255),Math.round(tv*255),Math.round(pv*255)];
    if(hi===1) return [Math.round(qv*255),Math.round(bb*255),Math.round(pv*255)];
    if(hi===2) return [Math.round(pv*255),Math.round(bb*255),Math.round(tv*255)];
    if(hi===3) return [Math.round(pv*255),Math.round(qv*255),Math.round(bb*255)];
    if(hi===4) return [Math.round(tv*255),Math.round(pv*255),Math.round(bb*255)];
    return [Math.round(bb*255),Math.round(pv*255),Math.round(qv*255)];
  }

  p.draw = function() {
    // Slowly shift hues in bands
    for (let band of bandsA) band.hue = (band.hue + 0.015) % 360;
    for (let band of bandsB) band.hue = (band.hue + 0.015) % 360;

    compTimer += p.deltaTime / 1000.0;
    // Crossfade last 4 seconds of each 30s cycle
    let fadeDur = 4.0;
    if (compTimer > COMP_DURATION) {
      crossfade = Math.min(1, (compTimer - COMP_DURATION) / fadeDur);
    }
    if (compTimer > COMP_DURATION + fadeDur) {
      // Swap
      bandsA = bandsB;
      currentPalette = nextPalette;
      nextPalette = (nextPalette + 1) % PALETTES.length;
      bandsB = makeBands(nextPalette);
      compTimer = 0;
      crossfade = 0;
    }

    // Render to canvas
    p.background(0);
    if (crossfade < 0.01) {
      renderBands(bandsA, t);
    } else {
      // Blend A and B
      // Draw A at full, then B on top with opacity crossfade
      renderBands(bandsA, t);
      p.drawingContext.globalAlpha = crossfade;
      renderBands(bandsB, t);
      p.drawingContext.globalAlpha = 1.0;
    }

    // Add subtle grain
    if (p.frameCount % 2 === 0) addGrain();

    t += 0.005;

    // FPS
    frameAcc++;
    fpsTimer += p.deltaTime;
    if (fpsTimer >= 500) {
      lastFps = Math.round(frameAcc * 1000 / fpsTimer);
      frameAcc = 0; fpsTimer = 0;
      fpsEl.textContent = lastFps + ' fps';
      fpsEl.style.color = lastFps >= 50 ? '#0f0' : lastFps >= 30 ? '#ff0' : '#f44';
    }
  };

  p.windowResized = function() { p.resizeCanvas(p.windowWidth, p.windowHeight); };
});
</script>
</body>
</html>
