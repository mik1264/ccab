<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuron Firing Network | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0f0a; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

const sketch = (p) => {
    const NUM_NEURONS = 85;
    const CONN_RANGE = 160;
    const MAX_CONNS = 5;
    const AXON_SPEED = 3.2;
    const REFRACT_TIME = 90;
    const FIRE_DURATION = 18;
    const THRESHOLD = 0.72;

    let neurons = [];
    let connections = [];
    let pulses = [];
    let fpsVal = 0;
    let trailLayer;

    class Neuron {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.r = p.random(7, 13);
            this.potential = p.random(0, 0.3);
            this.state = 'resting'; // resting | firing | refractory
            this.fireTimer = 0;
            this.refractTimer = 0;
            this.connections = [];
            this.dendrites = [];
            this.hue = p.random(150, 220); // blue-green range
            this.pulseRings = [];
        }

        stimulate(amount) {
            if (this.state === 'resting') {
                this.potential += amount;
                if (this.potential >= THRESHOLD) this.fire();
            }
        }

        fire() {
            if (this.state !== 'resting') return;
            this.state = 'firing';
            this.fireTimer = FIRE_DURATION;
            this.potential = 1.0;
            this.pulseRings.push({ r: this.r, alpha: 100 });
            // propagate along connections
            for (let c of this.connections) {
                pulses.push(new Pulse(this, c.target, c.weight));
            }
        }

        update() {
            if (this.state === 'firing') {
                this.fireTimer--;
                if (this.fireTimer <= 0) {
                    this.state = 'refractory';
                    this.refractTimer = REFRACT_TIME;
                    this.potential = -0.2;
                }
            } else if (this.state === 'refractory') {
                this.refractTimer--;
                this.potential = p.lerp(this.potential, 0, 0.06);
                if (this.refractTimer <= 0) {
                    this.state = 'resting';
                    this.potential = 0;
                }
            } else {
                this.potential = p.lerp(this.potential, 0, 0.02);
            }

            // Update pulse rings
            for (let i = this.pulseRings.length - 1; i >= 0; i--) {
                this.pulseRings[i].r += 1.8;
                this.pulseRings[i].alpha -= 4;
                if (this.pulseRings[i].alpha <= 0) this.pulseRings.splice(i, 1);
            }
        }

        draw() {
            // Draw dendrites
            for (let d of this.dendrites) {
                p.stroke(this.hue, 40, 25, 60);
                p.strokeWeight(0.6);
                p.noFill();
                p.beginShape();
                p.vertex(this.x, this.y);
                p.bezierVertex(
                    this.x + d.cx1, this.y + d.cy1,
                    d.tx + d.cx2, d.ty + d.cy2,
                    d.tx, d.ty
                );
                p.endShape();
            }

            // Draw pulse rings
            p.noFill();
            for (let ring of this.pulseRings) {
                p.stroke(55, 80, 100, ring.alpha);
                p.strokeWeight(1.2);
                p.ellipse(this.x, this.y, ring.r * 2, ring.r * 2);
            }

            // Draw soma
            let h, s, b, a;
            if (this.state === 'firing') {
                const t = 1 - this.fireTimer / FIRE_DURATION;
                h = p.lerp(55, 40, t);
                s = p.lerp(10, 95, t);
                b = p.lerp(95, 100, t);
                a = 100;
            } else if (this.state === 'refractory') {
                const t = 1 - this.refractTimer / REFRACT_TIME;
                h = p.lerp(0, this.hue, t);
                s = p.lerp(70, 40, t);
                b = p.lerp(30, 45, t);
                a = 100;
            } else {
                h = this.hue;
                s = 50 + this.potential * 30;
                b = 30 + this.potential * 25;
                a = 100;
            }

            // Glow
            if (this.state === 'firing') {
                p.noStroke();
                const ft = 1 - this.fireTimer / FIRE_DURATION;
                for (let gr = this.r * 4; gr >= this.r; gr -= 2) {
                    const ga = p.map(gr, this.r, this.r * 4, 50, 0) * (1 - ft * 0.5);
                    p.fill(50, 100, 100, ga);
                    p.ellipse(this.x, this.y, gr * 2, gr * 2);
                }
            }

            p.stroke(h, s * 0.6, b + 20, 80);
            p.strokeWeight(1.2);
            p.fill(h, s, b, a);
            p.ellipse(this.x, this.y, this.r * 2, this.r * 2);

            // Nucleus
            p.noStroke();
            p.fill(h, s * 0.3, b + 15, 70);
            p.ellipse(this.x - this.r * 0.25, this.y - this.r * 0.25, this.r * 0.8, this.r * 0.8);
        }
    }

    class Pulse {
        constructor(src, tgt, weight) {
            this.src = src;
            this.tgt = tgt;
            this.weight = weight;
            this.t = 0;
            this.speed = AXON_SPEED / p.dist(src.x, src.y, tgt.x, tgt.y);
            this.done = false;
        }

        update() {
            this.t += this.speed;
            if (this.t >= 1) {
                this.t = 1;
                this.done = true;
                this.tgt.stimulate(this.weight * 0.45);
            }
        }

        draw() {
            const x = p.lerp(this.src.x, this.tgt.x, this.t);
            const y = p.lerp(this.src.y, this.tgt.y, this.t);
            const alpha = p.map(this.t, 0, 1, 90, 30);

            // Trail
            for (let i = 0; i < 4; i++) {
                const bt = p.max(0, this.t - i * 0.04);
                const bx = p.lerp(this.src.x, this.tgt.x, bt);
                const by = p.lerp(this.src.y, this.tgt.y, bt);
                const ba = alpha * (1 - i / 4);
                const bs = (3 - i * 0.5);
                p.noStroke();
                p.fill(55, 90, 100, ba);
                p.ellipse(bx, by, bs, bs);
            }

            // Bright head
            p.noStroke();
            p.fill(55, 20, 100, 95);
            p.ellipse(x, y, 4, 4);
        }
    }

    p.setup = () => {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.colorMode(p.HSB, 360, 100, 100, 100);
        p.frameRate(60);
        buildNetwork();
    };

    function buildNetwork() {
        neurons = [];
        connections = [];
        pulses = [];

        const margin = 80;
        for (let i = 0; i < NUM_NEURONS; i++) {
            let x, y, valid;
            let tries = 0;
            do {
                valid = true;
                x = p.random(margin, p.width - margin);
                y = p.random(margin, p.height - margin);
                for (let n of neurons) {
                    if (p.dist(x, y, n.x, n.y) < 38) { valid = false; break; }
                }
                tries++;
            } while (!valid && tries < 80);
            neurons.push(new Neuron(x, y));
        }

        // Build connections
        for (let i = 0; i < neurons.length; i++) {
            const n = neurons[i];
            // Find nearby neurons, sort by distance
            let nearby = [];
            for (let j = 0; j < neurons.length; j++) {
                if (i === j) continue;
                const d = p.dist(n.x, n.y, neurons[j].x, neurons[j].y);
                if (d < CONN_RANGE) nearby.push({ idx: j, d });
            }
            nearby.sort((a, b) => a.d - b.d);
            const numConns = Math.floor(p.random(2, MAX_CONNS + 1));
            for (let k = 0; k < Math.min(numConns, nearby.length); k++) {
                const tgt = neurons[nearby[k].idx];
                const w = p.random(0.5, 1.0);
                n.connections.push({ target: tgt, weight: w });
                connections.push({ src: n, tgt, w });

                // Axon is drawn as connection line; dendrites are the receiving branches
                tgt.dendrites.push({
                    tx: tgt.x, ty: tgt.y,
                    cx1: p.random(-30, 30), cy1: p.random(-30, 30),
                    cx2: p.random(-20, 20), cy2: p.random(-20, 20)
                });
            }
        }
    }

    let spontaneousTimer = 0;

    p.draw = () => {
        p.background(120, 20, 5, 100);

        // Draw connection axons
        p.noFill();
        for (let c of connections) {
            const d = p.dist(c.src.x, c.src.y, c.tgt.x, c.tgt.y);
            const alpha = p.map(d, 0, CONN_RANGE, 28, 5);
            p.stroke(170, 30, 35, alpha);
            p.strokeWeight(0.8);
            p.line(c.src.x, c.src.y, c.tgt.x, c.tgt.y);
        }

        // Update and draw neurons
        for (let n of neurons) {
            n.update();
            n.draw();
        }

        // Update and draw pulses
        for (let i = pulses.length - 1; i >= 0; i--) {
            pulses[i].update();
            pulses[i].draw();
            if (pulses[i].done) pulses.splice(i, 1);
        }

        // Spontaneous firing
        spontaneousTimer--;
        if (spontaneousTimer <= 0) {
            const n = neurons[Math.floor(p.random(neurons.length))];
            if (n.state === 'resting') n.fire();
            spontaneousTimer = Math.floor(p.random(25, 80));
        }

        // FPS
        fpsVal = p.lerp(fpsVal, p.frameRate(), 0.05);
        p.fill(0, 0, 85, 90);
        p.noStroke();
        p.textFont('monospace');
        p.textSize(12);
        p.textAlign(p.RIGHT, p.TOP);
        p.text(Math.round(fpsVal) + ' fps', p.width - 14, 14);
    };

    p.mousePressed = () => {
        // Find nearest neuron to click and fire it
        let best = null, bestD = 40;
        for (let n of neurons) {
            const d = p.dist(p.mouseX, p.mouseY, n.x, n.y);
            if (d < bestD) { best = n; bestD = d; }
        }
        if (best) best.fire();
        else {
            // Fire a few random ones for a cascade
            for (let i = 0; i < 3; i++) {
                const n = neurons[Math.floor(p.random(neurons.length))];
                if (n.state === 'resting') n.fire();
            }
        }
    };

    p.windowResized = () => {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        buildNetwork();
    };
};

new p5(sketch);
    </script>
</body>
</html>
