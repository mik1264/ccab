<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mycelium Network — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<div id="info">Tips: 0 | Food remaining: 100</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const INIT_TIPS = 50;
const MAX_TIPS = 600;
const BRANCH_PROB = 0.008;
const NOISE_SCALE = 0.008;
const SPEED = 1.2;
const NUM_FOOD = 100;
const FOOD_RADIUS = 20;
const SENSE_DIST = 60;

let tips = [];
let food = [];
let noiseOffset = 0;
let generation = 0;

let fpsEl, infoEl;
let lastFpsTime = 0, frameCount2 = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(min(pixelDensity(), 2));
  background(0, 0, 4);
  fpsEl = document.getElementById('fps');
  infoEl = document.getElementById('info');
  lastFpsTime = millis();

  // Scatter food
  for (let i = 0; i < NUM_FOOD; i++) {
    food.push({
      x: random(width * 0.05, width * 0.95),
      y: random(height * 0.05, height * 0.95),
      alive: true,
      flashTimer: 0
    });
  }

  // Spawn initial tips from center
  let cx = width / 2, cy = height / 2;
  for (let i = 0; i < INIT_TIPS; i++) {
    let angle = random(TWO_PI);
    tips.push(createTip(cx + random(-5,5), cy + random(-5,5), angle, 0));
  }
}

function createTip(x, y, angle, age) {
  return { x, y, angle, age, fed: false, fedTimer: 0, px: x, py: y };
}

function draw() {
  // Fade background slightly for faint trail effect
  noStroke();
  fill(0, 0, 0, 3);
  rect(0, 0, width, height);

  let aliveFood = food.filter(f => f.alive);

  let newTips = [];
  for (let i = tips.length - 1; i >= 0; i--) {
    let t = tips[i];
    t.px = t.x; t.py = t.y;

    // Find nearest food
    let nearestDist = Infinity, nearestFood = null;
    for (let f of aliveFood) {
      let dx = f.x - t.x, dy = f.y - t.y;
      let d = sqrt(dx*dx + dy*dy);
      if (d < SENSE_DIST && d < nearestDist) { nearestDist = d; nearestFood = f; }
    }

    // Steer toward food or noise
    if (nearestFood) {
      let dx = nearestFood.x - t.x, dy = nearestFood.y - t.y;
      let targetAngle = atan2(dy, dx);
      let diff = targetAngle - t.angle;
      while (diff > PI) diff -= TWO_PI;
      while (diff < -PI) diff += TWO_PI;
      t.angle += diff * 0.15;
      // Check if reached food
      if (nearestDist < FOOD_RADIUS) {
        nearestFood.alive = false;
        nearestFood.flashTimer = 30;
        t.fed = true; t.fedTimer = 20;
      }
    } else {
      // Perlin noise steering
      let n = noise(t.x * NOISE_SCALE, t.y * NOISE_SCALE, noiseOffset);
      t.angle += map(n, 0, 1, -0.15, 0.15);
    }

    t.x += cos(t.angle) * SPEED;
    t.y += sin(t.angle) * SPEED;
    t.age++;
    if (t.fedTimer > 0) t.fedTimer--;
    else t.fed = false;

    // Kill if out of bounds
    if (t.x < 0 || t.x > width || t.y < 0 || t.y > height) {
      tips.splice(i, 1);
      continue;
    }

    // Draw hypha segment
    let ageNorm = min(t.age / 800, 1);
    let h, s, b, sw;
    if (t.fedTimer > 0) {
      // Flash yellow when fed
      h = 55; s = 90; b = 100; sw = 1.5;
    } else if (t.age < 80) {
      // Young: bright cyan
      h = 185; s = 80; b = map(t.age, 0, 80, 100, 75); sw = 1;
    } else {
      // Old: fading to white
      h = lerp(185, 0, ageNorm);
      s = lerp(80, 0, ageNorm);
      b = lerp(75, 95, ageNorm);
      sw = lerp(1, 0.6, ageNorm);
    }

    stroke(h, s, b, 70);
    strokeWeight(sw);
    line(t.px, t.py, t.x, t.y);

    // Subtle glow for young tips
    if (t.age < 40) {
      stroke(185, 60, 80, 15);
      strokeWeight(sw * 3);
      line(t.px, t.py, t.x, t.y);
    }

    // Branching
    if (tips.length + newTips.length < MAX_TIPS && random() < BRANCH_PROB) {
      let branchAngle = t.angle + random(-PI/3, PI/3);
      newTips.push(createTip(t.x, t.y, branchAngle, 0));
    }
  }

  for (let nt of newTips) tips.push(nt);
  noiseOffset += 0.002;

  // Draw food
  noStroke();
  for (let f of food) {
    if (f.flashTimer > 0) {
      fill(55, 90, 100, map(f.flashTimer, 0, 30, 0, 80));
      ellipse(f.x, f.y, 14, 14);
      f.flashTimer--;
    } else if (f.alive) {
      fill(120, 70, 70, 60);
      ellipse(f.x, f.y, 6, 6);
      // Halo
      fill(120, 50, 60, 15);
      ellipse(f.x, f.y, 20, 20);
    }
  }

  // Draw tip dots
  noStroke();
  for (let t of tips) {
    if (t.age < 10) {
      fill(185, 80, 100, 80);
      ellipse(t.x, t.y, 3, 3);
    }
  }

  // FPS and info
  frameCount2++;
  let now = millis();
  if (now - lastFpsTime > 500) {
    fpsEl.textContent = (frameCount2 / ((now - lastFpsTime) / 1000)).toFixed(1) + ' fps';
    frameCount2 = 0; lastFpsTime = now;
    let aliveCount = food.filter(f => f.alive).length;
    infoEl.textContent = `Tips: ${tips.length} | Food remaining: ${aliveCount}`;
  }
}

function mousePressed() {
  // Add food at click
  food.push({ x: mouseX, y: mouseY, alive: true, flashTimer: 0 });
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(0, 0, 4);
}
</script>
</body></html>
