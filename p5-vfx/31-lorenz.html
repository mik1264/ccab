<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorenz Attractor 3D — Chaos/Attractors</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#666; font-family:monospace; font-size:12px; text-align:center; pointer-events:none; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Lorenz Attractor · σ=10 ρ=28 β=8/3 · Drag to rotate</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const N = 10;          // number of trajectories
  const MAX_PTS = 3000;  // ring buffer size per trajectory
  const STEPS = 50;      // integration steps per frame
  const dt = 0.005;
  const sigma = 10, rho = 28, beta = 8/3;

  // slightly offset initial conditions
  const initX = [0.01, 0.01001, 0.009999, 0.01002, 0.00998,
                  0.01003, 0.009997, 0.01004, 0.009996, 0.01005];

  let trails = [];      // each: { buf: Float32Array[MAX_PTS*3], head, count, x, y, z }
  let angleY = 0, angleX = 0.3;
  let dragging = false, lastMX = 0, lastMY = 0;
  let fpsEl, fpsTime = 0, fpsFrames = 0;

  // Scale: Lorenz spans roughly ±25 in x/y, 5–55 in z
  const SCALE = 11;

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');

    for (let i = 0; i < N; i++) {
      trails.push({
        buf: new Float32Array(MAX_PTS * 3),
        head: 0,
        count: 0,
        x: initX[i], y: 0, z: 25,
        hue: (i / N) * 360
      });
    }
    p.strokeWeight(1.2);
    p.noFill();
  };

  function lorenzStep(t) {
    for (let s = 0; s < STEPS; s++) {
      const dx = sigma * (t.y - t.x);
      const dy = t.x * (rho - t.z) - t.y;
      const dz = t.x * t.y - beta * t.z;
      t.x += dx * dt;
      t.y += dy * dt;
      t.z += dz * dt;
      const idx = t.head * 3;
      t.buf[idx]     = t.x;
      t.buf[idx + 1] = t.y;
      t.buf[idx + 2] = t.z;
      t.head = (t.head + 1) % MAX_PTS;
      if (t.count < MAX_PTS) t.count++;
    }
  }

  p.draw = function() {
    p.background(0, 0, 3);

    // FPS
    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(fpsFrames * 1000 / (now - fpsTime));
      fpsFrames = 0; fpsTime = now;
    }

    // Camera
    angleY += 0.003;
    p.rotateX(angleX);
    p.rotateY(angleY);

    // Integrate all trajectories
    for (let i = 0; i < N; i++) lorenzStep(trails[i]);

    // Draw each trail
    for (let i = 0; i < N; i++) {
      const t = trails[i];
      const len = t.count;
      if (len < 2) continue;

      p.beginShape(p.LINE_STRIP);
      for (let j = 0; j < len; j++) {
        // age: 0=oldest, 1=newest
        const age = j / len;
        const pIdx = ((t.head - len + j + MAX_PTS) % MAX_PTS) * 3;
        const px = t.buf[pIdx]     * SCALE;
        const py = (t.buf[pIdx+1]) * SCALE;
        const pz = (t.buf[pIdx+2] - 27) * SCALE; // center around z midpoint
        const h = (t.hue + age * 60) % 360;
        const bright = p.map(age, 0, 1, 20, 100);
        const alpha = p.map(age, 0, 1, 0, 90);
        p.stroke(h, 80, bright, alpha);
        p.vertex(px, -pz, py); // orient so butterfly is visible
      }
      p.endShape();
    }
  };

  p.mousePressed = function() { dragging = true; lastMX = p.mouseX; lastMY = p.mouseY; };
  p.mouseReleased = function() { dragging = false; };
  p.mouseDragged = function() {
    if (!dragging) return;
    angleY += (p.mouseX - lastMX) * 0.01;
    angleX += (p.mouseY - lastMY) * 0.01;
    lastMX = p.mouseX; lastMY = p.mouseY;
  };
  p.windowResized = function() { p.resizeCanvas(window.innerWidth, window.innerHeight); };
});
</script>
</body>
</html>
