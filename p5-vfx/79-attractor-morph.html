<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attractor Morph | P5.js VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.55); padding:6px 16px; border-radius:6px; text-align:center; pointer-events:none; }
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Gallery</a>
<div id="fps">FPS: --</div>
<div id="info">Loading...</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

new p5(function(p) {
  // ---- Attractor definitions ----
  const ATTRACTORS = [
    {
      name: 'Lorenz',
      dt: 0.005, scale: 5,
      init: () => [0.01, 0, 25],
      deriv: function(x, y, z) {
        const sigma = 10, rho = 28, beta = 8/3;
        return [sigma*(y-x), x*(rho-z)-y, x*y-beta*z];
      }
    },
    {
      name: 'Rössler',
      dt: 0.02, scale: 20,
      init: () => [0.1, 0, 0.1],
      deriv: function(x, y, z) {
        const a = 0.2, b = 0.2, c = 5.7;
        return [-y-z, x+a*y, b+z*(x-c)];
      }
    },
    {
      name: 'Aizawa',
      dt: 0.05, scale: 80,
      init: () => [0.1, 0, 0.1],
      deriv: function(x, y, z) {
        const a=0.95, b=0.7, c=0.6, d=3.5, e=0.25, f=0.1;
        return [
          (z-b)*x - d*y,
          d*x + (z-b)*y,
          c + a*z - z*z*z/3 - (x*x+y*y)*(1+e*z) + f*z*x*x*x
        ];
      }
    },
    {
      name: 'Chen',
      dt: 0.002, scale: 4,
      init: () => [0.1, 0, 0.1],
      deriv: function(x, y, z) {
        const a=35, b=3, c=28;
        return [a*(y-x), (c-a)*x - x*z + c*y, x*y - b*z];
      }
    },
    {
      name: 'Halvorsen',
      dt: 0.02, scale: 30,
      init: () => [0.1, 0, 0],
      deriv: function(x, y, z) {
        const a = 1.4;
        return [-a*x-4*y-4*z-y*y, -a*y-4*z-4*x-z*z, -a*z-4*x-4*y-x*x];
      }
    }
  ];

  const NUM_TRAJ  = 3;
  const TRAIL_LEN = 3000;
  const HUE_OFFSETS = [0, 120, 240];

  // Each trajectory: ring buffer of x,y,z (Float32), head, count
  let trajs = [];

  // Morph state
  let curIdx  = 0;
  let nextIdx = 1;
  let morphAlpha = 0;       // 0 = fully current, 1 = fully next
  const HOLD_TIME  = 8000;  // ms between morphs
  const MORPH_TIME = 2000;  // ms to blend
  let lastMorphStart = -HOLD_TIME; // start first hold immediately
  let morphing = false;

  let angleY = 0;
  let fpsEl, infoEl;
  let fpsTime = 0, fpsFrames = 0;

  function makeTrajectory(idx) {
    const init = ATTRACTORS[idx].init();
    return {
      buf: new Float32Array(TRAIL_LEN * 3),
      head: 0,
      count: 0,
      x: init[0] + (Math.random()-0.5)*0.01,
      y: init[1] + (Math.random()-0.5)*0.01,
      z: init[2] + (Math.random()-0.5)*0.01
    };
  }

  function blendedDeriv(t, curA, nextA, alpha) {
    const sc = curA.deriv(t.x, t.y, t.z);
    const sn = nextA.deriv(t.x, t.y, t.z);
    return [
      (1-alpha)*sc[0] + alpha*sn[0],
      (1-alpha)*sc[1] + alpha*sn[1],
      (1-alpha)*sc[2] + alpha*sn[2]
    ];
  }

  function stepTrajectory(t, curA, nextA, alpha) {
    const dt  = (1-alpha)*curA.dt + alpha*nextA.dt;
    // RK4
    const [k1x,k1y,k1z] = blendedDeriv(t, curA, nextA, alpha);
    const mid1 = {x: t.x+k1x*dt*0.5, y: t.y+k1y*dt*0.5, z: t.z+k1z*dt*0.5};
    const [k2x,k2y,k2z] = blendedDeriv(mid1, curA, nextA, alpha);
    const mid2 = {x: t.x+k2x*dt*0.5, y: t.y+k2y*dt*0.5, z: t.z+k2z*dt*0.5};
    const [k3x,k3y,k3z] = blendedDeriv(mid2, curA, nextA, alpha);
    const end  = {x: t.x+k3x*dt,     y: t.y+k3y*dt,     z: t.z+k3z*dt};
    const [k4x,k4y,k4z] = blendedDeriv(end, curA, nextA, alpha);
    t.x += (k1x+2*k2x+2*k3x+k4x)*dt/6;
    t.y += (k1y+2*k2y+2*k3y+k4y)*dt/6;
    t.z += (k1z+2*k2z+2*k3z+k4z)*dt/6;

    // Guard against blow-up during morph
    const mag = Math.sqrt(t.x*t.x+t.y*t.y+t.z*t.z);
    if (!isFinite(mag) || mag > 1e4) {
      const init = ATTRACTORS[curIdx].init();
      t.x = init[0]; t.y = init[1]; t.z = init[2];
    }

    const idx3 = t.head * 3;
    t.buf[idx3]   = t.x;
    t.buf[idx3+1] = t.y;
    t.buf[idx3+2] = t.z;
    t.head = (t.head + 1) % TRAIL_LEN;
    if (t.count < TRAIL_LEN) t.count++;
  }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    fpsEl  = document.getElementById('fps');
    infoEl = document.getElementById('info');

    for (let i = 0; i < NUM_TRAJ; i++) trajs.push(makeTrajectory(curIdx));
    p.noFill();
  };

  p.draw = function() {
    p.background(0, 0, 5, 100);
    p.blendMode(p.ADD);

    // FPS
    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(fpsFrames * 1000 / (now - fpsTime));
      fpsFrames = 0; fpsTime = now;
    }

    // Morph schedule
    const elapsed = now - lastMorphStart;
    if (!morphing && elapsed >= HOLD_TIME) {
      morphing = true;
      lastMorphStart = now;
    }
    if (morphing) {
      morphAlpha = Math.min(1, (now - lastMorphStart) / MORPH_TIME);
      if (morphAlpha >= 1) {
        // Commit transition
        curIdx = nextIdx;
        nextIdx = (nextIdx + 1) % ATTRACTORS.length;
        morphAlpha = 0;
        morphing = false;
        lastMorphStart = now;
        // Re-seed trajectories near new attractor
        for (let i = 0; i < NUM_TRAJ; i++) trajs[i] = makeTrajectory(curIdx);
      }
    }

    const curA  = ATTRACTORS[curIdx];
    const nextA = ATTRACTORS[nextIdx];
    const scaleA = (1-morphAlpha)*curA.scale + morphAlpha*nextA.scale;

    // Integrate 5 steps per frame
    for (let s = 0; s < 5; s++) {
      for (let i = 0; i < NUM_TRAJ; i++) stepTrajectory(trajs[i], curA, nextA, morphAlpha);
    }

    // Auto-rotate
    angleY += 0.004;
    p.rotateX(0.25);
    p.rotateY(angleY);

    // Draw trails
    p.strokeWeight(1);
    for (let ti = 0; ti < NUM_TRAJ; ti++) {
      const t = trajs[ti];
      if (t.count < 2) continue;
      const hBase = HUE_OFFSETS[ti];
      p.beginShape(p.LINE_STRIP);
      for (let j = 0; j < t.count; j++) {
        const age = j / t.count;
        const pIdx = ((t.head - t.count + j + TRAIL_LEN) % TRAIL_LEN) * 3;
        const vx = t.buf[pIdx]   / scaleA * 120;
        const vy = t.buf[pIdx+1] / scaleA * 120;
        const vz = t.buf[pIdx+2] / scaleA * 120;
        const h  = (hBase + age * 60) % 360;
        const br = p.map(age, 0, 1, 10, 95);
        const al = p.map(age, 0, 1, 0, 80);
        p.stroke(h, 80, br, al);
        p.vertex(vx, vy, vz);
      }
      p.endShape();
    }

    p.blendMode(p.BLEND);

    // 2D overlay for title
    p.resetMatrix();

    const curName  = ATTRACTORS[curIdx].name;
    const nextName = ATTRACTORS[nextIdx].name;
    if (morphing) {
      infoEl.textContent = curName + ' → ' + nextName + '  (morphing ' + Math.round(morphAlpha*100) + '%)';
    } else {
      const holdLeft = Math.max(0, Math.round((HOLD_TIME - elapsed) / 1000));
      infoEl.textContent = curName + ' Attractor  ·  next: ' + nextName + '  ·  ' + holdLeft + 's';
    }
  };

  p.windowResized = function() { p.resizeCanvas(window.innerWidth, window.innerHeight); };
});
</script>
</body>
</html>
