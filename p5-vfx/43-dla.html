<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diffusion Limited Aggregation — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<div id="info">Particles: 0 | Radius: 0</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const GW = 512, GH = 512;
const WALKERS_PER_FRAME = 8;
const MAX_PARTICLES = 12000;

let grid;           // Boolean grid: is cell occupied?
let hueGrid;        // Hue per cell
let pg;
let pixels_dirty = true;
let particleCount = 0;
let maxRadius = 0;

let fpsEl, infoEl;
let lastFpsTime = 0, frameCount2 = 0;

let walkers = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(1);
  grid = new Uint8Array(GW * GH);
  hueGrid = new Float32Array(GW * GH);
  pg = createGraphics(GW, GH);
  pg.pixelDensity(1);
  fpsEl = document.getElementById('fps');
  infoEl = document.getElementById('info');
  lastFpsTime = millis();
  imageMode(CORNER);
  noSmooth();

  // Seed center
  let cx = floor(GW / 2), cy = floor(GH / 2);
  grid[cy * GW + cx] = 1;
  hueGrid[cy * GW + cx] = 0;
  particleCount = 1;

  // Initial walkers
  for (let i = 0; i < WALKERS_PER_FRAME * 4; i++) spawnWalker();

  pg.background(0);
  pg.loadPixels();
}

function spawnWalker() {
  if (walkers.length > 300) return;
  let spawnRadius = maxRadius + 30;
  spawnRadius = constrain(spawnRadius, 10, min(GW, GH) / 2 - 2);
  let angle = random(TWO_PI);
  let cx = GW / 2, cy = GH / 2;
  walkers.push({
    x: round(cx + cos(angle) * spawnRadius),
    y: round(cy + sin(angle) * spawnRadius)
  });
}

const DIRS = [[-1,0],[1,0],[0,-1],[0,1]];

function hasNeighbor(x, y) {
  for (let d of DIRS) {
    let nx = x + d[0], ny = y + d[1];
    if (nx >= 0 && nx < GW && ny >= 0 && ny < GH && grid[ny * GW + nx]) return true;
  }
  return false;
}

function draw() {
  if (particleCount >= MAX_PARTICLES) {
    // Just show the result and reset
    if (particleCount === MAX_PARTICLES) {
      particleCount++;
      setTimeout(() => {
        grid.fill(0); hueGrid.fill(0);
        let cx = floor(GW/2), cy = floor(GH/2);
        grid[cy*GW+cx]=1; hueGrid[cy*GW+cx]=0;
        particleCount=1; maxRadius=0;
        walkers=[];
        pg.background(0);
        pg.loadPixels();
      }, 2000);
    }
    image(pg, 0, 0, width, height);
    return;
  }

  let killRadius = maxRadius + 80;
  let hueNorm = particleCount / MAX_PARTICLES;

  let newPixels = [];

  for (let i = walkers.length - 1; i >= 0; i--) {
    let w = walkers[i];
    // Random walk
    let d = DIRS[floor(random(4))];
    w.x += d[0]; w.y += d[1];

    // Kill if out of bounds or too far
    let cx = GW/2, cy = GH/2;
    let dx = w.x - cx, dy = w.y - cy;
    let dist = sqrt(dx*dx + dy*dy);
    if (w.x < 0 || w.x >= GW || w.y < 0 || w.y >= GH || dist > killRadius) {
      walkers.splice(i, 1);
      spawnWalker();
      continue;
    }

    // Check if touching aggregate
    if (hasNeighbor(w.x, w.y)) {
      let idx = w.y * GW + w.x;
      grid[idx] = 1;
      let h = hueNorm * 280; // blue→purple→red→yellow
      hueGrid[idx] = h;
      newPixels.push({ idx, h });
      particleCount++;
      let r = sqrt(dx*dx + dy*dy);
      if (r > maxRadius) maxRadius = r;
      walkers.splice(i, 1);
      spawnWalker();
      if (particleCount < MAX_PARTICLES) spawnWalker();
    }
  }

  // Update pixels buffer incrementally
  if (newPixels.length > 0) {
    pg.loadPixels();
    for (let np of newPixels) {
      let h = np.h;
      let s = 85, b = 95;
      // HSB to RGB
      let [r,g,bl] = hsbToRgb(h, s, b);
      let pi = np.idx * 4;
      pg.pixels[pi] = r; pg.pixels[pi+1] = g; pg.pixels[pi+2] = bl; pg.pixels[pi+3] = 255;
      // Also paint 1px neighbors for thickness
      let x = np.idx % GW, y = floor(np.idx / GW);
      for (let d of DIRS) {
        let nx = x+d[0], ny = y+d[1];
        if (nx>=0&&nx<GW&&ny>=0&&ny<GH) {
          let pi2 = (ny*GW+nx)*4;
          if (pg.pixels[pi2+3] === 0) {
            pg.pixels[pi2]=floor(r*0.4); pg.pixels[pi2+1]=floor(g*0.4); pg.pixels[pi2+2]=floor(bl*0.4); pg.pixels[pi2+3]=200;
          }
        }
      }
    }
    pg.updatePixels();
  }

  image(pg, 0, 0, width, height);

  // Draw active walkers
  noStroke();
  for (let w of walkers) {
    let sx = map(w.x, 0, GW, 0, width);
    let sy = map(w.y, 0, GH, 0, height);
    fill(180, 30, 60, 40);
    ellipse(sx, sy, 3, 3);
  }

  // FPS + info
  frameCount2++;
  let now = millis();
  if (now - lastFpsTime > 500) {
    fpsEl.textContent = (frameCount2 / ((now - lastFpsTime) / 1000)).toFixed(1) + ' fps';
    frameCount2 = 0; lastFpsTime = now;
    infoEl.textContent = `Particles: ${min(particleCount, MAX_PARTICLES)} | Radius: ${maxRadius.toFixed(0)}px`;
  }
}

function hsbToRgb(h, s, b) {
  s /= 100; b /= 100;
  let c = b * s;
  let x = c * (1 - abs((h / 60) % 2 - 1));
  let m = b - c;
  let r1,g1,bl1;
  if (h < 60)      { r1=c; g1=x; bl1=0; }
  else if (h < 120){ r1=x; g1=c; bl1=0; }
  else if (h < 180){ r1=0; g1=c; bl1=x; }
  else if (h < 240){ r1=0; g1=x; bl1=c; }
  else if (h < 300){ r1=x; g1=0; bl1=c; }
  else             { r1=c; g1=0; bl1=x; }
  return [floor((r1+m)*255), floor((g1+m)*255), floor((bl1+m)*255)];
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body></html>
