<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spirograph — P5.js VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:4px 10px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#888; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.5); padding:6px 12px; border-radius:6px; z-index:999; line-height:1.6; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Loading...</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  // Each spirograph: {R, r, d, hueOffset, phase, trailPoints}
  let spiros = [];
  let globalT = 0;
  let morphT = 0;
  let lastTime = 0;
  let fpsEl, infoEl;

  // Precomputed full curve for each spiro (updated when params change)
  const NUM_SPIROS = 3;
  const TRAIL_LENGTH = 1800;
  const STEP = 0.015;

  function makeParams(seed) {
    // Choose R, r, d to produce beautiful hypotrochoids
    let presets = [
      [7, 2, 5], [5, 3, 5], [7, 3, 3], [9, 4, 4],
      [8, 3, 5], [6, 2, 4], [11, 4, 6], [10, 3, 7],
      [7, 4, 3], [13, 5, 7], [5, 2, 4], [9, 5, 5]
    ];
    return presets[seed % presets.length];
  }

  function hypoX(R, r, d, t) {
    return (R - r) * Math.cos(t) + d * Math.cos((R - r) * t / r);
  }
  function hypoY(R, r, d, t) {
    return (R - r) * Math.sin(t) - d * Math.sin((R - r) * t / r);
  }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    infoEl = document.getElementById('info');

    for (let i = 0; i < NUM_SPIROS; i++) {
      let [R, r, d] = makeParams(i * 3);
      spiros.push({
        R, r, d,
        hueBase: (i * 120) % 360,
        trail: [],       // array of {x,y,hue,alpha}
        head: 0,         // current t value
        scale: 0,
        ox: 0, oy: 0,
        morphPhase: i * 0.3
      });
    }
    layoutSpiros();
  };

  function layoutSpiros() {
    // 3 spiros arranged in a triangle layout
    let cx = p.width / 2, cy = p.height / 2;
    let positions = [
      [cx, cy * 0.52],
      [cx - cx * 0.45, cy * 1.55],
      [cx + cx * 0.45, cy * 1.55]
    ];
    let scales = [Math.min(p.width, p.height) * 0.19,
                  Math.min(p.width, p.height) * 0.13,
                  Math.min(p.width, p.height) * 0.13];
    for (let i = 0; i < NUM_SPIROS; i++) {
      spiros[i].ox = positions[i][0];
      spiros[i].oy = positions[i][1];
      spiros[i].scale = scales[i];
    }
  }

  p.draw = function() {
    let now = p.millis();
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    if (dt > 0.1) dt = 0.1;

    // FPS
    if (p.frameCount % 15 === 0) {
      fpsEl.textContent = Math.round(p.frameRate()) + ' fps';
    }

    morphT += dt * 0.04; // slow morphing speed

    // Fading background
    p.background(0, 0, 0, 22);

    // Update each spirograph
    for (let i = 0; i < NUM_SPIROS; i++) {
      let s = spiros[i];

      // Slowly morph R, r, d
      let presetA = makeParams(i * 3 + Math.floor(morphT + s.morphPhase * 2));
      let presetB = makeParams(i * 3 + Math.floor(morphT + s.morphPhase * 2) + 1);
      let frac = (morphT + s.morphPhase * 2) % 1;
      s.R = presetA[0] + (presetB[0] - presetA[0]) * smoothstep(frac);
      s.r = presetA[1] + (presetB[1] - presetA[1]) * smoothstep(frac);
      s.d = presetA[2] + (presetB[2] - presetA[2]) * smoothstep(frac);

      // Advance drawing head
      let stepsPerFrame = 3;
      for (let step = 0; step < stepsPerFrame; step++) {
        s.head += STEP;
        let sc = s.scale / Math.max(s.R, 1);
        let x = s.ox + hypoX(s.R, s.r, s.d, s.head) * sc;
        let y = s.oy + hypoY(s.R, s.r, s.d, s.head) * sc;
        let hue = (s.hueBase + s.head * 20) % 360;
        s.trail.push({x, y, hue});
        if (s.trail.length > TRAIL_LENGTH) s.trail.shift();
      }

      // Draw trail
      p.strokeWeight(i === 0 ? 1.8 : 1.3);
      p.noFill();
      for (let j = 1; j < s.trail.length; j++) {
        let a = s.trail[j-1];
        let b = s.trail[j];
        let alpha = p.map(j, 0, s.trail.length, 0, 85);
        p.stroke(b.hue, 90, 95, alpha);
        p.line(a.x, a.y, b.x, b.y);
      }

      // Draw rolling circles (geometric visualization) for main spiro
      if (i === 0) drawRollingCircles(s);
    }

    // Info
    let s0 = spiros[0];
    infoEl.innerHTML = `Hypotrochoid  R=${s0.R.toFixed(1)}  r=${s0.r.toFixed(1)}  d=${s0.d.toFixed(1)}<br>x=(R-r)cos(t)+d·cos((R-r)t/r)`;

    globalT += dt;
  };

  function drawRollingCircles(s) {
    let sc = s.scale / Math.max(s.R, 1);
    let t = s.head;

    // Outer (fixed) circle
    let outerR = s.R * sc;
    p.noFill();
    p.stroke(180, 40, 50, 30);
    p.strokeWeight(0.5);
    p.circle(s.ox, s.oy, outerR * 2);

    // Inner (rolling) circle center
    let cx = s.ox + (s.R - s.r) * Math.cos(t) * sc;
    let cy = s.oy + (s.R - s.r) * Math.sin(t) * sc;
    let innerR = s.r * sc;

    p.stroke(60, 50, 70, 40);
    p.circle(cx, cy, innerR * 2);

    // Arm from inner center to tracing point
    let px = s.ox + hypoX(s.R, s.r, s.d, t) * sc;
    let py = s.oy + hypoY(s.R, s.r, s.d, t) * sc;
    p.stroke(60, 80, 90, 60);
    p.strokeWeight(0.8);
    p.line(cx, cy, px, py);

    // Tracing dot
    p.fill(0, 0, 100, 90);
    p.noStroke();
    p.circle(px, py, 6);
  }

  function smoothstep(x) {
    return x * x * (3 - 2 * x);
  }

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    layoutSpiros();
    for (let s of spiros) s.trail = [];
  };
});
</script>
</body>
</html>
