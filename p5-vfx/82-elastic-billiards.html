<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Billiards | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

new p5(function(p) {
    const TRAIL_LEN = 200;
    const N_BALLS = 5;
    const BALL_R = 18;
    const SPEED = 3.5;
    const HUES = [0, 50, 130, 200, 280]; // red, gold, green, cyan, violet

    // Stadium geometry (computed in setup)
    let SW, SH, SX, SY; // stadium width, height, top-left corner
    let capR;            // radius of semicircular caps
    let rectW;           // width of central rectangle

    let balls = [];

    let fpsVal = 0, fpsLast = 0, fpsFrames = 0;

    function makeBalls(perturb) {
        balls = [];
        for (let i = 0; i < N_BALLS; i++) {
            const angle = p.random(p.TWO_PI);
            const dx = Math.cos(angle) * SPEED + (perturb && i === 0 ? 0.001 : 0);
            const dy = Math.sin(angle) * SPEED;
            // Spread initial positions across stadium rectangle
            const bx = SX + capR + p.random(rectW);
            const by = SY + p.random(SH);
            balls.push({
                x: bx, y: by,
                vx: dx, vy: dy,
                hue: HUES[i],
                trail: []
            });
        }
    }

    p.setup = function() {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.colorMode(p.HSB, 360, 100, 100, 100);
        p.pixelDensity(1);
        computeStadium();
        makeBalls(false);
    };

    function computeStadium() {
        const margin = 80;
        SH = Math.min(p.height * 0.55, 300);
        SW = Math.min(p.width * 0.72, 700);
        SX = (p.width - SW) / 2;
        SY = (p.height - SH) / 2;
        capR = SH / 2;
        rectW = SW - 2 * capR;
    }

    // Reflect a ball off the stadium boundary.
    // Stadium: central rect [SX+capR, SX+capR+rectW] x [SY, SY+SH]
    //          left cap: circle center (SX+capR, SY+capR), radius capR
    //          right cap: circle center (SX+capR+rectW, SY+capR), radius capR
    function clampToBoundary(b) {
        const innerR = capR - BALL_R;
        const leftCX = SX + capR;
        const rightCX = SX + capR + rectW;
        const midY = SY + capR;

        // Determine region
        if (b.x < leftCX) {
            // Left cap
            const dx = b.x - leftCX;
            const dy = b.y - midY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > innerR) {
                const nx = dx / dist;
                const ny = dy / dist;
                // reflect velocity
                const dot = b.vx * nx + b.vy * ny;
                b.vx -= 2 * dot * nx;
                b.vy -= 2 * dot * ny;
                // push inside
                b.x = leftCX + nx * (innerR - 0.5);
                b.y = midY   + ny * (innerR - 0.5);
            }
        } else if (b.x > rightCX) {
            // Right cap
            const dx = b.x - rightCX;
            const dy = b.y - midY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > innerR) {
                const nx = dx / dist;
                const ny = dy / dist;
                const dot = b.vx * nx + b.vy * ny;
                b.vx -= 2 * dot * nx;
                b.vy -= 2 * dot * ny;
                b.x = rightCX + nx * (innerR - 0.5);
                b.y = midY    + ny * (innerR - 0.5);
            }
        } else {
            // Central rectangle
            const top    = SY + BALL_R;
            const bottom = SY + SH - BALL_R;
            if (b.y < top)    { b.y = top;    b.vy = Math.abs(b.vy); }
            if (b.y > bottom) { b.y = bottom; b.vy = -Math.abs(b.vy); }
        }
    }

    // Elastic collision between two equal-mass disks
    function collidePair(a, b2) {
        const dx = b2.x - a.x;
        const dy = b2.y - a.y;
        const dist2 = dx * dx + dy * dy;
        const minDist = 2 * BALL_R;
        if (dist2 < minDist * minDist && dist2 > 0.0001) {
            const dist = Math.sqrt(dist2);
            const nx = dx / dist;
            const ny = dy / dist;
            // Relative velocity along normal
            const dvx = a.vx - b2.vx;
            const dvy = a.vy - b2.vy;
            const dot = dvx * nx + dvy * ny;
            if (dot > 0) { // approaching
                a.vx -= dot * nx;
                a.vy -= dot * ny;
                b2.vx += dot * nx;
                b2.vy += dot * ny;
            }
            // Separate
            const overlap = (minDist - dist) / 2;
            a.x -= nx * overlap;
            a.y -= ny * overlap;
            b2.x += nx * overlap;
            b2.y += ny * overlap;
        }
    }

    function drawStadium() {
        const leftCX = SX + capR;
        const rightCX = SX + capR + rectW;
        const midY = SY + capR;

        p.stroke(255, 0, 35, 60);
        p.strokeWeight(1.5);
        p.noFill();
        // Draw stadium outline
        p.beginShape();
        // Top edge
        p.line(leftCX, SY, rightCX, SY);
        // Bottom edge
        p.line(leftCX, SY + SH, rightCX, SY + SH);
        // Left arc
        p.arc(leftCX, midY, capR * 2, capR * 2, p.HALF_PI, p.PI + p.HALF_PI);
        // Right arc
        p.arc(rightCX, midY, capR * 2, capR * 2, -p.HALF_PI, p.HALF_PI);
        p.endShape();
    }

    p.draw = function() {
        fpsFrames++;
        const now = performance.now();
        if (now - fpsLast >= 600) {
            fpsVal = Math.round(fpsFrames / ((now - fpsLast) / 1000));
            fpsFrames = 0; fpsLast = now;
        }

        // Fade background
        p.colorMode(p.RGB);
        p.fill(10, 10, 15, 30);
        p.noStroke();
        p.rect(0, 0, p.width, p.height);
        p.colorMode(p.HSB, 360, 100, 100, 100);

        // Physics
        for (let b of balls) {
            b.trail.push({ x: b.x, y: b.y });
            if (b.trail.length > TRAIL_LEN) b.trail.shift();
            b.x += b.vx;
            b.y += b.vy;
            clampToBoundary(b);
        }
        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                collidePair(balls[i], balls[j]);
            }
        }

        // Draw trails with additive blend
        p.drawingContext.globalCompositeOperation = 'lighter';
        for (let b of balls) {
            const len = b.trail.length;
            for (let t = 1; t < len; t++) {
                const alpha = (t / len) * 60;
                const bri   = 30 + (t / len) * 70;
                p.stroke(b.hue, 90, bri, alpha);
                p.strokeWeight(1.5);
                p.line(b.trail[t-1].x, b.trail[t-1].y, b.trail[t].x, b.trail[t].y);
            }
        }

        // Draw balls
        for (let b of balls) {
            p.noStroke();
            p.fill(b.hue, 60, 100, 90);
            p.ellipse(b.x, b.y, BALL_R * 2, BALL_R * 2);
            // glow ring
            p.fill(b.hue, 80, 100, 30);
            p.ellipse(b.x, b.y, BALL_R * 3, BALL_R * 3);
        }

        p.drawingContext.globalCompositeOperation = 'source-over';

        // Stadium outline on top
        drawStadium();

        // FPS
        p.textFont('monospace');
        p.textSize(12);
        p.textAlign(p.RIGHT, p.TOP);
        p.fill(0, 0, 80, 70);
        p.noStroke();
        p.text('FPS: ' + fpsVal, p.width - 12, 12);

        // Hint
        p.textAlign(p.CENTER, p.BOTTOM);
        p.fill(0, 0, 55, 55);
        p.textSize(11);
        p.text('SPACE = reset with near-identical start (reveals chaos)', p.width / 2, p.height - 8);
    };

    p.keyPressed = function() {
        if (p.key === ' ') makeBalls(true);
    };

    p.windowResized = function() {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        computeStadium();
        makeBalls(false);
    };
});
    </script>
</body>
</html>
