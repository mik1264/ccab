<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Pendulum Chaos — Chaos/Attractors</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050508; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#energy { position:fixed; top:44px; right:12px; color:#666; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#555; font-family:monospace; font-size:12px; text-align:center; pointer-events:none; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="energy">Energy: --</div>
<div id="info">Double Pendulum Chaos · 20 pendulums · Δθ=0.0001 rad · Watch divergence</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const N = 20;
  const TRAIL_LEN = 300;
  const SUBSTEPS = 4;
  const dt = 0.02 / SUBSTEPS;
  const g = 9.81;
  const m1 = 1, m2 = 1, L1 = 1, L2 = 1;

  let pendulums = [];
  let fpsEl, energyEl;
  let fpsTime = 0, fpsFrames = 0;
  let pivot;

  // RK4 for double pendulum Lagrangian equations
  function derivatives(th1, w1, th2, w2) {
    const d = th2 - th1;
    const cd = Math.cos(d), sd = Math.sin(d);
    const denom1 = (2*m1 + m2 - m2 * Math.cos(2*d));
    const a1 = (-g*(2*m1+m2)*Math.sin(th1) - m2*g*Math.sin(th1-2*th2)
                - 2*sd*m2*(w2*w2*L2 + w1*w1*L1*cd))
               / (L1 * denom1);
    const a2 = (2*sd*(w1*w1*L1*(m1+m2) + g*(m1+m2)*Math.cos(th1)
                + w2*w2*L2*m2*cd))
               / (L2 * denom1);
    return [w1, a1, w2, a2];
  }

  function rk4Step(pen) {
    const [th1, w1, th2, w2] = [pen.th1, pen.w1, pen.th2, pen.w2];
    const k1 = derivatives(th1, w1, th2, w2);
    const k2 = derivatives(th1+dt/2*k1[0], w1+dt/2*k1[1], th2+dt/2*k1[2], w2+dt/2*k1[3]);
    const k3 = derivatives(th1+dt/2*k2[0], w1+dt/2*k2[1], th2+dt/2*k2[2], w2+dt/2*k2[3]);
    const k4 = derivatives(th1+dt*k3[0],   w1+dt*k3[1],   th2+dt*k3[2],   w2+dt*k3[3]);
    pen.th1 += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    pen.w1  += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    pen.th2 += dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
    pen.w2  += dt/6*(k1[3]+2*k2[3]+2*k3[3]+k4[3]);
  }

  function energy(pen) {
    const x1 = L1 * Math.sin(pen.th1), y1 = -L1 * Math.cos(pen.th1);
    const x2 = x1 + L2 * Math.sin(pen.th2), y2 = y1 - L2 * Math.cos(pen.th2);
    const T = 0.5*m1*(pen.w1*L1)**2
            + 0.5*m2*((pen.w1*L1*Math.cos(pen.th1) + pen.w2*L2*Math.cos(pen.th2))**2
                     +(pen.w1*L1*Math.sin(pen.th1) + pen.w2*L2*Math.sin(pen.th2))**2);
    const V = -m1*g*L1*Math.cos(pen.th1) - m2*g*(L1*Math.cos(pen.th1)+L2*Math.cos(pen.th2));
    return T + V;
  }

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    energyEl = document.getElementById('energy');
    pivot = p.createVector(p.width / 2, p.height * 0.3);

    const ARM = Math.min(p.width, p.height) * 0.2;

    for (let i = 0; i < N; i++) {
      const hue = (i / N) * 360;
      pendulums.push({
        th1: Math.PI * 0.75 + i * 0.0001,
        w1: 0,
        th2: Math.PI * 0.75 + i * 0.0001,
        w2: 0,
        trail: [],
        hue: hue,
        arm: ARM
      });
    }
  };

  p.draw = function() {
    p.background(0, 0, 2, 100);

    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(fpsFrames * 1000 / (now - fpsTime));
      fpsFrames = 0; fpsTime = now;
    }

    // Draw trails first (behind rods)
    for (let i = 0; i < N; i++) {
      const pen = pendulums[i];
      // Integrate
      for (let s = 0; s < SUBSTEPS; s++) rk4Step(pen);

      // End mass position
      const A = pen.arm;
      const x1 = pivot.x + A * Math.sin(pen.th1);
      const y1 = pivot.y + A * Math.cos(pen.th1);
      const x2 = x1 + A * Math.sin(pen.th2);
      const y2 = y1 + A * Math.cos(pen.th2);

      pen.trail.push({ x: x2, y: y2 });
      if (pen.trail.length > TRAIL_LEN) pen.trail.shift();

      // Trail
      p.noFill();
      p.beginShape();
      for (let j = 0; j < pen.trail.length; j++) {
        const age = j / pen.trail.length;
        const al = age * age * 80;
        const bright = p.map(age, 0, 1, 20, 90);
        p.stroke(pen.hue, 85, bright, al);
        p.vertex(pen.trail[j].x, pen.trail[j].y);
      }
      p.endShape();
    }

    // Draw rods and joints
    for (let i = 0; i < N; i++) {
      const pen = pendulums[i];
      const A = pen.arm;
      const x1 = pivot.x + A * Math.sin(pen.th1);
      const y1 = pivot.y + A * Math.cos(pen.th1);
      const x2 = x1 + A * Math.sin(pen.th2);
      const y2 = y1 + A * Math.cos(pen.th2);

      // Rods — only draw the first pendulum prominently
      if (i === 0) {
        p.stroke(pen.hue, 60, 90, 90);
        p.strokeWeight(2);
        p.line(pivot.x, pivot.y, x1, y1);
        p.line(x1, y1, x2, y2);
        p.strokeWeight(1);

        // Joints
        p.noStroke();
        p.fill(pen.hue, 40, 100, 95);
        p.circle(pivot.x, pivot.y, 8);
        p.fill(pen.hue, 60, 100, 90);
        p.circle(x1, y1, 10);
        p.fill(pen.hue, 90, 100, 95);
        p.circle(x2, y2, 12);
      } else {
        // Other pendulums: just a dot at end mass
        p.noStroke();
        p.fill(pen.hue, 80, 90, 60);
        p.circle(x2, y2, 5);
      }
    }

    // Pivot point
    p.noStroke();
    p.fill(0, 0, 80, 90);
    p.circle(pivot.x, pivot.y, 6);

    // Energy display (first pendulum)
    const E = energy(pendulums[0]);
    energyEl.textContent = 'E: ' + E.toFixed(3);
  };

  p.windowResized = function() {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    pivot.set(p.width / 2, p.height * 0.3);
  };
});
</script>
</body>
</html>
