<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Attractor | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const TRAIL_LEN  = 4000;
        const DT         = 0.01;
        const SCALE      = 80;
        const NUM_TRAJ   = 3;
        const STEPS_PER_FRAME = 8;
        const WARMUP     = 2000;

        // Wei's Finance Attractor: a=0.001, b=0.2, c=1.1
        // dx/dt = z + (y - a)*x
        // dy/dt = 1 - b*y - x^2
        // dz/dt = -x - c*z
        const FA = 0.001, FB = 0.2, FC = 1.1;

        function finance(x, y, z) {
            return {
                dx: z + (y - FA) * x,
                dy: 1.0 - FB * y - x * x,
                dz: -x - FC * z
            };
        }

        function rk4(x, y, z, dt) {
            let k1 = finance(x, y, z);
            let k2 = finance(x + dt/2 * k1.dx, y + dt/2 * k1.dy, z + dt/2 * k1.dz);
            let k3 = finance(x + dt/2 * k2.dx, y + dt/2 * k2.dy, z + dt/2 * k2.dz);
            let k4 = finance(x + dt * k3.dx, y + dt * k3.dy, z + dt * k3.dz);
            return {
                x: x + dt/6 * (k1.dx + 2*k2.dx + 2*k3.dx + k4.dx),
                y: y + dt/6 * (k1.dy + 2*k2.dy + 2*k3.dy + k4.dy),
                z: z + dt/6 * (k1.dz + 2*k2.dz + 2*k3.dz + k4.dz)
            };
        }

        let trajectories = [];
        for (let i = 0; i < NUM_TRAJ; i++) {
            trajectories.push({
                pts: [],
                x: 0.1  + i * 0.0001,
                y: 0.1  + i * 0.00007,
                z: -0.1 + i * 0.00005,
                hueOffset: i * 120
            });
        }

        function setup() {
            createCanvas(windowWidth, windowHeight, WEBGL);
            colorMode(HSB, 360, 100, 100, 100);

            // Warm up
            for (let w = 0; w < WARMUP; w++) {
                for (let t of trajectories) {
                    let nxt = rk4(t.x, t.y, t.z, DT);
                    if (!isFinite(nxt.x) || !isFinite(nxt.y) || !isFinite(nxt.z)) {
                        t.x = 0.1; t.y = 0.1; t.z = -0.1;
                    } else {
                        t.x = nxt.x; t.y = nxt.y; t.z = nxt.z;
                    }
                }
            }
        }

        function draw() {
            orbitControl(2, 2, 0.1);
            background(0, 0, 5, 20);
            blendMode(ADD);

            // Auto-rotate
            rotateY(frameCount * 0.003);
            rotateX(sin(frameCount * 0.001) * 0.3);

            // Advance trajectories
            for (let s = 0; s < STEPS_PER_FRAME; s++) {
                for (let t of trajectories) {
                    let nxt = rk4(t.x, t.y, t.z, DT);
                    if (!isFinite(nxt.x) || !isFinite(nxt.y) || !isFinite(nxt.z)) continue;
                    t.x = nxt.x; t.y = nxt.y; t.z = nxt.z;
                    // Finance attractor: x,z ~ ±1.5, y ~ 0..3; map y to screen-vertical
                    t.pts.push([t.x * SCALE, (t.y - 1.5) * SCALE, t.z * SCALE]);
                    if (t.pts.length > TRAIL_LEN) t.pts.shift();
                }
            }

            // Draw trails
            noFill();
            strokeWeight(1.0);
            for (let t of trajectories) {
                let n = t.pts.length;
                for (let i = 1; i < n; i++) {
                    let ageFrac = i / n;
                    let hue = (t.hueOffset + ageFrac * 120) % 360;
                    let alpha = ageFrac * 70;
                    stroke(hue, 80, 100, alpha);
                    let p0 = t.pts[i - 1];
                    let p1 = t.pts[i];
                    line(p0[0], p0[1], p0[2], p1[0], p1[1], p1[2]);
                }
                // Bright head
                if (t.pts.length > 0) {
                    let head = t.pts[t.pts.length - 1];
                    strokeWeight(4);
                    stroke(t.hueOffset, 40, 100, 95);
                    point(head[0], head[1], head[2]);
                    strokeWeight(1.0);
                }
            }

            // Screen-space overlays
            blendMode(BLEND);
            resetMatrix();
            noStroke();
            fill(0, 0, 90, 180);
            textFont('monospace');
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width / 2 - 16, -height / 2 + 16);

            textAlign(CENTER, BOTTOM);
            textSize(14);
            fill(0, 0, 80, 100);
            text('Finance Attractor  a=0.001  b=0.2  c=1.1', 0, height / 2 - 16);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
