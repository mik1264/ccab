<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Physics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#0f0; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const sketch = (p) => {
  const MAX_BUBBLES = 50;
  let bubbles = [];
  let pops = []; // Pop ring animations
  let fpsEl, frameCount2 = 0, fpsTimer = 0;
  let noiseOff = 0;

  class Pop {
    constructor(x, y, r) {
      this.x = x; this.y = y;
      this.r = r;
      this.life = 1.0;
      this.decay = 0.06;
      this.hue = p.random(180, 280);
    }
    update() { this.life -= this.decay; this.r += 3; }
    draw() {
      p.blendMode(p.ADD);
      p.noFill();
      p.strokeWeight(2);
      p.stroke(this.hue, 60, 100, this.life * 80);
      p.circle(this.x, this.y, this.r * 2);
      p.strokeWeight(1);
      p.stroke(this.hue, 40, 100, this.life * 40);
      p.circle(this.x, this.y, this.r * 2.5);
    }
    isDead() { return this.life <= 0; }
  }

  class Bubble {
    constructor(x, y) {
      this.x = x || p.random(p.width * 0.1, p.width * 0.9);
      this.y = y || p.height + p.random(20, 60);
      this.r = p.random(14, 48);
      this.vx = p.random(-0.4, 0.4);
      this.vy = p.random(-1.2, -0.5);
      this.noiseOff = p.random(1000);
      this.hue = p.random(160, 300);
      this.wobble = 0;
      this.wobbleSpeed = p.random(0.05, 0.12);
      this.wobbleAmp = p.random(0.03, 0.09);
      this.numVerts = 24;
      this.popping = false;
    }

    update() {
      // Buoyancy
      this.vy = p.lerp(this.vy, -p.random(0.8, 1.4), 0.01);
      // Gentle drift using noise
      let nx = p.noise(this.noiseOff, noiseOff) * 2 - 1;
      this.vx = p.lerp(this.vx, nx * 0.6, 0.04);
      // Drag
      this.vx *= 0.98;
      this.vy *= 0.99;
      this.x += this.vx;
      this.y += this.vy;
      this.wobble += this.wobbleSpeed;

      // Wrap sides
      if (this.x < -this.r) this.x = p.width + this.r;
      if (this.x > p.width + this.r) this.x = -this.r;

      // Pop when reaching top
      if (this.y < -this.r * 1.5) {
        pops.push(new Pop(this.x, this.r, this.r));
        return true; // should be removed
      }
      return false;
    }

    collide(other) {
      let dx = other.x - this.x;
      let dy = other.y - this.y;
      let dist2 = p.sqrt(dx*dx + dy*dy);
      let minDist = this.r + other.r;
      if (dist2 < minDist && dist2 > 0.1) {
        let nx2 = dx / dist2, ny2 = dy / dist2;
        let overlap = minDist - dist2;
        // Push apart
        this.x -= nx2 * overlap * 0.5;
        this.y -= ny2 * overlap * 0.5;
        other.x += nx2 * overlap * 0.5;
        other.y += ny2 * overlap * 0.5;
        // Velocity exchange (gentle)
        let factor = 0.15;
        this.vx  += -nx2 * factor;
        this.vy  += -ny2 * factor;
        other.vx +=  nx2 * factor;
        other.vy +=  ny2 * factor;
      }
    }

    draw() {
      // Build wobbled vertices
      let verts = [];
      for (let i = 0; i < this.numVerts; i++) {
        let angle = (i / this.numVerts) * p.TWO_PI;
        let wobbleFactor = 1 + this.wobbleAmp * p.sin(angle * 3 + this.wobble)
                             + this.wobbleAmp * 0.5 * p.cos(angle * 2 - this.wobble * 0.7);
        let vr = this.r * wobbleFactor;
        verts.push({ x: this.x + p.cos(angle) * vr, y: this.y + p.sin(angle) * vr });
      }

      // Thin-film iridescence: multiple hue layers
      let colors = [
        [this.hue,        70, 90, 15],
        [this.hue + 40,   80, 95, 12],
        [this.hue + 100,  60, 85, 10],
        [this.hue + 180,  50, 90, 10],
      ];

      p.blendMode(p.ADD);
      for (let col of colors) {
        p.noStroke();
        p.fill(col[0] % 360, col[1], col[2], col[3]);
        p.beginShape();
        for (let v of verts) p.vertex(v.x, v.y);
        p.endShape(p.CLOSE);
      }

      // Outer ring
      p.blendMode(p.ADD);
      p.noFill();
      p.strokeWeight(1.5);
      p.stroke(this.hue, 50, 100, 45);
      p.beginShape();
      for (let v of verts) p.vertex(v.x, v.y);
      p.endShape(p.CLOSE);

      // Specular highlight
      p.blendMode(p.ADD);
      p.noStroke();
      let hlx = this.x - this.r * 0.3;
      let hly = this.y - this.r * 0.3;
      p.fill(180, 10, 100, 75);
      p.circle(hlx, hly, this.r * 0.35);
      p.fill(200, 5, 100, 40);
      p.circle(hlx - 3, hly - 3, this.r * 0.15);

      // Inner diffuse
      p.fill(this.hue, 30, 70, 8);
      p.circle(this.x, this.y, this.r * 1.4);
    }
  }

  p.setup = () => {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    for (let i = 0; i < 30; i++) {
      let b = new Bubble();
      b.y = p.random(50, p.height - 50);
      bubbles.push(b);
    }
  };

  p.draw = () => {
    p.blendMode(p.BLEND);
    // Deep teal-purple underwater background
    p.background(220, 40, 8);

    // Subtle caustic pattern
    p.blendMode(p.ADD);
    for (let cx = 0; cx < p.width; cx += 80) {
      for (let cy = 0; cy < p.height; cy += 80) {
        let n = p.noise(cx * 0.01 + noiseOff * 0.3, cy * 0.01 + noiseOff * 0.2);
        if (n > 0.6) {
          p.noFill();
          p.stroke(190, 50, 70, n * 8);
          p.strokeWeight(0.5);
          p.circle(cx + p.random(-5,5), cy + p.random(-5,5), p.map(n, 0.6, 1, 10, 35));
        }
      }
    }

    noiseOff += 0.005;

    // Spawn
    if (p.frameCount % 35 === 0 && bubbles.length < MAX_BUBBLES) {
      bubbles.push(new Bubble());
    }

    // Collisions
    for (let i = 0; i < bubbles.length; i++) {
      for (let j = i + 1; j < bubbles.length; j++) {
        bubbles[i].collide(bubbles[j]);
      }
    }

    // Update & draw
    for (let i = bubbles.length - 1; i >= 0; i--) {
      let shouldRemove = bubbles[i].update();
      if (shouldRemove) { bubbles.splice(i, 1); continue; }
      bubbles[i].draw();
    }

    // Pop animations
    for (let i = pops.length - 1; i >= 0; i--) {
      pops[i].update();
      pops[i].draw();
      if (pops[i].isDead()) pops.splice(i, 1);
    }

    frameCount2++;
    let now = p.millis();
    if (now - fpsTimer > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(frameCount2 / ((now - fpsTimer) / 1000));
      frameCount2 = 0; fpsTimer = now;
    }
  };

  p.windowResized = () => { p.resizeCanvas(window.innerWidth, window.innerHeight); };
};
new p5(sketch);
</script>
</body>
</html>
