<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newton Fractal Basins</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#8ff; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#ccc; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:6px; line-height:1.7; z-index:999; pointer-events:none; }
#rootsLegend { position:fixed; bottom:12px; right:12px; color:#ccc; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:6px; line-height:2; z-index:999; pointer-events:none; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Newton's method: z⁵ − 1 = 0<br>Each basin = one root<br>Brightness = convergence speed<br>Roots slowly rotate over time</div>
<div id="rootsLegend"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let degree = 5;
  let maxIter = 60;
  let tol = 1e-6;
  let needsRender = true;
  let fpsArr = [], lastTime = 0;
  let tileSize = 48;
  let tiles = [], tileIndex = 0, rendering = false;
  let rotAngle = 0;
  let lastRot = -999;

  // HSB colors for each root
  const rootHues = [0, 72, 144, 216, 288]; // 5 evenly spaced hues

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.pixelDensity(1);
    buildTiles();
  };

  function getRoots(angle) {
    // Roots of z^5 - 1 = 0 are e^(2πi*k/5), k=0..4
    // Slowly rotate them by adding angle
    let roots = [];
    for (let k = 0; k < degree; k++) {
      let a = (2 * Math.PI * k / degree) + angle;
      roots.push({ r: Math.cos(a), i: Math.sin(a) });
    }
    return roots;
  }

  function hsbToRgb(h, s, b) {
    h = ((h % 360) + 360) % 360;
    s /= 100; b /= 100;
    let c = b * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = b - c;
    let r, g, bv;
    let hi = Math.floor(h / 60);
    if (hi === 0) { r=c; g=x; bv=0; }
    else if (hi === 1) { r=x; g=c; bv=0; }
    else if (hi === 2) { r=0; g=c; bv=x; }
    else if (hi === 3) { r=0; g=x; bv=c; }
    else if (hi === 4) { r=x; g=0; bv=c; }
    else { r=c; g=0; bv=x; }
    return [(r+m)*255, (g+m)*255, (bv+m)*255];
  }

  function newtonStep(zr, zi) {
    // f(z) = z^5 - 1, f'(z) = 5z^4
    // Newton: z = z - f(z)/f'(z) = z - (z^5-1)/(5z^4) = (4z^5+1)/(5z^4)
    // Compute z^2
    let zr2 = zr*zr - zi*zi, zi2 = 2*zr*zi;
    // z^4
    let zr4 = zr2*zr2 - zi2*zi2, zi4 = 2*zr2*zi2;
    // z^5 = z^4 * z
    let zr5 = zr4*zr - zi4*zi, zi5 = zr4*zi + zi4*zr;
    // numerator: 4z^5 + 1
    let nr = 4*zr5 + 1, ni = 4*zi5;
    // denominator: 5z^4
    let dr = 5*zr4, di = 5*zi4;
    // divide: (nr + ni*i) / (dr + di*i)
    let denom = dr*dr + di*di;
    if (denom < 1e-20) return null;
    return [(nr*dr + ni*di) / denom, (ni*dr - nr*di) / denom];
  }

  function classify(zr, zi, roots) {
    for (let it = 0; it < maxIter; it++) {
      let nz = newtonStep(zr, zi);
      if (!nz) return { root: -1, iter: it };
      let dzr = nz[0] - zr, dzi = nz[1] - zi;
      zr = nz[0]; zi = nz[1];
      if (dzr*dzr + dzi*dzi < tol*tol) {
        // find nearest root
        let best = 0, bestDist = 1e9;
        for (let k = 0; k < roots.length; k++) {
          let dx = zr - roots[k].r, dy = zi - roots[k].i;
          let d = dx*dx + dy*dy;
          if (d < bestDist) { bestDist = d; best = k; }
        }
        return { root: best, iter: it };
      }
    }
    // find nearest
    let best = 0, bestDist = 1e9;
    for (let k = 0; k < roots.length; k++) {
      let dx = zr - roots[k].r, dy = zi - roots[k].i;
      let d = dx*dx + dy*dy;
      if (d < bestDist) { bestDist = d; best = k; }
    }
    return { root: best, iter: maxIter };
  }

  function buildTiles() {
    tiles = [];
    let cols = Math.ceil(p.width / tileSize);
    let rows = Math.ceil(p.height / tileSize);
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        tiles.push({ x: c * tileSize, y: r * tileSize });
    tileIndex = 0;
    rendering = false;
  }

  function renderTile(tile, roots) {
    let pw = p.width, ph = p.height;
    let scale = 3.5 / Math.min(pw, ph);
    let x0 = tile.x, y0 = tile.y;
    let x1 = Math.min(x0 + tileSize, pw);
    let y1 = Math.min(y0 + tileSize, ph);

    for (let py = y0; py < y1; py++) {
      for (let px = x0; px < x1; px++) {
        let zr = (px - pw / 2) * scale;
        let zi = (py - ph / 2) * scale;
        let res = classify(zr, zi, roots);
        let idx = 4 * (py * pw + px);
        if (res.root < 0) {
          p.pixels[idx] = 0; p.pixels[idx+1] = 0; p.pixels[idx+2] = 0; p.pixels[idx+3] = 255;
        } else {
          let hue = rootHues[res.root];
          // brightness by convergence: fast = bright
          let bri = 20 + 70 * (1 - res.iter / maxIter);
          let sat = 85;
          let [r, g, b] = hsbToRgb(hue + rotAngle * 30, sat, bri);
          p.pixels[idx] = r; p.pixels[idx+1] = g; p.pixels[idx+2] = b; p.pixels[idx+3] = 255;
        }
      }
    }
  }

  function updateLegend(roots) {
    let html = 'Roots of z⁵ − 1 = 0:<br>';
    for (let k = 0; k < roots.length; k++) {
      let [r, g, b] = hsbToRgb(rootHues[k] + rotAngle * 30, 85, 80);
      let hex = '#' + [r,g,b].map(v => Math.round(v).toString(16).padStart(2,'0')).join('');
      let sign = roots[k].i >= 0 ? '+' : '';
      html += '<span style="color:' + hex + '">&#9632;</span> ' +
        roots[k].r.toFixed(3) + sign + roots[k].i.toFixed(3) + 'i<br>';
    }
    document.getElementById('rootsLegend').innerHTML = html;
  }

  p.draw = function() {
    let now = performance.now();
    let dt = now - lastTime; lastTime = now;
    if (dt > 0) {
      fpsArr.push(1000 / dt);
      if (fpsArr.length > 30) fpsArr.shift();
      document.getElementById('fps').textContent = 'FPS: ' + (fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length).toFixed(1);
    }

    rotAngle = (p.millis() / 1000) * 0.08; // slow rotation
    let rot = Math.floor(rotAngle * 20) / 20; // quantize to avoid constant redraw
    if (Math.abs(rot - lastRot) > 0.04 || needsRender) {
      lastRot = rot;
      needsRender = false;
      buildTiles();
      rendering = true;
      p.loadPixels();
    }

    let roots = getRoots(rotAngle);
    updateLegend(roots);

    if (rendering) {
      for (let t = 0; t < 4 && tileIndex < tiles.length; t++, tileIndex++) {
        renderTile(tiles[tileIndex], roots);
      }
      p.updatePixels();
      if (tileIndex >= tiles.length) rendering = false;
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    needsRender = true;
  };
});
</script>
</body>
</html>
