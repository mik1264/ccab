<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moiré Pattern Generator — p5 VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; font-family:monospace; font-size:13px; color:#0f0; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; font-family:monospace; font-size:12px; color:#888; background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:6px; z-index:999; }
#mode-label { position:fixed; top:50px; right:12px; font-family:monospace; font-size:12px; color:#0cf; background:rgba(0,0,0,0.5); padding:5px 10px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">-- fps</div>
<div id="info">Mouse: rotate/scale offset | Space: cycle pattern type</div>
<div id="mode-label">Mode: Concentric Rings</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let t = 0;
  let fpsEl = document.getElementById('fps');
  let modeEl = document.getElementById('mode-label');
  let frameAcc = 0, fpsTimer = 0, lastFps = 0;
  const SCALE = 2;
  let W, H;

  const MODES = ['Concentric Rings', 'Radial Lines', 'Dot Grid', 'Spiral'];
  let modeIdx = 0;

  // Auto-animate angle and scale offset
  let autoAngle = 0;
  let autoScale = 1.0;

  // Pattern 1 value at (x,y): 0..1, where 1=bright stripe center
  function pattern1(x, y, cx, cy, mode, scale) {
    let dx = x - cx, dy = y - cy;
    let r = Math.sqrt(dx*dx + dy*dy);
    let theta = Math.atan2(dy, dx);
    let freq = 0.12 * scale;
    switch(mode) {
      case 0: // Concentric rings
        return 0.5 + 0.5 * Math.cos(r * freq);
      case 1: // Radial lines
        return 0.5 + 0.5 * Math.cos(theta * 20);
      case 2: // Dot grid
        return (0.5 + 0.5 * Math.cos(x * freq)) * (0.5 + 0.5 * Math.cos(y * freq));
      case 3: // Spiral
        return 0.5 + 0.5 * Math.cos(r * freq * 0.7 - theta * 5);
    }
  }

  // Pattern 2: same but rotated by angle + slightly different scale
  function pattern2(x, y, cx, cy, mode, scale, angle, scaleOff) {
    let dx = x - cx, dy = y - cy;
    // Rotate point by angle
    let rx = dx * Math.cos(angle) - dy * Math.sin(angle);
    let ry = dx * Math.sin(angle) + dy * Math.cos(angle);
    let r = Math.sqrt(rx*rx + ry*ry);
    let theta = Math.atan2(ry, rx);
    let freq = 0.12 * scale * scaleOff;
    switch(mode) {
      case 0:
        return 0.5 + 0.5 * Math.cos(r * freq);
      case 1:
        return 0.5 + 0.5 * Math.cos(theta * 20);
      case 2:
        return (0.5 + 0.5 * Math.cos(rx * freq)) * (0.5 + 0.5 * Math.cos(ry * freq));
      case 3:
        return 0.5 + 0.5 * Math.cos(r * freq * 0.7 - theta * 5);
    }
  }

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    W = Math.ceil(p.width / SCALE);
    H = Math.ceil(p.height / SCALE);
  };

  p.draw = function() {
    // Mouse controls angle and scale offset
    let mx = p.mouseX / p.width;
    let my = p.mouseY / p.height;
    // Angle offset: mouse X drives it
    let angleOff = (mx - 0.5) * 0.25 + autoAngle;
    // Scale offset: mouse Y drives it
    let scaleOff = 1.0 + (my - 0.5) * 0.15 + (autoScale - 1.0);

    // Auto slowly drift
    autoAngle += 0.002;
    autoScale = 1.0 + 0.05 * Math.sin(t * 0.3);

    let cx = W * 0.5, cy = H * 0.5;
    let scale = 1.0 + 0.1 * Math.sin(t * 0.2);

    p.loadPixels();
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        let p1 = pattern1(x, y, cx, cy, modeIdx, scale);
        let p2 = pattern2(x, y, cx, cy, modeIdx, scale, angleOff, scaleOff);

        // Interference: multiply (dark moiré) or add (bright moiré)
        let interference = p1 * p2;
        // Also compute difference pattern for color bands
        let diff = Math.abs(p1 - p2);

        // Color the moiré bands
        // Interference bands → hue
        let hue = (interference * 240.0 + diff * 120.0 + t * 15.0) % 360;
        // Brightness from interference strength
        let bri = 15 + 80 * interference;
        // Saturation highest at moiré band edges
        let sat = 60 + 40 * (1 - Math.abs(interference - 0.5) * 2);

        let h = hue/60, s = sat/100, b = bri/100;
        let hi = Math.floor(h)%6, f = h-Math.floor(h);
        let pv=b*(1-s), qv=b*(1-s*f), tv=b*(1-s*(1-f));
        let r,g,b2;
        if(hi===0){r=b;g=tv;b2=pv;}
        else if(hi===1){r=qv;g=b;b2=pv;}
        else if(hi===2){r=pv;g=b;b2=tv;}
        else if(hi===3){r=pv;g=qv;b2=b;}
        else if(hi===4){r=tv;g=pv;b2=b;}
        else{r=b;g=pv;b2=qv;}

        for (let dy = 0; dy < SCALE; dy++) {
          for (let dx = 0; dx < SCALE; dx++) {
            let px = x*SCALE+dx, py = y*SCALE+dy;
            if (px >= p.width || py >= p.height) continue;
            let idx = 4*(py*p.width+px);
            p.pixels[idx]   = r*255;
            p.pixels[idx+1] = g*255;
            p.pixels[idx+2] = b2*255;
            p.pixels[idx+3] = 255;
          }
        }
      }
    }
    p.updatePixels();
    t += 0.015;

    // FPS
    frameAcc++;
    fpsTimer += p.deltaTime;
    if (fpsTimer >= 500) {
      lastFps = Math.round(frameAcc * 1000 / fpsTimer);
      frameAcc = 0; fpsTimer = 0;
      fpsEl.textContent = lastFps + ' fps';
      fpsEl.style.color = lastFps >= 50 ? '#0f0' : lastFps >= 30 ? '#ff0' : '#f44';
    }
  };

  p.keyPressed = function() {
    if (p.key === ' ') {
      modeIdx = (modeIdx + 1) % MODES.length;
      autoAngle = 0;
      modeEl.textContent = 'Mode: ' + MODES[modeIdx];
    }
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    W = Math.ceil(p.width / SCALE);
    H = Math.ceil(p.height / SCALE);
  };
});
</script>
</body>
</html>
