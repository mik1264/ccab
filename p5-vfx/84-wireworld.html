<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WireWorld Computer | P5 VFX</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#hud { position:fixed; top:12px; right:12px; color:#888; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.75); padding:8px 12px; border-radius:6px; z-index:999; line-height:1.9; }
#legend { position:fixed; bottom:12px; right:12px; color:#888; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:6px; z-index:999; line-height:1.9; }
#keys { position:fixed; bottom:12px; left:12px; color:#444; font-family:monospace; font-size:11px; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:4px; z-index:999; line-height:1.7; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="hud">FPS: <span id="fps">0</span><br>STEP: <span id="step">0</span></div>
<div id="legend">
  <span style="color:#111">■</span> Empty<br>
  <span style="color:#e8b000">■</span> Conductor<br>
  <span style="color:#4af">■</span> Electron Head<br>
  <span style="color:#eee">■</span> Electron Tail
</div>
<div id="keys">SPACE pause · R reset · click toggle conductor</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const CS = 6;
  const EMPTY=0, CONDUCTOR=1, HEAD=2, TAIL=3;
  let cols, rows, grid, next;
  let paused = false;
  let stepCount = 0;
  let fpsTimer=0,fpsCount=0,fpsVal=0;
  const STEPS_PER_FRAME = 10;

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    p.pixelDensity(1);
    cols = Math.floor(p.width / CS);
    rows = Math.floor(p.height / CS);
    grid = new Uint8Array(cols * rows);
    next = new Uint8Array(cols * rows);
    buildCircuit();
  };

  function idx(c,r){ return r*cols+c; }
  function g(c,r){ if(c<0||c>=cols||r<0||r>=rows)return-1; return grid[idx(c,r)]; }

  // Place a horizontal wire segment
  function wire(c,r,len,dir='H') {
    for(let i=0;i<len;i++){
      const cc = dir==='H'?c+i:c, rr=dir==='V'?r+i:r;
      if(cc>=0&&cc<cols&&rr>=0&&rr<rows) grid[idx(cc,rr)]=CONDUCTOR;
    }
  }
  function head(c,r){ if(c>=0&&c<cols&&r>=0&&r<rows) grid[idx(c,r)]=HEAD; }
  function tail(c,r){ if(c>=0&&c<cols&&r>=0&&r<rows) grid[idx(c,r)]=TAIL; }

  function buildCircuit() {
    grid.fill(0);
    const ox=4, oy=4;
    // --- CLOCK (signal generator) ---
    // A simple loop that generates periodic electrons
    // Small cycle: 6 cells loop
    const cx=ox, cy=oy+2;
    wire(cx,cy,3); wire(cx+2,cy,1,'V'); wire(cx,cy+1,3); wire(cx,cy,1,'V');
    head(cx+1,cy); tail(cx,cy);

    // Long wire carrying signal right
    wire(cx+3,cy,80);

    // --- DIODE (electrons only go right) ---
    const dx=cx+20, dy=cy;
    // Diode pattern: two branches converging
    wire(dx,dy-1,3); wire(dx,dy+1,3);
    wire(dx+2,dy-1,1,'V'); wire(dx+2,dy,2,'V');
    wire(dx+2,dy+1,1,'V');

    // --- OR GATE (two signal merging) ---
    const ogx=cx+40, ogy=cy;
    wire(ogx,ogy-2,5); wire(ogx,ogy+2,5);
    // vertical join
    for(let i=-2;i<=2;i++) grid[idx(ogx+4,ogy+i)]=CONDUCTOR;
    wire(ogx+4,ogy,8);
    // Feed second input
    head(ogx+1,ogy-2); tail(ogx,ogy-2);
    head(ogx+1,ogy+2); tail(ogx,ogy+2);

    // --- AND GATE ---
    const agx=cx+55, agy=cy;
    // top and bottom wires join; output only active if both inputs active
    wire(agx,agy-2,4); wire(agx,agy+2,4);
    wire(agx+3,agy-2,1,'V'); wire(agx+3,agy+2,1,'V');
    wire(agx+3,agy,4); // output

    // --- Flip-Flop (T-FF): basic feedback circuit ---
    const ffx=cx+30, ffy=oy+12;
    wire(ffx,ffy,12);
    wire(ffx,ffy+3,12);
    wire(ffx,ffy,1,'V'); wire(ffx,ffy+1,1,'V'); wire(ffx,ffy+2,1,'V');
    wire(ffx+11,ffy,1,'V'); wire(ffx+11,ffy+1,1,'V'); wire(ffx+11,ffy+2,1,'V');
    // Cross connections
    wire(ffx+3,ffy+1,1); wire(ffx+3,ffy+2,1);
    wire(ffx+8,ffy+1,1); wire(ffx+8,ffy+2,1);
    head(ffx+1,ffy); tail(ffx,ffy);
    head(ffx+1,ffy+3); tail(ffx,ffy+3);

    // --- Second clock loop, lower ---
    const cx2=ox, cy2=oy+18;
    wire(cx2,cy2,4); wire(cx2+3,cy2,1,'V'); wire(cx2,cy2+1,4); wire(cx2,cy2,1,'V');
    head(cx2+2,cy2); tail(cx2+1,cy2); tail(cx2,cy2+1);
    wire(cx2+3,cy2,60);

    // --- A few extra loops and signal sources ---
    const cx3=ox+70, cy3=oy+6;
    // 8-cell clock loop
    wire(cx3,cy3,4); wire(cx3+3,cy3,1,'V'); wire(cx3+3,cy3+1,1,'V');
    wire(cx3,cy3+2,4); wire(cx3,cy3,1,'V'); wire(cx3,cy3+1,1,'V');
    head(cx3+1,cy3); tail(cx3,cy3);

    // Connect this clock to a long wire going down
    wire(cx3+3,cy3+2,1,'V'); wire(cx3+3,cy3+3,1,'V');
    wire(cx3,cy3+4,20,'V');
  }

  function stepWW() {
    for (let r=0;r<rows;r++) {
      for (let c=0;c<cols;c++) {
        const i=idx(c,r);
        const v=grid[i];
        if(v===EMPTY) { next[i]=EMPTY; continue; }
        if(v===HEAD)  { next[i]=TAIL; continue; }
        if(v===TAIL)  { next[i]=CONDUCTOR; continue; }
        // CONDUCTOR: count HEAD neighbors
        let heads=0;
        for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
          if(dr===0&&dc===0) continue;
          if(g(c+dc,r+dr)===HEAD) heads++;
        }
        next[i]=(heads===1||heads===2)?HEAD:CONDUCTOR;
      }
    }
    const tmp=grid; grid=next; next=tmp;
    stepCount++;
  }

  p.draw = function() {
    fpsCount++;
    const now=performance.now();
    if(now-fpsTimer>=500){
      fpsVal=Math.round(fpsCount/((now-fpsTimer)/1000));
      fpsCount=0; fpsTimer=now;
    }

    if(!paused) for(let s=0;s<STEPS_PER_FRAME;s++) stepWW();

    // Click toggle
    if(p.mouseIsPressed && p.mouseButton===p.LEFT) {
      const c=Math.floor(p.mouseX/CS), r=Math.floor(p.mouseY/CS);
      if(c>=0&&c<cols&&r>=0&&r<rows){
        const i=idx(c,r);
        grid[i]=grid[i]===CONDUCTOR?EMPTY:CONDUCTOR;
      }
    }

    // Render
    p.loadPixels();
    const COLORS = [
      [0,0,0],       // EMPTY — black
      [232,176,0],   // CONDUCTOR — gold
      [68,170,255],  // HEAD — bright blue
      [220,220,220], // TAIL — white-grey
    ];
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const v=grid[idx(c,r)];
        const [R,G,B]=COLORS[v];
        for(let py=0;py<CS;py++) for(let px=0;px<CS;px++){
          const pi=4*((r*CS+py)*p.width+(c*CS+px));
          p.pixels[pi]=R; p.pixels[pi+1]=G; p.pixels[pi+2]=B; p.pixels[pi+3]=255;
        }
      }
    }
    p.updatePixels();

    document.getElementById('fps').textContent=fpsVal;
    document.getElementById('step').textContent=stepCount;
  };

  p.keyPressed=function(){
    if(p.key===' '){paused=!paused;return false;}
    if(p.key==='r'||p.key==='R'){buildCircuit();stepCount=0;}
  };

  p.windowResized=function(){
    p.resizeCanvas(p.windowWidth,p.windowHeight);
    cols=Math.floor(p.width/CS); rows=Math.floor(p.height/CS);
    grid=new Uint8Array(cols*rows); next=new Uint8Array(cols*rows);
    buildCircuit(); stepCount=0;
  };
});
</script>
</body>
</html>
