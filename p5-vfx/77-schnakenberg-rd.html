<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schnakenberg Reaction-Diffusion | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

new p5(function(p) {
    const GRID = 200;
    let U, V, U2, V2;
    let px; // pixel buffer per cell
    let restartTimer = 0;
    let frameCount2 = 0;
    let fpsVal = 0, fpsLast = 0, fpsFrames = 0;

    // Schnakenberg parameters
    const a   = 0.1;
    const b   = 0.9;
    const Du  = 0.05;
    const Dv  = 1.0;
    const dt  = 1.0;
    const STEPS_PER_FRAME = 8;

    // Steady state: u0 = a+b, v0 = b/(a+b)^2
    let u0, v0;

    function idx(x, y) {
        x = (x + GRID) % GRID;
        y = (y + GRID) % GRID;
        return y * GRID + x;
    }

    function initGrid() {
        u0 = a + b;
        v0 = b / ((a + b) * (a + b));
        U  = new Float32Array(GRID * GRID);
        V  = new Float32Array(GRID * GRID);
        U2 = new Float32Array(GRID * GRID);
        V2 = new Float32Array(GRID * GRID);
        for (let i = 0; i < GRID * GRID; i++) {
            U[i] = u0 + (Math.random() - 0.5) * 0.05;
            V[i] = v0 + (Math.random() - 0.5) * 0.05;
        }
    }

    p.setup = function() {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.colorMode(p.HSB, 360, 100, 100, 100);
        p.pixelDensity(1);
        p.noSmooth();
        px = Math.max(Math.floor(Math.min(p.width, p.height) / GRID), 1);
        initGrid();
        restartTimer = p.millis();
    };

    function laplacian(A, x, y) {
        const i  = idx(x,   y);
        const n  = idx(x,   y-1);
        const s  = idx(x,   y+1);
        const e  = idx(x+1, y);
        const w  = idx(x-1, y);
        const ne = idx(x+1, y-1);
        const nw = idx(x-1, y-1);
        const se = idx(x+1, y+1);
        const sw = idx(x-1, y+1);
        return (
            A[n]*0.05 + A[s]*0.05 + A[e]*0.05 + A[w]*0.05 +
            A[ne]*0.025 + A[nw]*0.025 + A[se]*0.025 + A[sw]*0.025 -
            A[i] * 0.3
        );
    }

    function step() {
        for (let y = 0; y < GRID; y++) {
            for (let x = 0; x < GRID; x++) {
                const i  = idx(x, y);
                const u  = U[i];
                const v  = V[i];
                const u2v = u * u * v;
                const lapU = laplacian(U, x, y);
                const lapV = laplacian(V, x, y);
                U2[i] = u + dt * (Du * lapU + a - u + u2v);
                V2[i] = v + dt * (Dv * lapV + b - u2v);
                // clamp to keep stable
                if (U2[i] < 0) U2[i] = 0;
                if (V2[i] < 0) V2[i] = 0;
            }
        }
        const tmp = U; U = U2; U2 = tmp;
        const tmp2 = V; V = V2; V2 = tmp2;
    }

    // Map u concentration to rich color
    // u typically ranges ~0 to ~2*(a+b)
    function uToColor(u) {
        // normalise roughly 0..1
        const n = p.constrain((u - (u0 * 0.3)) / (u0 * 1.4), 0, 1);
        // 0 = dark blue, 0.4 = teal, 0.7 = green, 0.9 = yellow, 1 = white
        let h, s, b2;
        if (n < 0.35) {
            const t = n / 0.35;
            h = p.lerp(230, 180, t);
            s = p.lerp(100, 90, t);
            b2 = p.lerp(10, 40, t);
        } else if (n < 0.65) {
            const t = (n - 0.35) / 0.30;
            h = p.lerp(180, 130, t);
            s = p.lerp(90, 85, t);
            b2 = p.lerp(40, 65, t);
        } else if (n < 0.85) {
            const t = (n - 0.65) / 0.20;
            h = p.lerp(130, 60, t);
            s = p.lerp(85, 95, t);
            b2 = p.lerp(65, 90, t);
        } else {
            const t = (n - 0.85) / 0.15;
            h = p.lerp(60, 40, t);
            s = p.lerp(95, 30, t);
            b2 = p.lerp(90, 100, t);
        }
        return [h, s, b2];
    }

    p.draw = function() {
        // FPS
        fpsFrames++;
        const now = performance.now();
        if (now - fpsLast >= 600) {
            fpsVal = Math.round(fpsFrames / ((now - fpsLast) / 1000));
            fpsFrames = 0; fpsLast = now;
        }

        // Restart every 30 seconds
        if (p.millis() - restartTimer > 30000) {
            initGrid();
            restartTimer = p.millis();
        }

        for (let s2 = 0; s2 < STEPS_PER_FRAME; s2++) step();

        p.loadPixels();
        const W = p.width, H = p.height;
        // Draw grid
        const offX = Math.floor((W - GRID * px) / 2);
        const offY = Math.floor((H - GRID * px) / 2);
        for (let y = 0; y < GRID; y++) {
            for (let x = 0; x < GRID; x++) {
                const [h, s, b2] = uToColor(U[idx(x, y)]);
                // HSB to RGB conversion
                const [r, g, b3] = hsbToRgb(h, s, b2);
                for (let dy = 0; dy < px; dy++) {
                    for (let dx = 0; dx < px; dx++) {
                        const px2 = offX + x * px + dx;
                        const py2 = offY + y * px + dy;
                        if (px2 < 0 || px2 >= W || py2 < 0 || py2 >= H) continue;
                        const pi = 4 * (py2 * W + px2);
                        p.pixels[pi]     = r;
                        p.pixels[pi + 1] = g;
                        p.pixels[pi + 2] = b3;
                        p.pixels[pi + 3] = 255;
                    }
                }
            }
        }

        // Dark borders outside grid
        p.updatePixels();

        // FPS text
        p.fill(255, 0, 80, 80);
        p.noStroke();
        p.textSize(12);
        p.textFont('monospace');
        p.textAlign(p.RIGHT, p.TOP);
        p.text('FPS: ' + fpsVal, p.width - 12, 12);

        // Label
        p.textAlign(p.CENTER, p.BOTTOM);
        p.fill(255, 0, 60, 60);
        p.textSize(11);
        p.text('Schnakenberg RD  |  a=0.1  b=0.9  Du=0.05  Dv=1.0  |  restarts every 30s', p.width / 2, p.height - 8);
    };

    function hsbToRgb(h, s, b2) {
        h = ((h % 360) + 360) % 360;
        s /= 100; b2 /= 100;
        const c = b2 * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = b2 - c;
        let r = 0, g = 0, bl = 0;
        if      (h < 60)  { r = c; g = x; }
        else if (h < 120) { r = x; g = c; }
        else if (h < 180) { g = c; bl = x; }
        else if (h < 240) { g = x; bl = c; }
        else if (h < 300) { r = x; bl = c; }
        else              { r = c; bl = x; }
        return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((bl + m) * 255)];
    }

    p.windowResized = function() {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        px = Math.max(Math.floor(Math.min(p.width, p.height) / GRID), 1);
    };
});
    </script>
</body>
</html>
