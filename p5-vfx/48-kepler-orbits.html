<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kepler Orbits | P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#0a0a0f; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#info { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.6); padding:8px 12px; border-radius:6px; z-index:999; line-height:1.8; }
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Gallery</a>
<div id="info">Kepler Orbits<br>Conic sections from e=0 to e=1.5</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

// Orbit definitions: [eccentricity, semi-latus rectum scale, label]
const ORBIT_DEFS = [
  [0.00,  1.00, "e=0.00"],
  [0.30,  1.05, "e=0.30"],
  [0.50,  1.08, "e=0.50"],
  [0.70,  1.10, "e=0.70"],
  [0.85,  1.12, "e=0.85"],
  [0.95,  1.14, "e=0.95"],
  [1.00,  1.18, "e=1.00"],  // parabola
  [1.20,  1.20, "e=1.20"],  // hyperbola
  [1.50,  1.22, "e=1.50"],
];

// Hue by eccentricity: 240=blue, 120=green, 60=yellow, 30=orange, 0=red
function eccHue(e) {
  if (e < 1.0) return map(e, 0, 0.99, 240, 30);
  return map(e, 1.0, 1.5, 30, 0);
}

let orbits = [];
let SCALE;  // pixels per AU-equivalent

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(min(pixelDensity(), 2));
  SCALE = min(width, height) * 0.17;
  buildOrbits();
}

function buildOrbits() {
  orbits = [];
  for (let i = 0; i < ORBIT_DEFS.length; i++) {
    let [e, lScale, label] = ORBIT_DEFS[i];
    let l = lScale * SCALE;   // semi-latus rectum in px
    let hue = eccHue(e);
    // Planets start at different true anomalies
    let startAnomaly = (i * 0.7) % TWO_PI;
    orbits.push({
      e, l, label, hue,
      nu: startAnomaly,  // current true anomaly
      trail: [],
      TRAIL_MAX: e >= 1.0 ? 90 : 180,
    });
  }
}

// True anomaly angular speed (for animation, not physically accurate but visually clear)
// For ellipses use Kepler-ish speed; for parabola/hyperbola limit range
function nuStep(orb) {
  let e = orb.e;
  // Speed ~ 1/r^2 (Kepler's second law proxy)
  let r = orb.l / (1 + e * cos(orb.nu));
  let baseSpeed = 0.008 * (SCALE * SCALE) / (r * r);
  return constrain(baseSpeed, 0.003, 0.12);
}

// Convert true anomaly -> (x,y) in screen coords, focus at origin
function nuToXY(e, l, nu) {
  let r = l / (1 + e * cos(nu));
  return { x: r * cos(nu), y: r * sin(nu) };
}

// Is a point "visible" (not huge r)?
function inRange(x, y) {
  return abs(x) < width && abs(y) < height;
}

function orbitColor(hue, alpha) {
  return [hue, 85, 90, alpha];
}

let labelFont;
function draw() {
  background(0, 0, 4);

  // Center of canvas = focus (star position)
  let cx = width / 2 - SCALE * 0.5;  // offset left to give more room for ellipses
  let cy = height / 2;

  blendMode(ADD);

  // Draw orbit paths (static curves)
  noFill();
  for (let orb of orbits) {
    let e = orb.e;
    let l = orb.l;
    let hue = orb.hue;
    stroke(hue, 70, 60, 40);
    strokeWeight(1);

    beginShape();
    let nuRange, steps;
    if (e < 1.0) {
      // Full ellipse
      nuRange = TWO_PI;
      steps = 160;
    } else if (e === 1.0) {
      // Parabola: nu in (-PI+eps, PI-eps)
      nuRange = PI * 1.6;
      steps = 100;
    } else {
      // Hyperbola: nu limited by asymptote
      let nuMax = acos(-1/e) - 0.08;
      nuRange = nuMax * 2;
      steps = 100;
    }

    let nuStart = (e < 1.0) ? 0 : -nuRange/2;
    for (let s = 0; s <= steps; s++) {
      let nu = nuStart + (nuRange / steps) * s;
      let r = l / (1 + e * cos(nu));
      if (r < 0 || r > width * 3) continue;
      let px = cx + r * cos(nu);
      let py = cy + r * sin(nu);
      if (abs(px - cx) > width * 1.5 || abs(py - cy) > height * 1.5) {
        endShape();
        beginShape();
        continue;
      }
      vertex(px, py);
    }
    endShape();
  }

  // Update & draw planets + trails
  for (let orb of orbits) {
    let e = orb.e;

    // Advance true anomaly
    let step = nuStep(orb);
    orb.nu += step;

    // Wrap or bounce for non-ellipses
    if (e < 1.0) {
      if (orb.nu > TWO_PI) orb.nu -= TWO_PI;
    } else if (e === 1.0) {
      if (orb.nu > PI * 0.9) { orb.nu = -PI * 0.9; orb.trail = []; }
    } else {
      let nuMax = acos(-1/e) - 0.1;
      if (orb.nu > nuMax) { orb.nu = -nuMax; orb.trail = []; }
    }

    let pos = nuToXY(e, orb.l, orb.nu);
    let px = cx + pos.x;
    let py = cy + pos.y;

    if (!inRange(px - cx, py - cy)) continue;

    orb.trail.push({ x: px, y: py });
    if (orb.trail.length > orb.TRAIL_MAX) orb.trail.shift();

    // Draw trail
    noFill();
    for (let i = 1; i < orb.trail.length; i++) {
      let t = i / orb.trail.length;
      stroke(orb.hue, 85, 100, t * 55);
      strokeWeight(1.5 * t);
      line(orb.trail[i-1].x, orb.trail[i-1].y, orb.trail[i].x, orb.trail[i].y);
    }

    // Planet dot
    noStroke();
    fill(orb.hue, 60, 100, 80);
    circle(px, py, 10);
    fill(orb.hue, 30, 100, 50);
    circle(px, py, 16);

    // Label
    blendMode(BLEND);
    fill(orb.hue, 50, 90, 80);
    noStroke();
    textFont('monospace');
    textSize(11);
    textAlign(LEFT, CENTER);
    text(orb.label, px + 10, py - 6);
    blendMode(ADD);
  }

  // Draw star / sun at focus
  blendMode(ADD);
  for (let r = 28; r >= 4; r -= 4) {
    fill(55, 90, 100, map(r, 4, 28, 80, 10));
    noStroke();
    circle(cx, cy, r * 2);
  }
  fill(55, 20, 100, 90);
  circle(cx, cy, 8);

  // Title
  blendMode(BLEND);
  fill(0, 0, 80, 70);
  noStroke();
  textFont('monospace');
  textSize(13);
  textAlign(LEFT, BOTTOM);
  text("Kepler Orbits", 20, height - 16);

  blendMode(BLEND);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  SCALE = min(width, height) * 0.17;
  buildOrbits();
}
</script>
</body></html>
