<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lenia | P5.js VFX</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
.back-link {
  position: fixed; top: 16px; left: 16px; z-index: 100;
  color: rgba(255,255,255,0.6); text-decoration: none;
  font-size: 13px; letter-spacing: 0.05em;
  background: rgba(255,255,255,0.08);
  padding: 6px 12px; border-radius: 20px;
  transition: background 0.2s;
}
.back-link:hover { background: rgba(255,255,255,0.18); color: #fff; }
</style>
</head>
<body>
<a href="../index.html" class="back-link">← Gallery</a>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

const GRID = 256;
const R = 13;
const MU = 0.135;
const SIGMA = 0.015;
const DT = 0.1;

let A, nextA;
let kernel = [];
let kernelSum = 0;
let pg; // pixel graphics

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(1);

  A = new Float32Array(GRID * GRID);
  nextA = new Float32Array(GRID * GRID);

  buildKernel();
  initOrbium();

  pg = createGraphics(GRID, GRID);
  pg.pixelDensity(1);
}

function buildKernel() {
  kernel = new Float32Array((2 * R + 1) * (2 * R + 1));
  kernelSum = 0;
  let idx = 0;
  for (let dy = -R; dy <= R; dy++) {
    for (let dx = -R; dx <= R; dx++) {
      let r = sqrt(dx * dx + dy * dy);
      let val = 0;
      if (r <= R) {
        let norm = (r - R / 2) / (0.15 * R);
        val = exp(-(norm * norm));
      }
      kernel[idx++] = val;
      kernelSum += val;
    }
  }
}

function initOrbium() {
  // Place two orbium patterns
  placeOrbium(GRID / 2, GRID / 2);
  placeOrbium(GRID / 4, GRID / 3);
}

function placeOrbium(cx, cy) {
  let rad = 12;
  for (let y = -rad; y <= rad; y++) {
    for (let x = -rad; x <= rad; x++) {
      let r = sqrt(x * x + y * y);
      if (r <= rad) {
        let gx = ((cx + x) % GRID + GRID) % GRID;
        let gy = ((cy + y) % GRID + GRID) % GRID;
        // Orbium-like: ring distribution
        let val = exp(-(r - rad * 0.5) * (r - rad * 0.5) / 8) * 0.9;
        A[gy * GRID + gx] = min(1, A[gy * GRID + gx] + val);
      }
    }
  }
}

function growth(u) {
  let d = (u - MU) / SIGMA;
  return 2 * exp(-(d * d)) - 1;
}

function stepLenia() {
  let KW = 2 * R + 1;
  for (let cy = 0; cy < GRID; cy++) {
    for (let cx = 0; cx < GRID; cx++) {
      let conv = 0;
      let kidx = 0;
      for (let dy = -R; dy <= R; dy++) {
        for (let dx = -R; dx <= R; dx++) {
          let kv = kernel[kidx++];
          if (kv === 0) continue;
          let nx = ((cx + dx) % GRID + GRID) % GRID;
          let ny = ((cy + dy) % GRID + GRID) % GRID;
          conv += A[ny * GRID + nx] * kv;
        }
      }
      conv /= kernelSum;
      let g = growth(conv);
      let newVal = A[cy * GRID + cx] + DT * g;
      nextA[cy * GRID + cx] = max(0, min(1, newVal));
    }
  }
  let tmp = A;
  A = nextA;
  nextA = tmp;
}

function draw() {
  // Run 2 simulation steps
  stepLenia();
  stepLenia();

  // Render to pixel graphics
  pg.loadPixels();
  for (let i = 0; i < GRID * GRID; i++) {
    let v = A[i];
    let r, g, b;
    // 0=black, 0.3=deep blue, 0.6=cyan, 1.0=white
    if (v < 0.3) {
      let t = v / 0.3;
      r = floor(t * 0 * 255);
      g = floor(t * 180 * 255 / 255);
      b = floor(t * 200 * 255 / 255);
      r = 0; g = floor(t * 80); b = floor(t * 160);
    } else if (v < 0.6) {
      let t = (v - 0.3) / 0.3;
      r = floor(t * 20);
      g = floor(80 + t * 175);
      b = floor(160 + t * 95);
    } else {
      let t = (v - 0.6) / 0.4;
      r = floor(20 + t * 235);
      g = floor(255);
      b = floor(255);
    }
    let pi = i * 4;
    pg.pixels[pi] = r;
    pg.pixels[pi + 1] = g;
    pg.pixels[pi + 2] = b;
    pg.pixels[pi + 3] = 255;
  }
  pg.updatePixels();

  // Scale and draw
  background(0);
  let sz = min(width, height);
  let ox = (width - sz) / 2;
  let oy = (height - sz) / 2;
  image(pg, ox, oy, sz, sz);

  // ADD blend glow for bright cells
  blendMode(ADD);
  noStroke();
  for (let gy = 0; gy < GRID; gy += 4) {
    for (let gx = 0; gx < GRID; gx += 4) {
      let v = A[gy * GRID + gx];
      if (v > 0.6) {
        let alpha = (v - 0.6) / 0.4 * 18;
        fill(180, 90, 100, alpha);
        let px2 = ox + gx / GRID * sz;
        let py2 = oy + gy / GRID * sz;
        circle(px2, py2, 12);
      }
    }
  }
  blendMode(BLEND);

  // Title overlay
  fill(180, 80, 100, 70);
  noStroke();
  textSize(13);
  textAlign(RIGHT);
  text('Lenia', width - 20, height - 20);
  fill(0, 0, 70, 40);
  textSize(11);
  text('continuous cellular automaton', width - 20, height - 6);
}

function mousePressed() {
  // Click to add new orbium
  let sz = min(width, height);
  let ox = (width - sz) / 2;
  let oy = (height - sz) / 2;
  let gx = floor((mouseX - ox) / sz * GRID);
  let gy = floor((mouseY - oy) / sz * GRID);
  if (gx >= 0 && gx < GRID && gy >= 0 && gy < GRID) {
    placeOrbium(gx, gy);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
