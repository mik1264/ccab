<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Waves | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080005; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
        .hint {
            position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
            color: rgba(255,100,120,0.6); font-family: sans-serif; font-size: 13px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <div class="hint">Click to create spiral wave</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

// Cardiac Electrical Wave Propagation
// Simple 3-state excitable medium (FitzHugh-Nagumo simplified)
// States: 0=resting, 1=excited, 2=refractory

var GW = 200; // grid width
var GH = 140; // grid height
var CELL_W, CELL_H;

var state, nextState;
var excitation;    // continuous excitation level [0,1]
var nextExcitation;
var refractory;    // refractory counter
var nextRefractory;

// Thresholds
var EXCITE_THRESH = 0.3;
var DECAY_RATE    = 0.04;
var REFRACT_STEPS = 14;

var pacemakerCol = 3; // leftmost columns = pacemaker
var pacemakerPeriod = 55; // frames between beats
var stepsPerFrame = 2;
var autoPhase = 0;       // 0=normal rhythm, 1=transitioning to spiral, 2=spiral, 3=transitioning back
var phaseTimer = 0;
var spiralActive = false;

function idx(x, y) { return y * GW + x; }

function setup() {
    createCanvas(windowWidth, windowHeight);
    colorMode(HSB, 360, 100, 100, 100);
    frameRate(60);

    CELL_W = width  / GW;
    CELL_H = height / GH;

    state        = new Uint8Array(GW * GH);
    nextState    = new Uint8Array(GW * GH);
    excitation   = new Float32Array(GW * GH);
    nextExcitation = new Float32Array(GW * GH);
    refractory   = new Uint8Array(GW * GH);
    nextRefractory = new Uint8Array(GW * GH);

    // Pacemaker fires immediately
    firePacemaker();
}

function firePacemaker() {
    for (var y = 0; y < GH; y++) {
        for (var x = 0; x < pacemakerCol; x++) {
            var i = idx(x, y);
            if (state[i] === 0) {
                state[i] = 1;
                excitation[i] = 1.0;
                refractory[i] = 0;
            }
        }
    }
}

function createSpiralWave(cx, cy) {
    // S1-S2 protocol: block half the wave front
    // Excite a line while blocking a half-plane
    var gx = Math.floor(cx / CELL_W);
    var gy = Math.floor(cy / CELL_H);

    // Create a stimulus line at click position (vertical)
    for (var y = 0; y < gy; y++) {
        var x = gx;
        if (x >= 0 && x < GW) {
            // Force excite cells not in refractory
            if (state[idx(x, y)] === 0) {
                state[idx(x, y)] = 1;
                excitation[idx(x, y)] = 1.0;
                refractory[idx(x, y)] = 0;
            }
        }
    }
}

function draw() {
    // Black background — we'll paint everything via pixels
    background(0, 0, 3, 100);

    // Auto-pacemaker
    if (frameCount % pacemakerPeriod === 0) {
        firePacemaker();
    }

    // Run simulation steps
    for (var s = 0; s < stepsPerFrame; s++) {
        updateGrid();
    }

    // Render grid
    renderGrid();

    // FPS
    push();
    fill(0, 0, 100, 50);
    noStroke();
    textFont('monospace');
    textSize(12);
    textAlign(RIGHT, TOP);
    text(Math.round(frameRate()) + ' fps', width - 16, 16);
    pop();

    // Info
    push();
    fill(350, 60, 90, 60);
    noStroke();
    textFont('sans-serif');
    textSize(12);
    textAlign(LEFT, TOP);
    text('Cardiac Excitable Medium — 3-State Automaton', 16, 46);
    pop();
}

function updateGrid() {
    // Copy
    for (var i = 0; i < GW * GH; i++) {
        nextState[i]      = state[i];
        nextExcitation[i] = excitation[i];
        nextRefractory[i] = refractory[i];
    }

    for (var y = 0; y < GH; y++) {
        for (var x = 0; x < GW; x++) {
            var i = idx(x, y);
            var s = state[i];
            var ex = excitation[i];
            var ref = refractory[i];

            if (s === 1) {
                // Excited: spread excitation to neighbors, then enter refractory
                // Excitation decays
                var newEx = ex - DECAY_RATE;
                if (newEx <= 0) {
                    nextState[i] = 2;
                    nextExcitation[i] = 0;
                    nextRefractory[i] = REFRACT_STEPS;
                } else {
                    nextExcitation[i] = newEx;
                }

                // Spread to resting neighbors
                var dirs = [[1,0],[-1,0],[0,1],[0,-1]];
                for (var d = 0; d < dirs.length; d++) {
                    var nx = x + dirs[d][0];
                    var ny = y + dirs[d][1];
                    if (nx < 0 || nx >= GW || ny < 0 || ny >= GH) continue;
                    var ni = idx(nx, ny);
                    if (state[ni] === 0 && excitation[ni] < ex * 0.9) {
                        // Accumulate excitation
                        var newExN = nextExcitation[ni] + ex * 0.6;
                        nextExcitation[ni] = Math.min(1.0, newExN);
                        if (nextExcitation[ni] >= EXCITE_THRESH) {
                            nextState[ni] = 1;
                        }
                    }
                }

            } else if (s === 2) {
                // Refractory: count down
                if (ref <= 1) {
                    nextState[i] = 0;
                    nextRefractory[i] = 0;
                    nextExcitation[i] = 0;
                } else {
                    nextRefractory[i] = ref - 1;
                }

            } else {
                // Resting: check if threshold reached
                if (nextExcitation[i] >= EXCITE_THRESH) {
                    nextState[i] = 1;
                } else {
                    // Passive decay
                    nextExcitation[i] = Math.max(0, nextExcitation[i] - DECAY_RATE * 0.5);
                }
            }
        }
    }

    // Swap
    var tmp;
    tmp = state;       state       = nextState;       nextState       = tmp;
    tmp = excitation;  excitation  = nextExcitation;  nextExcitation  = tmp;
    tmp = refractory;  refractory  = nextRefractory;  nextRefractory  = tmp;
}

function renderGrid() {
    loadPixels();
    var pw = width;

    for (var y = 0; y < GH; y++) {
        for (var x = 0; x < GW; x++) {
            var i = idx(x, y);
            var s = state[i];
            var ex = excitation[i];
            var ref = refractory[i];

            var r, g, b;

            if (s === 1) {
                // Excited: bright electric red → white at peak
                var brightness = 0.5 + ex * 0.5;
                // Hue: 0 (red) → shift toward orange-white at high ex
                var rr = Math.round(lerp(180, 255, ex));
                var gg = Math.round(lerp(0, 120, ex));
                var bb = Math.round(lerp(30, 80, ex));
                r = rr; g = gg; b = bb;
            } else if (s === 2) {
                // Refractory: dark purple
                var refRatio = ref / REFRACT_STEPS;
                r = Math.round(lerp(25, 80, refRatio));
                g = Math.round(lerp(0, 0, refRatio));
                b = Math.round(lerp(40, 60, refRatio));
            } else {
                // Resting: dark maroon, slightly modulated by excitation
                r = Math.round(30 + ex * 60);
                g = Math.round(0  + ex * 5);
                b = Math.round(10 + ex * 20);
            }

            // Paint cells
            var cw = Math.max(1, Math.ceil(CELL_W));
            var ch = Math.max(1, Math.ceil(CELL_H));
            var px0 = Math.floor(x * CELL_W);
            var py0 = Math.floor(y * CELL_H);

            for (var py = 0; py < ch && py0 + py < height; py++) {
                for (var px = 0; px < cw && px0 + px < pw; px++) {
                    var pIdx = ((py0 + py) * pw + (px0 + px)) * 4;
                    pixels[pIdx]     = r;
                    pixels[pIdx + 1] = g;
                    pixels[pIdx + 2] = b;
                    pixels[pIdx + 3] = 255;
                }
            }
        }
    }
    updatePixels();
}

function mousePressed() {
    createSpiralWave(mouseX, mouseY);
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
    CELL_W = width  / GW;
    CELL_H = height / GH;
}
    </script>
</body>
</html>
