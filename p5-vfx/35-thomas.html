<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thomas Attractor 3D — Chaos/Attractors</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); color:#666; font-family:monospace; font-size:12px; text-align:center; pointer-events:none; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Thomas Attractor · b=0.208186 · Color by velocity · Drag to rotate</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  const MAX_PTS = 10000;
  const STEPS = 40;
  const dt = 0.05;
  const b = 0.208186;

  let buf = new Float32Array(MAX_PTS * 3);
  let velBuf = new Float32Array(MAX_PTS); // velocity magnitudes
  let head = 0, count = 0;
  let tx = 1.1, ty = 1.1, tz = -0.01;
  let angleY = 0, angleX = 0.4;
  let dragging = false, lastMX = 0, lastMY = 0;
  let fpsEl, fpsTime = 0, fpsFrames = 0;
  const SCALE = 120;

  let minVel = 1e9, maxVel = 0;

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight, p.WEBGL);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    p.strokeWeight(1.1);
    p.noFill();
  };

  p.draw = function() {
    p.background(0, 0, 3);

    fpsFrames++;
    const now = performance.now();
    if (now - fpsTime > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(fpsFrames * 1000 / (now - fpsTime));
      fpsFrames = 0; fpsTime = now;
    }

    for (let s = 0; s < STEPS; s++) {
      const dx = Math.sin(ty) - b * tx;
      const dy = Math.sin(tz) - b * ty;
      const dz = Math.sin(tx) - b * tz;
      tx += dx * dt;
      ty += dy * dt;
      tz += dz * dt;
      const vel = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (vel < minVel) minVel = vel;
      if (vel > maxVel) maxVel = vel;
      const idx = head * 3;
      buf[idx] = tx; buf[idx+1] = ty; buf[idx+2] = tz;
      velBuf[head] = vel;
      head = (head + 1) % MAX_PTS;
      if (count < MAX_PTS) count++;
    }

    angleY += 0.004;
    p.rotateX(angleX);
    p.rotateY(angleY);

    if (count > 2) {
      const velRange = maxVel - minVel || 1;
      p.beginShape(p.LINE_STRIP);
      for (let j = 0; j < count; j++) {
        const age = j / count;
        const pIdx = (head - count + j + MAX_PTS) % MAX_PTS;
        const bufIdx = pIdx * 3;
        const px = buf[bufIdx] * SCALE;
        const py = buf[bufIdx+1] * SCALE;
        const pz = buf[bufIdx+2] * SCALE;
        const vel = velBuf[pIdx];
        // slow = blue (240), fast = red (0)
        const t = p.constrain((vel - minVel) / velRange, 0, 1);
        const h = p.lerp(240, 0, t);
        // fade oldest points
        const bright = p.map(age, 0, 1, 10, 100);
        const al = p.map(age, 0, 1, 0, 90);
        p.stroke(h, 85, bright, al);
        p.vertex(px, -pz, py);
      }
      p.endShape();
    }
  };

  p.mousePressed = function() { dragging = true; lastMX = p.mouseX; lastMY = p.mouseY; };
  p.mouseReleased = function() { dragging = false; };
  p.mouseDragged = function() {
    angleY += (p.mouseX - lastMX) * 0.01;
    angleX += (p.mouseY - lastMY) * 0.01;
    lastMX = p.mouseX; lastMY = p.mouseY;
  };
  p.windowResized = function() { p.resizeCanvas(window.innerWidth, window.innerHeight); };
});
</script>
</body>
</html>
