<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Warp Flow | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
p5.disableFriendlyErrors = true;

new p5(function(p) {
    // Effective resolution (will be upscaled 2x)
    let RW, RH;
    const SCALE = 2.0; // pixel upscale factor

    let fpsVal = 0, fpsLast = 0, fpsFrames = 0;
    let t = 0;

    // --- Noise helpers (hand-rolled gradient noise for full control) ---
    // We use p5's built-in p.noise() which is Perlin noise.

    // fBm: fractal Brownian motion
    function fbm(nx, ny, nt, octaves) {
        let val = 0, amp = 0.5, freq = 1;
        for (let o = 0; o < octaves; o++) {
            val += amp * (p.noise(nx * freq, ny * freq, nt * freq) * 2 - 1);
            amp  *= 0.5;
            freq *= 2.1;
        }
        return val;
    }

    // Domain warping: f(p) = fbm(p + fbm(p + fbm(p)))
    function domainWarp(nx, ny, nt) {
        const OCT = 5;

        // First warp
        const q0x = fbm(nx,           ny,           nt,       OCT);
        const q0y = fbm(nx + 5.2,     ny + 1.3,     nt,       OCT);

        // Second warp
        const q1x = fbm(nx + 4*q0x + 1.7, ny + 4*q0y + 9.2, nt, OCT);
        const q1y = fbm(nx + 4*q0x + 8.3, ny + 4*q0y + 2.8, nt, OCT);

        // Final value
        return fbm(nx + 4*q1x, ny + 4*q1y, nt, OCT);
    }

    // Rich jewel-tone palette based on f in [-1, 1]
    // Returns [r, g, b] 0-255
    function palette(f) {
        // Map f from [-1,1] to [0,1]
        const n = (f + 1) * 0.5;
        // Hue cycling with time influence
        const hue = ((n * 300 + t * 18) % 360 + 360) % 360;
        const sat = 75 + 22 * Math.sin(n * 7.3 + t * 0.5);
        const bri = 15 + 75 * (n * 0.7 + 0.15);

        // HSB to RGB
        const hN = hue / 60;
        const c = (bri / 100) * (sat / 100);
        const x = c * (1 - Math.abs(hN % 2 - 1));
        const m = bri / 100 - c;
        let r = 0, g = 0, b = 0;
        if      (hN < 1) { r = c; g = x; }
        else if (hN < 2) { r = x; g = c; }
        else if (hN < 3) { g = c; b = x; }
        else if (hN < 4) { g = x; b = c; }
        else if (hN < 5) { r = x; b = c; }
        else             { r = c; b = x; }
        return [
            Math.round((r + m) * 255),
            Math.round((g + m) * 255),
            Math.round((b + m) * 255)
        ];
    }

    p.setup = function() {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.colorMode(p.HSB, 360, 100, 100, 100);
        p.pixelDensity(1);
        p.noSmooth();
        p.noiseDetail(4, 0.5);
        computeDims();
    };

    function computeDims() {
        RW = Math.ceil(p.width  / SCALE);
        RH = Math.ceil(p.height / SCALE);
    }

    p.draw = function() {
        fpsFrames++;
        const now = performance.now();
        if (now - fpsLast >= 600) {
            fpsVal = Math.round(fpsFrames / ((now - fpsLast) / 1000));
            fpsFrames = 0; fpsLast = now;
        }

        t += 0.004; // slow time evolution

        // Render at low resolution
        const domainScale = 2.2;

        p.loadPixels();
        const W = p.width, H = p.height;

        for (let y = 0; y < RH; y++) {
            for (let x = 0; x < RW; x++) {
                // Normalised coordinates
                const nx = (x / RW) * domainScale;
                const ny = (y / RH) * domainScale;

                const f = domainWarp(nx, ny, t);
                const [r, g, b] = palette(f);

                // Write SCALE×SCALE block
                for (let dy = 0; dy < SCALE; dy++) {
                    for (let dx = 0; dx < SCALE; dx++) {
                        const px3 = x * SCALE + dx;
                        const py2 = y * SCALE + dy;
                        if (px3 >= W || py2 >= H) continue;
                        const pi = 4 * (py2 * W + px3);
                        p.pixels[pi]     = r;
                        p.pixels[pi + 1] = g;
                        p.pixels[pi + 2] = b;
                        p.pixels[pi + 3] = 255;
                    }
                }
            }
        }
        p.updatePixels();

        // FPS
        p.colorMode(p.HSB, 360, 100, 100, 100);
        p.noStroke();
        p.fill(0, 0, 90, 75);
        p.textFont('monospace');
        p.textSize(12);
        p.textAlign(p.RIGHT, p.TOP);
        p.text('FPS: ' + fpsVal, p.width - 12, 12);

        // Label
        p.fill(0, 0, 80, 60);
        p.textSize(11);
        p.textAlign(p.CENTER, p.BOTTOM);
        p.text('Domain Warp Flow  |  f(p) = fbm(p + fbm(p + fbm(p)))  |  Inigo Quilez technique', p.width / 2, p.height - 8);
    };

    p.windowResized = function() {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        computeDims();
    };
});
    </script>
</body>
</html>
