<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bioluminescent Ocean — P5.js VFX</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#aaa; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">60 fps</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const NUM_ORGS = 500;
let organisms = [];
let t = 0;
let fpsEl, fpsTimer = 0, fpsFrames = 0;

// Hue ranges for bioluminescent colors
const HUE_RANGES = [
  [180, 220], // cyan-blue
  [100, 150], // green
  [220, 280], // blue-violet
  [160, 200], // teal
];

function makeOrganism() {
  let hr = HUE_RANGES[floor(random(HUE_RANGES.length))];
  return {
    x: random(width),
    y: random(height),
    noiseOffX: random(1000),
    noiseOffY: random(2000),
    speed: random(0.4, 1.4),
    hue: random(hr[0], hr[1]),
    sat: random(75, 100),
    size: random(4, 16),
    pulsePhase: random(TWO_PI),
    pulseSpeed: random(0.02, 0.08),
    waveAmp: random(10, 35),
    waveFreq: random(0.004, 0.01),
    waveSpeed: random(0.5, 1.5),
    pulseFlash: 0,
    flashTimer: 0
  };
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  pixelDensity(min(pixelDensity(), 2));
  background(220, 80, 8);
  fpsEl = document.getElementById('fps');
  for (let i = 0; i < NUM_ORGS; i++) {
    organisms.push(makeOrganism());
  }
}

function drawOrganism(o, t) {
  let pulse = sin(t * o.pulseSpeed + o.pulsePhase) * 0.5 + 0.5;
  let isFlashing = o.flashTimer > 0;

  let baseSize = o.size * (0.85 + 0.3 * pulse);
  let hue = isFlashing ? 50 : o.hue;
  let sat = isFlashing ? 20 : o.sat;
  let bright = isFlashing ? 100 : (65 + 35 * pulse);

  // Wave vertical displacement
  let waveY = sin(o.x * o.waveFreq + t * o.waveSpeed) * o.waveAmp;
  let drawX = o.x;
  let drawY = o.y + waveY;

  noStroke();
  // Outer glow rings
  for (let layer = 4; layer >= 0; layer--) {
    let lr = baseSize * (1.5 + layer * 0.8);
    let la = (isFlashing ? 60 : (15 + 20 * pulse)) / (layer + 1);
    fill(hue, sat, bright, la);
    ellipse(drawX, drawY, lr, lr * 0.7);
  }
  // Inner core
  fill(hue, sat * 0.6, 100, isFlashing ? 100 : (80 + 20 * pulse));
  ellipse(drawX, drawY, baseSize, baseSize * 0.65);

  if (o.flashTimer > 0) o.flashTimer--;
}

function draw() {
  fpsFrames++;
  let now = millis();
  if (now - fpsTimer > 500) {
    fpsEl.textContent = round(fpsFrames / ((now - fpsTimer) / 1000)) + ' fps';
    fpsFrames = 0; fpsTimer = now;
  }

  // Dark ocean blue tinted trail
  background(215, 85, 8, 5);
  blendMode(ADD);

  for (let o of organisms) {
    // Noise-driven movement
    let angle = noise(o.x * 0.003 + o.noiseOffX, o.y * 0.003 + o.noiseOffY, t * 0.008) * TWO_PI * 2;
    o.x += cos(angle) * o.speed;
    o.y += sin(angle) * o.speed * 0.6 - 0.2; // slight upward drift

    // Wrap edges
    if (o.x < -20) o.x = width + 20;
    if (o.x > width + 20) o.x = -20;
    if (o.y < -20) o.y = height + 20;
    if (o.y > height + 20) o.y = -20;

    // Random flash
    if (random() < 0.0004) o.flashTimer = 2;

    drawOrganism(o, t);
  }

  // Mouse proximity glow — organisms near mouse glow brighter
  let mx = mouseX, my = mouseY;
  for (let o of organisms) {
    let d = dist(mx, my, o.x, o.y);
    if (d < 80) {
      let alpha = map(d, 0, 80, 40, 0);
      fill(o.hue, 80, 100, alpha);
      ellipse(o.x, o.y, o.size * 4, o.size * 3);
    }
  }

  blendMode(BLEND);

  // Deep ocean vignette
  noStroke();
  for (let edge = 0; edge < 3; edge++) {
    let a = [25, 40, 55][edge];
    let margin = edge * 40;
    fill(215, 80, 5, a);
    // Top
    rect(0, 0, width, margin + 20);
  }

  t++;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(215, 85, 8);
}
</script>
</body></html>
