<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Curve Unfolding</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#060010; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#f8f; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#info { position:fixed; bottom:12px; left:12px; color:#c8f; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.7); padding:8px 12px; border-radius:6px; line-height:1.7; z-index:999; pointer-events:none; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="info">Dragon Curve — Generation 0</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
new p5(function(p) {
  let fpsArr = [], lastTime = 0;
  let maxGen = 15;
  let currentGen = 0;
  let animTime = 0;
  let cyclePeriod = 4.0; // seconds per generation
  let vertices = [];
  let targetVertices = [];

  // Generate dragon curve turns for n generations
  // Start with [1], then each step: new = old + [1] + reverse_complement(old)
  // 1 = turn right, 0 = turn left
  function dragonTurns(gen) {
    let turns = [];
    if (gen === 0) return turns;
    turns = [1]; // generation 1
    for (let g = 1; g < gen; g++) {
      let rev = turns.slice().reverse().map(t => 1 - t);
      turns = turns.concat([1], rev);
    }
    return turns;
  }

  function turnsToPoints(turns) {
    let pts = [{ x: 0, y: 0 }];
    let dx = 1, dy = 0;
    for (let t of turns) {
      let nx = dx, ny = dy;
      if (t === 1) { // turn right: (dx,dy) -> (dy,-dx)
        nx = dy; ny = -dx;
      } else { // turn left: (dx,dy) -> (-dy,dx)
        nx = -dy; ny = dx;
      }
      dx = nx; dy = ny;
      let last = pts[pts.length - 1];
      pts.push({ x: last.x + dx, y: last.y + dy });
    }
    return pts;
  }

  function fitPoints(pts) {
    if (pts.length === 0) return [];
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (let pt of pts) {
      minX = Math.min(minX, pt.x); maxX = Math.max(maxX, pt.x);
      minY = Math.min(minY, pt.y); maxY = Math.max(maxY, pt.y);
    }
    let rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;
    let margin = 60;
    let scaleX = (p.width - margin * 2) / rangeX;
    let scaleY = (p.height - margin * 2) / rangeY;
    let scale = Math.min(scaleX, scaleY);
    let cx = (p.width - (rangeX * scale)) / 2 - minX * scale;
    let cy = (p.height - (rangeY * scale)) / 2 - minY * scale;
    return pts.map(pt => ({ x: pt.x * scale + cx, y: pt.y * scale + cy }));
  }

  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    currentGen = 1;
    vertices = fitPoints(turnsToPoints(dragonTurns(1)));
    targetVertices = vertices;
  };

  p.draw = function() {
    let now = performance.now();
    let dt = now - lastTime; lastTime = now;
    if (dt > 0) {
      fpsArr.push(1000 / dt);
      if (fpsArr.length > 30) fpsArr.shift();
      document.getElementById('fps').textContent = 'FPS: ' + (fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length).toFixed(1);
    }

    animTime += dt / 1000;
    let totalCycle = cyclePeriod * (maxGen + 2);
    let t = animTime % totalCycle;
    let genFloat = t / cyclePeriod;
    let gen = Math.min(maxGen, Math.floor(genFloat));
    let frac = genFloat - Math.floor(genFloat);

    // Smooth step
    let ease = frac < 0.5 ? 2 * frac * frac : -1 + (4 - 2 * frac) * frac;

    if (gen !== currentGen) {
      currentGen = gen;
      let rawPts = turnsToPoints(dragonTurns(gen));
      targetVertices = fitPoints(rawPts);
      // If fewer vertices, pad with last
      if (targetVertices.length < vertices.length) {
        let last = targetVertices[targetVertices.length - 1] || { x: p.width/2, y: p.height/2 };
        while (targetVertices.length < vertices.length) targetVertices.push(last);
      }
    }

    // Rebuild current vertices for this gen fresh
    let rawPts = turnsToPoints(dragonTurns(gen));
    let fitted = fitPoints(rawPts);

    p.background(6, 0, 4, 30);

    if (fitted.length > 1) {
      p.noFill();
      p.strokeWeight(Math.max(0.5, 2.5 - gen * 0.1));

      // Draw with rainbow gradient along the curve
      let n = fitted.length;
      for (let i = 0; i < n - 1; i++) {
        let t2 = i / (n - 1);
        let hue = (t2 * 300 + animTime * 30) % 360;
        p.stroke(hue, 90, 90, 85);
        p.line(fitted[i].x, fitted[i].y, fitted[i+1].x, fitted[i+1].y);
      }

      // Glow effect: draw thicker, more transparent version
      p.strokeWeight(Math.max(1.5, 4 - gen * 0.1));
      for (let i = 0; i < n - 1; i++) {
        let t2 = i / (n - 1);
        let hue = (t2 * 300 + animTime * 30) % 360;
        p.stroke(hue, 60, 100, 15);
        p.line(fitted[i].x, fitted[i].y, fitted[i+1].x, fitted[i+1].y);
      }
    }

    document.getElementById('info').innerHTML =
      'Dragon Curve — Generation ' + gen + '<br>' +
      'Segments: ' + (fitted.length - 1).toLocaleString() + '<br>' +
      'Color: position along curve<br>' +
      'Cycling through gen 0→' + maxGen;
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
  };
});
</script>
</body>
</html>
