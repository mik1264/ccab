<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyclone | P5.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 16px; left: 16px; z-index: 100;
            color: rgba(255,255,255,0.7); text-decoration: none; font-family: sans-serif;
            font-size: 13px; background: rgba(0,0,0,0.5); padding: 6px 12px;
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .back-link:hover { color: white; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Gallery</a>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script>
        p5.disableFriendlyErrors = true;

        const NUM_PARTICLES = 5000;
        const EYE_RADIUS = 40;
        const CYCLONE_STRENGTH = 180;

        let particles = [];
        let eyeX, eyeY;
        let driftX = 0, driftY = 0;
        let wobblePhase = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
            pixelDensity(Math.min(pixelDensity(), 2));
            eyeX = width / 2;
            eyeY = height / 2;
            background(0, 0, 5);

            for (let i = 0; i < NUM_PARTICLES; i++) {
                particles.push(spawnParticle(true));
            }
        }

        function spawnParticle(init) {
            let angle = random(TWO_PI);
            let r;
            if (init) {
                r = random(EYE_RADIUS + 10, min(width, height) * 0.55);
            } else {
                // Spawn at outer edge
                r = min(width, height) * random(0.35, 0.55);
            }
            let x = eyeX + cos(angle) * r;
            let y = eyeY + sin(angle) * r;
            return { x, y, px: x, py: y, r };
        }

        function mousePressed() {
            eyeX = mouseX;
            eyeY = mouseY;
            // Reset particles around new center
            for (let i = 0; i < particles.length; i++) {
                particles[i] = spawnParticle(true);
            }
            background(0, 0, 5);
        }

        function draw() {
            // Subtle storm drift
            wobblePhase += 0.007;
            driftX = sin(wobblePhase * 0.7) * 0.25;
            driftY = cos(wobblePhase * 0.5) * 0.18;
            eyeX = constrain(eyeX + driftX, width * 0.15, width * 0.85);
            eyeY = constrain(eyeY + driftY, height * 0.15, height * 0.85);

            // Trail fade
            blendMode(BLEND);
            fill(225, 30, 5, 15);
            noStroke();
            rect(0, 0, width, height);

            blendMode(ADD);
            strokeWeight(1.1);
            noFill();

            for (let p of particles) {
                let dx = p.x - eyeX;
                let dy = p.y - eyeY;
                let r = sqrt(dx * dx + dy * dy);

                // Avoid spawning inside eye
                if (r < EYE_RADIUS) {
                    // Push out
                    let angle = atan2(dy, dx);
                    r = EYE_RADIUS + 5;
                    p.x = eyeX + cos(angle) * r;
                    p.y = eyeY + sin(angle) * r;
                    dx = p.x - eyeX;
                    dy = p.y - eyeY;
                }

                let angle = atan2(dy, dx);
                let maxR = min(width, height) * 0.52;

                // Angular speed increases toward center (r^-0.5 relationship)
                let angularSpeed = CYCLONE_STRENGTH / (r * sqrt(r) + 0.001);
                angularSpeed = constrain(angularSpeed, 0.5, 8.0);

                // Tangential velocity components (counter-clockwise cyclone)
                let vtx = -sin(angle) * angularSpeed;
                let vty =  cos(angle) * angularSpeed;

                // Inward radial component (convergence)
                let inwardStrength = map(r, EYE_RADIUS, maxR, 0, 0.8);
                let vrx = -cos(angle) * inwardStrength;
                let vry = -sin(angle) * inwardStrength;

                // Perlin noise for spiral band texture
                let n = noise(p.x * 0.004, p.y * 0.004, frameCount * 0.006);
                let noiseTwist = map(n, 0, 1, -0.3, 0.3);

                p.px = p.x;
                p.py = p.y;
                p.x += vtx + vrx + noiseTwist * sin(angle);
                p.y += vty + vry + noiseTwist * cos(angle);

                // Speed for color
                let speed = sqrt((p.x - p.px) * (p.x - p.px) + (p.y - p.py) * (p.y - p.py));

                // Color: fast inner = cyan/white, outer slow = blue/purple
                let distFrac = r / maxR;
                let hue = map(speed, 0, 8, 240, 180);
                hue = constrain(hue, 170, 270);
                let sat = map(speed, 0, 8, 90, 30);
                let bri = map(speed, 0, 8, 75, 100);
                let al = map(r, EYE_RADIUS, maxR, 80, 30);

                stroke(hue, sat, bri, al);
                line(p.px, p.py, p.x, p.y);

                // Respawn if out of bounds or too close to edge
                let dr2 = (p.x - eyeX) * (p.x - eyeX) + (p.y - eyeY) * (p.y - eyeY);
                if (p.x < 0 || p.x > width || p.y < 0 || p.y > height || dr2 > maxR * maxR * 1.2) {
                    let np = spawnParticle(false);
                    p.x = np.x; p.y = np.y; p.px = np.px; p.py = np.py;
                }
            }

            // Draw eye of storm
            blendMode(ADD);
            noStroke();
            // Calm bright eye
            for (let g = 6; g >= 1; g--) {
                fill(200, 10, 100, map(g, 1, 6, 20, 5));
                ellipse(eyeX, eyeY, (EYE_RADIUS + g * 5) * 2, (EYE_RADIUS + g * 5) * 2);
            }
            fill(200, 5, 100, 30);
            ellipse(eyeX, eyeY, EYE_RADIUS * 2, EYE_RADIUS * 2);

            // Title + FPS
            blendMode(BLEND);
            noStroke();
            fill(210, 60, 90, 65);
            textSize(18);
            textAlign(CENTER, BOTTOM);
            textFont('monospace');
            text('Cyclone  — click to reposition', width / 2, height - 20);

            fill(0, 0, 80, 60);
            textSize(12);
            textAlign(RIGHT, TOP);
            text(frameRate().toFixed(0) + ' fps', width - 16, 16);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            eyeX = width / 2;
            eyeY = height / 2;
            for (let i = 0; i < particles.length; i++) {
                particles[i] = spawnParticle(true);
            }
            background(0, 0, 5);
        }
    </script>
</body>
</html>
