<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Particles</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
.back-link { position:fixed; top:12px; left:12px; color:#aaa; text-decoration:none; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
.back-link:hover { color:#fff; }
#fps { position:fixed; top:12px; right:12px; color:#0f0; font-family:monospace; font-size:13px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:6px; z-index:999; }
#mode-label { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); font-family:monospace; font-size:13px; letter-spacing:2px; z-index:999; padding:6px 16px; border-radius:6px; background:rgba(0,0,0,0.5); }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back</a>
<div id="fps">FPS: --</div>
<div id="mode-label" style="color:#4af">+ ATTRACT MODE | CLICK TO TOGGLE</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
const sketch = (p) => {
  const NUM_PARTICLES = 300;
  const MAX_SPEED = 5.5;
  const K = 8000; // Coulomb constant
  let particles = [];
  let charges = []; // Fixed charge points
  let attractMode = true;
  let fpsEl, modeLabel, frameCount2 = 0, fpsTimer = 0;

  class Charge {
    constructor(x, y, polarity) {
      this.x = x; this.y = y;
      this.polarity = polarity; // +1 or -1
      this.hue = polarity > 0 ? 0 : 220;
    }
    draw() {
      p.blendMode(p.BLEND);
      p.noStroke();
      p.fill(this.hue, 80, 100, 40);
      p.circle(this.x, this.y, 36);
      p.fill(this.hue, 60, 100, 80);
      p.circle(this.x, this.y, 18);
      p.fill(this.hue, 10, 100, 100);
      p.circle(this.x, this.y, 7);
      p.fill(this.hue, 70, 100, 60);
      p.textAlign(p.CENTER, p.CENTER);
      p.textSize(12);
      p.text(this.polarity > 0 ? '+' : '−', this.x, this.y);
    }
  }

  class Particle {
    constructor() {
      this.x = p.random(p.width);
      this.y = p.random(p.height);
      this.vx = p.random(-1, 1);
      this.vy = p.random(-1, 1);
    }
    update() {
      let ax = 0, ay = 0;

      // Mouse force
      let mdx = p.mouseX - this.x;
      let mdy = p.mouseY - this.y;
      let md = p.sqrt(mdx*mdx + mdy*mdy);
      if (md > 5) {
        let mF = K / (md * md);
        mF = p.constrain(mF, 0, 2.5);
        let sign = attractMode ? 1 : -1;
        ax += sign * (mdx / md) * mF;
        ay += sign * (mdy / md) * mF;
      }

      // Fixed charges
      for (let c of charges) {
        let cdx = c.x - this.x;
        let cdy = c.y - this.y;
        let cd = p.sqrt(cdx*cdx + cdy*cdy);
        if (cd > 5) {
          let cF = (K * 0.4) / (cd * cd);
          cF = p.constrain(cF, 0, 1.5);
          // + charges attract, - charges repel (always, regardless of mode)
          let sign = c.polarity;
          ax += sign * (cdx / cd) * cF;
          ay += sign * (cdy / cd) * cF;
        }
      }

      this.vx = p.lerp(this.vx, this.vx + ax, 0.3);
      this.vy = p.lerp(this.vy, this.vy + ay, 0.3);

      // Damping
      this.vx *= 0.95;
      this.vy *= 0.95;

      // Speed cap
      let spd = p.sqrt(this.vx*this.vx + this.vy*this.vy);
      if (spd > MAX_SPEED) {
        this.vx *= MAX_SPEED / spd;
        this.vy *= MAX_SPEED / spd;
      }

      this.x += this.vx;
      this.y += this.vy;

      // Wrap edges
      if (this.x < 0) this.x = p.width;
      if (this.x > p.width) this.x = 0;
      if (this.y < 0) this.y = p.height;
      if (this.y > p.height) this.y = 0;
    }
    draw() {
      let spd = p.sqrt(this.vx*this.vx + this.vy*this.vy);
      // Hue: slow=blue(240), medium=green(120), fast=red(0)
      let hue = p.map(spd, 0, MAX_SPEED, 240, 0);
      let sat = 80 + p.map(spd, 0, MAX_SPEED, 0, 20);
      let bri = 70 + p.map(spd, 0, MAX_SPEED, 0, 30);

      p.blendMode(p.ADD);
      p.noStroke();
      p.fill(hue, sat * 0.5, bri, 15);
      p.circle(this.x, this.y, 10);
      p.fill(hue, sat, bri, 80);
      p.circle(this.x, this.y, 3.5);
    }
  }

  function setupCharges() {
    charges = [];
    let numCharges = 6;
    for (let i = 0; i < numCharges; i++) {
      let angle = (i / numCharges) * p.TWO_PI;
      let r = p.min(p.width, p.height) * 0.28;
      let x = p.width/2 + p.cos(angle) * r;
      let y = p.height/2 + p.sin(angle) * r;
      let pol = i % 2 === 0 ? 1 : -1;
      charges.push(new Charge(x, y, pol));
    }
  }

  p.setup = () => {
    p.createCanvas(window.innerWidth, window.innerHeight);
    p.colorMode(p.HSB, 360, 100, 100, 100);
    fpsEl = document.getElementById('fps');
    modeLabel = document.getElementById('mode-label');
    for (let i = 0; i < NUM_PARTICLES; i++) particles.push(new Particle());
    setupCharges();
  };

  p.mousePressed = () => {
    attractMode = !attractMode;
    modeLabel.style.color = attractMode ? '#4af' : '#f64';
    modeLabel.textContent = (attractMode ? '+ ATTRACT MODE' : '− REPEL MODE') + ' | CLICK TO TOGGLE';
  };

  p.draw = () => {
    p.blendMode(p.BLEND);
    p.background(0, 0, 4, 35);

    for (let part of particles) { part.update(); part.draw(); }
    for (let c of charges) c.draw();

    // Mouse cursor indicator
    p.blendMode(p.ADD);
    p.noFill();
    let mhue = attractMode ? 180 : 0;
    p.stroke(mhue, 80, 100, 40);
    p.strokeWeight(1.5);
    p.circle(p.mouseX, p.mouseY, 30);
    p.stroke(mhue, 60, 100, 20);
    p.circle(p.mouseX, p.mouseY, 55);

    frameCount2++;
    let now = p.millis();
    if (now - fpsTimer > 500) {
      fpsEl.textContent = 'FPS: ' + Math.round(frameCount2 / ((now - fpsTimer) / 1000));
      frameCount2 = 0; fpsTimer = now;
    }
  };

  p.windowResized = () => {
    p.resizeCanvas(window.innerWidth, window.innerHeight);
    setupCharges();
  };
};
new p5(sketch);
</script>
</body>
</html>
