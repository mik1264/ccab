<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Fire - Medieval Siege Machines</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 15px; display: flex; gap: 20px;
            align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .control-group label { color: #DDA15E; font-size: 0.75rem; text-transform: uppercase; }
        .control-group input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        .control-group .value { color: #FEFAE0; font-size: 0.8rem; font-weight: bold; }
        button {
            background: linear-gradient(135deg, #BC6C25, #8B3B0A); color: #FEFAE0;
            border: none; padding: 10px 24px; border-radius: 10px; cursor: pointer;
            font-size: 0.9rem; font-weight: bold;
        }
        button:hover { transform: scale(1.05); }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); padding: 12px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 220px;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; }
        .info p { line-height: 1.4; opacity: 0.85; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Greek Fire</h3>
        <p>The Byzantine Empire's secret weapon. A petroleum-based incendiary that burns on water. Siphon-projected like an ancient flamethrower. Click and drag to aim.</p>
    </div>
    <div class="controls">
        <div class="control-group">
            <label>Pressure</label>
            <input type="range" id="pressure" min="1" max="10" value="6" step="1">
            <span class="value" id="pressureVal">6</span>
        </div>
        <div class="control-group">
            <label>Fuel Mix</label>
            <input type="range" id="fuelMix" min="1" max="5" value="3" step="1">
            <span class="value" id="fuelMixVal">3</span>
        </div>
        <button id="fireBtn">IGNITE!</button>
        <button id="resetBtn">Reset</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        let firing = false;
        let aimAngle = -0.3;
        let particles = [];
        let fireSpots = [];
        let waterLine;
        let mouseDown = false;
        let mouseX = 0, mouseY = 0;

        const els = {
            pressure: document.getElementById('pressure'),
            fuelMix: document.getElementById('fuelMix')
        };

        function getP() {
            return { pressure: +els.pressure.value, fuelMix: +els.fuelMix.value };
        }

        function updateLabels() {
            document.getElementById('pressureVal').textContent = els.pressure.value;
            document.getElementById('fuelMixVal').textContent = els.fuelMix.value;
        }
        Object.values(els).forEach(e => e.addEventListener('input', updateLabels));

        document.getElementById('fireBtn').addEventListener('click', () => { firing = !firing; });
        document.getElementById('resetBtn').addEventListener('click', () => {
            firing = false; particles = []; fireSpots = [];
        });

        window.reset = function() {
            firing = false; particles = []; fireSpots = [];
        };

        canvas.addEventListener('mousedown', (e) => { mouseDown = true; mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('mouseup', () => { mouseDown = false; });
        canvas.addEventListener('touchstart', (e) => { mouseDown = true; const t = e.touches[0]; mouseX = t.clientX; mouseY = t.clientY; e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { const t = e.touches[0]; mouseX = t.clientX; mouseY = t.clientY; e.preventDefault(); });
        canvas.addEventListener('touchend', () => { mouseDown = false; });

        function drawShip(shipX, shipY) {
            // Hull
            ctx.fillStyle = '#5A4A2A';
            ctx.beginPath();
            ctx.moveTo(shipX - 60, shipY);
            ctx.quadraticCurveTo(shipX - 70, shipY + 20, shipX - 50, shipY + 30);
            ctx.lineTo(shipX + 50, shipY + 30);
            ctx.quadraticCurveTo(shipX + 70, shipY + 20, shipX + 60, shipY);
            ctx.closePath();
            ctx.fill();

            // Deck
            ctx.fillStyle = '#6B5B3A';
            ctx.fillRect(shipX - 55, shipY - 5, 110, 8);

            // Mast
            ctx.strokeStyle = '#7B6B4A';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(shipX, shipY - 5);
            ctx.lineTo(shipX, shipY - 80);
            ctx.stroke();

            // Sail
            ctx.fillStyle = 'rgba(220,200,160,0.4)';
            ctx.beginPath();
            ctx.moveTo(shipX, shipY - 75);
            ctx.quadraticCurveTo(shipX + 35, shipY - 50, shipX + 5, shipY - 25);
            ctx.lineTo(shipX, shipY - 25);
            ctx.closePath();
            ctx.fill();

            // Siphon tube at front
            const siphonX = shipX + 45;
            const siphonY = shipY - 8;

            // Calculate aim angle from mouse
            const dx = mouseX - siphonX;
            const dy = mouseY - siphonY;
            aimAngle = Math.atan2(dy, dx);
            aimAngle = Math.max(-0.8, Math.min(0.3, aimAngle));

            // Bronze siphon
            ctx.strokeStyle = '#AA8844';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(siphonX - 5, siphonY);
            ctx.lineTo(siphonX + 30 * Math.cos(aimAngle), siphonY + 30 * Math.sin(aimAngle));
            ctx.stroke();

            // Nozzle
            ctx.fillStyle = '#CC9944';
            const nozX = siphonX + 30 * Math.cos(aimAngle);
            const nozY = siphonY + 30 * Math.sin(aimAngle);
            ctx.beginPath();
            ctx.arc(nozX, nozY, 4, 0, Math.PI * 2);
            ctx.fill();

            // Crew
            for (let i = 0; i < 4; i++) {
                const cx = shipX - 30 + i * 20;
                ctx.fillStyle = '#8A9A5B';
                ctx.beginPath();
                ctx.arc(cx, shipY - 15, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            return { nozX, nozY };
        }

        function drawEnemyShip(sx, sy, damage) {
            // Hull
            const burnColor = damage > 50 ? '#4A2A0A' : '#5A4A2A';
            ctx.fillStyle = burnColor;
            ctx.beginPath();
            ctx.moveTo(sx - 40, sy);
            ctx.quadraticCurveTo(sx - 50, sy + 15, sx - 35, sy + 22);
            ctx.lineTo(sx + 35, sy + 22);
            ctx.quadraticCurveTo(sx + 50, sy + 15, sx + 40, sy);
            ctx.closePath();
            ctx.fill();

            // Mast
            if (damage < 70) {
                ctx.strokeStyle = '#7B6B4A';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx, sy - 50);
                ctx.stroke();
            }

            // Deck
            ctx.fillStyle = damage > 30 ? '#5A3A1A' : '#6B5B3A';
            ctx.fillRect(sx - 35, sy - 3, 70, 5);
        }

        let lastTime = 0;
        let enemyDamage = 0;
        function animate(time) {
            const dt = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;

            const p = getP();
            waterLine = H * 0.6;
            const shipX = W * 0.2;
            const shipY = waterLine - 5 + Math.sin(time * 0.001) * 3;

            // Dark sky
            ctx.fillStyle = '#0a0a1e';
            ctx.fillRect(0, 0, W, H);

            // Water
            const waterGrad = ctx.createLinearGradient(0, waterLine, 0, H);
            waterGrad.addColorStop(0, '#1a3a5a');
            waterGrad.addColorStop(0.5, '#0a2a4a');
            waterGrad.addColorStop(1, '#001a30');
            ctx.fillStyle = waterGrad;
            ctx.fillRect(0, waterLine, W, H - waterLine);

            // Waves
            ctx.strokeStyle = 'rgba(100,150,200,0.2)';
            ctx.lineWidth = 1;
            for (let w = 0; w < 5; w++) {
                ctx.beginPath();
                for (let x = 0; x < W; x += 5) {
                    const y = waterLine + w * 20 + Math.sin(x * 0.02 + time * 0.002 + w) * 3;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            // Enemy ships
            const enemies = [
                { x: W * 0.6, y: waterLine - 3 + Math.sin(time * 0.0012 + 1) * 2 },
                { x: W * 0.78, y: waterLine - 2 + Math.sin(time * 0.0015 + 2) * 3 }
            ];
            enemies.forEach(e => drawEnemyShip(e.x, e.y, enemyDamage));

            // Our ship
            const noz = drawShip(shipX, shipY);

            // Emit fire particles
            if (firing) {
                const speed = p.pressure * 3;
                const spread = 0.1 + (5 - p.fuelMix) * 0.02;
                for (let i = 0; i < 3 + p.pressure; i++) {
                    const a = aimAngle + (Math.random() - 0.5) * spread;
                    particles.push({
                        x: noz.nozX, y: noz.nozY,
                        vx: speed * Math.cos(a) + (Math.random() - 0.5) * 2,
                        vy: speed * Math.sin(a) + (Math.random() - 0.5) * 2,
                        life: 1 + p.fuelMix * 0.3,
                        maxLife: 1 + p.fuelMix * 0.3,
                        size: 3 + Math.random() * 4,
                        burning: true
                    });
                }
            }

            // Update particles
            particles = particles.filter(pt => {
                pt.x += pt.vx;
                pt.y += pt.vy;
                pt.vy += 0.08; // gravity
                pt.life -= dt;

                // Fire on water - keep burning!
                if (pt.y >= waterLine && pt.burning) {
                    pt.vy *= -0.3;
                    pt.y = waterLine;
                    pt.vx *= 0.95;
                    // Spread fire on water
                    if (Math.random() < 0.1) {
                        fireSpots.push({
                            x: pt.x, y: waterLine,
                            life: 2 + p.fuelMix * 0.5,
                            size: 5 + Math.random() * 10
                        });
                    }
                }

                // Hit enemy ship?
                enemies.forEach(e => {
                    if (Math.abs(pt.x - e.x) < 45 && Math.abs(pt.y - e.y) < 25) {
                        enemyDamage = Math.min(100, enemyDamage + dt * 5);
                        fireSpots.push({
                            x: pt.x + (Math.random() - 0.5) * 10,
                            y: pt.y + (Math.random() - 0.5) * 10,
                            life: 3,
                            size: 8 + Math.random() * 8
                        });
                    }
                });

                if (pt.life > 0) {
                    const lifeFrac = pt.life / pt.maxLife;
                    const r = 255;
                    const g = Math.floor(100 + lifeFrac * 100);
                    const b = Math.floor(lifeFrac * 50);
                    ctx.fillStyle = `rgba(${r},${g},${b},${lifeFrac * 0.8})`;
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, pt.size * lifeFrac, 0, Math.PI * 2);
                    ctx.fill();

                    // Glow
                    ctx.fillStyle = `rgba(255,200,50,${lifeFrac * 0.2})`;
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, pt.size * lifeFrac * 3, 0, Math.PI * 2);
                    ctx.fill();
                }

                return pt.life > 0;
            });

            // Fire spots on water
            fireSpots = fireSpots.filter(f => {
                f.life -= dt * 0.3;
                if (f.life > 0) {
                    const a = f.life / 3;
                    // Fire flicker
                    for (let i = 0; i < 3; i++) {
                        const fx = f.x + (Math.random() - 0.5) * f.size;
                        const fy = f.y - Math.random() * f.size * 1.5;
                        const fr = f.size * 0.3 * (0.5 + Math.random() * 0.5);
                        ctx.fillStyle = `rgba(255,${100 + Math.random() * 100},0,${a * 0.6})`;
                        ctx.beginPath();
                        ctx.arc(fx, fy, fr, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    // Reflection
                    ctx.fillStyle = `rgba(255,150,50,${a * 0.1})`;
                    ctx.beginPath();
                    ctx.ellipse(f.x, f.y + 10, f.size, 5, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                return f.life > 0;
            });

            // Title
            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 16px sans-serif';
            ctx.fillText('Greek Fire - Byzantine Naval Weapon', W * 0.35, 30);

            // Subtitle
            ctx.font = '12px sans-serif';
            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.fillText('"Water cannot extinguish it" - Burns on the sea itself', W * 0.35, 50);

            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
