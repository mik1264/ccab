<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siege Warfare Sandbox - Medieval Siege Machines</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .toolbar {
            position: fixed; top: 60px; left: 10px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            padding: 10px; border-radius: 12px; z-index: 100;
            display: flex; flex-direction: column; gap: 6px;
        }
        .tool-btn {
            background: rgba(138,154,91,0.2); color: #FEFAE0; border: 2px solid transparent;
            padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.75rem;
            text-align: left; transition: all 0.2s;
        }
        .tool-btn:hover { background: rgba(138,154,91,0.4); }
        .tool-btn.active { border-color: #DDA15E; background: rgba(221,161,94,0.2); }
        .tool-icon { font-size: 1.1rem; margin-right: 4px; }
        .status {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 10px 25px; border-radius: 15px; z-index: 100;
            color: #FEFAE0; font-size: 0.85rem; display: flex; gap: 25px; align-items: center;
        }
        .stat { text-align: center; }
        .stat-val { color: #8A9A5B; font-weight: bold; font-size: 1.1rem; }
        .stat-label { color: #DDA15E; font-size: 0.65rem; text-transform: uppercase; }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); padding: 12px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 200px;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; }
        .info p { line-height: 1.4; opacity: 0.7; font-size: 0.75rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="toolbar">
        <button class="tool-btn active" data-tool="trebuchet"><span class="tool-icon">T</span> Trebuchet</button>
        <button class="tool-btn" data-tool="ballista"><span class="tool-icon">B</span> Ballista</button>
        <button class="tool-btn" data-tool="mangonel"><span class="tool-icon">M</span> Mangonel</button>
        <button class="tool-btn" data-tool="ram"><span class="tool-icon">R</span> Battering Ram</button>
        <button class="tool-btn" data-tool="tower"><span class="tool-icon">S</span> Siege Tower</button>
        <button class="tool-btn" data-tool="fire"><span class="tool-icon">F</span> Greek Fire</button>
        <hr style="border-color:rgba(255,255,255,0.1)">
        <button class="tool-btn" data-tool="clear" style="color:#BC6C25">Clear All</button>
    </div>
    <div class="info">
        <h3>Siege Sandbox</h3>
        <p>Select a weapon from the toolbar, then click on the battlefield to place it. Weapons fire automatically at the castle. Watch the walls crumble!</p>
    </div>
    <div class="status">
        <div class="stat"><div class="stat-val" id="wallHP">100%</div><div class="stat-label">Wall Integrity</div></div>
        <div class="stat"><div class="stat-val" id="gateHP">100%</div><div class="stat-label">Gate Integrity</div></div>
        <div class="stat"><div class="stat-val" id="weaponCount">0</div><div class="stat-label">Weapons Deployed</div></div>
        <div class="stat"><div class="stat-val" id="shotsCount">0</div><div class="stat-label">Shots Fired</div></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        let selectedTool = 'trebuchet';
        let weapons = [];
        let projectiles = [];
        let effects = [];
        let wallHP = 100;
        let gateHP = 100;
        let shots = 0;
        let cracks = [];
        let gateCracks = [];

        document.querySelectorAll('.tool-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tool = btn.dataset.tool;
                if (tool === 'clear') {
                    weapons = []; projectiles = []; effects = [];
                    wallHP = 100; gateHP = 100; shots = 0;
                    cracks = []; gateCracks = [];
                    return;
                }
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedTool = tool;
            });
        });

        canvas.addEventListener('click', (e) => {
            const groundY = H * 0.78;
            const castleX = W * 0.75;
            if (e.clientY < groundY - 20 || e.clientX > castleX - 30) return;
            if (selectedTool === 'clear') return;

            weapons.push({
                type: selectedTool,
                x: e.clientX,
                y: groundY,
                cooldown: 0,
                fireRate: selectedTool === 'ballista' ? 1.5 : selectedTool === 'mangonel' ? 3 : selectedTool === 'trebuchet' ? 5 : 0,
                phase: 0
            });
        });

        window.reset = function() {
            weapons = []; projectiles = []; effects = [];
            wallHP = 100; gateHP = 100; shots = 0; cracks = []; gateCracks = [];
        };

        function drawCastle(castleX, groundY) {
            const wallH = 130;
            const wallW = 40;
            const towerW = 25;

            // Main wall
            const wallColor = wallHP > 60 ? '#5a5a5a' : wallHP > 30 ? '#5a4a3a' : '#5a3a2a';
            ctx.fillStyle = wallColor;
            ctx.fillRect(castleX, groundY - wallH, wallW, wallH);

            // Left tower
            ctx.fillRect(castleX - towerW, groundY - wallH - 20, towerW, wallH + 20);
            // Right tower
            ctx.fillRect(castleX + wallW, groundY - wallH - 20, towerW, wallH + 20);

            // Merlons
            ctx.fillStyle = '#5a5a5a';
            for (let i = 0; i < 3; i++) {
                ctx.fillRect(castleX + i * 15, groundY - wallH - 12, 10, 12);
                ctx.fillRect(castleX - towerW + i * 10, groundY - wallH - 32, 7, 12);
                ctx.fillRect(castleX + wallW + i * 10, groundY - wallH - 32, 7, 12);
            }

            // Gate
            const gateW = 30;
            const gateH = 50;
            const gateColor = gateHP > 60 ? '#5A3A1A' : gateHP > 30 ? '#6A3A0A' : '#7A2A0A';
            ctx.fillStyle = gateColor;
            ctx.beginPath();
            ctx.moveTo(castleX + 5, groundY);
            ctx.lineTo(castleX + 5, groundY - gateH + 10);
            ctx.arc(castleX + 5 + gateW / 2, groundY - gateH + 10, gateW / 2, Math.PI, 0);
            ctx.lineTo(castleX + 5 + gateW, groundY);
            ctx.closePath();
            ctx.fill();

            // Wall cracks
            ctx.strokeStyle = '#2a1a0a';
            ctx.lineWidth = 2;
            cracks.forEach(c => {
                ctx.beginPath();
                ctx.moveTo(c.x, c.y);
                c.segs.forEach(s => ctx.lineTo(c.x + s.x, c.y + s.y));
                ctx.stroke();
            });

            // Gate damage
            gateCracks.forEach(c => {
                ctx.beginPath();
                ctx.moveTo(c.x, c.y);
                c.segs.forEach(s => ctx.lineTo(c.x + s.x, c.y + s.y));
                ctx.stroke();
            });

            // Rubble at base
            if (wallHP < 80) {
                const rubbleCount = Math.floor((100 - wallHP) / 5);
                ctx.fillStyle = '#4a4a3a';
                for (let i = 0; i < rubbleCount; i++) {
                    const rx = castleX - 10 + ((i * 17) % 60);
                    const ry = groundY - 3;
                    ctx.fillRect(rx, ry, 4 + (i % 3) * 2, 3 + (i % 2) * 2);
                }
            }

            return { wallH, gateX: castleX + 5 + gateW / 2, gateY: groundY - gateH / 2 };
        }

        function drawWeapon(w, groundY) {
            ctx.save();
            switch (w.type) {
                case 'trebuchet': {
                    // Simplified trebuchet
                    ctx.strokeStyle = '#7B5B2A';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(w.x - 12, groundY);
                    ctx.lineTo(w.x, groundY - 30);
                    ctx.lineTo(w.x + 12, groundY);
                    ctx.stroke();
                    // Arm
                    const armAng = -Math.PI * 0.35 + w.phase * 0.7;
                    ctx.strokeStyle = '#8B6B3A';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(w.x - 10 * Math.cos(armAng), groundY - 30 - 10 * Math.sin(armAng));
                    ctx.lineTo(w.x + 25 * Math.cos(armAng), groundY - 30 + 25 * Math.sin(armAng));
                    ctx.stroke();
                    // CW
                    ctx.fillStyle = '#555';
                    ctx.fillRect(w.x - 10 * Math.cos(armAng) - 5, groundY - 30 - 10 * Math.sin(armAng), 10, 10);
                    break;
                }
                case 'ballista': {
                    ctx.fillStyle = '#5A4A2A';
                    ctx.fillRect(w.x - 15, groundY - 10, 30, 10);
                    ctx.strokeStyle = '#8B7355';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(w.x, groundY - 10);
                    ctx.lineTo(w.x + 20, groundY - 18);
                    ctx.stroke();
                    // Arms
                    ctx.beginPath();
                    ctx.moveTo(w.x - 8, groundY - 12);
                    ctx.lineTo(w.x - 15, groundY - 25);
                    ctx.moveTo(w.x + 8, groundY - 12);
                    ctx.lineTo(w.x + 15, groundY - 25);
                    ctx.stroke();
                    break;
                }
                case 'mangonel': {
                    ctx.fillStyle = '#5A4A2A';
                    ctx.fillRect(w.x - 12, groundY - 8, 24, 8);
                    ctx.strokeStyle = '#8B6B3A';
                    ctx.lineWidth = 3;
                    const mAng = -Math.PI * 0.3 + w.phase * 0.5;
                    ctx.beginPath();
                    ctx.moveTo(w.x, groundY - 8);
                    ctx.lineTo(w.x + 20 * Math.cos(mAng), groundY - 8 + 20 * Math.sin(mAng));
                    ctx.stroke();
                    break;
                }
                case 'ram': {
                    ctx.fillStyle = '#4A3A1A';
                    ctx.fillRect(w.x - 20, groundY - 20, 50, 15);
                    ctx.fillStyle = '#6B4B2A';
                    ctx.fillRect(w.x - 15 + Math.sin(w.phase * 3) * 5, groundY - 17, 40, 8);
                    ctx.fillStyle = '#666';
                    ctx.beginPath();
                    ctx.moveTo(w.x + 30, groundY - 13);
                    ctx.lineTo(w.x + 35, groundY - 16);
                    ctx.lineTo(w.x + 35, groundY - 10);
                    ctx.fill();
                    break;
                }
                case 'tower': {
                    const tH = 50;
                    ctx.fillStyle = '#5A4A2A';
                    ctx.fillRect(w.x - 12, groundY - tH, 24, tH);
                    ctx.strokeStyle = '#4A3A1A';
                    ctx.lineWidth = 1;
                    for (let i = 0; i < 5; i++) {
                        ctx.beginPath();
                        ctx.moveTo(w.x - 12, groundY - i * 10);
                        ctx.lineTo(w.x + 12, groundY - i * 10);
                        ctx.stroke();
                    }
                    ctx.strokeStyle = '#5A4A2A';
                    ctx.lineWidth = 2;
                    [w.x - 12, w.x + 12].forEach(wx => {
                        ctx.beginPath();
                        ctx.arc(wx, groundY, 5, 0, Math.PI * 2);
                        ctx.stroke();
                    });
                    break;
                }
                case 'fire': {
                    ctx.fillStyle = '#5A4A2A';
                    ctx.fillRect(w.x - 8, groundY - 12, 16, 12);
                    ctx.strokeStyle = '#AA8844';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(w.x + 8, groundY - 8);
                    ctx.lineTo(w.x + 20, groundY - 12);
                    ctx.stroke();
                    break;
                }
            }
            ctx.restore();
        }

        function fireWeapon(w, castleX, groundY) {
            const castleWallY = groundY - 80 - Math.random() * 50;
            shots++;

            switch (w.type) {
                case 'trebuchet':
                case 'mangonel': {
                    const dx = castleX - w.x;
                    const dy = castleWallY - w.y;
                    const speed = 5 + Math.random() * 2;
                    const t = dx / speed;
                    projectiles.push({
                        x: w.x, y: groundY - 35,
                        vx: speed, vy: dy / t - 0.15 * t / 2 * 60,
                        type: 'stone', size: w.type === 'trebuchet' ? 5 : 4,
                        damage: w.type === 'trebuchet' ? 5 : 3
                    });
                    break;
                }
                case 'ballista': {
                    const ang = Math.atan2(castleWallY - (groundY - 18), castleX - w.x);
                    projectiles.push({
                        x: w.x + 20, y: groundY - 18,
                        vx: 10 * Math.cos(ang), vy: 10 * Math.sin(ang),
                        type: 'bolt', size: 2, damage: 1.5
                    });
                    break;
                }
                case 'fire': {
                    for (let i = 0; i < 5; i++) {
                        const ang = Math.atan2(castleWallY - (groundY - 12), castleX - w.x) + (Math.random() - 0.5) * 0.3;
                        projectiles.push({
                            x: w.x + 20, y: groundY - 12,
                            vx: (6 + Math.random() * 2) * Math.cos(ang),
                            vy: (6 + Math.random() * 2) * Math.sin(ang),
                            type: 'flame', size: 3, damage: 0.3, life: 1.5
                        });
                    }
                    break;
                }
                case 'ram': {
                    gateHP = Math.max(0, gateHP - 3 - Math.random() * 2);
                    if (Math.random() < 0.5) {
                        gateCracks.push({
                            x: castleX + 20 + Math.random() * 20,
                            y: groundY - 20 - Math.random() * 30,
                            segs: Array.from({ length: 3 }, () => ({
                                x: (Math.random() - 0.5) * 10,
                                y: (Math.random() - 0.5) * 10
                            }))
                        });
                    }
                    effects.push({ x: castleX + 20, y: groundY - 25, type: 'impact', life: 0.5 });
                    break;
                }
                case 'tower': {
                    // Towers don't fire, they slowly approach
                    w.x += 0.5;
                    break;
                }
            }
        }

        let lastTime = 0;
        function animate(time) {
            const dt = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;

            const groundY = H * 0.78;
            const castleX = W * 0.75;

            // Sky
            const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
            skyGrad.addColorStop(0, '#1a0a15');
            skyGrad.addColorStop(0.3, '#2a1525');
            skyGrad.addColorStop(0.6, '#3a2530');
            skyGrad.addColorStop(1, '#4a3530');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, W, H);

            // Smoke haze
            if (shots > 10) {
                ctx.fillStyle = `rgba(60,50,40,${Math.min(0.2, shots * 0.003)})`;
                ctx.fillRect(0, 0, W, H);
            }

            // Ground
            ctx.fillStyle = '#3a4a22';
            ctx.fillRect(0, groundY, W, H - groundY);

            // Update weapons
            weapons.forEach(w => {
                w.cooldown -= dt;
                w.phase += dt;
                if (w.phase > Math.PI * 2) w.phase -= Math.PI * 2;

                if (w.cooldown <= 0 && w.fireRate > 0 && wallHP > 0) {
                    w.cooldown = w.fireRate + Math.random();
                    fireWeapon(w, castleX, groundY);
                }
                if (w.type === 'ram' && w.cooldown <= 0 && gateHP > 0) {
                    w.cooldown = 2;
                    fireWeapon(w, castleX, groundY);
                }
                if (w.type === 'tower') {
                    if (w.x < castleX - 30) w.x += 0.2;
                }
            });

            // Projectiles
            projectiles = projectiles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.type !== 'bolt') p.vy += 0.15;
                if (p.type === 'flame') {
                    p.life -= dt;
                    if (p.life <= 0) return false;
                }

                // Hit wall?
                if (p.x >= castleX && p.x <= castleX + 40 && p.y >= groundY - 130 && p.y <= groundY) {
                    wallHP = Math.max(0, wallHP - p.damage);
                    effects.push({ x: p.x, y: p.y, type: p.type === 'flame' ? 'fire' : 'impact', life: p.type === 'flame' ? 1.5 : 0.5 });

                    if (Math.random() < 0.3 && p.type !== 'flame') {
                        cracks.push({
                            x: p.x, y: p.y,
                            segs: Array.from({ length: 2 + Math.floor(Math.random() * 3) }, () => ({
                                x: (Math.random() - 0.5) * 15,
                                y: (Math.random() - 0.5) * 15
                            }))
                        });
                    }
                    return false;
                }

                if (p.y > groundY + 10 || p.x > W) return false;

                // Draw
                if (p.type === 'stone') {
                    ctx.fillStyle = '#888';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.type === 'bolt') {
                    ctx.strokeStyle = '#ccc';
                    ctx.lineWidth = 2;
                    const ang = Math.atan2(p.vy, p.vx);
                    ctx.beginPath();
                    ctx.moveTo(p.x - 8 * Math.cos(ang), p.y - 8 * Math.sin(ang));
                    ctx.lineTo(p.x + 8 * Math.cos(ang), p.y + 8 * Math.sin(ang));
                    ctx.stroke();
                } else if (p.type === 'flame') {
                    ctx.fillStyle = `rgba(255,${100 + Math.random() * 100},0,${p.life * 0.6})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size + Math.random() * 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                return true;
            });

            // Effects
            effects = effects.filter(e => {
                e.life -= dt;
                if (e.life <= 0) return false;
                if (e.type === 'impact') {
                    ctx.fillStyle = `rgba(150,120,80,${e.life})`;
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.arc(e.x + (Math.random() - 0.5) * 10, e.y + (Math.random() - 0.5) * 10,
                            2 + Math.random() * 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else if (e.type === 'fire') {
                    for (let i = 0; i < 3; i++) {
                        ctx.fillStyle = `rgba(255,${80 + Math.random() * 80},0,${e.life * 0.4})`;
                        ctx.beginPath();
                        ctx.arc(e.x + (Math.random() - 0.5) * 8, e.y - Math.random() * 15,
                            3 + Math.random() * 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                return true;
            });

            drawCastle(castleX, groundY);
            weapons.forEach(w => drawWeapon(w, groundY));

            // Victory/defeat
            if (wallHP <= 0 && gateHP <= 0) {
                ctx.fillStyle = 'rgba(138,154,91,0.5)';
                ctx.font = 'bold 32px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('CASTLE FALLEN!', W / 2, H * 0.2);
                ctx.font = '16px sans-serif';
                ctx.fillText(`${shots} shots fired with ${weapons.length} weapons`, W / 2, H * 0.2 + 30);
                ctx.textAlign = 'left';
            }

            // UI updates
            document.getElementById('wallHP').textContent = Math.max(0, wallHP).toFixed(0) + '%';
            document.getElementById('gateHP').textContent = Math.max(0, gateHP).toFixed(0) + '%';
            document.getElementById('weaponCount').textContent = weapons.length;
            document.getElementById('shotsCount').textContent = shots;

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 16px sans-serif';
            ctx.fillText('Siege Warfare Sandbox', W * 0.35, 30);

            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
