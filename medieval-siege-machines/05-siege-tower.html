<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siege Tower Assault - Medieval Siege Machines</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 15px; display: flex; gap: 20px;
            align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .control-group label { color: #DDA15E; font-size: 0.75rem; text-transform: uppercase; }
        .control-group input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        .control-group .value { color: #FEFAE0; font-size: 0.8rem; font-weight: bold; }
        button {
            background: linear-gradient(135deg, #8A9A5B, #606C38); color: #FEFAE0;
            border: none; padding: 10px 24px; border-radius: 10px; cursor: pointer;
            font-size: 0.9rem; font-weight: bold;
        }
        button:hover { transform: scale(1.05); }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); padding: 12px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 220px;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; }
        .info p { line-height: 1.4; opacity: 0.85; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Siege Tower Assault</h3>
        <p>Roll the tower to the castle wall. Match tower height to wall height. Drawbridge drops when close enough. Watch for defenders!</p>
        <div id="stats"></div>
    </div>
    <div class="controls">
        <div class="control-group">
            <label>Tower Height (m)</label>
            <input type="range" id="towerH" min="10" max="40" value="25" step="1">
            <span class="value" id="towerHVal">25</span>
        </div>
        <div class="control-group">
            <label>Wall Height (m)</label>
            <input type="range" id="wallH" min="10" max="35" value="20" step="1">
            <span class="value" id="wallHVal">20</span>
        </div>
        <div class="control-group">
            <label>Push Force</label>
            <input type="range" id="pushForce" min="1" max="10" value="5" step="1">
            <span class="value" id="pushForceVal">5</span>
        </div>
        <button id="advanceBtn">ADVANCE!</button>
        <button id="resetBtn">Reset</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        let state = 'ready';
        let towerX = 0;
        let towerVel = 0;
        let bridgeAngle = 0;
        let soldiers = [];
        let arrows = [];
        let fires = [];
        let towerHP = 100;

        const els = {
            towerH: document.getElementById('towerH'),
            wallH: document.getElementById('wallH'),
            pushForce: document.getElementById('pushForce')
        };

        function getP() {
            return {
                towerH: +els.towerH.value,
                wallH: +els.wallH.value,
                pushForce: +els.pushForce.value
            };
        }

        function updateLabels() {
            document.getElementById('towerHVal').textContent = els.towerH.value;
            document.getElementById('wallHVal').textContent = els.wallH.value;
            document.getElementById('pushForceVal').textContent = els.pushForce.value;
        }
        Object.values(els).forEach(e => e.addEventListener('input', updateLabels));

        function advance() {
            if (state !== 'ready') return;
            state = 'advancing';
            towerVel = 0;
        }

        document.getElementById('advanceBtn').addEventListener('click', advance);
        document.getElementById('resetBtn').addEventListener('click', () => {
            state = 'ready'; towerX = 0; towerVel = 0; bridgeAngle = 0;
            soldiers = []; arrows = []; fires = []; towerHP = 100;
        });

        window.reset = function() {
            state = 'ready'; towerX = 0; towerVel = 0; bridgeAngle = 0;
            soldiers = []; arrows = []; fires = []; towerHP = 100;
        };

        function drawCastleWall(wallX, wallHP, groundY, p) {
            const wallPx = p.wallH * 5;
            const wallW = 50;

            ctx.fillStyle = '#5a5a5a';
            ctx.fillRect(wallX, groundY - wallPx, wallW, wallPx);

            // Stone texture
            ctx.strokeStyle = '#4a4a4a';
            ctx.lineWidth = 1;
            for (let row = 0; row < wallPx / 12; row++) {
                const y = groundY - wallPx + row * 12;
                ctx.beginPath();
                ctx.moveTo(wallX, y);
                ctx.lineTo(wallX + wallW, y);
                ctx.stroke();
                const offset = row % 2 === 0 ? 0 : wallW / 3;
                for (let col = 0; col < 3; col++) {
                    const x = wallX + offset + col * wallW / 2;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x, y + 12);
                    ctx.stroke();
                }
            }

            // Merlons
            for (let i = 0; i < 4; i++) {
                ctx.fillStyle = '#5a5a5a';
                ctx.fillRect(wallX + i * 14 - 3, groundY - wallPx - 12, 10, 12);
            }

            // Walkway extending inward
            ctx.fillStyle = '#4a4a4a';
            ctx.fillRect(wallX + wallW, groundY - wallPx, 30, 5);

            // Defenders
            for (let i = 0; i < 3; i++) {
                const dx = wallX + 5 + i * 18;
                const dy = groundY - wallPx - 20;
                ctx.fillStyle = '#AA3333';
                ctx.beginPath();
                ctx.arc(dx, dy, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#AA3333';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(dx, dy + 4);
                ctx.lineTo(dx, dy + 12);
                ctx.stroke();
            }

            return { wallPx, wallW };
        }

        function drawTower(tX, groundY, p) {
            const tH = p.towerH * 5;
            const tW = 60;
            const tY = groundY - tH;

            // Main structure
            ctx.fillStyle = '#5A4A2A';
            ctx.fillRect(tX, tY, tW, tH);

            // Horizontal planks
            ctx.strokeStyle = '#4A3A1A';
            ctx.lineWidth = 1;
            for (let i = 0; i < tH / 8; i++) {
                const y = tY + i * 8;
                ctx.beginPath();
                ctx.moveTo(tX, y);
                ctx.lineTo(tX + tW, y);
                ctx.stroke();
            }

            // Floors (multiple levels)
            const floors = Math.floor(p.towerH / 5);
            ctx.fillStyle = '#6B5B3A';
            for (let f = 1; f <= floors; f++) {
                const fy = tY + f * tH / (floors + 1);
                ctx.fillRect(tX, fy, tW, 3);
                // Window/arrow slit
                ctx.fillStyle = '#2a1a0a';
                ctx.fillRect(tX + tW / 2 - 3, fy + 5, 6, 12);
                ctx.fillStyle = '#6B5B3A';
            }

            // Wet hides (protection)
            ctx.fillStyle = 'rgba(70,60,40,0.5)';
            ctx.fillRect(tX - 2, tY, tW + 4, tH);

            // Top platform
            ctx.fillStyle = '#6B5B3A';
            ctx.fillRect(tX - 5, tY, tW + 10, 5);

            // Drawbridge from top
            if (bridgeAngle > 0) {
                ctx.save();
                ctx.translate(tX + tW, tY + 3);
                ctx.rotate(bridgeAngle);
                ctx.fillStyle = '#7B6B4A';
                ctx.fillRect(0, -3, 50, 6);
                // Railing
                ctx.strokeStyle = '#5A4A2A';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, -3);
                ctx.lineTo(50, -3);
                ctx.moveTo(0, -8);
                ctx.lineTo(50, -8);
                ctx.stroke();
                ctx.restore();
            }

            // Soldiers on top
            for (let i = 0; i < 4; i++) {
                const sx = tX + 8 + i * 14;
                const sy = tY - 8;
                ctx.fillStyle = '#8A9A5B';
                ctx.beginPath();
                ctx.arc(sx, sy, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#8A9A5B';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(sx, sy + 3);
                ctx.lineTo(sx, sy + 10);
                ctx.stroke();
            }

            // Wheels
            ctx.strokeStyle = '#5A4A2A';
            ctx.lineWidth = 3;
            const wheelPhase = towerX * 0.05;
            [tX + 10, tX + tW - 10].forEach(wx => {
                ctx.beginPath();
                ctx.arc(wx, groundY, 8, 0, Math.PI * 2);
                ctx.stroke();
                // Spokes
                for (let a = 0; a < 4; a++) {
                    const ang = wheelPhase + a * Math.PI / 2;
                    ctx.beginPath();
                    ctx.moveTo(wx, groundY);
                    ctx.lineTo(wx + 6 * Math.cos(ang), groundY + 6 * Math.sin(ang));
                    ctx.stroke();
                }
            });

            // Pushers at back
            if (state === 'advancing') {
                for (let i = 0; i < 6; i++) {
                    const px = tX - 15 - i * 8;
                    const py = groundY - 15;
                    ctx.fillStyle = '#8A9A5B';
                    ctx.beginPath();
                    ctx.arc(px, py - 8, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#8A9A5B';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(px, py - 5);
                    ctx.lineTo(px, py + 5);
                    ctx.moveTo(px, py);
                    ctx.lineTo(px + 8, py - 3);
                    ctx.stroke();
                }
            }

            return { tX, tY, tW, tH };
        }

        let lastTime = 0;
        function animate(time) {
            const dt = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;

            const p = getP();
            const groundY = H * 0.8;
            const wallX = W * 0.75;
            const startX = W * 0.08;

            // Sky - dawn colors
            const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.8);
            skyGrad.addColorStop(0, '#1a1025');
            skyGrad.addColorStop(0.4, '#2a1535');
            skyGrad.addColorStop(0.7, '#4a2535');
            skyGrad.addColorStop(1, '#6a3525');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, W, H);

            // Ground
            ctx.fillStyle = '#3a4a22';
            ctx.fillRect(0, groundY, W, H - groundY);

            // Moat
            ctx.fillStyle = '#2a3a5a';
            ctx.fillRect(wallX - 30, groundY, 25, 10);

            // Distance from wall
            const tX = startX + towerX;
            const distToWall = wallX - (tX + 60);

            // Physics
            if (state === 'advancing') {
                const friction = 0.5;
                const accel = p.pushForce * 0.3 - friction;
                towerVel += accel * dt;
                towerVel = Math.min(towerVel, p.pushForce * 0.8);
                towerX += towerVel;

                // Defender arrows (periodic)
                if (distToWall < 250 && Math.random() < 0.03) {
                    arrows.push({
                        x: wallX, y: groundY - p.wallH * 5 - 10,
                        vx: -3 - Math.random() * 3, vy: -1 + Math.random() * 2,
                        life: 1
                    });
                }

                // Fire (occasional)
                if (distToWall < 150 && Math.random() < 0.01) {
                    fires.push({
                        x: tX + Math.random() * 60,
                        y: groundY - p.towerH * 5 + Math.random() * p.towerH * 3,
                        life: 3
                    });
                }

                if (distToWall <= 5) {
                    towerVel = 0;
                    state = 'bridging';
                }
            }

            if (state === 'bridging') {
                bridgeAngle += dt * 0.8;
                if (bridgeAngle >= Math.PI / 2 * 0.85) {
                    bridgeAngle = Math.PI / 2 * 0.85;
                    state = 'assaulting';
                    // Send soldiers across
                    for (let i = 0; i < 8; i++) {
                        soldiers.push({
                            x: tX + 60 + i * 5,
                            y: groundY - p.towerH * 5 + 3,
                            targetX: wallX + 30 + Math.random() * 20,
                            speed: 0.5 + Math.random() * 0.5
                        });
                    }
                }
            }

            // Soldiers movement
            soldiers.forEach(s => {
                if (s.x < s.targetX) {
                    s.x += s.speed;
                }
            });

            // Arrows
            arrows = arrows.filter(a => {
                a.x += a.vx;
                a.y += a.vy;
                a.vy += 0.1;
                a.life -= dt * 0.3;
                return a.life > 0 && a.x > 0;
            });

            // Fires
            fires = fires.filter(f => {
                f.life -= dt * 0.5;
                return f.life > 0;
            });

            const wallData = drawCastleWall(wallX, 100, groundY, p);
            const towerData = drawTower(tX, groundY, p);

            // Arrows rendering
            arrows.forEach(a => {
                ctx.strokeStyle = `rgba(200,180,140,${a.life})`;
                ctx.lineWidth = 2;
                const angle = Math.atan2(a.vy, a.vx);
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(a.x - 12 * Math.cos(angle), a.y - 12 * Math.sin(angle));
                ctx.stroke();
            });

            // Fire rendering
            fires.forEach(f => {
                const a = f.life / 3;
                for (let i = 0; i < 3; i++) {
                    ctx.fillStyle = `rgba(255,${100 + i * 50},0,${a * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(
                        f.x + (Math.random() - 0.5) * 8,
                        f.y - i * 5 + (Math.random() - 0.5) * 4,
                        4 + Math.random() * 4, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
            });

            // Soldiers rendering
            soldiers.forEach(s => {
                ctx.fillStyle = '#8A9A5B';
                ctx.beginPath();
                ctx.arc(s.x, s.y - 5, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#8A9A5B';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(s.x, s.y - 2);
                ctx.lineTo(s.x, s.y + 6);
                ctx.stroke();
            });

            // Stats
            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = `
                <div style="margin-top:8px;color:#8A9A5B">Distance: ${Math.max(0, distToWall / 2).toFixed(0)} m</div>
                <div style="color:#DDA15E">Speed: ${(towerVel * 2).toFixed(1)} m/s</div>
                <div style="color:#FEFAE0;opacity:0.6">Height diff: ${(p.towerH - p.wallH > 0 ? '+' : '')}${p.towerH - p.wallH} m</div>
                <div style="color:${p.towerH >= p.wallH ? '#8A9A5B' : '#BC6C25'};font-size:0.7rem;margin-top:4px">
                    ${p.towerH >= p.wallH ? 'Tower clears wall' : 'WARNING: Tower too short!'}
                </div>
            `;

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 16px sans-serif';
            ctx.fillText('Siege Tower Assault', 80, 40);

            if (state === 'assaulting') {
                ctx.fillStyle = 'rgba(138,154,91,0.6)';
                ctx.font = 'bold 24px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('ASSAULT IN PROGRESS', W / 2, 80);
                ctx.textAlign = 'left';
            }

            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
