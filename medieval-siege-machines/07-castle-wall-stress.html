<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Wall Stress Analysis - Medieval Siege Machines</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 15px; display: flex; gap: 20px;
            align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .control-group label { color: #DDA15E; font-size: 0.75rem; text-transform: uppercase; }
        .control-group input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        .control-group .value { color: #FEFAE0; font-size: 0.8rem; font-weight: bold; }
        button {
            background: linear-gradient(135deg, #8A9A5B, #606C38); color: #FEFAE0;
            border: none; padding: 10px 24px; border-radius: 10px; cursor: pointer;
            font-size: 0.9rem; font-weight: bold;
        }
        button:hover { transform: scale(1.05); }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); padding: 12px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 250px;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; }
        .info p { line-height: 1.4; opacity: 0.85; }
        .legend { margin-top: 10px; }
        .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 0.75rem; }
        .legend-color { width: 12px; height: 12px; border-radius: 2px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Castle Wall Stress</h3>
        <p>Click on the wall to bombard it. Watch stress propagate through the masonry. Accumulated damage leads to structural failure.</p>
        <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background:#4a6a2a"></div>No stress</div>
            <div class="legend-item"><div class="legend-color" style="background:#8a8a2a"></div>Low stress</div>
            <div class="legend-item"><div class="legend-color" style="background:#aa6a1a"></div>Medium stress</div>
            <div class="legend-item"><div class="legend-color" style="background:#cc3333"></div>Critical</div>
        </div>
        <div id="stats" style="margin-top:8px"></div>
    </div>
    <div class="controls">
        <div class="control-group">
            <label>Projectile Mass (kg)</label>
            <input type="range" id="projMass" min="10" max="200" value="80" step="10">
            <span class="value" id="projMassVal">80</span>
        </div>
        <div class="control-group">
            <label>Wall Thickness (m)</label>
            <input type="range" id="wallThick" min="1" max="5" value="3" step="0.5">
            <span class="value" id="wallThickVal">3.0</span>
        </div>
        <div class="control-group">
            <label>Mortar Quality</label>
            <input type="range" id="mortarQ" min="1" max="10" value="6" step="1">
            <span class="value" id="mortarQVal">6</span>
        </div>
        <button id="resetBtn">Reset Wall</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            buildWall();
        }

        const ROWS = 20;
        const COLS = 12;
        let blocks = [];
        let projectiles = [];
        let debris = [];
        let totalDamage = 0;
        let impacts = 0;

        const els = {
            projMass: document.getElementById('projMass'),
            wallThick: document.getElementById('wallThick'),
            mortarQ: document.getElementById('mortarQ')
        };

        function getP() {
            return {
                projMass: +els.projMass.value,
                wallThick: +els.wallThick.value,
                mortarQ: +els.mortarQ.value
            };
        }

        function updateLabels() {
            document.getElementById('projMassVal').textContent = els.projMass.value;
            document.getElementById('wallThickVal').textContent = (+els.wallThick.value).toFixed(1);
            document.getElementById('mortarQVal').textContent = els.mortarQ.value;
        }
        Object.values(els).forEach(e => e.addEventListener('input', () => { updateLabels(); buildWall(); }));

        function buildWall() {
            blocks = [];
            const groundY = H * 0.85;
            const wallCenterX = W * 0.55;
            const p = getP();
            const bw = p.wallThick * 18;
            const bh = 18;
            const wallW = COLS * bw / COLS;

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const offset = r % 2 === 0 ? 0 : bw * 0.5 / COLS;
                    blocks.push({
                        x: wallCenterX - COLS * bw / (COLS * 2) + c * bw / COLS * (COLS / (COLS - 0.5)) + offset,
                        y: groundY - (r + 1) * bh,
                        w: bw / COLS * (COLS / (COLS - 0.5)) - 2,
                        h: bh - 2,
                        row: r, col: c,
                        stress: 0,
                        hp: 100,
                        destroyed: false,
                        color: `hsl(${30 + Math.random() * 15}, ${15 + Math.random() * 10}%, ${35 + Math.random() * 15}%)`
                    });
                }
            }
            totalDamage = 0;
            impacts = 0;
        }

        function bombardAt(x, y) {
            const p = getP();
            const speed = 8 + p.projMass * 0.02;

            const wallCenterX = W * 0.55;
            const startX = W * 0.1;
            const startY = H * 0.15;
            const dx = x - startX;
            const dy = y - startY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            projectiles.push({
                x: startX, y: startY,
                vx: (dx / dist) * speed,
                vy: (dy / dist) * speed,
                mass: p.projMass,
                size: 4 + p.projMass / 20,
                active: true
            });
        }

        canvas.addEventListener('click', (e) => {
            bombardAt(e.clientX, e.clientY);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            buildWall(); projectiles = []; debris = [];
            document.getElementById('stats').innerHTML = '';
        });

        window.reset = function() {
            buildWall(); projectiles = []; debris = [];
        };

        function propagateStress(hitRow, hitCol, force) {
            const p = getP();
            const dampening = p.mortarQ * 0.08;

            blocks.forEach(b => {
                if (b.destroyed) return;
                const dr = Math.abs(b.row - hitRow);
                const dc = Math.abs(b.col - hitCol);
                const dist = Math.sqrt(dr * dr + dc * dc);
                if (dist < 8) {
                    const stressAdd = force / (1 + dist * dampening);
                    b.stress = Math.min(100, b.stress + stressAdd);
                    b.hp = Math.max(0, b.hp - stressAdd * 0.5);
                    if (b.hp <= 0) {
                        b.destroyed = true;
                        for (let i = 0; i < 3; i++) {
                            debris.push({
                                x: b.x + b.w / 2,
                                y: b.y + b.h / 2,
                                vx: (Math.random() - 0.5) * 5,
                                vy: -2 - Math.random() * 4,
                                size: 3 + Math.random() * 4,
                                life: 1.5
                            });
                        }
                    }
                }
            });
        }

        resize();
        window.addEventListener('resize', resize);

        function stressColor(stress) {
            if (stress < 20) return `rgba(74,106,42,${0.3 + stress / 40})`;
            if (stress < 50) return `rgba(138,138,42,${0.5 + stress / 100})`;
            if (stress < 80) return `rgba(170,106,26,${0.6 + stress / 150})`;
            return `rgba(204,51,51,${0.7 + stress / 300})`;
        }

        let lastTime = 0;
        function animate(time) {
            const dt = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;

            const p = getP();
            const groundY = H * 0.85;

            // Sky
            ctx.fillStyle = '#12121e';
            ctx.fillRect(0, 0, W, H);

            // Ground
            ctx.fillStyle = '#3a4a22';
            ctx.fillRect(0, groundY, W, H - groundY);

            // Stress relaxation
            blocks.forEach(b => {
                if (!b.destroyed) {
                    b.stress *= 0.995;
                }
            });

            // Projectile physics
            projectiles = projectiles.filter(proj => {
                if (!proj.active) return false;
                proj.x += proj.vx;
                proj.y += proj.vy;
                proj.vy += 0.15;

                // Check block collision
                blocks.forEach(b => {
                    if (b.destroyed) return;
                    if (proj.x > b.x && proj.x < b.x + b.w &&
                        proj.y > b.y && proj.y < b.y + b.h) {
                        const force = proj.mass * Math.sqrt(proj.vx * proj.vx + proj.vy * proj.vy) * 0.3;
                        propagateStress(b.row, b.col, force);
                        totalDamage += force;
                        impacts++;
                        proj.active = false;

                        // Impact debris
                        for (let i = 0; i < 8; i++) {
                            debris.push({
                                x: proj.x, y: proj.y,
                                vx: (Math.random() - 0.5) * 8,
                                vy: -3 - Math.random() * 5,
                                size: 2 + Math.random() * 3,
                                life: 1
                            });
                        }
                    }
                });

                if (proj.y > groundY || proj.x > W || proj.x < 0) return false;

                // Draw projectile
                ctx.fillStyle = '#888';
                ctx.shadowColor = '#DDA15E';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, proj.size, 0, Math.PI * 2);
                ctx.fill();

                // Trail
                ctx.strokeStyle = 'rgba(221,161,94,0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(proj.x, proj.y);
                ctx.lineTo(proj.x - proj.vx * 3, proj.y - proj.vy * 3);
                ctx.stroke();
                ctx.shadowBlur = 0;

                return true;
            });

            // Draw wall blocks
            blocks.forEach(b => {
                if (b.destroyed) return;

                // Base stone color
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.w, b.h);

                // Stress overlay
                if (b.stress > 5) {
                    ctx.fillStyle = stressColor(b.stress);
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                }

                // Mortar lines
                ctx.strokeStyle = 'rgba(80,70,50,0.5)';
                ctx.lineWidth = 1;
                ctx.strokeRect(b.x, b.y, b.w, b.h);

                // Damage cracks
                if (b.hp < 60) {
                    ctx.strokeStyle = `rgba(30,20,10,${(100 - b.hp) / 100})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(b.x + b.w * 0.3, b.y);
                    ctx.lineTo(b.x + b.w * 0.5, b.y + b.h * 0.5);
                    ctx.lineTo(b.x + b.w * 0.7, b.y + b.h);
                    ctx.stroke();
                }
            });

            // Merlons at top
            const wallCenterX = W * 0.55;
            const bw = p.wallThick * 18;
            const topY = groundY - ROWS * 18;
            ctx.fillStyle = '#4a4a4a';
            for (let i = 0; i < 6; i++) {
                ctx.fillRect(wallCenterX - COLS * bw / (COLS * 2) + i * bw * 0.4 - 2, topY - 15, 12, 15);
            }

            // Debris
            debris = debris.filter(d => {
                d.x += d.vx;
                d.y += d.vy;
                d.vy += 0.2;
                d.life -= dt;
                if (d.life > 0) {
                    ctx.fillStyle = `rgba(100,80,60,${d.life})`;
                    ctx.fillRect(d.x, d.y, d.size, d.size);
                }
                return d.life > 0;
            });

            // Trebuchet (simplified) at left
            const trebX = W * 0.08;
            ctx.strokeStyle = '#6B5B3A';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(trebX - 15, groundY);
            ctx.lineTo(trebX, groundY - 40);
            ctx.lineTo(trebX + 15, groundY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(trebX - 20, groundY - 25);
            ctx.lineTo(trebX + 30, groundY - 35);
            ctx.stroke();
            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = '10px sans-serif';
            ctx.fillText('Click wall to bombard', trebX - 30, groundY + 15);

            // Stats
            const destroyed = blocks.filter(b => b.destroyed).length;
            const total = blocks.length;
            const integrity = ((total - destroyed) / total * 100).toFixed(1);
            const avgStress = blocks.filter(b => !b.destroyed).reduce((s, b) => s + b.stress, 0) / Math.max(1, total - destroyed);

            document.getElementById('stats').innerHTML = `
                <div style="margin-top:4px;color:#8A9A5B">Integrity: ${integrity}%</div>
                <div style="color:#DDA15E">Avg stress: ${avgStress.toFixed(1)}</div>
                <div style="color:#FEFAE0;opacity:0.6">Impacts: ${impacts}</div>
                <div style="color:#FEFAE0;opacity:0.6">Blocks destroyed: ${destroyed}/${total}</div>
            `;

            // Breach warning
            if (destroyed > total * 0.5) {
                ctx.fillStyle = `rgba(204,51,51,${0.3 + Math.sin(time * 0.005) * 0.2})`;
                ctx.font = 'bold 28px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('WALL BREACH IMMINENT', W / 2, H * 0.15);
                ctx.textAlign = 'left';
            }

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 16px sans-serif';
            ctx.fillText('Castle Wall Stress Analysis', W * 0.3, 30);

            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
