<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Pendulum Chaos — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Double Pendulum Chaos</h2><p>Lagrangian double pendulum integrated via RK4. Tiny initial differences explode into wildly different trajectories.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset (Random)</button>
  <label>Gravity <input id="g" type="range" min="0.1" max="3" step="0.05" value="1"></label>
  <label>Damping <input id="d" type="range" min="0" max="0.01" step="0.0005" value="0"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();
addEventListener('resize',resize);

const L1 = 140, L2 = 140, m1 = 1, m2 = 1;
let state = {t1: Math.PI/2, t2: Math.PI/2, w1: 0, w2: 0};
let trail = [];
const maxTrail = 1200;
let hue = 0;

function derivs(s, g){
  const {t1, t2, w1, w2} = s;
  const d = t1 - t2;
  const sd = Math.sin(d), cd = Math.cos(d);
  const den1 = (m1 + m2) * L1 - m2 * L1 * cd * cd;
  const den2 = (L2 / L1) * den1;
  const a1 = (m2 * L1 * w1 * w1 * sd * cd
            + m2 * g * Math.sin(t2) * cd
            + m2 * L2 * w2 * w2 * sd
            - (m1 + m2) * g * Math.sin(t1)) / den1;
  const a2 = (-m2 * L2 * w2 * w2 * sd * cd
            + (m1 + m2) * g * Math.sin(t1) * cd
            - (m1 + m2) * L1 * w1 * w1 * sd
            - (m1 + m2) * g * Math.sin(t2)) / den2;
  return {t1: w1, t2: w2, w1: a1, w2: a2};
}

function add(a, b, k){
  return {t1: a.t1 + b.t1*k, t2: a.t2 + b.t2*k, w1: a.w1 + b.w1*k, w2: a.w2 + b.w2*k};
}

function rk4(s, dt, g){
  const k1 = derivs(s, g);
  const k2 = derivs(add(s, k1, dt/2), g);
  const k3 = derivs(add(s, k2, dt/2), g);
  const k4 = derivs(add(s, k3, dt), g);
  return {
    t1: s.t1 + dt/6 * (k1.t1 + 2*k2.t1 + 2*k3.t1 + k4.t1),
    t2: s.t2 + dt/6 * (k1.t2 + 2*k2.t2 + 2*k3.t2 + k4.t2),
    w1: s.w1 + dt/6 * (k1.w1 + 2*k2.w1 + 2*k3.w1 + k4.w1),
    w2: s.w2 + dt/6 * (k1.w2 + 2*k2.w2 + 2*k3.w2 + k4.w2),
  };
}

function reset(){
  state = {
    t1: (Math.random()*2 - 1) * Math.PI,
    t2: (Math.random()*2 - 1) * Math.PI,
    w1: 0, w2: 0
  };
  trail = [];
  hue = Math.random() * 360;
}
reset();
document.getElementById('reset').onclick = reset;
canvas.addEventListener('click', reset);

function step(){
  const g = parseFloat(document.getElementById('g').value);
  const damp = parseFloat(document.getElementById('d').value);
  for (let i = 0; i < 4; i++){
    state = rk4(state, 0.05, g);
    state.w1 *= (1 - damp);
    state.w2 *= (1 - damp);
  }
}

function draw(){
  ctx.fillStyle = 'rgba(10,14,26,0.18)';
  ctx.fillRect(0,0,W,H);

  const cx = W/2, cy = H/2 - 40;
  const x1 = cx + L1 * Math.sin(state.t1);
  const y1 = cy + L1 * Math.cos(state.t1);
  const x2 = x1 + L2 * Math.sin(state.t2);
  const y2 = y1 + L2 * Math.cos(state.t2);

  trail.push({x: x2, y: y2, h: hue});
  hue = (hue + 0.6) % 360;
  if (trail.length > maxTrail) trail.shift();

  ctx.lineWidth = 2;
  for (let i = 1; i < trail.length; i++){
    const a = i / trail.length;
    ctx.strokeStyle = `hsla(${trail[i].h}, 90%, 60%, ${a})`;
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x, trail[i-1].y);
    ctx.lineTo(trail[i].x, trail[i].y);
    ctx.stroke();
  }

  ctx.strokeStyle = '#e8e6e1';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  ctx.fillStyle = '#fbbf24';
  ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#60a5fa';
  ctx.beginPath(); ctx.arc(x1, y1, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f87171';
  ctx.beginPath(); ctx.arc(x2, y2, 12, 0, Math.PI*2); ctx.fill();
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
