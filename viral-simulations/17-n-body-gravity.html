<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N-Body Gravity — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>N-Body Gravity</h2><p>~80 bodies pulling on each other via Newtonian gravity. Click to add a heavy body. Trails fade out.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset Disk</button>
  <label>Gravity G <input type="range" id="g" min="1" max="50" step="1" value="20"></label>
  <label>Trails <input type="range" id="trail" min="1" max="20" step="1" value="6"></label>
  <span style="font-size:12px;color:#cbd5e1">Click: add heavy body</span>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let bodies = [];
const N = 80;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);

function init(){
  bodies = [];
  // Central heavy body
  bodies.push({x: W/2, y: H/2, vx: 0, vy: 0, m: 800, r: 8, color: '#fbbf24', heavy:true});
  // Disk of bodies
  for(let i=0; i<N; i++){
    const a = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * Math.min(W,H)*0.35;
    const x = W/2 + Math.cos(a)*dist;
    const y = H/2 + Math.sin(a)*dist;
    // Orbital velocity (tangential)
    const G = 0.6;
    const v = Math.sqrt(G * 800 / dist);
    const vx = -Math.sin(a) * v;
    const vy = Math.cos(a) * v;
    const m = 1 + Math.random()*2;
    const hue = (a*180/Math.PI + 200) % 360;
    bodies.push({
      x, y, vx, vy, m,
      r: 1.5 + Math.sqrt(m),
      color: `hsl(${hue},80%,65%)`,
      heavy: false
    });
  }
}

document.getElementById('reset').addEventListener('click', init);

canvas.addEventListener('click', (e)=>{
  const rect = canvas.getBoundingClientRect();
  bodies.push({
    x: e.clientX - rect.left,
    y: e.clientY - rect.top,
    vx: 0, vy: 0,
    m: 200,
    r: 7,
    color: '#ef4444',
    heavy: true
  });
});

function step(){
  const G = parseFloat(document.getElementById('g').value) / 30;
  const dt = 0.7;
  const soft2 = 80; // softening squared

  // Compute accelerations
  const ax = new Float64Array(bodies.length);
  const ay = new Float64Array(bodies.length);

  for(let i=0; i<bodies.length; i++){
    for(let j=i+1; j<bodies.length; j++){
      const dx = bodies[j].x - bodies[i].x;
      const dy = bodies[j].y - bodies[i].y;
      const d2 = dx*dx + dy*dy + soft2;
      const d = Math.sqrt(d2);
      const f = G / (d2 * d);
      ax[i] += f * dx * bodies[j].m;
      ay[i] += f * dy * bodies[j].m;
      ax[j] -= f * dx * bodies[i].m;
      ay[j] -= f * dy * bodies[i].m;
    }
  }

  // Symplectic Euler
  for(let i=0; i<bodies.length; i++){
    const b = bodies[i];
    b.vx += ax[i] * dt;
    b.vy += ay[i] * dt;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
  }

  // Soft boundary - if too far, pull back gently or wrap
  for(const b of bodies){
    const dx = b.x - W/2, dy = b.y - H/2;
    const d = Math.hypot(dx, dy);
    const limit = Math.max(W,H);
    if(d > limit){
      // Reflect inward
      b.vx -= dx/d * 0.5;
      b.vy -= dy/d * 0.5;
    }
  }
}

function draw(){
  const trailAlpha = 1 - (parseFloat(document.getElementById('trail').value) / 25);
  ctx.fillStyle = `rgba(10,14,26,${(1-trailAlpha)*0.5 + 0.05})`;
  ctx.fillRect(0,0,W,H);

  for(const b of bodies){
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fillStyle = b.color;
    ctx.fill();
    if(b.heavy){
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r*2.5, 0, Math.PI*2);
      const grad = ctx.createRadialGradient(b.x,b.y,b.r*0.5, b.x,b.y,b.r*2.5);
      grad.addColorStop(0, b.color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.globalAlpha = 0.4;
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}

resize();
init();
loop();
</script>
</body>
</html>
