<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloth Tearing — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh;cursor:crosshair}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Cloth Tearing</h2><p>Verlet-integration cloth hangs from the top. Drag your mouse across it to slice constraints.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset Cloth</button>
  <label>Tear Radius <input type="range" id="tr" min="5" max="50" value="18"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); reset(); });

const COLS = 32, ROWS = 22;
const SPACING = 22;
const GRAVITY = 0.45;
const DAMP = 0.99;
const ITERS = 4;

let points = [];
let constraints = [];
let mouseX = -9999, mouseY = -9999, prevMX = -9999, prevMY = -9999;
let mouseDown = false;
let tearRadius = 18;

function reset(){
  points = [];
  constraints = [];
  const startX = W/2 - (COLS-1)*SPACING/2;
  const startY = 80;
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      points.push({
        x: startX + x*SPACING,
        y: startY + y*SPACING,
        px: startX + x*SPACING,
        py: startY + y*SPACING,
        pinned: y === 0 && (x % 3 === 0 || x === COLS-1)
      });
    }
  }
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const i = y*COLS + x;
      if(x < COLS-1){
        constraints.push({ a: i, b: i+1, len: SPACING, alive: true });
      }
      if(y < ROWS-1){
        constraints.push({ a: i, b: i+COLS, len: SPACING, alive: true });
      }
    }
  }
}
reset();

canvas.addEventListener('mousedown', e => { mouseDown = true; mouseX = e.clientX; mouseY = e.clientY; prevMX = mouseX; prevMY = mouseY; });
canvas.addEventListener('mousemove', e => { prevMX = mouseX; prevMY = mouseY; mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('touchstart', e => { mouseDown = true; const t = e.touches[0]; mouseX = t.clientX; mouseY = t.clientY; prevMX = mouseX; prevMY = mouseY; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchmove', e => { const t = e.touches[0]; prevMX = mouseX; prevMY = mouseY; mouseX = t.clientX; mouseY = t.clientY; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', () => { mouseDown = false; });

document.getElementById('reset').addEventListener('click', reset);
document.getElementById('tr').addEventListener('input', e => tearRadius = parseInt(e.target.value));

function step(){
  // verlet integration
  for(const p of points){
    if(p.pinned) continue;
    const vx = (p.x - p.px) * DAMP;
    const vy = (p.y - p.py) * DAMP;
    p.px = p.x; p.py = p.y;
    p.x += vx; p.y += vy + GRAVITY;
  }
  // satisfy constraints
  for(let it=0; it<ITERS; it++){
    for(const c of constraints){
      if(!c.alive) continue;
      const a = points[c.a], b = points[c.b];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if(d === 0) continue;
      const diff = (d - c.len) / d;
      // tear if stretched too far
      if(d > c.len * 4){ c.alive = false; continue; }
      const offX = dx * 0.5 * diff;
      const offY = dy * 0.5 * diff;
      if(!a.pinned){ a.x += offX; a.y += offY; }
      if(!b.pinned){ b.x -= offX; b.y -= offY; }
    }
  }
  // tear with mouse
  if(mouseDown){
    const r2 = tearRadius*tearRadius;
    for(const c of constraints){
      if(!c.alive) continue;
      const a = points[c.a], b = points[c.b];
      const mx = (a.x + b.x) * 0.5;
      const my = (a.y + b.y) * 0.5;
      const dx = mx - mouseX, dy = my - mouseY;
      if(dx*dx + dy*dy < r2){ c.alive = false; }
    }
  }
}

function draw(){
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  for(const c of constraints){
    if(!c.alive) continue;
    const a = points[c.a], b = points[c.b];
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
  }
  ctx.stroke();
  // pinned points
  ctx.fillStyle = '#ef4444';
  for(const p of points){
    if(p.pinned){
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
      ctx.fill();
    }
  }
  // tear cursor
  if(mouseDown){
    ctx.strokeStyle = 'rgba(251, 191, 36, 0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, tearRadius, 0, Math.PI*2);
    ctx.stroke();
  }
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
