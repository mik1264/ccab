<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake AI — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:140px;accent-color:#fbbf24}
  .stats{position:fixed;top:60px;left:12px;background:rgba(0,0,0,0.55);padding:8px 12px;border-radius:8px;font-size:13px;color:#e8e6e1;border:1px solid rgba(255,255,255,0.08)}
  .stats span{color:#fbbf24;font-weight:700}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Snake AI</h2><p>BFS pathfinding to food with self-avoidance. Falls back to random safe move when stuck.</p></div>
<div class="stats">Length: <span id="len">1</span> · Score: <span id="score">0</span> · Best: <span id="best">0</span></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="restart">Restart</button>
  <label>Speed <input type="range" id="speed" min="1" max="60" value="20"></label>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,COLS,ROWS,CELL;
function resize(){
  W=canvas.width=innerWidth;H=canvas.height=innerHeight;
  CELL=Math.max(14,Math.min(28,Math.floor(Math.min(W,H)/30)));
  COLS=Math.floor(W/CELL);ROWS=Math.floor(H/CELL);
}
resize();addEventListener('resize',()=>{resize();initGame()});

let snake,dir,food,score=0,best=0,alive=true;

function initGame(){
  const cx=Math.floor(COLS/2),cy=Math.floor(ROWS/2);
  snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir={x:1,y:0};
  placeFood();
  score=0;alive=true;
}

function placeFood(){
  const occ=new Set(snake.map(s=>s.x+','+s.y));
  const free=[];
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) if(!occ.has(x+','+y)) free.push({x,y});
  if(free.length===0){alive=false;return}
  food=free[Math.floor(Math.random()*free.length)];
}

function bfs(start,goal,obstacles){
  const visited=new Array(COLS*ROWS).fill(false);
  const parent=new Array(COLS*ROWS).fill(-1);
  const idx=(x,y)=>y*COLS+x;
  const q=[idx(start.x,start.y)];
  visited[idx(start.x,start.y)]=true;
  let head=0;
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  while(head<q.length){
    const cur=q[head++];
    const cx=cur%COLS,cy=Math.floor(cur/COLS);
    if(cx===goal.x&&cy===goal.y){
      const path=[];let n=cur;
      while(n!==idx(start.x,start.y)){
        const px=n%COLS,py=Math.floor(n/COLS);
        path.unshift({x:px,y:py});
        n=parent[n];
      }
      return path;
    }
    for(const[dx,dy]of dirs){
      const nx=cx+dx,ny=cy+dy;
      if(nx<0||nx>=COLS||ny<0||ny>=ROWS) continue;
      const ni=idx(nx,ny);
      if(visited[ni]) continue;
      if(obstacles.has(nx+','+ny)) continue;
      visited[ni]=true;parent[ni]=cur;q.push(ni);
    }
  }
  return null;
}

function chooseMove(){
  const head=snake[0];
  // body cells (excluding tail since tail will move) - use full body for safety margin
  const body=new Set(snake.slice(0,-1).map(s=>s.x+','+s.y));
  // BFS to food
  let path=bfs(head,food,body);
  if(path&&path.length>0){
    // Verify after eating, head can still reach tail (safety check)
    // simulate
    const newSnake=[path[0],...snake];
    if(path[0].x===food.x&&path[0].y===food.y){
      // grew - check if from new head we can still reach new tail
      const newBody=new Set(newSnake.slice(1,-1).map(s=>s.x+','+s.y));
      const tail=newSnake[newSnake.length-1];
      if(bfs(newSnake[0],tail,newBody)){
        return {x:path[0].x-head.x,y:path[0].y-head.y};
      }
    } else {
      return {x:path[0].x-head.x,y:path[0].y-head.y};
    }
  }
  // fallback: follow tail
  const tail=snake[snake.length-1];
  const bodyNoTail=new Set(snake.slice(0,-1).map(s=>s.x+','+s.y));
  const tailPath=bfs(head,tail,bodyNoTail);
  if(tailPath&&tailPath.length>0){
    return {x:tailPath[0].x-head.x,y:tailPath[0].y-head.y};
  }
  // last resort: any safe move
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  const occ=new Set(snake.map(s=>s.x+','+s.y));
  for(const[dx,dy]of dirs.sort(()=>Math.random()-0.5)){
    const nx=head.x+dx,ny=head.y+dy;
    if(nx<0||nx>=COLS||ny<0||ny>=ROWS) continue;
    if(occ.has(nx+','+ny)) continue;
    return {x:dx,y:dy};
  }
  return null;
}

function step(){
  if(!alive) return;
  const move=chooseMove();
  if(!move){alive=false;return}
  dir=move;
  const head=snake[0];
  const newHead={x:head.x+dir.x,y:head.y+dir.y};
  if(newHead.x<0||newHead.x>=COLS||newHead.y<0||newHead.y>=ROWS){alive=false;return}
  if(snake.some((s,i)=>i<snake.length-1&&s.x===newHead.x&&s.y===newHead.y)){alive=false;return}
  snake.unshift(newHead);
  if(newHead.x===food.x&&newHead.y===food.y){
    score++;
    placeFood();
  } else {
    snake.pop();
  }
}

function draw(){
  ctx.fillStyle='#0a0e1a';ctx.fillRect(0,0,W,H);
  const offX=(W-COLS*CELL)/2,offY=(H-ROWS*CELL)/2;
  // grid bg
  ctx.fillStyle='#0f1729';
  ctx.fillRect(offX,offY,COLS*CELL,ROWS*CELL);
  ctx.strokeStyle='rgba(251,191,36,0.15)';ctx.lineWidth=1;
  for(let i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(offX+i*CELL,offY);ctx.lineTo(offX+i*CELL,offY+ROWS*CELL);ctx.stroke()}
  for(let i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(offX,offY+i*CELL);ctx.lineTo(offX+COLS*CELL,offY+i*CELL);ctx.stroke()}
  // food
  ctx.fillStyle='#ef4444';
  ctx.beginPath();
  ctx.arc(offX+food.x*CELL+CELL/2,offY+food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2);
  ctx.fill();
  // snake
  snake.forEach((s,i)=>{
    const t=i/snake.length;
    const r=Math.round(251*(1-t)+96*t);
    const g=Math.round(191*(1-t)+165*t);
    const b=Math.round(36*(1-t)+250*t);
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(offX+s.x*CELL+1,offY+s.y*CELL+1,CELL-2,CELL-2);
  });
  // head accent
  if(snake.length>0){
    ctx.fillStyle='#0a0e1a';
    const h=snake[0];
    ctx.fillRect(offX+h.x*CELL+CELL/3,offY+h.y*CELL+CELL/3,CELL/4,CELL/4);
  }
  if(!alive){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fbbf24';ctx.font='bold 32px sans-serif';ctx.textAlign='center';
    ctx.fillText('Restarting...',W/2,H/2);
    ctx.textAlign='start';
  }
}

let acc=0,lastT=performance.now();
function loop(t){
  const dt=t-lastT;lastT=t;
  const speed=parseInt(document.getElementById('speed').value);
  const interval=1000/speed;
  acc+=dt;
  while(acc>interval){step();acc-=interval}
  if(!alive){
    setTimeout(()=>{best=Math.max(best,score);initGame()},800);
    alive=null; // prevent multi-trigger
  }
  document.getElementById('len').textContent=snake?snake.length:0;
  document.getElementById('score').textContent=score;
  document.getElementById('best').textContent=best;
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('restart').onclick=()=>{best=Math.max(best,score);initGame()};

initGame();
requestAnimationFrame(loop);
</script>
</body>
</html>
