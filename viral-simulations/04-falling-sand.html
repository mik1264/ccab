<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falling Sand — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh;cursor:crosshair}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls button.active{background:#10b981;color:#fff}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Falling Sand</h2><p>Click and drag to drop materials. Sand piles, water flows, fire burns sand, stone is static.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button class="mat active" data-mat="1">Sand</button>
  <button class="mat" data-mat="2">Water</button>
  <button class="mat" data-mat="3">Stone</button>
  <button class="mat" data-mat="4">Fire</button>
  <button id="clear">Clear</button>
  <label>Brush <input type="range" id="brush" min="2" max="20" value="6"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const CELL = 4;
let W, H, GW, GH;
let grid;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  const newGW = Math.floor(W/CELL);
  const newGH = Math.floor(H/CELL);
  const newGrid = new Uint8Array(newGW*newGH);
  if(grid){
    const cw = Math.min(GW, newGW);
    const ch = Math.min(GH, newGH);
    for(let y=0;y<ch;y++){
      for(let x=0;x<cw;x++){
        newGrid[y*newGW + x] = grid[y*GW + x];
      }
    }
  }
  grid = newGrid; GW = newGW; GH = newGH;
}
resize();
window.addEventListener('resize', resize);

// 0 empty, 1 sand, 2 water, 3 stone, 4 fire
const COLORS = {
  1: [240, 200, 110],
  2: [80, 150, 240],
  3: [120, 120, 130],
  4: [255, 100, 30]
};

let currentMat = 1;
let brush = 6;
let drawing = false;
let mx = 0, my = 0;

document.querySelectorAll('.mat').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.mat').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentMat = parseInt(b.dataset.mat);
  });
});
document.getElementById('clear').addEventListener('click', () => grid.fill(0));
document.getElementById('brush').addEventListener('input', e => brush = parseInt(e.target.value));

canvas.addEventListener('mousedown', e => { drawing = true; mx = e.clientX; my = e.clientY; });
canvas.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
window.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('touchstart', e => { drawing = true; const t = e.touches[0]; mx = t.clientX; my = t.clientY; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchmove', e => { const t = e.touches[0]; mx = t.clientX; my = t.clientY; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', () => drawing = false);

function spawn(){
  if(!drawing) return;
  const cx = Math.floor(mx/CELL), cy = Math.floor(my/CELL);
  for(let dy=-brush;dy<=brush;dy++){
    for(let dx=-brush;dx<=brush;dx++){
      if(dx*dx + dy*dy > brush*brush) continue;
      const x = cx+dx, y = cy+dy;
      if(x<0||x>=GW||y<0||y>=GH) continue;
      // sand/water/fire spawn sparsely; stone fills
      if(currentMat === 3){
        grid[y*GW + x] = 3;
      } else if(Math.random() < 0.5){
        grid[y*GW + x] = currentMat;
      }
    }
  }
}

function step(){
  // bottom-up to make falling natural; alternate left-right scan
  const lr = (Math.random() < 0.5);
  for(let y=GH-2;y>=0;y--){
    for(let i=0;i<GW;i++){
      const x = lr ? i : (GW-1-i);
      const idx = y*GW + x;
      const c = grid[idx];
      if(c === 0 || c === 3) continue;
      if(c === 1){ // sand
        const below = (y+1)*GW + x;
        if(grid[below] === 0 || grid[below] === 2){
          // swap
          grid[idx] = grid[below]; grid[below] = 1;
        } else {
          const dir = Math.random() < 0.5 ? -1 : 1;
          const bl = (y+1)*GW + x + dir;
          const br = (y+1)*GW + x - dir;
          if(x+dir>=0 && x+dir<GW && (grid[bl] === 0 || grid[bl] === 2)){
            grid[idx] = grid[bl]; grid[bl] = 1;
          } else if(x-dir>=0 && x-dir<GW && (grid[br] === 0 || grid[br] === 2)){
            grid[idx] = grid[br]; grid[br] = 1;
          }
        }
      } else if(c === 2){ // water
        const below = (y+1)*GW + x;
        if(grid[below] === 0){
          grid[idx] = 0; grid[below] = 2;
        } else {
          const dir = Math.random() < 0.5 ? -1 : 1;
          const bl = (y+1)*GW + x + dir;
          if(x+dir>=0 && x+dir<GW && grid[bl] === 0){
            grid[idx] = 0; grid[bl] = 2;
          } else {
            // sideways flow
            const sl = y*GW + x + dir;
            if(x+dir>=0 && x+dir<GW && grid[sl] === 0){
              grid[idx] = 0; grid[sl] = 2;
            } else {
              const sr = y*GW + x - dir;
              if(x-dir>=0 && x-dir<GW && grid[sr] === 0){
                grid[idx] = 0; grid[sr] = 2;
              }
            }
          }
        }
      } else if(c === 4){ // fire rises, burns sand
        // burn neighbors (sand)
        for(let dy=-1;dy<=1;dy++){
          for(let dx=-1;dx<=1;dx++){
            const xx = x+dx, yy = y+dy;
            if(xx<0||xx>=GW||yy<0||yy>=GH) continue;
            const ni = yy*GW + xx;
            if(grid[ni] === 1 && Math.random() < 0.04){
              grid[ni] = 4;
            } else if(grid[ni] === 2 && Math.random() < 0.6){
              // water extinguishes fire
              grid[idx] = 0;
            }
          }
        }
        // extinguish over time
        if(Math.random() < 0.04){ grid[idx] = 0; continue; }
        // rise
        if(y > 0){
          const above = (y-1)*GW + x;
          const dir = Math.random() < 0.5 ? -1 : 1;
          if(grid[above] === 0){
            grid[idx] = 0; grid[above] = 4;
          } else if(x+dir>=0 && x+dir<GW){
            const al = (y-1)*GW + x + dir;
            if(grid[al] === 0){ grid[idx] = 0; grid[al] = 4; }
          }
        } else {
          // top row, vanish
          if(Math.random() < 0.2) grid[idx] = 0;
        }
      }
    }
  }
}

const off = document.createElement('canvas');
let octx;
function ensureOff(){
  if(off.width !== GW || off.height !== GH){
    off.width = GW; off.height = GH;
    octx = off.getContext('2d');
  }
}

function draw(){
  ensureOff();
  const img = octx.createImageData(GW, GH);
  const d = img.data;
  for(let i=0;i<grid.length;i++){
    const c = grid[i];
    const j = i*4;
    if(c === 0){
      d[j]=10; d[j+1]=14; d[j+2]=26;
    } else {
      const col = COLORS[c];
      // little color variation for organic feel
      const v = (i*7 % 17) - 8;
      d[j] = Math.max(0, Math.min(255, col[0]+v));
      d[j+1] = Math.max(0, Math.min(255, col[1]+v));
      d[j+2] = Math.max(0, Math.min(255, col[2]+v));
    }
    d[j+3] = 255;
  }
  octx.putImageData(img, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(off, 0, 0, W, H);
}

function loop(){
  spawn();
  step();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
