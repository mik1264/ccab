<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schelling Segregation Model — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .info .stat{margin-top:6px;font-size:12px;color:#fbbf24}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info">
  <h2>Schelling Segregation</h2>
  <p>Each agent moves if fewer than the tolerance fraction of neighbors share its color. Mild preferences create stark segregation.</p>
  <div class="stat" id="stat">Segregation: -</div>
</div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset</button>
  <label>Tolerance <span id="tolVal">0.30</span><input id="tol" type="range" min="0" max="1" step="0.01" value="0.3"></label>
  <label>Empty %<span id="empVal">10</span><input id="emp" type="range" min="2" max="40" step="1" value="10"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();
addEventListener('resize',resize);

const COLS = 60, ROWS = 40;
let grid = new Int8Array(COLS*ROWS); // 0=empty, 1=A, 2=B
let empties = [];

function init(){
  const empPct = parseInt(document.getElementById('emp').value) / 100;
  empties = [];
  for (let i = 0; i < grid.length; i++){
    if (Math.random() < empPct){ grid[i] = 0; empties.push(i); }
    else grid[i] = Math.random() < 0.5 ? 1 : 2;
  }
}
init();

function neighbors(x, y){
  let same = 0, other = 0;
  const v = grid[y*COLS + x];
  if (v === 0) return {same:0, other:0};
  for (let dy = -1; dy <= 1; dy++){
    for (let dx = -1; dx <= 1; dx++){
      if (dx === 0 && dy === 0) continue;
      const nx = x + dx, ny = y + dy;
      if (nx<0||nx>=COLS||ny<0||ny>=ROWS) continue;
      const nv = grid[ny*COLS+nx];
      if (nv === 0) continue;
      if (nv === v) same++; else other++;
    }
  }
  return {same, other};
}

function step(){
  const tol = parseFloat(document.getElementById('tol').value);
  const moves = [];
  for (let y = 0; y < ROWS; y++){
    for (let x = 0; x < COLS; x++){
      const v = grid[y*COLS+x];
      if (v === 0) continue;
      const {same, other} = neighbors(x, y);
      const total = same + other;
      if (total === 0) continue;
      const frac = same / total;
      if (frac < tol) moves.push(y*COLS+x);
    }
  }
  // shuffle empties
  for (let i = empties.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [empties[i], empties[j]] = [empties[j], empties[i]];
  }
  // shuffle moves
  for (let i = moves.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [moves[i], moves[j]] = [moves[j], moves[i]];
  }
  let cnt = Math.min(moves.length, empties.length);
  for (let i = 0; i < cnt; i++){
    const from = moves[i], to = empties[i];
    grid[to] = grid[from];
    grid[from] = 0;
  }
  // rebuild empty list
  empties = [];
  for (let i = 0; i < grid.length; i++) if (grid[i] === 0) empties.push(i);
}

function segregationIndex(){
  let totalSame = 0, totalNeighbors = 0;
  for (let y = 0; y < ROWS; y++){
    for (let x = 0; x < COLS; x++){
      const v = grid[y*COLS+x];
      if (v === 0) continue;
      const {same, other} = neighbors(x, y);
      totalSame += same;
      totalNeighbors += same + other;
    }
  }
  return totalNeighbors === 0 ? 0 : totalSame / totalNeighbors;
}

let frame = 0;
function draw(){
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0,0,W,H);
  const s = Math.min(W / COLS, H / ROWS) * 0.95;
  const ox = (W - s * COLS) / 2;
  const oy = (H - s * ROWS) / 2;
  for (let y = 0; y < ROWS; y++){
    for (let x = 0; x < COLS; x++){
      const v = grid[y*COLS+x];
      if (v === 0) continue;
      ctx.fillStyle = v === 1 ? '#fbbf24' : '#60a5fa';
      ctx.fillRect(ox + x*s, oy + y*s, s-1, s-1);
    }
  }
}

function loop(){
  step();
  draw();
  if ((frame++ & 7) === 0){
    document.getElementById('stat').textContent =
      'Segregation: ' + (segregationIndex()*100).toFixed(1) + '%';
    document.getElementById('tolVal').textContent =
      parseFloat(document.getElementById('tol').value).toFixed(2);
    document.getElementById('empVal').textContent =
      document.getElementById('emp').value;
  }
  requestAnimationFrame(loop);
}
document.getElementById('reset').onclick = init;
document.getElementById('emp').addEventListener('change', init);
loop();
</script>
</body>
</html>
