<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charged Particles (Coulomb) - Viral Simulations - CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh;cursor:crosshair}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls button.active{background:#22c55e}
  .controls button.neg{background:#ef4444;color:#fff}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Charged Particles</h2><p>Coulomb's law F = kQ1Q2/r². Like charges repel, opposites attract. Watch ionic-crystal-like patterns emerge. Click to add particles.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <label>Strength <span id="kval">1.0</span>
    <input type="range" id="k" min="0.1" max="3" step="0.1" value="1">
  </label>
  <label>Damping <span id="dval">0.99</span>
    <input type="range" id="d" min="0.9" max="1" step="0.005" value="0.99">
  </label>
  <button id="addPos" class="active">Add +</button>
  <button id="addNeg" class="neg">Add −</button>
  <button id="reset">Reset</button>
</div>
<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W,H;
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  let particles = [];
  let trailCanvas = document.createElement('canvas');
  let tctx = trailCanvas.getContext('2d');
  function resizeTrail(){ trailCanvas.width = W; trailCanvas.height = H; tctx.fillStyle='#0a0e1a'; tctx.fillRect(0,0,W,H); }
  resizeTrail();
  window.addEventListener('resize', resizeTrail);

  let kStrength = 1.0;
  let damping = 0.99;
  let addCharge = 1;

  function init(){
    particles = [];
    const N = 80;
    for(let i=0;i<N;i++){
      particles.push({
        x: Math.random()*W,
        y: Math.random()*H,
        vx: (Math.random()-0.5)*40,
        vy: (Math.random()-0.5)*40,
        q: i<N/2 ? 1 : -1
      });
    }
    tctx.fillStyle='#0a0e1a';
    tctx.fillRect(0,0,W,H);
  }

  function step(dt){
    const k = 9000 * kStrength;
    const soft = 25;
    const N = particles.length;
    for(let i=0;i<N;i++){
      const a = particles[i];
      let fx = 0, fy = 0;
      for(let j=0;j<N;j++){
        if(i===j) continue;
        const b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const r2 = dx*dx + dy*dy + soft*soft;
        const r = Math.sqrt(r2);
        const f = k * a.q * b.q / r2;
        fx += f * dx / r;
        fy += f * dy / r;
      }
      a.vx += fx * dt;
      a.vy += fy * dt;
      a.vx *= damping;
      a.vy *= damping;
      // speed cap
      const sp = Math.hypot(a.vx,a.vy);
      const max = 600;
      if(sp>max){ a.vx *= max/sp; a.vy *= max/sp; }
    }
    for(const a of particles){
      a.x += a.vx*dt;
      a.y += a.vy*dt;
      if(a.x<8){ a.x = 8; a.vx = -a.vx*0.7; }
      if(a.x>W-8){ a.x = W-8; a.vx = -a.vx*0.7; }
      if(a.y<8){ a.y = 8; a.vy = -a.vy*0.7; }
      if(a.y>H-8){ a.y = H-8; a.vy = -a.vy*0.7; }
    }
  }

  function draw(){
    // fade trail
    tctx.fillStyle = 'rgba(10,14,26,0.08)';
    tctx.fillRect(0,0,W,H);
    for(const a of particles){
      tctx.fillStyle = a.q>0 ? 'rgba(251,191,36,0.5)' : 'rgba(56,189,248,0.5)';
      tctx.beginPath();
      tctx.arc(a.x,a.y,1.5,0,Math.PI*2);
      tctx.fill();
    }

    ctx.drawImage(trailCanvas,0,0);

    // particles
    for(const a of particles){
      const grad = ctx.createRadialGradient(a.x,a.y,0,a.x,a.y,12);
      if(a.q>0){
        grad.addColorStop(0,'rgba(251,191,36,1)');
        grad.addColorStop(1,'rgba(251,191,36,0)');
      } else {
        grad.addColorStop(0,'rgba(56,189,248,1)');
        grad.addColorStop(1,'rgba(56,189,248,0)');
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(a.x,a.y,12,0,Math.PI*2);
      ctx.fill();

      ctx.fillStyle = a.q>0 ? '#fff7d6' : '#dbeafe';
      ctx.beginPath();
      ctx.arc(a.x,a.y,3,0,Math.PI*2);
      ctx.fill();
    }
  }

  let last = performance.now();
  function loop(t){
    const dt = Math.min(0.03, (t-last)/1000);
    last = t;
    // sub-step for stability
    const sub = 3;
    for(let s=0;s<sub;s++) step(dt/sub);
    draw();
    requestAnimationFrame(loop);
  }

  canvas.addEventListener('click', e=>{
    particles.push({
      x: e.clientX, y: e.clientY,
      vx: 0, vy: 0,
      q: addCharge
    });
  });

  const posBtn = document.getElementById('addPos');
  const negBtn = document.getElementById('addNeg');
  posBtn.onclick = ()=>{ addCharge = 1; posBtn.classList.add('active'); negBtn.classList.remove('active'); };
  negBtn.onclick = ()=>{ addCharge = -1; negBtn.classList.add('active'); posBtn.classList.remove('active'); };
  document.getElementById('reset').onclick = init;

  const kIn = document.getElementById('k');
  kIn.oninput = ()=>{ kStrength = parseFloat(kIn.value); document.getElementById('kval').textContent = kStrength.toFixed(1); };
  const dIn = document.getElementById('d');
  dIn.oninput = ()=>{ damping = parseFloat(dIn.value); document.getElementById('dval').textContent = damping.toFixed(3); };

  init();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
