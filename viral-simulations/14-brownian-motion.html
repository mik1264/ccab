<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brownian Motion — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Brownian Motion</h2><p>A heavy pollen particle gets bumped by 500 invisible water molecules. Every elastic collision nudges it. The traced path is the resulting random walk.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Clear Trace</button>
  <label>Molecule Speed <span id="vVal">2.5</span><input id="v" type="range" min="0.5" max="6" step="0.1" value="2.5"></label>
  <label>Show Molecules <input id="show" type="checkbox" checked></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let trail; // offscreen canvas for trace
let trailCtx;
function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  if (!trail){
    trail = document.createElement('canvas');
    trailCtx = trail.getContext('2d');
  }
  trail.width = W; trail.height = H;
  trailCtx.fillStyle = '#0a0e1a';
  trailCtx.fillRect(0,0,W,H);
}
resize();
addEventListener('resize',resize);

const N = 500;
let mols = [];
const POLLEN_R = 22;
const MOL_R = 2;
const POLLEN_M = 800;
const MOL_M = 1;

let pollen;

function init(){
  mols = [];
  const baseV = parseFloat(document.getElementById('v').value);
  for (let i = 0; i < N; i++){
    const a = Math.random() * Math.PI * 2;
    mols.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: Math.cos(a) * baseV,
      vy: Math.sin(a) * baseV
    });
  }
  pollen = {x: W/2, y: H/2, vx: 0, vy: 0};
  trailCtx.fillStyle = '#0a0e1a';
  trailCtx.fillRect(0,0,W,H);
}
init();

function step(){
  const baseV = parseFloat(document.getElementById('v').value);

  // walls + move molecules
  for (const m of mols){
    m.x += m.vx; m.y += m.vy;
    if (m.x < MOL_R){ m.x = MOL_R; m.vx = -m.vx; }
    if (m.x > W-MOL_R){ m.x = W-MOL_R; m.vx = -m.vx; }
    if (m.y < MOL_R){ m.y = MOL_R; m.vy = -m.vy; }
    if (m.y > H-MOL_R){ m.y = H-MOL_R; m.vy = -m.vy; }

    // gentle re-normalization to baseV (so slider works smoothly)
    const sp = Math.hypot(m.vx, m.vy) || 0.0001;
    const target = baseV;
    const fact = 1 + (target/sp - 1) * 0.005;
    m.vx *= fact; m.vy *= fact;
  }

  // pollen movement
  pollen.x += pollen.vx;
  pollen.y += pollen.vy;
  pollen.vx *= 0.985;
  pollen.vy *= 0.985;
  if (pollen.x < POLLEN_R){ pollen.x = POLLEN_R; pollen.vx = -pollen.vx*0.6; }
  if (pollen.x > W-POLLEN_R){ pollen.x = W-POLLEN_R; pollen.vx = -pollen.vx*0.6; }
  if (pollen.y < POLLEN_R){ pollen.y = POLLEN_R; pollen.vy = -pollen.vy*0.6; }
  if (pollen.y > H-POLLEN_R){ pollen.y = H-POLLEN_R; pollen.vy = -pollen.vy*0.6; }

  // collisions molecules <-> pollen
  const minD = POLLEN_R + MOL_R;
  for (const m of mols){
    const dx = m.x - pollen.x, dy = m.y - pollen.y;
    const d2 = dx*dx + dy*dy;
    if (d2 < minD*minD && d2 > 0.0001){
      const d = Math.sqrt(d2);
      const nx = dx/d, ny = dy/d;
      // push molecule out
      const overlap = minD - d;
      m.x += nx * overlap;
      m.y += ny * overlap;
      // 1D elastic collision along normal
      const v1 = m.vx*nx + m.vy*ny;
      const v2 = pollen.vx*nx + pollen.vy*ny;
      const newV1 = ((MOL_M - POLLEN_M)*v1 + 2*POLLEN_M*v2) / (MOL_M + POLLEN_M);
      const newV2 = ((POLLEN_M - MOL_M)*v2 + 2*MOL_M*v1) / (MOL_M + POLLEN_M);
      m.vx += (newV1 - v1) * nx;
      m.vy += (newV1 - v1) * ny;
      pollen.vx += (newV2 - v2) * nx;
      pollen.vy += (newV2 - v2) * ny;
    }
  }
}

let lastX, lastY;
function drawTrail(){
  if (lastX === undefined){ lastX = pollen.x; lastY = pollen.y; }
  trailCtx.strokeStyle = '#fbbf24';
  trailCtx.lineWidth = 2;
  trailCtx.lineCap = 'round';
  trailCtx.beginPath();
  trailCtx.moveTo(lastX, lastY);
  trailCtx.lineTo(pollen.x, pollen.y);
  trailCtx.stroke();
  lastX = pollen.x; lastY = pollen.y;
}

function draw(){
  drawTrail();
  // copy trail
  ctx.drawImage(trail, 0, 0);

  // molecules
  if (document.getElementById('show').checked){
    ctx.fillStyle = 'rgba(96,165,250,0.5)';
    for (const m of mols){
      ctx.beginPath();
      ctx.arc(m.x, m.y, MOL_R, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // pollen
  const grad = ctx.createRadialGradient(pollen.x-5, pollen.y-5, 2, pollen.x, pollen.y, POLLEN_R);
  grad.addColorStop(0, '#fde68a');
  grad.addColorStop(1, '#b45309');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(pollen.x, pollen.y, POLLEN_R, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 2;
  ctx.stroke();

  document.getElementById('vVal').textContent =
    parseFloat(document.getElementById('v').value).toFixed(1);
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('reset').onclick = () => {
  trailCtx.fillStyle = '#0a0e1a';
  trailCtx.fillRect(0,0,W,H);
  lastX = pollen.x; lastY = pollen.y;
};
loop();
</script>
</body>
</html>
