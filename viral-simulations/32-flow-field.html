<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perlin Noise Flow Field — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Perlin Flow Field</h2><p>3000 particles drift through a noise-generated vector field. The field slowly evolves over time.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset</button>
  <label>Particles <input type="range" id="np" min="500" max="6000" value="3000" step="100"></label>
  <label>Scale <input type="range" id="scale" min="20" max="200" value="80"></label>
  <label>Speed <input type="range" id="speed" min="1" max="50" value="15"></label>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;ctx.fillStyle='#0a0e1a';ctx.fillRect(0,0,W,H)}resize();addEventListener('resize',resize);

// Perlin noise (classic Ken Perlin permutation)
const perm=new Uint8Array(512);
const p=new Uint8Array(256);
for(let i=0;i<256;i++) p[i]=i;
for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]]}
for(let i=0;i<512;i++) perm[i]=p[i&255];

function fade(t){return t*t*t*(t*(t*6-15)+10)}
function lerp(a,b,t){return a+(b-a)*t}
function grad(hash,x,y,z){
  const h=hash&15;
  const u=h<8?x:y;
  const v=h<4?y:(h===12||h===14?x:z);
  return ((h&1)===0?u:-u)+((h&2)===0?v:-v);
}
function noise3(x,y,z){
  const X=Math.floor(x)&255,Y=Math.floor(y)&255,Z=Math.floor(z)&255;
  x-=Math.floor(x);y-=Math.floor(y);z-=Math.floor(z);
  const u=fade(x),v=fade(y),w=fade(z);
  const A=perm[X]+Y,AA=perm[A]+Z,AB=perm[A+1]+Z;
  const B=perm[X+1]+Y,BA=perm[B]+Z,BB=perm[B+1]+Z;
  return lerp(
    lerp(
      lerp(grad(perm[AA],x,y,z),grad(perm[BA],x-1,y,z),u),
      lerp(grad(perm[AB],x,y-1,z),grad(perm[BB],x-1,y-1,z),u),v),
    lerp(
      lerp(grad(perm[AA+1],x,y,z-1),grad(perm[BA+1],x-1,y,z-1),u),
      lerp(grad(perm[AB+1],x,y-1,z-1),grad(perm[BB+1],x-1,y-1,z-1),u),v),
    w);
}

let particles=[];
function spawn(n){
  particles=[];
  for(let i=0;i<n;i++){
    particles.push({
      x:Math.random()*W,y:Math.random()*H,
      px:0,py:0,
      life:Math.random()*200+50,
      hue:160+Math.random()*100
    });
    particles[i].px=particles[i].x;particles[i].py=particles[i].y;
  }
}

function reset(){
  ctx.fillStyle='#0a0e1a';ctx.fillRect(0,0,W,H);
  spawn(parseInt(document.getElementById('np').value));
}

let t=0;
function step(){
  const scale=parseFloat(document.getElementById('scale').value);
  const speed=parseFloat(document.getElementById('speed').value)/15;
  // fade trails
  ctx.fillStyle='rgba(10,14,26,0.04)';
  ctx.fillRect(0,0,W,H);
  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    p.px=p.x;p.py=p.y;
    const a=noise3(p.x/scale,p.y/scale,t)*Math.PI*2.5;
    p.x+=Math.cos(a)*speed;
    p.y+=Math.sin(a)*speed;
    p.life--;
    if(p.x<0||p.x>W||p.y<0||p.y>H||p.life<=0){
      p.x=Math.random()*W;p.y=Math.random()*H;
      p.px=p.x;p.py=p.y;
      p.life=Math.random()*200+50;
    }
    const alpha=Math.min(1,p.life/100)*0.5;
    ctx.strokeStyle=`hsla(${p.hue},80%,60%,${alpha})`;
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(p.px,p.py);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
  }
  t+=0.002;
}

function loop(){
  step();
  requestAnimationFrame(loop);
}

document.getElementById('reset').onclick=reset;
document.getElementById('np').onchange=reset;

reset();loop();
</script>
</body>
</html>
