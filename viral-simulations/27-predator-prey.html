<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predator-Prey — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .info .stats{margin-top:8px;font-size:12px;color:#cbd5e1;font-family:monospace}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:140px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info">
  <h2>Predator-Prey</h2>
  <p>Spatial Lotka-Volterra: rabbits (green) reproduce; foxes (red) hunt rabbits and starve without food. Watch the oscillating populations.</p>
  <div class="stats">
    Rabbits = <span id="nrabbits">0</span><br>
    Foxes = <span id="nfoxes">0</span>
  </div>
</div>
<canvas id="c"></canvas>
<div class="controls">
  <label>Rabbit growth<input type="range" id="rgrow" min="0.001" max="0.02" step="0.001" value="0.008"></label>
  <label>Fox starvation<input type="range" id="fstarve" min="0.0005" max="0.01" step="0.0005" value="0.003"></label>
  <button id="reset">Reset</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = window.innerWidth, H = window.innerHeight;
function resize(){
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth+'px';
  canvas.style.height = window.innerHeight+'px';
  W = window.innerWidth; H = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let rabbits = [], foxes = [];
let rabbitGrowth = 0.008;
let foxStarve = 0.003;
const RABBIT_RADIUS = 4;
const FOX_RADIUS = 12; // hunting radius
const MAX_AGENTS = 3000;

function reset(){
  rabbits = [];
  foxes = [];
  for(let i=0;i<400;i++){
    rabbits.push({x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-0.5)*0.8, vy:(Math.random()-0.5)*0.8});
  }
  for(let i=0;i<150;i++){
    foxes.push({x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-0.5)*1.2, vy:(Math.random()-0.5)*1.2, energy:1.0});
  }
  history.length = 0;
}

document.getElementById('reset').onclick = reset;
document.getElementById('rgrow').oninput = e=>{ rabbitGrowth = parseFloat(e.target.value); };
document.getElementById('fstarve').oninput = e=>{ foxStarve = parseFloat(e.target.value); };
reset();

// spatial hash for fox-rabbit lookup
const CELL = 20;
function buildGrid(items){
  const map = new Map();
  for(let i=0;i<items.length;i++){
    const it = items[i];
    const cx = Math.floor(it.x/CELL);
    const cy = Math.floor(it.y/CELL);
    const k = cx + ',' + cy;
    if(!map.has(k)) map.set(k,[]);
    map.get(k).push(i);
  }
  return map;
}
function neighborsOf(map, x, y){
  const cx = Math.floor(x/CELL), cy = Math.floor(y/CELL);
  const res = [];
  for(let dx=-1;dx<=1;dx++) for(let dy=-1;dy<=1;dy++){
    const k = (cx+dx)+','+(cy+dy);
    const arr = map.get(k);
    if(arr) for(const i of arr) res.push(i);
  }
  return res;
}

const history = []; // {r, f}
const HISTORY_MAX = 300;

function update(){
  // build rabbit spatial map
  const rmap = buildGrid(rabbits);
  const eaten = new Set();

  // foxes: chase nearest rabbit, eat if close, lose energy
  for(let i=foxes.length-1;i>=0;i--){
    const f = foxes[i];
    f.energy -= foxStarve;
    // find prey
    const nb = neighborsOf(rmap, f.x, f.y);
    let bestD = Infinity, bestIdx = -1;
    for(const ri of nb){
      if(eaten.has(ri)) continue;
      const r = rabbits[ri];
      const dx = r.x - f.x, dy = r.y - f.y;
      const d2 = dx*dx + dy*dy;
      if(d2 < bestD){ bestD = d2; bestIdx = ri; }
    }
    if(bestIdx>=0 && bestD < FOX_RADIUS*FOX_RADIUS*4){
      const r = rabbits[bestIdx];
      const dx = r.x - f.x, dy = r.y - f.y;
      const d = Math.sqrt(bestD)+1e-6;
      f.vx += dx/d * 0.08;
      f.vy += dy/d * 0.08;
      if(bestD < 36){
        eaten.add(bestIdx);
        f.energy = Math.min(2.0, f.energy + 0.5);
        // reproduce on full belly
        if(f.energy > 1.5 && foxes.length < MAX_AGENTS){
          foxes.push({x:f.x+Math.random()*4-2, y:f.y+Math.random()*4-2, vx:(Math.random()-0.5)*1.2, vy:(Math.random()-0.5)*1.2, energy:0.8});
          f.energy -= 0.6;
        }
      }
    } else {
      // wander
      f.vx += (Math.random()-0.5)*0.15;
      f.vy += (Math.random()-0.5)*0.15;
    }
    // cap speed
    const sp = Math.sqrt(f.vx*f.vx + f.vy*f.vy);
    const max = 1.6;
    if(sp > max){ f.vx *= max/sp; f.vy *= max/sp; }
    f.x += f.vx; f.y += f.vy;
    if(f.x<0){f.x=0;f.vx*=-1;} else if(f.x>W){f.x=W;f.vx*=-1;}
    if(f.y<0){f.y=0;f.vy*=-1;} else if(f.y>H){f.y=H;f.vy*=-1;}
    if(f.energy<=0) foxes.splice(i,1);
  }

  // rabbits: wander + reproduce, remove eaten
  const newRabbits = [];
  for(let i=0;i<rabbits.length;i++){
    if(eaten.has(i)) continue;
    const r = rabbits[i];
    r.vx += (Math.random()-0.5)*0.2;
    r.vy += (Math.random()-0.5)*0.2;
    const sp = Math.sqrt(r.vx*r.vx + r.vy*r.vy);
    const max = 1.0;
    if(sp > max){ r.vx *= max/sp; r.vy *= max/sp; }
    r.x += r.vx; r.y += r.vy;
    if(r.x<0){r.x=0;r.vx*=-1;} else if(r.x>W){r.x=W;r.vx*=-1;}
    if(r.y<0){r.y=0;r.vy*=-1;} else if(r.y>H){r.y=H;r.vy*=-1;}
    newRabbits.push(r);
    if(Math.random() < rabbitGrowth && newRabbits.length+rabbits.length-i < MAX_AGENTS){
      newRabbits.push({x:r.x+Math.random()*6-3, y:r.y+Math.random()*6-3, vx:(Math.random()-0.5)*0.8, vy:(Math.random()-0.5)*0.8});
    }
  }
  rabbits = newRabbits;

  history.push({r: rabbits.length, f: foxes.length});
  if(history.length > HISTORY_MAX) history.shift();
}

function render(){
  ctx.fillStyle='#0a0e1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const dpr = devicePixelRatio;

  // rabbits
  ctx.fillStyle = '#34d399';
  for(const r of rabbits){
    ctx.beginPath();
    ctx.arc(r.x*dpr, r.y*dpr, RABBIT_RADIUS*dpr*0.7, 0, Math.PI*2);
    ctx.fill();
  }
  // foxes
  for(const f of foxes){
    const a = Math.max(0.4, Math.min(1, f.energy/1.5));
    ctx.fillStyle = `rgba(239, 68, 68, ${a})`;
    ctx.beginPath();
    ctx.arc(f.x*dpr, f.y*dpr, 4*dpr, 0, Math.PI*2);
    ctx.fill();
  }

  // chart bottom-right
  const cw = 280*dpr, ch = 110*dpr;
  const cx = canvas.width - cw - 16*dpr;
  const cy = canvas.height - ch - 80*dpr;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(cx, cy, cw, ch);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1*dpr;
  ctx.strokeRect(cx, cy, cw, ch);

  if(history.length > 1){
    let maxV = 1;
    for(const h of history){ if(h.r>maxV) maxV=h.r; if(h.f>maxV) maxV=h.f; }
    // rabbits line
    ctx.strokeStyle = '#34d399';
    ctx.lineWidth = 2*dpr;
    ctx.beginPath();
    for(let i=0;i<history.length;i++){
      const px = cx + (i/(HISTORY_MAX-1))*cw;
      const py = cy + ch - (history[i].r/maxV)*ch;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    // foxes line
    ctx.strokeStyle = '#ef4444';
    ctx.beginPath();
    for(let i=0;i<history.length;i++){
      const px = cx + (i/(HISTORY_MAX-1))*cw;
      const py = cy + ch - (history[i].f/maxV)*ch;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
  }
  ctx.fillStyle = '#cbd5e1';
  ctx.font = `${11*dpr}px sans-serif`;
  ctx.fillText('Population', cx+8*dpr, cy+16*dpr);
  ctx.fillStyle = '#34d399';
  ctx.fillText('rabbits', cx+8*dpr, cy+ch-20*dpr);
  ctx.fillStyle = '#ef4444';
  ctx.fillText('foxes', cx+70*dpr, cy+ch-20*dpr);

  document.getElementById('nrabbits').textContent = rabbits.length;
  document.getElementById('nfoxes').textContent = foxes.length;
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
