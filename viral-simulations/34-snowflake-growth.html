<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowflake Growth — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
  .controls span{color:#fbbf24;font-weight:600;font-size:12px}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Snowflake Growth</h2><p>Reiter's hexagonal cellular automaton: alpha (diffusion), beta (vapor), gamma (growth).</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Restart</button>
  <button id="toggle">Pause</button>
  <label>Beta (vapor) <input type="range" id="beta" min="30" max="80" value="40"></label>
  <span id="step">step: 0</span>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}resize();addEventListener('resize',()=>{resize();reset()});

// Hex grid via axial coords (q,r). We use a "doubled" rectangular array.
let R; // grid radius
let grid,frozen;
let alpha=1.0,beta=0.4,gamma=0.0001;
let stepCount=0,running=true;

// Six neighbors in axial coords
const NEIGH=[[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];

function inBounds(q,r){
  return Math.abs(q)<=R&&Math.abs(r)<=R&&Math.abs(q+r)<=R;
}
function idx(q,r){return (q+R)*(2*R+1)+(r+R)}

function reset(){
  R=Math.floor(Math.min(W,H)/2/Math.max(4,Math.floor(Math.min(W,H)/180)))-2;
  R=Math.max(40,Math.min(120,R));
  beta=parseInt(document.getElementById('beta').value)/100;
  alpha=2.0; // diffusion constant
  gamma=0.0001; // background addition
  grid=new Float32Array((2*R+1)*(2*R+1));
  frozen=new Uint8Array((2*R+1)*(2*R+1));
  for(let q=-R;q<=R;q++) for(let r=-R;r<=R;r++) if(inBounds(q,r)) grid[idx(q,r)]=beta;
  // seed center
  grid[idx(0,0)]=1;
  frozen[idx(0,0)]=1;
  stepCount=0;
}

function step(){
  // Reiter rule: cells with frozen neighbor are "boundary" (receptive)
  // u: not receptive, v: receptive
  const N=grid.length;
  const receptive=new Uint8Array(N);
  for(let q=-R;q<=R;q++){
    for(let r=-R;r<=R;r++){
      if(!inBounds(q,r)) continue;
      const i=idx(q,r);
      if(frozen[i]){receptive[i]=1;continue}
      for(const[dq,dr]of NEIGH){
        const nq=q+dq,nr=r+dr;
        if(!inBounds(nq,nr)) continue;
        if(frozen[idx(nq,nr)]){receptive[i]=1;break}
      }
    }
  }
  // Split into u (not receptive part) and v (receptive part)
  const u=new Float32Array(N),v=new Float32Array(N);
  for(let q=-R;q<=R;q++){
    for(let r=-R;r<=R;r++){
      if(!inBounds(q,r)) continue;
      const i=idx(q,r);
      if(receptive[i]){u[i]=0;v[i]=grid[i]+gamma}
      else{u[i]=grid[i];v[i]=0}
    }
  }
  // Diffuse u: u'(x) = u(x) + alpha/2 * ((avg of neighbors) - u(x))
  const newU=new Float32Array(N);
  for(let q=-R;q<=R;q++){
    for(let r=-R;r<=R;r++){
      if(!inBounds(q,r)) continue;
      const i=idx(q,r);
      let sum=0,cnt=0;
      for(const[dq,dr]of NEIGH){
        const nq=q+dq,nr=r+dr;
        if(!inBounds(nq,nr)){sum+=u[i];cnt++;continue}
        sum+=u[idx(nq,nr)];cnt++;
      }
      const avg=sum/cnt;
      newU[i]=u[i]+(alpha/2)*(avg-u[i]);
    }
  }
  // Combine: s' = newU + v
  for(let i=0;i<N;i++) grid[i]=newU[i]+v[i];
  // Freeze cells where s >= 1
  for(let q=-R;q<=R;q++){
    for(let r=-R;r<=R;r++){
      if(!inBounds(q,r)) continue;
      const i=idx(q,r);
      if(!frozen[i]&&grid[i]>=1) frozen[i]=1;
    }
  }
  stepCount++;
}

function draw(){
  ctx.fillStyle='#0a1530';ctx.fillRect(0,0,W,H);
  // hex size
  const hexSize=Math.min(W,H)/(2*R+2)/Math.sqrt(3)*1.05;
  const cx=W/2,cy=H/2;
  // sqrt(3) * size = hex width (flat-top horizontal)
  const sx=Math.sqrt(3)*hexSize;
  const sy=1.5*hexSize;
  for(let q=-R;q<=R;q++){
    for(let r=-R;r<=R;r++){
      if(!inBounds(q,r)) continue;
      const i=idx(q,r);
      const x=cx+sx*(q+r/2);
      const y=cy+sy*r;
      let v=grid[i];
      if(frozen[i]){
        const t=Math.min(1,v);
        const col=Math.floor(220+t*35);
        ctx.fillStyle=`rgb(${col-20},${col-5},255)`;
      } else {
        const t=Math.max(0,Math.min(1,(v-0.3)/0.7));
        ctx.fillStyle=`rgba(80,140,220,${t*0.4})`;
      }
      // draw hexagon (pointy-top)
      ctx.beginPath();
      for(let k=0;k<6;k++){
        const ang=Math.PI/3*k+Math.PI/6;
        const px=x+hexSize*Math.cos(ang);
        const py=y+hexSize*Math.sin(ang);
        if(k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.fill();
    }
  }
}

function loop(){
  if(running) step();
  draw();
  document.getElementById('step').textContent='step: '+stepCount;
  requestAnimationFrame(loop);
}

document.getElementById('reset').onclick=reset;
document.getElementById('toggle').onclick=e=>{running=!running;e.target.textContent=running?'Pause':'Resume'};
document.getElementById('beta').oninput=()=>reset();

reset();loop();
</script>
</body>
</html>
