<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Rockets — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh;cursor:grab}
  canvas:active{cursor:grabbing}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:280px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .info .stats{margin-top:8px;font-size:12px;color:#cbd5e1;font-family:monospace}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:140px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info">
  <h2>Smart Rockets</h2>
  <p>150 rockets with 300-step DNA evolve to reach the target. Drag the wall! Roulette selection, single-point crossover, mutation rate ~1.5%.</p>
  <div class="stats">
    Generation = <span id="gen">1</span><br>
    Best fitness = <span id="best">0</span><br>
    Reached = <span id="reached">0</span> / <span id="pop">150</span>
  </div>
</div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset</button>
  <label>Mutation %<input type="range" id="mut" min="0.1" max="8" step="0.1" value="1.5"></label>
  <label>Speed<input type="range" id="speed" min="1" max="5" step="1" value="1"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = window.innerWidth, H = window.innerHeight;
function resize(){
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W+'px';
  canvas.style.height = H+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  if(target){ target.x = W*0.5; target.y = H*0.15; }
}
window.addEventListener('resize', ()=>{ W=window.innerWidth; H=window.innerHeight; resize(); });

const POP = 150;
const GENOME_LENGTH = 300;
let mutationRate = 0.015;
let speedMul = 1;
let generation = 1;
let frameInGen = 0;
let bestFitnessOverall = 0;
let target = {x:0, y:0, r:14};
let wall = {x:0, y:0, w:280, h:18};
let rockets = [];

function rand(){ return Math.random()*2-1; }

function newGenome(){
  const g = new Float32Array(GENOME_LENGTH*2);
  for(let i=0;i<g.length;i++) g[i] = rand()*0.3;
  return g;
}

class Rocket{
  constructor(genome){
    this.genome = genome || newGenome();
    this.reset();
  }
  reset(){
    this.x = W*0.5;
    this.y = H*0.92;
    this.vx = 0; this.vy = 0;
    this.dead = false;
    this.reached = false;
    this.timeReached = GENOME_LENGTH;
    this.fitness = 0;
  }
  step(idx){
    if(this.dead || this.reached) return;
    const ax = this.genome[idx*2];
    const ay = this.genome[idx*2+1];
    this.vx += ax;
    this.vy += ay;
    const sp = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    const max = 4.5;
    if(sp > max){ this.vx *= max/sp; this.vy *= max/sp; }
    this.x += this.vx;
    this.y += this.vy;
    // wall collision
    if(this.x > wall.x && this.x < wall.x+wall.w && this.y > wall.y && this.y < wall.y+wall.h){
      this.dead = true;
    }
    // out of bounds
    if(this.x<0 || this.x>W || this.y<0 || this.y>H){
      this.dead = true;
    }
    // reached target
    const dx = this.x - target.x, dy = this.y - target.y;
    if(dx*dx + dy*dy < target.r*target.r){
      this.reached = true;
      this.timeReached = idx;
    }
  }
  computeFitness(){
    const dx = this.x - target.x, dy = this.y - target.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    let f = 1 / (d + 1);
    if(this.reached) f *= 10 + (GENOME_LENGTH - this.timeReached) * 0.1;
    if(this.dead) f *= 0.15;
    this.fitness = f;
    return f;
  }
}

function makeInitialPop(){
  rockets = [];
  for(let i=0;i<POP;i++) rockets.push(new Rocket());
}

function evolve(){
  // compute fitnesses
  let total = 0, best = 0;
  for(const r of rockets){ const f = r.computeFitness(); total += f; if(f>best) best = f; }
  if(best > bestFitnessOverall) bestFitnessOverall = best;

  // build mating pool weighted by fitness (roulette)
  const cum = new Float32Array(POP);
  let acc = 0;
  for(let i=0;i<POP;i++){ acc += rockets[i].fitness; cum[i] = acc; }

  function pickParent(){
    const r = Math.random()*acc;
    let lo=0, hi=POP-1;
    while(lo<hi){
      const mid = (lo+hi)>>1;
      if(cum[mid] < r) lo = mid+1; else hi = mid;
    }
    return rockets[lo];
  }

  const newRockets = [];
  for(let i=0;i<POP;i++){
    const p1 = pickParent();
    const p2 = pickParent();
    const child = new Float32Array(GENOME_LENGTH*2);
    const cut = (Math.random()*GENOME_LENGTH)|0;
    for(let j=0;j<GENOME_LENGTH;j++){
      const src = j < cut ? p1.genome : p2.genome;
      child[j*2] = src[j*2];
      child[j*2+1] = src[j*2+1];
      if(Math.random() < mutationRate){
        child[j*2] = rand()*0.3;
        child[j*2+1] = rand()*0.3;
      }
    }
    newRockets.push(new Rocket(child));
  }
  rockets = newRockets;
  generation++;
  frameInGen = 0;
}

document.getElementById('reset').onclick = ()=>{ generation=1; bestFitnessOverall=0; makeInitialPop(); frameInGen=0; };
document.getElementById('mut').oninput = e => { mutationRate = parseFloat(e.target.value)/100; };
document.getElementById('speed').oninput = e => { speedMul = parseInt(e.target.value); };

// drag wall
let dragging = false, dragOff = {x:0,y:0};
canvas.addEventListener('mousedown', e=>{
  const mx = e.clientX, my = e.clientY;
  if(mx > wall.x && mx < wall.x+wall.w && my > wall.y && my < wall.y+wall.h){
    dragging = true;
    dragOff.x = mx - wall.x;
    dragOff.y = my - wall.y;
  }
});
canvas.addEventListener('mousemove', e=>{
  if(dragging){
    wall.x = e.clientX - dragOff.x;
    wall.y = e.clientY - dragOff.y;
  }
});
window.addEventListener('mouseup', ()=>dragging=false);

resize();
wall.x = W*0.3;
wall.y = H*0.55;
makeInitialPop();

function step(){
  if(frameInGen >= GENOME_LENGTH){
    evolve();
    return;
  }
  for(const r of rockets) r.step(frameInGen);
  frameInGen++;
}

function render(){
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0,0,W,H);

  // wall
  ctx.fillStyle = '#475569';
  ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
  ctx.strokeStyle = 'rgba(251,191,36,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(wall.x, wall.y, wall.w, wall.h);

  // target
  const pulse = 1 + 0.15*Math.sin(performance.now()*0.005);
  const grad = ctx.createRadialGradient(target.x, target.y, 0, target.x, target.y, target.r*3*pulse);
  grad.addColorStop(0, 'rgba(251,191,36,0.9)');
  grad.addColorStop(1, 'rgba(251,191,36,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(target.x, target.y, target.r*3*pulse, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath();
  ctx.arc(target.x, target.y, target.r, 0, Math.PI*2);
  ctx.fill();

  // rockets
  let reachedCount = 0;
  for(const r of rockets){
    if(r.reached){
      reachedCount++;
      ctx.fillStyle = '#34d399';
    } else if(r.dead){
      ctx.fillStyle = 'rgba(239,68,68,0.35)';
    } else {
      ctx.fillStyle = 'rgba(96,165,250,0.85)';
    }
    const ang = Math.atan2(r.vy, r.vx);
    ctx.save();
    ctx.translate(r.x, r.y);
    ctx.rotate(ang);
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(-4, -3);
    ctx.lineTo(-4, 3);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  document.getElementById('gen').textContent = generation;
  document.getElementById('best').textContent = bestFitnessOverall.toFixed(3);
  document.getElementById('reached').textContent = reachedCount;
  document.getElementById('pop').textContent = POP;
}

function loop(){
  for(let s=0;s<speedMul;s++) step();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
