<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft Body Jelly — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Soft Body Jelly</h2><p>Mass-spring soft body: ring of points connected to each other and to a central node. Click and drag to throw it.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset</button>
  <label>Stiffness <input id="k" type="range" min="0.05" max="0.6" step="0.01" value="0.25"></label>
  <label>Damping <input id="damp" type="range" min="0.85" max="0.999" step="0.001" value="0.97"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();
addEventListener('resize',resize);

const N = 24;
const RADIUS = 90;
let points = [];
let springs = [];

function init(){
  points = [];
  springs = [];
  const cx = W/2, cy = H/3;
  for (let i = 0; i < N; i++){
    const a = (i / N) * Math.PI * 2;
    points.push({x: cx + Math.cos(a)*RADIUS, y: cy + Math.sin(a)*RADIUS, vx: 0, vy: 0, fx:0, fy:0});
  }
  // center
  points.push({x: cx, y: cy, vx: 0, vy: 0, fx:0, fy:0, center: true});
  const C = N;
  // Outer ring springs (each to next + skip-1)
  for (let i = 0; i < N; i++){
    const j = (i+1) % N;
    const k = (i+2) % N;
    const dx = points[i].x - points[j].x, dy = points[i].y - points[j].y;
    const dx2 = points[i].x - points[k].x, dy2 = points[i].y - points[k].y;
    springs.push({a:i, b:j, rest: Math.hypot(dx, dy)});
    springs.push({a:i, b:k, rest: Math.hypot(dx2, dy2)});
    // each outer to center
    const dxc = points[i].x - points[C].x, dyc = points[i].y - points[C].y;
    springs.push({a:i, b:C, rest: Math.hypot(dxc, dyc)});
  }
}
init();

let dragging = false, dragIdx = -1, lastX = 0, lastY = 0;
canvas.addEventListener('mousedown', e => {
  let best = -1, bestD = 40;
  for (let i = 0; i < points.length; i++){
    const d = Math.hypot(points[i].x - e.clientX, points[i].y - e.clientY);
    if (d < bestD){ bestD = d; best = i; }
  }
  if (best === -1){
    // grab nearest anyway
    let md = Infinity;
    for (let i = 0; i < points.length; i++){
      const d = Math.hypot(points[i].x - e.clientX, points[i].y - e.clientY);
      if (d < md){ md = d; best = i; }
    }
  }
  dragging = true; dragIdx = best;
  lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener('mousemove', e => {
  if (dragging && dragIdx >= 0){
    const p = points[dragIdx];
    p.x = e.clientX; p.y = e.clientY;
    p.vx = (e.clientX - lastX) * 0.5;
    p.vy = (e.clientY - lastY) * 0.5;
    lastX = e.clientX; lastY = e.clientY;
  }
});
canvas.addEventListener('mouseup', () => { dragging = false; dragIdx = -1; });
canvas.addEventListener('mouseleave', () => { dragging = false; dragIdx = -1; });

document.getElementById('reset').onclick = init;

function step(){
  const k = parseFloat(document.getElementById('k').value);
  const damp = parseFloat(document.getElementById('damp').value);
  const g = 0.35;

  for (const p of points){ p.fx = 0; p.fy = g; }

  for (const s of springs){
    const a = points[s.a], b = points[s.b];
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.hypot(dx, dy) || 0.0001;
    const diff = (dist - s.rest) / dist;
    const fx = k * dx * diff;
    const fy = k * dy * diff;
    a.fx += fx; a.fy += fy;
    b.fx -= fx; b.fy -= fy;
  }

  for (let i = 0; i < points.length; i++){
    if (dragging && i === dragIdx) continue;
    const p = points[i];
    p.vx = (p.vx + p.fx) * damp;
    p.vy = (p.vy + p.fy) * damp;
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 10){ p.x = 10; p.vx = -p.vx * 0.6; }
    if (p.x > W-10){ p.x = W-10; p.vx = -p.vx * 0.6; }
    if (p.y < 10){ p.y = 10; p.vy = -p.vy * 0.6; }
    if (p.y > H-10){ p.y = H-10; p.vy = -p.vy * 0.6; }
  }
}

function draw(){
  ctx.fillStyle = 'rgba(10,14,26,0.35)';
  ctx.fillRect(0,0,W,H);

  // body fill
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < N; i++){
    const p0 = points[(i-1+N)%N], p1 = points[i], p2 = points[(i+1)%N];
    const mx = (p1.x + p2.x)/2, my = (p1.y + p2.y)/2;
    ctx.quadraticCurveTo(p1.x, p1.y, mx, my);
  }
  ctx.closePath();
  const c = points[N];
  const grad = ctx.createRadialGradient(c.x, c.y, 5, c.x, c.y, RADIUS*1.4);
  grad.addColorStop(0, 'rgba(251,191,36,0.85)');
  grad.addColorStop(1, 'rgba(244,63,94,0.45)');
  ctx.fillStyle = grad;
  ctx.fill();

  // springs (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  for (const s of springs){
    ctx.beginPath();
    ctx.moveTo(points[s.a].x, points[s.a].y);
    ctx.lineTo(points[s.b].x, points[s.b].y);
    ctx.stroke();
  }

  // outer points
  ctx.fillStyle = '#fbbf24';
  for (let i = 0; i < N; i++){
    ctx.beginPath();
    ctx.arc(points[i].x, points[i].y, 4, 0, Math.PI*2);
    ctx.fill();
  }
  // center
  ctx.fillStyle = '#f87171';
  ctx.beginPath();
  ctx.arc(c.x, c.y, 6, 0, Math.PI*2);
  ctx.fill();
}

function loop(){
  for (let i = 0; i < 2; i++) step();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
