<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self-Organizing Map — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
  .stats{position:fixed;top:60px;left:12px;background:rgba(0,0,0,0.55);padding:8px 12px;border-radius:8px;font-size:13px;color:#e8e6e1;border:1px solid rgba(255,255,255,0.08);font-family:monospace}
  .stats span{color:#fbbf24;font-weight:700}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Self-Organizing Map</h2><p>Kohonen 25x25 lattice trained on random RGB colors. Watch a smooth color manifold emerge.</p></div>
<div class="stats">
  iter: <span id="iter">0</span><br>
  lr: <span id="lr">0.500</span><br>
  radius: <span id="rad">12.0</span>
</div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset</button>
  <button id="toggle">Pause</button>
  <label>Speed <input type="range" id="speed" min="1" max="200" value="40"></label>
  <label>Grid Size <input type="range" id="gs" min="15" max="50" value="25"></label>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}resize();addEventListener('resize',resize);

let GRID=25,nodes,iter=0,running=true;
const MAX_ITER=20000;
const LR0=0.5,RAD0=null;

function reset(){
  GRID=parseInt(document.getElementById('gs').value);
  nodes=new Float32Array(GRID*GRID*3);
  for(let i=0;i<nodes.length;i++) nodes[i]=Math.random();
  iter=0;
}

function step(){
  if(iter>=MAX_ITER) return;
  // pick random color
  const tr=Math.random(),tg=Math.random(),tb=Math.random();
  // find best matching unit (BMU)
  let bestI=0,bestD=Infinity;
  for(let i=0;i<GRID*GRID;i++){
    const r=nodes[i*3]-tr,g=nodes[i*3+1]-tg,b=nodes[i*3+2]-tb;
    const d=r*r+g*g+b*b;
    if(d<bestD){bestD=d;bestI=i}
  }
  const bx=bestI%GRID,by=Math.floor(bestI/GRID);
  // schedule
  const lr=LR0*Math.exp(-iter/(MAX_ITER*0.4));
  const rad0=GRID/2;
  const rad=rad0*Math.exp(-iter/(MAX_ITER*0.4));
  const rad2=rad*rad;
  // update neighborhood
  const irad=Math.ceil(rad*3)+1;
  for(let dy=-irad;dy<=irad;dy++){
    for(let dx=-irad;dx<=irad;dx++){
      const x=bx+dx,y=by+dy;
      if(x<0||x>=GRID||y<0||y>=GRID) continue;
      const dist2=dx*dx+dy*dy;
      const h=Math.exp(-dist2/(2*rad2));
      const i=(y*GRID+x)*3;
      nodes[i]+=lr*h*(tr-nodes[i]);
      nodes[i+1]+=lr*h*(tg-nodes[i+1]);
      nodes[i+2]+=lr*h*(tb-nodes[i+2]);
    }
  }
  iter++;
  document.getElementById('iter').textContent=iter;
  document.getElementById('lr').textContent=lr.toFixed(3);
  document.getElementById('rad').textContent=rad.toFixed(2);
}

function draw(){
  ctx.fillStyle='#0a0e1a';ctx.fillRect(0,0,W,H);
  const sz=Math.min(W-80,H-160);
  const cell=sz/GRID;
  const ox=(W-sz)/2,oy=(H-sz)/2-20;
  for(let y=0;y<GRID;y++){
    for(let x=0;x<GRID;x++){
      const i=(y*GRID+x)*3;
      const r=Math.round(nodes[i]*255);
      const g=Math.round(nodes[i+1]*255);
      const b=Math.round(nodes[i+2]*255);
      ctx.fillStyle=`rgb(${r},${g},${b})`;
      ctx.fillRect(ox+x*cell,oy+y*cell,cell+0.5,cell+0.5);
    }
  }
  // border
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
  ctx.strokeRect(ox,oy,sz,sz);
}

function loop(){
  if(running){
    const speed=parseInt(document.getElementById('speed').value);
    for(let s=0;s<speed;s++) step();
  }
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('reset').onclick=reset;
document.getElementById('toggle').onclick=e=>{running=!running;e.target.textContent=running?'Pause':'Resume'};
document.getElementById('gs').onchange=reset;

reset();loop();
</script>
</body>
</html>
