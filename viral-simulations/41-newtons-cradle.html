<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newton's Cradle - Viral Simulations - CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh;cursor:grab}
  canvas:active{cursor:grabbing}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Newton's Cradle</h2><p>Five pendulums collide elastically, conserving momentum and kinetic energy. Pull a ball back and release - only the opposite ball lifts. Click and drag any ball.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <label>Damping <span id="dval">0.999</span>
    <input type="range" id="d" min="0.985" max="1" step="0.001" value="0.999">
  </label>
  <button id="left">Drop Left</button>
  <button id="reset">Reset</button>
</div>
<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W,H, pivotY;
  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    pivotY = H*0.2;
    setupBalls();
  }
  window.addEventListener('resize', resize);

  const N = 5;
  const ballR = 28;
  let L; // string length px
  let g = 1400; // px/s²
  let damping = 0.999;
  let balls = [];

  function setupBalls(){
    L = Math.min(H*0.55, 360);
    balls = [];
    const cx = W/2;
    const spacing = ballR*2;
    const startX = cx - (N-1)*spacing/2;
    for(let i=0;i<N;i++){
      balls.push({
        pivotX: startX + i*spacing,
        theta: 0, // angle from vertical
        omega: 0, // angular velocity
        hue: (i/(N-1))*40 + 20
      });
    }
  }

  function step(dt){
    for(const b of balls){
      const alpha = -(g/L) * Math.sin(b.theta);
      b.omega += alpha * dt;
      b.theta += b.omega * dt;
      b.omega *= damping;
    }
    // collisions: process adjacent pairs when contact
    // ball positions at bob:
    function pos(b){ return { x: b.pivotX + L*Math.sin(b.theta), y: pivotY + L*Math.cos(b.theta) }; }

    // multiple iterations for stability
    for(let iter=0;iter<3;iter++){
      for(let i=0;i<N-1;i++){
        const a = balls[i], c = balls[i+1];
        const pa = pos(a), pc = pos(c);
        const dx = pc.x - pa.x, dy = pc.y - pa.y;
        const dist = Math.hypot(dx,dy);
        const minDist = ballR*2;
        if(dist < minDist){
          // velocity at bob along horizontal direction (small angle approx)
          // v_tangent = L * omega in tangential direction
          // For 1D collision at contact line, project tangential vel onto contact normal.
          const nx = dx/(dist||1), ny = dy/(dist||1);
          // tangent direction at bob a: (cos(theta), -sin(theta))? Actually
          // bob position: x = px + L sin θ, y = py + L cos θ
          // velocity: dx/dt = L cos θ * ω, dy/dt = -L sin θ * ω
          const vax = L*Math.cos(a.theta)*a.omega;
          const vay = -L*Math.sin(a.theta)*a.omega;
          const vcx = L*Math.cos(c.theta)*c.omega;
          const vcy = -L*Math.sin(c.theta)*c.omega;
          const va_n = vax*nx + vay*ny;
          const vc_n = vcx*nx + vcy*ny;
          if(va_n - vc_n > 0){ // approaching
            // elastic equal masses: swap normal components
            const dv = va_n - vc_n;
            // adjust each by ±dv along normal
            // converting back to angular vel: ω = (v_x*cosθ - v_y*sinθ)/L
            // Apply impulse along normal (mostly horizontal at small theta)
            const ja = -dv;
            const jc = dv;
            // Update a's velocity by ja * normal
            const new_vax = vax + ja*nx;
            const new_vay = vay + ja*ny;
            const new_vcx = vcx + jc*nx;
            const new_vcy = vcy + jc*ny;
            a.omega = (new_vax*Math.cos(a.theta) - new_vay*Math.sin(a.theta))/L;
            c.omega = (new_vcx*Math.cos(c.theta) - new_vcy*Math.sin(c.theta))/L;
          }
          // positional correction: separate
          const overlap = minDist - dist;
          const half = overlap/2;
          // push along normal by adjusting theta slightly
          // dx ≈ L*cosθ * dθ ; so dθ ≈ dx/(L cos θ)
          a.theta -= half*nx/(L*Math.cos(a.theta));
          c.theta += half*nx/(L*Math.cos(c.theta));
        }
      }
    }
  }

  function draw(){
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0,0,W,H);

    // frame
    const cx = W/2;
    const halfSpan = ((N-1)*ballR*2)/2 + 40;
    ctx.strokeStyle = 'rgba(251,191,36,0.5)';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(cx-halfSpan-20, pivotY-30);
    ctx.lineTo(cx+halfSpan+20, pivotY-30);
    ctx.stroke();
    // legs
    ctx.beginPath();
    ctx.moveTo(cx-halfSpan-20, pivotY-30);
    ctx.lineTo(cx-halfSpan-30, H-40);
    ctx.moveTo(cx+halfSpan+20, pivotY-30);
    ctx.lineTo(cx+halfSpan+30, H-40);
    ctx.stroke();

    for(const b of balls){
      const bx = b.pivotX + L*Math.sin(b.theta);
      const by = pivotY + L*Math.cos(b.theta);
      // V-strings
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(b.pivotX-25, pivotY);
      ctx.lineTo(bx, by);
      ctx.moveTo(b.pivotX+25, pivotY);
      ctx.lineTo(bx, by);
      ctx.stroke();

      // ball
      const grad = ctx.createRadialGradient(bx-ballR*0.3, by-ballR*0.3, ballR*0.1, bx, by, ballR);
      grad.addColorStop(0, '#fde68a');
      grad.addColorStop(0.5, '#fbbf24');
      grad.addColorStop(1, '#78350f');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(bx, by, ballR, 0, Math.PI*2);
      ctx.fill();
      // highlight
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(bx-ballR*0.4, by-ballR*0.4, ballR*0.2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  let last = performance.now();
  function loop(t){
    const dt = Math.min(0.02, (t-last)/1000);
    last = t;
    if(!dragging){
      const sub = 4;
      for(let i=0;i<sub;i++) step(dt/sub);
    }
    draw();
    requestAnimationFrame(loop);
  }

  // dragging
  let dragging = null;
  function pickBall(mx, my){
    for(const b of balls){
      const bx = b.pivotX + L*Math.sin(b.theta);
      const by = pivotY + L*Math.cos(b.theta);
      if(Math.hypot(mx-bx, my-by) < ballR+5) return b;
    }
    return null;
  }

  canvas.addEventListener('mousedown', e=>{
    dragging = pickBall(e.clientX, e.clientY);
    if(dragging) dragging.omega = 0;
  });
  canvas.addEventListener('mousemove', e=>{
    if(dragging){
      const dx = e.clientX - dragging.pivotX;
      const dy = e.clientY - pivotY;
      let theta = Math.atan2(dx, dy);
      theta = Math.max(-1.2, Math.min(1.2, theta));
      dragging.theta = theta;
      dragging.omega = 0;
    }
  });
  window.addEventListener('mouseup', ()=>{ dragging = null; });

  document.getElementById('left').onclick = ()=>{
    setupBalls();
    balls[0].theta = -1.0;
  };
  document.getElementById('reset').onclick = setupBalls;
  const dIn = document.getElementById('d');
  dIn.oninput = ()=>{ damping = parseFloat(dIn.value); document.getElementById('dval').textContent = damping.toFixed(3); };

  resize();
  // start with one ball pulled
  balls[0].theta = -1.0;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
