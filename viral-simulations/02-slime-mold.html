<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime Mold — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Slime Mold (Physarum)</h2><p>Thousands of agents leave pheromone trails and follow them — emergent vein-like networks form.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset</button>
  <label>Sense Angle <input type="range" id="sa" min="10" max="60" value="30"></label>
  <label>Turn Speed <input type="range" id="ts" min="10" max="80" value="35"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const GW = 480, GH = 280;
let displayW, displayH;
function resize(){
  displayW = canvas.width = window.innerWidth;
  displayH = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// offscreen grid canvas
const gridCanvas = document.createElement('canvas');
gridCanvas.width = GW; gridCanvas.height = GH;
const gctx = gridCanvas.getContext('2d');

let trail = new Float32Array(GW*GH);
let trailNext = new Float32Array(GW*GH);

const NUM_AGENTS = 8000;
const agents = [];
function spawnAgents(){
  agents.length = 0;
  const cx = GW/2, cy = GH/2, r = Math.min(GW,GH)*0.3;
  for(let i=0;i<NUM_AGENTS;i++){
    const ang = Math.random()*Math.PI*2;
    const rr = Math.sqrt(Math.random())*r;
    agents.push({
      x: cx + Math.cos(ang)*rr,
      y: cy + Math.sin(ang)*rr,
      a: ang + Math.PI // face inward initially-ish (will randomize via dynamics)
    });
  }
}
spawnAgents();
trail.fill(0);

let SENSE_ANGLE = 30 * Math.PI/180;
let TURN_SPEED = 0.6;
const SENSE_DIST = 9;
const SENSE_SIZE = 1;
const SPEED = 1.0;
const DECAY = 0.96;
const DEPOSIT = 5;

function senseAt(x, y){
  let s = 0;
  const ix = Math.round(x), iy = Math.round(y);
  for(let dy=-SENSE_SIZE; dy<=SENSE_SIZE; dy++){
    for(let dx=-SENSE_SIZE; dx<=SENSE_SIZE; dx++){
      let xx = ix+dx, yy = iy+dy;
      if(xx<0) xx+=GW; else if(xx>=GW) xx-=GW;
      if(yy<0) yy+=GH; else if(yy>=GH) yy-=GH;
      s += trail[yy*GW + xx];
    }
  }
  return s;
}

function step(){
  for(const ag of agents){
    const ca = Math.cos(ag.a), sa = Math.sin(ag.a);
    const fx = ag.x + ca*SENSE_DIST, fy = ag.y + sa*SENSE_DIST;
    const lx = ag.x + Math.cos(ag.a - SENSE_ANGLE)*SENSE_DIST;
    const ly = ag.y + Math.sin(ag.a - SENSE_ANGLE)*SENSE_DIST;
    const rx = ag.x + Math.cos(ag.a + SENSE_ANGLE)*SENSE_DIST;
    const ry = ag.y + Math.sin(ag.a + SENSE_ANGLE)*SENSE_DIST;
    const sf = senseAt(fx,fy);
    const sl = senseAt(lx,ly);
    const sr = senseAt(rx,ry);
    if(sf > sl && sf > sr){
      // continue
    } else if(sf < sl && sf < sr){
      ag.a += (Math.random() - 0.5) * 2 * TURN_SPEED;
    } else if(sr > sl){
      ag.a += TURN_SPEED * (0.5 + Math.random()*0.5);
    } else if(sl > sr){
      ag.a -= TURN_SPEED * (0.5 + Math.random()*0.5);
    }
    ag.x += Math.cos(ag.a)*SPEED;
    ag.y += Math.sin(ag.a)*SPEED;
    if(ag.x < 0){ ag.x += GW; } else if(ag.x >= GW){ ag.x -= GW; }
    if(ag.y < 0){ ag.y += GH; } else if(ag.y >= GH){ ag.y -= GH; }
    const ix = Math.floor(ag.x), iy = Math.floor(ag.y);
    trail[iy*GW + ix] = Math.min(255, trail[iy*GW + ix] + DEPOSIT);
  }
}

function diffuseDecay(){
  for(let y=0;y<GH;y++){
    const ym = (y-1+GH)%GH, yp = (y+1)%GH;
    for(let x=0;x<GW;x++){
      const xm = (x-1+GW)%GW, xp = (x+1)%GW;
      let s = 0;
      s += trail[ym*GW + xm]; s += trail[ym*GW + x]; s += trail[ym*GW + xp];
      s += trail[y*GW + xm];  s += trail[y*GW + x];  s += trail[y*GW + xp];
      s += trail[yp*GW + xm]; s += trail[yp*GW + x]; s += trail[yp*GW + xp];
      trailNext[y*GW + x] = (s/9) * DECAY;
    }
  }
  const tmp = trail; trail = trailNext; trailNext = tmp;
}

const imgData = gctx.createImageData(GW, GH);
function drawGrid(){
  const d = imgData.data;
  for(let i=0;i<trail.length;i++){
    const v = Math.min(255, trail[i]);
    const t = v/255;
    // warm gradient: black -> dark red -> orange -> yellow -> white
    let r,g,b;
    if(t < 0.25){ const u = t/0.25; r = u*120; g = 0; b = 0; }
    else if(t < 0.5){ const u = (t-0.25)/0.25; r = 120 + u*135; g = u*100; b = 0; }
    else if(t < 0.8){ const u = (t-0.5)/0.3; r = 255; g = 100 + u*155; b = u*60; }
    else { const u = (t-0.8)/0.2; r = 255; g = 255; b = 60 + u*195; }
    const j = i*4;
    d[j] = r; d[j+1] = g; d[j+2] = b; d[j+3] = 255;
  }
  gctx.putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(gridCanvas, 0, 0, displayW, displayH);
}

function loop(){
  step();
  diffuseDecay();
  drawGrid();
  requestAnimationFrame(loop);
}

document.getElementById('reset').addEventListener('click', () => { trail.fill(0); spawnAgents(); });
document.getElementById('sa').addEventListener('input', (e) => { SENSE_ANGLE = parseFloat(e.target.value)*Math.PI/180; });
document.getElementById('ts').addEventListener('input', (e) => { TURN_SPEED = parseFloat(e.target.value)/60; });

loop();
</script>
</body>
</html>
