<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three-Body Problem — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:280px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .info .stats{margin-top:8px;font-size:12px;color:#cbd5e1;font-family:monospace}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 12px;border-radius:6px;font-weight:600;cursor:pointer;font-size:12px}
  .controls button:hover{background:#fcd34d}
  .controls button.alt{background:rgba(255,255,255,0.1);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)}
  .controls button.alt:hover{background:rgba(251,191,36,0.2)}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info">
  <h2>Three-Body Problem</h2>
  <p>Three masses under mutual Newtonian gravity. Symplectic leapfrog integrator with softening. Chaotic — small changes diverge exponentially.</p>
  <div class="stats">
    Time = <span id="tm">0</span><br>
    Energy = <span id="en">0</span>
  </div>
</div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="figure8">Figure-8</button>
  <button id="binary">Binary+Distant</button>
  <button id="triangle">Triangle</button>
  <button id="random" class="alt">Random</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth+'px';
  canvas.style.height = window.innerHeight+'px';
}
window.addEventListener('resize', resize);
resize();

const G = 1.0;
const SOFT2 = 0.05;
const dt = 0.003;
const TRAIL = 800;
let bodies = [];
let simTime = 0;

function makeBodies(positions, velocities, masses){
  bodies = positions.map((p,i)=>({
    x:p[0], y:p[1],
    vx:velocities[i][0], vy:velocities[i][1],
    m:masses[i],
    trail:[],
    color:i===0?'#fbbf24':i===1?'#60a5fa':'#f472b6'
  }));
  simTime = 0;
}

function presetFigure8(){
  // famous figure-8 orbit (Chenciner-Montgomery)
  makeBodies(
    [[-0.97000436, 0.24308753],[0.97000436,-0.24308753],[0,0]],
    [[0.4662036850, 0.4323657300],[0.4662036850,0.4323657300],[-0.93240737,-0.86473146]],
    [1,1,1]
  );
}
function presetBinary(){
  makeBodies(
    [[-0.6,0],[0.6,0],[3.0,0]],
    [[0,-0.7],[0,0.7],[0,0.45]],
    [1,1,0.5]
  );
}
function presetTriangle(){
  // equilateral with rotation (Lagrange solution — quasi-stable)
  const r = 1.0;
  const v = Math.sqrt(G/(r*Math.sqrt(3)));
  const a = 2*Math.PI/3;
  const ps=[], vs=[];
  for(let i=0;i<3;i++){
    const ang = i*a;
    const px = r*Math.cos(ang);
    const py = r*Math.sin(ang);
    ps.push([px,py]);
    vs.push([-v*Math.sin(ang), v*Math.cos(ang)]);
  }
  makeBodies(ps,vs,[1,1,1]);
}
function presetRandom(){
  const ps=[], vs=[];
  for(let i=0;i<3;i++){
    ps.push([(Math.random()-0.5)*3, (Math.random()-0.5)*3]);
    vs.push([(Math.random()-0.5)*0.6, (Math.random()-0.5)*0.6]);
  }
  makeBodies(ps,vs,[1,1,1]);
}

document.getElementById('figure8').onclick = presetFigure8;
document.getElementById('binary').onclick = presetBinary;
document.getElementById('triangle').onclick = presetTriangle;
document.getElementById('random').onclick = presetRandom;
presetFigure8();

function accelerations(){
  const ax = [0,0,0], ay=[0,0,0];
  for(let i=0;i<3;i++){
    for(let j=0;j<3;j++){
      if(i===j) continue;
      const dx = bodies[j].x - bodies[i].x;
      const dy = bodies[j].y - bodies[i].y;
      const r2 = dx*dx + dy*dy + SOFT2;
      const r = Math.sqrt(r2);
      const f = G*bodies[j].m/(r2*r);
      ax[i] += f*dx;
      ay[i] += f*dy;
    }
  }
  return [ax, ay];
}

function step(){
  // velocity-verlet (symplectic)
  let [ax, ay] = accelerations();
  for(let i=0;i<3;i++){
    bodies[i].x += bodies[i].vx*dt + 0.5*ax[i]*dt*dt;
    bodies[i].y += bodies[i].vy*dt + 0.5*ay[i]*dt*dt;
  }
  const [ax2, ay2] = accelerations();
  for(let i=0;i<3;i++){
    bodies[i].vx += 0.5*(ax[i]+ax2[i])*dt;
    bodies[i].vy += 0.5*(ay[i]+ay2[i])*dt;
  }
  simTime += dt;
  for(let i=0;i<3;i++){
    bodies[i].trail.push({x:bodies[i].x, y:bodies[i].y});
    if(bodies[i].trail.length>TRAIL) bodies[i].trail.shift();
  }
}

function totalEnergy(){
  let ke=0, pe=0;
  for(let i=0;i<3;i++){
    ke += 0.5*bodies[i].m*(bodies[i].vx**2 + bodies[i].vy**2);
    for(let j=i+1;j<3;j++){
      const dx = bodies[j].x-bodies[i].x;
      const dy = bodies[j].y-bodies[i].y;
      const r = Math.sqrt(dx*dx+dy*dy+SOFT2);
      pe -= G*bodies[i].m*bodies[j].m/r;
    }
  }
  return ke+pe;
}

function hslToRgbStr(h,s,l,a){
  return `hsla(${h},${s}%,${l}%,${a})`;
}

function loop(){
  for(let s=0;s<8;s++) step();

  ctx.fillStyle='rgba(10,14,26,0.15)';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // compute centroid for camera follow
  let cxs=0, cys=0;
  for(let i=0;i<3;i++){ cxs+=bodies[i].x; cys+=bodies[i].y; }
  cxs/=3; cys/=3;

  const cx = canvas.width/2, cy = canvas.height/2;
  const scale = Math.min(canvas.width, canvas.height)/8;

  // draw trails with rainbow gradient
  for(let i=0;i<3;i++){
    const trail = bodies[i].trail;
    for(let t=1;t<trail.length;t++){
      const age = t/trail.length;
      const x1 = cx + (trail[t-1].x-cxs)*scale;
      const y1 = cy - (trail[t-1].y-cys)*scale;
      const x2 = cx + (trail[t].x-cxs)*scale;
      const y2 = cy - (trail[t].y-cys)*scale;
      const hue = (i*120 + age*80) % 360;
      ctx.strokeStyle = hslToRgbStr(hue, 80, 55, age*0.85);
      ctx.lineWidth = 1.4 + age*1.2;
      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.stroke();
    }
  }

  // draw bodies
  for(let i=0;i<3;i++){
    const x = cx + (bodies[i].x-cxs)*scale;
    const y = cy - (bodies[i].y-cys)*scale;
    const r = 8 + bodies[i].m*4;
    const grad = ctx.createRadialGradient(x,y,1,x,y,r*2);
    grad.addColorStop(0, bodies[i].color);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x,y,r*2,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = bodies[i].color;
    ctx.beginPath();
    ctx.arc(x,y,r*0.5,0,Math.PI*2);
    ctx.fill();
  }

  document.getElementById('tm').textContent = simTime.toFixed(2);
  document.getElementById('en').textContent = totalEnergy().toFixed(3);

  requestAnimationFrame(loop);
}
ctx.fillStyle='#0a0e1a';
ctx.fillRect(0,0,canvas.width,canvas.height);
loop();
</script>
</body>
</html>
