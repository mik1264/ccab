<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIR Epidemic Spread — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .info .stat{margin-top:6px;font-size:12px}
  .info .s{color:#e8e6e1}
  .info .i{color:#f87171}
  .info .r{color:#34d399}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info">
  <h2>SIR Epidemic</h2>
  <p>Susceptible (white), Infected (red), Recovered (green) particles bouncing in a box. Live SIR curve on the right.</p>
  <div class="stat">
    <span class="s">S: <span id="sCount">0</span></span> ·
    <span class="i">I: <span id="iCount">0</span></span> ·
    <span class="r">R: <span id="rCount">0</span></span>
  </div>
</div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset</button>
  <label>Transmission <span id="pVal">0.4</span><input id="p" type="range" min="0" max="1" step="0.01" value="0.4"></label>
  <label>Recovery (frames) <span id="tVal">300</span><input id="t" type="range" min="60" max="900" step="10" value="300"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();
addEventListener('resize',resize);

const N = 400;
const R = 4;
let particles = [];
let history = []; // {S,I,R}
const HIST_MAX = 600;

function init(){
  particles = [];
  history = [];
  for (let i = 0; i < N; i++){
    const ang = Math.random() * Math.PI * 2;
    particles.push({
      x: 100 + Math.random() * (W*0.55 - 200),
      y: 60 + Math.random() * (H - 200),
      vx: Math.cos(ang) * 1.4,
      vy: Math.sin(ang) * 1.4,
      state: 0, // 0=S, 1=I, 2=R
      timer: 0
    });
  }
  // seed infections
  for (let i = 0; i < 5; i++){
    particles[i].state = 1;
    particles[i].timer = 0;
  }
}
init();

function step(){
  const p = parseFloat(document.getElementById('p').value);
  const T = parseInt(document.getElementById('t').value);
  const simLeft = 0, simRight = W * 0.6, simTop = 0, simBottom = H;

  for (const a of particles){
    a.x += a.vx;
    a.y += a.vy;
    if (a.x < simLeft + R){ a.x = simLeft + R; a.vx = -a.vx; }
    if (a.x > simRight - R){ a.x = simRight - R; a.vx = -a.vx; }
    if (a.y < simTop + R){ a.y = simTop + R; a.vy = -a.vy; }
    if (a.y > simBottom - R){ a.y = simBottom - R; a.vy = -a.vy; }
  }

  // collisions (spatial bucket)
  const bs = 16;
  const cols = Math.ceil(simRight / bs);
  const rows = Math.ceil(H / bs);
  const buckets = new Array(cols * rows);
  for (let i = 0; i < buckets.length; i++) buckets[i] = [];
  for (let i = 0; i < particles.length; i++){
    const a = particles[i];
    const cx = Math.min(cols-1, Math.max(0, (a.x / bs) | 0));
    const cy = Math.min(rows-1, Math.max(0, (a.y / bs) | 0));
    buckets[cy*cols + cx].push(i);
  }

  for (let cy = 0; cy < rows; cy++){
    for (let cx = 0; cx < cols; cx++){
      const list = buckets[cy*cols + cx];
      if (!list.length) continue;
      const neigh = [];
      for (let dy = 0; dy <= 1; dy++){
        for (let dx = -1; dx <= 1; dx++){
          if (dy === 0 && dx < 0) continue;
          const nx = cx + dx, ny = cy + dy;
          if (nx<0||nx>=cols||ny<0||ny>=rows) continue;
          const ll = buckets[ny*cols + nx];
          for (let k = 0; k < ll.length; k++) neigh.push(ll[k]);
        }
      }
      for (let i = 0; i < list.length; i++){
        const ai = list[i];
        const a = particles[ai];
        for (let j = 0; j < neigh.length; j++){
          const bi = neigh[j];
          if (bi <= ai) continue;
          const b = particles[bi];
          const dx = b.x - a.x, dy = b.y - a.y;
          const d2 = dx*dx + dy*dy;
          if (d2 < (R*2)*(R*2) && d2 > 0.0001){
            const d = Math.sqrt(d2);
            const nx = dx/d, ny = dy/d;
            // separate
            const overlap = R*2 - d;
            a.x -= nx * overlap/2;
            a.y -= ny * overlap/2;
            b.x += nx * overlap/2;
            b.y += ny * overlap/2;
            // elastic 1D along normal
            const va = a.vx*nx + a.vy*ny;
            const vb = b.vx*nx + b.vy*ny;
            a.vx += (vb - va) * nx;
            a.vy += (vb - va) * ny;
            b.vx += (va - vb) * nx;
            b.vy += (va - vb) * ny;
            // infection
            if (a.state === 1 && b.state === 0 && Math.random() < p){
              b.state = 1; b.timer = 0;
            } else if (b.state === 1 && a.state === 0 && Math.random() < p){
              a.state = 1; a.timer = 0;
            }
          }
        }
      }
    }
  }

  // recovery
  for (const a of particles){
    if (a.state === 1){
      a.timer++;
      if (a.timer > T) a.state = 2;
    }
  }

  // record
  let s=0,i=0,r=0;
  for (const a of particles){
    if (a.state === 0) s++;
    else if (a.state === 1) i++;
    else r++;
  }
  history.push({s, i, r});
  if (history.length > HIST_MAX) history.shift();
  document.getElementById('sCount').textContent = s;
  document.getElementById('iCount').textContent = i;
  document.getElementById('rCount').textContent = r;
  document.getElementById('pVal').textContent = parseFloat(document.getElementById('p').value).toFixed(2);
  document.getElementById('tVal').textContent = document.getElementById('t').value;
}

function draw(){
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0,0,W,H);

  // sim area divider
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.moveTo(W*0.6, 0);
  ctx.lineTo(W*0.6, H);
  ctx.stroke();

  for (const a of particles){
    if (a.state === 0) ctx.fillStyle = '#e8e6e1';
    else if (a.state === 1) ctx.fillStyle = '#f87171';
    else ctx.fillStyle = '#34d399';
    ctx.beginPath();
    ctx.arc(a.x, a.y, R, 0, Math.PI*2);
    ctx.fill();
  }

  // SIR curve
  const cx = W*0.62, cy = 60, cw = W*0.36, ch = H - 180;
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fillRect(cx, cy, cw, ch);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.strokeRect(cx, cy, cw, ch);

  ctx.fillStyle = '#cbd5e1';
  ctx.font = '12px sans-serif';
  ctx.fillText('SIR over time', cx + 8, cy - 8);

  if (history.length > 1){
    const drawCurve = (key, color) => {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < history.length; i++){
        const x = cx + (i / (HIST_MAX-1)) * cw;
        const y = cy + ch - (history[i][key] / N) * ch;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    };
    drawCurve('s', '#e8e6e1');
    drawCurve('i', '#f87171');
    drawCurve('r', '#34d399');
  }
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}
document.getElementById('reset').onclick = init;
loop();
</script>
</body>
</html>
