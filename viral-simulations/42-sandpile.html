<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abelian Sandpile - Viral Simulations - CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Abelian Sandpile</h2><p>200x200 grid. Drop a grain at the center. When any cell reaches 4, it topples to its 4 neighbors. Self-organized criticality produces fractal patterns.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <label>Grains/frame <span id="sval">200</span>
    <input type="range" id="speed" min="1" max="2000" value="200">
  </label>
  <button id="big">+10000</button>
  <button id="reset">Reset</button>
</div>
<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const GW = 200, GH = 200;
  let grid = new Uint8Array(GW*GH);
  let toppleQueue = []; // indices needing toppling
  let totalGrains = 0;
  let topplesThisFrame = 0;

  let W,H, scale, ox, oy;
  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    scale = Math.floor(Math.min(W,H) * 0.9 / GW);
    if(scale<1) scale = 1;
    ox = (W - GW*scale)/2;
    oy = (H - GH*scale)/2;
  }
  window.addEventListener('resize', resize);
  resize();

  let speed = 200;

  // colors for counts 0..3 (and overflow 4 mid-topple)
  const colors = [
    [10,14,26],     // 0 black
    [37,99,235],    // 1 blue
    [6,182,212],    // 2 cyan
    [251,191,36],   // 3 yellow
    [239,68,68]     // 4 red (transient)
  ];

  let img = ctx.createImageData(GW, GH);

  function paintAll(){
    for(let i=0;i<GW*GH;i++){
      const v = Math.min(4, grid[i]);
      const c = colors[v];
      const idx = i*4;
      img.data[idx] = c[0];
      img.data[idx+1] = c[1];
      img.data[idx+2] = c[2];
      img.data[idx+3] = 255;
    }
  }

  function paintCell(i){
    const v = Math.min(4, grid[i]);
    const c = colors[v];
    const idx = i*4;
    img.data[idx] = c[0];
    img.data[idx+1] = c[1];
    img.data[idx+2] = c[2];
    img.data[idx+3] = 255;
  }

  function addGrain(){
    const cx = (GW/2)|0, cy = (GH/2)|0;
    const i = cy*GW + cx;
    grid[i]++;
    totalGrains++;
    paintCell(i);
    if(grid[i] >= 4) toppleQueue.push(i);
  }

  function processTopples(maxOps){
    let ops = 0;
    while(toppleQueue.length && ops < maxOps){
      const i = toppleQueue.shift();
      if(grid[i] < 4) continue;
      grid[i] -= 4;
      paintCell(i);
      const x = i % GW;
      const y = (i/GW)|0;
      // 4 neighbors; out of bounds = lost (open boundary)
      if(x>0){ const ni = i-1; grid[ni]++; paintCell(ni); if(grid[ni]>=4) toppleQueue.push(ni); }
      if(x<GW-1){ const ni = i+1; grid[ni]++; paintCell(ni); if(grid[ni]>=4) toppleQueue.push(ni); }
      if(y>0){ const ni = i-GW; grid[ni]++; paintCell(ni); if(grid[ni]>=4) toppleQueue.push(ni); }
      if(y<GH-1){ const ni = i+GW; grid[ni]++; paintCell(ni); if(grid[ni]>=4) toppleQueue.push(ni); }
      ops++;
      topplesThisFrame++;
    }
    return ops;
  }

  let off = document.createElement('canvas');
  off.width = GW; off.height = GH;
  let octx = off.getContext('2d');

  function draw(){
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0,0,W,H);
    octx.putImageData(img, 0, 0);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, 0, 0, GW, GH, ox, oy, GW*scale, GH*scale);

    // border
    ctx.strokeStyle = 'rgba(251,191,36,0.4)';
    ctx.lineWidth = 2;
    ctx.strokeRect(ox-1, oy-1, GW*scale+2, GH*scale+2);

    // legend
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(12, H-100, 220, 88);
    ctx.fillStyle = '#fbbf24';
    ctx.font = '13px sans-serif';
    ctx.fillText('Grains added: ' + totalGrains, 22, H-82);
    ctx.fillStyle = '#cbd5e1';
    ctx.font = '11px sans-serif';
    ctx.fillText('Pending topples: ' + toppleQueue.length, 22, H-65);
    // color key
    const labels = ['0','1','2','3'];
    for(let i=0;i<4;i++){
      const c = colors[i];
      ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
      ctx.fillRect(22 + i*48, H-50, 16, 16);
      ctx.fillStyle = '#cbd5e1';
      ctx.fillText(labels[i], 26 + i*48, H-25);
    }
  }

  let last = performance.now();
  function loop(t){
    last = t;
    topplesThisFrame = 0;
    // add grains
    for(let i=0;i<speed && toppleQueue.length===0;i++) addGrain();
    // process topples up to a bounded amount per frame
    processTopples(80000);
    draw();
    requestAnimationFrame(loop);
  }

  function reset(){
    grid = new Uint8Array(GW*GH);
    toppleQueue = [];
    totalGrains = 0;
    paintAll();
  }

  document.getElementById('reset').onclick = reset;
  document.getElementById('big').onclick = ()=>{
    for(let k=0;k<10000;k++){
      addGrain();
      // process topples in bursts to keep memory bounded
      if(toppleQueue.length > 5000) processTopples(50000);
    }
  };
  const sIn = document.getElementById('speed');
  sIn.oninput = ()=>{ speed = parseInt(sIn.value,10); document.getElementById('sval').textContent = speed; };

  paintAll();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
