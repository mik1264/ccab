<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conway's Game of Life — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh;cursor:crosshair}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .info .stats{margin-top:8px;font-size:12px;color:#cbd5e1;font-family:monospace}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls button.alt{background:rgba(255,255,255,0.1);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)}
  .controls button.alt:hover{background:rgba(251,191,36,0.2)}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:140px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info">
  <h2>Conway's Game of Life</h2>
  <p>B3/S23: dead cell with 3 neighbors births; live cell with 2 or 3 survives. Click and drag to draw.</p>
  <div class="stats">
    Generation = <span id="gen">0</span><br>
    Alive = <span id="alive">0</span>
  </div>
</div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="play">Pause</button>
  <button id="step">Step</button>
  <button id="rand" class="alt">Random</button>
  <button id="clear" class="alt">Clear</button>
  <button id="gun" class="alt">Glider Gun</button>
  <label>Speed<input type="range" id="speed" min="1" max="30" step="1" value="10"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 200, H = 130;
let grid = new Uint8Array(W*H);
let next = new Uint8Array(W*H);
let generation = 0;
let playing = true;
let speed = 10;
let lastStep = 0;

function loadGliderGun(){
  grid.fill(0);
  // Gosper Glider Gun pattern
  const pattern = [
    [1,5],[1,6],[2,5],[2,6],
    [11,5],[11,6],[11,7],
    [12,4],[12,8],
    [13,3],[13,9],[14,3],[14,9],
    [15,6],
    [16,4],[16,8],
    [17,5],[17,6],[17,7],
    [18,6],
    [21,3],[21,4],[21,5],[22,3],[22,4],[22,5],
    [23,2],[23,6],
    [25,1],[25,2],[25,6],[25,7],
    [35,3],[35,4],[36,3],[36,4]
  ];
  const ox = 10, oy = 10;
  for(const [x,y] of pattern) grid[(y+oy)*W + (x+ox)] = 1;
  // add a couple of LWSS spaceships
  const lwss = [[1,1],[4,1],[0,2],[0,3],[4,3],[0,4],[1,4],[2,4],[3,4]];
  const placeAt = (px,py) => { for(const [x,y] of lwss) grid[(y+py)*W + (x+px)] = 1; };
  placeAt(80, 60);
  placeAt(110, 90);
  // glider
  const gliderPattern = [[1,0],[2,1],[0,2],[1,2],[2,2]];
  const placeGlider = (px,py)=>{ for(const [x,y] of gliderPattern) grid[(y+py)*W + (x+px)] = 1; };
  placeGlider(60, 100);
  placeGlider(150, 30);
  generation = 0;
}

function randomize(){
  for(let i=0;i<W*H;i++) grid[i] = Math.random()<0.28 ? 1 : 0;
  generation = 0;
}

function clearGrid(){
  grid.fill(0);
  generation = 0;
}

function step(){
  for(let y=0;y<H;y++){
    const ym = (y===0?H-1:y-1)*W;
    const yp = (y===H-1?0:y+1)*W;
    const yc = y*W;
    for(let x=0;x<W;x++){
      const xm = x===0?W-1:x-1;
      const xp = x===W-1?0:x+1;
      const n = grid[ym+xm]+grid[ym+x]+grid[ym+xp]+grid[yc+xm]+grid[yc+xp]+grid[yp+xm]+grid[yp+x]+grid[yp+xp];
      const cur = grid[yc+x];
      next[yc+x] = (cur && (n===2||n===3)) || (!cur && n===3) ? 1 : 0;
    }
  }
  const t = grid; grid = next; next = t;
  generation++;
}

function resize(){
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth+'px';
  canvas.style.height = window.innerHeight+'px';
}
window.addEventListener('resize', resize);
resize();

const off = document.createElement('canvas');
off.width = W; off.height = H;
const octx = off.getContext('2d');

function render(){
  const id = octx.createImageData(W,H);
  const d = id.data;
  let alive = 0;
  for(let i=0;i<W*H;i++){
    if(grid[i]){
      d[i*4] = 251; d[i*4+1] = 191; d[i*4+2] = 36; d[i*4+3] = 255;
      alive++;
    } else {
      d[i*4] = 14; d[i*4+1] = 18; d[i*4+2] = 32; d[i*4+3] = 255;
    }
  }
  octx.putImageData(id,0,0);

  ctx.fillStyle='#0a0e1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const scale = Math.min(canvas.width/W, canvas.height/H);
  const dw = W*scale, dh = H*scale;
  const ox = (canvas.width-dw)/2, oy = (canvas.height-dh)/2;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(off, ox, oy, dw, dh);

  document.getElementById('gen').textContent = generation;
  document.getElementById('alive').textContent = alive;
}

// drawing
let drawing = false;
let drawValue = 1;
function eventToCell(e){
  const rect = canvas.getBoundingClientRect();
  const px = (e.clientX-rect.left) * devicePixelRatio;
  const py = (e.clientY-rect.top) * devicePixelRatio;
  const scale = Math.min(canvas.width/W, canvas.height/H);
  const dw = W*scale, dh = H*scale;
  const ox = (canvas.width-dw)/2, oy = (canvas.height-dh)/2;
  const cx = Math.floor((px-ox)/scale);
  const cy = Math.floor((py-oy)/scale);
  return [cx, cy];
}
canvas.addEventListener('mousedown', e=>{
  drawing = true;
  const [x,y] = eventToCell(e);
  if(x>=0 && x<W && y>=0 && y<H){
    drawValue = grid[y*W+x] ? 0 : 1;
    grid[y*W+x] = drawValue;
  }
});
canvas.addEventListener('mousemove', e=>{
  if(!drawing) return;
  const [x,y] = eventToCell(e);
  if(x>=0 && x<W && y>=0 && y<H) grid[y*W+x] = drawValue;
});
window.addEventListener('mouseup', ()=>drawing=false);

document.getElementById('play').onclick = function(){ playing = !playing; this.textContent = playing?'Pause':'Play'; };
document.getElementById('step').onclick = ()=>{ step(); };
document.getElementById('rand').onclick = randomize;
document.getElementById('clear').onclick = clearGrid;
document.getElementById('gun').onclick = loadGliderGun;
document.getElementById('speed').oninput = e=>{ speed = parseInt(e.target.value); };

loadGliderGun();

function loop(now){
  if(playing){
    const interval = 1000/(speed*2);
    if(now - lastStep >= interval){
      step();
      lastStep = now;
    }
  }
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
