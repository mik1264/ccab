<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ising Model Phase Transition — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .info .stats{margin-top:8px;font-size:12px;color:#cbd5e1;font-family:monospace}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:160px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info">
  <h2>Ising Model</h2>
  <p>2D ferromagnet simulated with Metropolis algorithm. Critical temperature near T<sub>c</sub>≈2.27. Below: ordered domains. Above: disordered.</p>
  <div class="stats">
    T = <span id="tval">2.27</span><br>
    Magnetization = <span id="mag">0.000</span><br>
    Sweeps = <span id="sweeps">0</span>
  </div>
</div>
<canvas id="c"></canvas>
<div class="controls">
  <label>Temperature T<input type="range" id="temp" min="0.5" max="5" step="0.05" value="2.27"></label>
  <button id="resetHot">Random</button>
  <button id="resetCold">Aligned</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 200, H = 150;
let spins = new Int8Array(W*H);
let T = 2.27;
let sweepCount = 0;
const tempInput = document.getElementById('temp');
const tval = document.getElementById('tval');
const magEl = document.getElementById('mag');
const sweepsEl = document.getElementById('sweeps');

function resetHot(){ for(let i=0;i<W*H;i++) spins[i] = Math.random()<0.5? 1 : -1; sweepCount=0; }
function resetCold(){ spins.fill(1); sweepCount=0; }
resetHot();

document.getElementById('resetHot').onclick = resetHot;
document.getElementById('resetCold').onclick = resetCold;
tempInput.oninput = e => { T = parseFloat(e.target.value); tval.textContent = T.toFixed(2); };

// Precomputed acceptance for ΔE in {-8,-4,0,4,8} — only positive needed
let expTable = new Float32Array(9);
function updateExpTable(){
  for(let dE=0; dE<=8; dE+=4) expTable[dE] = Math.exp(-dE/T);
}

function metropolisStep(steps){
  updateExpTable();
  for(let s=0;s<steps;s++){
    const x = (Math.random()*W)|0;
    const y = (Math.random()*H)|0;
    const i = y*W+x;
    const sp = spins[i];
    // periodic neighbors
    const left = spins[y*W + (x===0?W-1:x-1)];
    const right = spins[y*W + (x===W-1?0:x+1)];
    const up = spins[(y===0?H-1:y-1)*W + x];
    const down = spins[(y===H-1?0:y+1)*W + x];
    const nb = left+right+up+down;
    const dE = 2*sp*nb;
    if(dE<=0 || Math.random() < expTable[dE]){
      spins[i] = -sp;
    }
  }
}

function computeMagnetization(){
  let sum=0;
  for(let i=0;i<W*H;i++) sum+=spins[i];
  return sum/(W*H);
}

let img;
function render(){
  // size canvas to window with crisp pixel scaling
  const cw = canvas.width, ch = canvas.height;
  const scale = Math.min(cw/W, ch/H);
  const dw = W*scale, dh = H*scale;
  const ox = (cw-dw)/2, oy = (ch-dh)/2;

  // build small ImageData
  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');
  const id = octx.createImageData(W,H);
  const d = id.data;
  for(let i=0;i<W*H;i++){
    const v = spins[i]>0 ? 240 : 18;
    d[i*4] = v;
    d[i*4+1] = spins[i]>0 ? 235 : 22;
    d[i*4+2] = spins[i]>0 ? 220 : 30;
    d[i*4+3] = 255;
  }
  octx.putImageData(id,0,0);

  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0,0,cw,ch);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(off, ox, oy, dw, dh);
}

function resize(){
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth+'px';
  canvas.style.height = window.innerHeight+'px';
}
window.addEventListener('resize', resize);
resize();

let frame = 0;
function loop(){
  // perform many spin updates per frame ~ multiple sweeps
  const stepsPerFrame = W*H * 2; // ~2 sweeps per frame
  metropolisStep(stepsPerFrame);
  sweepCount += 2;
  frame++;
  if(frame % 3 === 0){
    render();
    magEl.textContent = computeMagnetization().toFixed(3);
    sweepsEl.textContent = sweepCount;
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
