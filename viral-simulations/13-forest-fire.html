<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Fire CA — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .info .stat{margin-top:6px;font-size:12px;color:#fbbf24}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info">
  <h2>Forest Fire (Drossel-Schwabl)</h2>
  <p>Trees grow with prob p, lightning strikes with prob f. Fires propagate to neighbors. Self-organized criticality emerges.</p>
  <div class="stat" id="stat">Trees: 0 · Burning: 0</div>
</div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset</button>
  <label>Growth p <span id="pVal">0.01</span><input id="p" type="range" min="0.001" max="0.1" step="0.001" value="0.01"></label>
  <label>Lightning f <span id="fVal">0.0001</span><input id="f" type="range" min="0.00001" max="0.001" step="0.00001" value="0.0001"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();
addEventListener('resize',resize);

const COLS = 200, ROWS = 130;
// 0=empty, 1=tree, 2=burning
let grid = new Uint8Array(COLS*ROWS);
let next = new Uint8Array(COLS*ROWS);
let img;

function init(){
  for (let i = 0; i < grid.length; i++){
    grid[i] = Math.random() < 0.4 ? 1 : 0;
  }
}
init();

function step(){
  const p = parseFloat(document.getElementById('p').value);
  const f = parseFloat(document.getElementById('f').value);
  for (let y = 0; y < ROWS; y++){
    for (let x = 0; x < COLS; x++){
      const i = y * COLS + x;
      const v = grid[i];
      if (v === 2){
        next[i] = 0;
      } else if (v === 1){
        let burn = false;
        // 4-neighbor
        if (y > 0 && grid[i - COLS] === 2) burn = true;
        else if (y < ROWS-1 && grid[i + COLS] === 2) burn = true;
        else if (x > 0 && grid[i - 1] === 2) burn = true;
        else if (x < COLS-1 && grid[i + 1] === 2) burn = true;
        if (!burn && Math.random() < f) burn = true;
        next[i] = burn ? 2 : 1;
      } else {
        next[i] = Math.random() < p ? 1 : 0;
      }
    }
  }
  const tmp = grid; grid = next; next = tmp;
}

function draw(){
  if (!img || img.width !== COLS || img.height !== ROWS){
    img = ctx.createImageData(COLS, ROWS);
  }
  const d = img.data;
  let trees = 0, burning = 0;
  for (let i = 0; i < grid.length; i++){
    const v = grid[i];
    const j = i * 4;
    if (v === 0){ d[j]=46; d[j+1]=29; d[j+2]=18; d[j+3]=255; }
    else if (v === 1){ d[j]=34; d[j+1]=139; d[j+2]=58; d[j+3]=255; trees++; }
    else { d[j]=255; d[j+1]=120; d[j+2]=30; d[j+3]=255; burning++; }
  }
  // upscale via offscreen
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0,0,W,H);
  // create temp canvas
  const tmp = document.createElement('canvas');
  tmp.width = COLS; tmp.height = ROWS;
  tmp.getContext('2d').putImageData(img, 0, 0);
  const scale = Math.min(W / COLS, H / ROWS);
  const dw = COLS * scale, dh = ROWS * scale;
  const ox = (W - dw)/2, oy = (H - dh)/2;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(tmp, ox, oy, dw, dh);

  document.getElementById('stat').textContent =
    `Trees: ${trees} · Burning: ${burning}`;
  document.getElementById('pVal').textContent =
    parseFloat(document.getElementById('p').value).toFixed(3);
  document.getElementById('fVal').textContent =
    parseFloat(document.getElementById('f').value).toFixed(5);
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}
document.getElementById('reset').onclick = init;
loop();
</script>
</body>
</html>
