<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Life — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Particle Life</h2><p>Six colored particle types with a random rule matrix create emergent life-like clusters and patterns.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="randomize">Randomize Rules</button>
  <button id="reset">Reset</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const NUM_TYPES = 6;
const NUM_PARTICLES = 600;
const COLORS = ['#fbbf24','#ef4444','#10b981','#3b82f6','#a855f7','#ec4899'];
const R_MAX = 80;
const FRICTION = 0.85;
const FORCE_SCALE = 0.5;

let particles = [];
let rules = [];

function makeRules(){
  rules = [];
  for(let i=0;i<NUM_TYPES;i++){
    rules[i] = [];
    for(let j=0;j<NUM_TYPES;j++){
      rules[i][j] = (Math.random()*2 - 1);
    }
  }
}

function makeParticles(){
  particles = [];
  for(let i=0;i<NUM_PARTICLES;i++){
    particles.push({
      x: Math.random()*W,
      y: Math.random()*H,
      vx: 0, vy: 0,
      type: i % NUM_TYPES
    });
  }
}

function force(r, a){
  const beta = 0.3;
  if(r < beta) return r/beta - 1;
  if(r < 1) return a*(1 - Math.abs(2*r - 1 - beta)/(1 - beta));
  return 0;
}

function step(){
  for(let i=0;i<particles.length;i++){
    const p = particles[i];
    let fx=0, fy=0;
    for(let j=0;j<particles.length;j++){
      if(i===j) continue;
      const q = particles[j];
      let dx = q.x - p.x;
      let dy = q.y - p.y;
      // wrap
      if(dx > W*0.5) dx -= W; else if(dx < -W*0.5) dx += W;
      if(dy > H*0.5) dy -= H; else if(dy < -H*0.5) dy += H;
      const d = Math.sqrt(dx*dx + dy*dy);
      if(d > 0 && d < R_MAX){
        const f = force(d/R_MAX, rules[p.type][q.type]);
        fx += dx/d * f;
        fy += dy/d * f;
      }
    }
    p.vx = (p.vx + fx*FORCE_SCALE)*FRICTION;
    p.vy = (p.vy + fy*FORCE_SCALE)*FRICTION;
  }
  for(const p of particles){
    p.x += p.vx;
    p.y += p.vy;
    if(p.x < 0) p.x += W; else if(p.x >= W) p.x -= W;
    if(p.y < 0) p.y += H; else if(p.y >= H) p.y -= H;
  }
}

function draw(){
  ctx.fillStyle = 'rgba(10, 14, 26, 0.18)';
  ctx.fillRect(0,0,W,H);
  for(const p of particles){
    ctx.fillStyle = COLORS[p.type];
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.2, 0, Math.PI*2);
    ctx.fill();
  }
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('randomize').addEventListener('click', makeRules);
document.getElementById('reset').addEventListener('click', () => { makeParticles(); });

makeRules();
makeParticles();
ctx.fillStyle = '#0a0e1a';
ctx.fillRect(0,0,W,H);
loop();
</script>
</body>
</html>
