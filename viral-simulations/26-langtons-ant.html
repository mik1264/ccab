<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Langton's Ant — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .info .stats{margin-top:8px;font-size:12px;color:#cbd5e1;font-family:monospace}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls button.alt{background:rgba(255,255,255,0.1);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)}
  .controls button.alt:hover{background:rgba(251,191,36,0.2)}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:140px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info">
  <h2>Langton's Ant</h2>
  <p>Turing-complete cellular automaton. Ant turns right on white, left on black, flips the cell, moves forward. After ~10,000 steps a "highway" emerges.</p>
  <div class="stats">
    Steps = <span id="steps">0</span><br>
    Ants = <span id="nants">1</span>
  </div>
</div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="play">Pause</button>
  <button id="reset" class="alt">Reset</button>
  <button id="addAnt" class="alt">Add Ant</button>
  <label>Speed (steps/frame)<input type="range" id="speed" min="1" max="500" step="1" value="50"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 250, H = 180;
let grid = new Uint8Array(W*H);
let ants = [];
let stepCount = 0;
let speed = 50;
let playing = true;

const ANT_COLORS = ['#fbbf24','#60a5fa','#f472b6','#34d399','#a78bfa'];
// directions: 0=up,1=right,2=down,3=left
const DX=[0,1,0,-1], DY=[-1,0,1,0];

function reset(){
  grid.fill(0);
  ants = [{x:Math.floor(W/2), y:Math.floor(H/2), d:0, color:ANT_COLORS[0]}];
  stepCount = 0;
}
function addAnt(){
  const i = ants.length % ANT_COLORS.length;
  ants.push({
    x: Math.floor(Math.random()*W),
    y: Math.floor(Math.random()*H),
    d: Math.floor(Math.random()*4),
    color: ANT_COLORS[i]
  });
}
reset();

document.getElementById('reset').onclick = reset;
document.getElementById('addAnt').onclick = addAnt;
document.getElementById('play').onclick = function(){ playing = !playing; this.textContent = playing?'Pause':'Play'; };
document.getElementById('speed').oninput = e=>{ speed = parseInt(e.target.value); };

function stepAnts(){
  for(const ant of ants){
    const idx = ant.y*W + ant.x;
    const cell = grid[idx];
    // turn right on white (0), left on black (1)
    if(cell===0) ant.d = (ant.d+1) % 4;
    else ant.d = (ant.d+3) % 4;
    grid[idx] = 1 - cell;
    ant.x += DX[ant.d];
    ant.y += DY[ant.d];
    // wrap
    if(ant.x<0) ant.x = W-1;
    else if(ant.x>=W) ant.x = 0;
    if(ant.y<0) ant.y = H-1;
    else if(ant.y>=H) ant.y = 0;
  }
  stepCount++;
}

function resize(){
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth+'px';
  canvas.style.height = window.innerHeight+'px';
}
window.addEventListener('resize', resize);
resize();

const off = document.createElement('canvas');
off.width = W; off.height = H;
const octx = off.getContext('2d');

function render(){
  const id = octx.createImageData(W,H);
  const d = id.data;
  for(let i=0;i<W*H;i++){
    if(grid[i]){
      d[i*4] = 230; d[i*4+1] = 230; d[i*4+2] = 220; d[i*4+3] = 255;
    } else {
      d[i*4] = 18; d[i*4+1] = 22; d[i*4+2] = 38; d[i*4+3] = 255;
    }
  }
  octx.putImageData(id,0,0);

  ctx.fillStyle='#0a0e1a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  const scale = Math.min(canvas.width/W, canvas.height/H);
  const dw = W*scale, dh = H*scale;
  const ox = (canvas.width-dw)/2, oy = (canvas.height-dh)/2;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(off, ox, oy, dw, dh);

  // overlay ants
  for(const ant of ants){
    const ax = ox + (ant.x+0.5)*scale;
    const ay = oy + (ant.y+0.5)*scale;
    ctx.fillStyle = ant.color;
    ctx.beginPath();
    ctx.arc(ax, ay, Math.max(2, scale*0.7), 0, Math.PI*2);
    ctx.fill();
  }

  document.getElementById('steps').textContent = stepCount;
  document.getElementById('nants').textContent = ants.length;
}

function loop(){
  if(playing){
    for(let i=0;i<speed;i++) stepAnts();
  }
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
