<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A* Pathfinding — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh;cursor:crosshair}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
  .controls select{background:#1e293b;color:#e8e6e1;border:1px solid #475569;padding:4px 8px;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>A* Pathfinding</h2><p>Drag to paint walls. Use the dropdown to place start/end. Run A* to see open (cyan), closed (purple), and the final path (yellow).</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <select id="mode">
    <option value="wall">Paint walls</option>
    <option value="erase">Erase walls</option>
    <option value="start">Place start</option>
    <option value="end">Place end</option>
  </select>
  <button id="run">Run</button>
  <button id="step">Step</button>
  <button id="clear">Clear walls</button>
  <button id="reset">Reset all</button>
  <span id="stat" style="font-size:12px;color:#cbd5e1"></span>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cell, ox, oy;
const COLS = 60, ROWS = 40;
let grid = [];
let start, end;
let openSet = [];
let closedSet = new Set();
let path = [];
let running = false;
let runHandle = null;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  const availW = W - 40;
  const availH = H - 140;
  cell = Math.min(availW / COLS, availH / ROWS);
  ox = (W - cell*COLS)/2;
  oy = (H - cell*ROWS)/2;
}
window.addEventListener('resize', resize);

function reset(){
  grid = [];
  for(let y=0; y<ROWS; y++){
    const row = [];
    for(let x=0; x<COLS; x++){
      row.push({x, y, wall:false, g:Infinity, f:Infinity, h:0, parent:null, inOpen:false, inClosed:false});
    }
    grid.push(row);
  }
  start = grid[5][5];
  end = grid[ROWS-6][COLS-6];
  openSet = [];
  closedSet = new Set();
  path = [];
  running = false;
  if(runHandle) cancelAnimationFrame(runHandle);
}

function clearWalls(){
  for(const row of grid) for(const c of row) c.wall = false;
  resetSearch();
}

function resetSearch(){
  for(const row of grid){
    for(const c of row){
      c.g = Infinity; c.f = Infinity; c.h = 0; c.parent = null;
      c.inOpen = false; c.inClosed = false;
    }
  }
  openSet = [];
  closedSet = new Set();
  path = [];
}

document.getElementById('reset').addEventListener('click', reset);
document.getElementById('clear').addEventListener('click', clearWalls);

function heuristic(a, b){
  // Octile distance
  const dx = Math.abs(a.x - b.x);
  const dy = Math.abs(a.y - b.y);
  return (dx + dy) + (Math.SQRT2 - 2) * Math.min(dx, dy);
}

function startSearch(){
  resetSearch();
  start.g = 0;
  start.h = heuristic(start, end);
  start.f = start.h;
  start.inOpen = true;
  openSet.push(start);
}

function aStarStep(){
  if(openSet.length === 0) return false;
  // Find lowest f
  let bestIdx = 0;
  for(let i=1; i<openSet.length; i++){
    if(openSet[i].f < openSet[bestIdx].f) bestIdx = i;
  }
  const cur = openSet.splice(bestIdx, 1)[0];
  cur.inOpen = false;
  cur.inClosed = true;
  closedSet.add(cur);

  if(cur === end){
    // Reconstruct
    path = [];
    let p = cur;
    while(p){ path.unshift(p); p = p.parent; }
    return false;
  }

  // 8-direction neighbors
  for(let dy=-1; dy<=1; dy++){
    for(let dx=-1; dx<=1; dx++){
      if(dx===0 && dy===0) continue;
      const nx = cur.x + dx, ny = cur.y + dy;
      if(nx<0||ny<0||nx>=COLS||ny>=ROWS) continue;
      const nb = grid[ny][nx];
      if(nb.wall || nb.inClosed) continue;
      // Disallow diagonal squeezing through walls
      if(dx !== 0 && dy !== 0){
        if(grid[cur.y][nx].wall && grid[ny][cur.x].wall) continue;
      }
      const stepCost = (dx !== 0 && dy !== 0) ? Math.SQRT2 : 1;
      const tentG = cur.g + stepCost;
      if(tentG < nb.g){
        nb.parent = cur;
        nb.g = tentG;
        nb.h = heuristic(nb, end);
        nb.f = nb.g + nb.h;
        if(!nb.inOpen){
          nb.inOpen = true;
          openSet.push(nb);
        }
      }
    }
  }
  return true;
}

document.getElementById('step').addEventListener('click', ()=>{
  if(openSet.length === 0 && path.length === 0) startSearch();
  aStarStep();
});

document.getElementById('run').addEventListener('click', ()=>{
  if(running){ running = false; return; }
  startSearch();
  running = true;
  function tick(){
    if(!running) return;
    for(let s=0; s<6; s++){
      const cont = aStarStep();
      if(!cont){ running = false; break; }
    }
    if(running) runHandle = requestAnimationFrame(tick);
  }
  tick();
});

// Mouse interaction
let mouseDown = false;
canvas.addEventListener('mousedown', (e)=>{ mouseDown = true; handleMouse(e); });
canvas.addEventListener('mousemove', (e)=>{ if(mouseDown) handleMouse(e); });
canvas.addEventListener('mouseup', ()=> mouseDown = false);
canvas.addEventListener('mouseleave', ()=> mouseDown = false);

function handleMouse(e){
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const gx = Math.floor((mx - ox) / cell);
  const gy = Math.floor((my - oy) / cell);
  if(gx<0||gy<0||gx>=COLS||gy>=ROWS) return;
  const c = grid[gy][gx];
  const mode = document.getElementById('mode').value;
  if(mode === 'wall'){
    if(c !== start && c !== end) c.wall = true;
  } else if(mode === 'erase'){
    c.wall = false;
  } else if(mode === 'start'){
    if(!c.wall && c !== end){ start = c; resetSearch(); }
  } else if(mode === 'end'){
    if(!c.wall && c !== start){ end = c; resetSearch(); }
  }
}

function draw(){
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0,0,W,H);

  for(let y=0; y<ROWS; y++){
    for(let x=0; x<COLS; x++){
      const c = grid[y][x];
      const px = ox + x*cell;
      const py = oy + y*cell;
      let color = '#1e293b';
      if(c.wall) color = '#475569';
      else if(c.inClosed) color = '#7c3aed';
      else if(c.inOpen) color = '#06b6d4';
      ctx.fillStyle = color;
      ctx.fillRect(px+0.5, py+0.5, cell-1, cell-1);
    }
  }

  // Path
  if(path.length){
    ctx.fillStyle = '#fbbf24';
    for(const c of path){
      ctx.fillRect(ox + c.x*cell + 0.5, oy + c.y*cell + 0.5, cell-1, cell-1);
    }
  }

  // Start/end
  ctx.fillStyle = '#22c55e';
  ctx.fillRect(ox + start.x*cell, oy + start.y*cell, cell, cell);
  ctx.fillStyle = '#ec4899';
  ctx.fillRect(ox + end.x*cell, oy + end.y*cell, cell, cell);

  document.getElementById('stat').textContent =
    `Open: ${openSet.length}  Closed: ${closedSet.size}  Path: ${path.length}`;
}

function loop(){
  draw();
  requestAnimationFrame(loop);
}

resize();
reset();
loop();
</script>
</body>
</html>
