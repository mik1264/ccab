<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Generation — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Recursive Backtracking Maze</h2><p>Depth-first search carves the maze. Then BFS solves it from top-left to bottom-right.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="newmaze">New Maze</button>
  <label>Speed <input type="range" id="speed" min="1" max="40" step="1" value="10"></label>
  <span id="phase" style="font-size:12px;color:#cbd5e1">Phase: -</span>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cell, ox, oy;
const COLS = 50, ROWS = 30;

let grid = [];
let stack = [];
let current = null;
let phase = 'carve'; // carve, solve, done
let solver = null;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  const availW = W - 60;
  const availH = H - 140;
  cell = Math.min(availW / COLS, availH / ROWS);
  ox = (W - cell*COLS)/2;
  oy = (H - cell*ROWS)/2;
}
window.addEventListener('resize', resize);

function newMaze(){
  grid = [];
  for(let y=0; y<ROWS; y++){
    const row = [];
    for(let x=0; x<COLS; x++){
      row.push({
        x, y,
        walls: {n:true, e:true, s:true, w:true},
        visited: false,
        inPath: false,
        inOpen: false,
        inClosed: false
      });
    }
    grid.push(row);
  }
  stack = [];
  current = grid[0][0];
  current.visited = true;
  stack.push(current);
  phase = 'carve';
  solver = null;
  document.getElementById('phase').textContent = 'Phase: carving';
}

document.getElementById('newmaze').addEventListener('click', newMaze);

function neighbors(c){
  const n = [];
  if(c.y > 0 && !grid[c.y-1][c.x].visited) n.push({c:grid[c.y-1][c.x], dir:'n'});
  if(c.x < COLS-1 && !grid[c.y][c.x+1].visited) n.push({c:grid[c.y][c.x+1], dir:'e'});
  if(c.y < ROWS-1 && !grid[c.y+1][c.x].visited) n.push({c:grid[c.y+1][c.x], dir:'s'});
  if(c.x > 0 && !grid[c.y][c.x-1].visited) n.push({c:grid[c.y][c.x-1], dir:'w'});
  return n;
}

function carveStep(){
  if(stack.length === 0){
    phase = 'solve';
    document.getElementById('phase').textContent = 'Phase: solving';
    initSolver();
    return;
  }
  current = stack[stack.length-1];
  const opts = neighbors(current);
  if(opts.length === 0){
    stack.pop();
    return;
  }
  const choice = opts[Math.floor(Math.random()*opts.length)];
  // Knock down wall
  current.walls[choice.dir] = false;
  const opp = {n:'s', s:'n', e:'w', w:'e'};
  choice.c.walls[opp[choice.dir]] = false;
  choice.c.visited = true;
  stack.push(choice.c);
}

function passable(a, b){
  if(a.x === b.x && a.y === b.y-1) return !a.walls.s;
  if(a.x === b.x && a.y === b.y+1) return !a.walls.n;
  if(a.y === b.y && a.x === b.x-1) return !a.walls.e;
  if(a.y === b.y && a.x === b.x+1) return !a.walls.w;
  return false;
}

function initSolver(){
  // BFS
  const start = grid[0][0];
  const goal = grid[ROWS-1][COLS-1];
  start.inOpen = true;
  solver = {
    queue: [start],
    parents: new Map(),
    goal,
    done: false,
    pathDrawn: false,
    pathIdx: 0,
    pathCells: []
  };
  solver.parents.set(start, null);
}

function solveStep(){
  if(!solver) return;
  if(solver.pathDrawn){
    if(solver.pathIdx < solver.pathCells.length){
      solver.pathCells[solver.pathIdx].inPath = true;
      solver.pathIdx++;
    } else {
      phase = 'done';
      document.getElementById('phase').textContent = 'Phase: solved';
    }
    return;
  }
  if(solver.queue.length === 0){
    phase = 'done';
    document.getElementById('phase').textContent = 'Phase: no path';
    return;
  }
  const c = solver.queue.shift();
  c.inOpen = false;
  c.inClosed = true;
  if(c === solver.goal){
    // Reconstruct
    let cur = c;
    const path = [];
    while(cur){
      path.unshift(cur);
      cur = solver.parents.get(cur);
    }
    solver.pathCells = path;
    solver.pathDrawn = true;
    return;
  }
  const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
  for(const [dx,dy] of dirs){
    const nx = c.x + dx, ny = c.y + dy;
    if(nx<0||ny<0||nx>=COLS||ny>=ROWS) continue;
    const nb = grid[ny][nx];
    if(!passable(c, nb)) continue;
    if(solver.parents.has(nb)) continue;
    solver.parents.set(nb, c);
    nb.inOpen = true;
    solver.queue.push(nb);
  }
}

function draw(){
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0,0,W,H);

  for(let y=0; y<ROWS; y++){
    for(let x=0; x<COLS; x++){
      const c = grid[y][x];
      const px = ox + x*cell;
      const py = oy + y*cell;
      // Background
      if(c.inPath){
        ctx.fillStyle = '#fbbf24';
        ctx.fillRect(px, py, cell, cell);
      } else if(c.inClosed){
        ctx.fillStyle = '#7c3aed';
        ctx.globalAlpha = 0.45;
        ctx.fillRect(px, py, cell, cell);
        ctx.globalAlpha = 1;
      } else if(c.inOpen){
        ctx.fillStyle = '#06b6d4';
        ctx.globalAlpha = 0.5;
        ctx.fillRect(px, py, cell, cell);
        ctx.globalAlpha = 1;
      } else if(c.visited && phase === 'carve'){
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(px, py, cell, cell);
      } else if(c.visited){
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(px, py, cell, cell);
      }
      // Walls
      ctx.strokeStyle = '#cbd5e1';
      ctx.lineWidth = 1.5;
      if(c.walls.n){ ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+cell,py); ctx.stroke(); }
      if(c.walls.e){ ctx.beginPath(); ctx.moveTo(px+cell,py); ctx.lineTo(px+cell,py+cell); ctx.stroke(); }
      if(c.walls.s){ ctx.beginPath(); ctx.moveTo(px,py+cell); ctx.lineTo(px+cell,py+cell); ctx.stroke(); }
      if(c.walls.w){ ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py+cell); ctx.stroke(); }
    }
  }

  // Current carving cell
  if(phase === 'carve' && current){
    const px = ox + current.x*cell;
    const py = oy + current.y*cell;
    ctx.fillStyle = '#ef4444';
    ctx.fillRect(px+2, py+2, cell-4, cell-4);
  }

  // Start/end markers
  ctx.fillStyle = '#22c55e';
  ctx.fillRect(ox+2, oy+2, cell-4, cell-4);
  ctx.fillStyle = '#ec4899';
  ctx.fillRect(ox + (COLS-1)*cell + 2, oy + (ROWS-1)*cell + 2, cell-4, cell-4);
}

function loop(){
  const speed = parseInt(document.getElementById('speed').value);
  for(let s=0; s<speed; s++){
    if(phase === 'carve') carveStep();
    else if(phase === 'solve') solveStep();
  }
  draw();
  requestAnimationFrame(loop);
}

resize();
newMaze();
loop();
</script>
</body>
</html>
