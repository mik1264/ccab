<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorenz Attractor — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .info .stats{margin-top:8px;font-size:12px;color:#cbd5e1;font-family:monospace}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:140px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info">
  <h2>Lorenz Attractor</h2>
  <p>Strange attractor of dx/dt=σ(y-x), dy/dt=x(ρ-z)-y, dz/dt=xy-βz. Integrated by RK4 with σ=10, ρ=28, β=8/3.</p>
  <div class="stats">
    Points = <span id="np">0</span><br>
    Speed = <span id="sp">1.0</span>x
  </div>
</div>
<canvas id="c"></canvas>
<div class="controls">
  <label>Speed<input type="range" id="speed" min="0.2" max="3" step="0.1" value="1"></label>
  <label>Rotation<input type="range" id="rot" min="0" max="2" step="0.05" value="0.4"></label>
  <button id="reset">Reset</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const sigma=10, rho=28, beta=8/3;
let x=0.1, y=0, z=0;
const MAX_POINTS = 5000;
const points = []; // {x,y,z,v}
let dt = 0.005;
let speedMul = 1.0;
let rotSpeed = 0.4;
let theta = 0;

document.getElementById('speed').oninput = e => { speedMul = parseFloat(e.target.value); document.getElementById('sp').textContent = speedMul.toFixed(1); };
document.getElementById('rot').oninput = e => { rotSpeed = parseFloat(e.target.value); };
document.getElementById('reset').onclick = () => { x=0.1+(Math.random()-0.5)*0.2; y=0; z=0; points.length=0; };

function deriv(x,y,z){
  return [sigma*(y-x), x*(rho-z)-y, x*y-beta*z];
}
function rk4Step(){
  const k1 = deriv(x,y,z);
  const k2 = deriv(x+dt/2*k1[0], y+dt/2*k1[1], z+dt/2*k1[2]);
  const k3 = deriv(x+dt/2*k2[0], y+dt/2*k2[1], z+dt/2*k2[2]);
  const k4 = deriv(x+dt*k3[0], y+dt*k3[1], z+dt*k3[2]);
  const dx = (k1[0]+2*k2[0]+2*k3[0]+k4[0])/6;
  const dy = (k1[1]+2*k2[1]+2*k3[1]+k4[1])/6;
  const dz = (k1[2]+2*k2[2]+2*k3[2]+k4[2])/6;
  x += dt*dx; y += dt*dy; z += dt*dz;
  const v = Math.sqrt(dx*dx+dy*dy+dz*dz);
  points.push({x,y,z,v});
  if(points.length>MAX_POINTS) points.shift();
}

function resize(){
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth+'px';
  canvas.style.height = window.innerHeight+'px';
}
window.addEventListener('resize', resize);
resize();

function project(px,py,pz, phi, tilt){
  // rotate around vertical (z) axis by phi
  const cs = Math.cos(phi), sn = Math.sin(phi);
  let rx = cs*px - sn*py;
  let ry = sn*px + cs*py;
  let rz = pz;
  // small fixed tilt around x axis
  const ct = Math.cos(tilt), st = Math.sin(tilt);
  const yt = ct*ry - st*rz;
  const zt = st*ry + ct*rz;
  return [rx, yt, zt];
}

function loop(){
  // integrate substeps based on speed
  const sub = Math.max(1, Math.floor(speedMul*4));
  for(let s=0;s<sub;s++) rk4Step();

  theta += 0.0035*rotSpeed;

  // fade trail
  ctx.fillStyle = 'rgba(10,14,26,0.18)';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width/2, cy = canvas.height/2;
  const scale = Math.min(canvas.width, canvas.height)/70;
  const tilt = 0.45;

  // draw points
  let prev = null;
  for(let i=0;i<points.length;i++){
    const p = points[i];
    const [px,py,pz] = project(p.x, p.y, p.z-25, theta, tilt);
    const sx = cx + px*scale;
    const sy = cy - pz*scale;
    if(prev){
      const age = i/points.length;
      const v = Math.min(1, p.v/40);
      const r = Math.floor(120 + v*135);
      const g = Math.floor(80 + age*120);
      const b = Math.floor(220 - v*100);
      ctx.strokeStyle = `rgba(${r},${g},${b},${0.2+age*0.8})`;
      ctx.lineWidth = 1.2 + age*1.5;
      ctx.beginPath();
      ctx.moveTo(prev.sx, prev.sy);
      ctx.lineTo(sx, sy);
      ctx.stroke();
    }
    prev = {sx, sy};
  }

  // head dot
  if(prev){
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.arc(prev.sx, prev.sy, 3.2, 0, Math.PI*2);
    ctx.fill();
  }

  document.getElementById('np').textContent = points.length;
  requestAnimationFrame(loop);
}
ctx.fillStyle='#0a0e1a';
ctx.fillRect(0,0,canvas.width,canvas.height);
loop();
</script>
</body>
</html>
