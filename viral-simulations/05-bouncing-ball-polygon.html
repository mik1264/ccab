<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball in Rotating Polygon — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Ball in Rotating Polygon</h2><p>Gravity pulls the ball; it reflects off rotating polygon walls using line-segment normals.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset Ball</button>
  <label>Sides <input type="range" id="sides" min="3" max="12" value="6"></label>
  <label>Rotation <input type="range" id="rot" min="-100" max="100" value="20"></label>
  <label>Gravity <input type="range" id="grav" min="0" max="100" value="40"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let sides = 6;
let polyAngle = 0;
let rotSpeed = 0.005;
let gravity = 0.25;

let ball = { x: 0, y: 0, vx: 4, vy: 0, r: 14 };
function resetBall(){
  ball.x = W/2 + 30;
  ball.y = H/2 - 100;
  ball.vx = 4;
  ball.vy = 0;
}
resetBall();

const trail = [];

function polyVerts(){
  const cx = W/2, cy = H/2;
  const radius = Math.min(W, H) * 0.4;
  const verts = [];
  for(let i=0;i<sides;i++){
    const a = polyAngle + (i / sides) * Math.PI*2;
    verts.push({ x: cx + Math.cos(a)*radius, y: cy + Math.sin(a)*radius });
  }
  return verts;
}

function reflect(b, p1, p2){
  // wall vector
  const wx = p2.x - p1.x, wy = p2.y - p1.y;
  const wlen = Math.sqrt(wx*wx + wy*wy);
  // inward normal: assume polygon center is to the right of (p1->p2). Compute properly.
  const cx = W/2, cy = H/2;
  // normal candidates
  let nx = -wy/wlen, ny = wx/wlen;
  // ensure normal points toward center
  const mx = (p1.x + p2.x)/2, my = (p1.y + p2.y)/2;
  if((cx - mx)*nx + (cy - my)*ny < 0){ nx = -nx; ny = -ny; }
  // signed distance from point to line (positive on side of inward normal)
  const dist = (b.x - p1.x)*nx + (b.y - p1.y)*ny;
  // ball center should be at dist >= ball.r (relative to inward normal)... actually distance from line, ball must be on inside (dist > 0) and >= r away
  if(dist < b.r){
    // check if projection within segment
    const tx = b.x - p1.x, ty = b.y - p1.y;
    const t = (tx*wx + ty*wy)/(wlen*wlen);
    if(t < 0 || t > 1) return false;
    // wall velocity at contact point (rotation)
    const px = p1.x + t*wx, py = p1.y + t*wy;
    const rx = px - cx, ry = py - cy;
    const wallVx = -ry * rotSpeed;
    const wallVy = rx * rotSpeed;
    // relative velocity
    const rvx = b.vx - wallVx, rvy = b.vy - wallVy;
    const vdotn = rvx*nx + rvy*ny;
    if(vdotn < 0){
      const restitution = 1.0;
      const jx = -(1+restitution) * vdotn * nx;
      const jy = -(1+restitution) * vdotn * ny;
      b.vx += jx;
      b.vy += jy;
    }
    // push out
    const overlap = b.r - dist + 0.5;
    b.x += nx * overlap;
    b.y += ny * overlap;
    return true;
  }
  return false;
}

function step(){
  ball.vy += gravity;
  ball.x += ball.vx;
  ball.y += ball.vy;
  // rotate poly
  polyAngle += rotSpeed;
  // collide with each edge
  const verts = polyVerts();
  for(let iter=0;iter<3;iter++){
    let collided = false;
    for(let i=0;i<verts.length;i++){
      if(reflect(ball, verts[i], verts[(i+1)%verts.length])){
        collided = true;
      }
    }
    if(!collided) break;
  }
  trail.push({x: ball.x, y: ball.y});
  if(trail.length > 80) trail.shift();
}

function draw(){
  ctx.fillStyle = 'rgba(10, 14, 26, 0.18)';
  ctx.fillRect(0,0,W,H);
  // polygon
  const verts = polyVerts();
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(verts[0].x, verts[0].y);
  for(let i=1;i<verts.length;i++){
    ctx.lineTo(verts[i].x, verts[i].y);
  }
  ctx.closePath();
  ctx.stroke();
  // trail
  for(let i=0;i<trail.length;i++){
    const t = i/trail.length;
    ctx.fillStyle = `rgba(251, 191, 36, ${t*0.5})`;
    ctx.beginPath();
    ctx.arc(trail[i].x, trail[i].y, ball.r * (0.3 + t*0.7), 0, Math.PI*2);
    ctx.fill();
  }
  // ball
  const grd = ctx.createRadialGradient(ball.x - 4, ball.y - 4, 1, ball.x, ball.y, ball.r);
  grd.addColorStop(0, '#fef9c3');
  grd.addColorStop(1, '#f59e0b');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fill();
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('reset').addEventListener('click', resetBall);
document.getElementById('sides').addEventListener('input', e => { sides = parseInt(e.target.value); });
document.getElementById('rot').addEventListener('input', e => { rotSpeed = parseFloat(e.target.value)/4000; });
document.getElementById('grav').addEventListener('input', e => { gravity = parseFloat(e.target.value)/160; });

ctx.fillStyle = '#0a0e1a';
ctx.fillRect(0,0,W,H);
loop();
</script>
</body>
</html>
