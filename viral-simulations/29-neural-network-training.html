<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Network Training — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
  .controls select{background:#1a1f2e;color:#e8e6e1;border:1px solid #334155;padding:4px 8px;border-radius:4px;font-size:12px}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Neural Network Training</h2><p>MLP (2-6-4-1) trained on 2D data with manual SGD backprop. Watch the decision boundary form.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset</button>
  <button id="toggle">Pause</button>
  <label>Dataset <select id="dataset"><option value="moons">Two Moons</option><option value="spiral">Spiral</option><option value="circles">Circles</option></select></label>
  <label>LR <input type="range" id="lr" min="1" max="100" value="30"></label>
  <span id="status" style="font-size:12px;color:#94a3b8"></span>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}resize();addEventListener('resize',resize);

const ARCH=[2,6,4,1];
let weights=[],biases=[],data=[],lossHistory=[],epoch=0,running=true;
let lr=0.03;

function rand(){return Math.random()*2-1}
function sigmoid(x){return 1/(1+Math.exp(-x))}
function tanh(x){return Math.tanh(x)}
function dtanh(y){return 1-y*y}

function initNet(){
  weights=[];biases=[];
  for(let l=0;l<ARCH.length-1;l++){
    const w=[],b=[];
    const scale=Math.sqrt(2/ARCH[l]);
    for(let j=0;j<ARCH[l+1];j++){
      const row=[];
      for(let i=0;i<ARCH[l];i++) row.push(rand()*scale);
      w.push(row);b.push(0);
    }
    weights.push(w);biases.push(b);
  }
}

function forward(x){
  const acts=[x];
  for(let l=0;l<weights.length;l++){
    const a=[];
    for(let j=0;j<weights[l].length;j++){
      let s=biases[l][j];
      for(let i=0;i<weights[l][j].length;i++) s+=weights[l][j][i]*acts[l][i];
      a.push(l===weights.length-1?sigmoid(s):tanh(s));
    }
    acts.push(a);
  }
  return acts;
}

function backward(acts,y){
  const grads_w=weights.map(layer=>layer.map(row=>row.map(()=>0)));
  const grads_b=biases.map(layer=>layer.map(()=>0));
  const L=weights.length;
  // output delta (binary cross-entropy with sigmoid)
  let delta=[acts[L][0]-y];
  for(let l=L-1;l>=0;l--){
    for(let j=0;j<weights[l].length;j++){
      grads_b[l][j]+=delta[j];
      for(let i=0;i<weights[l][j].length;i++) grads_w[l][j][i]+=delta[j]*acts[l][i];
    }
    if(l>0){
      const newDelta=new Array(weights[l-1].length).fill(0);
      for(let i=0;i<weights[l-1].length;i++){
        let s=0;
        for(let j=0;j<weights[l].length;j++) s+=weights[l][j][i]*delta[j];
        newDelta[i]=s*dtanh(acts[l][i]);
      }
      delta=newDelta;
    }
  }
  return {grads_w,grads_b};
}

function trainStep(){
  let totalLoss=0;
  // shuffle indices
  const idx=data.map((_,i)=>i);
  for(let i=idx.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idx[i],idx[j]]=[idx[j],idx[i]]}
  // mini-batch SGD
  const batchSize=16;
  for(let b=0;b<idx.length;b+=batchSize){
    const accW=weights.map(layer=>layer.map(row=>row.map(()=>0)));
    const accB=biases.map(layer=>layer.map(()=>0));
    let count=0;
    for(let k=b;k<Math.min(b+batchSize,idx.length);k++){
      const d=data[idx[k]];
      const acts=forward([d.x,d.y]);
      const yhat=acts[acts.length-1][0];
      const eps=1e-7;
      totalLoss-=(d.label*Math.log(yhat+eps)+(1-d.label)*Math.log(1-yhat+eps));
      const {grads_w,grads_b}=backward(acts,d.label);
      for(let l=0;l<weights.length;l++)
        for(let j=0;j<weights[l].length;j++){
          accB[l][j]+=grads_b[l][j];
          for(let i=0;i<weights[l][j].length;i++) accW[l][j][i]+=grads_w[l][j][i];
        }
      count++;
    }
    for(let l=0;l<weights.length;l++)
      for(let j=0;j<weights[l].length;j++){
        biases[l][j]-=lr*accB[l][j]/count;
        for(let i=0;i<weights[l][j].length;i++) weights[l][j][i]-=lr*accW[l][j][i]/count;
      }
  }
  return totalLoss/data.length;
}

function genData(type){
  data=[];
  const N=200;
  if(type==='moons'){
    for(let i=0;i<N;i++){
      const t=Math.random()*Math.PI;
      const noise=()=>(Math.random()-0.5)*0.2;
      data.push({x:Math.cos(t)+noise(),y:Math.sin(t)+noise(),label:0});
      data.push({x:1-Math.cos(t)+noise(),y:0.5-Math.sin(t)+noise(),label:1});
    }
  } else if(type==='spiral'){
    for(let i=0;i<N;i++){
      for(let c=0;c<2;c++){
        const r=i/N*1.2;
        const t=1.5*i/N*2*Math.PI+c*Math.PI;
        data.push({x:r*Math.sin(t)+(Math.random()-0.5)*0.1,y:r*Math.cos(t)+(Math.random()-0.5)*0.1,label:c});
      }
    }
  } else {
    for(let i=0;i<N;i++){
      const a=Math.random()*Math.PI*2;
      const r1=Math.random()*0.4;
      data.push({x:Math.cos(a)*r1,y:Math.sin(a)*r1,label:0});
      const r2=0.7+Math.random()*0.3;
      data.push({x:Math.cos(a)*r2,y:Math.sin(a)*r2,label:1});
    }
  }
  // normalize
  let mx=0,my=0;
  data.forEach(d=>{mx+=d.x;my+=d.y});mx/=data.length;my/=data.length;
  data.forEach(d=>{d.x-=mx;d.y-=my});
}

function colorBoundary(p){
  // p is 0..1
  const r=Math.round(255*(1-p)+50*p);
  const g=Math.round(140*(1-p)+90*p);
  const b=Math.round(80*(1-p)+220*p);
  return [r,g,b];
}

function draw(){
  ctx.fillStyle='#0a0e1a';ctx.fillRect(0,0,W,H);
  const pad=20;
  // 3 panels: left = data+boundary, top right = network, bottom right = loss
  const leftW=Math.min(W*0.55,H-2*pad);
  const leftX=pad,leftY=(H-leftW)/2;
  const rightX=leftX+leftW+pad,rightW=W-rightX-pad;
  const netH=H*0.55,lossH=H-netH-3*pad;

  // decision boundary (downsampled grid)
  const gridSize=60;
  const cellW=leftW/gridSize;
  const range=2;
  for(let gy=0;gy<gridSize;gy++){
    for(let gx=0;gx<gridSize;gx++){
      const x=(gx/gridSize-0.5)*range*2;
      const y=(gy/gridSize-0.5)*range*2;
      const out=forward([x,y]);
      const p=out[out.length-1][0];
      const [r,g,b]=colorBoundary(p);
      ctx.fillStyle=`rgb(${r},${g},${b})`;
      ctx.fillRect(leftX+gx*cellW,leftY+gy*cellW,cellW+1,cellW+1);
    }
  }
  // data points
  data.forEach(d=>{
    const px=leftX+(d.x/range/2+0.5)*leftW;
    const py=leftY+(d.y/range/2+0.5)*leftW;
    ctx.fillStyle=d.label===1?'#1e3a8a':'#fbbf24';
    ctx.strokeStyle='#fff';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(px,py,3.5,0,Math.PI*2);ctx.fill();ctx.stroke();
  });
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;
  ctx.strokeRect(leftX,leftY,leftW,leftW);
  ctx.fillStyle='#fbbf24';ctx.font='13px sans-serif';
  ctx.fillText('Decision Boundary',leftX,leftY-6);

  // network architecture
  if(rightW>120){
    const nx=rightX,ny=pad+20,nw=rightW,nh=netH;
    ctx.fillStyle='#fbbf24';ctx.font='13px sans-serif';
    ctx.fillText('Network',nx,ny-6);
    const layerX=ARCH.map((_,l)=>nx+20+l/(ARCH.length-1)*(nw-40));
    const nodePos=ARCH.map((n,l)=>{
      const arr=[];
      for(let i=0;i<n;i++){
        const yy=ny+20+(i+0.5)/n*(nh-40);
        arr.push({x:layerX[l],y:yy});
      }
      return arr;
    });
    // edges
    for(let l=0;l<weights.length;l++){
      for(let j=0;j<weights[l].length;j++){
        for(let i=0;i<weights[l][j].length;i++){
          const w=weights[l][j][i];
          const t=Math.min(Math.abs(w)/2,1);
          ctx.strokeStyle=w>0?`rgba(251,191,36,${0.15+t*0.8})`:`rgba(96,165,250,${0.15+t*0.8})`;
          ctx.lineWidth=0.3+t*2.5;
          ctx.beginPath();
          ctx.moveTo(nodePos[l][i].x,nodePos[l][i].y);
          ctx.lineTo(nodePos[l+1][j].x,nodePos[l+1][j].y);
          ctx.stroke();
        }
      }
    }
    // nodes
    nodePos.forEach((layer)=>{
      layer.forEach(p=>{
        ctx.fillStyle='#1e293b';ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(p.x,p.y,8,0,Math.PI*2);ctx.fill();ctx.stroke();
      });
    });
  }

  // loss curve
  if(rightW>120 && lossHistory.length>1){
    const lx=rightX,ly=pad+netH+pad,lw=rightW,lh=lossH;
    ctx.fillStyle='#fbbf24';ctx.font='13px sans-serif';
    ctx.fillText('Loss',lx,ly-6);
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
    ctx.strokeRect(lx,ly,lw,lh);
    const maxL=Math.max(...lossHistory),minL=Math.min(...lossHistory);
    const rng=maxL-minL||1;
    ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.beginPath();
    lossHistory.forEach((v,i)=>{
      const x=lx+i/(lossHistory.length-1)*lw;
      const y=ly+lh-(v-minL)/rng*(lh-10)-5;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
    ctx.fillStyle='#cbd5e1';ctx.font='11px monospace';
    ctx.fillText('loss: '+lossHistory[lossHistory.length-1].toFixed(4),lx+6,ly+14);
  }
}

function loop(){
  if(running){
    const loss=trainStep();
    epoch++;
    lossHistory.push(loss);
    if(lossHistory.length>200) lossHistory.shift();
    document.getElementById('status').textContent=`epoch ${epoch}`;
  }
  draw();
  requestAnimationFrame(loop);
}

function reset(){
  initNet();
  genData(document.getElementById('dataset').value);
  lossHistory=[];epoch=0;
}

document.getElementById('reset').onclick=reset;
document.getElementById('toggle').onclick=e=>{running=!running;e.target.textContent=running?'Pause':'Resume'};
document.getElementById('dataset').onchange=reset;
document.getElementById('lr').oninput=e=>{lr=e.target.value/1000};

reset();loop();
</script>
</body>
</html>
