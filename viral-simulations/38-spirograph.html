<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spirograph (Hypotrochoid) - Viral Simulations - CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Spirograph</h2><p>Hypotrochoid: a small circle of radius r rolls inside a fixed circle R, with a pen at distance d from the small circle's center. Tracks parametric curves.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <label>Outer R <span id="Rval">220</span>
    <input type="range" id="R" min="80" max="400" value="220">
  </label>
  <label>Inner r <span id="rval">75</span>
    <input type="range" id="r" min="10" max="200" value="75">
  </label>
  <label>Pen d <span id="dval">100</span>
    <input type="range" id="d" min="5" max="220" value="100">
  </label>
  <button id="random">Random Preset</button>
  <button id="clear">Clear</button>
</div>
<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W,H,cx,cy;
  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W/2; cy = H/2;
    redrawTrace();
  }
  window.addEventListener('resize', resize);

  let R = 220, r = 75, d = 100;
  let theta = 0;
  let trace = [];
  let hue = 200;
  const maxTrace = 8000;

  function point(t){
    const k = R - r;
    const x = cx + k*Math.cos(t) + d*Math.cos(k*t/r);
    const y = cy + k*Math.sin(t) - d*Math.sin(k*t/r);
    return {x, y};
  }

  function redrawTrace(){
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0,0,W,H);
    if(trace.length>1){
      for(let i=1;i<trace.length;i++){
        const a = trace[i-1], b = trace[i];
        ctx.strokeStyle = `hsl(${b.h},80%,60%)`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.stroke();
      }
    }
  }

  function step(dt){
    const speed = 2.5;
    const sub = 6;
    for(let s=0;s<sub;s++){
      theta += speed*dt/sub;
      const p = point(theta);
      hue = (hue + 0.05) % 360;
      trace.push({x:p.x, y:p.y, h:hue});
      if(trace.length>maxTrace) trace.shift();
    }
  }

  function draw(){
    ctx.fillStyle = 'rgba(10,14,26,0.18)';
    ctx.fillRect(0,0,W,H);

    // redraw trace fully every frame for clarity
    if(trace.length>1){
      ctx.lineWidth = 1.5;
      for(let i=1;i<trace.length;i++){
        const a = trace[i-1], b = trace[i];
        const alpha = i/trace.length;
        ctx.strokeStyle = `hsla(${b.h},80%,60%,${alpha})`;
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);
        ctx.lineTo(b.x,b.y);
        ctx.stroke();
      }
    }

    // outer circle
    ctx.strokeStyle = 'rgba(251,191,36,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.stroke();

    // inner circle position
    const k = R - r;
    const ix = cx + k*Math.cos(theta);
    const iy = cy + k*Math.sin(theta);
    ctx.strokeStyle = 'rgba(251,191,36,0.8)';
    ctx.beginPath();
    ctx.arc(ix,iy,r,0,Math.PI*2);
    ctx.stroke();

    // pen tip
    const p = point(theta);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.moveTo(ix,iy);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();

    // pen dot
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.arc(p.x,p.y,5,0,Math.PI*2);
    ctx.fill();
    // inner circle center
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.arc(ix,iy,3,0,Math.PI*2);
    ctx.fill();
  }

  let last = performance.now();
  function loop(t){
    const dt = Math.min(0.05,(t-last)/1000);
    last = t;
    step(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function clearTrace(){
    trace = [];
    theta = 0;
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0,0,W,H);
  }

  document.getElementById('clear').onclick = clearTrace;
  document.getElementById('random').onclick = ()=>{
    R = 100 + Math.floor(Math.random()*300);
    r = 10 + Math.floor(Math.random()*Math.min(190, R-20));
    d = 5 + Math.floor(Math.random()*Math.min(220, R-5));
    document.getElementById('R').value = R;
    document.getElementById('r').value = r;
    document.getElementById('d').value = d;
    document.getElementById('Rval').textContent = R;
    document.getElementById('rval').textContent = r;
    document.getElementById('dval').textContent = d;
    clearTrace();
  };

  function bind(id, key){
    const el = document.getElementById(id);
    const lbl = document.getElementById(id+'val');
    el.oninput = ()=>{
      const v = parseFloat(el.value);
      if(id==='R') R = v;
      else if(id==='r') r = v;
      else d = v;
      lbl.textContent = v;
      clearTrace();
    };
  }
  bind('R'); bind('r'); bind('d');

  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
