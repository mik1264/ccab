<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Function Collapse — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Wave Function Collapse</h2><p>Tile-based WFC: pick the lowest-entropy cell, collapse to a random valid tile, propagate constraints to neighbors.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Regenerate</button>
  <label>Speed <input id="speed" type="range" min="1" max="40" step="1" value="8"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();
addEventListener('resize',resize);

// Edge types: 0 = empty, 1 = line
// Tile edges in order: [N, E, S, W]
const TILES = [
  {edges:[0,0,0,0], name:'empty'},
  {edges:[1,1,1,1], name:'cross'},
  {edges:[1,0,1,0], name:'vert'},
  {edges:[0,1,0,1], name:'horiz'},
  {edges:[1,1,0,0], name:'NE'},
  {edges:[0,1,1,0], name:'SE'},
  {edges:[0,0,1,1], name:'SW'},
  {edges:[1,0,0,1], name:'NW'},
  {edges:[1,1,1,0], name:'T-W'},
  {edges:[1,1,0,1], name:'T-S'},
  {edges:[1,0,1,1], name:'T-E'},
  {edges:[0,1,1,1], name:'T-N'},
];

const COLS = 40, ROWS = 25;
let grid = [];
let speed = 8;

function init(){
  grid = [];
  for (let i = 0; i < COLS*ROWS; i++){
    grid.push({collapsed: false, options: TILES.map((_,k)=>k)});
  }
}

function valid(tileIdx, dir, neighborTileIdx){
  // dir: 0=N, 1=E, 2=S, 3=W (from current cell perspective)
  const opp = (dir + 2) % 4;
  return TILES[tileIdx].edges[dir] === TILES[neighborTileIdx].edges[opp];
}

function pickLowestEntropy(){
  let min = Infinity, candidates = [];
  for (let i = 0; i < grid.length; i++){
    if (grid[i].collapsed) continue;
    const e = grid[i].options.length;
    if (e === 0) return null;
    if (e < min){ min = e; candidates = [i]; }
    else if (e === min) candidates.push(i);
  }
  if (candidates.length === 0) return null;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function collapseStep(){
  const idx = pickLowestEntropy();
  if (idx === null) return false;
  const cell = grid[idx];
  if (cell.options.length === 0) return false;
  const choice = cell.options[Math.floor(Math.random() * cell.options.length)];
  cell.options = [choice];
  cell.collapsed = true;

  // Propagate via BFS
  const queue = [idx];
  while (queue.length > 0){
    const cur = queue.shift();
    const cx = cur % COLS, cy = (cur / COLS) | 0;
    const dirs = [[0,-1,0],[1,0,1],[0,1,2],[-1,0,3]];
    for (const [dx, dy, d] of dirs){
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
      const ni = ny * COLS + nx;
      const ncell = grid[ni];
      if (ncell.collapsed) continue;
      const before = ncell.options.length;
      ncell.options = ncell.options.filter(opt => {
        return cell.options.some(co => valid(co, d, opt));
      });
      if (ncell.options.length < before){
        if (ncell.options.length === 1) ncell.collapsed = true;
        queue.push(ni);
      }
    }
  }
  return true;
}

function drawTile(idx, x, y, s){
  if (idx === 0) return;
  const t = TILES[idx];
  const cx = x + s/2, cy = y + s/2;
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = Math.max(2, s * 0.18);
  ctx.lineCap = 'round';
  if (t.edges[0]) { ctx.beginPath(); ctx.moveTo(cx, y); ctx.lineTo(cx, cy); ctx.stroke(); }
  if (t.edges[1]) { ctx.beginPath(); ctx.moveTo(x+s, cy); ctx.lineTo(cx, cy); ctx.stroke(); }
  if (t.edges[2]) { ctx.beginPath(); ctx.moveTo(cx, y+s); ctx.lineTo(cx, cy); ctx.stroke(); }
  if (t.edges[3]) { ctx.beginPath(); ctx.moveTo(x, cy); ctx.lineTo(cx, cy); ctx.stroke(); }
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath();
  ctx.arc(cx, cy, Math.max(2, s*0.1), 0, Math.PI*2);
  ctx.fill();
}

function draw(){
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0,0,W,H);
  const s = Math.min(W / COLS, H / ROWS);
  const ox = (W - s * COLS) / 2;
  const oy = (H - s * ROWS) / 2;
  for (let y = 0; y < ROWS; y++){
    for (let x = 0; x < COLS; x++){
      const c = grid[y*COLS + x];
      const px = ox + x*s, py = oy + y*s;
      ctx.fillStyle = '#0d1424';
      ctx.fillRect(px, py, s-1, s-1);
      if (c.collapsed){
        drawTile(c.options[0], px, py, s);
      } else {
        // show entropy
        const e = c.options.length;
        const a = 0.05 + 0.4 * (1 - e / TILES.length);
        ctx.fillStyle = `rgba(96,165,250,${a})`;
        ctx.fillRect(px, py, s-1, s-1);
      }
    }
  }
}

let done = false;
function loop(){
  speed = parseInt(document.getElementById('speed').value);
  if (!done){
    for (let i = 0; i < speed; i++){
      if (!collapseStep()){ done = true; break; }
      // check if all collapsed
      if (grid.every(c => c.collapsed)){ done = true; break; }
    }
  }
  draw();
  requestAnimationFrame(loop);
}

function reset(){
  init();
  done = false;
}
document.getElementById('reset').onclick = reset;
init();
loop();
</script>
</body>
</html>
