<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boids Flocking — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Boids Flocking</h2><p>Craig Reynolds' rules: separation, alignment, cohesion. Tweak each weight to morph the flock behavior.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <label>Separation <input type="range" id="sep" min="0" max="200" value="100"></label>
  <label>Alignment <input type="range" id="ali" min="0" max="200" value="100"></label>
  <label>Cohesion <input type="range" id="coh" min="0" max="200" value="100"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const NUM = 250;
const VIEW_R = 60;
const SEP_R = 18;
const MAX_SPEED = 3.2;
const MAX_FORCE = 0.06;

let wSep = 1.0, wAli = 1.0, wCoh = 1.0;

const boids = [];
for(let i=0;i<NUM;i++){
  const a = Math.random()*Math.PI*2;
  boids.push({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    vx: Math.cos(a)*2,
    vy: Math.sin(a)*2
  });
}

function limit(vx, vy, m){
  const sp = Math.sqrt(vx*vx + vy*vy);
  if(sp > m){ return [vx/sp*m, vy/sp*m]; }
  return [vx, vy];
}

function step(){
  for(let i=0;i<boids.length;i++){
    const b = boids[i];
    let sx=0,sy=0, ax=0,ay=0, cx=0,cy=0;
    let nSep=0, nAli=0, nCoh=0;
    for(let j=0;j<boids.length;j++){
      if(i===j) continue;
      const o = boids[j];
      let dx = o.x - b.x, dy = o.y - b.y;
      // wrap distance
      if(dx > W*0.5) dx -= W; else if(dx < -W*0.5) dx += W;
      if(dy > H*0.5) dy -= H; else if(dy < -H*0.5) dy += H;
      const d2 = dx*dx + dy*dy;
      if(d2 < VIEW_R*VIEW_R){
        ax += o.vx; ay += o.vy; nAli++;
        cx += b.x + dx; cy += b.y + dy; nCoh++;
        if(d2 < SEP_R*SEP_R && d2 > 0){
          sx -= dx/d2; sy -= dy/d2; nSep++;
        }
      }
    }
    let fxSep=0, fySep=0, fxAli=0, fyAli=0, fxCoh=0, fyCoh=0;
    if(nSep>0){
      let [vx,vy] = limit(sx*100, sy*100, MAX_SPEED);
      fxSep = vx - b.vx; fySep = vy - b.vy;
      [fxSep, fySep] = limit(fxSep, fySep, MAX_FORCE);
    }
    if(nAli>0){
      let vx = ax/nAli, vy = ay/nAli;
      [vx, vy] = limit(vx, vy, MAX_SPEED);
      fxAli = vx - b.vx; fyAli = vy - b.vy;
      [fxAli, fyAli] = limit(fxAli, fyAli, MAX_FORCE);
    }
    if(nCoh>0){
      const tx = cx/nCoh - b.x, ty = cy/nCoh - b.y;
      let [vx,vy] = limit(tx, ty, MAX_SPEED);
      fxCoh = vx - b.vx; fyCoh = vy - b.vy;
      [fxCoh, fyCoh] = limit(fxCoh, fyCoh, MAX_FORCE);
    }
    b.ax = fxSep*wSep + fxAli*wAli + fxCoh*wCoh;
    b.ay = fySep*wSep + fyAli*wAli + fyCoh*wCoh;
  }
  for(const b of boids){
    b.vx += b.ax; b.vy += b.ay;
    const [vx, vy] = limit(b.vx, b.vy, MAX_SPEED);
    b.vx = vx; b.vy = vy;
    b.x += b.vx; b.y += b.vy;
    if(b.x < 0) b.x += W; else if(b.x >= W) b.x -= W;
    if(b.y < 0) b.y += H; else if(b.y >= H) b.y -= H;
  }
}

function draw(){
  ctx.fillStyle = 'rgba(10, 14, 26, 0.22)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#fbbf24';
  for(const b of boids){
    const ang = Math.atan2(b.vy, b.vx);
    const ca = Math.cos(ang), sa = Math.sin(ang);
    const sz = 6;
    ctx.beginPath();
    ctx.moveTo(b.x + ca*sz, b.y + sa*sz);
    ctx.lineTo(b.x + Math.cos(ang+2.5)*sz*0.6, b.y + Math.sin(ang+2.5)*sz*0.6);
    ctx.lineTo(b.x + Math.cos(ang-2.5)*sz*0.6, b.y + Math.sin(ang-2.5)*sz*0.6);
    ctx.closePath();
    ctx.fill();
  }
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('sep').addEventListener('input', e => wSep = parseFloat(e.target.value)/100);
document.getElementById('ali').addEventListener('input', e => wAli = parseFloat(e.target.value)/100);
document.getElementById('coh').addEventListener('input', e => wCoh = parseFloat(e.target.value)/100);

ctx.fillStyle = '#0a0e1a';
ctx.fillRect(0,0,W,H);
loop();
</script>
</body>
</html>
