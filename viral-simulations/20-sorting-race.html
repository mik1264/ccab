<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorting Race — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Sorting Race</h2><p>Bubble, Insertion, Quicksort and Mergesort race on the same shuffled array. Highlights show comparisons and writes.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset (shuffle)</button>
  <label>Speed <input type="range" id="speed" min="1" max="200" step="1" value="40"></label>
  <span id="stat" style="font-size:12px;color:#cbd5e1"></span>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
const N = 80;

let baseArray = [];
let sorters = [];

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);

function shuffle(){
  baseArray = [];
  for(let i=0; i<N; i++) baseArray.push(i+1);
  for(let i=baseArray.length-1; i>0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [baseArray[i], baseArray[j]] = [baseArray[j], baseArray[i]];
  }
}

// Each sorter is a step-able generator
function makeBubble(arr){
  const a = arr.slice();
  let i = 0, j = 0;
  let done = false;
  return {
    name: 'Bubble',
    arr: a,
    hi: [],
    done: false,
    ops: 0,
    step(){
      if(this.done) return;
      if(i >= a.length){ this.done = true; return; }
      this.hi = [j, j+1];
      this.ops++;
      if(j < a.length - 1 - i){
        if(a[j] > a[j+1]){
          [a[j], a[j+1]] = [a[j+1], a[j]];
        }
        j++;
      } else {
        j = 0;
        i++;
      }
    }
  };
}

function makeInsertion(arr){
  const a = arr.slice();
  let i = 1, j = 1;
  return {
    name: 'Insertion',
    arr: a,
    hi: [],
    done: false,
    ops: 0,
    step(){
      if(this.done) return;
      if(i >= a.length){ this.done = true; return; }
      this.hi = [j-1, j];
      this.ops++;
      if(j > 0 && a[j-1] > a[j]){
        [a[j], a[j-1]] = [a[j-1], a[j]];
        j--;
      } else {
        i++;
        j = i;
      }
    }
  };
}

function makeQuick(arr){
  const a = arr.slice();
  // Iterative quicksort using stack of (lo,hi,phase)
  const tasks = [{lo:0, hi:a.length-1, state:'init'}];
  let cur = null;
  return {
    name: 'Quicksort',
    arr: a,
    hi: [],
    done: false,
    ops: 0,
    step(){
      if(this.done) return;
      if(!cur){
        if(tasks.length === 0){ this.done = true; this.hi = []; return; }
        cur = tasks.pop();
        if(cur.lo >= cur.hi){ cur = null; return; }
        cur.pivot = a[cur.hi];
        cur.i = cur.lo - 1;
        cur.j = cur.lo;
        cur.state = 'partition';
      }
      if(cur.state === 'partition'){
        this.ops++;
        if(cur.j < cur.hi){
          this.hi = [cur.j, cur.hi];
          if(a[cur.j] <= cur.pivot){
            cur.i++;
            [a[cur.i], a[cur.j]] = [a[cur.j], a[cur.i]];
          }
          cur.j++;
        } else {
          // place pivot
          [a[cur.i+1], a[cur.hi]] = [a[cur.hi], a[cur.i+1]];
          const p = cur.i + 1;
          const lo = cur.lo, hi = cur.hi;
          tasks.push({lo:p+1, hi, state:'init'});
          tasks.push({lo, hi:p-1, state:'init'});
          cur = null;
        }
      }
    }
  };
}

function makeMerge(arr){
  const a = arr.slice();
  // Bottom-up iterative merge sort, step by step
  const n = a.length;
  let width = 1;
  let lo = 0;
  let mergeBuf = null;
  let mergePhase = null;
  return {
    name: 'Mergesort',
    arr: a,
    hi: [],
    done: false,
    ops: 0,
    step(){
      if(this.done) return;
      if(width >= n){ this.done = true; this.hi = []; return; }
      if(!mergePhase){
        if(lo >= n){
          width *= 2;
          lo = 0;
          if(width >= n){ this.done = true; this.hi = []; return; }
          return;
        }
        const mid = Math.min(lo + width, n);
        const hiE = Math.min(lo + 2*width, n);
        if(mid >= hiE){ lo = hiE; return; }
        mergeBuf = a.slice(lo, hiE);
        mergePhase = {
          lo, hiE, mid,
          i: 0,
          j: mid - lo,
          k: lo,
          leftEnd: mid - lo,
          rightEnd: hiE - lo
        };
      }
      const m = mergePhase;
      this.ops++;
      if(m.k >= m.hiE){
        lo = m.hiE;
        mergePhase = null;
        return;
      }
      this.hi = [m.k];
      if(m.i < m.leftEnd && (m.j >= m.rightEnd || mergeBuf[m.i] <= mergeBuf[m.j])){
        a[m.k++] = mergeBuf[m.i++];
      } else if(m.j < m.rightEnd){
        a[m.k++] = mergeBuf[m.j++];
      }
    }
  };
}

function reset(){
  shuffle();
  sorters = [
    makeBubble(baseArray),
    makeInsertion(baseArray),
    makeQuick(baseArray),
    makeMerge(baseArray)
  ];
}

document.getElementById('reset').addEventListener('click', reset);

function drawSorter(s, x, y, w, h){
  // Title
  ctx.fillStyle = s.done ? '#22c55e' : '#fbbf24';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`${s.name}${s.done ? ' (done)' : ''}`, x + 8, y + 18);
  ctx.fillStyle = '#94a3b8';
  ctx.font = '11px sans-serif';
  ctx.fillText(`ops: ${s.ops}`, x + 8, y + 32);

  // Frame
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.strokeRect(x+0.5, y+0.5, w-1, h-1);

  const padTop = 40;
  const innerH = h - padTop - 8;
  const innerW = w - 16;
  const barW = innerW / N;
  for(let i=0; i<N; i++){
    const v = s.arr[i];
    const bh = (v / N) * innerH;
    const bx = x + 8 + i*barW;
    const by = y + padTop + (innerH - bh);
    let color;
    if(s.hi.includes(i)){
      color = '#ef4444';
    } else {
      const t = v / N;
      color = `hsl(${200 - t*60}, 70%, ${40 + t*30}%)`;
    }
    ctx.fillStyle = color;
    ctx.fillRect(bx, by, Math.max(1, barW-1), bh);
  }
}

function loop(){
  const speed = parseInt(document.getElementById('speed').value);
  for(let s=0; s<speed; s++){
    for(const sorter of sorters){
      if(!sorter.done) sorter.step();
    }
  }

  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0,0,W,H);

  // 4 quadrants
  const padOuter = 80;
  const padBottom = 80;
  const gap = 8;
  const totalW = W - padOuter*0 - 16;
  const totalH = H - 80 - padBottom;
  const qw = (W - 16 - gap) / 2;
  const qh = (totalH - gap) / 2;
  const startX = 8;
  const startY = 60;

  drawSorter(sorters[0], startX, startY, qw, qh);
  drawSorter(sorters[1], startX + qw + gap, startY, qw, qh);
  drawSorter(sorters[2], startX, startY + qh + gap, qw, qh);
  drawSorter(sorters[3], startX + qw + gap, startY + qh + gap, qw, qh);

  const winners = sorters.filter(s => s.done).map(s => s.name);
  document.getElementById('stat').textContent = winners.length ? `Finished: ${winners.join(', ')}` : '';

  requestAnimationFrame(loop);
}

resize();
reset();
loop();
</script>
</body>
</html>
