<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Pendulum Fractal — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
  #minimap{position:fixed;bottom:80px;right:12px;border:1px solid rgba(251,191,36,0.4);border-radius:6px;background:#000;z-index:999}
  #minimaplabel{position:fixed;bottom:280px;right:12px;font-size:11px;color:#fbbf24;background:rgba(0,0,0,0.6);padding:3px 8px;border-radius:4px;z-index:999}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Magnetic Pendulum</h2><p>A pendulum is pulled by gravity and 3 magnets. The minimap shows the chaotic basin-of-attraction fractal.</p></div>
<canvas id="c"></canvas>
<canvas id="minimap" width="200" height="200"></canvas>
<div id="minimaplabel">Basin of attraction</div>
<div class="controls">
  <button id="reset">Drop New</button>
  <button id="recolor">Recompute Fractal</button>
  <label>Drag <input type="range" id="drag" min="1" max="30" step="1" value="8"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const mini = document.getElementById('minimap');
const mctx = mini.getContext('2d');
let W, H;

const magnets = []; // 3 at triangle vertices
const colors = ['#ef4444','#22c55e','#3b82f6'];

let scale = 1; // pixels per unit
let cx = 0, cy = 0;
let bob = null;
let trail = [];

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2;
  cy = H/2;
  scale = Math.min(W,H) * 0.18;
  // Place 3 magnets at vertices of equilateral triangle radius=1
  magnets.length = 0;
  for(let i=0; i<3; i++){
    const a = -Math.PI/2 + i * 2*Math.PI/3;
    magnets.push({x: Math.cos(a), y: Math.sin(a), color: colors[i]});
  }
}
window.addEventListener('resize', resize);

function newBob(){
  trail = [];
  bob = {
    x: (Math.random()-0.5)*3,
    y: (Math.random()-0.5)*3,
    vx: 0, vy: 0
  };
}

document.getElementById('reset').addEventListener('click', newBob);

// Physics: gravity restoring force toward origin (k * r), magnet attraction with vertical offset h
function accel(x, y){
  let ax = -0.5 * x; // restoring (gravity component for small angles)
  let ay = -0.5 * y;
  const h = 0.2; // height of pendulum above plane
  for(const m of magnets){
    const dx = m.x - x;
    const dy = m.y - y;
    const d2 = dx*dx + dy*dy + h*h;
    const d3 = d2 * Math.sqrt(d2);
    ax += dx / d3;
    ay += dy / d3;
  }
  return [ax, ay];
}

function step(){
  if(!bob) return;
  const dragK = parseFloat(document.getElementById('drag').value) / 1000;
  const dt = 0.05;
  // RK4 step
  const sub = 4;
  for(let s=0; s<sub; s++){
    const [ax, ay] = accel(bob.x, bob.y);
    bob.vx += (ax - dragK * bob.vx * 100) * dt;
    bob.vy += (ay - dragK * bob.vy * 100) * dt;
    bob.x += bob.vx * dt;
    bob.y += bob.vy * dt;
  }
  trail.push([bob.x, bob.y]);
  if(trail.length > 1500) trail.shift();
}

function w2sX(x){ return cx + x * scale; }
function w2sY(y){ return cy + y * scale; }

function draw(){
  ctx.fillStyle = 'rgba(10,14,26,0.18)';
  ctx.fillRect(0,0,W,H);

  // Draw magnets
  for(const m of magnets){
    const sx = w2sX(m.x), sy = w2sY(m.y);
    ctx.beginPath();
    ctx.arc(sx, sy, 18, 0, Math.PI*2);
    ctx.fillStyle = m.color;
    ctx.globalAlpha = 0.25;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(sx, sy, 9, 0, Math.PI*2);
    ctx.fillStyle = m.color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Origin (anchor)
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI*2);
  ctx.fillStyle = '#fbbf24';
  ctx.fill();

  // Trail
  if(trail.length > 1){
    ctx.beginPath();
    ctx.moveTo(w2sX(trail[0][0]), w2sY(trail[0][1]));
    for(let i=1; i<trail.length; i++){
      ctx.lineTo(w2sX(trail[i][0]), w2sY(trail[i][1]));
    }
    ctx.strokeStyle = 'rgba(251,191,36,0.8)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // String + bob
  if(bob){
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(w2sX(bob.x), w2sY(bob.y));
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(w2sX(bob.x), w2sY(bob.y), 7, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// Precompute fractal basin of attraction at low res
function computeFractal(){
  const N = 200;
  const range = 3;
  const img = mctx.createImageData(N, N);
  const data = img.data;
  const palette = colors.map(c => {
    const m = c.match(/#(..)(..)(..)/);
    return [parseInt(m[1],16), parseInt(m[2],16), parseInt(m[3],16)];
  });
  for(let py=0; py<N; py++){
    for(let px=0; px<N; px++){
      const x0 = (px/N - 0.5) * 2 * range;
      const y0 = (py/N - 0.5) * 2 * range;
      // Simulate
      let x = x0, y = y0, vx = 0, vy = 0;
      const dragK = 0.008;
      const dt = 0.05;
      let winner = -1;
      for(let it=0; it<400; it++){
        const [ax, ay] = accel(x, y);
        vx += (ax - dragK * vx * 100) * dt;
        vy += (ay - dragK * vy * 100) * dt;
        x += vx * dt;
        y += vy * dt;
        // Check if close to a magnet and slow
        const speed2 = vx*vx + vy*vy;
        if(speed2 < 0.005){
          let best = 0, bestD = Infinity;
          for(let i=0; i<magnets.length; i++){
            const dx = x - magnets[i].x;
            const dy = y - magnets[i].y;
            const d = dx*dx + dy*dy;
            if(d < bestD){ bestD = d; best = i; }
          }
          if(bestD < 0.3){ winner = best; break; }
        }
      }
      const idx = (py*N + px) * 4;
      if(winner >= 0){
        const pal = palette[winner];
        // Shade by speed of convergence (we can approximate via iterations, but simple is fine)
        data[idx] = pal[0];
        data[idx+1] = pal[1];
        data[idx+2] = pal[2];
        data[idx+3] = 255;
      } else {
        data[idx] = 30; data[idx+1] = 30; data[idx+2] = 40; data[idx+3] = 255;
      }
    }
  }
  mctx.putImageData(img, 0, 0);
}

document.getElementById('recolor').addEventListener('click', computeFractal);

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}

resize();
newBob();
computeFractal();
loop();
</script>
</body>
</html>
