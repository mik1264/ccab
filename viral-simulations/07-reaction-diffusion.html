<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction-Diffusion — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh;cursor:crosshair}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Gray-Scott Reaction-Diffusion</h2><p>Two chemicals A and B react and diffuse, generating coral-like patterns. Click to seed extra B.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset</button>
  <label>Feed (F) <input type="range" id="f" min="10" max="80" value="55"></label>
  <label>Kill (k) <input type="range" id="k" min="40" max="75" value="62"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const N = 220;
let displayW, displayH;
function resize(){
  displayW = canvas.width = window.innerWidth;
  displayH = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// double-buffered A and B grids
let A = new Float32Array(N*N);
let B = new Float32Array(N*N);
let A2 = new Float32Array(N*N);
let B2 = new Float32Array(N*N);

const Da = 1.0, Db = 0.5;
let F = 0.055, K = 0.062;

function init(){
  for(let i=0;i<N*N;i++){ A[i] = 1; B[i] = 0; }
  // seed B in center
  const cx = N/2, cy = N/2;
  for(let y=0;y<N;y++){
    for(let x=0;x<N;x++){
      const dx = x - cx, dy = y - cy;
      if(dx*dx + dy*dy < 100){
        B[y*N + x] = 1;
      }
    }
  }
}
init();

function step(){
  for(let y=1;y<N-1;y++){
    for(let x=1;x<N-1;x++){
      const i = y*N + x;
      const a = A[i], b = B[i];
      // Laplacian (5-point + diagonals weighted)
      const lapA = A[i-1]*0.2 + A[i+1]*0.2 + A[i-N]*0.2 + A[i+N]*0.2
                 + A[i-N-1]*0.05 + A[i-N+1]*0.05 + A[i+N-1]*0.05 + A[i+N+1]*0.05
                 - a;
      const lapB = B[i-1]*0.2 + B[i+1]*0.2 + B[i-N]*0.2 + B[i+N]*0.2
                 + B[i-N-1]*0.05 + B[i-N+1]*0.05 + B[i+N-1]*0.05 + B[i+N+1]*0.05
                 - b;
      const abb = a*b*b;
      let na = a + (Da*lapA - abb + F*(1 - a));
      let nb = b + (Db*lapB + abb - (K + F)*b);
      if(na < 0) na = 0; else if(na > 1) na = 1;
      if(nb < 0) nb = 0; else if(nb > 1) nb = 1;
      A2[i] = na; B2[i] = nb;
    }
  }
  // edges: copy
  for(let i=0;i<N;i++){
    A2[i] = A[i]; A2[(N-1)*N + i] = A[(N-1)*N + i];
    A2[i*N] = A[i*N]; A2[i*N + N-1] = A[i*N + N-1];
    B2[i] = B[i]; B2[(N-1)*N + i] = B[(N-1)*N + i];
    B2[i*N] = B[i*N]; B2[i*N + N-1] = B[i*N + N-1];
  }
  let tmp = A; A = A2; A2 = tmp;
  tmp = B; B = B2; B2 = tmp;
}

const off = document.createElement('canvas');
off.width = N; off.height = N;
const octx = off.getContext('2d');
const imgData = octx.createImageData(N, N);

function colormap(t){
  // dark blue -> cyan -> white
  t = Math.max(0, Math.min(1, t));
  if(t < 0.5){
    const u = t*2;
    return [u*60, u*180, 60 + u*180];
  } else {
    const u = (t - 0.5)*2;
    return [60 + u*195, 180 + u*75, 240 + u*15];
  }
}

function draw(){
  const d = imgData.data;
  for(let i=0;i<N*N;i++){
    const v = A[i] - B[i]; // ranges roughly [-1, 1]
    const t = 1 - (v + 1)*0.5; // higher when more B
    const [r,g,b] = colormap(t);
    const j = i*4;
    d[j] = r; d[j+1] = g; d[j+2] = b; d[j+3] = 255;
  }
  octx.putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(off, 0, 0, displayW, displayH);
}

let mouseDown = false, mx = 0, my = 0;
canvas.addEventListener('mousedown', e => { mouseDown = true; mx = e.clientX; my = e.clientY; });
canvas.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
window.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('touchstart', e => { mouseDown = true; const t = e.touches[0]; mx = t.clientX; my = t.clientY; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchmove', e => { const t = e.touches[0]; mx = t.clientX; my = t.clientY; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', () => mouseDown = false);

function paint(){
  if(!mouseDown) return;
  const cx = Math.floor(mx / displayW * N);
  const cy = Math.floor(my / displayH * N);
  const r = 6;
  for(let dy=-r;dy<=r;dy++){
    for(let dx=-r;dx<=r;dx++){
      if(dx*dx + dy*dy > r*r) continue;
      const x = cx+dx, y = cy+dy;
      if(x<1||x>=N-1||y<1||y>=N-1) continue;
      B[y*N + x] = 1;
    }
  }
}

function loop(){
  paint();
  // multiple steps per frame for speed
  step();
  step();
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('reset').addEventListener('click', init);
document.getElementById('f').addEventListener('input', e => F = parseFloat(e.target.value)/1000);
document.getElementById('k').addEventListener('input', e => K = parseFloat(e.target.value)/1000);

loop();
</script>
</body>
</html>
