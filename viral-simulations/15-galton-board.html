<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galton Board — Viral Simulations · CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Galton Board</h2><p>Balls drop through pegs and bounce 50/50 left or right. The bins at the bottom build up a Gaussian (normal) distribution.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <button id="reset">Reset</button>
  <label>Spawn rate <input type="range" id="rate" min="1" max="6" step="1" value="2"></label>
  <span id="stat" style="font-size:12px;color:#cbd5e1"></span>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

const ROWS = 14;
const BIN_COUNT = ROWS + 1;
let pegs = [];
let bins = [];
let balls = [];
let totalBalls = 0;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  rebuildBoard();
}
window.addEventListener('resize', resize);

function rebuildBoard(){
  pegs = [];
  const topMargin = 80;
  const bottomMargin = 180;
  const usableH = H - topMargin - bottomMargin;
  const rowSpacing = usableH / (ROWS + 1);
  const colSpacing = rowSpacing * 1.05;
  for(let r=0; r<ROWS; r++){
    const y = topMargin + (r+1)*rowSpacing;
    const count = r + 2;
    for(let i=0; i<count; i++){
      const x = W/2 + (i - (count-1)/2) * colSpacing;
      pegs.push({x, y, r: 4});
    }
  }
  // Bins
  bins = [];
  const binW = colSpacing;
  const binStart = W/2 - (BIN_COUNT/2) * binW;
  for(let i=0; i<BIN_COUNT; i++){
    bins.push({x: binStart + i*binW, w: binW, count: 0});
  }
}

function spawnBall(){
  balls.push({
    x: W/2 + (Math.random()-0.5)*4,
    y: 30,
    vx: 0,
    vy: 0,
    r: 4,
    settled: false,
    settleTimer: 0,
    binIdx: -1,
    color: `hsl(${40 + Math.random()*30},90%,${55 + Math.random()*15}%)`
  });
  totalBalls++;
}

function reset(){
  balls = [];
  totalBalls = 0;
  for(const b of bins) b.count = 0;
}

document.getElementById('reset').addEventListener('click', reset);

function step(){
  const grav = 0.18;
  const damp = 0.55;
  const binTop = H - 180 + 10;
  const rateSlider = parseInt(document.getElementById('rate').value);
  for(let s=0; s<rateSlider; s++) spawnBall();

  for(const ball of balls){
    if(ball.settled) continue;
    ball.vy += grav;
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx *= 0.995;

    // Peg collisions
    for(const p of pegs){
      const dx = ball.x - p.x;
      const dy = ball.y - p.y;
      const dist = Math.hypot(dx, dy);
      const minD = ball.r + p.r;
      if(dist < minD && dist > 0){
        const nx = dx/dist, ny = dy/dist;
        // Separate
        const overlap = minD - dist;
        ball.x += nx * overlap;
        ball.y += ny * overlap;
        // Reflect velocity
        const dot = ball.vx*nx + ball.vy*ny;
        ball.vx = (ball.vx - 2*dot*nx) * damp;
        ball.vy = (ball.vy - 2*dot*ny) * damp;
        // Add a small randomized horizontal kick (50/50 left/right bias)
        ball.vx += (Math.random() < 0.5 ? -1 : 1) * (0.6 + Math.random()*0.4);
      }
    }

    // Walls (sides)
    if(ball.x < 10){ ball.x = 10; ball.vx *= -0.5; }
    if(ball.x > W-10){ ball.x = W-10; ball.vx *= -0.5; }

    // Bin entry
    if(ball.y > binTop && ball.binIdx < 0){
      // Find which bin
      for(let i=0; i<bins.length; i++){
        const b = bins[i];
        if(ball.x >= b.x && ball.x < b.x + b.w){
          ball.binIdx = i;
          bins[i].count++;
          break;
        }
      }
      if(ball.binIdx < 0){
        ball.binIdx = ball.x < W/2 ? 0 : bins.length-1;
        bins[ball.binIdx].count++;
      }
    }

    // Settle on bottom
    if(ball.y > H - 30){
      ball.y = H - 30 - (bins[ball.binIdx]?.count || 1) * 0.3;
      ball.vy = 0; ball.vx = 0;
      ball.settled = true;
    }
  }

  // Cap balls in flight to avoid memory blowup
  if(balls.length > 600){
    balls = balls.filter(b => !b.settled || (Math.random() < 0.5));
  }
}

function draw(){
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0,0,W,H);

  // Draw pegs
  ctx.fillStyle = '#475569';
  for(const p of pegs){
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  }

  // Draw bins / histogram
  const binTop = H - 180;
  const maxCount = Math.max(1, ...bins.map(b=>b.count));
  const histH = 160;
  for(let i=0; i<bins.length; i++){
    const b = bins[i];
    const h = (b.count / maxCount) * histH;
    // bin walls
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(b.x, binTop);
    ctx.lineTo(b.x, H-20);
    ctx.stroke();
    // histogram bar
    ctx.fillStyle = `hsl(${40 + i*4},80%,55%)`;
    ctx.globalAlpha = 0.55;
    ctx.fillRect(b.x+1, H-20-h, b.w-2, h);
    ctx.globalAlpha = 1;
    // count text
    if(b.count > 0){
      ctx.fillStyle = '#fbbf24';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(b.count, b.x + b.w/2, H-20-h-4);
    }
  }
  // right-most bin wall
  if(bins.length){
    const last = bins[bins.length-1];
    ctx.strokeStyle = '#334155';
    ctx.beginPath();
    ctx.moveTo(last.x + last.w, binTop);
    ctx.lineTo(last.x + last.w, H-20);
    ctx.stroke();
  }
  // floor
  ctx.strokeStyle = '#475569';
  ctx.beginPath();
  ctx.moveTo(0, H-20); ctx.lineTo(W, H-20);
  ctx.stroke();

  // Draw balls
  for(const b of balls){
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
  }

  document.getElementById('stat').textContent = `Total: ${totalBalls}`;
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}

resize();
loop();
</script>
</body>
</html>
