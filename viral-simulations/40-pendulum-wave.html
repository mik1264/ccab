<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendulum Wave - Viral Simulations - CCAB</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e1a;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh}
  .back-link{position:fixed;top:12px;left:12px;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fbbf24;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(251,191,36,0.25);transition:all .25s}
  .back-link:hover{background:rgba(251,191,36,0.18);transform:translateX(-3px)}
  .info{position:fixed;top:12px;right:12px;background:rgba(0,0,0,0.6);color:#e8e6e1;padding:10px 14px;border-radius:8px;font-size:13px;z-index:1000;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);max-width:260px}
  .info h2{font-size:14px;color:#fbbf24;margin-bottom:4px}
  .info p{font-size:12px;opacity:.85;line-height:1.4}
  .controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);padding:10px 16px;border-radius:10px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);z-index:1000;max-width:90vw}
  .controls button{background:#fbbf24;color:#0a0e1a;border:none;padding:6px 14px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
  .controls button:hover{background:#fcd34d}
  .controls label{font-size:12px;color:#cbd5e1;display:flex;flex-direction:column;gap:2px}
  .controls input[type=range]{width:120px;accent-color:#fbbf24}
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to Gallery</a>
<div class="info"><h2>Pendulum Wave</h2><p>15 pendulums of progressively decreasing length. They each complete a different integer number of oscillations in 60 seconds, syncing periodically into mesmerizing wave patterns.</p></div>
<canvas id="c"></canvas>
<div class="controls">
  <label>Cycle period (s) <span id="Tval">60</span>
    <input type="range" id="T" min="20" max="120" value="60">
  </label>
  <label>Pendulums <span id="Nval">15</span>
    <input type="range" id="N" min="6" max="30" value="15">
  </label>
  <button id="reset">Reset</button>
</div>
<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W,H,pivotY;
  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    pivotY = H * 0.18;
    rebuild();
  }
  window.addEventListener('resize', resize);

  let N = 15;
  let T = 60; // cycle period seconds
  // Each pendulum k completes (firstCount + k) oscillations in T seconds.
  // Period of pendulum k: T_k = T/(firstCount + k)
  // Length L_k = g*(T_k/(2π))² ; we'll use g = 9.81 m/s² in SI but scale to pixels.
  const firstCount = 51; // first pendulum makes 51 swings in T seconds
  let pendulums = [];
  let elapsed = 0;
  let trails = [];

  function rebuild(){
    pendulums = [];
    trails = [];
    const g = 9.81;
    // Determine scale: longest pendulum should fit on screen
    const T_long = T/firstCount;
    const L_long_m = g * Math.pow(T_long/(2*Math.PI),2);
    const maxLenPx = (H - pivotY) * 0.78;
    const scale = maxLenPx / L_long_m; // pixels per meter
    for(let k=0;k<N;k++){
      const swings = firstCount + k;
      const Tk = T/swings;
      const Lm = g * Math.pow(Tk/(2*Math.PI),2);
      const Lpx = Lm * scale;
      pendulums.push({
        L: Lpx,
        omega: 2*Math.PI/Tk,
        amp: 0.55, // initial angle in radians (~31°)
        hue: (k/(N-1)) * 300
      });
      trails.push([]);
    }
    elapsed = 0;
  }

  function draw(){
    ctx.fillStyle = 'rgba(10,14,26,0.25)';
    ctx.fillRect(0,0,W,H);

    // pivot bar
    const margin = W*0.08;
    const usableW = W - 2*margin;
    ctx.strokeStyle = 'rgba(251,191,36,0.35)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(margin, pivotY);
    ctx.lineTo(W-margin, pivotY);
    ctx.stroke();

    // draw trails
    for(let k=0;k<pendulums.length;k++){
      const tr = trails[k];
      if(tr.length<2) continue;
      const p = pendulums[k];
      ctx.lineWidth = 2;
      for(let i=1;i<tr.length;i++){
        const a = tr[i-1], b = tr[i];
        const al = i/tr.length * 0.6;
        ctx.strokeStyle = `hsla(${p.hue},85%,60%,${al})`;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    for(let k=0;k<pendulums.length;k++){
      const p = pendulums[k];
      const px = margin + (k+0.5) * (usableW/pendulums.length);
      const angle = p.amp * Math.cos(p.omega * elapsed);
      const bx = px + p.L * Math.sin(angle);
      const by = pivotY + p.L * Math.cos(angle);

      // string
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px, pivotY);
      ctx.lineTo(bx, by);
      ctx.stroke();

      // pivot
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(px, pivotY, 3, 0, Math.PI*2);
      ctx.fill();

      // bob
      const grad = ctx.createRadialGradient(bx,by,0, bx,by,16);
      grad.addColorStop(0, `hsl(${p.hue},85%,70%)`);
      grad.addColorStop(1, `hsla(${p.hue},85%,40%,0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(bx, by, 16, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = `hsl(${p.hue},85%,65%)`;
      ctx.beginPath();
      ctx.arc(bx, by, 9, 0, Math.PI*2);
      ctx.fill();

      // record trail
      const tr = trails[k];
      tr.push({x:bx, y:by});
      if(tr.length > 30) tr.shift();
    }

    // time readout
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(12, H-40, 160, 28);
    ctx.fillStyle = '#fbbf24';
    ctx.font = '13px sans-serif';
    ctx.fillText('t = ' + elapsed.toFixed(2) + 's / ' + T + 's', 22, H-22);
  }

  let last = performance.now();
  function loop(t){
    const dt = Math.min(0.05, (t-last)/1000);
    last = t;
    elapsed += dt;
    if(elapsed > T) elapsed -= T;
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('reset').onclick = ()=>{ rebuild(); };
  const TIn = document.getElementById('T');
  TIn.oninput = ()=>{ T = parseInt(TIn.value,10); document.getElementById('Tval').textContent = T; rebuild(); };
  const NIn = document.getElementById('N');
  NIn.oninput = ()=>{ N = parseInt(NIn.value,10); document.getElementById('Nval').textContent = N; rebuild(); };

  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
