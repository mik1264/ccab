<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatz Orbit Comparison</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
canvas { display: block; }
.back-link {
    position: fixed; top: 16px; left: 16px; color: #fbbf24; text-decoration: none;
    font-size: 14px; z-index: 100; background: rgba(10,14,26,0.8); padding: 8px 14px;
    border-radius: 8px; border: 1px solid rgba(251,191,36,0.3); transition: background 0.2s;
}
.back-link:hover { background: rgba(251,191,36,0.15); }
#fps { position: fixed; top: 16px; right: 16px; font-size: 12px; color: #6b7280; z-index: 100;
    background: rgba(10,14,26,0.8); padding: 4px 10px; border-radius: 6px; font-family: monospace; }
.controls {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
    display: flex; gap: 8px; align-items: center; background: rgba(10,14,26,0.9);
    padding: 10px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
}
.controls input {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff;
    padding: 6px 10px; border-radius: 6px; font-size: 13px; width: 100px; outline: none;
}
.controls input:focus { border-color: #fbbf24; }
.controls button {
    background: #fbbf24; color: #0a0e1a; border: none; padding: 6px 14px; border-radius: 6px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s;
}
.controls button:hover { background: #f59e0b; }
.controls .btn-clear { background: #ef4444; color: #fff; }
.controls .btn-clear:hover { background: #dc2626; }
.controls .btn-random { background: #8b5cf6; color: #fff; }
.controls .btn-random:hover { background: #7c3aed; }
.legend {
    position: fixed; top: 70px; right: 16px; z-index: 100;
    background: rgba(10,14,26,0.9); padding: 10px 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1); max-height: 60vh; overflow-y: auto;
    font-size: 13px;
}
.legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
#loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #0a0e1a; z-index: 200; font-size: 18px; color: #6b7280;
}
.spinner { width: 40px; height: 40px; border: 3px solid rgba(251,191,36,0.2);
    border-top-color: #fbbf24; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div>Loading...</div>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div id="fps">-- FPS</div>
<div class="controls">
    <input type="number" id="numInput" placeholder="1-10000" min="1" max="10000">
    <button id="addBtn">Add</button>
    <button class="btn-random" id="randomBtn">Add Random</button>
    <button class="btn-clear" id="clearBtn">Clear All</button>
</div>
<div class="legend" id="legend"></div>
<canvas id="canvas"></canvas>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    let W, H;

    function resize() {
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W * dpr; canvas.height = H * dpr;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = [
        '#fbbf24', '#34d399', '#60a5fa', '#f472b6', '#a78bfa',
        '#fb923c', '#2dd4bf', '#e879f9', '#facc15', '#4ade80',
        '#38bdf8', '#fb7185', '#c084fc', '#fdba74', '#22d3ee'
    ];

    function collatz(n) {
        const seq = [n];
        while (n !== 1 && seq.length < 100000) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            seq.push(n);
        }
        return seq;
    }

    const orbits = []; // { n, seq, color, progress }

    function addOrbit(n) {
        n = Math.max(1, Math.min(10000, Math.floor(n)));
        if (orbits.some(o => o.n === n)) return;
        const seq = collatz(n);
        const color = COLORS[orbits.length % COLORS.length];
        orbits.push({ n, seq, color, progress: 0, speed: Math.max(1, seq.length / 90) });
        updateLegend();
    }

    function updateLegend() {
        const el = document.getElementById('legend');
        el.innerHTML = orbits.map(o =>
            `<div class="legend-item"><div class="legend-dot" style="background:${o.color}"></div>${o.n} (${o.seq.length - 1} steps)</div>`
        ).join('');
    }

    document.getElementById('addBtn').addEventListener('click', () => {
        const v = parseInt(document.getElementById('numInput').value);
        if (v >= 1 && v <= 10000) addOrbit(v);
        document.getElementById('numInput').value = '';
    });
    document.getElementById('numInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('addBtn').click();
    });
    document.getElementById('randomBtn').addEventListener('click', () => {
        addOrbit(Math.floor(Math.random() * 10000) + 1);
    });
    document.getElementById('clearBtn').addEventListener('click', () => {
        orbits.length = 0;
        updateLegend();
    });

    // Start with some interesting numbers
    [27, 97, 871, 6171, 77].forEach(n => addOrbit(n));

    let frameCount = 0, lastFpsTime = performance.now(), fps = 0;

    function draw() {
        ctx.clearRect(0, 0, W, H);
        if (orbits.length === 0) {
            ctx.fillStyle = '#4b5563'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('Add numbers to compare their Collatz orbits', W / 2, H / 2);
            return;
        }

        const margin = { top: 70, bottom: 50, left: 70, right: 180 };
        const plotW = W - margin.left - margin.right;
        const plotH = H - margin.top - margin.bottom;

        let maxSteps = 0, maxVal = 0;
        for (const o of orbits) {
            const drawn = Math.min(Math.floor(o.progress), o.seq.length);
            if (drawn > maxSteps) maxSteps = drawn;
            for (let i = 0; i < drawn; i++) {
                if (o.seq[i] > maxVal) maxVal = o.seq[i];
            }
        }
        if (maxSteps < 2 || maxVal === 0) return;

        const xScale = plotW / (maxSteps - 1);
        const yScale = plotH / maxVal;

        // Grid
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 5; i++) {
            const val = Math.round((i / 5) * maxVal);
            const y = margin.top + plotH - val * yScale;
            ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(margin.left + plotW, y); ctx.stroke();
            ctx.fillStyle = '#4b5563'; ctx.font = '11px monospace'; ctx.textAlign = 'right';
            ctx.fillText(val.toLocaleString(), margin.left - 8, y + 4);
        }

        // Draw orbits
        for (const o of orbits) {
            const n = Math.min(Math.floor(o.progress), o.seq.length);
            if (n < 2) continue;
            ctx.beginPath();
            ctx.strokeStyle = o.color;
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.85;
            for (let i = 0; i < n; i++) {
                const x = margin.left + i * xScale;
                const y = margin.top + plotH - o.seq[i] * yScale;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.globalAlpha = 1;
        }
    }

    function loop() {
        requestAnimationFrame(loop);
        frameCount++;
        const now = performance.now();
        if (now - lastFpsTime >= 1000) {
            fps = frameCount; frameCount = 0; lastFpsTime = now;
            document.getElementById('fps').textContent = fps + ' FPS';
        }
        for (const o of orbits) {
            if (o.progress < o.seq.length) {
                o.progress = Math.min(o.progress + o.speed, o.seq.length);
            }
        }
        draw();
    }

    document.getElementById('loading').style.display = 'none';
    loop();
} catch (e) {
    document.getElementById('loading').innerHTML = '<div style="color:#ef4444;text-align:center;">Error: ' + e.message + '</div>';
    console.error(e);
}
</script>
</body>
</html>
