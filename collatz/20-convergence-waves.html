<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatz - Convergence Waves</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
canvas { display: block; }
.back-link {
    position: fixed; top: 15px; left: 15px; z-index: 100;
    background: rgba(0,0,0,0.7); color: #fbbf24; text-decoration: none;
    padding: 8px 16px; border-radius: 8px; font-size: 14px;
    transition: background 0.3s;
}
.back-link:hover { background: rgba(0,0,0,0.9); }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.3); font-size: 13px; z-index: 100;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back to Gallery</a>
<canvas id="canvas"></canvas>
<div class="info">100 Collatz sequences flowing as convergence waves</div>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dpr = window.devicePixelRatio || 1;
    let W, H;

    function resize() {
        dpr = window.devicePixelRatio || 1;
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    function collatz(n) {
        const seq = [n];
        while (n !== 1 && seq.length < 10000) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            seq.push(n);
        }
        return seq;
    }

    const maxN = 100;
    const waves = [];
    let globalMaxVal = 0;
    let globalMaxLen = 0;

    for (let n = 1; n <= maxN; n++) {
        const seq = collatz(n);
        waves.push({ n, seq });
        globalMaxLen = Math.max(globalMaxLen, seq.length);
        for (const v of seq) globalMaxVal = Math.max(globalMaxVal, v);
    }

    // Normalize sequences: pad shorter ones with 1s
    for (const w of waves) {
        while (w.seq.length < globalMaxLen) {
            w.seq.push(1);
        }
    }

    let time = 0;

    function draw() {
        // Slight trail effect for smoother feel
        ctx.fillStyle = 'rgba(10, 14, 26, 0.15)';
        ctx.fillRect(0, 0, W, H);

        const padT = 60;
        const padB = 50;
        const availH = H - padT - padB;
        const waveSpacing = availH / maxN;
        const waveAmplitude = waveSpacing * 0.45;

        // Scroll speed
        const scrollSpeed = 1.5;
        time += scrollSpeed;

        for (let i = 0; i < waves.length; i++) {
            const w = waves[i];
            const baseY = padT + i * waveSpacing + waveSpacing / 2;
            const hue = 160 + (i / maxN) * 60; // teal to blue-green range

            ctx.beginPath();
            let prevX = 0, prevY = baseY;

            const numPoints = Math.floor(W / 3);
            for (let px = 0; px <= numPoints; px++) {
                const x = (px / numPoints) * W;

                // Map screen x + time offset to sequence index
                const seqIdx = ((px / numPoints) * globalMaxLen * 0.5 + time) % globalMaxLen;
                const idx0 = Math.floor(seqIdx) % w.seq.length;
                const idx1 = (idx0 + 1) % w.seq.length;
                const frac = seqIdx - Math.floor(seqIdx);

                // Interpolated value
                const val = w.seq[idx0] * (1 - frac) + w.seq[idx1] * frac;

                // Normalize value for amplitude
                const normVal = Math.log(val + 1) / Math.log(globalMaxVal + 1);
                const amp = normVal * waveAmplitude;

                // Wave displacement with sine modulation
                const displacement = amp * Math.sin(px * 0.02 + time * 0.03 + i * 0.3);
                const y = baseY + displacement;

                // Alpha based on current amplitude (converged = dim)
                const alpha = 0.1 + normVal * 0.5;

                if (px === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
                prevX = x;
                prevY = y;
            }

            // Compute average normVal for this wave at current time for color
            const midIdx = Math.floor((0.5 * globalMaxLen * 0.5 + time) % globalMaxLen);
            const midVal = w.seq[midIdx % w.seq.length];
            const midNorm = Math.log(midVal + 1) / Math.log(globalMaxVal + 1);
            const alpha = 0.08 + midNorm * 0.35;
            const lightness = 40 + midNorm * 25;

            ctx.strokeStyle = `hsla(${hue}, 70%, ${lightness}%, ${alpha})`;
            ctx.lineWidth = 1.2;
            ctx.stroke();
        }

        // Title
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Convergence Waves', W / 2, 35);

        requestAnimationFrame(draw);
    }

    // Clear once fully before starting
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);
    draw();
} catch (e) {
    document.body.innerHTML = '<div style="color:red;padding:40px;font-size:18px;">Error: ' + e.message + '</div>';
}
</script>
</body>
</html>
