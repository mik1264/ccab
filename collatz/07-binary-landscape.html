<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Landscape - Collatz Conjecture</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
.back-link {
    position: fixed; top: 15px; left: 15px; z-index: 100;
    color: #fbbf24; text-decoration: none; font-size: 14px;
    background: rgba(10, 14, 26, 0.85); padding: 8px 14px;
    border-radius: 8px; border: 1px solid rgba(251, 191, 36, 0.3);
    transition: background 0.2s;
}
.back-link:hover { background: rgba(251, 191, 36, 0.15); }
#info {
    position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
    z-index: 100; color: #aab; font-size: 13px; text-align: center;
    background: rgba(10, 14, 26, 0.85); padding: 8px 16px;
    border-radius: 8px;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div id="info">Binary representations of Collatz sequences for n=1 to 200. Scroll to explore.</div>
<canvas id="canvas"></canvas>
<script>
try {
(function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    const MAX_N = 200;
    const CELL_W = 4;
    const CELL_H = 5;
    const MAX_BITS = 18;
    const LABEL_W = 50;

    // Collatz sequences
    function collatzSequence(n) {
        const seq = [n];
        while (n !== 1 && seq.length < 500) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            seq.push(n);
        }
        return seq;
    }

    const sequences = [];
    let maxSteps = 0;
    for (let i = 1; i <= MAX_N; i++) {
        const seq = collatzSequence(i);
        if (seq.length > maxSteps) maxSteps = seq.length;
        sequences.push(seq);
    }

    // Find max bits needed
    let maxBitsNeeded = 0;
    for (const seq of sequences) {
        for (const v of seq) {
            const bits = v.toString(2).length;
            if (bits > maxBitsNeeded) maxBitsNeeded = bits;
        }
    }

    const BITS = Math.min(maxBitsNeeded, 24);
    const rowHeight = BITS * CELL_H + 2;
    const totalHeight = MAX_N * rowHeight + 80;
    const W = window.innerWidth;

    canvas.width = W * dpr;
    canvas.height = totalHeight * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = totalHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    function bitColor(bit, bitIndex, totalBits, value) {
        if (bit === 0) {
            // Dark blues for 0 bits
            const t = bitIndex / totalBits;
            const h = 220 + t * 30;
            const l = 8 + t * 6;
            return `hsl(${h}, 60%, ${l}%)`;
        } else {
            // Warm colors for 1 bits - position determines hue
            const t = bitIndex / totalBits;
            const logV = Math.log2(value + 1) / Math.log2(globalMax + 1);
            const h = 20 + t * 40 + logV * 60; // orange to green spectrum
            const s = 70 + logV * 30;
            const l = 35 + t * 20;
            return `hsl(${h}, ${s}%, ${l}%)`;
        }
    }

    let globalMax = 0;
    for (const seq of sequences) {
        for (const v of seq) {
            if (v > globalMax) globalMax = v;
        }
    }

    // Draw the landscape
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, totalHeight);

    // Title
    ctx.fillStyle = '#fbbf24';
    ctx.font = 'bold 18px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Binary Landscape: Collatz Sequences as Bit Patterns', W / 2, 30);
    ctx.fillStyle = '#667';
    ctx.font = '12px monospace';
    ctx.fillText('Each row = starting number | Each column = step in sequence | Cells = binary bits (LSB at top)', W / 2, 50);

    const startY = 65;

    for (let i = 0; i < sequences.length; i++) {
        const seq = sequences[i];
        const y0 = startY + i * rowHeight;

        // Row label
        ctx.fillStyle = '#556';
        ctx.font = '10px monospace';
        ctx.textAlign = 'right';
        ctx.fillText((i + 1).toString(), LABEL_W - 5, y0 + rowHeight / 2 + 3);

        // Draw each step as a column of bits
        for (let step = 0; step < seq.length; step++) {
            const val = seq[step];
            const binary = val.toString(2).padStart(BITS, '0');
            const x0 = LABEL_W + step * CELL_W;

            if (x0 > W) break;

            for (let b = 0; b < BITS; b++) {
                const bit = parseInt(binary[BITS - 1 - b]);
                const cx = x0;
                const cy = y0 + b * CELL_H;

                ctx.fillStyle = bitColor(bit, b, BITS, val);
                ctx.fillRect(cx, cy, CELL_W - 0.5, CELL_H - 0.5);
            }
        }
    }

    // Window resize - redraw
    window.addEventListener('resize', () => {
        location.reload();
    });
})();
} catch(e) {
    document.body.innerHTML = '<div style="color:#f66;padding:40px;font-size:18px;">Error: ' + e.message + '</div>';
    console.error(e);
}
</script>
</body>
</html>
