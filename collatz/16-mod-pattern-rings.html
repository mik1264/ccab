<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatz - Modular Pattern Rings</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
canvas { display: block; }
.back-link {
    position: fixed; top: 15px; left: 15px; z-index: 100;
    background: rgba(0,0,0,0.7); color: #fbbf24; text-decoration: none;
    padding: 8px 16px; border-radius: 8px; font-size: 14px;
    transition: background 0.3s;
}
.back-link:hover { background: rgba(0,0,0,0.9); }
.controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 100;
}
.controls button {
    background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.2);
    padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 14px;
    transition: all 0.3s;
}
.controls button:hover, .controls button.active {
    background: rgba(251,191,36,0.3); color: #fbbf24; border-color: #fbbf24;
}
.info {
    position: fixed; top: 15px; right: 15px; color: rgba(255,255,255,0.5);
    font-size: 13px; text-align: right; z-index: 100;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back to Gallery</a>
<div class="info" id="info">Adding sequences...</div>
<canvas id="canvas"></canvas>
<div class="controls">
    <button data-mod="7">M = 7</button>
    <button data-mod="12" class="active">M = 12</button>
    <button data-mod="16">M = 16</button>
    <button data-mod="24">M = 24</button>
    <button id="resetBtn">Reset &amp; Replay</button>
</div>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');
    let dpr = window.devicePixelRatio || 1;
    let W, H;

    function resize() {
        dpr = window.devicePixelRatio || 1;
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    function collatz(n) {
        const seq = [n];
        while (n !== 1 && seq.length < 10000) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            seq.push(n);
        }
        return seq;
    }

    let M = 12;
    let sequences = [];
    let currentAdd = 1;
    const maxN = 50;
    let animFrame = 0;

    function hslColor(i, total) {
        const hue = (i / total) * 360;
        return { h: hue, s: 70, l: 55 };
    }

    function reset() {
        sequences = [];
        currentAdd = 1;
        animFrame = 0;
    }

    function drawRing() {
        ctx.clearRect(0, 0, W, H);

        const cx = W / 2;
        const cy = H / 2;
        const radius = Math.min(W, H) * 0.35;

        // Draw clock points
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        for (let i = 0; i < M; i++) {
            const angle = (i / M) * Math.PI * 2 - Math.PI / 2;
            const px = cx + Math.cos(angle) * radius;
            const py = cy + Math.sin(angle) * radius;
            ctx.beginPath();
            ctx.arc(px, py, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const lx = cx + Math.cos(angle) * (radius + 20);
            const ly = cy + Math.sin(angle) * (radius + 20);
            ctx.fillText(i, lx, ly);
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
        }

        // Draw outer circle
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.stroke();

        // Draw sequences
        for (let s = 0; s < sequences.length; s++) {
            const seq = sequences[s];
            const col = hslColor(s, maxN);
            const alpha = 0.15 + 0.1 * (s === sequences.length - 1 ? 1 : 0);

            ctx.strokeStyle = `hsla(${col.h}, ${col.s}%, ${col.l}%, ${alpha})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();

            for (let i = 0; i < seq.drawLen; i++) {
                const val = seq.mods[i];
                const angle = (val / M) * Math.PI * 2 - Math.PI / 2;
                const r = radius - 5 + Math.sin(i * 0.3) * 5;
                const px = cx + Math.cos(angle) * r;
                const py = cy + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();
        }

        // Title
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`Modular Pattern Rings (mod ${M})`, cx, 40);
    }

    function animate() {
        animFrame++;

        // Add new sequence every 8 frames
        if (currentAdd <= maxN && animFrame % 8 === 0) {
            const seq = collatz(currentAdd);
            const mods = seq.map(v => v % M);
            sequences.push({ n: currentAdd, mods, drawLen: 0, targetLen: mods.length });
            info.textContent = `Sequences: ${sequences.length} / ${maxN}`;
            currentAdd++;
        }

        // Grow draw lengths
        for (const seq of sequences) {
            if (seq.drawLen < seq.targetLen) {
                seq.drawLen = Math.min(seq.drawLen + 3, seq.targetLen);
            }
        }

        drawRing();
        requestAnimationFrame(animate);
    }

    // Button handlers
    document.querySelectorAll('[data-mod]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-mod]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            M = parseInt(btn.dataset.mod);
            // Recompute mods
            for (const seq of sequences) {
                const raw = collatz(seq.n);
                seq.mods = raw.map(v => v % M);
                seq.targetLen = seq.mods.length;
                seq.drawLen = seq.targetLen; // show immediately
            }
        });
    });

    document.getElementById('resetBtn').addEventListener('click', reset);

    animate();
} catch (e) {
    document.body.innerHTML = '<div style="color:red;padding:40px;font-size:18px;">Error: ' + e.message + '</div>';
}
</script>
</body>
</html>
