<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatz - 3D Trajectory</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
canvas { display: block; cursor: grab; }
canvas:active { cursor: grabbing; }
.back-link {
    position: fixed; top: 15px; left: 15px; z-index: 100;
    background: rgba(0,0,0,0.7); color: #fbbf24; text-decoration: none;
    padding: 8px 16px; border-radius: 8px; font-size: 14px;
    transition: background 0.3s;
}
.back-link:hover { background: rgba(0,0,0,0.9); }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.4); font-size: 13px; z-index: 100;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back to Gallery</a>
<canvas id="canvas"></canvas>
<div class="info">Click and drag to rotate | Numbers 1-50</div>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dpr = window.devicePixelRatio || 1;
    let W, H;

    function resize() {
        dpr = window.devicePixelRatio || 1;
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    function collatz(n) {
        const seq = [n];
        while (n !== 1 && seq.length < 10000) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            seq.push(n);
        }
        return seq;
    }

    // Generate all sequences
    const maxN = 50;
    const sequences = [];
    let globalMaxVal = 0;
    let globalMaxSteps = 0;

    for (let n = 1; n <= maxN; n++) {
        const seq = collatz(n);
        sequences.push({ n, seq });
        globalMaxSteps = Math.max(globalMaxSteps, seq.length);
        for (const v of seq) globalMaxVal = Math.max(globalMaxVal, v);
    }

    // Camera rotation
    let rotX = -0.4;
    let rotY = 0.6;
    let dragging = false;
    let lastMX = 0, lastMY = 0;

    canvas.addEventListener('mousedown', (e) => { dragging = true; lastMX = e.clientX; lastMY = e.clientY; });
    canvas.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        rotY += (e.clientX - lastMX) * 0.005;
        rotX += (e.clientY - lastMY) * 0.005;
        rotX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotX));
        lastMX = e.clientX;
        lastMY = e.clientY;
    });
    canvas.addEventListener('mouseup', () => dragging = false);
    canvas.addEventListener('mouseleave', () => dragging = false);

    // Touch support
    canvas.addEventListener('touchstart', (e) => {
        dragging = true;
        lastMX = e.touches[0].clientX;
        lastMY = e.touches[0].clientY;
    });
    canvas.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        e.preventDefault();
        rotY += (e.touches[0].clientX - lastMX) * 0.005;
        rotX += (e.touches[0].clientY - lastMY) * 0.005;
        rotX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotX));
        lastMX = e.touches[0].clientX;
        lastMY = e.touches[0].clientY;
    }, { passive: false });
    canvas.addEventListener('touchend', () => dragging = false);

    function project(x, y, z) {
        // Normalize to [-1, 1]
        const nx = (x / globalMaxSteps) * 2 - 1;
        const ny = (y / globalMaxVal) * 2 - 1;
        const nz = (z / maxN) * 2 - 1;

        // Rotate around Y
        const cosY = Math.cos(rotY), sinY = Math.sin(rotY);
        const rx = nx * cosY - nz * sinY;
        const rz = nx * sinY + nz * cosY;

        // Rotate around X
        const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
        const ry = ny * cosX - rz * sinX;
        const rz2 = ny * sinX + rz * cosX;

        // Perspective
        const fov = 3;
        const scale = fov / (fov + rz2 + 2);
        const sx = W / 2 + rx * scale * Math.min(W, H) * 0.35;
        const sy = H / 2 - ry * scale * Math.min(W, H) * 0.35;

        return { x: sx, y: sy, depth: rz2 };
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Draw axes
        const axes = [
            { from: [0, 0, 0], to: [globalMaxSteps, 0, 0], label: 'Steps', color: 'rgba(255,100,100,0.4)' },
            { from: [0, 0, 0], to: [0, globalMaxVal, 0], label: 'Value', color: 'rgba(100,255,100,0.4)' },
            { from: [0, 0, 0], to: [0, 0, maxN], label: 'Start N', color: 'rgba(100,100,255,0.4)' }
        ];

        for (const ax of axes) {
            const p0 = project(ax.from[0], ax.from[1], ax.from[2]);
            const p1 = project(ax.to[0], ax.to[1], ax.to[2]);
            ctx.strokeStyle = ax.color;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(p0.x, p0.y);
            ctx.lineTo(p1.x, p1.y);
            ctx.stroke();

            ctx.fillStyle = ax.color;
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(ax.label, p1.x + 10, p1.y - 5);
        }

        // Sort sequences by average depth for painter's algorithm
        const seqsWithDepth = sequences.map(s => {
            let totalDepth = 0;
            for (let i = 0; i < s.seq.length; i++) {
                const p = project(i, s.seq[i], s.n);
                totalDepth += p.depth;
            }
            return { ...s, avgDepth: totalDepth / s.seq.length };
        });
        seqsWithDepth.sort((a, b) => a.avgDepth - b.avgDepth);

        // Draw sequences
        for (const s of seqsWithDepth) {
            const hue = (s.n / maxN) * 300;
            const points = [];
            for (let i = 0; i < s.seq.length; i++) {
                points.push(project(i, s.seq[i], s.n));
            }

            // Depth-based alpha
            const depthAlpha = 0.2 + 0.6 * ((s.avgDepth + 2) / 4);
            const alpha = Math.max(0.05, Math.min(0.8, depthAlpha));

            ctx.strokeStyle = `hsla(${hue}, 70%, 60%, ${alpha})`;
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            for (let i = 0; i < points.length; i++) {
                if (i === 0) ctx.moveTo(points[i].x, points[i].y);
                else ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();

            // Starting point dot
            if (points.length > 0) {
                ctx.fillStyle = `hsla(${hue}, 80%, 70%, ${alpha * 1.2})`;
                ctx.beginPath();
                ctx.arc(points[0].x, points[0].y, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Title
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = 'bold 20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('3D Collatz Trajectories', W / 2, 40);

        // Auto rotate slowly when not dragging
        if (!dragging) {
            rotY += 0.002;
        }

        requestAnimationFrame(draw);
    }

    draw();
} catch (e) {
    document.body.innerHTML = '<div style="color:red;padding:40px;font-size:18px;">Error: ' + e.message + '</div>';
}
</script>
</body>
</html>
