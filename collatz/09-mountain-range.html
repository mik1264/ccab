<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatz Mountains - Mountain Range Visualization</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
.back-link {
    position: fixed; top: 15px; left: 15px; z-index: 100;
    color: #fbbf24; text-decoration: none; font-size: 14px;
    background: rgba(10, 14, 26, 0.85); padding: 8px 14px;
    border-radius: 8px; border: 1px solid rgba(251, 191, 36, 0.3);
    transition: background 0.2s;
}
.back-link:hover { background: rgba(251, 191, 36, 0.15); }
#fps {
    position: fixed; top: 15px; right: 15px; z-index: 100;
    color: #8f8; font-size: 13px; font-family: monospace;
    background: rgba(10, 14, 26, 0.85); padding: 6px 10px;
    border-radius: 6px;
}
#info {
    position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
    z-index: 100; color: #aab; font-size: 13px; text-align: center;
    background: rgba(10, 14, 26, 0.85); padding: 8px 16px;
    border-radius: 8px;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div id="fps">FPS: --</div>
<div id="info">Collatz sequences as a mountain range with drifting clouds</div>
<canvas id="canvas"></canvas>
<script>
try {
(function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fpsEl = document.getElementById('fps');
    const dpr = window.devicePixelRatio || 1;

    let W, H;
    function resize() {
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W * dpr; canvas.height = H * dpr;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // Collatz
    function collatzSequence(n) {
        const seq = [n];
        while (n !== 1 && seq.length < 300) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            seq.push(n);
        }
        return seq;
    }

    // Generate mountain data - select interesting sequences
    const MAX_N = 100;
    const mountains = [];
    let globalMaxVal = 0;
    let globalMaxLen = 0;

    for (let i = 2; i <= MAX_N; i++) {
        const seq = collatzSequence(i);
        const maxVal = Math.max(...seq);
        if (maxVal > globalMaxVal) globalMaxVal = maxVal;
        if (seq.length > globalMaxLen) globalMaxLen = seq.length;
        mountains.push({ n: i, seq, maxVal });
    }

    // Sort by max value for layering (tallest in back)
    mountains.sort((a, b) => b.maxVal - a.maxVal);

    // Color palettes - sunset
    function mountainColor(depth, totalLayers) {
        const t = depth / totalLayers;
        // Far (back) = light purple, close (front) = dark warm
        const r = Math.round(40 + t * 160);
        const g = Math.round(15 + t * 40);
        const b = Math.round(60 + (1 - t) * 120);
        return { r, g, b };
    }

    // Clouds
    const clouds = [];
    for (let i = 0; i < 15; i++) {
        clouds.push({
            x: Math.random() * W * 1.5 - W * 0.25,
            y: 60 + Math.random() * H * 0.3,
            r: 20 + Math.random() * 50,
            speed: 0.2 + Math.random() * 0.5,
            opacity: 0.05 + Math.random() * 0.1,
            parts: Array.from({ length: 3 + Math.floor(Math.random() * 4) }, () => ({
                dx: (Math.random() - 0.5) * 60,
                dy: (Math.random() - 0.5) * 20,
                r: 15 + Math.random() * 35
            }))
        });
    }

    // Stars
    const stars = Array.from({ length: 120 }, () => ({
        x: Math.random() * 2000,
        y: Math.random() * 400,
        r: 0.5 + Math.random() * 1.5,
        twinkle: Math.random() * Math.PI * 2
    }));

    // FPS
    let lastTime = performance.now(), frameCount = 0;

    function draw(time) {
        requestAnimationFrame(draw);
        const now = performance.now();
        frameCount++;
        if (now - lastTime >= 500) {
            fpsEl.textContent = 'FPS: ' + Math.round(frameCount * 1000 / (now - lastTime));
            frameCount = 0; lastTime = now;
        }

        const t = time * 0.001;

        // Sky gradient
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        skyGrad.addColorStop(0, '#0a0e1a');
        skyGrad.addColorStop(0.3, '#1a1035');
        skyGrad.addColorStop(0.6, '#3d1a4a');
        skyGrad.addColorStop(0.85, '#7a2e3a');
        skyGrad.addColorStop(1, '#c2533a');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, H);

        // Stars
        for (const star of stars) {
            const sx = star.x % W;
            const twinkle = 0.4 + 0.6 * Math.sin(t * 2 + star.twinkle);
            ctx.beginPath();
            ctx.arc(sx, star.y, star.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 230, ${twinkle * 0.8})`;
            ctx.fill();
        }

        // Title
        ctx.fillStyle = 'rgba(251, 191, 36, 0.9)';
        ctx.font = 'bold 20px Segoe UI, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Collatz Mountains', W / 2, 35);

        // Draw mountains (back to front)
        const numLayers = Math.min(mountains.length, 40);
        const baseline = H;
        const heightScale = (H - 100) / Math.log(globalMaxVal + 1);

        for (let layer = 0; layer < numLayers; layer++) {
            const m = mountains[layer];
            const seq = m.seq;
            const depth = layer / numLayers;
            const col = mountainColor(depth, numLayers);
            const alpha = 0.3 + depth * 0.5;

            const stepW = W / (seq.length - 1 || 1);
            const yScale = heightScale * (0.3 + depth * 0.7);

            ctx.beginPath();
            ctx.moveTo(0, baseline);

            for (let s = 0; s < seq.length; s++) {
                const x = s * stepW;
                const y = baseline - Math.log(seq[s] + 1) * yScale;
                if (s === 0) ctx.lineTo(x, y);
                else ctx.lineTo(x, y);
            }

            ctx.lineTo((seq.length - 1) * stepW, baseline);
            ctx.closePath();

            ctx.fillStyle = `rgba(${col.r}, ${col.g}, ${col.b}, ${alpha})`;
            ctx.fill();

            // Ridge line
            ctx.beginPath();
            for (let s = 0; s < seq.length; s++) {
                const x = s * stepW;
                const y = baseline - Math.log(seq[s] + 1) * yScale;
                if (s === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = `rgba(${Math.min(255, col.r + 40)}, ${Math.min(255, col.g + 20)}, ${Math.min(255, col.b + 30)}, ${alpha * 0.5})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
        }

        // Clouds
        for (const cloud of clouds) {
            cloud.x += cloud.speed;
            if (cloud.x > W + 100) cloud.x = -150;

            for (const part of cloud.parts) {
                ctx.beginPath();
                ctx.arc(cloud.x + part.dx, cloud.y + part.dy + Math.sin(t + cloud.x * 0.01) * 3, part.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 180, 200, ${cloud.opacity})`;
                ctx.fill();
            }
        }

        // Ground fog
        const fogGrad = ctx.createLinearGradient(0, H - 40, 0, H);
        fogGrad.addColorStop(0, 'rgba(10, 14, 26, 0)');
        fogGrad.addColorStop(1, 'rgba(10, 14, 26, 0.8)');
        ctx.fillStyle = fogGrad;
        ctx.fillRect(0, H - 40, W, 40);
    }

    requestAnimationFrame(draw);
})();
} catch(e) {
    document.body.innerHTML = '<div style="color:#f66;padding:40px;font-size:18px;">Error: ' + e.message + '</div>';
    console.error(e);
}
</script>
</body>
</html>
