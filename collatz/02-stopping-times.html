<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatz Stopping Times</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
canvas { display: block; }
.back-link {
    position: fixed; top: 16px; left: 16px; color: #fbbf24; text-decoration: none;
    font-size: 14px; z-index: 100; background: rgba(10,14,26,0.8); padding: 8px 14px;
    border-radius: 8px; border: 1px solid rgba(251,191,36,0.3); transition: background 0.2s;
}
.back-link:hover { background: rgba(251,191,36,0.15); }
#fps { position: fixed; top: 16px; right: 16px; font-size: 12px; color: #6b7280; z-index: 100;
    background: rgba(10,14,26,0.8); padding: 4px 10px; border-radius: 6px; font-family: monospace; }
.title {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
    font-size: 18px; font-weight: 600; color: #e5e7eb; background: rgba(10,14,26,0.9);
    padding: 8px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
}
#tooltip {
    position: fixed; display: none; background: rgba(10,14,26,0.95); border: 1px solid rgba(251,191,36,0.5);
    padding: 8px 14px; border-radius: 8px; font-size: 13px; pointer-events: none; z-index: 200;
    color: #e5e7eb; white-space: nowrap;
}
#tooltip .tt-num { color: #fbbf24; font-weight: 700; }
#loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #0a0e1a; z-index: 200; font-size: 18px; color: #6b7280;
}
.spinner { width: 40px; height: 40px; border: 3px solid rgba(251,191,36,0.2);
    border-top-color: #fbbf24; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div>Loading...</div>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div id="fps">-- FPS</div>
<div class="title">Stopping Times (n = 1 to 500)</div>
<div id="tooltip"><span class="tt-num" id="ttNum"></span><br>Steps: <span id="ttSteps"></span></div>
<canvas id="canvas"></canvas>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    let W, H;

    function resize() {
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W * dpr; canvas.height = H * dpr;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    const COUNT = 500;
    const stoppingTimes = [];
    let maxSteps = 0;

    for (let i = 1; i <= COUNT; i++) {
        let n = i, steps = 0;
        while (n !== 1) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            steps++;
        }
        stoppingTimes.push(steps);
        if (steps > maxSteps) maxSteps = steps;
    }

    let hoverIndex = -1;
    const tooltip = document.getElementById('tooltip');

    canvas.addEventListener('mousemove', (e) => {
        const margin = { top: 70, bottom: 60, left: 60, right: 30 };
        const plotW = W - margin.left - margin.right;
        const barW = plotW / COUNT;
        const idx = Math.floor((e.clientX - margin.left) / barW);
        if (idx >= 0 && idx < COUNT) {
            hoverIndex = idx;
            document.getElementById('ttNum').textContent = 'n = ' + (idx + 1);
            document.getElementById('ttSteps').textContent = stoppingTimes[idx];
            tooltip.style.display = 'block';
            tooltip.style.left = Math.min(e.clientX + 14, W - 150) + 'px';
            tooltip.style.top = (e.clientY - 50) + 'px';
        } else {
            hoverIndex = -1;
            tooltip.style.display = 'none';
        }
    });
    canvas.addEventListener('mouseleave', () => { hoverIndex = -1; tooltip.style.display = 'none'; });

    let frameCount = 0, lastFpsTime = performance.now(), fps = 0;

    function draw() {
        ctx.clearRect(0, 0, W, H);
        const margin = { top: 70, bottom: 60, left: 60, right: 30 };
        const plotW = W - margin.left - margin.right;
        const plotH = H - margin.top - margin.bottom;
        const barW = plotW / COUNT;
        const yScale = plotH / maxSteps;

        // Y axis grid
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        const yTicks = 6;
        for (let i = 0; i <= yTicks; i++) {
            const val = Math.round((i / yTicks) * maxSteps);
            const y = margin.top + plotH - val * yScale;
            ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(W - margin.right, y); ctx.stroke();
            ctx.fillStyle = '#4b5563'; ctx.font = '11px monospace'; ctx.textAlign = 'right';
            ctx.fillText(val, margin.left - 8, y + 4);
        }

        // X axis labels
        ctx.fillStyle = '#4b5563'; ctx.textAlign = 'center'; ctx.font = '11px monospace';
        for (let i = 0; i < COUNT; i += 50) {
            const x = margin.left + (i + 0.5) * barW;
            ctx.fillText(i + 1, x, margin.top + plotH + 18);
        }

        // Axis labels
        ctx.fillStyle = '#6b7280'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('Starting Number', margin.left + plotW / 2, H - 12);
        ctx.save(); ctx.translate(14, margin.top + plotH / 2); ctx.rotate(-Math.PI / 2);
        ctx.fillText('Steps to reach 1', 0, 0); ctx.restore();

        // Bars
        for (let i = 0; i < COUNT; i++) {
            const steps = stoppingTimes[i];
            const t = steps / maxSteps;
            const r = Math.round(34 + t * 221);
            const g = Math.round(197 - t * 140);
            const b = Math.round(94 - t * 30);
            const x = margin.left + i * barW;
            const barH = steps * yScale;
            const y = margin.top + plotH - barH;

            if (i === hoverIndex) {
                ctx.fillStyle = '#fbbf24';
                ctx.shadowColor = '#fbbf24';
                ctx.shadowBlur = 10;
            } else {
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.shadowBlur = 0;
            }
            ctx.fillRect(x, y, Math.max(barW - 0.5, 1), barH);
            ctx.shadowBlur = 0;
        }
    }

    function loop() {
        requestAnimationFrame(loop);
        frameCount++;
        const now = performance.now();
        if (now - lastFpsTime >= 1000) {
            fps = frameCount; frameCount = 0; lastFpsTime = now;
            document.getElementById('fps').textContent = fps + ' FPS';
        }
        draw();
    }

    document.getElementById('loading').style.display = 'none';
    loop();
} catch (e) {
    document.getElementById('loading').innerHTML = '<div style="color:#ef4444;text-align:center;">Error: ' + e.message + '</div>';
    console.error(e);
}
</script>
</body>
</html>
