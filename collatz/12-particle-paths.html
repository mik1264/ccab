<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Paths - Collatz Conjecture</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0e1a;
        color: #e0e0e0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
    }
    canvas { display: block; }
    .back-link {
        position: fixed; top: 12px; left: 12px; z-index: 100;
        background: rgba(0,0,0,0.7); color: #fbbf24;
        text-decoration: none; padding: 8px 16px; border-radius: 6px;
        font-size: 14px; font-weight: 500;
        transition: background 0.2s;
    }
    .back-link:hover { background: rgba(0,0,0,0.9); }
    .title {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
        z-index: 100; font-size: 20px; font-weight: 600; color: #fbbf24;
        text-shadow: 0 0 10px rgba(251,191,36,0.3);
    }
    .info {
        position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
        z-index: 100; font-size: 12px; color: #666;
        background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 6px;
    }
</style>
</head>
<body>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div class="title">Particle Paths</div>
<div class="info">X = step number &nbsp;|&nbsp; Y = current value (log scale) &nbsp;|&nbsp; Starting numbers 1-500</div>
<canvas id="canvas"></canvas>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    let W, H;

    const neonColors = [
        '#ff006e', '#fb5607', '#ff006e', '#8338ec',
        '#3a86ff', '#06d6a0', '#ffd166', '#ef476f',
        '#00f5d4', '#7209b7', '#f72585', '#4cc9f0',
        '#80ffdb', '#e0aaff', '#ff9e00'
    ];

    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function collatzSequence(n) {
        const seq = [n];
        while (n !== 1 && seq.length < 500) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            seq.push(n);
        }
        return seq;
    }

    class Particle {
        constructor() {
            this.startNum = Math.floor(Math.random() * 500) + 1;
            this.seq = collatzSequence(this.startNum);
            this.color = neonColors[Math.floor(Math.random() * neonColors.length)];
            this.pos = 0;
            this.speed = 0.3 + Math.random() * 0.5;
            this.alpha = 1;
            this.trail = [];
            this.done = false;
        }

        update() {
            if (this.done) return;
            this.pos += this.speed;
            if (this.pos >= this.seq.length - 1) {
                this.done = true;
                this.alpha -= 0.02;
                return;
            }
            const idx = Math.floor(this.pos);
            const frac = this.pos - idx;
            const v1 = this.seq[idx];
            const v2 = this.seq[Math.min(idx + 1, this.seq.length - 1)];
            const val = v1 + (v2 - v1) * frac;

            const maxSteps = this.seq.length;
            const padX = 60;
            const padY = 60;
            const x = padX + (this.pos / maxSteps) * (W - padX * 2);
            const maxVal = Math.max(...this.seq);
            const logMax = Math.log(maxVal + 1);
            const y = H - padY - (Math.log(val + 1) / logMax) * (H - padY * 2);

            this.trail.push({ x, y });
            if (this.trail.length > 80) this.trail.shift();
        }

        draw() {
            if (this.trail.length < 2) return;
            const fade = this.done ? Math.max(0, this.alpha) : 1;
            for (let i = 1; i < this.trail.length; i++) {
                const a = (i / this.trail.length) * fade;
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.globalAlpha = a * 0.7;
                ctx.lineWidth = 1.5;
                ctx.moveTo(this.trail[i - 1].x, this.trail[i - 1].y);
                ctx.lineTo(this.trail[i].x, this.trail[i].y);
                ctx.stroke();
            }
            // head glow
            const head = this.trail[this.trail.length - 1];
            ctx.globalAlpha = fade;
            ctx.beginPath();
            ctx.arc(head.x, head.y, 3, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.globalAlpha = fade * 0.3;
            ctx.beginPath();
            ctx.arc(head.x, head.y, 8, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    let particles = [];
    let spawnTimer = 0;

    function animate() {
        ctx.fillStyle = 'rgba(10, 14, 26, 0.15)';
        ctx.fillRect(0, 0, W, H);

        spawnTimer++;
        if (spawnTimer % 20 === 0 && particles.length < 30) {
            particles.push(new Particle());
        }

        for (const p of particles) {
            p.update();
            p.draw();
        }

        particles = particles.filter(p => !(p.done && p.alpha <= 0));
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    // clear fully on first frame
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);
    animate();

} catch (err) {
    document.body.innerHTML = '<div style="color:#f87171;padding:40px;font-size:18px;">Error: ' + err.message + '</div>';
}
</script>
</body>
</html>
