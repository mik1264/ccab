<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatz Tree</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
canvas { display: block; }
.back-link {
    position: fixed; top: 16px; left: 16px; color: #fbbf24; text-decoration: none;
    font-size: 14px; z-index: 100; background: rgba(10,14,26,0.8); padding: 8px 14px;
    border-radius: 8px; border: 1px solid rgba(251,191,36,0.3); transition: background 0.2s;
}
.back-link:hover { background: rgba(251,191,36,0.15); }
#fps { position: fixed; top: 16px; right: 16px; font-size: 12px; color: #6b7280; z-index: 100;
    background: rgba(10,14,26,0.8); padding: 4px 10px; border-radius: 6px; font-family: monospace; }
.title {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
    font-size: 18px; font-weight: 600; color: #e5e7eb; background: rgba(10,14,26,0.9);
    padding: 8px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
}
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    font-size: 13px; color: #6b7280; background: rgba(10,14,26,0.9);
    padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
}
#loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #0a0e1a; z-index: 200; font-size: 18px; color: #6b7280;
}
.spinner { width: 40px; height: 40px; border: 3px solid rgba(251,191,36,0.2);
    border-top-color: #fbbf24; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div>Building tree...</div>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div id="fps">-- FPS</div>
<div class="title">Reverse Collatz Tree</div>
<div class="info" id="info">Growing...</div>
<canvas id="canvas"></canvas>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    let W, H;

    function resize() {
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W * dpr; canvas.height = H * dpr;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    const MAX_DEPTH = 15;

    // Build tree structure
    // Each node: { value, children: [], angle, radius, x, y, depth }
    function buildTree() {
        const root = { value: 1, children: [], depth: 0 };
        const queue = [root];
        const seen = new Set([1]);
        let nodeCount = 1;

        while (queue.length > 0) {
            const node = queue.shift();
            if (node.depth >= MAX_DEPTH) continue;

            // Predecessor 1: 2n (always valid)
            const p1 = node.value * 2;
            if (!seen.has(p1) && p1 < 1000000) {
                const child1 = { value: p1, children: [], depth: node.depth + 1 };
                node.children.push(child1);
                seen.add(p1);
                queue.push(child1);
                nodeCount++;
            }

            // Predecessor 2: (n-1)/3 only if (n-1) divisible by 3 and result is odd and > 0
            if ((node.value - 1) % 3 === 0) {
                const p2 = (node.value - 1) / 3;
                if (p2 > 0 && p2 % 2 === 1 && !seen.has(p2)) {
                    const child2 = { value: p2, children: [], depth: node.depth + 1 };
                    node.children.push(child2);
                    seen.add(p2);
                    queue.push(child2);
                    nodeCount++;
                }
            }
        }
        return { root, nodeCount };
    }

    const { root, nodeCount } = buildTree();

    // Layout: radial from center
    function layoutTree(node, angleStart, angleEnd, depth) {
        const maxR = Math.min(W, H) * 0.44;
        const r = (depth / MAX_DEPTH) * maxR;
        const angle = (angleStart + angleEnd) / 2;
        node.angle = angle;
        node.radius = r;
        node.x = W / 2 + Math.cos(angle) * r;
        node.y = H / 2 + Math.sin(angle) * r;

        if (node.children.length === 0) return;
        const span = angleEnd - angleStart;
        const childSpan = span / node.children.length;
        node.children.forEach((child, i) => {
            layoutTree(child, angleStart + i * childSpan, angleStart + (i + 1) * childSpan, depth + 1);
        });
    }

    layoutTree(root, 0, Math.PI * 2, 0);

    // Collect all edges with depth info
    const edges = [];
    function collectEdges(node) {
        node.children.forEach(child => {
            edges.push({ x1: node.x, y1: node.y, x2: child.x, y2: child.y, depth: child.depth });
            collectEdges(child);
        });
    }
    collectEdges(root);

    // Animation: reveal by depth
    let currentDepth = 0;
    let depthTimer = 0;
    const DEPTH_INTERVAL = 400; // ms per level
    let lastTime = performance.now();

    function hslForDepth(d) {
        const hue = (d / MAX_DEPTH) * 300;
        return `hsl(${hue}, 80%, 60%)`;
    }

    let frameCount = 0, lastFpsTime = performance.now(), fps = 0;

    function draw(time) {
        requestAnimationFrame(draw);
        const dt = time - lastTime;
        lastTime = time;

        frameCount++;
        if (time - lastFpsTime >= 1000) {
            fps = frameCount; frameCount = 0; lastFpsTime = time;
            document.getElementById('fps').textContent = fps + ' FPS';
        }

        if (currentDepth <= MAX_DEPTH) {
            depthTimer += dt;
            if (depthTimer >= DEPTH_INTERVAL) {
                depthTimer -= DEPTH_INTERVAL;
                currentDepth++;
            }
        }

        // Re-layout on each frame in case of resize
        layoutTree(root, 0, Math.PI * 2, 0);
        edges.length = 0;
        collectEdges(root);

        ctx.clearRect(0, 0, W, H);

        // Draw edges
        for (const e of edges) {
            if (e.depth > currentDepth) continue;
            const alpha = e.depth === currentDepth ? Math.min(depthTimer / DEPTH_INTERVAL, 1) : 1;
            ctx.strokeStyle = hslForDepth(e.depth);
            ctx.globalAlpha = alpha * 0.7;
            ctx.lineWidth = Math.max(1, 3 - e.depth * 0.2);
            ctx.beginPath();
            ctx.moveTo(e.x1, e.y1);
            ctx.lineTo(e.x2, e.y2);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // Draw center node
        ctx.beginPath();
        ctx.arc(W / 2, H / 2, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#fbbf24';
        ctx.fill();
        ctx.fillStyle = '#0a0e1a';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('1', W / 2, H / 2);

        document.getElementById('info').textContent =
            currentDepth > MAX_DEPTH
                ? `${nodeCount} nodes, ${MAX_DEPTH} levels deep`
                : `Growing level ${Math.min(currentDepth, MAX_DEPTH)} of ${MAX_DEPTH}...`;
    }

    document.getElementById('loading').style.display = 'none';
    requestAnimationFrame(draw);
} catch (e) {
    document.getElementById('loading').innerHTML = '<div style="color:#ef4444;text-align:center;">Error: ' + e.message + '</div>';
    console.error(e);
}
</script>
</body>
</html>
