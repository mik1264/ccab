<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hailstone Peaks - Collatz Conjecture</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
.back-link {
    position: fixed; top: 15px; left: 15px; z-index: 100;
    color: #fbbf24; text-decoration: none; font-size: 14px;
    background: rgba(10, 14, 26, 0.85); padding: 8px 14px;
    border-radius: 8px; border: 1px solid rgba(251, 191, 36, 0.3);
    transition: background 0.2s;
}
.back-link:hover { background: rgba(251, 191, 36, 0.15); }
#fps {
    position: fixed; top: 15px; right: 15px; z-index: 100;
    color: #8f8; font-size: 13px; font-family: monospace;
    background: rgba(10, 14, 26, 0.85); padding: 6px 10px;
    border-radius: 6px;
}
#info {
    position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
    z-index: 100; color: #aab; font-size: 13px; text-align: center;
    background: rgba(10, 14, 26, 0.85); padding: 8px 16px;
    border-radius: 8px;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div id="fps">FPS: --</div>
<div id="info">Scroll to zoom, drag to pan. Hover dots for details.</div>
<canvas id="canvas"></canvas>
<script>
try {
(function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fpsEl = document.getElementById('fps');
    const infoEl = document.getElementById('info');
    const dpr = window.devicePixelRatio || 1;

    let W, H;
    function resize() {
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W * dpr; canvas.height = H * dpr;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // Collatz sequence computation
    function collatzSequence(n) {
        const seq = [n];
        while (n !== 1) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            seq.push(n);
        }
        return seq;
    }

    // Precompute data for n=1..1000
    const MAX_N = 1000;
    const data = [];
    let globalMaxVal = 0;
    let globalMaxStop = 0;
    for (let i = 1; i <= MAX_N; i++) {
        const seq = collatzSequence(i);
        const maxVal = Math.max(...seq);
        const stopTime = seq.length - 1;
        if (maxVal > globalMaxVal) globalMaxVal = maxVal;
        if (stopTime > globalMaxStop) globalMaxStop = stopTime;
        data.push({ n: i, maxVal, stopTime });
    }

    // View state
    let viewX = 0, viewY = 0, viewScale = 1;
    const margin = { left: 70, right: 30, top: 50, bottom: 50 };

    // Data ranges
    const dataXMin = 1, dataXMax = MAX_N;
    const dataYMin = 1, dataYMax = globalMaxVal;

    function dataToScreen(dx, dy) {
        const plotW = W - margin.left - margin.right;
        const plotH = H - margin.top - margin.bottom;
        const sx = margin.left + ((dx - dataXMin) / (dataXMax - dataXMin)) * plotW;
        const sy = H - margin.bottom - ((dy - dataYMin) / (dataYMax - dataYMin)) * plotH;
        return [(sx + viewX) * viewScale + W * (1 - viewScale) / 2,
                (sy + viewY) * viewScale + H * (1 - viewScale) / 2];
    }

    function screenToData(sx, sy) {
        const plotW = W - margin.left - margin.right;
        const plotH = H - margin.top - margin.bottom;
        const ux = (sx - W * (1 - viewScale) / 2) / viewScale - viewX;
        const uy = (sy - H * (1 - viewScale) / 2) / viewScale - viewY;
        const dx = ((ux - margin.left) / plotW) * (dataXMax - dataXMin) + dataXMin;
        const dy = ((H - margin.bottom - uy) / plotH) * (dataYMax - dataYMin) + dataYMin;
        return [dx, dy];
    }

    // Mouse interaction
    let isDragging = false, dragStartX = 0, dragStartY = 0;
    let mouseX = -1, mouseY = -1;

    canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        dragStartX = e.clientX - viewX * viewScale;
        dragStartY = e.clientY - viewY * viewScale;
    });
    canvas.addEventListener('mousemove', (e) => {
        mouseX = e.clientX; mouseY = e.clientY;
        if (isDragging) {
            viewX = (e.clientX - dragStartX) / viewScale;
            viewY = (e.clientY - dragStartY) / viewScale;
        }
    });
    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mouseleave', () => { isDragging = false; mouseX = -1; mouseY = -1; });
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
        const oldScale = viewScale;
        viewScale *= zoomFactor;
        viewScale = Math.max(0.5, Math.min(20, viewScale));
        // Zoom toward mouse
        viewX += (e.clientX - W / 2) * (1 / oldScale - 1 / viewScale);
        viewY += (e.clientY - H / 2) * (1 / oldScale - 1 / viewScale);
    }, { passive: false });

    // Color from log of max value
    function getColor(maxVal) {
        const t = Math.log(maxVal + 1) / Math.log(globalMaxVal + 1);
        const h = 200 + t * 160; // blue to magenta
        const s = 70 + t * 30;
        const l = 40 + t * 25;
        return `hsl(${h}, ${s}%, ${l}%)`;
    }

    // FPS tracking
    let lastTime = performance.now(), frameCount = 0, fpsValue = 0;

    function draw() {
        requestAnimationFrame(draw);
        const now = performance.now();
        frameCount++;
        if (now - lastTime >= 500) {
            fpsValue = Math.round(frameCount * 1000 / (now - lastTime));
            fpsEl.textContent = 'FPS: ' + fpsValue;
            frameCount = 0; lastTime = now;
        }

        ctx.fillStyle = '#0a0e1a';
        ctx.fillRect(0, 0, W, H);

        // Title
        ctx.fillStyle = '#fbbf24';
        ctx.font = 'bold 18px Segoe UI, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Hailstone Peaks: Max Value vs Starting Number (n=1 to 1000)', W / 2, 30);

        // Draw axes labels
        ctx.fillStyle = '#667';
        ctx.font = '12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('Starting Number (n)', W / 2, H - 10);
        ctx.save();
        ctx.translate(15, H / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText('Max Value in Sequence', 0, 0);
        ctx.restore();

        // Draw dots
        let hoveredPoint = null;
        let minDist = 15;

        for (let i = 0; i < data.length; i++) {
            const d = data[i];
            const [sx, sy] = dataToScreen(d.n, d.maxVal);
            if (sx < -50 || sx > W + 50 || sy < -50 || sy > H + 50) continue;

            const radius = 2 + (d.stopTime / globalMaxStop) * 6;
            const scaledR = radius * Math.min(viewScale, 3);

            ctx.beginPath();
            ctx.arc(sx, sy, scaledR, 0, Math.PI * 2);
            ctx.fillStyle = getColor(d.maxVal);
            ctx.globalAlpha = 0.75;
            ctx.fill();
            ctx.globalAlpha = 1;

            // Check hover
            if (mouseX >= 0) {
                const dx = sx - mouseX, dy = sy - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < minDist) {
                    minDist = dist;
                    hoveredPoint = { ...d, sx, sy, r: scaledR };
                }
            }
        }

        // Draw hovered point info
        if (hoveredPoint) {
            const p = hoveredPoint;
            ctx.beginPath();
            ctx.arc(p.sx, p.sy, p.r + 3, 0, Math.PI * 2);
            ctx.strokeStyle = '#fbbf24';
            ctx.lineWidth = 2;
            ctx.stroke();

            const txt = `n=${p.n}  max=${p.maxVal.toLocaleString()}  steps=${p.stopTime}`;
            ctx.font = '13px monospace';
            const tw = ctx.measureText(txt).width;
            const tx = Math.min(p.sx + 15, W - tw - 20);
            const ty = Math.max(p.sy - 15, 30);
            ctx.fillStyle = 'rgba(10,14,26,0.9)';
            ctx.fillRect(tx - 6, ty - 14, tw + 12, 22);
            ctx.fillStyle = '#fbbf24';
            ctx.fillText(txt, tx, ty);

            infoEl.textContent = `n = ${p.n} | Max value: ${p.maxVal.toLocaleString()} | Stopping time: ${p.stopTime} steps`;
        } else {
            infoEl.textContent = 'Scroll to zoom, drag to pan. Hover dots for details.';
        }

        // Axis tick marks (simplified)
        ctx.fillStyle = '#445';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        for (let n = 0; n <= MAX_N; n += 100) {
            const [sx] = dataToScreen(n, dataYMin);
            if (sx > margin.left && sx < W - margin.right) {
                ctx.fillText(n, sx, H - margin.bottom + 15);
            }
        }
        ctx.textAlign = 'right';
        const yTicks = [1, 1000, 10000, 50000, 100000, globalMaxVal];
        for (const v of yTicks) {
            const [, sy] = dataToScreen(dataXMin, v);
            if (sy > margin.top && sy < H - margin.bottom) {
                ctx.fillText(v >= 1000 ? (v / 1000) + 'k' : v, margin.left - 8, sy + 4);
            }
        }
    }

    draw();
})();
} catch(e) {
    document.body.innerHTML = '<div style="color:#f66;padding:40px;font-size:18px;">Error: ' + e.message + '</div>';
    console.error(e);
}
</script>
</body>
</html>
