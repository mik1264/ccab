<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benford's Law Analysis - Collatz Conjecture</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0e1a;
        color: #e0e0e0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
    }
    canvas { display: block; }
    .back-link {
        position: fixed; top: 12px; left: 12px; z-index: 100;
        background: rgba(0,0,0,0.7); color: #fbbf24;
        text-decoration: none; padding: 8px 16px; border-radius: 6px;
        font-size: 14px; font-weight: 500;
        transition: background 0.2s;
    }
    .back-link:hover { background: rgba(0,0,0,0.9); }
    .title {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
        z-index: 100; font-size: 20px; font-weight: 600; color: #fbbf24;
        text-shadow: 0 0 10px rgba(251,191,36,0.3);
    }
    #stats {
        position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
        z-index: 100; font-size: 13px; color: #aaa;
        background: rgba(0,0,0,0.6); padding: 6px 16px; border-radius: 6px;
        text-align: center;
    }
    #stats span { color: #fbbf24; font-weight: 600; }
    .legend {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        z-index: 100; display: flex; gap: 24px; align-items: center;
        background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 6px;
        font-size: 13px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div class="title">Benford's Law Analysis</div>
<div id="stats">Analyzing sequences... <span id="progress">0</span> / 1000 &nbsp;|&nbsp; Chi-squared: <span id="chi2">--</span></div>
<div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#0d9488"></div> Actual (Collatz)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fbbf24"></div> Benford's Prediction</div>
</div>
<canvas id="canvas"></canvas>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    let W, H;

    const teal = '#0d9488';
    const gold = '#fbbf24';

    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    // Benford predicted probabilities for digits 1-9
    const benford = [];
    for (let d = 1; d <= 9; d++) {
        benford.push(Math.log10(1 + 1 / d));
    }

    // First digit extraction
    function firstDigit(n) {
        if (n === 0) return 0;
        const s = String(Math.abs(n));
        return parseInt(s[0]);
    }

    // Compute Collatz sequence values
    function collatzValues(n) {
        const vals = [n];
        while (n !== 1 && vals.length < 1000) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            vals.push(n);
        }
        return vals;
    }

    const digitCounts = new Array(10).fill(0);
    let totalValues = 0;
    let currentN = 0;
    const MAX_N = 1000;
    let animPhase = 0; // 0 = computing, 1 = done

    function processNext() {
        currentN++;
        if (currentN > MAX_N) {
            animPhase = 1;
            return;
        }
        const vals = collatzValues(currentN);
        for (const v of vals) {
            const d = firstDigit(v);
            if (d >= 1 && d <= 9) {
                digitCounts[d]++;
                totalValues++;
            }
        }
    }

    function chiSquared() {
        if (totalValues === 0) return 0;
        let chi2 = 0;
        for (let d = 1; d <= 9; d++) {
            const observed = digitCounts[d] / totalValues;
            const expected = benford[d - 1];
            chi2 += Math.pow(observed - expected, 2) / expected;
        }
        return chi2 * totalValues;
    }

    function draw() {
        ctx.fillStyle = '#0a0e1a';
        ctx.fillRect(0, 0, W, H);

        const pad = { t: 100, b: 60, l: 80, r: 40 };
        const chartW = W - pad.l - pad.r;
        const chartH = H - pad.t - pad.b;

        // Grid lines
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 5; i++) {
            const y = pad.t + chartH - (i / 5) * chartH;
            ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
        }

        // Max probability for scaling
        const maxProb = 0.35;
        const barGroupW = chartW / 9;
        const barW = barGroupW * 0.3;
        const gap = barGroupW * 0.08;

        // Animate bar growth
        const growFactor = Math.min(1, animPhase === 1 ? 1 : currentN / MAX_N);

        for (let d = 1; d <= 9; d++) {
            const cx = pad.l + (d - 0.5) * barGroupW;
            const actualProb = totalValues > 0 ? digitCounts[d] / totalValues : 0;
            const expectedProb = benford[d - 1];

            // Actual bar (teal) - left
            const aH = (actualProb / maxProb) * chartH * growFactor;
            const ax = cx - barW - gap / 2;
            const ay = pad.t + chartH - aH;
            ctx.fillStyle = teal;
            ctx.globalAlpha = 0.85;
            ctx.fillRect(ax, ay, barW, aH);

            // Expected bar (gold) - right
            const eH = (expectedProb / maxProb) * chartH * growFactor;
            const ex = cx + gap / 2;
            const ey = pad.t + chartH - eH;
            ctx.fillStyle = gold;
            ctx.globalAlpha = 0.85;
            ctx.fillRect(ex, ey, barW, eH);

            ctx.globalAlpha = 1;

            // Digit label
            ctx.font = '14px monospace';
            ctx.fillStyle = '#aaa';
            ctx.textAlign = 'center';
            ctx.fillText(d.toString(), cx, pad.t + chartH + 20);

            // Percentage labels above bars
            if (totalValues > 0) {
                ctx.font = '10px monospace';
                ctx.fillStyle = teal;
                ctx.fillText((actualProb * 100).toFixed(1) + '%', ax + barW / 2, ay - 5);
                ctx.fillStyle = gold;
                ctx.fillText((expectedProb * 100).toFixed(1) + '%', ex + barW / 2, ey - 5);
            }
        }

        // Y-axis labels
        ctx.font = '11px monospace'; ctx.fillStyle = '#666'; ctx.textAlign = 'right';
        for (let i = 0; i <= 5; i++) {
            const y = pad.t + chartH - (i / 5) * chartH;
            ctx.fillText((maxProb * i / 5 * 100).toFixed(0) + '%', pad.l - 10, y + 4);
        }

        // Axes
        ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, pad.t + chartH);
        ctx.lineTo(W - pad.r, pad.t + chartH); ctx.stroke();

        // X-axis label
        ctx.font = '12px sans-serif'; ctx.fillStyle = '#888'; ctx.textAlign = 'center';
        ctx.fillText('First Digit', W / 2, pad.t + chartH + 45);

        // Update stats
        document.getElementById('progress').textContent = Math.min(currentN, MAX_N);
        document.getElementById('chi2').textContent = chiSquared().toFixed(2);
    }

    let batchSize = 5;

    function animate() {
        if (animPhase === 0) {
            for (let i = 0; i < batchSize; i++) processNext();
        }
        draw();
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', function() { resize(); draw(); });
    resize();
    animate();

} catch (err) {
    document.body.innerHTML = '<div style="color:#f87171;padding:40px;font-size:18px;">Error: ' + err.message + '</div>';
}
</script>
</body>
</html>
