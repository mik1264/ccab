<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odd/Even Rhythm - Collatz Conjecture</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
.back-link {
    position: fixed; top: 15px; left: 15px; z-index: 100;
    color: #fbbf24; text-decoration: none; font-size: 14px;
    background: rgba(10, 14, 26, 0.85); padding: 8px 14px;
    border-radius: 8px; border: 1px solid rgba(251, 191, 36, 0.3);
    transition: background 0.2s;
}
.back-link:hover { background: rgba(251, 191, 36, 0.15); }
#fps {
    position: fixed; top: 15px; right: 15px; z-index: 100;
    color: #8f8; font-size: 13px; font-family: monospace;
    background: rgba(10, 14, 26, 0.85); padding: 6px 10px;
    border-radius: 6px;
}
#controls {
    position: fixed; top: 55px; right: 15px; z-index: 100;
    display: flex; gap: 8px;
}
#controls button {
    background: rgba(10, 14, 26, 0.85); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3);
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: background 0.2s;
}
#controls button:hover { background: rgba(251, 191, 36, 0.15); }
#controls button.active { background: rgba(251, 191, 36, 0.3); }
#info {
    position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
    z-index: 100; color: #aab; font-size: 13px; text-align: center;
    background: rgba(10, 14, 26, 0.85); padding: 8px 16px;
    border-radius: 8px;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div id="fps">FPS: --</div>
<div id="controls">
    <button id="playBtn">&#9654; Play</button>
    <button id="resetBtn">Reset</button>
</div>
<div id="info">Blue = even step, Orange = odd step. Press Play to animate.</div>
<canvas id="canvas"></canvas>
<script>
try {
(function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fpsEl = document.getElementById('fps');
    const infoEl = document.getElementById('info');
    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');
    const dpr = window.devicePixelRatio || 1;

    let W, H;
    function resize() {
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W * dpr; canvas.height = H * dpr;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        needsRedraw = true;
    }
    resize();
    window.addEventListener('resize', resize);

    const MAX_N = 150;
    const LABEL_W = 45;
    const HEADER_H = 55;

    // Compute sequences with odd/even info
    const sequences = [];
    let maxSteps = 0;

    for (let i = 1; i <= MAX_N; i++) {
        const steps = [];
        let n = i;
        while (n !== 1) {
            const isOdd = n % 2 !== 0;
            steps.push(isOdd);
            n = isOdd ? 3 * n + 1 : n / 2;
        }
        if (steps.length > maxSteps) maxSteps = steps.length;
        sequences.push({ n: i, steps });
    }

    // Cell sizing
    function getCellSize() {
        const availW = W - LABEL_W - 10;
        const availH = H - HEADER_H - 30;
        const cellW = Math.max(2, Math.min(8, availW / maxSteps));
        const cellH = Math.max(2, Math.min(6, availH / MAX_N));
        return { cellW, cellH };
    }

    // Animation state
    let playing = false;
    let highlightRow = -1;
    let highlightStep = -1;
    let animTimer = null;
    let needsRedraw = true;

    playBtn.addEventListener('click', () => {
        if (playing) {
            playing = false;
            playBtn.textContent = '\u25B6 Play';
            playBtn.classList.remove('active');
            clearInterval(animTimer);
            needsRedraw = true;
        } else {
            playing = true;
            playBtn.textContent = '\u275A\u275A Pause';
            playBtn.classList.add('active');
            if (highlightRow < 0) highlightRow = 0;
            highlightStep = -1;
            animTimer = setInterval(advanceAnimation, 80);
        }
    });

    resetBtn.addEventListener('click', () => {
        playing = false;
        playBtn.textContent = '\u25B6 Play';
        playBtn.classList.remove('active');
        clearInterval(animTimer);
        highlightRow = -1;
        highlightStep = -1;
        needsRedraw = true;
    });

    function advanceAnimation() {
        if (highlightRow >= MAX_N) {
            playing = false;
            playBtn.textContent = '\u25B6 Play';
            playBtn.classList.remove('active');
            clearInterval(animTimer);
            return;
        }
        const seq = sequences[highlightRow];
        highlightStep++;
        if (highlightStep >= seq.steps.length) {
            highlightRow++;
            highlightStep = -1;
        }
        needsRedraw = true;
    }

    // Scroll
    let scrollY = 0;
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const { cellH } = getCellSize();
        const maxScroll = Math.max(0, MAX_N * cellH + HEADER_H - H + 30);
        scrollY = Math.max(0, Math.min(maxScroll, scrollY + e.deltaY));
        needsRedraw = true;
    }, { passive: false });

    // Mouse hover
    let hoverRow = -1;
    canvas.addEventListener('mousemove', (e) => {
        const { cellH } = getCellSize();
        const row = Math.floor((e.clientY + scrollY - HEADER_H) / cellH);
        if (row >= 0 && row < MAX_N && row !== hoverRow) {
            hoverRow = row;
            needsRedraw = true;
        }
    });

    // FPS
    let lastTime = performance.now(), frameCount = 0;

    // Even = blue tones, Odd = orange tones
    const EVEN_COLOR = '#2563eb';
    const ODD_COLOR = '#ea580c';
    const EVEN_DIM = '#162044';
    const ODD_DIM = '#3d1a0a';

    function draw() {
        requestAnimationFrame(draw);
        const now = performance.now();
        frameCount++;
        if (now - lastTime >= 500) {
            fpsEl.textContent = 'FPS: ' + Math.round(frameCount * 1000 / (now - lastTime));
            frameCount = 0; lastTime = now;
        }

        if (!needsRedraw && !playing) return;
        needsRedraw = false;

        const { cellW, cellH } = getCellSize();

        ctx.fillStyle = '#0a0e1a';
        ctx.fillRect(0, 0, W, H);

        // Title
        ctx.fillStyle = '#fbbf24';
        ctx.font = 'bold 18px Segoe UI, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Odd/Even Rhythm: Collatz Step Parity (n=1 to 150)', W / 2, 25);

        // Legend
        ctx.font = '12px monospace';
        ctx.textAlign = 'left';
        ctx.fillStyle = EVEN_COLOR;
        ctx.fillRect(W / 2 - 120, 35, 12, 12);
        ctx.fillStyle = '#aab';
        ctx.fillText('Even step (n/2)', W / 2 - 104, 46);
        ctx.fillStyle = ODD_COLOR;
        ctx.fillRect(W / 2 + 30, 35, 12, 12);
        ctx.fillStyle = '#aab';
        ctx.fillText('Odd step (3n+1)', W / 2 + 46, 46);

        // Draw grid
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, HEADER_H, W, H - HEADER_H);
        ctx.clip();

        for (let i = 0; i < MAX_N; i++) {
            const seq = sequences[i];
            const y = HEADER_H + i * cellH - scrollY;
            if (y + cellH < HEADER_H || y > H) continue;

            const isHighlighted = (i === highlightRow);
            const isHovered = (i === hoverRow && !playing);
            const isPast = playing && i < highlightRow;

            // Row label
            ctx.fillStyle = isHighlighted ? '#fbbf24' : (isHovered ? '#ddd' : '#445');
            ctx.font = (isHighlighted ? 'bold ' : '') + '10px monospace';
            ctx.textAlign = 'right';
            ctx.fillText((i + 1).toString(), LABEL_W - 4, y + cellH * 0.8);

            // Cells
            for (let s = 0; s < seq.steps.length; s++) {
                const x = LABEL_W + s * cellW;
                if (x > W) break;

                const isOdd = seq.steps[s];
                let color;

                if (isHighlighted && playing) {
                    if (s <= highlightStep) {
                        color = isOdd ? ODD_COLOR : EVEN_COLOR;
                    } else {
                        color = isOdd ? ODD_DIM : EVEN_DIM;
                    }
                } else if (isPast) {
                    color = isOdd ? ODD_COLOR : EVEN_COLOR;
                } else if (isHovered) {
                    color = isOdd ? ODD_COLOR : EVEN_COLOR;
                } else if (!playing) {
                    color = isOdd ? ODD_COLOR : EVEN_COLOR;
                } else {
                    color = isOdd ? ODD_DIM : EVEN_DIM;
                }

                ctx.fillStyle = color;
                if (!isHighlighted && !isHovered && !isPast && playing) {
                    ctx.globalAlpha = 0.3;
                } else if (isHovered || isHighlighted) {
                    ctx.globalAlpha = 1;
                } else {
                    ctx.globalAlpha = 0.7;
                }

                ctx.fillRect(x, y, cellW - 0.5, cellH - 0.5);
                ctx.globalAlpha = 1;
            }

            // Highlight border
            if (isHighlighted && playing) {
                ctx.strokeStyle = '#fbbf24';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(LABEL_W - 2, y - 1, seq.steps.length * cellW + 4, cellH + 2);
            }
        }

        ctx.restore();

        // Info
        if (playing && highlightRow >= 0 && highlightRow < MAX_N) {
            const seq = sequences[highlightRow];
            const oddCount = seq.steps.filter(s => s).length;
            const evenCount = seq.steps.length - oddCount;
            infoEl.textContent = `n = ${highlightRow + 1} | Steps: ${seq.steps.length} | Odd: ${oddCount} | Even: ${evenCount}`;
        } else if (hoverRow >= 0 && hoverRow < MAX_N && !playing) {
            const seq = sequences[hoverRow];
            const oddCount = seq.steps.filter(s => s).length;
            const evenCount = seq.steps.length - oddCount;
            infoEl.textContent = `n = ${hoverRow + 1} | Steps: ${seq.steps.length} | Odd: ${oddCount} | Even: ${evenCount} | Ratio: ${(evenCount / (oddCount || 1)).toFixed(2)}`;
        }
    }

    requestAnimationFrame(draw);
})();
} catch(e) {
    document.body.innerHTML = '<div style="color:#f66;padding:40px;font-size:18px;">Error: ' + e.message + '</div>';
    console.error(e);
}
</script>
</body>
</html>
