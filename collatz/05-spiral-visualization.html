<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatz Spiral</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
canvas { display: block; }
.back-link {
    position: fixed; top: 16px; left: 16px; color: #fbbf24; text-decoration: none;
    font-size: 14px; z-index: 100; background: rgba(10,14,26,0.8); padding: 8px 14px;
    border-radius: 8px; border: 1px solid rgba(251,191,36,0.3); transition: background 0.2s;
}
.back-link:hover { background: rgba(251,191,36,0.15); }
#fps { position: fixed; top: 16px; right: 16px; font-size: 12px; color: #6b7280; z-index: 100;
    background: rgba(10,14,26,0.8); padding: 4px 10px; border-radius: 6px; font-family: monospace; }
.title {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
    font-size: 18px; font-weight: 600; color: #e5e7eb; background: rgba(10,14,26,0.9);
    padding: 8px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
}
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    font-size: 13px; color: #6b7280; background: rgba(10,14,26,0.9);
    padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
}
#loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #0a0e1a; z-index: 200; font-size: 18px; color: #6b7280;
}
.spinner { width: 40px; height: 40px; border: 3px solid rgba(251,191,36,0.2);
    border-top-color: #fbbf24; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div>Computing spirals...</div>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div id="fps">-- FPS</div>
<div class="title">Collatz Spiral</div>
<div class="info">500 starting numbers mapped to polar coordinates</div>
<canvas id="canvas"></canvas>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    let W, H;

    function resize() {
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W * dpr; canvas.height = H * dpr;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    const COUNT = 500;
    const ANGLE_STEP = 0.15; // radians per step

    // Pre-compute all sequences
    const sequences = [];
    let globalMaxVal = 0;

    for (let i = 1; i <= COUNT; i++) {
        const seq = [i];
        let n = i;
        while (n !== 1 && seq.length < 10000) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            seq.push(n);
        }
        sequences.push(seq);
        for (const v of seq) {
            if (v > globalMaxVal) globalMaxVal = v;
        }
    }

    let rotation = 0;
    let animProgress = 0; // 0 to COUNT
    const ANIM_SPEED = 3; // sequences per frame

    let frameCount = 0, lastFpsTime = performance.now(), fps = 0;

    function draw(time) {
        requestAnimationFrame(draw);
        frameCount++;
        if (time - lastFpsTime >= 1000) {
            fps = frameCount; frameCount = 0; lastFpsTime = time;
            document.getElementById('fps').textContent = fps + ' FPS';
        }

        if (animProgress < COUNT) {
            animProgress = Math.min(animProgress + ANIM_SPEED, COUNT);
        }

        rotation += 0.002;

        ctx.fillStyle = 'rgba(10, 14, 26, 0.05)';
        ctx.fillRect(0, 0, W, H);
        // Full clear every ~60 frames for clean render
        if (Math.floor(time / 16) % 60 === 0) {
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, W, H);
        }

        const cx = W / 2;
        const cy = H / 2;
        const maxRadius = Math.min(W, H) * 0.42;
        const rScale = maxRadius / Math.log(globalMaxVal + 1);

        const drawn = Math.floor(animProgress);

        for (let s = 0; s < drawn; s++) {
            const seq = sequences[s];
            const hue = (s / COUNT) * 360;
            ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.12)`;
            ctx.lineWidth = 1;
            ctx.beginPath();

            for (let i = 0; i < seq.length; i++) {
                const angle = i * ANGLE_STEP + rotation + (s * 0.01);
                const r = Math.log(seq[i] + 1) * rScale;
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        // Center glow
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
        grad.addColorStop(0, 'rgba(251,191,36,0.4)');
        grad.addColorStop(1, 'rgba(251,191,36,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, 30, 0, Math.PI * 2);
        ctx.fill();

        // Center label
        ctx.fillStyle = '#fbbf24';
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('1', cx, cy);
    }

    // Initial full clear
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);

    document.getElementById('loading').style.display = 'none';
    requestAnimationFrame(draw);
} catch (e) {
    document.getElementById('loading').innerHTML = '<div style="color:#ef4444;text-align:center;">Error: ' + e.message + '</div>';
    console.error(e);
}
</script>
</body>
</html>
