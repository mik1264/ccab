<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statistics Dashboard - Collatz Conjecture</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0e1a;
        color: #e0e0e0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
    }
    .back-link {
        position: fixed; top: 12px; left: 12px; z-index: 100;
        background: rgba(0,0,0,0.7); color: #fbbf24;
        text-decoration: none; padding: 8px 16px; border-radius: 6px;
        font-size: 14px; font-weight: 500;
        transition: background 0.2s;
    }
    .back-link:hover { background: rgba(0,0,0,0.9); }
    .title {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
        z-index: 100; font-size: 20px; font-weight: 600; color: #fbbf24;
        text-shadow: 0 0 10px rgba(251,191,36,0.3);
    }
    .dashboard {
        display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
        width: 100vw; height: 100vh; gap: 1px;
        background: rgba(251,191,36,0.15);
        padding-top: 50px;
    }
    .panel {
        background: #0a0e1a; position: relative; overflow: hidden;
    }
    .panel-title {
        position: absolute; top: 8px; left: 12px;
        font-size: 13px; color: #fbbf24; font-weight: 600; z-index: 10;
    }
    canvas { width: 100%; height: 100%; display: block; }
    .record-list {
        position: absolute; top: 28px; left: 12px; right: 12px; bottom: 8px;
        overflow-y: auto; font-size: 11px; font-family: monospace;
    }
    .record-list table { width: 100%; border-collapse: collapse; }
    .record-list th { text-align: left; color: #fbbf24; padding: 2px 6px; border-bottom: 1px solid rgba(251,191,36,0.3); }
    .record-list td { padding: 2px 6px; color: #ccc; }
    .record-list tr:nth-child(even) td { background: rgba(255,255,255,0.03); }
</style>
</head>
<body>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div class="title">Statistics Dashboard</div>
<div class="dashboard">
    <div class="panel" id="panel-avg">
        <div class="panel-title">Average Stopping Time (1..N)</div>
        <canvas id="canvas-avg"></canvas>
    </div>
    <div class="panel" id="panel-hist">
        <div class="panel-title">Stopping Time Distribution</div>
        <canvas id="canvas-hist"></canvas>
    </div>
    <div class="panel" id="panel-records">
        <div class="panel-title">Record Holders (Top 20, N up to 10000)</div>
        <div class="record-list" id="record-list"></div>
    </div>
    <div class="panel" id="panel-scatter">
        <div class="panel-title">Stopping Time vs Number (log-log)</div>
        <canvas id="canvas-scatter"></canvas>
    </div>
</div>
<script>
try {
    const dpr = window.devicePixelRatio || 1;
    const gold = '#fbbf24';
    const goldDim = 'rgba(251,191,36,0.5)';

    function collatzSteps(n) {
        let s = 0;
        while (n !== 1) { n = n % 2 === 0 ? n / 2 : 3 * n + 1; s++; }
        return s;
    }

    // Precompute stopping times
    const MAX_N = 10000;
    const CHART_N = 1000;
    const stoppingTimes = new Array(MAX_N + 1);
    stoppingTimes[1] = 0;
    for (let i = 2; i <= MAX_N; i++) stoppingTimes[i] = collatzSteps(i);

    function setupCanvas(canvasEl) {
        const rect = canvasEl.parentElement.getBoundingClientRect();
        canvasEl.width = rect.width * dpr;
        canvasEl.height = rect.height * dpr;
        const ctx = canvasEl.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        return { ctx, w: rect.width, h: rect.height };
    }

    // Panel 1: Average stopping time line chart
    function drawAverage() {
        const { ctx, w, h } = setupCanvas(document.getElementById('canvas-avg'));
        const pad = { t: 35, b: 30, l: 50, r: 15 };
        const pw = w - pad.l - pad.r;
        const ph = h - pad.t - pad.b;

        let sum = 0;
        const avgs = [];
        for (let i = 1; i <= CHART_N; i++) {
            sum += stoppingTimes[i];
            avgs.push(sum / i);
        }
        const maxAvg = Math.max(...avgs);

        // Axes
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, h - pad.b);
        ctx.lineTo(w - pad.r, h - pad.b);
        ctx.stroke();

        // Labels
        ctx.font = '10px monospace'; ctx.fillStyle = '#666';
        ctx.textAlign = 'center';
        ctx.fillText('N', w / 2, h - 5);
        for (let i = 0; i <= 5; i++) {
            const x = pad.l + (i / 5) * pw;
            ctx.fillText(Math.round(i / 5 * CHART_N), x, h - pad.b + 15);
        }
        ctx.textAlign = 'right';
        for (let i = 0; i <= 4; i++) {
            const y = h - pad.b - (i / 4) * ph;
            ctx.fillText((maxAvg * i / 4).toFixed(1), pad.l - 5, y + 3);
        }

        // Line
        ctx.beginPath();
        ctx.strokeStyle = gold;
        ctx.lineWidth = 1.5;
        for (let i = 0; i < avgs.length; i++) {
            const x = pad.l + (i / CHART_N) * pw;
            const y = h - pad.b - (avgs[i] / maxAvg) * ph;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    // Panel 2: Histogram
    function drawHistogram() {
        const { ctx, w, h } = setupCanvas(document.getElementById('canvas-hist'));
        const pad = { t: 35, b: 30, l: 50, r: 15 };
        const pw = w - pad.l - pad.r;
        const ph = h - pad.t - pad.b;

        const hist = {};
        for (let i = 1; i <= CHART_N; i++) {
            const s = stoppingTimes[i];
            hist[s] = (hist[s] || 0) + 1;
        }
        const keys = Object.keys(hist).map(Number).sort((a, b) => a - b);
        const maxCount = Math.max(...keys.map(k => hist[k]));
        const maxK = keys[keys.length - 1];

        // Axes
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, h - pad.b);
        ctx.lineTo(w - pad.r, h - pad.b); ctx.stroke();

        ctx.font = '10px monospace'; ctx.fillStyle = '#666'; ctx.textAlign = 'center';
        ctx.fillText('Stopping time k', w / 2, h - 5);

        // Bars
        const barW = Math.max(1, pw / (maxK + 1) - 1);
        for (const k of keys) {
            const x = pad.l + (k / maxK) * pw;
            const barH = (hist[k] / maxCount) * ph;
            ctx.fillStyle = gold;
            ctx.globalAlpha = 0.8;
            ctx.fillRect(x - barW / 2, h - pad.b - barH, barW, barH);
        }
        ctx.globalAlpha = 1;

        // Axis labels
        ctx.textAlign = 'right'; ctx.fillStyle = '#666';
        for (let i = 0; i <= 4; i++) {
            const y = h - pad.b - (i / 4) * ph;
            ctx.fillText(Math.round(maxCount * i / 4), pad.l - 5, y + 3);
        }
        ctx.textAlign = 'center';
        for (let i = 0; i <= 5; i++) {
            const v = Math.round((i / 5) * maxK);
            const x = pad.l + (v / maxK) * pw;
            ctx.fillText(v, x, h - pad.b + 15);
        }
    }

    // Panel 3: Record holders
    function drawRecords() {
        const records = [];
        for (let i = 1; i <= MAX_N; i++) {
            records.push({ n: i, steps: stoppingTimes[i] });
        }
        records.sort((a, b) => b.steps - a.steps);
        const top20 = records.slice(0, 20);

        let html = '<table><tr><th>#</th><th>Number</th><th>Steps</th></tr>';
        top20.forEach((r, i) => {
            html += `<tr><td>${i + 1}</td><td>${r.n}</td><td>${r.steps}</td></tr>`;
        });
        html += '</table>';
        document.getElementById('record-list').innerHTML = html;
    }

    // Panel 4: Scatter log-log
    function drawScatter() {
        const { ctx, w, h } = setupCanvas(document.getElementById('canvas-scatter'));
        const pad = { t: 35, b: 30, l: 50, r: 15 };
        const pw = w - pad.l - pad.r;
        const ph = h - pad.t - pad.b;

        const logMaxN = Math.log10(CHART_N);
        let maxSteps = 0;
        for (let i = 1; i <= CHART_N; i++) if (stoppingTimes[i] > maxSteps) maxSteps = stoppingTimes[i];
        const logMaxS = Math.log10(maxSteps);

        // Axes
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.l, pad.t); ctx.lineTo(pad.l, h - pad.b);
        ctx.lineTo(w - pad.r, h - pad.b); ctx.stroke();

        ctx.font = '10px monospace'; ctx.fillStyle = '#666';
        ctx.textAlign = 'center';
        ctx.fillText('log10(n)', w / 2, h - 5);

        // Axis ticks
        for (let i = 0; i <= 3; i++) {
            const v = i;
            const x = pad.l + (v / logMaxN) * pw;
            ctx.fillText(v.toString(), x, h - pad.b + 15);
        }
        ctx.textAlign = 'right';
        for (let i = 0; i <= 4; i++) {
            const v = (i / 4) * logMaxS;
            const y = h - pad.b - (i / 4) * ph;
            ctx.fillText(v.toFixed(1), pad.l - 5, y + 3);
        }

        // Points
        ctx.fillStyle = gold;
        ctx.globalAlpha = 0.4;
        for (let i = 2; i <= CHART_N; i++) {
            const s = stoppingTimes[i];
            if (s === 0) continue;
            const x = pad.l + (Math.log10(i) / logMaxN) * pw;
            const y = h - pad.b - (Math.log10(s) / logMaxS) * ph;
            ctx.beginPath();
            ctx.arc(x, y, 1.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    function drawAll() {
        drawAverage();
        drawHistogram();
        drawRecords();
        drawScatter();
    }

    window.addEventListener('resize', drawAll);
    drawAll();

} catch (err) {
    document.body.innerHTML = '<div style="color:#f87171;padding:40px;font-size:18px;">Error: ' + err.message + '</div>';
}
</script>
</body>
</html>
