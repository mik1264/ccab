<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatz - Sonification</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; color: #ccc; }
canvas { display: block; }
.back-link {
    position: fixed; top: 15px; left: 15px; z-index: 100;
    background: rgba(0,0,0,0.7); color: #fbbf24; text-decoration: none;
    padding: 8px 16px; border-radius: 8px; font-size: 14px;
    transition: background 0.3s;
}
.back-link:hover { background: rgba(0,0,0,0.9); }
.controls {
    position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; align-items: center; z-index: 100;
    background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 12px;
}
.controls label { font-size: 13px; color: #aaa; }
.controls input[type="number"] {
    width: 80px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 14px;
}
.controls input[type="range"] { width: 100px; }
.controls button {
    background: rgba(251,191,36,0.3); color: #fbbf24; border: 1px solid #fbbf24;
    padding: 6px 18px; border-radius: 8px; cursor: pointer; font-size: 14px;
    transition: all 0.3s;
}
.controls button:hover { background: rgba(251,191,36,0.5); }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.4); font-size: 13px; z-index: 100; text-align: center;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back to Gallery</a>
<div class="controls">
    <label>Number:</label>
    <input type="number" id="numInput" value="27" min="1" max="100000">
    <button id="playBtn">&#9654; Play</button>
    <label>Speed:</label>
    <input type="range" id="speedSlider" min="1" max="20" value="8">
    <span id="speedLabel" style="font-size:12px;color:#888;">8</span>
</div>
<canvas id="canvas"></canvas>
<div class="info">Enter a number and press Play to hear its Collatz sequence as music</div>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dpr = window.devicePixelRatio || 1;
    let W, H;

    function resize() {
        dpr = window.devicePixelRatio || 1;
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    function collatz(n) {
        const seq = [n];
        while (n !== 1 && seq.length < 10000) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            seq.push(n);
        }
        return seq;
    }

    // Pentatonic scale frequencies (C4 pentatonic and octaves)
    const pentatonic = [
        130.81, 146.83, 164.81, 196.00, 220.00,
        261.63, 293.66, 329.63, 392.00, 440.00,
        523.25, 587.33, 659.25, 783.99, 880.00,
        1046.50, 1174.66, 1318.51, 1567.98, 1760.00
    ];

    function valueToFreq(val, maxVal) {
        const t = Math.log(val + 1) / Math.log(maxVal + 1);
        const idx = Math.floor(t * (pentatonic.length - 1));
        return pentatonic[Math.min(idx, pentatonic.length - 1)];
    }

    let audioCtx = null;
    let sequence = [];
    let currentStep = -1;
    let playing = false;
    let speed = 8;
    let analyser = null;
    let waveData = null;

    const speedSlider = document.getElementById('speedSlider');
    const speedLabel = document.getElementById('speedLabel');
    speedSlider.addEventListener('input', () => {
        speed = parseInt(speedSlider.value);
        speedLabel.textContent = speed;
    });

    document.getElementById('playBtn').addEventListener('click', () => {
        if (playing) return;
        const n = parseInt(document.getElementById('numInput').value);
        if (!n || n < 1) return;

        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            analyser.connect(audioCtx.destination);
            waveData = new Uint8Array(analyser.frequencyBinCount);
        }

        sequence = collatz(n);
        currentStep = 0;
        playing = true;
        playNextNote();
    });

    function playNextNote() {
        if (!playing || currentStep >= sequence.length) {
            playing = false;
            return;
        }

        const val = sequence[currentStep];
        const maxVal = Math.max(...sequence);
        const freq = valueToFreq(val, maxVal);
        const duration = 0.08 + (1 - speed / 20) * 0.2;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(analyser);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);

        currentStep++;
        setTimeout(playNextNote, duration * 1000 * 0.8);
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        if (sequence.length === 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.font = '24px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Collatz Sonification', W / 2, H / 2);
            requestAnimationFrame(draw);
            return;
        }

        const maxVal = Math.max(...sequence);
        const padL = 60, padR = 40, padT = 100, padB = 120;
        const chartW = W - padL - padR;
        const chartH = H - padT - padB;

        // Draw axes
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padL, padT);
        ctx.lineTo(padL, padT + chartH);
        ctx.lineTo(padL + chartW, padT + chartH);
        ctx.stroke();

        // Draw line chart
        ctx.strokeStyle = 'rgba(100, 200, 255, 0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < sequence.length; i++) {
            const x = padL + (i / Math.max(sequence.length - 1, 1)) * chartW;
            const y = padT + chartH - (sequence[i] / maxVal) * chartH;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // Draw played portion
        if (currentStep > 0) {
            const playedLen = Math.min(currentStep, sequence.length);
            ctx.strokeStyle = '#fbbf24';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            for (let i = 0; i < playedLen; i++) {
                const x = padL + (i / Math.max(sequence.length - 1, 1)) * chartW;
                const y = padT + chartH - (sequence[i] / maxVal) * chartH;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Bouncing ball
            if (currentStep < sequence.length) {
                const bx = padL + (currentStep / Math.max(sequence.length - 1, 1)) * chartW;
                const by = padT + chartH - (sequence[currentStep] / maxVal) * chartH;
                ctx.fillStyle = '#fbbf24';
                ctx.shadowColor = '#fbbf24';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(bx, by, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Value label
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(sequence[currentStep].toLocaleString(), bx, by - 18);
            }
        }

        // Waveform display
        if (analyser && waveData && playing) {
            analyser.getByteTimeDomainData(waveData);
            ctx.strokeStyle = 'rgba(251, 191, 36, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            const sliceW = W / waveData.length;
            for (let i = 0; i < waveData.length; i++) {
                const v = waveData[i] / 128.0;
                const y = H - 60 + (v - 1) * 30;
                if (i === 0) ctx.moveTo(0, y);
                else ctx.lineTo(i * sliceW, y);
            }
            ctx.stroke();
        }

        // Title
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`Collatz Sonification - n=${sequence[0]} (${sequence.length} steps)`, W / 2, 80);

        // Step counter
        if (playing) {
            ctx.fillStyle = 'rgba(251,191,36,0.7)';
            ctx.font = '14px sans-serif';
            ctx.fillText(`Step ${currentStep} / ${sequence.length}`, W / 2, H - 90);
        }

        requestAnimationFrame(draw);
    }

    draw();
} catch (e) {
    document.body.innerHTML = '<div style="color:red;padding:40px;font-size:18px;">Error: ' + e.message + '</div>';
}
</script>
</body>
</html>
