<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatz - Race</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; color: #ccc; }
canvas { display: block; }
.back-link {
    position: fixed; top: 15px; left: 15px; z-index: 100;
    background: rgba(0,0,0,0.7); color: #fbbf24; text-decoration: none;
    padding: 8px 16px; border-radius: 8px; font-size: 14px;
    transition: background 0.3s;
}
.back-link:hover { background: rgba(0,0,0,0.9); }
.controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 100;
}
.controls button {
    background: rgba(251,191,36,0.3); color: #fbbf24; border: 1px solid #fbbf24;
    padding: 10px 28px; border-radius: 10px; cursor: pointer; font-size: 16px;
    transition: all 0.3s;
}
.controls button:hover { background: rgba(251,191,36,0.5); }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back to Gallery</a>
<canvas id="canvas"></canvas>
<div class="controls">
    <button id="raceBtn">&#127937; New Race</button>
</div>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dpr = window.devicePixelRatio || 1;
    let W, H;

    function resize() {
        dpr = window.devicePixelRatio || 1;
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    function collatz(n) {
        const seq = [n];
        while (n !== 1 && seq.length < 10000) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            seq.push(n);
        }
        return seq;
    }

    const NUM_RACERS = 10;
    const colors = [
        '#ef4444', '#f97316', '#eab308', '#22c55e', '#14b8a6',
        '#3b82f6', '#8b5cf6', '#ec4899', '#f43f5e', '#06b6d4'
    ];

    let racers = [];
    let currentStep = 0;
    let maxSteps = 0;
    let animating = false;
    let finishOrder = [];

    function initRace() {
        racers = [];
        finishOrder = [];
        currentStep = 0;
        maxSteps = 0;

        const used = new Set();
        while (racers.length < NUM_RACERS) {
            const n = Math.floor(Math.random() * 900) + 100;
            if (used.has(n)) continue;
            used.add(n);
            const seq = collatz(n);
            racers.push({ n, seq, finished: false, finishStep: seq.length - 1 });
            maxSteps = Math.max(maxSteps, seq.length);
        }
        animating = true;
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        const padL = 120, padR = 100, padT = 70, padB = 80;
        const laneH = (H - padT - padB) / NUM_RACERS;
        const trackW = W - padL - padR;

        // Title
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = 'bold 22px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Collatz Race', W / 2, 40);

        ctx.font = '13px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText(`Step ${currentStep} / ${maxSteps}`, W / 2, 58);

        for (let i = 0; i < NUM_RACERS; i++) {
            const racer = racers[i];
            const y = padT + i * laneH + laneH / 2;

            // Lane background
            ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.04)';
            ctx.fillRect(padL, padT + i * laneH, trackW, laneH);

            // Lane line
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padL, padT + (i + 1) * laneH);
            ctx.lineTo(padL + trackW, padT + (i + 1) * laneH);
            ctx.stroke();

            // Starting number
            ctx.fillStyle = colors[i];
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(`n=${racer.n}`, padL - 10, y + 5);

            // Progress bar (trail)
            const progress = Math.min(currentStep, racer.finishStep) / maxSteps;
            const markerX = padL + progress * trackW;

            const grad = ctx.createLinearGradient(padL, 0, markerX, 0);
            grad.addColorStop(0, colors[i] + '10');
            grad.addColorStop(1, colors[i] + '40');
            ctx.fillStyle = grad;
            ctx.fillRect(padL, y - laneH * 0.3, markerX - padL, laneH * 0.6);

            // Marker
            ctx.fillStyle = colors[i];
            ctx.shadowColor = colors[i];
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(markerX, y, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Current value
            if (currentStep < racer.seq.length) {
                ctx.fillStyle = '#fff';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(racer.seq[Math.min(currentStep, racer.seq.length - 1)].toLocaleString(), markerX, y - 16);
            }

            // Finished banner
            if (currentStep >= racer.finishStep) {
                const rank = finishOrder.indexOf(i);
                if (rank !== -1) {
                    ctx.fillStyle = rank === 0 ? '#fbbf24' : rank === 1 ? '#c0c0c0' : rank === 2 ? '#cd7f32' : 'rgba(255,255,255,0.5)';
                    ctx.font = 'bold 13px sans-serif';
                    ctx.textAlign = 'left';
                    const label = rank === 0 ? '1st' : rank === 1 ? '2nd' : rank === 2 ? '3rd' : `#${rank + 1}`;
                    ctx.fillText(`FINISHED ${label}`, markerX + 18, y + 5);
                }
            }
        }

        // Finish line
        ctx.strokeStyle = 'rgba(251,191,36,0.3)';
        ctx.setLineDash([5, 5]);
        ctx.lineWidth = 2;
        ctx.beginPath();
        const finishX = padL + trackW;
        ctx.moveTo(finishX, padT);
        ctx.lineTo(finishX, H - padB);
        ctx.stroke();
        ctx.setLineDash([]);

        // Animate
        if (animating && currentStep < maxSteps) {
            currentStep++;
            // Check finishes
            for (let i = 0; i < NUM_RACERS; i++) {
                if (!racers[i].finished && currentStep >= racers[i].finishStep) {
                    racers[i].finished = true;
                    finishOrder.push(i);
                }
            }
            if (finishOrder.length === NUM_RACERS) {
                animating = false;
            }
        }

        requestAnimationFrame(draw);
    }

    document.getElementById('raceBtn').addEventListener('click', initRace);
    initRace();
    draw();
} catch (e) {
    document.body.innerHTML = '<div style="color:red;padding:40px;font-size:18px;">Error: ' + e.message + '</div>';
}
</script>
</body>
</html>
