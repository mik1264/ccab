<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatz Sequence Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
canvas { display: block; }
.back-link {
    position: fixed; top: 16px; left: 16px; color: #fbbf24; text-decoration: none;
    font-size: 14px; z-index: 100; background: rgba(10,14,26,0.8); padding: 8px 14px;
    border-radius: 8px; border: 1px solid rgba(251,191,36,0.3); transition: background 0.2s;
}
.back-link:hover { background: rgba(251,191,36,0.15); }
#fps { position: fixed; top: 16px; right: 16px; font-size: 12px; color: #6b7280; z-index: 100;
    background: rgba(10,14,26,0.8); padding: 4px 10px; border-radius: 6px; font-family: monospace; }
.controls {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
    display: flex; gap: 10px; align-items: center; background: rgba(10,14,26,0.9);
    padding: 10px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
}
.controls label { font-size: 14px; color: #9ca3af; }
.controls input {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff;
    padding: 6px 12px; border-radius: 6px; font-size: 14px; width: 140px; outline: none;
}
.controls input:focus { border-color: #fbbf24; }
.controls button {
    background: #fbbf24; color: #0a0e1a; border: none; padding: 6px 16px; border-radius: 6px;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;
}
.controls button:hover { background: #f59e0b; }
.stats {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    display: flex; gap: 30px; background: rgba(10,14,26,0.9); padding: 12px 24px;
    border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
}
.stat-item { text-align: center; }
.stat-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-size: 20px; font-weight: 700; color: #fbbf24; margin-top: 2px; }
#loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #0a0e1a; z-index: 200; font-size: 18px; color: #6b7280;
}
.spinner { width: 40px; height: 40px; border: 3px solid rgba(251,191,36,0.2);
    border-top-color: #fbbf24; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div>Loading...</div>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div id="fps">-- FPS</div>
<div class="controls">
    <label>Starting Number:</label>
    <input type="number" id="numInput" value="27" min="1" max="1000000" placeholder="1 - 1,000,000">
    <button id="goBtn">Go</button>
</div>
<div class="stats">
    <div class="stat-item"><div class="stat-label">Start</div><div class="stat-value" id="statStart">27</div></div>
    <div class="stat-item"><div class="stat-label">Steps</div><div class="stat-value" id="statSteps">--</div></div>
    <div class="stat-item"><div class="stat-label">Max Value</div><div class="stat-value" id="statMax">--</div></div>
</div>
<canvas id="canvas"></canvas>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    let W, H;

    function resize() {
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W * dpr; canvas.height = H * dpr;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    function collatz(n) {
        const seq = [n];
        while (n !== 1 && seq.length < 100000) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            seq.push(n);
        }
        return seq;
    }

    let sequence = [];
    let animProgress = 0;
    let animSpeed = 0;
    let targetProgress = 0;

    function startSequence(n) {
        n = Math.max(1, Math.min(1000000, Math.floor(n)));
        sequence = collatz(n);
        animProgress = 0;
        targetProgress = sequence.length;
        animSpeed = Math.max(1, sequence.length / 120);
        document.getElementById('statStart').textContent = n.toLocaleString();
        document.getElementById('statSteps').textContent = (sequence.length - 1).toLocaleString();
        document.getElementById('statMax').textContent = Math.max(...sequence).toLocaleString();
    }

    document.getElementById('goBtn').addEventListener('click', () => {
        const v = parseInt(document.getElementById('numInput').value);
        if (v >= 1 && v <= 1000000) startSequence(v);
    });
    document.getElementById('numInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('goBtn').click();
    });

    // FPS
    let frameCount = 0, lastFpsTime = performance.now(), fps = 0;

    function draw() {
        ctx.clearRect(0, 0, W, H);
        if (sequence.length < 2) return;

        const margin = { top: 80, bottom: 80, left: 80, right: 40 };
        const plotW = W - margin.left - margin.right;
        const plotH = H - margin.top - margin.bottom;
        const n = Math.min(Math.floor(animProgress), sequence.length);
        if (n < 2) return;

        const maxVal = Math.max(...sequence);
        const xScale = plotW / (sequence.length - 1);
        const yScale = plotH / maxVal;

        // Grid
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        const yTicks = 5;
        for (let i = 0; i <= yTicks; i++) {
            const y = margin.top + plotH - (i / yTicks) * plotH;
            ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(W - margin.right, y); ctx.stroke();
            ctx.fillStyle = '#4b5563'; ctx.font = '11px monospace'; ctx.textAlign = 'right';
            ctx.fillText(Math.round((i / yTicks) * maxVal).toLocaleString(), margin.left - 8, y + 4);
        }
        const xTicks = Math.min(10, sequence.length - 1);
        for (let i = 0; i <= xTicks; i++) {
            const step = Math.round((i / xTicks) * (sequence.length - 1));
            const x = margin.left + step * xScale;
            ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, margin.top + plotH); ctx.stroke();
            ctx.fillStyle = '#4b5563'; ctx.textAlign = 'center';
            ctx.fillText(step, x, margin.top + plotH + 18);
        }

        // Axis labels
        ctx.fillStyle = '#6b7280'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText('Step', margin.left + plotW / 2, H - 20);
        ctx.save(); ctx.translate(18, margin.top + plotH / 2); ctx.rotate(-Math.PI / 2);
        ctx.fillText('Value', 0, 0); ctx.restore();

        // Line
        ctx.beginPath();
        ctx.strokeStyle = '#fbbf24';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#fbbf24';
        ctx.shadowBlur = 6;
        for (let i = 0; i < n; i++) {
            const x = margin.left + i * xScale;
            const y = margin.top + plotH - sequence[i] * yScale;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Dots
        if (sequence.length <= 200) {
            for (let i = 0; i < n; i++) {
                const x = margin.left + i * xScale;
                const y = margin.top + plotH - sequence[i] * yScale;
                ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fbbf24'; ctx.fill();
            }
        }

        // Current value indicator
        if (n > 0 && n <= sequence.length) {
            const ci = n - 1;
            const cx = margin.left + ci * xScale;
            const cy = margin.top + plotH - sequence[ci] * yScale;
            ctx.beginPath(); ctx.arc(cx, cy, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#fff'; ctx.fill();
            ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 13px monospace'; ctx.textAlign = 'center';
            ctx.fillText(sequence[ci].toLocaleString(), cx, cy - 14);
        }
    }

    function loop() {
        requestAnimationFrame(loop);
        frameCount++;
        const now = performance.now();
        if (now - lastFpsTime >= 1000) {
            fps = frameCount;
            frameCount = 0;
            lastFpsTime = now;
            document.getElementById('fps').textContent = fps + ' FPS';
        }
        if (animProgress < targetProgress) {
            animProgress = Math.min(animProgress + animSpeed, targetProgress);
        }
        draw();
    }

    startSequence(27);
    document.getElementById('loading').style.display = 'none';
    loop();
} catch (e) {
    document.getElementById('loading').innerHTML = '<div style="color:#ef4444;text-align:center;">Error: ' + e.message + '</div>';
    console.error(e);
}
</script>
</body>
</html>
