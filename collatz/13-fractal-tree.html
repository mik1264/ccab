<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collatz Fractal Tree</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0e1a;
        color: #e0e0e0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
    }
    canvas { display: block; }
    .back-link {
        position: fixed; top: 12px; left: 12px; z-index: 100;
        background: rgba(0,0,0,0.7); color: #fbbf24;
        text-decoration: none; padding: 8px 16px; border-radius: 6px;
        font-size: 14px; font-weight: 500;
        transition: background 0.2s;
    }
    .back-link:hover { background: rgba(0,0,0,0.9); }
    .title {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
        z-index: 100; font-size: 20px; font-weight: 600; color: #fbbf24;
        text-shadow: 0 0 10px rgba(251,191,36,0.3);
    }
    .info {
        position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
        z-index: 100; font-size: 12px; color: #666;
        background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 6px;
    }
</style>
</head>
<body>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div class="title">Collatz Fractal Tree</div>
<div class="info">Root = 1 at bottom. Each node n branches to 2n (left) and (n-1)/3 if valid (right). Depth 20.</div>
<canvas id="canvas"></canvas>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    let W, H;
    const MAX_DEPTH = 20;

    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    // Build tree: each node n has children that map TO n under Collatz
    // If n is reached by dividing even number by 2: child = 2n
    // If n is reached by 3k+1: child k where 3k+1 = n, so k = (n-1)/3, valid if integer and odd
    function buildTree(root, maxDepth) {
        const tree = { val: root, children: [], depth: 0 };
        const queue = [tree];
        const visited = new Set([root]);

        while (queue.length > 0) {
            const node = queue.shift();
            if (node.depth >= maxDepth) continue;

            // Child: 2*n (always valid, n*2 would reach n by dividing by 2)
            const c1 = node.val * 2;
            if (!visited.has(c1) && c1 <= 1000000) {
                visited.add(c1);
                const child = { val: c1, children: [], depth: node.depth + 1 };
                node.children.push(child);
                queue.push(child);
            }

            // Child: (n-1)/3 if integer, odd, and > 0
            if ((node.val - 1) % 3 === 0) {
                const c2 = (node.val - 1) / 3;
                if (c2 > 0 && c2 % 2 === 1 && !visited.has(c2) && c2 !== 1) {
                    visited.add(c2);
                    const child = { val: c2, children: [], depth: node.depth + 1 };
                    node.children.push(child);
                    queue.push(child);
                }
            }
        }
        return tree;
    }

    function countLeaves(node) {
        if (node.children.length === 0) return 1;
        let sum = 0;
        for (const c of node.children) sum += countLeaves(c);
        return sum;
    }

    function assignPositions(node, x, y, spanX, levelH) {
        node.x = x;
        node.y = y;
        if (node.children.length === 0) return;

        const totalLeaves = node.children.map(c => countLeaves(c));
        const total = totalLeaves.reduce((a, b) => a + b, 0);
        let curX = x - spanX / 2;

        for (let i = 0; i < node.children.length; i++) {
            const childSpan = (totalLeaves[i] / total) * spanX;
            const childX = curX + childSpan / 2;
            const childY = y - levelH;
            assignPositions(node.children[i], childX, childY, childSpan, levelH * 0.92);
            curX += childSpan;
        }
    }

    // Color interpolation: brown trunk -> green leaves
    function branchColor(depth) {
        const t = depth / MAX_DEPTH;
        const r = Math.floor(101 + (34 - 101) * t);
        const g = Math.floor(67 + (139 - 67) * t);
        const b = Math.floor(33 + (34 - 33) * t);
        return `rgb(${r},${g},${b})`;
    }

    let tree = null;
    let animProgress = 0;
    let edges = [];

    function collectEdges(node) {
        for (const c of node.children) {
            edges.push({ x1: node.x, y1: node.y, x2: c.x, y2: c.y, depth: c.depth });
            collectEdges(c);
        }
    }

    function init() {
        tree = buildTree(1, MAX_DEPTH);
        const padY = 80;
        const levelH = (H - padY * 2) / MAX_DEPTH;
        assignPositions(tree, W / 2, H - padY, W * 0.85, levelH);
        edges = [];
        collectEdges(tree);
        // Sort by depth so trunk draws first
        edges.sort((a, b) => a.depth - b.depth);
        animProgress = 0;
    }

    function draw() {
        ctx.fillStyle = '#0a0e1a';
        ctx.fillRect(0, 0, W, H);

        const drawCount = Math.floor(animProgress);
        for (let i = 0; i < Math.min(drawCount, edges.length); i++) {
            const e = edges[i];
            const thickness = Math.max(0.5, 4 - e.depth * 0.18);
            ctx.beginPath();
            ctx.moveTo(e.x1, e.y1);
            ctx.lineTo(e.x2, e.y2);
            ctx.strokeStyle = branchColor(e.depth);
            ctx.lineWidth = thickness;
            ctx.stroke();
        }

        // Draw leaf glow for fully drawn edges at max depth or no children
        for (let i = 0; i < Math.min(drawCount, edges.length); i++) {
            const e = edges[i];
            if (e.depth >= MAX_DEPTH - 2) {
                ctx.beginPath();
                ctx.arc(e.x2, e.y2, 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(34, 197, 94, 0.6)';
                ctx.fill();
            }
        }

        // Root node glow
        if (tree) {
            ctx.beginPath();
            ctx.arc(tree.x, tree.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#fbbf24';
            ctx.fill();
            ctx.font = '12px monospace';
            ctx.fillStyle = '#fbbf24';
            ctx.textAlign = 'center';
            ctx.fillText('1', tree.x, tree.y + 18);
        }
    }

    function animate() {
        if (animProgress < edges.length) {
            animProgress += Math.max(5, edges.length / 200);
        }
        draw();
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', function() {
        resize();
        init();
    });

    resize();
    init();
    animate();

} catch (err) {
    document.body.innerHTML = '<div style="color:#f87171;padding:40px;font-size:18px;">Error: ' + err.message + '</div>';
}
</script>
</body>
</html>
