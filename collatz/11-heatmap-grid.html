<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopping Time Heatmap - Collatz Conjecture</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0e1a;
        color: #e0e0e0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
    }
    canvas { display: block; }
    .back-link {
        position: fixed; top: 12px; left: 12px; z-index: 100;
        background: rgba(0,0,0,0.7); color: #fbbf24;
        text-decoration: none; padding: 8px 16px; border-radius: 6px;
        font-size: 14px; font-weight: 500;
        transition: background 0.2s;
    }
    .back-link:hover { background: rgba(0,0,0,0.9); }
    .title {
        position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
        z-index: 100; font-size: 20px; font-weight: 600; color: #fbbf24;
        text-shadow: 0 0 10px rgba(251,191,36,0.3);
    }
    #tooltip {
        position: fixed; display: none; z-index: 200;
        background: rgba(0,0,0,0.85); color: #e0e0e0;
        padding: 8px 12px; border-radius: 6px; font-size: 13px;
        pointer-events: none; border: 1px solid rgba(251,191,36,0.3);
    }
    #tooltip span { color: #fbbf24; font-weight: 600; }
    #legend {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        z-index: 100; display: flex; align-items: center; gap: 8px;
        background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 8px;
    }
    #legend-canvas { border-radius: 4px; }
    .legend-label { font-size: 12px; color: #aaa; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&#8592; Back to Gallery</a>
<div class="title">Stopping Time Heatmap</div>
<div id="tooltip"></div>
<div id="legend">
    <span class="legend-label">Few steps</span>
    <canvas id="legend-canvas" width="200" height="16"></canvas>
    <span class="legend-label">Many steps</span>
</div>
<canvas id="canvas"></canvas>
<script>
try {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    const dpr = window.devicePixelRatio || 1;
    const COLS = 50;
    const ROWS = 50;

    let cellW, cellH, offsetX, offsetY;
    let stoppingTimes = [];
    let maxTime = 0;

    function collatzSteps(n) {
        let steps = 0;
        while (n !== 1 && n > 0) {
            n = n % 2 === 0 ? n / 2 : 3 * n + 1;
            steps++;
        }
        return steps;
    }

    function computeData() {
        stoppingTimes = [];
        maxTime = 0;
        for (let i = 1; i <= COLS * ROWS; i++) {
            const s = collatzSteps(i);
            stoppingTimes.push(s);
            if (s > maxTime) maxTime = s;
        }
    }

    function heatColor(t) {
        const ratio = t / maxTime;
        let r, g, b;
        if (ratio < 0.25) {
            const f = ratio / 0.25;
            r = 0; g = Math.floor(f * 128); b = Math.floor(128 + f * 127);
        } else if (ratio < 0.5) {
            const f = (ratio - 0.25) / 0.25;
            r = 0; g = Math.floor(128 + f * 127); b = Math.floor(255 - f * 128);
        } else if (ratio < 0.75) {
            const f = (ratio - 0.5) / 0.25;
            r = Math.floor(f * 255); g = Math.floor(255 - f * 80); b = Math.floor(127 - f * 127);
        } else {
            const f = (ratio - 0.75) / 0.25;
            r = 255; g = Math.floor(175 - f * 175); b = 0;
        }
        return `rgb(${r},${g},${b})`;
    }

    function resize() {
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.scale(dpr, dpr);

        const pad = 60;
        const availW = window.innerWidth - pad * 2;
        const availH = window.innerHeight - pad * 2 - 40;
        cellW = Math.floor(availW / COLS);
        cellH = Math.floor(availH / ROWS);
        const side = Math.min(cellW, cellH);
        cellW = side;
        cellH = side;
        offsetX = (window.innerWidth - COLS * cellW) / 2;
        offsetY = (window.innerHeight - ROWS * cellH) / 2;
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < COLS; col++) {
                const idx = row * COLS + col;
                const x = offsetX + col * cellW;
                const y = offsetY + row * cellH;
                ctx.fillStyle = heatColor(stoppingTimes[idx]);
                ctx.fillRect(x, y, cellW - 1, cellH - 1);
            }
        }
    }

    function drawLegend() {
        const lc = document.getElementById('legend-canvas');
        const lctx = lc.getContext('2d');
        for (let x = 0; x < 200; x++) {
            const t = (x / 199) * maxTime;
            lctx.fillStyle = heatColor(t);
            lctx.fillRect(x, 0, 1, 16);
        }
    }

    canvas.addEventListener('mousemove', function(e) {
        const mx = e.clientX;
        const my = e.clientY;
        const col = Math.floor((mx - offsetX) / cellW);
        const row = Math.floor((my - offsetY) / cellH);
        if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
            const idx = row * COLS + col;
            const num = idx + 1;
            tooltip.style.display = 'block';
            tooltip.style.left = (mx + 15) + 'px';
            tooltip.style.top = (my + 15) + 'px';
            tooltip.innerHTML = `Number: <span>${num}</span><br>Stopping time: <span>${stoppingTimes[idx]}</span>`;
        } else {
            tooltip.style.display = 'none';
        }
    });

    canvas.addEventListener('mouseleave', function() {
        tooltip.style.display = 'none';
    });

    window.addEventListener('resize', resize);

    computeData();
    resize();
    drawLegend();

} catch (err) {
    document.body.innerHTML = '<div style="color:#f87171;padding:40px;font-size:18px;">Error: ' + err.message + '</div>';
}
</script>
</body>
</html>
