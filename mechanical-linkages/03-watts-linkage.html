<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watt's Linkage - Approximate Straight Line</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .panel {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; color: #FEFAE0;
            font-size: 0.85rem; z-index: 100; min-width: 220px;
        }
        .panel h3 { color: #DDA15E; margin-bottom: 8px; font-size: 1rem; }
        .panel p { color: #8A9A5B; font-size: 0.8rem; line-height: 1.5; margin-bottom: 8px; }
        .panel label { display: block; margin: 6px 0 2px; color: #8A9A5B; font-size: 0.8rem; }
        .panel input[type=range] { width: 100%; accent-color: #8A9A5B; }
        .panel .value { color: #FEFAE0; float: right; }
        .btn {
            display: block; width: 100%; margin-top: 10px; padding: 8px;
            background: rgba(138,154,91,0.3); border: 1px solid #8A9A5B;
            color: #FEFAE0; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        .btn:hover { background: rgba(138,154,91,0.5); }
        .info {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            color: #8A9A5B; font-size: 0.85rem; opacity: 0.7; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="panel">
        <h3>Watt's Linkage</h3>
        <p>James Watt's 1784 mechanism: the midpoint of the coupler traces an approximate straight line. Used in car suspensions today.</p>
        <label>Arm Length <span class="value" id="va">150</span></label>
        <input type="range" id="sa" min="80" max="250" value="150">
        <label>Coupler Length <span class="value" id="vc">200</span></label>
        <input type="range" id="sc" min="100" max="350" value="200">
        <label>Trace Point <span class="value" id="vt">0.50</span></label>
        <input type="range" id="st" min="0" max="100" value="50">
        <label>Speed <span class="value" id="vsp">1.0</span></label>
        <input type="range" id="ssp" min="0" max="30" value="10">
        <button class="btn" onclick="clearTrace()">Clear Trace</button>
    </div>
    <div class="info">Move the trace point slider to see how different coupler points move | Space to pause</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let angle = 0;
        let paused = false;
        let trace = [];
        const MAX_TRACE = 4000;
        let dragging = false;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            trace = [];
        }
        resize();
        window.addEventListener('resize', resize);

        let armLen = 150, couplerLen = 200, traceT = 0.5, speed = 1.0;

        document.getElementById('sa').addEventListener('input', function() {
            armLen = parseFloat(this.value);
            document.getElementById('va').textContent = armLen;
            trace = [];
        });
        document.getElementById('sc').addEventListener('input', function() {
            couplerLen = parseFloat(this.value);
            document.getElementById('vc').textContent = couplerLen;
            trace = [];
        });
        document.getElementById('st').addEventListener('input', function() {
            traceT = parseFloat(this.value) / 100;
            document.getElementById('vt').textContent = traceT.toFixed(2);
            trace = [];
        });
        document.getElementById('ssp').addEventListener('input', function() {
            speed = parseFloat(this.value) / 10;
            document.getElementById('vsp').textContent = speed.toFixed(1);
        });

        window.clearTrace = function() { trace = []; };

        function drawLink(x1, y1, x2, y2, color, width) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width || 4;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawJoint(x, y, r, color) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (paused) return;

            ctx.fillStyle = 'rgba(26, 26, 46, 0.08)';
            ctx.fillRect(0, 0, W, H);

            angle += 0.012 * speed;
            if (angle > Math.PI * 2) angle -= Math.PI * 2;

            // Watt's linkage: Two equal-length rocker arms, a coupler between them
            const groundLen = couplerLen * 1.1;
            const Ax = W / 2 - groundLen / 2;
            const Ay = H / 2;
            const Dx = W / 2 + groundLen / 2;
            const Dy = H / 2;

            // Left arm rocks around A
            const maxSwing = Math.asin(Math.min(0.9, couplerLen / (2 * armLen)));
            const swing = maxSwing * Math.sin(angle);

            const Bx = Ax + armLen * Math.cos(-Math.PI/2 + swing);
            const By = Ay + armLen * Math.sin(-Math.PI/2 + swing);

            // Right arm: C must be at distance couplerLen from B and armLen from D
            const BDx = Dx - Bx, BDy = Dy - By;
            const BD = Math.sqrt(BDx * BDx + BDy * BDy);

            if (BD <= armLen + couplerLen && BD >= Math.abs(armLen - couplerLen)) {
                const cosA = (armLen * armLen + BD * BD - couplerLen * couplerLen) / (2 * armLen * BD);
                const clampedCos = Math.max(-1, Math.min(1, cosA));
                const alphaA = Math.acos(clampedCos);
                const phiBD = Math.atan2(By - Dy, Bx - Dx);

                const Cx = Dx + armLen * Math.cos(phiBD + alphaA);
                const Cy = Dy + armLen * Math.sin(phiBD + alphaA);

                // Trace point on coupler
                const Tx = Bx + (Cx - Bx) * traceT;
                const Ty = By + (Cy - By) * traceT;

                trace.push({x: Tx, y: Ty});
                if (trace.length > MAX_TRACE) trace.shift();

                // Draw trace
                if (trace.length > 1) {
                    for (let i = 1; i < trace.length; i++) {
                        const a = i / trace.length;
                        ctx.beginPath();
                        ctx.moveTo(trace[i-1].x, trace[i-1].y);
                        ctx.lineTo(trace[i].x, trace[i].y);
                        ctx.strokeStyle = `rgba(221, 161, 94, ${a * 0.8})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }

                // Reference straight line
                ctx.setLineDash([4, 8]);
                ctx.beginPath();
                ctx.moveTo(W/2 - 250, Ty);
                ctx.lineTo(W/2 + 250, Ty);
                ctx.strokeStyle = 'rgba(221,161,94,0.1)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.setLineDash([]);

                // Draw ground
                ctx.setLineDash([5, 5]);
                drawLink(Ax, Ay, Dx, Dy, 'rgba(138,154,91,0.3)', 2);
                ctx.setLineDash([]);

                // Draw arms and coupler
                drawLink(Ax, Ay, Bx, By, '#8A9A5B', 5);
                drawLink(Bx, By, Cx, Cy, '#DDA15E', 5);
                drawLink(Dx, Dy, Cx, Cy, '#8A9A5B', 5);

                // Draw rocker arcs
                ctx.beginPath();
                ctx.arc(Ax, Ay, armLen, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(138,154,91,0.08)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(Dx, Dy, armLen, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(138,154,91,0.08)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Draw joints
                drawJoint(Ax, Ay, 8, '#606C38');
                drawJoint(Dx, Dy, 8, '#606C38');
                drawJoint(Bx, By, 6, '#8A9A5B');
                drawJoint(Cx, Cy, 6, '#8A9A5B');
                drawJoint(Tx, Ty, 7, '#DDA15E');

                // Ground hatching
                for (let i = -15; i <= 15; i++) {
                    const gx = W/2 + i * 12;
                    ctx.beginPath();
                    ctx.moveTo(gx, Ay + 8);
                    ctx.lineTo(gx - 5, Ay + 16);
                    ctx.strokeStyle = 'rgba(138,154,91,0.2)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // Labels
                ctx.font = '12px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#606C38';
                ctx.fillText('A (fixed)', Ax, Ay + 24);
                ctx.fillText('D (fixed)', Dx, Dy + 24);
                ctx.fillStyle = '#8A9A5B';
                ctx.fillText('B', Bx - 14, By);
                ctx.fillText('C', Cx + 14, Cy);
                ctx.fillStyle = '#DDA15E';
                ctx.fillText('Trace point', Tx, Ty - 14);
            }
        }

        animate();

        window.reset = function() {
            angle = 0;
            trace = [];
            paused = false;
        };
    })();
    </script>
</body>
</html>
