<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantograph Mechanism</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .panel {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; color: #FEFAE0;
            font-size: 0.85rem; z-index: 100; min-width: 220px;
        }
        .panel h3 { color: #DDA15E; margin-bottom: 8px; font-size: 1rem; }
        .panel p { color: #8A9A5B; font-size: 0.8rem; line-height: 1.5; margin-bottom: 8px; }
        .panel label { display: block; margin: 6px 0 2px; color: #8A9A5B; font-size: 0.8rem; }
        .panel input[type=range] { width: 100%; accent-color: #8A9A5B; }
        .panel .value { color: #FEFAE0; float: right; }
        .btn {
            display: block; width: 100%; margin-top: 8px; padding: 8px;
            background: rgba(138,154,91,0.3); border: 1px solid #8A9A5B;
            color: #FEFAE0; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        .btn:hover { background: rgba(138,154,91,0.5); }
        .info {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            color: #8A9A5B; font-size: 0.85rem; opacity: 0.7; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="panel">
        <h3>Pantograph</h3>
        <p>Move your mouse to control the <strong style="color:#8A9A5B">input point</strong>. The <strong style="color:#DDA15E">output point</strong> draws a scaled copy. Used for copying maps, engraving, and even railroad pantographs.</p>
        <label>Scale Factor <span class="value" id="vs">2.0</span></label>
        <input type="range" id="ss" min="10" max="40" value="20">
        <button class="btn" onclick="clearDrawing()">Clear Drawing</button>
        <button class="btn" onclick="toggleAutoDemo()">Auto Demo</button>
    </div>
    <div class="info">Move your mouse to draw | The pantograph scales and copies your motion</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let inputTrace = [];
        let outputTrace = [];
        let mouseX = 0, mouseY = 0;
        let autoDemo = false;
        let autoAngle = 0;
        let scaleFactor = 2.0;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            inputTrace = [];
            outputTrace = [];
        }
        resize();
        window.addEventListener('resize', resize);

        document.getElementById('ss').addEventListener('input', function() {
            scaleFactor = parseFloat(this.value) / 10;
            document.getElementById('vs').textContent = scaleFactor.toFixed(1);
            inputTrace = [];
            outputTrace = [];
        });

        canvas.addEventListener('mousemove', function(e) {
            if (!autoDemo) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });
        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            if (!autoDemo) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }, {passive: false});

        window.clearDrawing = function() {
            inputTrace = [];
            outputTrace = [];
        };

        window.toggleAutoDemo = function() {
            autoDemo = !autoDemo;
            autoAngle = 0;
            inputTrace = [];
            outputTrace = [];
        };

        function drawLink(x1, y1, x2, y2, color, width) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width || 4;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawJoint(x, y, r, color) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function animate() {
            requestAnimationFrame(animate);

            ctx.fillStyle = 'rgba(26, 26, 46, 0.05)';
            ctx.fillRect(0, 0, W, H);

            // Fixed pivot
            const Fx = W * 0.2;
            const Fy = H * 0.3;

            // Auto-demo: draw a star
            if (autoDemo) {
                autoAngle += 0.02;
                const cx = W * 0.35;
                const cy = H * 0.55;
                const r = 80;
                // Lissajous curve
                mouseX = cx + r * Math.sin(autoAngle * 3);
                mouseY = cy + r * Math.cos(autoAngle * 2);
            }

            // Input point (mouse-controlled)
            const Ix = mouseX || W * 0.4;
            const Iy = mouseY || H * 0.5;

            // Pantograph geometry:
            // Fixed pivot F, input point I, output point O
            // F, I, O are collinear with O = F + scaleFactor * (I - F)
            const Ox = Fx + scaleFactor * (Ix - Fx);
            const Oy = Fy + scaleFactor * (Iy - Fy);

            // Parallelogram vertices for the linkage
            // Arm from F to P1 (along direction to I)
            const dx = Ix - Fx;
            const dy = Iy - Fy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 1) { requestAnimationFrame(animate); return; }

            const armLen = dist;
            const P1x = Fx + dx;
            const P1y = Fy + dy;

            // Second arm extends to output
            const P2x = Fx + dx * scaleFactor;
            const P2y = Fy + dy * scaleFactor;

            // Parallelogram: we need a cross-bar
            // Side offset for the parallelogram shape
            const perpX = -dy / dist * 40;
            const perpY = dx / dist * 40;

            const Ax = Fx + perpX;
            const Ay = Fy + perpY;
            const Bx = Ix + perpX;
            const By = Iy + perpY;
            const Cx = Fx + dx * scaleFactor + perpX;
            const Cy = Fy + dy * scaleFactor + perpY;

            // Record traces
            inputTrace.push({x: Ix, y: Iy});
            outputTrace.push({x: Ox, y: Oy});
            if (inputTrace.length > 5000) inputTrace.shift();
            if (outputTrace.length > 5000) outputTrace.shift();

            // Draw traces
            if (inputTrace.length > 1) {
                ctx.beginPath();
                ctx.moveTo(inputTrace[0].x, inputTrace[0].y);
                for (let i = 1; i < inputTrace.length; i++) {
                    ctx.lineTo(inputTrace[i].x, inputTrace[i].y);
                }
                ctx.strokeStyle = 'rgba(138, 154, 91, 0.5)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            if (outputTrace.length > 1) {
                ctx.beginPath();
                ctx.moveTo(outputTrace[0].x, outputTrace[0].y);
                for (let i = 1; i < outputTrace.length; i++) {
                    ctx.lineTo(outputTrace[i].x, outputTrace[i].y);
                }
                ctx.strokeStyle = 'rgba(221, 161, 94, 0.7)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Draw the pantograph linkage
            // Main arms: F-I and F-O (collinear)
            drawLink(Fx, Fy, Ix, Iy, '#8A9A5B', 4);
            drawLink(Ix, Iy, Ox, Oy, '#8A9A5B', 3);

            // Parallelogram bars
            drawLink(Ax, Ay, Bx, By, '#606C38', 3);
            drawLink(Fx, Fy, Ax, Ay, '#606C38', 3);
            drawLink(Bx, By, Cx, Cy, '#606C38', 3);
            drawLink(Ix, Iy, Bx, By, 'rgba(138,154,91,0.5)', 2);

            // Cross brace for structure
            drawLink(Ax, Ay, Ox, Oy, 'rgba(96,108,56,0.4)', 2);

            // Joints
            drawJoint(Fx, Fy, 8, '#606C38');
            drawJoint(Ix, Iy, 7, '#8A9A5B');
            drawJoint(Ox, Oy, 7, '#DDA15E');
            drawJoint(Ax, Ay, 5, '#606C38');
            drawJoint(Bx, By, 5, '#606C38');
            drawJoint(Cx, Cy, 5, '#606C38');

            // Labels
            ctx.font = '13px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#606C38';
            ctx.fillText('Fixed pivot', Fx, Fy - 16);
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText('Input (stylus)', Ix, Iy + 22);
            ctx.fillStyle = '#DDA15E';
            ctx.fillText('Output (' + scaleFactor.toFixed(1) + 'x)', Ox, Oy + 22);

            // Scale indicator
            ctx.font = '14px Segoe UI';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('Scale: ' + scaleFactor.toFixed(1) + 'x', W/2, 30);
        }

        animate();

        window.reset = function() {
            inputTrace = [];
            outputTrace = [];
            autoDemo = false;
            autoAngle = 0;
        };
    })();
    </script>
</body>
</html>
