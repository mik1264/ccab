<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peaucellier-Lipkin Straight-Line Linkage</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .panel {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; color: #FEFAE0;
            font-size: 0.85rem; z-index: 100; min-width: 220px;
        }
        .panel h3 { color: #DDA15E; margin-bottom: 8px; font-size: 1rem; }
        .panel p { color: #8A9A5B; font-size: 0.8rem; line-height: 1.5; margin-bottom: 6px; }
        .panel label { display: block; margin: 6px 0 2px; color: #8A9A5B; font-size: 0.8rem; }
        .panel input[type=range] { width: 100%; accent-color: #8A9A5B; }
        .panel .value { color: #FEFAE0; float: right; }
        .info {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            color: #8A9A5B; font-size: 0.85rem; opacity: 0.7; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="panel">
        <h3>Peaucellier-Lipkin Linkage</h3>
        <p>Converts circular motion into a <strong style="color:#DDA15E">perfect straight line</strong> using circle inversion.</p>
        <label>Long Arms <span class="value" id="vl">180</span></label>
        <input type="range" id="sl" min="100" max="250" value="180">
        <label>Short Arms <span class="value" id="vs">80</span></label>
        <input type="range" id="ss" min="30" max="140" value="80">
        <label>Speed <span class="value" id="vsp">1.0</span></label>
        <input type="range" id="ssp" min="0" max="30" value="10">
    </div>
    <div class="info">The output point traces a perfect vertical line | Space to pause</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let angle = 0;
        let paused = false;
        let trace = [];
        const MAX_TRACE = 3000;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            trace = [];
        }
        resize();
        window.addEventListener('resize', resize);

        let longArm = 180, shortArm = 80, speed = 1.0;
        document.getElementById('sl').addEventListener('input', function() {
            longArm = parseFloat(this.value);
            document.getElementById('vl').textContent = longArm;
            trace = [];
        });
        document.getElementById('ss').addEventListener('input', function() {
            shortArm = parseFloat(this.value);
            document.getElementById('vs').textContent = shortArm;
            trace = [];
        });
        document.getElementById('ssp').addEventListener('input', function() {
            speed = parseFloat(this.value) / 10;
            document.getElementById('vsp').textContent = speed.toFixed(1);
        });

        function drawLink(x1, y1, x2, y2, color, width) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width || 4;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawJoint(x, y, r, color) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (paused) return;

            ctx.fillStyle = 'rgba(26, 26, 46, 0.12)';
            ctx.fillRect(0, 0, W, H);

            angle += 0.015 * speed;
            if (angle > Math.PI * 2) angle -= Math.PI * 2;

            const OX = W / 2 - 50;
            const OY = H / 2;

            // Fixed pivot O at origin
            // Fixed pivot A at distance d from O
            const d = longArm; // distance OA
            const linkOB = longArm; // OB = OC = long arms
            const linkBP = shortArm; // BP = CP = BD = CD = short arms

            // The driving arm: point B on a circle around A
            const r_drive = longArm * 0.4; // radius of driving circle
            const Ax = OX - d * 0.6;
            const Ay = OY;

            // Drive point on circle around A
            const driveAngle = angle;
            const Bx_drive = Ax + r_drive * Math.cos(driveAngle);
            const By_drive = Ay + r_drive * Math.sin(driveAngle);

            // For the Peaucellier cell, we need:
            // O is a fixed point
            // A is another fixed point at distance d
            // B and C are connected to O by long arms (length L)
            // P is connected to B and C by short arms (length l)
            // B is also connected to A by a link
            // The constraint is that OBPC forms a rhombus-like cell

            // Simplified Peaucellier:
            // Fixed point O, input point M on circle centered at A passing through O
            // L = long arms from O to B and O to C
            // l = short arms forming the rhombus BPCD
            const L = longArm;
            const l = shortArm;
            const auxRadius = d * 0.5;
            const Fx = OX; // Fixed point
            const Fy = OY;
            const Gx = OX + auxRadius * 2; // Second fixed point
            const Gy = OY;

            // Input point M on circle centered at G with radius = auxRadius
            // such that the circle passes through F (OX, OY) -> not generally true
            // Let's use a cleaner geometry:
            // F is fixed. M moves on a circle of radius r centered at C0.
            // C0 is at distance = r from F (so circle passes through F).
            const r_circ = 100;
            const C0x = OX + r_circ;
            const C0y = OY;

            const Mx = C0x + r_circ * Math.cos(Math.PI + angle);
            const My = C0y + r_circ * Math.sin(Math.PI + angle);

            // FM distance
            const FMx = Mx - Fx, FMy = My - Fy;
            const FM = Math.sqrt(FMx * FMx + FMy * FMy);
            if (FM < 1) { return; }

            // B and C are symmetric about line FM, both at distance L from F
            // and distance l from M
            const cosAlpha_B = (L * L + FM * FM - l * l) / (2 * L * FM);
            if (Math.abs(cosAlpha_B) > 1) { return; }
            const alphaB = Math.acos(cosAlpha_B);
            const phi = Math.atan2(FMy, FMx);

            const B = { x: Fx + L * Math.cos(phi + alphaB), y: Fy + L * Math.sin(phi + alphaB) };
            const C = { x: Fx + L * Math.cos(phi - alphaB), y: Fy + L * Math.sin(phi - alphaB) };

            // Output point P: symmetric to M through the midpoint of BC
            // P is at distance l from both B and C, on the opposite side of BC from M
            const cosBeta = (l * l + FM * FM - L * L) / (2 * l * FM);
            // Actually, P is the other intersection: both B and C are at distance l from P
            // P lies on line FM extended, at distance L*L/(FM) ... no.
            // For Peaucellier: OP * OM = (L^2 - l^2) = constant (inversion)
            const k2 = L * L - l * l;
            const OP = k2 / FM;
            const Px = Fx + OP * Math.cos(phi);
            const Py = Fy + OP * Math.sin(phi);

            // Trace the output point
            trace.push({x: Px, y: Py});
            if (trace.length > MAX_TRACE) trace.shift();

            // Draw trace
            if (trace.length > 1) {
                for (let i = 1; i < trace.length; i++) {
                    const alpha = i / trace.length;
                    ctx.beginPath();
                    ctx.moveTo(trace[i-1].x, trace[i-1].y);
                    ctx.lineTo(trace[i].x, trace[i].y);
                    ctx.strokeStyle = `rgba(221, 161, 94, ${alpha * 0.9})`;
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                }
            }

            // Draw driving circle
            ctx.beginPath();
            ctx.arc(C0x, C0y, r_circ, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(138,154,91,0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Draw auxiliary link F-M
            drawLink(Fx, Fy, Mx, My, 'rgba(138,154,91,0.4)', 2);

            // Draw driving arm (C0 to M)
            drawLink(C0x, C0y, Mx, My, 'rgba(96,108,56,0.6)', 3);

            // Draw long arms O-B and O-C
            drawLink(Fx, Fy, B.x, B.y, '#8A9A5B', 4);
            drawLink(Fx, Fy, C.x, C.y, '#8A9A5B', 4);

            // Draw short arms B-P and C-P, B-M and C-M
            drawLink(B.x, B.y, Px, Py, '#DDA15E', 3);
            drawLink(C.x, C.y, Px, Py, '#DDA15E', 3);
            drawLink(B.x, B.y, Mx, My, '#DDA15E', 3);
            drawLink(C.x, C.y, Mx, My, '#DDA15E', 3);

            // Draw joints
            drawJoint(Fx, Fy, 8, '#606C38');    // Fixed pivot O
            drawJoint(C0x, C0y, 7, '#606C38');  // Fixed pivot A
            drawJoint(Mx, My, 6, '#8A9A5B');    // Input M
            drawJoint(B.x, B.y, 5, '#8A9A5B');  // B
            drawJoint(C.x, C.y, 5, '#8A9A5B');  // C
            drawJoint(Px, Py, 7, '#DDA15E');    // Output P

            // Labels
            ctx.font = '12px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#606C38';
            ctx.fillText('O (fixed)', Fx, Fy + 24);
            ctx.fillText('A (fixed)', C0x, C0y + 24);
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText('M (input)', Mx, My - 14);
            ctx.fillStyle = '#DDA15E';
            ctx.fillText('P (output)', Px, Py - 14);

            // Show the straight line reference
            ctx.setLineDash([3, 6]);
            ctx.beginPath();
            ctx.moveTo(Px, OY - 200);
            ctx.lineTo(Px, OY + 200);
            ctx.strokeStyle = 'rgba(221,161,94,0.15)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.setLineDash([]);
        }

        animate();

        window.reset = function() {
            angle = 0;
            trace = [];
            paused = false;
        };
    })();
    </script>
</body>
</html>
