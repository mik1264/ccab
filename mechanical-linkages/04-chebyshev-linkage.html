<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chebyshev Linkage - Approximate Straight Line</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .panel {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; color: #FEFAE0;
            font-size: 0.85rem; z-index: 100; min-width: 230px;
        }
        .panel h3 { color: #DDA15E; margin-bottom: 8px; font-size: 1rem; }
        .panel p { color: #8A9A5B; font-size: 0.8rem; line-height: 1.5; margin-bottom: 8px; }
        .panel label { display: block; margin: 6px 0 2px; color: #8A9A5B; font-size: 0.8rem; }
        .panel input[type=range] { width: 100%; accent-color: #8A9A5B; }
        .panel .value { color: #FEFAE0; float: right; }
        .panel .ratio { margin-top: 8px; padding: 8px; background: rgba(138,154,91,0.2); border-radius: 8px; text-align: center; color: #DDA15E; font-size: 0.85rem; }
        .info {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            color: #8A9A5B; font-size: 0.85rem; opacity: 0.7; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="panel">
        <h3>Chebyshev Linkage</h3>
        <p>Classic proportions: ground=2, rockers=2.5, coupler=1. The midpoint of the coupler traces an <strong style="color:#DDA15E">approximately straight line</strong> over a wide arc.</p>
        <label>Ground <span class="value" id="vg">200</span></label>
        <input type="range" id="sg" min="80" max="300" value="200">
        <label>Scale <span class="value" id="vscl">1.0</span></label>
        <input type="range" id="sscl" min="5" max="20" value="10">
        <label>Speed <span class="value" id="vsp">1.0</span></label>
        <input type="range" id="ssp" min="0" max="30" value="10">
        <div class="ratio" id="ratio">Ratio: 2 : 2.5 : 1 (Chebyshev)</div>
    </div>
    <div class="info">Chebyshev's 1850 approximate straight-line mechanism | Space to pause | R to reset</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let angle = 0;
        let paused = false;
        let trace = [];
        const MAX_TRACE = 5000;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            trace = [];
        }
        resize();
        window.addEventListener('resize', resize);

        let groundLen = 200, scale = 1.0, speed = 1.0;

        document.getElementById('sg').addEventListener('input', function() {
            groundLen = parseFloat(this.value);
            document.getElementById('vg').textContent = groundLen;
            trace = [];
        });
        document.getElementById('sscl').addEventListener('input', function() {
            scale = parseFloat(this.value) / 10;
            document.getElementById('vscl').textContent = scale.toFixed(1);
            trace = [];
        });
        document.getElementById('ssp').addEventListener('input', function() {
            speed = parseFloat(this.value) / 10;
            document.getElementById('vsp').textContent = speed.toFixed(1);
        });

        function drawLink(x1, y1, x2, y2, color, width) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width || 4;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawJoint(x, y, r, color) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (paused) return;

            ctx.fillStyle = 'rgba(26, 26, 46, 0.06)';
            ctx.fillRect(0, 0, W, H);

            angle += 0.012 * speed;
            if (angle > Math.PI * 2) angle -= Math.PI * 2;

            // Chebyshev proportions: ground=2d, rockers=2.5d, coupler=d
            const d = groundLen / 2 * scale;
            const ground = 2 * d;
            const rocker = 2.5 * d;
            const coupler = d;

            // Wrong - classic Chebyshev has ground=2, each rocker=2.5, coupler=1
            // But the coupler is actually 1*d length
            // Let me recalculate: if ground = 200, d=100
            // rockers = 250, coupler = 100

            const Ax = W / 2 - ground / 2;
            const Ay = H / 2;
            const Dx = W / 2 + ground / 2;
            const Dy = H / 2;

            // Left rocker rotates
            const Bx = Ax + rocker * Math.cos(angle);
            const By = Ay - rocker * Math.sin(angle);

            // Find C: at distance coupler from B and distance rocker from D
            const BDx = Dx - Bx, BDy = Dy - By;
            const BD = Math.sqrt(BDx * BDx + BDy * BDy);

            if (BD <= rocker + coupler && BD >= Math.abs(rocker - coupler) && BD > 0.001) {
                const cosA = (rocker * rocker + BD * BD - coupler * coupler) / (2 * rocker * BD);
                const clampedCos = Math.max(-1, Math.min(1, cosA));
                const alpha = Math.acos(clampedCos);
                const phi = Math.atan2(By - Dy, Bx - Dx);

                // Use the lower solution for Chebyshev
                const Cx = Dx + rocker * Math.cos(phi - alpha);
                const Cy = Dy + rocker * Math.sin(phi - alpha);

                // Midpoint of coupler
                const Mx = (Bx + Cx) / 2;
                const My = (By + Cy) / 2;

                trace.push({x: Mx, y: My});
                if (trace.length > MAX_TRACE) trace.shift();

                // Draw trace
                if (trace.length > 1) {
                    for (let i = 1; i < trace.length; i++) {
                        const a = i / trace.length;
                        ctx.beginPath();
                        ctx.moveTo(trace[i-1].x, trace[i-1].y);
                        ctx.lineTo(trace[i].x, trace[i].y);
                        ctx.strokeStyle = `rgba(221, 161, 94, ${a * 0.9})`;
                        ctx.lineWidth = 2.5;
                        ctx.stroke();
                    }
                }

                // Draw ground
                ctx.setLineDash([5, 5]);
                drawLink(Ax, Ay, Dx, Dy, 'rgba(138,154,91,0.3)', 2);
                ctx.setLineDash([]);

                // Draw rocker arcs
                ctx.beginPath();
                ctx.arc(Ax, Ay, rocker, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(138,154,91,0.06)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(Dx, Dy, rocker, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(138,154,91,0.06)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Links
                drawLink(Ax, Ay, Bx, By, '#8A9A5B', 5);   // Left rocker
                drawLink(Bx, By, Cx, Cy, '#DDA15E', 5);    // Coupler
                drawLink(Dx, Dy, Cx, Cy, '#606C38', 5);    // Right rocker

                // Joints
                drawJoint(Ax, Ay, 8, '#606C38');
                drawJoint(Dx, Dy, 8, '#606C38');
                drawJoint(Bx, By, 6, '#8A9A5B');
                drawJoint(Cx, Cy, 6, '#8A9A5B');
                drawJoint(Mx, My, 7, '#DDA15E');

                // Ground hatching
                for (let i = -12; i <= 12; i++) {
                    const gx = W/2 + i * 12;
                    ctx.beginPath();
                    ctx.moveTo(gx, Ay + 8);
                    ctx.lineTo(gx - 5, Ay + 16);
                    ctx.strokeStyle = 'rgba(138,154,91,0.2)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // Labels
                ctx.font = '12px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#606C38';
                ctx.fillText('A (fixed)', Ax, Ay + 24);
                ctx.fillText('D (fixed)', Dx, Dy + 24);
                ctx.fillStyle = '#8A9A5B';
                ctx.fillText('B', Bx, By - 14);
                ctx.fillText('C', Cx + 14, Cy);
                ctx.fillStyle = '#DDA15E';
                ctx.fillText('M (midpoint)', Mx, My - 14);

                // Deviation line
                ctx.setLineDash([3, 6]);
                const straightY = Ay + Math.sqrt(rocker * rocker - (ground/2) * (ground/2));
                ctx.beginPath();
                ctx.moveTo(Ax - 50, straightY);
                ctx.lineTo(Dx + 50, straightY);
                ctx.strokeStyle = 'rgba(221,161,94,0.15)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        animate();

        window.reset = function() {
            angle = 0;
            trace = [];
            paused = false;
        };
    })();
    </script>
</body>
</html>
