<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Four-Bar Linkage Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .panel {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; color: #FEFAE0;
            font-size: 0.85rem; z-index: 100; min-width: 220px;
        }
        .panel h3 { color: #DDA15E; margin-bottom: 10px; font-size: 1rem; }
        .panel label { display: block; margin: 6px 0 2px; color: #8A9A5B; font-size: 0.8rem; }
        .panel input[type=range] { width: 100%; accent-color: #8A9A5B; }
        .panel .value { color: #FEFAE0; float: right; font-size: 0.8rem; }
        .panel .grashof { margin-top: 10px; padding: 8px; border-radius: 8px; text-align: center; font-weight: bold; }
        .grashof.yes { background: rgba(138,154,91,0.3); color: #8A9A5B; }
        .grashof.no { background: rgba(221,161,94,0.3); color: #DDA15E; }
        .info {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            color: #8A9A5B; font-size: 0.85rem; opacity: 0.7; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="panel">
        <h3>Four-Bar Linkage</h3>
        <label>Ground (L1) <span class="value" id="v1">200</span></label>
        <input type="range" id="s1" min="50" max="300" value="200">
        <label>Crank (L2) <span class="value" id="v2">80</span></label>
        <input type="range" id="s2" min="20" max="200" value="80">
        <label>Coupler (L3) <span class="value" id="v3">150</span></label>
        <input type="range" id="s3" min="50" max="300" value="150">
        <label>Rocker (L4) <span class="value" id="v4">120</span></label>
        <input type="range" id="s4" min="30" max="250" value="120">
        <label>Speed <span class="value" id="vs">1.0</span></label>
        <input type="range" id="ss" min="0" max="30" value="10">
        <div class="grashof" id="grashof">Checking...</div>
    </div>
    <div class="info">Drag sliders to change link lengths | Space to pause | R to reset</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let angle = 0;
        let paused = false;
        let coupler_trace = [];
        const MAX_TRACE = 2000;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            coupler_trace = [];
        }
        resize();
        window.addEventListener('resize', resize);

        const sliders = { s1: 200, s2: 80, s3: 150, s4: 120, ss: 10 };
        Object.keys(sliders).forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('input', () => {
                sliders[id] = parseFloat(el.value);
                const vid = id === 'ss' ? 'vs' : 'v' + id.charAt(1);
                const val = id === 'ss' ? (sliders[id] / 10).toFixed(1) : sliders[id];
                document.getElementById(vid).textContent = val;
                coupler_trace = [];
                updateGrashof();
            });
        });

        function updateGrashof() {
            const lengths = [sliders.s1, sliders.s2, sliders.s3, sliders.s4].sort((a,b) => a-b);
            const S = lengths[0], L = lengths[3], P = lengths[1], Q = lengths[2];
            const isGrashof = S + L <= P + Q;
            const el = document.getElementById('grashof');
            if (isGrashof) {
                el.className = 'grashof yes';
                el.textContent = 'Grashof: Full rotation possible';
            } else {
                el.className = 'grashof no';
                el.textContent = 'Non-Grashof: No full rotation';
            }
        }
        updateGrashof();

        function solveFourBar(L1, L2, L3, L4, theta2) {
            const Ax = 0, Ay = 0;
            const Dx = L1, Dy = 0;
            const Bx = L2 * Math.cos(theta2);
            const By = L2 * Math.sin(theta2);
            const BDx = Dx - Bx, BDy = Dy - By;
            const BD = Math.sqrt(BDx * BDx + BDy * BDy);
            if (BD > L3 + L4 || BD < Math.abs(L3 - L4) || BD < 1e-6) return null;
            const cosAlpha = (L4 * L4 + BD * BD - L3 * L3) / (2 * L4 * BD);
            if (Math.abs(cosAlpha) > 1) return null;
            const alpha = Math.acos(cosAlpha);
            const phi = Math.atan2(By - Dy, Bx - Dx);
            const theta4 = Math.PI + phi + alpha;
            const Cx = Dx + L4 * Math.cos(theta4);
            const Cy = Dy + L4 * Math.sin(theta4);
            const couplerX = (Bx + Cx) / 2;
            const couplerY = (By + Cy) / 2;
            return { B: {x: Bx, y: By}, C: {x: Cx, y: Cy}, coupler: {x: couplerX, y: couplerY} };
        }

        function drawJoint(x, y, r, color) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawLink(x1, y1, x2, y2, color, width) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width || 4;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (paused) return;
            ctx.fillStyle = 'rgba(26, 26, 46, 0.15)';
            ctx.fillRect(0, 0, W, H);

            const speed = sliders.ss / 10;
            angle += 0.02 * speed;
            if (angle > Math.PI * 2) angle -= Math.PI * 2;

            const cx = W / 2 - sliders.s1 / 2;
            const cy = H / 2 + 50;
            const result = solveFourBar(sliders.s1, sliders.s2, sliders.s3, sliders.s4, angle);

            // Draw ground
            ctx.setLineDash([5, 5]);
            drawLink(cx, cy, cx + sliders.s1, cy, 'rgba(138,154,91,0.3)', 2);
            ctx.setLineDash([]);

            if (result) {
                const A = {x: cx, y: cy};
                const D = {x: cx + sliders.s1, y: cy};
                const B = {x: cx + result.B.x, y: cy - result.B.y};
                const C = {x: cx + result.C.x, y: cy - result.C.y};
                const couplerPt = {x: cx + result.coupler.x, y: cy - result.coupler.y};

                coupler_trace.push({x: couplerPt.x, y: couplerPt.y});
                if (coupler_trace.length > MAX_TRACE) coupler_trace.shift();

                // Draw coupler curve trace
                if (coupler_trace.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(coupler_trace[0].x, coupler_trace[0].y);
                    for (let i = 1; i < coupler_trace.length; i++) {
                        const alpha = i / coupler_trace.length;
                        ctx.strokeStyle = `rgba(221, 161, 94, ${alpha * 0.8})`;
                        ctx.lineWidth = 2;
                        ctx.lineTo(coupler_trace[i].x, coupler_trace[i].y);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(coupler_trace[i].x, coupler_trace[i].y);
                    }
                }

                // Draw links
                drawLink(A.x, A.y, B.x, B.y, '#8A9A5B', 5);  // Crank
                drawLink(B.x, B.y, C.x, C.y, '#DDA15E', 5);  // Coupler
                drawLink(D.x, D.y, C.x, C.y, '#606C38', 5);  // Rocker

                // Draw coupler point
                drawJoint(couplerPt.x, couplerPt.y, 5, '#DDA15E');

                // Draw joints
                drawJoint(A.x, A.y, 8, '#606C38');  // Ground A
                drawJoint(D.x, D.y, 8, '#606C38');  // Ground D
                drawJoint(B.x, B.y, 6, '#8A9A5B');  // Moving B
                drawJoint(C.x, C.y, 6, '#8A9A5B');  // Moving C

                // Ground hatch marks
                for (let i = -10; i <= 10; i++) {
                    const gx = (A.x + D.x) / 2 + i * 12;
                    ctx.beginPath();
                    ctx.moveTo(gx, cy + 8);
                    ctx.lineTo(gx - 5, cy + 16);
                    ctx.strokeStyle = 'rgba(138,154,91,0.3)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // Labels
                ctx.font = '12px Segoe UI';
                ctx.fillStyle = '#8A9A5B';
                ctx.textAlign = 'center';
                ctx.fillText('A (ground)', A.x, A.y + 28);
                ctx.fillText('D (ground)', D.x, D.y + 28);
                ctx.fillStyle = '#DDA15E';
                ctx.fillText('B', B.x, B.y - 14);
                ctx.fillText('C', C.x, C.y - 14);
            } else {
                ctx.font = '16px Segoe UI';
                ctx.fillStyle = '#DDA15E';
                ctx.textAlign = 'center';
                ctx.fillText('Invalid configuration at this angle', W/2, H/2 - 100);
            }
        }

        animate();

        window.reset = function() {
            angle = 0;
            coupler_trace = [];
            paused = false;
        };
    })();
    </script>
</body>
</html>
