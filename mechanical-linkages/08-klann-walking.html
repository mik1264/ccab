<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klann Walking Linkage</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .panel {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; color: #FEFAE0;
            font-size: 0.85rem; z-index: 100; min-width: 220px;
        }
        .panel h3 { color: #DDA15E; margin-bottom: 8px; font-size: 1rem; }
        .panel p { color: #8A9A5B; font-size: 0.8rem; line-height: 1.5; margin-bottom: 8px; }
        .panel label { display: block; margin: 6px 0 2px; color: #8A9A5B; font-size: 0.8rem; }
        .panel input[type=range] { width: 100%; accent-color: #8A9A5B; }
        .panel .value { color: #FEFAE0; float: right; }
        .panel select {
            width: 100%; padding: 6px; background: rgba(30,30,50,0.8); color: #FEFAE0;
            border: 1px solid #8A9A5B; border-radius: 6px; margin-top: 4px;
        }
        .info {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            color: #8A9A5B; font-size: 0.85rem; opacity: 0.7; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="panel">
        <h3>Klann Walking Linkage</h3>
        <p>A single-DOF mechanism that simulates an <strong style="color:#DDA15E">animal-like walking gait</strong>. Invented by Joe Klann in 1994. One crank drives all legs.</p>
        <label>Legs</label>
        <select id="legs">
            <option value="1">1 leg (study mode)</option>
            <option value="2">2 legs (bipedal)</option>
            <option value="4" selected>4 legs (quadruped)</option>
            <option value="6">6 legs (hexapod)</option>
        </select>
        <label>Speed <span class="value" id="vsp">1.0</span></label>
        <input type="range" id="ssp" min="1" max="30" value="10">
        <label>Scale <span class="value" id="vsc">1.0</span></label>
        <input type="range" id="ssc" min="5" max="20" value="10">
    </div>
    <div class="info">Watch the foot trace a walking path: flat on the ground, lifted in the air | Space to pause</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let angle = 0;
        let paused = false;
        let nLegs = 4;
        let speed = 1.0;
        let scale = 1.0;
        let footTraces = [];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            footTraces = [];
        }
        resize();
        window.addEventListener('resize', resize);

        document.getElementById('legs').addEventListener('change', function() {
            nLegs = parseInt(this.value);
            footTraces = [];
        });
        document.getElementById('ssp').addEventListener('input', function() {
            speed = parseFloat(this.value) / 10;
            document.getElementById('vsp').textContent = speed.toFixed(1);
        });
        document.getElementById('ssc').addEventListener('input', function() {
            scale = parseFloat(this.value) / 10;
            document.getElementById('vsc').textContent = scale.toFixed(1);
            footTraces = [];
        });

        // Klann linkage proportions (normalized)
        const KLANN = {
            crank: 25,      // crank length
            coupler: 70,    // upper leg
            rocker: 65,     // rocker
            ground: 55,     // ground link offset
            lower: 85,      // lower leg
            output: 50,     // foot extension
            groundAngle: -0.3,  // angle of ground link from horizontal
            rockerPivotX: 50,
            rockerPivotY: 15
        };

        function solveKlannLeg(crankAngle, originX, originY, s, flip) {
            const k = KLANN;
            const f = flip ? -1 : 1;

            // Crank pivot at origin
            const crankEndX = originX + k.crank * s * Math.cos(crankAngle);
            const crankEndY = originY + k.crank * s * Math.sin(crankAngle);

            // Ground rocker pivot (fixed, offset from crank)
            const rockerPivotX = originX + k.rockerPivotX * s * f;
            const rockerPivotY = originY + k.rockerPivotY * s;

            // Solve for rocker end: distance from crankEnd = coupler, distance from rockerPivot = rocker
            const dx = crankEndX - rockerPivotX;
            const dy = crankEndY - rockerPivotY;
            const d = Math.sqrt(dx * dx + dy * dy);

            if (d > (k.coupler + k.rocker) * s || d < Math.abs(k.coupler - k.rocker) * s || d < 0.01) {
                return null;
            }

            const a = k.rocker * s;
            const b = k.coupler * s;
            const cosAlpha = (a * a + d * d - b * b) / (2 * a * d);
            if (Math.abs(cosAlpha) > 1) return null;
            const alpha = Math.acos(cosAlpha);
            const phi = Math.atan2(dy, dx);

            // Use lower solution for proper walking motion
            const rockerEndX = rockerPivotX + a * Math.cos(phi + alpha * f);
            const rockerEndY = rockerPivotY + a * Math.sin(phi + alpha * f);

            // Knee joint (same as crank end for simplified model)
            const kneeX = crankEndX;
            const kneeY = crankEndY;

            // Foot: extend lower leg from rocker end in the direction away from rocker pivot
            const rdx = rockerEndX - rockerPivotX;
            const rdy = rockerEndY - rockerPivotY;
            const rLen = Math.sqrt(rdx * rdx + rdy * rdy);
            const footX = rockerEndX + (rdx / rLen) * k.lower * s;
            const footY = rockerEndY + (rdy / rLen) * k.lower * s;

            return {
                crankEnd: {x: crankEndX, y: crankEndY},
                rockerPivot: {x: rockerPivotX, y: rockerPivotY},
                rockerEnd: {x: rockerEndX, y: rockerEndY},
                knee: {x: kneeX, y: kneeY},
                foot: {x: footX, y: footY}
            };
        }

        function drawLink(x1, y1, x2, y2, color, width) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width || 3;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawJoint(x, y, r, color) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (paused) return;

            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            angle += 0.02 * speed;
            if (angle > Math.PI * 2) angle -= Math.PI * 2;

            const bodyY = H * 0.4;
            const bodyWidth = nLegs * 60 * scale;
            const bodyStartX = W / 2 - bodyWidth / 2;

            // Draw ground line
            ctx.beginPath();
            ctx.moveTo(0, H * 0.75);
            ctx.lineTo(W, H * 0.75);
            ctx.strokeStyle = 'rgba(138,154,91,0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Ground texture
            for (let i = 0; i < W; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, H * 0.75);
                ctx.lineTo(i - 5, H * 0.75 + 8);
                ctx.strokeStyle = 'rgba(138,154,91,0.1)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Draw body frame
            ctx.fillStyle = 'rgba(96,108,56,0.2)';
            ctx.fillRect(bodyStartX - 20, bodyY - 15, bodyWidth + 40, 30);
            ctx.strokeStyle = '#606C38';
            ctx.lineWidth = 3;
            ctx.strokeRect(bodyStartX - 20, bodyY - 15, bodyWidth + 40, 30);

            while (footTraces.length < nLegs) footTraces.push([]);

            // Draw each leg
            for (let i = 0; i < nLegs; i++) {
                const legX = bodyStartX + (i + 0.5) * (bodyWidth / nLegs);
                const phaseOffset = (i % 2 === 0) ? 0 : Math.PI;  // alternating phase
                const legAngle = angle + phaseOffset;
                const flip = i % 2 === 0;

                const leg = solveKlannLeg(legAngle, legX, bodyY, scale, flip);
                if (!leg) continue;

                // Store foot trace
                footTraces[i].push({x: leg.foot.x, y: leg.foot.y});
                if (footTraces[i].length > 300) footTraces[i].shift();

                // Draw foot trace
                if (footTraces[i].length > 1) {
                    for (let j = 1; j < footTraces[i].length; j++) {
                        const a = j / footTraces[i].length;
                        ctx.beginPath();
                        ctx.moveTo(footTraces[i][j-1].x, footTraces[i][j-1].y);
                        ctx.lineTo(footTraces[i][j].x, footTraces[i][j].y);
                        ctx.strokeStyle = `rgba(221, 161, 94, ${a * 0.5})`;
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }
                }

                // Draw leg linkages
                // Crank
                drawLink(legX, bodyY, leg.crankEnd.x, leg.crankEnd.y, '#8A9A5B', 4);

                // Coupler (upper leg)
                drawLink(leg.crankEnd.x, leg.crankEnd.y, leg.rockerEnd.x, leg.rockerEnd.y, '#DDA15E', 3);

                // Rocker
                drawLink(leg.rockerPivot.x, leg.rockerPivot.y, leg.rockerEnd.x, leg.rockerEnd.y, '#606C38', 3);

                // Lower leg
                drawLink(leg.rockerEnd.x, leg.rockerEnd.y, leg.foot.x, leg.foot.y, '#DDA15E', 4);

                // Joints
                drawJoint(legX, bodyY, 5, '#606C38');
                drawJoint(leg.rockerPivot.x, leg.rockerPivot.y, 4, '#606C38');
                drawJoint(leg.crankEnd.x, leg.crankEnd.y, 4, '#8A9A5B');
                drawJoint(leg.rockerEnd.x, leg.rockerEnd.y, 4, '#8A9A5B');

                // Foot
                ctx.beginPath();
                ctx.arc(leg.foot.x, leg.foot.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#DDA15E';
                ctx.fill();
                ctx.strokeStyle = '#FEFAE0';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Leg number
                ctx.font = '11px Segoe UI';
                ctx.fillStyle = '#8A9A5B';
                ctx.textAlign = 'center';
                ctx.fillText('L' + (i+1), legX, bodyY - 22);
            }

            // Title
            ctx.font = '14px Segoe UI';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('Klann Walking Mechanism', W/2, 40);
            ctx.font = '12px Segoe UI';
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText(nLegs + ' legs, alternating phase for stable gait', W/2, 58);

            // Phase diagram
            const pdX = 50, pdY = H - 100, pdR = 30;
            ctx.beginPath();
            ctx.arc(pdX, pdY, pdR, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.fillStyle = '#8A9A5B';
            ctx.font = '10px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText('Crank phase', pdX, pdY + pdR + 14);

            const dotX = pdX + pdR * 0.8 * Math.cos(angle);
            const dotY = pdY + pdR * 0.8 * Math.sin(angle);
            ctx.beginPath();
            ctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();
        }

        animate();

        window.reset = function() {
            angle = 0;
            footTraces = [];
            paused = false;
        };
    })();
    </script>
</body>
</html>
