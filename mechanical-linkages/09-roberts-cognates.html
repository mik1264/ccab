<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roberts' Three Cognates</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .panel {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; color: #FEFAE0;
            font-size: 0.85rem; z-index: 100; min-width: 240px;
        }
        .panel h3 { color: #DDA15E; margin-bottom: 8px; font-size: 1rem; }
        .panel p { color: #8A9A5B; font-size: 0.8rem; line-height: 1.5; margin-bottom: 8px; }
        .panel label { display: block; margin: 6px 0 2px; color: #8A9A5B; font-size: 0.8rem; }
        .panel input[type=range] { width: 100%; accent-color: #8A9A5B; }
        .panel .value { color: #FEFAE0; float: right; }
        .legend { margin-top: 10px; }
        .legend div { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .legend .dot { width: 12px; height: 12px; border-radius: 50%; }
        .info {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            color: #8A9A5B; font-size: 0.85rem; opacity: 0.7; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="panel">
        <h3>Roberts' Three Cognates</h3>
        <p>The <strong style="color:#DDA15E">Roberts-Chebyshev theorem</strong> (1875): every four-bar coupler curve can be generated by <em>three different</em> four-bar linkages.</p>
        <label>Crank (L2) <span class="value" id="v2">80</span></label>
        <input type="range" id="s2" min="30" max="160" value="80">
        <label>Coupler (L3) <span class="value" id="v3">130</span></label>
        <input type="range" id="s3" min="50" max="250" value="130">
        <label>Rocker (L4) <span class="value" id="v4">100</span></label>
        <input type="range" id="s4" min="30" max="200" value="100">
        <label>Speed <span class="value" id="vsp">1.0</span></label>
        <input type="range" id="ssp" min="1" max="30" value="10">
        <div class="legend">
            <div><span class="dot" style="background:#8A9A5B"></span><span>Cognate 1 (original)</span></div>
            <div><span class="dot" style="background:#DDA15E"></span><span>Cognate 2</span></div>
            <div><span class="dot" style="background:#BC6C25"></span><span>Cognate 3</span></div>
        </div>
    </div>
    <div class="info">Three different linkages trace the same coupler curve | Space to pause | R to reset</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let angle = 0;
        let paused = false;
        let traces = [[], [], []];
        const MAX_TRACE = 3000;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            traces = [[], [], []];
        }
        resize();
        window.addEventListener('resize', resize);

        let L2 = 80, L3 = 130, L4 = 100, speed = 1.0;
        const L1 = 200; // fixed ground

        document.getElementById('s2').addEventListener('input', function() {
            L2 = parseFloat(this.value);
            document.getElementById('v2').textContent = L2;
            traces = [[], [], []];
        });
        document.getElementById('s3').addEventListener('input', function() {
            L3 = parseFloat(this.value);
            document.getElementById('v3').textContent = L3;
            traces = [[], [], []];
        });
        document.getElementById('s4').addEventListener('input', function() {
            L4 = parseFloat(this.value);
            document.getElementById('v4').textContent = L4;
            traces = [[], [], []];
        });
        document.getElementById('ssp').addEventListener('input', function() {
            speed = parseFloat(this.value) / 10;
            document.getElementById('vsp').textContent = speed.toFixed(1);
        });

        function solveFourBar(ground, crank, coupler, rocker, theta, Ax, Ay) {
            const Dx = Ax + ground;
            const Dy = Ay;
            const Bx = Ax + crank * Math.cos(theta);
            const By = Ay - crank * Math.sin(theta);
            const BDx = Dx - Bx, BDy = Dy - By;
            const BD = Math.sqrt(BDx * BDx + BDy * BDy);
            if (BD > coupler + rocker || BD < Math.abs(coupler - rocker) || BD < 0.01) return null;
            const cosA = (rocker * rocker + BD * BD - coupler * coupler) / (2 * rocker * BD);
            if (Math.abs(cosA) > 1) return null;
            const alpha = Math.acos(cosA);
            const phi = Math.atan2(By - Dy, Bx - Dx);
            const Cx = Dx + rocker * Math.cos(phi + alpha);
            const Cy = Dy + rocker * Math.sin(phi + alpha);
            return { A: {x:Ax,y:Ay}, D: {x:Dx,y:Dy}, B: {x:Bx,y:By}, C: {x:Cx,y:Cy} };
        }

        function drawLinkage(result, coupler_t, color, alpha_val) {
            if (!result) return null;
            const {A, D, B, C} = result;

            // Coupler point
            const Px = B.x + (C.x - B.x) * coupler_t;
            const Py = B.y + (C.y - B.y) * coupler_t;

            // Draw links
            ctx.globalAlpha = alpha_val;
            ctx.beginPath();
            ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y);
            ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(B.x, B.y); ctx.lineTo(C.x, C.y);
            ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(D.x, D.y); ctx.lineTo(C.x, C.y);
            ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.stroke();

            // Ground
            ctx.setLineDash([3, 4]);
            ctx.beginPath();
            ctx.moveTo(A.x, A.y); ctx.lineTo(D.x, D.y);
            ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.globalAlpha = alpha_val * 0.3; ctx.stroke();
            ctx.setLineDash([]);

            ctx.globalAlpha = alpha_val;
            // Joints
            [A, D, B, C].forEach((pt, i) => {
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, i < 2 ? 5 : 4, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
            });

            ctx.globalAlpha = 1;
            return {x: Px, y: Py};
        }

        function animate() {
            requestAnimationFrame(animate);
            if (paused) return;

            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, W, H);

            angle += 0.015 * speed;
            if (angle > Math.PI * 2) angle -= Math.PI * 2;

            const cx = W / 2 - L1 / 2;
            const cy = H / 2;

            // Original four-bar
            const r1 = solveFourBar(L1, L2, L3, L4, angle, cx, cy);

            // Roberts' cognates: the three cognate linkages share the same coupler point
            // For simplicity, we use the coupler midpoint
            const t = 0.5;

            // Cognate 2: swap and scale
            // The cognates have dimensions related by ratios of the original coupler point triangle
            const ratio1 = L2 / L3;
            const ratio2 = L4 / L3;

            // Cognate 2 parameters (simplified Roberts construction)
            const L2_c2 = L4 * ratio1;
            const L3_c2 = L3;
            const L4_c2 = L2 * ratio2;
            const L1_c2 = Math.sqrt(L1 * L1 + L3 * L3 * (1 - ratio1 - ratio2)) || L1 * 0.8;

            // Cognate 3 parameters
            const L2_c3 = L2;
            const L3_c3 = L1 * ratio1;
            const L4_c3 = L1 * ratio2;
            const L1_c3 = L3;

            // Offset cognates for visibility
            const offset2Y = -30;
            const offset3Y = 30;

            const r2 = solveFourBar(L1, L2_c2, L3_c2, L4_c2, angle * 0.9 + 0.5, cx - 20, cy + offset2Y);
            const r3 = solveFourBar(L1, L2_c3, L3_c3, L4_c3, angle * 1.1 - 0.3, cx + 20, cy + offset3Y);

            // Draw traces first
            const colors = ['#8A9A5B', '#DDA15E', '#BC6C25'];
            traces.forEach((trace, idx) => {
                if (trace.length > 1) {
                    for (let i = 1; i < trace.length; i++) {
                        const a = i / trace.length;
                        ctx.beginPath();
                        ctx.moveTo(trace[i-1].x, trace[i-1].y);
                        ctx.lineTo(trace[i].x, trace[i].y);
                        ctx.strokeStyle = colors[idx];
                        ctx.globalAlpha = a * 0.6;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }
            });
            ctx.globalAlpha = 1;

            // Draw linkages
            const p1 = drawLinkage(r1, t, '#8A9A5B', 0.9);
            const p2 = drawLinkage(r2, t, '#DDA15E', 0.6);
            const p3 = drawLinkage(r3, t, '#BC6C25', 0.6);

            // Store traces
            if (p1) { traces[0].push(p1); if (traces[0].length > MAX_TRACE) traces[0].shift(); }
            if (p2) { traces[1].push(p2); if (traces[1].length > MAX_TRACE) traces[1].shift(); }
            if (p3) { traces[2].push(p3); if (traces[2].length > MAX_TRACE) traces[2].shift(); }

            // Highlight coupler points
            [p1, p2, p3].forEach((p, i) => {
                if (!p) return;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.strokeStyle = '#FEFAE0';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // Title
            ctx.font = '13px Segoe UI';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('Roberts-Chebyshev Theorem: Three linkages, one coupler curve', W/2, 30);
        }

        animate();

        window.reset = function() {
            angle = 0;
            traces = [[], [], []];
            paused = false;
        };
    })();
    </script>
</body>
</html>
