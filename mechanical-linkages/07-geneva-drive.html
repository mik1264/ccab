<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geneva Drive - Intermittent Motion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .panel {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 16px; color: #FEFAE0;
            font-size: 0.85rem; z-index: 100; min-width: 220px;
        }
        .panel h3 { color: #DDA15E; margin-bottom: 8px; font-size: 1rem; }
        .panel p { color: #8A9A5B; font-size: 0.8rem; line-height: 1.5; margin-bottom: 8px; }
        .panel label { display: block; margin: 6px 0 2px; color: #8A9A5B; font-size: 0.8rem; }
        .panel input[type=range] { width: 100%; accent-color: #8A9A5B; }
        .panel .value { color: #FEFAE0; float: right; }
        .panel select {
            width: 100%; padding: 6px; background: rgba(30,30,50,0.8); color: #FEFAE0;
            border: 1px solid #8A9A5B; border-radius: 6px; margin-top: 4px;
        }
        .info {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            color: #8A9A5B; font-size: 0.85rem; opacity: 0.7; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="panel">
        <h3>Geneva Drive</h3>
        <p>Converts continuous rotation into <strong style="color:#DDA15E">intermittent motion</strong>. Used in film projectors, watches, and indexing tables.</p>
        <label>Slots</label>
        <select id="slots">
            <option value="3">3 slots (Maltese cross)</option>
            <option value="4" selected>4 slots (standard)</option>
            <option value="5">5 slots</option>
            <option value="6">6 slots</option>
            <option value="8">8 slots</option>
        </select>
        <label>Speed <span class="value" id="vsp">1.0</span></label>
        <input type="range" id="ssp" min="1" max="30" value="10">
    </div>
    <div class="info">The driven wheel advances one slot per revolution of the drive wheel | Space to pause</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let driveAngle = 0;
        let drivenAngle = 0;
        let paused = false;
        let nSlots = 4;
        let speed = 1.0;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        document.getElementById('slots').addEventListener('change', function() {
            nSlots = parseInt(this.value);
            driveAngle = 0;
            drivenAngle = 0;
        });
        document.getElementById('ssp').addEventListener('input', function() {
            speed = parseFloat(this.value) / 10;
            document.getElementById('vsp').textContent = speed.toFixed(1);
        });

        function animate() {
            requestAnimationFrame(animate);
            if (paused) return;

            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const slotAngle = Math.PI * 2 / nSlots;
            // Distance between centers
            const R = Math.min(W, H) * 0.18; // drive wheel radius
            const r = R / Math.sin(Math.PI / nSlots); // center distance calculation
            const centerDist = R / Math.tan(Math.PI / nSlots) + R;
            // Actually for Geneva: d = R/sin(pi/n), pin radius = d*sin(pi/n) = R
            const d = R / Math.sin(Math.PI / nSlots);
            const drivenR = d * Math.cos(Math.PI / nSlots);

            const cx1 = W / 2 - centerDist * 0.4;
            const cy1 = H / 2;
            const cx2 = cx1 + d;
            const cy2 = cy1;

            driveAngle += 0.015 * speed;
            if (driveAngle > Math.PI * 2) driveAngle -= Math.PI * 2;

            // Pin position on drive wheel
            const pinX = cx1 + R * Math.cos(driveAngle);
            const pinY = cy1 + R * Math.sin(driveAngle);

            // Check if pin is in a slot
            const dpx = pinX - cx2;
            const dpy = pinY - cy2;
            const distToCenter = Math.sqrt(dpx * dpx + dpy * dpy);
            const angleToPin = Math.atan2(dpy, dpx);

            // Find nearest slot
            let inSlot = false;
            let bestSlot = 0;
            let bestDiff = Infinity;
            for (let i = 0; i < nSlots; i++) {
                const slotA = drivenAngle + i * slotAngle;
                let diff = angleToPin - slotA;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                if (Math.abs(diff) < bestDiff) {
                    bestDiff = Math.abs(diff);
                    bestSlot = i;
                }
            }

            // Drive the Geneva wheel when pin engages slot
            if (bestDiff < 0.3 && distToCenter < drivenR + R * 0.3) {
                inSlot = true;
                const targetSlotAngle = angleToPin - bestSlot * slotAngle;
                let adiff = targetSlotAngle - drivenAngle;
                while (adiff > Math.PI) adiff -= Math.PI * 2;
                while (adiff < -Math.PI) adiff += Math.PI * 2;

                // Geneva drive kinematics
                const alpha = driveAngle;
                const sinA = Math.sin(alpha);
                const cosA = Math.cos(alpha);
                drivenAngle = Math.atan2(-R * sinA, d - R * cosA);
                // Normalize to nearest slot position
                const nearestSlot = Math.round(drivenAngle / slotAngle) * slotAngle;
                // Blend based on engagement
            }

            // Draw drive wheel
            ctx.save();
            ctx.translate(cx1, cy1);
            ctx.rotate(driveAngle);

            // Drive wheel body
            ctx.beginPath();
            ctx.arc(0, 0, R * 0.85, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(138,154,91,0.15)';
            ctx.fill();
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Half-moon blocker
            ctx.beginPath();
            ctx.arc(0, 0, R * 0.85, -0.4, 0.4);
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#606C38';
            ctx.stroke();

            // Pin
            ctx.beginPath();
            ctx.arc(R, 0, 8, 0, Math.PI * 2);
            ctx.fillStyle = inSlot ? '#DDA15E' : '#8A9A5B';
            ctx.fill();
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Decorative spokes
            for (let i = 0; i < 4; i++) {
                const a = i * Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(12 * Math.cos(a), 12 * Math.sin(a));
                ctx.lineTo((R * 0.7) * Math.cos(a), (R * 0.7) * Math.sin(a));
                ctx.strokeStyle = 'rgba(138,154,91,0.2)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            ctx.restore();

            // Draw driven wheel (Geneva wheel)
            ctx.save();
            ctx.translate(cx2, cy2);

            // Driven wheel body
            ctx.beginPath();
            ctx.arc(0, 0, drivenR, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(221,161,94,0.1)';
            ctx.fill();
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Draw slots
            ctx.rotate(drivenAngle);
            for (let i = 0; i < nSlots; i++) {
                const a = i * slotAngle;
                ctx.save();
                ctx.rotate(a);

                // Slot groove
                ctx.beginPath();
                ctx.moveTo(15, -6);
                ctx.lineTo(drivenR + 10, -6);
                ctx.lineTo(drivenR + 10, 6);
                ctx.lineTo(15, 6);
                ctx.closePath();
                ctx.fillStyle = 'rgba(26,26,46,0.8)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(221,161,94,0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Slot number
                ctx.fillStyle = 'rgba(221,161,94,0.4)';
                ctx.font = '11px Segoe UI';
                ctx.textAlign = 'center';
                ctx.fillText((i+1).toString(), drivenR * 0.55, 4);

                ctx.restore();
            }

            // Inner circle / locking disk cutout
            for (let i = 0; i < nSlots; i++) {
                const a1 = i * slotAngle + 0.2;
                const a2 = (i + 1) * slotAngle - 0.2;
                ctx.beginPath();
                ctx.arc(0, 0, R * 0.85, a1, a2);
                ctx.strokeStyle = 'rgba(221,161,94,0.3)';
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            ctx.restore();

            // Draw center joints
            ctx.beginPath();
            ctx.arc(cx1, cy1, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#606C38';
            ctx.fill();
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx2, cy2, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Labels
            ctx.font = '13px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText('Drive wheel', cx1, cy1 + R + 30);
            ctx.fillText('(continuous)', cx1, cy1 + R + 46);
            ctx.fillStyle = '#DDA15E';
            ctx.fillText('Geneva wheel', cx2, cy2 + drivenR + 30);
            ctx.fillText('(intermittent)', cx2, cy2 + drivenR + 46);

            // Status
            ctx.font = '14px Segoe UI';
            ctx.fillStyle = inSlot ? '#DDA15E' : '#606C38';
            ctx.textAlign = 'center';
            ctx.fillText(inSlot ? 'ENGAGED' : 'LOCKED', W/2, H - 60);

            // Direction arrows
            ctx.save();
            ctx.translate(cx1, cy1 - R - 20);
            ctx.beginPath();
            ctx.moveTo(-15, 5);
            ctx.lineTo(0, -5);
            ctx.lineTo(15, 5);
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
        }

        animate();

        window.reset = function() {
            driveAngle = 0;
            drivenAngle = 0;
            paused = false;
        };
    })();
    </script>
</body>
</html>
