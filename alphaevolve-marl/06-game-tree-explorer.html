<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuhn Poker Game Tree Explorer - CCAB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0e1a;
            color: #e0ddd5;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        a.back-link {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 1000;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            padding: 6px 14px;
            background: rgba(15,20,35,0.85);
            border: 1px solid rgba(100,116,139,0.25);
            border-radius: 8px;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        a.back-link:hover { color: #fbbf24; border-color: rgba(251,191,36,0.4); }

        .title-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 48px;
            background: rgba(10,14,26,0.92);
            border-bottom: 1px solid rgba(100,116,139,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 900;
            backdrop-filter: blur(12px);
        }
        .title-bar h1 {
            font-size: 15px;
            font-weight: 600;
            color: #e8e6e1;
            letter-spacing: 0.3px;
        }
        .title-bar h1 span { color: #fbbf24; }

        /* Layout */
        .app-layout {
            display: grid;
            grid-template-columns: 300px 1fr 320px;
            grid-template-rows: 48px 1fr 200px;
            width: 100vw;
            height: 100vh;
        }

        .panel {
            background: rgba(15,20,35,0.9);
            border: 1px solid rgba(100,116,139,0.12);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #334155 transparent;
        }
        .panel::-webkit-scrollbar { width: 5px; }
        .panel::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        /* Left Panel */
        .left-panel {
            grid-column: 1;
            grid-row: 2;
            border-right: 1px solid rgba(100,116,139,0.15);
            padding: 16px;
        }

        /* Main Canvas Area */
        .main-area {
            grid-column: 2;
            grid-row: 2;
            position: relative;
            overflow: hidden;
        }
        #treeCanvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        #treeCanvas.grabbing { cursor: grabbing; }

        /* Right Panel */
        .right-panel {
            grid-column: 3;
            grid-row: 2;
            border-left: 1px solid rgba(100,116,139,0.15);
            padding: 16px;
        }

        /* Bottom Panel */
        .bottom-panel {
            grid-column: 1 / -1;
            grid-row: 3;
            border-top: 1px solid rgba(100,116,139,0.15);
            padding: 14px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Panel Headers */
        .panel-header {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #94a3b8;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(100,116,139,0.15);
        }

        /* Info Set Inspector */
        .info-set-card {
            background: rgba(30,41,59,0.5);
            border: 1px solid rgba(100,116,139,0.15);
            border-radius: 10px;

        }
        .info-set-card h4 {

        .info-set-card .detail {
            font-size: 12px;
            color: #94a3b8;

        }
        .info-set-card .detail b { color: #cbd5e1; }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
        }
        .slider-row label {
            font-size: 12px;
            color: #94a3b8;
            min-width: 44px;
        }
        .slider-row input[type=range] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #1e293b;
            border-radius: 2px;
            outline: none;
        }
        .slider-row input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;

            color: #fbbf24;

            font-family: 'Courier New', monospace;
        }

        /* Strategy bars */
        .strat-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 5px 0;
            font-size: 11px;
        }
        .strat-label {
            min-width: 40px;

        }
        .strat-bar-bg {
            flex: 1;
            height: 16px;
            background: rgba(30,41,59,0.6);

        }
        .strat-bar-fill {

        .strat-bar-nash {
            position: absolute;

        .show-nash .strat-bar-nash { opacity: 0.8; }
        .strat-val {
            min-width: 30px;
            text-align: right;
            color: #cbd5e1;

        }
        .strat-group {
            background: rgba(30,41,59,0.35);
            border: 1px solid rgba(100,116,139,0.1);
            border-radius: 8px;

        }
        .strat-group-header {

            justify-content: space-between;

        }
        .strat-group-header .is-name {

        }
        .strat-group-header .player-tag {

        }
        .p1-tag { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .p2-tag { background: rgba(239,68,68,0.2); color: #f87171; }
        .deviation-badge {
            font-size: 10px;
            color: #f87171;
            background: rgba(239,68,68,0.1);

        /* Bottom panel controls */
        .bottom-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 6px 16px;
            border: 1px solid rgba(100,116,139,0.3);
            background: rgba(30,41,59,0.6);
            color: #e0ddd5;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn:hover { border-color: #fbbf24; color: #fbbf24; }
        .btn.active { background: rgba(251,191,36,0.15); border-color: #fbbf24; color: #fbbf24; }
        .btn.primary {
            background: rgba(59,130,246,0.2);

        }
        .btn.primary:hover { background: rgba(59,130,246,0.3); }
        .btn.running {
            background: rgba(239,68,68,0.2);
            border-color: rgba(239,68,68,0.4);

        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #94a3b8;
        }
        .speed-control input[type=range] {
            width: 80px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: #1e293b;
            border-radius: 2px;
        }
        .speed-control input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #60a5fa;
            cursor: pointer;
        }

        .stat-pill {
            font-size: 12px;
            color: #94a3b8;
            padding: 4px 10px;
            background: rgba(30,41,59,0.5);
            border-radius: 6px;
            border: 1px solid rgba(100,116,139,0.1);
        }
        .stat-pill b { color: #fbbf24; font-family: 'Courier New', monospace; }

        /* Sparkline area */
        .sparklines-area {
            display: flex;
            gap: 6px;

        }
        .sparkline-card {
            min-width: 100px;
            background: rgba(30,41,59,0.35);
            border: 1px solid rgba(100,116,139,0.1);

            flex-shrink: 0;
        }
        .sparkline-card .sp-label {
            font-size: 10px;
            color: #94a3b8;
            font-family: 'Courier New', monospace;
            margin-bottom: 3px;
        }
        .sparkline-card canvas {
            display: block;
            width: 84px;
            height: 30px;
        }

        /* Tooltip */
        #tooltip {
            position: fixed;
            pointer-events: none;
            background: rgba(15,20,35,0.95);
            border: 1px solid rgba(251,191,36,0.3);
            border-radius: 8px;

        #tooltip .tt-label { color: #94a3b8; }

        /* Zoom indicator */
        .zoom-indicator {

        }

        .no-select { user-select: none; }

        .empty-state {

        }

        .regret-bar-bg {

        /* Responsive */
        @media (max-width: 1100px) {

            .left-panel, .right-panel { display: none; }

            .bottom-panel { grid-column: 1; }
        }

</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>

    <div class="app-layout no-select">
        <div class="title-bar">
            <h1><span>Kuhn Poker</span> &mdash; Game Tree Explorer &amp; CFR Solver</h1>
        </div>

        <div class="left-panel panel" id="leftPanel">
            <div class="panel-header">Information Set Inspector</div>
            <div id="infoSetInspector">
                <div class="empty-state">Click a node in the game tree to inspect its information set.</div>
            </div>
        </div>

        <div class="main-area" id="mainArea">
            <canvas id="treeCanvas"></canvas>
            <div class="zoom-indicator" id="zoomIndicator">100%</div>
        </div>

        <div class="right-panel panel" id="rightPanel">
            <div class="panel-header">Strategy Profile</div>
            <div style="margin-bottom:10px;">
                <button class="btn" id="btnNash" onclick="toggleNash()">Show Nash</button>
                <span class="stat-pill" style="margin-left:6px;">Exploit: <b id="exploitVal">--</b></span>
            </div>
            <div id="strategyProfile"></div>
        </div>

        <div class="bottom-panel panel">
            <div class="bottom-controls">
                <button class="btn primary" id="btnCFR" onclick="toggleCFR()">Run CFR</button>
                <button class="btn" onclick="resetStrategies()">Reset</button>
                <div class="speed-control">
                    <span>Speed:</span>
                    <input type="range" id="speedSlider" min="1" max="100" value="20">
                </div>
                <span class="stat-pill">Iteration: <b id="iterVal">0</b></span>
                <span class="stat-pill">Exploitability: <b id="exploitBottom">--</b></span>
            </div>
            <div class="sparklines-area" id="sparklinesArea"></div>
        </div>
    </div>

    <div id="tooltip"></div>

    <script>
    // ========================================================================
    // KUHN POKER GAME TREE & CFR IMPLEMENTATION
    // ========================================================================

    const CARDS = ['J', 'Q', 'K'];
    const CARD_RANK = { J: 0, Q: 1, K: 2 };

    // All 6 possible deals: [p1card, p2card]
    const DEALS = [];
    for (let i = 0; i < 3; i++)
        for (let j = 0; j < 3; j++)
            if (i !== j) DEALS.push([CARDS[i], CARDS[j]]);

    // ---- Information Sets ----
    // Key format: "<card><history>" e.g., "J", "Jcb", "Qb"
    // P1 info sets: J, Q, K (first action), Jcb, Qcb, Kcb (after check-bet)
    // P2 info sets: Jc, Qc, Kc (after check), Jb, Qb, Kb (after bet)

    const INFO_SETS = {};

    function getInfoSetKey(card, history) {
        return card + history;
    }

    function getActions(history) {
        const len = history.length;
        if (len === 0) return ['c', 'b'];         // P1: check or bet
        if (history === 'c') return ['c', 'b'];    // P2 after check: check or bet
        if (history === 'b') return ['f', 'c'];    // P2 after bet: fold or call
        if (history === 'cb') return ['f', 'c'];   // P1 after check-bet: fold or call
        return [];
    }

    function getActionLabels(history) {
        const len = history.length;
        if (len === 0) return ['Check', 'Bet'];
        if (history === 'c') return ['Check', 'Bet'];
        if (history === 'b') return ['Fold', 'Call'];
        if (history === 'cb') return ['Fold', 'Call'];
        return [];
    }

    function isTerminal(history) {
        return history === 'cc' || history === 'bc' || history === 'bf' ||
               history === 'cbc' || history === 'cbf';
    }

    function getPayoff(p1card, p2card, history) {
        const p1rank = CARD_RANK[p1card];
        const p2rank = CARD_RANK[p2card];
        const p1wins = p1rank > p2rank;

        switch (history) {
            case 'cc':   // check-check: showdown for 1
                return p1wins ? 1 : -1;
            case 'bc':   // bet-call: showdown for 2
                return p1wins ? 2 : -2;
            case 'bf':   // bet-fold: P1 wins ante
                return 1;
            case 'cbc':  // check-bet-call: showdown for 2
                return p1wins ? 2 : -2;
            case 'cbf':  // check-bet-fold: P2 wins ante
                return -1;
            default:
                return 0;
        }
    }

    function currentPlayer(history) {
        // P1 acts at positions 0, 2; P2 at position 1
        const len = history.length;
        if (len === 0 || len === 2) return 0; // P1
        if (len === 1) return 1; // P2
        return -1;
    }

    // ---- CFR Data Structures ----
    class InfoSet {
        constructor(key, actions, actionLabels, player) {
            this.key = key;
            this.actions = actions;
            this.actionLabels = actionLabels;
            this.player = player;
            this.regretSum = new Array(actions.length).fill(0);
            this.strategySum = new Array(actions.length).fill(0);
            this.strategy = new Array(actions.length).fill(1 / actions.length);
            this.cfValue = 0;
            this.history = []; // sparkline history for strategy[0]
        }

        getStrategy(realizationWeight) {
            let sum = 0;
            const strat = new Array(this.actions.length);
            for (let i = 0; i < this.actions.length; i++) {
                strat[i] = Math.max(0, this.regretSum[i]);
                sum += strat[i];
            }
            for (let i = 0; i < this.actions.length; i++) {
                if (sum > 0) {
                    strat[i] /= sum;
                } else {
                    strat[i] = 1.0 / this.actions.length;
                }
                this.strategySum[i] += realizationWeight * strat[i];
            }
            this.strategy = strat;
            return strat;
        }

        getAverageStrategy() {
            const avg = new Array(this.actions.length);
            let sum = 0;
            for (let i = 0; i < this.actions.length; i++) sum += this.strategySum[i];
            for (let i = 0; i < this.actions.length; i++) {
                avg[i] = sum > 0 ? this.strategySum[i] / sum : 1.0 / this.actions.length;
            }
            return avg;
        }
    }

    function getOrCreateInfoSet(card, history) {
        const key = getInfoSetKey(card, history);
        if (!INFO_SETS[key]) {
            const actions = getActions(history);
            const labels = getActionLabels(history);
            const player = currentPlayer(history);
            INFO_SETS[key] = new InfoSet(key, actions, labels, player);
        }
        return INFO_SETS[key];
    }

    // Initialize all info sets
    function initInfoSets() {
        for (const card of CARDS) {
            getOrCreateInfoSet(card, '');       // P1 first action
            getOrCreateInfoSet(card, 'c');      // P2 after check
            getOrCreateInfoSet(card, 'b');      // P2 after bet
            getOrCreateInfoSet(card, 'cb');     // P1 after check-bet
        }
    }

    // ---- CFR Algorithm ----
    function cfr(p1card, p2card, history, p1reach, p2reach) {
        if (isTerminal(history)) {
            return getPayoff(p1card, p2card, history);
        }

        const player = currentPlayer(history);
        const card = player === 0 ? p1card : p2card;
        const is = getOrCreateInfoSet(card, history);
        const actions = is.actions;
        const strat = is.getStrategy(player === 0 ? p1reach : p2reach);

        const actionUtils = new Array(actions.length).fill(0);
        let nodeUtil = 0;

        for (let i = 0; i < actions.length; i++) {
            const nextHistory = history + actions[i];
            if (player === 0) {
                actionUtils[i] = -cfr(p1card, p2card, nextHistory, p1reach * strat[i], p2reach);
            } else {
                actionUtils[i] = -cfr(p1card, p2card, nextHistory, p1reach, p2reach * strat[i]);
            }
            nodeUtil += strat[i] * actionUtils[i];
        }

        // Update regrets
        const oppReach = player === 0 ? p2reach : p1reach;
        for (let i = 0; i < actions.length; i++) {
            is.regretSum[i] += oppReach * (actionUtils[i] - nodeUtil);
        }

        is.cfValue = nodeUtil;
        return nodeUtil;
    }

    function runCFRIteration() {
        let totalUtil = 0;
        for (const deal of DEALS) {
            totalUtil += cfr(deal[0], deal[1], '', 1, 1);
        }
        return totalUtil / DEALS.length;
    }

    // ---- Nash Equilibrium (known solution) ----
    const NASH = {
        'J':   [2/3, 1/3],    // Check 2/3, Bet 1/3 (bluff)
        'Q':   [1, 0],        // Always check
        'K':   [2/3, 1/3],    // Check 2/3, Bet 1/3
        'Jc':  [2/3, 1/3],    // Check 2/3, Bet 1/3
        'Qc':  [1, 0],        // Always check
        'Kc':  [0, 1],        // Always bet
        'Jb':  [1, 0],        // Always fold
        'Qb':  [2/3, 1/3],    // Fold 2/3, Call 1/3
        'Kb':  [0, 1],        // Always call
        'Jcb': [1, 0],        // Always fold
        'Qcb': [2/3, 1/3],    // Fold 2/3, Call 1/3
        'Kcb': [0, 1],        // Always call
    };

    // ---- Exploitability Calculation ----
    function computeBestResponse(brPlayer, opStrats, p1card, p2card, history, prob) {
        if (isTerminal(history)) {
            const payoff = getPayoff(p1card, p2card, history);
            return brPlayer === 0 ? payoff * prob : -payoff * prob;
        }

        const player = currentPlayer(history);
        const card = player === 0 ? p1card : p2card;
        const key = getInfoSetKey(card, history);
        const actions = getActions(history);

        if (player === brPlayer) {
            // Best response: pick max action
            let bestVal = -Infinity;
            for (let i = 0; i < actions.length; i++) {
                const val = computeBestResponse(brPlayer, opStrats, p1card, p2card,
                    history + actions[i], prob);
                bestVal = Math.max(bestVal, val);
            }
            return bestVal;
        } else {
            // Opponent plays according to opStrats
            const strat = opStrats[key] || new Array(actions.length).fill(1 / actions.length);
            let val = 0;
            for (let i = 0; i < actions.length; i++) {
                val += strat[i] * computeBestResponse(brPlayer, opStrats, p1card, p2card,
                    history + actions[i], prob);
            }
            return val;
        }
    }

    function computeExploitability() {
        // Get average strategies
        const avgStrats = {};
        for (const key in INFO_SETS) {
            avgStrats[key] = INFO_SETS[key].getAverageStrategy();
        }

        let exploit = 0;
        for (const deal of DEALS) {
            // BR for P1 against P2's strategy
            exploit += computeBestResponse(0, avgStrats, deal[0], deal[1], '', 1.0 / DEALS.length);
            // BR for P2 against P1's strategy
            exploit += computeBestResponse(1, avgStrats, deal[0], deal[1], '', 1.0 / DEALS.length);
        }
        return Math.max(0, exploit);
    }

    // ========================================================================
    // GAME TREE VISUAL STRUCTURE
    // ========================================================================

    // Build the tree for visualization
    // Each node: { type, player, card?, history, children, payoff?, x, y, infoSetKey? }

    const TREE_NODES = [];
    const TREE_EDGES = [];

    function buildVisualTree() {
        TREE_NODES.length = 0;
        TREE_EDGES.length = 0;

        // Root chance node
        const root = {
            id: 0,
            type: 'chance',
            label: 'Deal',
            history: '',
            x: 0, y: 0,
            children: [],
            depth: 0
        };
        TREE_NODES.push(root);

        let nextId = 1;

        // For each deal, build subtree
        // We group by P1's card for visual clarity
        const p1Cards = ['J', 'Q', 'K'];
        const xSpacing = 520;
        const startX = -(p1Cards.length - 1) * xSpacing / 2;

        for (let ci = 0; ci < p1Cards.length; ci++) {
            const p1card = p1Cards[ci];
            // P1's decision node
            const p1node = {
                id: nextId++,
                type: 'player',
                player: 0,
                card: p1card,
                history: '',
                infoSetKey: p1card,
                label: `P1: ${p1card}`,
                x: startX + ci * xSpacing,
                y: 100,
                children: [],
                depth: 1
            };
            TREE_NODES.push(p1node);
            TREE_EDGES.push({
                from: root.id, to: p1node.id,
                label: p1card,
                actionIndex: -1
            });
            root.children.push(p1node.id);

            // P1 actions: check, bet
            const p1actions = ['c', 'b'];
            const p1labels = ['Check', 'Bet'];
            const subSpacing = 220;

            for (let ai = 0; ai < 2; ai++) {
                const act = p1actions[ai];
                const h1 = act;

                // After P1 acts, P2 sees the action but not P1's card
                // We need P2's card. For the visual tree, we show grouped by P1 card
                // but P2 has a different card. For a compact tree, we show the info-set perspective.

                // P2 decision node (one per P1 card + P1 action combo, showing P2's info set)
                const p2cards = CARDS.filter(c => c !== p1card);

                const p2baseX = p1node.x + (ai === 0 ? -subSpacing/2 : subSpacing/2);

                // Show P2 as grouped info set node
                const p2node = {
                    id: nextId++,
                    type: 'player',
                    player: 1,
                    card: '?',
                    history: h1,
                    infoSetKey: null, // multiple info sets converge here visually
                    label: `P2 after ${p1labels[ai]}`,
                    x: p2baseX,
                    y: 240,
                    children: [],
                    depth: 2,
                    parentCard: p1card,
                    parentAction: act
                };
                TREE_NODES.push(p2node);
                TREE_EDGES.push({
                    from: p1node.id, to: p2node.id,
                    label: p1labels[ai],
                    actionIndex: ai,
                    infoSetKey: p1card,
                    history: ''
                });
                p1node.children.push(p2node.id);

                // P2 actions
                const p2actions = getActions(h1);
                const p2labels = getActionLabels(h1);

                for (let bi = 0; bi < p2actions.length; bi++) {
                    const act2 = p2actions[bi];
                    const h2 = h1 + act2;

                    if (isTerminal(h2)) {
                        // Terminal node
                        const tnode = {
                            id: nextId++,
                            type: 'terminal',
                            history: h2,
                            label: h2.toUpperCase(),
                            x: p2baseX + (bi === 0 ? -90 : 90),
                            y: 380,
                            payoffs: {},
                            depth: 3,
                            parentCard: p1card
                        };
                        // Calculate payoffs for each possible P2 card
                        for (const p2c of CARDS) {
                            if (p2c !== p1card) {
                                tnode.payoffs[p1card + p2c] = getPayoff(p1card, p2c, h2);
                            }
                        }
                        TREE_NODES.push(tnode);
                        TREE_EDGES.push({
                            from: p2node.id, to: tnode.id,
                            label: p2labels[bi],
                            actionIndex: bi,
                            infoSetKey: null,
                            history: h1
                        });
                        p2node.children.push(tnode.id);
                    } else {
                        // h2 = 'cb' => P1 decides again
                        const p1node2 = {
                            id: nextId++,
                            type: 'player',
                            player: 0,
                            card: p1card,
                            history: h2,
                            infoSetKey: p1card + h2,
                            label: `P1: ${p1card}`,
                            x: p2baseX + (bi === 0 ? -90 : 90),
                            y: 380,
                            children: [],
                            depth: 3,
                            parentCard: p1card
                        };
                        TREE_NODES.push(p1node2);
                        TREE_EDGES.push({
                            from: p2node.id, to: p1node2.id,
                            label: p2labels[bi],
                            actionIndex: bi,
                            infoSetKey: null,
                            history: h1
                        });
                        p2node.children.push(p1node2.id);

                        // P1 actions after check-bet
                        const p1a2 = getActions(h2);
                        const p1l2 = getActionLabels(h2);

                        for (let ci2 = 0; ci2 < p1a2.length; ci2++) {
                            const act3 = p1a2[ci2];
                            const h3 = h2 + act3;

                            const tnode2 = {
                                id: nextId++,
                                type: 'terminal',
                                history: h3,
                                label: h3.toUpperCase(),
                                x: p1node2.x + (ci2 === 0 ? -70 : 70),
                                y: 520,
                                payoffs: {},
                                depth: 4,
                                parentCard: p1card
                            };
                            for (const p2c of CARDS) {
                                if (p2c !== p1card) {
                                    tnode2.payoffs[p1card + p2c] = getPayoff(p1card, p2c, h3);
                                }
                            }
                            TREE_NODES.push(tnode2);
                            TREE_EDGES.push({
                                from: p1node2.id, to: tnode2.id,
                                label: p1l2[ci2],
                                actionIndex: ci2,
                                infoSetKey: p1card + h2,
                                history: h2
                            });
                            p1node2.children.push(tnode2.id);
                        }
                    }
                }
            }
        }
    }

    // ========================================================================
    // CANVAS RENDERING
    // ========================================================================

    const canvas = document.getElementById('treeCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, dpr;

    let panX = 0, panY = 0, zoom = 1;
    let dragging = false, dragStartX, dragStartY, dragPanX, dragPanY;
    let hoveredNode = null, hoveredEdge = null;
    let selectedNode = null;
    let showNash = false;
    let cfrRunning = false;
    let cfrInterval = null;
    let cfrIterations = 0;

    function resize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        dpr = window.devicePixelRatio || 1;
        W = rect.width;
        H = rect.height;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function worldToScreen(wx, wy) {
        return [wx * zoom + panX + W / 2, wy * zoom + panY + H / 2];
    }

    function screenToWorld(sx, sy) {
        return [(sx - panX - W / 2) / zoom, (sy - panY - H / 2) / zoom];
    }

    // Colors
    const COLORS = {
        bg: '#0a0e1a',
        chance: '#a855f7',
        chanceGlow: 'rgba(168,85,247,0.3)',
        p1: '#3B82F6',
        p1Glow: 'rgba(59,130,246,0.3)',
        p2: '#EF4444',
        p2Glow: 'rgba(239,68,68,0.3)',
        terminal: '#fbbf24',
        terminalNeg: '#64748b',
        edge: '#334155',
        edgeHover: '#fbbf24',
        text: '#e0ddd5',
        textDim: '#64748b',
        highlight: 'rgba(251,191,36,0.15)',
    };

    function getNodeColor(node) {
        if (node.type === 'chance') return COLORS.chance;
        if (node.type === 'terminal') return COLORS.terminal;
        return node.player === 0 ? COLORS.p1 : COLORS.p2;
    }

    function getNodeGlow(node) {
        if (node.type === 'chance') return COLORS.chanceGlow;
        if (node.type === 'terminal') return 'rgba(251,191,36,0.2)';
        return node.player === 0 ? COLORS.p1Glow : COLORS.p2Glow;
    }

    function drawTree() {
        ctx.clearRect(0, 0, W, H);

        // Draw edges first
        for (const edge of TREE_EDGES) {
            const fromNode = TREE_NODES[edge.from];
            const toNode = TREE_NODES.find(n => n.id === edge.to);
            if (!fromNode || !toNode) continue;

            const [x1, y1] = worldToScreen(fromNode.x, fromNode.y);
            const [x2, y2] = worldToScreen(toNode.x, toNode.y);

            // Get edge probability
            let prob = 0.5;
            let avgProb = 0.5;
            if (edge.infoSetKey && INFO_SETS[edge.infoSetKey] && edge.actionIndex >= 0) {
                const is = INFO_SETS[edge.infoSetKey];
                prob = is.strategy[edge.actionIndex];
                avgProb = is.getAverageStrategy()[edge.actionIndex];
            } else if (fromNode.type === 'chance') {
                prob = 1/3;
                avgProb = 1/3;
            } else if (edge.history && edge.actionIndex >= 0) {
                // P2 edges: show average across possible P2 cards
                const parentCard = toNode.parentCard || fromNode.parentCard;
                const p2cards = CARDS.filter(c => c !== parentCard);
                let sumProb = 0, sumAvg = 0;
                for (const p2c of p2cards) {
                    const key = p2c + edge.history;
                    if (INFO_SETS[key]) {
                        sumProb += INFO_SETS[key].strategy[edge.actionIndex];
                        sumAvg += INFO_SETS[key].getAverageStrategy()[edge.actionIndex];
                    } else {
                        sumProb += 0.5;
                        sumAvg += 0.5;
                    }
                }
                prob = sumProb / p2cards.length;
                avgProb = sumAvg / p2cards.length;
            }

            const displayProb = cfrIterations > 0 ? avgProb : prob;
            const isHovered = hoveredEdge && hoveredEdge.from === edge.from && hoveredEdge.to === edge.to;
            const isInSelectedInfoSet = selectedNode && edge.infoSetKey === selectedNode.infoSetKey;

            // Draw edge
            const lineWidth = Math.max(1, displayProb * 5) * zoom;
            const alpha = Math.max(0.15, displayProb * 0.8 + 0.2);

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            // Curved edges
            const midY = (y1 + y2) / 2;
            ctx.bezierCurveTo(x1, midY, x2, midY, x2, y2);
            ctx.strokeStyle = isHovered || isInSelectedInfoSet ?
                COLORS.edgeHover :
                `rgba(100,116,139,${alpha})`;
            ctx.lineWidth = isHovered ? lineWidth + 1 : lineWidth;
            ctx.stroke();

            // Edge label
            const labelX = (x1 + x2) / 2 + (x2 > x1 ? -20 : 20);
            const labelY = midY - 5;
            const fontSize = Math.max(9, 11 * zoom);
            ctx.font = `600 ${fontSize}px 'Segoe UI', sans-serif`;
            ctx.fillStyle = isHovered || isInSelectedInfoSet ? COLORS.edgeHover : '#94a3b8';
            ctx.textAlign = x2 > x1 ? 'right' : 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(edge.label, labelX, labelY);

            // Probability label on edge
            if (fromNode.type !== 'chance') {
                const probText = (displayProb * 100).toFixed(0) + '%';
                ctx.font = `500 ${Math.max(8, 9 * zoom)}px 'Courier New', monospace`;
                ctx.fillStyle = isHovered || isInSelectedInfoSet ?
                    '#fbbf24' : `rgba(148,163,184,${alpha})`;
                ctx.fillText(probText, labelX, labelY + fontSize);
            }
        }

        // Draw info set highlight
        if (selectedNode && selectedNode.infoSetKey) {
            for (const node of TREE_NODES) {
                if (node.infoSetKey === selectedNode.infoSetKey && node.id !== selectedNode.id) {
                    const [sx, sy] = worldToScreen(node.x, node.y);
                    ctx.beginPath();
                    const r = (node.type === 'terminal' ? 18 : 22) * zoom;
                    ctx.arc(sx, sy, r + 6 * zoom, 0, Math.PI * 2);
                    ctx.strokeStyle = '#fbbf24';
                    ctx.lineWidth = 2 * zoom;
                    ctx.setLineDash([4 * zoom, 4 * zoom]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }
        }

        // Draw nodes
        for (const node of TREE_NODES) {
            const [sx, sy] = worldToScreen(node.x, node.y);
            const color = getNodeColor(node);
            const glow = getNodeGlow(node);
            const isSelected = selectedNode && selectedNode.id === node.id;
            const isHovered = hoveredNode && hoveredNode.id === node.id;
            const isInInfoSet = selectedNode && selectedNode.infoSetKey &&
                node.infoSetKey === selectedNode.infoSetKey;

            // Glow
            if (isSelected || isHovered || isInInfoSet) {
                ctx.beginPath();
                const glowR = (node.type === 'chance' ? 28 : node.type === 'terminal' ? 22 : 26) * zoom;
                const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR);
                grad.addColorStop(0, isSelected ? 'rgba(251,191,36,0.4)' : glow);
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.arc(sx, sy, glowR, 0, Math.PI * 2);
                ctx.fill();
            }

            const r = (node.type === 'terminal' ? 16 : 20) * zoom;

            if (node.type === 'chance') {
                // Hexagon
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = Math.PI / 6 + i * Math.PI / 3;
                    const hx = sx + r * Math.cos(angle);
                    const hy = sy + r * Math.sin(angle);
                    if (i === 0) ctx.moveTo(hx, hy);
                    else ctx.lineTo(hx, hy);
                }
                ctx.closePath();
                ctx.fillStyle = isSelected ? '#c084fc' : color;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1.5 * zoom;
                ctx.stroke();
            } else if (node.type === 'terminal') {
                // Square with rounded corners
                const s = r * 0.85;
                const cr = 4 * zoom;
                ctx.beginPath();
                ctx.moveTo(sx - s + cr, sy - s);
                ctx.arcTo(sx + s, sy - s, sx + s, sy + s, cr);
                ctx.arcTo(sx + s, sy + s, sx - s, sy + s, cr);
                ctx.arcTo(sx - s, sy + s, sx - s, sy - s, cr);
                ctx.arcTo(sx - s, sy - s, sx + s, sy - s, cr);
                ctx.closePath();

                // Color based on average payoff
                let avgPayoff = 0;
                const payoffs = Object.values(node.payoffs || {});
                if (payoffs.length > 0) avgPayoff = payoffs.reduce((a, b) => a + b, 0) / payoffs.length;
                ctx.fillStyle = avgPayoff > 0 ? COLORS.terminal :
                    avgPayoff < 0 ? COLORS.terminalNeg : '#475569';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 1 * zoom;
                ctx.stroke();

                // Payoff text
                const payoffTexts = [];
                for (const key in (node.payoffs || {})) {
                    payoffTexts.push(`${key}: ${node.payoffs[key] > 0 ? '+' : ''}${node.payoffs[key]}`);
                }
                ctx.font = `500 ${Math.max(7, 8 * zoom)}px 'Courier New', monospace`;
                ctx.fillStyle = '#0a0e1a';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // Show history label
                ctx.fillText(node.label, sx, sy);
                // Show payoffs below
                ctx.fillStyle = '#94a3b8';
                ctx.font = `400 ${Math.max(7, 8 * zoom)}px 'Courier New', monospace`;
                for (let pi = 0; pi < payoffTexts.length; pi++) {
                    const pColor = node.payoffs[Object.keys(node.payoffs)[pi]] > 0 ? '#4ade80' : '#f87171';
                    ctx.fillStyle = pColor;
                    ctx.fillText(payoffTexts[pi], sx, sy + r + 8 * zoom + pi * 11 * zoom);
                }
            } else {
                // Circle for player nodes
                ctx.beginPath();
                ctx.arc(sx, sy, r, 0, Math.PI * 2);
                ctx.fillStyle = isSelected ? (node.player === 0 ? '#60a5fa' : '#f87171') : color;
                ctx.fill();
                ctx.strokeStyle = isSelected ? '#fbbf24' : 'rgba(255,255,255,0.15)';
                ctx.lineWidth = isSelected ? 2.5 * zoom : 1.5 * zoom;
                ctx.stroke();

                // Label
                ctx.font = `700 ${Math.max(9, 11 * zoom)}px 'Segoe UI', sans-serif`;
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(node.card || '?', sx, sy - 2 * zoom);

                ctx.font = `500 ${Math.max(7, 8 * zoom)}px 'Segoe UI', sans-serif`;
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillText(node.player === 0 ? 'P1' : 'P2', sx, sy + 8 * zoom);

                // Info set label above
                if (node.infoSetKey) {
                    ctx.font = `500 ${Math.max(8, 9 * zoom)}px 'Courier New', monospace`;
                    ctx.fillStyle = '#94a3b8';
                    ctx.fillText(`[${node.infoSetKey}]`, sx, sy - r - 6 * zoom);
                }
            }
        }

        // Draw legend
        drawLegend();
    }

    function drawLegend() {
        const lx = 10, ly = 10;
        ctx.font = '11px "Segoe UI", sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';

        const items = [
            { color: COLORS.chance, shape: 'hex', label: 'Chance (Deal)' },
            { color: COLORS.p1, shape: 'circle', label: 'Player 1' },
            { color: COLORS.p2, shape: 'circle', label: 'Player 2' },
            { color: COLORS.terminal, shape: 'square', label: 'Terminal (+)' },
            { color: COLORS.terminalNeg, shape: 'square', label: 'Terminal (-)' },
        ];

        ctx.fillStyle = 'rgba(10,14,26,0.8)';
        ctx.fillRect(lx, ly, 130, items.length * 22 + 10);

        for (let i = 0; i < items.length; i++) {
            const y = ly + 15 + i * 22;
            ctx.fillStyle = items[i].color;
            if (items[i].shape === 'circle') {
                ctx.beginPath();
                ctx.arc(lx + 14, y, 6, 0, Math.PI * 2);
                ctx.fill();
            } else if (items[i].shape === 'hex') {
                ctx.beginPath();
                for (let h = 0; h < 6; h++) {
                    const a = Math.PI / 6 + h * Math.PI / 3;
                    const px = lx + 14 + 7 * Math.cos(a);
                    const py = y + 7 * Math.sin(a);
                    h === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
            } else {
                ctx.fillRect(lx + 8, y - 6, 12, 12);
            }
            ctx.fillStyle = '#94a3b8';
            ctx.fillText(items[i].label, lx + 28, y);
        }
    }

    // ---- Hit Testing ----
    function hitTestNode(mx, my) {
        const [wx, wy] = screenToWorld(mx, my);
        for (let i = TREE_NODES.length - 1; i >= 0; i--) {
            const node = TREE_NODES[i];
            const dx = wx - node.x;
            const dy = wy - node.y;
            const r = node.type === 'terminal' ? 18 : 22;
            if (dx * dx + dy * dy < r * r) return node;
        }
        return null;
    }

    function hitTestEdge(mx, my) {
        const [wx, wy] = screenToWorld(mx, my);
        for (const edge of TREE_EDGES) {
            const from = TREE_NODES.find(n => n.id === edge.from);
            const to = TREE_NODES.find(n => n.id === edge.to);
            if (!from || !to) continue;

            // Approximate: check distance to line segment
            const dx = to.x - from.x;
            const dy = to.y - from.y;
            const len2 = dx * dx + dy * dy;
            if (len2 === 0) continue;
            let t = ((wx - from.x) * dx + (wy - from.y) * dy) / len2;
            t = Math.max(0, Math.min(1, t));
            const px = from.x + t * dx;
            const py = from.y + t * dy;
            const dist = Math.sqrt((wx - px) * (wx - px) + (wy - py) * (wy - py));
            if (dist < 15) return edge;
        }
        return null;
    }

    // ---- Mouse Events ----
    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const node = hitTestNode(mx, my);
        if (node) {
            selectNode(node);
            return;
        }

        dragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        dragPanX = panX;
        dragPanY = panY;
        canvas.classList.add('grabbing');
    });

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        if (dragging) {
            panX = dragPanX + (e.clientX - dragStartX);
            panY = dragPanY + (e.clientY - dragStartY);
            requestDraw();
            return;
        }

        const node = hitTestNode(mx, my);
        const edge = node ? null : hitTestEdge(mx, my);
        const changed = (hoveredNode !== node) || (hoveredEdge !== edge);
        hoveredNode = node;
        hoveredEdge = edge;

        if (changed) requestDraw();
        updateTooltip(e.clientX, e.clientY, node, edge);

        canvas.style.cursor = node ? 'pointer' : 'grab';
    });

    canvas.addEventListener('mouseup', () => {
        dragging = false;
        canvas.classList.remove('grabbing');
    });

    canvas.addEventListener('mouseleave', () => {
        dragging = false;
        hoveredNode = null;
        hoveredEdge = null;
        hideTooltip();
        requestDraw();
    });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const [wx, wy] = screenToWorld(mx, my);
        const factor = e.deltaY > 0 ? 0.9 : 1.1;
        const newZoom = Math.max(0.2, Math.min(3, zoom * factor));

        // Zoom toward mouse position
        panX = mx - W / 2 - wx * newZoom;
        panY = my - H / 2 - wy * newZoom;
        zoom = newZoom;

        document.getElementById('zoomIndicator').textContent = Math.round(zoom * 100) + '%';
        requestDraw();
    }, { passive: false });

    // Touch support
    let lastTouchDist = 0;
    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            const t = e.touches[0];
            dragStartX = t.clientX;
            dragStartY = t.clientY;
            dragPanX = panX;
            dragPanY = panY;
            dragging = true;
        } else if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            lastTouchDist = Math.sqrt(dx * dx + dy * dy);
        }
        e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1 && dragging) {
            const t = e.touches[0];
            panX = dragPanX + (t.clientX - dragStartX);
            panY = dragPanY + (t.clientY - dragStartY);
            requestDraw();
        } else if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (lastTouchDist > 0) {
                const factor = dist / lastTouchDist;
                zoom = Math.max(0.2, Math.min(3, zoom * factor));
                document.getElementById('zoomIndicator').textContent = Math.round(zoom * 100) + '%';
                requestDraw();
            }
            lastTouchDist = dist;
        }
        e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', () => {
        dragging = false;
        lastTouchDist = 0;
    });

    // ---- Tooltip ----
    const tooltip = document.getElementById('tooltip');

    function updateTooltip(cx, cy, node, edge) {
        if (!node && !edge) { hideTooltip(); return; }

        let html = '';
        if (node) {
            if (node.type === 'chance') {
                html = '<div class="tt-line"><span class="tt-label">Chance Node</span></div>' +
                       '<div class="tt-line">Deals 3 cards: J, Q, K</div>';
            } else if (node.type === 'terminal') {
                html = `<div class="tt-line"><span class="tt-label">Terminal:</span> <span class="tt-val">${node.label}</span></div>`;
                for (const key in (node.payoffs || {})) {
                    const p = node.payoffs[key];
                    html += `<div class="tt-line"><span class="tt-label">${key[0]}v${key[1]}:</span> <span class="tt-val" style="color:${p > 0 ? '#4ade80' : '#f87171'}">${p > 0 ? '+' : ''}${p}</span></div>`;
                }
            } else {
                const isKey = node.infoSetKey;
                html = `<div class="tt-line"><span class="tt-label">Player ${node.player + 1}</span> &mdash; Card: <span class="tt-val">${node.card}</span></div>`;
                if (isKey) {
                    html += `<div class="tt-line"><span class="tt-label">Info Set:</span> <span class="tt-val">${isKey}</span></div>`;
                    const is = INFO_SETS[isKey];
                    if (is) {
                        const avg = is.getAverageStrategy();
                        for (let i = 0; i < is.actions.length; i++) {
                            html += `<div class="tt-line"><span class="tt-label">${is.actionLabels[i]}:</span> <span class="tt-val">${(avg[i] * 100).toFixed(1)}%</span></div>`;
                        }
                    }
                }
            }
        } else if (edge) {
            html = `<div class="tt-line"><span class="tt-label">Action:</span> <span class="tt-val">${edge.label}</span></div>`;
            if (edge.infoSetKey && INFO_SETS[edge.infoSetKey]) {
                const is = INFO_SETS[edge.infoSetKey];
                const avg = is.getAverageStrategy();
                html += `<div class="tt-line"><span class="tt-label">Probability:</span> <span class="tt-val">${(avg[edge.actionIndex] * 100).toFixed(1)}%</span></div>`;
            }
        }

        tooltip.innerHTML = html;
        tooltip.style.display = 'block';
        tooltip.style.left = (cx + 15) + 'px';
        tooltip.style.top = (cy - 10) + 'px';

        // Keep in viewport
        const tr = tooltip.getBoundingClientRect();
        if (tr.right > window.innerWidth - 10) {
            tooltip.style.left = (cx - tr.width - 15) + 'px';
        }
        if (tr.bottom > window.innerHeight - 10) {
            tooltip.style.top = (cy - tr.height - 10) + 'px';
        }
    }

    function hideTooltip() {
        tooltip.style.display = 'none';
    }

    // ---- Node Selection & Info Set Inspector ----
    function selectNode(node) {
        selectedNode = node;
        updateInfoSetInspector(node);
        requestDraw();
    }

    function updateInfoSetInspector(node) {
        const panel = document.getElementById('infoSetInspector');

        if (!node || !node.infoSetKey) {
            let content = '<div class="empty-state">';
            if (node && node.type === 'chance') {
                content += 'Chance node: deals one card to each player from {J, Q, K}.<br><br>Each deal has probability 1/6.';
            } else if (node && node.type === 'terminal') {
                content += `<b style="color:#fbbf24">Terminal: ${node.label}</b><br><br>`;
                for (const key in (node.payoffs || {})) {
                    const p = node.payoffs[key];
                    content += `${key[0]} vs ${key[1]}: <span style="color:${p > 0 ? '#4ade80' : '#f87171'}">${p > 0 ? '+' : ''}${p}</span><br>`;
                }
                content += '<br>Payoffs shown from Player 1 perspective.';
            } else {
                content += 'Click a player node to inspect its information set.';
            }
            content += '</div>';
            panel.innerHTML = content;
            return;
        }

        const is = INFO_SETS[node.infoSetKey];
        if (!is) { panel.innerHTML = '<div class="empty-state">Info set not found.</div>'; return; }

        const avg = is.getAverageStrategy();
        const nash = NASH[node.infoSetKey] || [];

        let html = `<div class="info-set-card">
            <h4>Info Set: ${node.infoSetKey}</h4>
            <div class="detail"><b>Player:</b> ${is.player + 1}</div>
            <div class="detail"><b>Card:</b> ${node.infoSetKey[0]}</div>
            <div class="detail"><b>History:</b> ${node.infoSetKey.slice(1) || '(start)'}</div>
            <div class="detail"><b>CF Value:</b> ${is.cfValue.toFixed(4)}</div>
        </div>`;

        // Strategy sliders
        html += '<div class="info-set-card"><h4>Strategy (Average)</h4>';
        for (let i = 0; i < is.actions.length; i++) {
            const val = avg[i];
            const nashVal = nash[i] !== undefined ? nash[i] : 0.5;
            html += `<div class="slider-row">
                <label>${is.actionLabels[i]}</label>
                <input type="range" min="0" max="100" value="${Math.round(val * 100)}"
                    data-iskey="${node.infoSetKey}" data-ai="${i}"
                    oninput="adjustStrategy(this)">
                <span class="val">${(val * 100).toFixed(0)}%</span>
            </div>`;
            if (showNash) {
                html += `<div style="font-size:10px;color:#94a3b8;margin-left:52px;">Nash: ${(nashVal * 100).toFixed(0)}%</div>`;
            }
        }
        html += '</div>';

        // Regrets
        html += '<div class="info-set-card"><h4>Cumulative Regrets</h4>';
        const maxRegret = Math.max(1, ...is.regretSum.map(Math.abs));
        for (let i = 0; i < is.actions.length; i++) {
            const r = is.regretSum[i];
            const pct = Math.abs(r) / maxRegret * 100;
            const color = r >= 0 ? '#4ade80' : '#f87171';
            html += `<div style="font-size:11px;color:#94a3b8;margin-bottom:2px;">${is.actionLabels[i]}: <span style="color:${color};font-family:monospace">${r.toFixed(3)}</span></div>
                <div class="regret-bar-bg"><div class="regret-bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
        }
        html += '</div>';

        // All nodes in this info set
        const sameIS = TREE_NODES.filter(n => n.infoSetKey === node.infoSetKey);
        html += `<div class="info-set-card"><h4>Nodes in Info Set (${sameIS.length})</h4>`;
        html += '<div class="detail">All states that look identical to this player:</div>';
        for (const n of sameIS) {
            html += `<div class="detail" style="color:#fbbf24;">Node #${n.id} (P1: ${n.card || n.parentCard})</div>`;
        }
        html += '</div>';

        panel.innerHTML = html;
    }

    function adjustStrategy(slider) {
        const key = slider.dataset.iskey;
        const ai = parseInt(slider.dataset.ai);
        const is = INFO_SETS[key];
        if (!is) return;

        const val = parseInt(slider.value) / 100;

        // Adjust: set this action to val, distribute remainder to others
        const others = is.actions.length - 1;
        const remainder = 1 - val;

        // Reset strategy sums to reflect manual adjustment
        const totalWeight = is.strategySum.reduce((a, b) => a + b, 0) || 1;
        for (let i = 0; i < is.actions.length; i++) {
            if (i === ai) {
                is.strategySum[i] = val * totalWeight;
            } else {
                is.strategySum[i] = (remainder / others) * totalWeight;
            }
            is.strategy[i] = i === ai ? val : remainder / others;
        }

        updateInfoSetInspector(selectedNode);
        updateStrategyProfile();
        requestDraw();
    }

    // ---- Strategy Profile (Right Panel) ----
    function updateStrategyProfile() {
        const panel = document.getElementById('strategyProfile');
        const nashClass = showNash ? 'show-nash' : '';

        const groups = [
            { title: 'P1 First Action', keys: ['J', 'Q', 'K'], player: 0 },
            { title: 'P2 After Check', keys: ['Jc', 'Qc', 'Kc'], player: 1 },
            { title: 'P2 After Bet', keys: ['Jb', 'Qb', 'Kb'], player: 1 },
            { title: 'P1 After Check-Bet', keys: ['Jcb', 'Qcb', 'Kcb'], player: 0 },
        ];

        let html = '';
        for (const group of groups) {
            for (const key of group.keys) {
                const is = INFO_SETS[key];
                if (!is) continue;

                const avg = is.getAverageStrategy();
                const nash = NASH[key] || [];
                const playerTag = group.player === 0 ?
                    '<span class="player-tag p1-tag">P1</span>' :
                    '<span class="player-tag p2-tag">P2</span>';

                // Compute deviation from Nash
                let deviation = 0;
                for (let i = 0; i < avg.length; i++) {
                    const nv = nash[i] !== undefined ? nash[i] : 0.5;
                    deviation += Math.abs(avg[i] - nv);
                }
                const devBadge = deviation > 0.1 ?
                    `<span class="deviation-badge">&Delta; ${(deviation * 100).toFixed(0)}%</span>` : '';

                const barColors = group.player === 0 ?
                    ['rgba(59,130,246,0.7)', 'rgba(96,165,250,0.7)'] :
                    ['rgba(239,68,68,0.7)', 'rgba(248,113,113,0.7)'];

                const isSelected = selectedNode && selectedNode.infoSetKey === key;
                const borderStyle = isSelected ? 'border-color:rgba(251,191,36,0.5)' : '';

                html += `<div class="strat-group ${nashClass}" style="${borderStyle}" onclick="selectInfoSetByKey('${key}')">
                    <div class="strat-group-header">
                        <span class="is-name">${key}</span>
                        <span>${playerTag}${devBadge}</span>
                    </div>`;

                for (let i = 0; i < is.actions.length; i++) {
                    const pct = avg[i] * 100;
                    const nashPct = (nash[i] !== undefined ? nash[i] : 0.5) * 100;
                    html += `<div class="strat-row">
                        <span class="strat-label">${is.actionLabels[i]}</span>
                        <div class="strat-bar-bg">
                            <div class="strat-bar-fill" style="width:${pct}%;background:${barColors[i]}"></div>
                            <div class="strat-bar-nash" style="left:${nashPct}%"></div>
                        </div>
                        <span class="strat-val">${pct.toFixed(0)}%</span>
                    </div>`;
                }
                html += '</div>';
            }
        }

        panel.innerHTML = html;

        // Update exploitability
        const exploit = computeExploitability();
        document.getElementById('exploitVal').textContent = exploit.toFixed(4);
        document.getElementById('exploitBottom').textContent = exploit.toFixed(4);
    }

    function selectInfoSetByKey(key) {
        const node = TREE_NODES.find(n => n.infoSetKey === key);
        if (node) selectNode(node);
    }

    // ---- Sparklines ----
    function initSparklines() {
        const area = document.getElementById('sparklinesArea');
        const keys = ['J', 'Q', 'K', 'Jc', 'Qc', 'Kc', 'Jb', 'Qb', 'Kb', 'Jcb', 'Qcb', 'Kcb'];
        let html = '';
        for (const key of keys) {
            html += `<div class="sparkline-card">
                <div class="sp-label">${key}</div>
                <canvas id="sp-${key}" width="168" height="60"></canvas>
            </div>`;
        }
        area.innerHTML = html;
    }

    function updateSparklines() {
        const keys = ['J', 'Q', 'K', 'Jc', 'Qc', 'Kc', 'Jb', 'Qb', 'Kb', 'Jcb', 'Qcb', 'Kcb'];
        for (const key of keys) {
            const is = INFO_SETS[key];
            if (!is) continue;

            const avg = is.getAverageStrategy();
            is.history.push(avg[0]);
            if (is.history.length > 200) is.history.shift();

            const cvs = document.getElementById('sp-' + key);
            if (!cvs) continue;
            const sctx = cvs.getContext('2d');
            const w = cvs.width;
            const h = cvs.height;
            sctx.clearRect(0, 0, w, h);

            // Draw Nash reference line
            const nashVal = NASH[key] ? NASH[key][0] : 0.5;
            const ny = h - nashVal * h;
            sctx.beginPath();
            sctx.moveTo(0, ny);
            sctx.lineTo(w, ny);
            sctx.strokeStyle = 'rgba(251,191,36,0.3)';
            sctx.lineWidth = 1;
            sctx.setLineDash([3, 3]);
            sctx.stroke();
            sctx.setLineDash([]);

            // Draw history
            if (is.history.length > 1) {
                sctx.beginPath();
                const step = w / Math.max(1, is.history.length - 1);
                for (let i = 0; i < is.history.length; i++) {
                    const x = i * step;
                    const y = h - is.history[i] * h;
                    if (i === 0) sctx.moveTo(x, y);
                    else sctx.lineTo(x, y);
                }
                const playerColor = is.player === 0 ? '#3B82F6' : '#EF4444';
                sctx.strokeStyle = playerColor;
                sctx.lineWidth = 1.5;
                sctx.stroke();
            }
        }
    }

    // ---- CFR Controls ----
    function toggleCFR() {
        if (cfrRunning) {
            stopCFR();
        } else {
            startCFR();
        }
    }

    function startCFR() {
        cfrRunning = true;
        const btn = document.getElementById('btnCFR');
        btn.textContent = 'Stop CFR';
        btn.classList.add('running');
        btn.classList.remove('primary');

        runCFRLoop();
    }

    function stopCFR() {
        cfrRunning = false;
        const btn = document.getElementById('btnCFR');
        btn.textContent = 'Run CFR';
        btn.classList.remove('running');
        btn.classList.add('primary');
        if (cfrInterval) {
            clearTimeout(cfrInterval);
            cfrInterval = null;
        }
    }

    function runCFRLoop() {
        if (!cfrRunning) return;

        const speed = parseInt(document.getElementById('speedSlider').value);
        const batchSize = Math.max(1, Math.floor(speed / 5));

        for (let i = 0; i < batchSize; i++) {
            runCFRIteration();
            cfrIterations++;
        }

        document.getElementById('iterVal').textContent = cfrIterations;
        updateStrategyProfile();
        updateSparklines();
        if (selectedNode) updateInfoSetInspector(selectedNode);
        requestDraw();

        const delay = Math.max(10, 200 - speed * 2);
        cfrInterval = setTimeout(runCFRLoop, delay);
    }

    function resetStrategies() {
        stopCFR();
        cfrIterations = 0;
        document.getElementById('iterVal').textContent = '0';

        for (const key in INFO_SETS) {
            const is = INFO_SETS[key];
            is.regretSum.fill(0);
            is.strategySum.fill(0);
            is.strategy = new Array(is.actions.length).fill(1 / is.actions.length);
            is.cfValue = 0;
            is.history = [];
        }

        updateStrategyProfile();
        initSparklines();
        if (selectedNode) updateInfoSetInspector(selectedNode);
        requestDraw();
    }

    function toggleNash() {
        showNash = !showNash;
        const btn = document.getElementById('btnNash');
        btn.classList.toggle('active', showNash);
        btn.textContent = showNash ? 'Hide Nash' : 'Show Nash';
        updateStrategyProfile();
    }

    // ---- Animation Frame Management ----
    let drawRequested = false;
    function requestDraw() {
        if (!drawRequested) {
            drawRequested = true;
            requestAnimationFrame(() => {
                drawRequested = false;
                drawTree();
            });
        }
    }

    // ---- Init ----
    function init() {
        initInfoSets();
        buildVisualTree();

        resize();
        window.addEventListener('resize', () => {
            resize();
            requestDraw();
        });

        // Center the tree
        panY = -20;
        zoom = 0.95;
        document.getElementById('zoomIndicator').textContent = Math.round(zoom * 100) + '%';

        initSparklines();
        updateStrategyProfile();
        requestDraw();
    }

    init();
    </script>
</body>
