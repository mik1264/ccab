<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;

        .back-link {
            position: fixed; top: 12px; left: 12px;
            padding: 6px 14px; background: rgba(6,182,212,0.15);
            color: #22d3ee; text-decoration: none; border-radius: 6px;

        .back-link:hover { background: rgba(6,182,212,0.35); }

        /* Layout */
        .app { display: grid; width: 100vw; height: 100vh;
            grid-template-columns: 1fr 220px;
            grid-template-rows: 130px 1fr 180px;
            gap: 0;
        }
        .panel {
            background: rgba(15,20,35,0.85);
            border: 1px solid rgba(6,182,212,0.12);

        /* Top panel - Meta-strategy comparison */
        .top-panel { grid-column: 1 / -1; grid-row: 1; display: flex; }
        .meta-col {
            flex: 1; border-right: 1px solid rgba(6,182,212,0.1);
            padding: 6px 10px; display: flex; flex-direction: column;

        .meta-col:last-child { border-right: none; }
        .meta-col-title {

        .meta-col-title.uniform { color: #9ca3af; }
        .meta-col-title.nash { color: #3B82F6; }

        .meta-bars { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 2px; }

        .meta-bar-track { flex: 1; height: 10px; background: rgba(255,255,255,0.04); border-radius: 3px; overflow: hidden; position: relative; }
        .meta-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.22,1,0.36,1); min-width: 1px; }
        .meta-bar-val { font-size: 8px; width: 28px; color: #9ca3af; flex-shrink: 0; }

        .mix-orm { background: #F59E0B; transition: width 0.5s; }

            border: 1px solid rgba(6,182,212,0.08);
        }
        .payoff-table th { color: #06B6D4; font-weight: 600; background: rgba(6,182,212,0.05); }
        .payoff-table td { color: #d1d5db; }
        .payoff-pos { color: #34d399 !important; }
        .payoff-neg { color: #f87171 !important; }

        /* Bottom panel - Exploitability */
        .bottom-panel { grid-column: 1 / -1; grid-row: 3; }
        #exploitCanvas { width: 100%; height: 100%; display: block; }

        /* Controls */
        .controls {
            position: fixed; bottom: 190px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 100; align-items: center;
            background: rgba(10,14,26,0.92); padding: 6px 14px;

            padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;

        .ctrl-btn:hover { background: rgba(6,182,212,0.3); }

        .speed-control { display: flex; align-items: center; gap: 4px; }

        /* Tooltip */
        .tooltip {

            padding: 8px 12px; font-size: 11px; z-index: 300;

        /* Legend overlay */
        .landscape-legend {
            position: absolute; bottom: 8px; left: 8px;

        }
        .landscape-legend .leg-item { display: flex; align-items: center; gap: 4px; }
        .landscape-legend .leg-dot { width: 8px; height: 8px; border-radius: 50%; }

        /* Exploit legend */

        }
        .exploit-legend .leg-item { display: flex; align-items: center; gap: 4px; }
        .exploit-legend .leg-line { width: 16px; height: 2px; border-radius: 1px; }

<script>
// =========================================================================
// PSRO META-SOLVER VISUALIZATION
// =========================================================================

// --- RPSLS Game Setup ---
// Rock=0, Paper=1, Scissors=2, Lizard=3, Spock=4
const STRATEGIES = ['Rock', 'Paper', 'Scissors', 'Lizard', 'Spock'];
const S_SHORT = ['R', 'P', 'Sc', 'L', 'Sp'];
const NUM_STRATS = 5;

// Payoff matrix: row beats col => +1, col beats row => -1
// R beats Sc,L; P beats R,Sp; Sc beats P,L; L beats P,Sp; Sp beats R,Sc
const PAYOFF = [
    [ 0, -1,  1,  1, -1],  // Rock
    [ 1,  0, -1, -1,  1],  // Paper
    [-1,  1,  0,  1, -1],  // Scissors
    [-1,  1, -1,  0,  1],  // Lizard
    [ 1, -1,  1, -1,  0],  // Spock
];

// Build payoff table
function buildPayoffTable() {
    const table = document.getElementById('payoffTable');
    let html = '<tr><th></th>';
    for (let j = 0; j < NUM_STRATS; j++) html += `<th>${S_SHORT[j]}</th>`;
    html += '</tr>';
    for (let i = 0; i < NUM_STRATS; i++) {
        html += `<tr><th>${S_SHORT[i]}</th>`;
        for (let j = 0; j < NUM_STRATS; j++) {
            const v = PAYOFF[i][j];
            const cls = v > 0 ? 'payoff-pos' : v < 0 ? 'payoff-neg' : '';
            html += `<td class="${cls}">${v > 0 ? '+' : ''}${v}</td>`;
        }
        html += '</tr>';
    }
    table.innerHTML = html;
}

// --- Policy representation ---
// A policy is a mixed strategy: array of 5 probabilities summing to 1
function randomPolicy() {
    const w = Array.from({length: NUM_STRATS}, () => Math.random() + 0.01);
    const sum = w.reduce((a, b) => a + b, 0);
    return w.map(x => x / sum);
}

function purePolicy(i) {
    const p = new Array(NUM_STRATS).fill(0);
    p[i] = 1;
    return p;
}

// Expected payoff of policy a against policy b
function payoff(a, b) {
    let v = 0;
    for (let i = 0; i < NUM_STRATS; i++)
        for (let j = 0; j < NUM_STRATS; j++)
            v += a[i] * b[j] * PAYOFF[i][j];
    return v;
}

// --- Meta-game payoff matrix ---
function buildMetaGame(population) {
    const n = population.length;
    const M = [];
    for (let i = 0; i < n; i++) {
        M[i] = [];
        for (let j = 0; j < n; j++) {
            M[i][j] = payoff(population[i], population[j]);
        }
    }
    return M;
}

// --- Meta-Solvers ---

// Uniform
function uniformSolver(n) {
    return new Array(n).fill(1 / n);
}

// Nash equilibrium via linear programming approximation (support enumeration for small games)
function nashSolver(metaGame) {
    const n = metaGame.length;
    if (n === 1) return [1];
    // Use replicator dynamics to approximate Nash
    let sigma = new Array(n).fill(1 / n);
    const lr = 0.05;
    for (let iter = 0; iter < 500; iter++) {
        const ev = new Array(n).fill(0);
        for (let i = 0; i < n; i++) {
            for (let j = 0; j < n; j++) {
                ev[i] += metaGame[i][j] * sigma[j];
            }
        }
        const avgEv = ev.reduce((s, e, i) => s + e * sigma[i], 0);
        const newSigma = sigma.map((s, i) => {
            let ns = s + lr * s * (ev[i] - avgEv);
            return Math.max(ns, 1e-8);
        });
        const sum = newSigma.reduce((a, b) => a + b, 0);
        sigma = newSigma.map(x => x / sum);
    }
    return sigma;
}

// Projected Replicator Dynamics
function prdSolver(metaGame) {
    const n = metaGame.length;
    if (n === 1) return [1];
    let sigma = new Array(n).fill(1 / n);
    const dt = 0.1;
    for (let iter = 0; iter < 200; iter++) {
        const ev = new Array(n).fill(0);
        for (let i = 0; i < n; i++)
            for (let j = 0; j < n; j++)
                ev[i] += metaGame[i][j] * sigma[j];
        const avgEv = ev.reduce((s, e, i) => s + e * sigma[i], 0);
        sigma = sigma.map((s, i) => {
            let ns = s * Math.exp(dt * (ev[i] - avgEv));
            return Math.max(ns, 1e-10);
        });
        const sum = sigma.reduce((a, b) => a + b, 0);
        sigma = sigma.map(x => x / sum);
    }
    return sigma;
}

// Optimistic Regret Matching
function ormSolver(metaGame, cumulRegrets) {
    const n = metaGame.length;
    if (n === 1) return { sigma: [1], regrets: [0] };
    // Initialize regrets for new policies
    while (cumulRegrets.length < n) cumulRegrets.push(0);
    // Compute expected values
    let sigma = new Array(n).fill(1 / n);
    // Get current sigma from positive regrets
    const posRegrets = cumulRegrets.map(r => Math.max(r, 0));
    const regSum = posRegrets.reduce((a, b) => a + b, 0);
    if (regSum > 0) {
        sigma = posRegrets.map(r => r / regSum);
    }
    // Update regrets
    const ev = new Array(n).fill(0);
    for (let i = 0; i < n; i++)
        for (let j = 0; j < n; j++)
            ev[i] += metaGame[i][j] * sigma[j];
    const currentVal = ev.reduce((s, e, i) => s + e * sigma[i], 0);
    for (let i = 0; i < n; i++) {
        cumulRegrets[i] += (ev[i] - currentVal) * 1.5; // optimistic factor
    }
    // Recompute
    const posR2 = cumulRegrets.map(r => Math.max(r, 0));
    const rS2 = posR2.reduce((a, b) => a + b, 0);
    if (rS2 > 0) sigma = posR2.map(r => r / rS2);
    return { sigma, regrets: cumulRegrets };
}

// SHOR-PSRO: Smoothed Hybrid Optimistic Regret
function shorSolver(metaGame, cumulRegrets, iteration, maxIter) {
    const n = metaGame.length;
    if (n === 1) return { sigma: [1], regrets: [0], lambda: 0.3 };

    // Lambda annealing: 0.3 -> 0.05
    const lambda = 0.3 * Math.pow(0.05 / 0.3, iteration / maxIter);

    // ORM component
    const ormResult = ormSolver(metaGame, [...cumulRegrets]);
    const sigmaORM = ormResult.sigma;

    // Softmax over best pure strategy payoffs
    const ev = new Array(n).fill(0);
    for (let i = 0; i < n; i++)
        for (let j = 0; j < n; j++)
            ev[i] += metaGame[i][j] * sigmaORM[j];

    const temperature = 0.5 + 1.5 * (1 - iteration / maxIter); // cool down
    const maxEv = Math.max(...ev);
    const expEv = ev.map(e => Math.exp((e - maxEv) / temperature));
    const expSum = expEv.reduce((a, b) => a + b, 0);
    const sigmaSoftmax = expEv.map(e => e / expSum);

    // Hybrid
    const sigmaHybrid = sigmaORM.map((s, i) => (1 - lambda) * s + lambda * sigmaSoftmax[i]);
    const hybSum = sigmaHybrid.reduce((a, b) => a + b, 0);
    const sigma = sigmaHybrid.map(s => s / hybSum);

    // Update regrets using hybrid sigma
    while (cumulRegrets.length < n) cumulRegrets.push(0);
    const ev2 = new Array(n).fill(0);
    for (let i = 0; i < n; i++)
        for (let j = 0; j < n; j++)
            ev2[i] += metaGame[i][j] * sigma[j];
    const currentVal = ev2.reduce((s, e, i) => s + e * sigma[i], 0);
    for (let i = 0; i < n; i++) {
        cumulRegrets[i] += (ev2[i] - currentVal) * 1.5;
    }

    return { sigma, regrets: cumulRegrets, lambda };
}

// --- Best Response ---
function bestResponse(population, metaStrategy) {
    // Find pure strategy that maximizes payoff against meta-strategy mixture
    const metaMixed = new Array(NUM_STRATS).fill(0);
    for (let k = 0; k < population.length; k++) {
        for (let s = 0; s < NUM_STRATS; s++) {
            metaMixed[s] += metaStrategy[k] * population[k][s];
        }
    }
    // Expected payoff for each pure strategy
    const evs = [];
    for (let i = 0; i < NUM_STRATS; i++) {
        let v = 0;
        for (let j = 0; j < NUM_STRATS; j++) v += PAYOFF[i][j] * metaMixed[j];
        evs.push(v);
    }
    // Create a noisy best response (slightly mixed)
    const maxEv = Math.max(...evs);
    const temperature = 0.15;
    const expEvs = evs.map(e => Math.exp((e - maxEv) / temperature));
    const expSum = expEvs.reduce((a, b) => a + b, 0);
    return expEvs.map(e => e / expSum);
}

// --- Exploitability ---
function exploitability(population, metaStrategy) {
    const metaMixed = new Array(NUM_STRATS).fill(0);
    for (let k = 0; k < population.length; k++) {
        for (let s = 0; s < NUM_STRATS; s++) {
            metaMixed[s] += metaStrategy[k] * population[k][s];
        }
    }
    // Max payoff any pure strategy can get
    let maxPayoff = -Infinity;
    for (let i = 0; i < NUM_STRATS; i++) {
        let v = 0;
        for (let j = 0; j < NUM_STRATS; j++) v += PAYOFF[i][j] * metaMixed[j];
        maxPayoff = Math.max(maxPayoff, v);
    }
    return Math.max(0, maxPayoff);
}

// --- Simulation State ---
const MAX_ITER = 50;
let state = null;

function initState() {
    // Start with 3 random policies
    const pop = [randomPolicy(), randomPolicy(), randomPolicy()];
    return {
        population: pop,
        iteration: 0,
        // Each solver tracks its own population and meta-strategy
        uniform: { sigma: uniformSolver(pop.length), exploitHistory: [] },
        nash: { sigma: nashSolver(buildMetaGame(pop)), exploitHistory: [] },
        prd: { sigma: prdSolver(buildMetaGame(pop)), exploitHistory: [] },
        shor: { sigma: null, regrets: [], exploitHistory: [], lambda: 0.3 },
        // Position cache for landscape (2D projection)
        positions: pop.map(() => null),
        // Animation
        newPolicyAnim: 0,
        bestResponsePath: null,
        centroidAnim: { x: 0, y: 0 },
    };
}

// Project policy to 2D for landscape visualization
function projectPolicy(policy) {
    // Use simplex-style projection: map 5D probability to 2D
    // Pentagon vertices
    const angles = [0, 1, 2, 3, 4].map(i => (i * 2 * Math.PI / 5) - Math.PI / 2);
    let x = 0, y = 0;
    for (let i = 0; i < NUM_STRATS; i++) {
        x += policy[i] * Math.cos(angles[i]);
        y += policy[i] * Math.sin(angles[i]);
    }
    return { x, y };
}

function computePositions() {
    state.positions = state.population.map(p => projectPolicy(p));
}

// --- PSRO Step ---
function stepPSRO() {
    if (state.iteration >= MAX_ITER) return;
    state.iteration++;

    const metaGame = buildMetaGame(state.population);
    const n = state.population.length;

    // Uniform
    state.uniform.sigma = uniformSolver(n);
    state.uniform.exploitHistory.push(exploitability(state.population, state.uniform.sigma));

    // Nash
    state.nash.sigma = nashSolver(metaGame);
    state.nash.exploitHistory.push(exploitability(state.population, state.nash.sigma));

    // PRD
    state.prd.sigma = prdSolver(metaGame);
    state.prd.exploitHistory.push(exploitability(state.population, state.prd.sigma));

    // SHOR-PSRO
    const shorResult = shorSolver(metaGame, state.shor.regrets, state.iteration, MAX_ITER);
    state.shor.sigma = shorResult.sigma;
    state.shor.regrets = shorResult.regrets;
    state.shor.lambda = shorResult.lambda;
    state.shor.exploitHistory.push(exploitability(state.population, state.shor.sigma));

    // Compute best response against SHOR meta-strategy (used for population growth)
    const br = bestResponse(state.population, state.shor.sigma);

    // Record best response path for animation
    const brPos = projectPolicy(br);
    const centroid = computeCentroid(state.shor.sigma);
    state.bestResponsePath = { from: centroid, to: brPos, age: 0 };

    // Add to population
    state.population.push(br);
    state.newPolicyAnim = 1.0;

    computePositions();
    updateDisplay();
}

function computeCentroid(sigma) {
    if (!sigma || !state.positions.length) return { x: 0, y: 0 };
    let cx = 0, cy = 0;
    for (let i = 0; i < Math.min(sigma.length, state.positions.length); i++) {
        if (state.positions[i]) {
            cx += sigma[i] * state.positions[i].x;
            cy += sigma[i] * state.positions[i].y;
        }
    }
    return { x: cx, y: cy };
}

// --- Auto-play ---
let playing = false;
let playTimer = null;

function togglePlay() {
    playing = !playing;
    document.getElementById('playBtn').textContent = playing ? 'Pause' : 'Auto-Play';
    document.getElementById('playBtn').classList.toggle('active', playing);
    if (playing) scheduleStep();
    else clearTimeout(playTimer);
}

function scheduleStep() {
    if (!playing || state.iteration >= MAX_ITER) {
        playing = false;
        document.getElementById('playBtn').textContent = 'Auto-Play';
        document.getElementById('playBtn').classList.remove('active');
        return;
    }
    const speed = parseInt(document.getElementById('speedSlider').value);
    const delay = 1500 / speed;
    playTimer = setTimeout(() => {
        stepPSRO();
        scheduleStep();
    }, delay);
}

function resetSim() {
    playing = false;
    clearTimeout(playTimer);
    document.getElementById('playBtn').textContent = 'Auto-Play';
    document.getElementById('playBtn').classList.remove('active');
    state = initState();
    computePositions();
    // Initial exploitability
    const mg = buildMetaGame(state.population);
    state.uniform.sigma = uniformSolver(state.population.length);
    state.nash.sigma = nashSolver(mg);
    state.prd.sigma = prdSolver(mg);
    const shorR = shorSolver(mg, [], 0, MAX_ITER);
    state.shor.sigma = shorR.sigma;
    state.shor.regrets = shorR.regrets;
    state.shor.lambda = shorR.lambda;
    state.uniform.exploitHistory = [exploitability(state.population, state.uniform.sigma)];
    state.nash.exploitHistory = [exploitability(state.population, state.nash.sigma)];
    state.prd.exploitHistory = [exploitability(state.population, state.prd.sigma)];
    state.shor.exploitHistory = [exploitability(state.population, state.shor.sigma)];
    updateDisplay();
}

// --- Canvas setup ---
const landscapeCanvas = document.getElementById('landscapeCanvas');
const lCtx = landscapeCanvas.getContext('2d');
const annealCanvas = document.getElementById('annealCanvas');
const aCtx = annealCanvas.getContext('2d');
const exploitCanvas = document.getElementById('exploitCanvas');
const eCtx = exploitCanvas.getContext('2d');

function resizeCanvases() {
    const dpr = window.devicePixelRatio || 1;
    [landscapeCanvas, annealCanvas, exploitCanvas].forEach(c => {
        const rect = c.getBoundingClientRect();
        c.width = rect.width * dpr;
        c.height = rect.height * dpr;
        c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
    });
}

// --- Meta-Strategy Bars ---
function updateMetaBars() {
    const n = state.population.length;
    const containers = [
        { el: 'uniformBars', sigma: state.uniform.sigma, color: '#9ca3af' },
        { el: 'nashBars', sigma: state.nash.sigma, color: '#3B82F6' },
        { el: 'shorBars', sigma: state.shor.sigma, color: '#06B6D4' },
    ];
    containers.forEach(({ el, sigma, color }) => {
        const container = document.getElementById(el);
        if (!sigma) return;
        // Build bar HTML - show up to 12 policies, group rest
        const maxShow = 10;
        let html = '';
        const showN = Math.min(n, maxShow);
        for (let i = 0; i < showN; i++) {
            const w = sigma[i] || 0;
            const pct = (w * 100).toFixed(1);
            const barW = Math.max(w * 100, 0.5);
            html += `<div class="meta-bar-row">
                <div class="meta-bar-label">${greekPi(i)}</div>
                <div class="meta-bar-track">
                    <div class="meta-bar-fill" style="width:${barW}%;background:${color};opacity:${0.4 + w * 2}"></div>
                </div>
                <div class="meta-bar-val">${pct}%</div>
            </div>`;
        }
        if (n > maxShow) {
            let rest = 0;
            for (let i = maxShow; i < n; i++) rest += (sigma[i] || 0);
            html += `<div class="meta-bar-row">
                <div class="meta-bar-label" style="font-size:7px">+${n - maxShow}</div>
                <div class="meta-bar-track">
                    <div class="meta-bar-fill" style="width:${rest * 100}%;background:${color};opacity:0.6"></div>
                </div>
                <div class="meta-bar-val">${(rest * 100).toFixed(1)}%</div>
            </div>`;
        }
        container.innerHTML = html;
    });
}

function greekPi(i) {
    return '\u03C0' + (i + 1);
}

// --- Landscape Rendering ---
function drawLandscape() {
    const w = landscapeCanvas.getBoundingClientRect().width;
    const h = landscapeCanvas.getBoundingClientRect().height;
    const ctx = lCtx;
    ctx.clearRect(0, 0, w, h);

    // Background gradient
    const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w * 0.6);
    grad.addColorStop(0, 'rgba(6,182,212,0.03)');
    grad.addColorStop(1, 'rgba(10,14,26,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Strategy labels on pentagon
    const cx = w / 2, cy = h / 2;
    const radius = Math.min(w, h) * 0.38;

    // Draw pentagon guides
    ctx.strokeStyle = 'rgba(6,182,212,0.08)';
    ctx.lineWidth = 1;
    const angles = [0, 1, 2, 3, 4].map(i => (i * 2 * Math.PI / 5) - Math.PI / 2);
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        const px = cx + radius * Math.cos(angles[i]);
        const py = cy + radius * Math.sin(angles[i]);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();

    // Strategy vertex labels
    ctx.font = '10px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < 5; i++) {
        const lx = cx + (radius + 22) * Math.cos(angles[i]);
        const ly = cy + (radius + 22) * Math.sin(angles[i]);
        ctx.fillStyle = 'rgba(6,182,212,0.5)';
        ctx.fillText(STRATEGIES[i], lx, ly);
    }

    // Draw radial grid
    for (let r = 0.25; r <= 1; r += 0.25) {
        ctx.strokeStyle = `rgba(6,182,212,${0.03 * r})`;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * r, 0, Math.PI * 2);
        ctx.stroke();
    }

    if (!state.positions.length) return;

    // Map positions to canvas coordinates
    function toCanvas(pos) {
        return {
            x: cx + pos.x * radius,
            y: cy + pos.y * radius
        };
    }

    const n = state.population.length;
    const sigma = state.shor.sigma || uniformSolver(n);

    // Draw payoff connections (faint lines between policies)
    const mg = buildMetaGame(state.population);
    ctx.lineWidth = 0.5;
    for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
            if (!state.positions[i] || !state.positions[j]) continue;
            const pi = toCanvas(state.positions[i]);
            const pj = toCanvas(state.positions[j]);
            const pval = mg[i] && mg[i][j] ? mg[i][j] : 0;
            const alpha = Math.min(Math.abs(pval) * 0.15, 0.12);
            ctx.strokeStyle = pval > 0 ? `rgba(52,211,153,${alpha})` : `rgba(248,113,113,${alpha})`;
            ctx.beginPath();
            ctx.moveTo(pi.x, pi.y);
            ctx.lineTo(pj.x, pj.y);
            ctx.stroke();
        }
    }

    // Draw best response path
    if (state.bestResponsePath && state.bestResponsePath.age < 30) {
        const bp = state.bestResponsePath;
        const from = toCanvas(bp.from);
        const to = toCanvas(bp.to);
        const alpha = Math.max(0, 1 - bp.age / 30);

        // Animated dashed arrow
        ctx.strokeStyle = `rgba(251,191,36,${alpha * 0.8})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        const dashOffset = -bp.age * 2;
        ctx.lineDashOffset = dashOffset;
        ctx.beginPath();
        ctx.moveTo(from.x, from.y);
        ctx.lineTo(to.x, to.y);
        ctx.stroke();
        ctx.setLineDash([]);

        // Arrow head
        const angle = Math.atan2(to.y - from.y, to.x - from.x);
        ctx.fillStyle = `rgba(251,191,36,${alpha * 0.8})`;
        ctx.beginPath();
        ctx.moveTo(to.x, to.y);
        ctx.lineTo(to.x - 10 * Math.cos(angle - 0.4), to.y - 10 * Math.sin(angle - 0.4));
        ctx.lineTo(to.x - 10 * Math.cos(angle + 0.4), to.y - 10 * Math.sin(angle + 0.4));
        ctx.closePath();
        ctx.fill();

        bp.age++;
    }

    // Draw centroid
    const centroid = computeCentroid(sigma);
    const cc = toCanvas(centroid);
    // Smooth centroid animation
    state.centroidAnim.x += (cc.x - state.centroidAnim.x) * 0.1;
    state.centroidAnim.y += (cc.y - state.centroidAnim.y) * 0.1;
    const cPos = state.centroidAnim;

    // Centroid glow
    const cGrad = ctx.createRadialGradient(cPos.x, cPos.y, 0, cPos.x, cPos.y, 25);
    cGrad.addColorStop(0, 'rgba(6,182,212,0.25)');
    cGrad.addColorStop(1, 'rgba(6,182,212,0)');
    ctx.fillStyle = cGrad;
    ctx.beginPath();
    ctx.arc(cPos.x, cPos.y, 25, 0, Math.PI * 2);
    ctx.fill();

    // Centroid marker
    ctx.strokeStyle = 'rgba(6,182,212,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cPos.x, cPos.y, 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cPos.x - 4, cPos.y);
    ctx.lineTo(cPos.x + 4, cPos.y);
    ctx.moveTo(cPos.x, cPos.y - 4);
    ctx.lineTo(cPos.x, cPos.y + 4);
    ctx.stroke();

    // Draw policies
    for (let i = 0; i < n; i++) {
        if (!state.positions[i]) continue;
        const pos = toCanvas(state.positions[i]);
        const weight = sigma[i] || 0;
        const age = i / Math.max(n - 1, 1); // 0=oldest, 1=newest
        const baseRadius = 4;
        const maxRadius = 18;
        const r = baseRadius + weight * (maxRadius - baseRadius) * 4;
        const nodeR = Math.min(Math.max(r, 3), maxRadius);

        // Glow for high-weight policies
        if (weight > 0.1) {
            const glow = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, nodeR * 2.5);
            glow.addColorStop(0, `rgba(6,182,212,${weight * 0.4})`);
            glow.addColorStop(1, 'rgba(6,182,212,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, nodeR * 2.5, 0, Math.PI * 2);
            ctx.fill();
        }

        // Node
        const isNewest = i === n - 1 && state.newPolicyAnim > 0;
        const hue = isNewest ? '45' : '187'; // amber for newest, cyan for others
        const lightness = 40 + age * 30;
        const saturation = 70 + age * 30;
        const alpha = 0.4 + age * 0.6;

        if (isNewest) {
            ctx.fillStyle = `rgba(251,191,36,${alpha})`;
            ctx.strokeStyle = `rgba(251,191,36,0.8)`;
        } else {
            ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
            ctx.strokeStyle = `hsla(${hue}, ${saturation}%, ${lightness + 20}%, ${alpha * 0.8})`;
        }

        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, nodeR, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        // Policy label
        if (nodeR > 5) {
            ctx.fillStyle = `rgba(255,255,255,${0.5 + weight})`;
            ctx.font = `${Math.max(8, nodeR * 0.8)}px "Segoe UI", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(`${i + 1}`, pos.x, pos.y);
        }
    }

    // New policy entrance animation
    if (state.newPolicyAnim > 0) {
        state.newPolicyAnim -= 0.02;
        const newest = state.positions[n - 1];
        if (newest) {
            const np = toCanvas(newest);
            const pulseR = 30 * state.newPolicyAnim;
            ctx.strokeStyle = `rgba(251,191,36,${state.newPolicyAnim * 0.5})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(np.x, np.y, pulseR, 0, Math.PI * 2);
            ctx.stroke();
        }
    }

    // Iteration label
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = 'bold 60px "Segoe UI", sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`${state.iteration}`, w - 20, h - 10);

    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.font = '14px "Segoe UI", sans-serif';
    ctx.fillText('PSRO Iteration', w - 20, h - 70);
}

// --- Annealing Schedule ---
function drawAnnealing() {
    const w = annealCanvas.getBoundingClientRect().width;
    const h = annealCanvas.getBoundingClientRect().height;
    const ctx = aCtx;
    ctx.clearRect(0, 0, w, h);

    const pad = { top: 10, right: 12, bottom: 24, left: 32 };
    const plotW = w - pad.left - pad.right;
    const plotH = h - pad.top - pad.bottom;

    // Regions
    const midIter = 15; // approx boundary exploration/exploitation
    const midX = pad.left + (midIter / MAX_ITER) * plotW;

    // Exploration region
    ctx.fillStyle = 'rgba(139,92,246,0.06)';
    ctx.fillRect(pad.left, pad.top, midX - pad.left, plotH);
    // Exploitation region
    ctx.fillStyle = 'rgba(245,158,11,0.06)';
    ctx.fillRect(midX, pad.top, pad.left + plotW - midX, plotH);

    // Region labels
    ctx.font = '8px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(139,92,246,0.5)';
    ctx.fillText('Exploration', (pad.left + midX) / 2, pad.top + 12);
    ctx.fillStyle = 'rgba(245,158,11,0.5)';
    ctx.fillText('Exploitation', (midX + pad.left + plotW) / 2, pad.top + 12);

    // Axes
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top);
    ctx.lineTo(pad.left, pad.top + plotH);
    ctx.lineTo(pad.left + plotW, pad.top + plotH);
    ctx.stroke();

    // Y-axis labels
    ctx.font = '8px "Segoe UI", sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = '#9ca3af';
    [0, 0.1, 0.2, 0.3].forEach(v => {
        const y = pad.top + plotH - (v / 0.35) * plotH;
        ctx.fillText(v.toFixed(1), pad.left - 4, y + 3);
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + plotW, y);
        ctx.stroke();
    });

    // X-axis labels
    ctx.textAlign = 'center';
    [0, 10, 20, 30, 40, 50].forEach(v => {
        const x = pad.left + (v / MAX_ITER) * plotW;
        ctx.fillText(v, x, pad.top + plotH + 14);
    });

    // Lambda curve
    ctx.strokeStyle = '#06B6D4';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i <= MAX_ITER; i++) {
        const lambda = 0.3 * Math.pow(0.05 / 0.3, i / MAX_ITER);
        const x = pad.left + (i / MAX_ITER) * plotW;
        const y = pad.top + plotH - (lambda / 0.35) * plotH;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Current position dot
    if (state.iteration > 0) {
        const lambda = state.shor.lambda;
        const x = pad.left + (state.iteration / MAX_ITER) * plotW;
        const y = pad.top + plotH - (lambda / 0.35) * plotH;

        // Glow
        const glow = ctx.createRadialGradient(x, y, 0, x, y, 12);
        glow.addColorStop(0, 'rgba(6,182,212,0.5)');
        glow.addColorStop(1, 'rgba(6,182,212,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(x, y, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#06B6D4';
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();

        // Value label
        ctx.fillStyle = '#22d3ee';
        ctx.font = 'bold 9px "Segoe UI", sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(`\u03BB=${lambda.toFixed(3)}`, x + 8, y - 2);
    }

    // Y-axis title
    ctx.save();
    ctx.translate(8, pad.top + plotH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = '#9ca3af';
    ctx.font = '8px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('\u03BB (lambda)', 0, 0);
    ctx.restore();

    // Update mix indicator
    const lambda = state.shor.lambda;
    document.getElementById('mixOrm').style.width = `${(1 - lambda) * 100}%`;
    document.getElementById('mixSoftmax').style.width = `${lambda * 100}%`;
}

// --- Exploitability Chart ---
function drawExploitability() {
    const w = exploitCanvas.getBoundingClientRect().width;
    const h = exploitCanvas.getBoundingClientRect().height;
    const ctx = eCtx;
    ctx.clearRect(0, 0, w, h);

    const pad = { top: 22, right: 20, bottom: 26, left: 50 };
    const plotW = w - pad.left - pad.right;
    const plotH = h - pad.top - pad.bottom;

    // Title
    ctx.fillStyle = '#9ca3af';
    ctx.font = 'bold 10px "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('EXPLOITABILITY OVER ITERATIONS', pad.left, 14);

    // Axes
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.left, pad.top);
    ctx.lineTo(pad.left, pad.top + plotH);
    ctx.lineTo(pad.left + plotW, pad.top + plotH);
    ctx.stroke();

    // Y-axis (log scale): from 0.001 to 1
    const logMin = -3, logMax = 0;
    const logTicks = [-3, -2, -1, 0];
    ctx.font = '9px "Segoe UI", sans-serif';
    ctx.textAlign = 'right';
    logTicks.forEach(lt => {
        const y = pad.top + plotH - ((lt - logMin) / (logMax - logMin)) * plotH;
        ctx.fillStyle = '#6b7280';
        ctx.fillText(lt === 0 ? '1' : `10^${lt}`, pad.left - 6, y + 3);
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + plotW, y);
        ctx.stroke();
    });

    // X-axis labels
    ctx.textAlign = 'center';
    ctx.fillStyle = '#6b7280';
    for (let i = 0; i <= 50; i += 10) {
        const x = pad.left + (i / MAX_ITER) * plotW;
        ctx.fillText(i, x, pad.top + plotH + 16);
    }

    // Draw lines
    const series = [
        { data: state.uniform.exploitHistory, color: '#9ca3af', width: 1.5 },
        { data: state.nash.exploitHistory, color: '#3B82F6', width: 1.5 },
        { data: state.prd.exploitHistory, color: '#F59E0B', width: 1.5 },
        { data: state.shor.exploitHistory, color: '#06B6D4', width: 2.5 },
    ];

    series.forEach(({ data, color, width }) => {
        if (data.length < 1) return;
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.beginPath();
        let started = false;
        for (let i = 0; i < data.length; i++) {
            const val = Math.max(data[i], 0.0005);
            const logVal = Math.log10(val);
            const clampedLog = Math.max(logMin, Math.min(logMax, logVal));
            const x = pad.left + ((i + 1) / MAX_ITER) * plotW;
            const y = pad.top + plotH - ((clampedLog - logMin) / (logMax - logMin)) * plotH;
            if (!started) { ctx.moveTo(x, y); started = true; }
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // Endpoint dot
        if (data.length > 0) {
            const lastVal = Math.max(data[data.length - 1], 0.0005);
            const lastLog = Math.max(logMin, Math.min(logMax, Math.log10(lastVal)));
            const lx = pad.left + (data.length / MAX_ITER) * plotW;
            const ly = pad.top + plotH - ((lastLog - logMin) / (logMax - logMin)) * plotH;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(lx, ly, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    // Y-axis label
    ctx.save();
    ctx.translate(12, pad.top + plotH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = '#9ca3af';
    ctx.font = '9px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Exploitability (log)', 0, 0);
    ctx.restore();

    // X-axis label
    ctx.fillStyle = '#9ca3af';
    ctx.font = '9px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('PSRO Iteration', pad.left + plotW / 2, pad.top + plotH + 24);
}

// --- Tooltip ---
const tooltip = document.getElementById('tooltip');

landscapeCanvas.addEventListener('mousemove', (e) => {
    const rect = landscapeCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const cx = rect.width / 2;
    const cy = rect.height / 2;
    const radius = Math.min(rect.width, rect.height) * 0.38;

    let found = -1;
    let minDist = 20;
    for (let i = 0; i < state.positions.length; i++) {
        if (!state.positions[i]) continue;
        const px = cx + state.positions[i].x * radius;
        const py = cy + state.positions[i].y * radius;
        const d = Math.sqrt((mx - px) ** 2 + (my - py) ** 2);
        if (d < minDist) { minDist = d; found = i; }
    }

    if (found >= 0) {
        const pol = state.population[found];
        const sigma = state.shor.sigma || uniformSolver(state.population.length);
        const w = sigma[found] || 0;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top = (e.clientY - 10) + 'px';
        tooltip.querySelector('.tt-title').textContent = `Policy \u03C0${found + 1}`;
        let body = `<div class="tt-row">Weight: <span class="tt-val">${(w * 100).toFixed(1)}%</span></div>`;
        body += `<div class="tt-row">Strategy mix:</div>`;
        for (let s = 0; s < NUM_STRATS; s++) {
            body += `<div class="tt-row">&nbsp; ${STRATEGIES[s]}: <span class="tt-val">${(pol[s] * 100).toFixed(1)}%</span></div>`;
        }
        tooltip.querySelector('.tt-body').innerHTML = body;
    } else {
        tooltip.style.display = 'none';
    }
});

landscapeCanvas.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
});

// Exploit chart tooltip
exploitCanvas.addEventListener('mousemove', (e) => {
    const rect = exploitCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const pad = { top: 22, right: 20, bottom: 26, left: 50 };
    const plotW = rect.width - pad.left - pad.right;

    const iterFloat = ((mx - pad.left) / plotW) * MAX_ITER;
    const iter = Math.round(iterFloat);
    if (iter < 1 || iter > state.iteration || mx < pad.left) {
        tooltip.style.display = 'none';
        return;
    }

    const idx = iter - 1;
    const vals = [
        { name: 'Uniform', val: state.uniform.exploitHistory[idx], color: '#9ca3af' },
        { name: 'Nash', val: state.nash.exploitHistory[idx], color: '#3B82F6' },
        { name: 'PRD', val: state.prd.exploitHistory[idx], color: '#F59E0B' },
        { name: 'SHOR-PSRO', val: state.shor.exploitHistory[idx], color: '#06B6D4' },
    ];

    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.querySelector('.tt-title').textContent = `Iteration ${iter}`;
    let body = '';
    vals.forEach(({ name, val, color }) => {
        if (val !== undefined) {
            body += `<div class="tt-row" style="color:${color}">${name}: <span class="tt-val">${val.toFixed(4)}</span></div>`;
        }
    });
    tooltip.querySelector('.tt-body').innerHTML = body;
});

exploitCanvas.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
});

// --- Update all displays ---
function updateDisplay() {
    document.getElementById('iterDisplay').textContent = `Iteration: ${state.iteration} / ${MAX_ITER}`;
    updateMetaBars();
    drawLandscape();
    drawAnnealing();
    drawExploitability();
}

// --- Animation loop for smooth transitions ---
let animFrame;
function animLoop() {
    drawLandscape();
    if (state.newPolicyAnim > 0 || (state.bestResponsePath && state.bestResponsePath.age < 30)) {
        animFrame = requestAnimationFrame(animLoop);
    }
}

// Override updateDisplay to trigger animation loop for smooth transitions
const _origUpdateDisplay = updateDisplay;
updateDisplay = function() {
    _origUpdateDisplay();
    cancelAnimationFrame(animFrame);
    animLoop();
};

// --- Init ---
function init() {
    buildPayoffTable();
    resizeCanvases();
    state = initState();
    computePositions();

    // Initial sigma computations
    const mg = buildMetaGame(state.population);
    state.uniform.sigma = uniformSolver(state.population.length);
    state.nash.sigma = nashSolver(mg);
    state.prd.sigma = prdSolver(mg);
    const shorR = shorSolver(mg, [], 0, MAX_ITER);
    state.shor.sigma = shorR.sigma;
    state.shor.regrets = shorR.regrets;
    state.shor.lambda = shorR.lambda;
    state.uniform.exploitHistory = [exploitability(state.population, state.uniform.sigma)];
    state.nash.exploitHistory = [exploitability(state.population, state.nash.sigma)];
    state.prd.exploitHistory = [exploitability(state.population, state.prd.sigma)];
    state.shor.exploitHistory = [exploitability(state.population, state.shor.sigma)];

    // Set initial centroid
    const c = computeCentroid(state.shor.sigma);
    const rect = landscapeCanvas.getBoundingClientRect();
    state.centroidAnim = { x: rect.width / 2 + c.x * Math.min(rect.width, rect.height) * 0.38, y: rect.height / 2 + c.y * Math.min(rect.width, rect.height) * 0.38 };

    updateDisplay();
}

window.addEventListener('resize', () => {
    resizeCanvases();
    updateDisplay();
});

// Make functions global for onclick handlers
window.stepPSRO = stepPSRO;
window.togglePlay = togglePlay;
window.resetSim = resetSim;

init();
</script>
