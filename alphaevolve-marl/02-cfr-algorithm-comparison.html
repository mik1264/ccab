<script>
// ============================================================
// KUHN POKER CFR ENGINE
// ============================================================

const CARDS = ['J', 'Q', 'K'];
const CARD_RANK = { J: 0, Q: 1, K: 2 };
const NUM_ACTIONS = 2; // 0=Check/Fold, 1=Bet/Call

// Information set node
class InfoNode {
    constructor() {
        this.regretSum = new Float64Array(NUM_ACTIONS);
        this.strategySum = new Float64Array(NUM_ACTIONS);
        this.strategy = new Float64Array(NUM_ACTIONS);
        this.strategy.fill(1 / NUM_ACTIONS);
    }

    getStrategy(realizationWeight) {
        let normSum = 0;
        for (let a = 0; a < NUM_ACTIONS; a++) {
            this.strategy[a] = Math.max(0, this.regretSum[a]);
            normSum += this.strategy[a];
        }
        for (let a = 0; a < NUM_ACTIONS; a++) {
            if (normSum > 0) {
                this.strategy[a] /= normSum;
            } else {
                this.strategy[a] = 1 / NUM_ACTIONS;
            }
            this.strategySum[a] += realizationWeight * this.strategy[a];
        }
        return this.strategy;
    }

    getAverageStrategy() {
        const avg = new Float64Array(NUM_ACTIONS);
        let normSum = 0;
        for (let a = 0; a < NUM_ACTIONS; a++) normSum += this.strategySum[a];
        for (let a = 0; a < NUM_ACTIONS; a++) {
            avg[a] = normSum > 0 ? this.strategySum[a] / normSum : 1 / NUM_ACTIONS;
        }
        return avg;
    }

    clone() {
        const n = new InfoNode();
        n.regretSum.set(this.regretSum);
        n.strategySum.set(this.strategySum);
        n.strategy.set(this.strategy);
        return n;
    }
}

// CFR Trainer for Kuhn Poker
class KuhnCFRTrainer {
    constructor(variant) {
        this.variant = variant; // 'vanilla', 'plus', 'dcfr', 'vadcfr'
        this.nodeMap = new Map();
        this.iteration = 0;
        this.exploitabilityHistory = [];
        this.regretHistory = []; // Track regret for key info set

        // DCFR parameters
        this.alpha = 1.5;
        this.beta = 0;
        this.gamma = 2;

        // VAD-CFR parameters
        this.ewmaDecay = 0.995;
        this.volatility = new Map(); // per-infoset EWMA of |regret|
        this.warmStartIter = 500;
    }

    getNode(infoSet) {
        if (!this.nodeMap.has(infoSet)) {
            this.nodeMap.set(infoSet, new InfoNode());
            if (this.variant === 'vadcfr') {
                this.volatility.set(infoSet, 0);
            }
        }
        return this.nodeMap.get(infoSet);
    }

    // Main CFR traversal
    cfr(cards, history, p0, p1) {
        const plays = history.length;
        const player = plays % 2;
        const opponent = 1 - player;

        // Terminal states
        if (plays > 1) {
            const terminalPayoff = this.getTerminalPayoff(cards, history);
            if (terminalPayoff !== null) return terminalPayoff;
        }

        const infoSet = cards[player] + history;
        const node = this.getNode(infoSet);
        const realizationWeight = player === 0 ? p0 : p1;
        const strategy = node.getStrategy(realizationWeight);

        const util = new Float64Array(NUM_ACTIONS);
        let nodeUtil = 0;

        for (let a = 0; a < NUM_ACTIONS; a++) {
            const nextHistory = history + (a === 0 ? 'p' : 'b');
            if (player === 0) {
                util[a] = -this.cfr(cards, nextHistory, p0 * strategy[a], p1);
            } else {
                util[a] = -this.cfr(cards, nextHistory, p0, p1 * strategy[a]);
            }
            nodeUtil += strategy[a] * util[a];
        }

        // Update regrets
        const opponentReach = player === 0 ? p1 : p0;
        for (let a = 0; a < NUM_ACTIONS; a++) {
            const instantRegret = opponentReach * (util[a] - nodeUtil);
            this.updateRegret(node, infoSet, a, instantRegret);
        }

        return nodeUtil;
    }

    updateRegret(node, infoSet, action, instantRegret) {
        const t = this.iteration + 1;

        switch (this.variant) {
            case 'vanilla':
                node.regretSum[action] += instantRegret;
                break;

            case 'plus':
                node.regretSum[action] = Math.max(0, node.regretSum[action] + instantRegret);
                break;

            case 'dcfr': {
                // First accumulate
                node.regretSum[action] += instantRegret;
                // Apply discount at end of iteration handled in postIteration
                break;
            }

            case 'vadcfr': {
                // Asymmetric boost for positive instant regret
                const boosted = instantRegret > 0 ? instantRegret * 1.1 : instantRegret;
                node.regretSum[action] += boosted;
                break;
            }
        }
    }

    postIteration() {
        const t = this.iteration + 1;

        if (this.variant === 'dcfr') {
            const posWeight = Math.pow(t, this.alpha) / (Math.pow(t, this.alpha) + 1);
            const negWeight = Math.pow(t, this.beta) / (Math.pow(t, this.beta) + 1);
            const stratWeight = Math.pow(t, this.gamma) / (Math.pow(t, this.gamma) + 1);

            for (const node of this.nodeMap.values()) {
                for (let a = 0; a < NUM_ACTIONS; a++) {
                    if (node.regretSum[a] > 0) {
                        node.regretSum[a] *= posWeight;
                    } else {
                        node.regretSum[a] *= negWeight;
                    }
                    node.strategySum[a] *= stratWeight;
                }
            }
        }

        if (this.variant === 'vadcfr') {
            // Update volatility EWMA per info set and apply adaptive discount
            for (const [infoSet, node] of this.nodeMap.entries()) {
                let regretMag = 0;
                for (let a = 0; a < NUM_ACTIONS; a++) {
                    regretMag += Math.abs(node.regretSum[a]);
                }
                regretMag /= NUM_ACTIONS;

                let vol = this.volatility.get(infoSet) || 0;
                vol = this.ewmaDecay * vol + (1 - this.ewmaDecay) * regretMag;
                this.volatility.set(infoSet, vol);

                // Adaptive discount: higher volatility -> stronger discount (forget faster)
                const baseDiscount = Math.pow(t, 1.5) / (Math.pow(t, 1.5) + 1);
                const volBoost = Math.min(0.15, vol * 0.02);
                const discount = Math.min(1, baseDiscount + volBoost);

                for (let a = 0; a < NUM_ACTIONS; a++) {
                    if (node.regretSum[a] > 0) {
                        node.regretSum[a] *= discount;
                    } else {
                        node.regretSum[a] *= Math.max(0, discount - 0.1);
                    }
                }

                // Block strategy accumulation during warm start
                if (t < this.warmStartIter) {
                    for (let a = 0; a < NUM_ACTIONS; a++) {
                        node.strategySum[a] = 0;
                    }
                } else {
                    const stratWeight = Math.pow(t, 2) / (Math.pow(t, 2) + 1);
                    for (let a = 0; a < NUM_ACTIONS; a++) {
                        node.strategySum[a] *= stratWeight;
                    }
                }
            }
        }

        if (this.variant === 'plus') {
            // Linear averaging: weight strategy sum by iteration number
            // Already implicit in CFR+ through positive regret only
        }
    }

    getTerminalPayoff(cards, history) {
        const plays = history.length;
        if (plays < 2) return null;

        const lastTwo = history.slice(-2);
        const playerCard = CARD_RANK[cards[plays % 2]];
        const opponentCard = CARD_RANK[cards[1 - (plays % 2)]];
        const isPlayerHigher = playerCard > opponentCard;

        // pp = check-check: showdown, pot=2 (each ante 1)
        if (lastTwo === 'pp') return isPlayerHigher ? 1 : -1;
        // bp = bet-fold
        if (history.endsWith('bp')) return 1;
        // bb = bet-call: showdown, pot=4
        if (lastTwo === 'bb') return isPlayerHigher ? 2 : -2;
        // pbp = check-bet-fold
        if (history === 'pbp') return -1;
        // pbb = check-bet-call: showdown, pot=4
        if (history === 'pbb') return isPlayerHigher ? 2 : -2;

        return null;
    }

    runIteration() {
        // Iterate over all card deals
        let utilSum = 0;
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                if (i === j) continue;
                utilSum += this.cfr([CARDS[i], CARDS[j]], '', 1, 1);
            }
        }
        this.postIteration();
        this.iteration++;

        // Compute exploitability every N iterations
        if (this.iteration % 10 === 0 || this.iteration <= 20) {
            const expl = this.computeExploitability();
            this.exploitabilityHistory.push({ iter: this.iteration, value: expl });
        }

        // Track regret for K (king, first to act, no history)
        const kNode = this.nodeMap.get('K');
        if (kNode) {
            this.regretHistory.push({
                iter: this.iteration,
                regrets: [kNode.regretSum[0], kNode.regretSum[1]]
            });
        }

        return utilSum / 6;
    }

    computeExploitability() {
        // Best response computation for Kuhn Poker
        let expl = 0;
        for (let p = 0; p < 2; p++) {
            expl += this.bestResponseValue(p);
        }
        return Math.max(1e-10, expl / 6); // Average over 6 deals, floor for log
    }

    bestResponseValue(brPlayer) {
        let totalValue = 0;
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                if (i === j) continue;
                const cards = [CARDS[i], CARDS[j]];
                totalValue += this.brTraverse(cards, '', brPlayer, 1);
            }
        }
        return totalValue;
    }

    brTraverse(cards, history, brPlayer, prob) {
        const plays = history.length;
        const player = plays % 2;

        if (plays > 1) {
            const payoff = this.getTerminalPayoff(cards, history);
            if (payoff !== null) {
                // payoff is from current player's perspective
                // We need it from brPlayer's perspective
                return player === brPlayer ? payoff * prob : -payoff * prob;
            }
        }

        const infoSet = cards[player] + history;
        const node = this.nodeMap.get(infoSet);

        if (player === brPlayer) {
            // Best response: pick best action
            let bestVal = -Infinity;
            for (let a = 0; a < NUM_ACTIONS; a++) {
                const nextHistory = history + (a === 0 ? 'p' : 'b');
                const val = this.brTraverse(cards, nextHistory, brPlayer, prob);
                bestVal = Math.max(bestVal, val);
            }
            return bestVal;
        } else {
            // Use average strategy
            const avg = node ? node.getAverageStrategy() : new Float64Array([0.5, 0.5]);
            let val = 0;
            for (let a = 0; a < NUM_ACTIONS; a++) {
                const nextHistory = history + (a === 0 ? 'p' : 'b');
                val += avg[a] * this.brTraverse(cards, nextHistory, brPlayer, prob);
            }
            return val;
        }
    }

    getRegretDistribution() {
        const regrets = [];
        for (const [, node] of this.nodeMap) {
            for (let a = 0; a < NUM_ACTIONS; a++) {
                regrets.push(node.regretSum[a]);
            }
        }
        return regrets;
    }
}

// ============================================================
// VISUALIZATION
// ============================================================

const ALGORITHMS = [
    { id: 'vanilla', name: 'Vanilla CFR', color: '#9CA3AF', variant: 'vanilla' },
    { id: 'plus', name: 'CFR+', color: '#3B82F6', variant: 'plus' },
    { id: 'dcfr', name: 'Discounted CFR', color: '#F59E0B', variant: 'dcfr' },
    { id: 'vadcfr', name: 'VAD-CFR', color: '#06B6D4', variant: 'vadcfr' }
];

const FORMULAS = {
    vanilla: 'R[a] += r_inst(a)\nσ(a) = max(0,R[a]) / Σ max(0,R)\nConvergence: O(1/√T)',
    plus: 'R[a] = max(0, R[a] + r_inst(a))\nLinear averaging of strategies\nFaster early convergence',
    dcfr: 'R⁺ *= tᵅ/(tᵅ+1)  α=1.5\nR⁻ *= tᵝ/(tᵝ+1)  β=0\nσ_sum *= tᵞ/(tᵞ+1) γ=2',
    vadcfr: 'vol = EWMA(|R|, 0.995)\nDiscount += min(0.15, vol×0.02)\nR⁺_inst × 1.1, warm-start=500'
};

const FEATURES = {
    vanilla: 'Uniform regret accumulation',
    plus: 'Positive regret only',
    dcfr: 'Fixed discount factors',
    vadcfr: 'Volatility-adaptive discount'
};

const MAX_ITERATIONS = 10000;
const DPR = Math.min(window.devicePixelRatio || 1, 2);

let trainers = [];
let running = true;
let logScale = true;
let speed = 10;
let currentIteration = 0;
let highlighted = null; // null = show all, index = highlight one
let animFrameId = null;

// Canvas references
const convCanvas = document.getElementById('convergenceCanvas');
const convCtx = convCanvas.getContext('2d');
const regCanvas = document.getElementById('regretCanvas');
const regCtx = regCanvas.getContext('2d');
const tooltipEl = document.getElementById('tooltip');

function initTrainers() {
    trainers = ALGORITHMS.map(a => new KuhnCFRTrainer(a.variant));
    currentIteration = 0;
}

function resizeCanvases() {
    const cw = convCanvas.parentElement.clientWidth - 40;
    const ch = Math.min(400, Math.max(280, cw * 0.4));
    convCanvas.style.width = cw + 'px';
    convCanvas.style.height = ch + 'px';
    convCanvas.width = cw * DPR;
    convCanvas.height = ch * DPR;

    const rw = regCanvas.parentElement.clientWidth - 40;
    const rh = Math.min(250, Math.max(180, rw * 0.25));
    regCanvas.style.width = rw + 'px';
    regCanvas.style.height = rh + 'px';
    regCanvas.width = rw * DPR;
    regCanvas.height = rh * DPR;
}

// ============================================================
// DRAW CONVERGENCE CHART
// ============================================================

function drawConvergenceChart() {
    const ctx = convCtx;
    const W = convCanvas.width;
    const H = convCanvas.height;
    ctx.clearRect(0, 0, W, H);

    const pad = { left: 70 * DPR, right: 30 * DPR, top: 20 * DPR, bottom: 45 * DPR };
    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(ctx, pad.left, pad.top, plotW, plotH, 4 * DPR);
    ctx.fill();

    // Y range
    const yMin = logScale ? -5 : 0;
    const yMax = logScale ? 0.5 : 1.5;

    function yToScreen(v) {
        const logV = logScale ? Math.log10(Math.max(1e-6, v)) : v;
        return pad.top + plotH * (1 - (logV - yMin) / (yMax - yMin));
    }

    function xToScreen(iter) {
        return pad.left + (iter / MAX_ITERATIONS) * plotW;
    }

    function screenToIter(sx) {
        return Math.round(((sx - pad.left) / plotW) * MAX_ITERATIONS);
    }

    // Grid lines - Y
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = DPR;
    ctx.font = `${11 * DPR}px 'Segoe UI', sans-serif`;
    ctx.fillStyle = '#6b7280';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';

    if (logScale) {
        for (let exp = -5; exp <= 0; exp++) {
            const y = yToScreen(Math.pow(10, exp));
            ctx.beginPath();
            ctx.moveTo(pad.left, y);
            ctx.lineTo(pad.left + plotW, y);
            ctx.stroke();
            ctx.fillText(`10^${exp}`, pad.left - 8 * DPR, y);
        }
    } else {
        for (let v = 0; v <= 1.5; v += 0.25) {
            const y = yToScreen(v);
            ctx.beginPath();
            ctx.moveTo(pad.left, y);
            ctx.lineTo(pad.left + plotW, y);
            ctx.stroke();
            ctx.fillText(v.toFixed(2), pad.left - 8 * DPR, y);
        }
    }

    // Grid lines - X
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (let xi = 0; xi <= MAX_ITERATIONS; xi += 2000) {
        const x = xToScreen(xi);
        ctx.beginPath();
        ctx.moveTo(x, pad.top);
        ctx.lineTo(x, pad.top + plotH);
        ctx.stroke();
        ctx.fillText(xi.toLocaleString(), x, pad.top + plotH + 6 * DPR);
    }

    // Axis labels
    ctx.fillStyle = '#8892a8';
    ctx.font = `${12 * DPR}px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('Iterations', pad.left + plotW / 2, H - 6 * DPR);

    ctx.save();
    ctx.translate(16 * DPR, pad.top + plotH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Exploitability' + (logScale ? ' (log)' : ''), 0, 0);
    ctx.restore();

    // Plot lines
    for (let i = 0; i < 4; i++) {
        if (highlighted !== null && highlighted !== i) continue;
        const hist = trainers[i].exploitabilityHistory;
        if (hist.length < 2) continue;

        ctx.strokeStyle = ALGORITHMS[i].color;
        ctx.lineWidth = (highlighted === i ? 3 : 2) * DPR;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.globalAlpha = (highlighted !== null && highlighted !== i) ? 0.15 : 1;

        ctx.beginPath();
        let started = false;
        for (let j = 0; j < hist.length; j++) {
            const x = xToScreen(hist[j].iter);
            const y = yToScreen(hist[j].value);
            const clampedY = Math.max(pad.top, Math.min(pad.top + plotH, y));
            if (!started) {
                ctx.moveTo(x, clampedY);
                started = true;
            } else {
                ctx.lineTo(x, clampedY);
            }
        }
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    // Draw dimmed lines behind
    if (highlighted !== null) {
        for (let i = 0; i < 4; i++) {
            if (highlighted === i) continue;
            const hist = trainers[i].exploitabilityHistory;
            if (hist.length < 2) continue;

            ctx.strokeStyle = ALGORITHMS[i].color;
            ctx.lineWidth = 1.5 * DPR;
            ctx.globalAlpha = 0.15;
            ctx.beginPath();
            let started = false;
            for (let j = 0; j < hist.length; j++) {
                const x = xToScreen(hist[j].iter);
                const y = yToScreen(hist[j].value);
                const clampedY = Math.max(pad.top, Math.min(pad.top + plotH, y));
                if (!started) { ctx.moveTo(x, clampedY); started = true; }
                else ctx.lineTo(x, clampedY);
            }
            ctx.stroke();
            ctx.globalAlpha = 1;
        }
    }

    // Store layout for tooltip
    convCanvas._layout = { pad, plotW, plotH, xToScreen, yToScreen, screenToIter };
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

// ============================================================
// DRAW REGRET EVOLUTION CHART
// ============================================================

function drawRegretChart() {
    const ctx = regCtx;
    const W = regCanvas.width;
    const H = regCanvas.height;
    ctx.clearRect(0, 0, W, H);

    const pad = { left: 70 * DPR, right: 30 * DPR, top: 20 * DPR, bottom: 45 * DPR };
    const plotW = W - pad.left - pad.right;
    const plotH = H - pad.top - pad.bottom;

    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(ctx, pad.left, pad.top, plotW, plotH, 4 * DPR);
    ctx.fill();

    // Find regret range
    let maxR = 1;
    let minR = -1;
    for (const t of trainers) {
        for (const r of t.regretHistory) {
            maxR = Math.max(maxR, r.regrets[0], r.regrets[1]);
            minR = Math.min(minR, r.regrets[0], r.regrets[1]);
        }
    }
    const absMax = Math.max(Math.abs(maxR), Math.abs(minR), 1) * 1.1;

    function yToScreen(v) {
        return pad.top + plotH * (1 - (v + absMax) / (2 * absMax));
    }
    function xToScreen(iter) {
        return pad.left + (iter / MAX_ITERATIONS) * plotW;
    }

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = DPR;
    ctx.font = `${11 * DPR}px 'Segoe UI', sans-serif`;
    ctx.fillStyle = '#6b7280';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';

    const step = Math.pow(10, Math.floor(Math.log10(absMax)));
    for (let v = -absMax; v <= absMax; v += step) {
        const y = yToScreen(v);
        if (y < pad.top || y > pad.top + plotH) continue;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + plotW, y);
        ctx.stroke();
        ctx.fillText(v.toFixed(v === 0 ? 0 : 1), pad.left - 8 * DPR, y);
    }

    // Zero line
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = DPR;
    const zeroY = yToScreen(0);
    ctx.beginPath();
    ctx.moveTo(pad.left, zeroY);
    ctx.lineTo(pad.left + plotW, zeroY);
    ctx.stroke();

    // X axis ticks
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#6b7280';
    for (let xi = 0; xi <= MAX_ITERATIONS; xi += 2000) {
        const x = xToScreen(xi);
        ctx.fillText(xi.toLocaleString(), x, pad.top + plotH + 6 * DPR);
    }

    // Labels
    ctx.fillStyle = '#8892a8';
    ctx.font = `${12 * DPR}px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('Iterations', pad.left + plotW / 2, H - 6 * DPR);

    ctx.save();
    ctx.translate(16 * DPR, pad.top + plotH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText('Cumulative Regret (Bet action)', 0, 0);
    ctx.restore();

    // Plot regret for action 1 (Bet) from K info set
    for (let i = 0; i < 4; i++) {
        const hist = trainers[i].regretHistory;
        if (hist.length < 2) continue;

        ctx.strokeStyle = ALGORITHMS[i].color;
        ctx.lineWidth = (highlighted === i ? 2.5 : 1.5) * DPR;
        ctx.globalAlpha = (highlighted !== null && highlighted !== i) ? 0.15 : 1;

        ctx.beginPath();
        // Plot every Nth point for performance
        const step = Math.max(1, Math.floor(hist.length / 500));
        for (let j = 0; j < hist.length; j += step) {
            const x = xToScreen(hist[j].iter);
            const y = yToScreen(hist[j].regrets[1]); // Bet action
            const clampedY = Math.max(pad.top, Math.min(pad.top + plotH, y));
            if (j === 0) ctx.moveTo(x, clampedY);
            else ctx.lineTo(x, clampedY);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;
    }
}

// ============================================================
// ALGORITHM CARDS
// ============================================================

function buildCards() {
    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = '';

    ALGORITHMS.forEach((algo, idx) => {
        const card = document.createElement('div');
        card.className = 'algo-card' + (highlighted === idx ? ' highlighted' : '') +
            (highlighted !== null && highlighted !== idx ? ' dimmed' : '');
        card.style.setProperty('--algo-color', algo.color);
        card.innerHTML = `
            <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${algo.color};border-radius:14px 14px 0 0;"></div>
            <div class="card-header">
                <div class="card-color" style="background:${algo.color}"></div>
                <div class="card-name">${algo.name}</div>
            </div>
            <div class="card-stats">
                <div>
                    <div class="card-stat-label">Iteration</div>
                    <div class="card-stat-value" id="cardIter${idx}">${trainers[idx].iteration.toLocaleString()}</div>
                </div>
                <div>
                    <div class="card-stat-label">Exploitability</div>
                    <div class="card-stat-value" id="cardExpl${idx}" style="color:${algo.color}">-</div>
                </div>
            </div>
            <div class="card-feature">${FEATURES[algo.id]}</div>
            <div class="card-formula">${FORMULAS[algo.id]}</div>
            <div class="mini-hist-label">Regret Distribution</div>
            <div class="mini-hist" id="miniHist${idx}"></div>
        `;
        card.addEventListener('click', () => {
            if (highlighted === idx) highlighted = null;
            else highlighted = idx;
            updateUI();
        });
        grid.appendChild(card);
    });
}

function updateCards() {
    for (let i = 0; i < 4; i++) {
        const t = trainers[i];
        const iterEl = document.getElementById(`cardIter${i}`);
        const explEl = document.getElementById(`cardExpl${i}`);
        if (iterEl) iterEl.textContent = t.iteration.toLocaleString();

        const hist = t.exploitabilityHistory;
        if (explEl && hist.length > 0) {
            const val = hist[hist.length - 1].value;
            explEl.textContent = val < 0.001 ? val.toExponential(2) : val.toFixed(4);
        }

        // Update card classes
        const card = document.querySelectorAll('.algo-card')[i];
        if (card) {
            card.className = 'algo-card' + (highlighted === i ? ' highlighted' : '') +
                (highlighted !== null && highlighted !== i ? ' dimmed' : '');
        }

        // Mini histogram
        updateMiniHist(i);
    }
}

function updateMiniHist(idx) {
    const el = document.getElementById(`miniHist${idx}`);
    if (!el) return;

    const regrets = trainers[idx].getRegretDistribution();
    if (regrets.length === 0) return;

    // Create histogram bins
    const numBins = 12;
    let maxR = 0;
    for (const r of regrets) maxR = Math.max(maxR, Math.abs(r));
    if (maxR === 0) maxR = 1;

    const bins = new Array(numBins).fill(0);
    for (const r of regrets) {
        const normalized = (r + maxR) / (2 * maxR);
        const bin = Math.min(numBins - 1, Math.floor(normalized * numBins));
        bins[bin]++;
    }

    const maxBin = Math.max(1, ...bins);
    el.innerHTML = '';

    for (let b = 0; b < numBins; b++) {
        const bar = document.createElement('div');
        bar.className = 'mini-hist-bar';
        const h = (bins[b] / maxBin) * 100;
        bar.style.height = h + '%';
        const isNeg = b < numBins / 2;
        bar.style.background = isNeg
            ? `rgba(239, 68, 68, ${0.3 + 0.7 * bins[b] / maxBin})`
            : `${ALGORITHMS[idx].color}${Math.round(80 + 175 * bins[b] / maxBin).toString(16).padStart(2, '0')}`;
        el.appendChild(bar);
    }
}

// ============================================================
// LEGEND
// ============================================================

function buildLegend() {
    const el = document.getElementById('legend');
    el.innerHTML = '';
    ALGORITHMS.forEach((algo, idx) => {
        const item = document.createElement('div');
        item.className = 'legend-item' + (highlighted !== null && highlighted !== idx ? ' dimmed' : '');
        item.innerHTML = `<div class="legend-dot" style="background:${algo.color}"></div>${algo.name}`;
        item.addEventListener('click', () => {
            if (highlighted === idx) highlighted = null;
            else highlighted = idx;
            updateUI();
        });
        el.appendChild(item);
    });
}

// ============================================================
// TOOLTIP
// ============================================================

convCanvas.addEventListener('mousemove', (e) => {
    const layout = convCanvas._layout;
    if (!layout) return;

    const rect = convCanvas.getBoundingClientRect();
    const sx = (e.clientX - rect.left) * DPR;
    const sy = (e.clientY - rect.top) * DPR;

    if (sx < layout.pad.left || sx > layout.pad.left + layout.plotW ||
        sy < layout.pad.top || sy > layout.pad.top + layout.plotH) {
        tooltipEl.style.display = 'none';
        return;
    }

    const iter = layout.screenToIter(sx);
    if (iter < 0 || iter > MAX_ITERATIONS) {
        tooltipEl.style.display = 'none';
        return;
    }

    let html = `<div class="tt-iter">Iteration ${iter.toLocaleString()}</div>`;
    for (let i = 0; i < 4; i++) {
        const hist = trainers[i].exploitabilityHistory;
        // Find closest data point
        let closest = null;
        let minDist = Infinity;
        for (const h of hist) {
            const d = Math.abs(h.iter - iter);
            if (d < minDist) { minDist = d; closest = h; }
        }
        const val = closest ? closest.value : null;
        html += `<div class="tt-row">
            <div class="tt-dot" style="background:${ALGORITHMS[i].color}"></div>
            <div class="tt-name">${ALGORITHMS[i].name}</div>
            <div class="tt-val">${val !== null ? (val < 0.001 ? val.toExponential(2) : val.toFixed(4)) : '-'}</div>
        </div>`;
    }

    tooltipEl.innerHTML = html;
    tooltipEl.style.display = 'block';

    // Position tooltip
    const tipW = tooltipEl.offsetWidth;
    const tipH = tooltipEl.offsetHeight;
    let tx = e.clientX - rect.left + 16;
    let ty = e.clientY - rect.top - tipH / 2;
    if (tx + tipW > rect.width - 10) tx = e.clientX - rect.left - tipW - 16;
    if (ty < 0) ty = 4;
    if (ty + tipH > rect.height) ty = rect.height - tipH - 4;
    tooltipEl.style.left = tx + 'px';
    tooltipEl.style.top = ty + 'px';
});

convCanvas.addEventListener('mouseleave', () => {
    tooltipEl.style.display = 'none';
});

// ============================================================
// CONTROLS
// ============================================================

document.getElementById('btnPlay').addEventListener('click', () => {
    running = true;
    document.getElementById('btnPlay').classList.add('active');
    document.getElementById('btnPause').classList.remove('active');
});

document.getElementById('btnPause').addEventListener('click', () => {
    running = false;
    document.getElementById('btnPlay').classList.remove('active');
    document.getElementById('btnPause').classList.add('active');
});

document.getElementById('btnReset').addEventListener('click', () => {
    initTrainers();
    buildCards();
    buildLegend();
    updateUI();
});

document.getElementById('speedSlider').addEventListener('input', (e) => {
    speed = parseInt(e.target.value);
    document.getElementById('speedVal').textContent = speed + 'x';
});

document.getElementById('btnLogScale').addEventListener('click', () => {
    logScale = true;
    document.getElementById('btnLogScale').classList.add('active');
    document.getElementById('btnLinScale').classList.remove('active');
    drawConvergenceChart();
});

document.getElementById('btnLinScale').addEventListener('click', () => {
    logScale = false;
    document.getElementById('btnLinScale').classList.add('active');
    document.getElementById('btnLogScale').classList.remove('active');
    drawConvergenceChart();
});

// ============================================================
// MAIN LOOP
// ============================================================

function updateUI() {
    drawConvergenceChart();
    drawRegretChart();
    updateCards();
    buildLegend();
    document.getElementById('iterDisplay').textContent = currentIteration.toLocaleString();
}

function tick() {
    if (running && currentIteration < MAX_ITERATIONS) {
        const itersThisTick = Math.min(speed, MAX_ITERATIONS - currentIteration);
        for (let s = 0; s < itersThisTick; s++) {
            for (const t of trainers) {
                t.runIteration();
            }
            currentIteration++;
        }
    }

    updateUI();
    animFrameId = requestAnimationFrame(tick);
}

function init() {
    resizeCanvases();
    initTrainers();
    buildCards();
    buildLegend();
    tick();
}

window.addEventListener('resize', () => {
    resizeCanvases();
    updateUI();
});

init();
</script>
