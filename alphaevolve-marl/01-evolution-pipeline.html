<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaEvolve: Evolutionary Algorithm Discovery - CCAB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0e1a;
            color: #e8e6e1;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* Loading State */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #06B6D4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error State */
        #error {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(225, 29, 72, 0.9);
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            z-index: 1001;
        }

        #error h2 { margin: 0 0 1rem 0; font-size: 1.5rem; }
        #error p { margin: 0; opacity: 0.9; }

        /* FPS Counter */
        #fps-counter {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #06B6D4;
            padding: 6px 10px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            z-index: 999;
            display: none;
        }

        .fps-good { color: #10b981; }
        .fps-medium { color: #fbbf24; }
        .fps-poor { color: #e11d48; }

        /* Back Link */
        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.7);
            color: #06B6D4;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            z-index: 999;
            transition: all 0.3s ease;
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .back-link:hover {
            background: rgba(6, 182, 212, 0.15);
            transform: translateX(-4px);
        }

        /* Controls Panel */
        #controls {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 14, 26, 0.9);
            border: 1px solid rgba(6, 182, 212, 0.25);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 999;
            font-size: 13px;
        }

        #controls button {
            background: rgba(6, 182, 212, 0.15);
            border: 1px solid rgba(6, 182, 212, 0.4);
            color: #06B6D4;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.2s;
        }

        #controls button:hover {
            background: rgba(6, 182, 212, 0.3);
        }

        #controls button.active {
            background: rgba(6, 182, 212, 0.4);
            border-color: #06B6D4;
        }

        #controls label {
            color: #8892a8;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #controls input[type="range"] {
            width: 80px;
            accent-color: #06B6D4;
        }

        /* Tooltip / Info Panel */
        #info-panel {
            display: none;
            position: fixed;
            background: rgba(10, 14, 26, 0.95);
            border: 1px solid rgba(6, 182, 212, 0.4);
            border-radius: 10px;
            padding: 14px 18px;
            max-width: 300px;
            z-index: 1000;
            font-size: 12px;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }

        #info-panel h4 {
            color: #06B6D4;
            margin-bottom: 6px;
            font-size: 14px;
        }

        #info-panel .fitness-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin: 6px 0;
            overflow: hidden;
        }

        #info-panel .fitness-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        #info-panel .code-block {
            background: rgba(0,0,0,0.5);
            border-radius: 6px;
            padding: 8px 10px;
            margin-top: 8px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #a8b4c8;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        #info-panel .code-block .kw { color: #c084fc; }
        #info-panel .code-block .fn { color: #06B6D4; }
        #info-panel .code-block .str { color: #fbbf24; }
        #info-panel .code-block .cm { color: #4a5568; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">&#8592; Back to Gallery</a>

    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>

    <div id="loading">
        <div class="spinner"></div>
        <p>Initializing AlphaEvolve Pipeline...</p>
    </div>

    <div id="error">
        <h2>Error Loading Demo</h2>
        <p id="error-message">An unexpected error occurred. Please refresh the page.</p>
    </div>

    <canvas id="canvas"></canvas>

    <div id="controls">
        <button id="btn-start" class="active">&#9654; Start</button>
        <button id="btn-pause">&#10074;&#10074; Pause</button>
        <button id="btn-reset">&#8635; Reset</button>
        <label>Speed <input type="range" id="speed-slider" min="1" max="10" value="5"></label>
        <span id="gen-display" style="color:#fbbf24; font-weight:600;">Gen 0</span>
    </div>

    <div id="info-panel">
        <h4 id="info-title">Organism</h4>
        <div id="info-body"></div>
    </div>

    <script>
    // Error handling
    window.addEventListener('error', function(e) {
        showError('Runtime Error: ' + e.message);
        console.error(e);
    });

    function showError(message) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error-message').textContent = message;
    }

    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
    }

    // FPS Counter
    var fpsFrames = 0, fpsLast = performance.now(), fpsVal = 0;
    var fpsDisplay = document.getElementById('fps-value');
    var fpsCounter = document.getElementById('fps-counter');

    function updateFPS() {
        fpsFrames++;
        var now = performance.now();
        if (now - fpsLast >= 1000) {
            fpsVal = Math.round((fpsFrames * 1000) / (now - fpsLast));
            fpsFrames = 0;
            fpsLast = now;
            fpsDisplay.textContent = fpsVal;
            fpsDisplay.className = fpsVal >= 55 ? 'fps-good' : fpsVal >= 30 ? 'fps-medium' : 'fps-poor';
        }
    }

    try {
        // Canvas setup
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        if (!ctx) throw new Error('Could not get 2D context');

        var dpr = window.devicePixelRatio || 1;
        var W, H;

        function resizeCanvas() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        resizeCanvas();
        var resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(resizeCanvas, 150);
        });

        // =============================================
        // CONSTANTS & COLORS
        // =============================================
        var CYAN = '#06B6D4';
        var AMBER = '#fbbf24';
        var BG = '#0a0e1a';
        var PANEL_BG = 'rgba(15, 20, 35, 0.8)';

        // Algorithm names and pseudo-code snippets
        var ALGO_NAMES = [
            'CFR-Base', 'NashConv', 'FP-Iter', 'MCCFR', 'Deep-CFR',
            'Regret+', 'RM-Plus', 'Hedge-V', 'EXP3-G', 'Bandit-CFR',
            'Poly-CFR', 'LCFR', 'DCFR', 'OS-MCCFR', 'CS-MCCFR',
            'XFP', 'NFSP', 'DREAM', 'ESCHER', 'ARMAC',
            'VAD-CFR', 'Alpha-MU', 'Evo-Nash', 'Meta-CFR', 'Hyper-RM',
            'Synth-FP', 'Neural-H', 'Fast-BR', 'Opt-RM', 'Mix-CFR'
        ];

        var PSEUDO_CODES = [
            'def update(info_set):\n  regret = compute_regret()\n  strategy += regret.clip(0)\n  return normalize(strategy)',
            'def iterate(tree):\n  for node in tree:\n    v = cfr_value(node)\n    regret[node] += v\n  return avg_strategy()',
            'def evolve(pop):\n  parent = select(pop)\n  child = mutate(parent)\n  child.fitness = eval(child)\n  return replace(pop, child)',
            'def best_response(opp):\n  for state in game:\n    br[state] = argmax(\n      Q(state, a, opp)\n    )\n  return br',
            'def deep_update(net, buf):\n  batch = buf.sample(256)\n  loss = regret_loss(batch)\n  net.backward(loss)\n  return net.params',
            'def meta_learn(tasks):\n  for task in tasks:\n    theta = inner_loop(task)\n    meta_grad += grad(theta)\n  return theta - lr*meta_grad',
            'def sample_outcome(h):\n  a = strategy[h].sample()\n  r = traverse(h, a)\n  regret[h][a] += r - v[h]\n  return r',
            'def neural_hedge(obs):\n  logits = net(obs)\n  pi = softmax(logits/tau)\n  reward = game.step(pi)\n  loss = -log(pi)*reward\n  return loss',
        ];

        var GAME_NAMES = ['Kuhn Poker', 'Goofspiel', 'Leduc Hold\'em', 'Liar\'s Dice'];

        // Pipeline zone boundaries (fractions of W)
        var ZONE_POP = { x1: 0.02, x2: 0.28 };
        var ZONE_MUT = { x1: 0.32, x2: 0.62 };
        var ZONE_EVAL = { x1: 0.66, x2: 0.98 };
        var TIMELINE_H = 100;

        // =============================================
        // ORGANISM CLASS
        // =============================================
        function Organism(id, x, y, fitness) {
            this.id = id;
            this.x = x;
            this.y = y;
            this.targetX = x;
            this.targetY = y;
            this.fitness = fitness || (0.1 + Math.random() * 0.4);
            this.name = ALGO_NAMES[id % ALGO_NAMES.length];
            this.code = PSEUDO_CODES[id % PSEUDO_CODES.length];
            this.radius = 18;
            this.phase = Math.random() * Math.PI * 2;
            this.alive = true;
            this.age = 0;
            this.generation = 0;
            this.mutations = 0;
            // Unique genetic pattern (small array of angles/lengths)
            this.dna = [];
            for (var i = 0; i < 6; i++) {
                this.dna.push({
                    angle: Math.random() * Math.PI * 2,
                    len: 4 + Math.random() * 8,
                    hue: Math.random() * 360
                });
            }
            // State: 'pool', 'selected', 'mutating', 'evaluating', 'returning', 'dying'
            this.state = 'pool';
            this.stateTimer = 0;
            this.glowIntensity = 0;
            this.opacity = 1;
        }

        Organism.prototype.fitnessColor = function() {
            // Red (low) -> Yellow (mid) -> Green (high)
            var f = Math.max(0, Math.min(1, this.fitness));
            var r, g, b;
            if (f < 0.5) {
                r = 220; g = Math.floor(50 + f * 2 * 180); b = 50;
            } else {
                r = Math.floor(220 - (f - 0.5) * 2 * 180); g = 230; b = 50;
            }
            return 'rgb(' + r + ',' + g + ',' + b + ')';
        };

        Organism.prototype.draw = function(ctx, time) {
            if (!this.alive && this.opacity <= 0) return;
            ctx.save();
            ctx.globalAlpha = this.opacity;

            var pulse = Math.sin(time * 2 + this.phase) * 0.12;
            var r = this.radius * (1 + pulse);

            // Glow
            if (this.glowIntensity > 0) {
                var grd = ctx.createRadialGradient(this.x, this.y, r * 0.5, this.x, this.y, r * 3);
                grd.addColorStop(0, this.fitnessColor().replace('rgb', 'rgba').replace(')', ',' + this.glowIntensity * 0.4 + ')'));
                grd.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grd;
                ctx.beginPath();
                ctx.arc(this.x, this.y, r * 3, 0, Math.PI * 2);
                ctx.fill();
            }

            // Outer ring
            ctx.strokeStyle = this.fitnessColor();
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
            ctx.stroke();

            // Inner fill
            var fc = this.fitnessColor();
            ctx.fillStyle = fc.replace('rgb', 'rgba').replace(')', ',0.15)');
            ctx.fill();

            // DNA pattern inside
            ctx.strokeStyle = fc.replace('rgb', 'rgba').replace(')', ',0.5)');
            ctx.lineWidth = 1;
            for (var i = 0; i < this.dna.length; i++) {
                var d = this.dna[i];
                var a = d.angle + time * 0.3;
                var l = d.len * (r / 18);
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + Math.cos(a) * l, this.y + Math.sin(a) * l);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(this.x + Math.cos(a) * l, this.y + Math.sin(a) * l, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Fitness score text
            ctx.fillStyle = '#fff';
            ctx.font = '9px monospace';
            ctx.textAlign = 'center';
            ctx.fillText((this.fitness * 100).toFixed(0), this.x, this.y + r + 14);

            // Name
            ctx.font = '8px sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fillText(this.name, this.x, this.y - r - 6);

            ctx.restore();
        };

        Organism.prototype.update = function(dt) {
            // Move toward target
            var dx = this.targetX - this.x;
            var dy = this.targetY - this.y;
            var speed = 0.06;
            this.x += dx * speed;
            this.y += dy * speed;
            this.age += dt;
            this.stateTimer += dt;

            if (this.state === 'dying') {
                this.opacity -= dt * 2;
                if (this.opacity <= 0) {
                    this.opacity = 0;
                    this.alive = false;
                }
            }

            // Glow decay
            this.glowIntensity *= 0.97;
        };

        // =============================================
        // PARTICLE SYSTEM
        // =============================================
        var particles = [];

        function Particle(x, y, vx, vy, color, life, size) {
            this.x = x;
            this.y = y;
            this.vx = vx;
            this.vy = vy;
            this.color = color;
            this.life = life;
            this.maxLife = life;
            this.size = size || 2;
        }

        function spawnParticles(x, y, count, color, spread, life) {
            for (var i = 0; i < count; i++) {
                var angle = Math.random() * Math.PI * 2;
                var speed = Math.random() * spread;
                particles.push(new Particle(
                    x, y,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed,
                    color,
                    life || (0.5 + Math.random()),
                    1 + Math.random() * 2
                ));
            }
        }

        function spawnBeamParticles(x1, y1, x2, y2, count, color) {
            for (var i = 0; i < count; i++) {
                var t = Math.random();
                var px = x1 + (x2 - x1) * t;
                var py = y1 + (y2 - y1) * t;
                particles.push(new Particle(
                    px, py,
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 20,
                    color,
                    0.3 + Math.random() * 0.4,
                    1 + Math.random() * 1.5
                ));
            }
        }

        function updateParticles(dt) {
            for (var i = particles.length - 1; i >= 0; i--) {
                var p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vx *= 0.98;
                p.vy *= 0.98;
                p.life -= dt;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles(ctx) {
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                var alpha = Math.max(0, p.life / p.maxLife);
                ctx.globalAlpha = alpha * 0.8;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // =============================================
        // EVOLUTION STATE
        // =============================================
        var population = [];
        var generation = 0;
        var running = true;
        var speedMult = 5;
        var evolutionTimer = 0;
        var pipelinePhase = 'idle'; // 'idle', 'selecting', 'mutating', 'evaluating', 'replacing'
        var phaseTimer = 0;
        var selectedParent = null;
        var mutatedChild = null;
        var evalScore = 0;
        var evalTargetScore = 0;
        var evalGame = '';
        var bestFitnessHistory = [];
        var avgFitnessHistory = [];
        var minFitnessHistory = [];
        var discoveries = [];
        var totalEvolved = 0;
        var mutationBeams = [];

        var POP_SIZE = 20;

        function initPopulation() {
            population = [];
            generation = 0;
            evolutionTimer = 0;
            pipelinePhase = 'idle';
            phaseTimer = 0;
            selectedParent = null;
            mutatedChild = null;
            bestFitnessHistory = [];
            avgFitnessHistory = [];
            minFitnessHistory = [];
            discoveries = [];
            totalEvolved = 0;
            particles = [];
            mutationBeams = [];

            var popCenterX = W * (ZONE_POP.x1 + ZONE_POP.x2) / 2;
            var popCenterY = H * 0.45;

            for (var i = 0; i < POP_SIZE; i++) {
                var angle = (i / POP_SIZE) * Math.PI * 2;
                var ring = i < 8 ? 60 : (i < 16 ? 120 : 160);
                var ox = popCenterX + Math.cos(angle) * ring;
                var oy = popCenterY + Math.sin(angle) * ring;
                var org = new Organism(i, ox, oy, 0.05 + Math.random() * 0.35);
                org.generation = 0;
                population.push(org);
            }
            recordFitnessHistory();
        }

        function recordFitnessHistory() {
            var fitnesses = population.filter(function(o) { return o.alive; }).map(function(o) { return o.fitness; });
            if (fitnesses.length === 0) return;
            var best = Math.max.apply(null, fitnesses);
            var worst = Math.min.apply(null, fitnesses);
            var avg = fitnesses.reduce(function(a, b) { return a + b; }, 0) / fitnesses.length;
            bestFitnessHistory.push(best);
            avgFitnessHistory.push(avg);
            minFitnessHistory.push(worst);
        }

        function getPopStats() {
            var fitnesses = population.filter(function(o) { return o.alive; }).map(function(o) { return o.fitness; });
            if (fitnesses.length === 0) return { min: 0, max: 0, avg: 0 };
            return {
                min: Math.min.apply(null, fitnesses),
                max: Math.max.apply(null, fitnesses),
                avg: fitnesses.reduce(function(a, b) { return a + b; }, 0) / fitnesses.length
            };
        }

        // =============================================
        // PIPELINE LOGIC
        // =============================================
        var PHASE_DURATIONS = {
            idle: 0.6,
            selecting: 1.2,
            mutating: 2.5,
            evaluating: 2.0,
            replacing: 1.0
        };

        function advancePipeline(dt) {
            if (!running) return;

            var speedScale = speedMult / 5;
            phaseTimer += dt * speedScale;

            var dur = PHASE_DURATIONS[pipelinePhase];

            if (pipelinePhase === 'idle') {
                if (phaseTimer >= dur) {
                    startSelection();
                }
            } else if (pipelinePhase === 'selecting') {
                // Animate parent moving to mutation chamber
                if (selectedParent) {
                    selectedParent.glowIntensity = 1;
                    if (phaseTimer >= dur) {
                        startMutation();
                    }
                }
            } else if (pipelinePhase === 'mutating') {
                // Particle effects in mutation chamber
                if (selectedParent && mutatedChild) {
                    var mutCenterX = W * (ZONE_MUT.x1 + ZONE_MUT.x2) / 2;
                    var mutCenterY = H * 0.4;
                    if (Math.random() < 0.3) {
                        spawnParticles(mutCenterX + (Math.random() - 0.5) * 80,
                                       mutCenterY + (Math.random() - 0.5) * 80,
                                       3, CYAN, 40, 0.8);
                    }
                    if (Math.random() < 0.15) {
                        spawnParticles(mutCenterX + (Math.random() - 0.5) * 60,
                                       mutCenterY + (Math.random() - 0.5) * 60,
                                       2, AMBER, 30, 0.6);
                    }
                    // Beam effects
                    if (Math.random() < 0.08) {
                        mutationBeams.push({
                            x1: mutCenterX - 40 + Math.random() * 80,
                            y1: mutCenterY - 60,
                            x2: mutCenterX - 40 + Math.random() * 80,
                            y2: mutCenterY + 60,
                            life: 0.3,
                            maxLife: 0.3
                        });
                    }
                    mutatedChild.glowIntensity = Math.sin(phaseTimer * 5) * 0.5 + 0.5;
                }
                if (phaseTimer >= dur) {
                    startEvaluation();
                }
            } else if (pipelinePhase === 'evaluating') {
                // Fill eval bar
                var progress = Math.min(1, phaseTimer / dur);
                evalScore = evalTargetScore * easeOutCubic(progress);

                if (mutatedChild) {
                    mutatedChild.glowIntensity = 0.5;
                    if (Math.random() < 0.15) {
                        var evalCX = W * (ZONE_EVAL.x1 + ZONE_EVAL.x2) / 2;
                        var evalCY = H * 0.4;
                        spawnParticles(evalCX + (Math.random() - 0.5) * 100,
                                       evalCY + (Math.random() - 0.5) * 60,
                                       2, evalTargetScore > 0.6 ? '#10b981' : '#ef4444', 25, 0.5);
                    }
                }

                if (phaseTimer >= dur) {
                    finishEvaluation();
                }
            } else if (pipelinePhase === 'replacing') {
                if (phaseTimer >= dur) {
                    pipelinePhase = 'idle';
                    phaseTimer = 0;
                }
            }
        }

        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function startSelection() {
            pipelinePhase = 'selecting';
            phaseTimer = 0;

            // Tournament selection: pick 3, choose best
            var alive = population.filter(function(o) { return o.alive && o.state === 'pool'; });
            if (alive.length < 3) { pipelinePhase = 'idle'; return; }

            var candidates = [];
            var used = {};
            while (candidates.length < 3) {
                var idx = Math.floor(Math.random() * alive.length);
                if (!used[idx]) {
                    used[idx] = true;
                    candidates.push(alive[idx]);
                }
            }
            candidates.sort(function(a, b) { return b.fitness - a.fitness; });

            // Weighted toward fitter: 60% best, 30% mid, 10% worst
            var r = Math.random();
            selectedParent = r < 0.6 ? candidates[0] : (r < 0.9 ? candidates[1] : candidates[2]);
            selectedParent.state = 'selected';

            // Move parent to mutation zone entrance
            var mutX = W * ZONE_MUT.x1 + 30;
            var mutY = H * 0.4;
            selectedParent.targetX = mutX;
            selectedParent.targetY = mutY;

            spawnParticles(selectedParent.x, selectedParent.y, 15, CYAN, 50, 0.6);
        }

        function startMutation() {
            pipelinePhase = 'mutating';
            phaseTimer = 0;

            var mutCenterX = W * (ZONE_MUT.x1 + ZONE_MUT.x2) / 2;
            var mutCenterY = H * 0.4;

            // Move parent to center
            selectedParent.targetX = mutCenterX - 40;
            selectedParent.targetY = mutCenterY;

            // Create mutated child
            var childId = totalEvolved + POP_SIZE;
            mutatedChild = new Organism(childId, mutCenterX + 40, mutCenterY, selectedParent.fitness);
            mutatedChild.state = 'mutating';
            mutatedChild.name = ALGO_NAMES[childId % ALGO_NAMES.length];
            mutatedChild.code = PSEUDO_CODES[childId % PSEUDO_CODES.length];
            mutatedChild.generation = generation + 1;
            mutatedChild.mutations = selectedParent.mutations + 1;
            mutatedChild.opacity = 0;

            // Mutate DNA visually
            for (var i = 0; i < mutatedChild.dna.length; i++) {
                mutatedChild.dna[i].angle = selectedParent.dna[i % selectedParent.dna.length].angle + (Math.random() - 0.5) * 1.0;
                mutatedChild.dna[i].len = selectedParent.dna[i % selectedParent.dna.length].len + (Math.random() - 0.5) * 4;
                mutatedChild.dna[i].hue = (selectedParent.dna[i % selectedParent.dna.length].hue + Math.random() * 60 - 30 + 360) % 360;
            }

            // Mutate fitness (slight perturbation + possible improvement)
            var fitnessChange = (Math.random() - 0.35) * 0.15; // slightly biased toward improvement
            mutatedChild.fitness = Math.max(0.01, Math.min(0.99, selectedParent.fitness + fitnessChange));

            // Eval target
            evalTargetScore = mutatedChild.fitness;
            evalScore = 0;
            evalGame = GAME_NAMES[Math.floor(Math.random() * GAME_NAMES.length)];

            spawnParticles(mutCenterX, mutCenterY, 30, AMBER, 80, 1.0);
        }

        function startEvaluation() {
            pipelinePhase = 'evaluating';
            phaseTimer = 0;

            var evalCX = W * (ZONE_EVAL.x1 + ZONE_EVAL.x2) / 2;
            var evalCY = H * 0.4;

            if (mutatedChild) {
                mutatedChild.opacity = 1;
                mutatedChild.targetX = evalCX;
                mutatedChild.targetY = evalCY;
            }

            // Return parent to pool
            if (selectedParent) {
                selectedParent.state = 'pool';
                repositionInPool(selectedParent);
            }

            spawnBeamParticles(
                W * ZONE_MUT.x2, H * 0.4,
                W * ZONE_EVAL.x1, H * 0.4,
                20, CYAN
            );
        }

        function finishEvaluation() {
            pipelinePhase = 'replacing';
            phaseTimer = 0;

            if (!mutatedChild) { pipelinePhase = 'idle'; return; }

            // Find weakest in population
            var alive = population.filter(function(o) { return o.alive && o.state === 'pool'; });
            if (alive.length === 0) { pipelinePhase = 'idle'; return; }

            alive.sort(function(a, b) { return a.fitness - b.fitness; });
            var weakest = alive[0];

            if (mutatedChild.fitness > weakest.fitness) {
                // Replace weakest
                weakest.state = 'dying';
                spawnParticles(weakest.x, weakest.y, 20, '#ef4444', 40, 0.8);

                // Add child to population
                mutatedChild.state = 'pool';
                var slot = population.indexOf(weakest);
                mutatedChild.targetX = weakest.targetX;
                mutatedChild.targetY = weakest.targetY;
                population[slot] = mutatedChild;

                spawnParticles(mutatedChild.x, mutatedChild.y, 25, '#10b981', 50, 0.8);

                // Check for discovery milestones
                if (mutatedChild.fitness > 0.85 && Math.random() < 0.3) {
                    discoveries.push({
                        gen: generation,
                        name: mutatedChild.name,
                        fitness: mutatedChild.fitness
                    });
                }
            } else {
                // Child dies
                mutatedChild.state = 'dying';
                mutatedChild.alive = false;
                spawnParticles(mutatedChild.x, mutatedChild.y, 15, '#ef4444', 30, 0.5);
            }

            totalEvolved++;
            generation++;
            recordFitnessHistory();

            // Slight fitness drift for entire population (simulate changing landscape)
            for (var i = 0; i < population.length; i++) {
                if (population[i].alive && population[i].state === 'pool') {
                    population[i].fitness += (Math.random() - 0.5) * 0.005;
                    population[i].fitness = Math.max(0.01, Math.min(0.99, population[i].fitness));
                }
            }

            selectedParent = null;
            mutatedChild = null;

            document.getElementById('gen-display').textContent = 'Gen ' + generation;
        }

        function repositionInPool(org) {
            var popCenterX = W * (ZONE_POP.x1 + ZONE_POP.x2) / 2;
            var popCenterY = H * 0.45;
            var idx = population.indexOf(org);
            var angle = (idx / POP_SIZE) * Math.PI * 2 + Math.random() * 0.3;
            var ring = idx < 8 ? 55 + Math.random() * 15 : (idx < 16 ? 110 + Math.random() * 20 : 155 + Math.random() * 15);
            org.targetX = popCenterX + Math.cos(angle) * ring;
            org.targetY = popCenterY + Math.sin(angle) * ring;
        }

        // =============================================
        // DRAWING
        // =============================================
        function drawBackground(time) {
            ctx.fillStyle = BG;
            ctx.fillRect(0, 0, W, H);

            // Subtle grid
            ctx.strokeStyle = 'rgba(6, 182, 212, 0.04)';
            ctx.lineWidth = 1;
            var gridSize = 40;
            for (var x = 0; x < W; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }
            for (var y = 0; y < H; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }
        }

        function drawZoneLabels(time) {
            var headerY = 55;

            // Title
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('AlphaEvolve: Evolutionary Algorithm Discovery', W / 2, 28);
            ctx.font = '11px sans-serif';
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillText('LLM-guided code evolution for multiagent learning', W / 2, 44);

            // Zone panels
            drawZonePanel('POPULATION POOL', ZONE_POP, headerY, time, CYAN);
            drawZonePanel('LLM MUTATION CHAMBER', ZONE_MUT, headerY, time, AMBER);
            drawZonePanel('EVALUATION ARENA', ZONE_EVAL, headerY, time, '#10b981');
        }

        function drawZonePanel(label, zone, headerY, time, accentColor) {
            var x1 = W * zone.x1;
            var x2 = W * zone.x2;
            var y1 = headerY;
            var y2 = H - TIMELINE_H - 20;

            // Panel background
            ctx.fillStyle = 'rgba(15, 20, 35, 0.5)';
            ctx.strokeStyle = accentColor.replace('#', 'rgba(') ? 'rgba(' +
                parseInt(accentColor.slice(1,3),16) + ',' +
                parseInt(accentColor.slice(3,5),16) + ',' +
                parseInt(accentColor.slice(5,7),16) + ',0.2)' : accentColor;
            ctx.lineWidth = 1;

            roundRect(ctx, x1, y1, x2 - x1, y2 - y1, 12);
            ctx.fill();
            ctx.stroke();

            // Label
            ctx.fillStyle = accentColor;
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(label, (x1 + x2) / 2, y1 + 18);

            // Separator line under label
            ctx.strokeStyle = accentColor.replace('#', 'rgba(') ? 'rgba(' +
                parseInt(accentColor.slice(1,3),16) + ',' +
                parseInt(accentColor.slice(3,5),16) + ',' +
                parseInt(accentColor.slice(5,7),16) + ',0.15)' : accentColor;
            ctx.beginPath();
            ctx.moveTo(x1 + 15, y1 + 26);
            ctx.lineTo(x2 - 15, y1 + 26);
            ctx.stroke();
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function hexToRGBA(hex, alpha) {
            var r = parseInt(hex.slice(1,3), 16);
            var g = parseInt(hex.slice(3,5), 16);
            var b = parseInt(hex.slice(5,7), 16);
            return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
        }

        function drawPopulationStats() {
            var stats = getPopStats();
            var x1 = W * ZONE_POP.x1 + 10;
            var y = H - TIMELINE_H - 50;

            ctx.font = '10px monospace';
            ctx.textAlign = 'left';
            ctx.fillStyle = '#10b981';
            ctx.fillText('Best: ' + (stats.max * 100).toFixed(1) + '%', x1 + 8, y);
            ctx.fillStyle = AMBER;
            ctx.fillText('Avg:  ' + (stats.avg * 100).toFixed(1) + '%', x1 + 8, y + 14);
            ctx.fillStyle = '#ef4444';
            ctx.fillText('Min:  ' + (stats.min * 100).toFixed(1) + '%', x1 + 8, y + 28);
        }

        function drawMutationChamberEffects(time) {
            if (pipelinePhase !== 'mutating') return;

            var cx = W * (ZONE_MUT.x1 + ZONE_MUT.x2) / 2;
            var cy = H * 0.4;

            // Rotating rings
            ctx.save();
            ctx.translate(cx, cy);

            for (var ring = 0; ring < 3; ring++) {
                var r = 50 + ring * 25;
                var a = time * (1 + ring * 0.5) * (ring % 2 === 0 ? 1 : -1);
                ctx.rotate(a * 0.01);
                ctx.strokeStyle = hexToRGBA(CYAN, 0.1 + ring * 0.05);
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 10 + ring * 5]);
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            ctx.restore();

            // Code transformation text
            ctx.font = '9px monospace';
            ctx.fillStyle = hexToRGBA(CYAN, 0.4 + Math.sin(time * 3) * 0.2);
            ctx.textAlign = 'center';

            var codeLines = ['def mutate(code):', '  ast = parse(code)', '  node = select(ast)', '  new = llm.transform(node)', '  return compile(new)'];
            for (var i = 0; i < codeLines.length; i++) {
                var yy = cy + 80 + i * 14;
                var alpha = 0.3 + Math.sin(time * 2 + i * 0.5) * 0.15;
                ctx.fillStyle = hexToRGBA(AMBER, alpha);
                ctx.fillText(codeLines[i], cx, yy);
            }

            // Arrow from parent to child
            if (selectedParent && mutatedChild) {
                ctx.strokeStyle = hexToRGBA(CYAN, 0.3 + Math.sin(time * 4) * 0.15);
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(selectedParent.x + 20, selectedParent.y);
                ctx.lineTo(mutatedChild.x - 20, mutatedChild.y);
                ctx.stroke();
                ctx.setLineDash([]);

                // Fade child in
                mutatedChild.opacity = Math.min(1, phaseTimer / 1.5);
            }

            // Mutation beams
            for (var i = mutationBeams.length - 1; i >= 0; i--) {
                var beam = mutationBeams[i];
                beam.life -= 0.016;
                if (beam.life <= 0) {
                    mutationBeams.splice(i, 1);
                    continue;
                }
                var alpha = beam.life / beam.maxLife;
                ctx.strokeStyle = hexToRGBA(AMBER, alpha * 0.6);
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(beam.x1, beam.y1);
                ctx.lineTo(beam.x2, beam.y2);
                ctx.stroke();
            }
        }

        function drawEvaluationArena(time) {
            var cx = W * (ZONE_EVAL.x1 + ZONE_EVAL.x2) / 2;
            var cy = H * 0.4;
            var panelW = W * (ZONE_EVAL.x2 - ZONE_EVAL.x1) - 30;

            if (pipelinePhase === 'evaluating' || pipelinePhase === 'replacing') {
                // Game board visualization
                var boardX = cx - 60;
                var boardY = cy - 80;
                var boardW = 120;
                var boardH = 80;

                ctx.strokeStyle = hexToRGBA('#10b981', 0.4);
                ctx.lineWidth = 1;
                roundRect(ctx, boardX, boardY, boardW, boardH, 6);
                ctx.stroke();

                ctx.font = '10px sans-serif';
                ctx.fillStyle = hexToRGBA('#10b981', 0.7);
                ctx.textAlign = 'center';
                ctx.fillText('Testing: ' + evalGame, cx, boardY - 8);

                // Card-like elements inside
                for (var c = 0; c < 4; c++) {
                    var cardX = boardX + 10 + c * 28;
                    var cardY = boardY + 15;
                    var revealed = Math.random() < (phaseTimer / PHASE_DURATIONS.evaluating);

                    ctx.fillStyle = revealed ? hexToRGBA(CYAN, 0.3) : hexToRGBA('#fff', 0.05);
                    ctx.strokeStyle = hexToRGBA('#fff', 0.2);
                    ctx.lineWidth = 1;
                    roundRect(ctx, cardX, cardY, 22, 32, 3);
                    ctx.fill();
                    ctx.stroke();

                    if (revealed) {
                        ctx.font = 'bold 12px monospace';
                        ctx.fillStyle = '#fff';
                        ctx.textAlign = 'center';
                        ctx.fillText(['A','K','Q','J'][c], cardX + 11, cardY + 22);
                    }
                }

                // Fitness bar
                var barX = cx - panelW * 0.35;
                var barY = cy + 30;
                var barW = panelW * 0.7;
                var barH = 14;

                ctx.fillStyle = 'rgba(255,255,255,0.05)';
                roundRect(ctx, barX, barY, barW, barH, 4);
                ctx.fill();

                var fillW = barW * evalScore;
                var barColor = evalScore < 0.4 ? '#ef4444' : evalScore < 0.7 ? AMBER : '#10b981';
                ctx.fillStyle = barColor;
                roundRect(ctx, barX, barY, Math.max(0, fillW), barH, 4);
                ctx.fill();

                ctx.font = 'bold 10px monospace';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.fillText('Fitness: ' + (evalScore * 100).toFixed(1) + '%', cx, barY + 11);

                // Exploitability
                var expl = Math.max(0, (1 - evalScore) * 0.5 + Math.random() * 0.02);
                ctx.font = '10px monospace';
                ctx.fillStyle = hexToRGBA('#fff', 0.6);
                ctx.fillText('Exploitability: ' + expl.toFixed(3), cx, barY + 32);
            } else {
                // Idle state
                ctx.font = '11px sans-serif';
                ctx.fillStyle = hexToRGBA('#10b981', 0.3);
                ctx.textAlign = 'center';
                ctx.fillText('Awaiting candidate...', cx, cy);
            }
        }

        function drawTimeline(time) {
            var tlY = H - TIMELINE_H;
            var tlH = TIMELINE_H - 15;
            var tlX = 15;
            var tlW = W - 30;

            // Timeline background
            ctx.fillStyle = 'rgba(15, 20, 35, 0.7)';
            roundRect(ctx, tlX, tlY, tlW, tlH, 10);
            ctx.fill();
            ctx.strokeStyle = hexToRGBA(CYAN, 0.15);
            ctx.lineWidth = 1;
            roundRect(ctx, tlX, tlY, tlW, tlH, 10);
            ctx.stroke();

            // Label
            ctx.font = 'bold 10px sans-serif';
            ctx.fillStyle = CYAN;
            ctx.textAlign = 'left';
            ctx.fillText('EVOLUTION TIMELINE', tlX + 12, tlY + 16);

            ctx.font = '9px monospace';
            ctx.fillStyle = hexToRGBA('#fff', 0.4);
            ctx.textAlign = 'right';
            ctx.fillText('Gen ' + generation, tlX + tlW - 12, tlY + 16);

            // Chart area
            var chartX = tlX + 12;
            var chartY = tlY + 24;
            var chartW = tlW - 24;
            var chartH = tlH - 32;

            if (bestFitnessHistory.length < 2) return;

            // Axes
            ctx.strokeStyle = hexToRGBA('#fff', 0.1);
            ctx.beginPath();
            ctx.moveTo(chartX, chartY);
            ctx.lineTo(chartX, chartY + chartH);
            ctx.lineTo(chartX + chartW, chartY + chartH);
            ctx.stroke();

            // Scale labels
            ctx.font = '8px monospace';
            ctx.fillStyle = hexToRGBA('#fff', 0.3);
            ctx.textAlign = 'right';
            ctx.fillText('100%', chartX - 3, chartY + 4);
            ctx.fillText('0%', chartX - 3, chartY + chartH + 4);

            // Draw fitness lines (show last N data points)
            var maxPoints = Math.min(bestFitnessHistory.length, Math.floor(chartW / 2));
            var startIdx = Math.max(0, bestFitnessHistory.length - maxPoints);
            var step = chartW / Math.max(1, maxPoints - 1);

            // Fill area between min and max
            ctx.fillStyle = hexToRGBA(CYAN, 0.05);
            ctx.beginPath();
            for (var i = 0; i < maxPoints; i++) {
                var dataIdx = startIdx + i;
                var px = chartX + i * step;
                var pyBest = chartY + chartH - bestFitnessHistory[dataIdx] * chartH;
                if (i === 0) ctx.moveTo(px, pyBest);
                else ctx.lineTo(px, pyBest);
            }
            for (var i = maxPoints - 1; i >= 0; i--) {
                var dataIdx = startIdx + i;
                var px = chartX + i * step;
                var pyMin = chartY + chartH - minFitnessHistory[dataIdx] * chartH;
                ctx.lineTo(px, pyMin);
            }
            ctx.closePath();
            ctx.fill();

            // Best line
            drawLine(ctx, bestFitnessHistory, startIdx, maxPoints, step, chartX, chartY, chartH, '#10b981', 1.5);
            // Avg line
            drawLine(ctx, avgFitnessHistory, startIdx, maxPoints, step, chartX, chartY, chartH, AMBER, 1);
            // Min line
            drawLine(ctx, minFitnessHistory, startIdx, maxPoints, step, chartX, chartY, chartH, '#ef4444', 0.8);

            // Legend
            var legX = chartX + chartW - 120;
            var legY = chartY + 4;
            ctx.font = '8px sans-serif';

            ctx.fillStyle = '#10b981';
            ctx.fillRect(legX, legY - 3, 8, 2);
            ctx.fillText('Best', legX + 12, legY);

            ctx.fillStyle = AMBER;
            ctx.fillRect(legX + 40, legY - 3, 8, 2);
            ctx.fillText('Avg', legX + 52, legY);

            ctx.fillStyle = '#ef4444';
            ctx.fillRect(legX + 78, legY - 3, 8, 2);
            ctx.fillText('Min', legX + 90, legY);

            // Discovery markers
            for (var d = 0; d < discoveries.length; d++) {
                var disc = discoveries[d];
                var discIdx = disc.gen - startIdx;
                if (discIdx < 0 || discIdx >= maxPoints) continue;
                var dx = chartX + discIdx * step;
                var dy = chartY + chartH - disc.fitness * chartH;

                ctx.fillStyle = AMBER;
                ctx.beginPath();
                ctx.moveTo(dx, dy - 6);
                ctx.lineTo(dx + 4, dy);
                ctx.lineTo(dx, dy + 4);
                ctx.lineTo(dx - 4, dy);
                ctx.closePath();
                ctx.fill();

                ctx.font = '7px sans-serif';
                ctx.fillStyle = AMBER;
                ctx.textAlign = 'center';
                ctx.fillText(disc.name + '!', dx, dy - 10);
            }
        }

        function drawLine(ctx, data, startIdx, count, step, chartX, chartY, chartH, color, width) {
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.beginPath();
            for (var i = 0; i < count; i++) {
                var dataIdx = startIdx + i;
                if (dataIdx >= data.length) break;
                var px = chartX + i * step;
                var py = chartY + chartH - data[dataIdx] * chartH;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();
        }

        function drawFlowArrows(time) {
            // Arrow from Population to Mutation
            drawFlowArrow(
                W * ZONE_POP.x2 + 5, H * 0.4,
                W * ZONE_MUT.x1 - 5, H * 0.4,
                time, CYAN, pipelinePhase === 'selecting' ? 0.8 : 0.15
            );

            // Arrow from Mutation to Evaluation
            drawFlowArrow(
                W * ZONE_MUT.x2 + 5, H * 0.4,
                W * ZONE_EVAL.x1 - 5, H * 0.4,
                time, AMBER, pipelinePhase === 'evaluating' ? 0.8 : 0.15
            );

            // Return arrow (eval -> pop, curved)
            var retAlpha = pipelinePhase === 'replacing' ? 0.6 : 0.08;
            ctx.strokeStyle = hexToRGBA('#10b981', retAlpha);
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 6]);
            ctx.beginPath();
            var retY = H - TIMELINE_H - 35;
            ctx.moveTo(W * ZONE_EVAL.x1, retY);
            ctx.quadraticCurveTo(W * 0.5, retY + 30, W * ZONE_POP.x2, retY);
            ctx.stroke();
            ctx.setLineDash([]);

            // Return arrow label
            if (pipelinePhase === 'replacing') {
                ctx.font = '9px sans-serif';
                ctx.fillStyle = hexToRGBA('#10b981', 0.7);
                ctx.textAlign = 'center';
                ctx.fillText('Replace weakest', W * 0.5, retY + 22);
            }
        }

        function drawFlowArrow(x1, y1, x2, y2, time, color, alpha) {
            var gap = x2 - x1;
            // Animated dashes
            ctx.strokeStyle = hexToRGBA(color, alpha);
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 8]);
            ctx.lineDashOffset = -time * 40;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.lineDashOffset = 0;

            // Arrow head
            ctx.fillStyle = hexToRGBA(color, alpha);
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2 - 8, y2 - 5);
            ctx.lineTo(x2 - 8, y2 + 5);
            ctx.closePath();
            ctx.fill();
        }

        function drawPhaseIndicator(time) {
            var phases = ['selecting', 'mutating', 'evaluating', 'replacing'];
            var labels = ['1. Select Parent', '2. LLM Mutation', '3. Evaluate Fitness', '4. Replace Weakest'];
            var colors = [CYAN, AMBER, '#10b981', '#c084fc'];

            var indicatorY = 53;
            var totalW = 340;
            var startX = (W - totalW) / 2;
            var segW = totalW / phases.length;

            for (var i = 0; i < phases.length; i++) {
                var sx = startX + i * segW;
                var isActive = pipelinePhase === phases[i];
                var alpha = isActive ? 1 : 0.3;

                ctx.fillStyle = hexToRGBA(colors[i], alpha * 0.15);
                roundRect(ctx, sx + 2, indicatorY, segW - 4, 20, 4);
                ctx.fill();

                if (isActive) {
                    ctx.strokeStyle = hexToRGBA(colors[i], 0.6);
                    ctx.lineWidth = 1;
                    roundRect(ctx, sx + 2, indicatorY, segW - 4, 20, 4);
                    ctx.stroke();
                }

                ctx.font = (isActive ? 'bold ' : '') + '9px sans-serif';
                ctx.fillStyle = hexToRGBA(colors[i], alpha);
                ctx.textAlign = 'center';
                ctx.fillText(labels[i], sx + segW / 2, indicatorY + 13);
            }
        }

        // =============================================
        // INTERACTION
        // =============================================
        var hoveredOrganism = null;
        var mouseX = 0, mouseY = 0;
        var infoPanel = document.getElementById('info-panel');
        var infoTitle = document.getElementById('info-title');
        var infoBody = document.getElementById('info-body');

        canvas.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
            hoveredOrganism = null;

            for (var i = 0; i < population.length; i++) {
                var org = population[i];
                if (!org.alive) continue;
                var dx = mouseX - org.x;
                var dy = mouseY - org.y;
                if (dx * dx + dy * dy < (org.radius + 5) * (org.radius + 5)) {
                    hoveredOrganism = org;
                    break;
                }
            }

            // Check mutated child too
            if (!hoveredOrganism && mutatedChild && mutatedChild.opacity > 0.5) {
                var dx = mouseX - mutatedChild.x;
                var dy = mouseY - mutatedChild.y;
                if (dx * dx + dy * dy < 900) {
                    hoveredOrganism = mutatedChild;
                }
            }

            if (hoveredOrganism) {
                updateInfoPanel(hoveredOrganism);
                canvas.style.cursor = 'pointer';
            } else {
                infoPanel.style.display = 'none';
                canvas.style.cursor = 'default';
            }
        });

        canvas.addEventListener('click', function(e) {
            if (hoveredOrganism) {
                // Already showing info via hover, add a pulse
                hoveredOrganism.glowIntensity = 1;
                spawnParticles(hoveredOrganism.x, hoveredOrganism.y, 10, CYAN, 30, 0.5);
            }
        });

        function updateInfoPanel(org) {
            infoPanel.style.display = 'block';

            // Position panel near organism but within viewport
            var panelX = Math.min(org.x + 30, W - 320);
            var panelY = Math.min(org.y - 20, H - 280);
            panelX = Math.max(10, panelX);
            panelY = Math.max(10, panelY);

            infoPanel.style.left = panelX + 'px';
            infoPanel.style.top = panelY + 'px';

            infoTitle.textContent = org.name;

            var fitnessPercent = (org.fitness * 100).toFixed(1);
            var barColor = org.fitness < 0.4 ? '#ef4444' : org.fitness < 0.7 ? AMBER : '#10b981';

            infoBody.innerHTML =
                '<div style="color:' + hexToRGBA('#fff', 0.6) + ';margin-bottom:4px;">Gen ' + org.generation + ' | Mutations: ' + org.mutations + '</div>' +
                '<div style="color:' + hexToRGBA('#fff', 0.7) + ';">Fitness: ' + fitnessPercent + '%</div>' +
                '<div class="fitness-bar"><div class="fitness-fill" style="width:' + fitnessPercent + '%;background:' + barColor + ';"></div></div>' +
                '<div style="color:' + hexToRGBA('#fff', 0.5) + ';font-size:10px;margin-top:4px;">State: ' + org.state + '</div>' +
                '<div class="code-block">' + escapeHtml(org.code) + '</div>';
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Controls
        var btnStart = document.getElementById('btn-start');
        var btnPause = document.getElementById('btn-pause');
        var btnReset = document.getElementById('btn-reset');
        var speedSlider = document.getElementById('speed-slider');

        btnStart.addEventListener('click', function() {
            running = true;
            btnStart.classList.add('active');
            btnPause.classList.remove('active');
        });

        btnPause.addEventListener('click', function() {
            running = false;
            btnPause.classList.add('active');
            btnStart.classList.remove('active');
        });

        btnReset.addEventListener('click', function() {
            initPopulation();
            running = true;
            btnStart.classList.add('active');
            btnPause.classList.remove('active');
            document.getElementById('gen-display').textContent = 'Gen 0';
        });

        speedSlider.addEventListener('input', function() {
            speedMult = parseInt(this.value);
        });

        // =============================================
        // MAIN LOOP
        // =============================================
        var lastTime = performance.now();
        var animTime = 0;

        function animate(timestamp) {
            var dt = Math.min(0.05, (timestamp - lastTime) / 1000);
            lastTime = timestamp;
            animTime += dt;

            updateFPS();

            // Update pipeline
            advancePipeline(dt);

            // Update organisms
            for (var i = 0; i < population.length; i++) {
                population[i].update(dt);
            }
            if (mutatedChild && mutatedChild.state === 'mutating') {
                mutatedChild.update(dt);
            }
            if (mutatedChild && mutatedChild.state === 'evaluating') {
                mutatedChild.update(dt);
            }

            // Update particles
            updateParticles(dt);

            // Draw
            drawBackground(animTime);
            drawZoneLabels(animTime);
            drawPhaseIndicator(animTime);
            drawFlowArrows(animTime);
            drawMutationChamberEffects(animTime);
            drawEvaluationArena(animTime);

            // Draw organisms
            for (var i = 0; i < population.length; i++) {
                population[i].draw(ctx, animTime);
            }
            if (mutatedChild && mutatedChild.opacity > 0) {
                mutatedChild.draw(ctx, animTime);
            }

            drawParticles(ctx);
            drawPopulationStats();
            drawTimeline(animTime);

            requestAnimationFrame(animate);
        }

        // Initialize
        initPopulation();
        hideLoading();
        fpsCounter.style.display = 'block';
        requestAnimationFrame(animate);

    } catch (error) {
        showError('Initialization Error: ' + error.message);
        console.error(error);
    }
    </script>
</body>
</html>
