<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Election Results Map - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 8px 16px; background: rgba(255,255,255,0.7);
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-family: 'Lora', serif; text-align: center; color: var(--moss); font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: var(--sage); margin-bottom: 1.5rem; }
        .chart-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 1rem; }
        .btn {
            font-family: 'Nunito', sans-serif; font-size: 0.85rem;
            padding: 8px 18px; border-radius: 20px; border: 2px solid var(--sage);
            background: rgba(255,255,255,0.6); color: var(--moss); cursor: pointer;
            font-weight: 600; transition: all 0.3s ease;
        }
        .btn:hover { background: var(--sage); color: white; }
        .scoreboard {
            display: flex; justify-content: center; gap: 40px; margin-bottom: 16px;
            font-size: 1.1rem; font-weight: 700;
        }
        .score-dem { color: #2166ac; }
        .score-rep { color: #b2182b; }
        .score-num { font-family: 'Lora', serif; font-size: 2rem; }
        .tooltip {
            position: absolute; pointer-events: none; background: rgba(61,68,35,0.92);
            color: var(--cream); padding: 10px 14px; border-radius: 10px;
            font-size: 0.8rem; line-height: 1.5; z-index: 100;
        }
        svg text { font-family: 'Nunito', sans-serif; }
        .state { stroke: white; stroke-width: 1; cursor: pointer; transition: opacity 0.3s; }
        .state.unrevealed { fill: #ddd; }
        .progress-text { text-align: center; color: var(--sage); font-size: 0.85rem; margin-top: 8px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="container">
        <h1>Animated Election Results</h1>
        <p class="subtitle">2020 US Presidential Election — watch states come in one by one</p>
        <div class="controls">
            <button class="btn" id="playBtn">Play</button>
            <button class="btn" id="resetBtn">Reset</button>
            <button class="btn" id="showAllBtn">Show All</button>
        </div>
        <div class="chart-container">
            <div class="scoreboard">
                <div class="score-dem">
                    <div>Biden (D)</div>
                    <div class="score-num" id="demScore">0</div>
                </div>
                <div style="color:var(--sage); font-size:0.9rem; align-self:center;">270 to win</div>
                <div class="score-rep">
                    <div>Trump (R)</div>
                    <div class="score-num" id="repScore">0</div>
                </div>
            </div>
            <div id="chart" style="text-align:center;"></div>
            <div class="progress-text" id="progress">0 / 51 states called</div>
        </div>
    </div>
    <div class="tooltip" id="tooltip" style="display:none;"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    (function() {
        // 2020 Election results by state
        // winner: D=Democrat, R=Republican, ev=electoral votes, margin=winning margin %
        const results = [
            {st:"AL",name:"Alabama",winner:"R",ev:9,margin:25.5},
            {st:"AK",name:"Alaska",winner:"R",ev:3,margin:10.1},
            {st:"AZ",name:"Arizona",winner:"D",ev:11,margin:0.3},
            {st:"AR",name:"Arkansas",winner:"R",ev:6,margin:27.6},
            {st:"CA",name:"California",winner:"D",ev:55,margin:29.2},
            {st:"CO",name:"Colorado",winner:"D",ev:9,margin:13.5},
            {st:"CT",name:"Connecticut",winner:"D",ev:7,margin:20.1},
            {st:"DE",name:"Delaware",winner:"D",ev:3,margin:18.8},
            {st:"DC",name:"District of Columbia",winner:"D",ev:3,margin:86.8},
            {st:"FL",name:"Florida",winner:"R",ev:30,margin:3.4},
            {st:"GA",name:"Georgia",winner:"D",ev:16,margin:0.2},
            {st:"HI",name:"Hawaii",winner:"D",ev:4,margin:29.5},
            {st:"ID",name:"Idaho",winner:"R",ev:4,margin:30.8},
            {st:"IL",name:"Illinois",winner:"D",ev:20,margin:17.0},
            {st:"IN",name:"Indiana",winner:"R",ev:11,margin:16.1},
            {st:"IA",name:"Iowa",winner:"R",ev:6,margin:8.2},
            {st:"KS",name:"Kansas",winner:"R",ev:6,margin:14.7},
            {st:"KY",name:"Kentucky",winner:"R",ev:8,margin:25.9},
            {st:"LA",name:"Louisiana",winner:"R",ev:8,margin:18.6},
            {st:"ME",name:"Maine",winner:"D",ev:4,margin:9.1},
            {st:"MD",name:"Maryland",winner:"D",ev:10,margin:33.5},
            {st:"MA",name:"Massachusetts",winner:"D",ev:11,margin:33.5},
            {st:"MI",name:"Michigan",winner:"D",ev:16,margin:2.8},
            {st:"MN",name:"Minnesota",winner:"D",ev:10,margin:7.1},
            {st:"MS",name:"Mississippi",winner:"R",ev:6,margin:16.5},
            {st:"MO",name:"Missouri",winner:"R",ev:10,margin:15.4},
            {st:"MT",name:"Montana",winner:"R",ev:4,margin:16.4},
            {st:"NE",name:"Nebraska",winner:"R",ev:5,margin:19.2},
            {st:"NV",name:"Nevada",winner:"D",ev:6,margin:2.4},
            {st:"NH",name:"New Hampshire",winner:"D",ev:4,margin:7.4},
            {st:"NJ",name:"New Jersey",winner:"D",ev:14,margin:15.9},
            {st:"NM",name:"New Mexico",winner:"D",ev:5,margin:10.8},
            {st:"NY",name:"New York",winner:"D",ev:29,margin:23.1},
            {st:"NC",name:"North Carolina",winner:"R",ev:15,margin:1.3},
            {st:"ND",name:"North Dakota",winner:"R",ev:3,margin:33.4},
            {st:"OH",name:"Ohio",winner:"R",ev:18,margin:8.0},
            {st:"OK",name:"Oklahoma",winner:"R",ev:7,margin:33.1},
            {st:"OR",name:"Oregon",winner:"D",ev:7,margin:16.1},
            {st:"PA",name:"Pennsylvania",winner:"D",ev:20,margin:1.2},
            {st:"RI",name:"Rhode Island",winner:"D",ev:4,margin:20.7},
            {st:"SC",name:"South Carolina",winner:"R",ev:9,margin:11.7},
            {st:"SD",name:"South Dakota",winner:"R",ev:3,margin:26.2},
            {st:"TN",name:"Tennessee",winner:"R",ev:11,margin:23.3},
            {st:"TX",name:"Texas",winner:"R",ev:40,margin:5.6},
            {st:"UT",name:"Utah",winner:"R",ev:6,margin:20.5},
            {st:"VT",name:"Vermont",winner:"D",ev:3,margin:35.4},
            {st:"VA",name:"Virginia",winner:"D",ev:13,margin:10.1},
            {st:"WA",name:"Washington",winner:"D",ev:12,margin:19.2},
            {st:"WV",name:"West Virginia",winner:"R",ev:5,margin:38.9},
            {st:"WI",name:"Wisconsin",winner:"D",ev:10,margin:0.6},
            {st:"WY",name:"Wyoming",winner:"R",ev:3,margin:43.4}
        ];

        // Simplified US state positions (tile grid map)
        const stateGrid = {
            AK:[0,0],HI:[0,9],ME:[10,0],VT:[9,1],NH:[10,1],WA:[1,1],MT:[2,1],ND:[3,1],
            MN:[4,1],WI:[5,1],MI:[7,1],NY:[9,2],MA:[10,2],OR:[1,2],ID:[2,2],WY:[3,2],
            SD:[4,2],IA:[5,2],IN:[6,2],OH:[7,2],PA:[8,2],NJ:[9,3],CT:[10,3],
            CA:[1,3],NV:[2,3],UT:[3,3],CO:[4,3],NE:[5,3],IL:[6,3],WV:[7,3],VA:[8,3],
            MD:[9,4],DE:[10,4],AZ:[2,4],NM:[3,4],KS:[4,4],MO:[5,4],KY:[6,4],
            TN:[7,4],NC:[8,4],DC:[9,5],RI:[10,5],OK:[4,5],AR:[5,5],
            MS:[6,5],AL:[7,5],GA:[8,5],SC:[9,6],TX:[3,6],LA:[5,6],FL:[8,6]
        };

        const width = Math.min(900, window.innerWidth - 80);
        const cellSize = Math.min(width / 12, 65);
        const height = cellSize * 10 + 20;

        const svg = d3.select("#chart").append("svg")
            .attr("width", width).attr("height", height)
          .append("g")
            .attr("transform", `translate(${(width - cellSize * 11) / 2}, 10)`);

        const tooltip = d3.select("#tooltip");
        const demColorScale = d3.scaleLinear().domain([0, 50, 90]).range(["#92c5de", "#2166ac", "#053061"]);
        const repColorScale = d3.scaleLinear().domain([0, 50, 90]).range(["#f4a582", "#b2182b", "#67001f"]);

        const stateMap = {};
        results.forEach(r => { stateMap[r.st] = r; });

        const revealed = new Set();
        let demEV = 0, repEV = 0;

        // Draw state tiles
        const tiles = svg.selectAll(".state-tile")
            .data(results).join("g")
            .attr("transform", d => {
                const pos = stateGrid[d.st] || [0, 0];
                return `translate(${pos[0] * cellSize},${pos[1] * cellSize})`;
            });

        tiles.append("rect")
            .attr("class", "state unrevealed")
            .attr("width", cellSize - 2).attr("height", cellSize - 2)
            .attr("rx", 4)
            .on("mouseover", function(event, d) {
                tooltip.style("display", "block").html(
                    `<strong>${d.name}</strong><br>Electoral votes: ${d.ev}<br>${revealed.has(d.st) ? `Winner: ${d.winner === 'D' ? 'Biden' : 'Trump'}<br>Margin: ${d.margin}%` : 'Not yet called'}`
                );
            })
            .on("mousemove", function(event) {
                tooltip.style("left", (event.pageX + 14) + "px").style("top", (event.pageY - 14) + "px");
            })
            .on("mouseout", function() { tooltip.style("display", "none"); });

        tiles.append("text")
            .attr("x", (cellSize - 2) / 2).attr("y", (cellSize - 2) / 2)
            .attr("text-anchor", "middle").attr("dominant-baseline", "central")
            .style("font-size", cellSize > 50 ? "12px" : "10px")
            .style("font-weight", "700").style("fill", "var(--dark-moss)")
            .style("pointer-events", "none")
            .text(d => d.st);

        tiles.append("text")
            .attr("x", (cellSize - 2) / 2).attr("y", (cellSize - 2) / 2 + 14)
            .attr("text-anchor", "middle").attr("dominant-baseline", "central")
            .style("font-size", "9px").style("fill", "var(--moss)")
            .style("pointer-events", "none")
            .text(d => d.ev);

        function revealState(st) {
            const d = stateMap[st];
            if (!d || revealed.has(st)) return;
            revealed.add(st);

            const color = d.winner === "D"
                ? demColorScale(d.margin)
                : repColorScale(d.margin);

            tiles.filter(t => t.st === st)
                .select("rect")
                .classed("unrevealed", false)
                .transition().duration(400)
                .attr("fill", color)
                .attr("opacity", 0).transition().duration(200).attr("opacity", 1);

            if (d.winner === "D") demEV += d.ev; else repEV += d.ev;
            d3.select("#demScore").text(demEV);
            d3.select("#repScore").text(repEV);
            d3.select("#progress").text(`${revealed.size} / 51 states called`);
        }

        // Shuffle order for animation (mix of safe + swing states)
        const callOrder = results.map(r => r.st).sort(() => Math.random() - 0.5);

        let timer = null, idx = 0;
        d3.select("#playBtn").on("click", function() {
            if (timer) { clearInterval(timer); timer = null; d3.select(this).text("Play"); return; }
            d3.select(this).text("Pause");
            timer = setInterval(() => {
                if (idx >= callOrder.length) {
                    clearInterval(timer); timer = null;
                    d3.select("#playBtn").text("Play");
                    return;
                }
                revealState(callOrder[idx]);
                idx++;
            }, 300);
        });

        d3.select("#resetBtn").on("click", function() {
            if (timer) { clearInterval(timer); timer = null; }
            d3.select("#playBtn").text("Play");
            idx = 0; demEV = 0; repEV = 0;
            revealed.clear();
            tiles.select("rect").classed("unrevealed", true).attr("fill", "#ddd").attr("opacity", 1);
            d3.select("#demScore").text(0);
            d3.select("#repScore").text(0);
            d3.select("#progress").text("0 / 51 states called");
        });

        d3.select("#showAllBtn").on("click", function() {
            if (timer) { clearInterval(timer); timer = null; }
            d3.select("#playBtn").text("Play");
            results.forEach(r => revealState(r.st));
            idx = callOrder.length;
        });
    })();
    </script>
</body>
</html>
