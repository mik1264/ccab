<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phylogenetic Tree of Life - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #606C38; min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #606C38; text-decoration: none; font-weight: 600;
            font-family: 'Nunito', sans-serif; z-index: 1000;
            background: rgba(254,250,224,0.9); padding: 8px 16px;
            border-radius: 20px; border: 1px solid rgba(138,154,91,0.3);
            transition: all 0.3s;
        }
        .back-link:hover { background: #8A9A5B; color: #FEFAE0; }
        h1 {
            font-family: 'Lora', serif; text-align: center;
            color: #606C38; font-size: 2rem; padding: 20px 0 5px;
        }
        .subtitle { text-align: center; color: #8A9A5B; font-size: 0.95rem; margin-bottom: 5px; }
        .chart-container { display: flex; justify-content: center; padding: 5px; overflow: hidden; }
        svg { max-width: 100%; height: auto; }
        .controls {
            display: flex; gap: 12px; justify-content: center;
            margin: 8px 0; flex-wrap: wrap;
        }
        .btn {
            font-family: 'Nunito', sans-serif; padding: 6px 16px;
            border: 2px solid #8A9A5B; background: rgba(138,154,91,0.1);
            color: #606C38; border-radius: 20px; cursor: pointer;
            font-weight: 600; transition: all 0.3s; font-size: 0.85rem;
        }
        .btn:hover, .btn.active { background: #8A9A5B; color: #FEFAE0; }
        .legend {
            display: flex; gap: 12px; justify-content: center;
            font-size: 0.8rem; flex-wrap: wrap; margin: 5px 0;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .tooltip {
            position: absolute; background: rgba(254,250,224,0.95);
            border: 1px solid #8A9A5B; border-radius: 8px;
            padding: 10px 14px; font-size: 0.85rem; pointer-events: none;
            opacity: 0; color: #606C38; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Gallery</a>
    <h1>Phylogenetic Tree of Life</h1>
    <p class="subtitle">~100 representative species across all kingdoms — click nodes to collapse/expand</p>
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#DDA15E"></div> Bacteria</div>
        <div class="legend-item"><div class="legend-dot" style="background:#d6604d"></div> Archaea</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8A9A5B"></div> Plants</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8d6e63"></div> Fungi</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4393c3"></div> Animals</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8073ac"></div> Protists</div>
    </div>
    <div class="controls">
        <button class="btn active" id="radialBtn">Radial</button>
        <button class="btn" id="rectBtn">Rectangular</button>
        <button class="btn" id="expandBtn">Expand All</button>
        <button class="btn" id="collapseBtn">Collapse All</button>
    </div>
    <div class="chart-container">
        <svg id="chart"></svg>
    </div>
    <div class="tooltip" id="tooltip"></div>

<script>
// Tree of Life data — hierarchical structure with ~100 species
const treeData = {

            {name: "Firmicutes", common: "Gram-positive", kingdom: "Bacteria", mya: 2800, children: [

                {name: "Lactobacillus", common: "Probiotic", kingdom: "Bacteria", mya: 0},

            ]},
            {name: "Actinobacteria", common: "Actinobacteria", kingdom: "Bacteria", mya: 2700, children: [
                {name: "Streptomyces", common: "Antibiotic producer", kingdom: "Bacteria", mya: 0},
                {name: "Mycobacterium", common: "TB bacterium", kingdom: "Bacteria", mya: 0}
            ]}
        ]},
        {name: "Archaea", common: "Archaea", kingdom: "Archaea", mya: 3500, children: [

                {name: "Methanobacterium", common: "Methane producer", kingdom: "Archaea", mya: 0},

        {name: "Eukaryota", common: "Eukaryotes", kingdom: "Root", mya: 2100, children: [
            {name: "Protista", common: "Protists", kingdom: "Protists", mya: 1800, children: [

                    {name: "Dictyostelium", common: "Slime mold", kingdom: "Protists", mya: 0}
                ]},
                {name: "Alveolata", common: "Alveolates", kingdom: "Protists", mya: 1200, children: [

                    {name: "Plasmodium", common: "Malaria parasite", kingdom: "Protists", mya: 0},
                    {name: "Dinoflagellata", common: "Dinoflagellates", kingdom: "Protists", mya: 0}
                ]},
                {name: "Euglenozoa", common: "Euglenids", kingdom: "Protists", mya: 1000, children: [
                    {name: "Euglena", common: "Euglena", kingdom: "Protists", mya: 0},
                    {name: "Trypanosoma", common: "Sleeping sickness", kingdom: "Protists", mya: 0}
                ]}
            ]},
            {name: "Plantae", common: "Plants", kingdom: "Plants", mya: 1500, children: [
                {name: "Bryophytes", common: "Mosses", kingdom: "Plants", mya: 470, children: [
                    {name: "Sphagnum", common: "Peat moss", kingdom: "Plants", mya: 0},
                    {name: "Polytrichum", common: "Haircap moss", kingdom: "Plants", mya: 0}
                ]},
                {name: "Ferns", common: "Ferns", kingdom: "Plants", mya: 360, children: [
                    {name: "Pteridium", common: "Bracken fern", kingdom: "Plants", mya: 0},
                    {name: "Adiantum", common: "Maidenhair fern", kingdom: "Plants", mya: 0}
                ]},
                {name: "Gymnosperms", common: "Conifers & relatives", kingdom: "Plants", mya: 310, children: [
                    {name: "Pinus", common: "Pine tree", kingdom: "Plants", mya: 0},
                    {name: "Ginkgo", common: "Ginkgo", kingdom: "Plants", mya: 0},
                    {name: "Cycas", common: "Cycad", kingdom: "Plants", mya: 0}
                ]},
                {name: "Angiosperms", common: "Flowering plants", kingdom: "Plants", mya: 140, children: [
                    {name: "Arabidopsis", common: "Thale cress", kingdom: "Plants", mya: 0},
                    {name: "Oryza", common: "Rice", kingdom: "Plants", mya: 0},
                    {name: "Quercus", common: "Oak tree", kingdom: "Plants", mya: 0},
                    {name: "Rosa", common: "Rose", kingdom: "Plants", mya: 0},
                    {name: "Zea", common: "Corn/Maize", kingdom: "Plants", mya: 0}
                ]}
            ]},
            {name: "Fungi", common: "Fungi", kingdom: "Fungi", mya: 1300, children: [
                {name: "Ascomycota", common: "Sac fungi", kingdom: "Fungi", mya: 600, children: [
                    {name: "Saccharomyces", common: "Baker's yeast", kingdom: "Fungi", mya: 0},
                    {name: "Penicillium", common: "Penicillin mold", kingdom: "Fungi", mya: 0},
                    {name: "Morchella", common: "Morel", kingdom: "Fungi", mya: 0}
                ]},
                {name: "Basidiomycota", common: "Club fungi", kingdom: "Fungi", mya: 500, children: [
                    {name: "Agaricus", common: "Button mushroom", kingdom: "Fungi", mya: 0},
                    {name: "Amanita", common: "Death cap", kingdom: "Fungi", mya: 0},
                    {name: "Ustilago", common: "Smut fungus", kingdom: "Fungi", mya: 0}
                ]}
            ]},
            {name: "Animalia", common: "Animals", kingdom: "Animals", mya: 800, children: [
                {name: "Porifera", common: "Sponges", kingdom: "Animals", mya: 700, children: [
                    {name: "Demospongiae", common: "Bath sponge", kingdom: "Animals", mya: 0}
                ]},
                {name: "Cnidaria", common: "Jellyfish & corals", kingdom: "Animals", mya: 650, children: [
                    {name: "Aurelia", common: "Moon jellyfish", kingdom: "Animals", mya: 0},
                    {name: "Acropora", common: "Staghorn coral", kingdom: "Animals", mya: 0}
                ]},
                {name: "Arthropoda", common: "Arthropods", kingdom: "Animals", mya: 530, children: [
                    {name: "Drosophila", common: "Fruit fly", kingdom: "Animals", mya: 0},
                    {name: "Apis", common: "Honey bee", kingdom: "Animals", mya: 0},
                    {name: "Limulus", common: "Horseshoe crab", kingdom: "Animals", mya: 0},
                    {name: "Homarus", common: "Lobster", kingdom: "Animals", mya: 0}
                ]},
                {name: "Mollusca", common: "Mollusks", kingdom: "Animals", mya: 530, children: [
                    {name: "Octopus", common: "Octopus", kingdom: "Animals", mya: 0},
                    {name: "Helix", common: "Garden snail", kingdom: "Animals", mya: 0}
                ]},
                {name: "Chordata", common: "Chordates", kingdom: "Animals", mya: 520, children: [
                    {name: "Fish", common: "Fish", kingdom: "Animals", mya: 480, children: [
                        {name: "Danio", common: "Zebrafish", kingdom: "Animals", mya: 0},
                        {name: "Latimeria", common: "Coelacanth", kingdom: "Animals", mya: 0},
                        {name: "Squalus", common: "Dogfish shark", kingdom: "Animals", mya: 0}
                    ]},
                    {name: "Amphibia", common: "Amphibians", kingdom: "Animals", mya: 370, children: [
                        {name: "Xenopus", common: "African clawed frog", kingdom: "Animals", mya: 0},
                        {name: "Ambystoma", common: "Axolotl", kingdom: "Animals", mya: 0}
                    ]},
                    {name: "Reptilia", common: "Reptiles", kingdom: "Animals", mya: 320, children: [
                        {name: "Anolis", common: "Green anole", kingdom: "Animals", mya: 0},
                        {name: "Crocodylus", common: "Crocodile", kingdom: "Animals", mya: 0},
                        {name: "Chelonia", common: "Sea turtle", kingdom: "Animals", mya: 0}
                    ]},
                    {name: "Aves", common: "Birds", kingdom: "Animals", mya: 160, children: [
                        {name: "Gallus", common: "Chicken", kingdom: "Animals", mya: 0},
                        {name: "Aquila", common: "Eagle", kingdom: "Animals", mya: 0},
                        {name: "Corvus", common: "Crow", kingdom: "Animals", mya: 0},
                        {name: "Aptenodytes", common: "Emperor penguin", kingdom: "Animals", mya: 0}
                    ]},
                    {name: "Mammalia", common: "Mammals", kingdom: "Animals", mya: 200, children: [
                        {name: "Ornithorhynchus", common: "Platypus", kingdom: "Animals", mya: 0},
                        {name: "Mus", common: "House mouse", kingdom: "Animals", mya: 0},
                        {name: "Canis", common: "Dog", kingdom: "Animals", mya: 0},
                        {name: "Balaenoptera", common: "Blue whale", kingdom: "Animals", mya: 0},
                        {name: "Pan", common: "Chimpanzee", kingdom: "Animals", mya: 0},
                        {name: "Homo", common: "Human", kingdom: "Animals", mya: 0},
                        {name: "Elephas", common: "Elephant", kingdom: "Animals", mya: 0}
                    ]}
                ]}
            ]}
        ]}
    ]
};

const kingdomColors = {
    'Root': '#606C38',
    'Bacteria': '#DDA15E',
    'Archaea': '#d6604d',
    'Plants': '#8A9A5B',
    'Fungi': '#8d6e63',
    'Animals': '#4393c3',
    'Protists': '#8073ac'
};

const width = 800, height = 800;
const svg = d3.select('#chart')
    .attr('width', width).attr('height', height)
    .attr('viewBox', `0 0 ${width} ${height}`);

const tooltip = d3.select('#tooltip');
const g = svg.append('g');

let isRadial = true;
let root = d3.hierarchy(treeData);

// Store children for collapse/expand
root.descendants().forEach(d => {
    d._children = d.children;
});

function getColor(d) {
    return kingdomColors[d.data.kingdom] || '#606C38';
}

function drawTree(duration) {
    duration = duration || 500;
    g.selectAll('*').remove();

    const descendants = root.descendants();
    const leaves = root.leaves();

    if (isRadial) {
        const cluster = d3.cluster()
            .size([360, Math.min(width, height) / 2 - 80]);

        cluster(root);

        g.attr('transform', `translate(${width/2},${height/2})`);

        // Links
        g.selectAll('.link')
            .data(root.links())
            .enter().append('path')
            .attr('class', 'link')
            .attr('fill', 'none')
            .attr('stroke', d => getColor(d.source))
            .attr('stroke-opacity', 0.4)
            .attr('stroke-width', 1.2)
            .attr('d', d => {
                const sourceAngle = (d.source.x - 90) * Math.PI / 180;
                const targetAngle = (d.target.x - 90) * Math.PI / 180;
                const sr = d.source.y, tr = d.target.y;
                return `M${sr * Math.cos(sourceAngle)},${sr * Math.sin(sourceAngle)}
                        C${sr * Math.cos(targetAngle)},${sr * Math.sin(targetAngle)}
                         ${tr * Math.cos(targetAngle)},${tr * Math.sin(targetAngle)}
                         ${tr * Math.cos(targetAngle)},${tr * Math.sin(targetAngle)}`;
            });

        // Nodes
        const node = g.selectAll('.node')
            .data(descendants)
            .enter().append('g')
            .attr('class', 'node')
            .attr('transform', d => {
                const angle = d.x - 90;
                return `rotate(${angle}) translate(${d.y},0)`;
            })
            .style('cursor', 'pointer')
            .on('click', function(event, d) {
                if (d._children) {
                    d.children = d.children ? null : d._children;
                    drawTree(500);
                }
            });

        node.append('circle')
            .attr('r', d => d.children || d._children ? 4 : 3)
            .attr('fill', d => d.children ? getColor(d) : (d._children && !d.children ? '#999' : getColor(d)))
            .attr('stroke', d => d._children && !d.children ? getColor(d) : '#FEFAE0')
            .attr('stroke-width', 1);

        // Labels
        node.append('text')
            .attr('dy', '0.31em')
            .attr('x', d => d.x < 180 ? 8 : -8)
            .attr('text-anchor', d => d.x < 180 ? 'start' : 'end')
            .attr('transform', d => d.x >= 180 ? 'rotate(180)' : null)
            .attr('fill', '#606C38')
            .attr('font-size', d => d.children ? '9px' : '8px')
            .attr('font-family', 'Nunito')
            .attr('font-weight', d => d.children ? 600 : 400)
            .text(d => d.data.name)
            .on('mouseenter', function(event, d) {
                tooltip.style('opacity', 1)
                    .html(`<strong>${d.data.name}</strong><br>${d.data.common}<br>Kingdom: ${d.data.kingdom}${d.data.mya > 0 ? '<br>Divergence: ~' + d.data.mya + ' MYA' : ''}`);
            })
            .on('mousemove', function(event) {
                tooltip.style('left', (event.pageX + 12) + 'px')
                    .style('top', (event.pageY - 28) + 'px');
            })
            .on('mouseleave', function() { tooltip.style('opacity', 0); });

        node.select('circle')
            .on('mouseenter', function(event, d) {
                tooltip.style('opacity', 1)
                    .html(`<strong>${d.data.name}</strong><br>${d.data.common}<br>Kingdom: ${d.data.kingdom}${d.data.mya > 0 ? '<br>Divergence: ~' + d.data.mya + ' MYA' : ''}`);
            })
            .on('mousemove', function(event) {
                tooltip.style('left', (event.pageX + 12) + 'px')
                    .style('top', (event.pageY - 28) + 'px');
            })
            .on('mouseleave', function() { tooltip.style('opacity', 0); });

    } else {
        // Rectangular (tidy tree) layout
        const treeLayout = d3.tree()
            .size([height - 80, width - 250]);

        treeLayout(root);

        g.attr('transform', 'translate(100,40)');

        // Links
        g.selectAll('.link')
            .data(root.links())
            .enter().append('path')
            .attr('class', 'link')
            .attr('fill', 'none')
            .attr('stroke', d => getColor(d.source))
            .attr('stroke-opacity', 0.4)
            .attr('stroke-width', 1.2)
            .attr('d', d3.linkHorizontal()
                .x(d => d.y)
                .y(d => d.x));

        // Nodes
        const node = g.selectAll('.node')
            .data(descendants)
            .enter().append('g')
            .attr('class', 'node')
            .attr('transform', d => `translate(${d.y},${d.x})`)
            .style('cursor', 'pointer')
            .on('click', function(event, d) {
                if (d._children) {
                    d.children = d.children ? null : d._children;
                    drawTree(500);
                }
            });

        node.append('circle')
            .attr('r', d => d.children || d._children ? 4 : 3)
            .attr('fill', d => d.children ? getColor(d) : (d._children && !d.children ? '#999' : getColor(d)))
            .attr('stroke', d => d._children && !d.children ? getColor(d) : '#FEFAE0')
            .attr('stroke-width', 1);

        node.append('text')
            .attr('dy', '0.31em')
            .attr('x', d => d.children ? -8 : 8)
            .attr('text-anchor', d => d.children ? 'end' : 'start')
            .attr('fill', '#606C38')
            .attr('font-size', d => d.children ? '9px' : '8px')
            .attr('font-family', 'Nunito')
            .attr('font-weight', d => d.children ? 600 : 400)
            .text(d => d.data.name)
            .on('mouseenter', function(event, d) {
                tooltip.style('opacity', 1)
                    .html(`<strong>${d.data.name}</strong><br>${d.data.common}<br>Kingdom: ${d.data.kingdom}${d.data.mya > 0 ? '<br>Divergence: ~' + d.data.mya + ' MYA' : ''}`);
            })
            .on('mousemove', function(event) {
                tooltip.style('left', (event.pageX + 12) + 'px')
                    .style('top', (event.pageY - 28) + 'px');
            })
            .on('mouseleave', function() { tooltip.style('opacity', 0); });

        node.select('circle')
            .on('mouseenter', function(event, d) {
                tooltip.style('opacity', 1)
                    .html(`<strong>${d.data.name}</strong><br>${d.data.common}<br>Kingdom: ${d.data.kingdom}${d.data.mya > 0 ? '<br>Divergence: ~' + d.data.mya + ' MYA' : ''}`);
            })
            .on('mousemove', function(event) {
                tooltip.style('left', (event.pageX + 12) + 'px')
                    .style('top', (event.pageY - 28) + 'px');
            })
            .on('mouseleave', function() { tooltip.style('opacity', 0); });
    }
}

drawTree(0);

// Toggle radial/rectangular
document.getElementById('radialBtn').addEventListener('click', function() {
    isRadial = true;
    this.classList.add('active');
    document.getElementById('rectBtn').classList.remove('active');
    drawTree(500);
});
document.getElementById('rectBtn').addEventListener('click', function() {
    isRadial = false;
    this.classList.add('active');
    document.getElementById('radialBtn').classList.remove('active');
    drawTree(500);
});

// Expand all
document.getElementById('expandBtn').addEventListener('click', function() {
    root.descendants().forEach(d => {
        if (d._children) d.children = d._children;
    });
    drawTree(500);
});

// Collapse all (keep first two levels)
document.getElementById('collapseBtn').addEventListener('click', function() {
    root.descendants().forEach(d => {
        if (d.depth > 1 && d._children) d.children = null;
    });
    drawTree(500);
});
</script>
</body>
</html>
