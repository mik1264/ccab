<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collapsible Force-Directed Tree - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 8px 16px; background: rgba(255,255,255,0.7);
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-family: 'Lora', serif; text-align: center; color: var(--moss); font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: var(--sage); margin-bottom: 1rem; }
        .chart-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 16px; overflow: hidden;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        .info { text-align: center; font-size: 0.85rem; color: var(--sage); margin-bottom: 8px; }
        svg text { font-family: 'Nunito', sans-serif; }
        .tooltip {
            position: absolute; pointer-events: none; background: rgba(61,68,35,0.92);
            color: var(--cream); padding: 10px 14px; border-radius: 10px;
            font-size: 0.8rem; line-height: 1.5; z-index: 100;
        }
        .node-label { pointer-events: none; font-size: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="container">
        <h1>Collapsible Force-Directed Tree</h1>
        <p class="subtitle">Knowledge hierarchy — click nodes to collapse/expand subtrees</p>
        <p class="info">Drag nodes to rearrange. Scroll to zoom. Click to collapse.</p>
        <div class="chart-container">
            <div id="chart"></div>
        </div>
    </div>
    <div class="tooltip" id="tooltip" style="display:none;"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    (function() {
        const treeData = {
            name: "Science", children: [
                { name: "Physics", children: [
                    { name: "Classical Mechanics", children: [
                        {name:"Newtonian"},{name:"Lagrangian"},{name:"Hamiltonian"},{name:"Fluid Dynamics"}
                    ]},
                    { name: "Quantum Physics", children: [
                        {name:"QED"},{name:"QCD"},{name:"Quantum Computing"},{name:"Quantum Optics"}
                    ]},
                    { name: "Thermodynamics", children: [
                        {name:"Statistical Mechanics"},{name:"Heat Transfer"},{name:"Entropy"}
                    ]},
                    { name: "Relativity", children: [
                        {name:"Special Relativity"},{name:"General Relativity"},{name:"Cosmology"}
                    ]},
                    { name: "Electromagnetism", children: [
                        {name:"Optics"},{name:"Circuits"},{name:"Waves"}
                    ]}
                ]},
                { name: "Biology", children: [
                    { name: "Molecular Biology", children: [
                        {name:"DNA Replication"},{name:"Transcription"},{name:"Protein Folding"},{name:"CRISPR"}
                    ]},
                    { name: "Ecology", children: [
                        {name:"Population Dynamics"},{name:"Food Webs"},{name:"Biodiversity"},{name:"Conservation"}
                    ]},
                    { name: "Evolution", children: [
                        {name:"Natural Selection"},{name:"Genetic Drift"},{name:"Speciation"},{name:"Phylogenetics"}
                    ]},
                    { name: "Neuroscience", children: [
                        {name:"Synapses"},{name:"Neural Networks"},{name:"Cognition"}
                    ]}
                ]},
                { name: "Chemistry", children: [
                    { name: "Organic", children: [
                        {name:"Hydrocarbons"},{name:"Polymers"},{name:"Biochemistry"},{name:"Synthesis"}
                    ]},
                    { name: "Inorganic", children: [
                        {name:"Coordination"},{name:"Crystallography"},{name:"Metals"}
                    ]},
                    { name: "Physical Chemistry", children: [
                        {name:"Kinetics"},{name:"Quantum Chemistry"},{name:"Spectroscopy"}
                    ]},
                    { name: "Analytical", children: [
                        {name:"Chromatography"},{name:"Mass Spectrometry"},{name:"Titration"}
                    ]}
                ]},
                { name: "Mathematics", children: [
                    { name: "Algebra", children: [
                        {name:"Linear Algebra"},{name:"Group Theory"},{name:"Ring Theory"}
                    ]},
                    { name: "Analysis", children: [
                        {name:"Real Analysis"},{name:"Complex Analysis"},{name:"Functional Analysis"}
                    ]},
                    { name: "Topology", children: [
                        {name:"Point-Set"},{name:"Algebraic"},{name:"Differential"}
                    ]},
                    { name: "Statistics", children: [
                        {name:"Bayesian"},{name:"Regression"},{name:"Hypothesis Testing"}
                    ]}
                ]}
            ]
        };

        const depthColors = ["var(--dark-moss)", "var(--moss)", "var(--sage)", "var(--earth)", "#ccc"];

        const width = Math.min(1050, window.innerWidth - 80);
        const height = 600;

        const svg = d3.select("#chart").append("svg")
            .attr("width", width).attr("height", height)
            .call(d3.zoom().scaleExtent([0.3, 5]).on("zoom", (event) => {
                g.attr("transform", event.transform);
            }));
        const g = svg.append("g").attr("transform", `translate(${width/2},${height/2})`);

        const tooltip = d3.select("#tooltip");
        const root = d3.hierarchy(treeData);

        // Flatten for force simulation
        let nodes = [], links = [];

        function flatten(node) {
            nodes.push(node);
            if (node.children) {
                node.children.forEach(child => {
                    links.push({ source: node, target: child });
                    flatten(child);
                });
            }
        }

        function update() {
            nodes = []; links = [];
            flatten(root);

            // Restart simulation
            simulation.nodes(nodes);
            simulation.force("link").links(links);
            simulation.alpha(0.6).restart();

            // Links
            const linkSel = g.selectAll(".link").data(links, d => d.source.data.name + "-" + d.target.data.name);
            linkSel.exit().remove();
            linkSel.enter().append("line").attr("class", "link")
                .attr("stroke", "#b5b89a").attr("stroke-width", 1.5).attr("stroke-opacity", 0.6);

            // Nodes
            const nodeSel = g.selectAll(".node").data(nodes, d => d.data.name);
            nodeSel.exit().remove();
            const nodeEnter = nodeSel.enter().append("g").attr("class", "node");

            nodeEnter.append("circle")
                .attr("r", d => d.children ? 10 : (d._children ? 12 : 5))
                .attr("fill", d => depthColors[Math.min(d.depth, depthColors.length - 1)])
                .attr("stroke", d => d._children ? "var(--terracotta)" : "white")
                .attr("stroke-width", d => d._children ? 3 : 1.5)
                .style("cursor", "pointer")
                .on("click", function(event, d) {
                    event.stopPropagation();
                    if (d.children) {
                        d._children = d.children;
                        d.children = null;
                    } else if (d._children) {
                        d.children = d._children;
                        d._children = null;
                    }
                    update();
                })
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("r", (d.children ? 10 : (d._children ? 12 : 5)) + 3);
                    const childCount = d._children ? d._children.length : (d.children ? d.children.length : 0);
                    tooltip.style("display", "block").html(
                        `<strong>${d.data.name}</strong><br>Depth: ${d.depth}${childCount ? '<br>Children: ' + childCount : ''}${d._children ? '<br>(collapsed)' : ''}`
                    );
                })
                .on("mousemove", function(event) {
                    tooltip.style("left", (event.pageX + 14) + "px").style("top", (event.pageY - 14) + "px");
                })
                .on("mouseout", function(event, d) {
                    d3.select(this).attr("r", d.children ? 10 : (d._children ? 12 : 5));
                    tooltip.style("display", "none");
                })
                .call(d3.drag()
                    .on("start", (event, d) => { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
                    .on("end", (event, d) => { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
                );

            // Labels for non-leaf nodes
            nodeEnter.append("text")
                .attr("class", "node-label")
                .attr("dy", d => d.depth === 0 ? -16 : -12)
                .attr("text-anchor", "middle")
                .style("fill", d => depthColors[Math.min(d.depth, depthColors.length - 1)])
                .style("font-size", d => d.depth <= 1 ? "12px" : "10px")
                .text(d => (d.children || d._children) ? d.data.name : "");

            // Update existing
            g.selectAll(".node circle")
                .attr("r", d => d.children ? 10 : (d._children ? 12 : 5))
                .attr("fill", d => depthColors[Math.min(d.depth, depthColors.length - 1)])
                .attr("stroke", d => d._children ? "var(--terracotta)" : "white")
                .attr("stroke-width", d => d._children ? 3 : 1.5);
        }

        const simulation = d3.forceSimulation()
            .force("link", d3.forceLink().distance(50).strength(0.8))
            .force("charge", d3.forceManyBody().strength(-150))
            .force("center", d3.forceCenter(0, 0))
            .force("collision", d3.forceCollide(15))
            .on("tick", () => {
                g.selectAll(".link")
                    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                g.selectAll(".node")
                    .attr("transform", d => `translate(${d.x},${d.y})`);
            });

        update();
    })();
    </script>
</body>
</html>
