<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Distribution Ridgeline - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 8px 16px; background: rgba(255,255,255,0.7);
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-family: 'Lora', serif; text-align: center; color: var(--moss); font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: var(--sage); margin-bottom: 1.5rem; }
        .chart-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 1rem; }
        .btn {
            font-family: 'Nunito', sans-serif; font-size: 0.85rem;
            padding: 8px 18px; border-radius: 20px; border: 2px solid var(--sage);
            background: rgba(255,255,255,0.6); color: var(--moss); cursor: pointer;
            font-weight: 600; transition: all 0.3s ease;
        }
        .btn:hover, .btn.active { background: var(--sage); color: white; }
        .tooltip {
            position: absolute; pointer-events: none; background: rgba(61,68,35,0.92);
            color: var(--cream); padding: 10px 14px; border-radius: 10px;
            font-size: 0.8rem; line-height: 1.5; z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        svg text { font-family: 'Nunito', sans-serif; }
        .region-legend { display: flex; gap: 16px; justify-content: center; margin-top: 12px; font-size: 0.82rem; flex-wrap: wrap; }
        .region-item { display: flex; align-items: center; gap: 5px; }
        .region-swatch { width: 14px; height: 14px; border-radius: 3px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="container">
        <h1>Income Distribution Ridgeline</h1>
        <p class="subtitle">Income quintile distributions for 15 countries, colored by region</p>
        <div class="controls">
            <button class="btn active" id="sortMedian">Sort by Median Income</button>
            <button class="btn" id="sortGini">Sort by Gini Coefficient</button>
        </div>
        <div class="chart-container">
            <div id="chart"></div>
            <div class="region-legend" id="legend"></div>
        </div>
    </div>
    <div class="tooltip" id="tooltip" style="display:none;"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    (function() {
        // Country data: quintile income shares (Q1-Q5 as % of total income), Gini, median income (PPP $), region
        const data = [
            { name: "Norway", region: "Europe", gini: 27.6, median: 39500, quintiles: [9.6, 14.0, 17.6, 22.0, 36.8] },
            { name: "Sweden", region: "Europe", gini: 30.0, median: 36200, quintiles: [8.8, 13.5, 17.4, 22.4, 37.9] },
            { name: "Germany", region: "Europe", gini: 31.9, median: 33700, quintiles: [8.5, 13.0, 17.0, 22.2, 39.3] },
            { name: "France", region: "Europe", gini: 32.4, median: 31400, quintiles: [8.2, 12.8, 16.8, 22.0, 40.2] },
            { name: "Japan", region: "Asia", gini: 32.9, median: 29500, quintiles: [7.9, 12.7, 17.1, 22.6, 39.7] },
            { name: "South Korea", region: "Asia", gini: 31.4, median: 26800, quintiles: [8.4, 13.4, 17.4, 22.3, 38.5] },
            { name: "United Kingdom", region: "Europe", gini: 35.1, median: 32400, quintiles: [7.2, 12.2, 16.6, 22.3, 41.7] },
            { name: "United States", region: "Americas", gini: 41.4, median: 35600, quintiles: [5.1, 10.0, 15.2, 22.7, 47.0] },
            { name: "China", region: "Asia", gini: 38.5, median: 10400, quintiles: [6.2, 10.8, 15.6, 22.1, 45.3] },
            { name: "India", region: "Asia", gini: 35.7, median: 3700, quintiles: [8.1, 11.3, 14.7, 20.5, 45.4] },
            { name: "Brazil", region: "Americas", gini: 48.9, median: 8200, quintiles: [3.6, 7.9, 12.7, 20.5, 55.3] },
            { name: "Mexico", region: "Americas", gini: 45.4, median: 7500, quintiles: [4.4, 8.7, 13.2, 20.5, 53.2] },
            { name: "Nigeria", region: "Africa", gini: 35.1, median: 1800, quintiles: [6.0, 10.6, 14.8, 21.5, 47.1] },
            { name: "South Africa", region: "Africa", gini: 63.0, median: 4900, quintiles: [2.4, 4.6, 8.2, 16.3, 68.5] },
            { name: "Egypt", region: "Africa", gini: 31.5, median: 4200, quintiles: [9.0, 12.7, 16.1, 21.2, 41.0] }
        ];

        const regionColors = {
            "Europe": "#3a6ea5",
            "Asia": "#e8a838",
            "Americas": "#c44e52",
            "Africa": "#2ca02c"
        };

        const margin = { top: 30, right: 30, bottom: 50, left: 130 };
        const width = Math.min(1050, window.innerWidth - 80) - margin.left - margin.right;
        const height = 600 - margin.top - margin.bottom;
        const overlap = 2.5;

        const svg = d3.select("#chart").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
          .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        const tooltip = d3.select("#tooltip");

        // Generate synthetic income distribution from quintile shares
        function generateDistribution(quintiles, n) {
            const points = [];
            const boundaries = [0, 20, 40, 60, 80, 100];
            for (let q = 0; q < 5; q++) {
                const share = quintiles[q];
                const lo = boundaries[q];
                const hi = boundaries[q + 1];
                const mid = (lo + hi) / 2;
                const count = Math.round(n * share / 100);
                for (let i = 0; i < count; i++) {
                    points.push(mid + (Math.random() - 0.5) * (hi - lo) * 0.9);
                }
            }
            return points;
        }

        // Kernel density estimation
        function kde(kernel, thresholds, data) {
            return thresholds.map(t => [t, d3.mean(data, d => kernel(t - d))]);
        }
        function epanechnikov(bandwidth) {
            return x => {
                x = x / bandwidth;
                return Math.abs(x) <= 1 ? 0.75 * (1 - x * x) / bandwidth : 0;
            };
        }

        const x = d3.scaleLinear().domain([0, 100]).range([0, width]);

        // Compute densities
        data.forEach(d => {
            const pts = generateDistribution(d.quintiles, 500);
            const thresholds = d3.range(0, 101, 1);
            d.density = kde(epanechnikov(8), thresholds, pts);
        });

        let sortMode = "median";

        function sortData() {
            if (sortMode === "median") {
                data.sort((a, b) => b.median - a.median);
            } else {
                data.sort((a, b) => a.gini - b.gini);
            }
        }

        function draw() {
            sortData();
            svg.selectAll("*").remove();

            const y = d3.scaleBand().domain(data.map(d => d.name))
                .range([0, height]).padding(0.1);
            const yDensity = d3.scaleLinear()
                .domain([0, d3.max(data, d => d3.max(d.density, p => p[1]))])
                .range([0, -y.bandwidth() * overlap]);

            // X axis
            svg.append("g").attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(x).tickFormat(d => d + "%"))
                .selectAll("text").style("fill", "var(--moss)").style("font-size", "11px");
            svg.selectAll(".domain, .tick line").style("stroke", "#b5b89a");

            svg.append("text").attr("x", width / 2).attr("y", height + 40)
                .style("text-anchor", "middle").style("fill", "var(--moss)")
                .style("font-size", "12px").text("Income Percentile");

            // Ridgeline areas
            const groups = svg.selectAll(".ridge")
                .data(data).join("g")
                .attr("class", "ridge")
                .attr("transform", d => `translate(0,${y(d.name) + y.bandwidth()})`);

            groups.append("path")
                .attr("d", d => d3.area()
                    .x(p => x(p[0]))
                    .y0(0)
                    .y1(p => yDensity(p[1]))
                    .curve(d3.curveBasis)(d.density))
                .attr("fill", d => regionColors[d.region])
                .attr("fill-opacity", 0.55)
                .attr("stroke", d => regionColors[d.region])
                .attr("stroke-width", 1.5)
                .style("cursor", "pointer")
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("fill-opacity", 0.85).attr("stroke-width", 2.5);
                    tooltip.style("display", "block").html(
                        `<strong>${d.name}</strong> (${d.region})<br>Gini: ${d.gini}<br>Median Income: $${d.median.toLocaleString()} PPP`
                    );
                })
                .on("mousemove", function(event) {
                    tooltip.style("left", (event.pageX + 14) + "px")
                        .style("top", (event.pageY - 14) + "px");
                })
                .on("mouseout", function() {
                    d3.select(this).attr("fill-opacity", 0.55).attr("stroke-width", 1.5);
                    tooltip.style("display", "none");
                });

            // Country labels
            groups.append("text")
                .attr("x", -8).attr("y", 0)
                .attr("text-anchor", "end")
                .attr("dominant-baseline", "middle")
                .style("font-size", "12px").style("font-weight", "600")
                .style("fill", d => regionColors[d.region])
                .text(d => d.name);
        }

        draw();

        d3.select("#sortMedian").on("click", function() {
            sortMode = "median";
            d3.selectAll(".btn").classed("active", false);
            d3.select(this).classed("active", true);
            draw();
        });
        d3.select("#sortGini").on("click", function() {
            sortMode = "gini";
            d3.selectAll(".btn").classed("active", false);
            d3.select(this).classed("active", true);
            draw();
        });

        // Region legend
        const legend = d3.select("#legend");
        Object.entries(regionColors).forEach(([region, color]) => {
            const item = legend.append("div").attr("class", "region-item");
            item.append("div").attr("class", "region-swatch").style("background", color);
            item.append("span").text(region);
        });
    })();
    </script>
</body>
</html>
