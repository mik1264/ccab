<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Energy Flow Sankey - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #606C38; min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #606C38; text-decoration: none; font-weight: 600;
            font-family: 'Nunito', sans-serif; z-index: 1000;
            background: rgba(254,250,224,0.9); padding: 8px 16px;
            border-radius: 20px; border: 1px solid rgba(138,154,91,0.3);
            transition: all 0.3s;
        }
        .back-link:hover { background: #8A9A5B; color: #FEFAE0; }
        h1 {
            font-family: 'Lora', serif; text-align: center;
            color: #606C38; font-size: 2rem; padding: 20px 0 5px;
        }
        .subtitle { text-align: center; color: #8A9A5B; font-size: 0.95rem; margin-bottom: 15px; }
        .chart-container {
            display: flex; justify-content: center;
            padding: 10px 20px; overflow-x: auto;
        }
        svg { max-width: 100%; height: auto; }
        .tooltip {
            position: absolute; background: rgba(254,250,224,0.95);
            border: 1px solid #8A9A5B; border-radius: 8px;
            padding: 10px 14px; font-size: 0.85rem; pointer-events: none;
            opacity: 0; transition: opacity 0.2s; color: #606C38;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .note {
            text-align: center; font-size: 0.8rem; color: #8A9A5B;
            padding: 5px 20px; max-width: 800px; margin: 0 auto;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Gallery</a>
    <h1>US Energy Flow Sankey</h1>
    <p class="subtitle">Approximate 2022 US energy flows (quadrillion BTU) — hover for details</p>
    <div class="chart-container">
        <svg id="chart"></svg>
    </div>
    <p class="note">Data based on EIA Annual Energy Review 2022 (approximate values). Sources flow through carriers to end-use sectors.</p>
    <div class="tooltip" id="tooltip"></div>

<script>
// Simplified EIA energy flow data (2022, quadrillion BTU, approximate)
const energyData = {
    nodes: [
        // Sources (column 0)
        {name: 'Coal'},
        {name: 'Natural Gas'},
        {name: 'Petroleum'},
        {name: 'Nuclear'},
        {name: 'Renewables'},
        // Carriers (column 1)
        {name: 'Electricity Generation'},
        {name: 'Direct Use'},
        // End-use sectors (column 2)
        {name: 'Residential'},
        {name: 'Commercial'},
        {name: 'Industrial'},
        {name: 'Transportation'},
        // Losses
        {name: 'Conversion Losses'}
    ],
    links: [
        // Coal
        {source: 0, target: 5, value: 9.2},    // Coal → Electricity
        {source: 0, target: 9, value: 0.8},     // Coal → Industrial (direct)
        // Natural Gas
        {source: 1, target: 5, value: 12.5},    // NG → Electricity
        {source: 1, target: 6, value: 19.5},    // NG → Direct Use
        // Petroleum
        {source: 2, target: 5, value: 0.4},     // Petroleum → Electricity
        {source: 2, target: 6, value: 35.0},    // Petroleum → Direct Use
        // Nuclear
        {source: 3, target: 5, value: 8.1},     // Nuclear → Electricity
        // Renewables
        {source: 4, target: 5, value: 8.5},     // Renewables → Electricity
        {source: 4, target: 6, value: 4.5},     // Renewables → Direct (biofuels, solar thermal)
        // Electricity to sectors
        {source: 5, target: 7, value: 5.3},     // Electricity → Residential
        {source: 5, target: 8, value: 4.6},     // Electricity → Commercial
        {source: 5, target: 9, value: 3.4},     // Electricity → Industrial
        {source: 5, target: 10, value: 0.1},    // Electricity → Transportation
        {source: 5, target: 11, value: 25.3},   // Electricity → Losses
        // Direct Use to sectors
        {source: 6, target: 7, value: 5.8},     // Direct → Residential
        {source: 6, target: 8, value: 3.5},     // Direct → Commercial
        {source: 6, target: 9, value: 22.0},    // Direct → Industrial
        {source: 6, target: 10, value: 27.2},   // Direct → Transportation
    ]
};

const nodeColors = {
    'Coal': '#4d4d4d',
    'Natural Gas': '#4393c3',
    'Petroleum': '#d6604d',
    'Nuclear': '#8073ac',
    'Renewables': '#8A9A5B',
    'Electricity Generation': '#DDA15E',
    'Direct Use': '#BC6C25',
    'Residential': '#66c2a5',
    'Commercial': '#fc8d62',
    'Industrial': '#8da0cb',
    'Transportation': '#e78ac3',
    'Conversion Losses': '#999999'
};

const margin = {top: 30, right: 30, bottom: 20, left: 30};
const width = 960, height = 550;

const svg = d3.select('#chart')
    .attr('width', width).attr('height', height)
    .attr('viewBox', `0 0 ${width} ${height}`);

const tooltip = d3.select('#tooltip');

const sankey = d3.sankey()
    .nodeId(d => d.index)
    .nodeWidth(20)
    .nodePadding(14)
    .nodeAlign(d3.sankeyJustify)
    .extent([[margin.left, margin.top], [width - margin.right, height - margin.bottom]]);

const {nodes, links} = sankey(energyData);

// Draw links
svg.append('g')
    .selectAll('path')
    .data(links)
    .enter().append('path')
    .attr('d', d3.sankeyLinkHorizontal())
    .attr('fill', 'none')
    .attr('stroke', d => nodeColors[d.source.name] || '#8A9A5B')
    .attr('stroke-opacity', 0.35)
    .attr('stroke-width', d => Math.max(1, d.width))
    .style('cursor', 'pointer')
    .on('mouseenter', function(event, d) {
        d3.select(this).attr('stroke-opacity', 0.6);
        tooltip.style('opacity', 1)
            .html(`<strong>${d.source.name} → ${d.target.name}</strong><br>${d.value.toFixed(1)} quadrillion BTU`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 12) + 'px')
            .style('top', (event.pageY - 28) + 'px');
    })
    .on('mouseleave', function() {
        d3.select(this).attr('stroke-opacity', 0.35);
        tooltip.style('opacity', 0);
    });

// Draw nodes
const nodeG = svg.append('g')
    .selectAll('g')
    .data(nodes)
    .enter().append('g');

nodeG.append('rect')
    .attr('x', d => d.x0).attr('y', d => d.y0)
    .attr('width', d => d.x1 - d.x0)
    .attr('height', d => Math.max(1, d.y1 - d.y0))
    .attr('fill', d => nodeColors[d.name] || '#8A9A5B')
    .attr('rx', 3)
    .attr('opacity', 0.9)
    .style('cursor', 'pointer')
    .on('mouseenter', function(event, d) {
        d3.select(this).attr('opacity', 1);
        const totalIn = d.targetLinks.reduce((a, l) => a + l.value, 0);
        const totalOut = d.sourceLinks.reduce((a, l) => a + l.value, 0);
        let html = `<strong>${d.name}</strong>`;
        if (totalIn > 0) html += `<br>Inflow: ${totalIn.toFixed(1)} quad BTU`;
        if (totalOut > 0) html += `<br>Outflow: ${totalOut.toFixed(1)} quad BTU`;
        tooltip.style('opacity', 1).html(html);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 12) + 'px')
            .style('top', (event.pageY - 28) + 'px');
    })
    .on('mouseleave', function() {
        d3.select(this).attr('opacity', 0.9);
        tooltip.style('opacity', 0);
    });

// Node labels
nodeG.append('text')
    .attr('x', d => d.x0 < width / 2 ? d.x1 + 6 : d.x0 - 6)
    .attr('y', d => (d.y0 + d.y1) / 2)
    .attr('dy', '0.35em')
    .attr('text-anchor', d => d.x0 < width / 2 ? 'start' : 'end')
    .attr('fill', '#606C38')
    .attr('font-size', '12px')
    .attr('font-family', 'Nunito')
    .attr('font-weight', 600)
    .text(d => d.name);

// Value labels
nodeG.append('text')
    .attr('x', d => d.x0 < width / 2 ? d.x1 + 6 : d.x0 - 6)
    .attr('y', d => (d.y0 + d.y1) / 2 + 14)
    .attr('text-anchor', d => d.x0 < width / 2 ? 'start' : 'end')
    .attr('fill', '#8A9A5B')
    .attr('font-size', '10px')
    .attr('font-family', 'Nunito')
    .text(d => {
        const total = Math.max(
            d.sourceLinks.reduce((a, l) => a + l.value, 0),
            d.targetLinks.reduce((a, l) => a + l.value, 0)
        );
        return total.toFixed(1) + ' quad BTU';
    });
</script>
</body>
</html>
