<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Projection Explorer - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 8px 16px; background: rgba(255,255,255,0.7);
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-family: 'Lora', serif; text-align: center; color: var(--moss); font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: var(--sage); margin-bottom: 1.5rem; }
        .chart-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
        .btn {
            font-family: 'Nunito', sans-serif; font-size: 0.85rem;
            padding: 8px 18px; border-radius: 20px; border: 2px solid var(--sage);
            background: rgba(255,255,255,0.6); color: var(--moss); cursor: pointer;
            font-weight: 600; transition: all 0.3s ease;
        }
        .btn:hover, .btn.active { background: var(--sage); color: white; }
        .grid-view {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px; margin-top: 12px;
        }
        .grid-card {
            background: rgba(255,255,255,0.5); border-radius: 12px; padding: 8px;
            cursor: pointer; border: 2px solid transparent;
            transition: all 0.3s ease; text-align: center;
        }
        .grid-card:hover, .grid-card.selected {
            border-color: var(--earth); background: rgba(255,255,255,0.9);
            box-shadow: 0 4px 16px rgba(96,108,56,0.15);
        }
        .grid-card svg { display: block; margin: 0 auto; }
        .grid-card .proj-name { font-size: 0.8rem; font-weight: 600; color: var(--moss); margin-top: 4px; }
        #fullView { margin-top: 16px; text-align: center; }
        .proj-title { font-family: 'Lora', serif; font-size: 1.3rem; color: var(--moss); margin-bottom: 8px; }
        svg text { font-family: 'Nunito', sans-serif; }
        .graticule { fill: none; stroke: #b5b89a; stroke-width: 0.5; stroke-opacity: 0.6; }
        .land { fill: rgba(138,154,91,0.35); stroke: var(--moss); stroke-width: 0.5; }
        .outline { fill: none; stroke: var(--moss); stroke-width: 1.5; }
        .tissot { fill: rgba(188,108,37,0.25); stroke: var(--terracotta); stroke-width: 0.8; }
        label { font-weight: 600; color: var(--moss); font-size: 0.9rem; }
        input[type="checkbox"] { accent-color: var(--sage); }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="container">
        <h1>Map Projection Explorer</h1>
        <p class="subtitle">20 different map projections with Tissot's indicatrix</p>
        <div class="controls">
            <button class="btn active" id="gridBtn">Gallery View</button>
            <button class="btn" id="fullBtn">Full View</button>
            <label><input type="checkbox" id="tissotCheck"> Tissot's Indicatrix</label>
        </div>
        <div class="chart-container">
            <div id="gridView" class="grid-view"></div>
            <div id="fullView" style="display:none;"></div>
        </div>
    </div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-geo-projection@4/dist/d3-geo-projection.min.js"></script>
    <script>
    (function() {
        // Simplified world land - a basic outline of continents
        const land = {
            type: "MultiPolygon",
            coordinates: [
                // North America
                [[[-130,50],[-125,60],[-100,70],[-80,70],[-60,50],[-65,45],[-80,25],[-105,20],[-120,30],[-130,50]]],
                // South America
                [[[-80,10],[-60,10],[-35,-5],[-35,-20],[-55,-55],[-70,-55],[-75,-15],[-80,10]]],
                // Europe
                [[[0,40],[5,45],[10,55],[25,70],[40,70],[45,55],[30,40],[25,35],[0,36],[0,40]]],
                // Africa
                [[[-15,35],[10,37],[35,30],[50,12],[50,-5],[35,-35],[18,-35],[10,-5],[-15,5],[-15,35]]],
                // Asia
                [[[40,45],[60,55],[80,70],[120,70],[140,55],[145,45],[130,30],[120,25],[105,10],[95,10],[80,25],[60,25],[40,30],[40,45]]],
                // Australia
                [[[115,-15],[135,-12],[155,-25],[150,-38],[130,-35],[115,-30],[115,-15]]],
                // Antarctica outline
                [[[-60,-65],[-30,-70],[30,-70],[60,-68],[100,-67],[140,-67],[170,-72],[-170,-76],[-120,-72],[-90,-70],[-60,-65]]]
            ]
        };

        const projections = [
            { name: "Mercator", fn: () => d3.geoMercator() },
            { name: "Equirectangular", fn: () => d3.geoEquirectangular() },
            { name: "Orthographic", fn: () => d3.geoOrthographic() },
            { name: "Stereographic", fn: () => d3.geoStereographic() },
            { name: "Gnomonic", fn: () => d3.geoGnomonic().clipAngle(60) },
            { name: "Azimuthal Equal Area", fn: () => d3.geoAzimuthalEqualArea() },
            { name: "Conic Equidistant", fn: () => d3.geoConicEquidistant() },
            { name: "Albers", fn: () => d3.geoAlbers().rotate([0, 0]) },
            { name: "Natural Earth", fn: () => d3.geoNaturalEarth1() },
            { name: "Mollweide", fn: () => d3.geoMollweide() },
            { name: "Winkel Tripel", fn: () => d3.geoWinkel3() },
            { name: "Robinson", fn: () => d3.geoRobinson() },
            { name: "Eckert IV", fn: () => d3.geoEckert4() },
            { name: "Sinusoidal", fn: () => d3.geoSinusoidal() },
            { name: "Hammer", fn: () => d3.geoHammer() },
            { name: "Aitoff", fn: () => d3.geoAitoff() },
            { name: "Fahey", fn: () => d3.geoFahey() },
            { name: "Kavrayskiy VII", fn: () => d3.geoKavrayskiy7() },
            { name: "Lagrange", fn: () => d3.geoLagrange() },
            { name: "Van der Grinten", fn: () => d3.geoVanDerGrinten() }
        ];

        const graticule = d3.geoGraticule10();
        const sphere = { type: "Sphere" };
        let showTissot = false;
        let currentView = "grid";
        let selectedIdx = 0;

        // Tissot indicatrices at regular lat/lon
        function tissotCircles() {
            const features = [];
            for (let lat = -60; lat <= 60; lat += 30) {
                for (let lon = -150; lon <= 150; lon += 30) {
                    features.push(d3.geoCircle().center([lon, lat]).radius(5)());
                }
            }
            return { type: "FeatureCollection", features: features.map(f => ({ type: "Feature", geometry: f })) };
        }
        const tissotData = tissotCircles();

        function drawMap(container, proj, w, h, showLabels) {
            const svg = d3.select(container).append("svg")
                .attr("width", w).attr("height", h);
            const projection = proj.fn().fitSize([w - 10, h - (showLabels ? 30 : 10)], sphere)
                .translate([w / 2, (h - (showLabels ? 20 : 0)) / 2 + 5]);
            const path = d3.geoPath().projection(projection);

            svg.append("path").datum(sphere).attr("class", "outline").attr("d", path);
            svg.append("path").datum(graticule).attr("class", "graticule").attr("d", path);
            svg.append("path").datum(land).attr("class", "land").attr("d", path);

            if (showTissot) {
                svg.selectAll(".tissot-circle")
                    .data(tissotData.features).join("path")
                    .attr("class", "tissot").attr("d", path);
            }
            return svg;
        }

        function drawGrid() {
            const grid = d3.select("#gridView");
            grid.html("");
            projections.forEach((p, i) => {
                const card = grid.append("div").attr("class", "grid-card" + (i === selectedIdx ? " selected" : ""))
                    .on("click", () => {
                        selectedIdx = i;
                        currentView = "full";
                        d3.select("#gridBtn").classed("active", false);
                        d3.select("#fullBtn").classed("active", true);
                        d3.select("#gridView").style("display", "none");
                        d3.select("#fullView").style("display", "block");
                        drawFull();
                    });
                drawMap(card.node(), p, 210, 130, false);
                card.append("div").attr("class", "proj-name").text(p.name);
            });
        }

        function drawFull() {
            const container = d3.select("#fullView");
            container.html("");
            const p = projections[selectedIdx];
            container.append("div").attr("class", "proj-title").text(p.name);
            const w = Math.min(900, window.innerWidth - 120);
            drawMap(container.node(), p, w, w * 0.55, true);

            // Navigation
            const nav = container.append("div").style("margin-top", "12px").style("display", "flex")
                .style("gap", "8px").style("justify-content", "center");
            nav.append("button").attr("class", "btn").text("Previous")
                .on("click", () => { selectedIdx = (selectedIdx - 1 + projections.length) % projections.length; drawFull(); });
            nav.append("button").attr("class", "btn").text("Next")
                .on("click", () => { selectedIdx = (selectedIdx + 1) % projections.length; drawFull(); });
        }

        drawGrid();

        d3.select("#gridBtn").on("click", function() {
            currentView = "grid";
            d3.select(this).classed("active", true);
            d3.select("#fullBtn").classed("active", false);
            d3.select("#gridView").style("display", "grid");
            d3.select("#fullView").style("display", "none");
            drawGrid();
        });
        d3.select("#fullBtn").on("click", function() {
            currentView = "full";
            d3.select(this).classed("active", true);
            d3.select("#gridBtn").classed("active", false);
            d3.select("#gridView").style("display", "none");
            d3.select("#fullView").style("display", "block");
            drawFull();
        });
        d3.select("#tissotCheck").on("change", function() {
            showTissot = this.checked;
            if (currentView === "grid") drawGrid(); else drawFull();
        });
    })();
    </script>
</body>
</html>
