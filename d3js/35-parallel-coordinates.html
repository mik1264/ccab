// Replace 'None' references - already filtered above
const data = rawData;

const margin = {top: 50, right: 40, bottom: 20, left: 40};
const width = Math.min(900, window.innerWidth - 80) - margin.left - margin.right;
const height = 440 - margin.top - margin.bottom;

const svg = d3.select('#chart')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', `translate(${margin.left},${margin.top})`);

// Dimensions order (draggable)
let dims = [...DIMENSIONS];
const yScales = {};
dims.forEach(dim => {
    const ext = d3.extent(data, d => +d[dim]);
    yScales[dim] = d3.scaleLinear().domain(ext).range([height, 0]);
});

const x = d3.scalePoint().domain(dims).range([0, width]).padding(0.1);

const tooltip = d3.select('#tooltip');
const infoBar = d3.select('#infoBar');

// Active filters per axis
const filters = {};
const hiddenOrigins = new Set();

function pathGen(d) {
    return d3.line()(dims.map(dim => [x(dim), yScales[dim](+d[dim])]));
}

// Draw lines
const lineGroup = svg.append('g').attr('class', 'lines');

function getLineColor(d) {
    if (hiddenOrigins.has(d.origin)) return 'transparent';
    return COLORS[d.origin] || '#999';
}

function lineVisible(d) {
    if (hiddenOrigins.has(d.origin)) return false;
    for (const [dim, [lo, hi]] of Object.entries(filters)) {
        const v = +d[dim];
        if (v < lo || v > hi) return false;
    }
    return true;
}

function updateLines() {
    const visible = data.filter(lineVisible);
    infoBar.text(`Showing ${visible.length} of ${data.length} cars`);
    lines.attr('opacity', d => lineVisible(d) ? 0.55 : 0.04)
         .attr('stroke', d => getLineColor(d));
}

const lines = lineGroup.selectAll('path')
    .data(data)
    .join('path')
    .attr('d', pathGen)
    .attr('fill', 'none')
    .attr('stroke', d => getLineColor(d))
    .attr('stroke-width', 1.4)
    .attr('opacity', 0.55)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.select(this).attr('stroke-width', 3).attr('opacity', 1);
        tooltip.transition().duration(100).style('opacity', 1);
        tooltip.html(`<strong>${d.name}</strong><br>${DIMENSIONS.map(dim => `${DIM_LABELS[dim]}: <b>${d[dim]}</b>`).join('<br>')}`)
            .style('left', (event.clientX + 12) + 'px')
            .style('top', (event.clientY - 10) + 'px');
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.clientX + 12) + 'px').style('top', (event.clientY - 10) + 'px');
    })
    .on('mouseout', function() {
        d3.select(this).attr('stroke-width', 1.4).attr('opacity', d => lineVisible(d) ? 0.55 : 0.04);
        tooltip.transition().duration(200).style('opacity', 0);
    });

// Draw axes with brushes
const axisGroup = svg.append('g').attr('class', 'axes');

dims.forEach(dim => {
    const g = axisGroup.append('g')
        .attr('transform', `translate(${x(dim)},0)`)
        .attr('class', 'axis')
        .attr('data-dim', dim);

    g.call(d3.axisLeft(yScales[dim]).ticks(6).tickSize(4));
    g.selectAll('text').style('font-size', '10px').style('fill', '#606C38');
    g.select('.domain').attr('stroke', '#8A9A5B');

    // Axis label (draggable)
    g.append('text')
        .attr('y', -14)
        .attr('text-anchor', 'middle')
        .attr('fill', '#3d4423')
        .style('font-family', 'Nunito, sans-serif')
        .style('font-size', '11px')
        .style('font-weight', '700')
        .style('cursor', 'grab')
        .text(DIM_LABELS[dim]);

    // Brush on this axis
    const brush = d3.brushY()
        .extent([[-12, 0], [12, height]])
        .on('brush end', function(event) {
            if (!event.selection) {
                delete filters[dim];
            } else {
                const [y0, y1] = event.selection;
                filters[dim] = [yScales[dim].invert(y1), yScales[dim].invert(y0)];
            }
            updateLines();
        });

    g.append('g').attr('class', 'brush').call(brush);
});

// Legend
const legendDiv = d3.select('#legend');
Object.entries(COLORS).forEach(([origin, color]) => {
    const item = legendDiv.append('div').attr('class', 'legend-item')
        .on('click', function() {
            if (hiddenOrigins.has(origin)) hiddenOrigins.delete(origin);
            else hiddenOrigins.add(origin);
            d3.select(this).style('opacity', hiddenOrigins.has(origin) ? 0.4 : 1);
            updateLines();
        });
    item.append('div').attr('class', 'legend-dot').style('background', color);
    item.append('span').text(origin);
});

document.getElementById('resetBtn').onclick = () => {
    Object.keys(filters).forEach(k => delete filters[k]);
    hiddenOrigins.clear();
    svg.selectAll('.brush').each(function() { d3.select(this).call(d3.brushY().move, null); });
    d3.selectAll('.legend-item').style('opacity', 1);
    updateLines();
};

document.getElementById('shuffleBtn').onclick = () => {
    // Reshuffle dim order
    dims = d3.shuffle([...DIMENSIONS]);
    x.domain(dims);
    lines.transition().duration(600).attr('d', pathGen);
    svg.selectAll('.axis').transition().duration(600)
        .attr('transform', d => `translate(${x(d3.select(this).attr('data-dim'))},0)`);
    updateLines();
};
</script>
