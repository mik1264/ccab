    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 8px 16px; background: rgba(255,255,255,0.7);
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-family: 'Lora', serif; text-align: center; color: var(--moss); font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: var(--sage); margin-bottom: 1.5rem; }
        .chart-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        .controls { display: flex; gap: 16px; align-items: center; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap; }
        .control-label { font-weight: 600; color: var(--moss); font-size: 0.9rem; }
        input[type="range"] { width: 180px; accent-color: var(--sage); }
        .tooltip {
            position: absolute; pointer-events: none; background: rgba(61,68,35,0.92);
            color: var(--cream); padding: 10px 14px; border-radius: 10px;
            font-size: 0.78rem; line-height: 1.5; z-index: 100; max-width: 220px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        svg text { font-family: 'Nunito', sans-serif; }
        .state-boundary { fill: none; stroke: #b5b89a; stroke-width: 0.8; }
        .color-legend { display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 12px; font-size: 0.8rem; }
        .gradient-bar { width: 200px; height: 12px; border-radius: 6px; }
    </style>
</head>

    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>

            svg.selectAll(".hexbin-layer").remove();
            const hexbin = d3.hexbin()
                .x(d => d[0]).y(d => d[1])
                .radius(hexRadius)
                .extent([[0, 0], [width, height]]);

            const projected = cities.map(c => {
                const p = projection([c[0], c[1]]);
                if (!p) return null;
                return [p[0], p[1], c[2], c[3], c[4]];
            }).filter(Boolean);

            const bins = hexbin(projected);
            bins.forEach(b => {
                b.totalPop = d3.sum(b, d => d[2]);
                b.cities = b.map(d => ({ name: d[3], state: d[4], pop: d[2] }))
                    .sort((a, b) => b.pop - a.pop).slice(0, 5);
            });

            const maxPop = d3.max(bins, d => d.totalPop) || 1;
            colorScale.domain([0, maxPop * 0.6]);

            const g = svg.append("g").attr("class", "hexbin-layer");
            g.selectAll("path")
                .data(bins).join("path")
                .attr("d", hexbin.hexagon(hexRadius - 0.5))
                .attr("transform", d => `translate(${d.x},${d.y})`)
                .attr("fill", d => colorScale(d.totalPop))
                .attr("fill-opacity", 0.85)
                .attr("stroke", "rgba(61,68,35,0.3)")
                .attr("stroke-width", 0.5)
                .style("cursor", "pointer")
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("fill-opacity", 1).attr("stroke-width", 2);
                    let html = `<strong>Population: ${d.totalPop.toLocaleString()}k</strong><br>Top cities:<br>`;

                })
                .on("mousemove", function(event) {
                    tooltip.style("left", (event.pageX + 14) + "px")
                        .style("top", (event.pageY - 14) + "px");
                })
                .on("mouseout", function() {
                    d3.select(this).attr("fill-opacity", 0.85).attr("stroke-width", 0.5);
                    tooltip.style("display", "none");
                });
        }

        d3.select("#hexSize").on("input", function() {
            d3.select("#hexVal").text(this.value);
            draw(+this.value);
        });

        const canvas = document.getElementById("gradBar");
        const ctx = canvas.getContext("2d");
        for (let i = 0; i < 200; i++) {
            ctx.fillStyle = d3.interpolateYlOrRd(i / 200);
            ctx.fillRect(i, 0, 1, 12);
        }
