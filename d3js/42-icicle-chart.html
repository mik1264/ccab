<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoomable Icicle Chart - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #606C38; min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #606C38; text-decoration: none; font-weight: 600;
            background: rgba(254,250,224,0.9); padding: 8px 16px;
            border-radius: 20px; border: 1px solid rgba(138,154,91,0.3);
            transition: all 0.3s; z-index: 1000; font-size: 0.9rem;
        }
        .back-link:hover { background: #8A9A5B; color: #FEFAE0; }
        h1 { font-family: 'Lora', serif; text-align: center; color: #606C38; font-size: 2rem; padding: 70px 0 5px; }
        .subtitle { text-align: center; color: #8A9A5B; font-size: 0.95rem; margin-bottom: 12px; }
        .breadcrumb {
            text-align: center; font-size: 0.85rem; color: #BC6C25;
            margin-bottom: 12px; min-height: 22px; font-weight: 600;
        }
        .chart-container { display: flex; justify-content: center; padding: 0 20px 30px; }
        #chart-wrap {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 20px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
            overflow: hidden;
        }
        .tooltip {
            position: fixed; background: rgba(61,68,35,0.92);
            border-radius: 10px; padding: 10px 14px;
            font-size: 0.82rem; pointer-events: none;
            opacity: 0; color: #FEFAE0; z-index: 200;
            line-height: 1.6; max-width: 220px;
        }
        .hint { text-align: center; color: #8A9A5B; font-size: 0.8rem; margin-bottom: 8px; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Back to Gallery</a>
    <h1>Zoomable Icicle Chart</h1>
    <p class="subtitle">Tech company hierarchy — click to zoom into any subtree</p>
    <div class="hint">Click a segment to zoom in · Click the root bar to zoom back out</div>
    <div class="breadcrumb" id="breadcrumb">Root</div>
    <div class="chart-container">
        <div id="chart-wrap"><div id="chart"></div></div>
    </div>
    <div class="tooltip" id="tooltip"></div>

<script>
const hierarchyData = {
  name: "Tech Industry", value: 0,
  children: [
    { name: "Cloud & Infrastructure", value: 0, children: [
      { name: "Amazon Web Services", value: 680 },
      { name: "Microsoft Azure", value: 510 },
      { name: "Google Cloud", value: 290 },
      { name: "Alibaba Cloud", value: 130 },
      { name: "IBM Cloud", value: 65 },
      { name: "Oracle Cloud", value: 58 }
    ]},
    { name: "Consumer Hardware", value: 0, children: [
      { name: "Apple", value: 0, children: [
        { name: "iPhone", value: 390 },
        { name: "Mac", value: 110 },
        { name: "iPad", value: 65 },
        { name: "Wearables", value: 95 }
      ]},
      { name: "Samsung", value: 0, children: [
        { name: "Smartphones", value: 210 },
        { name: "Displays", value: 80 },
        { name: "Semiconductors", value: 120 }
      ]},
      { name: "Sony", value: 0, children: [
        { name: "PlayStation", value: 130 },
        { name: "Electronics", value: 75 },
        { name: "Entertainment", value: 55 }
      ]}
    ]},
    { name: "Software & Platforms", value: 0, children: [
      { name: "Microsoft", value: 0, children: [
        { name: "Office 365", value: 210 },
        { name: "Windows", value: 160 },
        { name: "LinkedIn", value: 90 },
        { name: "Gaming", value: 75 }
      ]},
      { name: "Salesforce", value: 115 },
      { name: "SAP", value: 105 },
      { name: "Adobe", value: 98 },
      { name: "ServiceNow", value: 78 },
      { name: "Workday", value: 52 }
    ]},
    { name: "Social & Content", value: 0, children: [
      { name: "Meta", value: 0, children: [
        { name: "Facebook", value: 145 },
        { name: "Instagram", value: 100 },
        { name: "WhatsApp", value: 80 },
        { name: "Oculus VR", value: 42 }
      ]},
      { name: "Alphabet", value: 0, children: [
        { name: "Google Search", value: 320 },
        { name: "YouTube", value: 180 },
        { name: "Google Ads", value: 140 }
      ]},
      { name: "TikTok (ByteDance)", value: 145 },
      { name: "Snap", value: 48 },
      { name: "Twitter / X", value: 25 }
    ]},
    { name: "Semiconductors", value: 0, children: [
      { name: "Nvidia", value: 490 },
      { name: "TSMC", value: 350 },
      { name: "Intel", value: 195 },
      { name: "AMD", value: 175 },
      { name: "Qualcomm", value: 140 },
      { name: "Broadcom", value: 130 },
      { name: "ASML", value: 120 }
    ]},
    { name: "E-Commerce & Retail", value: 0, children: [
      { name: "Amazon Retail", value: 420 },
      { name: "Alibaba Retail", value: 235 },
      { name: "JD.com", value: 145 },
      { name: "Shopify", value: 88 },
      { name: "eBay", value: 60 }
    ]},
    { name: "FinTech", value: 0, children: [
      { name: "PayPal", value: 90 },
      { name: "Stripe", value: 75 },
      { name: "Square / Block", value: 68 },
      { name: "Ant Group", value: 95 }
    ]},
    { name: "AI & Research", value: 0, children: [
      { name: "OpenAI", value: 90 },
      { name: "Anthropic", value: 35 },
      { name: "Deepmind", value: 30 },
      { name: "Mistral AI", value: 12 },
      { name: "Cohere", value: 10 }
    ]}
  ]
};

const W = Math.min(860, window.innerWidth - 80);
const H = 500;

const color = d3.scaleSequential()
    .domain([0, 5])
    .interpolator(d => d3.interpolate('#3d4423', '#c8d8a0')(d));

const root = d3.hierarchy(hierarchyData)
    .sum(d => d.value || 0)
    .sort((a, b) => b.value - a.value);

const partition = d3.partition().size([H, W]).padding(1);
partition(root);

const svg = d3.select('#chart')
    .append('svg')
    .attr('width', W)
    .attr('height', H)
    .style('font-family', 'Nunito, sans-serif');

const tooltip = d3.select('#tooltip');
const breadcrumb = d3.select('#breadcrumb');

let focus = root;
let path = [root];

function updateBreadcrumb() {
    breadcrumb.text(path.map(d => d.data.name).join(' › '));
}

const cell = svg.selectAll('g')
    .data(root.descendants())
    .join('g')
    .attr('transform', d => `translate(${d.y0},${d.x0})`);

const rect = cell.append('rect')
    .attr('width', d => d.y1 - d.y0)
    .attr('height', d => d.x1 - d.x0)
    .attr('fill', d => color(d.depth))
    .attr('rx', 3)
    .style('cursor', d => d.children ? 'pointer' : 'default')
    .on('mouseover', function(event, d) {
        tooltip.transition().duration(100).style('opacity', 1);
        tooltip.html(`<strong>${d.data.name}</strong><br>Revenue: <b>$${d.value}B</b><br>Depth: ${d.depth}`)
            .style('left', (event.clientX + 12) + 'px')
            .style('top', (event.clientY - 10) + 'px');
        d3.select(this).attr('opacity', 0.8);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.clientX + 12) + 'px').style('top', (event.clientY - 10) + 'px');
    })
    .on('mouseout', function() {
        tooltip.transition().duration(200).style('opacity', 0);
        d3.select(this).attr('opacity', 1);
    })
    .on('click', function(event, d) {
        event.stopPropagation();
        if (d === focus) {
            // Zoom out
            if (path.length > 1) {
                path.pop();
                focus = path[path.length - 1];
                zoom(focus);
                updateBreadcrumb();
            }
        } else if (d.children) {
            path.push(d);
            focus = d;
            zoom(d);
            updateBreadcrumb();
        }
    });

// Labels
cell.append('text')
    .attr('x', 4)
    .attr('y', d => (d.x1 - d.x0) / 2)
    .attr('dy', '0.35em')
    .attr('fill', d => d.depth < 3 ? '#FEFAE0' : '#3d4423')
    .style('font-size', '11px')
    .style('font-weight', '600')
    .style('pointer-events', 'none')
    .text(d => {
        const w = d.y1 - d.y0;
        const h = d.x1 - d.x0;
        if (w < 30 || h < 16) return '';
        const label = d.data.name;
        const maxChars = Math.floor(w / 7);
        return label.length > maxChars ? label.slice(0, maxChars - 1) + '…' : label;
    });

function zoom(node) {
    const t = svg.transition().duration(600).ease(d3.easeCubicInOut);
    const scaleY = H / (node.x1 - node.x0);
    const scaleX = W / (node.y1 - node.y0);
    const dy = node.x0;
    const dx = node.y0;

    cell.transition(t)
        .attr('transform', d => `translate(${(d.y0 - dx) * scaleX},${(d.x0 - dy) * scaleY})`)
        .select('rect')
        .attr('width', d => (d.y1 - d.y0) * scaleX)
        .attr('height', d => (d.x1 - d.x0) * scaleY);

    cell.select('text').transition(t)
        .attr('y', d => ((d.x1 - d.x0) * scaleY) / 2)
        .text(d => {
            const w = (d.y1 - d.y0) * scaleX;
            const h = (d.x1 - d.x0) * scaleY;
            if (w < 30 || h < 16) return '';
            const label = d.data.name;
            const maxChars = Math.floor(w / 7);
            return label.length > maxChars ? label.slice(0, maxChars - 1) + '…' : label;
        });
}

updateBreadcrumb();
</script>
</body>
</html>
