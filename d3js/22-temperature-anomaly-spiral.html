<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Warming Spiral - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #606C38; min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #606C38; text-decoration: none; font-weight: 600;
            font-family: 'Nunito', sans-serif; z-index: 1000;
            background: rgba(254,250,224,0.9); padding: 8px 16px;
            border-radius: 20px; border: 1px solid rgba(138,154,91,0.3);
            transition: all 0.3s;
        }
        .back-link:hover { background: #8A9A5B; color: #FEFAE0; }
        h1 {
            font-family: 'Lora', serif; text-align: center;
            color: #606C38; font-size: 2rem; padding: 20px 0 5px;
        }
        .subtitle { text-align: center; color: #8A9A5B; font-size: 0.95rem; margin-bottom: 10px; }
        .chart-container { display: flex; justify-content: center; padding: 10px; }
        svg { max-width: 100%; height: auto; }
        .controls {
            display: flex; gap: 12px; justify-content: center;
            margin: 10px 0; flex-wrap: wrap; align-items: center;
        }
        .btn {
            font-family: 'Nunito', sans-serif; padding: 8px 20px;
            border: 2px solid #8A9A5B; background: rgba(138,154,91,0.1);
            color: #606C38; border-radius: 20px; cursor: pointer;
            font-weight: 600; transition: all 0.3s;
        }
        .btn:hover, .btn.active { background: #8A9A5B; color: #FEFAE0; }
        .info-box { text-align: center; font-family: 'Lora', serif; min-height: 2em; }
        .year-display { font-size: 2rem; font-weight: 700; color: #BC6C25; }
        .anomaly-display { font-size: 1rem; color: #8A9A5B; }
        .legend {
            display: flex; justify-content: center; gap: 20px;
            margin: 5px 0; font-size: 0.85rem; flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-swatch { width: 20px; height: 12px; border-radius: 3px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Gallery</a>
    <h1>Climate Warming Spiral</h1>
    <p class="subtitle">NASA GISS global temperature anomaly (1880-2023) — monthly polar chart</p>
    <div class="controls">
        <button class="btn" id="playBtn">&#9654; Play</button>
        <button class="btn" id="resetBtn">Reset</button>
        <button class="btn" id="showAllBtn">Show All</button>
    </div>
    <div class="info-box">
        <div class="year-display" id="yearLabel">1880</div>
        <div class="anomaly-display" id="anomalyLabel">Annual mean: 0.00°C</div>
    </div>
    <div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:#2166ac"></div> Cool (-0.5°C)</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#f7f7f7; border:1px solid #ccc"></div> Baseline (0°C)</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#b2182b"></div> Warm (+1.5°C)</div>
    </div>
    <div class="chart-container">
        <svg id="chart"></svg>
    </div>

<script>
// NASA GISS annual temperature anomaly data (°C relative to 1951-1980 baseline)
// Simplified: annual means
const tempData = [
    {year:1880,a:-0.16},{year:1881,a:-0.08},{year:1882,a:-0.11},{year:1883,a:-0.17},
    {year:1884,a:-0.28},{year:1885,a:-0.33},{year:1886,a:-0.31},{year:1887,a:-0.36},
    {year:1888,a:-0.17},{year:1889,a:-0.10},{year:1890,a:-0.35},{year:1891,a:-0.22},
    {year:1892,a:-0.27},{year:1893,a:-0.31},{year:1894,a:-0.32},{year:1895,a:-0.23},
    {year:1896,a:-0.11},{year:1897,a:-0.11},{year:1898,a:-0.27},{year:1899,a:-0.17},
    {year:1900,a:-0.08},{year:1901,a:-0.15},{year:1902,a:-0.28},{year:1903,a:-0.37},
    {year:1904,a:-0.47},{year:1905,a:-0.26},{year:1906,a:-0.22},{year:1907,a:-0.39},
    {year:1908,a:-0.43},{year:1909,a:-0.48},{year:1910,a:-0.43},{year:1911,a:-0.44},
    {year:1912,a:-0.36},{year:1913,a:-0.34},{year:1914,a:-0.15},{year:1915,a:-0.14},
    {year:1916,a:-0.36},{year:1917,a:-0.46},{year:1918,a:-0.30},{year:1919,a:-0.27},
    {year:1920,a:-0.27},{year:1921,a:-0.19},{year:1922,a:-0.28},{year:1923,a:-0.27},
    {year:1924,a:-0.27},{year:1925,a:-0.22},{year:1926,a:-0.10},{year:1927,a:-0.21},
    {year:1928,a:-0.20},{year:1929,a:-0.36},{year:1930,a:-0.16},{year:1931,a:-0.09},
    {year:1932,a:-0.16},{year:1933,a:-0.28},{year:1934,a:-0.13},{year:1935,a:-0.20},
    {year:1936,a:-0.15},{year:1937,a:-0.03},{year:1938,a:-0.01},{year:1939,a:-0.02},
    {year:1940,a:0.08},{year:1941,a:0.12},{year:1942,a:0.09},{year:1943,a:0.09},
    {year:1944,a:0.20},{year:1945,a:0.09},{year:1946,a:-0.07},{year:1947,a:-0.03},
    {year:1948,a:-0.05},{year:1949,a:-0.08},{year:1950,a:-0.17},{year:1951,a:-0.01},
    {year:1952,a:0.02},{year:1953,a:0.08},{year:1954,a:-0.12},{year:1955,a:-0.14},
    {year:1956,a:-0.20},{year:1957,a:0.04},{year:1958,a:0.06},{year:1959,a:0.03},
    {year:1960,a:-0.02},{year:1961,a:0.06},{year:1962,a:0.03},{year:1963,a:0.07},
    {year:1964,a:-0.20},{year:1965,a:-0.11},{year:1966,a:-0.03},{year:1967,a:-0.02},
    {year:1968,a:-0.07},{year:1969,a:0.06},{year:1970,a:0.03},{year:1971,a:-0.08},
    {year:1972,a:0.01},{year:1973,a:0.16},{year:1974,a:-0.07},{year:1975,a:-0.01},
    {year:1976,a:-0.10},{year:1977,a:0.18},{year:1978,a:0.07},{year:1979,a:0.16},
    {year:1980,a:0.26},{year:1981,a:0.32},{year:1982,a:0.14},{year:1983,a:0.31},
    {year:1984,a:0.16},{year:1985,a:0.12},{year:1986,a:0.18},{year:1987,a:0.33},
    {year:1988,a:0.39},{year:1989,a:0.27},{year:1990,a:0.45},{year:1991,a:0.41},
    {year:1992,a:0.22},{year:1993,a:0.24},{year:1994,a:0.31},{year:1995,a:0.45},
    {year:1996,a:0.35},{year:1997,a:0.46},{year:1998,a:0.61},{year:1999,a:0.40},
    {year:2000,a:0.39},{year:2001,a:0.54},{year:2002,a:0.63},{year:2003,a:0.62},
    {year:2004,a:0.54},{year:2005,a:0.68},{year:2006,a:0.64},{year:2007,a:0.66},
    {year:2008,a:0.54},{year:2009,a:0.64},{year:2010,a:0.72},{year:2011,a:0.61},
    {year:2012,a:0.65},{year:2013,a:0.68},{year:2014,a:0.75},{year:2015,a:0.90},
    {year:2016,a:1.01},{year:2017,a:0.92},{year:2018,a:0.85},{year:2019,a:0.98},
    {year:2020,a:1.02},{year:2021,a:0.85},{year:2022,a:0.89},{year:2023,a:1.17}
];

const width = 700, height = 700;
const cx = width / 2, cy = height / 2;
const maxRadius = Math.min(width, height) / 2 - 50;
const minRadius = 30;

const svg = d3.select('#chart')
    .attr('width', width).attr('height', height)
    .attr('viewBox', `0 0 ${width} ${height}`);

const g = svg.append('g').attr('transform', `translate(${cx},${cy})`);

const yearExtent = d3.extent(tempData, d => d.year);
const anomalyExtent = [-0.5, 1.2];

const radiusScale = d3.scaleLinear()
    .domain(yearExtent)
    .range([minRadius, maxRadius]);

const colorScale = d3.scaleDiverging(d3.interpolateRdBu)
    .domain([1.5, 0, -0.5]);

// Reference circles for anomaly levels
[-0.5, 0, 0.5, 1.0, 1.5].forEach(level => {
    // Just draw baseline circle
    if (level === 0) {
        g.append('circle')
            .attr('r', radiusScale(1951))
            .attr('fill', 'none')
            .attr('stroke', 'rgba(96,108,56,0.2)')
            .attr('stroke-width', 1)
            .attr('stroke-dasharray', '4,4');
    }
});

// Draw concentric decade circles
for (let yr = 1880; yr <= 2020; yr += 20) {
    g.append('circle')
        .attr('r', radiusScale(yr))
        .attr('fill', 'none')
        .attr('stroke', 'rgba(96,108,56,0.1)')
        .attr('stroke-width', 0.5);
    g.append('text')
        .attr('x', 0).attr('y', -radiusScale(yr) - 2)
        .attr('text-anchor', 'middle')
        .attr('fill', 'rgba(96,108,56,0.4)')
        .attr('font-size', '9px')
        .attr('font-family', 'Nunito, sans-serif')
        .text(yr);
}

// Create rings group
const ringsGroup = g.append('g');

// For each year, draw a ring (circle with stroke color based on anomaly)
const rings = ringsGroup.selectAll('.year-ring')
    .data(tempData)
    .enter().append('circle')
    .attr('class', 'year-ring')
    .attr('r', d => radiusScale(d.year))
    .attr('fill', 'none')
    .attr('stroke', d => colorScale(d.a))
    .attr('stroke-width', 2.5)
    .attr('opacity', 0)
    .style('cursor', 'pointer')
    .on('mouseenter', function(event, d) {
        d3.select(this).attr('stroke-width', 5);
        updateInfo(tempData.indexOf(d));
    })
    .on('mouseleave', function() {
        d3.select(this).attr('stroke-width', 2.5);
    });

// Animation
let currentIndex = 0;
let animationTimer = null;
let isPlaying = false;

function updateInfo(i) {
    const d = tempData[i];
    document.getElementById('yearLabel').textContent = d.year;
    const sign = d.a >= 0 ? '+' : '';
    document.getElementById('anomalyLabel').textContent =
        `Annual mean anomaly: ${sign}${d.a.toFixed(2)}°C`;
}

function revealRing(i) {
    rings.filter((d, idx) => idx === i)
        .transition().duration(50)
        .attr('opacity', 0.8);
    updateInfo(i);
}

function play() {
    if (isPlaying) return;
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸ Pause';
    document.getElementById('playBtn').classList.add('active');
    animationTimer = d3.interval(() => {
        if (currentIndex >= tempData.length) { stop(); return; }
        revealRing(currentIndex);
        currentIndex++;
    }, 60);
}

function stop() {
    isPlaying = false;
    if (animationTimer) animationTimer.stop();
    document.getElementById('playBtn').textContent = '▶ Play';
    document.getElementById('playBtn').classList.remove('active');
}

function reset() {
    stop(); currentIndex = 0;
    rings.attr('opacity', 0);
    updateInfo(0);
}

function showAll() {
    stop(); currentIndex = tempData.length;
    rings.transition().duration(800).attr('opacity', 0.8);
    updateInfo(tempData.length - 1);
}

document.getElementById('playBtn').addEventListener('click', () => { isPlaying ? stop() : play(); });
document.getElementById('resetBtn').addEventListener('click', reset);
document.getElementById('showAllBtn').addEventListener('click', showAll);

updateInfo(0);
</script>
</body>
</html>
