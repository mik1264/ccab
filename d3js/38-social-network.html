<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Network Centrality - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 8px 16px; background: rgba(255,255,255,0.7);
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-family: 'Lora', serif; text-align: center; color: var(--moss); font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: var(--sage); margin-bottom: 1.5rem; }
        .chart-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        .info-bar {
            text-align: center; font-size: 0.85rem; color: var(--moss);
            margin-bottom: 8px; min-height: 24px;
        }
        .tooltip {
            position: absolute; pointer-events: none; background: rgba(61,68,35,0.92);
            color: var(--cream); padding: 10px 14px; border-radius: 10px;
            font-size: 0.8rem; line-height: 1.5; z-index: 100;
        }
        svg text { font-family: 'Nunito', sans-serif; }
        .legend { display: flex; gap: 16px; justify-content: center; margin-top: 12px; font-size: 0.82rem; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-swatch { width: 14px; height: 14px; border-radius: 50%; }
        .node-label { pointer-events: none; font-size: 9px; fill: var(--dark-moss); font-weight: 600; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="container">
        <h1>Social Network Centrality</h1>
        <p class="subtitle">Zachary's Karate Club — node size = betweenness centrality, color = community</p>
        <div class="chart-container">
            <div class="info-bar" id="info">Click a node to see its ego network</div>
            <div id="chart"></div>
            <div class="legend" id="legend"></div>
        </div>
    </div>
    <div class="tooltip" id="tooltip" style="display:none;"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    (function() {
        // Zachary's Karate Club dataset
        // Nodes: id, name, community (pre-computed Louvain), betweenness centrality (pre-computed), degree
        const nodes = [
            {id:0,name:"Mr. Hi",community:0,betweenness:0.4376,degree:16},
            {id:1,name:"Member 2",community:0,betweenness:0.0539,degree:9},
            {id:2,name:"Member 3",community:0,betweenness:0.1437,degree:10},
            {id:3,name:"Member 4",community:0,betweenness:0.0119,degree:6},
            {id:4,name:"Member 5",community:1,betweenness:0.0006,degree:3},
            {id:5,name:"Member 6",community:1,betweenness:0.0299,degree:4},
            {id:6,name:"Member 7",community:1,betweenness:0.0299,degree:4},
            {id:7,name:"Member 8",community:0,betweenness:0.0000,degree:4},
            {id:8,name:"Member 9",community:2,betweenness:0.0557,degree:5},
            {id:9,name:"Member 10",community:2,betweenness:0.0008,degree:2},
            {id:10,name:"Member 11",community:1,betweenness:0.0006,degree:3},
            {id:11,name:"Member 12",community:0,betweenness:0.0000,degree:1},
            {id:12,name:"Member 13",community:0,betweenness:0.0000,degree:2},
            {id:13,name:"Member 14",community:0,betweenness:0.0456,degree:5},
            {id:14,name:"Member 15",community:3,betweenness:0.0000,degree:2},
            {id:15,name:"Member 16",community:3,betweenness:0.0000,degree:2},
            {id:16,name:"Member 17",community:1,betweenness:0.0000,degree:2},
            {id:17,name:"Member 18",community:0,betweenness:0.0000,degree:2},
            {id:18,name:"Member 19",community:3,betweenness:0.0000,degree:2},
            {id:19,name:"Member 20",community:0,betweenness:0.0038,degree:3},
            {id:20,name:"Member 21",community:3,betweenness:0.0000,degree:2},
            {id:21,name:"Member 22",community:0,betweenness:0.0000,degree:2},
            {id:22,name:"Member 23",community:3,betweenness:0.0000,degree:2},
            {id:23,name:"Member 24",community:2,betweenness:0.0176,degree:5},
            {id:24,name:"Member 25",community:2,betweenness:0.0022,degree:3},
            {id:25,name:"Member 26",community:2,betweenness:0.0038,degree:3},
            {id:26,name:"Member 27",community:3,betweenness:0.0000,degree:2},
            {id:27,name:"Member 28",community:2,betweenness:0.0221,degree:4},
            {id:28,name:"Member 29",community:2,betweenness:0.0014,degree:3},
            {id:29,name:"Member 30",community:3,betweenness:0.0029,degree:4},
            {id:30,name:"Member 31",community:2,betweenness:0.0140,degree:4},
            {id:31,name:"Member 32",community:2,betweenness:0.0386,degree:6},
            {id:32,name:"Member 33",community:3,betweenness:0.1454,degree:12},
            {id:33,name:"Officer",community:3,betweenness:0.3040,degree:17}
        ];

        // Edges: source, target, weight (tie strength)
        const edges = [
            {s:0,t:1,w:4},{s:0,t:2,w:5},{s:0,t:3,w:3},{s:0,t:4,w:3},{s:0,t:5,w:3},
            {s:0,t:6,w:3},{s:0,t:7,w:2},{s:0,t:8,w:2},{s:0,t:10,w:2},{s:0,t:11,w:1},
            {s:0,t:12,w:2},{s:0,t:13,w:3},{s:0,t:17,w:2},{s:0,t:19,w:2},{s:0,t:21,w:2},
            {s:0,t:31,w:2},{s:1,t:2,w:6},{s:1,t:3,w:3},{s:1,t:7,w:4},{s:1,t:13,w:5},
            {s:1,t:17,w:1},{s:1,t:19,w:2},{s:1,t:21,w:2},{s:1,t:30,w:2},
            {s:2,t:3,w:3},{s:2,t:7,w:4},{s:2,t:8,w:5},{s:2,t:9,w:1},{s:2,t:13,w:3},
            {s:2,t:27,w:2},{s:2,t:28,w:2},{s:2,t:32,w:2},{s:3,t:7,w:3},{s:3,t:12,w:1},
            {s:3,t:13,w:3},{s:4,t:6,w:2},{s:4,t:10,w:3},{s:5,t:6,w:5},{s:5,t:10,w:3},
            {s:5,t:16,w:3},{s:6,t:16,w:3},{s:8,t:30,w:3},{s:8,t:32,w:3},{s:8,t:33,w:4},
            {s:9,t:33,w:2},{s:13,t:33,w:3},{s:14,t:32,w:3},{s:14,t:33,w:2},
            {s:15,t:32,w:3},{s:15,t:33,w:4},{s:18,t:32,w:1},{s:18,t:33,w:2},
            {s:19,t:33,w:1},{s:20,t:32,w:3},{s:20,t:33,w:1},{s:22,t:32,w:2},{s:22,t:33,w:3},
            {s:23,t:25,w:5},{s:23,t:27,w:4},{s:23,t:29,w:3},{s:23,t:32,w:5},{s:23,t:33,w:4},
            {s:24,t:25,w:2},{s:24,t:27,w:7},{s:24,t:31,w:4},
            {s:25,t:31,w:2},{s:26,t:29,w:4},{s:26,t:33,w:2},{s:27,t:33,w:4},
            {s:28,t:31,w:2},{s:28,t:33,w:2},{s:29,t:32,w:3},{s:29,t:33,w:4},
            {s:30,t:32,w:3},{s:30,t:33,w:3},{s:31,t:32,w:4},{s:31,t:33,w:4},
            {s:32,t:33,w:5}
        ];

        const communityColors = ["#3a6ea5", "#2ca02c", "#e8a838", "#c44e52"];
        const communityNames = ["Mr. Hi's Group", "Bridge Members", "Neutral Zone", "Officer's Group"];

        const width = Math.min(900, window.innerWidth - 80);
        const height = 560;

        const svg = d3.select("#chart").append("svg")
            .attr("width", width).attr("height", height);

        const tooltip = d3.select("#tooltip");
        const rScale = d3.scaleSqrt().domain([0, 0.44]).range([5, 28]);
        const wScale = d3.scaleLinear().domain([1, 7]).range([0.5, 4]);

        const links = edges.map(e => ({ source: e.s, target: e.t, weight: e.w }));

        const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(60))
            .force("charge", d3.forceManyBody().strength(-200))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(d => rScale(d.betweenness) + 5));

        const linkG = svg.append("g");
        const nodeG = svg.append("g");
        const labelG = svg.append("g");

        const linkEls = linkG.selectAll("line").data(links).join("line")
            .attr("stroke", "#b5b89a").attr("stroke-opacity", 0.6)
            .attr("stroke-width", d => wScale(d.weight));

        const nodeEls = nodeG.selectAll("circle").data(nodes).join("circle")
            .attr("r", d => rScale(d.betweenness))
            .attr("fill", d => communityColors[d.community])
            .attr("stroke", "white").attr("stroke-width", 1.5)
            .style("cursor", "pointer")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        const labelEls = labelG.selectAll("text").data(nodes).join("text")
            .attr("class", "node-label")
            .attr("text-anchor", "middle").attr("dy", d => -rScale(d.betweenness) - 4)
            .text(d => d.id === 0 || d.id === 33 ? d.name : "")
            .style("font-size", d => d.id === 0 || d.id === 33 ? "11px" : "9px");

        let selectedNode = null;

        nodeEls.on("mouseover", function(event, d) {
            d3.select(this).attr("stroke", "var(--dark-moss)").attr("stroke-width", 3);
            tooltip.style("display", "block").html(
                `<strong>${d.name}</strong><br>Community: ${communityNames[d.community]}<br>Degree: ${d.degree}<br>Betweenness: ${d.betweenness.toFixed(4)}`
            );
        })
        .on("mousemove", function(event) {
            tooltip.style("left", (event.pageX + 14) + "px").style("top", (event.pageY - 14) + "px");
        })
        .on("mouseout", function(event, d) {
            if (selectedNode !== d) d3.select(this).attr("stroke", "white").attr("stroke-width", 1.5);
            tooltip.style("display", "none");
        })
        .on("click", function(event, d) {
            if (selectedNode === d) {
                selectedNode = null;
                resetHighlight();
                d3.select("#info").text("Click a node to see its ego network");
                return;
            }
            selectedNode = d;
            highlightEgo(d);
        });

        function highlightEgo(d) {
            const neighbors = new Set();
            neighbors.add(d.id);
            links.forEach(l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                if (s === d.id) neighbors.add(t);
                if (t === d.id) neighbors.add(s);
            });
            nodeEls.attr("opacity", n => neighbors.has(n.id) ? 1 : 0.1)
                .attr("stroke", n => n.id === d.id ? "var(--dark-moss)" : "white")
                .attr("stroke-width", n => n.id === d.id ? 3 : 1.5);
            linkEls.attr("stroke-opacity", l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                return (s === d.id || t === d.id) ? 0.8 : 0.05;
            }).attr("stroke", l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                return (s === d.id || t === d.id) ? communityColors[d.community] : "#b5b89a";
            });
            labelEls.attr("opacity", n => neighbors.has(n.id) ? 1 : 0)
                .text(n => neighbors.has(n.id) ? n.name : "");
            d3.select("#info").text(`${d.name} — ${neighbors.size - 1} connections`);
        }

        function resetHighlight() {
            nodeEls.attr("opacity", 1).attr("stroke", "white").attr("stroke-width", 1.5);
            linkEls.attr("stroke-opacity", 0.6).attr("stroke", "#b5b89a");
            labelEls.attr("opacity", 1).text(d => d.id === 0 || d.id === 33 ? d.name : "");
        }

        simulation.on("tick", () => {
            linkEls.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            nodeEls.attr("cx", d => d.x = Math.max(30, Math.min(width - 30, d.x)))
                .attr("cy", d => d.y = Math.max(30, Math.min(height - 30, d.y)));
            labelEls.attr("x", d => d.x).attr("y", d => d.y);
        });

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
        }
        function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
        }

        // Legend
        const legend = d3.select("#legend");
        communityNames.forEach((name, i) => {
            const item = legend.append("div").attr("class", "legend-item");
            item.append("div").attr("class", "legend-swatch").style("background", communityColors[i]);
            item.append("span").text(name);
        });
    })();
    </script>
</body>
</html>
