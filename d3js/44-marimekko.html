<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marimekko Chart - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 8px 16px; background: rgba(255,255,255,0.7);
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-family: 'Lora', serif; text-align: center; color: var(--moss); font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: var(--sage); margin-bottom: 1.5rem; }
        .chart-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        .tooltip {
            position: absolute; pointer-events: none; background: rgba(61,68,35,0.92);
            color: var(--cream); padding: 10px 14px; border-radius: 10px;
            font-size: 0.8rem; line-height: 1.5; z-index: 100;
        }
        svg text { font-family: 'Nunito', sans-serif; }
        .legend { display: flex; gap: 16px; justify-content: center; margin-top: 16px; font-size: 0.85rem; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-swatch { width: 16px; height: 16px; border-radius: 3px; }
        .cell { stroke: white; stroke-width: 1.5; cursor: pointer; transition: opacity 0.2s; }
        .cell:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="container">
        <h1>Smartphone Market Share</h1>
        <p class="subtitle">Marimekko (Mosaic) chart — width = market size, height = brand share within region</p>
        <div class="chart-container">
            <div id="chart"></div>
            <div class="legend" id="legend"></div>
        </div>
    </div>
    <div class="tooltip" id="tooltip" style="display:none;"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    (function() {
        // Smartphone market data (2023 approximate, millions of units)
        const brands = ["Samsung", "Apple", "Xiaomi", "OPPO", "Others"];
        const brandColors = ["#3a6ea5", "#555555", "#e8a838", "#2ca02c", "#b5b89a"];

        // Regions sorted by market size (descending)
        const regions = [
            { name: "China", total: 280,
              shares: { Samsung: 2, Apple: 68, Xiaomi: 52, OPPO: 48, Others: 110 } },
            { name: "India", total: 150,
              shares: { Samsung: 30, Apple: 8, Xiaomi: 35, OPPO: 22, Others: 55 } },
            { name: "Rest of Asia", total: 140,
              shares: { Samsung: 38, Apple: 18, Xiaomi: 25, OPPO: 20, Others: 39 } },
            { name: "Europe", total: 130,
              shares: { Samsung: 45, Apple: 38, Xiaomi: 22, OPPO: 8, Others: 17 } },
            { name: "North America", total: 95,
              shares: { Samsung: 26, Apple: 55, Xiaomi: 1, OPPO: 0.5, Others: 12.5 } },
            { name: "Rest of World", total: 105,
              shares: { Samsung: 35, Apple: 12, Xiaomi: 18, OPPO: 12, Others: 28 } }
        ];

        const totalUnits = d3.sum(regions, r => r.total);

        const margin = { top: 30, right: 20, bottom: 80, left: 50 };
        const width = Math.min(1050, window.innerWidth - 80) - margin.left - margin.right;
        const height = 440 - margin.top - margin.bottom;

        const svg = d3.select("#chart").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
          .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        const tooltip = d3.select("#tooltip");
        const brandColorMap = {};
        brands.forEach((b, i) => { brandColorMap[b] = brandColors[i]; });

        // X positions (cumulative widths)
        let xCursor = 0;
        regions.forEach(r => {
            r.x0 = xCursor;
            r.width = (r.total / totalUnits) * width;
            xCursor += r.width;
        });

        // Y axis (percentage)
        const y = d3.scaleLinear().domain([0, 1]).range([height, 0]);

        svg.append("g").call(d3.axisLeft(y).ticks(5).tickFormat(d3.format(".0%")))
            .selectAll("text").style("fill", "var(--moss)").style("font-size", "11px");
        svg.selectAll(".domain, .tick line").style("stroke", "#b5b89a");

        // Grid
        svg.append("g").call(d3.axisLeft(y).ticks(5).tickSize(-width).tickFormat(""))
            .selectAll("line").style("stroke", "#e8e5d8").style("stroke-dasharray", "2,3");

        // Draw cells
        regions.forEach(r => {
            let yCursor = 0;
            brands.forEach(brand => {
                const units = r.shares[brand];
                const share = units / r.total;
                const cellHeight = share * height;

                svg.append("rect")
                    .attr("class", "cell")
                    .attr("x", r.x0 + 1)
                    .attr("y", yCursor)
                    .attr("width", Math.max(0, r.width - 2))
                    .attr("height", Math.max(0, cellHeight))
                    .attr("fill", brandColorMap[brand])
                    .attr("fill-opacity", 0.75)
                    .on("mouseover", function(event) {
                        d3.select(this).attr("fill-opacity", 1);
                        tooltip.style("display", "block").html(
                            `<strong>${r.name}</strong><br>Brand: ${brand}<br>Units: ${units}M<br>Share in region: ${(share * 100).toFixed(1)}%<br>Region total: ${r.total}M`
                        );
                    })
                    .on("mousemove", function(event) {
                        tooltip.style("left", (event.pageX + 14) + "px").style("top", (event.pageY - 14) + "px");
                    })
                    .on("mouseout", function() {
                        d3.select(this).attr("fill-opacity", 0.75);
                        tooltip.style("display", "none");
                    });

                // Label in cell if big enough
                if (cellHeight > 18 && r.width > 50) {
                    svg.append("text")
                        .attr("x", r.x0 + r.width / 2)
                        .attr("y", yCursor + cellHeight / 2)
                        .attr("text-anchor", "middle")
                        .attr("dominant-baseline", "middle")
                        .style("font-size", cellHeight > 30 && r.width > 80 ? "11px" : "9px")
                        .style("fill", "white").style("font-weight", "600")
                        .style("pointer-events", "none")
                        .text(brand === "Others" ? "" : `${brand} ${(share * 100).toFixed(0)}%`);
                }

                yCursor += cellHeight;
            });

            // Region label below
            svg.append("text")
                .attr("x", r.x0 + r.width / 2)
                .attr("y", height + 16)
                .attr("text-anchor", "middle")
                .style("font-size", r.width > 80 ? "11px" : "9px")
                .style("fill", "var(--moss)").style("font-weight", "700")
                .text(r.name);

            svg.append("text")
                .attr("x", r.x0 + r.width / 2)
                .attr("y", height + 32)
                .attr("text-anchor", "middle")
                .style("font-size", "9px")
                .style("fill", "var(--sage)")
                .text(`${r.total}M units`);
        });

        // Y axis label
        svg.append("text").attr("transform", "rotate(-90)")
            .attr("x", -height / 2).attr("y", -38)
            .style("text-anchor", "middle").style("fill", "var(--moss)")
            .style("font-size", "12px").text("Brand Share");

        // Legend
        const legend = d3.select("#legend");
        brands.forEach((b, i) => {
            const item = legend.append("div").attr("class", "legend-item");
            item.append("div").attr("class", "legend-swatch").style("background", brandColors[i]);
            item.append("span").text(b);
        });
    })();
    </script>
</body>
</html>
