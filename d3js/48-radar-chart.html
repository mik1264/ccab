<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Chart: Programming Languages - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #606C38; min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #606C38; text-decoration: none; font-weight: 600;
            background: rgba(254,250,224,0.9); padding: 8px 16px;
            border-radius: 20px; border: 1px solid rgba(138,154,91,0.3);
            transition: all 0.3s; z-index: 1000; font-size: 0.9rem;
        }
        .back-link:hover { background: #8A9A5B; color: #FEFAE0; }
        h1 { font-family: 'Lora', serif; text-align: center; color: #606C38; font-size: 2rem; padding: 70px 0 5px; }
        .subtitle { text-align: center; color: #8A9A5B; font-size: 0.95rem; margin-bottom: 15px; }
        .legend {
            display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .legend-item {
            display: flex; align-items: center; gap: 7px;
            cursor: pointer; padding: 5px 14px; border-radius: 16px;
            transition: all 0.2s; font-size: 0.85rem; font-weight: 700;
            border: 2px solid currentColor;
        }
        .legend-item.hidden { opacity: 0.3; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .chart-container { display: flex; justify-content: center; padding: 0 20px 30px; }
        #chart-wrap {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        .tooltip {
            position: fixed; background: rgba(61,68,35,0.92);
            border-radius: 10px; padding: 10px 14px;
            font-size: 0.82rem; pointer-events: none;
            opacity: 0; color: #FEFAE0; z-index: 200;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Back to Gallery</a>
    <h1>Radar Chart</h1>
    <p class="subtitle">Programming languages compared across 8 dimensions — click legend to toggle</p>
    <div class="legend" id="legend"></div>
    <div class="chart-container">
        <div id="chart-wrap"><div id="chart"></div></div>
    </div>
    <div class="tooltip" id="tooltip"></div>

<script>
const attributes = [
    "Performance",
    "Ease of Learning",
    "Job Market",
    "Community",
    "Libraries",
    "Type Safety",
    "Web Dev",
    "Data Science"
];

const languages = [
    {
        name: "Python",
        color: "#4e79a7",
        scores: [55, 90, 92, 95, 98, 40, 65, 99]
    },
    {
        name: "JavaScript",
        color: "#f28e2b",
        scores: [60, 75, 95, 92, 90, 35, 99, 50]
    },
    {
        name: "Rust",
        color: "#e15759",
        scores: [99, 30, 55, 70, 65, 99, 40, 25]
    },
    {
        name: "Go",
        color: "#59a14f",
        scores: [88, 70, 72, 72, 70, 85, 70, 40]
    },
    {
        name: "TypeScript",
        color: "#b07aa1",
        scores: [62, 65, 85, 88, 89, 82, 97, 52]
    }
];

const hidden = new Set();
const N = attributes.length;
const R = 160;
const cx = 220, cy = 220;
const W = 440, H = 440;

const angleSlice = (2 * Math.PI) / N;

const rScale = d3.scaleLinear().domain([0, 100]).range([0, R]);

const svg = d3.select('#chart')
    .append('svg')
    .attr('width', W).attr('height', H)
    .style('font-family', 'Nunito, sans-serif');

const g = svg.append('g').attr('transform', `translate(${cx},${cy})`);

// Grid circles
const levels = 5;
for (let l = 1; l <= levels; l++) {
    const r = R * l / levels;
    // Grid polygon
    const pts = attributes.map((_, i) => {
        const angle = angleSlice * i - Math.PI / 2;
        return [r * Math.cos(angle), r * Math.sin(angle)];
    });
    g.append('polygon')
        .attr('points', pts.map(p => p.join(',')).join(' '))
        .attr('fill', l % 2 === 0 ? 'rgba(138,154,91,0.05)' : 'none')
        .attr('stroke', '#c8d4a8')
        .attr('stroke-width', 1);

    // Level label
    g.append('text')
        .attr('x', 4)
        .attr('y', -r)
        .attr('dy', '0.35em')
        .style('font-size', '9px')
        .style('fill', '#8A9A5B')
        .text(l * 20);
}

// Axis lines & labels
attributes.forEach((attr, i) => {
    const angle = angleSlice * i - Math.PI / 2;
    const x2 = R * Math.cos(angle);
    const y2 = R * Math.sin(angle);
    g.append('line')
        .attr('x1', 0).attr('y1', 0)
        .attr('x2', x2).attr('y2', y2)
        .attr('stroke', '#c8d4a8').attr('stroke-width', 1.5);

    const labelR = R + 24;
    const lx = labelR * Math.cos(angle);
    const ly = labelR * Math.sin(angle);
    g.append('text')
        .attr('x', lx).attr('y', ly)
        .attr('text-anchor', Math.abs(lx) < 5 ? 'middle' : lx > 0 ? 'start' : 'end')
        .attr('dy', '0.35em')
        .style('font-size', '11px')
        .style('font-weight', '700')
        .style('fill', '#3d4423')
        .text(attr);
});

const tooltip = d3.select('#tooltip');

// Polygon path generator
function polyPath(scores) {
    const pts = scores.map((s, i) => {
        const angle = angleSlice * i - Math.PI / 2;
        const r = rScale(s);
        return [r * Math.cos(angle), r * Math.sin(angle)];
    });
    return d3.line()(pts) + 'Z';
}

// Vertex dots per language
const langGroups = g.selectAll('.lang-group')
    .data(languages)
    .join('g')
    .attr('class', 'lang-group');

// Polygon fills
const polys = langGroups.append('path')
    .attr('d', d => polyPath(d.scores))
    .attr('fill', d => d.color)
    .attr('fill-opacity', 0.15)
    .attr('stroke', d => d.color)
    .attr('stroke-width', 2.2)
    .attr('stroke-opacity', 0.9)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
        d3.selectAll('.lang-group path').attr('fill-opacity', 0.05).attr('stroke-opacity', 0.2);
        d3.select(this).attr('fill-opacity', 0.35).attr('stroke-opacity', 1).attr('stroke-width', 3);
    })
    .on('mouseout', function() {
        d3.selectAll('.lang-group path').attr('fill-opacity', d => hidden.has(d.name) ? 0 : 0.15).attr('stroke-opacity', d => hidden.has(d.name) ? 0 : 0.9).attr('stroke-width', 2.2);
        tooltip.style('opacity', 0);
    });

// Dots
langGroups.selectAll('circle')
    .data(d => d.scores.map((s, i) => ({ s, i, lang: d })))
    .join('circle')
    .attr('cx', d => rScale(d.s) * Math.cos(angleSlice * d.i - Math.PI / 2))
    .attr('cy', d => rScale(d.s) * Math.sin(angleSlice * d.i - Math.PI / 2))
    .attr('r', 4)
    .attr('fill', d => d.lang.color)
    .attr('stroke', '#FEFAE0')
    .attr('stroke-width', 1.5)
    .on('mouseover', function(event, d) {
        tooltip.style('opacity', 1)
            .html(`<strong>${d.lang.name}</strong><br>${attributes[d.i]}: <b>${d.s}/100</b>`)
            .style('left', (event.clientX + 12) + 'px')
            .style('top', (event.clientY - 10) + 'px');
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.clientX + 12) + 'px').style('top', (event.clientY - 10) + 'px');
    })
    .on('mouseout', function() {
        tooltip.style('opacity', 0);
    });

// Legend
const legendDiv = d3.select('#legend');
languages.forEach(lang => {
    const item = legendDiv.append('div')
        .attr('class', 'legend-item')
        .style('color', lang.color)
        .on('click', function() {
            if (hidden.has(lang.name)) hidden.delete(lang.name);
            else hidden.add(lang.name);
            const isHidden = hidden.has(lang.name);
            d3.select(this).classed('hidden', isHidden);
            // Toggle visibility
            langGroups.filter(d => d.name === lang.name)
                .selectAll('path')
                .transition().duration(400)
                .attr('fill-opacity', isHidden ? 0 : 0.15)
                .attr('stroke-opacity', isHidden ? 0 : 0.9);
            langGroups.filter(d => d.name === lang.name)
                .selectAll('circle')
                .transition().duration(400)
                .attr('opacity', isHidden ? 0 : 1);
        });
    item.append('div').attr('class', 'legend-dot').style('background', lang.color);
    item.append('span').text(lang.name);
});

// Entrance animation
langGroups.selectAll('path')
    .attr('transform', 'scale(0)')
    .transition().duration(800).delay((d, i) => i * 120)
    .ease(d3.easeBounceOut)
    .attr('transform', 'scale(1)');
</script>
</body>
</html>
