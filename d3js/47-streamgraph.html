<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamgraph: Music Genres - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #606C38; min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #606C38; text-decoration: none; font-weight: 600;
            background: rgba(254,250,224,0.9); padding: 8px 16px;
            border-radius: 20px; border: 1px solid rgba(138,154,91,0.3);
            transition: all 0.3s; z-index: 1000; font-size: 0.9rem;
        }
        .back-link:hover { background: #8A9A5B; color: #FEFAE0; }
        h1 { font-family: 'Lora', serif; text-align: center; color: #606C38; font-size: 2rem; padding: 70px 0 5px; }
        .subtitle { text-align: center; color: #8A9A5B; font-size: 0.95rem; margin-bottom: 12px; }
        .legend {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
            margin-bottom: 12px; padding: 0 20px;
        }
        .legend-item {
            display: flex; align-items: center; gap: 6px;
            cursor: pointer; padding: 4px 12px; border-radius: 14px;
            transition: all 0.2s; font-size: 0.83rem; font-weight: 600;
            border: 2px solid transparent;
        }
        .legend-item.hidden { opacity: 0.35; }
        .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
        .chart-container { display: flex; justify-content: center; padding: 0 20px 30px; }
        #chart-wrap {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 20px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
            overflow-x: auto;
        }
        .tooltip {
            position: fixed; background: rgba(61,68,35,0.92);
            border-radius: 10px; padding: 10px 14px;
            font-size: 0.82rem; pointer-events: none;
            opacity: 0; color: #FEFAE0; z-index: 200;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Back to Gallery</a>
    <h1>Music Genre Streamgraph</h1>
    <p class="subtitle">Genre popularity 1960–2023 — hover to explore, click legend to toggle</p>
    <div class="legend" id="legend"></div>
    <div class="chart-container">
        <div id="chart-wrap"><div id="chart"></div></div>
    </div>
    <div class="tooltip" id="tooltip"></div>

<script>
const genres = ["Rock","Pop","Hip-Hop","R&B","Country","Electronic","Jazz","Classical"];
const COLORS = {
    "Rock":       "#e15759",
    "Pop":        "#f28e2b",
    "Hip-Hop":    "#76b7b2",
    "R&B":        "#b07aa1",
    "Country":    "#59a14f",
    "Electronic": "#4e79a7",
    "Jazz":       "#edc948",
    "Classical":  "#9c755f"
};

// Popularity data per decade/year segment (approximate, normalized to add up)
// years: 1960..2023 every 7 years ~ 10 points
const years = [1960,1965,1970,1975,1980,1985,1990,1995,2000,2005,2010,2015,2020,2023];

const rawData = {
    "Rock":       [55, 60, 65, 58, 52, 45, 38, 30, 22, 18, 14, 11, 9, 8],
    "Pop":        [20, 22, 25, 28, 30, 35, 32, 28, 26, 24, 22, 24, 26, 28],
    "Hip-Hop":    [0,   0,  1,  2,  4,  8, 14, 20, 24, 28, 30, 28, 26, 25],
    "R&B":        [10, 10,  8,  7,  8,  8,  9, 10,  9,  8,  8,  9, 10, 10],
    "Country":    [8,   7,  6,  7,  8,  8,  8,  9, 10, 10, 11, 12, 11, 11],
    "Electronic": [0,   0,  1,  2,  3,  5,  8,  8,  8,  9, 12, 13, 14, 14],
    "Jazz":       [5,   5,  4,  4,  3,  3,  3,  3,  3,  3,  3,  3,  3,  3],
    "Classical":  [2,   2,  2,  2,  2,  2,  2,  2,  2,  2,  2,  2,  2,  2]
};

// Build stacked data
const data = years.map((yr, i) => {
    const row = { year: yr };
    genres.forEach(g => { row[g] = rawData[g][i]; });
    return row;
});

const W = Math.min(860, window.innerWidth - 80);
const H = 420;
const margin = { top: 20, right: 20, bottom: 40, left: 40 };

const hiddenGenres = new Set();

const svg = d3.select('#chart')
    .append('svg')
    .attr('width', W)
    .attr('height', H)
    .style('font-family', 'Nunito, sans-serif');

const gChart = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
const innerW = W - margin.left - margin.right;
const innerH = H - margin.top - margin.bottom;

const x = d3.scaleLinear().domain(d3.extent(years)).range([0, innerW]);
const y = d3.scaleLinear().range([innerH, 0]);

const tooltip = d3.select('#tooltip');

// X axis
gChart.append('g')
    .attr('transform', `translate(0,${innerH})`)
    .call(d3.axisBottom(x).tickFormat(d3.format('d')).ticks(8).tickSizeOuter(0))
    .selectAll('text').style('font-size', '12px').style('fill', '#606C38');

// Y axis label
gChart.append('text')
    .attr('transform', 'rotate(-90)')
    .attr('y', -35).attr('x', -innerH / 2)
    .attr('text-anchor', 'middle')
    .style('font-size', '11px').style('fill', '#8A9A5B')
    .text('Relative Popularity (%)');

function buildStack() {
    const activeGenres = genres.filter(g => !hiddenGenres.has(g));
    const stack = d3.stack()
        .keys(activeGenres)
        .offset(d3.stackOffsetWiggle)
        .order(d3.stackOrderInsideOut);
    return stack(data);
}

function render() {
    const stacked = buildStack();
    const yExtent = [
        d3.min(stacked, layer => d3.min(layer, d => d[0])),
        d3.max(stacked, layer => d3.max(layer, d => d[1]))
    ];
    y.domain(yExtent);

    const area = d3.area()
        .x(d => x(d.data.year))
        .y0(d => y(d[0]))
        .y1(d => y(d[1]))
        .curve(d3.curveBasis);

    const paths = gChart.selectAll('.stream-path')
        .data(stacked, d => d.key);

    paths.join(
        enter => enter.append('path')
            .attr('class', 'stream-path')
            .attr('fill', d => COLORS[d.key])
            .attr('opacity', 0)
            .attr('d', area)
            .style('cursor', 'pointer')
            .on('mouseover', function(event, d) {
                d3.selectAll('.stream-path').attr('opacity', 0.3);
                d3.select(this).attr('opacity', 0.9).raise();
            })
            .on('mousemove', function(event, d) {
                const xVal = x.invert(d3.pointer(event, gChart.node())[0]);
                const nearestIdx = d3.minIndex(years, yr => Math.abs(yr - xVal));
                const yr = years[nearestIdx];
                const val = rawData[d.key][nearestIdx];
                tooltip.style('opacity', 1)
                    .html(`<strong>${d.key}</strong><br>${yr}: <b>${val}%</b> popularity`)
                    .style('left', (event.clientX + 12) + 'px')
                    .style('top', (event.clientY - 10) + 'px');
            })
            .on('mouseout', function() {
                d3.selectAll('.stream-path').attr('opacity', 0.75);
                tooltip.style('opacity', 0);
            })
            .call(e => e.transition().duration(800).attr('opacity', 0.75)),
        update => update.transition().duration(600).attr('d', area),
        exit => exit.transition().duration(400).attr('opacity', 0).remove()
    );
}

// Legend
const legendDiv = d3.select('#legend');
genres.forEach(genre => {
    const item = legendDiv.append('div').attr('class', 'legend-item')
        .style('border-color', COLORS[genre])
        .on('click', function() {
            if (hiddenGenres.has(genre)) hiddenGenres.delete(genre);
            else hiddenGenres.add(genre);
            d3.select(this).classed('hidden', hiddenGenres.has(genre));
            render();
        });
    item.append('div').attr('class', 'legend-swatch').style('background', COLORS[genre]);
    item.append('span').text(genre);
});

render();
</script>
</body>
</html>
