<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Diagram: Les Mis&eacute;rables - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 8px 16px; background: rgba(255,255,255,0.7);
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-family: 'Lora', serif; text-align: center; color: var(--moss); font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: var(--sage); margin-bottom: 1.5rem; }
        .chart-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px; overflow-x: auto;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 1rem; }
        .btn {
            font-family: 'Nunito', sans-serif; font-size: 0.85rem;
            padding: 8px 18px; border-radius: 20px; border: 2px solid var(--sage);
            background: rgba(255,255,255,0.6); color: var(--moss); cursor: pointer;
            font-weight: 600; transition: all 0.3s ease;
        }
        .btn:hover, .btn.active { background: var(--sage); color: white; }
        .tooltip {
            position: absolute; pointer-events: none; background: rgba(61,68,35,0.92);
            color: var(--cream); padding: 10px 14px; border-radius: 10px;
            font-size: 0.8rem; line-height: 1.5; z-index: 100;
        }
        svg text { font-family: 'Nunito', sans-serif; }
        .legend { display: flex; gap: 12px; justify-content: center; margin-top: 12px; font-size: 0.82rem; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-swatch { width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="container">
        <h1>Arc Diagram: Les Mis&eacute;rables</h1>
        <p class="subtitle">Character co-occurrence network — hover nodes to highlight connections</p>
        <div class="controls">
            <button class="btn active" id="sortGroup">Sort by Group</button>
            <button class="btn" id="sortName">Sort by Name</button>
            <button class="btn" id="sortDegree">Sort by Degree</button>
        </div>
        <div class="chart-container">
            <div id="chart"></div>
            <div class="legend" id="legend"></div>
        </div>
    </div>
    <div class="tooltip" id="tooltip" style="display:none;"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    (function() {
        // Les Miserables co-occurrence data (standard network science dataset)
        // Characters grouped by narrative arc
        const nodes = [
            {id:0,name:"Myriel",group:0,degree:0},{id:1,name:"Napoleon",group:0,degree:0},
            {id:2,name:"Mlle.Baptistine",group:0,degree:0},{id:3,name:"Mme.Magloire",group:0,degree:0},

            {id:14,name:"Isabeau",group:1,degree:0},{id:15,name:"Gervais",group:1,degree:0},
            {id:16,name:"Tholomyes",group:2,degree:0},{id:17,name:"Listolier",group:2,degree:0},
            {id:18,name:"Fameuil",group:2,degree:0},{id:19,name:"Blacheville",group:2,degree:0},
            {id:20,name:"Favourite",group:2,degree:0},{id:21,name:"Dahlia",group:2,degree:0},

            {id:24,name:"Mme.Thenardier",group:3,degree:0},{id:25,name:"Thenardier",group:3,degree:0},
            {id:26,name:"Cosette",group:3,degree:0},{id:27,name:"Javert",group:1,degree:0},
            {id:28,name:"Fauchelevent",group:1,degree:0},{id:29,name:"Bamatabois",group:2,degree:0},
            {id:30,name:"Perpetue",group:2,degree:0},{id:31,name:"Simplice",group:2,degree:0},
            {id:32,name:"Scaufflaire",group:1,degree:0},{id:33,name:"Woman1",group:1,degree:0},
            {id:34,name:"Judge",group:1,degree:0},{id:35,name:"Champmathieu",group:1,degree:0},

            {id:64,name:"Bossuet",group:4,degree:0},{id:65,name:"Joly",group:4,degree:0},
            {id:66,name:"Grantaire",group:4,degree:0},{id:67,name:"MotherPlutarch",group:5,degree:0},
            {id:68,name:"Gueulemer",group:3,degree:0},{id:69,name:"Babet",group:3,degree:0},
            {id:70,name:"Claquesous",group:3,degree:0},{id:71,name:"Montparnasse",group:3,degree:0},
            {id:72,name:"Toussaint",group:3,degree:0},{id:73,name:"Child1",group:4,degree:0},
            {id:74,name:"Child2",group:4,degree:0},{id:75,name:"Brujon",group:3,degree:0},
            {id:76,name:"Mme.Hucheloup",group:4,degree:0}
        ];

        const links = [
            {s:1,t:0,v:1},{s:2,t:0,v:8},{s:3,t:0,v:10},{s:3,t:2,v:6},{s:4,t:0,v:1},
            {s:5,t:0,v:1},{s:6,t:0,v:1},{s:7,t:0,v:1},{s:8,t:0,v:2},{s:9,t:0,v:1},
            {s:11,t:10,v:1},{s:11,t:0,v:1},{s:12,t:23,v:1},{s:13,t:10,v:1},
            {s:14,t:10,v:1},{s:15,t:10,v:1},{s:16,t:23,v:4},{s:17,t:23,v:4},
            {s:17,t:16,v:4},{s:18,t:23,v:4},{s:18,t:16,v:4},{s:18,t:17,v:4},
            {s:19,t:23,v:4},{s:19,t:16,v:4},{s:19,t:17,v:4},{s:19,t:18,v:4},
            {s:20,t:23,v:3},{s:20,t:16,v:3},{s:20,t:17,v:3},{s:20,t:18,v:3},
            {s:20,t:19,v:4},{s:21,t:23,v:3},{s:21,t:16,v:3},{s:21,t:17,v:3},
            {s:21,t:18,v:3},{s:21,t:19,v:3},{s:21,t:20,v:5},{s:22,t:23,v:3},
            {s:22,t:16,v:3},{s:22,t:17,v:3},{s:22,t:18,v:3},{s:22,t:19,v:3},
            {s:22,t:20,v:4},{s:22,t:21,v:4},{s:23,t:10,v:5},{s:24,t:10,v:3},
            {s:24,t:25,v:5},{s:24,t:23,v:1},{s:25,t:10,v:5},{s:25,t:23,v:1},
            {s:26,t:10,v:3},{s:26,t:24,v:2},{s:26,t:25,v:2},{s:27,t:10,v:5},
            {s:27,t:23,v:1},{s:27,t:25,v:1},{s:27,t:24,v:1},{s:28,t:10,v:2},
            {s:28,t:0,v:1},{s:29,t:10,v:1},{s:29,t:23,v:1},{s:29,t:27,v:1},
            {s:30,t:23,v:1},{s:31,t:10,v:2},{s:31,t:23,v:3},{s:32,t:10,v:1},
            {s:33,t:10,v:1},{s:34,t:10,v:2},{s:34,t:27,v:1},{s:35,t:10,v:1},
            {s:35,t:34,v:1},{s:36,t:10,v:1},{s:36,t:34,v:2},{s:36,t:35,v:2},
            {s:37,t:10,v:1},{s:37,t:34,v:2},{s:37,t:35,v:2},{s:37,t:36,v:2},
            {s:38,t:10,v:1},{s:38,t:34,v:2},{s:38,t:35,v:2},{s:38,t:36,v:2},
            {s:38,t:37,v:2},{s:39,t:25,v:1},{s:40,t:25,v:1},{s:41,t:10,v:2},
            {s:41,t:25,v:3},{s:41,t:55,v:3},{s:42,t:24,v:1},{s:42,t:25,v:2},
            {s:43,t:10,v:1},{s:43,t:25,v:1},{s:44,t:10,v:1},{s:44,t:28,v:3},
            {s:45,t:28,v:2},{s:45,t:10,v:1},{s:46,t:25,v:1},{s:47,t:25,v:1},
            {s:48,t:10,v:3},{s:48,t:25,v:3},{s:48,t:27,v:1},{s:48,t:24,v:1},
            {s:48,t:41,v:2},{s:49,t:10,v:1},{s:49,t:55,v:6},{s:50,t:24,v:1},
            {s:50,t:49,v:1},{s:51,t:10,v:3},{s:51,t:49,v:5},{s:51,t:55,v:5},
            {s:51,t:26,v:1},{s:52,t:39,v:1},{s:52,t:51,v:1},{s:53,t:51,v:1},
            {s:54,t:49,v:2},{s:54,t:51,v:6},{s:55,t:10,v:5},{s:55,t:25,v:3},
            {s:55,t:27,v:1},{s:55,t:48,v:1},{s:55,t:26,v:3},{s:56,t:49,v:1},
            {s:56,t:55,v:1},{s:57,t:55,v:1},{s:57,t:48,v:2},{s:57,t:58,v:1},
            {s:58,t:10,v:3},{s:58,t:48,v:4},{s:58,t:55,v:3},{s:58,t:27,v:1},
            {s:59,t:48,v:2},{s:59,t:58,v:6},{s:59,t:55,v:1},{s:60,t:48,v:1},
            {s:60,t:58,v:4},{s:61,t:48,v:2},{s:61,t:58,v:6},{s:61,t:59,v:2},
            {s:61,t:60,v:2},{s:62,t:48,v:3},{s:62,t:55,v:4},{s:62,t:58,v:3},
            {s:62,t:59,v:3},{s:62,t:60,v:2},{s:62,t:41,v:2},{s:62,t:61,v:2},
            {s:63,t:48,v:2},{s:63,t:58,v:5},{s:63,t:59,v:1},{s:63,t:60,v:1},
            {s:63,t:61,v:2},{s:63,t:62,v:2},{s:63,t:55,v:1},{s:64,t:48,v:3},
            {s:64,t:58,v:5},{s:64,t:59,v:1},{s:64,t:60,v:2},{s:64,t:61,v:2},
            {s:64,t:62,v:2},{s:64,t:63,v:3},{s:64,t:55,v:1},{s:64,t:65,v:5},
            {s:65,t:48,v:2},{s:65,t:58,v:5},{s:65,t:59,v:1},{s:65,t:60,v:1},
            {s:65,t:61,v:2},{s:65,t:62,v:2},{s:65,t:63,v:2},{s:66,t:48,v:1},
            {s:66,t:58,v:3},{s:66,t:59,v:1},{s:66,t:60,v:1},{s:66,t:61,v:1},
            {s:66,t:62,v:1},{s:66,t:63,v:1},{s:66,t:64,v:2},{s:66,t:65,v:2},
            {s:67,t:57,v:3},{s:68,t:25,v:5},{s:68,t:69,v:6},{s:68,t:70,v:5},
            {s:68,t:71,v:5},{s:69,t:25,v:5},{s:69,t:70,v:6},{s:69,t:71,v:5},
            {s:70,t:25,v:4},{s:70,t:71,v:5},{s:71,t:25,v:4},{s:72,t:10,v:2},
            {s:72,t:26,v:1},{s:73,t:48,v:2},{s:74,t:48,v:2},{s:74,t:73,v:3},
            {s:75,t:25,v:3},{s:75,t:68,v:3},{s:75,t:69,v:3},{s:75,t:70,v:3},
            {s:75,t:71,v:3},{s:76,t:48,v:1},{s:76,t:58,v:1},{s:76,t:64,v:1}
        ];

        // Compute degrees
        links.forEach(l => { nodes[l.s].degree++; nodes[l.t].degree++; });

        const groupColors = ["#e8a838", "#3a6ea5", "#c44e52", "#2ca02c", "#9467bd", "#8c564b"];
        const groupNames = ["Bishop's Circle", "Valjean's Path", "Fantine's World", "Thenardier Gang", "Revolution", "Gillenormand Family"];

        const margin = { top: 20, right: 20, bottom: 120, left: 20 };
        const width = Math.min(1150, window.innerWidth - 60) - margin.left - margin.right;
        const height = 400;

        const svgEl = d3.select("#chart").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom);
        const svg = svgEl.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        const tooltip = d3.select("#tooltip");
        let sortMode = "group";

        function draw() {
            svg.selectAll("*").remove();
            const sorted = [...nodes];
            if (sortMode === "group") sorted.sort((a, b) => a.group - b.group || a.name.localeCompare(b.name));
            else if (sortMode === "name") sorted.sort((a, b) => a.name.localeCompare(b.name));
            else sorted.sort((a, b) => b.degree - a.degree);

            const posMap = {};
            sorted.forEach((n, i) => { posMap[n.id] = i; });

            const x = d3.scalePoint()
                .domain(sorted.map(n => n.id))
                .range([20, width - 20]);

            const midY = height * 0.55;
            const arcScale = d3.scaleLinear().domain([1, 10]).range([1, 4]).clamp(true);

            // Draw arcs
            const arcs = svg.selectAll(".arc")
                .data(links).join("path")
                .attr("class", "arc")
                .attr("d", d => {
                    const x1 = x(d.s), x2 = x(d.t);
                    const dist = Math.abs(posMap[d.s] - posMap[d.t]);
                    const r = Math.abs(x2 - x1) / 2;
                    const above = (posMap[d.s] + posMap[d.t]) % 2 === 0;
                    const sweep = above ? 1 : 0;
                    return `M${x1},${midY} A${r},${r} 0 0,${sweep} ${x2},${midY}`;
                })
                .attr("fill", "none")
                .attr("stroke", "#b5b89a")
                .attr("stroke-width", d => arcScale(d.v))
                .attr("stroke-opacity", 0.25);

            // Draw nodes
            const nodeEls = svg.selectAll(".node")
                .data(sorted).join("circle")
                .attr("class", "node")
                .attr("cx", d => x(d.id))
                .attr("cy", midY)
                .attr("r", d => Math.max(3, Math.min(8, 2 + d.degree * 0.5)))
                .attr("fill", d => groupColors[d.group])
                .attr("stroke", "white").attr("stroke-width", 1)
                .style("cursor", "pointer")
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("r", Math.max(3, Math.min(8, 2 + d.degree * 0.5)) + 3);
                    const connected = new Set();
                    links.forEach(l => {
                        if (l.s === d.id) connected.add(l.t);
                        if (l.t === d.id) connected.add(l.s);
                    });
                    arcs.attr("stroke-opacity", l =>
                        (l.s === d.id || l.t === d.id) ? 0.85 : 0.05
                    ).attr("stroke", l =>
                        (l.s === d.id || l.t === d.id) ? groupColors[d.group] : "#b5b89a"
                    );
                    nodeEls.attr("opacity", n =>
                        n.id === d.id || connected.has(n.id) ? 1 : 0.15
                    );
                    labelEls.attr("opacity", n =>
                        n.id === d.id || connected.has(n.id) ? 1 : 0.1
                    );
                    tooltip.style("display", "block").html(
                        `<strong>${d.name}</strong><br>Group: ${groupNames[d.group]}<br>Connections: ${d.degree}`
                    );
                })
                .on("mousemove", function(event) {
                    tooltip.style("left", (event.pageX + 14) + "px").style("top", (event.pageY - 14) + "px");
                })
                .on("mouseout", function(event, d) {
                    d3.select(this).attr("r", Math.max(3, Math.min(8, 2 + d.degree * 0.5)));
                    arcs.attr("stroke-opacity", 0.25).attr("stroke", "#b5b89a");
                    nodeEls.attr("opacity", 1);
                    labelEls.attr("opacity", 1);
                    tooltip.style("display", "none");
                });

            // Labels
            const labelEls = svg.selectAll(".label")
                .data(sorted).join("text")
                .attr("class", "label")
                .attr("x", d => x(d.id))
                .attr("y", midY + 14)
                .attr("text-anchor", "start")
                .attr("transform", d => `rotate(65,${x(d.id)},${midY + 14})`)
                .style("font-size", "8px")
                .style("fill", d => groupColors[d.group])
                .style("font-weight", "500")
                .text(d => d.name);
        }

        draw();

        d3.select("#sortGroup").on("click", function() {
            sortMode = "group";
            d3.selectAll(".btn").classed("active", false);
            d3.select(this).classed("active", true);
            draw();
        });
        d3.select("#sortName").on("click", function() {
            sortMode = "name";
            d3.selectAll(".btn").classed("active", false);
            d3.select(this).classed("active", true);
            draw();
        });
        d3.select("#sortDegree").on("click", function() {
            sortMode = "degree";
            d3.selectAll(".btn").classed("active", false);
            d3.select(this).classed("active", true);
            draw();
        });

        // Legend
        const legend = d3.select("#legend");
        groupNames.forEach((name, i) => {
            const item = legend.append("div").attr("class", "legend-item");
            item.append("div").attr("class", "legend-swatch").style("background", groupColors[i]);
            item.append("span").text(name);
        });
    })();
    </script>
</body>
</html>
