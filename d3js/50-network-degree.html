<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Degree Distribution - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #606C38; min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #606C38; text-decoration: none; font-weight: 600;
            background: rgba(254,250,224,0.9); padding: 8px 16px;
            border-radius: 20px; border: 1px solid rgba(138,154,91,0.3);
            transition: all 0.3s; z-index: 1000; font-size: 0.9rem;
        }
        .back-link:hover { background: #8A9A5B; color: #FEFAE0; }
        h1 { font-family: 'Lora', serif; text-align: center; color: #606C38; font-size: 2rem; padding: 70px 0 5px; }
        .subtitle { text-align: center; color: #8A9A5B; font-size: 0.95rem; margin-bottom: 15px; }
        .main-layout {
            display: flex; flex-wrap: wrap; gap: 16px;
            justify-content: center; padding: 0 16px 30px;
        }
        .panel {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 20px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
            flex: 1 1 340px; min-width: 300px; max-width: 480px;
        }
        .panel h3 {
            font-family: 'Lora', serif; color: #606C38; font-size: 1.1rem;
            margin-bottom: 12px; text-align: center;
        }
        #info-panel {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 14px 20px;
            box-shadow: 0 4px 16px rgba(96,108,56,0.1);
            margin: 0 16px 20px; text-align: center;
            font-size: 0.88rem; color: #606C38;
        }
        #info-panel .node-name { font-weight: 700; color: #BC6C25; font-size: 1rem; }
        .tooltip {
            position: fixed; background: rgba(61,68,35,0.92);
            border-radius: 10px; padding: 10px 14px;
            font-size: 0.82rem; pointer-events: none;
            opacity: 0; color: #FEFAE0; z-index: 200;
            line-height: 1.6;
        }
        .hint { text-align: center; color: #8A9A5B; font-size: 0.8rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Back to Gallery</a>
    <h1>Network Degree Distribution</h1>
    <p class="subtitle">Zachary's Karate Club — 34 nodes, force-directed + degree histogram</p>
    <div class="hint">Click a node to highlight its connections · Drag nodes to reposition · Scroll to zoom</div>
    <div id="info-panel">
        <span id="info-text">Click any node to see its connections</span>
    </div>
    <div class="main-layout">
        <div class="panel">
            <h3>Network Graph</h3>
            <div id="network"></div>
        </div>
        <div class="panel">
            <h3>Degree Distribution</h3>
            <div id="histogram"></div>
        </div>
    </div>
    <div class="tooltip" id="tooltip"></div>

<script>
// Zachary's Karate Club dataset (exact, 1977)
const nodes = [
    {id:0, label:"John A", community:0},  {id:1, label:"Mr Hi", community:0},
    {id:2, label:"Actor 2", community:0}, {id:3, label:"Actor 3", community:0},
    {id:4, label:"Actor 4", community:1}, {id:5, label:"Actor 5", community:1},
    {id:6, label:"Actor 6", community:1}, {id:7, label:"Actor 7", community:0},
    {id:8, label:"Actor 8", community:0}, {id:9, label:"Actor 9", community:3},
    {id:10,label:"Actor 10",community:1}, {id:11,label:"Actor 11",community:0},
    {id:12,label:"Actor 12",community:0}, {id:13,label:"Actor 13",community:0},
    {id:14,label:"Actor 14",community:3}, {id:15,label:"Actor 15",community:3},
    {id:16,label:"Actor 16",community:1}, {id:17,label:"Actor 17",community:0},
    {id:18,label:"Actor 18",community:3}, {id:19,label:"Actor 19",community:0},
    {id:20,label:"Actor 20",community:3}, {id:21,label:"Actor 21",community:0},
    {id:22,label:"Actor 22",community:3}, {id:23,label:"Actor 23",community:2},
    {id:24,label:"Actor 24",community:2}, {id:25,label:"Actor 25",community:2},
    {id:26,label:"Actor 26",community:3}, {id:27,label:"Actor 27",community:2},
    {id:28,label:"Actor 28",community:2}, {id:29,label:"Actor 29",community:3},
    {id:30,label:"Actor 30",community:3}, {id:31,label:"Actor 31",community:2},
    {id:32,label:"Officer",community:2},  {id:33,label:"John A (hi)", community:2}
];

const links = [
    {source:0,target:1,weight:4},{source:0,target:2,weight:5},{source:0,target:3,weight:3},
    {source:0,target:4,weight:3},{source:0,target:5,weight:4},{source:0,target:6,weight:4},
    {source:0,target:7,weight:4},{source:0,target:8,weight:5},{source:0,target:10,weight:3},
    {source:0,target:11,weight:3},{source:0,target:12,weight:3},{source:0,target:13,weight:3},
    {source:0,target:17,weight:2},{source:0,target:19,weight:2},{source:0,target:21,weight:2},
    {source:0,target:31,weight:2},{source:1,target:2,weight:6},{source:1,target:3,weight:3},
    {source:1,target:7,weight:4},{source:1,target:13,weight:5},{source:1,target:17,weight:2},
    {source:1,target:19,weight:2},{source:1,target:21,weight:2},{source:1,target:30,weight:2},
    {source:2,target:3,weight:3},{source:2,target:32,weight:2},{source:2,target:7,weight:4},
    {source:2,target:8,weight:2},{source:2,target:27,weight:2},{source:2,target:28,weight:2},
    {source:2,target:9,weight:2},{source:3,target:7,weight:3},{source:3,target:12,weight:3},
    {source:3,target:13,weight:3},{source:4,target:6,weight:2},{source:4,target:10,weight:3},
    {source:5,target:6,weight:5},{source:5,target:10,weight:3},{source:5,target:16,weight:3},
    {source:6,target:16,weight:3},{source:8,target:30,weight:3},{source:8,target:32,weight:4},
    {source:8,target:33,weight:4},{source:9,target:33,weight:2},{source:13,target:33,weight:3},
    {source:14,target:32,weight:3},{source:14,target:33,weight:3},{source:15,target:32,weight:3},
    {source:15,target:33,weight:3},{source:18,target:32,weight:2},{source:18,target:33,weight:2},
    {source:19,target:33,weight:2},{source:20,target:32,weight:2},{source:20,target:33,weight:2},
    {source:22,target:32,weight:2},{source:22,target:33,weight:2},{source:23,target:25,weight:5},
    {source:23,target:27,weight:4},{source:23,target:32,weight:3},{source:23,target:33,weight:5},
    {source:24,target:25,weight:2},{source:24,target:27,weight:3},{source:24,target:31,weight:2},
    {source:25,target:31,weight:7},{source:26,target:29,weight:4},{source:26,target:33,weight:2},
    {source:27,target:33,weight:4},{source:28,target:31,weight:2},{source:28,target:33,weight:2},
    {source:29,target:32,weight:4},{source:29,target:33,weight:2},{source:30,target:32,weight:3},
    {source:30,target:33,weight:3},{source:31,target:32,weight:4},{source:31,target:33,weight:4},
    {source:32,target:33,weight:5}
];

const COMMUNITY_COLORS = ['#4e79a7','#f28e2b','#59a14f','#e15759'];
const COMMUNITY_NAMES = ['Group A','Group B','Group C','Group D'];

// Compute degree
const degree = new Array(nodes.length).fill(0);
links.forEach(l => {
    degree[l.source]++;
    degree[l.target]++;
});
nodes.forEach(n => { n.degree = degree[n.id]; });

const maxDeg = d3.max(nodes, d => d.degree);
const rScale = d3.scaleSqrt().domain([0, maxDeg]).range([5, 18]);

const tooltip = d3.select('#tooltip');
const infoPanel = d3.select('#info-text');

// ---- NETWORK ----
const netW = 380, netH = 340;
const svgNet = d3.select('#network')
    .append('svg')
    .attr('width', netW).attr('height', netH)
    .call(d3.zoom().scaleExtent([0.4, 3]).on('zoom', function(event) {
        gNet.attr('transform', event.transform);
    }))
    .style('cursor', 'grab');

const gNet = svgNet.append('g');

const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(40).strength(0.6))
    .force('charge', d3.forceManyBody().strength(-120))
    .force('center', d3.forceCenter(netW / 2, netH / 2))
    .force('collision', d3.forceCollide().radius(d => rScale(d.degree) + 4));

const link = gNet.append('g')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('stroke', '#c8d4a8')
    .attr('stroke-width', d => Math.sqrt(d.weight) * 0.7)
    .attr('opacity', 0.7);

const node = gNet.append('g')
    .selectAll('circle')
    .data(nodes)
    .join('circle')
    .attr('r', d => rScale(d.degree))
    .attr('fill', d => COMMUNITY_COLORS[d.community])
    .attr('stroke', '#FEFAE0')
    .attr('stroke-width', 1.5)
    .style('cursor', 'pointer')
    .call(d3.drag()
        .on('start', function(event, d) { if (!event.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', function(event, d) { d.fx = event.x; d.fy = event.y; })
        .on('end', function(event, d) { if (!event.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on('mouseover', function(event, d) {
        tooltip.style('opacity', 1)
            .html(`<strong>${d.label}</strong><br>Degree: <b>${d.degree}</b><br>Community: ${COMMUNITY_NAMES[d.community]}`)
            .style('left', (event.clientX + 12) + 'px')
            .style('top', (event.clientY - 10) + 'px');
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.clientX + 12) + 'px').style('top', (event.clientY - 10) + 'px');
    })
    .on('mouseout', function() { tooltip.style('opacity', 0); })
    .on('click', function(event, d) {
        event.stopPropagation();
        // Highlight node and its neighbors
        const neighborIds = new Set();
        links.forEach(l => {
            const src = typeof l.source === 'object' ? l.source.id : l.source;
            const tgt = typeof l.target === 'object' ? l.target.id : l.target;
            if (src === d.id) neighborIds.add(tgt);
            if (tgt === d.id) neighborIds.add(src);
        });

        node.attr('opacity', n => n.id === d.id || neighborIds.has(n.id) ? 1 : 0.15)
            .attr('stroke-width', n => n.id === d.id ? 3 : 1.5)
            .attr('stroke', n => n.id === d.id ? '#BC6C25' : '#FEFAE0');

        link.attr('opacity', l => {
            const src = typeof l.source === 'object' ? l.source.id : l.source;
            const tgt = typeof l.target === 'object' ? l.target.id : l.target;
            return src === d.id || tgt === d.id ? 1 : 0.08;
        }).attr('stroke', l => {
            const src = typeof l.source === 'object' ? l.source.id : l.source;
            const tgt = typeof l.target === 'object' ? l.target.id : l.target;
            return src === d.id || tgt === d.id ? '#BC6C25' : '#c8d4a8';
        });

        infoPanel.html(`<span class="node-name">${d.label}</span> — Degree: <strong>${d.degree}</strong> connections · Community: <strong>${COMMUNITY_NAMES[d.community]}</strong>`);

        // Highlight corresponding bar in histogram
        histBars.attr('opacity', b => b[0] === d.degree ? 1 : 0.4);
    });

svgNet.on('click', function() {
    node.attr('opacity', 1).attr('stroke-width', 1.5).attr('stroke', '#FEFAE0');
    link.attr('opacity', 0.7).attr('stroke', '#c8d4a8');
    infoPanel.text('Click any node to see its connections');
    histBars.attr('opacity', 0.85);
});

sim.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('cx', d => d.x).attr('cy', d => d.y);
});

// ---- HISTOGRAM ----
const degValues = nodes.map(d => d.degree);
const degCounts = d3.rollup(degValues, v => v.length, d => d);
const histData = Array.from(degCounts, ([deg, count]) => [+deg, count]).sort((a, b) => a[0] - b[0]);

const hW = 340, hH = 300;
const hMargin = { top: 20, right: 20, bottom: 50, left: 45 };
const hInnerW = hW - hMargin.left - hMargin.right;
const hInnerH = hH - hMargin.top - hMargin.bottom;

const svgHist = d3.select('#histogram')
    .append('svg')
    .attr('width', hW).attr('height', hH)
    .style('font-family', 'Nunito, sans-serif');

const gHist = svgHist.append('g').attr('transform', `translate(${hMargin.left},${hMargin.top})`);

const xH = d3.scaleBand()
    .domain(histData.map(d => d[0]))
    .range([0, hInnerW])
    .padding(0.15);

const yH = d3.scaleLinear()
    .domain([0, d3.max(histData, d => d[1]) + 1])
    .range([hInnerH, 0]);

gHist.append('g').attr('transform', `translate(0,${hInnerH})`)
    .call(d3.axisBottom(xH).tickFormat(d => `k=${d}`).tickSizeOuter(0))
    .selectAll('text').style('font-size', '10px').style('fill', '#606C38');

gHist.append('g')
    .call(d3.axisLeft(yH).ticks(5).tickSizeOuter(0))
    .selectAll('text').style('font-size', '10px').style('fill', '#606C38');

gHist.append('text').attr('x', hInnerW / 2).attr('y', hInnerH + 40)
    .attr('text-anchor', 'middle').style('font-size', '11px').style('fill', '#8A9A5B')
    .text('Node Degree (k)');

gHist.append('text').attr('transform', 'rotate(-90)').attr('x', -hInnerH / 2).attr('y', -35)
    .attr('text-anchor', 'middle').style('font-size', '11px').style('fill', '#8A9A5B')
    .text('Count');

const histBars = gHist.selectAll('.bar')
    .data(histData)
    .join('rect')
    .attr('class', 'bar')
    .attr('x', d => xH(d[0]))
    .attr('width', xH.bandwidth())
    .attr('y', hInnerH)
    .attr('height', 0)
    .attr('fill', d => {
        const normalized = d[0] / maxDeg;
        return d3.interpolate('#9be9a8', '#216e39')(normalized);
    })
    .attr('rx', 3)
    .attr('opacity', 0.85)
    .on('mouseover', function(event, d) {
        tooltip.style('opacity', 1)
            .html(`Degree <strong>${d[0]}</strong><br>Nodes with this degree: <b>${d[1]}</b>`)
            .style('left', (event.clientX + 12) + 'px')
            .style('top', (event.clientY - 10) + 'px');
        d3.select(this).attr('opacity', 1).attr('stroke', '#BC6C25').attr('stroke-width', 2);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.clientX + 12) + 'px').style('top', (event.clientY - 10) + 'px');
    })
    .on('mouseout', function() {
        tooltip.style('opacity', 0);
        d3.select(this).attr('opacity', 0.85).attr('stroke', null);
    });

histBars.transition().duration(800).delay((d, i) => i * 60)
    .attr('y', d => yH(d[1]))
    .attr('height', d => hInnerH - yH(d[1]));

// Power-law fit line (approximate)
const logData = histData.filter(d => d[0] > 0 && d[1] > 0).map(d => [Math.log(d[0]), Math.log(d[1])]);
if (logData.length > 2) {
    const n = logData.length;
    const sumX = d3.sum(logData, d => d[0]);
    const sumY = d3.sum(logData, d => d[1]);
    const sumXY = d3.sum(logData, d => d[0] * d[1]);
    const sumX2 = d3.sum(logData, d => d[0] * d[0]);
    const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
    const intercept = (sumY - slope * sumX) / n;

    const xRange = d3.extent(histData, d => d[0]);
    const fitLine = [xRange[0], xRange[1]].map(k => ({
        x: k, y: Math.exp(intercept + slope * Math.log(k))
    }));

    const lineGen = d3.line()
        .x(d => xH(d.x) + xH.bandwidth() / 2)
        .y(d => yH(d.y));

    gHist.append('path')
        .datum(fitLine)
        .attr('fill', 'none')
        .attr('stroke', '#BC6C25')
        .attr('stroke-width', 2)
        .attr('stroke-dasharray', '5,4')
        .attr('d', lineGen)
        .attr('opacity', 0.7);

    gHist.append('text')
        .attr('x', hInnerW - 4).attr('y', 14)
        .attr('text-anchor', 'end')
        .style('font-size', '9px').style('fill', '#BC6C25')
        .text(`Power-law fit (γ≈${Math.abs(slope).toFixed(1)})`);
}
</script>
</body>
</html>
