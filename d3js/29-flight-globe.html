<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Path Globe - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #606C38; min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #606C38; text-decoration: none; font-weight: 600;
            font-family: 'Nunito', sans-serif; z-index: 1000;
            background: rgba(254,250,224,0.9); padding: 8px 16px;
            border-radius: 20px; border: 1px solid rgba(138,154,91,0.3);
            transition: all 0.3s;
        }
        .back-link:hover { background: #8A9A5B; color: #FEFAE0; }
        h1 {
            font-family: 'Lora', serif; text-align: center;
            color: #606C38; font-size: 2rem; padding: 20px 0 5px;
        }
        .subtitle { text-align: center; color: #8A9A5B; font-size: 0.95rem; margin-bottom: 10px; }
        .chart-container {
            display: flex; justify-content: center; padding: 10px;
            position: relative;
        }
        svg { max-width: 100%; height: auto; cursor: grab; }
        svg:active { cursor: grabbing; }
        .tooltip {
            position: absolute; background: rgba(254,250,224,0.95);
            border: 1px solid #8A9A5B; border-radius: 8px;
            padding: 8px 12px; font-size: 0.85rem; pointer-events: none;
            opacity: 0; color: #606C38; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 100;
        }
        .controls {
            display: flex; gap: 12px; justify-content: center; margin: 5px 0;
        }
        .btn {
            font-family: 'Nunito', sans-serif; padding: 6px 16px;
            border: 2px solid #8A9A5B; background: rgba(138,154,91,0.1);
            color: #606C38; border-radius: 20px; cursor: pointer;
            font-weight: 600; transition: all 0.3s; font-size: 0.85rem;
        }
        .btn:hover, .btn.active { background: #8A9A5B; color: #FEFAE0; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Gallery</a>
    <h1>Flight Path Globe</h1>
    <p class="subtitle">60 major international flight routes — click to toggle rotation, drag to rotate</p>
    <div class="controls">
        <button class="btn active" id="rotateBtn">Auto-rotate: ON</button>
    </div>
    <div class="chart-container">
        <svg id="chart"></svg>
    </div>
    <div class="tooltip" id="tooltip"></div>

<script>
// 60 major international routes with city coordinates [lon, lat]
const cities = {
    'New York': [-74.006, 40.713], 'London': [-0.118, 51.509], 'Paris': [2.352, 48.857],
    'Tokyo': [139.692, 35.690], 'Dubai': [55.271, 25.205], 'Singapore': [103.820, 1.352],
    'Hong Kong': [114.170, 22.320], 'Los Angeles': [-118.244, 34.052],
    'Sydney': [151.209, -33.868], 'Frankfurt': [8.682, 50.111],
    'Istanbul': [28.979, 41.009], 'Bangkok': [100.502, 13.756],
    'Seoul': [126.978, 37.566], 'Shanghai': [121.474, 31.230],
    'Delhi': [77.209, 28.614], 'Mumbai': [72.878, 19.076],
    'Cairo': [31.236, 30.044], 'Johannesburg': [28.044, -26.204],
    'Sao Paulo': [-46.634, -23.551], 'Mexico City': [-99.133, 19.432],
    'Toronto': [-79.383, 43.651], 'Beijing': [116.407, 39.904],
    'Amsterdam': [4.900, 52.370], 'Madrid': [-3.704, 40.417],
    'Rome': [12.496, 41.903], 'Doha': [51.531, 25.286],
    'Kuala Lumpur': [101.687, 3.139], 'Jakarta': [106.845, -6.208],
    'Moscow': [37.618, 55.756], 'Nairobi': [36.822, -1.292],
    'Buenos Aires': [-58.382, -34.604], 'Lima': [-77.043, -12.046],
    'Taipei': [121.565, 25.033], 'Manila': [120.984, 14.600],
    'Melbourne': [144.963, -37.814], 'Zurich': [8.542, 47.377]
};

const routes = [
    ['New York','London'],['New York','Paris'],['New York','Tokyo'],['New York','Dubai'],
    ['New York','Sao Paulo'],['New York','Los Angeles'],['New York','Toronto'],
    ['London','Dubai'],['London','Singapore'],['London','Hong Kong'],['London','Paris'],
    ['London','Frankfurt'],['London','Istanbul'],['London','Johannesburg'],['London','Delhi'],
    ['Paris','Tokyo'],['Paris','Dubai'],['Paris','New York'],['Paris','Montreal'],
    ['Dubai','Singapore'],['Dubai','Bangkok'],['Dubai','Delhi'],['Dubai','Mumbai'],
    ['Dubai','Cairo'],['Dubai','Nairobi'],['Dubai','Sydney'],
    ['Singapore','Sydney'],['Singapore','Tokyo'],['Singapore','Hong Kong'],['Singapore','Jakarta'],
    ['Singapore','Kuala Lumpur'],['Singapore','Bangkok'],
    ['Hong Kong','Tokyo'],['Hong Kong','Shanghai'],['Hong Kong','Taipei'],['Hong Kong','London'],
    ['Tokyo','Seoul'],['Tokyo','Shanghai'],['Tokyo','Singapore'],['Tokyo','Los Angeles'],
    ['Tokyo','Sydney'],['Tokyo','Bangkok'],
    ['Los Angeles','Sydney'],['Los Angeles','Tokyo'],['Los Angeles','Seoul'],['Los Angeles','London'],
    ['Sydney','Melbourne'],['Sydney','Auckland'],['Sydney','Singapore'],
    ['Frankfurt','Singapore'],['Frankfurt','Delhi'],['Frankfurt','Shanghai'],['Frankfurt','Dubai'],
    ['Seoul','Beijing'],['Seoul','Shanghai'],['Istanbul','Dubai'],
    ['Sao Paulo','Buenos Aires'],['Sao Paulo','Lima'],['Mexico City','Los Angeles'],
    ['Delhi','London'],['Doha','London']
];

// Replace Montreal/Auckland with known cities
routes.forEach(r => {
    if (r[1] === 'Montreal') r[1] = 'Toronto';
    if (r[1] === 'Auckland') r[1] = 'Melbourne';
});

function haversine(c1, c2) {
    const R = 6371;
    const dLat = (c2[1] - c1[1]) * Math.PI / 180;
    const dLon = (c2[0] - c1[0]) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(c1[1]*Math.PI/180) * Math.cos(c2[1]*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

const width = 650, height = 650;
const svg = d3.select('#chart')
    .attr('width', width).attr('height', height)
    .attr('viewBox', `0 0 ${width} ${height}`);

const tooltip = d3.select('#tooltip');

const projection = d3.geoOrthographic()
    .scale(280)
    .translate([width/2, height/2])
    .clipAngle(90);

const path = d3.geoPath(projection);

// Ocean
svg.append('circle')
    .attr('cx', width/2).attr('cy', height/2).attr('r', 280)
    .attr('fill', 'rgba(138,154,91,0.08)')
    .attr('stroke', 'rgba(96,108,56,0.2)')
    .attr('stroke-width', 1);

// Graticule
const graticule = d3.geoGraticule();
const graticuleGroup = svg.append('path')
    .datum(graticule)
    .attr('d', path)
    .attr('fill', 'none')
    .attr('stroke', 'rgba(96,108,56,0.1)')
    .attr('stroke-width', 0.5);

// Land (simplified using graticule outlines)
const landGroup = svg.append('g');

// Routes
const routeGroup = svg.append('g');

// Cities
const cityGroup = svg.append('g');

function render() {
    graticuleGroup.attr('d', path);

    // Routes as great circle arcs
    routeGroup.selectAll('path').remove();
    routes.forEach(([from, to]) => {
        const c1 = cities[from], c2 = cities[to];
        if (!c1 || !c2) return;
        const line = {type: 'LineString', coordinates: [c1, c2]};
        routeGroup.append('path')
            .datum(line)
            .attr('d', path)
            .attr('fill', 'none')
            .attr('stroke', '#DDA15E')
            .attr('stroke-width', 1.2)
            .attr('stroke-opacity', 0.5)
            .attr('stroke-linecap', 'round')
            .style('cursor', 'pointer')
            .on('mouseenter', function(event) {
                d3.select(this).attr('stroke-width', 3).attr('stroke-opacity', 1).attr('stroke', '#BC6C25');
                const dist = Math.round(haversine(c1, c2));
                tooltip.style('opacity', 1)
                    .html(`<strong>${from} → ${to}</strong><br>Distance: ${dist.toLocaleString()} km`);
            })
            .on('mousemove', function(event) {
                tooltip.style('left', (event.pageX + 12) + 'px')
                    .style('top', (event.pageY - 28) + 'px');
            })
            .on('mouseleave', function() {
                d3.select(this).attr('stroke-width', 1.2).attr('stroke-opacity', 0.5).attr('stroke', '#DDA15E');
                tooltip.style('opacity', 0);
            });
    });

    // Cities as dots
    cityGroup.selectAll('circle').remove();
    cityGroup.selectAll('text').remove();
    Object.entries(cities).forEach(([name, coords]) => {
        const projected = projection(coords);
        if (!projected) return;
        // Check if point is on visible side
        const d = d3.geoDistance(coords, projection.invert([width/2, height/2]));
        if (d > Math.PI / 2) return;

        cityGroup.append('circle')
            .attr('cx', projected[0]).attr('cy', projected[1])
            .attr('r', 3)
            .attr('fill', '#BC6C25')
            .attr('stroke', '#FEFAE0')
            .attr('stroke-width', 1);

        cityGroup.append('text')
            .attr('x', projected[0] + 6).attr('y', projected[1] + 3)
            .attr('fill', '#606C38')
            .attr('font-size', '8px')
            .attr('font-family', 'Nunito')
            .attr('font-weight', 600)
            .text(name);
    });
}

render();

// Drag to rotate
let rotation = [0, -20, 0];
projection.rotate(rotation);
render();

const drag = d3.drag()
    .on('start', function() { autoRotate = false; updateRotateBtn(); })
    .on('drag', function(event) {
        const sensitivity = 0.4;
        rotation[0] += event.dx * sensitivity;
        rotation[1] -= event.dy * sensitivity;
        rotation[1] = Math.max(-90, Math.min(90, rotation[1]));
        projection.rotate(rotation);
        render();
    });

svg.call(drag);

// Auto-rotate
let autoRotate = true;
let rotTimer;

function startAutoRotate() {
    rotTimer = d3.timer(() => {
        if (!autoRotate) return;
        rotation[0] += 0.15;
        projection.rotate(rotation);
        render();
    });
}
startAutoRotate();

function updateRotateBtn() {
    const btn = document.getElementById('rotateBtn');
    btn.textContent = autoRotate ? 'Auto-rotate: ON' : 'Auto-rotate: OFF';
    btn.classList.toggle('active', autoRotate);
}

document.getElementById('rotateBtn').addEventListener('click', () => {
    autoRotate = !autoRotate;
    updateRotateBtn();
    if (autoRotate) startAutoRotate();
});

svg.on('click', function(event) {
    if (event.defaultPrevented) return;
});
</script>
</body>
</html>
