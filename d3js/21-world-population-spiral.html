<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Population Spiral - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #606C38;
            min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #606C38; text-decoration: none; font-weight: 600;
            font-family: 'Nunito', sans-serif; z-index: 1000;
            background: rgba(254,250,224,0.9); padding: 8px 16px;
            border-radius: 20px; border: 1px solid rgba(138,154,91,0.3);
            transition: all 0.3s;
        }
        .back-link:hover { background: #8A9A5B; color: #FEFAE0; }
        h1 {
            font-family: 'Lora', serif; text-align: center;
            color: #606C38; font-size: 2rem; padding: 20px 0 5px;
        }
        .subtitle {
            text-align: center; color: #8A9A5B; font-size: 0.95rem;
            margin-bottom: 10px;
        }
        .chart-container {
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; padding: 10px;
        }
        svg { max-width: 100%; height: auto; }
        .controls {
            display: flex; gap: 12px; justify-content: center;
            margin: 10px 0; flex-wrap: wrap; align-items: center;
        }
        .btn {
            font-family: 'Nunito', sans-serif; padding: 8px 20px;
            border: 2px solid #8A9A5B; background: rgba(138,154,91,0.1);
            color: #606C38; border-radius: 20px; cursor: pointer;
            font-weight: 600; transition: all 0.3s;
        }
        .btn:hover, .btn.active { background: #8A9A5B; color: #FEFAE0; }
        .info-box {
            text-align: center; font-size: 1.2rem; color: #606C38;
            font-family: 'Lora', serif; min-height: 2em;
        }
        .year-display { font-size: 2rem; font-weight: 700; color: #BC6C25; }
        .pop-display { font-size: 1.1rem; color: #8A9A5B; }
        .tooltip {
            position: absolute; background: rgba(254,250,224,0.95);
            border: 1px solid #8A9A5B; border-radius: 8px;
            padding: 8px 12px; font-size: 0.85rem; pointer-events: none;
            opacity: 0; transition: opacity 0.2s; color: #606C38;
            font-family: 'Nunito', sans-serif; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Gallery</a>
    <h1>World Population Spiral</h1>
    <p class="subtitle">Global population growth from 1800 to 2024 — spiral visualization</p>
    <div class="controls">
        <button class="btn" id="playBtn">&#9654; Play</button>
        <button class="btn" id="resetBtn">Reset</button>
        <button class="btn" id="showAllBtn">Show All</button>
    </div>
    <div class="info-box">
        <div class="year-display" id="yearLabel">1800</div>
        <div class="pop-display" id="popLabel">~1.0 billion</div>
    </div>
    <div class="chart-container">
        <svg id="chart"></svg>
    </div>
    <div class="tooltip" id="tooltip"></div>

<script>
// World population data (UN estimates, in billions) 1800-2024
const populationData = [
    {year:1800,pop:0.99},{year:1810,pop:1.04},{year:1820,pop:1.10},{year:1830,pop:1.17},
    {year:1840,pop:1.24},{year:1850,pop:1.26},{year:1860,pop:1.33},{year:1870,pop:1.39},
    {year:1880,pop:1.44},{year:1890,pop:1.53},{year:1900,pop:1.65},{year:1905,pop:1.70},
    {year:1910,pop:1.75},{year:1915,pop:1.80},{year:1920,pop:1.86},{year:1925,pop:1.96},
    {year:1930,pop:2.07},{year:1935,pop:2.17},{year:1940,pop:2.30},{year:1945,pop:2.38},
    {year:1950,pop:2.54},{year:1952,pop:2.63},{year:1954,pop:2.72},{year:1956,pop:2.81},
    {year:1958,pop:2.92},{year:1960,pop:3.03},{year:1962,pop:3.14},{year:1964,pop:3.27},
    {year:1966,pop:3.40},{year:1968,pop:3.53},{year:1970,pop:3.70},{year:1972,pop:3.85},
    {year:1974,pop:4.00},{year:1976,pop:4.15},{year:1978,pop:4.30},{year:1980,pop:4.44},
    {year:1982,pop:4.61},{year:1984,pop:4.77},{year:1986,pop:4.94},{year:1988,pop:5.11},
    {year:1990,pop:5.33},{year:1992,pop:5.50},{year:1994,pop:5.66},{year:1996,pop:5.82},
    {year:1998,pop:5.98},{year:2000,pop:6.14},{year:2002,pop:6.28},{year:2004,pop:6.42},
    {year:2006,pop:6.57},{year:2008,pop:6.72},{year:2010,pop:6.96},{year:2012,pop:7.13},
    {year:2014,pop:7.30},{year:2016,pop:7.46},{year:2018,pop:7.63},{year:2020,pop:7.79},
    {year:2022,pop:7.95},{year:2024,pop:8.12}
];

const width = 700, height = 700;
const cx = width / 2, cy = height / 2;
const maxRadius = Math.min(width, height) / 2 - 40;
const minRadius = 40;

const svg = d3.select('#chart')
    .attr('width', width).attr('height', height)
    .attr('viewBox', `0 0 ${width} ${height}`);

const g = svg.append('g').attr('transform', `translate(${cx},${cy})`);

const tooltip = d3.select('#tooltip');

// Scales
const yearExtent = d3.extent(populationData, d => d.year);
const popExtent = d3.extent(populationData, d => d.pop);
const totalPoints = populationData.length;
const totalTurns = 5;

const angleScale = d3.scaleLinear()
    .domain([0, totalPoints - 1])
    .range([0, totalTurns * 2 * Math.PI]);

const radiusScale = d3.scaleLinear()
    .domain([0, totalPoints - 1])
    .range([minRadius, maxRadius]);

const barScale = d3.scaleLinear()
    .domain([0, popExtent[1]])
    .range([0, 35]);

const colorScale = d3.scaleSequential(d3.interpolateRgbBasis(['#8A9A5B','#DDA15E','#BC6C25','#a33']))
    .domain(yearExtent);

// Draw reference circles
[1, 2, 3, 4, 5, 6, 7, 8].forEach(b => {
    const r = radiusScale(d3.bisect(populationData.map(d => d.pop), b));
});

// Draw spiral path
const spiralLine = d3.lineRadial()
    .angle((d, i) => angleScale(i))
    .radius((d, i) => radiusScale(i))
    .curve(d3.curveCardinal.tension(0.5));

g.append('path')
    .datum(populationData)
    .attr('d', spiralLine)
    .attr('fill', 'none')
    .attr('stroke', 'rgba(138,154,91,0.2)')
    .attr('stroke-width', 1);

// Create bars group
const barsGroup = g.append('g').attr('class', 'bars');

// Create all bars (initially hidden)
const bars = barsGroup.selectAll('.pop-bar')
    .data(populationData)
    .enter().append('line')
    .attr('class', 'pop-bar')
    .attr('x1', (d, i) => {
        const a = angleScale(i) - Math.PI / 2;
        const r = radiusScale(i);
        return r * Math.cos(a);
    })
    .attr('y1', (d, i) => {
        const a = angleScale(i) - Math.PI / 2;
        const r = radiusScale(i);
        return r * Math.sin(a);
    })
    .attr('x2', (d, i) => {
        const a = angleScale(i) - Math.PI / 2;
        const r = radiusScale(i) + barScale(d.pop);
        return r * Math.cos(a);
    })
    .attr('y2', (d, i) => {
        const a = angleScale(i) - Math.PI / 2;
        const r = radiusScale(i) + barScale(d.pop);
        return r * Math.sin(a);
    })
    .attr('stroke', d => colorScale(d.year))
    .attr('stroke-width', 4)
    .attr('stroke-linecap', 'round')
    .attr('opacity', 0)
    .on('mouseenter', function(event, d) {
        d3.select(this).attr('stroke-width', 7);
        tooltip.style('opacity', 1)
            .html(`<strong>${d.year}</strong><br>${d.pop.toFixed(2)} billion`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 12) + 'px')
            .style('top', (event.pageY - 28) + 'px');
    })
    .on('mouseleave', function() {
        d3.select(this).attr('stroke-width', 4);
        tooltip.style('opacity', 0);
    });

// Year labels along spiral
populationData.filter((d, i) => d.year % 50 === 0 || i === totalPoints - 1).forEach((d, idx) => {
    const i = populationData.indexOf(d);
    const a = angleScale(i) - Math.PI / 2;
    const r = radiusScale(i) + barScale(d.pop) + 14;
    g.append('text')
        .attr('x', r * Math.cos(a))
        .attr('y', r * Math.sin(a))
        .attr('text-anchor', 'middle')
        .attr('fill', '#606C38')
        .attr('font-size', '11px')
        .attr('font-family', 'Lora, serif')
        .attr('font-weight', 600)
        .text(d.year);
});

// Center label
g.append('text')
    .attr('text-anchor', 'middle')
    .attr('fill', '#8A9A5B')
    .attr('font-size', '12px')
    .attr('font-family', 'Nunito, sans-serif')
    .attr('dy', 4)
    .text('Population');

// Animation
let currentIndex = 0;
let animationTimer = null;
let isPlaying = false;

function updateInfo(i) {
    const d = populationData[i];
    document.getElementById('yearLabel').textContent = d.year;
    document.getElementById('popLabel').textContent = `~${d.pop.toFixed(2)} billion people`;
}

function revealBar(i) {
    bars.filter((d, idx) => idx === i)
        .transition().duration(80)
        .attr('opacity', 0.85);
    updateInfo(i);
}

function play() {
    if (isPlaying) return;
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸ Pause';
    document.getElementById('playBtn').classList.add('active');

    animationTimer = d3.interval(() => {
        if (currentIndex >= totalPoints) {
            stop();
            return;
        }
        revealBar(currentIndex);
        currentIndex++;
    }, 100);
}

function stop() {
    isPlaying = false;
    if (animationTimer) animationTimer.stop();
    document.getElementById('playBtn').textContent = '▶ Play';
    document.getElementById('playBtn').classList.remove('active');
}

function reset() {
    stop();
    currentIndex = 0;
    bars.attr('opacity', 0);
    updateInfo(0);
}

function showAll() {
    stop();
    currentIndex = totalPoints;
    bars.transition().duration(600).attr('opacity', 0.85);
    updateInfo(totalPoints - 1);
}

document.getElementById('playBtn').addEventListener('click', () => {
    if (isPlaying) stop(); else play();
});
document.getElementById('resetBtn').addEventListener('click', reset);
document.getElementById('showAllBtn').addEventListener('click', showAll);

updateInfo(0);
</script>
</body>
</html>
