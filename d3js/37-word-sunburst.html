<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Frequency Sunburst - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 8px 16px; background: rgba(255,255,255,0.7);
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-family: 'Lora', serif; text-align: center; color: var(--moss); font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: var(--sage); margin-bottom: 1rem; }
        .chart-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        textarea {
            width: 100%; height: 100px; font-family: 'Nunito', sans-serif;
            border: 2px solid var(--sage); border-radius: 12px; padding: 12px;
            font-size: 0.9rem; background: rgba(255,255,255,0.8); color: var(--dark-moss);
            resize: vertical; margin-bottom: 12px;
        }
        textarea:focus { outline: none; border-color: var(--earth); }
        .controls { display: flex; gap: 16px; align-items: center; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
        .btn {
            font-family: 'Nunito', sans-serif; font-size: 0.85rem;
            padding: 8px 18px; border-radius: 20px; border: 2px solid var(--sage);
            background: rgba(255,255,255,0.6); color: var(--moss); cursor: pointer;
            font-weight: 600; transition: all 0.3s ease;
        }
        .btn:hover { background: var(--sage); color: white; }
        .control-label { font-weight: 600; color: var(--moss); font-size: 0.85rem; }
        input[type="range"] { width: 120px; accent-color: var(--sage); }
        .breadcrumb {
            text-align: center; font-size: 0.85rem; color: var(--moss);
            padding: 8px; min-height: 30px; font-weight: 600;
        }
        .breadcrumb span { cursor: pointer; color: var(--terracotta); }
        .breadcrumb span:hover { text-decoration: underline; }
        svg text { font-family: 'Nunito', sans-serif; }
        .tooltip {
            position: absolute; pointer-events: none; background: rgba(61,68,35,0.92);
            color: var(--cream); padding: 10px 14px; border-radius: 10px;
            font-size: 0.8rem; line-height: 1.5; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="container">
        <h1>Word Frequency Sunburst</h1>
        <p class="subtitle">Analyze n-gram frequencies in any text. Click arcs to zoom.</p>
        <div class="chart-container">
            <textarea id="inputText">I have a dream that one day this nation will rise up and live out the true meaning of its creed. We hold these truths to be self evident that all men are created equal. I have a dream that one day on the red hills of Georgia the sons of former slaves and the sons of former slave owners will be able to sit down together at the table of brotherhood. I have a dream that one day even the state of Mississippi a state sweltering with the heat of injustice sweltering with the heat of oppression will be transformed into an oasis of freedom and justice. I have a dream that my four little children will one day live in a nation where they will not be judged by the color of their skin but by the content of their character. I have a dream today.</textarea>
            <div class="controls">
                <button class="btn" id="analyzeBtn">Analyze Text</button>
                <span class="control-label">Min Frequency:</span>
                <input type="range" id="minFreq" min="1" max="5" value="2">
                <span id="minFreqVal">2</span>
            </div>
            <div class="breadcrumb" id="breadcrumb">root</div>
            <div id="chart" style="text-align:center;"></div>
        </div>
    </div>
    <div class="tooltip" id="tooltip" style="display:none;"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    (function() {
        const tooltip = d3.select("#tooltip");
        const depthColors = ["#606C38", "#8A9A5B", "#DDA15E", "#BC6C25", "#c44e52"];
        let currentRoot = null;

        function tokenize(text) {
            return text.toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w.length > 0);
        }

        function buildHierarchy(words, minFreq) {
            // Count n-grams up to 3
            const counts1 = {}, counts2 = {}, counts3 = {};
            for (let i = 0; i < words.length; i++) {
                const w1 = words[i];
                counts1[w1] = (counts1[w1] || 0) + 1;
                if (i + 1 < words.length) {
                    const key = w1 + " " + words[i + 1];
                    counts2[key] = (counts2[key] || 0) + 1;
                }
                if (i + 2 < words.length) {
                    const key = w1 + " " + words[i + 1] + " " + words[i + 2];
                    counts3[key] = (counts3[key] || 0) + 1;
                }
            }

            // Build tree: root -> word1 -> word1+word2 -> word1+word2+word3
            const root = { name: "root", children: [] };
            const word1Map = {};

            Object.entries(counts1).filter(([, v]) => v >= minFreq)
                .sort((a, b) => b[1] - a[1]).slice(0, 40)
                .forEach(([w, c]) => {
                    const node = { name: w, value: c, children: [] };
                    word1Map[w] = node;
                    root.children.push(node);
                });

            Object.entries(counts2).filter(([, v]) => v >= minFreq)
                .sort((a, b) => b[1] - a[1]).slice(0, 60)
                .forEach(([key, c]) => {
                    const parts = key.split(" ");
                    const parent = word1Map[parts[0]];
                    if (parent) {
                        const node = { name: parts[1], fullKey: key, value: c, children: [] };
                        parent.children.push(node);
                        // 3-grams
                        Object.entries(counts3).filter(([k3, v3]) => k3.startsWith(key + " ") && v3 >= minFreq)
                            .sort((a, b) => b[1] - a[1]).slice(0, 10)
                            .forEach(([k3, c3]) => {
                                const w3 = k3.split(" ")[2];
                                node.children.push({ name: w3, fullKey: k3, value: c3 });
                            });
                    }
                });

            // Remove value from nodes that have children (d3 partition uses leaf values)
            function cleanValues(node) {
                if (node.children && node.children.length > 0) {
                    delete node.value;
                    node.children.forEach(cleanValues);
                }
            }
            cleanValues(root);
            return root;
        }

        function draw() {
            d3.select("#chart").html("");
            const text = document.getElementById("inputText").value;
            const minFreq = +document.getElementById("minFreq").value;
            const words = tokenize(text);
            if (words.length === 0) return;

            const hierarchy = buildHierarchy(words, minFreq);
            const size = Math.min(550, window.innerWidth - 100);
            const radius = size / 2;

            const root = d3.hierarchy(hierarchy).sum(d => d.value || 0).sort((a, b) => b.value - a.value);
            const partition = d3.partition().size([2 * Math.PI, radius]);
            partition(root);
            currentRoot = root;

            const svg = d3.select("#chart").append("svg")
                .attr("width", size).attr("height", size)
              .append("g")
                .attr("transform", `translate(${radius},${radius})`);

            const arc = d3.arc()
                .startAngle(d => d.x0)
                .endAngle(d => d.x1)
                .innerRadius(d => d.y0)
                .outerRadius(d => d.y1 - 1);

            let focus = root;

            const paths = svg.selectAll("path")
                .data(root.descendants().filter(d => d.depth > 0))
                .join("path")
                .attr("d", arc)
                .attr("fill", d => depthColors[(d.depth - 1) % depthColors.length])
                .attr("fill-opacity", d => 0.9 - d.depth * 0.15)
                .attr("stroke", "white").attr("stroke-width", 1)
                .style("cursor", "pointer")
                .on("click", function(event, d) {
                    if (focus === d) { focus = d.parent || root; } else { focus = d; }
                    zoomTo(focus);
                })
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("fill-opacity", 1);
                    const path = d.ancestors().reverse().slice(1).map(a => a.data.name).join(" -> ");
                    tooltip.style("display", "block").html(
                        `<strong>${path}</strong><br>Count: ${d.value}`
                    );
                })
                .on("mousemove", function(event) {
                    tooltip.style("left", (event.pageX + 14) + "px")
                        .style("top", (event.pageY - 14) + "px");
                })
                .on("mouseout", function(event, d) {
                    d3.select(this).attr("fill-opacity", 0.9 - d.depth * 0.15);
                    tooltip.style("display", "none");
                });

            // Labels for large enough arcs
            svg.selectAll("text")
                .data(root.descendants().filter(d => d.depth > 0 && (d.x1 - d.x0) > 0.12))
                .join("text")
                .attr("transform", function(d) {
                    const angle = (d.x0 + d.x1) / 2;
                    const r = (d.y0 + d.y1) / 2;
                    const deg = angle * 180 / Math.PI - 90;
                    return `rotate(${deg}) translate(${r},0) rotate(${deg > 90 ? 180 : 0})`;
                })
                .attr("text-anchor", "middle")
                .attr("dominant-baseline", "middle")
                .style("font-size", d => d.depth === 1 ? "11px" : "9px")
                .style("fill", "white").style("font-weight", "600")
                .style("pointer-events", "none")
                .text(d => d.data.name);

            function zoomTo(d) {
                const t = d3.transition().duration(500);
                const newX = d3.scaleLinear().domain([d.x0, d.x1]).range([0, 2 * Math.PI]);
                const newY = d3.scaleLinear().domain([d.y0, radius]).range([d.depth ? 40 : 0, radius]);

                paths.transition(t)
                    .attrTween("d", function(p) {
                        const i_x0 = d3.interpolate(p._x0 || p.x0, newX(p.x0));
                        const i_x1 = d3.interpolate(p._x1 || p.x1, newX(p.x1));
                        const i_y0 = d3.interpolate(p._y0 || p.y0, newY(p.y0));
                        const i_y1 = d3.interpolate(p._y1 || p.y1, newY(p.y1));
                        return function(t) {
                            p._x0 = i_x0(t); p._x1 = i_x1(t);
                            p._y0 = i_y0(t); p._y1 = i_y1(t);
                            return arc({ x0: p._x0, x1: p._x1, y0: p._y0, y1: p._y1 });
                        };
                    })
                    .attr("fill-opacity", p => {
                        if (p.x0 >= d.x1 || p.x1 <= d.x0) return 0;
                        return 0.9 - (p.depth - d.depth) * 0.15;
                    });

                // Update breadcrumb
                const path = d.ancestors().reverse().map(a => a.data.name);
                d3.select("#breadcrumb").html(
                    path.map((n, i) => i === path.length - 1 ? `<strong>${n}</strong>` : `<span>${n}</span>`).join(" / ")
                );
            }

            updateBreadcrumb(root);
        }

        function updateBreadcrumb(d) {
            const path = d.ancestors().reverse().map(a => a.data.name);
            d3.select("#breadcrumb").text(path.join(" / "));
        }

        draw();

        d3.select("#analyzeBtn").on("click", draw);
        d3.select("#minFreq").on("input", function() {
            d3.select("#minFreqVal").text(this.value);
            draw();
        });
    })();
    </script>
</body>
</html>
