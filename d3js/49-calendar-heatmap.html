<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Heatmap - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #606C38; min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #606C38; text-decoration: none; font-weight: 600;
            background: rgba(254,250,224,0.9); padding: 8px 16px;
            border-radius: 20px; border: 1px solid rgba(138,154,91,0.3);
            transition: all 0.3s; z-index: 1000; font-size: 0.9rem;
        }
        .back-link:hover { background: #8A9A5B; color: #FEFAE0; }
        h1 { font-family: 'Lora', serif; text-align: center; color: #606C38; font-size: 2rem; padding: 70px 0 5px; }
        .subtitle { text-align: center; color: #8A9A5B; font-size: 0.95rem; margin-bottom: 12px; }
        .controls {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
            margin-bottom: 14px; padding: 0 20px;
        }
        .ctrl-group { display: flex; align-items: center; gap: 8px; }
        .ctrl-label { font-size: 0.83rem; color: #8A9A5B; font-weight: 600; }
        .btn {
            font-family: 'Nunito', sans-serif; font-size: 0.82rem;
            padding: 5px 14px; border-radius: 14px; border: 2px solid #8A9A5B;
            background: rgba(255,255,255,0.6); color: #606C38; cursor: pointer;
            font-weight: 600; transition: all 0.3s;
        }
        .btn.active, .btn:hover { background: #8A9A5B; color: white; }
        .chart-container { display: flex; justify-content: center; padding: 0 20px 10px; }
        #chart-wrap {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
            overflow-x: auto;
        }
        .stats {
            display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
            margin: 10px 0 20px;
        }
        .stat-box {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 10px 20px; text-align: center;
            border: 1px solid rgba(138,154,91,0.3);
        }
        .stat-val { font-size: 1.4rem; font-weight: 700; color: #BC6C25; font-family: 'Lora', serif; }
        .stat-label { font-size: 0.78rem; color: #8A9A5B; }
        .tooltip {
            position: fixed; background: rgba(61,68,35,0.92);
            border-radius: 10px; padding: 10px 14px;
            font-size: 0.82rem; pointer-events: none;
            opacity: 0; color: #FEFAE0; z-index: 200;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Back to Gallery</a>
    <h1>Calendar Heatmap</h1>
    <p class="subtitle">GitHub-style activity calendar — 2 years of data</p>
    <div class="controls">
        <div class="ctrl-group">
            <span class="ctrl-label">Year:</span>
            <button class="btn active" id="yr2022" onclick="setYear(2022)">2022</button>
            <button class="btn" id="yr2023" onclick="setYear(2023)">2023</button>
            <button class="btn" id="yr2024" onclick="setYear(2024)">2024</button>
        </div>
        <div class="ctrl-group">
            <span class="ctrl-label">Dataset:</span>
            <button class="btn active" id="dsContrib" onclick="setDataset('contributions')">Contributions</button>
            <button class="btn" id="dsTech" onclick="setDataset('techEdits')">Wiki Edits</button>
            <button class="btn" id="dsTemp" onclick="setDataset('temperature')">Temperature</button>
        </div>
        <div class="ctrl-group">
            <span class="ctrl-label">Color:</span>
            <button class="btn active" id="clGreen" onclick="setScheme('green')">Green</button>
            <button class="btn" id="clBlue" onclick="setScheme('blue')">Blue</button>
            <button class="btn" id="clOrange" onclick="setScheme('orange')">Orange</button>
        </div>
    </div>
    <div class="chart-container"><div id="chart-wrap"><div id="chart"></div></div></div>
    <div class="stats">
        <div class="stat-box"><div class="stat-val" id="statTotal">—</div><div class="stat-label">Total</div></div>
        <div class="stat-box"><div class="stat-val" id="statMax">—</div><div class="stat-label">Peak Day</div></div>
        <div class="stat-box"><div class="stat-val" id="statAvg">—</div><div class="stat-label">Daily Avg</div></div>
        <div class="stat-box"><div class="stat-val" id="statStreak">—</div><div class="stat-label">Best Streak</div></div>
    </div>
    <div class="tooltip" id="tooltip"></div>

<script>
// Seeded PRNG for reproducible data
function seededRand(seed) {
    let s = seed;
    return function() {
        s = (s * 9301 + 49297) % 233280;
        return s / 233280;
    };
}

function generateYearData(year, dataset, seed) {
    const rand = seededRand(seed);
    const start = new Date(year, 0, 1);
    const end = new Date(year, 11, 31);
    const days = [];
    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        const dayOfYear = Math.floor((d - start) / 86400000);
        let val;
        if (dataset === 'contributions') {
            // Simulate dev activity: higher midweek, seasonal trends
            const dayOfWeek = d.getDay();
            const weekMod = dayOfWeek === 0 || dayOfWeek === 6 ? 0.3 : 1;
            const seasonMod = 0.5 + 0.5 * Math.sin((dayOfYear / 365) * 2 * Math.PI);
            val = Math.round(rand() * rand() * 20 * weekMod * (0.6 + seasonMod));
        } else if (dataset === 'techEdits') {
            val = Math.round(rand() * 800 + 200 + 300 * Math.sin(dayOfYear * 0.05));
        } else {
            // Temperature anomaly in tenths of degree C
            val = Math.round((rand() - 0.3) * 30 + 10 * Math.sin((dayOfYear / 365) * 2 * Math.PI));
        }
        days.push({ date: new Date(d), value: Math.max(0, val) });
    }
    return days;
}

const SCHEMES = {
    green:  ['#ebedf0','#9be9a8','#40c463','#30a14e','#216e39'],
    blue:   ['#ebedf0','#c3e5ff','#82bef0','#3987d4','#1a4a8a'],
    orange: ['#ebedf0','#ffd6a8','#f4a144','#e07011','#7a3600']
};

const DATASET_LABELS = {
    contributions: 'Commits',
    techEdits: 'Wiki Edits',
    temperature: 'Temp Anomaly (×0.1°C)'
};

let currentYear = 2022;
let currentDataset = 'contributions';
let currentScheme = 'green';

const cellSize = 13;
const cellPad = 2;
const weekW = cellSize + cellPad;
const dayH = cellSize + cellPad;
const monthLabelH = 20;
const dowLabelW = 28;
const margin = { top: 10, right: 10, bottom: 10, left: 10 };

const tooltip = d3.select('#tooltip');

function getWeekOfYear(d, yearStart) {
    return Math.floor((d - yearStart) / (7 * 86400000));
}

function render() {
    const seed = currentYear * 13 + (currentDataset === 'contributions' ? 1 : currentDataset === 'techEdits' ? 2 : 3);
    const data = generateYearData(currentYear, currentDataset, seed);
    const yearStart = new Date(currentYear, 0, 1);
    const maxVal = d3.max(data, d => d.value);
    const colorScale = d3.scaleQuantile()
        .domain(data.map(d => d.value).filter(v => v > 0))
        .range(SCHEMES[currentScheme].slice(1));

    function getColor(val) {
        if (val === 0) return SCHEMES[currentScheme][0];
        return colorScale(val);
    }

    // Calculate number of weeks
    const lastDay = data[data.length - 1].date;
    const numWeeks = getWeekOfYear(lastDay, yearStart) + 1;
    const svgW = dowLabelW + numWeeks * weekW + margin.left + margin.right;
    const svgH = monthLabelH + 7 * dayH + margin.top + margin.bottom;

    d3.select('#chart').selectAll('*').remove();
    const svg = d3.select('#chart')
        .append('svg')
        .attr('width', svgW)
        .attr('height', svgH)
        .style('font-family', 'Nunito, sans-serif');

    const g = svg.append('g').attr('transform', `translate(${margin.left + dowLabelW},${margin.top + monthLabelH})`);

    // Day-of-week labels
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach((day, i) => {
        if (i % 2 === 1) {
            svg.append('text')
                .attr('x', margin.left + dowLabelW - 4)
                .attr('y', margin.top + monthLabelH + i * dayH + cellSize / 2 + 4)
                .attr('text-anchor', 'end')
                .style('font-size', '9px')
                .style('fill', '#8A9A5B')
                .text(day);
        }
    });

    // Month labels
    const months = d3.timeMonths(yearStart, new Date(currentYear, 11, 31));
    months.forEach(m => {
        const week = getWeekOfYear(m, yearStart);
        svg.append('text')
            .attr('x', margin.left + dowLabelW + week * weekW)
            .attr('y', margin.top + 13)
            .style('font-size', '10px')
            .style('fill', '#606C38')
            .style('font-weight', '600')
            .text(d3.timeFormat('%b')(m));
    });

    // Cells
    g.selectAll('rect')
        .data(data)
        .join('rect')
        .attr('x', d => getWeekOfYear(d.date, yearStart) * weekW)
        .attr('y', d => d.date.getDay() * dayH)
        .attr('width', cellSize)
        .attr('height', cellSize)
        .attr('rx', 2)
        .attr('fill', d => getColor(d.value))
        .style('cursor', 'pointer')
        .on('mouseover', function(event, d) {
            tooltip.style('opacity', 1)
                .html(`<strong>${d3.timeFormat('%A, %B %d, %Y')(d.date)}</strong><br>${DATASET_LABELS[currentDataset]}: <b>${d.value}</b>`)
                .style('left', (event.clientX + 12) + 'px')
                .style('top', (event.clientY - 10) + 'px');
            d3.select(this).attr('stroke', '#BC6C25').attr('stroke-width', 1.5);
        })
        .on('mousemove', function(event) {
            tooltip.style('left', (event.clientX + 12) + 'px').style('top', (event.clientY - 10) + 'px');
        })
        .on('mouseout', function() {
            tooltip.style('opacity', 0);
            d3.select(this).attr('stroke', null);
        })
        .attr('opacity', 0)
        .transition().duration(600)
        .delay((d, i) => Math.floor(i / 7) * 6)
        .attr('opacity', 1);

    // Stats
    const vals = data.map(d => d.value);
    const total = d3.sum(vals);
    const avg = (total / vals.length).toFixed(1);
    // Streak
    let maxStreak = 0, streak = 0;
    vals.forEach(v => { if (v > 0) { streak++; maxStreak = Math.max(maxStreak, streak); } else streak = 0; });

    d3.select('#statTotal').text(total.toLocaleString());
    d3.select('#statMax').text(maxVal);
    d3.select('#statAvg').text(avg);
    d3.select('#statStreak').text(maxStreak + ' days');

    // Color legend
    const legendG = svg.append('g').attr('transform', `translate(${margin.left + dowLabelW},${svgH - margin.bottom - 14})`);
    legendG.append('text').attr('x', 0).attr('y', 10).style('font-size', '9px').style('fill', '#8A9A5B').text('Less');
    SCHEMES[currentScheme].forEach((c, i) => {
        legendG.append('rect')
            .attr('x', 32 + i * (cellSize + 2)).attr('y', 0)
            .attr('width', cellSize).attr('height', cellSize)
            .attr('rx', 2).attr('fill', c);
    });
    legendG.append('text').attr('x', 32 + SCHEMES[currentScheme].length * (cellSize + 2) + 4).attr('y', 10)
        .style('font-size', '9px').style('fill', '#8A9A5B').text('More');
}

function setYear(yr) {
    currentYear = yr;
    document.querySelectorAll('[id^=yr]').forEach(b => b.classList.remove('active'));
    document.getElementById('yr' + yr).classList.add('active');
    render();
}

function setDataset(ds) {
    currentDataset = ds;
    document.querySelectorAll('[id^=ds]').forEach(b => b.classList.remove('active'));
    document.getElementById('ds' + ds.charAt(0).toUpperCase() + ds.slice(1).replace('techEdits','Tech').replace('temperature','Temp').replace('contributions','Contrib')).classList.add('active');
    render();
}

function setScheme(sc) {
    currentScheme = sc;
    document.querySelectorAll('[id^=cl]').forEach(b => b.classList.remove('active'));
    const names = {green:'Green',blue:'Blue',orange:'Orange'};
    document.getElementById('cl' + names[sc]).classList.add('active');
    render();
}

render();
</script>
</body>
</html>
