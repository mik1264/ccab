const width = 850, height = 550;
const innerW = width - margin.left - margin.right;
const innerH = height - margin.top - margin.bottom;

const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);
const tooltip = d3.select('#tooltip');

const x = d3.scaleLog().domain([50, 100000]).range([0, innerW]);
const y = d3.scaleLinear().domain([35, 88]).range([innerH, 0]);
const r = d3.scaleSqrt().domain([0, 22000]).range([3, 55]);

// Axes
g.append('g').attr('transform', `translate(0,${innerH})`)
    .call(d3.axisBottom(x).tickValues([100,1000,10000,100000]).tickFormat(d => {
        if (d >= 1000) return '$' + (d/1000) + 'k';
        return '$' + d;
    }))
    .selectAll('text').attr('fill', '#606C38').attr('font-family', 'Nunito');

g.append('g')
    .call(d3.axisLeft(y).ticks(6))
    .selectAll('text').attr('fill', '#606C38').attr('font-family', 'Nunito');

g.selectAll('.domain, .tick line').attr('stroke', 'rgba(96,108,56,0.3)');

    .attr('font-family', 'Nunito').attr('font-size', '12px')
    .text('GDP per Capita (USD, log scale)');

    .attr('x', -innerH / 2).attr('y', -45)
    .attr('text-anchor', 'middle').attr('fill', '#606C38')
    .attr('font-family', 'Nunito').attr('font-size', '12px')
    .text('Life Expectancy (years)');

// Bubbles
const bubblesGroup = g.append('g');

function getDataForYear(yearIdx) {
    return countries.map(c => ({
        name: c.name, continent: c.continent, ...c.data[yearIdx]
    }));
}

let currentStep = 0;

function updateChart(step, duration) {
    const data = getDataForYear(step);
    const year = years[step];

    document.getElementById('yearBig').textContent = year;
    document.getElementById('scrubberLabel').textContent = year;
    document.getElementById('scrubber').value = step;

    const bubbles = bubblesGroup.selectAll('.bubble')
        .data(data, d => d.name);

    const enter = bubbles.enter().append('g').attr('class', 'bubble')
        .style('cursor', 'pointer');

    enter.append('circle');
    enter.append('text')
        .attr('text-anchor', 'middle')
        .attr('dy', '0.35em')
        .attr('font-family', 'Nunito')
        .attr('font-weight', 600)
        .attr('pointer-events', 'none');

    const merged = enter.merge(bubbles);

    merged.select('circle')
        .on('mouseenter', function(event, d) {
            tooltip.style('opacity', 1)
                .html(`<strong>${d.name}</strong><br>GDP/capita: $${d.gdppc.toLocaleString()}<br>Life exp: ${d.le} years<br>Total GDP: $${d.gdp}B`);
        })
        .on('mousemove', function(event) {
            tooltip.style('left', (event.pageX + 12) + 'px')
                .style('top', (event.pageY - 28) + 'px');
        })
        .on('mouseleave', function() { tooltip.style('opacity', 0); })
        .transition().duration(duration)
        .attr('cx', d => x(d.gdppc))
        .attr('cy', d => y(d.le))
        .attr('r', d => r(d.gdp))
        .attr('fill', d => continentColors[d.continent])
        .attr('opacity', 0.7)
        .attr('stroke', '#FEFAE0')
        .attr('stroke-width', 1);

    merged.select('text')
        .transition().duration(duration)
        .attr('x', d => x(d.gdppc))
        .attr('y', d => y(d.le))
        .attr('font-size', d => r(d.gdp) > 18 ? '9px' : '0px')
        .attr('fill', '#FEFAE0')
        .text(d => d.name);
}

updateChart(0, 0);

// Animation
let animTimer = null;
let isPlaying = false;

function play() {
    if (isPlaying) return;
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸ Pause';
    document.getElementById('playBtn').classList.add('active');
    animTimer = d3.interval(() => {
        currentStep++;
        if (currentStep >= years.length) { stop(); currentStep = years.length - 1; return; }
        updateChart(currentStep, 1000);
    }, 1200);
}

function stop() {
    isPlaying = false;
    if (animTimer) animTimer.stop();
    document.getElementById('playBtn').textContent = '▶ Play';
    document.getElementById('playBtn').classList.remove('active');
}

document.getElementById('playBtn').addEventListener('click', () => { isPlaying ? stop() : play(); });
document.getElementById('scrubber').addEventListener('input', function() {
    stop();
    currentStep = +this.value;
    updateChart(currentStep, 300);
});
</script>
