<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Candlestick Chart - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 8px 16px; background: rgba(255,255,255,0.7);
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-family: 'Lora', serif; text-align: center; color: var(--moss); font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: var(--sage); margin-bottom: 1.5rem; }
        .chart-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
        .btn {
            font-family: 'Nunito', sans-serif; font-size: 0.85rem;
            padding: 8px 18px; border-radius: 20px; border: 2px solid var(--sage);
            background: rgba(255,255,255,0.6); color: var(--moss); cursor: pointer;
            font-weight: 600; transition: all 0.3s ease;
        }
        .btn:hover, .btn.active { background: var(--sage); color: white; }
        .tooltip {
            position: absolute; pointer-events: none; background: rgba(61,68,35,0.92);
            color: var(--cream); padding: 10px 14px; border-radius: 10px;
            font-size: 0.78rem; line-height: 1.5; z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        svg text { font-family: 'Nunito', sans-serif; }
        .candle-up { fill: #2ca02c; stroke: #2ca02c; }
        .candle-down { fill: #d62728; stroke: #d62728; }
        .volume-up { fill: rgba(44,160,44,0.3); }
        .volume-down { fill: rgba(214,39,40,0.3); }
        select {
            font-family: 'Nunito', sans-serif; padding: 6px 12px;
            border-radius: 12px; border: 2px solid var(--sage);
            background: rgba(255,255,255,0.8); color: var(--moss);
            font-size: 0.85rem; font-weight: 600;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="container">
        <h1>Stock Candlestick Chart</h1>
        <p class="subtitle">OHLC data with volume bars and moving averages</p>
        <div class="controls">
            <select id="stockSelect">
                <option value="0">TechCo Inc. (TCH)</option>
                <option value="1">GreenEnergy Ltd. (GRN)</option>
                <option value="2">FinanceGroup (FNG)</option>
            </select>
            <button class="btn active" id="ma20Btn">20-day MA</button>
            <button class="btn" id="ma50Btn">50-day MA</button>
        </div>
        <div class="chart-container">
            <div id="chart"></div>
        </div>
    </div>
    <div class="tooltip" id="tooltip" style="display:none;"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    (function() {
        // Generate realistic OHLC data using random walk
        function generateStock(startPrice, volatility, drift, days) {
            const data = [];
            let price = startPrice;
            const startDate = new Date(2024, 0, 2);
            let dayCount = 0;
            for (let i = 0; dayCount < days; i++) {
                const d = new Date(startDate);
                d.setDate(d.getDate() + i);
                if (d.getDay() === 0 || d.getDay() === 6) continue;
                const change = price * (drift / 252 + volatility * Math.sqrt(1/252) * (Math.random() * 2 - 1 + Math.random() * 2 - 1) / 2);
                const open = price;
                const close = price + change;
                const high = Math.max(open, close) + Math.abs(change) * Math.random() * 0.8;
                const low = Math.min(open, close) - Math.abs(change) * Math.random() * 0.8;
                const volume = Math.round(1e6 + Math.random() * 4e6 + Math.abs(change / price) * 1e7);
                data.push({
                    date: new Date(d), open: +open.toFixed(2), high: +high.toFixed(2),
                    low: +low.toFixed(2), close: +close.toFixed(2), volume: volume
                });
                price = close;
                dayCount++;
            }
            return data;
        }

        const stocks = [
            generateStock(150, 0.25, 0.12, 252),
            generateStock(45, 0.35, 0.20, 252),
            generateStock(280, 0.18, 0.05, 252)
        ];

        function movingAverage(data, window) {
            return data.map((d, i) => {
                if (i < window - 1) return null;
                const slice = data.slice(i - window + 1, i + 1);
                return { date: d.date, value: d3.mean(slice, s => s.close) };
            }).filter(Boolean);
        }

        const margin = { top: 20, right: 50, bottom: 80, left: 60 };
        const volHeight = 80;
        const width = Math.min(1050, window.innerWidth - 80) - margin.left - margin.right;
        const totalHeight = 480;
        const candleHeight = totalHeight - margin.top - margin.bottom - volHeight - 20;

        const svgEl = d3.select("#chart").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", totalHeight);
        const svg = svgEl.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        const tooltip = d3.select("#tooltip");
        let showMA20 = true, showMA50 = false;

        function draw(stockIdx) {
            svg.selectAll("*").remove();
            const data = stocks[stockIdx];

            const x = d3.scaleBand().domain(data.map(d => d.date))
                .range([0, width]).padding(0.3);
            const yPrice = d3.scaleLinear()
                .domain([d3.min(data, d => d.low) * 0.97, d3.max(data, d => d.high) * 1.03])
                .range([candleHeight, 0]);
            const yVol = d3.scaleLinear()
                .domain([0, d3.max(data, d => d.volume)])
                .range([volHeight, 0]);

            // X axis - show every ~20th date
            const tickDates = data.filter((d, i) => i % Math.ceil(data.length / 12) === 0).map(d => d.date);
            svg.append("g").attr("transform", `translate(0,${candleHeight})`)
                .call(d3.axisBottom(x).tickValues(tickDates).tickFormat(d3.timeFormat("%b %d")))
                .selectAll("text").style("fill", "var(--moss)").style("font-size", "10px")
                .attr("transform", "rotate(-40)").style("text-anchor", "end");
            svg.append("g").call(d3.axisLeft(yPrice).ticks(8).tickFormat(d => `$${d.toFixed(0)}`))
                .selectAll("text").style("fill", "var(--moss)").style("font-size", "10px");
            svg.selectAll(".domain, .tick line").style("stroke", "#b5b89a");

            // Grid
            svg.append("g").call(d3.axisLeft(yPrice).ticks(8).tickSize(-width).tickFormat(""))
                .selectAll("line").style("stroke", "#e8e5d8").style("stroke-dasharray", "2,3");
            svg.selectAll(".domain").filter((d, i, nodes) => i === nodes.length - 1).remove();

            // Candlesticks
            const candles = svg.selectAll(".candle").data(data).join("g")
                .attr("class", d => d.close >= d.open ? "candle-up" : "candle-down")
                .attr("transform", d => `translate(${x(d.date) + x.bandwidth() / 2},0)`);

            // Wicks
            candles.append("line")
                .attr("x1", 0).attr("x2", 0)
                .attr("y1", d => yPrice(d.high)).attr("y2", d => yPrice(d.low))
                .attr("stroke-width", 1);

            // Bodies
            candles.append("rect")
                .attr("x", -x.bandwidth() / 2)
                .attr("y", d => yPrice(Math.max(d.open, d.close)))
                .attr("width", x.bandwidth())
                .attr("height", d => Math.max(1, Math.abs(yPrice(d.open) - yPrice(d.close))))
                .style("cursor", "pointer")
                .on("mouseover", function(event, d) {
                    const pct = ((d.close - d.open) / d.open * 100).toFixed(2);
                    tooltip.style("display", "block").html(
                        `<strong>${d3.timeFormat("%b %d, %Y")(d.date)}</strong><br>Open: $${d.open.toFixed(2)}<br>High: $${d.high.toFixed(2)}<br>Low: $${d.low.toFixed(2)}<br>Close: $${d.close.toFixed(2)}<br>Change: ${pct > 0 ? '+' : ''}${pct}%<br>Volume: ${(d.volume / 1e6).toFixed(1)}M`
                    );
                })
                .on("mousemove", function(event) {
                    tooltip.style("left", (event.pageX + 14) + "px").style("top", (event.pageY - 14) + "px");
                })
                .on("mouseout", function() { tooltip.style("display", "none"); });

            // Volume bars
            const volG = svg.append("g").attr("transform", `translate(0,${candleHeight + 20})`);
            volG.selectAll("rect").data(data).join("rect")
                .attr("x", d => x(d.date))
                .attr("y", d => yVol(d.volume))
                .attr("width", x.bandwidth())
                .attr("height", d => volHeight - yVol(d.volume))
                .attr("class", d => d.close >= d.open ? "volume-up" : "volume-down");
            volG.append("g").call(d3.axisLeft(yVol).ticks(3).tickFormat(d => (d / 1e6).toFixed(0) + "M"))
                .selectAll("text").style("fill", "var(--moss)").style("font-size", "9px");

            // Moving averages
            function drawMA(win, color, show) {
                if (!show) return;
                const maData = movingAverage(data, win);
                svg.append("path")
                    .datum(maData)
                    .attr("fill", "none").attr("stroke", color)
                    .attr("stroke-width", 1.8).attr("stroke-dasharray", win === 50 ? "5,3" : "none")
                    .attr("d", d3.line()
                        .x(d => x(d.date) + x.bandwidth() / 2)
                        .y(d => yPrice(d.value)));
            }
            drawMA(20, "#3a6ea5", showMA20);
            drawMA(50, "#e8a838", showMA50);
        }

        draw(0);

        d3.select("#stockSelect").on("change", function() { draw(+this.value); });
        d3.select("#ma20Btn").on("click", function() {
            showMA20 = !showMA20;
            d3.select(this).classed("active", showMA20);
            draw(+d3.select("#stockSelect").property("value"));
        });
        d3.select("#ma50Btn").on("click", function() {
            showMA50 = !showMA50;
            d3.select(this).classed("active", showMA50);
            draw(+d3.select("#stockSelect").property("value"));
        });
    })();
    </script>
</body>
</html>
