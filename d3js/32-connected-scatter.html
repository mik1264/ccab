<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health vs Wealth Connected Scatter - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 8px 16px; background: rgba(255,255,255,0.7);
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 {
            font-family: 'Lora', serif; text-align: center;
            color: var(--moss); font-size: 2rem; margin-bottom: 0.5rem;
        }
        .subtitle { text-align: center; color: var(--sage); margin-bottom: 1.5rem; }
        .chart-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px; margin-bottom: 1.5rem;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        .controls {
            display: flex; gap: 12px; justify-content: center;
            flex-wrap: wrap; margin-bottom: 1rem;
        }
        .btn {
            font-family: 'Nunito', sans-serif; font-size: 0.85rem;
            padding: 8px 18px; border-radius: 20px; border: 2px solid var(--sage);
            background: rgba(255,255,255,0.6); color: var(--moss); cursor: pointer;
            font-weight: 600; transition: all 0.3s ease;
        }
        .btn:hover, .btn.active { background: var(--sage); color: white; }
        .tooltip {
            position: absolute; pointer-events: none; background: rgba(61,68,35,0.92);
            color: var(--cream); padding: 10px 14px; border-radius: 10px;
            font-size: 0.8rem; line-height: 1.5; z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .legend {
            display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
            margin-top: 12px; font-size: 0.8rem;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; cursor: pointer; opacity: 1; transition: opacity 0.3s; }
        .legend-item.dimmed { opacity: 0.3; }
        .legend-color { width: 14px; height: 14px; border-radius: 50%; }
        svg text { font-family: 'Nunito', sans-serif; }
        .year-label {
            font-family: 'Lora', serif; font-size: 72px; fill: var(--sage);
            opacity: 0.15; font-weight: 700;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="container">
        <h1>Health vs Wealth: Connected Scatter</h1>
        <p class="subtitle">GDP per capita vs life expectancy for 10 countries (1960-2020)</p>
        <div class="controls">
            <button class="btn" id="playBtn">Play Animation</button>
            <button class="btn" id="resetBtn">Reset</button>
            <button class="btn" id="showAllBtn">Show All Years</button>
        </div>
        <div class="chart-container">
            <div id="chart"></div>
            <div class="legend" id="legend"></div>
        </div>
    </div>
    <div class="tooltip" id="tooltip" style="display:none;"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    (function() {
        const years = [1960,1965,1970,1975,1980,1985,1990,1995,2000,2005,2010,2015,2020];
        const countries = [
            { name: "United States", region: "Americas",
              gdp: [3007,3828,5234,7801,12553,18237,23889,28671,36318,44115,48468,56444,63028],
              life: [69.8,70.2,70.8,72.6,73.7,74.7,75.2,75.8,76.6,77.4,78.5,78.7,77.0],
              pop: [180.7,194.3,205.1,215.9,227.2,237.9,249.6,266.3,282.2,295.5,309.3,320.7,331.0] },
            { name: "China", region: "Asia",
              gdp: [90,98,113,178,195,294,318,609,959,1753,4550,8069,10409],
              life: [43.7,55.7,59.0,63.9,66.8,68.4,69.5,70.5,72.0,73.8,75.0,76.1,77.1],
              pop: [667.1,715.2,818.3,916.4,981.2,1051.0,1135.2,1204.9,1262.6,1303.7,1337.7,1371.2,1402.1] },
            { name: "India", region: "Asia",
              gdp: [82,95,112,155,266,296,368,374,443,714,1358,1606,1901],
              life: [41.4,44.4,47.7,51.1,54.2,56.1,58.0,60.4,62.6,64.5,66.7,68.3,69.4],
              pop: [449.5,499.1,555.2,623.1,698.9,784.4,873.3,964.3,1056.6,1147.6,1234.3,1310.2,1380.0] },
            { name: "Japan", region: "Asia",
              gdp: [479,920,2037,4659,9465,11585,25359,42516,38532,37218,44508,34524,39918],
              life: [67.7,69.8,72.0,73.5,76.1,78.1,78.8,79.5,81.1,82.0,82.8,83.6,84.6],
              pop: [93.4,98.9,104.7,111.5,116.8,121.0,123.5,125.4,126.8,127.8,128.1,127.1,125.8] },
            { name: "Germany", region: "Europe",
              gdp: [1331,1881,2717,6670,12092,10874,22304,31628,23719,34168,41785,41103,46208],
              life: [69.3,70.4,70.6,71.5,73.1,74.6,75.4,76.5,78.0,79.0,79.9,80.6,80.9],
              pop: [72.8,75.6,78.2,78.7,78.3,77.7,79.4,81.7,82.2,82.4,81.8,82.2,83.2] },
            { name: "Brazil", region: "Americas",
              gdp: [208,260,445,1153,1930,1640,3085,4749,3693,4790,11286,8814,6797],
              life: [54.7,55.9,57.6,59.6,62.7,64.7,66.3,68.4,70.2,71.7,73.1,74.7,72.8],
              pop: [72.2,83.1,95.1,107.1,120.7,135.3,149.6,161.8,174.8,186.1,195.7,204.5,212.6] },
            { name: "Nigeria", region: "Africa",
              gdp: [93,89,224,401,874,325,322,260,377,804,2292,2687,2097],
              life: [37.9,39.6,41.3,43.1,45.5,46.4,46.1,46.1,46.6,49.0,51.3,53.4,52.7],
              pop: [45.1,51.1,56.1,63.3,73.5,83.9,95.6,108.0,122.3,138.9,158.6,181.1,206.1] },
            { name: "United Kingdom", region: "Europe",
              gdp: [1380,1815,2349,4272,10032,8655,19095,23123,26374,40275,38893,44305,40285],
              life: [70.8,71.0,71.9,72.8,73.7,74.8,75.9,76.7,77.7,79.0,80.4,81.0,80.4],
              pop: [52.4,54.4,55.6,56.2,56.3,56.6,57.2,58.0,58.9,60.4,62.8,65.1,67.1] },
            { name: "South Korea", region: "Asia",
              gdp: [158,108,279,617,1778,2482,6516,12338,11948,18658,22151,27222,31489],
              life: [53.0,56.1,60.4,64.0,66.2,68.6,71.3,73.5,75.9,78.0,80.2,82.1,83.5],
              pop: [25.0,28.7,31.9,35.3,38.1,40.8,42.9,45.1,47.0,48.1,49.6,51.0,51.8] },
            { name: "Egypt", region: "Africa",
              gdp: [153,177,213,316,536,725,765,993,1450,1207,2803,3547,3548],
              life: [46.1,49.4,52.0,53.6,56.7,59.7,63.5,66.1,68.6,69.7,70.3,71.1,70.2],
              pop: [27.9,30.9,35.3,38.8,44.4,50.3,56.8,62.3,68.8,76.4,84.1,93.8,102.3] }
        ];

        const colors = d3.scaleOrdinal()
            .domain(countries.map(d => d.name))
            .range(["#3a6ea5","#c44e52","#e8a838","#6d9ac4","#606C38","#2ca02c","#8c564b","#9467bd","#d62728","#BC6C25"]);

        const margin = {top: 40, right: 30, bottom: 60, left: 70};
        const width = Math.min(1050, window.innerWidth - 80) - margin.left - margin.right;
        const height = 520 - margin.top - margin.bottom;

        const svg = d3.select("#chart").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
          .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        const x = d3.scaleLog().domain([70, 70000]).range([0, width]);
        const y = d3.scaleLinear().domain([35, 88]).range([height, 0]);
        const r = d3.scaleSqrt().domain([0, 1500]).range([3, 28]);

        svg.append("g").attr("transform", `translate(0,${height})`)
            .call(d3.axisBottom(x).tickValues([100,500,1000,5000,10000,50000])
                .tickFormat(d => d >= 1000 ? `$${d/1000}k` : `$${d}`))
            .selectAll("text").style("fill", "var(--moss)").style("font-size", "11px");
        svg.append("g")
            .call(d3.axisLeft(y).ticks(10))
            .selectAll("text").style("fill", "var(--moss)").style("font-size", "11px");
        svg.selectAll(".domain, .tick line").style("stroke", "#b5b89a");

        svg.append("text").attr("x", width/2).attr("y", height + 45)
            .style("text-anchor", "middle").style("fill", "var(--moss)")
            .style("font-size", "13px").text("GDP per Capita (log scale, USD)");
        svg.append("text").attr("transform", "rotate(-90)")
            .attr("x", -height/2).attr("y", -50)
            .style("text-anchor", "middle").style("fill", "var(--moss)")
            .style("font-size", "13px").text("Life Expectancy (years)");

        const yearLabel = svg.append("text")
            .attr("class", "year-label")
            .attr("x", width - 20).attr("y", height - 20)
            .style("text-anchor", "end");

        const tooltip = d3.select("#tooltip");
        const visible = new Set(countries.map(d => d.name));

        const lines = {};
        const dots = {};
        countries.forEach(c => {
            const data = years.map((yr, i) => ({
                year: yr, gdp: c.gdp[i], life: c.life[i], pop: c.pop[i]
            }));
            lines[c.name] = svg.append("path")
                .datum(data).attr("fill", "none")
                .attr("stroke", colors(c.name)).attr("stroke-width", 2)
                .attr("stroke-opacity", 0.7).attr("d", d3.line()
                    .x(d => x(d.gdp)).y(d => y(d.life)));
            dots[c.name] = svg.selectAll(`.dot-${c.name.replace(/\s/g,'-')}`)
                .data(data).join("circle")
                .attr("cx", d => x(d.gdp)).attr("cy", d => y(d.life))
                .attr("r", d => r(d.pop)).attr("fill", colors(c.name))
                .attr("fill-opacity", 0.7).attr("stroke", colors(c.name))
                .attr("stroke-width", 1.5).style("cursor", "pointer")
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("fill-opacity", 1).attr("r", r(d.pop) + 3);
                    tooltip.style("display", "block").html(
                        `<strong>${c.name}</strong><br>Year: ${d.year}<br>GDP/capita: $${d.gdp.toLocaleString()}<br>Life expectancy: ${d.life} yrs<br>Population: ${d.pop}M`
                    );
                })
                .on("mousemove", function(event) {
                    tooltip.style("left", (event.pageX + 14) + "px")
                        .style("top", (event.pageY - 14) + "px");
                })
                .on("mouseout", function(event, d) {
                    d3.select(this).attr("fill-opacity", 0.7).attr("r", r(d.pop));
                    tooltip.style("display", "none");
                });
        });

        // Legend
        const legend = d3.select("#legend");
        countries.forEach(c => {
            const item = legend.append("div").attr("class", "legend-item")
                .style("cursor", "pointer").on("click", function() {
                    if (visible.has(c.name)) { visible.delete(c.name); } else { visible.add(c.name); }
                    d3.select(this).classed("dimmed", !visible.has(c.name));
                    lines[c.name].style("display", visible.has(c.name) ? null : "none");
                    dots[c.name].style("display", visible.has(c.name) ? null : "none");
                });
            item.append("div").attr("class", "legend-color")
                .style("background", colors(c.name));
            item.append("span").text(c.name);
        });

        // Animation
        let animating = false, animTimer = null, currentYearIdx = 0;
        function showUpToYear(idx) {
            currentYearIdx = idx;
            yearLabel.text(years[idx]);
            countries.forEach(c => {
                if (!visible.has(c.name)) return;
                const data = years.slice(0, idx + 1).map((yr, i) => ({
                    year: yr, gdp: c.gdp[i], life: c.life[i], pop: c.pop[i]
                }));
                lines[c.name].datum(data).attr("d", d3.line()
                    .x(d => x(d.gdp)).y(d => y(d.life)));
                dots[c.name].attr("display", (d, i) => i <= idx ? null : "none");
            });
        }

        function showAll() {
            stopAnim();
            yearLabel.text("");
            countries.forEach(c => {
                const data = years.map((yr, i) => ({
                    year: yr, gdp: c.gdp[i], life: c.life[i], pop: c.pop[i]
                }));
                lines[c.name].datum(data).attr("d", d3.line()
                    .x(d => x(d.gdp)).y(d => y(d.life)));
                dots[c.name].attr("display", null);
            });
        }

        function stopAnim() {
            animating = false;
            if (animTimer) { clearInterval(animTimer); animTimer = null; }
            d3.select("#playBtn").text("Play Animation");
        }

        d3.select("#playBtn").on("click", function() {
            if (animating) { stopAnim(); return; }
            animating = true;
            d3.select(this).text("Pause");
            currentYearIdx = 0;
            showUpToYear(0);
            animTimer = setInterval(() => {
                currentYearIdx++;
                if (currentYearIdx >= years.length) { stopAnim(); return; }
                showUpToYear(currentYearIdx);
            }, 800);
        });
        d3.select("#resetBtn").on("click", () => { stopAnim(); showUpToYear(0); });
        d3.select("#showAllBtn").on("click", showAll);
        showAll();
    })();
    </script>
</body>
</html>
