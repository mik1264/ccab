<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Violin + Box Plot - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 8px 16px; background: rgba(255,255,255,0.7);
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-family: 'Lora', serif; text-align: center; color: var(--moss); font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: var(--sage); margin-bottom: 1.5rem; }
        .chart-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 24px;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        .controls { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 1rem; }
        .btn {
            font-family: 'Nunito', sans-serif; font-size: 0.85rem;
            padding: 8px 18px; border-radius: 20px; border: 2px solid var(--sage);
            background: rgba(255,255,255,0.6); color: var(--moss); cursor: pointer;
            font-weight: 600; transition: all 0.3s ease;
        }
        .btn:hover, .btn.active { background: var(--sage); color: white; }
        .tooltip {
            position: absolute; pointer-events: none; background: rgba(61,68,35,0.92);
            color: var(--cream); padding: 10px 14px; border-radius: 10px;
            font-size: 0.8rem; line-height: 1.5; z-index: 100;
        }
        svg text { font-family: 'Nunito', sans-serif; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="container">
        <h1>Violin + Box Plot</h1>
        <p class="subtitle">Exam score distributions for 8 student groups</p>
        <div class="controls">
            <button class="btn active" id="sortMedian">Sort by Median</button>
            <button class="btn" id="sortSpread">Sort by Spread (IQR)</button>
            <button class="btn" id="sortName">Sort by Name</button>
        </div>
        <div class="chart-container">
            <div id="chart"></div>
        </div>
    </div>
    <div class="tooltip" id="tooltip" style="display:none;"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    (function() {
        // Generate exam scores for 8 groups
        function genScores(mean, std, n, skew) {
            const scores = [];
            for (let i = 0; i < n; i++) {
                let z = 0;
                for (let j = 0; j < 6; j++) z += Math.random();
                z = (z - 3) / Math.sqrt(0.5);
                if (skew) z = z + skew * (z * z - 1) / 3;
                let s = mean + z * std;
                s = Math.max(0, Math.min(100, Math.round(s)));
                scores.push(s);
            }
            return scores.sort((a, b) => a - b);
        }

        const groups = [
            { name: "Advanced Calc", scores: genScores(82, 8, 50, -0.3), color: "#3a6ea5" },
            { name: "Intro Physics", scores: genScores(68, 14, 50, 0.2), color: "#2ca02c" },
            { name: "Organic Chem", scores: genScores(62, 16, 50, 0.5), color: "#c44e52" },
            { name: "Linear Algebra", scores: genScores(75, 10, 50, 0), color: "#e8a838" },
            { name: "Statistics 101", scores: genScores(71, 12, 50, -0.1), color: "#9467bd" },
            { name: "CS Algorithms", scores: genScores(78, 9, 50, -0.5), color: "#8c564b" },
            { name: "Biology Lab", scores: genScores(73, 11, 50, 0.3), color: "#606C38" },
            { name: "English Comp", scores: genScores(76, 7, 50, 0), color: "#BC6C25" }
        ];

        // Compute stats
        groups.forEach(g => {
            const s = g.scores;
            g.mean = d3.mean(s);
            g.median = d3.median(s);
            g.std = d3.deviation(s);
            g.q1 = d3.quantile(s, 0.25);
            g.q3 = d3.quantile(s, 0.75);
            g.iqr = g.q3 - g.q1;
            g.whiskerLo = Math.max(d3.min(s), g.q1 - 1.5 * g.iqr);
            g.whiskerHi = Math.min(d3.max(s), g.q3 + 1.5 * g.iqr);
        });

        const margin = { top: 30, right: 30, bottom: 70, left: 50 };
        const width = Math.min(1050, window.innerWidth - 80) - margin.left - margin.right;
        const height = 480 - margin.top - margin.bottom;

        const svgEl = d3.select("#chart").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom);
        const svg = svgEl.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        const tooltip = d3.select("#tooltip");
        let sortMode = "median";

        // KDE
        function kde(kernel, thresholds, data) {
            return thresholds.map(t => [t, d3.mean(data, d => kernel(t - d))]);
        }
        function epanechnikov(bandwidth) {
            return x => { x /= bandwidth; return Math.abs(x) <= 1 ? 0.75 * (1 - x * x) / bandwidth : 0; };
        }

        function sortGroups() {
            if (sortMode === "median") groups.sort((a, b) => b.median - a.median);
            else if (sortMode === "spread") groups.sort((a, b) => b.iqr - a.iqr);
            else groups.sort((a, b) => a.name.localeCompare(b.name));
        }

        function draw() {
            svg.selectAll("*").remove();
            sortGroups();

            const x = d3.scaleBand()
                .domain(groups.map(g => g.name))
                .range([0, width]).padding(0.15);
            const y = d3.scaleLinear().domain([0, 105]).range([height, 0]);

            // Axes
            svg.append("g").attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(x))
                .selectAll("text").style("fill", "var(--moss)").style("font-size", "10px")
                .attr("transform", "rotate(-25)").style("text-anchor", "end");
            svg.append("g").call(d3.axisLeft(y).ticks(10))
                .selectAll("text").style("fill", "var(--moss)").style("font-size", "10px");
            svg.selectAll(".domain, .tick line").style("stroke", "#b5b89a");

            svg.append("text").attr("transform", "rotate(-90)")
                .attr("x", -height / 2).attr("y", -38)
                .style("text-anchor", "middle").style("fill", "var(--moss)")
                .style("font-size", "12px").text("Score");

            // Grid
            svg.append("g").call(d3.axisLeft(y).ticks(10).tickSize(-width).tickFormat(""))
                .selectAll("line").style("stroke", "#e8e5d8").style("stroke-dasharray", "2,3");

            const thresholds = d3.range(0, 101, 1);

            groups.forEach(g => {
                const density = kde(epanechnikov(6), thresholds, g.scores);
                const maxDensity = d3.max(density, d => d[1]);
                const violinWidth = d3.scaleLinear().domain([0, maxDensity]).range([0, x.bandwidth() / 2]);

                const cx = x(g.name) + x.bandwidth() / 2;
                const gg = svg.append("g");

                // Violin
                gg.append("path")
                    .datum(density)
                    .attr("d", d3.area()
                        .x0(d => cx - violinWidth(d[1]))
                        .x1(d => cx + violinWidth(d[1]))
                        .y(d => y(d[0]))
                        .curve(d3.curveCatmullRom))
                    .attr("fill", g.color).attr("fill-opacity", 0.3)
                    .attr("stroke", g.color).attr("stroke-width", 1.5);

                // Box
                const boxW = x.bandwidth() * 0.2;
                gg.append("rect")
                    .attr("x", cx - boxW / 2).attr("y", y(g.q3))
                    .attr("width", boxW).attr("height", y(g.q1) - y(g.q3))
                    .attr("fill", g.color).attr("fill-opacity", 0.6)
                    .attr("stroke", g.color).attr("stroke-width", 1.5);

                // Median line
                gg.append("line")
                    .attr("x1", cx - boxW / 2).attr("x2", cx + boxW / 2)
                    .attr("y1", y(g.median)).attr("y2", y(g.median))
                    .attr("stroke", "white").attr("stroke-width", 2.5);

                // Whiskers
                gg.append("line")
                    .attr("x1", cx).attr("x2", cx)
                    .attr("y1", y(g.whiskerHi)).attr("y2", y(g.q3))
                    .attr("stroke", g.color).attr("stroke-width", 1).attr("stroke-dasharray", "3,2");
                gg.append("line")
                    .attr("x1", cx).attr("x2", cx)
                    .attr("y1", y(g.q1)).attr("y2", y(g.whiskerLo))
                    .attr("stroke", g.color).attr("stroke-width", 1).attr("stroke-dasharray", "3,2");

                // Whisker caps
                const capW = boxW * 0.6;
                gg.append("line").attr("x1", cx - capW/2).attr("x2", cx + capW/2)
                    .attr("y1", y(g.whiskerHi)).attr("y2", y(g.whiskerHi))
                    .attr("stroke", g.color).attr("stroke-width", 1.5);
                gg.append("line").attr("x1", cx - capW/2).attr("x2", cx + capW/2)
                    .attr("y1", y(g.whiskerLo)).attr("y2", y(g.whiskerLo))
                    .attr("stroke", g.color).attr("stroke-width", 1.5);

                // Hover area
                gg.append("rect")
                    .attr("x", x(g.name)).attr("y", 0)
                    .attr("width", x.bandwidth()).attr("height", height)
                    .attr("fill", "transparent").style("cursor", "pointer")
                    .on("mouseover", function(event) {
                        tooltip.style("display", "block").html(
                            `<strong>${g.name}</strong><br>Mean: ${g.mean.toFixed(1)}<br>Median: ${g.median.toFixed(1)}<br>Std Dev: ${g.std.toFixed(1)}<br>IQR: ${g.iqr.toFixed(1)}<br>Q1: ${g.q1.toFixed(1)} | Q3: ${g.q3.toFixed(1)}`
                        );
                    })
                    .on("mousemove", function(event) {
                        tooltip.style("left", (event.pageX + 14) + "px").style("top", (event.pageY - 14) + "px");
                    })
                    .on("mouseout", function() { tooltip.style("display", "none"); });
            });
        }

        draw();

        d3.select("#sortMedian").on("click", function() {
            sortMode = "median";
            d3.selectAll(".btn").classed("active", false);
            d3.select(this).classed("active", true);
            draw();
        });
        d3.select("#sortSpread").on("click", function() {
            sortMode = "spread";
            d3.selectAll(".btn").classed("active", false);
            d3.select(this).classed("active", true);
            draw();
        });
        d3.select("#sortName").on("click", function() {
            sortMode = "name";
            d3.selectAll(".btn").classed("active", false);
            d3.select(this).classed("active", true);
            draw();
        });
    })();
    </script>
</body>
</html>
