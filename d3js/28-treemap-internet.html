<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Users Treemap - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #606C38; min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #606C38; text-decoration: none; font-weight: 600;
            font-family: 'Nunito', sans-serif; z-index: 1000;
            background: rgba(254,250,224,0.9); padding: 8px 16px;
            border-radius: 20px; border: 1px solid rgba(138,154,91,0.3);
            transition: all 0.3s;
        }
        .back-link:hover { background: #8A9A5B; color: #FEFAE0; }
        h1 {
            font-family: 'Lora', serif; text-align: center;
            color: #606C38; font-size: 2rem; padding: 20px 0 5px;
        }
        .subtitle { text-align: center; color: #8A9A5B; font-size: 0.95rem; margin-bottom: 5px; }
        .chart-container { display: flex; justify-content: center; padding: 10px; }
        svg { max-width: 100%; height: auto; }
        .breadcrumb {
            display: flex; gap: 6px; justify-content: center;
            margin: 8px 0; font-size: 0.9rem; align-items: center;
        }
        .breadcrumb span { cursor: pointer; color: #8A9A5B; }
        .breadcrumb span:hover { color: #606C38; text-decoration: underline; }
        .breadcrumb .sep { color: #ccc; cursor: default; }
        .breadcrumb .current { color: #606C38; font-weight: 700; cursor: default; }
        .tooltip {
            position: absolute; background: rgba(254,250,224,0.95);
            border: 1px solid #8A9A5B; border-radius: 8px;
            padding: 10px 14px; font-size: 0.85rem; pointer-events: none;
            opacity: 0; color: #606C38; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Gallery</a>
    <h1>Internet Users Treemap</h1>
    <p class="subtitle">Global internet users by country — cell size = total users, color = penetration rate</p>
    <div class="breadcrumb" id="breadcrumb">
        <span class="current">World</span>
    </div>
    <div class="chart-container">
        <svg id="chart"></svg>
    </div>
    <div class="tooltip" id="tooltip"></div>

<script>
// Internet user data (approximate 2023): {name, users (millions), penetration %}
const internetData = {
    name: "World",
    children: [
        {name: "Asia", children: [
            {name:"China",users:1050,pen:73},{name:"India",users:692,pen:49},
            {name:"Indonesia",users:213,pen:77},{name:"Japan",users:117,pen:93},
            {name:"Bangladesh",users:66,pen:39},{name:"Vietnam",users:78,pen:79},
            {name:"Philippines",users:85,pen:73},{name:"Thailand",users:61,pen:86},
            {name:"S. Korea",users:50,pen:97},{name:"Malaysia",users:33,pen:97},
            {name:"Taiwan",users:22,pen:91},{name:"Pakistan",users:87,pen:37},
            {name:"Myanmar",users:24,pen:44},{name:"Sri Lanka",users:11,pen:52}
        ]},
        {name: "Europe", children: [
            {name:"Germany",users:77,pen:93},{name:"UK",users:65,pen:97},
            {name:"France",users:60,pen:93},{name:"Italy",users:51,pen:87},
            {name:"Spain",users:42,pen:93},{name:"Poland",users:35,pen:91},
            {name:"Netherlands",users:16,pen:96},{name:"Romania",users:16,pen:84},
            {name:"Sweden",users:10,pen:96},{name:"Switzerland",users:8,pen:96},
            {name:"Ukraine",users:33,pen:79},{name:"Turkey",users:69,pen:83}
        ]},
        {name: "Americas", children: [
            {name:"US",users:312,pen:93},{name:"Brazil",users:181,pen:84},
            {name:"Mexico",users:100,pen:76},{name:"Canada",users:36,pen:97},
            {name:"Argentina",users:39,pen:87},{name:"Colombia",users:39,pen:73},
            {name:"Chile",users:17,pen:90},{name:"Peru",users:22,pen:65},
            {name:"Venezuela",users:18,pen:62}
        ]},
        {name: "Africa", children: [
            {name:"Nigeria",users:109,pen:51},{name:"Egypt",users:82,pen:72},
            {name:"South Africa",users:42,pen:72},{name:"Kenya",users:23,pen:42},
            {name:"Morocco",users:33,pen:88},{name:"Ethiopia",users:26,pen:21},
            {name:"Tanzania",users:18,pen:28},{name:"Ghana",users:17,pen:53},
            {name:"Algeria",users:28,pen:63}
        ]},
        {name: "Oceania", children: [
            {name:"Australia",users:24,pen:96},{name:"New Zealand",users:5,pen:95}
        ]}
    ]
};

const width = 900, height = 560;
const svg = d3.select('#chart')
    .attr('width', width).attr('height', height)
    .attr('viewBox', `0 0 ${width} ${height}`);

const tooltip = d3.select('#tooltip');

const colorScale = d3.scaleSequential(d3.interpolateRgbBasis(['#d6604d','#DDA15E','#8A9A5B','#2166ac']))
    .domain([20, 97]);

const treemap = d3.treemap()
    .size([width, height])
    .paddingOuter(3)
    .paddingTop(22)
    .paddingInner(2)
    .round(true);

const root = d3.hierarchy(internetData)
    .sum(d => d.users || 0)
    .sort((a, b) => b.value - a.value);

treemap(root);

let currentRoot = root;

function renderTreemap(node) {
    currentRoot = node;
    svg.selectAll('*').remove();

    treemap(node);

    const leaves = node.leaves();
    const groups = node.children || [node];

    // Group headers
    if (node.depth === 0 && node.children) {
        node.children.forEach(child => {
            svg.append('rect')
                .attr('x', child.x0).attr('y', child.y0)
                .attr('width', child.x1 - child.x0)
                .attr('height', child.y1 - child.y0)
                .attr('fill', 'rgba(96,108,56,0.08)')
                .attr('stroke', 'rgba(96,108,56,0.2)')
                .attr('rx', 4);

            svg.append('text')
                .attr('x', child.x0 + 6).attr('y', child.y0 + 15)
                .attr('fill', '#606C38')
                .attr('font-size', '12px')
                .attr('font-family', 'Lora')
                .attr('font-weight', 700)
                .text(child.data.name)
                .style('cursor', 'pointer')
                .on('click', () => {
                    renderTreemap(child);
                    updateBreadcrumb(child);
                });
        });
    }

    // Country cells
    const cells = svg.selectAll('.cell')
        .data(leaves)
        .enter().append('g')
        .attr('class', 'cell')
        .attr('transform', d => `translate(${d.x0},${d.y0})`)
        .style('cursor', 'pointer');

    cells.append('rect')
        .attr('width', d => Math.max(0, d.x1 - d.x0))
        .attr('height', d => Math.max(0, d.y1 - d.y0))
        .attr('fill', d => colorScale(d.data.pen))
        .attr('stroke', '#FEFAE0')
        .attr('stroke-width', 1)
        .attr('rx', 2)
        .attr('opacity', 0.85)
        .on('mouseenter', function(event, d) {
            d3.select(this).attr('opacity', 1).attr('stroke', '#606C38').attr('stroke-width', 2);
            tooltip.style('opacity', 1)
                .html(`<strong>${d.data.name}</strong><br>Internet users: ${d.data.users}M<br>Penetration: ${d.data.pen}%`);
        })
        .on('mousemove', function(event) {
            tooltip.style('left', (event.pageX + 12) + 'px')
                .style('top', (event.pageY - 28) + 'px');
        })
        .on('mouseleave', function() {
            d3.select(this).attr('opacity', 0.85).attr('stroke', '#FEFAE0').attr('stroke-width', 1);
            tooltip.style('opacity', 0);
        });

    // Labels
    cells.append('text')
        .attr('x', 4).attr('y', 14)
        .attr('fill', d => d.data.pen > 70 ? '#FEFAE0' : '#333')
        .attr('font-size', d => {
            const w = d.x1 - d.x0, h = d.y1 - d.y0;
            return (w > 60 && h > 25) ? '11px' : (w > 40 && h > 18 ? '9px' : '0px');
        })
        .attr('font-family', 'Nunito')
        .attr('font-weight', 600)
        .text(d => d.data.name);

    cells.append('text')
        .attr('x', 4).attr('y', 27)
        .attr('fill', d => d.data.pen > 70 ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.6)')
        .attr('font-size', d => {
            const w = d.x1 - d.x0, h = d.y1 - d.y0;
            return (w > 60 && h > 35) ? '10px' : '0px';
        })
        .attr('font-family', 'Nunito')
        .text(d => d.data.users + 'M');
}

function updateBreadcrumb(node) {
    const bc = d3.select('#breadcrumb');
    bc.html('');
    const path = [];
    let n = node;
    while (n) { path.unshift(n); n = n.parent; }

    path.forEach((p, i) => {
        if (i > 0) bc.append('span').attr('class', 'sep').text(' / ');
        if (i < path.length - 1) {
            bc.append('span')
                .text(p.data.name)
                .on('click', () => {
                    renderTreemap(p);
                    updateBreadcrumb(p);
                });
        } else {
            bc.append('span').attr('class', 'current').text(p.data.name);
        }
    });
}

renderTreemap(root);
updateBreadcrumb(root);
</script>
</body>
</html>
