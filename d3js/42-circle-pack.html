<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoomable Circle Pack - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 8px 16px; background: rgba(255,255,255,0.7);
            border-radius: 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .container { max-width: 1100px; margin: 0 auto; padding: 80px 20px 40px; }
        h1 { font-family: 'Lora', serif; text-align: center; color: var(--moss); font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; color: var(--sage); margin-bottom: 1rem; }
        .chart-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 16px; text-align: center;
            box-shadow: 0 8px 32px rgba(96,108,56,0.1);
        }
        .info { text-align: center; font-size: 0.85rem; color: var(--sage); margin-bottom: 8px; }
        svg text { font-family: 'Nunito', sans-serif; pointer-events: none; }
        .tooltip {
            position: absolute; pointer-events: none; background: rgba(61,68,35,0.92);
            color: var(--cream); padding: 10px 14px; border-radius: 10px;
            font-size: 0.8rem; line-height: 1.5; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="container">
        <h1>Zoomable Circle Pack</h1>
        <p class="subtitle">Programming ecosystems: Languages, Frameworks, and Libraries</p>
        <p class="info">Click circles to zoom in. Click background to zoom out.</p>
        <div class="chart-container">
            <div id="chart"></div>
        </div>
    </div>
    <div class="tooltip" id="tooltip" style="display:none;"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    (function() {
        const data = {
            name: "Programming", children: [
                { name: "JavaScript", children: [
                    { name: "React", children: [
                        {name:"Next.js",value:95},{name:"Gatsby",value:28},{name:"Remix",value:22},
                        {name:"React Native",value:65},{name:"Redux",value:55}
                    ]},
                    { name: "Vue.js", children: [
                        {name:"Nuxt",value:45},{name:"Vuetify",value:32},{name:"Pinia",value:25},
                        {name:"Quasar",value:18}
                    ]},
                    { name: "Angular", children: [
                        {name:"NgRx",value:28},{name:"Angular Material",value:35},{name:"Ionic",value:22}
                    ]},
                    { name: "Node.js", children: [
                        {name:"Express",value:72},{name:"Fastify",value:30},{name:"NestJS",value:42},
                        {name:"Koa",value:15}
                    ]},
                    { name: "Build Tools", children: [
                        {name:"Vite",value:68},{name:"Webpack",value:55},{name:"esbuild",value:38},
                        {name:"Rollup",value:22}
                    ]}
                ]},
                { name: "Python", children: [
                    { name: "Web", children: [
                        {name:"Django",value:65},{name:"Flask",value:52},{name:"FastAPI",value:58}
                    ]},
                    { name: "Data Science", children: [
                        {name:"NumPy",value:85},{name:"Pandas",value:82},{name:"Matplotlib",value:60},
                        {name:"SciPy",value:45},{name:"Seaborn",value:30}
                    ]},
                    { name: "ML/AI", children: [
                        {name:"PyTorch",value:90},{name:"TensorFlow",value:78},{name:"scikit-learn",value:72},
                        {name:"Hugging Face",value:65},{name:"Keras",value:48}
                    ]}
                ]},
                { name: "Rust", children: [
                    { name: "Web", children: [
                        {name:"Actix",value:35},{name:"Axum",value:30},{name:"Rocket",value:25}
                    ]},
                    { name: "Systems", children: [
                        {name:"Tokio",value:55},{name:"Serde",value:68},{name:"Clap",value:32},
                        {name:"Rayon",value:20}
                    ]},
                    { name: "WASM", children: [
                        {name:"wasm-bindgen",value:28},{name:"Yew",value:18},{name:"Leptos",value:22}
                    ]}
                ]},
                { name: "Go", children: [
                    { name: "Web", children: [
                        {name:"Gin",value:55},{name:"Echo",value:30},{name:"Fiber",value:28}
                    ]},
                    { name: "Infrastructure", children: [
                        {name:"Docker SDK",value:42},{name:"Kubernetes client",value:38},
                        {name:"Terraform SDK",value:25}
                    ]}
                ]},
                { name: "Java", children: [
                    { name: "Frameworks", children: [
                        {name:"Spring Boot",value:88},{name:"Quarkus",value:30},
                        {name:"Micronaut",value:22},{name:"Jakarta EE",value:35}
                    ]},
                    { name: "Build/Test", children: [
                        {name:"Maven",value:65},{name:"Gradle",value:55},{name:"JUnit",value:72}
                    ]}
                ]}
            ]
        };

        const size = Math.min(700, window.innerWidth - 80);
        const colorScale = d3.scaleOrdinal()
            .domain(["JavaScript","Python","Rust","Go","Java"])
            .range(["#e8a838","#3a6ea5","#c44e52","#2ca02c","#9467bd"]);

        function getColor(d) {
            let node = d;
            while (node.depth > 1) node = node.parent;
            return node.depth === 1 ? colorScale(node.data.name) : "var(--sage)";
        }

        const root = d3.hierarchy(data)
            .sum(d => d.value || 0)
            .sort((a, b) => b.value - a.value);

        d3.pack().size([size, size]).padding(3)(root);

        const tooltip = d3.select("#tooltip");
        let focus = root;

        const svg = d3.select("#chart").append("svg")
            .attr("width", size).attr("height", size)
            .style("cursor", "pointer")
            .on("click", () => zoom(root));

        const g = svg.append("g");

        const circles = g.selectAll("circle")
            .data(root.descendants()).join("circle")
            .attr("cx", d => d.x).attr("cy", d => d.y).attr("r", d => d.r)
            .attr("fill", d => d.children ? getColor(d) : getColor(d))
            .attr("fill-opacity", d => d.children ? 0.15 : 0.6)
            .attr("stroke", d => d.children ? getColor(d) : "none")
            .attr("stroke-width", d => d.depth <= 1 ? 2 : 1)
            .on("click", (event, d) => { event.stopPropagation(); zoom(d); })
            .on("mouseover", function(event, d) {
                d3.select(this).attr("fill-opacity", d.children ? 0.25 : 0.85);
                const path = d.ancestors().reverse().slice(1).map(a => a.data.name).join(" > ");
                tooltip.style("display", "block").html(
                    `<strong>${d.data.name}</strong>${d.data.value ? '<br>Popularity: ' + d.data.value : ''}<br>${path}`
                );
            })
            .on("mousemove", function(event) {
                tooltip.style("left", (event.pageX + 14) + "px").style("top", (event.pageY - 14) + "px");
            })
            .on("mouseout", function(event, d) {
                d3.select(this).attr("fill-opacity", d.children ? 0.15 : 0.6);
                tooltip.style("display", "none");
            });

        const labels = g.selectAll("text")
            .data(root.descendants()).join("text")
            .attr("x", d => d.x).attr("y", d => d.y)
            .attr("text-anchor", "middle").attr("dominant-baseline", "middle")
            .style("font-size", d => Math.min(d.r / 3, 14) + "px")
            .style("font-weight", d => d.children ? "700" : "500")
            .style("fill", d => d.children ? getColor(d) : "var(--dark-moss)")
            .text(d => d.r > 20 ? d.data.name : "")
            .style("opacity", d => d.parent === root || d === root ? 1 : 0.7);

        function zoom(d) {
            focus = d;
            const k = size / (d.r * 2);
            const x = -d.x * k + size / 2;
            const y = -d.y * k + size / 2;

            const t = svg.transition().duration(750).ease(d3.easeCubicInOut);

            g.transition(t).attr("transform", `translate(${x},${y}) scale(${k})`);

            labels.transition(t)
                .style("font-size", d => Math.min(d.r / 3, 14 / k) + "px")
                .style("opacity", d => {
                    if (d.parent === focus || d === focus) return 1;
                    if (d.ancestors().includes(focus) && d.r * k > 15) return 0.8;
                    return 0;
                });
        }

        zoom(root);
    })();
    </script>
</body>
</html>
