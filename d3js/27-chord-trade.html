<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Trade Chord Diagram - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: #606C38; min-height: 100vh;
        }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #606C38; text-decoration: none; font-weight: 600;
            font-family: 'Nunito', sans-serif; z-index: 1000;
            background: rgba(254,250,224,0.9); padding: 8px 16px;
            border-radius: 20px; border: 1px solid rgba(138,154,91,0.3);
            transition: all 0.3s;
        }
        .back-link:hover { background: #8A9A5B; color: #FEFAE0; }
        h1 {
            font-family: 'Lora', serif; text-align: center;
            color: #606C38; font-size: 2rem; padding: 20px 0 5px;
        }
        .subtitle { text-align: center; color: #8A9A5B; font-size: 0.95rem; margin-bottom: 10px; }
        .chart-container { display: flex; justify-content: center; padding: 10px; }
        svg { max-width: 100%; height: auto; }
        .tooltip {
            position: absolute; background: rgba(254,250,224,0.95);
            border: 1px solid #8A9A5B; border-radius: 8px;
            padding: 10px 14px; font-size: 0.85rem; pointer-events: none;
            opacity: 0; transition: opacity 0.2s; color: #606C38;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Gallery</a>
    <h1>Global Trade Chord Diagram</h1>
    <p class="subtitle">Bilateral trade flows between top 10 economies (~2022, $B) — hover to explore</p>
    <div class="chart-container">
        <svg id="chart"></svg>
    </div>
    <div class="tooltip" id="tooltip"></div>

<script>
// Top 10 economies and approximate bilateral trade matrix (2022, $B)
// Rows = exports FROM, Columns = exports TO
const names = ['US', 'China', 'Japan', 'Germany', 'UK', 'France', 'India', 'Italy', 'Canada', 'S. Korea'];
const colors = ['#4393c3', '#d6604d', '#8A9A5B', '#DDA15E', '#BC6C25', '#8073ac', '#66c2a5', '#fc8d62', '#e78ac3', '#a6d854'];

// Trade matrix (approximate bilateral goods trade, $B)
const matrix = [
//  US    CN    JP    DE    UK    FR    IN    IT    CA    KR
    [0,   155,  75,   73,   67,   37,   40,   28,   310,  65],   // US exports to
    [536,  0,   142,  110,  72,   37,   118,  57,   38,   163],  // China exports to
    [135,  130,  0,   21,   13,   7,    12,   6,    11,   53],   // Japan exports to
    [145,  107,  26,   0,    80,   120,  20,   80,   12,   16],  // Germany exports to
    [58,   26,   12,   48,   0,    34,   9,    15,   12,   7],   // UK exports to
    [43,   23,   8,    82,   37,   0,    8,    42,   5,    5],   // France exports to
    [80,   18,   5,    11,   12,   7,    0,    6,    4,    8],   // India exports to
    [60,   17,   5,    68,   26,   55,   8,    0,    4,    5],   // Italy exports to
    [335,  25,   11,   5,    16,   5,    4,    3,    0,    5],   // Canada exports to
    [88,   162,  30,   10,   7,    5,    15,   5,    5,    0],   // S. Korea exports to
];

const width = 700, height = 700;
const outerRadius = Math.min(width, height) / 2 - 60;
const innerRadius = outerRadius - 25;

const svg = d3.select('#chart')
    .attr('width', width).attr('height', height)
    .attr('viewBox', `0 0 ${width} ${height}`);

const g = svg.append('g').attr('transform', `translate(${width/2},${height/2})`);
const tooltip = d3.select('#tooltip');

const chord = d3.chord()
    .padAngle(0.04)
    .sortSubgroups(d3.descending)
    .sortChords(d3.descending);

const chords = chord(matrix);

const arc = d3.arc()
    .innerRadius(innerRadius)
    .outerRadius(outerRadius);

const ribbon = d3.ribbon()
    .radius(innerRadius - 2);

// Draw ribbons
const ribbons = g.append('g')
    .selectAll('path')
    .data(chords)
    .enter().append('path')
    .attr('d', ribbon)
    .attr('fill', d => colors[d.source.index])
    .attr('stroke', d => d3.rgb(colors[d.source.index]).darker(0.3))
    .attr('stroke-width', 0.5)
    .attr('opacity', 0.55)
    .style('cursor', 'pointer')
    .on('mouseenter', function(event, d) {
        ribbons.attr('opacity', 0.1);
        d3.select(this).attr('opacity', 0.85);
        const src = names[d.source.index];
        const tgt = names[d.target.index];
        tooltip.style('opacity', 1)
            .html(`<strong>${src} → ${tgt}:</strong> $${d.source.value}B<br><strong>${tgt} → ${src}:</strong> $${d.target.value}B`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 14) + 'px')
            .style('top', (event.pageY - 30) + 'px');
    })
    .on('mouseleave', function() {
        ribbons.attr('opacity', 0.55);
        tooltip.style('opacity', 0);
    });

// Draw arcs (country groups)
const arcs = g.append('g')
    .selectAll('g')
    .data(chords.groups)
    .enter().append('g');

arcs.append('path')
    .attr('d', arc)
    .attr('fill', d => colors[d.index])
    .attr('stroke', '#FEFAE0')
    .attr('stroke-width', 1.5)
    .style('cursor', 'pointer')
    .on('mouseenter', function(event, d) {
        ribbons.attr('opacity', r =>
            (r.source.index === d.index || r.target.index === d.index) ? 0.85 : 0.05);
        const total = d3.sum(matrix[d.index]) + d3.sum(matrix.map(row => row[d.index]));
        tooltip.style('opacity', 1)
            .html(`<strong>${names[d.index]}</strong><br>Total trade: $${total}B`);
    })
    .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 14) + 'px')
            .style('top', (event.pageY - 30) + 'px');
    })
    .on('mouseleave', function() {
        ribbons.attr('opacity', 0.55);
        tooltip.style('opacity', 0);
    });

// Country labels
arcs.append('text')
    .each(function(d) { d.angle = (d.startAngle + d.endAngle) / 2; })
    .attr('transform', d => `rotate(${(d.angle * 180 / Math.PI - 90)}) translate(${outerRadius + 10}) ${d.angle > Math.PI ? 'rotate(180)' : ''}`)
    .attr('text-anchor', d => d.angle > Math.PI ? 'end' : 'start')
    .attr('fill', '#606C38')
    .attr('font-size', '12px')
    .attr('font-family', 'Nunito')
    .attr('font-weight', 600)
    .text(d => names[d.index]);
</script>
</body>
</html>
