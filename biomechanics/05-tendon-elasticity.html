<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tendon Elasticity &amp; Energy Storage - Biomechanics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 16px 24px; display: flex; gap: 20px;
            align-items: center; color: #FEFAE0; font-size: 0.85rem; z-index: 100;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls label { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        #controls input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        #info {
            position: fixed; top: 60px; right: 20px;
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 14px 18px; color: #FEFAE0;
            font-size: 0.8rem; z-index: 100; max-width: 250px; line-height: 1.5;
            border: 1px solid rgba(138,154,91,0.3);
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <div id="info">
        <strong style="color:#8A9A5B">Tendon Energy Storage</strong><br>
        Tendons act like biological springs, storing ~93% of stretch energy and returning it during recoil.<br><br>
        The Achilles tendon stores 7-11 J during each stride, saving ~35% of running energy costs.
    </div>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <label>Speed<input type="range" id="speed" min="0.2" max="3" step="0.1" value="1"><span id="speed-val">1.0x</span></label>
        <label>Stiffness<input type="range" id="stiffness" min="0.5" max="3" step="0.1" value="1.5"><span id="stiff-val">1.5</span></label>
        <label>Load (BW)<input type="range" id="load" min="1" max="5" step="0.5" value="2.5"><span id="load-val">2.5</span></label>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let speed = 1, stiffness = 1.5, loadBW = 2.5;
        let time = 0;
        let energyHistory = [];

        document.getElementById('speed').oninput = e => { speed = +e.target.value; document.getElementById('speed-val').textContent = speed.toFixed(1) + 'x'; };
        document.getElementById('stiffness').oninput = e => { stiffness = +e.target.value; document.getElementById('stiff-val').textContent = stiffness.toFixed(1); };
        document.getElementById('load').oninput = e => { loadBW = +e.target.value; document.getElementById('load-val').textContent = loadBW.toFixed(1); };

        function drawSpring(x1, y1, x2, y2, coils, amplitude, color, lineWidth) {
            const dx = x2 - x1, dy = y2 - y1;
            const len = Math.sqrt(dx * dx + dy * dy);
            const nx = -dy / len, ny = dx / len;

            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.beginPath();
            ctx.moveTo(x1, y1);

            const segments = coils * 4;
            for (let i = 1; i <= segments; i++) {
                const t = i / segments;
                const px = x1 + dx * t;
                const py = y1 + dy * t;
                const wave = Math.sin(t * coils * Math.PI * 2) * amplitude;
                ctx.lineTo(px + nx * wave, py + ny * wave);
            }
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        function drawMuscle(x, y1, y2, activation, width) {
            const midY = (y1 + y2) / 2;
            const bulge = width * (0.5 + activation * 0.5);

            ctx.fillStyle = `rgba(188,108,37,${0.3 + activation * 0.5})`;
            ctx.beginPath();
            ctx.moveTo(x - width * 0.3, y1);
            ctx.bezierCurveTo(
                x - bulge, y1 + (midY - y1) * 0.5,
                x - bulge, midY + (y2 - midY) * 0.5,
                x - width * 0.3, y2
            );
            ctx.lineTo(x + width * 0.3, y2);
            ctx.bezierCurveTo(
                x + bulge, midY + (y2 - midY) * 0.5,
                x + bulge, y1 + (midY - y1) * 0.5,
                x + width * 0.3, y1
            );
            ctx.closePath();
            ctx.fill();

            // Striations
            ctx.strokeStyle = `rgba(254,250,224,${activation * 0.3})`;
            ctx.lineWidth = 0.5;
            for (let i = 0.2; i < 0.8; i += 0.1) {
                const sy = y1 + (y2 - y1) * i;
                const sw = bulge * Math.sin(i * Math.PI);
                ctx.beginPath();
                ctx.moveTo(x - sw * 0.8, sy);
                ctx.lineTo(x + sw * 0.8, sy);
                ctx.stroke();
            }
        }

        function drawEnergyBar(x, y, w, h, stored, returned, maxEnergy) {
            ctx.fillStyle = 'rgba(20,20,50,0.7)';
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Energy (Joules)', x + w / 2, y + 15);

            const barW = w - 40, barH = 18;
            const barX = x + 20, barY = y + 25;

            // Stored energy
            ctx.fillStyle = 'rgba(138,154,91,0.2)';
            ctx.fillRect(barX, barY, barW, barH);
            ctx.fillStyle = '#8A9A5B';
            ctx.fillRect(barX, barY, barW * Math.min(1, stored / maxEnergy), barH);
            ctx.fillStyle = '#FEFAE0';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`Stored: ${stored.toFixed(1)} J`, barX + 5, barY + 13);

            // Returned energy
            ctx.fillStyle = 'rgba(221,161,94,0.2)';
            ctx.fillRect(barX, barY + 25, barW, barH);
            ctx.fillStyle = '#DDA15E';
            ctx.fillRect(barX, barY + 25, barW * Math.min(1, returned / maxEnergy), barH);
            ctx.fillStyle = '#FEFAE0';
            ctx.fillText(`Returned: ${returned.toFixed(1)} J (93%)`, barX + 5, barY + 38);

            // Dissipated
            const dissipated = stored - returned;
            ctx.fillStyle = 'rgba(188,108,37,0.2)';
            ctx.fillRect(barX, barY + 50, barW, barH);
            ctx.fillStyle = '#BC6C25';
            ctx.fillRect(barX, barY + 50, barW * Math.min(1, dissipated / maxEnergy), barH);
            ctx.fillStyle = '#FEFAE0';
            ctx.fillText(`Heat: ${dissipated.toFixed(1)} J (7%)`, barX + 5, barY + 63);
        }

        function drawForceStrainCurve(x, y, w, h, currentStrain) {
            ctx.fillStyle = 'rgba(20,20,50,0.7)';
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Force-Strain Curve', x + w / 2, y + 15);

            const gx = x + 40, gy = y + 25, gw = w - 55, gh = h - 45;

            // Axes
            ctx.strokeStyle = 'rgba(254,250,224,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(gx, gy); ctx.lineTo(gx, gy + gh); ctx.lineTo(gx + gw, gy + gh);
            ctx.stroke();

            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Strain (%)', gx + gw / 2, gy + gh + 12);

            // Loading curve (nonlinear)
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i <= 50; i++) {
                const strain = i / 50 * 0.08;
                const force = stiffness * strain * strain * 500;
                const px = gx + (strain / 0.08) * gw;
                const py = gy + gh - Math.min(force / 4, gh);
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.stroke();

            // Unloading curve (hysteresis - 7% lower)
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 3]);
            ctx.beginPath();
            for (let i = 50; i >= 0; i--) {
                const strain = i / 50 * 0.08;
                const force = stiffness * strain * strain * 500 * 0.93;
                const px = gx + (strain / 0.08) * gw;
                const py = gy + gh - Math.min(force / 4, gh);
                if (i === 50) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.stroke();
            ctx.setLineDash([]);

            // Current point
            const cs = Math.abs(currentStrain);
            const cf = stiffness * cs * cs * 500;
            const cpx = gx + (cs / 0.08) * gw;
            const cpy = gy + gh - Math.min(cf / 4, gh);
            ctx.fillStyle = '#DDA15E';
            ctx.beginPath();
            ctx.arc(cpx, cpy, 5, 0, Math.PI * 2);
            ctx.fill();

            // Hysteresis area label
            ctx.fillStyle = 'rgba(188,108,37,0.15)';
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('Hysteresis = 7% energy loss', gx + 5, gy + 12);
        }

        let lastTime = 0;
        function animate(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
            lastTime = timestamp;
            time += dt * speed;

            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            // Simulate gait cycle loading
            const cyclePhase = (time * 1.5) % 1;
            const groundContact = cyclePhase < 0.62;

            // Tendon strain during stance
            let strain = 0;
            if (groundContact) {
                const stanceProgress = cyclePhase / 0.62;
                // Double-hump loading pattern
                strain = loadBW * (Math.sin(stanceProgress * Math.PI) * 0.7 +
                    Math.sin(stanceProgress * Math.PI * 2) * 0.3) * 0.04;
            }

            const storedEnergy = 0.5 * stiffness * strain * strain * 5000;
            const returnedEnergy = storedEnergy * 0.93;
            const activation = groundContact ? Math.sin(cyclePhase / 0.62 * Math.PI) : 0;

            // Center layout
            const cx = W * 0.4;
            const baseY = H * 0.25;
            const tendonLen = 200;
            const stretchAmount = strain * tendonLen * 10;

            // Labels
            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Achilles Tendon - Muscle-Tendon Unit', cx, baseY - 30);

            // Bone (top - calcaneus)
            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            ctx.fillRect(cx - 15, baseY - 20, 30, 20);
            ctx.fillStyle = 'rgba(254,250,224,0.6)';
            ctx.font = '10px sans-serif';
            ctx.fillText('Calcaneus', cx, baseY - 25);

            // Tendon (spring)
            const tendonEndY = baseY + tendonLen * 0.4 + stretchAmount;
            drawSpring(cx, baseY, cx, tendonEndY, 12, 8 + strain * 80,
                `rgba(138,154,91,${0.5 + strain * 8})`, 2);

            ctx.fillStyle = '#8A9A5B';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('Tendon', cx + 15, baseY + tendonLen * 0.2);

            // Muscle belly
            const muscleEndY = tendonEndY + tendonLen * 0.35;
            drawMuscle(cx, tendonEndY, muscleEndY, activation, 25);

            ctx.fillStyle = '#BC6C25';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('Gastrocnemius', cx + 35, (tendonEndY + muscleEndY) / 2);

            // Lower tendon
            const lowerTendonEnd = muscleEndY + tendonLen * 0.25;
            drawSpring(cx, muscleEndY, cx, lowerTendonEnd, 6, 5, 'rgba(138,154,91,0.4)', 1.5);

            // Bone (bottom)
            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            ctx.fillRect(cx - 15, lowerTendonEnd, 30, 20);
            ctx.fillStyle = 'rgba(254,250,224,0.6)';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Femur', cx, lowerTendonEnd + 35);

            // Strain indicator
            if (strain > 0.001) {
                ctx.strokeStyle = '#DDA15E';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 3]);
                ctx.beginPath();
                ctx.moveTo(cx + 50, baseY);
                ctx.lineTo(cx + 70, baseY);
                ctx.moveTo(cx + 50, baseY + stretchAmount);
                ctx.lineTo(cx + 70, baseY + stretchAmount);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(cx + 60, baseY);
                ctx.lineTo(cx + 60, baseY + stretchAmount);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.fillStyle = '#DDA15E';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`Strain: ${(strain * 100).toFixed(1)}%`, cx + 75, baseY + stretchAmount / 2);
            }

            // Phase indicator
            ctx.fillStyle = groundContact ? '#8A9A5B' : '#606C38';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(groundContact ? 'STANCE (Loading)' : 'SWING (Unloaded)',
                cx, lowerTendonEnd + 55);

            // Energy bars
            const maxE = loadBW * 2 * 0.04 * 0.04 * 5000 * 0.5 * stiffness;
            drawEnergyBar(W * 0.65, H * 0.08, Math.min(280, W * 0.3), 110, storedEnergy, returnedEnergy, Math.max(maxE, 1));

            // Force-strain curve
            drawForceStrainCurve(W * 0.65, H * 0.35, Math.min(280, W * 0.3), 180, strain);

            // Energy timeline
            energyHistory.push(storedEnergy);
            if (energyHistory.length > 200) energyHistory.shift();

            const tlX = W * 0.65, tlY = H * 0.7, tlW = Math.min(280, W * 0.3), tlH = 80;
            ctx.fillStyle = 'rgba(20,20,50,0.7)';
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(tlX, tlY, tlW, tlH, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Energy Over Time', tlX + tlW / 2, tlY + 15);

            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            energyHistory.forEach((e, i) => {
                const ex = tlX + 5 + (i / 200) * (tlW - 10);
                const ey = tlY + tlH - 5 - (e / Math.max(maxE, 1)) * (tlH - 25);
                if (i === 0) ctx.moveTo(ex, ey); else ctx.lineTo(ex, ey);
            });
            ctx.stroke();

            requestAnimationFrame(animate);
        }

        window.reset = function() {
            time = 0; speed = 1; stiffness = 1.5; loadBW = 2.5;
            energyHistory = [];
            document.getElementById('speed').value = 1;
            document.getElementById('stiffness').value = 1.5;
            document.getElementById('load').value = 2.5;
            document.getElementById('speed-val').textContent = '1.0x';
            document.getElementById('stiff-val').textContent = '1.5';
            document.getElementById('load-val').textContent = '2.5';
        };

        requestAnimationFrame(animate);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
