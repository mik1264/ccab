<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hill Muscle Model - Biomechanics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 16px 24px; display: flex; gap: 20px;
            align-items: center; color: #FEFAE0; font-size: 0.85rem; z-index: 100;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls label { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        #controls input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        #info {
            position: fixed; top: 60px; right: 20px;
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 14px 18px; color: #FEFAE0;
            font-size: 0.8rem; z-index: 100; max-width: 250px; line-height: 1.5;
            border: 1px solid rgba(138,154,91,0.3);
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <div id="info">
        <strong style="color:#8A9A5B">Hill's Muscle Model</strong><br>
        Three elements: Contractile Element (CE), Series Elastic (SE), Parallel Elastic (PE).<br><br>
        Force depends on muscle length, contraction velocity, and activation level.
    </div>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <label>Activation<input type="range" id="activation" min="0" max="1" step="0.05" value="1"><span id="act-val">100%</span></label>
        <label>Length (L/L0)<input type="range" id="length" min="0.5" max="1.5" step="0.02" value="1"><span id="len-val">1.00</span></label>
        <label>Velocity<input type="range" id="velocity" min="-1" max="1" step="0.05" value="0"><span id="vel-val">0.00</span></label>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let activation = 1, muscleLength = 1, velocity = 0;

        document.getElementById('activation').oninput = e => { activation = +e.target.value; document.getElementById('act-val').textContent = Math.round(activation * 100) + '%'; };
        document.getElementById('length').oninput = e => { muscleLength = +e.target.value; document.getElementById('len-val').textContent = muscleLength.toFixed(2); };
        document.getElementById('velocity').oninput = e => { velocity = +e.target.value; document.getElementById('vel-val').textContent = velocity.toFixed(2); };

        // Hill model functions
        function forceLengthActive(l) {
            // Gaussian-like active force-length curve, peak at l=1
            return Math.exp(-((l - 1) * (l - 1)) / (2 * 0.1));
        }

        function forceLengthPassive(l) {
            // Exponential passive force-length
            if (l <= 1) return 0;
            return 0.5 * (Math.exp(5 * (l - 1)) - 1) / (Math.exp(5 * 0.5) - 1);
        }

        function forceVelocity(v) {
            // Hill's hyperbolic force-velocity
            const a = 0.25, b = 0.25;
            if (v <= 0) {
                // Concentric (shortening)
                return (1 + v / b) / (1 - v / (a * b));
            } else {
                // Eccentric (lengthening)
                return 1.5 - 0.5 / (1 + v / (0.1));
            }
        }

        function drawGraph(x, y, w, h, title, func, paramRange, currentVal, color, xlabel, ylabel) {
            // Background
            ctx.fillStyle = 'rgba(20,20,50,0.7)';
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.stroke();

            // Title
            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(title, x + w / 2, y + 20);

            const gx = x + 50, gy = y + 35, gw = w - 70, gh = h - 70;

            // Axes
            ctx.strokeStyle = 'rgba(254,250,224,0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(gx, gy); ctx.lineTo(gx, gy + gh);
            ctx.lineTo(gx + gw, gy + gh);
            ctx.stroke();

            // Labels
            ctx.fillStyle = 'rgba(254,250,224,0.6)';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(xlabel, gx + gw / 2, gy + gh + 20);
            ctx.save();
            ctx.translate(gx - 25, gy + gh / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText(ylabel, 0, 0);
            ctx.restore();

            // Tick marks
            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'center';
            for (let i = 0; i <= 4; i++) {
                const val = paramRange[0] + (paramRange[1] - paramRange[0]) * i / 4;
                const px = gx + (i / 4) * gw;
                ctx.fillText(val.toFixed(1), px, gy + gh + 12);
            }

            // Curve
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            let maxVal = 0;
            const samples = [];
            for (let i = 0; i <= 100; i++) {
                const t = i / 100;
                const param = paramRange[0] + t * (paramRange[1] - paramRange[0]);
                const val = func(param);
                samples.push(val);
                if (Math.abs(val) > maxVal) maxVal = Math.abs(val);
            }
            maxVal = Math.max(maxVal, 1.5);

            for (let i = 0; i <= 100; i++) {
                const px = gx + (i / 100) * gw;
                const py = gy + gh - (samples[i] / maxVal) * gh;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();

            // Y axis labels
            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            ctx.textAlign = 'right';
            ctx.fillText('0', gx - 5, gy + gh + 3);
            ctx.fillText(maxVal.toFixed(1), gx - 5, gy + 5);

            // Current value marker
            const t = (currentVal - paramRange[0]) / (paramRange[1] - paramRange[0]);
            const markerX = gx + t * gw;
            const markerVal = func(currentVal);
            const markerY = gy + gh - (markerVal / maxVal) * gh;

            ctx.fillStyle = '#DDA15E';
            ctx.beginPath();
            ctx.arc(markerX, markerY, 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`F = ${markerVal.toFixed(2)}`, markerX + 10, markerY - 5);

            return markerVal;
        }

        function drawMuscleSchematic(x, y, w, h, totalForce) {
            ctx.fillStyle = 'rgba(20,20,50,0.7)';
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 13px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Muscle Schematic', x + w / 2, y + 20);

            const cx = x + w / 2, cy = y + h / 2 + 10;
            const mLen = w * 0.6 * muscleLength;

            // Tendon (left)
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx - mLen / 2 - 40, cy);
            ctx.lineTo(cx - mLen / 2, cy);
            ctx.stroke();
            ctx.fillStyle = '#DDA15E';
            ctx.font = '10px sans-serif';
            ctx.fillText('Tendon', cx - mLen / 2 - 20, cy - 10);

            // Contractile Element (zigzag)
            ctx.strokeStyle = `rgba(138,154,91,${0.3 + activation * 0.7})`;
            ctx.lineWidth = 2;
            const ceStart = cx - mLen / 4;
            const ceEnd = cx + mLen / 4;
            const zigN = 8;
            ctx.beginPath();
            ctx.moveTo(cx - mLen / 2, cy);
            ctx.lineTo(ceStart, cy);
            for (let i = 0; i < zigN; i++) {
                const zx = ceStart + ((ceEnd - ceStart) / zigN) * (i + 0.5);
                const zy = cy + (i % 2 === 0 ? -12 : 12);
                ctx.lineTo(zx, zy);
            }
            ctx.lineTo(ceEnd, cy);
            ctx.stroke();

            ctx.fillStyle = '#8A9A5B';
            ctx.font = '10px sans-serif';
            ctx.fillText('CE', (ceStart + ceEnd) / 2, cy - 20);

            // Series Elastic (spring)
            ctx.strokeStyle = '#BC6C25';
            ctx.lineWidth = 2;
            const seStart = ceEnd;
            const seEnd = cx + mLen / 2;
            const springN = 6;
            ctx.beginPath();
            ctx.moveTo(seStart, cy);
            for (let i = 0; i < springN; i++) {
                const sx = seStart + ((seEnd - seStart) / springN) * (i + 0.5);
                const sy = cy + (i % 2 === 0 ? -8 : 8);
                ctx.lineTo(sx, sy);
            }
            ctx.lineTo(seEnd, cy);
            ctx.stroke();

            ctx.fillStyle = '#BC6C25';
            ctx.fillText('SE', (seStart + seEnd) / 2, cy - 15);

            // Parallel Elastic (parallel spring below)
            ctx.strokeStyle = 'rgba(221,161,94,0.5)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(cx - mLen / 2, cy + 25);
            for (let i = 0; i < 10; i++) {
                const sx = cx - mLen / 2 + (mLen / 10) * (i + 0.5);
                const sy = cy + 25 + (i % 2 === 0 ? -5 : 5);
                ctx.lineTo(sx, sy);
            }
            ctx.lineTo(cx + mLen / 2, cy + 25);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = 'rgba(221,161,94,0.6)';
            ctx.fillText('PE', cx, cy + 42);

            // Tendon (right)
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx + mLen / 2, cy);
            ctx.lineTo(cx + mLen / 2 + 40, cy);
            ctx.stroke();
            ctx.fillStyle = '#DDA15E';
            ctx.fillText('Tendon', cx + mLen / 2 + 20, cy - 10);

            // Force output
            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText(`Total Force: ${totalForce.toFixed(2)} F₀`, cx, y + h - 15);
        }

        function animate() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const margin = 20;
            const graphW = Math.min(350, (W - margin * 4) / 3);
            const graphH = Math.min(250, H * 0.4);
            const startX = (W - graphW * 3 - margin * 2) / 2;
            const graphY = margin + 40;

            // Force-Length (Active)
            const fla = drawGraph(startX, graphY, graphW, graphH,
                'Force-Length (Active)', forceLengthActive, [0.5, 1.5],
                muscleLength, '#8A9A5B', 'L / L₀', 'Force / F₀');

            // Force-Length (Passive)
            const flp = drawGraph(startX + graphW + margin, graphY, graphW, graphH,
                'Force-Length (Passive)', forceLengthPassive, [0.5, 1.5],
                muscleLength, '#DDA15E', 'L / L₀', 'Force / F₀');

            // Force-Velocity
            const fv = drawGraph(startX + (graphW + margin) * 2, graphY, graphW, graphH,
                'Force-Velocity', forceVelocity, [-1, 1],
                velocity, '#BC6C25', 'Velocity', 'Force / F₀');

            // Total force
            const totalForce = activation * fla * Math.max(0, fv) + flp;

            // Muscle schematic
            const schematicW = Math.min(600, W - margin * 2);
            const schematicH = Math.min(180, H * 0.25);
            const schematicX = (W - schematicW) / 2;
            const schematicY = graphY + graphH + margin;

            drawMuscleSchematic(schematicX, schematicY, schematicW, schematicH, totalForce);

            requestAnimationFrame(animate);
        }

        window.reset = function() {
            activation = 1; muscleLength = 1; velocity = 0;
            document.getElementById('activation').value = 1;
            document.getElementById('length').value = 1;
            document.getElementById('velocity').value = 0;
            document.getElementById('act-val').textContent = '100%';
            document.getElementById('len-val').textContent = '1.00';
            document.getElementById('vel-val').textContent = '0.00';
        };

        requestAnimationFrame(animate);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
