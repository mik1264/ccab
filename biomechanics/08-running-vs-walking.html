<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running vs Walking Gait - Biomechanics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 16px 24px; display: flex; gap: 20px;
            align-items: center; color: #FEFAE0; font-size: 0.85rem; z-index: 100;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls label { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        #controls input[type="range"] { width: 100px; accent-color: #8A9A5B; }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <label>Speed<input type="range" id="speed" min="0.2" max="3" step="0.1" value="1"><span id="speed-val">1.0x</span></label>
        <label>Leg Length<input type="range" id="legLen" min="50" max="120" step="5" value="80"><span id="legLen-val">80</span></label>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let speed = 1, legLen = 80;
        let time = 0;
        let walkTrail = [], runTrail = [];

        document.getElementById('speed').oninput = e => { speed = +e.target.value; document.getElementById('speed-val').textContent = speed.toFixed(1) + 'x'; };
        document.getElementById('legLen').oninput = e => { legLen = +e.target.value; document.getElementById('legLen-val').textContent = legLen; };

        function getWalkLeg(t, isRight) {
            const phase = isRight ? t : (t + 0.5) % 1;
            const thighLen = legLen * 0.5;
            const shinLen = legLen * 0.5;

            let hipAngle, kneeAngle;
            if (phase < 0.6) {
                const sp = phase / 0.6;
                hipAngle = 0.2 - sp * 0.35;
                kneeAngle = Math.sin(sp * Math.PI) * 0.12;
            } else {
                const sp = (phase - 0.6) / 0.4;
                hipAngle = -0.15 + sp * 0.35;
                kneeAngle = Math.sin(sp * Math.PI) * 0.7;
            }

            return { hipAngle, kneeAngle, thighLen, shinLen, inStance: phase < 0.6 };
        }

        function getRunLeg(t, isRight) {
            const phase = isRight ? t : (t + 0.5) % 1;
            const thighLen = legLen * 0.5;
            const shinLen = legLen * 0.5;

            let hipAngle, kneeAngle;
            if (phase < 0.35) {
                // Stance (shorter in running)
                const sp = phase / 0.35;
                hipAngle = 0.3 - sp * 0.5;
                kneeAngle = Math.sin(sp * Math.PI) * 0.25;
            } else {
                // Swing (longer, higher knee lift)
                const sp = (phase - 0.35) / 0.65;
                hipAngle = -0.2 + sp * 0.5;
                kneeAngle = Math.sin(sp * Math.PI) * 1.2;
            }

            return { hipAngle, kneeAngle, thighLen, shinLen, inStance: phase < 0.35 };
        }

        function drawFigure(cx, baseY, t, getLeg, label, color, yBounce) {
            const headR = legLen * 0.12;
            const torsoLen = legLen * 0.45;

            // Vertical bounce
            const bounce = yBounce;
            const hipY = baseY - bounce;

            // Draw legs
            for (let side = 0; side < 2; side++) {
                const isRight = side === 0;
                const leg = getLeg(t, isRight);
                const alpha = isRight ? 1 : 0.5;

                const kneeX = cx + Math.sin(leg.hipAngle) * leg.thighLen;
                const kneeY = hipY + Math.cos(leg.hipAngle) * leg.thighLen;
                const footAngle = leg.hipAngle + leg.kneeAngle;
                const footX = kneeX + Math.sin(footAngle) * leg.shinLen;
                const footY = kneeY + Math.cos(footAngle) * leg.shinLen;

                ctx.strokeStyle = leg.inStance ?
                    `rgba(138,154,91,${alpha})` : `rgba(221,161,94,${alpha})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(cx, hipY);
                ctx.lineTo(kneeX, kneeY);
                ctx.lineTo(footX, footY);
                ctx.stroke();

                // Foot
                ctx.beginPath();
                ctx.moveTo(footX, footY);
                ctx.lineTo(footX + 8, footY + 2);
                ctx.stroke();

                ctx.fillStyle = `rgba(254,250,224,${alpha})`;
                ctx.beginPath(); ctx.arc(kneeX, kneeY, 3, 0, Math.PI * 2); ctx.fill();
            }

            // Arms
            for (let side = 0; side < 2; side++) {
                const armSwing = Math.sin((t + (side === 0 ? 0 : 0.5)) * Math.PI * 2) * 0.35;
                const shoulderY = hipY - torsoLen;
                ctx.strokeStyle = side === 0 ? 'rgba(254,250,224,0.7)' : 'rgba(254,250,224,0.35)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(cx, shoulderY);
                ctx.lineTo(cx + Math.sin(armSwing) * legLen * 0.35,
                          shoulderY + Math.cos(armSwing) * legLen * 0.35);
                ctx.stroke();
            }

            // Torso
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx, hipY);
            ctx.lineTo(cx, hipY - torsoLen);
            ctx.stroke();

            // Head
            ctx.fillStyle = '#FEFAE0';
            ctx.beginPath();
            ctx.arc(cx, hipY - torsoLen - headR - 3, headR, 0, Math.PI * 2);
            ctx.fill();

            // Hip dot
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(cx, hipY, 5, 0, Math.PI * 2); ctx.fill();

            // Label
            ctx.fillStyle = color;
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(label, cx, baseY + legLen + 30);

            return { comX: cx, comY: hipY - torsoLen * 0.4 };
        }

        function drawGRFComparison(x, y, w, h, walkPhase, runPhase) {
            ctx.fillStyle = 'rgba(20,20,50,0.7)';
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Ground Reaction Force (GRF)', x + w / 2, y + 15);

            const gx = x + 40, gy = y + 25, gw = w - 55, gh = h - 45;

            ctx.strokeStyle = 'rgba(254,250,224,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(gx, gy + gh); ctx.lineTo(gx + gw, gy + gh);
            ctx.moveTo(gx, gy); ctx.lineTo(gx, gy + gh);
            ctx.stroke();

            // 1 BW line
            ctx.setLineDash([3, 3]);
            ctx.strokeStyle = 'rgba(254,250,224,0.2)';
            ctx.beginPath();
            ctx.moveTo(gx, gy + gh * 0.6);
            ctx.lineTo(gx + gw, gy + gh * 0.6);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(254,250,224,0.3)';
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText('1 BW', gx - 3, gy + gh * 0.6 + 3);
            ctx.fillText('2.5 BW', gx - 3, gy + 5);

            // Walk GRF - double hump
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i <= 100; i++) {
                const t = i / 100;
                let grf = 0;
                if (t < 0.6) {
                    const sp = t / 0.6;
                    grf = (Math.sin(sp * Math.PI) + Math.sin(sp * Math.PI * 2) * 0.2) * 1.2;
                }
                const px = gx + t * gw;
                const py = gy + gh - grf / 2.5 * gh;
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.stroke();

            // Run GRF - single sharp peak
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i <= 100; i++) {
                const t = i / 100;
                let grf = 0;
                if (t < 0.35) {
                    const sp = t / 0.35;
                    grf = Math.sin(sp * Math.PI) * 2.5;
                }
                const px = gx + t * gw;
                const py = gy + gh - grf / 2.5 * gh;
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.stroke();

            // Phase markers
            ctx.strokeStyle = 'rgba(138,154,91,0.4)';
            ctx.lineWidth = 1;
            ctx.setLineDash([2, 2]);
            ctx.beginPath();
            ctx.moveTo(gx + walkPhase * gw, gy);
            ctx.lineTo(gx + walkPhase * gw, gy + gh);
            ctx.stroke();
            ctx.strokeStyle = 'rgba(221,161,94,0.4)';
            ctx.beginPath();
            ctx.moveTo(gx + runPhase * gw, gy);
            ctx.lineTo(gx + runPhase * gw, gy + gh);
            ctx.stroke();
            ctx.setLineDash([]);

            // Legend
            ctx.fillStyle = '#8A9A5B';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('Walk', gx + gw - 60, gy + 12);
            ctx.fillStyle = '#DDA15E';
            ctx.fillText('Run', gx + gw - 25, gy + 12);
        }

        function drawInfoPanel(x, y, w, h) {
            ctx.fillStyle = 'rgba(20,20,50,0.7)';
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Key Differences', x + w / 2, y + 18);

            const items = [
                { label: 'Stance phase', walk: '60%', run: '35%' },
                { label: 'Double support', walk: 'Yes (20%)', run: 'No (flight)' },
                { label: 'Peak GRF', walk: '1.2 BW', run: '2.5 BW' },
                { label: 'COM motion', walk: 'Pendulum arc', run: 'Spring bounce' },
                { label: 'Energy mech.', walk: 'PE ↔ KE', run: 'Elastic recoil' },
            ];

            ctx.font = '10px sans-serif';
            items.forEach((item, i) => {
                const iy = y + 35 + i * 22;
                ctx.fillStyle = 'rgba(254,250,224,0.6)';
                ctx.textAlign = 'left';
                ctx.fillText(item.label, x + 10, iy);
                ctx.fillStyle = '#8A9A5B';
                ctx.textAlign = 'center';
                ctx.fillText(item.walk, x + w * 0.55, iy);
                ctx.fillStyle = '#DDA15E';
                ctx.fillText(item.run, x + w * 0.82, iy);
            });

            // Column headers
            ctx.font = 'bold 10px sans-serif';
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText('Walk', x + w * 0.55, y + 30);
            ctx.fillStyle = '#DDA15E';
            ctx.fillText('Run', x + w * 0.82, y + 30);
        }

        let lastTime = 0;
        function animate(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
            lastTime = timestamp;
            time += dt * speed * 0.7;

            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const walkT = (time * 0.8) % 1;  // Walking is slower
            const runT = (time * 1.4) % 1;   // Running is faster

            const walkCX = W * 0.25;
            const runCX = W * 0.55;
            const baseY = H * 0.45;
            const groundY = baseY + legLen + 5;

            // Ground
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, groundY); ctx.lineTo(W, groundY);
            ctx.stroke();

            // Walking bounce - inverted pendulum (highest at mid-stance)
            const walkBounce = Math.sin(walkT * Math.PI * 2) * 5;

            // Running bounce - spring mass (highest at mid-flight)
            const runPhaseT = runT;
            let runBounce = 0;
            if (runPhaseT < 0.35) {
                // Stance - compressed
                runBounce = -Math.sin(runPhaseT / 0.35 * Math.PI) * 8;
            } else {
                // Flight - airborne
                const flightT = (runPhaseT - 0.35) / 0.65;
                runBounce = Math.sin(flightT * Math.PI) * 15;
            }

            // Draw figures
            const walkCOM = drawFigure(walkCX, baseY, walkT, getWalkLeg, 'WALKING', '#8A9A5B', walkBounce);
            const runCOM = drawFigure(runCX, baseY, runT, getRunLeg, 'RUNNING', '#DDA15E', runBounce);

            // COM trails
            walkTrail.push({ x: walkCOM.comX, y: walkCOM.comY });
            runTrail.push({ x: runCOM.comX, y: runCOM.comY });
            if (walkTrail.length > 100) walkTrail.shift();
            if (runTrail.length > 100) runTrail.shift();

            // Divider
            ctx.strokeStyle = 'rgba(254,250,224,0.1)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(W * 0.4, 60);
            ctx.lineTo(W * 0.4, groundY);
            ctx.stroke();
            ctx.setLineDash([]);

            // Phase labels
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#8A9A5B';
            const walkPhaseLabel = walkT < 0.6 ? 'Stance (double support possible)' : 'Swing';
            ctx.fillText(walkPhaseLabel, walkCX, baseY - legLen - 30);

            ctx.fillStyle = '#DDA15E';
            const runPhaseLabel = runT < 0.35 ? 'Stance (single leg only)' : 'Flight Phase';
            ctx.fillText(runPhaseLabel, runCX, baseY - legLen - 30);

            // Title
            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Walking vs Running Biomechanics', W / 2, 35);

            // GRF comparison
            const grfW = Math.min(320, W * 0.3);
            drawGRFComparison(W - grfW - 20, H * 0.08, grfW, 180, walkT, runT);

            // Info panel
            drawInfoPanel(W - grfW - 20, H * 0.45, grfW, 160);

            requestAnimationFrame(animate);
        }

        window.reset = function() {
            time = 0; speed = 1; legLen = 80;
            walkTrail = []; runTrail = [];
            document.getElementById('speed').value = 1;
            document.getElementById('legLen').value = 80;
            document.getElementById('speed-val').textContent = '1.0x';
            document.getElementById('legLen-val').textContent = '80';
        };

        requestAnimationFrame(animate);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
