<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinal Loading &amp; Disc Compression - Biomechanics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 16px 24px; display: flex; gap: 20px;
            align-items: center; color: #FEFAE0; font-size: 0.85rem; z-index: 100;
            border: 1px solid rgba(138,154,91,0.3); flex-wrap: wrap; justify-content: center;
        }
        #controls label { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        #controls input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        #controls select {
            background: rgba(30,30,60,0.9); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 4px 8px; border-radius: 6px; font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <label>Posture
            <select id="posture">
                <option value="standing">Standing Upright</option>
                <option value="sitting">Sitting</option>
                <option value="slouch">Slouched Sitting</option>
                <option value="forward">Forward Bend</option>
                <option value="lifting">Lifting Load</option>
                <option value="squat">Squat Lift</option>
            </select>
        </label>
        <label>Body Mass (kg)<input type="range" id="mass" min="40" max="120" step="5" value="75"><span id="mass-val">75</span></label>
        <label>External Load (kg)<input type="range" id="extLoad" min="0" max="50" step="2" value="0"><span id="load-val">0</span></label>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let posture = 'standing', bodyMass = 75, extLoad = 0;

        document.getElementById('posture').onchange = e => posture = e.target.value;
        document.getElementById('mass').oninput = e => { bodyMass = +e.target.value; document.getElementById('mass-val').textContent = bodyMass; };
        document.getElementById('extLoad').oninput = e => { extLoad = +e.target.value; document.getElementById('load-val').textContent = extLoad; };

        // Posture data: trunk angle, load arm, disc compression multiplier
        const postureData = {
            standing:  { trunkAngle: 0,   armAngle: 0,   compressionMult: 1.0, shearMult: 0.1, label: 'Upright Standing' },
            sitting:   { trunkAngle: 5,   armAngle: 0,   compressionMult: 1.4, shearMult: 0.15, label: 'Seated Upright' },
            slouch:    { trunkAngle: 30,  armAngle: 0,   compressionMult: 1.85, shearMult: 0.25, label: 'Slouched Sitting' },
            forward:   { trunkAngle: 60,  armAngle: 30,  compressionMult: 2.7, shearMult: 0.35, label: 'Forward Bend 60°' },
            lifting:   { trunkAngle: 45,  armAngle: 60,  compressionMult: 3.5, shearMult: 0.4, label: 'Stoop Lifting' },
            squat:     { trunkAngle: 15,  armAngle: 20,  compressionMult: 1.8, shearMult: 0.2, label: 'Squat Lifting' }
        };

        function drawVertebra(cx, cy, width, height, angle, color, label, discPressure) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);

            // Vertebral body
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(-width / 2, -height / 2, width, height, 4);
            ctx.fill();

            ctx.strokeStyle = 'rgba(254,250,224,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(-width / 2, -height / 2, width, height, 4);
            ctx.stroke();

            // Spinous process
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(-5, -height / 2);
            ctx.lineTo(0, -height / 2 - 10);
            ctx.lineTo(5, -height / 2);
            ctx.closePath();
            ctx.fill();

            ctx.restore();

            // Label
            if (label) {
                ctx.fillStyle = 'rgba(254,250,224,0.5)';
                ctx.font = '9px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(label, cx - width / 2 - 8, cy + 4);
            }
        }

        function drawDisc(cx, cy, width, height, pressure, angle) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);

            const bulge = pressure * 3;

            // Nucleus pulposus
            const pressureColor = pressure < 0.5 ? '#8A9A5B' :
                                 pressure < 1.0 ? '#DDA15E' :
                                 pressure < 1.5 ? '#BC6C25' : '#C44536';

            ctx.fillStyle = pressureColor + '60';
            ctx.beginPath();
            ctx.ellipse(0, 0, width / 2 + bulge, height / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Annulus fibers
            ctx.strokeStyle = pressureColor;
            ctx.lineWidth = 1;
            for (let ring = 0; ring < 3; ring++) {
                const r = (ring + 1) / 3;
                ctx.beginPath();
                ctx.ellipse(0, 0, (width / 2 + bulge) * r, height / 2 * r, 0, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawSpine(cx, baseY, pd) {
            const numVertebrae = 7; // L5 to T12 simplified
            const vertebraW = 50;
            const vertebraH = 16;
            const discH = 8;
            const spacing = vertebraH + discH;

            const trunkRad = pd.trunkAngle * Math.PI / 180;
            const compression = pd.compressionMult + (extLoad / bodyMass) * pd.compressionMult * 0.5;
            const labels = ['L5', 'L4', 'L3', 'L2', 'L1', 'T12', 'T11'];

            for (let i = 0; i < numVertebrae; i++) {
                const t = i / (numVertebrae - 1);
                const angle = trunkRad * t * 0.7;
                const vx = cx - Math.sin(angle) * i * spacing;
                const vy = baseY - Math.cos(angle) * i * spacing;

                // Color based on load (L4-L5 bears most)
                const loadFactor = 1 - Math.abs(i - 1) * 0.1;
                const r = Math.min(255, 100 + compression * loadFactor * 40);
                const g = Math.max(80, 180 - compression * loadFactor * 30);
                const b = Math.max(50, 100 - compression * loadFactor * 20);
                const color = `rgb(${r},${g},${b})`;

                drawVertebra(vx, vy, vertebraW - i * 2, vertebraH, angle, color, labels[i],
                    compression * loadFactor);

                // Disc between vertebrae
                if (i < numVertebrae - 1) {
                    const nextAngle = trunkRad * (i + 1) / (numVertebrae - 1) * 0.7;
                    const midAngle = (angle + nextAngle) / 2;
                    const dx = (vx + cx - Math.sin(nextAngle) * (i + 1) * spacing) / 2;
                    const dy = (vy + baseY - Math.cos(nextAngle) * (i + 1) * spacing) / 2;

                    const discPressure = compression * loadFactor;
                    drawDisc(dx, dy, vertebraW - i * 2 - 2, discH,
                        discPressure / 3, midAngle);
                }
            }

            // Force arrows on L4-L5
            const l4y = baseY - spacing;
            const l4x = cx - Math.sin(trunkRad * 1 / 6 * 0.7) * spacing;

            // Compression force
            const compForce = compression * bodyMass * 9.81;
            const compLen = Math.min(compForce / 20, 120);

            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(l4x, l4y - 30);
            ctx.lineTo(l4x, l4y - 30 - compLen);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(l4x, l4y - 30);
            ctx.lineTo(l4x - 5, l4y - 40);
            ctx.moveTo(l4x, l4y - 30);
            ctx.lineTo(l4x + 5, l4y - 40);
            ctx.stroke();

            ctx.fillStyle = '#DDA15E';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`${compForce.toFixed(0)} N`, l4x + 10, l4y - 30 - compLen / 2);
            ctx.fillText('Compression', l4x + 10, l4y - 30 - compLen / 2 + 12);

            // Shear force
            const shearForce = pd.shearMult * bodyMass * 9.81 * (1 + extLoad / bodyMass);
            const shearLen = Math.min(shearForce / 10, 80);

            ctx.strokeStyle = '#BC6C25';
            ctx.beginPath();
            ctx.moveTo(l4x + 30, l4y);
            ctx.lineTo(l4x + 30 + shearLen, l4y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(l4x + 30 + shearLen, l4y);
            ctx.lineTo(l4x + 20 + shearLen, l4y - 5);
            ctx.moveTo(l4x + 30 + shearLen, l4y);
            ctx.lineTo(l4x + 20 + shearLen, l4y + 5);
            ctx.stroke();

            ctx.fillStyle = '#BC6C25';
            ctx.fillText(`${shearForce.toFixed(0)} N Shear`, l4x + 35 + shearLen, l4y - 5);

            return { compForce, shearForce, compression };
        }

        function drawPressureGauge(x, y, w, h, compression) {
            ctx.fillStyle = 'rgba(20,20,50,0.7)';
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Disc Pressure at L4/L5', x + w / 2, y + 20);

            // Pressure bar
            const maxComp = 5;
            const barX = x + 20, barY = y + 35, barW = w - 40, barH = 25;

            // Background gradient
            const grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
            grad.addColorStop(0, '#8A9A5B');
            grad.addColorStop(0.4, '#DDA15E');
            grad.addColorStop(0.7, '#BC6C25');
            grad.addColorStop(1, '#C44536');

            ctx.fillStyle = 'rgba(50,50,80,0.5)';
            ctx.fillRect(barX, barY, barW, barH);

            ctx.fillStyle = grad;
            ctx.fillRect(barX, barY, barW * Math.min(compression / maxComp, 1), barH);

            ctx.strokeStyle = 'rgba(254,250,224,0.3)';
            ctx.strokeRect(barX, barY, barW, barH);

            // Marker
            const markerX = barX + barW * Math.min(compression / maxComp, 1);
            ctx.fillStyle = '#FEFAE0';
            ctx.beginPath();
            ctx.moveTo(markerX, barY - 5);
            ctx.lineTo(markerX - 5, barY - 12);
            ctx.lineTo(markerX + 5, barY - 12);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`${compression.toFixed(1)}x BW`, x + w / 2, barY + barH + 15);

            // Danger zones
            ctx.font = '9px sans-serif';
            ctx.fillStyle = '#8A9A5B';
            ctx.textAlign = 'left';
            ctx.fillText('Safe', barX, barY + barH + 30);
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('Caution', barX + barW * 0.5, barY + barH + 30);
            ctx.fillStyle = '#C44536';
            ctx.textAlign = 'right';
            ctx.fillText('Risk', barX + barW, barY + barH + 30);
        }

        function drawPostureComparison(x, y, w, h) {
            ctx.fillStyle = 'rgba(20,20,50,0.7)';
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Relative Disc Pressure by Posture', x + w / 2, y + 15);

            const postures = ['standing', 'sitting', 'slouch', 'forward', 'lifting', 'squat'];
            const labels = ['Stand', 'Sit', 'Slouch', 'Bend', 'Stoop', 'Squat'];
            const barW = (w - 40) / postures.length - 4;

            postures.forEach((p, i) => {
                const pd = postureData[p];
                const bx = x + 20 + i * (barW + 4);
                const maxH = h - 45;
                const bh = (pd.compressionMult / 4) * maxH;

                const color = p === posture ? '#DDA15E' : '#8A9A5B';
                ctx.fillStyle = color + (p === posture ? '' : '80');
                ctx.fillRect(bx, y + h - 20 - bh, barW, bh);

                ctx.fillStyle = 'rgba(254,250,224,0.6)';
                ctx.font = '9px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(labels[i], bx + barW / 2, y + h - 5);
                ctx.fillText(pd.compressionMult.toFixed(1) + 'x', bx + barW / 2, y + h - 25 - bh);
            });
        }

        function drawStickPosture(cx, baseY, pd) {
            const trunkRad = pd.trunkAngle * Math.PI / 180;
            const legLen = 100;
            const torsoLen = 90;

            // Legs
            ctx.strokeStyle = 'rgba(254,250,224,0.4)';
            ctx.lineWidth = 3;

            if (posture === 'sitting' || posture === 'slouch') {
                // Seated - legs horizontal then down
                ctx.beginPath();
                ctx.moveTo(cx, baseY);
                ctx.lineTo(cx + 30, baseY);
                ctx.lineTo(cx + 30, baseY + legLen * 0.6);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx, baseY);
                ctx.lineTo(cx - 20, baseY);
                ctx.lineTo(cx - 20, baseY + legLen * 0.6);
                ctx.stroke();
            } else if (posture === 'squat') {
                ctx.beginPath();
                ctx.moveTo(cx, baseY);
                ctx.lineTo(cx + 25, baseY + 30);
                ctx.lineTo(cx + 10, baseY + legLen * 0.7);
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.moveTo(cx, baseY);
                ctx.lineTo(cx + 10, baseY + legLen);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cx, baseY);
                ctx.lineTo(cx - 10, baseY + legLen);
                ctx.stroke();
            }

            // Torso
            const shoulderX = cx - Math.sin(trunkRad) * torsoLen;
            const shoulderY = baseY - Math.cos(trunkRad) * torsoLen;

            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx, baseY);
            ctx.lineTo(shoulderX, shoulderY);
            ctx.stroke();

            // Head
            ctx.fillStyle = '#FEFAE0';
            ctx.beginPath();
            ctx.arc(shoulderX - Math.sin(trunkRad) * 20, shoulderY - Math.cos(trunkRad) * 20, 10, 0, Math.PI * 2);
            ctx.fill();

            // Arms
            const armRad = pd.armAngle * Math.PI / 180;
            ctx.strokeStyle = 'rgba(254,250,224,0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(shoulderX, shoulderY);
            ctx.lineTo(shoulderX + Math.sin(trunkRad + armRad) * 50,
                       shoulderY + Math.cos(trunkRad + armRad) * 50);
            ctx.stroke();

            // Load in hands
            if (extLoad > 0) {
                const handX = shoulderX + Math.sin(trunkRad + armRad) * 55;
                const handY = shoulderY + Math.cos(trunkRad + armRad) * 55;
                ctx.fillStyle = '#DDA15E';
                ctx.fillRect(handX - 10, handY - 5, 20, 10);
                ctx.fillStyle = '#FEFAE0';
                ctx.font = '9px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(extLoad + 'kg', handX, handY + 18);
            }
        }

        function animate() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const pd = postureData[posture];

            // Title
            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Spinal Loading: ' + pd.label, W / 2, 40);

            // Stick figure posture
            const figX = W * 0.2;
            const figBaseY = H * 0.55;
            drawStickPosture(figX, figBaseY, pd);

            // Spine detail
            const spineX = W * 0.45;
            const spineBaseY = H * 0.65;
            const { compression } = drawSpine(spineX, spineBaseY, pd);

            // Pressure gauge
            drawPressureGauge(W * 0.65, H * 0.08, Math.min(300, W * 0.3), 110, compression);

            // Posture comparison
            drawPostureComparison(W * 0.65, H * 0.35, Math.min(300, W * 0.3), 200);

            // Tips
            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';
            if (compression > 3) {
                ctx.fillStyle = '#DDA15E';
                ctx.fillText('High disc pressure! Bend knees and keep load close to body.', W / 2, H - 80);
            } else if (compression < 1.5) {
                ctx.fillStyle = '#8A9A5B';
                ctx.fillText('Low spinal load. Good posture minimizes disc compression.', W / 2, H - 80);
            }

            requestAnimationFrame(animate);
        }

        window.reset = function() {
            posture = 'standing'; bodyMass = 75; extLoad = 0;
            document.getElementById('posture').value = 'standing';
            document.getElementById('mass').value = 75;
            document.getElementById('extLoad').value = 0;
            document.getElementById('mass-val').textContent = '75';
            document.getElementById('load-val').textContent = '0';
        };

        requestAnimationFrame(animate);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
