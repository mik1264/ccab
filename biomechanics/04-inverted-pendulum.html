<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inverted Pendulum Walking - Biomechanics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 16px 24px; display: flex; gap: 20px;
            align-items: center; color: #FEFAE0; font-size: 0.85rem; z-index: 100;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls label { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        #controls input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        #info {
            position: fixed; top: 60px; right: 20px;
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 14px 18px; color: #FEFAE0;
            font-size: 0.8rem; z-index: 100; max-width: 250px; line-height: 1.5;
            border: 1px solid rgba(138,154,91,0.3);
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <div id="info">
        <strong style="color:#8A9A5B">Inverted Pendulum Model</strong><br>
        Walking can be modeled as a series of inverted pendulum arcs. The body's center of mass vaults over the stance leg like a pendulum.<br><br>
        The COM traces arc-shaped trajectories, exchanging kinetic and potential energy each step.
    </div>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <label>Speed<input type="range" id="speed" min="0.2" max="3" step="0.1" value="1"><span id="speed-val">1.0x</span></label>
        <label>Leg Length<input type="range" id="legLen" min="60" max="180" step="5" value="120"><span id="legLen-val">120</span></label>
        <label>Gravity<input type="range" id="gravity" min="2" max="15" step="0.5" value="9.8"><span id="grav-val">9.8</span></label>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let speed = 1, legLen = 120, gravity = 9.8;
        let time = 0;
        let comTrail = [];
        let energyHistory = [];

        document.getElementById('speed').oninput = e => { speed = +e.target.value; document.getElementById('speed-val').textContent = speed.toFixed(1) + 'x'; };
        document.getElementById('legLen').oninput = e => { legLen = +e.target.value; document.getElementById('legLen-val').textContent = legLen; };
        document.getElementById('gravity').oninput = e => { gravity = +e.target.value; document.getElementById('grav-val').textContent = gravity.toFixed(1); };

        function getWalkerState(t) {
            const stepDuration = 1.2;
            const stepPhase = (t % stepDuration) / stepDuration;
            const stepIndex = Math.floor(t / stepDuration);
            const stepWidth = legLen * 0.7;

            // Inverted pendulum arc for COM
            const angle = (stepPhase - 0.5) * 0.6; // Range of pendulum swing
            const pivotX = stepIndex * stepWidth + stepWidth / 2;
            const groundY = 0;

            // COM follows arc
            const comX = pivotX + legLen * Math.sin(angle);
            const comY = groundY - legLen * Math.cos(angle);

            // Stance foot at pivot
            const stanceFootX = pivotX;

            // Swing foot
            const swingStart = pivotX - stepWidth;
            const swingEnd = pivotX + stepWidth;
            let swingFootX, swingFootY;

            if (stepPhase < 0.4) {
                // Still on ground behind
                swingFootX = swingStart;
                swingFootY = groundY;
            } else if (stepPhase < 0.9) {
                const swingT = (stepPhase - 0.4) / 0.5;
                swingFootX = swingStart + swingT * (swingEnd - swingStart);
                swingFootY = groundY - Math.sin(swingT * Math.PI) * legLen * 0.3;
            } else {
                swingFootX = swingEnd;
                swingFootY = groundY;
            }

            // Energy calculation
            const comVx = Math.cos(angle) * 0.6 / stepDuration * legLen;
            const ke = 0.5 * comVx * comVx / 1000;
            const pe = -comY * gravity / 1000;

            return {
                comX, comY, stanceFootX, stanceFootY: groundY,
                swingFootX, swingFootY, angle, stepPhase,
                isLeftStance: stepIndex % 2 === 0, ke, pe,
                pivotX
            };
        }

        let lastTime = 0;
        function animate(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
            lastTime = timestamp;
            time += dt * speed;

            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const groundScreenY = H * 0.7;
            const state = getWalkerState(time);
            const cameraX = state.comX - W / 2;

            // Ground
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, groundScreenY);
            ctx.lineTo(W, groundScreenY);
            ctx.stroke();

            // Ground ticks
            ctx.strokeStyle = 'rgba(138,154,91,0.15)';
            ctx.lineWidth = 1;
            const tickStart = Math.floor(cameraX / 50) * 50;
            for (let tx = tickStart; tx < cameraX + W; tx += 50) {
                const sx = tx - cameraX;
                ctx.beginPath();
                ctx.moveTo(sx, groundScreenY);
                ctx.lineTo(sx, groundScreenY + 8);
                ctx.stroke();
            }

            // Draw arc trajectory
            ctx.strokeStyle = 'rgba(138,154,91,0.2)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            const arcPivotX = state.pivotX - cameraX;
            ctx.beginPath();
            for (let a = -0.35; a <= 0.35; a += 0.02) {
                const ax = arcPivotX + legLen * Math.sin(a);
                const ay = groundScreenY + legLen * Math.cos(a) - legLen;
                if (a === -0.35) ctx.moveTo(ax, ay);
                else ctx.lineTo(ax, ay);
            }
            ctx.stroke();
            ctx.setLineDash([]);

            // COM trail
            comTrail.push({ x: state.comX, y: state.comY });
            if (comTrail.length > 300) comTrail.shift();

            ctx.strokeStyle = 'rgba(221,161,94,0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            comTrail.forEach((p, i) => {
                const sx = p.x - cameraX;
                const sy = groundScreenY + p.y;
                if (i === 0) ctx.moveTo(sx, sy);
                else ctx.lineTo(sx, sy);
            });
            ctx.stroke();

            // Transform coords to screen
            const comSX = state.comX - cameraX;
            const comSY = groundScreenY + state.comY;
            const stanceSX = state.stanceFootX - cameraX;
            const stanceSY = groundScreenY + state.stanceFootY;
            const swingSX = state.swingFootX - cameraX;
            const swingSY = groundScreenY + state.swingFootY;

            // Stance leg
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(comSX, comSY);
            ctx.lineTo(stanceSX, stanceSY);
            ctx.stroke();

            // Swing leg
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(comSX, comSY);
            ctx.lineTo(swingSX, swingSY);
            ctx.stroke();

            // Head/body
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 3;
            const shoulderY = comSY - legLen * 0.25;
            ctx.beginPath();
            ctx.moveTo(comSX, comSY);
            ctx.lineTo(comSX, shoulderY);
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.beginPath();
            ctx.arc(comSX, shoulderY - 15, 12, 0, Math.PI * 2);
            ctx.fill();

            // COM dot
            ctx.fillStyle = '#DDA15E';
            ctx.beginPath();
            ctx.arc(comSX, comSY, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#DDA15E';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('COM', comSX + 12, comSY - 5);

            // Foot markers
            ctx.fillStyle = '#8A9A5B';
            ctx.beginPath(); ctx.arc(stanceSX, stanceSY, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#DDA15E';
            ctx.beginPath(); ctx.arc(swingSX, swingSY, 4, 0, Math.PI * 2); ctx.fill();

            // Pendulum angle display
            ctx.strokeStyle = 'rgba(138,154,91,0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(stanceSX, stanceSY);
            ctx.lineTo(stanceSX, stanceSY - 40);
            ctx.stroke();
            ctx.fillStyle = '#8A9A5B';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText((state.angle * 180 / Math.PI).toFixed(1) + '°', stanceSX + 25, stanceSY - 25);

            // Energy graph
            energyHistory.push({ ke: state.ke, pe: state.pe });
            if (energyHistory.length > 200) energyHistory.shift();

            const egX = 20, egY = H - 180, egW = 200, egH = 100;
            ctx.fillStyle = 'rgba(20,20,50,0.7)';
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(egX, egY, egW, egH, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('Energy Exchange', egX + 10, egY + 15);

            // KE line
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            energyHistory.forEach((e, i) => {
                const ex = egX + 5 + (i / 200) * (egW - 10);
                const ey = egY + egH - 10 - e.ke * 40;
                if (i === 0) ctx.moveTo(ex, ey); else ctx.lineTo(ex, ey);
            });
            ctx.stroke();

            // PE line
            ctx.strokeStyle = '#DDA15E';
            ctx.beginPath();
            energyHistory.forEach((e, i) => {
                const ex = egX + 5 + (i / 200) * (egW - 10);
                const ey = egY + egH - 10 - e.pe * 40;
                if (i === 0) ctx.moveTo(ex, ey); else ctx.lineTo(ex, ey);
            });
            ctx.stroke();

            ctx.fillStyle = '#8A9A5B';
            ctx.font = '9px sans-serif';
            ctx.fillText('KE', egX + egW - 35, egY + 15);
            ctx.fillStyle = '#DDA15E';
            ctx.fillText('PE', egX + egW - 15, egY + 15);

            // Labels
            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Green = Stance leg (pivot)  |  Gold = Swing leg  |  Dashed = Pendulum arc', W / 2, 40);

            requestAnimationFrame(animate);
        }

        window.reset = function() {
            time = 0; speed = 1; legLen = 120; gravity = 9.8;
            comTrail = []; energyHistory = [];
            document.getElementById('speed').value = 1;
            document.getElementById('legLen').value = 120;
            document.getElementById('gravity').value = 9.8;
            document.getElementById('speed-val').textContent = '1.0x';
            document.getElementById('legLen-val').textContent = '120';
            document.getElementById('grav-val').textContent = '9.8';
        };

        requestAnimationFrame(animate);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
