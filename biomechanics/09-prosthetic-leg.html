<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prosthetic Limb Design - Biomechanics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 16px 24px; display: flex; gap: 20px;
            align-items: center; color: #FEFAE0; font-size: 0.85rem; z-index: 100;
            border: 1px solid rgba(138,154,91,0.3); flex-wrap: wrap; justify-content: center;
        }
        #controls label { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        #controls input[type="range"] { width: 90px; accent-color: #8A9A5B; }
        #controls select {
            background: rgba(30,30,60,0.9); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 4px 8px; border-radius: 6px; font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <label>Type
            <select id="prosType">
                <option value="blade">Running Blade</option>
                <option value="passive">Passive Foot</option>
                <option value="powered">Powered Ankle</option>
                <option value="bionic">Bionic Knee</option>
            </select>
        </label>
        <label>Stiffness<input type="range" id="stiffness" min="0.3" max="3" step="0.1" value="1.2"><span id="stiff-val">1.2</span></label>
        <label>Damping<input type="range" id="damping" min="0" max="1" step="0.05" value="0.3"><span id="damp-val">0.3</span></label>
        <label>Speed<input type="range" id="speed" min="0.2" max="2" step="0.1" value="1"><span id="speed-val">1.0x</span></label>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let prosType = 'blade', stiffness = 1.2, damping = 0.3, speed = 1;
        let time = 0;
        let grfHistory = [];

        document.getElementById('prosType').onchange = e => { prosType = e.target.value; grfHistory = []; };
        document.getElementById('stiffness').oninput = e => { stiffness = +e.target.value; document.getElementById('stiff-val').textContent = stiffness.toFixed(1); };
        document.getElementById('damping').oninput = e => { damping = +e.target.value; document.getElementById('damp-val').textContent = damping.toFixed(1); };
        document.getElementById('speed').oninput = e => { speed = +e.target.value; document.getElementById('speed-val').textContent = speed.toFixed(1) + 'x'; };

        const prosData = {
            blade:   { name: 'Carbon Running Blade', energyReturn: 0.90, weight: 1.5, color: '#8A9A5B' },
            passive: { name: 'Passive SACH Foot', energyReturn: 0.55, weight: 2.0, color: '#DDA15E' },
            powered: { name: 'Powered Ankle', energyReturn: 1.05, weight: 3.5, color: '#BC6C25' },
            bionic:  { name: 'Bionic Knee-Ankle', energyReturn: 0.95, weight: 4.0, color: '#606C38' }
        };

        function drawBlade(cx, hipY, phase) {
            const thighLen = 80;
            const stumpLen = 40;
            const bladeLen = 90;

            const hipAngle = Math.sin(phase * Math.PI * 2) * 0.3;
            const inStance = phase < 0.4;

            // Natural leg (left)
            const natKneeX = cx - 15 + Math.sin(((phase + 0.5) % 1) * Math.PI * 2 * 0.3) * 20;
            const natKneeY = hipY + thighLen * 0.9;
            const natFootY = natKneeY + thighLen * 0.9;

            ctx.strokeStyle = 'rgba(254,250,224,0.4)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx - 5, hipY);
            ctx.lineTo(natKneeX, natKneeY);
            ctx.lineTo(natKneeX - 5, natFootY);
            ctx.stroke();

            // Prosthetic side
            const stumpAngle = hipAngle;
            const kneeX = cx + 5 + Math.sin(stumpAngle) * stumpLen;
            const kneeY = hipY + Math.cos(stumpAngle) * stumpLen;

            // Socket
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(cx + 5, hipY);
            ctx.lineTo(kneeX, kneeY);
            ctx.stroke();

            // Socket detail
            ctx.fillStyle = 'rgba(138,154,91,0.3)';
            ctx.beginPath();
            ctx.ellipse(kneeX, kneeY, 10, 15, stumpAngle, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            const bladeCompression = inStance ? Math.sin(phase / 0.4 * Math.PI) * 15 * stiffness : 0;

            if (prosType === 'blade') {
                // J-shaped running blade
                ctx.strokeStyle = prosData.blade.color;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(kneeX, kneeY);

                const bladeEndY = kneeY + bladeLen - bladeCompression;
                const curveX = kneeX + 20;

                // Carbon blade curve
                ctx.bezierCurveTo(
                    kneeX + 3, kneeY + bladeLen * 0.3,
                    kneeX + 8, kneeY + bladeLen * 0.6,
                    curveX, bladeEndY
                );
                ctx.bezierCurveTo(
                    curveX + 15, bladeEndY + 5,
                    curveX + 10, bladeEndY + 8,
                    curveX - 5, bladeEndY + 3
                );
                ctx.stroke();

                // Spring compression visualization
                if (inStance && bladeCompression > 1) {
                    ctx.strokeStyle = `rgba(138,154,91,${bladeCompression / 20})`;
                    ctx.setLineDash([2, 2]);
                    ctx.beginPath();
                    ctx.arc(curveX, bladeEndY, bladeCompression, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            } else if (prosType === 'passive') {
                // SACH foot
                ctx.strokeStyle = '#DDA15E';
                ctx.lineWidth = 4;
                const footY = kneeY + bladeLen - bladeCompression * 0.3;
                ctx.beginPath();
                ctx.moveTo(kneeX, kneeY);
                ctx.lineTo(kneeX + 2, footY);
                ctx.stroke();

                // Foot shell
                ctx.fillStyle = 'rgba(221,161,94,0.4)';
                ctx.beginPath();
                ctx.ellipse(kneeX + 5, footY + 5, 20, 8, 0.1, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#DDA15E';
                ctx.lineWidth = 2;
                ctx.stroke();
            } else if (prosType === 'powered') {
                // Powered ankle
                ctx.strokeStyle = '#BC6C25';
                ctx.lineWidth = 4;
                const ankleY = kneeY + bladeLen * 0.7;
                ctx.beginPath();
                ctx.moveTo(kneeX, kneeY);
                ctx.lineTo(kneeX + 2, ankleY);
                ctx.stroke();

                // Motor housing
                ctx.fillStyle = 'rgba(188,108,37,0.3)';
                ctx.strokeStyle = '#BC6C25';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(kneeX - 12, ankleY - 8, 24, 20, 4);
                ctx.fill();
                ctx.stroke();

                // Motor indicator
                const motorActive = inStance && phase > 0.25;
                ctx.fillStyle = motorActive ? '#DDA15E' : 'rgba(221,161,94,0.3)';
                ctx.beginPath();
                ctx.arc(kneeX, ankleY + 2, 5, 0, Math.PI * 2);
                ctx.fill();

                // Foot
                const footY = ankleY + 15 - bladeCompression * 0.5;
                ctx.strokeStyle = '#BC6C25';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(kneeX - 15, footY);
                ctx.lineTo(kneeX + 20, footY);
                ctx.stroke();
            } else {
                // Bionic knee-ankle
                ctx.strokeStyle = '#606C38';
                ctx.lineWidth = 3;

                const bioKneeY = kneeY + 20;
                // Knee joint housing
                ctx.fillStyle = 'rgba(96,108,56,0.3)';
                ctx.beginPath();
                ctx.arc(kneeX + 2, bioKneeY, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#606C38';
                ctx.stroke();

                // Shin
                const ankleY = bioKneeY + bladeLen * 0.5;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(kneeX + 2, bioKneeY + 12);
                ctx.lineTo(kneeX + 4, ankleY);
                ctx.stroke();

                // Ankle motor
                ctx.fillStyle = 'rgba(96,108,56,0.3)';
                ctx.beginPath();
                ctx.roundRect(kneeX - 8, ankleY - 5, 20, 15, 3);
                ctx.fill();
                ctx.stroke();

                // Foot
                const footY = ankleY + 10 - bladeCompression * 0.4;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(kneeX - 12, footY);
                ctx.lineTo(kneeX + 18, footY);
                ctx.stroke();
            }

            return { kneeX, kneeY, inStance, bladeCompression };
        }

        function drawEnergyReturn(x, y, w, h) {
            ctx.fillStyle = 'rgba(20,20,50,0.7)';
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Energy Return Comparison', x + w / 2, y + 18);

            const types = ['blade', 'passive', 'powered', 'bionic'];
            const barW = (w - 40) / 4 - 4;

            types.forEach((t, i) => {
                const pd = prosData[t];
                const bx = x + 20 + i * (barW + 4);
                const maxH = h - 55;
                const bh = pd.energyReturn * maxH;

                ctx.fillStyle = t === prosType ? pd.color : pd.color + '60';
                ctx.fillRect(bx, y + h - 25 - bh, barW, bh);

                ctx.fillStyle = 'rgba(254,250,224,0.6)';
                ctx.font = '9px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(pd.energyReturn > 1 ? (pd.energyReturn * 100).toFixed(0) + '%' :
                    (pd.energyReturn * 100).toFixed(0) + '%', bx + barW / 2, y + h - 30 - bh);

                // Short label
                const shortNames = ['Blade', 'SACH', 'Power', 'Bionic'];
                ctx.fillText(shortNames[i], bx + barW / 2, y + h - 8);
            });

            // 100% line
            ctx.strokeStyle = 'rgba(254,250,224,0.2)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            const lineY = y + h - 25 - (h - 55);
            ctx.beginPath();
            ctx.moveTo(x + 20, lineY);
            ctx.lineTo(x + w - 20, lineY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(254,250,224,0.3)';
            ctx.font = '8px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText('100%', x + 17, lineY + 3);
        }

        function drawGRFGraph(x, y, w, h, inStance) {
            ctx.fillStyle = 'rgba(20,20,50,0.7)';
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('GRF Pattern', x + w / 2, y + 15);

            if (grfHistory.length < 2) return;

            const gx = x + 10, gy = y + 25, gw = w - 20, gh = h - 35;
            const maxGRF = 3;

            ctx.strokeStyle = prosData[prosType].color;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            grfHistory.forEach((v, i) => {
                const px = gx + (i / 200) * gw;
                const py = gy + gh - (v / maxGRF) * gh;
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            });
            ctx.stroke();
        }

        function drawSpecsPanel(x, y, w, h) {
            const pd = prosData[prosType];

            ctx.fillStyle = 'rgba(20,20,50,0.7)';
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 8);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = pd.color;
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(pd.name, x + 15, y + 22);

            const specs = [
                `Energy Return: ${(pd.energyReturn * 100).toFixed(0)}%`,
                `Weight: ${pd.weight.toFixed(1)} kg`,
                `Stiffness: ${stiffness.toFixed(1)}x`,
                `Damping: ${(damping * 100).toFixed(0)}%`
            ];

            ctx.fillStyle = '#FEFAE0';
            ctx.font = '11px sans-serif';
            specs.forEach((s, i) => {
                ctx.fillText(s, x + 15, y + 42 + i * 18);
            });
        }

        let lastTime = 0;
        function animate(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
            lastTime = timestamp;
            time += dt * speed * 0.8;

            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const phase = time % 1;
            const cx = W * 0.35;
            const hipY = H * 0.2;
            const groundY = hipY + 180;

            // Title
            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Prosthetic Limb Biomechanics', W / 2, 35);

            // Ground
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(cx - 100, groundY);
            ctx.lineTo(cx + 100, groundY);
            ctx.stroke();

            // Torso
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx, hipY);
            ctx.lineTo(cx, hipY - 60);
            ctx.stroke();

            ctx.fillStyle = '#FEFAE0';
            ctx.beginPath();
            ctx.arc(cx, hipY - 70, 12, 0, Math.PI * 2);
            ctx.fill();

            // Hip dot
            ctx.fillStyle = '#DDA15E';
            ctx.beginPath(); ctx.arc(cx, hipY, 6, 0, Math.PI * 2); ctx.fill();

            // Draw prosthetic
            const result = drawBlade(cx, hipY, phase);

            // GRF calculation
            let grf = 0;
            if (result.inStance) {
                const sp = (phase) / 0.4;
                grf = Math.sin(sp * Math.PI) * (1.5 + stiffness * 0.5) * (1 - damping * 0.3);
            }
            grfHistory.push(grf);
            if (grfHistory.length > 200) grfHistory.shift();

            // Right side panels
            const panelW = Math.min(280, W * 0.3);
            const panelX = W * 0.63;

            drawSpecsPanel(panelX, H * 0.08, panelW, 120);
            drawEnergyReturn(panelX, H * 0.28, panelW, 180);
            drawGRFGraph(panelX, H * 0.56, panelW, 130);

            // Phase indicator
            ctx.fillStyle = result.inStance ? '#8A9A5B' : '#DDA15E';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(result.inStance ? 'STANCE' : 'SWING', cx, groundY + 25);

            requestAnimationFrame(animate);
        }

        window.reset = function() {
            prosType = 'blade'; stiffness = 1.2; damping = 0.3; speed = 1; time = 0;
            grfHistory = [];
            document.getElementById('prosType').value = 'blade';
            document.getElementById('stiffness').value = 1.2;
            document.getElementById('damping').value = 0.3;
            document.getElementById('speed').value = 1;
            document.getElementById('stiff-val').textContent = '1.2';
            document.getElementById('damp-val').textContent = '0.3';
            document.getElementById('speed-val').textContent = '1.0x';
        };

        requestAnimationFrame(animate);
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
