<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tournament - Game AI Strategies</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        #ui { position: fixed; top: 10px; right: 10px; z-index: 100; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .btn { background: rgba(138,154,91,0.3); border: 1px solid #8A9A5B; color: #FEFAE0; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; backdrop-filter: blur(10px); }
        .btn:hover { background: rgba(138,154,91,0.5); }
        .status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 10px 24px; border-radius: 12px; font-size: 0.9rem; border: 1px solid rgba(138,154,91,0.3); text-align: center; z-index: 100; max-width: 700px; }
        canvas { display: block; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div id="ui">
        <button class="btn" onclick="startTournament()">Start Tournament</button>
        <button class="btn" onclick="resetTournament()">Reset</button>
        <button class="btn" onclick="toggleSpeed()">Speed: <span id="speedLabel">Normal</span></button>
    </div>
    <div class="status" id="status">Press "Start Tournament" to watch 4 AI strategies battle in Tic-Tac-Toe</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    let speed = 1; // 0=fast, 1=normal, 2=slow

    // AI strategies
    const strategies = [
        { name: 'Minimax', color: '#8A9A5B', wins: 0, losses: 0, draws: 0 },
        { name: 'Random', color: '#e74c3c', wins: 0, losses: 0, draws: 0 },
        { name: 'Greedy', color: '#3498db', wins: 0, losses: 0, draws: 0 },
        { name: 'Center-First', color: '#DDA15E', wins: 0, losses: 0, draws: 0 }
    ];

    let currentMatch = null;
    let matchQueue = [];
    let matchHistory = [];
    let tournamentRunning = false;
    let matchTimer = null;

    function checkWin(b) {
        for (const [a,c,d] of WINS) {
            if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
        }
        return b.every(v => v !== 0) ? 'draw' : null;
    }

    function getEmpty(b) {
        const e = [];
        for (let i = 0; i < 9; i++) if (b[i] === 0) e.push(i);
        return e;
    }

    // Minimax AI
    function minimaxScore(b, isMax) {
        const w = checkWin(b);
        if (w === 1) return 10;
        if (w === -1) return -10;
        if (w === 'draw') return 0;
        const empty = getEmpty(b);
        if (isMax) {
            let best = -Infinity;
            for (const i of empty) { b[i] = 1; best = Math.max(best, minimaxScore(b, false)); b[i] = 0; }
            return best;
        } else {
            let best = Infinity;
            for (const i of empty) { b[i] = -1; best = Math.min(best, minimaxScore(b, true)); b[i] = 0; }
            return best;
        }
    }

    function minimaxMove(b, player) {
        const empty = getEmpty(b);
        let bestScore = player === 1 ? -Infinity : Infinity;
        let bestMove = empty[0];
        for (const i of empty) {
            b[i] = player;
            const score = minimaxScore(b, player !== 1);
            b[i] = 0;
            if (player === 1 ? score > bestScore : score < bestScore) {
                bestScore = score; bestMove = i;
            }
        }
        return bestMove;
    }

    // Random AI
    function randomMove(b) {
        const empty = getEmpty(b);
        return empty[Math.floor(Math.random() * empty.length)];
    }

    // Greedy AI: take winning move, else block, else random
    function greedyMove(b, player) {
        const empty = getEmpty(b);
        const opp = -player;
        // Win?
        for (const i of empty) { b[i] = player; if (checkWin(b) === player) { b[i] = 0; return i; } b[i] = 0; }
        // Block?
        for (const i of empty) { b[i] = opp; if (checkWin(b) === opp) { b[i] = 0; return i; } b[i] = 0; }
        return empty[Math.floor(Math.random() * empty.length)];
    }

    // Center-first AI: prefer center, then corners, then edges
    function centerFirstMove(b, player) {
        const priority = [4, 0, 2, 6, 8, 1, 3, 5, 7];
        // But first check for wins/blocks
        const empty = getEmpty(b);
        const opp = -player;
        for (const i of empty) { b[i] = player; if (checkWin(b) === player) { b[i] = 0; return i; } b[i] = 0; }
        for (const i of empty) { b[i] = opp; if (checkWin(b) === opp) { b[i] = 0; return i; } b[i] = 0; }
        for (const p of priority) if (b[p] === 0) return p;
        return empty[0];
    }

    function getMove(strategyIdx, board, player) {
        switch (strategyIdx) {
            case 0: return minimaxMove([...board], player);
            case 1: return randomMove(board);
            case 2: return greedyMove([...board], player);
            case 3: return centerFirstMove([...board], player);
        }
    }

    function buildMatchQueue() {
        matchQueue = [];
        for (let i = 0; i < strategies.length; i++) {
            for (let j = i + 1; j < strategies.length; j++) {
                // Each pair plays twice (swap who goes first)
                matchQueue.push({ p1: i, p2: j });
                matchQueue.push({ p1: j, p2: i });
            }
        }
    }

    function startMatch(p1Idx, p2Idx) {
        currentMatch = {
            p1: p1Idx, p2: p2Idx,
            board: Array(9).fill(0),
            turn: 1, // 1 = p1's turn, -1 = p2's turn
            moves: [],
            result: null
        };
    }

    function stepMatch() {
        if (!currentMatch || currentMatch.result) return false;
        const m = currentMatch;
        const stratIdx = m.turn === 1 ? m.p1 : m.p2;
        const move = getMove(stratIdx, m.board, m.turn);
        m.board[move] = m.turn;
        m.moves.push({ cell: move, player: m.turn });

        const w = checkWin(m.board);
        if (w !== null) {
            m.result = w;
            if (w === 1) { strategies[m.p1].wins++; strategies[m.p2].losses++; }
            else if (w === -1) { strategies[m.p2].wins++; strategies[m.p1].losses++; }
            else { strategies[m.p1].draws++; strategies[m.p2].draws++; }
            matchHistory.push({ ...m });
            return false;
        }
        m.turn = -m.turn;
        return true;
    }

    function startTournament() {
        if (tournamentRunning) return;
        resetTournament();
        buildMatchQueue();
        tournamentRunning = true;
        runNextMatch();
    }

    function runNextMatch() {
        if (matchQueue.length === 0) {
            tournamentRunning = false;
            document.getElementById('status').textContent = 'Tournament complete! ' + matchHistory.length + ' games played.';
            return;
        }
        const m = matchQueue.shift();
        startMatch(m.p1, m.p2);
        document.getElementById('status').textContent =
            strategies[m.p1].name + ' vs ' + strategies[m.p2].name +
            ' (Game ' + (matchHistory.length + 1) + '/' + (matchHistory.length + matchQueue.length + 1) + ')';

        const delays = [30, 150, 400];
        matchTimer = setInterval(function() {
            if (!stepMatch()) {
                clearInterval(matchTimer);
                const r = currentMatch.result;
                const rText = r === 1 ? strategies[currentMatch.p1].name + ' wins!' :
                    r === -1 ? strategies[currentMatch.p2].name + ' wins!' : 'Draw!';
                document.getElementById('status').textContent = rText;
                setTimeout(runNextMatch, delays[speed] * 3);
            }
        }, delays[speed]);
    }

    function resetTournament() {
        tournamentRunning = false;
        if (matchTimer) clearInterval(matchTimer);
        currentMatch = null;
        matchQueue = [];
        matchHistory = [];
        for (const s of strategies) { s.wins = 0; s.losses = 0; s.draws = 0; }
        document.getElementById('status').textContent = 'Press "Start Tournament" to begin';
    }

    function toggleSpeed() {
        speed = (speed + 1) % 3;
        const labels = ['Fast', 'Normal', 'Slow'];
        document.getElementById('speedLabel').textContent = labels[speed];
    }

    function drawX(cx, cy, s, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        const p = s * 0.3;
        ctx.beginPath();
        ctx.moveTo(cx - p, cy - p); ctx.lineTo(cx + p, cy + p);
        ctx.moveTo(cx + p, cy - p); ctx.lineTo(cx - p, cy + p);
        ctx.stroke();
    }

    function drawO(cx, cy, s, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy, s * 0.3, 0, Math.PI * 2);
        ctx.stroke();
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);
        const grad = ctx.createLinearGradient(0, 0, W, H);
        grad.addColorStop(0, '#1a1a2e');
        grad.addColorStop(1, '#16213e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = '#FEFAE0';
        ctx.font = 'bold 1.3rem "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('AI Strategy Tournament', W / 2, 35);

        // Current match board
        if (currentMatch) {
            const cs = Math.min(W * 0.06, 60);
            const bx = W * 0.2 - cs * 1.5;
            const by = 80;

            ctx.strokeStyle = 'rgba(138,154,91,0.4)';
            ctx.lineWidth = 2;
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(bx + i * cs, by); ctx.lineTo(bx + i * cs, by + 3 * cs);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(bx, by + i * cs); ctx.lineTo(bx + 3 * cs, by + i * cs);
                ctx.stroke();
            }

            for (let i = 0; i < 9; i++) {
                const col = i % 3, row = Math.floor(i / 3);
                const cx = bx + col * cs + cs / 2;
                const cy = by + row * cs + cs / 2;
                if (currentMatch.board[i] === 1) drawX(cx, cy, cs, strategies[currentMatch.p1].color);
                else if (currentMatch.board[i] === -1) drawO(cx, cy, cs, strategies[currentMatch.p2].color);
            }

            // Player labels
            ctx.font = '0.8rem "Segoe UI", system-ui, sans-serif';
            ctx.fillStyle = strategies[currentMatch.p1].color;
            ctx.textAlign = 'center';
            ctx.fillText(strategies[currentMatch.p1].name + ' (X)', W * 0.2, by + 3 * cs + 25);
            ctx.fillStyle = strategies[currentMatch.p2].color;
            ctx.fillText(strategies[currentMatch.p2].name + ' (O)', W * 0.2, by + 3 * cs + 45);
        }

        // Standings table
        const tableX = W * 0.45;
        const tableY = 80;
        const rowH = 40;
        const colW = [140, 50, 50, 50, 60];

        ctx.fillStyle = '#8A9A5B';
        ctx.font = 'bold 0.85rem "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('Standings', tableX, tableY - 10);

        // Headers
        ctx.font = '0.7rem "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = '#888';
        const headers = ['Strategy', 'W', 'L', 'D', 'Score'];
        let x = tableX;
        for (let i = 0; i < headers.length; i++) {
            ctx.fillText(headers[i], x, tableY + 15);
            x += colW[i];
        }

        // Sort by score
        const sorted = strategies.map((s, i) => ({ ...s, idx: i, score: s.wins * 3 + s.draws }))
            .sort((a, b) => b.score - a.score);

        for (let i = 0; i < sorted.length; i++) {
            const s = sorted[i];
            const y = tableY + 30 + i * rowH;

            // Background bar
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.roundRect(tableX - 5, y - 5, colW.reduce((a, b) => a + b) + 10, rowH - 5, 6);
            ctx.fill();

            ctx.fillStyle = s.color;
            ctx.font = 'bold 0.8rem "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(s.name, tableX, y + 16);

            ctx.fillStyle = '#FEFAE0';
            ctx.font = '0.8rem "Segoe UI", system-ui, sans-serif';
            ctx.fillText(s.wins, tableX + colW[0], y + 16);
            ctx.fillText(s.losses, tableX + colW[0] + colW[1], y + 16);
            ctx.fillText(s.draws, tableX + colW[0] + colW[1] + colW[2], y + 16);
            ctx.fillStyle = '#DDA15E';
            ctx.font = 'bold 0.8rem "Segoe UI", system-ui, sans-serif';
            ctx.fillText(s.score, tableX + colW[0] + colW[1] + colW[2] + colW[3], y + 16);
        }

        // Match history (last few)
        const histX = tableX;
        const histY = tableY + 30 + strategies.length * rowH + 30;
        ctx.fillStyle = '#8A9A5B';
        ctx.font = 'bold 0.8rem "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('Recent Games', histX, histY);

        const showHistory = matchHistory.slice(-8);
        for (let i = 0; i < showHistory.length; i++) {
            const h = showHistory[i];
            const y = histY + 18 + i * 20;
            const p1 = strategies[h.p1].name;
            const p2 = strategies[h.p2].name;
            const result = h.result === 1 ? p1 + ' wins' : h.result === -1 ? p2 + ' wins' : 'Draw';
            const resultColor = h.result === 1 ? strategies[h.p1].color :
                h.result === -1 ? strategies[h.p2].color : '#666';

            ctx.fillStyle = '#888';
            ctx.font = '0.65rem "Segoe UI", system-ui, sans-serif';
            ctx.fillText(p1 + ' vs ' + p2 + ': ', histX, y);
            ctx.fillStyle = resultColor;
            ctx.fillText(result, histX + 180, y);
        }

        // Win rate chart
        if (matchHistory.length > 0) {
            const chartX = W * 0.78, chartY = 80, chartW = W * 0.18, chartH = 200;
            ctx.fillStyle = '#8A9A5B';
            ctx.font = 'bold 0.8rem "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Win Rates', chartX + chartW / 2, chartY - 10);

            const totalGames = matchHistory.length;
            const barW = chartW / strategies.length * 0.7;
            for (let i = 0; i < strategies.length; i++) {
                const s = strategies[i];
                const gamesPlayed = s.wins + s.losses + s.draws;
                const winRate = gamesPlayed > 0 ? s.wins / gamesPlayed : 0;
                const barH = winRate * chartH;
                const bx = chartX + (i / strategies.length) * chartW + barW * 0.2;

                ctx.fillStyle = s.color;
                ctx.globalAlpha = 0.7;
                ctx.fillRect(bx, chartY + chartH - barH, barW, barH);
                ctx.globalAlpha = 1;

                ctx.fillStyle = '#FEFAE0';
                ctx.font = '0.6rem "Segoe UI", system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(Math.round(winRate * 100) + '%', bx + barW / 2, chartY + chartH - barH - 8);
                ctx.fillText(s.name.substr(0, 6), bx + barW / 2, chartY + chartH + 14);
            }
        }

        requestAnimationFrame(draw);
    }

    window.reset = resetTournament;
    draw();
    </script>
</body>
</html>
