<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimax Tic-Tac-Toe - Game AI Strategies</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        #ui { position: fixed; top: 10px; right: 10px; z-index: 100; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .btn { background: rgba(138,154,91,0.3); border: 1px solid #8A9A5B; color: #FEFAE0; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; backdrop-filter: blur(10px); }
        .btn:hover { background: rgba(138,154,91,0.5); }
        .status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 10px 24px; border-radius: 12px; font-size: 1rem; border: 1px solid rgba(138,154,91,0.3); text-align: center; z-index: 100; }
        .info-panel { position: fixed; top: 50px; right: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 12px; border-radius: 12px; border: 1px solid rgba(138,154,91,0.3); font-size: 0.8rem; max-width: 220px; z-index: 100; }
        .info-panel h3 { color: #DDA15E; margin-bottom: 6px; }
        .info-panel p { color: #ccc; line-height: 1.4; margin-bottom: 4px; }
        .stat { color: #8A9A5B; }
        canvas { display: block; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div id="ui">
        <button class="btn" onclick="resetGame()">New Game</button>
        <button class="btn" onclick="toggleTreeView()">Toggle Tree</button>
    </div>
    <div class="info-panel">
        <h3>Minimax Algorithm</h3>
        <p>You are <strong style="color:#DDA15E">O</strong>. The AI is <strong style="color:#8A9A5B">X</strong>.</p>
        <p>Minimax explores ALL possible futures and picks the optimal move.</p>
        <p class="stat" id="nodeCount">Nodes explored: 0</p>
        <p class="stat" id="depthInfo">Max depth: 0</p>
    </div>
    <div class="status" id="status">Your turn &mdash; click a cell to play O</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H, cellSize, boardX, boardY;
    let board = Array(9).fill(0); // 0=empty, 1=X(AI), -1=O(human)
    let gameOver = false;
    let winner = 0;
    let showTree = true;
    let nodesExplored = 0;
    let maxDepthReached = 0;
    let treeData = null;
    let aiMove = -1;
    let treeScrollX = 0, treeScrollY = 0;
    let animFrame = 0;

    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cellSize = Math.min(W * 0.12, H * 0.15, 100);
        boardX = W * 0.25 - cellSize * 1.5;
        boardY = H * 0.5 - cellSize * 1.5;
    }
    resize();
    window.addEventListener('resize', resize);

    function checkWin(b) {
        for (const [a,c,d] of WINS) {
            if (b[a] && b[a] === b[c] && b[a] === b[d]) return b[a];
        }
        return b.every(v => v !== 0) ? 0.5 : 0; // 0.5 = draw
    }

    function minimax(b, isMax, depth, alpha, beta) {
        nodesExplored++;
        const w = checkWin(b);
        if (w === 1) return { score: 10 - depth, children: [], move: -1, board: [...b], pruned: false };
        if (w === -1) return { score: depth - 10, children: [], move: -1, board: [...b], pruned: false };
        if (w === 0.5) return { score: 0, children: [], move: -1, board: [...b], pruned: false };

        let best = isMax ? -Infinity : Infinity;
        let bestMove = -1;
        const children = [];
        const player = isMax ? 1 : -1;

        for (let i = 0; i < 9; i++) {
            if (b[i] !== 0) continue;
            b[i] = player;
            const child = minimax(b, !isMax, depth + 1, alpha, beta);
            child.move = i;
            child.board = [...b];
            children.push(child);
            b[i] = 0;

            if (isMax) {
                if (child.score > best) { best = child.score; bestMove = i; }
            } else {
                if (child.score < best) { best = child.score; bestMove = i; }
            }
        }

        if (depth > maxDepthReached) maxDepthReached = depth;
        return { score: best, children, move: bestMove, board: [...b], pruned: false };
    }

    function aiPlay() {
        nodesExplored = 0;
        maxDepthReached = 0;
        treeData = minimax([...board], true, 0, -Infinity, Infinity);
        document.getElementById('nodeCount').textContent = 'Nodes explored: ' + nodesExplored;
        document.getElementById('depthInfo').textContent = 'Max depth: ' + maxDepthReached;

        let bestScore = -Infinity;
        let bestIdx = -1;
        for (const child of treeData.children) {
            if (child.score > bestScore) { bestScore = child.score; bestIdx = child.move; }
        }
        if (bestIdx >= 0) {
            board[bestIdx] = 1;
            aiMove = bestIdx;
        }
        const w = checkWin(board);
        if (w === 1) { gameOver = true; winner = 1; document.getElementById('status').textContent = 'AI wins!'; }
        else if (w === 0.5) { gameOver = true; winner = 0; document.getElementById('status').textContent = 'Draw!'; }
        else { document.getElementById('status').textContent = 'Your turn \u2014 click a cell to play O'; }
    }

    function humanPlay(idx) {
        if (gameOver || board[idx] !== 0) return;
        board[idx] = -1;
        const w = checkWin(board);
        if (w === -1) { gameOver = true; winner = -1; document.getElementById('status').textContent = 'You win! (impossible vs perfect AI)'; return; }
        if (w === 0.5) { gameOver = true; winner = 0; document.getElementById('status').textContent = 'Draw!'; return; }
        document.getElementById('status').textContent = 'AI thinking...';
        setTimeout(() => aiPlay(), 100);
    }

    canvas.addEventListener('click', function(e) {
        const mx = e.clientX, my = e.clientY;
        const col = Math.floor((mx - boardX) / cellSize);
        const row = Math.floor((my - boardY) / cellSize);
        if (col >= 0 && col < 3 && row >= 0 && row < 3) {
            humanPlay(row * 3 + col);
        }
    });

    function drawX(cx, cy, s, color) {
        ctx.strokeStyle = color || '#8A9A5B';
        ctx.lineWidth = Math.max(2, s * 0.15);
        ctx.lineCap = 'round';
        const p = s * 0.3;
        ctx.beginPath();
        ctx.moveTo(cx - p, cy - p); ctx.lineTo(cx + p, cy + p);
        ctx.moveTo(cx + p, cy - p); ctx.lineTo(cx - p, cy + p);
        ctx.stroke();
    }

    function drawO(cx, cy, s, color) {
        ctx.strokeStyle = color || '#DDA15E';
        ctx.lineWidth = Math.max(2, s * 0.15);
        ctx.beginPath();
        ctx.arc(cx, cy, s * 0.3, 0, Math.PI * 2);
        ctx.stroke();
    }

    function drawBoard() {
        const s = cellSize;
        ctx.strokeStyle = 'rgba(138,154,91,0.4)';
        ctx.lineWidth = 2;
        for (let i = 1; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(boardX + i * s, boardY);
            ctx.lineTo(boardX + i * s, boardY + 3 * s);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(boardX, boardY + i * s);
            ctx.lineTo(boardX + 3 * s, boardY + i * s);
            ctx.stroke();
        }
        for (let i = 0; i < 9; i++) {
            const col = i % 3, row = Math.floor(i / 3);
            const cx = boardX + col * s + s / 2;
            const cy = boardY + row * s + s / 2;
            if (board[i] === 1) drawX(cx, cy, s);
            else if (board[i] === -1) drawO(cx, cy, s);
        }

        // Draw winning line
        if (gameOver && winner !== 0) {
            for (const [a,b,c] of WINS) {
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    const ax = boardX + (a%3)*s + s/2, ay = boardY + Math.floor(a/3)*s + s/2;
                    const cx2 = boardX + (c%3)*s + s/2, cy2 = boardY + Math.floor(c/3)*s + s/2;
                    ctx.strokeStyle = winner === 1 ? '#8A9A5B' : '#DDA15E';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(ax, ay); ctx.lineTo(cx2, cy2);
                    ctx.stroke();
                }
            }
        }
    }

    function drawMiniTree(node, x, y, w, depth, maxDrawDepth) {
        if (!node || depth > maxDrawDepth) return;
        const nodeR = Math.max(4, 12 - depth * 2);

        // Color based on score
        let color;
        if (node.score > 0) color = '#8A9A5B'; // AI wins
        else if (node.score < 0) color = '#DDA15E'; // Human wins
        else color = '#666'; // Draw

        ctx.fillStyle = color;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.arc(x, y, nodeR, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        if (node.children.length === 0 || depth >= maxDrawDepth) return;

        const childW = w / Math.max(node.children.length, 1);
        const startX = x - w / 2 + childW / 2;
        const childY = y + 50;

        for (let i = 0; i < node.children.length; i++) {
            const cx = startX + i * childW;
            // Is this the chosen path?
            const isChosen = depth === 0 && node.children[i].move === aiMove;
            ctx.strokeStyle = isChosen ? '#DDA15E' : 'rgba(138,154,91,0.2)';
            ctx.lineWidth = isChosen ? 2 : 1;
            ctx.beginPath();
            ctx.moveTo(x, y + nodeR);
            ctx.lineTo(cx, childY - nodeR);
            ctx.stroke();

            drawMiniTree(node.children[i], cx, childY, childW, depth + 1, maxDrawDepth);
        }
    }

    function toggleTreeView() { showTree = !showTree; }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Background gradient
        const grad = ctx.createLinearGradient(0, 0, W, H);
        grad.addColorStop(0, '#1a1a2e');
        grad.addColorStop(1, '#16213e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Title
        ctx.fillStyle = '#FEFAE0';
        ctx.font = 'bold 1.3rem "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Minimax Tic-Tac-Toe', boardX + cellSize * 1.5, boardY - 30);

        drawBoard();

        if (showTree && treeData) {
            const treeX = W * 0.65;
            const treeW = W * 0.55;
            ctx.fillStyle = 'rgba(138,154,91,0.15)';
            ctx.font = '0.8rem "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText('AI Decision Tree (green=AI wins, orange=you win, gray=draw)', treeX, boardY - 10);
            const maxDrawDepth = Math.min(3, maxDepthReached);
            drawMiniTree(treeData, treeX, boardY + 20, treeW, 0, maxDrawDepth);
        }

        animFrame++;
        requestAnimationFrame(draw);
    }

    function resetGame() {
        board = Array(9).fill(0);
        gameOver = false;
        winner = 0;
        treeData = null;
        aiMove = -1;
        nodesExplored = 0;
        maxDepthReached = 0;
        document.getElementById('nodeCount').textContent = 'Nodes explored: 0';
        document.getElementById('depthInfo').textContent = 'Max depth: 0';
        document.getElementById('status').textContent = 'Your turn \u2014 click a cell to play O';
    }

    window.reset = resetGame;
    draw();
    </script>
</body>
</html>
