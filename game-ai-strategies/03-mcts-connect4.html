<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCTS Connect-4 - Game AI Strategies</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        #ui { position: fixed; top: 10px; right: 10px; z-index: 100; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .btn { background: rgba(138,154,91,0.3); border: 1px solid #8A9A5B; color: #FEFAE0; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; backdrop-filter: blur(10px); }
        .btn:hover { background: rgba(138,154,91,0.5); }
        .status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 10px 24px; border-radius: 12px; font-size: 0.9rem; border: 1px solid rgba(138,154,91,0.3); text-align: center; z-index: 100; }
        .info { position: fixed; top: 50px; right: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 12px; border-radius: 12px; border: 1px solid rgba(138,154,91,0.3); font-size: 0.78rem; max-width: 200px; z-index: 100; }
        .info h3 { color: #DDA15E; margin-bottom: 6px; }
        .info p { color: #ccc; line-height: 1.4; margin-bottom: 3px; }
        .stat { color: #8A9A5B; }
        label { font-size: 0.8rem; color: #ccc; }
        input[type=range] { width: 120px; }
        canvas { display: block; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div id="ui">
        <button class="btn" onclick="resetGame()">New Game</button>
        <label>AI Simulations: <span id="simLabel">500</span></label>
        <input type="range" min="50" max="2000" step="50" value="500" oninput="simCount=+this.value;document.getElementById('simLabel').textContent=this.value">
    </div>
    <div class="info">
        <h3>Monte Carlo Tree Search</h3>
        <p>MCTS doesn't need an evaluation function. It plays thousands of random games to estimate which move is best.</p>
        <p>4 phases: <strong>Select, Expand, Simulate, Backpropagate</strong></p>
        <p class="stat" id="simInfo">Simulations: 0</p>
        <p class="stat" id="winRate">Win rate: --</p>
    </div>
    <div class="status" id="status">Your turn (red) &mdash; click a column</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    const ROWS = 6, COLS = 7;
    let board, currentPlayer, gameOver, hoverCol;
    let simCount = 500;
    let lastAIStats = null;

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    function initBoard() {
        board = [];
        for (let r = 0; r < ROWS; r++) board.push(Array(COLS).fill(0));
        currentPlayer = 1; // 1=human(red), 2=AI(green)
        gameOver = false;
        hoverCol = -1;
        lastAIStats = null;
        document.getElementById('status').textContent = 'Your turn (red) \u2014 click a column';
        document.getElementById('simInfo').textContent = 'Simulations: 0';
        document.getElementById('winRate').textContent = 'Win rate: --';
    }

    function cloneBoard(b) { return b.map(r => [...r]); }

    function drop(b, col, player) {
        for (let r = ROWS - 1; r >= 0; r--) {
            if (b[r][col] === 0) { b[r][col] = player; return r; }
        }
        return -1;
    }

    function validCols(b) {
        const cols = [];
        for (let c = 0; c < COLS; c++) if (b[0][c] === 0) cols.push(c);
        return cols;
    }

    function checkWin(b, player) {
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
            if (b[r][c] !== player) continue;
            // Horizontal
            if (c + 3 < COLS && b[r][c+1] === player && b[r][c+2] === player && b[r][c+3] === player) return true;
            // Vertical
            if (r + 3 < ROWS && b[r+1][c] === player && b[r+2][c] === player && b[r+3][c] === player) return true;
            // Diag down-right
            if (r+3 < ROWS && c+3 < COLS && b[r+1][c+1] === player && b[r+2][c+2] === player && b[r+3][c+3] === player) return true;
            // Diag down-left
            if (r+3 < ROWS && c-3 >= 0 && b[r+1][c-1] === player && b[r+2][c-2] === player && b[r+3][c-3] === player) return true;
        }
        return false;
    }

    function isFull(b) { return b[0].every(c => c !== 0); }

    // MCTS Node
    class MCTSNode {
        constructor(board, player, move, parent) {
            this.board = board;
            this.player = player; // who just played
            this.move = move;
            this.parent = parent;
            this.children = [];
            this.wins = 0;
            this.visits = 0;
            this.untriedMoves = validCols(board);
        }
        ucb1(explorationParam) {
            if (this.visits === 0) return Infinity;
            return (this.wins / this.visits) + explorationParam * Math.sqrt(Math.log(this.parent.visits) / this.visits);
        }
        bestChild(c) {
            let best = null, bestVal = -Infinity;
            for (const ch of this.children) {
                const val = ch.ucb1(c);
                if (val > bestVal) { bestVal = val; best = ch; }
            }
            return best;
        }
    }

    function mctsSearch(rootBoard, aiPlayer, numSims) {
        const humanPlayer = aiPlayer === 1 ? 2 : 1;
        const root = new MCTSNode(cloneBoard(rootBoard), humanPlayer, -1, null);

        for (let i = 0; i < numSims; i++) {
            let node = root;

            // SELECT
            while (node.untriedMoves.length === 0 && node.children.length > 0) {
                node = node.bestChild(1.41);
            }

            // EXPAND
            if (node.untriedMoves.length > 0) {
                const moveIdx = Math.floor(Math.random() * node.untriedMoves.length);
                const move = node.untriedMoves.splice(moveIdx, 1)[0];
                const newBoard = cloneBoard(node.board);
                const nextPlayer = node.player === 1 ? 2 : 1;
                drop(newBoard, move, nextPlayer);
                const child = new MCTSNode(newBoard, nextPlayer, move, node);
                node.children.push(child);
                node = child;
            }

            // SIMULATE (random playout)
            let simBoard = cloneBoard(node.board);
            let simPlayer = node.player;
            let simResult = 0;
            while (true) {
                if (checkWin(simBoard, simPlayer)) { simResult = simPlayer; break; }
                if (isFull(simBoard)) { simResult = 0; break; }
                simPlayer = simPlayer === 1 ? 2 : 1;
                const moves = validCols(simBoard);
                if (moves.length === 0) break;
                drop(simBoard, moves[Math.floor(Math.random() * moves.length)], simPlayer);
                if (checkWin(simBoard, simPlayer)) { simResult = simPlayer; break; }
                if (isFull(simBoard)) { simResult = 0; break; }
            }

            // BACKPROPAGATE
            while (node !== null) {
                node.visits++;
                if (simResult === aiPlayer) node.wins += 1;
                else if (simResult === 0) node.wins += 0.5;
                node = node.parent;
            }
        }

        // Pick best move
        let bestChild = null, bestVisits = -1;
        for (const ch of root.children) {
            if (ch.visits > bestVisits) { bestVisits = ch.visits; bestChild = ch; }
        }

        return { move: bestChild ? bestChild.move : validCols(rootBoard)[0], root };
    }

    function humanPlay(col) {
        if (gameOver || currentPlayer !== 1) return;
        if (drop(board, col, 1) < 0) return;
        if (checkWin(board, 1)) { gameOver = true; document.getElementById('status').textContent = 'You win!'; return; }
        if (isFull(board)) { gameOver = true; document.getElementById('status').textContent = 'Draw!'; return; }
        currentPlayer = 2;
        document.getElementById('status').textContent = 'AI thinking...';
        setTimeout(aiPlay, 50);
    }

    function aiPlay() {
        const result = mctsSearch(board, 2, simCount);
        drop(board, result.move, 2);
        lastAIStats = result.root;
        document.getElementById('simInfo').textContent = 'Simulations: ' + simCount;
        // Show column win rates
        let rates = [];
        for (const ch of result.root.children) {
            rates.push('Col ' + (ch.move+1) + ': ' + (ch.visits > 0 ? Math.round(ch.wins/ch.visits*100) + '%' : '--'));
        }
        document.getElementById('winRate').textContent = rates.join(' | ');

        if (checkWin(board, 2)) { gameOver = true; document.getElementById('status').textContent = 'AI wins!'; currentPlayer = 0; return; }
        if (isFull(board)) { gameOver = true; document.getElementById('status').textContent = 'Draw!'; currentPlayer = 0; return; }
        currentPlayer = 1;
        document.getElementById('status').textContent = 'Your turn (red) \u2014 click a column';
    }

    canvas.addEventListener('mousemove', function(e) {
        const cellW = Math.min(W * 0.08, 70);
        const bw = COLS * cellW;
        const bx = W * 0.35 - bw / 2;
        hoverCol = Math.floor((e.clientX - bx) / cellW);
        if (hoverCol < 0 || hoverCol >= COLS) hoverCol = -1;
    });

    canvas.addEventListener('click', function(e) {
        if (hoverCol >= 0 && hoverCol < COLS) humanPlay(hoverCol);
    });

    function draw() {
        ctx.clearRect(0, 0, W, H);
        const grad = ctx.createLinearGradient(0, 0, W, H);
        grad.addColorStop(0, '#1a1a2e');
        grad.addColorStop(1, '#16213e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = '#FEFAE0';
        ctx.font = 'bold 1.3rem "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('MCTS Connect-4', W * 0.35, 35);

        const cellW = Math.min(W * 0.08, 70);
        const cellH = cellW;
        const bw = COLS * cellW;
        const bh = ROWS * cellH;
        const bx = W * 0.35 - bw / 2;
        const by = 60;

        // Board background
        ctx.fillStyle = 'rgba(96,108,56,0.2)';
        ctx.strokeStyle = 'rgba(138,154,91,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(bx - 4, by - 4, bw + 8, bh + 8, 12);
        ctx.fill();
        ctx.stroke();

        // Hover indicator
        if (hoverCol >= 0 && hoverCol < COLS && !gameOver && currentPlayer === 1) {
            ctx.fillStyle = 'rgba(221,161,94,0.3)';
            ctx.fillRect(bx + hoverCol * cellW, by, cellW, bh);
        }

        // Cells
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cx = bx + c * cellW + cellW / 2;
                const cy = by + r * cellH + cellH / 2;
                const radius = cellW * 0.38;
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                if (board[r][c] === 1) ctx.fillStyle = '#DDA15E';
                else if (board[r][c] === 2) ctx.fillStyle = '#8A9A5B';
                else ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fill();
                if (board[r][c] > 0) {
                    ctx.strokeStyle = board[r][c] === 1 ? '#BC6C25' : '#606C38';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }

        // Column numbers
        ctx.font = '0.75rem "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = '#888';
        ctx.textAlign = 'center';
        for (let c = 0; c < COLS; c++) {
            ctx.fillText(c + 1, bx + c * cellW + cellW / 2, by + bh + 18);
        }

        // Draw MCTS tree visualization
        if (lastAIStats) {
            const treeX = W * 0.75;
            const treeY = 50;
            ctx.fillStyle = '#8A9A5B';
            ctx.font = '0.8rem "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('MCTS Search Tree', treeX, treeY);
            ctx.font = '0.65rem "Segoe UI", system-ui, sans-serif';
            ctx.fillText('Node size = visit count, color = win rate', treeX, treeY + 16);

            const root = lastAIStats;
            const treeW = W * 0.4;
            drawMCTSTree(root, treeX, treeY + 40, treeW, 0, 2);
        }

        requestAnimationFrame(draw);
    }

    function drawMCTSTree(node, x, y, w, depth, maxDepth) {
        if (depth > maxDepth) return;
        const r = Math.min(20, Math.max(5, Math.sqrt(node.visits) * 0.8));
        const winRate = node.visits > 0 ? node.wins / node.visits : 0.5;

        // Color from red (0%) to green (100%)
        const red = Math.round(255 * (1 - winRate));
        const green = Math.round(200 * winRate);
        ctx.fillStyle = `rgb(${red},${green},80)`;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();

        // Visit count
        if (r > 7) {
            ctx.fillStyle = '#FEFAE0';
            ctx.font = '0.5rem "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(node.visits, x, y);
        }

        if (depth >= maxDepth || node.children.length === 0) return;

        // Sort children by visits
        const sorted = [...node.children].sort((a, b) => b.visits - a.visits);
        const showCount = Math.min(sorted.length, 7);
        const childW = w / showCount;
        const startX = x - (showCount - 1) * childW / 2;
        const childY = y + 70;

        for (let i = 0; i < showCount; i++) {
            const cx = startX + i * childW;
            ctx.strokeStyle = 'rgba(138,154,91,0.25)';
            ctx.lineWidth = Math.max(1, sorted[i].visits / node.visits * 4);
            ctx.beginPath();
            ctx.moveTo(x, y + r);
            ctx.lineTo(cx, childY - 5);
            ctx.stroke();

            // Column label
            ctx.fillStyle = '#888';
            ctx.font = '0.55rem "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('c' + (sorted[i].move + 1), cx, childY - 8);

            drawMCTSTree(sorted[i], cx, childY, childW * 0.9, depth + 1, maxDepth);
        }
    }

    function resetGame() {
        initBoard();
    }

    window.reset = resetGame;
    initBoard();
    draw();
    </script>
</body>
</html>
