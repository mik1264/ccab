<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Beta Pruning - Game AI Strategies</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        #ui { position: fixed; top: 10px; right: 10px; z-index: 100; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .btn { background: rgba(138,154,91,0.3); border: 1px solid #8A9A5B; color: #FEFAE0; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; backdrop-filter: blur(10px); }
        .btn:hover { background: rgba(138,154,91,0.5); }
        .status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 10px 24px; border-radius: 12px; font-size: 0.9rem; border: 1px solid rgba(138,154,91,0.3); text-align: center; z-index: 100; max-width: 600px; }
        .legend { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); display: flex; gap: 16px; font-size: 0.8rem; z-index: 100; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        canvas { display: block; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div id="ui">
        <button class="btn" onclick="generateNewTree()">New Tree</button>
        <button class="btn" onclick="stepForward()">Step &rarr;</button>
        <button class="btn" onclick="runAll()">Run All</button>
        <button class="btn" onclick="toggleAutoStep()">Auto Step</button>
    </div>
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#8A9A5B"></div> Explored</div>
        <div class="legend-item"><div class="legend-dot" style="background:#DDA15E"></div> Current</div>
        <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> Pruned</div>
        <div class="legend-item"><div class="legend-dot" style="background:#555"></div> Unvisited</div>
    </div>
    <div class="status" id="status">Press "Step" to walk through alpha-beta pruning, or "Run All" to see the full traversal</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    // Tree generation
    const BRANCHING = 3;
    const DEPTH = 4;
    let tree = null;
    let steps = [];
    let stepIdx = 0;
    let autoStep = false;
    let autoTimer = null;

    function makeTree(depth, id) {
        if (depth === 0) {
            return { id: id[0]++, value: Math.floor(Math.random() * 20) - 5, children: [], state: 'unvisited', alpha: -Infinity, beta: Infinity, pruned: false };
        }
        const node = { id: id[0]++, value: null, children: [], state: 'unvisited', alpha: -Infinity, beta: Infinity, pruned: false };
        for (let i = 0; i < BRANCHING; i++) {
            node.children.push(makeTree(depth - 1, id));
        }
        return node;
    }

    function resetStates(node) {
        node.state = 'unvisited';
        node.alpha = -Infinity;
        node.beta = Infinity;
        node.pruned = false;
        node.computedValue = undefined;
        for (const c of node.children) resetStates(c);
    }

    // Alpha-beta with step recording
    function alphaBetaRecord(node, depth, alpha, beta, isMax) {
        steps.push({ nodeId: node.id, type: 'visit', alpha, beta, isMax, depth });

        if (node.children.length === 0) {
            steps.push({ nodeId: node.id, type: 'eval', value: node.value, alpha, beta });
            return node.value;
        }

        let val = isMax ? -Infinity : Infinity;
        for (let i = 0; i < node.children.length; i++) {
            const child = node.children[i];
            const childVal = alphaBetaRecord(child, depth + 1, alpha, beta, !isMax);

            if (isMax) {
                val = Math.max(val, childVal);
                alpha = Math.max(alpha, val);
            } else {
                val = Math.min(val, childVal);
                beta = Math.min(beta, val);
            }

            steps.push({ nodeId: node.id, type: 'update', value: val, alpha, beta, isMax });

            if (beta <= alpha) {
                // Prune remaining children
                for (let j = i + 1; j < node.children.length; j++) {
                    steps.push({ nodeId: node.children[j].id, type: 'prune' });
                    markPruned(node.children[j]);
                }
                steps.push({ nodeId: node.id, type: 'cutoff', alpha, beta });
                break;
            }
        }

        steps.push({ nodeId: node.id, type: 'done', value: val, alpha, beta });
        return val;
    }

    function markPruned(node) {
        // This is recorded in steps - actual pruning happens during step playback
    }

    function findNode(node, id) {
        if (node.id === id) return node;
        for (const c of node.children) {
            const found = findNode(c, id);
            if (found) return found;
        }
        return null;
    }

    function generateNewTree() {
        const idCounter = [0];
        tree = makeTree(DEPTH, idCounter);
        steps = [];
        stepIdx = 0;
        alphaBetaRecord(tree, 0, -Infinity, Infinity, true);
        resetStates(tree);
        autoStep = false;
        if (autoTimer) clearInterval(autoTimer);
        document.getElementById('status').textContent = 'New tree generated. ' + steps.length + ' steps to explore. Press Step to begin.';
    }

    function applyStep(idx) {
        if (idx >= steps.length) return;
        const s = steps[idx];
        const node = findNode(tree, s.nodeId);
        if (!node) return;

        switch(s.type) {
            case 'visit':
                node.state = 'current';
                node.alpha = s.alpha;
                node.beta = s.beta;
                document.getElementById('status').textContent =
                    (s.isMax ? 'MAX' : 'MIN') + ' node #' + s.nodeId +
                    ' | \u03B1=' + (s.alpha === -Infinity ? '-\u221E' : s.alpha) +
                    ' \u03B2=' + (s.beta === Infinity ? '+\u221E' : s.beta);
                break;
            case 'eval':
                node.state = 'explored';
                node.computedValue = s.value;
                break;
            case 'update':
                node.state = 'current';
                node.computedValue = s.value;
                node.alpha = s.alpha;
                node.beta = s.beta;
                break;
            case 'prune':
                node.state = 'pruned';
                node.pruned = true;
                pruneChildren(node);
                break;
            case 'cutoff':
                document.getElementById('status').textContent =
                    'PRUNED! \u03B1=' + (s.alpha === -Infinity ? '-\u221E' : s.alpha) +
                    ' >= \u03B2=' + (s.beta === Infinity ? '+\u221E' : s.beta) +
                    ' \u2014 no need to explore further children';
                break;
            case 'done':
                node.state = 'explored';
                node.computedValue = s.value;
                break;
        }
    }

    function pruneChildren(node) {
        node.pruned = true;
        node.state = 'pruned';
        for (const c of node.children) pruneChildren(c);
    }

    function stepForward() {
        if (!tree) { generateNewTree(); return; }
        if (stepIdx < steps.length) {
            // Reset all 'current' to 'explored'
            function clearCurrent(n) {
                if (n.state === 'current') n.state = 'explored';
                for (const c of n.children) clearCurrent(c);
            }
            clearCurrent(tree);
            applyStep(stepIdx);
            stepIdx++;
        } else {
            document.getElementById('status').textContent = 'Traversal complete! Press "New Tree" to try again.';
            autoStep = false;
            if (autoTimer) clearInterval(autoTimer);
        }
    }

    function runAll() {
        if (!tree) generateNewTree();
        while (stepIdx < steps.length) {
            applyStep(stepIdx);
            stepIdx++;
        }
        // Clear current states
        function finalize(n) { if (n.state === 'current') n.state = 'explored'; for (const c of n.children) finalize(c); }
        finalize(tree);

        let pruneCount = 0;
        function countPruned(n) { if (n.pruned) pruneCount++; for (const c of n.children) countPruned(c); }
        countPruned(tree);
        document.getElementById('status').textContent = 'Done! Pruned ' + pruneCount + ' nodes out of ' + steps.length + ' total. Value: ' + (tree.computedValue !== undefined ? tree.computedValue : '?');
    }

    function toggleAutoStep() {
        autoStep = !autoStep;
        if (autoStep) {
            if (!tree) generateNewTree();
            autoTimer = setInterval(stepForward, 300);
        } else if (autoTimer) {
            clearInterval(autoTimer);
        }
    }

    // Drawing
    function getNodePositions(node, x, y, w, depth, positions) {
        positions[node.id] = { x, y, node };
        if (node.children.length === 0) return;
        const childW = w / node.children.length;
        const startX = x - w / 2 + childW / 2;
        const childY = y + Math.min(120, H * 0.17);
        for (let i = 0; i < node.children.length; i++) {
            getNodePositions(node.children[i], startX + i * childW, childY, childW * 0.95, depth + 1, positions);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);
        const grad = ctx.createLinearGradient(0, 0, W, H);
        grad.addColorStop(0, '#1a1a2e');
        grad.addColorStop(1, '#16213e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = '#FEFAE0';
        ctx.font = 'bold 1.4rem "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Alpha-Beta Pruning Visualizer', W / 2, 40);

        if (!tree) { requestAnimationFrame(draw); return; }

        const positions = {};
        getNodePositions(tree, W / 2, 80, W * 0.85, 0, positions);

        // Draw edges
        function drawEdges(node) {
            const p = positions[node.id];
            if (!p) return;
            for (const child of node.children) {
                const cp = positions[child.id];
                if (!cp) continue;
                const isPruned = child.pruned || child.state === 'pruned';
                ctx.strokeStyle = isPruned ? 'rgba(231,76,60,0.5)' : 'rgba(138,154,91,0.3)';
                ctx.lineWidth = isPruned ? 1 : 1.5;
                if (isPruned) ctx.setLineDash([4, 4]);
                else ctx.setLineDash([]);
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(cp.x, cp.y);
                ctx.stroke();
                drawEdges(child);
            }
        }
        ctx.setLineDash([]);
        drawEdges(tree);

        // Draw nodes
        for (const id in positions) {
            const { x, y, node } = positions[id];
            const r = node.children.length === 0 ? 14 : 16;
            let fillColor, strokeColor;
            switch (node.state) {
                case 'current': fillColor = '#DDA15E'; strokeColor = '#FEFAE0'; break;
                case 'explored': fillColor = '#8A9A5B'; strokeColor = '#606C38'; break;
                case 'pruned': fillColor = '#e74c3c'; strokeColor = '#c0392b'; break;
                default: fillColor = '#333'; strokeColor = '#555';
            }
            ctx.fillStyle = fillColor;
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Value label
            const val = node.computedValue !== undefined ? node.computedValue : (node.children.length === 0 ? node.value : null);
            if (val !== null) {
                ctx.fillStyle = '#FEFAE0';
                ctx.font = 'bold 0.7rem "Segoe UI", system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(val, x, y);
            }

            // Alpha-beta labels for explored/current internal nodes
            if (node.children.length > 0 && (node.state === 'current' || node.state === 'explored') && node.alpha !== undefined) {
                ctx.font = '0.55rem "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = 'rgba(254,250,224,0.7)';
                const aStr = node.alpha === -Infinity ? '-\u221E' : node.alpha;
                const bStr = node.beta === Infinity ? '+\u221E' : node.beta;
                ctx.fillText('\u03B1:' + aStr + ' \u03B2:' + bStr, x, y + r + 12);
            }
        }

        requestAnimationFrame(draw);
    }

    function resetAll() {
        generateNewTree();
    }

    window.reset = resetAll;
    generateNewTree();
    draw();
    </script>
</body>
</html>
