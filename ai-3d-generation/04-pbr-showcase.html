<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBR Material Showcase — AI 3D Generation</title>
    <style>
        :root { --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E; --terracotta: #BC6C25; }
        body { margin:0; overflow:hidden; font-family:-apple-system,sans-serif; background:#0a1118; color:#e8e6e1; }
        #container { width: 100vw; height: 100vh; }
        .back-link {
            position: fixed; top: 14px; left: 14px;
            padding: 8px 14px; background: rgba(254,250,224,0.9); color: var(--terracotta);
            text-decoration: none; border-radius: 14px; font-size: 13px; font-weight: 600; z-index: 20;
        }
        #material-panel {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            width: min(680px, calc(100vw - 30px));
            background: rgba(10,17,28,0.85); backdrop-filter: blur(12px);
            border: 1px solid rgba(138,154,91,0.3); border-radius: 16px;
            padding: 14px 18px; z-index: 15;
        }
        .stage-track {
            position: relative; height: 28px; margin-bottom: 6px;
            display: flex; justify-content: space-between;
        }
        .stage-dot {
            position: relative; flex: 1;
            display: flex; flex-direction: column; align-items: center;
            color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .stage-dot::before {
            content: ''; width: 10px; height: 10px;
            border-radius: 50%; background: rgba(255,255,255,0.2);
            margin-bottom: 4px;
            transition: background 0.2s ease;
        }
        .stage-dot.active { color: #fefae0; }
        .stage-dot.active::before { background: var(--earth); box-shadow: 0 0 0 4px rgba(221,161,94,0.25); }
        .stage-dot:hover { color: #fefae0; }
        #blend-slider {
            width: 100%; margin: 4px 0 8px; -webkit-appearance: none; appearance: none;
            height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none;
        }
        #blend-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 16px; height: 16px; border-radius: 50%;
            background: linear-gradient(135deg, var(--sage), var(--moss));
            cursor: pointer; border: 2px solid #fefae0;
        }
        #blend-slider::-moz-range-thumb {
            width: 16px; height: 16px; border-radius: 50%;
            background: linear-gradient(135deg, var(--sage), var(--moss));
            cursor: pointer; border: 2px solid #fefae0;
        }
        .meta-row {
            display: flex; justify-content: space-between; font-size: 12px; color: #cce0a3;
            font-family: monospace;
        }
        #asset-row {
            position: fixed; top: 14px; right: 14px;
            background: rgba(10,17,28,0.85); backdrop-filter: blur(12px);
            border: 1px solid rgba(138,154,91,0.3); border-radius: 12px;
            padding: 10px; z-index: 15; display: flex; gap: 6px;
        }
        .asset-btn {
            padding: 7px 12px;
            background: rgba(255,255,255,0.08);
            color: #cce0a3;
            border: 1px solid rgba(138,154,91,0.3);
            border-radius: 8px;
            font-size: 11px; font-weight: 600; cursor: pointer;
        }
        .asset-btn.active {
            background: linear-gradient(135deg, var(--sage), var(--moss));
            color: white; border-color: transparent;
        }
        .asset-btn:hover { filter: brightness(1.15); }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to AI 3D Generation</a>
    <div id="container"></div>

    <div id="asset-row">
        <button class="asset-btn active" data-asset="orb">orb</button>
        <button class="asset-btn" data-asset="vase">vase</button>
        <button class="asset-btn" data-asset="cog">cog</button>
        <button class="asset-btn" data-asset="rock">rock</button>
    </div>

    <div id="material-panel">
        <div class="stage-track" id="track">
            <div class="stage-dot" data-stage="0">Geometry</div>
            <div class="stage-dot" data-stage="1">Albedo</div>
            <div class="stage-dot" data-stage="2">Normal</div>
            <div class="stage-dot" data-stage="3">Metallic</div>
            <div class="stage-dot" data-stage="4">Roughness</div>
            <div class="stage-dot" data-stage="5">PBR</div>
        </div>
        <input id="blend-slider" type="range" min="0" max="500" step="1" value="0">
        <div class="meta-row">
            <span>Hunyuan3D-style PBR pipeline</span>
            <span id="stage-name">Geometry only</span>
        </div>
    </div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                   "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1118);

        const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
        camera.position.set(0, 0.5, 4.2);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.getElementById('container').appendChild(renderer.domElement);

        // Studio environment for proper PBR
        const pmrem = new THREE.PMREMGenerator(renderer);
        scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.6;

        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        const key = new THREE.DirectionalLight(0xffffff, 1.0);
        key.position.set(3, 5, 4); scene.add(key);
        const rim = new THREE.PointLight(0xffaa66, 1.5, 20);
        rim.position.set(-4, 1, -3); scene.add(rim);
        const fill = new THREE.PointLight(0x88aaff, 0.8, 15);
        fill.position.set(3, -2, 3); scene.add(fill);

        // Procedural texture maps
        function makeTexture(size, draw, repeat = 2) {
            const c = document.createElement('canvas');
            c.width = c.height = size;
            const ctx = c.getContext('2d');
            draw(ctx, size);
            const t = new THREE.CanvasTexture(c);
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            t.repeat.set(repeat, repeat);
            return t;
        }

        function noiseAt(x, y, freq) {
            return Math.sin(x*freq*0.13)*Math.cos(y*freq*0.11) + Math.sin(x*freq*0.07 + y*freq*0.09)*0.5;
        }

        const ASSETS = {
            orb: {
                geometry: () => new THREE.SphereGeometry(1, 96, 64),
                albedo: { base: '#2d5fa5', accent: '#a3d8ff', pattern: 'swirls' },
                metalness: 0.85,
                roughness: 0.18
            },
            vase: {
                geometry: () => {
                    const pts = [];
                    for (let i = 0; i <= 20; i++) {
                        const t = i / 20;
                        const r = 0.3 + 0.4*Math.sin(t*Math.PI) + 0.15*Math.sin(t*Math.PI*4);
                        pts.push(new THREE.Vector2(Math.max(0.1, r), (t - 0.5) * 2.4));
                    }
                    return new THREE.LatheGeometry(pts, 96);
                },
                albedo: { base: '#b06030', accent: '#f0c890', pattern: 'cracks' },
                metalness: 0.05,
                roughness: 0.62
            },
            cog: {
                geometry: () => {
                    // Cylindrical gear
                    const teeth = 14;
                    const innerR = 0.7, outerR = 1.0;
                    const shape = new THREE.Shape();
                    const totalSteps = teeth * 4;
                    for (let i = 0; i <= totalSteps; i++) {
                        const a = (i / totalSteps) * Math.PI * 2;
                        const phase = (i % 4 < 2) ? outerR : innerR;
                        if (i === 0) shape.moveTo(Math.cos(a)*phase, Math.sin(a)*phase);
                        else shape.lineTo(Math.cos(a)*phase, Math.sin(a)*phase);
                    }
                    const hole = new THREE.Path();
                    hole.absellipse(0,0, 0.25, 0.25, 0, Math.PI*2, false);
                    shape.holes.push(hole);
                    const g = new THREE.ExtrudeGeometry(shape, { depth: 0.3, bevelEnabled: true, bevelSegments: 4, bevelThickness: 0.03, bevelSize: 0.04, curveSegments: 18 });
                    g.center();
                    g.computeVertexNormals();
                    return g;
                },
                albedo: { base: '#9a8a6a', accent: '#5a4a30', pattern: 'rust' },
                metalness: 0.95,
                roughness: 0.42
            },
            rock: {
                geometry: () => {
                    const g = new THREE.IcosahedronGeometry(1, 4);
                    const pos = g.attributes.position;
                    for (let i = 0; i < pos.count; i++) {
                        const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
                        const n = noiseAt(x*5, y*5, 1) + 0.5*noiseAt(z*7, x*7, 1);
                        const s = 1 + n * 0.18;
                        pos.setXYZ(i, x*s, y*s, z*s);
                    }
                    g.computeVertexNormals();
                    return g;
                },
                albedo: { base: '#5a4a3a', accent: '#7a6a5a', pattern: 'rust' },
                metalness: 0.0,
                roughness: 0.9
            }
        };

        // Texture generators
        function drawAlbedo(ctx, size, info) {
            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, info.base); grad.addColorStop(1, info.accent);
            ctx.fillStyle = grad; ctx.fillRect(0, 0, size, size);

            ctx.globalCompositeOperation = 'source-over';
            if (info.pattern === 'swirls') {
                for (let i = 0; i < 60; i++) {
                    ctx.fillStyle = `rgba(255,255,255,${0.04 + Math.random()*0.06})`;
                    ctx.beginPath();
                    ctx.arc(Math.random()*size, Math.random()*size, 5+Math.random()*30, 0, Math.PI*2); ctx.fill();
                }
            } else if (info.pattern === 'cracks') {
                ctx.strokeStyle = 'rgba(20,10,5,0.35)';
                for (let i = 0; i < 30; i++) {
                    ctx.lineWidth = 0.5 + Math.random()*1.5;
                    ctx.beginPath();
                    let x = Math.random()*size, y = Math.random()*size;
                    ctx.moveTo(x, y);
                    for (let s = 0; s < 6; s++) {
                        x += (Math.random()-0.5)*size*0.18;
                        y += (Math.random()-0.5)*size*0.18;
                        ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                }
            } else if (info.pattern === 'rust') {
                for (let i = 0; i < 200; i++) {
                    const r = 1 + Math.random()*4;
                    ctx.fillStyle = `rgba(${100+Math.random()*100},${50+Math.random()*60},${30+Math.random()*40},${0.1+Math.random()*0.3})`;
                    ctx.beginPath(); ctx.arc(Math.random()*size, Math.random()*size, r, 0, Math.PI*2); ctx.fill();
                }
            }
        }

        function drawNormal(ctx, size) {
            const data = ctx.createImageData(size, size);
            for (let y = 0; y < size; y++) for (let x = 0; x < size; x++) {
                const dx = noiseAt(x+1, y, 0.5) - noiseAt(x-1, y, 0.5);
                const dy = noiseAt(x, y+1, 0.5) - noiseAt(x, y-1, 0.5);
                const len = Math.hypot(dx, dy, 4);
                const nx = -dx*2/len, ny = -dy*2/len, nz = 4/len;
                const i = (y*size + x)*4;
                data.data[i] = (nx*0.5+0.5)*255;
                data.data[i+1] = (ny*0.5+0.5)*255;
                data.data[i+2] = (nz*0.5+0.5)*255;
                data.data[i+3] = 255;
            }
            ctx.putImageData(data, 0, 0);
        }

        function drawMetallic(ctx, size) {
            // Metallic mask: blotchy
            ctx.fillStyle = 'black'; ctx.fillRect(0,0,size,size);
            for (let i = 0; i < 300; i++) {
                const r = 5 + Math.random()*40;
                const v = 100 + Math.random()*155;
                ctx.fillStyle = `rgba(${v},${v},${v},${0.15 + Math.random()*0.3})`;
                ctx.beginPath(); ctx.arc(Math.random()*size, Math.random()*size, r, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawRoughness(ctx, size) {
            const data = ctx.createImageData(size, size);
            for (let y = 0; y < size; y++) for (let x = 0; x < size; x++) {
                const v = (noiseAt(x*0.6, y*0.6, 1) + 1) * 0.5;
                const r = Math.floor(40 + v * 200);
                const i = (y*size + x)*4;
                data.data[i] = data.data[i+1] = data.data[i+2] = r;
                data.data[i+3] = 255;
            }
            ctx.putImageData(data, 0, 0);
        }

        // Build mesh + materials
        let currentMesh = null;
        let textures = {};
        function buildAsset(key) {
            if (currentMesh) {
                scene.remove(currentMesh);
                currentMesh.geometry.dispose();
                currentMesh.material.dispose();
            }
            Object.values(textures).forEach(t => t && t.dispose && t.dispose());

            const def = ASSETS[key];
            const geo = def.geometry();

            textures.albedo = makeTexture(256, (ctx, s) => drawAlbedo(ctx, s, def.albedo), 1);
            textures.albedo.colorSpace = THREE.SRGBColorSpace;
            textures.normal = makeTexture(256, drawNormal, 2);
            textures.metallic = makeTexture(256, drawMetallic, 1);
            textures.roughness = makeTexture(256, drawRoughness, 2);

            const mat = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                map: textures.albedo,
                normalMap: textures.normal,
                normalScale: new THREE.Vector2(1.2, 1.2),
                metalnessMap: textures.metallic,
                roughnessMap: textures.roughness,
                metalness: def.metalness,
                roughness: def.roughness
            });
            mat.userData.def = def;

            currentMesh = new THREE.Mesh(geo, mat);
            scene.add(currentMesh);
            updateBlend();
        }

        // Stage system
        // 0: geometry only (matcap-ish flat grey)
        // 1: + albedo (color, no shading)
        // 2: + normal map
        // 3: + metalness
        // 4: + roughness
        // 5: full PBR with environment
        const STAGE_NAMES = ['Geometry only', 'Albedo (base color)', '+ Normal map', '+ Metallic mask', '+ Roughness mask', 'Full PBR'];
        const slider = document.getElementById('blend-slider');
        const stageName = document.getElementById('stage-name');
        const dots = document.querySelectorAll('.stage-dot');

        function updateBlend() {
            if (!currentMesh) return;
            const value = parseFloat(slider.value); // 0..500, integer-ish
            const stage = Math.floor(value / 100); // 0..5
            const tInStage = (value % 100) / 100;
            const def = currentMesh.material.userData.def;
            const mat = currentMesh.material;

            // Highlight dot
            dots.forEach((d, i) => d.classList.toggle('active', i === Math.min(5, stage)));
            stageName.textContent = STAGE_NAMES[Math.min(5, stage)];

            // Reset
            mat.map = null;
            mat.normalMap = null;
            mat.metalnessMap = null;
            mat.roughnessMap = null;
            mat.color.setHex(0xa8a8a8);
            mat.metalness = 0;
            mat.roughness = 1;
            mat.emissive.setHex(0x000000);
            mat.envMapIntensity = 0;

            if (stage >= 1) {
                mat.map = textures.albedo;
                mat.color.setHex(0xffffff);
            }
            if (stage >= 2) {
                mat.normalMap = textures.normal;
            }
            if (stage >= 3) {
                mat.metalnessMap = textures.metallic;
                mat.metalness = def.metalness * (stage > 3 ? 1 : tInStage);
            }
            if (stage >= 4) {
                mat.roughnessMap = textures.roughness;
                mat.roughness = def.roughness;
            } else {
                mat.roughness = stage >= 3 ? 0.5 : 1;
            }
            if (stage >= 5) {
                mat.envMapIntensity = 1.2;
            } else {
                mat.envMapIntensity = stage >= 3 ? 0.4 : 0;
            }

            mat.needsUpdate = true;
        }

        slider.addEventListener('input', updateBlend);

        dots.forEach(d => d.addEventListener('click', () => {
            const stage = parseInt(d.dataset.stage, 10);
            slider.value = stage * 100;
            updateBlend();
        }));

        document.querySelectorAll('.asset-btn').forEach(b => {
            b.addEventListener('click', () => {
                document.querySelectorAll('.asset-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                buildAsset(b.dataset.asset);
            });
        });

        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        buildAsset('orb');

        // Auto-walk the slider on load to show off the pipeline
        let autoT = 0; let autoDir = 1; let autoActive = true;
        slider.addEventListener('mousedown', () => autoActive = false);
        slider.addEventListener('touchstart', () => autoActive = false);
        document.querySelectorAll('.stage-dot').forEach(d => d.addEventListener('click', () => autoActive = false));
        function autoWalk() {
            if (autoActive) {
                autoT += autoDir * 1.2;
                if (autoT >= 500) { autoT = 500; autoDir = -1; }
                if (autoT <= 0) { autoT = 0; autoDir = 1; }
                slider.value = autoT;
                updateBlend();
            }
            requestAnimationFrame(autoWalk);
        }
        autoWalk();
    </script>
</body>
</html>
