<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Architecture Studio — AI 3D Generation</title>
    <style>
        :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --terracotta:#BC6C25; --cream:#FEFAE0; }
        body { margin:0; overflow:hidden; font-family:-apple-system,sans-serif; background:#0a1318; color:#e8e6e1; }
        #container { width: 100vw; height: 100vh; }
        .back-link {
            position: fixed; top: 14px; left: 14px;
            padding: 8px 14px; background: rgba(254,250,224,0.9); color: var(--terracotta);
            text-decoration: none; border-radius: 14px; font-size: 13px; font-weight: 600; z-index: 20;
        }
        #organelle-list {
            position: fixed; left: 14px; top: 60px; bottom: 14px;
            width: 220px; overflow-y: auto;
            background: rgba(10,19,24,0.85); backdrop-filter: blur(12px);
            border: 1px solid rgba(138,154,91,0.3); border-radius: 14px;
            padding: 14px; z-index: 15;
        }
        #organelle-list h3 { font-size: 13px; color: #cce0a3; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.05em; }
        .organelle-btn {
            display: flex; align-items: center; gap: 10px;
            width: 100%; padding: 8px 10px; margin-bottom: 6px;
            background: rgba(255,255,255,0.06); color: #cce0a3;
            border: 1px solid rgba(138,154,91,0.2); border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer; text-align: left;
            transition: all 0.2s ease;
        }
        .organelle-btn:hover { background: rgba(138,154,91,0.2); color: white; border-color: rgba(138,154,91,0.5); }
        .organelle-btn.active {
            background: linear-gradient(135deg, rgba(138,154,91,0.6), rgba(96,108,56,0.6));
            color: white; border-color: rgba(254,250,224,0.4);
        }
        .swatch {
            width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0;
            box-shadow: 0 0 6px currentColor;
        }
        #info-card {
            position: fixed; right: 14px; top: 14px; width: 320px;
            background: rgba(10,19,24,0.9); backdrop-filter: blur(14px);
            border: 1px solid rgba(138,154,91,0.3); border-radius: 14px;
            padding: 18px; z-index: 15;
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 0; transform: translateX(20px);
            pointer-events: none;
        }
        #info-card.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
        #info-card h2 { font-size: 17px; margin: 0 0 6px; color: #fefae0; }
        #info-card .role { font-size: 12px; color: var(--earth); margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        #info-card p { font-size: 13px; line-height: 1.5; color: #cce0a3; margin: 8px 0; }
        #info-card .stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
            margin-top: 10px; font-size: 11px; font-family: monospace;
        }
        #info-card .stats div {
            background: rgba(0,0,0,0.3); padding: 6px 8px;
            border-radius: 6px; border-left: 2px solid var(--sage);
        }
        #info-card .stats span { color: #fefae0; font-weight: 700; display: block; margin-top: 2px; }
        #intro {
            position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
            background: rgba(10,19,24,0.85); backdrop-filter: blur(12px);
            padding: 10px 18px; border-radius: 12px; font-size: 12px; color: #cce0a3;
            z-index: 15; max-width: 90vw; text-align: center;
        }
        #close-card {
            position: absolute; top: 8px; right: 12px;
            background: none; border: none; color: #cce0a3;
            font-size: 18px; cursor: pointer; padding: 0; line-height: 1;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to AI 3D Generation</a>
    <div id="container"></div>

    <div id="organelle-list">
        <h3>Organelles</h3>
        <div id="organelle-buttons"></div>
    </div>

    <div id="info-card">
        <button id="close-card" type="button">×</button>
        <h2 id="card-name">—</h2>
        <div class="role" id="card-role">—</div>
        <p id="card-desc">—</p>
        <div class="stats">
            <div>Vertices<span id="card-verts">—</span></div>
            <div>Material<span id="card-mat">—</span></div>
            <div>Generated<span id="card-gen">—</span></div>
            <div>Tool<span id="card-tool">—</span></div>
        </div>
    </div>

    <div id="intro">Click any organelle in the cell or the side list. Inspired by the viral Tripo + Hunyuan3D cell-architecture demo.</div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                   "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1318);

        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 5.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.getElementById('container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.4;
        controls.target.set(0, 0, 0);

        scene.add(new THREE.AmbientLight(0x556677, 0.6));
        const key = new THREE.DirectionalLight(0xffe6c2, 1.2); key.position.set(4, 6, 4); scene.add(key);
        const rim = new THREE.PointLight(0x88aaff, 1.0, 25); rim.position.set(-5, 2, -3); scene.add(rim);
        const fill = new THREE.PointLight(0xffaa66, 0.8, 18); fill.position.set(3, -1, 4); scene.add(fill);

        // ---------------- Cytoplasm (the cell's body) ----------------
        const cellRadius = 2.4;
        const cellGeo = new THREE.SphereGeometry(cellRadius, 64, 48);
        const cellMat = new THREE.MeshPhysicalMaterial({
            color: 0xa3c4dc,
            transmission: 0.7,
            transparent: true,
            opacity: 0.18,
            roughness: 0.4,
            thickness: 0.6,
            ior: 1.2,
            side: THREE.DoubleSide
        });
        const cell = new THREE.Mesh(cellGeo, cellMat);
        scene.add(cell);

        // ---------------- Organelle definitions ----------------
        // Each organelle has: name, role, description, color, build() that returns a Mesh, and a position inside the cell.
        const ORGANELLES = [
            {
                key: 'nucleus', name: 'Nucleus', role: 'Cell command centre', color: 0x6a4ad9,
                desc: 'Houses the chromosomal DNA. The nuclear envelope is studded with pores that gate import and export.',
                pos: [0, 0, 0],
                build: () => {
                    const g = new THREE.Group();
                    const env = new THREE.Mesh(
                        new THREE.SphereGeometry(0.8, 48, 32),
                        new THREE.MeshStandardMaterial({ color: 0x6a4ad9, transparent: true, opacity: 0.55, roughness: 0.45 })
                    );
                    g.add(env);
                    // Inner nucleolus
                    const nucleolus = new THREE.Mesh(
                        new THREE.SphereGeometry(0.32, 24, 16),
                        new THREE.MeshStandardMaterial({ color: 0xff7a3a, emissive: 0xcc4422, emissiveIntensity: 0.4, roughness: 0.55 })
                    );
                    nucleolus.position.set(0.18, -0.15, 0.1);
                    g.add(nucleolus);
                    // Pore bumps
                    for (let i = 0; i < 16; i++) {
                        const a = (i / 16) * Math.PI * 2 + Math.random();
                        const b = (Math.random() - 0.5) * 1.4;
                        const r = 0.81;
                        const pore = new THREE.Mesh(
                            new THREE.TorusGeometry(0.05, 0.02, 6, 12),
                            new THREE.MeshStandardMaterial({ color: 0x442288, roughness: 0.5 })
                        );
                        pore.position.set(Math.cos(a)*Math.cos(b)*r, Math.sin(b)*r, Math.sin(a)*Math.cos(b)*r);
                        pore.lookAt(0,0,0);
                        g.add(pore);
                    }
                    return g;
                }
            },
            {
                key: 'mito', name: 'Mitochondrion', role: 'Powerhouse', color: 0xff6655,
                desc: 'Generates ATP via oxidative phosphorylation. The cristae fold dramatically increases inner-membrane surface area.',
                pos: [1.2, 0.7, -0.6],
                build: () => {
                    const g = new THREE.Group();
                    // Outer pill shape
                    const outer = new THREE.Mesh(
                        new THREE.CapsuleGeometry(0.22, 0.5, 8, 16),
                        new THREE.MeshStandardMaterial({ color: 0xff6655, roughness: 0.4, transparent: true, opacity: 0.7 })
                    );
                    outer.rotation.z = Math.PI / 2;
                    g.add(outer);
                    // Cristae (ridges)
                    for (let i = 0; i < 8; i++) {
                        const ridge = new THREE.Mesh(
                            new THREE.TorusGeometry(0.16, 0.025, 8, 18, Math.PI),
                            new THREE.MeshStandardMaterial({ color: 0xcc3322, roughness: 0.6 })
                        );
                        ridge.position.x = -0.35 + (i / 7) * 0.7;
                        ridge.rotation.y = Math.PI / 2;
                        ridge.rotation.x = (i % 2 === 0) ? 0.4 : -0.4;
                        g.add(ridge);
                    }
                    return g;
                }
            },
            {
                key: 'er', name: 'Endoplasmic Reticulum', role: 'Protein factory', color: 0xffaa66,
                desc: 'A network of folded membranes; rough ER (with ribosomes) makes proteins, smooth ER makes lipids and detoxifies.',
                pos: [-1.1, -0.3, 0.8],
                build: () => {
                    const g = new THREE.Group();
                    // Stacked sheets
                    for (let i = 0; i < 4; i++) {
                        const sheet = new THREE.Mesh(
                            new THREE.TorusGeometry(0.42, 0.07, 12, 32),
                            new THREE.MeshStandardMaterial({ color: 0xffaa66, roughness: 0.55, side: THREE.DoubleSide })
                        );
                        sheet.position.y = (i - 1.5) * 0.13;
                        sheet.rotation.x = Math.PI / 2 + (i % 2) * 0.2;
                        sheet.scale.x = 1 - i * 0.1;
                        g.add(sheet);
                        // Ribosome bumps
                        for (let r = 0; r < 8; r++) {
                            const ang = (r / 8) * Math.PI * 2;
                            const ribo = new THREE.Mesh(
                                new THREE.SphereGeometry(0.025, 8, 8),
                                new THREE.MeshStandardMaterial({ color: 0x553311, roughness: 0.5 })
                            );
                            ribo.position.set(Math.cos(ang)*0.5, sheet.position.y, Math.sin(ang)*0.5);
                            g.add(ribo);
                        }
                    }
                    return g;
                }
            },
            {
                key: 'golgi', name: 'Golgi Apparatus', role: 'Packaging & shipping', color: 0xddc870,
                desc: 'Modifies, sorts, and packages proteins from the ER into vesicles for delivery to their cellular destinations.',
                pos: [0.6, -1.1, 0.6],
                build: () => {
                    const g = new THREE.Group();
                    for (let i = 0; i < 5; i++) {
                        const s = new THREE.Mesh(
                            new THREE.TorusGeometry(0.32 - i*0.04, 0.05, 8, 24),
                            new THREE.MeshStandardMaterial({ color: 0xddc870, roughness: 0.45 })
                        );
                        s.position.y = i * 0.1 - 0.2;
                        s.rotation.x = Math.PI / 2;
                        g.add(s);
                    }
                    // Vesicles
                    for (let i = 0; i < 6; i++) {
                        const v = new THREE.Mesh(
                            new THREE.SphereGeometry(0.06, 12, 8),
                            new THREE.MeshStandardMaterial({ color: 0xffe39e, roughness: 0.4 })
                        );
                        v.position.set((Math.random()-0.5)*0.9, 0.45+Math.random()*0.3, (Math.random()-0.5)*0.9);
                        g.add(v);
                    }
                    return g;
                }
            },
            {
                key: 'lysosome', name: 'Lysosome', role: 'Recycling centre', color: 0xff44aa,
                desc: 'Acidic, enzyme-filled vesicles that break down waste, damaged organelles, and pathogens.',
                pos: [-0.8, 1.0, 0.5],
                build: () => {
                    const g = new THREE.Group();
                    const m = new THREE.Mesh(
                        new THREE.SphereGeometry(0.22, 24, 16),
                        new THREE.MeshStandardMaterial({ color: 0xff44aa, roughness: 0.55, transparent: true, opacity: 0.85 })
                    );
                    g.add(m);
                    // Inner enzymes
                    for (let i = 0; i < 12; i++) {
                        const e = new THREE.Mesh(
                            new THREE.TetrahedronGeometry(0.025),
                            new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, emissive: 0xff88cc, emissiveIntensity: 0.3 })
                        );
                        const r = Math.random()*0.18;
                        const a = Math.random()*Math.PI*2, b = Math.random()*Math.PI*2;
                        e.position.set(Math.cos(a)*r, Math.sin(b)*r, Math.sin(a)*Math.cos(b)*r);
                        g.add(e);
                    }
                    return g;
                }
            },
            {
                key: 'ribo', name: 'Free Ribosome', role: 'Translation machine', color: 0x88cc44,
                desc: 'Small RNA-protein factory that reads mRNA and assembles polypeptide chains, amino acid by amino acid.',
                pos: [1.0, -0.8, -1.2],
                build: () => {
                    const g = new THREE.Group();
                    const big = new THREE.Mesh(
                        new THREE.SphereGeometry(0.13, 16, 12),
                        new THREE.MeshStandardMaterial({ color: 0x6a9a3a, roughness: 0.55 })
                    );
                    big.scale.set(1.2, 1, 1.1);
                    g.add(big);
                    const small = new THREE.Mesh(
                        new THREE.SphereGeometry(0.09, 14, 10),
                        new THREE.MeshStandardMaterial({ color: 0xa8d05f, roughness: 0.5 })
                    );
                    small.position.y = 0.13;
                    small.scale.set(1.1, 0.8, 1);
                    g.add(small);
                    return g;
                }
            },
            {
                key: 'cyto', name: 'Cytoskeleton', role: 'Internal scaffolding', color: 0x44ddcc,
                desc: 'A web of microtubules and actin filaments that gives the cell shape and serves as tracks for vesicle traffic.',
                pos: [-1.4, -0.7, -0.6],
                build: () => {
                    const g = new THREE.Group();
                    for (let i = 0; i < 18; i++) {
                        const len = 0.4 + Math.random() * 0.5;
                        const fil = new THREE.Mesh(
                            new THREE.CylinderGeometry(0.015, 0.015, len, 6),
                            new THREE.MeshStandardMaterial({ color: 0x44ddcc, emissive: 0x208a85, emissiveIntensity: 0.2, roughness: 0.4 })
                        );
                        fil.position.set((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5);
                        fil.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                        g.add(fil);
                    }
                    return g;
                }
            },
            {
                key: 'centro', name: 'Centrosome', role: 'Microtubule organizer', color: 0xddaa44,
                desc: 'Two perpendicular centrioles that anchor microtubules and direct chromosome separation during cell division.',
                pos: [0.3, 1.4, -0.8],
                build: () => {
                    const g = new THREE.Group();
                    const m1 = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.07, 0.07, 0.22, 9),
                        new THREE.MeshStandardMaterial({ color: 0xddaa44, metalness: 0.3, roughness: 0.45 })
                    );
                    g.add(m1);
                    const m2 = m1.clone();
                    m2.rotation.z = Math.PI / 2;
                    m2.position.x = 0.16;
                    g.add(m2);
                    // outward microtubule rays
                    for (let i = 0; i < 12; i++) {
                        const a = (i / 12) * Math.PI * 2;
                        const ray = new THREE.Mesh(
                            new THREE.CylinderGeometry(0.005, 0.005, 0.4, 4),
                            new THREE.MeshBasicMaterial({ color: 0xfff2c2, transparent: true, opacity: 0.4 })
                        );
                        ray.position.set(Math.cos(a)*0.25, 0, Math.sin(a)*0.25);
                        ray.rotation.z = a;
                        g.add(ray);
                    }
                    return g;
                }
            }
        ];

        const meshIndex = []; // for raycasting
        const organelleGroups = [];

        ORGANELLES.forEach((o, i) => {
            const mesh = o.build();
            mesh.position.set(...o.pos);
            mesh.userData.index = i;
            // tag every child so raycaster picks correctly
            mesh.traverse(child => {
                if (child.isMesh) {
                    child.userData.organelleIndex = i;
                    meshIndex.push(child);
                }
            });
            scene.add(mesh);
            organelleGroups.push(mesh);
        });

        // Soft glow halo for selected organelle
        const halo = new THREE.Mesh(
            new THREE.SphereGeometry(1, 24, 16),
            new THREE.MeshBasicMaterial({ color: 0xffd089, transparent: true, opacity: 0.0, side: THREE.BackSide })
        );
        halo.visible = false;
        scene.add(halo);

        // ---------------- Side menu buttons ----------------
        const buttonsEl = document.getElementById('organelle-buttons');
        ORGANELLES.forEach((o, i) => {
            const btn = document.createElement('button');
            btn.className = 'organelle-btn';
            btn.dataset.index = i;
            btn.innerHTML = `<span class="swatch" style="background:#${o.color.toString(16).padStart(6,'0')};color:#${o.color.toString(16).padStart(6,'0')}"></span>${o.name}`;
            btn.addEventListener('click', () => selectOrganelle(i));
            buttonsEl.appendChild(btn);
        });

        // ---------------- Selection / info card ----------------
        const card = document.getElementById('info-card');
        const closeBtn = document.getElementById('close-card');
        let activeIndex = -1;

        function selectOrganelle(i) {
            activeIndex = i;
            const o = ORGANELLES[i];
            document.getElementById('card-name').textContent = o.name;
            document.getElementById('card-role').textContent = o.role;
            document.getElementById('card-desc').textContent = o.desc;
            // Fake stats — but consistent per organelle
            const verts = ((o.key.charCodeAt(0) * 1037) % 8000) + 2400;
            document.getElementById('card-verts').textContent = verts.toLocaleString();
            document.getElementById('card-mat').textContent = ['PBR', 'Glass', 'Subsurf', 'Metallic', 'Standard', 'PBR', 'Toon', 'Metallic'][i];
            document.getElementById('card-gen').textContent = `${(0.6 + (i % 4) * 0.4).toFixed(1)}s`;
            document.getElementById('card-tool').textContent = ['Tripo', 'Hunyuan3D', 'Tripo', 'Hunyuan3D', 'Tripo', 'Hunyuan3D', 'Tripo', 'Hunyuan3D'][i];
            card.classList.add('visible');

            document.querySelectorAll('.organelle-btn').forEach((b, idx) => b.classList.toggle('active', idx === i));

            // Halo on the selected organelle
            halo.visible = true;
            const target = organelleGroups[i];
            const box = new THREE.Box3().setFromObject(target);
            const size = box.getSize(new THREE.Vector3()).length();
            const center = box.getCenter(new THREE.Vector3());
            halo.position.copy(center);
            halo.scale.setScalar(size * 0.65);
            halo.material.color.setHex(o.color);
            halo.material.opacity = 0.18;

            // Soft camera focus
            controls.target.copy(center);
        }

        function deselect() {
            card.classList.remove('visible');
            activeIndex = -1;
            halo.visible = false;
            document.querySelectorAll('.organelle-btn').forEach(b => b.classList.remove('active'));
            controls.target.set(0, 0, 0);
        }

        closeBtn.addEventListener('click', deselect);

        // ---------------- Click-to-select via raycasting ----------------
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        renderer.domElement.addEventListener('click', (event) => {
            mouse.x = (event.clientX / innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(meshIndex, false);
            if (hits.length) {
                const idx = hits[0].object.userData.organelleIndex;
                if (idx !== undefined) selectOrganelle(idx);
            }
        });

        // Hover cursor
        renderer.domElement.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(meshIndex, false);
            renderer.domElement.style.cursor = hits.length ? 'pointer' : 'default';
        });

        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            // halo gentle pulse
            if (halo.visible) {
                halo.material.opacity = 0.15 + Math.sin(performance.now() * 0.003) * 0.05;
            }
            // gentle float on each organelle for life
            organelleGroups.forEach((g, i) => {
                g.rotation.y += 0.002 + i * 0.0004;
                g.position.y = ORGANELLES[i].pos[1] + Math.sin(performance.now() * 0.001 + i) * 0.04;
            });
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
