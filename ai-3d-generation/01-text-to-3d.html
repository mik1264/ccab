<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-3D Generator — AI 3D Generation</title>
    <style>
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0c1018;
            color: #e8e6e1;
        }

        #container { width: 100vw; height: 100vh; }

        .back-link {
            position: fixed;
            top: 14px; left: 14px;
            padding: 8px 14px;
            background: rgba(254, 250, 224, 0.9);
            color: var(--terracotta);
            text-decoration: none;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            z-index: 20;
            backdrop-filter: blur(8px);
        }

        .back-link:hover { background: white; }

        #panel {
            position: fixed;
            bottom: 18px; left: 50%;
            transform: translateX(-50%);
            width: min(640px, calc(100vw - 28px));
            background: rgba(12, 16, 24, 0.78);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(138, 154, 91, 0.3);
            border-radius: 18px;
            padding: 16px 18px;
            z-index: 15;
        }

        #prompt-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #prompt {
            flex: 1;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.4);
            color: #fefae0;
            font-size: 14px;
            font-family: inherit;
        }

        #prompt:focus {
            outline: none;
            border-color: var(--sage);
            box-shadow: 0 0 0 3px rgba(138, 154, 91, 0.25);
        }

        #generate {
            padding: 10px 22px;
            background: linear-gradient(135deg, var(--sage), var(--moss));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #generate:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(138,154,91,0.4); }
        #generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #presets {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .preset {
            background: rgba(138, 154, 91, 0.18);
            color: #cce0a3;
            border: 1px solid rgba(138, 154, 91, 0.35);
            padding: 5px 12px;
            border-radius: 11px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .preset:hover { background: rgba(138, 154, 91, 0.35); }

        #status {
            position: fixed;
            top: 14px; right: 14px;
            background: rgba(12, 16, 24, 0.78);
            backdrop-filter: blur(10px);
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-family: 'SF Mono', Consolas, monospace;
            color: #cce0a3;
            z-index: 15;
            min-width: 180px;
        }

        #status .step {
            color: #cce0a3;
            font-weight: 600;
            margin-bottom: 4px;
        }

        #status .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px;
        }

        #status .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--sage), var(--earth));
            width: 0%;
            transition: width 0.25s ease;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to AI 3D Generation</a>

    <div id="container"></div>

    <div id="status">
        <div class="step" id="step-text">Idle — pick a prompt</div>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    </div>

    <div id="panel">
        <div id="prompt-row">
            <input id="prompt" type="text" placeholder="A small dragon, detailed scales..." value="A glowing crystal heart">
            <button id="generate">Generate</button>
        </div>
        <div id="presets">
            <button class="preset" data-prompt="A glowing crystal heart" data-shape="heart">crystal heart</button>
            <button class="preset" data-prompt="An ancient stone skull" data-shape="skull">stone skull</button>
            <button class="preset" data-prompt="A friendly cartoon dragon" data-shape="dragon">cartoon dragon</button>
            <button class="preset" data-prompt="A spiky alien artifact" data-shape="artifact">alien artifact</button>
            <button class="preset" data-prompt="A potted bonsai tree" data-shape="bonsai">bonsai tree</button>
            <button class="preset" data-prompt="A floating island" data-shape="island">floating island</button>
        </div>
    </div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                   "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0c1018);
        scene.fog = new THREE.FogExp2(0x0c1018, 0.04);

        const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 200);
        camera.position.set(0, 1.2, 6.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.getElementById('container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.6;

        // Lighting — Tripo-style studio lights
        scene.add(new THREE.AmbientLight(0x444a5a, 0.6));
        const key = new THREE.DirectionalLight(0xfff2d6, 1.2);
        key.position.set(4, 6, 5);
        scene.add(key);
        const rim = new THREE.PointLight(0x8aa6ff, 1.0, 40);
        rim.position.set(-5, 2, -4);
        scene.add(rim);
        const fill = new THREE.PointLight(0xffaa66, 0.8, 30);
        fill.position.set(3, -2, 3);
        scene.add(fill);

        // Floor disc with grid (organic-nature platform)
        const floor = new THREE.Mesh(
            new THREE.CircleGeometry(8, 64),
            new THREE.MeshStandardMaterial({ color: 0x1a2030, roughness: 0.85, metalness: 0.2 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -1.5;
        scene.add(floor);

        const grid = new THREE.GridHelper(16, 24, 0x8a9a5b, 0x303d4d);
        grid.position.y = -1.499;
        grid.material.opacity = 0.4;
        grid.material.transparent = true;
        scene.add(grid);

        // ============== Procedural shape "AI generation" ==============
        // Each shape is a deformed sphere built from a different displacement
        // function. We generate point clouds first, then condense into a mesh
        // — mimicking the diffusion + voxel + meshing pipeline.

        const SHAPE_FUNCS = {
            heart: (p) => {
                const x = p.x, y = p.y, z = p.z;
                const r2 = x*x + 2.25*y*y + z*z - 1;
                const h = r2*r2*r2 - x*x*y*y*y - 0.1*z*z*y*y*y;
                return -h;
            },
            skull: (p) => {
                const r = p.length();
                const eyes = -Math.exp(-((p.x-0.35)**2 + (p.y-0.15)**2 + (p.z-0.7)**2)*30)
                             - Math.exp(-((p.x+0.35)**2 + (p.y-0.15)**2 + (p.z-0.7)**2)*30);
                const jaw = -Math.exp(-((p.x)**2 + (p.y+0.5)**2 + (p.z-0.5)**2)*8) * 0.4;
                return 1.05 - r + eyes*0.3 + jaw + 0.04*Math.sin(p.x*8)*Math.cos(p.y*7);
            },
            dragon: (p) => {
                // elongated egg with bumps for spines
                const s = Math.sqrt(p.x*p.x*1.2 + p.y*p.y + (p.z-0.4)*(p.z-0.4)*0.5);
                const spines = 0.12*Math.sin(p.z*9) * Math.max(0, p.y);
                const tail = 0.4*Math.exp(-((p.z+1.2)**2 + p.x*p.x)*2);
                return 1.0 - s + spines + tail;
            },
            artifact: (p) => {
                const r = p.length();
                return 0.95 - r + 0.18*Math.sin(p.x*6)*Math.sin(p.y*6)*Math.sin(p.z*6);
            },
            bonsai: (p) => {
                // trunk + canopy
                const trunk = -Math.sqrt(p.x*p.x + p.z*p.z) + 0.18 - Math.max(0, p.y - 0.2);
                const canopy = 0.9 - Math.sqrt(p.x*p.x + (p.y-0.6)*(p.y-0.6)*1.2 + p.z*p.z) + 0.1*Math.sin(p.x*5+p.y*4+p.z*5);
                return Math.max(trunk*1.3, canopy);
            },
            island: (p) => {
                // upper terrain + downward cone
                const ground = -p.y + 0.2 + 0.3*Math.sin(p.x*2)*Math.cos(p.z*2);
                const cone = -Math.sqrt(p.x*p.x + p.z*p.z) - p.y - 0.3;
                return Math.max(ground, cone);
            }
        };

        const COLORS = {
            heart:    { a: 0xff4a6e, b: 0xffaadd, m: 0.5, r: 0.25 },
            skull:    { a: 0xece4d2, b: 0x8a8676, m: 0.1, r: 0.85 },
            dragon:   { a: 0x4a7c59, b: 0xb38a3a, m: 0.4, r: 0.45 },
            artifact: { a: 0x6a4ad9, b: 0x40e0d0, m: 0.8, r: 0.18 },
            bonsai:   { a: 0x3d6e3d, b: 0x6b4a2d, m: 0.05, r: 0.9 },
            island:   { a: 0x5e8c3a, b: 0x7a5a3a, m: 0.05, r: 0.85 }
        };

        let currentMesh = null;
        let pointCloud = null;
        let isGenerating = false;

        function buildMesh(shapeKey) {
            // Use IcosahedronGeometry, displace each vertex outward until it
            // hits the implicit surface defined by SHAPE_FUNCS[shapeKey].
            const fn = SHAPE_FUNCS[shapeKey];
            const geo = new THREE.IcosahedronGeometry(1, 6);
            const pos = geo.attributes.position;
            const v = new THREE.Vector3();
            for (let i = 0; i < pos.count; i++) {
                v.fromBufferAttribute(pos, i).normalize();
                // raymarch out from origin until f(p) < 0
                let t = 0.05;
                for (let s = 0; s < 40; s++) {
                    const p = v.clone().multiplyScalar(t);
                    const f = fn(p);
                    if (f <= 0) break;
                    t += 0.05 + 0.02 * f;
                    if (t > 2.5) break;
                }
                pos.setXYZ(i, v.x*t, v.y*t, v.z*t);
            }
            geo.computeVertexNormals();
            // Vertex colors based on height
            const colors = new Float32Array(pos.count * 3);
            const c = COLORS[shapeKey];
            const ca = new THREE.Color(c.a);
            const cb = new THREE.Color(c.b);
            for (let i = 0; i < pos.count; i++) {
                const y = pos.getY(i);
                const t = THREE.MathUtils.clamp((y + 1) * 0.5, 0, 1);
                const col = ca.clone().lerp(cb, t);
                colors[i*3] = col.r; colors[i*3+1] = col.g; colors[i*3+2] = col.b;
            }
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            const mat = new THREE.MeshStandardMaterial({
                vertexColors: true,
                metalness: c.m,
                roughness: c.r,
                flatShading: false
            });
            return new THREE.Mesh(geo, mat);
        }

        function buildPointCloud(targetMesh, count = 4000) {
            // Sample random points around a sphere, with a hint of the target.
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const tgtPos = targetMesh.geometry.attributes.position;
            const tgtCol = targetMesh.geometry.attributes.color;
            for (let i = 0; i < count; i++) {
                // pick a random vertex on target as the "destination"
                const idx = Math.floor(Math.random() * tgtPos.count);
                positions[i*3]   = (Math.random() - 0.5) * 6;
                positions[i*3+1] = (Math.random() - 0.5) * 6;
                positions[i*3+2] = (Math.random() - 0.5) * 6;
                colors[i*3]   = tgtCol.getX(idx);
                colors[i*3+1] = tgtCol.getY(idx);
                colors[i*3+2] = tgtCol.getZ(idx);
            }
            const g = new THREE.BufferGeometry();
            g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            g.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            // store targets per point
            const targets = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const idx = Math.floor(Math.random() * tgtPos.count);
                targets[i*3]   = tgtPos.getX(idx);
                targets[i*3+1] = tgtPos.getY(idx);
                targets[i*3+2] = tgtPos.getZ(idx);
            }
            g.userData.targets = targets;
            const m = new THREE.PointsMaterial({
                size: 0.03,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            return new THREE.Points(g, m);
        }

        // Step status
        const stepText = document.getElementById('step-text');
        const progressBar = document.getElementById('progress');

        function setStep(label, pct) {
            stepText.textContent = label;
            progressBar.style.width = `${pct}%`;
        }

        function disposeObject(obj) {
            if (!obj) return;
            scene.remove(obj);
            if (obj.geometry) obj.geometry.dispose();
            if (obj.material) {
                if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                else obj.material.dispose();
            }
        }

        // Map a free-text prompt to the closest preset shape
        function inferShape(text) {
            text = text.toLowerCase();
            const map = [
                ['heart', 'heart'], ['love', 'heart'], ['valentine', 'heart'],
                ['skull', 'skull'], ['bone', 'skull'], ['death', 'skull'],
                ['dragon', 'dragon'], ['lizard', 'dragon'], ['serpent', 'dragon'],
                ['artifact', 'artifact'], ['alien', 'artifact'], ['gem', 'artifact'],
                ['bonsai', 'bonsai'], ['tree', 'bonsai'], ['plant', 'bonsai'],
                ['island', 'island'], ['land', 'island'], ['terrain', 'island']
            ];
            for (const [kw, key] of map) if (text.includes(kw)) return key;
            return 'artifact';
        }

        async function generate(shapeKey) {
            if (isGenerating) return;
            isGenerating = true;
            document.getElementById('generate').disabled = true;

            disposeObject(currentMesh);
            disposeObject(pointCloud);
            currentMesh = null; pointCloud = null;

            // --- Stage 1: encode prompt (fake delay)
            setStep('1/4 · Encoding prompt → latent', 8);
            await sleep(450);

            // --- Stage 2: noise field
            setStep('2/4 · Sampling noise field', 22);
            // Build target mesh up-front, hide it
            const target = buildMesh(shapeKey);
            currentMesh = target;
            target.visible = false;
            scene.add(target);

            pointCloud = buildPointCloud(target, 4500);
            scene.add(pointCloud);
            await sleep(500);

            // --- Stage 3: diffusion (animate point cloud toward target)
            setStep('3/4 · Diffusion sampling (24 steps)', 35);
            const pos = pointCloud.geometry.attributes.position;
            const tgt = pointCloud.geometry.userData.targets;
            const STEPS = 24;
            for (let s = 0; s < STEPS; s++) {
                const t = (s + 1) / STEPS;
                for (let i = 0; i < pos.count; i++) {
                    const px = pos.getX(i), py = pos.getY(i), pz = pos.getZ(i);
                    const tx = tgt[i*3], ty = tgt[i*3+1], tz = tgt[i*3+2];
                    // jitter decreases with t
                    const j = (1 - t) * 0.05;
                    pos.setXYZ(i,
                        px + (tx - px) * (0.08 + 0.12 * t) + (Math.random() - 0.5) * j,
                        py + (ty - py) * (0.08 + 0.12 * t) + (Math.random() - 0.5) * j,
                        pz + (tz - pz) * (0.08 + 0.12 * t) + (Math.random() - 0.5) * j
                    );
                }
                pos.needsUpdate = true;
                setStep(`3/4 · Diffusion step ${s+1}/${STEPS}`, 35 + (s/STEPS) * 50);
                await sleep(40);
            }

            // --- Stage 4: meshing
            setStep('4/4 · Extracting mesh (marching cubes)', 90);
            await sleep(400);
            target.visible = true;
            // fade out point cloud
            for (let f = 0; f <= 12; f++) {
                pointCloud.material.opacity = 0.9 * (1 - f/12);
                target.material.opacity = f / 12;
                target.material.transparent = true;
                await sleep(35);
            }
            target.material.transparent = false;
            target.material.opacity = 1;
            disposeObject(pointCloud); pointCloud = null;

            setStep('Done · 12,288 vertices · 24,572 faces', 100);
            isGenerating = false;
            document.getElementById('generate').disabled = false;
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        document.getElementById('generate').addEventListener('click', () => {
            const prompt = document.getElementById('prompt').value;
            generate(inferShape(prompt));
        });

        document.querySelectorAll('.preset').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('prompt').value = btn.dataset.prompt;
                generate(btn.dataset.shape);
            });
        });

        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Auto-start on load
        generate('heart');
    </script>
</body>
</html>
