<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image-to-3D Studio — AI 3D Generation</title>
    <style>
        :root { --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E; --terracotta: #BC6C25; }
        * { box-sizing: border-box; }
        body {
            margin: 0; overflow: hidden;
            font-family: -apple-system, sans-serif;
            background: #0c1018;
            color: #e8e6e1;
        }
        #container { width: 100vw; height: 100vh; }

        .back-link {
            position: fixed; top: 14px; left: 14px;
            padding: 8px 14px;
            background: rgba(254,250,224,0.9);
            color: var(--terracotta);
            text-decoration: none;
            border-radius: 14px;
            font-size: 13px; font-weight: 600;
            z-index: 20;
        }

        #panel {
            position: fixed; top: 14px; right: 14px;
            background: rgba(12,16,24,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(138,154,91,0.3);
            border-radius: 14px;
            padding: 14px;
            z-index: 15;
            width: 220px;
        }

        #panel h3 { margin: 0 0 10px; font-size: 14px; color: #cce0a3; font-weight: 700; }

        .stages {
            display: flex; gap: 8px;
            margin-bottom: 12px;
        }

        .thumb {
            width: 60px; height: 60px;
            border-radius: 8px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .thumb canvas { width: 100%; height: 100%; display: block; }
        .thumb .lbl { position: absolute; bottom: 2px; left: 4px; font-size: 9px; color: #cce0a3; text-shadow: 0 0 4px black; }

        .sample-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }

        .sample-btn {
            aspect-ratio: 1;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
            transition: border-color 0.2s ease;
        }

        .sample-btn:hover { border-color: var(--sage); }
        .sample-btn.active { border-color: var(--earth); box-shadow: 0 0 0 2px rgba(221,161,94,0.3); }
        .sample-btn canvas { width: 100%; height: 100%; display: block; }

        #upload-row {
            display: flex; gap: 6px; margin-top: 8px;
        }

        #upload-btn, #regen-btn {
            flex: 1;
            padding: 7px;
            background: linear-gradient(135deg, var(--sage), var(--moss));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        #upload-btn:hover, #regen-btn:hover { filter: brightness(1.15); }
        #upload-input { display: none; }

        #info {
            position: fixed;
            bottom: 14px; left: 50%;
            transform: translateX(-50%);
            background: rgba(12,16,24,0.78);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 12px;
            font-family: 'SF Mono', monospace;
            color: #cce0a3;
            z-index: 15;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to AI 3D Generation</a>

    <div id="container"></div>

    <div id="panel">
        <h3>Pipeline</h3>
        <div class="stages">
            <div class="thumb"><canvas id="th-input" width="60" height="60"></canvas><span class="lbl">input</span></div>
            <div class="thumb"><canvas id="th-depth" width="60" height="60"></canvas><span class="lbl">depth</span></div>
            <div class="thumb"><canvas id="th-normal" width="60" height="60"></canvas><span class="lbl">normal</span></div>
        </div>

        <h3>Samples</h3>
        <div class="sample-row" id="samples"></div>

        <div id="upload-row">
            <button id="upload-btn" type="button">Upload</button>
            <button id="regen-btn" type="button">Re-run</button>
            <input id="upload-input" type="file" accept="image/*">
        </div>
    </div>

    <div id="info">drag to rotate · scroll to zoom · subject lifted from 2D depth field</div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                   "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0c1018);

        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
        camera.position.set(0, 0, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        document.getElementById('container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;

        scene.add(new THREE.AmbientLight(0x666677, 0.7));
        const key = new THREE.DirectionalLight(0xffffff, 1.1);
        key.position.set(3, 5, 4); scene.add(key);
        const rim = new THREE.PointLight(0xffaa66, 1, 20);
        rim.position.set(-4, 1, -3); scene.add(rim);

        // ---------------- Sample image generators (procedural) ----------------
        // Each draws a stylized silhouette in a small canvas. For depth lifting,
        // brighter-grey channel = closer to camera.

        const SAMPLES = {
            face: { label: 'face', draw: (ctx, w, h) => {
                ctx.fillStyle = '#0c1018'; ctx.fillRect(0,0,w,h);
                const grad = ctx.createRadialGradient(w*0.5, h*0.5, w*0.05, w*0.5, h*0.5, w*0.45);
                grad.addColorStop(0, '#ffe4c2');
                grad.addColorStop(0.6, '#c08a5a');
                grad.addColorStop(1, '#3a2718');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(w*0.5, h*0.55, w*0.32, h*0.4, 0, 0, Math.PI*2);
                ctx.fill();
                // forehead shine
                ctx.fillStyle = 'rgba(255,255,255,0.25)';
                ctx.beginPath(); ctx.ellipse(w*0.5, h*0.32, w*0.18, h*0.08, 0, 0, Math.PI*2); ctx.fill();
                // eye sockets dark spots
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath(); ctx.ellipse(w*0.4, h*0.5, w*0.05, h*0.025, 0, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(w*0.6, h*0.5, w*0.05, h*0.025, 0, 0, Math.PI*2); ctx.fill();
            }},
            owl: { label: 'owl', draw: (ctx, w, h) => {
                ctx.fillStyle = '#0c1018'; ctx.fillRect(0,0,w,h);
                // body
                const grad = ctx.createRadialGradient(w*0.5, h*0.55, w*0.05, w*0.5, h*0.55, w*0.5);
                grad.addColorStop(0, '#d8b489');
                grad.addColorStop(0.5, '#8a6238');
                grad.addColorStop(1, '#2a1a0d');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.ellipse(w*0.5, h*0.6, w*0.36, h*0.42, 0, 0, Math.PI*2); ctx.fill();
                // head
                const grad2 = ctx.createRadialGradient(w*0.5, h*0.3, w*0.04, w*0.5, h*0.3, w*0.3);
                grad2.addColorStop(0, '#e8c89a'); grad2.addColorStop(1, '#5a3a1c');
                ctx.fillStyle = grad2;
                ctx.beginPath(); ctx.ellipse(w*0.5, h*0.3, w*0.28, h*0.25, 0, 0, Math.PI*2); ctx.fill();
                // eyes
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(w*0.4, h*0.32, w*0.07, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(w*0.6, h*0.32, w*0.07, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(w*0.4, h*0.32, w*0.04, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(w*0.6, h*0.32, w*0.04, 0, Math.PI*2); ctx.fill();
            }},
            rocket: { label: 'rocket', draw: (ctx, w, h) => {
                ctx.fillStyle = '#0c1018'; ctx.fillRect(0,0,w,h);
                // body
                const grad = ctx.createLinearGradient(w*0.3, 0, w*0.7, 0);
                grad.addColorStop(0, '#666'); grad.addColorStop(0.5, '#eee'); grad.addColorStop(1, '#666');
                ctx.fillStyle = grad;
                ctx.fillRect(w*0.4, h*0.2, w*0.2, h*0.55);
                // nose cone
                ctx.fillStyle = '#cc4444';
                ctx.beginPath(); ctx.moveTo(w*0.5, h*0.05); ctx.lineTo(w*0.4, h*0.22); ctx.lineTo(w*0.6, h*0.22); ctx.fill();
                // fins
                ctx.fillStyle = '#aa3333';
                ctx.beginPath(); ctx.moveTo(w*0.4, h*0.6); ctx.lineTo(w*0.25, h*0.78); ctx.lineTo(w*0.4, h*0.78); ctx.fill();
                ctx.beginPath(); ctx.moveTo(w*0.6, h*0.6); ctx.lineTo(w*0.75, h*0.78); ctx.lineTo(w*0.6, h*0.78); ctx.fill();
                // window
                ctx.fillStyle = '#88ccff'; ctx.beginPath(); ctx.arc(w*0.5, h*0.35, w*0.05, 0, Math.PI*2); ctx.fill();
            }},
            apple: { label: 'apple', draw: (ctx, w, h) => {
                ctx.fillStyle = '#0c1018'; ctx.fillRect(0,0,w,h);
                const grad = ctx.createRadialGradient(w*0.42, h*0.42, w*0.04, w*0.5, h*0.55, w*0.42);
                grad.addColorStop(0, '#ff9a8a'); grad.addColorStop(0.6, '#cc2222'); grad.addColorStop(1, '#3a0a0a');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.ellipse(w*0.5, h*0.55, w*0.36, h*0.36, 0, 0, Math.PI*2); ctx.fill();
                // dimple on top
                ctx.fillStyle = '#0c1018';
                ctx.beginPath(); ctx.ellipse(w*0.5, h*0.2, w*0.08, h*0.04, 0, 0, Math.PI*2); ctx.fill();
                // stem
                ctx.strokeStyle = '#5a3a1c'; ctx.lineWidth = w*0.025; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(w*0.5, h*0.2); ctx.lineTo(w*0.55, h*0.1); ctx.stroke();
                // leaf
                ctx.fillStyle = '#3a8a3a';
                ctx.beginPath(); ctx.ellipse(w*0.6, h*0.14, w*0.06, h*0.025, -0.5, 0, Math.PI*2); ctx.fill();
            }},
            cat: { label: 'cat', draw: (ctx, w, h) => {
                ctx.fillStyle = '#0c1018'; ctx.fillRect(0,0,w,h);
                // body
                const grad = ctx.createRadialGradient(w*0.5, h*0.55, w*0.04, w*0.5, h*0.55, w*0.4);
                grad.addColorStop(0, '#e0c8a0'); grad.addColorStop(1, '#3a2018');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.ellipse(w*0.5, h*0.6, w*0.3, h*0.32, 0, 0, Math.PI*2); ctx.fill();
                // head
                const grad2 = ctx.createRadialGradient(w*0.5, h*0.3, w*0.03, w*0.5, h*0.3, w*0.25);
                grad2.addColorStop(0, '#f0d8b0'); grad2.addColorStop(1, '#5a3018');
                ctx.fillStyle = grad2;
                ctx.beginPath(); ctx.ellipse(w*0.5, h*0.3, w*0.22, h*0.2, 0, 0, Math.PI*2); ctx.fill();
                // ears
                ctx.fillStyle = '#aa6a3a';
                ctx.beginPath(); ctx.moveTo(w*0.32, h*0.18); ctx.lineTo(w*0.4, h*0.05); ctx.lineTo(w*0.46, h*0.18); ctx.fill();
                ctx.beginPath(); ctx.moveTo(w*0.68, h*0.18); ctx.lineTo(w*0.6, h*0.05); ctx.lineTo(w*0.54, h*0.18); ctx.fill();
                // eyes
                ctx.fillStyle = '#3a8a3a';
                ctx.beginPath(); ctx.ellipse(w*0.43, h*0.3, w*0.025, h*0.04, 0, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(w*0.57, h*0.3, w*0.025, h*0.04, 0, 0, Math.PI*2); ctx.fill();
                // nose
                ctx.fillStyle = '#cc6688'; ctx.beginPath(); ctx.arc(w*0.5, h*0.36, w*0.012, 0, Math.PI*2); ctx.fill();
            }},
            mug: { label: 'mug', draw: (ctx, w, h) => {
                ctx.fillStyle = '#0c1018'; ctx.fillRect(0,0,w,h);
                // body
                const grad = ctx.createLinearGradient(w*0.3, 0, w*0.7, 0);
                grad.addColorStop(0, '#3a3a3a'); grad.addColorStop(0.4, '#dddddd'); grad.addColorStop(1, '#3a3a3a');
                ctx.fillStyle = grad;
                ctx.fillRect(w*0.32, h*0.3, w*0.36, h*0.5);
                // top oval
                ctx.fillStyle = '#553322';
                ctx.beginPath(); ctx.ellipse(w*0.5, h*0.3, w*0.18, h*0.05, 0, 0, Math.PI*2); ctx.fill();
                // handle
                ctx.strokeStyle = '#aaaaaa'; ctx.lineWidth = w*0.04;
                ctx.beginPath(); ctx.arc(w*0.7, h*0.55, w*0.1, -Math.PI/2, Math.PI/2); ctx.stroke();
            }}
        };

        // ---------------- Pipeline canvases ----------------
        const SIZE = 96; // working resolution for the depth field
        const inputCanvas = document.createElement('canvas');
        inputCanvas.width = SIZE; inputCanvas.height = SIZE;
        const inputCtx = inputCanvas.getContext('2d', { willReadFrequently: true });

        const depthCanvas = document.createElement('canvas');
        depthCanvas.width = SIZE; depthCanvas.height = SIZE;
        const depthCtx = depthCanvas.getContext('2d');

        const normalCanvas = document.createElement('canvas');
        normalCanvas.width = SIZE; normalCanvas.height = SIZE;
        const normalCtx = normalCanvas.getContext('2d');

        // small thumbnail copies into the panel
        const thIn = document.getElementById('th-input');
        const thDe = document.getElementById('th-depth');
        const thNo = document.getElementById('th-normal');

        function copyToThumb(src, dstCanvas) {
            const ctx = dstCanvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.drawImage(src, 0, 0, dstCanvas.width, dstCanvas.height);
        }

        // ---------------- Estimate depth from luminance ----------------
        // Background pixels (very dark) → far. Foreground pixels (bright) → near.
        // We also add a bowing / centre-bias for a 3D-feeling depth.
        function estimateDepth() {
            const inImg = inputCtx.getImageData(0, 0, SIZE, SIZE).data;
            const out = depthCtx.createImageData(SIZE, SIZE);
            const depth = new Float32Array(SIZE * SIZE);
            const cx = SIZE/2, cy = SIZE/2;
            for (let y = 0; y < SIZE; y++) {
                for (let x = 0; x < SIZE; x++) {
                    const i = (y*SIZE + x) * 4;
                    const r = inImg[i], g = inImg[i+1], b = inImg[i+2];
                    const lum = 0.299*r + 0.587*g + 0.114*b;
                    // detect "background" (matches the bg #0c1018 — low lum)
                    const isBg = lum < 35;
                    let d;
                    if (isBg) d = 0;
                    else {
                        // map lum to depth, with centre-bias dome
                        const dx = (x - cx) / cx, dy = (y - cy) / cy;
                        const dome = Math.max(0, 1 - (dx*dx + dy*dy));
                        d = 0.45 * (lum / 255) + 0.55 * dome;
                    }
                    depth[y*SIZE + x] = d;
                    const v = Math.floor(d * 255);
                    out.data[i] = v; out.data[i+1] = v; out.data[i+2] = v; out.data[i+3] = 255;
                }
            }
            depthCtx.putImageData(out, 0, 0);
            return depth;
        }

        function computeNormalMap(depth) {
            const out = normalCtx.createImageData(SIZE, SIZE);
            const STRENGTH = 4;
            for (let y = 0; y < SIZE; y++) {
                for (let x = 0; x < SIZE; x++) {
                    const dx = (depth[y*SIZE + Math.min(SIZE-1,x+1)] - depth[y*SIZE + Math.max(0,x-1)]) * STRENGTH;
                    const dy = (depth[Math.min(SIZE-1,y+1)*SIZE + x] - depth[Math.max(0,y-1)*SIZE + x]) * STRENGTH;
                    const len = Math.hypot(dx, dy, 1);
                    const nx = -dx / len, ny = -dy / len, nz = 1 / len;
                    const i = (y*SIZE + x) * 4;
                    out.data[i]   = Math.floor((nx * 0.5 + 0.5) * 255);
                    out.data[i+1] = Math.floor((ny * 0.5 + 0.5) * 255);
                    out.data[i+2] = Math.floor((nz * 0.5 + 0.5) * 255);
                    out.data[i+3] = 255;
                }
            }
            normalCtx.putImageData(out, 0, 0);
        }

        // ---------------- Build a 3D mesh from the depth field ----------------
        let currentMesh = null;
        let currentTexture = null;

        function buildMeshFromDepth(depth) {
            if (currentMesh) {
                scene.remove(currentMesh);
                currentMesh.geometry.dispose();
                currentMesh.material.dispose();
            }
            if (currentTexture) currentTexture.dispose();

            // Plane geometry, displace each vertex by depth, mirror to back
            const geo = new THREE.PlaneGeometry(2.4, 2.4, SIZE - 1, SIZE - 1);
            const pos = geo.attributes.position;
            const FRONT_OFFSET = 0.0;
            for (let i = 0; i < pos.count; i++) {
                const x = i % SIZE;
                const y = Math.floor(i / SIZE);
                const d = depth[y*SIZE + x];
                pos.setZ(i, d * 0.8);
            }
            geo.computeVertexNormals();

            // Texture from input image
            currentTexture = new THREE.CanvasTexture(inputCanvas);
            currentTexture.colorSpace = THREE.SRGBColorSpace;

            const mat = new THREE.MeshStandardMaterial({
                map: currentTexture,
                roughness: 0.7,
                metalness: 0.05,
                side: THREE.DoubleSide
            });

            currentMesh = new THREE.Mesh(geo, mat);
            // Plane vertices go top-to-bottom in V; our depth array is also y from 0..SIZE
            // PlaneGeometry maps y so v=0 at bottom, but our image y=0 is top.
            // Flip Y by mirroring the geometry on the X axis (rotate 180° around X).
            currentMesh.rotation.x = Math.PI; // flip orientation
            currentMesh.rotation.y = Math.PI; // also mirror so texture reads correctly
            scene.add(currentMesh);
        }

        // ---------------- Run pipeline ----------------
        let activeKey = 'face';
        function runPipeline(sampleKey) {
            activeKey = sampleKey;
            // 1. draw the source image
            inputCtx.fillStyle = '#0c1018';
            inputCtx.fillRect(0, 0, SIZE, SIZE);
            SAMPLES[sampleKey].draw(inputCtx, SIZE, SIZE);
            copyToThumb(inputCanvas, thIn);

            // 2. estimate depth
            const depth = estimateDepth();
            copyToThumb(depthCanvas, thDe);

            // 3. compute normals
            computeNormalMap(depth);
            copyToThumb(normalCanvas, thNo);

            // 4. build mesh
            buildMeshFromDepth(depth);

            // update active button
            document.querySelectorAll('.sample-btn').forEach(b => b.classList.toggle('active', b.dataset.key === sampleKey));
        }

        // Build sample swatches in the panel
        const samplesEl = document.getElementById('samples');
        Object.entries(SAMPLES).forEach(([key, sample]) => {
            const btn = document.createElement('button');
            btn.className = 'sample-btn'; btn.dataset.key = key;
            btn.type = 'button';
            const c = document.createElement('canvas');
            c.width = 48; c.height = 48;
            sample.draw(c.getContext('2d'), 48, 48);
            btn.appendChild(c);
            btn.addEventListener('click', () => runPipeline(key));
            samplesEl.appendChild(btn);
        });

        // Upload handling
        document.getElementById('upload-btn').addEventListener('click', () => {
            document.getElementById('upload-input').click();
        });
        document.getElementById('upload-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                inputCtx.fillStyle = '#0c1018';
                inputCtx.fillRect(0, 0, SIZE, SIZE);
                // Fit-cover the image into the canvas
                const scale = Math.max(SIZE / img.width, SIZE / img.height);
                const w = img.width * scale, h = img.height * scale;
                inputCtx.drawImage(img, (SIZE - w)/2, (SIZE - h)/2, w, h);
                copyToThumb(inputCanvas, thIn);
                const depth = estimateDepth();
                copyToThumb(depthCanvas, thDe);
                computeNormalMap(depth);
                copyToThumb(normalCanvas, thNo);
                buildMeshFromDepth(depth);
                URL.revokeObjectURL(url);
            };
            img.src = url;
        });
        document.getElementById('regen-btn').addEventListener('click', () => runPipeline(activeKey));

        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        runPipeline('face');
    </script>
</body>
</html>
