<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh Topology Builder — AI 3D Generation</title>
    <style>
        :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --terracotta:#BC6C25; }
        body { margin:0; overflow:hidden; font-family:-apple-system,sans-serif; background:#08101e; color:#e8e6e1; }
        #container { width: 100vw; height: 100vh; }
        .back-link {
            position: fixed; top: 14px; left: 14px;
            padding: 8px 14px; background: rgba(254,250,224,0.9); color: var(--terracotta);
            text-decoration: none; border-radius: 14px; font-size: 13px; font-weight: 600; z-index: 20;
        }
        #panel {
            position: fixed; top: 14px; right: 14px;
            background: rgba(8,16,30,0.85); backdrop-filter: blur(12px);
            border: 1px solid rgba(138,154,91,0.3); border-radius: 14px;
            padding: 14px; z-index: 15; width: 240px;
        }
        #panel h3 { margin: 0 0 10px; font-size: 14px; color: #cce0a3; }
        .row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin: 8px 0; font-size: 12px; color: #9bb1d8; }
        .row input[type="range"] { flex: 1; }
        .val { font-family: monospace; color: #e0d499; min-width: 36px; text-align: right; font-size: 12px; }
        .stats { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: monospace; font-size: 11px; color: #cce0a3; }
        .stats div { display: flex; justify-content: space-between; margin: 2px 0; }
        .shape-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
        .shape-btn {
            flex: 1; padding: 6px;
            background: rgba(255,255,255,0.08); color: #cce0a3;
            border: 1px solid rgba(138,154,91,0.3); border-radius: 6px;
            font-size: 11px; font-weight: 600; cursor: pointer;
        }
        .shape-btn.active { background: linear-gradient(135deg, var(--sage), var(--moss)); color:white; border-color: transparent; }
        button.action {
            width: 100%; padding: 8px; margin-top: 8px;
            background: linear-gradient(135deg, var(--sage), var(--moss));
            color: white; border: none; border-radius: 8px;
            font-size: 12px; font-weight: 700; cursor: pointer;
        }
        #info {
            position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
            background: rgba(8,16,30,0.78); backdrop-filter: blur(10px);
            padding: 10px 18px; border-radius: 12px; font-size: 12px; font-family: monospace;
            color: #cce0a3; z-index: 15;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to AI 3D Generation</a>
    <div id="container"></div>

    <div id="panel">
        <h3>Topology Builder</h3>

        <div class="shape-row">
            <button class="shape-btn active" data-shape="bunny">bunny</button>
            <button class="shape-btn" data-shape="head">head</button>
            <button class="shape-btn" data-shape="torus">torus</button>
            <button class="shape-btn" data-shape="vase">vase</button>
        </div>

        <div class="row">
            <span>Speed</span>
            <input id="speed" type="range" min="1" max="120" value="30">
            <span class="val" id="speed-val">30</span>
        </div>
        <div class="row">
            <span>Show wireframe</span>
            <input id="wire" type="checkbox" checked>
        </div>
        <div class="row">
            <span>Show fill</span>
            <input id="fill" type="checkbox" checked>
        </div>

        <div class="stats">
            <div><span>Stage</span><span id="stage">building</span></div>
            <div><span>Quads placed</span><span id="quads">0</span></div>
            <div><span>Vertices</span><span id="verts">0</span></div>
            <div><span>Coverage</span><span id="cov">0%</span></div>
        </div>

        <button class="action" id="restart">Restart</button>
    </div>

    <div id="info">Tripo-style auto-retopology: clean quads laid down face-by-face from the predicted surface.</div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                   "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x08101e);
        scene.fog = new THREE.FogExp2(0x08101e, 0.05);

        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
        camera.position.set(0, 0.5, 4.6);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        document.getElementById('container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        scene.add(new THREE.AmbientLight(0x444466, 0.6));
        const key = new THREE.DirectionalLight(0xffffff, 1); key.position.set(3, 5, 4); scene.add(key);
        const rim = new THREE.PointLight(0xffaa66, 1, 20); rim.position.set(-4, 2, -3); scene.add(rim);

        // Build a parametric grid mesh for each "shape" — each cell is a quad.
        // We'll render quads progressively in a "scan" order.
        const SHAPES = {
            // Each shape is parametric: f(u, v) -> Vector3, where u,v in [0,1]
            torus: (u, v) => {
                const a = u * Math.PI * 2, b = v * Math.PI * 2;
                const R = 1.1, r = 0.42;
                return new THREE.Vector3((R + r*Math.cos(b))*Math.cos(a), r*Math.sin(b), (R + r*Math.cos(b))*Math.sin(a));
            },
            vase: (u, v) => {
                const a = u * Math.PI * 2;
                const t = v;
                const r = 0.35 + 0.45*Math.sin(t*Math.PI) + 0.12*Math.sin(t*Math.PI*4);
                return new THREE.Vector3(Math.cos(a)*Math.max(0.1,r), (t-0.5)*2.4, Math.sin(a)*Math.max(0.1,r));
            },
            bunny: (u, v) => {
                // Surface of revolution-ish blobby shape
                const a = u * Math.PI * 2;
                const t = v;
                // body + head bump
                const body = 0.85 * Math.sin(t * Math.PI);
                const head = 0.3 * Math.exp(-Math.pow((t - 0.85) * 8, 2));
                const r = body + head;
                const y = (t - 0.5) * 2.0 + 0.15 * Math.exp(-Math.pow((t - 0.85) * 5, 2));
                // ears: stretch top vertically near specific u
                const earU = Math.cos(a*2) * Math.exp(-Math.pow((t - 0.95) * 7, 2)) * 0.5;
                return new THREE.Vector3(Math.cos(a)*r, y + earU, Math.sin(a)*r);
            },
            head: (u, v) => {
                const a = u * Math.PI * 2;
                const t = v;
                const profile = 0.85*Math.sin(t*Math.PI);
                const chin = 0.15*Math.exp(-Math.pow((t-0.15)*6,2));
                const nose = 0.18*Math.exp(-Math.pow((t-0.5)*8,2)) * Math.exp(-Math.pow(Math.sin(a)*4,2));
                const r = profile + chin;
                const x = Math.cos(a) * r * (1 + 0.2*Math.exp(-Math.pow((t-0.7)*5,2)));
                return new THREE.Vector3(x + nose * (Math.cos(a) > 0 ? Math.cos(a) : 0), (t-0.5)*2.0, Math.sin(a)*r);
            }
        };

        const U_RES = 40;
        const V_RES = 24;

        let activeShape = 'bunny';
        let quads = [];   // each quad: 4 vertices in world space
        let placedCount = 0;
        let placeOrder = [];

        // Three.js objects we update each frame
        let wireMesh = null;
        let fillMesh = null;
        let scanLine = null;

        function buildShapeData(key) {
            const fn = SHAPES[key];
            // Build vertex grid
            const verts = [];
            for (let v = 0; v <= V_RES; v++) {
                for (let u = 0; u <= U_RES; u++) {
                    verts.push(fn(u / U_RES, v / V_RES));
                }
            }
            quads = [];
            for (let v = 0; v < V_RES; v++) {
                for (let u = 0; u < U_RES; u++) {
                    const i00 = v * (U_RES + 1) + u;
                    const i10 = i00 + 1;
                    const i01 = i00 + (U_RES + 1);
                    const i11 = i01 + 1;
                    quads.push({ verts: [verts[i00], verts[i10], verts[i11], verts[i01]], u, v });
                }
            }
            // Build a placement order: spiral from middle outward by sorting by manhattan distance to centre
            const cu = U_RES/2, cv = V_RES/2;
            placeOrder = quads.map((q, idx) => idx);
            placeOrder.sort((a, b) => {
                const qa = quads[a], qb = quads[b];
                const da = Math.abs(qa.u - cu) + Math.abs(qa.v - cv);
                const db = Math.abs(qb.u - cu) + Math.abs(qb.v - cv);
                return da - db;
            });

            placedCount = 0;
            rebuildBuffers();
        }

        function rebuildBuffers() {
            // Remove old
            if (wireMesh) { scene.remove(wireMesh); wireMesh.geometry.dispose(); }
            if (fillMesh) { scene.remove(fillMesh); fillMesh.geometry.dispose(); fillMesh.material.dispose(); }
            if (scanLine) { scene.remove(scanLine); scanLine.geometry.dispose(); }

            const totalQuads = quads.length;
            const totalTris = totalQuads * 2;

            // Fill mesh: one buffer of triangles, draw range based on placedCount
            const fillGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(totalTris * 9);
            const normals = new Float32Array(totalTris * 9);
            const colors = new Float32Array(totalTris * 9);
            // Pre-fill positions in placement order
            for (let i = 0; i < placeOrder.length; i++) {
                const q = quads[placeOrder[i]];
                const v00 = q.verts[0], v10 = q.verts[1], v11 = q.verts[2], v01 = q.verts[3];
                const e1 = new THREE.Vector3().subVectors(v10, v00);
                const e2 = new THREE.Vector3().subVectors(v01, v00);
                const n = new THREE.Vector3().crossVectors(e1, e2).normalize();
                const base = i * 18;
                // tri 1: v00, v10, v11
                positions[base+0] = v00.x; positions[base+1] = v00.y; positions[base+2] = v00.z;
                positions[base+3] = v10.x; positions[base+4] = v10.y; positions[base+5] = v10.z;
                positions[base+6] = v11.x; positions[base+7] = v11.y; positions[base+8] = v11.z;
                // tri 2: v00, v11, v01
                positions[base+9]  = v00.x; positions[base+10] = v00.y; positions[base+11] = v00.z;
                positions[base+12] = v11.x; positions[base+13] = v11.y; positions[base+14] = v11.z;
                positions[base+15] = v01.x; positions[base+16] = v01.y; positions[base+17] = v01.z;
                for (let k = 0; k < 6; k++) {
                    normals[base + k*3]   = n.x;
                    normals[base + k*3+1] = n.y;
                    normals[base + k*3+2] = n.z;
                }
                // Tint colors slightly per quad
                const hue = 0.08 + (i / placeOrder.length) * 0.15;
                const c = new THREE.Color().setHSL(hue, 0.5, 0.55);
                for (let k = 0; k < 6; k++) {
                    colors[base + k*3]   = c.r;
                    colors[base + k*3+1] = c.g;
                    colors[base + k*3+2] = c.b;
                }
            }
            fillGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            fillGeo.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
            fillGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            fillGeo.setDrawRange(0, 0);
            const fillMat = new THREE.MeshStandardMaterial({
                vertexColors: true, metalness: 0.3, roughness: 0.55,
                side: THREE.DoubleSide, flatShading: true
            });
            fillMesh = new THREE.Mesh(fillGeo, fillMat);
            scene.add(fillMesh);

            // Wireframe: one line buffer with 4 segments per quad
            const wireGeo = new THREE.BufferGeometry();
            const wirePos = new Float32Array(totalQuads * 4 * 6); // 4 edges, 2 verts, 3 coords
            for (let i = 0; i < placeOrder.length; i++) {
                const q = quads[placeOrder[i]];
                const v = q.verts;
                const base = i * 24;
                // 4 edges: 0-1, 1-2, 2-3, 3-0
                for (let e = 0; e < 4; e++) {
                    const a = v[e], b = v[(e+1)%4];
                    wirePos[base + e*6 + 0] = a.x;
                    wirePos[base + e*6 + 1] = a.y;
                    wirePos[base + e*6 + 2] = a.z;
                    wirePos[base + e*6 + 3] = b.x;
                    wirePos[base + e*6 + 4] = b.y;
                    wirePos[base + e*6 + 5] = b.z;
                }
            }
            wireGeo.setAttribute('position', new THREE.BufferAttribute(wirePos, 3));
            wireGeo.setDrawRange(0, 0);
            wireMesh = new THREE.LineSegments(wireGeo, new THREE.LineBasicMaterial({
                color: 0xffd089, transparent: true, opacity: 0.9
            }));
            scene.add(wireMesh);

            // Scan line: glowing ring at the current placement front
            const scanGeo = new THREE.BufferGeometry();
            scanGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(120*3), 3));
            scanLine = new THREE.LineLoop(scanGeo, new THREE.LineBasicMaterial({
                color: 0xff7a3a, transparent: true, opacity: 0.9
            }));
            scene.add(scanLine);
        }

        function update() {
            if (placedCount > placeOrder.length) placedCount = placeOrder.length;
            const trisShown = placedCount * 6;       // 6 vertices per quad in fill buffer
            const linesShown = placedCount * 8;       // 8 vertex indices per quad in wire buffer
            fillMesh.geometry.setDrawRange(0, trisShown);
            wireMesh.geometry.setDrawRange(0, linesShown);

            // Stats
            document.getElementById('quads').textContent = placedCount;
            document.getElementById('verts').textContent = placedCount * 4;
            document.getElementById('cov').textContent = `${Math.floor((placedCount / quads.length) * 100)}%`;
            document.getElementById('stage').textContent = placedCount >= quads.length ? 'done' : 'building';
        }

        // Speed = quads per second
        let lastT = performance.now();
        let acc = 0;
        let isBuilding = true;

        function tick() {
            const now = performance.now();
            const dt = (now - lastT) / 1000;
            lastT = now;
            const speed = parseFloat(document.getElementById('speed').value);

            if (isBuilding && placedCount < quads.length) {
                acc += dt * speed;
                while (acc >= 1 && placedCount < quads.length) {
                    placedCount++;
                    acc -= 1;
                }
                update();
            }
            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(tick);
        }

        // UI
        document.getElementById('speed').addEventListener('input', (e) => {
            document.getElementById('speed-val').textContent = e.target.value;
        });
        document.getElementById('wire').addEventListener('change', (e) => wireMesh.visible = e.target.checked);
        document.getElementById('fill').addEventListener('change', (e) => fillMesh.visible = e.target.checked);
        document.getElementById('restart').addEventListener('click', () => {
            placedCount = 0; acc = 0;
            update();
        });
        document.querySelectorAll('.shape-btn').forEach(b => {
            b.addEventListener('click', () => {
                document.querySelectorAll('.shape-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                activeShape = b.dataset.shape;
                buildShapeData(activeShape);
                update();
            });
        });

        addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        buildShapeData(activeShape);
        tick();
    </script>
</body>
</html>
