<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Circle vs Rhumb Line Routes | Bird Migration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d1b2a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info {
            position: fixed; top: 10px; right: 10px; background: rgba(13,27,42,0.92);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 280px;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.6;
        }
        #stats {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(13,27,42,0.92); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.82rem; z-index: 100;
            border: 1px solid rgba(138,154,91,0.3); text-align: center;
        }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(13,27,42,0.92); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 14px; display: flex; gap: 14px;
            align-items: center; z-index: 100; color: #FEFAE0; font-size: 0.82rem;
            border: 1px solid rgba(138,154,91,0.3); flex-wrap: wrap; justify-content: center;
        }
        button.route-btn {
            background: rgba(138,154,91,0.3); border: 1px solid rgba(138,154,91,0.5);
            color: #FEFAE0; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        button.route-btn:hover, button.route-btn.active { background: rgba(138,154,91,0.6); }
        .gc { color: #8A9A5B; font-weight: bold; }
        .rl { color: #DDA15E; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <strong style="color:#DDA15E;">Route Planning</strong><br>
        <span class="gc">Great Circle</span> = shortest path on a sphere (changing heading).<br>
        <span class="rl">Rhumb Line</span> = constant compass heading (longer distance).<br>
        <div style="margin-top:6px;font-size:0.75rem;opacity:0.7;">
            Click two points on the globe to set departure and arrival. At high latitudes, great circles save significant distance.
        </div>
    </div>
    <div id="stats"></div>
    <div id="controls">
        <button class="route-btn active" id="routeArctic">Arctic Tern</button>
        <button class="route-btn" id="routeWarbler">Garden Warbler</button>
        <button class="route-btn" id="routeGodwit">Bar-tailed Godwit</button>
        <button class="route-btn" id="routeCustom">Click to Set</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let time = 0;
        let rotation = 0;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const routes = {
            arctic: { from: { lat: 70, lon: -20 }, to: { lat: -65, lon: 10 }, name: 'Arctic Tern: Greenland to Antarctica' },
            warbler: { from: { lat: 55, lon: 10 }, to: { lat: -5, lon: 30 }, name: 'Garden Warbler: Europe to Central Africa' },
            godwit: { from: { lat: 63, lon: 170 }, to: { lat: -37, lon: 175 }, name: 'Bar-tailed Godwit: Alaska to New Zealand' }
        };

        let currentRoute = 'arctic';
        let customStart = null, customEnd = null, clickMode = false;
        let birdProgress = 0;

        // Preset route buttons
        document.querySelectorAll('.route-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (btn.id === 'routeCustom') {
                    clickMode = true;
                    customStart = null;
                    customEnd = null;
                } else {
                    clickMode = false;
                    currentRoute = btn.id.replace('route', '').toLowerCase();
                }
                birdProgress = 0;
            });
        });

        const globeR = () => Math.min(W, H) * 0.32;

        function toRad(d) { return d * Math.PI / 180; }
        function toDeg(r) { return r * 180 / Math.PI; }

        function project(lat, lon) {
            const r = globeR();
            const la = toRad(lat);
            const lo = toRad(lon) + rotation;
            const x = r * Math.cos(la) * Math.sin(lo);
            const y = -r * Math.sin(la);
            const z = r * Math.cos(la) * Math.cos(lo);
            if (z < -r * 0.1) return null; // behind globe
            return { x: W / 2 + x, y: H / 2 + y, z };
        }

        // Haversine distance (km)
        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = toRad(lat2 - lat1);
            const dLon = toRad(lon2 - lon1);
            const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Great circle intermediate points
        function greatCirclePoint(lat1, lon1, lat2, lon2, f) {
            const la1 = toRad(lat1), lo1 = toRad(lon1);
            const la2 = toRad(lat2), lo2 = toRad(lon2);
            const d = 2 * Math.asin(Math.sqrt(Math.sin((la2-la1)/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin((lo2-lo1)/2)**2));
            if (d < 0.0001) return { lat: lat1, lon: lon1 };
            const A = Math.sin((1-f)*d) / Math.sin(d);
            const B = Math.sin(f*d) / Math.sin(d);
            const x = A * Math.cos(la1) * Math.cos(lo1) + B * Math.cos(la2) * Math.cos(lo2);
            const y = A * Math.cos(la1) * Math.sin(lo1) + B * Math.cos(la2) * Math.sin(lo2);
            const z = A * Math.sin(la1) + B * Math.sin(la2);
            return { lat: toDeg(Math.atan2(z, Math.sqrt(x*x + y*y))), lon: toDeg(Math.atan2(y, x)) };
        }

        // Rhumb line intermediate points
        function rhumbPoint(lat1, lon1, lat2, lon2, f) {
            const lat = lat1 + f * (lat2 - lat1);
            const dLat = toRad(lat2 - lat1);
            const dPhi = Math.log(Math.tan(toRad(lat2)/2 + Math.PI/4) / Math.tan(toRad(lat1)/2 + Math.PI/4));
            const q = Math.abs(dPhi) > 1e-12 ? dLat / dPhi : Math.cos(toRad(lat1));
            let dLon = toRad(lon2 - lon1);
            if (Math.abs(dLon) > Math.PI) dLon = dLon > 0 ? -(2*Math.PI - dLon) : (2*Math.PI + dLon);
            const lon = lon1 + f * toDeg(dLon);
            return { lat, lon };
        }

        // Rhumb line distance
        function rhumbDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = toRad(lat2 - lat1);
            const dPhi = Math.log(Math.tan(toRad(lat2)/2 + Math.PI/4) / Math.tan(toRad(lat1)/2 + Math.PI/4));
            const q = Math.abs(dPhi) > 1e-12 ? dLat / dPhi : Math.cos(toRad(lat1));
            let dLon = toRad(lon2 - lon1);
            if (Math.abs(dLon) > Math.PI) dLon = dLon > 0 ? -(2*Math.PI - dLon) : (2*Math.PI + dLon);
            return R * Math.sqrt(dLat*dLat + q*q*dLon*dLon);
        }

        function drawGlobe() {
            const r = globeR();
            const cx = W / 2, cy = H / 2;

            // Globe fill
            const grad = ctx.createRadialGradient(cx - r * 0.2, cy - r * 0.2, 0, cx, cy, r);
            grad.addColorStop(0, '#1b3a5c');
            grad.addColorStop(1, '#0d1b2a');
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Grid lines
            ctx.strokeStyle = 'rgba(138,154,91,0.12)';
            ctx.lineWidth = 0.5;

            // Latitude lines
            for (let lat = -60; lat <= 60; lat += 30) {
                ctx.beginPath();
                let started = false;
                for (let lon = -180; lon <= 180; lon += 3) {
                    const p = project(lat, lon);
                    if (!p) { started = false; continue; }
                    if (!started) { ctx.moveTo(p.x, p.y); started = true; }
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }

            // Longitude lines
            for (let lon = -180; lon < 180; lon += 30) {
                ctx.beginPath();
                let started = false;
                for (let lat = -90; lat <= 90; lat += 3) {
                    const p = project(lat, lon);
                    if (!p) { started = false; continue; }
                    if (!started) { ctx.moveTo(p.x, p.y); started = true; }
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }

            // Simple continent outlines (very simplified)
            drawContinent([
                [70,-25],[65,0],[55,10],[50,0],[48,10],[45,15],[40,25],[35,25],[30,30],[25,35],[10,40],[5,42],[-5,40],[-15,35],[-25,30],[-35,20],[-35,15],[-30,17],[-20,15],[-10,10],[0,5],[5,0],[5,-10],[0,-5],[-5,-15],[-10,-10],[-20,-15],[-25,-20],[-30,-30],[-35,-55],[-55,-65],[-55,-60],[-40,-50],[-20,-40],[-10,-20],[0,-15],[5,-10],[10,-15],[15,-17],[20,-17],[25,-15],[30,-10],[35,-5],[40,0],[45,-5],[55,-10],[60,-10],[65,-15],[70,-25]
            ]);
        }

        function drawContinent(points) {
            ctx.beginPath();
            let started = false;
            points.forEach(([lat, lon]) => {
                const p = project(lat, lon);
                if (!p) { started = false; return; }
                if (!started) { ctx.moveTo(p.x, p.y); started = true; }
                else ctx.lineTo(p.x, p.y);
            });
            ctx.closePath();
            ctx.fillStyle = 'rgba(96,108,56,0.15)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(96,108,56,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function getRoute() {
            if (clickMode && customStart && customEnd) {
                return { from: customStart, to: customEnd };
            }
            return routes[currentRoute] || routes.arctic;
        }

        function drawRoute() {
            const route = getRoute();
            if (!route) return;

            const { from, to } = route;
            const steps = 60;

            // Great circle path
            ctx.beginPath();
            let gcStarted = false;
            for (let i = 0; i <= steps; i++) {
                const f = i / steps;
                const pt = greatCirclePoint(from.lat, from.lon, to.lat, to.lon, f);
                const p = project(pt.lat, pt.lon);
                if (!p) { gcStarted = false; continue; }
                if (!gcStarted) { ctx.moveTo(p.x, p.y); gcStarted = true; }
                else ctx.lineTo(p.x, p.y);
            }
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Rhumb line path
            ctx.beginPath();
            let rlStarted = false;
            for (let i = 0; i <= steps; i++) {
                const f = i / steps;
                const pt = rhumbPoint(from.lat, from.lon, to.lat, to.lon, f);
                const p = project(pt.lat, pt.lon);
                if (!p) { rlStarted = false; continue; }
                if (!rlStarted) { ctx.moveTo(p.x, p.y); rlStarted = true; }
                else ctx.lineTo(p.x, p.y);
            }
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Endpoints
            [from, to].forEach((pt, i) => {
                const p = project(pt.lat, pt.lon);
                if (!p) return;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = i === 0 ? '#8A9A5B' : '#DDA15E';
                ctx.fill();
                ctx.strokeStyle = '#FEFAE0';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            });

            // Animated bird on great circle path
            birdProgress += 0.003;
            if (birdProgress > 1) birdProgress = 0;
            const birdPt = greatCirclePoint(from.lat, from.lon, to.lat, to.lon, birdProgress);
            const birdP = project(birdPt.lat, birdPt.lon);
            if (birdP) {
                ctx.save();
                ctx.translate(birdP.x, birdP.y);
                const wf = Math.sin(time * 6) * 4;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(-10, wf - 2, -14, wf);
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(10, wf - 2, 14, wf);
                ctx.strokeStyle = '#FEFAE0';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(0, 0, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#FEFAE0';
                ctx.fill();
                ctx.restore();
            }

            // Stats
            const gcDist = haversine(from.lat, from.lon, to.lat, to.lon);
            const rlDist = rhumbDistance(from.lat, from.lon, to.lat, to.lon);
            const saving = ((rlDist - gcDist) / rlDist * 100).toFixed(1);
            const statsEl = document.getElementById('stats');
            const routeName = routes[currentRoute] ? routes[currentRoute].name : 'Custom Route';
            statsEl.innerHTML = `<strong>${routeName}</strong><br>` +
                `<span class="gc">Great Circle: ${Math.round(gcDist).toLocaleString()} km</span> | ` +
                `<span class="rl">Rhumb Line: ${Math.round(rlDist).toLocaleString()} km</span> | ` +
                `Savings: <span style="color:#8A9A5B;font-weight:bold;">${saving}%</span>`;
        }

        // Click to set custom points
        canvas.addEventListener('click', (e) => {
            if (!clickMode) return;
            const r = globeR();
            const dx = e.clientX - W / 2;
            const dy = e.clientY - H / 2;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > r) return;

            // Approximate inverse projection
            const lon = toDeg(Math.asin(dx / r)) - toDeg(rotation);
            const lat = -toDeg(Math.asin(dy / r));

            if (!customStart) {
                customStart = { lat, lon };
            } else if (!customEnd) {
                customEnd = { lat, lon };
                birdProgress = 0;
            } else {
                customStart = { lat, lon };
                customEnd = null;
                birdProgress = 0;
            }
        });

        // Auto-rotate
        let isDragging = false, lastX = 0;
        canvas.addEventListener('mousedown', (e) => { if (!clickMode) { isDragging = true; lastX = e.clientX; } });
        canvas.addEventListener('mousemove', (e) => { if (isDragging) { rotation += (e.clientX - lastX) * 0.005; lastX = e.clientX; } });
        canvas.addEventListener('mouseup', () => isDragging = false);

        function animate() {
            ctx.fillStyle = '#0d1b2a';
            ctx.fillRect(0, 0, W, H);

            if (!isDragging) rotation += 0.002;

            drawGlobe();
            if (getRoute().from && getRoute().to) drawRoute();

            time += 0.016;
            requestAnimationFrame(animate);
        }

        animate();

        window.reset = function() {
            time = 0;
            rotation = 0;
            birdProgress = 0;
            customStart = null;
            customEnd = null;
            currentRoute = 'arctic';
            clickMode = false;
            document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('routeArctic').classList.add('active');
        };
    })();
    </script>
</body>
</html>
