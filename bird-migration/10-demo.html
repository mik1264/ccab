<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Migration Flyways | Bird Migration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0f1a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info {
            position: fixed; top: 10px; right: 10px; background: rgba(10,15,26,0.92);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 270px;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.6;
        }
        #legend {
            position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
            background: rgba(10,15,26,0.92); backdrop-filter: blur(10px);
            padding: 10px 18px; border-radius: 12px; display: flex; gap: 16px;
            z-index: 100; color: #FEFAE0; font-size: 0.78rem;
            border: 1px solid rgba(138,154,91,0.3);
        }
        .flyway-legend { display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .flyway-dot { width: 10px; height: 10px; border-radius: 50%; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10,15,26,0.92); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 14px; display: flex; gap: 14px;
            align-items: center; z-index: 100; color: #FEFAE0; font-size: 0.82rem;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls label { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        #controls input[type=range] { width: 100px; accent-color: #DDA15E; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <strong style="color:#DDA15E;">Global Migration Flyways</strong><br>
        Billions of birds follow <span style="color:#8A9A5B;">8 major flyways</span> connecting breeding and wintering grounds. Each flyway has bottleneck sites critical for conservation.<br>
        <div id="flywayInfo" style="margin-top:8px;font-size:0.75rem;"></div>
    </div>
    <div id="legend"></div>
    <div id="controls">
        <label>Month <input type="range" id="month" min="0" max="11" value="3"><span id="monthName">April</span></label>
        <label>Speed <input type="range" id="speed" min="1" max="10" value="3"><span id="spdVal">3</span>x</label>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const monthSlider = document.getElementById('month');
        const speedSlider = document.getElementById('speed');
        monthSlider.oninput = () => document.getElementById('monthName').textContent = months[parseInt(monthSlider.value)];
        speedSlider.oninput = () => document.getElementById('spdVal').textContent = speedSlider.value;

        let time = 0;
        let selectedFlyway = -1;

        // Major flyways (simplified lat/lon waypoints)
        const flyways = [
            {
                name: 'Atlantic Americas',
                color: '#4ECDC4',
                waypoints: [
                    { lat: 65, lon: -70 }, { lat: 45, lon: -72 }, { lat: 30, lon: -80 },
                    { lat: 15, lon: -75 }, { lat: 0, lon: -55 }, { lat: -20, lon: -45 }, { lat: -35, lon: -55 }
                ],
                species: 'Red Knot, Semipalmated Sandpiper',
                birds: 500000000
            },
            {
                name: 'Mississippi Americas',
                color: '#45B7D1',
                waypoints: [
                    { lat: 60, lon: -95 }, { lat: 45, lon: -90 }, { lat: 30, lon: -90 },
                    { lat: 15, lon: -85 }, { lat: 0, lon: -70 }, { lat: -15, lon: -60 }
                ],
                species: 'Whooping Crane, Bobolink',
                birds: 400000000
            },
            {
                name: 'East Atlantic',
                color: '#8A9A5B',
                waypoints: [
                    { lat: 70, lon: 10 }, { lat: 55, lon: -5 }, { lat: 40, lon: -10 },
                    { lat: 25, lon: -15 }, { lat: 10, lon: -10 }, { lat: 0, lon: 5 }, { lat: -15, lon: 15 }
                ],
                species: 'Barnacle Goose, Dunlin',
                birds: 600000000
            },
            {
                name: 'East Africa-West Asia',
                color: '#DDA15E',
                waypoints: [
                    { lat: 60, lon: 40 }, { lat: 45, lon: 35 }, { lat: 35, lon: 35 },
                    { lat: 20, lon: 38 }, { lat: 5, lon: 35 }, { lat: -10, lon: 30 }, { lat: -25, lon: 32 }
                ],
                species: 'White Stork, Lesser Spotted Eagle',
                birds: 300000000
            },
            {
                name: 'Central Asia',
                color: '#BC6C25',
                waypoints: [
                    { lat: 65, lon: 70 }, { lat: 50, lon: 68 }, { lat: 35, lon: 72 },
                    { lat: 25, lon: 75 }, { lat: 15, lon: 78 }, { lat: 5, lon: 80 }
                ],
                species: 'Siberian Crane, Bar-headed Goose',
                birds: 250000000
            },
            {
                name: 'East Asia-Australasia',
                color: '#E8A87C',
                waypoints: [
                    { lat: 65, lon: 140 }, { lat: 50, lon: 130 }, { lat: 35, lon: 120 },
                    { lat: 20, lon: 115 }, { lat: 5, lon: 110 }, { lat: -10, lon: 120 },
                    { lat: -25, lon: 135 }, { lat: -35, lon: 145 }
                ],
                species: 'Spoon-billed Sandpiper, Bar-tailed Godwit',
                birds: 500000000
            },
            {
                name: 'Pacific Americas',
                color: '#95E1D3',
                waypoints: [
                    { lat: 65, lon: -165 }, { lat: 50, lon: -125 }, { lat: 35, lon: -120 },
                    { lat: 20, lon: -105 }, { lat: 5, lon: -85 }, { lat: -15, lon: -75 }, { lat: -35, lon: -72 }
                ],
                species: 'Western Sandpiper, Arctic Tern',
                birds: 350000000
            },
            {
                name: 'West Pacific',
                color: '#F8B500',
                waypoints: [
                    { lat: 60, lon: 160 }, { lat: 40, lon: 140 }, { lat: 25, lon: 125 },
                    { lat: 10, lon: 120 }, { lat: -5, lon: 130 }, { lat: -20, lon: 150 }
                ],
                species: 'Grey-tailed Tattler, Eastern Curlew',
                birds: 200000000
            }
        ];

        // Equirectangular projection
        function project(lat, lon) {
            const x = W * 0.08 + ((lon + 180) / 360) * W * 0.84;
            const y = H * 0.08 + ((90 - lat) / 180) * H * 0.78;
            return { x, y };
        }

        // Simple world outline
        function drawWorld() {
            // Ocean
            ctx.fillStyle = 'rgba(15,25,50,0.3)';
            ctx.fillRect(0, 0, W, H);

            // Grid
            ctx.strokeStyle = 'rgba(138,154,91,0.06)';
            ctx.lineWidth = 0.5;
            for (let lat = -60; lat <= 80; lat += 20) {
                const p1 = project(lat, -180);
                const p2 = project(lat, 180);
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }
            for (let lon = -180; lon <= 180; lon += 30) {
                const p1 = project(-60, lon);
                const p2 = project(80, lon);
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }

            // Equator
            const eq1 = project(0, -180);
            const eq2 = project(0, 180);
            ctx.setLineDash([4, 8]);
            ctx.beginPath();
            ctx.moveTo(eq1.x, eq1.y);
            ctx.lineTo(eq2.x, eq2.y);
            ctx.strokeStyle = 'rgba(254,250,224,0.1)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.setLineDash([]);

            // Simplified continents (very rough outlines)
            const continents = [
                // North America
                [[70,-130],[65,-170],[60,-145],[55,-130],[50,-125],[45,-125],[40,-120],[35,-120],[30,-115],[25,-110],[20,-105],[15,-90],[20,-85],[25,-80],[30,-82],[35,-75],[40,-72],[45,-65],[50,-60],[55,-58],[60,-65],[65,-70],[70,-80],[70,-130]],
                // South America
                [[10,-75],[5,-77],[0,-80],[-5,-80],[-10,-77],[-15,-75],[-20,-60],[-25,-50],[-30,-50],[-35,-55],[-40,-65],[-50,-70],[-55,-68],[-50,-60],[-40,-55],[-30,-40],[-20,-35],[-10,-35],[0,-50],[5,-60],[10,-75]],
                // Europe/Africa
                [[70,30],[65,10],[55,-10],[50,0],[45,-5],[40,-8],[35,-5],[30,0],[25,-15],[20,-17],[15,-17],[10,-10],[5,-5],[0,10],[-5,12],[-10,15],[-15,20],[-20,30],[-25,32],[-30,30],[-35,20],[-35,25],[-30,28],[-20,35],[-10,40],[0,42],[5,40],[10,45],[15,42],[20,40],[25,35],[30,33],[35,36],[38,28],[40,30],[42,32],[45,40],[50,42],[55,48],[60,42],[65,40],[70,30]],
                // Asia
                [[70,180],[70,130],[65,100],[60,70],[55,55],[50,55],[45,50],[40,45],[35,45],[30,50],[25,55],[20,60],[15,75],[10,80],[5,100],[0,105],[-5,110],[-8,115],[0,118],[5,120],[10,125],[15,120],[20,115],[25,120],[30,122],[35,130],[40,135],[45,140],[50,140],[55,137],[60,160],[65,170],[70,180]],
                // Australia
                [[-12,130],[-15,125],[-20,115],[-25,115],[-30,115],[-35,118],[-38,145],[-35,150],[-30,153],[-25,150],[-20,148],[-15,145],[-12,142],[-12,130]]
            ];

            continents.forEach(pts => {
                ctx.beginPath();
                pts.forEach((p, i) => {
                    const proj = project(p[0], p[1]);
                    if (i === 0) ctx.moveTo(proj.x, proj.y);
                    else ctx.lineTo(proj.x, proj.y);
                });
                ctx.closePath();
                ctx.fillStyle = 'rgba(96,108,56,0.12)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(96,108,56,0.25)';
                ctx.lineWidth = 1;
                ctx.stroke();
            });
        }

        function drawFlyways() {
            const month = parseInt(monthSlider.value);
            const spd = parseInt(speedSlider.value);
            // Spring migration: months 2-5, Autumn: months 7-10
            const isSpring = month >= 2 && month <= 5;
            const isAutumn = month >= 7 && month <= 10;
            const migrationActive = isSpring || isAutumn;

            flyways.forEach((fw, fi) => {
                const isSelected = selectedFlyway === fi || selectedFlyway === -1;
                const alpha = isSelected ? 1 : 0.15;

                // Draw path
                const wps = isAutumn ? [...fw.waypoints] : [...fw.waypoints].reverse();
                ctx.beginPath();
                wps.forEach((wp, i) => {
                    const p = project(wp.lat, wp.lon);
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });
                ctx.strokeStyle = fw.color + (isSelected ? '80' : '20');
                ctx.lineWidth = isSelected ? 3 : 1.5;
                ctx.stroke();

                // Glow
                if (isSelected && migrationActive) {
                    ctx.strokeStyle = fw.color + '15';
                    ctx.lineWidth = 12;
                    ctx.stroke();
                }

                // Animated birds along path
                if (migrationActive) {
                    const birdCount = isSelected ? 8 : 3;
                    for (let b = 0; b < birdCount; b++) {
                        const progress = ((time * spd * 0.02 + b / birdCount) % 1);
                        const segIdx = Math.floor(progress * (wps.length - 1));
                        const segProgress = (progress * (wps.length - 1)) - segIdx;

                        if (segIdx >= wps.length - 1) continue;

                        const wp1 = wps[segIdx];
                        const wp2 = wps[segIdx + 1];
                        const lat = wp1.lat + (wp2.lat - wp1.lat) * segProgress;
                        const lon = wp1.lon + (wp2.lon - wp1.lon) * segProgress;
                        const p = project(lat, lon);

                        // Bird
                        const wf = Math.sin(time * 8 + b * 2) * 3;
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.quadraticCurveTo(-5, wf, -8, wf * 1.2);
                        ctx.moveTo(0, 0);
                        ctx.quadraticCurveTo(5, wf, 8, wf * 1.2);
                        ctx.strokeStyle = fw.color + (isSelected ? 'cc' : '40');
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(0, 0, 2, 0, Math.PI * 2);
                        ctx.fillStyle = fw.color + (isSelected ? 'cc' : '40');
                        ctx.fill();
                        ctx.restore();
                    }
                }

                // Breeding/wintering ground markers
                if (isSelected) {
                    const start = project(fw.waypoints[0].lat, fw.waypoints[0].lon);
                    const end = project(fw.waypoints[fw.waypoints.length - 1].lat, fw.waypoints[fw.waypoints.length - 1].lon);

                    [start, end].forEach((p, i) => {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                        ctx.fillStyle = i === 0 ? '#8A9A5B' : '#DDA15E';
                        ctx.fill();
                        ctx.strokeStyle = '#FEFAE0';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    });
                }
            });

            // Update info
            if (selectedFlyway >= 0) {
                const fw = flyways[selectedFlyway];
                document.getElementById('flywayInfo').innerHTML =
                    `<strong style="color:${fw.color}">${fw.name}</strong><br>` +
                    `Key species: ${fw.species}<br>` +
                    `Est. birds: ${(fw.birds / 1000000).toFixed(0)}M annually<br>` +
                    `Status: ${migrationActive ? (isSpring ? '<span style="color:#8A9A5B">Spring northbound</span>' : '<span style="color:#DDA15E">Autumn southbound</span>') : 'Stationary'}`;
            } else {
                document.getElementById('flywayInfo').innerHTML =
                    `Total: ~<strong>50 billion</strong> birds migrate annually<br>` +
                    `Click a flyway for details<br>` +
                    `Status: ${migrationActive ? (isSpring ? '<span style="color:#8A9A5B">Spring migration</span>' : '<span style="color:#DDA15E">Autumn migration</span>') : 'Non-migratory period'}`;
            }
        }

        // Build legend
        const legendEl = document.getElementById('legend');
        flyways.forEach((fw, i) => {
            const div = document.createElement('div');
            div.className = 'flyway-legend';
            div.innerHTML = `<span class="flyway-dot" style="background:${fw.color}"></span>${fw.name}`;
            div.onclick = () => {
                selectedFlyway = selectedFlyway === i ? -1 : i;
            };
            legendEl.appendChild(div);
        });

        function animate() {
            ctx.fillStyle = '#0a0f1a';
            ctx.fillRect(0, 0, W, H);

            drawWorld();
            drawFlyways();

            time += 0.016;
            requestAnimationFrame(animate);
        }

        animate();

        window.reset = function() {
            time = 0;
            selectedFlyway = -1;
        };
    })();
    </script>
</body>
</html>
