<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altitude Selection & Jet Streams | Bird Migration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a1628; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info {
            position: fixed; top: 10px; right: 10px; background: rgba(10,22,40,0.92);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 270px;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.6;
        }
        #altProfile {
            position: fixed; left: 10px; top: 50%; transform: translateY(-50%);
            background: rgba(10,22,40,0.9); backdrop-filter: blur(10px);
            padding: 10px; border-radius: 12px; z-index: 100;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10,22,40,0.92); backdrop-filter: blur(10px);
            padding: 14px 24px; border-radius: 14px; display: flex; gap: 18px;
            align-items: center; z-index: 100; color: #FEFAE0; font-size: 0.82rem;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls label { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        #controls input[type=range] { width: 90px; accent-color: #DDA15E; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <canvas id="altProfile" width="80" height="300"></canvas>
    <div id="info">
        <strong style="color:#DDA15E;">Altitude Selection</strong><br>
        Birds choose flight altitude to exploit <span style="color:#8A9A5B;">favorable winds</span>. Some cross the Himalayas at 9,000m. Bar-headed geese reach jet stream altitudes.<br>
        <div id="flightData" style="margin-top:8px;font-size:0.75rem;"></div>
    </div>
    <div id="controls">
        <label>Season <input type="range" id="season" min="0" max="1" value="0"><span id="seasonLabel">Autumn</span></label>
        <label>Temperature <input type="range" id="temp" min="-20" max="30" value="10"><span id="tempVal">10</span>&deg;C</label>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const altCanvas = document.getElementById('altProfile');
        const actx = altCanvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const seasonSlider = document.getElementById('season');
        const tempSlider = document.getElementById('temp');
        seasonSlider.oninput = () => document.getElementById('seasonLabel').textContent = parseInt(seasonSlider.value) === 0 ? 'Autumn' : 'Spring';
        tempSlider.oninput = () => document.getElementById('tempVal').textContent = tempSlider.value;

        let time = 0;

        // Wind profile at different altitudes (m)
        function getWindAtAltitude(alt, season) {
            // Surface: variable; boundary layer: moderate; free atmosphere: stronger; jet stream: very strong
            const baseDir = season === 0 ? 1 : -1; // tail vs head wind

            if (alt < 500) {
                return { speed: 3 + Math.sin(time * 0.5) * 2, dir: baseDir * 0.8 + Math.sin(alt * 0.01) * 0.3 };
            } else if (alt < 2000) {
                return { speed: 8 + Math.sin(alt * 0.005 + time * 0.3) * 3, dir: baseDir * (0.6 + alt * 0.0002) };
            } else if (alt < 5000) {
                return { speed: 15 + Math.sin(alt * 0.002) * 5, dir: baseDir * (0.3 + Math.sin(alt * 0.001) * 0.5) };
            } else {
                // Jet stream zone
                const jetCore = 8000;
                const distFromJet = Math.abs(alt - jetCore);
                const jetStrength = Math.max(0, 40 - distFromJet * 0.01);
                return { speed: 20 + jetStrength, dir: baseDir * (1 + Math.sin(time * 0.1) * 0.1) };
            }
        }

        function getTemp(alt) {
            const surfaceTemp = parseInt(tempSlider.value);
            // Lapse rate: ~6.5C per 1000m
            return surfaceTemp - alt * 0.0065;
        }

        function getAirDensity(alt) {
            // Simplified: density decreases exponentially
            return Math.exp(-alt / 8500);
        }

        // Birds at different altitudes
        class MigratingBird {
            constructor() {
                this.x = Math.random() * W;
                this.altitude = 200 + Math.random() * 3000;
                this.targetAlt = this.altitude;
                this.airspeed = 12; // m/s
                this.wingPhase = Math.random() * Math.PI * 2;
                this.species = Math.random();
            }

            selectAltitude(season) {
                // Find altitude with best tailwind
                let bestAlt = this.altitude;
                let bestBenefit = -Infinity;

                for (let testAlt = 100; testAlt <= 9000; testAlt += 200) {
                    const wind = getWindAtAltitude(testAlt, season);
                    const tailwind = wind.speed * wind.dir; // positive = tailwind
                    const tempPenalty = getTemp(testAlt) < -20 ? Math.abs(getTemp(testAlt) + 20) * 0.5 : 0;
                    const densityPenalty = (1 - getAirDensity(testAlt)) * 10; // harder to fly in thin air
                    const benefit = tailwind - tempPenalty - densityPenalty;

                    if (benefit > bestBenefit) {
                        bestBenefit = benefit;
                        bestAlt = testAlt;
                    }
                }

                // Species variation: some more willing to fly high
                const maxAlt = this.species > 0.8 ? 9000 : this.species > 0.5 ? 5000 : 3000;
                this.targetAlt = Math.min(bestAlt, maxAlt);
            }

            update(season) {
                // Adjust altitude toward target
                this.altitude += (this.targetAlt - this.altitude) * 0.005;

                const wind = getWindAtAltitude(this.altitude, season);
                const groundSpeed = this.airspeed + wind.speed * wind.dir;
                this.x += groundSpeed * 0.15;

                // Wrap
                if (this.x > W + 50) this.x = -50;
                if (this.x < -50) this.x = W + 50;

                this.wingPhase += 0.08;

                // Re-evaluate altitude periodically
                if (Math.random() < 0.002) this.selectAltitude(season);
            }

            draw() {
                // Map altitude to screen Y (higher altitude = higher on screen)
                const maxAlt = 10000;
                const screenY = H * 0.9 - (this.altitude / maxAlt) * H * 0.75;
                const wf = Math.sin(this.wingPhase) * 4;

                ctx.save();
                ctx.translate(this.x, screenY);

                // Size based on species
                const scale = 0.7 + this.species * 0.5;
                ctx.scale(scale, scale);

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(-8, wf - 2, -12, wf);
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(8, wf - 2, 12, wf);
                ctx.strokeStyle = '#DDA15E';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.stroke();

                ctx.beginPath();
                ctx.ellipse(0, 0, 3, 5, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#DDA15E';
                ctx.fill();

                ctx.restore();
            }
        }

        const birds = [];
        for (let i = 0; i < 30; i++) {
            birds.push(new MigratingBird());
        }

        function drawAtmosphere() {
            const maxAlt = 10000;

            // Atmosphere layers
            const layers = [
                { alt: 0, color: 'rgba(96,108,56,0.08)', label: 'Surface' },
                { alt: 1000, color: 'rgba(80,100,140,0.05)', label: 'Boundary Layer' },
                { alt: 3000, color: 'rgba(60,80,130,0.04)', label: 'Lower Troposphere' },
                { alt: 6000, color: 'rgba(40,50,100,0.03)', label: 'Mid Troposphere' },
                { alt: 8000, color: 'rgba(80,60,120,0.06)', label: 'Jet Stream Zone' }
            ];

            layers.forEach(l => {
                const y = H * 0.9 - (l.alt / maxAlt) * H * 0.75;
                ctx.fillStyle = 'rgba(138,154,91,0.15)';
                ctx.font = '9px Segoe UI';
                ctx.textAlign = 'right';
                ctx.fillText(l.label + ' (' + l.alt + 'm)', W - 10, y);

                ctx.setLineDash([2, 6]);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.strokeStyle = 'rgba(138,154,91,0.1)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
                ctx.setLineDash([]);
            });

            // Wind visualization
            const season = parseInt(seasonSlider.value);
            for (let alt = 0; alt < maxAlt; alt += 200) {
                const y = H * 0.9 - (alt / maxAlt) * H * 0.75;
                const wind = getWindAtAltitude(alt, season);
                const arrowLen = wind.speed * wind.dir * 2;

                for (let x = 50; x < W; x += 120) {
                    const wx = x + Math.sin(time * 0.3 + alt * 0.001 + x * 0.005) * 15;
                    ctx.beginPath();
                    ctx.moveTo(wx, y);
                    ctx.lineTo(wx + arrowLen, y);
                    const alpha = Math.min(0.4, Math.abs(wind.speed * wind.dir) / 30);
                    ctx.strokeStyle = wind.dir > 0 ? `rgba(138,154,91,${alpha})` : `rgba(188,108,37,${alpha})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // Arrowhead
                    if (Math.abs(arrowLen) > 3) {
                        const dir = arrowLen > 0 ? 1 : -1;
                        ctx.beginPath();
                        ctx.moveTo(wx + arrowLen, y);
                        ctx.lineTo(wx + arrowLen - dir * 4, y - 2);
                        ctx.lineTo(wx + arrowLen - dir * 4, y + 2);
                        ctx.closePath();
                        ctx.fillStyle = wind.dir > 0 ? `rgba(138,154,91,${alpha})` : `rgba(188,108,37,${alpha})`;
                        ctx.fill();
                    }
                }
            }

            // Ground
            ctx.fillStyle = 'rgba(96,108,56,0.15)';
            ctx.fillRect(0, H * 0.9, W, H * 0.1);

            // Mountains
            ctx.beginPath();
            ctx.moveTo(W * 0.3, H * 0.9);
            ctx.lineTo(W * 0.38, H * 0.9 - (5500 / maxAlt) * H * 0.75);
            ctx.lineTo(W * 0.42, H * 0.9 - (4000 / maxAlt) * H * 0.75);
            ctx.lineTo(W * 0.48, H * 0.9 - (6200 / maxAlt) * H * 0.75);
            ctx.lineTo(W * 0.55, H * 0.9);
            ctx.closePath();
            ctx.fillStyle = 'rgba(96,108,56,0.12)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(96,108,56,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.font = '9px Segoe UI';
            ctx.fillStyle = 'rgba(96,108,56,0.4)';
            ctx.textAlign = 'center';
            ctx.fillText('Himalayas', W * 0.43, H * 0.9 - (6500 / maxAlt) * H * 0.75);
        }

        function drawAltitudeProfile() {
            const w = 80, h = 300;
            actx.clearRect(0, 0, w, h);
            actx.fillStyle = 'rgba(10,22,40,0.9)';
            actx.fillRect(0, 0, w, h);

            const maxAlt = 10000;
            const season = parseInt(seasonSlider.value);

            // Wind speed profile
            actx.beginPath();
            for (let alt = 0; alt <= maxAlt; alt += 100) {
                const wind = getWindAtAltitude(alt, season);
                const y = h - (alt / maxAlt) * h;
                const x = 10 + (wind.speed * wind.dir + 30) / 60 * (w - 20);
                if (alt === 0) actx.moveTo(x, y);
                else actx.lineTo(x, y);
            }
            actx.strokeStyle = '#8A9A5B';
            actx.lineWidth = 1.5;
            actx.stroke();

            // Temperature profile
            actx.beginPath();
            for (let alt = 0; alt <= maxAlt; alt += 100) {
                const temp = getTemp(alt);
                const y = h - (alt / maxAlt) * h;
                const x = 10 + (temp + 40) / 70 * (w - 20);
                if (alt === 0) actx.moveTo(x, y);
                else actx.lineTo(x, y);
            }
            actx.strokeStyle = '#DDA15E';
            actx.lineWidth = 1;
            actx.setLineDash([3, 3]);
            actx.stroke();
            actx.setLineDash([]);

            // Labels
            actx.font = '8px Segoe UI';
            actx.fillStyle = '#8A9A5B';
            actx.textAlign = 'left';
            actx.fillText('Wind', 2, 12);
            actx.fillStyle = '#DDA15E';
            actx.fillText('Temp', 2, 22);

            // Zero line
            const zeroX = 10 + 30 / 60 * (w - 20);
            actx.beginPath();
            actx.moveTo(zeroX, 0);
            actx.lineTo(zeroX, h);
            actx.strokeStyle = 'rgba(254,250,224,0.15)';
            actx.lineWidth = 0.5;
            actx.stroke();

            // Altitude labels
            actx.fillStyle = 'rgba(254,250,224,0.3)';
            actx.textAlign = 'right';
            for (let alt = 0; alt <= maxAlt; alt += 2000) {
                const y = h - (alt / maxAlt) * h;
                actx.fillText(alt + 'm', w - 2, y + 3);
            }
        }

        function animate() {
            ctx.fillStyle = '#0a1628';
            ctx.fillRect(0, 0, W, H);

            const season = parseInt(seasonSlider.value);

            drawAtmosphere();

            birds.forEach(b => {
                b.update(season);
                b.draw();
            });

            drawAltitudeProfile();

            // Flight data
            const avgAlt = birds.reduce((s, b) => s + b.altitude, 0) / birds.length;
            const maxBirdAlt = Math.max(...birds.map(b => b.altitude));
            const wind = getWindAtAltitude(avgAlt, season);
            const dataEl = document.getElementById('flightData');
            dataEl.innerHTML =
                `Avg altitude: <strong>${Math.round(avgAlt)}m</strong><br>` +
                `Max altitude: <strong>${Math.round(maxBirdAlt)}m</strong><br>` +
                `Wind at avg: <strong style="color:${wind.dir > 0 ? '#8A9A5B' : '#BC6C25'}">${(wind.speed * wind.dir).toFixed(1)} m/s</strong><br>` +
                `Temp at avg: <strong>${getTemp(avgAlt).toFixed(0)}&deg;C</strong>`;

            time += 0.016;
            requestAnimationFrame(animate);
        }

        // Initial altitude selection
        birds.forEach(b => b.selectAltitude(parseInt(seasonSlider.value)));
        animate();

        window.reset = function() {
            time = 0;
            birds.forEach(b => {
                b.x = Math.random() * W;
                b.altitude = 200 + Math.random() * 3000;
                b.selectAltitude(parseInt(seasonSlider.value));
            });
        };
    })();
    </script>
</body>
</html>
