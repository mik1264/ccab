<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Formation Aerodynamics | Bird Migration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,50,0.85); backdrop-filter: blur(10px);
            padding: 14px 24px; border-radius: 14px; display: flex; gap: 18px;
            align-items: center; z-index: 100; color: #FEFAE0; font-size: 0.85rem;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls label { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        #controls input[type=range] { width: 90px; accent-color: #8A9A5B; }
        #info {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); padding: 12px 16px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 260px;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.5;
        }
        .energy-bar { display: inline-block; height: 8px; border-radius: 4px; margin-left: 4px; vertical-align: middle; }
        .legend { margin-top: 8px; font-size: 0.75rem; opacity: 0.8; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <strong style="color:#DDA15E;">V-Formation Aerodynamics</strong><br>
        Birds save <span style="color:#8A9A5B;">20-30%</span> energy by riding wingtip vortex upwash.<br>
        <span id="savings"></span>
        <div class="legend">Trails show vortex wake. Color = energy use.</div>
    </div>
    <div id="controls">
        <label>Flock Size <input type="range" id="flockSize" min="5" max="25" value="11"><span id="flockVal">11</span></label>
        <label>V-Angle <input type="range" id="vAngle" min="20" max="80" value="35"><span id="angleVal">35</span>&deg;</label>
        <label>Wind <input type="range" id="wind" min="-3" max="3" value="0" step="0.5"><span id="windVal">0</span></label>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let birds = [];
        let time = 0;
        let animId;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const flockSlider = document.getElementById('flockSize');
        const angleSlider = document.getElementById('vAngle');
        const windSlider = document.getElementById('wind');
        const flockVal = document.getElementById('flockVal');
        const angleVal = document.getElementById('angleVal');
        const windVal = document.getElementById('windVal');
        const savingsEl = document.getElementById('savings');

        function getParams() {
            return {
                count: parseInt(flockSlider.value),
                angle: parseFloat(angleSlider.value) * Math.PI / 180,
                wind: parseFloat(windSlider.value)
            };
        }

        flockSlider.oninput = () => { flockVal.textContent = flockSlider.value; initBirds(); };
        angleSlider.oninput = () => { angleVal.textContent = angleSlider.value; };
        windSlider.oninput = () => { windVal.textContent = windSlider.value; };

        class Bird {
            constructor(idx, total) {
                this.idx = idx;
                this.trail = [];
                this.wingPhase = Math.random() * Math.PI * 2;
                this.energy = 1.0;
                this.isLeader = idx === 0;
            }

            update(params) {
                const { count, angle, wind } = params;
                const speed = 2.5;
                const cx = W / 2;
                const cy = H / 2;
                const spacing = 55;

                // V-formation positions
                if (this.idx === 0) {
                    this.tx = cx + Math.sin(time * 0.3) * 60;
                    this.ty = cy - 80 + Math.cos(time * 0.2) * 20;
                } else {
                    const side = this.idx % 2 === 0 ? 1 : -1;
                    const rank = Math.ceil(this.idx / 2);
                    this.tx = cx + side * rank * spacing * Math.sin(angle) + Math.sin(time * 0.3) * 60;
                    this.ty = cy - 80 + rank * spacing * Math.cos(angle) + Math.cos(time * 0.2) * 20;
                }

                // Wind effect
                this.tx += wind * 15;

                if (!this.x) { this.x = this.tx; this.y = this.ty; }
                this.x += (this.tx - this.x) * 0.04;
                this.y += (this.ty - this.y) * 0.04;

                // Energy: leader uses full energy, followers save based on position
                if (this.isLeader) {
                    this.energy = 1.0;
                } else {
                    const rank = Math.ceil(this.idx / 2);
                    // Optimal angle ~35 deg gives best savings
                    const angleDiff = Math.abs(params.angle - 35 * Math.PI / 180);
                    const optimalBonus = 1 - angleDiff / (Math.PI / 4);
                    this.energy = Math.max(0.55, 1.0 - 0.3 * Math.max(0, optimalBonus) - 0.02 * rank);
                }

                this.wingPhase += 0.08;
                this.trail.push({ x: this.x, y: this.y, age: 0 });
                if (this.trail.length > 40) this.trail.shift();
                this.trail.forEach(t => t.age++);
            }

            draw() {
                // Vortex trail
                for (let i = 1; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const alpha = (1 - t.age / 40) * 0.3;
                    const w = (1 - t.age / 40) * 8;
                    ctx.beginPath();
                    ctx.moveTo(this.trail[i-1].x, this.trail[i-1].y);
                    ctx.lineTo(t.x, t.y);
                    // Vortex spiral effect
                    const vortexOffset = Math.sin(t.age * 0.3) * w;
                    ctx.strokeStyle = `rgba(138,154,91,${alpha})`;
                    ctx.lineWidth = w * 0.5;
                    ctx.stroke();

                    // Upwash indicator (lighter trail above)
                    if (!this.isLeader) {
                        ctx.beginPath();
                        ctx.arc(t.x + vortexOffset, t.y - w, w * 0.3, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(221,161,94,${alpha * 0.5})`;
                        ctx.fill();
                    }
                }

                // Bird body
                const wingSpan = 18;
                const wingFlap = Math.sin(this.wingPhase) * 8;
                const bodyAngle = Math.atan2(
                    this.ty - this.y,
                    this.tx - this.x
                );

                ctx.save();
                ctx.translate(this.x, this.y);

                // Energy-based color: green = efficient, red = high energy use
                const r = Math.round(221 * this.energy + 138 * (1 - this.energy));
                const g = Math.round(100 * this.energy + 154 * (1 - this.energy));
                const b = Math.round(50 * this.energy + 91 * (1 - this.energy));
                const color = `rgb(${r},${g},${b})`;

                // Wings
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(-wingSpan * 0.5, wingFlap - 3, -wingSpan, wingFlap);
                ctx.strokeStyle = color;
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(wingSpan * 0.5, wingFlap - 3, wingSpan, wingFlap);
                ctx.stroke();

                // Body
                ctx.beginPath();
                ctx.ellipse(0, 0, 4, 2.5, 0, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();

                // Head
                ctx.beginPath();
                ctx.arc(5, 0, 2, 0, Math.PI * 2);
                ctx.fill();

                if (this.isLeader) {
                    ctx.beginPath();
                    ctx.arc(0, 0, 12, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(221,161,94,0.4)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        function initBirds() {
            const params = getParams();
            birds = [];
            for (let i = 0; i < params.count; i++) {
                birds.push(new Bird(i, params.count));
            }
        }

        function animate() {
            const params = getParams();
            ctx.fillStyle = 'rgba(26,26,46,0.15)';
            ctx.fillRect(0, 0, W, H);

            // Sky gradient background (subtle)
            if (Math.floor(time) % 60 === 0) {
                ctx.fillStyle = 'rgba(26,26,46,1)';
                ctx.fillRect(0, 0, W, H);
                // Stars
                for (let i = 0; i < 80; i++) {
                    const sx = Math.random() * W;
                    const sy = Math.random() * H * 0.6;
                    ctx.beginPath();
                    ctx.arc(sx, sy, Math.random() * 1.2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(254,250,224,${Math.random() * 0.5 + 0.2})`;
                    ctx.fill();
                }
            }

            birds.forEach(b => b.update(params));
            birds.forEach(b => b.draw());

            // Calculate average energy savings
            const avgEnergy = birds.reduce((s, b) => s + b.energy, 0) / birds.length;
            const savings = Math.round((1 - avgEnergy) * 100);
            savingsEl.innerHTML = `Flock energy savings: <span style="color:#8A9A5B;font-weight:bold;">${savings}%</span>`;

            time += 0.016;
            animId = requestAnimationFrame(animate);
        }

        initBirds();
        animate();

        window.reset = function() {
            time = 0;
            initBirds();
            ctx.clearRect(0, 0, W, H);
        };
    })();
    </script>
</body>
</html>
