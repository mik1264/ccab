<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acoustic Levitation - Acoustic Phenomena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #c8d0e0; }
canvas { display: block; }
.back-link {
    position: fixed; top: 10px; left: 10px; z-index: 1000;
    color: #8A9A5B; text-decoration: none; font-size: 1.2rem;
}
.controls {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 20px; max-width: 280px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { color: #8A9A5B; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.control-row { margin-bottom: 10px; }
.control-row label { display: block; font-size: 12px; color: #8a92a8; margin-bottom: 3px; }
.control-row input[type="range"] { width: 100%; accent-color: #8A9A5B; }
.control-row .value { float: right; color: #DDA15E; font-size: 12px; font-weight: 600; }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 10px 20px;
    border: 1px solid rgba(138,154,91,0.3);
    font-size: 13px; color: #8a92a8; text-align: center;
}
.info span { color: #DDA15E; font-weight: 600; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>

<div class="controls">
    <h3>Acoustic Levitation</h3>
    <div class="control-row">
        <label>Frequency <span class="value" id="freqVal">40 kHz</span></label>
        <input type="range" id="freqSlider" min="20" max="80" value="40" step="1">
    </div>
    <div class="control-row">
        <label>Amplitude <span class="value" id="ampVal">1.0</span></label>
        <input type="range" id="ampSlider" min="10" max="100" value="100" step="1">
    </div>
    <div class="control-row">
        <label>Particle Count <span class="value" id="partVal">5</span></label>
        <input type="range" id="partSlider" min="1" max="12" value="5" step="1">
    </div>
    <div class="control-row">
        <label>Gravity <span class="value" id="gravVal">1.0</span></label>
        <input type="range" id="gravSlider" min="0" max="200" value="100" step="5">
    </div>
</div>

<div class="info">
    Frequency: <span id="infoFreq">40 kHz</span> |
    Wavelength: <span id="infoWave">8.6 mm</span> |
    Nodes: <span id="infoNodes">5</span> |
    Trapped particles: <span id="infoTrapped">5</span>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const c = 343; // speed of sound m/s
let freq = 40; // kHz
let amplitude = 1.0;
let particleCount = 5;
let gravity = 1.0;
let time = 0;
let running = true;

let particles = [];

function getWavelengthMM() {
    return (c / (freq * 1000)) * 1000; // in mm
}

function initParticles() {
    particles = [];
    const levH = H * 0.6;
    const levTop = H * 0.15;
    const cx = W / 2;
    const numNodes = Math.floor(freq / 8); // approximate

    for (let i = 0; i < particleCount; i++) {
        // Position at approximate pressure nodes
        const nodeIdx = Math.floor(i * numNodes / particleCount);
        const y = levTop + (nodeIdx + 0.5) / numNodes * levH;
        particles.push({
            x: cx + (Math.random() - 0.5) * 30,
            y: y,
            vx: 0,
            vy: 0,
            radius: 4 + Math.random() * 3
        });
    }
}

initParticles();

function updateInfo() {
    const wl = getWavelengthMM();
    const numNodes = Math.floor(freq / 8);
    document.getElementById('infoFreq').textContent = freq + ' kHz';
    document.getElementById('infoWave').textContent = wl.toFixed(1) + ' mm';
    document.getElementById('infoNodes').textContent = numNodes;
    document.getElementById('infoTrapped').textContent = particles.length;
}
updateInfo();

document.getElementById('freqSlider').addEventListener('input', e => {
    freq = parseInt(e.target.value);
    document.getElementById('freqVal').textContent = freq + ' kHz';
    initParticles();
    updateInfo();
});
document.getElementById('ampSlider').addEventListener('input', e => {
    amplitude = parseInt(e.target.value) / 100;
    document.getElementById('ampVal').textContent = amplitude.toFixed(2);
});
document.getElementById('partSlider').addEventListener('input', e => {
    particleCount = parseInt(e.target.value);
    document.getElementById('partVal').textContent = particleCount;
    initParticles();
    updateInfo();
});
document.getElementById('gravSlider').addEventListener('input', e => {
    gravity = parseInt(e.target.value) / 100;
    document.getElementById('gravVal').textContent = gravity.toFixed(2);
});

function getPressureAtY(y) {
    const levH = H * 0.6;
    const levTop = H * 0.15;
    const normalized = (y - levTop) / levH;
    const numNodes = Math.floor(freq / 8);
    return Math.cos(2 * Math.PI * numNodes * normalized) * amplitude;
}

function getForceAtY(y) {
    // Negative gradient of pressure squared (acoustic radiation force)
    const eps = 1;
    const p1 = getPressureAtY(y - eps);
    const p2 = getPressureAtY(y + eps);
    return -(p2 * p2 - p1 * p1) / (2 * eps) * 15;
}

function simulate() {
    const dt = 0.5;
    const damping = 0.92;
    const cx = W / 2;

    for (const p of particles) {
        // Acoustic force (pushes toward pressure nodes)
        const acousticForce = getForceAtY(p.y) * amplitude;

        // Gravity
        const gForce = gravity * 0.3;

        // Lateral restoring force (toward center)
        const lateralForce = -(p.x - cx) * 0.01 * amplitude;

        p.vy += (acousticForce - gForce) * dt;
        p.vx += lateralForce * dt;

        p.vy *= damping;
        p.vx *= damping;

        p.y += p.vy * dt;
        p.x += p.vx * dt;

        // Bounds
        const levTop = H * 0.15;
        const levBottom = H * 0.75;
        if (p.y < levTop + 10) { p.y = levTop + 10; p.vy *= -0.3; }
        if (p.y > levBottom - 10) { p.y = levBottom - 10; p.vy *= -0.3; }
    }
}

function draw() {
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);

    const cx = W / 2;
    const levTop = H * 0.15;
    const levH = H * 0.6;
    const levBottom = levTop + levH;
    const transducerW = 80;

    // Top transducer (emitter)
    ctx.fillStyle = 'rgba(138,154,91,0.3)';
    ctx.fillRect(cx - transducerW, levTop - 30, transducerW * 2, 25);
    ctx.strokeStyle = '#8A9A5B';
    ctx.lineWidth = 2;
    ctx.strokeRect(cx - transducerW, levTop - 30, transducerW * 2, 25);
    ctx.font = '10px monospace';
    ctx.fillStyle = '#8A9A5B';
    ctx.textAlign = 'center';
    ctx.fillText('EMITTER', cx, levTop - 12);

    // Bottom reflector
    ctx.fillStyle = 'rgba(138,154,91,0.3)';
    ctx.fillRect(cx - transducerW, levBottom + 5, transducerW * 2, 25);
    ctx.strokeStyle = '#8A9A5B';
    ctx.lineWidth = 2;
    ctx.strokeRect(cx - transducerW, levBottom + 5, transducerW * 2, 25);
    ctx.fillStyle = '#8A9A5B';
    ctx.fillText('REFLECTOR', cx, levBottom + 22);

    // Draw pressure field
    const fieldW = transducerW * 2.5;
    const numNodes = Math.floor(freq / 8);

    for (let y = levTop; y < levBottom; y += 2) {
        const pressure = getPressureAtY(y) * Math.cos(time * 0.1);
        const mag = Math.abs(pressure);

        // Horizontal pressure bars
        const barW = mag * fieldW * 0.4;
        if (pressure > 0) {
            ctx.fillStyle = `rgba(221,161,94,${mag * 0.15})`;
        } else {
            ctx.fillStyle = `rgba(70,120,180,${mag * 0.15})`;
        }
        ctx.fillRect(cx - barW, y, barW * 2, 2);
    }

    // Draw node positions (dotted lines)
    ctx.setLineDash([3, 6]);
    ctx.strokeStyle = 'rgba(221,161,94,0.3)';
    ctx.lineWidth = 1;
    for (let i = 0; i < numNodes; i++) {
        const ny = levTop + (i + 0.5) / numNodes * levH;
        // Only draw at approximate pressure nodes
        const p = Math.abs(getPressureAtY(ny));
        if (p < 0.3) {
            ctx.beginPath();
            ctx.moveTo(cx - fieldW * 0.5, ny);
            ctx.lineTo(cx + fieldW * 0.5, ny);
            ctx.stroke();
        }
    }
    ctx.setLineDash([]);

    // Pressure graph on the side
    const graphX = cx + fieldW * 0.6 + 30;
    const graphW = 100;
    ctx.strokeStyle = 'rgba(138,154,91,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(graphX, levTop);
    ctx.lineTo(graphX, levBottom);
    ctx.stroke();

    ctx.strokeStyle = '#8A9A5B';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let y = levTop; y < levBottom; y += 2) {
        const p = getPressureAtY(y);
        const px = graphX + p * graphW * 0.4;
        if (y === levTop) ctx.moveTo(px, y); else ctx.lineTo(px, y);
    }
    ctx.stroke();

    ctx.font = '10px monospace';
    ctx.fillStyle = '#8a92a8';
    ctx.textAlign = 'center';
    ctx.fillText('Pressure', graphX, levTop - 8);

    // Sound wave animation (emanating from emitter)
    const waveCount = 5;
    for (let i = 0; i < waveCount; i++) {
        const phase = (time * 0.05 + i / waveCount) % 1;
        const wy = levTop + phase * levH;
        const alpha = amplitude * (1 - phase) * 0.2;
        ctx.strokeStyle = `rgba(138,154,91,${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx - transducerW * 0.8, wy);
        ctx.lineTo(cx + transducerW * 0.8, wy);
        ctx.stroke();
    }

    // Draw particles
    for (const p of particles) {
        // Glow
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 3);
        grad.addColorStop(0, 'rgba(221,161,94,0.3)');
        grad.addColorStop(1, 'rgba(221,161,94,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * 3, 0, Math.PI * 2);
        ctx.fill();

        // Particle
        ctx.fillStyle = '#DDA15E';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();

        // Highlight
        ctx.fillStyle = 'rgba(254,250,224,0.4)';
        ctx.beginPath();
        ctx.arc(p.x - p.radius * 0.3, p.y - p.radius * 0.3, p.radius * 0.4, 0, Math.PI * 2);
        ctx.fill();
    }

    // Labels
    ctx.font = '12px monospace';
    ctx.fillStyle = '#8a92a8';
    ctx.textAlign = 'left';
    ctx.fillText(`${freq} kHz ultrasonic standing wave`, cx - fieldW * 0.6, levBottom + 50);
    ctx.fillText(`Wavelength: ${getWavelengthMM().toFixed(1)} mm`, cx - fieldW * 0.6, levBottom + 65);
}

function animate() {
    if (running) {
        simulate();
        time++;
    }
    draw();
    requestAnimationFrame(animate);
}

window.reset = function() {
    freq = 40; amplitude = 1.0; particleCount = 5; gravity = 1.0;
    document.getElementById('freqSlider').value = 40;
    document.getElementById('ampSlider').value = 100;
    document.getElementById('partSlider').value = 5;
    document.getElementById('gravSlider').value = 100;
    document.getElementById('freqVal').textContent = '40 kHz';
    document.getElementById('ampVal').textContent = '1.00';
    document.getElementById('partVal').textContent = '5';
    document.getElementById('gravVal').textContent = '1.00';
    initParticles();
    updateInfo();
    time = 0;
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); running = !running; }
});

animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
