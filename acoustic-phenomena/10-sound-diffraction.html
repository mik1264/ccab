<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Wave Diffraction - Acoustic Phenomena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #c8d0e0; }
canvas { display: block; }
.back-link {
    position: fixed; top: 10px; left: 10px; z-index: 1000;
    color: #8A9A5B; text-decoration: none; font-size: 1.2rem;
}
.controls {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 20px; max-width: 280px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { color: #8A9A5B; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.control-row { margin-bottom: 10px; }
.control-row label { display: block; font-size: 12px; color: #8a92a8; margin-bottom: 3px; }
.control-row input[type="range"] { width: 100%; accent-color: #8A9A5B; }
.control-row .value { float: right; color: #DDA15E; font-size: 12px; font-weight: 600; }
.control-row button {
    background: rgba(138,154,91,0.2); color: #8A9A5B; border: 1px solid rgba(138,154,91,0.4);
    padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; margin: 2px;
    transition: all 0.2s;
}
.control-row button:hover { background: rgba(138,154,91,0.4); }
.control-row button.active { background: #8A9A5B; color: #0a0e1a; }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 10px 20px;
    border: 1px solid rgba(138,154,91,0.3);
    font-size: 13px; color: #8a92a8; text-align: center;
}
.info span { color: #DDA15E; font-weight: 600; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>

<div class="controls">
    <h3>Sound Diffraction</h3>
    <div class="control-row">
        <label>Wavelength <span class="value" id="wlVal">30 px</span></label>
        <input type="range" id="wlSlider" min="10" max="80" value="30" step="1">
    </div>
    <div class="control-row">
        <label>Slit Width <span class="value" id="slitVal">60 px</span></label>
        <input type="range" id="slitSlider" min="10" max="200" value="60" step="2">
    </div>
    <div class="control-row">
        <label>Barrier Type</label>
        <div>
            <button id="btnSingle" class="active">Single Slit</button>
            <button id="btnDouble">Double Slit</button>
            <button id="btnEdge">Edge</button>
        </div>
    </div>
    <div class="control-row">
        <label>Slit Separation <span class="value" id="sepVal">100 px</span></label>
        <input type="range" id="sepSlider" min="30" max="200" value="100" step="5">
    </div>
</div>

<div class="info">
    Wavelength: <span id="infoWL">30</span> px |
    Slit: <span id="infoSlit">60</span> px |
    Ratio d/&lambda;: <span id="infoRatio">2.0</span> |
    <span id="infoType">Single slit diffraction</span>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

// Use offscreen canvas for wave computation
let waveCanvas, waveCtx;
let waveData;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    // Lower resolution for wave computation
    waveCanvas = document.createElement('canvas');
    waveCanvas.width = Math.floor(W / 3);
    waveCanvas.height = Math.floor(H / 3);
    waveCtx = waveCanvas.getContext('2d');
}
resize();
window.addEventListener('resize', resize);

let wavelength = 30;
let slitWidth = 60;
let barrierType = 'single';
let slitSep = 100;
let time = 0;
let running = true;

document.getElementById('wlSlider').addEventListener('input', e => {
    wavelength = parseInt(e.target.value);
    document.getElementById('wlVal').textContent = wavelength + ' px';
    updateInfo();
});
document.getElementById('slitSlider').addEventListener('input', e => {
    slitWidth = parseInt(e.target.value);
    document.getElementById('slitVal').textContent = slitWidth + ' px';
    updateInfo();
});
document.getElementById('sepSlider').addEventListener('input', e => {
    slitSep = parseInt(e.target.value);
    document.getElementById('sepVal').textContent = slitSep + ' px';
});

document.getElementById('btnSingle').addEventListener('click', () => setType('single'));
document.getElementById('btnDouble').addEventListener('click', () => setType('double'));
document.getElementById('btnEdge').addEventListener('click', () => setType('edge'));

function setType(type) {
    barrierType = type;
    document.getElementById('btnSingle').classList.toggle('active', type === 'single');
    document.getElementById('btnDouble').classList.toggle('active', type === 'double');
    document.getElementById('btnEdge').classList.toggle('active', type === 'edge');
    updateInfo();
}

function updateInfo() {
    const ratio = (slitWidth / wavelength).toFixed(1);
    document.getElementById('infoWL').textContent = wavelength;
    document.getElementById('infoSlit').textContent = slitWidth;
    document.getElementById('infoRatio').textContent = ratio;
    const types = { single: 'Single slit diffraction', double: 'Double slit interference', edge: 'Edge diffraction' };
    document.getElementById('infoType').textContent = types[barrierType];
}
updateInfo();

function isInSlit(y) {
    const cy = H / 2;
    if (barrierType === 'single') {
        return Math.abs(y - cy) < slitWidth / 2;
    } else if (barrierType === 'double') {
        const center1 = cy - slitSep / 2;
        const center2 = cy + slitSep / 2;
        return Math.abs(y - center1) < slitWidth / 2 || Math.abs(y - center2) < slitWidth / 2;
    } else { // edge
        return y > cy;
    }
}

function computeWaveField() {
    const barrierX = W * 0.35;
    const k = 2 * Math.PI / wavelength;
    const scale = 3;
    const sw = waveCanvas.width;
    const sh = waveCanvas.height;

    const imageData = waveCtx.createImageData(sw, sh);
    const data = imageData.data;

    for (let py = 0; py < sh; py++) {
        for (let px = 0; px < sw; px++) {
            const x = px * scale;
            const y = py * scale;

            let val;

            if (x < barrierX - 5) {
                // Before barrier: plane wave
                val = Math.sin(k * x - time * 0.15);
            } else if (x < barrierX + 5) {
                // At barrier
                if (isInSlit(y)) {
                    val = Math.sin(k * x - time * 0.15);
                } else {
                    val = 0;
                }
            } else {
                // After barrier: Huygens principle
                val = 0;
                const numSources = 30;
                const cy = H / 2;

                if (barrierType === 'single') {
                    for (let i = 0; i < numSources; i++) {
                        const sy = cy - slitWidth / 2 + (i / (numSources - 1)) * slitWidth;
                        const dx = x - barrierX;
                        const dy = y - sy;
                        const r = Math.sqrt(dx * dx + dy * dy);
                        val += Math.sin(k * r - time * 0.15) / Math.sqrt(r + 1);
                    }
                    val /= numSources * 0.3;
                } else if (barrierType === 'double') {
                    const halfSources = numSources / 2;
                    // Slit 1
                    const c1 = cy - slitSep / 2;
                    for (let i = 0; i < halfSources; i++) {
                        const sy = c1 - slitWidth / 2 + (i / (halfSources - 1)) * slitWidth;
                        const dx = x - barrierX;
                        const dy = y - sy;
                        const r = Math.sqrt(dx * dx + dy * dy);
                        val += Math.sin(k * r - time * 0.15) / Math.sqrt(r + 1);
                    }
                    // Slit 2
                    const c2 = cy + slitSep / 2;
                    for (let i = 0; i < halfSources; i++) {
                        const sy = c2 - slitWidth / 2 + (i / (halfSources - 1)) * slitWidth;
                        const dx = x - barrierX;
                        const dy = y - sy;
                        const r = Math.sqrt(dx * dx + dy * dy);
                        val += Math.sin(k * r - time * 0.15) / Math.sqrt(r + 1);
                    }
                    val /= numSources * 0.3;
                } else { // edge
                    const edgeY = cy;
                    // Sources below the edge
                    for (let i = 0; i < numSources; i++) {
                        const sy = edgeY + (i / (numSources - 1)) * H * 0.5;
                        const dx = x - barrierX;
                        const dy = y - sy;
                        const r = Math.sqrt(dx * dx + dy * dy);
                        val += Math.sin(k * r - time * 0.15) / Math.sqrt(r + 1);
                    }
                    val /= numSources * 0.3;
                }
            }

            val = Math.max(-1, Math.min(1, val));

            const idx = (py * sw + px) * 4;
            const mag = Math.abs(val);

            if (val > 0) {
                data[idx] = Math.floor(138 * mag + 10 * (1 - mag));
                data[idx + 1] = Math.floor(154 * mag + 14 * (1 - mag));
                data[idx + 2] = Math.floor(91 * mag + 26 * (1 - mag));
            } else {
                data[idx] = Math.floor(70 * mag + 10 * (1 - mag));
                data[idx + 1] = Math.floor(90 * mag + 14 * (1 - mag));
                data[idx + 2] = Math.floor(160 * mag + 26 * (1 - mag));
            }
            data[idx + 3] = Math.floor(40 + 200 * mag);
        }
    }

    waveCtx.putImageData(imageData, 0, 0);
}

function draw() {
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);

    // Draw wave field
    computeWaveField();
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(waveCanvas, 0, 0, W, H);

    // Draw barrier
    const barrierX = W * 0.35;
    const cy = H / 2;
    ctx.fillStyle = '#3d4423';
    ctx.strokeStyle = 'rgba(138,154,91,0.8)';
    ctx.lineWidth = 4;

    if (barrierType === 'single') {
        // Top wall
        ctx.fillRect(barrierX - 3, 0, 6, cy - slitWidth / 2);
        // Bottom wall
        ctx.fillRect(barrierX - 3, cy + slitWidth / 2, 6, H - cy - slitWidth / 2);
        // Slit edges
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(barrierX, cy - slitWidth / 2);
        ctx.lineTo(barrierX, cy + slitWidth / 2);
        ctx.stroke();
    } else if (barrierType === 'double') {
        const c1 = cy - slitSep / 2;
        const c2 = cy + slitSep / 2;
        ctx.fillRect(barrierX - 3, 0, 6, c1 - slitWidth / 2);
        ctx.fillRect(barrierX - 3, c1 + slitWidth / 2, 6, c2 - slitWidth / 2 - c1 - slitWidth / 2);
        ctx.fillRect(barrierX - 3, c2 + slitWidth / 2, 6, H - c2 - slitWidth / 2);
    } else { // edge
        ctx.fillRect(barrierX - 3, 0, 6, cy);
        // Edge point
        ctx.fillStyle = '#DDA15E';
        ctx.beginPath();
        ctx.arc(barrierX, cy, 4, 0, Math.PI * 2);
        ctx.fill();
    }

    // Labels
    ctx.font = '12px monospace';
    ctx.fillStyle = '#8a92a8';
    ctx.textAlign = 'center';
    ctx.fillText('Incoming plane wave', W * 0.15, 30);
    ctx.fillText('Diffracted wave', W * 0.65, 30);

    // Wavelength indicator
    const wlY = H - 50;
    ctx.strokeStyle = '#DDA15E';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(50, wlY);
    ctx.lineTo(50 + wavelength, wlY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(50, wlY - 5);
    ctx.lineTo(50, wlY + 5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(50 + wavelength, wlY - 5);
    ctx.lineTo(50 + wavelength, wlY + 5);
    ctx.stroke();
    ctx.font = '10px monospace';
    ctx.fillStyle = '#DDA15E';
    ctx.fillText('\u03BB = ' + wavelength + ' px', 50 + wavelength / 2, wlY - 8);
}

function animate() {
    if (running) time++;
    draw();
    requestAnimationFrame(animate);
}

window.reset = function() {
    wavelength = 30; slitWidth = 60; barrierType = 'single'; slitSep = 100;
    time = 0;
    document.getElementById('wlSlider').value = 30;
    document.getElementById('slitSlider').value = 60;
    document.getElementById('sepSlider').value = 100;
    document.getElementById('wlVal').textContent = '30 px';
    document.getElementById('slitVal').textContent = '60 px';
    document.getElementById('sepVal').textContent = '100 px';
    setType('single');
    updateInfo();
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); running = !running; }
});

animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
