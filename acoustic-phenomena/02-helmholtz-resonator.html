<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helmholtz Resonator - Acoustic Phenomena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #c8d0e0; }
canvas { display: block; }
.back-link {
    position: fixed; top: 10px; left: 10px; z-index: 1000;
    color: #8A9A5B; text-decoration: none; font-size: 1.2rem;
}
.controls {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 20px; max-width: 280px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { color: #8A9A5B; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.control-row { margin-bottom: 10px; }
.control-row label { display: block; font-size: 12px; color: #8a92a8; margin-bottom: 3px; }
.control-row input[type="range"] { width: 100%; accent-color: #8A9A5B; }
.control-row .value { float: right; color: #DDA15E; font-size: 12px; font-weight: 600; }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 10px 20px;
    border: 1px solid rgba(138,154,91,0.3);
    font-size: 13px; color: #8a92a8; text-align: center;
}
.info span { color: #DDA15E; font-weight: 600; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>

<div class="controls">
    <h3>Helmholtz Resonator</h3>
    <div class="control-row">
        <label>Driving Frequency <span class="value" id="freqVal">120 Hz</span></label>
        <input type="range" id="freqSlider" min="20" max="400" value="120" step="1">
    </div>
    <div class="control-row">
        <label>Neck Length <span class="value" id="neckVal">0.05 m</span></label>
        <input type="range" id="neckSlider" min="2" max="15" value="5" step="1">
    </div>
    <div class="control-row">
        <label>Neck Radius <span class="value" id="neckRVal">0.02 m</span></label>
        <input type="range" id="neckRSlider" min="1" max="8" value="2" step="1">
    </div>
    <div class="control-row">
        <label>Cavity Volume <span class="value" id="volVal">0.005 m3</span></label>
        <input type="range" id="volSlider" min="1" max="20" value="5" step="1">
    </div>
</div>

<div class="info">
    Resonant freq: <span id="infoRes">-- Hz</span> | Driving: <span id="infoDriv">120 Hz</span> | Amplification: <span id="infoAmp">--x</span>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const c = 343; // speed of sound m/s
let drivingFreq = 120;
let neckLength = 0.05;
let neckRadius = 0.02;
let cavityVolume = 0.005;
let time = 0;
let running = true;

function getResonantFreq() {
    const S = Math.PI * neckRadius * neckRadius;
    const Leff = neckLength + 1.7 * neckRadius; // end correction
    return (c / (2 * Math.PI)) * Math.sqrt(S / (cavityVolume * Leff));
}

function getAmplification() {
    const f0 = getResonantFreq();
    const Q = 10; // quality factor
    const ratio = drivingFreq / f0;
    return 1 / Math.sqrt(Math.pow(1 - ratio * ratio, 2) + Math.pow(ratio / Q, 2));
}

function updateInfo() {
    const f0 = getResonantFreq();
    const amp = getAmplification();
    document.getElementById('infoRes').textContent = f0.toFixed(1) + ' Hz';
    document.getElementById('infoDriv').textContent = drivingFreq + ' Hz';
    document.getElementById('infoAmp').textContent = amp.toFixed(1) + 'x';
}

document.getElementById('freqSlider').addEventListener('input', e => {
    drivingFreq = parseInt(e.target.value);
    document.getElementById('freqVal').textContent = drivingFreq + ' Hz';
    updateInfo();
});

document.getElementById('neckSlider').addEventListener('input', e => {
    neckLength = parseInt(e.target.value) / 100;
    document.getElementById('neckVal').textContent = neckLength.toFixed(2) + ' m';
    updateInfo();
});

document.getElementById('neckRSlider').addEventListener('input', e => {
    neckRadius = parseInt(e.target.value) / 100;
    document.getElementById('neckRVal').textContent = neckRadius.toFixed(2) + ' m';
    updateInfo();
});

document.getElementById('volSlider').addEventListener('input', e => {
    cavityVolume = parseInt(e.target.value) / 1000;
    document.getElementById('volVal').textContent = cavityVolume.toFixed(3) + ' m3';
    updateInfo();
});

updateInfo();

function drawResonator() {
    const cx = W * 0.4;
    const cy = H * 0.5;
    const amp = getAmplification();
    const pressure = Math.sin(2 * Math.PI * drivingFreq * time * 0.001) * Math.min(amp, 15);

    // Scale cavity volume to visual size
    const cavRadius = 60 + cavityVolume * 8000;
    const neckW = 15 + neckRadius * 600;
    const neckL = 40 + neckLength * 1500;

    // Draw cavity (bottle body)
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, cavRadius);
    const pNorm = (pressure + 15) / 30;
    if (pressure > 0) {
        grad.addColorStop(0, `rgba(221,161,94,${0.1 + 0.3 * pNorm})`);
        grad.addColorStop(1, `rgba(138,154,91,${0.05 + 0.1 * pNorm})`);
    } else {
        grad.addColorStop(0, `rgba(70,120,180,${0.1 + 0.3 * (1 - pNorm)})`);
        grad.addColorStop(1, `rgba(138,154,91,${0.05 + 0.1 * (1 - pNorm)})`);
    }
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(cx, cy, cavRadius + pressure * 2, cavRadius + pressure * 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Cavity outline
    ctx.strokeStyle = 'rgba(138,154,91,0.7)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(cx, cy, cavRadius, cavRadius, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Neck
    const neckStartX = cx + cavRadius;
    const neckEndX = neckStartX + neckL;
    ctx.strokeStyle = 'rgba(138,154,91,0.7)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(neckStartX, cy - neckW / 2);
    ctx.lineTo(neckEndX, cy - neckW / 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(neckStartX, cy + neckW / 2);
    ctx.lineTo(neckEndX, cy + neckW / 2);
    ctx.stroke();

    // Air particles in cavity
    const numParticles = 40;
    for (let i = 0; i < numParticles; i++) {
        const angle = (i / numParticles) * Math.PI * 2 + time * 0.5;
        const r = cavRadius * 0.3 + cavRadius * 0.5 * ((i * 7 + 3) % numParticles) / numParticles;
        const px = cx + Math.cos(angle) * r + pressure * 3 * Math.cos(angle);
        const py = cy + Math.sin(angle) * r + pressure * 3 * Math.sin(angle);
        const mag = Math.abs(pressure) / 15;
        ctx.fillStyle = pressure > 0
            ? `rgba(221,161,94,${0.3 + 0.5 * mag})`
            : `rgba(70,120,180,${0.3 + 0.5 * mag})`;
        ctx.beginPath();
        ctx.arc(px, py, 2 + mag * 2, 0, Math.PI * 2);
        ctx.fill();
    }

    // Air particles in neck
    const neckParticles = 8;
    for (let i = 0; i < neckParticles; i++) {
        const t = (i + 0.5) / neckParticles;
        const px = neckStartX + t * neckL + pressure * 4;
        const py = cy + (Math.sin(i * 2.3 + time) * neckW * 0.3);
        const mag = Math.abs(pressure) / 15;
        ctx.fillStyle = `rgba(138,154,91,${0.3 + 0.5 * mag})`;
        ctx.beginPath();
        ctx.arc(px, py, 2 + mag * 2, 0, Math.PI * 2);
        ctx.fill();
    }

    // Incoming wave (from right)
    const waveX = neckEndX + 30;
    const waveW = W - waveX - 20;
    ctx.strokeStyle = 'rgba(138,154,91,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x <= waveW; x += 2) {
        const px = waveX + x;
        const phase = x * 0.02 * drivingFreq / 100 - time * drivingFreq * 0.01;
        const py = cy + Math.sin(phase) * 20;
        if (x === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Labels
    ctx.font = '12px monospace';
    ctx.fillStyle = '#8a92a8';
    ctx.textAlign = 'center';
    ctx.fillText('Cavity (V)', cx, cy + cavRadius + 25);
    ctx.fillText('Neck', neckStartX + neckL / 2, cy - neckW / 2 - 10);
    ctx.fillText('Incoming Sound', waveX + waveW / 2, cy - 40);

    // Draw frequency response curve
    drawFreqResponse();
}

function drawFreqResponse() {
    const graphX = W * 0.05;
    const graphY = H * 0.05;
    const graphW = W * 0.25;
    const graphH = H * 0.2;

    ctx.fillStyle = 'rgba(10,14,26,0.7)';
    ctx.fillRect(graphX, graphY, graphW, graphH);
    ctx.strokeStyle = 'rgba(138,154,91,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(graphX, graphY, graphW, graphH);

    ctx.font = '10px monospace';
    ctx.fillStyle = '#8a92a8';
    ctx.textAlign = 'center';
    ctx.fillText('Frequency Response', graphX + graphW / 2, graphY - 5);

    const f0 = getResonantFreq();
    const Q = 10;
    const maxFreq = 400;

    ctx.strokeStyle = '#8A9A5B';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i <= graphW; i++) {
        const f = (i / graphW) * maxFreq + 20;
        const ratio = f / f0;
        const resp = 1 / Math.sqrt(Math.pow(1 - ratio * ratio, 2) + Math.pow(ratio / Q, 2));
        const dB = Math.min(20 * Math.log10(resp), 30);
        const y = graphY + graphH - (dB / 30) * graphH;
        if (i === 0) ctx.moveTo(graphX + i, y); else ctx.lineTo(graphX + i, y);
    }
    ctx.stroke();

    // Mark current frequency
    const xPos = graphX + ((drivingFreq - 20) / maxFreq) * graphW;
    ctx.strokeStyle = '#DDA15E';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(xPos, graphY);
    ctx.lineTo(xPos, graphY + graphH);
    ctx.stroke();
    ctx.setLineDash([]);

    // Mark resonant frequency
    const xRes = graphX + ((f0 - 20) / maxFreq) * graphW;
    if (xRes > graphX && xRes < graphX + graphW) {
        ctx.fillStyle = '#DDA15E';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('f0=' + f0.toFixed(0), xRes, graphY + graphH + 12);
    }
}

function animate() {
    if (running) time += 0.016;
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);
    drawResonator();
    requestAnimationFrame(animate);
}

window.reset = function() {
    time = 0;
    drivingFreq = 120;
    neckLength = 0.05;
    neckRadius = 0.02;
    cavityVolume = 0.005;
    document.getElementById('freqSlider').value = 120;
    document.getElementById('neckSlider').value = 5;
    document.getElementById('neckRSlider').value = 2;
    document.getElementById('volSlider').value = 5;
    document.getElementById('freqVal').textContent = '120 Hz';
    document.getElementById('neckVal').textContent = '0.05 m';
    document.getElementById('neckRVal').textContent = '0.02 m';
    document.getElementById('volVal').textContent = '0.005 m3';
    updateInfo();
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); running = !running; }
});

animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
