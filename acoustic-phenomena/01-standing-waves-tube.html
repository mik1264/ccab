<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standing Waves in a Tube - Acoustic Phenomena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #c8d0e0; }
canvas { display: block; }
.back-link {
    position: fixed; top: 10px; left: 10px; z-index: 1000;
    color: #8A9A5B; text-decoration: none; font-size: 1.2rem;
}
.controls {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 20px; max-width: 280px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { color: #8A9A5B; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.control-row { margin-bottom: 10px; }
.control-row label { display: block; font-size: 12px; color: #8a92a8; margin-bottom: 3px; }
.control-row input[type="range"] { width: 100%; accent-color: #8A9A5B; }
.control-row .value { float: right; color: #DDA15E; font-size: 12px; font-weight: 600; }
.control-row button {
    background: rgba(138,154,91,0.2); color: #8A9A5B; border: 1px solid rgba(138,154,91,0.4);
    padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; margin: 2px;
    transition: all 0.2s;
}
.control-row button:hover { background: rgba(138,154,91,0.4); }
.control-row button.active { background: #8A9A5B; color: #0a0e1a; }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 10px 20px;
    border: 1px solid rgba(138,154,91,0.3);
    font-size: 13px; color: #8a92a8; text-align: center;
}
.info span { color: #DDA15E; font-weight: 600; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>

<div class="controls">
    <h3>Standing Waves</h3>
    <div class="control-row">
        <label>Harmonic <span class="value" id="harmVal">1</span></label>
        <input type="range" id="harmSlider" min="1" max="8" value="1" step="1">
    </div>
    <div class="control-row">
        <label>Amplitude <span class="value" id="ampVal">80</span></label>
        <input type="range" id="ampSlider" min="20" max="150" value="80" step="1">
    </div>
    <div class="control-row">
        <label>Tube End</label>
        <div>
            <button id="btnClosed" class="active">Closed-Closed</button>
            <button id="btnOpen">Open-Open</button>
            <button id="btnHalf">Closed-Open</button>
        </div>
    </div>
    <div class="control-row">
        <label>Show</label>
        <div>
            <button id="btnPressure" class="active">Pressure</button>
            <button id="btnDisplacement">Displacement</button>
        </div>
    </div>
</div>

<div class="info">
    Harmonic <span id="infoHarm">1</span> | Frequency ratio: <span id="infoFreq">f</span> | Nodes: <span id="infoNodes">2</span> | Antinodes: <span id="infoAnti">1</span>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let harmonic = 1;
let amplitude = 80;
let tubeType = 'closed-closed'; // closed-closed, open-open, closed-open
let showMode = 'pressure';
let time = 0;

const harmSlider = document.getElementById('harmSlider');
const ampSlider = document.getElementById('ampSlider');

harmSlider.addEventListener('input', e => {
    harmonic = parseInt(e.target.value);
    document.getElementById('harmVal').textContent = harmonic;
    updateInfo();
});

ampSlider.addEventListener('input', e => {
    amplitude = parseInt(e.target.value);
    document.getElementById('ampVal').textContent = amplitude;
});

document.getElementById('btnClosed').addEventListener('click', () => setTubeType('closed-closed'));
document.getElementById('btnOpen').addEventListener('click', () => setTubeType('open-open'));
document.getElementById('btnHalf').addEventListener('click', () => setTubeType('closed-open'));

document.getElementById('btnPressure').addEventListener('click', () => {
    showMode = 'pressure';
    document.getElementById('btnPressure').classList.add('active');
    document.getElementById('btnDisplacement').classList.remove('active');
});
document.getElementById('btnDisplacement').addEventListener('click', () => {
    showMode = 'displacement';
    document.getElementById('btnDisplacement').classList.add('active');
    document.getElementById('btnPressure').classList.remove('active');
});

function setTubeType(type) {
    tubeType = type;
    document.getElementById('btnClosed').classList.toggle('active', type === 'closed-closed');
    document.getElementById('btnOpen').classList.toggle('active', type === 'open-open');
    document.getElementById('btnHalf').classList.toggle('active', type === 'closed-open');
    updateInfo();
}

function updateInfo() {
    document.getElementById('infoHarm').textContent = harmonic;
    let freqLabel, nodes, antinodes;
    if (tubeType === 'closed-closed' || tubeType === 'open-open') {
        freqLabel = harmonic + 'f';
        if (showMode === 'pressure') {
            nodes = (tubeType === 'open-open') ? harmonic + 1 : harmonic - 1;
            antinodes = harmonic;
        } else {
            nodes = harmonic + 1;
            antinodes = harmonic;
        }
    } else {
        freqLabel = (2 * harmonic - 1) + 'f/2';
        nodes = harmonic;
        antinodes = harmonic;
    }
    document.getElementById('infoFreq').textContent = freqLabel;
    document.getElementById('infoNodes').textContent = Math.max(0, nodes);
    document.getElementById('infoAnti').textContent = antinodes;
}
updateInfo();

function getWaveValue(x, t) {
    // x in [0, 1] along tube length
    const n = harmonic;
    let spatial;
    if (tubeType === 'closed-closed') {
        // Pressure: cos(n*pi*x), Displacement: sin(n*pi*x)
        if (showMode === 'pressure') {
            spatial = Math.cos(n * Math.PI * x);
        } else {
            spatial = Math.sin(n * Math.PI * x);
        }
    } else if (tubeType === 'open-open') {
        // Pressure: sin(n*pi*x), Displacement: cos(n*pi*x)
        if (showMode === 'pressure') {
            spatial = Math.sin(n * Math.PI * x);
        } else {
            spatial = Math.cos(n * Math.PI * x);
        }
    } else {
        // Closed-Open: odd harmonics only
        const m = 2 * n - 1;
        if (showMode === 'pressure') {
            spatial = Math.cos(m * Math.PI * x / 2);
        } else {
            spatial = Math.sin(m * Math.PI * x / 2);
        }
    }
    return spatial * Math.cos(t);
}

function drawTube() {
    const tubeX = W * 0.1;
    const tubeW = W * 0.8;
    const tubeY = H * 0.3;
    const tubeH = H * 0.4;
    const midY = tubeY + tubeH / 2;

    // Draw tube walls
    ctx.strokeStyle = 'rgba(138,154,91,0.6)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(tubeX, tubeY);
    ctx.lineTo(tubeX + tubeW, tubeY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(tubeX, tubeY + tubeH);
    ctx.lineTo(tubeX + tubeW, tubeY + tubeH);
    ctx.stroke();

    // Draw end caps
    ctx.lineWidth = 4;
    if (tubeType === 'closed-closed' || tubeType === 'closed-open') {
        // Left closed
        ctx.strokeStyle = '#DDA15E';
        ctx.beginPath();
        ctx.moveTo(tubeX, tubeY);
        ctx.lineTo(tubeX, tubeY + tubeH);
        ctx.stroke();
    } else {
        // Left open - dashed
        ctx.strokeStyle = 'rgba(221,161,94,0.4)';
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(tubeX, tubeY);
        ctx.lineTo(tubeX, tubeY + tubeH);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    if (tubeType === 'closed-closed') {
        // Right closed
        ctx.strokeStyle = '#DDA15E';
        ctx.beginPath();
        ctx.moveTo(tubeX + tubeW, tubeY);
        ctx.lineTo(tubeX + tubeW, tubeY + tubeH);
        ctx.stroke();
    } else {
        // Right open
        ctx.strokeStyle = 'rgba(221,161,94,0.4)';
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(tubeX + tubeW, tubeY);
        ctx.lineTo(tubeX + tubeW, tubeY + tubeH);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Draw particles (air molecules)
    const cols = 60;
    const rows = 12;
    const spacing = tubeW / (cols + 1);
    const rowSpacing = tubeH / (rows + 1);

    for (let i = 1; i <= cols; i++) {
        for (let j = 1; j <= rows; j++) {
            const x = i / (cols + 1);
            const baseX = tubeX + i * spacing;
            const baseY = tubeY + j * rowSpacing;

            const val = getWaveValue(x, time);

            if (showMode === 'displacement') {
                // Longitudinal displacement
                const dx = val * amplitude * 0.5;
                const px = baseX + dx;

                // Color by displacement magnitude
                const mag = Math.abs(val);
                const r = Math.floor(138 + 83 * mag);
                const g = Math.floor(154 - 54 * mag);
                const b = Math.floor(91 + 3 * mag);

                ctx.fillStyle = `rgba(${r},${g},${b},${0.4 + 0.6 * mag})`;
                ctx.beginPath();
                ctx.arc(px, baseY, 2 + 2 * mag, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Pressure visualization - color and size
                const pressure = val;
                const mag = Math.abs(pressure);

                let r, g, b;
                if (pressure > 0) {
                    // High pressure - warm (earth color)
                    r = Math.floor(221 * mag + 50 * (1 - mag));
                    g = Math.floor(161 * mag + 50 * (1 - mag));
                    b = Math.floor(94 * mag + 80 * (1 - mag));
                } else {
                    // Low pressure - cool (sage/blue)
                    r = Math.floor(70 * mag + 50 * (1 - mag));
                    g = Math.floor(120 * mag + 50 * (1 - mag));
                    b = Math.floor(180 * mag + 80 * (1 - mag));
                }

                ctx.fillStyle = `rgba(${r},${g},${b},${0.3 + 0.7 * mag})`;
                ctx.beginPath();
                ctx.arc(baseX, baseY, 2 + 3 * mag, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // Draw standing wave envelope
    ctx.lineWidth = 2;
    const steps = 200;

    // Positive envelope
    ctx.strokeStyle = 'rgba(138,154,91,0.8)';
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
        const x = i / steps;
        const val = getWaveValue(x, time);
        const px = tubeX + x * tubeW;
        const py = midY - val * amplitude;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Negative envelope (dashed)
    ctx.strokeStyle = 'rgba(221,161,94,0.4)';
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
        const x = i / steps;
        const envVal = Math.abs(getWaveValue(x, 0)); // envelope at t=0
        const px = tubeX + x * tubeW;
        ctx.moveTo(px, midY - envVal * amplitude);
        ctx.lineTo(px, midY - envVal * amplitude);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw envelope curves
    ctx.strokeStyle = 'rgba(138,154,91,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
        const x = i / steps;
        const envVal = Math.abs(getWaveValue(x, 0));
        const px = tubeX + x * tubeW;
        const py = midY - envVal * amplitude;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
        const x = i / steps;
        const envVal = Math.abs(getWaveValue(x, 0));
        const px = tubeX + x * tubeW;
        const py = midY + envVal * amplitude;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Mark nodes (N) and antinodes (A)
    const markerY = tubeY - 20;
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';

    for (let i = 0; i <= steps; i++) {
        const x = i / steps;
        const envVal = Math.abs(getWaveValue(x, 0));
        if (i > 0) {
            const prevX = (i - 1) / steps;
            const prevVal = Math.abs(getWaveValue(prevX, 0));

            // Near zero = node
            if (envVal < 0.01 && i > 2 && i < steps - 2) {
                const px = tubeX + x * tubeW;
                ctx.fillStyle = '#DDA15E';
                ctx.fillText('N', px, markerY);
                ctx.beginPath();
                ctx.arc(px, midY, 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(221,161,94,0.6)';
                ctx.fill();
            }
        }
    }

    // Center line
    ctx.strokeStyle = 'rgba(138,154,91,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 6]);
    ctx.beginPath();
    ctx.moveTo(tubeX, midY);
    ctx.lineTo(tubeX + tubeW, midY);
    ctx.stroke();
    ctx.setLineDash([]);

    // Labels
    ctx.font = '11px monospace';
    ctx.fillStyle = '#8a92a8';
    ctx.textAlign = 'center';
    ctx.fillText(showMode === 'pressure' ? 'PRESSURE' : 'DISPLACEMENT', tubeX + tubeW / 2, tubeY - 40);

    const leftLabel = (tubeType === 'closed-closed' || tubeType === 'closed-open') ? 'CLOSED' : 'OPEN';
    const rightLabel = (tubeType === 'closed-closed') ? 'CLOSED' : 'OPEN';
    ctx.fillStyle = '#DDA15E';
    ctx.textAlign = 'left';
    ctx.fillText(leftLabel, tubeX, tubeY + tubeH + 25);
    ctx.textAlign = 'right';
    ctx.fillText(rightLabel, tubeX + tubeW, tubeY + tubeH + 25);
}

let running = true;

function animate() {
    if (running) {
        time += 0.04;
    }
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);

    drawTube();
    requestAnimationFrame(animate);
}

window.reset = function() {
    time = 0;
    harmonic = 1;
    amplitude = 80;
    tubeType = 'closed-closed';
    showMode = 'pressure';
    harmSlider.value = 1;
    ampSlider.value = 80;
    document.getElementById('harmVal').textContent = '1';
    document.getElementById('ampVal').textContent = '80';
    setTubeType('closed-closed');
    document.getElementById('btnPressure').classList.add('active');
    document.getElementById('btnDisplacement').classList.remove('active');
    updateInfo();
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); running = !running; }
});

animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
