<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doppler Effect - Acoustic Phenomena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #c8d0e0; }
canvas { display: block; }
.back-link {
    position: fixed; top: 10px; left: 10px; z-index: 1000;
    color: #8A9A5B; text-decoration: none; font-size: 1.2rem;
}
.controls {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 20px; max-width: 280px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { color: #8A9A5B; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.control-row { margin-bottom: 10px; }
.control-row label { display: block; font-size: 12px; color: #8a92a8; margin-bottom: 3px; }
.control-row input[type="range"] { width: 100%; accent-color: #8A9A5B; }
.control-row .value { float: right; color: #DDA15E; font-size: 12px; font-weight: 600; }
.control-row button {
    background: rgba(138,154,91,0.2); color: #8A9A5B; border: 1px solid rgba(138,154,91,0.4);
    padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; margin: 2px;
    transition: all 0.2s;
}
.control-row button:hover { background: rgba(138,154,91,0.4); }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 10px 20px;
    border: 1px solid rgba(138,154,91,0.3);
    font-size: 13px; color: #8a92a8; text-align: center;
}
.info span { color: #DDA15E; font-weight: 600; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>

<div class="controls">
    <h3>Doppler Effect</h3>
    <div class="control-row">
        <label>Source Speed <span class="value" id="speedVal">0.3 c</span></label>
        <input type="range" id="speedSlider" min="0" max="95" value="30" step="1">
    </div>
    <div class="control-row">
        <label>Emission Rate <span class="value" id="rateVal">8</span></label>
        <input type="range" id="rateSlider" min="2" max="20" value="8" step="1">
    </div>
    <div class="control-row">
        <button id="btnRestart">Restart</button>
    </div>
</div>

<div class="info">
    Source speed: <span id="infoSpeed">0.3c</span> |
    Front freq: <span id="infoFront">x1.43</span> |
    Rear freq: <span id="infoRear">x0.77</span> |
    Mach: <span id="infoMach">0.30</span>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const soundSpeed = 3; // pixels per frame
let sourceSpeedRatio = 0.3;
let emissionRate = 8;
let time = 0;
let running = true;

let sourceX, sourceY;
let waves = [];
let frameCount = 0;

function initSource() {
    sourceX = W * 0.15;
    sourceY = H * 0.5;
    waves = [];
    frameCount = 0;
    time = 0;
}
initSource();

document.getElementById('speedSlider').addEventListener('input', e => {
    sourceSpeedRatio = parseInt(e.target.value) / 100;
    document.getElementById('speedVal').textContent = sourceSpeedRatio.toFixed(2) + ' c';
    updateInfo();
});

document.getElementById('rateSlider').addEventListener('input', e => {
    emissionRate = parseInt(e.target.value);
    document.getElementById('rateVal').textContent = emissionRate;
});

document.getElementById('btnRestart').addEventListener('click', initSource);

function updateInfo() {
    const mach = sourceSpeedRatio;
    const frontFreq = mach < 1 ? 1 / (1 - mach) : Infinity;
    const rearFreq = 1 / (1 + mach);
    document.getElementById('infoSpeed').textContent = sourceSpeedRatio.toFixed(2) + 'c';
    document.getElementById('infoFront').textContent = mach < 1 ? 'x' + frontFreq.toFixed(2) : 'Inf';
    document.getElementById('infoRear').textContent = 'x' + rearFreq.toFixed(2);
    document.getElementById('infoMach').textContent = mach.toFixed(2);
}
updateInfo();

// Observer positions
let observers = [];
function resetObservers() {
    observers = [
        { x: W * 0.8, y: H * 0.3, label: 'A', waveHits: [], lastHitTime: 0 },
        { x: W * 0.8, y: H * 0.7, label: 'B', waveHits: [], lastHitTime: 0 },
    ];
}
resetObservers();

function animate() {
    if (running) {
        const sourceSpeed = soundSpeed * sourceSpeedRatio;
        sourceX += sourceSpeed;

        // Wrap source
        if (sourceX > W * 0.85) {
            sourceX = W * 0.15;
            waves = [];
        }

        // Emit wave
        if (frameCount % Math.max(1, Math.round(60 / emissionRate / 4)) === 0) {
            waves.push({ x: sourceX, y: sourceY, radius: 0 });
        }

        // Expand waves
        for (let i = waves.length - 1; i >= 0; i--) {
            waves[i].radius += soundSpeed;
            if (waves[i].radius > Math.max(W, H) * 1.5) {
                waves.splice(i, 1);
            }
        }

        frameCount++;
        time++;
    }

    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);

    // Draw waves
    for (const w of waves) {
        const alpha = Math.max(0.03, 0.4 - w.radius * 0.0004);
        ctx.strokeStyle = `rgba(138,154,91,${alpha})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
        ctx.stroke();
    }

    // Mach cone for supersonic
    if (sourceSpeedRatio >= 1) {
        const machAngle = Math.asin(1 / sourceSpeedRatio);
        ctx.strokeStyle = 'rgba(221,161,94,0.5)';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(sourceX, sourceY);
        ctx.lineTo(sourceX - W, sourceY - W * Math.tan(machAngle));
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(sourceX, sourceY);
        ctx.lineTo(sourceX - W, sourceY + W * Math.tan(machAngle));
        ctx.stroke();
        ctx.setLineDash([]);

        // Mach angle label
        ctx.font = '12px monospace';
        ctx.fillStyle = '#DDA15E';
        ctx.textAlign = 'left';
        ctx.fillText('Mach angle: ' + (machAngle * 180 / Math.PI).toFixed(1) + '\u00B0', sourceX + 20, sourceY - 30);
    }

    // Draw source
    ctx.fillStyle = '#DDA15E';
    ctx.beginPath();
    ctx.arc(sourceX, sourceY, 8, 0, Math.PI * 2);
    ctx.fill();

    // Direction arrow
    ctx.strokeStyle = '#DDA15E';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sourceX + 15, sourceY);
    ctx.lineTo(sourceX + 30, sourceY);
    ctx.lineTo(sourceX + 25, sourceY - 5);
    ctx.moveTo(sourceX + 30, sourceY);
    ctx.lineTo(sourceX + 25, sourceY + 5);
    ctx.stroke();

    ctx.font = '11px monospace';
    ctx.fillStyle = '#DDA15E';
    ctx.textAlign = 'center';
    ctx.fillText('Source', sourceX, sourceY - 18);

    // Draw observers
    for (const obs of observers) {
        ctx.fillStyle = '#8A9A5B';
        ctx.beginPath();
        ctx.arc(obs.x, obs.y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.font = '12px monospace';
        ctx.fillStyle = '#8A9A5B';
        ctx.textAlign = 'center';
        ctx.fillText('Observer ' + obs.label, obs.x, obs.y - 15);
    }

    // Draw wavefront compression/expansion annotation
    if (sourceSpeedRatio > 0 && sourceSpeedRatio < 1) {
        ctx.font = '11px monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(221,161,94,0.6)';
        ctx.fillText('Compressed wavelength (higher pitch)', sourceX + 80, sourceY + 50);
        ctx.fillStyle = 'rgba(138,154,91,0.6)';
        ctx.fillText('Stretched wavelength (lower pitch)', sourceX - 100, sourceY + 50);
    }

    requestAnimationFrame(animate);
}

window.reset = function() {
    sourceSpeedRatio = 0.3;
    emissionRate = 8;
    document.getElementById('speedSlider').value = 30;
    document.getElementById('rateSlider').value = 8;
    document.getElementById('speedVal').textContent = '0.30 c';
    document.getElementById('rateVal').textContent = '8';
    initSource();
    resetObservers();
    updateInfo();
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); running = !running; }
});

animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
