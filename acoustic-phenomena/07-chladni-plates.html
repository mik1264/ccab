<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chladni Plates - Acoustic Phenomena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #c8d0e0; }
canvas { display: block; }
.back-link {
    position: fixed; top: 10px; left: 10px; z-index: 1000;
    color: #8A9A5B; text-decoration: none; font-size: 1.2rem;
}
.controls {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 20px; max-width: 260px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { color: #8A9A5B; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.control-row { margin-bottom: 10px; }
.control-row label { display: block; font-size: 12px; color: #8a92a8; margin-bottom: 3px; }
.control-row input[type="range"] { width: 100%; accent-color: #8A9A5B; }
.control-row .value { float: right; color: #DDA15E; font-size: 12px; font-weight: 600; }
.control-row button {
    background: rgba(138,154,91,0.2); color: #8A9A5B; border: 1px solid rgba(138,154,91,0.4);
    padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; margin: 2px;
    transition: all 0.2s;
}
.control-row button:hover { background: rgba(138,154,91,0.4); }
.control-row button.active { background: #8A9A5B; color: #0a0e1a; }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 10px 20px;
    border: 1px solid rgba(138,154,91,0.3);
    font-size: 13px; color: #8a92a8; text-align: center;
}
.info span { color: #DDA15E; font-weight: 600; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>

<div class="controls">
    <h3>Chladni Plates</h3>
    <div class="control-row">
        <label>Mode n <span class="value" id="nVal">3</span></label>
        <input type="range" id="nSlider" min="1" max="12" value="3" step="1">
    </div>
    <div class="control-row">
        <label>Mode m <span class="value" id="mVal">5</span></label>
        <input type="range" id="mSlider" min="1" max="12" value="5" step="1">
    </div>
    <div class="control-row">
        <label>Particles <span class="value" id="pVal">8000</span></label>
        <input type="range" id="pSlider" min="2000" max="20000" value="8000" step="500">
    </div>
    <div class="control-row">
        <label>Shape</label>
        <div>
            <button id="btnSquare" class="active">Square</button>
            <button id="btnCircle">Circle</button>
        </div>
    </div>
</div>

<div class="info">
    Mode (<span id="infoN">3</span>, <span id="infoM">5</span>) | Pattern: <span id="infoPattern">cos(3x)cos(5y) - cos(5x)cos(3y) = 0</span>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    generateParticles();
}
resize();

let n = 3, m = 5;
let numParticles = 8000;
let shape = 'square';
var particles = [];
let time = 0;
let running = true;

function chladniSquare(x, y) {
    // Chladni pattern for square plate: cos(n*pi*x)*cos(m*pi*y) - cos(m*pi*x)*cos(n*pi*y)
    return Math.cos(n * Math.PI * x) * Math.cos(m * Math.PI * y) -
           Math.cos(m * Math.PI * x) * Math.cos(n * Math.PI * y);
}

function chladniCircle(x, y) {
    const r = Math.sqrt(x * x + y * y);
    const theta = Math.atan2(y, x);
    // Simplified circular Chladni: uses cos(n*theta)*J_n(m*pi*r) approximation
    return Math.cos(n * theta) * Math.cos(m * Math.PI * r) -
           Math.cos(m * theta) * Math.cos(n * Math.PI * r);
}

function generateParticles() {
    particles = [];
    const size = Math.min(W, H) * 0.7;
    const cx = W / 2;
    const cy = H / 2;

    for (let i = 0; i < numParticles; i++) {
        let px, py;
        if (shape === 'square') {
            px = (Math.random() - 0.5);
            py = (Math.random() - 0.5);
        } else {
            const angle = Math.random() * Math.PI * 2;
            const r = Math.sqrt(Math.random()) * 0.5;
            px = Math.cos(angle) * r;
            py = Math.sin(angle) * r;
        }
        particles.push({
            x: px,
            y: py,
            vx: 0,
            vy: 0,
            screenX: cx + px * size,
            screenY: cy + py * size
        });
    }
}

generateParticles();

document.getElementById('nSlider').addEventListener('input', e => {
    n = parseInt(e.target.value);
    document.getElementById('nVal').textContent = n;
    document.getElementById('infoN').textContent = n;
    updatePattern();
});
document.getElementById('mSlider').addEventListener('input', e => {
    m = parseInt(e.target.value);
    document.getElementById('mVal').textContent = m;
    document.getElementById('infoM').textContent = m;
    updatePattern();
});
document.getElementById('pSlider').addEventListener('input', e => {
    numParticles = parseInt(e.target.value);
    document.getElementById('pVal').textContent = numParticles;
    generateParticles();
});

document.getElementById('btnSquare').addEventListener('click', () => {
    shape = 'square';
    document.getElementById('btnSquare').classList.add('active');
    document.getElementById('btnCircle').classList.remove('active');
    generateParticles();
});
document.getElementById('btnCircle').addEventListener('click', () => {
    shape = 'circle';
    document.getElementById('btnCircle').classList.add('active');
    document.getElementById('btnSquare').classList.remove('active');
    generateParticles();
});

function updatePattern() {
    document.getElementById('infoPattern').textContent =
        `cos(${n}x)cos(${m}y) - cos(${m}x)cos(${n}y) = 0`;
}

window.addEventListener('resize', resize);

function simulate() {
    const dt = 0.02;
    const eps = 0.001;
    const damping = 0.95;
    const force = 0.003;

    const chladniFn = shape === 'square' ? chladniSquare : chladniCircle;

    for (const p of particles) {
        const val = chladniFn(p.x, p.y);

        // Gradient (numerical)
        const dx = (chladniFn(p.x + eps, p.y) - chladniFn(p.x - eps, p.y)) / (2 * eps);
        const dy = (chladniFn(p.x, p.y + eps) - chladniFn(p.x, p.y - eps)) / (2 * eps);

        // Particles move toward nodal lines (val = 0)
        // Force proportional to value, directed along negative gradient
        const grad = Math.sqrt(dx * dx + dy * dy) + 0.001;
        p.vx += -val * dx / grad * force;
        p.vy += -val * dy / grad * force;

        p.vx *= damping;
        p.vy *= damping;

        p.x += p.vx * dt;
        p.y += p.vy * dt;

        // Boundary
        if (shape === 'square') {
            if (p.x < -0.5) { p.x = -0.5; p.vx *= -0.5; }
            if (p.x > 0.5) { p.x = 0.5; p.vx *= -0.5; }
            if (p.y < -0.5) { p.y = -0.5; p.vy *= -0.5; }
            if (p.y > 0.5) { p.y = 0.5; p.vy *= -0.5; }
        } else {
            const r = Math.sqrt(p.x * p.x + p.y * p.y);
            if (r > 0.5) {
                p.x *= 0.5 / r;
                p.y *= 0.5 / r;
                p.vx *= -0.5;
                p.vy *= -0.5;
            }
        }
    }
}

function draw() {
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);

    const size = Math.min(W, H) * 0.7;
    const cx = W / 2;
    const cy = H / 2;

    // Draw plate outline
    ctx.strokeStyle = 'rgba(138,154,91,0.4)';
    ctx.lineWidth = 2;
    if (shape === 'square') {
        ctx.strokeRect(cx - size / 2, cy - size / 2, size, size);
    } else {
        ctx.beginPath();
        ctx.arc(cx, cy, size / 2, 0, Math.PI * 2);
        ctx.stroke();
    }

    // Draw particles
    for (const p of particles) {
        const sx = cx + p.x * size;
        const sy = cy + p.y * size;

        const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        const settled = speed < 0.002;

        if (settled) {
            ctx.fillStyle = 'rgba(221,161,94,0.8)';
        } else {
            ctx.fillStyle = `rgba(138,154,91,${0.3 + Math.min(speed * 20, 0.5)})`;
        }

        ctx.fillRect(sx - 0.8, sy - 0.8, 1.6, 1.6);
    }

    // Title
    ctx.font = '13px monospace';
    ctx.fillStyle = '#8A9A5B';
    ctx.textAlign = 'center';
    ctx.fillText(`Chladni Pattern (${n}, ${m})`, cx, cy - size / 2 - 15);
}

function animate() {
    if (running) {
        for (let i = 0; i < 3; i++) simulate();
        time++;
    }
    draw();
    requestAnimationFrame(animate);
}

window.reset = function() {
    n = 3; m = 5; numParticles = 8000; shape = 'square';
    document.getElementById('nSlider').value = 3;
    document.getElementById('mSlider').value = 5;
    document.getElementById('pSlider').value = 8000;
    document.getElementById('nVal').textContent = '3';
    document.getElementById('mVal').textContent = '5';
    document.getElementById('pVal').textContent = '8000';
    document.getElementById('infoN').textContent = '3';
    document.getElementById('infoM').textContent = '5';
    document.getElementById('btnSquare').classList.add('active');
    document.getElementById('btnCircle').classList.remove('active');
    updatePattern();
    generateParticles();
    time = 0;
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); running = !running; }
});

animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
