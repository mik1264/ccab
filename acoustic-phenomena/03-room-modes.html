<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Modes - Acoustic Phenomena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #c8d0e0; }
canvas { display: block; }
.back-link {
    position: fixed; top: 10px; left: 10px; z-index: 1000;
    color: #8A9A5B; text-decoration: none; font-size: 1.2rem;
}
.controls {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 20px; max-width: 260px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { color: #8A9A5B; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.control-row { margin-bottom: 10px; }
.control-row label { display: block; font-size: 12px; color: #8a92a8; margin-bottom: 3px; }
.control-row input[type="range"] { width: 100%; accent-color: #8A9A5B; }
.control-row .value { float: right; color: #DDA15E; font-size: 12px; font-weight: 600; }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 10px 20px;
    border: 1px solid rgba(138,154,91,0.3);
    font-size: 13px; color: #8a92a8; text-align: center;
}
.info span { color: #DDA15E; font-weight: 600; }
.mode-list {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 15px; max-width: 220px; max-height: 300px; overflow-y: auto;
    border: 1px solid rgba(138,154,91,0.3);
    font-size: 11px;
}
.mode-list h4 { color: #8A9A5B; margin-bottom: 8px; font-size: 12px; }
.mode-entry { padding: 3px 0; color: #8a92a8; cursor: pointer; }
.mode-entry:hover { color: #DDA15E; }
.mode-entry.active { color: #DDA15E; font-weight: 600; }
.mode-entry .freq { color: #8A9A5B; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>

<div class="controls">
    <h3>Room Modes</h3>
    <div class="control-row">
        <label>Room Length <span class="value" id="lenVal">5.0 m</span></label>
        <input type="range" id="lenSlider" min="20" max="100" value="50" step="1">
    </div>
    <div class="control-row">
        <label>Room Width <span class="value" id="widVal">4.0 m</span></label>
        <input type="range" id="widSlider" min="20" max="80" value="40" step="1">
    </div>
    <div class="control-row">
        <label>Mode nx <span class="value" id="nxVal">1</span></label>
        <input type="range" id="nxSlider" min="0" max="5" value="1" step="1">
    </div>
    <div class="control-row">
        <label>Mode ny <span class="value" id="nyVal">0</span></label>
        <input type="range" id="nySlider" min="0" max="5" value="0" step="1">
    </div>
</div>

<div class="info">
    Room: <span id="infoRoom">5.0 x 4.0 m</span> | Mode (<span id="infoMode">1,0</span>) | Freq: <span id="infoFreq">34.3 Hz</span>
</div>

<div class="mode-list" id="modeList">
    <h4>Room Modes (< 200 Hz)</h4>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const c = 343;
let roomL = 5.0;
let roomW = 4.0;
let nx = 1;
let ny = 0;
let time = 0;
let running = true;

function getModeFreq(mx, my) {
    return (c / 2) * Math.sqrt(Math.pow(mx / roomL, 2) + Math.pow(my / roomW, 2));
}

function updateInfo() {
    const freq = getModeFreq(nx, ny);
    document.getElementById('infoRoom').textContent = roomL.toFixed(1) + ' x ' + roomW.toFixed(1) + ' m';
    document.getElementById('infoMode').textContent = nx + ',' + ny;
    document.getElementById('infoFreq').textContent = freq.toFixed(1) + ' Hz';
    updateModeList();
}

function updateModeList() {
    const list = document.getElementById('modeList');
    let html = '<h4>Room Modes (< 200 Hz)</h4>';
    const modes = [];
    for (let mx = 0; mx <= 5; mx++) {
        for (let my = 0; my <= 5; my++) {
            if (mx === 0 && my === 0) continue;
            const f = getModeFreq(mx, my);
            if (f < 200) {
                const type = (mx > 0 && my > 0) ? 'T' : 'A';
                modes.push({ mx, my, f, type });
            }
        }
    }
    modes.sort((a, b) => a.f - b.f);
    modes.forEach(m => {
        const active = (m.mx === nx && m.my === ny) ? ' active' : '';
        html += `<div class="mode-entry${active}" data-nx="${m.mx}" data-ny="${m.my}">` +
            `(${m.mx},${m.my}) <span class="freq">${m.f.toFixed(1)} Hz</span> [${m.type}]</div>`;
    });
    list.innerHTML = html;

    list.querySelectorAll('.mode-entry').forEach(el => {
        el.addEventListener('click', () => {
            nx = parseInt(el.dataset.nx);
            ny = parseInt(el.dataset.ny);
            document.getElementById('nxSlider').value = nx;
            document.getElementById('nySlider').value = ny;
            document.getElementById('nxVal').textContent = nx;
            document.getElementById('nyVal').textContent = ny;
            updateInfo();
        });
    });
}

document.getElementById('lenSlider').addEventListener('input', e => {
    roomL = parseInt(e.target.value) / 10;
    document.getElementById('lenVal').textContent = roomL.toFixed(1) + ' m';
    updateInfo();
});
document.getElementById('widSlider').addEventListener('input', e => {
    roomW = parseInt(e.target.value) / 10;
    document.getElementById('widVal').textContent = roomW.toFixed(1) + ' m';
    updateInfo();
});
document.getElementById('nxSlider').addEventListener('input', e => {
    nx = parseInt(e.target.value);
    document.getElementById('nxVal').textContent = nx;
    updateInfo();
});
document.getElementById('nySlider').addEventListener('input', e => {
    ny = parseInt(e.target.value);
    document.getElementById('nyVal').textContent = ny;
    updateInfo();
});

updateInfo();

function drawRoom() {
    const margin = 80;
    const maxRoomW = W * 0.55;
    const maxRoomH = H * 0.65;

    const aspect = roomL / roomW;
    let drawW, drawH;
    if (aspect > maxRoomW / maxRoomH) {
        drawW = maxRoomW;
        drawH = drawW / aspect;
    } else {
        drawH = maxRoomH;
        drawW = drawH * aspect;
    }

    const rx = (W - drawW) / 2 - 60;
    const ry = (H - drawH) / 2;

    // Draw room outline
    ctx.strokeStyle = 'rgba(138,154,91,0.7)';
    ctx.lineWidth = 3;
    ctx.strokeRect(rx, ry, drawW, drawH);

    // Draw pressure field
    const res = 4;
    const freq = getModeFreq(nx, ny);
    const omega = 2 * Math.PI * freq;

    for (let x = 0; x < drawW; x += res) {
        for (let y = 0; y < drawH; y += res) {
            const xn = x / drawW; // 0 to 1
            const yn = y / drawH;

            // Standing wave pressure pattern: cos(nx*pi*x/L) * cos(ny*pi*y/W)
            const pressure = Math.cos(nx * Math.PI * xn) * Math.cos(ny * Math.PI * yn) *
                             Math.cos(omega * time * 0.0002);

            const mag = Math.abs(pressure);
            let r, g, b;
            if (pressure > 0) {
                r = Math.floor(221 * mag);
                g = Math.floor(161 * mag);
                b = Math.floor(94 * mag);
            } else {
                r = Math.floor(70 * mag);
                g = Math.floor(120 * mag);
                b = Math.floor(180 * mag);
            }

            ctx.fillStyle = `rgba(${r},${g},${b},${0.7 * mag})`;
            ctx.fillRect(rx + x, ry + y, res, res);
        }
    }

    // Draw node lines
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 5]);
    for (let i = 1; i < nx; i++) {
        const x = rx + (i / nx) * drawW;
        if (i % 2 === 1) {
            ctx.beginPath();
            ctx.moveTo(x, ry);
            ctx.lineTo(x, ry + drawH);
            ctx.stroke();
        }
    }
    for (let j = 1; j < ny; j++) {
        const y = ry + (j / ny) * drawH;
        if (j % 2 === 1) {
            ctx.beginPath();
            ctx.moveTo(rx, y);
            ctx.lineTo(rx + drawW, y);
            ctx.stroke();
        }
    }
    ctx.setLineDash([]);

    // Dimension labels
    ctx.font = '12px monospace';
    ctx.fillStyle = '#DDA15E';
    ctx.textAlign = 'center';
    ctx.fillText(roomL.toFixed(1) + ' m', rx + drawW / 2, ry + drawH + 25);
    ctx.save();
    ctx.translate(rx - 20, ry + drawH / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillText(roomW.toFixed(1) + ' m', 0, 0);
    ctx.restore();

    // Legend
    ctx.font = '11px monospace';
    ctx.fillStyle = '#8a92a8';
    ctx.textAlign = 'left';
    const lgx = rx;
    const lgy = ry - 30;
    ctx.fillStyle = 'rgba(221,161,94,0.8)';
    ctx.fillRect(lgx, lgy, 15, 10);
    ctx.fillStyle = '#8a92a8';
    ctx.fillText('High pressure', lgx + 20, lgy + 9);
    ctx.fillStyle = 'rgba(70,120,180,0.8)';
    ctx.fillRect(lgx + 120, lgy, 15, 10);
    ctx.fillStyle = '#8a92a8';
    ctx.fillText('Low pressure', lgx + 140, lgy + 9);

    // Mode type label
    const modeType = (nx > 0 && ny > 0) ? 'Tangential' : 'Axial';
    ctx.fillStyle = '#8A9A5B';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`Mode (${nx},${ny}) - ${modeType} - ${freq.toFixed(1)} Hz`, rx + drawW / 2, ry - 50);
}

function animate() {
    if (running) time += 1;
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);
    drawRoom();
    requestAnimationFrame(animate);
}

window.reset = function() {
    time = 0;
    roomL = 5.0; roomW = 4.0; nx = 1; ny = 0;
    document.getElementById('lenSlider').value = 50;
    document.getElementById('widSlider').value = 40;
    document.getElementById('nxSlider').value = 1;
    document.getElementById('nySlider').value = 0;
    document.getElementById('lenVal').textContent = '5.0 m';
    document.getElementById('widVal').textContent = '4.0 m';
    document.getElementById('nxVal').textContent = '1';
    document.getElementById('nyVal').textContent = '0';
    updateInfo();
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); running = !running; }
});

animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
