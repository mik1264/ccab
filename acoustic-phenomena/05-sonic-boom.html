<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonic Boom & Mach Cone - Acoustic Phenomena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #c8d0e0; }
canvas { display: block; }
.back-link {
    position: fixed; top: 10px; left: 10px; z-index: 1000;
    color: #8A9A5B; text-decoration: none; font-size: 1.2rem;
}
.controls {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 20px; max-width: 280px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { color: #8A9A5B; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.control-row { margin-bottom: 10px; }
.control-row label { display: block; font-size: 12px; color: #8a92a8; margin-bottom: 3px; }
.control-row input[type="range"] { width: 100%; accent-color: #8A9A5B; }
.control-row .value { float: right; color: #DDA15E; font-size: 12px; font-weight: 600; }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 10px 20px;
    border: 1px solid rgba(138,154,91,0.3);
    font-size: 13px; color: #8a92a8; text-align: center;
}
.info span { color: #DDA15E; font-weight: 600; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>

<div class="controls">
    <h3>Sonic Boom</h3>
    <div class="control-row">
        <label>Mach Number <span class="value" id="machVal">1.5</span></label>
        <input type="range" id="machSlider" min="50" max="400" value="150" step="5">
    </div>
    <div class="control-row">
        <label>Trail Length <span class="value" id="trailVal">40</span></label>
        <input type="range" id="trailSlider" min="10" max="80" value="40" step="1">
    </div>
</div>

<div class="info">
    Mach <span id="infoMach">1.5</span> |
    Cone half-angle: <span id="infoAngle">41.8</span>&deg; |
    Speed: <span id="infoSpeed">514.5</span> m/s |
    Regime: <span id="infoRegime">Supersonic</span>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const c = 343; // speed of sound m/s
let mach = 1.5;
let trailLength = 40;
let time = 0;
let running = true;

let positions = []; // trail of past positions
let waves = [];
let frameCount = 0;
let sourceX, sourceY;

function init() {
    sourceX = W * 0.1;
    sourceY = H * 0.5;
    positions = [];
    waves = [];
    frameCount = 0;
    time = 0;
}
init();

document.getElementById('machSlider').addEventListener('input', e => {
    mach = parseInt(e.target.value) / 100;
    document.getElementById('machVal').textContent = mach.toFixed(2);
    updateInfo();
});

document.getElementById('trailSlider').addEventListener('input', e => {
    trailLength = parseInt(e.target.value);
    document.getElementById('trailVal').textContent = trailLength;
});

function updateInfo() {
    const angle = mach >= 1 ? Math.asin(1 / mach) * 180 / Math.PI : 90;
    const speed = mach * c;
    let regime = 'Subsonic';
    if (mach >= 1 && mach < 1.2) regime = 'Transonic';
    else if (mach >= 1.2 && mach < 5) regime = 'Supersonic';
    else if (mach >= 5) regime = 'Hypersonic';

    document.getElementById('infoMach').textContent = mach.toFixed(2);
    document.getElementById('infoAngle').textContent = angle.toFixed(1);
    document.getElementById('infoSpeed').textContent = speed.toFixed(0);
    document.getElementById('infoRegime').textContent = regime;
}
updateInfo();

const soundPxPerFrame = 2.5;

function animate() {
    if (running) {
        const speed = soundPxPerFrame * mach;
        sourceX += speed;

        if (sourceX > W + 50) {
            sourceX = -50;
            positions = [];
            waves = [];
        }

        positions.push({ x: sourceX, y: sourceY });
        if (positions.length > trailLength * 3) {
            positions.splice(0, positions.length - trailLength * 3);
        }

        // Emit wave every few frames
        if (frameCount % 3 === 0) {
            waves.push({ x: sourceX, y: sourceY, radius: 0 });
        }

        // Expand waves
        for (let i = waves.length - 1; i >= 0; i--) {
            waves[i].radius += soundPxPerFrame;
            if (waves[i].radius > Math.max(W, H) * 1.2) {
                waves.splice(i, 1);
            }
        }

        frameCount++;
        time++;
    }

    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);

    // Draw waves
    for (const w of waves) {
        const alpha = Math.max(0.02, 0.35 - w.radius * 0.0003);
        ctx.strokeStyle = `rgba(138,154,91,${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(w.x, w.y, w.radius, 0, Math.PI * 2);
        ctx.stroke();
    }

    // Draw Mach cone if supersonic
    if (mach >= 1) {
        const machAngle = Math.asin(1 / mach);
        const coneLength = W * 1.5;

        // Shockwave lines
        ctx.strokeStyle = 'rgba(221,161,94,0.6)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(sourceX, sourceY);
        ctx.lineTo(sourceX - coneLength * Math.cos(machAngle), sourceY - coneLength * Math.sin(machAngle));
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(sourceX, sourceY);
        ctx.lineTo(sourceX - coneLength * Math.cos(machAngle), sourceY + coneLength * Math.sin(machAngle));
        ctx.stroke();

        // Shockwave glow
        ctx.strokeStyle = 'rgba(221,161,94,0.15)';
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(sourceX, sourceY);
        ctx.lineTo(sourceX - coneLength * Math.cos(machAngle), sourceY - coneLength * Math.sin(machAngle));
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(sourceX, sourceY);
        ctx.lineTo(sourceX - coneLength * Math.cos(machAngle), sourceY + coneLength * Math.sin(machAngle));
        ctx.stroke();

        // Angle arc
        if (sourceX > W * 0.3 && sourceX < W * 0.7) {
            const arcR = 60;
            ctx.strokeStyle = 'rgba(221,161,94,0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(sourceX, sourceY, arcR, Math.PI - machAngle, Math.PI + machAngle);
            ctx.stroke();

            ctx.font = '12px monospace';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'left';
            const angleDeg = (machAngle * 180 / Math.PI).toFixed(1);
            ctx.fillText('\u03B1 = ' + angleDeg + '\u00B0', sourceX - arcR - 70, sourceY - 5);
        }
    }

    // Draw trail
    if (positions.length > 1) {
        ctx.strokeStyle = 'rgba(221,161,94,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i < positions.length; i++) {
            const p = positions[i];
            if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
    }

    // Draw source (aircraft shape)
    ctx.save();
    ctx.translate(sourceX, sourceY);
    ctx.fillStyle = '#DDA15E';
    ctx.beginPath();
    ctx.moveTo(15, 0);
    ctx.lineTo(-10, -7);
    ctx.lineTo(-15, -3);
    ctx.lineTo(-15, 3);
    ctx.lineTo(-10, 7);
    ctx.closePath();
    ctx.fill();

    // Wings
    ctx.beginPath();
    ctx.moveTo(-2, 0);
    ctx.lineTo(-8, -14);
    ctx.lineTo(-12, -14);
    ctx.lineTo(-8, 0);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-2, 0);
    ctx.lineTo(-8, 14);
    ctx.lineTo(-12, 14);
    ctx.lineTo(-8, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Mach number display
    ctx.font = '14px monospace';
    ctx.fillStyle = '#8A9A5B';
    ctx.textAlign = 'center';
    ctx.fillText('M = ' + mach.toFixed(2), sourceX, sourceY - 30);

    // Ground observers
    const groundY = H * 0.85;
    ctx.strokeStyle = 'rgba(138,154,91,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(W, groundY);
    ctx.stroke();

    // Draw ground observers detecting the boom
    for (let i = 0; i < 8; i++) {
        const ox = W * 0.1 + i * W * 0.1;
        const oy = groundY + 10;

        // Check if shock front has reached this observer
        let hit = false;
        if (mach >= 1) {
            const machAngle = Math.asin(1 / mach);
            const dx = sourceX - ox;
            const dy = sourceY - oy;
            if (dx > 0) {
                const perpAngle = Math.atan2(Math.abs(dy), dx);
                if (perpAngle <= machAngle + 0.1 && perpAngle >= machAngle - 0.1) {
                    hit = true;
                }
            }
        }

        ctx.fillStyle = hit ? '#DDA15E' : 'rgba(138,154,91,0.5)';
        ctx.beginPath();
        ctx.arc(ox, oy, 4, 0, Math.PI * 2);
        ctx.fill();

        if (hit) {
            // Boom indicator
            ctx.font = '10px monospace';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('BOOM!', ox, oy + 18);
        }
    }

    requestAnimationFrame(animate);
}

window.reset = function() {
    mach = 1.5;
    trailLength = 40;
    document.getElementById('machSlider').value = 150;
    document.getElementById('trailSlider').value = 40;
    document.getElementById('machVal').textContent = '1.50';
    document.getElementById('trailVal').textContent = '40';
    init();
    updateInfo();
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); running = !running; }
});

animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
