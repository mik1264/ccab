<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beats & Acoustic Interference - Acoustic Phenomena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #c8d0e0; }
canvas { display: block; }
.back-link {
    position: fixed; top: 10px; left: 10px; z-index: 1000;
    color: #8A9A5B; text-decoration: none; font-size: 1.2rem;
}
.controls {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 20px; max-width: 280px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { color: #8A9A5B; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.control-row { margin-bottom: 10px; }
.control-row label { display: block; font-size: 12px; color: #8a92a8; margin-bottom: 3px; }
.control-row input[type="range"] { width: 100%; accent-color: #8A9A5B; }
.control-row .value { float: right; color: #DDA15E; font-size: 12px; font-weight: 600; }
.control-row button {
    background: rgba(138,154,91,0.2); color: #8A9A5B; border: 1px solid rgba(138,154,91,0.4);
    padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; margin: 2px;
    transition: all 0.2s;
}
.control-row button:hover { background: rgba(138,154,91,0.4); }
.control-row button.active { background: #8A9A5B; color: #0a0e1a; }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 10px 20px;
    border: 1px solid rgba(138,154,91,0.3);
    font-size: 13px; color: #8a92a8; text-align: center;
}
.info span { color: #DDA15E; font-weight: 600; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>

<div class="controls">
    <h3>Beats & Interference</h3>
    <div class="control-row">
        <label>Frequency 1 <span class="value" id="f1Val">440 Hz</span></label>
        <input type="range" id="f1Slider" min="200" max="600" value="440" step="1">
    </div>
    <div class="control-row">
        <label>Frequency 2 <span class="value" id="f2Val">444 Hz</span></label>
        <input type="range" id="f2Slider" min="200" max="600" value="444" step="1">
    </div>
    <div class="control-row">
        <label>Amplitude 1 <span class="value" id="a1Val">1.0</span></label>
        <input type="range" id="a1Slider" min="0" max="100" value="100" step="1">
    </div>
    <div class="control-row">
        <label>Amplitude 2 <span class="value" id="a2Val">1.0</span></label>
        <input type="range" id="a2Slider" min="0" max="100" value="100" step="1">
    </div>
    <div class="control-row">
        <button id="btnSound" class="active">Sound Off</button>
    </div>
</div>

<div class="info">
    f1: <span id="infoF1">440</span> Hz | f2: <span id="infoF2">444</span> Hz |
    Beat freq: <span id="infoBeat">4</span> Hz | Avg freq: <span id="infoAvg">442</span> Hz
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let f1 = 440, f2 = 444;
let a1 = 1.0, a2 = 1.0;
let time = 0;
let running = true;
let soundOn = false;
let audioCtx = null;
let osc1 = null, osc2 = null, gain1 = null, gain2 = null;

function updateInfo() {
    const beatFreq = Math.abs(f1 - f2);
    const avgFreq = (f1 + f2) / 2;
    document.getElementById('infoF1').textContent = f1;
    document.getElementById('infoF2').textContent = f2;
    document.getElementById('infoBeat').textContent = beatFreq;
    document.getElementById('infoAvg').textContent = avgFreq.toFixed(0);
}

document.getElementById('f1Slider').addEventListener('input', e => {
    f1 = parseInt(e.target.value);
    document.getElementById('f1Val').textContent = f1 + ' Hz';
    if (osc1) osc1.frequency.value = f1;
    updateInfo();
});
document.getElementById('f2Slider').addEventListener('input', e => {
    f2 = parseInt(e.target.value);
    document.getElementById('f2Val').textContent = f2 + ' Hz';
    if (osc2) osc2.frequency.value = f2;
    updateInfo();
});
document.getElementById('a1Slider').addEventListener('input', e => {
    a1 = parseInt(e.target.value) / 100;
    document.getElementById('a1Val').textContent = a1.toFixed(2);
    if (gain1) gain1.gain.value = a1 * 0.1;
});
document.getElementById('a2Slider').addEventListener('input', e => {
    a2 = parseInt(e.target.value) / 100;
    document.getElementById('a2Val').textContent = a2.toFixed(2);
    if (gain2) gain2.gain.value = a2 * 0.1;
});

document.getElementById('btnSound').addEventListener('click', () => {
    soundOn = !soundOn;
    const btn = document.getElementById('btnSound');
    if (soundOn) {
        btn.textContent = 'Sound On';
        btn.classList.add('active');
        startAudio();
    } else {
        btn.textContent = 'Sound Off';
        btn.classList.remove('active');
        stopAudio();
    }
});

function startAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    osc1 = audioCtx.createOscillator();
    osc2 = audioCtx.createOscillator();
    gain1 = audioCtx.createGain();
    gain2 = audioCtx.createGain();
    osc1.frequency.value = f1;
    osc2.frequency.value = f2;
    gain1.gain.value = a1 * 0.1;
    gain2.gain.value = a2 * 0.1;
    osc1.connect(gain1).connect(audioCtx.destination);
    osc2.connect(gain2).connect(audioCtx.destination);
    osc1.start();
    osc2.start();
}

function stopAudio() {
    if (osc1) { osc1.stop(); osc1 = null; }
    if (osc2) { osc2.stop(); osc2 = null; }
}

updateInfo();

function drawWaveform(y, h, label, color, fn) {
    const margin = 60;
    const waveW = W - margin * 2;

    // Background
    ctx.fillStyle = 'rgba(10,14,26,0.4)';
    ctx.fillRect(margin, y, waveW, h);
    ctx.strokeStyle = 'rgba(138,154,91,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(margin, y, waveW, h);

    // Center line
    ctx.strokeStyle = 'rgba(138,154,91,0.15)';
    ctx.beginPath();
    ctx.moveTo(margin, y + h / 2);
    ctx.lineTo(margin + waveW, y + h / 2);
    ctx.stroke();

    // Label
    ctx.font = '12px monospace';
    ctx.fillStyle = color;
    ctx.textAlign = 'left';
    ctx.fillText(label, margin + 5, y + 15);

    // Waveform
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = 0; x <= waveW; x++) {
        const t = time + x * 0.00005;
        const val = fn(t);
        const py = y + h / 2 - val * (h / 2 - 10);
        if (x === 0) ctx.moveTo(margin + x, py); else ctx.lineTo(margin + x, py);
    }
    ctx.stroke();
}

function animate() {
    if (running) time += 0.016;

    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);

    const sectionH = (H - 40) / 4;
    const gap = 10;

    // Wave 1
    drawWaveform(gap, sectionH - gap, `Wave 1: ${f1} Hz`, 'rgba(138,154,91,0.8)', t => {
        return a1 * Math.sin(2 * Math.PI * f1 * t);
    });

    // Wave 2
    drawWaveform(sectionH + gap, sectionH - gap, `Wave 2: ${f2} Hz`, 'rgba(100,140,200,0.8)', t => {
        return a2 * Math.sin(2 * Math.PI * f2 * t);
    });

    // Superposition
    drawWaveform(sectionH * 2 + gap, sectionH - gap, 'Superposition', 'rgba(221,161,94,0.9)', t => {
        return (a1 * Math.sin(2 * Math.PI * f1 * t) + a2 * Math.sin(2 * Math.PI * f2 * t)) / 2;
    });

    // Beat envelope
    const beatFreq = Math.abs(f1 - f2);
    drawWaveform(sectionH * 3 + gap, sectionH - gap, `Beat Envelope: ${beatFreq} Hz`, 'rgba(188,108,37,0.8)', t => {
        return Math.cos(Math.PI * beatFreq * t);
    });

    // Beat period annotation
    if (beatFreq > 0 && beatFreq < 30) {
        const margin = 60;
        const waveW = W - margin * 2;
        const beatPeriod = 1 / beatFreq;
        const pxPerSec = waveW / (waveW * 0.00005);
        const beatPx = Math.min(beatPeriod * pxPerSec * 0.00005, waveW * 0.8);

        if (beatPx > 30) {
            const by = sectionH * 3 + gap + sectionH - gap - 25;
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(margin + 10, by);
            ctx.lineTo(margin + 10 + beatPx, by);
            ctx.stroke();
            ctx.font = '10px monospace';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText('T = ' + (1000 / beatFreq).toFixed(0) + ' ms', margin + 10 + beatPx / 2, by - 5);
        }
    }

    requestAnimationFrame(animate);
}

window.reset = function() {
    time = 0;
    f1 = 440; f2 = 444; a1 = 1.0; a2 = 1.0;
    document.getElementById('f1Slider').value = 440;
    document.getElementById('f2Slider').value = 444;
    document.getElementById('a1Slider').value = 100;
    document.getElementById('a2Slider').value = 100;
    document.getElementById('f1Val').textContent = '440 Hz';
    document.getElementById('f2Val').textContent = '444 Hz';
    document.getElementById('a1Val').textContent = '1.00';
    document.getElementById('a2Val').textContent = '1.00';
    stopAudio();
    soundOn = false;
    document.getElementById('btnSound').textContent = 'Sound Off';
    document.getElementById('btnSound').classList.remove('active');
    updateInfo();
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); running = !running; }
});

animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
