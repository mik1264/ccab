<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispering Gallery - Acoustic Phenomena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; color: #c8d0e0; }
canvas { display: block; cursor: crosshair; }
.back-link {
    position: fixed; top: 10px; left: 10px; z-index: 1000;
    color: #8A9A5B; text-decoration: none; font-size: 1.2rem;
}
.controls {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 20px; max-width: 260px;
    border: 1px solid rgba(138,154,91,0.3);
}
.controls h3 { color: #8A9A5B; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.control-row { margin-bottom: 10px; }
.control-row label { display: block; font-size: 12px; color: #8a92a8; margin-bottom: 3px; }
.control-row input[type="range"] { width: 100%; accent-color: #8A9A5B; }
.control-row .value { float: right; color: #DDA15E; font-size: 12px; font-weight: 600; }
.control-row button {
    background: rgba(138,154,91,0.2); color: #8A9A5B; border: 1px solid rgba(138,154,91,0.4);
    padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; margin: 2px;
    transition: all 0.2s;
}
.control-row button:hover { background: rgba(138,154,91,0.4); }
.control-row button.active { background: #8A9A5B; color: #0a0e1a; }
.info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    background: rgba(10,14,26,0.85); backdrop-filter: blur(10px);
    border-radius: 10px; padding: 10px 20px;
    border: 1px solid rgba(138,154,91,0.3);
    font-size: 13px; color: #8a92a8; text-align: center;
}
.info span { color: #DDA15E; font-weight: 600; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>

<div class="controls">
    <h3>Whispering Gallery</h3>
    <div class="control-row">
        <label>Eccentricity <span class="value" id="eccVal">0.60</span></label>
        <input type="range" id="eccSlider" min="0" max="90" value="60" step="1">
    </div>
    <div class="control-row">
        <label>Ray Count <span class="value" id="rayVal">12</span></label>
        <input type="range" id="raySlider" min="1" max="36" value="12" step="1">
    </div>
    <div class="control-row">
        <label>Max Bounces <span class="value" id="bounceVal">20</span></label>
        <input type="range" id="bounceSlider" min="5" max="60" value="20" step="1">
    </div>
    <div class="control-row">
        <label>Shape</label>
        <div>
            <button id="btnEllipse" class="active">Ellipse</button>
            <button id="btnCircle">Circle</button>
        </div>
    </div>
    <div class="control-row">
        <label style="font-size:11px;color:#606C38;">Click inside to place sound source</label>
    </div>
</div>

<div class="info">
    Shape: <span id="infoShape">Ellipse</span> |
    Reflections: <span id="infoBounces">--</span> |
    Click to emit sound rays
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let eccentricity = 0.6;
let rayCount = 12;
let maxBounces = 20;
let shapeType = 'ellipse';
let running = true;

let rays = [];
let sourceX, sourceY;
let animProgress = 0;

function getCx() { return W / 2; }
function getCy() { return H / 2; }
function getA() { return Math.min(W, H) * 0.38; }
function getB() {
    if (shapeType === 'circle') return getA();
    return getA() * Math.sqrt(1 - eccentricity * eccentricity);
}

// Find intersection of ray with ellipse
function rayEllipseIntersect(ox, oy, dx, dy) {
    const cx = getCx(), cy = getCy();
    const a = getA(), b = getB();
    // Transform to ellipse coords
    const px = ox - cx, py = oy - cy;

    // (px+t*dx)^2/a^2 + (py+t*dy)^2/b^2 = 1
    const A = (dx * dx) / (a * a) + (dy * dy) / (b * b);
    const B = 2 * ((px * dx) / (a * a) + (py * dy) / (b * b));
    const C = (px * px) / (a * a) + (py * py) / (b * b) - 1;

    const disc = B * B - 4 * A * C;
    if (disc < 0) return null;

    const t1 = (-B + Math.sqrt(disc)) / (2 * A);
    const t2 = (-B - Math.sqrt(disc)) / (2 * A);

    let t = -1;
    if (t1 > 0.001 && t2 > 0.001) t = Math.min(t1, t2);
    else if (t1 > 0.001) t = t1;
    else if (t2 > 0.001) t = t2;
    else return null;

    return {
        x: ox + dx * t,
        y: oy + dy * t,
        t: t
    };
}

function reflectRay(ix, iy, dx, dy) {
    const cx = getCx(), cy = getCy();
    const a = getA(), b = getB();

    // Normal to ellipse at (ix, iy)
    const nx = 2 * (ix - cx) / (a * a);
    const ny = 2 * (iy - cy) / (b * b);
    const nLen = Math.sqrt(nx * nx + ny * ny);
    const nnx = nx / nLen, nny = ny / nLen;

    // Reflect: d' = d - 2(d.n)n
    const dot = dx * nnx + dy * nny;
    return {
        dx: dx - 2 * dot * nnx,
        dy: dy - 2 * dot * nny
    };
}

function traceRays(sx, sy) {
    rays = [];
    const cx = getCx(), cy = getCy();
    const a = getA(), b = getB();

    // Check if source is inside
    const test = ((sx - cx) * (sx - cx)) / (a * a) + ((sy - cy) * (sy - cy)) / (b * b);
    if (test >= 1) return;

    for (let i = 0; i < rayCount; i++) {
        const angle = (i / rayCount) * Math.PI * 2;
        let dx = Math.cos(angle);
        let dy = Math.sin(angle);
        let ox = sx, oy = sy;
        const segments = [];

        for (let bounce = 0; bounce < maxBounces; bounce++) {
            const hit = rayEllipseIntersect(ox, oy, dx, dy);
            if (!hit) break;

            segments.push({ x1: ox, y1: oy, x2: hit.x, y2: hit.y, bounce });
            const ref = reflectRay(hit.x, hit.y, dx, dy);
            ox = hit.x;
            oy = hit.y;
            dx = ref.dx;
            dy = ref.dy;
        }

        rays.push(segments);
    }

    animProgress = 0;
    document.getElementById('infoBounces').textContent = rays.length > 0 ? rays[0].length : 0;
}

// Place source at focus by default
function resetSource() {
    const cx = getCx(), cy = getCy();
    const a = getA(), b = getB();
    const focalDist = Math.sqrt(a * a - b * b);
    sourceX = cx - focalDist;
    sourceY = cy;
    traceRays(sourceX, sourceY);
}

resetSource();

canvas.addEventListener('click', e => {
    sourceX = e.clientX;
    sourceY = e.clientY;
    traceRays(sourceX, sourceY);
});

document.getElementById('eccSlider').addEventListener('input', e => {
    eccentricity = parseInt(e.target.value) / 100;
    document.getElementById('eccVal').textContent = eccentricity.toFixed(2);
    resetSource();
});
document.getElementById('raySlider').addEventListener('input', e => {
    rayCount = parseInt(e.target.value);
    document.getElementById('rayVal').textContent = rayCount;
    traceRays(sourceX, sourceY);
});
document.getElementById('bounceSlider').addEventListener('input', e => {
    maxBounces = parseInt(e.target.value);
    document.getElementById('bounceVal').textContent = maxBounces;
    traceRays(sourceX, sourceY);
});

document.getElementById('btnEllipse').addEventListener('click', () => {
    shapeType = 'ellipse';
    document.getElementById('btnEllipse').classList.add('active');
    document.getElementById('btnCircle').classList.remove('active');
    document.getElementById('infoShape').textContent = 'Ellipse';
    resetSource();
});
document.getElementById('btnCircle').addEventListener('click', () => {
    shapeType = 'circle';
    document.getElementById('btnCircle').classList.add('active');
    document.getElementById('btnEllipse').classList.remove('active');
    document.getElementById('infoShape').textContent = 'Circle';
    resetSource();
});

function animate() {
    if (running) {
        animProgress = Math.min(animProgress + 0.02, 1);
    }

    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, W, H);

    const cx = getCx(), cy = getCy();
    const a = getA(), b = getB();

    // Draw gallery wall
    ctx.strokeStyle = 'rgba(138,154,91,0.6)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(cx, cy, a, b, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Wall fill (subtle)
    ctx.fillStyle = 'rgba(138,154,91,0.03)';
    ctx.beginPath();
    ctx.ellipse(cx, cy, a, b, 0, 0, Math.PI * 2);
    ctx.fill();

    // Draw foci (for ellipse)
    if (shapeType === 'ellipse' && eccentricity > 0.01) {
        const focalDist = Math.sqrt(a * a - b * b);
        // Focus 1
        ctx.fillStyle = 'rgba(221,161,94,0.5)';
        ctx.beginPath();
        ctx.arc(cx - focalDist, cy, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.font = '10px monospace';
        ctx.fillStyle = '#DDA15E';
        ctx.textAlign = 'center';
        ctx.fillText('F1', cx - focalDist, cy + 18);

        // Focus 2
        ctx.fillStyle = 'rgba(221,161,94,0.5)';
        ctx.beginPath();
        ctx.arc(cx + focalDist, cy, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#DDA15E';
        ctx.fillText('F2', cx + focalDist, cy + 18);
    }

    // Draw rays with animation
    const totalSegs = rays.length > 0 ? rays[0].length : 0;
    const showSegs = Math.floor(animProgress * totalSegs * 1.5);

    for (let r = 0; r < rays.length; r++) {
        const segs = rays[r];
        const hue = (r / rays.length) * 60 + 30; // earth tones

        for (let s = 0; s < Math.min(segs.length, showSegs); s++) {
            const seg = segs[s];
            const alpha = Math.max(0.1, 0.7 - s * 0.025);
            const intensity = Math.max(0.3, 1 - s / maxBounces);

            ctx.strokeStyle = `rgba(${138 + 83 * intensity | 0},${154 + 7 * intensity | 0},${91 + 3 * intensity | 0},${alpha})`;
            ctx.lineWidth = Math.max(0.5, 2 - s * 0.05);
            ctx.beginPath();
            ctx.moveTo(seg.x1, seg.y1);
            ctx.lineTo(seg.x2, seg.y2);
            ctx.stroke();

            // Reflection point glow
            if (s < segs.length - 1) {
                ctx.fillStyle = `rgba(221,161,94,${alpha * 0.4})`;
                ctx.beginPath();
                ctx.arc(seg.x2, seg.y2, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // Draw source
    ctx.fillStyle = '#DDA15E';
    ctx.beginPath();
    ctx.arc(sourceX, sourceY, 6, 0, Math.PI * 2);
    ctx.fill();

    // Pulsing glow
    const pulse = Math.sin(Date.now() * 0.003) * 0.3 + 0.5;
    ctx.fillStyle = `rgba(221,161,94,${pulse * 0.3})`;
    ctx.beginPath();
    ctx.arc(sourceX, sourceY, 12, 0, Math.PI * 2);
    ctx.fill();

    ctx.font = '11px monospace';
    ctx.fillStyle = '#DDA15E';
    ctx.textAlign = 'center';
    ctx.fillText('Source', sourceX, sourceY - 15);

    requestAnimationFrame(animate);
}

window.reset = function() {
    eccentricity = 0.6;
    rayCount = 12;
    maxBounces = 20;
    shapeType = 'ellipse';
    document.getElementById('eccSlider').value = 60;
    document.getElementById('raySlider').value = 12;
    document.getElementById('bounceSlider').value = 20;
    document.getElementById('eccVal').textContent = '0.60';
    document.getElementById('rayVal').textContent = '12';
    document.getElementById('bounceVal').textContent = '20';
    document.getElementById('btnEllipse').classList.add('active');
    document.getElementById('btnCircle').classList.remove('active');
    document.getElementById('infoShape').textContent = 'Ellipse';
    resetSource();
};

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); running = !running; }
});

animate();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
