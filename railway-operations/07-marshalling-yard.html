<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marshalling Yard Shunting - Railway Operations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,50,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; display: flex; gap: 14px;
            align-items: center; z-index: 100; border: 1px solid rgba(138,154,91,0.3);
            flex-wrap: wrap; justify-content: center;
        }
        #controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem;
        }
        #controls button:hover { background: #8A9A5B; }
        #controls label { color: #FEFAE0; font-size: 0.85rem; }
        #controls input[type=range] { width: 90px; accent-color: #8A9A5B; }
        #info {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); padding: 12px 16px; border-radius: 10px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 220px;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #info h3 { color: #DDA15E; margin-bottom: 6px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div id="info">
        <h3>Marshalling Yard</h3>
        <p>Freight cars arrive mixed and must be sorted to classification tracks by destination.</p>
        <p style="margin-top:6px;color:#8A9A5B;">Cars roll down the hump and switch to the correct track.</p>
        <div id="yardStats" style="margin-top:8px;"></div>
    </div>
    <div id="controls">
        <button id="newTrain">New Inbound Train</button>
        <button id="humpBtn">Push over Hump</button>
        <label>Speed: <span id="speedVal">1</span>x
            <input type="range" id="speed" min="1" max="5" value="1">
        </label>
        <button id="autoMode">Auto Mode</button>
    </div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let paused = false;
        let simSpeed = 1;
        let autoRun = false;

        const COLORS = {
            sage: '#8A9A5B', moss: '#606C38', earth: '#DDA15E', cream: '#FEFAE0',
            red: '#e74c3c', green: '#2ecc71'
        };

        const DEST_COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#f39c12', '#1abc9c', '#e67e22', '#8e44ad'];
        const DEST_NAMES = ['NYC', 'CHI', 'LAX', 'DFW', 'ATL', 'SEA', 'MIA', 'DEN'];
        const TRACK_COUNT = 8;

        let arrivalTrack = []; // cars waiting to be sorted
        let classificationTracks = [];
        let humpCars = []; // cars in motion on hump
        let sortedCount = 0;
        let totalCars = 0;
        let autoTimer = 0;

        function init() {
            arrivalTrack = [];
            classificationTracks = [];
            for (let i = 0; i < TRACK_COUNT; i++) {
                classificationTracks.push({ dest: DEST_NAMES[i], color: DEST_COLORS[i], cars: [] });
            }
            humpCars = [];
            sortedCount = 0;
            totalCars = 0;
        }

        function createCar() {
            const destIdx = Math.floor(Math.random() * TRACK_COUNT);
            return {
                dest: DEST_NAMES[destIdx],
                destIdx: destIdx,
                color: DEST_COLORS[destIdx],
                id: totalCars++
            };
        }

        function newInboundTrain() {
            const count = 8 + Math.floor(Math.random() * 12);
            for (let i = 0; i < count; i++) {
                arrivalTrack.push(createCar());
            }
        }

        function pushOverHump() {
            if (arrivalTrack.length === 0) return;
            const car = arrivalTrack.shift();
            // Animate car going over hump to classification track
            humpCars.push({
                ...car,
                phase: 'climbing', // climbing, descending, switching
                progress: 0,
                targetTrack: car.destIdx
            });
        }

        function update(dt) {
            // Update hump cars
            for (let c of humpCars) {
                c.progress += 0.02 * simSpeed;
                if (c.progress < 0.3) {
                    c.phase = 'climbing';
                } else if (c.progress < 0.6) {
                    c.phase = 'descending';
                } else if (c.progress < 1.0) {
                    c.phase = 'switching';
                } else {
                    c.phase = 'done';
                    classificationTracks[c.targetTrack].cars.push(c);
                    sortedCount++;
                }
            }
            humpCars = humpCars.filter(c => c.phase !== 'done');

            // Auto mode
            if (autoRun) {
                autoTimer += dt * simSpeed;
                if (autoTimer > 0.3) {
                    autoTimer = 0;
                    if (arrivalTrack.length === 0) {
                        newInboundTrain();
                    }
                    pushOverHump();
                }
            }
        }

        function drawYard() {
            const humpX = W * 0.35;
            const humpY = H * 0.25;
            const arrivalY = H * 0.2;
            const classStartX = W * 0.45;
            const classEndX = W * 0.92;
            const classTopY = H * 0.12;
            const classH = (H * 0.75) / TRACK_COUNT;

            // Arrival track
            ctx.strokeStyle = '#555577';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(W * 0.02, arrivalY);
            ctx.lineTo(humpX - 20, arrivalY);
            ctx.stroke();

            ctx.fillStyle = COLORS.cream + '60';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('Arrival Track', W * 0.02, arrivalY - 18);

            // Draw arrival cars
            const carW = 28;
            const carH = 16;
            for (let i = 0; i < Math.min(arrivalTrack.length, 20); i++) {
                const car = arrivalTrack[i];
                const cx = humpX - 30 - i * (carW + 3);
                if (cx < 10) break;
                ctx.fillStyle = car.color;
                ctx.fillRect(cx, arrivalY - carH / 2, carW, carH);
                ctx.fillStyle = COLORS.cream;
                ctx.font = '8px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(car.dest, cx + carW / 2, arrivalY + 3);
            }

            if (arrivalTrack.length > 20) {
                ctx.fillStyle = COLORS.cream + 'aa';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText('+' + (arrivalTrack.length - 20) + ' more', W * 0.02, arrivalY + 20);
            }

            // Hump (elevated section)
            ctx.fillStyle = '#3a3a55';
            ctx.beginPath();
            ctx.moveTo(humpX - 20, arrivalY + 10);
            ctx.quadraticCurveTo(humpX, arrivalY - 40, humpX + 40, arrivalY + 10);
            ctx.lineTo(humpX + 40, arrivalY + 15);
            ctx.quadraticCurveTo(humpX, arrivalY - 35, humpX - 20, arrivalY + 15);
            ctx.fill();

            ctx.fillStyle = COLORS.earth;
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('HUMP', humpX + 10, arrivalY - 42);

            // Classification tracks (fan out)
            for (let i = 0; i < TRACK_COUNT; i++) {
                const track = classificationTracks[i];
                const ty = classTopY + i * classH + classH / 2;

                // Track from hump area to classification
                ctx.strokeStyle = track.color + '40';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(humpX + 40, arrivalY);
                ctx.quadraticCurveTo(classStartX - 30, (arrivalY + ty) / 2, classStartX, ty);
                ctx.lineTo(classEndX, ty);
                ctx.stroke();

                // Track rails
                ctx.strokeStyle = '#555577';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(classStartX, ty);
                ctx.lineTo(classEndX, ty);
                ctx.stroke();

                // Track label
                ctx.fillStyle = track.color;
                ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(track.dest, classEndX + 5, ty - 12);
                ctx.fillStyle = COLORS.cream + '80';
                ctx.font = '10px sans-serif';
                ctx.fillText('(' + track.cars.length + ')', classEndX + 5, ty + 2);

                // Draw sorted cars
                for (let j = 0; j < Math.min(track.cars.length, 15); j++) {
                    const cx = classEndX - 5 - j * (carW + 2);
                    if (cx < classStartX) break;
                    ctx.fillStyle = track.color;
                    ctx.fillRect(cx - carW, ty - carH / 2 + 1, carW, carH - 2);
                }
            }

            // Draw hump cars in motion
            for (let c of humpCars) {
                const ty = classTopY + c.targetTrack * classH + classH / 2;
                let cx, cy;

                if (c.progress < 0.3) {
                    // Climbing hump
                    const t = c.progress / 0.3;
                    cx = humpX - 10 + t * 30;
                    cy = arrivalY - Math.sin(t * Math.PI) * 35;
                } else if (c.progress < 0.6) {
                    // Descending toward switch
                    const t = (c.progress - 0.3) / 0.3;
                    cx = humpX + 20 + t * (classStartX - humpX - 20);
                    cy = arrivalY + (ty - arrivalY) * t * 0.5;
                } else {
                    // Rolling to classification
                    const t = (c.progress - 0.6) / 0.4;
                    cx = classStartX + t * (classEndX - classStartX - c.targetTrack * 20);
                    cy = arrivalY + (ty - arrivalY) * (0.5 + t * 0.5);
                }

                ctx.fillStyle = c.color;
                ctx.shadowColor = c.color;
                ctx.shadowBlur = 8;
                ctx.fillRect(cx - carW / 2, cy - carH / 2, carW, carH);
                ctx.shadowBlur = 0;

                ctx.fillStyle = COLORS.cream;
                ctx.font = '8px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(c.dest, cx, cy + 3);
            }
        }

        function updateStats() {
            const total = classificationTracks.reduce((s, t) => s + t.cars.length, 0);
            document.getElementById('yardStats').innerHTML =
                '<div>Sorted: <b>' + sortedCount + '</b></div>' +
                '<div>In Queue: <b>' + arrivalTrack.length + '</b></div>' +
                '<div>On Hump: <b>' + humpCars.length + '</b></div>';
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = COLORS.earth;
            ctx.font = 'bold 18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Marshalling Yard - Hump Classification', W / 2, 35);
            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = '13px sans-serif';
            ctx.fillText('Freight cars pushed over hump and gravity-sorted to destination tracks', W / 2, 55);

            drawYard();
            updateStats();
        }

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        let lastTime = 0;
        function animate(time) {
            const dt = (time - lastTime) / 1000;
            lastTime = time;
            if (!paused) update(dt);
            draw();
            requestAnimationFrame(animate);
        }

        document.getElementById('newTrain').addEventListener('click', newInboundTrain);
        document.getElementById('humpBtn').addEventListener('click', pushOverHump);
        document.getElementById('speed').addEventListener('input', function() {
            simSpeed = parseInt(this.value);
            document.getElementById('speedVal').textContent = this.value;
        });
        document.getElementById('autoMode').addEventListener('click', function() {
            autoRun = !autoRun;
            this.textContent = autoRun ? 'Stop Auto' : 'Auto Mode';
            this.style.background = autoRun ? '#DDA15E' : '#606C38';
        });

        window.reset = function() {
            init();
            autoRun = false;
            simSpeed = 1;
            document.getElementById('speed').value = 1;
            document.getElementById('speedVal').textContent = '1';
            document.getElementById('autoMode').textContent = 'Auto Mode';
            document.getElementById('autoMode').style.background = '#606C38';
            newInboundTrain();
        };

        window.addEventListener('enhanceReady', function() {
            if (window.enhance) { window.enhance.onPause = function(p) { paused = p; }; }
        });

        init();
        newInboundTrain();
        requestAnimationFrame(animate);
    })();
    </script>
</body>
</html>
