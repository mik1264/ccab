<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Capacity Analysis - Railway Operations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,50,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; display: flex; gap: 16px;
            align-items: center; z-index: 100; border: 1px solid rgba(138,154,91,0.3);
            flex-wrap: wrap; justify-content: center;
        }
        #controls label { color: #FEFAE0; font-size: 0.85rem; }
        #controls input[type=range] { width: 100px; accent-color: #8A9A5B; }
        #controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem;
        }
        #controls button:hover { background: #8A9A5B; }
        #info {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); padding: 12px 16px; border-radius: 10px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; min-width: 200px;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #info h3 { color: #DDA15E; margin-bottom: 6px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div id="info">
        <h3>UIC 406 Capacity</h3>
        <div id="capStats"></div>
    </div>
    <div id="controls">
        <label>Trains/hr: <span id="trainRateVal">12</span>
            <input type="range" id="trainRate" min="4" max="30" value="12">
        </label>
        <label>Speed Variation: <span id="speedVarVal">30</span>%
            <input type="range" id="speedVar" min="0" max="60" step="5" value="30">
        </label>
        <label>Stops: <span id="stopsVal">2</span>
            <input type="range" id="stops" min="0" max="5" value="2">
        </label>
        <button id="compressBtn">Compress Timetable</button>
        <button id="resetBtn">Reset</button>
    </div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let paused = false;

        const COLORS = {
            sage: '#8A9A5B', moss: '#606C38', earth: '#DDA15E', cream: '#FEFAE0',
            red: '#e74c3c', yellow: '#f1c40f', green: '#2ecc71', blue: '#3498db',
            purple: '#9b59b6'
        };

        let trainRate = 12;
        let speedVariation = 30;
        let stopCount = 2;
        let timetable = [];
        let compressed = false;
        let compressionFactor = 0;

        const LINE_LENGTH = 100; // km
        const TIME_WINDOW = 120; // minutes

        function generateTimetable() {
            timetable = [];
            const interval = TIME_WINDOW / trainRate;
            const types = ['express', 'intercity', 'local', 'freight'];
            const baseSpeedsKmh = [160, 130, 100, 80];
            const typeColors = [COLORS.red, COLORS.earth, COLORS.sage, '#7f8c8d'];

            for (let i = 0; i < trainRate; i++) {
                const typeIdx = Math.floor(Math.random() * types.length);
                const baseSpeed = baseSpeedsKmh[typeIdx];
                const speed = baseSpeed * (1 + (Math.random() - 0.5) * speedVariation / 100);
                const departTime = i * interval + (Math.random() - 0.5) * interval * 0.3;

                // Generate path points (time-distance pairs)
                const path = [];
                let t = departTime;
                let d = 0;

                path.push({ time: t, dist: d });

                // Add intermediate stops
                const stopLocations = [];
                for (let s = 0; s < stopCount; s++) {
                    stopLocations.push((s + 1) * LINE_LENGTH / (stopCount + 1));
                }

                for (let stopDist of stopLocations) {
                    const travelTime = (stopDist - d) / speed * 60;
                    t += travelTime;
                    path.push({ time: t, dist: stopDist }); // arrive
                    t += 2 + Math.random() * 3; // dwell
                    path.push({ time: t, dist: stopDist }); // depart
                    d = stopDist;
                }

                // Final segment
                const finalTime = (LINE_LENGTH - d) / speed * 60;
                t += finalTime;
                path.push({ time: t, dist: LINE_LENGTH });

                timetable.push({
                    id: i + 1,
                    type: types[typeIdx],
                    color: typeColors[typeIdx],
                    speed,
                    path,
                    departTime,
                    arriveTime: t
                });
            }

            timetable.sort((a, b) => a.departTime - b.departTime);
            compressed = false;
            compressionFactor = 0;
        }

        function compressTimetable() {
            if (compressed) return;

            // UIC 406 compression: remove buffer time, pack trains as tight as possible
            const minHeadway = 3; // minutes

            timetable.sort((a, b) => a.departTime - b.departTime);

            let prevPath = null;
            for (let i = 0; i < timetable.length; i++) {
                if (i === 0) {
                    // Shift first train to time 0
                    const shift = timetable[i].departTime;
                    for (let p of timetable[i].path) p.time -= shift;
                    timetable[i].departTime -= shift;
                    timetable[i].arriveTime -= shift;
                } else {
                    // Find minimum gap to previous train
                    const prev = timetable[i - 1];
                    let minGap = Infinity;

                    // Check gap at several distance points
                    for (let d = 0; d <= LINE_LENGTH; d += 5) {
                        const prevTime = getTimeAtDist(prev.path, d);
                        const currTime = getTimeAtDist(timetable[i].path, d);
                        if (prevTime !== null && currTime !== null) {
                            minGap = Math.min(minGap, currTime - prevTime);
                        }
                    }

                    // Shift to maintain minimum headway
                    const shift = minGap - minHeadway;
                    if (shift > 0.5) {
                        for (let p of timetable[i].path) p.time -= shift;
                        timetable[i].departTime -= shift;
                        timetable[i].arriveTime -= shift;
                    }
                }
            }

            compressed = true;

            // Calculate compression ratio
            const totalTime = Math.max(...timetable.map(t => t.arriveTime)) - Math.min(...timetable.map(t => t.departTime));
            compressionFactor = totalTime / TIME_WINDOW;
        }

        function getTimeAtDist(path, dist) {
            for (let i = 1; i < path.length; i++) {
                if (path[i - 1].dist <= dist && path[i].dist >= dist) {
                    if (path[i].dist === path[i - 1].dist) return path[i].time;
                    const t = (dist - path[i - 1].dist) / (path[i].dist - path[i - 1].dist);
                    return path[i - 1].time + t * (path[i].time - path[i - 1].time);
                }
            }
            return null;
        }

        function drawStringDiagram() {
            const margin = { top: 90, right: 50, bottom: 80, left: 80 };
            const gw = W - margin.left - margin.right;
            const gh = H - margin.top - margin.bottom;

            // Background
            ctx.fillStyle = 'rgba(30,40,60,0.3)';
            ctx.fillRect(margin.left, margin.top, gw, gh);

            // Determine time range
            const allTimes = timetable.flatMap(t => t.path.map(p => p.time));
            const minTime = Math.min(...allTimes);
            const maxTime = Math.max(...allTimes);
            const timeRange = maxTime - minTime || 1;

            // Grid
            ctx.strokeStyle = 'rgba(138,154,91,0.1)';
            ctx.lineWidth = 1;

            // Time grid (vertical)
            const timeStep = Math.ceil(timeRange / 12);
            for (let t = Math.ceil(minTime / timeStep) * timeStep; t <= maxTime; t += timeStep) {
                const x = margin.left + ((t - minTime) / timeRange) * gw;
                ctx.beginPath();
                ctx.moveTo(x, margin.top);
                ctx.lineTo(x, margin.top + gh);
                ctx.stroke();
                ctx.fillStyle = COLORS.cream + '60';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(t.toFixed(0) + 'min', x, margin.top + gh + 16);
            }

            // Distance grid (horizontal)
            for (let d = 0; d <= LINE_LENGTH; d += 20) {
                const y = margin.top + (d / LINE_LENGTH) * gh;
                ctx.beginPath();
                ctx.moveTo(margin.left, y);
                ctx.lineTo(margin.left + gw, y);
                ctx.stroke();
                ctx.fillStyle = COLORS.cream + '60';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(d + ' km', margin.left - 8, y + 4);
            }

            // Station markers
            const stationDists = [];
            for (let s = 0; s < stopCount; s++) {
                stationDists.push((s + 1) * LINE_LENGTH / (stopCount + 1));
            }
            for (let sd of stationDists) {
                const y = margin.top + (sd / LINE_LENGTH) * gh;
                ctx.strokeStyle = COLORS.earth + '40';
                ctx.lineWidth = 2;
                ctx.setLineDash([6, 4]);
                ctx.beginPath();
                ctx.moveTo(margin.left, y);
                ctx.lineTo(margin.left + gw, y);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = COLORS.earth;
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText('Station', margin.left - 8, y - 6);
            }

            // Axes
            ctx.strokeStyle = COLORS.cream + '60';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(margin.left, margin.top);
            ctx.lineTo(margin.left, margin.top + gh);
            ctx.lineTo(margin.left + gw, margin.top + gh);
            ctx.stroke();

            // Axis labels
            ctx.fillStyle = COLORS.cream + '80';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Time (minutes)', margin.left + gw / 2, margin.top + gh + 40);

            ctx.save();
            ctx.translate(margin.left - 55, margin.top + gh / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('Distance (km)', 0, 0);
            ctx.restore();

            // Draw train paths (string lines)
            for (let train of timetable) {
                ctx.strokeStyle = train.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                let first = true;
                for (let p of train.path) {
                    const x = margin.left + ((p.time - minTime) / timeRange) * gw;
                    const y = margin.top + (p.dist / LINE_LENGTH) * gh;
                    if (first) { ctx.moveTo(x, y); first = false; }
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();

                // Train label at start
                const startP = train.path[0];
                const sx = margin.left + ((startP.time - minTime) / timeRange) * gw;
                ctx.fillStyle = train.color;
                ctx.font = '9px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(train.type.charAt(0).toUpperCase() + train.id, sx - 4, margin.top + 12);
            }

            // Capacity stats
            const utilization = compressed ? compressionFactor : 1;
            const capacity = Math.floor(trainRate / utilization);

            document.getElementById('capStats').innerHTML =
                '<div style="margin:4px 0">Trains: <b>' + timetable.length + '</b></div>' +
                '<div style="margin:4px 0">Time Window: <b>' + (maxTime - minTime).toFixed(0) + '</b> min</div>' +
                '<div style="margin:4px 0">Utilization: <b>' + (utilization * 100).toFixed(0) + '%</b></div>' +
                '<div style="margin:4px 0;color:' + (compressed ? COLORS.green : COLORS.yellow) + '">Compressed: <b>' + (compressed ? 'Yes' : 'No') + '</b></div>' +
                '<div style="margin:4px 0">Capacity: <b>' + capacity + '</b> trains/hr</div>';

            // Legend
            const lx = margin.left + 10, ly = margin.top + 10;
            const legendItems = [
                { color: COLORS.red, label: 'Express' },
                { color: COLORS.earth, label: 'Intercity' },
                { color: COLORS.sage, label: 'Local' },
                { color: '#7f8c8d', label: 'Freight' }
            ];
            ctx.fillStyle = 'rgba(30,30,50,0.7)';
            ctx.fillRect(lx - 4, ly - 4, 90, legendItems.length * 18 + 8);
            legendItems.forEach((item, i) => {
                ctx.fillStyle = item.color;
                ctx.fillRect(lx, ly + i * 18, 12, 10);
                ctx.fillStyle = COLORS.cream + 'cc';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(item.label, lx + 18, ly + i * 18 + 9);
            });
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = COLORS.earth;
            ctx.font = 'bold 18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Railway Capacity Analysis - String Diagram (UIC 406)', W / 2, 35);
            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = '13px sans-serif';
            ctx.fillText('Time-distance diagram showing train paths. Compress to find theoretical maximum capacity.', W / 2, 55);

            drawStringDiagram();
        }

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        document.getElementById('trainRate').addEventListener('input', function() {
            trainRate = parseInt(this.value);
            document.getElementById('trainRateVal').textContent = this.value;
            generateTimetable();
        });
        document.getElementById('speedVar').addEventListener('input', function() {
            speedVariation = parseInt(this.value);
            document.getElementById('speedVarVal').textContent = this.value;
            generateTimetable();
        });
        document.getElementById('stops').addEventListener('input', function() {
            stopCount = parseInt(this.value);
            document.getElementById('stopsVal').textContent = this.value;
            generateTimetable();
        });
        document.getElementById('compressBtn').addEventListener('click', compressTimetable);
        document.getElementById('resetBtn').addEventListener('click', function() { window.reset(); });

        window.reset = function() {
            trainRate = 12; speedVariation = 30; stopCount = 2;
            document.getElementById('trainRate').value = 12;
            document.getElementById('trainRateVal').textContent = '12';
            document.getElementById('speedVar').value = 30;
            document.getElementById('speedVarVal').textContent = '30';
            document.getElementById('stops').value = 2;
            document.getElementById('stopsVal').textContent = '2';
            generateTimetable();
        };

        window.addEventListener('enhanceReady', function() {
            if (window.enhance) { window.enhance.onPause = function(p) { paused = p; }; }
        });

        generateTimetable();
        requestAnimationFrame(animate);
    })();
    </script>
</body>
</html>
