<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Block Signal System - Railway Operations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,50,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; display: flex; gap: 16px;
            align-items: center; z-index: 100; border: 1px solid rgba(138,154,91,0.3);
        }
        #controls label { color: #FEFAE0; font-size: 0.85rem; }
        #controls input[type=range] { width: 100px; accent-color: #8A9A5B; }
        #controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem;
        }
        #controls button:hover { background: #8A9A5B; }
        #info {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); padding: 12px 16px; border-radius: 10px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 220px;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div id="info">
        <h3>Fixed Block Signaling</h3>
        <p>Track divided into blocks. A signal protects each block entry. Only one train per block allowed.</p>
        <p style="margin-top:6px;color:#8A9A5B;">Red = Occupied, Yellow = Caution, Green = Clear</p>
    </div>
    <div id="controls">
        <label>Trains: <span id="trainCountVal">4</span>
            <input type="range" id="trainCount" min="2" max="8" value="4">
        </label>
        <label>Speed: <span id="speedVal">1.0</span>x
            <input type="range" id="speed" min="0.2" max="3" step="0.1" value="1">
        </label>
        <button id="addTrain">+ Train</button>
    </div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        const BLOCK_COUNT = 12;
        let trains = [];
        let blocks = [];
        let simSpeed = 1;
        let paused = false;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const COLORS = {
            sage: '#8A9A5B', moss: '#606C38', earth: '#DDA15E', cream: '#FEFAE0',
            red: '#e74c3c', yellow: '#f1c40f', green: '#2ecc71', track: '#444466'
        };

        function initBlocks() {
            blocks = [];
            const blockLen = W / BLOCK_COUNT;
            for (let i = 0; i < BLOCK_COUNT; i++) {
                blocks.push({
                    x: i * blockLen,
                    width: blockLen,
                    occupied: false,
                    signal: 'green'
                });
            }
        }

        function createTrain(x) {
            const trainLen = 60 + Math.random() * 40;
            return {
                x: x !== undefined ? x : Math.random() * W,
                speed: 1.2 + Math.random() * 0.8,
                baseSpeed: 1.2 + Math.random() * 0.8,
                length: trainLen,
                color: [COLORS.earth, COLORS.sage, COLORS.moss, '#BC6C25', '#7B8A4E'][Math.floor(Math.random() * 5)],
                braking: false,
                stopped: false
            };
        }

        function initTrains(count) {
            trains = [];
            const spacing = W / count;
            for (let i = 0; i < count; i++) {
                trains.push(createTrain(i * spacing));
            }
        }

        function init() {
            initBlocks();
            initTrains(parseInt(document.getElementById('trainCount').value));
        }

        function getBlockIndex(x) {
            const idx = Math.floor((((x % W) + W) % W) / (W / BLOCK_COUNT));
            return Math.min(idx, BLOCK_COUNT - 1);
        }

        function updateSignals() {
            for (let b of blocks) {
                b.occupied = false;
            }
            for (let t of trains) {
                const headBlock = getBlockIndex(t.x);
                const tailBlock = getBlockIndex(t.x - t.length);
                blocks[headBlock].occupied = true;
                if (tailBlock !== headBlock) blocks[tailBlock].occupied = true;
            }
            for (let i = 0; i < BLOCK_COUNT; i++) {
                if (blocks[i].occupied) {
                    blocks[i].signal = 'red';
                } else {
                    const next = (i + 1) % BLOCK_COUNT;
                    if (blocks[next].occupied) {
                        blocks[i].signal = 'yellow';
                    } else {
                        blocks[i].signal = 'green';
                    }
                }
            }
        }

        function updateTrains(dt) {
            for (let t of trains) {
                const headBlock = getBlockIndex(t.x + 20);
                const nextBlock = (headBlock + 1) % BLOCK_COUNT;
                const sig = blocks[headBlock].signal;
                const nextSig = blocks[nextBlock].signal;

                if (nextSig === 'red') {
                    const blockEnd = blocks[headBlock].x + blocks[headBlock].width;
                    const dist = ((blockEnd - t.x) % W + W) % W;
                    if (dist < 80) {
                        t.speed = Math.max(0, t.speed - 0.05 * dt);
                        t.braking = true;
                        t.stopped = t.speed < 0.05;
                    } else if (dist < 200) {
                        t.speed = t.baseSpeed * 0.5;
                        t.braking = true;
                    } else {
                        t.braking = false;
                        t.speed = Math.min(t.baseSpeed, t.speed + 0.02 * dt);
                    }
                } else if (sig === 'yellow') {
                    t.speed = Math.min(t.baseSpeed * 0.6, t.speed + 0.01 * dt);
                    t.braking = false;
                } else {
                    t.speed = Math.min(t.baseSpeed, t.speed + 0.03 * dt);
                    t.braking = false;
                    t.stopped = false;
                }

                t.x = (t.x + t.speed * simSpeed * dt) % W;
                if (t.x < 0) t.x += W;
            }
        }

        function drawTrack() {
            const trackY = H * 0.5;
            // Rails
            ctx.strokeStyle = '#555577';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, trackY - 8);
            ctx.lineTo(W, trackY - 8);
            ctx.moveTo(0, trackY + 8);
            ctx.lineTo(W, trackY + 8);
            ctx.stroke();

            // Sleepers
            ctx.strokeStyle = '#3a3a55';
            ctx.lineWidth = 4;
            for (let x = 0; x < W; x += 20) {
                ctx.beginPath();
                ctx.moveTo(x, trackY - 12);
                ctx.lineTo(x, trackY + 12);
                ctx.stroke();
            }

            // Ballast
            ctx.fillStyle = '#2a2a44';
            ctx.fillRect(0, trackY + 14, W, 6);
        }

        function drawBlocks() {
            const trackY = H * 0.5;
            for (let i = 0; i < BLOCK_COUNT; i++) {
                const b = blocks[i];
                // Block boundary
                ctx.strokeStyle = 'rgba(138,154,91,0.3)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(b.x, trackY - 60);
                ctx.lineTo(b.x, trackY + 60);
                ctx.stroke();
                ctx.setLineDash([]);

                // Block label
                ctx.fillStyle = 'rgba(254,250,224,0.3)';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Block ' + (i + 1), b.x + b.width / 2, trackY - 50);

                // Signal post
                const sigX = b.x + 8;
                const sigY = trackY - 20;
                ctx.fillStyle = '#333355';
                ctx.fillRect(sigX - 2, sigY - 30, 4, 30);

                // Signal head
                const sigColor = b.signal === 'red' ? COLORS.red : b.signal === 'yellow' ? COLORS.yellow : COLORS.green;
                ctx.beginPath();
                ctx.arc(sigX, sigY - 35, 7, 0, Math.PI * 2);
                ctx.fillStyle = sigColor;
                ctx.fill();

                // Glow
                ctx.beginPath();
                ctx.arc(sigX, sigY - 35, 14, 0, Math.PI * 2);
                const glow = ctx.createRadialGradient(sigX, sigY - 35, 3, sigX, sigY - 35, 14);
                glow.addColorStop(0, sigColor + '60');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.fill();
            }
        }

        function drawTrains() {
            const trackY = H * 0.5;
            for (let t of trains) {
                // Train body
                const x = t.x - t.length;
                ctx.fillStyle = t.color;
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;

                // Main body
                const bodyH = 18;
                ctx.beginPath();
                ctx.roundRect(x, trackY - bodyH / 2, t.length, bodyH, 4);
                ctx.fill();
                ctx.stroke();

                // Windows
                ctx.fillStyle = 'rgba(254,250,224,0.6)';
                for (let wx = x + 8; wx < t.x - 10; wx += 14) {
                    ctx.fillRect(wx, trackY - 5, 8, 5);
                }

                // Headlight
                ctx.beginPath();
                ctx.arc(t.x - 2, trackY, 3, 0, Math.PI * 2);
                ctx.fillStyle = t.braking ? COLORS.red : '#ffffcc';
                ctx.fill();

                // Brake indicator
                if (t.braking) {
                    ctx.fillStyle = 'rgba(231,76,60,0.4)';
                    ctx.beginPath();
                    ctx.arc(t.x, trackY, 12, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Speed label
                ctx.fillStyle = COLORS.cream;
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText((t.speed * 60).toFixed(0) + ' km/h', t.x - t.length / 2, trackY + 28);
            }
        }

        function drawLegend() {
            const y = H - 80;
            const x = 20;
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'left';

            const items = [
                { color: COLORS.green, label: 'Clear - Proceed at line speed' },
                { color: COLORS.yellow, label: 'Caution - Next block occupied, reduce speed' },
                { color: COLORS.red, label: 'Stop - Block occupied, halt before entry' }
            ];

            items.forEach((item, i) => {
                ctx.beginPath();
                ctx.arc(x + 8, y + i * 20, 6, 0, Math.PI * 2);
                ctx.fillStyle = item.color;
                ctx.fill();
                ctx.fillStyle = 'rgba(254,250,224,0.7)';
                ctx.fillText(item.label, x + 22, y + i * 20 + 4);
            });
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            // Title
            ctx.fillStyle = COLORS.earth;
            ctx.font = 'bold 18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Fixed Block Signal System', W / 2, 40);
            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = '13px sans-serif';
            ctx.fillText('Track divided into fixed blocks. Each block protected by entry signal.', W / 2, 62);

            drawTrack();
            drawBlocks();
            drawTrains();
            drawLegend();
        }

        let lastTime = 0;
        function animate(time) {
            const dt = Math.min((time - lastTime) / 16.67, 3);
            lastTime = time;

            if (!paused) {
                updateSignals();
                updateTrains(dt);
            }
            draw();
            requestAnimationFrame(animate);
        }

        // Controls
        document.getElementById('trainCount').addEventListener('input', function() {
            document.getElementById('trainCountVal').textContent = this.value;
            initTrains(parseInt(this.value));
        });

        document.getElementById('speed').addEventListener('input', function() {
            document.getElementById('speedVal').textContent = parseFloat(this.value).toFixed(1);
            simSpeed = parseFloat(this.value);
        });

        document.getElementById('addTrain').addEventListener('click', function() {
            trains.push(createTrain());
            const slider = document.getElementById('trainCount');
            slider.value = Math.min(trains.length, 8);
            document.getElementById('trainCountVal').textContent = trains.length;
        });

        window.reset = function() {
            init();
            simSpeed = 1;
            document.getElementById('speed').value = 1;
            document.getElementById('speedVal').textContent = '1.0';
            document.getElementById('trainCount').value = 4;
            document.getElementById('trainCountVal').textContent = '4';
        };

        window.addEventListener('enhanceReady', function() {
            if (window.enhance) {
                window.enhance.onPause = function(p) { paused = p; };
            }
        });

        init();
        requestAnimationFrame(animate);
    })();
    </script>
</body>
</html>
