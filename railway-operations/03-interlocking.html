<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Interlocking System - Railway Operations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.9);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 10px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 250px;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #info h3 { color: #DDA15E; margin-bottom: 6px; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,50,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; display: flex; gap: 12px;
            align-items: center; z-index: 100; border: 1px solid rgba(138,154,91,0.3);
            flex-wrap: wrap; justify-content: center;
        }
        #controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem;
        }
        #controls button:hover { background: #8A9A5B; }
        #controls button.danger { background: #c0392b; }
        #controls button.danger:hover { background: #e74c3c; }
        #log {
            position: fixed; bottom: 80px; left: 20px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); padding: 10px 14px; border-radius: 10px;
            color: #FEFAE0; font-size: 0.75rem; z-index: 100; max-width: 300px;
            max-height: 150px; overflow-y: auto; border: 1px solid rgba(138,154,91,0.3);
        }
        #log .entry { margin: 2px 0; }
        #log .safe { color: #2ecc71; }
        #log .warn { color: #f1c40f; }
        #log .block { color: #e74c3c; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div id="info">
        <h3>Interlocking System</h3>
        <p>Click switches to toggle them. Set routes by clicking signal buttons. The interlocking prevents conflicting routes.</p>
        <p style="margin-top:8px;color:#8A9A5B;">Switches are locked when part of an active route. Conflicting routes are blocked.</p>
    </div>
    <div id="log"></div>
    <div id="controls">
        <button id="routeA">Route A: West &rarr; East Main</button>
        <button id="routeB">Route B: West &rarr; East Siding</button>
        <button id="routeC">Route C: East &rarr; West Main</button>
        <button id="clearAll" class="danger">Cancel All Routes</button>
    </div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let paused = false;

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        const COLORS = {
            sage: '#8A9A5B', moss: '#606C38', earth: '#DDA15E', cream: '#FEFAE0',
            red: '#e74c3c', yellow: '#f1c40f', green: '#2ecc71', track: '#556'
        };

        // Junction layout
        const switches = [
            { id: 'SW1', x: 0.3, y: 0.5, state: 'normal', locked: false },
            { id: 'SW2', x: 0.7, y: 0.5, state: 'normal', locked: false }
        ];

        const signals = [
            { id: 'S1', x: 0.12, y: 0.5, dir: 'right', aspect: 'red' },
            { id: 'S2', x: 0.88, y: 0.5, dir: 'left', aspect: 'red' },
            { id: 'S3', x: 0.12, y: 0.38, dir: 'right', aspect: 'red' }
        ];

        let routes = [];
        let trains = [];
        let logEntries = [];

        const routeDefs = {
            A: { name: 'West->East Main', switches: { SW1: 'normal', SW2: 'normal' }, signals: ['S1'], trackSegs: ['main'] },
            B: { name: 'West->East Siding', switches: { SW1: 'reverse', SW2: 'reverse' }, signals: ['S1'], trackSegs: ['siding'] },
            C: { name: 'East->West Main', switches: { SW1: 'normal', SW2: 'normal' }, signals: ['S2'], trackSegs: ['main'] }
        };

        function addLog(msg, type) {
            logEntries.unshift({ msg, type, time: Date.now() });
            if (logEntries.length > 20) logEntries.pop();
            const el = document.getElementById('log');
            el.innerHTML = logEntries.map(e =>
                '<div class="entry ' + e.type + '">' + e.msg + '</div>'
            ).join('');
        }

        function requestRoute(routeId) {
            const def = routeDefs[routeId];
            // Check for conflicts
            for (let r of routes) {
                // Check switch conflicts
                for (let sw in def.switches) {
                    if (r.switches[sw] !== undefined && r.switches[sw] !== def.switches[sw]) {
                        addLog('BLOCKED: Route ' + routeId + ' conflicts with active route (switch ' + sw + ')', 'block');
                        return;
                    }
                }
                // Check track conflicts
                for (let seg of def.trackSegs) {
                    if (r.trackSegs.includes(seg)) {
                        addLog('BLOCKED: Route ' + routeId + ' - track segment "' + seg + '" in use', 'block');
                        return;
                    }
                }
            }

            // Set switches
            for (let sw in def.switches) {
                const s = switches.find(s => s.id === sw);
                if (s) {
                    s.state = def.switches[sw];
                    s.locked = true;
                }
            }

            // Set signals
            for (let sigId of def.signals) {
                const sig = signals.find(s => s.id === sigId);
                if (sig) sig.aspect = 'green';
            }

            routes.push({ id: routeId, ...def });
            addLog('Route ' + routeId + ' (' + def.name + ') set', 'safe');

            // Spawn train
            spawnTrain(routeId);
        }

        function spawnTrain(routeId) {
            const t = {
                routeId,
                progress: 0,
                speed: 0.003 + Math.random() * 0.002,
                color: COLORS.earth,
                active: true
            };
            trains.push(t);
        }

        function clearRoutes() {
            routes = [];
            for (let s of switches) { s.locked = false; }
            for (let sig of signals) { sig.aspect = 'red'; }
            addLog('All routes cancelled', 'warn');
        }

        function getTrackPoint(routeId, progress) {
            const cx = W / 2, cy = H / 2;
            const mainY = cy;
            const sidingY = cy - H * 0.12;
            const startX = W * 0.08;
            const endX = W * 0.92;
            const sw1x = W * 0.3;
            const sw2x = W * 0.7;

            if (routeId === 'A') {
                // West to East on main
                return { x: startX + (endX - startX) * progress, y: mainY };
            } else if (routeId === 'B') {
                // West to East via siding
                if (progress < 0.25) {
                    const t = progress / 0.25;
                    return { x: startX + (sw1x - startX) * t, y: mainY };
                } else if (progress < 0.35) {
                    const t = (progress - 0.25) / 0.1;
                    return { x: sw1x + (sw1x + 30) * 0 + t * (W * 0.35 - sw1x), y: mainY + (sidingY - mainY) * t };
                } else if (progress < 0.65) {
                    const t = (progress - 0.35) / 0.3;
                    return { x: W * 0.35 + (W * 0.65 - W * 0.35) * t, y: sidingY };
                } else if (progress < 0.75) {
                    const t = (progress - 0.65) / 0.1;
                    return { x: W * 0.65 + (sw2x - W * 0.65) * t, y: sidingY + (mainY - sidingY) * t };
                } else {
                    const t = (progress - 0.75) / 0.25;
                    return { x: sw2x + (endX - sw2x) * t, y: mainY };
                }
            } else { // C - East to West on main
                return { x: endX - (endX - startX) * progress, y: mainY };
            }
        }

        function drawTracks() {
            const mainY = H / 2;
            const sidingY = mainY - H * 0.12;
            const sw1x = W * 0.3;
            const sw2x = W * 0.7;

            // Main line
            ctx.strokeStyle = COLORS.track;
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(W * 0.05, mainY);
            ctx.lineTo(W * 0.95, mainY);
            ctx.stroke();

            // Siding diverge/merge
            ctx.beginPath();
            ctx.moveTo(sw1x, mainY);
            ctx.quadraticCurveTo(sw1x + 40, sidingY + 20, W * 0.35, sidingY);
            ctx.lineTo(W * 0.65, sidingY);
            ctx.quadraticCurveTo(sw2x - 40, sidingY + 20, sw2x, mainY);
            ctx.stroke();

            // Sleepers on main
            ctx.strokeStyle = '#3a3a55';
            ctx.lineWidth = 3;
            for (let x = W * 0.05; x < W * 0.95; x += 16) {
                ctx.beginPath();
                ctx.moveTo(x, mainY - 8);
                ctx.lineTo(x, mainY + 8);
                ctx.stroke();
            }

            // Active route highlighting
            for (let r of routes) {
                ctx.strokeStyle = 'rgba(46,204,113,0.3)';
                ctx.lineWidth = 12;
                if (r.id === 'A' || r.id === 'C') {
                    ctx.beginPath();
                    ctx.moveTo(W * 0.05, mainY);
                    ctx.lineTo(W * 0.95, mainY);
                    ctx.stroke();
                } else if (r.id === 'B') {
                    ctx.beginPath();
                    ctx.moveTo(W * 0.05, mainY);
                    ctx.lineTo(sw1x, mainY);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(sw1x, mainY);
                    ctx.quadraticCurveTo(sw1x + 40, sidingY + 20, W * 0.35, sidingY);
                    ctx.lineTo(W * 0.65, sidingY);
                    ctx.quadraticCurveTo(sw2x - 40, sidingY + 20, sw2x, mainY);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(sw2x, mainY);
                    ctx.lineTo(W * 0.95, mainY);
                    ctx.stroke();
                }
            }

            // Labels
            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Main Line', W / 2, mainY + 25);
            ctx.fillText('Passing Siding', W / 2, sidingY - 15);
        }

        function drawSwitches() {
            for (let sw of switches) {
                const x = sw.x * W;
                const y = sw.y * H;

                // Switch body
                ctx.fillStyle = sw.locked ? 'rgba(231,76,60,0.3)' : 'rgba(138,154,91,0.3)';
                ctx.beginPath();
                ctx.arc(x, y, 14, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = sw.locked ? COLORS.red : COLORS.sage;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Switch position indicator
                ctx.fillStyle = sw.state === 'normal' ? COLORS.green : COLORS.yellow;
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fill();

                // Label
                ctx.fillStyle = COLORS.cream;
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(sw.id, x, y + 28);
                ctx.font = '9px sans-serif';
                ctx.fillText(sw.state === 'normal' ? 'N' : 'R', x, y + 38);
                if (sw.locked) {
                    ctx.fillStyle = COLORS.red;
                    ctx.fillText('LOCKED', x, y + 48);
                }
            }
        }

        function drawSignals() {
            for (let sig of signals) {
                const x = sig.x * W;
                const y = sig.y * H;

                // Post
                ctx.fillStyle = '#444';
                ctx.fillRect(x - 2, y - 30, 4, 25);

                // Signal head
                const color = sig.aspect === 'red' ? COLORS.red : sig.aspect === 'yellow' ? COLORS.yellow : COLORS.green;
                ctx.beginPath();
                ctx.arc(x, y - 35, 8, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();

                // Glow
                const glow = ctx.createRadialGradient(x, y - 35, 3, x, y - 35, 16);
                glow.addColorStop(0, color + '80');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(x, y - 35, 16, 0, Math.PI * 2);
                ctx.fill();

                // Direction arrow
                ctx.fillStyle = COLORS.cream;
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(sig.id, x, y - 50);
                ctx.fillText(sig.dir === 'right' ? '\u2192' : '\u2190', x, y + 5);
            }
        }

        function drawTrains() {
            for (let t of trains) {
                if (!t.active) continue;
                const pt = getTrackPoint(t.routeId, t.progress);
                const pt2 = getTrackPoint(t.routeId, Math.max(0, t.progress - 0.04));
                const angle = Math.atan2(pt.y - pt2.y, pt.x - pt2.x);

                ctx.save();
                ctx.translate(pt.x, pt.y);
                ctx.rotate(angle);

                ctx.fillStyle = t.color;
                ctx.beginPath();
                ctx.roundRect(-25, -8, 50, 16, 3);
                ctx.fill();

                ctx.fillStyle = 'rgba(254,250,224,0.5)';
                for (let wx = -18; wx < 15; wx += 10) {
                    ctx.fillRect(wx, -4, 6, 4);
                }

                ctx.restore();
            }
        }

        function update() {
            for (let t of trains) {
                if (!t.active) continue;
                t.progress += t.speed;
                if (t.progress >= 1) {
                    t.active = false;
                    // Clear route
                    const ri = routes.findIndex(r => r.id === t.routeId);
                    if (ri >= 0) {
                        const r = routes[ri];
                        routes.splice(ri, 1);
                        // Unlock switches if no other route needs them
                        for (let sw of switches) {
                            let stillNeeded = false;
                            for (let or of routes) {
                                if (or.switches[sw.id] !== undefined) { stillNeeded = true; break; }
                            }
                            if (!stillNeeded) sw.locked = false;
                        }
                        // Reset signals
                        for (let sigId of r.signals) {
                            const sig = signals.find(s => s.id === sigId);
                            if (sig) sig.aspect = 'red';
                        }
                        addLog('Route ' + t.routeId + ' completed, released', 'safe');
                    }
                }
            }
            trains = trains.filter(t => t.active);
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = COLORS.earth;
            ctx.font = 'bold 18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Railway Interlocking System', W / 2, 35);
            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = '13px sans-serif';
            ctx.fillText('Prevents conflicting routes. Switches lock when part of an active route.', W / 2, 55);

            drawTracks();
            drawSwitches();
            drawSignals();
            drawTrains();
        }

        function animate() {
            if (!paused) update();
            draw();
            requestAnimationFrame(animate);
        }

        // Click handling for switches
        canvas.addEventListener('click', function(e) {
            for (let sw of switches) {
                const dx = e.clientX - sw.x * W;
                const dy = e.clientY - sw.y * H;
                if (dx * dx + dy * dy < 400) {
                    if (sw.locked) {
                        addLog(sw.id + ' is locked by active route', 'block');
                    } else {
                        sw.state = sw.state === 'normal' ? 'reverse' : 'normal';
                        addLog(sw.id + ' set to ' + sw.state, 'warn');
                    }
                }
            }
        });

        document.getElementById('routeA').addEventListener('click', () => requestRoute('A'));
        document.getElementById('routeB').addEventListener('click', () => requestRoute('B'));
        document.getElementById('routeC').addEventListener('click', () => requestRoute('C'));
        document.getElementById('clearAll').addEventListener('click', clearRoutes);

        window.reset = function() {
            routes = [];
            trains = [];
            logEntries = [];
            for (let s of switches) { s.state = 'normal'; s.locked = false; }
            for (let sig of signals) { sig.aspect = 'red'; }
            document.getElementById('log').innerHTML = '';
        };

        window.addEventListener('enhanceReady', function() {
            if (window.enhance) { window.enhance.onPause = function(p) { paused = p; }; }
        });

        requestAnimationFrame(animate);
    })();
    </script>
</body>
</html>
