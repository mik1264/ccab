<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double-Track Headway Optimization - Railway Operations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,50,0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; display: flex; gap: 16px;
            align-items: center; z-index: 100; border: 1px solid rgba(138,154,91,0.3);
            flex-wrap: wrap; justify-content: center;
        }
        #controls label { color: #FEFAE0; font-size: 0.85rem; }
        #controls input[type=range] { width: 100px; accent-color: #8A9A5B; }
        #controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem;
        }
        #controls button:hover { background: #8A9A5B; }
        #stats {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,50,0.85);
            backdrop-filter: blur(10px); padding: 12px 16px; border-radius: 10px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; min-width: 180px;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #stats h3 { color: #DDA15E; margin-bottom: 6px; }
        .stat-row { display: flex; justify-content: space-between; margin: 3px 0; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div id="stats">
        <h3>Line Performance</h3>
        <div class="stat-row"><span>Headway:</span><span id="headway">--</span></div>
        <div class="stat-row"><span>Capacity:</span><span id="capacity">--</span></div>
        <div class="stat-row"><span>Avg Speed:</span><span id="avgSpeed">--</span></div>
        <div class="stat-row"><span>Track 1 Trains:</span><span id="t1count">0</span></div>
        <div class="stat-row"><span>Track 2 Trains:</span><span id="t2count">0</span></div>
    </div>
    <div id="controls">
        <label>Min Headway: <span id="headwayVal">3</span> min
            <input type="range" id="minHeadway" min="1" max="8" step="0.5" value="3">
        </label>
        <label>Speed Mix
            <input type="range" id="speedMix" min="0" max="1" step="0.1" value="0.3" title="0=uniform, 1=mixed">
        </label>
        <label>Sim Speed: <span id="simSpeedVal">1</span>x
            <input type="range" id="simSpeed" min="1" max="10" step="1" value="1">
        </label>
        <button id="resetBtn">Reset</button>
    </div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let paused = false;

        const COLORS = {
            sage: '#8A9A5B', moss: '#606C38', earth: '#DDA15E', cream: '#FEFAE0',
            red: '#e74c3c', blue: '#3498db', green: '#2ecc71'
        };

        let minHeadway = 3; // minutes
        let speedMix = 0.3;
        let simSpeed = 1;
        let simTime = 0;

        // Two tracks
        let track1 = []; // eastbound
        let track2 = []; // westbound
        let headwayHistory = [];
        let capacityHistory = [];

        const LINE_LENGTH = 50000; // meters

        function createTrain(track, baseSpeed) {
            const variation = speedMix * 60;
            const speed = baseSpeed + (Math.random() - 0.5) * variation; // km/h
            const types = ['express', 'intercity', 'local', 'freight'];
            const typeWeights = [0.2, 0.3, 0.3, 0.2];
            let r = Math.random(), typeIdx = 0;
            for (let i = 0; i < typeWeights.length; i++) {
                r -= typeWeights[i];
                if (r <= 0) { typeIdx = i; break; }
            }
            const trainSpeeds = [200, 160, 100, 80];
            const actualSpeed = trainSpeeds[typeIdx] * (0.9 + Math.random() * 0.2);

            return {
                x: 0,
                speed: actualSpeed, // km/h
                type: types[typeIdx],
                color: [COLORS.red, COLORS.earth, COLORS.sage, '#7f8c8d'][typeIdx],
                length: [200, 180, 140, 250][typeIdx],
                departed: simTime
            };
        }

        let lastSpawnTime1 = -999;
        let lastSpawnTime2 = -999;

        function init() {
            track1 = [];
            track2 = [];
            headwayHistory = [];
            capacityHistory = [];
            simTime = 0;
            lastSpawnTime1 = -999;
            lastSpawnTime2 = -999;
        }

        function update(dt) {
            const dtMin = dt * simSpeed / 60;
            simTime += dtMin;

            // Spawn trains based on headway
            if (simTime - lastSpawnTime1 >= minHeadway) {
                track1.push(createTrain(1, 140));
                lastSpawnTime1 = simTime;
            }
            if (simTime - lastSpawnTime2 >= minHeadway * (0.8 + Math.random() * 0.4)) {
                track2.push(createTrain(2, 140));
                lastSpawnTime2 = simTime;
            }

            // Move trains
            for (let t of track1) {
                t.x += (t.speed / 60) * dtMin * 1000; // convert to meters per minute
            }
            for (let t of track2) {
                t.x += (t.speed / 60) * dtMin * 1000;
            }

            // Headway enforcement on same track
            for (let track of [track1, track2]) {
                track.sort((a, b) => b.x - a.x);
                for (let i = 1; i < track.length; i++) {
                    const ahead = track[i - 1];
                    const behind = track[i];
                    const gap = ahead.x - ahead.length - behind.x;
                    const minGap = behind.speed * minHeadway * 1000 / 60;
                    if (gap < minGap && behind.speed > ahead.speed * 0.3) {
                        behind.speed = Math.max(ahead.speed * 0.8, behind.speed * 0.99);
                    }
                }
            }

            // Remove completed trains
            track1 = track1.filter(t => t.x < LINE_LENGTH);
            track2 = track2.filter(t => t.x < LINE_LENGTH);

            // Record headway stats
            if (track1.length >= 2) {
                const h = Math.abs(track1[0].x - track1[1].x) / (track1[1].speed * 1000 / 60);
                headwayHistory.push(h);
                if (headwayHistory.length > 200) headwayHistory.shift();
            }
        }

        function drawTrack(y, trains, label, direction) {
            // Track bed
            ctx.fillStyle = '#2a2a44';
            ctx.fillRect(0, y - 3, W, 6);

            // Rails
            ctx.strokeStyle = '#555577';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, y - 5);
            ctx.lineTo(W, y - 5);
            ctx.moveTo(0, y + 5);
            ctx.lineTo(W, y + 5);
            ctx.stroke();

            // Sleepers
            ctx.strokeStyle = '#3a3a55';
            ctx.lineWidth = 2;
            for (let x = 0; x < W; x += 14) {
                ctx.beginPath();
                ctx.moveTo(x, y - 7);
                ctx.lineTo(x, y + 7);
                ctx.stroke();
            }

            // Direction arrow
            ctx.fillStyle = COLORS.cream + '40';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(label + ' ' + direction, 80, y - 18);

            // Trains
            const scale = W / LINE_LENGTH;
            for (let t of trains) {
                const tx = t.x * scale;
                const tw = Math.max(t.length * scale, 8);

                ctx.fillStyle = t.color;
                ctx.beginPath();
                ctx.roundRect(tx - tw, y - 7, tw, 14, 2);
                ctx.fill();

                // Speed label
                ctx.fillStyle = COLORS.cream + 'cc';
                ctx.font = '9px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(t.speed.toFixed(0), tx - tw / 2, y + 22);
            }

            // Headway indicators between consecutive trains
            for (let i = 1; i < trains.length; i++) {
                const a = trains[i - 1];
                const b = trains[i];
                const ax = a.x * scale;
                const bx = b.x * scale;
                const gap = Math.abs(a.x - b.x);
                const headway = gap / (b.speed * 1000 / 60);

                if (Math.abs(ax - bx) > 30) {
                    ctx.strokeStyle = headway < minHeadway ? COLORS.red + '60' : COLORS.green + '40';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([3, 3]);
                    ctx.beginPath();
                    ctx.moveTo(Math.min(ax, bx), y + 12);
                    ctx.lineTo(Math.max(ax, bx), y + 12);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    ctx.fillStyle = headway < minHeadway ? COLORS.red : COLORS.cream + '80';
                    ctx.font = '9px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(headway.toFixed(1) + 'm', (ax + bx) / 2, y + 10);
                }
            }
        }

        function drawHeadwayChart() {
            const cx = W * 0.1, cy = H * 0.65;
            const cw = W * 0.8, ch = H * 0.2;

            ctx.fillStyle = 'rgba(30,40,60,0.4)';
            ctx.fillRect(cx, cy, cw, ch);

            ctx.fillStyle = COLORS.earth;
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('Headway Over Time (minutes)', cx + 10, cy - 6);

            if (headwayHistory.length < 2) return;

            const maxH = Math.max(...headwayHistory, minHeadway * 2);

            // Min headway line
            const minY = cy + ch - (minHeadway / maxH) * ch;
            ctx.strokeStyle = COLORS.red + '60';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(cx, minY);
            ctx.lineTo(cx + cw, minY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = COLORS.red + 'aa';
            ctx.font = '10px sans-serif';
            ctx.fillText('Min: ' + minHeadway + 'min', cx + cw - 60, minY - 4);

            // Chart line
            ctx.strokeStyle = COLORS.sage;
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < headwayHistory.length; i++) {
                const x = cx + (i / headwayHistory.length) * cw;
                const y = cy + ch - (headwayHistory[i] / maxH) * ch;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        function updateStatsDisplay() {
            const avgH = headwayHistory.length > 0
                ? headwayHistory.reduce((a, b) => a + b, 0) / headwayHistory.length
                : 0;
            const cap = avgH > 0 ? Math.floor(60 / avgH) : 0;
            const allTrains = [...track1, ...track2];
            const avgSpd = allTrains.length > 0
                ? allTrains.reduce((a, t) => a + t.speed, 0) / allTrains.length
                : 0;

            document.getElementById('headway').textContent = avgH.toFixed(1) + ' min';
            document.getElementById('capacity').textContent = cap + ' trains/hr';
            document.getElementById('avgSpeed').textContent = avgSpd.toFixed(0) + ' km/h';
            document.getElementById('t1count').textContent = track1.length;
            document.getElementById('t2count').textContent = track2.length;
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = COLORS.earth;
            ctx.font = 'bold 18px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Double-Track Headway Optimization', W / 2, 35);
            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = '13px sans-serif';
            ctx.fillText('Minimum headway enforcement with heterogeneous train speeds on bi-directional double track', W / 2, 55);

            drawTrack(H * 0.3, track1, 'Track 1', '\u2192 Eastbound');
            drawTrack(H * 0.45, track2, 'Track 2', '\u2192 Westbound');
            drawHeadwayChart();

            if (Math.floor(simTime * 10) % 5 === 0) updateStatsDisplay();
        }

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        let lastTime = 0;
        function animate(time) {
            const dt = Math.min((time - lastTime) / 1000, 0.1);
            lastTime = time;
            if (!paused) update(dt);
            draw();
            requestAnimationFrame(animate);
        }

        document.getElementById('minHeadway').addEventListener('input', function() {
            minHeadway = parseFloat(this.value);
            document.getElementById('headwayVal').textContent = this.value;
        });
        document.getElementById('speedMix').addEventListener('input', function() {
            speedMix = parseFloat(this.value);
        });
        document.getElementById('simSpeed').addEventListener('input', function() {
            simSpeed = parseInt(this.value);
            document.getElementById('simSpeedVal').textContent = this.value;
        });
        document.getElementById('resetBtn').addEventListener('click', function() { window.reset(); });

        window.reset = function() {
            minHeadway = 3; speedMix = 0.3; simSpeed = 1;
            document.getElementById('minHeadway').value = 3;
            document.getElementById('headwayVal').textContent = '3';
            document.getElementById('speedMix').value = 0.3;
            document.getElementById('simSpeed').value = 1;
            document.getElementById('simSpeedVal').textContent = '1';
            init();
        };

        window.addEventListener('enhanceReady', function() {
            if (window.enhance) { window.enhance.onPause = function(p) { paused = p; }; }
        });

        init();
        requestAnimationFrame(animate);
    })();
    </script>
</body>
</html>
