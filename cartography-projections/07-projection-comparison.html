<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projection Comparison -- Side by Side</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(254,250,224,0.12); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 12px 24px; border-radius: 12px;
            font-size: 0.85rem; text-align: center; pointer-events: none; z-index: 100;
        }
        .controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .controls select {
            background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 6px 12px; border-radius: 8px;
            border: 1px solid rgba(138,154,91,0.3); font-size: 0.8rem;
        }
        .controls select option { background: #1a1a2e; color: #FEFAE0; }
        .controls label {
            color: #FEFAE0; font-size: 0.8rem; display: flex; align-items: center; gap: 8px;
            background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
            padding: 6px 12px; border-radius: 8px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="controls">
        <label>Left: <select id="leftProj">
            <option value="mercator" selected>Mercator</option>
            <option value="robinson">Robinson</option>
            <option value="mollweide">Mollweide</option>
            <option value="sinusoidal">Sinusoidal</option>
            <option value="equirectangular">Equirectangular</option>
        </select></label>
        <label>Right: <select id="rightProj">
            <option value="mercator">Mercator</option>
            <option value="robinson" selected>Robinson</option>
            <option value="mollweide">Mollweide</option>
            <option value="sinusoidal">Sinusoidal</option>
            <option value="equirectangular">Equirectangular</option>
        </select></label>
    </div>
    <div class="info">Side-by-side comparison -- see how the same Tissot circles look under different projections.</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Robinson table
        const robTable = [
            [0,1.0000,0.0000],[5,0.9986,0.0620],[10,0.9954,0.1240],[15,0.9900,0.1860],
            [20,0.9822,0.2480],[25,0.9730,0.3100],[30,0.9600,0.3720],[35,0.9427,0.4340],
            [40,0.9216,0.4958],[45,0.8962,0.5571],[50,0.8679,0.6176],[55,0.8350,0.6769],
            [60,0.7986,0.7346],[65,0.7597,0.7903],[70,0.7186,0.8435],[75,0.6732,0.8936],
            [80,0.6213,0.9394],[85,0.5722,0.9761],[90,0.5322,1.0000]
        ];

        function interpRob(absLat) {
            const i = Math.min(Math.floor(absLat / 5), 17);
            const f = (absLat - i * 5) / 5;
            return {
                plen: robTable[i][1] + f * (robTable[i + 1][1] - robTable[i][1]),
                pdfe: robTable[i][2] + f * (robTable[i + 1][2] - robTable[i][2])
            };
        }

        function solveTheta(lat) {
            const target = Math.PI * Math.sin(lat * Math.PI / 180);
            let theta = lat * Math.PI / 180;
            for (let i = 0; i < 20; i++) {
                const d = -(2 * theta + Math.sin(2 * theta) - target) / (2 + 2 * Math.cos(2 * theta));
                theta += d;
                if (Math.abs(d) < 1e-10) break;
            }
            return theta;
        }

        function projectPoint(lon, lat, type, cx, cy, s) {
            switch (type) {
                case 'mercator': {
                    const x = cx + (lon / 180) * s;
                    const latR = Math.max(-85, Math.min(85, lat)) * Math.PI / 180;
                    const y = cy - Math.log(Math.tan(Math.PI / 4 + latR / 2)) * s / Math.PI;
                    return { x, y };
                }
                case 'robinson': {
                    const { plen, pdfe } = interpRob(Math.abs(lat));
                    return { x: cx + plen * (lon / 180) * s, y: cy - Math.sign(lat) * pdfe * s * 0.5072 };
                }
                case 'mollweide': {
                    const theta = solveTheta(lat);
                    const x = cx + (2 * Math.SQRT2 / Math.PI) * (lon * Math.PI / 180) * Math.cos(theta) * s;
                    const y = cy - Math.SQRT2 * Math.sin(theta) * s;
                    return { x, y };
                }
                case 'sinusoidal': {
                    const latR = lat * Math.PI / 180;
                    const x = cx + (lon * Math.PI / 180) * Math.cos(latR) * s;
                    const y = cy - latR * s;
                    return { x, y };
                }
                case 'equirectangular': {
                    return { x: cx + (lon / 180) * s, y: cy - (lat / 90) * s * 0.5 };
                }
            }
        }

        function drawProjection(type, cx, cy, s, labelX) {
            // Outline
            ctx.strokeStyle = 'rgba(138,154,91,0.5)';
            ctx.lineWidth = 1.5;

            if (type === 'mollweide') {
                ctx.beginPath();
                for (let t = 0; t <= 360; t++) {
                    const a = t * Math.PI / 180;
                    const x = cx + 2 * Math.SQRT2 * Math.cos(a) * s;
                    const y = cy - Math.SQRT2 * Math.sin(a) * s;
                    if (t === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath(); ctx.stroke();
            } else if (type === 'sinusoidal') {
                ctx.beginPath();
                for (let lat = -90; lat <= 90; lat++) {
                    const p = projectPoint(-180, lat, type, cx, cy, s);
                    if (lat === -90) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
                }
                for (let lat = 90; lat >= -90; lat--) {
                    const p = projectPoint(180, lat, type, cx, cy, s);
                    ctx.lineTo(p.x, p.y);
                }
                ctx.closePath(); ctx.stroke();
            } else {
                // Rectangle-ish
                ctx.beginPath();
                for (let lat = -85; lat <= 85; lat++) {
                    const p = projectPoint(-180, lat, type, cx, cy, s);
                    if (lat === -85) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
                }
                for (let lat = 85; lat >= -85; lat--) {
                    const p = projectPoint(180, lat, type, cx, cy, s);
                    ctx.lineTo(p.x, p.y);
                }
                ctx.closePath(); ctx.stroke();
            }

            // Grid
            ctx.strokeStyle = 'rgba(254,250,224,0.08)';
            ctx.lineWidth = 0.4;
            for (let lon = -180; lon <= 180; lon += 30) {
                ctx.beginPath();
                for (let lat = -85; lat <= 85; lat += 2) {
                    const p = projectPoint(lon, lat, type, cx, cy, s);
                    if (lat === -85) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }
            for (let lat = -60; lat <= 60; lat += 30) {
                ctx.beginPath();
                for (let lon = -180; lon <= 180; lon += 2) {
                    const p = projectPoint(lon, lat, type, cx, cy, s);
                    if (lon === -180) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }

            // Landmasses
            const continents = [
                [[-130,50],[-125,55],[-120,60],[-140,65],[-165,65],[-150,60],[-125,50],[-120,45],[-115,32],[-105,25],[-97,26],[-90,30],[-82,25],[-80,30],[-75,35],[-70,42],[-60,47],[-65,60],[-80,65],[-130,70],[-145,65],[-130,50]],
                [[-80,10],[-60,5],[-35,-5],[-38,-15],[-57,-38],[-75,-48],[-72,-35],[-77,-2],[-80,10]],
                [[-15,12],[-10,25],[0,35],[25,30],[42,2],[28,-33],[10,-5],[-10,7],[-15,12]],
                [[28,41],[55,25],[80,10],[100,15],[120,25],[140,40],[145,45],[110,45],[75,35],[55,45],[60,65],[120,70],[170,65]],
                [[115,-10],[145,-15],[148,-35],[125,-30],[115,-10]]
            ];
            ctx.fillStyle = 'rgba(138,154,91,0.15)';
            ctx.strokeStyle = 'rgba(138,154,91,0.4)';
            ctx.lineWidth = 0.8;
            for (const c of continents) {
                ctx.beginPath();
                for (let i = 0; i < c.length; i++) {
                    const p = projectPoint(c[i][0], c[i][1], type, cx, cy, s);
                    if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
                }
                ctx.closePath(); ctx.fill(); ctx.stroke();
            }

            // Tissot indicatrices
            const baseR = 6;
            for (let lat = -60; lat <= 60; lat += 30) {
                for (let lon = -150; lon <= 150; lon += 60) {
                    const center = projectPoint(lon, lat, type, cx, cy, s);
                    const d = 2;
                    const pR = projectPoint(lon + d, lat, type, cx, cy, s);
                    const pU = projectPoint(lon, lat + d, type, cx, cy, s);
                    const dx = Math.hypot(pR.x - center.x, pR.y - center.y);
                    const dy = Math.hypot(pU.x - center.x, pU.y - center.y);
                    const refP = projectPoint(d, 0, type, cx, cy, s);
                    const refC = projectPoint(0, 0, type, cx, cy, s);
                    const refD = Math.hypot(refP.x - refC.x, refP.y - refC.y);
                    if (refD < 0.1) continue;
                    const sx = dx / refD;
                    const sy = dy / refD;
                    const angle = Math.atan2(pR.y - center.y, pR.x - center.x);

                    ctx.save();
                    ctx.translate(center.x, center.y);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, baseR * sx, baseR * sy, 0, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(221,161,94,0.25)';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(221,161,94,0.6)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    ctx.restore();
                }
            }

            // Label
            ctx.fillStyle = 'rgba(254,250,224,0.8)';
            ctx.font = '15px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(type.charAt(0).toUpperCase() + type.slice(1), labelX, 40);
            ctx.textAlign = 'start';
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            // Divider
            ctx.strokeStyle = 'rgba(254,250,224,0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(W / 2, 0);
            ctx.lineTo(W / 2, H);
            ctx.stroke();

            const leftType = document.getElementById('leftProj').value;
            const rightType = document.getElementById('rightProj').value;
            const s = Math.min(W * 0.2, H * 0.35);

            drawProjection(leftType, W * 0.25, cy, s, W * 0.25);
            drawProjection(rightType, W * 0.75, cy, s, W * 0.75);

            requestAnimationFrame(draw);
        }

        window.reset = function() {
            document.getElementById('leftProj').value = 'mercator';
            document.getElementById('rightProj').value = 'robinson';
        };

        draw();
    })();
    </script>
</body>
</html>
