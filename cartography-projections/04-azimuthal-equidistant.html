<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azimuthal Equidistant Projection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(254,250,224,0.12); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 12px 24px; border-radius: 12px;
            font-size: 0.85rem; text-align: center; pointer-events: none; z-index: 100;
        }
        .controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .controls label {
            color: #FEFAE0; font-size: 0.8rem; display: flex; align-items: center; gap: 8px;
            background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
            padding: 6px 12px; border-radius: 8px;
        }
        .controls input[type=range] { width: 120px; accent-color: #8A9A5B; }
        .controls .city-btn {
            background: rgba(138,154,91,0.3); border: 1px solid #8A9A5B; color: #FEFAE0;
            padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.75rem;
        }
        .controls .city-btn:hover { background: rgba(138,154,91,0.5); }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="controls">
        <label>Center Lat <input type="range" id="latSlider" min="-90" max="90" value="40"> <span id="latVal">40</span>&deg;</label>
        <label>Center Lon <input type="range" id="lonSlider" min="-180" max="180" value="-74"> <span id="lonVal">-74</span>&deg;</label>
        <div style="display:flex; gap:4px; flex-wrap:wrap; max-width:200px; justify-content:flex-end;">
            <button class="city-btn" data-lat="40.7" data-lon="-74">NYC</button>
            <button class="city-btn" data-lat="51.5" data-lon="0">London</button>
            <button class="city-btn" data-lat="35.7" data-lon="139.7">Tokyo</button>
            <button class="city-btn" data-lat="-33.9" data-lon="18.4">Cape Town</button>
            <button class="city-btn" data-lat="90" data-lon="0">N. Pole</button>
        </div>
    </div>
    <div class="info">Azimuthal Equidistant -- distances from center are true. Used on the UN flag. Click cities or drag sliders.</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, cx, cy, radius;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cx = W / 2;
            cy = H / 2;
            radius = Math.min(W, H) * 0.4;
        }
        resize();
        window.addEventListener('resize', resize);

        const latSlider = document.getElementById('latSlider');
        const lonSlider = document.getElementById('lonSlider');
        const latVal = document.getElementById('latVal');
        const lonVal = document.getElementById('lonVal');

        latSlider.addEventListener('input', () => latVal.textContent = latSlider.value);
        lonSlider.addEventListener('input', () => lonVal.textContent = lonSlider.value);

        document.querySelectorAll('.city-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                latSlider.value = btn.dataset.lat;
                lonSlider.value = btn.dataset.lon;
                latVal.textContent = Math.round(btn.dataset.lat);
                lonVal.textContent = Math.round(btn.dataset.lon);
            });
        });

        function toRad(d) { return d * Math.PI / 180; }
        function toDeg(r) { return r * 180 / Math.PI; }

        function azimuthalProject(lon, lat) {
            const phi0 = toRad(parseFloat(latSlider.value));
            const lam0 = toRad(parseFloat(lonSlider.value));
            const phi = toRad(lat);
            const lam = toRad(lon);

            const cosc = Math.sin(phi0) * Math.sin(phi) + Math.cos(phi0) * Math.cos(phi) * Math.cos(lam - lam0);
            const c = Math.acos(Math.max(-1, Math.min(1, cosc)));

            if (c === 0) return { x: cx, y: cy };

            const k = c / Math.sin(c);
            const x = cx + radius * k * (Math.cos(phi) * Math.sin(lam - lam0)) / Math.PI;
            const y = cy - radius * k * (Math.cos(phi0) * Math.sin(phi) - Math.sin(phi0) * Math.cos(phi) * Math.cos(lam - lam0)) / Math.PI;
            return { x, y };
        }

        function drawOutline() {
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(20,20,50,1)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(138,154,91,0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Distance rings
            for (let d = 1; d <= 4; d++) {
                ctx.beginPath();
                ctx.arc(cx, cy, radius * d / 4, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(254,250,224,0.08)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
                // Label
                ctx.fillStyle = 'rgba(254,250,224,0.3)';
                ctx.font = '11px "Segoe UI", sans-serif';
                ctx.fillText((d * 5000) + ' km', cx + 4, cy - radius * d / 4 + 14);
            }
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(254,250,224,0.1)';
            ctx.lineWidth = 0.5;
            for (let lon = -180; lon < 180; lon += 30) {
                ctx.beginPath();
                for (let lat = -89; lat <= 89; lat += 2) {
                    const p = azimuthalProject(lon, lat);
                    if (lat === -89) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }
            for (let lat = -60; lat <= 60; lat += 30) {
                ctx.beginPath();
                for (let lon = -180; lon <= 180; lon += 2) {
                    const p = azimuthalProject(lon, lat);
                    if (lon === -180) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }
        }

        function drawLand() {
            const continents = [
                [[-130,50],[-125,55],[-120,60],[-140,65],[-165,65],[-170,55],[-150,60],[-140,55],[-125,50],[-120,45],[-115,32],[-105,25],[-100,28],[-97,26],[-90,30],[-82,25],[-80,30],[-75,35],[-70,42],[-65,45],[-60,47],[-65,60],[-80,65],[-95,70],[-130,70],[-145,65],[-135,55],[-130,50]],
                [[-80,10],[-75,12],[-60,5],[-50,0],[-35,-5],[-38,-15],[-48,-28],[-57,-38],[-68,-47],[-75,-48],[-72,-35],[-70,-18],[-77,-2],[-80,10]],
                [[-10,36],[0,38],[5,43],[2,47],[-5,48],[-10,44],[-10,36]],
                [[0,38],[15,38],[25,38],[30,45],[20,45],[10,46],[5,43],[0,38]],
                [[-15,12],[-10,25],[0,35],[15,33],[25,30],[35,25],[42,2],[35,-15],[28,-33],[15,-30],[10,-5],[0,5],[-10,7],[-15,12]],
                [[28,41],[45,40],[55,25],[72,20],[80,10],[90,20],[100,15],[110,22],[120,25],[130,35],[140,40],[145,45],[130,50],[110,45],[90,48],[75,35],[65,40],[55,45],[50,55],[60,65],[80,72],[120,70],[170,65]],
                [[115,-10],[130,-12],[145,-15],[150,-25],[148,-35],[137,-35],[125,-30],[115,-20],[115,-10]]
            ];
            ctx.fillStyle = 'rgba(138,154,91,0.2)';
            ctx.strokeStyle = 'rgba(138,154,91,0.5)';
            ctx.lineWidth = 1;
            for (const c of continents) {
                ctx.beginPath();
                let first = true;
                for (let i = 0; i < c.length; i++) {
                    const p = azimuthalProject(c[i][0], c[i][1]);
                    const dx = p.x - cx, dy = p.y - cy;
                    if (dx * dx + dy * dy > radius * radius * 1.1) { first = true; continue; }
                    if (first) { ctx.moveTo(p.x, p.y); first = false; }
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.fill();
                ctx.stroke();
            }
        }

        function drawCenter() {
            ctx.beginPath();
            ctx.arc(cx, cy, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);
            drawOutline();
            drawGrid();
            drawLand();
            drawCenter();
            requestAnimationFrame(draw);
        }

        window.reset = function() {
            latSlider.value = 40; lonSlider.value = -74;
            latVal.textContent = '40'; lonVal.textContent = '-74';
        };

        draw();
    })();
    </script>
</body>
</html>
