<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robinson Projection -- The Compromise</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(254,250,224,0.12); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 12px 24px; border-radius: 12px;
            font-size: 0.85rem; text-align: center; pointer-events: none; z-index: 100;
        }
        .controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .controls label {
            color: #FEFAE0; font-size: 0.8rem; display: flex; align-items: center; gap: 8px;
            background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
            padding: 6px 12px; border-radius: 8px;
        }
        .controls input[type=checkbox] { accent-color: #8A9A5B; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="controls">
        <label><input type="checkbox" id="showTissot" checked> Tissot Circles</label>
        <label><input type="checkbox" id="showGrid" checked> Graticule</label>
        <label><input type="checkbox" id="showLand" checked> Landmasses</label>
    </div>
    <div class="info">Robinson Projection -- a compromise that distorts everything a little, but nothing too much. Hover to see local distortion.</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, cx, cy, scale;
        let mouseX = -1, mouseY = -1;

        // Robinson projection lookup table (latitude -> PLEN, PDFE)
        const robinsonTable = [
            [0,  1.0000, 0.0000],
            [5,  0.9986, 0.0620],
            [10, 0.9954, 0.1240],
            [15, 0.9900, 0.1860],
            [20, 0.9822, 0.2480],
            [25, 0.9730, 0.3100],
            [30, 0.9600, 0.3720],
            [35, 0.9427, 0.4340],
            [40, 0.9216, 0.4958],
            [45, 0.8962, 0.5571],
            [50, 0.8679, 0.6176],
            [55, 0.8350, 0.6769],
            [60, 0.7986, 0.7346],
            [65, 0.7597, 0.7903],
            [70, 0.7186, 0.8435],
            [75, 0.6732, 0.8936],
            [80, 0.6213, 0.9394],
            [85, 0.5722, 0.9761],
            [90, 0.5322, 1.0000]
        ];

        function interpolateRobinson(absLat) {
            const idx = Math.min(Math.floor(absLat / 5), 17);
            const frac = (absLat - idx * 5) / 5;
            const plen = robinsonTable[idx][1] + frac * (robinsonTable[idx + 1][1] - robinsonTable[idx][1]);
            const pdfe = robinsonTable[idx][2] + frac * (robinsonTable[idx + 1][2] - robinsonTable[idx][2]);
            return { plen, pdfe };
        }

        function robinsonProject(lon, lat) {
            const { plen, pdfe } = interpolateRobinson(Math.abs(lat));
            const x = cx + plen * (lon / 180) * scale;
            const y = cy - Math.sign(lat) * pdfe * scale * 0.5072;
            return { x, y };
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cx = W / 2;
            cy = H / 2;
            scale = Math.min(W * 0.42, H * 0.8);
        }
        resize();
        window.addEventListener('resize', resize);
        canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('mouseleave', () => { mouseX = -1; mouseY = -1; });

        function drawOutline() {
            ctx.beginPath();
            for (let lat = -90; lat <= 90; lat += 1) {
                const p = robinsonProject(-180, lat);
                if (lat === -90) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            for (let lat = 90; lat >= -90; lat -= 1) {
                const p = robinsonProject(180, lat);
                ctx.lineTo(p.x, p.y);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(30,30,60,1)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(138,154,91,0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawGrid() {
            if (!document.getElementById('showGrid').checked) return;
            ctx.strokeStyle = 'rgba(254,250,224,0.12)';
            ctx.lineWidth = 0.5;
            for (let lon = -180; lon <= 180; lon += 30) {
                ctx.beginPath();
                for (let lat = -90; lat <= 90; lat += 1) {
                    const p = robinsonProject(lon, lat);
                    if (lat === -90) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }
            for (let lat = -90; lat <= 90; lat += 30) {
                ctx.beginPath();
                for (let lon = -180; lon <= 180; lon += 1) {
                    const p = robinsonProject(lon, lat);
                    if (lon === -180) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }
        }

        function drawLand() {
            if (!document.getElementById('showLand').checked) return;
            const continents = [
                [[-130,50],[-125,55],[-120,60],[-140,65],[-165,65],[-170,55],[-150,60],[-140,55],[-125,50],[-120,45],[-115,32],[-105,25],[-100,28],[-97,26],[-90,30],[-82,25],[-80,30],[-75,35],[-70,42],[-65,45],[-60,47],[-65,60],[-80,65],[-95,70],[-130,70],[-145,65],[-135,55],[-130,50]],
                [[-80,10],[-75,12],[-60,5],[-50,0],[-35,-5],[-38,-15],[-48,-28],[-57,-38],[-68,-47],[-75,-48],[-72,-35],[-70,-18],[-77,-2],[-80,10]],
                [[-10,36],[0,38],[5,43],[2,47],[-5,48],[-10,44],[-10,36]],
                [[0,38],[15,38],[25,38],[30,45],[20,45],[10,46],[5,47],[5,43],[0,38]],
                [[-15,12],[-10,25],[0,35],[15,33],[25,30],[35,25],[42,2],[35,-15],[28,-33],[15,-30],[10,-5],[0,5],[-10,7],[-15,12]],
                [[28,41],[45,40],[55,25],[72,20],[80,10],[90,20],[100,15],[110,22],[120,25],[130,35],[140,40],[145,45],[130,50],[110,45],[90,48],[75,35],[65,40],[55,45],[50,55],[60,65],[80,72],[120,70],[170,65]],
                [[115,-10],[130,-12],[145,-15],[150,-25],[148,-35],[137,-35],[125,-30],[115,-20],[115,-10]]
            ];
            ctx.fillStyle = 'rgba(138,154,91,0.2)';
            ctx.strokeStyle = 'rgba(138,154,91,0.5)';
            ctx.lineWidth = 1;
            for (const c of continents) {
                ctx.beginPath();
                for (let i = 0; i < c.length; i++) {
                    const p = robinsonProject(c[i][0], c[i][1]);
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }
        }

        function drawTissot() {
            if (!document.getElementById('showTissot').checked) return;
            const baseR = 12;
            for (let lat = -75; lat <= 75; lat += 30) {
                for (let lon = -150; lon <= 150; lon += 60) {
                    const center = robinsonProject(lon, lat);
                    const delta = 2;
                    const pRight = robinsonProject(lon + delta, lat);
                    const pUp = robinsonProject(lon, lat + delta);
                    const dx = Math.sqrt((pRight.x - center.x) ** 2 + (pRight.y - center.y) ** 2);
                    const dy = Math.sqrt((pUp.x - center.x) ** 2 + (pUp.y - center.y) ** 2);
                    const equator = robinsonProject(delta, 0);
                    const eqCenter = robinsonProject(0, 0);
                    const refDx = Math.sqrt((equator.x - eqCenter.x) ** 2 + (equator.y - eqCenter.y) ** 2);
                    const scaleX = dx / refDx;
                    const scaleY = dy / refDx;
                    const angle = Math.atan2(pRight.y - center.y, pRight.x - center.x);

                    // Draw ellipse
                    ctx.save();
                    ctx.translate(center.x, center.y);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, baseR * scaleX, baseR * scaleY, 0, 0, Math.PI * 2);
                    const distortion = Math.abs(scaleX - scaleY) / Math.max(scaleX, scaleY);
                    const r = Math.floor(138 + 83 * distortion);
                    const g = Math.floor(154 - 60 * distortion);
                    const b = Math.floor(91 + 3 * distortion);
                    ctx.fillStyle = `rgba(${r},${g},${b},0.3)`;
                    ctx.fill();
                    ctx.strokeStyle = `rgba(${r},${g},${b},0.7)`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    // Reference circle
                    ctx.beginPath();
                    ctx.arc(0, 0, baseR, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(254,250,224,0.15)';
                    ctx.lineWidth = 0.5;
                    ctx.setLineDash([2, 2]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();
                }
            }
        }

        function drawHoverInfo() {
            if (mouseX < 0) return;
            // Inverse Robinson is complex; show approximate lat/lon by nearest grid search
            let bestDist = Infinity, bestLat = 0, bestLon = 0;
            for (let lat = -85; lat <= 85; lat += 5) {
                for (let lon = -175; lon <= 175; lon += 5) {
                    const p = robinsonProject(lon, lat);
                    const d = (p.x - mouseX) ** 2 + (p.y - mouseY) ** 2;
                    if (d < bestDist) { bestDist = d; bestLat = lat; bestLon = lon; }
                }
            }
            if (bestDist > 5000) return;
            const { plen } = interpolateRobinson(Math.abs(bestLat));
            const areaDistortion = (1 / plen).toFixed(2);
            ctx.fillStyle = 'rgba(254,250,224,0.9)';
            ctx.font = '13px "Segoe UI", sans-serif';
            ctx.fillText(`${bestLat >= 0 ? bestLat + 'N' : -bestLat + 'S'}, ${bestLon >= 0 ? bestLon + 'E' : -bestLon + 'W'}  Area scale: ${areaDistortion}x`, mouseX + 15, mouseY - 10);
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);
            drawOutline();
            drawGrid();
            drawLand();
            drawTissot();
            drawHoverInfo();
            requestAnimationFrame(draw);
        }

        window.reset = function() {
            document.getElementById('showTissot').checked = true;
            document.getElementById('showGrid').checked = true;
            document.getElementById('showLand').checked = true;
        };

        draw();
    })();
    </script>
</body>
</html>
