<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mollweide Equal-Area Projection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(254,250,224,0.12); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 12px 24px; border-radius: 12px;
            font-size: 0.85rem; text-align: center; pointer-events: none; z-index: 100;
        }
        .controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .controls label {
            color: #FEFAE0; font-size: 0.8rem; display: flex; align-items: center; gap: 8px;
            background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
            padding: 6px 12px; border-radius: 8px;
        }
        .controls input[type=range] { width: 120px; accent-color: #8A9A5B; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="controls">
        <label>Central Meridian <input type="range" id="meridianSlider" min="-180" max="180" value="0"></label>
        <label><span id="meridianVal">0</span>&deg;</label>
    </div>
    <div class="info">Mollweide Equal-Area -- preserves area perfectly. Shapes distort away from the center. Drag the slider to rotate.</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, cx, cy, scale;
        const meridianSlider = document.getElementById('meridianSlider');
        const meridianVal = document.getElementById('meridianVal');

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cx = W / 2;
            cy = H / 2;
            scale = Math.min(W * 0.4, H * 0.45);
        }
        resize();
        window.addEventListener('resize', resize);

        // Mollweide: solve 2*theta + sin(2*theta) = pi*sin(lat)
        function solveTheta(lat) {
            const target = Math.PI * Math.sin(lat * Math.PI / 180);
            let theta = lat * Math.PI / 180;
            for (let i = 0; i < 20; i++) {
                const dTheta = -(2 * theta + Math.sin(2 * theta) - target) / (2 + 2 * Math.cos(2 * theta));
                theta += dTheta;
                if (Math.abs(dTheta) < 1e-10) break;
            }
            return theta;
        }

        function mollweideProject(lon, lat) {
            const cm = parseFloat(meridianSlider.value);
            let dLon = lon - cm;
            while (dLon > 180) dLon -= 360;
            while (dLon < -180) dLon += 360;
            const theta = solveTheta(lat);
            const x = cx + (2 * Math.SQRT2 / Math.PI) * dLon * Math.PI / 180 * Math.cos(theta) * scale;
            const y = cy - Math.SQRT2 * Math.sin(theta) * scale;
            return { x, y };
        }

        function drawOutline() {
            ctx.beginPath();
            for (let t = 0; t <= 360; t += 1) {
                const angle = t * Math.PI / 180;
                const x = cx + 2 * Math.SQRT2 * Math.cos(angle) * scale;
                const y = cy - Math.SQRT2 * Math.sin(angle) * scale;
                if (t === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(20,20,50,1)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(138,154,91,0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(254,250,224,0.12)';
            ctx.lineWidth = 0.5;
            const cm = parseFloat(meridianSlider.value);
            for (let lonOff = -180; lonOff <= 180; lonOff += 30) {
                let lon = cm + lonOff;
                ctx.beginPath();
                for (let lat = -90; lat <= 90; lat += 1) {
                    const p = mollweideProject(lon, lat);
                    if (lat === -90) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }
            for (let lat = -60; lat <= 60; lat += 30) {
                ctx.beginPath();
                for (let lon = -180; lon <= 180; lon += 2) {
                    const p = mollweideProject(lon, lat);
                    if (lon === -180) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }
        }

        function drawLand() {
            const continents = [
                [[-130,50],[-125,55],[-120,60],[-140,65],[-165,65],[-170,55],[-150,60],[-140,55],[-125,50],[-120,45],[-115,32],[-105,25],[-100,28],[-97,26],[-90,30],[-82,25],[-80,30],[-75,35],[-70,42],[-65,45],[-60,47],[-65,60],[-80,65],[-95,70],[-130,70],[-145,65],[-135,55],[-130,50]],
                [[-80,10],[-75,12],[-60,5],[-50,0],[-35,-5],[-38,-15],[-48,-28],[-57,-38],[-68,-47],[-75,-48],[-72,-35],[-70,-18],[-77,-2],[-80,10]],
                [[-10,36],[0,38],[5,43],[2,47],[-5,48],[-10,44],[-10,36]],
                [[0,38],[15,38],[25,38],[30,45],[20,45],[10,46],[5,43],[0,38]],
                [[-15,12],[-10,25],[0,35],[15,33],[25,30],[35,25],[42,2],[35,-15],[28,-33],[15,-30],[10,-5],[0,5],[-10,7],[-15,12]],
                [[28,41],[45,40],[55,25],[72,20],[80,10],[90,20],[100,15],[110,22],[120,25],[130,35],[140,40],[145,45],[130,50],[110,45],[90,48],[75,35],[65,40],[55,45],[50,55],[60,65],[80,72],[120,70],[170,65]],
                [[115,-10],[130,-12],[145,-15],[150,-25],[148,-35],[137,-35],[125,-30],[115,-20],[115,-10]]
            ];
            ctx.fillStyle = 'rgba(138,154,91,0.2)';
            ctx.strokeStyle = 'rgba(138,154,91,0.5)';
            ctx.lineWidth = 1;
            for (const c of continents) {
                ctx.beginPath();
                for (let i = 0; i < c.length; i++) {
                    const p = mollweideProject(c[i][0], c[i][1]);
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }
        }

        function drawTissot() {
            const baseR = 10;
            for (let lat = -60; lat <= 60; lat += 30) {
                for (let lon = -150; lon <= 150; lon += 60) {
                    const center = mollweideProject(lon, lat);
                    const d = 2;
                    const pR = mollweideProject(lon + d, lat);
                    const pU = mollweideProject(lon, lat + d);
                    const dx = Math.sqrt((pR.x - center.x) ** 2 + (pR.y - center.y) ** 2);
                    const dy = Math.sqrt((pU.x - center.x) ** 2 + (pU.y - center.y) ** 2);
                    const ref = mollweideProject(d, 0);
                    const refC = mollweideProject(0, 0);
                    const refD = Math.sqrt((ref.x - refC.x) ** 2 + (ref.y - refC.y) ** 2);
                    const sx = dx / refD;
                    const sy = dy / refD;
                    const angle = Math.atan2(pR.y - center.y, pR.x - center.x);

                    ctx.save();
                    ctx.translate(center.x, center.y);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, baseR * sx, baseR * sy, 0, 0, Math.PI * 2);
                    // Equal area: ellipses have same area but different shape
                    const shapeDistortion = Math.abs(sx - sy) / Math.max(sx, sy);
                    ctx.fillStyle = `rgba(221,161,94,${0.2 + shapeDistortion * 0.3})`;
                    ctx.fill();
                    ctx.strokeStyle = `rgba(221,161,94,0.7)`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.restore();
                }
            }
        }

        meridianSlider.addEventListener('input', () => {
            meridianVal.textContent = meridianSlider.value;
        });

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);
            drawOutline();
            drawGrid();
            drawLand();
            drawTissot();

            // Label
            ctx.fillStyle = 'rgba(254,250,224,0.6)';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Equal-Area: all Tissot ellipses have the same area, but shapes vary', cx, H - 60);
            ctx.textAlign = 'start';

            requestAnimationFrame(draw);
        }

        window.reset = function() {
            meridianSlider.value = 0;
            meridianVal.textContent = '0';
        };

        draw();
    })();
    </script>
</body>
</html>
