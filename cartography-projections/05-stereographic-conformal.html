<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stereographic Conformal Projection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(254,250,224,0.12); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 12px 24px; border-radius: 12px;
            font-size: 0.85rem; text-align: center; pointer-events: none; z-index: 100;
        }
        .controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .controls label {
            color: #FEFAE0; font-size: 0.8rem; display: flex; align-items: center; gap: 8px;
            background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
            padding: 6px 12px; border-radius: 8px;
        }
        .controls input[type=range] { width: 120px; accent-color: #8A9A5B; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="controls">
        <label>Tangent Lat <input type="range" id="tLat" min="-90" max="90" value="90"> <span id="tLatV">90</span>&deg;</label>
        <label>Tangent Lon <input type="range" id="tLon" min="-180" max="180" value="0"> <span id="tLonV">0</span>&deg;</label>
        <label>Zoom <input type="range" id="zoom" min="20" max="200" value="80"></label>
    </div>
    <div class="info">Stereographic -- perfectly conformal (preserves angles). Circles on the globe remain circles on the map. Drag sliders to rotate the tangent point.</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H, cx, cy;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cx = W / 2;
            cy = H / 2;
        }
        resize();
        window.addEventListener('resize', resize);

        const tLatEl = document.getElementById('tLat');
        const tLonEl = document.getElementById('tLon');
        const zoomEl = document.getElementById('zoom');
        const tLatV = document.getElementById('tLatV');
        const tLonV = document.getElementById('tLonV');

        tLatEl.addEventListener('input', () => tLatV.textContent = tLatEl.value);
        tLonEl.addEventListener('input', () => tLonV.textContent = tLonEl.value);

        function toRad(d) { return d * Math.PI / 180; }

        function stereoProject(lon, lat) {
            const phi0 = toRad(parseFloat(tLatEl.value));
            const lam0 = toRad(parseFloat(tLonEl.value));
            const phi = toRad(lat);
            const lam = toRad(lon);
            const scale = parseFloat(zoomEl.value) / 50;

            const k = 2 / (1 + Math.sin(phi0) * Math.sin(phi) + Math.cos(phi0) * Math.cos(phi) * Math.cos(lam - lam0));
            if (k > 20) return null; // Point too far from tangent

            const R = Math.min(W, H) * 0.35 * scale;
            const x = cx + R * k * Math.cos(phi) * Math.sin(lam - lam0);
            const y = cy - R * k * (Math.cos(phi0) * Math.sin(phi) - Math.sin(phi0) * Math.cos(phi) * Math.cos(lam - lam0));
            return { x, y };
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(254,250,224,0.12)';
            ctx.lineWidth = 0.5;
            // Meridians
            for (let lon = -180; lon < 180; lon += 15) {
                ctx.beginPath();
                let started = false;
                for (let lat = -89; lat <= 89; lat += 1) {
                    const p = stereoProject(lon, lat);
                    if (!p || Math.abs(p.x - cx) > W || Math.abs(p.y - cy) > H) { started = false; continue; }
                    if (!started) { ctx.moveTo(p.x, p.y); started = true; }
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }
            // Parallels
            for (let lat = -75; lat <= 75; lat += 15) {
                ctx.beginPath();
                let started = false;
                for (let lon = -180; lon <= 180; lon += 2) {
                    const p = stereoProject(lon, lat);
                    if (!p || Math.abs(p.x - cx) > W || Math.abs(p.y - cy) > H) { started = false; continue; }
                    if (!started) { ctx.moveTo(p.x, p.y); started = true; }
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }
        }

        function drawLand() {
            const continents = [
                [[-130,50],[-125,55],[-120,60],[-140,65],[-165,65],[-170,55],[-150,60],[-140,55],[-125,50],[-120,45],[-115,32],[-105,25],[-100,28],[-97,26],[-90,30],[-82,25],[-80,30],[-75,35],[-70,42],[-65,45],[-60,47],[-65,60],[-80,65],[-95,70],[-130,70],[-145,65],[-135,55],[-130,50]],
                [[-80,10],[-75,12],[-60,5],[-50,0],[-35,-5],[-38,-15],[-48,-28],[-57,-38],[-68,-47],[-75,-48],[-72,-35],[-70,-18],[-77,-2],[-80,10]],
                [[-10,36],[0,38],[5,43],[2,47],[-5,48],[-10,44],[-10,36]],
                [[0,38],[15,38],[25,38],[30,45],[20,45],[10,46],[5,43],[0,38]],
                [[-15,12],[-10,25],[0,35],[15,33],[25,30],[35,25],[42,2],[35,-15],[28,-33],[15,-30],[10,-5],[0,5],[-10,7],[-15,12]],
                [[28,41],[45,40],[55,25],[72,20],[80,10],[90,20],[100,15],[110,22],[120,25],[130,35],[140,40],[145,45],[130,50],[110,45],[90,48],[75,35],[65,40],[55,45],[50,55],[60,65],[80,72],[120,70],[170,65]],
                [[115,-10],[130,-12],[145,-15],[150,-25],[148,-35],[137,-35],[125,-30],[115,-20],[115,-10]]
            ];
            ctx.fillStyle = 'rgba(138,154,91,0.2)';
            ctx.strokeStyle = 'rgba(138,154,91,0.5)';
            ctx.lineWidth = 1.2;
            for (const c of continents) {
                ctx.beginPath();
                let started = false;
                for (let i = 0; i < c.length; i++) {
                    const p = stereoProject(c[i][0], c[i][1]);
                    if (!p || Math.abs(p.x - cx) > W * 2 || Math.abs(p.y - cy) > H * 2) { started = false; continue; }
                    if (!started) { ctx.moveTo(p.x, p.y); started = true; }
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.fill();
                ctx.stroke();
            }
        }

        function drawTissot() {
            const baseR = 8;
            for (let lat = -75; lat <= 75; lat += 30) {
                for (let lon = -150; lon <= 150; lon += 60) {
                    const center = stereoProject(lon, lat);
                    if (!center) continue;
                    if (Math.abs(center.x - cx) > W * 0.6 || Math.abs(center.y - cy) > H * 0.6) continue;

                    const d = 2;
                    const pR = stereoProject(lon + d, lat);
                    const pU = stereoProject(lon, lat + d);
                    if (!pR || !pU) continue;

                    const dx = Math.sqrt((pR.x - center.x) ** 2 + (pR.y - center.y) ** 2);
                    const dy = Math.sqrt((pU.x - center.x) ** 2 + (pU.y - center.y) ** 2);
                    const avgScale = (dx + dy) / 2;
                    const ref = stereoProject(d, parseFloat(tLatEl.value));
                    if (!ref) continue;
                    const refC = stereoProject(0, parseFloat(tLatEl.value));
                    if (!refC) continue;
                    const refD = Math.sqrt((ref.x - refC.x) ** 2 + (ref.y - refC.y) ** 2);
                    if (refD < 0.001) continue;
                    const s = avgScale / refD;
                    const r = baseR * s;
                    if (r < 2 || r > 200) continue;

                    // Conformal: circles stay circles (just scale)
                    ctx.beginPath();
                    ctx.arc(center.x, center.y, r, 0, Math.PI * 2);
                    const sizeDistortion = Math.min(s, 5) / 5;
                    ctx.fillStyle = `rgba(221,161,94,${0.15 + sizeDistortion * 0.2})`;
                    ctx.fill();
                    ctx.strokeStyle = `rgba(221,161,94,0.6)`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);
            drawGrid();
            drawLand();
            drawTissot();

            // Tangent point marker
            const tp = stereoProject(parseFloat(tLonEl.value), parseFloat(tLatEl.value));
            if (tp) {
                ctx.beginPath();
                ctx.arc(tp.x, tp.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#DDA15E';
                ctx.fill();
            }

            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = '13px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Conformal: Tissot circles remain circular (angles preserved), but sizes vary', cx, H - 60);
            ctx.textAlign = 'start';

            requestAnimationFrame(draw);
        }

        window.reset = function() {
            tLatEl.value = 90; tLonEl.value = 0; zoomEl.value = 80;
            tLatV.textContent = '90'; tLonV.textContent = '0';
        };

        draw();
    })();
    </script>
</body>
</html>
