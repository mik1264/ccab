<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercator Projection & Tissot Indicatrix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(254,250,224,0.12); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 12px 24px; border-radius: 12px;
            font-size: 0.85rem; text-align: center; pointer-events: none; z-index: 100;
        }
        .controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .controls label {
            color: #FEFAE0; font-size: 0.8rem; display: flex; align-items: center; gap: 8px;
            background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
            padding: 6px 12px; border-radius: 8px;
        }
        .controls input[type=range] { width: 100px; accent-color: #8A9A5B; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="controls">
        <label>Circle Size <input type="range" id="sizeSlider" min="5" max="40" value="18"></label>
        <label>Grid Density <input type="range" id="densitySlider" min="2" max="8" value="4"></label>
    </div>
    <div class="info">Mercator Projection with Tissot Indicatrices -- circles on the globe appear distorted on the map. Drag to pan.</div>
    <canvas id="canvas"></canvas>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let panX = 0, panY = 0, dragging = false, lastMX = 0, lastMY = 0;
        const sizeSlider = document.getElementById('sizeSlider');
        const densitySlider = document.getElementById('densitySlider');

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Mercator projection: lon,lat -> x,y
        function mercatorX(lon) {
            return (lon / 180) * (W * 0.4) + W / 2 + panX;
        }
        function mercatorY(lat) {
            const latRad = lat * Math.PI / 180;
            const mercN = Math.log(Math.tan(Math.PI / 4 + latRad / 2));
            return H / 2 - mercN * (W * 0.4) / Math.PI + panY;
        }

        // Tissot indicatrix: at a given lat, Mercator stretches area by sec^2(lat)
        // Shape stays circular (conformal) but size grows
        function tissotScale(lat) {
            const latRad = Math.abs(lat) * Math.PI / 180;
            return 1 / Math.cos(latRad);
        }

        function drawCoastlineSimple() {
            // Simplified world outline using major landmass approximations
            ctx.strokeStyle = 'rgba(138,154,91,0.5)';
            ctx.lineWidth = 1.5;

            const continents = [
                // North America
                [[-130,50],[-125,55],[-120,60],[-140,65],[-165,65],[-170,55],[-165,58],[-150,60],[-140,55],[-125,50],[-120,45],[-115,32],[-105,25],[-100,28],[-97,26],[-90,30],[-82,25],[-80,30],[-75,35],[-70,42],[-65,45],[-60,47],[-65,50],[-55,50],[-60,55],[-65,60],[-80,65],[-95,70],[-110,70],[-130,70],[-140,70],[-145,65],[-140,60],[-135,55],[-130,50]],
                // South America
                [[-80,10],[-75,12],[-70,12],[-60,5],[-50,0],[-35,-5],[-35,-10],[-38,-15],[-40,-22],[-48,-28],[-53,-33],[-57,-38],[-65,-42],[-68,-47],[-70,-52],[-75,-48],[-72,-35],[-70,-18],[-75,-10],[-77,-2],[-80,2],[-80,10]],
                // Europe
                [[-10,36],[0,38],[5,43],[2,47],[-5,48],[-10,44],[-10,36]],
                [[0,38],[5,36],[15,38],[20,40],[25,38],[28,41],[30,45],[25,47],[20,45],[15,46],[10,46],[5,47],[5,43],[0,38]],
                // Africa
                [[-15,12],[-17,15],[-15,20],[-10,25],[-5,30],[0,35],[10,37],[15,33],[20,32],[25,30],[32,30],[35,25],[40,12],[42,2],[40,-5],[35,-15],[30,-25],[28,-33],[20,-35],[15,-30],[12,-20],[10,-5],[5,5],[0,5],[-5,5],[-10,7],[-15,12]],
                // Asia (simplified)
                [[28,41],[35,37],[40,38],[45,40],[50,38],[55,25],[60,25],[65,25],[72,20],[77,15],[80,10],[85,15],[90,20],[95,15],[100,15],[105,20],[110,22],[115,22],[120,25],[125,30],[130,35],[135,35],[140,40],[145,45],[142,50],[135,55],[130,50],[125,45],[120,48],[110,45],[100,45],[90,48],[80,42],[75,35],[70,40],[65,40],[60,42],[55,45],[50,55],[55,60],[60,65],[70,70],[80,72],[90,75],[100,72],[120,70],[140,65],[160,65],[170,65],[180,65]],
                // Australia
                [[115,-10],[120,-12],[130,-12],[138,-14],[145,-15],[148,-20],[150,-25],[152,-28],[148,-35],[142,-38],[137,-35],[130,-32],[125,-30],[118,-22],[115,-20],[113,-15],[115,-10]]
            ];

            for (const c of continents) {
                ctx.beginPath();
                for (let i = 0; i < c.length; i++) {
                    const x = mercatorX(c[i][0]);
                    const y = mercatorY(c[i][1]);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fillStyle = 'rgba(138,154,91,0.15)';
                ctx.fill();
                ctx.stroke();
            }
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(254,250,224,0.1)';
            ctx.lineWidth = 0.5;
            // Meridians
            for (let lon = -180; lon <= 180; lon += 30) {
                ctx.beginPath();
                for (let lat = -85; lat <= 85; lat += 1) {
                    const x = mercatorX(lon);
                    const y = mercatorY(lat);
                    if (lat === -85) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
            // Parallels
            for (let lat = -60; lat <= 60; lat += 30) {
                ctx.beginPath();
                for (let lon = -180; lon <= 180; lon += 1) {
                    const x = mercatorX(lon);
                    const y = mercatorY(lat);
                    if (lon === -180) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
        }

        function drawTissot() {
            const baseRadius = parseFloat(sizeSlider.value);
            const step = 90 / parseFloat(densitySlider.value);

            for (let lat = -80; lat <= 80; lat += step) {
                for (let lon = -180; lon < 180; lon += step * 2) {
                    const x = mercatorX(lon);
                    const y = mercatorY(lat);
                    const scale = tissotScale(lat);
                    const r = baseRadius * scale;

                    if (x < -100 || x > W + 100 || y < -100 || y > H + 100) continue;

                    // Color by distortion amount
                    const distortionFactor = Math.min(scale / 5, 1);
                    const red = Math.floor(221 * distortionFactor + 138 * (1 - distortionFactor));
                    const green = Math.floor(161 * (1 - distortionFactor) + 154 * (1 - distortionFactor));
                    const blue = Math.floor(94 * distortionFactor + 91 * (1 - distortionFactor));

                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${red},${green},${blue},0.3)`;
                    ctx.fill();
                    ctx.strokeStyle = `rgba(${red},${green},${blue},0.7)`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    // Reference unit circle
                    ctx.beginPath();
                    ctx.arc(x, y, baseRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(254,250,224,0.15)';
                    ctx.lineWidth = 0.5;
                    ctx.setLineDash([3, 3]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }
        }

        // Drag to pan
        canvas.addEventListener('mousedown', e => { dragging = true; lastMX = e.clientX; lastMY = e.clientY; });
        canvas.addEventListener('mousemove', e => {
            if (dragging) { panX += e.clientX - lastMX; panY += e.clientY - lastMY; lastMX = e.clientX; lastMY = e.clientY; }
        });
        canvas.addEventListener('mouseup', () => dragging = false);
        canvas.addEventListener('mouseleave', () => dragging = false);
        canvas.addEventListener('touchstart', e => { dragging = true; lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY; });
        canvas.addEventListener('touchmove', e => {
            if (dragging) { panX += e.touches[0].clientX - lastMX; panY += e.touches[0].clientY - lastMY; lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY; }
            e.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchend', () => dragging = false);

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);
            drawGrid();
            drawCoastlineSimple();
            drawTissot();
            requestAnimationFrame(draw);
        }

        window.reset = function() {
            panX = 0;
            panY = 0;
            sizeSlider.value = 18;
            densitySlider.value = 4;
        };

        draw();
    })();
    </script>
</body>
</html>
