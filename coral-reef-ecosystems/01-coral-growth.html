<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coral Growth Morphology - Coral Reef Ecosystems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a1628; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10,22,40,0.85); backdrop-filter: blur(10px);
            padding: 14px 24px; border-radius: 14px; display: flex; gap: 18px;
            align-items: center; z-index: 100; border: 1px solid rgba(138,154,91,0.3);
        }
        #controls label { color: #FEFAE0; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        #controls select, #controls input[type=range] { accent-color: #8A9A5B; }
        #controls select { background: #1a2a44; color: #FEFAE0; border: 1px solid #8A9A5B; border-radius: 6px; padding: 4px 8px; }
        #controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 8px 16px;
            border-radius: 8px; cursor: pointer; font-size: 0.85rem;
        }
        #controls button:hover { background: #8A9A5B; }
        #info {
            position: fixed; top: 10px; right: 10px; background: rgba(10,22,40,0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; max-width: 280px; z-index: 100;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.5;
        }
        #info h3 { color: #DDA15E; margin-bottom: 6px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Coral Growth Morphology</h3>
        <p>Simulates how corals grow by accreting calcium carbonate. Growth rate depends on light availability and water flow. Branching corals grow at tips; massive corals expand uniformly; encrusting corals spread along surfaces.</p>
    </div>
    <div id="controls">
        <label>Morphotype
            <select id="morphotype">
                <option value="branching">Branching</option>
                <option value="massive">Massive</option>
                <option value="encrusting">Encrusting</option>
                <option value="tabular">Tabular</option>
            </select>
        </label>
        <label>Light
            <input type="range" id="light" min="0" max="100" value="80">
        </label>
        <label>Flow
            <input type="range" id="flow" min="0" max="100" value="50">
        </label>
        <button id="resetBtn">New Colony</button>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class CoralColony {
            constructor(type) {
                this.type = type;
                this.branches = [];
                this.baseX = W / 2;
                this.baseY = H * 0.85;
                this.age = 0;
                this.maxBranches = 2000;
                this.seed();
            }

            seed() {
                this.branches = [];
                if (this.type === 'branching') {
                    this.branches.push({ x: this.baseX, y: this.baseY, angle: -Math.PI/2, len: 0, maxLen: 30 + Math.random()*20, depth: 0, growing: true, thickness: 6 });
                } else if (this.type === 'massive') {
                    for (let i = 0; i < 12; i++) {
                        const angle = (i / 12) * Math.PI * 2;
                        this.branches.push({ x: this.baseX, y: this.baseY, angle, len: 0, maxLen: 20 + Math.random()*15, depth: 0, growing: true, thickness: 8 });
                    }
                } else if (this.type === 'encrusting') {
                    for (let i = 0; i < 20; i++) {
                        const angle = (i / 20) * Math.PI * 2;
                        this.branches.push({ x: this.baseX, y: this.baseY, angle, len: 0, maxLen: 15 + Math.random()*10, depth: 0, growing: true, thickness: 4 });
                    }
                } else if (this.type === 'tabular') {
                    this.branches.push({ x: this.baseX, y: this.baseY, angle: -Math.PI/2, len: 0, maxLen: 60 + Math.random()*30, depth: 0, growing: true, thickness: 8, isStalk: true });
                }
            }

            grow(light, flow) {
                this.age++;
                const growRate = 0.15 * (light / 100) * (0.5 + 0.5 * flow / 100);
                const newBranches = [];

                for (const b of this.branches) {
                    if (!b.growing) continue;
                    b.len += growRate * (1 + Math.random() * 0.3);

                    if (b.len >= b.maxLen) {
                        b.growing = false;
                        if (this.branches.length + newBranches.length < this.maxBranches) {
                            const tipX = b.x + Math.cos(b.angle) * b.len;
                            const tipY = b.y + Math.sin(b.angle) * b.len;

                            if (this.type === 'branching') {
                                const spread = 0.3 + Math.random() * 0.4;
                                const flowBias = (flow / 100 - 0.5) * 0.2;
                                for (let i = -1; i <= 1; i += 2) {
                                    newBranches.push({
                                        x: tipX, y: tipY,
                                        angle: b.angle + i * spread + flowBias,
                                        len: 0, maxLen: (b.maxLen * (0.65 + Math.random() * 0.2)),
                                        depth: b.depth + 1, growing: true,
                                        thickness: Math.max(1.5, b.thickness * 0.72)
                                    });
                                }
                            } else if (this.type === 'massive') {
                                const spread = 0.15 + Math.random() * 0.2;
                                for (let i = -1; i <= 1; i++) {
                                    newBranches.push({
                                        x: tipX, y: tipY,
                                        angle: b.angle + i * spread,
                                        len: 0, maxLen: b.maxLen * (0.8 + Math.random()*0.2),
                                        depth: b.depth + 1, growing: true,
                                        thickness: Math.max(2, b.thickness * 0.85)
                                    });
                                }
                            } else if (this.type === 'encrusting') {
                                newBranches.push({
                                    x: tipX, y: tipY,
                                    angle: b.angle + (Math.random() - 0.5) * 0.5,
                                    len: 0, maxLen: b.maxLen * (0.85 + Math.random()*0.15),
                                    depth: b.depth + 1, growing: true,
                                    thickness: Math.max(2, b.thickness * 0.9)
                                });
                            } else if (this.type === 'tabular') {
                                if (b.isStalk && b.depth === 0) {
                                    for (let i = 0; i < 16; i++) {
                                        const a = (i / 16) * Math.PI * 2;
                                        newBranches.push({
                                            x: tipX, y: tipY,
                                            angle: a * 0.3 + Math.PI * 0.35 + (i < 8 ? 0 : Math.PI),
                                            len: 0, maxLen: 40 + Math.random()*30,
                                            depth: 1, growing: true, thickness: 5
                                        });
                                    }
                                } else if (b.depth < 4) {
                                    newBranches.push({
                                        x: tipX, y: tipY,
                                        angle: b.angle + (Math.random()-0.5)*0.3,
                                        len: 0, maxLen: b.maxLen * 0.6,
                                        depth: b.depth + 1, growing: true,
                                        thickness: Math.max(1.5, b.thickness * 0.7)
                                    });
                                }
                            }
                        }
                    }
                }
                this.branches.push(...newBranches);
            }

            draw(ctx) {
                for (const b of this.branches) {
                    const endX = b.x + Math.cos(b.angle) * b.len;
                    const endY = b.y + Math.sin(b.angle) * b.len;
                    const depthFactor = Math.max(0, 1 - b.depth / 12);
                    const hue = this.type === 'branching' ? 25 + b.depth * 5 :
                                this.type === 'massive' ? 340 + b.depth * 3 :
                                this.type === 'encrusting' ? 120 + b.depth * 4 :
                                45 + b.depth * 5;
                    const sat = 60 + depthFactor * 30;
                    const lit = 35 + depthFactor * 25;
                    ctx.strokeStyle = `hsl(${hue}, ${sat}%, ${lit}%)`;
                    ctx.lineWidth = b.thickness;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.moveTo(b.x, b.y);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();

                    if (!b.growing && b.len >= b.maxLen && b.depth > 1) {
                        ctx.fillStyle = `hsla(${hue + 20}, 70%, 60%, 0.6)`;
                        ctx.beginPath();
                        ctx.arc(endX, endY, b.thickness * 0.8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }

        let colony;
        let particles = [];

        function createParticles() {
            particles = [];
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: -0.2 - Math.random() * 0.3,
                    size: 1 + Math.random() * 2,
                    alpha: 0.2 + Math.random() * 0.4
                });
            }
        }

        function init() {
            const type = document.getElementById('morphotype').value;
            colony = new CoralColony(type);
            createParticles();
        }

        init();

        let running = true;
        function animate() {
            if (!running) { requestAnimationFrame(animate); return; }

            ctx.fillStyle = 'rgba(10, 22, 40, 0.08)';
            ctx.fillRect(0, 0, W, H);

            // Draw ocean floor
            ctx.fillStyle = '#1a2a3a';
            ctx.fillRect(0, H * 0.85, W, H * 0.15);
            const sandGrad = ctx.createLinearGradient(0, H*0.83, 0, H*0.88);
            sandGrad.addColorStop(0, 'rgba(180,160,120,0.0)');
            sandGrad.addColorStop(1, 'rgba(180,160,120,0.3)');
            ctx.fillStyle = sandGrad;
            ctx.fillRect(0, H*0.83, W, H*0.05);

            // Light rays
            const light = parseInt(document.getElementById('light').value);
            ctx.save();
            for (let i = 0; i < 5; i++) {
                const x = W * 0.2 + i * W * 0.15;
                const grad = ctx.createLinearGradient(x, 0, x + 30, H);
                grad.addColorStop(0, `rgba(200,220,255,${0.02 * light/100})`);
                grad.addColorStop(1, 'rgba(200,220,255,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(x - 20, 0, 60, H);
            }
            ctx.restore();

            // Flow particles
            const flow = parseInt(document.getElementById('flow').value);
            for (const p of particles) {
                p.x += p.vx + (flow / 100) * 0.8;
                p.y += p.vy;
                if (p.x > W) p.x = 0;
                if (p.x < 0) p.x = W;
                if (p.y < 0) p.y = H;
                ctx.fillStyle = `rgba(150,200,255,${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }

            colony.grow(light, flow);
            colony.draw(ctx);

            requestAnimationFrame(animate);
        }
        animate();

        document.getElementById('resetBtn').addEventListener('click', () => {
            ctx.clearRect(0, 0, W, H);
            init();
        });
        document.getElementById('morphotype').addEventListener('change', () => {
            ctx.clearRect(0, 0, W, H);
            init();
        });

        window.reset = function() {
            ctx.clearRect(0, 0, W, H);
            init();
        };
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
