<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Acidification - Coral Reef Ecosystems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a1628; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10,22,40,0.85); backdrop-filter: blur(10px);
            padding: 14px 24px; border-radius: 14px; display: flex; gap: 20px;
            align-items: center; z-index: 100; border: 1px solid rgba(138,154,91,0.3);
        }
        #controls label { color: #FEFAE0; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        #controls input[type=range] { accent-color: #DDA15E; width: 160px; }
        #controls button { background: #606C38; color: #FEFAE0; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .display { color: #DDA15E; font-size: 1rem; font-weight: bold; min-width: 70px; text-align: center; }
        #info {
            position: fixed; top: 10px; right: 10px; background: rgba(10,22,40,0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; max-width: 280px; z-index: 100;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.5;
        }
        #info h3 { color: #DDA15E; margin-bottom: 6px; }
        #graph {
            position: fixed; top: 60px; left: 10px; background: rgba(10,22,40,0.85);
            backdrop-filter: blur(10px); border-radius: 12px; z-index: 100;
            border: 1px solid rgba(138,154,91,0.3);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <canvas id="graph" width="260" height="180"></canvas>
    <div id="info">
        <h3>Ocean Acidification</h3>
        <p>CO2 dissolves in seawater forming carbonic acid, lowering pH and reducing aragonite saturation (&Omega;). Corals need &Omega; &gt; 3 to build skeletons. Below &Omega; = 1, aragonite dissolves. Pre-industrial ocean pH was 8.2; current is ~8.1; projected 2100: ~7.8.</p>
    </div>
    <div id="controls">
        <label>Atmospheric CO2 (ppm)
            <input type="range" id="co2Slider" min="280" max="1000" step="5" value="415">
        </label>
        <span class="display" id="co2Disp">415 ppm</span>
        <label>pH <span class="display" id="phDisp">8.10</span></label>
        <label>&Omega;arag <span class="display" id="omegaDisp">3.4</span></label>
        <button id="resetBtn">Reset</button>
    </div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const graphCanvas = document.getElementById('graph');
        const gctx = graphCanvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function co2ToPH(co2) {
            return 8.35 - 0.35 * Math.log(co2 / 280) / Math.log(1000 / 280);
        }
        function co2ToOmega(co2) {
            return Math.max(0.5, 4.2 - 3.7 * Math.pow((co2 - 280) / 720, 0.8));
        }

        class CoralSkeleton {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseSize = 15 + Math.random() * 20;
                this.currentSize = this.baseSize;
                this.health = 1;
                this.hue = 40 + Math.random() * 30;
                this.dissolved = 0;
                this.growthRate = 0;
                this.shape = Math.floor(Math.random() * 3);
            }

            update(omega) {
                if (omega >= 3) {
                    this.growthRate = (omega - 3) * 0.02;
                    this.currentSize = Math.min(this.baseSize * 1.3, this.currentSize + this.growthRate * 0.1);
                    this.health = Math.min(1, this.health + 0.002);
                    this.dissolved = Math.max(0, this.dissolved - 0.001);
                } else if (omega >= 1) {
                    this.growthRate = 0;
                    this.health = Math.max(0.2, this.health - 0.001);
                } else {
                    this.growthRate = -(1 - omega) * 0.03;
                    this.currentSize = Math.max(2, this.currentSize + this.growthRate * 0.1);
                    this.dissolved = Math.min(1, this.dissolved + 0.002);
                    this.health = Math.max(0, this.health - 0.003);
                }
            }

            draw(ctx, time) {
                const s = this.currentSize;
                const alpha = 0.3 + this.health * 0.7;
                const lit = 40 + this.health * 30;

                ctx.save();
                ctx.translate(this.x, this.y);

                // Skeleton structure
                ctx.fillStyle = `hsla(${this.hue}, ${this.health * 40}%, ${lit}%, ${alpha})`;
                ctx.strokeStyle = `hsla(${this.hue}, ${this.health * 30}%, ${lit - 15}%, ${alpha * 0.6})`;
                ctx.lineWidth = 1;

                if (this.shape === 0) {
                    // Massive dome
                    ctx.beginPath();
                    ctx.ellipse(0, 0, s, s * 0.7, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                } else if (this.shape === 1) {
                    // Branching
                    for (let a = -2; a <= 2; a++) {
                        const angle = -Math.PI / 2 + a * 0.4;
                        const len = s * (0.8 + Math.abs(a) * 0.1);
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
                        ctx.lineWidth = 3 * this.health + 1;
                        ctx.stroke();
                        ctx.fillStyle = `hsla(${this.hue+20}, ${this.health * 50}%, ${lit+10}%, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(Math.cos(angle)*len, Math.sin(angle)*len, 3*this.health+1, 0, Math.PI*2);
                        ctx.fill();
                    }
                } else {
                    // Plate/encrusting
                    ctx.beginPath();
                    ctx.ellipse(0, 0, s * 1.2, s * 0.4, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }

                // Dissolution particles
                if (this.dissolved > 0.1) {
                    for (let i = 0; i < Math.floor(this.dissolved * 5); i++) {
                        const px = (Math.random() - 0.5) * s * 2;
                        const py = (Math.random() - 0.5) * s * 2 - Math.random() * 20;
                        ctx.fillStyle = `rgba(200,200,255,${this.dissolved * 0.3})`;
                        ctx.beginPath();
                        ctx.arc(px, py, 1 + Math.random(), 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                ctx.restore();
            }
        }

        let corals = [];
        let co2Bubbles = [];
        let graphData = [];

        function init() {
            corals = [];
            for (let i = 0; i < 40; i++) {
                corals.push(new CoralSkeleton(
                    50 + Math.random() * (W - 100),
                    H * 0.5 + Math.random() * (H * 0.4)
                ));
            }
            co2Bubbles = [];
            for (let i = 0; i < 40; i++) {
                co2Bubbles.push({
                    x: Math.random() * W, y: Math.random() * H,
                    r: 2 + Math.random() * 4, speed: 0.2 + Math.random() * 0.4,
                    phase: Math.random() * Math.PI * 2
                });
            }
            graphData = [];
        }
        init();

        const co2Slider = document.getElementById('co2Slider');

        function drawGraph() {
            const gw = 260, gh = 180;
            gctx.fillStyle = 'rgba(10,22,40,0.9)';
            gctx.fillRect(0, 0, gw, gh);

            gctx.font = '10px sans-serif';
            gctx.fillStyle = '#FEFAE0';
            gctx.fillText('Calcification Rate vs CO2', 50, 15);

            // Axes
            gctx.strokeStyle = 'rgba(138,154,91,0.5)';
            gctx.lineWidth = 1;
            gctx.beginPath();
            gctx.moveTo(40, 25); gctx.lineTo(40, 155);
            gctx.lineTo(245, 155);
            gctx.stroke();

            // Labels
            gctx.fillStyle = '#8A9A5B';
            gctx.font = '9px sans-serif';
            gctx.fillText('CO2 (ppm)', 120, 175);
            gctx.save();
            gctx.translate(12, 100);
            gctx.rotate(-Math.PI/2);
            gctx.fillText('Growth Rate', 0, 0);
            gctx.restore();

            // Plot curve
            gctx.strokeStyle = '#DDA15E';
            gctx.lineWidth = 2;
            gctx.beginPath();
            for (let co2 = 280; co2 <= 1000; co2 += 5) {
                const omega = co2ToOmega(co2);
                const rate = omega >= 3 ? (omega - 3) * 0.5 : omega >= 1 ? 0 : -(1 - omega) * 0.8;
                const px = 40 + (co2 - 280) / 720 * 200;
                const py = 90 - rate * 50;
                co2 === 280 ? gctx.moveTo(px, py) : gctx.lineTo(px, py);
            }
            gctx.stroke();

            // Zero line
            gctx.strokeStyle = 'rgba(255,100,100,0.3)';
            gctx.setLineDash([4,4]);
            gctx.beginPath();
            gctx.moveTo(40, 90); gctx.lineTo(245, 90);
            gctx.stroke();
            gctx.setLineDash([]);

            // Current position
            const co2 = parseFloat(co2Slider.value);
            const omega = co2ToOmega(co2);
            const rate = omega >= 3 ? (omega - 3) * 0.5 : omega >= 1 ? 0 : -(1 - omega) * 0.8;
            const cx = 40 + (co2 - 280) / 720 * 200;
            const cy = 90 - rate * 50;
            gctx.fillStyle = '#fff';
            gctx.beginPath();
            gctx.arc(cx, cy, 5, 0, Math.PI * 2);
            gctx.fill();

            gctx.fillStyle = '#888';
            gctx.font = '8px sans-serif';
            gctx.fillText('280', 35, 168);
            gctx.fillText('1000', 225, 168);
        }

        function animate(time) {
            const co2 = parseFloat(co2Slider.value);
            const pH = co2ToPH(co2);
            const omega = co2ToOmega(co2);

            document.getElementById('co2Disp').textContent = co2 + ' ppm';
            document.getElementById('phDisp').textContent = pH.toFixed(2);
            document.getElementById('omegaDisp').textContent = omega.toFixed(1);
            document.getElementById('phDisp').style.color = pH < 7.8 ? '#ff6644' : pH < 8.0 ? '#DDA15E' : '#8A9A5B';
            document.getElementById('omegaDisp').style.color = omega < 1 ? '#ff4444' : omega < 3 ? '#DDA15E' : '#8A9A5B';

            // Ocean color shifts with pH
            const acidShift = Math.max(0, (8.3 - pH) / 0.5);
            ctx.fillStyle = `rgb(${10 + acidShift * 15}, ${22 + acidShift * 5}, ${40 - acidShift * 10})`;
            ctx.fillRect(0, 0, W, H);

            // Surface
            ctx.fillStyle = `rgba(100,180,220,0.05)`;
            for (let x = 0; x < W; x += 3) {
                const sy = 5 + Math.sin(time * 0.001 + x * 0.02) * 3;
                ctx.fillRect(x, sy, 2, 2);
            }

            // CO2 absorption visual
            const co2Intensity = (co2 - 280) / 720;
            for (const b of co2Bubbles) {
                b.y += b.speed;
                b.x += Math.sin(time * 0.001 + b.phase) * 0.3;
                if (b.y > H + 10) { b.y = -10; b.x = Math.random() * W; }
                const alpha = co2Intensity * 0.3;
                ctx.fillStyle = `rgba(180,180,220,${alpha})`;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r * co2Intensity, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = `rgba(200,200,240,${alpha * 0.5})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }

            // Sandy bottom
            const sandGrad = ctx.createLinearGradient(0, H * 0.88, 0, H);
            sandGrad.addColorStop(0, 'rgba(160,140,100,0.15)');
            sandGrad.addColorStop(1, 'rgba(160,140,100,0.3)');
            ctx.fillStyle = sandGrad;
            ctx.fillRect(0, H * 0.88, W, H * 0.12);

            for (const c of corals) {
                c.update(omega);
                c.draw(ctx, time);
            }

            drawGraph();
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        document.getElementById('resetBtn').addEventListener('click', () => {
            co2Slider.value = 415;
            init();
        });

        window.reset = function() {
            co2Slider.value = 415;
            init();
        };
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
