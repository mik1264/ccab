<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morphing Icosahedron - TSL Demo</title>
    <link rel="icon" href="data:,">
    <meta name="theme-color" content="#FEFAE0">
    <meta name="description" content="Morphing Icosahedron - TSL Demo">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
        }
        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            max-width: 300px;
        }
        .info h1 {
            font-size: 18px;
            margin-bottom: 8px;
        }
            .ccab-back-link {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-family: sans-serif;
            font-size: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .ccab-back-link:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <a href="../index.html" class="ccab-back-link">← Gallery</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h1>Morphing Icosahedron</h1>
        <p>Icosahedron morphing between sharp and rounded forms with varying displacement.</p>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.170.0/build/three.webgpu.js",
            "three/tsl": "https://unpkg.com/three@0.170.0/build/three.webgpu.js",
            "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { positionLocal, normalLocal, time, sin, Fn } from 'three/tsl';

        const canvas = document.getElementById('canvas');

        async function init() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 3);

            const renderer = new THREE.WebGPURenderer({ canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            await renderer.init();

            const controls = new OrbitControls(camera, canvas);
            controls.enableDamping = true;

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);

            // Create icosahedron geometry
            const geometry = new THREE.IcosahedronGeometry(1, 4);

            // Create material with TSL
            const material = new THREE.MeshPhysicalNodeMaterial({
                color: 0x8b5cf6,
                metalness: 0.6,
                roughness: 0.2,
                flatShading: false,
            });

            // Morphing effect using TSL
            material.positionNode = Fn(() => {
                const pos = positionLocal;
                const norm = normalLocal;

                // Different displacement for different directions
                const displaceX = sin(time.mul(1.0).add(pos.x.mul(3.0))).mul(0.1);
                const displaceY = sin(time.mul(1.2).add(pos.y.mul(3.0))).mul(0.1);
                const displaceZ = sin(time.mul(0.8).add(pos.z.mul(3.0))).mul(0.1);

                const totalDisplace = displaceX.add(displaceY).add(displaceZ);

                return pos.add(norm.mul(totalDisplace));
            })();

            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                mesh.rotation.x += 0.003;
                mesh.rotation.y += 0.005;
                controls.update();
                renderer.render(scene, camera);
            }
            animate();

            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        init();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
