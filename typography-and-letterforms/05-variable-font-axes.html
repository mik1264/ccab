<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Font Axes | Typography & Letterforms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 14px 24px; border-radius: 12px; display: flex; gap: 18px;
            align-items: center; color: #FEFAE0; font-size: 0.82rem; z-index: 100;
            border: 1px solid rgba(138, 154, 91, 0.3); flex-wrap: wrap; justify-content: center;
            max-width: 700px;
        }
        #controls label { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        #controls input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        #controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        #controls button:hover { background: #8A9A5B; }
        #info {
            position: fixed; top: 50px; right: 20px; background: rgba(30, 30, 50, 0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.82rem; line-height: 1.6; max-width: 250px;
            border: 1px solid rgba(138, 154, 91, 0.3); z-index: 100;
        }
        #info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.95rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Variable Font Axes</h3>
        <p>Explore how variable font axes (weight, width, slant, contrast) transform letterforms through interpolation between master designs.</p>
    </div>
    <div id="controls">
        <label>Weight: <input type="range" id="weightSlider" min="0" max="1" step="0.01" value="0.3"> <span id="weightVal">0.30</span></label>
        <label>Width: <input type="range" id="widthSlider" min="0" max="1" step="0.01" value="0.5"> <span id="widthVal">0.50</span></label>
        <label>Slant: <input type="range" id="slantSlider" min="-0.3" max="0.3" step="0.01" value="0"> <span id="slantVal">0.00</span></label>
        <label>Contrast: <input type="range" id="contrastSlider" min="0" max="1" step="0.01" value="0.5"> <span id="contrastVal">0.50</span></label>
        <label><input type="checkbox" id="animToggle"> Animate</label>
        <button id="resetBtn">Reset</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        let weight = 0.3, width = 0.5, slant = 0, contrast = 0.5;
        let animating = false;
        let animTime = 0;

        // Define letterform strokes as parametric paths
        // Each letter defined as a set of strokes with "thin" and "thick" ends
        const letters = [
            { // H
                strokes: [
                    { type: 'vertical', x: 0.15, y1: 0.1, y2: 0.9 }, // left stem
                    { type: 'vertical', x: 0.45, y1: 0.1, y2: 0.9 }, // right stem
                    { type: 'horizontal', y: 0.5, x1: 0.15, x2: 0.45 }  // crossbar
                ]
            },
            { // a
                strokes: [
                    { type: 'bowl', cx: 0.65, cy: 0.6, rx: 0.12, ry: 0.25 },
                    { type: 'vertical', x: 0.77, y1: 0.35, y2: 0.9 }
                ]
            },
            { // m (extra wide)
                strokes: [
                    { type: 'vertical', x: 0.05, y1: 0.35, y2: 0.9 },
                    { type: 'arch', cx: 0.18, cy: 0.45, rx: 0.1, side: 'left' },
                    { type: 'vertical', x: 0.28, y1: 0.45, y2: 0.9 },
                    { type: 'arch', cx: 0.38, cy: 0.45, rx: 0.1, side: 'left' },
                    { type: 'vertical', x: 0.48, y1: 0.45, y2: 0.9 }
                ]
            }
        ];

        function drawStroke(sx, sy, ex, ey, startThick, endThick) {
            const dx = ex - sx, dy = ey - sy;
            const len = Math.hypot(dx, dy);
            if (len < 0.5) return;
            const nx = -dy / len, ny = dx / len;

            ctx.beginPath();
            ctx.moveTo(sx + nx * startThick / 2, sy + ny * startThick / 2);
            ctx.lineTo(ex + nx * endThick / 2, ey + ny * endThick / 2);
            ctx.lineTo(ex - nx * endThick / 2, ey - ny * endThick / 2);
            ctx.lineTo(sx - nx * startThick / 2, sy - ny * startThick / 2);
            ctx.closePath();
            ctx.fill();
        }

        function drawLetter(letter, ox, oy, scale) {
            const baseThick = (4 + weight * 24) * scale;
            const thinFactor = 1 - contrast * 0.7;
            const widthFactor = 0.6 + width * 0.8;

            ctx.save();
            // Apply slant as skew
            ctx.transform(1, 0, slant, 1, 0, 0);

            for (const stroke of letter.strokes) {
                if (stroke.type === 'vertical') {
                    const x = ox + stroke.x * scale * 300 * widthFactor;
                    const y1 = oy + stroke.y1 * scale * 300;
                    const y2 = oy + stroke.y2 * scale * 300;
                    drawStroke(x, y1, x, y2, baseThick, baseThick);
                    // Serifs
                    if (weight > 0.2) {
                        const serifW = baseThick * 1.2;
                        const serifH = baseThick * 0.3;
                        ctx.fillRect(x - serifW / 2, y1 - serifH / 2, serifW, serifH);
                        ctx.fillRect(x - serifW / 2, y2 - serifH / 2, serifW, serifH);
                    }
                } else if (stroke.type === 'horizontal') {
                    const x1 = ox + stroke.x1 * scale * 300 * widthFactor;
                    const x2 = ox + stroke.x2 * scale * 300 * widthFactor;
                    const y = oy + stroke.y * scale * 300;
                    drawStroke(x1, y, x2, y, baseThick * thinFactor, baseThick * thinFactor);
                } else if (stroke.type === 'bowl') {
                    const cx = ox + stroke.cx * scale * 300 * widthFactor;
                    const cy = oy + stroke.cy * scale * 300;
                    const rx = stroke.rx * scale * 300 * widthFactor;
                    const ry = stroke.ry * scale * 300;
                    const segments = 40;
                    for (let i = 0; i < segments; i++) {
                        const a1 = (i / segments) * Math.PI * 2;
                        const a2 = ((i + 1) / segments) * Math.PI * 2;
                        const x1 = cx + Math.cos(a1) * rx;
                        const y1 = cy + Math.sin(a1) * ry;
                        const x2 = cx + Math.cos(a2) * rx;
                        const y2 = cy + Math.sin(a2) * ry;
                        // Vary thickness around bowl - thick on sides, thin on top/bottom
                        const t1 = Math.abs(Math.sin(a1));
                        const t2 = Math.abs(Math.sin(a2));
                        const thick1 = baseThick * (thinFactor + (1 - thinFactor) * t1);
                        const thick2 = baseThick * (thinFactor + (1 - thinFactor) * t2);
                        drawStroke(x1, y1, x2, y2, thick1, thick2);
                    }
                } else if (stroke.type === 'arch') {
                    const cx = ox + stroke.cx * scale * 300 * widthFactor;
                    const cy = oy + stroke.cy * scale * 300;
                    const rx = stroke.rx * scale * 300 * widthFactor;
                    const ry = rx * 0.8;
                    const segments = 20;
                    for (let i = 0; i < segments; i++) {
                        const a1 = Math.PI + (i / segments) * Math.PI;
                        const a2 = Math.PI + ((i + 1) / segments) * Math.PI;
                        const x1 = cx + Math.cos(a1) * rx;
                        const y1 = cy + Math.sin(a1) * ry;
                        const x2 = cx + Math.cos(a2) * rx;
                        const y2 = cy + Math.sin(a2) * ry;
                        const t = Math.abs(Math.cos((a1 + a2) / 2));
                        const thick = baseThick * (thinFactor + (1 - thinFactor) * t);
                        drawStroke(x1, y1, x2, y2, thick, thick);
                    }
                }
            }
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            ctx.fillStyle = '#FEFAE0';

            const scale = Math.min(W / 900, H / 500) * 1.2;
            const totalW = 300 * scale * (0.6 + width * 0.8);
            const startX = (W - totalW * 1.5) / 2;
            const baseY = H * 0.15;

            drawLetter(letters[0], startX, baseY, scale);
            drawLetter(letters[1], startX + totalW * 0.55, baseY, scale);

            // Axes labels
            ctx.save();
            ctx.font = '13px "Segoe UI", sans-serif';
            ctx.fillStyle = 'rgba(138, 154, 91, 0.6)';
            ctx.textAlign = 'center';
            ctx.fillText(`wght: ${(100 + weight * 800).toFixed(0)}`, W / 2 - 120, H - 70);
            ctx.fillText(`wdth: ${(50 + width * 100).toFixed(0)}%`, W / 2 - 40, H - 70);
            ctx.fillText(`slnt: ${(slant * -30).toFixed(1)}deg`, W / 2 + 40, H - 70);
            ctx.fillText(`CONT: ${(contrast * 100).toFixed(0)}`, W / 2 + 120, H - 70);
            ctx.restore();
        }

        function animate() {
            if (animating) {
                animTime += 0.008;
                weight = 0.5 + 0.4 * Math.sin(animTime * 1.3);
                width = 0.5 + 0.3 * Math.sin(animTime * 0.7);
                slant = 0.15 * Math.sin(animTime * 0.5);
                contrast = 0.5 + 0.4 * Math.sin(animTime * 1.1);

                document.getElementById('weightSlider').value = weight;
                document.getElementById('weightVal').textContent = weight.toFixed(2);
                document.getElementById('widthSlider').value = width;
                document.getElementById('widthVal').textContent = width.toFixed(2);
                document.getElementById('slantSlider').value = slant;
                document.getElementById('slantVal').textContent = slant.toFixed(2);
                document.getElementById('contrastSlider').value = contrast;
                document.getElementById('contrastVal').textContent = contrast.toFixed(2);
            }
            draw();
            requestAnimationFrame(animate);
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        document.getElementById('weightSlider').addEventListener('input', e => {
            weight = parseFloat(e.target.value);
            document.getElementById('weightVal').textContent = weight.toFixed(2);
        });
        document.getElementById('widthSlider').addEventListener('input', e => {
            width = parseFloat(e.target.value);
            document.getElementById('widthVal').textContent = width.toFixed(2);
        });
        document.getElementById('slantSlider').addEventListener('input', e => {
            slant = parseFloat(e.target.value);
            document.getElementById('slantVal').textContent = slant.toFixed(2);
        });
        document.getElementById('contrastSlider').addEventListener('input', e => {
            contrast = parseFloat(e.target.value);
            document.getElementById('contrastVal').textContent = contrast.toFixed(2);
        });
        document.getElementById('animToggle').addEventListener('change', e => {
            animating = e.target.checked;
        });
        document.getElementById('resetBtn').addEventListener('click', () => {
            weight = 0.3; width = 0.5; slant = 0; contrast = 0.5; animating = false; animTime = 0;
            document.getElementById('weightSlider').value = 0.3;
            document.getElementById('weightVal').textContent = '0.30';
            document.getElementById('widthSlider').value = 0.5;
            document.getElementById('widthVal').textContent = '0.50';
            document.getElementById('slantSlider').value = 0;
            document.getElementById('slantVal').textContent = '0.00';
            document.getElementById('contrastSlider').value = 0.5;
            document.getElementById('contrastVal').textContent = '0.50';
            document.getElementById('animToggle').checked = false;
        });

        window.reset = function() {
            document.getElementById('resetBtn').click();
        };

        window.addEventListener('resize', resize);
        resize();
        animate();
    })();
    </script>
</body>
</html>
