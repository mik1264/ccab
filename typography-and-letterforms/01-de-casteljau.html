<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Casteljau's Algorithm | Typography & Letterforms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 12px 24px; border-radius: 12px; display: flex; gap: 18px;
            align-items: center; color: #FEFAE0; font-size: 0.85rem; z-index: 100;
            border: 1px solid rgba(138, 154, 91, 0.3);
        }
        #controls label { display: flex; align-items: center; gap: 6px; }
        #controls input[type="range"] { width: 120px; accent-color: #8A9A5B; }
        #controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        #controls button:hover { background: #8A9A5B; }
        #info {
            position: fixed; top: 50px; right: 20px; background: rgba(30, 30, 50, 0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.82rem; line-height: 1.6; max-width: 260px;
            border: 1px solid rgba(138, 154, 91, 0.3); z-index: 100;
        }
        #info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.95rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>De Casteljau's Algorithm</h3>
        <p>Drag the 4 control points to reshape the cubic Bezier curve. The algorithm recursively subdivides line segments at parameter t to find points on the curve.</p>
    </div>
    <div id="controls">
        <label>t: <input type="range" id="tSlider" min="0" max="1" step="0.005" value="0.5"> <span id="tVal">0.50</span></label>
        <label><input type="checkbox" id="animToggle" checked> Animate t</label>
        <label>Order: <select id="orderSelect" style="background:#2a2a4a;color:#FEFAE0;border:1px solid #8A9A5B;border-radius:4px;padding:2px 4px;">
            <option value="3">Cubic</option>
            <option value="2">Quadratic</option>
            <option value="4">Quartic</option>
            <option value="5">Quintic</option>
        </select></label>
        <button id="resetBtn">Reset</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const tSlider = document.getElementById('tSlider');
        const tVal = document.getElementById('tVal');
        const animToggle = document.getElementById('animToggle');
        const orderSelect = document.getElementById('orderSelect');
        const resetBtn = document.getElementById('resetBtn');

        let W, H;
        let controlPoints = [];
        let dragging = -1;
        let t = 0.5;
        let animT = 0;
        let animDir = 1;
        let trailPoints = [];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            if (controlPoints.length === 0) initPoints();
        }

        function initPoints() {
            const order = parseInt(orderSelect.value);
            const n = order + 1;
            controlPoints = [];
            const cx = W / 2, cy = H / 2;
            const spread = Math.min(W, H) * 0.35;
            for (let i = 0; i < n; i++) {
                const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
                controlPoints.push({
                    x: cx + Math.cos(angle) * spread,
                    y: cy + Math.sin(angle) * spread * 0.7
                });
            }
            trailPoints = [];
        }

        function deCasteljau(points, t) {
            const levels = [points.map(p => ({x: p.x, y: p.y}))];
            let current = levels[0];
            while (current.length > 1) {
                const next = [];
                for (let i = 0; i < current.length - 1; i++) {
                    next.push({
                        x: (1 - t) * current[i].x + t * current[i + 1].x,
                        y: (1 - t) * current[i].y + t * current[i + 1].y
                    });
                }
                levels.push(next);
                current = next;
            }
            return levels;
        }

        const levelColors = [
            '#8A9A5B', '#DDA15E', '#BC6C25', '#6B8E23', '#CD853F', '#A0522D'
        ];

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Draw full curve
            ctx.beginPath();
            const steps = 200;
            for (let i = 0; i <= steps; i++) {
                const tt = i / steps;
                const lvls = deCasteljau(controlPoints, tt);
                const pt = lvls[lvls.length - 1][0];
                if (i === 0) ctx.moveTo(pt.x, pt.y);
                else ctx.lineTo(pt.x, pt.y);
            }
            ctx.strokeStyle = 'rgba(254, 250, 224, 0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw construction lines at current t
            const levels = deCasteljau(controlPoints, t);

            for (let lv = 0; lv < levels.length; lv++) {
                const pts = levels[lv];
                const color = levelColors[lv % levelColors.length];

                // Lines
                if (pts.length > 1) {
                    ctx.beginPath();
                    for (let i = 0; i < pts.length; i++) {
                        if (i === 0) ctx.moveTo(pts[i].x, pts[i].y);
                        else ctx.lineTo(pts[i].x, pts[i].y);
                    }
                    ctx.strokeStyle = lv === 0 ? 'rgba(138, 154, 91, 0.4)' : color;
                    ctx.lineWidth = lv === 0 ? 1.5 : 1;
                    ctx.setLineDash(lv > 0 ? [5, 5] : []);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // Points
                for (let i = 0; i < pts.length; i++) {
                    ctx.beginPath();
                    const r = lv === 0 ? 8 : Math.max(3, 7 - lv);
                    ctx.arc(pts[i].x, pts[i].y, r, 0, Math.PI * 2);
                    ctx.fillStyle = lv === 0 ? '#8A9A5B' : color;
                    ctx.fill();
                    if (lv === 0) {
                        ctx.strokeStyle = '#FEFAE0';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }
            }

            // Point on curve
            const curvePoint = levels[levels.length - 1][0];
            trailPoints.push({x: curvePoint.x, y: curvePoint.y, age: 0});
            if (trailPoints.length > 80) trailPoints.shift();

            // Draw trail
            for (let i = 0; i < trailPoints.length; i++) {
                const tp = trailPoints[i];
                tp.age++;
                const alpha = 1 - tp.age / 80;
                if (alpha > 0) {
                    ctx.beginPath();
                    ctx.arc(tp.x, tp.y, 3 * alpha, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(221, 161, 94, ${alpha})`;
                    ctx.fill();
                }
            }

            // Highlight curve point
            ctx.beginPath();
            ctx.arc(curvePoint.x, curvePoint.y, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Labels for control points
            ctx.font = '12px "Segoe UI", sans-serif';
            ctx.fillStyle = '#FEFAE0';
            ctx.textAlign = 'center';
            for (let i = 0; i < controlPoints.length; i++) {
                ctx.fillText(`P${i}`, controlPoints[i].x, controlPoints[i].y - 14);
            }
        }

        function animate() {
            if (animToggle.checked) {
                animT += 0.004 * animDir;
                if (animT >= 1) { animT = 1; animDir = -1; }
                if (animT <= 0) { animT = 0; animDir = 1; }
                t = animT;
                tSlider.value = t;
                tVal.textContent = t.toFixed(2);
            }
            draw();
            requestAnimationFrame(animate);
        }

        // Interaction
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function onDown(e) {
            const pos = getMousePos(e);
            for (let i = 0; i < controlPoints.length; i++) {
                const dx = pos.x - controlPoints[i].x;
                const dy = pos.y - controlPoints[i].y;
                if (dx * dx + dy * dy < 400) {
                    dragging = i;
                    e.preventDefault();
                    return;
                }
            }
        }

        function onMove(e) {
            if (dragging >= 0) {
                const pos = getMousePos(e);
                controlPoints[dragging].x = pos.x;
                controlPoints[dragging].y = pos.y;
                trailPoints = [];
                e.preventDefault();
            }
        }

        function onUp() { dragging = -1; }

        canvas.addEventListener('mousedown', onDown);
        canvas.addEventListener('mousemove', onMove);
        canvas.addEventListener('mouseup', onUp);
        canvas.addEventListener('touchstart', onDown, { passive: false });
        canvas.addEventListener('touchmove', onMove, { passive: false });
        canvas.addEventListener('touchend', onUp);

        tSlider.addEventListener('input', () => {
            t = parseFloat(tSlider.value);
            animT = t;
            tVal.textContent = t.toFixed(2);
            trailPoints = [];
        });

        orderSelect.addEventListener('change', () => {
            initPoints();
        });

        resetBtn.addEventListener('click', () => {
            initPoints();
            t = 0.5;
            animT = 0;
            animDir = 1;
            tSlider.value = 0.5;
            tVal.textContent = '0.50';
        });

        window.reset = function() {
            initPoints();
            t = 0.5;
            animT = 0;
            animDir = 1;
            tSlider.value = 0.5;
            tVal.textContent = '0.50';
            trailPoints = [];
        };

        window.addEventListener('resize', resize);
        resize();
        animate();
    })();
    </script>
</body>
</html>
