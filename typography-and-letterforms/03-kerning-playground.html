<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerning Playground | Typography & Letterforms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 12px 24px; border-radius: 12px; display: flex; gap: 16px;
            align-items: center; color: #FEFAE0; font-size: 0.82rem; z-index: 100;
            border: 1px solid rgba(138, 154, 91, 0.3); flex-wrap: wrap; justify-content: center;
        }
        #controls label { display: flex; align-items: center; gap: 5px; }
        #controls input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        #controls input[type="text"] {
            background: #2a2a4a; color: #FEFAE0; border: 1px solid #8A9A5B;
            border-radius: 6px; padding: 4px 8px; width: 180px; font-size: 0.85rem;
        }
        #controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        #controls button:hover { background: #8A9A5B; }
        .kern-indicator {
            position: fixed; top: 50px; right: 20px; background: rgba(30, 30, 50, 0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.82rem; line-height: 1.6; max-width: 260px;
            border: 1px solid rgba(138, 154, 91, 0.3); z-index: 100;
        }
        .kern-indicator h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.95rem; }
        .kern-pair { color: #8A9A5B; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="kern-indicator">
        <h3>Kerning Playground</h3>
        <p>Click between letters to select a pair, then adjust kerning with the slider or arrow keys. See how spacing affects readability.</p>
        <p style="margin-top:8px;">Selected: <span id="pairDisplay" class="kern-pair">--</span></p>
        <p>Kern value: <span id="kernDisplay">0</span>px</p>
    </div>
    <div id="controls">
        <label>Text: <input type="text" id="textInput" value="AVATAR WAV"></label>
        <label>Size: <input type="range" id="sizeSlider" min="40" max="200" value="100"> <span id="sizeVal">100</span></label>
        <label>Kern: <input type="range" id="kernSlider" min="-30" max="30" value="0" step="1"> <span id="kernVal">0</span></label>
        <label>Tracking: <input type="range" id="trackSlider" min="-10" max="20" value="0"> <span id="trackVal">0</span></label>
        <label><input type="checkbox" id="metricsToggle" checked> Metrics</label>
        <button id="autoKernBtn">Auto-kern</button>
        <button id="resetBtn">Reset</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        let text = 'AVATAR WAV';
        let fontSize = 100;
        let tracking = 0;
        let selectedPair = -1;
        let kernValues = {};
        let letterPositions = [];

        // Common kern pairs that benefit from tighter spacing
        const autoKernPairs = {
            'AV': -6, 'VA': -6, 'AW': -4, 'WA': -4, 'AT': -5, 'TA': -5,
            'AY': -5, 'YA': -5, 'AO': -2, 'OA': -2, 'AC': -2, 'LT': -5,
            'LV': -4, 'LW': -3, 'LY': -4, 'PA': -3, 'To': -4, 'Tr': -2,
            'Te': -3, 'Ta': -3, 'Tu': -2, 'Ty': -3, 'Wa': -3, 'We': -2,
            'Wo': -2, 'Ya': -4, 'Ye': -3, 'Yo': -3, 'FA': -3, 'FO': -1,
            'RV': -2, 'RW': -2, 'RY': -2, 'OT': -1, 'OV': -1, 'OW': -1,
            'OY': -1, 'DV': -1, 'DW': -1, 'DY': -1
        };

        function getKernKey(i) {
            return text[i] + text[i + 1];
        }

        function getKernValue(i) {
            if (i < 0 || i >= text.length - 1) return 0;
            const key = getKernKey(i);
            if (kernValues[key] !== undefined) return kernValues[key];
            return 0;
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            ctx.font = `${fontSize}px Georgia, serif`;
            ctx.textBaseline = 'middle';

            // Calculate total width
            let totalWidth = 0;
            const charWidths = [];
            for (let i = 0; i < text.length; i++) {
                const w = ctx.measureText(text[i]).width;
                charWidths.push(w);
                totalWidth += w + tracking;
                if (i < text.length - 1) totalWidth += getKernValue(i);
            }

            let x = (W - totalWidth) / 2;
            const y = H / 2;
            letterPositions = [];

            const showMetrics = document.getElementById('metricsToggle').checked;

            // Draw baseline and metrics
            if (showMetrics) {
                const metrics = ctx.measureText('H');
                const ascent = metrics.actualBoundingBoxAscent || fontSize * 0.75;
                const descent = metrics.actualBoundingBoxDescent || fontSize * 0.25;

                ctx.strokeStyle = 'rgba(138, 154, 91, 0.3)';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);

                // Baseline
                ctx.beginPath();
                ctx.moveTo(x - 20, y);
                ctx.lineTo(x + totalWidth + 20, y);
                ctx.stroke();

                // Ascender
                ctx.strokeStyle = 'rgba(221, 161, 94, 0.3)';
                ctx.beginPath();
                ctx.moveTo(x - 20, y - ascent);
                ctx.lineTo(x + totalWidth + 20, y - ascent);
                ctx.stroke();

                // Descender
                ctx.beginPath();
                ctx.moveTo(x - 20, y + descent);
                ctx.lineTo(x + totalWidth + 20, y + descent);
                ctx.stroke();

                ctx.setLineDash([]);

                // Labels
                ctx.font = '11px "Segoe UI", sans-serif';
                ctx.fillStyle = 'rgba(138, 154, 91, 0.6)';
                ctx.textAlign = 'left';
                ctx.fillText('baseline', x - 60, y + 4);
                ctx.fillStyle = 'rgba(221, 161, 94, 0.6)';
                ctx.fillText('ascender', x - 60, y - ascent + 4);
                ctx.fillText('descender', x - 60, y + descent + 4);

                ctx.font = `${fontSize}px Georgia, serif`;
                ctx.textBaseline = 'middle';
            }

            // Draw letters
            for (let i = 0; i < text.length; i++) {
                const startX = x;

                // Highlight selected pair gap
                if (i === selectedPair || i === selectedPair + 1) {
                    ctx.fillStyle = 'rgba(138, 154, 91, 0.1)';
                    ctx.fillRect(startX - 2, y - fontSize * 0.6, charWidths[i] + 4, fontSize * 1.2);
                }

                ctx.textAlign = 'left';
                ctx.fillStyle = i === selectedPair || i === selectedPair + 1 ? '#DDA15E' : '#FEFAE0';
                ctx.fillText(text[i], x, y);

                letterPositions.push({ x: startX, w: charWidths[i], char: text[i] });
                x += charWidths[i] + tracking;

                // Draw kern gap indicator
                if (showMetrics && i < text.length - 1) {
                    const kern = getKernValue(i);
                    if (kern !== 0) {
                        const gapX = x;
                        ctx.fillStyle = kern < 0 ? 'rgba(188, 108, 37, 0.4)' : 'rgba(138, 154, 91, 0.4)';
                        ctx.fillRect(gapX + Math.min(0, kern), y - fontSize * 0.3, Math.abs(kern), fontSize * 0.6);
                    }
                    x += kern;
                }
            }

            // Draw pair selection indicator
            if (selectedPair >= 0 && selectedPair < text.length - 1) {
                const lp = letterPositions[selectedPair];
                const rp = letterPositions[selectedPair + 1];
                if (lp && rp) {
                    const gapCenter = lp.x + lp.w + (rp.x - lp.x - lp.w) / 2;
                    ctx.beginPath();
                    ctx.moveTo(gapCenter, y + fontSize * 0.5);
                    ctx.lineTo(gapCenter - 8, y + fontSize * 0.65);
                    ctx.lineTo(gapCenter + 8, y + fontSize * 0.65);
                    ctx.closePath();
                    ctx.fillStyle = '#DDA15E';
                    ctx.fill();
                }
            }
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            draw();
        }

        canvas.addEventListener('click', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            for (let i = 0; i < letterPositions.length - 1; i++) {
                const lp = letterPositions[i];
                const rp = letterPositions[i + 1];
                const gapStart = lp.x + lp.w;
                const gapEnd = rp.x;
                if (mx >= gapStart - 10 && mx <= gapEnd + 10) {
                    selectedPair = i;
                    const key = getKernKey(i);
                    const val = kernValues[key] || 0;
                    document.getElementById('kernSlider').value = val;
                    document.getElementById('kernVal').textContent = val;
                    document.getElementById('pairDisplay').textContent = key;
                    document.getElementById('kernDisplay').textContent = val;
                    draw();
                    return;
                }
            }
        });

        document.getElementById('textInput').addEventListener('input', e => {
            text = e.target.value || ' ';
            selectedPair = -1;
            document.getElementById('pairDisplay').textContent = '--';
            draw();
        });

        document.getElementById('sizeSlider').addEventListener('input', e => {
            fontSize = parseInt(e.target.value);
            document.getElementById('sizeVal').textContent = fontSize;
            draw();
        });

        document.getElementById('kernSlider').addEventListener('input', e => {
            if (selectedPair >= 0 && selectedPair < text.length - 1) {
                const val = parseInt(e.target.value);
                const key = getKernKey(selectedPair);
                kernValues[key] = val;
                document.getElementById('kernVal').textContent = val;
                document.getElementById('kernDisplay').textContent = val;
                draw();
            }
        });

        document.getElementById('trackSlider').addEventListener('input', e => {
            tracking = parseInt(e.target.value);
            document.getElementById('trackVal').textContent = tracking;
            draw();
        });

        document.getElementById('autoKernBtn').addEventListener('click', () => {
            kernValues = {};
            for (let i = 0; i < text.length - 1; i++) {
                const key = getKernKey(i);
                if (autoKernPairs[key]) {
                    kernValues[key] = autoKernPairs[key];
                }
            }
            if (selectedPair >= 0) {
                const key = getKernKey(selectedPair);
                const val = kernValues[key] || 0;
                document.getElementById('kernSlider').value = val;
                document.getElementById('kernVal').textContent = val;
                document.getElementById('kernDisplay').textContent = val;
            }
            draw();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            text = 'AVATAR WAV';
            fontSize = 100; tracking = 0; selectedPair = -1;
            kernValues = {};
            document.getElementById('textInput').value = text;
            document.getElementById('sizeSlider').value = 100;
            document.getElementById('sizeVal').textContent = '100';
            document.getElementById('kernSlider').value = 0;
            document.getElementById('kernVal').textContent = '0';
            document.getElementById('trackSlider').value = 0;
            document.getElementById('trackVal').textContent = '0';
            document.getElementById('pairDisplay').textContent = '--';
            document.getElementById('kernDisplay').textContent = '0';
            draw();
        });

        document.addEventListener('keydown', e => {
            if (selectedPair >= 0 && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
                e.preventDefault();
                const key = getKernKey(selectedPair);
                const delta = e.key === 'ArrowLeft' ? -1 : 1;
                kernValues[key] = (kernValues[key] || 0) + delta;
                const val = kernValues[key];
                document.getElementById('kernSlider').value = Math.max(-30, Math.min(30, val));
                document.getElementById('kernVal').textContent = val;
                document.getElementById('kernDisplay').textContent = val;
                draw();
            }
        });

        window.reset = function() {
            document.getElementById('resetBtn').click();
        };

        window.addEventListener('resize', resize);
        resize();

        // rAF loop
        function loop() { requestAnimationFrame(loop); }
        loop();
    })();
    </script>
</body>
</html>
