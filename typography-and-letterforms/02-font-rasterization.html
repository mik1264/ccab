<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Rasterization | Typography & Letterforms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 12px 24px; border-radius: 12px; display: flex; gap: 16px;
            align-items: center; color: #FEFAE0; font-size: 0.82rem; z-index: 100;
            border: 1px solid rgba(138, 154, 91, 0.3); flex-wrap: wrap; justify-content: center;
        }
        #controls label { display: flex; align-items: center; gap: 5px; }
        #controls input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        #controls select, #controls button {
            background: #2a2a4a; color: #FEFAE0; border: 1px solid #8A9A5B;
            border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 0.8rem;
        }
        #controls button { background: #606C38; border: none; padding: 6px 14px; }
        #controls button:hover { background: #8A9A5B; }
        #info {
            position: fixed; top: 50px; right: 20px; background: rgba(30, 30, 50, 0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.82rem; line-height: 1.6; max-width: 250px;
            border: 1px solid rgba(138, 154, 91, 0.3); z-index: 100;
        }
        #info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.95rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Font Rasterization</h3>
        <p>Watch how vector glyph outlines get converted to pixels on a grid. Toggle anti-aliasing and hinting to see their effects. Change the grid size to see different "font sizes."</p>
    </div>
    <div id="controls">
        <label>Glyph: <select id="glyphSelect">
            <option value="A">A</option><option value="B">B</option><option value="R">R</option>
            <option value="g">g</option><option value="e">e</option><option value="S">S</option>
        </select></label>
        <label>Grid: <input type="range" id="gridSlider" min="8" max="64" value="20"> <span id="gridVal">20</span></label>
        <label><input type="checkbox" id="aaToggle" checked> Anti-alias</label>
        <label><input type="checkbox" id="hintToggle"> Hinting</label>
        <label><input type="checkbox" id="outlineToggle" checked> Show outline</label>
        <button id="resetBtn">Reset</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        // Glyph definitions as simplified outlines (normalized 0-1)
        const glyphs = {
            'A': {
                outer: [[0.5, 0.05], [0.85, 0.95], [0.7, 0.95], [0.6, 0.65], [0.4, 0.65], [0.3, 0.95], [0.15, 0.95]],
                holes: [[[0.5, 0.25], [0.57, 0.55], [0.43, 0.55]]]
            },
            'B': {
                outer: [[0.2, 0.05], [0.6, 0.05], [0.75, 0.12], [0.78, 0.25], [0.75, 0.38], [0.65, 0.45],
                        [0.78, 0.52], [0.82, 0.65], [0.78, 0.82], [0.65, 0.95], [0.2, 0.95]],
                holes: [
                    [[0.35, 0.18], [0.58, 0.18], [0.63, 0.25], [0.58, 0.38], [0.35, 0.38]],
                    [[0.35, 0.52], [0.62, 0.52], [0.67, 0.65], [0.62, 0.82], [0.35, 0.82]]
                ]
            },
            'R': {
                outer: [[0.2, 0.05], [0.65, 0.05], [0.8, 0.15], [0.82, 0.3], [0.75, 0.45], [0.6, 0.5],
                        [0.8, 0.95], [0.62, 0.95], [0.45, 0.55], [0.35, 0.55], [0.35, 0.95], [0.2, 0.95]],
                holes: [[[0.35, 0.18], [0.6, 0.18], [0.67, 0.28], [0.6, 0.42], [0.35, 0.42]]]
            },
            'g': {
                outer: [[0.7, 0.3], [0.7, 0.95], [0.65, 1.05], [0.5, 1.12], [0.3, 1.08], [0.25, 1.0],
                        [0.35, 0.92], [0.5, 0.95], [0.57, 0.92], [0.57, 0.72],
                        [0.4, 0.75], [0.22, 0.65], [0.18, 0.5], [0.22, 0.38], [0.38, 0.28], [0.55, 0.3]],
                holes: [[[0.57, 0.42], [0.57, 0.6], [0.45, 0.65], [0.33, 0.58], [0.33, 0.45], [0.42, 0.38]]]
            },
            'e': {
                outer: [[0.55, 0.55], [0.2, 0.55], [0.2, 0.48], [0.25, 0.35], [0.4, 0.28], [0.6, 0.32],
                        [0.7, 0.45], [0.7, 0.58], [0.65, 0.72], [0.5, 0.78], [0.3, 0.75], [0.2, 0.65],
                        [0.2, 0.58]],
                holes: [[[0.35, 0.42], [0.55, 0.42], [0.55, 0.5], [0.35, 0.5]]]
            },
            'S': {
                outer: [[0.7, 0.2], [0.65, 0.1], [0.5, 0.05], [0.35, 0.08], [0.22, 0.18], [0.2, 0.32],
                        [0.28, 0.42], [0.45, 0.48], [0.65, 0.55], [0.78, 0.65], [0.8, 0.78], [0.72, 0.9],
                        [0.55, 0.95], [0.35, 0.92], [0.22, 0.82], [0.3, 0.82], [0.42, 0.88], [0.55, 0.88],
                        [0.65, 0.82], [0.65, 0.72], [0.55, 0.62], [0.38, 0.55], [0.22, 0.48], [0.15, 0.35],
                        [0.18, 0.18], [0.3, 0.08], [0.5, 0.05], [0.65, 0.1], [0.7, 0.2]],
                holes: []
            }
        };

        let currentGlyph = 'A';
        let gridSize = 20;
        let antiAlias = true;
        let hinting = false;
        let showOutline = true;

        function pointInPolygon(x, y, poly) {
            let inside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                const xi = poly[i][0], yi = poly[i][1];
                const xj = poly[j][0], yj = poly[j][1];
                if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
                    inside = !inside;
                }
            }
            return inside;
        }

        function sampleCoverage(cx, cy, cellW, cellH, glyph, samples) {
            let covered = 0;
            for (let sy = 0; sy < samples; sy++) {
                for (let sx = 0; sx < samples; sx++) {
                    const px = cx + (sx + 0.5) / samples * cellW;
                    const py = cy + (sy + 0.5) / samples * cellH;
                    let inOuter = pointInPolygon(px, py, glyph.outer);
                    if (inOuter) {
                        let inHole = false;
                        for (const hole of glyph.holes) {
                            if (pointInPolygon(px, py, hole)) { inHole = true; break; }
                        }
                        if (!inHole) covered++;
                    }
                }
            }
            return covered / (samples * samples);
        }

        function hintValue(v, cellSize) {
            if (!hinting) return v;
            return Math.round(v / cellSize) * cellSize;
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const glyph = glyphs[currentGlyph];
            const margin = 60;
            const gridArea = Math.min(W - margin * 2, H - margin * 2);
            const cellW = gridArea / gridSize;
            const cellH = gridArea / gridSize;
            const ox = (W - gridArea) / 2;
            const oy = (H - gridArea) / 2;

            // Scale glyph to grid
            const scaledOuter = glyph.outer.map(p => [
                hintValue(p[0] * gridArea + ox, cellW),
                hintValue(p[1] * gridArea + oy, cellH)
            ]);
            const scaledHoles = glyph.holes.map(hole =>
                hole.map(p => [
                    hintValue(p[0] * gridArea + ox, cellW),
                    hintValue(p[1] * gridArea + oy, cellH)
                ])
            );
            const scaledGlyph = { outer: scaledOuter, holes: scaledHoles };

            // Draw grid
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.15)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= gridSize; i++) {
                ctx.beginPath();
                ctx.moveTo(ox + i * cellW, oy);
                ctx.lineTo(ox + i * cellW, oy + gridArea);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(ox, oy + i * cellH);
                ctx.lineTo(ox + gridArea, oy + i * cellH);
                ctx.stroke();
            }

            // Rasterize
            for (let gy = 0; gy < gridSize; gy++) {
                for (let gx = 0; gx < gridSize; gx++) {
                    const cx = ox + gx * cellW;
                    const cy = oy + gy * cellH;

                    let coverage;
                    if (antiAlias) {
                        coverage = sampleCoverage(cx, cy, cellW, cellH, scaledGlyph, 4);
                    } else {
                        const px = cx + cellW / 2;
                        const py = cy + cellH / 2;
                        let inOuter = pointInPolygon(px, py, scaledGlyph.outer);
                        let inHole = false;
                        if (inOuter) {
                            for (const hole of scaledGlyph.holes) {
                                if (pointInPolygon(px, py, hole)) { inHole = true; break; }
                            }
                        }
                        coverage = (inOuter && !inHole) ? 1 : 0;
                    }

                    if (coverage > 0) {
                        const alpha = coverage;
                        ctx.fillStyle = `rgba(254, 250, 224, ${alpha})`;
                        ctx.fillRect(cx + 0.5, cy + 0.5, cellW - 1, cellH - 1);
                    }
                }
            }

            // Draw outline
            if (showOutline) {
                ctx.beginPath();
                for (let i = 0; i < scaledOuter.length; i++) {
                    if (i === 0) ctx.moveTo(scaledOuter[i][0], scaledOuter[i][1]);
                    else ctx.lineTo(scaledOuter[i][0], scaledOuter[i][1]);
                }
                ctx.closePath();
                ctx.strokeStyle = '#DDA15E';
                ctx.lineWidth = 2;
                ctx.stroke();

                for (const hole of scaledHoles) {
                    ctx.beginPath();
                    for (let i = 0; i < hole.length; i++) {
                        if (i === 0) ctx.moveTo(hole[i][0], hole[i][1]);
                        else ctx.lineTo(hole[i][0], hole[i][1]);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = '#BC6C25';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            }
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            draw();
        }

        document.getElementById('glyphSelect').addEventListener('change', e => { currentGlyph = e.target.value; draw(); });
        document.getElementById('gridSlider').addEventListener('input', e => {
            gridSize = parseInt(e.target.value);
            document.getElementById('gridVal').textContent = gridSize;
            draw();
        });
        document.getElementById('aaToggle').addEventListener('change', e => { antiAlias = e.target.checked; draw(); });
        document.getElementById('hintToggle').addEventListener('change', e => { hinting = e.target.checked; draw(); });
        document.getElementById('outlineToggle').addEventListener('change', e => { showOutline = e.target.checked; draw(); });
        document.getElementById('resetBtn').addEventListener('click', () => {
            currentGlyph = 'A';
            gridSize = 20; antiAlias = true; hinting = false; showOutline = true;
            document.getElementById('glyphSelect').value = 'A';
            document.getElementById('gridSlider').value = 20;
            document.getElementById('gridVal').textContent = '20';
            document.getElementById('aaToggle').checked = true;
            document.getElementById('hintToggle').checked = false;
            document.getElementById('outlineToggle').checked = true;
            draw();
        });

        window.reset = function() {
            document.getElementById('resetBtn').click();
        };

        window.addEventListener('resize', resize);
        resize();

        // rAF loop
        function loop() { requestAnimationFrame(loop); }
        loop();
    })();
    </script>
</body>
</html>
