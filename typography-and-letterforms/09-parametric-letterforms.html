<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametric Letterforms | Typography & Letterforms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 14px 24px; border-radius: 12px; display: flex; gap: 14px;
            align-items: center; color: #FEFAE0; font-size: 0.82rem; z-index: 100;
            border: 1px solid rgba(138, 154, 91, 0.3); flex-wrap: wrap; justify-content: center;
            max-width: 750px;
        }
        #controls label { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
        #controls input[type="range"] { width: 80px; accent-color: #8A9A5B; }
        #controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        #controls button:hover { background: #8A9A5B; }
        #info {
            position: fixed; top: 50px; right: 20px; background: rgba(30, 30, 50, 0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.82rem; line-height: 1.6; max-width: 250px;
            border: 1px solid rgba(138, 154, 91, 0.3); z-index: 100;
        }
        #info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.95rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Parametric Letterforms</h3>
        <p>Inspired by Knuth's Metafont, letters are defined by parameters: stem width, serif length, bowl roundness, x-height, and more. Adjust sliders to explore the design space.</p>
    </div>
    <div id="controls">
        <label>Stem: <input type="range" id="stemSlider" min="2" max="30" value="10"> <span id="stemVal">10</span></label>
        <label>Serif: <input type="range" id="serifSlider" min="0" max="20" value="8"> <span id="serifVal">8</span></label>
        <label>Bowl: <input type="range" id="bowlSlider" min="0" max="1" step="0.01" value="0.7"> <span id="bowlVal">0.70</span></label>
        <label>X-height: <input type="range" id="xhSlider" min="0.3" max="0.8" step="0.01" value="0.55"> <span id="xhVal">0.55</span></label>
        <label>Contrast: <input type="range" id="contSlider" min="0" max="1" step="0.01" value="0.5"> <span id="contVal">0.50</span></label>
        <label>Slant: <input type="range" id="slantSlider" min="0" max="15" value="0"> <span id="slantVal">0</span>&deg;</label>
        <label><input type="checkbox" id="animToggle"> Animate</label>
        <button id="resetBtn">Reset</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        let params = {
            stem: 10,
            serif: 8,
            bowl: 0.7,
            xHeight: 0.55,
            contrast: 0.5,
            slant: 0
        };
        let animating = false;
        let animTime = 0;

        function thinStroke() {
            return Math.max(2, params.stem * (1 - params.contrast * 0.7));
        }

        function drawParametricH(x, y, scale) {
            const s = params.stem * scale;
            const thin = thinStroke() * scale;
            const h = 200 * scale;
            const w = 120 * scale;
            const serifL = params.serif * scale;
            const serifH = Math.max(2, serifL * 0.35);
            const crossY = y + h * (1 - params.xHeight);

            ctx.save();
            const slantRad = params.slant * Math.PI / 180;
            ctx.transform(1, 0, -Math.tan(slantRad), 1, 0, 0);

            // Left stem
            ctx.fillRect(x, y, s, h);
            // Right stem
            ctx.fillRect(x + w, y, s, h);
            // Crossbar
            ctx.fillRect(x, crossY - thin / 2, w + s, thin);

            // Serifs
            if (params.serif > 0) {
                // Top serifs
                ctx.fillRect(x - serifL, y, s + serifL * 2, serifH);
                ctx.fillRect(x + w - serifL, y, s + serifL * 2, serifH);
                // Bottom serifs
                ctx.fillRect(x - serifL, y + h - serifH, s + serifL * 2, serifH);
                ctx.fillRect(x + w - serifL, y + h - serifH, s + serifL * 2, serifH);

                // Serif brackets (small triangular fillets)
                for (const sx of [x, x + w]) {
                    // Top brackets
                    ctx.beginPath();
                    ctx.moveTo(sx - serifL, y + serifH);
                    ctx.lineTo(sx, y + serifH);
                    ctx.lineTo(sx, y + serifH + serifL * 0.5);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(sx + s + serifL, y + serifH);
                    ctx.lineTo(sx + s, y + serifH);
                    ctx.lineTo(sx + s, y + serifH + serifL * 0.5);
                    ctx.fill();
                }
            }

            ctx.restore();
        }

        function drawParametricO(x, y, scale) {
            const s = params.stem * scale;
            const thin = thinStroke() * scale;
            const h = 200 * scale;
            const w = 140 * scale;
            const roundness = params.bowl;
            const cx = x + w / 2;
            const cy = y + h / 2;

            ctx.save();
            const slantRad = params.slant * Math.PI / 180;
            ctx.transform(1, 0, -Math.tan(slantRad), 1, 0, 0);

            const segments = 60;
            for (let i = 0; i < segments; i++) {
                const a1 = (i / segments) * Math.PI * 2;
                const a2 = ((i + 1) / segments) * Math.PI * 2;

                // Superellipse for bowl shape
                const rx = w / 2;
                const ry = h / 2;
                const n = 2 + (1 - roundness) * 3; // 2=circle, 5=rectangle

                function superellipsePoint(angle) {
                    const ca = Math.cos(angle);
                    const sa = Math.sin(angle);
                    const px = rx * Math.sign(ca) * Math.pow(Math.abs(ca), 2 / n);
                    const py = ry * Math.sign(sa) * Math.pow(Math.abs(sa), 2 / n);
                    return { x: cx + px, y: cy + py };
                }

                const p1 = superellipsePoint(a1);
                const p2 = superellipsePoint(a2);

                // Vary thickness: thick on sides, thin on top/bottom
                const thickness = thin + (s - thin) * Math.abs(Math.sin(a1));

                const dx = p2.x - p1.x, dy = p2.y - p1.y;
                const len = Math.hypot(dx, dy);
                if (len < 0.1) continue;
                const nx = -dy / len * thickness / 2;
                const ny = dx / len * thickness / 2;

                ctx.beginPath();
                ctx.moveTo(p1.x + nx, p1.y + ny);
                ctx.lineTo(p2.x + nx, p2.y + ny);
                ctx.lineTo(p2.x - nx, p2.y - ny);
                ctx.lineTo(p1.x - nx, p1.y - ny);
                ctx.closePath();
                ctx.fill();
            }

            ctx.restore();
        }

        function drawParametricA(x, y, scale) {
            const s = params.stem * scale;
            const thin = thinStroke() * scale;
            const h = 200 * scale;
            const w = 140 * scale;
            const serifL = params.serif * scale;
            const serifH = Math.max(2, serifL * 0.35);
            const crossY = y + h * (1 - params.xHeight) + h * 0.1;

            ctx.save();
            const slantRad = params.slant * Math.PI / 180;
            ctx.transform(1, 0, -Math.tan(slantRad), 1, 0, 0);

            const apex = x + w / 2;

            // Left diagonal
            ctx.beginPath();
            ctx.moveTo(apex - thin / 2, y);
            ctx.lineTo(apex + thin / 2, y);
            ctx.lineTo(x + s, y + h);
            ctx.lineTo(x, y + h);
            ctx.closePath();
            ctx.fill();

            // Right diagonal
            ctx.beginPath();
            ctx.moveTo(apex - s / 2, y);
            ctx.lineTo(apex + s / 2, y);
            ctx.lineTo(x + w + s, y + h);
            ctx.lineTo(x + w, y + h);
            ctx.closePath();
            ctx.fill();

            // Crossbar
            const cx1 = x + (apex - x) * (crossY - y) / h;
            const cx2 = apex + (x + w + s - apex) * (crossY - y) / h;
            ctx.fillRect(cx1, crossY - thin / 2, cx2 - cx1, thin);

            // Bottom serifs
            if (params.serif > 0) {
                ctx.fillRect(x - serifL, y + h - serifH, s + serifL * 2, serifH);
                ctx.fillRect(x + w - serifL, y + h - serifH, s + serifL * 2, serifH);
            }

            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const scale = Math.min(W / 800, H / 400) * 1.1;
            const letterH = 200 * scale;
            const baseY = (H - letterH) / 2;

            ctx.fillStyle = '#FEFAE0';

            // Draw H, O, A
            const spacing = 180 * scale;
            const startX = (W - spacing * 3) / 2;

            drawParametricH(startX, baseY, scale);
            drawParametricO(startX + spacing, baseY, scale);
            drawParametricA(startX + spacing * 2, baseY, scale);

            // Parameter display
            ctx.font = '11px monospace';
            ctx.fillStyle = 'rgba(138, 154, 91, 0.6)';
            ctx.textAlign = 'left';
            const paramY = H - 75;
            ctx.fillText(`stem_width: ${params.stem}`, 20, paramY);
            ctx.fillText(`serif_length: ${params.serif}`, 20, paramY + 14);
            ctx.fillText(`bowl_roundness: ${params.bowl.toFixed(2)}`, 20, paramY + 28);
            ctx.fillText(`x_height_ratio: ${params.xHeight.toFixed(2)}`, 180, paramY);
            ctx.fillText(`stroke_contrast: ${params.contrast.toFixed(2)}`, 180, paramY + 14);
            ctx.fillText(`slant_angle: ${params.slant}deg`, 180, paramY + 28);
        }

        function animate() {
            if (animating) {
                animTime += 0.006;
                params.stem = 10 + 10 * Math.sin(animTime * 1.5);
                params.serif = 8 + 8 * Math.sin(animTime * 0.8);
                params.bowl = 0.5 + 0.4 * Math.sin(animTime * 1.1);
                params.xHeight = 0.55 + 0.15 * Math.sin(animTime * 0.6);
                params.contrast = 0.5 + 0.4 * Math.sin(animTime * 0.9);
                params.slant = 7 * Math.sin(animTime * 0.4);

                updateSliders();
            }
            draw();
            requestAnimationFrame(animate);
        }

        function updateSliders() {
            document.getElementById('stemSlider').value = params.stem;
            document.getElementById('stemVal').textContent = Math.round(params.stem);
            document.getElementById('serifSlider').value = params.serif;
            document.getElementById('serifVal').textContent = Math.round(params.serif);
            document.getElementById('bowlSlider').value = params.bowl;
            document.getElementById('bowlVal').textContent = params.bowl.toFixed(2);
            document.getElementById('xhSlider').value = params.xHeight;
            document.getElementById('xhVal').textContent = params.xHeight.toFixed(2);
            document.getElementById('contSlider').value = params.contrast;
            document.getElementById('contVal').textContent = params.contrast.toFixed(2);
            document.getElementById('slantSlider').value = Math.abs(params.slant);
            document.getElementById('slantVal').textContent = Math.round(Math.abs(params.slant));
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        document.getElementById('stemSlider').addEventListener('input', e => { params.stem = parseFloat(e.target.value); document.getElementById('stemVal').textContent = Math.round(params.stem); });
        document.getElementById('serifSlider').addEventListener('input', e => { params.serif = parseFloat(e.target.value); document.getElementById('serifVal').textContent = Math.round(params.serif); });
        document.getElementById('bowlSlider').addEventListener('input', e => { params.bowl = parseFloat(e.target.value); document.getElementById('bowlVal').textContent = params.bowl.toFixed(2); });
        document.getElementById('xhSlider').addEventListener('input', e => { params.xHeight = parseFloat(e.target.value); document.getElementById('xhVal').textContent = params.xHeight.toFixed(2); });
        document.getElementById('contSlider').addEventListener('input', e => { params.contrast = parseFloat(e.target.value); document.getElementById('contVal').textContent = params.contrast.toFixed(2); });
        document.getElementById('slantSlider').addEventListener('input', e => { params.slant = parseFloat(e.target.value); document.getElementById('slantVal').textContent = Math.round(params.slant); });
        document.getElementById('animToggle').addEventListener('change', e => { animating = e.target.checked; });
        document.getElementById('resetBtn').addEventListener('click', () => {
            params = { stem: 10, serif: 8, bowl: 0.7, xHeight: 0.55, contrast: 0.5, slant: 0 };
            animating = false; animTime = 0;
            document.getElementById('animToggle').checked = false;
            updateSliders();
        });

        window.reset = function() { document.getElementById('resetBtn').click(); };

        window.addEventListener('resize', resize);
        resize();
        animate();
    })();
    </script>
</body>
</html>
