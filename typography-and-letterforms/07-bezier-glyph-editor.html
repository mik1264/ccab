<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bezier Glyph Editor | Typography & Letterforms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; cursor: crosshair; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 12px 24px; border-radius: 12px; display: flex; gap: 14px;
            align-items: center; color: #FEFAE0; font-size: 0.82rem; z-index: 100;
            border: 1px solid rgba(138, 154, 91, 0.3); flex-wrap: wrap; justify-content: center;
        }
        #controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        #controls button:hover { background: #8A9A5B; }
        #controls button.active { background: #DDA15E; color: #1a1a2e; }
        #controls label { display: flex; align-items: center; gap: 5px; }
        #controls input[type="range"] { width: 80px; accent-color: #8A9A5B; }
        #info {
            position: fixed; top: 50px; right: 20px; background: rgba(30, 30, 50, 0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.82rem; line-height: 1.6; max-width: 240px;
            border: 1px solid rgba(138, 154, 91, 0.3); z-index: 100;
        }
        #info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.95rem; }
        .tool-hint { color: #8A9A5B; font-size: 0.75rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Bezier Glyph Editor</h3>
        <p>Click to place anchor points. Drag handles to adjust curves. Build letterforms point by point like a real font editor.</p>
        <p class="tool-hint" style="margin-top:6px;">Points: <span id="pointCount">0</span> | Contours: <span id="contourCount">1</span></p>
    </div>
    <div id="controls">
        <button id="penTool" class="active">Pen (P)</button>
        <button id="selectTool">Select (V)</button>
        <button id="closePath">Close Path (C)</button>
        <button id="newContour">New Contour (N)</button>
        <button id="undoBtn">Undo (Z)</button>
        <label><input type="checkbox" id="fillToggle"> Fill</label>
        <label><input type="checkbox" id="gridToggle" checked> Grid</label>
        <label>Stroke: <input type="range" id="strokeSlider" min="1" max="5" value="2" step="0.5"></label>
        <button id="loadA">Load A</button>
        <button id="loadO">Load O</button>
        <button id="resetBtn">Clear</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        let tool = 'pen'; // 'pen' or 'select'
        let contours = [[]]; // array of contour arrays, each contour = array of {x,y,h1x,h1y,h2x,h2y}
        let currentContour = 0;
        let closed = [false];
        let dragging = null; // {contour, point, handle: 'anchor'|'h1'|'h2'}
        let showFill = false;
        let showGrid = true;
        let strokeWidth = 2;
        let lastAnchor = null;
        let tempHandle = null; // while placing new point

        const presets = {
            A: {
                contours: [
                    [
                        {x:0.5,y:0.1, h1x:0.5,h1y:0.1, h2x:0.5,h2y:0.1},
                        {x:0.15,y:0.9, h1x:0.15,h1y:0.9, h2x:0.15,h2y:0.9},
                        {x:0.3,y:0.9, h1x:0.3,h1y:0.9, h2x:0.3,h2y:0.9},
                        {x:0.38,y:0.65, h1x:0.38,h1y:0.65, h2x:0.38,h2y:0.65},
                        {x:0.62,y:0.65, h1x:0.62,h1y:0.65, h2x:0.62,h2y:0.65},
                        {x:0.7,y:0.9, h1x:0.7,h1y:0.9, h2x:0.7,h2y:0.9},
                        {x:0.85,y:0.9, h1x:0.85,h1y:0.9, h2x:0.85,h2y:0.9}
                    ],
                    [
                        {x:0.5,y:0.3, h1x:0.5,h1y:0.3, h2x:0.5,h2y:0.3},
                        {x:0.42,y:0.55, h1x:0.42,h1y:0.55, h2x:0.42,h2y:0.55},
                        {x:0.58,y:0.55, h1x:0.58,h1y:0.55, h2x:0.58,h2y:0.55}
                    ]
                ],
                closed: [true, true]
            },
            O: {
                contours: [
                    [
                        {x:0.5,y:0.1, h1x:0.2,h1y:0.1, h2x:0.8,h2y:0.1},
                        {x:0.85,y:0.5, h1x:0.85,h1y:0.25, h2x:0.85,h2y:0.75},
                        {x:0.5,y:0.9, h1x:0.8,h1y:0.9, h2x:0.2,h2y:0.9},
                        {x:0.15,y:0.5, h1x:0.15,h1y:0.75, h2x:0.15,h2y:0.25}
                    ],
                    [
                        {x:0.5,y:0.22, h1x:0.32,h1y:0.22, h2x:0.68,h2y:0.22},
                        {x:0.73,y:0.5, h1x:0.73,h1y:0.32, h2x:0.73,h2y:0.68},
                        {x:0.5,y:0.78, h1x:0.68,h1y:0.78, h2x:0.32,h2y:0.78},
                        {x:0.27,y:0.5, h1x:0.27,h1y:0.68, h2x:0.27,h2y:0.32}
                    ]
                ],
                closed: [true, true]
            }
        };

        function toCanvas(nx, ny) {
            const s = Math.min(W, H) * 0.7;
            return { x: (W - s) / 2 + nx * s, y: (H - s) / 2 + ny * s };
        }

        function fromCanvas(cx, cy) {
            const s = Math.min(W, H) * 0.7;
            return { x: (cx - (W - s) / 2) / s, y: (cy - (H - s) / 2) / s };
        }

        function drawGrid() {
            if (!showGrid) return;
            const s = Math.min(W, H) * 0.7;
            const ox = (W - s) / 2, oy = (H - s) / 2;
            const divisions = 10;

            ctx.strokeStyle = 'rgba(138, 154, 91, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= divisions; i++) {
                const t = i / divisions;
                ctx.beginPath();
                ctx.moveTo(ox + t * s, oy);
                ctx.lineTo(ox + t * s, oy + s);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(ox, oy + t * s);
                ctx.lineTo(ox + s, oy + t * s);
                ctx.stroke();
            }

            // Bounding box
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(ox, oy, s, s);

            // Baseline at 75%
            ctx.strokeStyle = 'rgba(221, 161, 94, 0.3)';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(ox, oy + s * 0.75);
            ctx.lineTo(ox + s, oy + s * 0.75);
            ctx.stroke();
            // x-height at 40%
            ctx.beginPath();
            ctx.moveTo(ox, oy + s * 0.4);
            ctx.lineTo(ox + s, oy + s * 0.4);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawContour(points, isClosed, contourIdx) {
            if (points.length === 0) return;

            const path = new Path2D();
            const p0 = toCanvas(points[0].x, points[0].y);
            path.moveTo(p0.x, p0.y);

            for (let i = 1; i < points.length; i++) {
                const prev = points[i - 1];
                const curr = points[i];
                const cp1 = toCanvas(prev.h2x, prev.h2y);
                const cp2 = toCanvas(curr.h1x, curr.h1y);
                const ep = toCanvas(curr.x, curr.y);
                path.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, ep.x, ep.y);
            }

            if (isClosed && points.length > 1) {
                const last = points[points.length - 1];
                const first = points[0];
                const cp1 = toCanvas(last.h2x, last.h2y);
                const cp2 = toCanvas(first.h1x, first.h1y);
                const ep = toCanvas(first.x, first.y);
                path.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, ep.x, ep.y);
            }

            if (showFill && isClosed) {
                ctx.fillStyle = 'rgba(254, 250, 224, 0.15)';
                ctx.fill(path, 'evenodd');
            }

            ctx.strokeStyle = contourIdx === currentContour ? '#FEFAE0' : 'rgba(254, 250, 224, 0.5)';
            ctx.lineWidth = strokeWidth;
            ctx.stroke(path);

            // Draw handles and points
            for (let i = 0; i < points.length; i++) {
                const pt = points[i];
                const anchor = toCanvas(pt.x, pt.y);
                const h1 = toCanvas(pt.h1x, pt.h1y);
                const h2 = toCanvas(pt.h2x, pt.h2y);

                // Handle lines
                ctx.strokeStyle = 'rgba(138, 154, 91, 0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(h1.x, h1.y);
                ctx.lineTo(anchor.x, anchor.y);
                ctx.lineTo(h2.x, h2.y);
                ctx.stroke();

                // Handle points (circles)
                for (const h of [h1, h2]) {
                    ctx.beginPath();
                    ctx.arc(h.x, h.y, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#8A9A5B';
                    ctx.fill();
                }

                // Anchor point (square)
                ctx.fillStyle = contourIdx === currentContour ? '#DDA15E' : '#BC6C25';
                ctx.fillRect(anchor.x - 5, anchor.y - 5, 10, 10);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            drawGrid();

            for (let c = 0; c < contours.length; c++) {
                drawContour(contours[c], closed[c], c);
            }

            document.getElementById('pointCount').textContent = contours.reduce((s, c) => s + c.length, 0);
            document.getElementById('contourCount').textContent = contours.length;
        }

        function findNearest(mx, my) {
            const threshold = 15;
            for (let c = 0; c < contours.length; c++) {
                for (let i = 0; i < contours[c].length; i++) {
                    const pt = contours[c][i];
                    const a = toCanvas(pt.x, pt.y);
                    if (Math.hypot(mx - a.x, my - a.y) < threshold) return { contour: c, point: i, handle: 'anchor' };
                    const h1 = toCanvas(pt.h1x, pt.h1y);
                    if (Math.hypot(mx - h1.x, my - h1.y) < threshold) return { contour: c, point: i, handle: 'h1' };
                    const h2 = toCanvas(pt.h2x, pt.h2y);
                    if (Math.hypot(mx - h2.x, my - h2.y) < threshold) return { contour: c, point: i, handle: 'h2' };
                }
            }
            return null;
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        canvas.addEventListener('mousedown', e => {
            const pos = getPos(e);

            if (tool === 'select') {
                const hit = findNearest(pos.x, pos.y);
                if (hit) {
                    dragging = hit;
                    currentContour = hit.contour;
                }
            } else if (tool === 'pen') {
                const npos = fromCanvas(pos.x, pos.y);
                const cont = contours[currentContour];
                cont.push({
                    x: npos.x, y: npos.y,
                    h1x: npos.x, h1y: npos.y,
                    h2x: npos.x, h2y: npos.y
                });
                dragging = { contour: currentContour, point: cont.length - 1, handle: 'h2' };
                draw();
            }
        });

        canvas.addEventListener('mousemove', e => {
            if (!dragging) return;
            const pos = getPos(e);
            const npos = fromCanvas(pos.x, pos.y);
            const pt = contours[dragging.contour][dragging.point];

            if (dragging.handle === 'anchor') {
                const dx = npos.x - pt.x, dy = npos.y - pt.y;
                pt.x = npos.x; pt.y = npos.y;
                pt.h1x += dx; pt.h1y += dy;
                pt.h2x += dx; pt.h2y += dy;
            } else if (dragging.handle === 'h1') {
                pt.h1x = npos.x; pt.h1y = npos.y;
                // Mirror h2
                pt.h2x = pt.x * 2 - npos.x;
                pt.h2y = pt.y * 2 - npos.y;
            } else if (dragging.handle === 'h2') {
                pt.h2x = npos.x; pt.h2y = npos.y;
                // Mirror h1
                pt.h1x = pt.x * 2 - npos.x;
                pt.h1y = pt.y * 2 - npos.y;
            }
            draw();
        });

        canvas.addEventListener('mouseup', () => { dragging = null; });

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === 'p' || e.key === 'P') { setTool('pen'); }
            else if (e.key === 'v' || e.key === 'V') { setTool('select'); }
            else if (e.key === 'c' || e.key === 'C') { closeCurrent(); }
            else if (e.key === 'n' || e.key === 'N') { newContour(); }
            else if (e.key === 'z' || e.key === 'Z') { undo(); }
        });

        function setTool(t) {
            tool = t;
            document.getElementById('penTool').classList.toggle('active', t === 'pen');
            document.getElementById('selectTool').classList.toggle('active', t === 'select');
            canvas.style.cursor = t === 'pen' ? 'crosshair' : 'default';
        }

        function closeCurrent() {
            if (contours[currentContour].length > 2) {
                closed[currentContour] = true;
                draw();
            }
        }

        function newContour() {
            contours.push([]);
            closed.push(false);
            currentContour = contours.length - 1;
            draw();
        }

        function undo() {
            const cont = contours[currentContour];
            if (cont.length > 0) {
                cont.pop();
                if (cont.length < 3) closed[currentContour] = false;
                draw();
            }
        }

        function loadPreset(name) {
            const p = presets[name];
            contours = p.contours.map(c => c.map(pt => ({...pt})));
            closed = [...p.closed];
            currentContour = 0;
            draw();
        }

        document.getElementById('penTool').addEventListener('click', () => setTool('pen'));
        document.getElementById('selectTool').addEventListener('click', () => setTool('select'));
        document.getElementById('closePath').addEventListener('click', closeCurrent);
        document.getElementById('newContour').addEventListener('click', newContour);
        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('fillToggle').addEventListener('change', e => { showFill = e.target.checked; draw(); });
        document.getElementById('gridToggle').addEventListener('change', e => { showGrid = e.target.checked; draw(); });
        document.getElementById('strokeSlider').addEventListener('input', e => { strokeWidth = parseFloat(e.target.value); draw(); });
        document.getElementById('loadA').addEventListener('click', () => loadPreset('A'));
        document.getElementById('loadO').addEventListener('click', () => loadPreset('O'));
        document.getElementById('resetBtn').addEventListener('click', () => {
            contours = [[]]; closed = [false]; currentContour = 0;
            draw();
        });

        window.reset = function() {
            contours = [[]]; closed = [false]; currentContour = 0;
            tool = 'pen'; showFill = false; showGrid = true; strokeWidth = 2;
            setTool('pen');
            document.getElementById('fillToggle').checked = false;
            document.getElementById('gridToggle').checked = true;
            document.getElementById('strokeSlider').value = 2;
            draw();
        };

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            draw();
        }

        window.addEventListener('resize', resize);
        resize();

        // rAF loop
        function loop() { requestAnimationFrame(loop); }
        loop();
    })();
    </script>
</body>
</html>
