<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broad-Edge Calligraphy | Typography & Letterforms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; cursor: crosshair; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 12px 24px; border-radius: 12px; display: flex; gap: 16px;
            align-items: center; color: #FEFAE0; font-size: 0.82rem; z-index: 100;
            border: 1px solid rgba(138, 154, 91, 0.3); flex-wrap: wrap; justify-content: center;
        }
        #controls label { display: flex; align-items: center; gap: 5px; }
        #controls input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        #controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        #controls button:hover { background: #8A9A5B; }
        #penPreview {
            position: fixed; top: 50px; right: 20px; background: rgba(30, 30, 50, 0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.82rem; line-height: 1.6;
            border: 1px solid rgba(138, 154, 91, 0.3); z-index: 100; text-align: center;
        }
        #penPreview h3 { color: #DDA15E; margin-bottom: 8px; font-size: 0.95rem; }
        #penCanvas { display: block; margin: 0 auto; }
        #guideToggle { accent-color: #8A9A5B; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="penPreview">
        <h3>Pen Nib Preview</h3>
        <canvas id="penCanvas" width="100" height="100"></canvas>
        <p style="margin-top:6px;">Angle: <span id="angleDisplay">45</span>&deg; | Width: <span id="widthDisplay">20</span>px</p>
        <p style="margin-top:4px;font-size:0.75rem;color:#8A9A5B;">Draw on canvas to write</p>
    </div>
    <div id="controls">
        <label>Pen Angle: <input type="range" id="angleSlider" min="0" max="90" value="45"> <span id="angleVal">45</span>&deg;</label>
        <label>Nib Width: <input type="range" id="widthSlider" min="4" max="50" value="20"> <span id="widthVal">20</span></label>
        <label>Ink Color:
            <select id="inkSelect" style="background:#2a2a4a;color:#FEFAE0;border:1px solid #8A9A5B;border-radius:4px;padding:2px 6px;">
                <option value="#FEFAE0">Cream</option>
                <option value="#DDA15E">Earth</option>
                <option value="#8A9A5B">Sage</option>
                <option value="#BC6C25">Terracotta</option>
                <option value="#1a1a6e">Indigo</option>
            </select>
        </label>
        <label><input type="checkbox" id="guideToggle"> Guidelines</label>
        <label>Pressure: <input type="range" id="pressureSlider" min="0.3" max="1" value="0.8" step="0.05"> <span id="pressureVal">0.80</span></label>
        <button id="clearBtn">Clear</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const penCanvas = document.getElementById('penCanvas');
        const penCtx = penCanvas.getContext('2d');
        let W, H;

        let penAngle = 45;
        let nibWidth = 20;
        let inkColor = '#FEFAE0';
        let pressure = 0.8;
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let showGuides = false;

        // Offscreen canvas to preserve strokes
        let strokeCanvas, strokeCtx;

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;

            const oldCanvas = strokeCanvas;
            strokeCanvas = document.createElement('canvas');
            strokeCanvas.width = W;
            strokeCanvas.height = H;
            strokeCtx = strokeCanvas.getContext('2d');

            if (oldCanvas) {
                strokeCtx.drawImage(oldCanvas, 0, 0);
            }

            canvas.width = W;
            canvas.height = H;
            drawFrame();
        }

        function drawPenPreview() {
            penCtx.clearRect(0, 0, 100, 100);
            const cx = 50, cy = 50;
            const rad = penAngle * Math.PI / 180;
            const hw = nibWidth * 0.6;

            // Draw angle reference
            penCtx.strokeStyle = 'rgba(138, 154, 91, 0.3)';
            penCtx.lineWidth = 1;
            penCtx.setLineDash([3, 3]);
            penCtx.beginPath();
            penCtx.moveTo(10, cy);
            penCtx.lineTo(90, cy);
            penCtx.stroke();
            penCtx.setLineDash([]);

            // Draw nib
            const dx = Math.cos(rad) * hw;
            const dy = -Math.sin(rad) * hw;

            penCtx.beginPath();
            penCtx.moveTo(cx - dx, cy - dy);
            penCtx.lineTo(cx + dx, cy + dy);
            penCtx.strokeStyle = '#DDA15E';
            penCtx.lineWidth = 3;
            penCtx.lineCap = 'round';
            penCtx.stroke();

            // Angle arc
            penCtx.beginPath();
            penCtx.arc(cx, cy, 20, 0, -rad, true);
            penCtx.strokeStyle = 'rgba(138, 154, 91, 0.5)';
            penCtx.lineWidth = 1;
            penCtx.stroke();
        }

        function drawNibStroke(targetCtx, x, y, color, p) {
            const rad = penAngle * Math.PI / 180;
            const hw = nibWidth * p / 2;
            const dx = Math.cos(rad) * hw;
            const dy = -Math.sin(rad) * hw;

            targetCtx.beginPath();
            targetCtx.moveTo(x - dx, y - dy);
            targetCtx.lineTo(x + dx, y + dy);
            targetCtx.strokeStyle = color;
            targetCtx.lineWidth = 2;
            targetCtx.lineCap = 'round';
            targetCtx.stroke();
        }

        function drawStrokeBetween(x1, y1, x2, y2) {
            const dist = Math.hypot(x2 - x1, y2 - y1);
            const steps = Math.max(1, Math.floor(dist / 1.5));
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const x = x1 + (x2 - x1) * t;
                const y = y1 + (y2 - y1) * t;
                drawNibStroke(strokeCtx, x, y, inkColor, pressure);
            }
        }

        function drawGuidelines() {
            if (!showGuides) return;
            const lineSpacing = nibWidth * 5;
            const ascenderHeight = nibWidth * 3.5;
            const xHeight = nibWidth * 2.5;

            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 0.5;

            for (let baseY = lineSpacing * 2; baseY < H; baseY += lineSpacing * 2) {
                // Baseline
                ctx.strokeStyle = 'rgba(138, 154, 91, 0.5)';
                ctx.beginPath();
                ctx.moveTo(0, baseY);
                ctx.lineTo(W, baseY);
                ctx.stroke();

                // x-height
                ctx.strokeStyle = 'rgba(221, 161, 94, 0.3)';
                ctx.beginPath();
                ctx.moveTo(0, baseY - xHeight);
                ctx.lineTo(W, baseY - xHeight);
                ctx.stroke();

                // Ascender
                ctx.strokeStyle = 'rgba(188, 108, 37, 0.2)';
                ctx.beginPath();
                ctx.moveTo(0, baseY - ascenderHeight);
                ctx.lineTo(W, baseY - ascenderHeight);
                ctx.stroke();

                // Descender
                ctx.beginPath();
                ctx.moveTo(0, baseY + nibWidth * 1.5);
                ctx.lineTo(W, baseY + nibWidth * 1.5);
                ctx.stroke();

                // Pen angle guide
                const rad = penAngle * Math.PI / 180;
                ctx.strokeStyle = 'rgba(138, 154, 91, 0.15)';
                for (let gx = 50; gx < W; gx += nibWidth * 3) {
                    ctx.beginPath();
                    ctx.moveTo(gx, baseY);
                    ctx.lineTo(gx + Math.cos(rad) * 30, baseY - Math.sin(rad) * 30);
                    ctx.stroke();
                }
            }
            ctx.setLineDash([]);
        }

        function drawFrame() {
            ctx.clearRect(0, 0, W, H);

            // Paper texture
            ctx.fillStyle = 'rgba(26, 26, 46, 0.95)';
            ctx.fillRect(0, 0, W, H);

            drawGuidelines();

            // Draw preserved strokes
            ctx.drawImage(strokeCanvas, 0, 0);
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches) {
                return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
            }
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function onDown(e) {
            isDrawing = true;
            const pos = getPos(e);
            lastX = pos.x;
            lastY = pos.y;
            drawNibStroke(strokeCtx, pos.x, pos.y, inkColor, pressure);
            drawFrame();
            e.preventDefault();
        }

        function onMove(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            drawStrokeBetween(lastX, lastY, pos.x, pos.y);
            lastX = pos.x;
            lastY = pos.y;
            drawFrame();
            e.preventDefault();
        }

        function onUp() { isDrawing = false; }

        canvas.addEventListener('mousedown', onDown);
        canvas.addEventListener('mousemove', onMove);
        canvas.addEventListener('mouseup', onUp);
        canvas.addEventListener('mouseleave', onUp);
        canvas.addEventListener('touchstart', onDown, { passive: false });
        canvas.addEventListener('touchmove', onMove, { passive: false });
        canvas.addEventListener('touchend', onUp);

        document.getElementById('angleSlider').addEventListener('input', e => {
            penAngle = parseInt(e.target.value);
            document.getElementById('angleVal').textContent = penAngle;
            document.getElementById('angleDisplay').textContent = penAngle;
            drawPenPreview();
            drawFrame();
        });

        document.getElementById('widthSlider').addEventListener('input', e => {
            nibWidth = parseInt(e.target.value);
            document.getElementById('widthVal').textContent = nibWidth;
            document.getElementById('widthDisplay').textContent = nibWidth;
            drawPenPreview();
            drawFrame();
        });

        document.getElementById('inkSelect').addEventListener('change', e => {
            inkColor = e.target.value;
        });

        document.getElementById('pressureSlider').addEventListener('input', e => {
            pressure = parseFloat(e.target.value);
            document.getElementById('pressureVal').textContent = pressure.toFixed(2);
        });

        document.getElementById('guideToggle').addEventListener('change', e => {
            showGuides = e.target.checked;
            drawFrame();
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            strokeCtx.clearRect(0, 0, W, H);
            drawFrame();
        });

        window.reset = function() {
            penAngle = 45; nibWidth = 20; inkColor = '#FEFAE0'; pressure = 0.8; showGuides = false;
            document.getElementById('angleSlider').value = 45;
            document.getElementById('angleVal').textContent = '45';
            document.getElementById('angleDisplay').textContent = '45';
            document.getElementById('widthSlider').value = 20;
            document.getElementById('widthVal').textContent = '20';
            document.getElementById('widthDisplay').textContent = '20';
            document.getElementById('inkSelect').value = '#FEFAE0';
            document.getElementById('pressureSlider').value = 0.8;
            document.getElementById('pressureVal').textContent = '0.80';
            document.getElementById('guideToggle').checked = false;
            strokeCtx.clearRect(0, 0, W, H);
            drawPenPreview();
            drawFrame();
        };

        window.addEventListener('resize', resize);
        resize();
        drawPenPreview();

        // Idle animation loop to keep enhance.js happy
        function loop() {
            requestAnimationFrame(loop);
        }
        loop();
    })();
    </script>
</body>
</html>
