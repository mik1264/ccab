<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subpixel Rendering | Typography & Letterforms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 12px 24px; border-radius: 12px; display: flex; gap: 16px;
            align-items: center; color: #FEFAE0; font-size: 0.82rem; z-index: 100;
            border: 1px solid rgba(138, 154, 91, 0.3); flex-wrap: wrap; justify-content: center;
        }
        #controls label { display: flex; align-items: center; gap: 5px; }
        #controls input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        #controls select {
            background: #2a2a4a; color: #FEFAE0; border: 1px solid #8A9A5B;
            border-radius: 6px; padding: 4px 8px; font-size: 0.8rem;
        }
        #controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        #controls button:hover { background: #8A9A5B; }
        #info {
            position: fixed; top: 50px; right: 20px; background: rgba(30, 30, 50, 0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.82rem; line-height: 1.6; max-width: 260px;
            border: 1px solid rgba(138, 154, 91, 0.3); z-index: 100;
        }
        #info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.95rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Subpixel Rendering</h3>
        <p>LCD screens have R, G, B subpixels per pixel. Subpixel rendering treats each color channel independently, tripling horizontal resolution for sharper text edges.</p>
    </div>
    <div id="controls">
        <label>Mode: <select id="modeSelect">
            <option value="comparison">Side-by-Side</option>
            <option value="binary">Binary (no AA)</option>
            <option value="grayscale">Grayscale AA</option>
            <option value="subpixel">Subpixel (LCD)</option>
        </select></label>
        <label>Zoom: <input type="range" id="zoomSlider" min="4" max="24" value="10"> <span id="zoomVal">10</span>x</label>
        <label>Glyph: <select id="glyphSelect">
            <option value="i">i (thin)</option>
            <option value="o">o (curved)</option>
            <option value="m">m (complex)</option>
            <option value="T" selected>T (mixed)</option>
            <option value="S">S (all curves)</option>
        </select></label>
        <label><input type="checkbox" id="subpixelGrid" checked> Show subpixels</label>
        <button id="resetBtn">Reset</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        // Offscreen canvas for text rendering at small sizes
        const offscreen = document.createElement('canvas');
        const offCtx = offscreen.getContext('2d', { willReadFrequently: true });

        let mode = 'comparison';
        let zoom = 10;
        let glyph = 'T';
        let showSubpixels = true;

        const glyphSize = 16; // render at this px size

        function renderGlyph() {
            offscreen.width = glyphSize * 3; // 3x for subpixel
            offscreen.height = glyphSize * 2;
            offCtx.clearRect(0, 0, offscreen.width, offscreen.height);
            offCtx.fillStyle = '#000';
            offCtx.fillRect(0, 0, offscreen.width, offscreen.height);
            offCtx.fillStyle = '#FFF';
            offCtx.font = `${glyphSize}px serif`;
            offCtx.textBaseline = 'top';
            offCtx.textAlign = 'left';
            // Render 3x wide for subpixel sampling
            offCtx.save();
            offCtx.scale(3, 1);
            offCtx.fillText(glyph, 2, 2);
            offCtx.restore();
        }

        function getGrayscaleData() {
            // Normal 1x render
            const c = document.createElement('canvas');
            c.width = glyphSize * 2;
            c.height = glyphSize * 2;
            const cx = c.getContext('2d', { willReadFrequently: true });
            cx.fillStyle = '#000';
            cx.fillRect(0, 0, c.width, c.height);
            cx.fillStyle = '#FFF';
            cx.font = `${glyphSize}px serif`;
            cx.textBaseline = 'top';
            cx.fillText(glyph, 4, 2);
            return cx.getImageData(0, 0, c.width, c.height);
        }

        function drawPixelGrid(ox, oy, imageData, pixW, pixH, renderMode, label) {
            const data = imageData.data;
            const imgW = imageData.width;
            const imgH = imageData.height;
            const cellW = zoom;
            const cellH = zoom;
            const visibleW = Math.min(pixW, imgW);
            const visibleH = Math.min(pixH, imgH);

            // Label
            ctx.font = '13px "Segoe UI", sans-serif';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText(label, ox + visibleW * cellW / 2, oy - 8);

            for (let py = 0; py < visibleH; py++) {
                for (let px = 0; px < visibleW; px++) {
                    const sx = ox + px * cellW;
                    const sy = oy + py * cellH;

                    if (renderMode === 'binary') {
                        const idx = (py * imgW + px) * 4;
                        const val = data[idx] > 127 ? 255 : 0;
                        ctx.fillStyle = `rgb(${val},${val},${val})`;
                        ctx.fillRect(sx, sy, cellW, cellH);
                    } else if (renderMode === 'grayscale') {
                        const idx = (py * imgW + px) * 4;
                        const val = data[idx];
                        ctx.fillStyle = `rgb(${val},${val},${val})`;
                        ctx.fillRect(sx, sy, cellW, cellH);
                    } else if (renderMode === 'subpixel') {
                        // Sample 3 subpixels per pixel from 3x-wide render
                        const subW = cellW / 3;
                        for (let s = 0; s < 3; s++) {
                            const spx = px * 3 + s;
                            if (spx >= imgW) continue;
                            const idx = (py * imgW + spx) * 4;
                            const val = data[idx];

                            if (showSubpixels) {
                                // Show individual R, G, B subpixels
                                const r = s === 0 ? val : 0;
                                const g = s === 1 ? val : 0;
                                const b = s === 2 ? val : 0;
                                ctx.fillStyle = `rgb(${r},${g},${b})`;
                            } else {
                                // Show blended result
                                ctx.fillStyle = `rgb(${val},${val},${val})`;
                            }
                            ctx.fillRect(sx + s * subW, sy, subW, cellH);
                        }
                    }

                    // Grid lines
                    ctx.strokeStyle = 'rgba(138, 154, 91, 0.15)';
                    ctx.lineWidth = 0.5;
                    ctx.strokeRect(sx, sy, cellW, cellH);

                    // Subpixel grid lines
                    if (renderMode === 'subpixel' && showSubpixels) {
                        ctx.strokeStyle = 'rgba(138, 154, 91, 0.08)';
                        const subW = cellW / 3;
                        for (let s = 1; s < 3; s++) {
                            ctx.beginPath();
                            ctx.moveTo(sx + s * subW, sy);
                            ctx.lineTo(sx + s * subW, sy + cellH);
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            renderGlyph();

            const gsData = getGrayscaleData();
            const spData = offCtx.getImageData(0, 0, offscreen.width, offscreen.height);
            const pixW = glyphSize * 2;
            const pixH = glyphSize * 2;

            if (mode === 'comparison') {
                const panelW = pixW * zoom;
                const totalW = panelW * 3 + 60;
                const startX = (W - totalW) / 2;
                const startY = (H - pixH * zoom) / 2;

                drawPixelGrid(startX, startY, gsData, pixW, pixH, 'binary', 'Binary (1-bit)');
                drawPixelGrid(startX + panelW + 30, startY, gsData, pixW, pixH, 'grayscale', 'Grayscale AA');
                drawPixelGrid(startX + panelW * 2 + 60, startY, spData, pixW, pixH, 'subpixel', 'Subpixel (LCD)');
            } else {
                const panelW = pixW * zoom;
                const startX = (W - panelW) / 2;
                const startY = (H - pixH * zoom) / 2;
                const data = mode === 'subpixel' ? spData : gsData;
                const labels = { binary: 'Binary (1-bit)', grayscale: 'Grayscale Anti-aliasing', subpixel: 'Subpixel (LCD) Rendering' };
                drawPixelGrid(startX, startY, data, pixW, pixH, mode, labels[mode]);
            }

            // Actual size preview
            ctx.font = `${glyphSize}px serif`;
            ctx.fillStyle = '#FEFAE0';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`Actual size: ${glyph}`, 20, H - 50);
            ctx.font = '11px "Segoe UI", sans-serif';
            ctx.fillStyle = 'rgba(138, 154, 91, 0.6)';
            ctx.fillText(`${glyphSize}px rendered, ${zoom}x magnification`, 20, H - 30);
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            draw();
        }

        document.getElementById('modeSelect').addEventListener('change', e => { mode = e.target.value; draw(); });
        document.getElementById('zoomSlider').addEventListener('input', e => {
            zoom = parseInt(e.target.value);
            document.getElementById('zoomVal').textContent = zoom;
            draw();
        });
        document.getElementById('glyphSelect').addEventListener('change', e => { glyph = e.target.value; draw(); });
        document.getElementById('subpixelGrid').addEventListener('change', e => { showSubpixels = e.target.checked; draw(); });
        document.getElementById('resetBtn').addEventListener('click', () => {
            mode = 'comparison'; zoom = 10; glyph = 'T'; showSubpixels = true;
            document.getElementById('modeSelect').value = 'comparison';
            document.getElementById('zoomSlider').value = 10;
            document.getElementById('zoomVal').textContent = '10';
            document.getElementById('glyphSelect').value = 'T';
            document.getElementById('subpixelGrid').checked = true;
            draw();
        });

        window.reset = function() { document.getElementById('resetBtn').click(); };

        window.addEventListener('resize', resize);
        resize();

        // Idle rAF loop
        function loop() { requestAnimationFrame(loop); }
        loop();
    })();
    </script>
</body>
</html>
