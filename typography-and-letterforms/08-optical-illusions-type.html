<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optical Illusions in Type | Typography & Letterforms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 12px 24px; border-radius: 12px; display: flex; gap: 16px;
            align-items: center; color: #FEFAE0; font-size: 0.82rem; z-index: 100;
            border: 1px solid rgba(138, 154, 91, 0.3); flex-wrap: wrap; justify-content: center;
        }
        #controls select, #controls button {
            background: #2a2a4a; color: #FEFAE0; border: 1px solid #8A9A5B;
            border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.8rem;
        }
        #controls button { background: #606C38; border: none; padding: 6px 14px; }
        #controls button:hover { background: #8A9A5B; }
        #controls label { display: flex; align-items: center; gap: 5px; }
        #controls input[type="range"] { width: 100px; accent-color: #8A9A5B; }
        #info {
            position: fixed; top: 50px; right: 20px; background: rgba(30, 30, 50, 0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.82rem; line-height: 1.6; max-width: 280px;
            border: 1px solid rgba(138, 154, 91, 0.3); z-index: 100;
        }
        #info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.95rem; }
        #info p { margin-bottom: 6px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Optical Illusions in Type</h3>
        <p id="illusionDesc">Type designers use optical corrections to make letterforms look mathematically "wrong" but perceptually right.</p>
    </div>
    <div id="controls">
        <label>Illusion: <select id="illusionSelect">
            <option value="overshoot">Overshoot</option>
            <option value="midline">Midline Shift</option>
            <option value="thinning">Horizontal Thinning</option>
            <option value="tapering">Stroke Tapering</option>
            <option value="weight">Visual Weight Balance</option>
        </select></label>
        <label>Correction: <input type="range" id="correctionSlider" min="0" max="1" step="0.01" value="0.5"> <span id="correctionVal">50%</span></label>
        <label><input type="checkbox" id="guidesToggle" checked> Guides</label>
        <button id="resetBtn">Reset</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        let illusion = 'overshoot';
        let correction = 0.5;
        let showGuides = true;

        const descriptions = {
            overshoot: 'Round and pointed letters (O, A, V) extend slightly above and below the baseline/cap height. Without overshoot, they look smaller than flat-topped letters like H.',
            midline: 'The crossbar of letters like H, B, E is placed above the mathematical center. At the true middle, the top half looks heavier, creating a top-heavy appearance.',
            thinning: 'Horizontal strokes are made thinner than vertical strokes of the same measured width. This corrects for the eye perceiving horizontal strokes as thicker.',
            tapering: 'Strokes taper slightly at junctions and curves. Without tapering, ink traps fill in at small sizes, creating dark spots.',
            weight: 'The bottom half of letters like S, B, 8 is made slightly larger. Mathematically equal halves look top-heavy because gravity biases our perception.'
        };

        function drawGuide(y, label, color) {
            if (!showGuides) return;
            ctx.strokeStyle = color || 'rgba(138, 154, 91, 0.4)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(50, y);
            ctx.lineTo(W - 50, y);
            ctx.stroke();
            ctx.setLineDash([]);
            if (label) {
                ctx.font = '11px "Segoe UI", sans-serif';
                ctx.fillStyle = color || 'rgba(138, 154, 91, 0.6)';
                ctx.textAlign = 'right';
                ctx.fillText(label, 48, y + 4);
            }
        }

        function drawOvershoot() {
            const baseY = H * 0.7;
            const capY = H * 0.25;
            const size = H * 0.45;
            const overshootAmt = correction * size * 0.04;

            drawGuide(baseY, 'baseline', 'rgba(138, 154, 91, 0.4)');
            drawGuide(capY, 'cap height', 'rgba(221, 161, 94, 0.4)');

            ctx.font = `bold ${size}px Georgia, serif`;
            ctx.textBaseline = 'alphabetic';
            ctx.textAlign = 'center';

            // H - no overshoot needed
            ctx.fillStyle = '#FEFAE0';
            ctx.fillText('H', W * 0.25, baseY);

            // O with/without overshoot
            ctx.save();
            if (correction > 0) {
                // Draw O slightly larger to overshoot
                const scale = 1 + overshootAmt / size;
                ctx.translate(W * 0.5, baseY);
                ctx.scale(1, scale);
                ctx.translate(0, -baseY);
            }
            ctx.fillStyle = '#DDA15E';
            ctx.fillText('O', W * 0.5, baseY);
            ctx.restore();

            // A with/without overshoot
            ctx.save();
            if (correction > 0) {
                const scale = 1 + overshootAmt / size * 0.8;
                ctx.translate(W * 0.75, baseY);
                ctx.scale(1, scale);
                ctx.translate(0, -baseY);
            }
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText('A', W * 0.75, baseY);
            ctx.restore();

            // Overshoot indicators
            if (showGuides && correction > 0) {
                ctx.fillStyle = 'rgba(221, 161, 94, 0.3)';
                ctx.fillRect(W * 0.35, baseY, W * 0.45, overshootAmt);
                ctx.fillRect(W * 0.35, capY - overshootAmt, W * 0.45, overshootAmt);
            }

            // Labels
            ctx.font = '13px "Segoe UI", sans-serif';
            ctx.fillStyle = 'rgba(254, 250, 224, 0.6)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('No overshoot', W * 0.25, baseY + 20);
            ctx.fillText(`Overshoot: ${(overshootAmt).toFixed(1)}px`, W * 0.5, baseY + 20);
            ctx.fillText(`Overshoot: ${(overshootAmt * 0.8).toFixed(1)}px`, W * 0.75, baseY + 20);
        }

        function drawMidline() {
            const baseY = H * 0.72;
            const capY = H * 0.2;
            const midMath = (baseY + capY) / 2;
            const midOptical = midMath - (baseY - capY) * 0.03 * correction;

            drawGuide(baseY, 'baseline');
            drawGuide(capY, 'cap height');
            drawGuide(midMath, 'math center', 'rgba(188, 108, 37, 0.4)');
            if (correction > 0) drawGuide(midOptical, 'optical center', 'rgba(138, 154, 91, 0.6)');

            const letterW = 120;
            const strokeW = 16;

            // Left: H with math center crossbar
            const hx1 = W * 0.3;
            ctx.fillStyle = 'rgba(254, 250, 224, 0.5)';
            ctx.fillRect(hx1, capY, strokeW, baseY - capY);
            ctx.fillRect(hx1 + letterW, capY, strokeW, baseY - capY);
            ctx.fillRect(hx1, midMath - strokeW / 2, letterW + strokeW, strokeW);

            // Right: H with optical center crossbar
            const hx2 = W * 0.6;
            ctx.fillStyle = '#FEFAE0';
            ctx.fillRect(hx2, capY, strokeW, baseY - capY);
            ctx.fillRect(hx2 + letterW, capY, strokeW, baseY - capY);
            ctx.fillStyle = '#DDA15E';
            ctx.fillRect(hx2, midOptical - strokeW / 2, letterW + strokeW, strokeW);

            ctx.font = '13px "Segoe UI", sans-serif';
            ctx.fillStyle = 'rgba(254, 250, 224, 0.6)';
            ctx.textAlign = 'center';
            ctx.fillText('Mathematical center', hx1 + letterW / 2, baseY + 20);
            ctx.fillText('Optical center', hx2 + letterW / 2, baseY + 20);
        }

        function drawThinning() {
            const cx = W / 2;
            const cy = H * 0.45;
            const size = Math.min(W, H) * 0.25;
            const thinFactor = 1 - correction * 0.35;

            // Draw two plus signs
            const sw = size * 0.18; // stroke width

            // Left: uniform strokes
            const lx = cx - size * 1.2;
            ctx.fillStyle = 'rgba(254, 250, 224, 0.5)';
            ctx.fillRect(lx - size * 0.4, cy - sw / 2, size * 0.8, sw); // horizontal
            ctx.fillRect(lx - sw / 2, cy - size * 0.4, sw, size * 0.8); // vertical

            // Right: thinned horizontal
            const rx = cx + size * 1.2;
            ctx.fillStyle = '#FEFAE0';
            ctx.fillRect(rx - size * 0.4, cy - sw * thinFactor / 2, size * 0.8, sw * thinFactor); // thinner horizontal
            ctx.fillStyle = '#DDA15E';
            ctx.fillRect(rx - sw / 2, cy - size * 0.4, sw, size * 0.8); // same vertical

            drawGuide(cy - sw / 2, '', 'rgba(138, 154, 91, 0.2)');
            drawGuide(cy + sw / 2, '', 'rgba(138, 154, 91, 0.2)');

            ctx.font = '13px "Segoe UI", sans-serif';
            ctx.fillStyle = 'rgba(254, 250, 224, 0.6)';
            ctx.textAlign = 'center';
            ctx.fillText('Equal stroke width', lx, cy + size * 0.5 + 20);
            ctx.fillText(`Horizontal: ${(thinFactor * 100).toFixed(0)}% of vertical`, rx, cy + size * 0.5 + 20);

            // Measurement arrows
            if (showGuides) {
                ctx.strokeStyle = 'rgba(221, 161, 94, 0.5)';
                ctx.lineWidth = 1;
                // Left measurement
                ctx.beginPath();
                ctx.moveTo(lx + size * 0.45, cy - sw / 2);
                ctx.lineTo(lx + size * 0.45, cy + sw / 2);
                ctx.stroke();
                // Right measurement
                ctx.beginPath();
                ctx.moveTo(rx + size * 0.45, cy - sw * thinFactor / 2);
                ctx.lineTo(rx + size * 0.45, cy + sw * thinFactor / 2);
                ctx.stroke();
            }
        }

        function drawTapering() {
            const cy = H * 0.45;
            const stemW = 20;
            const taperAmt = correction * 6;

            // V junction without tapering
            const vx1 = W * 0.3;
            ctx.beginPath();
            ctx.moveTo(vx1 - 60, cy - 120);
            ctx.lineTo(vx1 - 60 + stemW, cy - 120);
            ctx.lineTo(vx1 + stemW / 2, cy + 60);
            ctx.lineTo(vx1 - stemW / 2, cy + 60);
            ctx.closePath();
            ctx.fillStyle = 'rgba(254, 250, 224, 0.5)';
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(vx1 + 60, cy - 120);
            ctx.lineTo(vx1 + 60 - stemW, cy - 120);
            ctx.lineTo(vx1 - stemW / 2, cy + 60);
            ctx.lineTo(vx1 + stemW / 2, cy + 60);
            ctx.closePath();
            ctx.fill();

            // V junction with tapering
            const vx2 = W * 0.7;
            ctx.beginPath();
            ctx.moveTo(vx2 - 60, cy - 120);
            ctx.lineTo(vx2 - 60 + stemW, cy - 120);
            ctx.lineTo(vx2 + (stemW / 2 - taperAmt), cy + 60);
            ctx.lineTo(vx2 - (stemW / 2 - taperAmt), cy + 60);
            ctx.closePath();
            ctx.fillStyle = '#DDA15E';
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(vx2 + 60, cy - 120);
            ctx.lineTo(vx2 + 60 - stemW, cy - 120);
            ctx.lineTo(vx2 - (stemW / 2 - taperAmt), cy + 60);
            ctx.lineTo(vx2 + (stemW / 2 - taperAmt), cy + 60);
            ctx.closePath();
            ctx.fillStyle = '#8A9A5B';
            ctx.fill();

            // Junction highlight
            if (showGuides) {
                ctx.beginPath();
                ctx.arc(vx1, cy + 40, 25, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(188, 108, 37, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.font = '10px "Segoe UI", sans-serif';
                ctx.fillStyle = '#BC6C25';
                ctx.textAlign = 'center';
                ctx.fillText('ink trap', vx1, cy + 75);

                ctx.beginPath();
                ctx.arc(vx2, cy + 40, 25, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(138, 154, 91, 0.5)';
                ctx.stroke();
                ctx.fillStyle = '#8A9A5B';
                ctx.fillText('tapered', vx2, cy + 75);
            }

            ctx.font = '13px "Segoe UI", sans-serif';
            ctx.fillStyle = 'rgba(254, 250, 224, 0.6)';
            ctx.textAlign = 'center';
            ctx.fillText('No tapering (ink trap)', vx1, cy + 100);
            ctx.fillText('Tapered junction', vx2, cy + 100);
        }

        function drawWeight() {
            const size = Math.min(W, H) * 0.15;
            const cy = H * 0.45;
            const sw = size * 0.2;
            const weightShift = correction * size * 0.06;

            // Left: mathematically centered S-like shape
            const sx1 = W * 0.3;
            // Top bowl
            ctx.beginPath();
            ctx.arc(sx1, cy - size * 0.25, size * 0.25, 0, Math.PI * 2);
            ctx.lineWidth = sw;
            ctx.strokeStyle = 'rgba(254, 250, 224, 0.5)';
            ctx.stroke();
            // Bottom bowl (same size)
            ctx.beginPath();
            ctx.arc(sx1, cy + size * 0.25, size * 0.25, 0, Math.PI * 2);
            ctx.stroke();

            // Right: optically corrected
            const sx2 = W * 0.7;
            // Top bowl (smaller)
            ctx.beginPath();
            ctx.arc(sx2, cy - size * 0.25 - weightShift, size * 0.25 - weightShift, 0, Math.PI * 2);
            ctx.lineWidth = sw;
            ctx.strokeStyle = '#DDA15E';
            ctx.stroke();
            // Bottom bowl (larger)
            ctx.beginPath();
            ctx.arc(sx2, cy + size * 0.25 + weightShift * 0.5, size * 0.25 + weightShift, 0, Math.PI * 2);
            ctx.strokeStyle = '#8A9A5B';
            ctx.stroke();

            drawGuide(cy, 'center', 'rgba(138, 154, 91, 0.3)');

            ctx.font = '13px "Segoe UI", sans-serif';
            ctx.fillStyle = 'rgba(254, 250, 224, 0.6)';
            ctx.textAlign = 'center';
            ctx.fillText('Equal halves (looks top-heavy)', sx1, cy + size * 0.7);
            ctx.fillText('Optically balanced', sx2, cy + size * 0.7);
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Title
            ctx.font = '16px "Segoe UI", sans-serif';
            ctx.fillStyle = '#FEFAE0';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';

            const titles = {
                overshoot: 'Overshoot: Curves extend past alignment lines',
                midline: 'Midline Shift: Crossbar raised above center',
                thinning: 'Horizontal Thinning: H-strokes narrower than V-strokes',
                tapering: 'Stroke Tapering: Narrowing at junctions',
                weight: 'Visual Weight Balance: Bottom half larger'
            };
            ctx.fillText(titles[illusion], W / 2, 20);

            if (illusion === 'overshoot') drawOvershoot();
            else if (illusion === 'midline') drawMidline();
            else if (illusion === 'thinning') drawThinning();
            else if (illusion === 'tapering') drawTapering();
            else if (illusion === 'weight') drawWeight();
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            draw();
        }

        document.getElementById('illusionSelect').addEventListener('change', e => {
            illusion = e.target.value;
            document.getElementById('illusionDesc').textContent = descriptions[illusion];
            draw();
        });
        document.getElementById('correctionSlider').addEventListener('input', e => {
            correction = parseFloat(e.target.value);
            document.getElementById('correctionVal').textContent = (correction * 100).toFixed(0) + '%';
            draw();
        });
        document.getElementById('guidesToggle').addEventListener('change', e => {
            showGuides = e.target.checked;
            draw();
        });
        document.getElementById('resetBtn').addEventListener('click', () => {
            illusion = 'overshoot'; correction = 0.5; showGuides = true;
            document.getElementById('illusionSelect').value = 'overshoot';
            document.getElementById('correctionSlider').value = 0.5;
            document.getElementById('correctionVal').textContent = '50%';
            document.getElementById('guidesToggle').checked = true;
            document.getElementById('illusionDesc').textContent = descriptions.overshoot;
            draw();
        });

        window.reset = function() { document.getElementById('resetBtn').click(); };

        window.addEventListener('resize', resize);
        resize();
        function loop() { requestAnimationFrame(loop); }
        loop();
    })();
    </script>
</body>
</html>
