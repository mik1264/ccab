<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Galaxy Matching Shader — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; }
    body { background:#0d1117; overflow:hidden; }
    canvas#c { position:fixed; top:0; left:0; width:100vw; height:100vh; display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; font-family:'Nunito',sans-serif; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); font-family:'Nunito',sans-serif; }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Galaxy Matching Shader</h2><p>A procedural galaxy where spiral arms are preference lists and matched pairs are binary stars at arm tips. The galactic structure encodes the matching symmetry.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);
    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }`;
    function mkShader(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(sh));return sh;}
    function mkProg(fs){const pr=gl.createProgram();gl.attachShader(pr,mkShader(gl.VERTEX_SHADER,VS));gl.attachShader(pr,mkShader(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);return pr;}
    const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

    const FS = `
    precision highp float;
    uniform vec2 u_res;
    uniform float u_time;

    #define PI 3.14159265
    #define NUM_ARMS 6

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f*f*(3.0-2.0*f);
      return mix(
        mix(hash(i), hash(i+vec2(1,0)), f.x),
        mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x),
        f.y
      );
    }

    float fbm(vec2 p) {
      float v = 0.0, a = 0.5;
      mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
      for(int i = 0; i < 5; i++) {
        v += a * noise(p);
        p = rot * p * 2.0;
        a *= 0.5;
      }
      return v;
    }

    // Matched pair positions at arm tips
    vec2 pairPos(int i) {
      float angle = float(i) * 2.0 * PI / 5.0;
      float r = 0.55;
      return vec2(cos(angle) * r, sin(angle) * r);
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - 0.5*u_res) / u_res.y;
      float t = u_time;

      // Differential rotation
      float r = length(uv);
      float theta = atan(uv.y, uv.x);
      float rotSpeed = 0.15 / (r + 0.3); // inner rotates faster
      theta -= t * rotSpeed;

      // Spiral arm density
      float armDensity = 0.0;
      float b = 0.3; // spiral tightness
      float sigma = 0.12;

      for(int i = 0; i < NUM_ARMS; i++) {
        float armOffset = float(i) * 2.0 * PI / float(NUM_ARMS);
        float spiralAngle = theta - armOffset;
        // Logarithmic spiral: theta = a + b*ln(r)
        float expected = log(r + 0.05) / b;
        float diff = mod(spiralAngle - expected + PI, 2.0*PI) - PI;
        float arm = exp(-diff*diff / (2.0*sigma*sigma));
        arm *= exp(-r / 0.6); // falloff with radius
        armDensity += arm;
      }

      // Core brightness
      float core = exp(-r*r*15.0) * 2.0;

      // Star field noise
      float stars = noise(uv * 80.0 + t * 0.02);
      stars = smoothstep(0.75, 0.95, stars);
      float faintStars = noise(uv * 200.0 + 42.0);
      faintStars = smoothstep(0.8, 0.98, faintStars) * 0.3;

      // Stars are denser in arms
      float starDensity = stars * (0.1 + armDensity * 2.0) + faintStars;

      // Dust lanes (dark absorption in arms)
      float dust = fbm(vec2(theta*3.0, r*8.0) + t*0.05);
      dust = smoothstep(0.3, 0.7, dust);
      float absorption = 1.0 - dust * armDensity * 0.4;

      // Color: blue hot near matched pair tips, red/yellow elsewhere
      vec3 armColor = mix(vec3(0.8, 0.6, 0.3), vec3(0.4, 0.5, 0.9), smoothstep(0.2, 0.6, r));
      vec3 coreColor = vec3(1.0, 0.95, 0.7);

      vec3 col = vec3(0.005, 0.005, 0.015); // deep space background

      // Galaxy glow
      col += armColor * armDensity * 0.6 * absorption;
      col += coreColor * core;
      col += vec3(0.9, 0.85, 0.7) * starDensity * absorption;

      // Matched pair binary stars at arm tips
      for(int i = 0; i < 5; i++) {
        vec2 pp = pairPos(i);
        // Rotate with the galaxy
        float pr = length(pp);
        float pa = atan(pp.y, pp.x) + t * 0.15 / (pr + 0.3);
        vec2 rp = vec2(cos(pa), sin(pa)) * pr;

        // Binary pair (two close stars)
        float sep = 0.015;
        vec2 s1 = rp + vec2(cos(t*2.0 + float(i)), sin(t*2.0 + float(i))) * sep;
        vec2 s2 = rp - vec2(cos(t*2.0 + float(i)), sin(t*2.0 + float(i))) * sep;
        float d1 = length(uv - s1);
        float d2 = length(uv - s2);
        // Blue hot stars
        col += vec3(0.4, 0.6, 1.0) * exp(-d1*d1*5000.0) * 3.0;
        col += vec3(1.0, 0.5, 0.3) * exp(-d2*d2*5000.0) * 3.0;
        // Glow
        col += vec3(0.2, 0.3, 0.6) * exp(-d1*d1*300.0) * 0.5;
        col += vec3(0.5, 0.25, 0.15) * exp(-d2*d2*300.0) * 0.5;
      }

      // Vignette
      float vig = 1.0 - smoothstep(0.4, 0.9, r);
      col *= 0.5 + 0.5 * vig;

      col = pow(col, vec3(0.4545));
      gl_FragColor = vec4(col, 1.0);
    }
    `;

    const prog = mkProg(FS);
    gl.useProgram(prog);
    const loc_p = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc_p);
    gl.vertexAttribPointer(loc_p, 2, gl.FLOAT, false, 0, 0);
    const loc_res = gl.getUniformLocation(prog, 'u_res');
    const loc_time = gl.getUniformLocation(prog, 'u_time');

    function frame(t) {
      gl.uniform2f(loc_res, canvas.width, canvas.height);
      gl.uniform1f(loc_time, t * 0.001);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
