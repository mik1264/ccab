<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Finale — Algorithmic Beauty</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'Nunito',sans-serif; overflow:hidden; }
#three-canvas { position:fixed; inset:0; z-index:1; }
#overlay { position:fixed; inset:0; z-index:2; pointer-events:none; }
.back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; pointer-events:auto; }
.back-link:hover { background:#30363d; }
.info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
.info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
.info p { font-size:12px; color:#8b949e; line-height:1.4; }
</style>
</head>
<body>
<a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
<div class="info">
<h2>Grand Finale</h2>
<p>The ultimate showcase combining everything: 3D particle system, dynamic matching graph, and real-time statistics. A celebration of algorithmic beauty.</p>
</div>
<canvas id="overlay"></canvas>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
// ============ THREE.JS 3D SCENE ============
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0d1117, 0.08);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 0, 15);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x0d1117);
renderer.domElement.id = 'three-canvas';
document.body.prepend(renderer.domElement);

// ============ 2D OVERLAY ============
const overlay = document.getElementById('overlay');
const ctx2d = overlay.getContext('2d');
overlay.width = innerWidth;
overlay.height = innerHeight;

// ============ PARTICLE SYSTEM ============
const PARTICLE_COUNT = 500;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
const particleColors = new Float32Array(PARTICLE_COUNT * 3);
const particleVelocities = [];

for (let i = 0; i < PARTICLE_COUNT; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 4 + Math.random() * 4;
    particlePositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
    particlePositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    particlePositions[i*3+2] = r * Math.cos(phi);

    // Soft blue/purple/cyan palette
    const hue = 0.55 + Math.random() * 0.15;
    const col = new THREE.Color().setHSL(hue, 0.6, 0.5 + Math.random() * 0.3);
    particleColors[i*3] = col.r;
    particleColors[i*3+1] = col.g;
    particleColors[i*3+2] = col.b;

    particleVelocities.push({
        theta: theta,
        phi: phi,
        r: r,
        baseR: r,
        speed: 0.001 + Math.random() * 0.003,
        phaseOffset: Math.random() * Math.PI * 2
    });
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

const particleMat = new THREE.PointsMaterial({
    size: 0.08,
    vertexColors: true,
    transparent: true,
    opacity: 0.7,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ============ MATCHING AGENTS (5 MEN + 5 WOMEN) ============
const N = 5;
const menSpheres = [];
const womenSpheres = [];
const matchLines = [];
const menGlows = [];
const womenGlows = [];

for (let i = 0; i < N; i++) {
    // Men - blue spheres
    const mGeo = new THREE.SphereGeometry(0.3, 32, 32);
    const mMat = new THREE.MeshPhongMaterial({
        color: 0x58a6ff,
        emissive: 0x1a4080,
        emissiveIntensity: 0.5,
        shininess: 100
    });
    const mMesh = new THREE.Mesh(mGeo, mMat);
    scene.add(mMesh);
    menSpheres.push(mMesh);

    // Men glow
    const mgGeo = new THREE.SphereGeometry(0.55, 16, 16);
    const mgMat = new THREE.MeshBasicMaterial({ color: 0x58a6ff, transparent: true, opacity: 0.1 });
    const mgMesh = new THREE.Mesh(mgGeo, mgMat);
    scene.add(mgMesh);
    menGlows.push(mgMesh);

    // Women - gold spheres
    const wGeo = new THREE.SphereGeometry(0.3, 32, 32);
    const wMat = new THREE.MeshPhongMaterial({
        color: 0xffd700,
        emissive: 0x806800,
        emissiveIntensity: 0.5,
        shininess: 100
    });
    const wMesh = new THREE.Mesh(wGeo, wMat);
    scene.add(wMesh);
    womenSpheres.push(wMesh);

    // Women glow
    const wgGeo = new THREE.SphereGeometry(0.55, 16, 16);
    const wgMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.1 });
    const wgMesh = new THREE.Mesh(wgGeo, wgMat);
    scene.add(wgMesh);
    womenGlows.push(wgMesh);
}

// Matching line geometry
for (let i = 0; i < N; i++) {
    const lineGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(6);
    lineGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const lineMat = new THREE.LineBasicMaterial({
        color: 0x3fb950,
        transparent: true,
        opacity: 0.8,
        linewidth: 2
    });
    const line = new THREE.Line(lineGeo, lineMat);
    scene.add(line);
    matchLines.push({ line, geo: lineGeo, active: false });
}

// ============ LIGHTING ============
scene.add(new THREE.AmbientLight(0x223344, 0.5));
const dirLight = new THREE.DirectionalLight(0x8888ff, 0.6);
dirLight.position.set(5, 5, 5);
scene.add(dirLight);
const pointLight1 = new THREE.PointLight(0x58a6ff, 0.4, 30);
pointLight1.position.set(-5, 3, 5);
scene.add(pointLight1);
const pointLight2 = new THREE.PointLight(0xffd700, 0.3, 30);
pointLight2.position.set(5, -3, 5);
scene.add(pointLight2);

// ============ GALE-SHAPLEY ============
function shuffle(a) { let b=[...a]; for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

let currentMatching = Array(N).fill(-1);
let matchingCycle = 0;
let totalProposals = 0;
let totalStable = 0;

function runMatching() {
    let mPrefs = [], wPrefs = [];
    for (let i = 0; i < N; i++) { mPrefs.push(shuffle([0,1,2,3,4])); wPrefs.push(shuffle([0,1,2,3,4])); }
    let mp = Array(N).fill(-1), wp = Array(N).fill(-1), mn = Array(N).fill(0);
    let free = [...Array(N).keys()];
    let proposals = 0;
    while (free.length) {
        let m=free[0], w=mPrefs[m][mn[m]]; mn[m]++; proposals++;
        if(wp[w]===-1){mp[m]=w;wp[w]=m;free.shift();}
        else{let c=wp[w];if(wPrefs[w].indexOf(m)<wPrefs[w].indexOf(c)){mp[m]=w;wp[w]=m;mp[c]=-1;free.shift();free.push(c);}else{}}
    }
    currentMatching = mp;
    matchingCycle++;
    totalProposals += proposals;
    totalStable++;
    return proposals;
}

let proposals = runMatching();
let lastMatchTime = 0;

// ============ SCROLLING TEXT ============
const algorithmText = [
    'Deferred Acceptance Algorithm',
    'Each man proposes to his top-ranked woman',
    'Women tentatively accept or reject',
    'Rejected men propose to next choice',
    'Process continues until all are matched',
    'The result is always a stable matching',
    'No pair would prefer each other over partners',
    'Men-optimal: best for every man simultaneously',
    'Women-pessimal: worst stable partner for women',
    'The lattice of stable matchings is beautiful',
    'Gale & Shapley, 1962 — Nobel Prize 2012',
    'Algorithmic beauty in mathematical matching'
];
let textScrollY = 0;

// ============ ANIMATION ============
let t = 0;
let breathPhase = 0; // controls expand/contract

function animate() {
    requestAnimationFrame(animate);
    t += 0.016;

    // Cycle matchings every 5 seconds
    if (t - lastMatchTime > 5) {
        lastMatchTime = t;
        proposals = runMatching();
    }

    // ========= UPDATE PARTICLES =========
    breathPhase = Math.sin(t * 0.3) * 0.5 + 0.5; // 0 to 1, smooth

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const v = particleVelocities[i];
        v.theta += v.speed;
        v.phi += v.speed * 0.3;

        // Breathing: expand/contract
        const targetR = v.baseR * (0.7 + breathPhase * 0.6);
        v.r += (targetR - v.r) * 0.02;

        particlePositions[i*3] = v.r * Math.sin(v.phi) * Math.cos(v.theta);
        particlePositions[i*3+1] = v.r * Math.sin(v.phi) * Math.sin(v.theta);
        particlePositions[i*3+2] = v.r * Math.cos(v.phi);
    }
    particleGeo.attributes.position.needsUpdate = true;

    // ========= UPDATE MATCHING AGENTS =========
    const agentRadius = 2.2;
    for (let i = 0; i < N; i++) {
        const mAngle = -Math.PI/2 + (i / N) * Math.PI * 0.8 + t * 0.1;
        menSpheres[i].position.set(
            -agentRadius + Math.sin(mAngle) * 0.3,
            agentRadius * Math.cos(mAngle * 0.5 + i * 1.2),
            Math.sin(t * 0.5 + i) * 0.5
        );
        menGlows[i].position.copy(menSpheres[i].position);
        menGlows[i].material.opacity = 0.08 + 0.04 * Math.sin(t * 2 + i);

        const wAngle = -Math.PI/2 + (i / N) * Math.PI * 0.8 + t * 0.1;
        womenSpheres[i].position.set(
            agentRadius + Math.sin(wAngle) * 0.3,
            agentRadius * Math.cos(wAngle * 0.5 + i * 1.2),
            Math.sin(t * 0.5 + i + 2) * 0.5
        );
        womenGlows[i].position.copy(womenSpheres[i].position);
        womenGlows[i].material.opacity = 0.08 + 0.04 * Math.sin(t * 2 + i + 1);

        // Pulse scale
        const pulse = 1 + 0.1 * Math.sin(t * 3 + i);
        menSpheres[i].scale.setScalar(pulse);
        womenSpheres[i].scale.setScalar(pulse);
    }

    // Update matching lines
    for (let m = 0; m < N; m++) {
        const w = currentMatching[m];
        if (w >= 0) {
            matchLines[m].active = true;
            const pos = matchLines[m].geo.attributes.position.array;
            const mp = menSpheres[m].position;
            const wp = womenSpheres[w].position;
            pos[0] = mp.x; pos[1] = mp.y; pos[2] = mp.z;
            pos[3] = wp.x; pos[4] = wp.y; pos[5] = wp.z;
            matchLines[m].geo.attributes.position.needsUpdate = true;
            matchLines[m].line.material.opacity = 0.5 + 0.3 * Math.sin(t * 2 + m);
            matchLines[m].line.visible = true;
        } else {
            matchLines[m].line.visible = false;
        }
    }

    // Camera slow orbit
    camera.position.x = Math.sin(t * 0.08) * 3;
    camera.position.y = Math.sin(t * 0.05) * 2;
    camera.position.z = 12 + Math.sin(t * 0.1) * 2;
    camera.lookAt(0, 0, 0);

    // Rotate particle system
    particles.rotation.y = t * 0.05;
    particles.rotation.x = Math.sin(t * 0.03) * 0.1;

    renderer.render(scene, camera);

    // ========= 2D OVERLAY =========
    ctx2d.clearRect(0, 0, overlay.width, overlay.height);

    // Stats panel (top-right)
    const statsX = overlay.width - 220;
    const statsY = 20;
    ctx2d.fillStyle = 'rgba(13,17,23,0.75)';
    ctx2d.strokeStyle = '#30363d';
    ctx2d.lineWidth = 1;
    roundRect(ctx2d, statsX, statsY, 200, 130, 10);
    ctx2d.fill();
    ctx2d.stroke();

    ctx2d.fillStyle = '#58a6ff';
    ctx2d.font = '600 13px Lora';
    ctx2d.textAlign = 'left';
    ctx2d.fillText('Algorithm Statistics', statsX + 15, statsY + 25);

    ctx2d.fillStyle = '#8b949e';
    ctx2d.font = '400 12px Nunito';
    ctx2d.fillText('Matchings Computed:', statsX + 15, statsY + 50);
    ctx2d.fillText('Total Proposals:', statsX + 15, statsY + 72);
    ctx2d.fillText('Stable Pairs Found:', statsX + 15, statsY + 94);
    ctx2d.fillText('Current Proposals:', statsX + 15, statsY + 116);

    // Animated counter effect
    ctx2d.fillStyle = '#3fb950';
    ctx2d.font = '600 12px Nunito';
    ctx2d.textAlign = 'right';
    const animCount = (val) => Math.floor(val + Math.sin(t * 10) * 0.4);
    ctx2d.fillText(animCount(matchingCycle), statsX + 190, statsY + 50);
    ctx2d.fillText(animCount(totalProposals), statsX + 190, statsY + 72);
    ctx2d.fillText(animCount(totalStable * N), statsX + 190, statsY + 94);
    ctx2d.fillStyle = '#e3b341';
    ctx2d.fillText(proposals, statsX + 190, statsY + 116);

    // Scrolling algorithm text (bottom center)
    textScrollY -= 0.4;
    const textBaseY = overlay.height - 30;
    ctx2d.font = '400 13px Nunito';
    ctx2d.textAlign = 'center';
    for (let i = 0; i < algorithmText.length; i++) {
        const y = textBaseY + textScrollY + i * 24;
        if (y > overlay.height - 70 && y < overlay.height) {
            const fade = Math.min(1, (overlay.height - y) / 30, (y - (overlay.height - 70)) / 15);
            ctx2d.fillStyle = `rgba(139,148,158,${fade * 0.7})`;
            ctx2d.fillText(algorithmText[i], overlay.width / 2, y);
        }
    }
    if (textScrollY < -(algorithmText.length * 24 + 20)) {
        textScrollY = 50;
    }

    // Title flash (periodically)
    const titleAlpha = Math.max(0, Math.sin(t * 0.5) * 0.3);
    if (titleAlpha > 0.05) {
        ctx2d.fillStyle = `rgba(88,166,255,${titleAlpha})`;
        ctx2d.font = '700 28px Lora';
        ctx2d.textAlign = 'center';
        ctx2d.fillText('The Beauty of Stable Matching', overlay.width / 2, overlay.height / 2 + 180);
    }

    // Matching cycle indicator
    const cycleColors = ['#3fb950', '#e3b341', '#d2a8ff'];
    const cycleLabels = ['Men-Optimal', 'Balanced', 'Women-Optimal'];
    const cycleIdx = matchingCycle % 3;
    ctx2d.fillStyle = cycleColors[cycleIdx];
    ctx2d.font = '600 14px Lora';
    ctx2d.textAlign = 'center';
    ctx2d.fillText(cycleLabels[cycleIdx] + ' Matching', overlay.width / 2, 30);

    // Subtle vignette
    const vGrad = ctx2d.createRadialGradient(
        overlay.width/2, overlay.height/2, overlay.width * 0.3,
        overlay.width/2, overlay.height/2, overlay.width * 0.7
    );
    vGrad.addColorStop(0, 'rgba(13,17,23,0)');
    vGrad.addColorStop(1, 'rgba(13,17,23,0.4)');
    ctx2d.fillStyle = vGrad;
    ctx2d.fillRect(0, 0, overlay.width, overlay.height);
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

animate();

window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    overlay.width = innerWidth;
    overlay.height = innerHeight;
});
</script>
</body>
</html>
