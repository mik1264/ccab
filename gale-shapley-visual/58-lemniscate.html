<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lemniscate of Matching — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Lemniscate of Matching</h2><p>Matched pairs orbit along figure-8 (lemniscate) paths — an eternal dance symbolizing mutual stability. Each pair's orbit size encodes their preference compatibility.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    let t = 0;
    const N = 5; // 5 matched pairs

    // Pair parameters
    const pairs = [
      { a: 130, hueA: 200, hueB: 20,  speed: 0.6, phase: 0 },
      { a: 110, hueA: 160, hueB: 330, speed: 0.8, phase: 1.2 },
      { a: 95,  hueA: 240, hueB: 50,  speed: 0.5, phase: 2.4 },
      { a: 80,  hueA: 280, hueB: 140, speed: 0.7, phase: 3.6 },
      { a: 65,  hueA: 310, hueB: 100, speed: 0.9, phase: 4.8 }
    ];

    // Trail history per agent
    const trails = pairs.map(() => ({ a: [], b: [] }));
    const maxTrail = 200;

    // Lemniscate of Bernoulli: x = a*cos(t)/(1+sin^2(t)), y = a*sin(t)*cos(t)/(1+sin^2(t))
    function lemniscatePos(a, theta) {
      const s = Math.sin(theta);
      const c = Math.cos(theta);
      const denom = 1 + s * s;
      return {
        x: a * c / denom,
        y: a * s * c / denom
      };
    }

    // Layout: arrange pairs
    function getPairCenter(i) {
      const cols = 3;
      const row = i < 3 ? 0 : 1;
      const col = i < 3 ? i : i - 3 + 0.5;
      return {
        x: canvas.width * (0.2 + col * 0.3),
        y: canvas.height * (0.35 + row * 0.35)
      };
    }

    function draw() {
      ctx.fillStyle = 'rgba(13,17,23,0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < N; i++) {
        const p = pairs[i];
        const center = getPairCenter(i);
        const theta = t * p.speed + p.phase;

        // Agent A traces forward
        const posA = lemniscatePos(p.a, theta);
        // Agent B traces with phase offset (opposite loop)
        const posB = lemniscatePos(p.a, theta + Math.PI);

        const axAbs = center.x + posA.x;
        const ayAbs = center.y + posA.y;
        const bxAbs = center.x + posB.x;
        const byAbs = center.y + posB.y;

        // Add to trails
        trails[i].a.unshift({ x: axAbs, y: ayAbs });
        trails[i].b.unshift({ x: bxAbs, y: byAbs });
        if (trails[i].a.length > maxTrail) trails[i].a.pop();
        if (trails[i].b.length > maxTrail) trails[i].b.pop();

        // Draw lemniscate path (faint)
        ctx.beginPath();
        for (let s = 0; s <= 200; s++) {
          const angle = (s / 200) * Math.PI * 2;
          const pos = lemniscatePos(p.a, angle);
          if (s === 0) ctx.moveTo(center.x + pos.x, center.y + pos.y);
          else ctx.lineTo(center.x + pos.x, center.y + pos.y);
        }
        ctx.closePath();
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Draw trail A
        if (trails[i].a.length > 1) {
          ctx.beginPath();
          ctx.moveTo(trails[i].a[0].x, trails[i].a[0].y);
          for (let j = 1; j < trails[i].a.length; j++) {
            ctx.lineTo(trails[i].a[j].x, trails[i].a[j].y);
          }
          ctx.strokeStyle = `hsla(${p.hueA}, 80%, 60%, 0.6)`;
          ctx.lineWidth = 2.5;
          ctx.stroke();

          // Glow
          ctx.strokeStyle = `hsla(${p.hueA}, 80%, 60%, 0.1)`;
          ctx.lineWidth = 8;
          ctx.stroke();
        }

        // Draw trail B
        if (trails[i].b.length > 1) {
          ctx.beginPath();
          ctx.moveTo(trails[i].b[0].x, trails[i].b[0].y);
          for (let j = 1; j < trails[i].b.length; j++) {
            ctx.lineTo(trails[i].b[j].x, trails[i].b[j].y);
          }
          ctx.strokeStyle = `hsla(${p.hueB}, 80%, 60%, 0.6)`;
          ctx.lineWidth = 2.5;
          ctx.stroke();

          ctx.strokeStyle = `hsla(${p.hueB}, 80%, 60%, 0.1)`;
          ctx.lineWidth = 8;
          ctx.stroke();
        }

        // Draw agent dots
        // Agent A (man - cool color)
        ctx.beginPath();
        ctx.arc(axAbs, ayAbs, 6, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${p.hueA}, 90%, 70%)`;
        ctx.fill();

        // Agent B (woman - warm color)
        ctx.beginPath();
        ctx.arc(bxAbs, byAbs, 6, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${p.hueB}, 90%, 70%)`;
        ctx.fill();

        // Crossing point glow (center of lemniscate = stable equilibrium)
        const pulseSize = 6 + 3 * Math.sin(t * 2 + i);
        const grad = ctx.createRadialGradient(center.x, center.y, 0, center.x, center.y, pulseSize * 2);
        grad.addColorStop(0, 'rgba(255,215,0,0.4)');
        grad.addColorStop(1, 'rgba(255,215,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(center.x, center.y, pulseSize * 2, 0, Math.PI * 2);
        ctx.fill();

        // Label
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.font = '11px Nunito';
        ctx.textAlign = 'center';
        ctx.fillText(`Pair ${i + 1}`, center.x, center.y + p.a + 25);
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      draw();
    }
    animate();
  </script>
</body>
</html>
