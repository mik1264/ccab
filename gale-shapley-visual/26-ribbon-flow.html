<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flowing Preference Ribbons — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">&#8592; Visual Gallery</a>
  <div class="info"><h2>Flowing Preference Ribbons</h2><p>Preference lists become flowing ribbons in 3D space. Higher preferences are brighter, wider ribbons. The stable matching emerges as the dominant flow.</p></div>
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1117);
    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 14);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    scene.add(new THREE.AmbientLight(0x222244, 0.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const N = 6;
    // Men on left, women on right
    const menY = [];
    const womenY = [];
    for (let i = 0; i < N; i++) {
      menY.push((i - (N-1)/2) * 1.8);
      womenY.push((i - (N-1)/2) * 1.8);
    }
    const leftX = -6;
    const rightX = 6;

    // Preference lists (man i prefers woman prefs[i][0] most, etc.)
    const prefs = [
      [1,0,2,3,5,4],
      [3,1,0,2,4,5],
      [0,2,1,4,3,5],
      [5,3,2,1,0,4],
      [2,4,0,1,5,3],
      [4,5,1,3,2,0]
    ];

    // Matching result: man i matched to woman matching[i]
    const matching = [1,3,0,5,2,4];

    const ribbons = [];
    const ribbonGroup = new THREE.Group();
    scene.add(ribbonGroup);

    for (let m = 0; m < N; m++) {
      for (let rank = 0; rank < N; rank++) {
        const w = prefs[m][rank];
        const isMatched = matching[m] === w;
        const thickness = (1 / (rank + 1)) * 0.06;

        const startP = new THREE.Vector3(leftX, menY[m], 0);
        const endP = new THREE.Vector3(rightX, womenY[w], 0);
        const mid1 = new THREE.Vector3(leftX + 3, menY[m] + (womenY[w] - menY[m]) * 0.3, (Math.random() - 0.5) * 2);
        const mid2 = new THREE.Vector3(rightX - 3, menY[m] + (womenY[w] - menY[m]) * 0.7, (Math.random() - 0.5) * 2);
        const curve = new THREE.CatmullRomCurve3([startP, mid1, mid2, endP]);

        const tubeRadius = isMatched ? 0.06 : thickness;
        const tubeGeo = new THREE.TubeGeometry(curve, 30, tubeRadius, 8, false);

        let color, emissive, opacity;
        if (isMatched) {
          color = 0x00ff66;
          emissive = 0x00cc44;
          opacity = 0.9;
        } else {
          const blueIntensity = Math.max(0.15, 1 - rank * 0.15);
          color = new THREE.Color().setHSL(0.6, 0.7, blueIntensity * 0.5);
          emissive = new THREE.Color().setHSL(0.6, 0.5, blueIntensity * 0.3);
          opacity = Math.max(0.08, 0.4 - rank * 0.06);
        }

        const mat = new THREE.MeshPhongMaterial({
          color: color,
          emissive: emissive,
          emissiveIntensity: isMatched ? 0.8 : 0.3,
          transparent: true,
          opacity: opacity,
          shininess: 60
        });

        const mesh = new THREE.Mesh(tubeGeo, mat);
        ribbonGroup.add(mesh);

        ribbons.push({
          mesh,
          curve,
          isMatched,
          manIdx: m,
          rank
        });
      }
    }

    // Man and woman node spheres
    const sphereGeo = new THREE.SphereGeometry(0.25, 16, 16);
    for (let i = 0; i < N; i++) {
      const manMat = new THREE.MeshPhongMaterial({ color: 0x3388ff, emissive: 0x2266dd, emissiveIntensity: 0.6 });
      const manMesh = new THREE.Mesh(sphereGeo, manMat);
      manMesh.position.set(leftX, menY[i], 0);
      ribbonGroup.add(manMesh);

      const womanMat = new THREE.MeshPhongMaterial({ color: 0xaa44dd, emissive: 0x8822bb, emissiveIntensity: 0.6 });
      const womanMesh = new THREE.Mesh(sphereGeo, womanMat);
      womanMesh.position.set(rightX, womenY[i], 0);
      ribbonGroup.add(womanMesh);
    }

    function animate(t) {
      requestAnimationFrame(animate);
      const time = t * 0.001;

      // Camera orbit
      camera.position.x = Math.sin(time * 0.15) * 14;
      camera.position.z = Math.cos(time * 0.15) * 14;
      camera.position.y = Math.sin(time * 0.1) * 2 + 2;
      camera.lookAt(0, 0, 0);

      // Animate ribbon flow via vertex displacement
      ribbons.forEach((r, idx) => {
        const positions = r.mesh.geometry.attributes.position;
        for (let i = 0; i < positions.count; i++) {
          const x = positions.getX(i);
          const y = positions.getY(i);
          const z = positions.getZ(i);
          const wave = Math.sin(x * 0.5 + time * 2 + idx * 0.3) * 0.08;
          positions.setZ(i, z + wave * 0.02);
        }
        positions.needsUpdate = true;
      });

      // Pulse matched ribbons
      ribbons.filter(r => r.isMatched).forEach((r, i) => {
        r.mesh.material.emissiveIntensity = 0.6 + Math.sin(time * 2 + i) * 0.3;
      });

      renderer.render(scene, camera);
    }
    animate(0);
  </script>
</body>
</html>
