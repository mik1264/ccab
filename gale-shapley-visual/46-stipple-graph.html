<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stipple Portrait — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Stipple Portrait</h2><p>Weighted stippling creates a dot portrait of the preference graph. Denser stippling = stronger preference; sparse regions = weak preferences.</p></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let stipples = [];
    let maxStipples = 5000;
    let currentCount = 0;
    let densityField;
    let gridW, gridH;
    let cellSize = 5;

    // 5x5 preference matrix: menPrefs[i][j] = man i's rank for woman j (1=best)
    let menPrefs = [
      [1,3,2,5,4],
      [2,1,4,3,5],
      [1,5,3,2,4],
      [4,2,1,5,3],
      [3,4,5,1,2]
    ];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);

      gridW = ceil(width / cellSize);
      gridH = ceil(height / cellSize);
      densityField = new Float32Array(gridW * gridH);

      buildDensityField();
    }

    function buildDensityField() {
      // Map the 5x5 preference matrix to screen space
      let margin = 80;
      let usableW = width - margin * 2;
      let usableH = height - margin * 2;
      let cellW = usableW / 5;
      let cellH = usableH / 5;

      for (let gx = 0; gx < gridW; gx++) {
        for (let gy = 0; gy < gridH; gy++) {
          let px = gx * cellSize;
          let py = gy * cellSize;

          // Which preference cell are we in?
          let mi = floor((px - margin) / cellW);
          let wj = floor((py - margin) / cellH);

          let density = 0.05; // Base density

          if (mi >= 0 && mi < 5 && wj >= 0 && wj < 5) {
            let rank = menPrefs[mi][wj];
            // Higher density for rank 1, lower for rank 5
            density = map(1 / rank, 0.2, 1, 0.1, 1.0);

            // Extra density at center of each cell
            let cx = margin + mi * cellW + cellW / 2;
            let cy = margin + wj * cellH + cellH / 2;
            let d = dist(px, py, cx, cy);
            let maxD = min(cellW, cellH) * 0.5;
            if (d < maxD) {
              density *= map(d, 0, maxD, 1.5, 0.8);
            }
          }

          densityField[gx + gy * gridW] = density;
        }
      }
    }

    function samplePosition() {
      // Weighted random sampling from density field
      for (let attempt = 0; attempt < 50; attempt++) {
        let gx = floor(random(gridW));
        let gy = floor(random(gridH));
        let density = densityField[gx + gy * gridW];

        if (random() < density) {
          return {
            x: gx * cellSize + random(cellSize),
            y: gy * cellSize + random(cellSize)
          };
        }
      }
      return { x: random(width), y: random(height) };
    }

    function draw() {
      background(13, 17, 23);

      let margin = 80;
      let usableW = width - margin * 2;
      let usableH = height - margin * 2;
      let cellW = usableW / 5;
      let cellH = usableH / 5;

      // Add new stipples
      let addPerFrame = 40;
      for (let i = 0; i < addPerFrame && currentCount < maxStipples; i++) {
        let pos = samplePosition();
        let mi = floor((pos.x - margin) / cellW);
        let wj = floor((pos.y - margin) / cellH);

        let hue = 210; // default blue
        let sat = 60;
        if (mi >= 0 && mi < 5 && wj >= 0 && wj < 5) {
          // Color by man (column)
          hue = [200, 220, 180, 160, 240][mi];
          // Saturation by rank
          let rank = menPrefs[mi][wj];
          sat = map(rank, 1, 5, 85, 30);
        } else {
          hue = 0;
          sat = 0;
        }

        stipples.push({
          x: pos.x,
          y: pos.y,
          hue: hue,
          sat: sat,
          drift: { x: random(-0.2, 0.2), y: random(-0.2, 0.2) },
          size: random(1.5, 3.5)
        });
        currentCount++;
      }

      // Draw grid lines (very subtle)
      stroke(210, 30, 40, 10);
      strokeWeight(0.5);
      for (let i = 0; i <= 5; i++) {
        let x = margin + i * cellW;
        let y = margin + i * cellH;
        line(x, margin, x, margin + usableH);
        line(margin, y, margin + usableW, y);
      }

      // Draw row/column labels
      noStroke();
      textFont('Nunito');
      textSize(11);
      textAlign(CENTER, CENTER);
      for (let i = 0; i < 5; i++) {
        // Men across top
        fill(210, 60, 90, 60);
        text('M' + (i + 1), margin + i * cellW + cellW / 2, margin - 18);
        // Women down left
        fill(310, 60, 90, 60);
        text('W' + (i + 1), margin - 22, margin + i * cellH + cellH / 2);
      }

      // Draw stipples with slow drift
      noStroke();
      for (let s of stipples) {
        // Gentle drift
        s.x += s.drift.x + sin(frameCount * 0.01 + s.x * 0.01) * 0.1;
        s.y += s.drift.y + cos(frameCount * 0.01 + s.y * 0.01) * 0.1;

        fill(s.hue, s.sat, 90, 70);
        ellipse(s.x, s.y, s.size, s.size);
      }

      // Highlight matched pairs with subtle outlines
      noFill();
      strokeWeight(1.5);
      let matchedJ = [0, 1, 2, 3, 4]; // Man i matched with woman matchedJ[i]
      for (let i = 0; i < 5; i++) {
        let j = matchedJ[i];
        let cx = margin + i * cellW + cellW / 2;
        let cy = margin + j * cellH + cellH / 2;
        stroke(45, 80, 100, 30 + sin(frameCount * 0.03 + i) * 15);
        let sz = min(cellW, cellH) * 0.7;
        ellipse(cx, cy, sz, sz);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      gridW = ceil(width / cellSize);
      gridH = ceil(height / cellSize);
      densityField = new Float32Array(gridW * gridH);
      buildDensityField();
    }
  </script>
</body>
</html>
