<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spirograph Matching Pairs — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Spirograph Matching Pairs</h2><p>Each matched pair generates a unique spirograph — hypotrochoid/epitrochoid parameters derived from their preference ranks. Perfect matches make clean flowers; complex preferences make intricate patterns.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    let t = 0;
    const N = 5;
    // Preference ranks for each pair (1 = top choice)
    const manRank =   [1, 2, 1, 3, 2]; // man i's rank of matched woman
    const womanRank = [1, 1, 3, 2, 4]; // woman j's rank of matched man

    const hues = [0, 60, 140, 210, 300];

    // Spirograph parameters per pair
    const spiros = [];
    for (let i = 0; i < N; i++) {
      const R = 60 + i * 5;
      const rRatio = 0.2 + manRank[i] * 0.12;
      const r = R * rRatio;
      const d = r * (0.5 + womanRank[i] * 0.15);
      spiros.push({ R, r, d, hue: hues[i] });
    }

    // Layout: arrange 5 spirographs
    function getCenter(i) {
      const cols = 3;
      const row = i < 3 ? 0 : 1;
      const col = i < 3 ? i : i - 3 + 0.5;
      const gapX = canvas.width / (cols + 0.5);
      const gapY = canvas.height / 3;
      return {
        x: gapX * (col + 0.75),
        y: gapY * (row + 0.8)
      };
    }

    function draw() {
      ctx.fillStyle = 'rgba(13,17,23,0.06)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const maxAngle = t * 1.2;

      for (let i = 0; i < N; i++) {
        const { R, r, d, hue } = spiros[i];
        const center = getCenter(i);
        const steps = Math.min(Math.floor(maxAngle * 60), 6000);

        ctx.beginPath();
        for (let s = 0; s <= steps; s++) {
          const angle = (s / 60);
          // Hypotrochoid: x = (R-r)*cos(t) + d*cos((R-r)/r * t)
          const px = (R - r) * Math.cos(angle) + d * Math.cos(((R - r) / r) * angle);
          const py = (R - r) * Math.sin(angle) - d * Math.sin(((R - r) / r) * angle);
          if (s === 0) ctx.moveTo(center.x + px, center.y + py);
          else ctx.lineTo(center.x + px, center.y + py);
        }
        const alpha = 0.7 + 0.3 * Math.sin(t * 0.5 + i);
        ctx.strokeStyle = `hsla(${hue}, 90%, 65%, ${alpha})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Draw center dot
        ctx.beginPath();
        ctx.arc(center.x, center.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${hue}, 90%, 80%, 0.8)`;
        ctx.fill();

        // Label
        ctx.fillStyle = `hsla(${hue}, 70%, 70%, 0.6)`;
        ctx.font = '11px Nunito';
        ctx.textAlign = 'center';
        ctx.fillText(`Pair ${i + 1}`, center.x, center.y + R + 20);
      }
    }

    // Initial clear
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      draw();
    }
    animate();
  </script>
</body>
</html>
