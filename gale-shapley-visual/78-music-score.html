<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Musical Score — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Musical Score</h2><p>The preference rankings become musical notes on a staff. The stable matching is the harmony — all notes resolving to consonant chords.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    const N = 5;
    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
    const menPrefs = Array.from({length:N},()=>shuffle([0,1,2,3,4]));
    const womenPrefs = Array.from({length:N},()=>shuffle([0,1,2,3,4]));
    const womenRank = womenPrefs.map(p=>{const r=[];p.forEach((m,i)=>r[m]=i);return r;});

    // Run GS
    const menNext = Array(N).fill(0);
    const womenPartner = Array(N).fill(-1);
    const menFree = Array(N).fill(true);
    let free = N;
    while (free > 0) {
      for (let m = 0; m < N; m++) {
        if (!menFree[m] || menNext[m] >= N) continue;
        const w = menPrefs[m][menNext[m]]; menNext[m]++;
        if (womenPartner[w] === -1) {
          womenPartner[w] = m; menFree[m] = false; free--;
        } else {
          const c = womenPartner[w];
          if (womenRank[w][m] < womenRank[w][c]) {
            womenPartner[w] = m; menFree[m] = false; menFree[c] = true;
          }
        }
      }
    }

    const noteNames = ['C','D','E','F','G','A','B','C5','D5','E5'];
    const chordNames = ['Cmaj','Dm','Em','Am','G7'];

    // Staff parameters
    const staffLineSpacing = 12;
    const staffTop = () => canvas.height * 0.2;
    const staffBottom = () => canvas.height * 0.8;

    function drawStaff(x, y, width, label) {
      // 5 staff lines
      ctx.strokeStyle = '#30363d';
      ctx.lineWidth = 1;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.moveTo(x, y + i * staffLineSpacing);
        ctx.lineTo(x + width, y + i * staffLineSpacing);
        ctx.stroke();
      }
      // Bracket
      ctx.strokeStyle = '#484f58';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x, y + 4 * staffLineSpacing);
      ctx.stroke();

      // Label
      ctx.fillStyle = '#8b949e';
      ctx.font = '11px Lora';
      ctx.textAlign = 'right';
      ctx.fillText(label, x - 8, y + 2.5 * staffLineSpacing);
    }

    // Draw treble clef (simplified)
    function drawClef(x, y) {
      ctx.strokeStyle = '#58a6ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      // Simplified treble clef curve
      ctx.moveTo(x, y + 3 * staffLineSpacing);
      ctx.bezierCurveTo(x - 8, y + staffLineSpacing, x + 12, y - staffLineSpacing, x + 4, y + 0.5 * staffLineSpacing);
      ctx.bezierCurveTo(x - 4, y + 2 * staffLineSpacing, x + 10, y + 4.5 * staffLineSpacing, x + 2, y + 3.5 * staffLineSpacing);
      ctx.stroke();

      // Vertical line
      ctx.beginPath();
      ctx.moveTo(x + 4, y - staffLineSpacing * 0.5);
      ctx.lineTo(x + 4, y + 4.5 * staffLineSpacing);
      ctx.stroke();
    }

    // Draw a note
    function drawNote(x, y, color, glow, label) {
      if (glow) {
        const g = ctx.createRadialGradient(x, y, 0, x, y, 20);
        g.addColorStop(0, color + '40');
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI * 2);
        ctx.fill();
      }

      // Note head (ellipse)
      ctx.fillStyle = color;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(-0.3);
      ctx.beginPath();
      ctx.ellipse(0, 0, 7, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Stem
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + 6, y);
      ctx.lineTo(x + 6, y - 30);
      ctx.stroke();

      // Label
      if (label) {
        ctx.fillStyle = color;
        ctx.font = '9px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText(label, x, y + 18);
      }
    }

    // Playhead
    let playheadX = 0;
    const playSpeed = 80; // pixels per second
    let lastTime = performance.now();
    let started = false;
    let startDelay = 2;

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Parchment overlay
      ctx.fillStyle = 'rgba(30,25,20,0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const marginLeft = 120;
      const staffWidth = canvas.width - marginLeft - 60;
      const noteSpacing = staffWidth / (N + 1);

      // Men's staff (top)
      const menStaffY = canvas.height * 0.25;
      drawStaff(marginLeft, menStaffY, staffWidth, 'Proposers');
      drawClef(marginLeft + 15, menStaffY);

      // Women's staff (bottom)
      const womenStaffY = canvas.height * 0.55;
      drawStaff(marginLeft, womenStaffY, staffWidth, 'Receivers');
      drawClef(marginLeft + 15, womenStaffY);

      // Draw men's notes (positioned by their top preference rank)
      for (let m = 0; m < N; m++) {
        const nx = marginLeft + (m + 1) * noteSpacing;
        // Rank 0 = top of staff, rank 4 = bottom
        const topPref = menPrefs[m][0]; // their top choice
        const noteY = menStaffY + topPref * staffLineSpacing;
        const matched = womenPartner.includes(m);
        const glowing = started && playheadX > nx - 10;
        drawNote(nx, noteY, '#58a6ff', glowing && matched, 'M' + (m+1));
      }

      // Draw women's notes (positioned by their top preference rank)
      for (let w = 0; w < N; w++) {
        const nx = marginLeft + (w + 1) * noteSpacing;
        const topPref = womenPrefs[w][0];
        const noteY = womenStaffY + topPref * staffLineSpacing;
        const matched = womenPartner[w] >= 0;
        const glowing = started && playheadX > nx - 10;
        drawNote(nx, noteY, '#c084fc', glowing && matched, 'W' + (w+1));
      }

      // Draw chord beams for matched pairs
      for (let w = 0; w < N; w++) {
        const m = womenPartner[w];
        if (m < 0) continue;
        const mnx = marginLeft + (m + 1) * noteSpacing;
        const wnx = marginLeft + (w + 1) * noteSpacing;

        if (started && playheadX > Math.max(mnx, wnx)) {
          // Connecting beam
          const mny = menStaffY + menPrefs[m][0] * staffLineSpacing;
          const wny = womenStaffY + womenPrefs[w][0] * staffLineSpacing;

          ctx.strokeStyle = 'rgba(74,222,128,0.4)';
          ctx.lineWidth = 2;
          ctx.setLineDash([4, 4]);
          ctx.beginPath();
          ctx.moveTo(mnx, mny + 18);
          ctx.lineTo(wnx, wny - 18);
          ctx.stroke();
          ctx.setLineDash([]);

          // Chord name
          const mx = (mnx + wnx) / 2;
          const my = (menStaffY + 5 * staffLineSpacing + womenStaffY) / 2;
          ctx.fillStyle = '#4ade80';
          ctx.font = 'bold 11px Lora';
          ctx.textAlign = 'center';
          ctx.fillText(chordNames[w % chordNames.length], mx, my);
        }
      }

      // Playhead animation
      startDelay -= dt;
      if (startDelay <= 0) {
        started = true;
        playheadX += playSpeed * dt;
      }

      if (started && playheadX < staffWidth + marginLeft + 30) {
        const phx = marginLeft + playheadX - marginLeft;
        ctx.strokeStyle = 'rgba(251,191,36,0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(phx, menStaffY - 20);
        ctx.lineTo(phx, womenStaffY + 5 * staffLineSpacing + 20);
        ctx.stroke();

        // Glow
        const g = ctx.createLinearGradient(phx - 15, 0, phx + 15, 0);
        g.addColorStop(0, 'transparent');
        g.addColorStop(0.5, 'rgba(251,191,36,0.1)');
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.fillRect(phx - 15, menStaffY - 20, 30, womenStaffY + 5*staffLineSpacing - menStaffY + 40);
      }

      // Title
      ctx.fillStyle = '#58a6ff';
      ctx.font = '16px Lora';
      ctx.textAlign = 'center';
      ctx.fillText('The Harmony of Stable Matching', canvas.width / 2, canvas.height * 0.1);

      if (playheadX > staffWidth + 30) {
        ctx.fillStyle = '#4ade80';
        ctx.font = 'bold 16px Lora';
        ctx.textAlign = 'center';
        ctx.fillText('All notes resolve — consonant harmony achieved!', canvas.width/2, canvas.height - 30);
      }

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
