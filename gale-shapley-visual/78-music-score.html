<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Score — Matching Algorithms Visual Gallery</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:sans-serif; }
    canvas { display:block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background:#30363d; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 8;
    let studentPrefs = [], schoolPrefs = [];
    let rounds = [];
    let stableMatches = [];
    let currentRound = -1;
    let roundTimer = 0;
    let scrollX = 0;
    let staffSpacing, measureWidth;
    let notePositions = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      staffSpacing = height * 0.04;
      measureWidth = width * 0.18;

      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffleArray([...Array(N).keys()]));
        schoolPrefs.push(shuffleArray([...Array(N).keys()]));
      }

      simulateDA();
    }

    function simulateDA() {
      let n = N;
      let free = [...Array(n).keys()];
      let proposals = new Array(n).fill(0);
      let schoolMatch = new Array(n).fill(-1);
      let studentMatch = new Array(n).fill(-1);
      let schRank = [];
      for (let i = 0; i < n; i++) {
        schRank[i] = new Array(n);
        for (let r = 0; r < n; r++) schRank[i][schoolPrefs[i][r]] = r;
      }

      let roundNum = 0;
      while (free.length > 0) {
        let roundEvents = [];
        let newFree = [];
        let toRemove = [];
        for (let fi = 0; fi < free.length; fi++) {
          let s = free[fi];
          if (proposals[s] >= n) continue;
          let sch = studentPrefs[s][proposals[s]];
          proposals[s]++;
          if (schoolMatch[sch] === -1) {
            schoolMatch[sch] = s; studentMatch[s] = sch; toRemove.push(s);
            roundEvents.push({ student: s, school: sch, accepted: true, rank: proposals[s] - 1 });
          } else {
            let cur = schoolMatch[sch];
            if (schRank[sch][s] < schRank[sch][cur]) {
              schoolMatch[sch] = s; studentMatch[s] = sch; toRemove.push(s);
              studentMatch[cur] = -1; newFree.push(cur);
              roundEvents.push({ student: s, school: sch, accepted: true, rank: proposals[s] - 1 });
              roundEvents.push({ student: cur, school: sch, accepted: false, rank: -1 });
            } else {
              roundEvents.push({ student: s, school: sch, accepted: false, rank: proposals[s] - 1 });
            }
          }
        }
        free = free.filter(f => !toRemove.includes(f)).concat(newFree);
        rounds.push(roundEvents);
        roundNum++;
        if (roundNum > 50) break;
      }

      for (let i = 0; i < n; i++) {
        stableMatches.push({ student: i, school: studentMatch[i] });
      }
    }

    function draw() {
      background(13, 17, 23);

      roundTimer += deltaTime / 1000;
      if (roundTimer > 2.0 && currentRound < rounds.length - 1) {
        currentRound++;
        roundTimer = 0;
        let events = rounds[currentRound];
        for (let e of events) {
          notePositions.push({
            ...e,
            round: currentRound,
            x: 200 + currentRound * measureWidth,
            targetX: 200 + currentRound * measureWidth + measureWidth * 0.5,
            animT: 0
          });
        }
      }

      for (let np of notePositions) {
        np.animT = min(1, np.animT + deltaTime / 800);
      }

      let targetScroll = max(0, (currentRound + 1) * measureWidth - width * 0.6);
      scrollX = lerp(scrollX, targetScroll, 0.03);

      push();
      translate(-scrollX, 0);

      let staffTop = height * 0.25;
      let lineCount = 5;
      let bassTop = height * 0.75 - (lineCount - 1) * staffSpacing;
      let totalLen = max(width + scrollX, (rounds.length + 2) * measureWidth + 200);

      // Treble staff (students)
      stroke(60, 80, 120, 100);
      strokeWeight(1);
      for (let i = 0; i < lineCount; i++) {
        line(0, staffTop + i * staffSpacing, totalLen, staffTop + i * staffSpacing);
      }

      // Bass staff (schools)
      stroke(120, 100, 50, 100);
      for (let i = 0; i < lineCount; i++) {
        line(0, bassTop + i * staffSpacing, totalLen, bassTop + i * staffSpacing);
      }

      noStroke();
      fill(88, 166, 255, 150);
      textSize(11);
      textAlign(LEFT, CENTER);
      text('TREBLE (Students)', 20, staffTop - 15);
      fill(255, 200, 80, 150);
      text('BASS (Schools)', 20, bassTop - 15);

      // Measure bar lines
      stroke(50, 60, 80, 80);
      strokeWeight(1);
      for (let r = 0; r <= rounds.length; r++) {
        let mx = 200 + r * measureWidth;
        line(mx, staffTop - 20, mx, bassTop + (lineCount - 1) * staffSpacing + 20);
        noStroke();
        fill(80, 100, 140, 120);
        textAlign(CENTER, BOTTOM);
        textSize(10);
        text('R' + (r + 1), mx + measureWidth / 2, staffTop - 22);
      }

      // Draw notes
      for (let np of notePositions) {
        let easeT = easeOutCubic(np.animT);
        let nx = lerp(np.x, np.targetX, easeT);
        let trebleY = staffTop + map(np.student, 0, N - 1, 0, (lineCount - 1) * staffSpacing);
        let bassY = bassTop + map(np.school, 0, N - 1, 0, (lineCount - 1) * staffSpacing);

        if (np.accepted) {
          // Stem connecting treble to bass
          stroke(255, 215, 80, 120 * easeT);
          strokeWeight(1.5);
          line(nx, trebleY, nx, bassY);

          // Student note (treble)
          noStroke();
          fill(88, 166, 255, 220 * easeT);
          ellipse(nx, trebleY, 14, 10);
          fill(13, 17, 23);
          ellipse(nx, trebleY, 6, 4);

          // School note (bass)
          noStroke();
          fill(255, 200, 80, 220 * easeT);
          ellipse(nx, bassY, 14, 10);
          fill(13, 17, 23);
          ellipse(nx, bassY, 6, 4);

          // Meeting glow
          fill(255, 230, 140, 60 * easeT);
          circle(nx, (trebleY + bassY) / 2, 12);
        } else {
          // Rejected grace note sliding away
          let slideOff = easeT * 20;
          let fadeAlpha = max(0, 1 - np.animT * 1.5);

          noStroke();
          fill(200, 80, 80, 150 * fadeAlpha);
          ellipse(nx + slideOff, trebleY, 8, 6);

          stroke(200, 80, 80, 100 * fadeAlpha);
          strokeWeight(1);
          line(nx + slideOff - 3, trebleY - 3, nx + slideOff + 3, trebleY + 3);
          line(nx + slideOff + 3, trebleY - 3, nx + slideOff - 3, trebleY + 3);
        }
      }

      // Final chord
      if (currentRound >= rounds.length - 1 && rounds.length > 0) {
        let chordX = 200 + rounds.length * measureWidth + 40;
        stroke(100, 120, 160, 180);
        strokeWeight(2);
        line(chordX - 10, staffTop - 10, chordX - 10, bassTop + (lineCount - 1) * staffSpacing + 10);
        strokeWeight(4);
        line(chordX - 5, staffTop - 10, chordX - 5, bassTop + (lineCount - 1) * staffSpacing + 10);

        let pulse = 0.7 + 0.3 * sin(frameCount * 0.04);
        for (let m of stableMatches) {
          let ty = staffTop + map(m.student, 0, N - 1, 0, (lineCount - 1) * staffSpacing);
          let by = bassTop + map(m.school, 0, N - 1, 0, (lineCount - 1) * staffSpacing);

          stroke(255, 215, 80, 80 * pulse);
          strokeWeight(1);
          line(chordX + 20, ty, chordX + 20, by);

          noStroke();
          fill(88, 166, 255, 230 * pulse);
          ellipse(chordX + 20, ty, 16, 12);
          fill(255, 200, 80, 230 * pulse);
          ellipse(chordX + 20, by, 16, 12);
        }

        noStroke();
        fill(255, 230, 140, 140 * pulse);
        textAlign(CENTER, BOTTOM);
        textSize(11);
        textStyle(ITALIC);
        text('FINALE', chordX + 20, staffTop - 25);
      }

      pop();

      // Bottom title
      noStroke();
      fill(200, 210, 230, 160);
      textAlign(CENTER, TOP);
      textSize(13);
      textStyle(BOLD);
      text('MUSIC SCORE \u2014 DA ALGORITHM AS NOTATION', width / 2, height - 50);
      textSize(10);
      textStyle(NORMAL);
      fill(120, 140, 170, 120);
      let info = currentRound < rounds.length - 1
        ? 'Playing measure ' + (currentRound + 2) + ' of ' + rounds.length
        : 'Score complete \u2014 stable chord resolved';
      text(info, width / 2, height - 32);
    }

    function easeOutCubic(t) {
      return 1 - pow(1 - t, 3);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      staffSpacing = height * 0.04;
      measureWidth = width * 0.18;
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
  </script>
</body>
</html>
