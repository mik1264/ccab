<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proposal Rain — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Nunito', sans-serif; }
    .back-link { position: fixed; top: 16px; left: 16px; background: rgba(22,27,34,0.9); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; transition: background 0.2s; }
    .back-link:hover { background: #30363d; }
    .info { position: fixed; top: 60px; left: 16px; background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 10px; padding: 12px 16px; z-index: 50; max-width: 280px; backdrop-filter: blur(8px); }
    .info h2 { font-family: 'Lora', serif; font-size: 15px; color: #58a6ff; margin-bottom: 4px; }
    .info p { font-size: 12px; color: #8b949e; line-height: 1.4; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Visual Gallery</a>
  <div class="info">
    <h2>Proposal Rain</h2>
    <p>Proposals fall like glowing raindrops from the sky. Accepted ones splash into golden rings; rejected ones dissolve into red mist.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 6;
    let proposers = [], recipients = [];
    let menPrefs = [], womenPrefs = [];
    let menNext = [], womenCurrent = [];
    let drops = []; // {sx, sy, x, y, targetX, targetY, t, mId, wId, speed}
    let splashes = []; // {x, y, type:'accept'|'reject', t, maxT}
    let rings = []; // {x, y, r, alpha}
    let round = 0;
    let lastRoundFrame = 0;
    let roundInterval = 90; // frames between rounds
    let algorithmDone = false;
    let roundProposals = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(RGB);
      initSim();
    }

    function shuffleArr(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initSim() {
      proposers = [];
      recipients = [];
      drops = [];
      splashes = [];
      rings = [];
      round = 0;
      lastRoundFrame = -roundInterval;
      algorithmDone = false;
      menPrefs = [];
      womenPrefs = [];

      for (let i = 0; i < N; i++) {
        menPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
        womenPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
      }
      menNext = new Array(N).fill(0);
      womenCurrent = new Array(N).fill(-1);

      let spacing = width / (N + 1);
      for (let i = 0; i < N; i++) {
        proposers.push({x: spacing * (i + 1), y: 70, free: true});
        recipients.push({x: spacing * (i + 1), y: height - 80, matched: false, matchedTo: -1});
      }
    }

    function doRound() {
      if (algorithmDone) return;

      let madeProposal = false;
      for (let m = 0; m < N; m++) {
        if (!proposers[m].free) continue;
        if (menNext[m] >= N) continue;
        let w = menPrefs[m][menNext[m]];
        menNext[m]++;
        madeProposal = true;

        // Create falling drop
        drops.push({
          sx: proposers[m].x, sy: proposers[m].y + 15,
          x: proposers[m].x, y: proposers[m].y + 15,
          targetX: recipients[w].x, targetY: recipients[w].y - 15,
          t: 0, mId: m, wId: w,
          speed: 0.012 + random(0.003),
          pending: true
        });
      }

      if (!madeProposal) {
        algorithmDone = true;
      }
      round++;
    }

    function resolveProposal(m, w) {
      if (womenCurrent[w] === -1) {
        // Accept
        womenCurrent[w] = m;
        proposers[m].free = false;
        recipients[w].matched = true;
        recipients[w].matchedTo = m;
        return true;
      } else {
        let curM = womenCurrent[w];
        if (womenPrefs[w].indexOf(m) < womenPrefs[w].indexOf(curM)) {
          // Replace: free old match
          proposers[curM].free = true;
          womenCurrent[w] = m;
          proposers[m].free = false;
          recipients[w].matchedTo = m;
          return true;
        } else {
          return false;
        }
      }
    }

    function draw() {
      background(13, 17, 23, 20);

      // Trigger rounds
      if (!algorithmDone && frameCount - lastRoundFrame > roundInterval) {
        doRound();
        lastRoundFrame = frameCount;
      }

      // Draw proposers at top
      for (let i = 0; i < N; i++) {
        noStroke();
        let pulse = sin(frameCount * 0.04 + i) * 0.2 + 0.8;
        fill(88, 166, 255, 30);
        ellipse(proposers[i].x, proposers[i].y, 40, 40);
        fill(88, 166, 255, 180 * pulse);
        ellipse(proposers[i].x, proposers[i].y, 20, 20);
        if (!proposers[i].free) {
          fill(63, 185, 80, 100);
          ellipse(proposers[i].x, proposers[i].y, 28, 28);
        }
        fill(255, 180);
        textAlign(CENTER, CENTER);
        textSize(10);
        text('M' + (i + 1), proposers[i].x, proposers[i].y - 25);
      }

      // Draw recipients at bottom
      for (let i = 0; i < N; i++) {
        noStroke();
        let pulse = sin(frameCount * 0.04 + i + 3) * 0.2 + 0.8;
        fill(188, 140, 255, 30);
        ellipse(recipients[i].x, recipients[i].y, 40, 40);
        fill(188, 140, 255, 180 * pulse);
        ellipse(recipients[i].x, recipients[i].y, 20, 20);
        if (recipients[i].matched) {
          fill(63, 185, 80, 100);
          ellipse(recipients[i].x, recipients[i].y, 28, 28);
        }
        fill(255, 180);
        textAlign(CENTER, CENTER);
        textSize(10);
        text('W' + (i + 1), recipients[i].x, recipients[i].y + 25);
      }

      // Update drops
      for (let i = drops.length - 1; i >= 0; i--) {
        let d = drops[i];
        d.t += d.speed;

        // Curved path
        let t = d.t;
        d.x = lerp(d.sx, d.targetX, t);
        d.y = lerp(d.sy, d.targetY, t);
        // Add wave
        d.x += sin(t * PI * 3) * 15 * (1 - t);

        if (t >= 1) {
          // Resolve
          let accepted = resolveProposal(d.mId, d.wId);
          if (accepted) {
            // Green splash + golden ring
            splashes.push({
              x: d.targetX, y: d.targetY,
              type: 'accept', t: 0, maxT: 40,
              particles: Array.from({length: 15}, () => ({
                vx: random(-3, 3), vy: random(-5, -1),
                x: 0, y: 0, alpha: 255
              }))
            });
            rings.push({x: d.targetX, y: d.targetY, r: 5, alpha: 200});
          } else {
            // Red burst
            splashes.push({
              x: d.targetX, y: d.targetY,
              type: 'reject', t: 0, maxT: 30,
              particles: Array.from({length: 20}, () => ({
                vx: random(-4, 4), vy: random(-4, 4),
                x: 0, y: 0, alpha: 255
              }))
            });
          }
          drops.splice(i, 1);
          continue;
        }

        // Draw drop
        noStroke();
        let glow = 150 + sin(t * PI * 6) * 50;
        fill(200, 220, 255, 30);
        ellipse(d.x, d.y, 22, 22);
        fill(200, 220, 255, glow);
        ellipse(d.x, d.y, 10, 10);
        fill(255, 255, 255, 200);
        ellipse(d.x, d.y, 4, 4);

        // Trail
        for (let tt = max(0, t - 0.15); tt < t; tt += 0.015) {
          let tx = lerp(d.sx, d.targetX, tt) + sin(tt * PI * 3) * 15 * (1 - tt);
          let ty = lerp(d.sy, d.targetY, tt);
          let a = map(tt, t - 0.15, t, 10, 80);
          fill(200, 220, 255, a);
          ellipse(tx, ty, 3, 3);
        }
      }

      // Update splashes
      for (let i = splashes.length - 1; i >= 0; i--) {
        let s = splashes[i];
        s.t++;
        if (s.t > s.maxT) { splashes.splice(i, 1); continue; }

        for (let p of s.particles) {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.1;
          p.alpha -= 255 / s.maxT;
        }

        noStroke();
        for (let p of s.particles) {
          if (s.type === 'accept') {
            fill(63, 185, 80, max(0, p.alpha));
          } else {
            fill(248, 81, 73, max(0, p.alpha));
          }
          ellipse(s.x + p.x, s.y + p.y, 4, 4);
        }
      }

      // Update rings
      for (let i = rings.length - 1; i >= 0; i--) {
        let r = rings[i];
        r.r += 1.5;
        r.alpha -= 3;
        if (r.alpha <= 0) { rings.splice(i, 1); continue; }
        noFill();
        stroke(255, 200, 50, r.alpha);
        strokeWeight(2);
        ellipse(r.x, r.y, r.r * 2, r.r * 2);
      }

      // Draw matched connections
      for (let w = 0; w < N; w++) {
        if (recipients[w].matched) {
          let m = recipients[w].matchedTo;
          stroke(63, 185, 80, 40 + sin(frameCount * 0.05 + w) * 15);
          strokeWeight(1);
          let mx = proposers[m].x, my = proposers[m].y;
          let wx = recipients[w].x, wy = recipients[w].y;
          line(mx, my, wx, wy);
        }
      }

      // Round counter
      noStroke();
      fill(255, 160);
      textAlign(RIGHT, TOP);
      textSize(13);
      text('Round: ' + round + (algorithmDone ? ' (Complete!)' : ''), width - 20, 20);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
