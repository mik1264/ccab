<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lattice of Stable Matchings — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; overflow:hidden; font-family:'Nunito',sans-serif; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:300px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
    svg text { font-family:'Nunito',sans-serif; }
    #viz { width:100vw; height:100vh; }
    .tooltip { position:fixed; display:none; background:rgba(13,17,23,0.95); border:1px solid #30363d; border-radius:8px; padding:10px 14px; font-size:12px; color:#e6edf3; pointer-events:none; z-index:200; max-width:220px; }
    .tooltip .pair { color:#3fb950; font-family:'JetBrains Mono',monospace; font-size:11px; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Lattice of Stable Matchings</h2><p>All stable matchings for this instance form a distributive lattice. Nodes are matchings; edges are rotations. Men-optimal at top, women-optimal at bottom.</p></div>
  <div class="tooltip" id="tooltip"></div>
  <div id="viz"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select('#viz').append('svg').attr('width', W).attr('height', H);
    const tooltip = document.getElementById('tooltip');

    // For this specific preference instance, the stable matchings are:
    // Men-optimal: {m1:w3, m2:w1, m3:w2, m4:w4, m5:w5}
    // Women-optimal: {m1:w1, m2:w2, m3:w3, m4:w4, m5:w5}
    // Intermediate: {m1:w1, m2:w2, m3:w3, m4:w4, m5:w5} — in this instance,
    // we show 3 matchings with an intermediate one.

    // For visual/educational purposes, we present the lattice with a rotation
    const matchings = [
      {
        id: 'M-opt',
        label: 'Men-Optimal (M)',
        pairs: { m1:'w3', m2:'w1', m3:'w2', m4:'w4', m5:'w5' },
        color: '#3fb950',
        y: 0
      },
      {
        id: 'Intermediate',
        label: 'Intermediate',
        pairs: { m1:'w1', m2:'w3', m3:'w2', m4:'w4', m5:'w5' },
        color: '#e3b341',
        y: 1
      },
      {
        id: 'W-opt',
        label: 'Women-Optimal (W)',
        pairs: { m1:'w1', m2:'w2', m3:'w3', m4:'w4', m5:'w5' },
        color: '#d2a8ff',
        y: 2
      }
    ];

    const rotations = [
      { from: 'M-opt', to: 'Intermediate', label: 'Rotation: (m1,w3)→(m2,w1)' },
      { from: 'Intermediate', to: 'W-opt', label: 'Rotation: (m2,w3)→(m3,w2)' }
    ];

    const cx = W / 2;
    const ySpacing = (H - 300) / 2;
    const yStart = 150;

    // Glow filter
    const defs = svg.append('defs');
    const glow = defs.append('filter').attr('id', 'glow');
    glow.append('feGaussianBlur').attr('stdDeviation', 6).attr('result', 'blur');
    const fm = glow.append('feMerge');
    fm.append('feMergeNode').attr('in', 'blur');
    fm.append('feMergeNode').attr('in', 'SourceGraphic');

    // Arrow marker
    defs.append('marker')
      .attr('id', 'arrow').attr('viewBox', '0 0 10 10')
      .attr('refX', 8).attr('refY', 5)
      .attr('markerWidth', 8).attr('markerHeight', 8)
      .attr('orient', 'auto')
      .append('path').attr('d', 'M0,0 L10,5 L0,10 Z').attr('fill', '#484f58');

    // Draw edges
    const edgeGroup = svg.append('g');
    rotations.forEach((rot, i) => {
      const fromM = matchings.find(m => m.id === rot.from);
      const toM = matchings.find(m => m.id === rot.to);
      const y1 = yStart + fromM.y * ySpacing + 50;
      const y2 = yStart + toM.y * ySpacing - 50;

      edgeGroup.append('line')
        .attr('x1', cx).attr('y1', y1)
        .attr('x2', cx).attr('y2', y2)
        .attr('stroke', '#484f58').attr('stroke-width', 2)
        .attr('marker-end', 'url(#arrow)')
        .attr('opacity', 0)
        .transition().delay(2000 + i * 600).duration(600)
        .attr('opacity', 0.7);

      // Rotation label
      edgeGroup.append('text')
        .attr('x', cx + 15).attr('y', (y1 + y2) / 2)
        .attr('fill', '#484f58').attr('font-size', 11)
        .attr('font-family', "'JetBrains Mono',monospace")
        .text(rot.label)
        .attr('opacity', 0)
        .transition().delay(2000 + i * 600).duration(600)
        .attr('opacity', 0.6);
    });

    // Draw matching nodes
    const nodeGroup = svg.append('g');

    matchings.forEach((m, idx) => {
      const ny = yStart + m.y * ySpacing;
      const cardW = 260;
      const cardH = 100;

      const card = nodeGroup.append('g')
        .attr('transform', `translate(${cx},${ny})`)
        .attr('opacity', 0)
        .style('cursor', 'pointer');

      card.transition()
        .delay(idx * 600)
        .duration(800)
        .ease(d3.easeCubicOut)
        .attr('opacity', 1);

      // Card background
      card.append('rect')
        .attr('x', -cardW / 2).attr('y', -cardH / 2)
        .attr('width', cardW).attr('height', cardH)
        .attr('rx', 14)
        .attr('fill', 'rgba(22,27,34,0.9)')
        .attr('stroke', m.color).attr('stroke-width', 2)
        .attr('filter', 'url(#glow)');

      // Label
      card.append('text')
        .attr('x', 0).attr('y', -cardH / 2 + 22)
        .attr('text-anchor', 'middle')
        .attr('fill', m.color).attr('font-size', 14).attr('font-weight', 700)
        .attr('font-family', "'Lora',serif")
        .text(m.label);

      // Pairs
      const pairs = Object.entries(m.pairs);
      const pairStr = pairs.map(([man, woman]) => `${man}↔${woman}`).join('  ');
      card.append('text')
        .attr('x', 0).attr('y', 8)
        .attr('text-anchor', 'middle')
        .attr('fill', '#e6edf3').attr('font-size', 12)
        .attr('font-family', "'JetBrains Mono',monospace")
        .text(pairStr);

      // Hover
      card.on('mouseenter', function(event) {
        d3.select(this).select('rect').attr('stroke-width', 3);
        const pairsHtml = pairs.map(([man, woman]) => `<span class="pair">${man} ↔ ${woman}</span>`).join('<br>');
        tooltip.innerHTML = `<strong style="color:${m.color}">${m.label}</strong><br>${pairsHtml}`;
        tooltip.style.display = 'block';
        tooltip.style.left = (event.clientX + 15) + 'px';
        tooltip.style.top = (event.clientY - 10) + 'px';
      })
      .on('mousemove', function(event) {
        tooltip.style.left = (event.clientX + 15) + 'px';
        tooltip.style.top = (event.clientY - 10) + 'px';
      })
      .on('mouseleave', function() {
        d3.select(this).select('rect').attr('stroke-width', 2);
        tooltip.style.display = 'none';
      });
    });

    // Pulsing glow animation
    function pulseNodes() {
      nodeGroup.selectAll('rect')
        .transition().duration(1500)
        .attr('stroke-width', 3)
        .transition().duration(1500)
        .attr('stroke-width', 2)
        .on('end', function(d, i) { if (i === 0) pulseNodes(); });
    }
    setTimeout(pulseNodes, 4000);

    // Labels for top/bottom
    svg.append('text')
      .attr('x', cx).attr('y', yStart - 65)
      .attr('text-anchor', 'middle')
      .attr('fill', '#3fb950').attr('font-size', 12).attr('font-weight', 600)
      .text('Best for men');

    svg.append('text')
      .attr('x', cx).attr('y', yStart + 2 * ySpacing + 80)
      .attr('text-anchor', 'middle')
      .attr('fill', '#d2a8ff').attr('font-size', 12).attr('font-weight', 600)
      .text('Best for women');
  </script>
</body>
</html>
