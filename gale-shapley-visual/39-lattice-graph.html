<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matching Lattice — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #c9d1d9; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background: #30363d; }
    #info { position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(13,17,23,0.9);border:1px solid #30363d;padding:12px 20px;border-radius:12px;font-size:12px;color:#8b949e;backdrop-filter:blur(8px);z-index:100;text-align:center;max-width:500px;line-height:1.5 }
    #info b { color:#e3b341 }
    #info .green { color:#3fb950 }
    #info .red { color:#f85149 }
    svg { display: block; }
    .lattice-node { cursor: pointer; transition: opacity 0.2s; }
    .lattice-node:hover { opacity: 0.8; }
    #arc-panel { position:fixed;top:60px;right:16px;background:rgba(13,17,23,0.92);border:1px solid #30363d;padding:16px;border-radius:12px;backdrop-filter:blur(8px);z-index:100;width:220px;display:none }
    #arc-panel h3 { font-size:14px;color:#58a6ff;margin-bottom:10px }
    #arc-panel .pair { font-size:12px;color:#c9d1d9;margin:3px 0 }
    #arc-panel .pair span { display:inline-block;width:24px;text-align:center;padding:2px 4px;border-radius:4px;margin:0 2px;font-weight:600 }
    #arc-panel .s { background:#1a3a5c;color:#58a6ff }
    #arc-panel .c { background:#1a3c2a;color:#3fb950 }
    .title { text-anchor:middle;fill:#c9d1d9;font-size:18px;font-weight:600 }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div id="arc-panel">
    <h3>Matching Assignment</h3>
    <div id="arc-pairs"></div>
    <div style="margin-top:8px;font-size:11px;color:#8b949e" id="arc-score"></div>
  </div>
  <div id="info">
    Lattice of all stable matchings for 4 students &amp; 4 schools. <span class="green">Green</span> = student-optimal, <span class="red">red</span> = school-optimal. Click a node to see its assignment.
  </div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    // Fixed preference instance with multiple stable matchings
    const studentPrefs = [
      [0, 1, 2, 3],
      [1, 0, 3, 2],
      [2, 3, 0, 1],
      [3, 2, 1, 0]
    ];
    const schoolPrefs = [
      [3, 0, 1, 2],
      [2, 1, 0, 3],
      [1, 2, 3, 0],
      [0, 3, 2, 1]
    ];

    const N = 4;

    // Build ranking lookups
    let studentRank = [], schoolRank = [];
    for (let i = 0; i < N; i++) {
      studentRank[i] = new Array(N);
      for (let r = 0; r < N; r++) studentRank[i][studentPrefs[i][r]] = r;
    }
    for (let j = 0; j < N; j++) {
      schoolRank[j] = new Array(N);
      for (let r = 0; r < N; r++) schoolRank[j][schoolPrefs[j][r]] = r;
    }

    // Check if a matching is stable
    function isStable(match) {
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          if (match[i] === j) continue;
          let iCurrentSchool = match[i];
          if (studentRank[i][j] < studentRank[i][iCurrentSchool]) {
            let jCurrentStudent = -1;
            for (let k = 0; k < N; k++) { if (match[k] === j) { jCurrentStudent = k; break; } }
            if (schoolRank[j][i] < schoolRank[j][jCurrentStudent]) return false;
          }
        }
      }
      return true;
    }

    // Enumerate all perfect matchings
    function allMatchings() {
      let result = [];
      function permute(arr, l) {
        if (l === N) { result.push([...arr]); return; }
        for (let i = l; i < N; i++) {
          [arr[l], arr[i]] = [arr[i], arr[l]];
          permute(arr, l + 1);
          [arr[l], arr[i]] = [arr[i], arr[l]];
        }
      }
      permute([0, 1, 2, 3], 0);
      return result;
    }

    let allPerms = allMatchings();
    let stableMatchings = allPerms.filter(isStable);

    // Student-total rank sum (lower = better for students)
    function studentSum(match) {
      let s = 0;
      for (let i = 0; i < N; i++) s += studentRank[i][match[i]];
      return s;
    }

    // Check if two matchings differ by rotation
    function differByRotation(m1, m2) {
      let diffs = 0;
      for (let i = 0; i < N; i++) { if (m1[i] !== m2[i]) diffs++; }
      return diffs === 2;
    }

    // Build lattice edges
    let edges = [];
    for (let i = 0; i < stableMatchings.length; i++) {
      for (let j = i + 1; j < stableMatchings.length; j++) {
        if (differByRotation(stableMatchings[i], stableMatchings[j])) {
          edges.push({ source: i, target: j });
        }
      }
    }

    // If no rotation-based edges, connect by Hamming distance
    if (edges.length === 0) {
      for (let i = 0; i < stableMatchings.length; i++) {
        for (let j = i + 1; j < stableMatchings.length; j++) {
          let diffs = 0;
          for (let k = 0; k < N; k++) if (stableMatchings[i][k] !== stableMatchings[j][k]) diffs++;
          if (diffs <= 3) edges.push({ source: i, target: j });
        }
      }
    }

    // Assign levels by student sum
    let sums = stableMatchings.map(studentSum);
    let minSum = Math.min(...sums), maxSum = Math.max(...sums);

    // Visualization
    const w = window.innerWidth;
    const h = window.innerHeight;

    let svg = d3.select('body').append('svg')
      .attr('width', w).attr('height', h);

    svg.append('text').attr('class', 'title')
      .attr('x', w / 2).attr('y', 40)
      .text('Lattice of Stable Matchings');

    // Color scale: green (student-optimal) to red (school-optimal)
    function nodeColor(sum) {
      if (minSum === maxSum) return '#e3b341';
      let t = (sum - minSum) / (maxSum - minSum);
      let r = Math.round(63 + t * (248 - 63));
      let g = Math.round(185 - t * (185 - 81));
      let b = Math.round(80 - t * (80 - 73));
      return `rgb(${r},${g},${b})`;
    }

    // Position nodes in diamond/lattice layout
    let levels = {};
    stableMatchings.forEach((m, i) => {
      let s = sums[i];
      if (!levels[s]) levels[s] = [];
      levels[s].push(i);
    });

    let levelKeys = Object.keys(levels).map(Number).sort((a, b) => a - b);
    let nodePositions = [];

    levelKeys.forEach((lvl, li) => {
      let nodesAtLevel = levels[lvl];
      let y = 80 + (li / Math.max(levelKeys.length - 1, 1)) * (h - 200);
      nodesAtLevel.forEach((ni, xi) => {
        let x = w / 2 + (xi - (nodesAtLevel.length - 1) / 2) * 140;
        nodePositions[ni] = { x, y };
      });
    });

    // Draw edges
    edges.forEach((e, idx) => {
      let p1 = nodePositions[e.source], p2 = nodePositions[e.target];
      svg.append('line')
        .attr('x1', p1.x).attr('y1', p1.y)
        .attr('x2', p2.x).attr('y2', p2.y)
        .attr('stroke', '#30363d').attr('stroke-width', 2.5)
        .attr('opacity', 0)
        .transition().delay(800 + idx * 100).duration(600).attr('opacity', 0.8);
    });

    // Draw nodes
    let nodeGroup = svg.append('g');
    stableMatchings.forEach((m, i) => {
      let pos = nodePositions[i];
      let sum = sums[i];
      let sz = 24 + (maxSum - sum) * 4;

      let g = nodeGroup.append('g')
        .attr('class', 'lattice-node')
        .attr('transform', `translate(${pos.x},${pos.y})`)
        .attr('opacity', 0)
        .on('click', () => showAssignment(m, i, sum));

      g.transition().delay(i * 250).duration(500).attr('opacity', 1);

      // Glow
      g.append('circle').attr('r', sz + 10)
        .attr('fill', nodeColor(sum)).attr('opacity', 0.12);

      // Main circle
      g.append('circle').attr('r', sz)
        .attr('fill', nodeColor(sum)).attr('stroke', '#0d1117').attr('stroke-width', 2.5);

      // Label
      g.append('text').attr('text-anchor', 'middle').attr('dy', 4)
        .attr('fill', '#fff').attr('font-size', 12).attr('font-weight', 600)
        .text('M' + (i + 1));

      // Sum label below
      g.append('text').attr('text-anchor', 'middle').attr('dy', sz + 18)
        .attr('fill', '#8b949e').attr('font-size', 11)
        .text('\u03A3=' + sum);

      // Level label (student-optimal / school-optimal)
      if (sum === minSum) {
        g.append('text').attr('text-anchor', 'middle').attr('dy', -sz - 10)
          .attr('fill', '#3fb950').attr('font-size', 10).attr('font-weight', 600)
          .text('Student-optimal');
      } else if (sum === maxSum) {
        g.append('text').attr('text-anchor', 'middle').attr('dy', -sz - 10)
          .attr('fill', '#f85149').attr('font-size', 10).attr('font-weight', 600)
          .text('School-optimal');
      }
    });

    function showAssignment(match, idx, sum) {
      let panel = document.getElementById('arc-panel');
      panel.style.display = 'block';
      let pairs = document.getElementById('arc-pairs');
      pairs.innerHTML = '';
      for (let i = 0; i < N; i++) {
        let div = document.createElement('div');
        div.className = 'pair';
        div.innerHTML = `<span class="s">S${i + 1}</span> \u2194 <span class="c">C${match[i] + 1}</span> (rank ${studentRank[i][match[i]] + 1})`;
        pairs.appendChild(div);
      }
      document.getElementById('arc-score').textContent =
        `Student total: ${sum} | ${sum === minSum ? '\u2605 Student-optimal' : sum === maxSum ? '\u2605 School-optimal' : 'Intermediate'}`;

      // Highlight selected node
      nodeGroup.selectAll('.lattice-node').each(function(d, j) {
        d3.select(this).selectAll('circle').filter(function(_, ci) { return ci === 1; })
          .attr('stroke', j === idx ? '#e3b341' : '#0d1117')
          .attr('stroke-width', j === idx ? 3.5 : 2.5);
      });
    }

    // Auto-show student-optimal on load
    if (stableMatchings.length > 0) {
      let bestIdx = sums.indexOf(Math.min(...sums));
      setTimeout(() => showAssignment(stableMatchings[bestIdx], bestIdx, sums[bestIdx]), 1500);
    }
  </script>
</body>
</html>
