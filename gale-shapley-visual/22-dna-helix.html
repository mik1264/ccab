<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DNA Helix</title>
<style>
* { margin: 0; padding: 0; }
body { background: #0d1117; overflow: hidden; }
.back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
.back:hover { background: #30363d; }
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(5, 0, 5);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x0d1117);
document.body.appendChild(renderer.domElement);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
scene.add(new THREE.AmbientLight(0x334455, 2));
const dl = new THREE.DirectionalLight(0xffffff, 2);
dl.position.set(5, 8, 5); scene.add(dl);
const dl2 = new THREE.DirectionalLight(0x8888ff, 1);
dl2.position.set(-5, -3, -5); scene.add(dl2);

const NUM = 40;
const PI = Math.PI;
const strandA = [];
const strandB = [];

const matched = [];
for (let i = 0; i < NUM; i++) matched.push(i % 3 !== 2);

for (let i = 0; i < NUM; i++) {
  const gA = new THREE.SphereGeometry(0.15, 16, 16);
  const mA = new THREE.MeshPhongMaterial({ color: 0x58a6ff, emissive: 0x1a3a5c, emissiveIntensity: 0.4 });
  const meshA = new THREE.Mesh(gA, mA);
  scene.add(meshA);
  strandA.push(meshA);

  const gB = new THREE.SphereGeometry(0.15, 16, 16);
  const mB = new THREE.MeshPhongMaterial({ color: 0x3fb950, emissive: 0x1a3c1e, emissiveIntensity: 0.4 });
  const meshB = new THREE.Mesh(gB, mB);
  scene.add(meshB);
  strandB.push(meshB);
}

const bpCount = matched.filter(m => m).length;
const bpPos = new Float32Array(bpCount * 6);
const bpGeo = new THREE.BufferGeometry();
bpGeo.setAttribute('position', new THREE.Float32BufferAttribute(bpPos, 3));
const bpLines = new THREE.LineSegments(bpGeo, new THREE.LineBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.7 }));
scene.add(bpLines);

const ubpCount = matched.filter(m => !m).length;
const ubpPos = new Float32Array(ubpCount * 6);
const ubpGeo = new THREE.BufferGeometry();
ubpGeo.setAttribute('position', new THREE.Float32BufferAttribute(ubpPos, 3));
const ubpLines = new THREE.LineSegments(ubpGeo, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 }));
scene.add(ubpLines);

const bbAPos = new Float32Array((NUM - 1) * 6);
const bbAGeo = new THREE.BufferGeometry();
bbAGeo.setAttribute('position', new THREE.Float32BufferAttribute(bbAPos, 3));
scene.add(new THREE.LineSegments(bbAGeo, new THREE.LineBasicMaterial({ color: 0x3a6a9f, transparent: true, opacity: 0.4 })));

const bbBPos = new Float32Array((NUM - 1) * 6);
const bbBGeo = new THREE.BufferGeometry();
bbBGeo.setAttribute('position', new THREE.Float32BufferAttribute(bbBPos, 3));
scene.add(new THREE.LineSegments(bbBGeo, new THREE.LineBasicMaterial({ color: 0x2a6a3f, transparent: true, opacity: 0.4 })));

function animate(ts) {
  requestAnimationFrame(animate);
  const t = ts * 0.001;
  for (let i = 0; i < NUM; i++) {
    const y = i * 0.3 - 6;
    strandA[i].position.set(Math.cos(i * 0.4 + t * 0.5) * 2, y, Math.sin(i * 0.4 + t * 0.5) * 2);
    strandB[i].position.set(Math.cos(i * 0.4 + t * 0.5 + PI) * 2, y, Math.sin(i * 0.4 + t * 0.5 + PI) * 2);
  }

  let mi = 0, ui = 0;
  const bp = bpGeo.attributes.position.array;
  const ubp = ubpGeo.attributes.position.array;
  for (let i = 0; i < NUM; i++) {
    if (matched[i]) {
      bp[mi++] = strandA[i].position.x; bp[mi++] = strandA[i].position.y; bp[mi++] = strandA[i].position.z;
      bp[mi++] = strandB[i].position.x; bp[mi++] = strandB[i].position.y; bp[mi++] = strandB[i].position.z;
    } else {
      ubp[ui++] = strandA[i].position.x; ubp[ui++] = strandA[i].position.y; ubp[ui++] = strandA[i].position.z;
      ubp[ui++] = strandB[i].position.x; ubp[ui++] = strandB[i].position.y; ubp[ui++] = strandB[i].position.z;
    }
  }
  bpGeo.attributes.position.needsUpdate = true;
  ubpGeo.attributes.position.needsUpdate = true;

  const baP = bbAGeo.attributes.position.array;
  const bbP = bbBGeo.attributes.position.array;
  for (let i = 0; i < NUM - 1; i++) {
    baP[i*6] = strandA[i].position.x; baP[i*6+1] = strandA[i].position.y; baP[i*6+2] = strandA[i].position.z;
    baP[i*6+3] = strandA[i+1].position.x; baP[i*6+4] = strandA[i+1].position.y; baP[i*6+5] = strandA[i+1].position.z;
    bbP[i*6] = strandB[i].position.x; bbP[i*6+1] = strandB[i].position.y; bbP[i*6+2] = strandB[i].position.z;
    bbP[i*6+3] = strandB[i+1].position.x; bbP[i*6+4] = strandB[i+1].position.y; bbP[i*6+5] = strandB[i+1].position.z;
  }
  bbAGeo.attributes.position.needsUpdate = true;
  bbBGeo.attributes.position.needsUpdate = true;

  const camY = -4 + Math.sin(t * 0.1) * 6;
  camera.position.set(Math.cos(t * 0.3) * 6, camY, Math.sin(t * 0.3) * 6);
  camera.lookAt(0, camY * 0.3, 0);
  renderer.render(scene, camera);
}
animate(0);
</script>
</body>
</html>
