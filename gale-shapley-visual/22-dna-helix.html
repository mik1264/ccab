<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DNA Helix of Matched Pairs — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">&#8592; Visual Gallery</a>
  <div class="info"><h2>DNA Helix of Matched Pairs</h2><p>Matched pairs form the base pairs of a double helix — a biological metaphor for stable partnerships encoded in the structure of life.</p></div>
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1117);
    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(6, 0, 6);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    scene.add(new THREE.AmbientLight(0x222244, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const matching = [0, 3, 5, 1, 4, 2]; // man i matched to woman matching[i]

    const helixRadius = 2;
    const helixHeight = 14;
    const turns = 3;
    const pairsCount = 6;
    const helixGroup = new THREE.Group();
    scene.add(helixGroup);

    // Build helix backbone points
    function helixPoints(offset) {
      const pts = [];
      for (let i = 0; i <= 200; i++) {
        const t = i / 200;
        const angle = t * Math.PI * 2 * turns + offset;
        pts.push(new THREE.Vector3(
          Math.cos(angle) * helixRadius,
          t * helixHeight - helixHeight / 2,
          Math.sin(angle) * helixRadius
        ));
      }
      return pts;
    }

    // Blue helix (men)
    const bluePts = helixPoints(0);
    const blueCurve = new THREE.CatmullRomCurve3(bluePts);
    const blueTube = new THREE.TubeGeometry(blueCurve, 200, 0.08, 8, false);
    const blueMat = new THREE.MeshPhongMaterial({ color: 0x2266cc, emissive: 0x1144aa, emissiveIntensity: 0.6, shininess: 80 });
    helixGroup.add(new THREE.Mesh(blueTube, blueMat));

    // Purple helix (women)
    const purplePts = helixPoints(Math.PI);
    const purpleCurve = new THREE.CatmullRomCurve3(purplePts);
    const purpleTube = new THREE.TubeGeometry(purpleCurve, 200, 0.08, 8, false);
    const purpleMat = new THREE.MeshPhongMaterial({ color: 0x8833bb, emissive: 0x6622aa, emissiveIntensity: 0.6, shininess: 80 });
    helixGroup.add(new THREE.Mesh(purpleTube, purpleMat));

    // Base pair rungs at matched positions
    const rungGroup = new THREE.Group();
    helixGroup.add(rungGroup);
    const sphereGeo = new THREE.SphereGeometry(0.2, 16, 16);
    const growProgress = new Array(pairsCount).fill(0);

    for (let i = 0; i < pairsCount; i++) {
      const t = (i + 0.5) / pairsCount;
      const angleBlue = t * Math.PI * 2 * turns;
      const anglePurple = angleBlue + Math.PI;
      const y = t * helixHeight - helixHeight / 2;

      const bluePos = new THREE.Vector3(Math.cos(angleBlue) * helixRadius, y, Math.sin(angleBlue) * helixRadius);
      const purplePos = new THREE.Vector3(Math.cos(anglePurple) * helixRadius, y, Math.sin(anglePurple) * helixRadius);

      // Man sphere
      const manSphere = new THREE.Mesh(sphereGeo, new THREE.MeshPhongMaterial({ color: 0x44aaff, emissive: 0x2266ff, emissiveIntensity: 0.5 }));
      manSphere.position.copy(bluePos);
      rungGroup.add(manSphere);

      // Woman sphere
      const womanSphere = new THREE.Mesh(sphereGeo, new THREE.MeshPhongMaterial({ color: 0xcc66ff, emissive: 0xaa44dd, emissiveIntensity: 0.5 }));
      womanSphere.position.copy(purplePos);
      rungGroup.add(womanSphere);

      // Connecting rung
      const mid = new THREE.Vector3().addVectors(bluePos, purplePos).multiplyScalar(0.5);
      const dir = new THREE.Vector3().subVectors(purplePos, bluePos);
      const len = dir.length();
      const cylGeo = new THREE.CylinderGeometry(0.04, 0.04, len, 8);
      const rungColors = [0x00ff88, 0x44ffaa, 0x22ddcc, 0x66ffbb, 0x00ee99, 0x33ff77];
      const cylMat = new THREE.MeshPhongMaterial({
        color: rungColors[i],
        emissive: rungColors[i],
        emissiveIntensity: 0.7,
        transparent: true,
        opacity: 0.9
      });
      const cyl = new THREE.Mesh(cylGeo, cylMat);
      cyl.position.copy(mid);
      cyl.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
      rungGroup.add(cyl);

      // Point lights at rungs
      const rungLight = new THREE.PointLight(rungColors[i], 0.4, 3);
      rungLight.position.copy(mid);
      rungGroup.add(rungLight);
    }

    // Growing animation state
    let buildTime = 0;

    function animate(t) {
      requestAnimationFrame(animate);
      const time = t * 0.001;
      buildTime = Math.min(time * 0.3, 1);

      // Auto-rotate around y
      const angle = time * 0.25;
      camera.position.x = Math.sin(angle) * 8;
      camera.position.z = Math.cos(angle) * 8;
      camera.position.y = Math.sin(time * 0.15) * 2;
      camera.lookAt(0, 0, 0);

      // Helix group slight tilt
      helixGroup.rotation.y = time * 0.05;

      renderer.render(scene, camera);
    }
    animate(0);
  </script>
</body>
</html>
