<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Electric Preference Field — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; }
    body { background:#0d1117; overflow:hidden; }
    canvas#c { position:fixed; top:0; left:0; width:100vw; height:100vh; display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; font-family:'Nunito',sans-serif; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); font-family:'Nunito',sans-serif; }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Electric Preference Field</h2><p>Men are positive charges, women negative. Electric field lines flow from men to women following preference strength. Stable matching = minimum energy configuration.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);
    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }`;
    function mkShader(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(sh));return sh;}
    function mkProg(fs){const pr=gl.createProgram();gl.attachShader(pr,mkShader(gl.VERTEX_SHADER,VS));gl.attachShader(pr,mkShader(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);return pr;}
    const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

    const FS = `
    precision highp float;
    uniform vec2 u_res;
    uniform float u_time;

    // 5 positive charges (men) and 5 negative charges (women)
    vec2 chargePos(int i, float t) {
      float osc = 0.03;
      // Men (positive) - left side cluster
      if(i == 0) return vec2(-0.45, -0.35) + osc*vec2(sin(t*0.4), cos(t*0.3));
      if(i == 1) return vec2(-0.3, 0.0) + osc*vec2(cos(t*0.5), sin(t*0.4));
      if(i == 2) return vec2(-0.5, 0.3) + osc*vec2(sin(t*0.3), cos(t*0.5));
      if(i == 3) return vec2(-0.2, -0.5) + osc*vec2(cos(t*0.6), sin(t*0.35));
      if(i == 4) return vec2(-0.35, 0.5) + osc*vec2(sin(t*0.45), cos(t*0.55));
      // Women (negative) - right side (matched pairs)
      if(i == 5) return vec2(0.35, -0.3) + osc*vec2(cos(t*0.35), sin(t*0.4));
      if(i == 6) return vec2(0.25, 0.05) + osc*vec2(sin(t*0.45), cos(t*0.5));
      if(i == 7) return vec2(0.4, 0.35) + osc*vec2(cos(t*0.5), sin(t*0.3));
      if(i == 8) return vec2(0.2, -0.45) + osc*vec2(sin(t*0.55), cos(t*0.6));
      if(i == 9) return vec2(0.3, 0.5) + osc*vec2(cos(t*0.4), sin(t*0.45));
      return vec2(0.0);
    }

    float chargeSign(int i) {
      return i < 5 ? 1.0 : -1.0;
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - 0.5*u_res) / u_res.y;
      float t = u_time;

      // Compute electric field
      vec2 E = vec2(0.0);
      float potential = 0.0;

      for(int i = 0; i < 10; i++) {
        vec2 cp = chargePos(i, t);
        vec2 d = uv - cp;
        float r2 = dot(d, d) + 0.001;
        float r = sqrt(r2);
        float q = chargeSign(i);
        E += q * d / (r2 * r);
        potential += q / r;
      }

      float fieldStrength = length(E);
      float angle = atan(E.y, E.x);

      // Field line visualization using angle
      float lines = sin(angle * 12.0) * 0.5 + 0.5;
      // Modulate by field strength (denser lines where field is stronger)
      float lineIntensity = lines * smoothstep(0.0, 2.0, fieldStrength) * 0.6;

      // Equipotential lines (contours of potential)
      float eqLines = abs(fract(potential * 0.5) - 0.5) * 2.0;
      eqLines = smoothstep(0.0, 0.08, eqLines);

      // Base color from field direction
      vec3 col = vec3(0.02, 0.03, 0.06);

      // Field lines color (blue-cyan)
      vec3 fieldCol = mix(vec3(0.1, 0.2, 0.5), vec3(0.2, 0.6, 0.9), lines);
      col += fieldCol * lineIntensity * 0.5;

      // Equipotential lines (subtle)
      col += vec3(0.15, 0.3, 0.2) * (1.0 - eqLines) * 0.2;

      // Field strength glow
      float glow = 1.0 / (1.0 + fieldStrength * 0.02);
      col += vec3(0.05, 0.08, 0.15) * (1.0 - glow);

      // Charge markers
      for(int i = 0; i < 10; i++) {
        vec2 cp = chargePos(i, t);
        float d = length(uv - cp);
        float q = chargeSign(i);
        if(q > 0.0) {
          // Positive = blue glow
          col += vec3(0.2, 0.5, 1.0) * exp(-d*d*800.0);
          col += vec3(0.1, 0.2, 0.5) * exp(-d*d*100.0);
        } else {
          // Negative = red glow
          col += vec3(1.0, 0.3, 0.2) * exp(-d*d*800.0);
          col += vec3(0.5, 0.1, 0.1) * exp(-d*d*100.0);
        }
      }

      // Draw connection lines between matched pairs (subtle)
      for(int i = 0; i < 5; i++) {
        vec2 mp = chargePos(i, t);
        vec2 wp = chargePos(i + 5, t);
        vec2 ab = wp - mp;
        float len = length(ab);
        vec2 dir = ab / len;
        vec2 perp = vec2(-dir.y, dir.x);
        float proj = dot(uv - mp, dir);
        float perpDist = abs(dot(uv - mp, perp));
        if(proj > 0.0 && proj < len) {
          float lineGlow = exp(-perpDist*perpDist*3000.0) * 0.3;
          col += vec3(0.4, 0.6, 0.3) * lineGlow;
        }
      }

      col = pow(col, vec3(0.4545));
      gl_FragColor = vec4(col, 1.0);
    }
    `;

    const prog = mkProg(FS);
    gl.useProgram(prog);
    const loc_p = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc_p);
    gl.vertexAttribPointer(loc_p, 2, gl.FLOAT, false, 0, 0);
    const loc_res = gl.getUniformLocation(prog, 'u_res');
    const loc_time = gl.getUniformLocation(prog, 'u_time');

    function frame(t) {
      gl.uniform2f(loc_res, canvas.width, canvas.height);
      gl.uniform1f(loc_time, t * 0.001);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
