<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Love Letters — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Love Letters</h2><p>In the original paper, Gale and Shapley modeled 'proposals' as letters. Watch paper letters fly from proposers to recipients — some opened with joy, others crumpled in rejection.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    const N = 5;
    const menNames = ['Adam','Ben','Carl','Dan','Eric'];
    const womenNames = ['Faye','Grace','Holly','Iris','Jane'];

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
      return a;
    }

    const menPrefs = menNames.map(() => shuffle([0,1,2,3,4]));
    const womenPrefs = womenNames.map(() => shuffle([0,1,2,3,4]));
    const womenRank = womenPrefs.map(p => { const r = []; p.forEach((m,i) => r[m] = i); return r; });

    // Run Gale-Shapley to get events
    const events = [];
    const menNext = Array(N).fill(0);
    const womenPartner = Array(N).fill(-1);
    const menFree = Array(N).fill(true);

    let freeCount = N;
    while (freeCount > 0) {
      for (let m = 0; m < N; m++) {
        if (!menFree[m]) continue;
        if (menNext[m] >= N) continue;
        const w = menPrefs[m][menNext[m]];
        menNext[m]++;
        if (womenPartner[w] === -1) {
          womenPartner[w] = m;
          menFree[m] = false;
          freeCount--;
          events.push({ man: m, woman: w, accepted: true, displaced: -1 });
        } else {
          const curr = womenPartner[w];
          if (womenRank[w][m] < womenRank[w][curr]) {
            womenPartner[w] = m;
            menFree[m] = false;
            menFree[curr] = true;
            events.push({ man: m, woman: w, accepted: true, displaced: curr });
          } else {
            events.push({ man: m, woman: w, accepted: false, displaced: -1 });
          }
        }
      }
    }

    // Positions
    const leftX = () => canvas.width * 0.15;
    const rightX = () => canvas.width * 0.85;
    function menY(i) { return canvas.height * 0.15 + i * (canvas.height * 0.7 / (N - 1)); }
    function womenY(i) { return canvas.height * 0.15 + i * (canvas.height * 0.7 / (N - 1)); }

    // Animation state
    let currentEvent = 0;
    let eventTimer = 0;
    const eventDuration = 2.5;
    let letterPhase = 0; // 0=flying, 1=result
    let letterProgress = 0;

    // Particles for effects
    const particles = [];

    class Particle {
      constructor(x, y, color, vx, vy, life) {
        this.x = x; this.y = y; this.color = color;
        this.vx = vx; this.vy = vy; this.life = life; this.maxLife = life;
        this.size = 3 + Math.random() * 4;
      }
      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += 80 * dt;
        this.life -= dt;
      }
      draw() {
        const a = Math.max(0, this.life / this.maxLife);
        ctx.globalAlpha = a;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * a, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function drawEnvelope(x, y, w, h, open, color) {
      ctx.save();
      ctx.translate(x, y);
      // Body
      ctx.fillStyle = '#f5e6c8';
      ctx.strokeStyle = '#c4a97d';
      ctx.lineWidth = 2;
      ctx.fillRect(-w/2, -h/2, w, h);
      ctx.strokeRect(-w/2, -h/2, w, h);
      // Flap
      ctx.beginPath();
      if (open) {
        ctx.moveTo(-w/2, -h/2);
        ctx.lineTo(0, -h/2 - h*0.4);
        ctx.lineTo(w/2, -h/2);
        ctx.fillStyle = '#e8d5b0';
        ctx.fill();
        ctx.stroke();
      } else {
        ctx.moveTo(-w/2, -h/2);
        ctx.lineTo(0, 0);
        ctx.lineTo(w/2, -h/2);
        ctx.fillStyle = '#e8d5b0';
        ctx.fill();
        ctx.stroke();
      }
      // Seal
      ctx.fillStyle = color || '#c0392b';
      ctx.beginPath();
      ctx.arc(0, open ? -h/2 - h*0.15 : -h*0.15, 6, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    function drawHeart(x, y, size, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, size * 0.3);
      ctx.bezierCurveTo(-size, -size * 0.3, -size * 0.5, -size, 0, -size * 0.5);
      ctx.bezierCurveTo(size * 0.5, -size, size, -size * 0.3, 0, size * 0.3);
      ctx.fill();
      ctx.restore();
    }

    function drawPerson(x, y, name, color, matched) {
      ctx.fillStyle = color;
      ctx.fillRect(x - 20, y - 20, 40, 40);
      if (matched) {
        ctx.strokeStyle = '#4ade80';
        ctx.lineWidth = 3;
        ctx.strokeRect(x - 22, y - 22, 44, 44);
      }
      ctx.fillStyle = '#c9d1d9';
      ctx.font = '12px Nunito';
      ctx.textAlign = 'center';
      ctx.fillText(name, x, y + 38);
    }

    // Track which men/women are matched for highlighting
    const matchedMen = Array(N).fill(false);
    const matchedWomen = Array(N).fill(false);

    let lastTime = performance.now();
    // Crumpling letters (rejected)
    const crumpledLetters = [];

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw men
      for (let i = 0; i < N; i++) {
        drawPerson(leftX(), menY(i), menNames[i], '#1f6feb', matchedMen[i]);
      }
      // Draw women
      for (let i = 0; i < N; i++) {
        drawPerson(rightX(), womenY(i), womenNames[i], '#8b5cf6', matchedWomen[i]);
      }

      // Draw current event animation
      if (currentEvent < events.length) {
        const e = events[currentEvent];
        eventTimer += dt;

        const sx = leftX(), sy = menY(e.man);
        const ex = rightX(), ey = womenY(e.woman);

        if (eventTimer < 1.2) {
          // Flying phase
          const t = eventTimer / 1.2;
          const eased = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
          const lx = sx + (ex - sx) * eased;
          const ly = sy + (ey - sy) * eased - Math.sin(eased * Math.PI) * 60;
          drawEnvelope(lx, ly, 40, 28, false, e.accepted ? '#4ade80' : '#ef4444');

          // Trail particles
          if (Math.random() < 0.3) {
            particles.push(new Particle(lx, ly, e.accepted ? '#4ade8055' : '#ef444455',
              (Math.random()-0.5)*20, (Math.random()-0.5)*20, 0.5));
          }
        } else if (eventTimer < 2.0) {
          // Result phase
          const rt = (eventTimer - 1.2) / 0.8;
          if (e.accepted) {
            // Open envelope at destination
            drawEnvelope(ex - 50, ey, 40, 28, true, '#4ade80');
            // Heart floats up
            const heartY = ey - 20 - rt * 40;
            const heartAlpha = 1 - rt * 0.3;
            ctx.globalAlpha = heartAlpha;
            drawHeart(ex - 50, heartY, 12 + rt * 6, '#4ade80');
            ctx.globalAlpha = 1;

            // Label
            ctx.fillStyle = '#4ade80';
            ctx.font = 'bold 14px Nunito';
            ctx.textAlign = 'center';
            ctx.fillText('ACCEPTED', (sx + ex) / 2, Math.min(sy, ey) - 30);

            if (e.displaced >= 0) {
              ctx.fillStyle = '#ef4444';
              ctx.font = '12px Nunito';
              ctx.fillText(menNames[e.displaced] + ' displaced!', (sx + ex)/2, Math.min(sy, ey) - 10);
            }
          } else {
            // Crumple animation
            const crumpleSize = 40 - rt * 20;
            const crumpleY = ey + rt * 60;
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(ex - 50, crumpleY, Math.max(5, crumpleSize / 3), 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ef4444';
            ctx.font = 'bold 14px Nunito';
            ctx.textAlign = 'center';
            ctx.fillText('REJECTED', (sx + ex) / 2, Math.min(sy, ey) - 30);
          }
        } else {
          // Move to next event
          if (e.accepted) {
            matchedMen[e.man] = true;
            matchedWomen[e.woman] = true;
            if (e.displaced >= 0) matchedMen[e.displaced] = false;
          }
          currentEvent++;
          eventTimer = 0;
        }

        // Round label
        ctx.fillStyle = '#58a6ff';
        ctx.font = '16px Lora';
        ctx.textAlign = 'center';
        ctx.fillText('Proposal ' + (currentEvent + 1) + ' of ' + events.length, canvas.width / 2, 30);
      } else {
        // Final state
        ctx.fillStyle = '#4ade80';
        ctx.font = 'bold 20px Lora';
        ctx.textAlign = 'center';
        ctx.fillText('All Letters Delivered — Stable Matching Complete!', canvas.width / 2, canvas.height - 40);

        // Draw match lines
        for (let w = 0; w < N; w++) {
          const m = womenPartner[w];
          if (m >= 0) {
            ctx.strokeStyle = 'rgba(74,222,128,0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(leftX() + 25, menY(m));
            ctx.lineTo(rightX() - 25, womenY(w));
            ctx.stroke();
            drawHeart((leftX() + rightX()) / 2, (menY(m) + womenY(w)) / 2, 10, '#4ade80');
          }
        }
      }

      // Update/draw particles
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(dt);
        particles[i].draw();
        if (particles[i].life <= 0) particles.splice(i, 1);
      }

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
