<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Letters — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; }
    .back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
    .back:hover { background: #30363d; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 8;
    const MAX_PARTICLES = 5000;
    let emitters = [];
    let attractors = [];
    let particles = [];
    let matchPairs = [];
    let t = 0;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      blendMode(ADD);
      buildLayout();
    }

    function buildLayout() {
      emitters = [];
      attractors = [];
      for (let i = 0; i < N; i++) {
        let y = map(i, 0, N - 1, height * 0.1, height * 0.9);
        emitters.push({ x: width * 0.08, y: y, hue: map(i, 0, N - 1, 195, 265), id: i });
      }
      for (let i = 0; i < N; i++) {
        let y = map(i, 0, N - 1, height * 0.1, height * 0.9);
        attractors.push({ x: width * 0.92, y: y, hue: map(i, 0, N - 1, 32, 52), id: i });
      }
      if (matchPairs.length === 0) {
        let targets = [];
        for (let i = 0; i < N; i++) targets.push(i);
        // Fisher-Yates shuffle
        for (let i = targets.length - 1; i > 0; i--) {
          let j = Math.floor(Math.random() * (i + 1));
          [targets[i], targets[j]] = [targets[j], targets[i]];
        }
        for (let i = 0; i < N; i++) {
          matchPairs.push({ emitter: i, attractor: targets[i] });
        }
      }
    }

    function draw() {
      background(220, 50, 5, 6);
      t += 0.004;

      // Emit particles
      if (particles.length < MAX_PARTICLES) {
        for (let m of matchPairs) {
          let em = emitters[m.emitter];
          let at = attractors[m.attractor];
          for (let j = 0; j < 2; j++) {
            particles.push({
              x: em.x + random(-6, 6),
              y: em.y + random(-6, 6),
              vx: random(0.4, 1.2),
              vy: random(-0.3, 0.3),
              tx: at.x,
              ty: at.y,
              hueS: em.hue,
              hueE: at.hue,
              life: 1.0,
              decay: random(0.0012, 0.003),
              size: random(1.0, 2.8),
              nOff: random(10000)
            });
          }
        }
      }

      noStroke();
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        let dx = p.tx - p.x;
        let dy = p.ty - p.y;
        let d = sqrt(dx * dx + dy * dy) + 0.01;

        // Attraction
        p.vx += dx * 0.0008;
        p.vy += dy * 0.0008;

        // Perlin noise calligraphic turbulence
        let nVal = noise(p.x * 0.004, p.y * 0.004, t + p.nOff);
        let ang = nVal * TWO_PI * 4;
        p.vx += cos(ang) * 0.35;
        p.vy += sin(ang) * 0.35;

        p.vx *= 0.98;
        p.vy *= 0.98;
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;

        // Color: blue -> luminous white at convergence -> gold
        let progress = 1.0 - constrain(d / (width * 0.84), 0, 1);
        let h, s, b;
        if (progress < 0.45) {
          let t2 = progress / 0.45;
          h = lerp(p.hueS, 220, t2);
          s = lerp(65, 12, t2);
          b = lerp(75, 100, t2);
        } else {
          let t2 = (progress - 0.45) / 0.55;
          h = lerp(220, p.hueE, t2);
          s = lerp(12, 55, t2);
          b = lerp(100, 90, t2);
        }

        let alpha = p.life * 50;
        if (d < 80) {
          alpha = p.life * 85;
          s = max(s - 30, 3);
          b = 100;
        }

        fill(h, s, b, alpha);
        ellipse(p.x, p.y, p.size, p.size);

        if (p.life <= 0 || p.x < -20 || p.x > width + 20 || p.y < -20 || p.y > height + 20) {
          particles.splice(i, 1);
        }
      }

      // Emitter and attractor glowing dots
      blendMode(BLEND);
      for (let em of emitters) {
        let pulse = sin(t * 8 + em.id * 0.7) * 0.25 + 0.75;
        noStroke();
        fill(em.hue, 50, 90, 15);
        ellipse(em.x, em.y, 24, 24);
        fill(em.hue, 55, 90 * pulse, 70);
        ellipse(em.x, em.y, 8, 8);
      }
      for (let at of attractors) {
        let pulse = sin(t * 8 + at.id * 0.7 + PI) * 0.25 + 0.75;
        noStroke();
        fill(at.hue, 55, 90, 15);
        ellipse(at.x, at.y, 28, 28);
        fill(at.hue, 65, 95 * pulse, 70);
        ellipse(at.x, at.y, 10, 10);
      }
      blendMode(ADD);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      buildLayout();
      for (let p of particles) {
        for (let m of matchPairs) {
          if (abs(p.hueS - emitters[m.emitter].hue) < 1) {
            p.tx = attractors[m.attractor].x;
            p.ty = attractors[m.attractor].y;
          }
        }
      }
    }
  </script>
</body>
</html>
