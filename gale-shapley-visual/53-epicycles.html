<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fourier Epicycles — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Fourier Epicycles</h2><p>The preference graph decomposed into Fourier series. Spinning epicycles draw the matching diagram — complex motion encoding simple structure.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    let t = 0;

    // Create a matching polygon path (10 points: 5 men, 5 women connected by matching)
    const pathPoints = [];
    const numSamples = 256;

    // Define a shape: a star-like polygon connecting matched pairs
    function buildPath() {
      const cx = 0, cy = 0;
      const R = 150;
      // 5 matched pairs form a 10-pointed star
      for (let i = 0; i < 10; i++) {
        const angle = (i / 10) * Math.PI * 2 - Math.PI / 2;
        const r = (i % 2 === 0) ? R : R * 0.45;
        pathPoints.push({ x: r * Math.cos(angle), y: r * Math.sin(angle) });
      }
      pathPoints.push(pathPoints[0]); // close
    }
    buildPath();

    // Sample path uniformly
    function samplePath(numSamples) {
      const samples = [];
      const totalLen = pathPoints.length - 1;
      for (let i = 0; i < numSamples; i++) {
        const frac = i / numSamples;
        const idx = frac * totalLen;
        const a = Math.floor(idx);
        const b = Math.min(a + 1, totalLen);
        const lerp = idx - a;
        samples.push({
          x: pathPoints[a].x * (1 - lerp) + pathPoints[b].x * lerp,
          y: pathPoints[a].y * (1 - lerp) + pathPoints[b].y * lerp
        });
      }
      return samples;
    }

    // DFT
    function dft(samples) {
      const N = samples.length;
      const result = [];
      for (let k = 0; k < N; k++) {
        let re = 0, im = 0;
        for (let n = 0; n < N; n++) {
          const angle = (2 * Math.PI * k * n) / N;
          re += samples[n].x * Math.cos(angle) + samples[n].y * Math.sin(angle);
          im += samples[n].y * Math.cos(angle) - samples[n].x * Math.sin(angle);
        }
        re /= N;
        im /= N;
        const amp = Math.sqrt(re * re + im * im);
        const phase = Math.atan2(im, re);
        result.push({ freq: k, amp, phase, re, im });
      }
      // Sort by amplitude descending
      result.sort((a, b) => b.amp - a.amp);
      return result;
    }

    const samples = samplePath(numSamples);
    const fourier = dft(samples);
    const maxCircles = 60; // Use top N coefficients

    const trail = [];
    const maxTrail = 800;

    function draw() {
      ctx.fillStyle = 'rgba(13,17,23,0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      // Draw epicycles
      let x = cx, y = cy;
      const time = t * 0.4;

      for (let i = 0; i < maxCircles && i < fourier.length; i++) {
        const { freq, amp, phase } = fourier[i];
        const prevX = x, prevY = y;

        const angle = freq * time * (2 * Math.PI / numSamples) + phase;
        x += amp * Math.cos(angle);
        y += amp * Math.sin(angle);

        // Draw circle
        ctx.beginPath();
        ctx.arc(prevX, prevY, amp, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(88,166,255,${0.12 - i * 0.001})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();

        // Draw radius
        ctx.beginPath();
        ctx.moveTo(prevX, prevY);
        ctx.lineTo(x, y);
        ctx.strokeStyle = `rgba(140,180,255,${0.25 - i * 0.003})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Draw pen tip
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#06d6a0';
      ctx.fill();

      // Add to trail
      trail.unshift({ x, y });
      if (trail.length > maxTrail) trail.pop();

      // Draw trail
      ctx.beginPath();
      for (let i = 0; i < trail.length; i++) {
        if (i === 0) ctx.moveTo(trail[i].x, trail[i].y);
        else ctx.lineTo(trail[i].x, trail[i].y);
      }
      ctx.strokeStyle = 'rgba(6,214,160,0.8)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Secondary glow trail
      ctx.beginPath();
      for (let i = 0; i < trail.length; i++) {
        if (i === 0) ctx.moveTo(trail[i].x, trail[i].y);
        else ctx.lineTo(trail[i].x, trail[i].y);
      }
      ctx.strokeStyle = 'rgba(6,214,160,0.15)';
      ctx.lineWidth = 6;
      ctx.stroke();
    }

    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      draw();
    }
    animate();
  </script>
</body>
</html>
