<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Epicycles DA — Matching Algorithms Visual Gallery</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:sans-serif; }
    canvas { display:block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); color:#8b949e; font-size:12px; line-height:1.4; }
    .info h2 { font-size:15px; color:#58a6ff; margin-bottom:4px; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div class="info">
    <h2>Epicycles DA</h2>
    <p>Each DA round is an epicycle. The traced path spirals inward toward the stable matching fixed point. Gold tip, silver arms, cyan orbit circles.</p>
  </div>
  <canvas id="canvas"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const N = 8;

    let t = 0;
    let epicycles = [];
    let trailPoints = [];
    let maxTrail = 3000;

    function resize() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    }

    function shuffled(n) {
      let a = [...Array(n).keys()];
      for (let i = n - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function init() {
      resize();

      let studentPrefs = [], schoolPrefs = [];
      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffled(N));
        schoolPrefs.push(shuffled(N));
      }
      let sNext = new Array(N).fill(0);
      let schCur = new Array(N).fill(-1);
      let roundCount = 0;

      for (let round = 0; round < N * N; round++) {
        let free = [];
        for (let s = 0; s < N; s++) {
          let m = false;
          for (let c = 0; c < N; c++) if (schCur[c] === s) { m = true; break; }
          if (!m && sNext[s] < N) free.push(s);
        }
        if (free.length === 0) break;
        roundCount++;

        for (let s of free) {
          let sch = studentPrefs[s][sNext[s]];
          sNext[s]++;
          if (schCur[sch] === -1) {
            schCur[sch] = s;
          } else {
            let cur = schCur[sch];
            if (schoolPrefs[sch].indexOf(s) < schoolPrefs[sch].indexOf(cur)) {
              schCur[sch] = s;
            }
          }
        }
      }

      let baseRadius = Math.min(innerWidth, innerHeight) * 0.15;
      epicycles = [];
      let totalRounds = Math.max(roundCount, 3);

      for (let i = 0; i < totalRounds; i++) {
        let amp = baseRadius * (1 - i / totalRounds) * 0.6 + baseRadius * 0.05;
        let freq = (i + 1) * 0.7;
        epicycles.push({ amplitude: amp, frequency: freq, phase: i * 0.5 });
      }

      trailPoints = [];
    }

    function drawFrame() {
      ctx.fillStyle = 'rgba(13, 17, 23, 0.06)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      let cx = innerWidth / 2;
      let cy = innerHeight / 2;
      let x = cx;
      let y = cy;

      for (let i = 0; i < epicycles.length; i++) {
        let ep = epicycles[i];
        let prevX = x;
        let prevY = y;

        let angle = ep.frequency * t + ep.phase;
        x += ep.amplitude * Math.cos(angle);
        y += ep.amplitude * Math.sin(angle);

        ctx.strokeStyle = `rgba(0, 200, 220, ${0.12 - i * 0.01})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.arc(prevX, prevY, ep.amplitude, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = `rgba(180, 190, 200, ${0.4 - i * 0.03})`;
        ctx.lineWidth = 1.5 - i * 0.1;
        ctx.beginPath();
        ctx.moveTo(prevX, prevY);
        ctx.lineTo(x, y);
        ctx.stroke();

        ctx.fillStyle = `rgba(180, 190, 200, ${0.5 - i * 0.04})`;
        ctx.beginPath();
        ctx.arc(prevX, prevY, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      trailPoints.push({ x, y });
      if (trailPoints.length > maxTrail) trailPoints.shift();

      if (trailPoints.length > 1) {
        for (let i = 1; i < trailPoints.length; i++) {
          let alpha = (i / trailPoints.length) * 0.8;
          let g = 200 + Math.floor((i / trailPoints.length) * 55);
          ctx.strokeStyle = `rgba(255, ${g}, 50, ${alpha})`;
          ctx.lineWidth = 1 + (i / trailPoints.length) * 1.5;
          ctx.beginPath();
          ctx.moveTo(trailPoints[i - 1].x, trailPoints[i - 1].y);
          ctx.lineTo(trailPoints[i].x, trailPoints[i].y);
          ctx.stroke();
        }
      }

      ctx.fillStyle = '#ffd700';
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = 'rgba(88, 166, 255, 0.3)';
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#8b949e';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(epicycles.length + ' epicycles (DA rounds)', innerWidth - 20, 20);
      ctx.fillText('Trail: ' + trailPoints.length + ' points', innerWidth - 20, 38);

      t += 0.008;
      requestAnimationFrame(drawFrame);
    }

    window.addEventListener('resize', resize);
    init();
    drawFrame();
  </script>
</body>
</html>
