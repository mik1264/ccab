<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watercolor Matching — Matching Algorithms Visual Gallery</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:sans-serif; }
    canvas { display:block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); color:#8b949e; font-size:12px; line-height:1.4; }
    .info h2 { font-size:15px; color:#58a6ff; margin-bottom:4px; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div class="info">
    <h2>Watercolor Matching</h2>
    <p>Warm blobs = student proposals. Cool blobs = school responses. Green overlap = stable matches. Watch 10 rounds of DA unfold as watercolor washes.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 8;
    let pg;
    let round = 0;
    let maxRounds = 10;
    let frameCounter = 0;
    let framesPerRound = 90;
    let blobs = [];
    let stableMatches = [];
    let algorithmDone = false;

    // DA algorithm state
    let studentPrefs = [], schoolPrefs = [];
    let studentNext = [];
    let schoolCurrent = [];
    let roundProposals = [];

    // Warm palette for students (orange/red)
    let warmColors = [
      [220, 80, 50], [240, 120, 40], [200, 60, 70], [230, 100, 30],
      [210, 70, 60], [250, 90, 45], [190, 65, 80], [235, 110, 55]
    ];
    // Cool palette for schools (blue/purple)
    let coolColors = [
      [50, 80, 200], [80, 50, 180], [40, 100, 210], [90, 60, 190],
      [60, 90, 220], [70, 40, 170], [45, 110, 200], [100, 70, 185]
    ];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      pg = createGraphics(windowWidth, windowHeight);
      pg.background(13, 17, 23);
      initAlgorithm();
    }

    function initAlgorithm() {
      studentPrefs = [];
      schoolPrefs = [];
      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffleArray([...Array(N).keys()]));
        schoolPrefs.push(shuffleArray([...Array(N).keys()]));
      }
      studentNext = new Array(N).fill(0);
      schoolCurrent = new Array(N).fill(-1);
      roundProposals = [];
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function runOneRound() {
      let proposals = [];
      let freeStudents = [];
      for (let s = 0; s < N; s++) {
        if (!stableMatches.some(m => m.student === s) && studentNext[s] < N) {
          freeStudents.push(s);
        }
      }
      if (freeStudents.length === 0) {
        algorithmDone = true;
        return;
      }
      for (let s of freeStudents) {
        let sch = studentPrefs[s][studentNext[s]];
        studentNext[s]++;
        proposals.push({ student: s, school: sch });
        if (schoolCurrent[sch] === -1) {
          schoolCurrent[sch] = s;
        } else {
          let current = schoolCurrent[sch];
          let prefs = schoolPrefs[sch];
          if (prefs.indexOf(s) < prefs.indexOf(current)) {
            schoolCurrent[sch] = s;
            // current is rejected - remove from stable if there
          } else {
            // s is rejected
          }
        }
      }
      // Update stable matches from schoolCurrent
      stableMatches = [];
      for (let sch = 0; sch < N; sch++) {
        if (schoolCurrent[sch] !== -1) {
          stableMatches.push({ student: schoolCurrent[sch], school: sch });
        }
      }
      roundProposals = proposals;
    }

    function addBlobs() {
      // Add proposal blobs (warm) and response blobs (cool) for this round
      for (let p of roundProposals) {
        let sx = width * 0.15 + (p.student / (N - 1)) * width * 0.7;
        let sy = height * 0.3 + Math.sin(p.student * 1.2) * height * 0.1;
        let schX = width * 0.15 + (p.school / (N - 1)) * width * 0.7;
        let schY = height * 0.65 + Math.sin(p.school * 1.5) * height * 0.08;
        let mx = (sx + schX) / 2 + (Math.random() - 0.5) * 80;
        let my = (sy + schY) / 2 + (Math.random() - 0.5) * 60;

        // Student proposal blob (warm)
        for (let i = 0; i < 12; i++) {
          let bx = mx + (Math.random() - 0.5) * 100;
          let by = my + (Math.random() - 0.5) * 80 - 30;
          let col = warmColors[p.student];
          blobs.push({ x: bx, y: by, col: col, size: 20 + Math.random() * 40, alpha: 15 + Math.random() * 15, life: 1 });
        }
        // School response blob (cool)
        for (let i = 0; i < 10; i++) {
          let bx = mx + (Math.random() - 0.5) * 100;
          let by = my + (Math.random() - 0.5) * 80 + 30;
          let col = coolColors[p.school];
          blobs.push({ x: bx, y: by, col: col, size: 18 + Math.random() * 35, alpha: 15 + Math.random() * 15, life: 1 });
        }
      }
      // Stable match green overlaps
      for (let m of stableMatches) {
        let sx = width * 0.15 + (m.student / (N - 1)) * width * 0.7;
        let sy = height * 0.3;
        let schX = width * 0.15 + (m.school / (N - 1)) * width * 0.7;
        let schY = height * 0.65;
        let mx2 = (sx + schX) / 2;
        let my2 = (sy + schY) / 2;
        for (let i = 0; i < 5; i++) {
          blobs.push({
            x: mx2 + (Math.random() - 0.5) * 60,
            y: my2 + (Math.random() - 0.5) * 50,
            col: [40, 180, 80],
            size: 25 + Math.random() * 45,
            alpha: 12 + Math.random() * 10,
            life: 1
          });
        }
      }
    }

    function draw() {
      frameCounter++;

      if (!algorithmDone && frameCounter % framesPerRound === 0 && round < maxRounds) {
        runOneRound();
        addBlobs();
        round++;
      }

      // Draw pending blobs to offscreen buffer
      let toDraw = blobs.splice(0, Math.min(8, blobs.length));
      for (let b of toDraw) {
        pg.noStroke();
        let c = b.col;
        pg.fill(c[0], c[1], c[2], b.alpha);
        pg.push();
        pg.translate(b.x, b.y);
        pg.beginShape();
        let verts = 8;
        for (let v = 0; v < verts; v++) {
          let a = (Math.PI * 2 / verts) * v;
          let r = b.size * 0.5 * (0.65 + Math.random() * 0.7);
          pg.vertex(Math.cos(a) * r, Math.sin(a) * r);
        }
        pg.endShape(CLOSE);
        pg.pop();
      }

      image(pg, 0, 0);

      // Draw labels for students and schools
      noStroke();
      textAlign(CENTER, CENTER);
      textSize(11);
      for (let i = 0; i < N; i++) {
        let sx = width * 0.15 + (i / (N - 1)) * width * 0.7;
        let sy = height * 0.18;
        fill(warmColors[i][0], warmColors[i][1], warmColors[i][2], 200);
        ellipse(sx, sy, 20, 20);
        fill(255);
        text('S' + (i + 1), sx, sy);

        let schY = height * 0.82;
        fill(coolColors[i][0], coolColors[i][1], coolColors[i][2], 200);
        ellipse(sx, schY, 20, 20);
        fill(255);
        text('C' + (i + 1), sx, schY);
      }

      // Round indicator
      fill(88, 166, 255, 180);
      textSize(13);
      textAlign(RIGHT, TOP);
      text('Round ' + round + '/' + maxRounds, width - 20, 20);

      if (algorithmDone) {
        fill(40, 180, 80, 180);
        text('Stable Matching Found', width - 20, 40);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      let newPg = createGraphics(windowWidth, windowHeight);
      newPg.background(13, 17, 23);
      newPg.image(pg, 0, 0);
      pg = newPg;
    }
  </script>
</body>
</html>
