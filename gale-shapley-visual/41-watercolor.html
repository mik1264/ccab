<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Watercolor Matching — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#FEFAE0; overflow:hidden; }
    canvas { display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(254,250,224,0.92); border:1px solid #ddd3b8; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#6b4c2a; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b7d6b; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Watercolor Matching</h2><p>Each stable pair is painted with a unique watercolor wash. The pigments diffuse and blend, showing how matches stabilize and color their surrounding space.</p></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    // Matched pairs with watercolor palette
    let pairs = [];
    let pairColors;
    let drops = [];
    let pg;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      pg = createGraphics(windowWidth, windowHeight);
      pg.background(254, 250, 224);

      pairColors = [
        [200, 60, 60],   // warm red
        [50, 100, 180],  // cerulean blue
        [60, 150, 80],   // mossy green
        [220, 140, 40],  // warm orange
        [130, 70, 160]   // soft purple
      ];

      // Place 5 matched pairs across the canvas
      let margin = 120;
      for (let i = 0; i < 5; i++) {
        let angle = (TWO_PI / 5) * i - HALF_PI;
        let r = min(width, height) * 0.25;
        let cx = width / 2 + cos(angle) * r;
        let cy = height / 2 + sin(angle) * r;
        // Man and woman positions offset from center
        let offset = 30 + random(20);
        let mx = cx + cos(angle + 0.3) * offset;
        let my = cy + sin(angle + 0.3) * offset;
        let wx = cx + cos(angle - 0.3) * offset;
        let wy = cy + sin(angle - 0.3) * offset;
        pairs.push({
          mx, my, wx, wy,
          cx: (mx + wx) / 2,
          cy: (my + wy) / 2,
          col: pairColors[i],
          radius: 20,
          maxRadius: min(width, height) * 0.28
        });
      }
    }

    function draw() {
      // Add watercolor drops each frame
      for (let p of pairs) {
        if (p.radius < p.maxRadius) {
          let dropsPerFrame = 8;
          for (let d = 0; d < dropsPerFrame; d++) {
            let angle = random(TWO_PI);
            let dist = random(p.radius);
            // Cluster more toward the edges for diffusion effect
            dist = pow(random(), 0.6) * p.radius;
            let x = p.cx + cos(angle) * dist;
            let y = p.cy + sin(angle) * dist;
            let sz = random(15, 55);
            let alpha = random(8, 22);
            // Slight color variation for watercolor feel
            let cr = p.col[0] + random(-15, 15);
            let cg = p.col[1] + random(-15, 15);
            let cb = p.col[2] + random(-15, 15);
            pg.noStroke();
            pg.fill(cr, cg, cb, alpha);
            // Irregular blob shape
            pg.push();
            pg.translate(x, y);
            pg.beginShape();
            let verts = 8;
            for (let v = 0; v < verts; v++) {
              let va = (TWO_PI / verts) * v;
              let vr = sz * 0.5 * (0.7 + random(0.6));
              pg.vertex(cos(va) * vr, sin(va) * vr);
            }
            pg.endShape(CLOSE);
            pg.pop();
          }
          p.radius += 0.4;
        }
      }

      // Draw a few accent splatter drops
      if (frameCount % 3 === 0) {
        let p = pairs[floor(random(5))];
        if (p.radius > 40) {
          let angle = random(TWO_PI);
          let dist = random(p.radius * 0.5, p.radius * 1.1);
          let x = p.cx + cos(angle) * dist;
          let y = p.cy + sin(angle) * dist;
          let sz = random(3, 10);
          pg.noStroke();
          pg.fill(p.col[0], p.col[1], p.col[2], random(15, 40));
          pg.ellipse(x, y, sz, sz);
        }
      }

      // Draw pair markers (small agent dots)
      image(pg, 0, 0);

      // Draw agents as small labeled circles
      for (let i = 0; i < pairs.length; i++) {
        let p = pairs[i];
        // Man dot
        fill(40, 80, 160);
        noStroke();
        ellipse(p.mx, p.my, 14, 14);
        // Woman dot
        fill(160, 50, 90);
        ellipse(p.wx, p.wy, 14, 14);
        // Connecting line
        stroke(80, 70, 60, 80);
        strokeWeight(1);
        line(p.mx, p.my, p.wx, p.wy);
      }

      // Labels
      noStroke();
      fill(80, 60, 40);
      textFont('Nunito');
      textSize(10);
      textAlign(CENTER, CENTER);
      for (let i = 0; i < pairs.length; i++) {
        let p = pairs[i];
        fill(255);
        text('M' + (i+1), p.mx, p.my);
        text('W' + (i+1), p.wx, p.wy);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      let newPg = createGraphics(windowWidth, windowHeight);
      newPg.background(254, 250, 224);
      newPg.image(pg, 0, 0);
      pg = newPg;
    }
  </script>
</body>
</html>
