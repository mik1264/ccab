<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preference Heatmap — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Preference Heatmap</h2><p>A 2D heatmap where X=proposer index, Y=recipient index. Color intensity shows preference rank. Watch proposals light up the field as the DA algorithm runs.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);

    function mkShader(type, src) {
      const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
      return s;
    }
    function mkProg(vs, fs) {
      const p = gl.createProgram();
      gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
      gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(p); return p;
    }

    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0,1); }`;

    const FS = `
    precision mediump float;
    uniform float u_time;
    uniform vec2 u_res;

    // Preference ranks: ranks[i][j] = rank of j in i's list (0=top, 5=bottom)
    // Encoded as a function for simplicity
    float getRank(int i, int j) {
      // Deterministic pseudo-random ranking
      int v = i * 7 + j * 13 + i * j * 3;
      v = v - (v / 6) * 6;
      if (v < 0) v = -v;
      return float(v);
    }

    vec3 hotColormap(float t) {
      // Black -> Red -> Yellow -> White
      t = clamp(t, 0.0, 1.0);
      float r = clamp(t * 3.0, 0.0, 1.0);
      float g = clamp(t * 3.0 - 1.0, 0.0, 1.0);
      float b = clamp(t * 3.0 - 2.0, 0.0, 1.0);
      return vec3(r, g, b);
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      float aspect = u_res.x / u_res.y;

      // Center and scale to show 6x6 grid with margins
      vec2 gridUV = (uv - 0.5) * vec2(aspect, 1.0);
      gridUV = gridUV * 1.6 + 0.5;

      // Grid coordinates
      float cellX = gridUV.x * 6.0;
      float cellY = gridUV.y * 6.0;
      int ix = int(floor(cellX));
      int iy = int(floor(cellY));

      // Check if inside grid
      if (ix < 0 || ix >= 6 || iy < 0 || iy >= 6) {
        // Background: subtle grid pattern
        float bg = 0.02 + 0.01 * sin(uv.x * 40.0) * sin(uv.y * 40.0);
        gl_FragColor = vec4(vec3(bg), 1.0);
        return;
      }

      // Cell-local coordinates
      float lx = fract(cellX);
      float ly = fract(cellY);

      // Get rank for this cell
      float rank = getRank(ix, iy);
      float normRank = 1.0 - rank / 5.0; // Invert: top rank = brightest

      // Hot colormap
      vec3 col = hotColormap(normRank);

      // Current round (cycles through 0-5)
      float roundF = mod(u_time * 0.5, 7.0);
      int currentRound = int(floor(roundF));

      // Scan effect: highlight cells being proposed in current round
      float scanGlow = 0.0;
      if (iy == currentRound || ix == currentRound) {
        scanGlow = 0.3 * (0.5 + 0.5 * sin(u_time * 4.0));
      }

      // Pulse for active proposal
      if (int(floor(rank)) == currentRound) {
        float pulse = 0.5 + 0.5 * sin(u_time * 6.0);
        col += vec3(0.2, 0.3, 0.5) * pulse;
      }

      // Add scan glow
      col += vec3(0.1, 0.2, 0.4) * scanGlow;

      // Cell border
      float borderDist = min(min(lx, 1.0 - lx), min(ly, 1.0 - ly));
      float border = smoothstep(0.0, 0.04, borderDist);
      col *= border;

      // Grid lines glow
      float gridLine = 1.0 - smoothstep(0.0, 0.02, borderDist);
      col += vec3(0.05, 0.1, 0.2) * gridLine;

      // Overall vignette
      float vig = 1.0 - 0.3 * length(uv - 0.5);
      col *= vig;

      gl_FragColor = vec4(col, 1.0);
    }`;

    const prog = mkProg(VS, FS);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    const pLoc = gl.getAttribLocation(prog, 'p');
    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uRes = gl.getUniformLocation(prog, 'u_res');

    gl.useProgram(prog);
    gl.enableVertexAttribArray(pLoc);
    gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

    function frame(t) {
      gl.uniform1f(uTime, t * 0.001);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
