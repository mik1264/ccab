<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preference Prism — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">&#8592; Visual Gallery</a>
  <div class="info"><h2>Preference Prism</h2><p>A glass prism disperses preference rankings into a spectrum. Each color represents a different rank — top choice is red, least preferred is violet.</p></div>
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1117);
    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0, 4, 16);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    scene.add(new THREE.AmbientLight(0x222244, 0.4));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight.position.set(0, 10, 10);
    scene.add(dirLight);

    const prismGroup = new THREE.Group();
    scene.add(prismGroup);

    // Octahedron prism in center
    const prismGeo = new THREE.OctahedronGeometry(2.5, 0);
    const prismMat = new THREE.MeshPhongMaterial({
      color: 0x88aacc,
      emissive: 0x223344,
      emissiveIntensity: 0.3,
      transparent: true,
      opacity: 0.25,
      shininess: 200,
      side: THREE.DoubleSide
    });
    const prism = new THREE.Mesh(prismGeo, prismMat);
    prismGroup.add(prism);

    // Wireframe overlay
    const wireGeo = new THREE.OctahedronGeometry(2.52, 0);
    const wireMat = new THREE.MeshBasicMaterial({ color: 0x4488aa, wireframe: true, transparent: true, opacity: 0.5 });
    prismGroup.add(new THREE.Mesh(wireGeo, wireMat));

    // Inner glow
    const innerGeo = new THREE.OctahedronGeometry(2.0, 1);
    const innerMat = new THREE.MeshBasicMaterial({ color: 0x6699cc, transparent: true, opacity: 0.08 });
    prismGroup.add(new THREE.Mesh(innerGeo, innerMat));

    // Spectrum colors for 6 ranks
    const spectrumColors = [0xff2233, 0xff8800, 0xffee00, 0x33ff44, 0x3388ff, 0xaa33ff];

    // Input white beams (6 men entering from left)
    const N = 6;
    const beamStartX = -12;
    const prismX = 0;
    const beamEndX = 12;
    const beamSpread = 1.2;

    const inputBeams = [];
    const outputBeams = [];

    // Matching result: man i matched to woman matching[i]
    const matching = [1, 3, 0, 5, 2, 4];

    for (let m = 0; m < N; m++) {
      const y = (m - (N-1)/2) * beamSpread;

      // Input beam: white
      const inStart = new THREE.Vector3(beamStartX, y, 0);
      const inEnd = new THREE.Vector3(-2.5, y * 0.3, 0);
      const inMid = new THREE.Vector3(-6, y * 0.7, 0);
      const inCurve = new THREE.CatmullRomCurve3([inStart, inMid, inEnd]);
      const inTube = new THREE.TubeGeometry(inCurve, 20, 0.04, 8, false);
      const inMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.7,
        blending: THREE.AdditiveBlending
      });
      const inMesh = new THREE.Mesh(inTube, inMat);
      prismGroup.add(inMesh);
      inputBeams.push(inMesh);

      // Output beams: 6 spectrum colors (one for each rank)
      for (let rank = 0; rank < N; rank++) {
        const outY = (rank - (N-1)/2) * beamSpread * 0.8;
        const isMatched = matching[m] === rank;

        const outStart = new THREE.Vector3(2.5, y * 0.1, 0);
        const outMid = new THREE.Vector3(6, outY * 0.6 + y * 0.2, (rank - 2.5) * 0.4);
        const outEnd = new THREE.Vector3(beamEndX, outY, (rank - 2.5) * 0.8);
        const outCurve = new THREE.CatmullRomCurve3([outStart, outMid, outEnd]);

        const thickness = isMatched ? 0.05 : 0.02;
        const outTube = new THREE.TubeGeometry(outCurve, 20, thickness, 8, false);
        const outMat = new THREE.MeshBasicMaterial({
          color: spectrumColors[rank],
          transparent: true,
          opacity: isMatched ? 0.8 : 0.15,
          blending: THREE.AdditiveBlending
        });
        const outMesh = new THREE.Mesh(outTube, outMat);
        prismGroup.add(outMesh);
        outputBeams.push({ mesh: outMesh, isMatched, manIdx: m, rank });
      }
    }

    // Point light inside prism
    const prismLight = new THREE.PointLight(0x88aaff, 1.5, 8);
    prismLight.position.set(0, 0, 0);
    prismGroup.add(prismLight);

    function animate(t) {
      requestAnimationFrame(animate);
      const time = t * 0.001;

      // Camera orbit
      camera.position.x = Math.sin(time * 0.12) * 16;
      camera.position.z = Math.cos(time * 0.12) * 16;
      camera.position.y = 3 + Math.sin(time * 0.08) * 2;
      camera.lookAt(0, 0, 0);

      // Prism slow rotation
      prism.rotation.y = time * 0.15;
      prism.rotation.x = Math.sin(time * 0.1) * 0.2;

      // Pulse prism light
      prismLight.intensity = 1.2 + Math.sin(time * 2) * 0.5;
      prismMat.opacity = 0.2 + Math.sin(time * 1.5) * 0.05;

      // Pulse matched output beams
      outputBeams.forEach((b, i) => {
        if (b.isMatched) {
          b.mesh.material.opacity = 0.6 + Math.sin(time * 2 + b.manIdx) * 0.25;
        }
      });

      // Pulse input beams
      inputBeams.forEach((b, i) => {
        b.material.opacity = 0.5 + Math.sin(time * 1.5 + i * 0.5) * 0.2;
      });

      renderer.render(scene, camera);
    }
    animate(0);
  </script>
</body>
</html>
