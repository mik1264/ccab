<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prism Light</title>
<style>
* { margin: 0; padding: 0; }
body { background: #0d1117; overflow: hidden; }
.back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
.back:hover { background: #30363d; }
</style>
</head>
<body>
<a class="back" href="index.html">&#8592; Back</a>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 0, 10);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x0d1117);
document.body.appendChild(renderer.domElement);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
scene.add(new THREE.AmbientLight(0x334455, 2));
const dl = new THREE.DirectionalLight(0xffffff, 2);
dl.position.set(5, 8, 5); scene.add(dl);

// White prismatic side light
const sideLight = new THREE.DirectionalLight(0xffffff, 1.5);
sideLight.position.set(-8, 2, 0);
scene.add(sideLight);

const group = new THREE.Group();
const spheres = [];

// Triangular prism: 3 rows, each row is a triangle of 3 spheres
const triPositions = [
  [-1, 0, -0.577],
  [1, 0, -0.577],
  [0, 0, 0.577]
];

let idx = 0;
for (let row = 0; row < 3; row++) {
  const y = (row - 1) * 1.8;
  for (let i = 0; i < 3; i++) {
    const geo = new THREE.SphereGeometry(0.55, 32, 32);
    const mat = new THREE.MeshPhongMaterial({
      color: 0xffffff,
      shininess: 150,
      specular: 0x666666
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(triPositions[i][0] * 1.4, y, triPositions[i][2] * 1.4);
    mesh.userData.phase = idx * 0.7;
    mesh.userData.baseY = y;
    mesh.userData.index = idx;
    spheres.push(mesh);
    group.add(mesh);
    idx++;
  }
}

scene.add(group);

function animate(ts) {
  requestAnimationFrame(animate);
  const t = ts * 0.001;

  group.rotation.y = t * 0.3;

  spheres.forEach((s) => {
    s.position.y = s.userData.baseY + Math.sin(t * 1.5 + s.userData.phase) * 0.35;
    var hue = ((s.userData.index / 9) + t * 0.06) % 1;
    s.material.color.setHSL(hue, 0.85, 0.55);
  });

  camera.position.x = Math.sin(t * 0.2) * 10;
  camera.position.y = Math.sin(t * 0.15) * 3;
  camera.position.z = Math.cos(t * 0.2) * 10;
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
animate(0);
</script>
</body>
</html>
