<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preference Vector Field — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Nunito', sans-serif; }
    .back-link { position: fixed; top: 16px; left: 16px; background: rgba(22,27,34,0.9); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; transition: background 0.2s; }
    .back-link:hover { background: #30363d; }
    .info { position: fixed; top: 60px; left: 16px; background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 10px; padding: 12px 16px; z-index: 50; max-width: 280px; backdrop-filter: blur(8px); }
    .info h2 { font-family: 'Lora', serif; font-size: 15px; color: #58a6ff; margin-bottom: 4px; }
    .info p { font-size: 12px; color: #8b949e; line-height: 1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info">
    <h2>Preference Vector Field</h2>
    <p>A vector field where each point's arrow points toward the nearest high-ranked preferred agent. Stable matchings appear as attractors in the field.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 5;
    const GRID = 20;
    let menAgents = [], womenAgents = [];
    let menPrefs = [], womenPrefs = [];
    let stableMatches = [];
    let algorithmStep = 0;
    let maxSteps = 0;
    let menNext = [], womenCurrent = [], menFree = [];
    let algorithmDone = false;
    let stepTimer = 0;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      initSim();
    }

    function shuffleArr(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initSim() {
      menAgents = [];
      womenAgents = [];
      stableMatches = [];
      algorithmDone = false;
      algorithmStep = 0;
      stepTimer = 0;
      menPrefs = [];
      womenPrefs = [];

      for (let i = 0; i < N; i++) {
        menPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
        womenPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
      }

      menNext = new Array(N).fill(0);
      womenCurrent = new Array(N).fill(-1);
      menFree = new Array(N).fill(true);

      // Place agents
      for (let i = 0; i < N; i++) {
        menAgents.push({
          x: width * (0.15 + 0.15 * (i % 3)),
          y: height * (0.3 + 0.4 * Math.floor(i / 3)),
          hue: map(i, 0, N - 1, 200, 240)
        });
      }
      for (let i = 0; i < N; i++) {
        womenAgents.push({
          x: width * (0.6 + 0.15 * (i % 3)),
          y: height * (0.3 + 0.4 * Math.floor(i / 3)),
          hue: map(i, 0, N - 1, 340, 380) % 360
        });
      }
    }

    function doAlgorithmStep() {
      let changed = false;
      for (let m = 0; m < N; m++) {
        if (!menFree[m] || menNext[m] >= N) continue;
        let w = menPrefs[m][menNext[m]];
        menNext[m]++;
        changed = true;
        if (womenCurrent[w] === -1) {
          womenCurrent[w] = m;
          menFree[m] = false;
        } else {
          let curM = womenCurrent[w];
          if (womenPrefs[w].indexOf(m) < womenPrefs[w].indexOf(curM)) {
            womenCurrent[w] = m;
            menFree[m] = false;
            menFree[curM] = true;
          }
        }
      }
      if (!changed) {
        algorithmDone = true;
        stableMatches = [];
        for (let w = 0; w < N; w++) {
          if (womenCurrent[w] !== -1) {
            stableMatches.push({m: womenCurrent[w], w});
          }
        }
      }
      algorithmStep++;
    }

    function draw() {
      background(220, 15, 6);

      // Progress algorithm
      stepTimer++;
      if (!algorithmDone && stepTimer % 40 === 0) {
        doAlgorithmStep();
      }

      // Compute which agents are currently matched for field influence
      let currentMatches = [];
      for (let w = 0; w < N; w++) {
        if (womenCurrent[w] !== -1) {
          currentMatches.push({m: womenCurrent[w], w});
        }
      }

      // Draw vector field
      for (let gx = GRID / 2; gx < width; gx += GRID) {
        for (let gy = GRID / 2; gy < height; gy += GRID) {
          let totalDx = 0, totalDy = 0;
          let dominantHue = 0;
          let maxWeight = 0;

          // Pull from all agents weighted by how desirable they are
          let allAgents = [...menAgents.map((a, i) => ({...a, side: 'M', id: i})),
                           ...womenAgents.map((a, i) => ({...a, side: 'W', id: i}))];

          for (let agent of allAgents) {
            let dx = agent.x - gx;
            let dy = agent.y - gy;
            let d = sqrt(dx * dx + dy * dy) || 1;

            // Weight: how desired is this agent?
            let desirability = 0;
            if (agent.side === 'M') {
              for (let w = 0; w < N; w++) {
                desirability += 1 / (womenPrefs[w].indexOf(agent.id) + 1);
              }
            } else {
              for (let m = 0; m < N; m++) {
                desirability += 1 / (menPrefs[m].indexOf(agent.id) + 1);
              }
            }

            // Boost matched agents
            let matchBoost = 1;
            if (algorithmDone) {
              let isMatched = stableMatches.some(sm =>
                (agent.side === 'M' && sm.m === agent.id) ||
                (agent.side === 'W' && sm.w === agent.id));
              if (isMatched) matchBoost = 3;
            }

            let weight = desirability * matchBoost / max(d * 0.01, 0.5);
            totalDx += (dx / d) * weight;
            totalDy += (dy / d) * weight;

            if (weight > maxWeight) {
              maxWeight = weight;
              dominantHue = agent.hue;
            }
          }

          // Draw arrow
          let angle = atan2(totalDy, totalDx);
          let mag = min(sqrt(totalDx * totalDx + totalDy * totalDy), GRID * 0.6);
          let alpha = map(mag, 0, GRID * 0.6, 15, 60);

          stroke(dominantHue, 60, 70, alpha);
          strokeWeight(1);
          let ex = gx + cos(angle) * mag * 0.4;
          let ey = gy + sin(angle) * mag * 0.4;
          line(gx, gy, ex, ey);

          // Arrowhead
          let headSize = 3;
          let ha1 = angle + PI * 0.8;
          let ha2 = angle - PI * 0.8;
          line(ex, ey, ex + cos(ha1) * headSize, ey + sin(ha1) * headSize);
          line(ex, ey, ex + cos(ha2) * headSize, ey + sin(ha2) * headSize);
        }
      }

      // Draw stable matching glow regions
      if (algorithmDone) {
        for (let sm of stableMatches) {
          let mA = menAgents[sm.m];
          let wA = womenAgents[sm.w];
          let cx = (mA.x + wA.x) / 2;
          let cy = (mA.y + wA.y) / 2;
          let pulse = sin(frameCount * 0.04 + sm.m) * 0.3 + 0.7;

          noStroke();
          fill(60, 70, 70, 8 * pulse);
          ellipse(cx, cy, 120, 120);
          fill(60, 70, 70, 15 * pulse);
          ellipse(cx, cy, 60, 60);

          stroke(60, 60, 80, 50 * pulse);
          strokeWeight(2);
          line(mA.x, mA.y, wA.x, wA.y);
        }
      }

      // Draw agents
      for (let i = 0; i < N; i++) {
        noStroke();
        let a = menAgents[i];
        fill(a.hue, 70, 90, 20);
        ellipse(a.x, a.y, 30, 30);
        fill(a.hue, 70, 90, 80);
        ellipse(a.x, a.y, 14, 14);
        fill(0, 0, 100, 70);
        textAlign(CENTER, CENTER);
        textSize(9);
        text('M' + (i + 1), a.x, a.y - 18);
      }
      for (let i = 0; i < N; i++) {
        noStroke();
        let a = womenAgents[i];
        fill(a.hue, 60, 85, 20);
        ellipse(a.x, a.y, 30, 30);
        fill(a.hue, 60, 85, 80);
        ellipse(a.x, a.y, 14, 14);
        fill(0, 0, 100, 70);
        textAlign(CENTER, CENTER);
        textSize(9);
        text('W' + (i + 1), a.x, a.y - 18);
      }

      // Status
      noStroke();
      fill(0, 0, 80, 60);
      textAlign(RIGHT, TOP);
      textSize(13);
      text('Step: ' + algorithmStep + (algorithmDone ? ' (Stable!)' : ''), width - 20, 20);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
