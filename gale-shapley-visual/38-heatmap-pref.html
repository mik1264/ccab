<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animated Preference Heatmap — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; overflow:hidden; font-family:'Nunito',sans-serif; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
    svg text { font-family:'Nunito',sans-serif; }
    #viz { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
    .round-counter { position:fixed; top:16px; right:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:10px 18px; z-index:50; font-family:'JetBrains Mono',monospace; font-size:16px; color:#58a6ff; backdrop-filter:blur(8px); }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Animated Preference Heatmap</h2><p>A 5x5 heatmap of preference ranks. As the DA algorithm runs, cells light up showing which proposals were made and which were accepted.</p></div>
  <div class="round-counter" id="roundCounter">Ready</div>
  <div id="viz"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select('#viz').append('svg').attr('width', W).attr('height', H);

    const menPrefs = {
      m1: ['w3','w1','w2','w4','w5'],
      m2: ['w1','w2','w3','w5','w4'],
      m3: ['w2','w3','w1','w4','w5'],
      m4: ['w3','w4','w1','w2','w5'],
      m5: ['w4','w5','w3','w1','w2']
    };
    const womenPrefs = {
      w1: ['m2','m1','m3','m4','m5'],
      w2: ['m3','m2','m1','m4','m5'],
      w3: ['m1','m3','m4','m2','m5'],
      w4: ['m4','m3','m5','m1','m2'],
      w5: ['m5','m4','m3','m2','m1']
    };

    const men = ['m1','m2','m3','m4','m5'];
    const women = ['w1','w2','w3','w4','w5'];
    const menOptimal = { m1:'w3', m2:'w1', m3:'w2', m4:'w4', m5:'w5' };

    // Preference rank matrix: menPrefs[m].indexOf(w) + 1
    const rankMatrix = {};
    men.forEach(m => {
      women.forEach(w => {
        const rank = menPrefs[m].indexOf(w) + 1;
        rankMatrix[`${m}-${w}`] = rank;
      });
    });

    const cellSize = Math.min((W - 300) / 6, (H - 250) / 6, 90);
    const gridW = cellSize * 5;
    const gridH = cellSize * 5;
    const offsetX = (W - gridW) / 2;
    const offsetY = (H - gridH) / 2 + 20;

    const colorScale = d3.scaleSequential(d3.interpolateBlues).domain([6, 0]);

    const g = svg.append('g').attr('transform', `translate(${offsetX},${offsetY})`);

    // Column headers (women)
    women.forEach((w, i) => {
      g.append('text')
        .attr('x', i * cellSize + cellSize / 2)
        .attr('y', -15)
        .attr('text-anchor', 'middle')
        .attr('fill', '#d2a8ff').attr('font-size', 14).attr('font-weight', 600)
        .text(w);
    });

    // Row headers (men)
    men.forEach((m, i) => {
      g.append('text')
        .attr('x', -15)
        .attr('y', i * cellSize + cellSize / 2)
        .attr('text-anchor', 'end').attr('dominant-baseline', 'central')
        .attr('fill', '#58a6ff').attr('font-size', 14).attr('font-weight', 600)
        .text(m);
    });

    // Draw cells
    const cells = {};
    const cellTexts = {};
    men.forEach((m, mi) => {
      women.forEach((w, wi) => {
        const key = `${m}-${w}`;
        const rank = rankMatrix[key];

        cells[key] = g.append('rect')
          .attr('x', wi * cellSize + 2)
          .attr('y', mi * cellSize + 2)
          .attr('width', cellSize - 4)
          .attr('height', cellSize - 4)
          .attr('rx', 6)
          .attr('fill', colorScale(rank))
          .attr('opacity', 0.4)
          .attr('stroke', 'none')
          .attr('stroke-width', 0);

        cellTexts[key] = g.append('text')
          .attr('x', wi * cellSize + cellSize / 2)
          .attr('y', mi * cellSize + cellSize / 2)
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
          .attr('fill', '#e6edf3').attr('font-size', 16).attr('font-weight', 600)
          .attr('opacity', 0.4)
          .text(rank);
      });
    });

    // Run DA and animate
    function runDAAnimated() {
      const free = new Set(men);
      const nextProp = {};
      const matched = {};
      men.forEach(m => nextProp[m] = 0);
      let round = 0;
      const events = [];

      while (free.size > 0) {
        round++;
        const toProcess = [...free];
        for (const m of toProcess) {
          const w = menPrefs[m][nextProp[m]];
          nextProp[m]++;
          const currentM = matched[w];
          let accepted = false;
          if (!currentM) {
            matched[w] = m;
            free.delete(m);
            accepted = true;
          } else if (womenPrefs[w].indexOf(m) < womenPrefs[w].indexOf(currentM)) {
            matched[w] = m;
            free.delete(m);
            free.add(currentM);
            accepted = true;
          }
          events.push({ round, man: m, woman: w, accepted });
        }
      }
      return events;
    }

    const events = runDAAnimated();
    const counter = document.getElementById('roundCounter');
    let currentRound = 0;

    events.forEach((evt, i) => {
      setTimeout(() => {
        const key = `${evt.man}-${evt.woman}`;
        if (evt.round !== currentRound) {
          currentRound = evt.round;
          counter.textContent = `Round ${currentRound}`;
        }

        // Pulse the cell
        cells[key]
          .transition().duration(200)
          .attr('opacity', 1)
          .attr('stroke', evt.accepted ? '#3fb950' : '#f85149')
          .attr('stroke-width', 3);

        cellTexts[key]
          .transition().duration(200)
          .attr('opacity', 1);

        if (!evt.accepted) {
          // Fade rejected proposals slightly
          setTimeout(() => {
            cells[key]
              .transition().duration(600)
              .attr('stroke', '#f85149')
              .attr('stroke-width', 1)
              .attr('opacity', 0.6);
          }, 500);
        }
      }, i * 600 + 1000);
    });

    // After all events, highlight final matching
    setTimeout(() => {
      counter.textContent = 'Final Matching';
      Object.entries(menOptimal).forEach(([m, w]) => {
        const key = `${m}-${w}`;
        cells[key]
          .transition().duration(800)
          .attr('fill', '#238636')
          .attr('opacity', 1)
          .attr('stroke', '#3fb950')
          .attr('stroke-width', 4);
        cellTexts[key]
          .transition().duration(800)
          .attr('fill', '#ffffff')
          .attr('font-size', 20);
      });
    }, events.length * 600 + 2000);

    // Legend
    const legend = svg.append('g').attr('transform', `translate(${offsetX + gridW + 30},${offsetY})`);
    legend.append('text').attr('x', 0).attr('y', 0).attr('fill', '#484f58').attr('font-size', 11).attr('font-weight', 600).text('Rank Colors');
    for (let r = 1; r <= 5; r++) {
      legend.append('rect').attr('x', 0).attr('y', 10 + (r - 1) * 24).attr('width', 18).attr('height', 18).attr('rx', 3)
        .attr('fill', colorScale(r));
      legend.append('text').attr('x', 26).attr('y', 24 + (r - 1) * 24).attr('fill', '#8b949e').attr('font-size', 11)
        .text(`Rank ${r}`);
    }
  </script>
</body>
</html>
