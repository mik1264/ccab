<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preference Heatmap — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow-x: hidden; font-family: 'Segoe UI', sans-serif; color: #c9d1d9; display: flex; flex-direction: column; align-items: center; padding-top: 60px; min-height: 100vh; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background: #30363d; }
    h1 { font-size: 22px; color: #e3b341; margin-bottom: 6px; text-align: center; }
    .subtitle { font-size: 13px; color: #8b949e; margin-bottom: 20px; text-align: center; }
    .heatmap-section { margin-bottom: 30px; }
    .heatmap-title { font-size: 15px; color: #58a6ff; margin-bottom: 8px; text-align: center; }
    #tooltip { position: fixed; background: rgba(13,17,23,0.95); border: 1px solid #30363d; padding: 8px 12px; border-radius: 8px; font-size: 12px; color: #c9d1d9; pointer-events: none; z-index: 200; display: none; backdrop-filter: blur(8px); }
    #tooltip b { color: #e3b341; }
    svg text { font-family: 'Segoe UI', sans-serif; }
    @keyframes pulse-border { 0%, 100% { stroke-opacity: 1; } 50% { stroke-opacity: 0.4; } }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <h1>Preference Heatmap</h1>
  <div class="subtitle">Darker blue = higher preference. Gold borders = stable matching from Gale-Shapley.</div>
  <div class="heatmap-section">
    <div class="heatmap-title">Student Preferences for Schools</div>
    <div id="student-heatmap"></div>
  </div>
  <div class="heatmap-section">
    <div class="heatmap-title">School Preferences for Students</div>
    <div id="school-heatmap"></div>
  </div>
  <div id="tooltip"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const N = 6;
    const cellSize = 56;
    const margin = { top: 40, right: 20, bottom: 20, left: 60 };
    const svgW = margin.left + N * cellSize + margin.right;
    const svgH = margin.top + N * cellSize + margin.bottom;

    // Generate random preference lists
    function shuffled(n) {
      let a = []; for (let i = 0; i < n; i++) a.push(i);
      for (let i = n - 1; i > 0; i--) { let j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }

    let studentPrefs = [], schoolPrefs = [];
    for (let i = 0; i < N; i++) { studentPrefs.push(shuffled(N)); schoolPrefs.push(shuffled(N)); }

    // Build rank matrices: rankMatrix[i][j] = rank that i gives to j (1-indexed)
    function buildRankMatrix(prefs) {
      let mat = [];
      for (let i = 0; i < N; i++) {
        mat[i] = new Array(N);
        for (let r = 0; r < N; r++) mat[i][prefs[i][r]] = r + 1;
      }
      return mat;
    }

    let studentRanks = buildRankMatrix(studentPrefs);
    let schoolRanks = buildRankMatrix(schoolPrefs);

    // Run Gale-Shapley
    let matching = new Array(N).fill(-1);
    let schoolMatch = new Array(N).fill(-1);
    let schoolRankLookup = [];
    for (let j = 0; j < N; j++) {
      schoolRankLookup[j] = new Array(N);
      for (let r = 0; r < N; r++) schoolRankLookup[j][schoolPrefs[j][r]] = r;
    }

    let prefPtrs = new Array(N).fill(0);
    let free = []; for (let i = 0; i < N; i++) free.push(i);
    while (free.length > 0) {
      let st = free.shift();
      let sc = studentPrefs[st][prefPtrs[st]]; prefPtrs[st]++;
      if (schoolMatch[sc] === -1) { matching[st] = sc; schoolMatch[sc] = st; }
      else {
        let cur = schoolMatch[sc];
        if (schoolRankLookup[sc][st] < schoolRankLookup[sc][cur]) {
          matching[cur] = -1; free.push(cur);
          matching[st] = sc; schoolMatch[sc] = st;
        } else { free.push(st); }
      }
    }

    let matchedPairs = new Set();
    for (let i = 0; i < N; i++) matchedPairs.add(i + ',' + matching[i]);

    const tooltip = document.getElementById('tooltip');

    function colorScale(rank) {
      // rank 1 (best) = dark blue, rank N (worst) = very light
      let t = (rank - 1) / (N - 1);
      let r = Math.round(20 + t * 60);
      let g = Math.round(40 + t * 80);
      let b = Math.round(180 - t * 80);
      return `rgb(${r},${g},${b})`;
    }

    function createHeatmap(containerId, rankMatrix, rowLabel, colLabel, isStudentView) {
      let svg = d3.select(containerId).append('svg')
        .attr('width', svgW).attr('height', svgH);

      // Column labels
      for (let j = 0; j < N; j++) {
        svg.append('text')
          .attr('x', margin.left + j * cellSize + cellSize / 2)
          .attr('y', margin.top - 10)
          .attr('text-anchor', 'middle').attr('fill', '#3fb950').attr('font-size', 12)
          .text(colLabel + (j + 1));
      }

      // Row labels
      for (let i = 0; i < N; i++) {
        svg.append('text')
          .attr('x', margin.left - 10)
          .attr('y', margin.top + i * cellSize + cellSize / 2 + 4)
          .attr('text-anchor', 'end').attr('fill', '#58a6ff').attr('font-size', 12)
          .text(rowLabel + (i + 1));
      }

      // Cells with staggered animation
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          let rank = rankMatrix[i][j];
          let isMatch = isStudentView ? matchedPairs.has(i + ',' + j) : matchedPairs.has(j + ',' + i);
          let delay = (i * N + j) * 40;

          let cell = svg.append('rect')
            .attr('x', margin.left + j * cellSize + 2)
            .attr('y', margin.top + i * cellSize + 2)
            .attr('width', cellSize - 4).attr('height', cellSize - 4)
            .attr('rx', 4).attr('fill', colorScale(rank))
            .attr('opacity', 0).attr('stroke', 'none').attr('stroke-width', 0)
            .attr('cursor', 'pointer');

          cell.transition().delay(delay).duration(400)
            .attr('opacity', 1);

          if (isMatch) {
            cell.transition().delay(delay + 500).duration(300)
              .attr('stroke', '#e3b341').attr('stroke-width', 3);

            // Pulsing animation via CSS
            cell.attr('style', `animation: pulse-border 1.5s ease-in-out infinite; animation-delay: ${delay}ms`);
          }

          // Rank text
          svg.append('text')
            .attr('x', margin.left + j * cellSize + cellSize / 2)
            .attr('y', margin.top + i * cellSize + cellSize / 2 + 5)
            .attr('text-anchor', 'middle').attr('fill', rank <= 2 ? '#fff' : '#c9d1d9')
            .attr('font-size', 16).attr('font-weight', rank === 1 ? '700' : '400')
            .attr('opacity', 0).attr('pointer-events', 'none')
            .transition().delay(delay + 200).duration(300).attr('opacity', 1);

          // Static rank text for display (above is animated)
          let textEl = svg.append('text')
            .attr('x', margin.left + j * cellSize + cellSize / 2)
            .attr('y', margin.top + i * cellSize + cellSize / 2 + 5)
            .attr('text-anchor', 'middle').attr('fill', rank <= 2 ? '#fff' : '#c9d1d9')
            .attr('font-size', 16).attr('font-weight', rank === 1 ? '700' : '400')
            .attr('pointer-events', 'none').text(rank);

          // Tooltip hover
          cell.on('mousemove', function(event) {
            let matchStr = isMatch ? ' <b>[MATCHED]</b>' : '';
            tooltip.innerHTML = `${rowLabel}${i + 1} ranks ${colLabel}${j + 1}: <b>#${rank}</b>${matchStr}`;
            tooltip.style.display = 'block';
            tooltip.style.left = (event.pageX + 12) + 'px';
            tooltip.style.top = (event.pageY - 30) + 'px';
          }).on('mouseleave', function() {
            tooltip.style.display = 'none';
          });
        }
      }
    }

    createHeatmap('#student-heatmap', studentRanks, 'S', 'C', true);
    createHeatmap('#school-heatmap', schoolRanks, 'C', 'S', false);
  </script>
</body>
</html>
