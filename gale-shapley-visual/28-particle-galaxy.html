<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matching Galaxy — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">&#8592; Visual Gallery</a>
  <div class="info"><h2>Matching Galaxy</h2><p>A galaxy where each spiral arm represents a preference list. Stars at the ends of arms are matched pairs — stable orbits in the galactic gravitational field.</p></div>
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020208);
    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);
    camera.position.set(0, 15, 20);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    scene.add(new THREE.AmbientLight(0x111122, 0.3));

    // Galaxy particles
    const particleCount = 10000;
    const galaxyGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const sizes = new Float32Array(particleCount);

    const arms = 6; // 6 spiral arms (one per preference list)
    const armColors = [
      new THREE.Color(0x4488ff),
      new THREE.Color(0xff4488),
      new THREE.Color(0x44ff88),
      new THREE.Color(0xffaa44),
      new THREE.Color(0xaa44ff),
      new THREE.Color(0x44ffdd)
    ];

    for (let i = 0; i < particleCount; i++) {
      const armIdx = i % arms;
      const t = Math.random();
      const radius = t * 15 + 0.5;
      const armAngle = (armIdx / arms) * Math.PI * 2;
      const spiralAngle = armAngle + t * Math.PI * 2.5;
      const spread = (1 - t * 0.5) * 1.5;

      positions[i*3] = Math.cos(spiralAngle) * radius + (Math.random() - 0.5) * spread;
      positions[i*3+1] = (Math.random() - 0.5) * spread * 0.3;
      positions[i*3+2] = Math.sin(spiralAngle) * radius + (Math.random() - 0.5) * spread;

      // Color based on arm with some variation
      const c = armColors[armIdx].clone();
      const brightness = 0.5 + t * 0.5;
      c.multiplyScalar(brightness);
      colors[i*3] = c.r;
      colors[i*3+1] = c.g;
      colors[i*3+2] = c.b;

      sizes[i] = (1 - t * 0.5) * 3 + Math.random() * 2;
    }

    galaxyGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    galaxyGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    galaxyGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const galaxyMat = new THREE.PointsMaterial({
      size: 0.12,
      vertexColors: true,
      transparent: true,
      opacity: 0.8,
      sizeAttenuation: true,
      blending: THREE.AdditiveBlending
    });
    const galaxy = new THREE.Points(galaxyGeo, galaxyMat);
    scene.add(galaxy);

    // Core glow
    const coreGeo = new THREE.SphereGeometry(1.5, 32, 32);
    const coreMat = new THREE.MeshBasicMaterial({
      color: 0xffffcc,
      transparent: true,
      opacity: 0.15
    });
    scene.add(new THREE.Mesh(coreGeo, coreMat));

    const coreLight = new THREE.PointLight(0xffffcc, 2, 15);
    scene.add(coreLight);

    // Bright tip stars at arm ends (matched pairs)
    const matching = [[0,1],[1,3],[2,0],[3,5],[4,2],[5,4]];
    const tipStars = [];

    for (let armIdx = 0; armIdx < arms; armIdx++) {
      const t = 0.95;
      const radius = t * 15;
      const armAngle = (armIdx / arms) * Math.PI * 2;
      const spiralAngle = armAngle + t * Math.PI * 2.5;
      const pos = new THREE.Vector3(
        Math.cos(spiralAngle) * radius,
        0,
        Math.sin(spiralAngle) * radius
      );

      // Large glowing star
      const starGeo = new THREE.SphereGeometry(0.4, 16, 16);
      const starMat = new THREE.MeshBasicMaterial({ color: armColors[armIdx] });
      const star = new THREE.Mesh(starGeo, starMat);
      star.position.copy(pos);
      scene.add(star);

      // Glow sprite
      const spriteMat = new THREE.SpriteMaterial({
        color: armColors[armIdx],
        transparent: true,
        opacity: 0.4,
        blending: THREE.AdditiveBlending
      });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.position.copy(pos);
      sprite.scale.setScalar(3);
      scene.add(sprite);

      tipStars.push({ star, sprite, basePos: pos.clone(), armIdx });
    }

    // Golden threads connecting matched pairs
    const threads = [];
    matching.forEach(([m, w]) => {
      const startStar = tipStars[m];
      const endStar = tipStars[w];
      if (!startStar || !endStar) return;

      const start = startStar.basePos;
      const end = endStar.basePos;
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      mid.y += 2;
      const curve = new THREE.CatmullRomCurve3([start, mid, end]);
      const tubeGeo = new THREE.TubeGeometry(curve, 30, 0.04, 8, false);
      const tubeMat = new THREE.MeshBasicMaterial({
        color: 0xffcc44,
        transparent: true,
        opacity: 0.6,
        blending: THREE.AdditiveBlending
      });
      const tube = new THREE.Mesh(tubeGeo, tubeMat);
      scene.add(tube);
      threads.push(tube);
    });

    function animate(t) {
      requestAnimationFrame(animate);
      const time = t * 0.001;

      // Camera orbit
      camera.position.x = Math.sin(time * 0.08) * 22;
      camera.position.z = Math.cos(time * 0.08) * 22;
      camera.position.y = 12 + Math.sin(time * 0.05) * 5;
      camera.lookAt(0, 0, 0);

      // Rotate galaxy
      galaxy.rotation.y = time * 0.03;

      // Pulse core
      coreLight.intensity = 1.5 + Math.sin(time * 1.5) * 0.5;

      // Twinkle tip stars
      tipStars.forEach((ts, i) => {
        const sc = 1 + Math.sin(time * 2 + i * 1.5) * 0.2;
        ts.star.scale.setScalar(sc);
        ts.sprite.material.opacity = 0.3 + Math.sin(time * 3 + i) * 0.15;
      });

      // Pulse threads
      threads.forEach((th, i) => {
        th.material.opacity = 0.4 + Math.sin(time * 2 + i * 0.8) * 0.2;
      });

      renderer.render(scene, camera);
    }
    animate(0);
  </script>
</body>
</html>
