<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Particle Galaxy</title>
<style>
* { margin: 0; padding: 0; }
body { background: #0d1117; overflow: hidden; }
.back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
.back:hover { background: #30363d; }
</style>
</head>
<body>
<a class="back" href="index.html">&#8592; Back</a>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 15, 5);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x0d1117);
document.body.appendChild(renderer.domElement);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
scene.add(new THREE.AmbientLight(0x334455, 2));
const dl = new THREE.DirectionalLight(0xffffff, 2);
dl.position.set(5, 8, 5); scene.add(dl);

// Spiral arm particles: 2 arms, 4000 each = 8000
var armCount = 8000;
var armPositions = new Float32Array(armCount * 3);
var armColors = new Float32Array(armCount * 3);

for (var i = 0; i < armCount; i++) {
  var arm = i < 4000 ? 0 : 1;
  var idx = i < 4000 ? i : i - 4000;
  var frac = idx / 4000;
  var angle = frac * Math.PI * 4 + arm * Math.PI;
  var r = Math.pow(frac, 0.5) * 8;
  armPositions[i * 3] = r * Math.cos(angle) + (Math.random() - 0.5) * 0.6;
  armPositions[i * 3 + 1] = (Math.random() - 0.5) * 0.5;
  armPositions[i * 3 + 2] = r * Math.sin(angle) + (Math.random() - 0.5) * 0.6;

  // Gradient: white (inner) to blue (outer)
  var innerR = 0.9, innerG = 0.9, innerB = 1.0;
  var outerR = 0.2, outerG = 0.4, outerB = 1.0;
  armColors[i * 3] = innerR + (outerR - innerR) * frac;
  armColors[i * 3 + 1] = innerG + (outerG - innerG) * frac;
  armColors[i * 3 + 2] = innerB + (outerB - innerB) * frac;
}

var armGeo = new THREE.BufferGeometry();
armGeo.setAttribute('position', new THREE.Float32BufferAttribute(armPositions, 3));
armGeo.setAttribute('color', new THREE.Float32BufferAttribute(armColors, 3));
var armMat = new THREE.PointsMaterial({ size: 0.05, vertexColors: true });
var armPoints = new THREE.Points(armGeo, armMat);
scene.add(armPoints);

// Core particles: 500 bright yellow
var coreCount = 500;
var corePositions = new Float32Array(coreCount * 3);
for (var i = 0; i < coreCount; i++) {
  var theta = Math.random() * Math.PI * 2;
  var phi = Math.acos(2 * Math.random() - 1);
  var cr = Math.random() * 0.8;
  corePositions[i * 3] = cr * Math.sin(phi) * Math.cos(theta);
  corePositions[i * 3 + 1] = cr * Math.sin(phi) * Math.sin(theta) * 0.3;
  corePositions[i * 3 + 2] = cr * Math.cos(phi);
}
var coreGeo = new THREE.BufferGeometry();
coreGeo.setAttribute('position', new THREE.Float32BufferAttribute(corePositions, 3));
var coreMat = new THREE.PointsMaterial({ size: 0.08, color: 0xffdd44 });
scene.add(new THREE.Points(coreGeo, coreMat));

// Gold "matched pair" particles scattered throughout
var goldCount = 200;
var goldPositions = new Float32Array(goldCount * 3);
for (var i = 0; i < goldCount; i++) {
  var a = Math.random() * Math.PI * 4;
  var gr = Math.pow(Math.random(), 0.5) * 7;
  goldPositions[i * 3] = gr * Math.cos(a) + (Math.random() - 0.5) * 0.3;
  goldPositions[i * 3 + 1] = (Math.random() - 0.5) * 0.3;
  goldPositions[i * 3 + 2] = gr * Math.sin(a) + (Math.random() - 0.5) * 0.3;
}
var goldGeo = new THREE.BufferGeometry();
goldGeo.setAttribute('position', new THREE.Float32BufferAttribute(goldPositions, 3));
var goldMat = new THREE.PointsMaterial({ size: 0.12, color: 0xffd700 });
scene.add(new THREE.Points(goldGeo, goldMat));

function animate(ts) {
  requestAnimationFrame(animate);
  var t = ts * 0.001;

  armPoints.rotation.y = t * 0.08;

  // Camera starts from above, slowly orbits and descends
  var camAngle = t * 0.15;
  var camHeight = 15 - Math.min(t * 0.5, 10);
  camera.position.x = Math.sin(camAngle) * 12;
  camera.position.y = Math.max(camHeight, 5);
  camera.position.z = Math.cos(camAngle) * 12;
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
animate(0);
</script>
</body>
</html>
