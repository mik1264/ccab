<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preference Gravity Wells — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Nunito', sans-serif; }
    .back-link { position: fixed; top: 16px; left: 16px; background: rgba(22,27,34,0.9); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; transition: background 0.2s; }
    .back-link:hover { background: #30363d; }
    .info { position: fixed; top: 60px; left: 16px; background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 10px; padding: 12px 16px; z-index: 50; max-width: 280px; backdrop-filter: blur(8px); }
    .info h2 { font-family: 'Lora', serif; font-size: 15px; color: #58a6ff; margin-bottom: 4px; }
    .info p { font-size: 12px; color: #8b949e; line-height: 1.4; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Visual Gallery</a>
  <div class="info">
    <h2>Preference Gravity Wells</h2>
    <p>Each agent creates a gravitational well proportional to how highly they are ranked. Particles fall toward their most-preferred available partner.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 5;
    const NUM_PARTICLES = 200;
    let menAgents = [], womenAgents = [];
    let particles = [];
    let menPrefs = [], womenPrefs = [];
    let stableMatches = []; // {m, w}
    let algorithmDone = false;
    let matchPulse = 0;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      initSim();
    }

    function initSim() {
      menAgents = [];
      womenAgents = [];
      particles = [];
      stableMatches = [];
      algorithmDone = false;
      matchPulse = 0;
      menPrefs = [];
      womenPrefs = [];

      for (let i = 0; i < N; i++) {
        menPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
        womenPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
      }

      // Place men on left, women on right
      for (let i = 0; i < N; i++) {
        menAgents.push({
          x: width * 0.25 + random(-60, 60),
          y: height * (0.15 + 0.7 * i / (N - 1)),
          gravity: 0
        });
        womenAgents.push({
          x: width * 0.75 + random(-60, 60),
          y: height * (0.15 + 0.7 * i / (N - 1)),
          gravity: 0
        });
      }

      // Compute gravity = how desired this agent is (sum of inverse ranks)
      for (let i = 0; i < N; i++) {
        let grav = 0;
        for (let j = 0; j < N; j++) {
          grav += 1 / (womenPrefs[j].indexOf(i) + 1);
        }
        menAgents[i].gravity = grav;
      }
      for (let i = 0; i < N; i++) {
        let grav = 0;
        for (let j = 0; j < N; j++) {
          grav += 1 / (menPrefs[j].indexOf(i) + 1);
        }
        womenAgents[i].gravity = grav;
      }

      // Create drifting particles
      for (let i = 0; i < NUM_PARTICLES; i++) {
        particles.push({
          x: random(width),
          y: random(height),
          vx: random(-0.5, 0.5),
          vy: random(-0.5, 0.5),
          hue: random(200, 240),
          size: random(2, 4)
        });
      }

      // Run DA algorithm after a delay
      setTimeout(runDA, 3000);
    }

    function shuffleArr(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function runDA() {
      let menNext = new Array(N).fill(0);
      let womenCurrent = new Array(N).fill(-1);
      let menFree = new Array(N).fill(true);

      let changed = true;
      while (changed) {
        changed = false;
        for (let m = 0; m < N; m++) {
          if (!menFree[m] || menNext[m] >= N) continue;
          let w = menPrefs[m][menNext[m]];
          menNext[m]++;
          changed = true;
          if (womenCurrent[w] === -1) {
            womenCurrent[w] = m;
            menFree[m] = false;
          } else {
            let curM = womenCurrent[w];
            if (womenPrefs[w].indexOf(m) < womenPrefs[w].indexOf(curM)) {
              womenCurrent[w] = m;
              menFree[m] = false;
              menFree[curM] = true;
            }
          }
        }
      }

      stableMatches = [];
      for (let w = 0; w < N; w++) {
        if (womenCurrent[w] !== -1) {
          stableMatches.push({m: womenCurrent[w], w});
        }
      }
      algorithmDone = true;
    }

    function draw() {
      background(220, 15, 6, 15);

      // Draw gravity wells
      for (let agent of menAgents) {
        let r = agent.gravity * 30;
        noStroke();
        for (let ring = 5; ring > 0; ring--) {
          fill(210, 70, 50, 5 * ring);
          ellipse(agent.x, agent.y, r * ring * 2, r * ring * 2);
        }
        fill(210, 80, 90);
        ellipse(agent.x, agent.y, 12, 12);
      }
      for (let agent of womenAgents) {
        let r = agent.gravity * 30;
        noStroke();
        for (let ring = 5; ring > 0; ring--) {
          fill(280, 60, 50, 5 * ring);
          ellipse(agent.x, agent.y, r * ring * 2, r * ring * 2);
        }
        fill(280, 70, 90);
        ellipse(agent.x, agent.y, 12, 12);
      }

      // Update and draw particles
      for (let p of particles) {
        let fx = 0, fy = 0;
        let allAgents = [...menAgents, ...womenAgents];
        for (let a of allAgents) {
          let dx = a.x - p.x;
          let dy = a.y - p.y;
          let d = sqrt(dx * dx + dy * dy) || 1;
          let force = a.gravity * 0.15 / max(d * 0.02, 0.3);
          fx += (dx / d) * force;
          fy += (dy / d) * force;
        }
        p.vx = (p.vx + fx) * 0.99;
        p.vy = (p.vy + fy) * 0.99;
        // Limit speed
        let spd = sqrt(p.vx * p.vx + p.vy * p.vy);
        if (spd > 3) { p.vx = (p.vx / spd) * 3; p.vy = (p.vy / spd) * 3; }
        p.x += p.vx;
        p.y += p.vy;

        // Wrap
        if (p.x < 0) p.x = width;
        if (p.x > width) p.x = 0;
        if (p.y < 0) p.y = height;
        if (p.y > height) p.y = 0;

        noStroke();
        fill(p.hue, 40, 90, 60);
        ellipse(p.x, p.y, p.size, p.size);
      }

      // Draw stable matching connections
      if (algorithmDone) {
        matchPulse += 0.03;
        for (let mt of stableMatches) {
          let mA = menAgents[mt.m];
          let wA = womenAgents[mt.w];
          let pulse = sin(matchPulse) * 0.3 + 0.7;

          strokeWeight(2.5 * pulse);
          stroke(45, 90, 90, 70 * pulse);
          line(mA.x, mA.y, wA.x, wA.y);

          // Glow at midpoint
          let mx = (mA.x + wA.x) / 2;
          let my = (mA.y + wA.y) / 2;
          noStroke();
          fill(45, 80, 95, 20 * pulse);
          ellipse(mx, my, 30, 30);
          fill(45, 80, 95, 50 * pulse);
          ellipse(mx, my, 10, 10);
        }
      }

      // Labels
      for (let i = 0; i < N; i++) {
        noStroke();
        fill(0, 0, 100, 70);
        textAlign(CENTER, CENTER);
        textSize(9);
        text('M' + (i + 1), menAgents[i].x, menAgents[i].y - 18);
        text('W' + (i + 1), womenAgents[i].x, womenAgents[i].y - 18);
      }

      // Status
      noStroke();
      fill(0, 0, 80, 60);
      textAlign(RIGHT, TOP);
      textSize(13);
      text(algorithmDone ? 'Stable Matching Found' : 'Computing...', width - 20, 20);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
