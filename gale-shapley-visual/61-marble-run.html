<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Marble Run to Preferences — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Marble Run to Preferences</h2><p>Marbles (agents) roll down a tilted board toward their most-preferred school pockets. The marble run layout encodes the preference structure.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const N = 5;
    const manColors = ['#58a6ff','#3b82f6','#60a5fa','#93c5fd','#2563eb'];
    const womanColors = ['#c084fc','#a855f7','#9333ea','#7c3aed','#6d28d9'];
    const womanNames = ['A','B','C','D','E'];

    // Preferences: man i's preference list
    const prefs = [
      [0,1,2,3,4],[1,0,3,2,4],[2,3,0,1,4],[3,2,4,0,1],[4,3,1,2,0]
    ];
    // Stable matching (simple)
    const matching = [0,1,2,3,4];

    // Pockets at bottom
    let pockets = [];
    let pegs = [];
    let ramps = [];
    let marbles = [];
    let settled = [];

    function initLayout() {
      const w = canvas.width, h = canvas.height;
      pockets = [];
      pegs = [];
      ramps = [];
      marbles = [];
      settled = Array(N).fill(false);

      // Pockets along bottom
      for (let i = 0; i < N; i++) {
        pockets.push({
          x: w * (0.15 + 0.7 * i / (N - 1)),
          y: h - 60,
          r: 30,
          woman: i
        });
      }

      // Generate pegs in a grid pattern
      const rows = 8;
      const cols = 12;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const offset = (r % 2) * (w / cols / 2);
          pegs.push({
            x: w * 0.08 + offset + c * (w * 0.84 / cols),
            y: h * 0.2 + r * (h * 0.6 / rows),
            r: 6
          });
        }
      }

      // Generate ramps (angled platforms)
      for (let i = 0; i < 8; i++) {
        const rx = w * (0.1 + Math.random() * 0.8);
        const ry = h * (0.25 + Math.random() * 0.5);
        const angle = (Math.random() - 0.5) * 0.4;
        ramps.push({
          x: rx, y: ry, len: 60 + Math.random() * 60, angle: angle
        });
      }

      // Marbles drop from top
      for (let i = 0; i < N; i++) {
        marbles.push({
          x: w * (0.2 + 0.6 * i / (N - 1)) + (Math.random() - 0.5) * 20,
          y: 40 + Math.random() * 20,
          vx: 0, vy: 0,
          r: 12,
          man: i,
          target: matching[i],
          settled: false,
          glow: 0
        });
      }
    }

    initLayout();
    window.addEventListener('resize', () => { resize(); initLayout(); });

    const gravity = 300;
    const friction = 0.997;
    const bounce = 0.65;

    let t = 0, dt = 1/60;
    function loop() {
      requestAnimationFrame(loop);
      t += dt;
      update();
      render();
    }

    function update() {
      for (const m of marbles) {
        if (m.settled) { m.glow = Math.min(1, m.glow + 0.02); continue; }

        // Gravity with slight bias toward target pocket
        m.vy += gravity * dt;
        const tx = pockets[m.target].x;
        m.vx += (tx - m.x) * 0.3 * dt;

        m.vx *= friction;
        m.vy *= friction;
        m.x += m.vx * dt;
        m.y += m.vy * dt;

        // Bounce off walls
        if (m.x - m.r < 0) { m.x = m.r; m.vx = Math.abs(m.vx) * bounce; }
        if (m.x + m.r > canvas.width) { m.x = canvas.width - m.r; m.vx = -Math.abs(m.vx) * bounce; }
        if (m.y - m.r < 0) { m.y = m.r; m.vy = Math.abs(m.vy) * bounce; }

        // Bounce off pegs
        for (const p of pegs) {
          const dx = m.x - p.x, dy = m.y - p.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const minD = m.r + p.r;
          if (dist < minD && dist > 0) {
            const nx = dx/dist, ny = dy/dist;
            m.x = p.x + nx * minD;
            m.y = p.y + ny * minD;
            const dot = m.vx * nx + m.vy * ny;
            m.vx -= 2 * dot * nx * (1 - bounce);
            m.vy -= 2 * dot * ny * (1 - bounce);
            m.vx -= dot * nx;
            m.vy -= dot * ny;
          }
        }

        // Bounce off ramps
        for (const r of ramps) {
          const cos = Math.cos(r.angle), sin = Math.sin(r.angle);
          const lx = m.x - r.x, ly = m.y - r.y;
          const localX = lx * cos + ly * sin;
          const localY = -lx * sin + ly * cos;
          if (Math.abs(localX) < r.len/2 && Math.abs(localY) < m.r + 3) {
            const ny = localY > 0 ? 1 : -1;
            const worldNx = -(-sin) * ny, worldNy = cos * ny;
            const dot = m.vx * worldNx + m.vy * worldNy;
            if (dot < 0) {
              m.vx -= 2 * dot * worldNx * bounce;
              m.vy -= 2 * dot * worldNy * bounce;
              m.y += worldNy * 2;
            }
          }
        }

        // Marble-marble collision
        for (const m2 of marbles) {
          if (m2 === m) continue;
          const dx = m.x - m2.x, dy = m.y - m2.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const minD = m.r + m2.r;
          if (dist < minD && dist > 0) {
            const nx = dx/dist, ny = dy/dist;
            const overlap = minD - dist;
            m.x += nx * overlap * 0.5;
            m.y += ny * overlap * 0.5;
            m2.x -= nx * overlap * 0.5;
            m2.y -= ny * overlap * 0.5;
            const relV = (m.vx - m2.vx)*nx + (m.vy - m2.vy)*ny;
            if (relV < 0) {
              m.vx -= relV * nx * 0.5;
              m.vy -= relV * ny * 0.5;
              m2.vx += relV * nx * 0.5;
              m2.vy += relV * ny * 0.5;
            }
          }
        }

        // Check pocket arrival
        const pocket = pockets[m.target];
        const pdx = m.x - pocket.x, pdy = m.y - pocket.y;
        if (Math.sqrt(pdx*pdx + pdy*pdy) < pocket.r && m.y > canvas.height - 120) {
          m.settled = true;
          m.x = pocket.x;
          m.y = pocket.y;
          m.vx = 0; m.vy = 0;
        }
      }
    }

    function render() {
      const w = canvas.width, h = canvas.height;
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, w, h);

      // Draw ramps
      ctx.strokeStyle = '#21262d';
      ctx.lineWidth = 6;
      for (const r of ramps) {
        ctx.save();
        ctx.translate(r.x, r.y);
        ctx.rotate(r.angle);
        ctx.beginPath();
        ctx.moveTo(-r.len/2, 0);
        ctx.lineTo(r.len/2, 0);
        ctx.stroke();
        ctx.restore();
      }

      // Draw pegs
      for (const p of pegs) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = '#30363d';
        ctx.fill();
        ctx.strokeStyle = '#484f58';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Draw pockets
      for (let i = 0; i < N; i++) {
        const p = pockets[i];
        const isSettled = marbles.some(m => m.settled && m.target === i);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r + 4, 0, Math.PI * 2);
        ctx.fillStyle = isSettled ? womanColors[i] + '40' : '#161b22';
        ctx.fill();
        ctx.strokeStyle = womanColors[i];
        ctx.lineWidth = 2;
        ctx.stroke();
        if (isSettled) {
          ctx.shadowColor = womanColors[i];
          ctx.shadowBlur = 20;
          ctx.stroke();
          ctx.shadowBlur = 0;
        }
        ctx.fillStyle = '#c9d1d9';
        ctx.font = '600 12px Nunito';
        ctx.textAlign = 'center';
        ctx.fillText(womanNames[i], p.x, p.y + p.r + 20);
      }

      // Draw marbles
      for (const m of marbles) {
        ctx.save();
        if (m.settled && m.glow > 0) {
          ctx.shadowColor = manColors[m.man];
          ctx.shadowBlur = 20 * m.glow;
        }
        const grad = ctx.createRadialGradient(m.x - 3, m.y - 3, 1, m.x, m.y, m.r);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.3, manColors[m.man]);
        grad.addColorStop(1, manColors[m.man] + '80');
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = manColors[m.man];
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px Nunito';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(m.man + 1, m.x, m.y);
        ctx.restore();
      }

      // Title labels for pockets
      ctx.fillStyle = '#484f58';
      ctx.font = '500 11px Nunito';
      ctx.textAlign = 'center';
      ctx.fillText('Preference Pockets', w/2, h - 15);
    }

    loop();
  </script>
</body>
</html>
