<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vortex Field Visualization — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; }
    body { background:#0d1117; overflow:hidden; }
    canvas#c { position:fixed; top:0; left:0; width:100vw; height:100vh; display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; font-family:'Nunito',sans-serif; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); font-family:'Nunito',sans-serif; }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Vortex Field Visualization</h2><p>Each matched pair generates a vortex in the preference field. Particles spiral into stable attractors — beautiful fluid dynamics revealing matching structure.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);
    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }`;
    function mkShader(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(sh));return sh;}
    function mkProg(fs){const pr=gl.createProgram();gl.attachShader(pr,mkShader(gl.VERTEX_SHADER,VS));gl.attachShader(pr,mkShader(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);return pr;}
    const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

    const FS = `
    precision highp float;
    uniform vec2 u_res;
    uniform float u_time;

    #define PI 3.14159265

    // Matched pair midpoints (vortex centers)
    vec2 vortexPos(int i) {
      if(i == 0) return vec2(-0.35, -0.25);
      if(i == 1) return vec2(0.3, -0.35);
      if(i == 2) return vec2(0.0, 0.15);
      if(i == 3) return vec2(-0.4, 0.35);
      if(i == 4) return vec2(0.35, 0.3);
      return vec2(0.0);
    }

    // Vortex strength proportional to preference rank (1=strongest)
    float vortexStrength(int i) {
      if(i == 0) return 0.15;
      if(i == 1) return 0.12;
      if(i == 2) return 0.18;
      if(i == 3) return 0.10;
      if(i == 4) return 0.14;
      return 0.1;
    }

    // Men positions (sources)
    vec2 sourcePos(int i) {
      if(i == 0) return vec2(-0.55, -0.3);
      if(i == 1) return vec2(0.1, -0.45);
      if(i == 2) return vec2(-0.2, 0.05);
      if(i == 3) return vec2(-0.6, 0.3);
      if(i == 4) return vec2(0.15, 0.25);
      return vec2(0.0);
    }

    // Women positions (sinks)
    vec2 sinkPos(int i) {
      if(i == 0) return vec2(-0.15, -0.2);
      if(i == 1) return vec2(0.5, -0.25);
      if(i == 2) return vec2(0.2, 0.25);
      if(i == 3) return vec2(-0.2, 0.4);
      if(i == 4) return vec2(0.55, 0.35);
      return vec2(0.0);
    }

    vec2 velocity(vec2 p) {
      vec2 v = vec2(0.0);

      // Vortices at matched pair midpoints
      for(int i = 0; i < 5; i++) {
        vec2 d = p - vortexPos(i);
        float r = length(d) + 0.02;
        float s = vortexStrength(i);
        // Rankine vortex (bounded at core)
        float vtheta = s * r / (r*r + 0.01);
        v += vtheta * vec2(-d.y, d.x) / r;
      }

      // Sources at men
      for(int i = 0; i < 5; i++) {
        vec2 d = p - sourcePos(i);
        float r2 = dot(d, d) + 0.005;
        v += 0.03 * d / r2;
      }

      // Sinks at women
      for(int i = 0; i < 5; i++) {
        vec2 d = p - sinkPos(i);
        float r2 = dot(d, d) + 0.005;
        v -= 0.03 * d / r2;
      }

      return v;
    }

    vec3 hsv2rgb(vec3 c) {
      vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
      vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
      return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - 0.5*u_res) / u_res.y;
      float t = u_time;

      // Shift seed points over time for animation
      vec2 seedOffset = vec2(sin(t * 0.1) * 0.05, cos(t * 0.13) * 0.05);
      vec2 pos = uv + seedOffset;

      // Integrate streamline forward
      float totalDist = 0.0;
      float speed = 0.0;
      for(int i = 0; i < 30; i++) {
        vec2 v = velocity(pos);
        speed += length(v);
        pos += v * 0.01;
        totalDist += length(v) * 0.01;
      }
      speed /= 30.0;

      // Time-to-attractor coloring (rainbow: fast=blue, slow=red)
      float convergence = 1.0 - exp(-speed * 15.0);

      // LIC-like pattern from streamline integration
      vec2 v = velocity(uv);
      float angle = atan(v.y, v.x);
      float vmag = length(v);

      // Streamline-aligned noise
      float linePattern = sin(angle * 10.0 + totalDist * 50.0 + t * 0.5) * 0.5 + 0.5;
      linePattern *= smoothstep(0.0, 0.1, vmag);

      // Color: hue from convergence rate
      float hue = mix(0.0, 0.65, convergence);
      float sat = 0.7 + 0.3 * linePattern;
      float val = 0.15 + 0.6 * convergence + 0.25 * linePattern;

      vec3 col = hsv2rgb(vec3(hue, sat, val));

      // Vortex center highlights
      for(int i = 0; i < 5; i++) {
        float d = length(uv - vortexPos(i));
        col += vec3(0.6, 0.8, 1.0) * exp(-d*d*500.0) * 0.8;
      }

      // Source markers (blue)
      for(int i = 0; i < 5; i++) {
        float d = length(uv - sourcePos(i));
        col += vec3(0.3, 0.5, 1.0) * exp(-d*d*800.0) * 0.6;
      }

      // Sink markers (red)
      for(int i = 0; i < 5; i++) {
        float d = length(uv - sinkPos(i));
        col += vec3(1.0, 0.3, 0.2) * exp(-d*d*800.0) * 0.6;
      }

      col = pow(col, vec3(0.4545));
      gl_FragColor = vec4(col, 1.0);
    }
    `;

    const prog = mkProg(FS);
    gl.useProgram(prog);
    const loc_p = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc_p);
    gl.vertexAttribPointer(loc_p, 2, gl.FLOAT, false, 0, 0);
    const loc_res = gl.getUniformLocation(prog, 'u_res');
    const loc_time = gl.getUniformLocation(prog, 'u_time');

    function frame(t) {
      gl.uniform2f(loc_res, canvas.width, canvas.height);
      gl.uniform1f(loc_time, t * 0.001);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
