<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixel Art — Matching Algorithms Visual Gallery</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:sans-serif; }
    canvas { display:block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background:#30363d; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const GRID = 32;
    const N = 8;
    let grid, cellSize;
    let studentPrefs = [], schoolPrefs = [];
    let rounds = [];
    let currentRound = -1;
    let roundTimer = 0;
    let activeProposals = [];
    let matchedCells = [];
    let rejectedFlashes = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      noSmooth();
      cellSize = min(width, height) * 0.85 / GRID;

      grid = [];
      for (let y = 0; y < GRID; y++) {
        grid[y] = [];
        for (let x = 0; x < GRID; x++) {
          grid[y][x] = { r: 10, g: 13, b: 20, targetR: 10, targetG: 13, targetB: 20 };
        }
      }

      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffleArray([...Array(N).keys()]));
        schoolPrefs.push(shuffleArray([...Array(N).keys()]));
      }

      simulateDA();
    }

    function simulateDA() {
      let n = N;
      let free = [...Array(n).keys()];
      let proposals = new Array(n).fill(0);
      let schoolMatch = new Array(n).fill(-1);
      let studentMatch = new Array(n).fill(-1);
      let schRank = [];
      for (let i = 0; i < n; i++) {
        schRank[i] = new Array(n);
        for (let r = 0; r < n; r++) schRank[i][schoolPrefs[i][r]] = r;
      }
      while (free.length > 0) {
        let roundEvents = [];
        let newFree = [];
        let toRemove = [];
        for (let s of free) {
          if (proposals[s] >= n) continue;
          let sch = studentPrefs[s][proposals[s]];
          proposals[s]++;
          if (schoolMatch[sch] === -1) {
            schoolMatch[sch] = s; studentMatch[s] = sch; toRemove.push(s);
            roundEvents.push({ student: s, school: sch, accepted: true });
          } else {
            let cur = schoolMatch[sch];
            if (schRank[sch][s] < schRank[sch][cur]) {
              schoolMatch[sch] = s; studentMatch[s] = sch; toRemove.push(s);
              studentMatch[cur] = -1; newFree.push(cur);
              roundEvents.push({ student: s, school: sch, accepted: true });
              roundEvents.push({ student: cur, school: sch, accepted: false });
            } else {
              roundEvents.push({ student: s, school: sch, accepted: false });
            }
          }
        }
        free = free.filter(f => !toRemove.includes(f)).concat(newFree);
        rounds.push(roundEvents);
        if (rounds.length > 50) break;
      }
    }

    function draw() {
      background(8, 10, 16);

      roundTimer += deltaTime / 1000;
      if (roundTimer > 1.2 && currentRound < rounds.length - 1) {
        currentRound++;
        roundTimer = 0;
        processRound(currentRound);
      }

      // Animate proposals
      for (let i = activeProposals.length - 1; i >= 0; i--) {
        activeProposals[i].t += deltaTime / 600;
        if (activeProposals[i].t >= 1) activeProposals.splice(i, 1);
      }

      // Fade rejected flashes
      for (let i = rejectedFlashes.length - 1; i >= 0; i--) {
        rejectedFlashes[i].life -= deltaTime / 400;
        if (rejectedFlashes[i].life <= 0) rejectedFlashes.splice(i, 1);
      }

      // Lerp grid colors
      for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {
          let c = grid[y][x];
          c.r = lerp(c.r, c.targetR, 0.05);
          c.g = lerp(c.g, c.targetG, 0.05);
          c.b = lerp(c.b, c.targetB, 0.05);
        }
      }

      let offsetX = (width - GRID * cellSize) / 2;
      let offsetY = (height - GRID * cellSize) / 2;

      // Draw grid
      noStroke();
      for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {
          let c = grid[y][x];
          fill(c.r, c.g, c.b);
          rect(offsetX + x * cellSize, offsetY + y * cellSize, cellSize + 0.5, cellSize + 0.5);
        }
      }

      // Grid border
      noFill();
      stroke(40, 50, 65);
      strokeWeight(2);
      rect(offsetX - 1, offsetY - 1, GRID * cellSize + 2, GRID * cellSize + 2);

      // Active proposals (moving blue pixels)
      noStroke();
      for (let p of activeProposals) {
        let sx = offsetX + p.fromX * cellSize;
        let sy = offsetY + p.fromY * cellSize;
        let ex = offsetX + p.toX * cellSize;
        let ey = offsetY + p.toY * cellSize;
        let t = easeInOut(p.t);
        let cx = lerp(sx, ex, t);
        let cy = lerp(sy, ey, t);
        let alpha = 255 * (1 - p.t * 0.3);

        for (let tr = 0; tr < 3; tr++) {
          let tt = max(0, p.t - tr * 0.1);
          let tx = lerp(sx, ex, easeInOut(tt));
          let ty = lerp(sy, ey, easeInOut(tt));
          fill(60, 130, 255, alpha * (1 - tr * 0.3));
          rect(tx, ty, cellSize, cellSize);
        }
        fill(88, 166, 255, alpha);
        rect(cx, cy, cellSize, cellSize);
      }

      // Rejected flashes
      for (let f of rejectedFlashes) {
        fill(220, 60, 60, 200 * f.life);
        rect(offsetX + f.x * cellSize, offsetY + f.y * cellSize, cellSize, cellSize);
      }

      // Matched cells pulsing
      for (let m of matchedCells) {
        let pulse = 0.7 + 0.3 * sin(frameCount * 0.05 + m.x + m.y);
        fill(255, 215, 80, 255 * pulse);
        rect(offsetX + m.x * cellSize, offsetY + m.y * cellSize, cellSize, cellSize);
      }

      // Student positions (left edge)
      for (let i = 0; i < N; i++) {
        let sy = Math.floor(2 + i * (GRID - 4) / (N - 1));
        fill(60, 130, 255, 120);
        rect(offsetX + 1 * cellSize, offsetY + sy * cellSize, cellSize, cellSize);
      }

      // School positions (right edge)
      for (let i = 0; i < N; i++) {
        let sy = Math.floor(2 + i * (GRID - 4) / (N - 1));
        fill(255, 200, 80, 120);
        rect(offsetX + (GRID - 2) * cellSize, offsetY + sy * cellSize, cellSize, cellSize);
      }

      // Progress bar
      let barW = GRID * cellSize;
      let barH = 6;
      let barX = offsetX;
      let barY = offsetY + GRID * cellSize + 12;
      fill(30, 35, 45);
      rect(barX, barY, barW, barH, 3);
      let progress = currentRound >= 0 ? min(1, (currentRound + 1) / rounds.length) : 0;
      fill(88, 166, 255);
      rect(barX, barY, barW * progress, barH, 3);

      // Title
      fill(200, 210, 230, 160);
      textAlign(CENTER, BOTTOM);
      textSize(13);
      textStyle(BOLD);
      text('PIXEL ART \u2014 DA ALGORITHM ON A 32\u00d732 GRID', width / 2, offsetY - 12);
      textSize(10);
      textStyle(NORMAL);
      fill(120, 140, 170, 120);
      let info = currentRound < rounds.length - 1
        ? 'Round ' + (currentRound + 2) + ' / ' + rounds.length
        : matchedCells.length + ' stable matches formed';
      text(info, width / 2, offsetY);
    }

    function processRound(r) {
      let events = rounds[r];
      for (let e of events) {
        let fromY = Math.floor(2 + e.student * (GRID - 4) / (N - 1));
        let fromX = 1;
        let toY = Math.floor(2 + e.school * (GRID - 4) / (N - 1));
        let midX = Math.floor(GRID / 2) + Math.floor(random(-3, 3));
        let midY = Math.floor((fromY + toY) / 2);

        activeProposals.push({ fromX: fromX, fromY: fromY, toX: midX, toY: midY, t: 0 });

        if (e.accepted) {
          let mx = constrain(midX + Math.floor(random(-2, 2)), 3, GRID - 4);
          let my = constrain(midY + Math.floor(random(-1, 2)), 1, GRID - 2);
          matchedCells.push({ x: mx, y: my });
          grid[my][mx].targetR = 255;
          grid[my][mx].targetG = 215;
          grid[my][mx].targetB = 80;

          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              let nx = mx + dx, ny = my + dy;
              if (nx >= 0 && nx < GRID && ny >= 0 && ny < GRID && !(dx === 0 && dy === 0)) {
                grid[ny][nx].targetR = min(grid[ny][nx].targetR + 30, 80);
                grid[ny][nx].targetG = min(grid[ny][nx].targetG + 25, 60);
                grid[ny][nx].targetB = min(grid[ny][nx].targetB + 10, 35);
              }
            }
          }
        } else {
          rejectedFlashes.push({ x: midX, y: Math.floor((fromY + toY) / 2), life: 1 });
        }
      }
    }

    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : 1 - pow(-2 * t + 2, 2) / 2;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      cellSize = min(width, height) * 0.85 / GRID;
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
  </script>
</body>
</html>
