<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RPG Adventure — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>RPG Adventure</h2><p>A top-down RPG where agents are adventurers exploring a dungeon. Each room is a potential pairing; stable rooms glow. The hero must navigate to their stable match.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    const N = 5;
    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
    const menPrefs = Array.from({length:N},()=>shuffle([0,1,2,3,4]));
    const womenPrefs = Array.from({length:N},()=>shuffle([0,1,2,3,4]));
    const womenRank = womenPrefs.map(p=>{const r=[];p.forEach((m,i)=>r[m]=i);return r;});

    // Run GS
    const menNext = Array(N).fill(0);
    const womenPartner = Array(N).fill(-1);
    const menFree = Array(N).fill(true);
    let freeCount = N;
    while (freeCount > 0) {
      for (let m = 0; m < N; m++) {
        if (!menFree[m] || menNext[m] >= N) continue;
        const w = menPrefs[m][menNext[m]]; menNext[m]++;
        if (womenPartner[w] === -1) {
          womenPartner[w] = m; menFree[m] = false; freeCount--;
        } else {
          const c = womenPartner[w];
          if (womenRank[w][m] < womenRank[w][c]) {
            womenPartner[w] = m; menFree[m] = false; menFree[c] = true;
          }
        }
      }
    }

    // Dungeon grid
    const COLS = 16, ROWS = 12;
    const TILE = Math.min(canvas.width / COLS, (canvas.height - 40) / ROWS);
    const offX = (canvas.width - COLS * TILE) / 2;
    const offY = (canvas.height - ROWS * TILE) / 2 + 10;

    // 0=floor, 1=wall, 2=stable room, 3=corridor
    const grid = [];
    for (let r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (let c = 0; c < COLS; c++) {
        // Border walls
        if (r === 0 || r === ROWS-1 || c === 0 || c === COLS-1) {
          grid[r][c] = 1;
        } else {
          grid[r][c] = 0;
        }
      }
    }

    // Create rooms for matched pairs
    const rooms = [];
    for (let w = 0; w < N; w++) {
      const m = womenPartner[w];
      if (m < 0) continue;
      // Place rooms across the dungeon
      const rc = 2 + Math.floor(w / 3) * 4 + 1;
      const cc = 2 + (w % 3) * 4 + 1;
      rooms.push({ m, w, row: Math.min(rc, ROWS-3), col: Math.min(cc, COLS-3) });
      // Mark room tiles
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const rr = Math.min(ROWS-2, Math.max(1, Math.min(rc, ROWS-3) + dr));
          const cr = Math.min(COLS-2, Math.max(1, Math.min(cc, COLS-3) + dc));
          grid[rr][cr] = 2;
        }
      }
    }

    // Add some wall features
    for (let i = 0; i < 15; i++) {
      const wr = 2 + Math.floor(Math.random() * (ROWS - 4));
      const wc = 2 + Math.floor(Math.random() * (COLS - 4));
      if (grid[wr][wc] === 0) grid[wr][wc] = 1;
    }

    // Hero sprites (blue)
    const heroes = rooms.map((room, i) => ({
      x: 1 + Math.floor(Math.random() * 3),
      y: 1 + i * 2,
      targetRow: room.row,
      targetCol: room.col,
      color: ['#3b82f6','#60a5fa','#2563eb','#38bdf8','#06b6d4'][room.m],
      label: 'M' + (room.m + 1),
      path: [],
      pathIdx: 0,
      arrived: false,
      moveTimer: 0
    }));

    // NPC sprites (purple) - placed in rooms
    const npcs = rooms.map((room, i) => ({
      x: room.col,
      y: room.row,
      color: ['#c084fc','#a855f7','#d946ef','#f472b6','#e879f9'][room.w],
      label: 'W' + (room.w + 1)
    }));

    // Simple pathfinding (BFS)
    function findPath(startR, startC, endR, endC) {
      const visited = Array.from({length: ROWS}, () => Array(COLS).fill(false));
      const parent = Array.from({length: ROWS}, () => Array(COLS).fill(null));
      const queue = [[startR, startC]];
      visited[startR][startC] = true;

      while (queue.length > 0) {
        const [r, c] = queue.shift();
        if (r === endR && c === endC) {
          const path = [];
          let cr = r, cc = c;
          while (parent[cr][cc]) {
            path.unshift({r: cr, c: cc});
            const p = parent[cr][cc];
            cr = p[0]; cc = p[1];
          }
          return path;
        }
        for (const [dr, dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !visited[nr][nc] && grid[nr][nc] !== 1) {
            visited[nr][nc] = true;
            parent[nr][nc] = [r, c];
            queue.push([nr, nc]);
          }
        }
      }
      return [];
    }

    // Calculate paths
    for (const hero of heroes) {
      hero.path = findPath(hero.y, hero.x, hero.targetRow, hero.targetCol);
    }

    let lastTime = performance.now();
    const moveSpeed = 0.2; // seconds per tile
    const heartParticles = [];

    function drawTile(r, c) {
      const x = offX + c * TILE;
      const y = offY + r * TILE;
      const t = grid[r][c];

      if (t === 1) {
        ctx.fillStyle = '#161b22';
        ctx.fillRect(x, y, TILE, TILE);
        // Brick pattern
        ctx.strokeStyle = '#21262d';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
        if (r % 2 === 0) {
          ctx.beginPath();
          ctx.moveTo(x + TILE/2, y); ctx.lineTo(x + TILE/2, y + TILE);
          ctx.stroke();
        }
      } else if (t === 2) {
        // Stable room - green glow
        const pulse = 0.3 + 0.15 * Math.sin(performance.now() * 0.003 + r + c);
        ctx.fillStyle = `rgba(74,222,128,${pulse})`;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = 'rgba(74,222,128,0.2)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, TILE, TILE);
      } else {
        // Floor
        ctx.fillStyle = '#1c2333';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.strokeStyle = '#21262d';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x, y, TILE, TILE);
      }
    }

    function drawSprite(col, row, color, label) {
      const x = offX + col * TILE + TILE / 2;
      const y = offY + row * TILE + TILE / 2;
      const s = TILE * 0.35;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(x, y + s + 2, s * 0.8, s * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Body
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, s, 0, Math.PI * 2);
      ctx.fill();

      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x - s*0.3, y - s*0.15, s*0.2, 0, Math.PI*2);
      ctx.arc(x + s*0.3, y - s*0.15, s*0.2, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#0d1117';
      ctx.beginPath();
      ctx.arc(x - s*0.25, y - s*0.15, s*0.1, 0, Math.PI*2);
      ctx.arc(x + s*0.35, y - s*0.15, s*0.1, 0, Math.PI*2);
      ctx.fill();

      // Label
      ctx.fillStyle = '#c9d1d9';
      ctx.font = `bold ${Math.max(8, TILE*0.22)}px JetBrains Mono`;
      ctx.textAlign = 'center';
      ctx.fillText(label, x, y + s + TILE*0.3);
    }

    let allArrived = false;

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          drawTile(r, c);
        }
      }

      // Move heroes
      let arrivedCount = 0;
      for (const hero of heroes) {
        if (hero.arrived) {
          arrivedCount++;
          continue;
        }
        hero.moveTimer += dt;
        if (hero.moveTimer >= moveSpeed && hero.pathIdx < hero.path.length) {
          hero.moveTimer = 0;
          const next = hero.path[hero.pathIdx];
          hero.x = next.c;
          hero.y = next.r;
          hero.pathIdx++;
          if (hero.pathIdx >= hero.path.length) {
            hero.arrived = true;
            arrivedCount++;
            // Heart burst
            for (let i = 0; i < 8; i++) {
              const angle = (i / 8) * Math.PI * 2;
              heartParticles.push({
                x: offX + hero.x * TILE + TILE/2,
                y: offY + hero.y * TILE + TILE/2,
                vx: Math.cos(angle) * 60,
                vy: Math.sin(angle) * 60 - 30,
                life: 1.5, maxLife: 1.5
              });
            }
          }
        }
      }
      if (arrivedCount === heroes.length) allArrived = true;

      // Draw NPCs
      for (const npc of npcs) {
        drawSprite(npc.x, npc.y, npc.color, npc.label);
      }

      // Draw heroes
      for (const hero of heroes) {
        drawSprite(hero.x, hero.y, hero.color, hero.label);
      }

      // Heart particles
      for (let i = heartParticles.length - 1; i >= 0; i--) {
        const p = heartParticles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 40 * dt;
        p.life -= dt;
        if (p.life <= 0) { heartParticles.splice(i, 1); continue; }

        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = '#ef4444';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('\u2665', p.x, p.y);
        ctx.globalAlpha = 1;
      }

      // Legend
      ctx.fillStyle = '#8b949e';
      ctx.font = '12px Nunito';
      ctx.textAlign = 'right';
      const lx = canvas.width - 20, ly = offY;
      ctx.fillText('Green rooms = stable pairs', lx, ly);
      ctx.fillText('Blue = heroes (men)', lx, ly + 16);
      ctx.fillText('Purple = NPCs (women)', lx, ly + 32);

      // Status
      if (!allArrived) {
        ctx.fillStyle = '#58a6ff';
        ctx.font = '14px Lora';
        ctx.textAlign = 'center';
        ctx.fillText('Heroes navigate to their stable match...', canvas.width/2, offY - 10);
      } else {
        ctx.fillStyle = '#4ade80';
        ctx.font = 'bold 16px Lora';
        ctx.textAlign = 'center';
        ctx.fillText('All heroes found their match! Dungeon cleared!', canvas.width/2, offY - 10);
      }

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
