<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animated Bipartite Matching Flow — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; overflow:hidden; font-family:'Nunito',sans-serif; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
    svg text { font-family:'Nunito',sans-serif; }
    #viz { width:100vw; height:100vh; }
    .status { position:fixed; top:16px; right:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:10px 16px; z-index:50; max-width:250px; backdrop-filter:blur(8px); }
    .status h3 { font-family:'Lora',serif; font-size:13px; color:#58a6ff; margin-bottom:4px; }
    .status p { font-size:12px; color:#8b949e; line-height:1.4; font-family:'JetBrains Mono',monospace; }
    .status p.accepted { color:#3fb950; }
    .status p.rejected { color:#f85149; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Animated Bipartite Matching Flow</h2><p>Watch the Gale-Shapley algorithm animate step-by-step. Proposals flow as animated particles from men to women; rejections snap back.</p></div>
  <div class="status" id="status"><h3>Algorithm Status</h3><p>Initializing...</p></div>
  <div id="viz"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select('#viz').append('svg').attr('width', W).attr('height', H);

    const menPrefs = {
      m1: ['w3','w1','w2','w4','w5'],
      m2: ['w1','w2','w3','w5','w4'],
      m3: ['w2','w3','w1','w4','w5'],
      m4: ['w3','w4','w1','w2','w5'],
      m5: ['w4','w5','w3','w1','w2']
    };
    const womenPrefs = {
      w1: ['m2','m1','m3','m4','m5'],
      w2: ['m3','m2','m1','m4','m5'],
      w3: ['m1','m3','m4','m2','m5'],
      w4: ['m4','m3','m5','m1','m2'],
      w5: ['m5','m4','m3','m2','m1']
    };

    const men = ['m1','m2','m3','m4','m5'];
    const women = ['w1','w2','w3','w4','w5'];
    const manColors = { m1:'#58a6ff', m2:'#3fb950', m3:'#d2a8ff', m4:'#f0883e', m5:'#f778ba' };

    const leftX = W * 0.22;
    const rightX = W * 0.78;
    const yStart = 100;
    const ySpacing = (H - 200) / 5;

    const menPos = {};
    const womenPos = {};
    men.forEach((m, i) => { menPos[m] = { x: leftX, y: yStart + (i + 0.5) * ySpacing }; });
    women.forEach((w, i) => { womenPos[w] = { x: rightX, y: yStart + (i + 0.5) * ySpacing }; });

    // Glow filter
    const defs = svg.append('defs');
    const glow = defs.append('filter').attr('id', 'glow');
    glow.append('feGaussianBlur').attr('stdDeviation', 5).attr('result', 'blur');
    const fm = glow.append('feMerge');
    fm.append('feMergeNode').attr('in', 'blur');
    fm.append('feMergeNode').attr('in', 'SourceGraphic');

    // Draw connection area
    svg.append('rect')
      .attr('x', leftX + 30).attr('y', yStart - 10)
      .attr('width', rightX - leftX - 60).attr('height', ySpacing * 5 + 20)
      .attr('fill', 'rgba(22,27,34,0.3)').attr('rx', 10);

    // Draw men nodes
    const nodeR = 26;
    men.forEach(m => {
      const pos = menPos[m];
      svg.append('circle').attr('cx', pos.x).attr('cy', pos.y).attr('r', nodeR)
        .attr('fill', '#161b22').attr('stroke', manColors[m]).attr('stroke-width', 2.5);
      svg.append('text').attr('x', pos.x).attr('y', pos.y + 1)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('fill', manColors[m]).attr('font-size', 14).attr('font-weight', 600).text(m);
      svg.append('text').attr('x', pos.x - 40).attr('y', pos.y)
        .attr('text-anchor', 'end').attr('dominant-baseline', 'central')
        .attr('fill', '#484f58').attr('font-size', 11).text('Man');
    });

    // Draw women nodes
    women.forEach(w => {
      const pos = womenPos[w];
      svg.append('circle').attr('cx', pos.x).attr('cy', pos.y).attr('r', nodeR)
        .attr('fill', '#161b22').attr('stroke', '#d2a8ff').attr('stroke-width', 2.5);
      svg.append('text').attr('x', pos.x).attr('y', pos.y + 1)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('fill', '#d2a8ff').attr('font-size', 14).attr('font-weight', 600).text(w);
      svg.append('text').attr('x', pos.x + 40).attr('y', pos.y)
        .attr('text-anchor', 'start').attr('dominant-baseline', 'central')
        .attr('fill', '#484f58').attr('font-size', 11).text('Woman');
    });

    // Run DA and collect events
    function runDA() {
      const events = [];
      const free = new Set(men);
      const nextProp = {};
      const matched = {};
      men.forEach(m => nextProp[m] = 0);
      let round = 0;

      while (free.size > 0) {
        round++;
        const toProcess = [...free];
        for (const m of toProcess) {
          const w = menPrefs[m][nextProp[m]];
          nextProp[m]++;
          const currentM = matched[w];
          let accepted = false;
          let displaced = null;
          if (!currentM) {
            matched[w] = m;
            free.delete(m);
            accepted = true;
          } else if (womenPrefs[w].indexOf(m) < womenPrefs[w].indexOf(currentM)) {
            displaced = currentM;
            matched[w] = m;
            free.delete(m);
            free.add(currentM);
            accepted = true;
          }
          events.push({ round, man: m, woman: w, accepted, displaced });
        }
      }
      return events;
    }

    const events = runDA();
    const matchLines = svg.append('g');
    const particleLayer = svg.append('g');
    const statusDiv = document.getElementById('status');

    function animateEvent(idx) {
      if (idx >= events.length) {
        drawFinalMatching();
        return;
      }

      const evt = events[idx];
      const from = menPos[evt.man];
      const to = womenPos[evt.woman];

      // Update status
      const p = document.createElement('p');
      p.className = evt.accepted ? 'accepted' : 'rejected';
      p.textContent = `R${evt.round}: ${evt.man}→${evt.woman} ${evt.accepted ? 'accepted' : 'rejected'}`;
      statusDiv.appendChild(p);
      if (statusDiv.children.length > 8) statusDiv.children[1].remove();

      // Create particle
      const particle = particleLayer.append('circle')
        .attr('cx', from.x + nodeR).attr('cy', from.y)
        .attr('r', 7)
        .attr('fill', manColors[evt.man])
        .attr('filter', 'url(#glow)');

      // Curved path control point
      const midX = (from.x + to.x) / 2;
      const midY = (from.y + to.y) / 2 - 30;

      // Animate to target
      particle.transition()
        .duration(800)
        .ease(d3.easeCubicInOut)
        .attrTween('cx', () => {
          const i = d3.interpolateNumber(from.x + nodeR, to.x - nodeR);
          return t => i(t);
        })
        .attrTween('cy', () => {
          const y0 = from.y, y1 = midY, y2 = to.y;
          return t => {
            const u = 1 - t;
            return u * u * y0 + 2 * u * t * y1 + t * t * y2;
          };
        })
        .transition()
        .duration(200)
        .attr('r', evt.accepted ? 9 : 5)
        .attr('fill', evt.accepted ? '#3fb950' : '#f85149')
        .transition()
        .duration(evt.accepted ? 300 : 600)
        .ease(evt.accepted ? d3.easeCubicOut : d3.easeBackIn)
        .attr('cx', evt.accepted ? to.x - nodeR : from.x + nodeR)
        .attr('cy', evt.accepted ? to.y : from.y)
        .attr('r', evt.accepted ? 0 : 0)
        .attr('opacity', 0)
        .remove();

      // If accepted, draw a faint connection line
      if (evt.accepted) {
        // Remove old line for this man if displaced someone
        if (evt.displaced) {
          matchLines.selectAll(`.match-${evt.displaced}`).remove();
        }

        setTimeout(() => {
          matchLines.append('path')
            .attr('class', `match-${evt.man}`)
            .attr('d', `M${from.x + nodeR},${from.y} C${midX},${from.y} ${midX},${to.y} ${to.x - nodeR},${to.y}`)
            .attr('fill', 'none')
            .attr('stroke', manColors[evt.man])
            .attr('stroke-width', 1.5)
            .attr('opacity', 0.3);
        }, 1000);
      }

      setTimeout(() => animateEvent(idx + 1), 1400);
    }

    function drawFinalMatching() {
      const finalP = document.createElement('p');
      finalP.style.color = '#e3b341';
      finalP.style.fontWeight = '600';
      finalP.textContent = 'Algorithm complete!';
      statusDiv.appendChild(finalP);

      matchLines.selectAll('path').remove();

      const finalMatch = { m1:'w3', m2:'w1', m3:'w2', m4:'w4', m5:'w5' };
      Object.entries(finalMatch).forEach(([m, w], i) => {
        const from = menPos[m];
        const to = womenPos[w];
        const midX = (from.x + to.x) / 2;

        matchLines.append('path')
          .attr('d', `M${from.x + nodeR},${from.y} C${midX},${from.y} ${midX},${to.y} ${to.x - nodeR},${to.y}`)
          .attr('fill', 'none')
          .attr('stroke', manColors[m])
          .attr('stroke-width', 3.5)
          .attr('filter', 'url(#glow)')
          .attr('opacity', 0)
          .transition()
          .delay(i * 300)
          .duration(600)
          .attr('opacity', 0.9);
      });
    }

    setTimeout(() => animateEvent(0), 1200);
  </script>
</body>
</html>
