<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandala Match — Matching Algorithms Visual Gallery</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:sans-serif; }
    canvas { display:block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); color:#8b949e; font-size:12px; line-height:1.4; }
    .info h2 { font-size:15px; color:#58a6ff; margin-bottom:4px; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div class="info">
    <h2>Mandala Match</h2>
    <p>8-fold symmetry mandala. Golden petals = matched pairs. Blue lines = unmatched. Inner circles show preference ranks along each arm.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 8;
    let angle = 0;
    let studentPrefs = [], schoolPrefs = [];
    let matching = [];
    let matchHistory = [];
    let frameCounter = 0;
    let petalAlpha = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      initAlgorithm();
      for (let i = 0; i < N; i++) {
        petalAlpha.push(0);
      }
    }

    function initAlgorithm() {
      studentPrefs = [];
      schoolPrefs = [];
      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffled(N));
        schoolPrefs.push(shuffled(N));
      }
      matching = new Array(N).fill(-1);
      runDA();
    }

    function shuffled(n) {
      let a = [...Array(n).keys()];
      for (let i = n - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function runDA() {
      let studentNext = new Array(N).fill(0);
      let schoolCurrent = new Array(N).fill(-1);
      let rounds = [];

      for (let r = 0; r < N * N; r++) {
        let freeStudents = [];
        for (let s = 0; s < N; s++) {
          let matched = false;
          for (let sch = 0; sch < N; sch++) {
            if (schoolCurrent[sch] === s) { matched = true; break; }
          }
          if (!matched && studentNext[s] < N) freeStudents.push(s);
        }
        if (freeStudents.length === 0) break;

        for (let s of freeStudents) {
          let sch = studentPrefs[s][studentNext[s]];
          studentNext[s]++;
          if (schoolCurrent[sch] === -1) {
            schoolCurrent[sch] = s;
          } else {
            let cur = schoolCurrent[sch];
            if (schoolPrefs[sch].indexOf(s) < schoolPrefs[sch].indexOf(cur)) {
              schoolCurrent[sch] = s;
            }
          }
        }
        let snap = new Array(N).fill(-1);
        for (let sch = 0; sch < N; sch++) {
          if (schoolCurrent[sch] !== -1) snap[schoolCurrent[sch]] = sch;
        }
        rounds.push([...snap]);
      }
      matchHistory = rounds;
      if (rounds.length > 0) matching = rounds[rounds.length - 1];
    }

    function draw() {
      background(13, 17, 23);
      frameCounter++;
      angle += 0.003;

      let roundIdx = Math.min(Math.floor(frameCounter / 120), matchHistory.length - 1);
      if (roundIdx >= 0 && roundIdx < matchHistory.length) {
        matching = matchHistory[roundIdx];
      }

      let cx = width / 2;
      let cy = height / 2;
      let maxR = min(width, height) * 0.38;

      push();
      translate(cx, cy);
      rotate(angle);

      for (let i = 0; i < N; i++) {
        let armAngle = (TWO_PI / N) * i;
        let isMatched = matching[i] !== -1;
        let targetAlpha = isMatched ? 90 : 40;
        petalAlpha[i] = lerp(petalAlpha[i], targetAlpha, 0.03);

        push();
        rotate(armAngle);

        if (isMatched) {
          let petalLen = maxR * 0.85;
          let petalW = maxR * 0.12;
          let glow = 50 + 20 * sin(frameCount * 0.05 + i);
          noStroke();
          fill(42, 80, glow, petalAlpha[i] * 0.3);
          beginShape();
          vertex(0, 0);
          bezierVertex(petalW * 1.5, -petalLen * 0.3, petalW * 1.2, -petalLen * 0.7, 0, -petalLen);
          bezierVertex(-petalW * 1.2, -petalLen * 0.7, -petalW * 1.5, -petalLen * 0.3, 0, 0);
          endShape(CLOSE);
          fill(42, 90, 85, petalAlpha[i]);
          beginShape();
          vertex(0, 0);
          bezierVertex(petalW, -petalLen * 0.3, petalW * 0.8, -petalLen * 0.7, 0, -petalLen * 0.9);
          bezierVertex(-petalW * 0.8, -petalLen * 0.7, -petalW, -petalLen * 0.3, 0, 0);
          endShape(CLOSE);
        } else {
          stroke(210, 70, 70, petalAlpha[i]);
          strokeWeight(1.5);
          line(0, 0, 0, -maxR * 0.7);
        }

        let prefs = studentPrefs[i];
        for (let r = 0; r < N; r++) {
          let dist = map(r, 0, N - 1, maxR * 0.12, maxR * 0.75);
          let dotHue = map(r, 0, N - 1, 10, 240);
          let dotSize = map(r, 0, N - 1, 7, 3);
          noStroke();
          fill(dotHue, 70, 80, 60);
          ellipse(0, -dist, dotSize, dotSize);
        }

        pop();
      }

      // Center ornament
      noStroke();
      let pulse = 0.5 + 0.5 * sin(frameCount * 0.03);
      fill(42, 60, 90, 60 + pulse * 30);
      ellipse(0, 0, 30 + pulse * 8, 30 + pulse * 8);
      fill(42, 80, 95, 80);
      ellipse(0, 0, 16, 16);

      noFill();
      for (let r = 1; r <= 4; r++) {
        stroke(210, 30, 50, 20);
        strokeWeight(0.5);
        ellipse(0, 0, maxR * 0.2 * r, maxR * 0.2 * r);
      }

      pop();

      noStroke();
      fill(0, 0, 100, 60);
      textAlign(RIGHT, TOP);
      textSize(13);
      text('Round ' + (roundIdx + 1) + '/' + matchHistory.length, width - 20, 20);

      let matchCount = matching.filter(m => m !== -1).length;
      fill(42, 80, 85, 70);
      text(matchCount + '/' + N + ' matched', width - 20, 40);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
