<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matching Mandala — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Matching Mandala</h2><p>The preference structure has rotational symmetry. This mandala encodes all preferences — identical arms represent mutual top choices.</p></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let rotAngle = 0;
    let breathe = 0;

    // Preference matrix: men's prefs[i][j] = man i's rank for woman j
    let menPrefs = [
      [1,3,2,5,4],
      [2,1,4,3,5],
      [1,5,3,2,4],
      [4,2,1,5,3],
      [3,4,5,1,2]
    ];
    // Matched pairs: man i matched with woman i
    let matchedRanks = [1, 1, 3, 2, 2]; // man i's rank for his match

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      angleMode(RADIANS);
    }

    function draw() {
      background(13, 17, 23);
      translate(width / 2, height / 2);
      rotAngle += 0.003;
      breathe = sin(frameCount * 0.015) * 0.08;

      let maxR = min(width, height) * 0.42;
      let symmetry = 10; // 5 men + 5 women

      // Outer glow ring
      noFill();
      for (let r = maxR + 10; r > maxR - 5; r -= 2) {
        stroke(40, 60, 80, map(r, maxR - 5, maxR + 10, 20, 2));
        strokeWeight(1.5);
        ellipse(0, 0, r * 2, r * 2);
      }

      // Draw mandala layers
      rotate(rotAngle);

      // Layer 1: Preference petals (outermost)
      for (let s = 0; s < symmetry; s++) {
        push();
        rotate((TWO_PI / symmetry) * s);

        let agentIdx = s % 5;
        let isMan = s < 5;

        // Draw petal based on preference rankings
        for (let rank = 1; rank <= 5; rank++) {
          let r = map(rank, 1, 5, maxR * 0.85, maxR * 0.5);
          r *= (1 + breathe);
          let petalW = map(rank, 1, 5, 28, 12);

          let hue = isMan ? 210 : 310;
          let sat = map(rank, 1, 5, 80, 30);
          let bri = map(rank, 1, 5, 95, 50);

          // Matched pair highlight
          if (rank === matchedRanks[agentIdx] && isMan) {
            hue = 45;
            sat = 90;
            bri = 100;
          }

          noStroke();
          fill(hue, sat, bri, 60);
          ellipse(0, r, petalW, petalW * 2.5);

          // Small decorative circles
          fill(hue, sat - 20, bri, 40);
          ellipse(petalW * 0.3, r, 4, 4);
          ellipse(-petalW * 0.3, r, 4, 4);
        }
        pop();
      }

      // Layer 2: Inner geometric ring
      let innerR = maxR * 0.38 * (1 + breathe * 0.5);
      for (let s = 0; s < symmetry; s++) {
        push();
        rotate((TWO_PI / symmetry) * s);

        // Triangle petals
        let hue = s < 5 ? 210 : 310;
        if (matchedRanks[s % 5] === 1) hue = 45; // gold for top match
        fill(hue, 70, 90, 50);
        noStroke();
        triangle(0, innerR + 20, -12, innerR - 15, 12, innerR - 15);

        // Connecting arc
        stroke(hue, 50, 80, 30);
        strokeWeight(1);
        noFill();
        arc(0, 0, innerR * 2, innerR * 2, -0.15, 0.15);
        pop();
      }

      // Layer 3: Center mandala
      let centerR = maxR * 0.2 * (1 + breathe * 0.3);
      for (let s = 0; s < 5; s++) {
        push();
        rotate((TWO_PI / 5) * s);

        // Matched pair circles in center
        let isTopMatch = matchedRanks[s] === 1;
        let hue = isTopMatch ? 45 : 200;
        let bri = isTopMatch ? 100 : 70;

        fill(hue, 70, bri, 70);
        noStroke();
        ellipse(0, centerR, 16, 16);

        // Connection to matched partner
        stroke(hue, 60, bri, 40);
        strokeWeight(1.5);
        let partnerAngle = (TWO_PI / 5) * s + PI / 5;
        let px = cos(partnerAngle) * centerR;
        let py = sin(partnerAngle) * centerR;
        line(0, centerR, px, py);
        pop();
      }

      // Center jewel
      for (let r = 25; r > 0; r -= 3) {
        fill(45, map(r, 0, 25, 30, 80), 100, map(r, 0, 25, 90, 20));
        noStroke();
        ellipse(0, 0, r * 2, r * 2);
      }

      // Decorative dots along the main ring
      for (let i = 0; i < 60; i++) {
        let a = (TWO_PI / 60) * i + rotAngle * 0.5;
        let r = maxR * 0.45 * (1 + breathe * 0.4);
        fill(45, 40, 90, 30);
        noStroke();
        ellipse(cos(a) * r, sin(a) * r, 3, 3);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
