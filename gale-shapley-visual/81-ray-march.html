<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ray Marched Preference Landscape — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; }
    body { background:#0d1117; overflow:hidden; }
    canvas#c { position:fixed; top:0; left:0; width:100vw; height:100vh; display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; font-family:'Nunito',sans-serif; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); font-family:'Nunito',sans-serif; }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Ray Marched Preference Landscape</h2><p>Ray-marched 3D signed-distance field landscape. The terrain height represents preference compatibility — valleys show blocking pairs, peaks show stable matchings.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);
    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }`;
    function mkShader(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(sh));return sh;}
    function mkProg(fs){const pr=gl.createProgram();gl.attachShader(pr,mkShader(gl.VERTEX_SHADER,VS));gl.attachShader(pr,mkShader(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);return pr;}
    const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

    const FS = `
    precision highp float;
    uniform vec2 u_res;
    uniform float u_time;

    // 5 matched pairs: man position, woman position
    vec3 manPos[5];
    vec3 womanPos[5];

    void initPairs() {
      float t = u_time * 0.15;
      manPos[0] = vec3(-1.5, 0.0, -1.0);
      womanPos[0] = vec3(-1.2, 0.0, -0.7);
      manPos[1] = vec3(1.0, 0.0, -1.5);
      womanPos[1] = vec3(0.7, 0.0, -1.2);
      manPos[2] = vec3(0.0, 0.0, 0.5);
      womanPos[2] = vec3(0.3, 0.0, 0.8);
      manPos[3] = vec3(-2.0, 0.0, 1.5);
      womanPos[3] = vec3(-1.7, 0.0, 1.8);
      manPos[4] = vec3(1.8, 0.0, 1.0);
      womanPos[4] = vec3(1.5, 0.0, 1.3);
    }

    float smin(float a, float b, float k) {
      float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
      return mix(b, a, h) - k*h*(1.0-h);
    }

    float sdSphere(vec3 p, vec3 c, float r) {
      return length(p - c) - r;
    }

    float sdPlane(vec3 p, float h) {
      return p.y - h;
    }

    float noise3d(vec3 p) {
      vec3 i = floor(p);
      vec3 f = fract(p);
      f = f*f*(3.0 - 2.0*f);
      float n = i.x + i.y*157.0 + 113.0*i.z;
      float a = fract(sin(n)*43758.5453);
      float b = fract(sin(n+1.0)*43758.5453);
      float c = fract(sin(n+157.0)*43758.5453);
      float d = fract(sin(n+158.0)*43758.5453);
      float e = fract(sin(n+113.0)*43758.5453);
      float f2 = fract(sin(n+114.0)*43758.5453);
      float g = fract(sin(n+270.0)*43758.5453);
      float h = fract(sin(n+271.0)*43758.5453);
      return mix(
        mix(mix(a,b,f.x), mix(c,d,f.x), f.y),
        mix(mix(e,f2,f.x), mix(g,h,f.x), f.y),
        f.z
      );
    }

    float terrain(vec3 p) {
      float h = 0.0;
      h += noise3d(p * 0.5) * 1.0;
      h += noise3d(p * 1.0) * 0.5;
      h += noise3d(p * 2.0) * 0.25;
      // Raise terrain near stable pair midpoints
      for(int i = 0; i < 5; i++) {
        vec3 mid = (manPos[i] + womanPos[i]) * 0.5;
        float d = length(p.xz - mid.xz);
        h += 0.8 * exp(-d*d*0.5);
      }
      return h - 1.0;
    }

    float scene(vec3 p) {
      float d = p.y - terrain(p);
      // Add sphere pairs
      for(int i = 0; i < 5; i++) {
        vec3 mp = manPos[i]; mp.y = terrain(manPos[i]) + 0.4;
        vec3 wp = womanPos[i]; wp.y = terrain(womanPos[i]) + 0.4;
        float s1 = sdSphere(p, mp, 0.25);
        float s2 = sdSphere(p, wp, 0.25);
        d = smin(d, smin(s1, s2, 0.3), 0.2);
      }
      return d;
    }

    vec3 calcNormal(vec3 p) {
      vec2 e = vec2(0.01, 0.0);
      return normalize(vec3(
        scene(p+e.xyy) - scene(p-e.xyy),
        scene(p+e.yxy) - scene(p-e.yxy),
        scene(p+e.yyx) - scene(p-e.yyx)
      ));
    }

    void main() {
      initPairs();
      vec2 uv = (gl_FragCoord.xy - 0.5*u_res) / u_res.y;
      float t = u_time * 0.2;

      // Orbiting camera
      vec3 ro = vec3(5.0*cos(t), 3.5, 5.0*sin(t));
      vec3 ta = vec3(0.0, 0.0, 0.0);
      vec3 w = normalize(ta - ro);
      vec3 u = normalize(cross(w, vec3(0,1,0)));
      vec3 v = cross(u, w);
      vec3 rd = normalize(uv.x*u + uv.y*v + 1.5*w);

      // Ray march
      float dist = 0.0;
      vec3 p;
      bool hit = false;
      for(int i = 0; i < 120; i++) {
        p = ro + rd * dist;
        float d = scene(p);
        if(d < 0.005) { hit = true; break; }
        if(dist > 30.0) break;
        dist += d * 0.7;
      }

      vec3 col = vec3(0.02, 0.03, 0.06);
      if(hit) {
        vec3 n = calcNormal(p);

        // Two lights: blue key + warm fill
        vec3 lightDir1 = normalize(vec3(1.0, 2.0, -1.0));
        vec3 lightDir2 = normalize(vec3(-1.0, 1.0, 2.0));
        vec3 lightCol1 = vec3(0.3, 0.5, 1.0);
        vec3 lightCol2 = vec3(1.0, 0.7, 0.4);

        float diff1 = max(dot(n, lightDir1), 0.0);
        float diff2 = max(dot(n, lightDir2), 0.0);
        vec3 h1 = normalize(lightDir1 - rd);
        vec3 h2 = normalize(lightDir2 - rd);
        float spec1 = pow(max(dot(n, h1), 0.0), 32.0);
        float spec2 = pow(max(dot(n, h2), 0.0), 32.0);

        float elev = terrain(p);
        vec3 baseCol = mix(vec3(0.15, 0.25, 0.1), vec3(0.4, 0.6, 0.3), clamp(elev*0.5+0.5, 0.0, 1.0));
        // Color spheres differently
        for(int i = 0; i < 5; i++) {
          vec3 mp = manPos[i]; mp.y = terrain(manPos[i]) + 0.4;
          vec3 wp = womanPos[i]; wp.y = terrain(womanPos[i]) + 0.4;
          if(length(p - mp) < 0.5) baseCol = vec3(0.2, 0.4, 0.9);
          if(length(p - wp) < 0.5) baseCol = vec3(0.9, 0.4, 0.2);
        }

        col = baseCol * (diff1 * lightCol1 + diff2 * lightCol2 * 0.5) + (spec1 * lightCol1 + spec2 * lightCol2) * 0.3;
        col += vec3(0.03, 0.04, 0.08); // ambient

        // Fog
        float fog = 1.0 - exp(-dist * 0.06);
        col = mix(col, vec3(0.02, 0.03, 0.08), fog);
      }

      col = pow(col, vec3(0.4545));
      gl_FragColor = vec4(col, 1.0);
    }
    `;

    const prog = mkProg(FS);
    gl.useProgram(prog);
    const loc_p = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc_p);
    gl.vertexAttribPointer(loc_p, 2, gl.FLOAT, false, 0, 0);
    const loc_res = gl.getUniformLocation(prog, 'u_res');
    const loc_time = gl.getUniformLocation(prog, 'u_time');

    function frame(t) {
      gl.uniform2f(loc_res, canvas.width, canvas.height);
      gl.uniform1f(loc_time, t * 0.001);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
