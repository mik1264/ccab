<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Water Droplets Merging — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Water Droplets Merging</h2><p>Agents start as separate water droplets. Compatible pairs slowly merge into larger droplets — only truly stable pairs sustain their merged state.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const N = 5;
    const matching = [0,1,2,3,4];

    class Droplet {
      constructor(x, y, type, index) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.r = 30 + Math.random() * 10;
        this.baseR = this.r;
        this.type = type;
        this.index = index;
        this.merged = false;
        this.mergeProgress = 0;
        this.partner = null;
        this.repelTimer = 0;
      }
    }

    let droplets = [];

    function init() {
      droplets = [];
      const w = canvas.width, h = canvas.height;
      for (let i = 0; i < N; i++) {
        droplets.push(new Droplet(
          w * 0.2 + Math.random() * w * 0.2,
          h * 0.2 + Math.random() * h * 0.6,
          'man', i
        ));
        droplets.push(new Droplet(
          w * 0.6 + Math.random() * w * 0.2,
          h * 0.2 + Math.random() * h * 0.6,
          'woman', i
        ));
      }
    }

    init();
    window.addEventListener('resize', () => { resize(); init(); });

    let t = 0, dt = 1/60;

    function loop() {
      requestAnimationFrame(loop);
      t += dt;
      update();
      render();
    }

    function update() {
      const w = canvas.width, h = canvas.height;

      for (const d of droplets) {
        if (d.merged) continue;
        d.repelTimer = Math.max(0, d.repelTimer - dt);

        // Attract toward matched partner
        const targetIdx = matching[d.index];
        const targetType = d.type === 'man' ? 'woman' : 'man';
        const partner = droplets.find(o => o.type === targetType && o.index === targetIdx && !o.merged);

        if (partner) {
          const dx = partner.x - d.x;
          const dy = partner.y - d.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist > 0) {
            const force = 0.15 / Math.max(1, dist * 0.01);
            d.vx += (dx / dist) * force;
            d.vy += (dy / dist) * force;
          }

          // Merge check
          if (dist < d.r + partner.r - 10 && d.type === 'man') {
            d.merged = true;
            partner.merged = true;
            d.partner = partner;
            partner.partner = d;
            d.mergeProgress = 0;
          }
        }

        // Repel from non-matching opposite sex
        for (const o of droplets) {
          if (o === d || o.merged) continue;
          if (o.type === d.type) continue;
          const isMatch = (d.type === 'man' && matching[d.index] === o.index) ||
                          (d.type === 'woman' && matching[o.index] === d.index);
          if (isMatch) continue;

          const dx = d.x - o.x;
          const dy = d.y - o.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < d.r + o.r + 20 && dist > 0) {
            const force = 2.0 / Math.max(1, dist * 0.1);
            d.vx += (dx / dist) * force;
            d.vy += (dy / dist) * force;
            d.repelTimer = 0.5;
          }
        }

        // Same type gentle repel
        for (const o of droplets) {
          if (o === d || o.merged) continue;
          if (o.type !== d.type) continue;
          const dx = d.x - o.x;
          const dy = d.y - o.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < d.r + o.r + 10 && dist > 0) {
            d.vx += (dx / dist) * 0.5;
            d.vy += (dy / dist) * 0.5;
          }
        }

        // Slow drift
        d.vx *= 0.96;
        d.vy *= 0.96;
        d.x += d.vx;
        d.y += d.vy;

        // Boundaries
        if (d.x < d.r + 20) d.vx += 0.5;
        if (d.x > w - d.r - 20) d.vx -= 0.5;
        if (d.y < d.r + 20) d.vy += 0.5;
        if (d.y > h - d.r - 20) d.vy -= 0.5;
      }

      // Update merged pairs
      for (const d of droplets) {
        if (d.merged && d.partner && d.type === 'man') {
          d.mergeProgress = Math.min(1, d.mergeProgress + 0.008);
          const p = d.partner;
          const mx = (d.x + p.x) / 2;
          const my = (d.y + p.y) / 2;
          d.x += (mx - d.x) * 0.02;
          d.y += (my - d.y) * 0.02;
          p.x += (mx - p.x) * 0.02;
          p.y += (my - p.y) * 0.02;
        }
      }
    }

    function drawDroplet(d, alpha) {
      const isMan = d.type === 'man';
      const baseColor = isMan ? [88, 166, 255] : [192, 132, 252];

      // Outer glow
      const glow = ctx.createRadialGradient(d.x, d.y, d.r * 0.5, d.x, d.y, d.r * 1.5);
      glow.addColorStop(0, `rgba(${baseColor.join(',')},${0.1 * alpha})`);
      glow.addColorStop(1, `rgba(${baseColor.join(',')},0)`);
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r * 1.5, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // Main body
      const grad = ctx.createRadialGradient(
        d.x - d.r * 0.3, d.y - d.r * 0.3, d.r * 0.1,
        d.x, d.y, d.r
      );
      grad.addColorStop(0, `rgba(255,255,255,${0.9 * alpha})`);
      grad.addColorStop(0.2, `rgba(${baseColor[0]+60},${baseColor[1]+60},${baseColor[2]},${0.7 * alpha})`);
      grad.addColorStop(0.6, `rgba(${baseColor.join(',')},${0.5 * alpha})`);
      grad.addColorStop(1, `rgba(${Math.floor(baseColor[0]*0.5)},${Math.floor(baseColor[1]*0.5)},${Math.floor(baseColor[2]*0.7)},${0.4 * alpha})`);

      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Specular highlight
      ctx.beginPath();
      ctx.ellipse(d.x - d.r * 0.25, d.y - d.r * 0.25, d.r * 0.3, d.r * 0.2, -0.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.6 * alpha})`;
      ctx.fill();

      // Label
      ctx.fillStyle = `rgba(255,255,255,${0.9 * alpha})`;
      ctx.font = 'bold 11px Nunito';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(isMan ? 'M'+(d.index+1) : 'W'+(d.index+1), d.x, d.y);
    }

    function render() {
      const w = canvas.width, h = canvas.height;

      // Dark bg with subtle gradient
      const bgGrad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w * 0.6);
      bgGrad.addColorStop(0, '#111827');
      bgGrad.addColorStop(1, '#0d1117');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, w, h);

      // Draw unmerged droplets
      for (const d of droplets) {
        if (d.merged) continue;
        drawDroplet(d, 1);
      }

      // Draw merged pairs
      for (const d of droplets) {
        if (!d.merged || d.type !== 'man' || !d.partner) continue;
        const p = d.partner;
        const mp = d.mergeProgress;

        // Metaball-style merge using compositing
        // Draw both with increasing size as they merge
        const r1 = d.baseR * (1 + mp * 0.3);
        const r2 = p.baseR * (1 + mp * 0.3);

        // Gold glow for merged pair
        if (mp > 0.5) {
          const glow = ctx.createRadialGradient(
            (d.x+p.x)/2, (d.y+p.y)/2, 0,
            (d.x+p.x)/2, (d.y+p.y)/2, (r1+r2)*0.8
          );
          glow.addColorStop(0, `rgba(255,215,0,${(mp-0.5)*0.3})`);
          glow.addColorStop(1, 'rgba(255,215,0,0)');
          ctx.beginPath();
          ctx.arc((d.x+p.x)/2, (d.y+p.y)/2, (r1+r2)*0.8, 0, Math.PI*2);
          ctx.fillStyle = glow;
          ctx.fill();
        }

        d.r = r1;
        p.r = r2;
        drawDroplet(d, 1);
        drawDroplet(p, 1);

        // Blend bridge between them
        const dx = p.x - d.x, dy = p.y - d.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < r1 + r2 && mp > 0.2) {
          const mx = (d.x + p.x) / 2, my = (d.y + p.y) / 2;
          const bridgeR = Math.min(r1, r2) * mp * 0.6;
          const bGrad = ctx.createRadialGradient(mx, my - bridgeR*0.2, bridgeR*0.1, mx, my, bridgeR);
          bGrad.addColorStop(0, `rgba(200,180,255,${mp * 0.5})`);
          bGrad.addColorStop(1, `rgba(130,100,200,${mp * 0.2})`);
          ctx.beginPath();
          ctx.arc(mx, my, bridgeR, 0, Math.PI * 2);
          ctx.fillStyle = bGrad;
          ctx.fill();
        }
      }
    }

    loop();
  </script>
</body>
</html>
