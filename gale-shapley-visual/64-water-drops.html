<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Water Drops — Matching Algorithms Visual Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;overflow:hidden;font-family:sans-serif}
canvas{display:block;position:fixed;top:0;left:0}
.back{position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100}
.back:hover{background:#30363d}
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, scale = 3;
let offCanvas, offCtx, offW, offH;

const students = [];
const schools = [];

function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
  offW = Math.ceil(W / scale);
  offH = Math.ceil(H / scale);
  offCanvas = document.createElement('canvas');
  offCanvas.width = offW;
  offCanvas.height = offH;
  offCtx = offCanvas.getContext('2d');
  initDrops();
}

function initDrops() {
  students.length = 0;
  schools.length = 0;
  for (let i = 0; i < 8; i++) {
    students.push({
      x: W * (0.1 + Math.random() * 0.35),
      y: H * (0.1 + Math.random() * 0.8),
      freq: 0.035 + Math.random() * 0.02,
      phase: Math.random() * Math.PI * 2
    });
    schools.push({
      x: W * (0.55 + Math.random() * 0.35),
      y: H * (0.1 + Math.random() * 0.8),
      freq: 0.035 + Math.random() * 0.02,
      phase: Math.random() * Math.PI * 2
    });
  }
}

resize();
window.addEventListener('resize', resize);

function animate(now) {
  const time = now * 0.001;
  const imgData = offCtx.createImageData(offW, offH);
  const data = imgData.data;

  for (let py = 0; py < offH; py++) {
    for (let px = 0; px < offW; px++) {
      const wx = px * scale;
      const wy = py * scale;
      let sSum = 0, cSum = 0;

      for (let i = 0; i < 8; i++) {
        const s = students[i];
        const dx = wx - s.x, dy = wy - s.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        sSum += Math.sin(dist * s.freq - (time - s.phase) * 3.0) * Math.exp(-dist * 0.003) * 0.8;
      }

      for (let i = 0; i < 8; i++) {
        const s = schools[i];
        const dx = wx - s.x, dy = wy - s.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        cSum += Math.sin(dist * s.freq - (time - s.phase) * 3.0) * Math.exp(-dist * 0.003) * 0.8;
      }

      const total = (sSum + cSum) * 0.25;
      const constructive = total * total * 2;
      const idx = (py * offW + px) * 4;

      // Water aesthetic: cyan for student waves, gold for school waves, bright for constructive
      data[idx]   = Math.max(0, Math.min(255, 8  + sSum * 12  + cSum * 90  + constructive * 200));
      data[idx+1] = Math.max(0, Math.min(255, 12 + sSum * 65  + cSum * 63  + constructive * 180));
      data[idx+2] = Math.max(0, Math.min(255, 25 + sSum * 100 + cSum * 10  + constructive * 80));
      data[idx+3] = 255;
    }
  }

  offCtx.putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(offCanvas, 0, 0, W, H);

  // Source indicators and match lines
  for (let i = 0; i < 8; i++) {
    const s = students[i], sc = schools[i];
    const pulse = 0.5 + 0.5 * Math.sin(time * 2 + s.phase);

    // Student ring (cyan)
    ctx.strokeStyle = 'rgba(0,220,255,' + (0.5 + pulse * 0.4) + ')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(s.x, s.y, 6 + pulse * 3, 0, Math.PI * 2);
    ctx.stroke();

    // School ring (gold)
    const pulse2 = 0.5 + 0.5 * Math.sin(time * 2 + sc.phase);
    ctx.strokeStyle = 'rgba(255,200,50,' + (0.5 + pulse2 * 0.4) + ')';
    ctx.beginPath();
    ctx.arc(sc.x, sc.y, 6 + pulse2 * 3, 0, Math.PI * 2);
    ctx.stroke();

    // Midpoint bright spot
    const mx = (s.x + sc.x) / 2;
    const my = (s.y + sc.y) / 2;
    const midPulse = 0.3 + 0.3 * Math.sin(time * 2.5 + i);
    const grad = ctx.createRadialGradient(mx, my, 0, mx, my, 18);
    grad.addColorStop(0, 'rgba(255,255,220,' + (0.6 * midPulse) + ')');
    grad.addColorStop(1, 'rgba(255,255,220,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(mx, my, 18, 0, Math.PI * 2);
    ctx.fill();

    // Match line
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([2, 4]);
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(sc.x, sc.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.fillStyle = 'rgba(201,209,217,0.6)';
  ctx.font = '600 15px sans-serif';
  ctx.fillText('Water Drops', 16, H - 16);

  ctx.fillStyle = 'rgba(0,220,255,0.5)';
  ctx.font = '11px sans-serif';
  ctx.fillText('Student ripples', W - 160, H - 32);
  ctx.fillStyle = 'rgba(255,200,50,0.5)';
  ctx.fillText('School ripples', W - 160, H - 16);

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
