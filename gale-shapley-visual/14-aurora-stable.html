<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aurora Stability — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Aurora Stability</h2><p>Northern lights appear when a stable matching is found. Curtains of color represent preference lists; their convergence shows matching stability.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);

    function mkShader(type, src) {
      const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
      return s;
    }
    function mkProg(vs, fs) {
      const p = gl.createProgram();
      gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
      gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(p); return p;
    }

    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0,1); }`;

    const FS = `
    precision mediump float;
    uniform float u_time;
    uniform vec2 u_res;

    // Aurora curtain: vertical sinusoidal band
    float curtain(vec2 uv, float xCenter, float freq, float phase, float t, float width) {
      float wave = sin(uv.y * freq + t + phase) * 0.05;
      float x = uv.x - xCenter - wave;
      float intensity = exp(-x * x / (width * width));
      // Height fade: stronger at top
      intensity *= smoothstep(0.0, 0.3, uv.y) * smoothstep(1.0, 0.5, uv.y);
      // Shimmer
      intensity *= 0.7 + 0.3 * sin(uv.y * 20.0 + t * 3.0 + phase);
      return intensity;
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      float t = u_time;

      // Convergence: 0 = separated, 1 = interlocked
      float convergence = clamp(t * 0.06 - 0.2, 0.0, 1.0);
      convergence = convergence * convergence; // Ease-in

      vec3 col = vec3(0.0);

      // Dark sky background with subtle gradient
      col = mix(vec3(0.01, 0.01, 0.04), vec3(0.02, 0.04, 0.08), uv.y);

      // Stars
      float starField = fract(sin(dot(floor(uv * 200.0), vec2(12.9898, 78.233))) * 43758.5453);
      if (starField > 0.995) {
        float twinkle = 0.5 + 0.5 * sin(t * 2.0 + starField * 100.0);
        col += vec3(0.6, 0.7, 0.8) * twinkle;
      }

      // 6 curtains from the left (men / proposers) - green/teal
      for (int i = 0; i < 6; i++) {
        float fi = float(i);
        float baseX = 0.1 + fi * 0.06;
        // Move toward center with convergence
        float targetX = 0.35 + fi * 0.05;
        float x = mix(baseX, targetX, convergence);
        float freq = 6.0 + fi * 1.5;
        float phase = fi * 1.2;
        float width = 0.03 + 0.01 * sin(fi);

        float c = curtain(uv, x, freq, phase, t * (0.8 + fi * 0.1), width);

        // Green to teal gradient
        vec3 curtainCol = mix(
          vec3(0.0, 0.8, 0.3),
          vec3(0.0, 0.6, 0.7),
          fi / 5.0
        );
        col += curtainCol * c * 0.5;
      }

      // 6 curtains from the right (women / recipients) - violet/magenta
      for (int i = 0; i < 6; i++) {
        float fi = float(i);
        float baseX = 0.9 - fi * 0.06;
        // Move toward center with convergence
        float targetX = 0.65 - fi * 0.05;
        float x = mix(baseX, targetX, convergence);
        float freq = 5.0 + fi * 1.8;
        float phase = fi * 1.5 + 3.14;
        float width = 0.03 + 0.01 * cos(fi);

        float c = curtain(uv, x, freq, phase, t * (0.7 + fi * 0.12), width);

        // Violet to magenta gradient
        vec3 curtainCol = mix(
          vec3(0.4, 0.0, 0.8),
          vec3(0.7, 0.0, 0.5),
          fi / 5.0
        );
        col += curtainCol * c * 0.5;
      }

      // Interlocking glow at center when converged
      float centerGlow = convergence * exp(-pow((uv.x - 0.5) * 4.0, 2.0));
      centerGlow *= smoothstep(0.1, 0.4, uv.y) * smoothstep(0.95, 0.6, uv.y);
      float shimmer = 0.7 + 0.3 * sin(uv.y * 30.0 + t * 2.0);
      col += vec3(0.3, 0.7, 0.5) * centerGlow * shimmer * 0.6;

      // Horizon glow
      float horizon = exp(-pow((uv.y - 0.05) * 8.0, 2.0));
      col += vec3(0.1, 0.15, 0.05) * horizon;

      // Overall brightness boost with convergence
      col *= 1.0 + convergence * 0.3;

      gl_FragColor = vec4(col, 1.0);
    }`;

    const prog = mkProg(VS, FS);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    const pLoc = gl.getAttribLocation(prog, 'p');
    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uRes = gl.getUniformLocation(prog, 'u_res');

    gl.useProgram(prog);
    gl.enableVertexAttribArray(pLoc);
    gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

    function frame(t) {
      gl.uniform1f(uTime, t * 0.001);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
