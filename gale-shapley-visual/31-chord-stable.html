<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chord Diagram of Matchings — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; overflow:hidden; font-family:'Nunito',sans-serif; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
    svg text { font-family:'Nunito',sans-serif; }
    #viz { width:100vw; height:100vh; }
    .legend { position:fixed; bottom:20px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; backdrop-filter:blur(8px); }
    .legend-item { display:flex; align-items:center; gap:8px; margin-bottom:4px; font-size:12px; color:#8b949e; }
    .legend-swatch { width:24px; height:4px; border-radius:2px; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Chord Diagram of Matchings</h2><p>All agents arranged in a circle. Chords connect matched pairs — inner chords = men-optimal, outer chords = women-optimal. The space between shows the range of stable matchings.</p></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,#3fb950,#56d364)"></div>Men-optimal</div>
    <div class="legend-item"><div class="legend-swatch" style="background:linear-gradient(90deg,#bc8cff,#d2a8ff)"></div>Women-optimal</div>
  </div>
  <div id="viz"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select('#viz').append('svg').attr('width', W).attr('height', H);

    const menOptimal = { m1:'w3', m2:'w1', m3:'w2', m4:'w4', m5:'w5' };
    const womenOptimal = { m1:'w1', m2:'w2', m3:'w3', m4:'w4', m5:'w5' };

    const agents = ['m1','m2','m3','m4','m5','w1','w2','w3','w4','w5'];
    const n = agents.length;
    const cx = W / 2, cy = H / 2;
    const radius = Math.min(W, H) * 0.32;
    const nodeR = 22;

    const angleScale = d3.scaleLinear().domain([0, n]).range([0, Math.PI * 2]);

    function getPos(i) {
      const a = angleScale(i) - Math.PI / 2;
      return { x: cx + radius * Math.cos(a), y: cy + radius * Math.sin(a) };
    }

    const agentPos = {};
    agents.forEach((a, i) => { agentPos[a] = getPos(i); });

    const defs = svg.append('defs');

    // Glow filter
    const glow = defs.append('filter').attr('id', 'glow');
    glow.append('feGaussianBlur').attr('stdDeviation', 4).attr('result', 'blur');
    const feMerge = glow.append('feMerge');
    feMerge.append('feMergeNode').attr('in', 'blur');
    feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

    // Gradients for chords
    function makeGradient(id, c1, c2) {
      const g = defs.append('linearGradient').attr('id', id).attr('gradientUnits','userSpaceOnUse');
      g.append('stop').attr('offset','0%').attr('stop-color', c1);
      g.append('stop').attr('offset','100%').attr('stop-color', c2);
      return g;
    }

    // Draw outer ring
    svg.append('circle')
      .attr('cx', cx).attr('cy', cy).attr('r', radius)
      .attr('fill', 'none').attr('stroke', '#21262d').attr('stroke-width', 1.5);

    // Chord path generator with curvature control
    function chordPath(from, to, offset) {
      const midX = (from.x + to.x) / 2;
      const midY = (from.y + to.y) / 2;
      const dx = midX - cx, dy = midY - cy;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const pull = offset; // negative = inner, positive = outer
      const ctrlX = midX - (dx / dist) * pull;
      const ctrlY = midY - (dy / dist) * pull;
      return `M${from.x},${from.y} Q${ctrlX},${ctrlY} ${to.x},${to.y}`;
    }

    const chordGroup = svg.append('g');

    // Men-optimal chords (inner)
    const menChords = Object.entries(menOptimal).map(([m, w]) => ({ m, w }));
    const womenChords = Object.entries(womenOptimal).map(([m, w]) => ({ m, w }));

    // Create gradient for each chord
    menChords.forEach((d, i) => {
      const g = makeGradient(`mg${i}`, '#3fb950', '#56d364');
      g.attr('x1', agentPos[d.m].x).attr('y1', agentPos[d.m].y)
       .attr('x2', agentPos[d.w].x).attr('y2', agentPos[d.w].y);
    });
    womenChords.forEach((d, i) => {
      const g = makeGradient(`wg${i}`, '#bc8cff', '#d2a8ff');
      g.attr('x1', agentPos[d.m].x).attr('y1', agentPos[d.m].y)
       .attr('x2', agentPos[d.w].x).attr('y2', agentPos[d.w].y);
    });

    // Tooltip
    const tooltip = d3.select('body').append('div')
      .style('position', 'fixed').style('display', 'none')
      .style('background', 'rgba(13,17,23,0.95)').style('border', '1px solid #30363d')
      .style('border-radius', '8px').style('padding', '8px 12px')
      .style('font-size', '12px').style('color', '#e6edf3')
      .style('pointer-events', 'none').style('z-index', '200');

    // Draw men-optimal chords (inner, pulled toward center)
    chordGroup.selectAll('.men-chord')
      .data(menChords)
      .enter().append('path')
      .attr('class', 'men-chord')
      .attr('d', d => chordPath(agentPos[d.m], agentPos[d.w], -60))
      .attr('fill', 'none')
      .attr('stroke', (d, i) => `url(#mg${i})`)
      .attr('stroke-width', 3)
      .attr('stroke-linecap', 'round')
      .attr('opacity', 0)
      .attr('filter', 'url(#glow)')
      .on('mouseenter', function(event, d) {
        d3.select(this).attr('stroke-width', 5);
        tooltip.style('display', 'block')
          .html(`<strong>Men-optimal</strong><br>${d.m} ↔ ${d.w}`)
          .style('left', (event.clientX + 12) + 'px')
          .style('top', (event.clientY - 20) + 'px');
      })
      .on('mousemove', function(event) {
        tooltip.style('left', (event.clientX + 12) + 'px').style('top', (event.clientY - 20) + 'px');
      })
      .on('mouseleave', function() {
        d3.select(this).attr('stroke-width', 3);
        tooltip.style('display', 'none');
      })
      .transition()
      .delay((d, i) => i * 500)
      .duration(800)
      .ease(d3.easeCubicOut)
      .attr('opacity', 0.85);

    // Draw women-optimal chords (outer, pulled away from center)
    chordGroup.selectAll('.women-chord')
      .data(womenChords)
      .enter().append('path')
      .attr('class', 'women-chord')
      .attr('d', d => chordPath(agentPos[d.m], agentPos[d.w], 60))
      .attr('fill', 'none')
      .attr('stroke', (d, i) => `url(#wg${i})`)
      .attr('stroke-width', 3)
      .attr('stroke-linecap', 'round')
      .attr('opacity', 0)
      .attr('filter', 'url(#glow)')
      .on('mouseenter', function(event, d) {
        d3.select(this).attr('stroke-width', 5);
        tooltip.style('display', 'block')
          .html(`<strong>Women-optimal</strong><br>${d.m} ↔ ${d.w}`)
          .style('left', (event.clientX + 12) + 'px')
          .style('top', (event.clientY - 20) + 'px');
      })
      .on('mousemove', function(event) {
        tooltip.style('left', (event.clientX + 12) + 'px').style('top', (event.clientY - 20) + 'px');
      })
      .on('mouseleave', function() {
        d3.select(this).attr('stroke-width', 3);
        tooltip.style('display', 'none');
      })
      .transition()
      .delay((d, i) => 2500 + i * 500)
      .duration(800)
      .ease(d3.easeCubicOut)
      .attr('opacity', 0.85);

    // Draw nodes
    const nodeGroup = svg.append('g');
    agents.forEach((agent, i) => {
      const pos = getPos(i);
      const isMan = agent.startsWith('m');
      const color = isMan ? '#58a6ff' : '#d2a8ff';

      nodeGroup.append('circle')
        .attr('cx', pos.x).attr('cy', pos.y).attr('r', nodeR)
        .attr('fill', '#0d1117')
        .attr('stroke', color).attr('stroke-width', 2.5)
        .attr('filter', 'url(#glow)');

      nodeGroup.append('text')
        .attr('x', pos.x).attr('y', pos.y + 1)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('fill', color).attr('font-size', 13).attr('font-weight', 600)
        .text(agent);

      // Outer label
      const labelR = radius + 40;
      const a = angleScale(i) - Math.PI / 2;
      const lx = cx + labelR * Math.cos(a);
      const ly = cy + labelR * Math.sin(a);
      nodeGroup.append('text')
        .attr('x', lx).attr('y', ly)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('fill', '#484f58').attr('font-size', 11)
        .text(isMan ? 'Man' : 'Woman');
    });

    // Subtle rotation animation
    let angle = 0;
    function rotate() {
      angle += 0.02;
      chordGroup.attr('transform', `rotate(${angle}, ${cx}, ${cy})`);
      nodeGroup.attr('transform', `rotate(${angle}, ${cx}, ${cy})`);
      requestAnimationFrame(rotate);
    }
    setTimeout(rotate, 5000);
  </script>
</body>
</html>
