<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Dance — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; }
    .back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
    .back:hover { background: #30363d; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const GRID = 64;
    const N = 8; // students and schools
    let grid = [];       // GRID x GRID: {hue, brightness, targetBri, state}
    let cellSize;
    let offsetX, offsetY;

    // DA algorithm state
    let studentPrefs = [];
    let schoolPrefs = [];
    let studentNext = [];
    let schoolMatch = [];
    let studentMatch = [];
    let freeStudents = [];
    let proposals = [];    // {row, col, state, timer}
    let stablePixels = []; // {row, col}
    let algoFrame = 0;
    let algoDone = false;
    let roundDelay = 4;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      noStroke();
      computeLayout();
      initGrid();
      initAlgorithm();
    }

    function computeLayout() {
      cellSize = min(width, height) * 0.85 / GRID;
      offsetX = (width - GRID * cellSize) / 2;
      offsetY = (height - GRID * cellSize) / 2;
    }

    function initGrid() {
      grid = [];
      for (let r = 0; r < GRID; r++) {
        grid[r] = [];
        for (let c = 0; c < GRID; c++) {
          // Map student(row) and school(col) to preference brightness
          let studentIdx = floor(r / (GRID / N));
          let schoolIdx = floor(c / (GRID / N));
          let baseBri = random(8, 30);
          grid[r][c] = {
            hue: map(studentIdx + schoolIdx, 0, 14, 200, 320),
            bri: baseBri,
            targetBri: baseBri,
            saturation: 40,
            targetSat: 40,
            state: 'idle' // idle, proposing, accepted, rejected
          };
        }
      }
    }

    function initAlgorithm() {
      studentPrefs = [];
      schoolPrefs = [];
      studentNext = [];
      schoolMatch = new Array(N).fill(-1);
      studentMatch = new Array(N).fill(-1);
      freeStudents = [];

      for (let i = 0; i < N; i++) {
        // Random preference ordering
        let prefs = [];
        for (let j = 0; j < N; j++) prefs.push(j);
        shuffleArr(prefs);
        studentPrefs.push(prefs);

        let sprefs = [];
        for (let j = 0; j < N; j++) sprefs.push(j);
        shuffleArr(sprefs);
        schoolPrefs.push(sprefs);

        studentNext.push(0);
        freeStudents.push(i);
      }

      // Set grid brightness based on preferences
      let blockSize = GRID / N;
      for (let si = 0; si < N; si++) {
        for (let sci = 0; sci < N; sci++) {
          let rank = studentPrefs[si].indexOf(sci);
          let bri = map(rank, 0, N - 1, 55, 10);
          for (let r = si * blockSize; r < (si + 1) * blockSize; r++) {
            for (let c = sci * blockSize; c < (sci + 1) * blockSize; c++) {
              grid[r][c].targetBri = bri;
              grid[r][c].hue = map(si, 0, N - 1, 210, 290);
            }
          }
        }
      }
    }

    function shuffleArr(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = floor(random(i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function schoolPrefersNew(school, newStudent, currentStudent) {
      let rank1 = schoolPrefs[school].indexOf(newStudent);
      let rank2 = schoolPrefs[school].indexOf(currentStudent);
      return rank1 < rank2;
    }

    function stepAlgorithm() {
      if (freeStudents.length === 0) {
        algoDone = true;
        // Highlight stable matches
        let blockSize = GRID / N;
        for (let si = 0; si < N; si++) {
          let sci = studentMatch[si];
          if (sci >= 0) {
            for (let r = si * blockSize; r < (si + 1) * blockSize; r++) {
              for (let c = sci * blockSize; c < (sci + 1) * blockSize; c++) {
                grid[r][c].targetBri = 95;
                grid[r][c].targetSat = 70;
                grid[r][c].hue = 42; // gold
                grid[r][c].state = 'accepted';
              }
            }
            stablePixels.push({ si: si, sci: sci });
          }
        }
        return;
      }

      let student = freeStudents[0];
      if (studentNext[student] >= N) {
        freeStudents.shift();
        return;
      }

      let school = studentPrefs[student][studentNext[student]];
      studentNext[student]++;

      let blockSize = GRID / N;

      if (schoolMatch[school] === -1) {
        // Accept
        schoolMatch[school] = student;
        studentMatch[student] = school;
        freeStudents.shift();
        // Flash accepted
        for (let r = student * blockSize; r < (student + 1) * blockSize; r++) {
          for (let c = school * blockSize; c < (school + 1) * blockSize; c++) {
            grid[r][c].targetBri = 80;
            grid[r][c].targetSat = 65;
            grid[r][c].hue = 42;
            grid[r][c].state = 'accepted';
          }
        }
      } else {
        let current = schoolMatch[school];
        if (schoolPrefersNew(school, student, current)) {
          // Reject current, accept new
          // Flash rejected for current
          for (let r = current * blockSize; r < (current + 1) * blockSize; r++) {
            for (let c = school * blockSize; c < (school + 1) * blockSize; c++) {
              grid[r][c].targetBri = 12;
              grid[r][c].targetSat = 80;
              grid[r][c].hue = 0; // red flash
              grid[r][c].state = 'rejected';
            }
          }
          studentMatch[current] = -1;
          freeStudents.push(current);

          schoolMatch[school] = student;
          studentMatch[student] = school;
          freeStudents.shift();
          for (let r = student * blockSize; r < (student + 1) * blockSize; r++) {
            for (let c = school * blockSize; c < (school + 1) * blockSize; c++) {
              grid[r][c].targetBri = 80;
              grid[r][c].targetSat = 65;
              grid[r][c].hue = 42;
              grid[r][c].state = 'accepted';
            }
          }
        } else {
          // Rejected: flash red briefly
          for (let r = student * blockSize; r < (student + 1) * blockSize; r++) {
            for (let c = school * blockSize; c < (school + 1) * blockSize; c++) {
              grid[r][c].bri = 50;
              grid[r][c].saturation = 90;
              grid[r][c].hue = 0;
              grid[r][c].state = 'rejected';
              grid[r][c].targetBri = 6;
              grid[r][c].targetSat = 30;
            }
          }
        }
      }
    }

    function draw() {
      background(220, 40, 5);

      algoFrame++;
      if (!algoDone && algoFrame % roundDelay === 0) {
        stepAlgorithm();
      }

      // Draw grid
      for (let r = 0; r < GRID; r++) {
        for (let c = 0; c < GRID; c++) {
          let cell = grid[r][c];
          cell.bri = lerp(cell.bri, cell.targetBri, 0.08);
          cell.saturation = lerp(cell.saturation, cell.targetSat, 0.08);

          // Stable match glow pulse
          if (algoDone && cell.state === 'accepted') {
            let pulse = sin(frameCount * 0.04 + r * 0.1 + c * 0.1) * 8;
            fill(cell.hue, cell.saturation, cell.bri + pulse, 95);
          } else {
            fill(cell.hue, cell.saturation, cell.bri, 90);
          }
          rect(offsetX + c * cellSize, offsetY + r * cellSize, cellSize + 0.5, cellSize + 0.5);
        }
      }

      // Restart after completion pause
      if (algoDone && algoFrame > (algoFrame - 300) && frameCount % 600 === 0) {
        algoDone = false;
        algoFrame = 0;
        stablePixels = [];
        proposals = [];
        initGrid();
        initAlgorithm();
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      computeLayout();
    }
  </script>
</body>
</html>
