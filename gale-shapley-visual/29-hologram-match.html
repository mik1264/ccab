<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hologram Match</title>
<style>
* { margin: 0; padding: 0; }
body { background: #0d1117; overflow: hidden; }
.back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
.back:hover { background: #30363d; }
</style>
</head>
<body>
<a class="back" href="index.html">&#8592; Back</a>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 0, 10);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x0d1117);
document.body.appendChild(renderer.domElement);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
scene.add(new THREE.AmbientLight(0x334455, 2));
const dl = new THREE.DirectionalLight(0xffffff, 2);
dl.position.set(5, 8, 5); scene.add(dl);

var group = new THREE.Group();

// Outer wireframe sphere
var wireGeo = new THREE.SphereGeometry(4, 16, 16);
var wireMat = new THREE.MeshBasicMaterial({
  color: 0x58a6ff,
  wireframe: true,
  transparent: true,
  opacity: 0.3
});
var wireSphere = new THREE.Mesh(wireGeo, wireMat);
group.add(wireSphere);

// 10 inner cyan spheres (inside the wireframe)
var innerSpheres = [];
for (var i = 0; i < 10; i++) {
  var theta = Math.random() * Math.PI * 2;
  var phi = Math.acos(2 * Math.random() - 1);
  var r = Math.random() * 2.5 + 0.3;
  var geo = new THREE.SphereGeometry(0.2, 16, 16);
  var mat = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x004444 });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
  innerSpheres.push(mesh);
  group.add(mesh);
}

// 10 outer pink spheres (on the wireframe surface)
var outerSpheres = [];
for (var i = 0; i < 10; i++) {
  var theta = Math.random() * Math.PI * 2;
  var phi = Math.acos(2 * Math.random() - 1);
  var geo = new THREE.SphereGeometry(0.3, 16, 16);
  var mat = new THREE.MeshPhongMaterial({ color: 0xff6b8a, emissive: 0x330011 });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(
    4 * Math.sin(phi) * Math.cos(theta),
    4 * Math.sin(phi) * Math.sin(theta),
    4 * Math.cos(phi)
  );
  outerSpheres.push(mesh);
  group.add(mesh);
}

// Line segments connecting matched inner-outer pairs
var linePositions = new Float32Array(10 * 6);
for (var i = 0; i < 10; i++) {
  var ip = innerSpheres[i].position;
  var op = outerSpheres[i].position;
  linePositions[i * 6] = ip.x;
  linePositions[i * 6 + 1] = ip.y;
  linePositions[i * 6 + 2] = ip.z;
  linePositions[i * 6 + 3] = op.x;
  linePositions[i * 6 + 4] = op.y;
  linePositions[i * 6 + 5] = op.z;
}
var lineGeo = new THREE.BufferGeometry();
lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
var lineMat = new THREE.LineBasicMaterial({ color: 0x88ffcc, transparent: true, opacity: 0.5 });
var lines = new THREE.LineSegments(lineGeo, lineMat);
group.add(lines);

scene.add(group);

function animate(ts) {
  requestAnimationFrame(animate);
  var t = ts * 0.001;

  group.rotation.y = t * 0.25;
  group.rotation.x = Math.sin(t * 0.15) * 0.2;

  // Pulsing wireframe scale
  var pulse = 1.0 + Math.sin(t * 0.8) * 0.06;
  wireSphere.scale.set(pulse, pulse, pulse);

  camera.position.x = Math.sin(t * 0.2) * 10;
  camera.position.y = Math.sin(t * 0.15) * 3;
  camera.position.z = Math.cos(t * 0.2) * 10;
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
animate(0);
</script>
</body>
</html>
