<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Constellation Matching Network — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">&#8592; Visual Gallery</a>
  <div class="info"><h2>Constellation Matching Network</h2><p>Agents become stars in a constellation map. The stable matching connects them into constellations — each matched pair a double star bound by gravity.</p></div>
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020208);
    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);
    camera.position.set(0, 0, 30);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // Background stars (5000)
    const bgStarCount = 5000;
    const bgGeo = new THREE.BufferGeometry();
    const bgPos = new Float32Array(bgStarCount * 3);
    const bgSizes = new Float32Array(bgStarCount);
    for (let i = 0; i < bgStarCount; i++) {
      bgPos[i*3] = (Math.random() - 0.5) * 200;
      bgPos[i*3+1] = (Math.random() - 0.5) * 200;
      bgPos[i*3+2] = -20 - Math.random() * 100;
      bgSizes[i] = Math.random() * 2;
    }
    bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
    bgGeo.setAttribute('size', new THREE.BufferAttribute(bgSizes, 1));
    const bgMat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.15,
      transparent: true,
      opacity: 0.7,
      sizeAttenuation: true
    });
    scene.add(new THREE.Points(bgGeo, bgMat));

    // Matching: 6 men matched with 6 women
    const matching = [[0,1],[1,3],[2,0],[3,5],[4,2],[5,4]];

    // Men positions (blue, left region)
    const menPos = [
      new THREE.Vector3(-8, 6, 0),
      new THREE.Vector3(-10, 2, 0),
      new THREE.Vector3(-7, -2, 0),
      new THREE.Vector3(-9, -5, 0),
      new THREE.Vector3(-6, -8, 0),
      new THREE.Vector3(-11, 0, 0)
    ];

    // Women positions (gold, right region)
    const womenPos = [
      new THREE.Vector3(8, 5, 0),
      new THREE.Vector3(10, 1, 0),
      new THREE.Vector3(7, -3, 0),
      new THREE.Vector3(9, -6, 0),
      new THREE.Vector3(6, -9, 0),
      new THREE.Vector3(11, 2, 0)
    ];

    scene.add(new THREE.AmbientLight(0x111122, 0.3));

    // Create bright star
    function createStar(pos, color, size) {
      // Core sphere
      const geo = new THREE.SphereGeometry(size, 16, 16);
      const mat = new THREE.MeshBasicMaterial({ color: color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(pos);
      scene.add(mesh);

      // Glow sprite (additive blending)
      const spriteMat = new THREE.SpriteMaterial({
        color: color,
        transparent: true,
        opacity: 0.4,
        blending: THREE.AdditiveBlending
      });
      const sprite = new THREE.Sprite(spriteMat);
      sprite.position.copy(pos);
      sprite.scale.setScalar(size * 6);
      scene.add(sprite);

      // Point light
      const light = new THREE.PointLight(color, 0.5, 8);
      light.position.copy(pos);
      scene.add(light);

      return { mesh, sprite };
    }

    const menStars = menPos.map(p => createStar(p, 0x4488ff, 0.4));
    const womenStars = womenPos.map(p => createStar(p, 0xffcc44, 0.4));

    // Nebula arcs connecting matched pairs
    const arcs = [];
    matching.forEach(([m, w]) => {
      const start = menPos[m];
      const end = womenPos[w];
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      mid.z += 3 + Math.random() * 2;
      mid.y += (Math.random() - 0.5) * 2;
      const curve = new THREE.CatmullRomCurve3([start, mid, end]);
      const tubeGeo = new THREE.TubeGeometry(curve, 40, 0.06, 8, false);
      const tubeMat = new THREE.MeshBasicMaterial({
        color: 0xaaddff,
        transparent: true,
        opacity: 0.5,
        blending: THREE.AdditiveBlending
      });
      const tube = new THREE.Mesh(tubeGeo, tubeMat);
      scene.add(tube);
      arcs.push(tube);
    });

    // Twinkling animation data
    const twinklePhases = menStars.concat(womenStars).map(() => Math.random() * Math.PI * 2);

    function animate(t) {
      requestAnimationFrame(animate);
      const time = t * 0.001;

      // Slow camera pan
      camera.position.x = Math.sin(time * 0.05) * 5;
      camera.position.y = Math.cos(time * 0.07) * 3;
      camera.lookAt(0, 0, 0);

      // Twinkle stars
      const allStars = menStars.concat(womenStars);
      allStars.forEach((s, i) => {
        const twinkle = 0.3 + Math.sin(time * 3 + twinklePhases[i]) * 0.15;
        s.sprite.material.opacity = twinkle;
        const sc = 1 + Math.sin(time * 2 + twinklePhases[i]) * 0.15;
        s.mesh.scale.setScalar(sc);
      });

      // Pulse arcs
      arcs.forEach((arc, i) => {
        arc.material.opacity = 0.3 + Math.sin(time * 1.5 + i * 0.8) * 0.2;
      });

      // Background star twinkle
      const posArr = bgGeo.attributes.position.array;
      for (let i = 0; i < 50; i++) {
        const idx = Math.floor(Math.random() * bgStarCount) * 3;
        posArr[idx + 2] += (Math.random() - 0.5) * 0.01;
      }
      bgGeo.attributes.position.needsUpdate = true;

      renderer.render(scene, camera);
    }
    animate(0);
  </script>
</body>
</html>
