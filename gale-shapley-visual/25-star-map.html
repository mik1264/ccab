<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Star Map</title>
<style>
* { margin: 0; padding: 0; }
body { background: #0d1117; overflow: hidden; }
.back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
.back:hover { background: #30363d; }
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 0, 20);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x050510);
document.body.appendChild(renderer.domElement);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
scene.add(new THREE.AmbientLight(0x334455, 2));
const dl = new THREE.DirectionalLight(0xffffff, 1);
dl.position.set(5, 8, 5); scene.add(dl);

const bgCount = 200;
const bgPos = new Float32Array(bgCount * 3);
for (let i = 0; i < bgCount; i++) {
  bgPos[i*3] = (Math.random() - 0.5) * 60;
  bgPos[i*3+1] = (Math.random() - 0.5) * 60;
  bgPos[i*3+2] = (Math.random() - 0.5) * 60;
}
const bgGeo = new THREE.BufferGeometry();
bgGeo.setAttribute('position', new THREE.Float32BufferAttribute(bgPos, 3));
const bgStars = new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.6 }));
scene.add(bgStars);

const NUM = 10;
const sPos = [], scPos = [];
for (let i = 0; i < NUM; i++) {
  sPos.push([-6 + (Math.random()-0.5)*4, (i-NUM/2)*1.5 + (Math.random()-0.5)*0.5, (Math.random()-0.5)*4]);
  scPos.push([6 + (Math.random()-0.5)*4, (i-NUM/2)*1.5 + (Math.random()-0.5)*0.5, (Math.random()-0.5)*4]);
}

const sMeshes = [], scMeshes = [];
for (let i = 0; i < NUM; i++) {
  const g1 = new THREE.SphereGeometry(0.25, 16, 16);
  const m1 = new THREE.MeshPhongMaterial({ color: 0x58a6ff, emissive: 0x58a6ff, emissiveIntensity: 0.6 });
  const s = new THREE.Mesh(g1, m1);
  s.position.set(...sPos[i]);
  scene.add(s); sMeshes.push(s);

  const g2 = new THREE.SphereGeometry(0.25, 16, 16);
  const m2 = new THREE.MeshPhongMaterial({ color: 0xffd700, emissive: 0xffd700, emissiveIntensity: 0.6 });
  const sc = new THREE.Mesh(g2, m2);
  sc.position.set(...scPos[i]);
  scene.add(sc); scMeshes.push(sc);
}

const matching = Array.from({length: NUM}, (_, i) => i);
for (let i = NUM-1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i+1));
  [matching[i], matching[j]] = [matching[j], matching[i]];
}

const prefP = [];
for (let i = 0; i < NUM; i++) {
  for (let j = 0; j < NUM; j++) {
    if (j !== matching[i] && Math.random() < 0.3) {
      prefP.push(...sPos[i], ...scPos[j]);
    }
  }
}
const prefGeo = new THREE.BufferGeometry();
prefGeo.setAttribute('position', new THREE.Float32BufferAttribute(prefP, 3));
scene.add(new THREE.LineSegments(prefGeo, new THREE.LineBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.08 })));

const matchP = [];
for (let i = 0; i < NUM; i++) {
  matchP.push(...sPos[i], ...scPos[matching[i]]);
}
const matchGeo = new THREE.BufferGeometry();
matchGeo.setAttribute('position', new THREE.Float32BufferAttribute(matchP, 3));
scene.add(new THREE.LineSegments(matchGeo, new THREE.LineBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.85 })));

function animate(ts) {
  requestAnimationFrame(animate);
  const t = ts * 0.001;

  bgStars.material.opacity = 0.4 + Math.sin(t * 0.7) * 0.2;

  for (let i = 0; i < NUM; i++) {
    const sp = 1 + Math.sin(t * 2.5 + i * 0.7) * 0.15;
    sMeshes[i].scale.setScalar(sp);
    sMeshes[i].material.emissiveIntensity = 0.4 + Math.sin(t * 3 + i) * 0.3;
    scMeshes[i].scale.setScalar(sp);
    scMeshes[i].material.emissiveIntensity = 0.4 + Math.sin(t * 3 + i + 1) * 0.3;
  }

  camera.position.x = Math.sin(t * 0.08) * 5;
  camera.position.y = Math.sin(t * 0.06) * 2;
  camera.position.z = 18 + Math.cos(t * 0.05) * 4;
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
animate(0);
</script>
</body>
</html>
