<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Metaball Matching — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; }
    body { background:#0d1117; overflow:hidden; }
    canvas#c { position:fixed; top:0; left:0; width:100vw; height:100vh; display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; font-family:'Nunito',sans-serif; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); font-family:'Nunito',sans-serif; }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Metaball Matching</h2><p>Matched pairs are metaballs that flow together into organic blobs. Incompatible agents repel, creating separated forms. The stable matching is the minimal-energy configuration.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);
    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }`;
    function mkShader(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(sh));return sh;}
    function mkProg(fs){const pr=gl.createProgram();gl.attachShader(pr,mkShader(gl.VERTEX_SHADER,VS));gl.attachShader(pr,mkShader(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);return pr;}
    const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

    const FS = `
    precision highp float;
    uniform vec2 u_res;
    uniform float u_time;

    // 5 men (blue) + 5 women (warm) = 10 metaballs
    // Matched pairs: (0,5), (1,6), (2,7), (3,8), (4,9)
    vec2 ballPos(int i, float t) {
      float s = t * 0.3;
      // Men: indices 0-4
      if(i == 0) return vec2(-0.5 + 0.05*sin(s*1.1), -0.3 + 0.04*cos(s*0.9));
      if(i == 1) return vec2(0.4 + 0.04*cos(s*0.8), -0.4 + 0.05*sin(s*1.2));
      if(i == 2) return vec2(0.0 + 0.06*sin(s*0.7), 0.3 + 0.03*cos(s*1.0));
      if(i == 3) return vec2(-0.6 + 0.04*cos(s*1.3), 0.5 + 0.05*sin(s*0.6));
      if(i == 4) return vec2(0.5 + 0.05*sin(s*0.9), 0.2 + 0.04*cos(s*1.1));
      // Women (matched pairs close to their man)
      if(i == 5) return vec2(-0.4 + 0.04*cos(s*0.9), -0.25 + 0.05*sin(s*1.1));
      if(i == 6) return vec2(0.48 + 0.05*sin(s*1.2), -0.35 + 0.04*cos(s*0.8));
      if(i == 7) return vec2(0.08 + 0.03*cos(s*1.0), 0.35 + 0.06*sin(s*0.7));
      if(i == 8) return vec2(-0.52 + 0.05*sin(s*0.6), 0.55 + 0.04*cos(s*1.3));
      if(i == 9) return vec2(0.55 + 0.04*cos(s*1.1), 0.25 + 0.05*sin(s*0.9));
      return vec2(0.0);
    }

    vec3 ballColor(int i) {
      // Men: cool blue tones
      if(i == 0) return vec3(0.2, 0.4, 1.0);
      if(i == 1) return vec3(0.15, 0.5, 0.9);
      if(i == 2) return vec3(0.25, 0.35, 0.95);
      if(i == 3) return vec3(0.1, 0.45, 0.85);
      if(i == 4) return vec3(0.3, 0.4, 1.0);
      // Women: warm orange tones
      if(i == 5) return vec3(1.0, 0.5, 0.2);
      if(i == 6) return vec3(0.95, 0.55, 0.15);
      if(i == 7) return vec3(1.0, 0.45, 0.25);
      if(i == 8) return vec3(0.9, 0.5, 0.2);
      if(i == 9) return vec3(1.0, 0.55, 0.18);
      return vec3(1.0);
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - 0.5*u_res) / u_res.y;
      float t = u_time;

      float field = 0.0;
      vec3 colorWeight = vec3(0.0);
      float totalWeight = 0.0;
      float r2 = 0.012;

      for(int i = 0; i < 10; i++) {
        vec2 bp = ballPos(i, t);
        float d2 = dot(uv - bp, uv - bp);
        float contribution = r2 / (d2 + 0.0001);
        field += contribution;
        colorWeight += ballColor(i) * contribution;
        totalWeight += contribution;
      }

      vec3 col = vec3(0.02, 0.03, 0.06);

      if(field > 1.0) {
        vec3 blobCol = colorWeight / totalWeight;
        // Smooth edge anti-aliasing
        float edge = smoothstep(1.0, 1.2, field);
        // Add inner glow
        float inner = smoothstep(1.0, 5.0, field);
        blobCol = mix(blobCol * 0.6, blobCol * 1.3, inner);
        // Specular highlight
        blobCol += vec3(0.15) * smoothstep(3.0, 8.0, field);
        col = mix(col, blobCol, edge);
      }

      // Subtle outer glow
      float glow = field * 0.04;
      vec3 glowCol = colorWeight / max(totalWeight, 0.001);
      col += glowCol * glow * 0.3;

      col = pow(col, vec3(0.4545));
      gl_FragColor = vec4(col, 1.0);
    }
    `;

    const prog = mkProg(FS);
    gl.useProgram(prog);
    const loc_p = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc_p);
    gl.vertexAttribPointer(loc_p, 2, gl.FLOAT, false, 0, 0);
    const loc_res = gl.getUniformLocation(prog, 'u_res');
    const loc_time = gl.getUniformLocation(prog, 'u_time');

    function frame(t) {
      gl.uniform2f(loc_res, canvas.width, canvas.height);
      gl.uniform1f(loc_time, t * 0.001);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
