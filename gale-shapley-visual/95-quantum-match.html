<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Superposition</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'Nunito',sans-serif; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
.back-link:hover { background:#30363d; }
.info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
.info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
.info p { font-size:12px; color:#8b949e; line-height:1.4; }
.state-label { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); font-family:'Lora',serif; font-size:20px; z-index:50; transition:all 0.5s; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Visual Gallery</a>
<div class="info">
<h2>Quantum Superposition</h2>
<p>Before measurement (before running DA), each man exists in a quantum superposition over all women. Running the algorithm 'collapses the wavefunction' to the stable matching.</p>
</div>
<div class="state-label" id="stateLabel"></div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const stateLabel = document.getElementById('stateLabel');

function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener('resize', resize);

const N = 5;
const menColors = ['#58a6ff','#539bf5','#4d90ea','#478ae0','#4184d5'];
const womenColors = ['#d2a8ff','#c99df5','#c092ea','#b787e0','#ae7cd5'];

// Preferences
let menPrefs, stableMatching;

function shuffle(arr) {
    let a = [...arr];
    for (let i = a.length-1; i > 0; i--) { let j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
}

function generateInstance() {
    menPrefs = [];
    let womenPrefs = [];
    for (let i = 0; i < N; i++) {
        menPrefs.push(shuffle([0,1,2,3,4]));
        womenPrefs.push(shuffle([0,1,2,3,4]));
    }
    // Run Gale-Shapley
    let mp = Array(N).fill(-1), wp = Array(N).fill(-1), mn = Array(N).fill(0);
    let free = [...Array(N).keys()];
    while (free.length) {
        let m = free[0], w = menPrefs[m][mn[m]]; mn[m]++;
        if (wp[w] === -1) { mp[m]=w; wp[w]=m; free.shift(); }
        else { let c=wp[w]; if(womenPrefs[w].indexOf(m)<womenPrefs[w].indexOf(c)){mp[m]=w;wp[w]=m;mp[c]=-1;free.shift();free.push(c);} }
    }
    stableMatching = mp;
}
generateInstance();

// State machine
let phase = 'superposition'; // superposition -> collapsing -> stable -> pause -> superposition
let phaseTime = 0;
let collapseFlashes = [];
let time = 0;

function getNodePositions() {
    const w = canvas.width, h = canvas.height;
    const menX = w * 0.28, womenX = w * 0.72;
    const topY = h * 0.15, botY = h * 0.85;
    const men = [], women = [];
    for (let i = 0; i < N; i++) {
        const t = i / (N - 1);
        men.push({ x: menX, y: topY + t * (botY - topY) });
        women.push({ x: womenX, y: topY + t * (botY - topY) });
    }
    return { men, women };
}

function drawQuantumArrow(x1, y1, x2, y2, alpha, color, wobble) {
    const dx = x2-x1, dy = y2-y1;
    const len = Math.sqrt(dx*dx+dy*dy);
    const nx = -dy/len, ny = dx/len;
    const wobbleAmt = wobble * Math.sin(time * 4 + x1 + y1) * 8;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(
        (x1+x2)/2 + nx*wobbleAmt,
        (y1+y2)/2 + ny*wobbleAmt,
        x2, y2
    );
    ctx.strokeStyle = color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
}

function animate() {
    requestAnimationFrame(animate);
    time += 0.016;
    phaseTime += 0.016;

    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, w, h);

    const pos = getNodePositions();

    // Background particles (quantum uncertainty)
    if (phase === 'superposition') {
        for (let i = 0; i < 60; i++) {
            const px = (Math.sin(time * 0.5 + i * 73.7) * 0.5 + 0.5) * w;
            const py = (Math.cos(time * 0.4 + i * 41.3) * 0.5 + 0.5) * h;
            const s = 1 + Math.sin(time * 2 + i) * 0.5;
            ctx.beginPath();
            ctx.arc(px, py, s, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(88,166,255,${0.05 + Math.sin(time * 3 + i) * 0.03})`;
            ctx.fill();
        }
    }

    // Draw arrows
    if (phase === 'superposition') {
        stateLabel.textContent = '|superposition⟩';
        stateLabel.style.color = '#58a6ff';

        for (let m = 0; m < N; m++) {
            for (let w_idx = 0; w_idx < N; w_idx++) {
                const rank = menPrefs[m].indexOf(w_idx);
                const alpha = 0.08 + (1 - rank/N) * 0.25;
                const wobble = 1;
                const hue = 200 + rank * 15;
                const color = `hsl(${hue}, 70%, 65%)`;
                drawQuantumArrow(pos.men[m].x, pos.men[m].y, pos.women[w_idx].x, pos.women[w_idx].y, alpha, color, wobble);
            }
        }

        if (phaseTime > 4) {
            phase = 'collapsing';
            phaseTime = 0;
            collapseFlashes = [];
            for (let m = 0; m < N; m++) {
                collapseFlashes.push({
                    x: (pos.men[m].x + pos.women[stableMatching[m]].x) / 2,
                    y: (pos.men[m].y + pos.women[stableMatching[m]].y) / 2,
                    radius: 0, maxRadius: 80, delay: m * 0.3
                });
            }
        }
    } else if (phase === 'collapsing') {
        stateLabel.textContent = '⟨ collapsing ⟩';
        stateLabel.style.color = '#e3b341';

        const progress = Math.min(1, phaseTime / 2.5);

        for (let m = 0; m < N; m++) {
            for (let w_idx = 0; w_idx < N; w_idx++) {
                const isMatch = stableMatching[m] === w_idx;
                let alpha;
                if (isMatch) {
                    alpha = 0.3 + progress * 0.7;
                } else {
                    alpha = Math.max(0, 0.2 * (1 - progress * 1.5));
                }
                const color = isMatch ? '#3fb950' : 'rgba(88,166,255,0.5)';
                const wobble = isMatch ? (1 - progress) : 1;
                if (alpha > 0.01) {
                    drawQuantumArrow(pos.men[m].x, pos.men[m].y, pos.women[w_idx].x, pos.women[w_idx].y, alpha, color, wobble);
                }
            }
        }

        // Flash effects
        collapseFlashes.forEach(f => {
            const t = phaseTime - f.delay;
            if (t > 0 && t < 0.8) {
                f.radius = f.maxRadius * (t / 0.8);
                const alpha = Math.max(0, 1 - t / 0.8);
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.6})`;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(f.x, f.y, f.radius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${alpha * 0.15})`;
                ctx.fill();
            }
        });

        if (phaseTime > 3) {
            phase = 'stable';
            phaseTime = 0;
        }
    } else if (phase === 'stable') {
        stateLabel.textContent = '|stable matching⟩';
        stateLabel.style.color = '#3fb950';

        for (let m = 0; m < N; m++) {
            const w_idx = stableMatching[m];
            const pulse = 0.7 + 0.3 * Math.sin(time * 2 + m);
            ctx.beginPath();
            ctx.moveTo(pos.men[m].x, pos.men[m].y);
            const mx = (pos.men[m].x + pos.women[w_idx].x) / 2;
            const my = (pos.men[m].y + pos.women[w_idx].y) / 2 - 10;
            ctx.quadraticCurveTo(mx, my, pos.women[w_idx].x, pos.women[w_idx].y);
            ctx.strokeStyle = '#3fb950';
            ctx.globalAlpha = pulse;
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Glow
            ctx.strokeStyle = 'rgba(63,185,80,0.15)';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(pos.men[m].x, pos.men[m].y);
            ctx.quadraticCurveTo(mx, my, pos.women[w_idx].x, pos.women[w_idx].y);
            ctx.stroke();
        }

        if (phaseTime > 4) {
            phase = 'superposition';
            phaseTime = 0;
            generateInstance();
        }
    }

    // Draw nodes
    for (let i = 0; i < N; i++) {
        const pulse = phase === 'superposition' ? (1 + 0.1 * Math.sin(time * 4 + i)) : 1;
        const r = 18 * pulse;

        // Men
        ctx.beginPath();
        ctx.arc(pos.men[i].x, pos.men[i].y, r, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(pos.men[i].x, pos.men[i].y, 0, pos.men[i].x, pos.men[i].y, r);
        grad.addColorStop(0, menColors[i]);
        grad.addColorStop(1, 'rgba(88,166,255,0.3)');
        ctx.fillStyle = grad;
        ctx.fill();

        // Outer ring
        if (phase === 'superposition') {
            ctx.beginPath();
            ctx.arc(pos.men[i].x, pos.men[i].y, r + 5 + Math.sin(time*3+i)*3, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(88,166,255,0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        ctx.fillStyle = '#fff';
        ctx.font = '600 11px Nunito';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('M' + (i+1), pos.men[i].x, pos.men[i].y);

        // Women
        ctx.beginPath();
        ctx.arc(pos.women[i].x, pos.women[i].y, r, 0, Math.PI * 2);
        const grad2 = ctx.createRadialGradient(pos.women[i].x, pos.women[i].y, 0, pos.women[i].x, pos.women[i].y, r);
        grad2.addColorStop(0, womenColors[i]);
        grad2.addColorStop(1, 'rgba(210,168,255,0.3)');
        ctx.fillStyle = grad2;
        ctx.fill();

        if (phase === 'superposition') {
            ctx.beginPath();
            ctx.arc(pos.women[i].x, pos.women[i].y, r + 5 + Math.sin(time*3+i+2)*3, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(210,168,255,0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        ctx.fillStyle = '#fff';
        ctx.fillText('W' + (i+1), pos.women[i].x, pos.women[i].y);
    }
}

animate();
</script>
</body>
</html>
