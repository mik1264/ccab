<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hyperbolic Preference Geometry — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Hyperbolic Preference Geometry</h2><p>In the Poincaré disk model of hyperbolic geometry, matching relationships are geodesics. The stable matching appears as the shortest hyperbolic paths.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    let t = 0;
    const N = 5;
    const men = [], women = [];
    const stableMatch = [0,1,2,3,4];

    // Place agents inside the Poincaré disk
    function initAgents() {
      for (let i = 0; i < N; i++) {
        const angle = (i / N) * Math.PI * 2 - Math.PI / 2;
        const r = 0.45 + 0.15 * Math.sin(i * 1.3);
        men.push({ x: r * Math.cos(angle), y: r * Math.sin(angle), angle, r, phase: i * 0.7 });
        const angle2 = ((i + 0.5) / N) * Math.PI * 2 + Math.PI / 2;
        const r2 = 0.35 + 0.2 * Math.cos(i * 1.7);
        women.push({ x: r2 * Math.cos(angle2), y: r2 * Math.sin(angle2), angle: angle2, r: r2, phase: i * 0.9 + 1 });
      }
    }
    initAgents();

    // Poincaré disk geodesic: given two points inside unit disk, compute the arc
    function hyperbolicGeodesic(ax, ay, bx, by) {
      // If nearly collinear with origin, draw a straight line
      const cross = ax * by - ay * bx;
      if (Math.abs(cross) < 0.001) {
        return { type: 'line', ax, ay, bx, by };
      }
      // Find the circle orthogonal to the unit circle passing through A and B
      // The center of the geodesic arc is at the intersection of:
      // perpendicular bisector of AB and the polar line
      const dA = ax * ax + ay * ay;
      const dB = bx * bx + by * by;
      const det = 2 * (ax * by - ay * bx);
      const cx = (by * (dA - 1) - ay * (dB - 1)) / det;
      const cy = (ax * (dB - 1) - bx * (dA - 1)) / det;
      // Intentionally using the inversion: center of orthogonal circle
      // Actually use a cleaner formula
      const ox = ((dA + 1) * by - (dB + 1) * ay) / (2 * cross);
      const oy = ((dB + 1) * ax - (dA + 1) * bx) / (2 * cross);
      const r = Math.sqrt((ax - ox) * (ax - ox) + (ay - oy) * (ay - oy));
      const startAngle = Math.atan2(ay - oy, ax - ox);
      const endAngle = Math.atan2(by - oy, bx - ox);
      return { type: 'arc', ox, oy, r, startAngle, endAngle };
    }

    function drawArc(cx, cy, diskR, geo, color, width) {
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      if (geo.type === 'line') {
        ctx.moveTo(cx + geo.ax * diskR, cy + geo.ay * diskR);
        ctx.lineTo(cx + geo.bx * diskR, cy + geo.by * diskR);
      } else {
        const { ox, oy, r, startAngle, endAngle } = geo;
        // Determine correct arc direction
        let diff = endAngle - startAngle;
        while (diff > Math.PI) diff -= 2 * Math.PI;
        while (diff < -Math.PI) diff += 2 * Math.PI;
        const ccw = diff < 0;
        ctx.arc(cx + ox * diskR, cy + oy * diskR, r * diskR, startAngle, endAngle, ccw);
      }
      ctx.stroke();
    }

    // Draw hyperbolic grid lines (concentric horocycles and radial geodesics)
    function drawGrid(cx, cy, diskR) {
      ctx.globalAlpha = 0.08;
      ctx.strokeStyle = '#1e3a5f';
      ctx.lineWidth = 1;
      // Concentric circles (horocycles approximation)
      for (let i = 1; i <= 8; i++) {
        const r = (i / 9) * diskR;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
      }
      // Radial lines (geodesics through origin = straight lines)
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2 + t * 0.02;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(angle) * diskR, cy + Math.sin(angle) * diskR);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    function updatePositions() {
      for (let i = 0; i < N; i++) {
        const m = men[i];
        const drift = 0.003;
        m.angle += drift * Math.sin(t * 0.5 + m.phase);
        m.r = 0.45 + 0.15 * Math.sin(t * 0.3 + m.phase);
        m.r = Math.max(0.1, Math.min(0.75, m.r));
        m.x = m.r * Math.cos(m.angle);
        m.y = m.r * Math.sin(m.angle);

        const w = women[i];
        w.angle += drift * Math.cos(t * 0.4 + w.phase);
        w.r = 0.35 + 0.2 * Math.cos(t * 0.35 + w.phase);
        w.r = Math.max(0.1, Math.min(0.75, w.r));
        w.x = w.r * Math.cos(w.angle);
        w.y = w.r * Math.sin(w.angle);
      }
    }

    function draw() {
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const diskR = Math.min(canvas.width, canvas.height) * 0.42;

      updatePositions();

      // Disk boundary glow
      for (let g = 3; g >= 0; g--) {
        ctx.beginPath();
        ctx.arc(cx, cy, diskR + g * 3, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(88,166,255,${0.05 + g * 0.03})`;
        ctx.lineWidth = 2 + g * 2;
        ctx.stroke();
      }

      // Disk fill
      ctx.beginPath();
      ctx.arc(cx, cy, diskR, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(13,17,23,0.95)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(88,166,255,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, diskR, 0, Math.PI * 2);
      ctx.clip();

      drawGrid(cx, cy, diskR);

      // Draw all preference arcs (non-matching) dimly
      ctx.globalAlpha = 0.06;
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          if (stableMatch[i] === j) continue;
          const geo = hyperbolicGeodesic(men[i].x, men[i].y, women[j].x, women[j].y);
          drawArc(cx, cy, diskR, geo, '#30363d', 1);
        }
      }
      ctx.globalAlpha = 1;

      // Draw stable matching geodesics in gold
      for (let i = 0; i < N; i++) {
        const j = stableMatch[i];
        const geo = hyperbolicGeodesic(men[i].x, men[i].y, women[j].x, women[j].y);
        // Glow
        ctx.globalAlpha = 0.3;
        drawArc(cx, cy, diskR, geo, '#ffd700', 6);
        ctx.globalAlpha = 0.6;
        drawArc(cx, cy, diskR, geo, '#ffd700', 3);
        ctx.globalAlpha = 1;
        drawArc(cx, cy, diskR, geo, '#ffd700', 1.5);
      }

      // Draw agent points
      for (let i = 0; i < N; i++) {
        // Men (blue)
        const mx = cx + men[i].x * diskR;
        const my = cy + men[i].y * diskR;
        ctx.beginPath();
        ctx.arc(mx, my, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#58a6ff';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(mx, my, 10, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(88,166,255,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Women (purple)
        const wx = cx + women[i].x * diskR;
        const wy = cy + women[i].y * diskR;
        ctx.beginPath();
        ctx.arc(wx, wy, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#bc8cff';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(wx, wy, 10, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(188,140,255,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      ctx.restore();
    }

    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      draw();
    }
    animate();
  </script>
</body>
</html>
