<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phyllotaxis Preference Spiral — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Phyllotaxis Preference Spiral</h2><p>Seeds arranged in a phyllotaxis (sunflower) spiral — the golden angle. Agents are placed according to their preference rank; matched pairs cluster together.</p></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let dots = [];
    let totalDots = 200;
    let currentDot = 0;
    let goldenAngle = 137.508; // degrees
    let matchedPairs = [];
    let pairColors;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);

      pairColors = [
        [345, 80, 95],  // warm rose
        [200, 85, 95],  // sky blue
        [150, 70, 85],  // teal
        [30, 90, 100],  // golden
        [270, 70, 90]   // lavender
      ];

      // Assign dots: alternate men (even) and women (odd) in the spiral
      // Matched pairs placed at adjacent indices
      let scale = min(width, height) * 0.032;

      for (let i = 0; i < totalDots; i++) {
        let pairIdx = floor(i / 2) % 5;
        let isMan = i % 2 === 0;
        // Rank adjustment: top-ranked pairs cluster tighter
        let rankAdj = 1 + (pairIdx * 0.03);
        let angle = radians(i * goldenAngle * rankAdj);
        let r = sqrt(i) * scale;

        dots.push({
          x: cos(angle) * r,
          y: sin(angle) * r,
          isMan: isMan,
          pairIdx: pairIdx,
          idx: i,
          finalSize: map(1 / (pairIdx + 1), 0, 1, 4, 12),
          currentSize: 0,
          born: false,
          birthFrame: 0
        });
      }

      // Record matched pair connections (adjacent dots)
      for (let i = 0; i < totalDots - 1; i += 2) {
        matchedPairs.push([i, i + 1]);
      }
    }

    function draw() {
      background(13, 17, 23);
      translate(width / 2, height / 2);

      // Slowly spawn new dots
      if (currentDot < totalDots && frameCount % 1 === 0) {
        dots[currentDot].born = true;
        dots[currentDot].birthFrame = frameCount;
        currentDot++;
        if (currentDot < totalDots) {
          dots[currentDot].born = true;
          dots[currentDot].birthFrame = frameCount;
          currentDot++;
        }
      }

      // Draw connections between matched pairs (gold lines)
      for (let pair of matchedPairs) {
        let a = dots[pair[0]];
        let b = dots[pair[1]];
        if (a.born && b.born) {
          let age = min(frameCount - max(a.birthFrame, b.birthFrame), 60);
          let alpha = map(age, 0, 60, 0, 35);
          stroke(45, 70, 100, alpha);
          strokeWeight(0.8);
          line(a.x, a.y, b.x, b.y);
        }
      }

      // Draw dots
      noStroke();
      for (let d of dots) {
        if (!d.born) continue;

        let age = frameCount - d.birthFrame;
        // Grow in animation
        d.currentSize = lerp(d.currentSize, d.finalSize, 0.08);

        let pc = pairColors[d.pairIdx];
        let hue = d.isMan ? pc[0] : (pc[0] + 30) % 360;
        let sat = pc[1];
        let bri = pc[2];

        // Subtle pulse
        let pulse = 1 + sin(frameCount * 0.04 + d.idx * 0.5) * 0.1;
        let sz = d.currentSize * pulse;

        // Glow
        fill(hue, sat, bri, 15);
        ellipse(d.x, d.y, sz * 3, sz * 3);

        // Main dot
        fill(hue, sat, bri, 85);
        ellipse(d.x, d.y, sz, sz);

        // Bright center
        fill(hue, sat * 0.3, 100, 60);
        ellipse(d.x, d.y, sz * 0.4, sz * 0.4);
      }

      // Draw agent labels near the center pairs
      textFont('Nunito');
      textSize(9);
      textAlign(CENTER, CENTER);
      for (let i = 0; i < min(currentDot, 10); i++) {
        let d = dots[i];
        if (!d.born) continue;
        let label = d.isMan ? 'M' + (d.pairIdx + 1) : 'W' + (d.pairIdx + 1);
        fill(0, 0, 100, 70);
        noStroke();
        text(label, d.x, d.y + d.currentSize + 8);
      }

      // Outer decorative ring
      noFill();
      stroke(45, 40, 60, 15);
      strokeWeight(0.5);
      let maxR = sqrt(totalDots) * min(width, height) * 0.032 + 20;
      ellipse(0, 0, maxR * 2, maxR * 2);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
