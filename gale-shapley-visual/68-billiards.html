<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matching Billiards — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Matching Billiards</h2><p>Billiard balls represent agents. When a man ball collides with his top-choice woman ball and both agree, they pocket together. The billiard table shows the preference geometry.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const N = 5;
    const manColors = ['#58a6ff','#3b82f6','#60a5fa','#93c5fd','#2563eb'];
    const womanColors = ['#c084fc','#a855f7','#9333ea','#7c3aed','#6d28d9'];
    const matching = [0,1,2,3,4];

    // Table dimensions
    let tableX, tableY, tableW, tableH, cushion;
    const ballR = 14;

    function calcTable() {
      const w = canvas.width, h = canvas.height;
      const margin = 60;
      const aspect = 2;
      tableW = Math.min(w - margin*2, (h - margin*2) * aspect);
      tableH = tableW / aspect;
      tableX = (w - tableW) / 2;
      tableY = (h - tableH) / 2;
      cushion = 20;
    }

    class Ball {
      constructor(x, y, type, index) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 5;
        this.vy = (Math.random() - 0.5) * 5;
        this.type = type;
        this.index = index;
        this.r = ballR;
        this.pocketed = false;
        this.pocketAnim = 0;
        this.pocketX = 0;
        this.pocketY = 0;
      }
    }

    // Pockets at 6 standard positions
    let pockets = [];
    let balls = [];
    let matchedPairs = new Set();

    function init() {
      calcTable();
      balls = [];
      matchedPairs = new Set();
      pockets = [
        { x: tableX + cushion, y: tableY + cushion },
        { x: tableX + tableW/2, y: tableY + cushion - 5 },
        { x: tableX + tableW - cushion, y: tableY + cushion },
        { x: tableX + cushion, y: tableY + tableH - cushion },
        { x: tableX + tableW/2, y: tableY + tableH - cushion + 5 },
        { x: tableX + tableW - cushion, y: tableY + tableH - cushion }
      ];

      const playX = tableX + cushion + ballR;
      const playW = tableW - cushion*2 - ballR*2;
      const playY = tableY + cushion + ballR;
      const playH = tableH - cushion*2 - ballR*2;

      for (let i = 0; i < N; i++) {
        balls.push(new Ball(
          playX + playW * 0.2 + Math.random() * playW * 0.2,
          playY + playH * (0.1 + 0.8 * i / (N-1)),
          'man', i
        ));
        balls.push(new Ball(
          playX + playW * 0.6 + Math.random() * playW * 0.2,
          playY + playH * (0.1 + 0.8 * i / (N-1)),
          'woman', i
        ));
      }

      // Give initial velocities
      for (const b of balls) {
        b.vx = (Math.random() - 0.5) * 8;
        b.vy = (Math.random() - 0.5) * 8;
      }
    }

    init();
    window.addEventListener('resize', () => { resize(); init(); });

    const friction = 0.998;
    const minSpeed = 0.02;

    let t = 0, dt = 1/60;
    function loop() {
      requestAnimationFrame(loop);
      t += dt;
      update();
      render();
    }

    function update() {
      const left = tableX + cushion + ballR;
      const right = tableX + tableW - cushion - ballR;
      const top = tableY + cushion + ballR;
      const bottom = tableY + tableH - cushion - ballR;

      for (const b of balls) {
        if (b.pocketed) {
          b.pocketAnim = Math.min(1, b.pocketAnim + 0.03);
          continue;
        }

        // Apply random gentle kicks to keep things moving
        if (Math.abs(b.vx) + Math.abs(b.vy) < 1 && Math.random() < 0.01) {
          b.vx += (Math.random() - 0.5) * 4;
          b.vy += (Math.random() - 0.5) * 4;
        }

        b.x += b.vx;
        b.y += b.vy;
        b.vx *= friction;
        b.vy *= friction;

        // Cushion bounce
        if (b.x < left) { b.x = left; b.vx = Math.abs(b.vx) * 0.85; }
        if (b.x > right) { b.x = right; b.vx = -Math.abs(b.vx) * 0.85; }
        if (b.y < top) { b.y = top; b.vy = Math.abs(b.vy) * 0.85; }
        if (b.y > bottom) { b.y = bottom; b.vy = -Math.abs(b.vy) * 0.85; }
      }

      // Ball-ball collisions
      for (let i = 0; i < balls.length; i++) {
        if (balls[i].pocketed) continue;
        for (let j = i+1; j < balls.length; j++) {
          if (balls[j].pocketed) continue;
          const a = balls[i], b = balls[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const minD = a.r + b.r;
          if (dist < minD && dist > 0) {
            // Elastic collision
            const nx = dx/dist, ny = dy/dist;
            const overlap = minD - dist;
            a.x -= nx * overlap * 0.5;
            a.y -= ny * overlap * 0.5;
            b.x += nx * overlap * 0.5;
            b.y += ny * overlap * 0.5;

            const dvx = b.vx - a.vx, dvy = b.vy - a.vy;
            const dvn = dvx * nx + dvy * ny;
            if (dvn < 0) {
              a.vx += dvn * nx;
              a.vy += dvn * ny;
              b.vx -= dvn * nx;
              b.vy -= dvn * ny;
            }

            // Check if this is a matching collision
            if (a.type !== b.type) {
              const man = a.type === 'man' ? a : b;
              const woman = a.type === 'woman' ? a : b;
              if (matching[man.index] === woman.index && !matchedPairs.has(man.index)) {
                // Match! Slow down and drift to nearest pocket
                matchedPairs.add(man.index);
                const nearestPocket = pockets.reduce((best, p) => {
                  const pd = Math.hypot(p.x - man.x, p.y - man.y);
                  return pd < best.d ? { p, d: pd } : best;
                }, { p: pockets[0], d: Infinity }).p;

                man.pocketed = true;
                woman.pocketed = true;
                man.pocketX = nearestPocket.x;
                man.pocketY = nearestPocket.y;
                woman.pocketX = nearestPocket.x;
                woman.pocketY = nearestPocket.y;
              }
            }
          }
        }
      }

      // Animate pocketed balls
      for (const b of balls) {
        if (b.pocketed && b.pocketAnim < 1) {
          b.x += (b.pocketX - b.x) * 0.08;
          b.y += (b.pocketY - b.y) * 0.08;
          b.r = ballR * (1 - b.pocketAnim * 0.5);
        }
      }
    }

    function render() {
      const w = canvas.width, h = canvas.height;
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, w, h);

      // Table outer frame
      ctx.fillStyle = '#3d2b1f';
      ctx.beginPath();
      ctx.roundRect(tableX - 15, tableY - 15, tableW + 30, tableH + 30, 12);
      ctx.fill();

      // Table felt
      const feltGrad = ctx.createLinearGradient(tableX, tableY, tableX + tableW, tableY + tableH);
      feltGrad.addColorStop(0, '#1a472a');
      feltGrad.addColorStop(0.5, '#1e5631');
      feltGrad.addColorStop(1, '#1a472a');
      ctx.fillStyle = feltGrad;
      ctx.fillRect(tableX, tableY, tableW, tableH);

      // Cushions
      ctx.fillStyle = '#2d6a3f';
      ctx.fillRect(tableX, tableY, tableW, cushion);
      ctx.fillRect(tableX, tableY + tableH - cushion, tableW, cushion);
      ctx.fillRect(tableX, tableY, cushion, tableH);
      ctx.fillRect(tableX + tableW - cushion, tableY, cushion, tableH);

      // Pockets
      for (const p of pockets) {
        const isGlowing = balls.some(b => b.pocketed && Math.hypot(b.pocketX - p.x, b.pocketY - p.y) < 5);
        ctx.beginPath();
        ctx.arc(p.x, p.y, 18, 0, Math.PI * 2);
        ctx.fillStyle = isGlowing ? '#ffd70040' : '#0a0a0a';
        ctx.fill();
        if (isGlowing) {
          ctx.shadowColor = '#ffd700';
          ctx.shadowBlur = 15;
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }

      // Draw balls
      for (const b of balls) {
        if (b.pocketed && b.pocketAnim >= 1) continue;

        const isMan = b.type === 'man';
        const color = isMan ? manColors[b.index] : womanColors[b.index];
        const alpha = b.pocketed ? 1 - b.pocketAnim : 1;

        ctx.globalAlpha = alpha;

        // Shadow
        ctx.beginPath();
        ctx.ellipse(b.x + 2, b.y + 3, b.r * 0.9, b.r * 0.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fill();

        // Ball body
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(b.x - b.r*0.3, b.y - b.r*0.3, b.r*0.1, b.x, b.y, b.r);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.3, color);
        grad.addColorStop(1, '#000000');
        ctx.fillStyle = grad;
        ctx.fill();

        // Specular highlight
        ctx.beginPath();
        ctx.ellipse(b.x - b.r*0.25, b.y - b.r*0.3, b.r*0.2, b.r*0.12, -0.5, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fill();

        // Label
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 9px Nunito';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(isMan ? 'M'+(b.index+1) : 'W'+(b.index+1), b.x, b.y);

        ctx.globalAlpha = 1;
      }

      // Score
      ctx.fillStyle = '#8b949e';
      ctx.font = '500 12px Nunito';
      ctx.textAlign = 'center';
      ctx.fillText(`Matched pairs pocketed: ${matchedPairs.size} / ${N}`, w/2, tableY - 25);
    }

    loop();
  </script>
</body>
</html>
