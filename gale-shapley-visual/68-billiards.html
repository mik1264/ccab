<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billiards Match — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background: #30363d; }
    .info { position:fixed;top:60px;left:16px;background:rgba(13,17,23,0.88);border:1px solid #30363d;border-radius:10px;padding:12px 16px;z-index:50;max-width:280px;backdrop-filter:blur(8px) }
    .info h2 { font-size:15px;color:#58a6ff;margin-bottom:4px }
    .info p { font-size:12px;color:#8b949e;line-height:1.4 }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div class="info">
    <h2>Billiards Match</h2>
    <p>Blue student balls and red school balls bounce around. Collisions trigger proposals — accepted matches form golden tethers. Higher-ranked rivals can steal matches.</p>
  </div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const N = 8;
    const R = 18;
    const FRICTION = 0.997;
    const TETHER_REST = 50;
    const TETHER_K = 0.0008;
    let W, H;

    let balls = []; // {x, y, vx, vy, type:'s'|'c', idx, matched:-1}
    let tethers = []; // {si, ci}
    let studentPrefs = [], schoolPrefs = [];
    let sparks = [];
    let stableReached = false;

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function init() {
      studentPrefs = []; schoolPrefs = [];
      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffle([...Array(N).keys()]));
        schoolPrefs.push(shuffle([...Array(N).keys()]));
      }
      balls = [];
      tethers = [];
      sparks = [];
      stableReached = false;

      for (let i = 0; i < N; i++) {
        balls.push({
          x: 80 + Math.random() * (W / 2 - 160),
          y: 80 + Math.random() * (H - 160),
          vx: (Math.random() - 0.5) * 3,
          vy: (Math.random() - 0.5) * 3,
          type: 's', idx: i, matched: -1
        });
      }
      for (let i = 0; i < N; i++) {
        balls.push({
          x: W / 2 + 80 + Math.random() * (W / 2 - 160),
          y: 80 + Math.random() * (H - 160),
          vx: (Math.random() - 0.5) * 3,
          vy: (Math.random() - 0.5) * 3,
          type: 'c', idx: i, matched: -1
        });
      }
    }

    function ballStudent(i) { return balls[i]; }
    function ballSchool(i) { return balls[N + i]; }

    function handleCollision(a, b) {
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < R * 2 && d > 0) {
        // Elastic bounce
        const nx = dx / d, ny = dy / d;
        const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
        const dvn = dvx * nx + dvy * ny;
        if (dvn > 0) {
          a.vx -= dvn * nx;
          a.vy -= dvn * ny;
          b.vx += dvn * nx;
          b.vy += dvn * ny;
        }
        // Separate
        const overlap = R * 2 - d;
        a.x -= nx * overlap * 0.5;
        a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5;
        b.y += ny * overlap * 0.5;

        // Matching logic: if student hits school
        if (a.type === 's' && b.type === 'c') tryMatch(a.idx, b.idx);
        else if (b.type === 's' && a.type === 'c') tryMatch(b.idx, a.idx);

        // Spark
        sparks.push({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2, life: 1 });
      }
    }

    function tryMatch(si, ci) {
      const sb = ballStudent(si), cb = ballSchool(ci);
      const rank = studentPrefs[si].indexOf(ci);
      if (rank > 4) return; // Only consider top preferences

      if (cb.matched === -1) {
        // Unmatched school — accept
        sb.matched = ci;
        cb.matched = si;
        tethers.push({ si, ci });
      } else {
        // School already matched — check if challenger is preferred
        const curStudent = cb.matched;
        const schoolRanking = schoolPrefs[ci];
        if (schoolRanking.indexOf(si) < schoolRanking.indexOf(curStudent)) {
          // New student wins
          const oldSB = ballStudent(curStudent);
          oldSB.matched = -1;
          tethers = tethers.filter(t => !(t.si === curStudent && t.ci === ci));
          sb.matched = ci;
          cb.matched = si;
          tethers.push({ si, ci });
          // Break spark
          sparks.push({ x: oldSB.x, y: oldSB.y, life: 1 });
        }
      }
    }

    function applyTetherForces() {
      for (const t of tethers) {
        const sb = ballStudent(t.si), cb = ballSchool(t.ci);
        const dx = cb.x - sb.x, dy = cb.y - sb.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > TETHER_REST) {
          const force = (d - TETHER_REST) * TETHER_K;
          const nx = dx / d, ny = dy / d;
          sb.vx += nx * force;
          sb.vy += ny * force;
          cb.vx -= nx * force;
          cb.vy -= ny * force;
        }
      }
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      init();
    }

    const t0 = performance.now();

    function animate() {
      const t = (performance.now() - t0) / 1000;

      // Apply tether forces
      applyTetherForces();

      // Update positions
      for (const b of balls) {
        b.x += b.vx;
        b.y += b.vy;
        b.vx *= FRICTION;
        b.vy *= FRICTION;

        // Add slight random push to keep things moving
        b.vx += (Math.random() - 0.5) * 0.08;
        b.vy += (Math.random() - 0.5) * 0.08;

        // Wall bounce
        if (b.x < R) { b.x = R; b.vx = Math.abs(b.vx) * 0.9; }
        if (b.x > W - R) { b.x = W - R; b.vx = -Math.abs(b.vx) * 0.9; }
        if (b.y < R) { b.y = R; b.vy = Math.abs(b.vy) * 0.9; }
        if (b.y > H - R) { b.y = H - R; b.vy = -Math.abs(b.vy) * 0.9; }
      }

      // Collisions
      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          handleCollision(balls[i], balls[j]);
        }
      }

      // Check stability
      const matchCount = balls.filter(b => b.type === 's' && b.matched !== -1).length;
      if (matchCount === N && !stableReached) stableReached = true;

      // Update sparks
      for (const sp of sparks) sp.life -= 0.03;
      sparks = sparks.filter(sp => sp.life > 0);

      // Draw
      ctx.fillStyle = 'rgba(13,17,23,0.35)';
      ctx.fillRect(0, 0, W, H);

      // Table cushion lines
      ctx.strokeStyle = 'rgba(63,185,80,0.12)';
      ctx.lineWidth = 3;
      ctx.strokeRect(10, 10, W - 20, H - 20);

      // Tethers
      for (const t of tethers) {
        const sb = ballStudent(t.si), cb = ballSchool(t.ci);
        const pulse = 0.5 + 0.4 * Math.sin(t.si + t0 / 300 + performance.now() / 500);
        ctx.save();
        ctx.strokeStyle = `rgba(255,200,60,${pulse})`;
        ctx.lineWidth = 2.5;
        ctx.shadowColor = '#ffc83c';
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.moveTo(sb.x, sb.y);
        ctx.lineTo(cb.x, cb.y);
        ctx.stroke();
        ctx.restore();
      }

      // Sparks
      for (const sp of sparks) {
        ctx.fillStyle = `rgba(255,220,100,${sp.life})`;
        for (let i = 0; i < 4; i++) {
          const a = Math.random() * Math.PI * 2;
          const r = (1 - sp.life) * 20;
          ctx.beginPath();
          ctx.arc(sp.x + Math.cos(a) * r, sp.y + Math.sin(a) * r, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Balls
      for (const b of balls) {
        const isStudent = b.type === 's';
        const baseColor = isStudent ? '#58a6ff' : '#f85149';
        const matched = b.matched !== -1;

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(b.x + 3, b.y + 3, R, R * 0.7, 0, 0, Math.PI * 2);
        ctx.fill();

        // Ball gradient
        const grad = ctx.createRadialGradient(b.x - 4, b.y - 4, 2, b.x, b.y, R);
        grad.addColorStop(0, matched ? '#ffe066' : (isStudent ? '#79bbff' : '#ff8882'));
        grad.addColorStop(1, matched ? '#c89b20' : baseColor);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(b.x, b.y, R, 0, Math.PI * 2);
        ctx.fill();

        // Specular
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.beginPath();
        ctx.arc(b.x - 4, b.y - 5, 5, 0, Math.PI * 2);
        ctx.fill();

        // Label
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText((isStudent ? 'S' : 'C') + (b.idx + 1), b.x, b.y);
      }

      // Status
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = '#8b949e';
      ctx.font = '12px "Segoe UI", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(stableReached ? 'Stable: YES — ' + matchCount + ' pairs' : 'Matching... ' + matchCount + '/' + N + ' | Stable: NO', W - 20, H - 16);

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    animate();
  </script>
</body>
</html>
