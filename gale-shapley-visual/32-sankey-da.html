<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sankey Flow of Proposals — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; overflow:hidden; font-family:'Nunito',sans-serif; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
    svg text { font-family:'Nunito',sans-serif; }
    #viz { width:100vw; height:100vh; }
    .round-label { position:fixed; top:16px; right:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:10px 16px; z-index:50; font-family:'JetBrains Mono',monospace; font-size:14px; color:#58a6ff; backdrop-filter:blur(8px); }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Sankey Flow of Proposals</h2><p>A Sankey diagram shows proposal flow: each round, men send flow to their chosen women. Flow accumulates at the winning recipient.</p></div>
  <div class="round-label" id="roundLabel">Round 0 / 3</div>
  <div id="viz"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select('#viz').append('svg').attr('width', W).attr('height', H);

    const menPrefs = {
      m1: ['w3','w1','w2','w4','w5'],
      m2: ['w1','w2','w3','w5','w4'],
      m3: ['w2','w3','w1','w4','w5'],
      m4: ['w3','w4','w1','w2','w5'],
      m5: ['w4','w5','w3','w1','w2']
    };
    const womenPrefs = {
      w1: ['m2','m1','m3','m4','m5'],
      w2: ['m3','m2','m1','m4','m5'],
      w3: ['m1','m3','m4','m2','m5'],
      w4: ['m4','m3','m5','m1','m2'],
      w5: ['m5','m4','m3','m2','m1']
    };

    // Run DA algorithm and record rounds
    function runDA() {
      const rounds = [];
      const free = new Set(['m1','m2','m3','m4','m5']);
      const proposals = { m1:0, m2:0, m3:0, m4:0, m5:0 };
      const matched = {};

      while (free.size > 0) {
        const roundData = [];
        const toProcess = [...free];
        for (const m of toProcess) {
          const w = menPrefs[m][proposals[m]];
          proposals[m]++;
          const currentM = matched[w];
          const wPref = womenPrefs[w];
          let accepted = false;
          if (!currentM) {
            matched[w] = m;
            free.delete(m);
            accepted = true;
          } else if (wPref.indexOf(m) < wPref.indexOf(currentM)) {
            matched[w] = m;
            free.delete(m);
            free.add(currentM);
            accepted = true;
          }
          roundData.push({ man: m, woman: w, accepted });
        }
        rounds.push(roundData);
      }
      return rounds;
    }

    const rounds = runDA();
    const men = ['m1','m2','m3','m4','m5'];
    const women = ['w1','w2','w3','w4','w5'];
    const manColors = { m1:'#58a6ff', m2:'#3fb950', m3:'#d2a8ff', m4:'#f0883e', m5:'#f778ba' };

    const margin = { left: 120, right: 120, top: 80, bottom: 40 };
    const colWidth = (W - margin.left - margin.right) / (rounds.length + 1);

    // Y positions for men and women
    const menY = {};
    const womenY = {};
    const yStart = margin.top + 40;
    const ySpacing = (H - yStart - margin.bottom) / 6;
    men.forEach((m, i) => { menY[m] = yStart + (i + 0.5) * ySpacing; });
    women.forEach((w, i) => { womenY[w] = yStart + (i + 0.5) * ySpacing; });

    // Draw column labels
    const g = svg.append('g');

    g.append('text').attr('x', margin.left).attr('y', yStart - 20)
      .attr('text-anchor', 'middle').attr('fill', '#484f58').attr('font-size', 12).attr('font-weight', 600).text('Men');
    g.append('text').attr('x', W - margin.right).attr('y', yStart - 20)
      .attr('text-anchor', 'middle').attr('fill', '#484f58').attr('font-size', 12).attr('font-weight', 600).text('Women');

    rounds.forEach((r, i) => {
      g.append('text')
        .attr('x', margin.left + (i + 1) * colWidth).attr('y', yStart - 20)
        .attr('text-anchor', 'middle').attr('fill', '#484f58').attr('font-size', 11).text(`Round ${i+1}`);
    });

    // Draw men labels
    men.forEach(m => {
      g.append('circle').attr('cx', margin.left).attr('cy', menY[m]).attr('r', 16)
        .attr('fill', '#0d1117').attr('stroke', manColors[m]).attr('stroke-width', 2);
      g.append('text').attr('x', margin.left).attr('y', menY[m] + 1)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('fill', manColors[m]).attr('font-size', 12).attr('font-weight', 600).text(m);
    });

    // Draw women labels
    women.forEach(w => {
      g.append('circle').attr('cx', W - margin.right).attr('cy', womenY[w]).attr('r', 16)
        .attr('fill', '#0d1117').attr('stroke', '#d2a8ff').attr('stroke-width', 2);
      g.append('text').attr('x', W - margin.right).attr('y', womenY[w] + 1)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('fill', '#d2a8ff').attr('font-size', 12).attr('font-weight', 600).text(w);
    });

    // Animate rounds
    const flowGroup = svg.append('g');

    function drawRound(rIdx) {
      if (rIdx >= rounds.length) {
        drawFinalMatching();
        return;
      }
      document.getElementById('roundLabel').textContent = `Round ${rIdx + 1} / ${rounds.length}`;

      const roundData = rounds[rIdx];
      const x1 = margin.left + rIdx * colWidth + 20;
      const x2 = margin.left + (rIdx + 1) * colWidth;
      const xMid = (x1 + x2) / 2;

      roundData.forEach((d, i) => {
        const fromY = menY[d.man];
        const toY = womenY[d.woman];
        const midY = (fromY + toY) / 2;

        const path = flowGroup.append('path')
          .attr('d', `M${x1},${fromY} C${xMid},${fromY} ${xMid},${toY} ${x2},${toY}`)
          .attr('fill', 'none')
          .attr('stroke', d.accepted ? manColors[d.man] : '#f85149')
          .attr('stroke-width', d.accepted ? 4 : 2)
          .attr('stroke-dasharray', d.accepted ? 'none' : '6,4')
          .attr('opacity', 0);

        path.transition()
          .delay(i * 300)
          .duration(600)
          .ease(d3.easeCubicOut)
          .attr('opacity', d.accepted ? 0.7 : 0.3);
      });

      setTimeout(() => drawRound(rIdx + 1), roundData.length * 300 + 800);
    }

    function drawFinalMatching() {
      document.getElementById('roundLabel').textContent = 'Final Matching';
      const finalMatch = { m1:'w3', m2:'w1', m3:'w2', m4:'w4', m5:'w5' };
      const lastX = margin.left + rounds.length * colWidth;

      Object.entries(finalMatch).forEach(([m, w], i) => {
        flowGroup.append('path')
          .attr('d', `M${lastX},${womenY[w]} C${lastX + colWidth * 0.5},${womenY[w]} ${lastX + colWidth * 0.5},${womenY[w]} ${W - margin.right},${womenY[w]}`)
          .attr('fill', 'none')
          .attr('stroke', manColors[m])
          .attr('stroke-width', 5)
          .attr('opacity', 0)
          .transition()
          .delay(i * 200)
          .duration(500)
          .attr('opacity', 0.9);
      });
    }

    setTimeout(() => drawRound(0), 1000);
  </script>
</body>
</html>
