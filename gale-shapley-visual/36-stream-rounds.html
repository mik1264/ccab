<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Streamgraph Proposal Rounds — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; overflow:hidden; font-family:'Nunito',sans-serif; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
    svg text { font-family:'Nunito',sans-serif; }
    #viz { width:100vw; height:100vh; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Streamgraph Proposal Rounds</h2><p>A streamgraph shows how proposal attention flows each round — which women receive proposals and from how many men.</p></div>
  <div id="viz"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select('#viz').append('svg').attr('width', W).attr('height', H);

    const menPrefs = {
      m1: ['w3','w1','w2','w4','w5'],
      m2: ['w1','w2','w3','w5','w4'],
      m3: ['w2','w3','w1','w4','w5'],
      m4: ['w3','w4','w1','w2','w5'],
      m5: ['w4','w5','w3','w1','w2']
    };
    const womenPrefs = {
      w1: ['m2','m1','m3','m4','m5'],
      w2: ['m3','m2','m1','m4','m5'],
      w3: ['m1','m3','m4','m2','m5'],
      w4: ['m4','m3','m5','m1','m2'],
      w5: ['m5','m4','m3','m2','m1']
    };

    const women = ['w1','w2','w3','w4','w5'];
    const womanColors = { w1:'#58a6ff', w2:'#3fb950', w3:'#d2a8ff', w4:'#f0883e', w5:'#f778ba' };

    // Run DA to get proposals per round per woman
    function runDA() {
      const roundData = [];
      const free = new Set(['m1','m2','m3','m4','m5']);
      const nextProp = { m1:0, m2:0, m3:0, m4:0, m5:0 };
      const matched = {};

      // Add initial state (round 0)
      const init = {};
      women.forEach(w => init[w] = 0);
      roundData.push(init);

      while (free.size > 0) {
        const counts = {};
        women.forEach(w => counts[w] = 0);
        const toProcess = [...free];
        for (const m of toProcess) {
          const w = menPrefs[m][nextProp[m]];
          nextProp[m]++;
          counts[w]++;
          const currentM = matched[w];
          const wPref = womenPrefs[w];
          if (!currentM) {
            matched[w] = m;
            free.delete(m);
          } else if (wPref.indexOf(m) < wPref.indexOf(currentM)) {
            matched[w] = m;
            free.delete(m);
            free.add(currentM);
          }
        }
        roundData.push(counts);
      }

      // Add final state
      const final = {};
      women.forEach(w => final[w] = matched[w] ? 1 : 0);
      roundData.push(final);

      return roundData;
    }

    const roundData = runDA();
    const numRounds = roundData.length;

    // Prepare data for d3.stack
    const data = roundData.map((d, i) => {
      const row = { round: i };
      women.forEach(w => row[w] = d[w] || 0);
      return row;
    });

    const margin = { top: 60, right: 80, bottom: 60, left: 80 };
    const width = W - margin.left - margin.right;
    const height = H - margin.top - margin.bottom;

    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

    const x = d3.scaleLinear().domain([0, numRounds - 1]).range([0, width]);
    const stack = d3.stack()
      .keys(women)
      .offset(d3.stackOffsetWiggle)
      .order(d3.stackOrderInsideOut);

    const series = stack(data);

    const yMax = d3.max(series, s => d3.max(s, d => d[1]));
    const yMin = d3.min(series, s => d3.min(s, d => d[0]));
    const y = d3.scaleLinear().domain([yMin, yMax]).range([height, 0]);

    const area = d3.area()
      .x((d, i) => x(i))
      .y0(d => y(d[0]))
      .y1(d => y(d[1]))
      .curve(d3.curveCardinal.tension(0.3));

    // Defs for gradients
    const defs = svg.append('defs');
    women.forEach(w => {
      const grad = defs.append('linearGradient')
        .attr('id', `grad-${w}`)
        .attr('x1', '0%').attr('y1', '0%').attr('x2', '100%').attr('y2', '0%');
      grad.append('stop').attr('offset', '0%').attr('stop-color', womanColors[w]).attr('stop-opacity', 0.3);
      grad.append('stop').attr('offset', '50%').attr('stop-color', womanColors[w]).attr('stop-opacity', 0.7);
      grad.append('stop').attr('offset', '100%').attr('stop-color', womanColors[w]).attr('stop-opacity', 0.4);
    });

    // Glow
    const glow = defs.append('filter').attr('id', 'glow');
    glow.append('feGaussianBlur').attr('stdDeviation', 3).attr('result', 'blur');
    const feMerge = glow.append('feMerge');
    feMerge.append('feMergeNode').attr('in', 'blur');
    feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

    // Clip path for animation
    const clip = defs.append('clipPath').attr('id', 'clip');
    const clipRect = clip.append('rect')
      .attr('x', 0).attr('y', -50)
      .attr('width', 0).attr('height', height + 100);

    // Draw streams
    const streams = g.append('g').attr('clip-path', 'url(#clip)');

    series.forEach((s, i) => {
      const w = women[i];
      streams.append('path')
        .datum(s)
        .attr('d', area)
        .attr('fill', `url(#grad-${w})`)
        .attr('stroke', womanColors[w])
        .attr('stroke-width', 1)
        .attr('filter', 'url(#glow)');
    });

    // Labels at end
    series.forEach((s, i) => {
      const w = women[i];
      const last = s[s.length - 1];
      const midY = (y(last[0]) + y(last[1])) / 2;

      g.append('text')
        .attr('x', width + 10).attr('y', midY)
        .attr('fill', womanColors[w]).attr('font-size', 13).attr('font-weight', 600)
        .attr('dominant-baseline', 'central')
        .text(w)
        .attr('opacity', 0)
        .transition().delay(3500).duration(400).attr('opacity', 1);
    });

    // X-axis labels
    for (let i = 0; i < numRounds; i++) {
      const label = i === 0 ? 'Start' : i === numRounds - 1 ? 'Final' : `Round ${i}`;
      g.append('text')
        .attr('x', x(i)).attr('y', height + 30)
        .attr('text-anchor', 'middle').attr('fill', '#484f58').attr('font-size', 11)
        .text(label);
    }

    // Animate clip reveal
    clipRect.transition()
      .duration(3000)
      .ease(d3.easeCubicInOut)
      .attr('width', width + 10);

    // Title
    g.append('text')
      .attr('x', width / 2).attr('y', -25)
      .attr('text-anchor', 'middle').attr('fill', '#484f58').attr('font-size', 13)
      .text('Proposal volume per woman across DA rounds');
  </script>
</body>
</html>
