<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coupled Pendulum Matching — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Coupled Pendulum Matching</h2><p>Matched pendulums synchronize their oscillations. Mismatched pendulums oscillate chaotically. Stable pairs achieve perfect resonance.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const N = 5;
    const manColors = ['#58a6ff','#3b82f6','#60a5fa','#93c5fd','#2563eb'];
    const womanColors = ['#c084fc','#a855f7','#9333ea','#7c3aed','#6d28d9'];
    const matching = [0,1,2,3,4];

    class Pendulum {
      constructor(x, len, color, type, index) {
        this.pivotX = x;
        this.pivotY = 80;
        this.len = len;
        this.angle = (Math.random() - 0.5) * 1.2;
        this.angVel = (Math.random() - 0.5) * 0.5;
        this.color = color;
        this.type = type;
        this.index = index;
        this.trail = [];
        this.damping = 0.998;
      }

      getEnd() {
        return {
          x: this.pivotX + Math.sin(this.angle) * this.len,
          y: this.pivotY + Math.cos(this.angle) * this.len
        };
      }
    }

    let pendulums = [];

    function init() {
      pendulums = [];
      const w = canvas.width;
      const spacing = w / (N * 2 + 1);
      for (let i = 0; i < N; i++) {
        const len = 150 + Math.random() * 80;
        pendulums.push(new Pendulum(spacing * (i * 2 + 1), len, manColors[i], 'man', i));
        pendulums.push(new Pendulum(spacing * (i * 2 + 2), len * 0.95, womanColors[i], 'woman', i));
      }
    }

    init();
    window.addEventListener('resize', () => { resize(); init(); });

    const g = 9.81;

    let t = 0, dt = 1/60;
    function loop() {
      requestAnimationFrame(loop);
      t += dt;
      update();
      render();
    }

    function update() {
      // Physics update
      for (const p of pendulums) {
        const accel = -(g / (p.len / 80)) * Math.sin(p.angle);
        p.angVel += accel * dt;
        p.angVel *= p.damping;
        p.angle += p.angVel * dt;

        const end = p.getEnd();
        p.trail.push({ x: end.x, y: end.y, age: 0 });
        if (p.trail.length > 60) p.trail.shift();
        for (const pt of p.trail) pt.age += dt;
      }

      // Coupling forces between matched pairs
      for (let i = 0; i < N; i++) {
        const man = pendulums[i * 2];
        const woman = pendulums[i * 2 + 1];
        const isMatched = matching[man.index] === woman.index;
        const strength = isMatched ? 0.8 : 0.02;
        const diff = woman.angle - man.angle;
        man.angVel += diff * strength * dt;
        woman.angVel -= diff * strength * dt;
      }
    }

    function render() {
      const w = canvas.width, h = canvas.height;
      ctx.fillStyle = 'rgba(13,17,23,0.15)';
      ctx.fillRect(0, 0, w, h);

      // Draw support bar
      ctx.strokeStyle = '#30363d';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(0, 80);
      ctx.lineTo(w, 80);
      ctx.stroke();

      // Draw connections between matched pairs
      for (let i = 0; i < N; i++) {
        const man = pendulums[i * 2];
        const woman = pendulums[i * 2 + 1];
        const me = man.getEnd();
        const we = woman.getEnd();
        const isMatched = matching[man.index] === woman.index;

        // Spring between bobs
        const sync = 1 - Math.abs(man.angle - woman.angle) / Math.PI;
        ctx.strokeStyle = isMatched ? `rgba(255,215,0,${sync * 0.6})` : 'rgba(100,100,100,0.1)';
        ctx.lineWidth = isMatched ? 2 : 0.5;
        ctx.setLineDash(isMatched ? [] : [4, 4]);
        ctx.beginPath();
        // Draw spring as wavy line
        const segs = 12;
        for (let s = 0; s <= segs; s++) {
          const frac = s / segs;
          const sx = me.x + (we.x - me.x) * frac;
          const sy = me.y + (we.y - me.y) * frac;
          const wave = Math.sin(frac * Math.PI * 6) * (isMatched ? 6 * (1 - sync) : 3);
          const nx = -(we.y - me.y), ny = (we.x - me.x);
          const nl = Math.sqrt(nx*nx + ny*ny) || 1;
          if (s === 0) ctx.moveTo(sx + wave * nx/nl, sy + wave * ny/nl);
          else ctx.lineTo(sx + wave * nx/nl, sy + wave * ny/nl);
        }
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Draw pendulums
      for (const p of pendulums) {
        const end = p.getEnd();

        // Trail
        for (let i = 0; i < p.trail.length - 1; i++) {
          const alpha = (i / p.trail.length) * 0.5;
          ctx.strokeStyle = p.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(p.trail[i].x, p.trail[i].y);
          ctx.lineTo(p.trail[i+1].x, p.trail[i+1].y);
          ctx.stroke();
        }

        // Rod
        ctx.strokeStyle = '#484f58';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p.pivotX, p.pivotY);
        ctx.lineTo(end.x, end.y);
        ctx.stroke();

        // Pivot
        ctx.beginPath();
        ctx.arc(p.pivotX, p.pivotY, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#484f58';
        ctx.fill();

        // Bob
        ctx.beginPath();
        ctx.arc(end.x, end.y, 14, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(end.x - 3, end.y - 3, 2, end.x, end.y, 14);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.4, p.color);
        grad.addColorStop(1, p.color + '60');
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Label
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 9px Nunito';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.type === 'man' ? 'M' + (p.index+1) : 'W' + (p.index+1), end.x, end.y);
      }

      // Sync indicators
      ctx.font = '500 11px Nunito';
      ctx.textAlign = 'center';
      for (let i = 0; i < N; i++) {
        const man = pendulums[i * 2];
        const woman = pendulums[i * 2 + 1];
        const sync = Math.max(0, 1 - Math.abs(man.angle - woman.angle) * 3);
        const cx = (man.pivotX + woman.pivotX) / 2;
        ctx.fillStyle = `rgba(255,215,0,${sync * 0.8})`;
        if (sync > 0.7) {
          ctx.fillText('♪ sync', cx, 60);
        }
      }
    }

    loop();
  </script>
</body>
</html>
