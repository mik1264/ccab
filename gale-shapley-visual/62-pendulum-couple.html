<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coupled Pendulums — Matching Algorithms Visual Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;overflow:hidden;font-family:sans-serif}
canvas{display:block;position:fixed;top:0;left:0}
.back{position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100}
.back:hover{background:#30363d}
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

const NUM = 8;
const G = 9.81;
const DT = 0.016;

class PendulumPair {
  constructor(i) {
    this.i = i;
    this.length = 0;
    this.pivotX = 0;
    this.pivotY = 0;
    this.separation = 0;
    this.angle1 = -0.3 + Math.random() * 0.6;
    this.vel1 = 0;
    this.angle2 = -0.3 + Math.random() * 0.6;
    this.vel2 = 0;
    this.coupling = 2.0 + Math.random() * 2.0;
  }

  layout() {
    const spacing = W / (NUM + 1);
    this.pivotX = spacing * (this.i + 1);
    this.pivotY = H * 0.18;
    this.length = Math.min(H * 0.32, 200);
    this.separation = Math.min(spacing * 0.25, 40);
  }

  update() {
    const grav1 = -(G / this.length) * Math.sin(this.angle1);
    const grav2 = -(G / this.length) * Math.sin(this.angle2);
    const diff = this.angle2 - this.angle1;
    const spring = this.coupling * diff;

    this.vel1 += (grav1 + spring) * DT;
    this.vel2 += (grav2 - spring) * DT;
    this.vel1 *= 0.995;
    this.vel2 *= 0.995;
    this.angle1 += this.vel1 * DT;
    this.angle2 += this.vel2 * DT;
  }

  draw() {
    const px1 = this.pivotX - this.separation;
    const px2 = this.pivotX + this.separation;
    const py = this.pivotY;
    const bx1 = px1 + Math.sin(this.angle1) * this.length;
    const by1 = py + Math.cos(this.angle1) * this.length;
    const bx2 = px2 + Math.sin(this.angle2) * this.length;
    const by2 = py + Math.cos(this.angle2) * this.length;

    // Pivot bar
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(px1 - 10, py);
    ctx.lineTo(px2 + 10, py);
    ctx.stroke();

    // Rods
    ctx.lineWidth = 2;
    ctx.strokeStyle = 'rgba(100,180,255,0.6)';
    ctx.beginPath();
    ctx.moveTo(px1, py);
    ctx.lineTo(bx1, by1);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(100,220,150,0.6)';
    ctx.beginPath();
    ctx.moveTo(px2, py);
    ctx.lineTo(bx2, by2);
    ctx.stroke();

    // Spring between bobs
    const dx = bx2 - bx1, dy = by2 - by1;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 0) {
      const nx = dx / dist, ny = dy / dist;
      const px = -ny, py2 = nx;
      const coils = 8, amp = 6;
      const tension = Math.min(1, Math.abs(dist / (this.separation * 2) - 1) * 3);

      ctx.strokeStyle = 'rgba(255,' + Math.round(215 * (1 - tension)) + ',' + Math.round(50 * (1 - tension)) + ',0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(bx1, by1);
      for (let j = 1; j <= coils * 2; j++) {
        const frac = j / (coils * 2 + 1);
        const cx = bx1 + dx * frac;
        const cy = by1 + dy * frac;
        const side = (j % 2 === 0) ? 1 : -1;
        ctx.lineTo(cx + px * amp * side, cy + py2 * amp * side);
      }
      ctx.lineTo(bx2, by2);
      ctx.stroke();
    }

    // Student bob (blue)
    const bobR = 10;
    const g1 = ctx.createRadialGradient(bx1, by1, 0, bx1, by1, bobR * 1.5);
    g1.addColorStop(0, '#64b5f6');
    g1.addColorStop(1, 'rgba(100,180,255,0)');
    ctx.fillStyle = g1;
    ctx.beginPath();
    ctx.arc(bx1, by1, bobR * 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#64b5f6';
    ctx.beginPath();
    ctx.arc(bx1, by1, bobR, 0, Math.PI * 2);
    ctx.fill();

    // School bob (green)
    const g2 = ctx.createRadialGradient(bx2, by2, 0, bx2, by2, bobR * 1.5);
    g2.addColorStop(0, '#81c784');
    g2.addColorStop(1, 'rgba(100,220,150,0)');
    ctx.fillStyle = g2;
    ctx.beginPath();
    ctx.arc(bx2, by2, bobR * 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#81c784';
    ctx.beginPath();
    ctx.arc(bx2, by2, bobR, 0, Math.PI * 2);
    ctx.fill();

    // Pair label
    ctx.fillStyle = '#8b949e';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Pair ' + (this.i + 1), this.pivotX, py - 12);

    // Sync indicator
    const sync = 1 - Math.min(1, Math.abs(this.angle1 - this.angle2) * 3);
    if (sync > 0.6) {
      ctx.fillStyle = 'rgba(255,215,0,' + (sync * 0.5) + ')';
      ctx.fillText('in sync', this.pivotX, Math.max(by1, by2) + bobR + 20);
    }
    ctx.textAlign = 'left';
  }
}

const pairs = [];
for (let i = 0; i < NUM; i++) pairs.push(new PendulumPair(i));

function layoutAll() { pairs.forEach(p => p.layout()); }
layoutAll();
window.addEventListener('resize', () => { resize(); layoutAll(); });

function animate() {
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  for (let s = 0; s < 3; s++) pairs.forEach(p => p.update());
  pairs.forEach(p => p.draw());

  ctx.fillStyle = 'rgba(201,209,217,0.7)';
  ctx.font = '600 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Coupled Pendulums', W / 2, H - 30);
  ctx.fillStyle = '#58a6ff';
  ctx.font = '12px sans-serif';
  ctx.fillText('Blue = Students   Green = Schools   Spring = Match Bond', W / 2, H - 10);
  ctx.textAlign = 'left';

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
