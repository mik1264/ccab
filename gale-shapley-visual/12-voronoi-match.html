<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voronoi Matching Shader</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; overflow: hidden; }
canvas { display: block; }
.back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; transition: background 0.2s; }
.back:hover { background: #30363d; }
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const gl = canvas.getContext('webgl');
if (!gl) { document.body.innerHTML += '<p style="color:red;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)">WebGL not supported</p>'; }

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);

const VS = `
attribute vec2 pos;
void main() {
  gl_Position = vec4(pos, 0.0, 1.0);
}`;

const FS = `
precision mediump float;
uniform float time;
uniform vec2 resolution;
vec2 seed(float i) {
  return vec2(
    0.5 + 0.4 * sin(time * 0.3 + i * 2.1),
    0.5 + 0.4 * cos(time * 0.4 + i * 1.7)
  );
}
void main() {
  vec2 uv = gl_FragCoord.xy / resolution;
  float minDist = 9999.0;
  float minDist2 = 9999.0;
  float minIdx = 0.0;
  for (float i = 0.0; i < 8.0; i++) {
    vec2 s = seed(i);
    float d = length(uv - s);
    if (d < minDist) { minDist2 = minDist; minDist = d; minIdx = i; }
    else if (d < minDist2) { minDist2 = d; }
  }
  float edge = smoothstep(0.0, 0.02, minDist2 - minDist);
  float hue = minIdx / 8.0;
  vec3 col = vec3(
    0.5 + 0.5 * sin(hue * 6.28 + 0.0),
    0.5 + 0.5 * sin(hue * 6.28 + 2.1),
    0.5 + 0.5 * sin(hue * 6.28 + 4.2)
  );
  col = mix(vec3(0.0), col, edge);
  col *= 0.4 + 0.6 * (1.0 - minDist * 4.0);
  gl_FragColor = vec4(col, 1.0);
}`;

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'time');
const uRes = gl.getUniformLocation(prog, 'resolution');

const t0 = performance.now();
function frame() {
  const t = (performance.now() - t0) * 0.001;
  gl.uniform1f(uTime, t);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
