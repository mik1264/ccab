<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voronoi Matching Field — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Voronoi Matching Field</h2><p>Agents are Voronoi seeds. Each region shows which agent 'owns' that space. As matching progresses, matched regions merge and pulse.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);

    function mkShader(type, src) {
      const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
      return s;
    }
    function mkProg(vs, fs) {
      const p = gl.createProgram();
      gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
      gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(p); return p;
    }

    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0,1); }`;

    const FS = `
    precision mediump float;
    uniform float u_time;
    uniform vec2 u_res;

    // 6 men (blue hues) + 6 women (purple hues)
    // Seed positions: base positions that drift slowly
    vec2 getSeedPos(int i, float t) {
      float fi = float(i);
      float angle = fi * 0.523 + t * 0.15 * (0.5 + 0.5 * sin(fi * 1.7));
      float radius = 0.15 + 0.08 * sin(fi * 2.3 + t * 0.2);
      vec2 base;
      if (i < 6) {
        // Men: left side
        base = vec2(0.25 + 0.12 * cos(fi * 1.047), 0.15 + fi * 0.14);
      } else {
        // Women: right side
        float fj = float(i - 6);
        base = vec2(0.75 + 0.12 * cos(fj * 1.047), 0.15 + fj * 0.14);
      }
      base += vec2(cos(angle), sin(angle)) * radius * 0.3;

      // Matched pairs gravitate toward each other
      float matchPhase = clamp((t - 2.0) * 0.15, 0.0, 1.0);
      if (i < 6) {
        // Man i matched with woman i (simplified)
        vec2 partnerBase = vec2(0.75 + 0.12 * cos(fi * 1.047), 0.15 + fi * 0.14);
        base = mix(base, (base + partnerBase) * 0.5, matchPhase * 0.4);
      } else {
        float fj = float(i - 6);
        vec2 partnerBase = vec2(0.25 + 0.12 * cos(fj * 1.047), 0.15 + fj * 0.14);
        base = mix(base, (base + partnerBase) * 0.5, matchPhase * 0.4);
      }

      return base;
    }

    vec3 getSeedColor(int i) {
      float fi = float(i);
      if (i < 6) {
        // Men: blue hues
        return vec3(0.1 + fi * 0.05, 0.2 + fi * 0.08, 0.6 + fi * 0.06);
      } else {
        // Women: purple hues
        float fj = float(i - 6);
        return vec3(0.5 + fj * 0.06, 0.1 + fj * 0.04, 0.6 + fj * 0.05);
      }
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      float aspect = u_res.x / u_res.y;
      vec2 p = vec2(uv.x * aspect, uv.y);
      float t = u_time;

      float minDist = 999.0;
      float secondDist = 999.0;
      int closest = 0;
      vec3 closestCol = vec3(0.0);

      // Find closest and second-closest seed
      for (int i = 0; i < 12; i++) {
        vec2 seed = getSeedPos(i, t);
        seed.x *= aspect;
        float d = distance(p, seed);
        if (d < minDist) {
          secondDist = minDist;
          minDist = d;
          closest = i;
          closestCol = getSeedColor(i);
        } else if (d < secondDist) {
          secondDist = d;
        }
      }

      // Base color from closest seed
      vec3 col = closestCol;

      // Edge glow: white edges between regions
      float edgeDist = secondDist - minDist;
      float edge = 1.0 - smoothstep(0.0, 0.015, edgeDist);
      col = mix(col, vec3(1.0), edge * 0.8);

      // Seed center glow
      float centerGlow = exp(-minDist * minDist * 800.0);
      col += vec3(0.8, 0.9, 1.0) * centerGlow;

      // Matched pair pulse
      float matchPhase = clamp((t - 2.0) * 0.15, 0.0, 1.0);
      float pulse = 0.5 + 0.5 * sin(t * 3.0 + float(closest) * 0.5);
      col += col * pulse * 0.15 * matchPhase;

      // Darken based on distance for depth
      col *= 0.7 + 0.3 * exp(-minDist * 3.0);

      // Subtle vignette
      float vig = 1.0 - 0.3 * length(uv - 0.5);
      col *= vig;

      gl_FragColor = vec4(col, 1.0);
    }`;

    const prog = mkProg(VS, FS);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    const pLoc = gl.getAttribLocation(prog, 'p');
    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uRes = gl.getUniformLocation(prog, 'u_res');

    gl.useProgram(prog);
    gl.enableVertexAttribArray(pLoc);
    gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

    function frame(t) {
      gl.uniform1f(uTime, t * 0.001);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
