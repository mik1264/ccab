<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TTC Wormhole Cycles — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">&#8592; Visual Gallery</a>
  <div class="info"><h2>TTC Wormhole Cycles</h2><p>Top Trading Cycles creates closed loops — visualized as wormholes. Each agent passes through their assigned portal to reach their top available choice.</p></div>
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1117);
    scene.fog = new THREE.FogExp2(0x0d1117, 0.025);
    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 15);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    scene.add(new THREE.AmbientLight(0x111133, 0.4));

    // 6 wormholes arranged in a ring
    const wormholes = [];
    const wormholeColors = [0xff3366, 0xff9933, 0xffee33, 0x33ff66, 0x3399ff, 0xcc33ff];
    const wormholeCount = 6;
    const ringRadius = 6;

    for (let i = 0; i < wormholeCount; i++) {
      const angle = (i / wormholeCount) * Math.PI * 2;
      const x = Math.cos(angle) * ringRadius;
      const z = Math.sin(angle) * ringRadius;
      const y = Math.sin(angle * 2) * 1.5;

      const torusGeo = new THREE.TorusGeometry(1.2, 0.15, 16, 48);
      const torusMat = new THREE.MeshPhongMaterial({
        color: wormholeColors[i],
        emissive: wormholeColors[i],
        emissiveIntensity: 0.6,
        shininess: 100,
        transparent: true,
        opacity: 0.85
      });
      const torus = new THREE.Mesh(torusGeo, torusMat);
      torus.position.set(x, y, z);
      torus.lookAt(0, y, 0);
      scene.add(torus);

      // Inner glow disc
      const discGeo = new THREE.CircleGeometry(1.1, 32);
      const discMat = new THREE.MeshBasicMaterial({
        color: wormholeColors[i],
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide
      });
      const disc = new THREE.Mesh(discGeo, discMat);
      disc.position.copy(torus.position);
      disc.lookAt(0, y, 0);
      scene.add(disc);

      // Point light
      const pl = new THREE.PointLight(wormholeColors[i], 1.0, 6);
      pl.position.set(x, y, z);
      scene.add(pl);

      wormholes.push({ torus, disc, pl, angle, baseY: y, color: wormholeColors[i] });
    }

    // Particles streaming through wormholes
    const particlesPerWormhole = 60;
    const allParticles = [];

    for (let w = 0; w < wormholeCount; w++) {
      const wh = wormholes[w];
      const nextIdx = (w + 1) % wormholeCount;
      const nextWh = wormholes[nextIdx];

      for (let p = 0; p < particlesPerWormhole; p++) {
        const geo = new THREE.SphereGeometry(0.06, 8, 8);
        const mat = new THREE.MeshBasicMaterial({
          color: wh.color,
          transparent: true,
          opacity: 0.8
        });
        const mesh = new THREE.Mesh(geo, mat);
        scene.add(mesh);

        allParticles.push({
          mesh,
          wormholeIdx: w,
          phase: (p / particlesPerWormhole) * Math.PI * 2,
          speed: 0.8 + Math.random() * 0.4,
          orbitRadius: 0.3 + Math.random() * 0.6
        });
      }
    }

    function animate(t) {
      requestAnimationFrame(animate);
      const time = t * 0.001;

      // Camera drift
      camera.position.x = Math.sin(time * 0.1) * 16;
      camera.position.z = Math.cos(time * 0.1) * 16;
      camera.position.y = 6 + Math.sin(time * 0.15) * 3;
      camera.lookAt(0, 0, 0);

      // Animate wormholes
      wormholes.forEach((wh, i) => {
        const pulse = 1 + Math.sin(time * 2 + i * 1.2) * 0.1;
        wh.torus.scale.setScalar(pulse);
        wh.disc.material.opacity = 0.1 + Math.sin(time * 3 + i) * 0.08;
        wh.pl.intensity = 0.8 + Math.sin(time * 2.5 + i) * 0.4;
        // Slow bob
        wh.torus.position.y = wh.baseY + Math.sin(time * 0.5 + i) * 0.3;
        wh.disc.position.y = wh.torus.position.y;
        wh.pl.position.y = wh.torus.position.y;
      });

      // Animate particles through circular paths around wormholes
      allParticles.forEach(p => {
        const wh = wormholes[p.wormholeIdx];
        const nextWh = wormholes[(p.wormholeIdx + 1) % wormholeCount];
        const t2 = (time * p.speed + p.phase) % (Math.PI * 2);
        const progress = t2 / (Math.PI * 2);

        // Spiral around the wormhole center
        const cx = wh.torus.position.x;
        const cy = wh.torus.position.y;
        const cz = wh.torus.position.z;

        // Orbit in the plane of the torus
        const localAngle = time * p.speed * 2 + p.phase;
        const r = p.orbitRadius;

        // Direction from center to origin for the torus orientation
        const dirX = -cx / ringRadius;
        const dirZ = -cz / ringRadius;

        // Perpendicular in xz plane
        const perpX = -dirZ;
        const perpZ = dirX;

        p.mesh.position.set(
          cx + Math.cos(localAngle) * r * perpX + Math.sin(localAngle) * r * 0,
          cy + Math.sin(localAngle) * r,
          cz + Math.cos(localAngle) * r * perpZ
        );

        p.mesh.material.opacity = 0.5 + Math.sin(localAngle) * 0.3;
      });

      renderer.render(scene, camera);
    }
    animate(0);
  </script>
</body>
</html>
