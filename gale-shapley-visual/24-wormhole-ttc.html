<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wormhole TTC</title>
<style>
* { margin: 0; padding: 0; }
body { background: #0d1117; overflow: hidden; }
.back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
.back:hover { background: #30363d; }
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 6, 10);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x0d1117);
document.body.appendChild(renderer.domElement);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
scene.add(new THREE.AmbientLight(0x334455, 2));
const dl = new THREE.DirectionalLight(0xffffff, 2);
dl.position.set(5, 8, 5); scene.add(dl);

const torusGeo = new THREE.TorusGeometry(4, 1, 24, 64);
const torusMat = new THREE.MeshPhongMaterial({ color: 0x1a2744, emissive: 0x0a1522, transparent: true, opacity: 0.6 });
const torus = new THREE.Mesh(torusGeo, torusMat);
scene.add(torus);

const NA = 8;
const agents = [];
const agentAngles = [];
const agentColors = [0x58a6ff, 0x7ee787, 0xffa657, 0xf778ba, 0xd2a8ff, 0x79c0ff, 0xffc680, 0xff9bce];

for (let i = 0; i < NA; i++) {
  const angle = (i / NA) * Math.PI * 2;
  agentAngles.push(angle);
  const r = 4 + 1.15;
  const geo = new THREE.SphereGeometry(0.25, 20, 20);
  const mat = new THREE.MeshPhongMaterial({ color: agentColors[i], emissive: agentColors[i], emissiveIntensity: 0.3 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(r * Math.cos(angle), 0, r * Math.sin(angle));
  scene.add(mesh);
  agents.push(mesh);
}

const cycles = [
  { indices: [0, 1, 2], color: 0x58a6ff },
  { indices: [3, 4, 5], color: 0xf778ba },
  { indices: [6, 7], color: 0xffd700 }
];

const arrowGroups = [];

for (const cycle of cycles) {
  const cGroup = new THREE.Group();

  for (let j = 0; j < cycle.indices.length; j++) {
    const fi = cycle.indices[j];
    const ti = cycle.indices[(j + 1) % cycle.indices.length];
    const from = agents[fi].position.clone();
    const to = agents[ti].position.clone();

    const fa = agentAngles[fi], ta = agentAngles[ti];
    let ad = ta - fa;
    if (ad > Math.PI) ad -= Math.PI * 2;
    if (ad < -Math.PI) ad += Math.PI * 2;
    const ma = fa + ad / 2;
    const mr = 4 + 1.15;
    const midX = mr * Math.cos(ma);
    const midZ = mr * Math.sin(ma);
    const midY = 1.5 + Math.abs(ad) * 0.5;

    const segs = 12;
    const arcPos = [];
    for (let s = 0; s < segs; s++) {
      const t1 = s / segs, t2 = (s + 1) / segs;
      for (const tt of [t1, t2]) {
        const a = (1 - tt) * (1 - tt), b = 2 * tt * (1 - tt), c = tt * tt;
        arcPos.push(
          from.x * a + midX * b + to.x * c,
          from.y * a + midY * b + to.y * c,
          from.z * a + midZ * b + to.z * c
        );
      }
    }
    const arcGeo = new THREE.BufferGeometry();
    arcGeo.setAttribute('position', new THREE.Float32BufferAttribute(arcPos, 3));
    cGroup.add(new THREE.LineSegments(arcGeo, new THREE.LineBasicMaterial({ color: cycle.color, transparent: true, opacity: 0.8 })));

    const ht = 0.85;
    const ha = (1-ht)*(1-ht), hb = 2*ht*(1-ht), hc = ht*ht;
    const headGeo = new THREE.SphereGeometry(0.12, 10, 10);
    const headMat = new THREE.MeshPhongMaterial({ color: cycle.color, emissive: cycle.color, emissiveIntensity: 0.5 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.set(from.x*ha + midX*hb + to.x*hc, from.y*ha + midY*hb + to.y*hc, from.z*ha + midZ*hb + to.z*hc);
    cGroup.add(head);
  }
  scene.add(cGroup);
  arrowGroups.push(cGroup);
}

function animate(ts) {
  requestAnimationFrame(animate);
  const t = ts * 0.001;
  torus.rotation.x = Math.sin(t * 0.15) * 0.3;
  torus.rotation.y = t * 0.1;

  for (let c = 0; c < arrowGroups.length; c++) {
    const pulse = 0.5 + Math.sin(t * 3 + c * 2) * 0.5;
    arrowGroups[c].children.forEach(ch => {
      if (ch.material && ch.material.opacity !== undefined) {
        ch.material.opacity = 0.4 + pulse * 0.6;
      }
    });
  }

  for (let i = 0; i < NA; i++) {
    agents[i].position.y = Math.sin(t * 2 + i) * 0.2;
  }

  camera.position.x = Math.sin(t * 0.2) * 12;
  camera.position.y = 4 + Math.sin(t * 0.15) * 3;
  camera.position.z = Math.cos(t * 0.2) * 12;
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
animate(0);
</script>
</body>
</html>
