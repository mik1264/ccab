<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fire of Instability — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; }
    body { background:#0d1117; overflow:hidden; }
    canvas#c { position:fixed; top:0; left:0; width:100vw; height:100vh; display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; font-family:'Nunito',sans-serif; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); font-family:'Nunito',sans-serif; }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Fire of Instability</h2><p>Blocking pairs burn with fire. As the DA algorithm resolves instabilities, the flames die down — stability is the absence of fire.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);
    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }`;
    function mkShader(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(sh));return sh;}
    function mkProg(fs){const pr=gl.createProgram();gl.attachShader(pr,mkShader(gl.VERTEX_SHADER,VS));gl.attachShader(pr,mkShader(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);return pr;}
    const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

    const FS = `
    precision highp float;
    uniform vec2 u_res;
    uniform float u_time;

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f*f*(3.0-2.0*f);
      float a = hash(i);
      float b = hash(i+vec2(1,0));
      float c = hash(i+vec2(0,1));
      float d = hash(i+vec2(1,1));
      return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
    }

    float fbm(vec2 p) {
      float v = 0.0;
      float a = 0.5;
      mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
      for(int i = 0; i < 6; i++) {
        v += a * noise(p);
        p = rot * p * 2.0;
        a *= 0.5;
      }
      return v;
    }

    // 5 fire sources (blocking pairs) that extinguish over time
    vec2 firePos(int i) {
      if(i == 0) return vec2(-0.4, -0.3);
      if(i == 1) return vec2(0.3, -0.2);
      if(i == 2) return vec2(-0.1, 0.1);
      if(i == 3) return vec2(0.4, 0.3);
      if(i == 4) return vec2(-0.3, 0.4);
      return vec2(0.0);
    }

    // Each fire extinguishes at a different time
    float fireAlive(int i, float t) {
      float extTime;
      if(i == 0) extTime = 4.0;
      else if(i == 1) extTime = 7.0;
      else if(i == 2) extTime = 10.0;
      else if(i == 3) extTime = 13.0;
      else extTime = 16.0;
      // Cycle: fires reignite every 20 seconds
      float ct = mod(t, 22.0);
      return smoothstep(extTime, extTime - 1.5, ct);
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - 0.5*u_res) / u_res.y;
      float t = u_time;

      float totalHeat = 0.0;

      for(int i = 0; i < 5; i++) {
        vec2 fp = firePos(i);
        float alive = fireAlive(i, t);
        if(alive < 0.01) continue;

        vec2 d = uv - fp;

        // Turbulent displacement
        float turb = fbm(vec2(d.x * 4.0, d.y * 4.0 - t * 2.0) + float(i) * 10.0);
        d.x += (turb - 0.5) * 0.15 * alive;

        // Fire shape: narrow at base, wide at top, rising
        float dist = length(d);
        float rise = d.y; // negative = below fire, positive = above
        float flame = exp(-dist*dist * 12.0);
        // Fire rises
        flame *= smoothstep(0.5, -0.1, rise);
        // Turbulent detail
        float detail = fbm(vec2(d.x*8.0, (d.y - t*1.5)*6.0) + float(i)*5.0);
        flame *= (0.5 + 0.5 * detail);
        flame *= alive;

        totalHeat += flame;
      }

      totalHeat = clamp(totalHeat, 0.0, 1.0);

      // Fire color ramp: black -> red -> orange -> yellow -> white
      vec3 col;
      if(totalHeat < 0.2) {
        col = mix(vec3(0.01, 0.01, 0.02), vec3(0.5, 0.0, 0.0), totalHeat / 0.2);
      } else if(totalHeat < 0.4) {
        col = mix(vec3(0.5, 0.0, 0.0), vec3(0.9, 0.3, 0.0), (totalHeat - 0.2) / 0.2);
      } else if(totalHeat < 0.65) {
        col = mix(vec3(0.9, 0.3, 0.0), vec3(1.0, 0.7, 0.1), (totalHeat - 0.4) / 0.25);
      } else if(totalHeat < 0.85) {
        col = mix(vec3(1.0, 0.7, 0.1), vec3(1.0, 0.95, 0.6), (totalHeat - 0.65) / 0.2);
      } else {
        col = mix(vec3(1.0, 0.95, 0.6), vec3(1.0, 1.0, 1.0), (totalHeat - 0.85) / 0.15);
      }

      // Add embers / sparks
      float spark = noise(uv * 30.0 + vec2(0.0, -t * 3.0));
      spark = smoothstep(0.85, 0.95, spark) * totalHeat;
      col += vec3(1.0, 0.6, 0.1) * spark * 0.5;

      // Subtle smoke above fires
      float smoke = 0.0;
      for(int i = 0; i < 5; i++) {
        vec2 fp = firePos(i);
        float alive = fireAlive(i, t);
        vec2 d = uv - fp - vec2(0.0, 0.2);
        float smokeN = fbm(vec2(d.x*3.0 + t*0.2, d.y*2.0 - t*0.5) + float(i)*7.0);
        float smokeDist = length(d * vec2(1.5, 0.8));
        smoke += smokeN * exp(-smokeDist*smokeDist*3.0) * (1.0 - alive) * 0.3;
      }
      col = mix(col, vec3(0.15, 0.15, 0.18), clamp(smoke, 0.0, 0.6));

      gl_FragColor = vec4(col, 1.0);
    }
    `;

    const prog = mkProg(FS);
    gl.useProgram(prog);
    const loc_p = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc_p);
    gl.vertexAttribPointer(loc_p, 2, gl.FLOAT, false, 0, 0);
    const loc_res = gl.getUniformLocation(prog, 'u_res');
    const loc_time = gl.getUniformLocation(prog, 'u_time');

    function frame(t) {
      gl.uniform2f(loc_res, canvas.width, canvas.height);
      gl.uniform1f(loc_time, t * 0.001);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
