<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preference Kaleidoscope — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Preference Kaleidoscope</h2><p>The preference matrix becomes a kaleidoscope pattern. Each segment represents a preference rank — the 6-fold symmetry reveals which pairs are mutually top-ranked.</p></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let symmetry = 10;
    let rotSpeed = 0.002;
    let pulsePhase = 0;

    // Preference data for pattern generation
    let prefData = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);

      // Generate preference elements
      for (let i = 0; i < 5; i++) {
        for (let j = 0; j < 5; j++) {
          let rank = abs(i - j) + 1;
          if (rank > 5) rank = 5;
          prefData.push({
            agent: i,
            target: j,
            rank: rank,
            mutual: (i === j) // Mutual top choice
          });
        }
      }
    }

    function draw() {
      background(13, 17, 23);
      translate(width / 2, height / 2);

      pulsePhase += 0.012;
      let pulse = 1 + sin(pulsePhase) * 0.06;
      let maxR = min(width, height) * 0.44 * pulse;
      let angle = frameCount * rotSpeed;

      // Draw kaleidoscope segments
      for (let s = 0; s < symmetry; s++) {
        push();
        rotate((TWO_PI / symmetry) * s + angle);

        // Mirror every other segment
        if (s % 2 === 1) {
          scale(-1, 1);
        }

        drawWedge(maxR);
        pop();
      }

      // Center crystal
      for (let r = 30; r > 0; r -= 4) {
        fill(45, map(r, 0, 30, 30, 80), 100, map(r, 0, 30, 90, 15));
        noStroke();
        let pts = 10;
        beginShape();
        for (let i = 0; i < pts; i++) {
          let a = (TWO_PI / pts) * i + angle * 2;
          let rr = r * (0.8 + sin(a * 3 + pulsePhase * 2) * 0.2);
          vertex(cos(a) * rr, sin(a) * rr);
        }
        endShape(CLOSE);
      }

      // Outer ring glow
      noFill();
      for (let i = 0; i < 3; i++) {
        stroke(200, 50, 80, 8 - i * 2);
        strokeWeight(3 - i);
        ellipse(0, 0, maxR * 2 + 10 + i * 8, maxR * 2 + 10 + i * 8);
      }
    }

    function drawWedge(maxR) {
      let wedgeAngle = TWO_PI / symmetry;

      for (let pd of prefData) {
        let rank = pd.rank;
        let r = map(rank, 1, 5, maxR * 0.2, maxR * 0.9);
        let theta = map(pd.agent, 0, 4, 0, wedgeAngle * 0.85);
        let subR = map(pd.target, 0, 4, 0, wedgeAngle * 0.1);
        theta += subR;

        let x = cos(theta) * r;
        let y = sin(theta) * r;
        let sz = map(rank, 1, 5, 18, 6) * (1 + sin(pulsePhase * 2 + pd.agent + pd.target) * 0.15);

        // Color: mutual top = gold, others by agent index
        let hue, sat, bri;
        if (pd.mutual) {
          hue = 45;
          sat = 90;
          bri = 100;
        } else {
          hue = [300, 200, 160, 280, 30][pd.agent];
          sat = map(rank, 1, 5, 85, 40);
          bri = map(rank, 1, 5, 95, 50);
        }

        noStroke();

        // Glow for top ranks
        if (rank <= 2) {
          fill(hue, sat, bri, 12);
          ellipse(x, y, sz * 2.5, sz * 2.5);
        }

        // Main shape: alternate between circles and diamonds
        fill(hue, sat, bri, 65);
        if (pd.agent % 2 === 0) {
          ellipse(x, y, sz, sz);
        } else {
          push();
          translate(x, y);
          rotate(PI / 4);
          rectMode(CENTER);
          rect(0, 0, sz * 0.7, sz * 0.7);
          pop();
        }

        // Connecting lines within wedge for same-agent elements
        if (pd.target > 0) {
          let prevR = map(rank, 1, 5, maxR * 0.2, maxR * 0.9);
          let prevTheta = map(pd.agent, 0, 4, 0, wedgeAngle * 0.85);
          prevTheta += map(pd.target - 1, 0, 4, 0, wedgeAngle * 0.1);
          stroke(hue, sat * 0.5, bri, 15);
          strokeWeight(0.5);
          line(x, y, cos(prevTheta) * prevR, sin(prevTheta) * prevR);
        }
      }

      // Decorative arcs
      noFill();
      for (let ring = 1; ring <= 4; ring++) {
        let r = maxR * ring * 0.22;
        stroke(200, 30, 60, 10);
        strokeWeight(0.5);
        arc(0, 0, r * 2, r * 2, 0, wedgeAngle);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
