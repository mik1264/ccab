<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arc Diagram Proposal History — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; overflow:hidden; font-family:'Nunito',sans-serif; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
    svg text { font-family:'Nunito',sans-serif; }
    #viz { width:100vw; height:100vh; }
    .log { position:fixed; top:60px; right:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; max-height:70vh; overflow-y:auto; backdrop-filter:blur(8px); }
    .log h3 { font-family:'Lora',serif; font-size:13px; color:#58a6ff; margin-bottom:6px; }
    .log-entry { font-size:11px; color:#8b949e; margin-bottom:3px; font-family:'JetBrains Mono',monospace; }
    .log-entry.accepted { color:#3fb950; }
    .log-entry.rejected { color:#f85149; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Arc Diagram Proposal History</h2><p>An arc diagram traces every proposal made during the DA algorithm. Early proposals arc high; rejected proposals are thin dashed arcs; accepted ones solid.</p></div>
  <div class="log" id="log"><h3>Proposal Log</h3></div>
  <div id="viz"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select('#viz').append('svg').attr('width', W).attr('height', H);

    const menPrefs = {
      m1: ['w3','w1','w2','w4','w5'],
      m2: ['w1','w2','w3','w5','w4'],
      m3: ['w2','w3','w1','w4','w5'],
      m4: ['w3','w4','w1','w2','w5'],
      m5: ['w4','w5','w3','w1','w2']
    };
    const womenPrefs = {
      w1: ['m2','m1','m3','m4','m5'],
      w2: ['m3','m2','m1','m4','m5'],
      w3: ['m1','m3','m4','m2','m5'],
      w4: ['m4','m3','m5','m1','m2'],
      w5: ['m5','m4','m3','m2','m1']
    };

    // Run DA and record proposal history
    function runDA() {
      const proposals = [];
      const free = new Set(['m1','m2','m3','m4','m5']);
      const nextProp = { m1:0, m2:0, m3:0, m4:0, m5:0 };
      const matched = {};
      let round = 0;

      while (free.size > 0) {
        round++;
        const toProcess = [...free];
        for (const m of toProcess) {
          const w = menPrefs[m][nextProp[m]];
          nextProp[m]++;
          const currentM = matched[w];
          const wPref = womenPrefs[w];
          let accepted = false;
          let displaced = null;
          if (!currentM) {
            matched[w] = m;
            free.delete(m);
            accepted = true;
          } else if (wPref.indexOf(m) < wPref.indexOf(currentM)) {
            displaced = currentM;
            matched[w] = m;
            free.delete(m);
            free.add(currentM);
            accepted = true;
          }
          proposals.push({ man: m, woman: w, round, accepted, displaced });
        }
      }
      return proposals;
    }

    const proposals = runDA();
    const agents = ['m1','m2','m3','m4','m5','w1','w2','w3','w4','w5'];
    const manColors = { m1:'#58a6ff', m2:'#3fb950', m3:'#d2a8ff', m4:'#f0883e', m5:'#f778ba' };

    const margin = { left: 100, right: 100 };
    const baselineY = H * 0.72;
    const spacing = (W - margin.left - margin.right) / (agents.length - 1);

    const agentX = {};
    agents.forEach((a, i) => { agentX[a] = margin.left + i * spacing; });

    const maxRound = d3.max(proposals, d => d.round);

    // Glow filter
    const defs = svg.append('defs');
    const glow = defs.append('filter').attr('id', 'glow');
    glow.append('feGaussianBlur').attr('stdDeviation', 3).attr('result', 'blur');
    const feMerge = glow.append('feMerge');
    feMerge.append('feMergeNode').attr('in', 'blur');
    feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

    // Draw baseline
    svg.append('line')
      .attr('x1', margin.left - 30).attr('y1', baselineY)
      .attr('x2', W - margin.right + 30).attr('y2', baselineY)
      .attr('stroke', '#21262d').attr('stroke-width', 2);

    // Draw agent nodes
    agents.forEach(a => {
      const x = agentX[a];
      const isMan = a.startsWith('m');
      const color = isMan ? (manColors[a] || '#58a6ff') : '#d2a8ff';

      svg.append('circle')
        .attr('cx', x).attr('cy', baselineY).attr('r', 18)
        .attr('fill', '#161b22').attr('stroke', color).attr('stroke-width', 2);

      svg.append('text')
        .attr('x', x).attr('y', baselineY + 1)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('fill', color).attr('font-size', 12).attr('font-weight', 600)
        .text(a);

      svg.append('text')
        .attr('x', x).attr('y', baselineY + 36)
        .attr('text-anchor', 'middle')
        .attr('fill', '#484f58').attr('font-size', 10)
        .text(isMan ? 'Man' : 'Woman');
    });

    // Draw arcs with animation
    const arcGroup = svg.append('g');
    const logDiv = document.getElementById('log');

    proposals.forEach((p, i) => {
      const x1 = agentX[p.man];
      const x2 = agentX[p.woman];
      const midX = (x1 + x2) / 2;
      const arcHeight = 40 + p.round * 70 + Math.abs(x2 - x1) * 0.15;
      const arcY = baselineY - arcHeight;

      const path = arcGroup.append('path')
        .attr('d', `M${x1},${baselineY} Q${midX},${arcY} ${x2},${baselineY}`)
        .attr('fill', 'none')
        .attr('stroke', p.accepted ? manColors[p.man] : '#f85149')
        .attr('stroke-width', p.accepted ? 3 : 1.5)
        .attr('stroke-dasharray', p.accepted ? 'none' : '5,4')
        .attr('opacity', 0)
        .attr('filter', p.accepted ? 'url(#glow)' : null);

      path.transition()
        .delay(i * 400)
        .duration(500)
        .ease(d3.easeCubicOut)
        .attr('opacity', p.accepted ? 0.8 : 0.35);

      // Add log entry
      setTimeout(() => {
        const entry = document.createElement('div');
        entry.className = `log-entry ${p.accepted ? 'accepted' : 'rejected'}`;
        entry.textContent = `R${p.round}: ${p.man}→${p.woman} ${p.accepted ? '✓' : '✗'}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
      }, i * 400);
    });
  </script>
</body>
</html>
