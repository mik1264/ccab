<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Liquid Crystal Matching — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; }
    body { background:#0d1117; overflow:hidden; }
    canvas#c { position:fixed; top:0; left:0; width:100vw; height:100vh; display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; font-family:'Nunito',sans-serif; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); font-family:'Nunito',sans-serif; }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Liquid Crystal Matching</h2><p>Liquid crystal director field where the orientation encodes preference direction. Matched pairs create topological defects — beautiful stable structures in the nematic phase.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);
    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }`;
    function mkShader(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(sh));return sh;}
    function mkProg(fs){const pr=gl.createProgram();gl.attachShader(pr,mkShader(gl.VERTEX_SHADER,VS));gl.attachShader(pr,mkShader(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);return pr;}
    const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

    const FS = `
    precision highp float;
    uniform vec2 u_res;
    uniform float u_time;

    #define PI 3.14159265

    // Man positions (source of director field)
    vec2 manPos(int i) {
      if(i == 0) return vec2(-0.4, -0.3);
      if(i == 1) return vec2(-0.2, 0.2);
      if(i == 2) return vec2(0.1, -0.4);
      if(i == 3) return vec2(-0.5, 0.5);
      if(i == 4) return vec2(0.3, 0.0);
      return vec2(0.0);
    }

    // Preferred woman for each man
    vec2 womanPos(int i) {
      if(i == 0) return vec2(0.3, -0.2);
      if(i == 1) return vec2(0.4, 0.3);
      if(i == 2) return vec2(0.5, -0.3);
      if(i == 3) return vec2(0.2, 0.5);
      if(i == 4) return vec2(0.6, 0.1);
      return vec2(0.0);
    }

    // Director angle at a point, with topological defects at pair positions
    float directorAngle(vec2 p, float t) {
      float angle = 0.0;
      float totalWeight = 0.0;

      for(int i = 0; i < 5; i++) {
        vec2 mp = manPos(i);
        vec2 wp = womanPos(i);

        // Direction from man to woman
        vec2 dir = normalize(wp - mp);
        float baseAngle = atan(dir.y, dir.x);

        // +1/2 defect at man position
        vec2 dm = p - mp;
        float am = atan(dm.y, dm.x);
        float rm = length(dm);

        // -1/2 defect at woman position
        vec2 dw = p - wp;
        float aw = atan(dw.y, dw.x);
        float rw = length(dw);

        // Combine: +1/2 defect contributes half-angle winding
        angle += 0.5 * am;
        angle -= 0.5 * aw;

        // Weighted smooth director from preference direction
        float w = exp(-rm * 2.0) + exp(-rw * 2.0);
        angle += baseAngle * w * 0.3;
        totalWeight += w;
      }

      // Add slow temporal evolution
      angle += sin(t * 0.2) * 0.1;

      return angle;
    }

    vec3 hsv2rgb(vec3 c) {
      vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
      vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
      return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - 0.5*u_res) / u_res.y;
      float t = u_time;

      float theta = directorAngle(uv, t);

      // Schlieren texture: color by director angle (mod pi since directors are headless)
      float schlieren = cos(2.0 * theta);
      float schlieren2 = sin(2.0 * theta);

      // HSB color wheel based on director angle
      float hue = mod(theta / PI, 1.0);
      vec3 dirColor = hsv2rgb(vec3(hue, 0.7, 0.6));

      // Schlieren cross pattern (simulates crossed polarizers)
      float cross1 = abs(schlieren);
      float cross2 = abs(schlieren2);
      float intensity = cross1 * cross2;

      vec3 col = dirColor * (0.3 + 0.7 * intensity);

      // Highlight defect cores
      for(int i = 0; i < 5; i++) {
        vec2 mp = manPos(i);
        vec2 wp = womanPos(i);
        float dm = length(uv - mp);
        float dw = length(uv - wp);
        // Defect core glow
        col += vec3(0.3, 0.5, 1.0) * exp(-dm*dm*200.0) * 0.8;
        col += vec3(1.0, 0.4, 0.2) * exp(-dw*dw*200.0) * 0.8;
        // Defect core darkening (isotropic melt)
        col *= smoothstep(0.0, 0.08, dm);
        col *= smoothstep(0.0, 0.08, dw);
      }

      // Stripe overlay for texture
      float stripes = sin(uv.x * 40.0 * cos(theta) + uv.y * 40.0 * sin(theta));
      stripes = smoothstep(-0.1, 0.1, stripes);
      col = mix(col * 0.8, col * 1.1, stripes * 0.3);

      col = pow(col, vec3(0.4545));
      gl_FragColor = vec4(col, 1.0);
    }
    `;

    const prog = mkProg(FS);
    gl.useProgram(prog);
    const loc_p = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc_p);
    gl.vertexAttribPointer(loc_p, 2, gl.FLOAT, false, 0, 0);
    const loc_res = gl.getUniformLocation(prog, 'u_res');
    const loc_time = gl.getUniformLocation(prog, 'u_time');

    function frame(t) {
      gl.uniform2f(loc_res, canvas.width, canvas.height);
      gl.uniform1f(loc_time, t * 0.001);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
