<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thin-Film Iridescence — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Thin-Film Iridescence</h2><p>Like oil on water, preference compatibility creates iridescent interference colors. Matched pairs shine with complementary hues — a rainbow of compatibility.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);

    function mkShader(type, src) {
      const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
      return s;
    }
    function mkProg(vs, fs) {
      const p = gl.createProgram();
      gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
      gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(p); return p;
    }

    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0,1); }`;

    const FS = `
    precision mediump float;
    uniform float u_time;
    uniform vec2 u_res;

    // Spectral color from wavelength (380-780nm range mapped to 0-1)
    vec3 spectralColor(float w) {
      // Attempt physically-inspired spectral mapping
      vec3 col;
      float t;
      if (w < 0.17) {
        // Violet
        t = w / 0.17;
        col = vec3(0.4 + 0.2 * (1.0 - t), 0.0, 0.6 + 0.4 * t);
      } else if (w < 0.33) {
        // Blue
        t = (w - 0.17) / 0.16;
        col = vec3(0.1 * (1.0 - t), 0.1 * t, 1.0);
      } else if (w < 0.5) {
        // Cyan to Green
        t = (w - 0.33) / 0.17;
        col = vec3(0.0, 0.5 + 0.5 * t, 1.0 - t);
      } else if (w < 0.67) {
        // Green to Yellow
        t = (w - 0.5) / 0.17;
        col = vec3(t, 1.0, 0.0);
      } else if (w < 0.83) {
        // Yellow to Orange
        t = (w - 0.67) / 0.16;
        col = vec3(1.0, 1.0 - 0.5 * t, 0.0);
      } else {
        // Orange to Red
        t = (w - 0.83) / 0.17;
        col = vec3(1.0, 0.5 - 0.5 * t, 0.0);
      }
      return col;
    }

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      float aspect = u_res.x / u_res.y;
      vec2 p = (uv - 0.5) * vec2(aspect, 1.0);
      float t = u_time;

      // Film thickness varies across surface (oil slick shape)
      float thickness = 0.0;

      // Large-scale warping
      thickness += noise(p * 2.0 + t * 0.1) * 0.4;
      thickness += noise(p * 4.0 - t * 0.07) * 0.2;
      thickness += noise(p * 8.0 + t * 0.15) * 0.1;

      // Agent regions: each of 12 agents has a distinct thickness offset
      for (int i = 0; i < 6; i++) {
        float fi = float(i);
        vec2 agentPos = vec2(
          cos(fi * 1.047 + t * 0.08) * 0.3,
          sin(fi * 1.3 + t * 0.06) * 0.25
        );
        float d = distance(p, agentPos);
        float rank = fi / 5.0; // preference rank proxy
        thickness += rank * 0.15 * exp(-d * d * 8.0);
      }

      // Animate the overall thickness with time
      thickness += t * 0.03;

      // Thin-film interference: phase = 2*pi*n*d/lambda
      // For each RGB wavelength, compute interference
      float n = 1.4; // refractive index
      float phase = thickness * 12.0;

      // Sample three spectral points for RGB
      vec3 col = vec3(0.0);
      // Accumulate multiple wavelengths for smooth spectrum
      for (int w = 0; w < 12; w++) {
        float wavelength = float(w) / 11.0;
        float wavePhase = phase / (0.3 + wavelength * 0.7);
        float interference = 0.5 + 0.5 * cos(wavePhase * 6.28318);
        col += spectralColor(wavelength) * interference;
      }
      col /= 6.0; // Normalize

      // Surface reflectivity variation
      float fresnel = 0.3 + 0.7 * pow(1.0 - abs(dot(normalize(vec3(p, 1.0)), vec3(0.0, 0.0, 1.0))), 3.0);
      col *= fresnel;

      // Bubble-like circular distortions
      for (int i = 0; i < 4; i++) {
        float fi = float(i);
        vec2 bubblePos = vec2(
          sin(fi * 2.1 + t * 0.12) * 0.4,
          cos(fi * 1.7 + t * 0.09) * 0.3
        );
        float bubbleDist = distance(p, bubblePos);
        float bubbleRadius = 0.08 + 0.03 * sin(fi + t);
        float ring = abs(bubbleDist - bubbleRadius);
        float highlight = exp(-ring * ring * 2000.0);
        col += vec3(0.8, 0.9, 1.0) * highlight * 0.3;
      }

      // Dark water background visible through thin film
      float filmOpacity = 0.6 + 0.4 * noise(p * 3.0 + t * 0.05);
      vec3 waterCol = vec3(0.01, 0.02, 0.04);
      col = mix(waterCol, col, filmOpacity);

      // Vignette
      float vig = 1.0 - 0.35 * length(uv - 0.5);
      col *= vig;

      gl_FragColor = vec4(col, 1.0);
    }`;

    const prog = mkProg(VS, FS);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    const pLoc = gl.getAttribLocation(prog, 'p');
    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uRes = gl.getUniformLocation(prog, 'u_res');

    gl.useProgram(prog);
    gl.enableVertexAttribArray(pLoc);
    gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

    function frame(t) {
      gl.uniform1f(uTime, t * 0.001);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
