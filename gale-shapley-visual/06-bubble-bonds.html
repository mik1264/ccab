<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Bonds — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #c9d1d9; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background: #30363d; }
    #status { position:fixed;top:16px;right:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;padding:10px 16px;border-radius:12px;font-size:13px;color:#c9d1d9;backdrop-filter:blur(8px);z-index:100 }
    #status span { color:#da7ff7;font-weight:700 }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div id="status">Bonds: <span id="bc">0</span>/6</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 6;
    let proposers = [], receivers = [];
    let bonds = []; // {p, r, age}
    let bursts = [];
    let pulseRings = [];
    let tick = 0;
    let trail = [];

    function shuffled(n) {
      let a = []; for (let i = 0; i < n; i++) a.push(i);
      for (let i = n - 1; i > 0; i--) { let j = floor(random(i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }

    function initSim() {
      proposers = []; receivers = []; bonds = []; bursts = []; pulseRings = []; trail = []; tick = 0;

      for (let i = 0; i < N; i++) {
        proposers.push({
          x: random(width * 0.15, width * 0.85), y: random(height * 0.15, height * 0.85),
          vx: random(-0.5, 0.5), vy: random(-0.5, 0.5),
          prefs: shuffled(N), prefPtr: 0, matched: -1,
          sz: random(18, 28), hue: random(200, 240)
        });
      }
      for (let i = 0; i < N; i++) {
        receivers.push({
          x: random(width * 0.15, width * 0.85), y: random(height * 0.15, height * 0.85),
          vx: random(-0.5, 0.5), vy: random(-0.5, 0.5),
          prefs: shuffled(N), ranking: [], matched: -1,
          sz: random(18, 28), hue: random(310, 350)
        });
      }
      for (let r of receivers) {
        r.ranking = new Array(N);
        for (let k = 0; k < N; k++) r.ranking[r.prefs[k]] = k;
      }
      document.getElementById('bc').textContent = '0';
    }

    function tryBond(pi) {
      let p = proposers[pi];
      if (p.matched !== -1 || p.prefPtr >= N) return;
      let ri = p.prefs[p.prefPtr];
      p.prefPtr++;
      let r = receivers[ri];
      let d = dist(p.x, p.y, r.x, r.y);

      // Only bond when close enough
      if (d > 180) { p.prefPtr--; return; }

      pulseRings.push({ x: (p.x + r.x) / 2, y: (p.y + r.y) / 2, rad: 0, alpha: 200 });

      if (r.matched === -1) {
        p.matched = ri; r.matched = pi;
        bonds.push({ p: pi, r: ri, age: 0 });
      } else {
        if (r.ranking[pi] < r.ranking[r.matched]) {
          let oldP = r.matched;
          proposers[oldP].matched = -1;
          bonds = bonds.filter(b => !(b.p === oldP && b.r === ri));
          // Burst!
          for (let k = 0; k < 20; k++) {
            bursts.push({
              x: r.x, y: r.y, vx: random(-4, 4), vy: random(-4, 4),
              life: 60, color: [255, 100, 100]
            });
          }
          p.matched = ri; r.matched = pi;
          bonds.push({ p: pi, r: ri, age: 0 });
        }
      }
      document.getElementById('bc').textContent = bonds.length;
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 255);
      textFont('Segoe UI');
      initSim();
    }

    function draw() {
      // Alpha trail background
      colorMode(RGB);
      background(13, 17, 23, 30);
      colorMode(HSB, 360, 100, 100, 255);
      tick++;

      // Brownian motion
      for (let p of proposers) {
        p.vx += random(-0.15, 0.15); p.vy += random(-0.15, 0.15);
        p.vx *= 0.98; p.vy *= 0.98;
        if (p.matched === -1) { p.x += p.vx; p.y += p.vy; }
        p.x = constrain(p.x, 30, width - 30);
        p.y = constrain(p.y, 30, height - 30);
      }
      for (let r of receivers) {
        r.vx += random(-0.15, 0.15); r.vy += random(-0.15, 0.15);
        r.vx *= 0.98; r.vy *= 0.98;
        if (r.matched === -1) { r.x += r.vx; r.y += r.vy; }
        r.x = constrain(r.x, 30, width - 30);
        r.y = constrain(r.y, 30, height - 30);
      }

      // Bonded pairs orbit
      for (let b of bonds) {
        b.age++;
        let p = proposers[b.p], r = receivers[b.r];
        let cx = (p.x + r.x) / 2, cy = (p.y + r.y) / 2;
        let orbitR = 25 + sin(b.age * 0.01) * 5;
        let angle = b.age * 0.025;
        p.x = lerp(p.x, cx + cos(angle) * orbitR, 0.05);
        p.y = lerp(p.y, cy + sin(angle) * orbitR, 0.05);
        r.x = lerp(r.x, cx + cos(angle + PI) * orbitR, 0.05);
        r.y = lerp(r.y, cy + sin(angle + PI) * orbitR, 0.05);
        // Drift center
        cx += random(-0.3, 0.3); cy += random(-0.3, 0.3);
      }

      // Try proposals periodically
      if (tick % 60 === 0) {
        for (let i = 0; i < N; i++) tryBond(i);
      }

      // Draw bond arcs
      noFill();
      for (let b of bonds) {
        let p = proposers[b.p], r = receivers[b.r];
        let glow = map(sin(tick * 0.04 + b.p), -1, 1, 100, 255);
        colorMode(RGB);
        stroke(255, 215, 80, glow); strokeWeight(2);
        line(p.x, p.y, r.x, r.y);
        // Glow
        stroke(255, 215, 80, glow * 0.2); strokeWeight(6);
        line(p.x, p.y, r.x, r.y);
        colorMode(HSB, 360, 100, 100, 255);
      }

      // Draw pulse rings
      colorMode(RGB);
      for (let i = pulseRings.length - 1; i >= 0; i--) {
        let pr = pulseRings[i];
        pr.rad += 3; pr.alpha -= 4;
        if (pr.alpha <= 0) { pulseRings.splice(i, 1); continue; }
        noFill(); stroke(255, 255, 255, pr.alpha); strokeWeight(1.5);
        ellipse(pr.x, pr.y, pr.rad);
      }

      // Draw bursts
      for (let i = bursts.length - 1; i >= 0; i--) {
        let b = bursts[i];
        b.x += b.vx; b.y += b.vy; b.vx *= 0.96; b.vy *= 0.96; b.life--;
        if (b.life <= 0) { bursts.splice(i, 1); continue; }
        let a = map(b.life, 0, 60, 0, 255);
        fill(b.color[0], b.color[1], b.color[2], a); noStroke();
        ellipse(b.x, b.y, map(b.life, 0, 60, 1, 5));
      }

      // Draw proposers (blue bubbles)
      colorMode(HSB, 360, 100, 100, 255);
      noStroke();
      for (let i = 0; i < N; i++) {
        let p = proposers[i];
        let gs = p.sz + sin(tick * 0.02 + i) * 3;
        fill(p.hue, 70, 90, 15); ellipse(p.x, p.y, gs * 3);
        fill(p.hue, 70, 90, 40); ellipse(p.x, p.y, gs * 1.8);
        fill(p.hue, 60, 95, 220); ellipse(p.x, p.y, gs);
        // Highlight
        fill(0, 0, 100, 60);
        ellipse(p.x - gs * 0.15, p.y - gs * 0.15, gs * 0.35);
        // Label
        colorMode(RGB);
        fill(255); textAlign(CENTER, CENTER); textSize(9);
        text('P' + (i + 1), p.x, p.y);
        colorMode(HSB, 360, 100, 100, 255);
      }

      // Draw receivers (pink bubbles)
      for (let i = 0; i < N; i++) {
        let r = receivers[i];
        let gs = r.sz + sin(tick * 0.02 + i + 3) * 3;
        fill(r.hue, 60, 90, 15); ellipse(r.x, r.y, gs * 3);
        fill(r.hue, 60, 90, 40); ellipse(r.x, r.y, gs * 1.8);
        fill(r.hue, 55, 95, 220); ellipse(r.x, r.y, gs);
        fill(0, 0, 100, 60);
        ellipse(r.x - gs * 0.15, r.y - gs * 0.15, gs * 0.35);
        colorMode(RGB);
        fill(255); textAlign(CENTER, CENTER); textSize(9);
        text('R' + (i + 1), r.x, r.y);
        colorMode(HSB, 360, 100, 100, 255);
      }

      // Restart when all matched
      if (bonds.length === N && tick % 600 === 0) initSim();
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
