<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Bonds — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Nunito', sans-serif; }
    .back-link { position: fixed; top: 16px; left: 16px; background: rgba(22,27,34,0.9); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; transition: background 0.2s; }
    .back-link:hover { background: #30363d; }
    .info { position: fixed; top: 60px; left: 16px; background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 10px; padding: 12px 16px; z-index: 50; max-width: 280px; backdrop-filter: blur(8px); }
    .info h2 { font-family: 'Lora', serif; font-size: 15px; color: #58a6ff; margin-bottom: 4px; }
    .info p { font-size: 12px; color: #8b949e; line-height: 1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info">
    <h2>Bubble Bonds</h2>
    <p>Agents float as colored bubbles. When two compatible bubbles meet, they bond and float upward together -- but only if no better match awaits.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 6;
    let bubbles = [];
    let menPrefs = [], womenPrefs = [];
    let bondCount = 0;
    let noiseOffsets = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      initSim();
    }

    function shuffleArr(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initSim() {
      bubbles = [];
      noiseOffsets = [];
      bondCount = 0;
      menPrefs = [];
      womenPrefs = [];

      for (let i = 0; i < N; i++) {
        menPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
        womenPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
      }

      // Men: warm colors (0-60 hue)
      for (let i = 0; i < N; i++) {
        let h = map(i, 0, N - 1, 0, 50);
        bubbles.push({
          x: random(100, width - 100),
          y: random(100, height - 100),
          r: 25 + random(10),
          hue: h, sat: 70, bri: 85,
          type: 'M', id: i,
          matched: false, matchedTo: -1,
          bondedWith: null,
          noiseOff: random(1000)
        });
      }
      // Women: cool colors (180-280 hue)
      for (let i = 0; i < N; i++) {
        let h = map(i, 0, N - 1, 190, 270);
        bubbles.push({
          x: random(100, width - 100),
          y: random(100, height - 100),
          r: 25 + random(10),
          hue: h, sat: 60, bri: 80,
          type: 'W', id: i,
          matched: false, matchedTo: -1,
          bondedWith: null,
          noiseOff: random(1000)
        });
      }
    }

    function getBubble(type, id) {
      return bubbles.find(b => b.type === type && b.id === id);
    }

    function draw() {
      background(220, 20, 6, 12);

      // Underwater light rays
      for (let i = 0; i < 5; i++) {
        let x1 = width * (0.1 + 0.2 * i) + sin(frameCount * 0.005 + i) * 50;
        noFill();
        stroke(200, 15, 30, 3);
        strokeWeight(40);
        line(x1, 0, x1 + 30, height);
      }

      // Update and draw bubbles
      for (let b of bubbles) {
        // Perlin noise movement
        let nx = noise(b.noiseOff, frameCount * 0.003) * 2 - 1;
        let ny = noise(b.noiseOff + 100, frameCount * 0.003) * 2 - 1;

        if (!b.matched) {
          b.x += nx * 1.5;
          b.y += ny * 1.2 - 0.15; // Slight upward drift
        } else {
          // Bonded: float upward faster, stay together
          if (b.bondedWith) {
            let partner = b.bondedWith;
            let cx = (b.x + partner.x) / 2;
            let cy = (b.y + partner.y) / 2;
            b.x = lerp(b.x, cx + (b.type === 'M' ? -12 : 12), 0.03);
            b.y = lerp(b.y, cy, 0.03);
            b.y -= 0.5; // Float up
          }
        }

        // Wrap
        if (b.y < -b.r * 2) { b.y = height + b.r; b.x = random(100, width - 100); }
        if (b.x < -b.r) b.x = width + b.r;
        if (b.x > width + b.r) b.x = -b.r;

        // Check for bonding
        if (!b.matched && b.type === 'M') {
          for (let other of bubbles) {
            if (other.type !== 'W' || other.matched) continue;
            let d = dist(b.x, b.y, other.x, other.y);
            if (d < b.r + other.r) {
              let mRank = menPrefs[b.id].indexOf(other.id);
              let wRank = womenPrefs[other.id].indexOf(b.id);
              if (mRank < 3 && wRank < 3) {
                // Bond!
                b.matched = true;
                b.matchedTo = other.id;
                b.bondedWith = other;
                other.matched = true;
                other.matchedTo = b.id;
                other.bondedWith = b;
                // Merge appearance
                let newR = (b.r + other.r) * 0.7;
                b.r = newR;
                other.r = newR;
                bondCount++;
              }
            }
          }
        }

        // Draw bubble
        noStroke();

        // Outer glow
        let glowSize = b.r * 2.5;
        fill(b.hue, b.sat * 0.5, b.bri, 8);
        ellipse(b.x, b.y, glowSize, glowSize);

        // Main bubble
        fill(b.hue, b.sat, b.bri, b.matched ? 70 : 45);
        ellipse(b.x, b.y, b.r * 2, b.r * 2);

        // Inner highlight
        fill(b.hue, b.sat * 0.3, 100, 25);
        ellipse(b.x - b.r * 0.25, b.y - b.r * 0.25, b.r * 0.8, b.r * 0.8);

        // Specular highlight
        fill(0, 0, 100, 30);
        ellipse(b.x - b.r * 0.3, b.y - b.r * 0.35, b.r * 0.35, b.r * 0.25);

        // Bond ring
        if (b.matched) {
          noFill();
          stroke(120, 70, 80, 40 + sin(frameCount * 0.06) * 20);
          strokeWeight(2);
          ellipse(b.x, b.y, b.r * 2.4, b.r * 2.4);
        }

        // Label
        noStroke();
        fill(0, 0, 100, 60);
        textAlign(CENTER, CENTER);
        textSize(9);
        text(b.type + (b.id + 1), b.x, b.y);
      }

      // Draw bond lines
      let drawn = new Set();
      for (let b of bubbles) {
        if (b.matched && b.bondedWith && !drawn.has(b.id + '-' + b.bondedWith.id)) {
          stroke(120, 60, 80, 50);
          strokeWeight(1.5);
          line(b.x, b.y, b.bondedWith.x, b.bondedWith.y);
          drawn.add(b.id + '-' + b.bondedWith.id);
          drawn.add(b.bondedWith.id + '-' + b.id);
        }
      }

      // Status
      noStroke();
      fill(0, 0, 80, 60);
      textAlign(RIGHT, TOP);
      textSize(13);
      text('Bonds: ' + bondCount + '/' + N, width - 20, 20);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
