<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crystal Growth Matching — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Crystal Growth Matching</h2><p>A crystal grows from seeds placed at stable match positions. The crystal structure encodes the symmetry of the stable matching lattice.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);

    function mkShader(type, src) {
      const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
      return s;
    }
    function mkProg(vs, fs) {
      const p = gl.createProgram();
      gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
      gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(p); return p;
    }

    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0,1); }`;

    const FS = `
    precision mediump float;
    uniform float u_time;
    uniform vec2 u_res;

    // Seed positions (stable match pairs)
    vec2 seeds[6];

    void initSeeds() {
      seeds[0] = vec2(-0.3, -0.2);
      seeds[1] = vec2(0.2, -0.35);
      seeds[2] = vec2(-0.15, 0.25);
      seeds[3] = vec2(0.35, 0.1);
      seeds[4] = vec2(0.0, -0.05);
      seeds[5] = vec2(-0.25, 0.4);
    }

    // Smooth minimum for organic crystal shapes
    float smin(float a, float b, float k) {
      float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
      return mix(b, a, h) - k * h * (1.0 - h);
    }

    // Hash function for pseudo-random
    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }

    // Simple noise
    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }

    // Interference colors (thin-film like)
    vec3 spectralColor(float t) {
      vec3 a = vec3(0.5, 0.5, 0.5);
      vec3 b = vec3(0.5, 0.5, 0.5);
      vec3 c = vec3(1.0, 1.0, 1.0);
      vec3 d = vec3(0.0, 0.33, 0.67);
      return a + b * cos(6.28318 * (c * t + d));
    }

    void main() {
      initSeeds();
      vec2 uv = gl_FragCoord.xy / u_res;
      float aspect = u_res.x / u_res.y;
      vec2 p = (uv - 0.5) * vec2(aspect, 1.0);
      float t = u_time;

      // Crystal growth radius expands over time
      float growRadius = t * 0.04;

      // Distance field from all seeds with smooth min
      float dist = 999.0;
      float nearestSeed = 0.0;
      for (int i = 0; i < 6; i++) {
        float d = distance(p, seeds[i]);
        if (d < dist) {
          nearestSeed = float(i);
        }
        dist = smin(dist, d, 0.15);
      }

      // Crystal surface: fractal noise modulated distance
      float crystalNoise = noise(p * 8.0 + t * 0.1) * 0.05;
      crystalNoise += noise(p * 16.0 - t * 0.05) * 0.025;
      crystalNoise += noise(p * 32.0 + t * 0.15) * 0.0125;

      float crystalDist = dist + crystalNoise;

      // Inside crystal?
      float inside = smoothstep(growRadius + 0.01, growRadius - 0.01, crystalDist);

      // Color by distance from nearest seed (interference colors)
      float colorParam = dist * 3.0 + nearestSeed * 0.15 + t * 0.05;
      vec3 crystalCol = spectralColor(colorParam);

      // Glow at crystal surface
      float surfaceGlow = exp(-abs(crystalDist - growRadius) * 30.0);
      vec3 glowCol = vec3(0.4, 0.7, 1.0) * surfaceGlow;

      // Seed point bright spots
      float seedGlow = 0.0;
      for (int i = 0; i < 6; i++) {
        float d = distance(p, seeds[i]);
        seedGlow += exp(-d * d * 300.0);
      }

      // Compose
      vec3 col = vec3(0.01, 0.01, 0.03); // Background
      col = mix(col, crystalCol * 0.7, inside);
      col += glowCol * 0.8;
      col += vec3(0.9, 0.95, 1.0) * seedGlow;

      // Internal facets: bright lines at noise ridges
      float facets = abs(fract(noise(p * 12.0 + t * 0.02) * 4.0) - 0.5);
      facets = smoothstep(0.02, 0.0, facets) * inside;
      col += vec3(0.3, 0.4, 0.6) * facets * 0.3;

      // Vignette
      float vig = 1.0 - 0.3 * length(uv - 0.5);
      col *= vig;

      gl_FragColor = vec4(col, 1.0);
    }`;

    const prog = mkProg(VS, FS);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    const pLoc = gl.getAttribLocation(prog, 'p');
    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uRes = gl.getUniformLocation(prog, 'u_res');

    gl.useProgram(prog);
    gl.enableVertexAttribArray(pLoc);
    gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

    function frame(t) {
      gl.uniform1f(uTime, t * 0.001);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
