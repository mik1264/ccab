<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallel Stable Worlds</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'Nunito',sans-serif; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
.back-link:hover { background:#30363d; }
.info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
.info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
.info p { font-size:12px; color:#8b949e; line-height:1.4; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Visual Gallery</a>
<div class="info">
<h2>Parallel Stable Worlds</h2>
<p>Three side-by-side windows show three stable matchings simultaneously — parallel universes of the same preference structure, each stable but different.</p>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener('resize', resize);

const N = 5;
const menNames = ['M1','M2','M3','M4','M5'];
const womenNames = ['W1','W2','W3','W4','W5'];

// Fixed preference structure that admits 3 stable matchings
const menPrefs = [
    [0,1,2,3,4], [1,0,3,2,4], [2,3,0,4,1],
    [3,2,4,0,1], [4,0,1,2,3]
];
const womenPrefs = [
    [1,0,2,3,4], [0,1,3,2,4], [3,2,0,4,1],
    [2,3,4,0,1], [0,4,1,2,3]
];

function galeShapley(mPrefs, wPrefs) {
    let menPartner = Array(N).fill(-1);
    let womenPartner = Array(N).fill(-1);
    let menNext = Array(N).fill(0);
    let free = [...Array(N).keys()];
    while (free.length > 0) {
        let m = free[0];
        let w = mPrefs[m][menNext[m]];
        menNext[m]++;
        if (womenPartner[w] === -1) {
            menPartner[m] = w; womenPartner[w] = m; free.shift();
        } else {
            let curr = womenPartner[w];
            if (wPrefs[w].indexOf(m) < wPrefs[w].indexOf(curr)) {
                menPartner[m] = w; womenPartner[w] = m; menPartner[curr] = -1;
                free.shift(); free.push(curr);
            }
        }
    }
    return menPartner;
}

// Men-optimal matching
const matching1 = galeShapley(menPrefs, womenPrefs);

// Women-optimal matching (swap roles)
function galeShapleyWO() {
    let womenPartner = Array(N).fill(-1);
    let menPartner = Array(N).fill(-1);
    let womenNext = Array(N).fill(0);
    let free = [...Array(N).keys()];
    while (free.length > 0) {
        let w = free[0];
        let m = womenPrefs[w][womenNext[w]];
        womenNext[w]++;
        if (menPartner[m] === -1) {
            womenPartner[w] = m; menPartner[m] = w; free.shift();
        } else {
            let curr = menPartner[m];
            if (menPrefs[m].indexOf(w) < menPrefs[m].indexOf(curr)) {
                womenPartner[w] = m; menPartner[m] = w; womenPartner[curr] = -1;
                free.shift(); free.push(curr);
            }
        }
    }
    // Convert: menPartner[m] = w
    let result = Array(N).fill(-1);
    for (let m = 0; m < N; m++) result[m] = menPartner[m];
    return result;
}
const matching3 = galeShapleyWO();

// Middle matching: a rotation of men-optimal
function createMiddleMatching() {
    // Create a matching that's different from both
    let mid = [...matching1];
    // Try swapping pairs to find a different stable matching
    for (let i = 0; i < N; i++) {
        for (let j = i+1; j < N; j++) {
            let test = [...mid];
            test[i] = mid[j]; test[j] = mid[i];
            if (isStable(test)) { return test; }
        }
    }
    // Fallback: slightly modify
    let alt = [...matching3];
    for (let i = 0; i < N; i++) {
        for (let j = i+1; j < N; j++) {
            let test = [...alt];
            test[i] = alt[j]; test[j] = alt[i];
            if (isStable(test) && !arrEq(test, matching1) && !arrEq(test, matching3)) return test;
        }
    }
    return mid; // fallback to same as matching1
}

function arrEq(a, b) { return a.every((v,i) => v === b[i]); }

function isStable(matching) {
    for (let m = 0; m < N; m++) {
        let w = matching[m];
        // Check if m prefers some w' over w, and w' prefers m over her partner
        let mRankW = menPrefs[m].indexOf(w);
        for (let r = 0; r < mRankW; r++) {
            let wp = menPrefs[m][r];
            let mp = -1;
            for (let k = 0; k < N; k++) if (matching[k] === wp) mp = k;
            if (womenPrefs[wp].indexOf(m) < womenPrefs[wp].indexOf(mp)) return false;
        }
    }
    return true;
}

const matching2 = createMiddleMatching();

const matchings = [matching1, matching2, matching3];
const panelColors = ['#3fb950', '#e3b341', '#bc8cff'];
const panelLabels = ['Men-Optimal', 'Middle Stable', 'Women-Optimal'];

let time = 0;
let edgeProgress = 0;
let cycleTimer = 0;
let drawing = true;

function drawPanel(panelIdx, x, w, h) {
    const matching = matchings[panelIdx];
    const color = panelColors[panelIdx];
    const label = panelLabels[panelIdx];
    const padX = 50;
    const padTop = 100;
    const padBottom = 60;
    const nodeR = 12;
    const spacing = (h - padTop - padBottom) / (N - 1);

    // Panel background
    ctx.fillStyle = 'rgba(13,17,23,0.3)';
    ctx.fillRect(x, 0, w, h);

    // Label
    ctx.fillStyle = color;
    ctx.font = '600 16px Lora';
    ctx.textAlign = 'center';
    ctx.fillText(label, x + w/2, 55);

    // Men nodes (left side of panel)
    const menX = x + padX + 20;
    const womenX = x + w - padX - 20;

    for (let i = 0; i < N; i++) {
        const y = padTop + i * spacing;
        const pulse = 1 + 0.15 * Math.sin(time * 3 + i + panelIdx);

        // Men node
        ctx.beginPath();
        ctx.arc(menX, y, nodeR * pulse, 0, Math.PI * 2);
        ctx.fillStyle = '#58a6ff';
        ctx.fill();
        ctx.strokeStyle = 'rgba(88,166,255,0.3)';
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = '#e6edf3';
        ctx.font = '600 10px Nunito';
        ctx.textAlign = 'center';
        ctx.fillText(menNames[i], menX, y + 4);

        // Women node
        ctx.beginPath();
        ctx.arc(womenX, y, nodeR * pulse, 0, Math.PI * 2);
        ctx.fillStyle = '#d2a8ff';
        ctx.fill();
        ctx.strokeStyle = 'rgba(210,168,255,0.3)';
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = '#e6edf3';
        ctx.fillText(womenNames[i], womenX, y + 4);
    }

    // Matching edges
    for (let m = 0; m < N; m++) {
        const w_idx = matching[m];
        const y1 = padTop + m * spacing;
        const y2 = padTop + w_idx * spacing;

        const prog = Math.min(1, Math.max(0, edgeProgress - m * 0.15));
        if (prog <= 0) continue;

        const curX = menX + (womenX - menX) * prog;
        const curY = y1 + (y2 - y1) * prog;

        ctx.beginPath();
        ctx.moveTo(menX, y1);

        // Curved edge
        const cpx = (menX + curX) / 2;
        const cpy1 = y1 + (curY - y1) * 0.3 - 15;
        ctx.quadraticCurveTo(cpx, cpy1, curX, curY);

        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.globalAlpha = 0.8;
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Traveling dot
        if (prog < 1) {
            ctx.beginPath();
            ctx.arc(curX, curY, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
        }
    }
}

function animate() {
    requestAnimationFrame(animate);
    time += 0.016;
    cycleTimer += 0.016;

    if (drawing) {
        edgeProgress += 0.008;
        if (edgeProgress > 2) drawing = false;
    }

    if (cycleTimer > 8) {
        cycleTimer = 0;
        edgeProgress = 0;
        drawing = true;
    }

    const w = canvas.width;
    const h = canvas.height;

    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, w, h);

    const panelW = w / 3;

    // Dividers
    ctx.fillStyle = '#21262d';
    ctx.fillRect(panelW - 1, 0, 2, h);
    ctx.fillRect(panelW * 2 - 1, 0, 2, h);

    for (let i = 0; i < 3; i++) {
        drawPanel(i, i * panelW, panelW, h);
    }

    // Subtle particle background
    for (let i = 0; i < 30; i++) {
        const px = (Math.sin(time * 0.2 + i * 137.5) * 0.5 + 0.5) * w;
        const py = (Math.cos(time * 0.15 + i * 97.3) * 0.5 + 0.5) * h;
        ctx.beginPath();
        ctx.arc(px, py, 1, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(88,166,255,0.1)';
        ctx.fill();
    }
}

animate();
</script>
</body>
</html>
