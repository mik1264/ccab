<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Force-Directed DA Animation — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; overflow:hidden; font-family:'Nunito',sans-serif; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
    svg text { font-family:'Nunito',sans-serif; }
    #viz { width:100vw; height:100vh; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Force-Directed DA Animation</h2><p>Men and women as force-directed nodes. Preference forces attract compatible pairs; stability forces repel blocking pairs. Watch the network settle.</p></div>
  <div id="viz"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select('#viz').append('svg').attr('width', W).attr('height', H);

    const menPrefs = {
      m1: ['w3','w1','w2','w4','w5'],
      m2: ['w1','w2','w3','w5','w4'],
      m3: ['w2','w3','w1','w4','w5'],
      m4: ['w3','w4','w1','w2','w5'],
      m5: ['w4','w5','w3','w1','w2']
    };
    const womenPrefs = {
      w1: ['m2','m1','m3','m4','m5'],
      w2: ['m3','m2','m1','m4','m5'],
      w3: ['m1','m3','m4','m2','m5'],
      w4: ['m4','m3','m5','m1','m2'],
      w5: ['m5','m4','m3','m2','m1']
    };
    const menOptimal = { m1:'w3', m2:'w1', m3:'w2', m4:'w4', m5:'w5' };

    const men = ['m1','m2','m3','m4','m5'];
    const women = ['w1','w2','w3','w4','w5'];

    const nodes = [
      ...men.map((m, i) => ({ id: m, type: 'man', x: W * 0.3 + Math.random() * 40, y: H * 0.2 + i * (H * 0.15) })),
      ...women.map((w, i) => ({ id: w, type: 'woman', x: W * 0.7 + Math.random() * 40, y: H * 0.2 + i * (H * 0.15) }))
    ];

    // Build edges with preference strengths
    const edges = [];
    men.forEach(m => {
      menPrefs[m].forEach((w, rank) => {
        const wRank = womenPrefs[w].indexOf(m);
        const isMatch = menOptimal[m] === w;
        const mutualStrength = (10 - rank - wRank) / 10;
        edges.push({
          source: m, target: w,
          rank, wRank, isMatch, mutualStrength
        });
      });
    });

    // Glow filter
    const defs = svg.append('defs');
    const glow = defs.append('filter').attr('id', 'glow');
    glow.append('feGaussianBlur').attr('stdDeviation', 4).attr('result', 'blur');
    const fm = glow.append('feMerge');
    fm.append('feMergeNode').attr('in', 'blur');
    fm.append('feMergeNode').attr('in', 'SourceGraphic');

    // Draw edges
    const linkGroup = svg.append('g');
    const link = linkGroup.selectAll('line')
      .data(edges)
      .enter().append('line')
      .attr('stroke', d => d.isMatch ? '#3fb950' : '#21262d')
      .attr('stroke-width', d => d.isMatch ? 3 : Math.max(0.3, 1.5 - d.rank * 0.3))
      .attr('opacity', d => d.isMatch ? 0.9 : Math.max(0.05, 0.3 - d.rank * 0.06))
      .attr('filter', d => d.isMatch ? 'url(#glow)' : null);

    // Draw nodes
    const nodeGroup = svg.append('g');
    const node = nodeGroup.selectAll('g')
      .data(nodes)
      .enter().append('g')
      .call(d3.drag()
        .on('start', dragstarted)
        .on('drag', dragged)
        .on('end', dragended));

    node.append('circle')
      .attr('r', 22)
      .attr('fill', '#161b22')
      .attr('stroke', d => d.type === 'man' ? '#58a6ff' : '#d2a8ff')
      .attr('stroke-width', 2.5);

    node.append('text')
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'central')
      .attr('fill', d => d.type === 'man' ? '#58a6ff' : '#d2a8ff')
      .attr('font-size', 13)
      .attr('font-weight', 600)
      .text(d => d.id);

    // Force simulation
    const simulation = d3.forceSimulation(nodes)
      .force('charge', d3.forceManyBody().strength(-200))
      .force('center', d3.forceCenter(W / 2, H / 2))
      .force('collision', d3.forceCollide(35))
      .force('link', d3.forceLink(edges)
        .id(d => d.id)
        .distance(d => d.isMatch ? 80 : 200 + d.rank * 30)
        .strength(d => d.isMatch ? 0.5 : 0.02)
      )
      .force('x', d3.forceX(d => d.type === 'man' ? W * 0.35 : W * 0.65).strength(0.05))
      .force('y', d3.forceY(H / 2).strength(0.02))
      .on('tick', ticked);

    function ticked() {
      link
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    }

    function dragstarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x; d.fy = d.y;
    }
    function dragged(event, d) {
      d.fx = event.x; d.fy = event.y;
    }
    function dragended(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null; d.fy = null;
    }

    // Gradually strengthen match links
    setTimeout(() => {
      simulation.force('link')
        .strength(d => d.isMatch ? 0.8 : 0.005);
      simulation.alpha(0.5).restart();
    }, 3000);

    // Pulse matched edges
    function pulseMatches() {
      link.filter(d => d.isMatch)
        .transition().duration(1000)
        .attr('stroke-width', 5)
        .attr('opacity', 1)
        .transition().duration(1000)
        .attr('stroke-width', 3)
        .attr('opacity', 0.9)
        .on('end', function(d, i) { if (i === 0) pulseMatches(); });
    }
    setTimeout(pulseMatches, 5000);
  </script>
</body>
</html>
