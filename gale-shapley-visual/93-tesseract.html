<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4D Tesseract Matching</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'Nunito',sans-serif; overflow:hidden; }
.back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
.back-link:hover { background:#30363d; }
.info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
.info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
.info p { font-size:12px; color:#8b949e; line-height:1.4; }
.legend { position:fixed; bottom:20px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; backdrop-filter:blur(8px); }
.legend-item { display:flex; align-items:center; gap:8px; margin:4px 0; font-size:12px; }
.legend-dot { width:10px; height:10px; border-radius:50%; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Visual Gallery</a>
<div class="info">
<h2>4D Tesseract Matching</h2>
<p>A tesseract (4D hypercube) projected into 3D space. Each vertex is a potential matching state; the stable matching is the energetically minimal vertex.</p>
</div>
<div class="legend">
<div class="legend-item"><div class="legend-dot" style="background:#ffd700;"></div> Stable Matching</div>
<div class="legend-item"><div class="legend-dot" style="background:#58a6ff;"></div> Men-Optimal</div>
<div class="legend-item"><div class="legend-dot" style="background:#d2a8ff;"></div> Women-Optimal</div>
<div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.5);"></div> Other States</div>
</div>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x0d1117);
document.body.appendChild(renderer.domElement);

// Generate 4D tesseract vertices
const vertices4D = [];
for (let i = 0; i < 16; i++) {
    vertices4D.push([
        (i & 1) ? 1 : -1,
        (i & 2) ? 1 : -1,
        (i & 4) ? 1 : -1,
        (i & 8) ? 1 : -1
    ]);
}

// Edges: connect vertices that differ in exactly one coordinate
const edges = [];
for (let i = 0; i < 16; i++) {
    for (let j = i+1; j < 16; j++) {
        let diff = 0;
        for (let d = 0; d < 4; d++) {
            if (vertices4D[i][d] !== vertices4D[j][d]) diff++;
        }
        if (diff === 1) edges.push([i, j]);
    }
}

// Special vertices
const stableVertex = 0;      // gold
const menOptimal = 5;         // blue
const womenOptimal = 10;      // purple

// 4D to 3D projection with rotation in XW plane
function project4Dto3D(v4, angle) {
    const cosA = Math.cos(angle);
    const sinA = Math.sin(angle);
    // Rotate in XW plane
    const x = v4[0] * cosA - v4[3] * sinA;
    const w = v4[0] * sinA + v4[3] * cosA;
    // Also rotate in YZ plane for visual interest
    const angle2 = angle * 0.7;
    const y = v4[1] * Math.cos(angle2) - v4[2] * Math.sin(angle2);
    const z = v4[1] * Math.sin(angle2) + v4[2] * Math.cos(angle2);
    // Perspective projection from 4D
    const d = 3;
    const scale = d / (d - w);
    return new THREE.Vector3(x * scale, y * scale, z * scale);
}

// Create vertex meshes
const vertexMeshes = [];
vertices4D.forEach((v, i) => {
    let color, size;
    if (i === stableVertex) { color = 0xffd700; size = 0.1; }
    else if (i === menOptimal) { color = 0x58a6ff; size = 0.08; }
    else if (i === womenOptimal) { color = 0xd2a8ff; size = 0.08; }
    else { color = 0xffffff; size = 0.04; }

    const geo = new THREE.SphereGeometry(size, 16, 16);
    const mat = new THREE.MeshBasicMaterial({
        color: color,
        transparent: i !== stableVertex && i !== menOptimal && i !== womenOptimal,
        opacity: (i === stableVertex || i === menOptimal || i === womenOptimal) ? 1.0 : 0.4
    });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);
    vertexMeshes.push(mesh);

    // Glow for special vertices
    if (i === stableVertex || i === menOptimal || i === womenOptimal) {
        const glowGeo = new THREE.SphereGeometry(size * 2.5, 16, 16);
        const glowMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.12 });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        scene.add(glow);
        mesh.userData.glow = glow;
    }
});

// Edge lines
const edgeLines = [];
edges.forEach(e => {
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(6);
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    // Color based on whether edge connects special vertices
    let color = 0x2a3040;
    let opacity = 0.25;
    if (e.includes(stableVertex)) { color = 0xffd700; opacity = 0.5; }
    else if (e.includes(menOptimal)) { color = 0x58a6ff; opacity = 0.35; }
    else if (e.includes(womenOptimal)) { color = 0xd2a8ff; opacity = 0.35; }

    const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    edgeLines.push({ line, geo, edge: e });
});

let t = 0;
function animate() {
    requestAnimationFrame(animate);
    t += 0.004;

    const angle = t;

    // Update vertex positions
    vertices4D.forEach((v4, i) => {
        const p = project4Dto3D(v4, angle);
        vertexMeshes[i].position.copy(p);
        if (vertexMeshes[i].userData.glow) {
            vertexMeshes[i].userData.glow.position.copy(p);
        }
        // Pulse stable vertex
        if (i === stableVertex) {
            const s = 1 + 0.3 * Math.sin(t * 5);
            vertexMeshes[i].scale.setScalar(s);
        }
    });

    // Update edge positions
    edgeLines.forEach(el => {
        const p1 = vertexMeshes[el.edge[0]].position;
        const p2 = vertexMeshes[el.edge[1]].position;
        const pos = el.geo.attributes.position.array;
        pos[0] = p1.x; pos[1] = p1.y; pos[2] = p1.z;
        pos[3] = p2.x; pos[4] = p2.y; pos[5] = p2.z;
        el.geo.attributes.position.needsUpdate = true;
    });

    // Slow 3D rotation
    scene.rotation.y = Math.sin(t * 0.2) * 0.3;
    scene.rotation.x = Math.sin(t * 0.15) * 0.15;

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
