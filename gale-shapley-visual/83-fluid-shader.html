<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Matching Flow — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; }
    body { background:#0d1117; overflow:hidden; }
    canvas#c { position:fixed; top:0; left:0; width:100vw; height:100vh; display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; font-family:'Nunito',sans-serif; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); font-family:'Nunito',sans-serif; }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Fluid Matching Flow</h2><p>Fluid dynamics encoded as a fragment shader. Preference intensity becomes fluid density; stable matchings appear as vortices in the flow field.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);
    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }`;
    function mkShader(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(sh));return sh;}
    function mkProg(fs){const pr=gl.createProgram();gl.attachShader(pr,mkShader(gl.VERTEX_SHADER,VS));gl.attachShader(pr,mkShader(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);return pr;}
    const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

    const FS = `
    precision highp float;
    uniform vec2 u_res;
    uniform float u_time;

    // Matched pair midpoints (vortex centers)
    vec2 pairPos(int i) {
      if(i == 0) return vec2(-0.4, -0.3);
      if(i == 1) return vec2(0.3, -0.4);
      if(i == 2) return vec2(0.0, 0.2);
      if(i == 3) return vec2(-0.5, 0.4);
      if(i == 4) return vec2(0.4, 0.3);
      return vec2(0.0);
    }

    // Is this a man's vortex (0) or woman's (1)?
    float pairType(int i) {
      if(i < 5) return 0.0;
      return 1.0;
    }

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f*f*(3.0-2.0*f);
      float a = hash(i);
      float b = hash(i+vec2(1,0));
      float c = hash(i+vec2(0,1));
      float d = hash(i+vec2(1,1));
      return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
    }

    float fbm(vec2 p) {
      float v = 0.0;
      float a = 0.5;
      mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
      for(int i = 0; i < 5; i++) {
        v += a * noise(p);
        p = rot * p * 2.0;
        a *= 0.5;
      }
      return v;
    }

    vec2 velocity(vec2 p, float t) {
      vec2 v = vec2(0.0);
      for(int i = 0; i < 5; i++) {
        vec2 c = pairPos(i);
        c += 0.1 * vec2(sin(t*0.5 + float(i)), cos(t*0.7 + float(i)*1.3));
        vec2 d = p - c;
        float r = length(d) + 0.05;
        // Rotational flow (vortex)
        float strength = 0.3 / (r * r + 0.1);
        v += strength * vec2(-d.y, d.x);
      }
      // Add small-scale turbulence
      v += 0.1 * vec2(
        fbm(p * 3.0 + t * 0.2) - 0.5,
        fbm(p * 3.0 + vec2(5.0) + t * 0.2) - 0.5
      );
      return v;
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - 0.5*u_res) / u_res.y;
      float t = u_time;

      // Advect uv position backward through velocity field
      vec2 pos = uv;
      for(int i = 0; i < 8; i++) {
        vec2 v = velocity(pos, t);
        pos -= v * 0.02;
      }

      // Compute density based on advected position
      float density = 0.0;
      vec3 col = vec3(0.02, 0.03, 0.06);
      float blueWeight = 0.0;
      float warmWeight = 0.0;

      for(int i = 0; i < 5; i++) {
        vec2 c = pairPos(i);
        c += 0.1 * vec2(sin(t*0.5 + float(i)), cos(t*0.7 + float(i)*1.3));
        float d = length(pos - c);
        float contribution = exp(-d*d*8.0);
        density += contribution;
        // Blue for odd-indexed, warm for even-indexed (alternating men/women vortices)
        if(i < 3) {
          blueWeight += contribution;
        } else {
          warmWeight += contribution;
        }
      }

      // Add flow line pattern from velocity
      vec2 v = velocity(uv, t);
      float speed = length(v);
      float flowLines = sin(atan(v.y, v.x) * 8.0 + t * 2.0) * 0.5 + 0.5;
      flowLines *= smoothstep(0.0, 0.3, speed);

      // Mix colors
      vec3 blueCol = vec3(0.1, 0.3, 0.9);
      vec3 cyanCol = vec3(0.0, 0.7, 0.9);
      vec3 warmCol = vec3(0.9, 0.4, 0.15);
      vec3 orangeCol = vec3(1.0, 0.6, 0.2);

      float total = blueWeight + warmWeight + 0.001;
      vec3 fluidCol = mix(
        mix(blueCol, cyanCol, flowLines),
        mix(warmCol, orangeCol, flowLines),
        warmWeight / total
      );

      col += fluidCol * density * 1.5;
      col += vec3(0.15, 0.25, 0.4) * flowLines * 0.15;

      // Vortex center highlights
      for(int i = 0; i < 5; i++) {
        vec2 c = pairPos(i);
        c += 0.1 * vec2(sin(t*0.5 + float(i)), cos(t*0.7 + float(i)*1.3));
        float d = length(uv - c);
        col += vec3(0.5, 0.7, 1.0) * exp(-d*d*50.0) * 0.5;
      }

      col = pow(col, vec3(0.4545));
      gl_FragColor = vec4(col, 1.0);
    }
    `;

    const prog = mkProg(FS);
    gl.useProgram(prog);
    const loc_p = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc_p);
    gl.vertexAttribPointer(loc_p, 2, gl.FLOAT, false, 0, 0);
    const loc_res = gl.getUniformLocation(prog, 'u_res');
    const loc_time = gl.getUniformLocation(prog, 'u_time');

    function frame(t) {
      gl.uniform2f(loc_res, canvas.width, canvas.height);
      gl.uniform1f(loc_time, t * 0.001);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
