<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fluid Shader</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; overflow: hidden; }
canvas { display: block; }
.back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
.back:hover { background: #30363d; }
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c');
const gl = c.getContext('webgl');
function resize() { c.width = innerWidth; c.height = innerHeight; if(gl) gl.viewport(0,0,c.width,c.height); }
resize(); window.addEventListener('resize', resize);
const VS = `attribute vec2 p; void main(){ gl_Position = vec4(p,0,1); }`;
const FS = `precision mediump float;
uniform float t;
uniform vec2 r;

void main() {
  vec2 uv = gl_FragCoord.xy / r;
  vec2 st = (gl_FragCoord.xy - r * 0.5) / min(r.x, r.y);

  float fluid1 = sin(st.x * 4.0 + t + sin(st.y * 3.0 + t * 0.7) * 2.0) * 0.5 + 0.5;
  float fluid2 = sin(st.y * 5.0 - t * 1.1 + sin(st.x * 4.0 - t * 0.8) * 2.0) * 0.5 + 0.5;
  float fluid3 = sin(length(st) * 8.0 - t * 2.0 + sin(st.x * 3.0 + st.y * 4.0) * 1.5) * 0.5 + 0.5;

  vec3 col = mix(
    mix(vec3(0.0, 0.2, 0.8), vec3(0.0, 0.8, 0.4), fluid1),
    vec3(0.8, 0.4, 0.0),
    fluid2
  ) * (0.3 + 0.7 * fluid3);

  gl_FragColor = vec4(col, 1.0);
}`;
function mkS(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.error(gl.getShaderInfoLog(s)); return null; }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, mkS(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, mkS(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const ap = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(ap);
gl.vertexAttribPointer(ap, 2, gl.FLOAT, false, 0, 0);
const uT = gl.getUniformLocation(prog, 't');
const uR = gl.getUniformLocation(prog, 'r');
const t0 = performance.now();
(function frame(){ requestAnimationFrame(frame); gl.uniform1f(uT,(performance.now()-t0)*.001); gl.uniform2f(uR,c.width,c.height); gl.drawArrays(gl.TRIANGLE_STRIP,0,4); })();
</script>
</body>
</html>
