<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Constellation — Matching Algorithms Visual Gallery</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:sans-serif; }
    canvas { display:block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background:#30363d; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 8;
    let students = [], schools = [];
    let studentPrefs = [], schoolPrefs = [];
    let matches = [];
    let bgStars = [];
    let revealIndex = -1;
    let revealTimer = 0;
    let allRevealed = false;
    let prefEdges = [];

    const constellationNames = [
      'Lyra', 'Cygnus', 'Orion', 'Vega',
      'Draco', 'Aquila', 'Gemini', 'Libra'
    ];

    function setup() {
      createCanvas(windowWidth, windowHeight);

      for (let i = 0; i < N; i++) {
        students.push({
          x: random(width * 0.1, width * 0.45),
          y: random(height * 0.1, height * 0.9),
          brightness: random(180, 255),
          twinkleOffset: random(TWO_PI),
          size: random(3, 6)
        });
        schools.push({
          x: random(width * 0.55, width * 0.9),
          y: random(height * 0.1, height * 0.9),
          brightness: random(180, 255),
          twinkleOffset: random(TWO_PI),
          size: random(3, 6)
        });
      }

      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffleArray([...Array(N).keys()]));
        schoolPrefs.push(shuffleArray([...Array(N).keys()]));
      }

      matches = galeShapley(studentPrefs, schoolPrefs);

      for (let s = 0; s < N; s++) {
        for (let r = 0; r < N; r++) {
          let sch = studentPrefs[s][r];
          prefEdges.push({ student: s, school: sch, rank: r });
        }
      }

      for (let i = 0; i < 1500; i++) {
        bgStars.push({
          x: random(width),
          y: random(height),
          size: random(0.3, 1.5),
          brightness: random(40, 120),
          twinkleSpeed: random(0.5, 3)
        });
      }
    }

    function draw() {
      background(13, 17, 23);

      noStroke();
      for (let s of bgStars) {
        let b = s.brightness + sin(frameCount * 0.02 * s.twinkleSpeed) * 20;
        fill(b, b, b + 10, 180);
        circle(s.x, s.y, s.size);
      }

      for (let e of prefEdges) {
        let st = students[e.student];
        let sc = schools[e.school];
        let alpha = map(e.rank, 0, N - 1, 40, 8);
        stroke(100, 120, 160, alpha);
        strokeWeight(0.3);
        drawingContext.setLineDash([2, 6]);
        line(st.x, st.y, sc.x, sc.y);
        drawingContext.setLineDash([]);
      }

      revealTimer += deltaTime / 1000;
      if (!allRevealed && revealTimer > 1.5) {
        revealIndex++;
        revealTimer = 0;
        if (revealIndex >= matches.length) {
          allRevealed = true;
          revealIndex = matches.length - 1;
        }
      }

      for (let i = 0; i <= revealIndex && i < matches.length; i++) {
        let m = matches[i];
        let st = students[m.student];
        let sc = schools[m.school];
        let age = allRevealed ? 999 : (i === revealIndex ? revealTimer / 1.5 : 1);
        let alpha = min(age, 1) * 255;

        for (let g = 3; g >= 0; g--) {
          stroke(255, 215, 80, alpha * (0.1 - g * 0.02));
          strokeWeight(4 + g * 3);
          line(st.x, st.y, sc.x, sc.y);
        }

        stroke(255, 215, 80, alpha);
        strokeWeight(2.5);
        line(st.x, st.y, sc.x, sc.y);

        if (alpha > 100) {
          let mx = (st.x + sc.x) / 2;
          let my = (st.y + sc.y) / 2 - 12;
          noStroke();
          fill(255, 215, 80, alpha * 0.7);
          textAlign(CENTER, CENTER);
          textSize(10);
          textStyle(ITALIC);
          text(constellationNames[i % constellationNames.length], mx, my);
        }
      }

      for (let i = 0; i < N; i++) {
        let s = students[i];
        let twinkle = sin(frameCount * 0.05 + s.twinkleOffset) * 30;
        let b = s.brightness + twinkle;

        noStroke();
        for (let g = 3; g >= 0; g--) {
          fill(140, 170, 255, 10 - g * 2);
          circle(s.x, s.y, s.size * 6 + g * 8);
        }

        stroke(180, 200, 255, b);
        strokeWeight(1);
        line(s.x - s.size * 2, s.y, s.x + s.size * 2, s.y);
        line(s.x, s.y - s.size * 2, s.x, s.y + s.size * 2);

        noStroke();
        fill(200, 220, 255, b);
        circle(s.x, s.y, s.size);
        fill(255, 255, 255, b);
        circle(s.x, s.y, s.size * 0.5);

        fill(140, 170, 255, 150);
        textAlign(CENTER, TOP);
        textSize(9);
        textStyle(NORMAL);
        text('S' + (i + 1), s.x, s.y + s.size * 3);
      }

      for (let i = 0; i < N; i++) {
        let s = schools[i];
        let twinkle = sin(frameCount * 0.04 + s.twinkleOffset) * 30;
        let b = s.brightness + twinkle;

        noStroke();
        for (let g = 3; g >= 0; g--) {
          fill(255, 215, 120, 10 - g * 2);
          circle(s.x, s.y, s.size * 6 + g * 8);
        }

        stroke(255, 225, 160, b);
        strokeWeight(1);
        line(s.x - s.size * 2, s.y, s.x + s.size * 2, s.y);
        line(s.x, s.y - s.size * 2, s.x, s.y + s.size * 2);

        noStroke();
        fill(255, 230, 170, b);
        circle(s.x, s.y, s.size);
        fill(255, 255, 240, b);
        circle(s.x, s.y, s.size * 0.5);

        fill(255, 215, 120, 150);
        textAlign(CENTER, TOP);
        textSize(9);
        textStyle(NORMAL);
        text('C' + (i + 1), s.x, s.y + s.size * 3);
      }

      noStroke();
      fill(255, 255, 255, 180);
      textAlign(CENTER, TOP);
      textSize(14);
      textStyle(BOLD);
      text('CONSTELLATION MAP OF STABLE MATCHES', width / 2, 20);
      textSize(10);
      textStyle(NORMAL);
      fill(140, 160, 200, 120);
      let statusText = allRevealed
        ? 'All ' + matches.length + ' stable pairs revealed'
        : 'Revealing pair ' + (revealIndex + 2) + ' of ' + matches.length + '...';
      text(statusText, width / 2, 40);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      for (let s of bgStars) {
        s.x = random(width);
        s.y = random(height);
      }
    }

    function galeShapley(sPrefs, schPrefs) {
      let n = sPrefs.length;
      let free = [...Array(n).keys()];
      let proposals = new Array(n).fill(0);
      let schoolMatch = new Array(n).fill(-1);
      let studentMatch = new Array(n).fill(-1);
      let schRank = [];
      for (let i = 0; i < n; i++) {
        schRank[i] = new Array(n);
        for (let r = 0; r < n; r++) schRank[i][schPrefs[i][r]] = r;
      }
      while (free.length > 0) {
        let s = free[0], sch = sPrefs[s][proposals[s]];
        proposals[s]++;
        if (schoolMatch[sch] === -1) {
          schoolMatch[sch] = s; studentMatch[s] = sch; free.shift();
        } else {
          let cur = schoolMatch[sch];
          if (schRank[sch][s] < schRank[sch][cur]) {
            schoolMatch[sch] = s; studentMatch[s] = sch; free.shift();
            studentMatch[cur] = -1; free.push(cur);
          }
        }
      }
      let result = [];
      for (let i = 0; i < n; i++) result.push({ student: i, school: studentMatch[i] });
      return result;
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
  </script>
</body>
</html>
