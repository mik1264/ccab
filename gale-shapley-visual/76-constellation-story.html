<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Star Mythology — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Star Mythology</h2><p>The stable matching as ancient star mythology. Each matched pair is a constellation — their story told as star lines slowly connect across the night sky.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    const N = 5;
    const maleStars = [
      { name: 'Orion', color: '#60a5fa' },
      { name: 'Cepheus', color: '#38bdf8' },
      { name: 'Perseus', color: '#3b82f6' },
      { name: 'Aquarius', color: '#06b6d4' },
      { name: 'Leo', color: '#818cf8' }
    ];
    const femaleStars = [
      { name: 'Andromeda', color: '#fbbf24' },
      { name: 'Cassiopeia', color: '#f59e0b' },
      { name: 'Lyra', color: '#fb923c' },
      { name: 'Vega', color: '#f472b6' },
      { name: 'Aurora', color: '#e879f9' }
    ];

    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

    const menPrefs = Array.from({length:N}, ()=>shuffle([0,1,2,3,4]));
    const womenPrefs = Array.from({length:N}, ()=>shuffle([0,1,2,3,4]));
    const womenRank = womenPrefs.map(p=>{const r=[];p.forEach((m,i)=>r[m]=i);return r;});

    // Run GS
    const menNext = Array(N).fill(0);
    const womenPartner = Array(N).fill(-1);
    const menFree = Array(N).fill(true);
    let free = N;
    while (free > 0) {
      for (let m = 0; m < N; m++) {
        if (!menFree[m] || menNext[m] >= N) continue;
        const w = menPrefs[m][menNext[m]]; menNext[m]++;
        if (womenPartner[w] === -1) {
          womenPartner[w] = m; menFree[m] = false; free--;
        } else {
          const c = womenPartner[w];
          if (womenRank[w][m] < womenRank[w][c]) {
            womenPartner[w] = m; menFree[m] = false; menFree[c] = true;
          }
        }
      }
    }

    // Position stars
    const margin = 120;
    function positionStars() {
      for (let i = 0; i < N; i++) {
        maleStars[i].x = margin + Math.random() * (canvas.width * 0.35 - margin);
        maleStars[i].y = margin + i * ((canvas.height - 2*margin) / (N-1)) + (Math.random()-0.5) * 40;
      }
      for (let i = 0; i < N; i++) {
        femaleStars[i].x = canvas.width * 0.6 + Math.random() * (canvas.width * 0.35 - margin);
        femaleStars[i].y = margin + i * ((canvas.height - 2*margin) / (N-1)) + (Math.random()-0.5) * 40;
      }
    }
    positionStars();

    // Background stars
    const bgStars = Array.from({length: 200}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2,
      twinkle: Math.random() * Math.PI * 2,
      speed: 1 + Math.random() * 3
    }));

    // Animation phases
    let phase = 0; // 0=twinkle, 1=names fade in, 2=constellations draw, 3=glow
    let phaseTimer = 0;
    const phaseDurations = [3, 3, 5, Infinity];
    let constellationProgress = 0;
    let lastTime = performance.now();

    // Matched pairs for constellation drawing
    const pairs = [];
    for (let w = 0; w < N; w++) {
      if (womenPartner[w] >= 0) {
        pairs.push({ m: womenPartner[w], w });
      }
    }

    function drawStar(x, y, size, color, brightness) {
      const glow = size * 4;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, glow);
      grad.addColorStop(0, color);
      grad.addColorStop(0.3, color + '80');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.globalAlpha = brightness;
      ctx.beginPath();
      ctx.arc(x, y, glow, 0, Math.PI * 2);
      ctx.fill();

      // Core
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = brightness;
      ctx.beginPath();
      ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
      ctx.fill();

      // Cross spikes
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.globalAlpha = brightness * 0.6;
      const spikeLen = size * 2.5;
      ctx.beginPath();
      ctx.moveTo(x - spikeLen, y); ctx.lineTo(x + spikeLen, y);
      ctx.moveTo(x, y - spikeLen); ctx.lineTo(x, y + spikeLen);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      // Night sky gradient
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, '#050510');
      grad.addColorStop(0.5, '#0a0a1a');
      grad.addColorStop(1, '#0d0d20');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Background stars
      for (const s of bgStars) {
        s.twinkle += s.speed * dt;
        const brightness = 0.3 + 0.7 * Math.abs(Math.sin(s.twinkle));
        ctx.fillStyle = `rgba(200,210,230,${brightness * 0.6})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
      }

      // Phase timing
      phaseTimer += dt;
      if (phaseTimer >= phaseDurations[phase] && phase < 3) {
        phase++;
        phaseTimer = 0;
      }

      // Draw named stars
      const nameAlpha = phase >= 1 ? Math.min(1, phaseTimer / 1.5) : 0;
      const starAlpha = phase >= 0 ? 1 : 0;

      for (let i = 0; i < N; i++) {
        const ms = maleStars[i];
        const twinkle = 0.7 + 0.3 * Math.sin(now * 0.002 + i);
        drawStar(ms.x, ms.y, 6, ms.color, starAlpha * twinkle);

        if (phase >= 1) {
          ctx.globalAlpha = nameAlpha;
          ctx.fillStyle = ms.color;
          ctx.font = 'italic 13px Lora';
          ctx.textAlign = 'center';
          ctx.fillText(ms.name, ms.x, ms.y - 18);
          ctx.globalAlpha = 1;
        }
      }

      for (let i = 0; i < N; i++) {
        const fs = femaleStars[i];
        const twinkle = 0.7 + 0.3 * Math.sin(now * 0.002 + i + 3);
        drawStar(fs.x, fs.y, 6, fs.color, starAlpha * twinkle);

        if (phase >= 1) {
          ctx.globalAlpha = nameAlpha;
          ctx.fillStyle = fs.color;
          ctx.font = 'italic 13px Lora';
          ctx.textAlign = 'center';
          ctx.fillText(fs.name, fs.x, fs.y - 18);
          ctx.globalAlpha = 1;
        }
      }

      // Draw constellation lines
      if (phase >= 2) {
        constellationProgress = Math.min(1, phaseTimer / 4);

        for (let pi = 0; pi < pairs.length; pi++) {
          const pair = pairs[pi];
          const pairProgress = Math.max(0, Math.min(1, (constellationProgress * pairs.length - pi)));
          if (pairProgress <= 0) continue;

          const ms = maleStars[pair.m];
          const fs = femaleStars[pair.w];

          // Constellation line with gradient
          const lineGrad = ctx.createLinearGradient(ms.x, ms.y, fs.x, fs.y);
          lineGrad.addColorStop(0, ms.color);
          lineGrad.addColorStop(1, fs.color);

          ctx.strokeStyle = lineGrad;
          ctx.lineWidth = 2;
          ctx.globalAlpha = pairProgress * 0.8;

          // Draw partial line
          const ex = ms.x + (fs.x - ms.x) * pairProgress;
          const ey = ms.y + (fs.y - ms.y) * pairProgress;

          ctx.beginPath();
          ctx.moveTo(ms.x, ms.y);
          ctx.lineTo(ex, ey);
          ctx.stroke();

          // Midpoint label
          if (pairProgress > 0.5) {
            const mx = (ms.x + fs.x) / 2;
            const my = (ms.y + fs.y) / 2;
            ctx.globalAlpha = (pairProgress - 0.5) * 2;
            ctx.fillStyle = '#c9d1d9';
            ctx.font = '10px Lora';
            ctx.textAlign = 'center';
            ctx.fillText(ms.name + ' & ' + fs.name, mx, my - 10);
          }

          ctx.globalAlpha = 1;
        }
      }

      // Final glow phase
      if (phase >= 3) {
        const glowPulse = 0.5 + 0.5 * Math.sin(now * 0.003);
        for (const pair of pairs) {
          const ms = maleStars[pair.m];
          const fs = femaleStars[pair.w];
          const mx = (ms.x + fs.x) / 2;
          const my = (ms.y + fs.y) / 2;

          const g = ctx.createRadialGradient(mx, my, 0, mx, my, 60);
          g.addColorStop(0, 'rgba(74,222,128,' + (0.1 * glowPulse) + ')');
          g.addColorStop(1, 'transparent');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(mx, my, 60, 0, Math.PI*2);
          ctx.fill();
        }

        ctx.fillStyle = '#4ade80';
        ctx.font = 'bold 18px Lora';
        ctx.textAlign = 'center';
        ctx.globalAlpha = Math.min(1, phaseTimer / 2);
        ctx.fillText('The Stars Align — All Constellations Formed', canvas.width/2, canvas.height - 40);
        ctx.globalAlpha = 1;
      }

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
