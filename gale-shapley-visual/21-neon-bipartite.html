<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neon Bipartite Graph — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">&#8592; Visual Gallery</a>
  <div class="info"><h2>Neon Bipartite Graph</h2><p>Men and women as glowing neon spheres in 3D space, connected by luminous tubes. Matched pairs glow brighter as the camera slowly orbits.</p></div>
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1117);
    scene.fog = new THREE.FogExp2(0x0d1117, 0.04);
    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 12);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // Stable matching result (DA algorithm)
    const matching = [[0,1],[1,0],[2,3],[3,2],[4,5],[5,4]];

    const menPositions = [];
    const womenPositions = [];
    const N = 6;
    for (let i = 0; i < N; i++) {
      menPositions.push(new THREE.Vector3(-4, (i - (N-1)/2) * 1.6, 0));
      womenPositions.push(new THREE.Vector3(4, (i - (N-1)/2) * 1.6, 0));
    }

    // Ambient light
    scene.add(new THREE.AmbientLight(0x111122, 0.5));

    // Create neon spheres
    function createNeonSphere(pos, color, emissive) {
      const geo = new THREE.SphereGeometry(0.35, 32, 32);
      const mat = new THREE.MeshPhongMaterial({
        color: color,
        emissive: emissive,
        emissiveIntensity: 0.8,
        shininess: 100,
        transparent: true,
        opacity: 0.95
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(pos);
      scene.add(mesh);

      // Glow halo
      const haloGeo = new THREE.SphereGeometry(0.55, 32, 32);
      const haloMat = new THREE.MeshBasicMaterial({
        color: emissive,
        transparent: true,
        opacity: 0.15
      });
      const halo = new THREE.Mesh(haloGeo, haloMat);
      halo.position.copy(pos);
      scene.add(halo);

      // Point light
      const light = new THREE.PointLight(emissive, 0.6, 4);
      light.position.copy(pos);
      scene.add(light);

      return { mesh, halo, light };
    }

    const menNodes = menPositions.map(p => createNeonSphere(p, 0x1155cc, 0x3388ff));
    const womenNodes = womenPositions.map(p => createNeonSphere(p, 0x7722aa, 0xaa44dd));

    // Create all possible edges (thin, dim)
    function createEdge(start, end, color, thick, opacity) {
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      mid.z += (Math.random() - 0.5) * 1.5;
      const curve = new THREE.CatmullRomCurve3([start.clone(), mid, end.clone()]);
      const tubeGeo = new THREE.TubeGeometry(curve, 20, thick, 8, false);
      const tubeMat = new THREE.MeshPhongMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.3,
        transparent: true,
        opacity: opacity
      });
      const tube = new THREE.Mesh(tubeGeo, tubeMat);
      scene.add(tube);
      return tube;
    }

    // All possible edges
    for (let i = 0; i < N; i++) {
      for (let j = 0; j < N; j++) {
        const isMatched = matching.some(m => m[0] === i && m[1] === j);
        if (!isMatched) {
          createEdge(menPositions[i], womenPositions[j], 0x223344, 0.008, 0.12);
        }
      }
    }

    // Matched edges (bright green, thick)
    const matchedEdges = [];
    matching.forEach(([m, w]) => {
      const edge = createEdge(menPositions[m], womenPositions[w], 0x00ff66, 0.04, 0.9);
      edge.material.emissiveIntensity = 0.8;
      matchedEdges.push(edge);
    });

    // Ambient particle system
    const particleCount = 2000;
    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const pColors = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      positions[i*3] = (Math.random() - 0.5) * 30;
      positions[i*3+1] = (Math.random() - 0.5) * 20;
      positions[i*3+2] = (Math.random() - 0.5) * 20;
      const c = new THREE.Color().setHSL(0.55 + Math.random() * 0.2, 0.8, 0.5 + Math.random() * 0.3);
      pColors[i*3] = c.r; pColors[i*3+1] = c.g; pColors[i*3+2] = c.b;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));
    const particleMat = new THREE.PointsMaterial({ size: 0.03, vertexColors: true, transparent: true, opacity: 0.6 });
    scene.add(new THREE.Points(particleGeo, particleMat));

    function animate(t) {
      requestAnimationFrame(animate);
      const time = t * 0.001;

      // Camera orbit
      camera.position.x = Math.sin(time * 0.15) * 12;
      camera.position.z = Math.cos(time * 0.15) * 12;
      camera.position.y = Math.sin(time * 0.1) * 2 + 1;
      camera.lookAt(0, 0, 0);

      // Pulse matched edges
      matchedEdges.forEach((edge, i) => {
        edge.material.emissiveIntensity = 0.6 + Math.sin(time * 2 + i) * 0.3;
      });

      // Pulse node halos
      menNodes.forEach((n, i) => {
        n.halo.scale.setScalar(1 + Math.sin(time * 1.5 + i) * 0.15);
      });
      womenNodes.forEach((n, i) => {
        n.halo.scale.setScalar(1 + Math.sin(time * 1.5 + i + 3) * 0.15);
      });

      renderer.render(scene, camera);
    }
    animate(0);
  </script>
</body>
</html>
