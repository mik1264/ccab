<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Bipartite</title>
<style>
* { margin: 0; padding: 0; }
body { background: #0d1117; overflow: hidden; }
.back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
.back:hover { background: #30363d; }
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 0, 14);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x0d1117);
document.body.appendChild(renderer.domElement);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
scene.add(new THREE.AmbientLight(0x334455, 2));
const dl = new THREE.DirectionalLight(0xffffff, 2);
dl.position.set(5, 8, 5); scene.add(dl);

const N = 8;
const students = [];
const schools = [];
const spacing = 1.0;
const yStart = -(N - 1) * spacing / 2;

for (let i = 0; i < N; i++) {
  const geo = new THREE.SphereGeometry(0.3, 24, 24);
  const mat = new THREE.MeshPhongMaterial({ color: 0x58a6ff, emissive: 0x58a6ff, emissiveIntensity: 0.3 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(-4, yStart + i * spacing, 0);
  mesh.userData = { baseY: yStart + i * spacing, phase: Math.random() * Math.PI * 2 };
  scene.add(mesh);
  students.push(mesh);
}

for (let i = 0; i < N; i++) {
  const geo = new THREE.SphereGeometry(0.3, 24, 24);
  const mat = new THREE.MeshPhongMaterial({ color: 0x3fb950, emissive: 0x3fb950, emissiveIntensity: 0.3 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(4, yStart + i * spacing, 0);
  mesh.userData = { baseY: yStart + i * spacing, phase: Math.random() * Math.PI * 2 };
  scene.add(mesh);
  schools.push(mesh);
}

function galeShapley(n) {
  const sPrefs = [], scPrefs = [];
  for (let i = 0; i < n; i++) {
    const a = Array.from({length: n}, (_, k) => k);
    const b = Array.from({length: n}, (_, k) => k);
    for (let j = n - 1; j > 0; j--) {
      let r = Math.floor(Math.random() * (j + 1));
      [a[j], a[r]] = [a[r], a[j]];
      r = Math.floor(Math.random() * (j + 1));
      [b[j], b[r]] = [b[r], b[j]];
    }
    sPrefs.push(a);
    scPrefs.push(b);
  }
  const scRank = [];
  for (let s = 0; s < n; s++) {
    scRank[s] = new Array(n);
    for (let r = 0; r < n; r++) scRank[s][scPrefs[s][r]] = r;
  }
  const sMatch = new Array(n).fill(-1);
  const scMatch = new Array(n).fill(-1);
  const next = new Array(n).fill(0);
  const free = Array.from({length: n}, (_, i) => i);
  while (free.length > 0) {
    const st = free.shift();
    const sc = sPrefs[st][next[st]++];
    if (scMatch[sc] === -1) { sMatch[st] = sc; scMatch[sc] = st; }
    else {
      const cur = scMatch[sc];
      if (scRank[sc][st] < scRank[sc][cur]) {
        sMatch[st] = sc; scMatch[sc] = st; sMatch[cur] = -1; free.push(cur);
      } else { free.push(st); }
    }
  }
  return { sMatch, sPrefs };
}

const { sMatch, sPrefs } = galeShapley(N);

const prefPos = [];
for (let i = 0; i < N; i++) {
  for (let j = 0; j < N; j++) {
    const sc = sPrefs[i][j];
    if (sc !== sMatch[i]) {
      prefPos.push(-4, students[i].userData.baseY, 0, 4, schools[sc].userData.baseY, 0);
    }
  }
}
const prefGeo = new THREE.BufferGeometry();
prefGeo.setAttribute('position', new THREE.Float32BufferAttribute(prefPos, 3));
scene.add(new THREE.LineSegments(prefGeo, new THREE.LineBasicMaterial({ color: 0x58a6ff, transparent: true, opacity: 0.08 })));

const matchPairs = [];
const matchPos = [];
for (let i = 0; i < N; i++) {
  matchPairs.push({ s: i, sc: sMatch[i] });
  matchPos.push(-4, students[i].userData.baseY, 0, 4, schools[sMatch[i]].userData.baseY, 0);
}
const matchGeo = new THREE.BufferGeometry();
matchGeo.setAttribute('position', new THREE.Float32BufferAttribute(matchPos, 3));
const matchLines = new THREE.LineSegments(matchGeo, new THREE.LineBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.9 }));
scene.add(matchLines);

function animate(ts) {
  requestAnimationFrame(animate);
  const t = ts * 0.001;
  for (let i = 0; i < N; i++) {
    students[i].position.y = students[i].userData.baseY + Math.sin(t * 1.5 + students[i].userData.phase) * 0.15;
    schools[i].position.y = schools[i].userData.baseY + Math.sin(t * 1.5 + schools[i].userData.phase) * 0.15;
  }
  const glow = 0.3 + Math.sin(t * 3) * 0.2;
  for (const p of matchPairs) {
    students[p.s].material.emissiveIntensity = glow;
    schools[p.sc].material.emissiveIntensity = glow;
  }
  const pos = matchGeo.attributes.position.array;
  for (let i = 0; i < matchPairs.length; i++) {
    pos[i * 6 + 1] = students[matchPairs[i].s].position.y;
    pos[i * 6 + 4] = schools[matchPairs[i].sc].position.y;
  }
  matchGeo.attributes.position.needsUpdate = true;
  camera.position.x = Math.sin(t * 0.2) * 14;
  camera.position.y = Math.sin(t * 0.15) * 3;
  camera.position.z = Math.cos(t * 0.2) * 14;
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
animate(0);
</script>
</body>
</html>
