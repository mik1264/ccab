<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Radial Preference Tree — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; overflow:hidden; font-family:'Nunito',sans-serif; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
    svg text { font-family:'Nunito',sans-serif; }
    #viz { width:100vw; height:100vh; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Radial Preference Tree</h2><p>A radial dendrogram shows each agent's preference hierarchy. The stable matching pairs are the dominant branches glowing brightest.</p></div>
  <div id="viz"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select('#viz').append('svg').attr('width', W).attr('height', H);

    const menPrefs = {
      m1: ['w3','w1','w2','w4','w5'],
      m2: ['w1','w2','w3','w5','w4'],
      m3: ['w2','w3','w1','w4','w5'],
      m4: ['w3','w4','w1','w2','w5'],
      m5: ['w4','w5','w3','w1','w2']
    };
    const menOptimal = { m1:'w3', m2:'w1', m3:'w2', m4:'w4', m5:'w5' };

    const rankColors = ['#e3b341', '#3fb950', '#58a6ff', '#484f58', '#30363d'];

    // Build hierarchy
    const root = {
      name: 'Matching',
      children: Object.entries(menPrefs).map(([m, prefs]) => ({
        name: m,
        children: prefs.map((w, rank) => ({
          name: w,
          rank: rank,
          isMatch: menOptimal[m] === w,
          man: m
        }))
      }))
    };

    const hierarchy = d3.hierarchy(root);
    const radius = Math.min(W, H) * 0.38;
    const treeLayout = d3.cluster().size([2 * Math.PI, radius]);
    treeLayout(hierarchy);

    const defs = svg.append('defs');
    const glow = defs.append('filter').attr('id', 'glow');
    glow.append('feGaussianBlur').attr('stdDeviation', 6).attr('result', 'blur');
    const feMerge = glow.append('feMerge');
    feMerge.append('feMergeNode').attr('in', 'blur');
    feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

    const g = svg.append('g').attr('transform', `translate(${W/2},${H/2})`);

    // Draw links
    const links = g.selectAll('.link')
      .data(hierarchy.links())
      .enter().append('path')
      .attr('class', 'link')
      .attr('d', d3.linkRadial()
        .angle(d => d.x)
        .radius(d => d.y))
      .attr('fill', 'none')
      .attr('stroke', d => {
        const target = d.target.data;
        if (target.rank !== undefined) return rankColors[target.rank];
        return '#30363d';
      })
      .attr('stroke-width', d => {
        const target = d.target.data;
        if (target.isMatch) return 3.5;
        if (target.rank !== undefined) return Math.max(0.5, 2.5 - target.rank * 0.5);
        return 2;
      })
      .attr('opacity', 0)
      .attr('filter', d => d.target.data.isMatch ? 'url(#glow)' : null);

    links.transition()
      .delay((d, i) => i * 50)
      .duration(600)
      .ease(d3.easeCubicOut)
      .attr('opacity', d => {
        const target = d.target.data;
        if (target.isMatch) return 1;
        if (target.rank !== undefined) return Math.max(0.15, 0.6 - target.rank * 0.1);
        return 0.6;
      });

    // Draw nodes
    const nodes = g.selectAll('.node')
      .data(hierarchy.descendants())
      .enter().append('g')
      .attr('class', 'node')
      .attr('transform', d => `rotate(${d.x * 180 / Math.PI - 90}) translate(${d.y},0)`);

    nodes.append('circle')
      .attr('r', d => {
        if (d.depth === 0) return 14;
        if (d.depth === 1) return 10;
        return d.data.isMatch ? 8 : 5;
      })
      .attr('fill', d => {
        if (d.depth === 0) return '#21262d';
        if (d.depth === 1) return '#161b22';
        return d.data.isMatch ? '#161b22' : '#0d1117';
      })
      .attr('stroke', d => {
        if (d.depth === 0) return '#58a6ff';
        if (d.depth === 1) return '#58a6ff';
        if (d.data.isMatch) return '#3fb950';
        return rankColors[d.data.rank] || '#30363d';
      })
      .attr('stroke-width', d => d.data.isMatch ? 2.5 : 1.5)
      .attr('filter', d => d.data.isMatch ? 'url(#glow)' : null);

    nodes.append('text')
      .attr('dy', '0.35em')
      .attr('x', d => d.x < Math.PI === !d.children ? 10 : -10)
      .attr('text-anchor', d => d.x < Math.PI === !d.children ? 'start' : 'end')
      .attr('transform', d => d.x >= Math.PI ? 'rotate(180)' : null)
      .attr('fill', d => {
        if (d.data.isMatch) return '#3fb950';
        if (d.depth <= 1) return '#e6edf3';
        return '#8b949e';
      })
      .attr('font-size', d => {
        if (d.depth === 0) return 13;
        if (d.depth === 1) return 12;
        return 10;
      })
      .attr('font-weight', d => d.data.isMatch ? 700 : (d.depth <= 1 ? 600 : 400))
      .text(d => d.data.name);

    // Pulse animation on matched nodes
    function pulse() {
      g.selectAll('.node circle')
        .filter(d => d.data.isMatch)
        .transition()
        .duration(1200)
        .attr('r', 10)
        .transition()
        .duration(1200)
        .attr('r', 8)
        .on('end', pulse);
    }
    setTimeout(pulse, 2000);

    // Slow rotation
    let angle = 0;
    function rotate() {
      angle += 0.015;
      g.attr('transform', `translate(${W/2},${H/2}) rotate(${angle})`);
      requestAnimationFrame(rotate);
    }
    setTimeout(rotate, 3000);
  </script>
</body>
</html>
