<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shadow Puppet Theater — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Shadow Puppet Theater</h2><p>A shadow puppet theater where silhouetted figures act out the stable marriage problem — proposals, refusals, and final unions as a classic shadow play.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    const N = 5;
    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
    const menPrefs = Array.from({length:N},()=>shuffle([0,1,2,3,4]));
    const womenPrefs = Array.from({length:N},()=>shuffle([0,1,2,3,4]));
    const womenRank = womenPrefs.map(p=>{const r=[];p.forEach((m,i)=>r[m]=i);return r;});

    const events = [];
    const menNext = Array(N).fill(0);
    const womenPartner = Array(N).fill(-1);
    const menFree = Array(N).fill(true);
    let free = N;
    while (free > 0) {
      for (let m = 0; m < N; m++) {
        if (!menFree[m] || menNext[m] >= N) continue;
        const w = menPrefs[m][menNext[m]]; menNext[m]++;
        if (womenPartner[w] === -1) {
          womenPartner[w] = m; menFree[m] = false; free--;
          events.push({m, w, accepted: true, displaced: -1});
        } else {
          const c = womenPartner[w];
          if (womenRank[w][m] < womenRank[w][c]) {
            womenPartner[w] = m; menFree[m] = false; menFree[c] = true;
            events.push({m, w, accepted: true, displaced: c});
          } else {
            events.push({m, w, accepted: false, displaced: -1});
          }
        }
      }
    }

    // Puppet figure drawing
    function drawPuppet(x, y, scale, armAngle, bodyAngle, isWoman) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(bodyAngle);
      ctx.scale(scale, scale);

      ctx.fillStyle = '#1a0f05';
      ctx.strokeStyle = '#1a0f05';
      ctx.lineWidth = 3;

      // Head
      ctx.beginPath();
      ctx.arc(0, -50, 12, 0, Math.PI * 2);
      ctx.fill();

      // Body
      ctx.beginPath();
      ctx.moveTo(0, -38);
      if (isWoman) {
        // Dress shape
        ctx.lineTo(-18, 20);
        ctx.lineTo(18, 20);
      } else {
        // Rectangular body
        ctx.lineTo(-8, 20);
        ctx.lineTo(8, 20);
        ctx.lineTo(8, -38);
      }
      ctx.closePath();
      ctx.fill();

      // Arms
      ctx.save();
      ctx.translate(-8, -30);
      ctx.rotate(armAngle);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(-25, 15);
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.translate(8, -30);
      ctx.rotate(-armAngle);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(25, 15);
      ctx.stroke();
      ctx.restore();

      // Legs
      ctx.beginPath();
      ctx.moveTo(-5, 20);
      ctx.lineTo(-8, 45);
      ctx.moveTo(5, 20);
      ctx.lineTo(8, 45);
      ctx.stroke();

      // Stick (puppet rod)
      ctx.strokeStyle = '#2a1a0a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, 20);
      ctx.lineTo(0, 70);
      ctx.stroke();

      ctx.restore();
    }

    // Stage layout
    function stageLeft() { return canvas.width * 0.15; }
    function stageRight() { return canvas.width * 0.85; }
    function stageCenter() { return canvas.width * 0.5; }
    function stageY() { return canvas.height * 0.55; }

    // Curtain drawing
    function drawCurtains() {
      const curtainW = canvas.width * 0.08;
      // Left curtain
      ctx.fillStyle = '#3a1010';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(curtainW * 0.7, canvas.height * 0.3, curtainW * 0.5, canvas.height);
      ctx.lineTo(0, canvas.height);
      ctx.closePath();
      ctx.fill();
      // Folds
      ctx.strokeStyle = '#2a0808';
      ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        const fx = curtainW * (0.1 + i * 0.08);
        ctx.beginPath();
        ctx.moveTo(fx, 0);
        ctx.quadraticCurveTo(fx + 10, canvas.height * 0.5, fx - 5, canvas.height);
        ctx.stroke();
      }

      // Right curtain
      ctx.fillStyle = '#3a1010';
      ctx.beginPath();
      ctx.moveTo(canvas.width, 0);
      ctx.quadraticCurveTo(canvas.width - curtainW * 0.7, canvas.height * 0.3, canvas.width - curtainW * 0.5, canvas.height);
      ctx.lineTo(canvas.width, canvas.height);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#2a0808';
      for (let i = 0; i < 5; i++) {
        const fx = canvas.width - curtainW * (0.1 + i * 0.08);
        ctx.beginPath();
        ctx.moveTo(fx, 0);
        ctx.quadraticCurveTo(fx - 10, canvas.height * 0.5, fx + 5, canvas.height);
        ctx.stroke();
      }

      // Top valance
      ctx.fillStyle = '#4a1515';
      ctx.fillRect(0, 0, canvas.width, 40);
      ctx.fillStyle = '#5a2020';
      for (let x = 0; x < canvas.width; x += 60) {
        ctx.beginPath();
        ctx.moveTo(x, 40);
        ctx.quadraticCurveTo(x + 30, 65, x + 60, 40);
        ctx.fill();
      }
    }

    // Scene state
    let sceneIdx = 0;
    let sceneTimer = 0;
    const sceneDuration = 3.0;
    let lastTime = performance.now();

    // Puppet positions for current scene
    let manPuppet = { x: 0, y: 0, arm: 0, body: 0 };
    let womanPuppet = { x: 0, y: 0, arm: 0, body: 0 };

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      // Warm amber backlit screen
      const grad = ctx.createRadialGradient(
        canvas.width/2, canvas.height*0.4, 50,
        canvas.width/2, canvas.height*0.4, canvas.height*0.7
      );
      grad.addColorStop(0, '#c4863a');
      grad.addColorStop(0.4, '#8a5a20');
      grad.addColorStop(0.7, '#4a2a0a');
      grad.addColorStop(1, '#1a0a02');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Light rays
      ctx.save();
      const rayCount = 12;
      for (let i = 0; i < rayCount; i++) {
        const angle = (i / rayCount) * Math.PI * 2;
        ctx.fillStyle = 'rgba(255,200,100,0.03)';
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, canvas.height*0.4);
        ctx.lineTo(
          canvas.width/2 + Math.cos(angle) * canvas.width,
          canvas.height*0.4 + Math.sin(angle) * canvas.height
        );
        ctx.lineTo(
          canvas.width/2 + Math.cos(angle + 0.15) * canvas.width,
          canvas.height*0.4 + Math.sin(angle + 0.15) * canvas.height
        );
        ctx.fill();
      }
      ctx.restore();

      // Stage floor
      ctx.fillStyle = 'rgba(26,15,5,0.3)';
      ctx.fillRect(0, canvas.height * 0.75, canvas.width, canvas.height * 0.25);

      // Scene animation
      sceneTimer += dt;

      if (sceneIdx < events.length) {
        const e = events[sceneIdx];
        const t = sceneTimer / sceneDuration;

        const sx = stageLeft() + (e.m / (N-1)) * (stageCenter() - stageLeft() - 60);
        const wx = stageCenter() + 60 + (e.w / (N-1)) * (stageRight() - stageCenter() - 60);
        const sy = stageY();

        // Idle bob
        const bob = Math.sin(now * 0.004) * 3;

        if (t < 0.4) {
          // Approach phase
          const ap = t / 0.4;
          const mx = sx + (stageCenter() - 40 - sx) * ap;
          drawPuppet(mx, sy + bob, 1, -0.3 - ap * 0.5, 0, false);
          drawPuppet(wx, sy + bob, 0.9, 0.2, 0, true);
        } else if (t < 0.7) {
          // Proposal: arm extends
          const pp = (t - 0.4) / 0.3;
          drawPuppet(stageCenter() - 40, sy + bob, 1, -0.8 - pp * 0.4, 0, false);
          drawPuppet(wx, sy + bob, 0.9, 0.2, 0, true);

          // Speech text
          ctx.fillStyle = 'rgba(26,15,5,0.9)';
          ctx.font = 'italic 14px Lora';
          ctx.textAlign = 'center';
          ctx.fillText('Will you accept me?', stageCenter(), sy - 80);
        } else {
          // Response
          const rp = (t - 0.7) / 0.3;
          if (e.accepted) {
            // Bow forward
            drawPuppet(stageCenter() - 40, sy + bob, 1, -0.5, 0.1 * rp, false);
            const bx = wx + (stageCenter() + 10 - wx) * Math.min(1, rp * 1.5);
            drawPuppet(bx, sy + bob, 0.9, -0.3 * rp, -0.15 * rp, true);

            ctx.fillStyle = 'rgba(26,15,5,0.9)';
            ctx.font = 'bold 16px Lora';
            ctx.textAlign = 'center';
            ctx.fillText('Accepted!', stageCenter(), sy - 80);
          } else {
            // Turn away
            drawPuppet(stageCenter() - 40, sy + bob, 1, -0.3, 0, false);
            drawPuppet(wx, sy + bob, 0.9, 0.5 * rp, 0.4 * rp, true);

            ctx.fillStyle = 'rgba(26,15,5,0.9)';
            ctx.font = 'bold 16px Lora';
            ctx.textAlign = 'center';
            ctx.fillText('Refused!', stageCenter(), sy - 80);
          }
        }

        if (sceneTimer >= sceneDuration) {
          sceneIdx++;
          sceneTimer = 0;
        }

        // Scene label
        ctx.fillStyle = '#1a0f05';
        ctx.font = '12px Nunito';
        ctx.textAlign = 'center';
        ctx.fillText('Act ' + (sceneIdx + 1) + ' of ' + events.length, canvas.width/2, canvas.height * 0.85);
        ctx.fillText('M' + (e.m+1) + ' proposes to W' + (e.w+1), canvas.width/2, canvas.height * 0.88);
      } else {
        // Final: all matched pairs hold hands
        const pairSpacing = (stageRight() - stageLeft()) / N;
        for (let w = 0; w < N; w++) {
          const m = womenPartner[w];
          if (m < 0) continue;
          const px = stageLeft() + w * pairSpacing + pairSpacing / 2;
          const py = stageY();
          const bob = Math.sin(now * 0.003 + w) * 3;
          drawPuppet(px - 15, py + bob, 0.7, -0.6, 0, false);
          drawPuppet(px + 15, py + bob, 0.65, 0.6, 0, true);

          ctx.fillStyle = '#1a0f05';
          ctx.font = '10px Nunito';
          ctx.textAlign = 'center';
          ctx.fillText('M'+(m+1)+' & W'+(w+1), px, py + 60);
        }

        ctx.fillStyle = '#1a0f05';
        ctx.font = 'bold 20px Lora';
        ctx.textAlign = 'center';
        ctx.fillText('Fin — All Pairs United', canvas.width/2, canvas.height * 0.88);
      }

      // Draw curtains on top
      drawCurtains();

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
