<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shadow Play — Matching Algorithms Visual Gallery</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:sans-serif; }
    canvas { display:block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background:#30363d; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 8;
    let lights = [], objects = [];
    let studentPrefs = [], schoolPrefs = [];
    let matches = [];
    let screenX;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      screenX = width * 0.75;

      for (let i = 0; i < N; i++) {
        lights.push({
          x: random(width * 0.05, width * 0.35),
          y: height * 0.1 + (height * 0.8) * i / (N - 1),
          baseY: height * 0.1 + (height * 0.8) * i / (N - 1),
          radius: random(15, 25),
          pulseOffset: random(TWO_PI),
          pulseSpeed: random(0.01, 0.03)
        });
        objects.push({
          x: random(width * 0.4, width * 0.6),
          y: height * 0.08 + (height * 0.84) * i / (N - 1),
          w: random(20, 40),
          h: random(30, 60)
        });
      }

      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffleArray([...Array(N).keys()]));
        schoolPrefs.push(shuffleArray([...Array(N).keys()]));
      }

      matches = galeShapley(studentPrefs, schoolPrefs);
    }

    function draw() {
      background(10, 13, 18);

      for (let i = 0; i < N; i++) {
        lights[i].y = lights[i].baseY + sin(frameCount * lights[i].pulseSpeed + lights[i].pulseOffset) * 15;
      }

      // Vertical projection screen
      stroke(40, 50, 65);
      strokeWeight(2);
      line(screenX, 0, screenX, height);
      noStroke();
      fill(20, 25, 35, 60);
      rect(screenX, 0, width - screenX, height);

      let screenBrightness = new Float32Array(Math.ceil(height));

      for (let li = 0; li < N; li++) {
        let l = lights[li];
        let matchedSchool = matches[li].school;

        for (let si = 0; si < N; si++) {
          let prefRank = studentPrefs[li].indexOf(si);
          let o = objects[si];
          let isMatched = si === matchedSchool;

          let baseBrightness = isMatched ? 1.0 : map(prefRank, 0, N - 1, 0.4, 0.05);
          let pulse = isMatched ? 0.8 + 0.2 * sin(frameCount * 0.03 + li) : 0.5;

          let alpha = baseBrightness * pulse * 60;
          let rayColor = isMatched
            ? color(255, 220, 140, alpha)
            : color(180, 190, 210, alpha * 0.4);

          stroke(rayColor);
          strokeWeight(isMatched ? 2 : 0.5);
          line(l.x, l.y, o.x + o.w / 2, o.y + o.h / 2);

          if (isMatched) {
            let shadowTop = mapScreenY(l, o, o.y);
            let shadowBot = mapScreenY(l, o, o.y + o.h);
            let meetY = (shadowTop + shadowBot) / 2;
            for (let sy = Math.max(0, Math.floor(shadowTop - 30)); sy < Math.min(height, Math.ceil(shadowBot + 30)); sy++) {
              let d = abs(sy - meetY);
              let bright = max(0, 1 - d / 40) * baseBrightness * 255;
              screenBrightness[sy] = min(255, screenBrightness[sy] + bright);
            }
          } else {
            let shadowTop = mapScreenY(l, o, o.y);
            let shadowBot = mapScreenY(l, o, o.y + o.h);
            for (let sy = Math.max(0, Math.floor(shadowTop)); sy < Math.min(height, Math.ceil(shadowBot)); sy++) {
              screenBrightness[sy] = max(0, screenBrightness[sy] - 15);
            }
          }
        }
      }

      // Render screen brightness
      noStroke();
      for (let y = 0; y < height; y++) {
        let b = screenBrightness[y];
        if (b > 0) {
          fill(min(255, b * 1.1), min(255, b * 0.9), min(255, b * 0.5), min(255, b + 30));
          rect(screenX + 2, y, width - screenX - 2, 1);
        }
      }

      // Shadow objects (schools)
      for (let i = 0; i < N; i++) {
        let o = objects[i];
        noStroke();
        fill(25, 30, 45, 200);
        rect(o.x, o.y, o.w, o.h, 3);
        stroke(50, 60, 80);
        strokeWeight(1);
        noFill();
        rect(o.x, o.y, o.w, o.h, 3);
        noStroke();
        fill(120, 140, 170, 180);
        textAlign(CENTER, CENTER);
        textSize(9);
        text('C' + (i + 1), o.x + o.w / 2, o.y + o.h / 2);
      }

      // Lights (students)
      for (let i = 0; i < N; i++) {
        let l = lights[i];
        let pulse = 0.7 + 0.3 * sin(frameCount * l.pulseSpeed * 3 + l.pulseOffset);

        noStroke();
        for (let g = 5; g >= 0; g--) {
          fill(255, 230, 180, (6 - g) * 4 * pulse);
          circle(l.x, l.y, l.radius * 2 + g * 12);
        }
        fill(255, 245, 220, 220 * pulse);
        circle(l.x, l.y, l.radius);
        fill(255, 255, 250, 255 * pulse);
        circle(l.x, l.y, l.radius * 0.4);
        fill(255, 230, 180, 160);
        textAlign(CENTER, CENTER);
        textSize(9);
        text('S' + (i + 1), l.x, l.y - l.radius - 10);
      }

      // Title
      noStroke();
      fill(200, 210, 230, 160);
      textAlign(CENTER, TOP);
      textSize(13);
      textStyle(BOLD);
      text('SHADOW PLAY \u2014 LIGHT & MATCHING', width / 2, 16);
      textSize(10);
      textStyle(NORMAL);
      fill(120, 140, 170, 120);
      text('Matched pairs illuminate the screen. Blocking pairs cast shadows.', width / 2, 36);
    }

    function mapScreenY(light, obj, objY) {
      let dx = screenX - light.x;
      let objDx = obj.x - light.x;
      if (objDx === 0) return objY;
      let t = dx / objDx;
      return light.y + (objY - light.y) * t;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      screenX = width * 0.75;
    }

    function galeShapley(sPrefs, schPrefs) {
      let n = sPrefs.length;
      let free = [...Array(n).keys()];
      let proposals = new Array(n).fill(0);
      let schoolMatch = new Array(n).fill(-1);
      let studentMatch = new Array(n).fill(-1);
      let schRank = [];
      for (let i = 0; i < n; i++) {
        schRank[i] = new Array(n);
        for (let r = 0; r < n; r++) schRank[i][schPrefs[i][r]] = r;
      }
      while (free.length > 0) {
        let s = free[0], sch = sPrefs[s][proposals[s]];
        proposals[s]++;
        if (schoolMatch[sch] === -1) {
          schoolMatch[sch] = s; studentMatch[s] = sch; free.shift();
        } else {
          let cur = schoolMatch[sch];
          if (schRank[sch][s] < schRank[sch][cur]) {
            schoolMatch[sch] = s; studentMatch[s] = sch; free.shift();
            studentMatch[cur] = -1; free.push(cur);
          }
        }
      }
      let result = [];
      for (let i = 0; i < n; i++) result.push({ student: i, school: studentMatch[i] });
      return result;
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
  </script>
</body>
</html>
