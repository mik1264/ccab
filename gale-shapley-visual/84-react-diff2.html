<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Schnakenberg Reaction-Diffusion — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; }
    body { background:#0d1117; overflow:hidden; }
    canvas#c { position:fixed; top:0; left:0; width:100vw; height:100vh; display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; font-family:'Nunito',sans-serif; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); font-family:'Nunito',sans-serif; }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Schnakenberg Reaction-Diffusion</h2><p>Schnakenberg reaction-diffusion system initialized with concentrations matching the preference structure. Turing patterns emerge encoding the matching.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2');
    if (!gl) { document.body.innerHTML = '<p style="color:white;padding:40px;">WebGL2 required for this demo.</p>'; }

    const W = 256, H = 256;

    function resize() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
      gl.viewport(0, 0, innerWidth, innerHeight);
    }
    resize();
    window.addEventListener('resize', resize);

    // Vertex shader
    const vsSource = `#version 300 es
    in vec2 p;
    out vec2 vUv;
    void main(){
      vUv = p * 0.5 + 0.5;
      gl_Position = vec4(p, 0.0, 1.0);
    }`;

    // Simulation step shader (Schnakenberg RD)
    const simFS = `#version 300 es
    precision highp float;
    uniform sampler2D u_state;
    uniform vec2 u_texel;
    in vec2 vUv;
    out vec4 fragColor;

    void main(){
      vec4 c = texture(u_state, vUv);
      float u = c.r;
      float v = c.g;

      // Laplacian (5-point stencil)
      vec4 cL = texture(u_state, vUv + vec2(-u_texel.x, 0.0));
      vec4 cR = texture(u_state, vUv + vec2(u_texel.x, 0.0));
      vec4 cU = texture(u_state, vUv + vec2(0.0, u_texel.y));
      vec4 cD = texture(u_state, vUv + vec2(0.0, -u_texel.y));
      float lapU = cL.r + cR.r + cU.r + cD.r - 4.0*u;
      float lapV = cL.g + cR.g + cU.g + cD.g - 4.0*v;

      // Schnakenberg kinetics
      float Du = 0.01;
      float Dv = 0.05;
      float a = 0.12;
      float b = 0.9;
      float dt = 0.5;

      float dudt = Du * lapU + a - u + u*u*v;
      float dvdt = Dv * lapV + b - u*u*v;

      float newU = u + dt * dudt;
      float newV = v + dt * dvdt;

      fragColor = vec4(newU, newV, 0.0, 1.0);
    }`;

    // Render shader (colorize)
    const renderFS = `#version 300 es
    precision highp float;
    uniform sampler2D u_state;
    uniform vec2 u_res;
    in vec2 vUv;
    out vec4 fragColor;

    vec3 hsv2rgb(vec3 c) {
      vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
      vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
      return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
    }

    void main(){
      // Map screen coords to texture coords preserving aspect
      vec2 screenUv = gl_FragCoord.xy / u_res;
      vec4 c = texture(u_state, screenUv);
      float u = c.r;
      float v = c.g;

      // Map U to a beautiful color gradient
      float hue = 0.55 + u * 0.3;
      float sat = 0.7 + 0.3 * sin(u * 3.14);
      float val = 0.2 + 0.7 * clamp(u * 1.5, 0.0, 1.0);

      vec3 col = hsv2rgb(vec3(hue, sat, val));
      // Add subtle V channel influence
      col += vec3(0.1, 0.05, 0.0) * v * 0.3;

      col = pow(col, vec3(0.4545));
      fragColor = vec4(col, 1.0);
    }`;

    function createShader(type, source) {
      const s = gl.createShader(type);
      gl.shaderSource(s, source);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(s));
      }
      return s;
    }

    function createProgram(vsrc, fsrc) {
      const p = gl.createProgram();
      gl.attachShader(p, createShader(gl.VERTEX_SHADER, vsrc));
      gl.attachShader(p, createShader(gl.FRAGMENT_SHADER, fsrc));
      gl.linkProgram(p);
      if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
        console.error(gl.getProgramInfoLog(p));
      }
      return p;
    }

    const simProg = createProgram(vsSource, simFS);
    const renderProg = createProgram(vsSource, renderFS);

    // Fullscreen quad
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

    // Create ping-pong textures and framebuffers
    function createFBTex() {
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, W, H, 0, gl.RGBA, gl.FLOAT, null);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
      const fb = gl.createFramebuffer();
      gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
      gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
      return { tex, fb };
    }

    // Enable float textures
    gl.getExtension('EXT_color_buffer_float');

    const state0 = createFBTex();
    const state1 = createFBTex();

    // Initialize with Gaussian blobs at matched pair positions
    const initData = new Float32Array(W * H * 4);
    const pairPositions = [
      [0.3, 0.3], [0.7, 0.3], [0.5, 0.5], [0.3, 0.7], [0.7, 0.7]
    ];
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const idx = (y * W + x) * 4;
        const px = x / W;
        const py = y / H;
        let u = 0.12 / (1.0 - 0.12*0.12/0.9); // Steady state approx
        let v = 0.9 / (u * u);
        // Add perturbation at pair positions
        for (const [cx, cy] of pairPositions) {
          const dx = px - cx;
          const dy = py - cy;
          const d2 = dx*dx + dy*dy;
          u += 0.5 * Math.exp(-d2 * 200.0);
          v += 0.3 * Math.exp(-d2 * 200.0);
        }
        // Random noise
        u += (Math.random() - 0.5) * 0.05;
        v += (Math.random() - 0.5) * 0.05;
        initData[idx] = u;
        initData[idx+1] = v;
        initData[idx+2] = 0;
        initData[idx+3] = 1;
      }
    }
    gl.bindTexture(gl.TEXTURE_2D, state0.tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, W, H, 0, gl.RGBA, gl.FLOAT, initData);

    let current = 0;
    const states = [state0, state1];

    function setupAttrib(prog) {
      const loc = gl.getAttribLocation(prog, 'p');
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    }

    function frame() {
      // Simulation steps
      for (let i = 0; i < 10; i++) {
        const src = states[current];
        const dst = states[1 - current];
        gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fb);
        gl.viewport(0, 0, W, H);
        gl.useProgram(simProg);
        setupAttrib(simProg);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, src.tex);
        gl.uniform1i(gl.getUniformLocation(simProg, 'u_state'), 0);
        gl.uniform2f(gl.getUniformLocation(simProg, 'u_texel'), 1.0/W, 1.0/H);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        current = 1 - current;
      }

      // Render to screen
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.useProgram(renderProg);
      setupAttrib(renderProg);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, states[current].tex);
      gl.uniform1i(gl.getUniformLocation(renderProg, 'u_state'), 0);
      gl.uniform2f(gl.getUniformLocation(renderProg, 'u_res'), canvas.width, canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
