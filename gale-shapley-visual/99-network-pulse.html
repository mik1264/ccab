<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Pulse — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #c9d1d9; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background: #30363d; }
    #hud { position:fixed;top:16px;right:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;padding:10px 16px;border-radius:12px;font-size:13px;color:#8b949e;backdrop-filter:blur(8px);z-index:100 }
    #hud span { color:#e3b341;font-weight:700 }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div id="hud">Step: <span id="step">0</span> &nbsp; Matched: <span id="mc">0</span>/10</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 10;
    let students = [], schools = [];
    let matching = [], schoolMatch = [];
    let prefPtrs = [];
    let tick = 0, stepCount = 0;
    let proposalParticles = [];
    let hexGrid = [];
    let allDone = false, doneTimer = 0;

    function shuffled(n) {
      let a = []; for (let i = 0; i < n; i++) a.push(i);
      for (let i = n - 1; i > 0; i--) { let j = floor(random(i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }

    function initSim() {
      students = []; schools = [];
      matching = new Array(N).fill(-1);
      schoolMatch = new Array(N).fill(-1);
      prefPtrs = new Array(N).fill(0);
      proposalParticles = [];
      stepCount = 0; tick = 0; allDone = false; doneTimer = 0;

      let leftX = width * 0.2, rightX = width * 0.8;
      let topY = height * 0.08, botY = height * 0.92;

      for (let i = 0; i < N; i++) {
        let y = map(i, 0, N - 1, topY, botY);
        students.push({ x: leftX, y: y, prefs: shuffled(N), ranking: [] });
      }
      for (let i = 0; i < N; i++) {
        let y = map(i, 0, N - 1, topY, botY);
        schools.push({ x: rightX, y: y, prefs: shuffled(N), ranking: [] });
      }

      for (let s of students) { s.ranking = new Array(N); for (let r = 0; r < N; r++) s.ranking[s.prefs[r]] = r; }
      for (let s of schools) { s.ranking = new Array(N); for (let r = 0; r < N; r++) s.ranking[s.prefs[r]] = r; }

      // Build hex grid
      hexGrid = [];
      let hexR = 30, hexH = hexR * sqrt(3);
      for (let gx = -hexR; gx < width + hexR; gx += hexR * 1.5) {
        for (let gy = -hexH; gy < height + hexH; gy += hexH) {
          let offset = (Math.floor(gx / (hexR * 1.5)) % 2) * hexH / 2;
          hexGrid.push({ x: gx, y: gy + offset });
        }
      }
      updateHUD();
    }

    function updateHUD() {
      document.getElementById('step').textContent = stepCount;
      document.getElementById('mc').textContent = matching.filter(m => m !== -1).length;
    }

    function gsStep() {
      for (let i = 0; i < N; i++) {
        if (matching[i] !== -1 || prefPtrs[i] >= N) continue;
        let scIdx = students[i].prefs[prefPtrs[i]];
        prefPtrs[i]++;
        stepCount++;

        // Animated proposal particle
        proposalParticles.push({
          sx: students[i].x, sy: students[i].y,
          tx: schools[scIdx].x, ty: schools[scIdx].y,
          progress: 0, sIdx: i, cIdx: scIdx, resolved: false
        });
        break; // One per step
      }
    }

    function resolveProposal(p) {
      let i = p.sIdx, scIdx = p.cIdx;
      if (matching[i] !== -1) return; // Already matched by earlier resolution
      if (schoolMatch[scIdx] === -1) {
        matching[i] = scIdx; schoolMatch[scIdx] = i;
      } else {
        let cur = schoolMatch[scIdx];
        if (schools[scIdx].ranking[i] < schools[scIdx].ranking[cur]) {
          matching[cur] = -1;
          matching[i] = scIdx; schoolMatch[scIdx] = i;
        }
      }
      updateHUD();
      if (matching.every(m => m !== -1)) { allDone = true; doneTimer = 0; }
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      textFont('Segoe UI');
      initSim();
    }

    function draw() {
      background(13, 17, 23);
      tick++;

      if (allDone) { doneTimer++; if (doneTimer > 600) initSim(); }

      // Hex grid background with breathing
      noFill();
      let hexR = 30;
      let breathe = sin(tick * 0.008) * 0.3 + 0.7;
      stroke(48, 54, 61, 12 * breathe); strokeWeight(0.5);
      for (let h of hexGrid) {
        beginShape();
        for (let a = 0; a < 6; a++) {
          let ang = PI / 3 * a + PI / 6;
          vertex(h.x + cos(ang) * hexR, h.y + sin(ang) * hexR);
        }
        endShape(CLOSE);
      }

      // Draw preference edges as curved beziers
      for (let i = 0; i < N; i++) {
        let st = students[i];
        for (let r = 0; r < N; r++) {
          let scIdx = st.prefs[r];
          let sc = schools[scIdx];
          let isMatched = matching[i] === scIdx;
          let thickness = map(r, 0, N - 1, 2.5, 0.3);
          let curveOff = map(r, 0, N - 1, -25, 25);
          let cpx = (st.x + sc.x) / 2;

          if (isMatched) {
            let pulse = map(sin(tick * 0.06 + i * 0.7), -1, 1, 120, 255);
            stroke(227, 179, 65, pulse); strokeWeight(thickness + 1);
          } else {
            let baseAlpha = map(r, 0, N - 1, 25, 4);
            stroke(88, 166, 255, baseAlpha); strokeWeight(thickness);
          }

          noFill();
          bezier(st.x, st.y, cpx + curveOff, st.y, cpx - curveOff, sc.y, sc.x, sc.y);

          // Edge pulses
          if (isMatched || r < 3) {
            let speed = isMatched ? 0.012 : 0.005;
            let pulseT = ((tick * speed + i * 0.3 + r * 0.15) % 1);
            let px = bezierPoint(st.x, cpx + curveOff, cpx - curveOff, sc.x, pulseT);
            let py = bezierPoint(st.y, st.y, sc.y, sc.y, pulseT);
            noStroke();
            if (isMatched) {
              fill(227, 179, 65, 140); ellipse(px, py, 5);
              fill(227, 179, 65, 30); ellipse(px, py, 14);
            } else {
              fill(88, 166, 255, 35); ellipse(px, py, 3);
            }
          }
        }
      }

      // Draw proposal particles
      for (let i = proposalParticles.length - 1; i >= 0; i--) {
        let p = proposalParticles[i];
        p.progress += 0.012;
        if (p.progress >= 1) {
          if (!p.resolved) { p.resolved = true; resolveProposal(p); }
          proposalParticles.splice(i, 1);
          continue;
        }
        let cpx = (p.sx + p.tx) / 2;
        let px = bezierPoint(p.sx, cpx, cpx, p.tx, p.progress);
        let py = bezierPoint(p.sy, p.sy, p.ty, p.ty, p.progress);
        noStroke();
        fill(255, 255, 255, 25); ellipse(px, py, 22);
        fill(255, 255, 255, 70); ellipse(px, py, 12);
        fill(255, 255, 255, 220); ellipse(px, py, 5);
        for (let t = 1; t <= 5; t++) {
          let tt = max(0, p.progress - t * 0.018);
          let trx = bezierPoint(p.sx, cpx, cpx, p.tx, tt);
          let tr_y = bezierPoint(p.sy, p.sy, p.ty, p.ty, tt);
          fill(255, 255, 255, 45 - t * 8); ellipse(trx, tr_y, 3 - t * 0.4);
        }
      }

      // Draw student nodes
      noStroke();
      for (let i = 0; i < N; i++) {
        let s = students[i];
        let isM = matching[i] !== -1;
        let pulse = sin(tick * 0.03 + i) * 3;
        let col = isM ? [227, 179, 65] : [88, 166, 255];
        fill(col[0], col[1], col[2], 18); ellipse(s.x, s.y, 38 + pulse);
        fill(col[0], col[1], col[2], 45); ellipse(s.x, s.y, 24 + pulse);
        fill(col[0], col[1], col[2], 220); ellipse(s.x, s.y, 16);
        fill(255); textAlign(CENTER, CENTER); textSize(9);
        text('S' + (i + 1), s.x, s.y);
      }

      // Draw school nodes
      for (let i = 0; i < N; i++) {
        let s = schools[i];
        let isM = schoolMatch[i] !== -1;
        let pulse = sin(tick * 0.025 + i + 2) * 3;
        let col = isM ? [227, 179, 65] : [63, 185, 80];
        fill(col[0], col[1], col[2], 18); ellipse(s.x, s.y, 38 + pulse);
        fill(col[0], col[1], col[2], 45); ellipse(s.x, s.y, 24 + pulse);
        fill(col[0], col[1], col[2], 220); ellipse(s.x, s.y, 16);
        fill(255); textAlign(CENTER, CENTER); textSize(9);
        text('C' + (i + 1), s.x, s.y);
      }

      // Column labels
      fill(88, 166, 255, 110); textAlign(CENTER); textSize(13);
      text('Students', width * 0.2, height * 0.035);
      fill(63, 185, 80, 110);
      text('Schools', width * 0.8, height * 0.035);

      // Run a step every 5 seconds
      if (!allDone && tick % 300 === 150) gsStep();
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
