<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'Nunito',sans-serif; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
.back-link:hover { background:#30363d; }
.info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
.info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
.info p { font-size:12px; color:#8b949e; line-height:1.4; }
</style>
</head>
<body>
<a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
<div class="info">
<h2>Network Pulse</h2>
<p>The matching network pulses with data: proposals travel as electrical signals, acceptances light up nodes, rejections leave dark paths. The stable state glows with steady current.</p>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

const N = 5; // 5 men + 5 women = 10 nodes
const TOTAL = 10;

// Node positions in a circle (alternating men/women)
function getNodes() {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const r = Math.min(cx, cy) * 0.45;
    const nodes = [];
    for (let i = 0; i < TOTAL; i++) {
        const angle = (i / TOTAL) * Math.PI * 2 - Math.PI / 2;
        nodes.push({
            x: cx + Math.cos(angle) * r,
            y: cy + Math.sin(angle) * r,
            isMan: i < N,
            idx: i < N ? i : i - N,
            brightness: 0,
            acceptPulse: 0,
            rejectPulse: 0
        });
    }
    return nodes;
}

let nodes = getNodes();
window.addEventListener('resize', () => { resize(); nodes = getNodes(); });

// Generate preferences
function shuffle(a) { let b=[...a]; for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
let menPrefs, womenPrefs;
function generatePrefs() {
    menPrefs = []; womenPrefs = [];
    for (let i = 0; i < N; i++) { menPrefs.push(shuffle([0,1,2,3,4])); womenPrefs.push(shuffle([0,1,2,3,4])); }
}
generatePrefs();

// DA step-by-step execution
let daState = null;
let pulses = []; // active traveling pulses
let stableEdges = []; // final stable matching edges
let phase = 'running'; // running, stable, pause
let phaseTimer = 0;

function initDA() {
    daState = {
        menPartner: Array(N).fill(-1),
        womenPartner: Array(N).fill(-1),
        menNext: Array(N).fill(0),
        free: [...Array(N).keys()],
        stepTimer: 0,
        stepDelay: 30, // frames between proposals
        finished: false
    };
    pulses = [];
    stableEdges = [];
    phase = 'running';
    phaseTimer = 0;
    nodes.forEach(n => { n.brightness = 0; n.acceptPulse = 0; n.rejectPulse = 0; });
}
initDA();

function stepDA() {
    if (daState.free.length === 0 || daState.finished) {
        daState.finished = true;
        return;
    }

    const m = daState.free[0];
    if (daState.menNext[m] >= N) { daState.free.shift(); return; }

    const w = menPrefs[m][daState.menNext[m]];
    daState.menNext[m]++;

    // Create pulse from man to woman
    const fromNode = m;
    const toNode = N + w;

    pulses.push({
        from: fromNode, to: toNode,
        progress: 0, speed: 0.025,
        type: 'proposal',
        manIdx: m, womanIdx: w
    });
}

function handleProposalArrival(pulse) {
    const m = pulse.manIdx;
    const w = pulse.womanIdx;

    if (daState.womenPartner[w] === -1) {
        // Accept
        daState.menPartner[m] = w;
        daState.womenPartner[w] = m;
        daState.free.shift();
        nodes[N + w].acceptPulse = 1;
        nodes[m].brightness = 0.8;
    } else {
        const curr = daState.womenPartner[w];
        if (womenPrefs[w].indexOf(m) < womenPrefs[w].indexOf(curr)) {
            // Accept new, reject current
            daState.menPartner[m] = w;
            daState.womenPartner[w] = m;
            daState.menPartner[curr] = -1;
            daState.free.shift();
            daState.free.push(curr);
            nodes[N + w].acceptPulse = 1;
            nodes[m].brightness = 0.8;
            nodes[curr].rejectPulse = 1;
            nodes[curr].brightness = 0;

            // Rejection pulse back to old partner
            pulses.push({
                from: N + w, to: curr,
                progress: 0, speed: 0.03,
                type: 'rejection'
            });
        } else {
            // Reject
            nodes[N + w].rejectPulse = 0.5;
            pulses.push({
                from: N + w, to: m,
                progress: 0, speed: 0.03,
                type: 'rejection'
            });
        }
    }
}

let time = 0;

function animate() {
    requestAnimationFrame(animate);
    time += 0.016;
    phaseTimer++;

    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, w, h);

    // Background network grid
    ctx.strokeStyle = 'rgba(30,36,45,0.3)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < TOTAL; i++) {
        for (let j = i + 1; j < TOTAL; j++) {
            if (nodes[i].isMan !== nodes[j].isMan) {
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.stroke();
            }
        }
    }

    if (phase === 'running') {
        daState.stepTimer++;
        if (daState.stepTimer >= daState.stepDelay && !daState.finished) {
            daState.stepTimer = 0;
            stepDA();
        }

        if (daState.finished && pulses.length === 0) {
            phase = 'stable';
            phaseTimer = 0;
            // Build stable edges
            for (let m = 0; m < N; m++) {
                if (daState.menPartner[m] !== -1) {
                    stableEdges.push({ from: m, to: N + daState.menPartner[m], pulse: 0 });
                }
            }
        }
    } else if (phase === 'stable') {
        // Steady pulse on stable edges
        stableEdges.forEach((e, i) => {
            e.pulse = (e.pulse + 0.01) % 1;
        });

        if (phaseTimer > 300) {
            phase = 'pause';
            phaseTimer = 0;
        }
    } else if (phase === 'pause') {
        if (phaseTimer > 60) {
            generatePrefs();
            initDA();
        }
    }

    // Draw stable edges with pulse
    stableEdges.forEach((e, i) => {
        const n1 = nodes[e.from], n2 = nodes[e.to];
        // Glow line
        ctx.beginPath();
        ctx.moveTo(n1.x, n1.y);
        ctx.lineTo(n2.x, n2.y);
        ctx.strokeStyle = 'rgba(63,185,80,0.25)';
        ctx.lineWidth = 4;
        ctx.stroke();

        // Bright line
        ctx.strokeStyle = 'rgba(63,185,80,0.6)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Traveling pulse dot
        const px = n1.x + (n2.x - n1.x) * e.pulse;
        const py = n1.y + (n2.y - n1.y) * e.pulse;
        ctx.beginPath();
        ctx.arc(px, py, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#3fb950';
        ctx.fill();

        // Reverse pulse
        const rp = (e.pulse + 0.5) % 1;
        const rpx = n1.x + (n2.x - n1.x) * rp;
        const rpy = n1.y + (n2.y - n1.y) * rp;
        ctx.beginPath();
        ctx.arc(rpx, rpy, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(63,185,80,0.5)';
        ctx.fill();
    });

    // Update and draw pulses
    for (let i = pulses.length - 1; i >= 0; i--) {
        const p = pulses[i];
        p.progress += p.speed;

        if (p.progress >= 1) {
            if (p.type === 'proposal') handleProposalArrival(p);
            pulses.splice(i, 1);
            continue;
        }

        const n1 = nodes[p.from], n2 = nodes[p.to];
        const px = n1.x + (n2.x - n1.x) * p.progress;
        const py = n1.y + (n2.y - n1.y) * p.progress;

        // Draw pulse path
        ctx.beginPath();
        ctx.moveTo(n1.x, n1.y);
        ctx.lineTo(px, py);
        if (p.type === 'proposal') {
            ctx.strokeStyle = 'rgba(88,166,255,0.4)';
        } else {
            ctx.strokeStyle = 'rgba(255,80,80,0.3)';
        }
        ctx.lineWidth = 2;
        ctx.stroke();

        // Pulse dot
        const size = p.type === 'proposal' ? 6 : 4;
        ctx.beginPath();
        ctx.arc(px, py, size, 0, Math.PI * 2);
        if (p.type === 'proposal') {
            const grad = ctx.createRadialGradient(px, py, 0, px, py, size * 2);
            grad.addColorStop(0, 'rgba(88,166,255,0.9)');
            grad.addColorStop(1, 'rgba(88,166,255,0)');
            ctx.fillStyle = grad;
        } else {
            ctx.fillStyle = 'rgba(255,80,80,0.8)';
        }
        ctx.fill();

        // Glow
        ctx.beginPath();
        ctx.arc(px, py, size * 3, 0, Math.PI * 2);
        ctx.fillStyle = p.type === 'proposal' ? 'rgba(88,166,255,0.08)' : 'rgba(255,80,80,0.06)';
        ctx.fill();
    }

    // Draw nodes
    nodes.forEach((n, i) => {
        // Decay pulses
        n.acceptPulse *= 0.97;
        n.rejectPulse *= 0.97;
        n.brightness *= 0.995;

        const baseR = 18;
        const pulse = 1 + n.acceptPulse * 0.3;

        // Outer glow
        const glowR = baseR * 2.5;
        const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowR);
        if (n.isMan) {
            grad.addColorStop(0, `rgba(88,166,255,${0.15 + n.brightness * 0.2})`);
            grad.addColorStop(1, 'rgba(88,166,255,0)');
        } else {
            const green = n.acceptPulse > 0.1 ? 0.3 : 0;
            const red = n.rejectPulse > 0.1 ? 0.2 : 0;
            grad.addColorStop(0, `rgba(${210 + red * 45},${168 + green * 87},255,${0.15 + n.brightness * 0.2})`);
            grad.addColorStop(1, 'rgba(210,168,255,0)');
        }
        ctx.beginPath();
        ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        // Accept ring
        if (n.acceptPulse > 0.05) {
            ctx.beginPath();
            ctx.arc(n.x, n.y, baseR + 15 * (1 - n.acceptPulse), 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(63,185,80,${n.acceptPulse})`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Reject ring
        if (n.rejectPulse > 0.05) {
            ctx.beginPath();
            ctx.arc(n.x, n.y, baseR + 12 * (1 - n.rejectPulse), 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255,80,80,${n.rejectPulse})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        // Node body
        ctx.beginPath();
        ctx.arc(n.x, n.y, baseR * pulse, 0, Math.PI * 2);
        if (n.isMan) {
            ctx.fillStyle = `rgba(30,60,120,${0.7 + n.brightness * 0.3})`;
        } else {
            ctx.fillStyle = `rgba(80,40,120,${0.7 + n.brightness * 0.3})`;
        }
        ctx.fill();
        ctx.strokeStyle = n.isMan ? '#58a6ff' : '#d2a8ff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Label
        ctx.fillStyle = '#e6edf3';
        ctx.font = '600 11px Nunito';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(n.isMan ? 'M' + (n.idx + 1) : 'W' + (n.idx + 1), n.x, n.y);
    });

    // Phase label
    const labels = { running: 'Proposing...', stable: 'Stable Matching', pause: '' };
    const colors = { running: '#58a6ff', stable: '#3fb950', pause: '#8b949e' };
    ctx.fillStyle = colors[phase];
    ctx.font = '600 16px Lora';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[phase], w / 2, h - 40);
}

animate();
</script>
</body>
</html>
