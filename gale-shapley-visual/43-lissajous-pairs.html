<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lissajous Preference Curves — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Lissajous Preference Curves</h2><p>Each matched pair draws a Lissajous figure — frequency ratio encodes their preference compatibility. Perfect matches make clean figures; imperfect ones make complex tangles.</p></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    // 5 matched pairs with preference-derived Lissajous parameters
    let figures = [];
    let t = 0;

    // Preference ranks: rank[i] = how man i ranked his matched woman (1=top)
    let manRanks  = [1, 2, 1, 3, 2];
    let womanRanks = [1, 1, 3, 2, 4];

    // Colors for each pair
    let pairColors;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);

      pairColors = [
        [0, 85, 100],     // red
        [200, 85, 100],   // cyan
        [120, 80, 90],    // green
        [40, 90, 100],    // orange
        [280, 75, 100]    // purple
      ];

      // Frequency ratios derived from preference ranks
      // Better matches = simpler ratios
      let freqPairs = [
        [1, 1],   // mutual 1st choice: circle
        [2, 1],   // 2:1 = figure-eight
        [3, 1],   // 3:1
        [3, 2],   // 3:2
        [4, 2]    // more complex
      ];

      // Layout: arrange 5 figures in a grid or row
      let cols = 5;
      let cellW = width / cols;
      let cellH = height;

      for (let i = 0; i < 5; i++) {
        let combined = manRanks[i] + womanRanks[i];
        let idx = combined <= 2 ? 0 : combined <= 3 ? 1 : combined <= 4 ? 2 : combined <= 5 ? 3 : 4;
        figures.push({
          cx: cellW * i + cellW / 2,
          cy: cellH / 2,
          freqX: freqPairs[idx][0],
          freqY: freqPairs[idx][1],
          phase: random(PI),
          amplitude: min(cellW, cellH) * 0.32,
          col: pairColors[i],
          label: 'M' + (i+1) + '-W' + (i+1),
          rank: '(' + manRanks[i] + ',' + womanRanks[i] + ')',
          trail: []
        });
      }
    }

    function draw() {
      background(13, 17, 23, 20);

      t += 0.015;

      for (let fig of figures) {
        let phase = fig.phase + t * 0.3; // Slowly drifting phase

        // Draw the full Lissajous curve
        noFill();
        strokeWeight(1.5);

        // Glowing effect: draw multiple layers
        for (let layer = 0; layer < 3; layer++) {
          let alpha = layer === 0 ? 10 : layer === 1 ? 30 : 70;
          let sw = layer === 0 ? 6 : layer === 1 ? 3 : 1.2;
          stroke(fig.col[0], fig.col[1], fig.col[2], alpha);
          strokeWeight(sw);

          beginShape();
          for (let a = 0; a < TWO_PI; a += 0.01) {
            let x = fig.cx + sin(fig.freqX * a + phase) * fig.amplitude;
            let y = fig.cy + sin(fig.freqY * a) * fig.amplitude;
            vertex(x, y);
          }
          endShape();
        }

        // Draw a bright traveling dot
        let dotA = (t * 2) % TWO_PI;
        let dotX = fig.cx + sin(fig.freqX * dotA + phase) * fig.amplitude;
        let dotY = fig.cy + sin(fig.freqY * dotA) * fig.amplitude;

        // Trail
        fig.trail.push({ x: dotX, y: dotY });
        if (fig.trail.length > 40) fig.trail.shift();
        for (let j = 0; j < fig.trail.length; j++) {
          let alpha = map(j, 0, fig.trail.length, 5, 80);
          let sz = map(j, 0, fig.trail.length, 2, 6);
          fill(fig.col[0], fig.col[1], fig.col[2], alpha);
          noStroke();
          ellipse(fig.trail[j].x, fig.trail[j].y, sz, sz);
        }

        // Bright dot
        noStroke();
        fill(fig.col[0], 30, 100, 90);
        ellipse(dotX, dotY, 8, 8);

        // Labels
        fill(0, 0, 80);
        textFont('Nunito');
        textSize(13);
        textAlign(CENTER);
        text(fig.label, fig.cx, fig.cy + fig.amplitude + 30);
        textSize(10);
        fill(0, 0, 50);
        text('rank ' + fig.rank, fig.cx, fig.cy + fig.amplitude + 46);

        // Frequency label
        textSize(10);
        fill(fig.col[0], 50, 80);
        text(fig.freqX + ':' + fig.freqY, fig.cx, fig.cy - fig.amplitude - 20);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
