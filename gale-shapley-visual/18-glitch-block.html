<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blocking Pair Glitch Art — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Blocking Pair Glitch Art</h2><p>Stability is beauty; blocking pairs are glitches. Unstable matchings create visual noise and distortion. As stability is achieved, the image resolves.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);

    function mkShader(type, src) {
      const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
      return s;
    }
    function mkProg(vs, fs) {
      const p = gl.createProgram();
      gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
      gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(p); return p;
    }

    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0,1); }`;

    const FS = `
    precision mediump float;
    uniform float u_time;
    uniform vec2 u_res;

    float hash(float n) { return fract(sin(n) * 43758.5453); }
    float hash2(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = hash2(i);
      float b = hash2(i + vec2(1.0, 0.0));
      float c = hash2(i + vec2(0.0, 1.0));
      float d = hash2(i + vec2(1.0, 1.0));
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }

    // Beautiful geometric pattern (the "stable" image)
    vec3 stablePattern(vec2 uv, float t) {
      vec2 p = (uv - 0.5) * 6.0;
      float r = length(p);
      float a = atan(p.y, p.x);

      // Hexagonal rosette
      float hex = cos(a * 6.0 + t * 0.3) * 0.5 + 0.5;
      float rings = sin(r * 4.0 - t * 0.5) * 0.5 + 0.5;
      float pattern = hex * rings;

      // Sacred geometry circles
      float circles = 0.0;
      for (int i = 0; i < 6; i++) {
        float angle = float(i) * 1.047;
        vec2 center = vec2(cos(angle), sin(angle)) * 1.5;
        float d = abs(length(p - center) - 1.5);
        circles += smoothstep(0.05, 0.0, d) * 0.3;
      }

      vec3 col = vec3(0.05, 0.08, 0.15);
      col += vec3(0.1, 0.3, 0.5) * pattern;
      col += vec3(0.3, 0.5, 0.8) * circles;
      col += vec3(0.0, 0.15, 0.3) * smoothstep(0.03, 0.0, abs(r - 2.5));

      return col;
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      float t = u_time;

      // Stability cycles: 0 (glitched) -> 1 (clean), repeats every 10 seconds
      float cycle = mod(t * 0.1, 1.0);
      float stability = smoothstep(0.0, 0.8, cycle);

      // Glitch amount (inverse of stability)
      float glitch = 1.0 - stability;

      // Apply glitch effects to UV
      vec2 glitchUV = uv;

      // Scanline displacement
      float scanline = step(0.5, hash(floor(uv.y * 80.0) + floor(t * 8.0)));
      glitchUV.x += scanline * glitch * 0.08 * (hash(floor(t * 12.0) + uv.y * 5.0) - 0.5);

      // Block displacement (random rectangular regions)
      float blockY = floor(uv.y * 12.0 + t * 2.0);
      float blockShift = hash(blockY + floor(t * 5.0)) * glitch;
      if (blockShift > 0.7) {
        glitchUV.x += (hash(blockY * 3.7) - 0.5) * glitch * 0.15;
      }

      // Pixel quantization (lower res when glitchy)
      float pixelSize = mix(1.0, 16.0, glitch * glitch);
      vec2 quantUV = floor(glitchUV * u_res / pixelSize) * pixelSize / u_res;
      glitchUV = mix(glitchUV, quantUV, glitch * 0.6);

      // Get the stable pattern with glitched UVs
      vec3 col = stablePattern(glitchUV, t);

      // Chromatic aberration
      float caAmount = glitch * 0.015;
      vec3 colR = stablePattern(glitchUV + vec2(caAmount, 0.0), t);
      vec3 colB = stablePattern(glitchUV - vec2(caAmount, 0.0), t);
      col = vec3(colR.r, col.g, colB.b);

      // Scanline overlay
      float scanlineOverlay = sin(uv.y * u_res.y * 1.5) * 0.5 + 0.5;
      col *= mix(1.0, 0.85 + 0.15 * scanlineOverlay, glitch * 0.5);

      // Random color noise
      float colorNoise = hash2(uv * 100.0 + t * 50.0) * glitch * 0.15;
      col += vec3(colorNoise, -colorNoise * 0.5, colorNoise * 0.3);

      // Occasional white flash lines
      float flashLine = step(0.97, hash(floor(uv.y * 200.0) + floor(t * 15.0)));
      col += vec3(0.5) * flashLine * glitch;

      // Vignette
      float vig = 1.0 - 0.3 * length(uv - 0.5);
      col *= vig;

      gl_FragColor = vec4(col, 1.0);
    }`;

    const prog = mkProg(VS, FS);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    const pLoc = gl.getAttribLocation(prog, 'p');
    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uRes = gl.getUniformLocation(prog, 'u_res');

    gl.useProgram(prog);
    gl.enableVertexAttribArray(pLoc);
    gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

    function frame(t) {
      gl.uniform1f(uTime, t * 0.001);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
