<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generational Matching</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'Nunito',sans-serif; overflow:hidden; }
canvas { display:block; }
.back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
.back-link:hover { background:#30363d; }
.info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
.info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
.info p { font-size:12px; color:#8b949e; line-height:1.4; }
</style>
</head>
<body>
<a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
<div class="info">
<h2>Generational Matching</h2>
<p>A time-lapse of 50 generations of a population where stable matching determines fitness. Watch the population evolve as better-matched pairs reproduce more.</p>
</div>

<script>
const POP = 100;
const GRID = 10; // 10x10
const GEN_MAX = 50;

// Each agent has a trait vector [r, g, b] representing their "type"
let agents = [];
let generation = 0;
let genTimer = 0;
let genDelay = 40; // frames per generation
let avgFitness = 0;
let fitnessHistory = [];

function initAgents() {
    agents = [];
    for (let i = 0; i < POP; i++) {
        agents.push({
            r: random(50, 255),
            g: random(50, 255),
            b: random(50, 255),
            fitness: 0,
            matched: false,
            partner: -1,
            x: (i % GRID),
            y: Math.floor(i / GRID)
        });
    }
    generation = 0;
    fitnessHistory = [];
}

// Compatibility: how well two agents match (higher = better)
function compatibility(a, b) {
    // Complementary colors match better
    const dr = Math.abs((a.r + b.r) - 255) / 255;
    const dg = Math.abs((a.g + b.g) - 255) / 255;
    const db = Math.abs((a.b + b.b) - 255) / 255;
    return 1 - (dr + dg + db) / 3;
}

// Simple stable-like matching: greedy by preference
function matchGeneration() {
    const n = Math.floor(POP / 2);
    const groupA = agents.slice(0, n);
    const groupB = agents.slice(n);

    // Each in A ranks all in B by compatibility
    let aPrefs = groupA.map((a, i) => {
        let ranked = groupB.map((b, j) => ({ j, score: compatibility(a, b) }));
        ranked.sort((x, y) => y.score - x.score);
        return ranked.map(r => r.j);
    });

    let bPrefs = groupB.map((b, j) => {
        let ranked = groupA.map((a, i) => ({ i, score: compatibility(a, b) }));
        ranked.sort((x, y) => y.score - x.score);
        return ranked.map(r => r.i);
    });

    // Gale-Shapley
    let aPartner = Array(n).fill(-1);
    let bPartner = Array(n).fill(-1);
    let aNext = Array(n).fill(0);
    let free = [...Array(n).keys()];

    while (free.length > 0) {
        let a = free[0];
        if (aNext[a] >= n) { free.shift(); continue; }
        let b = aPrefs[a][aNext[a]];
        aNext[a]++;
        if (bPartner[b] === -1) {
            aPartner[a] = b; bPartner[b] = a; free.shift();
        } else {
            let curr = bPartner[b];
            if (bPrefs[b].indexOf(a) < bPrefs[b].indexOf(curr)) {
                aPartner[a] = b; bPartner[b] = a; aPartner[curr] = -1;
                free.shift(); free.push(curr);
            }
        }
    }

    // Assign fitness
    let totalFit = 0;
    for (let i = 0; i < n; i++) {
        groupA[i].matched = aPartner[i] !== -1;
        groupA[i].partner = aPartner[i] !== -1 ? n + aPartner[i] : -1;
        if (aPartner[i] !== -1) {
            const fit = compatibility(groupA[i], groupB[aPartner[i]]);
            groupA[i].fitness = fit;
            groupB[aPartner[i]].fitness = fit;
            groupB[aPartner[i]].matched = true;
            groupB[aPartner[i]].partner = i;
            totalFit += fit * 2;
        }
    }
    avgFitness = totalFit / POP;
    fitnessHistory.push(avgFitness);
}

// Reproduction: matched pairs with high fitness reproduce
function reproduce() {
    let newAgents = [];

    // Selection: weighted by fitness
    let fitnesses = agents.map(a => a.fitness);
    let totalFit = fitnesses.reduce((s, f) => s + f, 0);
    if (totalFit === 0) totalFit = 1;

    for (let i = 0; i < POP; i++) {
        // Tournament selection
        let parent1 = tournamentSelect(fitnesses);
        let parent2 = tournamentSelect(fitnesses);
        while (parent2 === parent1) parent2 = tournamentSelect(fitnesses);

        let child = {
            r: constrain(lerp(agents[parent1].r, agents[parent2].r, random(0.3, 0.7)) + random(-15, 15), 30, 255),
            g: constrain(lerp(agents[parent1].g, agents[parent2].g, random(0.3, 0.7)) + random(-15, 15), 30, 255),
            b: constrain(lerp(agents[parent1].b, agents[parent2].b, random(0.3, 0.7)) + random(-15, 15), 30, 255),
            fitness: 0,
            matched: false,
            partner: -1,
            x: i % GRID,
            y: Math.floor(i / GRID)
        };
        newAgents.push(child);
    }
    agents = newAgents;
}

function tournamentSelect(fitnesses) {
    let a = Math.floor(random(POP));
    let b = Math.floor(random(POP));
    return fitnesses[a] > fitnesses[b] ? a : b;
}

function constrain(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function setup() {
    createCanvas(windowWidth, windowHeight);
    initAgents();
    textFont('Nunito');
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}

function draw() {
    background(13, 17, 23);

    genTimer++;
    if (genTimer >= genDelay) {
        genTimer = 0;
        if (generation < GEN_MAX) {
            matchGeneration();
            reproduce();
            generation++;
        } else {
            // Reset
            initAgents();
        }
    }

    // Draw grid of agents
    const gridSize = min(width * 0.5, height * 0.65);
    const cellSize = gridSize / GRID;
    const offsetX = width / 2 - gridSize / 2;
    const offsetY = height / 2 - gridSize / 2 + 20;

    for (let i = 0; i < POP; i++) {
        const gx = i % GRID;
        const gy = Math.floor(i / GRID);
        const cx = offsetX + gx * cellSize + cellSize / 2;
        const cy = offsetY + gy * cellSize + cellSize / 2;
        const a = agents[i];

        // Agent circle
        const r = cellSize * 0.35;
        const pulse = a.matched ? 1 + 0.1 * sin(frameCount * 0.1 + i) : 1;

        // Glow for matched
        if (a.matched) {
            noStroke();
            fill(a.r, a.g, a.b, 30);
            ellipse(cx, cy, r * 3 * pulse, r * 3 * pulse);
        }

        noStroke();
        fill(a.r, a.g, a.b, 200);
        ellipse(cx, cy, r * 2 * pulse, r * 2 * pulse);

        // Bright center
        fill(a.r, a.g, a.b);
        ellipse(cx, cy, r * pulse, r * pulse);

        // Match line
        if (a.matched && a.partner > i && a.partner < POP) {
            const px = a.partner % GRID;
            const py = Math.floor(a.partner / GRID);
            const pcx = offsetX + px * cellSize + cellSize / 2;
            const pcy = offsetY + py * cellSize + cellSize / 2;
            stroke(255, 255, 255, 20);
            strokeWeight(0.5);
            line(cx, cy, pcx, pcy);
        }
    }

    // Generation counter
    noStroke();
    fill(88, 166, 255);
    textAlign(CENTER, CENTER);
    textSize(22);
    textFont('Lora');
    text(`Generation ${generation} / ${GEN_MAX}`, width / 2, offsetY - 40);

    // Fitness graph
    if (fitnessHistory.length > 1) {
        const gw = 200, gh = 60;
        const gx = width - gw - 30;
        const gy = height - gh - 30;

        // Background
        fill(13, 17, 23, 200);
        stroke(48, 54, 61);
        strokeWeight(1);
        rect(gx - 5, gy - 5, gw + 10, gh + 25, 8);

        // Label
        noStroke();
        fill(139, 148, 158);
        textSize(10);
        textFont('Nunito');
        textAlign(LEFT, TOP);
        text('Avg Fitness', gx, gy + gh + 2);

        // Graph
        noFill();
        stroke(63, 185, 80);
        strokeWeight(1.5);
        beginShape();
        for (let i = 0; i < fitnessHistory.length; i++) {
            const x = gx + (i / GEN_MAX) * gw;
            const y = gy + gh - fitnessHistory[i] * gh;
            vertex(x, y);
        }
        endShape();

        // Current value
        noStroke();
        fill(63, 185, 80);
        textAlign(RIGHT, TOP);
        textSize(11);
        text((avgFitness * 100).toFixed(1) + '%', gx + gw, gy + gh + 2);
    }

    // Progress bar
    const pbW = 300, pbH = 4;
    const pbX = width / 2 - pbW / 2;
    const pbY = offsetY + gridSize + 25;
    noStroke();
    fill(33, 38, 45);
    rect(pbX, pbY, pbW, pbH, 2);
    fill(88, 166, 255);
    rect(pbX, pbY, pbW * (generation / GEN_MAX), pbH, 2);
}
</script>
</body>
</html>
