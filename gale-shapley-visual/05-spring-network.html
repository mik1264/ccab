<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spring Network — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #c9d1d9; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background: #30363d; }
    #info { position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(13,17,23,0.85);border:1px solid #30363d;padding:10px 20px;border-radius:12px;font-size:13px;color:#8b949e;backdrop-filter:blur(8px);z-index:100;text-align:center }
    #info b { color:#e3b341 }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div id="info">Spring physics: matched pairs <b>attract strongly</b>, preferred pairs attract weakly, others repel. Gold edges = stable matches.</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 10;
    let students = [], schools = [];
    let matching = []; // matching[studentIdx] = schoolIdx or -1
    let schoolMatch = []; // schoolMatch[schoolIdx] = studentIdx or -1
    let settled = false;

    function shuffled(n) {
      let a = []; for (let i = 0; i < n; i++) a.push(i);
      for (let i = n - 1; i > 0; i--) { let j = floor(random(i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }

    function initSim() {
      students = []; schools = [];
      settled = false;

      let leftX = width * 0.25, rightX = width * 0.75;
      let topY = height * 0.1, botY = height * 0.85;

      for (let i = 0; i < N; i++) {
        let yy = map(i, 0, N - 1, topY, botY);
        students.push({
          x: leftX + random(-30, 30), y: yy + random(-10, 10),
          vx: 0, vy: 0, homeX: leftX, homeY: yy,
          prefs: shuffled(N), prefPtr: 0, ranking: []
        });
      }
      for (let i = 0; i < N; i++) {
        let yy = map(i, 0, N - 1, topY, botY);
        schools.push({
          x: rightX + random(-30, 30), y: yy + random(-10, 10),
          vx: 0, vy: 0, homeX: rightX, homeY: yy,
          prefs: shuffled(N), ranking: []
        });
      }

      // Build ranking lookups
      for (let s of students) {
        s.ranking = new Array(N);
        for (let r = 0; r < N; r++) s.ranking[s.prefs[r]] = r;
      }
      for (let s of schools) {
        s.ranking = new Array(N);
        for (let r = 0; r < N; r++) s.ranking[s.prefs[r]] = r;
      }

      // Run Gale-Shapley to completion
      matching = new Array(N).fill(-1);
      schoolMatch = new Array(N).fill(-1);
      let prefPtrs = new Array(N).fill(0);
      let free = [];
      for (let i = 0; i < N; i++) free.push(i);

      while (free.length > 0) {
        let st = free.shift();
        let scIdx = students[st].prefs[prefPtrs[st]];
        prefPtrs[st]++;
        if (schoolMatch[scIdx] === -1) {
          matching[st] = scIdx; schoolMatch[scIdx] = st;
        } else {
          let cur = schoolMatch[scIdx];
          if (schools[scIdx].ranking[st] < schools[scIdx].ranking[cur]) {
            matching[cur] = -1; free.push(cur);
            matching[st] = scIdx; schoolMatch[scIdx] = st;
          } else {
            free.push(st);
          }
        }
      }
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      textFont('Segoe UI');
      initSim();
    }

    function draw() {
      background(13, 17, 23, 60);

      let dt = 0.6;

      // Spring forces
      for (let i = 0; i < N; i++) {
        let st = students[i];
        // Home anchor
        st.vx += (st.homeX - st.x) * 0.002;
        st.vy += (st.homeY - st.y) * 0.002;

        for (let j = 0; j < N; j++) {
          let sc = schools[j];
          let dx = sc.x - st.x, dy = sc.y - st.y;
          let dist = max(sqrt(dx * dx + dy * dy), 1);
          let nx = dx / dist, ny = dy / dist;

          if (matching[i] === j) {
            // Matched: strong spring
            let f = (dist - 120) * 0.05;
            st.vx += nx * f * dt;
            st.vy += ny * f * dt;
            sc.vx -= nx * f * dt;
            sc.vy -= ny * f * dt;
          } else {
            let rank = st.ranking[j];
            if (rank < 4) {
              // Top preference: weak attraction
              let f = (dist - 200) * 0.005 * (1 - rank / 4);
              st.vx += nx * f * dt;
              st.vy += ny * f * dt;
            } else {
              // Low preference: mild repulsion
              if (dist < 200) {
                let f = -0.3 / max(dist * 0.1, 1);
                st.vx += nx * f * dt;
                st.vy += ny * f * dt;
              }
            }
          }
        }

        // Damping
        st.vx *= 0.92; st.vy *= 0.92;
        st.x += st.vx * dt; st.y += st.vy * dt;
        st.x = constrain(st.x, 40, width - 40);
        st.y = constrain(st.y, 40, height - 40);
      }

      for (let j = 0; j < N; j++) {
        let sc = schools[j];
        sc.vx += (sc.homeX - sc.x) * 0.002;
        sc.vy += (sc.homeY - sc.y) * 0.002;
        sc.vx *= 0.92; sc.vy *= 0.92;
        sc.x += sc.vx * dt; sc.y += sc.vy * dt;
        sc.x = constrain(sc.x, 40, width - 40);
        sc.y = constrain(sc.y, 40, height - 40);
      }

      // Draw preference edges (faint)
      for (let i = 0; i < N; i++) {
        let st = students[i];
        for (let r = 0; r < N; r++) {
          let scIdx = st.prefs[r];
          if (matching[i] === scIdx) continue;
          let sc = schools[scIdx];
          let opacity = map(r, 0, N - 1, 40, 5);
          stroke(100, 120, 140, opacity);
          strokeWeight(map(r, 0, N - 1, 1.2, 0.3));
          line(st.x, st.y, sc.x, sc.y);
        }
      }

      // Draw matched edges (gold, animated)
      let t = frameCount * 0.03;
      for (let i = 0; i < N; i++) {
        if (matching[i] === -1) continue;
        let st = students[i], sc = schools[matching[i]];
        let pulse = map(sin(t + i), -1, 1, 160, 255);
        stroke(227, 179, 65, pulse);
        strokeWeight(2.5 + sin(t + i * 0.5) * 0.8);
        line(st.x, st.y, sc.x, sc.y);
      }

      // Draw student nodes
      noStroke();
      for (let i = 0; i < N; i++) {
        let s = students[i];
        fill(88, 166, 255, 30); ellipse(s.x, s.y, 40);
        fill(88, 166, 255, 200); ellipse(s.x, s.y, 20);
        fill(255); textAlign(CENTER, CENTER); textSize(10);
        text(i + 1, s.x, s.y);
      }

      // Draw school nodes
      for (let i = 0; i < N; i++) {
        let s = schools[i];
        fill(63, 185, 80, 30); ellipse(s.x, s.y, 40);
        fill(63, 185, 80, 200); ellipse(s.x, s.y, 20);
        fill(255); textAlign(CENTER, CENTER); textSize(10);
        text(i + 1, s.x, s.y);
      }

      // Column labels
      fill(88, 166, 255, 150); textAlign(CENTER); textSize(14);
      text('Students', width * 0.25, 30);
      fill(63, 185, 80, 150);
      text('Schools', width * 0.75, 30);
    }

    function mousePressed() {
      initSim();
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
