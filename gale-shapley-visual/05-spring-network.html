<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spring Equilibrium Network — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Nunito', sans-serif; }
    .back-link { position: fixed; top: 16px; left: 16px; background: rgba(22,27,34,0.9); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; transition: background 0.2s; }
    .back-link:hover { background: #30363d; }
    .info { position: fixed; top: 60px; left: 16px; background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 10px; padding: 12px 16px; z-index: 50; max-width: 280px; backdrop-filter: blur(8px); }
    .info h2 { font-family: 'Lora', serif; font-size: 15px; color: #58a6ff; margin-bottom: 4px; }
    .info p { font-size: 12px; color: #8b949e; line-height: 1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info">
    <h2>Spring Equilibrium Network</h2>
    <p>Stable matchings minimize spring energy. Watch the graph settle as matched pairs spring together and blocking pairs stretch apart.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 5;
    let nodes = []; // {x, y, vx, vy, type, id}
    let springs = []; // {m, w, restLength, isMatched}
    let menPrefs = [], womenPrefs = [];
    let stableMatches = [];
    let totalEnergy = 0;
    let algorithmDone = false;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(RGB);
      initSim();
    }

    function shuffleArr(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initSim() {
      nodes = [];
      springs = [];
      stableMatches = [];
      algorithmDone = false;
      menPrefs = [];
      womenPrefs = [];

      for (let i = 0; i < N; i++) {
        menPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
        womenPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
      }

      // Place nodes
      for (let i = 0; i < N; i++) {
        nodes.push({
          x: width * 0.3 + random(-30, 30),
          y: height * (0.15 + 0.7 * i / (N - 1)),
          vx: 0, vy: 0,
          type: 'M', id: i
        });
      }
      for (let i = 0; i < N; i++) {
        nodes.push({
          x: width * 0.7 + random(-30, 30),
          y: height * (0.15 + 0.7 * i / (N - 1)),
          vx: 0, vy: 0,
          type: 'W', id: i
        });
      }

      // Create springs for all pairs
      for (let m = 0; m < N; m++) {
        for (let w = 0; w < N; w++) {
          let mRank = menPrefs[m].indexOf(w);
          let wRank = womenPrefs[w].indexOf(m);
          let avgRank = (mRank + wRank) / 2;
          let restLen = 60 + avgRank * 50; // Top choice = shortest
          springs.push({m, w, restLength: restLen, isMatched: false});
        }
      }

      // Run DA after delay
      setTimeout(runDA, 2000);
    }

    function runDA() {
      let menNext = new Array(N).fill(0);
      let womenCurrent = new Array(N).fill(-1);
      let menFree = new Array(N).fill(true);

      let changed = true;
      while (changed) {
        changed = false;
        for (let m = 0; m < N; m++) {
          if (!menFree[m] || menNext[m] >= N) continue;
          let w = menPrefs[m][menNext[m]];
          menNext[m]++;
          changed = true;
          if (womenCurrent[w] === -1) {
            womenCurrent[w] = m;
            menFree[m] = false;
          } else {
            let curM = womenCurrent[w];
            if (womenPrefs[w].indexOf(m) < womenPrefs[w].indexOf(curM)) {
              womenCurrent[w] = m;
              menFree[m] = false;
              menFree[curM] = true;
            }
          }
        }
      }

      stableMatches = [];
      for (let w = 0; w < N; w++) {
        if (womenCurrent[w] !== -1) {
          stableMatches.push({m: womenCurrent[w], w});
        }
      }

      // Mark springs
      for (let s of springs) {
        s.isMatched = stableMatches.some(sm => sm.m === s.m && sm.w === s.w);
        if (s.isMatched) {
          s.restLength = 80; // Pull matched pairs together
        }
      }
      algorithmDone = true;
    }

    function getNode(type, id) {
      return nodes.find(n => n.type === type && n.id === id);
    }

    function draw() {
      background(13, 17, 23, 25);
      totalEnergy = 0;

      // Spring forces
      for (let s of springs) {
        let mN = getNode('M', s.m);
        let wN = getNode('W', s.w);
        let dx = wN.x - mN.x;
        let dy = wN.y - mN.y;
        let d = sqrt(dx * dx + dy * dy) || 1;
        let displacement = d - s.restLength;
        let k = s.isMatched ? 0.003 : 0.0005;
        let force = k * displacement;

        totalEnergy += 0.5 * k * displacement * displacement;

        let fx = (dx / d) * force;
        let fy = (dy / d) * force;
        mN.vx += fx;
        mN.vy += fy;
        wN.vx -= fx;
        wN.vy -= fy;
      }

      // Node repulsion
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          let a = nodes[i], b = nodes[j];
          let dx = a.x - b.x;
          let dy = a.y - b.y;
          let d = sqrt(dx * dx + dy * dy) || 1;
          if (d < 80) {
            let force = 2 / (d * d);
            a.vx += (dx / d) * force;
            a.vy += (dy / d) * force;
            b.vx -= (dx / d) * force;
            b.vy -= (dy / d) * force;
          }
        }
      }

      // Update nodes
      for (let n of nodes) {
        n.vx *= 0.92;
        n.vy *= 0.92;
        n.x += n.vx;
        n.y += n.vy;
        n.x = constrain(n.x, 50, width - 50);
        n.y = constrain(n.y, 50, height - 50);
      }

      // Draw springs
      for (let s of springs) {
        let mN = getNode('M', s.m);
        let wN = getNode('W', s.w);
        let d = dist(mN.x, mN.y, wN.x, wN.y);
        let stretch = abs(d - s.restLength);

        if (s.isMatched) {
          let pulse = sin(frameCount * 0.05) * 0.3 + 0.7;
          strokeWeight(3 * pulse);
          stroke(63, 185, 80, 180 * pulse);
          line(mN.x, mN.y, wN.x, wN.y);
        } else {
          let alpha = map(1 / (s.restLength * 0.01), 0, 5, 5, 30);
          strokeWeight(0.5);
          stroke(100, 120, 150, alpha);
          line(mN.x, mN.y, wN.x, wN.y);
        }
      }

      // Draw nodes
      for (let n of nodes) {
        noStroke();
        let pulse = sin(frameCount * 0.04 + n.id) * 0.2 + 0.8;
        if (n.type === 'M') {
          fill(88, 166, 255, 30);
          ellipse(n.x, n.y, 36, 36);
          fill(88, 166, 255, 200 * pulse);
          ellipse(n.x, n.y, 18, 18);
        } else {
          fill(188, 140, 255, 30);
          ellipse(n.x, n.y, 36, 36);
          fill(188, 140, 255, 200 * pulse);
          ellipse(n.x, n.y, 18, 18);
        }
        fill(255, 180);
        textAlign(CENTER, CENTER);
        textSize(9);
        text(n.type + (n.id + 1), n.x, n.y - 22);
      }

      // Energy display
      noStroke();
      fill(255, 160);
      textAlign(RIGHT, TOP);
      textSize(13);
      text('Energy: ' + totalEnergy.toFixed(1), width - 20, 20);
      if (algorithmDone) {
        fill(63, 185, 80, 180);
        text('Stable Matching Found', width - 20, 40);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
