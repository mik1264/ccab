<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Interference Shader</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; overflow: hidden; }
canvas { display: block; }
.back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; transition: background 0.2s; }
.back:hover { background: #30363d; }
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const gl = canvas.getContext('webgl');
if (!gl) { document.body.innerHTML += '<p style="color:red;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)">WebGL not supported</p>'; }

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);

const VS = `
attribute vec2 pos;
void main() {
  gl_Position = vec4(pos, 0.0, 1.0);
}`;

const FS = `
precision mediump float;
uniform float time;
uniform vec2 resolution;
float wave(vec2 uv, vec2 center, float speed) {
  float d = length(uv - center);
  return sin(d * 20.0 - time * speed);
}
void main() {
  vec2 uv = gl_FragCoord.xy / resolution;
  uv.x *= resolution.x / resolution.y;
  float aspect = resolution.x / resolution.y;
  float cyan = 0.0;
  cyan += wave(uv, vec2(0.2 * aspect, 0.3), 3.0);
  cyan += wave(uv, vec2(0.4 * aspect, 0.7), 2.5);
  cyan += wave(uv, vec2(0.7 * aspect, 0.4), 3.5);
  cyan += wave(uv, vec2(0.9 * aspect, 0.8), 2.0);
  float magenta = 0.0;
  magenta += wave(uv, vec2(0.1 * aspect, 0.6), 2.8);
  magenta += wave(uv, vec2(0.5 * aspect, 0.2), 3.2);
  magenta += wave(uv, vec2(0.8 * aspect, 0.5), 2.3);
  magenta += wave(uv, vec2(0.6 * aspect, 0.9), 3.7);
  cyan = cyan * 0.125 + 0.5;
  magenta = magenta * 0.125 + 0.5;
  vec3 col = vec3(0.0, cyan, magenta) * 1.5;
  col = clamp(col, 0.0, 1.0);
  gl_FragColor = vec4(col, 1.0);
}`;

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'time');
const uRes = gl.getUniformLocation(prog, 'resolution');

const t0 = performance.now();
function frame() {
  const t = (performance.now() - t0) * 0.001;
  gl.uniform1f(uTime, t);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
