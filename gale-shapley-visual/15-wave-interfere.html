<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wave Interference Preferences — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Wave Interference Preferences</h2><p>Each agent emits circular waves. Where waves from compatible pairs constructively interfere, bright nodes appear — revealing the stable matching structure.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);

    function mkShader(type, src) {
      const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
      return s;
    }
    function mkProg(vs, fs) {
      const p = gl.createProgram();
      gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
      gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(p); return p;
    }

    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0,1); }`;

    const FS = `
    precision mediump float;
    uniform float u_time;
    uniform vec2 u_res;

    // Source positions for 6 men and 6 women
    vec2 menPos(int i) {
      float fi = float(i);
      float angle = fi * 1.047 + 0.3; // 60 deg spacing
      return vec2(-0.35 + 0.25 * cos(angle), 0.25 * sin(angle));
    }

    vec2 womenPos(int i) {
      float fi = float(i);
      float angle = fi * 1.047 + 0.8;
      return vec2(0.35 + 0.2 * cos(angle), 0.2 * sin(angle));
    }

    // Mutual rank: lower = better compatibility
    float mutualRank(int m, int w) {
      // Simplified: diagonal pairs are best matches
      float diff = abs(float(m) - float(w));
      return diff;
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      float aspect = u_res.x / u_res.y;
      vec2 p = (uv - 0.5) * vec2(aspect, 1.0);
      float t = u_time;

      float menWave = 0.0;
      float womenWave = 0.0;
      float matchWave = 0.0;

      float freq = 25.0;
      float speed = 3.0;

      // Men emit red waves
      for (int i = 0; i < 6; i++) {
        vec2 pos = menPos(i);
        float d = distance(p, pos);
        float amplitude = 1.0 / (1.0 + d * 3.0);
        menWave += amplitude * sin(d * freq - t * speed + float(i) * 0.5);
      }

      // Women emit blue waves
      for (int i = 0; i < 6; i++) {
        vec2 pos = womenPos(i);
        float d = distance(p, pos);
        float amplitude = 1.0 / (1.0 + d * 3.0);
        womenWave += amplitude * sin(d * freq - t * speed + float(i) * 0.7 + 1.0);
      }

      // Constructive interference for matched pairs
      for (int m = 0; m < 6; m++) {
        for (int w = 0; w < 6; w++) {
          float rank = mutualRank(m, w);
          float amp = 1.0 / (1.0 + rank); // Better match = stronger
          vec2 mp = menPos(m);
          vec2 wp = womenPos(w);
          float dm = distance(p, mp);
          float dw = distance(p, wp);
          // Constructive when both waves peak
          float combined = sin(dm * freq - t * speed) * sin(dw * freq - t * speed);
          matchWave += combined * amp * 0.15;
        }
      }

      // Color composition
      vec3 col = vec3(0.02, 0.01, 0.04); // Dark background

      // Red channel from men's waves
      float redWave = menWave * 0.15;
      col.r += max(redWave, 0.0) * 0.6;
      col.r += max(-redWave, 0.0) * 0.1;

      // Blue channel from women's waves
      float blueWave = womenWave * 0.15;
      col.b += max(blueWave, 0.0) * 0.6;
      col.b += max(-blueWave, 0.0) * 0.1;

      // Gold/white for matched pair constructive interference
      float matchIntensity = max(matchWave, 0.0);
      col += vec3(1.0, 0.9, 0.5) * matchIntensity;

      // Source point glows
      for (int i = 0; i < 6; i++) {
        vec2 mp = menPos(i);
        float dm = distance(p, mp);
        col += vec3(0.8, 0.2, 0.1) * exp(-dm * dm * 200.0);

        vec2 wp = womenPos(i);
        float dw = distance(p, wp);
        col += vec3(0.2, 0.1, 0.8) * exp(-dw * dw * 200.0);
      }

      // Vignette
      float vig = 1.0 - 0.3 * length(uv - 0.5);
      col *= vig;

      gl_FragColor = vec4(col, 1.0);
    }`;

    const prog = mkProg(VS, FS);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    const pLoc = gl.getAttribLocation(prog, 'p');
    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uRes = gl.getUniformLocation(prog, 'u_res');

    gl.useProgram(prog);
    gl.enableVertexAttribArray(pLoc);
    gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

    function frame(t) {
      gl.uniform1f(uTime, t * 0.001);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
