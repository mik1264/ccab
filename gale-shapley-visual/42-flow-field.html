<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preference Flow Field — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Preference Flow Field</h2><p>A vector flow field where each arrow's direction encodes the nearest agent's preference direction. Stable matches create flow attractors.</p></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let particles = [];
    let flowField;
    let cols, rows;
    let scl = 20;
    let attractors = [];
    let pairHues;
    let fadeCanvas;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      fadeCanvas = createGraphics(width, height);
      fadeCanvas.background(13, 17, 23);

      cols = floor(width / scl) + 1;
      rows = floor(height / scl) + 1;
      flowField = new Array(cols * rows);

      // 5 matched pair attractors
      pairHues = [200, 280, 340, 40, 140];
      for (let i = 0; i < 5; i++) {
        let angle = (TWO_PI / 5) * i - HALF_PI;
        let r = min(width, height) * 0.28;
        attractors.push({
          x: width / 2 + cos(angle) * r,
          y: height / 2 + sin(angle) * r,
          hue: pairHues[i]
        });
      }

      // Create particles
      for (let i = 0; i < 2000; i++) {
        particles.push({
          x: random(width),
          y: random(height),
          prevX: 0,
          prevY: 0,
          vel: createVector(0, 0),
          maxSpeed: random(1.5, 3.5),
          life: random(200, 600)
        });
        particles[i].prevX = particles[i].x;
        particles[i].prevY = particles[i].y;
      }

      // Preference-seeded noise
      noiseSeed(42);
    }

    function draw() {
      // Fade background
      fadeCanvas.noStroke();
      fadeCanvas.fill(13, 17, 23, 8);
      fadeCanvas.rect(0, 0, width, height);

      // Update flow field with Perlin noise + attractor influence
      let zoff = frameCount * 0.003;
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          let idx = x + y * cols;
          let noiseVal = noise(x * 0.06, y * 0.06, zoff);
          let angle = noiseVal * TWO_PI * 4;

          // Blend with nearest attractor's pull
          let wx = x * scl;
          let wy = y * scl;
          let nearestDist = Infinity;
          let nearestA = null;
          for (let a of attractors) {
            let d = dist(wx, wy, a.x, a.y);
            if (d < nearestDist) {
              nearestDist = d;
              nearestA = a;
            }
          }

          // Attractor influence decreases with distance
          let pull = constrain(map(nearestDist, 0, 400, 0.8, 0), 0, 0.8);
          let attractAngle = atan2(nearestA.y - wy, nearestA.x - wx);
          // Spiral around attractor
          attractAngle += HALF_PI * 0.6;
          angle = lerp(angle, attractAngle, pull);

          flowField[idx] = p5.Vector.fromAngle(angle);
          flowField[idx].setMag(1);
        }
      }

      // Update and draw particles
      for (let p of particles) {
        let x = floor(p.x / scl);
        let y = floor(p.y / scl);
        x = constrain(x, 0, cols - 1);
        y = constrain(y, 0, rows - 1);
        let force = flowField[x + y * cols];

        p.vel.add(force);
        p.vel.limit(p.maxSpeed);
        p.prevX = p.x;
        p.prevY = p.y;
        p.x += p.vel.x;
        p.y += p.vel.y;
        p.life--;

        // Find nearest attractor for color
        let nearestDist = Infinity;
        let nearestHue = 200;
        for (let a of attractors) {
          let d = dist(p.x, p.y, a.x, a.y);
          if (d < nearestDist) {
            nearestDist = d;
            nearestHue = a.hue;
          }
        }

        let alpha = map(p.life, 0, 100, 0, 60);
        alpha = constrain(alpha, 0, 60);
        fadeCanvas.stroke(nearestHue, 70, 90, alpha * 0.4);
        fadeCanvas.strokeWeight(0.8);
        fadeCanvas.line(p.prevX, p.prevY, p.x, p.y);

        // Wrap around
        if (p.x < 0) { p.x = width; p.prevX = p.x; }
        if (p.x > width) { p.x = 0; p.prevX = p.x; }
        if (p.y < 0) { p.y = height; p.prevY = p.y; }
        if (p.y > height) { p.y = 0; p.prevY = p.y; }

        // Reset dead particles
        if (p.life <= 0) {
          p.x = random(width);
          p.y = random(height);
          p.prevX = p.x;
          p.prevY = p.y;
          p.vel.set(0, 0);
          p.life = random(200, 600);
        }
      }

      image(fadeCanvas, 0, 0);

      // Draw attractor centers as soft glowing dots
      noStroke();
      for (let a of attractors) {
        for (let r = 30; r > 0; r -= 5) {
          fill(a.hue, 60, 90, map(r, 0, 30, 40, 5));
          ellipse(a.x, a.y, r * 2, r * 2);
        }
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      let newFade = createGraphics(width, height);
      newFade.background(13, 17, 23);
      fadeCanvas = newFade;
      cols = floor(width / scl) + 1;
      rows = floor(height / scl) + 1;
      flowField = new Array(cols * rows);
    }
  </script>
</body>
</html>
