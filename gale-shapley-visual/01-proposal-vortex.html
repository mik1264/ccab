<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proposal Vortex — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Nunito', sans-serif; }
    .back-link { position: fixed; top: 16px; left: 16px; background: rgba(22,27,34,0.9); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; transition: background 0.2s; }
    .back-link:hover { background: #30363d; }
    .info { position: fixed; top: 60px; left: 16px; background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 10px; padding: 12px 16px; z-index: 50; max-width: 280px; backdrop-filter: blur(8px); }
    .info h2 { font-family: 'Lora', serif; font-size: 15px; color: #58a6ff; margin-bottom: 4px; }
    .info p { font-size: 12px; color: #8b949e; line-height: 1.4; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Visual Gallery</a>
  <div class="info">
    <h2>Proposal Vortex</h2>
    <p>In Gale-Shapley, unmatched men propose in waves. Watch proposals spiral outward as glowing arcs, while accepted pairs lock into stable orbits.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 6;
    let men = [], women = [];
    let proposals = [];
    let matches = []; // {m, w, orbitAngle, orbitRadius}
    let round = 0;
    let frameCounter = 0;
    let roundDelay = 60;
    let algorithmDone = false;
    let menPrefs = [], womenPrefs = [];
    let menNext = []; // next woman index to propose to for each man
    let womenCurrent = []; // current matched man for each woman (-1 if free)
    let rejections = []; // {x,y,alpha,vx,vy}

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(RGB);
      initAlgorithm();
    }

    function initAlgorithm() {
      let cx = width / 2, cy = height / 2;
      let menRadius = min(width, height) * 0.28;
      let womenRadius = min(width, height) * 0.15;

      men = [];
      women = [];
      for (let i = 0; i < N; i++) {
        let a = (TWO_PI / N) * i - HALF_PI;
        men.push({
          x: cx + cos(a) * menRadius,
          y: cy + sin(a) * menRadius,
          origX: cx + cos(a) * menRadius,
          origY: cy + sin(a) * menRadius,
          matched: false,
          matchedTo: -1
        });
      }
      for (let i = 0; i < N; i++) {
        let a = (TWO_PI / N) * i - HALF_PI;
        women.push({
          x: cx + cos(a) * womenRadius,
          y: cy + sin(a) * womenRadius,
          origX: cx + cos(a) * womenRadius,
          origY: cy + sin(a) * womenRadius,
          matched: false,
          matchedTo: -1
        });
      }

      // Random preferences
      menPrefs = [];
      womenPrefs = [];
      for (let i = 0; i < N; i++) {
        menPrefs.push(shuffle(Array.from({length: N}, (_, k) => k)));
        womenPrefs.push(shuffle(Array.from({length: N}, (_, k) => k)));
      }
      menNext = new Array(N).fill(0);
      womenCurrent = new Array(N).fill(-1);
      matches = [];
      proposals = [];
      rejections = [];
      round = 0;
      frameCounter = 0;
      algorithmDone = false;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function womanPrefers(w, m1, m2) {
      return womenPrefs[w].indexOf(m1) < womenPrefs[w].indexOf(m2);
    }

    function doRound() {
      let proposalsThisRound = [];
      for (let m = 0; m < N; m++) {
        if (men[m].matched) continue;
        if (menNext[m] >= N) continue;
        let w = menPrefs[m][menNext[m]];
        menNext[m]++;
        proposalsThisRound.push({m, w});
      }

      for (let p of proposalsThisRound) {
        let m = p.m, w = p.w;
        if (womenCurrent[w] === -1) {
          // Accept
          womenCurrent[w] = m;
          men[m].matched = true;
          men[m].matchedTo = w;
          women[w].matched = true;
          women[w].matchedTo = m;
          proposals.push({
            sx: men[m].origX, sy: men[m].origY,
            ex: women[w].origX, ey: women[w].origY,
            t: 0, accepted: true, m, w
          });
        } else {
          let currentM = womenCurrent[w];
          if (womanPrefers(w, m, currentM)) {
            // Replace
            men[currentM].matched = false;
            men[currentM].matchedTo = -1;
            // Remove old match
            matches = matches.filter(mt => !(mt.m === currentM && mt.w === w));

            womenCurrent[w] = m;
            men[m].matched = true;
            men[m].matchedTo = w;
            women[w].matchedTo = m;
            proposals.push({
              sx: men[m].origX, sy: men[m].origY,
              ex: women[w].origX, ey: women[w].origY,
              t: 0, accepted: true, m, w
            });
          } else {
            // Reject
            proposals.push({
              sx: men[m].origX, sy: men[m].origY,
              ex: women[w].origX, ey: women[w].origY,
              t: 0, accepted: false, m, w
            });
          }
        }
      }

      // Check if done
      let allMatched = men.every(m => m.matched);
      if (allMatched || proposalsThisRound.length === 0) {
        algorithmDone = true;
        matches = [];
        for (let w = 0; w < N; w++) {
          if (womenCurrent[w] !== -1) {
            let m = womenCurrent[w];
            matches.push({
              m, w,
              orbitAngle: random(TWO_PI),
              orbitRadius: 30 + random(20),
              orbitSpeed: 0.008 + random(0.008)
            });
          }
        }
      }
      round++;
    }

    function draw() {
      background(13, 17, 23, 40);
      frameCounter++;

      // Run algorithm step by step
      if (!algorithmDone && frameCounter % roundDelay === 0) {
        doRound();
      }

      // Draw proposals in flight
      for (let i = proposals.length - 1; i >= 0; i--) {
        let p = proposals[i];
        p.t += 0.025;
        if (p.t >= 1) {
          if (!p.accepted) {
            // Spawn rejection particles
            for (let j = 0; j < 8; j++) {
              rejections.push({
                x: p.ex, y: p.ey,
                vx: random(-3, 3), vy: random(-3, 3),
                alpha: 255
              });
            }
          }
          proposals.splice(i, 1);
          continue;
        }

        let x = lerp(p.sx, p.ex, p.t);
        let y = lerp(p.sy, p.ey, p.t);
        // Spiral offset
        let spiralOffset = sin(p.t * PI * 4) * (1 - p.t) * 40;
        let dx = p.ex - p.sx, dy = p.ey - p.sy;
        let nd = sqrt(dx * dx + dy * dy) || 1;
        let perpX = -dy / nd, perpY = dx / nd;
        x += perpX * spiralOffset;
        y += perpY * spiralOffset;

        if (p.accepted) {
          // Green arc
          noStroke();
          fill(63, 185, 80, 200 * (1 - p.t * 0.5));
          ellipse(x, y, 8, 8);
          // Trail
          for (let t2 = max(0, p.t - 0.15); t2 < p.t; t2 += 0.01) {
            let tx = lerp(p.sx, p.ex, t2);
            let ty = lerp(p.sy, p.ey, t2);
            let so = sin(t2 * PI * 4) * (1 - t2) * 40;
            tx += perpX * so;
            ty += perpY * so;
            fill(63, 185, 80, 80 * (1 - (p.t - t2) / 0.15));
            ellipse(tx, ty, 4, 4);
          }
        } else {
          // Red arc
          noStroke();
          fill(248, 81, 73, 200 * (1 - p.t * 0.5));
          ellipse(x, y, 8, 8);
          for (let t2 = max(0, p.t - 0.15); t2 < p.t; t2 += 0.01) {
            let tx = lerp(p.sx, p.ex, t2);
            let ty = lerp(p.sy, p.ey, t2);
            let so = sin(t2 * PI * 4) * (1 - t2) * 40;
            tx += perpX * so;
            ty += perpY * so;
            fill(248, 81, 73, 60 * (1 - (p.t - t2) / 0.15));
            ellipse(tx, ty, 3, 3);
          }
        }
      }

      // Rejection particles
      for (let i = rejections.length - 1; i >= 0; i--) {
        let r = rejections[i];
        r.x += r.vx;
        r.y += r.vy;
        r.alpha -= 4;
        if (r.alpha <= 0) { rejections.splice(i, 1); continue; }
        noStroke();
        fill(248, 81, 73, r.alpha);
        ellipse(r.x, r.y, 4, 4);
      }

      // Draw matched orbits
      for (let mt of matches) {
        mt.orbitAngle += mt.orbitSpeed;
        let cx = (men[mt.m].origX + women[mt.w].origX) / 2;
        let cy2 = (men[mt.m].origY + women[mt.w].origY) / 2;
        let mx = cx + cos(mt.orbitAngle) * mt.orbitRadius;
        let my = cy2 + sin(mt.orbitAngle) * mt.orbitRadius;
        let wx = cx + cos(mt.orbitAngle + PI) * mt.orbitRadius;
        let wy = cy2 + sin(mt.orbitAngle + PI) * mt.orbitRadius;

        // Connection line
        stroke(63, 185, 80, 60);
        strokeWeight(1);
        line(mx, my, wx, wy);

        // Man
        noStroke();
        fill(88, 166, 255, 40);
        ellipse(mx, my, 28, 28);
        fill(88, 166, 255);
        ellipse(mx, my, 14, 14);

        // Woman
        fill(188, 140, 255, 40);
        ellipse(wx, wy, 28, 28);
        fill(188, 140, 255);
        ellipse(wx, wy, 14, 14);
      }

      // Draw unmatched agents at original positions
      for (let i = 0; i < N; i++) {
        if (!algorithmDone || !men[i].matched) {
          // Check if in an active match orbit
          if (algorithmDone && men[i].matched) continue;
          noStroke();
          let pulse = sin(frameCount * 0.05 + i) * 0.3 + 0.7;
          fill(88, 166, 255, 40 * pulse);
          ellipse(men[i].origX, men[i].origY, 30, 30);
          fill(88, 166, 255, 220 * pulse);
          ellipse(men[i].origX, men[i].origY, 14, 14);
          fill(255, 200);
          textAlign(CENTER, CENTER);
          textSize(9);
          text('M' + (i + 1), men[i].origX, men[i].origY - 20);
        }
      }
      for (let i = 0; i < N; i++) {
        if (!algorithmDone || !women[i].matched) {
          if (algorithmDone && women[i].matched) continue;
          noStroke();
          let pulse = sin(frameCount * 0.05 + i + 3) * 0.3 + 0.7;
          fill(188, 140, 255, 40 * pulse);
          ellipse(women[i].origX, women[i].origY, 30, 30);
          fill(188, 140, 255, 220 * pulse);
          ellipse(women[i].origX, women[i].origY, 14, 14);
          fill(255, 200);
          textAlign(CENTER, CENTER);
          textSize(9);
          text('W' + (i + 1), women[i].origX, women[i].origY - 20);
        }
      }

      // Round counter
      fill(255, 180);
      noStroke();
      textAlign(RIGHT, TOP);
      textSize(13);
      textFont('Nunito');
      text('Round: ' + round + (algorithmDone ? ' (Stable!)' : ''), width - 20, 20);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initAlgorithm();
    }
  </script>
</body>
</html>
