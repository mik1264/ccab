<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fractal Tree — Matching Algorithms Visual Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;overflow:hidden;font-family:sans-serif}
canvas{display:block;position:fixed;top:0;left:0}
.back{position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100}
.back:hover{background:#30363d}
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

const maxDepth = 10;
let branches = [];
let leaves = [];
let matchedLeafPairs = [];
let growProgress = 0;
let treeReady = false;

function buildTree(x, y, angle, len, depth) {
  if (depth > maxDepth || len < 4) return;
  const ex = x + Math.cos(angle) * len;
  const ey = y + Math.sin(angle) * len;
  branches.push({ x, y, ex, ey, depth, len });

  if (depth >= maxDepth - 1 || len < 8) {
    leaves.push({ x: ex, y: ey, depth, matched: false, partner: -1 });
  }

  const spread = 0.35 + Math.random() * 0.2;
  const shrink = 0.62 + Math.random() * 0.12;
  buildTree(ex, ey, angle - spread, len * shrink, depth + 1);
  buildTree(ex, ey, angle + spread, len * shrink, depth + 1);
}

function init() {
  branches = [];
  leaves = [];
  matchedLeafPairs = [];
  growProgress = 0;
  treeReady = false;
  const startLen = Math.min(W, H) * 0.22;
  buildTree(W / 2, H * 0.92, -Math.PI / 2, startLen, 0);

  // Pick 8 matched leaf pairs
  const shuffled = leaves.slice().sort(() => Math.random() - 0.5);
  for (let i = 0; i < Math.min(8, Math.floor(shuffled.length / 2)); i++) {
    const a = shuffled[i * 2];
    const b = shuffled[i * 2 + 1];
    a.matched = true;
    b.matched = true;
    a.partner = leaves.indexOf(b);
    b.partner = leaves.indexOf(a);
    matchedLeafPairs.push([leaves.indexOf(a), leaves.indexOf(b)]);
  }
}
init();
window.addEventListener('resize', () => { resize(); init(); });

function depthColor(depth) {
  const t = depth / maxDepth;
  if (t < 0.33) {
    const u = t / 0.33;
    return [255 * (1 - u), 200 * (1 - u) + 220 * u, 50 * (1 - u) + 255 * u];
  } else if (t < 0.66) {
    const u = (t - 0.33) / 0.33;
    return [0, 220 * (1 - u) + 100 * u, 255];
  } else {
    const u = (t - 0.66) / 0.34;
    return [80 * u + 30, 100 * (1 - u) + 30 * u, 255 * (1 - u * 0.3)];
  }
}

function animate(time) {
  const t = time * 0.001;
  ctx.fillStyle = 'rgba(13,17,23,0.15)';
  ctx.fillRect(0, 0, W, H);

  if (!treeReady) {
    growProgress += 0.004;
    if (growProgress >= 1) treeReady = true;
  }

  const totalToDraw = Math.floor(branches.length * Math.min(1, growProgress));

  // Draw branches
  for (let i = 0; i < totalToDraw; i++) {
    const br = branches[i];
    const c = depthColor(br.depth);
    const alpha = 0.5 + 0.5 * (1 - br.depth / maxDepth);
    ctx.strokeStyle = 'rgba(' + Math.round(c[0]) + ',' + Math.round(c[1]) + ',' + Math.round(c[2]) + ',' + alpha + ')';
    ctx.lineWidth = Math.max(1, (maxDepth - br.depth) * 0.8);

    // Wind sway
    const sway = Math.sin(t * 0.8 + br.x * 0.005 + br.depth * 0.5) * br.depth * 0.4;

    ctx.beginPath();
    ctx.moveTo(br.x + sway * 0.5, br.y);
    ctx.lineTo(br.ex + sway, br.ey);
    ctx.stroke();
  }

  // Draw leaves after tree is grown
  if (treeReady) {
    for (let i = 0; i < leaves.length; i++) {
      const leaf = leaves[i];
      const sway = Math.sin(t * 0.8 + leaf.x * 0.005 + leaf.depth * 0.5) * leaf.depth * 0.4;
      const lx = leaf.x + sway;
      const ly = leaf.y;

      if (leaf.matched) {
        // Golden pulsing glow
        const pulse = 0.6 + 0.4 * Math.sin(t * 2 + i);
        const r = 6 + pulse * 4;
        const grad = ctx.createRadialGradient(lx, ly, 0, lx, ly, r);
        grad.addColorStop(0, 'rgba(255,215,0,' + (0.9 * pulse) + ')');
        grad.addColorStop(0.5, 'rgba(255,180,0,' + (0.4 * pulse) + ')');
        grad.addColorStop(1, 'rgba(255,150,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(lx, ly, r, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // Fading blue
        const fade = 0.3 + 0.2 * Math.sin(t * 1.5 + i * 0.7);
        ctx.fillStyle = 'rgba(80,160,255,' + fade + ')';
        ctx.beginPath();
        ctx.arc(lx, ly, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Draw arcs connecting matched pairs
    ctx.lineWidth = 1.5;
    for (const [ai, bi] of matchedLeafPairs) {
      const a = leaves[ai], b = leaves[bi];
      const swayA = Math.sin(t * 0.8 + a.x * 0.005 + a.depth * 0.5) * a.depth * 0.4;
      const swayB = Math.sin(t * 0.8 + b.x * 0.005 + b.depth * 0.5) * b.depth * 0.4;
      const ax = a.x + swayA, ay = a.y;
      const bx = b.x + swayB, by = b.y;
      const mx = (ax + bx) / 2;
      const my = Math.min(ay, by) - 30 - Math.abs(ax - bx) * 0.15;

      const pulse = 0.3 + 0.3 * Math.sin(t * 1.5 + ai);
      ctx.strokeStyle = 'rgba(255,215,0,' + pulse + ')';
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.quadraticCurveTo(mx, my, bx, by);
      ctx.stroke();
    }
  }

  // Title
  ctx.fillStyle = 'rgba(201,209,217,0.7)';
  ctx.font = '600 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Fractal Tree', W / 2, 36);
  ctx.textAlign = 'left';

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
