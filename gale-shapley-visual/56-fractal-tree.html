<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fractal Preference Tree — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Fractal Preference Tree</h2><p>Each agent's preference list is a fractal tree. Top choices grow thick trunks; lower preferences are thin twigs. Stable matches are where branches interlock.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    let t = 0;
    const N = 5;

    // Preferences: manPrefs[i] = ranking of women (index = rank position, value = woman id)
    const manPrefs = [
      [0,1,2,3,4], [1,0,3,2,4], [2,3,0,1,4], [3,2,4,0,1], [4,1,0,3,2]
    ];
    const womanPrefs = [
      [0,2,1,3,4], [1,0,2,4,3], [2,1,3,0,4], [3,4,0,2,1], [4,3,1,0,2]
    ];
    const stableMatch = [0,1,2,3,4]; // man i matched with woman i

    // Growth animation
    let growthProgress = 0;

    function drawBranch(x, y, angle, length, width, depth, maxDepth, color, alpha) {
      if (depth > maxDepth || length < 2 || width < 0.3) return;
      if (depth > growthProgress) return;

      const partialGrowth = Math.min(1, growthProgress - depth);
      const actualLength = length * partialGrowth;

      const ex = x + Math.cos(angle) * actualLength;
      const ey = y + Math.sin(angle) * actualLength;

      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(ex, ey);
      ctx.strokeStyle = color;
      ctx.globalAlpha = alpha * (0.5 + 0.5 * partialGrowth);
      ctx.lineWidth = width;
      ctx.stroke();
      ctx.globalAlpha = 1;

      if (partialGrowth >= 0.9) {
        // Branch for each preference (5 branches)
        const branchCount = Math.min(N, maxDepth - depth + 1);
        for (let i = 0; i < branchCount; i++) {
          const rank = i; // 0 = top choice
          const angleSpread = 0.15 + rank * 0.2; // Lower rank = wider angle
          const thicknessFactor = 1 - rank * 0.15;
          const lengthFactor = 0.65 - rank * 0.05;
          const sway = Math.sin(t * 0.8 + depth * 0.5 + i) * 0.03;
          const branchAngle = angle + (i - (branchCount - 1) / 2) * angleSpread + sway;

          drawBranch(
            ex, ey,
            branchAngle,
            length * lengthFactor,
            width * thicknessFactor,
            depth + 1, maxDepth,
            color, alpha * 0.85
          );
        }
      }
    }

    // Connection points for matching
    const matchConnections = [];

    function draw() {
      ctx.fillStyle = 'rgba(13,17,23,0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      growthProgress = Math.min(6, t * 0.4);

      const w = canvas.width;
      const h = canvas.height;

      // Men's trees from bottom
      for (let i = 0; i < N; i++) {
        const x = w * (0.1 + i * 0.2);
        const y = h - 20;
        const baseLen = h * 0.12;
        const hue = 200 + i * 15;
        drawBranch(x, y, -Math.PI / 2, baseLen, 4 - i * 0.3, 0, 4,
          `hsla(${hue}, 80%, 55%, 0.9)`, 0.9);
      }

      // Women's trees from top
      for (let i = 0; i < N; i++) {
        const x = w * (0.1 + i * 0.2);
        const y = 20;
        const baseLen = h * 0.12;
        const hue = 280 + i * 15;
        drawBranch(x, y, Math.PI / 2, baseLen, 4 - i * 0.3, 0, 4,
          `hsla(${hue}, 80%, 55%, 0.9)`, 0.9);
      }

      // Draw gold connections for stable matches at the center
      if (growthProgress > 3) {
        const connectionAlpha = Math.min(1, (growthProgress - 3) * 0.5);
        ctx.globalAlpha = connectionAlpha;
        for (let i = 0; i < N; i++) {
          const j = stableMatch[i];
          const mx = w * (0.1 + i * 0.2);
          const wx = w * (0.1 + j * 0.2);
          const midY = h / 2;

          // Gold connection line
          ctx.beginPath();
          ctx.moveTo(mx, midY + 30);
          ctx.quadraticCurveTo((mx + wx) / 2, midY, wx, midY - 30);
          ctx.strokeStyle = '#ffd700';
          ctx.lineWidth = 2.5;
          ctx.stroke();

          // Glow
          ctx.beginPath();
          ctx.moveTo(mx, midY + 30);
          ctx.quadraticCurveTo((mx + wx) / 2, midY, wx, midY - 30);
          ctx.strokeStyle = 'rgba(255,215,0,0.2)';
          ctx.lineWidth = 8;
          ctx.stroke();

          // Connection node
          const nodeX = (mx + wx) / 2;
          ctx.beginPath();
          ctx.arc(nodeX, midY, 5, 0, Math.PI * 2);
          ctx.fillStyle = '#ffd700';
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      draw();
    }
    animate();
  </script>
</body>
</html>
