<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Origami Matching — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">&#8592; Visual Gallery</a>
  <div class="info"><h2>Origami Matching</h2><p>A paper sheet folds and creases to reveal the stable matching. Each fold represents a proposal; the final origami crane shows the stable structure.</p></div>
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1117);
    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    scene.add(new THREE.AmbientLight(0x334455, 0.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);
    const dirLight2 = new THREE.DirectionalLight(0x4488ff, 0.3);
    dirLight2.position.set(-5, 5, -5);
    scene.add(dirLight2);

    // Create folding paper mesh
    const segments = 40;
    const paperSize = 6;
    const planeGeo = new THREE.PlaneGeometry(paperSize, paperSize, segments, segments);
    planeGeo.rotateX(-Math.PI / 2);

    // Store original positions
    const origPositions = new Float32Array(planeGeo.attributes.position.array);

    // Vertex colors (cream paper with subtle fold marks)
    const vertCount = planeGeo.attributes.position.count;
    const vertColors = new Float32Array(vertCount * 3);
    for (let i = 0; i < vertCount; i++) {
      const x = planeGeo.attributes.position.getX(i);
      const z = planeGeo.attributes.position.getZ(i);
      // Cream base with subtle creases
      const dist = Math.sqrt(x*x + z*z) / (paperSize * 0.7);
      vertColors[i*3] = 0.95 - dist * 0.05;
      vertColors[i*3+1] = 0.92 - dist * 0.08;
      vertColors[i*3+2] = 0.85 - dist * 0.1;
    }
    planeGeo.setAttribute('color', new THREE.BufferAttribute(vertColors, 3));

    const paperMat = new THREE.MeshPhongMaterial({
      vertexColors: true,
      flatShading: true,
      side: THREE.DoubleSide,
      shininess: 30
    });

    const paper = new THREE.Mesh(planeGeo, paperMat);
    scene.add(paper);

    // Define fold lines (6 folds = 6 proposals)
    const foldLines = [
      { axis: 'x', offset: 0, angle: Math.PI * 0.15, dir: 1 },
      { axis: 'z', offset: 0, angle: Math.PI * 0.12, dir: -1 },
      { axis: 'x', offset: 1, angle: Math.PI * 0.2, dir: -1 },
      { axis: 'z', offset: -1, angle: Math.PI * 0.18, dir: 1 },
      { axis: 'x', offset: -0.5, angle: Math.PI * 0.25, dir: 1 },
      { axis: 'z', offset: 0.5, angle: Math.PI * 0.22, dir: -1 }
    ];

    // Additional creasing patterns
    const creaseWaves = [
      { freq: 2.5, amp: 0.3, phase: 0, axisWeight: [1, 0] },
      { freq: 1.8, amp: 0.4, phase: 1.2, axisWeight: [0, 1] },
      { freq: 3.2, amp: 0.2, phase: 2.4, axisWeight: [0.7, 0.7] },
      { freq: 1.5, amp: 0.5, phase: 0.8, axisWeight: [1, 0.3] },
      { freq: 2.0, amp: 0.35, phase: 1.6, axisWeight: [0.3, 1] },
      { freq: 2.8, amp: 0.25, phase: 3.0, axisWeight: [0.5, 0.5] }
    ];

    // Subtle ground reference
    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.MeshPhongMaterial({ color: 0x111522, transparent: true, opacity: 0.5 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.5;
    scene.add(ground);

    // Floating particles (paper dust)
    const dustCount = 500;
    const dustGeo = new THREE.BufferGeometry();
    const dustPos = new Float32Array(dustCount * 3);
    const dustVel = new Float32Array(dustCount * 3);
    for (let i = 0; i < dustCount; i++) {
      dustPos[i*3] = (Math.random() - 0.5) * 12;
      dustPos[i*3+1] = Math.random() * 8;
      dustPos[i*3+2] = (Math.random() - 0.5) * 12;
      dustVel[i*3] = (Math.random() - 0.5) * 0.005;
      dustVel[i*3+1] = Math.random() * 0.003;
      dustVel[i*3+2] = (Math.random() - 0.5) * 0.005;
    }
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
    const dustMat = new THREE.PointsMaterial({
      color: 0xeeddcc,
      size: 0.04,
      transparent: true,
      opacity: 0.4
    });
    const dust = new THREE.Points(dustGeo, dustMat);
    scene.add(dust);

    // Animation: 10 second fold cycle, then hold 5s, then reset
    const cycleDuration = 15;
    const foldDuration = 10;

    function animate(t) {
      requestAnimationFrame(animate);
      const time = t * 0.001;
      const cycleTime = time % cycleDuration;
      const foldProgress = Math.min(cycleTime / foldDuration, 1);

      // Camera orbit
      camera.position.x = Math.sin(time * 0.15) * 10;
      camera.position.z = Math.cos(time * 0.15) * 10;
      camera.position.y = 5 + Math.sin(time * 0.1) * 2;
      camera.lookAt(0, 1, 0);

      // Update paper vertices
      const positions = planeGeo.attributes.position;
      const colors = planeGeo.attributes.color;

      for (let i = 0; i < vertCount; i++) {
        let x = origPositions[i * 3];
        let y = origPositions[i * 3 + 1];
        let z = origPositions[i * 3 + 2];

        // Apply each fold progressively
        let totalDisp = 0;

        for (let f = 0; f < foldLines.length; f++) {
          const fold = foldLines[f];
          const foldStart = f / foldLines.length;
          const foldEnd = (f + 1) / foldLines.length;
          const localProgress = Math.max(0, Math.min(1, (foldProgress - foldStart) / (foldEnd - foldStart)));
          const easedProgress = localProgress * localProgress * (3 - 2 * localProgress);

          const cw = creaseWaves[f];
          const spatialFactor = x * cw.axisWeight[0] + z * cw.axisWeight[1];
          const wave = Math.sin(spatialFactor * cw.freq + cw.phase + time * 0.3);
          totalDisp += wave * cw.amp * easedProgress;

          // Fold effect
          let dist;
          if (fold.axis === 'x') {
            dist = x - fold.offset;
          } else {
            dist = z - fold.offset;
          }
          if (dist * fold.dir > 0) {
            y += Math.abs(dist) * Math.sin(easedProgress * fold.angle) * 0.5;
          }
        }

        y += totalDisp;

        // Center rise as folding progresses
        const distFromCenter = Math.sqrt(x * x + z * z);
        const rise = foldProgress * (1 - distFromCenter / (paperSize * 0.7)) * 2;
        y += Math.max(0, rise);

        positions.setXYZ(i, x, y, z);

        // Update colors based on height
        const heightFactor = Math.max(0, y) * 0.15;
        vertColors[i*3] = Math.min(1, 0.95 + heightFactor * 0.05);
        vertColors[i*3+1] = Math.min(1, 0.92 + heightFactor * 0.02);
        vertColors[i*3+2] = Math.min(1, 0.85 - heightFactor * 0.1);
      }

      positions.needsUpdate = true;
      colors.needsUpdate = true;
      planeGeo.computeVertexNormals();

      // Animate dust
      const dPos = dustGeo.attributes.position;
      for (let i = 0; i < dustCount; i++) {
        dPos.setX(i, dPos.getX(i) + dustVel[i*3]);
        dPos.setY(i, dPos.getY(i) + dustVel[i*3+1]);
        dPos.setZ(i, dPos.getZ(i) + dustVel[i*3+2]);
        if (dPos.getY(i) > 8) dPos.setY(i, 0);
        if (Math.abs(dPos.getX(i)) > 6) dustVel[i*3] *= -1;
        if (Math.abs(dPos.getZ(i)) > 6) dustVel[i*3+2] *= -1;
      }
      dPos.needsUpdate = true;

      renderer.render(scene, camera);
    }
    animate(0);
  </script>
</body>
</html>
