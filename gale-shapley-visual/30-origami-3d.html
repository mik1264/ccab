<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Origami 3D</title>
<style>
* { margin: 0; padding: 0; }
body { background: #0d1117; overflow: hidden; }
.back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
.back:hover { background: #30363d; }
</style>
</head>
<body>
<a class="back" href="index.html">&#8592; Back</a>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 0, 10);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x0d1117);
document.body.appendChild(renderer.domElement);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
scene.add(new THREE.AmbientLight(0x334455, 2));
const dl = new THREE.DirectionalLight(0xffffff, 2);
dl.position.set(5, 8, 5); scene.add(dl);

// Outer wireframe icosahedron (blue)
var outerGeo = new THREE.IcosahedronGeometry(5, 1);
var outerMat = new THREE.MeshBasicMaterial({
  color: 0x58a6ff,
  wireframe: true,
  transparent: true,
  opacity: 0.35
});
var outerIco = new THREE.Mesh(outerGeo, outerMat);
scene.add(outerIco);

// Middle solid icosahedron (gold, transparent)
var midGeo = new THREE.IcosahedronGeometry(3, 1);
var midMat = new THREE.MeshPhongMaterial({
  color: 0xffd700,
  transparent: true,
  opacity: 0.6,
  shininess: 80
});
var midIco = new THREE.Mesh(midGeo, midMat);
scene.add(midIco);

// Inner solid icosahedron (cyan)
var innerGeo = new THREE.IcosahedronGeometry(1.5, 1);
var innerMat = new THREE.MeshPhongMaterial({
  color: 0x00ffff,
  shininess: 100,
  emissive: 0x003333
});
var innerIco = new THREE.Mesh(innerGeo, innerMat);
scene.add(innerIco);

// 20 small tetrahedra (IcosahedronGeometry detail 0) orbiting
var orbiters = [];
for (var i = 0; i < 20; i++) {
  var tetGeo = new THREE.IcosahedronGeometry(0.25, 0);
  var hue = i / 20;
  var col = new THREE.Color();
  col.setHSL(hue, 0.7, 0.6);
  var tetMat = new THREE.MeshPhongMaterial({ color: col, shininess: 60 });
  var tet = new THREE.Mesh(tetGeo, tetMat);
  tet.userData.orbitRadius = 6 + Math.random() * 2;
  tet.userData.orbitSpeed = 0.3 + Math.random() * 0.4;
  tet.userData.orbitPhase = (i / 20) * Math.PI * 2;
  tet.userData.orbitTilt = (Math.random() - 0.5) * 1.2;
  orbiters.push(tet);
  scene.add(tet);
}

function animate(ts) {
  requestAnimationFrame(animate);
  var t = ts * 0.001;

  // Each layer rotates at different speeds on different axes
  outerIco.rotation.y = t * 0.1;
  outerIco.rotation.x = t * 0.05;

  midIco.rotation.y = -t * 0.2;
  midIco.rotation.z = t * 0.08;

  innerIco.rotation.x = t * 0.35;
  innerIco.rotation.y = t * 0.25;

  // Orbiting tetrahedra
  for (var i = 0; i < orbiters.length; i++) {
    var o = orbiters[i];
    var angle = t * o.userData.orbitSpeed + o.userData.orbitPhase;
    var r = o.userData.orbitRadius;
    o.position.x = Math.cos(angle) * r;
    o.position.y = Math.sin(angle + o.userData.orbitTilt) * r * 0.3;
    o.position.z = Math.sin(angle) * r;
    o.rotation.x = t * 1.5;
    o.rotation.y = t * 1.2;
  }

  camera.position.x = Math.sin(t * 0.2) * 10;
  camera.position.y = Math.sin(t * 0.15) * 3;
  camera.position.z = Math.cos(t * 0.2) * 10;
  camera.lookAt(0, 0, 0);
  renderer.render(scene, camera);
}
animate(0);
</script>
</body>
</html>
