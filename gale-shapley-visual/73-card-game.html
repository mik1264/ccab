<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Game — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; }
    .back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
    .back:hover { background: #30363d; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 8;
    let cards = [];
    let trails = [];
    let sparks = [];
    let matchedPairs = [];
    let phase = 'flying'; // flying, matching, serene
    let phaseTimer = 0;
    let t = 0;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      rectMode(CENTER);
      initCards();
    }

    function initCards() {
      cards = [];
      trails = [];
      sparks = [];
      matchedPairs = [];
      phase = 'flying';
      phaseTimer = 0;

      // 8 blue student cards
      for (let i = 0; i < N; i++) {
        cards.push(createCard(i, 'student', map(i, 0, N - 1, 200, 250)));
      }
      // 8 gold school cards
      for (let i = 0; i < N; i++) {
        cards.push(createCard(i + N, 'school', map(i, 0, N - 1, 35, 55)));
      }

      // Create match targets: student i matches school i (shuffled)
      let targets = [];
      for (let i = 0; i < N; i++) targets.push(i);
      shuffleArr(targets);
      for (let i = 0; i < N; i++) {
        cards[i].matchIdx = N + targets[i];
        cards[N + targets[i]].matchIdx = i;
      }
    }

    function createCard(id, type, hue) {
      let cw = min(width, height) * 0.06;
      let ch = cw * 1.4;
      return {
        id: id,
        type: type,
        hue: hue,
        x: random(width * 0.15, width * 0.85),
        y: random(height * 0.15, height * 0.85),
        vx: random(-2, 2),
        vy: random(-2, 2),
        angle: random(TWO_PI),
        angVel: random(-0.02, 0.02),
        w: cw,
        h: ch,
        matched: false,
        matchIdx: -1,
        glow: 0,
        pattern: floor(random(4)), // geometric pattern type
        patternSeed: random(1000)
      };
    }

    function shuffleArr(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = floor(random(i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function draw() {
      background(220, 50, 5, 15);
      t += 0.01;
      phaseTimer++;

      // Draw fading trails
      noStroke();
      for (let i = trails.length - 1; i >= 0; i--) {
        let tr = trails[i];
        tr.alpha -= 0.8;
        if (tr.alpha <= 0) { trails.splice(i, 1); continue; }
        fill(tr.hue, 40, 60, tr.alpha);
        ellipse(tr.x, tr.y, 3, 3);
      }

      // Draw sparks
      for (let i = sparks.length - 1; i >= 0; i--) {
        let sp = sparks[i];
        sp.x += sp.vx;
        sp.y += sp.vy;
        sp.life -= 0.03;
        sp.vy += 0.05;
        if (sp.life <= 0) { sparks.splice(i, 1); continue; }
        fill(sp.hue, 70, 100, sp.life * 80);
        ellipse(sp.x, sp.y, sp.life * 4, sp.life * 4);
      }

      if (phase === 'flying') {
        updateFlying();
        if (phaseTimer > 180) {
          phase = 'matching';
          phaseTimer = 0;
        }
      } else if (phase === 'matching') {
        updateMatching();
        // Check if all matched
        let allMatched = true;
        for (let c of cards) { if (!c.matched) allMatched = false; }
        if (allMatched && phaseTimer > 60) {
          phase = 'serene';
          phaseTimer = 0;
        }
      } else if (phase === 'serene') {
        updateSerene();
        if (phaseTimer > 400) {
          initCards();
        }
      }

      // Draw cards
      for (let c of cards) {
        drawCard(c);
      }
    }

    function updateFlying() {
      for (let c of cards) {
        // Bezier-like meandering
        let nx = noise(c.id * 100 + t * 0.5) * 2 - 1;
        let ny = noise(c.id * 100 + 500 + t * 0.5) * 2 - 1;
        c.vx += nx * 0.15;
        c.vy += ny * 0.15;
        c.vx *= 0.97;
        c.vy *= 0.97;
        c.x += c.vx;
        c.y += c.vy;
        c.angle += c.angVel;

        // Bounce off edges
        if (c.x < c.w) { c.x = c.w; c.vx *= -0.5; }
        if (c.x > width - c.w) { c.x = width - c.w; c.vx *= -0.5; }
        if (c.y < c.h) { c.y = c.h; c.vy *= -0.5; }
        if (c.y > height - c.h) { c.y = height - c.h; c.vy *= -0.5; }

        // Leave trail
        if (frameCount % 2 === 0) {
          trails.push({ x: c.x, y: c.y, hue: c.hue, alpha: 25 });
        }
      }

      // Check for near-miss (rejection sparks)
      for (let i = 0; i < N; i++) {
        for (let j = N; j < 2 * N; j++) {
          if (cards[i].matchIdx !== j) {
            let d = dist(cards[i].x, cards[i].y, cards[j].x, cards[j].y);
            if (d < 50 && random() < 0.1) {
              for (let k = 0; k < 5; k++) {
                sparks.push({
                  x: (cards[i].x + cards[j].x) / 2,
                  y: (cards[i].y + cards[j].y) / 2,
                  vx: random(-3, 3), vy: random(-3, 3),
                  hue: 15, life: 1.0
                });
              }
            }
          }
        }
      }
    }

    function updateMatching() {
      // Gradually pair up matched cards
      let pairIdx = floor(phaseTimer / 30);
      for (let i = 0; i < N; i++) {
        let c = cards[i];
        let partner = cards[c.matchIdx];
        if (i <= pairIdx && !c.matched) {
          c.matched = true;
          partner.matched = true;
          let mx = (c.x + partner.x) / 2;
          let my = (c.y + partner.y) / 2;
          matchedPairs.push({ a: i, b: c.matchIdx, cx: mx, cy: my, angle: 0 });
          // Celebration sparks
          for (let k = 0; k < 20; k++) {
            sparks.push({
              x: mx, y: my,
              vx: random(-4, 4), vy: random(-4, 4),
              hue: 42, life: 1.0
            });
          }
        }
      }

      // Move matched cards toward each other
      for (let mp of matchedPairs) {
        let a = cards[mp.a];
        let b = cards[mp.b];
        a.x = lerp(a.x, mp.cx - a.w * 0.7, 0.05);
        a.y = lerp(a.y, mp.cy, 0.05);
        b.x = lerp(b.x, mp.cx + b.w * 0.7, 0.05);
        b.y = lerp(b.y, mp.cy, 0.05);
        a.angle = lerp(a.angle, 0, 0.05);
        b.angle = lerp(b.angle, 0, 0.05);
        a.glow = lerp(a.glow, 1, 0.03);
        b.glow = lerp(b.glow, 1, 0.03);
      }

      // Unmatched cards keep flying
      for (let c of cards) {
        if (!c.matched) {
          let nx = noise(c.id * 100 + t * 0.5) * 2 - 1;
          let ny = noise(c.id * 100 + 500 + t * 0.5) * 2 - 1;
          c.vx += nx * 0.1;
          c.vy += ny * 0.1;
          c.vx *= 0.97;
          c.vy *= 0.97;
          c.x += c.vx;
          c.y += c.vy;
          c.angle += c.angVel;
          if (c.x < c.w) { c.x = c.w; c.vx *= -0.5; }
          if (c.x > width - c.w) { c.x = width - c.w; c.vx *= -0.5; }
          if (c.y < c.h) { c.y = c.h; c.vy *= -0.5; }
          if (c.y > height - c.h) { c.y = height - c.h; c.vy *= -0.5; }
        }
      }
    }

    function updateSerene() {
      // Matched pairs gently orbit
      for (let mp of matchedPairs) {
        mp.angle += 0.005;
        let a = cards[mp.a];
        let b = cards[mp.b];
        let orbitR = a.w * 0.8;
        a.x = lerp(a.x, mp.cx + cos(mp.angle) * orbitR, 0.02);
        a.y = lerp(a.y, mp.cy + sin(mp.angle) * orbitR, 0.02);
        b.x = lerp(b.x, mp.cx + cos(mp.angle + PI) * orbitR, 0.02);
        b.y = lerp(b.y, mp.cy + sin(mp.angle + PI) * orbitR, 0.02);
      }
    }

    function drawCard(c) {
      push();
      translate(c.x, c.y);
      rotate(c.angle);

      // Glow
      if (c.glow > 0.1) {
        noStroke();
        fill(42, 60, 90, c.glow * 15);
        rect(0, 0, c.w + 12, c.h + 12, 8);
      }

      // Card body
      stroke(c.hue, 40, 70, 60);
      strokeWeight(1.5);
      fill(c.hue, 30, 15 + c.glow * 25, 90);
      rect(0, 0, c.w, c.h, 5);

      // Geometric pattern (abstract, no text)
      noStroke();
      let ps = c.patternSeed;
      fill(c.hue, 50, 60 + c.glow * 30, 50);
      if (c.pattern === 0) {
        // Concentric diamonds
        for (let k = 3; k >= 0; k--) {
          let s = map(k, 0, 3, c.w * 0.1, c.w * 0.4);
          fill(c.hue, 40 + k * 8, 50 + k * 10 + c.glow * 20, 40 + k * 10);
          beginShape();
          vertex(0, -s); vertex(s * 0.7, 0); vertex(0, s); vertex(-s * 0.7, 0);
          endShape(CLOSE);
        }
      } else if (c.pattern === 1) {
        // Circles
        for (let k = 4; k >= 0; k--) {
          let r = map(k, 0, 4, 3, c.w * 0.35);
          fill(c.hue, 35 + k * 7, 45 + k * 10 + c.glow * 20, 35 + k * 8);
          ellipse(0, 0, r * 2, r * 2);
        }
      } else if (c.pattern === 2) {
        // Cross lines
        fill(c.hue, 50, 55 + c.glow * 30, 50);
        rect(0, 0, c.w * 0.12, c.h * 0.6, 2);
        rect(0, 0, c.w * 0.6, c.h * 0.08, 2);
      } else {
        // Triangle
        fill(c.hue, 45, 55 + c.glow * 25, 45);
        triangle(0, -c.h * 0.25, -c.w * 0.25, c.h * 0.2, c.w * 0.25, c.h * 0.2);
      }

      // Border accent
      if (c.glow > 0.3) {
        noFill();
        stroke(42, 60, 95, c.glow * 50);
        strokeWeight(2);
        rect(0, 0, c.w - 2, c.h - 2, 5);
      }

      pop();
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
