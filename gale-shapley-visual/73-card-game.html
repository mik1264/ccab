<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preference Card Game — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Preference Card Game</h2><p>Each agent holds a hand of cards — their preference list. Cards are played one by one as proposals. The deck mechanics show why truthful play is the dominant strategy.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    const N = 5;
    const menNames = ['M1','M2','M3','M4','M5'];
    const womenNames = ['W1','W2','W3','W4','W5'];

    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

    const menPrefs = menNames.map(() => shuffle([0,1,2,3,4]));
    const womenPrefs = womenNames.map(() => shuffle([0,1,2,3,4]));
    const womenRank = womenPrefs.map(p=>{const r=[];p.forEach((m,i)=>r[m]=i);return r;});

    // Run GS and record events
    const events = [];
    const menNext = Array(N).fill(0);
    const womenPartner = Array(N).fill(-1);
    const menFree = Array(N).fill(true);
    let free = N;
    while (free > 0) {
      for (let m = 0; m < N; m++) {
        if (!menFree[m] || menNext[m] >= N) continue;
        const w = menPrefs[m][menNext[m]]; menNext[m]++;
        if (womenPartner[w] === -1) {
          womenPartner[w] = m; menFree[m] = false; free--;
          events.push({m, w, accepted: true, displaced: -1});
        } else {
          const c = womenPartner[w];
          if (womenRank[w][m] < womenRank[w][c]) {
            womenPartner[w] = m; menFree[m] = false; menFree[c] = true;
            events.push({m, w, accepted: true, displaced: c});
          } else {
            events.push({m, w, accepted: false, displaced: -1});
          }
        }
      }
    }

    // Track cards played per man
    const cardsPlayed = menNames.map(() => []);

    // Card drawing
    const cardW = 55, cardH = 75;

    function drawCard(x, y, faceUp, label, rank, color, glow) {
      ctx.save();
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      roundRect(x+3, y+3, cardW, cardH, 6, true, false);
      // Card body
      if (faceUp) {
        ctx.fillStyle = glow === 'green' ? '#0d3320' : glow === 'red' ? '#3b1010' : '#1c2333';
        roundRect(x, y, cardW, cardH, 6, true, false);
        ctx.strokeStyle = glow === 'green' ? '#4ade80' : glow === 'red' ? '#ef4444' : '#30363d';
        ctx.lineWidth = 2;
        roundRect(x, y, cardW, cardH, 6, false, true);
        // Label
        ctx.fillStyle = color || '#c9d1d9';
        ctx.font = 'bold 14px Nunito';
        ctx.textAlign = 'center';
        ctx.fillText(label, x + cardW/2, y + cardH/2 - 8);
        // Rank
        ctx.fillStyle = '#8b949e';
        ctx.font = '11px JetBrains Mono';
        ctx.fillText('Rank #' + rank, x + cardW/2, y + cardH/2 + 12);
      } else {
        // Face down
        ctx.fillStyle = '#1f3a5f';
        roundRect(x, y, cardW, cardH, 6, true, false);
        ctx.strokeStyle = '#30363d';
        ctx.lineWidth = 2;
        roundRect(x, y, cardW, cardH, 6, false, true);
        // Pattern
        ctx.strokeStyle = '#2a4a6f';
        ctx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          ctx.moveTo(x + 10, y + 12 + i * 12);
          ctx.lineTo(x + cardW - 10, y + 12 + i * 12);
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    function roundRect(x, y, w, h, r, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.arcTo(x+w, y, x+w, y+h, r);
      ctx.arcTo(x+w, y+h, x, y+h, r);
      ctx.arcTo(x, y+h, x, y, r);
      ctx.arcTo(x, y, x+w, y, r);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    // Animated cards
    let flyingCards = [];
    let eventIdx = 0, eventTimer = 0;
    const eventInterval = 2.2;
    let lastTime = performance.now();

    function menHandX() { return 30; }
    function menHandY(m) { return 80 + m * (canvas.height - 160) / (N-1); }
    function womenAreaX() { return canvas.width - 200; }
    function womenAreaY(w) { return 80 + w * (canvas.height - 160) / (N-1); }

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Green felt table background
      ctx.fillStyle = '#0a1a0a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      // Table edge
      ctx.strokeStyle = '#1a3a1a';
      ctx.lineWidth = 4;
      ctx.strokeRect(10, 10, canvas.width-20, canvas.height-20);

      // Draw men labels and hands
      for (let m = 0; m < N; m++) {
        const hx = menHandX(), hy = menHandY(m);
        ctx.fillStyle = '#58a6ff';
        ctx.font = 'bold 13px Nunito';
        ctx.textAlign = 'left';
        ctx.fillText(menNames[m], hx, hy - 45);

        // Draw remaining cards (face down) and played cards (face up)
        const totalPlayed = cardsPlayed[m].length;
        for (let c = 0; c < N; c++) {
          const cx = hx + c * (cardW + 6);
          const played = cardsPlayed[m].find(p => p.cardIdx === c);
          if (played) {
            drawCard(cx, hy - cardH/2, true, womenNames[played.woman], c+1,
              '#c084fc', played.accepted ? 'green' : 'red');
          } else {
            drawCard(cx, hy - cardH/2, false);
          }
        }
      }

      // Draw women areas
      for (let w = 0; w < N; w++) {
        const wx = womenAreaX(), wy = womenAreaY(w);
        ctx.fillStyle = '#c084fc';
        ctx.font = 'bold 13px Nunito';
        ctx.textAlign = 'center';
        ctx.fillText(womenNames[w], wx + 40, wy - 45);

        // Show current partner
        if (womenPartnerAnim[w] >= 0) {
          ctx.fillStyle = '#4ade80';
          ctx.font = '11px Nunito';
          ctx.fillText('Holding: ' + menNames[womenPartnerAnim[w]], wx + 40, wy + 50);
        }
      }

      // Event processing
      if (eventIdx < events.length) {
        eventTimer += dt;

        const e = events[eventIdx];
        if (eventTimer < 0.3) {
          // Card flip phase - highlight the card
          const cardIdx = cardsPlayed[e.m].length;
          const cx = menHandX() + cardIdx * (cardW + 6);
          const cy = menHandY(e.m) - cardH/2;
          ctx.strokeStyle = '#fbbf24';
          ctx.lineWidth = 3;
          roundRect(cx-2, cy-2, cardW+4, cardH+4, 8, false, true);
        } else if (eventTimer < 1.4) {
          // Flying phase
          const t = (eventTimer - 0.3) / 1.1;
          const eased = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
          const cardIdx = cardsPlayed[e.m].length;
          const sx = menHandX() + cardIdx * (cardW + 6);
          const sy = menHandY(e.m) - cardH/2;
          const ex = womenAreaX();
          const ey = womenAreaY(e.w) - cardH/2;
          const fx = sx + (ex - sx) * eased;
          const fy = sy + (ey - sy) * eased - Math.sin(eased * Math.PI) * 40;
          drawCard(fx, fy, true, womenNames[e.w], cardIdx+1, '#fbbf24', null);
        } else if (eventTimer < 2.0) {
          // Result display
          const rx = (menHandX() + womenAreaX()) / 2;
          const ry = (menHandY(e.m) + womenAreaY(e.w)) / 2 - 20;
          ctx.fillStyle = e.accepted ? '#4ade80' : '#ef4444';
          ctx.font = 'bold 16px Nunito';
          ctx.textAlign = 'center';
          ctx.fillText(e.accepted ? 'ACCEPTED!' : 'REJECTED!', rx + 30, ry);
        } else {
          // Commit event
          const cardIdx = cardsPlayed[e.m].length;
          cardsPlayed[e.m].push({ cardIdx, woman: e.w, accepted: e.accepted });
          if (e.accepted) {
            womenPartnerAnim[e.w] = e.m;
            if (e.displaced >= 0) {
              // Mark displaced man's card
            }
          }
          eventIdx++;
          eventTimer = 0;
        }

        ctx.fillStyle = '#58a6ff';
        ctx.font = '14px Lora';
        ctx.textAlign = 'center';
        ctx.fillText('Proposal ' + (eventIdx+1) + ' of ' + events.length, canvas.width/2, 30);
      } else {
        ctx.fillStyle = '#4ade80';
        ctx.font = 'bold 18px Lora';
        ctx.textAlign = 'center';
        ctx.fillText('All Cards Played — Stable Matching Found!', canvas.width/2, canvas.height - 25);
      }

      requestAnimationFrame(animate);
    }

    const womenPartnerAnim = Array(N).fill(-1);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
