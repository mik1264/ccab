<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cellular Automaton DA — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Cellular Automaton DA</h2><p>The Gale-Shapley algorithm encoded as a 2D cellular automaton. Each cell represents a man-woman pair; color shows proposal status spreading like a wave.</p></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let gridSize = 30;
    let cells;
    let nextCells;
    let cellW, cellH;
    let margin = 60;

    // States: 0=inactive, 1=proposed, 2=accepted, 3=rejected
    // Preference-based activation probability
    let prefStrength; // [i][j] = how strong the pairing (i,j) is

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);

      cellW = (width - margin * 2) / gridSize;
      cellH = (height - margin * 2) / gridSize;

      cells = [];
      nextCells = [];
      prefStrength = [];

      for (let i = 0; i < gridSize; i++) {
        cells[i] = [];
        nextCells[i] = [];
        prefStrength[i] = [];
        for (let j = 0; j < gridSize; j++) {
          cells[i][j] = { state: 0, age: 0, energy: 0 };
          nextCells[i][j] = { state: 0, age: 0, energy: 0 };

          // Preference strength: diagonal = best match, off-diagonal = weaker
          let dist = abs(i - j);
          prefStrength[i][j] = max(0, 1 - dist * 0.08);
        }
      }

      // Seed initial proposals along the diagonal (top choices)
      for (let i = 0; i < gridSize; i += 3) {
        let j = i + floor(random(-1, 2));
        j = constrain(j, 0, gridSize - 1);
        cells[i][j] = { state: 1, age: 0, energy: 1 };
      }
    }

    function draw() {
      background(13, 17, 23);

      // Update CA every few frames
      if (frameCount % 4 === 0) {
        updateCA();
      }

      // Draw grid
      for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {
          let x = margin + i * cellW;
          let y = margin + j * cellH;
          let c = cells[i][j];

          let hue, sat, bri, alpha;

          switch (c.state) {
            case 0: // Inactive
              hue = 220;
              sat = 40;
              bri = 15 + prefStrength[i][j] * 10;
              alpha = 80;
              break;
            case 1: // Proposed
              hue = 50;
              sat = 90;
              bri = 70 + sin(frameCount * 0.1 + i + j) * 15;
              alpha = 90;
              break;
            case 2: // Accepted
              hue = 140;
              sat = 80;
              bri = 80;
              alpha = 95;
              break;
            case 3: // Rejected
              hue = 0;
              sat = 75;
              bri = 50 - c.age * 0.5;
              alpha = max(30, 80 - c.age * 2);
              break;
          }

          // Glow for active cells
          if (c.state === 1 || c.state === 2) {
            noStroke();
            fill(hue, sat, bri, 15);
            rect(x - 2, y - 2, cellW + 4, cellH + 4, 3);
          }

          // Cell
          noStroke();
          fill(hue, sat, bri, alpha);
          rect(x + 1, y + 1, cellW - 2, cellH - 2, 2);

          // Energy ripple for recently activated
          if (c.age < 10 && c.state > 0) {
            noFill();
            stroke(hue, sat, 100, map(c.age, 0, 10, 50, 0));
            strokeWeight(1);
            let ripple = c.age * 3;
            rect(x - ripple, y - ripple, cellW + ripple * 2, cellH + ripple * 2, 4);
          }
        }
      }

      // Draw axis labels
      noStroke();
      textFont('Nunito');
      textSize(10);
      textAlign(CENTER, CENTER);
      fill(210, 50, 70, 60);
      for (let i = 0; i < gridSize; i += 5) {
        text('M' + i, margin + i * cellW + cellW / 2, margin - 14);
        fill(310, 50, 70, 60);
        text('W' + i, margin - 18, margin + i * cellH + cellH / 2);
        fill(210, 50, 70, 60);
      }

      // Diagonal indicator (stable matching line)
      stroke(45, 60, 100, 20);
      strokeWeight(1);
      line(margin, margin, margin + gridSize * cellW, margin + gridSize * cellH);
    }

    function updateCA() {
      // Copy current state
      for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {
          nextCells[i][j] = {
            state: cells[i][j].state,
            age: cells[i][j].age + 1,
            energy: cells[i][j].energy * 0.95
          };
        }
      }

      for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {
          let c = cells[i][j];

          if (c.state === 0) {
            // Check neighbors for proposals
            let proposalCount = 0;
            let neighborEnergy = 0;
            for (let di = -1; di <= 1; di++) {
              for (let dj = -1; dj <= 1; dj++) {
                if (di === 0 && dj === 0) continue;
                let ni = i + di;
                let nj = j + dj;
                if (ni >= 0 && ni < gridSize && nj >= 0 && nj < gridSize) {
                  if (cells[ni][nj].state === 1) proposalCount++;
                  neighborEnergy += cells[ni][nj].energy;
                }
              }
            }

            // Activate based on neighbor proposals and preference strength
            let activationProb = proposalCount * 0.15 * prefStrength[i][j] + neighborEnergy * 0.05;
            if (random() < activationProb) {
              nextCells[i][j] = { state: 1, age: 0, energy: prefStrength[i][j] };
            }
          } else if (c.state === 1) {
            // Proposed: may become accepted or rejected
            if (c.age > 8 + random(10)) {
              if (prefStrength[i][j] > 0.6 && random() < 0.7) {
                nextCells[i][j] = { state: 2, age: 0, energy: 1 };
                // Reject others in same row/column
                for (let k = 0; k < gridSize; k++) {
                  if (k !== j && cells[i][k].state === 1) {
                    nextCells[i][k] = { state: 3, age: 0, energy: 0 };
                  }
                  if (k !== i && cells[k][j].state === 1) {
                    nextCells[k][j] = { state: 3, age: 0, energy: 0 };
                  }
                }
              } else {
                nextCells[i][j] = { state: 3, age: 0, energy: 0 };
              }
            }
          } else if (c.state === 3) {
            // Rejected: fade and eventually become inactive for re-proposal
            if (c.age > 40) {
              nextCells[i][j] = { state: 0, age: 0, energy: 0 };
            }
          }
        }
      }

      // Occasionally inject new proposals to keep animation going
      if (random() < 0.3) {
        let ri = floor(random(gridSize));
        let rj = floor(random(gridSize));
        if (nextCells[ri][rj].state === 0) {
          nextCells[ri][rj] = { state: 1, age: 0, energy: prefStrength[ri][rj] };
        }
      }

      // Swap buffers
      let temp = cells;
      cells = nextCells;
      nextCells = temp;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      cellW = (width - margin * 2) / gridSize;
      cellH = (height - margin * 2) / gridSize;
    }
  </script>
</body>
</html>
