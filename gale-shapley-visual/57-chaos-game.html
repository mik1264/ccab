<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chaos Game Matching Attractor — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Chaos Game Matching Attractor</h2><p>The Chaos Game (IFS) with attractor vertices set to agent positions. The resulting fractal reveals the self-similar structure of the preference network.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; init(); });

    let t = 0;
    const N = 10; // 5 men + 5 women
    const stableMatch = [[0,5],[1,6],[2,7],[3,8],[4,9]];

    // Vertices arranged in a 10-gon
    const vertices = [];
    for (let i = 0; i < N; i++) {
      const angle = (i / N) * Math.PI * 2 - Math.PI / 2;
      vertices.push({ angle });
    }

    // Preference weights: higher rank = higher probability
    // Man i prefers women in order; weight = 5 - rank
    const prefWeights = [];
    const manPrefs = [
      [5,6,7,8,9], [6,5,8,7,9], [7,8,5,6,9], [8,7,9,5,6], [9,6,5,8,7]
    ];
    const womanPrefs = [
      [0,2,1,3,4], [1,0,2,4,3], [2,1,3,0,4], [3,4,0,2,1], [4,3,1,0,2]
    ];

    // Compute weight for jumping to each vertex
    for (let i = 0; i < N; i++) {
      let w = 1; // base weight
      // Check if this vertex is part of a stable match
      for (const [m, f] of stableMatch) {
        if (i === m || i === f) { w += 2; break; }
      }
      prefWeights.push(w);
    }

    // Weighted random selection
    function weightedRandom() {
      const totalW = prefWeights.reduce((a, b) => a + b, 0);
      let r = Math.random() * totalW;
      for (let i = 0; i < N; i++) {
        r -= prefWeights[i];
        if (r <= 0) return i;
      }
      return N - 1;
    }

    // Point accumulation buffer
    let pointBuffer;
    let currentX, currentY;
    const batchSize = 500;
    let totalPoints = 0;
    const maxPoints = 200000;

    function init() {
      pointBuffer = new Uint8Array(canvas.width * canvas.height * 4);
      currentX = canvas.width / 2;
      currentY = canvas.height / 2;
      totalPoints = 0;
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    init();

    function getVertexPos(i) {
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const R = Math.min(canvas.width, canvas.height) * 0.42;
      const angle = vertices[i].angle + t * 0.01;
      return {
        x: cx + R * Math.cos(angle),
        y: cy + R * Math.sin(angle)
      };
    }

    function draw() {
      // Add batch of points
      if (totalPoints < maxPoints) {
        for (let b = 0; b < batchSize; b++) {
          const target = weightedRandom();
          const v = getVertexPos(target);
          const ratio = 0.5; // Jump halfway
          currentX = currentX + (v.x - currentX) * ratio;
          currentY = currentY + (v.y - currentY) * ratio;

          // Determine color based on whether target is man or woman
          const isMan = target < 5;
          const isMatched = stableMatch.some(([m, f]) => target === m || target === f);
          const brightness = isMatched ? 1.5 : 1;

          if (isMan) {
            ctx.fillStyle = `rgba(88,166,255,${0.15 * brightness})`;
          } else {
            ctx.fillStyle = `rgba(188,140,255,${0.15 * brightness})`;
          }

          ctx.fillRect(Math.floor(currentX), Math.floor(currentY), 1.5, 1.5);
          totalPoints++;
        }
      }

      // Draw vertex labels and dots
      for (let i = 0; i < N; i++) {
        const v = getVertexPos(i);
        const isMan = i < 5;

        // Glow
        const grad = ctx.createRadialGradient(v.x, v.y, 0, v.x, v.y, 15);
        grad.addColorStop(0, isMan ? 'rgba(88,166,255,0.6)' : 'rgba(188,140,255,0.6)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(v.x, v.y, 15, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(v.x, v.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = isMan ? '#58a6ff' : '#bc8cff';
        ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '11px Nunito';
        ctx.textAlign = 'center';
        ctx.fillText(isMan ? `M${i+1}` : `W${i-4}`, v.x, v.y - 18);
      }

      // Draw stable match lines faintly
      ctx.lineWidth = 0.8;
      for (const [m, f] of stableMatch) {
        const mv = getVertexPos(m);
        const fv = getVertexPos(f);
        ctx.beginPath();
        ctx.moveTo(mv.x, mv.y);
        ctx.lineTo(fv.x, fv.y);
        ctx.strokeStyle = 'rgba(255,215,0,0.15)';
        ctx.stroke();
      }

      // Counter
      ctx.fillStyle = 'rgba(139,148,158,0.4)';
      ctx.font = '11px Nunito';
      ctx.textAlign = 'right';
      ctx.fillText(`${Math.min(totalPoints, maxPoints).toLocaleString()} points`, canvas.width - 16, canvas.height - 16);
    }

    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      draw();
    }
    animate();
  </script>
</body>
</html>
