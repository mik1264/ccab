<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rope Bonds — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background: #30363d; }
    .info { position:fixed;top:60px;left:16px;background:rgba(13,17,23,0.88);border:1px solid #30363d;border-radius:10px;padding:12px 16px;z-index:50;max-width:260px;backdrop-filter:blur(8px) }
    .info h2 { font-size:15px;color:#58a6ff;margin-bottom:4px }
    .info p { font-size:12px;color:#8b949e;line-height:1.4 }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div class="info">
    <h2>Rope Bonds</h2>
    <p>Verlet chains hang from the top — blue for students, green for schools. Golden ropes connect matched pairs. Stable matches stay taut; unstable ones stretch and reconnect.</p>
  </div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const N = 8;
    const LINKS = 8;
    const GRAVITY = 0.32;
    const DAMPING = 0.984;
    const ITERS = 6;

    let W, H;
    let sChains = [], cChains = [];
    let bonds = [];
    let matchState = [];
    let algoDone = false;
    let algoTimer = 0;
    let studentPrefs = [], schoolPrefs = [];
    let studentNext = [], schoolCurrent = [];

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function initPrefs() {
      studentPrefs = []; schoolPrefs = [];
      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffle([...Array(N).keys()]));
        schoolPrefs.push(shuffle([...Array(N).keys()]));
      }
      studentNext = new Array(N).fill(0);
      schoolCurrent = new Array(N).fill(-1);
      matchState = new Array(N).fill(-1);
      bonds = [];
      algoDone = false;
      algoTimer = 0;
    }

    function makeChain(ax, ay, len) {
      const pts = [];
      for (let i = 0; i < LINKS; i++) {
        pts.push({ x: ax, y: ay + i * len, ox: ax, oy: ay + i * len, pin: i === 0 });
      }
      return { pts, ax, ay, len };
    }

    function initChains() {
      const leftX = W * 0.18;
      const rightX = W * 0.82;
      const linkLen = Math.min(32, (H - 200) / (LINKS + 1));
      const spacing = Math.min(55, (H - 140) / N);
      const topY = 70;
      sChains = []; cChains = [];
      for (let i = 0; i < N; i++) {
        const y = topY + i * spacing;
        sChains.push(makeChain(leftX, y, linkLen));
        cChains.push(makeChain(rightX, y, linkLen));
      }
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      initChains();
    }

    function gsStep() {
      if (algoDone) return;
      let any = false;
      for (let s = 0; s < N; s++) {
        if (matchState[s] !== -1) continue;
        if (studentNext[s] >= N) continue;
        any = true;
        const t = studentPrefs[s][studentNext[s]];
        studentNext[s]++;
        if (schoolCurrent[t] === -1) {
          schoolCurrent[t] = s;
          matchState[s] = t;
          bonds.push({ si: s, ci: t, prog: 0 });
        } else {
          const cur = schoolCurrent[t];
          if (schoolPrefs[t].indexOf(s) < schoolPrefs[t].indexOf(cur)) {
            matchState[cur] = -1;
            bonds = bonds.filter(b => !(b.si === cur && b.ci === t));
            schoolCurrent[t] = s;
            matchState[s] = t;
            bonds.push({ si: s, ci: t, prog: 0 });
          }
        }
      }
      if (!any) algoDone = true;
    }

    function verlet(chain) {
      const p = chain.pts;
      for (let i = 0; i < p.length; i++) {
        if (p[i].pin) continue;
        const vx = (p[i].x - p[i].ox) * DAMPING;
        const vy = (p[i].y - p[i].oy) * DAMPING;
        p[i].ox = p[i].x;
        p[i].oy = p[i].y;
        p[i].x += vx + (Math.random() - 0.5) * 0.1;
        p[i].y += vy + GRAVITY;
      }
      for (let it = 0; it < ITERS; it++) {
        for (let i = 0; i < p.length - 1; i++) {
          const a = p[i], b = p[i + 1];
          const dx = b.x - a.x, dy = b.y - a.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 0.001;
          const diff = (d - chain.len) / d * 0.5;
          if (!a.pin) { a.x += dx * diff; a.y += dy * diff; }
          if (!b.pin) { b.x -= dx * diff; b.y -= dy * diff; }
        }
      }
    }

    function drawChain(chain, col) {
      const p = chain.pts;
      ctx.strokeStyle = col;
      ctx.lineWidth = 2.5;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(p[0].x, p[0].y);
      for (let i = 1; i < p.length; i++) ctx.lineTo(p[i].x, p[i].y);
      ctx.stroke();
      for (let i = 0; i < p.length; i++) {
        const r = i === 0 ? 6 : 4.5;
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.arc(p[i].x, p[i].y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }

    function drawBond(b, t) {
      const se = sChains[b.si].pts[LINKS - 1];
      const ce = cChains[b.ci].pts[LINKS - 1];
      const prog = Math.min(b.prog, 1);
      const ex = se.x + (ce.x - se.x) * prog;
      const ey = se.y + (ce.y - se.y) * prog;

      const mx = (se.x + ex) * 0.5;
      const sagD = Math.sqrt((ex - se.x) ** 2 + (ey - se.y) ** 2);
      const my = (se.y + ey) * 0.5 + sagD * 0.12 + Math.sin(t * 2.5 + b.si) * 4;

      const glow = 0.6 + 0.3 * Math.sin(t * 3 + b.ci * 0.7);
      ctx.save();
      ctx.shadowColor = '#ffc83c';
      ctx.shadowBlur = 10;
      ctx.strokeStyle = `rgba(255,200,60,${glow})`;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(se.x, se.y);
      ctx.quadraticCurveTo(mx, my, ex, ey);
      ctx.stroke();
      ctx.restore();

      ctx.fillStyle = `rgba(255,200,60,${glow})`;
      ctx.beginPath();
      ctx.arc(se.x, se.y, 3.5, 0, Math.PI * 2);
      ctx.fill();
      if (prog >= 1) {
        ctx.beginPath();
        ctx.arc(ce.x, ce.y, 3.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    const t0 = performance.now();

    function animate() {
      const t = (performance.now() - t0) / 1000;

      algoTimer++;
      if (algoTimer % 80 === 0 && !algoDone) gsStep();

      for (const b of bonds) { if (b.prog < 1) b.prog += 0.008; }

      const wind = Math.sin(t * 0.6) * 0.4;
      for (const c of sChains.concat(cChains)) {
        verlet(c);
        for (const p of c.pts) { if (!p.pin) p.x += wind; }
      }

      ctx.fillStyle = 'rgba(13,17,23,0.3)';
      ctx.fillRect(0, 0, W, H);

      // Anchor bars
      ctx.strokeStyle = 'rgba(88,166,255,0.08)';
      ctx.lineWidth = 2;
      for (const c of sChains) {
        ctx.beginPath(); ctx.moveTo(c.ax - 15, c.ay); ctx.lineTo(c.ax + 15, c.ay); ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(63,185,80,0.08)';
      for (const c of cChains) {
        ctx.beginPath(); ctx.moveTo(c.ax - 15, c.ay); ctx.lineTo(c.ax + 15, c.ay); ctx.stroke();
      }

      for (const c of sChains) drawChain(c, '#58a6ff');
      for (const c of cChains) drawChain(c, '#3fb950');
      for (const b of bonds) drawBond(b, t);

      // Labels
      ctx.font = '11px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      for (let i = 0; i < N; i++) {
        ctx.fillStyle = '#58a6ff';
        ctx.fillText('S' + (i + 1), sChains[i].pts[0].x, sChains[i].pts[0].y - 12);
        ctx.fillStyle = '#3fb950';
        ctx.fillText('C' + (i + 1), cChains[i].pts[0].x, cChains[i].pts[0].y - 12);
      }

      const matched = matchState.filter(m => m !== -1).length;
      ctx.fillStyle = '#8b949e';
      ctx.font = '12px "Segoe UI", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(algoDone ? 'Stable matching — ' + matched + ' pairs' : 'Matching... ' + matched + '/' + N, W - 20, H - 16);

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    initPrefs();
    animate();
  </script>
</body>
</html>
