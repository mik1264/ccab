<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rope Constraint Matching — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Rope Constraint Matching</h2><p>Matched agents are connected by elastic ropes. Non-matched agents are free. The rope network finds its natural equilibrium — the stable matching geometry.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const N = 5;
    const manColors = ['#58a6ff','#3b82f6','#60a5fa','#93c5fd','#2563eb'];
    const womanColors = ['#c084fc','#a855f7','#9333ea','#7c3aed','#6d28d9'];
    const matching = [0,1,2,3,4];

    class Node {
      constructor(x, y, type, index) {
        this.x = x; this.y = y;
        this.px = x; this.py = y; // Verlet previous position
        this.type = type;
        this.index = index;
        this.r = 18;
        this.dragging = false;
      }
    }

    // Rope segment points between pairs
    class Rope {
      constructor(nodeA, nodeB, restLen, isMatched) {
        this.a = nodeA;
        this.b = nodeB;
        this.restLen = restLen;
        this.isMatched = isMatched;
        this.segments = [];
        this.initSegments();
      }
      initSegments() {
        const numSeg = 12;
        this.segments = [];
        for (let i = 0; i <= numSeg; i++) {
          const frac = i / numSeg;
          this.segments.push({
            x: this.a.x + (this.b.x - this.a.x) * frac,
            y: this.a.y + (this.b.y - this.a.y) * frac,
            px: this.a.x + (this.b.x - this.a.x) * frac,
            py: this.a.y + (this.b.y - this.a.y) * frac
          });
        }
      }
    }

    let nodes = [], ropes = [];
    let dragNode = null;

    function init() {
      const w = canvas.width, h = canvas.height;
      nodes = [];
      ropes = [];

      for (let i = 0; i < N; i++) {
        nodes.push(new Node(
          w * 0.2 + Math.random() * w * 0.15,
          h * 0.15 + (h * 0.7) * i / (N - 1),
          'man', i
        ));
      }
      for (let i = 0; i < N; i++) {
        nodes.push(new Node(
          w * 0.65 + Math.random() * w * 0.15,
          h * 0.15 + (h * 0.7) * i / (N - 1),
          'woman', i
        ));
      }

      // Create ropes for matched pairs (short rest length) and some unmatched (long rest)
      for (let i = 0; i < N; i++) {
        const man = nodes[i];
        const woman = nodes[N + matching[i]];
        ropes.push(new Rope(man, woman, 80, true));
      }
      // A few unmatched ropes
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          if (matching[i] !== j) {
            if (Math.random() < 0.3) {
              ropes.push(new Rope(nodes[i], nodes[N+j], 300, false));
            }
          }
        }
      }
    }

    init();
    window.addEventListener('resize', () => { resize(); init(); });

    // Mouse interaction
    canvas.addEventListener('mousedown', e => {
      for (const n of nodes) {
        const dx = e.clientX - n.x, dy = e.clientY - n.y;
        if (dx*dx + dy*dy < n.r*n.r * 4) {
          dragNode = n;
          n.dragging = true;
          break;
        }
      }
    });
    canvas.addEventListener('mousemove', e => {
      if (dragNode) {
        dragNode.x = e.clientX;
        dragNode.y = e.clientY;
        dragNode.px = e.clientX;
        dragNode.py = e.clientY;
      }
    });
    canvas.addEventListener('mouseup', () => {
      if (dragNode) dragNode.dragging = false;
      dragNode = null;
    });

    const gravity = 0.15;

    let t = 0, dt = 1/60;
    function loop() {
      requestAnimationFrame(loop);
      t += dt;
      update();
      render();
    }

    function update() {
      const w = canvas.width, h = canvas.height;

      // Verlet integration for nodes
      for (const n of nodes) {
        if (n.dragging) continue;
        const vx = (n.x - n.px) * 0.99;
        const vy = (n.y - n.py) * 0.99;
        n.px = n.x;
        n.py = n.y;
        n.x += vx;
        n.y += vy + gravity;

        // Boundary
        if (n.x < n.r) { n.x = n.r; n.px = n.x + vx * 0.5; }
        if (n.x > w - n.r) { n.x = w - n.r; n.px = n.x + vx * 0.5; }
        if (n.y < n.r) { n.y = n.r; n.py = n.y; }
        if (n.y > h - n.r) { n.y = h - n.r; n.py = n.y; }
      }

      // Node-node repulsion
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i+1; j < nodes.length; j++) {
          const a = nodes[i], b = nodes[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const minD = a.r + b.r + 10;
          if (dist < minD && dist > 0) {
            const push = (minD - dist) * 0.5;
            const nx = dx/dist, ny = dy/dist;
            if (!a.dragging) { a.x -= nx * push; a.y -= ny * push; }
            if (!b.dragging) { b.x += nx * push; b.y += ny * push; }
          }
        }
      }

      // Update rope segments
      for (const rope of ropes) {
        const segs = rope.segments;
        const numSeg = segs.length;

        // Pin endpoints to nodes
        segs[0].x = rope.a.x; segs[0].y = rope.a.y;
        segs[numSeg-1].x = rope.b.x; segs[numSeg-1].y = rope.b.y;

        // Verlet for interior segments
        for (let i = 1; i < numSeg - 1; i++) {
          const s = segs[i];
          const vx = (s.x - s.px) * 0.98;
          const vy = (s.y - s.py) * 0.98;
          s.px = s.x;
          s.py = s.y;
          s.x += vx;
          s.y += vy + gravity * 0.5;
        }

        // Distance constraints
        const segLen = rope.restLen / (numSeg - 1);
        for (let iter = 0; iter < 5; iter++) {
          segs[0].x = rope.a.x; segs[0].y = rope.a.y;
          segs[numSeg-1].x = rope.b.x; segs[numSeg-1].y = rope.b.y;
          for (let i = 0; i < numSeg - 1; i++) {
            const a = segs[i], b = segs[i+1];
            const dx = b.x - a.x, dy = b.y - a.y;
            const dist = Math.sqrt(dx*dx + dy*dy) || 1;
            const diff = (dist - segLen) / dist * 0.5;
            const offx = dx * diff, offy = dy * diff;
            if (i > 0) { a.x += offx; a.y += offy; }
            if (i < numSeg - 2) { b.x -= offx; b.y -= offy; }
          }
        }

        // Pull nodes toward each other for matched ropes
        if (rope.isMatched && !rope.a.dragging && !rope.b.dragging) {
          const dx = rope.b.x - rope.a.x;
          const dy = rope.b.y - rope.a.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist > rope.restLen) {
            const pull = (dist - rope.restLen) * 0.002;
            rope.a.x += dx/dist * pull;
            rope.a.y += dy/dist * pull;
            rope.b.x -= dx/dist * pull;
            rope.b.y -= dy/dist * pull;
          }
        }
      }
    }

    function render() {
      const w = canvas.width, h = canvas.height;
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, w, h);

      // Draw ropes
      for (const rope of ropes) {
        const segs = rope.segments;
        ctx.beginPath();
        ctx.moveTo(segs[0].x, segs[0].y);
        for (let i = 1; i < segs.length; i++) {
          ctx.lineTo(segs[i].x, segs[i].y);
        }

        if (rope.isMatched) {
          // Tension-based color
          const dx = rope.b.x - rope.a.x, dy = rope.b.y - rope.a.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const tension = Math.min(1, Math.max(0, (dist - rope.restLen * 0.8) / rope.restLen));
          ctx.strokeStyle = `rgba(255,${Math.floor(215 - tension * 150)},${Math.floor(100 - tension * 100)},${0.7 + tension * 0.3})`;
          ctx.lineWidth = 3;
          ctx.shadowColor = '#ffd700';
          ctx.shadowBlur = 8;
        } else {
          ctx.strokeStyle = 'rgba(100,100,120,0.15)';
          ctx.lineWidth = 1;
          ctx.setLineDash([4,6]);
          ctx.shadowBlur = 0;
        }
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.shadowBlur = 0;
      }

      // Draw nodes
      for (const n of nodes) {
        const isMan = n.type === 'man';
        const color = isMan ? manColors[n.index] : womanColors[n.index];

        // Glow
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r + 8, 0, Math.PI * 2);
        const glow = ctx.createRadialGradient(n.x, n.y, n.r * 0.5, n.x, n.y, n.r + 8);
        glow.addColorStop(0, color + '40');
        glow.addColorStop(1, color + '00');
        ctx.fillStyle = glow;
        ctx.fill();

        // Node body
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(n.x - 4, n.y - 4, 2, n.x, n.y, n.r);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.35, color);
        grad.addColorStop(1, color + '80');
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Label
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px Nunito';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(isMan ? 'M'+(n.index+1) : 'W'+(n.index+1), n.x, n.y);
      }

      // Instruction
      ctx.fillStyle = '#484f58';
      ctx.font = '500 11px Nunito';
      ctx.textAlign = 'center';
      ctx.fillText('Click and drag nodes to feel the rope constraints', w/2, h - 20);
    }

    loop();
  </script>
</body>
</html>
