<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sand Mandala Tracing — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Sand Mandala Tracing</h2><p>Like a Buddhist sand mandala, grains of sand trace the path of the DA algorithm — a temporary, impermanent, yet perfect structure.</p></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let grains = [];
    let settledGrains = [];
    let prefLines = [];
    let maxSettled = 10000;
    let sandCanvas;

    // 5 men, 5 women positions
    let men = [];
    let women = [];
    // Matched pairs: man i matched with woman matchIdx[i]
    let matchIdx = [2, 0, 4, 1, 3];
    // Preference ranks (1=best)
    let prefRanks = [
      [3,2,1,5,4],
      [1,3,4,2,5],
      [2,5,3,1,4],
      [4,1,2,5,3],
      [5,4,3,2,1]
    ];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      sandCanvas = createGraphics(width, height);
      sandCanvas.colorMode(HSB, 360, 100, 100, 100);
      sandCanvas.background(0, 0, 0, 0);

      let cx = width / 2;
      let cy = height / 2;
      let spread = min(width, height) * 0.35;

      // Place men on left arc, women on right arc
      for (let i = 0; i < 5; i++) {
        let angle = map(i, 0, 4, -PI * 0.6, PI * 0.6) - PI;
        men.push({
          x: cx + cos(angle) * spread,
          y: cy + sin(angle) * spread * 0.7
        });
        angle = map(i, 0, 4, -PI * 0.6, PI * 0.6);
        women.push({
          x: cx + cos(angle) * spread,
          y: cy + sin(angle) * spread * 0.7
        });
      }

      // Build preference lines with thickness based on rank
      for (let i = 0; i < 5; i++) {
        for (let j = 0; j < 5; j++) {
          let rank = prefRanks[i][j];
          let isMatch = (matchIdx[i] === j);
          prefLines.push({
            x1: men[i].x, y1: men[i].y,
            x2: women[j].x, y2: women[j].y,
            rank: rank,
            isMatch: isMatch,
            thickness: map(rank, 1, 5, 8, 1.5),
            manIdx: i,
            womanIdx: j
          });
        }
      }

      // Spawn initial grains
      for (let i = 0; i < 500; i++) {
        spawnGrain();
      }
    }

    function spawnGrain() {
      grains.push({
        x: random(width),
        y: random(height),
        vx: random(-1, 1),
        vy: random(-1, 1),
        settled: false,
        size: random(1, 2.5)
      });
    }

    function draw() {
      background(13, 17, 23);

      // Process grains: attract toward nearest preference line
      let settleCount = 0;
      let maxSettle = 200;

      for (let g of grains) {
        if (g.settled) continue;

        // Find nearest preference line
        let nearestDist = Infinity;
        let nearestLine = null;
        for (let pl of prefLines) {
          let d = distToSegment(g.x, g.y, pl.x1, pl.y1, pl.x2, pl.y2);
          // Weight by thickness (rank)
          d /= (pl.thickness * 0.3);
          if (d < nearestDist) {
            nearestDist = d;
            nearestLine = pl;
          }
        }

        if (nearestLine) {
          // Move toward nearest point on the line
          let proj = projectOnSegment(g.x, g.y, nearestLine.x1, nearestLine.y1, nearestLine.x2, nearestLine.y2);
          let dx = proj.x - g.x;
          let dy = proj.y - g.y;
          let d = sqrt(dx * dx + dy * dy);

          if (d > 0.5) {
            let force = 0.02;
            g.vx += (dx / d) * force;
            g.vy += (dy / d) * force;
          }

          // Add Brownian motion
          g.vx += random(-0.3, 0.3);
          g.vy += random(-0.3, 0.3);

          // Damping
          g.vx *= 0.95;
          g.vy *= 0.95;

          g.x += g.vx;
          g.y += g.vy;

          // Settle if close enough
          if (d < nearestLine.thickness && settleCount < maxSettle && settledGrains.length < maxSettled) {
            g.settled = true;
            settleCount++;

            // Draw settled grain onto sand canvas
            let hue, sat, bri;
            if (nearestLine.isMatch) {
              hue = 35;
              sat = 80;
              bri = 90;
            } else {
              hue = 25;
              sat = 50 + nearestLine.rank * 8;
              bri = 60 - nearestLine.rank * 5;
            }

            sandCanvas.noStroke();
            sandCanvas.fill(hue, sat, bri, random(30, 70));
            sandCanvas.ellipse(g.x, g.y, g.size, g.size);

            settledGrains.push(g);
          }
        }
      }

      // Remove settled grains from active list and spawn new ones
      grains = grains.filter(function(g) { return !g.settled; });
      let toSpawn = min(200, maxSettled - settledGrains.length);
      for (let i = 0; i < min(toSpawn, 50); i++) {
        spawnGrain();
      }

      // Draw the sand canvas
      image(sandCanvas, 0, 0);

      // Draw unsettled grains (very subtle)
      noStroke();
      fill(30, 30, 70, 20);
      for (let g of grains) {
        ellipse(g.x, g.y, 1.5, 1.5);
      }

      // Draw agent markers
      textFont('Nunito');
      textSize(11);
      textAlign(CENTER, CENTER);
      for (let i = 0; i < 5; i++) {
        // Men
        fill(210, 70, 90, 80);
        noStroke();
        ellipse(men[i].x, men[i].y, 18, 18);
        fill(0, 0, 100);
        text('M' + (i + 1), men[i].x, men[i].y);

        // Women
        fill(340, 60, 90, 80);
        noStroke();
        ellipse(women[i].x, women[i].y, 18, 18);
        fill(0, 0, 100);
        text('W' + (i + 1), women[i].x, women[i].y);
      }

      // Progress indicator
      fill(0, 0, 50, 50);
      textSize(10);
      textAlign(RIGHT, BOTTOM);
      text(settledGrains.length + ' / ' + maxSettled + ' grains', width - 16, height - 16);
    }

    function distToSegment(px, py, x1, y1, x2, y2) {
      let proj = projectOnSegment(px, py, x1, y1, x2, y2);
      return dist(px, py, proj.x, proj.y);
    }

    function projectOnSegment(px, py, x1, y1, x2, y2) {
      let dx = x2 - x1;
      let dy = y2 - y1;
      let lenSq = dx * dx + dy * dy;
      if (lenSq === 0) return { x: x1, y: y1 };
      let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
      t = constrain(t, 0, 1);
      return { x: x1 + t * dx, y: y1 + t * dy };
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      let newCanvas = createGraphics(width, height);
      newCanvas.colorMode(HSB, 360, 100, 100, 100);
      newCanvas.image(sandCanvas, 0, 0);
      sandCanvas = newCanvas;
    }
  </script>
</body>
</html>
