<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sand Trace — Matching Algorithms Visual Gallery</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:sans-serif; }
    canvas { display:block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); color:#8b949e; font-size:12px; line-height:1.4; }
    .info h2 { font-size:15px; color:#58a6ff; margin-bottom:4px; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div class="info">
    <h2>Sand Trace</h2>
    <p>Thousands of sand grains fall from student funnels to school bowls, guided by preference channels. Golden piles form at stable matches.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 8;
    let grains = [];
    let bowls = [];
    let funnelX = [];
    let bowlX = [];
    let studentPrefs = [];
    let matching = [];
    let maxGrains = 4000;

    let sandHues = [
      [220, 190, 140], [210, 180, 130], [230, 200, 150],
      [200, 170, 120], [215, 185, 135], [225, 195, 145],
      [205, 175, 125], [235, 205, 155]
    ];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      noStroke();
      initMatching();
      initPositions();
    }

    function initMatching() {
      studentPrefs = [];
      let schoolPrefs = [];
      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffled(N));
        schoolPrefs.push(shuffled(N));
      }
      let sNext = new Array(N).fill(0);
      let schCur = new Array(N).fill(-1);
      for (let r = 0; r < N * N; r++) {
        let free = [];
        for (let s = 0; s < N; s++) {
          let m = false;
          for (let c = 0; c < N; c++) if (schCur[c] === s) { m = true; break; }
          if (!m && sNext[s] < N) free.push(s);
        }
        if (free.length === 0) break;
        for (let s of free) {
          let sch = studentPrefs[s][sNext[s]];
          sNext[s]++;
          if (schCur[sch] === -1) {
            schCur[sch] = s;
          } else {
            let cur = schCur[sch];
            if (schoolPrefs[sch].indexOf(s) < schoolPrefs[sch].indexOf(cur)) {
              schCur[sch] = s;
            }
          }
        }
      }
      matching = new Array(N).fill(-1);
      for (let sch = 0; sch < N; sch++) {
        if (schCur[sch] !== -1) matching[schCur[sch]] = sch;
      }
    }

    function shuffled(n) {
      let a = [...Array(n).keys()];
      for (let i = n - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function initPositions() {
      let margin = width * 0.08;
      let span = width - margin * 2;
      funnelX = [];
      bowlX = [];
      bowls = [];
      for (let i = 0; i < N; i++) {
        funnelX.push(margin + (i / (N - 1)) * span);
        bowlX.push(margin + (i / (N - 1)) * span);
        bowls.push({ grainCount: 0, pileHeight: 0 });
      }
    }

    function spawnGrain(studentIdx) {
      if (grains.length >= maxGrains) return;
      let fx = funnelX[studentIdx];
      let prefs = studentPrefs[studentIdx];

      let weights = [];
      let total = 0;
      for (let r = 0; r < N; r++) {
        let w = Math.pow(N - r, 2.5);
        weights.push(w);
        total += w;
      }
      let rand = Math.random() * total;
      let accum = 0;
      let targetSchool = 0;
      for (let r = 0; r < N; r++) {
        accum += weights[r];
        if (rand <= accum) { targetSchool = prefs[r]; break; }
      }

      let bx = bowlX[targetSchool];
      let col = sandHues[studentIdx];
      let isStable = matching[studentIdx] === targetSchool;

      grains.push({
        x: fx + (Math.random() - 0.5) * 16,
        y: height * 0.12 + Math.random() * 10,
        targetX: bx,
        vx: 0,
        vy: 0.5 + Math.random() * 1.5,
        col: isStable ? [255, 210, 80] : col,
        size: 1 + Math.random() * 1.5,
        school: targetSchool,
        settled: false,
        isStable: isStable
      });
    }

    function draw() {
      background(13, 17, 23, 30);

      for (let s = 0; s < N; s++) {
        if (Math.random() < 0.4) spawnGrain(s);
      }

      let bowlY = height * 0.82;

      for (let g of grains) {
        if (g.settled) {
          fill(g.col[0], g.col[1], g.col[2], 200);
          rect(g.x, g.y, g.size, g.size);
          continue;
        }

        g.vy += 0.04;
        g.vy = Math.min(g.vy, 4);
        let dx = g.targetX - g.x;
        g.vx += dx * 0.001 + (Math.random() - 0.5) * 0.3;
        g.vx *= 0.98;
        g.x += g.vx;
        g.y += g.vy;

        let pileTop = bowlY - bowls[g.school].pileHeight;
        if (g.y >= pileTop) {
          g.y = pileTop;
          g.settled = true;
          bowls[g.school].grainCount++;
          bowls[g.school].pileHeight = Math.sqrt(bowls[g.school].grainCount) * 1.2;
        }

        fill(g.col[0], g.col[1], g.col[2], 180);
        rect(g.x, g.y, g.size, g.size);
      }

      // Draw funnels (students)
      for (let i = 0; i < N; i++) {
        let x = funnelX[i];
        let y = height * 0.08;
        fill(88, 166, 255, 180);
        triangle(x - 18, y, x + 18, y, x, y + 25);
        fill(255, 220);
        textAlign(CENTER, CENTER);
        textSize(10);
        text('S' + (i + 1), x, y - 10);
      }

      // Draw bowls (schools)
      for (let i = 0; i < N; i++) {
        let x = bowlX[i];
        noFill();
        stroke(100, 110, 120, 150);
        strokeWeight(2);
        arc(x, bowlY + 5, 50, 30, 0, PI);
        line(x - 25, bowlY + 5, x - 25, bowlY - 5);
        line(x + 25, bowlY + 5, x + 25, bowlY - 5);
        noStroke();
        fill(255, 220);
        textAlign(CENTER, CENTER);
        textSize(10);
        text('C' + (i + 1), x, bowlY + 28);

        let stableStudent = -1;
        for (let s = 0; s < N; s++) {
          if (matching[s] === i) { stableStudent = s; break; }
        }
        if (stableStudent !== -1 && bowls[i].grainCount > 20) {
          fill(255, 210, 80, 40);
          ellipse(x, bowlY - bowls[i].pileHeight / 2, 55, bowls[i].pileHeight + 10);
        }
      }

      fill(88, 166, 255, 120);
      noStroke();
      textAlign(RIGHT, TOP);
      textSize(12);
      text(grains.length + ' grains', width - 20, 20);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initPositions();
    }
  </script>
</body>
</html>
