<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voronoi Matching Art — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Voronoi Matching Art</h2><p>Voronoi cells reveal each agent's sphere of influence. Matched pairs share the same color palette; competing agents have contrasting hues.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    let t = 0;
    const N = 10; // 5 men + 5 women
    const matchPairs = [[0,5],[1,6],[2,7],[3,8],[4,9]]; // man i matched with woman j

    // Pair hues: matched pairs share similar hues
    const pairHues = [210, 330, 140, 30, 270];
    const agentHues = [];
    for (let p = 0; p < 5; p++) {
      agentHues[matchPairs[p][0]] = pairHues[p];
      agentHues[matchPairs[p][1]] = pairHues[p] + 20;
    }

    // Agent positions and velocities
    const agents = [];
    for (let i = 0; i < N; i++) {
      agents.push({
        x: 0.1 + Math.random() * 0.8,
        y: 0.1 + Math.random() * 0.8,
        vx: (Math.random() - 0.5) * 0.0005,
        vy: (Math.random() - 0.5) * 0.0005,
        phase: Math.random() * Math.PI * 2
      });
    }

    // Jump-flood approximation for Voronoi on canvas
    // Use brute-force per pixel at reduced resolution for smoothness
    const scale = 3;
    let vW, vH, voronoiData;

    function initVoronoi() {
      vW = Math.ceil(canvas.width / scale);
      vH = Math.ceil(canvas.height / scale);
      voronoiData = new Int32Array(vW * vH);
    }
    initVoronoi();

    function computeVoronoi() {
      const w = canvas.width, h = canvas.height;
      for (let py = 0; py < vH; py++) {
        for (let px = 0; px < vW; px++) {
          const sx = (px * scale + scale / 2) / w;
          const sy = (py * scale + scale / 2) / h;
          let minD = Infinity, closest = 0;
          for (let i = 0; i < N; i++) {
            const dx = sx - agents[i].x;
            const dy = sy - agents[i].y;
            const d = dx * dx + dy * dy;
            if (d < minD) { minD = d; closest = i; }
          }
          voronoiData[py * vW + px] = closest;
        }
      }
    }

    function updateAgents() {
      for (let i = 0; i < N; i++) {
        const a = agents[i];
        a.x += a.vx + 0.0003 * Math.sin(t * 0.5 + a.phase);
        a.y += a.vy + 0.0003 * Math.cos(t * 0.4 + a.phase * 1.3);
        // Bounce
        if (a.x < 0.05 || a.x > 0.95) a.vx *= -1;
        if (a.y < 0.05 || a.y > 0.95) a.vy *= -1;
        a.x = Math.max(0.02, Math.min(0.98, a.x));
        a.y = Math.max(0.02, Math.min(0.98, a.y));
      }
    }

    function draw() {
      updateAgents();
      computeVoronoi();

      const w = canvas.width, h = canvas.height;

      // Draw Voronoi cells
      for (let py = 0; py < vH; py++) {
        for (let px = 0; px < vW; px++) {
          const idx = voronoiData[py * vW + px];
          const hue = agentHues[idx];
          const isMan = idx < 5;
          const light = isMan ? 18 : 22;
          const sat = 60 + 20 * Math.sin(t * 0.3 + idx);
          ctx.fillStyle = `hsl(${hue}, ${sat}%, ${light}%)`;
          ctx.fillRect(px * scale, py * scale, scale, scale);
        }
      }

      // Draw cell boundaries
      for (let py = 1; py < vH - 1; py++) {
        for (let px = 1; px < vW - 1; px++) {
          const idx = voronoiData[py * vW + px];
          const right = voronoiData[py * vW + px + 1];
          const down = voronoiData[(py + 1) * vW + px];
          if (idx !== right || idx !== down) {
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillRect(px * scale, py * scale, scale, scale);
          }
        }
      }

      // Draw agent dots
      for (let i = 0; i < N; i++) {
        const x = agents[i].x * w;
        const y = agents[i].y * h;
        const isMan = i < 5;
        const hue = agentHues[i];

        // Glow
        const grad = ctx.createRadialGradient(x, y, 0, x, y, 20);
        grad.addColorStop(0, `hsla(${hue}, 90%, 70%, 0.8)`);
        grad.addColorStop(1, `hsla(${hue}, 90%, 70%, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI * 2);
        ctx.fill();

        // Dot
        ctx.beginPath();
        ctx.arc(x, y, isMan ? 5 : 4, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${hue}, 90%, 80%)`;
        ctx.fill();

        // Label
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.font = '10px Nunito';
        ctx.textAlign = 'center';
        ctx.fillText(isMan ? `M${i+1}` : `W${i-4}`, x, y - 12);
      }

      // Draw matching lines
      ctx.lineWidth = 1.5;
      for (const [m, w] of matchPairs) {
        const mx = agents[m].x * canvas.width, my = agents[m].y * canvas.height;
        const wx = agents[w].x * canvas.width, wy = agents[w].y * canvas.height;
        ctx.beginPath();
        ctx.moveTo(mx, my);
        ctx.lineTo(wx, wy);
        ctx.strokeStyle = `hsla(${pairHues[m]}, 80%, 60%, 0.5)`;
        ctx.stroke();
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      draw();
    }
    animate();
  </script>
</body>
</html>
