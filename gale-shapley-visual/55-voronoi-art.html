<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voronoi Art — Matching Algorithms Visual Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;overflow:hidden;font-family:sans-serif}
canvas{display:block;position:fixed;top:0;left:0}
.back{position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100}
.back:hover{background:#30363d}
.title{position:fixed;top:16px;left:50%;transform:translateX(-50%);color:#c9d1d9;font-size:18px;font-weight:700;z-index:50;text-shadow:0 2px 8px rgba(0,0,0,0.8);pointer-events:none}
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<div class="title">Voronoi Match</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, scale = 4;
let offCanvas, offCtx, offW, offH;

function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
  offW = Math.ceil(W / scale);
  offH = Math.ceil(H / scale);
  offCanvas = document.createElement('canvas');
  offCanvas.width = offW;
  offCanvas.height = offH;
  offCtx = offCanvas.getContext('2d');
}
resize();
window.addEventListener('resize', resize);

// 6 students (blue) + 6 schools (pink)
const seeds = [];
const matchPairs = [[0,6],[1,7],[2,8],[3,9],[4,10],[5,11]];

for (let i = 0; i < 12; i++) {
  const isStudent = i < 6;
  seeds.push({
    bx: Math.random() * 0.8 + 0.1,
    by: Math.random() * 0.8 + 0.1,
    sx: Math.random() * 0.03 + 0.005,
    sy: Math.random() * 0.03 + 0.005,
    px: Math.random() * Math.PI * 2,
    py: Math.random() * Math.PI * 2,
    isStudent: isStudent,
    satisfaction: 0.5 + Math.random() * 0.5
  });
}

function getSeedPos(s, t) {
  return {
    x: (s.bx + Math.sin(t * s.sx + s.px) * 0.08) * W,
    y: (s.by + Math.sin(t * s.sy + s.py) * 0.08) * H
  };
}

function hsl(h, s, l) { return 'hsl(' + h + ',' + s + '%,' + l + '%)'; }

function animate(time) {
  const t = time * 0.001;
  const positions = seeds.map(s => getSeedPos(s, t));
  const imgData = offCtx.createImageData(offW, offH);
  const data = imgData.data;

  for (let py = 0; py < offH; py++) {
    for (let px = 0; px < offW; px++) {
      const wx = px * scale;
      const wy = py * scale;
      let minD = Infinity, closest = 0, secondD = Infinity;

      for (let i = 0; i < 12; i++) {
        const dx = wx - positions[i].x;
        const dy = wy - positions[i].y;
        const d = dx * dx + dy * dy;
        if (d < minD) { secondD = minD; closest = i; minD = d; }
        else if (d < secondD) { secondD = d; }
      }

      const s = seeds[closest];
      const sat = s.satisfaction;
      const edgeFactor = 1 - Math.min(1, (secondD - minD) / (scale * scale * 80));
      const idx = (py * offW + px) * 4;

      // Check if this pixel is on a border between matched pairs
      let isMatchBorder = false;
      if (edgeFactor > 0.7) {
        for (const [a, b] of matchPairs) {
          if (closest === a || closest === b) {
            // Check if the second-closest is the match partner
            let second = -1;
            let sMinD = Infinity;
            for (let i = 0; i < 12; i++) {
              if (i === closest) continue;
              const dx = wx - positions[i].x;
              const dy = wy - positions[i].y;
              const d = dx * dx + dy * dy;
              if (d < sMinD) { sMinD = d; second = i; }
            }
            if ((closest === a && second === b) || (closest === b && second === a)) {
              isMatchBorder = true;
            }
            break;
          }
        }
      }

      if (isMatchBorder && edgeFactor > 0.8) {
        // Golden border for matched pairs
        const glow = edgeFactor * 255;
        data[idx] = glow;
        data[idx+1] = glow * 0.85;
        data[idx+2] = glow * 0.2;
        data[idx+3] = 255;
      } else if (edgeFactor > 0.85) {
        // Bright cell border
        const brightness = edgeFactor * 180;
        data[idx] = brightness;
        data[idx+1] = brightness;
        data[idx+2] = brightness;
        data[idx+3] = 255;
      } else {
        let r, g, b;
        if (s.isStudent) {
          // Blue spectrum, brightness by satisfaction
          const lum = 0.15 + sat * 0.45;
          r = lum * 80;
          g = lum * 140;
          b = lum * 255;
        } else {
          // Pink spectrum
          const lum = 0.15 + sat * 0.45;
          r = lum * 255;
          g = lum * 100;
          b = lum * 180;
        }
        data[idx] = r;
        data[idx+1] = g;
        data[idx+2] = b;
        data[idx+3] = 255;
      }
    }
  }

  offCtx.putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(offCanvas, 0, 0, W, H);

  // Draw seed points as glowing circles
  for (let i = 0; i < 12; i++) {
    const p = positions[i];
    const s = seeds[i];
    const radius = 8;

    // Glow
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius * 3);
    if (s.isStudent) {
      grad.addColorStop(0, 'rgba(100,180,255,0.9)');
      grad.addColorStop(0.5, 'rgba(60,120,255,0.3)');
      grad.addColorStop(1, 'rgba(60,120,255,0)');
    } else {
      grad.addColorStop(0, 'rgba(255,130,200,0.9)');
      grad.addColorStop(0.5, 'rgba(255,80,180,0.3)');
      grad.addColorStop(1, 'rgba(255,80,180,0)');
    }
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, radius * 3, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = s.isStudent ? '#64b5f6' : '#f48fb1';
    ctx.beginPath();
    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw match lines between paired seeds
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  for (const [a, b] of matchPairs) {
    const pa = positions[a], pb = positions[b];
    ctx.strokeStyle = 'rgba(255,215,0,0.4)';
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Slowly vary satisfaction over time
  for (let i = 0; i < 12; i++) {
    seeds[i].satisfaction = 0.5 + 0.5 * Math.sin(t * 0.3 + i * 1.2);
  }

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
