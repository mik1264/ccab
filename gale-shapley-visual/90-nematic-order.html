<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nematic Order Parameter — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; }
    body { background:#0d1117; overflow:hidden; }
    canvas#c { position:fixed; top:0; left:0; width:100vw; height:100vh; display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; font-family:'Nunito',sans-serif; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); font-family:'Nunito',sans-serif; }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Nematic Order Parameter</h2><p>The order parameter S of a liquid crystal phase transition encodes matching stability. S=1 is perfect order (stable matching); S=0 is disorder (no matching).</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);
    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0.0,1.0); }`;
    function mkShader(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(sh));return sh;}
    function mkProg(fs){const pr=gl.createProgram();gl.attachShader(pr,mkShader(gl.VERTEX_SHADER,VS));gl.attachShader(pr,mkShader(gl.FRAGMENT_SHADER,fs));gl.linkProgram(pr);return pr;}
    const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

    const FS = `
    precision highp float;
    uniform vec2 u_res;
    uniform float u_time;

    #define PI 3.14159265

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f*f*(3.0-2.0*f);
      return mix(
        mix(hash(i), hash(i+vec2(1,0)), f.x),
        mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x),
        f.y
      );
    }

    float fbm(vec2 p) {
      float v = 0.0, a = 0.5;
      mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
      for(int i = 0; i < 6; i++) {
        v += a * noise(p);
        p = rot * p * 2.0;
        a *= 0.5;
      }
      return v;
    }

    vec3 hsv2rgb(vec3 c) {
      vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
      vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
      return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
    }

    void main() {
      vec2 uv = (gl_FragCoord.xy - 0.5*u_res) / u_res.y;
      float t = u_time;

      // Phase transition: disorder (t=0) -> order (t=10s)
      // Cycle every 15 seconds
      float phase = mod(t, 15.0);
      float orderParam = smoothstep(0.0, 10.0, phase); // S goes 0 -> ~0.95

      // Spatial variation of order parameter using FBM
      float spatialNoise = fbm(uv * 3.0 + t * 0.05);
      float spatialNoise2 = fbm(uv * 5.0 + vec2(100.0) + t * 0.08);

      // Local order parameter S(x,y)
      float S = orderParam * (0.6 + 0.4 * spatialNoise);

      // Add domain boundaries where S drops
      float boundary = abs(fbm(uv * 4.0 + t * 0.03) - 0.5) * 2.0;
      boundary = smoothstep(0.0, 0.15, boundary);
      S *= mix(0.3, 1.0, boundary);

      // Clamp S
      S = clamp(S, 0.0, 0.98);

      // Director angle (smooth in ordered regions, random in disordered)
      float orderedAngle = fbm(uv * 2.0 + t * 0.02) * PI;
      float disorderedAngle = noise(uv * 20.0 + t * 2.0) * PI * 2.0;
      float theta = mix(disorderedAngle, orderedAngle, S);

      // Visualization
      vec3 col;

      // High-S regions: smooth pastel blues (stable matching)
      vec3 orderedCol = hsv2rgb(vec3(
        0.55 + 0.05 * sin(theta * 2.0), // blue hue
        0.3 + 0.2 * S,
        0.4 + 0.4 * S
      ));

      // Low-S regions: rainbow flickering (unstable/no matching)
      float flickerHue = noise(uv * 15.0 + t * 3.0);
      vec3 disorderedCol = hsv2rgb(vec3(
        flickerHue,
        0.6 + 0.4 * noise(uv * 10.0 + t * 5.0),
        0.3 + 0.3 * noise(uv * 8.0 + t * 4.0)
      ));

      col = mix(disorderedCol, orderedCol, S);

      // Defect lines at domain boundaries
      float defectLine = 1.0 - boundary;
      defectLine = smoothstep(0.5, 0.8, defectLine);
      vec3 defectCol = vec3(1.0, 0.8, 0.3);
      col = mix(col, defectCol, defectLine * 0.5 * orderParam);

      // Schlieren texture in ordered regions
      float schlieren = abs(cos(2.0 * theta));
      col *= 0.7 + 0.3 * mix(1.0, schlieren, S * 0.8);

      // Phase boundary animation (expanding ordered domains)
      float expandFront = length(uv) - orderParam * 0.8;
      float frontGlow = exp(-expandFront * expandFront * 20.0) * 0.3;
      col += vec3(0.3, 0.5, 1.0) * frontGlow * (1.0 - orderParam);

      // Add subtle directional texture lines in ordered regions
      float dirLines = sin(uv.x * 60.0 * cos(theta) + uv.y * 60.0 * sin(theta));
      dirLines = smoothstep(-0.3, 0.3, dirLines);
      col = mix(col, col * 1.15, dirLines * S * 0.2);

      // Vignette
      float vig = 1.0 - dot(uv, uv) * 0.5;
      col *= vig;

      col = pow(col, vec3(0.4545));
      gl_FragColor = vec4(col, 1.0);
    }
    `;

    const prog = mkProg(FS);
    gl.useProgram(prog);
    const loc_p = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc_p);
    gl.vertexAttribPointer(loc_p, 2, gl.FLOAT, false, 0, 0);
    const loc_res = gl.getUniformLocation(prog, 'u_res');
    const loc_time = gl.getUniformLocation(prog, 'u_time');

    function frame(t) {
      gl.uniform2f(loc_res, canvas.width, canvas.height);
      gl.uniform1f(loc_time, t * 0.001);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
