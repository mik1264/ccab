<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gray-Scott Reaction Diffusion — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Gray-Scott Reaction Diffusion</h2><p>Gray-Scott reaction-diffusion — a classic pattern-formation model. Feed rate and kill rate are tuned to each stable matching, producing unique living textures.</p></div>
  <canvas id="c"></canvas>
  <script>
    // Gray-Scott Reaction Diffusion using Canvas2D (more reliable than texture ping-pong in WebGL1)
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const W = 256, H = 256;
    canvas.width = innerWidth;
    canvas.height = innerHeight;

    // RD grid
    let u = new Float32Array(W * H);
    let v = new Float32Array(W * H);
    let u2 = new Float32Array(W * H);
    let v2 = new Float32Array(W * H);

    // Parameters: spots pattern
    const Du = 0.16, Dv = 0.08;
    const f = 0.055, k = 0.062;
    const dt = 1.0;

    // Initialize: U=1 everywhere, V=0 except seed dots at stable match positions
    function init() {
      u.fill(1.0);
      v.fill(0.0);

      // 5 stable match pair seed positions (in grid coordinates)
      const seeds = [
        [W * 0.25, H * 0.3],
        [W * 0.6, H * 0.2],
        [W * 0.4, H * 0.55],
        [W * 0.75, H * 0.5],
        [W * 0.5, H * 0.8],
        [W * 0.2, H * 0.7]
      ];

      for (let s = 0; s < seeds.length; s++) {
        const cx = Math.floor(seeds[s][0]);
        const cy = Math.floor(seeds[s][1]);
        const r = 4;
        for (let dy = -r; dy <= r; dy++) {
          for (let dx = -r; dx <= r; dx++) {
            const x = (cx + dx + W) % W;
            const y = (cy + dy + H) % H;
            if (dx * dx + dy * dy <= r * r) {
              const idx = y * W + x;
              u[idx] = 0.5 + Math.random() * 0.1;
              v[idx] = 0.25 + Math.random() * 0.1;
            }
          }
        }
      }
    }
    init();

    function step() {
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const idx = y * W + x;
          const xp = ((x + 1) % W);
          const xm = ((x - 1 + W) % W);
          const yp = ((y + 1) % H);
          const ym = ((y - 1 + H) % H);

          // Laplacian
          const lapU = u[y * W + xp] + u[y * W + xm] + u[yp * W + x] + u[ym * W + x] - 4.0 * u[idx];
          const lapV = v[y * W + xp] + v[y * W + xm] + v[yp * W + x] + v[ym * W + x] - 4.0 * v[idx];

          const uVal = u[idx];
          const vVal = v[idx];
          const uvv = uVal * vVal * vVal;

          u2[idx] = uVal + (Du * lapU - uvv + f * (1.0 - uVal)) * dt;
          v2[idx] = vVal + (Dv * lapV + uvv - (f + k) * vVal) * dt;
        }
      }
      // Swap
      let tmp = u; u = u2; u2 = tmp;
      tmp = v; v = v2; v2 = tmp;
    }

    const imgData = ctx.createImageData(W, H);

    function render() {
      // Run multiple steps per frame for speed
      for (let i = 0; i < 8; i++) step();

      // Render to image data
      for (let i = 0; i < W * H; i++) {
        const uVal = u[i];
        const vVal = v[i];

        // Color: U as blue-black, V as yellow spots
        const r = Math.floor(Math.min(255, vVal * 400));
        const g = Math.floor(Math.min(255, vVal * 350));
        const b = Math.floor(Math.min(255, (1.0 - uVal) * 150 + vVal * 100));

        imgData.data[i * 4] = r;
        imgData.data[i * 4 + 1] = g;
        imgData.data[i * 4 + 2] = b;
        imgData.data[i * 4 + 3] = 255;
      }

      // Draw scaled up
      const offscreen = document.createElement('canvas');
      offscreen.width = W;
      offscreen.height = H;
      offscreen.getContext('2d').putImageData(imgData, 0, 0);

      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(offscreen, 0, 0, canvas.width, canvas.height);

      requestAnimationFrame(render);
    }

    window.addEventListener('resize', () => {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    });

    requestAnimationFrame(render);
  </script>
</body>
</html>
