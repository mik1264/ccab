<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firefly Synchronization — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Nunito', sans-serif; }
    .back-link { position: fixed; top: 16px; left: 16px; background: rgba(22,27,34,0.9); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; transition: background 0.2s; }
    .back-link:hover { background: #30363d; }
    .info { position: fixed; top: 60px; left: 16px; background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 10px; padding: 12px 16px; z-index: 50; max-width: 280px; backdrop-filter: blur(8px); }
    .info h2 { font-family: 'Lora', serif; font-size: 15px; color: #58a6ff; margin-bottom: 4px; }
    .info p { font-size: 12px; color: #8b949e; line-height: 1.4; }
    .sync-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 10px; padding: 10px 20px; z-index: 50; backdrop-filter: blur(8px); width: 300px; text-align: center; }
    .sync-bar label { font-size: 11px; color: #8b949e; display: block; margin-bottom: 4px; }
    .sync-bar .bar-bg { background: #21262d; border-radius: 6px; height: 8px; overflow: hidden; }
    .sync-bar .bar-fill { background: linear-gradient(90deg, #58a6ff, #3fb950); height: 100%; border-radius: 6px; transition: width 0.3s; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info">
    <h2>Firefly Synchronization</h2>
    <p>Matched fireflies synchronize their flashing. The stable matching emerges as clusters of perfectly synchronized light -- a natural analog of Gale-Shapley.</p>
  </div>
  <div class="sync-bar">
    <label>Synchronization</label>
    <div class="bar-bg"><div class="bar-fill" id="syncFill" style="width:0%"></div></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N_PER_SIDE = 15;
    let fireflies = [];
    let menPrefs = [], womenPrefs = [];
    let stableMatches = []; // {m, w}
    let algorithmDone = false;
    let syncLevel = 0;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(RGB);
      initSim();
    }

    function shuffleArr(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initSim() {
      fireflies = [];
      stableMatches = [];
      algorithmDone = false;
      syncLevel = 0;
      menPrefs = [];
      womenPrefs = [];

      for (let i = 0; i < N_PER_SIDE; i++) {
        menPrefs.push(shuffleArr(Array.from({length: N_PER_SIDE}, (_, k) => k)));
        womenPrefs.push(shuffleArr(Array.from({length: N_PER_SIDE}, (_, k) => k)));
      }

      // Blue fireflies (men)
      for (let i = 0; i < N_PER_SIDE; i++) {
        fireflies.push({
          x: random(width), y: random(height),
          vx: random(-1, 1), vy: random(-1, 1),
          phase: random(TWO_PI),
          naturalFreq: 0.03 + random(0.02),
          type: 'M', id: i,
          color: [80 + random(30), 150 + random(50), 255],
          matchedTo: -1,
          size: 4 + random(3)
        });
      }
      // Yellow fireflies (women)
      for (let i = 0; i < N_PER_SIDE; i++) {
        fireflies.push({
          x: random(width), y: random(height),
          vx: random(-1, 1), vy: random(-1, 1),
          phase: random(TWO_PI),
          naturalFreq: 0.03 + random(0.02),
          type: 'W', id: i,
          color: [255, 220 + random(35), 50 + random(50)],
          matchedTo: -1,
          size: 4 + random(3)
        });
      }

      // Run DA algorithm after 1 second
      setTimeout(runDA, 1000);
    }

    function getFirefly(type, id) {
      return fireflies.find(f => f.type === type && f.id === id);
    }

    function runDA() {
      let menNext = new Array(N_PER_SIDE).fill(0);
      let womenCurrent = new Array(N_PER_SIDE).fill(-1);
      let menFree = new Array(N_PER_SIDE).fill(true);

      let changed = true;
      while (changed) {
        changed = false;
        for (let m = 0; m < N_PER_SIDE; m++) {
          if (!menFree[m] || menNext[m] >= N_PER_SIDE) continue;
          let w = menPrefs[m][menNext[m]];
          menNext[m]++;
          changed = true;
          if (womenCurrent[w] === -1) {
            womenCurrent[w] = m;
            menFree[m] = false;
          } else {
            let curM = womenCurrent[w];
            if (womenPrefs[w].indexOf(m) < womenPrefs[w].indexOf(curM)) {
              womenCurrent[w] = m;
              menFree[m] = false;
              menFree[curM] = true;
            }
          }
        }
      }

      stableMatches = [];
      for (let w = 0; w < N_PER_SIDE; w++) {
        if (womenCurrent[w] !== -1) {
          let m = womenCurrent[w];
          stableMatches.push({m, w});
          let mF = getFirefly('M', m);
          let wF = getFirefly('W', w);
          mF.matchedTo = w;
          wF.matchedTo = m;
        }
      }
      algorithmDone = true;
    }

    function draw() {
      background(5, 8, 15, 35);

      // Gentle ambient particles
      noStroke();
      for (let i = 0; i < 3; i++) {
        fill(50, 80, 50, 3);
        let px = (noise(i * 100, frameCount * 0.001) * width * 1.2) - width * 0.1;
        let py = (noise(i * 200, frameCount * 0.001) * height * 1.2) - height * 0.1;
        ellipse(px, py, 200, 200);
      }

      // Kuramoto coupling for matched pairs
      if (algorithmDone) {
        let K = 0.02; // Coupling strength
        for (let sm of stableMatches) {
          let mF = getFirefly('M', sm.m);
          let wF = getFirefly('W', sm.w);
          let phaseDiff = wF.phase - mF.phase;
          mF.phase += K * sin(phaseDiff);
          wF.phase -= K * sin(phaseDiff);
        }
      }

      // Compute sync level
      if (algorithmDone && stableMatches.length > 0) {
        let totalSync = 0;
        for (let sm of stableMatches) {
          let mF = getFirefly('M', sm.m);
          let wF = getFirefly('W', sm.w);
          let phaseDiff = abs(mF.phase - wF.phase) % TWO_PI;
          if (phaseDiff > PI) phaseDiff = TWO_PI - phaseDiff;
          totalSync += 1 - (phaseDiff / PI);
        }
        syncLevel = lerp(syncLevel, totalSync / stableMatches.length, 0.05);
      }

      // Update fireflies
      for (let f of fireflies) {
        // Advance phase
        f.phase += f.naturalFreq;
        if (f.phase > TWO_PI) f.phase -= TWO_PI;

        // Random drift
        f.vx += random(-0.05, 0.05);
        f.vy += random(-0.05, 0.05);
        f.vx *= 0.99;
        f.vy *= 0.99;

        // Gentle attraction to matched partner
        if (f.matchedTo !== -1) {
          let partnerType = f.type === 'M' ? 'W' : 'M';
          let partner = getFirefly(partnerType, f.matchedTo);
          let dx = partner.x - f.x;
          let dy = partner.y - f.y;
          let d = sqrt(dx * dx + dy * dy) || 1;
          if (d > 80) {
            f.vx += (dx / d) * 0.03;
            f.vy += (dy / d) * 0.03;
          }
        }

        // Speed limit
        let spd = sqrt(f.vx * f.vx + f.vy * f.vy);
        if (spd > 1.5) { f.vx = (f.vx / spd) * 1.5; f.vy = (f.vy / spd) * 1.5; }

        f.x += f.vx;
        f.y += f.vy;

        // Soft bounds
        if (f.x < 30) f.vx += 0.1;
        if (f.x > width - 30) f.vx -= 0.1;
        if (f.y < 30) f.vy += 0.1;
        if (f.y > height - 30) f.vy -= 0.1;

        // Flash brightness (sine wave of phase)
        let brightness = max(0, sin(f.phase));
        let glowAlpha = brightness * brightness; // Sharper flash

        noStroke();

        // Outer glow
        let gr = f.size * 6 * glowAlpha;
        fill(f.color[0], f.color[1], f.color[2], 8 * glowAlpha);
        ellipse(f.x, f.y, gr * 2, gr * 2);
        fill(f.color[0], f.color[1], f.color[2], 20 * glowAlpha);
        ellipse(f.x, f.y, gr, gr);

        // Core
        fill(f.color[0], f.color[1], f.color[2], 40 + 200 * glowAlpha);
        ellipse(f.x, f.y, f.size * 1.5, f.size * 1.5);

        // Hot center when flashing
        if (glowAlpha > 0.5) {
          fill(255, 255, 255, 150 * glowAlpha);
          ellipse(f.x, f.y, f.size * 0.6, f.size * 0.6);
        }
      }

      // Draw faint lines between matched pairs
      if (algorithmDone) {
        for (let sm of stableMatches) {
          let mF = getFirefly('M', sm.m);
          let wF = getFirefly('W', sm.w);
          let mBright = max(0, sin(mF.phase));
          let wBright = max(0, sin(wF.phase));
          let lineAlpha = min(mBright, wBright) * 40;
          if (lineAlpha > 5) {
            stroke(150, 220, 150, lineAlpha);
            strokeWeight(0.5);
            line(mF.x, mF.y, wF.x, wF.y);
          }
        }
      }

      // Update sync bar
      let fillEl = document.getElementById('syncFill');
      if (fillEl) {
        fillEl.style.width = (syncLevel * 100).toFixed(1) + '%';
      }

      // Status
      noStroke();
      fill(255, 160);
      textAlign(RIGHT, TOP);
      textSize(13);
      text(algorithmDone
        ? 'Sync: ' + (syncLevel * 100).toFixed(0) + '%'
        : 'Finding matches...', width - 20, 20);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
