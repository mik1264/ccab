<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Sculpture</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'Nunito',sans-serif; overflow:hidden; }
.back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
.back-link:hover { background:#30363d; }
.info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
.info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
.info p { font-size:12px; color:#8b949e; line-height:1.4; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Visual Gallery</a>
<div class="info">
<h2>Data Sculpture</h2>
<p>The preference matrix becomes a 3D data sculpture — bar chart in 3D space where bar height = preference rank reciprocal. Matched pairs are the tallest adjacent bars.</p>
</div>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
camera.position.set(6, 5, 8);
camera.lookAt(0, 0, 0);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x0d1117);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const N = 5;

// Generate preferences
function shuffle(a) { let b=[...a]; for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
const menPrefs = [];
const womenPrefs = [];
for (let i = 0; i < N; i++) {
    menPrefs.push(shuffle([0,1,2,3,4]));
    womenPrefs.push(shuffle([0,1,2,3,4]));
}

// Gale-Shapley
function galeShapley() {
    let mp = Array(N).fill(-1), wp = Array(N).fill(-1), mn = Array(N).fill(0);
    let free = [...Array(N).keys()];
    while (free.length) {
        let m = free[0], w = menPrefs[m][mn[m]]; mn[m]++;
        if (wp[w]===-1){mp[m]=w;wp[w]=m;free.shift();}
        else{let c=wp[w];if(womenPrefs[w].indexOf(m)<womenPrefs[w].indexOf(c)){mp[m]=w;wp[w]=m;mp[c]=-1;free.shift();free.push(c);}}
    }
    return mp;
}
const stable = galeShapley();

// Create bars
const bars = [];
const barGroup = new THREE.Group();
const spacing = 1.3;
const maxBarHeight = 3;

for (let m = 0; m < N; m++) {
    for (let w = 0; w < N; w++) {
        const rank = menPrefs[m].indexOf(w) + 1; // 1 to N
        const targetHeight = maxBarHeight * (1 / rank);
        const isMatched = stable[m] === w;

        const geo = new THREE.BoxGeometry(0.8, 0.01, 0.8);
        let mat;
        if (isMatched) {
            mat = new THREE.MeshPhongMaterial({
                color: 0xffd700,
                emissive: 0x886600,
                emissiveIntensity: 0.3,
                shininess: 100
            });
        } else {
            // Blue gradient by rank
            const intensity = 1 - (rank - 1) / N;
            const r = 0.1 * intensity;
            const g = 0.3 + 0.3 * intensity;
            const b = 0.6 + 0.4 * intensity;
            mat = new THREE.MeshPhongMaterial({
                color: new THREE.Color(r, g, b),
                shininess: 40
            });
        }

        const mesh = new THREE.Mesh(geo, mat);
        const x = (m - (N-1)/2) * spacing;
        const z = (w - (N-1)/2) * spacing;
        mesh.position.set(x, 0, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        barGroup.add(mesh);

        bars.push({
            mesh, targetHeight, currentHeight: 0.01,
            x, z, isMatched, delay: (m + w) * 0.1
        });

        // Glow for matched
        if (isMatched) {
            const glowGeo = new THREE.BoxGeometry(0.9, 0.01, 0.9);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0xffd700, transparent: true, opacity: 0.15
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            glow.position.set(x, 0, z);
            barGroup.add(glow);
            mesh.userData.glow = glow;
        }
    }
}

scene.add(barGroup);

// Floor grid
const gridHelper = new THREE.GridHelper(10, 20, 0x1a2030, 0x141a24);
gridHelper.position.y = -0.05;
scene.add(gridHelper);

// Axis labels using simple planes with text
function createLabel(text, position, color) {
    const canvas2 = document.createElement('canvas');
    canvas2.width = 128; canvas2.height = 48;
    const ctx = canvas2.getContext('2d');
    ctx.font = '600 24px Nunito';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.fillText(text, 64, 32);
    const tex = new THREE.CanvasTexture(canvas2);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
    const sprite = new THREE.Sprite(mat);
    sprite.position.copy(position);
    sprite.scale.set(1.5, 0.6, 1);
    scene.add(sprite);
}

createLabel('Men (M1-M5)', new THREE.Vector3(0, -0.5, (N/2+1)*spacing), '#58a6ff');
createLabel('Women (W1-W5)', new THREE.Vector3((N/2+1)*spacing, -0.5, 0), '#d2a8ff');

// Lighting
scene.add(new THREE.AmbientLight(0x334466, 0.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
scene.add(dirLight);
const pointLight = new THREE.PointLight(0xffd700, 0.3, 15);
pointLight.position.set(0, 4, 0);
scene.add(pointLight);

let t = 0;
let growStart = 0;
let growing = true;

function animate() {
    requestAnimationFrame(animate);
    t += 0.016;

    // Grow bars
    if (growing) {
        growStart += 0.016;
    }

    bars.forEach(bar => {
        const elapsed = Math.max(0, growStart - bar.delay);
        const progress = Math.min(1, elapsed / 1.5);
        const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic

        bar.currentHeight = 0.01 + bar.targetHeight * eased;
        bar.mesh.scale.y = bar.currentHeight / 0.01;
        bar.mesh.position.y = bar.currentHeight / 2;

        if (bar.isMatched && bar.mesh.userData.glow) {
            bar.mesh.userData.glow.scale.y = bar.currentHeight / 0.01;
            bar.mesh.userData.glow.position.y = bar.currentHeight / 2;
            // Pulse glow
            bar.mesh.userData.glow.material.opacity = 0.1 + 0.08 * Math.sin(t * 3);
        }

        // Matched bars shimmer
        if (bar.isMatched) {
            bar.mesh.material.emissiveIntensity = 0.3 + 0.15 * Math.sin(t * 2 + bar.x);
        }
    });

    // Slow camera orbit
    const camAngle = t * 0.15;
    const camDist = 10;
    camera.position.x = Math.cos(camAngle) * camDist;
    camera.position.z = Math.sin(camAngle) * camDist;
    camera.position.y = 5 + Math.sin(t * 0.2) * 0.5;
    camera.lookAt(0, 1, 0);

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
