<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Shader</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; overflow: hidden; }
canvas { display: block; }
.back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; transition: background 0.2s; }
.back:hover { background: #30363d; }
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const gl = canvas.getContext('webgl');
if (!gl) { document.body.innerHTML += '<p style="color:red;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)">WebGL not supported</p>'; }

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);

const VS = `
attribute vec2 pos;
void main() {
  gl_Position = vec4(pos, 0.0, 1.0);
}`;

const FS = `
precision mediump float;
uniform float time;
uniform vec2 resolution;
float noise(vec2 p) {
  return sin(p.x * 3.7 + time * 0.1) * cos(p.y * 2.9 + time * 0.15) * 0.5 +
         sin(p.x * 1.3 - p.y * 2.1 + time * 0.08) * 0.3 +
         cos(p.x * 5.1 + p.y * 4.3 - time * 0.12) * 0.2;
}
void main() {
  vec2 uv = gl_FragCoord.xy / resolution;
  float n = noise(uv * 2.0);
  n += noise(uv * 4.0) * 0.5;
  n += noise(uv * 8.0) * 0.25;
  n = n * 0.5 + 0.5;
  float c1 = 1.0 - smoothstep(0.0, 0.4, length(uv - vec2(0.3, 0.6)));
  float c2 = 1.0 - smoothstep(0.0, 0.35, length(uv - vec2(0.7, 0.4)));
  float glow = (c1 + c2) * 0.5;
  vec3 col = vec3(n * 0.1, n * 0.4 + glow * 0.3, n * 0.8 + glow * 0.6);
  col += vec3(glow * 0.2, glow * 0.1, glow * 0.5);
  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
}`;

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'time');
const uRes = gl.getUniformLocation(prog, 'resolution');

const t0 = performance.now();
function frame() {
  const t = (performance.now() - t0) * 0.001;
  gl.uniform1f(uTime, t);
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
