<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nebula Star Formation — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Nebula Star Formation</h2><p>A nebula where star formation follows the Gale-Shapley algorithm. Clouds of gas collapse into pairs of binary stars — matching through gravity.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0,0,innerWidth,innerHeight); }
    resize(); window.addEventListener('resize', resize);

    function mkShader(type, src) {
      const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
      return s;
    }
    function mkProg(vs, fs) {
      const p = gl.createProgram();
      gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
      gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(p); return p;
    }

    const VS = `attribute vec2 p; void main(){ gl_Position=vec4(p,0,1); }`;

    const FS = `
    precision mediump float;
    uniform float u_time;
    uniform vec2 u_res;

    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }

    // Fractal Brownian Motion
    float fbm(vec2 p) {
      float value = 0.0;
      float amplitude = 0.5;
      float frequency = 1.0;
      for (int i = 0; i < 6; i++) {
        value += amplitude * noise(p * frequency);
        frequency *= 2.0;
        amplitude *= 0.5;
      }
      return value;
    }

    // Domain-warped FBM for more organic look
    float warpedFBM(vec2 p, float t) {
      vec2 q = vec2(
        fbm(p + vec2(0.0, 0.0) + t * 0.04),
        fbm(p + vec2(5.2, 1.3) - t * 0.03)
      );
      vec2 r = vec2(
        fbm(p + 4.0 * q + vec2(1.7, 9.2) + t * 0.02),
        fbm(p + 4.0 * q + vec2(8.3, 2.8) - t * 0.01)
      );
      return fbm(p + 4.0 * r);
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      float aspect = u_res.x / u_res.y;
      vec2 p = (uv - 0.5) * vec2(aspect, 1.0);
      float t = u_time;

      // Deep space background
      vec3 col = vec3(0.01, 0.01, 0.03);

      // Background stars
      float starField = hash(floor(uv * 300.0));
      if (starField > 0.997) {
        float twinkle = 0.5 + 0.5 * sin(t * 3.0 + starField * 200.0);
        col += vec3(0.4, 0.5, 0.6) * twinkle;
      }

      // Nebula gas clouds (warped FBM)
      float gas1 = warpedFBM(p * 2.0, t);
      float gas2 = warpedFBM(p * 2.0 + vec2(10.0, 5.0), t * 0.7);
      float gas3 = fbm(p * 3.0 + t * 0.05);

      // Purple/blue nebula base
      col += vec3(0.15, 0.05, 0.25) * gas1 * 0.8;
      // Orange/red emission
      col += vec3(0.3, 0.08, 0.02) * gas2 * 0.6;
      // Cyan wisps
      col += vec3(0.02, 0.15, 0.2) * gas3 * 0.4;

      // 6 density peaks (men - gas clouds collapsing)
      for (int i = 0; i < 6; i++) {
        float fi = float(i);
        vec2 cloudPos = vec2(
          cos(fi * 1.047 + 0.5) * 0.35,
          sin(fi * 1.2 + 0.3) * 0.3
        );
        // Spiral inward over time
        float spiral = t * 0.03 * (1.0 + fi * 0.1);
        cloudPos *= 1.0 - clamp(spiral * 0.1, 0.0, 0.3);
        cloudPos += vec2(cos(spiral + fi), sin(spiral + fi * 1.3)) * 0.02;

        float d = distance(p, cloudPos);
        float density = exp(-d * d * 15.0);

        // Gas cloud with noise
        float cloudNoise = fbm(p * 5.0 + cloudPos * 10.0 + t * 0.03);
        density *= 0.5 + cloudNoise;

        col += vec3(0.2, 0.1, 0.3) * density * 0.5;
      }

      // 6 bright cores (women - proto-stars)
      for (int i = 0; i < 6; i++) {
        float fi = float(i);
        vec2 corePos = vec2(
          cos(fi * 1.047 + 2.0) * 0.3,
          sin(fi * 1.1 + 1.5) * 0.28
        );
        // Converge toward matched partner
        vec2 partnerPos = vec2(
          cos(fi * 1.047 + 0.5) * 0.35,
          sin(fi * 1.2 + 0.3) * 0.3
        );
        float convergence = clamp(t * 0.03, 0.0, 0.6);
        corePos = mix(corePos, (corePos + partnerPos) * 0.5, convergence);

        float d = distance(p, corePos);

        // Bright star core
        float glow = exp(-d * d * 500.0);
        col += vec3(0.8, 0.9, 1.0) * glow;

        // Surrounding halo
        float halo = exp(-d * d * 50.0);
        col += vec3(0.2, 0.4, 0.6) * halo * 0.4;

        // Filaments connecting matched pairs
        vec2 matchPartner = vec2(
          cos(fi * 1.047 + 0.5) * 0.35 * (1.0 - clamp(t * 0.003, 0.0, 0.3)),
          sin(fi * 1.2 + 0.3) * 0.3 * (1.0 - clamp(t * 0.003, 0.0, 0.3))
        );
        // Distance from line segment
        vec2 ab = matchPartner - corePos;
        float abLen = length(ab);
        if (abLen > 0.01) {
          vec2 abn = ab / abLen;
          float proj = clamp(dot(p - corePos, abn), 0.0, abLen);
          vec2 closest = corePos + abn * proj;
          float lineDist = distance(p, closest);
          float filament = exp(-lineDist * lineDist * 800.0) * convergence;
          // Add noise to filament
          float filNoise = fbm(p * 15.0 + t * 0.1 + fi);
          filament *= 0.5 + filNoise;
          col += vec3(0.4, 0.6, 0.9) * filament * 0.5;
        }
      }

      // Dust lanes (dark absorption)
      float dust = fbm(p * 4.0 + vec2(20.0, 10.0) + t * 0.01);
      dust = smoothstep(0.4, 0.6, dust);
      col *= 1.0 - dust * 0.3;

      // Subtle overall glow
      float centerGlow = exp(-dot(p, p) * 2.0);
      col += vec3(0.05, 0.02, 0.08) * centerGlow;

      // Tone mapping
      col = col / (1.0 + col);

      // Vignette
      float vig = 1.0 - 0.4 * length(uv - 0.5);
      col *= vig;

      gl_FragColor = vec4(col, 1.0);
    }`;

    const prog = mkProg(VS, FS);
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    const pLoc = gl.getAttribLocation(prog, 'p');
    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uRes = gl.getUniformLocation(prog, 'u_res');

    gl.useProgram(prog);
    gl.enableVertexAttribArray(pLoc);
    gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

    function frame(t) {
      gl.uniform1f(uTime, t * 0.001);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
