<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growth Algorithm — Matching Algorithms Visual Gallery</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:sans-serif; }
    canvas { display:block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); color:#8b949e; font-size:12px; line-height:1.4; }
    .info h2 { font-size:15px; color:#58a6ff; margin-bottom:4px; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div class="info">
    <h2>Growth Algorithm</h2>
    <p>16 seeds grow organically toward preferred partners. Compatible regions merge into gold. Blocking pairs repel with red flashes.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 8;
    const GRID_SIZE = 200;
    let grid;
    let seeds = [];
    let cellSize;
    let matching = [];
    let studentPrefs = [], schoolPrefs = [];
    let mergedCells = [];
    let flashes = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      cellSize = Math.max(Math.floor(Math.min(width, height) / GRID_SIZE), 1);
      initMatching();
      initGrid();
    }

    function initMatching() {
      studentPrefs = [];
      schoolPrefs = [];
      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffled(N));
        schoolPrefs.push(shuffled(N));
      }
      let sNext = new Array(N).fill(0);
      let schCur = new Array(N).fill(-1);
      for (let r = 0; r < N * N; r++) {
        let free = [];
        for (let s = 0; s < N; s++) {
          let m = false;
          for (let c = 0; c < N; c++) if (schCur[c] === s) { m = true; break; }
          if (!m && sNext[s] < N) free.push(s);
        }
        if (free.length === 0) break;
        for (let s of free) {
          let sch = studentPrefs[s][sNext[s]];
          sNext[s]++;
          if (schCur[sch] === -1) {
            schCur[sch] = s;
          } else {
            let cur = schCur[sch];
            if (schoolPrefs[sch].indexOf(s) < schoolPrefs[sch].indexOf(cur)) {
              schCur[sch] = s;
            }
          }
        }
      }
      matching = new Array(N).fill(-1);
      for (let sch = 0; sch < N; sch++) {
        if (schCur[sch] !== -1) matching[schCur[sch]] = sch;
      }
    }

    function shuffled(n) {
      let a = [...Array(n).keys()];
      for (let i = n - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function initGrid() {
      grid = [];
      mergedCells = [];
      for (let y = 0; y < GRID_SIZE; y++) {
        grid.push(new Array(GRID_SIZE).fill(-1));
        mergedCells.push(new Array(GRID_SIZE).fill(false));
      }

      seeds = [];
      for (let i = 0; i < N; i++) {
        let sx = Math.floor(GRID_SIZE * 0.1 + Math.random() * GRID_SIZE * 0.8);
        let sy = Math.floor(GRID_SIZE * 0.08 + Math.random() * GRID_SIZE * 0.35);
        seeds.push({ id: i, x: sx, y: sy, type: 'student', frontier: [{ x: sx, y: sy }] });
        grid[sy][sx] = i;

        let cx = Math.floor(GRID_SIZE * 0.1 + Math.random() * GRID_SIZE * 0.8);
        let cy = Math.floor(GRID_SIZE * 0.55 + Math.random() * GRID_SIZE * 0.35);
        seeds.push({ id: N + i, x: cx, y: cy, type: 'school', frontier: [{ x: cx, y: cy }] });
        grid[cy][cx] = N + i;
      }
    }

    function growStep() {
      for (let seed of seeds) {
        if (seed.frontier.length === 0) continue;
        let newFrontier = [];
        let growCount = Math.min(seed.frontier.length, 3);

        for (let g = 0; g < growCount; g++) {
          if (seed.frontier.length === 0) break;
          let idx = Math.floor(Math.random() * seed.frontier.length);
          let cell = seed.frontier[idx];
          seed.frontier.splice(idx, 1);

          let dirs = [[-1,0],[1,0],[0,-1],[0,1]];
          for (let d of dirs) {
            let nx = cell.x + d[0];
            let ny = cell.y + d[1];
            if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) continue;

            if (grid[ny][nx] === -1) {
              grid[ny][nx] = seed.id;
              newFrontier.push({ x: nx, y: ny });
            } else if (grid[ny][nx] !== seed.id && !mergedCells[ny][nx]) {
              let other = grid[ny][nx];
              let isStudent = seed.id < N;
              let isOtherStudent = other < N;

              if (isStudent !== isOtherStudent) {
                let sId = isStudent ? seed.id : other;
                let schId = isStudent ? other - N : seed.id - N;
                if (matching[sId] === schId) {
                  mergedCells[ny][nx] = true;
                  mergedCells[cell.y][cell.x] = true;
                } else {
                  flashes.push({ x: nx, y: ny, life: 15 });
                }
              }
            }
          }
        }
        seed.frontier = seed.frontier.concat(newFrontier);
      }
    }

    function draw() {
      background(13, 17, 23);

      for (let i = 0; i < 8; i++) growStep();

      let ox = (width - GRID_SIZE * cellSize) / 2;
      let oy = (height - GRID_SIZE * cellSize) / 2;

      noStroke();
      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          let val = grid[y][x];
          if (val === -1) continue;

          let px = Math.floor(ox + x * cellSize);
          let py = Math.floor(oy + y * cellSize);

          if (mergedCells[y][x]) {
            fill(42, 85, 90, 85);
          } else if (val < N) {
            fill(210 + val * 5, 50, 55, 60);
          } else {
            fill(130 + (val - N) * 8, 45, 50, 60);
          }
          rect(px, py, cellSize, cellSize);
        }
      }

      // Flashes
      for (let i = flashes.length - 1; i >= 0; i--) {
        let f = flashes[i];
        let px = ox + f.x * cellSize;
        let py = oy + f.y * cellSize;
        let a = (f.life / 15) * 80;
        fill(0, 90, 90, a);
        let s = cellSize * (2 + (15 - f.life) * 0.3);
        ellipse(px, py, s, s);
        f.life--;
        if (f.life <= 0) flashes.splice(i, 1);
      }

      // Seed markers
      for (let seed of seeds) {
        let px = ox + seed.x * cellSize;
        let py = oy + seed.y * cellSize;
        fill(0, 0, 100, 90);
        ellipse(px, py, 8, 8);
        fill(0, 0, 100, 70);
        textAlign(CENTER, CENTER);
        textSize(8);
        if (seed.type === 'student') {
          text('S' + (seed.id + 1), px, py - 10);
        } else {
          text('C' + (seed.id - N + 1), px, py - 10);
        }
      }

      fill(0, 0, 70, 60);
      textAlign(RIGHT, TOP);
      textSize(12);
      text('Blue = Students | Green = Schools', width - 20, 20);
      fill(42, 85, 90, 70);
      text('Gold = Stable Matches', width - 20, 38);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      cellSize = Math.max(Math.floor(Math.min(width, height) / GRID_SIZE), 1);
    }
  </script>
</body>
</html>
