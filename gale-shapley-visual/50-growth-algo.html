<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Organic Growth Matching — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    canvas { display:block; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Organic Growth Matching</h2><p>The stable matching grows like a crystal or coral — agents are seeds; matched pairs branch toward each other following preference gradients.</p></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let seeds = [];
    let branches = []; // All branch tips for growth
    let grown = [];    // Settled branch points
    let walkers = [];  // Random walking particles
    let growthCanvas;
    let maxGrown = 8000;

    // Colors per matched pair
    let pairHues = [180, 300, 100, 40, 250];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      growthCanvas = createGraphics(width, height);
      growthCanvas.colorMode(HSB, 360, 100, 100, 100);
      growthCanvas.background(13, 17, 23);

      let cx = width / 2;
      let cy = height / 2;
      let radius = min(width, height) * 0.3;

      // Place 5 men and 5 women symmetrically
      for (let i = 0; i < 5; i++) {
        let manAngle = map(i, 0, 4, -PI * 0.7, PI * 0.7) + PI;
        let womanAngle = map(i, 0, 4, -PI * 0.7, PI * 0.7);

        let manSeed = {
          x: cx + cos(manAngle) * radius,
          y: cy + sin(manAngle) * radius * 0.65,
          isMan: true,
          pairIdx: i,
          hue: pairHues[i],
          targetX: cx + cos(womanAngle) * radius,
          targetY: cy + sin(womanAngle) * radius * 0.65
        };

        let womanSeed = {
          x: cx + cos(womanAngle) * radius,
          y: cy + sin(womanAngle) * radius * 0.65,
          isMan: false,
          pairIdx: i,
          hue: (pairHues[i] + 30) % 360,
          targetX: cx + cos(manAngle) * radius,
          targetY: cy + sin(manAngle) * radius * 0.65
        };

        seeds.push(manSeed);
        seeds.push(womanSeed);

        // Initialize grown points at seed positions
        grown.push({ x: manSeed.x, y: manSeed.y, pairIdx: i, isMan: true });
        grown.push({ x: womanSeed.x, y: womanSeed.y, pairIdx: i, isMan: false });

        // Draw seed points
        growthCanvas.noStroke();
        growthCanvas.fill(manSeed.hue, 80, 100, 90);
        growthCanvas.ellipse(manSeed.x, manSeed.y, 12, 12);
        growthCanvas.fill(womanSeed.hue, 80, 100, 90);
        growthCanvas.ellipse(womanSeed.x, womanSeed.y, 12, 12);
      }

      // Spawn random walkers
      for (let i = 0; i < 300; i++) {
        spawnWalker();
      }
    }

    function spawnWalker() {
      // Spawn from random edge or center
      let x, y;
      if (random() < 0.3) {
        // From edges
        let side = floor(random(4));
        switch(side) {
          case 0: x = random(width); y = 0; break;
          case 1: x = width; y = random(height); break;
          case 2: x = random(width); y = height; break;
          case 3: x = 0; y = random(height); break;
        }
      } else {
        x = random(width);
        y = random(height);
      }
      walkers.push({ x: x, y: y });
    }

    function draw() {
      // Process walkers
      let stickRadius = 4;
      let newlyGrown = [];

      for (let w of walkers) {
        // Random walk with bias toward nearest seed's target
        w.x += random(-3, 3);
        w.y += random(-3, 3);

        // Keep in bounds
        w.x = constrain(w.x, 0, width);
        w.y = constrain(w.y, 0, height);

        // Check if walker is near any grown point
        if (grown.length < maxGrown) {
          let stuck = false;
          let stuckTo = null;

          // Only check a subset for performance
          let checkCount = min(grown.length, 200);
          let startIdx = max(0, grown.length - checkCount);
          for (let g = startIdx; g < grown.length; g++) {
            let gp = grown[g];
            let d = dist(w.x, w.y, gp.x, gp.y);
            if (d < stickRadius) {
              stuck = true;
              stuckTo = gp;
              break;
            }
          }

          if (stuck && stuckTo) {
            // Add to growth
            let newPoint = {
              x: w.x,
              y: w.y,
              pairIdx: stuckTo.pairIdx,
              isMan: stuckTo.isMan
            };
            grown.push(newPoint);
            newlyGrown.push(newPoint);

            // Draw branch segment
            let seed = seeds[stuckTo.pairIdx * 2 + (stuckTo.isMan ? 0 : 1)];
            let hue = seed.hue;
            let distToTarget = dist(w.x, w.y, seed.targetX, seed.targetY);
            let maxDist = dist(seed.x, seed.y, seed.targetX, seed.targetY);
            let progress = 1 - constrain(distToTarget / maxDist, 0, 1);

            // Bioluminescent glow
            growthCanvas.noStroke();
            growthCanvas.fill(hue, 50, 90, 8);
            growthCanvas.ellipse(w.x, w.y, 12, 12);
            growthCanvas.fill(hue, 70, 95, 30 + progress * 40);
            growthCanvas.ellipse(w.x, w.y, 3, 3);
            growthCanvas.fill(hue, 30, 100, 50);
            growthCanvas.ellipse(w.x, w.y, 1.2, 1.2);

            // Connection line
            growthCanvas.stroke(hue, 60, 85, 15);
            growthCanvas.strokeWeight(0.5);
            growthCanvas.line(w.x, w.y, stuckTo.x, stuckTo.y);

            // Reset walker
            w.x = random(width);
            w.y = random(height);
          }
        }
      }

      // Add directional bias to walkers: attract toward nearest seed's target
      for (let w of walkers) {
        let nearestSeed = null;
        let nearestDist = Infinity;
        for (let s of seeds) {
          let d = dist(w.x, w.y, s.x, s.y);
          if (d < nearestDist) {
            nearestDist = d;
            nearestSeed = s;
          }
        }
        if (nearestSeed && nearestDist < 200) {
          let bias = 0.15;
          let dx = nearestSeed.targetX - w.x;
          let dy = nearestSeed.targetY - w.y;
          let d = sqrt(dx * dx + dy * dy);
          if (d > 0) {
            w.x += (dx / d) * bias;
            w.y += (dy / d) * bias;
          }
        }
      }

      // Respawn walkers to keep population
      while (walkers.length < 300 && grown.length < maxGrown) {
        spawnWalker();
      }

      // Render
      image(growthCanvas, 0, 0);

      // Draw seed labels
      noStroke();
      textFont('Nunito');
      textSize(10);
      textAlign(CENTER, CENTER);
      for (let i = 0; i < 5; i++) {
        let ms = seeds[i * 2];
        let ws = seeds[i * 2 + 1];

        // Man label
        fill(ms.hue, 60, 100, 80);
        ellipse(ms.x, ms.y, 20, 20);
        fill(0, 0, 100);
        text('M' + (i + 1), ms.x, ms.y);

        // Woman label
        fill(ws.hue, 60, 100, 80);
        ellipse(ws.x, ws.y, 20, 20);
        fill(0, 0, 100);
        text('W' + (i + 1), ws.x, ws.y);
      }

      // Progress
      fill(0, 0, 50, 40);
      textSize(10);
      textAlign(RIGHT, BOTTOM);
      text(grown.length + ' / ' + maxGrown + ' branches', width - 16, height - 16);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      let newGrowth = createGraphics(width, height);
      newGrowth.colorMode(HSB, 360, 100, 100, 100);
      newGrowth.background(13, 17, 23);
      newGrowth.image(growthCanvas, 0, 0);
      growthCanvas = newGrowth;
    }
  </script>
</body>
</html>
