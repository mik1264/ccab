<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matching Clock — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Matching Clock</h2><p>A clock face shows the passage of matching time. The hour hand sweeps through proposal rounds; the minute hand through individual proposals. Stable matching chimes at midnight.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    const N = 5;
    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

    const menPrefs = Array.from({length:N}, ()=>shuffle([0,1,2,3,4]));
    const womenPrefs = Array.from({length:N}, ()=>shuffle([0,1,2,3,4]));
    const womenRank = womenPrefs.map(p=>{const r=[];p.forEach((m,i)=>r[m]=i);return r;});

    const events = [];
    const menNext = Array(N).fill(0);
    const womenPartner = Array(N).fill(-1);
    const menFree = Array(N).fill(true);
    let free = N;
    while (free > 0) {
      for (let m = 0; m < N; m++) {
        if (!menFree[m] || menNext[m] >= N) continue;
        const w = menPrefs[m][menNext[m]]; menNext[m]++;
        if (womenPartner[w] === -1) {
          womenPartner[w] = m; menFree[m] = false; free--;
          events.push({m, w, accepted: true, displaced: -1});
        } else {
          const c = womenPartner[w];
          if (womenRank[w][m] < womenRank[w][c]) {
            womenPartner[w] = m; menFree[m] = false; menFree[c] = true;
            events.push({m, w, accepted: true, displaced: c});
          } else {
            events.push({m, w, accepted: false, displaced: -1});
          }
        }
      }
    }

    const romanNumerals = ['XII','I','II','III','IV','V','VI','VII','VIII','IX','X','XI'];
    const agentLabels = ['M1','M2','M3','M4','M5','W1','W2','W3','W4','W5'];

    let eventIdx = 0, eventTimer = 0;
    const eventDur = 1.8;
    let finishTimer = 0;
    const particles = [];
    let lastTime = performance.now();

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      const cx = canvas.width / 2, cy = canvas.height / 2;
      const radius = Math.min(cx, cy) * 0.4;

      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Clock face
      ctx.save();
      // Outer ring
      const grad = ctx.createRadialGradient(cx, cy, radius*0.9, cx, cy, radius*1.05);
      grad.addColorStop(0, '#1c2333');
      grad.addColorStop(1, '#0d1117');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(cx, cy, radius*1.05, 0, Math.PI*2); ctx.fill();

      ctx.fillStyle = '#161b22';
      ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#30363d';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2); ctx.stroke();

      // Tick marks and numerals
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
        const isMajor = true;
        const innerR = radius * 0.85;
        const outerR = radius * 0.95;
        ctx.strokeStyle = i < 10 ? (i < 5 ? '#58a6ff' : '#c084fc') : '#30363d';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(angle) * innerR, cy + Math.sin(angle) * innerR);
        ctx.lineTo(cx + Math.cos(angle) * outerR, cy + Math.sin(angle) * outerR);
        ctx.stroke();

        // Agent labels around clock
        if (i < 10) {
          ctx.fillStyle = i < 5 ? '#58a6ff' : '#c084fc';
          ctx.font = 'bold 12px Nunito';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const lR = radius * 1.15;
          ctx.fillText(agentLabels[i], cx + Math.cos(angle) * lR, cy + Math.sin(angle) * lR);
        }

        // Roman numerals
        ctx.fillStyle = '#484f58';
        ctx.font = '14px Lora';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const nR = radius * 0.75;
        ctx.fillText(romanNumerals[i], cx + Math.cos(angle) * nR, cy + Math.sin(angle) * nR);
      }

      // Minute marks
      for (let i = 0; i < 60; i++) {
        if (i % 5 === 0) continue;
        const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
        ctx.strokeStyle = '#21262d';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(angle) * radius * 0.92, cy + Math.sin(angle) * radius * 0.92);
        ctx.lineTo(cx + Math.cos(angle) * radius * 0.95, cy + Math.sin(angle) * radius * 0.95);
        ctx.stroke();
      }

      // Process events
      let hourAngle, minuteAngle;
      const totalEvents = events.length;

      if (eventIdx < totalEvents) {
        eventTimer += dt;
        const progress = eventIdx / totalEvents;
        const subProgress = Math.min(eventTimer / eventDur, 1);

        // Hour hand: overall progress (full rotation = all events)
        hourAngle = progress * Math.PI * 2 - Math.PI / 2;
        // Minute hand: sub-event progress
        minuteAngle = subProgress * Math.PI * 2 - Math.PI / 2;

        if (eventTimer >= eventDur) {
          eventIdx++;
          eventTimer = 0;
        }

        // Show event info
        const e = events[eventIdx < totalEvents ? eventIdx : totalEvents - 1];
        const evtAngle = (eventIdx / totalEvents) * Math.PI * 2 - Math.PI / 2;
        const evtR = radius * 0.55;
        const evtX = cx + Math.cos(evtAngle) * evtR;
        const evtY = cy + Math.sin(evtAngle) * evtR;

        ctx.fillStyle = e.accepted ? 'rgba(74,222,128,0.2)' : 'rgba(239,68,68,0.2)';
        ctx.beginPath(); ctx.arc(evtX, evtY, 15, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = e.accepted ? '#4ade80' : '#ef4444';
        ctx.font = '9px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText('M'+(e.m+1)+'→W'+(e.w+1), evtX, evtY - 3);
        ctx.fillText(e.accepted ? 'YES' : 'NO', evtX, evtY + 8);

      } else {
        // Final: midnight position
        hourAngle = -Math.PI / 2;
        minuteAngle = -Math.PI / 2;
        finishTimer += dt;

        // Chime burst
        if (finishTimer < 2) {
          const burstPhase = finishTimer;
          for (let i = 0; i < 3; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 100 + Math.random() * 200;
            particles.push({
              x: cx, y: cy,
              vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
              life: 1.5, maxLife: 1.5,
              color: ['#58a6ff','#c084fc','#4ade80','#fbbf24'][Math.floor(Math.random()*4)],
              size: 2 + Math.random() * 4
            });
          }
        }
      }

      // Draw hour hand (blue - men's proposals)
      ctx.strokeStyle = '#58a6ff';
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(hourAngle) * radius * 0.5, cy + Math.sin(hourAngle) * radius * 0.5);
      ctx.stroke();

      // Draw minute hand (purple - women's responses)
      ctx.strokeStyle = '#c084fc';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(minuteAngle) * radius * 0.7, cy + Math.sin(minuteAngle) * radius * 0.7);
      ctx.stroke();

      // Center pin
      ctx.fillStyle = '#c9d1d9';
      ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();

      ctx.restore();

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vy += 50 * dt;
        p.life -= dt;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Status text
      if (eventIdx < totalEvents) {
        ctx.fillStyle = '#8b949e';
        ctx.font = '13px Nunito';
        ctx.textAlign = 'center';
        ctx.fillText('Round ' + (eventIdx+1) + ' of ' + totalEvents, cx, cy + radius + 40);
        ctx.fillStyle = '#58a6ff';
        ctx.font = '11px JetBrains Mono';
        ctx.fillText('Hour = proposal round | Minute = response', cx, cy + radius + 60);
      } else {
        ctx.fillStyle = '#4ade80';
        ctx.font = 'bold 18px Lora';
        ctx.textAlign = 'center';
        ctx.fillText('Midnight — Stable Matching Achieved!', cx, cy + radius + 50);
      }

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
