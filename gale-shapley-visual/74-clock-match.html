<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock Match — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; }
    .back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
    .back:hover { background: #30363d; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 8;
    const TOTAL = N * 2;
    let agents = []; // 16 agents on circle edge
    let arcs = [];   // proposal arcs
    let chords = []; // stable match chords
    let blockingArcs = []; // red blocking pairs
    let cx, cy, radius;

    // DA state
    let studentPrefs = [];
    let schoolPrefs = [];
    let studentNext = [];
    let schoolMatch = [];
    let studentMatch = [];
    let freeStudents = [];
    let round = 0;
    let algoDone = false;
    let frameTimer = 0;
    let t = 0;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      computeLayout();
      initAgents();
      initDA();
    }

    function computeLayout() {
      cx = width / 2;
      cy = height / 2;
      radius = min(width, height) * 0.38;
    }

    function initAgents() {
      agents = [];
      // Alternate students(blue) and schools(gold) around circle
      for (let i = 0; i < TOTAL; i++) {
        let angle = (TWO_PI / TOTAL) * i - HALF_PI;
        let isStudent = i % 2 === 0;
        agents.push({
          x: cx + cos(angle) * radius,
          y: cy + sin(angle) * radius,
          angle: angle,
          isStudent: isStudent,
          idx: isStudent ? floor(i / 2) : floor(i / 2), // local index
          hue: isStudent ? 215 : 42,
          pulse: 0,
          globalIdx: i
        });
      }
    }

    function initDA() {
      studentPrefs = [];
      schoolPrefs = [];
      studentNext = [];
      schoolMatch = new Array(N).fill(-1);
      studentMatch = new Array(N).fill(-1);
      freeStudents = [];
      arcs = [];
      chords = [];
      blockingArcs = [];
      algoDone = false;
      round = 0;
      frameTimer = 0;

      for (let i = 0; i < N; i++) {
        let prefs = shuffled(N);
        studentPrefs.push(prefs);
        schoolPrefs.push(shuffled(N));
        studentNext.push(0);
        freeStudents.push(i);
      }
    }

    function shuffled(n) {
      let arr = [];
      for (let i = 0; i < n; i++) arr.push(i);
      for (let i = arr.length - 1; i > 0; i--) {
        let j = floor(random(i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getStudentAgent(idx) {
      // Students are at even positions
      return agents[idx * 2];
    }

    function getSchoolAgent(idx) {
      // Schools are at odd positions
      return agents[idx * 2 + 1];
    }

    function stepDA() {
      if (freeStudents.length === 0) {
        algoDone = true;
        // Create stable chords
        for (let i = 0; i < N; i++) {
          if (studentMatch[i] >= 0) {
            let sa = getStudentAgent(i);
            let sca = getSchoolAgent(studentMatch[i]);
            chords.push({
              x1: sa.x, y1: sa.y,
              x2: sca.x, y2: sca.y,
              alpha: 0, targetAlpha: 85,
              thickness: 3.5,
              studentIdx: i,
              schoolIdx: studentMatch[i]
            });
          }
        }
        return;
      }

      let student = freeStudents[0];
      if (studentNext[student] >= N) {
        freeStudents.shift();
        return;
      }

      let school = studentPrefs[student][studentNext[student]];
      studentNext[student]++;

      let sa = getStudentAgent(student);
      let sca = getSchoolAgent(school);

      if (schoolMatch[school] === -1) {
        schoolMatch[school] = student;
        studentMatch[student] = school;
        freeStudents.shift();
        arcs.push({
          x1: sa.x, y1: sa.y, x2: sca.x, y2: sca.y,
          progress: 0, hue: 130, alpha: 70, accepted: true, life: 1.0
        });
      } else {
        let current = schoolMatch[school];
        if (schoolPrefs[school].indexOf(student) < schoolPrefs[school].indexOf(current)) {
          // Reject current, accept new
          studentMatch[current] = -1;
          freeStudents.push(current);
          schoolMatch[school] = student;
          studentMatch[student] = school;
          freeStudents.shift();

          arcs.push({
            x1: sa.x, y1: sa.y, x2: sca.x, y2: sca.y,
            progress: 0, hue: 130, alpha: 70, accepted: true, life: 1.0
          });
          // Red flash for rejected
          let rsa = getStudentAgent(current);
          blockingArcs.push({
            x1: rsa.x, y1: rsa.y, x2: sca.x, y2: sca.y,
            alpha: 60, hue: 0, life: 1.0
          });
        } else {
          // Rejected
          arcs.push({
            x1: sa.x, y1: sa.y, x2: sca.x, y2: sca.y,
            progress: 0, hue: 0, alpha: 50, accepted: false, life: 1.0
          });
        }
      }
      round++;
    }

    function draw() {
      background(220, 45, 5, 20);
      t += 0.008;
      frameTimer++;

      if (!algoDone && frameTimer % 12 === 0) {
        stepDA();
      }

      // Ethereal interior glow based on chord density
      if (chords.length > 0) {
        noStroke();
        for (let ch of chords) {
          let mx = (ch.x1 + ch.x2) / 2;
          let my = (ch.y1 + ch.y2) / 2;
          let glowR = dist(ch.x1, ch.y1, ch.x2, ch.y2) * 0.4;
          for (let r = glowR; r > 0; r -= glowR / 5) {
            fill(42, 30, 50, (ch.alpha / 85) * 3 * (1 - r / glowR));
            ellipse(mx, my, r * 2, r * 2);
          }
        }
      }

      // Draw circle ring
      noFill();
      stroke(220, 20, 30, 25);
      strokeWeight(1);
      ellipse(cx, cy, radius * 2, radius * 2);

      // Draw blocking arcs (red, fading)
      for (let i = blockingArcs.length - 1; i >= 0; i--) {
        let ba = blockingArcs[i];
        ba.life -= 0.015;
        if (ba.life <= 0) { blockingArcs.splice(i, 1); continue; }
        stroke(ba.hue, 70, 70, ba.life * 40);
        strokeWeight(1.5);
        drawChordLine(ba.x1, ba.y1, ba.x2, ba.y2);
      }

      // Draw proposal arcs (animated)
      for (let i = arcs.length - 1; i >= 0; i--) {
        let a = arcs[i];
        a.progress = min(a.progress + 0.03, 1);
        a.life -= 0.008;
        if (a.life <= 0) { arcs.splice(i, 1); continue; }
        let endX = lerp(a.x1, a.x2, a.progress);
        let endY = lerp(a.y1, a.y2, a.progress);
        stroke(a.hue, 50, 80, a.life * a.alpha);
        strokeWeight(a.accepted ? 2 : 1.2);
        drawChordLine(a.x1, a.y1, endX, endY);
      }

      // Draw stable chords
      for (let ch of chords) {
        ch.alpha = lerp(ch.alpha, ch.targetAlpha, 0.03);
        let pulse = sin(t * 3 + ch.studentIdx) * 8 + 2;
        stroke(42, 55, 90, ch.alpha);
        strokeWeight(ch.thickness + pulse * 0.2);
        drawChordLine(ch.x1, ch.y1, ch.x2, ch.y2);
        // Glow line
        stroke(42, 30, 100, ch.alpha * 0.3);
        strokeWeight(ch.thickness + 6);
        drawChordLine(ch.x1, ch.y1, ch.x2, ch.y2);
      }

      // Draw agent dots
      noStroke();
      for (let ag of agents) {
        let pulse = sin(t * 5 + ag.globalIdx * 0.5) * 0.2 + 0.8;
        // Outer glow
        fill(ag.hue, 40, 70, 12);
        ellipse(ag.x, ag.y, 26, 26);
        // Inner dot
        fill(ag.hue, ag.isStudent ? 55 : 65, 90 * pulse, 80);
        let dotSize = ag.isStudent ? 9 : 11;
        ellipse(ag.x, ag.y, dotSize, dotSize);
      }

      // Restart cycle
      if (algoDone && frameTimer > round * 12 + 350) {
        computeLayout();
        initAgents();
        initDA();
      }
    }

    function drawChordLine(x1, y1, x2, y2) {
      // Slight curve through center for visual elegance
      let mx = (x1 + x2) / 2;
      let my = (y1 + y2) / 2;
      let pullX = (cx - mx) * 0.25;
      let pullY = (cy - my) * 0.25;
      noFill();
      beginShape();
      vertex(x1, y1);
      quadraticVertex(mx + pullX, my + pullY, x2, y2);
      endShape();
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      computeLayout();
      initAgents();
      // Update arc/chord positions
      chords = [];
      if (algoDone) {
        for (let i = 0; i < N; i++) {
          if (studentMatch[i] >= 0) {
            let sa = getStudentAgent(i);
            let sca = getSchoolAgent(studentMatch[i]);
            chords.push({
              x1: sa.x, y1: sa.y, x2: sca.x, y2: sca.y,
              alpha: 85, targetAlpha: 85, thickness: 3.5,
              studentIdx: i, schoolIdx: studentMatch[i]
            });
          }
        }
      }
    }
  </script>
</body>
</html>
