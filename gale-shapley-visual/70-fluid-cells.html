<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Cells — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background: #30363d; }
    .info { position:fixed;top:60px;left:16px;background:rgba(13,17,23,0.88);border:1px solid #30363d;border-radius:10px;padding:12px 16px;z-index:50;max-width:260px;backdrop-filter:blur(8px) }
    .info h2 { font-size:15px;color:#58a6ff;margin-bottom:4px }
    .info p { font-size:12px;color:#8b949e;line-height:1.4 }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div class="info">
    <h2>Fluid Cells</h2>
    <p>Student sources (left, blue) and school sources (right, green) inject fluid into a cellular grid. Where matched fluids meet, boundaries glow gold. Blocking pairs show red turbulence.</p>
  </div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const N = 8;
    const COLS = 80;
    const ROWS = 60;
    let W, H, cellW, cellH;

    // Each cell: { student: -1..7, school: -1..7, sStrength, cStrength }
    let grid = [];
    let nextGrid = [];

    // Matching
    let studentPrefs = [], schoolPrefs = [];
    let finalMatch = [];
    let blockingPairs = [];

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function runGS() {
      studentPrefs = []; schoolPrefs = [];
      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffle([...Array(N).keys()]));
        schoolPrefs.push(shuffle([...Array(N).keys()]));
      }
      const next = new Array(N).fill(0);
      const schoolCur = new Array(N).fill(-1);
      const matched = new Array(N).fill(-1);
      let changed = true;
      while (changed) {
        changed = false;
        for (let s = 0; s < N; s++) {
          if (matched[s] !== -1) continue;
          if (next[s] >= N) continue;
          changed = true;
          const t = studentPrefs[s][next[s]];
          next[s]++;
          if (schoolCur[t] === -1) {
            schoolCur[t] = s;
            matched[s] = t;
          } else {
            const cur = schoolCur[t];
            if (schoolPrefs[t].indexOf(s) < schoolPrefs[t].indexOf(cur)) {
              matched[cur] = -1;
              schoolCur[t] = s;
              matched[s] = t;
            }
          }
        }
      }
      finalMatch = matched;

      // Find blocking pairs
      blockingPairs = [];
      for (let s = 0; s < N; s++) {
        for (let c = 0; c < N; c++) {
          if (finalMatch[s] === c) continue;
          if (studentPrefs[s].indexOf(c) < studentPrefs[s].indexOf(finalMatch[s])) {
            const partner = schoolCur[c];
            if (schoolPrefs[c].indexOf(s) < schoolPrefs[c].indexOf(partner)) {
              blockingPairs.push([s, c]);
            }
          }
        }
      }
    }

    function isStablePair(si, ci) {
      return finalMatch[si] === ci;
    }

    function isBlockingPair(si, ci) {
      return blockingPairs.some(p => p[0] === si && p[1] === ci);
    }

    // Student source positions (left column)
    let studentSources = [];
    let schoolSources = [];

    function initGrid() {
      cellW = W / COLS;
      cellH = H / ROWS;

      grid = [];
      nextGrid = [];
      for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        nextGrid[r] = [];
        for (let c = 0; c < COLS; c++) {
          grid[r][c] = { si: -1, ci: -1, ss: 0, cs: 0 };
          nextGrid[r][c] = { si: -1, ci: -1, ss: 0, cs: 0 };
        }
      }

      // Sources
      studentSources = [];
      schoolSources = [];
      const spacing = Math.floor(ROWS / (N + 1));
      for (let i = 0; i < N; i++) {
        studentSources.push({ row: spacing * (i + 1), col: 2 });
        schoolSources.push({ row: spacing * (i + 1), col: COLS - 3 });
      }
    }

    function fluidStep() {
      // Copy grid to nextGrid
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          nextGrid[r][c].si = grid[r][c].si;
          nextGrid[r][c].ci = grid[r][c].ci;
          nextGrid[r][c].ss = grid[r][c].ss * 0.98;
          nextGrid[r][c].cs = grid[r][c].cs * 0.98;
        }
      }

      // Diffuse
      for (let r = 1; r < ROWS - 1; r++) {
        for (let c = 1; c < COLS - 1; c++) {
          const cell = grid[r][c];

          // Student fluid diffusion
          if (cell.ss > 0.05) {
            const share = cell.ss * 0.08;
            const neighbors = [
              [r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]
            ];
            for (const [nr, nc] of neighbors) {
              if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                const n = nextGrid[nr][nc];
                if (n.si === -1 || n.si === cell.si) {
                  n.si = cell.si;
                  n.ss += share + (Math.random() - 0.5) * 0.01;
                }
              }
            }
            // Rightward bias for students
            if (c + 1 < COLS) {
              nextGrid[r][c + 1].ss += share * 0.5;
              if (nextGrid[r][c + 1].si === -1) nextGrid[r][c + 1].si = cell.si;
            }
          }

          // School fluid diffusion
          if (cell.cs > 0.05) {
            const share = cell.cs * 0.08;
            const neighbors = [
              [r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]
            ];
            for (const [nr, nc] of neighbors) {
              if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                const n = nextGrid[nr][nc];
                if (n.ci === -1 || n.ci === cell.ci) {
                  n.ci = cell.ci;
                  n.cs += share + (Math.random() - 0.5) * 0.01;
                }
              }
            }
            // Leftward bias for schools
            if (c - 1 >= 0) {
              nextGrid[r][c - 1].cs += share * 0.5;
              if (nextGrid[r][c - 1].ci === -1) nextGrid[r][c - 1].ci = cell.ci;
            }
          }
        }
      }

      // Inject from sources
      for (let i = 0; i < N; i++) {
        const ss = studentSources[i];
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            const r = ss.row + dr, c = ss.col + dc;
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
              nextGrid[r][c].si = i;
              nextGrid[r][c].ss = 1;
            }
          }
        }
        const cs = schoolSources[i];
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            const r = cs.row + dr, c = cs.col + dc;
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
              nextGrid[r][c].ci = i;
              nextGrid[r][c].cs = 1;
            }
          }
        }
      }

      // Clamp
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          nextGrid[r][c].ss = Math.min(1, Math.max(0, nextGrid[r][c].ss));
          nextGrid[r][c].cs = Math.min(1, Math.max(0, nextGrid[r][c].cs));
        }
      }

      // Swap
      [grid, nextGrid] = [nextGrid, grid];
    }

    // Color palette for students (blues) and schools (greens)
    const sHues = [200, 210, 220, 195, 205, 215, 225, 190];
    const cHues = [130, 140, 150, 125, 135, 145, 155, 120];

    function drawGrid(t) {
      const imgData = ctx.createImageData(W, H);
      const data = imgData.data;

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = grid[r][c];
          const x0 = Math.floor(c * cellW);
          const y0 = Math.floor(r * cellH);
          const x1 = Math.floor((c + 1) * cellW);
          const y1 = Math.floor((r + 1) * cellH);

          let rr = 13, gg = 17, bb = 23; // background

          if (cell.ss > 0.05 && cell.si >= 0) {
            const h = sHues[cell.si];
            const strength = Math.min(cell.ss, 1);
            rr = Math.floor(20 + strength * 40);
            gg = Math.floor(40 + strength * 90);
            bb = Math.floor(80 + strength * 170);
          }

          if (cell.cs > 0.05 && cell.ci >= 0) {
            const strength = Math.min(cell.cs, 1);
            if (cell.ss > 0.05 && cell.si >= 0) {
              // Boundary — both fluids present
              if (isStablePair(cell.si, cell.ci)) {
                // Gold glow
                const pulse = 0.7 + 0.3 * Math.sin(t * 4 + cell.si + cell.ci);
                rr = Math.floor(200 * pulse + 55);
                gg = Math.floor(160 * pulse + 40);
                bb = Math.floor(30 * pulse + 20);
              } else if (isBlockingPair(cell.si, cell.ci)) {
                // Red turbulence
                const turb = 0.5 + 0.5 * Math.sin(t * 8 + r * 0.3 + c * 0.3);
                rr = Math.floor(180 * turb + 70);
                gg = Math.floor(30 * turb + 15);
                bb = Math.floor(30 * turb + 15);
              } else {
                // Neutral mix
                rr = Math.floor(rr * 0.5 + 30);
                gg = Math.floor(gg * 0.5 + 60);
                bb = Math.floor(bb * 0.5 + 50);
              }
            } else {
              // Pure school fluid
              rr = Math.floor(15 + strength * 30);
              gg = Math.floor(60 + strength * 130);
              bb = Math.floor(30 + strength * 50);
            }
          }

          // Fill pixels
          for (let py = y0; py < y1 && py < H; py++) {
            for (let px = x0; px < x1 && px < W; px++) {
              const idx = (py * W + px) * 4;
              data[idx] = rr;
              data[idx + 1] = gg;
              data[idx + 2] = bb;
              data[idx + 3] = 255;
            }
          }
        }
      }

      ctx.putImageData(imgData, 0, 0);
    }

    function drawSources(t) {
      // Student source labels
      ctx.font = 'bold 11px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      for (let i = 0; i < N; i++) {
        const s = studentSources[i];
        const x = s.col * cellW;
        const y = s.row * cellH;
        ctx.fillStyle = '#58a6ff';
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#0d1117';
        ctx.fillText(i + 1, x, y + 4);
      }
      for (let i = 0; i < N; i++) {
        const s = schoolSources[i];
        const x = s.col * cellW;
        const y = s.row * cellH;
        ctx.fillStyle = '#3fb950';
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#0d1117';
        ctx.fillText(i + 1, x, y + 4);
      }
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      runGS();
      initGrid();
    }

    const t0 = performance.now();
    let frameCount = 0;

    function animate() {
      const t = (performance.now() - t0) / 1000;
      frameCount++;

      // Multiple fluid steps per frame for speed
      for (let i = 0; i < 3; i++) fluidStep();

      drawGrid(t);
      drawSources(t);

      // Legend
      ctx.fillStyle = '#8b949e';
      ctx.font = '12px "Segoe UI", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('Gold = stable match boundary | Red = blocking pair', W - 20, H - 16);

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    animate();
  </script>
</body>
</html>
