<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Cell Matching Simulation — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Fluid Cell Matching Simulation</h2><p>Agents drift in a fluid. Each cell excretes a chemical attractant preferred by their matching partner. The stable matching emerges from chemotaxis.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const N = 5;
    const matching = [0,1,2,3,4];
    const chemColors = [
      [88, 166, 255],   // Blue
      [192, 132, 252],  // Purple
      [96, 165, 250],   // Light blue
      [168, 85, 247],   // Violet
      [37, 99, 235]     // Deep blue
    ];

    const scale = 3;
    let gw, gh;
    let chemicals; // N channels per cell
    let newChemicals;

    // Agents
    class Agent {
      constructor(x, y, type, index) {
        this.x = x; this.y = y;
        this.type = type;
        this.index = index;
        this.vx = 0; this.vy = 0;
      }
    }

    let agents = [];
    let imageData;

    function init() {
      const w = canvas.width, h = canvas.height;
      gw = Math.floor(w / scale);
      gh = Math.floor(h / scale);
      chemicals = new Float32Array(gw * gh * N);
      newChemicals = new Float32Array(gw * gh * N);

      // Seed initial concentrations with some noise
      for (let i = 0; i < chemicals.length; i++) {
        chemicals[i] = Math.random() * 0.05;
      }

      agents = [];
      for (let i = 0; i < N; i++) {
        // Men
        agents.push(new Agent(
          gw * (0.2 + Math.random() * 0.2),
          gh * (0.1 + 0.8 * i / (N-1)),
          'man', i
        ));
        // Women (sources of chemicals)
        agents.push(new Agent(
          gw * (0.6 + Math.random() * 0.2),
          gh * (0.1 + 0.8 * i / (N-1)),
          'woman', i
        ));
      }

      imageData = ctx.createImageData(gw, gh);
    }

    init();
    window.addEventListener('resize', () => { resize(); init(); });

    const diffusion = 0.15;
    const decay = 0.998;
    const emitRate = 0.4;

    let t = 0, dt = 1/60;
    function loop() {
      requestAnimationFrame(loop);
      t += dt;
      update();
      render();
    }

    function idx(x, y, c) {
      return (y * gw + x) * N + c;
    }

    function update() {
      // Women emit chemicals based on preferences
      for (const a of agents) {
        if (a.type !== 'woman') continue;
        const gx = Math.floor(a.x);
        const gy = Math.floor(a.y);
        // Woman i emits chemical i strongly (her matched man seeks this)
        for (let r = -3; r <= 3; r++) {
          for (let c = -3; c <= 3; c++) {
            const cx = gx + c, cy = gy + r;
            if (cx < 0 || cx >= gw || cy < 0 || cy >= gh) continue;
            const dist = Math.sqrt(r*r + c*c);
            if (dist > 4) continue;
            const amount = emitRate * (1 - dist / 4);
            chemicals[idx(cx, cy, a.index)] = Math.min(1, chemicals[idx(cx, cy, a.index)] + amount);
          }
        }
      }

      // Diffusion + decay
      newChemicals.set(chemicals);
      for (let y = 1; y < gh - 1; y++) {
        for (let x = 1; x < gw - 1; x++) {
          for (let c = 0; c < N; c++) {
            const center = chemicals[idx(x, y, c)];
            const neighbors = (
              chemicals[idx(x-1, y, c)] +
              chemicals[idx(x+1, y, c)] +
              chemicals[idx(x, y-1, c)] +
              chemicals[idx(x, y+1, c)]
            ) / 4;
            newChemicals[idx(x, y, c)] = (center * (1 - diffusion) + neighbors * diffusion) * decay;
          }
        }
      }
      const temp = chemicals;
      chemicals = newChemicals;
      newChemicals = temp;

      // Chemotaxis: men move toward their preferred chemical
      for (const a of agents) {
        if (a.type !== 'man') continue;
        const target = matching[a.index]; // chemical channel to follow
        const gx = Math.floor(a.x);
        const gy = Math.floor(a.y);

        if (gx <= 0 || gx >= gw - 1 || gy <= 0 || gy >= gh - 1) continue;

        // Gradient of target chemical
        const gradX = chemicals[idx(gx+1, gy, target)] - chemicals[idx(gx-1, gy, target)];
        const gradY = chemicals[idx(gx, gy+1, target)] - chemicals[idx(gx, gy-1, target)];

        a.vx += gradX * 8;
        a.vy += gradY * 8;
        a.vx += (Math.random() - 0.5) * 0.3;
        a.vy += (Math.random() - 0.5) * 0.3;
        a.vx *= 0.9;
        a.vy *= 0.9;

        a.x += a.vx;
        a.y += a.vy;

        // Men also emit a faint trail
        const mx = Math.floor(a.x), my = Math.floor(a.y);
        if (mx >= 0 && mx < gw && my >= 0 && my < gh) {
          chemicals[idx(mx, my, a.index)] = Math.min(1, chemicals[idx(mx, my, a.index)] + 0.08);
        }

        // Bounds
        a.x = Math.max(1, Math.min(gw - 2, a.x));
        a.y = Math.max(1, Math.min(gh - 2, a.y));
      }

      // Women drift slowly
      for (const a of agents) {
        if (a.type !== 'woman') continue;
        a.vx += (Math.random() - 0.5) * 0.1;
        a.vy += (Math.random() - 0.5) * 0.1;
        a.vx *= 0.95;
        a.vy *= 0.95;
        a.x += a.vx;
        a.y += a.vy;
        a.x = Math.max(2, Math.min(gw - 3, a.x));
        a.y = Math.max(2, Math.min(gh - 3, a.y));
      }
    }

    function render() {
      const w = canvas.width, h = canvas.height;

      // Render chemical field
      const data = imageData.data;
      for (let y = 0; y < gh; y++) {
        for (let x = 0; x < gw; x++) {
          const base = (y * gw + x) * 4;
          let r = 13, g = 17, b = 23;

          // Find dominant chemical and blend colors
          let maxVal = 0;
          for (let c = 0; c < N; c++) {
            const v = chemicals[idx(x, y, c)];
            if (v > 0.01) {
              const cc = chemColors[c];
              r += cc[0] * v * 0.8;
              g += cc[1] * v * 0.8;
              b += cc[2] * v * 0.8;
            }
            if (v > maxVal) maxVal = v;
          }

          data[base] = Math.min(255, r);
          data[base+1] = Math.min(255, g);
          data[base+2] = Math.min(255, b);
          data[base+3] = 255;
        }
      }
      ctx.putImageData(imageData, 0, 0);

      // Scale up
      ctx.save();
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(canvas, 0, 0, gw, gh, 0, 0, w, h);
      ctx.restore();

      // Draw agents
      for (const a of agents) {
        const sx = a.x * scale, sy = a.y * scale;
        const isMan = a.type === 'man';
        const color = chemColors[a.index];

        // Glow
        ctx.beginPath();
        ctx.arc(sx, sy, 16, 0, Math.PI * 2);
        const glow = ctx.createRadialGradient(sx, sy, 4, sx, sy, 16);
        glow.addColorStop(0, `rgba(${color.join(',')},0.6)`);
        glow.addColorStop(1, `rgba(${color.join(',')},0)`);
        ctx.fillStyle = glow;
        ctx.fill();

        // Body
        ctx.beginPath();
        ctx.arc(sx, sy, 8, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(sx-2, sy-2, 1, sx, sy, 8);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.4, `rgb(${color.join(',')})`);
        grad.addColorStop(1, `rgba(${color.join(',')},0.5)`);
        ctx.fillStyle = grad;
        ctx.fill();

        // Border indicates type
        ctx.strokeStyle = isMan ? '#58a6ff' : '#c084fc';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Label
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 8px Nunito';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(isMan ? 'M'+(a.index+1) : 'W'+(a.index+1), sx, sy);
      }

      // Check for proximity between matched pairs
      for (let i = 0; i < N; i++) {
        const man = agents.find(a => a.type === 'man' && a.index === i);
        const woman = agents.find(a => a.type === 'woman' && a.index === matching[i]);
        if (!man || !woman) continue;
        const dx = (man.x - woman.x) * scale;
        const dy = (man.y - woman.y) * scale;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 60) {
          const mx = (man.x + woman.x) / 2 * scale;
          const my = (man.y + woman.y) / 2 * scale;
          ctx.fillStyle = `rgba(255,215,0,${Math.max(0, 1 - dist/60) * 0.8})`;
          ctx.font = 'bold 10px Nunito';
          ctx.textAlign = 'center';
          ctx.fillText('matched!', mx, my - 16);
        }
      }
    }

    loop();
  </script>
</body>
</html>
