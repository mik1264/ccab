<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Julia Set Matching — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Julia Set Matching</h2><p>The Julia set parameter c is determined by the stable matching state. Each matching produces a unique fractal — imperfect matchings yield chaotic fractals; stable ones yield beautiful symmetric forms.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let W, H, imageData;
    function resize() {
      // Use lower resolution for performance, scale up
      W = Math.floor(innerWidth / 2);
      H = Math.floor(innerHeight / 2);
      canvas.width = W;
      canvas.height = H;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      canvas.style.imageRendering = 'auto';
      imageData = ctx.createImageData(W, H);
    }
    resize();
    window.addEventListener('resize', resize);

    let t = 0;
    const maxIter = 80;

    // Matching quality score: stable matching = high (close to 1), random = lower
    const matchQuality = 0.85; // Represents a good stable matching

    function renderJulia() {
      // c parameter: re derived from match quality, im oscillates
      const cRe = -0.7 + (1 - matchQuality) * 0.3 * Math.sin(t * 0.15);
      const cIm = 0.27015 + 0.05 * Math.sin(t * 0.3);

      const data = imageData.data;
      const zoom = 1.5;
      const offsetX = 0;
      const offsetY = 0;

      for (let py = 0; py < H; py++) {
        for (let px = 0; px < W; px++) {
          let zr = (px - W / 2) / (W / 2) * zoom + offsetX;
          let zi = (py - H / 2) / (H / 2) * zoom + offsetY;

          let iter = 0;
          let zr2, zi2;
          while (iter < maxIter) {
            zr2 = zr * zr;
            zi2 = zi * zi;
            if (zr2 + zi2 > 4) break;
            zi = 2 * zr * zi + cIm;
            zr = zr2 - zi2 + cRe;
            iter++;
          }

          const idx = (py * W + px) * 4;
          if (iter === maxIter) {
            data[idx] = 5;
            data[idx + 1] = 5;
            data[idx + 2] = 15;
          } else {
            // Smooth coloring
            const smooth = iter + 1 - Math.log2(Math.log2(zr * zr + zi * zi));
            const hue = smooth / maxIter;

            // Blue-purple palette for stability
            const r = Math.floor(30 + 120 * Math.pow(Math.sin(hue * Math.PI), 2));
            const g = Math.floor(15 + 40 * hue);
            const b = Math.floor(80 + 175 * Math.pow(hue, 0.6));

            data[idx] = r;
            data[idx + 1] = g;
            data[idx + 2] = b;
          }
          data[idx + 3] = 255;
        }
      }
      ctx.putImageData(imageData, 0, 0);
    }

    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      renderJulia();
    }
    animate();
  </script>
</body>
</html>
