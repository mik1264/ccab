<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preference Wave Interference — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Preference Wave Interference</h2><p>Men and women emit concentric waves at frequencies set by their preference ranks. Where compatible waves constructively interfere, bright nodes appear — the stable matching.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let W, H, imageData;
    function resize() {
      W = Math.floor(innerWidth / 3);
      H = Math.floor(innerHeight / 3);
      canvas.width = W;
      canvas.height = H;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      canvas.style.imageRendering = 'auto';
      imageData = ctx.createImageData(W, H);
    }
    resize();
    window.addEventListener('resize', resize);

    let t = 0;
    const N = 5;

    // Men on left third, women on right third
    const men = [], women = [];
    for (let i = 0; i < N; i++) {
      men.push({
        x: 0.15 + 0.1 * Math.sin(i * 1.2),
        y: 0.12 + i * 0.19,
        freq: 0.04 + i * 0.008,
        speed: 3 + i * 0.5
      });
      women.push({
        x: 0.85 + 0.1 * Math.cos(i * 1.5),
        y: 0.12 + i * 0.19,
        freq: 0.04 + i * 0.008,
        speed: 3 + (N - 1 - i) * 0.5
      });
    }

    function draw() {
      const data = imageData.data;

      for (let py = 0; py < H; py++) {
        for (let px = 0; px < W; px++) {
          const nx = px / W;
          const ny = py / H;

          let blueSum = 0, redSum = 0;

          // Men emit blue waves
          for (let i = 0; i < N; i++) {
            const dx = nx - men[i].x;
            const dy = ny - men[i].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            blueSum += Math.sin(dist * men[i].freq * 600 - t * men[i].speed) / (1 + dist * 8);
          }

          // Women emit red waves
          for (let i = 0; i < N; i++) {
            const dx = nx - women[i].x;
            const dy = ny - women[i].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            redSum += Math.sin(dist * women[i].freq * 600 - t * women[i].speed) / (1 + dist * 8);
          }

          const idx = (py * W + px) * 4;

          // Normalize
          const b = blueSum / N;
          const r = redSum / N;

          // Constructive interference (both positive) = bright white/gold
          const constructive = Math.max(0, b) * Math.max(0, r) * 4;

          data[idx]     = Math.floor(Math.max(0, Math.min(255, 13 + r * 180 + constructive * 255)));
          data[idx + 1] = Math.floor(Math.max(0, Math.min(255, 17 + constructive * 200)));
          data[idx + 2] = Math.floor(Math.max(0, Math.min(255, 23 + b * 200 + constructive * 150)));
          data[idx + 3] = 255;
        }
      }

      ctx.putImageData(imageData, 0, 0);

      // Draw source points (scaled to display coords)
      const dW = W, dH = H;
      for (let i = 0; i < N; i++) {
        // Men (blue dots)
        ctx.beginPath();
        ctx.arc(men[i].x * dW, men[i].y * dH, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#58a6ff';
        ctx.fill();

        // Women (purple dots)
        ctx.beginPath();
        ctx.arc(women[i].x * dW, women[i].y * dH, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#bc8cff';
        ctx.fill();
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      draw();
    }
    animate();
  </script>
</body>
</html>
