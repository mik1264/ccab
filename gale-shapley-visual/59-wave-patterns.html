<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wave Patterns — Matching Algorithms Visual Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;overflow:hidden;font-family:sans-serif}
canvas{display:block;position:fixed;top:0;left:0}
.back{position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100}
.back:hover{background:#30363d}
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, scale = 3;
let offCanvas, offCtx, offW, offH;

const students = [];
const schools = [];

function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
  offW = Math.ceil(W / scale);
  offH = Math.ceil(H / scale);
  offCanvas = document.createElement('canvas');
  offCanvas.width = offW;
  offCanvas.height = offH;
  offCtx = offCanvas.getContext('2d');
  initSources();
}

function initSources() {
  students.length = 0;
  schools.length = 0;
  for (let i = 0; i < 8; i++) {
    students.push({
      x: W * (0.1 + Math.random() * 0.35),
      y: H * (0.1 + Math.random() * 0.8),
      freq: 0.025 + Math.random() * 0.015,
      speed: 1.5 + Math.random() * 1.0
    });
    schools.push({
      x: W * (0.55 + Math.random() * 0.35),
      y: H * (0.1 + Math.random() * 0.8),
      freq: 0.025 + Math.random() * 0.015,
      speed: 1.5 + Math.random() * 1.0
    });
  }
}

resize();
window.addEventListener('resize', resize);

function animate(now) {
  const time = now * 0.001;
  const imgData = offCtx.createImageData(offW, offH);
  const data = imgData.data;

  for (let py = 0; py < offH; py++) {
    for (let px = 0; px < offW; px++) {
      const wx = px * scale;
      const wy = py * scale;
      let sum = 0;

      for (let i = 0; i < 8; i++) {
        const s = students[i];
        const dx = wx - s.x, dy = wy - s.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        sum += Math.sin(dist * s.freq - time * s.speed);
      }

      for (let i = 0; i < 8; i++) {
        const s = schools[i];
        const dx = wx - s.x, dy = wy - s.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        sum += Math.sin(dist * s.freq - time * s.speed);
      }

      const norm = sum / 8;
      const val = Math.max(-1, Math.min(1, norm));
      const idx = (py * offW + px) * 4;

      if (val > 0) {
        data[idx]   = Math.round(255 * val);
        data[idx+1] = Math.round(165 * val + 40 * val * val);
        data[idx+2] = Math.round(30 * val);
      } else {
        const v = -val;
        data[idx]   = Math.round(20 * v);
        data[idx+1] = Math.round(120 * v + 80 * v * v);
        data[idx+2] = Math.round(255 * v);
      }
      data[idx+3] = 255;
    }
  }

  offCtx.putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(offCanvas, 0, 0, W, H);

  // Draw source dots and match lines
  for (let i = 0; i < 8; i++) {
    const s = students[i];
    ctx.fillStyle = 'rgba(0,220,255,0.9)';
    ctx.shadowColor = '#00dcff';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(s.x, s.y, 5, 0, Math.PI * 2);
    ctx.fill();

    const sc = schools[i];
    ctx.fillStyle = 'rgba(255,200,50,0.9)';
    ctx.shadowColor = '#ffc832';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(sc.x, sc.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Match line
    const mx = (s.x + sc.x) / 2;
    const my = (s.y + sc.y) / 2;
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 5]);
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(sc.x, sc.y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Midpoint glow
    const pulse = 0.4 + 0.4 * Math.sin(time * 2 + i);
    const grad = ctx.createRadialGradient(mx, my, 0, mx, my, 15);
    grad.addColorStop(0, 'rgba(255,255,200,' + (0.7 * pulse) + ')');
    grad.addColorStop(1, 'rgba(255,255,200,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(mx, my, 15, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(201,209,217,0.7)';
  ctx.font = '600 16px sans-serif';
  ctx.fillText('Wave Patterns', 16, H - 20);

  ctx.fillStyle = 'rgba(0,220,255,0.6)';
  ctx.font = '12px sans-serif';
  ctx.fillText('Students', W - 130, H - 36);
  ctx.fillStyle = 'rgba(255,200,50,0.6)';
  ctx.fillText('Schools', W - 130, H - 18);

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
