<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snowflake Matching Crystal — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Snowflake Matching Crystal</h2><p>A snowflake grows according to matching rules — hexagonal symmetry where each arm represents a preference, and stable pairs create the crystal's core structure.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const N = 5;
    const matching = [0,1,2,3,4];
    const pairColors = [
      [88,166,255], [192,132,252], [96,165,250], [168,85,247], [37,99,235]
    ];

    // DLA snowflake with hexagonal symmetry
    // Grid for efficient neighbor checking
    const maxR = Math.min(innerWidth, innerHeight) * 0.42;
    const cx = innerWidth / 2;
    const cy = innerHeight / 2;

    // Crystal particles
    let crystal = [];
    let walkers = [];
    const particleR = 2.5;
    let growthAngle = 0;

    // Seed: place initial matched pair particles at center
    function seedCrystal() {
      crystal = [];
      // Center seed
      crystal.push({ x: 0, y: 0, pair: 0, age: 0 });
      // 6 seeds at 60 degree intervals — one per matched pair (wrapping)
      for (let i = 0; i < 6; i++) {
        const angle = i * Math.PI / 3;
        const pair = i % N;
        crystal.push({
          x: Math.cos(angle) * particleR * 3,
          y: Math.sin(angle) * particleR * 3,
          pair: pair,
          age: 0
        });
      }
    }

    seedCrystal();

    // Spatial hash for fast neighbor lookup
    const cellSize = particleR * 4;
    let spatialHash = {};

    function hashKey(x, y) {
      return Math.floor(x/cellSize) + ',' + Math.floor(y/cellSize);
    }

    function rebuildHash() {
      spatialHash = {};
      for (const p of crystal) {
        const key = hashKey(p.x, p.y);
        if (!spatialHash[key]) spatialHash[key] = [];
        spatialHash[key].push(p);
      }
    }

    function hasNeighbor(x, y) {
      const gx = Math.floor(x/cellSize), gy = Math.floor(y/cellSize);
      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          const key = (gx+dx)+','+(gy+dy);
          const cell = spatialHash[key];
          if (!cell) continue;
          for (const p of cell) {
            const ddx = x - p.x, ddy = y - p.y;
            if (ddx*ddx + ddy*ddy < (particleR * 2.5) * (particleR * 2.5)) {
              return p;
            }
          }
        }
      }
      return null;
    }

    // Apply hexagonal symmetry: given a point, return all 6 symmetric variants
    function hexSymmetry(x, y) {
      const points = [];
      for (let i = 0; i < 6; i++) {
        const angle = i * Math.PI / 3;
        const cos = Math.cos(angle), sin = Math.sin(angle);
        points.push({ x: x * cos - y * sin, y: x * sin + y * cos });
      }
      return points;
    }

    // Spawn walkers at edge
    function spawnWalker() {
      const angle = Math.random() * Math.PI * 2;
      const r = maxR * 0.9;
      return {
        x: Math.cos(angle) * r,
        y: Math.sin(angle) * r
      };
    }

    let totalAge = 0;
    const maxParticles = 6000;
    let particlesPerFrame = 2;

    rebuildHash();

    let t = 0, dt = 1/60;
    function loop() {
      requestAnimationFrame(loop);
      t += dt;
      totalAge++;
      update();
      render();
    }

    function update() {
      if (crystal.length > maxParticles) return;

      // Spawn walkers
      while (walkers.length < 100) {
        walkers.push(spawnWalker());
      }

      // Walk particles
      let attached = 0;
      for (let i = walkers.length - 1; i >= 0; i--) {
        const w = walkers[i];
        for (let step = 0; step < 10; step++) {
          w.x += (Math.random() - 0.5) * particleR * 2;
          w.y += (Math.random() - 0.5) * particleR * 2;

          // Bias slightly toward center
          const d = Math.sqrt(w.x*w.x + w.y*w.y);
          if (d > 0) {
            w.x -= w.x/d * 0.3;
            w.y -= w.y/d * 0.3;
          }

          // Check if near crystal
          const neighbor = hasNeighbor(w.x, w.y);
          if (neighbor) {
            // Attach with hexagonal symmetry
            const pair = Math.floor(Math.atan2(w.y, w.x) / (Math.PI/3) + 3) % N;
            const pts = hexSymmetry(w.x, w.y);
            for (const p of pts) {
              const dd = Math.sqrt(p.x*p.x + p.y*p.y);
              if (dd < maxR * 0.85) {
                crystal.push({ x: p.x, y: p.y, pair: pair, age: totalAge });
              }
            }
            rebuildHash();
            walkers.splice(i, 1);
            attached++;
            break;
          }

          // Remove if too far
          if (d > maxR) {
            walkers.splice(i, 1);
            break;
          }
        }
        if (attached >= particlesPerFrame) break;
      }
    }

    function render() {
      const w = canvas.width, h = canvas.height;

      // Fade background
      ctx.fillStyle = 'rgba(13,17,23,0.08)';
      ctx.fillRect(0, 0, w, h);

      // Draw crystal
      ctx.save();
      ctx.translate(cx, cy);

      for (const p of crystal) {
        const c = pairColors[p.pair % pairColors.length];
        const brightness = Math.min(1, (totalAge - p.age) / 200);
        const alpha = 0.5 + brightness * 0.5;

        // Warm/cool based on pair parity
        const warmth = p.pair % 2 === 0 ? 1 : 0;
        const r = Math.floor(c[0] * (0.7 + warmth * 0.3));
        const g = Math.floor(c[1] * (0.8 + warmth * 0.2));
        const b = Math.floor(c[2] * (1 - warmth * 0.2));

        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.fillRect(p.x - particleR, p.y - particleR, particleR * 2, particleR * 2);
      }

      // Draw active walkers as faint dots
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      for (const w of walkers) {
        ctx.fillRect(w.x - 1, w.y - 1, 2, 2);
      }

      ctx.restore();

      // Stats
      ctx.fillStyle = '#484f58';
      ctx.font = '500 11px Nunito';
      ctx.textAlign = 'right';
      ctx.fillText(`Crystal: ${crystal.length} particles`, w - 16, h - 16);
    }

    loop();
  </script>
</body>
</html>
