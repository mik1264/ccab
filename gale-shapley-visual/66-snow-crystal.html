<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snow Crystal — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background: #30363d; }
    .info { position:fixed;top:60px;left:16px;background:rgba(13,17,23,0.88);border:1px solid #30363d;border-radius:10px;padding:12px 16px;z-index:50;max-width:260px;backdrop-filter:blur(8px) }
    .info h2 { font-size:15px;color:#58a6ff;margin-bottom:4px }
    .info p { font-size:12px;color:#8b949e;line-height:1.4 }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div class="info">
    <h2>Snow Crystal</h2>
    <p>Each matched pair grows a hexagonal snowflake. Arm length = satisfaction rank, branch density = proposals received. Crystals sparkle when complete.</p>
  </div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const N = 8;
    let W, H;

    // Algorithm state
    let studentPrefs = [], schoolPrefs = [];
    let studentNext = [], schoolCurrent = [], matchState = [];
    let algoDone = false, algoStep = 0;
    let crystals = [];
    let snowflakes = [];
    let roundCount = 0;

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function init() {
      studentPrefs = []; schoolPrefs = [];
      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffle([...Array(N).keys()]));
        schoolPrefs.push(shuffle([...Array(N).keys()]));
      }
      studentNext = new Array(N).fill(0);
      schoolCurrent = new Array(N).fill(-1);
      matchState = new Array(N).fill(-1);
      algoDone = false;
      roundCount = 0;
      crystals = [];
      snowflakes = [];
      layoutCrystals();
    }

    function layoutCrystals() {
      const cols = 4, rows = 2;
      const cw = W / cols, ch = (H - 40) / rows;
      for (let i = 0; i < N; i++) {
        const col = i % cols, row = Math.floor(i / cols);
        crystals.push({
          cx: cw * col + cw / 2,
          cy: 50 + ch * row + ch / 2,
          maxR: Math.min(cw, ch) * 0.38,
          growth: 0,
          armLen: 0.5,
          branches: 3,
          matched: false,
          sparkles: [],
          si: -1,
          ci: -1,
          hue: 200,
          satRank: 0
        });
      }
    }

    function gsStep() {
      if (algoDone) return;
      let any = false;
      roundCount++;
      for (let s = 0; s < N; s++) {
        if (matchState[s] !== -1) continue;
        if (studentNext[s] >= N) continue;
        any = true;
        const t = studentPrefs[s][studentNext[s]];
        studentNext[s]++;
        if (schoolCurrent[t] === -1) {
          schoolCurrent[t] = s;
          matchState[s] = t;
        } else {
          const cur = schoolCurrent[t];
          if (schoolPrefs[t].indexOf(s) < schoolPrefs[t].indexOf(cur)) {
            matchState[cur] = -1;
            schoolCurrent[t] = s;
            matchState[s] = t;
          }
        }
      }
      if (!any) algoDone = true;
      updateCrystals();
    }

    function updateCrystals() {
      let ci = 0;
      for (let s = 0; s < N; s++) {
        if (matchState[s] !== -1 && ci < crystals.length) {
          const cr = crystals[ci];
          cr.si = s;
          cr.ci = matchState[s];
          cr.matched = true;
          // Rank satisfaction: lower index in pref list = better
          const rank = studentPrefs[s].indexOf(matchState[s]);
          cr.satRank = rank;
          cr.armLen = 0.4 + (1 - rank / N) * 0.6;
          cr.branches = 2 + Math.min(5, studentNext[s]);
          cr.hue = 200 + rank * 5;
          ci++;
        }
      }
      // Unmatched crystals
      for (let i = ci; i < crystals.length; i++) {
        crystals[i].matched = false;
        crystals[i].hue = 0;
      }
    }

    function drawArm(cx, cy, angle, len, branches, depth) {
      if (depth > 3 || len < 3) return;
      const ex = cx + Math.cos(angle) * len;
      const ey = cy + Math.sin(angle) * len;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(ex, ey);
      ctx.stroke();

      if (depth < 2) {
        const branchLen = len * 0.45;
        const step = len / (branches + 1);
        for (let b = 1; b <= branches; b++) {
          const frac = b / (branches + 1);
          const bx = cx + Math.cos(angle) * len * frac;
          const by = cy + Math.sin(angle) * len * frac;
          drawArm(bx, by, angle - Math.PI / 4, branchLen, Math.max(1, branches - 1), depth + 1);
          drawArm(bx, by, angle + Math.PI / 4, branchLen, Math.max(1, branches - 1), depth + 1);
        }
      }
      // Tip decoration
      ctx.beginPath();
      ctx.arc(ex, ey, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawCrystal(cr, t) {
      const g = Math.min(cr.growth, 1);
      if (g < 0.01) return;
      const r = cr.maxR * cr.armLen * g;

      ctx.save();
      if (cr.matched) {
        const alpha = 0.6 + 0.3 * Math.sin(t * 2 + cr.ci);
        ctx.strokeStyle = `hsla(${cr.hue}, 70%, 80%, ${alpha})`;
        ctx.fillStyle = `hsla(${cr.hue}, 70%, 85%, ${alpha})`;
      } else {
        ctx.strokeStyle = 'rgba(150,150,160,0.4)';
        ctx.fillStyle = 'rgba(150,150,160,0.3)';
      }
      ctx.lineWidth = 1.5;

      // 6 arms for hexagonal symmetry
      for (let a = 0; a < 6; a++) {
        const angle = a * Math.PI / 3 - Math.PI / 2;
        drawArm(cr.cx, cr.cy, angle, r, cr.branches, 0);
      }

      // Center hex
      ctx.beginPath();
      for (let a = 0; a < 6; a++) {
        const angle = a * Math.PI / 3 - Math.PI / 2;
        const px = cr.cx + Math.cos(angle) * r * 0.15;
        const py = cr.cy + Math.sin(angle) * r * 0.15;
        a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.fill();

      // Sparkles
      if (cr.matched && g > 0.9) {
        for (let i = 0; i < 3; i++) {
          const sa = Math.random() * Math.PI * 2;
          const sd = Math.random() * r;
          const sx = cr.cx + Math.cos(sa) * sd;
          const sy = cr.cy + Math.sin(sa) * sd;
          const sp = 0.3 + 0.6 * Math.random();
          ctx.fillStyle = `rgba(255,255,255,${sp * Math.sin(t * 5 + i) * 0.5 + 0.5})`;
          ctx.beginPath();
          ctx.arc(sx, sy, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Label
      ctx.fillStyle = cr.matched ? '#c9d1d9' : '#484f58';
      ctx.font = '10px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      if (cr.matched) {
        ctx.fillText('S' + (cr.si + 1) + '–C' + (cr.ci + 1), cr.cx, cr.cy + cr.maxR * 0.55);
      }
      ctx.restore();
    }

    // Falling snow
    function initSnow() {
      for (let i = 0; i < 40; i++) {
        snowflakes.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: 0.5 + Math.random() * 1.5,
          vy: 0.2 + Math.random() * 0.5,
          vx: (Math.random() - 0.5) * 0.3,
          alpha: 0.15 + Math.random() * 0.25
        });
      }
    }

    function updateSnow() {
      for (const s of snowflakes) {
        s.y += s.vy;
        s.x += s.vx;
        if (s.y > H + 5) { s.y = -5; s.x = Math.random() * W; }
        if (s.x < -5) s.x = W + 5;
        if (s.x > W + 5) s.x = -5;
      }
    }

    function drawSnow() {
      for (const s of snowflakes) {
        ctx.fillStyle = `rgba(200,220,255,${s.alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      init();
      initSnow();
    }

    let timer = 0;
    const t0 = performance.now();

    function animate() {
      const t = (performance.now() - t0) / 1000;
      timer++;

      if (timer % 100 === 0 && !algoDone) gsStep();

      // Grow crystals
      for (const cr of crystals) {
        if (cr.matched && cr.growth < 1) cr.growth += 0.006;
      }

      updateSnow();

      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, W, H);

      drawSnow();
      for (const cr of crystals) drawCrystal(cr, t);

      // Status
      const matched = matchState.filter(m => m !== -1).length;
      ctx.fillStyle = '#8b949e';
      ctx.font = '12px "Segoe UI", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(algoDone ? 'All crystals grown — ' + matched + ' pairs' : 'Growing... round ' + roundCount, W - 20, H - 16);

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    animate();
  </script>
</body>
</html>
