<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topological Morphing</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e6edf3; font-family:'Nunito',sans-serif; overflow:hidden; }
.back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
.back-link:hover { background:#30363d; }
.info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
.info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
.info p { font-size:12px; color:#8b949e; line-height:1.4; }
#morph-label { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); font-family:'Lora',serif; font-size:18px; z-index:50; transition:color 0.3s; }
</style>
</head>
<body>
<a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
<div class="info">
<h2>Topological Morphing</h2>
<p>Morphing between the topological shapes of the men-optimal and women-optimal matchings. The journey through morph-space reveals the lattice structure.</p>
</div>
<div id="morph-label"></div>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x0d1117);
document.body.appendChild(renderer.domElement);

const morphLabel = document.getElementById('morph-label');

// Two torus knot states
const pStart = 2, qStart = 3;  // men-optimal
const pEnd = 3, qEnd = 5;      // women-optimal

// We'll regenerate geometry each frame with interpolated parameters
let currentMesh = null;
let currentWire = null;

const solidMat = new THREE.MeshPhongMaterial({
    color: 0x3fb950,
    transparent: true,
    opacity: 0.6,
    shininess: 80,
    side: THREE.DoubleSide
});

const wireMat = new THREE.MeshBasicMaterial({
    color: 0x58a6ff,
    wireframe: true,
    transparent: true,
    opacity: 0.3
});

// Lighting
const ambLight = new THREE.AmbientLight(0x334455, 0.6);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(3, 3, 5);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0xd2a8ff, 0.4, 10);
pointLight.position.set(-2, -2, 3);
scene.add(pointLight);

// Parametric torus knot function
function torusKnotPoint(u, p, q, radius, tube) {
    u = u * Math.PI * 2;
    const cu = Math.cos(u), su = Math.sin(u);
    const quOverP = q / p * u;
    const r = radius * (2 + Math.cos(quOverP));
    return new THREE.Vector3(
        r * cu,
        r * su,
        -radius * tube * Math.sin(quOverP)
    ).multiplyScalar(0.4);
}

function createTorusKnot(p, q) {
    // Use THREE.js built-in with integer-ish params
    const rp = Math.round(p);
    const rq = Math.round(q);
    return new THREE.TorusKnotGeometry(1, 0.3, 200, 32, rp, rq);
}

let t = 0;
function animate() {
    requestAnimationFrame(animate);
    t += 0.008;

    // Sinusoidal morph between states
    const morph = (Math.sin(t) + 1) / 2; // 0 to 1

    const p = pStart + (pEnd - pStart) * morph;
    const q = qStart + (qEnd - qStart) * morph;

    // Recreate geometry (can use integer-snapped for stability)
    // Smooth interpolation using fractional approximation
    if (currentMesh) scene.remove(currentMesh);
    if (currentWire) scene.remove(currentWire);

    const geo = new THREE.TorusKnotGeometry(1, 0.3, 200, 32, Math.round(p * 2) / 2 > 2.4 ? 3 : 2, Math.round(q));

    // Color interpolation
    const r = 0.25 + morph * 0.48;
    const g = 0.73 - morph * 0.2;
    const b = 0.31 + morph * 0.69;
    solidMat.color.setRGB(r, g, b);

    currentMesh = new THREE.Mesh(geo, solidMat);
    currentWire = new THREE.Mesh(geo, wireMat);

    scene.add(currentMesh);
    scene.add(currentWire);

    // Auto-rotate
    const rotY = t * 0.5;
    const rotX = Math.sin(t * 0.3) * 0.3;
    currentMesh.rotation.set(rotX, rotY, 0);
    currentWire.rotation.set(rotX, rotY, 0);

    // Scale pulse
    const scale = 1 + 0.05 * Math.sin(t * 2);
    currentMesh.scale.setScalar(scale);
    currentWire.scale.setScalar(scale);

    // Label
    if (morph < 0.3) {
        morphLabel.textContent = 'Men-Optimal Topology';
        morphLabel.style.color = '#3fb950';
    } else if (morph > 0.7) {
        morphLabel.textContent = 'Women-Optimal Topology';
        morphLabel.style.color = '#d2a8ff';
    } else {
        morphLabel.textContent = 'Traversing Lattice...';
        morphLabel.style.color = '#e3b341';
    }

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
