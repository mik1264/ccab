<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crystalline Matching Lattice — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">&#8592; Visual Gallery</a>
  <div class="info"><h2>Crystalline Matching Lattice</h2><p>The lattice of all stable matchings forms a crystal structure. Each node is a stable matching; edges are rotations that transform one to another.</p></div>
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1117);
    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(5, 4, 7);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    scene.add(new THREE.AmbientLight(0x222244, 0.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const latticeGroup = new THREE.Group();
    scene.add(latticeGroup);

    // Lattice structure: cube vertices represent stable matchings
    // 8 vertices of a cube, 3 highlighted as special matchings
    const cubeSize = 2.5;
    const vertices = [];
    for (let x = -1; x <= 1; x += 2) {
      for (let y = -1; y <= 1; y += 2) {
        for (let z = -1; z <= 1; z += 2) {
          vertices.push(new THREE.Vector3(x * cubeSize, y * cubeSize, z * cubeSize));
        }
      }
    }

    // Cube edges (indices)
    const edges = [
      [0,1],[0,2],[0,4],[1,3],[1,5],[2,3],[2,6],[3,7],[4,5],[4,6],[5,7],[6,7]
    ];

    // Special matchings: men-optimal (top), women-optimal (bottom), intermediate
    const specialIndices = {
      0: { color: 0x00ff66, emissive: 0x00cc44, label: 'Men-optimal', size: 0.45 },
      7: { color: 0xbb44ff, emissive: 0x9922dd, label: 'Women-optimal', size: 0.45 },
      3: { color: 0xffdd00, emissive: 0xccaa00, label: 'Intermediate', size: 0.4 }
    };

    // Create lattice nodes
    const nodeMeshes = [];
    vertices.forEach((v, i) => {
      const isSpecial = specialIndices[i];
      const radius = isSpecial ? isSpecial.size : 0.2;
      const geo = new THREE.SphereGeometry(radius, 32, 32);
      const color = isSpecial ? isSpecial.color : 0x445566;
      const emissive = isSpecial ? isSpecial.emissive : 0x223344;
      const mat = new THREE.MeshPhongMaterial({
        color: color,
        emissive: emissive,
        emissiveIntensity: isSpecial ? 0.8 : 0.3,
        shininess: 100,
        transparent: true,
        opacity: isSpecial ? 1.0 : 0.7
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(v);
      latticeGroup.add(mesh);
      nodeMeshes.push(mesh);

      if (isSpecial) {
        // Glow halo
        const haloGeo = new THREE.SphereGeometry(radius * 1.8, 32, 32);
        const haloMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.12 });
        const halo = new THREE.Mesh(haloGeo, haloMat);
        halo.position.copy(v);
        latticeGroup.add(halo);

        const pl = new THREE.PointLight(color, 0.8, 6);
        pl.position.copy(v);
        latticeGroup.add(pl);
      }
    });

    // Create lattice edges as glowing tubes
    edges.forEach(([a, b]) => {
      const start = vertices[a];
      const end = vertices[b];
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      const curve = new THREE.CatmullRomCurve3([start, mid, end]);
      const tubeGeo = new THREE.TubeGeometry(curve, 16, 0.03, 8, false);

      const hasSpecial = specialIndices[a] || specialIndices[b];
      const edgeColor = hasSpecial ? 0x4488aa : 0x334455;
      const tubeMat = new THREE.MeshPhongMaterial({
        color: edgeColor,
        emissive: edgeColor,
        emissiveIntensity: 0.4,
        transparent: true,
        opacity: hasSpecial ? 0.7 : 0.35
      });
      latticeGroup.add(new THREE.Mesh(tubeGeo, tubeMat));
    });

    // Floating crystal particles
    const particleCount = 800;
    const particleGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      pPos[i*3] = (Math.random() - 0.5) * 16;
      pPos[i*3+1] = (Math.random() - 0.5) * 16;
      pPos[i*3+2] = (Math.random() - 0.5) * 16;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const particleMat = new THREE.PointsMaterial({ color: 0x4488aa, size: 0.04, transparent: true, opacity: 0.4 });
    latticeGroup.add(new THREE.Points(particleGeo, particleMat));

    function animate(t) {
      requestAnimationFrame(animate);
      const time = t * 0.001;

      // Camera orbit
      camera.position.x = Math.sin(time * 0.2) * 8;
      camera.position.z = Math.cos(time * 0.2) * 8;
      camera.position.y = Math.sin(time * 0.12) * 3 + 2;
      camera.lookAt(0, 0, 0);

      // Slow lattice rotation
      latticeGroup.rotation.y = time * 0.05;
      latticeGroup.rotation.x = Math.sin(time * 0.08) * 0.1;

      // Pulse special nodes
      [0, 3, 7].forEach((idx, i) => {
        const scale = 1 + Math.sin(time * 2 + i * 2) * 0.15;
        nodeMeshes[idx].scale.setScalar(scale);
      });

      renderer.render(scene, camera);
    }
    animate(0);
  </script>
</body>
</html>
