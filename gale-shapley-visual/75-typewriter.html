<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Typewriter Algorithm — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Typewriter Algorithm</h2><p>The Gale-Shapley algorithm typed out in real-time as if on a vintage typewriter — proposals, rejections, and acceptances printed one character at a time.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    const N = 5;
    const menNames = ['Man-1','Man-2','Man-3','Man-4','Man-5'];
    const womenNames = ['Woman-1','Woman-2','Woman-3','Woman-4','Woman-5'];

    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

    const menPrefs = menNames.map(()=>shuffle([0,1,2,3,4]));
    const womenPrefs = womenNames.map(()=>shuffle([0,1,2,3,4]));
    const womenRank = womenPrefs.map(p=>{const r=[];p.forEach((m,i)=>r[m]=i);return r;});

    // Run GS
    const events = [];
    const menNext = Array(N).fill(0);
    const womenPartner = Array(N).fill(-1);
    const menFree = Array(N).fill(true);
    let free = N;
    let round = 0;
    while (free > 0) {
      round++;
      let anyProposal = false;
      for (let m = 0; m < N; m++) {
        if (!menFree[m] || menNext[m] >= N) continue;
        anyProposal = true;
        const w = menPrefs[m][menNext[m]]; menNext[m]++;
        if (womenPartner[w] === -1) {
          womenPartner[w] = m; menFree[m] = false; free--;
          events.push({round, m, w, accepted: true, displaced: -1});
        } else {
          const c = womenPartner[w];
          if (womenRank[w][m] < womenRank[w][c]) {
            womenPartner[w] = m; menFree[m] = false; menFree[c] = true;
            events.push({round, m, w, accepted: true, displaced: c});
          } else {
            events.push({round, m, w, accepted: false, displaced: -1});
          }
        }
      }
      if (!anyProposal) break;
    }

    // Build text lines
    const lines = [];
    lines.push({text: '=== GALE-SHAPLEY ALGORITHM ===', color: '#58a6ff'});
    lines.push({text: '', color: '#8b949e'});

    let lastRound = 0;
    for (const e of events) {
      if (e.round !== lastRound) {
        lines.push({text: '', color: '#8b949e'});
        lines.push({text: '--- Round ' + e.round + ' ---', color: '#fbbf24'});
        lastRound = e.round;
      }
      const proposalText = menNames[e.m] + ' proposes to ' + womenNames[e.w] + '...';
      if (e.accepted) {
        let resultText = '  ACCEPTED';
        if (e.displaced >= 0) {
          resultText += ' (displaces ' + menNames[e.displaced] + ')';
        }
        lines.push({text: proposalText, color: '#c9d1d9'});
        lines.push({text: resultText, color: '#4ade80'});
      } else {
        lines.push({text: proposalText, color: '#c9d1d9'});
        lines.push({text: '  REJECTED', color: '#ef4444'});
      }
    }

    lines.push({text: '', color: '#8b949e'});
    lines.push({text: '=== STABLE MATCHING COMPLETE ===', color: '#4ade80'});
    lines.push({text: '', color: '#8b949e'});
    for (let w = 0; w < N; w++) {
      if (womenPartner[w] >= 0) {
        lines.push({text: '  ' + menNames[womenPartner[w]] + ' <-> ' + womenNames[w], color: '#c084fc'});
      }
    }

    // Typing state
    let currentLine = 0;
    let currentChar = 0;
    let charTimer = 0;
    const baseCharDelay = 0.025;
    let displayedLines = [];
    let cursorBlink = 0;
    let scrollOffset = 0;
    let lastTime = performance.now();

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      // Paper background
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Paper texture lines
      ctx.strokeStyle = 'rgba(88,166,255,0.03)';
      ctx.lineWidth = 1;
      for (let y = 0; y < canvas.height; y += 24) {
        ctx.beginPath();
        ctx.moveTo(40, y);
        ctx.lineTo(canvas.width - 40, y);
        ctx.stroke();
      }

      // Left margin line
      ctx.strokeStyle = 'rgba(239,68,68,0.15)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(60, 0);
      ctx.lineTo(60, canvas.height);
      ctx.stroke();

      // Type characters
      if (currentLine < lines.length) {
        charTimer += dt;
        const delay = baseCharDelay + Math.random() * 0.015;
        if (charTimer >= delay) {
          charTimer = 0;
          if (currentChar < lines[currentLine].text.length) {
            currentChar++;
          } else {
            // Line complete
            displayedLines.push({
              text: lines[currentLine].text,
              color: lines[currentLine].color
            });
            currentLine++;
            currentChar = 0;
          }
        }
      }

      // Calculate scroll
      const lineHeight = 22;
      const maxVisibleLines = Math.floor((canvas.height - 80) / lineHeight);
      const totalDisplayed = displayedLines.length + 1;
      if (totalDisplayed > maxVisibleLines) {
        const targetScroll = (totalDisplayed - maxVisibleLines) * lineHeight;
        scrollOffset += (targetScroll - scrollOffset) * 5 * dt;
      }

      // Draw displayed lines
      ctx.save();
      ctx.beginPath();
      ctx.rect(0, 40, canvas.width, canvas.height - 80);
      ctx.clip();

      const startY = 60 - scrollOffset;
      for (let i = 0; i < displayedLines.length; i++) {
        const y = startY + i * lineHeight;
        if (y < 20 || y > canvas.height) continue;
        ctx.fillStyle = displayedLines[i].color;
        ctx.font = '14px "JetBrains Mono"';
        ctx.textAlign = 'left';
        ctx.fillText(displayedLines[i].text, 70, y);
      }

      // Current line being typed
      if (currentLine < lines.length) {
        const y = startY + displayedLines.length * lineHeight;
        const partialText = lines[currentLine].text.substring(0, currentChar);
        ctx.fillStyle = lines[currentLine].color;
        ctx.font = '14px "JetBrains Mono"';
        ctx.textAlign = 'left';
        ctx.fillText(partialText, 70, y);

        // Cursor
        cursorBlink += dt;
        if (Math.sin(cursorBlink * 6) > 0) {
          const textWidth = ctx.measureText(partialText).width;
          ctx.fillStyle = '#c9d1d9';
          ctx.fillRect(70 + textWidth + 1, y - 12, 8, 16);
        }
      }

      ctx.restore();

      // Header
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, 40);
      ctx.fillStyle = '#484f58';
      ctx.font = '11px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.fillText('GALE-SHAPLEY TYPEWRITER  |  Line ' + (currentLine+1) + '/' + lines.length, canvas.width/2, 25);

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
