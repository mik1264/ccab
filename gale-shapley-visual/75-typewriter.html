<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typewriter — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; }
    .back { position: fixed; top: 16px; left: 16px; background: rgba(13,17,23,0.85); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; }
    .back:hover { background: #30363d; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 8;
    const COLS = 40; // number of falling columns
    let columns = [];
    let fontSize;
    let colWidth;

    // DA state
    let studentPrefs = [];
    let schoolPrefs = [];
    let studentNext = [];
    let schoolMatch = [];
    let studentMatch = [];
    let freeStudents = [];
    let algoDone = false;
    let daRound = 0;
    let roundTimer = 0;
    let roundDisplay = 0;

    // Visual state
    let lockedCols = new Set(); // columns that are "locked" (matched)
    let rejectFlashes = []; // {col, row, timer}

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      textFont('monospace');
      computeLayout();
      initColumns();
      initDA();
    }

    function computeLayout() {
      fontSize = max(12, min(width, height) / 50);
      colWidth = width / COLS;
    }

    function initColumns() {
      columns = [];
      for (let i = 0; i < COLS; i++) {
        let chars = [];
        let numChars = ceil(height / fontSize) + 10;
        for (let j = 0; j < numChars; j++) {
          chars.push({
            ch: randomSymbol(),
            y: j * fontSize - random(height),
            speed: random(1.5, 4),
            hue: 130, // green
            sat: 60,
            bri: random(30, 65),
            alpha: random(40, 75),
            locked: false,
            flashTimer: 0,
            flashHue: 0
          });
        }
        columns.push({
          x: i * colWidth + colWidth / 2,
          chars: chars,
          locked: false,
          studentIdx: i % N, // map column to a student
          lockHue: 42 // gold when locked
        });
      }
    }

    function randomSymbol() {
      let symbols = '0123456789ABCDEFabcdef><{}[]|/\\*+-.=~^';
      return symbols[floor(random(symbols.length))];
    }

    function initDA() {
      studentPrefs = [];
      schoolPrefs = [];
      studentNext = [];
      schoolMatch = new Array(N).fill(-1);
      studentMatch = new Array(N).fill(-1);
      freeStudents = [];
      algoDone = false;
      daRound = 0;
      roundDisplay = 0;
      lockedCols = new Set();
      rejectFlashes = [];

      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffled(N));
        schoolPrefs.push(shuffled(N));
        studentNext.push(0);
        freeStudents.push(i);
      }
    }

    function shuffled(n) {
      let arr = [];
      for (let i = 0; i < n; i++) arr.push(i);
      for (let i = arr.length - 1; i > 0; i--) {
        let j = floor(random(i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function stepDA() {
      if (freeStudents.length === 0) {
        algoDone = true;
        // Lock matched columns
        for (let i = 0; i < N; i++) {
          if (studentMatch[i] >= 0) {
            // Lock columns associated with this student
            for (let c = 0; c < COLS; c++) {
              if (columns[c].studentIdx === i) {
                columns[c].locked = true;
                lockedCols.add(c);
              }
            }
          }
        }
        return;
      }

      let student = freeStudents[0];
      if (studentNext[student] >= N) {
        freeStudents.shift();
        return;
      }

      let school = studentPrefs[student][studentNext[student]];
      studentNext[student]++;
      daRound++;
      roundDisplay++;

      // Update column symbols to show current proposal target
      for (let c = 0; c < COLS; c++) {
        if (columns[c].studentIdx === student && !columns[c].locked) {
          // Briefly make symbols show the target school number
          let chars = columns[c].chars;
          for (let j = 0; j < min(3, chars.length); j++) {
            let idx = floor(random(chars.length));
            chars[idx].ch = String(school);
          }
        }
      }

      if (schoolMatch[school] === -1) {
        schoolMatch[school] = student;
        studentMatch[student] = school;
        freeStudents.shift();
      } else {
        let current = schoolMatch[school];
        if (schoolPrefs[school].indexOf(student) < schoolPrefs[school].indexOf(current)) {
          studentMatch[current] = -1;
          freeStudents.push(current);
          schoolMatch[school] = student;
          studentMatch[student] = school;
          freeStudents.shift();

          // Red flash on rejected student's columns
          for (let c = 0; c < COLS; c++) {
            if (columns[c].studentIdx === current) {
              for (let ch of columns[c].chars) {
                ch.flashTimer = 30;
                ch.flashHue = 0; // red
              }
            }
          }
        } else {
          // Flash red on proposing student's columns (rejection)
          for (let c = 0; c < COLS; c++) {
            if (columns[c].studentIdx === student) {
              for (let ch of columns[c].chars) {
                ch.flashTimer = 20;
                ch.flashHue = 0;
              }
            }
          }
        }
      }
    }

    function draw() {
      // Semi-transparent background for trail effect
      background(220, 50, 5, 35);

      roundTimer++;
      if (!algoDone && roundTimer % 20 === 0) {
        stepDA();
      }

      textSize(fontSize);
      textAlign(CENTER, CENTER);

      for (let col of columns) {
        for (let ch of col.chars) {
          if (!col.locked) {
            ch.y += ch.speed;
            if (ch.y > height + fontSize) {
              ch.y = -fontSize * 2;
              ch.ch = randomSymbol();
              ch.speed = random(1.5, 4);
              ch.bri = random(30, 65);
            }
          } else {
            // Locked: slow to stop
            ch.speed = lerp(ch.speed, 0, 0.05);
            ch.y += ch.speed;
          }

          // Determine color
          let h, s, b, a;
          if (ch.flashTimer > 0) {
            ch.flashTimer--;
            h = ch.flashHue;
            s = 80;
            b = 80;
            a = 80;
          } else if (col.locked) {
            // Golden locked columns
            h = 42;
            s = 65;
            b = 75 + sin(frameCount * 0.05 + ch.y * 0.03) * 15;
            a = 85;
          } else {
            // Green falling code
            h = 130;
            s = ch.sat;
            b = ch.bri;
            a = ch.alpha;
            // Leading chars brighter
            if (ch.y > 0 && ch.y < height * 0.05) {
              b = 90;
              a = 90;
            }
          }

          fill(h, s, b, a);
          noStroke();
          text(ch.ch, col.x, ch.y);
        }
      }

      // Round counter (minimal)
      if (!algoDone) {
        fill(130, 40, 50, 40);
        textSize(fontSize * 0.9);
        textAlign(LEFT, TOP);
        text('Round ' + roundDisplay, 16, height - 36);
      } else {
        // Show "STABLE" in golden
        let pulse = sin(frameCount * 0.03) * 10 + 70;
        fill(42, 60, pulse, 50);
        textSize(fontSize * 0.9);
        textAlign(LEFT, TOP);
        text('STABLE', 16, height - 36);
      }

      // Restart cycle after long pause
      if (algoDone && roundTimer > daRound * 20 + 500) {
        initColumns();
        initDA();
        roundTimer = 0;
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      computeLayout();
    }
  </script>
</body>
</html>
