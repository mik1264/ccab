<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Magnetic Preference Field — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Interactive Magnetic Preference Field</h2><p>Click/drag to move agents — watch magnetic field lines between them reorganize. Matched pairs attract; same-side agents repel. Find the stable configuration!</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const N = 5;
    const manColors = ['#58a6ff','#3b82f6','#60a5fa','#93c5fd','#2563eb'];
    const womanColors = ['#f87171','#ef4444','#dc2626','#b91c1c','#991b1b'];
    const matching = [0,1,2,3,4];

    class Magnet {
      constructor(x, y, type, index) {
        this.x = x; this.y = y;
        this.type = type;
        this.index = index;
        this.charge = type === 'man' ? 1 : -1;
        this.strength = 1;
      }
    }

    let magnets = [];
    let dragMagnet = null;

    function init() {
      magnets = [];
      const w = canvas.width, h = canvas.height;
      for (let i = 0; i < N; i++) {
        magnets.push(new Magnet(
          w * 0.2 + Math.random() * w * 0.15,
          h * (0.15 + 0.7 * i / (N - 1)),
          'man', i
        ));
        magnets.push(new Magnet(
          w * 0.65 + Math.random() * w * 0.15,
          h * (0.15 + 0.7 * i / (N - 1)),
          'woman', i
        ));
      }
    }

    init();
    window.addEventListener('resize', () => { resize(); init(); });

    canvas.addEventListener('mousedown', e => {
      for (const m of magnets) {
        const dx = e.clientX - m.x, dy = e.clientY - m.y;
        if (dx*dx + dy*dy < 900) { dragMagnet = m; break; }
      }
    });
    canvas.addEventListener('mousemove', e => {
      if (dragMagnet) { dragMagnet.x = e.clientX; dragMagnet.y = e.clientY; }
    });
    canvas.addEventListener('mouseup', () => { dragMagnet = null; });
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const touch = e.touches[0];
      for (const m of magnets) {
        const dx = touch.clientX - m.x, dy = touch.clientY - m.y;
        if (dx*dx + dy*dy < 1600) { dragMagnet = m; break; }
      }
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (dragMagnet) { dragMagnet.x = e.touches[0].clientX; dragMagnet.y = e.touches[0].clientY; }
    });
    canvas.addEventListener('touchend', () => { dragMagnet = null; });

    // Compute field at point
    function fieldAt(px, py) {
      let fx = 0, fy = 0;
      for (const m of magnets) {
        const dx = px - m.x, dy = py - m.y;
        const r2 = dx*dx + dy*dy;
        if (r2 < 100) continue;
        const r = Math.sqrt(r2);
        const str = m.charge * m.strength / r2;
        fx += str * dx / r;
        fy += str * dy / r;

        // Extra attraction for matched pairs
        if (m.type === 'man') {
          const partner = magnets.find(o => o.type === 'woman' && o.index === matching[m.index]);
          if (partner) {
            const pdx = px - partner.x, pdy = py - partner.y;
            const pr2 = pdx*pdx + pdy*pdy;
            if (pr2 > 100) {
              const pStr = 0.3 / pr2;
              fx += pStr * pdx / Math.sqrt(pr2);
              fy += pStr * pdy / Math.sqrt(pr2);
            }
          }
        }
      }
      return { x: fx, y: fy };
    }

    let t = 0, dt = 1/60;
    function loop() {
      requestAnimationFrame(loop);
      t += dt;
      render();
    }

    function render() {
      const w = canvas.width, h = canvas.height;
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, w, h);

      // Draw field as background color grid
      const step = 12;
      for (let y = 0; y < h; y += step) {
        for (let x = 0; x < w; x += step) {
          const f = fieldAt(x + step/2, y + step/2);
          const mag = Math.sqrt(f.x*f.x + f.y*f.y);
          const intensity = Math.min(1, mag * 50);

          // Color by dominant charge influence
          let blueInfluence = 0, redInfluence = 0;
          for (const m of magnets) {
            const dx = x - m.x, dy = y - m.y;
            const r2 = dx*dx + dy*dy;
            const inf = 1 / (r2 + 1000);
            if (m.type === 'man') blueInfluence += inf;
            else redInfluence += inf;
          }
          const ratio = blueInfluence / (blueInfluence + redInfluence + 0.0001);

          const r = Math.floor(13 + (1 - ratio) * intensity * 80);
          const g = Math.floor(17 + intensity * 15);
          const b = Math.floor(23 + ratio * intensity * 80);

          ctx.fillStyle = `rgb(${r},${g},${b})`;
          ctx.fillRect(x, y, step, step);
        }
      }

      // Draw field lines (streamlines from each magnet)
      ctx.lineWidth = 1;
      for (const m of magnets) {
        const numLines = 8;
        for (let i = 0; i < numLines; i++) {
          const startAngle = (i / numLines) * Math.PI * 2;
          let px = m.x + Math.cos(startAngle) * 25;
          let py = m.y + Math.sin(startAngle) * 25;

          ctx.beginPath();
          ctx.moveTo(px, py);

          const dir = m.charge;
          let valid = true;
          for (let step = 0; step < 150; step++) {
            const f = fieldAt(px, py);
            const mag = Math.sqrt(f.x*f.x + f.y*f.y);
            if (mag < 0.0001) { valid = false; break; }

            px += (f.x / mag) * 4 * dir;
            py += (f.y / mag) * 4 * dir;

            if (px < 0 || px > w || py < 0 || py > h) break;

            // Stop near another magnet
            let nearOther = false;
            for (const o of magnets) {
              if (o === m) continue;
              const dx = px - o.x, dy = py - o.y;
              if (dx*dx + dy*dy < 400) { nearOther = true; break; }
            }
            if (nearOther) { ctx.lineTo(px, py); break; }

            ctx.lineTo(px, py);
          }

          const isMatched = m.type === 'man';
          const alpha = 0.25 + Math.sin(t * 2 + i) * 0.1;
          ctx.strokeStyle = m.type === 'man'
            ? `rgba(88,166,255,${alpha})`
            : `rgba(248,113,113,${alpha})`;
          ctx.stroke();
        }
      }

      // Draw connection lines for matched pairs
      for (let i = 0; i < N; i++) {
        const man = magnets.find(m => m.type === 'man' && m.index === i);
        const woman = magnets.find(m => m.type === 'woman' && m.index === matching[i]);
        if (!man || !woman) continue;

        const dx = woman.x - man.x, dy = woman.y - man.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const strength = Math.min(1, 200 / dist);

        ctx.strokeStyle = `rgba(255,215,0,${strength * 0.4})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(man.x, man.y);
        ctx.lineTo(woman.x, woman.y);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Draw magnets
      for (const m of magnets) {
        const isMan = m.type === 'man';
        const color = isMan ? manColors[m.index] : womanColors[m.index];

        // Glow
        ctx.beginPath();
        ctx.arc(m.x, m.y, 28, 0, Math.PI * 2);
        const glow = ctx.createRadialGradient(m.x, m.y, 8, m.x, m.y, 28);
        glow.addColorStop(0, color + '60');
        glow.addColorStop(1, color + '00');
        ctx.fillStyle = glow;
        ctx.fill();

        // Body
        ctx.beginPath();
        ctx.arc(m.x, m.y, 16, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(m.x - 3, m.y - 3, 2, m.x, m.y, 16);
        grad.addColorStop(0, '#fff');
        grad.addColorStop(0.35, color);
        grad.addColorStop(1, color + '80');
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Label
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px Nunito';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(isMan ? 'M'+(m.index+1) : 'W'+(m.index+1), m.x, m.y);

        // Polarity indicator
        ctx.fillStyle = color;
        ctx.font = 'bold 12px Nunito';
        ctx.fillText(isMan ? '+' : '-', m.x, m.y - 22);
      }

      // Instructions
      ctx.fillStyle = '#484f58';
      ctx.font = '500 11px Nunito';
      ctx.textAlign = 'center';
      ctx.fillText('Drag magnets to see field lines reorganize', w/2, h - 20);
    }

    loop();
  </script>
</body>
</html>
