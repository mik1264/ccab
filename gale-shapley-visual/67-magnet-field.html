<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Field — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background: #30363d; }
    .info { position:fixed;top:60px;left:16px;background:rgba(13,17,23,0.88);border:1px solid #30363d;border-radius:10px;padding:12px 16px;z-index:50;max-width:260px;backdrop-filter:blur(8px) }
    .info h2 { font-size:15px;color:#58a6ff;margin-bottom:4px }
    .info p { font-size:12px;color:#8b949e;line-height:1.4 }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div class="info">
    <h2>Magnetic Field</h2>
    <p>Students are positive poles (blue), schools are negative (red). Field lines flow between them — stable matches glow golden, thickness shows preference rank.</p>
  </div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const N = 8;
    let W, H;

    let students = [], schools = [];
    let studentPrefs = [], schoolPrefs = [];
    let studentNext = [], schoolCurrent = [], matchState = [];
    let algoDone = false;
    let fieldLines = [];
    let timer = 0;

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function init() {
      studentPrefs = []; schoolPrefs = [];
      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffle([...Array(N).keys()]));
        schoolPrefs.push(shuffle([...Array(N).keys()]));
      }
      studentNext = new Array(N).fill(0);
      schoolCurrent = new Array(N).fill(-1);
      matchState = new Array(N).fill(-1);
      algoDone = false;
      timer = 0;
      fieldLines = [];
      layoutPoles();
    }

    function layoutPoles() {
      const lx = W * 0.15, rx = W * 0.85;
      const spacing = (H - 140) / (N + 1);
      students = []; schools = [];
      for (let i = 0; i < N; i++) {
        students.push({ x: lx, y: 80 + spacing * (i + 1), label: 'S' + (i + 1) });
        schools.push({ x: rx, y: 80 + spacing * (i + 1), label: 'C' + (i + 1) });
      }
    }

    function gsStep() {
      if (algoDone) return;
      let any = false;
      for (let s = 0; s < N; s++) {
        if (matchState[s] !== -1) continue;
        if (studentNext[s] >= N) continue;
        any = true;
        const t = studentPrefs[s][studentNext[s]];
        studentNext[s]++;
        if (schoolCurrent[t] === -1) {
          schoolCurrent[t] = s;
          matchState[s] = t;
        } else {
          const cur = schoolCurrent[t];
          if (schoolPrefs[t].indexOf(s) < schoolPrefs[t].indexOf(cur)) {
            matchState[cur] = -1;
            schoolCurrent[t] = s;
            matchState[s] = t;
          }
        }
      }
      if (!any) algoDone = true;
      buildFieldLines();
    }

    function buildFieldLines() {
      fieldLines = [];
      for (let s = 0; s < N; s++) {
        for (let c = 0; c < N; c++) {
          const rank = studentPrefs[s].indexOf(c);
          const isMatch = matchState[s] === c;
          if (!isMatch && rank > 3) continue; // Only show top preferences + matches

          const sx = students[s].x, sy = students[s].y;
          const cx = schools[c].x, cy = schools[c].y;

          // Generate curved field line using control points
          const pts = [];
          const segments = 30;
          // Offset control points for curvature
          const spread = (rank - N / 2) * 15 + (Math.random() - 0.5) * 20;
          const midX = (sx + cx) * 0.5;
          const midY = (sy + cy) * 0.5 + spread;
          const cp1x = sx + (cx - sx) * 0.3;
          const cp1y = sy + (midY - sy) * 0.6;
          const cp2x = sx + (cx - sx) * 0.7;
          const cp2y = cy + (midY - cy) * 0.6;

          for (let i = 0; i <= segments; i++) {
            const t = i / segments;
            const t2 = t * t, t3 = t2 * t;
            const mt = 1 - t, mt2 = mt * mt, mt3 = mt2 * mt;
            pts.push({
              x: mt3 * sx + 3 * mt2 * t * cp1x + 3 * mt * t2 * cp2x + t3 * cx,
              y: mt3 * sy + 3 * mt2 * t * cp1y + 3 * mt * t2 * cp2y + t3 * cy
            });
          }

          fieldLines.push({
            pts, si: s, ci: c, rank,
            isMatch, thickness: isMatch ? 3 : Math.max(0.5, 2 - rank * 0.4),
            alpha: isMatch ? 0.9 : Math.max(0.1, 0.5 - rank * 0.1)
          });
        }
      }
    }

    function drawFieldLine(fl, t) {
      const pts = fl.pts;
      if (pts.length < 2) return;

      // Line color
      if (fl.isMatch) {
        const pulse = 0.6 + 0.35 * Math.sin(t * 3 + fl.si + fl.ci * 0.5);
        ctx.strokeStyle = `rgba(255,200,60,${pulse})`;
        ctx.lineWidth = fl.thickness + Math.sin(t * 4 + fl.si) * 0.8;
        ctx.shadowColor = '#ffc83c';
        ctx.shadowBlur = 6;
      } else {
        ctx.strokeStyle = `rgba(120,140,170,${fl.alpha * 0.5})`;
        ctx.lineWidth = fl.thickness;
        ctx.shadowBlur = 0;
        ctx.setLineDash([4, 6]);
      }

      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) {
        ctx.lineTo(pts[i].x, pts[i].y);
      }
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.shadowBlur = 0;

      // Arrowheads along matched lines
      if (fl.isMatch) {
        for (let k = 0; k < 3; k++) {
          const idx = Math.floor(pts.length * (0.25 + k * 0.25));
          if (idx < 1 || idx >= pts.length) continue;
          const px = pts[idx].x, py = pts[idx].y;
          const dx = pts[idx].x - pts[idx - 1].x;
          const dy = pts[idx].y - pts[idx - 1].y;
          const a = Math.atan2(dy, dx);
          const sz = 5;
          ctx.fillStyle = `rgba(255,200,60,${0.6 + 0.3 * Math.sin(t * 4 + k)})`;
          ctx.beginPath();
          ctx.moveTo(px + Math.cos(a) * sz, py + Math.sin(a) * sz);
          ctx.lineTo(px + Math.cos(a + 2.5) * sz * 0.6, py + Math.sin(a + 2.5) * sz * 0.6);
          ctx.lineTo(px + Math.cos(a - 2.5) * sz * 0.6, py + Math.sin(a - 2.5) * sz * 0.6);
          ctx.closePath();
          ctx.fill();
        }
      }
    }

    function drawPole(p, color, t) {
      const glow = 0.4 + 0.2 * Math.sin(t * 2);
      // Outer glow
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 25);
      grad.addColorStop(0, color.replace('1)', glow + ')'));
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 25, 0, Math.PI * 2);
      ctx.fill();

      // Core
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Label
      ctx.fillStyle = '#c9d1d9';
      ctx.font = '11px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.label, p.x, p.y - 18);
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      init();
    }

    const t0 = performance.now();

    function animate() {
      const t = (performance.now() - t0) / 1000;
      timer++;

      if (timer % 90 === 0 && !algoDone) gsStep();

      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, W, H);

      // Draw non-match lines first (behind)
      for (const fl of fieldLines) {
        if (!fl.isMatch) drawFieldLine(fl, t);
      }
      // Then match lines on top
      for (const fl of fieldLines) {
        if (fl.isMatch) drawFieldLine(fl, t);
      }

      // Poles
      for (const s of students) drawPole(s, 'rgba(88,166,255,1)', t);
      for (const c of schools) drawPole(c, 'rgba(248,81,73,1)', t);

      // + / - symbols
      ctx.font = 'bold 14px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      for (const s of students) {
        ctx.fillStyle = '#58a6ff';
        ctx.fillText('+', s.x, s.y + 5);
      }
      for (const c of schools) {
        ctx.fillStyle = '#f85149';
        ctx.fillText('−', c.x, c.y + 5);
      }

      const matched = matchState.filter(m => m !== -1).length;
      ctx.fillStyle = '#8b949e';
      ctx.font = '12px "Segoe UI", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(algoDone ? 'Stable field — ' + matched + ' pairs' : 'Aligning... ' + matched + '/' + N, W - 20, H - 16);

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    animate();
  </script>
</body>
</html>
