<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boids Seeking Their Match — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Nunito', sans-serif; }
    .back-link { position: fixed; top: 16px; left: 16px; background: rgba(22,27,34,0.9); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; transition: background 0.2s; }
    .back-link:hover { background: #30363d; }
    .info { position: fixed; top: 60px; left: 16px; background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 10px; padding: 12px 16px; z-index: 50; max-width: 280px; backdrop-filter: blur(8px); }
    .info h2 { font-family: 'Lora', serif; font-size: 15px; color: #58a6ff; margin-bottom: 4px; }
    .info p { font-size: 12px; color: #8b949e; line-height: 1.4; }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Visual Gallery</a>
  <div class="info">
    <h2>Boids Seeking Their Match</h2>
    <p>Boids flock toward their preferred partners. Matched pairs fly in formation; unmatched agents seek their next choice.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 10;
    let boids = [];
    let menPrefs = [], womenPrefs = [];
    let paired = []; // {m, w, figAngle}
    let matchedCount = 0;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(RGB);
      initSim();
    }

    function shuffleArr(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initSim() {
      boids = [];
      paired = [];
      matchedCount = 0;
      menPrefs = [];
      womenPrefs = [];

      for (let i = 0; i < N; i++) {
        menPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
        womenPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
      }

      for (let i = 0; i < N; i++) {
        boids.push({
          x: random(width * 0.1, width * 0.4),
          y: random(height * 0.1, height * 0.9),
          vx: random(-2, 2), vy: random(-2, 2),
          type: 'M', id: i, matched: false, matchedTo: -1,
          nextPref: 0
        });
      }
      for (let i = 0; i < N; i++) {
        boids.push({
          x: random(width * 0.6, width * 0.9),
          y: random(height * 0.1, height * 0.9),
          vx: random(-2, 2), vy: random(-2, 2),
          type: 'W', id: i, matched: false, matchedTo: -1,
          currentProposer: -1
        });
      }
    }

    function getBoid(type, id) {
      return boids.find(b => b.type === type && b.id === id);
    }

    function draw() {
      background(13, 17, 23, 35);

      // Update boids
      for (let b of boids) {
        if (b.matched) continue;

        let ax = 0, ay = 0;

        // Separation from same type
        for (let other of boids) {
          if (other === b) continue;
          let dx = b.x - other.x;
          let dy = b.y - other.y;
          let d = sqrt(dx * dx + dy * dy) || 1;
          if (d < 50) {
            ax += (dx / d) * 1.5;
            ay += (dy / d) * 1.5;
          }
        }

        // Preference attraction (for men)
        if (b.type === 'M') {
          let targetWId = menPrefs[b.id][b.nextPref % N];
          let target = getBoid('W', targetWId);
          if (target && !target.matched) {
            let dx = target.x - b.x;
            let dy = target.y - b.y;
            let d = sqrt(dx * dx + dy * dy) || 1;
            ax += (dx / d) * 2.5;
            ay += (dy / d) * 2.5;

            // Check for matching
            if (d < 30) {
              let wPrefRank = womenPrefs[targetWId].indexOf(b.id);
              if (target.currentProposer === -1 || wPrefRank < womenPrefs[targetWId].indexOf(target.currentProposer)) {
                if (target.currentProposer !== -1) {
                  let oldM = getBoid('M', target.currentProposer);
                  oldM.matched = false;
                  oldM.matchedTo = -1;
                  oldM.nextPref++;
                  paired = paired.filter(p => p.m !== target.currentProposer);
                  matchedCount--;
                }
                target.currentProposer = b.id;
                b.matched = true;
                b.matchedTo = targetWId;
                target.matched = true;
                target.matchedTo = b.id;
                paired.push({m: b.id, w: targetWId, figAngle: random(TWO_PI)});
                matchedCount++;
              } else {
                b.nextPref++;
              }
            }
          } else if (target && target.matched) {
            b.nextPref++;
          }
        }

        // Alignment with neighbors
        let avgVx = 0, avgVy = 0, neighbors = 0;
        for (let other of boids) {
          if (other === b || other.type !== b.type) continue;
          let d = dist(b.x, b.y, other.x, other.y);
          if (d < 100) {
            avgVx += other.vx;
            avgVy += other.vy;
            neighbors++;
          }
        }
        if (neighbors > 0) {
          ax += (avgVx / neighbors - b.vx) * 0.05;
          ay += (avgVy / neighbors - b.vy) * 0.05;
        }

        b.vx += ax * 0.1;
        b.vy += ay * 0.1;
        let spd = sqrt(b.vx * b.vx + b.vy * b.vy);
        let maxSpd = 3;
        if (spd > maxSpd) { b.vx = (b.vx / spd) * maxSpd; b.vy = (b.vy / spd) * maxSpd; }
        b.x += b.vx;
        b.y += b.vy;

        // Wrap edges
        if (b.x < -20) b.x = width + 20;
        if (b.x > width + 20) b.x = -20;
        if (b.y < -20) b.y = height + 20;
        if (b.y > height + 20) b.y = -20;
      }

      // Animate paired boids in figure-8
      for (let p of paired) {
        p.figAngle += 0.02;
        let mB = getBoid('M', p.m);
        let wB = getBoid('W', p.w);
        let cx = (mB.x + wB.x) / 2;
        let cy = (mB.y + wB.y) / 2;
        // Drift center
        cx += sin(frameCount * 0.005 + p.m) * 0.5;
        cy += cos(frameCount * 0.007 + p.w) * 0.5;

        let r = 25;
        mB.x = lerp(mB.x, cx + cos(p.figAngle) * r, 0.05);
        mB.y = lerp(mB.y, cy + sin(p.figAngle * 2) * r * 0.5, 0.05);
        wB.x = lerp(wB.x, cx + cos(p.figAngle + PI) * r, 0.05);
        wB.y = lerp(wB.y, cy + sin((p.figAngle + PI) * 2) * r * 0.5, 0.05);
      }

      // Draw trails and boids
      for (let b of boids) {
        let angle = atan2(b.vy, b.vx);
        push();
        translate(b.x, b.y);
        rotate(angle);

        if (b.type === 'M') {
          // Blue triangle boid
          noStroke();
          fill(88, 166, 255, b.matched ? 200 : 140);
          triangle(10, 0, -6, -5, -6, 5);
          fill(88, 166, 255, 40);
          ellipse(0, 0, 20, 20);
        } else {
          // Purple triangle boid
          noStroke();
          fill(188, 140, 255, b.matched ? 200 : 140);
          triangle(10, 0, -6, -5, -6, 5);
          fill(188, 140, 255, 40);
          ellipse(0, 0, 20, 20);
        }
        pop();
      }

      // Draw pair connections
      for (let p of paired) {
        let mB = getBoid('M', p.m);
        let wB = getBoid('W', p.w);
        stroke(63, 185, 80, 80);
        strokeWeight(1);
        line(mB.x, mB.y, wB.x, wB.y);
      }

      // Stats
      noStroke();
      fill(255, 180);
      textAlign(RIGHT, TOP);
      textSize(13);
      let satisfaction = matchedCount > 0 ? Math.round(matchedCount / N * 100) : 0;
      text('Matched: ' + matchedCount + '/' + N + '  (' + satisfaction + '%)', width - 20, 20);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
