<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preference Rank Bump Chart — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; color:#e6edf3; overflow:hidden; font-family:'Nunito',sans-serif; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
    svg text { font-family:'Nunito',sans-serif; }
    #viz { width:100vw; height:100vh; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Preference Rank Bump Chart</h2><p>A bump chart showing each man's effective 'rank received' per round of the DA algorithm. Watch rank improve as better matches are confirmed.</p></div>
  <div id="viz"></div>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select('#viz').append('svg').attr('width', W).attr('height', H);

    const menPrefs = {
      m1: ['w3','w1','w2','w4','w5'],
      m2: ['w1','w2','w3','w5','w4'],
      m3: ['w2','w3','w1','w4','w5'],
      m4: ['w3','w4','w1','w2','w5'],
      m5: ['w4','w5','w3','w1','w2']
    };
    const womenPrefs = {
      w1: ['m2','m1','m3','m4','m5'],
      w2: ['m3','m2','m1','m4','m5'],
      w3: ['m1','m3','m4','m2','m5'],
      w4: ['m4','m3','m5','m1','m2'],
      w5: ['m5','m4','m3','m2','m1']
    };

    const men = ['m1','m2','m3','m4','m5'];
    const manColors = { m1:'#58a6ff', m2:'#3fb950', m3:'#d2a8ff', m4:'#f0883e', m5:'#f778ba' };

    // Run DA and track which preference rank each man is proposing to each round
    function runDA() {
      const roundRanks = []; // Array of { m1: rank, m2: rank, ... }
      const free = new Set(men);
      const nextProp = {};
      const matched = {};
      const currentMatch = {}; // man -> woman currently matched
      men.forEach(m => nextProp[m] = 0);

      while (free.size > 0) {
        const toProcess = [...free];
        for (const m of toProcess) {
          const w = menPrefs[m][nextProp[m]];
          nextProp[m]++;
          const currentM = matched[w];
          if (!currentM) {
            matched[w] = m;
            currentMatch[m] = w;
            free.delete(m);
          } else if (womenPrefs[w].indexOf(m) < womenPrefs[w].indexOf(currentM)) {
            delete currentMatch[currentM];
            matched[w] = m;
            currentMatch[m] = w;
            free.delete(m);
            free.add(currentM);
          }
        }

        // Record ranks for this round
        const ranks = {};
        men.forEach(m => {
          if (currentMatch[m]) {
            ranks[m] = menPrefs[m].indexOf(currentMatch[m]) + 1;
          } else {
            ranks[m] = nextProp[m]; // They're at their next preference level
          }
        });
        roundRanks.push(ranks);
      }

      return roundRanks;
    }

    const roundRanks = runDA();
    const numRounds = roundRanks.length;

    const margin = { top: 80, right: 120, bottom: 80, left: 120 };
    const width = W - margin.left - margin.right;
    const height = H - margin.top - margin.bottom;

    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

    const x = d3.scaleLinear().domain([0, numRounds - 1]).range([0, width]);
    const y = d3.scaleLinear().domain([0.5, 5.5]).range([0, height]);

    // Glow
    const defs = svg.append('defs');
    const glow = defs.append('filter').attr('id', 'glow');
    glow.append('feGaussianBlur').attr('stdDeviation', 4).attr('result', 'blur');
    const fm = glow.append('feMerge');
    fm.append('feMergeNode').attr('in', 'blur');
    fm.append('feMergeNode').attr('in', 'SourceGraphic');

    // Grid lines
    for (let rank = 1; rank <= 5; rank++) {
      g.append('line')
        .attr('x1', -20).attr('y1', y(rank))
        .attr('x2', width + 20).attr('y2', y(rank))
        .attr('stroke', '#21262d').attr('stroke-width', 1);

      g.append('text')
        .attr('x', -35).attr('y', y(rank))
        .attr('text-anchor', 'end').attr('dominant-baseline', 'central')
        .attr('fill', '#484f58').attr('font-size', 12)
        .text(`Rank ${rank}`);
    }

    // Round labels
    for (let r = 0; r < numRounds; r++) {
      g.append('text')
        .attr('x', x(r)).attr('y', height + 35)
        .attr('text-anchor', 'middle').attr('fill', '#484f58').attr('font-size', 12)
        .text(`Round ${r + 1}`);
    }

    // Y-axis label
    g.append('text')
      .attr('transform', `rotate(-90)`)
      .attr('x', -height / 2).attr('y', -70)
      .attr('text-anchor', 'middle').attr('fill', '#484f58').attr('font-size', 13)
      .text('Preference Rank Achieved');

    // Draw bump lines for each man
    const line = d3.line()
      .x((d, i) => x(i))
      .y(d => y(d))
      .curve(d3.curveMonotoneX);

    men.forEach((m, mIdx) => {
      const ranks = roundRanks.map(r => r[m]);

      // Draw line
      const path = g.append('path')
        .datum(ranks)
        .attr('d', line)
        .attr('fill', 'none')
        .attr('stroke', manColors[m])
        .attr('stroke-width', 3)
        .attr('filter', 'url(#glow)')
        .attr('opacity', 0.9);

      // Animate drawing
      const totalLength = path.node().getTotalLength();
      path
        .attr('stroke-dasharray', totalLength)
        .attr('stroke-dashoffset', totalLength)
        .transition()
        .delay(mIdx * 600)
        .duration(1500)
        .ease(d3.easeCubicInOut)
        .attr('stroke-dashoffset', 0);

      // Draw dots
      ranks.forEach((rank, r) => {
        g.append('circle')
          .attr('cx', x(r)).attr('cy', y(rank)).attr('r', 8)
          .attr('fill', '#0d1117')
          .attr('stroke', manColors[m]).attr('stroke-width', 2.5)
          .attr('opacity', 0)
          .transition()
          .delay(mIdx * 600 + r * 400)
          .duration(300)
          .attr('opacity', 1);

        g.append('text')
          .attr('x', x(r)).attr('y', y(rank) + 1)
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
          .attr('fill', manColors[m]).attr('font-size', 9).attr('font-weight', 600)
          .text(rank)
          .attr('opacity', 0)
          .transition()
          .delay(mIdx * 600 + r * 400)
          .duration(300)
          .attr('opacity', 1);
      });

      // End label
      const lastRank = ranks[ranks.length - 1];
      g.append('text')
        .attr('x', width + 15).attr('y', y(lastRank))
        .attr('dominant-baseline', 'central')
        .attr('fill', manColors[m]).attr('font-size', 13).attr('font-weight', 600)
        .text(m)
        .attr('opacity', 0)
        .transition()
        .delay(mIdx * 600 + numRounds * 400)
        .duration(400)
        .attr('opacity', 1);
    });

    // Title
    g.append('text')
      .attr('x', width / 2).attr('y', -35)
      .attr('text-anchor', 'middle').attr('fill', '#e6edf3').attr('font-size', 16)
      .attr('font-family', "'Lora',serif").attr('font-weight', 600)
      .text('Rank Evolution During Deferred Acceptance');
  </script>
</body>
</html>
