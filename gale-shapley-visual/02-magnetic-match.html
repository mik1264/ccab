<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Compatibility — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Nunito', sans-serif; }
    .back-link { position: fixed; top: 16px; left: 16px; background: rgba(22,27,34,0.9); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; transition: background 0.2s; }
    .back-link:hover { background: #30363d; }
    .info { position: fixed; top: 60px; left: 16px; background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 10px; padding: 12px 16px; z-index: 50; max-width: 280px; backdrop-filter: blur(8px); }
    .info h2 { font-family: 'Lora', serif; font-size: 15px; color: #58a6ff; margin-bottom: 4px; }
    .info p { font-size: 12px; color: #8b949e; line-height: 1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info">
    <h2>Magnetic Compatibility</h2>
    <p>Preference strength becomes magnetic attraction. Compatible pairs are pulled together; incompatible ones repel. Watch the system settle into a stable matching.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 5;
    let agents = []; // {x, y, vx, vy, type: 'M'|'W', id, matched, matchedTo, prefs}
    let sparks = [];
    let bonded = []; // {m, w}
    let menPrefs = [], womenPrefs = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(RGB);
      initSim();
    }

    function initSim() {
      agents = [];
      sparks = [];
      bonded = [];
      menPrefs = [];
      womenPrefs = [];

      for (let i = 0; i < N; i++) {
        menPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
        womenPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
      }

      for (let i = 0; i < N; i++) {
        agents.push({
          x: width * 0.25 + random(-80, 80),
          y: height * (0.2 + 0.6 * i / (N - 1)),
          vx: random(-0.5, 0.5), vy: random(-0.5, 0.5),
          type: 'M', id: i, matched: false, matchedTo: -1,
          prefs: menPrefs[i]
        });
      }
      for (let i = 0; i < N; i++) {
        agents.push({
          x: width * 0.75 + random(-80, 80),
          y: height * (0.2 + 0.6 * i / (N - 1)),
          vx: random(-0.5, 0.5), vy: random(-0.5, 0.5),
          type: 'W', id: i, matched: false, matchedTo: -1,
          prefs: womenPrefs[i]
        });
      }
    }

    function shuffleArr(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getAgent(type, id) {
      return agents.find(a => a.type === type && a.id === id);
    }

    function mutualRank(mId, wId) {
      let mRank = menPrefs[mId].indexOf(wId);
      let wRank = womenPrefs[wId].indexOf(mId);
      return (mRank + wRank) / 2;
    }

    function draw() {
      background(13, 17, 23, 30);

      // Draw field lines between all M-W pairs
      for (let m = 0; m < N; m++) {
        let mAgent = getAgent('M', m);
        for (let w = 0; w < N; w++) {
          let wAgent = getAgent('W', w);
          let rank = mutualRank(m, w);
          let alpha = map(1 / (rank + 1), 0, 1, 10, 80);
          stroke(150, 180, 220, alpha);
          strokeWeight(0.5);
          noFill();

          // Draw curved field line
          let mx = (mAgent.x + wAgent.x) / 2;
          let my = (mAgent.y + wAgent.y) / 2 + sin(frameCount * 0.02 + m + w) * 20;
          bezier(mAgent.x, mAgent.y, mx - 30, my, mx + 30, my, wAgent.x, wAgent.y);
        }
      }

      // Physics: attract compatible, drift
      for (let a of agents) {
        if (a.matched) continue;
        let fx = 0, fy = 0;

        for (let b of agents) {
          if (a === b || a.type === b.type) continue;
          if (b.matched) continue;

          let mId = a.type === 'M' ? a.id : b.id;
          let wId = a.type === 'W' ? a.id : b.id;
          let rank = mutualRank(mId, wId);
          let strength = 1 / (rank + 1);

          let dx = b.x - a.x;
          let dy = b.y - a.y;
          let d = sqrt(dx * dx + dy * dy) || 1;

          // Attraction proportional to mutual preference
          let force = strength * 0.3 / max(d * 0.01, 0.5);
          fx += (dx / d) * force;
          fy += (dy / d) * force;

          // Check for snapping
          if (d < 35 && rank < 2 && !a.matched && !b.matched) {
            a.matched = true;
            a.matchedTo = b.type === 'M' ? b.id : b.id;
            b.matched = true;
            b.matchedTo = a.type === 'M' ? a.id : a.id;
            bonded.push({m: mId, w: wId});
            // Spark
            for (let i = 0; i < 20; i++) {
              sparks.push({
                x: (a.x + b.x) / 2, y: (a.y + b.y) / 2,
                vx: random(-4, 4), vy: random(-4, 4),
                life: 60, maxLife: 60
              });
            }
          }
        }

        // Gentle repulsion from same type
        for (let b of agents) {
          if (a === b || a.type !== b.type) continue;
          let dx = a.x - b.x;
          let dy = a.y - b.y;
          let d = sqrt(dx * dx + dy * dy) || 1;
          if (d < 100) {
            fx += (dx / d) * 0.2;
            fy += (dy / d) * 0.2;
          }
        }

        a.vx = (a.vx + fx) * 0.98;
        a.vy = (a.vy + fy) * 0.98;
        a.x += a.vx;
        a.y += a.vy;

        // Bounds
        a.x = constrain(a.x, 40, width - 40);
        a.y = constrain(a.y, 40, height - 40);
      }

      // Update bonded pairs - keep them together
      for (let bond of bonded) {
        let mA = getAgent('M', bond.m);
        let wA = getAgent('W', bond.w);
        let cx = (mA.x + wA.x) / 2;
        let cy = (mA.y + wA.y) / 2;
        mA.x = lerp(mA.x, cx - 15, 0.05);
        mA.y = lerp(mA.y, cy, 0.05);
        wA.x = lerp(wA.x, cx + 15, 0.05);
        wA.y = lerp(wA.y, cy, 0.05);
        // Gentle drift
        mA.x += sin(frameCount * 0.01 + bond.m) * 0.3;
        mA.y += cos(frameCount * 0.013 + bond.w) * 0.3;
        wA.x += sin(frameCount * 0.01 + bond.m) * 0.3;
        wA.y += cos(frameCount * 0.013 + bond.w) * 0.3;
      }

      // Draw agents
      for (let a of agents) {
        noStroke();
        let pulse = sin(frameCount * 0.04 + a.id * 2) * 0.2 + 0.8;
        if (a.type === 'M') {
          // Red magnet
          fill(255, 100, 100, 30 * pulse);
          ellipse(a.x, a.y, 50, 50);
          fill(255, 100, 100, 60 * pulse);
          ellipse(a.x, a.y, 34, 34);
          fill(255, 120, 120);
          ellipse(a.x, a.y, 18, 18);
          if (a.matched) {
            stroke(63, 185, 80, 100);
            strokeWeight(2);
            noFill();
            ellipse(a.x, a.y, 40, 40);
          }
        } else {
          // Blue magnet
          fill(88, 166, 255, 30 * pulse);
          ellipse(a.x, a.y, 50, 50);
          fill(88, 166, 255, 60 * pulse);
          ellipse(a.x, a.y, 34, 34);
          fill(100, 170, 255);
          ellipse(a.x, a.y, 18, 18);
          if (a.matched) {
            stroke(63, 185, 80, 100);
            strokeWeight(2);
            noFill();
            ellipse(a.x, a.y, 40, 40);
          }
        }
        // Label
        noStroke();
        fill(255, 180);
        textAlign(CENTER, CENTER);
        textSize(9);
        text(a.type + (a.id + 1), a.x, a.y - 28);
      }

      // Sparks
      for (let i = sparks.length - 1; i >= 0; i--) {
        let s = sparks[i];
        s.x += s.vx;
        s.y += s.vy;
        s.vx *= 0.96;
        s.vy *= 0.96;
        s.life--;
        if (s.life <= 0) { sparks.splice(i, 1); continue; }
        let t = s.life / s.maxLife;
        noStroke();
        fill(255, 220, 100, 255 * t);
        ellipse(s.x, s.y, 4 * t, 4 * t);
      }

      // Status
      noStroke();
      fill(255, 160);
      textAlign(RIGHT, TOP);
      textSize(13);
      text('Bonded: ' + bonded.length + '/' + N, width - 20, 20);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
