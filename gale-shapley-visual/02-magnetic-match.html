<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Match — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #c9d1d9; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background: #30363d; }
    #hud { position:fixed;top:16px;right:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;padding:10px 16px;border-radius:12px;font-size:14px;color:#c9d1d9;backdrop-filter:blur(8px);z-index:100 }
    #hud span { color:#58a6ff;font-weight:700 }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div id="hud">Round: <span id="rc">0</span> &nbsp; Matched: <span id="mc">0</span>/<span id="total">8</span></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 8;
    let students = [], schools = [];
    let gsRound = 0;
    let tick = 0;
    let matchEdges = [];
    let flashes = [];
    let allDone = false;
    let doneTimer = 0;

    function shuffleArray(n) {
      let a = [];
      for (let i = 0; i < n; i++) a.push(i);
      for (let i = n - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function initSim() {
      students = []; schools = []; matchEdges = []; flashes = [];
      gsRound = 0; tick = 0; allDone = false; doneTimer = 0;

      let cx = width / 2, cy = height / 2;
      let r1 = min(width, height) * 0.22;
      let r2 = min(width, height) * 0.38;

      for (let i = 0; i < N; i++) {
        let a = (TWO_PI / N) * i - HALF_PI;
        students.push({
          x: cx + cos(a) * r1, y: cy + sin(a) * r1,
          homeX: cx + cos(a) * r1, homeY: cy + sin(a) * r1,
          vx: 0, vy: 0,
          angle: random(TWO_PI), aSpeed: random(0.006, 0.018), aRad: random(10, 22),
          prefs: shuffleArray(N), prefPtr: 0, matched: -1, sz: random(12, 17)
        });
      }
      for (let i = 0; i < N; i++) {
        let a = (TWO_PI / N) * i;
        schools.push({
          x: cx + cos(a) * r2, y: cy + sin(a) * r2,
          homeX: cx + cos(a) * r2, homeY: cy + sin(a) * r2,
          angle: random(TWO_PI), aSpeed: random(0.004, 0.012), aRad: random(8, 16),
          prefs: shuffleArray(N), ranking: [], matched: -1, sz: random(14, 20)
        });
      }
      for (let s of schools) {
        s.ranking = new Array(N);
        for (let r = 0; r < N; r++) s.ranking[s.prefs[r]] = r;
      }
      updateHUD();
    }

    function updateHUD() {
      document.getElementById('rc').textContent = gsRound;
      document.getElementById('mc').textContent = matchEdges.length;
    }

    function gsStep() {
      let didPropose = false;
      for (let i = 0; i < N; i++) {
        let st = students[i];
        if (st.matched !== -1 || st.prefPtr >= N) continue;
        let scIdx = st.prefs[st.prefPtr];
        st.prefPtr++;
        let sc = schools[scIdx];
        didPropose = true;

        if (sc.matched === -1) {
          sc.matched = i; st.matched = scIdx;
          matchEdges.push({ s: i, c: scIdx, alpha: 0, pulse: random(TWO_PI) });
        } else {
          if (sc.ranking[i] < sc.ranking[sc.matched]) {
            let old = sc.matched;
            students[old].matched = -1;
            flashes.push({ x: sc.x, y: sc.y, rad: 0, alpha: 255 });
            matchEdges = matchEdges.filter(m => !(m.s === old && m.c === scIdx));
            sc.matched = i; st.matched = scIdx;
            matchEdges.push({ s: i, c: scIdx, alpha: 0, pulse: random(TWO_PI) });
          }
        }
      }
      if (didPropose) { gsRound++; updateHUD(); }
      else { allDone = true; doneTimer = 0; }
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      textFont('Segoe UI');
      initSim();
    }

    function draw() {
      background(13, 17, 23, 35);
      tick++;

      if (!allDone && tick % 120 === 0) gsStep();
      if (allDone) {
        doneTimer++;
        if (doneTimer > 240) initSim();
      }

      // Update positions
      for (let s of students) {
        s.angle += s.aSpeed;
        if (s.matched === -1) {
          s.x = s.homeX + cos(s.angle) * s.aRad;
          s.y = s.homeY + sin(s.angle) * s.aRad;
        } else {
          let sc = schools[s.matched];
          let mx = (s.homeX + sc.x) * 0.5 + cos(s.angle) * 12;
          let my = (s.homeY + sc.y) * 0.5 + sin(s.angle) * 12;
          s.x = lerp(s.x, mx, 0.03);
          s.y = lerp(s.y, my, 0.03);
        }
      }
      for (let s of schools) {
        s.angle += s.aSpeed;
        s.x = s.homeX + cos(s.angle) * s.aRad;
        s.y = s.homeY + sin(s.angle) * s.aRad;
      }

      // Draw match lines with pulse
      for (let m of matchEdges) {
        m.alpha = min(m.alpha + 3, 220);
        m.pulse += 0.05;
        let pa = map(sin(m.pulse), -1, 1, 80, 255);
        stroke(255, 255, 255, min(m.alpha, pa));
        strokeWeight(1.5 + sin(m.pulse) * 0.5);
        let st = students[m.s], sc = schools[m.c];
        line(st.x, st.y, sc.x, sc.y);
      }

      // Draw students (blue)
      noStroke();
      for (let i = 0; i < N; i++) {
        let s = students[i];
        let gs = s.sz + sin(tick * 0.03 + i * 0.7) * 3;
        fill(88, 166, 255, 20); ellipse(s.x, s.y, gs * 3.5);
        fill(88, 166, 255, 45); ellipse(s.x, s.y, gs * 2.2);
        fill(88, 166, 255, 220); ellipse(s.x, s.y, gs);
        fill(255); textAlign(CENTER, CENTER); textSize(8);
        text('S' + (i + 1), s.x, s.y);
      }

      // Draw schools (green)
      for (let i = 0; i < N; i++) {
        let s = schools[i];
        let gs = s.sz + sin(tick * 0.025 + i * 0.9 + 2) * 3;
        fill(63, 185, 80, 20); ellipse(s.x, s.y, gs * 3.5);
        fill(63, 185, 80, 45); ellipse(s.x, s.y, gs * 2.2);
        fill(63, 185, 80, 220); ellipse(s.x, s.y, gs);
        fill(255); textAlign(CENTER, CENTER); textSize(8);
        text('C' + (i + 1), s.x, s.y);
      }

      // Draw rejection flashes
      for (let i = flashes.length - 1; i >= 0; i--) {
        let f = flashes[i];
        f.rad += 5; f.alpha -= 5;
        if (f.alpha <= 0) { flashes.splice(i, 1); continue; }
        noFill(); stroke(255, 70, 70, f.alpha); strokeWeight(2);
        ellipse(f.x, f.y, f.rad);
        stroke(255, 70, 70, f.alpha * 0.4); strokeWeight(1);
        ellipse(f.x, f.y, f.rad * 1.5);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
