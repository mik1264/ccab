<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binary Star Matching — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Nunito', sans-serif; }
    .back-link { position: fixed; top: 16px; left: 16px; background: rgba(22,27,34,0.9); border: 1px solid #30363d; color: #58a6ff; text-decoration: none; padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); z-index: 100; transition: background 0.2s; }
    .back-link:hover { background: #30363d; }
    .info { position: fixed; top: 60px; left: 16px; background: rgba(13,17,23,0.88); border: 1px solid #30363d; border-radius: 10px; padding: 12px 16px; z-index: 50; max-width: 280px; backdrop-filter: blur(8px); }
    .info h2 { font-family: 'Lora', serif; font-size: 15px; color: #58a6ff; margin-bottom: 4px; }
    .info p { font-size: 12px; color: #8b949e; line-height: 1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info">
    <h2>Binary Star Matching</h2>
    <p>Each agent is a star. Compatible pairs form binary star systems orbiting their shared center of mass. Incompatible ones drift as lonely singletons.</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 5;
    let stars = [];
    let bgStars = [];
    let menPrefs = [], womenPrefs = [];
    let stableMatches = [];
    let algorithmDone = false;
    let orbits = []; // {m, w, cx, cy, angle, radius, speed, trail: []}

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(RGB);
      initSim();
    }

    function shuffleArr(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initSim() {
      stars = [];
      bgStars = [];
      orbits = [];
      stableMatches = [];
      algorithmDone = false;
      menPrefs = [];
      womenPrefs = [];

      // Background stars
      for (let i = 0; i < 300; i++) {
        bgStars.push({
          x: random(width), y: random(height),
          size: random(0.5, 2),
          twinkle: random(TWO_PI)
        });
      }

      for (let i = 0; i < N; i++) {
        menPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
        womenPrefs.push(shuffleArr(Array.from({length: N}, (_, k) => k)));
      }

      // Men: yellow-white stars
      for (let i = 0; i < N; i++) {
        stars.push({
          x: random(width * 0.1, width * 0.45),
          y: random(height * 0.15, height * 0.85),
          vx: random(-0.3, 0.3), vy: random(-0.3, 0.3),
          type: 'M', id: i, matched: false,
          hue: [255, 240 + random(15), 180 + random(40)],
          size: 6 + random(4),
          pulse: random(TWO_PI)
        });
      }
      // Women: blue-white stars
      for (let i = 0; i < N; i++) {
        stars.push({
          x: random(width * 0.55, width * 0.9),
          y: random(height * 0.15, height * 0.85),
          vx: random(-0.3, 0.3), vy: random(-0.3, 0.3),
          type: 'W', id: i, matched: false,
          hue: [160 + random(40), 200 + random(55), 255],
          size: 6 + random(4),
          pulse: random(TWO_PI)
        });
      }

      setTimeout(runDA, 2500);
    }

    function getStar(type, id) {
      return stars.find(s => s.type === type && s.id === id);
    }

    function runDA() {
      let menNext = new Array(N).fill(0);
      let womenCurrent = new Array(N).fill(-1);
      let menFree = new Array(N).fill(true);

      let changed = true;
      while (changed) {
        changed = false;
        for (let m = 0; m < N; m++) {
          if (!menFree[m] || menNext[m] >= N) continue;
          let w = menPrefs[m][menNext[m]];
          menNext[m]++;
          changed = true;
          if (womenCurrent[w] === -1) {
            womenCurrent[w] = m;
            menFree[m] = false;
          } else {
            let curM = womenCurrent[w];
            if (womenPrefs[w].indexOf(m) < womenPrefs[w].indexOf(curM)) {
              womenCurrent[w] = m;
              menFree[m] = false;
              menFree[curM] = true;
            }
          }
        }
      }

      for (let w = 0; w < N; w++) {
        if (womenCurrent[w] !== -1) {
          let m = womenCurrent[w];
          let mS = getStar('M', m);
          let wS = getStar('W', w);
          mS.matched = true;
          wS.matched = true;

          let mRank = menPrefs[m].indexOf(w);
          let orbitR = 30 + mRank * 15; // Top choice = tighter orbit
          let cx = (mS.x + wS.x) / 2;
          let cy = (mS.y + wS.y) / 2;

          orbits.push({
            m, w, cx, cy,
            angle: random(TWO_PI),
            radius: orbitR,
            speed: 0.015 - mRank * 0.002,
            trailM: [], trailW: []
          });
        }
      }
      algorithmDone = true;
    }

    function draw() {
      background(8, 10, 18);

      // Background stars
      for (let s of bgStars) {
        s.twinkle += 0.02;
        let a = (sin(s.twinkle) * 0.5 + 0.5) * 200;
        noStroke();
        fill(255, 255, 255, a);
        ellipse(s.x, s.y, s.size, s.size);
      }

      // Update orbiting pairs
      for (let o of orbits) {
        o.angle += o.speed;
        o.cx += sin(frameCount * 0.003 + o.m) * 0.2;
        o.cy += cos(frameCount * 0.004 + o.w) * 0.15;

        let mS = getStar('M', o.m);
        let wS = getStar('W', o.w);

        let mx = o.cx + cos(o.angle) * o.radius;
        let my = o.cy + sin(o.angle) * o.radius;
        let wx = o.cx + cos(o.angle + PI) * o.radius;
        let wy = o.cy + sin(o.angle + PI) * o.radius;

        mS.x = lerp(mS.x, mx, 0.08);
        mS.y = lerp(mS.y, my, 0.08);
        wS.x = lerp(wS.x, wx, 0.08);
        wS.y = lerp(wS.y, wy, 0.08);

        // Trails
        o.trailM.push({x: mS.x, y: mS.y});
        o.trailW.push({x: wS.x, y: wS.y});
        if (o.trailM.length > 60) o.trailM.shift();
        if (o.trailW.length > 60) o.trailW.shift();

        // Draw trails
        noFill();
        for (let i = 1; i < o.trailM.length; i++) {
          let alpha = map(i, 0, o.trailM.length, 0, 60);
          stroke(mS.hue[0], mS.hue[1], mS.hue[2], alpha);
          strokeWeight(1);
          line(o.trailM[i - 1].x, o.trailM[i - 1].y, o.trailM[i].x, o.trailM[i].y);
        }
        for (let i = 1; i < o.trailW.length; i++) {
          let alpha = map(i, 0, o.trailW.length, 0, 60);
          stroke(wS.hue[0], wS.hue[1], wS.hue[2], alpha);
          strokeWeight(1);
          line(o.trailW[i - 1].x, o.trailW[i - 1].y, o.trailW[i].x, o.trailW[i].y);
        }
      }

      // Drift unmatched stars
      for (let s of stars) {
        if (s.matched) continue;
        s.x += s.vx + sin(frameCount * 0.008 + s.id) * 0.2;
        s.y += s.vy + cos(frameCount * 0.01 + s.id) * 0.15;
        if (s.x < 20) s.vx = abs(s.vx);
        if (s.x > width - 20) s.vx = -abs(s.vx);
        if (s.y < 20) s.vy = abs(s.vy);
        if (s.y > height - 20) s.vy = -abs(s.vy);
      }

      // Draw all stars
      for (let s of stars) {
        s.pulse += 0.03;
        let pulseVal = sin(s.pulse) * 0.3 + 0.7;
        let sz = s.size * (s.matched ? 1 : pulseVal);

        noStroke();

        // Halo layers
        fill(s.hue[0], s.hue[1], s.hue[2], 5);
        ellipse(s.x, s.y, sz * 8, sz * 8);
        fill(s.hue[0], s.hue[1], s.hue[2], 10);
        ellipse(s.x, s.y, sz * 5, sz * 5);
        fill(s.hue[0], s.hue[1], s.hue[2], 25);
        ellipse(s.x, s.y, sz * 3, sz * 3);

        // Core
        fill(s.hue[0], s.hue[1], s.hue[2], 220);
        ellipse(s.x, s.y, sz * 1.5, sz * 1.5);
        fill(255, 255, 255, 180);
        ellipse(s.x, s.y, sz * 0.7, sz * 0.7);

        // Cross spikes
        stroke(s.hue[0], s.hue[1], s.hue[2], 40);
        strokeWeight(0.5);
        line(s.x - sz * 2, s.y, s.x + sz * 2, s.y);
        line(s.x, s.y - sz * 2, s.x, s.y + sz * 2);

        // Label
        noStroke();
        fill(255, 120);
        textAlign(CENTER, CENTER);
        textSize(9);
        text(s.type + (s.id + 1), s.x, s.y + sz * 2 + 8);
      }

      // Status
      noStroke();
      fill(255, 160);
      textAlign(RIGHT, TOP);
      textSize(13);
      text(algorithmDone ? 'Binary Systems: ' + orbits.length : 'Stars drifting...', width - 20, 20);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
