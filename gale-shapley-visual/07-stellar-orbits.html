<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stellar Orbits — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #c9d1d9; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background: #30363d; }
    #hud { position:fixed;top:16px;right:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;padding:10px 16px;border-radius:12px;font-size:14px;color:#c9d1d9;backdrop-filter:blur(8px);z-index:100 }
    #hud .label { color:#8b949e;font-size:12px }
    #hud .val { color:#e3b341;font-weight:700;font-size:18px }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div id="hud"><div class="label">Stable</div><div class="val" id="sc">0 / 8</div></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const N = 8;
    let stars = [], planets = [];
    let matching = [], schoolMatch = [];
    let tick = 0;
    let isStable = false;
    let shimmer = 0;
    let starTrails = [];

    function shuffled(n) {
      let a = []; for (let i = 0; i < n; i++) a.push(i);
      for (let i = n - 1; i > 0; i--) { let j = floor(random(i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }

    function initSim() {
      stars = []; planets = []; starTrails = [];
      matching = new Array(N).fill(-1);
      schoolMatch = new Array(N).fill(-1);
      isStable = false; shimmer = 0; tick = 0;

      for (let i = 0; i < N; i++) {
        stars.push({
          x: random(width * 0.1, width * 0.9), y: random(height * 0.1, height * 0.9),
          vx: 0, vy: 0,
          prefs: shuffled(N), prefPtr: 0,
          brightness: random(180, 255), sz: random(4, 7),
          trail: []
        });
      }
      for (let i = 0; i < N; i++) {
        let angle = (TWO_PI / N) * i;
        let cx = width / 2, cy = height / 2;
        let r = min(width, height) * 0.3;
        planets.push({
          x: cx + cos(angle) * r, y: cy + sin(angle) * r,
          homeX: cx + cos(angle) * r, homeY: cy + sin(angle) * r,
          prefs: shuffled(N), ranking: [],
          sz: random(14, 22), hue: random(160, 280)
        });
      }
      for (let p of planets) {
        p.ranking = new Array(N);
        for (let r = 0; r < N; r++) p.ranking[p.prefs[r]] = r;
      }
      updateHUD();
    }

    function updateHUD() {
      let count = matching.filter(m => m !== -1).length;
      document.getElementById('sc').textContent = count + ' / ' + N;
    }

    function gsStep() {
      let proposed = false;
      for (let i = 0; i < N; i++) {
        let s = stars[i];
        if (matching[i] !== -1 || s.prefPtr >= N) continue;
        let pIdx = s.prefs[s.prefPtr]; s.prefPtr++;
        let p = planets[pIdx];
        proposed = true;

        if (schoolMatch[pIdx] === -1) {
          matching[i] = pIdx; schoolMatch[pIdx] = i;
        } else {
          let cur = schoolMatch[pIdx];
          if (p.ranking[i] < p.ranking[cur]) {
            matching[cur] = -1;
            matching[i] = pIdx; schoolMatch[pIdx] = i;
          }
        }
      }
      updateHUD();
      if (!proposed) isStable = true;
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      textFont('Segoe UI');
      initSim();
    }

    function draw() {
      background(13, 17, 23, isStable ? 15 : 40);
      tick++;

      // GS steps
      if (!isStable && tick % 90 === 0) gsStep();

      // Shimmer when stable
      if (isStable) {
        shimmer = min(shimmer + 0.3, 100);
        // Background stars shimmer
        noStroke();
        for (let i = 0; i < 3; i++) {
          fill(255, 255, 200, random(5, 15));
          ellipse(random(width), random(height), random(1, 3));
        }
        if (tick % 600 === 0) initSim();
      }

      // Move stars
      for (let i = 0; i < N; i++) {
        let s = stars[i];
        if (matching[i] !== -1) {
          let p = planets[matching[i]];
          // Smooth orbit
          let orbitR = isStable ? 35 : 50 + sin(tick * 0.01) * 15;
          let speed = isStable ? 0.02 : 0.012;
          let angle = tick * speed + i * (TWO_PI / 3);
          let tx = p.x + cos(angle) * orbitR;
          let ty = p.y + sin(angle) * orbitR;
          s.x = lerp(s.x, tx, 0.05);
          s.y = lerp(s.y, ty, 0.05);
        } else {
          // Drift toward top preference
          if (s.prefPtr > 0) {
            let target = planets[s.prefs[min(s.prefPtr, N) - 1]];
            s.vx += (target.x - s.x) * 0.0003;
            s.vy += (target.y - s.y) * 0.0003;
          }
          s.vx *= 0.99; s.vy *= 0.99;
          s.x += s.vx; s.y += s.vy;
        }

        // Trail
        s.trail.push({ x: s.x, y: s.y });
        if (s.trail.length > 30) s.trail.shift();
      }

      // Draw orbit paths (dashed for unstable, solid gold for stable)
      for (let i = 0; i < N; i++) {
        if (matching[i] === -1) continue;
        let s = stars[i], p = planets[matching[i]];

        if (isStable) {
          // Smooth golden orbit
          noFill();
          stroke(227, 179, 65, 100 + sin(tick * 0.03 + i) * 50);
          strokeWeight(1.5);
          let orbitR = 35;
          ellipse(p.x, p.y, orbitR * 2, orbitR * 2);
        } else {
          // Wobbly red dashed line
          stroke(255, 80, 80, 60);
          strokeWeight(1);
          drawingContext.setLineDash([4, 6]);
          let orbitR = 50 + sin(tick * 0.01) * 15;
          noFill();
          ellipse(p.x, p.y, orbitR * 2 + random(-3, 3), orbitR * 2 + random(-3, 3));
          drawingContext.setLineDash([]);
        }
      }

      // Draw comet trails for stars
      for (let i = 0; i < N; i++) {
        let s = stars[i];
        noFill(); noStroke();
        for (let j = 0; j < s.trail.length; j++) {
          let t = s.trail[j];
          let a = map(j, 0, s.trail.length, 0, 150);
          fill(255, 240, 180, a);
          let sz = map(j, 0, s.trail.length, 1, s.sz * 0.8);
          ellipse(t.x, t.y, sz);
        }
      }

      // Draw planets
      noStroke();
      for (let i = 0; i < N; i++) {
        let p = planets[i];
        let gs = p.sz + sin(tick * 0.02 + i * 1.3) * 2;
        // Atmosphere glow
        colorMode(HSB, 360, 100, 100, 255);
        fill(p.hue, 50, 80, 15); ellipse(p.x, p.y, gs * 3);
        fill(p.hue, 60, 85, 35); ellipse(p.x, p.y, gs * 2);
        fill(p.hue, 70, 90, 230); ellipse(p.x, p.y, gs);
        // Surface detail
        fill(p.hue, 40, 100, 60);
        ellipse(p.x - gs * 0.12, p.y - gs * 0.12, gs * 0.4);
        colorMode(RGB);
        fill(255, 200); textAlign(CENTER, CENTER); textSize(8);
        text('P' + (i + 1), p.x, p.y);
      }

      // Draw stars (bright points with glow)
      for (let i = 0; i < N; i++) {
        let s = stars[i];
        let pulse = s.brightness + sin(tick * 0.05 + i * 2) * 30;
        noStroke();
        fill(255, 255, 200, 15); ellipse(s.x, s.y, s.sz * 8);
        fill(255, 255, 200, 40); ellipse(s.x, s.y, s.sz * 4);
        fill(255, 255, 220, pulse); ellipse(s.x, s.y, s.sz * 1.5);
        fill(255, 255, 255, 255); ellipse(s.x, s.y, s.sz * 0.6);
        // Cross flare
        stroke(255, 255, 200, pulse * 0.3); strokeWeight(0.5);
        line(s.x - s.sz * 2, s.y, s.x + s.sz * 2, s.y);
        line(s.x, s.y - s.sz * 2, s.x, s.y + s.sz * 2);
      }

      // Background twinkle stars
      if (tick % 3 === 0) {
        noStroke(); fill(255, 255, 255, random(30, 80));
        ellipse(random(width), random(height), random(0.5, 2));
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initSim();
    }
  </script>
</body>
</html>
