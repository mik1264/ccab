<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ant Colony Matching — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Ant Colony Matching</h2><p>Ants leave pheromone trails to find their stable matches. The strongest trails encode the final matching — emergent intelligence finding stability.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const N = 5;
    const manColors = ['#58a6ff','#3b82f6','#60a5fa','#93c5fd','#2563eb'];
    const womanColors = ['#c084fc','#a855f7','#9333ea','#7c3aed','#6d28d9'];
    const matching = [0,1,2,3,4];

    // Pheromone grid
    const gridScale = 4;
    let gw, gh;
    let pheromoneM, pheromoneW;

    // Nest positions (men on left, women on right)
    let menNests = [], womenNests = [];

    class Ant {
      constructor(nestX, nestY, type, index) {
        this.x = nestX;
        this.y = nestY;
        this.nestX = nestX;
        this.nestY = nestY;
        this.type = type;
        this.index = index;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = 1.5 + Math.random() * 0.8;
        this.matched = false;
        this.matchTimer = 0;
      }
    }

    let ants = [];

    function init() {
      const w = canvas.width, h = canvas.height;
      gw = Math.floor(w / gridScale);
      gh = Math.floor(h / gridScale);
      pheromoneM = new Float32Array(gw * gh * N);
      pheromoneW = new Float32Array(gw * gh * N);

      menNests = [];
      womenNests = [];
      ants = [];

      for (let i = 0; i < N; i++) {
        menNests.push({ x: 60, y: h * (0.15 + 0.7 * i / (N-1)) });
        womenNests.push({ x: w - 60, y: h * (0.15 + 0.7 * i / (N-1)) });
      }

      // 10 ants per nest
      for (let i = 0; i < N; i++) {
        for (let a = 0; a < 10; a++) {
          ants.push(new Ant(menNests[i].x, menNests[i].y, 'man', i));
          ants.push(new Ant(womenNests[i].x, womenNests[i].y, 'woman', i));
        }
      }
    }

    init();
    window.addEventListener('resize', () => { resize(); init(); });

    function samplePheromone(grid, x, y, channel) {
      const gx = Math.floor(x / gridScale);
      const gy = Math.floor(y / gridScale);
      if (gx < 0 || gx >= gw || gy < 0 || gy >= gh) return 0;
      return grid[(gy * gw + gx) * N + channel];
    }

    function depositPheromone(grid, x, y, channel, amount) {
      const gx = Math.floor(x / gridScale);
      const gy = Math.floor(y / gridScale);
      if (gx < 0 || gx >= gw || gy < 0 || gy >= gh) return;
      const idx = (gy * gw + gx) * N + channel;
      grid[idx] = Math.min(1, grid[idx] + amount);
    }

    let t = 0, dt = 1/60;
    let pheromoneImage;

    function loop() {
      requestAnimationFrame(loop);
      t += dt;
      update();
      render();
    }

    function update() {
      const w = canvas.width, h = canvas.height;

      // Evaporate pheromones
      const evap = 0.997;
      for (let i = 0; i < pheromoneM.length; i++) {
        pheromoneM[i] *= evap;
        pheromoneW[i] *= evap;
      }

      // Update ants
      for (const ant of ants) {
        // Deposit own pheromone
        const grid = ant.type === 'man' ? pheromoneM : pheromoneW;
        depositPheromone(grid, ant.x, ant.y, ant.index, 0.05);

        // Sense opposite pheromone
        const oppGrid = ant.type === 'man' ? pheromoneW : pheromoneM;
        const target = matching[ant.index];

        // Sample ahead in 3 directions
        const senseD = 20;
        let bestAngle = ant.angle;
        let bestStrength = -1;
        for (let da = -0.5; da <= 0.5; da += 0.25) {
          const a = ant.angle + da;
          const sx = ant.x + Math.cos(a) * senseD;
          const sy = ant.y + Math.sin(a) * senseD;
          let strength = samplePheromone(oppGrid, sx, sy, target) * 3;
          // Also slightly attracted to all opposite pheromone
          for (let c = 0; c < N; c++) {
            strength += samplePheromone(oppGrid, sx, sy, c) * 0.2;
          }
          if (strength > bestStrength) {
            bestStrength = strength;
            bestAngle = a;
          }
        }

        // Steer toward best pheromone with random wandering
        ant.angle += (bestAngle - ant.angle) * 0.3;
        ant.angle += (Math.random() - 0.5) * 0.6;

        ant.x += Math.cos(ant.angle) * ant.speed;
        ant.y += Math.sin(ant.angle) * ant.speed;

        // Wrap edges with margin
        const margin = 10;
        if (ant.x < margin) { ant.x = margin; ant.angle = Math.random() * Math.PI - Math.PI/2; }
        if (ant.x > w - margin) { ant.x = w - margin; ant.angle = Math.PI + (Math.random() * Math.PI - Math.PI/2); }
        if (ant.y < margin) { ant.y = margin; ant.angle = Math.random() * Math.PI; }
        if (ant.y > h - margin) { ant.y = h - margin; ant.angle = -Math.random() * Math.PI; }

        // Check if near matched partner's nest
        const targetNest = ant.type === 'man' ? womenNests[target] : menNests[target];
        const dx = ant.x - targetNest.x, dy = ant.y - targetNest.y;
        if (dx*dx + dy*dy < 900) {
          ant.matched = true;
          ant.matchTimer = Math.min(1, ant.matchTimer + 0.01);
        }
      }
    }

    function render() {
      const w = canvas.width, h = canvas.height;

      // Draw pheromone field
      if (!pheromoneImage || pheromoneImage.width !== gw || pheromoneImage.height !== gh) {
        pheromoneImage = ctx.createImageData(gw, gh);
      }
      const data = pheromoneImage.data;
      for (let y = 0; y < gh; y++) {
        for (let x = 0; x < gw; x++) {
          const base = (y * gw + x);
          const pi = base * N;
          let r = 0, g = 0, b = 0;
          // Men pheromone: blues
          for (let c = 0; c < N; c++) {
            const mv = pheromoneM[pi + c];
            const wv = pheromoneW[pi + c];
            // Blue for men, purple for women
            r += wv * 150;
            g += mv * 40 + wv * 30;
            b += mv * 200 + wv * 180;
            // Gold for overlapping matched pair trails
            if (matching[c] !== undefined) {
              const overlap = Math.min(mv, pheromoneW[pi + matching[c]]);
              r += overlap * 400;
              g += overlap * 350;
              b += overlap * 50;
            }
          }
          const idx = base * 4;
          data[idx] = Math.min(255, 13 + r);
          data[idx+1] = Math.min(255, 17 + g);
          data[idx+2] = Math.min(255, 23 + b);
          data[idx+3] = 255;
        }
      }
      ctx.putImageData(pheromoneImage, 0, 0);
      ctx.save();
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(canvas, 0, 0, gw, gh, 0, 0, w, h);
      ctx.restore();

      // Draw nests
      for (let i = 0; i < N; i++) {
        // Men nest
        ctx.beginPath();
        ctx.arc(menNests[i].x, menNests[i].y, 16, 0, Math.PI * 2);
        ctx.fillStyle = manColors[i] + '40';
        ctx.fill();
        ctx.strokeStyle = manColors[i];
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px Nunito';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('M'+(i+1), menNests[i].x, menNests[i].y);

        // Women nest
        ctx.beginPath();
        ctx.arc(womenNests[i].x, womenNests[i].y, 16, 0, Math.PI * 2);
        ctx.fillStyle = womanColors[i] + '40';
        ctx.fill();
        ctx.strokeStyle = womanColors[i];
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.fillText('W'+(i+1), womenNests[i].x, womenNests[i].y);
      }

      // Draw ants
      for (const ant of ants) {
        const color = ant.type === 'man' ? manColors[ant.index] : womanColors[ant.index];
        ctx.save();
        ctx.translate(ant.x, ant.y);
        ctx.rotate(ant.angle);
        ctx.fillStyle = ant.matched ? '#ffd700' : color;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.moveTo(5, 0);
        ctx.lineTo(-3, -2.5);
        ctx.lineTo(-3, 2.5);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
      }
    }

    loop();
  </script>
</body>
</html>
