<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ant Colony Match — Matching Algorithms Visual Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;overflow:hidden;font-family:sans-serif}
canvas{display:block;position:fixed;top:0;left:0}
.back{position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100}
.back:hover{background:#30363d}
.hud{position:fixed;top:16px;right:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#c9d1d9;padding:10px 16px;border-radius:12px;font-size:13px;z-index:50;backdrop-filter:blur(8px)}
.hud span{color:#ffd700;font-weight:700}
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<div class="hud">Matches: <span id="mc">0</span></div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const mcEl = document.getElementById('mc');
let W, H;

function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

// Pheromone grid
const GS = 200;
let phR = new Float32Array(GS * GS);
let phG = new Float32Array(GS * GS);
let phB = new Float32Array(GS * GS);

// 8 nests per side
const sNests = [], cNests = [];
for (let i = 0; i < 8; i++) {
  sNests.push({ x: 0, y: 0 });
  cNests.push({ x: 0, y: 0 });
}

function layoutNests() {
  for (let i = 0; i < 8; i++) {
    sNests[i].x = W * 0.08;
    sNests[i].y = H * (0.1 + i * 0.105);
    cNests[i].x = W * 0.92;
    cNests[i].y = H * (0.1 + i * 0.105);
  }
}
layoutNests();
window.addEventListener('resize', () => { resize(); layoutNests(); });

let matchCount = 0;
const NUM_ANTS = 50;
const ants = [];

class Ant {
  constructor(isStudent) {
    this.isStudent = isStudent;
    this.matched = false;
    this.waggle = 0;
    this.target = Math.floor(Math.random() * 8);
    this.speed = 1.2 + Math.random() * 0.8;
    this.trail = [];
    this.reset();
  }

  reset() {
    this.matched = false;
    this.waggle = 0;
    this.target = Math.floor(Math.random() * 8);
    this.trail = [];
    if (this.isStudent) {
      const n = sNests[this.target % 8];
      this.x = n.x + Math.random() * 30;
      this.y = n.y + (Math.random() - 0.5) * 20;
    } else {
      const n = cNests[this.target % 8];
      this.x = n.x - Math.random() * 30;
      this.y = n.y + (Math.random() - 0.5) * 20;
    }
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2;
  }

  update() {
    if (this.matched) {
      this.waggle += 0.15;
      const r = 6 + Math.sin(this.waggle * 0.5) * 3;
      this.x += Math.cos(this.waggle) * r * 0.1;
      this.y += Math.sin(this.waggle) * r * 0.1;
      this.x = Math.max(10, Math.min(W - 10, this.x));
      this.y = Math.max(10, Math.min(H - 10, this.y));
      if (this.waggle > 30) this.reset();
      return;
    }

    let tx, ty;
    if (this.isStudent) {
      tx = cNests[this.target].x; ty = cNests[this.target].y;
    } else {
      tx = sNests[this.target].x; ty = sNests[this.target].y;
    }

    const dx = tx - this.x, dy = ty - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 1) {
      this.vx += (dx / dist) * 0.12 + (Math.random() - 0.5) * 0.25;
      this.vy += (dy / dist) * 0.12 + (Math.random() - 0.5) * 0.25;
    }

    const spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (spd > this.speed) {
      this.vx = (this.vx / spd) * this.speed;
      this.vy = (this.vy / spd) * this.speed;
    }

    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 5 || this.x > W - 5) this.vx *= -1;
    if (this.y < 5 || this.y > H - 5) this.vy *= -1;
    this.x = Math.max(5, Math.min(W - 5, this.x));
    this.y = Math.max(5, Math.min(H - 5, this.y));

    // Lay pheromone
    const gx = Math.floor((this.x / W) * (GS - 1));
    const gy = Math.floor((this.y / H) * (GS - 1));
    const gi = gy * GS + gx;
    if (gi >= 0 && gi < GS * GS) {
      if (this.isStudent) { phB[gi] = Math.min(1, phB[gi] + 0.06); phG[gi] = Math.min(1, phG[gi] + 0.015); }
      else { phG[gi] = Math.min(1, phG[gi] + 0.06); phR[gi] = Math.min(1, phR[gi] + 0.01); }
    }

    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 40) this.trail.shift();

    if (dist < 25) {
      this.matched = true;
      matchCount++;
      mcEl.textContent = matchCount;
      // Gold trail
      for (const p of this.trail) {
        const pgx = Math.floor((p.x / W) * (GS - 1));
        const pgy = Math.floor((p.y / H) * (GS - 1));
        const pgi = pgy * GS + pgx;
        if (pgi >= 0 && pgi < GS * GS) {
          phR[pgi] = Math.min(1, phR[pgi] + 0.4);
          phG[pgi] = Math.min(1, phG[pgi] + 0.35);
        }
      }
    }
  }

  draw() {
    if (this.trail.length > 1) {
      for (let i = 1; i < this.trail.length; i++) {
        const a = (i / this.trail.length) * 0.4;
        if (this.matched) { ctx.strokeStyle = 'rgba(255,215,0,' + a + ')'; ctx.lineWidth = 2.5; }
        else if (this.isStudent) { ctx.strokeStyle = 'rgba(80,160,255,' + a + ')'; ctx.lineWidth = 1; }
        else { ctx.strokeStyle = 'rgba(100,200,140,' + a + ')'; ctx.lineWidth = 1; }
        ctx.beginPath();
        ctx.moveTo(this.trail[i - 1].x, this.trail[i - 1].y);
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
        ctx.stroke();
      }
    }

    const r = this.matched ? 4 : 3;
    if (this.matched) { ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 8; }
    else if (this.isStudent) { ctx.fillStyle = '#64b5f6'; ctx.shadowColor = '#64b5f6'; ctx.shadowBlur = 4; }
    else { ctx.fillStyle = '#81c784'; ctx.shadowColor = '#81c784'; ctx.shadowBlur = 4; }
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

for (let i = 0; i < NUM_ANTS; i++) ants.push(new Ant(i < 25));

const phCvs = document.createElement('canvas');
phCvs.width = GS; phCvs.height = GS;
const phCtx = phCvs.getContext('2d');

function animate() {
  // Evaporate
  for (let i = 0; i < GS * GS; i++) { phR[i] *= 0.995; phG[i] *= 0.995; phB[i] *= 0.995; }

  ants.forEach(a => a.update());

  // Render pheromones
  const imgData = phCtx.createImageData(GS, GS);
  const d = imgData.data;
  for (let i = 0; i < GS * GS; i++) {
    const idx = i * 4;
    d[idx]   = Math.min(255, Math.round(phR[i] * 255 + 13));
    d[idx+1] = Math.min(255, Math.round(phG[i] * 180 + 17));
    d[idx+2] = Math.min(255, Math.round(phB[i] * 255 + 23));
    d[idx+3] = 255;
  }
  phCtx.putImageData(imgData, 0, 0);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(phCvs, 0, 0, W, H);

  // Nests
  for (let i = 0; i < 8; i++) {
    ctx.fillStyle = 'rgba(100,180,255,0.12)';
    ctx.beginPath();
    ctx.arc(sNests[i].x, sNests[i].y, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(100,180,255,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#58a6ff';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('S' + (i + 1), sNests[i].x, sNests[i].y + 4);

    ctx.fillStyle = 'rgba(100,200,140,0.12)';
    ctx.beginPath();
    ctx.arc(cNests[i].x, cNests[i].y, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(100,200,140,0.4)';
    ctx.stroke();
    ctx.fillStyle = '#81c784';
    ctx.fillText('C' + (i + 1), cNests[i].x, cNests[i].y + 4);
  }
  ctx.textAlign = 'left';

  ants.forEach(a => a.draw());

  ctx.fillStyle = 'rgba(201,209,217,0.6)';
  ctx.font = '600 15px sans-serif';
  ctx.fillText('Ant Colony Match', 16, H - 16);

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
