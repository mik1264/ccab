<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Comic Strip — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Comic Strip</h2><p>A comic book sequence narrating the Gale-Shapley algorithm. Panels show proposals, speech bubbles with reactions, and a final splash panel of the stable matching.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    const N = 5;
    function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
    const menPrefs = Array.from({length:N},()=>shuffle([0,1,2,3,4]));
    const womenPrefs = Array.from({length:N},()=>shuffle([0,1,2,3,4]));
    const womenRank = womenPrefs.map(p=>{const r=[];p.forEach((m,i)=>r[m]=i);return r;});

    // Run GS and collect events
    const events = [];
    const menNext = Array(N).fill(0);
    const womenPartner = Array(N).fill(-1);
    const menFree = Array(N).fill(true);
    let free = N;
    while (free > 0) {
      for (let m = 0; m < N; m++) {
        if (!menFree[m] || menNext[m] >= N) continue;
        const w = menPrefs[m][menNext[m]]; menNext[m]++;
        if (womenPartner[w] === -1) {
          womenPartner[w] = m; menFree[m] = false; free--;
          events.push({m, w, accepted: true, displaced: -1});
        } else {
          const c = womenPartner[w];
          if (womenRank[w][m] < womenRank[w][c]) {
            womenPartner[w] = m; menFree[m] = false; menFree[c] = true;
            events.push({m, w, accepted: true, displaced: c});
          } else {
            events.push({m, w, accepted: false, displaced: -1});
          }
        }
      }
    }

    // Pick interesting events for panels 2-5
    const firstAccept = events.find(e => e.accepted);
    const firstReject = events.find(e => !e.accepted);
    const firstDisplace = events.find(e => e.displaced >= 0);
    const keyEvents = [firstAccept, firstReject, firstDisplace, events[events.length - 1]].filter(Boolean);
    // Ensure we have 4 events; fill with any if needed
    while (keyEvents.length < 4) keyEvents.push(events[keyEvents.length]);

    // Panel definitions
    const panels = [
      { type: 'title', title: 'ROUND 1:', subtitle: 'The Proposals Begin!', bg: '#1a1a3e' },
      { type: 'event', event: keyEvents[0], bg: '#1a2a1a' },
      { type: 'event', event: keyEvents[1], bg: '#2a1a1a' },
      { type: 'event', event: keyEvents[2], bg: '#1a1a2a' },
      { type: 'blocking', title: 'Can Anyone Block?', subtitle: 'Checking for blocking pairs...', bg: '#2a1a2a' },
      { type: 'splash', title: 'STABLE MATCHING ACHIEVED!', bg: '#0a2a1a' }
    ];

    // Drawing helpers
    function drawStickFigure(x, y, color, scale, armUp) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5 * scale;
      ctx.lineCap = 'round';
      // Head
      ctx.beginPath();
      ctx.arc(x, y - 25 * scale, 8 * scale, 0, Math.PI * 2);
      ctx.stroke();
      // Body
      ctx.beginPath();
      ctx.moveTo(x, y - 17 * scale);
      ctx.lineTo(x, y + 10 * scale);
      ctx.stroke();
      // Arms
      if (armUp) {
        ctx.beginPath();
        ctx.moveTo(x - 15 * scale, y - 5 * scale);
        ctx.lineTo(x, y - 10 * scale);
        ctx.lineTo(x + 15 * scale, y - 18 * scale);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(x - 15 * scale, y + 5 * scale);
        ctx.lineTo(x, y - 5 * scale);
        ctx.lineTo(x + 15 * scale, y + 5 * scale);
        ctx.stroke();
      }
      // Legs
      ctx.beginPath();
      ctx.moveTo(x - 10 * scale, y + 25 * scale);
      ctx.lineTo(x, y + 10 * scale);
      ctx.lineTo(x + 10 * scale, y + 25 * scale);
      ctx.stroke();
    }

    function drawSpeechBubble(x, y, text, color, tailDir) {
      const w = ctx.measureText(text).width + 20;
      const h = 28;
      const bx = x - w / 2;
      const by = y - h / 2;

      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.strokeStyle = color || '#333';
      ctx.lineWidth = 2;

      // Bubble
      ctx.beginPath();
      ctx.moveTo(bx + 8, by);
      ctx.lineTo(bx + w - 8, by);
      ctx.arcTo(bx + w, by, bx + w, by + 8, 8);
      ctx.lineTo(bx + w, by + h - 8);
      ctx.arcTo(bx + w, by + h, bx + w - 8, by + h, 8);
      ctx.lineTo(bx + 8, by + h);
      ctx.arcTo(bx, by + h, bx, by + h - 8, 8);
      ctx.lineTo(bx, by + 8);
      ctx.arcTo(bx, by, bx + 8, by, 8);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // Tail
      ctx.beginPath();
      const tx = tailDir === 'left' ? bx + 20 : bx + w - 20;
      ctx.moveTo(tx - 5, by + h);
      ctx.lineTo(tx, by + h + 12);
      ctx.lineTo(tx + 5, by + h);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.fill();
      ctx.stroke();

      // Text
      ctx.fillStyle = '#1a1a1a';
      ctx.font = 'bold 12px Nunito';
      ctx.textAlign = 'center';
      ctx.fillText(text, x, y + 4);
    }

    function drawActionLines(x, y, radius) {
      ctx.strokeStyle = 'rgba(251,191,36,0.5)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2 + performance.now() * 0.001;
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(angle) * radius * 0.6, y + Math.sin(angle) * radius * 0.6);
        ctx.lineTo(x + Math.cos(angle) * radius, y + Math.sin(angle) * radius);
        ctx.stroke();
      }
    }

    // Animation
    let panelRevealIdx = 0;
    let revealTimer = 0;
    const revealInterval = 2.0;
    let lastTime = performance.now();

    function animate(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Comic title bar
      ctx.fillStyle = '#fbbf24';
      ctx.font = 'bold 18px Lora';
      ctx.textAlign = 'center';
      ctx.fillText('THE STABLE MATCHING', canvas.width/2, 28);
      ctx.fillStyle = '#8b949e';
      ctx.font = '11px Nunito';
      ctx.fillText('A Gale-Shapley Comic', canvas.width/2, 44);

      // Panel layout: 3 columns, 2 rows
      const pad = 12;
      const topY = 55;
      const panelW = (canvas.width - pad * 4) / 3;
      const panelH = (canvas.height - topY - pad * 3) / 2;

      // Reveal panels
      revealTimer += dt;
      if (revealTimer >= revealInterval && panelRevealIdx < 6) {
        panelRevealIdx++;
        revealTimer = 0;
      }

      for (let p = 0; p < Math.min(6, panelRevealIdx + 1); p++) {
        const col = p % 3;
        const row = Math.floor(p / 3);
        const px = pad + col * (panelW + pad);
        const py = topY + row * (panelH + pad);
        const panel = panels[p];

        // Reveal animation for current panel
        const isRevealing = p === panelRevealIdx;
        const revealProgress = isRevealing ? Math.min(1, revealTimer / (revealInterval * 0.6)) : 1;

        ctx.save();
        ctx.beginPath();
        ctx.rect(px, py, panelW * revealProgress, panelH);
        ctx.clip();

        // Panel background
        ctx.fillStyle = panel.bg;
        ctx.fillRect(px, py, panelW, panelH);

        // Bold border
        ctx.strokeStyle = '#c9d1d9';
        ctx.lineWidth = 3;
        ctx.strokeRect(px, py, panelW, panelH);

        const cx = px + panelW / 2;
        const cy = py + panelH / 2;

        if (panel.type === 'title') {
          drawActionLines(cx, cy, Math.min(panelW, panelH) * 0.4);
          ctx.fillStyle = '#fbbf24';
          ctx.font = 'bold ' + Math.max(14, panelW * 0.08) + 'px Lora';
          ctx.textAlign = 'center';
          ctx.fillText(panel.title, cx, cy - 15);
          ctx.fillStyle = '#c9d1d9';
          ctx.font = Math.max(12, panelW * 0.055) + 'px Nunito';
          ctx.fillText(panel.subtitle, cx, cy + 15);

          // Small figures at bottom
          for (let i = 0; i < 3; i++) {
            drawStickFigure(cx - 50 + i * 50, cy + panelH * 0.3, '#58a6ff', 0.6, false);
          }
        } else if (panel.type === 'event') {
          const e = panel.event;
          const manX = cx - panelW * 0.25;
          const womanX = cx + panelW * 0.25;
          const figY = cy + panelH * 0.15;

          drawStickFigure(manX, figY, '#58a6ff', 0.8, true);
          drawStickFigure(womanX, figY, '#c084fc', 0.8, e.accepted);

          // Labels
          ctx.fillStyle = '#58a6ff';
          ctx.font = 'bold 11px JetBrains Mono';
          ctx.textAlign = 'center';
          ctx.fillText('M' + (e.m + 1), manX, figY + 35);
          ctx.fillStyle = '#c084fc';
          ctx.fillText('W' + (e.w + 1), womanX, figY + 35);

          // Speech bubbles
          if (e.accepted) {
            drawSpeechBubble(manX + 15, figY - 50, 'I choose you!', '#58a6ff', 'left');
            drawSpeechBubble(womanX - 10, figY - 50, 'Accepted!', '#4ade80', 'right');

            if (e.displaced >= 0) {
              ctx.fillStyle = '#ef4444';
              ctx.font = 'bold 10px Nunito';
              ctx.fillText('M' + (e.displaced+1) + ' displaced!', cx, py + panelH - 12);
            }
          } else {
            drawSpeechBubble(manX + 15, figY - 50, 'Will you...?', '#58a6ff', 'left');
            drawSpeechBubble(womanX - 10, figY - 50, 'Sorry, no!', '#ef4444', 'right');
          }

          // Panel number
          ctx.fillStyle = '#fbbf24';
          ctx.font = 'bold 10px JetBrains Mono';
          ctx.textAlign = 'left';
          ctx.fillText('#' + (p + 1), px + 6, py + 14);
        } else if (panel.type === 'blocking') {
          ctx.fillStyle = '#fbbf24';
          ctx.font = 'bold ' + Math.max(13, panelW * 0.06) + 'px Lora';
          ctx.textAlign = 'center';
          ctx.fillText(panel.title, cx, cy - 20);

          // Dramatic question marks
          ctx.fillStyle = '#ef4444';
          ctx.font = 'bold 36px Lora';
          ctx.fillText('?!', cx, cy + 25);

          ctx.fillStyle = '#4ade80';
          ctx.font = Math.max(11, panelW * 0.05) + 'px Nunito';
          ctx.fillText('No blocking pairs found!', cx, cy + 50);

          drawActionLines(cx, cy, 60);
        } else if (panel.type === 'splash') {
          // Splash panel!
          drawActionLines(cx, cy, Math.min(panelW, panelH) * 0.45);

          ctx.fillStyle = '#4ade80';
          ctx.font = 'bold ' + Math.max(16, panelW * 0.07) + 'px Lora';
          ctx.textAlign = 'center';
          ctx.fillText('STABLE MATCHING', cx, cy - panelH * 0.25);
          ctx.fillText('ACHIEVED!', cx, cy - panelH * 0.12);

          // Draw all matched pairs
          const pairSpacing = panelW / (N + 1);
          for (let w = 0; w < N; w++) {
            const m = womenPartner[w];
            if (m < 0) continue;
            const ppx = px + (w + 1) * pairSpacing;
            const ppy = cy + panelH * 0.1;
            drawStickFigure(ppx - 8, ppy, '#58a6ff', 0.5, true);
            drawStickFigure(ppx + 8, ppy, '#c084fc', 0.5, true);

            // Heart
            ctx.fillStyle = '#ef4444';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('\u2665', ppx, ppy - 30);

            ctx.fillStyle = '#c9d1d9';
            ctx.font = '9px JetBrains Mono';
            ctx.fillText('M'+(m+1)+'-W'+(w+1), ppx, ppy + 30);
          }

          // Checkmark
          ctx.fillStyle = '#4ade80';
          ctx.font = 'bold 28px sans-serif';
          ctx.fillText('\u2713', cx, cy + panelH * 0.35);
        }

        ctx.restore();
      }

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
