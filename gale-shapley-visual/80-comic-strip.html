<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Comic Strip — Matching Algorithms Visual Gallery</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:sans-serif; }
    canvas { display:block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background:#30363d; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const NODES = 6;
    const PANELS = 6;
    const COLS = 3;
    const ROWS = 2;
    let studentPrefs = [], schoolPrefs = [];
    let panelStates = [];
    let activePanel = 0;
    let panelTimer = 0;
    let panelGlow = 0;

    let leftNodes = [], rightNodes = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);

      for (let i = 0; i < NODES; i++) {
        leftNodes.push({ rx: 0.2, ry: 0.15 + 0.7 * i / (NODES - 1) });
        rightNodes.push({ rx: 0.8, ry: 0.15 + 0.7 * i / (NODES - 1) });
      }

      for (let i = 0; i < NODES; i++) {
        studentPrefs.push(shuffleArray([...Array(NODES).keys()]));
        schoolPrefs.push(shuffleArray([...Array(NODES).keys()]));
      }

      simulateAndCapture();
    }

    function simulateAndCapture() {
      let n = NODES;
      let free = [...Array(n).keys()];
      let proposals = new Array(n).fill(0);
      let schoolMatch = new Array(n).fill(-1);
      let studentMatch = new Array(n).fill(-1);
      let schRank = [];
      for (let i = 0; i < n; i++) {
        schRank[i] = new Array(n);
        for (let r = 0; r < n; r++) schRank[i][schoolPrefs[i][r]] = r;
      }

      let allStates = [];
      allStates.push(captureState(studentMatch, proposals));

      let safety = 0;
      while (free.length > 0 && safety < 100) {
        safety++;
        let newFree = [], toRemove = [];
        for (let s of free) {
          if (proposals[s] >= n) continue;
          let sch = studentPrefs[s][proposals[s]];
          proposals[s]++;
          if (schoolMatch[sch] === -1) {
            schoolMatch[sch] = s; studentMatch[s] = sch; toRemove.push(s);
          } else {
            let cur = schoolMatch[sch];
            if (schRank[sch][s] < schRank[sch][cur]) {
              schoolMatch[sch] = s; studentMatch[s] = sch; toRemove.push(s);
              studentMatch[cur] = -1; newFree.push(cur);
            }
          }
        }
        free = free.filter(f => !toRemove.includes(f)).concat(newFree);
        allStates.push(captureState(studentMatch, proposals));
      }

      // Select PANELS states evenly
      panelStates = [];
      if (allStates.length <= PANELS) {
        panelStates = allStates.slice();
        while (panelStates.length < PANELS) panelStates.push(allStates[allStates.length - 1]);
      } else {
        for (let p = 0; p < PANELS; p++) {
          let idx = Math.floor(p * (allStates.length - 1) / (PANELS - 1));
          panelStates.push(allStates[idx]);
        }
      }
    }

    function captureState(studentMatch, proposals) {
      let edges = [];
      for (let s = 0; s < NODES; s++) {
        for (let sch = 0; sch < NODES; sch++) {
          let rank = studentPrefs[s].indexOf(sch);
          let status = 'none';
          if (studentMatch[s] === sch) {
            status = 'matched';
          } else if (rank < proposals[s]) {
            status = 'rejected';
          } else if (rank === proposals[s]) {
            status = 'proposed';
          }
          edges.push({ student: s, school: sch, status: status, rank: rank });
        }
      }
      return edges;
    }

    function draw() {
      background(13, 17, 23);

      panelTimer += deltaTime / 1000;
      if (panelTimer > 3.0) {
        activePanel = (activePanel + 1) % PANELS;
        panelTimer = 0;
      }
      panelGlow = sin(panelTimer / 3.0 * PI) * 0.5 + 0.5;

      let margin = min(width, height) * 0.04;
      let totalW = width - margin * 2;
      let totalH = height - margin * 2 - 50;
      let panelW = (totalW - margin * (COLS - 1)) / COLS;
      let panelH = (totalH - margin * (ROWS - 1)) / ROWS;
      let startX = margin;
      let startY = margin + 35;

      for (let p = 0; p < PANELS; p++) {
        let col = p % COLS;
        let row = Math.floor(p / COLS);
        let px = startX + col * (panelW + margin);
        let py = startY + row * (panelH + margin);
        let isActive = p === activePanel;

        // Panel background
        noStroke();
        fill(18, 22, 30);
        rect(px, py, panelW, panelH, 6);

        // Panel border
        if (isActive) {
          stroke(255, 215, 80, 80 + 80 * panelGlow);
          strokeWeight(2.5);
        } else {
          stroke(40, 50, 65);
          strokeWeight(1.5);
        }
        noFill();
        rect(px, py, panelW, panelH, 6);

        // Panel number
        noStroke();
        fill(isActive ? color(255, 215, 80, 200) : color(80, 100, 130, 150));
        textAlign(LEFT, TOP);
        textSize(10);
        textStyle(BOLD);
        text('#' + (p + 1), px + 8, py + 6);

        // Panel label
        let labels = ['Initial', 'Round 1', 'Round 2', 'Round 3', 'Round 4', 'Final'];
        fill(isActive ? color(200, 210, 230, 180) : color(80, 100, 130, 120));
        textAlign(RIGHT, TOP);
        textSize(9);
        textStyle(NORMAL);
        text(labels[p], px + panelW - 8, py + 6);

        drawPanelGraph(px, py, panelW, panelH, panelStates[p], isActive, panelGlow);
      }

      // Title
      noStroke();
      fill(200, 210, 230, 160);
      textAlign(CENTER, TOP);
      textSize(13);
      textStyle(BOLD);
      text('COMIC STRIP \u2014 ALGORITHM STATE EVOLUTION', width / 2, 12);
      textSize(10);
      textStyle(NORMAL);
      fill(120, 140, 170, 120);
      text('Panel ' + (activePanel + 1) + ' of ' + PANELS + ' \u2014 auto-cycling every 3s', width / 2, 28);
    }

    function drawPanelGraph(px, py, pw, ph, edges, isActive, glow) {
      let graphTop = py + 22;
      let graphBot = py + ph - 10;
      let graphH = graphBot - graphTop;

      // Edges
      for (let e of edges) {
        let lx = px + pw * leftNodes[e.student].rx;
        let ly = graphTop + graphH * leftNodes[e.student].ry;
        let rx = px + pw * rightNodes[e.school].rx;
        let ry = graphTop + graphH * rightNodes[e.school].ry;

        let r, g, b, alpha, sw;

        switch (e.status) {
          case 'matched':
            r = 255; g = 215; b = 80;
            alpha = isActive ? 200 + 55 * glow : 160;
            sw = isActive ? 2.5 : 2;
            break;
          case 'proposed':
            r = 88; g = 166; b = 255;
            alpha = isActive ? 120 : 60;
            sw = 1.5;
            break;
          case 'rejected':
            r = 180; g = 60; b = 60;
            alpha = isActive ? 50 : 25;
            sw = 0.8;
            break;
          default:
            continue;
        }

        stroke(r, g, b, alpha);
        strokeWeight(sw);
        noFill();
        let midX = (lx + rx) / 2;
        let midY = (ly + ry) / 2 - (e.status === 'matched' ? 0 : 5 * sin(e.rank));
        bezier(lx, ly, midX - 10, midY, midX + 10, midY, rx, ry);
      }

      // Left nodes (students)
      for (let i = 0; i < NODES; i++) {
        let nx = px + pw * leftNodes[i].rx;
        let ny = graphTop + graphH * leftNodes[i].ry;
        let sz = min(pw, ph) * 0.06;

        noStroke();
        if (isActive) {
          fill(88, 166, 255, 30 * glow);
          circle(nx, ny, sz * 3);
        }
        fill(88, 166, 255, isActive ? 220 : 140);
        circle(nx, ny, sz);

        fill(200, 220, 255, isActive ? 180 : 100);
        textAlign(CENTER, CENTER);
        textSize(max(7, sz * 0.6));
        text(i + 1, nx, ny);
      }

      // Right nodes (schools)
      for (let i = 0; i < NODES; i++) {
        let nx = px + pw * rightNodes[i].rx;
        let ny = graphTop + graphH * rightNodes[i].ry;
        let sz = min(pw, ph) * 0.06;

        noStroke();
        if (isActive) {
          fill(255, 200, 80, 30 * glow);
          circle(nx, ny, sz * 3);
        }
        fill(255, 200, 80, isActive ? 220 : 140);
        circle(nx, ny, sz);

        fill(255, 240, 200, isActive ? 180 : 100);
        textAlign(CENTER, CENTER);
        textSize(max(7, sz * 0.6));
        text(i + 1, nx, ny);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
  </script>
</body>
</html>
