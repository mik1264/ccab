<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blocking Pair Domino Cascade — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:260px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Blocking Pair Domino Cascade</h2><p>A blocking pair is like a knocked domino — it triggers a cascade. Watch how finding one blocking pair destabilizes the matching in a chain reaction.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const N = 5;
    const pairLabels = [];
    for (let i = 0; i < N; i++) {
      for (let j = 0; j < N; j++) {
        pairLabels.push(`M${i+1}-W${j+1}`);
      }
    }

    // Dominoes arranged in rows
    const domW = 16, domH = 50;
    let dominoes = [];
    let cascadeActive = false;
    let resetTimer = 0;
    let message = 'Click a domino to trigger a blocking pair cascade';

    class Domino {
      constructor(x, y, row, col, label) {
        this.x = x;
        this.y = y;
        this.baseX = x;
        this.baseY = y;
        this.row = row;
        this.col = col;
        this.label = label;
        this.angle = 0; // 0 = standing, PI/2 = fallen
        this.angVel = 0;
        this.fallen = false;
        this.isBlocking = false;
        this.stabilized = false;
        this.color = '#58a6ff';
        // Determine if this is a matched pair (diagonal)
        if (row === col) {
          this.color = '#ffd700';
          this.isMatched = true;
        } else {
          this.isMatched = false;
          this.color = `hsl(${(row * 50 + col * 30) % 360}, 60%, 55%)`;
        }
      }
    }

    function init() {
      dominoes = [];
      cascadeActive = false;
      resetTimer = 0;
      const w = canvas.width, h = canvas.height;
      const totalW = N * (domW + 8) * N + 100;
      const startX = (w - Math.min(totalW, w * 0.85)) / 2 + 40;
      const startY = h * 0.35;
      const rowSpacing = 70;
      const colSpacing = domW + 6;

      let idx = 0;
      for (let r = 0; r < N; r++) {
        const rowY = startY + r * rowSpacing;
        for (let c = 0; c < N; c++) {
          const groupOffset = c * (N * colSpacing + 30);
          // Each "group" is a row of dominoes for one man vs all women
          const x = startX + r * colSpacing + groupOffset / N + c * colSpacing;
          dominoes.push(new Domino(x, rowY, r, c, pairLabels[idx++]));
        }
      }
    }

    init();
    window.addEventListener('resize', () => { resize(); init(); });

    canvas.addEventListener('click', e => {
      if (cascadeActive) return;
      for (const d of dominoes) {
        const dx = e.clientX - d.x, dy = e.clientY - d.y;
        if (Math.abs(dx) < domW && Math.abs(dy) < domH/2) {
          triggerCascade(d);
          break;
        }
      }
    });

    function triggerCascade(domino) {
      cascadeActive = true;
      domino.isBlocking = true;
      domino.fallen = true;
      domino.angVel = 2;
      message = `Blocking pair ${domino.label} triggered! Cascade in progress...`;
    }

    const gravity = 15;
    const fallThreshold = Math.PI / 2.2;

    let t = 0, dt = 1/60;
    function loop() {
      requestAnimationFrame(loop);
      t += dt;
      update();
      render();
    }

    function update() {
      if (!cascadeActive) return;

      let anyMoving = false;

      for (const d of dominoes) {
        if (d.stabilized) continue;
        if (!d.fallen) continue;

        anyMoving = true;

        // Gravity torque on falling domino
        d.angVel += gravity * Math.cos(d.angle) * dt;
        d.angVel *= 0.98; // Damping
        d.angle += d.angVel * dt;

        // Stop at ground
        if (d.angle >= Math.PI / 2) {
          d.angle = Math.PI / 2;
          d.angVel = 0;
          d.stabilized = true;

          // Knock over nearby dominoes in same row or adjacent
          for (const other of dominoes) {
            if (other.fallen || other.stabilized) continue;
            const dx = Math.abs(other.x - d.x);
            const dy = Math.abs(other.y - d.y);
            // Knock over if close enough horizontally or in adjacent row
            if (dx < domH * 0.9 && dy < 80) {
              other.fallen = true;
              other.angVel = 1.5 + Math.random() * 0.5;
            }
          }
        }
      }

      // Reset after all fallen
      if (cascadeActive && !anyMoving) {
        resetTimer += dt;
        if (resetTimer > 3) {
          // Rebuild standing dominoes
          for (const d of dominoes) {
            d.angle = 0;
            d.angVel = 0;
            d.fallen = false;
            d.stabilized = false;
            d.isBlocking = false;
          }
          cascadeActive = false;
          resetTimer = 0;
          message = 'Click a domino to trigger a blocking pair cascade';
        } else {
          const remaining = Math.ceil(3 - resetTimer);
          message = `Cascade complete! All pairs destabilized. Resetting in ${remaining}...`;
        }
      }
    }

    function render() {
      const w = canvas.width, h = canvas.height;
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, w, h);

      // Draw "floor" line
      ctx.strokeStyle = '#21262d';
      ctx.lineWidth = 1;

      // Row labels
      ctx.fillStyle = '#8b949e';
      ctx.font = '500 12px Nunito';
      ctx.textAlign = 'right';
      for (let r = 0; r < N; r++) {
        if (dominoes[r * N]) {
          ctx.fillText(`Man ${r+1}:`, dominoes[r * N].x - 25, dominoes[r * N].y + 4);
        }
      }

      // Column labels
      ctx.textAlign = 'center';
      for (let c = 0; c < N; c++) {
        if (dominoes[c]) {
          ctx.fillText(`W${c+1}`, dominoes[c].x, dominoes[c].y - domH/2 - 10);
        }
      }

      // Draw dominoes
      for (const d of dominoes) {
        ctx.save();
        ctx.translate(d.x, d.y + domH/2); // Pivot at bottom
        ctx.rotate(d.angle);

        // Shadow
        if (d.angle < Math.PI / 4) {
          ctx.fillStyle = 'rgba(0,0,0,0.2)';
          ctx.fillRect(-domW/2 + 2, -domH + 2, domW, domH);
        }

        // Domino body
        let color = d.color;
        if (d.isBlocking) color = '#f87171';
        if (d.fallen && !d.isBlocking) color = '#f97316';
        if (d.stabilized) color = '#6b7280';

        const grad = ctx.createLinearGradient(-domW/2, -domH, domW/2, 0);
        grad.addColorStop(0, color);
        grad.addColorStop(1, color + '80');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(-domW/2, -domH, domW, domH, 3);
        ctx.fill();

        // Border
        ctx.strokeStyle = d.isMatched ? '#ffd700' : '#fff3';
        ctx.lineWidth = d.isMatched ? 2 : 1;
        ctx.stroke();

        // Center line
        ctx.strokeStyle = '#fff3';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(-domW/2 + 2, -domH/2);
        ctx.lineTo(domW/2 - 2, -domH/2);
        ctx.stroke();

        // Dots (pips)
        ctx.fillStyle = '#fff';
        const pip = 2;
        ctx.beginPath();
        ctx.arc(0, -domH * 0.75, pip, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(-3, -domH * 0.25, pip, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(3, -domH * 0.25, pip, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      // Message
      ctx.fillStyle = cascadeActive ? '#f87171' : '#58a6ff';
      ctx.font = '600 14px Nunito';
      ctx.textAlign = 'center';
      ctx.fillText(message, w/2, h - 30);

      // Legend
      ctx.fillStyle = '#484f58';
      ctx.font = '500 11px Nunito';
      ctx.textAlign = 'left';
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(20, h - 80, 12, 12);
      ctx.fillStyle = '#8b949e';
      ctx.fillText('Matched pair (stable)', 38, h - 70);
    }

    loop();
  </script>
</body>
</html>
