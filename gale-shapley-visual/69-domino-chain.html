<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domino Chain — Matching Algorithms Visual Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    .back { position:fixed;top:16px;left:16px;background:rgba(13,17,23,0.85);border:1px solid #30363d;color:#58a6ff;text-decoration:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(8px);z-index:100 }
    .back:hover { background: #30363d; }
    .info { position:fixed;top:60px;left:16px;background:rgba(13,17,23,0.88);border:1px solid #30363d;border-radius:10px;padding:12px 16px;z-index:50;max-width:270px;backdrop-filter:blur(8px) }
    .info h2 { font-size:15px;color:#58a6ff;margin-bottom:4px }
    .info p { font-size:12px;color:#8b949e;line-height:1.4 }
  </style>
</head>
<body>
  <a class="back" href="index.html">← Back</a>
  <div class="info">
    <h2>Domino Chain</h2>
    <p>Dominoes fall in a cascade through S-curves and spirals. Blue student-halves propose to green school-halves. Accepted matches glow gold. Rejected pairs burst into particles.</p>
  </div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const TOTAL = 40;
    let W, H;

    let dominoes = [];
    let particles = [];
    let cascadeIdx = -1;
    let cascadeTimer = 0;
    let started = false;
    let matchResults = [];

    // Pre-compute Gale-Shapley
    const N = 8;
    let studentPrefs = [], schoolPrefs = [];
    let finalMatch = [];

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function runGS() {
      studentPrefs = []; schoolPrefs = [];
      for (let i = 0; i < N; i++) {
        studentPrefs.push(shuffle([...Array(N).keys()]));
        schoolPrefs.push(shuffle([...Array(N).keys()]));
      }
      const next = new Array(N).fill(0);
      const schoolCur = new Array(N).fill(-1);
      const matched = new Array(N).fill(-1);
      let changed = true;
      while (changed) {
        changed = false;
        for (let s = 0; s < N; s++) {
          if (matched[s] !== -1) continue;
          if (next[s] >= N) continue;
          changed = true;
          const t = studentPrefs[s][next[s]];
          next[s]++;
          if (schoolCur[t] === -1) {
            schoolCur[t] = s;
            matched[s] = t;
          } else {
            const cur = schoolCur[t];
            if (schoolPrefs[t].indexOf(s) < schoolPrefs[t].indexOf(cur)) {
              matched[cur] = -1;
              schoolCur[t] = s;
              matched[s] = t;
            }
          }
        }
      }
      finalMatch = matched;
    }

    function init() {
      runGS();
      dominoes = [];
      particles = [];
      cascadeIdx = -1;
      cascadeTimer = 0;
      started = false;

      // Assign each domino a student-school proposal
      matchResults = [];
      // First N dominoes are the stable matches, rest are rejected proposals
      for (let i = 0; i < N; i++) {
        matchResults.push({ si: i, ci: finalMatch[i], accepted: true });
      }
      // Fill remaining with random rejected pairs
      for (let i = N; i < TOTAL; i++) {
        const si = Math.floor(Math.random() * N);
        let ci = Math.floor(Math.random() * N);
        // Make sure it's not the final match
        if (ci === finalMatch[si]) ci = (ci + 1) % N;
        matchResults.push({ si, ci, accepted: false });
      }
      // Shuffle the results
      shuffle(matchResults);

      layoutDominoes();
    }

    function layoutDominoes() {
      // Create S-curve path, then spiral
      const path = [];
      const totalPts = TOTAL;

      for (let i = 0; i < totalPts; i++) {
        const frac = i / totalPts;
        let x, y;

        if (frac < 0.5) {
          // S-curve section
          const t = frac * 2;
          x = W * 0.15 + t * W * 0.7;
          y = H * 0.3 + Math.sin(t * Math.PI * 2) * H * 0.15;
        } else {
          // Spiral section
          const t = (frac - 0.5) * 2;
          const cx = W * 0.55, cy = H * 0.65;
          const maxR = Math.min(W, H) * 0.22;
          const angle = t * Math.PI * 3;
          const r = maxR * (1 - t * 0.6);
          x = cx + Math.cos(angle) * r;
          y = cy + Math.sin(angle) * r;
        }
        path.push({ x, y });
      }

      for (let i = 0; i < TOTAL; i++) {
        const pt = path[i];
        // Angle toward next domino
        let angle = 0;
        if (i < TOTAL - 1) {
          angle = Math.atan2(path[i + 1].y - pt.y, path[i + 1].x - pt.x) + Math.PI / 2;
        } else if (i > 0) {
          angle = Math.atan2(pt.y - path[i - 1].y, pt.x - path[i - 1].x) + Math.PI / 2;
        }

        dominoes.push({
          x: pt.x,
          y: pt.y,
          angle: angle,
          targetAngle: angle + Math.PI / 2.2,
          fallen: false,
          fallProgress: 0,
          result: matchResults[i],
          glowing: false,
          glowAlpha: 0
        });
      }
    }

    function spawnParticles(x, y, color) {
      for (let i = 0; i < 12; i++) {
        const a = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        particles.push({
          x, y,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed,
          life: 1,
          color
        });
      }
    }

    function drawDomino(d, t) {
      const dw = 12, dh = 36;
      const currentAngle = d.fallen
        ? d.angle + (d.targetAngle - d.angle) * Math.min(d.fallProgress, 1)
        : d.angle;

      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(currentAngle);

      // Shadow
      if (!d.fallen || d.fallProgress < 1) {
        const shadowOff = d.fallen ? d.fallProgress * 4 : 2;
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(-dw / 2 + shadowOff, -dh / 2 + shadowOff, dw, dh);
      }

      // Student half (top) - blue
      const accepted = d.result.accepted;
      const glowFactor = d.glowing ? d.glowAlpha : 0;

      // Top half
      if (accepted && d.fallen && d.fallProgress > 0.8) {
        ctx.fillStyle = `rgba(255,200,60,${0.5 + glowFactor * 0.5})`;
      } else {
        ctx.fillStyle = '#2d5a8e';
      }
      ctx.fillRect(-dw / 2, -dh / 2, dw, dh / 2);

      // Bottom half
      if (accepted && d.fallen && d.fallProgress > 0.8) {
        ctx.fillStyle = `rgba(255,180,40,${0.4 + glowFactor * 0.4})`;
      } else {
        ctx.fillStyle = '#2d6b3f';
      }
      ctx.fillRect(-dw / 2, 0, dw, dh / 2);

      // Border
      ctx.strokeStyle = accepted && d.glowing ? `rgba(255,200,60,${0.6 + glowFactor * 0.4})` : 'rgba(200,200,200,0.3)';
      ctx.lineWidth = 1;
      ctx.strokeRect(-dw / 2, -dh / 2, dw, dh);

      // Divider line
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.moveTo(-dw / 2, 0);
      ctx.lineTo(dw / 2, 0);
      ctx.stroke();

      // Dots (student number top, school number bottom)
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = '8px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(d.result.si + 1, 0, -dh / 4);
      ctx.fillText(d.result.ci + 1, 0, dh / 4);

      // Glow effect for accepted
      if (d.glowing) {
        ctx.shadowColor = '#ffc83c';
        ctx.shadowBlur = 12 * glowFactor;
        ctx.strokeStyle = `rgba(255,200,60,${glowFactor * 0.6})`;
        ctx.lineWidth = 2;
        ctx.strokeRect(-dw / 2 - 1, -dh / 2 - 1, dw + 2, dh + 2);
        ctx.shadowBlur = 0;
      }

      ctx.restore();
    }

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      init();
    }

    const t0 = performance.now();
    let startDelay = 120; // frames before cascade starts

    function animate() {
      const t = (performance.now() - t0) / 1000;
      cascadeTimer++;

      if (cascadeTimer > startDelay && !started) {
        started = true;
        cascadeIdx = 0;
        dominoes[0].fallen = true;
      }

      // Cascade progression
      if (started && cascadeIdx < TOTAL - 1) {
        const d = dominoes[cascadeIdx];
        if (d.fallProgress > 0.5) {
          cascadeIdx++;
          dominoes[cascadeIdx].fallen = true;
          // Particle burst for rejection
          if (!dominoes[cascadeIdx].result.accepted) {
            spawnParticles(dominoes[cascadeIdx].x, dominoes[cascadeIdx].y, '#f85149');
          }
        }
      }

      // Update fall progress
      for (const d of dominoes) {
        if (d.fallen && d.fallProgress < 1) {
          d.fallProgress += 0.025;
        }
        if (d.result.accepted && d.fallen && d.fallProgress > 0.8) {
          d.glowing = true;
          d.glowAlpha = Math.min(d.glowAlpha + 0.02, 1);
        }
      }

      // Update particles
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.life -= 0.015;
      }
      particles = particles.filter(p => p.life > 0);

      // Draw
      ctx.fillStyle = 'rgba(13,17,23,0.4)';
      ctx.fillRect(0, 0, W, H);

      // Draw path hint
      ctx.strokeStyle = 'rgba(88,166,255,0.04)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < dominoes.length; i++) {
        i === 0 ? ctx.moveTo(dominoes[i].x, dominoes[i].y) : ctx.lineTo(dominoes[i].x, dominoes[i].y);
      }
      ctx.stroke();

      // Dominoes
      for (const d of dominoes) drawDomino(d, t);

      // Particles
      for (const p of particles) {
        ctx.fillStyle = `rgba(248,81,73,${p.life})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.5 * p.life, 0, Math.PI * 2);
        ctx.fill();
      }

      // "Start" indicator
      if (!started) {
        const blink = 0.5 + 0.5 * Math.sin(t * 3);
        ctx.fillStyle = `rgba(88,166,255,${blink})`;
        ctx.font = '13px "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        if (dominoes.length > 0) {
          ctx.fillText('▶', dominoes[0].x - 25, dominoes[0].y);
        }
      }

      // Status
      const fallen = dominoes.filter(d => d.fallen).length;
      const accepted = dominoes.filter(d => d.glowing).length;
      ctx.fillStyle = '#8b949e';
      ctx.font = '12px "Segoe UI", sans-serif';
      ctx.textAlign = 'right';
      if (cascadeIdx >= TOTAL - 1 && dominoes[TOTAL - 1].fallProgress >= 1) {
        ctx.fillText('Cascade complete — ' + accepted + ' matches accepted', W - 20, H - 16);
      } else {
        ctx.fillText('Falling... ' + fallen + '/' + TOTAL + ' dominoes', W - 20, H - 16);
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    resize();
    animate();
  </script>
</body>
</html>
