<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Convergence Spiral — Matching Algorithms Visual Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0d1117; overflow:hidden; font-family:'Nunito',sans-serif; }
    canvas { display:block; position:fixed; top:0; left:0; }
    .back-link { position:fixed; top:16px; left:16px; background:rgba(22,27,34,0.9); border:1px solid #30363d; color:#58a6ff; text-decoration:none; padding:8px 14px; border-radius:20px; font-size:13px; font-weight:600; backdrop-filter:blur(8px); z-index:100; transition:background 0.2s; }
    .back-link:hover { background:#30363d; }
    .info { position:fixed; top:60px; left:16px; background:rgba(13,17,23,0.88); border:1px solid #30363d; border-radius:10px; padding:12px 16px; z-index:50; max-width:280px; backdrop-filter:blur(8px); }
    .info h2 { font-family:'Lora',serif; font-size:15px; color:#58a6ff; margin-bottom:4px; }
    .info p { font-size:12px; color:#8b949e; line-height:1.4; }
  </style>
</head>
<body>
  <a href="../gale-shapley-visual/index.html" class="back-link">← Visual Gallery</a>
  <div class="info"><h2>Convergence Spiral</h2><p>An Archimedean spiral that slowly resolves from chaos to order — visually encoding the DA algorithm's convergence to a stable matching.</p></div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = innerWidth; canvas.height = innerHeight;
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });

    let t = 0;

    function draw() {
      ctx.fillStyle = 'rgba(13,17,23,0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const maxR = Math.min(canvas.width, canvas.height) * 0.45;

      // Draw the Archimedean spiral from outer (chaotic) to inner (ordered)
      const totalTurns = 12;
      const totalSteps = 2000;
      const spiralSpeed = t * 0.2; // Slow winding

      for (let s = 0; s < totalSteps; s++) {
        const frac = s / totalSteps; // 0 = outer (chaos), 1 = inner (order)
        const angle = frac * totalTurns * Math.PI * 2 + spiralSpeed;
        const r = maxR * (1 - frac);

        // Breathing effect
        const breathe = 1 + 0.02 * Math.sin(t * 1.5 + frac * 10);
        const actualR = r * breathe;

        // Chaos factor: outer = chaotic offsets, inner = clean
        const chaos = (1 - frac) * (1 - frac); // Quadratic decay
        const noiseX = chaos * 20 * Math.sin(s * 0.3 + t * 2);
        const noiseY = chaos * 20 * Math.cos(s * 0.37 + t * 1.7);

        const px = cx + actualR * Math.cos(angle) + noiseX;
        const py = cy + actualR * Math.sin(angle) + noiseY;

        // Color: outer = rainbow chaos, inner = calm gold/white
        const hue = chaos > 0.1
          ? (s * 0.5 + t * 50) % 360
          : 45 + 15 * Math.sin(angle); // Warm gold
        const saturation = chaos > 0.1 ? 80 : 30 + 20 * frac;
        const lightness = 40 + 30 * frac;
        const alpha = 0.5 + 0.5 * frac;

        const dotSize = 1 + 2 * frac;

        ctx.beginPath();
        ctx.arc(px, py, dotSize, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
        ctx.fill();
      }

      // Draw central mandala (the stable matching)
      const mandalaR = 30 + 5 * Math.sin(t * 0.8);
      const points = 10; // 5 matched pairs = 10 points

      // Star polygon
      ctx.beginPath();
      for (let i = 0; i <= points; i++) {
        const angle = (i / points) * Math.PI * 2 - Math.PI / 2 + t * 0.1;
        const r2 = (i % 2 === 0) ? mandalaR : mandalaR * 0.45;
        const px2 = cx + r2 * Math.cos(angle);
        const py2 = cy + r2 * Math.sin(angle);
        if (i === 0) ctx.moveTo(px2, py2);
        else ctx.lineTo(px2, py2);
      }
      ctx.closePath();
      ctx.strokeStyle = 'rgba(255,215,0,0.8)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Mandala glow
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, mandalaR * 1.5);
      grad.addColorStop(0, 'rgba(255,215,0,0.3)');
      grad.addColorStop(0.5, 'rgba(255,215,0,0.05)');
      grad.addColorStop(1, 'rgba(255,215,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, mandalaR * 1.5, 0, Math.PI * 2);
      ctx.fill();

      // Center dot
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#ffd700';
      ctx.fill();

      // Decorative rings
      for (let ring = 1; ring <= 5; ring++) {
        const ringR = mandalaR * (0.3 + ring * 0.2);
        ctx.beginPath();
        ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,215,0,${0.15 - ring * 0.02})`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }

      // Matched pair dots on inner mandala vertices
      for (let i = 0; i < 5; i++) {
        const angle1 = (i * 2 / points) * Math.PI * 2 - Math.PI / 2 + t * 0.1;
        const angle2 = ((i * 2 + 1) / points) * Math.PI * 2 - Math.PI / 2 + t * 0.1;
        const r1 = mandalaR;
        const r2 = mandalaR * 0.45;

        // Man
        ctx.beginPath();
        ctx.arc(cx + r1 * Math.cos(angle1), cy + r1 * Math.sin(angle1), 3, 0, Math.PI * 2);
        ctx.fillStyle = '#58a6ff';
        ctx.fill();

        // Woman
        ctx.beginPath();
        ctx.arc(cx + r2 * Math.cos(angle2), cy + r2 * Math.sin(angle2), 3, 0, Math.PI * 2);
        ctx.fillStyle = '#bc8cff';
        ctx.fill();
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      t += 0.016;
      draw();
    }
    animate();
  </script>
</body>
</html>
