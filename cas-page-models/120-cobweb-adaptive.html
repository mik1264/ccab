<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cobweb with Adaptive Expectations — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.5rem; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Adaptive Cobweb</h2>
  <p>Demand: D(P) = a − b·P. Supply: S(P^e) = c + d·P^e. Naive: P^e_t = P_{t−1}. Adaptive: P^e_t = P^e_{t−1} + λ(P_{t−1} − P^e_{t−1}). Smaller λ damps oscillations.</p>

  <div class="control"><label>a demand intercept <span id="va">10</span></label><input type="range" id="ia" min="2" max="20" step="0.1" value="10" /></div>
  <div class="control"><label>b demand slope <span id="vb">1.0</span></label><input type="range" id="ib" min="0.2" max="3" step="0.05" value="1.0" /></div>
  <div class="control"><label>c supply intercept <span id="vc">2</span></label><input type="range" id="ic" min="0" max="6" step="0.1" value="2" /></div>
  <div class="control"><label>d supply slope <span id="vd">1.2</span></label><input type="range" id="id" min="0.2" max="3" step="0.05" value="1.2" /></div>
  <div class="control"><label>λ adapt speed <span id="vl">1.0</span></label><input type="range" id="il" min="0" max="1" step="0.01" value="1.0" /></div>

  <div class="btnrow">
    <button class="p" data-p="10,1.0,2,1.2,1.0">Naive (λ=1)</button>
    <button class="p" data-p="10,1.0,2,1.5,0.4">Damped</button>
    <button class="p" data-p="10,1.0,2,1.5,1.0">Explosive</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Step</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>step n</span><span class="v" id="sn">0</span></div>
  <div class="stat"><span>P_n</span><span class="v" id="sp">—</span></div>
  <div class="stat"><span>P^e_n</span><span class="v" id="spe">—</span></div>
  <div class="stat"><span>P* equilibrium</span><span class="v" id="ps">—</span></div>
  <div class="stat"><span>stability d/b·λ</span><span class="v" id="sst">—</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0; const dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize', resize); resize();

  const SAGE='#8A9A5B', EARTH='#DDA15E', MAG='#e879f9', CY='#06b6d4', PLASMA='#fb923c', GRID='rgba(254,250,224,0.08)', AXIS='rgba(254,250,224,0.45)';

  let a=10, b=1.0, c=2, d=1.2, lambda=1.0;
  let P=2, Pe=2, n=0, running=true;
  const series=[]; // {n,P,Pe}
  let lastTime = 0;
  const stepInterval = 700; // ms per step (slow loop)

  function eq(){
    // P*: a - bP = c + dP → P = (a-c)/(b+d)
    return (a-c)/(b+d);
  }
  function reset(){ P=eq()-2.5; Pe=P; n=0; series.length=0; series.push({n:0,P,Pe}); }

  function step(){
    // 1) Suppliers act on P^e: quantity Q = c + d*Pe
    const Q = c + d*Pe;
    // 2) Market clears: a - b*P_new = Q → P_new = (a - Q)/b
    const Pnew = (a - Q)/b;
    // 3) Adaptive update for next round
    const Penew = Pe + lambda*(Pnew - Pe);
    P = Pnew; Pe = Penew;
    n++;
    series.push({n,P,Pe});
    if (series.length > 800) series.shift();
  }

  function drawAxes(x,y,w,h,title){
    ctx.strokeStyle=AXIS; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito'; ctx.fillText(title, x, y-8);
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    if(series.length<1) return;
    const padR=360;
    const totW=W-padR-80;

    const Pstar=eq(); const Qstar=a-b*Pstar;
    const Pmax=Math.max(Pstar*2.5, 12);
    const Qmax=Math.max(Qstar*2, a*1.05);

    // === Left: cobweb diagram (Q,P) ===
    const x0=60, y0=60, w0=totW/2-20, h0=H-130;
    drawAxes(x0,y0,w0,h0,'Cobweb diagram (Q on x, P on y)');
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y0+i*h0/5; ctx.beginPath(); ctx.moveTo(x0,py); ctx.lineTo(x0+w0,py); ctx.stroke(); }
    for(let i=1;i<5;i++){ const px=x0+i*w0/5; ctx.beginPath(); ctx.moveTo(px,y0); ctx.lineTo(px,y0+h0); ctx.stroke(); }
    // Demand: Q = a - bP → P = (a-Q)/b. Plot.
    function pX(Q){ return x0+Math.min(Q,Qmax)/Qmax*w0; }
    function pY(P){ return y0+h0-Math.min(P,Pmax)/Pmax*h0; }
    ctx.strokeStyle=EARTH; ctx.lineWidth=2.5; ctx.beginPath();
    let first=true;
    for(let i=0;i<=80;i++){
      const Q=i/80*Qmax; const Pp=(a-Q)/b;
      if(Pp<0||Pp>Pmax) continue;
      const px=pX(Q); const py=pY(Pp);
      if(first){ ctx.moveTo(px,py); first=false; } else ctx.lineTo(px,py);
    } ctx.stroke();
    // Supply: Q = c + dP → P = (Q-c)/d
    ctx.strokeStyle=SAGE; ctx.lineWidth=2.5; ctx.beginPath();
    first=true;
    for(let i=0;i<=80;i++){
      const Q=i/80*Qmax; const Pp=(Q-c)/d;
      if(Pp<0||Pp>Pmax) continue;
      const px=pX(Q); const py=pY(Pp);
      if(first){ ctx.moveTo(px,py); first=false; } else ctx.lineTo(px,py);
    } ctx.stroke();
    // equilibrium
    ctx.fillStyle=MAG;
    ctx.beginPath(); ctx.arc(pX(Qstar), pY(Pstar), 6, 0, Math.PI*2); ctx.fill();
    // Cobweb path: each step (Pe→Q→P→Pe')
    ctx.strokeStyle='rgba(251,146,60,0.7)'; ctx.lineWidth=1.6;
    for(let i=1;i<series.length;i++){
      const prev=series[i-1], cur=series[i];
      // From previous Pe along supply: Q=c+d*Pe_prev; market price was P_cur (computed)
      const Q1 = c + d*prev.Pe;
      // From (P_prev, Q_prev_demanded) up/down to supply at Q1, then horizontally to demand giving P_cur, then up/down to next supply...
      // We'll draw 3-segment per step:
      // (Q_old, P_prev) → (Q1, P_prev)? Use simpler: vertical from Pe_prev on supply to demand → horizontal to next.
      // Visual: at step transition, supply produces Q1 at price expectation Pe_prev; demand clears at P_cur for that Q1.
      const Q1demand = a - b*cur.P;
      const x_s=pX(Q1), y_s=pY(prev.Pe);
      const x_m=pX(Q1demand), y_m=pY(cur.P);
      const x_e=pX(Q1demand), y_e=pY(cur.Pe);
      ctx.beginPath();
      ctx.moveTo(x_s,y_s);
      ctx.lineTo(x_m,y_m);
      ctx.lineTo(x_e,y_e);
      ctx.stroke();
    }
    // current
    const last=series[series.length-1];
    ctx.fillStyle=PLASMA;
    ctx.beginPath(); ctx.arc(pX(a-b*last.P), pY(last.P), 5, 0, Math.PI*2); ctx.fill();
    // labels
    ctx.font='11px Nunito';
    ctx.fillStyle=EARTH; ctx.fillText('Demand', x0+w0-72, y0+12);
    ctx.fillStyle=SAGE; ctx.fillText('Supply', x0+w0-72, y0+28);
    ctx.fillStyle=MAG; ctx.fillText('P* equilibrium', x0+w0-130, y0+44);
    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('Q →', x0+w0-30, y0+h0+16);
    ctx.save(); ctx.translate(x0-26, y0+h0/2+10); ctx.rotate(-Math.PI/2); ctx.fillText('P', 0, 0); ctx.restore();

    // === Right: stair-step P(n) and Pe(n) over time ===
    const x1=x0+w0+40, y1=60, w1=totW/2-20, h1=H-130;
    drawAxes(x1,y1,w1,h1,'P_n (line) vs P^e_n (dashed) over steps');
    let pmax=Pstar*2;
    for(const p of series){ if(p.P>pmax)pmax=p.P; if(p.Pe>pmax)pmax=p.Pe; }
    pmax*=1.1;
    let pmin=0;
    for(const p of series){ if(p.P<pmin)pmin=p.P; if(p.Pe<pmin)pmin=p.Pe; }
    pmin=Math.min(pmin-1,-1);
    const prRange=pmax-pmin;
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y1+i*h1/5; ctx.beginPath(); ctx.moveTo(x1,py); ctx.lineTo(x1+w1,py); ctx.stroke(); }
    // P* line
    const psy=y1+h1-(Pstar-pmin)/prRange*h1;
    ctx.strokeStyle='rgba(232,121,249,0.5)'; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(x1,psy); ctx.lineTo(x1+w1,psy); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=MAG; ctx.font='11px Nunito'; ctx.fillText('P*', x1+w1-22, psy-4);

    const nMin=series[0].n, nMax=series[series.length-1].n;
    const nspan=Math.max(nMax-nMin,1);
    function nx(n){ return x1+(n-nMin)/nspan*w1; }
    function py(P){ return y1+h1-(P-pmin)/prRange*h1; }

    // P_n stair-step
    ctx.strokeStyle=EARTH; ctx.lineWidth=2; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const p=series[i]; const x=nx(p.n); const y=py(p.P);
      if(i===0){ ctx.moveTo(x,y); }
      else {
        const xprev=nx(series[i-1].n);
        ctx.lineTo(x, py(series[i-1].P));
        ctx.lineTo(x,y);
      }
    } ctx.stroke();
    // P^e_n stair-step
    ctx.strokeStyle=CY; ctx.lineWidth=2; ctx.setLineDash([4,3]); ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const p=series[i]; const x=nx(p.n); const y=py(p.Pe);
      if(i===0){ ctx.moveTo(x,y); }
      else {
        ctx.lineTo(x, py(series[i-1].Pe));
        ctx.lineTo(x,y);
      }
    } ctx.stroke(); ctx.setLineDash([]);
    // dots
    ctx.fillStyle=EARTH;
    for(const p of series){ ctx.beginPath(); ctx.arc(nx(p.n), py(p.P), 2.5, 0, Math.PI*2); ctx.fill(); }
    ctx.fillStyle=CY;
    for(const p of series){ ctx.beginPath(); ctx.arc(nx(p.n), py(p.Pe), 2.5, 0, Math.PI*2); ctx.fill(); }
    ctx.font='11px Nunito';
    ctx.fillStyle=EARTH; ctx.fillText('— P_n actual', x1+12, y1+18);
    ctx.fillStyle=CY; ctx.fillText('-- P^e_n expected', x1+110, y1+18);

    // stability indicator
    const stab = (d/b)*lambda;
    ctx.fillStyle = stab<1?SAGE:(stab<2?PLASMA:MAG);
    ctx.font='bold 12px Lora';
    ctx.fillText('stability d/b·λ = '+stab.toFixed(2)+(stab<1?' (converges)':' (diverges)'), x1+12, y1+h1-8);
  }

  function loop(ts){
    if(running && ts-lastTime>stepInterval){ step(); lastTime=ts; }
    document.getElementById('sn').textContent=n;
    document.getElementById('sp').textContent=P.toFixed(3);
    document.getElementById('spe').textContent=Pe.toFixed(3);
    document.getElementById('ps').textContent=eq().toFixed(3);
    document.getElementById('sst').textContent=((d/b)*lambda).toFixed(3);
    draw();
    requestAnimationFrame(loop);
  }

  function bind(id,vid,fn,decimals=2){ const el=document.getElementById(id);
    el.addEventListener('input', e=>{ const v=+e.target.value; document.getElementById(vid).textContent=v.toFixed(decimals); fn(v); });
  }
  bind('ia','va',v=>a=v,1); bind('ib','vb',v=>b=v,2); bind('ic','vc',v=>c=v,1);
  bind('id','vd',v=>d=v,2); bind('il','vl',v=>lambda=v,2);

  document.querySelectorAll('.p').forEach(btn=>{
    btn.onclick=()=>{
      const p=btn.dataset.p.split(',').map(Number);
      a=p[0]; b=p[1]; c=p[2]; d=p[3]; lambda=p[4];
      ['ia','ib','ic','id','il'].forEach((id,i)=>{ document.getElementById(id).value=p[i]; });
      document.getElementById('va').textContent=p[0].toFixed(1);
      document.getElementById('vb').textContent=p[1].toFixed(2);
      document.getElementById('vc').textContent=p[2].toFixed(1);
      document.getElementById('vd').textContent=p[3].toFixed(2);
      document.getElementById('vl').textContent=p[4].toFixed(2);
      reset();
    };
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running;
    e.target.textContent = running?'Pause':'Step→';
    if(!running){
      // single step on click
      e.target.onclick=null;
    }
  });
  // Different behaviour: bRun toggles auto-stepping
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
