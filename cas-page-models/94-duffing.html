<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Duffing Oscillator — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 94</span>
  <h2>Duffing Oscillator</h2>
  <p>ẍ + δẋ + αx + βx³ = γcos(ωt). A double-well spring driven and damped — classic route to chaos. The Poincaré section samples once per drive period 2π/ω, exposing fractal strange attractors.</p>

  <div class="control"><label>δ damping <span id="vd">0.30</span></label><input id="id" type="range" min="0" max="1" step="0.01" value="0.30" /></div>
  <div class="control"><label>α linear <span id="va">-1.00</span></label><input id="ia" type="range" min="-2" max="2" step="0.05" value="-1.00" /></div>
  <div class="control"><label>β cubic <span id="vb">1.00</span></label><input id="ib" type="range" min="-2" max="2" step="0.05" value="1.00" /></div>
  <div class="control"><label>γ drive amp <span id="vg">0.30</span></label><input id="ig" type="range" min="0" max="0.6" step="0.005" value="0.30" /></div>
  <div class="control"><label>ω drive freq <span id="vw">1.20</span></label><input id="iw" type="range" min="0.4" max="2.5" step="0.01" value="1.20" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-p="0.30,-1,1,0.30,1.2">Chaos</button>
    <button class="p" data-p="0.25,-1,1,0.20,1.0">Period-2</button>
    <button class="p" data-p="0.30,-1,1,0.10,1.2">Limit cycle</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>x</span><span class="v" id="sx">—</span></div>
  <div class="stat"><span>ẋ</span><span class="v" id="sv">—</span></div>
  <div class="stat"><span>Poincaré pts</span><span class="v" id="sp">0</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);}
  addEventListener('resize',resize); resize();

  let delta=0.30, alpha=-1.0, beta=1.0, gamma=0.30, omega=1.20;
  let x=0.5, v=0, t=0, running=true;
  const series=[]; const MAX=2000;
  const poincare=[];
  let lastPhase=0;

  function reset(){ x=0.5; v=0; t=0; series.length=0; poincare.length=0; lastPhase=0; }

  function deriv(x,v,t){
    return [v, -delta*v - alpha*x - beta*x*x*x + gamma*Math.cos(omega*t)];
  }
  function rk4(dt){
    const [a1,b1]=deriv(x,v,t);
    const [a2,b2]=deriv(x+dt/2*a1, v+dt/2*b1, t+dt/2);
    const [a3,b3]=deriv(x+dt/2*a2, v+dt/2*b2, t+dt/2);
    const [a4,b4]=deriv(x+dt*a3, v+dt*b3, t+dt);
    x += dt/6*(a1+2*a2+2*a3+a4);
    v += dt/6*(b1+2*b2+2*b3+b4);
    t += dt;
  }

  function tick(){
    const dt=0.02;
    for (let i=0;i<5;i++){
      rk4(dt);
      const phase = (omega*t)%(2*Math.PI);
      if (phase < lastPhase) {
        poincare.push({x, v});
        if (poincare.length>4000) poincare.shift();
      }
      lastPhase = phase;
    }
    series.push({t,x,v});
    if (series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sx').textContent=x.toFixed(3);
    document.getElementById('sv').textContent=v.toFixed(3);
    document.getElementById('sp').textContent=poincare.length;
  }

  function turbo(t){
    t=Math.max(0,Math.min(1,t));
    const r=Math.round(255*Math.min(1,Math.max(0, 0.13572 + 4.61539*t - 42.66032*t*t + 132.13108*t*t*t - 152.94239*t*t*t*t + 59.28637*t*t*t*t*t)));
    const g=Math.round(255*Math.min(1,Math.max(0, 0.09140 + 2.19418*t + 4.84296*t*t - 14.18503*t*t*t + 4.27729*t*t*t*t + 2.82956*t*t*t*t*t)));
    const b=Math.round(255*Math.min(1,Math.max(0, 0.10667 + 12.64194*t - 60.58204*t*t + 110.36276*t*t*t - 89.90310*t*t*t*t + 27.34824*t*t*t*t*t)));
    return `rgb(${r},${g},${b})`;
  }
  function drawArrow(x1,y1,x2,y2){
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    const a=Math.atan2(y2-y1,x2-x1), s=3;
    ctx.lineTo(x2-s*Math.cos(a-Math.PI/6), y2-s*Math.sin(a-Math.PI/6));
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-s*Math.cos(a+Math.PI/6), y2-s*Math.sin(a+Math.PI/6));
    ctx.stroke();
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    if (series.length<2) return;
    const padL=70, padR=360, padT=60, padB=60;
    const totW = W-padL-padR;
    const tsH = (H-padT-padB-60)*0.42;
    const ppSize = Math.min(totW*0.55, (H-padT-padB-60)*0.55);
    const ppX0 = padL, ppY0 = padT+tsH+60;
    const cdX = padL+ppSize+50, cdY = ppY0;
    const cdW = totW-ppSize-50, cdH = ppSize;

    // Time series x(t)
    let mx=0;
    for (const s of series) if (Math.abs(s.x)>mx) mx=Math.abs(s.x);
    if (mx<1) mx=1; mx*=1.1;
    const t0=series[0].t, t1=series[series.length-1].t, tspan=Math.max(t1-t0,1);

    ctx.strokeStyle='rgba(254,250,224,0.07)'; ctx.lineWidth=1;
    for (let i=0;i<=4;i++){const yp=padT+i*tsH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    ctx.strokeStyle='rgba(254,250,224,0.4)';
    ctx.beginPath(); ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+tsH); ctx.lineTo(padL+totW,padT+tsH); ctx.stroke();
    ctx.strokeStyle='rgba(254,250,224,0.15)';
    ctx.beginPath(); ctx.moveTo(padL,padT+tsH/2); ctx.lineTo(padL+totW,padT+tsH/2); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('x(t) — position vs time', padL, padT-12);
    ctx.fillText('+'+mx.toFixed(2), padL-50, padT+5);
    ctx.fillText('-'+mx.toFixed(2), padL-50, padT+tsH);

    ctx.shadowBlur=8; ctx.shadowColor='#e879f9';
    ctx.strokeStyle='#e879f9'; ctx.lineWidth=2;
    ctx.beginPath();
    for (let i=0;i<series.length;i++){
      const s=series[i];
      const px=padL+(s.t-t0)/tspan*totW;
      const py=padT+tsH/2-s.x/mx*tsH/2;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.shadowBlur=0;

    // Phase portrait with vector field
    let mxP=0,mvP=0;
    for (const s of series){if (Math.abs(s.x)>mxP) mxP=Math.abs(s.x); if (Math.abs(s.v)>mvP) mvP=Math.abs(s.v);}
    mxP=Math.max(mxP,2)*1.2; mvP=Math.max(mvP,2)*1.2;

    ctx.fillStyle='rgba(254,250,224,0.7)';
    ctx.fillText('Phase (x, ẋ) + vector field', ppX0, ppY0-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(ppX0,ppY0,ppSize,ppSize);
    const cx0=ppX0+ppSize/2, cy0=ppY0+ppSize/2;
    ctx.strokeStyle='rgba(254,250,224,0.2)';
    ctx.beginPath();
    ctx.moveTo(ppX0,cy0); ctx.lineTo(ppX0+ppSize,cy0);
    ctx.moveTo(cx0,ppY0); ctx.lineTo(cx0,ppY0+ppSize); ctx.stroke();

    // vector field (snapshot at current t, drive=0 component shown)
    const grid=14, stepX=ppSize/grid;
    const fld=[]; let maxSp=0;
    for (let gi=0; gi<=grid; gi++){
      for (let gj=0; gj<=grid; gj++){
        const xx=-mxP+2*mxP*gi/grid, vv=-mvP+2*mvP*gj/grid;
        const dxx=vv, dvv=-delta*vv-alpha*xx-beta*xx*xx*xx;
        const sp=Math.sqrt(dxx*dxx+dvv*dvv);
        if (sp>maxSp) maxSp=sp;
        fld.push({xx,vv,dxx,dvv,sp});
      }
    }
    for (const f of fld){
      const px=ppX0+(f.xx+mxP)/(2*mxP)*ppSize;
      const py=ppY0+ppSize-(f.vv+mvP)/(2*mvP)*ppSize;
      const norm=f.sp/Math.max(maxSp,1e-6);
      ctx.strokeStyle=turbo(norm); ctx.lineWidth=1;
      ctx.globalAlpha=0.45+0.45*norm;
      const len=stepX*0.45, a=Math.atan2(-f.dvv,f.dxx);
      drawArrow(px-len/2*Math.cos(a), py-len/2*Math.sin(a), px+len/2*Math.cos(a), py+len/2*Math.sin(a));
    }
    ctx.globalAlpha=1;

    // trajectory
    const N=series.length;
    for (let i=1;i<N;i++){
      const s0=series[i-1], s1=series[i];
      const px0=ppX0+(s0.x+mxP)/(2*mxP)*ppSize, py0=ppY0+ppSize-(s0.v+mvP)/(2*mvP)*ppSize;
      const px1=ppX0+(s1.x+mxP)/(2*mxP)*ppSize, py1=ppY0+ppSize-(s1.v+mvP)/(2*mvP)*ppSize;
      const age=i/N;
      ctx.globalAlpha=age*age*0.95;
      ctx.shadowBlur=8+age*8; ctx.shadowColor='#06b6d4';
      ctx.strokeStyle='#06b6d4'; ctx.lineWidth=1.2+age*1.5;
      ctx.beginPath(); ctx.moveTo(px0,py0); ctx.lineTo(px1,py1); ctx.stroke();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
    const last=series[series.length-1];
    const lpx=ppX0+(last.x+mxP)/(2*mxP)*ppSize, lpy=ppY0+ppSize-(last.v+mvP)/(2*mvP)*ppSize;
    ctx.fillStyle='#fff'; ctx.shadowBlur=14; ctx.shadowColor='#e879f9';
    ctx.beginPath(); ctx.arc(lpx,lpy,4.5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('x', ppX0+ppSize-15, cy0-6);
    ctx.fillText('ẋ', cx0+6, ppY0+12);

    // Poincaré section
    ctx.fillStyle='rgba(254,250,224,0.7)';
    ctx.fillText('Poincaré section (sample once per drive period)', cdX, cdY-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(cdX,cdY,cdW,cdH);
    const cdcx=cdX+cdW/2, cdcy=cdY+cdH/2;
    ctx.strokeStyle='rgba(254,250,224,0.15)';
    ctx.beginPath();
    ctx.moveTo(cdX,cdcy); ctx.lineTo(cdX+cdW,cdcy);
    ctx.moveTo(cdcx,cdY); ctx.lineTo(cdcx,cdY+cdH); ctx.stroke();

    let pmx=2, pmv=2;
    for (const p of poincare){if (Math.abs(p.x)>pmx) pmx=Math.abs(p.x); if (Math.abs(p.v)>pmv) pmv=Math.abs(p.v);}
    pmx*=1.15; pmv*=1.15;
    ctx.shadowBlur=6; ctx.shadowColor='#fb923c';
    ctx.fillStyle='#fb923c';
    for (let i=0;i<poincare.length;i++){
      const p=poincare[i];
      const px=cdX+(p.x+pmx)/(2*pmx)*cdW;
      const py=cdY+cdH-(p.v+pmv)/(2*pmv)*cdH;
      ctx.globalAlpha = 0.35 + 0.65*Math.min(1, i/200);
      ctx.beginPath(); ctx.arc(px,py,1.6,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('x', cdX+cdW-15, cdcy-6);
    ctx.fillText('ẋ', cdcx+6, cdY+12);
  }

  function loop(){ if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,prop,d=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(d);
      if (prop==='d') delta=v;
      if (prop==='a') alpha=v;
      if (prop==='b') beta=v;
      if (prop==='g') gamma=v;
      if (prop==='w') omega=v;
    });
  }
  bind('id','vd','d',2); bind('ia','va','a',2); bind('ib','vb','b',2); bind('ig','vg','g',3); bind('iw','vw','w',2);
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click',()=>{
      const [d,a,bb,g,w]=b.dataset.p.split(',').map(Number);
      delta=d; alpha=a; beta=bb; gamma=g; omega=w;
      document.getElementById('id').value=d; document.getElementById('vd').textContent=d.toFixed(2);
      document.getElementById('ia').value=a; document.getElementById('va').textContent=a.toFixed(2);
      document.getElementById('ib').value=bb; document.getElementById('vb').textContent=bb.toFixed(2);
      document.getElementById('ig').value=g; document.getElementById('vg').textContent=g.toFixed(3);
      document.getElementById('iw').value=w; document.getElementById('vw').textContent=w.toFixed(2);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{ running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
