<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XY Model — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ 71</span>
  <h2>XY Model</h2>
  <p>Continuous spins θ ∈ [0, 2π) on a lattice, energy E = −J·Σcos(θ_i − θ_j). Below T<sub>BKT</sub> ≈ 0.89 vortex–antivortex pairs bind into a quasi-ordered phase; above, free vortices proliferate. Hue = angle (HSL).</p>

  <div class="control"><label>Temperature T <span id="vT">0.80</span></label><input type="range" id="iT" min="0.05" max="2.50" step="0.01" value="0.80" /></div>
  <div class="control"><label>Coupling J <span id="vJ">1.00</span></label><input type="range" id="iJ" min="0.1" max="2.0" step="0.05" value="1.0" /></div>
  <div class="control"><label>Step size dθ <span id="vDS">0.50</span></label><input type="range" id="iDS" min="0.05" max="2.00" step="0.05" value="0.50" /></div>
  <div class="control"><label>Sweeps/frame <span id="vS">2</span></label><input type="range" id="iS" min="1" max="6" step="1" value="2" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="0.40">Cold</button>
    <button class="p" data-p="0.89">T<sub>BKT</sub></button>
    <button class="p" data-p="1.60">Hot</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Sweep</span><span class="v" id="sFr">0</span></div>
  <div class="stat"><span>|M|²</span><span class="v" id="sM">—</span></div>
  <div class="stat"><span>Energy/site</span><span class="v" id="sE">—</span></div>
  <div class="stat"><span>Vortices</span><span class="v" id="sV">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  const N = 160;
  let theta = new Float32Array(N*N);
  let T=0.8, J=1.0, dStep=0.5, sweeps=2;
  let frame=0, running=true;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener('resize', resize);
  resize();

  const img = ctx.createImageData(N, N);

  function hslToRgb(h, sa, l) {
    // h [0,1], sa,l [0,1]
    const c = (1 - Math.abs(2*l - 1))*sa;
    const hp = h*6;
    const x = c*(1 - Math.abs(hp%2 - 1));
    let r=0,g=0,b=0;
    if (hp<1) { r=c; g=x; b=0; }
    else if (hp<2) { r=x; g=c; b=0; }
    else if (hp<3) { r=0; g=c; b=x; }
    else if (hp<4) { r=0; g=x; b=c; }
    else if (hp<5) { r=x; g=0; b=c; }
    else { r=c; g=0; b=x; }
    const m = l - c/2;
    return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
  }

  function reset(rand=true) {
    if (rand) for (let i=0; i<N*N; i++) theta[i] = Math.random()*Math.PI*2;
    else for (let i=0; i<N*N; i++) theta[i] = 0;
    frame = 0;
  }

  function sweep() {
    const total = N*N;
    for (let k=0; k<total; k++) {
      const x = (Math.random()*N)|0;
      const y = (Math.random()*N)|0;
      const i = y*N+x;
      const xm = (x-1+N)%N, xp = (x+1)%N;
      const ym = (y-1+N)%N, yp = (y+1)%N;
      const cur = theta[i];
      const trial = cur + (Math.random()-0.5)*2*dStep;
      const tn = [theta[y*N+xm], theta[y*N+xp], theta[ym*N+x], theta[yp*N+x]];
      let eOld = 0, eNew = 0;
      for (const t of tn) {
        eOld -= J*Math.cos(cur - t);
        eNew -= J*Math.cos(trial - t);
      }
      const dE = eNew - eOld;
      if (dE <= 0 || Math.random() < Math.exp(-dE/T)) {
        theta[i] = trial;
      }
    }
  }

  function vortexCount() {
    // Compute winding (in units of 2π) around each plaquette
    let v = 0;
    const wrap = a => {
      while (a > Math.PI) a -= 2*Math.PI;
      while (a < -Math.PI) a += 2*Math.PI;
      return a;
    };
    for (let y=0; y<N; y++) {
      const yp = (y+1)%N;
      for (let x=0; x<N; x++) {
        const xp = (x+1)%N;
        const a = theta[y*N+x];
        const b = theta[y*N+xp];
        const c = theta[yp*N+xp];
        const d = theta[yp*N+x];
        const w = wrap(b-a) + wrap(c-b) + wrap(d-c) + wrap(a-d);
        if (Math.abs(w) > Math.PI) v++;
      }
    }
    return v;
  }

  function metrics() {
    let mx=0, my=0, e=0;
    for (let y=0; y<N; y++) {
      const yp = (y+1)%N;
      for (let x=0; x<N; x++) {
        const xp = (x+1)%N;
        const i = y*N+x;
        mx += Math.cos(theta[i]); my += Math.sin(theta[i]);
        e += -J*Math.cos(theta[i] - theta[y*N+xp]);
        e += -J*Math.cos(theta[i] - theta[yp*N+x]);
      }
    }
    const mAbs2 = (mx*mx + my*my)/(N*N*N*N);
    return { mAbs2, e: e/(N*N) };
  }

  function render() {
    const { mAbs2, e } = metrics();
    const data = img.data;
    for (let i=0; i<N*N; i++) {
      const a = theta[i];
      let h = (a/(2*Math.PI)) % 1;
      if (h<0) h+=1;
      const c = hslToRgb(h, 0.85, 0.55);
      const j = i*4;
      data[j]=c[0]; data[j+1]=c[1]; data[j+2]=c[2]; data[j+3]=255;
    }
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
    const size = Math.min(W,H)*0.94;
    const ox = (W-size)/2, oy = (H-size)/2;
    const off = render._off || (render._off = document.createElement('canvas'));
    off.width = N; off.height = N;
    off.getContext('2d').putImageData(img,0,0);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, ox, oy, size, size);

    ctx.shadowColor = '#06b6d4'; ctx.shadowBlur = 14;
    ctx.strokeStyle = 'rgba(232,121,249,0.55)';
    ctx.lineWidth = 2;
    ctx.strokeRect(ox-1, oy-1, size+2, size+2);
    ctx.shadowBlur = 0;

    document.getElementById('sFr').textContent = frame;
    document.getElementById('sM').textContent = mAbs2.toFixed(4);
    document.getElementById('sE').textContent = e.toFixed(3);
    if (frame % 4 === 0) {
      document.getElementById('sV').textContent = vortexCount();
    }
  }

  function loop() {
    if (running) {
      for (let k=0; k<sweeps; k++) { sweep(); frame++; }
    }
    render();
    requestAnimationFrame(loop);
  }

  function bind(id, vid, fn, dec) {
    document.getElementById(id).addEventListener('input', e => {
      const v = +e.target.value;
      document.getElementById(vid).textContent = dec===0 ? v : v.toFixed(dec);
      fn(v);
    });
  }
  bind('iT','vT', v => T = v, 2);
  bind('iJ','vJ', v => J = v, 2);
  bind('iDS','vDS', v => dStep = v, 2);
  bind('iS','vS', v => sweeps = v, 0);

  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      T = +b.dataset.p;
      document.getElementById('iT').value = T;
      document.getElementById('vT').textContent = T.toFixed(2);
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', () => reset(true));

  reset(true); loop();
})();
</script>
</body>
</html>
