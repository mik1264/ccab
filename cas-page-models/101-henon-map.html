<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hénon Map — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 101</span>
  <h2>Hénon Map</h2>
  <p>x_{n+1} = 1 − a·x_n² + y_n, y_{n+1} = b·x_n. A 2D quadratic map that produces a strange attractor with delicate fractal structure. We iterate ~120K points and render with cyan glow density.</p>

  <div class="control"><label>a <span id="va">1.400</span></label><input id="ia" type="range" min="0.8" max="1.45" step="0.001" value="1.400" /></div>
  <div class="control"><label>b <span id="vb">0.300</span></label><input id="ib" type="range" min="0" max="0.5" step="0.001" value="0.300" /></div>
  <div class="control"><label>iterations × 1K <span id="vi">120</span></label><input id="ii" type="range" min="20" max="300" step="5" value="120" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-p="1.4,0.3">Classic chaos</button>
    <button class="p" data-p="1.0,0.3">Period-2 region</button>
    <button class="p" data-p="1.2,0.3">Edge of chaos</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-p="1.42,0.21">Stretched</button>
    <button class="p" data-p="1.18,0.4">Folded</button>
    <button class="p" data-p="1.4,-0.3">Negative b</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Recompute</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Points</span><span class="v" id="sn">0</span></div>
  <div class="stat"><span>Bounds</span><span class="v" id="sb">—</span></div>
  <div class="stat"><span>Status</span><span class="v" id="ss">computing…</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0); needsRender=true;}
  addEventListener('resize',resize); resize();

  let a=1.4, b=0.3, iters=120000;
  let pts=null; // Float32Array of [x0,y0,x1,y1,...]
  let bounds={minx:-2,maxx:2,miny:-2,maxy:2};
  let needsRender=true, running=false;

  function compute(){
    document.getElementById('ss').textContent='computing…';
    const N=iters;
    pts = new Float32Array(N*2);
    let x=0.1, y=0.1;
    let minx=Infinity, maxx=-Infinity, miny=Infinity, maxy=-Infinity;
    let escapes=0;
    for (let i=0;i<N;i++){
      const xn = 1 - a*x*x + y;
      const yn = b*x;
      x=xn; y=yn;
      if (!isFinite(x)||!isFinite(y) || Math.abs(x)>50 || Math.abs(y)>50){
        escapes++;
        x=Math.random()*0.4-0.2; y=Math.random()*0.4-0.2;
      }
      pts[i*2]=x; pts[i*2+1]=y;
      if (x<minx) minx=x; if (x>maxx) maxx=x;
      if (y<miny) miny=y; if (y>maxy) maxy=y;
    }
    const cx=(minx+maxx)/2, cy=(miny+maxy)/2;
    const dx=maxx-minx, dy=maxy-miny;
    const span=Math.max(dx,dy)*1.1;
    bounds={minx:cx-span/2, maxx:cx+span/2, miny:cy-span/2, maxy:cy+span/2};
    document.getElementById('sn').textContent=N;
    document.getElementById('sb').textContent='['+minx.toFixed(2)+','+maxx.toFixed(2)+']';
    document.getElementById('ss').textContent= escapes>N*0.3 ? 'escaped' : 'attractor';
    needsRender=true;
  }

  function render(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    if (!pts) return;
    const padL=70, padR=360, padT=60, padB=60;
    const totW = W-padL-padR;
    const plotSize = Math.min(totW, H-padT-padB-30);
    const plotX = padL+(totW-plotSize)/2, plotY = padT+(H-padT-padB-plotSize)/2;

    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('Hénon strange attractor — '+pts.length/2+' iterates', plotX, plotY-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(plotX, plotY, plotSize, plotSize);

    // axes
    const cx0 = plotX + ((0-bounds.minx)/(bounds.maxx-bounds.minx))*plotSize;
    const cy0 = plotY + plotSize - ((0-bounds.miny)/(bounds.maxy-bounds.miny))*plotSize;
    ctx.strokeStyle='rgba(254,250,224,0.15)';
    ctx.beginPath();
    if (cx0>plotX && cx0<plotX+plotSize){ ctx.moveTo(cx0, plotY); ctx.lineTo(cx0, plotY+plotSize); }
    if (cy0>plotY && cy0<plotY+plotSize){ ctx.moveTo(plotX, cy0); ctx.lineTo(plotX+plotSize, cy0); }
    ctx.stroke();

    // Density-based rendering: build a count buffer
    const Wpx = Math.floor(plotSize), Hpx = Math.floor(plotSize);
    const buf = new Uint16Array(Wpx*Hpx);
    const xspan = bounds.maxx-bounds.minx, yspan = bounds.maxy-bounds.miny;
    const N = pts.length/2;
    let maxC=0;
    for (let i=Math.floor(N*0.05);i<N;i++){
      const x=pts[i*2], y=pts[i*2+1];
      const px = Math.floor((x-bounds.minx)/xspan*(Wpx-1));
      const py = Math.floor((1-(y-bounds.miny)/yspan)*(Hpx-1));
      if (px>=0 && px<Wpx && py>=0 && py<Hpx){
        const idx=py*Wpx+px;
        const c = buf[idx]+1;
        buf[idx]=c;
        if (c>maxC) maxC=c;
      }
    }
    const img = ctx.createImageData(Wpx, Hpx);
    const data = img.data;
    for (let i=0;i<Wpx*Hpx;i++){
      const c = buf[i];
      if (c===0){ const j=i*4; data[j]=6;data[j+1]=8;data[j+2]=13;data[j+3]=255; continue; }
      const t = Math.log(1+c)/Math.log(1+maxC); // log-density
      // cyan to magenta gradient
      const r = Math.round(6 + t*240);
      const g = Math.round(8 + t*160);
      const bl = Math.round(13 + t*245);
      // Mix accent cyan: (6,182,212), shift to magenta (232,121,249) with t
      const rr = Math.round(6 + t*226);
      const gg = Math.round(182 + t*(-61));
      const bb = Math.round(212 + t*37);
      const j=i*4;
      data[j]=rr; data[j+1]=gg; data[j+2]=bb; data[j+3]=Math.min(255, 80 + t*255);
    }
    // glow layer first
    ctx.shadowBlur=10; ctx.shadowColor='#06b6d4';
    const off = render._off || (render._off=document.createElement('canvas'));
    off.width=Wpx; off.height=Hpx;
    off.getContext('2d').putImageData(img, 0, 0);
    ctx.drawImage(off, plotX, plotY, plotSize, plotSize);
    ctx.shadowBlur=0;

    // axis labels
    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText(bounds.minx.toFixed(2), plotX, plotY+plotSize+14);
    ctx.fillText(bounds.maxx.toFixed(2), plotX+plotSize-30, plotY+plotSize+14);
    ctx.fillText(bounds.miny.toFixed(2), plotX-40, plotY+plotSize);
    ctx.fillText(bounds.maxy.toFixed(2), plotX-40, plotY+10);

    // Inset: equation card
    const insW = 230, insH = 80;
    const insX = plotX+plotSize-insW-16, insY = plotY+16;
    ctx.fillStyle='rgba(12,18,28,0.85)';
    ctx.fillRect(insX, insY, insW, insH);
    ctx.strokeStyle='rgba(232,121,249,0.5)';
    ctx.strokeRect(insX, insY, insW, insH);
    ctx.fillStyle='#FEFAE0';
    ctx.font='13px Lora';
    ctx.fillText('Hénon Map', insX+12, insY+22);
    ctx.font='12px Nunito'; ctx.fillStyle='rgba(254,250,224,0.85)';
    ctx.fillText('x_{n+1} = 1 − a x_n² + y_n', insX+12, insY+42);
    ctx.fillText('y_{n+1} = b x_n', insX+12, insY+58);
    ctx.fillStyle='#fb923c';
    ctx.fillText('a = '+a.toFixed(3)+'   b = '+b.toFixed(3), insX+12, insY+74);
  }

  function loop(){
    if (needsRender){ render(); needsRender=false; }
    requestAnimationFrame(loop);
  }
  function recomputeAndRender(){ compute(); }

  function bind(id,vid,prop,d=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{ const v=+e.target.value; document.getElementById(vid).textContent=id==='ii'?v:v.toFixed(d);
      if (prop==='a') a=v; if (prop==='b') b=v; if (prop==='i') iters=v*1000;
    });
    el.addEventListener('change', recomputeAndRender);
  }
  bind('ia','va','a',3); bind('ib','vb','b',3); bind('ii','vi','i',0);
  document.querySelectorAll('.p').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const [pa,pb]=btn.dataset.p.split(',').map(Number);
      a=pa; b=pb;
      document.getElementById('ia').value=pa; document.getElementById('va').textContent=pa.toFixed(3);
      document.getElementById('ib').value=pb; document.getElementById('vb').textContent=pb.toFixed(3);
      compute();
    });
  });
  document.getElementById('bRun').addEventListener('click', recomputeAndRender);
  document.getElementById('bReset').addEventListener('click', ()=>{ a=1.4; b=0.3; iters=120000;
    document.getElementById('ia').value=1.4; document.getElementById('va').textContent='1.400';
    document.getElementById('ib').value=0.3; document.getElementById('vb').textContent='0.300';
    document.getElementById('ii').value=120; document.getElementById('vi').textContent='120';
    compute();
  });
  compute(); loop();
})();
</script>
</body>
</html>
