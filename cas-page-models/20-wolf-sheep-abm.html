<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wolf-Sheep-Grass — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423; --bg:#0e1218; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(20,28,38,0.78); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border:1px solid rgba(254,250,224,0.15); border-radius:18px; padding:1.1rem 1.2rem; color: var(--cream); max-height: calc(100vh - 36px); overflow-y:auto; }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: var(--sage); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.9rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--sage); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.5rem 0.6rem; font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600; background: var(--sage); color:var(--cream); border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
  button:hover { background: var(--moss); transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  button.secondary:hover { background: rgba(254,250,224,0.25); }
  .stat { display:flex; justify-content:space-between; font-size:0.8rem; padding: 0.25rem 0; border-bottom: 1px dashed rgba(254,250,224,0.1); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM · 20</span>
  <h2>Wolf-Sheep-Grass</h2>
  <p>The classic NetLogo predator-prey model. Sheep eat grass, wolves eat sheep, both reproduce when fed and die when starved. Boom-bust cycles emerge — sometimes stable oscillation, sometimes collapse.</p>

  <div class="control">
    <label>Initial sheep <span id="vS0">120</span></label>
    <input type="range" id="iS0" min="20" max="500" step="10" value="120" />
  </div>
  <div class="control">
    <label>Initial wolves <span id="vW0">40</span></label>
    <input type="range" id="iW0" min="5" max="200" step="5" value="40" />
  </div>
  <div class="control">
    <label>Sheep gain from grass <span id="vSG">4</span></label>
    <input type="range" id="iSG" min="1" max="10" step="1" value="4" />
  </div>
  <div class="control">
    <label>Wolf gain from sheep <span id="vWG">20</span></label>
    <input type="range" id="iWG" min="5" max="50" step="1" value="20" />
  </div>
  <div class="control">
    <label>Grass regrowth ticks <span id="vGR">25</span></label>
    <input type="range" id="iGR" min="5" max="100" step="5" value="25" />
  </div>
  <div class="control">
    <label>Reproduction prob <span id="vRP">0.04</span></label>
    <input type="range" id="iRP" min="0.005" max="0.10" step="0.005" value="0.04" />
  </div>

  <div class="btnrow" style="margin-bottom:0.9rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Tick</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Sheep</span><span class="v" id="sS">—</span></div>
  <div class="stat"><span>Wolves</span><span class="v" id="sW">—</span></div>
  <div class="stat"><span>Grass cells</span><span class="v" id="sG">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0, dpr = Math.min(window.devicePixelRatio||1, 2);
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  const N = 90;
  let s0=120, w0=40, sg=4, wg=20, gr=25, rp=0.04;
  let grass, sheep, wolves, step=0, running=true;
  let popHist=[]; const HIST_PLOT=300;

  function init() {
    s0 = +document.getElementById('iS0').value;
    w0 = +document.getElementById('iW0').value;
    sg = +document.getElementById('iSG').value;
    wg = +document.getElementById('iWG').value;
    gr = +document.getElementById('iGR').value;
    rp = +document.getElementById('iRP').value;
    grass = new Int16Array(N*N); // >=0 ready; negative counts down
    for (let i=0;i<N*N;i++) grass[i] = Math.random()<0.5 ? 0 : -((Math.random()*gr)|0);
    sheep = []; wolves = [];
    for (let i=0;i<s0;i++) sheep.push({ x:Math.random()*N, y:Math.random()*N, e: 5+(Math.random()*sg*2) });
    for (let i=0;i<w0;i++) wolves.push({ x:Math.random()*N, y:Math.random()*N, e: 10+(Math.random()*wg) });
    step=0; popHist=[];
    document.getElementById('vS0').textContent = s0;
    document.getElementById('vW0').textContent = w0;
    document.getElementById('vSG').textContent = sg;
    document.getElementById('vWG').textContent = wg;
    document.getElementById('vGR').textContent = gr;
    document.getElementById('vRP').textContent = rp.toFixed(3);
  }

  function move(a) {
    a.x += (Math.random()-0.5)*1.6;
    a.y += (Math.random()-0.5)*1.6;
    if (a.x<0) a.x+=N; else if (a.x>=N) a.x-=N;
    if (a.y<0) a.y+=N; else if (a.y>=N) a.y-=N;
  }

  function tick() {
    // sheep: move, eat grass, lose energy, maybe reproduce
    const newSheep=[];
    for (const s of sheep) {
      move(s);
      const cx = s.x|0, cy = s.y|0;
      const gi = cy*N+cx;
      if (grass[gi]>=0) { s.e += sg; grass[gi] = -gr; }
      s.e -= 1;
      if (s.e<=0) continue;
      if (Math.random()<rp) {
        s.e *= 0.5;
        newSheep.push({ x:s.x, y:s.y, e:s.e });
      }
      newSheep.push(s);
    }
    sheep = newSheep;
    // wolves
    const newWolves=[];
    for (const w of wolves) {
      move(w);
      // find sheep within 1 cell
      let target = -1;
      for (let i=0;i<sheep.length;i++) {
        const s = sheep[i];
        const dx=s.x-w.x, dy=s.y-w.y;
        if (dx*dx+dy*dy < 1.5) { target = i; break; }
      }
      if (target>=0) { w.e += wg; sheep[target] = sheep[sheep.length-1]; sheep.pop(); }
      w.e -= 1;
      if (w.e<=0) continue;
      if (Math.random()<rp*0.6) {
        w.e *= 0.5;
        newWolves.push({ x:w.x, y:w.y, e:w.e });
      }
      newWolves.push(w);
    }
    wolves = newWolves;
    // grass regrow
    let grassReady=0;
    for (let i=0;i<N*N;i++) {
      if (grass[i]<0) grass[i]++;
      if (grass[i]>=0) grassReady++;
    }
    step++;
    popHist.push([sheep.length, wolves.length, grassReady]);
    if (popHist.length>HIST_PLOT) popHist.shift();
    document.getElementById('sStep').textContent = step;
    document.getElementById('sS').textContent = sheep.length;
    document.getElementById('sW').textContent = wolves.length;
    document.getElementById('sG').textContent = grassReady;
  }

  function draw() {
    ctx.fillStyle = '#0e1218';
    ctx.fillRect(0,0,W,H);
    // world is square, place top-left
    const sz = Math.min(W*0.7, H*0.85);
    const cell = sz/N;
    const ox = (W - sz)*0.45, oy = (H - sz)/2;
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      const g = grass[r*N+c];
      if (g>=0) ctx.fillStyle = '#3d4423';
      else {
        const t = 1 - (-g)/gr;
        const v = Math.floor(20 + 25*t);
        ctx.fillStyle = `rgb(${v*0.8|0},${v|0},${v*0.4|0})`;
      }
      ctx.fillRect(ox+c*cell, oy+r*cell, cell+0.5, cell+0.5);
    }
    // sheep
    ctx.fillStyle = '#FEFAE0';
    for (const s of sheep) {
      ctx.fillRect(ox+s.x*cell-1, oy+s.y*cell-1, 3, 3);
    }
    // wolves
    ctx.fillStyle = '#BC6C25';
    for (const w of wolves) {
      ctx.beginPath();
      ctx.arc(ox+w.x*cell, oy+w.y*cell, 2.5, 0, Math.PI*2);
      ctx.fill();
    }
    // mini-plot
    const px = 30, py = oy + sz - 100, pw = ox - 50, ph = 100;
    if (pw>40) {
      ctx.fillStyle = 'rgba(20,28,38,0.6)';
      ctx.fillRect(px, py, pw, ph);
      let maxV=10;
      for (const h of popHist) maxV = Math.max(maxV, h[0], h[1], h[2]/4);
      const series = [['#FEFAE0',0,1], ['#BC6C25',1,1], ['#8A9A5B',2,0.25]];
      for (const [color,idx,scale] of series) {
        ctx.strokeStyle = color; ctx.lineWidth=1.2;
        ctx.beginPath();
        for (let i=0;i<popHist.length;i++) {
          const x = px + pw*(i/(HIST_PLOT-1));
          const y = py + ph - ph*Math.min(1, popHist[i][idx]*scale/maxV);
          if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
      ctx.fillStyle = '#FEFAE0'; ctx.font = '11px Nunito';
      ctx.fillText('populations', px+5, py+12);
    }
  }

  function loop() {
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  ['iS0','iW0','iSG','iWG','iGR','iRP'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
      const m={iS0:'vS0',iW0:'vW0',iSG:'vSG',iWG:'vWG',iGR:'vGR',iRP:'vRP'};
      const v = +e.target.value;
      document.getElementById(m[id]).textContent = id==='iRP' ? v.toFixed(3) : v;
      if (id==='iSG') sg=v;
      else if (id==='iWG') wg=v;
      else if (id==='iGR') gr=v;
      else if (id==='iRP') rp=v;
      else init();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => { running=!running; e.target.textContent = running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
