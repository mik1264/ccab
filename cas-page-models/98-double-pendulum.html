<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Double Pendulum — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 98</span>
  <h2>Double Pendulum</h2>
  <p>Full Lagrangian double pendulum: chaotic for moderate angles. We integrate (θ₁,θ₂,p₁,p₂) with RK4 on the equations of motion. Trail is colored by total energy; Poincaré section samples when θ₁ crosses zero with positive momentum.</p>

  <div class="control"><label>m₁ <span id="vm1">1.00</span></label><input id="im1" type="range" min="0.2" max="3" step="0.05" value="1.00" /></div>
  <div class="control"><label>m₂ <span id="vm2">1.00</span></label><input id="im2" type="range" min="0.2" max="3" step="0.05" value="1.00" /></div>
  <div class="control"><label>L₁ <span id="vL1">1.00</span></label><input id="iL1" type="range" min="0.4" max="2" step="0.02" value="1.00" /></div>
  <div class="control"><label>L₂ <span id="vL2">1.00</span></label><input id="iL2" type="range" min="0.4" max="2" step="0.02" value="1.00" /></div>
  <div class="control"><label>g <span id="vg">9.81</span></label><input id="ig" type="range" min="1" max="30" step="0.1" value="9.81" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" id="pChaos">Chaotic</button>
    <button class="p" id="pIntegr">Near-integrable</button>
    <button class="p" id="pFlip">Flipping</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>θ₁</span><span class="v" id="sa1">—</span></div>
  <div class="stat"><span>θ₂</span><span class="v" id="sa2">—</span></div>
  <div class="stat"><span>Energy</span><span class="v" id="se">—</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);}
  addEventListener('resize',resize); resize();

  let m1=1, m2=1, L1=1, L2=1, g=9.81;
  let a1=2.5, a2=2.0, w1=0, w2=0, t=0, running=true;
  let E0=0;
  const series=[]; const MAX=2500;
  const tipTrail=[]; const TRAIL_MAX=1200;
  const poincare=[];
  let prevA1=a1, prevW1=w1;

  function energy(){
    const T = 0.5*m1*L1*L1*w1*w1 + 0.5*m2*(L1*L1*w1*w1 + L2*L2*w2*w2 + 2*L1*L2*w1*w2*Math.cos(a1-a2));
    const V = -(m1+m2)*g*L1*Math.cos(a1) - m2*g*L2*Math.cos(a2);
    return T+V;
  }

  function reset(initA1=2.5, initA2=2.0, initW1=0, initW2=0){
    a1=initA1; a2=initA2; w1=initW1; w2=initW2; t=0;
    series.length=0; tipTrail.length=0; poincare.length=0;
    E0=energy();
  }

  function deriv(a1,a2,w1,w2){
    const d=a1-a2;
    const denom1 = (m1+m2)*L1 - m2*L1*Math.cos(d)*Math.cos(d);
    const denom2 = (L2/L1)*denom1;
    const num1 = -m2*L1*w1*w1*Math.sin(d)*Math.cos(d)
                 + m2*g*Math.sin(a2)*Math.cos(d)
                 + m2*L2*w2*w2*Math.sin(d)
                 - (m1+m2)*g*Math.sin(a1);
    const num2 = -m2*L2*w2*w2*Math.sin(d)*Math.cos(d)
                 + (m1+m2)*g*Math.sin(a1)*Math.cos(d)
                 - (m1+m2)*L1*w1*w1*Math.sin(d)
                 - (m1+m2)*g*Math.sin(a2);
    return [w1, w2, num1/denom1, num2/denom2];
  }
  function rk4(dt){
    const k1=deriv(a1,a2,w1,w2);
    const k2=deriv(a1+dt/2*k1[0], a2+dt/2*k1[1], w1+dt/2*k1[2], w2+dt/2*k1[3]);
    const k3=deriv(a1+dt/2*k2[0], a2+dt/2*k2[1], w1+dt/2*k2[2], w2+dt/2*k2[3]);
    const k4=deriv(a1+dt*k3[0], a2+dt*k3[1], w1+dt*k3[2], w2+dt*k3[3]);
    a1+=dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    a2+=dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    w1+=dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
    w2+=dt/6*(k1[3]+2*k2[3]+2*k3[3]+k4[3]);
    t+=dt;
  }

  function tick(){
    const dt=0.005;
    for (let i=0;i<10;i++){
      const a1Before = a1;
      rk4(dt);
      // Poincaré: θ₁ crosses 0 with w1>0, normalize
      const a1n = ((a1+Math.PI)%(2*Math.PI)+2*Math.PI)%(2*Math.PI) - Math.PI;
      const a1nb = ((a1Before+Math.PI)%(2*Math.PI)+2*Math.PI)%(2*Math.PI) - Math.PI;
      if (a1nb<0 && a1n>=0 && w1>0) {
        poincare.push({a:a2, w:w2});
        if (poincare.length>2500) poincare.shift();
      }
    }
    const E=energy();
    series.push({t,a1,a2,w1,w2,E});
    if (series.length>MAX) series.shift();
    // tip position
    const x1=L1*Math.sin(a1), y1=-L1*Math.cos(a1);
    const x2=x1+L2*Math.sin(a2), y2=y1-L2*Math.cos(a2);
    tipTrail.push({x:x2, y:y2, E});
    if (tipTrail.length>TRAIL_MAX) tipTrail.shift();
    document.getElementById('st').textContent=t.toFixed(2);
    document.getElementById('sa1').textContent=a1.toFixed(2);
    document.getElementById('sa2').textContent=a2.toFixed(2);
    document.getElementById('se').textContent=E.toFixed(2);
  }

  function turbo(t){
    t=Math.max(0,Math.min(1,t));
    const r=Math.round(255*Math.min(1,Math.max(0, 0.13572 + 4.61539*t - 42.66032*t*t + 132.13108*t*t*t - 152.94239*t*t*t*t + 59.28637*t*t*t*t*t)));
    const g=Math.round(255*Math.min(1,Math.max(0, 0.09140 + 2.19418*t + 4.84296*t*t - 14.18503*t*t*t + 4.27729*t*t*t*t + 2.82956*t*t*t*t*t)));
    const bb=Math.round(255*Math.min(1,Math.max(0, 0.10667 + 12.64194*t - 60.58204*t*t + 110.36276*t*t*t - 89.90310*t*t*t*t + 27.34824*t*t*t*t*t)));
    return `rgb(${r},${g},${bb})`;
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    if (series.length<2) return;
    const padL=70, padR=360, padT=60, padB=60;
    const totW = W-padL-padR;
    const animH = (H-padT-padB-60)*0.5;
    const animW = totW*0.5;
    const ppSize = (H-padT-padB-60)*0.5;
    const ppX0 = padL+animW+30, ppY0 = padT;
    const cdY = padT+animH+50;
    const cdX = padL, cdW = totW*0.5, cdH = (H-padT-padB-60)*0.4;
    const psX = padL+totW*0.5+30, psY = cdY, psW = totW*0.5-30, psH = cdH;

    // Pendulum animation
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('Animation (mass colored, trail by E)', padL, padT-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(padL, padT, animW, animH);
    const cx=padL+animW/2, cy=padT+animH/2;
    const totalL = L1+L2;
    const scale = Math.min(animW, animH)*0.42 / totalL;

    // tip trail with energy color
    let Emin=999, Emax=-999;
    for (const tt of tipTrail){if (tt.E<Emin) Emin=tt.E; if (tt.E>Emax) Emax=tt.E;}
    const Espan=Math.max(Emax-Emin, 1e-3);
    for (let i=1; i<tipTrail.length; i++){
      const p0=tipTrail[i-1], p1=tipTrail[i];
      const en=(p1.E-Emin)/Espan;
      ctx.strokeStyle=turbo(en); ctx.lineWidth=1.4;
      ctx.shadowBlur=5; ctx.shadowColor=turbo(en);
      ctx.globalAlpha=0.3 + 0.7*(i/tipTrail.length);
      ctx.beginPath();
      ctx.moveTo(cx+p0.x*scale, cy+p0.y*scale);
      ctx.lineTo(cx+p1.x*scale, cy+p1.y*scale);
      ctx.stroke();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;

    // pendulum rods
    const x1=cx+L1*Math.sin(a1)*scale, y1=cy+(-L1*Math.cos(a1))*scale;
    const x2=x1+L2*Math.sin(a2)*scale, y2=y1+(-L2*Math.cos(a2))*scale;
    ctx.strokeStyle='rgba(254,250,224,0.7)'; ctx.lineWidth=2.2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    // pivot
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();
    // m1
    ctx.fillStyle='#06b6d4'; ctx.shadowBlur=14; ctx.shadowColor='#06b6d4';
    ctx.beginPath(); ctx.arc(x1,y1, 6+m1*4, 0, Math.PI*2); ctx.fill();
    // m2
    ctx.fillStyle='#e879f9'; ctx.shadowColor='#e879f9';
    ctx.beginPath(); ctx.arc(x2,y2, 6+m2*4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // Phase portrait (θ₁,θ₂)
    ctx.fillStyle='rgba(254,250,224,0.7)';
    ctx.fillText('Phase (θ₁, θ₂) — wrapped', ppX0, ppY0-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)';
    ctx.strokeRect(ppX0,ppY0,ppSize,ppSize);
    const pcx=ppX0+ppSize/2, pcy=ppY0+ppSize/2;
    ctx.strokeStyle='rgba(254,250,224,0.15)';
    ctx.beginPath();
    ctx.moveTo(ppX0,pcy); ctx.lineTo(ppX0+ppSize,pcy);
    ctx.moveTo(pcx,ppY0); ctx.lineTo(pcx,ppY0+ppSize); ctx.stroke();
    function wrap(a){return ((a+Math.PI)%(2*Math.PI)+2*Math.PI)%(2*Math.PI) - Math.PI;}
    const N=series.length;
    for (let i=1;i<N;i++){
      const s0=series[i-1], s1=series[i];
      const a1a=wrap(s0.a1), a1b=wrap(s1.a1);
      const a2a=wrap(s0.a2), a2b=wrap(s1.a2);
      if (Math.abs(a1a-a1b)>3 || Math.abs(a2a-a2b)>3) continue;
      const px0=ppX0+(a1a+Math.PI)/(2*Math.PI)*ppSize;
      const py0=ppY0+ppSize-(a2a+Math.PI)/(2*Math.PI)*ppSize;
      const px1=ppX0+(a1b+Math.PI)/(2*Math.PI)*ppSize;
      const py1=ppY0+ppSize-(a2b+Math.PI)/(2*Math.PI)*ppSize;
      const en=(s1.E-Emin)/Math.max(Espan,1e-6);
      ctx.strokeStyle=turbo(en); ctx.lineWidth=1.2;
      ctx.shadowBlur=4; ctx.shadowColor=turbo(en);
      ctx.globalAlpha=0.4+0.6*(i/N);
      ctx.beginPath(); ctx.moveTo(px0,py0); ctx.lineTo(px1,py1); ctx.stroke();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('θ₁', ppX0+ppSize-15, pcy-6);
    ctx.fillText('θ₂', pcx+6, ppY0+12);

    // Time series of θ₁,θ₂
    ctx.fillStyle='rgba(254,250,224,0.7)';
    ctx.fillText('θ₁(t) — cyan, θ₂(t) — magenta', cdX, cdY-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(cdX,cdY,cdW,cdH);
    const t0s=series[0].t, t1s=series[series.length-1].t, tspan=Math.max(t1s-t0s,1e-3);
    ctx.strokeStyle='rgba(254,250,224,0.15)';
    ctx.beginPath(); ctx.moveTo(cdX,cdY+cdH/2); ctx.lineTo(cdX+cdW,cdY+cdH/2); ctx.stroke();
    ['a1','a2'].forEach((k,ki)=>{
      const col = ki===0?'#06b6d4':'#e879f9';
      ctx.strokeStyle=col; ctx.lineWidth=1.6;
      ctx.shadowBlur=6; ctx.shadowColor=col;
      ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=cdX+(s.t-t0s)/tspan*cdW;
        const py=cdY+cdH/2-wrap(s[k])/Math.PI*cdH/2;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    });
    ctx.shadowBlur=0;

    // Poincaré section
    ctx.fillStyle='rgba(254,250,224,0.7)';
    ctx.fillText('Poincaré (θ₂, ω₂) at θ₁=0,ω₁>0', psX, psY-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)';
    ctx.strokeRect(psX,psY,psW,psH);
    const pscx=psX+psW/2, pscy=psY+psH/2;
    ctx.strokeStyle='rgba(254,250,224,0.15)';
    ctx.beginPath();
    ctx.moveTo(psX,pscy); ctx.lineTo(psX+psW,pscy);
    ctx.moveTo(pscx,psY); ctx.lineTo(pscx,psY+psH); ctx.stroke();
    let pmw=2;
    for (const p of poincare) if (Math.abs(p.w)>pmw) pmw=Math.abs(p.w);
    pmw*=1.1;
    ctx.fillStyle='#fb923c'; ctx.shadowBlur=6; ctx.shadowColor='#fb923c';
    for (let i=0; i<poincare.length; i++){
      const p=poincare[i];
      const aw=wrap(p.a);
      const px=psX+(aw+Math.PI)/(2*Math.PI)*psW;
      const py=psY+psH-(p.w+pmw)/(2*pmw)*psH;
      ctx.globalAlpha=0.4 + 0.6*Math.min(1, i/300);
      ctx.beginPath(); ctx.arc(px,py,1.6,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('θ₂', psX+psW-15, pscy-6);
    ctx.fillText('ω₂', pscx+6, psY+12);
  }

  function loop(){ if (running) tick(); draw(); requestAnimationFrame(loop); }
  function bind(id,vid,prop,d=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{ const v=+e.target.value; document.getElementById(vid).textContent=v.toFixed(d);
      if (prop==='m1') m1=v; if (prop==='m2') m2=v; if (prop==='L1') L1=v; if (prop==='L2') L2=v; if (prop==='g') g=v;
    });
  }
  bind('im1','vm1','m1',2); bind('im2','vm2','m2',2); bind('iL1','vL1','L1',2); bind('iL2','vL2','L2',2); bind('ig','vg','g',2);
  document.getElementById('pChaos').addEventListener('click',()=>{ reset(2.6, 2.4, 0, 0); });
  document.getElementById('pIntegr').addEventListener('click',()=>{ reset(0.4, 0.35, 0, 0); });
  document.getElementById('pFlip').addEventListener('click',()=>{ reset(Math.PI*0.95, Math.PI*0.95, 0, 0); });
  document.getElementById('bRun').addEventListener('click', e=>{ running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', ()=>reset());
  reset(); loop();
})();
</script>
</body>
</html>
