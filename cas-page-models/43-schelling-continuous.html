<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schelling Continuous Tolerance — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .tag-abm {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.6rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag-abm">ABM ✦ 43</span>
  <h2>Schelling: Continuous Tolerance</h2>
  <p>Each agent draws its own tolerance from a Beta(α,β) distribution. Heterogeneous preferences still produce stark segregation when the mean tolerance is high.</p>

  <div class="control"><label>Beta α <span id="vA">2.0</span></label><input type="range" id="iA" min="0.5" max="8" step="0.1" value="2.0" /></div>
  <div class="control"><label>Beta β <span id="vB">5.0</span></label><input type="range" id="iB" min="0.5" max="8" step="0.1" value="5.0" /></div>
  <div class="control"><label>Density <span id="vDen">0.92</span></label><input type="range" id="iDen" min="0.5" max="0.98" step="0.01" value="0.92" /></div>

  <div class="btnrow">
    <button class="p" data-p="2,8">Tolerant</button>
    <button class="p" data-p="2,5">Mild</button>
    <button class="p" data-p="5,2">Picky</button>
    <button class="p" data-p="0.7,0.7">Bimodal</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Unhappy</span><span class="v" id="sUnhappy">—</span></div>
  <div class="stat"><span>Segregation index</span><span class="v" id="sSeg">—</span></div>
  <div class="stat"><span>Mean tolerance</span><span class="v" id="sTol">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize); resize();

  const N = 100;
  let alpha = 2.0, beta = 5.0, density = 0.92;
  let grid, tol, step=0, running=true;
  const segHist = [];

  function randn(){ let u=0,v=0; while(!u) u=Math.random(); while(!v) v=Math.random(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
  function gamma(k){
    if (k < 1) {
      const u = Math.random();
      return gamma(1+k)*Math.pow(u, 1/k);
    }
    const d = k - 1/3, c = 1/Math.sqrt(9*d);
    while(true){
      let x, v;
      do { x = randn(); v = 1 + c*x; } while(v<=0);
      v = v*v*v;
      const u = Math.random();
      if (u < 1 - 0.0331*x*x*x*x) return d*v;
      if (Math.log(u) < 0.5*x*x + d*(1-v+Math.log(v))) return d*v;
    }
  }
  function betaSample(a,b){ const x = gamma(a), y = gamma(b); return x/(x+y); }

  function init(){
    grid = new Int8Array(N*N);
    tol = new Float32Array(N*N);
    for (let i=0;i<N*N;i++){
      if (Math.random()<density){
        grid[i] = Math.random()<0.5 ? 1 : 2;
        tol[i] = betaSample(alpha, beta);
      } else { grid[i]=0; tol[i]=0; }
    }
    step=0;
    segHist.length=0;
  }

  function neighborStats(i){
    const r=(i/N)|0, c=i%N;
    const me = grid[i]; if (me===0) return [0,0];
    let same=0, diff=0;
    for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++){
      if (!dr&&!dc) continue;
      const rr=r+dr, cc=c+dc;
      if (rr<0||rr>=N||cc<0||cc>=N) continue;
      const v = grid[rr*N+cc];
      if (v===0) continue;
      if (v===me) same++; else diff++;
    }
    return [same,diff];
  }

  function tick(){
    const empty=[]; const unhappy=[];
    let totalSame=0, totalContacts=0;
    for (let i=0;i<N*N;i++){
      if (grid[i]===0) empty.push(i);
      else {
        const [s,d]=neighborStats(i);
        const t=s+d;
        if (t>0){
          totalSame+=s; totalContacts+=t;
          if (s/t < tol[i]) unhappy.push(i);
        }
      }
    }
    for (let k=empty.length-1;k>0;k--){const j=(Math.random()*(k+1))|0;[empty[k],empty[j]]=[empty[j],empty[k]];}
    for (let k=unhappy.length-1;k>0;k--){const j=(Math.random()*(k+1))|0;[unhappy[k],unhappy[j]]=[unhappy[j],unhappy[k]];}
    const m = Math.min(unhappy.length, empty.length);
    for (let k=0;k<m;k++){
      const u=unhappy[k], e=empty[k];
      grid[e]=grid[u]; tol[e]=tol[u];
      grid[u]=0; tol[u]=0;
    }
    step++;
    const seg = totalContacts>0 ? totalSame/totalContacts : 0;
    segHist.push(seg);
    if (segHist.length>800) segHist.shift();
    document.getElementById('sStep').textContent = step;
    document.getElementById('sUnhappy').textContent = unhappy.length;
    document.getElementById('sSeg').textContent = seg.toFixed(3);
    let tsum=0, tn=0;
    for (let i=0;i<N*N;i++) if (grid[i]!==0){tsum+=tol[i];tn++;}
    document.getElementById('sTol').textContent = tn>0 ? (tsum/tn).toFixed(3) : '—';
  }

  function draw(){
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
    const sz = Math.min(W*0.62, H*0.92);
    const ox = (W*0.42 - sz/2);
    const oy = (H - sz)/2;
    const cell = sz/N;
    ctx.shadowBlur = 0;
    for (let r=0;r<N;r++) for (let c=0;c<N;c++){
      const v = grid[r*N+c];
      if (v===0) continue;
      ctx.fillStyle = v===1 ? '#06b6d4' : '#e879f9';
      ctx.fillRect(ox+c*cell, oy+r*cell, cell+0.6, cell+0.6);
    }
    ctx.strokeStyle = 'rgba(232,121,249,0.5)';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(232,121,249,0.7)';
    ctx.shadowBlur = 12;
    ctx.strokeRect(ox-1, oy-1, sz+2, sz+2);
    ctx.shadowBlur = 0;

    const insetW = Math.min(280, W*0.22);
    const insetH = 140;
    const ix = ox + sz + 28;
    if (ix + insetW < W - 340){
      drawHistogram(ix, oy + 20, insetW, insetH);
      drawTimeline(ix, oy + 20 + insetH + 24, insetW, insetH);
    }
  }

  function drawHistogram(x,y,w,h){
    ctx.fillStyle='rgba(20,28,40,0.7)';
    ctx.fillRect(x,y,w,h);
    ctx.strokeStyle='rgba(254,250,224,0.18)'; ctx.lineWidth=1;
    ctx.strokeRect(x,y,w,h);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.font='600 11px Nunito';
    ctx.fillText('Tolerance distribution', x+8, y+14);
    const bins = 20;
    const counts = new Array(bins).fill(0);
    for (let i=0;i<N*N;i++) if (grid[i]!==0){
      const b = Math.min(bins-1, Math.floor(tol[i]*bins));
      counts[b]++;
    }
    const max = Math.max(...counts, 1);
    const bw = (w-16)/bins;
    for (let i=0;i<bins;i++){
      const bh = (counts[i]/max)*(h-30);
      const t = i/bins;
      const r = Math.round(255*Math.pow(t,0.55));
      const g = Math.round(255*Math.pow(t,1.6)*0.8);
      const b = Math.round(80 + 175*(1-t));
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.shadowColor = `rgba(${r},${g},${b},0.6)`;
      ctx.shadowBlur = 6;
      ctx.fillRect(x+8+i*bw, y+h-6-bh, bw-1, bh);
    }
    ctx.shadowBlur=0;
  }

  function drawTimeline(x,y,w,h){
    ctx.fillStyle='rgba(20,28,40,0.7)';
    ctx.fillRect(x,y,w,h);
    ctx.strokeStyle='rgba(254,250,224,0.18)'; ctx.lineWidth=1;
    ctx.strokeRect(x,y,w,h);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.font='600 11px Nunito';
    ctx.fillText('Segregation index over time', x+8, y+14);
    if (segHist.length<2) return;
    const py50 = y+h-8 - 0.5*(h-26);
    ctx.strokeStyle='rgba(254,250,224,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x+8,py50); ctx.lineTo(x+w-8,py50); ctx.stroke();
    ctx.beginPath();
    for (let i=0;i<segHist.length;i++){
      const px = x+8 + (i/(segHist.length-1))*(w-16);
      const py = y+h-8 - segHist[i]*(h-26);
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.shadowColor='rgba(6,182,212,0.7)'; ctx.shadowBlur=8;
    ctx.strokeStyle='#06b6d4'; ctx.lineWidth=2; ctx.stroke();
    ctx.shadowBlur=0;
  }

  function loop(){
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  function bindSlider(id,vid,prop,dec){
    document.getElementById(id).addEventListener('input', e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent = v.toFixed(dec);
      if (prop==='alpha') alpha=v;
      if (prop==='beta') beta=v;
      if (prop==='density'){ density=v; init(); }
    });
  }
  bindSlider('iA','vA','alpha',1);
  bindSlider('iB','vB','beta',1);
  bindSlider('iDen','vDen','density',2);
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click', ()=>{
      const [a,bb] = b.dataset.p.split(',').map(Number);
      alpha=a; beta=bb;
      document.getElementById('iA').value=a; document.getElementById('vA').textContent=a.toFixed(1);
      document.getElementById('iB').value=bb; document.getElementById('vB').textContent=bb.toFixed(1);
      init();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent = running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
