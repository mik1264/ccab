<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daisyworld — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.5rem; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .lumctl { display:flex; gap:0.4rem; }
  .lumctl button { padding: 0.3rem; font-size:0.7rem; flex:1; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Daisyworld</h2>
  <p>Black daisies (low albedo) warm the ground; white (high albedo) cool it. Both grow best near 22.5°C. As solar luminosity rises, the ratio shifts to keep planet T near optimum — Gaia self-regulation.</p>

  <div class="control"><label>L solar luminosity <span id="vL">1.00</span></label><input type="range" id="iL" min="0.6" max="1.6" step="0.005" value="1.00" /></div>
  <div class="control"><label>γ death rate <span id="vg">0.30</span></label><input type="range" id="ig" min="0.1" max="0.6" step="0.01" value="0.30" /></div>
  <div class="control"><label>α_b black albedo <span id="vab">0.25</span></label><input type="range" id="iab" min="0.05" max="0.5" step="0.01" value="0.25" /></div>
  <div class="control"><label>α_w white albedo <span id="vaw">0.75</span></label><input type="range" id="iaw" min="0.5" max="0.95" step="0.01" value="0.75" /></div>
  <div class="control"><label>α_g ground albedo <span id="vag">0.50</span></label><input type="range" id="iag" min="0.2" max="0.8" step="0.01" value="0.50" /></div>
  <div class="control"><label>q heat conduction <span id="vq">20</span></label><input type="range" id="iq" min="0" max="50" step="1" value="20" /></div>

  <div class="btnrow">
    <button class="p" data-p="0.7">Cool sun</button>
    <button class="p" data-p="1.0">Mid sun</button>
    <button class="p" data-p="1.4">Hot sun</button>
  </div>
  <div class="lumctl" style="margin-bottom:0.5rem;">
    <button id="bSweep">Sweep L</button>
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>α_b black %</span><span class="v" id="sab">—</span></div>
  <div class="stat"><span>α_w white %</span><span class="v" id="saw">—</span></div>
  <div class="stat"><span>T planet (°C)</span><span class="v" id="stp">—</span></div>
  <div class="stat"><span>Albedo A</span><span class="v" id="sA">—</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0; const dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize', resize); resize();

  const SAGE='#8A9A5B', EARTH='#DDA15E', MAG='#e879f9', CY='#06b6d4', PLASMA='#fb923c', GRID='rgba(254,250,224,0.08)', AXIS='rgba(254,250,224,0.45)';

  let L=1.0, gamma=0.30, ab=0.25, aw=0.75, ag=0.50, q=20;
  let aB=0.20, aW=0.20, t=0, running=true; // areas
  const series=[]; const MAX=4000;
  let sweep=false, sweepDir=1;

  // Constants (Watson-Lovelock)
  const sigma = 5.670374419e-8;
  const S0 = 917; // solar constant (W/m^2) — gives ~22.5°C at L=1, A=0.5
  const TC = 273.15; // K to C

  function reset(){ aB=0.20; aW=0.20; t=0; series.length=0; }

  function planetT(){
    const ag_eff = ag;
    const ax = 1 - aB - aW; // bare ground fraction
    const A = aB*ab + aW*aw + ax*ag_eff;
    const Te4 = (S0*L*(1-A))/sigma;
    const Te = Math.pow(Te4, 0.25);
    return [Te-TC, A];
  }
  function localT(daisyAlbedo){
    const [Tp, A] = planetT();
    return q*(A - daisyAlbedo) + Tp; // daisy locality
  }
  function beta(T){
    // optimal at 22.5°C (parabola); zero outside [5,40]
    if (T < 5 || T > 40) return 0;
    return 1 - 0.003265*(22.5-T)*(22.5-T);
  }
  function deriv(aB, aW){
    const x = 1 - aB - aW; // bare
    if (x < 0) {
      const sc = (1-x)/(aB+aW);
      // shouldn't happen; clamp
    }
    const Tb = localT(ab);
    const Tw = localT(aw);
    const dB = aB*(x*beta(Tb) - gamma);
    const dW = aW*(x*beta(Tw) - gamma);
    return [dB, dW];
  }
  function rk4(dt){
    const k1=deriv(aB,aW);
    const k2=deriv(aB+dt/2*k1[0], aW+dt/2*k1[1]);
    const k3=deriv(aB+dt/2*k2[0], aW+dt/2*k2[1]);
    const k4=deriv(aB+dt*k3[0], aW+dt*k3[1]);
    aB += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    aW += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    if (aB<0.001) aB=0.001; if (aW<0.001) aW=0.001;
    if (aB+aW>0.99) { const sc=0.99/(aB+aW); aB*=sc; aW*=sc; }
    t += dt;
  }
  function tick(){
    if (sweep) {
      L += sweepDir*0.0008;
      if (L>1.55) { sweepDir=-1; }
      if (L<0.65) { sweepDir=1; }
      document.getElementById('iL').value = L;
      document.getElementById('vL').textContent = L.toFixed(2);
    }
    for(let i=0;i<2;i++) rk4(0.20);
    const [Tp, Aalb] = planetT();
    series.push({t,aB,aW,Tp,A:Aalb,L});
    if(series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sab').textContent=(aB*100).toFixed(1)+'%';
    document.getElementById('saw').textContent=(aW*100).toFixed(1)+'%';
    document.getElementById('stp').textContent=Tp.toFixed(1);
    document.getElementById('sA').textContent=Aalb.toFixed(3);
  }

  function drawAxes(x,y,w,h,title){
    ctx.strokeStyle=AXIS; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito'; ctx.fillText(title, x, y-8);
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    if(series.length<2) return;
    const padR=360;
    const totW=W-padR-80;
    const colW=totW/2-20;

    // === Top-left: planet visualization ===
    const x0=60, y0=60, w0=colW, h0=H*0.42;
    drawAxes(x0,y0,w0,h0,'Daisyworld surface (current)');
    // background dirt
    const cx=x0+w0/2, cy=y0+h0/2; const r=Math.min(w0,h0)*0.4;
    // disk for planet
    ctx.fillStyle='rgba(120,90,50,0.55)'; // bare
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    // sample stippling: black daisies
    const seed = (n)=>{ const x=Math.sin(n*12.9898+t*0.001)*43758.5453; return x-Math.floor(x); };
    const totalDots=600;
    const Nb = Math.round(aB*totalDots);
    const Nw = Math.round(aW*totalDots);
    ctx.fillStyle='#1a1a1a';
    for(let i=0;i<Nb;i++){
      const ang=seed(i*7+1)*Math.PI*2;
      const rr=Math.sqrt(seed(i*7+2))*r*0.97;
      const px=cx+Math.cos(ang)*rr; const py=cy+Math.sin(ang)*rr;
      ctx.beginPath(); ctx.arc(px,py,2.4,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='#f0e8c0';
    for(let i=0;i<Nw;i++){
      const ang=seed(i*7+10001)*Math.PI*2;
      const rr=Math.sqrt(seed(i*7+10002))*r*0.97;
      const px=cx+Math.cos(ang)*rr; const py=cy+Math.sin(ang)*rr;
      ctx.beginPath(); ctx.arc(px,py,2.4,0,Math.PI*2); ctx.fill();
    }
    // sun
    const sunx=x0+w0-30, suny=y0+30;
    const sr=8+L*8;
    const grad=ctx.createRadialGradient(sunx,suny,0,sunx,suny,sr*2);
    grad.addColorStop(0,'rgba(255,220,120,0.95)');
    grad.addColorStop(1,'rgba(255,140,40,0)');
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.arc(sunx,suny,sr*2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,240,180,1)';
    ctx.beginPath(); ctx.arc(sunx,suny,sr,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='11px Nunito';
    ctx.fillText('L='+L.toFixed(2), sunx-22, suny+22);
    // T label
    const [Tp, A] = planetT();
    ctx.fillStyle=Tp<5||Tp>40?MAG:SAGE;
    ctx.font='bold 16px Lora';
    ctx.fillText('T = '+Tp.toFixed(1)+'°C', x0+12, y0+h0-12);
    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='11px Nunito';
    ctx.fillText('Albedo A = '+A.toFixed(3), x0+12, y0+h0-30);

    // === Top-right: T vs L hysteresis ===
    const x1=x0+w0+40, y1=y0, w1=colW, h1=h0;
    drawAxes(x1,y1,w1,h1,'Planet T vs Solar L (Gaia regulation)');
    // collect (L, T) pairs
    let lmin=Infinity,lmax=-Infinity,tmin=Infinity,tmax=-Infinity;
    for(const p of series){ if(p.L<lmin)lmin=p.L; if(p.L>lmax)lmax=p.L;
      if(p.Tp<tmin)tmin=p.Tp; if(p.Tp>tmax)tmax=p.Tp; }
    if (lmax-lmin<0.05){ lmin=L-0.3; lmax=L+0.3; }
    if (tmax-tmin<5){ tmin=Tp-15; tmax=Tp+15; }
    lmin-=0.02; lmax+=0.02; tmin-=2; tmax+=2;
    const lr=lmax-lmin, tr=tmax-tmin;
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y1+i*h1/5; ctx.beginPath(); ctx.moveTo(x1,py); ctx.lineTo(x1+w1,py); ctx.stroke(); }
    // No-life T (dead world): T = ((S0·L·(1-ag))/σ)^(1/4) - TC
    ctx.strokeStyle='rgba(232,121,249,0.6)'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
    ctx.beginPath();
    for(let i=0;i<=80;i++){
      const ll=lmin+i/80*lr;
      const tt=Math.pow(S0*ll*(1-ag)/sigma, 0.25)-TC;
      if (tt<tmin||tt>tmax) continue;
      const px=x1+(ll-lmin)/lr*w1; const py=y1+h1-(tt-tmin)/tr*h1;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke(); ctx.setLineDash([]);
    // observed (L,T) gradient by time
    ctx.lineWidth=2;
    for(let i=1;i<series.length;i++){
      const p1=series[i-1], p2=series[i];
      const px1=x1+(p1.L-lmin)/lr*w1; const py1=y1+h1-(p1.Tp-tmin)/tr*h1;
      const px2=x1+(p2.L-lmin)/lr*w1; const py2=y1+h1-(p2.Tp-tmin)/tr*h1;
      const tt=i/series.length;
      ctx.strokeStyle=`rgba(${6+150*tt},${182},${212-100*tt},${0.4+0.6*tt})`;
      ctx.beginPath(); ctx.moveTo(px1,py1); ctx.lineTo(px2,py2); ctx.stroke();
    }
    // current
    const last=series[series.length-1];
    ctx.fillStyle=PLASMA;
    ctx.beginPath(); ctx.arc(x1+(last.L-lmin)/lr*w1, y1+h1-(last.Tp-tmin)/tr*h1, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(254,250,224,0.55)'; ctx.font='11px Nunito';
    ctx.fillText('L →', x1+w1-30, y1+h1+16);
    ctx.save(); ctx.translate(x1-26, y1+h1/2+10); ctx.rotate(-Math.PI/2); ctx.fillText('T (°C)',0,0); ctx.restore();
    ctx.fillStyle=MAG; ctx.font='11px Nunito';
    ctx.fillText('-- dead world (no daisies)', x1+12, y1+18);

    // === Bottom: time series of daisies + T ===
    const x2=60, y2=y0+h0+70, w2=totW, h2=H-y2-50;
    drawAxes(x2,y2,w2,h2,'Daisy populations and planet T over time');
    const t0=series[0].t, t1=series[series.length-1].t, tspan=Math.max(t1-t0,1);
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y2+i*h2/5; ctx.beginPath(); ctx.moveTo(x2,py); ctx.lineTo(x2+w2,py); ctx.stroke(); }
    // black daisies (0..1)
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.moveTo(x2, y2+h2);
    for(let i=0;i<series.length;i++){
      const p=series[i]; const px=x2+(p.t-t0)/tspan*w2; const py=y2+h2-p.aB*h2;
      ctx.lineTo(px,py);
    }
    ctx.lineTo(x2+w2, y2+h2); ctx.closePath(); ctx.fill();
    // white daisies stacked above black
    ctx.fillStyle='rgba(240,232,192,0.45)';
    ctx.beginPath();
    ctx.moveTo(x2, y2+h2);
    for(let i=0;i<series.length;i++){
      const p=series[i]; const px=x2+(p.t-t0)/tspan*w2; const py=y2+h2-(p.aB+p.aW)*h2;
      ctx.lineTo(px,py);
    }
    for(let i=series.length-1;i>=0;i--){
      const p=series[i]; const px=x2+(p.t-t0)/tspan*w2; const py=y2+h2-p.aB*h2;
      ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.fill();
    // T overlaid (own scale)
    let Tlo=Infinity, Thi=-Infinity;
    for(const p of series){ if(p.Tp<Tlo)Tlo=p.Tp; if(p.Tp>Thi)Thi=p.Tp; }
    Tlo-=2; Thi+=2; const Tr=Math.max(Thi-Tlo,5);
    ctx.strokeStyle=PLASMA; ctx.lineWidth=2.5; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const p=series[i]; const px=x2+(p.t-t0)/tspan*w2; const py=y2+h2-(p.Tp-Tlo)/Tr*h2;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke();
    ctx.font='11px Nunito';
    ctx.fillStyle='rgba(0,0,0,0.9)';
    ctx.fillRect(x2+12, y2+12, 12, 12);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.fillText(' black daisies', x2+24, y2+22);
    ctx.fillStyle='rgba(240,232,192,0.95)';
    ctx.fillRect(x2+120, y2+12, 12, 12);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.fillText(' white daisies', x2+132, y2+22);
    ctx.fillStyle=PLASMA; ctx.fillText('— T (°C, right scale)', x2+225, y2+22);
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }
  function bind(id,vid,fn,d=2){ const el=document.getElementById(id);
    el.addEventListener('input', e=>{ const v=+e.target.value; document.getElementById(vid).textContent=v.toFixed(d); fn(v); });
  }
  bind('iL','vL',v=>L=v,2); bind('ig','vg',v=>gamma=v,2); bind('iab','vab',v=>ab=v,2);
  bind('iaw','vaw',v=>aw=v,2); bind('iag','vag',v=>ag=v,2); bind('iq','vq',v=>q=v,0);

  document.querySelectorAll('.p').forEach(btn=>{
    btn.onclick=()=>{
      L=+btn.dataset.p;
      document.getElementById('iL').value=L;
      document.getElementById('vL').textContent=L.toFixed(2);
    };
  });
  document.getElementById('bSweep').addEventListener('click', e=>{
    sweep=!sweep; e.target.textContent= sweep?'Stop sweep':'Sweep L';
  });
  document.getElementById('bRun').addEventListener('click', e=>{ running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); loop();
})();
</script>
</body>
</html>
