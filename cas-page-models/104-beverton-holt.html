<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beverton-Holt — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  button.toggle { background: linear-gradient(135deg, var(--accent), var(--magenta)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend { display:flex; gap:1rem; font-size:0.78rem; margin-top:0.5rem; }
  .legend span::before { content:''; display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:middle; }
  .legend .bh::before { background: var(--sage); }
  .legend .ri::before { background: var(--magenta); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 104</span>
  <h2>Beverton-Holt</h2>
  <p>Compensatory recruitment N<sub>t+1</sub> = R₀N<sub>t</sub>/(1 + (R₀−1)N<sub>t</sub>/K). Smooth, monotone convergence to K — never overshoots, never cycles. Toggle the Ricker overlay to compare its overcompensatory cousin.</p>

  <div class="control"><label>R₀ max growth <span id="vr">2.50</span></label><input type="range" id="ir" min="1.05" max="6" step="0.05" value="2.50" /></div>
  <div class="control"><label>K carrying cap <span id="vk">100</span></label><input type="range" id="ik" min="20" max="200" step="1" value="100" /></div>
  <div class="control"><label>N₀ initial <span id="vn">5</span></label><input type="range" id="in" min="1" max="200" step="1" value="5" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-r="1.50">Slow</button>
    <button class="p" data-r="3.00">Fast</button>
    <button class="p" data-r="5.00">Steep</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.7rem;">
    <button id="bToggle" class="toggle">Compare Ricker</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>step t</span><span class="v" id="st">0</span></div>
  <div class="stat"><span>N(t)</span><span class="v" id="sn">—</span></div>
  <div class="stat"><span>N* eq</span><span class="v" id="seq">—</span></div>
  <div class="legend"><span class="bh">Beverton-Holt</span><span class="ri">Ricker</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c'); const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() { W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize', resize); resize();

  const SAGE='#8A9A5B', TERRA='#BC6C25', EARTH='#DDA15E', MAGENTA='#e879f9', CYAN='#06b6d4';
  const GRID='rgba(254,250,224,0.08)', AXIS='rgba(254,250,224,0.4)', TXT='rgba(254,250,224,0.7)';

  let R0=2.50, K=100, N0=5;
  let Nbh=N0, Nri=N0, t=0, running=true, showRicker=false;
  const sBH=[], sRI=[]; const MAX=300;

  function reset() { Nbh=N0; Nri=N0; t=0; sBH.length=0; sRI.length=0; sBH.push(Nbh); sRI.push(Nri); }
  function bh(n) { return R0*n / (1 + (R0-1)*n/K); }
  function ri(n) { return n*Math.exp(Math.log(R0)*(1-n/K)); } // r=ln(R0) so equilibrium at K

  function step() {
    Nbh = bh(Nbh); Nri = ri(Nri);
    if (Nbh<0) Nbh=0; if (Nri<0) Nri=0;
    sBH.push(Nbh); sRI.push(Nri);
    if (sBH.length>MAX) { sBH.shift(); sRI.shift(); }
    t++;
  }

  function drawAxes(x,y,w,h,title,xl,yl) {
    ctx.strokeStyle = GRID; ctx.lineWidth=1;
    for (let i=1;i<4;i++) { const py=y+i*h/4; ctx.beginPath(); ctx.moveTo(x,py); ctx.lineTo(x+w,py); ctx.stroke(); }
    ctx.strokeStyle = AXIS; ctx.beginPath();
    ctx.moveTo(x,y); ctx.lineTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    ctx.fillStyle = TXT; ctx.font='12px Nunito'; ctx.fillText(title, x, y-10);
    ctx.font='10px Nunito'; ctx.fillStyle='rgba(254,250,224,0.5)';
    ctx.fillText(xl, x+w-20, y+h+18);
    ctx.save(); ctx.translate(x-44, y+h/2+10); ctx.rotate(-Math.PI/2); ctx.fillText(yl,0,0); ctx.restore();
  }

  function drawSeries(x,y,w,h,arr,col,glow) {
    if (arr.length<2) return;
    let mx=0; for (const v of arr) if (v>mx) mx=v;
    if (showRicker) for (const v of sRI) if (v>mx) mx=v;
    if (mx<1) mx=1;
    ctx.shadowColor=glow; ctx.shadowBlur=10; ctx.strokeStyle=col; ctx.lineWidth=2.2; ctx.beginPath();
    for (let i=0;i<arr.length;i++) {
      const px = x + i/(MAX-1)*w; const py = y+h - arr[i]/mx*h;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke(); ctx.shadowBlur=0;
    return mx;
  }

  function draw() {
    ctx.fillStyle = '#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=360, padT=60, padG=50;
    const col = W - padL - padR;
    const rowH = (H - padT - padG - 50)/2;

    // === Time series ===
    let y0 = padT;
    drawAxes(padL, y0, col, rowH, 'Population over time', 't', 'N');
    let mx=0; for (const v of sBH) if (v>mx) mx=v;
    if (showRicker) for (const v of sRI) if (v>mx) mx=v;
    mx = Math.max(mx, K*1.2);
    // K reference line
    const yK = y0+rowH - K/mx*rowH;
    ctx.strokeStyle='rgba(221,161,94,0.4)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(padL,yK); ctx.lineTo(padL+col,yK); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=EARTH; ctx.font='10px Nunito'; ctx.fillText('K='+K.toFixed(0), padL+col-50, yK-4);
    if (showRicker) {
      ctx.shadowColor=MAGENTA; ctx.shadowBlur=10; ctx.strokeStyle=MAGENTA; ctx.lineWidth=2; ctx.beginPath();
      for (let i=0;i<sRI.length;i++) {
        const px = padL + i/(MAX-1)*col; const py = y0+rowH - sRI[i]/mx*rowH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke(); ctx.shadowBlur=0;
    }
    ctx.shadowColor=SAGE; ctx.shadowBlur=12; ctx.strokeStyle=SAGE; ctx.lineWidth=2.4; ctx.beginPath();
    for (let i=0;i<sBH.length;i++) {
      const px = padL + i/(MAX-1)*col; const py = y0+rowH - sBH[i]/mx*rowH;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle=TXT; ctx.font='11px Nunito';
    ctx.fillText(mx.toFixed(0), padL-40, y0+5); ctx.fillText('0', padL-15, y0+rowH);

    // === Map curves: f(N) vs N with cobweb ===
    y0 = padT + rowH + padG;
    const sq = Math.min(col, rowH);
    drawAxes(padL, y0, sq, sq, 'Map  N → f(N)   with cobweb', 'N', 'f(N)');
    const Nmax = K*2.2; let fmx = 0;
    const NS=200;
    for (let i=0;i<NS;i++) { const n = i/(NS-1)*Nmax;
      const v1 = bh(n); if (v1>fmx) fmx=v1;
      if (showRicker) { const v2 = ri(n); if (v2>fmx) fmx=v2; }
    }
    if (fmx<1) fmx=1;
    const sxF = sq/Nmax, syF = sq/fmx;
    // identity
    ctx.strokeStyle='rgba(254,250,224,0.28)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(padL, y0+sq); ctx.lineTo(padL + Math.min(Nmax,fmx)*sxF, y0+sq - Math.min(Nmax,fmx)*syF);
    ctx.stroke(); ctx.setLineDash([]);
    // BH curve
    ctx.shadowColor=SAGE; ctx.shadowBlur=10; ctx.strokeStyle=SAGE; ctx.lineWidth=2; ctx.beginPath();
    for (let i=0;i<NS;i++) { const n = i/(NS-1)*Nmax; const v = bh(n);
      const px = padL + n*sxF, py = y0+sq - v*syF;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py); }
    ctx.stroke(); ctx.shadowBlur=0;
    if (showRicker) {
      ctx.shadowColor=MAGENTA; ctx.shadowBlur=10; ctx.strokeStyle=MAGENTA; ctx.lineWidth=2; ctx.beginPath();
      for (let i=0;i<NS;i++) { const n = i/(NS-1)*Nmax; const v = ri(n);
        const px = padL + n*sxF, py = y0+sq - v*syF;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py); }
      ctx.stroke(); ctx.shadowBlur=0;
    }
    // cobweb (BH)
    if (sBH.length>1) {
      ctx.strokeStyle=CYAN; ctx.lineWidth=1.3; ctx.beginPath();
      for (let i=1;i<Math.min(80, sBH.length);i++) {
        const n0 = sBH[i-1], n1 = sBH[i];
        ctx.moveTo(padL + n0*sxF, y0+sq - n0*syF);
        ctx.lineTo(padL + n0*sxF, y0+sq - n1*syF);
        ctx.lineTo(padL + n1*sxF, y0+sq - n1*syF);
      }
      ctx.stroke();
    }
    // K marker
    ctx.fillStyle=EARTH; ctx.beginPath();
    ctx.arc(padL+K*sxF, y0+sq-K*syF, 4, 0, Math.PI*2); ctx.fill();
    ctx.font='10px Nunito'; ctx.fillText('(K,K)', padL+K*sxF+6, y0+sq-K*syF-5);

    document.getElementById('st').textContent = t;
    document.getElementById('sn').textContent = Nbh.toFixed(2);
    document.getElementById('seq').textContent = K.toFixed(0);
  }

  function loop() { if (running) step(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,setter,dec=2) {
    document.getElementById(id).addEventListener('input', e => {
      const v=+e.target.value;
      document.getElementById(vid).textContent = (id==='ik'||id==='in')?v.toFixed(0):v.toFixed(dec);
      setter(v);
    });
  }
  bind('ir','vr', v=>{ R0=v; });
  bind('ik','vk', v=>{ K=v; });
  bind('in','vn', v=>{ N0=v; reset(); });
  document.querySelectorAll('button.p').forEach(b => {
    b.addEventListener('click', () => {
      R0=+b.dataset.r; document.getElementById('ir').value=R0; document.getElementById('vr').textContent=R0.toFixed(2); reset();
    });
  });
  document.getElementById('bToggle').addEventListener('click', e => {
    showRicker = !showRicker; e.target.textContent = showRicker ? 'Hide Ricker' : 'Compare Ricker';
  });
  document.getElementById('bRun').addEventListener('click', e => { running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
