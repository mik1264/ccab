<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cucker-Smale Flocking — Deluxe ABM</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream); letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ 61</span>
  <h2>Cucker-Smale</h2>
  <p>Each particle's velocity adjusts toward the population mean weighted by 1/(1 + ||x_i − x_j||²)^β. For β &lt; 1/2 alignment is unconditional; for larger β, distant flocks drift apart. Trails colored by speed (turbo).</p>

  <div class="control"><label>β coupling decay <span id="vB">0.30</span></label><input type="range" id="iB" min="0.0" max="1.5" step="0.02" value="0.30" /></div>
  <div class="control"><label>K (initial spread) <span id="vK">2.50</span></label><input type="range" id="iK" min="0.2" max="6.0" step="0.1" value="2.50" /></div>
  <div class="control"><label>Coupling λ <span id="vL">1.00</span></label><input type="range" id="iL" min="0.1" max="3.0" step="0.05" value="1.00" /></div>
  <div class="control"><label>Particles <span id="vNp">300</span></label><input type="range" id="iNp" min="80" max="500" step="10" value="300" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="0.20,2.0">Cohesion</button>
    <button class="p" data-p="0.60,3.5">Split</button>
    <button class="p" data-p="1.20,4.5">Drift</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Frame</span><span class="v" id="sFr">0</span></div>
  <div class="stat"><span>⟨|v|⟩</span><span class="v" id="sV">—</span></div>
  <div class="stat"><span>Alignment E</span><span class="v" id="sE">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  let nP = 300;
  let beta = 0.30;
  let K = 2.50;
  let lambda = 1.00;
  const dt = 0.05;

  let X, Y, VX, VY;
  let running = true, frame = 0;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    X = new Float32Array(nP); Y = new Float32Array(nP);
    VX = new Float32Array(nP); VY = new Float32Array(nP);
    const cx = W/2, cy = H/2;
    const R = Math.min(W,H)*0.25;
    for (let i=0; i<nP; i++) {
      const a = Math.random()*Math.PI*2;
      const r = Math.sqrt(Math.random())*R;
      X[i] = cx + r*Math.cos(a);
      Y[i] = cy + r*Math.sin(a);
      const ang = Math.random()*Math.PI*2;
      const sp = Math.random()*K;
      VX[i] = sp*Math.cos(ang);
      VY[i] = sp*Math.sin(ang);
    }
    frame = 0;
    // Clear background once
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
  }

  function step() {
    const aX = new Float32Array(nP);
    const aY = new Float32Array(nP);
    for (let i=0; i<nP; i++) {
      let sxF = 0, syF = 0, wSum = 0;
      for (let j=0; j<nP; j++) {
        if (i===j) continue;
        const dx = X[j]-X[i], dy = Y[j]-Y[i];
        const d2 = dx*dx + dy*dy;
        // CS coupling: 1/(1 + d2/scale)^beta, scale to make units sane
        const w = 1.0 / Math.pow(1 + d2/2500.0, beta);
        wSum += w;
        sxF += w*(VX[j]-VX[i]);
        syF += w*(VY[j]-VY[i]);
      }
      if (nP > 1) {
        aX[i] = (lambda/(nP-1)) * sxF;
        aY[i] = (lambda/(nP-1)) * syF;
      }
    }
    for (let i=0; i<nP; i++) {
      VX[i] += dt*aX[i];
      VY[i] += dt*aY[i];
      // Cap speed for stability
      const sp = Math.sqrt(VX[i]*VX[i]+VY[i]*VY[i]);
      const maxSp = 60;
      if (sp > maxSp) { VX[i] *= maxSp/sp; VY[i] *= maxSp/sp; }
      X[i] += VX[i]*dt*8;
      Y[i] += VY[i]*dt*8;
      // Soft wrap with mirror
      if (X[i] < 0) X[i] += W; else if (X[i] >= W) X[i] -= W;
      if (Y[i] < 0) Y[i] += H; else if (Y[i] >= H) Y[i] -= H;
    }
  }

  // Turbo colormap (speed → color)
  function turbo(t) {
    t = Math.max(0,Math.min(1,t));
    const r = Math.round(255*(0.13348 + 4.61539*t - 42.66032*t*t + 132.13108*t*t*t - 152.94239*t**4 + 59.28637*t**5));
    const g = Math.round(255*(0.09140 + 2.19418*t + 4.84296*t*t - 14.18503*t*t*t + 4.27716*t**4 + 2.82131*t**5));
    const b = Math.round(255*(0.10667 + 12.64194*t - 60.58204*t*t + 110.36276*t*t*t - 89.90310*t**4 + 27.34591*t**5));
    return [Math.max(0,Math.min(255,r)), Math.max(0,Math.min(255,g)), Math.max(0,Math.min(255,b))];
  }

  function render() {
    // Fade trails
    ctx.fillStyle = 'rgba(6,8,13,0.10)';
    ctx.fillRect(0,0,W,H);

    let sumV = 0, mvx = 0, mvy = 0;
    for (let i=0; i<nP; i++) {
      const sp = Math.sqrt(VX[i]*VX[i]+VY[i]*VY[i]);
      sumV += sp;
      mvx += VX[i]; mvy += VY[i];
      const t = Math.min(1, sp / 8.0);
      const col = turbo(t);
      ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},0.85)`;
      ctx.shadowColor = `rgba(${col[0]},${col[1]},${col[2]},0.55)`;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(X[i], Y[i], 1.8, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    const meanV = sumV/nP;
    // Alignment energy = 1/2 sum |v_i - v_j|² (sample-style scale)
    const meanVx = mvx/nP, meanVy = mvy/nP;
    let energy = 0;
    for (let i=0; i<nP; i++) {
      energy += (VX[i]-meanVx)*(VX[i]-meanVx) + (VY[i]-meanVy)*(VY[i]-meanVy);
    }
    energy /= nP;
    document.getElementById('sFr').textContent = frame;
    document.getElementById('sV').textContent = meanV.toFixed(3);
    document.getElementById('sE').textContent = energy.toFixed(3);
  }

  function loop() {
    if (running) { step(); frame++; }
    render();
    requestAnimationFrame(loop);
  }

  function bind(id, vid, cb, fmt=2) {
    const el = document.getElementById(id);
    el.addEventListener('input', e => {
      const v = +e.target.value;
      document.getElementById(vid).textContent = fmt===0?v:v.toFixed(fmt);
      cb(v);
    });
  }
  bind('iB','vB', v => beta=v, 2);
  bind('iK','vK', v => K=v, 2);
  bind('iL','vL', v => lambda=v, 2);
  bind('iNp','vNp', v => { nP=v; reset(); }, 0);

  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      const [bb, kk] = b.dataset.p.split(',').map(Number);
      beta = bb; K = kk;
      document.getElementById('iB').value = bb; document.getElementById('vB').textContent = bb.toFixed(2);
      document.getElementById('iK').value = kk; document.getElementById('vK').textContent = kk.toFixed(2);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running; e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  cv.addEventListener('pointerdown', e => {
    const rect = cv.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    // Drag particles toward click direction
    for (let i=0; i<nP; i++) {
      const dx = x - X[i], dy = y - Y[i];
      const d = Math.sqrt(dx*dx+dy*dy)+1e-3;
      if (d < 200) {
        VX[i] += dx/d*5;
        VY[i] += dy/d*5;
      }
    }
  });

  reset(); loop();
})();
</script>
</body>
</html>
