<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phillips Curve with Adaptive Expectations — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.5rem; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Phillips Curve</h2>
  <p>Expectations-augmented: π = π^e − β(u − u_n) + supply shock. Adaptive: dπ^e/dt = λ(π − π^e). Aggregate demand → u responds to (π−target). The short-run trade-off shifts; long-run is vertical at u_n.</p>

  <div class="control"><label>β slope <span id="vb">0.8</span></label><input type="range" id="ib" min="0.1" max="2.5" step="0.05" value="0.8" /></div>
  <div class="control"><label>u_n natural rate <span id="vu">0.05</span></label><input type="range" id="iu" min="0.02" max="0.10" step="0.001" value="0.05" /></div>
  <div class="control"><label>λ adapt speed <span id="vl">0.30</span></label><input type="range" id="il" min="0" max="1" step="0.01" value="0.30" /></div>
  <div class="control"><label>π target (CB) <span id="vt">0.02</span></label><input type="range" id="it" min="-0.02" max="0.10" step="0.005" value="0.02" /></div>
  <div class="control"><label>shock σ <span id="vsh">0.005</span></label><input type="range" id="ish" min="0" max="0.03" step="0.001" value="0.005" /></div>

  <div class="btnrow">
    <button class="p" data-p="0.8,0.05,0.30,0.02,0.005">1960s curve</button>
    <button class="p" data-p="0.8,0.05,0.90,0.06,0.012">1970s break</button>
    <button class="p" data-p="0.8,0.05,0.50,0.02,0.003">Volcker</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>π inflation</span><span class="v" id="spi">—</span></div>
  <div class="stat"><span>π^e expected</span><span class="v" id="spe">—</span></div>
  <div class="stat"><span>u unempl.</span><span class="v" id="su">—</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0; const dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize', resize); resize();

  const SAGE='#8A9A5B', EARTH='#DDA15E', MAG='#e879f9', CY='#06b6d4', PLASMA='#fb923c', GRID='rgba(254,250,224,0.08)', AXIS='rgba(254,250,224,0.45)';

  let beta=0.8, un=0.05, lambda=0.30, piT=0.02, sigma=0.005;
  let pi=0.02, piE=0.02, u=0.05, t=0, running=true;
  const series=[]; const MAX=4000;

  function reset(){ pi=0.02; piE=0.02; u=0.05; t=0; series.length=0; }
  // System (continuous):
  // π = πe − β(u − u_n) + ε  (algebraic)
  // dπe/dt = λ(π − πe)
  // CB tries to hit πT by adjusting u: du/dt = κ(π − πT)  (positive feedback to fight inflation)
  // (rises u when inflation above target)
  const kappa = 0.6;

  function tick(){
    const dt=0.20;
    // 4 sub-steps RK4-ish for piE and u, with π reread each step
    for(let s=0;s<3;s++){
      const epsilon = sigma*(Math.random()-0.5)*2;
      const piNew = piE - beta*(u - un) + epsilon;
      // RK4 for pe and u jointly (treat π as a function of state)
      function deriv(piE,u){
        const piHere = piE - beta*(u - un); // mean (no noise) for derivs
        return [lambda*(piHere - piE), kappa*(piHere - piT)];
      }
      const k1=deriv(piE,u);
      const k2=deriv(piE+dt/2*k1[0], u+dt/2*k1[1]);
      const k3=deriv(piE+dt/2*k2[0], u+dt/2*k2[1]);
      const k4=deriv(piE+dt*k3[0], u+dt*k3[1]);
      piE += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
      u   += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
      pi  = piNew; // observed inflation has noise
      if (u<0.005) u=0.005; if (u>0.20) u=0.20;
      t += dt;
    }
    series.push({t,pi,piE,u});
    if(series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('spi').textContent=(pi*100).toFixed(2)+'%';
    document.getElementById('spe').textContent=(piE*100).toFixed(2)+'%';
    document.getElementById('su').textContent=(u*100).toFixed(2)+'%';
  }

  function drawAxes(x,y,w,h,title){
    ctx.strokeStyle=AXIS; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito'; ctx.fillText(title, x, y-8);
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    if(series.length<2) return;
    const padR=360;
    const totW=W-padR-80;

    // Top: time series
    const x0=60, y0=60, w0=totW, h0=H*0.42;
    drawAxes(x0,y0,w0,h0,'π, π^e, u over time');
    // bounds
    let ymin=Infinity,ymax=-Infinity;
    for(const p of series){
      for(const v of [p.pi,p.piE,p.u]){ if(v<ymin)ymin=v; if(v>ymax)ymax=v; }
    }
    ymin=Math.min(ymin,-0.005); ymax=Math.max(ymax,0.05); ymin-=0.005; ymax+=0.01;
    const yr=ymax-ymin;
    const t0=series[0].t, t1=series[series.length-1].t, tspan=Math.max(t1-t0,1);
    // gridlines
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y0+i*h0/5; ctx.beginPath(); ctx.moveTo(x0,py); ctx.lineTo(x0+w0,py); ctx.stroke(); }
    // zero line
    ctx.strokeStyle='rgba(254,250,224,0.25)'; ctx.setLineDash([3,3]);
    const zy=y0+h0-(0-ymin)/yr*h0;
    ctx.beginPath(); ctx.moveTo(x0,zy); ctx.lineTo(x0+w0,zy); ctx.stroke(); ctx.setLineDash([]);
    function plot(key,color,lw){
      ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.beginPath();
      for(let i=0;i<series.length;i++){
        const p=series[i]; const px=x0+(p.t-t0)/tspan*w0; const py=y0+h0-(p[key]-ymin)/yr*h0;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      } ctx.stroke();
    }
    plot('pi',EARTH,2);
    plot('piE',MAG,2);
    plot('u',CY,2.2);
    ctx.font='11px Nunito';
    ctx.fillStyle=EARTH; ctx.fillText('— π', x0+12, y0+18);
    ctx.fillStyle=MAG;   ctx.fillText('— π^e', x0+50, y0+18);
    ctx.fillStyle=CY;    ctx.fillText('— u', x0+100, y0+18);

    // Bottom-left: short-run + long-run Phillips curve
    const x1=60, y1=y0+h0+70, w1=totW/2-20, h1=H-y1-50;
    drawAxes(x1,y1,w1,h1,'Phillips curve: π vs u');
    // Determine bounds
    let umin=0.01, umax=0.12, pmin=-0.02, pmax=0.12;
    for(const p of series){
      if(p.u<umin) umin=p.u; if(p.u>umax) umax=p.u;
      if(p.pi<pmin) pmin=p.pi; if(p.pi>pmax) pmax=p.pi;
    }
    umin-=0.005; umax+=0.005; pmin-=0.005; pmax+=0.005;
    const ur=umax-umin, prRange=pmax-pmin;
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y1+i*h1/5; ctx.beginPath(); ctx.moveTo(x1,py); ctx.lineTo(x1+w1,py); ctx.stroke(); }
    for(let i=1;i<5;i++){ const px=x1+i*w1/5; ctx.beginPath(); ctx.moveTo(px,y1); ctx.lineTo(px,y1+h1); ctx.stroke(); }
    // long-run vertical at u_n
    if (un>=umin && un<=umax){
      ctx.strokeStyle='rgba(232,121,249,0.6)'; ctx.lineWidth=2; ctx.setLineDash([6,4]);
      const ux=x1+(un-umin)/ur*w1;
      ctx.beginPath(); ctx.moveTo(ux,y1); ctx.lineTo(ux,y1+h1); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=MAG; ctx.font='11px Nunito';
      ctx.fillText('LR (u_n)', ux+4, y1+12);
    }
    // SR curve: π = currentPiE − β(u − u_n)
    ctx.strokeStyle='rgba(221,161,94,0.7)'; ctx.lineWidth=2; ctx.beginPath();
    for(let i=0;i<=80;i++){
      const uu=umin+i/80*ur;
      const pii=piE - beta*(uu - un);
      const px=x1+(uu-umin)/ur*w1; const py=y1+h1-(pii-pmin)/prRange*h1;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke();
    // History scatter as small dots
    for(let i=0;i<series.length;i+=Math.max(1,(series.length/400)|0)){
      const p=series[i];
      const px=x1+(p.u-umin)/ur*w1; const py=y1+h1-(p.pi-pmin)/prRange*h1;
      const tt=i/series.length;
      ctx.fillStyle=`rgba(${6+250*tt},${182-50*tt},${212-100*tt},${0.3+0.6*tt})`;
      ctx.beginPath(); ctx.arc(px,py,2,0,Math.PI*2); ctx.fill();
    }
    // current point
    const last=series[series.length-1];
    const cx=x1+(last.u-umin)/ur*w1; const cy=y1+h1-(last.pi-pmin)/prRange*h1;
    ctx.fillStyle=PLASMA; ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2); ctx.fill();
    // axes labels
    ctx.fillStyle='rgba(254,250,224,0.55)'; ctx.font='11px Nunito';
    ctx.fillText('u (unemployment)', x1+w1-120, y1+h1+16);
    ctx.save(); ctx.translate(x1-30, y1+h1/2+14); ctx.rotate(-Math.PI/2);
    ctx.fillText('π (inflation)',0,0); ctx.restore();

    // Bottom-right: π^e vs π — adaptive learning trace
    const x2=x1+w1+40, y2=y1, w2=totW/2-20, h2=h1;
    drawAxes(x2,y2,w2,h2,'Adaptive learning: π^e vs π');
    let amin=Math.min(pmin, ymin), amax=Math.max(pmax, ymax);
    const ar=amax-amin;
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y2+i*h2/5; ctx.beginPath(); ctx.moveTo(x2,py); ctx.lineTo(x2+w2,py); ctx.stroke(); }
    // 45° line
    ctx.strokeStyle='rgba(232,121,249,0.5)'; ctx.setLineDash([4,4]); ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(x2, y2+h2-(amin-amin)/ar*h2);
    ctx.lineTo(x2+w2, y2+h2-(amax-amin)/ar*h2);
    ctx.stroke(); ctx.setLineDash([]);
    // path
    ctx.lineWidth=1.4;
    for(let i=1;i<series.length;i++){
      const p1=series[i-1], p2=series[i];
      const px1=x2+(p1.pi-amin)/ar*w2; const py1=y2+h2-(p1.piE-amin)/ar*h2;
      const px2=x2+(p2.pi-amin)/ar*w2; const py2=y2+h2-(p2.piE-amin)/ar*h2;
      const tt=i/series.length;
      ctx.strokeStyle=`rgba(${251},${146-80*tt},${60+150*tt},${0.4+0.6*tt})`;
      ctx.beginPath(); ctx.moveTo(px1,py1); ctx.lineTo(px2,py2); ctx.stroke();
    }
    const lpx=x2+(last.pi-amin)/ar*w2; const lpy=y2+h2-(last.piE-amin)/ar*h2;
    ctx.fillStyle=MAG; ctx.beginPath(); ctx.arc(lpx,lpy,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(254,250,224,0.55)'; ctx.font='11px Nunito';
    ctx.fillText('π →', x2+w2-30, y2+h2+16);
    ctx.save(); ctx.translate(x2-30, y2+h2/2+10); ctx.rotate(-Math.PI/2);
    ctx.fillText('π^e',0,0); ctx.restore();
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }
  function bind(id,vid,fn,d=2){ const el=document.getElementById(id);
    el.addEventListener('input', e=>{ const v=+e.target.value; document.getElementById(vid).textContent=v.toFixed(d); fn(v); });
  }
  bind('ib','vb',v=>beta=v,2); bind('iu','vu',v=>un=v,3); bind('il','vl',v=>lambda=v,2);
  bind('it','vt',v=>piT=v,2); bind('ish','vsh',v=>sigma=v,3);

  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click', ()=>{
      const p=b.dataset.p.split(',').map(Number);
      beta=p[0]; un=p[1]; lambda=p[2]; piT=p[3]; sigma=p[4];
      ['ib','iu','il','it','ish'].forEach((id,i)=>{ document.getElementById(id).value=p[i]; });
      document.getElementById('vb').textContent=p[0].toFixed(2);
      document.getElementById('vu').textContent=p[1].toFixed(3);
      document.getElementById('vl').textContent=p[2].toFixed(2);
      document.getElementById('vt').textContent=p[3].toFixed(2);
      document.getElementById('vsh').textContent=p[4].toFixed(3);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{ running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); loop();
})();
</script>
</body>
</html>
