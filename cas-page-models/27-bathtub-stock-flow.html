<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bathtub Stock-Flow — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(330px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend { display:flex; gap:0.8rem; font-size:0.8rem; margin-top:0.5rem; flex-wrap:wrap; }
  .legend span::before { content:''; display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align: middle; }
  .legend .iflow::before { background: var(--sage); }
  .legend .oflow::before { background: var(--terracotta); }
  .legend .stk::before { background: var(--earth); }
  .toggle { display:flex; align-items:center; gap:0.5rem; font-size:0.8rem; margin-bottom:0.8rem; color:var(--earth); }
  .toggle input { accent-color: var(--terracotta); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 27</span>
  <h2>Bathtub Stock-Flow</h2>
  <p>dS/dt = IN − OUT. The stock keeps changing whenever inflow ≠ outflow. Toggle the step scenario where inflow jumps at t=10.</p>

  <div class="control"><label>Inflow rate <span id="vi">5.0</span></label><input type="range" id="iI" min="0" max="20" step="0.1" value="5.0" /></div>
  <div class="control"><label>Outflow rate <span id="vo">3.0</span></label><input type="range" id="iO" min="0" max="20" step="0.1" value="3.0" /></div>
  <div class="control"><label>S₀ initial stock <span id="vs">10</span></label><input type="range" id="iS0" min="0" max="200" step="1" value="10" /></div>
  <label class="toggle"><input type="checkbox" id="iStep" /> step inflow at t=10 (×2)</label>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>Stock S</span><span class="v" id="sS">—</span></div>
  <div class="stat"><span>Net flow IN−OUT</span><span class="v" id="sNet">—</span></div>
  <div class="stat"><span>current IN</span><span class="v" id="sIn">—</span></div>
  <div class="stat"><span>current OUT</span><span class="v" id="sOut">—</span></div>
  <div class="legend"><span class="iflow">IN</span><span class="oflow">OUT</span><span class="stk">Stock</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize',resize); resize();

  const C_IN='#8A9A5B', C_OUT='#BC6C25', C_S='#DDA15E', GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  let inflow=5.0, outflow=3.0, S0=10, useStep=false;
  let S=S0, t=0, running=true;
  const series=[]; const MAX=2000;
  const dt=0.05;

  function reset(){ S=S0; t=0; series.length=0; }

  function getIn(time){ return useStep && time>=10 ? inflow*2 : inflow; }
  function getOut(){ return outflow; }

  function step(){
    const IN=getIn(t), OUT=getOut();
    S += dt*(IN-OUT);
    if(S<0) S=0;
    t += dt;
  }

  function tick(){
    for(let i=0;i<2;i++) step();
    const IN=getIn(t), OUT=getOut();
    series.push({t,S,IN,OUT});
    if(series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sS').textContent=S.toFixed(2);
    document.getElementById('sNet').textContent=(IN-OUT).toFixed(2);
    document.getElementById('sIn').textContent=IN.toFixed(2);
    document.getElementById('sOut').textContent=OUT.toFixed(2);
  }

  function panel(x,y,w,h,title,plotFn){
    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for(let i=0;i<=4;i++){
      const yp=y+i*h/4;
      ctx.beginPath(); ctx.moveTo(x,yp); ctx.lineTo(x+w,yp); ctx.stroke();
    }
    ctx.strokeStyle=AXIS;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='12px Nunito';
    ctx.fillText(title, x, y-10);
    plotFn(x,y,w,h);
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if(series.length<2) return;
    const padL=80, padR=370, padT=50, padB=50, gap=32;
    const totW=W-padL-padR;
    const totH=H-padT-padB-2*gap;
    const h=totH/3;
    const t0=series[0].t, t1=series[series.length-1].t;
    const tspan=Math.max(t1-t0,1);

    let maxFlow=0.001, maxStock=0.001;
    for(const s of series){
      if(s.IN>maxFlow) maxFlow=s.IN;
      if(s.OUT>maxFlow) maxFlow=s.OUT;
      if(s.S>maxStock) maxStock=s.S;
    }
    if(maxStock<1) maxStock=1;

    panel(padL,padT,totW,h,'Inflow IN(t)',(x,y,w,hh)=>{
      ctx.fillStyle='rgba(254,250,224,0.55)';
      ctx.fillText(maxFlow.toFixed(1), x-40, y+5);
      ctx.fillText('0', x-15, y+hh);
      ctx.strokeStyle=C_IN; ctx.lineWidth=2.2; ctx.beginPath();
      for(let i=0;i<series.length;i++){
        const s=series[i];
        const px=x+(s.t-t0)/tspan*w;
        const py=y+hh-s.IN/maxFlow*hh;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    });

    panel(padL,padT+h+gap,totW,h,'Outflow OUT(t)',(x,y,w,hh)=>{
      ctx.fillStyle='rgba(254,250,224,0.55)';
      ctx.fillText(maxFlow.toFixed(1), x-40, y+5);
      ctx.fillText('0', x-15, y+hh);
      ctx.strokeStyle=C_OUT; ctx.lineWidth=2.2; ctx.beginPath();
      for(let i=0;i<series.length;i++){
        const s=series[i];
        const px=x+(s.t-t0)/tspan*w;
        const py=y+hh-s.OUT/maxFlow*hh;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    });

    panel(padL,padT+2*(h+gap),totW,h,'Stock S(t)',(x,y,w,hh)=>{
      ctx.fillStyle='rgba(254,250,224,0.55)';
      ctx.fillText(maxStock.toFixed(0), x-50, y+5);
      ctx.fillText('0', x-15, y+hh);
      ctx.fillText('t='+t1.toFixed(1), x+w-50, y+hh+18);
      ctx.strokeStyle=C_S; ctx.lineWidth=2.4; ctx.beginPath();
      for(let i=0;i<series.length;i++){
        const s=series[i];
        const px=x+(s.t-t0)/tspan*w;
        const py=y+hh-s.S/maxStock*hh;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    });
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,dec=1){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=dec===0?v.toFixed(0):v.toFixed(dec);
      fn(v);
    });
  }
  bind('iI','vi',v=>inflow=v);
  bind('iO','vo',v=>outflow=v);
  bind('iS0','vs',v=>{S0=v; reset();},0);
  document.getElementById('iStep').addEventListener('change',e=>{useStep=e.target.checked; reset();});
  document.getElementById('bRun').addEventListener('click',e=>{running=!running; e.target.textContent=running?'Pause':'Resume';});
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
