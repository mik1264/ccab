<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voter Model on Small-World — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .tag-abm {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.6rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag-abm">ABM ✦ 47</span>
  <h2>Voter Model on Small-World</h2>
  <p>At each substep a random node copies a random neighbor's opinion. Run on a Watts-Strogatz small-world ring. Long-range shortcuts dramatically speed consensus.</p>

  <div class="control"><label>Rewiring β <span id="vBeta">0.10</span></label><input type="range" id="iBeta" min="0" max="1" step="0.01" value="0.10" /></div>
  <div class="control"><label>Avg degree k <span id="vK">6</span></label><input type="range" id="iK" min="2" max="12" step="2" value="6" /></div>
  <div class="control"><label>Updates/frame <span id="vS">25</span></label><input type="range" id="iS" min="1" max="100" step="1" value="25" /></div>

  <div class="btnrow">
    <button class="p" data-p="0">Lattice</button>
    <button class="p" data-p="0.05">Small-world</button>
    <button class="p" data-p="0.5">Almost random</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Cyan share</span><span class="v" id="sShare">—</span></div>
  <div class="stat"><span>Boundaries</span><span class="v" id="sBound">—</span></div>
  <div class="stat"><span>Consensus</span><span class="v" id="sCons">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0;
  const dpr = Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize); resize();

  const N = 150;
  let beta_p = 0.10, kdeg = 6, stepsPerFrame = 25;
  let opinion, adj, step=0, running=true, consensusStep=null;
  const shareHist = [];

  function init(){
    opinion = new Int8Array(N);
    adj = Array.from({length:N},()=>new Set());
    for (let i=0;i<N;i++) opinion[i] = Math.random()<0.5?0:1;
    const k2 = kdeg/2;
    for (let i=0;i<N;i++){
      for (let j=1;j<=k2;j++){
        const a = (i+j)%N;
        adj[i].add(a); adj[a].add(i);
      }
    }
    for (let i=0;i<N;i++){
      for (let j=1;j<=k2;j++){
        const a = (i+j)%N;
        if (Math.random()<beta_p && adj[i].has(a)){
          adj[i].delete(a); adj[a].delete(i);
          let trials=0, c;
          do { c=(Math.random()*N)|0; trials++; }
          while ((c===i || adj[i].has(c)) && trials<50);
          if (trials<50){ adj[i].add(c); adj[c].add(i); }
          else { adj[i].add(a); adj[a].add(i); }
        }
      }
    }
    step=0; consensusStep=null;
    shareHist.length=0;
  }

  function tick(){
    for (let s=0;s<stepsPerFrame;s++){
      const i = (Math.random()*N)|0;
      const list = [...adj[i]];
      if (list.length===0) continue;
      const j = list[(Math.random()*list.length)|0];
      opinion[i] = opinion[j];
      step++;
    }
    let n1=0;
    for (let i=0;i<N;i++) if (opinion[i]) n1++;
    const share = n1/N;
    shareHist.push(share);
    if (shareHist.length>500) shareHist.shift();
    let bound = 0;
    for (let i=0;i<N;i++) for (const j of adj[i]) if (j>i && opinion[i]!==opinion[j]) bound++;
    document.getElementById('sStep').textContent = step;
    document.getElementById('sShare').textContent = share.toFixed(3);
    document.getElementById('sBound').textContent = bound;
    if ((n1===0 || n1===N) && consensusStep===null){ consensusStep=step; }
    document.getElementById('sCons').textContent = consensusStep===null ? '—' : ('@'+consensusStep);
  }

  function draw(){
    ctx.fillStyle='#06080d';
    ctx.fillRect(0,0,W,H);
    const cx = W*0.42, cy = H/2;
    const R = Math.min(W*0.32, H*0.40);
    // edges - faint short, brighter long
    ctx.lineWidth = 0.5;
    ctx.strokeStyle = 'rgba(254,250,224,0.08)';
    ctx.beginPath();
    for (let i=0;i<N;i++) for (const j of adj[i]) if (j>i){
      const ang = Math.min((j-i+N)%N, (i-j+N)%N);
      if (ang<=kdeg/2+1){
        const a1=2*Math.PI*i/N, a2=2*Math.PI*j/N;
        ctx.moveTo(cx+Math.cos(a1)*R, cy+Math.sin(a1)*R);
        ctx.lineTo(cx+Math.cos(a2)*R, cy+Math.sin(a2)*R);
      }
    }
    ctx.stroke();
    ctx.strokeStyle = 'rgba(6,182,212,0.20)';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    for (let i=0;i<N;i++) for (const j of adj[i]) if (j>i){
      const ang = Math.min((j-i+N)%N, (i-j+N)%N);
      if (ang>kdeg/2+1){
        const a1=2*Math.PI*i/N, a2=2*Math.PI*j/N;
        ctx.moveTo(cx+Math.cos(a1)*R, cy+Math.sin(a1)*R);
        ctx.lineTo(cx+Math.cos(a2)*R, cy+Math.sin(a2)*R);
      }
    }
    ctx.stroke();
    // nodes
    for (let i=0;i<N;i++){
      const a = 2*Math.PI*i/N;
      const x = cx+Math.cos(a)*R, y = cy+Math.sin(a)*R;
      const col = opinion[i] ? '#06b6d4' : '#e879f9';
      ctx.fillStyle = col;
      ctx.shadowColor = col; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(x,y,5.5,0,2*Math.PI); ctx.fill();
    }
    ctx.shadowBlur=0;
    // share timeline
    if (shareHist.length>1){
      const tx = W*0.78 - 320; // not used
    }
    drawTimeline();
    ctx.fillStyle='rgba(254,250,224,0.6)';
    ctx.font='600 12px Nunito';
    ctx.fillText('Voter copies random neighbor each step', cx - R, cy + R + 28);
  }

  function drawTimeline(){
    const w = 280, h = 130;
    const x = W*0.04, y = H - h - 30;
    if (x + w > W*0.78) return;
    ctx.fillStyle = 'rgba(20,28,40,0.7)';
    ctx.fillRect(x,y,w,h);
    ctx.strokeStyle = 'rgba(254,250,224,0.18)'; ctx.lineWidth=1;
    ctx.strokeRect(x,y,w,h);
    ctx.fillStyle = 'rgba(254,250,224,0.85)'; ctx.font='600 11px Nunito';
    ctx.fillText('Cyan share over time', x+8, y+14);
    if (shareHist.length<2) return;
    ctx.beginPath();
    for (let i=0;i<shareHist.length;i++){
      const px = x+8 + (i/(shareHist.length-1))*(w-16);
      const py = y+h-8 - shareHist[i]*(h-26);
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.shadowColor='rgba(6,182,212,0.7)'; ctx.shadowBlur=8;
    ctx.strokeStyle='#06b6d4'; ctx.lineWidth=2; ctx.stroke();
    ctx.shadowBlur=0;
    // 0.5 line
    const py = y+h-8 - 0.5*(h-26);
    ctx.strokeStyle='rgba(254,250,224,0.2)';
    ctx.beginPath(); ctx.moveTo(x+8,py); ctx.lineTo(x+w-8,py); ctx.stroke();
  }

  function loop(){
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('iBeta').addEventListener('input', e=>{
    beta_p=+e.target.value;
    document.getElementById('vBeta').textContent=beta_p.toFixed(2);
    init();
  });
  document.getElementById('iK').addEventListener('input', e=>{
    kdeg=+e.target.value;
    document.getElementById('vK').textContent=kdeg;
    init();
  });
  document.getElementById('iS').addEventListener('input', e=>{
    stepsPerFrame=+e.target.value;
    document.getElementById('vS').textContent=stepsPerFrame;
  });
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click', ()=>{
      beta_p = +b.dataset.p;
      document.getElementById('iBeta').value=beta_p;
      document.getElementById('vBeta').textContent=beta_p.toFixed(2);
      init();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent = running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
