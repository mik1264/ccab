<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Driven Damped Oscillator — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 97</span>
  <h2>Driven Damped Oscillator</h2>
  <p>ẍ + 2ζω₀ẋ + ω₀²x = F₀cos(ωt). Linear textbook resonance: amplitude peaks near ω = ω₀√(1−2ζ²) and the analytic curve A(ω) = F₀/√((ω₀²−ω²)² + (2ζω₀ω)²) is overlaid.</p>

  <div class="control"><label>ζ damping ratio <span id="vz">0.10</span></label><input id="iz" type="range" min="0.01" max="1" step="0.01" value="0.10" /></div>
  <div class="control"><label>ω₀ natural <span id="vo">1.00</span></label><input id="io" type="range" min="0.4" max="3" step="0.01" value="1.00" /></div>
  <div class="control"><label>F₀ drive amp <span id="vf">1.00</span></label><input id="if" type="range" min="0.1" max="3" step="0.05" value="1.00" /></div>
  <div class="control"><label>ω drive freq <span id="vw">1.00</span></label><input id="iw" type="range" min="0.1" max="4" step="0.01" value="1.00" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-p="0.05,1,1,1">Sharp Q</button>
    <button class="p" data-p="0.3,1,1,1">Moderate</button>
    <button class="p" data-p="0.7,1,1,0.7">Overdamp</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>x</span><span class="v" id="sx">—</span></div>
  <div class="stat"><span>ẋ</span><span class="v" id="sv">—</span></div>
  <div class="stat"><span>Q factor</span><span class="v" id="sq">—</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);}
  addEventListener('resize',resize); resize();

  let zeta=0.10, w0=1.00, F0=1.00, w=1.00;
  let x=0, v=0, t=0, running=true;
  const series=[]; const MAX=1500;

  function reset(){ x=0; v=0; t=0; series.length=0; }
  function deriv(x,v,t){ return [v, -2*zeta*w0*v - w0*w0*x + F0*Math.cos(w*t)]; }
  function rk4(dt){
    const [a1,b1]=deriv(x,v,t);
    const [a2,b2]=deriv(x+dt/2*a1, v+dt/2*b1, t+dt/2);
    const [a3,b3]=deriv(x+dt/2*a2, v+dt/2*b2, t+dt/2);
    const [a4,b4]=deriv(x+dt*a3, v+dt*b3, t+dt);
    x+=dt/6*(a1+2*a2+2*a3+a4); v+=dt/6*(b1+2*b2+2*b3+b4); t+=dt;
  }
  function tick(){
    const dt=0.02;
    for (let i=0;i<5;i++) rk4(dt);
    series.push({t,x,v});
    if (series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sx').textContent=x.toFixed(3);
    document.getElementById('sv').textContent=v.toFixed(3);
    document.getElementById('sq').textContent=(1/(2*zeta)).toFixed(2);
  }

  function amp(omega){
    const dn = Math.sqrt(Math.pow(w0*w0-omega*omega,2)+Math.pow(2*zeta*w0*omega,2));
    return F0/dn;
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    if (series.length<2) return;
    const padL=70, padR=360, padT=60, padB=60;
    const totW = W-padL-padR;
    const tsH = (H-padT-padB-60)*0.42;
    const ppSize = Math.min(totW*0.55, (H-padT-padB-60)*0.55);
    const ppX0 = padL, ppY0 = padT+tsH+60;
    const cdX = padL+ppSize+50, cdY = ppY0;
    const cdW = totW-ppSize-50, cdH = ppSize;

    // Time series
    let mx=0;
    for (const s of series) if (Math.abs(s.x)>mx) mx=Math.abs(s.x);
    if (mx<1) mx=1; mx*=1.1;
    const t0=series[0].t, t1=series[series.length-1].t, tspan=Math.max(t1-t0,1);
    ctx.strokeStyle='rgba(254,250,224,0.07)'; ctx.lineWidth=1;
    for (let i=0;i<=4;i++){const yp=padT+i*tsH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    ctx.strokeStyle='rgba(254,250,224,0.4)';
    ctx.beginPath(); ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+tsH); ctx.lineTo(padL+totW,padT+tsH); ctx.stroke();
    ctx.strokeStyle='rgba(254,250,224,0.15)';
    ctx.beginPath(); ctx.moveTo(padL,padT+tsH/2); ctx.lineTo(padL+totW,padT+tsH/2); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('x(t) — response (cyan) and drive F₀cos(ωt)/F₀ (orange)', padL, padT-12);

    // drive
    ctx.strokeStyle='#fb923c'; ctx.lineWidth=1.2; ctx.globalAlpha=0.6;
    ctx.beginPath();
    for (let i=0;i<series.length;i++){
      const s=series[i];
      const px=padL+(s.t-t0)/tspan*totW;
      const py=padT+tsH/2-Math.cos(w*s.t)/mx*tsH*0.4;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke(); ctx.globalAlpha=1;

    // response x(t) glowing
    ctx.shadowBlur=8; ctx.shadowColor='#06b6d4';
    ctx.strokeStyle='#06b6d4'; ctx.lineWidth=2;
    ctx.beginPath();
    for (let i=0;i<series.length;i++){
      const s=series[i];
      const px=padL+(s.t-t0)/tspan*totW;
      const py=padT+tsH/2-s.x/mx*tsH/2;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.shadowBlur=0;

    // Phase portrait
    let mxP=0,mvP=0;
    for (const s of series){if (Math.abs(s.x)>mxP) mxP=Math.abs(s.x); if (Math.abs(s.v)>mvP) mvP=Math.abs(s.v);}
    mxP=Math.max(mxP,0.5)*1.2; mvP=Math.max(mvP,0.5)*1.2;
    ctx.fillStyle='rgba(254,250,224,0.7)';
    ctx.fillText('Phase (x, ẋ) + vector field', ppX0, ppY0-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(ppX0,ppY0,ppSize,ppSize);
    const cx0=ppX0+ppSize/2, cy0=ppY0+ppSize/2;
    ctx.strokeStyle='rgba(254,250,224,0.2)';
    ctx.beginPath(); ctx.moveTo(ppX0,cy0); ctx.lineTo(ppX0+ppSize,cy0);
    ctx.moveTo(cx0,ppY0); ctx.lineTo(cx0,ppY0+ppSize); ctx.stroke();

    // vector field (autonomous part: drive=0)
    const grid=14, stepX=ppSize/grid;
    let maxSp=0; const fld=[];
    for (let gi=0; gi<=grid; gi++){
      for (let gj=0; gj<=grid; gj++){
        const xx=-mxP+2*mxP*gi/grid, vv=-mvP+2*mvP*gj/grid;
        const dxx=vv, dvv=-2*zeta*w0*vv-w0*w0*xx;
        const sp=Math.sqrt(dxx*dxx+dvv*dvv);
        if (sp>maxSp) maxSp=sp;
        fld.push({xx,vv,dxx,dvv,sp});
      }
    }
    function turbo(t){t=Math.max(0,Math.min(1,t));
      const r=Math.round(255*Math.min(1,Math.max(0, 0.13572 + 4.61539*t - 42.66032*t*t + 132.13108*t*t*t - 152.94239*t*t*t*t + 59.28637*t*t*t*t*t)));
      const g=Math.round(255*Math.min(1,Math.max(0, 0.09140 + 2.19418*t + 4.84296*t*t - 14.18503*t*t*t + 4.27729*t*t*t*t + 2.82956*t*t*t*t*t)));
      const bb=Math.round(255*Math.min(1,Math.max(0, 0.10667 + 12.64194*t - 60.58204*t*t + 110.36276*t*t*t - 89.90310*t*t*t*t + 27.34824*t*t*t*t*t)));
      return `rgb(${r},${g},${bb})`;
    }
    function ar(x1,y1,x2,y2){ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
      const a=Math.atan2(y2-y1,x2-x1), s=3;
      ctx.lineTo(x2-s*Math.cos(a-Math.PI/6), y2-s*Math.sin(a-Math.PI/6));
      ctx.moveTo(x2,y2); ctx.lineTo(x2-s*Math.cos(a+Math.PI/6), y2-s*Math.sin(a+Math.PI/6));
      ctx.stroke();
    }
    for (const f of fld){
      const px=ppX0+(f.xx+mxP)/(2*mxP)*ppSize;
      const py=ppY0+ppSize-(f.vv+mvP)/(2*mvP)*ppSize;
      const norm=f.sp/Math.max(maxSp,1e-6);
      ctx.strokeStyle=turbo(norm); ctx.lineWidth=1; ctx.globalAlpha=0.45+0.45*norm;
      const len=stepX*0.45, a=Math.atan2(-f.dvv,f.dxx);
      ar(px-len/2*Math.cos(a), py-len/2*Math.sin(a), px+len/2*Math.cos(a), py+len/2*Math.sin(a));
    }
    ctx.globalAlpha=1;

    const N=series.length;
    for (let i=1;i<N;i++){
      const s0=series[i-1], s1=series[i];
      const px0=ppX0+(s0.x+mxP)/(2*mxP)*ppSize, py0=ppY0+ppSize-(s0.v+mvP)/(2*mvP)*ppSize;
      const px1=ppX0+(s1.x+mxP)/(2*mxP)*ppSize, py1=ppY0+ppSize-(s1.v+mvP)/(2*mvP)*ppSize;
      const age=i/N;
      ctx.globalAlpha=age*age*0.95;
      ctx.shadowBlur=8+age*8; ctx.shadowColor='#06b6d4';
      ctx.strokeStyle='#06b6d4'; ctx.lineWidth=1.2+age*1.5;
      ctx.beginPath(); ctx.moveTo(px0,py0); ctx.lineTo(px1,py1); ctx.stroke();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;
    const last=series[series.length-1];
    const lpx=ppX0+(last.x+mxP)/(2*mxP)*ppSize, lpy=ppY0+ppSize-(last.v+mvP)/(2*mvP)*ppSize;
    ctx.fillStyle='#fff'; ctx.shadowBlur=14; ctx.shadowColor='#e879f9';
    ctx.beginPath(); ctx.arc(lpx,lpy,4.5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // Resonance curve
    ctx.fillStyle='rgba(254,250,224,0.7)';
    ctx.fillText('Resonance: amplitude vs ω', cdX, cdY-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(cdX,cdY,cdW,cdH);

    const wMin=0.05, wMax=Math.max(3*w0, 4);
    let aMax=0;
    const samp=200;
    const aArr=[];
    for (let i=0;i<=samp;i++){
      const ww=wMin+(wMax-wMin)*i/samp;
      const aa=amp(ww);
      aArr.push(aa);
      if (aa>aMax) aMax=aa;
    }
    aMax*=1.05;

    // grid
    ctx.strokeStyle='rgba(254,250,224,0.07)'; ctx.lineWidth=1;
    for (let i=1;i<4;i++){const yp=cdY+i*cdH/4; ctx.beginPath(); ctx.moveTo(cdX,yp); ctx.lineTo(cdX+cdW,yp); ctx.stroke();}

    // analytic curve
    ctx.shadowBlur=8; ctx.shadowColor='#e879f9';
    ctx.strokeStyle='#e879f9'; ctx.lineWidth=2;
    ctx.beginPath();
    for (let i=0;i<=samp;i++){
      const ww=wMin+(wMax-wMin)*i/samp;
      const px=cdX+(ww-wMin)/(wMax-wMin)*cdW;
      const py=cdY+cdH-aArr[i]/aMax*cdH;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.shadowBlur=0;

    // resonance peak marker
    const wpeak=w0*Math.sqrt(Math.max(0, 1-2*zeta*zeta));
    const pkX=cdX+(wpeak-wMin)/(wMax-wMin)*cdW;
    ctx.strokeStyle='rgba(254,250,224,0.4)'; ctx.lineWidth=1;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(pkX, cdY); ctx.lineTo(pkX, cdY+cdH); ctx.stroke();
    ctx.setLineDash([]);

    // current ω marker
    const curX=cdX+(w-wMin)/(wMax-wMin)*cdW;
    const curA=amp(w);
    ctx.fillStyle='#fb923c'; ctx.shadowBlur=10; ctx.shadowColor='#fb923c';
    ctx.beginPath(); ctx.arc(curX, cdY+cdH-curA/aMax*cdH, 6, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('ω=0', cdX, cdY+cdH+14);
    ctx.fillText('ω='+wMax.toFixed(1), cdX+cdW-30, cdY+cdH+14);
    ctx.fillText('|x|', cdX-22, cdY+10);
  }

  function loop(){ if (running) tick(); draw(); requestAnimationFrame(loop); }
  function bind(id,vid,prop,d=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{ const v=+e.target.value; document.getElementById(vid).textContent=v.toFixed(d);
      if (prop==='z') zeta=v; if (prop==='o') w0=v; if (prop==='f') F0=v; if (prop==='w') w=v;
    });
  }
  bind('iz','vz','z',2); bind('io','vo','o',2); bind('if','vf','f',2); bind('iw','vw','w',2);
  document.querySelectorAll('.p').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const [pz,po,pf,pw]=btn.dataset.p.split(',').map(Number);
      zeta=pz; w0=po; F0=pf; w=pw;
      document.getElementById('iz').value=pz; document.getElementById('vz').textContent=pz.toFixed(2);
      document.getElementById('io').value=po; document.getElementById('vo').textContent=po.toFixed(2);
      document.getElementById('if').value=pf; document.getElementById('vf').textContent=pf.toFixed(2);
      document.getElementById('iw').value=pw; document.getElementById('vw').textContent=pw.toFixed(2);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{ running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); loop();
})();
</script>
</body>
</html>
