<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Romer R&D Growth — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.5rem; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Romer R&D</h2>
  <p>Knowledge stock: dA/dt = δ·L_A^λ·A^φ. Output: Y=K^α(A·L_Y)^(1−α). Allocate workers between making goods (L_Y) and ideas (L_A). Endogenous tech growth depends on research share.</p>

  <div class="control"><label>research share s_R <span id="vsr">0.10</span></label><input type="range" id="isr" min="0" max="0.5" step="0.005" value="0.10" /></div>
  <div class="control"><label>δ research productivity <span id="vd">0.030</span></label><input type="range" id="id" min="0.005" max="0.10" step="0.001" value="0.03" /></div>
  <div class="control"><label>λ duplication <span id="vl">0.80</span></label><input type="range" id="il" min="0.3" max="1" step="0.01" value="0.8" /></div>
  <div class="control"><label>φ standing on shoulders <span id="vp">0.50</span></label><input type="range" id="ip" min="-0.5" max="1" step="0.01" value="0.5" /></div>
  <div class="control"><label>α capital share <span id="va">0.33</span></label><input type="range" id="ia" min="0.15" max="0.7" step="0.01" value="0.33" /></div>
  <div class="control"><label>s saving rate <span id="vs">0.20</span></label><input type="range" id="is" min="0.05" max="0.5" step="0.005" value="0.20" /></div>

  <div class="btnrow">
    <button class="p" data-p="0.05,0.030,0.8,0.5,0.33,0.20">Low R&D</button>
    <button class="p" data-p="0.20,0.030,0.8,0.5,0.33,0.20">High R&D</button>
    <button class="p" data-p="0.10,0.030,1.0,1.0,0.33,0.20">Linear (Romer)</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>A</span><span class="v" id="sA">—</span></div>
  <div class="stat"><span>Y</span><span class="v" id="sY">—</span></div>
  <div class="stat"><span>g_A (endog.)</span><span class="v" id="sgA">—</span></div>
  <div class="stat"><span>L_A / L</span><span class="v" id="sLR">—</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0; const dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize', resize); resize();

  const SAGE='#8A9A5B', EARTH='#DDA15E', MAG='#e879f9', CY='#06b6d4', PLASMA='#fb923c', GRID='rgba(254,250,224,0.08)', AXIS='rgba(254,250,224,0.45)';

  let sR=0.10, dRD=0.03, lambda=0.8, phi=0.5, alpha=0.33, sav=0.20;
  let K=1, A=1, L=1, t=0, running=true;
  const series=[]; const MAX=2000;
  const deltaCap=0.05;

  function reset(){ K=1; A=1; L=1; t=0; series.length=0; }
  function deriv(K,A,L){
    const LA = sR*L; const LY = (1-sR)*L;
    const Y = Math.pow(K,alpha)*Math.pow(A*LY, 1-alpha);
    const dK = sav*Y - deltaCap*K;
    const dA = dRD * Math.pow(LA,lambda) * Math.pow(A,phi);
    return [dK, dA, 0, Y, LA, LY];
  }
  function rk4(dt){
    const d1=deriv(K,A,L);
    const d2=deriv(K+dt/2*d1[0], A+dt/2*d1[1], L);
    const d3=deriv(K+dt/2*d2[0], A+dt/2*d2[1], L);
    const d4=deriv(K+dt*d3[0], A+dt*d3[1], L);
    K += dt/6*(d1[0]+2*d2[0]+2*d3[0]+d4[0]);
    A += dt/6*(d1[1]+2*d2[1]+2*d3[1]+d4[1]);
    t += dt;
  }
  function tick(){
    for(let i=0;i<2;i++) rk4(0.25);
    const d=deriv(K,A,L);
    const gA = d[1]/Math.max(A,1e-9);
    series.push({t,K,A,Y:d[3],gA,LA:d[4]});
    if (series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sA').textContent=A.toFixed(3);
    document.getElementById('sY').textContent=d[3].toFixed(2);
    document.getElementById('sgA').textContent=(gA*100).toFixed(2)+'%';
    document.getElementById('sLR').textContent=(sR*100).toFixed(1)+'%';
  }

  function drawAxes(x,y,w,h,title){
    ctx.strokeStyle=AXIS; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito'; ctx.fillText(title, x, y-8);
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    if(series.length<2) return;
    const padR=360;
    const totW=W-padR-80;
    const colW=totW/2-20;

    // Top-left: log A and Y
    const x0=60, y0=60, w0=colW, h0=H*0.42;
    drawAxes(x0,y0,w0,h0,'log scale: A and Y over time');
    let lo=Infinity, hi=-Infinity;
    for(const p of series){
      for(const v of [p.A,p.Y]){ const lg=Math.log(Math.max(v,1e-9)); if(lg<lo)lo=lg; if(lg>hi)hi=lg; }
    }
    const lr=Math.max(hi-lo,1e-3);
    const t0=series[0].t, t1=series[series.length-1].t, tspan=Math.max(t1-t0,1);
    ctx.strokeStyle=GRID;
    const decLo=Math.floor(lo/Math.log(10)), decHi=Math.ceil(hi/Math.log(10));
    for(let d=decLo; d<=decHi; d++){
      const ly=Math.log(Math.pow(10,d)); if(ly<lo||ly>hi) continue;
      const py=y0+h0-(ly-lo)/lr*h0;
      ctx.beginPath(); ctx.moveTo(x0,py); ctx.lineTo(x0+w0,py); ctx.stroke();
      ctx.fillStyle='rgba(254,250,224,0.45)'; ctx.font='10px Nunito';
      ctx.fillText('10^'+d, x0-32, py+3);
    }
    function plotLog(key,col){
      ctx.strokeStyle=col; ctx.lineWidth=2.2; ctx.beginPath();
      for(let i=0;i<series.length;i++){
        const p=series[i]; const v=p[key]; const lg=Math.log(Math.max(v,1e-9));
        const px=x0+(p.t-t0)/tspan*w0; const py=y0+h0-(lg-lo)/lr*h0;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      } ctx.stroke();
    }
    plotLog('A', MAG);
    plotLog('Y', EARTH);
    ctx.font='11px Nunito';
    ctx.fillStyle=MAG; ctx.fillText('— A (knowledge)', x0+w0-150, y0+18);
    ctx.fillStyle=EARTH; ctx.fillText('— Y (output)', x0+w0-150, y0+34);

    // Top-right: g_A endogenous
    const x1=x0+w0+40, y1=y0, w1=colW, h1=h0;
    drawAxes(x1,y1,w1,h1,'Endogenous knowledge growth g_A(t)');
    let gmax=0.001;
    for(const p of series){ if(p.gA>gmax)gmax=p.gA; }
    gmax=gmax*1.1;
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y1+i*h1/5; ctx.beginPath(); ctx.moveTo(x1,py); ctx.lineTo(x1+w1,py); ctx.stroke();
      ctx.fillStyle='rgba(254,250,224,0.5)'; ctx.font='10px Nunito';
      ctx.fillText(((1-i/5)*gmax*100).toFixed(2)+'%', x1-44, py+3);
    }
    ctx.strokeStyle=CY; ctx.lineWidth=2.5; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const p=series[i]; const px=x1+(p.t-t0)/tspan*w1; const py=y1+h1-p.gA/gmax*h1;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke();

    // Bottom: causal-loop diagram for R&D
    const x2=60, y2=y0+h0+70, w2=totW, h2=H-y2-50;
    drawAxes(x2,y2,w2,h2,'Causal-loop: research → ideas → output');
    const cx=x2+w2/2, cy=y2+h2/2;
    const r=Math.min(w2,h2)*0.34;
    const nodes=[
      {x:cx-r*1.1, y:cy, lbl:'L_A'},
      {x:cx-r*0.3, y:cy-r*0.6, lbl:'A'},
      {x:cx+r*0.6, y:cy-r*0.6, lbl:'Y'},
      {x:cx+r*1.1, y:cy, lbl:'K'},
      {x:cx+r*0.6, y:cy+r*0.6, lbl:'L_Y'},
      {x:cx-r*0.3, y:cy+r*0.6, lbl:'s_R'},
    ];
    function arrow(a,b,sign){
      const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy);
      const ux=dx/d, uy=dy/d;
      const xs=a.x+ux*30, ys=a.y+uy*30;
      const xe=b.x-ux*30, ye=b.y-uy*30;
      ctx.strokeStyle=sign>0?'rgba(138,154,91,0.85)':'rgba(232,121,249,0.85)';
      ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(xs,ys); ctx.lineTo(xe,ye); ctx.stroke();
      ctx.fillStyle=sign>0?'rgba(138,154,91,0.85)':'rgba(232,121,249,0.85)';
      const ang=Math.atan2(ye-ys,xe-xs);
      ctx.beginPath(); ctx.moveTo(xe,ye);
      ctx.lineTo(xe-9*Math.cos(ang-0.3), ye-9*Math.sin(ang-0.3));
      ctx.lineTo(xe-9*Math.cos(ang+0.3), ye-9*Math.sin(ang+0.3));
      ctx.closePath(); ctx.fill();
      ctx.fillStyle=sign>0?SAGE:MAG; ctx.font='bold 14px Lora';
      ctx.fillText(sign>0?'+':'−', (xs+xe)/2-4, (ys+ye)/2-6);
    }
    arrow(nodes[5], nodes[0], +1); // s_R → L_A
    arrow(nodes[5], nodes[4], -1); // s_R → L_Y (negative)
    arrow(nodes[0], nodes[1], +1); // L_A → A
    arrow(nodes[1], nodes[2], +1); // A → Y
    arrow(nodes[4], nodes[2], +1); // L_Y → Y
    arrow(nodes[2], nodes[3], +1); // Y → K (saving)
    arrow(nodes[3], nodes[2], +1); // K → Y
    arrow(nodes[1], nodes[1], +1); // self
    for(const nd of nodes){
      ctx.fillStyle='rgba(20,28,38,0.92)';
      ctx.strokeStyle=EARTH; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(nd.x,nd.y,28,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle=EARTH; ctx.font='bold 13px Lora';
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(nd.lbl, nd.x, nd.y);
      ctx.textAlign='start'; ctx.textBaseline='alphabetic';
    }
    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='italic 12px Lora';
    ctx.fillText('R: standing on shoulders   |   B: trade-off via s_R', x2+12, y2+h2-12);
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }
  function bind(id,vid,fn,d=2){ const el=document.getElementById(id);
    el.addEventListener('input', e=>{ const v=+e.target.value; document.getElementById(vid).textContent=v.toFixed(d); fn(v); });
  }
  bind('isr','vsr',v=>sR=v,2); bind('id','vd',v=>dRD=v,3); bind('il','vl',v=>lambda=v,2);
  bind('ip','vp',v=>phi=v,2); bind('ia','va',v=>alpha=v,2); bind('is','vs',v=>sav=v,2);

  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click', ()=>{
      const p=b.dataset.p.split(',').map(Number);
      sR=p[0]; dRD=p[1]; lambda=p[2]; phi=p[3]; alpha=p[4]; sav=p[5];
      ['isr','id','il','ip','ia','is'].forEach((id,i)=>{ document.getElementById(id).value=p[i]; });
      document.getElementById('vsr').textContent=p[0].toFixed(2);
      document.getElementById('vd').textContent=p[1].toFixed(3);
      document.getElementById('vl').textContent=p[2].toFixed(2);
      document.getElementById('vp').textContent=p[3].toFixed(2);
      document.getElementById('va').textContent=p[4].toFixed(2);
      document.getElementById('vs').textContent=p[5].toFixed(2);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{ running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); loop();
})();
</script>
</body>
</html>
