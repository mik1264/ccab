<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boids with Obstacles — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; cursor:crosshair; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100; width: min(310px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12); border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream); max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.7rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.preset { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ 64</span>
  <h2>Boids with Obstacles</h2>
  <p>Reynolds' boids (separation, alignment, cohesion) navigate around mountain-like obstacles. <b>Drag</b> obstacles to reposition, <b>click empty space</b> to add. Watch flow split and re-merge.</p>

  <div class="control"><label>Population <span id="vN">220</span></label><input type="range" id="iN" min="50" max="500" step="10" value="220" /></div>
  <div class="control"><label>Separation <span id="vSep">1.5</span></label><input type="range" id="iSep" min="0" max="3" step="0.05" value="1.5" /></div>
  <div class="control"><label>Alignment <span id="vAli">1.0</span></label><input type="range" id="iAli" min="0" max="3" step="0.05" value="1.0" /></div>
  <div class="control"><label>Cohesion <span id="vCoh">0.8</span></label><input type="range" id="iCoh" min="0" max="3" step="0.05" value="0.8" /></div>
  <div class="control"><label>Obstacle force <span id="vObs">2.5</span></label><input type="range" id="iObs" min="0.5" max="6" step="0.1" value="2.5" /></div>
  <div class="control"><label>Max speed <span id="vSp">2.5</span></label><input type="range" id="iSp" min="1" max="5" step="0.05" value="2.5" /></div>

  <div class="btnrow">
    <button id="bClear" class="secondary">Clear Obstacles</button>
    <button id="bDefault" class="preset">Defaults</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset Boids</button>
  </div>

  <div class="stat"><span>Boids</span><span class="v" id="sN">—</span></div>
  <div class="stat"><span>Obstacles</span><span class="v" id="sObs">—</span></div>
  <div class="stat"><span>Polarization</span><span class="v" id="sPol">—</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c');
  const ctx=cv.getContext('2d');
  let W=0,H=0;
  const dpr=Math.min(window.devicePixelRatio||1,2);

  let N=220, sepW=1.5, aliW=1.0, cohW=0.8, obsW=2.5, maxSp=2.5;
  let boids=[], obstacles=[];
  let running=true, dragging=null;

  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize',resize); resize();

  function defaultObstacles() {
    obstacles=[];
    const cx=W/2, cy=H/2;
    obstacles.push({x:cx-180, y:cy, r:55});
    obstacles.push({x:cx+150, y:cy-80, r:70});
    obstacles.push({x:cx+50, y:cy+120, r:45});
    obstacles.push({x:cx-60, y:cy-150, r:35});
  }

  function reset() {
    boids=[];
    for (let i=0;i<N;i++) {
      const a=Math.random()*Math.PI*2;
      boids.push({
        x:Math.random()*W, y:Math.random()*H,
        vx:Math.cos(a)*maxSp, vy:Math.sin(a)*maxSp,
        trail:[]
      });
    }
  }

  const PERC=45, SEP_R=18;

  function step() {
    for (let i=0;i<boids.length;i++) {
      const b=boids[i];
      let sx=0, sy=0, ax=0, ay=0, cx=0, cy=0;
      let nSep=0, nA=0, nC=0;
      for (let j=0;j<boids.length;j++) {
        if (i===j) continue;
        const o=boids[j];
        let dx=o.x-b.x, dy=o.y-b.y;
        if (dx>W/2) dx-=W; else if (dx<-W/2) dx+=W;
        if (dy>H/2) dy-=H; else if (dy<-H/2) dy+=H;
        const d2=dx*dx+dy*dy;
        if (d2<PERC*PERC) {
          if (d2<SEP_R*SEP_R && d2>0) {
            sx-=dx/d2*40; sy-=dy/d2*40; nSep++;
          }
          ax+=o.vx; ay+=o.vy; nA++;
          cx+=dx; cy+=dy; nC++;
        }
      }

      let fx=0, fy=0;
      if (nSep>0) { fx+=sx/nSep*sepW; fy+=sy/nSep*sepW; }
      if (nA>0) { fx+=(ax/nA-b.vx)*0.06*aliW; fy+=(ay/nA-b.vy)*0.06*aliW; }
      if (nC>0) { fx+=(cx/nC)*0.005*cohW; fy+=(cy/nC)*0.005*cohW; }

      // Obstacle repulsion
      for (let o of obstacles) {
        const dx=b.x-o.x, dy=b.y-o.y;
        const d=Math.hypot(dx,dy);
        const margin=o.r+30;
        if (d<margin && d>0.01) {
          const f = (margin-d)/margin * obsW;
          fx += dx/d * f * 2;
          fy += dy/d * f * 2;
        }
      }

      b.vx+=fx; b.vy+=fy;
      const sp=Math.hypot(b.vx,b.vy);
      if (sp>maxSp) { b.vx=b.vx/sp*maxSp; b.vy=b.vy/sp*maxSp; }
      else if (sp<maxSp*0.5) { b.vx=b.vx/sp*maxSp*0.6; b.vy=b.vy/sp*maxSp*0.6; }
    }
    for (let b of boids) {
      b.x+=b.vx; b.y+=b.vy;
      // Hard collide with obstacles
      for (let o of obstacles) {
        const dx=b.x-o.x, dy=b.y-o.y;
        const d=Math.hypot(dx,dy);
        if (d<o.r+3) { b.x=o.x+dx/d*(o.r+3); b.y=o.y+dy/d*(o.r+3); }
      }
      if (b.x<0) b.x+=W; if (b.x>=W) b.x-=W;
      if (b.y<0) b.y+=H; if (b.y>=H) b.y-=H;
      b.trail.push(b.x, b.y);
      if (b.trail.length>20) b.trail.splice(0,2);
    }
  }

  function render() {
    ctx.fillStyle='rgba(6,8,13,0.18)';
    ctx.fillRect(0,0,W,H);

    // Obstacles (mountains)
    for (let o of obstacles) {
      const grad = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      grad.addColorStop(0,'rgba(96,108,56,0.85)');
      grad.addColorStop(0.6,'rgba(61,68,35,0.7)');
      grad.addColorStop(1,'rgba(20,30,15,0.0)');
      ctx.fillStyle=grad;
      ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(221,161,94,0.5)';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.stroke();
    }

    // Trails: cyan-magenta gradient based on heading
    for (let b of boids) {
      const t=b.trail; if (t.length<4) continue;
      const head=Math.atan2(b.vy,b.vx);
      const hue=(head+Math.PI)/(Math.PI*2); // 0..1
      for (let i=0;i<t.length-2;i+=2) {
        const a=(i/t.length);
        const r = Math.round(6 + hue*226);
        const g = Math.round(182 - hue*60);
        const bl= Math.round(212 - hue*40);
        ctx.strokeStyle=`rgba(${r},${g},${bl},${a*0.55})`;
        ctx.lineWidth=1.3;
        ctx.beginPath();
        ctx.moveTo(t[i],t[i+1]); ctx.lineTo(t[i+2],t[i+3]);
        ctx.stroke();
      }
    }

    // Boids
    ctx.shadowBlur=10; ctx.shadowColor='rgba(6,182,212,0.7)';
    for (let b of boids) {
      const a=Math.atan2(b.vy,b.vx);
      const head=(a+Math.PI)/(Math.PI*2);
      const r = Math.round(160 + head*90);
      const g = Math.round(220 - head*40);
      const bl= 250;
      ctx.fillStyle=`rgb(${r},${g},${bl})`;
      ctx.beginPath();
      ctx.moveTo(b.x+Math.cos(a)*6, b.y+Math.sin(a)*6);
      ctx.lineTo(b.x+Math.cos(a+2.5)*4, b.y+Math.sin(a+2.5)*4);
      ctx.lineTo(b.x+Math.cos(a-2.5)*4, b.y+Math.sin(a-2.5)*4);
      ctx.closePath(); ctx.fill();
    }
    ctx.shadowBlur=0;

    let avx=0, avy=0;
    for (let b of boids) {
      const m=Math.hypot(b.vx,b.vy)||1;
      avx+=b.vx/m; avy+=b.vy/m;
    }
    const pol=Math.hypot(avx,avy)/Math.max(1,boids.length);
    document.getElementById('sN').textContent=boids.length;
    document.getElementById('sObs').textContent=obstacles.length;
    document.getElementById('sPol').textContent=pol.toFixed(3);
  }

  function loop() { if (running) step(); render(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,d=2) {
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=Number.isInteger(v)?v:v.toFixed(d);
      fn(v);
    });
  }
  bind('iN','vN',v=>{N=v; reset();});
  bind('iSep','vSep',v=>sepW=v);
  bind('iAli','vAli',v=>aliW=v);
  bind('iCoh','vCoh',v=>cohW=v);
  bind('iObs','vObs',v=>obsW=v);
  bind('iSp','vSp',v=>maxSp=v);

  document.getElementById('bClear').addEventListener('click',()=>obstacles=[]);
  document.getElementById('bDefault').addEventListener('click',defaultObstacles);
  document.getElementById('bRun').addEventListener('click',e=>{running=!running; e.target.textContent=running?'Pause':'Resume';});
  document.getElementById('bReset').addEventListener('click',reset);

  cv.addEventListener('pointerdown',e=>{
    const r=cv.getBoundingClientRect();
    const x=e.clientX-r.left, y=e.clientY-r.top;
    for (let o of obstacles) {
      if (Math.hypot(x-o.x,y-o.y)<o.r) { dragging=o; return; }
    }
    obstacles.push({x,y,r:30+Math.random()*40});
  });
  cv.addEventListener('pointermove',e=>{
    if (!dragging) return;
    const r=cv.getBoundingClientRect();
    dragging.x=e.clientX-r.left; dragging.y=e.clientY-r.top;
  });
  cv.addEventListener('pointerup',()=>dragging=null);
  cv.addEventListener('pointerleave',()=>dragging=null);

  defaultObstacles(); reset(); loop();
})();
</script>
</body>
</html>
