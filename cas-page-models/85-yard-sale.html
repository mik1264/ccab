<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yard Sale Wealth Concentration — CAS</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d;
    --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.2rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom: 0.7rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem;
    padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ NN</span>
  <h2>Yard Sale Model</h2>
  <p>Pairs both bet f·min(w_i, w_j) on a fair coin. Even with a fair coin, all the wealth eventually concentrates in one agent — a stark statistical inevitability of multiplicative trading.</p>

  <div class="control"><label>Fraction f bet <span id="vF">0.20</span></label><input type="range" id="iF" min="0.02" max="0.5" step="0.01" value="0.20" /></div>
  <div class="control"><label>Population N <span id="vN">200</span></label><input type="range" id="iN" min="50" max="500" step="25" value="200" /></div>
  <div class="control"><label>Trades / frame <span id="vS">200</span></label><input type="range" id="iS" min="20" max="1000" step="20" value="200" /></div>

  <div class="btnrow">
    <button class="p" data-p="0.05">Slow f=.05</button>
    <button class="p" data-p="0.20">Med f=.20</button>
    <button class="p" data-p="0.40">Fast f=.40</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Trades</span><span class="v" id="sT">0</span></div>
  <div class="stat"><span>Gini</span><span class="v" id="sG">—</span></div>
  <div class="stat"><span>Top 1%</span><span class="v" id="sTop">—</span></div>
  <div class="stat"><span>Wealthiest</span><span class="v" id="sW">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  let N = 200, f = 0.20, tradesPerFrame = 200;
  let wealth = new Float64Array(N);
  let trades = 0, running = true;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    wealth = new Float64Array(N);
    for (let i=0;i<N;i++) wealth[i] = 100;
    trades = 0;
  }

  function step() {
    for (let s=0; s<tradesPerFrame; s++) {
      const i = (Math.random()*N)|0;
      let j = (Math.random()*N)|0;
      while (j===i) j = (Math.random()*N)|0;
      const stake = f * Math.min(wealth[i], wealth[j]);
      if (Math.random()<0.5) { wealth[i] += stake; wealth[j] -= stake; }
      else { wealth[i] -= stake; wealth[j] += stake; }
    }
    trades += tradesPerFrame;
  }

  function gini(sorted) {
    let cum = 0, total = 0;
    for (let i=0;i<N;i++) { total += sorted[i]; cum += (i+1)*sorted[i]; }
    if (total<=0) return 0;
    return (2*cum)/(N*total) - (N+1)/N;
  }

  function viridis(t) {
    t = Math.max(0, Math.min(1, t));
    const r = Math.round(255 * (0.27 + 0.55*t - 0.15*t*t));
    const g = Math.round(255 * (0.0 + 1.05*t - 0.2*t*t));
    const b = Math.round(255 * (0.33 + 0.85*Math.sin((1-t)*Math.PI*0.85)));
    return `rgb(${Math.min(255,Math.max(0,r))},${Math.min(255,Math.max(0,g))},${Math.min(255,Math.max(0,b))})`;
  }

  function render() {
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);

    const sorted = Array.from(wealth).sort((a,b)=>a-b);
    const total = sorted.reduce((a,b)=>a+b, 0);

    // Layout: wealth-rank distribution (left) + Lorenz curve (right)
    const margin = 60;
    const colW = Math.min((W - 380 - margin*3)/2, 460);
    const colH = Math.min(H - 220, 480);
    const rankX = margin + 60;
    const rankY = (H - colH)/2 + 20;
    const lorX = rankX + colW + margin;
    const lorY = rankY;

    // ----- Wealth-rank (sorted descending, log y) -----
    ctx.fillStyle = 'rgba(254,250,224,0.85)';
    ctx.font = '600 15px Lora, serif';
    ctx.textAlign = 'left';
    ctx.fillText('Wealth by rank (log y)', rankX, rankY - 14);

    ctx.strokeStyle = 'rgba(254,250,224,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(rankX, rankY); ctx.lineTo(rankX, rankY+colH);
    ctx.lineTo(rankX+colW, rankY+colH); ctx.stroke();

    const desc = sorted.slice().reverse();
    let logMax = Math.log(Math.max(1, desc[0])+1);
    const bw = colW/N;
    for (let i=0;i<N;i++) {
      const lv = Math.log(desc[i]+1)/Math.max(0.001, logMax);
      const h = Math.max(0, lv)*colH;
      ctx.fillStyle = viridis(1 - i/N);
      ctx.shadowColor = viridis(1 - i/N);
      ctx.shadowBlur = 4;
      ctx.fillRect(rankX + i*bw, rankY + colH - h, Math.max(1, bw-0.5), h);
    }
    ctx.shadowBlur = 0;

    ctx.fillStyle = 'rgba(254,250,224,0.55)';
    ctx.font = '500 11px Nunito';
    ctx.textAlign = 'center';
    ctx.fillText('rank →', rankX + colW/2, rankY + colH + 22);

    // ----- Lorenz curve -----
    ctx.fillStyle = 'rgba(254,250,224,0.85)';
    ctx.font = '600 15px Lora, serif';
    ctx.textAlign = 'left';
    ctx.fillText('Lorenz curve', lorX, lorY - 14);

    ctx.strokeStyle = 'rgba(254,250,224,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(lorX, lorY); ctx.lineTo(lorX, lorY+colH);
    ctx.lineTo(lorX+colW, lorY+colH); ctx.stroke();

    // Equality line
    ctx.strokeStyle = 'rgba(232,121,249,0.5)';
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(lorX, lorY+colH); ctx.lineTo(lorX+colW, lorY); ctx.stroke();
    ctx.setLineDash([]);

    // Lorenz curve (cumulative wealth from poorest)
    let cum = 0;
    ctx.strokeStyle = '#06b6d4';
    ctx.shadowColor = '#06b6d4'; ctx.shadowBlur = 14;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(lorX, lorY+colH);
    for (let i=0;i<N;i++) {
      cum += sorted[i];
      const px = lorX + (i+1)*colW/N;
      const py = lorY + colH - (cum/total)*colH;
      ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Fill under
    ctx.fillStyle = 'rgba(6,182,212,0.10)';
    cum = 0;
    ctx.beginPath();
    ctx.moveTo(lorX, lorY+colH);
    for (let i=0;i<N;i++) {
      cum += sorted[i];
      const px = lorX + (i+1)*colW/N;
      const py = lorY + colH - (cum/total)*colH;
      ctx.lineTo(px, py);
    }
    ctx.lineTo(lorX+colW, lorY+colH);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(254,250,224,0.55)';
    ctx.font = '500 11px Nunito';
    ctx.textAlign = 'center';
    ctx.fillText('cumulative population →', lorX + colW/2, lorY + colH + 22);

    // Stats
    const g = gini(sorted);
    const top = desc.slice(0, Math.max(1, Math.round(N*0.01))).reduce((a,b)=>a+b,0)/total;
    document.getElementById('sT').textContent = trades;
    document.getElementById('sG').textContent = g.toFixed(3);
    document.getElementById('sTop').textContent = (top*100).toFixed(1)+'%';
    document.getElementById('sW').textContent = desc[0].toFixed(0);
  }

  function loop() {
    if (running) step();
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iF').addEventListener('input', e => {
    f = +e.target.value;
    document.getElementById('vF').textContent = f.toFixed(2);
  });
  document.getElementById('iN').addEventListener('input', e => {
    N = +e.target.value;
    document.getElementById('vN').textContent = N;
    reset();
  });
  document.getElementById('iS').addEventListener('input', e => {
    tradesPerFrame = +e.target.value;
    document.getElementById('vS').textContent = tradesPerFrame;
  });
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      f = +b.dataset.p;
      document.getElementById('iF').value = f;
      document.getElementById('vF').textContent = f.toFixed(2);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
