<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reiter Snowflake CA — CAS</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d;
    --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.2rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.7rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem;
    padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ NN</span>
  <h2>Reiter Snowflake CA</h2>
  <p>Hexagonal cellular automaton. Frozen cells (and their neighbors, the boundary) hold water as ice. Diffusion redistributes vapor; cells freeze when total ≥ 1. Six-fold symmetric dendrites grow.</p>

  <div class="control"><label>Vapor α (diffusion) <span id="vA">1.00</span></label><input type="range" id="iA" min="0.50" max="2.0" step="0.01" value="1.00" /></div>
  <div class="control"><label>Background β <span id="vB">0.40</span></label><input type="range" id="iB" min="0.30" max="0.90" step="0.005" value="0.40" /></div>
  <div class="control"><label>Addition γ <span id="vG">0.0001</span></label><input type="range" id="iG" min="0.0" max="0.005" step="0.00005" value="0.0001" /></div>
  <div class="control"><label>Steps/frame <span id="vS">2</span></label><input type="range" id="iS" min="1" max="6" step="1" value="2" /></div>

  <div class="btnrow">
    <button class="p" data-a="1" data-b="0.40" data-g="0.0001">Dendrite</button>
    <button class="p" data-a="1.4" data-b="0.45" data-g="0.0">Star</button>
    <button class="p" data-a="0.7" data-b="0.55" data-g="0.001">Plate</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Frozen cells</span><span class="v" id="sFr">—</span></div>
  <div class="stat"><span>Total mass</span><span class="v" id="sM">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  const N = 200;
  // Two arrays for state
  let s = new Float32Array(N*N); // total water (vapor + ice)
  let frozen = new Uint8Array(N*N);
  let sNew = new Float32Array(N*N);
  let frame = 0, running = true;
  let alpha = 1.0, beta = 0.40, gamma = 0.0001, stepsPerFrame = 2;

  // Hex offsets — using offset-coordinates (axial). For "even-r" offset:
  // For row r (parity bit p = r%2), neighbors are:
  //   (r, c-1), (r, c+1)
  //   (r-1, c), (r-1, c+(p===0 ? -1 : 1))
  //   (r+1, c), (r+1, c+(p===0 ? -1 : 1))
  function neighborIdx(r, c, k) {
    // k=0..5 — return [r,c]
    const p = r & 1;
    const off = p===0 ? -1 : 1;
    switch (k) {
      case 0: return [r, c-1];
      case 1: return [r, c+1];
      case 2: return [r-1, c];
      case 3: return [r-1, c+off];
      case 4: return [r+1, c];
      case 5: return [r+1, c+off];
    }
    return [r, c];
  }

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    s = new Float32Array(N*N);
    frozen = new Uint8Array(N*N);
    sNew = new Float32Array(N*N);
    for (let i=0;i<N*N;i++) s[i] = beta;
    const cr = N>>1, cc = N>>1;
    s[cr*N+cc] = 1.0;
    frozen[cr*N+cc] = 1;
    frame = 0;
  }

  function step() {
    // Identify boundary (unfrozen but with frozen neighbor)
    // In Reiter's model, each cell holds u (diffusable, in non-receptive cells) and v (non-diffusable, in receptive cells)
    // s[i] = total water in cell. receptive = frozen or has frozen neighbor.
    // Step: u = (1 - receptive)*s; v = receptive*s
    // Diffusion only on u: u_new = u + α/12 * (Σ u_neighbors - 6 u) (alpha factor)
    // Then s_new = u_new + v + γ*receptive
    const u = new Float32Array(N*N);
    const v = new Float32Array(N*N);
    const recv = new Uint8Array(N*N);

    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      const i = r*N+c;
      let isRec = frozen[i] ? 1 : 0;
      if (!isRec) {
        for (let k=0;k<6;k++) {
          const [rr, cc2] = neighborIdx(r, c, k);
          if (rr<0 || rr>=N || cc2<0 || cc2>=N) continue;
          if (frozen[rr*N+cc2]) { isRec = 1; break; }
        }
      }
      recv[i] = isRec;
      if (isRec) { u[i] = 0; v[i] = s[i] + (frozen[i] ? 0 : gamma); }
      else { u[i] = s[i]; v[i] = 0; }
    }

    // Diffusion on u (Reiter uses (u + (Σneighbors - 6u)*α/12) — equivalent to weighted avg)
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      const i = r*N+c;
      if (recv[i] && frozen[i]) {
        sNew[i] = v[i];
        continue;
      }
      // Sum neighbors of u
      let sum = 0; let count = 0;
      for (let k=0;k<6;k++) {
        const [rr, cc2] = neighborIdx(r, c, k);
        if (rr<0 || rr>=N || cc2<0 || cc2>=N) {
          sum += u[i]; // boundary mirrors
        } else {
          sum += u[rr*N+cc2];
        }
        count++;
      }
      const lap = sum - 6*u[i];
      const uNew = u[i] + (alpha/12)*lap;
      sNew[i] = uNew + v[i];
    }

    // Freeze where receptive cell's s >= 1
    for (let i=0;i<N*N;i++) {
      if (!frozen[i] && recv[i] && sNew[i] >= 1.0) frozen[i] = 1;
      s[i] = sNew[i];
    }
    frame++;
  }

  function render() {
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);

    // Hex grid rendering: each row r is offset by (r%2)*hex_dx/2
    const size = Math.min(W, H) * 0.92;
    const hex_w = size / N;          // approximate cell width
    const hex_h = hex_w * 0.866;     // sqrt(3)/2
    const ox = (W - hex_w*N)/2 + hex_w/2;
    const oy = (H - hex_h*N)/2 + hex_h/2;

    let frozenCount = 0, totalMass = 0;

    // Draw frozen cells with glow
    ctx.shadowColor = 'rgba(6,182,212,0.7)';
    ctx.shadowBlur = 6;
    for (let r=0;r<N;r++) {
      for (let c=0;c<N;c++) {
        const i = r*N+c;
        if (!frozen[i]) {
          totalMass += s[i];
          continue;
        }
        frozenCount++;
        totalMass += s[i];
        const x = ox + c*hex_w + ((r&1)?hex_w/2:0);
        const y = oy + r*hex_h;
        // mass-based brightness
        const t = Math.min(1, s[i]);
        const r_ = Math.round(180 + 75*t);
        const g_ = Math.round(220 + 35*t);
        const b_ = 255;
        ctx.fillStyle = `rgb(${r_},${g_},${b_})`;
        ctx.beginPath();
        ctx.arc(x, y, hex_w*0.55, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.shadowBlur = 0;

    // Faint vapor visualization
    for (let r=0;r<N;r++) {
      for (let c=0;c<N;c++) {
        const i = r*N+c;
        if (frozen[i]) continue;
        if (s[i] < 0.45) continue;
        const x = ox + c*hex_w + ((r&1)?hex_w/2:0);
        const y = oy + r*hex_h;
        const a = Math.min(0.18, (s[i]-0.45)*0.8);
        ctx.fillStyle = `rgba(6,182,212,${a})`;
        ctx.fillRect(x - hex_w*0.4, y - hex_w*0.35, hex_w*0.8, hex_w*0.7);
      }
    }

    // Crisp center glow
    ctx.shadowColor = '#06b6d4';
    ctx.shadowBlur = 24;
    ctx.strokeStyle = 'rgba(6,182,212,0.0)';
    ctx.beginPath();
    ctx.arc(W/2, H/2, size*0.48, 0, Math.PI*2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    document.getElementById('sStep').textContent = frame;
    document.getElementById('sFr').textContent = frozenCount;
    document.getElementById('sM').textContent = totalMass.toFixed(0);
  }

  function loop() {
    if (running) for (let s=0;s<stepsPerFrame;s++) step();
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iA').addEventListener('input', e => {
    alpha = +e.target.value; document.getElementById('vA').textContent = alpha.toFixed(2);
  });
  document.getElementById('iB').addEventListener('input', e => {
    beta = +e.target.value; document.getElementById('vB').textContent = beta.toFixed(3);
  });
  document.getElementById('iG').addEventListener('input', e => {
    gamma = +e.target.value; document.getElementById('vG').textContent = gamma.toFixed(5);
  });
  document.getElementById('iS').addEventListener('input', e => {
    stepsPerFrame = +e.target.value; document.getElementById('vS').textContent = stepsPerFrame;
  });
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      alpha = +b.dataset.a; beta = +b.dataset.b; gamma = +b.dataset.g;
      document.getElementById('iA').value = alpha; document.getElementById('vA').textContent = alpha.toFixed(2);
      document.getElementById('iB').value = beta; document.getElementById('vB').textContent = beta.toFixed(3);
      document.getElementById('iG').value = gamma; document.getElementById('vG').textContent = gamma.toFixed(5);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
