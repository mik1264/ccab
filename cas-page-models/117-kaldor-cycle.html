<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kaldor Business Cycle — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.5rem; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Kaldor Cycle</h2>
  <p>dY/dt = α·(I(Y,K) − S(Y)) and dK/dt = I(Y,K) − δK. Investment is S-shaped in Y and falls in K. Nonlinearity creates an endogenous limit cycle: boom → over-investment → bust → recovery.</p>

  <div class="control"><label>α adjust speed <span id="va">1.5</span></label><input type="range" id="ia" min="0.5" max="4" step="0.05" value="1.5" /></div>
  <div class="control"><label>s saving rate <span id="vs">0.20</span></label><input type="range" id="is" min="0.05" max="0.5" step="0.005" value="0.20" /></div>
  <div class="control"><label>δ depreciation <span id="vd">0.05</span></label><input type="range" id="id" min="0.01" max="0.15" step="0.005" value="0.05" /></div>
  <div class="control"><label>γ inv. sensitivity <span id="vg">2.0</span></label><input type="range" id="ig" min="0.5" max="5" step="0.05" value="2.0" /></div>
  <div class="control"><label>k_eff K-drag <span id="vk">0.30</span></label><input type="range" id="ik" min="0.05" max="0.8" step="0.01" value="0.30" /></div>

  <div class="btnrow">
    <button class="p" data-p="1.5,0.20,0.05,2.0,0.30">Limit cycle</button>
    <button class="p" data-p="0.7,0.20,0.05,1.0,0.30">Damped</button>
    <button class="p" data-p="3.0,0.20,0.05,3.0,0.30">Sharp swings</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>Y output</span><span class="v" id="sY">—</span></div>
  <div class="stat"><span>K capital</span><span class="v" id="sK">—</span></div>
  <div class="stat"><span>I(Y,K)</span><span class="v" id="sI">—</span></div>
  <div class="stat"><span>S(Y)</span><span class="v" id="sS">—</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0; const dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize', resize); resize();

  const SAGE='#8A9A5B', EARTH='#DDA15E', MAG='#e879f9', CY='#06b6d4', PLASMA='#fb923c', GRID='rgba(254,250,224,0.08)', AXIS='rgba(254,250,224,0.45)';

  let alpha=1.5, sav=0.20, delta=0.05, gamma=2.0, kEff=0.30;
  let Y=1.0, K=2.0, t=0, running=true;
  const series=[]; const MAX=4000;

  function S(Y){ return sav*Y; }
  // S-shaped investment falling in K
  function I(Y,K){
    // base sigmoid in Y around Y=1
    const sig = 1/(1 + Math.exp(-gamma*(Y-1)));
    // capital drag
    return sig - kEff*(K - 1.5);
  }
  function reset(){ Y=1.0; K=2.0; t=0; series.length=0; }
  function deriv(Y,K){ return [alpha*(I(Y,K) - S(Y)), I(Y,K) - delta*K]; }
  function rk4(dt){
    const k1=deriv(Y,K);
    const k2=deriv(Y+dt/2*k1[0], K+dt/2*k1[1]);
    const k3=deriv(Y+dt/2*k2[0], K+dt/2*k2[1]);
    const k4=deriv(Y+dt*k3[0], K+dt*k3[1]);
    Y += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    K += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    if (Y<0.01) Y=0.01; if (K<0.01) K=0.01;
    t += dt;
  }
  function tick(){
    for(let i=0;i<2;i++) rk4(0.20);
    series.push({t,Y,K,I:I(Y,K),S:S(Y)});
    if(series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sY').textContent=Y.toFixed(3);
    document.getElementById('sK').textContent=K.toFixed(3);
    document.getElementById('sI').textContent=I(Y,K).toFixed(3);
    document.getElementById('sS').textContent=S(Y).toFixed(3);
  }

  function drawAxes(x,y,w,h,title){
    ctx.strokeStyle=AXIS; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito'; ctx.fillText(title, x, y-8);
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    if(series.length<2) return;
    const padR=360;
    const totW=W-padR-80;

    // Top: time series
    const x0=60, y0=60, w0=totW, h0=H*0.42;
    drawAxes(x0,y0,w0,h0,'Y(t) and K(t) — endogenous boom-bust');
    let ymax=1, kmax=1;
    for(const p of series){ if(p.Y>ymax)ymax=p.Y; if(p.K>kmax)kmax=p.K; }
    ymax*=1.1; kmax*=1.1;
    const t0=series[0].t, t1=series[series.length-1].t, tspan=Math.max(t1-t0,1);
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y0+i*h0/5; ctx.beginPath(); ctx.moveTo(x0,py); ctx.lineTo(x0+w0,py); ctx.stroke(); }
    // Y
    ctx.strokeStyle=EARTH; ctx.lineWidth=2.5; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const p=series[i]; const px=x0+(p.t-t0)/tspan*w0; const py=y0+h0-p.Y/ymax*h0;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke();
    // K (scaled to its own max)
    ctx.strokeStyle=CY; ctx.lineWidth=2.5; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const p=series[i]; const px=x0+(p.t-t0)/tspan*w0; const py=y0+h0-p.K/kmax*h0;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke();
    ctx.font='11px Nunito';
    ctx.fillStyle=EARTH; ctx.fillText('— Y output', x0+12, y0+18);
    ctx.fillStyle=CY; ctx.fillText('— K capital', x0+110, y0+18);

    // Bottom-left: phase portrait
    const x1=60, y1=y0+h0+70, w1=totW/2-20, h1=H-y1-50;
    drawAxes(x1,y1,w1,h1,'Phase portrait (Y, K)');
    let pYmin=Infinity,pYmax=-Infinity,pKmin=Infinity,pKmax=-Infinity;
    for(const p of series){ if(p.Y<pYmin)pYmin=p.Y; if(p.Y>pYmax)pYmax=p.Y; if(p.K<pKmin)pKmin=p.K; if(p.K>pKmax)pKmax=p.K; }
    const ypad=(pYmax-pYmin)*0.1+0.05; const kpad=(pKmax-pKmin)*0.1+0.05;
    pYmin-=ypad; pYmax+=ypad; pKmin-=kpad; pKmax+=kpad;
    pYmin=Math.max(0,pYmin); pKmin=Math.max(0,pKmin);
    const yr=pYmax-pYmin, kr=pKmax-pKmin;
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y1+i*h1/5; ctx.beginPath(); ctx.moveTo(x1,py); ctx.lineTo(x1+w1,py); ctx.stroke(); }
    for(let i=1;i<5;i++){ const px=x1+i*w1/5; ctx.beginPath(); ctx.moveTo(px,y1); ctx.lineTo(px,y1+h1); ctx.stroke(); }
    // dY/dt = 0 nullcline (sample)
    ctx.strokeStyle='rgba(232,121,249,0.5)'; ctx.setLineDash([4,4]); ctx.lineWidth=1.5;
    ctx.beginPath();
    let first=true;
    for(let i=0;i<=80;i++){
      const yy=pYmin+i/80*yr;
      // I(Y,K) = S(Y) → solve K from I-S=0 → K=1.5+(sigmoid(yy-1)-sav*yy)/kEff
      const sig=1/(1+Math.exp(-gamma*(yy-1)));
      const Kn=1.5+(sig-sav*yy)/kEff;
      if (Kn<pKmin||Kn>pKmax) continue;
      const px=x1+(yy-pYmin)/yr*w1; const py=y1+h1-(Kn-pKmin)/kr*h1;
      if(first){ ctx.moveTo(px,py); first=false; } else ctx.lineTo(px,py);
    } ctx.stroke();
    // dK/dt=0 nullcline: I(Y,K)=δK
    ctx.strokeStyle='rgba(6,182,212,0.5)';
    ctx.beginPath(); first=true;
    for(let i=0;i<=80;i++){
      const yy=pYmin+i/80*yr;
      // δK = sigmoid(yy-1) - kEff(K-1.5) → K(δ+kEff) = sigmoid + 1.5*kEff → K = ...
      const sig=1/(1+Math.exp(-gamma*(yy-1)));
      const Kn=(sig + 1.5*kEff)/(delta+kEff);
      if (Kn<pKmin||Kn>pKmax) continue;
      const px=x1+(yy-pYmin)/yr*w1; const py=y1+h1-(Kn-pKmin)/kr*h1;
      if(first){ ctx.moveTo(px,py); first=false; } else ctx.lineTo(px,py);
    } ctx.stroke();
    ctx.setLineDash([]);

    // orbit (gradient)
    ctx.lineWidth=1.6;
    for(let i=1;i<series.length;i++){
      const p1=series[i-1], p2=series[i];
      const px1=x1+(p1.Y-pYmin)/yr*w1; const py1=y1+h1-(p1.K-pKmin)/kr*h1;
      const px2=x1+(p2.Y-pYmin)/yr*w1; const py2=y1+h1-(p2.K-pKmin)/kr*h1;
      const tt=i/series.length;
      ctx.strokeStyle=`rgba(${251-100*tt},${146-50*tt},${60+150*tt},${0.4+0.6*tt})`;
      ctx.beginPath(); ctx.moveTo(px1,py1); ctx.lineTo(px2,py2); ctx.stroke();
    }
    const last=series[series.length-1];
    const cx=x1+(last.Y-pYmin)/yr*w1; const cy=y1+h1-(last.K-pKmin)/kr*h1;
    ctx.fillStyle=MAG; ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(254,250,224,0.55)'; ctx.font='11px Nunito';
    ctx.fillText('Y →', x1+w1-30, y1+h1+16);
    ctx.fillStyle=MAG; ctx.fillText('— dY/dt=0', x1+12, y1+18);
    ctx.fillStyle=CY; ctx.fillText('— dK/dt=0', x1+90, y1+18);

    // Bottom-right: I, S vs Y
    const x2=x1+w1+40, y2=y1, w2=totW/2-20, h2=h1;
    drawAxes(x2,y2,w2,h2,'I(Y,K) vs S(Y)');
    const yMaxC=Math.max(pYmax,2);
    let smax=0;
    for(let i=0;i<=80;i++){
      const yy=i/80*yMaxC; const sig=1/(1+Math.exp(-gamma*(yy-1)));
      const ip=sig-kEff*(K-1.5); if(ip>smax)smax=ip;
      if(sav*yy>smax) smax=sav*yy;
    }
    smax=Math.max(smax,1)*1.1;
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y2+i*h2/5; ctx.beginPath(); ctx.moveTo(x2,py); ctx.lineTo(x2+w2,py); ctx.stroke(); }
    // S
    ctx.strokeStyle=SAGE; ctx.lineWidth=2.5; ctx.beginPath();
    for(let i=0;i<=80;i++){
      const yy=i/80*yMaxC; const sv=sav*yy;
      const px=x2+yy/yMaxC*w2; const py=y2+h2-Math.max(0,sv)/smax*h2;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke();
    // I (using current K)
    ctx.strokeStyle=PLASMA; ctx.lineWidth=2.5; ctx.beginPath();
    for(let i=0;i<=80;i++){
      const yy=i/80*yMaxC; const sig=1/(1+Math.exp(-gamma*(yy-1)));
      const ip=sig-kEff*(K-1.5);
      const px=x2+yy/yMaxC*w2; const py=y2+h2-Math.max(0,ip)/smax*h2;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke();
    // current Y dot
    const cyx=x2+Y/yMaxC*w2;
    ctx.fillStyle=EARTH; ctx.beginPath(); ctx.arc(cyx, y2+h2-Math.max(0,sav*Y)/smax*h2,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=PLASMA; ctx.beginPath(); ctx.arc(cyx, y2+h2-Math.max(0,I(Y,K))/smax*h2,5,0,Math.PI*2); ctx.fill();
    ctx.font='11px Nunito';
    ctx.fillStyle=SAGE; ctx.fillText('— S(Y) saving', x2+12, y2+18);
    ctx.fillStyle=PLASMA; ctx.fillText('— I(Y,K) invest (S-shape)', x2+120, y2+18);
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }
  function bind(id,vid,fn,d=2){ const el=document.getElementById(id);
    el.addEventListener('input', e=>{ const v=+e.target.value; document.getElementById(vid).textContent=v.toFixed(d); fn(v); });
  }
  bind('ia','va',v=>alpha=v,2); bind('is','vs',v=>sav=v,3); bind('id','vd',v=>delta=v,3);
  bind('ig','vg',v=>gamma=v,2); bind('ik','vk',v=>kEff=v,2);

  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click', ()=>{
      const p=b.dataset.p.split(',').map(Number);
      alpha=p[0]; sav=p[1]; delta=p[2]; gamma=p[3]; kEff=p[4];
      ['ia','is','id','ig','ik'].forEach((id,i)=>{ document.getElementById(id).value=p[i]; });
      document.getElementById('va').textContent=p[0].toFixed(2);
      document.getElementById('vs').textContent=p[1].toFixed(3);
      document.getElementById('vd').textContent=p[2].toFixed(3);
      document.getElementById('vg').textContent=p[3].toFixed(2);
      document.getElementById('vk').textContent=p[4].toFixed(2);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{ running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); loop();
})();
</script>
</body>
</html>
