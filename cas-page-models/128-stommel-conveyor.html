<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stommel Two-Box Conveyor — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12); border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; background: linear-gradient(90deg, var(--earth), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600; background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream); border:none; border-radius:9px; cursor:pointer; transition:all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Stommel Conveyor</h2>
  <p>Two boxes (low+high latitude) with T, S differences. Density Δρ = αS·ΔS − αT·ΔT drives flow q. dT/dt, dS/dt include atmospheric forcing (T_a, F) and advection |q|·Δ. Bistability: thermal vs salinity-dominated states.</p>

  <div class="control"><label>Therm forcing T_a <span id="vTa">2.0</span></label><input type="range" id="iTa" min="0" max="5" step="0.01" value="2.0" /></div>
  <div class="control"><label>Freshwater F <span id="vF">1.10</span></label><input type="range" id="iF" min="0" max="3" step="0.01" value="1.10" /></div>
  <div class="control"><label>Time scale c <span id="vc">0.16</span></label><input type="range" id="ic" min="0.05" max="0.5" step="0.005" value="0.16" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="2.0,0.5">Strong on</button>
    <button class="p" data-p="2.0,1.10">Bistable</button>
    <button class="p" data-p="2.0,2.0">Collapsed</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-sweep="1">Sweep F ↑</button>
    <button class="p" data-sweep="-1">Sweep F ↓</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>ΔT</span><span class="v" id="sT">—</span></div>
  <div class="stat"><span>ΔS</span><span class="v" id="sS">—</span></div>
  <div class="stat"><span>q (flow)</span><span class="v" id="sq">—</span></div>
  <div class="stat"><span>State</span><span class="v" id="sR">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    cv.setTransform && ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  // Stommel-style nondim: dT/dt = c(Ta - T) - |q|T;  dS/dt = F - |q|S; q = T - S
  let Ta=2.0, F=1.10, c=0.16;
  let T=0.5, S=0.4, t=0, running=true;
  const series=[]; const MAX=1500;
  const hyst=[];
  let sweep=0;

  function deriv(T,S){
    const q = T - S;
    const aq = Math.abs(q);
    return [c*(Ta - T) - aq*T, F - aq*S];
  }
  function reset(T0,S0){ T=T0||0.5; S=S0||0.4; t=0; series.length=0; hyst.length=0; sweep=0; }

  function rk4(dt){
    const k1=deriv(T,S);
    const k2=deriv(T+dt/2*k1[0], S+dt/2*k1[1]);
    const k3=deriv(T+dt/2*k2[0], S+dt/2*k2[1]);
    const k4=deriv(T+dt*k3[0],   S+dt*k3[1]);
    T += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    S += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    t += dt;
  }

  function tick(){
    const dt=0.08;
    for (let i=0;i<3;i++) rk4(dt);
    if (sweep!==0){
      F += sweep*0.0008;
      if (F<0) F=0; if (F>3) F=3;
      document.getElementById('iF').value=F;
      document.getElementById('vF').textContent=F.toFixed(3);
      hyst.push({F, q: T-S});
      if (hyst.length>3000) hyst.shift();
    }
    const q = T-S;
    series.push({t, T, S, q});
    if (series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sT').textContent=T.toFixed(3);
    document.getElementById('sS').textContent=S.toFixed(3);
    document.getElementById('sq').textContent=q.toFixed(3);
    document.getElementById('sR').textContent = q>0.05?'thermal-on':q<-0.05?'salt-rev':'collapse';
  }

  function findEquil(F_use){
    // Equilibria: c(Ta-T)=|q|T, F=|q|S, q=T-S
    // Two branches: q>0 (thermal) and q<0 (haline)
    // Grid search over q
    const eqs=[];
    for (let qs of [+1, -1]) {
      for (let q0=0.02; q0<5; q0+=0.005){
        const q = qs*q0;
        const aq=Math.abs(q);
        // T from c(Ta-T)=aq T → T = c·Ta/(c+aq)
        const T = c*Ta/(c+aq);
        // S from F = aq S → S = F/aq
        if (aq<1e-6) continue;
        const S = F_use/aq;
        // consistency q=T-S
        const err = q - (T-S);
        // If sign change → root
        if (q0===0.02) { eqs.push({q0, qs, T, S, err}); continue; }
        const last = eqs[eqs.length-1];
        if (last && last.qs===qs && last.err*err<0){
          // bisect
          let lo=last.q0, hi=q0;
          for (let it=0;it<40;it++){
            const m=(lo+hi)/2;
            const am=qs*m;
            const Tm=c*Ta/(c+Math.abs(am));
            const Sm=F_use/Math.abs(am);
            const eM = am - (Tm-Sm);
            const al=qs*lo;
            const Tl=c*Ta/(c+Math.abs(al));
            const Sl=F_use/Math.abs(al);
            const eL = al - (Tl-Sl);
            if (eL*eM<0) hi=m; else lo=m;
          }
          const qfix=qs*((lo+hi)/2);
          eqs.push({q:qfix});
        }
        eqs.push({q0,qs,T,S,err});
      }
    }
    return eqs.filter(e=>e.q!==undefined).map(e=>({q:e.q}));
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=360, padT=50, padB=40;
    const totW=W-padL-padR;
    const halfH = (H-padT-padB-50)/2;

    // Top: time series of T, S, q
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Box differences: ΔT (orange), ΔS (cyan), q (magenta)', padL, padT-12);
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++){const yp=padT+i*halfH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    if (series.length>1){
      const t0=series[0].t, t1=series[series.length-1].t, ts=Math.max(t1-t0,1);
      const Vmax=4, Vmin=-1;
      const yZero = padT+halfH-(0-Vmin)/(Vmax-Vmin)*halfH;
      ctx.strokeStyle='rgba(254,250,224,0.4)';
      ctx.beginPath(); ctx.moveTo(padL,yZero); ctx.lineTo(padL+totW,yZero); ctx.stroke();
      function plot(key,color){
        ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath();
        for (let i=0;i<series.length;i++){
          const s=series[i];
          const v=Math.max(Vmin,Math.min(Vmax,s[key]));
          const px=padL+(s.t-t0)/ts*totW;
          const py=padT+halfH-(v-Vmin)/(Vmax-Vmin)*halfH;
          if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.stroke();
      }
      plot('T','#fb923c'); plot('S','#06b6d4'); plot('q','#e879f9');
    }

    // Bottom: bifurcation q* vs F
    const bY = padT+halfH+50;
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Bifurcation: equilibrium flow q* vs freshwater F', padL, bY-12);
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++){const yp=bY+i*halfH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    const Fmin=0, Fmax=3, qmin=-2, qmax=2;
    const yZero = bY+halfH-(0-qmin)/(qmax-qmin)*halfH;
    ctx.strokeStyle='rgba(254,250,224,0.3)';
    ctx.beginPath(); ctx.moveTo(padL,yZero); ctx.lineTo(padL+totW,yZero); ctx.stroke();

    for (let s=Fmin; s<=Fmax; s+=0.01){
      const eqs=findEquil(s);
      for (const e of eqs){
        if (e.q<qmin||e.q>qmax) continue;
        const px=padL+(s-Fmin)/(Fmax-Fmin)*totW;
        const py=bY+halfH-(e.q-qmin)/(qmax-qmin)*halfH;
        // crude stability: q>0 large = stable, mid = unstable, q<0 stable
        ctx.fillStyle = '#06b6d4';
        ctx.fillRect(px-1,py-1,2,2);
      }
    }

    if (hyst.length>1){
      ctx.strokeStyle='rgba(251,146,60,0.7)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      for (let i=0;i<hyst.length;i++){
        const h=hyst[i];
        const px=padL+(h.F-Fmin)/(Fmax-Fmin)*totW;
        const py=bY+halfH-(Math.max(qmin,Math.min(qmax,h.q))-qmin)/(qmax-qmin)*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    const qNow = T-S;
    const px = padL+(F-Fmin)/(Fmax-Fmin)*totW;
    const py = bY+halfH-(Math.max(qmin,Math.min(qmax,qNow))-qmin)/(qmax-qmin)*halfH;
    ctx.fillStyle='#fb923c';
    ctx.beginPath(); ctx.arc(px,py,7,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(254,250,224,0.6)'; ctx.lineWidth=1.5; ctx.stroke();

    ctx.fillStyle='rgba(254,250,224,0.4)'; ctx.font='10px Nunito';
    ctx.fillText('q=0 collapse', padL+totW-90, yZero-3);
    ctx.fillText('F=0', padL, bY+halfH+18);
    ctx.fillText('F=3', padL+totW-20, bY+halfH+18);
  }

  function loop(){ if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,prop,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      if (prop==='Ta') Ta=v; if (prop==='F') F=v; if (prop==='c') c=v;
    });
  }
  bind('iTa','vTa','Ta'); bind('iF','vF','F',2); bind('ic','vc','c',3);
  document.querySelectorAll('.p[data-p]').forEach(b=>{
    b.addEventListener('click',()=>{
      const [pa,pf]=b.dataset.p.split(',').map(Number);
      Ta=pa; F=pf;
      document.getElementById('iTa').value=Ta; document.getElementById('vTa').textContent=Ta.toFixed(2);
      document.getElementById('iF').value=F; document.getElementById('vF').textContent=F.toFixed(2);
      reset(0.5, 0.4);
    });
  });
  document.querySelectorAll('.p[data-sweep]').forEach(b=>{
    b.addEventListener('click',()=>{ sweep=+b.dataset.sweep; });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', ()=>reset(0.5,0.4));
  reset(0.5, 0.4); loop();
})();
</script>
</body>
</html>
