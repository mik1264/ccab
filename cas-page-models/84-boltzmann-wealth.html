<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boltzmann Wealth Exchange — CAS</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d;
    --accent:#06b6d4;
    --magenta:#e879f9;
    --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.2rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.7rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ NN</span>
  <h2>Boltzmann Wealth</h2>
  <p>Random pairs pool their wealth and split it uniformly at random. Without saving propensity, the equilibrium is exponential P(w)∝e^(−w/⟨w⟩). Watch the histogram converge.</p>

  <div class="control"><label>Population N <span id="vN">500</span></label><input type="range" id="iN" min="100" max="2000" step="50" value="500" /></div>
  <div class="control"><label>Encounters / frame <span id="vS">400</span></label><input type="range" id="iS" min="50" max="2000" step="50" value="400" /></div>
  <div class="control"><label>Saving λ <span id="vL">0.00</span></label><input type="range" id="iL" min="0" max="0.9" step="0.01" value="0.00" /></div>

  <div class="btnrow">
    <button class="p" data-p="0">No saving</button>
    <button class="p" data-p="0.3">λ=0.3</button>
    <button class="p" data-p="0.7">λ=0.7</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Round</span><span class="v" id="sR">0</span></div>
  <div class="stat"><span>Mean wealth</span><span class="v" id="sMu">—</span></div>
  <div class="stat"><span>Gini</span><span class="v" id="sG">—</span></div>
  <div class="stat"><span>Max wealth</span><span class="v" id="sMx">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  let N = 500, lambda = 0.0, encPerFrame = 400;
  let wealth = new Float64Array(N);
  let round = 0, running = true;
  let giniHistory = [];
  const BINS = 60;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    wealth = new Float64Array(N);
    for (let i=0;i<N;i++) wealth[i] = 100;
    round = 0;
    giniHistory = [];
  }

  function step() {
    for (let s=0; s<encPerFrame; s++) {
      const i = (Math.random()*N)|0;
      let j = (Math.random()*N)|0;
      while (j===i) j = (Math.random()*N)|0;
      const total = wealth[i] + wealth[j];
      const r = Math.random();
      // CC model with saving propensity λ
      const wi = lambda*wealth[i] + r*(1-lambda)*total;
      const wj = lambda*wealth[j] + (1-r)*(1-lambda)*total;
      wealth[i] = wi; wealth[j] = wj;
    }
    round += encPerFrame;
  }

  function gini() {
    const sorted = Array.from(wealth).sort((a,b)=>a-b);
    let cum = 0, total = 0;
    for (let i=0;i<N;i++) { total += sorted[i]; cum += (i+1)*sorted[i]; }
    if (total<=0) return 0;
    return (2*cum)/(N*total) - (N+1)/N;
  }

  // Plasma colormap
  function plasma(t) {
    t = Math.max(0, Math.min(1, t));
    const r = Math.round(255 * Math.min(1, 0.05 + 1.5*t - 0.4*t*t));
    const g = Math.round(255 * Math.max(0, t*t*1.1 - 0.05));
    const b = Math.round(255 * Math.max(0, 0.55*(1-t) + 0.4*Math.sin(t*Math.PI)));
    return `rgb(${r},${g},${b})`;
  }

  function render() {
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);

    // Histogram of wealth (log-y)
    let maxW = 0; for (let i=0;i<N;i++) if (wealth[i]>maxW) maxW = wealth[i];
    const binMax = Math.max(maxW, 1);
    const counts = new Int32Array(BINS);
    for (let i=0;i<N;i++) {
      let b = Math.floor(wealth[i]/binMax*BINS);
      if (b>=BINS) b = BINS-1;
      if (b<0) b=0;
      counts[b]++;
    }
    let cmax = 0; for (let b=0;b<BINS;b++) if (counts[b]>cmax) cmax=counts[b];
    const logCmax = Math.log(cmax+1);

    // Layout: histogram fills central area
    const margin = 80;
    const histW = Math.min(W - 380, 900);
    const histH = Math.min(H - 240, 520);
    const ox = (W - histW)/2 - 100;
    const oy = (H - histH)/2 + 30;

    // Title
    ctx.fillStyle = 'rgba(254,250,224,0.85)';
    ctx.font = '600 16px Lora, serif';
    ctx.textAlign = 'left';
    ctx.fillText('Wealth Distribution (log scale)', ox, oy - 18);

    // Axes
    ctx.strokeStyle = 'rgba(254,250,224,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(ox, oy); ctx.lineTo(ox, oy+histH);
    ctx.lineTo(ox+histW, oy+histH); ctx.stroke();

    // Theoretical exponential overlay (mean = 100)
    ctx.strokeStyle = 'rgba(232,121,249,0.75)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    let muT = 0; for (let i=0;i<N;i++) muT += wealth[i]; muT/=N;
    for (let b=0;b<BINS;b++) {
      const w = (b+0.5)*binMax/BINS;
      const p = Math.exp(-w/muT)/muT;
      // Expected count: p * binWidth * N
      const expC = p*(binMax/BINS)*N;
      const lv = Math.log(expC+1)/logCmax;
      const x = ox + (b+0.5)*histW/BINS;
      const y = oy + histH - lv*histH;
      if (b===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();

    // Bars
    const bw = histW/BINS - 1;
    for (let b=0;b<BINS;b++) {
      if (counts[b]<=0) continue;
      const lv = Math.log(counts[b]+1)/logCmax;
      const h = lv*histH;
      ctx.fillStyle = plasma(b/(BINS-1));
      ctx.shadowColor = plasma(b/(BINS-1));
      ctx.shadowBlur = 12;
      ctx.fillRect(ox + b*histW/BINS + 0.5, oy + histH - h, bw, h);
    }
    ctx.shadowBlur = 0;

    // x-axis labels
    ctx.fillStyle = 'rgba(254,250,224,0.6)';
    ctx.font = '500 11px Nunito';
    ctx.textAlign = 'center';
    for (let k=0; k<=4; k++) {
      const x = ox + k*histW/4;
      const v = (k*binMax/4).toFixed(0);
      ctx.fillText(v, x, oy + histH + 14);
    }
    ctx.fillText('wealth →', ox+histW/2, oy + histH + 32);

    // Gini history mini-chart
    const gw = 240, gh = 120;
    const gx = ox + histW - gw - 10, gy = oy + 10;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(gx, gy, gw, gh);
    ctx.strokeStyle = 'rgba(6,182,212,0.3)';
    ctx.strokeRect(gx, gy, gw, gh);
    ctx.fillStyle = 'rgba(254,250,224,0.7)';
    ctx.font = '600 10px Nunito';
    ctx.textAlign = 'left';
    ctx.fillText('Gini coefficient', gx+8, gy+14);
    if (giniHistory.length>1) {
      ctx.strokeStyle = '#06b6d4';
      ctx.shadowColor = '#06b6d4'; ctx.shadowBlur = 8;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i=0;i<giniHistory.length;i++) {
        const x = gx + i*gw/Math.max(1, giniHistory.length-1);
        const y = gy + gh - giniHistory[i]*gh*0.95 - 4;
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Stats
    const g = gini();
    let mu = 0, mx = 0;
    for (let i=0;i<N;i++) { mu += wealth[i]; if (wealth[i]>mx) mx=wealth[i]; }
    mu /= N;
    document.getElementById('sR').textContent = round;
    document.getElementById('sMu').textContent = mu.toFixed(2);
    document.getElementById('sG').textContent = g.toFixed(3);
    document.getElementById('sMx').textContent = mx.toFixed(0);
  }

  function loop() {
    if (running) {
      step();
      if (round % (encPerFrame*1) === 0) {
        giniHistory.push(gini());
        if (giniHistory.length>240) giniHistory.shift();
      }
    }
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iN').addEventListener('input', e => {
    N = +e.target.value;
    document.getElementById('vN').textContent = N;
    reset();
  });
  document.getElementById('iS').addEventListener('input', e => {
    encPerFrame = +e.target.value;
    document.getElementById('vS').textContent = encPerFrame;
  });
  document.getElementById('iL').addEventListener('input', e => {
    lambda = +e.target.value;
    document.getElementById('vL').textContent = lambda.toFixed(2);
  });
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      lambda = +b.dataset.p;
      document.getElementById('iL').value = lambda;
      document.getElementById('vL').textContent = lambda.toFixed(2);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
