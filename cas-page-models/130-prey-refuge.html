<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Predator-Prey with Refuge — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12); border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; background: linear-gradient(90deg, var(--earth), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600; background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream); border:none; border-radius:9px; cursor:pointer; transition:all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Prey Refuge</h2>
  <p>Lotka-Volterra with refuge: only fraction (1−rf) of prey is exposed to predation. Compare two systems side-by-side. Refuge stabilizes coexistence — wild swings shrink to a tighter spiral toward equilibrium.</p>

  <div class="control"><label>α prey growth <span id="va">1.0</span></label><input type="range" id="ia" min="0.2" max="2" step="0.01" value="1.0" /></div>
  <div class="control"><label>β predation <span id="vb">0.40</span></label><input type="range" id="ib" min="0.05" max="1" step="0.01" value="0.40" /></div>
  <div class="control"><label>δ pred gain <span id="vd">0.10</span></label><input type="range" id="id" min="0.02" max="0.5" step="0.01" value="0.10" /></div>
  <div class="control"><label>γ pred death <span id="vg">0.40</span></label><input type="range" id="ig" min="0.05" max="1" step="0.01" value="0.40" /></div>
  <div class="control"><label>refuge fraction rf <span id="vrf">0.30</span></label><input type="range" id="irf" min="0" max="0.6" step="0.005" value="0.30" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-rf="0">No refuge</button>
    <button class="p" data-rf="0.20">Some</button>
    <button class="p" data-rf="0.45">Strong</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>Prey (no/ref)</span><span class="v" id="sX">—</span></div>
  <div class="stat"><span>Pred (no/ref)</span><span class="v" id="sY">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  let alpha=1.0, beta=0.40, delta=0.10, gamma=0.40, rf=0.30;
  // Two systems: A=no refuge (rf=0), B=with refuge
  let xA=10, yA=5, xB=10, yB=5, t=0, running=true;
  const sA=[]; const sB=[]; const MAX=2000;

  function deriv(x,y, refFrac){
    const xp = x*(1-refFrac); // exposed
    return [alpha*x - beta*xp*y, delta*xp*y - gamma*y];
  }
  function reset(){ xA=10; yA=5; xB=10; yB=5; t=0; sA.length=0; sB.length=0; }
  function rk4(state, refFrac, dt){
    let [x,y] = state;
    const k1=deriv(x,y,refFrac);
    const k2=deriv(x+dt/2*k1[0], y+dt/2*k1[1], refFrac);
    const k3=deriv(x+dt/2*k2[0], y+dt/2*k2[1], refFrac);
    const k4=deriv(x+dt*k3[0],   y+dt*k3[1],   refFrac);
    x += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    y += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    if (x<0) x=0; if (y<0) y=0;
    return [x,y];
  }
  function tick(){
    const dt=0.04;
    for (let i=0;i<3;i++){
      [xA,yA] = rk4([xA,yA], 0, dt);
      [xB,yB] = rk4([xB,yB], rf, dt);
      t += dt;
    }
    sA.push({t,x:xA,y:yA}); sB.push({t,x:xB,y:yB});
    if (sA.length>MAX) sA.shift();
    if (sB.length>MAX) sB.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sX').textContent=`${xA.toFixed(2)} / ${xB.toFixed(2)}`;
    document.getElementById('sY').textContent=`${yA.toFixed(2)} / ${yB.toFixed(2)}`;
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=360, padT=50, padB=40;
    const totW=W-padL-padR;
    const halfH = (H-padT-padB-50)/2;

    // === Top: time series of both ===
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Time series  —  solid: no refuge,  dashed: with refuge (rf='+rf.toFixed(2)+')', padL, padT-12);
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++){const yp=padT+i*halfH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    if (sA.length>1){
      const t0=sA[0].t, t1=sA[sA.length-1].t, ts=Math.max(t1-t0,1);
      let mx=0;
      for (const s of sA) { mx=Math.max(mx, s.x, s.y); }
      for (const s of sB) { mx=Math.max(mx, s.x, s.y); }
      mx=Math.max(mx,5);
      function plot(arr, xColor, yColor, dashed){
        if (dashed) ctx.setLineDash([5,4]); else ctx.setLineDash([]);
        ctx.strokeStyle=xColor; ctx.lineWidth=2;
        ctx.beginPath();
        for (let i=0;i<arr.length;i++){
          const s=arr[i];
          const px=padL+(s.t-t0)/ts*totW;
          const py=padT+halfH-s.x/mx*halfH;
          if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.stroke();
        ctx.strokeStyle=yColor;
        ctx.beginPath();
        for (let i=0;i<arr.length;i++){
          const s=arr[i];
          const px=padL+(s.t-t0)/ts*totW;
          const py=padT+halfH-s.y/mx*halfH;
          if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.stroke();
      }
      plot(sA, '#8A9A5B', '#BC6C25', false);
      plot(sB, '#06b6d4', '#e879f9', true);
      ctx.setLineDash([]);
    }
    // legend
    ctx.font='11px Nunito';
    ctx.fillStyle='#8A9A5B'; ctx.fillText('— prey (no ref)', padL, padT+halfH+18);
    ctx.fillStyle='#BC6C25'; ctx.fillText('— pred (no ref)', padL+120, padT+halfH+18);
    ctx.fillStyle='#06b6d4'; ctx.fillText('-- prey (refuge)', padL+240, padT+halfH+18);
    ctx.fillStyle='#e879f9'; ctx.fillText('-- pred (refuge)', padL+360, padT+halfH+18);

    // === Bottom: two phase portraits side by side ===
    const bY = padT + halfH + 50;
    const ppW = totW/2 - 20;
    const ppH = halfH;

    function phaseDraw(arr, xc, label, baseColor){
      ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
      ctx.fillText(label, xc, bY-8);
      ctx.strokeStyle='rgba(254,250,224,0.15)'; ctx.lineWidth=1;
      ctx.strokeRect(xc, bY, ppW, ppH);
      if (arr.length<2) return;
      let mxx=0,myy=0;
      for (const s of arr){ if (s.x>mxx) mxx=s.x; if (s.y>myy) myy=s.y; }
      mxx=Math.max(mxx,1); myy=Math.max(myy,1);
      ctx.strokeStyle=baseColor; ctx.lineWidth=1.4;
      ctx.beginPath();
      for (let i=0;i<arr.length;i++){
        const s=arr[i];
        const px=xc + s.x/mxx*ppW;
        const py=bY + ppH - s.y/myy*ppH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
      // current point
      const last=arr[arr.length-1];
      const px=xc + last.x/mxx*ppW;
      const py=bY + ppH - last.y/myy*ppH;
      ctx.fillStyle='#fb923c';
      ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fill();
      // axis labels
      ctx.fillStyle='rgba(254,250,224,0.45)'; ctx.font='10px Nunito';
      ctx.fillText('prey', xc+ppW-30, bY+ppH+14);
      ctx.save(); ctx.translate(xc-10, bY+ppH/2+15); ctx.rotate(-Math.PI/2);
      ctx.fillText('predator', 0,0); ctx.restore();
    }
    phaseDraw(sA, padL+10, 'Phase: no refuge (closed orbits)', 'rgba(188,108,37,0.85)');
    phaseDraw(sB, padL+ppW+30, 'Phase: with refuge (spiral → coexistence)', 'rgba(232,121,249,0.85)');
  }

  function loop(){ if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,prop,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      if (prop==='a') alpha=v; if (prop==='b') beta=v; if (prop==='d') delta=v; if (prop==='g') gamma=v; if (prop==='rf') rf=v;
    });
  }
  bind('ia','va','a'); bind('ib','vb','b'); bind('id','vd','d'); bind('ig','vg','g'); bind('irf','vrf','rf',2);
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click',()=>{
      rf=+b.dataset.rf;
      document.getElementById('irf').value=rf;
      document.getElementById('vrf').textContent=rf.toFixed(2);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); loop();
})();
</script>
</body>
</html>
