<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brian's Brain — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .tag-abm {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.6rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag-abm">ABM ✦ 50</span>
  <h2>Brian's Brain</h2>
  <p>Three-state cellular automaton: ON cells become DYING; DYING cells become OFF; OFF cells become ON if exactly 2 of 8 neighbors are ON. Generates traveling pulses.</p>

  <div class="control"><label>Init density <span id="vD">0.16</span></label><input type="range" id="iD" min="0.05" max="0.45" step="0.01" value="0.16" /></div>
  <div class="control"><label>Steps/frame <span id="vS">1</span></label><input type="range" id="iS" min="1" max="6" step="1" value="1" /></div>

  <div class="btnrow">
    <button class="p" data-d="0.10">Sparse</button>
    <button class="p" data-d="0.16">Default</button>
    <button class="p" data-d="0.30">Dense</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Generation</span><span class="v" id="sGen">0</span></div>
  <div class="stat"><span>ON</span><span class="v" id="sOn">—</span></div>
  <div class="stat"><span>Dying</span><span class="v" id="sDy">—</span></div>
  <div class="stat"><span>Activity %</span><span class="v" id="sAct">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0;
  const dpr = Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener('resize', resize); resize();

  const N = 200;
  // 0=off, 1=on, 2=dying
  let grid, next, gen=0, running=true;
  let density = 0.16, stepsPerFrame = 1;
  const off = document.createElement('canvas');
  off.width = N; off.height = N;
  const offCtx = off.getContext('2d');
  const img = offCtx.createImageData(N, N);

  function init(){
    grid = new Uint8Array(N*N);
    next = new Uint8Array(N*N);
    for (let i=0;i<N*N;i++){
      const r = Math.random();
      if (r<density) grid[i] = 1;
      else if (r<density+density*0.4) grid[i] = 2;
      else grid[i] = 0;
    }
    gen = 0;
  }

  function step(){
    for (let r=0;r<N;r++){
      const rm = (r-1+N)%N, rp = (r+1)%N;
      for (let c=0;c<N;c++){
        const cm = (c-1+N)%N, cp = (c+1)%N;
        const me = grid[r*N+c];
        if (me===1) next[r*N+c] = 2;
        else if (me===2) next[r*N+c] = 0;
        else {
          let on = 0;
          if (grid[rm*N+cm]===1) on++;
          if (grid[rm*N+c]===1) on++;
          if (grid[rm*N+cp]===1) on++;
          if (grid[r*N+cm]===1) on++;
          if (grid[r*N+cp]===1) on++;
          if (grid[rp*N+cm]===1) on++;
          if (grid[rp*N+c]===1) on++;
          if (grid[rp*N+cp]===1) on++;
          next[r*N+c] = (on===2) ? 1 : 0;
        }
      }
    }
    [grid, next] = [next, grid];
    gen++;
  }

  function paint(){
    const data = img.data;
    let on=0, dy=0;
    for (let i=0;i<N*N;i++){
      const v = grid[i];
      const j = i*4;
      if (v===1){
        // electric cyan ON
        data[j]=160; data[j+1]=240; data[j+2]=255; data[j+3]=255;
        on++;
      } else if (v===2){
        // soft magenta DYING
        data[j]=160; data[j+1]=60; data[j+2]=180; data[j+3]=255;
        dy++;
      } else {
        data[j]=8; data[j+1]=10; data[j+2]=18; data[j+3]=255;
      }
    }
    offCtx.putImageData(img, 0, 0);
    return [on, dy];
  }

  function draw(){
    ctx.fillStyle='#06080d';
    ctx.fillRect(0,0,W,H);
    const sz = Math.min(W*0.78, H*0.94);
    const ox = (W*0.46 - sz/2);
    const oy = (H - sz)/2;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, ox, oy, sz, sz);
    // glow overlay - draw a translucent layer on top of ON cells via shadowBlur tricks: redraw bright cells
    // Actually draw glow layer: smooth scaled image with glow
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.imageSmoothingEnabled = true;
    ctx.shadowColor = 'rgba(6,182,212,0.6)';
    ctx.shadowBlur = 10;
    ctx.globalAlpha = 0.4;
    ctx.drawImage(off, ox, oy, sz, sz);
    ctx.restore();
    // border
    ctx.strokeStyle = 'rgba(6,182,212,0.55)';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(6,182,212,0.7)';
    ctx.shadowBlur = 14;
    ctx.strokeRect(ox-1, oy-1, sz+2, sz+2);
    ctx.shadowBlur = 0;
  }

  function loop(){
    if (running) for (let s=0;s<stepsPerFrame;s++) step();
    const [on, dy] = paint();
    draw();
    document.getElementById('sGen').textContent = gen;
    document.getElementById('sOn').textContent = on;
    document.getElementById('sDy').textContent = dy;
    document.getElementById('sAct').textContent = (((on+dy)/(N*N))*100).toFixed(1)+'%';
    requestAnimationFrame(loop);
  }

  document.getElementById('iD').addEventListener('input', e=>{
    density = +e.target.value;
    document.getElementById('vD').textContent = density.toFixed(2);
  });
  document.getElementById('iS').addEventListener('input', e=>{
    stepsPerFrame = +e.target.value;
    document.getElementById('vS').textContent = stepsPerFrame;
  });
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click', ()=>{
      density = +b.dataset.d;
      document.getElementById('iD').value = density;
      document.getElementById('vD').textContent = density.toFixed(2);
      init();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', init);

  // click to spawn ON cells
  cv.addEventListener('pointerdown', e=>{
    const sz = Math.min(W*0.78, H*0.94);
    const ox = (W*0.46 - sz/2);
    const oy = (H - sz)/2;
    const rect = cv.getBoundingClientRect();
    const x = e.clientX - rect.left - ox;
    const y = e.clientY - rect.top - oy;
    const cx = Math.round(x/sz*N), cy = Math.round(y/sz*N);
    for (let dr=-3; dr<=3; dr++) for (let dc=-3; dc<=3; dc++){
      const rr = (cy+dr+N)%N, cc = (cx+dc+N)%N;
      if (Math.random()<0.6) grid[rr*N+cc] = 1;
    }
  });

  init(); loop();
})();
</script>
</body>
</html>
