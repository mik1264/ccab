<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Naming Game (Language Emergence) — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ NN</span>
  <h2>Naming Game</h2>
  <p>Each agent stores a list of words for one object. Random pair: speaker says a random word from its list. If hearer knows it, both delete other words. Else hearer adds it. Eventually a global consensus word emerges.</p>

  <div class="control"><label>Agents N <span id="vN">100</span></label><input type="range" id="iN" min="30" max="240" step="10" value="100" /></div>
  <div class="control"><label>Speed (interactions/frame) <span id="vS">30</span></label><input type="range" id="iS" min="1" max="200" step="1" value="30" /></div>
  <div class="control"><label>Network k <span id="vK">4</span></label><input type="range" id="iK" min="2" max="10" step="1" value="4" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-mode="ring">Ring</button>
    <button class="p" data-mode="random">Random</button>
    <button class="p" data-mode="full">Mean field</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Total words</span><span class="v" id="sW">—</span></div>
  <div class="stat"><span>Distinct words</span><span class="v" id="sD">—</span></div>
  <div class="stat"><span>Top-word share</span><span class="v" id="sShare">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  let N = 100, k = 4, speed = 30, mode = 'random';
  let pos = [];
  let adj = [];
  let words = []; // each agent: array of strings
  let step = 0, running = true;
  let history = []; // {totalWords, distinct, topShare}
  let wordIdCounter = 0;
  // color per word ID
  let wordColors = {};

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function colorForWord(w) {
    if (!wordColors[w]) {
      // Use HSL with golden angle for variety
      const id = Object.keys(wordColors).length;
      const hue = (id * 137.508) % 360;
      wordColors[w] = `hsl(${hue}, 75%, 60%)`;
    }
    return wordColors[w];
  }

  function buildNetwork() {
    pos = [];
    const cx = W/2, cy = H/2;
    const R = Math.min(W,H)*0.40;
    for (let i=0; i<N; i++) {
      const a = (i/N)*Math.PI*2 - Math.PI/2;
      pos.push({ x: cx + Math.cos(a)*R, y: cy + Math.sin(a)*R });
    }
    adj = Array.from({length:N}, () => []);
    if (mode === 'ring') {
      for (let i=0; i<N; i++) for (let j=1; j<=Math.floor(k/2); j++) {
        adj[i].push((i+j)%N);
        adj[(i+j)%N].push(i);
      }
    } else if (mode === 'random') {
      // random k-regular-ish
      for (let i=0; i<N; i++) {
        while (adj[i].length < k) {
          const t = (Math.random()*N)|0;
          if (t !== i && !adj[i].includes(t) && adj[t].length < k+2) {
            adj[i].push(t); adj[t].push(i);
          }
          if (Math.random() < 0.01) break; // safety
        }
      }
    } else {
      // mean field: complete graph (we sample neighbor uniformly)
      for (let i=0; i<N; i++) for (let j=0; j<N; j++) if (i!==j) adj[i].push(j);
    }
  }

  function reset() {
    N = +document.getElementById('iN').value;
    k = +document.getElementById('iK').value;
    speed = +document.getElementById('iS').value;
    document.getElementById('vN').textContent = N;
    document.getElementById('vK').textContent = k;
    document.getElementById('vS').textContent = speed;
    buildNetwork();
    words = [];
    wordColors = {};
    wordIdCounter = 0;
    for (let i=0; i<N; i++) {
      // each agent invents its own initial word
      const w = 'w' + (wordIdCounter++);
      colorForWord(w);
      words.push([w]);
    }
    step = 0;
    history = [];
  }

  function tick() {
    // Pick random speaker
    const sp = (Math.random()*N)|0;
    if (adj[sp].length === 0) return;
    const hr = adj[sp][(Math.random()*adj[sp].length)|0];
    if (words[sp].length === 0) {
      const w = 'w' + (wordIdCounter++);
      colorForWord(w); words[sp].push(w);
    }
    const word = words[sp][(Math.random()*words[sp].length)|0];
    if (words[hr].includes(word)) {
      // success: collapse both
      words[sp] = [word];
      words[hr] = [word];
    } else {
      // failure: hearer learns
      words[hr].push(word);
    }
    step++;
  }

  function stats() {
    let total = 0;
    const counts = {};
    for (let i=0; i<N; i++) {
      total += words[i].length;
      // most common: count how many agents have ANY copy of each word
      for (const w of words[i]) counts[w] = (counts[w]||0) + 1;
    }
    const ws = Object.keys(counts);
    let topW = null, topC = 0;
    for (const w of ws) if (counts[w] > topC) { topC = counts[w]; topW = w; }
    return { total, distinct: ws.length, topShare: topC/N, topW };
  }

  function render() {
    ctx.fillStyle = 'rgba(6,8,13,0.4)';
    ctx.fillRect(0,0,W,H);

    // edges
    if (mode !== 'full') {
      ctx.strokeStyle = 'rgba(254,250,224,0.08)';
      ctx.lineWidth = 0.6;
      for (let i=0; i<N; i++) for (const j of adj[i]) {
        if (j <= i) continue;
        ctx.beginPath();
        ctx.moveTo(pos[i].x, pos[i].y);
        ctx.lineTo(pos[j].x, pos[j].y);
        ctx.stroke();
      }
    }

    // Determine top word once
    const st = stats();

    // nodes - color by their first/most prevalent word
    for (let i=0; i<N; i++) {
      const ws = words[i];
      // pick agent's "primary" word: just first
      const primary = ws[0] || 'none';
      const isTop = primary === st.topW;
      ctx.fillStyle = colorForWord(primary);
      ctx.shadowBlur = isTop ? 12 : 5;
      ctx.shadowColor = ctx.fillStyle;
      const r = 4 + Math.min(4, ws.length-1);
      ctx.beginPath();
      ctx.arc(pos[i].x, pos[i].y, r, 0, Math.PI*2);
      ctx.fill();
      // ring if vocabulary > 1
      if (ws.length > 1) {
        ctx.strokeStyle = 'rgba(254,250,224,0.6)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
    ctx.shadowBlur = 0;

    // Inset: vocabulary size + top share over time
    history.push({ tot: st.total/N, distinct: st.distinct, top: st.topShare });
    if (history.length > 600) history.shift();

    const iw = Math.min(280, W*0.30), ih = 160;
    const ix = 18, iy = H - ih - 18;
    ctx.fillStyle = 'rgba(12,18,28,0.85)';
    ctx.fillRect(ix, iy, iw, ih);
    ctx.strokeStyle = 'rgba(254,250,224,0.18)';
    ctx.strokeRect(ix, iy, iw, ih);
    ctx.fillStyle = 'rgba(254,250,224,0.7)';
    ctx.font = '10px Nunito';
    ctx.fillText('avg vocab  •  top-word share', ix+8, iy+14);

    if (history.length > 1) {
      const T = history.length;
      // top share (0..1)
      ctx.strokeStyle = '#e879f9';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let t=0; t<T; t++) {
        const x = ix + 8 + (t/(T-1))*(iw-16);
        const y = iy + ih - 8 - history[t].top*(ih-26);
        if (t===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
      // average vocab size (normalize by max)
      let maxV = 1;
      for (let t=0; t<T; t++) if (history[t].tot > maxV) maxV = history[t].tot;
      ctx.strokeStyle = '#06b6d4';
      ctx.beginPath();
      for (let t=0; t<T; t++) {
        const x = ix + 8 + (t/(T-1))*(iw-16);
        const y = iy + ih - 8 - (history[t].tot/maxV)*(ih-26);
        if (t===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
      ctx.fillStyle = 'rgba(254,250,224,0.6)';
      ctx.fillText('vocab/N (max '+maxV.toFixed(1)+')', ix+8, iy+ih-22);
    }
    ctx.fillStyle = '#06b6d4'; ctx.fillRect(ix+iw-90, iy+22, 8, 8);
    ctx.fillStyle = 'rgba(254,250,224,0.85)'; ctx.fillText('vocab', ix+iw-78, iy+30);
    ctx.fillStyle = '#e879f9'; ctx.fillRect(ix+iw-46, iy+22, 8, 8);
    ctx.fillStyle = 'rgba(254,250,224,0.85)'; ctx.fillText('top', ix+iw-34, iy+30);

    document.getElementById('sStep').textContent = step;
    document.getElementById('sW').textContent = st.total;
    document.getElementById('sD').textContent = st.distinct;
    document.getElementById('sShare').textContent = st.topShare.toFixed(3);
  }

  function loop() {
    if (running) for (let s=0; s<speed; s++) tick();
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iN').addEventListener('input', e => { reset(); });
  document.getElementById('iK').addEventListener('input', e => { reset(); });
  document.getElementById('iS').addEventListener('input', e => {
    speed = +e.target.value;
    document.getElementById('vS').textContent = speed;
  });
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      mode = b.dataset.mode;
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
