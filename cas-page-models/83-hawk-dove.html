<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hawk-Dove ESS — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream); letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ 83</span>
  <h2>Hawk-Dove ESS</h2>
  <p>Animals contest a resource of value V; Hawks fight (cost C if both are Hawks); Doves yield. Replicator dynamics drive Hawk fraction toward the evolutionarily stable strategy <strong>p* = V/C</strong>.</p>

  <div class="control"><label>Resource value V <span id="vV">2.0</span></label><input type="range" id="iV" min="0.5" max="6" step="0.1" value="2.0" /></div>
  <div class="control"><label>Conflict cost C <span id="vC">5.0</span></label><input type="range" id="iC" min="1" max="10" step="0.1" value="5.0" /></div>
  <div class="control"><label>Population N <span id="vN">400</span></label><input type="range" id="iN" min="100" max="900" step="50" value="400" /></div>
  <div class="control"><label>Mutation rate <span id="vM">0.005</span></label><input type="range" id="iM" min="0" max="0.05" step="0.001" value="0.005" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Generation</span><span class="v" id="sG">0</span></div>
  <div class="stat"><span>Hawk fraction</span><span class="v" id="sP">—</span></div>
  <div class="stat"><span>ESS p* = V/C</span><span class="v" id="sESS">—</span></div>
  <div class="stat"><span>Mean fitness</span><span class="v" id="sFit">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  let agents = [];
  let history = []; // hawk fractions over time
  let V = 2.0, C = 5.0, N = 400, mut = 0.005;
  let gen = 0, running = true;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    agents = [];
    for (let i=0; i<N; i++) {
      agents.push({
        x: Math.random()*W,
        y: Math.random()*H,
        vx: (Math.random()-0.5)*0.6,
        vy: (Math.random()-0.5)*0.6,
        type: Math.random()<0.5 ? 'H' : 'D',
        fit: 1
      });
    }
    history = [];
    gen = 0;
  }

  function step() {
    // Random pairings — each agent plays a few opponents
    for (let i=0; i<N; i++) agents[i].fit = 1;
    const games = 4;
    for (let g=0; g<games; g++) {
      const order = [...Array(N).keys()];
      for (let k=order.length-1;k>0;k--) {
        const j = (Math.random()*(k+1))|0;
        [order[k],order[j]]=[order[j],order[k]];
      }
      for (let k=0; k<N-1; k+=2) {
        const a = agents[order[k]], b = agents[order[k+1]];
        if (a.type==='H' && b.type==='H') { a.fit += (V-C)/2; b.fit += (V-C)/2; }
        else if (a.type==='D' && b.type==='D') { a.fit += V/2; b.fit += V/2; }
        else if (a.type==='H' && b.type==='D') { a.fit += V; }
        else { b.fit += V; }
      }
    }
    // Shift fitnesses to be positive
    let minF = Infinity;
    for (let i=0;i<N;i++) if (agents[i].fit<minF) minF=agents[i].fit;
    let total = 0;
    for (let i=0;i<N;i++) { agents[i].fit -= minF - 0.5; total += agents[i].fit; }
    // Reproduce by fitness-proportional selection (Wright-Fisher)
    const newAgents = [];
    for (let i=0; i<N; i++) {
      let r = Math.random()*total, c = 0;
      for (let j=0; j<N; j++) {
        c += agents[j].fit;
        if (c>=r) {
          let t = agents[j].type;
          if (Math.random()<mut) t = (t==='H'?'D':'H');
          newAgents.push({
            x: agents[j].x + (Math.random()-0.5)*8,
            y: agents[j].y + (Math.random()-0.5)*8,
            vx: (Math.random()-0.5)*0.6, vy: (Math.random()-0.5)*0.6,
            type: t, fit: 1
          });
          break;
        }
      }
    }
    agents = newAgents;
    // Wrap motion
    for (const a of agents) {
      a.x += a.vx; a.y += a.vy;
      if (a.x<0) a.x+=W; if (a.x>=W) a.x-=W;
      if (a.y<0) a.y+=H; if (a.y>=H) a.y-=H;
    }
    let h=0; for (const a of agents) if (a.type==='H') h++;
    history.push(h/N);
    if (history.length>800) history.shift();
    gen++;
  }

  function draw() {
    // Trail fade
    ctx.fillStyle = 'rgba(6,8,13,0.20)';
    ctx.fillRect(0,0,W,H);

    // Title gradient
    ctx.save();
    ctx.font = "600 14px Nunito";
    ctx.fillStyle = 'rgba(254,250,224,0.5)';
    ctx.fillText('Hawks (magenta) vs Doves (cyan)', 18, H-18);
    ctx.restore();

    // Particles with glow
    for (const a of agents) {
      const col = a.type==='H' ? '#e879f9' : '#06b6d4';
      ctx.shadowBlur = 14;
      ctx.shadowColor = col;
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(a.x, a.y, 2.6, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Plot panel — bottom left
    const pw = Math.min(420, W*0.42), ph = 150;
    const px = 18, py = H - ph - 50;
    ctx.fillStyle = 'rgba(12,18,28,0.78)';
    ctx.fillRect(px, py, pw, ph);
    ctx.strokeStyle = 'rgba(254,250,224,0.18)';
    ctx.strokeRect(px, py, pw, ph);

    // ESS line
    const ess = Math.min(1, V/C);
    ctx.strokeStyle = 'rgba(221,161,94,0.7)';
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(px, py + ph*(1-ess));
    ctx.lineTo(px+pw, py + ph*(1-ess));
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = 'rgba(221,161,94,0.85)';
    ctx.font = "600 11px Nunito";
    ctx.fillText('ESS p*='+ess.toFixed(2), px+pw-78, py + ph*(1-ess) - 4);

    // History curve (Hawk fraction)
    if (history.length>1) {
      ctx.strokeStyle = '#e879f9';
      ctx.shadowBlur = 8; ctx.shadowColor = '#e879f9';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i=0; i<history.length; i++) {
        const x = px + (i/(history.length-1))*pw;
        const y = py + ph*(1-history[i]);
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    ctx.fillStyle = 'rgba(254,250,224,0.6)';
    ctx.font = "500 10px Nunito";
    ctx.fillText('Hawk fraction over generations', px+8, py+14);

    // Update stats
    let h=0; for (const a of agents) if (a.type==='H') h++;
    document.getElementById('sG').textContent = gen;
    document.getElementById('sP').textContent = (h/N).toFixed(3);
    document.getElementById('sESS').textContent = ess.toFixed(3);
    let mf=0; for (const a of agents) mf += a.fit; mf /= N;
    document.getElementById('sFit').textContent = mf.toFixed(2);
  }

  function loop() {
    if (running) step();
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('iV').addEventListener('input', e => { V=+e.target.value; document.getElementById('vV').textContent = V.toFixed(1); });
  document.getElementById('iC').addEventListener('input', e => { C=+e.target.value; document.getElementById('vC').textContent = C.toFixed(1); });
  document.getElementById('iN').addEventListener('input', e => { N=+e.target.value; document.getElementById('vN').textContent = N; reset(); });
  document.getElementById('iM').addEventListener('input', e => { mut=+e.target.value; document.getElementById('vM').textContent = mut.toFixed(3); });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
