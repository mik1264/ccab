<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Minority Game (Challet-Zhang) — CAS</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d;
    --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.2rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.7rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem;
    padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ NN</span>
  <h2>Minority Game</h2>
  <p>N agents each round pick side 0 or 1; the minority side wins. Each agent has S strategies mapping the last m bits of history to a side. Reinforce the strategy that would have been correct.</p>

  <div class="control"><label>Agents N <span id="vN">101</span></label><input type="range" id="iN" min="51" max="301" step="2" value="101" /></div>
  <div class="control"><label>Memory m <span id="vM">5</span></label><input type="range" id="iM" min="2" max="9" step="1" value="5" /></div>
  <div class="control"><label>Strategies S <span id="vS">2</span></label><input type="range" id="iS" min="1" max="6" step="1" value="2" /></div>
  <div class="control"><label>Speed (rounds/frame) <span id="vR">4</span></label><input type="range" id="iR" min="1" max="20" step="1" value="4" /></div>

  <div class="btnrow">
    <button class="p" data-m="3" data-s="2">m=3</button>
    <button class="p" data-m="5" data-s="2">m=5</button>
    <button class="p" data-m="7" data-s="2">m=7</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Round</span><span class="v" id="sR">0</span></div>
  <div class="stat"><span>Last attendance</span><span class="v" id="sA">—</span></div>
  <div class="stat"><span>σ²/N</span><span class="v" id="sV">—</span></div>
  <div class="stat"><span>2^m / N</span><span class="v" id="sAlpha">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  let N=101, m=5, S=2, speed=4;
  let agents = []; // each: {strats:[Uint8Array(2^m)], scores:Float64Array(S)}
  let history = 0; // bitmask
  let attendance = []; // store last K
  let round = 0, running = true;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    const P = 1<<m; // 2^m possible histories
    agents = [];
    for (let i=0;i<N;i++) {
      const strats = [];
      for (let s=0;s<S;s++) {
        const t = new Uint8Array(P);
        for (let p=0;p<P;p++) t[p] = Math.random()<0.5 ? 0 : 1;
        strats.push(t);
      }
      agents.push({ strats, scores: new Float64Array(S) });
    }
    history = (Math.random()*P)|0;
    attendance = [];
    round = 0;
  }

  function tickRound() {
    const P = 1<<m;
    const mask = P-1;
    let nOne = 0;
    const choices = new Int8Array(N);
    for (let i=0;i<N;i++) {
      // pick best strategy (break ties randomly)
      let best = 0;
      for (let s=1;s<S;s++) if (agents[i].scores[s] > agents[i].scores[best]) best = s;
      // randomize ties
      const ties = [best];
      for (let s=0;s<S;s++) if (s!==best && agents[i].scores[s]===agents[i].scores[best]) ties.push(s);
      const chosen = ties[(Math.random()*ties.length)|0];
      const a = agents[i].strats[chosen][history & mask];
      choices[i] = a;
      if (a===1) nOne++;
    }
    const minority = nOne < N - nOne ? 1 : 0; // tie -> 0
    // update scores: each strategy that would have predicted minority gets +1, else -1
    for (let i=0;i<N;i++) {
      for (let s=0;s<S;s++) {
        const pred = agents[i].strats[s][history & mask];
        agents[i].scores[s] += (pred===minority) ? 1 : -1;
      }
    }
    // shift history
    history = ((history<<1) | minority) & mask;
    attendance.push(nOne);
    if (attendance.length > 800) attendance.shift();
    round++;
  }

  function render() {
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);

    // Time series of attendance
    const margin = 70;
    const plotW = Math.min(W - 380, 1000);
    const plotH = Math.min(H - 240, 480);
    const ox = (W - plotW)/2 - 100;
    const oy = (H - plotH)/2 + 30;

    ctx.fillStyle = 'rgba(254,250,224,0.85)';
    ctx.font = '600 16px Lora, serif';
    ctx.textAlign = 'left';
    ctx.fillText('Attendance time series (side = 1)', ox, oy - 16);

    // Frame
    ctx.strokeStyle = 'rgba(254,250,224,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(ox, oy, plotW, plotH);

    // N/2 line
    ctx.strokeStyle = 'rgba(232,121,249,0.55)';
    ctx.setLineDash([4,4]);
    const midY = oy + plotH*0.5;
    ctx.beginPath(); ctx.moveTo(ox, midY); ctx.lineTo(ox+plotW, midY); ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = 'rgba(232,121,249,0.7)';
    ctx.font = '500 11px Nunito';
    ctx.textAlign = 'right';
    ctx.fillText('N/2', ox-6, midY+4);

    // y-axis labels
    ctx.fillStyle = 'rgba(254,250,224,0.55)';
    ctx.fillText('N', ox-6, oy+6);
    ctx.fillText('0', ox-6, oy+plotH);

    // Time series
    if (attendance.length>1) {
      ctx.strokeStyle = '#06b6d4';
      ctx.shadowColor = '#06b6d4'; ctx.shadowBlur = 10;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      const len = attendance.length;
      for (let i=0;i<len;i++) {
        const x = ox + i*plotW/Math.max(1, len-1);
        const y = oy + plotH - (attendance[i]/N)*plotH;
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Histogram of attendance
    const hx = ox + plotW + 12;
    const hwid = 100;
    if (attendance.length>20) {
      const bins = 30;
      const cnt = new Int32Array(bins);
      for (let i=0;i<attendance.length;i++) {
        let b = Math.floor(attendance[i]/N*bins);
        if (b>=bins) b = bins-1; if (b<0) b=0;
        cnt[b]++;
      }
      let mx = 0; for (let b=0;b<bins;b++) if (cnt[b]>mx) mx=cnt[b];
      ctx.strokeStyle = 'rgba(254,250,224,0.2)';
      ctx.strokeRect(hx, oy, hwid, plotH);
      for (let b=0;b<bins;b++) {
        const w = cnt[b]/Math.max(1,mx) * hwid;
        const y = oy + (bins-1-b)*plotH/bins;
        const t = b/(bins-1);
        const c = `hsl(${200 + t*120}, 70%, ${40+t*30}%)`;
        ctx.fillStyle = c;
        ctx.fillRect(hx, y, w, plotH/bins);
      }
      ctx.fillStyle = 'rgba(254,250,224,0.7)';
      ctx.font = '600 10px Nunito';
      ctx.textAlign = 'center';
      ctx.fillText('PDF', hx + hwid/2, oy - 6);
    }

    // x label
    ctx.fillStyle = 'rgba(254,250,224,0.55)';
    ctx.font = '500 11px Nunito';
    ctx.textAlign = 'center';
    ctx.fillText('round →', ox + plotW/2, oy + plotH + 22);

    // Stats
    const last = attendance[attendance.length-1] ?? 0;
    let mu=0, vsum=0;
    for (let i=0;i<attendance.length;i++) mu += attendance[i];
    mu /= Math.max(1, attendance.length);
    for (let i=0;i<attendance.length;i++) vsum += (attendance[i]-mu)*(attendance[i]-mu);
    const variance = vsum/Math.max(1, attendance.length);
    document.getElementById('sR').textContent = round;
    document.getElementById('sA').textContent = last;
    document.getElementById('sV').textContent = (variance/N).toFixed(3);
    document.getElementById('sAlpha').textContent = ((1<<m)/N).toFixed(3);
  }

  function loop() {
    if (running) for (let s=0;s<speed;s++) tickRound();
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iN').addEventListener('input', e => {
    N = +e.target.value; if (N%2===0) N++;
    document.getElementById('vN').textContent = N; reset();
  });
  document.getElementById('iM').addEventListener('input', e => {
    m = +e.target.value;
    document.getElementById('vM').textContent = m; reset();
  });
  document.getElementById('iS').addEventListener('input', e => {
    S = +e.target.value;
    document.getElementById('vS').textContent = S; reset();
  });
  document.getElementById('iR').addEventListener('input', e => {
    speed = +e.target.value;
    document.getElementById('vR').textContent = speed;
  });
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      m = +b.dataset.m; S = +b.dataset.s;
      document.getElementById('iM').value = m;
      document.getElementById('iS').value = S;
      document.getElementById('vM').textContent = m;
      document.getElementById('vS').textContent = S;
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
