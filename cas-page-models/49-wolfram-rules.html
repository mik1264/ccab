<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wolfram Elementary CA — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .tag-abm {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.6rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .toggle {
    display:flex; gap:0.4rem; margin-bottom:0.6rem;
  }
  .toggle button.active { background: linear-gradient(135deg, var(--accent), var(--magenta)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag-abm">ABM ✦ 49</span>
  <h2>Wolfram Elementary CA</h2>
  <p>1D binary CA with 256 possible rules. The 8-bit rule number specifies the next state for each (left, center, right) triple. Time flows downward.</p>

  <div class="control"><label>Rule <span id="vR">110</span></label><input type="range" id="iR" min="0" max="255" step="1" value="110" /></div>
  <div class="control"><label>Steps/frame <span id="vS">3</span></label><input type="range" id="iS" min="1" max="10" step="1" value="3" /></div>

  <div class="btnrow">
    <button class="p" data-r="30">30</button>
    <button class="p" data-r="90">90</button>
    <button class="p" data-r="110">110</button>
    <button class="p" data-r="184">184</button>
    <button class="p" data-r="250">250</button>
  </div>

  <div class="toggle">
    <button id="bSeed" class="active">Single seed</button>
    <button id="bRand">Random</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Rule binary</span><span class="v" id="sBin">—</span></div>
  <div class="stat"><span>Generation</span><span class="v" id="sGen">0</span></div>
  <div class="stat"><span>Density</span><span class="v" id="sDen">—</span></div>
  <div class="stat"><span>Class</span><span class="v" id="sCl">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0;
  const dpr = Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener('resize', ()=>{ resize(); redraw(); });
  resize();

  const COLS = 600, ROWS = 800;
  let rule = 110, mode = 'seed', stepsPerFrame = 3;
  let row, history, gen = 0, running = true;
  let off; // offscreen canvas
  let img;

  function init(){
    row = new Uint8Array(COLS);
    history = new Uint8Array(ROWS*COLS);
    if (mode==='seed'){
      row[(COLS/2)|0] = 1;
    } else {
      for (let i=0;i<COLS;i++) row[i] = Math.random()<0.5?1:0;
    }
    for (let i=0;i<COLS;i++) history[i] = row[i];
    gen = 1;
    off = document.createElement('canvas');
    off.width = COLS; off.height = ROWS;
    img = off.getContext('2d').createImageData(COLS, ROWS);
    paintHistory(0, gen);
    document.getElementById('sBin').textContent = rule.toString(2).padStart(8,'0');
    classifyRule();
  }

  // plasma colormap
  function plasma(t){
    t = Math.max(0, Math.min(1, t));
    const r = Math.round(255 * (0.05 + 0.95*Math.pow(t, 0.7)));
    const g = Math.round(255 * (0.0 + 0.55*Math.pow(t, 1.6) + (t>0.7? (t-0.7)*1.5: 0)));
    const b = Math.round(255 * (0.55*(1-t) + 0.6*Math.pow(1-t, 0.6)));
    return [Math.min(255,r), Math.min(255,g), Math.min(255,b)];
  }

  function paintHistory(from, to){
    // compute local density per cell using window
    const data = img.data;
    const win = 5;
    for (let r=from; r<to; r++){
      // row density (horizontal window)
      for (let c=0;c<COLS;c++){
        const v = history[r*COLS+c];
        if (v===0){
          const j = (r*COLS+c)*4;
          data[j]=8; data[j+1]=10; data[j+2]=18; data[j+3]=255;
        } else {
          // local density across small window for color modulation
          let cnt = 0, tot = 0;
          for (let dc=-win; dc<=win; dc++){
            const cc = c+dc;
            if (cc<0||cc>=COLS) continue;
            cnt += history[r*COLS+cc]; tot++;
          }
          const t = cnt/tot;
          const col = plasma(0.3 + 0.7*t);
          const j = (r*COLS+c)*4;
          data[j]=col[0]; data[j+1]=col[1]; data[j+2]=col[2]; data[j+3]=255;
        }
      }
    }
    off.getContext('2d').putImageData(img, 0, 0);
  }

  function tick(){
    if (gen >= ROWS) return;
    for (let s=0; s<stepsPerFrame && gen<ROWS; s++){
      const newRow = new Uint8Array(COLS);
      for (let c=0;c<COLS;c++){
        const l = row[(c-1+COLS)%COLS];
        const m = row[c];
        const r = row[(c+1)%COLS];
        const idx = (l<<2)|(m<<1)|r;
        newRow[c] = (rule>>idx)&1;
      }
      row = newRow;
      for (let c=0;c<COLS;c++) history[gen*COLS+c] = row[c];
      paintHistory(gen, gen+1);
      gen++;
    }
    let n=0;
    for (let i=0;i<COLS;i++) n += row[i];
    document.getElementById('sGen').textContent = gen;
    document.getElementById('sDen').textContent = (n/COLS).toFixed(3);
  }

  function classifyRule(){
    const map = {
      0:'I uniform', 8:'I', 32:'I', 250:'II periodic', 184:'II traffic',
      54:'IV edge', 90:'III fractal', 30:'III chaotic',
      110:'IV complex', 60:'III', 105:'III', 150:'III',
      18:'III', 22:'III', 45:'III', 73:'IV',
    };
    document.getElementById('sCl').textContent = map[rule] || '—';
  }

  function draw(){
    ctx.fillStyle='#06080d';
    ctx.fillRect(0,0,W,H);
    const aspect = COLS/ROWS;
    let dh = H*0.92;
    let dw = dh*aspect;
    if (dw > W*0.72){ dw = W*0.72; dh = dw/aspect; }
    const ox = (W*0.45 - dw/2);
    const oy = (H - dh)/2;
    ctx.drawImage(off, 0, 0, COLS, gen||1, ox, oy, dw, dh*((gen||1)/ROWS));
    // unfilled portion gradient
    ctx.fillStyle = 'rgba(8,10,18,0.6)';
    const fillH = dh*((gen||1)/ROWS);
    if (fillH < dh){
      ctx.fillRect(ox, oy + fillH, dw, dh - fillH);
    }
    ctx.strokeStyle = 'rgba(232,121,249,0.5)';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(232,121,249,0.7)';
    ctx.shadowBlur = 12;
    ctx.strokeRect(ox-1, oy-1, dw+2, dh+2);
    ctx.shadowBlur = 0;
    // axis labels
    ctx.fillStyle = 'rgba(254,250,224,0.55)'; ctx.font = '600 12px Nunito';
    ctx.fillText('space →', ox, oy - 8);
    ctx.save();
    ctx.translate(ox - 12, oy + dh/2);
    ctx.rotate(-Math.PI/2);
    ctx.fillText('time →', 0, 0);
    ctx.restore();
  }

  function redraw(){ draw(); }

  function loop(){
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('iR').addEventListener('input', e=>{
    rule=+e.target.value;
    document.getElementById('vR').textContent=rule;
    init();
  });
  document.getElementById('iS').addEventListener('input', e=>{
    stepsPerFrame=+e.target.value;
    document.getElementById('vS').textContent=stepsPerFrame;
  });
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click', ()=>{
      rule = +b.dataset.r;
      document.getElementById('iR').value=rule;
      document.getElementById('vR').textContent=rule;
      init();
    });
  });
  document.getElementById('bSeed').addEventListener('click', ()=>{
    mode='seed';
    document.getElementById('bSeed').classList.add('active');
    document.getElementById('bRand').classList.remove('active');
    init();
  });
  document.getElementById('bRand').addEventListener('click', ()=>{
    mode='rand';
    document.getElementById('bRand').classList.add('active');
    document.getElementById('bSeed').classList.remove('active');
    init();
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
