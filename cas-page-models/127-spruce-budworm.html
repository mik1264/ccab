<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spruce-Budworm Bifurcation — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12); border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; background: linear-gradient(90deg, var(--earth), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600; background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream); border:none; border-radius:9px; cursor:pointer; transition:all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Spruce-Budworm</h2>
  <p>Logistic budworm minus Holling-III bird predation: dN/dt = rN(1−N/K) − bN²/(a²+N²). Three fixed points (refuge / unstable / outbreak) — saddle-node bifurcations as forest ages (K↑).</p>

  <div class="control"><label>Growth r <span id="vr">0.55</span></label><input type="range" id="ir" min="0.1" max="1.5" step="0.01" value="0.55" /></div>
  <div class="control"><label>Capacity K <span id="vK">8.0</span></label><input type="range" id="iK" min="1" max="20" step="0.05" value="8.0" /></div>
  <div class="control"><label>Predation b <span id="vb">0.40</span></label><input type="range" id="ib" min="0.05" max="1.5" step="0.01" value="0.40" /></div>
  <div class="control"><label>Half-sat a <span id="va">1.0</span></label><input type="range" id="ia" min="0.3" max="3" step="0.01" value="1.0" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="0.55,4,0.40,1.0">Refuge</button>
    <button class="p" data-p="0.55,12,0.40,1.0">Outbreak</button>
    <button class="p" data-p="0.55,8,0.40,1.0">Hysteretic</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-sweep="1">Sweep K ↑</button>
    <button class="p" data-sweep="-1">Sweep K ↓</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>N</span><span class="v" id="sN">—</span></div>
  <div class="stat"><span>State</span><span class="v" id="sS">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  let r=0.55, K=8.0, b=0.40, a=1.0;
  let N=0.5, t=0, running=true;
  const series=[]; const MAX=1500;
  const hyst=[];
  let sweep=0;

  function dNdt(N){ return r*N*(1-N/K) - b*N*N/(a*a+N*N); }
  function reset(N0){ N=(N0!==undefined)?N0:0.5; t=0; series.length=0; hyst.length=0; sweep=0; }

  function rk4(dt){
    const k1=dNdt(N), k2=dNdt(N+dt/2*k1), k3=dNdt(N+dt/2*k2), k4=dNdt(N+dt*k3);
    N += dt/6*(k1+2*k2+2*k3+k4);
    if (N<0) N=0;
    t += dt;
  }
  function tick(){
    const dt=0.1;
    for (let i=0;i<3;i++) rk4(dt);
    if (sweep!==0){
      K += sweep*0.008;
      if (K<1) K=1; if (K>20) K=20;
      document.getElementById('iK').value=K;
      document.getElementById('vK').textContent=K.toFixed(2);
      hyst.push({K,N});
      if (hyst.length>3000) hyst.shift();
    }
    series.push({t,N,K});
    if (series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sN').textContent=N.toFixed(3);
    document.getElementById('sS').textContent=N<1?'refuge':N>4?'outbreak':'transition';
  }

  function findEquil(K_use){
    // Roots of f(N)=r(1-N/K) - bN/(a²+N²) for N>0; plus N=0
    const eq=[{n:0, stable: true /*depends*/}];
    // Sample sign changes
    const samples=400;
    const ns=[];
    for (let i=0;i<=samples;i++) ns.push(0.0001 + i*K_use*1.6/samples);
    function f(n){ const Kk=K_use; return r*(1-n/Kk) - b*n/(a*a+n*n); }
    let prev=f(ns[0]);
    for (let i=1;i<ns.length;i++){
      const cur=f(ns[i]);
      if (prev*cur<0){
        // Bisection
        let lo=ns[i-1], hi=ns[i];
        for (let it=0;it<40;it++){
          const mid=(lo+hi)/2;
          if (f(lo)*f(mid)<0) hi=mid; else lo=mid;
        }
        const root=(lo+hi)/2;
        // Stability: derivative of full dN/dt = rN(1-N/K) - bN²/(a²+N²)
        const eps=1e-4;
        const Ksave=K; K=K_use;
        const fp=(dNdt(root+eps)-dNdt(root-eps))/(2*eps);
        K=Ksave;
        eq.push({n:root, stable: fp<0});
      }
      prev=cur;
    }
    // N=0 stability: derivative of dN/dt at 0 = r (if r>0 unstable)
    // but with predation: at N=0, dN/dt' = r - 2b·0/... = r → unstable
    eq[0].stable = (r<=0);
    return eq;
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=360, padT=50, padB=40;
    const totW=W-padL-padR;
    const halfH = (H-padT-padB-50)/2;

    // Top: time series
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Population N(t) — outbreak vs refuge', padL, padT-12);
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++){const yp=padT+i*halfH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    if (series.length>1){
      const t0=series[0].t, t1=series[series.length-1].t, ts=Math.max(t1-t0,1);
      const Nmax=10;
      ctx.strokeStyle='#fb923c'; ctx.lineWidth=2.2; ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.t-t0)/ts*totW;
        const py=padT+halfH-Math.min(s.N,Nmax)/Nmax*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }

    // Bottom: bifurcation diagram
    const bY = padT + halfH + 50;
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Bifurcation: equilibrium N* vs K (carrying capacity)', padL, bY-12);
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++){const yp=bY+i*halfH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    const Kmin=1, Kmax=20, Nmin=0, Nmax=10;
    ctx.fillStyle='rgba(254,250,224,0.4)'; ctx.font='10px Nunito';
    ctx.fillText('K=1', padL, bY+halfH+18);
    ctx.fillText('K=20', padL+totW-30, bY+halfH+18);
    ctx.fillText('N*=10', padL-35, bY+5);

    for (let s=Kmin; s<=Kmax; s+=0.05){
      const eq=findEquil(s);
      for (const fp of eq){
        if (fp.n>Nmax) continue;
        const px=padL+(s-Kmin)/(Kmax-Kmin)*totW;
        const py=bY+halfH-(fp.n-Nmin)/(Nmax-Nmin)*halfH;
        ctx.fillStyle = fp.stable?'#06b6d4':'rgba(232,121,249,0.6)';
        ctx.fillRect(px-1,py-1,2,2);
      }
    }

    // Hysteresis trajectory
    if (hyst.length>1){
      ctx.strokeStyle='rgba(251,146,60,0.7)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      for (let i=0;i<hyst.length;i++){
        const h=hyst[i];
        const px=padL+(h.K-Kmin)/(Kmax-Kmin)*totW;
        const py=bY+halfH-Math.min(h.N,Nmax)/(Nmax-Nmin)*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    // Current
    const px=padL+(K-Kmin)/(Kmax-Kmin)*totW;
    const py=bY+halfH-Math.min(N,Nmax)/(Nmax-Nmin)*halfH;
    ctx.fillStyle='#fb923c';
    ctx.beginPath(); ctx.arc(px,py,7,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(254,250,224,0.6)'; ctx.lineWidth=1.5; ctx.stroke();

    // Legend
    ctx.font='11px Nunito';
    ctx.fillStyle='#06b6d4'; ctx.fillText('● stable', padL+totW-200, bY+12);
    ctx.fillStyle='rgba(232,121,249,0.8)'; ctx.fillText('● unstable', padL+totW-130, bY+12);
    ctx.fillStyle='#fb923c'; ctx.fillText('● now', padL+totW-50, bY+12);
  }

  function loop(){ if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,prop,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      if (prop==='r') r=v; if (prop==='K') K=v; if (prop==='b') b=v; if (prop==='a') a=v;
    });
  }
  bind('ir','vr','r'); bind('iK','vK','K'); bind('ib','vb','b'); bind('ia','va','a');
  document.querySelectorAll('.p[data-p]').forEach(bn=>{
    bn.addEventListener('click',()=>{
      const [pr,pk,pb,pa]=bn.dataset.p.split(',').map(Number);
      r=pr; K=pk; b=pb; a=pa;
      document.getElementById('ir').value=r; document.getElementById('vr').textContent=r.toFixed(2);
      document.getElementById('iK').value=K; document.getElementById('vK').textContent=K.toFixed(2);
      document.getElementById('ib').value=b; document.getElementById('vb').textContent=b.toFixed(2);
      document.getElementById('ia').value=a; document.getElementById('va').textContent=a.toFixed(2);
      reset(0.5);
    });
  });
  document.querySelectorAll('.p[data-sweep]').forEach(bn=>{
    bn.addEventListener('click',()=>{ sweep=+bn.dataset.sweep; });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', ()=>reset(0.5));
  reset(0.5); loop();
})();
</script>
</body>
</html>
