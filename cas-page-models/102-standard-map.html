<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chirikov Standard Map — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 102</span>
  <h2>Chirikov Standard Map</h2>
  <p>p_{n+1} = p_n + K·sin(θ_n), θ_{n+1} = θ_n + p_{n+1} (mod 2π). The kicked rotor's stroboscopic map. KAM tori survive at small K; near K ≈ 0.9716354 the last invariant curve breaks (Greene), opening a global chaotic sea.</p>

  <div class="control"><label>K kick strength <span id="vK">0.9716</span></label><input id="iK" type="range" min="0" max="6" step="0.001" value="0.9716" /></div>
  <div class="control"><label>orbits <span id="vN">80</span></label><input id="iN" type="range" min="20" max="200" step="5" value="80" /></div>
  <div class="control"><label>iter/orbit × 1K <span id="vI">3</span></label><input id="iI" type="range" min="1" max="10" step="1" value="3" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-K="0.5">KAM tori</button>
    <button class="p" data-K="0.9716">Critical</button>
    <button class="p" data-K="1.5">Mixed</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-K="2.5">Chaos</button>
    <button class="p" data-K="4.0">Strong</button>
    <button class="p" data-K="6.0">Diffusive</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Recompute</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Total points</span><span class="v" id="sn">0</span></div>
  <div class="stat"><span>Status</span><span class="v" id="ss">computing…</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0); needsRender=true;}
  addEventListener('resize',resize); resize();

  let K=0.9716, nOrbits=80, iterPerOrbit=3000;
  let orbits = []; // each orbit: {color, pts: Float32Array}
  let needsRender=true;

  function turbo(t){
    t=Math.max(0,Math.min(1,t));
    const r=Math.round(255*Math.min(1,Math.max(0, 0.13572 + 4.61539*t - 42.66032*t*t + 132.13108*t*t*t - 152.94239*t*t*t*t + 59.28637*t*t*t*t*t)));
    const g=Math.round(255*Math.min(1,Math.max(0, 0.09140 + 2.19418*t + 4.84296*t*t - 14.18503*t*t*t + 4.27729*t*t*t*t + 2.82956*t*t*t*t*t)));
    const bb=Math.round(255*Math.min(1,Math.max(0, 0.10667 + 12.64194*t - 60.58204*t*t + 110.36276*t*t*t - 89.90310*t*t*t*t + 27.34824*t*t*t*t*t)));
    return [r,g,bb];
  }

  function compute(){
    document.getElementById('ss').textContent='computing…';
    orbits.length=0;
    const TWO_PI = 2*Math.PI;
    let total=0;
    for (let o=0; o<nOrbits; o++){
      const t = o/(nOrbits-1);
      const col = turbo(t);
      // Initial conditions: spread uniformly along p axis at θ = π
      const p0 = -Math.PI + (o+0.5)/nOrbits * TWO_PI;
      const th0 = Math.PI;
      const pts = new Float32Array(iterPerOrbit*2);
      let th = th0, p = p0;
      for (let i=0;i<iterPerOrbit;i++){
        p = p + K*Math.sin(th);
        th = th + p;
        // wrap
        th = ((th % TWO_PI) + TWO_PI) % TWO_PI;
        let pw = p;
        // for small K orbits stay bounded; for large K, wrap p too for visualization
        pw = ((p + Math.PI) % TWO_PI + TWO_PI) % TWO_PI - Math.PI;
        pts[i*2]=th; pts[i*2+1]=pw;
      }
      orbits.push({color: col, pts});
      total += iterPerOrbit;
    }
    document.getElementById('sn').textContent=total;
    let lab='mixed';
    if (K<0.5) lab='KAM dominated';
    else if (K<1.0) lab='near critical';
    else if (K<2) lab='mixed regime';
    else lab='chaotic sea';
    document.getElementById('ss').textContent=lab;
    needsRender=true;
  }

  function render(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=360, padT=60, padB=60;
    const totW = W-padL-padR;
    const plotSize = Math.min(totW, H-padT-padB-30);
    const plotX = padL+(totW-plotSize)/2, plotY = padT+(H-padT-padB-plotSize)/2;

    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('Chirikov standard map on torus (θ, p) — turbo by IC', plotX, plotY-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(plotX, plotY, plotSize, plotSize);

    // axes
    ctx.strokeStyle='rgba(254,250,224,0.15)';
    ctx.beginPath();
    ctx.moveTo(plotX, plotY+plotSize/2); ctx.lineTo(plotX+plotSize, plotY+plotSize/2);
    ctx.moveTo(plotX+plotSize/2, plotY); ctx.lineTo(plotX+plotSize/2, plotY+plotSize); ctx.stroke();

    // pixel buffer
    const Wpx=Math.floor(plotSize), Hpx=Math.floor(plotSize);
    const buf = new Uint8ClampedArray(Wpx*Hpx*4);
    for (let i=0;i<buf.length;i+=4){buf[i]=6; buf[i+1]=8; buf[i+2]=13; buf[i+3]=255;}
    const TWO_PI=2*Math.PI;

    for (const orb of orbits){
      const [r,g,b] = orb.color;
      const N = orb.pts.length/2;
      for (let i=Math.floor(N*0.02);i<N;i++){
        const th=orb.pts[i*2], p=orb.pts[i*2+1];
        const px = Math.floor(th/TWO_PI*Wpx);
        const py = Math.floor((1 - (p+Math.PI)/TWO_PI)*Hpx);
        if (px<0||px>=Wpx||py<0||py>=Hpx) continue;
        const idx=(py*Wpx+px)*4;
        // additive color
        buf[idx  ] = Math.min(255, buf[idx  ]+r*0.20);
        buf[idx+1] = Math.min(255, buf[idx+1]+g*0.20);
        buf[idx+2] = Math.min(255, buf[idx+2]+b*0.20);
      }
    }

    const img = new ImageData(buf, Wpx, Hpx);
    const off = render._off || (render._off=document.createElement('canvas'));
    off.width=Wpx; off.height=Hpx;
    off.getContext('2d').putImageData(img, 0, 0);
    ctx.shadowBlur=8; ctx.shadowColor='rgba(232,121,249,0.4)';
    ctx.drawImage(off, plotX, plotY, plotSize, plotSize);
    ctx.shadowBlur=0;

    // labels
    ctx.fillStyle='rgba(254,250,224,0.55)'; ctx.font='11px Nunito';
    ctx.fillText('0', plotX-5, plotY+plotSize+14);
    ctx.fillText('2π', plotX+plotSize-15, plotY+plotSize+14);
    ctx.fillText('π', plotX+plotSize/2-5, plotY+plotSize+14);
    ctx.fillText('+π', plotX-25, plotY+10);
    ctx.fillText('0', plotX-15, plotY+plotSize/2+4);
    ctx.fillText('-π', plotX-25, plotY+plotSize);
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('θ', plotX+plotSize-10, plotY+plotSize/2-6);
    ctx.fillText('p', plotX+plotSize/2+6, plotY+12);

    // Inset card with K value
    const insW=240, insH=84;
    const insX = plotX+plotSize-insW-16, insY = plotY+16;
    ctx.fillStyle='rgba(12,18,28,0.85)';
    ctx.fillRect(insX, insY, insW, insH);
    ctx.strokeStyle='rgba(232,121,249,0.5)'; ctx.lineWidth=1;
    ctx.strokeRect(insX, insY, insW, insH);
    ctx.fillStyle='#FEFAE0'; ctx.font='13px Lora';
    ctx.fillText('Standard Map', insX+12, insY+22);
    ctx.font='12px Nunito'; ctx.fillStyle='rgba(254,250,224,0.85)';
    ctx.fillText('p ← p + K sin(θ)', insX+12, insY+42);
    ctx.fillText('θ ← θ + p (mod 2π)', insX+12, insY+58);
    ctx.fillStyle='#fb923c';
    ctx.fillText('K = '+K.toFixed(4), insX+12, insY+76);

    // Causal-loop-style mini diagram of the kicked rotor
    const cdW=240, cdH=84;
    const cdX = plotX+16, cdY = plotY+16;
    ctx.fillStyle='rgba(12,18,28,0.85)';
    ctx.fillRect(cdX, cdY, cdW, cdH);
    ctx.strokeStyle='rgba(6,182,212,0.5)';
    ctx.strokeRect(cdX, cdY, cdW, cdH);
    ctx.fillStyle='#FEFAE0'; ctx.font='13px Lora';
    ctx.fillText('Kicked rotor', cdX+12, cdY+22);
    // two nodes θ ↔ p
    const n1x=cdX+60, n1y=cdY+58, n2x=cdX+180, n2y=cdY+58;
    ctx.strokeStyle='#06b6d4'; ctx.lineWidth=2; ctx.shadowBlur=8; ctx.shadowColor='#06b6d4';
    ctx.beginPath();
    ctx.moveTo(n1x+18, n1y-5); ctx.bezierCurveTo(n1x+50, n1y-22, n2x-50, n2y-22, n2x-18, n2y-5);
    ctx.stroke();
    ctx.strokeStyle='#e879f9'; ctx.shadowColor='#e879f9';
    ctx.beginPath();
    ctx.moveTo(n2x-18, n2y+5); ctx.bezierCurveTo(n2x-50, n2y+22, n1x+50, n1y+22, n1x+18, n1y+5);
    ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(12,18,28,1)';
    ctx.beginPath(); ctx.arc(n1x,n1y,16,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(n2x,n2y,16,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#06b6d4'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(n1x,n1y,16,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='#e879f9';
    ctx.beginPath(); ctx.arc(n2x,n2y,16,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='13px Lora';
    ctx.fillText('θ', n1x-4, n1y+5);
    ctx.fillText('p', n2x-4, n2y+5);
    ctx.fillStyle='rgba(254,250,224,0.55)'; ctx.font='10px Nunito';
    ctx.fillText('+p', (n1x+n2x)/2-8, n1y-22);
    ctx.fillText('+K sin(θ)', (n1x+n2x)/2-22, n1y+34);
  }

  function loop(){ if (needsRender){ render(); needsRender=false; } requestAnimationFrame(loop); }

  function bind(id,vid,prop,d=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{ const v=+e.target.value; document.getElementById(vid).textContent=(id==='iN'||id==='iI')?v:v.toFixed(d);
      if (prop==='K') K=v; if (prop==='N') nOrbits=v; if (prop==='I') iterPerOrbit=v*1000;
    });
    el.addEventListener('change', compute);
  }
  bind('iK','vK','K',4); bind('iN','vN','N',0); bind('iI','vI','I',0);
  document.querySelectorAll('.p').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const pK=+btn.dataset.K;
      K=pK;
      document.getElementById('iK').value=pK; document.getElementById('vK').textContent=pK.toFixed(4);
      compute();
    });
  });
  document.getElementById('bRun').addEventListener('click', compute);
  document.getElementById('bReset').addEventListener('click', ()=>{ K=0.9716; nOrbits=80; iterPerOrbit=3000;
    document.getElementById('iK').value=K; document.getElementById('vK').textContent=K.toFixed(4);
    document.getElementById('iN').value=80; document.getElementById('vN').textContent='80';
    document.getElementById('iI').value=3; document.getElementById('vI').textContent='3';
    compute();
  });
  compute(); loop();
})();
</script>
</body>
</html>
