<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Erdős-Rényi Random Graph — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ NN</span>
  <h2>Erdős-Rényi G(n,p)</h2>
  <p>Each of the C(n,2) possible edges exists independently with probability p. As p crosses ≈ 1/n a giant component suddenly emerges — the celebrated phase transition. Cyan = giant component, earth = smaller fragments.</p>

  <div class="control"><label>Edge probability p <span id="vP">0.012</span></label><input type="range" id="iP" min="0" max="0.06" step="0.0005" value="0.012" /></div>
  <div class="control"><label>Nodes N <span id="vN">200</span></label><input type="range" id="iN" min="50" max="400" step="10" value="200" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="0.002">Sub-critical</button>
    <button class="p" data-p="0.005">p ≈ 1/N</button>
    <button class="p" data-p="0.025">Super-critical</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Edges</span><span class="v" id="sE">0</span></div>
  <div class="stat"><span>|GC| / N</span><span class="v" id="sGC">—</span></div>
  <div class="stat"><span>Components</span><span class="v" id="sCC">—</span></div>
  <div class="stat"><span>Avg degree</span><span class="v" id="sD">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  let N = 200;
  let p = 0.012;
  let pos = [];      // {x,y}
  let adj = [];      // adjacency lists
  let edges = [];    // [a,b,visible(0..1)]
  let comp = [];     // component id per node
  let compSize = []; // size of each component
  let gcId = -1;
  let frame = 0, running = true;
  let pendingEdges = [];

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function layout() {
    pos = [];
    const cx = W/2, cy = H/2;
    const R = Math.min(W,H)*0.4;
    for (let i=0; i<N; i++) {
      const a = (i/N)*Math.PI*2;
      pos.push({ x: cx + Math.cos(a)*R, y: cy + Math.sin(a)*R });
    }
  }

  function buildGraph() {
    adj = Array.from({length:N}, () => []);
    edges = [];
    pendingEdges = [];
    for (let i=0; i<N; i++) for (let j=i+1; j<N; j++) {
      if (Math.random() < p) {
        edges.push([i, j, 0]);
        adj[i].push(j); adj[j].push(i);
      }
    }
    // shuffle so animation feels organic
    for (let k=edges.length-1; k>0; k--) {
      const j = (Math.random()*(k+1))|0;
      [edges[k], edges[j]] = [edges[j], edges[k]];
    }
    components();
    frame = 0;
  }

  function components() {
    comp = new Int32Array(N).fill(-1);
    compSize = [];
    let cid = 0;
    for (let s=0; s<N; s++) {
      if (comp[s] !== -1) continue;
      const st = [s]; comp[s] = cid;
      let sz = 0;
      while (st.length) {
        const u = st.pop(); sz++;
        for (const v of adj[u]) if (comp[v]===-1) { comp[v] = cid; st.push(v); }
      }
      compSize.push(sz); cid++;
    }
    let gc = 0;
    for (let i=0; i<compSize.length; i++) if (compSize[i] > compSize[gc]) gc = i;
    gcId = gc;
  }

  function render() {
    ctx.fillStyle = 'rgba(6,8,13,0.42)'; // trail fade
    ctx.fillRect(0,0,W,H);

    // edges with progressive reveal
    let visEdges = 0;
    for (const e of edges) {
      if (e[2] < 1) e[2] = Math.min(1, e[2] + 0.05);
      if (e[2] <= 0) continue;
      visEdges++;
      const a = pos[e[0]], b = pos[e[1]];
      const inGC = comp[e[0]] === gcId;
      ctx.strokeStyle = inGC
        ? `rgba(6,182,212,${0.45*e[2]})`
        : `rgba(221,161,94,${0.35*e[2]})`;
      ctx.lineWidth = inGC ? 1.1 : 0.7;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }

    // nodes
    ctx.shadowBlur = 8;
    for (let i=0; i<N; i++) {
      const inGC = comp[i] === gcId;
      ctx.fillStyle = inGC ? '#06b6d4' : '#DDA15E';
      ctx.shadowColor = inGC ? 'rgba(6,182,212,0.7)' : 'rgba(221,161,94,0.5)';
      const r = inGC ? 4.2 : 3.2;
      ctx.beginPath();
      ctx.arc(pos[i].x, pos[i].y, r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Inset: |GC|/N vs p
    const iw = Math.min(240, W*0.28), ih = 140;
    const ix = 18, iy = H - ih - 18;
    ctx.fillStyle = 'rgba(12,18,28,0.85)';
    ctx.fillRect(ix, iy, iw, ih);
    ctx.strokeStyle = 'rgba(254,250,224,0.18)';
    ctx.strokeRect(ix, iy, iw, ih);
    ctx.fillStyle = 'rgba(254,250,224,0.7)';
    ctx.font = '10px Nunito';
    ctx.fillText('|GC| / N    vs    p', ix+8, iy+14);
    // theoretical curve via simulation cache
    ctx.strokeStyle = 'rgba(232,121,249,0.85)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const pMax = 0.06;
    for (let k=0; k<=80; k++) {
      const pp = (k/80)*pMax;
      // 1 - exp(-N*p*GC/N) self-consistent: Galton-Watson
      // Use Newton iteration: S = 1 - exp(-c*S), c = pp*N
      const c = pp*N;
      let S = 0.001;
      for (let it=0; it<60; it++) S = 1 - Math.exp(-c*S);
      if (c < 1) S = 0;
      const xx = ix + 8 + (pp/pMax)*(iw-16);
      const yy = iy + ih - 8 - S*(ih-26);
      if (k===0) ctx.moveTo(xx,yy); else ctx.lineTo(xx,yy);
    }
    ctx.stroke();
    // current p marker
    const xCur = ix + 8 + (Math.min(p, pMax)/pMax)*(iw-16);
    ctx.strokeStyle = 'rgba(6,182,212,1)';
    ctx.beginPath(); ctx.moveTo(xCur, iy+14); ctx.lineTo(xCur, iy+ih-6); ctx.stroke();
    const gcFrac = compSize[gcId]/N;
    const yCur = iy + ih - 8 - gcFrac*(ih-26);
    ctx.fillStyle = '#06b6d4';
    ctx.beginPath(); ctx.arc(xCur, yCur, 4, 0, Math.PI*2); ctx.fill();

    let degSum = 0;
    for (let i=0; i<N; i++) degSum += adj[i].length;
    document.getElementById('sE').textContent = visEdges;
    document.getElementById('sGC').textContent = gcFrac.toFixed(3);
    document.getElementById('sCC').textContent = compSize.length;
    document.getElementById('sD').textContent = (degSum/N).toFixed(2);
  }

  function loop() {
    if (running) frame++;
    render();
    requestAnimationFrame(loop);
  }

  function rebuild() {
    N = +document.getElementById('iN').value;
    p = +document.getElementById('iP').value;
    document.getElementById('vN').textContent = N;
    document.getElementById('vP').textContent = p.toFixed(4);
    layout();
    buildGraph();
  }

  document.getElementById('iP').addEventListener('input', e => {
    p = +e.target.value;
    document.getElementById('vP').textContent = p.toFixed(4);
    buildGraph();
  });
  document.getElementById('iN').addEventListener('input', e => {
    N = +e.target.value;
    document.getElementById('vN').textContent = N;
    layout();
    buildGraph();
  });
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      p = +b.dataset.p;
      document.getElementById('iP').value = p;
      document.getElementById('vP').textContent = p.toFixed(4);
      buildGraph();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', rebuild);

  rebuild(); loop();
})();
</script>
</body>
</html>
