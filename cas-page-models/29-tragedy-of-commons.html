<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tragedy of the Commons — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend { display:flex; gap:1rem; font-size:0.8rem; margin-top:0.5rem; flex-wrap:wrap; }
  .legend span::before { content:''; display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align: middle; }
  .legend .res::before { background: var(--sage); }
  .legend .h::before { background: var(--terracotta); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 29</span>
  <h2>Tragedy of the Commons</h2>
  <p>Resource regrows logistically, harvesters extract h=eR per agent. dR/dt = rR(1−R/K) − N·e·R. Collapse occurs when N·e &gt; r.</p>

  <div class="control"><label>r regrowth <span id="vr">0.50</span></label><input type="range" id="ir" min="0.05" max="2" step="0.01" value="0.50" /></div>
  <div class="control"><label>K capacity <span id="vk">100</span></label><input type="range" id="ik" min="10" max="500" step="5" value="100" /></div>
  <div class="control"><label>e effort/harvester <span id="ve">0.05</span></label><input type="range" id="ie" min="0.001" max="0.5" step="0.001" value="0.05" /></div>
  <div class="control"><label>N harvesters <span id="vn">5</span></label><input type="range" id="iN" min="1" max="50" step="1" value="5" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>Resource R</span><span class="v" id="sR">—</span></div>
  <div class="stat"><span>Total harvest</span><span class="v" id="sH">—</span></div>
  <div class="stat"><span>Per-harvester</span><span class="v" id="sHp">—</span></div>
  <div class="stat"><span>extraction rate N·e</span><span class="v" id="sNE">—</span></div>
  <div class="stat"><span>collapse if N·e &gt; r</span><span class="v" id="sStatus">—</span></div>
  <div class="legend"><span class="res">R(t)</span><span class="h">total harvest</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize',resize); resize();

  const C_R='#8A9A5B', C_H='#BC6C25', GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  let r=0.50, K=100, e=0.05, N=5;
  let R=K*0.8, t=0, running=true;
  const series=[]; const MAX=1500;
  const dt=0.05;

  function reset(){ R=K*0.8; t=0; series.length=0; }

  function step(){
    const f=(R)=> r*R*(1-R/K) - N*e*R;
    const k1=f(R);
    const k2=f(R+dt/2*k1);
    const k3=f(R+dt/2*k2);
    const k4=f(R+dt*k3);
    R += dt/6*(k1+2*k2+2*k3+k4);
    if(R<0) R=0;
    t += dt;
  }

  function tick(){
    for(let i=0;i<2;i++) step();
    const harv = N*e*R;
    series.push({t,R,H:harv});
    if(series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sR').textContent=R.toFixed(2);
    document.getElementById('sH').textContent=harv.toFixed(3);
    document.getElementById('sHp').textContent=(e*R).toFixed(3);
    document.getElementById('sNE').textContent=(N*e).toFixed(3);
    const collapse = (N*e>r);
    const el=document.getElementById('sStatus');
    el.textContent = collapse ? 'COLLAPSING' : 'sustainable';
    el.style.color = collapse ? '#e07d5b' : '#a8c065';
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if(series.length<2) return;
    const padL=70, padR=360, padT=60, padB=40;
    const totW=W-padL-padR;
    const tsH=(H-padT-padB-50)/2;
    const t0=series[0].t, t1=series[series.length-1].t;
    const tspan=Math.max(t1-t0,1);

    let maxR=K*1.05, maxH=0.001;
    for(const s of series){ if(s.R>maxR) maxR=s.R; if(s.H>maxH) maxH=s.H; }

    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for(let i=0;i<=4;i++){
      const yp=padT+i*tsH/4;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
    }
    ctx.strokeStyle=AXIS;
    ctx.beginPath(); ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+tsH); ctx.lineTo(padL+totW,padT+tsH); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='12px Nunito';
    ctx.fillText('Resource R(t)', padL, padT-12);
    ctx.fillText(maxR.toFixed(0), padL-40, padT+5);
    ctx.fillText('0', padL-15, padT+tsH);
    // K dashed line
    const Kp = padT+tsH-K/maxR*tsH;
    ctx.strokeStyle='rgba(221,161,94,0.5)'; ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(padL,Kp); ctx.lineTo(padL+totW,Kp); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(221,161,94,0.7)';
    ctx.fillText('K', padL+totW+5, Kp+4);

    ctx.strokeStyle=C_R; ctx.lineWidth=2.4; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const s=series[i];
      const px=padL+(s.t-t0)/tspan*totW;
      const py=padT+tsH-s.R/maxR*tsH;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();

    const ppY0 = padT + tsH + 50;
    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for(let i=0;i<=4;i++){
      const yp=ppY0+i*tsH/4;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
    }
    ctx.strokeStyle=AXIS;
    ctx.beginPath(); ctx.moveTo(padL,ppY0); ctx.lineTo(padL,ppY0+tsH); ctx.lineTo(padL+totW,ppY0+tsH); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.6)';
    ctx.fillText('Total harvest = N·e·R', padL, ppY0-12);
    ctx.fillText(maxH.toFixed(2), padL-40, ppY0+5);
    ctx.fillText('0', padL-15, ppY0+tsH);
    ctx.fillText('t='+t1.toFixed(0), padL+totW-50, ppY0+tsH+18);

    ctx.strokeStyle=C_H; ctx.lineWidth=2.2; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const s=series[i];
      const px=padL+(s.t-t0)/tspan*totW;
      const py=ppY0+tsH-s.H/maxH*tsH;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=dec===0?v.toFixed(0):(dec===3?v.toFixed(3):v.toFixed(2));
      fn(v);
    });
  }
  bind('ir','vr',v=>r=v);
  bind('ik','vk',v=>{K=v; reset();},0);
  bind('ie','ve',v=>e=v,3);
  bind('iN','vn',v=>N=v|0,0);
  document.getElementById('bRun').addEventListener('click',e=>{running=!running; e.target.textContent=running?'Pause':'Resume';});
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
