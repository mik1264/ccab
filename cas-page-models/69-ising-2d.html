<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2D Ising Model — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  #spark { display:block; width:100%; height:60px; margin-top:0.3rem; border-radius:6px; background: rgba(0,0,0,0.35); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ 69</span>
  <h2>2D Ising Model</h2>
  <p>Each cell is a spin ±1; energy E = −J·Σs·s' − h·Σs. Metropolis: flip if ΔE&lt;0 or with prob exp(−ΔE/T). Below the critical T<sub>c</sub> ≈ 2.27·J the system spontaneously magnetizes — domains coarsen into one phase.</p>

  <div class="control"><label>Temperature T <span id="vT">2.27</span></label><input type="range" id="iT" min="0.5" max="5.0" step="0.01" value="2.27" /></div>
  <div class="control"><label>Coupling J <span id="vJ">1.00</span></label><input type="range" id="iJ" min="-1.0" max="2.0" step="0.05" value="1.0" /></div>
  <div class="control"><label>Field h <span id="vH">0.00</span></label><input type="range" id="iH" min="-1.0" max="1.0" step="0.02" value="0.0" /></div>
  <div class="control"><label>Sweeps/frame <span id="vS">2</span></label><input type="range" id="iS" min="1" max="8" step="1" value="2" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="1.5">Below T<sub>c</sub></button>
    <button class="p" data-p="2.27">At T<sub>c</sub></button>
    <button class="p" data-p="3.5">Above T<sub>c</sub></button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Sweep</span><span class="v" id="sFr">0</span></div>
  <div class="stat"><span>Magnetization</span><span class="v" id="sM">—</span></div>
  <div class="stat"><span>Energy/site</span><span class="v" id="sE">—</span></div>
  <canvas id="spark"></canvas>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  const N = 200;
  let s = new Int8Array(N*N);
  let T=2.27, J=1.0, h=0.0, sweeps=2;
  let frame=0, running=true;
  const magHistory = [];
  const HMAX = 200;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener('resize', resize);
  resize();

  const img = ctx.createImageData(N, N);
  const sparkCv = document.getElementById('spark');
  const sparkCtx = sparkCv.getContext('2d');

  function reset(rand=true) {
    for (let i=0; i<N*N; i++) s[i] = rand ? (Math.random()<0.5 ? 1 : -1) : 1;
    frame = 0;
    magHistory.length = 0;
  }

  function sweep() {
    // Random-site Metropolis
    const total = N*N;
    for (let k=0; k<total; k++) {
      const x = (Math.random()*N)|0;
      const y = (Math.random()*N)|0;
      const i = y*N+x;
      const xm = (x-1+N)%N, xp = (x+1)%N;
      const ym = (y-1+N)%N, yp = (y+1)%N;
      const nb = s[y*N+xm] + s[y*N+xp] + s[ym*N+x] + s[yp*N+x];
      const dE = 2*s[i]*(J*nb + h);
      if (dE <= 0 || Math.random() < Math.exp(-dE/T)) {
        s[i] = -s[i];
      }
    }
  }

  function metrics() {
    let m=0, e=0;
    for (let y=0; y<N; y++) {
      const yp = (y+1)%N;
      for (let x=0; x<N; x++) {
        const xp = (x+1)%N;
        const i = y*N+x;
        m += s[i];
        e += -J*s[i]*(s[y*N+xp] + s[yp*N+x]) - h*s[i];
      }
    }
    return { m: m/(N*N), e: e/(N*N) };
  }

  function render() {
    const { m, e } = metrics();
    magHistory.push(m);
    if (magHistory.length > HMAX) magHistory.shift();

    const data = img.data;
    for (let i=0; i<N*N; i++) {
      const j = i*4;
      if (s[i] === 1) {
        // electric cyan
        data[j] = 30; data[j+1] = 200; data[j+2] = 230;
      } else {
        // magenta
        data[j] = 200; data[j+1] = 60; data[j+2] = 200;
      }
      data[j+3] = 255;
    }

    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
    const size = Math.min(W,H)*0.94;
    const ox = (W-size)/2, oy = (H-size)/2;
    const off = render._off || (render._off = document.createElement('canvas'));
    off.width = N; off.height = N;
    off.getContext('2d').putImageData(img,0,0);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, ox, oy, size, size);

    // Glow border with magenta-cyan gradient
    const g = ctx.createLinearGradient(ox, oy, ox+size, oy+size);
    g.addColorStop(0, 'rgba(6,182,212,0.7)');
    g.addColorStop(1, 'rgba(232,121,249,0.7)');
    ctx.shadowColor = '#06b6d4';
    ctx.shadowBlur = 16;
    ctx.strokeStyle = g;
    ctx.lineWidth = 2;
    ctx.strokeRect(ox-1, oy-1, size+2, size+2);
    ctx.shadowBlur = 0;

    document.getElementById('sFr').textContent = frame;
    document.getElementById('sM').textContent = m.toFixed(3);
    document.getElementById('sE').textContent = e.toFixed(3);

    drawSpark();
  }

  function drawSpark() {
    const w = sparkCv.clientWidth, hh = sparkCv.clientHeight;
    sparkCv.width = w*dpr; sparkCv.height = hh*dpr;
    sparkCtx.setTransform(dpr,0,0,dpr,0,0);
    sparkCtx.clearRect(0,0,w,hh);
    sparkCtx.fillStyle = 'rgba(0,0,0,0.35)';
    sparkCtx.fillRect(0,0,w,hh);
    // zero line
    sparkCtx.strokeStyle = 'rgba(254,250,224,0.18)';
    sparkCtx.beginPath();
    sparkCtx.moveTo(0, hh/2);
    sparkCtx.lineTo(w, hh/2);
    sparkCtx.stroke();

    if (magHistory.length < 2) return;
    const grad = sparkCtx.createLinearGradient(0,0,w,0);
    grad.addColorStop(0, '#06b6d4');
    grad.addColorStop(1, '#e879f9');
    sparkCtx.strokeStyle = grad;
    sparkCtx.lineWidth = 1.6;
    sparkCtx.beginPath();
    for (let i=0; i<magHistory.length; i++) {
      const x = i/(HMAX-1)*w;
      const y = hh/2 - magHistory[i]*hh*0.45;
      if (i===0) sparkCtx.moveTo(x,y); else sparkCtx.lineTo(x,y);
    }
    sparkCtx.stroke();
  }

  function loop() {
    if (running) {
      for (let k=0; k<sweeps; k++) { sweep(); frame++; }
    }
    render();
    requestAnimationFrame(loop);
  }

  function bind(id, vid, fn, dec) {
    document.getElementById(id).addEventListener('input', e => {
      const v = +e.target.value;
      document.getElementById(vid).textContent = dec===0 ? v : v.toFixed(dec);
      fn(v);
    });
  }
  bind('iT','vT', v => T = v, 2);
  bind('iJ','vJ', v => J = v, 2);
  bind('iH','vH', v => h = v, 2);
  bind('iS','vS', v => sweeps = v, 0);

  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      T = +b.dataset.p;
      document.getElementById('iT').value = T;
      document.getElementById('vT').textContent = T.toFixed(2);
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', () => reset(true));

  cv.addEventListener('pointerdown', e => {
    // Click toggles a region of spins
    const rect = cv.getBoundingClientRect();
    const size = Math.min(W,H)*0.94;
    const ox = (W-size)/2, oy = (H-size)/2;
    const cx = ((e.clientX - rect.left - ox)/size*N)|0;
    const cy = ((e.clientY - rect.top - oy)/size*N)|0;
    for (let dy=-6;dy<=6;dy++) for (let dx=-6;dx<=6;dx++) {
      const x = (cx+dx+N)%N, y = (cy+dy+N)%N;
      if (dx*dx+dy*dy<=36) s[y*N+x] = -s[y*N+x];
    }
  });

  reset(true); loop();
})();
</script>
</body>
</html>
