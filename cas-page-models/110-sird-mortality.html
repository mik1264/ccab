<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIRD Mortality — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(330px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend { display:flex; gap:0.7rem; font-size:0.76rem; margin-top:0.5rem; flex-wrap:wrap; }
  .legend span::before { content:''; display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:middle; }
  .legend .s::before { background: var(--accent); }
  .legend .i::before { background: var(--magenta); }
  .legend .r::before { background: var(--sage); }
  .legend .d::before { background: var(--terracotta); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 110</span>
  <h2>SIRD Mortality</h2>
  <p>SIR plus a death compartment D with rate μ. CFR = D/(D+R) settles to μ/(μ+γ). Rising β increases attack rate; rising μ trades recovery for death without changing R₀ (= β/(γ+μ)).</p>

  <div class="control"><label>β contact rate <span id="vb">0.45</span></label><input type="range" id="ib" min="0.05" max="2" step="0.01" value="0.45" /></div>
  <div class="control"><label>γ recovery <span id="vg">0.10</span></label><input type="range" id="ig" min="0.02" max="0.5" step="0.005" value="0.10" /></div>
  <div class="control"><label>μ mortality <span id="vm">0.005</span></label><input type="range" id="im" min="0" max="0.05" step="0.0005" value="0.005" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-p="0.45,0.10,0.005">Mild</button>
    <button class="p" data-p="0.55,0.08,0.015">Moderate</button>
    <button class="p" data-p="0.70,0.07,0.030">Severe</button>
    <button class="p" data-p="1.00,0.05,0.050">Lethal</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0</span></div>
  <div class="stat"><span>I peak</span><span class="v" id="sip">—</span></div>
  <div class="stat"><span>D total</span><span class="v" id="sd">—</span></div>
  <div class="stat"><span>R₀</span><span class="v" id="sR0">—</span></div>
  <div class="stat"><span>CFR</span><span class="v" id="scf">—</span></div>
  <div class="legend"><span class="s">S</span><span class="i">I</span><span class="r">R</span><span class="d">D</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c'); const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() { W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize', resize); resize();

  const SAGE='#8A9A5B', EARTH='#DDA15E', MAGENTA='#e879f9', CYAN='#06b6d4', TERRA='#BC6C25';
  const GRID='rgba(254,250,224,0.08)', AXIS='rgba(254,250,224,0.4)', TXT='rgba(254,250,224,0.7)';

  let beta=0.45, gamma=0.10, mu=0.005;
  let S=0.999, I=0.001, R=0, D=0, t=0, running=true;
  let Ipeak=0;
  const series=[]; const MAX=2000;

  function reset() { S=0.999; I=0.001; R=0; D=0; t=0; Ipeak=0; series.length=0; }

  function f(S,I,R,D) {
    return [ -beta*S*I, beta*S*I - gamma*I - mu*I, gamma*I, mu*I ];
  }
  function rk4(dt) {
    const k1=f(S,I,R,D);
    const k2=f(S+dt/2*k1[0], I+dt/2*k1[1], R+dt/2*k1[2], D+dt/2*k1[3]);
    const k3=f(S+dt/2*k2[0], I+dt/2*k2[1], R+dt/2*k2[2], D+dt/2*k2[3]);
    const k4=f(S+dt*k3[0], I+dt*k3[1], R+dt*k3[2], D+dt*k3[3]);
    S += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    I += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    R += dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
    D += dt/6*(k1[3]+2*k2[3]+2*k3[3]+k4[3]);
    if (S<0) S=0; if (I<0) I=0; if (R<0) R=0; if (D<0) D=0;
    if (I>Ipeak) Ipeak=I;
    t += dt;
  }

  function step() { for (let i=0;i<5;i++) rk4(0.5); series.push([t,S,I,R,D]); if (series.length>MAX) series.shift(); }

  function drawAxes(x,y,w,h,title,xl,yl) {
    ctx.strokeStyle = GRID; ctx.lineWidth=1;
    for (let i=1;i<4;i++) { const py=y+i*h/4; ctx.beginPath(); ctx.moveTo(x,py); ctx.lineTo(x+w,py); ctx.stroke(); }
    ctx.strokeStyle = AXIS; ctx.beginPath();
    ctx.moveTo(x,y); ctx.lineTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    ctx.fillStyle = TXT; ctx.font='12px Nunito'; ctx.fillText(title, x, y-10);
    ctx.font='10px Nunito'; ctx.fillStyle='rgba(254,250,224,0.5)';
    ctx.fillText(xl, x+w-30, y+h+18);
    ctx.save(); ctx.translate(x-44, y+h/2+10); ctx.rotate(-Math.PI/2); ctx.fillText(yl,0,0); ctx.restore();
  }

  function plotLine(x,y,w,h,arr,idx,col,scale=1) {
    if (arr.length<2) return;
    const t0=arr[0][0], t1=arr[arr.length-1][0]; const tspan=Math.max(t1-t0,1);
    ctx.shadowColor=col; ctx.shadowBlur=8; ctx.strokeStyle=col; ctx.lineWidth=2; ctx.beginPath();
    for (let i=0;i<arr.length;i++) {
      const px = x + (arr[i][0]-t0)/tspan*w;
      const py = y+h - arr[i][idx]*scale*h;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke(); ctx.shadowBlur=0;
  }

  function draw() {
    ctx.fillStyle = '#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=380, padT=60, padG=50;
    const col = W - padL - padR;
    const rowH = (H - padT - padG - 50)/2;

    // Top: full SIRD time series
    let y0 = padT;
    drawAxes(padL, y0, col, rowH, 'SIRD compartments over time', 't', 'fraction');
    plotLine(padL, y0, col, rowH, series, 1, CYAN);
    plotLine(padL, y0, col, rowH, series, 2, MAGENTA);
    plotLine(padL, y0, col, rowH, series, 3, SAGE);
    plotLine(padL, y0, col, rowH, series, 4, TERRA);
    ctx.fillStyle=TXT; ctx.font='10px Nunito';
    ctx.fillText('1', padL-12, y0+5); ctx.fillText('0', padL-12, y0+rowH);

    // Bottom: stacked area + CFR over time
    y0 = padT + rowH + padG;
    drawAxes(padL, y0, col, rowH, 'Stacked outcomes (R + D) and instantaneous CFR', 't', 'cumulative');
    if (series.length>1) {
      const t0=series[0][0], t1=series[series.length-1][0]; const tspan=Math.max(t1-t0,1);
      // Stacked: D bottom (terra), R on top (sage)
      ctx.fillStyle = TERRA; ctx.globalAlpha=0.9; ctx.beginPath();
      ctx.moveTo(padL, y0+rowH);
      for (let i=0;i<series.length;i++) {
        const px = padL + (series[i][0]-t0)/tspan*col;
        const py = y0+rowH - series[i][4]*rowH;
        ctx.lineTo(px,py);
      }
      ctx.lineTo(padL+col, y0+rowH); ctx.closePath(); ctx.fill();
      ctx.fillStyle = SAGE; ctx.globalAlpha=0.7; ctx.beginPath();
      ctx.moveTo(padL, y0+rowH);
      for (let i=0;i<series.length;i++) {
        const px = padL + (series[i][0]-t0)/tspan*col;
        const py = y0+rowH - (series[i][3]+series[i][4])*rowH;
        ctx.lineTo(px,py);
      }
      // close along bottom of D
      for (let i=series.length-1;i>=0;i--) {
        const px = padL + (series[i][0]-t0)/tspan*col;
        const py = y0+rowH - series[i][4]*rowH;
        ctx.lineTo(px,py);
      }
      ctx.closePath(); ctx.fill(); ctx.globalAlpha=1;

      // CFR overlay
      ctx.shadowColor=EARTH; ctx.shadowBlur=10; ctx.strokeStyle=EARTH; ctx.lineWidth=2.4; ctx.beginPath();
      let started=false;
      for (let i=0;i<series.length;i++) {
        const denom = series[i][3]+series[i][4];
        if (denom<1e-5) continue;
        const cfr = series[i][4]/denom;
        const px = padL + (series[i][0]-t0)/tspan*col;
        const py = y0+rowH - cfr*rowH;
        if (!started) { ctx.moveTo(px,py); started=true; } else ctx.lineTo(px,py);
      }
      ctx.stroke(); ctx.shadowBlur=0;
      // limit line μ/(μ+γ)
      const cfrLim = mu/(mu+gamma);
      const yL = y0+rowH - cfrLim*rowH;
      ctx.strokeStyle='rgba(232,121,249,0.5)'; ctx.lineWidth=1.2; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.moveTo(padL,yL); ctx.lineTo(padL+col,yL); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=MAGENTA; ctx.font='10px Nunito';
      ctx.fillText('CFR_lim = μ/(μ+γ) = '+(cfrLim*100).toFixed(2)+'%', padL+col-180, yL-4);
    }
    ctx.fillStyle=TXT; ctx.font='10px Nunito';
    ctx.fillText('1', padL-12, y0+5); ctx.fillText('0', padL-12, y0+rowH);

    document.getElementById('st').textContent = t.toFixed(0);
    document.getElementById('sip').textContent = (Ipeak*100).toFixed(2)+'%';
    document.getElementById('sd').textContent = (D*100).toFixed(2)+'%';
    document.getElementById('sR0').textContent = (beta/(gamma+mu)).toFixed(2);
    const cfrL = mu/(mu+gamma);
    document.getElementById('scf').textContent = (cfrL*100).toFixed(2)+'%';
  }

  function loop() { if (running) step(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,setter,dec=2) {
    document.getElementById(id).addEventListener('input', e => {
      const v=+e.target.value;
      let txt = v.toFixed(dec);
      if (id==='im') txt = v.toFixed(4);
      if (id==='ig') txt = v.toFixed(3);
      document.getElementById(vid).textContent = txt;
      setter(v);
    });
  }
  bind('ib','vb', v=>{ beta=v; });
  bind('ig','vg', v=>{ gamma=v; }, 3);
  bind('im','vm', v=>{ mu=v; }, 4);

  document.querySelectorAll('button.p').forEach(b => {
    b.addEventListener('click', () => {
      const v=b.dataset.p.split(',').map(Number);
      beta=v[0]; gamma=v[1]; mu=v[2];
      document.getElementById('ib').value=v[0]; document.getElementById('vb').textContent=v[0].toFixed(2);
      document.getElementById('ig').value=v[1]; document.getElementById('vg').textContent=v[1].toFixed(3);
      document.getElementById('im').value=v[2]; document.getElementById('vm').textContent=v[2].toFixed(4);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => { running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
