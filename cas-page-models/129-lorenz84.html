<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lorenz-84 Atmospheric Circulation — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12); border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; background: linear-gradient(90deg, var(--earth), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600; background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream); border:none; border-radius:9px; cursor:pointer; transition:all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Lorenz-84</h2>
  <p>Lorenz's 3D climate model: dX/dt=−Y²−Z²−aX+aF; dY/dt=XY−bXZ−Y+G; dZ/dt=bXY+XZ−Z. X = jet, Y, Z = wave amplitudes. Chaotic regime change with seasonal F, G.</p>

  <div class="control"><label>a (damping) <span id="va">0.25</span></label><input type="range" id="ia" min="0.1" max="0.6" step="0.005" value="0.25" /></div>
  <div class="control"><label>b (coupling) <span id="vb">4.0</span></label><input type="range" id="ib" min="1" max="8" step="0.05" value="4.0" /></div>
  <div class="control"><label>F (zonal) <span id="vF">8.0</span></label><input type="range" id="iF" min="0" max="14" step="0.05" value="8.0" /></div>
  <div class="control"><label>G (eddy) <span id="vG">1.00</span></label><input type="range" id="iG" min="0" max="3" step="0.01" value="1.00" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="0.25,4,8,1.0">Chaotic</button>
    <button class="p" data-p="0.25,4,2,1.0">Steady</button>
    <button class="p" data-p="0.25,4,12,1.5">Stormy</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>X (jet)</span><span class="v" id="sX">—</span></div>
  <div class="stat"><span>Y</span><span class="v" id="sY">—</span></div>
  <div class="stat"><span>Z</span><span class="v" id="sZ">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  let a=0.25, b=4.0, F=8.0, G=1.0;
  let X=1.0, Y=0.5, Z=0.5, t=0, running=true;
  const series=[]; const traj=[]; const MAX=1500, TRAJ=4000;

  function deriv(X,Y,Z){
    return [
      -Y*Y - Z*Z - a*X + a*F,
       X*Y - b*X*Z - Y + G,
       b*X*Y + X*Z - Z
    ];
  }
  function reset(X0,Y0,Z0){ X=X0||1.0; Y=Y0||0.5; Z=Z0||0.5; t=0; series.length=0; traj.length=0; }

  function rk4(dt){
    const k1=deriv(X,Y,Z);
    const k2=deriv(X+dt/2*k1[0], Y+dt/2*k1[1], Z+dt/2*k1[2]);
    const k3=deriv(X+dt/2*k2[0], Y+dt/2*k2[1], Z+dt/2*k2[2]);
    const k4=deriv(X+dt*k3[0],   Y+dt*k3[1],   Z+dt*k3[2]);
    X += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    Y += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    Z += dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
    t += dt;
  }
  function tick(){
    const dt=0.02;
    for (let i=0;i<5;i++) rk4(dt);
    series.push({t,X,Y,Z});
    if (series.length>MAX) series.shift();
    traj.push({X,Y,Z});
    if (traj.length>TRAJ) traj.shift();
    document.getElementById('st').textContent=t.toFixed(2);
    document.getElementById('sX').textContent=X.toFixed(3);
    document.getElementById('sY').textContent=Y.toFixed(3);
    document.getElementById('sZ').textContent=Z.toFixed(3);
  }

  // 3D rotation
  let rotA=0;
  function project(p, cx, cy, scale){
    const cosA=Math.cos(rotA), sinA=Math.sin(rotA);
    const x = p.X*cosA + p.Y*sinA;
    const z = -p.X*sinA + p.Y*cosA;
    const y = p.Z;
    // simple isometric-ish
    const px = cx + x*scale;
    const py = cy - y*scale + z*scale*0.3;
    return [px,py,z];
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=360, padT=50, padB=40;
    const totW=W-padL-padR;
    // Layout: left half phase 3D, right half time series stacked
    const phaseW = totW*0.55;
    const phaseH = H - padT - padB;
    const tsX0 = padL + phaseW + 30;
    const tsW = totW - phaseW - 30;

    // === Phase portrait ===
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Phase space (rotating)', padL, padT-12);
    const cx=padL+phaseW/2, cy=padT+phaseH/2;
    const scale = Math.min(phaseW, phaseH)*0.18;

    rotA += 0.005;

    // axes
    ctx.strokeStyle='rgba(254,250,224,0.18)'; ctx.lineWidth=1;
    const ax = (vx,vy,vz)=>{
      const p1 = project({X:0,Y:0,Z:0}, cx, cy, scale);
      const p2 = project({X:vx,Y:vy,Z:vz}, cx, cy, scale);
      ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.stroke();
    };
    ax(2.5,0,0); ax(0,2.5,0); ax(0,0,2.5);

    // Trajectory
    if (traj.length>1){
      for (let i=1;i<traj.length;i++){
        const t = i/traj.length;
        const p1 = project(traj[i-1], cx, cy, scale);
        const p2 = project(traj[i], cx, cy, scale);
        const r = Math.round(232 + (251-232)*t);
        const g = Math.round(121 + (146-121)*t);
        const b = Math.round(249 + (60-249)*t);
        ctx.strokeStyle = `rgba(${r},${g},${b},${0.3+0.7*t})`;
        ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.stroke();
      }
    }
    // current
    const p = project({X,Y,Z}, cx, cy, scale);
    ctx.fillStyle='#fb923c';
    ctx.beginPath(); ctx.arc(p[0],p[1],6,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(254,250,224,0.6)'; ctx.lineWidth=1.5; ctx.stroke();

    ctx.fillStyle='rgba(254,250,224,0.5)'; ctx.font='11px Nunito';
    ctx.fillText('X (zonal jet)', cx+phaseW*0.32, cy+phaseH*0.05);
    ctx.fillText('Y, Z (eddies)', cx-30, padT+18);

    // === Time series stacked ===
    const segH = (phaseH-30)/3;
    function plotTS(yKey, color, y0, label){
      ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
      ctx.fillText(label, tsX0, y0-6);
      ctx.strokeStyle='rgba(254,250,224,0.1)';
      ctx.beginPath(); ctx.moveTo(tsX0, y0+segH/2); ctx.lineTo(tsX0+tsW, y0+segH/2); ctx.stroke();
      if (series.length<2) return;
      const t0=series[0].t, t1=series[series.length-1].t, ts=Math.max(t1-t0,1);
      let mn=Infinity, mx=-Infinity;
      for (const s of series){ if (s[yKey]<mn) mn=s[yKey]; if (s[yKey]>mx) mx=s[yKey]; }
      const range = Math.max(mx-mn, 0.5);
      ctx.strokeStyle=color; ctx.lineWidth=1.8;
      ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=tsX0+(s.t-t0)/ts*tsW;
        const py=y0+segH-(s[yKey]-mn)/range*segH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    plotTS('X','#fb923c', padT+15, 'X (jet)');
    plotTS('Y','#06b6d4', padT+15+segH+10, 'Y');
    plotTS('Z','#e879f9', padT+15+(segH+10)*2, 'Z');
  }

  function loop(){ if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,prop,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      if (prop==='a') a=v; if (prop==='b') b=v; if (prop==='F') F=v; if (prop==='G') G=v;
    });
  }
  bind('ia','va','a',3); bind('ib','vb','b'); bind('iF','vF','F'); bind('iG','vG','G');
  document.querySelectorAll('.p').forEach(bn=>{
    bn.addEventListener('click',()=>{
      const [pa,pb,pf,pg]=bn.dataset.p.split(',').map(Number);
      a=pa; b=pb; F=pf; G=pg;
      document.getElementById('ia').value=a; document.getElementById('va').textContent=a.toFixed(2);
      document.getElementById('ib').value=b; document.getElementById('vb').textContent=b.toFixed(2);
      document.getElementById('iF').value=F; document.getElementById('vF').textContent=F.toFixed(2);
      document.getElementById('iG').value=G; document.getElementById('vG').textContent=G.toFixed(2);
      reset(1.0, 0.5, 0.5);
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', ()=>reset(1.0,0.5,0.5));
  reset(1.0, 0.5, 0.5); loop();
})();
</script>
</body>
</html>
