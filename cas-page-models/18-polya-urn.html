<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pólya Urn — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423; --bg:#0e1218; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(20,28,38,0.78); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border:1px solid rgba(254,250,224,0.15); border-radius:18px; padding:1.1rem 1.2rem; color: var(--cream); max-height: calc(100vh - 36px); overflow-y:auto; }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: var(--sage); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.9rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--sage); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.5rem 0.6rem; font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600; background: var(--sage); color:var(--cream); border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
  button:hover { background: var(--moss); transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  button.secondary:hover { background: rgba(254,250,224,0.25); }
  .stat { display:flex; justify-content:space-between; font-size:0.8rem; padding: 0.25rem 0; border-bottom: 1px dashed rgba(254,250,224,0.1); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM · 18</span>
  <h2>Pólya Urn</h2>
  <p>Draw a ball, return it plus k of the same color. Each line is one independent run of the proportion of red balls — runs lock into different long-run frequencies. Path-dependence and lock-in visualized.</p>

  <div class="control">
    <label>Runs <span id="vR">50</span></label>
    <input type="range" id="iR" min="5" max="200" step="5" value="50" />
  </div>
  <div class="control">
    <label>Reinforcement k <span id="vK">1</span></label>
    <input type="range" id="iK" min="1" max="10" step="1" value="1" />
  </div>
  <div class="control">
    <label>Initial red balls <span id="vIR">1</span></label>
    <input type="range" id="iIR" min="1" max="20" step="1" value="1" />
  </div>
  <div class="control">
    <label>Initial blue balls <span id="vIB">1</span></label>
    <input type="range" id="iIB" min="1" max="20" step="1" value="1" />
  </div>
  <div class="control">
    <label>Draws / frame <span id="vD">200</span></label>
    <input type="range" id="iD" min="20" max="2000" step="20" value="200" />
  </div>

  <div class="btnrow" style="margin-bottom:0.9rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Draws</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Mean red prop</span><span class="v" id="sM">—</span></div>
  <div class="stat"><span>Std. deviation</span><span class="v" id="sS">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0, dpr = Math.min(window.devicePixelRatio||1, 2);
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  let R=50, k=1, ir=1, ib=1, drawsPerFrame=200;
  let urns; let traces; let step=0; let running=true;
  const MAX_TRACE = 600;

  function init() {
    R = +document.getElementById('iR').value;
    k = +document.getElementById('iK').value;
    ir = +document.getElementById('iIR').value;
    ib = +document.getElementById('iIB').value;
    drawsPerFrame = +document.getElementById('iD').value;
    urns = []; traces = [];
    for (let i=0;i<R;i++) {
      urns.push({ red: ir, blue: ib });
      traces.push([ ir/(ir+ib) ]);
    }
    step=0;
    document.getElementById('vR').textContent = R;
    document.getElementById('vK').textContent = k;
    document.getElementById('vIR').textContent = ir;
    document.getElementById('vIB').textContent = ib;
    document.getElementById('vD').textContent = drawsPerFrame;
  }

  function tick() {
    for (let d=0; d<drawsPerFrame; d++) {
      for (let i=0;i<R;i++) {
        const u = urns[i];
        const total = u.red + u.blue;
        if (Math.random() < u.red/total) u.red += k;
        else u.blue += k;
      }
      for (let i=0;i<R;i++) {
        const u = urns[i];
        traces[i].push(u.red/(u.red+u.blue));
      }
      step++;
    }
    for (let i=0;i<R;i++) {
      while (traces[i].length > MAX_TRACE) traces[i].shift();
    }
    let s=0, s2=0;
    for (let i=0;i<R;i++) { const v=urns[i].red/(urns[i].red+urns[i].blue); s+=v; s2+=v*v; }
    const m = s/R; const v = Math.max(0, s2/R - m*m);
    document.getElementById('sStep').textContent = step;
    document.getElementById('sM').textContent = m.toFixed(3);
    document.getElementById('sS').textContent = Math.sqrt(v).toFixed(3);
  }

  function draw() {
    ctx.fillStyle = '#0e1218';
    ctx.fillRect(0,0,W,H);
    const pad = 70;
    const px = pad, py = pad, pw = W - pad*2, ph = H - pad*2;
    // axis
    ctx.strokeStyle = 'rgba(254,250,224,0.2)';
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py+ph); ctx.lineTo(px+pw, py+ph); ctx.stroke();
    // 0.5 line
    ctx.strokeStyle = 'rgba(221,161,94,0.3)';
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(px, py+ph/2); ctx.lineTo(px+pw, py+ph/2); ctx.stroke();
    ctx.setLineDash([]);
    // traces
    for (let i=0;i<R;i++) {
      const t = traces[i];
      if (t.length<2) continue;
      const v = urns[i].red/(urns[i].red+urns[i].blue);
      // hue from red→blue
      const hue = (1-v)*200 + v*20;
      ctx.strokeStyle = `hsla(${hue},60%,55%,0.5)`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let j=0;j<t.length;j++) {
        const x = px + pw * (j/(MAX_TRACE-1));
        const y = py + ph * (1 - t[j]);
        if (j===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
    // labels
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '12px Nunito';
    ctx.fillText('1.0', px-26, py+6);
    ctx.fillText('0.5', px-26, py+ph/2+4);
    ctx.fillText('0.0', px-26, py+ph+4);
    ctx.fillText('Pólya urn: red proportion across runs', px+pw/2-130, py-15);
  }

  function loop() {
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  ['iR','iK','iIR','iIB','iD'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
      const m={iR:'vR',iK:'vK',iIR:'vIR',iIB:'vIB',iD:'vD'};
      document.getElementById(m[id]).textContent = e.target.value;
      if (id==='iD') drawsPerFrame=+e.target.value;
      else init();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => { running=!running; e.target.textContent = running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
