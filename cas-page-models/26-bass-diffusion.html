<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bass Diffusion — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend {
    display:flex; gap:1rem; font-size:0.8rem; margin-top:0.5rem; flex-wrap:wrap;
  }
  .legend span::before {
    content:''; display:inline-block; width:10px; height:10px;
    border-radius:3px; margin-right:5px; vertical-align: middle;
  }
  .legend .a::before { background: var(--terracotta); }
  .legend .b::before { background: var(--sage); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 26</span>
  <h2>Bass Diffusion</h2>
  <p>dF/dt = (p + qF)(1−F). Innovators (p) start; imitators (q) drive an S-curve. Adoption rate peaks then declines as the market saturates.</p>

  <div class="control"><label>p innovation <span id="vp">0.030</span></label><input type="range" id="ip" min="0.001" max="0.1" step="0.001" value="0.030" /></div>
  <div class="control"><label>q imitation <span id="vq">0.380</span></label><input type="range" id="iq" min="0.05" max="1" step="0.005" value="0.380" /></div>
  <div class="control"><label>M market size <span id="vm">10000</span></label><input type="range" id="im" min="100" max="100000" step="100" value="10000" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>F (fraction)</span><span class="v" id="sF">—</span></div>
  <div class="stat"><span>cumulative adopters</span><span class="v" id="sCum">—</span></div>
  <div class="stat"><span>adoption rate</span><span class="v" id="sRate">—</span></div>
  <div class="stat"><span>peak rate</span><span class="v" id="sPeak">—</span></div>
  <div class="legend"><span class="a">adoption rate</span><span class="b">cumulative F</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize',resize); resize();

  const C_RATE='#BC6C25', C_F='#8A9A5B', GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  let p=0.030, q=0.380, M=10000;
  let F=0, t=0, running=true, peakRate=0;
  const series=[]; const MAX=2000;
  const dt=0.05;

  function reset(){ F=0; t=0; series.length=0; peakRate=0; }

  function step(){
    const f=(F)=> (p + q*F)*(1-F);
    const k1=f(F);
    const k2=f(F+dt/2*k1);
    const k3=f(F+dt/2*k2);
    const k4=f(F+dt*k3);
    F += dt/6*(k1+2*k2+2*k3+k4);
    if(F>1) F=1; if(F<0) F=0;
    t += dt;
  }

  function tick(){
    for(let i=0;i<2;i++) step();
    const rate = (p + q*F)*(1-F)*M;
    if(rate>peakRate) peakRate=rate;
    series.push({t,F,rate});
    if(series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sF').textContent=F.toFixed(4);
    document.getElementById('sCum').textContent=(F*M).toFixed(0);
    document.getElementById('sRate').textContent=rate.toFixed(2);
    document.getElementById('sPeak').textContent=peakRate.toFixed(2);
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if(series.length<2) return;
    const padL=70, padR=360, padT=60, padB=40;
    const totW=W-padL-padR;
    const tsH=(H-padT-padB-50)/2;
    const t0=series[0].t, t1=series[series.length-1].t;
    const tspan=Math.max(t1-t0,1);

    // top: adoption rate
    let maxRate=0.001;
    for(const s of series) if(s.rate>maxRate) maxRate=s.rate;
    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for(let i=0;i<=4;i++){
      const yp=padT+i*tsH/4;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
    }
    ctx.strokeStyle=AXIS;
    ctx.beginPath(); ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+tsH); ctx.lineTo(padL+totW,padT+tsH); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='12px Nunito';
    ctx.fillText('Adoption rate (per unit time)', padL, padT-12);
    ctx.fillText(maxRate.toFixed(0), padL-50, padT+5);
    ctx.fillText('0', padL-15, padT+tsH);

    ctx.strokeStyle=C_RATE; ctx.lineWidth=2.2; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const s=series[i];
      const px=padL+(s.t-t0)/tspan*totW;
      const py=padT+tsH-s.rate/maxRate*tsH;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();

    // bottom: cumulative F
    const ppY0 = padT + tsH + 50;
    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for(let i=0;i<=4;i++){
      const yp=ppY0+i*tsH/4;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
    }
    ctx.strokeStyle=AXIS;
    ctx.beginPath(); ctx.moveTo(padL,ppY0); ctx.lineTo(padL,ppY0+tsH); ctx.lineTo(padL+totW,ppY0+tsH); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.6)';
    ctx.fillText('Cumulative fraction F (S-curve)', padL, ppY0-12);
    ctx.fillText('1.0', padL-30, ppY0+5);
    ctx.fillText('0', padL-15, ppY0+tsH);

    ctx.strokeStyle=C_F; ctx.lineWidth=2.2; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const s=series[i];
      const px=padL+(s.t-t0)/tspan*totW;
      const py=ppY0+tsH-s.F*tsH;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,dec=3){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=dec===0?v.toFixed(0):v.toFixed(dec);
      fn(v);
    });
  }
  bind('ip','vp',v=>p=v,3);
  bind('iq','vq',v=>q=v,3);
  bind('im','vm',v=>{M=v; reset();},0);
  document.getElementById('bRun').addEventListener('click',e=>{running=!running; e.target.textContent=running?'Pause':'Resume';});
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
