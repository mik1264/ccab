<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leslie Matrix Population — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12); border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; background: linear-gradient(90deg, var(--earth), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600; background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream); border:none; border-radius:9px; cursor:pointer; transition:all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Leslie Matrix</h2>
  <p>Age-structured population: n_{t+1} = L · n_t. Top row = fertilities f_i; subdiagonal = survivals s_i. Dominant eigenvalue λ → growth rate; eigenvector → stable age distribution. Animated pyramid.</p>

  <div class="control"><label>Fert peak f_peak <span id="vf">2.4</span></label><input type="range" id="if" min="0.1" max="6" step="0.05" value="2.4" /></div>
  <div class="control"><label>Survival s <span id="vs">0.85</span></label><input type="range" id="is" min="0.4" max="0.99" step="0.005" value="0.85" /></div>
  <div class="control"><label>Fert spread σ <span id="vsg">2.0</span></label><input type="range" id="isg" min="0.5" max="5" step="0.05" value="2.0" /></div>
  <div class="control"><label>Step speed <span id="vsp">10</span></label><input type="range" id="isp" min="1" max="30" step="1" value="10" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="2.4,0.85,2.0">Growing</button>
    <button class="p" data-p="1.0,0.85,2.0">Stable~1</button>
    <button class="p" data-p="0.4,0.7,2.0">Declining</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step t</span><span class="v" id="st">0</span></div>
  <div class="stat"><span>Total N</span><span class="v" id="sN">—</span></div>
  <div class="stat"><span>λ (eigenval)</span><span class="v" id="sL">—</span></div>
  <div class="stat"><span>Growth/step</span><span class="v" id="sG">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  const NAGE = 12;
  let fPeak=2.4, surv=0.85, sigma=2.0, stepSpeed=10;
  let n = new Float64Array(NAGE);
  let nNorm = new Float64Array(NAGE); // stable distribution
  let lambda = 1.0;
  let stepCount=0, running=true;
  const series=[]; const MAX=400;
  let frame=0;

  function buildL(){
    // fertility peaks at age 4-6
    const f = new Array(NAGE).fill(0);
    for (let i=0;i<NAGE;i++){
      const peak=5;
      f[i] = fPeak * Math.exp(-((i-peak)*(i-peak))/(2*sigma*sigma));
    }
    // survival declines with age
    const s = new Array(NAGE-1);
    for (let i=0;i<NAGE-1;i++){
      const decay = Math.pow(surv, 1 + i*0.08);
      s[i] = decay;
    }
    return {f,s};
  }

  function multiply(L, v){
    const out = new Float64Array(NAGE);
    // first row: fertilities
    for (let j=0;j<NAGE;j++) out[0] += L.f[j]*v[j];
    // subdiagonal
    for (let i=1;i<NAGE;i++) out[i] = L.s[i-1]*v[i-1];
    return out;
  }

  // power iteration to find dominant eigenvalue & stable age distribution
  function computeEigen(){
    const L = buildL();
    let v = new Float64Array(NAGE).fill(1);
    let lam = 1;
    for (let it=0; it<200; it++){
      const w = multiply(L, v);
      let mag = 0;
      for (let i=0;i<NAGE;i++) mag += w[i]*w[i];
      mag = Math.sqrt(mag);
      if (mag<1e-30) break;
      lam = mag/Math.sqrt(v.reduce((a,b)=>a+b*b,0));
      for (let i=0;i<NAGE;i++) v[i] = w[i]/mag;
    }
    let sum=0; for (let i=0;i<NAGE;i++) sum += v[i];
    if (sum>0) for (let i=0;i<NAGE;i++) v[i] /= sum;
    nNorm = v;
    lambda = lam;
  }

  function reset(){
    for (let i=0;i<NAGE;i++) n[i]=0;
    n[0]=100; n[1]=80; n[2]=60;
    stepCount=0; series.length=0;
    computeEigen();
  }

  function step(){
    const L = buildL();
    const ntot_old = n.reduce((a,b)=>a+b,0);
    n = multiply(L, n);
    const ntot = n.reduce((a,b)=>a+b,0);
    series.push({t:stepCount, N:ntot});
    if (series.length>MAX) series.shift();
    stepCount++;
    document.getElementById('st').textContent=stepCount;
    document.getElementById('sN').textContent=ntot.toExponential(2);
    document.getElementById('sL').textContent=lambda.toFixed(4);
    document.getElementById('sG').textContent=ntot_old>0?(ntot/ntot_old).toFixed(4):'—';
  }

  function tick(){
    frame++;
    if (frame%Math.max(1,Math.round(31-stepSpeed))===0) step();
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=360, padT=50, padB=40;
    const totW=W-padL-padR;
    const halfH = (H-padT-padB-50)/2;

    // Top: time series log scale
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Total population (log scale) · λ = '+lambda.toFixed(4), padL, padT-12);
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++){const yp=padT+i*halfH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    if (series.length>1){
      const t0=series[0].t, t1=series[series.length-1].t, ts=Math.max(t1-t0,1);
      let lo=Infinity, hi=-Infinity;
      for (const s of series){ const v=Math.log(Math.max(s.N,1e-10)); if (v<lo) lo=v; if (v>hi) hi=v; }
      const range=Math.max(hi-lo,0.5);
      ctx.strokeStyle='#fb923c'; ctx.lineWidth=2.2; ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.t-t0)/ts*totW;
        const py=padT+halfH-(Math.log(Math.max(s.N,1e-10))-lo)/range*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }

    // Bottom: pyramid
    const bY = padT + halfH + 50;
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Age pyramid (current vs stable)  —  age class →', padL, bY-12);
    const cx = padL + totW/2;
    const barW = (totW/2 - 30) / NAGE;
    const maxN = Math.max(...n, 1);
    const maxNorm = Math.max(...nNorm, 0.001);
    for (let i=0;i<NAGE;i++){
      const wCur = (n[i]/maxN) * (totW/2 - 30);
      const wSt = (nNorm[i]/maxNorm) * (totW/2 - 30);
      const yp = bY + halfH - (i+1)*((halfH-10)/NAGE) - 5;
      const h = (halfH-10)/NAGE - 2;
      // current bar (right side)
      const grad = ctx.createLinearGradient(cx, 0, cx+wCur, 0);
      grad.addColorStop(0, 'rgba(251,146,60,0.9)');
      grad.addColorStop(1, 'rgba(232,121,249,0.4)');
      ctx.fillStyle=grad;
      ctx.fillRect(cx, yp, wCur, h);
      // stable distribution outline (left side, mirrored)
      ctx.strokeStyle='rgba(6,182,212,0.7)'; ctx.lineWidth=1.5;
      ctx.strokeRect(cx-wSt, yp, wSt, h);
      // age label
      ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='10px Nunito';
      ctx.fillText(i+'', cx-8, yp+h*0.7);
    }
    // center axis
    ctx.strokeStyle='rgba(254,250,224,0.3)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx, bY+5); ctx.lineTo(cx, bY+halfH-5); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.55)'; ctx.font='11px Nunito';
    ctx.fillText('← stable distribution', padL+20, bY+12);
    ctx.fillText('current population →', cx+50, bY+12);
  }

  function loop(){ if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,prop,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent= (id==='isp')?v.toFixed(0):v.toFixed(dec);
      if (prop==='f') fPeak=v;
      if (prop==='s') surv=v;
      if (prop==='sg') sigma=v;
      if (prop==='sp') stepSpeed=v;
      if (prop!=='sp') computeEigen();
    });
  }
  bind('if','vf','f'); bind('is','vs','s',3); bind('isg','vsg','sg'); bind('isp','vsp','sp',0);
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click',()=>{
      const [pf,ps,psg]=b.dataset.p.split(',').map(Number);
      fPeak=pf; surv=ps; sigma=psg;
      document.getElementById('if').value=fPeak; document.getElementById('vf').textContent=fPeak.toFixed(2);
      document.getElementById('is').value=surv; document.getElementById('vs').textContent=surv.toFixed(3);
      document.getElementById('isg').value=sigma; document.getElementById('vsg').textContent=sigma.toFixed(2);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); loop();
})();
</script>
</body>
</html>
