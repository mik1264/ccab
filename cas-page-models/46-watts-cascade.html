<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Watts Threshold Cascade — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; cursor:crosshair; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .tag-abm {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.6rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag-abm">ABM ✦ 46</span>
  <h2>Watts Threshold Cascade</h2>
  <p>Barabási-Albert scale-free network. Each node activates if its share of activated neighbors meets its private threshold ~ N(μ,σ). Click any node to seed.</p>

  <div class="control"><label>Mean threshold μ <span id="vMu">0.18</span></label><input type="range" id="iMu" min="0.05" max="0.50" step="0.01" value="0.18" /></div>
  <div class="control"><label>Threshold σ <span id="vSig">0.05</span></label><input type="range" id="iSig" min="0.01" max="0.20" step="0.01" value="0.05" /></div>
  <div class="control"><label>BA edges m <span id="vM">2</span></label><input type="range" id="iM" min="1" max="5" step="1" value="2" /></div>

  <div class="btnrow">
    <button class="p" data-p="0.10">Fragile</button>
    <button class="p" data-p="0.18">Critical</button>
    <button class="p" data-p="0.35">Stable</button>
  </div>
  <div class="btnrow">
    <button id="bSeed">Random Seed</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Activated</span><span class="v" id="sAct">0</span></div>
  <div class="stat"><span>Cascade size</span><span class="v" id="sSize">0%</span></div>
  <div class="stat"><span>Largest hub k</span><span class="v" id="sK">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0;
  const dpr = Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize); resize();

  const N = 200;
  let mu = 0.18, sigma = 0.05, m_ba = 2;
  let pos, adj, threshold, active, justActivated, prevActive;
  let step = 0;

  function randn(){ let u=0,v=0; while(!u) u=Math.random(); while(!v) v=Math.random(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }

  function buildBA(){
    adj = Array.from({length:N},()=>new Set());
    // Start with m_ba+1 fully connected
    for (let i=0;i<=m_ba;i++) for (let j=i+1;j<=m_ba;j++){ adj[i].add(j); adj[j].add(i); }
    // Preferential attachment
    const targets = [];
    for (let i=0;i<=m_ba;i++) for (const j of adj[i]) targets.push(i);
    for (let i=m_ba+1;i<N;i++){
      const chosen = new Set();
      while (chosen.size < m_ba){
        const t = targets[(Math.random()*targets.length)|0];
        if (t!==i) chosen.add(t);
      }
      for (const t of chosen){
        adj[i].add(t); adj[t].add(i);
        targets.push(i); targets.push(t);
      }
    }
  }

  function layout(){
    pos = new Array(N);
    // Force-directed-ish: place high-degree at center, low-degree at periphery
    const degs = adj.map(s=>s.size);
    const maxK = Math.max(...degs);
    // Initial circular by degree sort
    const order = [...Array(N).keys()].sort((a,b)=>degs[b]-degs[a]);
    for (let idx=0; idx<N; idx++){
      const i = order[idx];
      const ang = 2*Math.PI*idx/N + (Math.random()-0.5)*0.1;
      const r = 0.30 + 0.55 * (1 - degs[i]/maxK);
      pos[i] = { x: Math.cos(ang)*r, y: Math.sin(ang)*r, vx:0, vy:0 };
    }
    // A few force-directed iterations
    for (let it=0; it<60; it++){
      const fx = new Float32Array(N), fy = new Float32Array(N);
      for (let i=0;i<N;i++) for (let j=i+1;j<N;j++){
        let dx = pos[i].x-pos[j].x, dy = pos[i].y-pos[j].y;
        let d2 = dx*dx+dy*dy+0.001;
        let f = 0.001/d2;
        fx[i]+=dx*f; fy[i]+=dy*f; fx[j]-=dx*f; fy[j]-=dy*f;
      }
      for (let i=0;i<N;i++) for (const j of adj[i]) if (j>i){
        let dx = pos[j].x-pos[i].x, dy = pos[j].y-pos[i].y;
        const d = Math.sqrt(dx*dx+dy*dy)+0.001;
        const f = (d-0.05)*0.05;
        fx[i]+=dx/d*f; fy[i]+=dy/d*f; fx[j]-=dx/d*f; fy[j]-=dy/d*f;
      }
      for (let i=0;i<N;i++){
        pos[i].x += fx[i]*0.5; pos[i].y += fy[i]*0.5;
        const r = Math.sqrt(pos[i].x*pos[i].x+pos[i].y*pos[i].y);
        if (r>0.95){ pos[i].x*=0.95/r; pos[i].y*=0.95/r; }
      }
    }
  }

  function init(){
    buildBA();
    layout();
    threshold = new Float32Array(N);
    for (let i=0;i<N;i++) threshold[i] = Math.max(0.01, mu + sigma*randn());
    active = new Uint8Array(N);
    justActivated = new Set();
    prevActive = new Set();
    step = 0;
    let maxK = 0; for (let i=0;i<N;i++) maxK = Math.max(maxK, adj[i].size);
    document.getElementById('sK').textContent = maxK;
    updateStats();
  }

  function tick(){
    prevActive = new Set(justActivated);
    const newAct = [];
    for (let i=0;i<N;i++){
      if (active[i]) continue;
      if (adj[i].size===0) continue;
      let count = 0;
      for (const j of adj[i]) if (active[j]) count++;
      const frac = count/adj[i].size;
      if (frac >= threshold[i]) newAct.push(i);
    }
    justActivated = new Set(newAct);
    for (const i of newAct) active[i] = 1;
    step++;
    updateStats();
  }

  function updateStats(){
    let n = 0;
    for (let i=0;i<N;i++) if (active[i]) n++;
    document.getElementById('sStep').textContent = step;
    document.getElementById('sAct').textContent = n;
    document.getElementById('sSize').textContent = ((n/N)*100).toFixed(1)+'%';
  }

  function activateNode(i){
    if (!active[i]){
      active[i]=1;
      justActivated.add(i);
      updateStats();
    }
  }

  function draw(){
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
    const cx = W*0.45, cy = H/2;
    const R = Math.min(W*0.36, H*0.45);
    // edges
    ctx.lineWidth = 0.6;
    ctx.strokeStyle = 'rgba(254,250,224,0.07)';
    ctx.beginPath();
    for (let i=0;i<N;i++){
      for (const j of adj[i]) if (j>i){
        ctx.moveTo(cx+pos[i].x*R, cy+pos[i].y*R);
        ctx.lineTo(cx+pos[j].x*R, cy+pos[j].y*R);
      }
    }
    ctx.stroke();
    // newly-activated cyan flash edges
    ctx.strokeStyle = 'rgba(6,182,212,0.85)';
    ctx.lineWidth = 1.6;
    ctx.shadowColor='rgba(6,182,212,0.8)';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    for (const i of justActivated){
      for (const j of adj[i]) if (active[j] && !justActivated.has(j) || prevActive.has(j)){
        ctx.moveTo(cx+pos[i].x*R, cy+pos[i].y*R);
        ctx.lineTo(cx+pos[j].x*R, cy+pos[j].y*R);
      }
    }
    ctx.stroke();
    ctx.shadowBlur=0;
    // nodes
    for (let i=0;i<N;i++){
      const x = cx+pos[i].x*R, y = cy+pos[i].y*R;
      const k = adj[i].size;
      const r = 3 + Math.sqrt(k)*1.4;
      if (active[i]){
        const isJust = justActivated.has(i);
        ctx.fillStyle = isJust ? '#fb923c' : '#e879f9';
        ctx.shadowColor = isJust ? 'rgba(251,146,60,1)' : 'rgba(232,121,249,0.85)';
        ctx.shadowBlur = isJust ? 18 : 10;
      } else {
        ctx.fillStyle = '#3a4555';
        ctx.shadowBlur = 0;
      }
      ctx.beginPath(); ctx.arc(x,y,r,0,2*Math.PI); ctx.fill();
    }
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='600 12px Nunito';
    ctx.fillText('Click any node to seed a cascade', cx - R, cy + R + 28);
  }

  let lastTick = 0;
  function loop(ts){
    if (ts - lastTick > 280){
      tick();
      lastTick = ts;
    }
    draw();
    requestAnimationFrame(loop);
  }

  cv.addEventListener('pointerdown', e=>{
    const cx = W*0.45, cy = H/2;
    const R = Math.min(W*0.36, H*0.45);
    const rect = cv.getBoundingClientRect();
    const x = e.clientX-rect.left, y = e.clientY-rect.top;
    let best=-1, bd=1e9;
    for (let i=0;i<N;i++){
      const dx=cx+pos[i].x*R-x, dy=cy+pos[i].y*R-y;
      const d2 = dx*dx+dy*dy;
      if (d2<bd){bd=d2; best=i;}
    }
    if (best>=0 && bd<400) activateNode(best);
  });

  document.getElementById('iMu').addEventListener('input', e=>{
    mu=+e.target.value;
    document.getElementById('vMu').textContent=mu.toFixed(2);
    init();
  });
  document.getElementById('iSig').addEventListener('input', e=>{
    sigma=+e.target.value;
    document.getElementById('vSig').textContent=sigma.toFixed(2);
    init();
  });
  document.getElementById('iM').addEventListener('input', e=>{
    m_ba=+e.target.value;
    document.getElementById('vM').textContent=m_ba;
    init();
  });
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click', ()=>{
      mu = +b.dataset.p;
      document.getElementById('iMu').value = mu;
      document.getElementById('vMu').textContent = mu.toFixed(2);
      init();
    });
  });
  document.getElementById('bSeed').addEventListener('click', ()=>{
    const i = (Math.random()*N)|0;
    activateNode(i);
  });
  document.getElementById('bReset').addEventListener('click', init);

  init(); requestAnimationFrame(loop);
})();
</script>
</body>
</html>
