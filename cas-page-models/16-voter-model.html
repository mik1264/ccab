<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voter Model — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423; --bg:#0e1218; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(20,28,38,0.78); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border:1px solid rgba(254,250,224,0.15); border-radius:18px; padding:1.1rem 1.2rem; color: var(--cream); max-height: calc(100vh - 36px); overflow-y:auto; }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: var(--sage); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.9rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--sage); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.5rem 0.6rem; font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600; background: var(--sage); color:var(--cream); border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
  button:hover { background: var(--moss); transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  button.secondary:hover { background: rgba(254,250,224,0.25); }
  .stat { display:flex; justify-content:space-between; font-size:0.8rem; padding: 0.25rem 0; border-bottom: 1px dashed rgba(254,250,224,0.1); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM · 16</span>
  <h2>Voter Model</h2>
  <p>Each step, a random cell adopts the opinion of a random neighbor. Domains coarsen until consensus — unless small noise (random flips) keeps things alive. The simplest model of opinion dynamics.</p>

  <div class="control">
    <label>Grid size <span id="vN">200</span></label>
    <input type="range" id="iN" min="80" max="300" step="10" value="200" />
  </div>
  <div class="control">
    <label>Updates / frame <span id="vU">8000</span></label>
    <input type="range" id="iU" min="500" max="40000" step="500" value="8000" />
  </div>
  <div class="control">
    <label>Noise (flip prob) <span id="vNo">0.000</span></label>
    <input type="range" id="iNo" min="0" max="0.005" step="0.0001" value="0.000" />
  </div>

  <div class="btnrow" style="margin-bottom:0.9rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Opinion 1 share</span><span class="v" id="sShare">—</span></div>
  <div class="stat"><span>Domains</span><span class="v" id="sDom">—</span></div>
  <div class="stat"><span>Boundary frac</span><span class="v" id="sB">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0, dpr = Math.min(window.devicePixelRatio||1, 2);
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  let N=200, updates=8000, noise=0;
  let grid, step=0, running=true, frameCount=0;
  let img;

  function init() {
    N = +document.getElementById('iN').value;
    grid = new Uint8Array(N*N);
    for (let i=0;i<N*N;i++) grid[i] = Math.random()<0.5 ? 0 : 1;
    step=0; frameCount=0;
    document.getElementById('vN').textContent = N;
  }

  function tick() {
    for (let k=0;k<updates;k++) {
      if (Math.random()<noise) {
        const i = (Math.random()*N*N)|0;
        grid[i] = 1 - grid[i];
        continue;
      }
      const r = (Math.random()*N)|0, c = (Math.random()*N)|0;
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      const d = dirs[(Math.random()*4)|0];
      const rr=(r+d[0]+N)%N, cc=(c+d[1]+N)%N;
      grid[r*N+c] = grid[rr*N+cc];
    }
    step += updates;
    frameCount++;
    if (frameCount % 4 === 0) updateStats();
  }

  function updateStats() {
    let s=0; for (let i=0;i<N*N;i++) s += grid[i];
    // count domains via flood fill (rough — sample)
    const seen = new Uint8Array(N*N);
    let domains=0; let boundary=0; let edges=0;
    const stack=[];
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      const i = r*N+c;
      if (!seen[i]) {
        domains++;
        stack.push(i); seen[i]=1;
        const v = grid[i];
        while (stack.length) {
          const j = stack.pop();
          const jr = (j/N)|0, jc = j%N;
          const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
          for (const [dr,dc] of dirs) {
            const nr=(jr+dr+N)%N, nc=(jc+dc+N)%N;
            const k = nr*N+nc;
            if (!seen[k] && grid[k]===v) { seen[k]=1; stack.push(k); }
          }
        }
      }
    }
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      const v = grid[r*N+c];
      const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
      for (const [dr,dc] of dirs) {
        const nr=(r+dr+N)%N, nc=(c+dc+N)%N;
        edges++;
        if (grid[nr*N+nc]!==v) boundary++;
      }
    }
    document.getElementById('sStep').textContent = step;
    document.getElementById('sShare').textContent = (s/(N*N)).toFixed(3);
    document.getElementById('sDom').textContent = domains;
    document.getElementById('sB').textContent = (boundary/edges).toFixed(3);
  }

  function draw() {
    ctx.fillStyle = '#0e1218';
    ctx.fillRect(0,0,W,H);
    const cell = Math.min(W,H)/N;
    const ox = (W - cell*N)/2, oy = (H - cell*N)/2;
    if (!img || img.width !== N) img = ctx.createImageData(N, N);
    const d = img.data;
    for (let i=0;i<N*N;i++) {
      const v = grid[i];
      const k = i*4;
      if (v===1) { d[k]=221; d[k+1]=161; d[k+2]=94; }
      else        { d[k]=138; d[k+1]=154; d[k+2]=91; }
      d[k+3]=255;
    }
    // draw via temp canvas for crisp scaling
    const tmp = document.createElement('canvas');
    tmp.width = N; tmp.height = N;
    tmp.getContext('2d').putImageData(img,0,0);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(tmp, ox, oy, cell*N, cell*N);
  }

  function loop() {
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('iN').addEventListener('input', e => { document.getElementById('vN').textContent = e.target.value; init(); });
  document.getElementById('iU').addEventListener('input', e => { updates=+e.target.value; document.getElementById('vU').textContent = updates; });
  document.getElementById('iNo').addEventListener('input', e => { noise=+e.target.value; document.getElementById('vNo').textContent = noise.toFixed(4); });
  document.getElementById('bRun').addEventListener('click', e => { running=!running; e.target.textContent = running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
