<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eroding Goals — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 137</span>
  <h2>Eroding Goals</h2>
  <p>Senge's "drifting goals" archetype. Goal G slowly drifts down toward State S whenever a gap persists. Effort E shrinks as gap shrinks → state worsens → goal lowered further. A reinforcing decline disguised as adjustment.</p>

  <div class="control"><label>Goal erosion τG <span id="vG">0.020</span></label><input type="range" id="iG" min="0" max="0.10" step="0.001" value="0.020" /></div>
  <div class="control"><label>State adjustment k <span id="vK">0.10</span></label><input type="range" id="iK" min="0.01" max="0.5" step="0.005" value="0.10" /></div>
  <div class="control"><label>External pressure p <span id="vP">0.04</span></label><input type="range" id="iP" min="0" max="0.2" step="0.001" value="0.04" /></div>
  <div class="control"><label>Effort delay τE <span id="vTe">2.0</span></label><input type="range" id="iTe" min="0.5" max="8" step="0.1" value="2.0" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-p="0.020,0.10,0.04,2.0">Drifting</button>
    <button class="p" data-p="0.0,0.15,0.04,1.0">Anchored</button>
    <button class="p" data-p="0.05,0.05,0.06,3.0">Severe drift</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>Goal G</span><span class="v" id="sG">—</span></div>
  <div class="stat"><span>State S</span><span class="v" id="sS">—</span></div>
  <div class="stat"><span>Gap</span><span class="v" id="sGp">—</span></div>
  <div class="stat"><span>Effort E</span><span class="v" id="sE">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize); resize();

  let tauG = 0.020, kS = 0.10, press = 0.04, tauE = 2.0;
  let G=1.0, S=0.5, E=0.5, t=0;
  let running = true;
  const series = [];
  const MAX = 4000;

  function reset() { G=1.0; S=0.5; E=0.5; t=0; series.length=0; }

  function deriv(G,S,E) {
    const gap = G - S;
    // desired effort proportional to gap
    const desiredE = Math.max(0, gap)*0.8;
    const dE = (desiredE - E)/tauE;
    const dS = kS*E - press;       // effort raises state, pressure erodes it
    const dG = -tauG*Math.max(gap, 0); // goal drifts down when gap is positive
    return [dG, dS, dE];
  }

  function rk4(dt) {
    const [a1,b1,c1] = deriv(G, S, E);
    const [a2,b2,c2] = deriv(G + dt/2*a1, S + dt/2*b1, E + dt/2*c1);
    const [a3,b3,c3] = deriv(G + dt/2*a2, S + dt/2*b2, E + dt/2*c2);
    const [a4,b4,c4] = deriv(G + dt*a3, S + dt*b3, E + dt*c3);
    G += dt/6*(a1 + 2*a2 + 2*a3 + a4);
    S += dt/6*(b1 + 2*b2 + 2*b3 + b4);
    E += dt/6*(c1 + 2*c2 + 2*c3 + c4);
    if (G<0) G=0; if (S<0) S=0; if (E<0) E=0;
    if (G>1.5) G=1.5; if (S>1.5) S=1.5;
    t += dt;
  }

  function tick() {
    const dt = 0.2;
    for (let i=0;i<2;i++) rk4(dt);
    series.push({t, G, S, E});
    if (series.length > MAX) series.shift();
    document.getElementById('st').textContent = t.toFixed(1);
    document.getElementById('sG').textContent = G.toFixed(3);
    document.getElementById('sS').textContent = S.toFixed(3);
    document.getElementById('sGp').textContent = (G-S).toFixed(3);
    document.getElementById('sE').textContent = E.toFixed(3);
    if (t>200) running = false;
  }

  function draw() {
    ctx.fillStyle = '#06080d'; ctx.fillRect(0,0,W,H);
    if (series.length<2) return;

    const padL=80, padR=370, padT=70, padB=60;
    const totW = W - padL - padR;
    const sH = (H - padT - padB - 60);
    const tsH = sH * 0.55;
    const cdH = sH * 0.40;
    const cdY = padT + tsH + 60;

    const t1 = series[series.length-1].t;
    const tspan = Math.max(t1, 80);

    // === Top: time series of G, S, E ===
    ctx.fillStyle = 'rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('Goal G drifts toward State S — effort E follows the shrinking gap', padL, padT-12);

    ctx.strokeStyle = 'rgba(254,250,224,0.07)';
    for (let i=0;i<=4;i++) {
      const yp = padT + i*tsH/4;
      ctx.beginPath(); ctx.moveTo(padL, yp); ctx.lineTo(padL+totW, yp); ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(254,250,224,0.4)';
    ctx.beginPath();
    ctx.moveTo(padL, padT); ctx.lineTo(padL, padT+tsH); ctx.lineTo(padL+totW, padT+tsH); ctx.stroke();

    ctx.fillStyle = 'rgba(254,250,224,0.55)'; ctx.font='10px Nunito';
    ctx.fillText('1.5', padL-25, padT+5);
    ctx.fillText('0', padL-15, padT+tsH);

    const VMAX = 1.5;
    function plotLine(prop, color, glow, dashed) {
      ctx.strokeStyle = color; ctx.lineWidth = 2;
      ctx.shadowBlur = glow; ctx.shadowColor = color;
      if (dashed) ctx.setLineDash([5,4]);
      ctx.beginPath();
      for (let i=0;i<series.length;i++) {
        const s = series[i];
        const px = padL + s.t/tspan*totW;
        const py = padT + tsH - s[prop]/VMAX*tsH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
      ctx.shadowBlur = 0; ctx.setLineDash([]);
    }
    plotLine('G', '#fb923c', 6, false);
    plotLine('S', '#06b6d4', 6, false);
    plotLine('E', '#8A9A5B', 4, true);

    // shade gap as a band between G and S
    ctx.fillStyle = 'rgba(232,121,249,0.12)';
    ctx.beginPath();
    for (let i=0;i<series.length;i++) {
      const s = series[i];
      const px = padL + s.t/tspan*totW;
      const py = padT + tsH - s.G/VMAX*tsH;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    for (let i=series.length-1; i>=0; i--) {
      const s = series[i];
      const px = padL + s.t/tspan*totW;
      const py = padT + tsH - s.S/VMAX*tsH;
      ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();

    // legend
    ctx.fillStyle='#fb923c'; ctx.font='11px Nunito';
    ctx.fillRect(padL+12, padT+12, 14, 3);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.fillText('Goal G', padL+30, padT+16);
    ctx.fillStyle='#06b6d4'; ctx.fillRect(padL+90, padT+12, 14, 3);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.fillText('State S', padL+108, padT+16);
    ctx.fillStyle='#8A9A5B'; ctx.fillRect(padL+170, padT+12, 14, 3);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.fillText('Effort E', padL+188, padT+16);
    ctx.fillStyle='rgba(232,121,249,0.5)'; ctx.fillRect(padL+250, padT+12, 14, 8);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.fillText('gap', padL+268, padT+19);

    // === Causal-loop diagram ===
    ctx.fillStyle = 'rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('Eroding-goals causal-loop archetype', padL, cdY-12);
    ctx.strokeStyle = 'rgba(254,250,224,0.25)'; ctx.lineWidth = 1;
    ctx.strokeRect(padL, cdY, totW, cdH);

    const cxC = padL + totW*0.5, cyC = cdY + cdH*0.5;
    const Rx = totW*0.32, Ry = cdH*0.32;
    // Nodes: G (top), gap (right), E (bottom-right), S (bottom), pressure (left)
    const nodes = [
      {x: cxC, y: cyC - Ry, label:'Goal G', col:'#fb923c'},
      {x: cxC + Rx, y: cyC, label:'Gap', col:'#e879f9'},
      {x: cxC + Rx*0.6, y: cyC + Ry, label:'Effort E', col:'#8A9A5B'},
      {x: cxC - Rx*0.6, y: cyC + Ry, label:'State S', col:'#06b6d4'},
      {x: cxC - Rx, y: cyC, label:'Pressure', col:'#BC6C25'},
    ];

    function drawArrow(x1,y1,x2,y2,col,sign,curve=0) {
      const ang=Math.atan2(y2-y1,x2-x1), nodeR=28;
      const sx=x1+nodeR*Math.cos(ang), sy=y1+nodeR*Math.sin(ang);
      const ex=x2-nodeR*Math.cos(ang), ey=y2-nodeR*Math.sin(ang);
      const mx=(sx+ex)/2 + curve*Math.sin(ang)*30;
      const my=(sy+ey)/2 - curve*Math.cos(ang)*30;
      ctx.strokeStyle=col; ctx.lineWidth=2; ctx.shadowBlur=5; ctx.shadowColor=col;
      ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo(mx,my, ex,ey); ctx.stroke();
      const arrowAng = Math.atan2(ey-my, ex-mx);
      const sz=8;
      ctx.beginPath(); ctx.moveTo(ex,ey);
      ctx.lineTo(ex - sz*Math.cos(arrowAng-Math.PI/6), ey - sz*Math.sin(arrowAng-Math.PI/6));
      ctx.moveTo(ex,ey);
      ctx.lineTo(ex - sz*Math.cos(arrowAng+Math.PI/6), ey - sz*Math.sin(arrowAng+Math.PI/6));
      ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle=col; ctx.font='bold 14px Lora';
      ctx.fillText(sign, mx-3, my-4);
    }

    // G - S → Gap (+ for G, − for S)
    drawArrow(nodes[0].x, nodes[0].y, nodes[1].x, nodes[1].y, '#fb923c','+',0.2);
    drawArrow(nodes[3].x, nodes[3].y, nodes[1].x, nodes[1].y, '#06b6d4','−',-0.2);
    // Gap → Effort (+)
    drawArrow(nodes[1].x, nodes[1].y, nodes[2].x, nodes[2].y, '#8A9A5B','+',0);
    // Effort → State (+)
    drawArrow(nodes[2].x, nodes[2].y, nodes[3].x, nodes[3].y, '#06b6d4','+',-0.1);
    // Pressure → State (−)
    drawArrow(nodes[4].x, nodes[4].y, nodes[3].x, nodes[3].y, '#BC6C25','−',-0.2);
    // Gap → Goal (−) — eroding drift
    drawArrow(nodes[1].x, nodes[1].y, nodes[0].x, nodes[0].y, '#e879f9','−',-0.4);

    function drawNode(n) {
      ctx.fillStyle = '#0e1218';
      ctx.strokeStyle = n.col; ctx.lineWidth=2;
      ctx.shadowBlur=10; ctx.shadowColor=n.col;
      ctx.beginPath(); ctx.arc(n.x,n.y,28,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle=n.col; ctx.font='bold 11px Lora';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(n.label,n.x,n.y);
      ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    }
    nodes.forEach(drawNode);

    // Loop labels
    ctx.fillStyle='rgba(232,121,249,0.85)'; ctx.font='italic bold 13px Lora';
    ctx.fillText('R: drifting goal', cxC+Rx-30, cyC-Ry-10);
    ctx.fillStyle='rgba(6,182,212,0.85)';
    ctx.fillText('B: gap-corrective', cxC-30, cyC+12);
  }

  function loop() { if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,d=3) {
    document.getElementById(id).addEventListener('input', e => {
      const v=+e.target.value;
      document.getElementById(vid).textContent = v.toFixed(d);
      fn(v);
    });
  }
  bind('iG','vG',v=>tauG=v,3);
  bind('iK','vK',v=>kS=v,2);
  bind('iP','vP',v=>press=v,3);
  bind('iTe','vTe',v=>tauE=v,1);

  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      const a = b.dataset.p.split(',').map(Number);
      tauG=a[0]; kS=a[1]; press=a[2]; tauE=a[3];
      document.getElementById('iG').value=a[0]; document.getElementById('vG').textContent=a[0].toFixed(3);
      document.getElementById('iK').value=a[1]; document.getElementById('vK').textContent=a[1].toFixed(2);
      document.getElementById('iP').value=a[2]; document.getElementById('vP').textContent=a[2].toFixed(3);
      document.getElementById('iTe').value=a[3]; document.getElementById('vTe').textContent=a[3].toFixed(1);
      reset(); running=true; document.getElementById('bRun').textContent='Pause';
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running=!running; e.target.textContent = running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', () => { reset(); running=true; document.getElementById('bRun').textContent='Pause'; });

  reset(); loop();
})();
</script>
</body>
</html>
