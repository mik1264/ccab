<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Firefly Synchronization — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(20,28,38,0.78); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border:1px solid rgba(254,250,224,0.15); border-radius:18px; padding:1.1rem 1.2rem; color: var(--cream); max-height: calc(100vh - 36px); overflow-y:auto; }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: var(--sage); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.9rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--sage); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.5rem 0.6rem; font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600; background: var(--sage); color:var(--cream); border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
  button:hover { background: var(--moss); transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  button.secondary:hover { background: rgba(254,250,224,0.25); }
  .stat { display:flex; justify-content:space-between; font-size:0.8rem; padding: 0.25rem 0; border-bottom: 1px dashed rgba(254,250,224,0.1); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM · 13</span>
  <h2>Firefly Synchronization</h2>
  <p>Pulse-coupled oscillators à la Mirollo–Strogatz. Each firefly's phase advances continuously; when it reaches 1 it flashes and bumps neighbors' phases by a coupling ε. Watch the population lock into rhythm.</p>

  <div class="control">
    <label>Grid size <span id="vN">60</span></label>
    <input type="range" id="iN" min="20" max="100" step="5" value="60" />
  </div>
  <div class="control">
    <label>Coupling ε <span id="vE">0.05</span></label>
    <input type="range" id="iE" min="0" max="0.20" step="0.005" value="0.05" />
  </div>
  <div class="control">
    <label>Period (frames) <span id="vP">120</span></label>
    <input type="range" id="iP" min="40" max="300" step="10" value="120" />
  </div>

  <div class="btnrow" style="margin-bottom:0.9rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Flashes / step</span><span class="v" id="sFlash">—</span></div>
  <div class="stat"><span>Order R</span><span class="v" id="sR">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0, dpr = Math.min(window.devicePixelRatio||1, 2);
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  let N=60, eps=0.05, period=120;
  let phase, flashing, step=0, running=true, lastFlashes=0;

  function init() {
    N = +document.getElementById('iN').value;
    eps = +document.getElementById('iE').value;
    period = +document.getElementById('iP').value;
    phase = new Float32Array(N*N);
    flashing = new Uint8Array(N*N);
    for (let i=0;i<N*N;i++) phase[i] = Math.random();
    step=0;
    document.getElementById('vN').textContent = N;
    document.getElementById('vE').textContent = eps.toFixed(3);
    document.getElementById('vP').textContent = period;
  }

  function bumpNeighbors(r, c) {
    for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
      if (!dr && !dc) continue;
      const rr=r+dr, cc=c+dc;
      if (rr<0||rr>=N||cc<0||cc>=N) continue;
      const k = rr*N+cc;
      if (flashing[k]) continue;
      phase[k] = Math.min(1, phase[k] + eps);
    }
  }

  function tick() {
    flashing.fill(0);
    const dt = 1/period;
    for (let i=0;i<N*N;i++) phase[i] += dt;
    let flashes=0;
    // chain reactions
    let changed=true; let safety=0;
    while (changed && safety<5) {
      changed=false; safety++;
      for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
        const i = r*N+c;
        if (!flashing[i] && phase[i]>=1) {
          flashing[i]=1; phase[i]=0; flashes++;
          bumpNeighbors(r,c);
          changed=true;
        }
      }
    }
    // Kuramoto-like order parameter
    let sx=0, sy=0;
    for (let i=0;i<N*N;i++) {
      const a = phase[i]*Math.PI*2;
      sx += Math.cos(a); sy += Math.sin(a);
    }
    const R = Math.hypot(sx,sy)/(N*N);
    step++;
    lastFlashes = flashes;
    document.getElementById('sStep').textContent = step;
    document.getElementById('sFlash').textContent = flashes;
    document.getElementById('sR').textContent = R.toFixed(3);
  }

  function draw() {
    ctx.fillStyle = '#0e1218';
    ctx.fillRect(0,0,W,H);
    const cell = Math.min(W,H)/N;
    const ox = (W - cell*N)/2, oy = (H - cell*N)/2;
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      const i = r*N+c;
      let bright;
      if (flashing[i]) {
        ctx.fillStyle = '#FFEC8B';
      } else {
        const p = phase[i];
        const v = Math.floor(20 + p*p*100);
        ctx.fillStyle = `rgb(${Math.floor(v*1.4)},${Math.floor(v*1.3)},${Math.floor(v*0.5)})`;
      }
      ctx.fillRect(ox+c*cell, oy+r*cell, cell+0.5, cell+0.5);
    }
  }

  function loop() {
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('iN').addEventListener('input', e => { document.getElementById('vN').textContent = e.target.value; init(); });
  document.getElementById('iE').addEventListener('input', e => { eps=+e.target.value; document.getElementById('vE').textContent = eps.toFixed(3); });
  document.getElementById('iP').addEventListener('input', e => { period=+e.target.value; document.getElementById('vP').textContent = period; });
  document.getElementById('bRun').addEventListener('click', e => { running=!running; e.target.textContent = running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
