<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lotka-Volterra — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend {
    display:flex; gap:1rem; font-size:0.8rem; margin-top:0.5rem;
  }
  .legend span::before {
    content:''; display:inline-block; width:10px; height:10px;
    border-radius:3px; margin-right:5px; vertical-align: middle;
  }
  .legend .prey::before { background: var(--sage); }
  .legend .pred::before { background: var(--terracotta); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 22</span>
  <h2>Lotka-Volterra</h2>
  <p>Prey grow logistically and are eaten on contact: dx/dt = αx − βxy. Predators die naturally and grow on prey: dy/dt = δxy − γy. Closed orbits: a continuous twin of agent-based wolf-sheep.</p>

  <div class="control"><label>α prey growth <span id="va">1.10</span></label><input type="range" id="ia" min="0.2" max="2" step="0.01" value="1.10" /></div>
  <div class="control"><label>β predation <span id="vb">0.40</span></label><input type="range" id="ib" min="0.05" max="1" step="0.01" value="0.40" /></div>
  <div class="control"><label>δ predator gain <span id="vd">0.10</span></label><input type="range" id="id" min="0.02" max="0.5" step="0.01" value="0.10" /></div>
  <div class="control"><label>γ predator death <span id="vg">0.40</span></label><input type="range" id="ig" min="0.05" max="1" step="0.01" value="0.40" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>Prey x</span><span class="v" id="sx">—</span></div>
  <div class="stat"><span>Predators y</span><span class="v" id="sy">—</span></div>
  <div class="legend"><span class="prey">prey x</span><span class="pred">predator y</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', () => { resize(); });
  resize();

  const PREY='#8A9A5B', PRED='#BC6C25', GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  let alpha=1.10, beta=0.40, delta=0.10, gamma=0.40;
  let x=10, y=5, t=0, running=true;
  const series = []; // {t,x,y}
  const MAX = 1200;

  function reset() {
    x=10; y=5; t=0; series.length=0;
  }

  function rk4Step(dt) {
    const f = (x,y) => [alpha*x - beta*x*y, delta*x*y - gamma*y];
    const k1 = f(x,y);
    const k2 = f(x + dt/2*k1[0], y + dt/2*k1[1]);
    const k3 = f(x + dt/2*k2[0], y + dt/2*k2[1]);
    const k4 = f(x + dt*k3[0], y + dt*k3[1]);
    x += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    y += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    if (x<0) x=0; if (y<0) y=0;
    t += dt;
  }

  function tick() {
    const dt = 0.04;
    for (let i=0;i<3;i++) rk4Step(dt);
    series.push({t,x,y});
    if (series.length > MAX) series.shift();
    document.getElementById('st').textContent = t.toFixed(1);
    document.getElementById('sx').textContent = x.toFixed(2);
    document.getElementById('sy').textContent = y.toFixed(2);
  }

  function draw() {
    ctx.fillStyle = '#0e1218';
    ctx.fillRect(0,0,W,H);
    if (series.length<2) return;

    // Layout: top half = time series, bottom half = phase plot
    const padL=70, padR=360, padT=60, padB=40;
    const totW = W - padL - padR;
    const tsH = H*0.46 - padT/2;
    const ppH = H*0.46 - padB/2;
    const ppY0 = padT + tsH + 50;

    // === Time series ===
    let maxV=0;
    for (const s of series) { if (s.x>maxV) maxV=s.x; if (s.y>maxV) maxV=s.y; }
    if (maxV<1) maxV=1;
    const t0 = series[0].t, t1 = series[series.length-1].t;
    const tspan = Math.max(t1-t0, 1);

    // grid
    ctx.strokeStyle = GRID; ctx.lineWidth = 1;
    for (let i=0;i<=4;i++) {
      const yp = padT + i*tsH/4;
      ctx.beginPath(); ctx.moveTo(padL, yp); ctx.lineTo(padL+totW, yp); ctx.stroke();
    }
    ctx.strokeStyle = AXIS;
    ctx.beginPath();
    ctx.moveTo(padL, padT); ctx.lineTo(padL, padT+tsH); ctx.lineTo(padL+totW, padT+tsH); ctx.stroke();

    // labels
    ctx.fillStyle = 'rgba(254,250,224,0.6)';
    ctx.font='12px Nunito';
    ctx.fillText('Population vs time', padL, padT-12);
    ctx.fillText(maxV.toFixed(1), padL-40, padT+5);
    ctx.fillText('0', padL-15, padT+tsH);

    // plot prey
    ctx.strokeStyle = PREY; ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i=0;i<series.length;i++) {
      const s = series[i];
      const px = padL + (s.t-t0)/tspan*totW;
      const py = padT + tsH - s.x/maxV*tsH;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    // plot pred
    ctx.strokeStyle = PRED; ctx.beginPath();
    for (let i=0;i<series.length;i++) {
      const s = series[i];
      const px = padL + (s.t-t0)/tspan*totW;
      const py = padT + tsH - s.y/maxV*tsH;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();

    // === Phase portrait ===
    ctx.fillStyle = 'rgba(254,250,224,0.6)';
    ctx.fillText('Phase portrait (x, y)', padL, ppY0-12);
    ctx.strokeStyle = AXIS;
    ctx.beginPath();
    ctx.moveTo(padL, ppY0); ctx.lineTo(padL, ppY0+ppH); ctx.lineTo(padL+totW, ppY0+ppH); ctx.stroke();

    let mx=0,my=0;
    for (const s of series) { if (s.x>mx) mx=s.x; if (s.y>my) my=s.y; }
    if (mx<1) mx=1; if (my<1) my=1;

    ctx.strokeStyle = 'rgba(221,161,94,0.8)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i=0;i<series.length;i++) {
      const s = series[i];
      const px = padL + s.x/mx*totW;
      const py = ppY0 + ppH - s.y/my*ppH;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();

    // current point
    const last = series[series.length-1];
    const px = padL + last.x/mx*totW;
    const py = ppY0 + ppH - last.y/my*ppH;
    ctx.fillStyle = PRED;
    ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fill();

    // axis labels
    ctx.fillStyle = 'rgba(254,250,224,0.55)';
    ctx.fillText('x (prey)', padL+totW-50, ppY0+ppH+18);
    ctx.save();
    ctx.translate(padL-30, ppY0+ppH/2+20); ctx.rotate(-Math.PI/2);
    ctx.fillText('y (predators)', 0, 0);
    ctx.restore();
  }

  function loop() {
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  // controls
  function bind(id, vid, prop, decimals=2) {
    const el = document.getElementById(id);
    el.addEventListener('input', e => {
      const v = +e.target.value;
      document.getElementById(vid).textContent = v.toFixed(decimals);
      if (prop==='a') alpha=v;
      if (prop==='b') beta=v;
      if (prop==='d') delta=v;
      if (prop==='g') gamma=v;
    });
  }
  bind('ia','va','a'); bind('ib','vb','b'); bind('id','vd','d'); bind('ig','vg','g');
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
