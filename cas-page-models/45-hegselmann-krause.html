<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hegselmann-Krause Bounded Confidence — Page CAS</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(310px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12); border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream); max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.preset { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ 45</span>
  <h2>Hegselmann-Krause</h2>
  <p>N agents hold opinions in [0,1]. Each step every agent averages with all others within confidence ε. Below a critical ε agents lock into multiple clusters; above it the population converges to a single consensus.</p>

  <div class="control"><label>Confidence ε <span id="vEps">0.18</span></label><input type="range" id="iEps" min="0.02" max="0.5" step="0.005" value="0.18" /></div>
  <div class="control"><label>Agents N <span id="vN">220</span></label><input type="range" id="iN" min="50" max="500" step="10" value="220" /></div>
  <div class="control"><label>Speed <span id="vSp">1</span></label><input type="range" id="iSp" min="1" max="6" step="1" value="1" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="preset" data-p="0.05">Many clusters</button>
    <button class="preset" data-p="0.15">Polarized</button>
    <button class="preset" data-p="0.30">Consensus</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Clusters</span><span class="v" id="sC">—</span></div>
  <div class="stat"><span>Variance</span><span class="v" id="sV">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0; const dpr = Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize); resize();

  let N=220, eps=0.18, speed=1;
  let opinions = []; let history = [];
  let step=0, running=true;
  const HMAX = 600;

  function init() {
    N = +document.getElementById('iN').value;
    eps = +document.getElementById('iEps').value;
    speed = +document.getElementById('iSp').value;
    opinions = new Array(N);
    for (let i=0;i<N;i++) opinions[i] = Math.random();
    history = [opinions.slice()];
    step = 0;
    document.getElementById('vN').textContent=N;
    document.getElementById('vEps').textContent=eps.toFixed(2);
    document.getElementById('vSp').textContent=speed;
  }

  function tick() {
    const next = new Array(N);
    for (let i=0;i<N;i++) {
      let sum=0, cnt=0;
      const oi = opinions[i];
      for (let j=0;j<N;j++) {
        if (Math.abs(opinions[j]-oi) <= eps) { sum+=opinions[j]; cnt++; }
      }
      next[i] = cnt>0 ? sum/cnt : oi;
    }
    opinions = next;
    history.push(opinions.slice());
    if (history.length>HMAX) history.shift();
    step++;
    // cluster count: greedy by sorted distance
    const sorted = opinions.slice().sort((a,b)=>a-b);
    let clusters=1;
    for (let i=1;i<N;i++) if (sorted[i]-sorted[i-1] > 0.01) clusters++;
    let mean=0; for (const o of opinions) mean+=o; mean/=N;
    let v=0; for (const o of opinions) v+=(o-mean)*(o-mean); v/=N;
    document.getElementById('sStep').textContent=step;
    document.getElementById('sC').textContent=clusters;
    document.getElementById('sV').textContent=v.toFixed(4);
  }

  function draw() {
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    const PADL = 80, PADR = 380, PADT = 60, PADB = 60;
    const plotW = W - PADL - PADR;
    const plotH = H - PADT - PADB;
    // axes
    ctx.strokeStyle='rgba(254,250,224,0.18)';
    ctx.lineWidth=1;
    ctx.strokeRect(PADL, PADT, plotW, plotH);
    ctx.fillStyle='rgba(254,250,224,0.7)';
    ctx.font='12px Nunito';
    ctx.fillText('opinion →', PADL, PADT-12);
    ctx.fillText('time ↓', PADL-44, PADT+plotH/2);
    // draw history as fan: each row = step, each col indexes agents
    const rows = history.length;
    const rowH = plotH / Math.max(rows, HMAX);
    // Use ImageData for speed
    const off = draw._off || (draw._off = document.createElement('canvas'));
    off.width = Math.max(1, plotW|0);
    off.height = Math.max(1, plotH|0);
    const octx = off.getContext('2d');
    octx.fillStyle='#06080d'; octx.fillRect(0,0,off.width,off.height);
    for (let r=0;r<rows;r++) {
      const ops = history[r];
      const y = (r/HMAX)*plotH;
      for (let i=0;i<ops.length;i++) {
        const x = ops[i] * plotW;
        const t = ops[i]; // color by opinion value
        // plasma-like
        const R = Math.round(255 * Math.pow(t, 0.6));
        const G = Math.round(60 + 195*Math.pow(t, 1.4));
        const B = Math.round(255 * (1 - t) * 0.85 + 30);
        octx.fillStyle = `rgba(${R},${G},${B},0.85)`;
        octx.fillRect(x-1, y, 2, 2);
      }
    }
    ctx.drawImage(off, PADL, PADT);
    // glow border
    ctx.strokeStyle='rgba(232,121,249,0.4)';
    ctx.lineWidth=2;
    ctx.shadowColor='rgba(232,121,249,0.4)'; ctx.shadowBlur=12;
    ctx.strokeRect(PADL-1, PADT-1, plotW+2, plotH+2);
    ctx.shadowBlur=0;

    // current distribution histogram on right
    const hx = PADL + plotW + 30, hy = PADT, hw = 200, hh = plotH;
    ctx.fillStyle='rgba(12,18,28,0.78)'; ctx.fillRect(hx,hy,hw,hh);
    ctx.strokeStyle='rgba(6,182,212,0.45)'; ctx.lineWidth=1;
    ctx.strokeRect(hx,hy,hw,hh);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.font='11px Nunito';
    ctx.fillText('Current distribution', hx+8, hy+16);
    const bins = 50;
    const counts = new Array(bins).fill(0);
    for (const o of opinions) counts[Math.min(bins-1, (o*bins)|0)]++;
    const maxC = Math.max(...counts, 1);
    const bH = (hh-30)/bins;
    for (let b=0;b<bins;b++) {
      const t = b/(bins-1);
      const R = Math.round(255*Math.pow(t,0.6));
      const G = Math.round(60+195*Math.pow(t,1.4));
      const B = Math.round(255*(1-t)*0.85+30);
      const wd = counts[b]/maxC*(hw-20);
      ctx.fillStyle = `rgb(${R},${G},${B})`;
      ctx.shadowColor=`rgb(${R},${G},${B})`; ctx.shadowBlur=4;
      ctx.fillRect(hx+10, hy+24+b*bH, wd, bH-1);
    }
    ctx.shadowBlur=0;
  }

  function loop() {
    if (running) for (let s=0;s<speed;s++) tick();
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('iEps').addEventListener('input', e => { eps=+e.target.value; document.getElementById('vEps').textContent=eps.toFixed(2); });
  document.getElementById('iN').addEventListener('input', e => { N=+e.target.value; document.getElementById('vN').textContent=N; init(); });
  document.getElementById('iSp').addEventListener('input', e => { speed=+e.target.value; document.getElementById('vSp').textContent=speed; });
  document.querySelectorAll('.preset').forEach(b => {
    b.addEventListener('click', () => {
      const p = +b.dataset.p;
      document.getElementById('iEps').value=p; document.getElementById('vEps').textContent=p.toFixed(2);
      eps=p; init();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => { running=!running; e.target.textContent = running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
