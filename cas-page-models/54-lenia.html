<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lenia — Deluxe ABM</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream); letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.preset { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ 54</span>
  <h2>Lenia</h2>
  <p>Continuous Game of Life: smooth kernel K convolved with field A gives potential U; growth function G(U) updates A. Different parameters yield organic crawling "creatures" called Orbium.</p>

  <div class="control"><label>Kernel R <span id="vR">13</span></label><input type="range" id="iR" min="6" max="22" step="1" value="13" /></div>
  <div class="control"><label>μ (mean) <span id="vM">0.150</span></label><input type="range" id="iM" min="0.05" max="0.40" step="0.005" value="0.150" /></div>
  <div class="control"><label>σ (width) <span id="vSi">0.015</span></label><input type="range" id="iSi" min="0.005" max="0.060" step="0.001" value="0.015" /></div>
  <div class="control"><label>dt <span id="vDt">0.10</span></label><input type="range" id="iDt" min="0.02" max="0.30" step="0.01" value="0.10" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="preset" data-p="orbium">Orbium</button>
    <button class="preset" data-p="ring">Ring</button>
    <button class="preset" data-p="blob">Blob</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Frame</span><span class="v" id="sFr">0</span></div>
  <div class="stat"><span>Mean A</span><span class="v" id="sM">—</span></div>
  <div class="stat"><span>Max A</span><span class="v" id="sMx">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  const N = 160;
  let A = new Float32Array(N*N);
  let U = new Float32Array(N*N);
  let nextA = new Float32Array(N*N);
  let img;

  let R = 13, mu = 0.15, sigma = 0.015, dt = 0.10;
  let kernelOffsets = [];
  let kernelWeights = [];
  let kernelSum = 0;
  let running = true, frame = 0;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = true;
  }
  window.addEventListener('resize', resize);
  resize();

  function buildKernel() {
    kernelOffsets = []; kernelWeights = []; kernelSum = 0;
    // Ring kernel: bell curve in radial distance, peaks at R/2
    const rPeak = R/2;
    for (let dy=-R; dy<=R; dy++) for (let dx=-R; dx<=R; dx++) {
      const r = Math.sqrt(dx*dx + dy*dy);
      if (r > R || r < 0.5) continue;
      const t = r/R; // 0..1
      // Smooth bump centered at 0.5
      const w = Math.exp(-((t-0.5)*(t-0.5))/(2*0.15*0.15));
      kernelOffsets.push(dy, dx);
      kernelWeights.push(w);
      kernelSum += w;
    }
    img = ctx.createImageData(N, N);
  }

  function reset() {
    A.fill(0);
    // Random patches
    const npatches = 8;
    for (let p=0; p<npatches; p++) {
      const cx = ((Math.random()*0.6+0.2)*N)|0;
      const cy = ((Math.random()*0.6+0.2)*N)|0;
      const sz = R+Math.random()*R;
      for (let dy=-sz; dy<=sz; dy++) for (let dx=-sz; dx<=sz; dx++) {
        if (dx*dx+dy*dy>sz*sz) continue;
        const i = ((cy+dy+N)%N)*N + (cx+dx+N)%N;
        A[i] = Math.max(A[i], Math.random()*0.9);
      }
    }
    frame = 0;
  }

  function preset(name) {
    if (name === 'orbium') { R=13; mu=0.15; sigma=0.015; dt=0.1; }
    else if (name === 'ring') { R=18; mu=0.22; sigma=0.025; dt=0.13; }
    else if (name === 'blob') { R=10; mu=0.30; sigma=0.045; dt=0.15; }
    document.getElementById('iR').value = R; document.getElementById('vR').textContent = R;
    document.getElementById('iM').value = mu; document.getElementById('vM').textContent = mu.toFixed(3);
    document.getElementById('iSi').value = sigma; document.getElementById('vSi').textContent = sigma.toFixed(3);
    document.getElementById('iDt').value = dt; document.getElementById('vDt').textContent = dt.toFixed(2);
    buildKernel(); reset();
  }

  function growth(u) {
    // Gaussian centered at mu, doubled-shifted to give -1..+1 growth
    const t = (u - mu)/sigma;
    return 2*Math.exp(-0.5*t*t) - 1;
  }

  function step() {
    // Convolution: U = (K * A) / sum(K)
    const kn = kernelWeights.length;
    for (let y=0; y<N; y++) {
      for (let x=0; x<N; x++) {
        let sum = 0;
        for (let k=0; k<kn; k++) {
          const dy = kernelOffsets[2*k], dx = kernelOffsets[2*k+1];
          const xi = (x+dx+N)%N, yi = (y+dy+N)%N;
          sum += A[yi*N+xi] * kernelWeights[k];
        }
        U[y*N+x] = sum / kernelSum;
      }
    }
    for (let i=0; i<N*N; i++) {
      let v = A[i] + dt*growth(U[i]);
      if (v < 0) v = 0; else if (v > 1) v = 1;
      nextA[i] = v;
    }
    [A, nextA] = [nextA, A];
  }

  // Plasma colormap
  function plasma(t) {
    t = Math.max(0, Math.min(1, t));
    const r = Math.round(255 * (0.05 + 0.95*Math.pow(t, 0.5)));
    const g = Math.round(255 * Math.pow(t, 1.7) * 0.85);
    const b = Math.round(255 * (0.55 - 0.5*Math.pow(t, 1.2)) + 30*Math.pow(1-t, 2));
    return [Math.min(255,Math.max(0,r)), Math.min(255,Math.max(0,g)), Math.min(255,Math.max(0,b))];
  }

  function render() {
    let sumA=0, maxA=0;
    for (let i=0;i<N*N;i++) { sumA += A[i]; if (A[i]>maxA) maxA=A[i]; }
    const data = img.data;
    for (let i=0; i<N*N; i++) {
      const c = plasma(A[i]);
      const j = i*4;
      data[j]=c[0]; data[j+1]=c[1]; data[j+2]=c[2]; data[j+3]=255;
    }
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
    const size = Math.min(W, H) * 0.92;
    const ox = (W - size)/2, oy = (H - size)/2;
    const off = render._off || (render._off = document.createElement('canvas'));
    off.width = N; off.height = N;
    off.getContext('2d').putImageData(img, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(off, ox, oy, size, size);

    ctx.shadowBlur = 14;
    ctx.shadowColor = 'rgba(232,121,249,0.5)';
    ctx.strokeStyle = 'rgba(232,121,249,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(ox-1, oy-1, size+2, size+2);
    ctx.shadowBlur = 0;

    document.getElementById('sFr').textContent = frame;
    document.getElementById('sM').textContent = (sumA/(N*N)).toFixed(3);
    document.getElementById('sMx').textContent = maxA.toFixed(3);
  }

  function loop() {
    if (running) { step(); frame++; }
    render();
    requestAnimationFrame(loop);
  }

  function bind(id, vid, target, dec) {
    document.getElementById(id).addEventListener('input', e => {
      const v = +e.target.value;
      document.getElementById(vid).textContent = dec===0 ? v : v.toFixed(dec);
      if (target==='R') { R=v; buildKernel(); }
      else if (target==='M') mu=v;
      else if (target==='Si') sigma=v;
      else if (target==='Dt') dt=v;
    });
  }
  bind('iR','vR','R',0); bind('iM','vM','M',3);
  bind('iSi','vSi','Si',3); bind('iDt','vDt','Dt',2);
  document.querySelectorAll('.preset').forEach(b => {
    b.addEventListener('click', () => preset(b.dataset.p));
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  // Click to inject
  cv.addEventListener('pointerdown', e => {
    const rect = cv.getBoundingClientRect();
    const size = Math.min(W, H) * 0.92;
    const ox = (W - size)/2, oy = (H - size)/2;
    const cx = Math.round((e.clientX-rect.left-ox)/size*N);
    const cy = Math.round((e.clientY-rect.top-oy)/size*N);
    for (let dy=-R; dy<=R; dy++) for (let dx=-R; dx<=R; dx++) {
      if (dx*dx+dy*dy>R*R) continue;
      const i = ((cy+dy+N)%N)*N + (cx+dx+N)%N;
      A[i] = Math.min(1, A[i] + Math.random()*0.8);
    }
  });

  buildKernel(); reset(); loop();
})();
</script>
</body>
</html>
