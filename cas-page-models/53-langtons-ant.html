<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Langton's Ant — Deluxe ABM</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream); letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.preset { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ 53</span>
  <h2>Langton's Ant</h2>
  <p>Each ant follows a rule string (R/L per state). On a colored cell, ant turns, flips cell, advances. Multi-ant systems with rules like RLR, LLRR show emergent "highway" structures.</p>

  <div class="control"><label>Ants <span id="vN">3</span></label><input type="range" id="iN" min="1" max="40" step="1" value="3" /></div>
  <div class="control"><label>Steps/frame <span id="vS">300</span></label><input type="range" id="iS" min="10" max="3000" step="10" value="300" /></div>
  <div class="control"><label>Grid size <span id="vG">220</span></label><input type="range" id="iG" min="100" max="400" step="20" value="220" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="preset" data-r="RL">RL classic</button>
    <button class="preset" data-r="RLR">RLR</button>
    <button class="preset" data-r="LLRR">LLRR</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="preset" data-r="LRRRRRLLR">Spiral</button>
    <button class="preset" data-r="LLRRRLRLRLLR">Chaos</button>
    <button class="preset" data-r="RRLLLRLLLRRR">Tile</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Rule</span><span class="v" id="sR">RL</span></div>
  <div class="stat"><span>Steps</span><span class="v" id="sSt">0</span></div>
  <div class="stat"><span>Cells flipped</span><span class="v" id="sFl">0</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  let N = 220;
  let grid, age;
  let ants = [];
  let rule = 'RL';
  let nStates = 2;
  let stepsPerFrame = 300;
  let running = true;
  let totalSteps = 0;
  let totalFlips = 0;
  let img;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener('resize', resize);
  resize();

  function makeGrid() {
    grid = new Uint8Array(N*N);
    age = new Float32Array(N*N);
    img = ctx.createImageData(N, N);
  }

  function spawnAnts(count) {
    ants = [];
    for (let i=0; i<count; i++) {
      ants.push({
        x: ((Math.random()*0.5+0.25)*N)|0,
        y: ((Math.random()*0.5+0.25)*N)|0,
        d: (Math.random()*4)|0,
        hue: (i*47) % 360
      });
    }
  }

  function reset() {
    makeGrid();
    spawnAnts(+document.getElementById('iN').value);
    totalSteps = 0; totalFlips = 0;
  }

  // direction: 0=up, 1=right, 2=down, 3=left
  const DX = [0,1,0,-1], DY = [-1,0,1,0];

  function step() {
    for (const a of ants) {
      const idx = a.y*N + a.x;
      const s = grid[idx];
      const turn = rule.charAt(s);
      if (turn === 'R') a.d = (a.d+1) & 3;
      else a.d = (a.d+3) & 3;
      grid[idx] = (s+1) % nStates;
      age[idx] = totalSteps;
      totalFlips++;
      a.x = (a.x + DX[a.d] + N) % N;
      a.y = (a.y + DY[a.d] + N) % N;
    }
    totalSteps++;
  }

  // Color based on state and age
  function stateColor(state, ageVal) {
    if (state === 0) return [10,12,18];
    const t = state / Math.max(1, nStates-1);
    // Map: state determines hue family; age determines brightness
    const recency = Math.max(0, 1 - (totalSteps - ageVal)/8000);
    const hue = (state*87 + 200) % 360;
    const sat = 70 + 25*recency;
    const lit = 30 + 30*t + 15*recency;
    return hslToRgb(hue, sat, lit);
  }

  function hslToRgb(h,s,l) {
    s/=100; l/=100;
    const k = n => (n + h/30) % 12;
    const a = s*Math.min(l, 1-l);
    const f = n => l - a*Math.max(-1, Math.min(k(n)-3, Math.min(9-k(n), 1)));
    return [Math.round(255*f(0)), Math.round(255*f(8)), Math.round(255*f(4))];
  }

  function render() {
    const data = img.data;
    for (let i=0; i<N*N; i++) {
      const c = stateColor(grid[i], age[i]);
      const j = i*4;
      data[j]=c[0]; data[j+1]=c[1]; data[j+2]=c[2]; data[j+3]=255;
    }
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
    const size = Math.min(W, H) * 0.92;
    const ox = (W - size)/2, oy = (H - size)/2;
    const off = render._off || (render._off = document.createElement('canvas'));
    off.width = N; off.height = N;
    off.getContext('2d').putImageData(img, 0, 0);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, ox, oy, size, size);

    // Draw ants with glow
    const cell = size / N;
    ctx.save();
    for (const a of ants) {
      const px = ox + a.x*cell + cell/2;
      const py = oy + a.y*cell + cell/2;
      ctx.shadowBlur = 14;
      ctx.shadowColor = `hsl(${a.hue}, 90%, 60%)`;
      ctx.fillStyle = `hsl(${a.hue}, 95%, 65%)`;
      ctx.beginPath();
      ctx.arc(px, py, Math.max(2.5, cell*1.4), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();

    ctx.strokeStyle = 'rgba(232,121,249,0.45)';
    ctx.lineWidth = 2;
    ctx.strokeRect(ox-1, oy-1, size+2, size+2);

    document.getElementById('sR').textContent = rule;
    document.getElementById('sSt').textContent = totalSteps.toLocaleString();
    document.getElementById('sFl').textContent = totalFlips.toLocaleString();
  }

  function loop() {
    if (running) for (let s=0; s<stepsPerFrame; s++) step();
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iN').addEventListener('input', e => {
    document.getElementById('vN').textContent = e.target.value;
    spawnAnts(+e.target.value);
  });
  document.getElementById('iS').addEventListener('input', e => {
    stepsPerFrame = +e.target.value;
    document.getElementById('vS').textContent = e.target.value;
  });
  document.getElementById('iG').addEventListener('input', e => {
    N = +e.target.value;
    document.getElementById('vG').textContent = e.target.value;
    reset();
  });
  document.querySelectorAll('.preset').forEach(b => {
    b.addEventListener('click', () => {
      rule = b.dataset.r;
      nStates = rule.length;
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  reset();
  loop();
})();
</script>
</body>
</html>
