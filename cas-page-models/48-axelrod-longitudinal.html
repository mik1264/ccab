<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Axelrod Culture: Longitudinal — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .tag-abm {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.6rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag-abm">ABM ✦ 48</span>
  <h2>Axelrod Culture (Longitudinal)</h2>
  <p>Each cell holds a culture vector of F traits (each ∈ 0..Q-1). Neighbors interact with probability proportional to similarity, copying one trait. Boundaries between cultures glow.</p>

  <div class="control"><label>Features F <span id="vF">5</span></label><input type="range" id="iF" min="2" max="10" step="1" value="5" /></div>
  <div class="control"><label>Traits Q <span id="vQ">10</span></label><input type="range" id="iQ" min="2" max="20" step="1" value="10" /></div>
  <div class="control"><label>Updates/frame <span id="vS">2000</span></label><input type="range" id="iS" min="200" max="8000" step="200" value="2000" /></div>

  <div class="btnrow">
    <button class="p" data-p="3,5">Coalesce</button>
    <button class="p" data-p="5,10">Mosaic</button>
    <button class="p" data-p="10,15">Fragment</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step (M)</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Distinct cultures</span><span class="v" id="sCult">—</span></div>
  <div class="stat"><span>Largest region %</span><span class="v" id="sLarge">—</span></div>
  <div class="stat"><span>Active edges</span><span class="v" id="sActive">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0;
  const dpr = Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener('resize', resize); resize();

  const N = 100;
  let F = 5, Q = 10, stepsPerFrame = 2000;
  let culture; // F arrays of length N*N (or one Uint8Array of length F*N*N)
  let step = 0, running = true;
  const img = ctx.createImageData(N, N);

  function init(){
    culture = new Uint8Array(F*N*N);
    for (let i=0;i<F*N*N;i++) culture[i] = (Math.random()*Q)|0;
    step = 0;
  }

  function trait(i, f){ return culture[f*N*N + i]; }
  function setTrait(i, f, v){ culture[f*N*N + i] = v; }

  function tick(){
    for (let s=0; s<stepsPerFrame; s++){
      const i = (Math.random()*N*N)|0;
      const r = (i/N)|0, c = i%N;
      // pick random neighbor
      const dr = (Math.random()<0.5?-1:1)*(Math.random()<0.5?1:0);
      const dc = (Math.random()<0.5?-1:1)*(Math.random()<0.5?1:0);
      let nr, nc;
      // pick one of 4 neighbors
      const k = (Math.random()*4)|0;
      if (k===0){nr=r-1;nc=c;} else if (k===1){nr=r+1;nc=c;} else if (k===2){nr=r;nc=c-1;} else {nr=r;nc=c+1;}
      if (nr<0||nr>=N||nc<0||nc>=N) continue;
      const j = nr*N+nc;
      // count similarity
      let same = 0, diff = -1;
      for (let f=0;f<F;f++){
        if (trait(i,f)===trait(j,f)) same++;
        else if (diff<0) diff = f; // pick first differing for now
      }
      if (same===F || same===0) continue;
      const sim = same/F;
      if (Math.random() < sim){
        // pick a random differing feature
        const diffs = [];
        for (let f=0;f<F;f++) if (trait(i,f)!==trait(j,f)) diffs.push(f);
        if (diffs.length>0){
          const f = diffs[(Math.random()*diffs.length)|0];
          setTrait(i, f, trait(j,f));
        }
      }
      step++;
    }
    updateStats();
  }

  function cellHash(i){
    let h = 0;
    for (let f=0;f<F;f++) h = h*Q + trait(i,f);
    return h;
  }

  function updateStats(){
    const counts = new Map();
    for (let i=0;i<N*N;i++){
      const h = cellHash(i);
      counts.set(h, (counts.get(h)||0)+1);
    }
    let largest = 0;
    for (const v of counts.values()) if (v>largest) largest=v;
    let active = 0;
    for (let r=0;r<N;r++) for (let c=0;c<N-1;c++){
      const i = r*N+c, j = r*N+c+1;
      let same = 0;
      for (let f=0;f<F;f++) if (trait(i,f)===trait(j,f)) same++;
      if (same!==0 && same!==F) active++;
    }
    for (let r=0;r<N-1;r++) for (let c=0;c<N;c++){
      const i = r*N+c, j = (r+1)*N+c;
      let same = 0;
      for (let f=0;f<F;f++) if (trait(i,f)===trait(j,f)) same++;
      if (same!==0 && same!==F) active++;
    }
    document.getElementById('sStep').textContent = (step/1e6).toFixed(2);
    document.getElementById('sCult').textContent = counts.size;
    document.getElementById('sLarge').textContent = ((largest/(N*N))*100).toFixed(1)+'%';
    document.getElementById('sActive').textContent = active;
  }

  // Map culture vector to RGB via HSL based on dominant feature
  function colorFor(i){
    let sum = 0;
    let dom = 0, domVal = 0;
    for (let f=0;f<F;f++){
      const v = trait(i,f);
      sum = sum*7 + v;
      if (v > domVal){ domVal = v; dom = f; }
    }
    const hue = (sum * 360 / Q) % 360;
    const sat = 65 + (dom * 35 / F);
    const lit = 30 + (domVal * 40 / Q);
    return hslToRgb(hue, sat, lit);
  }
  function hslToRgb(h,s,l){
    s/=100; l/=100;
    const k = n => (n + h/30)%12;
    const a = s*Math.min(l,1-l);
    const f = n => l - a*Math.max(-1, Math.min(k(n)-3, Math.min(9-k(n),1)));
    return [Math.round(f(0)*255), Math.round(f(8)*255), Math.round(f(4)*255)];
  }

  function draw(){
    ctx.fillStyle='#06080d';
    ctx.fillRect(0,0,W,H);
    const sz = Math.min(W*0.74, H*0.92);
    const ox = (W*0.46 - sz/2);
    const oy = (H - sz)/2;
    // build pixel data
    const data = img.data;
    for (let i=0;i<N*N;i++){
      const c = colorFor(i);
      const j = i*4;
      data[j]=c[0]; data[j+1]=c[1]; data[j+2]=c[2]; data[j+3]=255;
    }
    const off = draw._off || (draw._off = document.createElement('canvas'));
    off.width = N; off.height = N;
    off.getContext('2d').putImageData(img, 0, 0);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, ox, oy, sz, sz);

    // boundary glow: overlay where cells differ from neighbor
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(232,121,249,0.55)';
    ctx.lineWidth = 0.7;
    const cell = sz / N;
    ctx.shadowColor = 'rgba(232,121,249,0.7)';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    for (let r=0;r<N;r++) for (let c=0;c<N-1;c++){
      const i = r*N+c, j = r*N+c+1;
      let same=0;
      for (let f=0;f<F;f++) if (trait(i,f)===trait(j,f)) same++;
      if (same!==F){
        const x = ox + (c+1)*cell;
        ctx.moveTo(x, oy + r*cell);
        ctx.lineTo(x, oy + (r+1)*cell);
      }
    }
    for (let r=0;r<N-1;r++) for (let c=0;c<N;c++){
      const i = r*N+c, j = (r+1)*N+c;
      let same=0;
      for (let f=0;f<F;f++) if (trait(i,f)===trait(j,f)) same++;
      if (same!==F){
        const y = oy + (r+1)*cell;
        ctx.moveTo(ox + c*cell, y);
        ctx.lineTo(ox + (c+1)*cell, y);
      }
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // outer glow border
    ctx.strokeStyle = 'rgba(6,182,212,0.5)';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(6,182,212,0.7)';
    ctx.shadowBlur = 12;
    ctx.strokeRect(ox-1, oy-1, sz+2, sz+2);
    ctx.shadowBlur = 0;
  }

  function loop(){
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('iF').addEventListener('input', e=>{
    F=+e.target.value;
    document.getElementById('vF').textContent=F;
    init();
  });
  document.getElementById('iQ').addEventListener('input', e=>{
    Q=+e.target.value;
    document.getElementById('vQ').textContent=Q;
    init();
  });
  document.getElementById('iS').addEventListener('input', e=>{
    stepsPerFrame=+e.target.value;
    document.getElementById('vS').textContent=stepsPerFrame;
  });
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click', ()=>{
      const [f,q] = b.dataset.p.split(',').map(Number);
      F=f; Q=q;
      document.getElementById('iF').value=f; document.getElementById('vF').textContent=f;
      document.getElementById('iQ').value=q; document.getElementById('vQ').textContent=q;
      init();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
