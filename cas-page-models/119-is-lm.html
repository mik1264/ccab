<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IS-LM Dynamics — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.5rem; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>IS-LM Dynamics</h2>
  <p>IS: Y = c·Y + a − b·r + G. LM: M/P = k·Y − h·r. Out-of-equilibrium: dY/dt = α(IS−Y), dr/dt = β(MD−MS). Shocks shift curves; (Y,r) spirals to new equilibrium.</p>

  <div class="control"><label>c MPC <span id="vc">0.7</span></label><input type="range" id="ic" min="0.4" max="0.9" step="0.01" value="0.7" /></div>
  <div class="control"><label>b inv. sensitivity <span id="vb">2.0</span></label><input type="range" id="ib" min="0.5" max="6" step="0.1" value="2.0" /></div>
  <div class="control"><label>k money demand-Y <span id="vk">0.5</span></label><input type="range" id="ik" min="0.1" max="1.5" step="0.02" value="0.5" /></div>
  <div class="control"><label>h money demand-r <span id="vh">2.0</span></label><input type="range" id="ih" min="0.5" max="6" step="0.1" value="2.0" /></div>
  <div class="control"><label>G gov spending <span id="vG">2.0</span></label><input type="range" id="iG" min="0" max="6" step="0.1" value="2.0" /></div>
  <div class="control"><label>M/P money supply <span id="vM">5.0</span></label><input type="range" id="iM" min="1" max="12" step="0.1" value="5.0" /></div>

  <div class="btnrow">
    <button class="p" data-p="0.7,2.0,0.5,2.0,2.0,5.0">Baseline</button>
    <button class="p" data-p="0.7,2.0,0.5,2.0,4.0,5.0">Fiscal+</button>
    <button class="p" data-p="0.7,2.0,0.5,2.0,2.0,8.0">Monetary+</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>Y output</span><span class="v" id="sY">—</span></div>
  <div class="stat"><span>r interest</span><span class="v" id="sr">—</span></div>
  <div class="stat"><span>Y* eq.</span><span class="v" id="sYs">—</span></div>
  <div class="stat"><span>r* eq.</span><span class="v" id="srs">—</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0; const dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize', resize); resize();

  const SAGE='#8A9A5B', EARTH='#DDA15E', MAG='#e879f9', CY='#06b6d4', PLASMA='#fb923c', GRID='rgba(254,250,224,0.08)', AXIS='rgba(254,250,224,0.45)';

  // IS:  Y = (a + G - b r)/(1-c)   →   r = (a + G - (1-c)Y)/b
  // LM:  M = k Y - h r              →   r = (k Y - M)/h
  let cMPC=0.7, b=2.0, k=0.5, h=2.0, G=2.0, M=5.0;
  const a=1.0; // autonomous consumption/investment
  let Y=4, r=0.05, t=0, running=true;
  const series=[]; const MAX=4000;
  const aY=0.6, ar=0.4;

  function reset(){ Y=4; r=0.05; t=0; series.length=0; }
  function rIS(Y){ return (a + G - (1-cMPC)*Y)/b; }
  function rLM(Y){ return (k*Y - M)/h; }
  function eq(){
    // (1-c) Y + b r = a + G
    // k Y − h r = M
    // matrix solve
    const A11=(1-cMPC), A12=b, A21=k, A22=-h;
    const b1=a+G, b2=M;
    const det=A11*A22 - A12*A21;
    const Ys=(b1*A22 - A12*b2)/det;
    const rs=(A11*b2 - b1*A21)/det;
    return [Ys,rs];
  }
  function deriv(Y,r){
    // disequilibrium adjustment
    const ZIS = (a + G - (1-cMPC)*Y - b*r); // >0 ⇒ excess demand → Y rises
    const ZLM = (k*Y - h*r - M);            // >0 ⇒ excess money demand → r rises
    return [aY*ZIS, ar*ZLM];
  }
  function rk4(dt){
    const k1=deriv(Y,r);
    const k2=deriv(Y+dt/2*k1[0], r+dt/2*k1[1]);
    const k3=deriv(Y+dt/2*k2[0], r+dt/2*k2[1]);
    const k4=deriv(Y+dt*k3[0], r+dt*k3[1]);
    Y += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    r += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    if(Y<0) Y=0; if(r<-0.05) r=-0.05;
    t += dt;
  }
  function tick(){
    for(let i=0;i<2;i++) rk4(0.20);
    series.push({t,Y,r});
    if(series.length>MAX) series.shift();
    const [Ys,rs]=eq();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sY').textContent=Y.toFixed(2);
    document.getElementById('sr').textContent=(r*100).toFixed(2)+'%';
    document.getElementById('sYs').textContent=Ys.toFixed(2);
    document.getElementById('srs').textContent=(rs*100).toFixed(2)+'%';
  }

  function drawAxes(x,y,w,h,title){
    ctx.strokeStyle=AXIS; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito'; ctx.fillText(title, x, y-8);
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    if(series.length<2) return;
    const padR=360;
    const totW=W-padR-80;
    const colW=totW/2-20;

    // === Top-left: IS-LM graph (Y,r) ===
    const x0=60, y0=60, w0=colW, h0=H*0.42;
    drawAxes(x0,y0,w0,h0,'IS-LM diagram (Y, r)');
    const [Ys,rs]=eq();
    const Ymax=Math.max(Ys,Y,5)*1.5;
    const rmin=-0.02, rmax=Math.max(rs+0.05, r+0.02, 0.15);
    const rrange=rmax-rmin;
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y0+i*h0/5; ctx.beginPath(); ctx.moveTo(x0,py); ctx.lineTo(x0+w0,py); ctx.stroke(); }
    // IS line
    ctx.strokeStyle=EARTH; ctx.lineWidth=2.5; ctx.beginPath();
    for(let i=0;i<=80;i++){
      const yy=i/80*Ymax; const rr=rIS(yy);
      const px=x0+yy/Ymax*w0; const py=y0+h0-(rr-rmin)/rrange*h0;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke();
    // LM line
    ctx.strokeStyle=CY; ctx.lineWidth=2.5; ctx.beginPath();
    for(let i=0;i<=80;i++){
      const yy=i/80*Ymax; const rr=rLM(yy);
      const px=x0+yy/Ymax*w0; const py=y0+h0-(rr-rmin)/rrange*h0;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke();
    // equilibrium dot
    ctx.fillStyle=MAG;
    const eqx=x0+Ys/Ymax*w0, eqy=y0+h0-(rs-rmin)/rrange*h0;
    ctx.beginPath(); ctx.arc(eqx,eqy,6,0,Math.PI*2); ctx.fill();
    // current state
    ctx.fillStyle=PLASMA;
    const cx=x0+Math.min(Y,Ymax)/Ymax*w0, cy=y0+h0-(r-rmin)/rrange*h0;
    ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2); ctx.fill();
    ctx.font='11px Nunito';
    ctx.fillStyle=EARTH; ctx.fillText('IS', x0+w0-26, y0+h0-(rIS(Ymax*0.95)-rmin)/rrange*h0-4);
    ctx.fillStyle=CY; ctx.fillText('LM', x0+w0-26, y0+h0-(rLM(Ymax*0.95)-rmin)/rrange*h0-4);
    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('Y →', x0+w0-30, y0+h0+16);
    ctx.save(); ctx.translate(x0-26, y0+h0/2+10); ctx.rotate(-Math.PI/2); ctx.fillText('r', 0, 0); ctx.restore();

    // === Top-right: phase plane (Y,r) trajectory ===
    const x1=x0+w0+40, y1=y0, w1=colW, h1=h0;
    drawAxes(x1,y1,w1,h1,'Trajectory in (Y, r) phase plane');
    let pYmin=Infinity,pYmax=-Infinity,prmin=Infinity,prmax=-Infinity;
    for(const p of series){ if(p.Y<pYmin)pYmin=p.Y; if(p.Y>pYmax)pYmax=p.Y; if(p.r<prmin)prmin=p.r; if(p.r>prmax)prmax=p.r; }
    pYmin-=0.3; pYmax+=0.3; prmin-=0.005; prmax+=0.005;
    const pyr=Math.max(pYmax-pYmin,0.5), prr=Math.max(prmax-prmin,0.005);
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y1+i*h1/5; ctx.beginPath(); ctx.moveTo(x1,py); ctx.lineTo(x1+w1,py); ctx.stroke(); }
    // vector field (sparse)
    const NX=12, NY=8;
    for(let ix=0; ix<NX; ix++){
      for(let iy=0; iy<NY; iy++){
        const yy=pYmin+(ix+0.5)/NX*pyr;
        const rr=prmin+(iy+0.5)/NY*prr;
        const d=deriv(yy,rr);
        const mag=Math.hypot(d[0],d[1]);
        const sc=Math.min(w1,h1)*0.05/Math.max(mag,1e-9);
        const px=x1+(yy-pYmin)/pyr*w1; const py=y1+h1-(rr-prmin)/prr*h1;
        const ex=px+d[0]*sc; const ey=py-d[1]*sc;
        ctx.strokeStyle='rgba(232,121,249,0.35)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(ex,ey); ctx.stroke();
      }
    }
    // trajectory
    ctx.lineWidth=1.8;
    for(let i=1;i<series.length;i++){
      const p1=series[i-1], p2=series[i];
      const px1=x1+(p1.Y-pYmin)/pyr*w1; const py1=y1+h1-(p1.r-prmin)/prr*h1;
      const px2=x1+(p2.Y-pYmin)/pyr*w1; const py2=y1+h1-(p2.r-prmin)/prr*h1;
      const tt=i/series.length;
      ctx.strokeStyle=`rgba(${6+250*tt},${182-50*tt},${212-100*tt},${0.4+0.6*tt})`;
      ctx.beginPath(); ctx.moveTo(px1,py1); ctx.lineTo(px2,py2); ctx.stroke();
    }
    const last=series[series.length-1];
    const lcx=x1+(last.Y-pYmin)/pyr*w1, lcy=y1+h1-(last.r-prmin)/prr*h1;
    ctx.fillStyle=PLASMA; ctx.beginPath(); ctx.arc(lcx,lcy,6,0,Math.PI*2); ctx.fill();
    if(Ys>=pYmin && Ys<=pYmax && rs>=prmin && rs<=prmax){
      const ex=x1+(Ys-pYmin)/pyr*w1; const ey=y1+h1-(rs-prmin)/prr*h1;
      ctx.fillStyle=MAG; ctx.beginPath(); ctx.arc(ex,ey,5,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=MAG; ctx.beginPath(); ctx.arc(ex,ey,9,0,Math.PI*2); ctx.stroke();
    }

    // === Bottom: time series ===
    const x2=60, y2=y0+h0+70, w2=totW, h2=H-y2-50;
    drawAxes(x2,y2,w2,h2,'Y(t) and r(t) converging to new equilibrium');
    let yymax=Math.max(...series.map(s=>s.Y),5)*1.05;
    let rrmin=Math.min(...series.map(s=>s.r),0)-0.005, rrmax=Math.max(...series.map(s=>s.r),0.05)+0.005;
    const rrr=rrmax-rrmin;
    const t0=series[0].t, t1=series[series.length-1].t, tspan=Math.max(t1-t0,1);
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const py=y2+i*h2/5; ctx.beginPath(); ctx.moveTo(x2,py); ctx.lineTo(x2+w2,py); ctx.stroke(); }
    // Y line
    ctx.strokeStyle=EARTH; ctx.lineWidth=2; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const p=series[i]; const px=x2+(p.t-t0)/tspan*w2; const py=y2+h2-p.Y/yymax*h2;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke();
    // r line (scaled to its own range)
    ctx.strokeStyle=CY; ctx.lineWidth=2; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const p=series[i]; const px=x2+(p.t-t0)/tspan*w2; const py=y2+h2-(p.r-rrmin)/rrr*h2;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke();
    // Y* line
    const ysy=y2+h2-Ys/yymax*h2;
    ctx.strokeStyle='rgba(232,121,249,0.4)'; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(x2,ysy); ctx.lineTo(x2+w2,ysy); ctx.stroke(); ctx.setLineDash([]);
    ctx.font='11px Nunito';
    ctx.fillStyle=EARTH; ctx.fillText('— Y', x2+12, y2+18);
    ctx.fillStyle=CY; ctx.fillText('— r', x2+50, y2+18);
    ctx.fillStyle=MAG; ctx.fillText('-- Y*', x2+90, y2+18);
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }
  function bind(id,vid,fn,d=2){ const el=document.getElementById(id);
    el.addEventListener('input', e=>{ const v=+e.target.value; document.getElementById(vid).textContent=v.toFixed(d); fn(v); });
  }
  bind('ic','vc',v=>cMPC=v,2); bind('ib','vb',v=>b=v,2); bind('ik','vk',v=>k=v,2);
  bind('ih','vh',v=>h=v,2); bind('iG','vG',v=>G=v,2); bind('iM','vM',v=>M=v,2);

  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click', ()=>{
      const p=b.dataset.p.split(',').map(Number);
      cMPC=p[0]; window.b=p[1]; k=p[2]; h=p[3]; G=p[4]; M=p[5];
      // Re-assign top-level since b/h/k clash w/ closure: directly assign
    });
  });
  // simpler preset binding
  document.querySelectorAll('.p').forEach(btn=>{
    btn.onclick=()=>{
      const p=btn.dataset.p.split(',').map(Number);
      cMPC=p[0]; b=p[1]; k=p[2]; h=p[3]; G=p[4]; M=p[5];
      ['ic','ib','ik','ih','iG','iM'].forEach((id,i)=>{ document.getElementById(id).value=p[i]; });
      document.getElementById('vc').textContent=p[0].toFixed(2);
      document.getElementById('vb').textContent=p[1].toFixed(2);
      document.getElementById('vk').textContent=p[2].toFixed(2);
      document.getElementById('vh').textContent=p[3].toFixed(2);
      document.getElementById('vG').textContent=p[4].toFixed(2);
      document.getElementById('vM').textContent=p[5].toFixed(2);
    };
  });
  document.getElementById('bRun').addEventListener('click', e=>{ running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); loop();
})();
</script>
</body>
</html>
