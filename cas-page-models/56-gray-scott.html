<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gray-Scott Reaction-Diffusion — Deluxe ABM</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream); letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ 56</span>
  <h2>Gray-Scott Reaction</h2>
  <p>Two chemicals U and V diffuse and react: ∂U/∂t = D_u·∇²U − UV² + F(1−U); ∂V/∂t = D_v·∇²V + UV² − (F+k)V. Different (F,k) settings produce spots, worms, mazes, and self-replicating spots.</p>

  <div class="control"><label>Feed F <span id="vF">0.0367</span></label><input type="range" id="iF" min="0.01" max="0.10" step="0.0005" value="0.0367" /></div>
  <div class="control"><label>Kill k <span id="vK">0.0649</span></label><input type="range" id="iK" min="0.04" max="0.075" step="0.0005" value="0.0649" /></div>
  <div class="control"><label>Steps/frame <span id="vS">12</span></label><input type="range" id="iS" min="1" max="40" step="1" value="12" /></div>

  <div class="btnrow" style="margin-bottom:0.4rem;">
    <button class="p" data-p="0.029,0.057">Spots</button>
    <button class="p" data-p="0.0367,0.0649">Worms</button>
    <button class="p" data-p="0.039,0.058">Maze</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="0.014,0.054">Mitosis</button>
    <button class="p" data-p="0.082,0.060">Coral</button>
    <button class="p" data-p="0.025,0.060">Solitons</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Frame</span><span class="v" id="sFr">0</span></div>
  <div class="stat"><span>Mean V</span><span class="v" id="sV">—</span></div>
  <div class="stat"><span>Pattern</span><span class="v" id="sP">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  const N = 220;
  let U = new Float32Array(N*N);
  let V = new Float32Array(N*N);
  let Un = new Float32Array(N*N);
  let Vn = new Float32Array(N*N);

  let F = 0.0367, k = 0.0649, dt = 1.0;
  const Du = 1.0, Dv = 0.5;
  let stepsPerFrame = 12;
  let running = true, frame = 0;

  const img = new ImageData(N, N);

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = true;
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    for (let i=0;i<N*N;i++) { U[i]=1; V[i]=0; }
    const seeds = 6;
    for (let s=0; s<seeds; s++) {
      const cx = ((Math.random()*0.6+0.2)*N)|0;
      const cy = ((Math.random()*0.6+0.2)*N)|0;
      for (let r=-8; r<=8; r++) for (let c=-8; c<=8; c++) {
        if (r*r+c*c>64) continue;
        const i = ((cy+r+N)%N)*N + (cx+c+N)%N;
        U[i] = 0.5; V[i] = 0.25;
      }
    }
    frame = 0;
  }

  function step() {
    for (let y=0; y<N; y++) {
      const ym = (y-1+N)%N, yp = (y+1)%N;
      for (let x=0; x<N; x++) {
        const xm = (x-1+N)%N, xp = (x+1)%N;
        const i = y*N+x;
        const lapU = U[ym*N+x] + U[yp*N+x] + U[y*N+xm] + U[y*N+xp] - 4*U[i];
        const lapV = V[ym*N+x] + V[yp*N+x] + V[y*N+xm] + V[y*N+xp] - 4*V[i];
        const uvv = U[i]*V[i]*V[i];
        Un[i] = U[i] + dt*(Du*lapU - uvv + F*(1-U[i]));
        Vn[i] = V[i] + dt*(Dv*lapV + uvv - (F+k)*V[i]);
      }
    }
    [U,Un] = [Un,U]; [V,Vn] = [Vn,V];
  }

  // Magma colormap
  function colormap(t) {
    t = Math.max(0, Math.min(1, t));
    const r = Math.round(255 * Math.pow(t, 0.55));
    const g = Math.round(255 * Math.pow(t, 1.6) * 0.8);
    const b = Math.round(255 * (0.15 + 0.85*Math.pow(1-t, 1.3)*(1-t<0.4?1:0.5)));
    return [r, g, Math.min(255, b)];
  }

  function render() {
    let sumV = 0;
    let minV=1, maxV=0;
    for (let i=0;i<N*N;i++) { if (V[i]<minV) minV=V[i]; if (V[i]>maxV) maxV=V[i]; sumV+=V[i]; }
    const range = Math.max(maxV-minV, 1e-6);
    const data = img.data;
    for (let i=0;i<N*N;i++) {
      const t = (V[i]-minV)/range;
      const c = colormap(t);
      const j = i*4;
      data[j]=c[0]; data[j+1]=c[1]; data[j+2]=c[2]; data[j+3]=255;
    }
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
    const size = Math.min(W, H) * 0.92;
    const ox = (W - size)/2, oy = (H - size)/2;
    const off = render._off || (render._off = document.createElement('canvas'));
    off.width = N; off.height = N;
    off.getContext('2d').putImageData(img, 0, 0);
    ctx.shadowColor = 'rgba(232,121,249,0.5)';
    ctx.shadowBlur = 24;
    ctx.drawImage(off, ox, oy, size, size);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(232,121,249,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(ox-1, oy-1, size+2, size+2);

    document.getElementById('sFr').textContent = frame;
    document.getElementById('sV').textContent = (sumV/(N*N)).toFixed(3);
    let label = 'evolving';
    if (F < 0.02) label = 'mitosis';
    else if (F < 0.04 && k < 0.06) label = 'spots';
    else if (k > 0.062) label = 'worms';
    else label = 'maze';
    document.getElementById('sP').textContent = label;
  }

  function loop() {
    if (running) for (let s=0; s<stepsPerFrame; s++) { step(); frame++; }
    render();
    requestAnimationFrame(loop);
  }

  function bind(id, vid, prop, decimals=4) {
    const el = document.getElementById(id);
    el.addEventListener('input', e => {
      const v = +e.target.value;
      document.getElementById(vid).textContent = id==='iS'?v:v.toFixed(decimals);
      if (prop==='F') F=v;
      if (prop==='k') k=v;
      if (prop==='S') stepsPerFrame=v;
    });
  }
  bind('iF','vF','F'); bind('iK','vK','k'); bind('iS','vS','S');
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      const [pf, pk] = b.dataset.p.split(',').map(Number);
      F=pf; k=pk;
      document.getElementById('iF').value = pf;
      document.getElementById('iK').value = pk;
      document.getElementById('vF').textContent = pf.toFixed(4);
      document.getElementById('vK').textContent = pk.toFixed(4);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  cv.addEventListener('pointerdown', e => {
    const rect = cv.getBoundingClientRect();
    const size = Math.min(W, H) * 0.92;
    const ox = (W - size)/2, oy = (H - size)/2;
    const x = e.clientX - rect.left - ox;
    const y = e.clientY - rect.top - oy;
    const cx = Math.round(x/size*N), cy = Math.round(y/size*N);
    for (let r=-5; r<=5; r++) for (let c=-5; c<=5; c++) {
      if (r*r+c*c>25) continue;
      const i = ((cy+r+N)%N)*N + (cx+c+N)%N;
      U[i]=0.5; V[i]=0.25;
    }
  });

  reset(); loop();
})();
</script>
</body>
</html>
