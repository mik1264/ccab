<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boids Flocking — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: var(--sage); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.9rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--sage); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.5rem 0.6rem; font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600; background: var(--sage); color:var(--cream); border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
  button:hover { background: var(--moss); transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  button.secondary:hover { background: rgba(254,250,224,0.25); }
  .stat { display:flex; justify-content:space-between; font-size:0.8rem; padding: 0.25rem 0; border-bottom: 1px dashed rgba(254,250,224,0.1); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM · 12</span>
  <h2>Boids Flocking</h2>
  <p>Reynolds' three rules — separation, alignment, cohesion — produce coherent flocks from simple local steering. Each boid only sees neighbors within a radius and steers based on their positions and velocities.</p>

  <div class="control">
    <label>Boids <span id="vN">300</span></label>
    <input type="range" id="iN" min="50" max="600" step="25" value="300" />
  </div>
  <div class="control">
    <label>Neighbor radius <span id="vR">50</span></label>
    <input type="range" id="iR" min="20" max="120" step="5" value="50" />
  </div>
  <div class="control">
    <label>Separation <span id="vS">1.50</span></label>
    <input type="range" id="iS" min="0" max="3" step="0.05" value="1.50" />
  </div>
  <div class="control">
    <label>Alignment <span id="vA">1.00</span></label>
    <input type="range" id="iA" min="0" max="3" step="0.05" value="1.00" />
  </div>
  <div class="control">
    <label>Cohesion <span id="vC">1.00</span></label>
    <input type="range" id="iC" min="0" max="3" step="0.05" value="1.00" />
  </div>

  <div class="btnrow" style="margin-bottom:0.9rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Frame</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Mean speed</span><span class="v" id="sSpeed">—</span></div>
  <div class="stat"><span>Polarization</span><span class="v" id="sPol">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0, dpr = Math.min(window.devicePixelRatio||1, 2);
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', () => { resize(); });
  resize();

  let N=300, R=50, wS=1.5, wA=1.0, wC=1.0;
  const MAX_SPEED=2.5, MAX_FORCE=0.06;
  let boids=[], step=0, running=true;

  function init() {
    N = +document.getElementById('iN').value;
    boids = [];
    for (let i=0;i<N;i++) {
      const a = Math.random()*Math.PI*2;
      boids.push({
        x: Math.random()*W, y: Math.random()*H,
        vx: Math.cos(a)*MAX_SPEED, vy: Math.sin(a)*MAX_SPEED
      });
    }
    step = 0;
  }

  function wrap(b) {
    if (b.x<0) b.x+=W; else if (b.x>=W) b.x-=W;
    if (b.y<0) b.y+=H; else if (b.y>=H) b.y-=H;
  }

  function tick() {
    const R2 = R*R;
    const newV = new Float32Array(N*2);
    let totalSpeed = 0;
    let mvx=0, mvy=0;
    for (let i=0;i<N;i++) {
      const bi = boids[i];
      let cnt=0, ax=0, ay=0, cx=0, cy=0, sx=0, sy=0;
      for (let j=0;j<N;j++) {
        if (i===j) continue;
        const bj = boids[j];
        let dx = bj.x - bi.x, dy = bj.y - bi.y;
        if (dx>W/2) dx-=W; else if (dx<-W/2) dx+=W;
        if (dy>H/2) dy-=H; else if (dy<-H/2) dy+=H;
        const d2 = dx*dx+dy*dy;
        if (d2<R2 && d2>0) {
          ax += bj.vx; ay += bj.vy;
          cx += bj.x;  cy += bj.y;
          if (d2<R2*0.35) { sx -= dx/d2*30; sy -= dy/d2*30; }
          cnt++;
        }
      }
      let fx=0, fy=0;
      if (cnt>0) {
        // alignment
        ax/=cnt; ay/=cnt;
        let m = Math.hypot(ax,ay)||1;
        ax = ax/m*MAX_SPEED - bi.vx; ay = ay/m*MAX_SPEED - bi.vy;
        m = Math.hypot(ax,ay); if (m>MAX_FORCE) { ax=ax/m*MAX_FORCE; ay=ay/m*MAX_FORCE; }
        // cohesion
        cx = cx/cnt - bi.x; cy = cy/cnt - bi.y;
        m = Math.hypot(cx,cy)||1;
        cx = cx/m*MAX_SPEED - bi.vx; cy = cy/m*MAX_SPEED - bi.vy;
        m = Math.hypot(cx,cy); if (m>MAX_FORCE) { cx=cx/m*MAX_FORCE; cy=cy/m*MAX_FORCE; }
        // separation
        m = Math.hypot(sx,sy);
        if (m>0) { sx=sx/m*MAX_SPEED-bi.vx; sy=sy/m*MAX_SPEED-bi.vy;
          m=Math.hypot(sx,sy); if (m>MAX_FORCE) { sx=sx/m*MAX_FORCE; sy=sy/m*MAX_FORCE; } }
        fx = wS*sx + wA*ax + wC*cx;
        fy = wS*sy + wA*ay + wC*cy;
      }
      let nvx = bi.vx + fx, nvy = bi.vy + fy;
      const sp = Math.hypot(nvx,nvy);
      if (sp>MAX_SPEED) { nvx=nvx/sp*MAX_SPEED; nvy=nvy/sp*MAX_SPEED; }
      newV[i*2]=nvx; newV[i*2+1]=nvy;
      totalSpeed += Math.min(sp, MAX_SPEED);
      mvx += nvx; mvy += nvy;
    }
    for (let i=0;i<N;i++) {
      boids[i].vx = newV[i*2]; boids[i].vy = newV[i*2+1];
      boids[i].x += boids[i].vx; boids[i].y += boids[i].vy;
      wrap(boids[i]);
    }
    step++;
    const meanV = Math.hypot(mvx/N, mvy/N);
    document.getElementById('sStep').textContent = step;
    document.getElementById('sSpeed').textContent = (totalSpeed/N).toFixed(2);
    document.getElementById('sPol').textContent = (meanV/MAX_SPEED).toFixed(3);
  }

  function draw() {
    ctx.fillStyle = '#0e1218';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#8A9A5B';
    for (let i=0;i<N;i++) {
      const b = boids[i];
      const a = Math.atan2(b.vy, b.vx);
      const ca = Math.cos(a), sa = Math.sin(a);
      ctx.beginPath();
      ctx.moveTo(b.x + ca*7, b.y + sa*7);
      ctx.lineTo(b.x + ca*-4 + sa*-3, b.y + sa*-4 + -ca*-3);
      ctx.lineTo(b.x + ca*-4 + sa*3, b.y + sa*-4 + -ca*3);
      ctx.closePath();
      ctx.fill();
    }
  }

  function loop() {
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('iN').addEventListener('input', e => { document.getElementById('vN').textContent = e.target.value; init(); });
  document.getElementById('iR').addEventListener('input', e => { R=+e.target.value; document.getElementById('vR').textContent = R; });
  document.getElementById('iS').addEventListener('input', e => { wS=+e.target.value; document.getElementById('vS').textContent = wS.toFixed(2); });
  document.getElementById('iA').addEventListener('input', e => { wA=+e.target.value; document.getElementById('vA').textContent = wA.toFixed(2); });
  document.getElementById('iC').addEventListener('input', e => { wC=+e.target.value; document.getElementById('vC').textContent = wC.toFixed(2); });
  document.getElementById('bRun').addEventListener('click', e => { running=!running; e.target.textContent = running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
