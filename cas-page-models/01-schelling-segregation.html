<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schelling Segregation — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    color: var(--earth); margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--sage); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.9rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--sage); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--sage); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: var(--moss); transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  button.secondary:hover { background: rgba(254,250,224,0.25); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM · 01</span>
  <h2>Schelling Segregation</h2>
  <p>Each agent stays put if the share of same-color neighbors is at least its tolerance. Otherwise it relocates to a random empty cell. Even mild same-type preference tips the system toward segregation.</p>

  <div class="control">
    <label>Tolerance threshold <span id="vTol">0.30</span></label>
    <input type="range" id="iTol" min="0" max="1" step="0.01" value="0.30" />
  </div>
  <div class="control">
    <label>Density <span id="vDen">0.90</span></label>
    <input type="range" id="iDen" min="0.5" max="0.98" step="0.01" value="0.90" />
  </div>
  <div class="control">
    <label>Grid size <span id="vN">80</span></label>
    <input type="range" id="iN" min="40" max="140" step="10" value="80" />
  </div>

  <div class="btnrow" style="margin-bottom:0.9rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Unhappy agents</span><span class="v" id="sUnhappy">—</span></div>
  <div class="stat"><span>Same-color share</span><span class="v" id="sShare">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0, dpr = Math.min(window.devicePixelRatio||1, 2);
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', () => { resize(); draw(); });
  resize();

  const COLOR_A = '#DDA15E', COLOR_B = '#8A9A5B', COLOR_E = '#1a2230';

  let N=80, density=0.90, tol=0.30;
  let grid=[], unhappy=[], step=0, running=true;

  function init() {
    N = +document.getElementById('iN').value;
    density = +document.getElementById('iDen').value;
    tol = +document.getElementById('iTol').value;
    grid = new Int8Array(N*N);
    for (let i=0;i<N*N;i++) {
      if (Math.random()<density) grid[i] = Math.random()<0.5 ? 1 : 2;
      else grid[i] = 0;
    }
    step = 0;
    document.getElementById('vN').textContent = N;
    document.getElementById('vDen').textContent = density.toFixed(2);
    document.getElementById('vTol').textContent = tol.toFixed(2);
  }

  function neighborStats(i) {
    const r = (i/N)|0, c = i%N;
    let same=0, diff=0;
    const me = grid[i]; if (me===0) return [0,0];
    for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
      if (!dr && !dc) continue;
      const rr=r+dr, cc=c+dc;
      if (rr<0||rr>=N||cc<0||cc>=N) continue;
      const v = grid[rr*N+cc];
      if (v===0) continue;
      if (v===me) same++; else diff++;
    }
    return [same, diff];
  }

  function tick() {
    unhappy = [];
    const empty = [];
    let totalSame=0, totalContacts=0;
    for (let i=0;i<N*N;i++) {
      if (grid[i]===0) empty.push(i);
      else {
        const [s,d] = neighborStats(i);
        const total = s+d;
        if (total>0) {
          totalSame += s; totalContacts += s+d;
          if (s/total < tol) unhappy.push(i);
        }
      }
    }
    // shuffle empties
    for (let k=empty.length-1; k>0; k--) {
      const j = (Math.random()*(k+1))|0;
      [empty[k], empty[j]] = [empty[j], empty[k]];
    }
    // shuffle unhappy
    for (let k=unhappy.length-1; k>0; k--) {
      const j = (Math.random()*(k+1))|0;
      [unhappy[k], unhappy[j]] = [unhappy[j], unhappy[k]];
    }
    let m = Math.min(unhappy.length, empty.length);
    for (let k=0; k<m; k++) {
      const u = unhappy[k], e = empty[k];
      grid[e] = grid[u]; grid[u] = 0;
    }
    step++;
    document.getElementById('sStep').textContent = step;
    document.getElementById('sUnhappy').textContent = unhappy.length;
    document.getElementById('sShare').textContent = totalContacts>0 ? (totalSame/totalContacts).toFixed(3) : '—';
  }

  function draw() {
    ctx.fillStyle = '#0e1218';
    ctx.fillRect(0,0,W,H);
    const cell = Math.min(W,H)/N;
    const ox = (W - cell*N)/2, oy = (H - cell*N)/2;
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      const v = grid[r*N+c];
      if (v===0) continue;
      ctx.fillStyle = v===1 ? COLOR_A : COLOR_B;
      ctx.fillRect(ox + c*cell, oy + r*cell, cell+0.5, cell+0.5);
    }
  }

  function loop() {
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  // controls
  ['iTol','iDen','iN'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
      const id2 = id==='iTol'?'vTol':id==='iDen'?'vDen':'vN';
      const v = +e.target.value;
      document.getElementById(id2).textContent = id==='iN'?v:v.toFixed(2);
      if (id==='iTol') tol = v;
      if (id==='iDen' || id==='iN') init();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
