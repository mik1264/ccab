<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Limits to Growth — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend {
    display:flex; gap:0.7rem; font-size:0.75rem; margin-top:0.5rem; flex-wrap:wrap;
  }
  .legend span::before {
    content:''; display:inline-block; width:10px; height:10px;
    border-radius:3px; margin-right:5px; vertical-align: middle;
  }
  .legend .pop::before { background: #8A9A5B; }
  .legend .res::before { background: #DDA15E; }
  .legend .pol::before { background: #BC6C25; }
  .legend .cap::before { background: #6FB5C7; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 34</span>
  <h2>Limits to Growth</h2>
  <p>World3-lite. Four stocks (Pop, Resources, Pollution, Capital) interact through extraction, investment, depreciation and pollution-mortality. Watch the canonical overshoot-and-collapse.</p>

  <div class="control"><label>R₀ initial resources <span id="vR">1000</span></label><input type="range" id="iR" min="200" max="3000" step="10" value="1000" /></div>
  <div class="control"><label>pollution decay τ <span id="vD">25</span></label><input type="range" id="iD" min="5" max="80" step="1" value="25" /></div>
  <div class="control"><label>investment fraction <span id="vS">0.20</span></label><input type="range" id="iS" min="0.05" max="0.6" step="0.01" value="0.20" /></div>
  <div class="control"><label>extraction efficiency <span id="vE">0.020</span></label><input type="range" id="iE" min="0.005" max="0.080" step="0.001" value="0.020" /></div>
  <div class="control"><label>pollution per capital <span id="vP">0.012</span></label><input type="range" id="iP" min="0.002" max="0.040" step="0.001" value="0.012" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>year</span><span class="v" id="st">0</span></div>
  <div class="stat"><span>Pop</span><span class="v" id="sp">—</span></div>
  <div class="stat"><span>Resources</span><span class="v" id="sr">—</span></div>
  <div class="stat"><span>Pollution</span><span class="v" id="spol">—</span></div>
  <div class="stat"><span>Capital</span><span class="v" id="sk">—</span></div>
  <div class="legend"><span class="pop">Pop</span><span class="res">Resources</span><span class="pol">Pollution</span><span class="cap">Capital</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize',resize); resize();

  const COL_P='#8A9A5B', COL_R='#DDA15E', COL_POL='#BC6C25', COL_K='#6FB5C7';
  const GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  let R0=1000, decayTau=25, invFrac=0.20, extEff=0.020, polRate=0.012;
  let Pop, Res, Pol, K, year, running=true, accum=0;
  const series=[]; const MAX=2000;

  function reset(){
    Pop=1.0; Res=R0; Pol=0; K=1.0; year=0; series.length=0; accum=0;
  }

  // derivatives
  function deriv(P, Rs, Po, Cap){
    const birthRate = 0.04 * P;
    const polEffect = 1 + 0.0008*Po*Po;
    const deathRate = 0.012 * P * polEffect;
    const extraction = extEff * Cap * (Rs/(Rs+200));
    const food = extraction; // proxy: extraction supports population
    const popLimit = 1 - 1/(1+food/(0.5*P+0.01));
    const dP = birthRate*Math.max(0,popLimit) - deathRate;
    const dR = -extraction;
    const dPo = polRate*Cap - Po/decayTau;
    const Y = Math.pow(Cap, 0.4) * Math.pow(P, 0.6);
    const dK = invFrac*Y - 0.05*Cap;
    return [dP,dR,dPo,dK];
  }

  function rk4(dt){
    const k1=deriv(Pop,Res,Pol,K);
    const k2=deriv(Pop+dt/2*k1[0],Res+dt/2*k1[1],Pol+dt/2*k1[2],K+dt/2*k1[3]);
    const k3=deriv(Pop+dt/2*k2[0],Res+dt/2*k2[1],Pol+dt/2*k2[2],K+dt/2*k2[3]);
    const k4=deriv(Pop+dt*k3[0],Res+dt*k3[1],Pol+dt*k3[2],K+dt*k3[3]);
    Pop += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    Res += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    Pol += dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
    K   += dt/6*(k1[3]+2*k2[3]+2*k3[3]+k4[3]);
    Pop=Math.max(0,Pop); Res=Math.max(0,Res); Pol=Math.max(0,Pol); K=Math.max(0.01,K);
    year += dt;
  }

  function tick(){
    const dt=0.25;
    if (year<300){
      for (let i=0;i<2;i++) rk4(dt);
      series.push({t:year, P:Pop, R:Res, Po:Pol, K});
      if (series.length>MAX) series.shift();
    }
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if (series.length<2) return;
    const padL=80, padR=360, padT=70, padB=60;
    const totW = W-padL-padR;
    const totH = H-padT-padB;

    // separate normalization by max-of-each so all visible
    let mP=1,mR=1,mPo=1,mK=1;
    for (const s of series){
      if (s.P>mP) mP=s.P;
      if (s.R>mR) mR=s.R;
      if (s.Po>mPo) mPo=s.Po;
      if (s.K>mK) mK=s.K;
    }
    const t0=series[0].t, t1=series[series.length-1].t;
    const tspan=Math.max(t1-t0,1);

    // grid
    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for (let i=0;i<=5;i++){ const yp=padT+i*totH/5;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke(); }
    for (let i=0;i<=6;i++){ const xp=padL+i*totW/6;
      ctx.beginPath(); ctx.moveTo(xp,padT); ctx.lineTo(xp,padT+totH); ctx.stroke(); }

    ctx.strokeStyle=AXIS; ctx.beginPath();
    ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+totH); ctx.lineTo(padL+totW,padT+totH); ctx.stroke();

    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('World3-lite — overshoot & collapse', padL, padT-22);
    ctx.font='11px Nunito';
    ctx.fillStyle='rgba(254,250,224,0.5)';
    for (let i=0;i<=6;i++){
      const yr=t0 + i*(tspan)/6;
      ctx.fillText(yr.toFixed(0), padL+i*totW/6 - 10, padT+totH+16);
    }
    ctx.fillText('year', padL+totW-25, padT+totH+34);
    ctx.fillText('(each curve scaled to its own max)', padL, padT+totH+34);

    function plot(getter, max, color){
      ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.t-t0)/tspan*totW;
        const py=padT+totH - getter(s)/max*totH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    plot(s=>s.P,mP,COL_P);
    plot(s=>s.R,mR,COL_R);
    plot(s=>s.Po,mPo,COL_POL);
    plot(s=>s.K,mK,COL_K);

    // last value labels
    const last=series[series.length-1];
    function tag(getter, max, color, name, idx){
      const py=padT+totH - getter(last)/max*totH;
      const x=padL+totW+8;
      ctx.fillStyle=color; ctx.fillRect(x,py-1,12,2);
      ctx.fillStyle='rgba(254,250,224,0.8)';
      ctx.fillText(name, x+16, py+4);
    }
    tag(s=>s.P,mP,COL_P,'Pop');
    tag(s=>s.R,mR,COL_R,'Res');
    tag(s=>s.Po,mPo,COL_POL,'Pol');
    tag(s=>s.K,mK,COL_K,'Cap');

    document.getElementById('st').textContent = year.toFixed(0);
    document.getElementById('sp').textContent = Pop.toFixed(2);
    document.getElementById('sr').textContent = Res.toFixed(0);
    document.getElementById('spol').textContent = Pol.toFixed(2);
    document.getElementById('sk').textContent = K.toFixed(2);
  }

  function loop(){
    if (running){ accum++; if (accum>=1){ accum=0; tick(); } }
    draw();
    requestAnimationFrame(loop);
  }

  function bind(id,vid,prop,dec){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      if (prop==='R') R0=v;
      if (prop==='D') decayTau=v;
      if (prop==='S') invFrac=v;
      if (prop==='E') extEff=v;
      if (prop==='P') polRate=v;
    });
  }
  bind('iR','vR','R',0); bind('iD','vD','D',0); bind('iS','vS','S',2);
  bind('iE','vE','E',3); bind('iP','vP','P',3);

  document.getElementById('bRun').addEventListener('click',e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
