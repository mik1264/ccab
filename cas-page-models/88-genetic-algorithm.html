<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Genetic Algorithm — CAS</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d;
    --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.2rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.7rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem;
    padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ NN</span>
  <h2>Genetic Algorithm</h2>
  <p>Evolve bit strings to match a target. Tournament selection, single-point crossover, bit-flip mutation. Each row of the stack is a chromosome — glow = match, dim = mismatch.</p>

  <div class="control"><label>Mutation rate <span id="vMu">0.012</span></label><input type="range" id="iMu" min="0.0" max="0.10" step="0.001" value="0.012" /></div>
  <div class="control"><label>Population <span id="vP">80</span></label><input type="range" id="iP" min="20" max="160" step="10" value="80" /></div>
  <div class="control"><label>Bit length L <span id="vL">96</span></label><input type="range" id="iL" min="32" max="160" step="8" value="96" /></div>
  <div class="control"><label>Tournament k <span id="vK">3</span></label><input type="range" id="iK" min="2" max="8" step="1" value="3" /></div>

  <div class="btnrow">
    <button class="p" data-mu="0.002">Stable</button>
    <button class="p" data-mu="0.012">Tuned</button>
    <button class="p" data-mu="0.05">Chaotic</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Generation</span><span class="v" id="sG">0</span></div>
  <div class="stat"><span>Best fitness</span><span class="v" id="sBF">—</span></div>
  <div class="stat"><span>Mean fitness</span><span class="v" id="sMF">—</span></div>
  <div class="stat"><span>Status</span><span class="v" id="sSt">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  let mu = 0.012, P = 80, L = 96, K = 3;
  let pop = []; // Uint8Array per individual
  let target = null;
  let fitness = [];
  let gen = 0;
  let running = true;
  let history = []; // best & mean fitness over time

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    target = new Uint8Array(L);
    for (let j=0;j<L;j++) target[j] = Math.random()<0.5 ? 0 : 1;
    pop = [];
    for (let i=0;i<P;i++) {
      const ind = new Uint8Array(L);
      for (let j=0;j<L;j++) ind[j] = Math.random()<0.5 ? 0 : 1;
      pop.push(ind);
    }
    fitness = new Array(P).fill(0);
    gen = 0;
    history = [];
    evalAll();
  }

  function evalAll() {
    for (let i=0;i<P;i++) {
      let f = 0;
      for (let j=0;j<L;j++) if (pop[i][j]===target[j]) f++;
      fitness[i] = f;
    }
  }

  function tournament() {
    let best = (Math.random()*P)|0;
    for (let k=1;k<K;k++) {
      const c = (Math.random()*P)|0;
      if (fitness[c] > fitness[best]) best = c;
    }
    return best;
  }

  function step() {
    // Sort to keep elitism (top 2)
    const order = Array.from({length: P}, (_, i) => i)
      .sort((a, b) => fitness[b] - fitness[a]);
    const newPop = [];
    // elitism
    newPop.push(new Uint8Array(pop[order[0]]));
    newPop.push(new Uint8Array(pop[order[1]]));

    while (newPop.length < P) {
      const a = tournament(), b = tournament();
      const cp = 1 + ((Math.random()*(L-1))|0);
      const c1 = new Uint8Array(L), c2 = new Uint8Array(L);
      for (let j=0;j<L;j++) {
        c1[j] = j<cp ? pop[a][j] : pop[b][j];
        c2[j] = j<cp ? pop[b][j] : pop[a][j];
      }
      // mutation
      for (let j=0;j<L;j++) {
        if (Math.random()<mu) c1[j] = 1 - c1[j];
        if (Math.random()<mu) c2[j] = 1 - c2[j];
      }
      newPop.push(c1);
      if (newPop.length < P) newPop.push(c2);
    }
    pop = newPop;
    evalAll();
    gen++;
    let best = 0, sum = 0;
    for (let i=0;i<P;i++) { if (fitness[i]>best) best=fitness[i]; sum += fitness[i]; }
    history.push([best/L, sum/(P*L)]);
    if (history.length > 400) history.shift();
  }

  function render() {
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);

    // Layout: chromosome stack (large) + fitness curve below
    const stackW = Math.min(W - 380, 900);
    const stackH = Math.min(H - 280, 460);
    const ox = (W - stackW)/2 - 100;
    const oy = (H - stackH - 140)/2 + 30;

    ctx.fillStyle = 'rgba(254,250,224,0.85)';
    ctx.font = '600 16px Lora, serif';
    ctx.textAlign = 'left';
    ctx.fillText('Population × bits', ox, oy - 14);

    // Sort population by fitness descending for stable visual
    const order = Array.from({length: P}, (_, i) => i)
      .sort((a, b) => fitness[b] - fitness[a]);

    const cellH = stackH / P;
    const cellW = stackW / L;

    // Draw target row above
    ctx.fillStyle = 'rgba(232,121,249,0.7)';
    ctx.font = '600 10px Nunito';
    ctx.textAlign = 'right';
    ctx.fillText('target →', ox-4, oy + 8);
    for (let j=0;j<L;j++) {
      ctx.fillStyle = target[j]===1 ? '#e879f9' : 'rgba(232,121,249,0.2)';
      ctx.fillRect(ox + j*cellW, oy - 14, cellW, 8);
    }

    // Draw population
    for (let r=0;r<P;r++) {
      const ind = pop[order[r]];
      const f = fitness[order[r]];
      for (let j=0;j<L;j++) {
        const match = ind[j]===target[j];
        if (match && ind[j]===1) {
          ctx.fillStyle = '#06b6d4';
        } else if (match && ind[j]===0) {
          ctx.fillStyle = 'rgba(6,182,212,0.5)';
        } else {
          ctx.fillStyle = ind[j]===1 ? 'rgba(254,250,224,0.18)' : 'rgba(254,250,224,0.05)';
        }
        ctx.fillRect(ox + j*cellW, oy + r*cellH, cellW+0.5, cellH+0.5);
      }
    }
    // Glow on best row
    ctx.shadowColor = '#06b6d4'; ctx.shadowBlur = 14;
    ctx.strokeStyle = '#06b6d4';
    ctx.lineWidth = 1.6;
    ctx.strokeRect(ox, oy, stackW, cellH);
    ctx.shadowBlur = 0;

    // Frame
    ctx.strokeStyle = 'rgba(254,250,224,0.18)';
    ctx.lineWidth = 1;
    ctx.strokeRect(ox, oy, stackW, stackH);

    // Fitness curve below
    const fy = oy + stackH + 36;
    const fh = 100;
    ctx.fillStyle = 'rgba(254,250,224,0.85)';
    ctx.font = '600 14px Lora, serif';
    ctx.fillText('Fitness over generations', ox, fy - 10);
    ctx.strokeStyle = 'rgba(254,250,224,0.18)';
    ctx.strokeRect(ox, fy, stackW, fh);

    if (history.length>1) {
      // mean
      ctx.strokeStyle = 'rgba(221,161,94,0.85)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let i=0;i<history.length;i++) {
        const x = ox + i*stackW/Math.max(1, history.length-1);
        const y = fy + fh - history[i][1]*fh;
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
      // best
      ctx.strokeStyle = '#06b6d4';
      ctx.shadowColor = '#06b6d4'; ctx.shadowBlur = 8;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i=0;i<history.length;i++) {
        const x = ox + i*stackW/Math.max(1, history.length-1);
        const y = fy + fh - history[i][0]*fh;
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    // Legend
    ctx.fillStyle = '#06b6d4';
    ctx.fillRect(ox + stackW - 120, fy + 6, 12, 6);
    ctx.fillStyle = 'rgba(254,250,224,0.8)';
    ctx.font = '500 11px Nunito';
    ctx.textAlign = 'left';
    ctx.fillText('best', ox + stackW - 102, fy + 12);
    ctx.fillStyle = 'rgba(221,161,94,0.85)';
    ctx.fillRect(ox + stackW - 60, fy + 6, 12, 6);
    ctx.fillStyle = 'rgba(254,250,224,0.8)';
    ctx.fillText('mean', ox + stackW - 42, fy + 12);

    // Stats
    let best = 0, sum = 0;
    for (let i=0;i<P;i++) { if (fitness[i]>best) best=fitness[i]; sum += fitness[i]; }
    const status = best===L ? 'CONVERGED' : (gen>500 && best/L>0.95 ? 'near-target' : 'evolving');
    document.getElementById('sG').textContent = gen;
    document.getElementById('sBF').textContent = best+'/'+L;
    document.getElementById('sMF').textContent = (sum/(P*L)*100).toFixed(1)+'%';
    document.getElementById('sSt').textContent = status;
  }

  function loop() {
    if (running) step();
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iMu').addEventListener('input', e => {
    mu = +e.target.value;
    document.getElementById('vMu').textContent = mu.toFixed(3);
  });
  document.getElementById('iP').addEventListener('input', e => {
    P = +e.target.value;
    document.getElementById('vP').textContent = P;
    reset();
  });
  document.getElementById('iL').addEventListener('input', e => {
    L = +e.target.value;
    document.getElementById('vL').textContent = L;
    reset();
  });
  document.getElementById('iK').addEventListener('input', e => {
    K = +e.target.value;
    document.getElementById('vK').textContent = K;
  });
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      mu = +b.dataset.mu;
      document.getElementById('iMu').value = mu;
      document.getElementById('vMu').textContent = mu.toFixed(3);
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
