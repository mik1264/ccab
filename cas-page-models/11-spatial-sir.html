<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spatial SIR — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; cursor: crosshair; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--sage); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.9rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--sage); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--sage); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: var(--moss); transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  button.secondary:hover { background: rgba(254,250,224,0.25); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .chart {
    width:100%; height:120px;
    background: rgba(0,0,0,0.25);
    border-radius:10px; margin-top:0.5rem;
  }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM · 11</span>
  <h2>Spatial SIR</h2>
  <p>Susceptibles, Infecteds, Recovereds on a grid. Each step infected agents spread to S-neighbors with probability β; each infected recovers with probability γ. Click to seed an outbreak. R₀ ≈ 4β/γ for the 4-neighbor lattice.</p>

  <div class="control">
    <label>Infection rate β <span id="vB">0.30</span></label>
    <input type="range" id="iB" min="0" max="1" step="0.01" value="0.30" />
  </div>
  <div class="control">
    <label>Recovery rate γ <span id="vG">0.10</span></label>
    <input type="range" id="iG" min="0.01" max="1" step="0.01" value="0.10" />
  </div>
  <div class="control">
    <label>Grid size <span id="vN">140</span></label>
    <input type="range" id="iN" min="60" max="240" step="10" value="140" />
  </div>

  <div class="btnrow" style="margin-bottom:0.9rem;">
    <button id="bRun">Pause</button>
    <button id="bSeed" class="secondary">Seed center</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Susceptible</span><span class="v" id="sS">—</span></div>
  <div class="stat"><span>Infected</span><span class="v" id="sI">—</span></div>
  <div class="stat"><span>Recovered</span><span class="v" id="sR">—</span></div>
  <canvas id="chart" class="chart"></canvas>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  const ch = document.getElementById('chart');
  const cctx = ch.getContext('2d');
  let W=0, H=0, dpr = Math.min(window.devicePixelRatio||1, 2);
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    // chart canvas
    const cw = ch.clientWidth, ch_h = ch.clientHeight;
    ch.width = cw*dpr; ch.height = ch_h*dpr;
    cctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', () => { resize(); draw(); });
  resize();

  // 0=S, 1=I, 2=R
  let N=140, beta=0.30, gamma=0.10;
  let grid, next;
  let step=0, running=true, history=[];

  function init() {
    N = +document.getElementById('iN').value;
    beta = +document.getElementById('iB').value;
    gamma = +document.getElementById('iG').value;
    grid = new Uint8Array(N*N);
    next = new Uint8Array(N*N);
    step = 0;
    history = [];
    document.getElementById('vN').textContent = N;
    document.getElementById('vB').textContent = beta.toFixed(2);
    document.getElementById('vG').textContent = gamma.toFixed(2);
    pushHistory();
  }

  function seedCenter() {
    const r = (N/2)|0, c = (N/2)|0;
    for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
      const rr=r+dr, cc=c+dc;
      if (rr<0||rr>=N||cc<0||cc>=N) continue;
      grid[rr*N+cc] = 1;
    }
  }

  function tick() {
    next.set(grid);
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      const i = r*N+c;
      const v = grid[i];
      if (v===1) {
        if (Math.random() < gamma) next[i] = 2;
      } else if (v===0) {
        let infN = 0;
        if (r>0 && grid[(r-1)*N+c]===1) infN++;
        if (r<N-1 && grid[(r+1)*N+c]===1) infN++;
        if (c>0 && grid[r*N+c-1]===1) infN++;
        if (c<N-1 && grid[r*N+c+1]===1) infN++;
        if (infN>0) {
          // probability at least one infects
          const pInf = 1 - Math.pow(1-beta, infN);
          if (Math.random() < pInf) next[i] = 1;
        }
      }
    }
    [grid,next] = [next,grid];
    step++;
    pushHistory();
  }

  function pushHistory() {
    let s=0,i=0,r=0;
    for (let k=0;k<N*N;k++) {
      if (grid[k]===0) s++;
      else if (grid[k]===1) i++;
      else r++;
    }
    history.push([s,i,r]);
    if (history.length > 600) history.shift();
    document.getElementById('sStep').textContent = step;
    document.getElementById('sS').textContent = s;
    document.getElementById('sI').textContent = i;
    document.getElementById('sR').textContent = r;
  }

  function draw() {
    ctx.fillStyle = '#0e1218';
    ctx.fillRect(0,0,W,H);
    const cell = Math.min(W,H)/N;
    const ox = (W - cell*N)/2, oy = (H - cell*N)/2;
    ctx.fillStyle = '#1a2230';
    ctx.fillRect(ox, oy, cell*N, cell*N);
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      const v = grid[r*N+c];
      if (v===0) { ctx.fillStyle = '#3d4a5e'; }
      else if (v===1) { ctx.fillStyle = '#BC6C25'; }
      else { ctx.fillStyle = '#606C38'; }
      ctx.fillRect(ox+c*cell, oy+r*cell, cell+0.5, cell+0.5);
    }
    drawChart();
  }

  function drawChart() {
    const cw = ch.clientWidth, ch_h = ch.clientHeight;
    cctx.fillStyle = 'rgba(20,28,38,0.6)';
    cctx.fillRect(0,0,cw,ch_h);
    if (history.length<2) return;
    const total = N*N;
    const px = i => (i/(history.length-1))*cw;
    const py = v => ch_h - (v/total)*ch_h;
    function line(idx, color) {
      cctx.strokeStyle = color; cctx.lineWidth=1.5;
      cctx.beginPath();
      for (let i=0;i<history.length;i++) {
        const x = px(i), y = py(history[i][idx]);
        if (i===0) cctx.moveTo(x,y); else cctx.lineTo(x,y);
      }
      cctx.stroke();
    }
    line(0, '#5e8aa6'); // S blue-grey
    line(1, '#BC6C25'); // I terracotta
    line(2, '#8A9A5B'); // R sage
    cctx.fillStyle='rgba(254,250,224,0.7)'; cctx.font="10px 'Nunito',sans-serif";
    cctx.fillText('S', 4, 12); cctx.fillStyle='#5e8aa6'; cctx.fillRect(14, 6, 10, 3);
    cctx.fillStyle='rgba(254,250,224,0.7)'; cctx.fillText('I', 32, 12); cctx.fillStyle='#BC6C25'; cctx.fillRect(40, 6, 10, 3);
    cctx.fillStyle='rgba(254,250,224,0.7)'; cctx.fillText('R', 58, 12); cctx.fillStyle='#8A9A5B'; cctx.fillRect(66, 6, 10, 3);
  }

  function loop() {
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  // click to infect
  let painting=false;
  function cellAt(x,y) {
    const cell = Math.min(W,H)/N;
    const ox = (W - cell*N)/2, oy = (H - cell*N)/2;
    const c = Math.floor((x-ox)/cell), r = Math.floor((y-oy)/cell);
    if (r<0||r>=N||c<0||c>=N) return -1;
    return r*N+c;
  }
  cv.addEventListener('mousedown', e => {
    const i = cellAt(e.clientX, e.clientY);
    if (i<0) return;
    grid[i] = 1;
    painting=true;
  });
  cv.addEventListener('mousemove', e => {
    if (!painting) return;
    const i = cellAt(e.clientX, e.clientY);
    if (i>=0) grid[i] = 1;
  });
  window.addEventListener('mouseup', () => painting=false);

  document.getElementById('iB').addEventListener('input', e => {
    beta = +e.target.value;
    document.getElementById('vB').textContent = beta.toFixed(2);
  });
  document.getElementById('iG').addEventListener('input', e => {
    gamma = +e.target.value;
    document.getElementById('vG').textContent = gamma.toFixed(2);
  });
  document.getElementById('iN').addEventListener('input', e => {
    document.getElementById('vN').textContent = e.target.value;
    init();
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bSeed').addEventListener('click', seedCenter);
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
