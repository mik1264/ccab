<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ricker Stock-Recruitment — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem; color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 103</span>
  <h2>Ricker Recruitment</h2>
  <p>Discrete map N<sub>t+1</sub> = N<sub>t</sub>·exp(r(1 − N<sub>t</sub>/K)). At low r the population settles to K; raising r drives period doubling and chaos — the classic route from order to disorder.</p>

  <div class="control"><label>r intrinsic rate <span id="vr">2.20</span></label><input type="range" id="ir" min="0.05" max="4" step="0.005" value="2.20" /></div>
  <div class="control"><label>K carrying cap <span id="vk">100</span></label><input type="range" id="ik" min="20" max="200" step="1" value="100" /></div>
  <div class="control"><label>N₀ initial <span id="vn">10</span></label><input type="range" id="in" min="1" max="200" step="1" value="10" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-r="1.50">Stable</button>
    <button class="p" data-r="2.30">2-cycle</button>
    <button class="p" data-r="2.65">4-cycle</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.7rem;">
    <button class="p" data-r="3.00">Chaos</button>
    <button class="p" data-r="3.50">Deep chaos</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>step t</span><span class="v" id="st">0</span></div>
  <div class="stat"><span>N(t)</span><span class="v" id="sn">—</span></div>
  <div class="stat"><span>regime</span><span class="v" id="sr">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c'); const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() { W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize', resize); resize();

  const SAGE='#8A9A5B', TERRA='#BC6C25', EARTH='#DDA15E', MAGENTA='#e879f9', CYAN='#06b6d4';
  const GRID='rgba(254,250,224,0.08)', AXIS='rgba(254,250,224,0.4)', TXT='rgba(254,250,224,0.7)';

  let r=2.20, K=100, N0=10;
  let N=N0, t=0, running=true;
  const series=[]; const MAX=400;
  let bifData=null;

  function reset() { N=N0; t=0; series.length=0; computeBif(); }

  function ricker(n,rr) { return n*Math.exp(rr*(1-n/K)); }

  function step() { N = ricker(N,r); if (N<0) N=0; if (N>1e6) N=1e6; t++; series.push(N); if (series.length>MAX) series.shift(); }

  function computeBif() {
    const W=600;
    const arr = new Array(W);
    for (let i=0;i<W;i++) {
      const rr = i/(W-1)*4;
      let n = 10;
      for (let s=0;s<300;s++) n = ricker(n,rr); // burn-in
      const pts=[]; for (let s=0;s<80;s++) { n=ricker(n,rr); pts.push(n); }
      arr[i] = pts;
    }
    bifData = arr;
  }

  function regimeOf(rr) {
    if (rr<2.0) return 'stable';
    if (rr<2.526) return '2-cycle';
    if (rr<2.692) return '4-cycle';
    if (rr<2.74) return '8-cycle';
    return 'chaos';
  }

  function draw() {
    ctx.fillStyle = '#06080d'; ctx.fillRect(0,0,W,H);

    const padL=70, padR=360, padT=60, padG=40;
    const col = W - padL - padR;
    const rowH = (H - padT - padG*2 - 30)/3;

    // === Panel 1: time series ===
    let y0 = padT;
    drawAxes(padL, y0, col, rowH, 'Iterates  N(t)', 't', 'N');
    let mx = 0; for (const v of series) if (v>mx) mx=v; if (mx<1) mx=1;
    if (series.length>1) {
      // glow
      ctx.shadowColor = SAGE; ctx.shadowBlur = 12;
      ctx.strokeStyle = SAGE; ctx.lineWidth = 2; ctx.beginPath();
      for (let i=0;i<series.length;i++) {
        const px = padL + i/(MAX-1)*col;
        const py = y0 + rowH - series[i]/mx*rowH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke(); ctx.shadowBlur=0;
      // points
      ctx.fillStyle = EARTH;
      for (let i=Math.max(0,series.length-60);i<series.length;i++) {
        const px = padL + i/(MAX-1)*col;
        const py = y0 + rowH - series[i]/mx*rowH;
        ctx.beginPath(); ctx.arc(px,py,1.8,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.fillStyle = TXT; ctx.font='11px Nunito';
    ctx.fillText(mx.toFixed(0), padL-40, y0+5); ctx.fillText('0', padL-15, y0+rowH);

    // === Panel 2: cobweb ===
    y0 = padT + rowH + padG;
    const sq = Math.min(col*0.55, rowH);
    const cbX = padL, cbY = y0;
    drawAxes(cbX, cbY, sq, sq, 'Cobweb diagram   N→f(N)', 'N', 'f(N)');
    // function curve f(N)=N exp(r(1-N/K))
    let fmax = 0; const NS=120; const rangeN = K*2.5;
    for (let i=0;i<NS;i++) { const n = i/(NS-1)*rangeN; const v = ricker(n,r); if (v>fmax) fmax=v; }
    if (fmax<1) fmax=1;
    // identity y=x
    ctx.strokeStyle = 'rgba(254,250,224,0.28)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath();
    const xMaxAxis = rangeN; const yMaxAxis = fmax;
    const sxF = sq/xMaxAxis, syF = sq/yMaxAxis;
    ctx.moveTo(cbX, cbY+sq); ctx.lineTo(cbX + Math.min(xMaxAxis, yMaxAxis)*sxF, cbY+sq - Math.min(xMaxAxis, yMaxAxis)*syF);
    ctx.stroke(); ctx.setLineDash([]);
    // f curve
    ctx.shadowColor = MAGENTA; ctx.shadowBlur = 10;
    ctx.strokeStyle = MAGENTA; ctx.lineWidth = 2; ctx.beginPath();
    for (let i=0;i<NS;i++) { const n = i/(NS-1)*rangeN; const v = ricker(n,r);
      const px = cbX + n*sxF, py = cbY+sq - v*syF;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py); }
    ctx.stroke(); ctx.shadowBlur=0;
    // cobweb steps
    if (series.length>1) {
      ctx.strokeStyle = CYAN; ctx.lineWidth = 1.5; ctx.beginPath();
      let prev = N0;
      const m = Math.min(60, series.length);
      for (let i=Math.max(0,series.length-m); i<series.length; i++) {
        const n0 = i===0 ? N0 : series[i-1] || N0;
        const n1 = series[i];
        // vertical line from (n0, n0) to (n0, n1)
        ctx.moveTo(cbX + n0*sxF, cbY+sq - n0*syF);
        ctx.lineTo(cbX + n0*sxF, cbY+sq - n1*syF);
        // horizontal to (n1, n1)
        ctx.lineTo(cbX + n1*sxF, cbY+sq - n1*syF);
      }
      ctx.stroke();
    }

    // === Panel 3: bifurcation ===
    const bfX = cbX + sq + 30, bfY = y0;
    const bfW = padL + col - bfX;
    drawAxes(bfX, bfY, bfW, sq, 'Bifurcation diagram in r', 'r', 'attractor N*');
    if (bifData) {
      let bfMax=0;
      for (const arr of bifData) for (const v of arr) if (v>bfMax) bfMax=v;
      if (bfMax<1) bfMax=1;
      ctx.fillStyle = 'rgba(232,121,249,0.65)';
      for (let i=0;i<bifData.length;i++) {
        const px = bfX + i/(bifData.length-1)*bfW;
        for (const v of bifData[i]) {
          const py = bfY+sq - v/bfMax*sq;
          ctx.fillRect(px, py, 1, 1);
        }
      }
      // marker for current r
      const rx = bfX + r/4*bfW;
      ctx.strokeStyle = EARTH; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(rx, bfY); ctx.lineTo(rx, bfY+sq); ctx.stroke();
      ctx.fillStyle = EARTH; ctx.font='10px Nunito';
      ctx.fillText('r='+r.toFixed(2), rx+4, bfY+12);
      // r-axis ticks
      ctx.fillStyle = TXT;
      for (let k=0;k<=4;k++) {
        const px = bfX + k/4*bfW;
        ctx.fillText(k.toFixed(0), px-3, bfY+sq+14);
      }
    }

    document.getElementById('st').textContent = t;
    document.getElementById('sn').textContent = N.toFixed(2);
    document.getElementById('sr').textContent = regimeOf(r);
  }

  function drawAxes(x,y,w,h,title,xl,yl) {
    ctx.strokeStyle = GRID; ctx.lineWidth=1;
    for (let i=1;i<4;i++) { const py=y+i*h/4; ctx.beginPath(); ctx.moveTo(x,py); ctx.lineTo(x+w,py); ctx.stroke(); }
    ctx.strokeStyle = AXIS; ctx.beginPath();
    ctx.moveTo(x,y); ctx.lineTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    ctx.fillStyle = TXT; ctx.font='12px Nunito'; ctx.fillText(title, x, y-10);
    ctx.font='10px Nunito'; ctx.fillStyle='rgba(254,250,224,0.5)';
    ctx.fillText(xl, x+w-20, y+h+18);
    ctx.save(); ctx.translate(x-44, y+h/2+10); ctx.rotate(-Math.PI/2); ctx.fillText(yl,0,0); ctx.restore();
  }

  function loop() { if (running) step(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,setter,dec=2) {
    document.getElementById(id).addEventListener('input', e => {
      const v=+e.target.value; document.getElementById(vid).textContent = (id==='ik'||id==='in')?v.toFixed(0):v.toFixed(dec); setter(v);
    });
  }
  bind('ir','vr', v=>{ r=v; });
  bind('ik','vk', v=>{ K=v; });
  bind('in','vn', v=>{ N0=v; reset(); });

  document.querySelectorAll('button.p').forEach(b => {
    b.addEventListener('click', () => {
      r=+b.dataset.r; document.getElementById('ir').value=r; document.getElementById('vr').textContent=r.toFixed(2); reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => { running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
