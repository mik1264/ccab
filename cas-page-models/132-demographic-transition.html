<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Demographic Transition — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12); border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; background: linear-gradient(90deg, var(--earth), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600; background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream); border:none; border-radius:9px; cursor:pointer; transition:all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Demographic Transition</h2>
  <p>Birth and death rates as sigmoids over development D(t). Stage 1: high B, high D. Stage 2: D drops first → growth surges. Stage 3: B falls. Stage 4: low both. Population peaks late.</p>

  <div class="control"><label>Develop rate v <span id="vV">0.030</span></label><input type="range" id="iV" min="0.005" max="0.08" step="0.001" value="0.030" /></div>
  <div class="control"><label>Death lag (B−D shift) <span id="vL">25</span></label><input type="range" id="iL" min="0" max="60" step="0.5" value="25" /></div>
  <div class="control"><label>Birth slope kB <span id="vKB">0.10</span></label><input type="range" id="iKB" min="0.02" max="0.4" step="0.005" value="0.10" /></div>
  <div class="control"><label>Death slope kD <span id="vKD">0.12</span></label><input type="range" id="iKD" min="0.02" max="0.4" step="0.005" value="0.12" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="0.030,25,0.10,0.12">Classic</button>
    <button class="p" data-p="0.020,40,0.08,0.10">Slow</button>
    <button class="p" data-p="0.050,15,0.18,0.20">Fast</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t (yr)</span><span class="v" id="st">0</span></div>
  <div class="stat"><span>Develop D</span><span class="v" id="sD">—</span></div>
  <div class="stat"><span>Birth (‰)</span><span class="v" id="sB">—</span></div>
  <div class="stat"><span>Death (‰)</span><span class="v" id="sDr">—</span></div>
  <div class="stat"><span>N (M)</span><span class="v" id="sN">—</span></div>
  <div class="stat"><span>Stage</span><span class="v" id="sS">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  let v=0.030, lag=25, kB=0.10, kD=0.12;
  const Bhi=42, Blo=12;  // per 1000 per yr
  const Dhi=38, Dlo=8;
  // dev D ∈ [0,100]
  let D=0, N=10, t=0, running=true;
  const series=[]; const MAX=2500;

  function birth(D){ const Dmid=50; return Blo + (Bhi-Blo)/(1+Math.exp(kB*(D-Dmid))); }
  function death(D){ const Dmid=50-lag; return Dlo + (Dhi-Dlo)/(1+Math.exp(kD*(D-Dmid))); }

  function reset(){ D=0; N=10; t=0; series.length=0; }

  function tick(){
    const dt=0.5;
    for (let st=0; st<3; st++){
      // RK4 on (D, N)
      const f = (Dv, Nv) => {
        const dD = v*(100-Dv)*0.05;
        const r = (birth(Dv)-death(Dv))/1000;
        return [dD, r*Nv];
      };
      const k1=f(D,N);
      const k2=f(D+dt/2*k1[0], N+dt/2*k1[1]);
      const k3=f(D+dt/2*k2[0], N+dt/2*k2[1]);
      const k4=f(D+dt*k3[0],   N+dt*k3[1]);
      D += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
      N += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
      t += dt;
    }
    series.push({t, D, N, B:birth(D), Dr:death(D)});
    if (series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(0);
    document.getElementById('sD').textContent=D.toFixed(1);
    document.getElementById('sB').textContent=birth(D).toFixed(2);
    document.getElementById('sDr').textContent=death(D).toFixed(2);
    document.getElementById('sN').textContent=N.toFixed(2);
    let stage='1: pre';
    if (D>15 && D<45) stage='2: declining mortality';
    else if (D>=45 && D<70) stage='3: declining fertility';
    else if (D>=70) stage='4: post';
    document.getElementById('sS').textContent=stage;
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=360, padT=50, padB=40;
    const totW=W-padL-padR;
    const halfH = (H-padT-padB-50)/2;

    // Top: birth and death rates
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Birth and death rates per 1000 per year', padL, padT-12);
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++){const yp=padT+i*halfH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    if (series.length>1){
      const t0=series[0].t, t1=series[series.length-1].t, ts=Math.max(t1-t0,1);
      const Rmax=50;
      // shade the "growth gap" between B and D
      ctx.fillStyle='rgba(232,121,249,0.18)';
      ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.t-t0)/ts*totW;
        const py=padT+halfH-s.B/Rmax*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      for (let i=series.length-1;i>=0;i--){
        const s=series[i];
        const px=padL+(s.t-t0)/ts*totW;
        const py=padT+halfH-s.Dr/Rmax*halfH;
        ctx.lineTo(px,py);
      }
      ctx.closePath(); ctx.fill();

      function plot(key,color){
        ctx.strokeStyle=color; ctx.lineWidth=2.2;
        ctx.beginPath();
        for (let i=0;i<series.length;i++){
          const s=series[i];
          const px=padL+(s.t-t0)/ts*totW;
          const py=padT+halfH-s[key]/Rmax*halfH;
          if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.stroke();
      }
      plot('B','#fb923c'); plot('Dr','#06b6d4');
    }
    ctx.font='11px Nunito';
    ctx.fillStyle='#fb923c'; ctx.fillText('— birth', padL+20, padT+15);
    ctx.fillStyle='#06b6d4'; ctx.fillText('— death', padL+90, padT+15);
    ctx.fillStyle='rgba(232,121,249,0.7)'; ctx.fillText('▒ growth gap', padL+165, padT+15);
    ctx.fillStyle='rgba(254,250,224,0.4)';
    ctx.fillText('50‰', padL-30, padT+5);
    ctx.fillText('0', padL-15, padT+halfH);

    // Bottom: population N
    const bY = padT + halfH + 50;
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Population N(t)  &  Development D(t)', padL, bY-12);
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++){const yp=bY+i*halfH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    if (series.length>1){
      const t0=series[0].t, t1=series[series.length-1].t, ts=Math.max(t1-t0,1);
      const Nmax = Math.max(...series.map(s=>s.N), 50);
      ctx.strokeStyle='#e879f9'; ctx.lineWidth=2.4; ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.t-t0)/ts*totW;
        const py=bY+halfH-s.N/Nmax*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
      // D dashed
      ctx.setLineDash([5,4]);
      ctx.strokeStyle='rgba(138,154,91,0.9)'; ctx.lineWidth=1.8; ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.t-t0)/ts*totW;
        const py=bY+halfH-s.D/100*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.font='11px Nunito';
    ctx.fillStyle='#e879f9'; ctx.fillText('— Population N', padL+20, bY+15);
    ctx.fillStyle='#8A9A5B'; ctx.fillText('-- Development D', padL+140, bY+15);
    // stage shading lines
    const stages = [
      {x:0.0, label:'1 pre'},
      {x:0.15, label:'2 mortality drop'},
      {x:0.45, label:'3 fertility drop'},
      {x:0.70, label:'4 post'},
    ];
    if (series.length>1){
      const t0=series[0].t, t1=series[series.length-1].t, ts=Math.max(t1-t0,1);
      // approximate stage borders by D thresholds; find times
      // (visual hint only; place evenly along x)
      ctx.fillStyle='rgba(254,250,224,0.4)';
      stages.forEach(st=>{
        ctx.fillText(st.label, padL + st.x*totW, bY+halfH+18);
      });
    }
  }

  function loop(){ if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,prop,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{
      const x=+e.target.value;
      document.getElementById(vid).textContent=x.toFixed(dec);
      if (prop==='V') v=x; if (prop==='L') lag=x; if (prop==='KB') kB=x; if (prop==='KD') kD=x;
    });
  }
  bind('iV','vV','V',3); bind('iL','vL','L',1); bind('iKB','vKB','KB',3); bind('iKD','vKD','KD',3);
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click',()=>{
      const [pv,pl,pkb,pkd]=b.dataset.p.split(',').map(Number);
      v=pv; lag=pl; kB=pkb; kD=pkd;
      document.getElementById('iV').value=v; document.getElementById('vV').textContent=v.toFixed(3);
      document.getElementById('iL').value=lag; document.getElementById('vL').textContent=lag.toFixed(1);
      document.getElementById('iKB').value=kB; document.getElementById('vKB').textContent=kB.toFixed(3);
      document.getElementById('iKD').value=kD; document.getElementById('vKD').textContent=kD.toFixed(3);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); loop();
})();
</script>
</body>
</html>
