<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Van der Pol Oscillator — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.preset { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 93</span>
  <h2>Van der Pol Oscillator</h2>
  <p>ẍ − μ(1−x²)ẋ + x = 0. Negative damping near the origin, positive damping far out — the system is forced into a unique limit cycle. As μ grows the orbit becomes a relaxation oscillation: slow charges, fast snaps.</p>

  <div class="control"><label>μ nonlinearity <span id="vmu">1.00</span></label><input type="range" id="imu" min="0.05" max="10" step="0.05" value="1.00" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="preset" data-mu="0.5">Sinusoidal</button>
    <button class="preset" data-mu="2">Relaxation</button>
    <button class="preset" data-mu="10">Strong</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>x</span><span class="v" id="sx">—</span></div>
  <div class="stat"><span>ẋ</span><span class="v" id="sv">—</span></div>
  <div class="stat"><span>Energy</span><span class="v" id="se">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  let mu = 1.0;
  let x = 2.0, v = 0.0, t = 0;
  let running = true;
  const series = [];
  const MAX = 2000;

  function reset() {
    x = 2.0; v = 0.0; t = 0; series.length = 0;
  }

  function deriv(x, v) {
    return [v, mu*(1 - x*x)*v - x];
  }
  function rk4(dt) {
    const [a1,b1] = deriv(x, v);
    const [a2,b2] = deriv(x + dt/2*a1, v + dt/2*b1);
    const [a3,b3] = deriv(x + dt/2*a2, v + dt/2*b2);
    const [a4,b4] = deriv(x + dt*a3, v + dt*b3);
    x += dt/6*(a1 + 2*a2 + 2*a3 + a4);
    v += dt/6*(b1 + 2*b2 + 2*b3 + b4);
    t += dt;
  }

  function tick() {
    const dt = 0.02;
    for (let i=0;i<3;i++) rk4(dt);
    series.push({t, x, v});
    if (series.length > MAX) series.shift();
    document.getElementById('st').textContent = t.toFixed(1);
    document.getElementById('sx').textContent = x.toFixed(3);
    document.getElementById('sv').textContent = v.toFixed(3);
    document.getElementById('se').textContent = (0.5*(x*x + v*v)).toFixed(3);
  }

  // Turbo colormap (approx)
  function turbo(t) {
    t = Math.max(0, Math.min(1, t));
    const r = Math.round(255*Math.min(1,Math.max(0, 0.13572 + 4.61539*t - 42.66032*t*t + 132.13108*t*t*t - 152.94239*t*t*t*t + 59.28637*t*t*t*t*t)));
    const g = Math.round(255*Math.min(1,Math.max(0, 0.09140 + 2.19418*t + 4.84296*t*t - 14.18503*t*t*t + 4.27729*t*t*t*t + 2.82956*t*t*t*t*t)));
    const b = Math.round(255*Math.min(1,Math.max(0, 0.10667 + 12.64194*t - 60.58204*t*t + 110.36276*t*t*t - 89.90310*t*t*t*t + 27.34824*t*t*t*t*t)));
    return `rgb(${r},${g},${b})`;
  }

  function drawArrow(ctx, x1, y1, x2, y2) {
    ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    const ang = Math.atan2(y2-y1, x2-x1);
    const sz = 3;
    ctx.lineTo(x2 - sz*Math.cos(ang - Math.PI/6), y2 - sz*Math.sin(ang - Math.PI/6));
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - sz*Math.cos(ang + Math.PI/6), y2 - sz*Math.sin(ang + Math.PI/6));
    ctx.stroke();
  }

  function draw() {
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
    if (series.length<2) return;

    const padL = 70, padR = 360, padT = 60, padB = 60;
    const totW = W - padL - padR;
    const tsH = (H - padT - padB - 60) * 0.42;
    const ppSize = Math.min(totW * 0.55, (H - padT - padB - 60) * 0.55);
    const ppX0 = padL;
    const ppY0 = padT + tsH + 60;
    const cdX = padL + ppSize + 50;
    const cdY = ppY0;
    const cdW = totW - ppSize - 50;
    const cdH = ppSize;

    // === Time series ===
    let mxV = 0;
    for (const s of series) { if (Math.abs(s.x)>mxV) mxV=Math.abs(s.x); }
    if (mxV<1) mxV = 1; mxV *= 1.1;
    const t0 = series[0].t, t1 = series[series.length-1].t;
    const tspan = Math.max(t1-t0, 1);

    // grid
    ctx.strokeStyle = 'rgba(254,250,224,0.07)'; ctx.lineWidth = 1;
    for (let i=0;i<=4;i++) {
      const yp = padT + i*tsH/4;
      ctx.beginPath(); ctx.moveTo(padL, yp); ctx.lineTo(padL+totW, yp); ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(254,250,224,0.4)';
    ctx.beginPath();
    ctx.moveTo(padL, padT); ctx.lineTo(padL, padT+tsH); ctx.lineTo(padL+totW, padT+tsH); ctx.stroke();
    // zero line
    ctx.strokeStyle = 'rgba(254,250,224,0.15)';
    ctx.beginPath();
    ctx.moveTo(padL, padT+tsH/2); ctx.lineTo(padL+totW, padT+tsH/2); ctx.stroke();

    ctx.fillStyle = 'rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('x(t) — position vs time', padL, padT-12);
    ctx.fillText('+'+mxV.toFixed(2), padL-50, padT+5);
    ctx.fillText('-'+mxV.toFixed(2), padL-50, padT+tsH);
    ctx.fillText('0', padL-15, padT+tsH/2+4);

    // glowing trail
    ctx.shadowBlur = 8; ctx.shadowColor = '#e879f9';
    ctx.strokeStyle = '#e879f9'; ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i=0;i<series.length;i++) {
      const s = series[i];
      const px = padL + (s.t-t0)/tspan*totW;
      const py = padT + tsH/2 - s.x/mxV*tsH/2;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // === Phase portrait ===
    let mx = 0, mv = 0;
    for (const s of series) { if (Math.abs(s.x)>mx) mx=Math.abs(s.x); if (Math.abs(s.v)>mv) mv=Math.abs(s.v); }
    mx = Math.max(mx, 3) * 1.15;
    mv = Math.max(mv, 3, mu*2) * 1.15;

    ctx.fillStyle = 'rgba(254,250,224,0.7)';
    ctx.fillText('Phase portrait (x, ẋ) with vector field', ppX0, ppY0-12);

    // box
    ctx.strokeStyle = 'rgba(254,250,224,0.3)'; ctx.lineWidth = 1;
    ctx.strokeRect(ppX0, ppY0, ppSize, ppSize);

    // axes
    const cx0 = ppX0 + ppSize/2, cy0 = ppY0 + ppSize/2;
    ctx.strokeStyle = 'rgba(254,250,224,0.2)';
    ctx.beginPath();
    ctx.moveTo(ppX0, cy0); ctx.lineTo(ppX0+ppSize, cy0);
    ctx.moveTo(cx0, ppY0); ctx.lineTo(cx0, ppY0+ppSize);
    ctx.stroke();

    // vector field
    const grid = 14;
    const stepX = ppSize/grid;
    let maxSp = 0;
    const fld = [];
    for (let gi=0; gi<=grid; gi++) {
      for (let gj=0; gj<=grid; gj++) {
        const xx = -mx + 2*mx*gi/grid;
        const vv = -mv + 2*mv*gj/grid;
        const [dxx, dvv] = deriv(xx, vv);
        const sp = Math.sqrt(dxx*dxx + dvv*dvv);
        if (sp>maxSp) maxSp = sp;
        fld.push({gi, gj, xx, vv, dxx, dvv, sp});
      }
    }
    for (const f of fld) {
      const px = ppX0 + (f.xx + mx)/(2*mx)*ppSize;
      const py = ppY0 + ppSize - (f.vv + mv)/(2*mv)*ppSize;
      const norm = f.sp / Math.max(maxSp, 1e-6);
      const col = turbo(norm);
      const len = stepX*0.45;
      const a = Math.atan2(-f.dvv, f.dxx);
      ctx.strokeStyle = col;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.5 + 0.5*norm;
      drawArrow(ctx, px - len/2*Math.cos(a), py - len/2*Math.sin(a),
                     px + len/2*Math.cos(a), py + len/2*Math.sin(a));
    }
    ctx.globalAlpha = 1;

    // trajectory with fading
    const N = series.length;
    for (let i=1; i<N; i++) {
      const s0 = series[i-1], s1 = series[i];
      const px0 = ppX0 + (s0.x + mx)/(2*mx)*ppSize;
      const py0 = ppY0 + ppSize - (s0.v + mv)/(2*mv)*ppSize;
      const px1 = ppX0 + (s1.x + mx)/(2*mx)*ppSize;
      const py1 = ppY0 + ppSize - (s1.v + mv)/(2*mv)*ppSize;
      const age = i/N;
      ctx.globalAlpha = age*age*0.95;
      ctx.shadowBlur = 8 + age*8;
      ctx.shadowColor = '#e879f9';
      ctx.strokeStyle = '#e879f9';
      ctx.lineWidth = 1.5 + age*1.5;
      ctx.beginPath();
      ctx.moveTo(px0,py0); ctx.lineTo(px1,py1);
      ctx.stroke();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;

    // current point
    const last = series[series.length-1];
    const lpx = ppX0 + (last.x + mx)/(2*mx)*ppSize;
    const lpy = ppY0 + ppSize - (last.v + mv)/(2*mv)*ppSize;
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 14; ctx.shadowColor = '#e879f9';
    ctx.beginPath(); ctx.arc(lpx, lpy, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // axis labels
    ctx.fillStyle = 'rgba(254,250,224,0.55)';
    ctx.fillText('x', ppX0+ppSize-15, cy0-6);
    ctx.fillText('ẋ', cx0+6, ppY0+12);

    // === Causal-loop diagram ===
    ctx.fillStyle = 'rgba(254,250,224,0.7)';
    ctx.fillText('Causal loop', cdX, cdY-12);
    ctx.strokeStyle = 'rgba(254,250,224,0.3)'; ctx.lineWidth = 1;
    ctx.strokeRect(cdX, cdY, cdW, cdH);

    const cxx = cdX + cdW/2, cyy = cdY + cdH/2;
    const r = Math.min(cdW, cdH)*0.32;
    // x node (top), v node (bottom)
    const nodeR = 26;
    const nx1 = cxx, ny1 = cyy - r;
    const nx2 = cxx, ny2 = cyy + r;

    // arrow x → v (negative: -x)
    ctx.strokeStyle = '#e879f9'; ctx.lineWidth = 2;
    ctx.shadowBlur = 6; ctx.shadowColor = '#e879f9';
    ctx.beginPath();
    ctx.moveTo(nx1 - 18, ny1 + nodeR*0.6);
    ctx.bezierCurveTo(nx1 - r*0.7, cyy, nx1 - r*0.7, cyy, nx2 - 18, ny2 - nodeR*0.6);
    ctx.stroke();
    // arrow v → x (positive)
    ctx.strokeStyle = '#06b6d4';
    ctx.shadowColor = '#06b6d4';
    ctx.beginPath();
    ctx.moveTo(nx2 + 18, ny2 - nodeR*0.6);
    ctx.bezierCurveTo(nx2 + r*0.7, cyy, nx2 + r*0.7, cyy, nx1 + 18, ny1 + nodeR*0.6);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // nodes
    function drawNode(x, y, label, col) {
      ctx.fillStyle = '#0e1218';
      ctx.strokeStyle = col;
      ctx.lineWidth = 2;
      ctx.shadowBlur = 12; ctx.shadowColor = col;
      ctx.beginPath(); ctx.arc(x, y, nodeR, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = col; ctx.font = 'bold 16px Lora';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(label, x, y);
      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
    }
    drawNode(nx1, ny1, 'x', '#DDA15E');
    drawNode(nx2, ny2, 'ẋ', '#06b6d4');

    // signs
    ctx.fillStyle = '#e879f9'; ctx.font = 'bold 14px Lora';
    ctx.fillText('−', cxx - r*0.7 - 6, cyy);
    ctx.fillStyle = '#06b6d4';
    ctx.fillText('+', cxx + r*0.7 - 4, cyy);

    // describe non-linear damping
    ctx.fillStyle = 'rgba(254,250,224,0.6)'; ctx.font = '11px Nunito';
    ctx.fillText('damping ∝ μ(1−x²)', cdX + 10, cdY + cdH - 14);
    ctx.fillText('μ = ' + mu.toFixed(2), cdX + 10, cdY + cdH - 28);
  }

  function loop() {
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('imu').addEventListener('input', e => {
    mu = +e.target.value;
    document.getElementById('vmu').textContent = mu.toFixed(2);
  });
  document.querySelectorAll('.preset').forEach(b => {
    b.addEventListener('click', () => {
      mu = +b.dataset.mu;
      document.getElementById('imu').value = mu;
      document.getElementById('vmu').textContent = mu.toFixed(2);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
