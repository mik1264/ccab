<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Barabási-Albert Preferential Attachment — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ NN</span>
  <h2>Barabási-Albert</h2>
  <p>Networks grow by adding nodes one at a time. Each new node attaches m edges, choosing targets with probability proportional to existing degree — the rich get richer. Degree distribution becomes a power law p(k) ∝ k^(−3).</p>

  <div class="control"><label>Edges per arrival m <span id="vM">2</span></label><input type="range" id="iM" min="1" max="6" step="1" value="2" /></div>
  <div class="control"><label>Target N <span id="vN">220</span></label><input type="range" id="iN" min="50" max="500" step="10" value="220" /></div>
  <div class="control"><label>Speed <span id="vS">2</span></label><input type="range" id="iS" min="1" max="10" step="1" value="2" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-m="1">m = 1 (tree)</button>
    <button class="p" data-m="2">m = 2</button>
    <button class="p" data-m="4">m = 4 (dense)</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Nodes</span><span class="v" id="sN">0</span></div>
  <div class="stat"><span>Edges</span><span class="v" id="sE">0</span></div>
  <div class="stat"><span>Max degree</span><span class="v" id="sMax">0</span></div>
  <div class="stat"><span>Mean degree</span><span class="v" id="sAvg">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  let N_target = 220, m = 2, speed = 2, running = true;
  let nodes = []; // {x,y,vx,vy,deg,age}
  let edges = []; // [a,b,age]
  let edgeStubs = []; // for preferential attachment sampling
  let frame = 0;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    N_target = +document.getElementById('iN').value;
    m = +document.getElementById('iM').value;
    document.getElementById('vN').textContent = N_target;
    document.getElementById('vM').textContent = m;
    nodes = [];
    edges = [];
    edgeStubs = [];
    // Initial seed: m+1 fully connected
    const cx = W/2, cy = H/2;
    for (let i=0; i<m+1; i++) {
      const a = (i/(m+1))*Math.PI*2;
      nodes.push({ x: cx + Math.cos(a)*30, y: cy + Math.sin(a)*30, vx:0, vy:0, deg:0, age:1 });
    }
    for (let i=0; i<m+1; i++) for (let j=i+1; j<m+1; j++) {
      edges.push([i, j, 0]);
      nodes[i].deg++; nodes[j].deg++;
      edgeStubs.push(i); edgeStubs.push(j);
    }
    frame = 0;
  }

  function addNode() {
    if (nodes.length >= N_target) return false;
    const cx = W/2, cy = H/2;
    const ang = Math.random()*Math.PI*2;
    const r = Math.min(W,H)*0.3 + Math.random()*60;
    const newIdx = nodes.length;
    nodes.push({ x: cx + Math.cos(ang)*r, y: cy + Math.sin(ang)*r, vx:0, vy:0, deg:0, age:0 });
    // Pick m unique targets via preferential attachment using stub list
    const chosen = new Set();
    let tries = 0;
    while (chosen.size < m && tries < 200) {
      const t = edgeStubs[(Math.random()*edgeStubs.length)|0];
      if (t !== newIdx) chosen.add(t);
      tries++;
    }
    for (const t of chosen) {
      edges.push([newIdx, t, 0]);
      nodes[newIdx].deg++; nodes[t].deg++;
      edgeStubs.push(newIdx); edgeStubs.push(t);
    }
    return true;
  }

  // Force-directed layout step
  function physics() {
    const n = nodes.length;
    const k = 90;
    const cx = W/2, cy = H/2;
    for (let i=0; i<n; i++) {
      const a = nodes[i];
      a.vx *= 0.85; a.vy *= 0.85;
      // gentle attraction to center
      a.vx += (cx - a.x) * 0.001;
      a.vy += (cy - a.y) * 0.001;
    }
    // node-node repulsion (sampled to keep it cheap)
    const sample = Math.min(n, 80);
    for (let i=0; i<n; i++) {
      const a = nodes[i];
      for (let s=0; s<sample; s++) {
        const j = (Math.random()*n)|0;
        if (j === i) continue;
        const b = nodes[j];
        let dx = a.x-b.x, dy = a.y-b.y;
        const d2 = dx*dx + dy*dy + 0.1;
        const f = 200/d2;
        const d = Math.sqrt(d2);
        a.vx += (dx/d)*f;
        a.vy += (dy/d)*f;
      }
    }
    // spring (edges)
    for (const e of edges) {
      const a = nodes[e[0]], b = nodes[e[1]];
      const dx = b.x-a.x, dy = b.y-a.y;
      const d = Math.sqrt(dx*dx+dy*dy)+0.1;
      const desired = 28 + 4/Math.sqrt(Math.max(1, a.deg*b.deg));
      const f = (d - desired)*0.04;
      const fx = (dx/d)*f, fy = (dy/d)*f;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    }
    for (let i=0; i<n; i++) {
      const a = nodes[i];
      // velocity clamp
      const vmax = 8;
      const v = Math.sqrt(a.vx*a.vx+a.vy*a.vy);
      if (v > vmax) { a.vx *= vmax/v; a.vy *= vmax/v; }
      a.x += a.vx; a.y += a.vy;
      a.age = Math.min(1, a.age + 0.04);
      // bounds
      const pad = 30;
      if (a.x<pad) a.x=pad;
      if (a.y<pad) a.y=pad;
      if (a.x>W-pad) a.x=W-pad;
      if (a.y>H-pad) a.y=H-pad;
    }
  }

  function render() {
    // Trail fade
    ctx.fillStyle = 'rgba(6,8,13,0.32)';
    ctx.fillRect(0,0,W,H);

    // edges
    let maxDeg = 1;
    for (const n of nodes) if (n.deg > maxDeg) maxDeg = n.deg;
    for (const e of edges) {
      e[2] = Math.min(1, (e[2]||0) + 0.06);
      const a = nodes[e[0]], b = nodes[e[1]];
      const da = a.deg, db = b.deg;
      const hub = Math.max(da, db);
      const intens = Math.min(1, hub/maxDeg);
      ctx.strokeStyle = `rgba(${6 + 226*intens}, ${182 - 60*intens}, ${212 - 90*intens}, ${0.38*e[2]})`;
      ctx.lineWidth = 0.7 + intens*1.4;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }

    // nodes
    for (const a of nodes) {
      const intens = a.deg/maxDeg;
      const r = 2.5 + 5.5*Math.sqrt(intens);
      // Gradient from cyan (low deg) to magenta (high deg hub)
      const cr = Math.round(6 + 226*intens);
      const cg = Math.round(182 - 60*intens);
      const cb = Math.round(212 - 90*intens);
      ctx.shadowBlur = 8 + 14*intens;
      ctx.shadowColor = `rgba(${cr},${cg},${cb},0.7)`;
      ctx.fillStyle = `rgba(${cr},${cg},${cb},${a.age})`;
      ctx.beginPath();
      ctx.arc(a.x, a.y, r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Inset: degree distribution log-log
    const iw = Math.min(260, W*0.28), ih = 150;
    const ix = 18, iy = H - ih - 18;
    ctx.fillStyle = 'rgba(12,18,28,0.85)';
    ctx.fillRect(ix, iy, iw, ih);
    ctx.strokeStyle = 'rgba(254,250,224,0.18)';
    ctx.strokeRect(ix, iy, iw, ih);
    ctx.fillStyle = 'rgba(254,250,224,0.7)';
    ctx.font = '10px Nunito';
    ctx.fillText('degree distribution  log-log', ix+8, iy+14);
    // histogram of degrees
    const degs = nodes.map(n=>n.deg);
    const hist = {};
    for (const d of degs) hist[d] = (hist[d]||0) + 1;
    const ks = Object.keys(hist).map(Number).filter(k=>k>0).sort((a,b)=>a-b);
    if (ks.length > 1) {
      const kMin = ks[0], kMax = ks[ks.length-1];
      const lkMin = Math.log10(Math.max(1,kMin));
      const lkMax = Math.log10(kMax+1);
      const counts = ks.map(k=>hist[k]);
      const cMax = Math.max(...counts);
      // expected: -3 slope reference line
      ctx.strokeStyle = 'rgba(254,250,224,0.3)';
      ctx.setLineDash([3,3]);
      ctx.beginPath();
      const A0 = Math.log10(cMax) + 3*lkMin;
      const x0 = ix+12, x1 = ix+iw-8;
      const lk0 = lkMin, lk1 = lkMax;
      const y0 = iy + ih - 8 - ((A0 - 3*lk0))/(Math.log10(cMax+1)+0.5)*(ih-26);
      const y1 = iy + ih - 8 - ((A0 - 3*lk1))/(Math.log10(cMax+1)+0.5)*(ih-26);
      ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
      ctx.setLineDash([]);
      // dots
      for (let i=0; i<ks.length; i++) {
        const k = ks[i], c = counts[i];
        const xx = ix + 12 + ((Math.log10(k)-lkMin)/((lkMax-lkMin)+0.001))*(iw-24);
        const yy = iy + ih - 8 - ((Math.log10(c))/(Math.log10(cMax+1)+0.5))*(ih-26);
        ctx.fillStyle = '#06b6d4';
        ctx.shadowBlur = 4; ctx.shadowColor = 'rgba(6,182,212,0.8)';
        ctx.beginPath(); ctx.arc(xx,yy,2.3,0,Math.PI*2); ctx.fill();
      }
      ctx.shadowBlur = 0;
    }
    ctx.fillStyle = 'rgba(254,250,224,0.6)';
    ctx.fillText('slope ≈ −3', ix+iw-66, iy+ih-6);

    document.getElementById('sN').textContent = nodes.length;
    document.getElementById('sE').textContent = edges.length;
    document.getElementById('sMax').textContent = maxDeg;
    document.getElementById('sAvg').textContent = (2*edges.length/nodes.length).toFixed(2);
  }

  function loop() {
    if (running) {
      for (let s=0; s<speed; s++) addNode();
      physics();
      frame++;
    } else {
      physics();
    }
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iN').addEventListener('input', e => {
    N_target = +e.target.value;
    document.getElementById('vN').textContent = N_target;
  });
  document.getElementById('iM').addEventListener('input', e => {
    m = +e.target.value;
    document.getElementById('vM').textContent = m;
  });
  document.getElementById('iS').addEventListener('input', e => {
    speed = +e.target.value;
    document.getElementById('vS').textContent = speed;
  });
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      m = +b.dataset.m;
      document.getElementById('iM').value = m;
      document.getElementById('vM').textContent = m;
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
