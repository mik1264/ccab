<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Goal-Seeking with Delays — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend {
    display:flex; gap:1rem; font-size:0.78rem; margin-top:0.5rem; flex-wrap:wrap;
  }
  .legend span::before {
    content:''; display:inline-block; width:10px; height:10px;
    border-radius:3px; margin-right:5px; vertical-align: middle;
  }
  .legend .x::before { background: var(--terracotta); }
  .legend .g::before { background: var(--sage); }
  .legend .d::before { background: var(--earth); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 35</span>
  <h2>Goal-Seeking with Delay</h2>
  <p>Stock x adjusts toward goal G with adjustment time τ, but perception is delayed through a 3rd-order chain (each link τ_d/3). Long delays → overshoot &amp; oscillation; short delays → smooth approach.</p>

  <div class="control"><label>Goal G <span id="vG">100</span></label><input type="range" id="iG" min="20" max="200" step="1" value="100" /></div>
  <div class="control"><label>adjustment τ <span id="vT">3.0</span></label><input type="range" id="iT" min="0.5" max="20" step="0.1" value="3.0" /></div>
  <div class="control"><label>perception delay τ_d <span id="vD">6.0</span></label><input type="range" id="iD" min="0.0" max="20" step="0.1" value="6.0" /></div>
  <div class="control"><label>initial x₀ <span id="vX">10</span></label><input type="range" id="iX" min="0" max="200" step="1" value="10" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
    <button id="bStep" class="secondary">Step G</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>x</span><span class="v" id="sx">—</span></div>
  <div class="stat"><span>perceived x̂</span><span class="v" id="sp">—</span></div>
  <div class="stat"><span>gap (G−x)</span><span class="v" id="sg">—</span></div>
  <div class="stat"><span>τ_d / τ</span><span class="v" id="sr">—</span></div>
  <div class="legend"><span class="x">x</span><span class="g">G</span><span class="d">x̂ delayed</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize',resize); resize();

  const X='#BC6C25', G_C='#8A9A5B', D='#DDA15E', GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  let G=100, tau=3.0, taud=6.0, x0=10;
  let x, d1, d2, d3, t, running=true;
  const series=[]; const MAX=2000;

  function reset(){
    x = x0; d1=x0; d2=x0; d3=x0; t=0; series.length=0;
  }

  // 3rd-order delay
  function deriv(x, d1, d2, d3){
    const tdEach = Math.max(taud/3, 0.001);
    const dd1 = (x - d1)/tdEach;
    const dd2 = (d1 - d2)/tdEach;
    const dd3 = (d2 - d3)/tdEach;
    // x adjusts toward G but uses perceived d3 as feedback... actually "controller"
    // We model: actor uses perceived stock d3 to gauge gap (G - d3)/tau
    const dx = (G - d3)/tau;
    return [dx, dd1, dd2, dd3];
  }

  function rk4(dt){
    const k1=deriv(x,d1,d2,d3);
    const k2=deriv(x+dt/2*k1[0], d1+dt/2*k1[1], d2+dt/2*k1[2], d3+dt/2*k1[3]);
    const k3=deriv(x+dt/2*k2[0], d1+dt/2*k2[1], d2+dt/2*k2[2], d3+dt/2*k2[3]);
    const k4=deriv(x+dt*k3[0], d1+dt*k3[1], d2+dt*k3[2], d3+dt*k3[3]);
    x  += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    d1 += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    d2 += dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
    d3 += dt/6*(k1[3]+2*k2[3]+2*k3[3]+k4[3]);
    t += dt;
  }

  function tick(){
    const dt=0.05;
    for (let i=0;i<3;i++) rk4(dt);
    series.push({t,x,d3,G});
    if (series.length>MAX) series.shift();
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if (series.length<2) return;

    const padL=80, padR=360, padT=70, padB=50;
    const totW=W-padL-padR, totH=H-padT-padB;

    let maxV=Math.max(G*1.4, 1);
    let minV=Math.min(0, x0*0.5);
    for (const s of series){
      if (s.x>maxV) maxV=s.x;
      if (s.G>maxV) maxV=s.G;
      if (s.x<minV) minV=s.x;
    }
    const t0=series[0].t, t1=series[series.length-1].t;
    const tspan=Math.max(t1-t0,1);
    const range=maxV-minV;

    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for (let i=0;i<=6;i++){ const yp=padT+i*totH/6;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke(); }
    for (let i=0;i<=8;i++){ const xp=padL+i*totW/8;
      ctx.beginPath(); ctx.moveTo(xp,padT); ctx.lineTo(xp,padT+totH); ctx.stroke(); }

    ctx.strokeStyle=AXIS; ctx.beginPath();
    ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+totH); ctx.lineTo(padL+totW,padT+totH); ctx.stroke();

    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Stock x(t) chasing goal G with delayed perception', padL, padT-12);

    function plot(getter, color, dashed){
      ctx.strokeStyle=color; ctx.lineWidth=2;
      if (dashed) ctx.setLineDash([6,4]); else ctx.setLineDash([]);
      ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.t-t0)/tspan*totW;
        const py=padT+totH - (getter(s)-minV)/range*totH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke(); ctx.setLineDash([]);
    }

    plot(s=>s.G, G_C, false);
    plot(s=>s.x, X, false);
    plot(s=>s.d3, D, true);

    // axis labels
    ctx.fillStyle='rgba(254,250,224,0.5)'; ctx.font='11px Nunito';
    for (let i=0;i<=4;i++){
      const v=minV + i*range/4;
      ctx.fillText(v.toFixed(0), padL-40, padT+totH-i*totH/4 + 4);
    }
    for (let i=0;i<=8;i++){
      const tt=t0+i*tspan/8;
      ctx.fillText(tt.toFixed(1), padL+i*totW/8 - 10, padT+totH+16);
    }
    ctx.fillText('time', padL+totW-25, padT+totH+34);

    document.getElementById('st').textContent=t.toFixed(2);
    document.getElementById('sx').textContent=x.toFixed(2);
    document.getElementById('sp').textContent=d3.toFixed(2);
    document.getElementById('sg').textContent=(G-x).toFixed(2);
    document.getElementById('sr').textContent=(taud/Math.max(tau,0.001)).toFixed(2);
  }

  function loop(){
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  function bind(id,vid,prop,dec){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      if (prop==='G') G=v;
      if (prop==='T') tau=v;
      if (prop==='D') taud=v;
      if (prop==='X'){ x0=v; }
    });
  }
  bind('iG','vG','G',0); bind('iT','vT','T',1); bind('iD','vD','D',1); bind('iX','vX','X',0);

  document.getElementById('bRun').addEventListener('click',e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click',reset);
  document.getElementById('bStep').addEventListener('click',()=>{ G = G>120?40:160; document.getElementById('vG').textContent=G.toFixed(0); document.getElementById('iG').value=G; });

  reset(); loop();
})();
</script>
</body>
</html>
