<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Greenberg-Hastings Cyclic CA — Deluxe ABM</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream); letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ 58</span>
  <h2>Excitable Spirals</h2>
  <p>Greenberg-Hastings cyclic CA: each cell holds a state in 0..n−1. State k advances to k+1 (mod n) iff a Moore neighbor already holds (k+1) mod n. Random init self-organizes into nested rotating spirals.</p>

  <div class="control"><label>States n <span id="vN">14</span></label><input type="range" id="iN" min="4" max="32" step="1" value="14" /></div>
  <div class="control"><label>Threshold T <span id="vT">1</span></label><input type="range" id="iT" min="1" max="4" step="1" value="1" /></div>
  <div class="control"><label>Steps/frame <span id="vS">1</span></label><input type="range" id="iS" min="1" max="6" step="1" value="1" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="random">Random</button>
    <button class="p" data-p="dots">Dots</button>
    <button class="p" data-p="line">Front</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Frame</span><span class="v" id="sFr">0</span></div>
  <div class="stat"><span>Active</span><span class="v" id="sA">—</span></div>
  <div class="stat"><span>Cycles</span><span class="v" id="sC">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  const N = 200;
  let nStates = 14;
  let threshold = 1;
  let g = new Uint8Array(N*N);
  let gn = new Uint8Array(N*N);
  let stepsPerFrame = 1;
  let running = true, frame = 0, cycleCount = 0;
  let centerSeen0 = false;

  const img = new ImageData(N, N);

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = true;
  }
  window.addEventListener('resize', resize);
  resize();

  function reset(mode='random') {
    if (mode === 'random') {
      for (let i=0; i<N*N; i++) g[i] = (Math.random()*nStates)|0;
    } else if (mode === 'dots') {
      g.fill(0);
      const seeds = 60;
      for (let s=0; s<seeds; s++) {
        const cx = (Math.random()*N)|0, cy = (Math.random()*N)|0;
        g[cy*N+cx] = 1 + ((Math.random()*nStates)|0);
      }
    } else if (mode === 'line') {
      g.fill(0);
      for (let y=0; y<N; y++) for (let x=0; x<N; x++) {
        if (x === ((N/2)|0)) g[y*N+x] = 1;
      }
    }
    frame = 0; cycleCount = 0; centerSeen0 = true;
  }

  function step() {
    // Moore 8 neighbors, threshold T (number of neighbors at next state)
    for (let y=0; y<N; y++) {
      for (let x=0; x<N; x++) {
        const i = y*N+x;
        const cur = g[i];
        const target = (cur + 1) % nStates;
        let count = 0;
        for (let dy=-1; dy<=1; dy++) {
          for (let dx=-1; dx<=1; dx++) {
            if (dx===0 && dy===0) continue;
            const nv = g[((y+dy+N)%N)*N + (x+dx+N)%N];
            if (nv === target) count++;
          }
        }
        gn[i] = (count >= threshold) ? target : cur;
      }
    }
    [g, gn] = [gn, g];
    // Cycle detection: check center cell for 0 transitions
    const cv0 = g[((N/2)|0)*N + ((N/2)|0)];
    if (cv0 === 0 && !centerSeen0) { cycleCount++; centerSeen0 = true; }
    if (cv0 !== 0) centerSeen0 = false;
  }

  // Inferno-style colormap by index/n
  function color(k) {
    const t = k / nStates;
    const r = Math.round(255*(0.05 + Math.pow(t, 0.55)));
    const gg = Math.round(255*Math.pow(t, 1.6));
    const b = Math.round(255*(0.30*Math.sin(t*Math.PI*0.75) + 0.10));
    return [Math.max(0,Math.min(255,r)), Math.max(0,Math.min(255,gg)), Math.max(0,Math.min(255,b))];
  }
  // Precompute palette
  let palette = [];
  function buildPalette() {
    palette = [];
    for (let k=0; k<nStates; k++) palette.push(color(k));
  }
  buildPalette();

  function render() {
    let active = 0;
    const data = img.data;
    for (let i=0;i<N*N;i++) {
      if (g[i] > 0) active++;
      const c = palette[g[i]];
      const j = i*4;
      data[j]=c[0]; data[j+1]=c[1]; data[j+2]=c[2]; data[j+3]=255;
    }
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
    const size = Math.min(W, H) * 0.92;
    const ox = (W - size)/2, oy = (H - size)/2;
    const off = render._off || (render._off = document.createElement('canvas'));
    off.width = N; off.height = N;
    off.getContext('2d').putImageData(img, 0, 0);
    ctx.shadowColor = 'rgba(251,146,60,0.55)';
    ctx.shadowBlur = 22;
    ctx.drawImage(off, ox, oy, size, size);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(6,182,212,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(ox-1, oy-1, size+2, size+2);

    document.getElementById('sFr').textContent = frame;
    document.getElementById('sA').textContent = active;
    document.getElementById('sC').textContent = cycleCount;
  }

  function loop() {
    if (running) for (let s=0; s<stepsPerFrame; s++) { step(); frame++; }
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iN').addEventListener('input', e => {
    nStates = +e.target.value;
    document.getElementById('vN').textContent = nStates;
    buildPalette();
    reset('random');
  });
  document.getElementById('iT').addEventListener('input', e => {
    threshold = +e.target.value;
    document.getElementById('vT').textContent = threshold;
  });
  document.getElementById('iS').addEventListener('input', e => {
    stepsPerFrame = +e.target.value;
    document.getElementById('vS').textContent = stepsPerFrame;
  });

  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => reset(b.dataset.p));
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running; e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', () => reset('random'));

  cv.addEventListener('pointerdown', e => {
    const rect = cv.getBoundingClientRect();
    const size = Math.min(W, H) * 0.92;
    const ox = (W - size)/2, oy = (H - size)/2;
    const px = e.clientX - rect.left - ox;
    const py = e.clientY - rect.top - oy;
    const cx = Math.round(px/size*N), cy = Math.round(py/size*N);
    // Drop a small spiral seed: gradient of states
    for (let r=-3; r<=3; r++) for (let c=-3; c<=3; c++) {
      const i = ((cy+r+N)%N)*N + (cx+c+N)%N;
      g[i] = (Math.atan2(r,c)/(2*Math.PI)*nStates + nStates) % nStates | 0;
    }
  });

  reset('random'); loop();
})();
</script>
</body>
</html>
