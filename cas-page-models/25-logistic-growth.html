<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logistic Growth — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend {
    display:flex; gap:1rem; font-size:0.8rem; margin-top:0.5rem; flex-wrap:wrap;
  }
  .legend span::before {
    content:''; display:inline-block; width:10px; height:10px;
    border-radius:3px; margin-right:5px; vertical-align: middle;
  }
  .legend .nv::before { background: var(--sage); }
  .legend .kv::before { background: var(--terracotta); }
  .toggle { display:flex; align-items:center; gap:0.5rem; font-size:0.8rem; margin-bottom:0.8rem; color:var(--earth); }
  .toggle input { accent-color: var(--terracotta); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 25</span>
  <h2>Logistic Growth</h2>
  <p>dN/dt = rN(1−N/K). N saturates at carrying capacity K. Toggle the Hutchinson delay to see oscillations when r·τ &gt; π/2.</p>

  <div class="control"><label>r growth rate <span id="vr">0.50</span></label><input type="range" id="ir" min="0.05" max="2" step="0.01" value="0.50" /></div>
  <div class="control"><label>K capacity <span id="vk">100</span></label><input type="range" id="ik" min="10" max="500" step="5" value="100" /></div>
  <div class="control"><label>N₀ initial <span id="vn">5</span></label><input type="range" id="in" min="1" max="200" step="1" value="5" /></div>
  <div class="control"><label>τ delay <span id="vt">3.0</span></label><input type="range" id="it" min="0" max="6" step="0.05" value="3.0" /></div>
  <label class="toggle"><input type="checkbox" id="iDelay" /> use delayed (Hutchinson) logistic</label>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>N</span><span class="v" id="sN">—</span></div>
  <div class="stat"><span>r·τ</span><span class="v" id="sRT">—</span></div>
  <div class="stat"><span>π/2 threshold</span><span class="v">1.57</span></div>
  <div class="legend"><span class="nv">N(t)</span><span class="kv">K (capacity)</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize',resize); resize();

  const C_N='#8A9A5B', C_K='#BC6C25', GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  let r=0.50, K=100, N0=5, tau=3.0, useDelay=false;
  let N=N0, t=0, running=true;
  const history=[]; // {t, N} for delay lookup
  const series=[]; const MAX=1500;
  const dt=0.05;

  function reset(){ N=N0; t=0; history.length=0; series.length=0; history.push({t:0,N}); }

  function lookupDelayed(targetT){
    if(history.length===0) return N0;
    if(targetT<=history[0].t) return history[0].N;
    for(let i=history.length-1;i>=0;i--){
      if(history[i].t<=targetT){
        const a=history[i], b=history[Math.min(i+1,history.length-1)];
        if(b.t===a.t) return a.N;
        const u=(targetT-a.t)/(b.t-a.t);
        return a.N+u*(b.N-a.N);
      }
    }
    return history[0].N;
  }

  function step(){
    const f=(N, Nlag)=> r*N*(1 - Nlag/K);
    const Nlag1 = useDelay ? lookupDelayed(t-tau) : N;
    const k1=f(N, Nlag1);
    const Nlag2 = useDelay ? lookupDelayed(t+dt/2-tau) : (N+dt/2*k1);
    const k2=f(N+dt/2*k1, Nlag2);
    const k3=f(N+dt/2*k2, Nlag2);
    const Nlag4 = useDelay ? lookupDelayed(t+dt-tau) : (N+dt*k3);
    const k4=f(N+dt*k3, Nlag4);
    N += dt/6*(k1+2*k2+2*k3+k4);
    if(N<0) N=0;
    t += dt;
    history.push({t,N});
    // limit history length to last ~20 time units
    while(history.length>0 && history[0].t < t-Math.max(tau+5,10)) history.shift();
  }

  function tick(){
    for(let i=0;i<2;i++) step();
    series.push({t,N});
    if(series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sN').textContent=N.toFixed(2);
    document.getElementById('sRT').textContent=(r*tau).toFixed(2);
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if(series.length<2) return;
    const padL=70, padR=360, padT=60, padB=60;
    const totW=W-padL-padR, totH=H-padT-padB;
    const t0=series[0].t, t1=series[series.length-1].t;
    const tspan=Math.max(t1-t0,1);
    let maxV=K*1.2;
    for(const s of series) if(s.N>maxV) maxV=s.N;

    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for(let i=0;i<=5;i++){
      const yp=padT+i*totH/5;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
    }
    ctx.strokeStyle=AXIS;
    ctx.beginPath(); ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+totH); ctx.lineTo(padL+totW,padT+totH); ctx.stroke();

    // K line
    const Ky = padT+totH-K/maxV*totH;
    ctx.strokeStyle=C_K; ctx.setLineDash([6,5]); ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(padL,Ky); ctx.lineTo(padL+totW,Ky); ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='12px Nunito';
    ctx.fillText('Population N(t) ' + (useDelay?'[delay]':''), padL, padT-15);
    ctx.fillText(maxV.toFixed(0), padL-50, padT+5);
    ctx.fillText('K='+K.toFixed(0), padL+totW+5, Ky+4);
    ctx.fillText('0', padL-15, padT+totH);
    ctx.fillText('t='+t1.toFixed(1), padL+totW-50, padT+totH+18);

    ctx.strokeStyle=C_N; ctx.lineWidth=2.2; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const s=series[i];
      const px=padL+(s.t-t0)/tspan*totW;
      const py=padT+totH-s.N/maxV*totH;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=dec===0?v.toFixed(0):v.toFixed(dec);
      fn(v);
    });
  }
  bind('ir','vr',v=>r=v);
  bind('ik','vk',v=>K=v,0);
  bind('in','vn',v=>{N0=v; reset();},0);
  bind('it','vt',v=>tau=v);
  document.getElementById('iDelay').addEventListener('change',e=>{useDelay=e.target.checked; reset();});
  document.getElementById('bRun').addEventListener('click',e=>{running=!running; e.target.textContent=running?'Pause':'Resume';});
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
