<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Feedback Loops — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(330px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.7rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.2rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend { display:flex; gap:0.7rem; font-size:0.74rem; margin-top:0.4rem; flex-wrap:wrap; }
  .legend span::before {
    content:''; display:inline-block; width:10px; height:10px;
    border-radius:3px; margin-right:5px; vertical-align: middle;
  }
  .legend .R::before { background: #BC6C25; }
  .legend .B::before { background: #8A9A5B; }
  .legend .L::before { background: #DDA15E; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 42</span>
  <h2>Feedback Loops</h2>
  <p>Three archetypes side by side: <b>R</b>einforcing dS/dt = rS (exponential), <b>B</b>alancing dS/dt = (G−S)/τ (goal-seeking), <b>L</b>ogistic dS/dt = rS(1−S/K) (R+B together).</p>

  <div class="control"><label>r reinforcing rate <span id="vr">0.05</span></label><input type="range" id="ir" min="-0.05" max="0.20" step="0.005" value="0.05" /></div>
  <div class="control"><label>G goal <span id="vG">100</span></label><input type="range" id="iG" min="20" max="200" step="1" value="100" /></div>
  <div class="control"><label>τ adjustment <span id="vT">10</span></label><input type="range" id="iT" min="1" max="40" step="0.5" value="10" /></div>
  <div class="control"><label>K carrying capacity <span id="vK">120</span></label><input type="range" id="iK" min="20" max="300" step="1" value="120" /></div>
  <div class="control"><label>S₀ initial stock <span id="vS">10</span></label><input type="range" id="iS" min="1" max="200" step="1" value="10" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>Reinforcing S_R</span><span class="v" id="sR">—</span></div>
  <div class="stat"><span>Balancing S_B</span><span class="v" id="sB">—</span></div>
  <div class="stat"><span>Logistic S_L</span><span class="v" id="sL">—</span></div>
  <div class="legend"><span class="R">Reinforcing</span><span class="B">Balancing</span><span class="L">Logistic</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize',resize); resize();

  const C_R='#BC6C25', C_B='#8A9A5B', C_L='#DDA15E';
  const GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  let r=0.05, G=100, tau=10, K=120, S0=10;
  let SR, SB, SL, t, running=true;
  const series=[]; const MAX=2000;

  function reset(){ SR=S0; SB=S0; SL=S0; t=0; series.length=0; }

  function rk4(dt){
    const f = (S, type) => {
      if (type==='R') return r*S;
      if (type==='B') return (G - S)/tau;
      if (type==='L') return r*S*(1 - S/K);
      return 0;
    };
    function step(S,type){
      const k1=f(S,type);
      const k2=f(S+dt/2*k1,type);
      const k3=f(S+dt/2*k2,type);
      const k4=f(S+dt*k3,type);
      return S + dt/6*(k1+2*k2+2*k3+k4);
    }
    SR=step(SR,'R');
    SB=step(SB,'B');
    SL=step(SL,'L');
    t+=dt;
  }

  function tick(){
    const dt=0.1;
    rk4(dt);
    series.push({t,SR,SB,SL});
    if (series.length>MAX) series.shift();
  }

  function drawDiagram(x0,y0,w,h, label, type){
    // box for stock + arrow showing flow
    ctx.fillStyle='rgba(254,250,224,0.05)';
    ctx.fillRect(x0,y0,w,h);
    ctx.strokeStyle='rgba(254,250,224,0.15)'; ctx.lineWidth=1;
    ctx.strokeRect(x0,y0,w,h);

    ctx.fillStyle='rgba(254,250,224,0.85)';
    ctx.font='12px Lora'; ctx.fillText(label, x0+10, y0+18);

    const cx=x0+w/2, cy=y0+h/2 + 8;
    const stockW=80, stockH=44;
    ctx.fillStyle='rgba(20,28,38,0.7)';
    ctx.strokeStyle='rgba(254,250,224,0.4)';
    ctx.fillRect(cx-stockW/2, cy-stockH/2, stockW, stockH);
    ctx.strokeRect(cx-stockW/2, cy-stockH/2, stockW, stockH);
    ctx.fillStyle='rgba(254,250,224,0.85)';
    ctx.font='11px Nunito';
    ctx.fillText('S', cx-4, cy-stockH/2+14);
    let curVal = type==='R'?SR : type==='B'?SB : SL;
    ctx.fillStyle=C_L;
    ctx.font='13px Nunito';
    ctx.fillText(curVal.toFixed(1), cx-15, cy+8);

    // loop arrow
    const arrow = (color, isPos)=>{
      ctx.strokeStyle=color; ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.arc(cx, cy, 36, -Math.PI*0.7, Math.PI*0.7, false);
      ctx.stroke();
      // arrow head
      const ax = cx + 36*Math.cos(Math.PI*0.7);
      const ay = cy + 36*Math.sin(Math.PI*0.7);
      ctx.beginPath();
      ctx.moveTo(ax,ay);
      ctx.lineTo(ax-6, ay-2);
      ctx.lineTo(ax-2, ay+6);
      ctx.closePath();
      ctx.fillStyle=color; ctx.fill();
      // sign
      ctx.fillStyle=color; ctx.font='14px Lora';
      ctx.fillText(isPos?'+':'−', cx+44, cy+5);
    };
    if (type==='R'){ arrow(C_R, true); ctx.fillStyle=C_R; ctx.font='11px Nunito'; ctx.fillText('R', cx-3, cy-stockH/2-6); }
    else if (type==='B'){ arrow(C_B, false); ctx.fillStyle=C_B; ctx.font='11px Nunito'; ctx.fillText('B', cx-3, cy-stockH/2-6); }
    else { arrow(C_L, false); ctx.fillStyle=C_L; ctx.font='11px Nunito'; ctx.fillText('R+B', cx-9, cy-stockH/2-6); }
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if (series.length<2) return;

    const padL=80, padR=360, padT=70, padB=60;
    const totW=W-padL-padR;
    const diaH=120;
    const totH=H-padT-padB-diaH-20;

    // === plot top ===
    let mx=Math.max(G*1.2, K*1.2, 1);
    for (const s of series){
      if (s.SR>mx && Math.abs(s.SR)<1e6) mx=s.SR;
      if (s.SB>mx) mx=s.SB;
      if (s.SL>mx) mx=s.SL;
    }
    let mn=0;
    for (const s of series){ if (s.SR<mn) mn=s.SR; }
    const range=mx-mn;
    const t0=series[0].t, t1=series[series.length-1].t;
    const tspan=Math.max(t1-t0,1);

    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for (let i=0;i<=5;i++){ const yp=padT+i*totH/5;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke(); }
    for (let i=0;i<=6;i++){ const xp=padL+i*totW/6;
      ctx.beginPath(); ctx.moveTo(xp,padT); ctx.lineTo(xp,padT+totH); ctx.stroke(); }
    ctx.strokeStyle=AXIS; ctx.beginPath();
    ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+totH); ctx.lineTo(padL+totW,padT+totH); ctx.stroke();

    // goal line
    if (G>=mn && G<=mx){
      ctx.strokeStyle='rgba(138,154,91,0.4)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
      const yp=padT+totH - (G-mn)/range*totH;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(138,154,91,0.7)'; ctx.font='11px Nunito';
      ctx.fillText('G='+G.toFixed(0), padL+totW-50, yp-4);
    }
    if (K>=mn && K<=mx){
      ctx.strokeStyle='rgba(221,161,94,0.4)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
      const yp=padT+totH - (K-mn)/range*totH;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(221,161,94,0.7)';
      ctx.fillText('K='+K.toFixed(0), padL+totW-50, yp-4);
    }

    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Stocks under three feedback structures', padL, padT-22);

    function plot(getter,color){
      ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.t-t0)/tspan*totW;
        const py=padT+totH - (getter(s)-mn)/range*totH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    plot(s=>s.SR,C_R);
    plot(s=>s.SB,C_B);
    plot(s=>s.SL,C_L);

    ctx.fillStyle='rgba(254,250,224,0.5)'; ctx.font='11px Nunito';
    for (let i=0;i<=5;i++){
      const v=mn+i*range/5;
      ctx.fillText(v.toFixed(0), padL-40, padT+totH-i*totH/5+4);
    }
    for (let i=0;i<=6;i++){
      const tt=t0+i*tspan/6;
      ctx.fillText(tt.toFixed(1), padL+i*totW/6-10, padT+totH+16);
    }
    ctx.fillText('time', padL+totW-25, padT+totH+34);

    // === causal-loop diagrams ===
    const dY = padT+totH+50;
    const dW = (totW-40)/3;
    drawDiagram(padL,            dY, dW, diaH, 'Reinforcing  dS = rS', 'R');
    drawDiagram(padL+dW+20,      dY, dW, diaH, 'Balancing  dS = (G−S)/τ', 'B');
    drawDiagram(padL+2*(dW+20),  dY, dW, diaH, 'Logistic  dS = rS(1−S/K)', 'L');

    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sR').textContent=Math.abs(SR)<1e5?SR.toFixed(2):SR.toExponential(2);
    document.getElementById('sB').textContent=SB.toFixed(2);
    document.getElementById('sL').textContent=SL.toFixed(2);
  }

  function loop(){
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  function bind(id,vid,prop,dec){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      if (prop==='r') r=v;
      if (prop==='G') G=v;
      if (prop==='T') tau=v;
      if (prop==='K') K=v;
      if (prop==='S') S0=v;
    });
  }
  bind('ir','vr','r',3); bind('iG','vG','G',0); bind('iT','vT','T',1);
  bind('iK','vK','K',0); bind('iS','vS','S',0);

  document.getElementById('bRun').addEventListener('click',e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
