<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Romeo &amp; Juliet — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(330px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.7rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.75rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  button.preset { background: rgba(138,154,91,0.4); font-size:0.7rem; }
  button.preset:hover { background: rgba(138,154,91,0.6); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.2rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend { display:flex; gap:1rem; font-size:0.78rem; margin-top:0.4rem; }
  .legend span::before {
    content:''; display:inline-block; width:10px; height:10px;
    border-radius:3px; margin-right:5px; vertical-align: middle;
  }
  .legend .R::before { background: var(--terracotta); }
  .legend .J::before { background: var(--sage); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 36</span>
  <h2>Romeo &amp; Juliet</h2>
  <p>Strogatz's love-equations: dR/dt = aR + bJ; dJ/dt = cR + dJ. Sign of trace and determinant give saddle, spiral, center, or stable node — each a different relationship pattern.</p>

  <div class="control"><label>a (R←R) <span id="va">-0.20</span></label><input type="range" id="ia" min="-2" max="2" step="0.01" value="-0.20" /></div>
  <div class="control"><label>b (R←J) <span id="vb">1.00</span></label><input type="range" id="ib" min="-2" max="2" step="0.01" value="1.00" /></div>
  <div class="control"><label>c (J←R) <span id="vc">-1.00</span></label><input type="range" id="ic" min="-2" max="2" step="0.01" value="-1.00" /></div>
  <div class="control"><label>d (J←J) <span id="vd">0.20</span></label><input type="range" id="id" min="-2" max="2" step="0.01" value="0.20" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button class="preset" data-pre="cautious">Cautious</button>
    <button class="preset" data-pre="fickle">Fickle</button>
    <button class="preset" data-pre="hermit">Hermit</button>
    <button class="preset" data-pre="symmetric">Symmetric</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>R(t)</span><span class="v" id="sR">—</span></div>
  <div class="stat"><span>J(t)</span><span class="v" id="sJ">—</span></div>
  <div class="stat"><span>tr</span><span class="v" id="str">—</span></div>
  <div class="stat"><span>det</span><span class="v" id="sdet">—</span></div>
  <div class="stat"><span>type</span><span class="v" id="styp">—</span></div>
  <div class="legend"><span class="R">Romeo</span><span class="J">Juliet</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize',resize); resize();

  const RC='#BC6C25', JC='#8A9A5B', GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.45)';

  let a=-0.20, b=1.00, c=-1.00, d=0.20;
  let R=1.0, J=0.5, t=0, running=true;
  const series=[]; const MAX=1500;

  function reset(){ R=1.0; J=0.5; t=0; series.length=0; }

  function deriv(R,J){ return [a*R+b*J, c*R+d*J]; }
  function rk4(dt){
    const k1=deriv(R,J);
    const k2=deriv(R+dt/2*k1[0], J+dt/2*k1[1]);
    const k3=deriv(R+dt/2*k2[0], J+dt/2*k2[1]);
    const k4=deriv(R+dt*k3[0], J+dt*k3[1]);
    R += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    J += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    // soft clip to keep bounded
    R=Math.max(-50,Math.min(50,R));
    J=Math.max(-50,Math.min(50,J));
    t += dt;
  }

  function tick(){
    const dt=0.04;
    for (let i=0;i<3;i++) rk4(dt);
    series.push({t,R,J});
    if (series.length>MAX) series.shift();
  }

  function classify(){
    const tr=a+d, det=a*d - b*c;
    const disc=tr*tr - 4*det;
    let typ='';
    if (Math.abs(det)<1e-3 && Math.abs(tr)<1e-3) typ='degenerate';
    else if (det<0) typ='saddle';
    else if (disc<0){
      if (Math.abs(tr)<1e-2) typ='center';
      else if (tr<0) typ='stable spiral';
      else typ='unstable spiral';
    } else {
      if (tr<0) typ='stable node';
      else if (tr>0) typ='unstable node';
      else typ='line';
    }
    return {tr,det,typ};
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if (series.length<2) return;

    const padL=70, padR=360, padT=60, padB=40;
    const totW=W-padL-padR;
    const tsH=H*0.42 - padT/2;
    const ppH=H*0.46 - padB/2;
    const ppY0=padT+tsH+50;

    let mxA=1;
    for (const s of series){ if (Math.abs(s.R)>mxA) mxA=Math.abs(s.R); if (Math.abs(s.J)>mxA) mxA=Math.abs(s.J); }
    const t0=series[0].t, t1=series[series.length-1].t;
    const tspan=Math.max(t1-t0,1);

    // === time series ===
    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for (let i=0;i<=4;i++){ const yp=padT+i*tsH/4;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke(); }
    ctx.strokeStyle=AXIS; ctx.beginPath();
    ctx.moveTo(padL, padT+tsH/2); ctx.lineTo(padL+totW, padT+tsH/2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(padL, padT); ctx.lineTo(padL, padT+tsH); ctx.stroke();

    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='12px Nunito';
    ctx.fillText('Feelings vs time (zero is neutral)', padL, padT-10);
    ctx.fillText(' '+mxA.toFixed(1), padL-40, padT+5);
    ctx.fillText('-'+mxA.toFixed(1), padL-40, padT+tsH);
    ctx.fillText(' 0', padL-25, padT+tsH/2+4);

    function plotTS(getter,color){
      ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.t-t0)/tspan*totW;
        const py=padT+tsH/2 - getter(s)/mxA*tsH/2;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    plotTS(s=>s.R, RC);
    plotTS(s=>s.J, JC);

    // === phase portrait ===
    ctx.fillStyle='rgba(254,250,224,0.6)';
    ctx.fillText('Phase portrait (R, J)', padL, ppY0-12);

    // axes through origin
    const ppMid = ppY0 + ppH/2;
    const ppCx  = padL + totW/2;
    ctx.strokeStyle=AXIS; ctx.beginPath();
    ctx.moveTo(padL, ppMid); ctx.lineTo(padL+totW, ppMid);
    ctx.moveTo(ppCx, ppY0); ctx.lineTo(ppCx, ppY0+ppH);
    ctx.stroke();

    // vector field (sparse)
    ctx.strokeStyle='rgba(254,250,224,0.18)';
    const N=14;
    for (let i=0;i<N;i++){
      for (let j=0;j<N;j++){
        const Rx = -mxA + 2*mxA*(i+0.5)/N;
        const Jy = -mxA + 2*mxA*(j+0.5)/N;
        const dR = a*Rx+b*Jy, dJ=c*Rx+d*Jy;
        const m=Math.hypot(dR,dJ); if (m<1e-6) continue;
        const sc=Math.min(15, 8 + 5*Math.log(1+m));
        const ux=dR/m*sc, uy=dJ/m*sc;
        const cx=padL + (Rx/mxA*0.5+0.5)*totW;
        const cy=ppY0 + (1 - (Jy/mxA*0.5+0.5))*ppH;
        ctx.beginPath();
        ctx.moveTo(cx-ux/2, cy+uy/2);
        ctx.lineTo(cx+ux/2, cy-uy/2);
        ctx.stroke();
      }
    }

    // trajectory
    ctx.strokeStyle='rgba(221,161,94,0.85)'; ctx.lineWidth=1.5; ctx.beginPath();
    for (let i=0;i<series.length;i++){
      const s=series[i];
      const px=padL + (s.R/mxA*0.5+0.5)*totW;
      const py=ppY0 + (1 - (s.J/mxA*0.5+0.5))*ppH;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();

    const last=series[series.length-1];
    const lx=padL + (last.R/mxA*0.5+0.5)*totW;
    const ly=ppY0 + (1 - (last.J/mxA*0.5+0.5))*ppH;
    ctx.fillStyle=RC; ctx.beginPath(); ctx.arc(lx,ly,5,0,Math.PI*2); ctx.fill();

    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('R', padL+totW-15, ppMid-6);
    ctx.fillText('J', ppCx+6, ppY0+10);

    const cls=classify();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sR').textContent=R.toFixed(2);
    document.getElementById('sJ').textContent=J.toFixed(2);
    document.getElementById('str').textContent=cls.tr.toFixed(2);
    document.getElementById('sdet').textContent=cls.det.toFixed(2);
    document.getElementById('styp').textContent=cls.typ;
  }

  function loop(){
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  function bind(id,vid,prop,dec){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      if (prop==='a') a=v; if (prop==='b') b=v;
      if (prop==='c') c=v; if (prop==='d') d=v;
    });
  }
  bind('ia','va','a',2); bind('ib','vb','b',2); bind('ic','vc','c',2); bind('id','vd','d',2);

  function applyPreset(p){
    const presets={
      cautious:[-0.5, 0.4, 0.4, -0.5],
      fickle:  [ 0.3, 1.0,-1.0, 0.3],
      hermit:  [-0.5,-0.5,-0.5,-0.5],
      symmetric:[0.0, 0.8, 0.8, 0.0]
    };
    const v=presets[p]; if (!v) return;
    a=v[0]; b=v[1]; c=v[2]; d=v[3];
    document.getElementById('ia').value=a; document.getElementById('va').textContent=a.toFixed(2);
    document.getElementById('ib').value=b; document.getElementById('vb').textContent=b.toFixed(2);
    document.getElementById('ic').value=c; document.getElementById('vc').textContent=c.toFixed(2);
    document.getElementById('id').value=d; document.getElementById('vd').textContent=d.toFixed(2);
    reset();
  }
  document.querySelectorAll('button.preset').forEach(b=>b.addEventListener('click',()=>applyPreset(b.dataset.pre)));

  document.getElementById('bRun').addEventListener('click',e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
