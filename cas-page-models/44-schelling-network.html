<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schelling on a Watts-Strogatz Network — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .tag-abm {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.6rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag-abm">ABM ✦ 44</span>
  <h2>Schelling on a Network</h2>
  <p>Watts-Strogatz small-world: a ring lattice where each edge is rewired with probability β. Schelling agents follow the same tolerance rule on graph neighbors instead of grid cells.</p>

  <div class="control"><label>Rewiring β <span id="vBeta">0.10</span></label><input type="range" id="iBeta" min="0" max="1" step="0.01" value="0.10" /></div>
  <div class="control"><label>Tolerance <span id="vTol">0.50</span></label><input type="range" id="iTol" min="0" max="1" step="0.01" value="0.50" /></div>
  <div class="control"><label>Avg degree k <span id="vK">6</span></label><input type="range" id="iK" min="2" max="12" step="2" value="6" /></div>

  <div class="btnrow">
    <button class="p" data-p="0,0.5">Lattice</button>
    <button class="p" data-p="0.1,0.5">Small-world</button>
    <button class="p" data-p="1,0.5">Random</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Nodes</span><span class="v" id="sN">—</span></div>
  <div class="stat"><span>Unhappy</span><span class="v" id="sUnhappy">—</span></div>
  <div class="stat"><span>Same-color share</span><span class="v" id="sShare">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0;
  const dpr = Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize); resize();

  const N = 180;
  let beta_p = 0.10, tol = 0.50, kdeg = 6;
  let nodes, color, adj, step=0, running=true;

  function init(){
    nodes = new Array(N);
    color = new Int8Array(N);
    adj = Array.from({length:N},()=>new Set());
    for (let i=0;i<N;i++){
      nodes[i] = { angle: 2*Math.PI*i/N };
      color[i] = Math.random()<0.5 ? 1 : 2;
    }
    // Ring lattice
    const k2 = kdeg/2;
    for (let i=0;i<N;i++){
      for (let j=1;j<=k2;j++){
        const a = (i+j)%N;
        adj[i].add(a); adj[a].add(i);
      }
    }
    // Rewire
    for (let i=0;i<N;i++){
      for (let j=1;j<=k2;j++){
        const a = (i+j)%N;
        if (Math.random()<beta_p){
          if (adj[i].has(a)){
            adj[i].delete(a); adj[a].delete(i);
            let trials=0, c;
            do { c = (Math.random()*N)|0; trials++; }
            while ((c===i || adj[i].has(c)) && trials<50);
            if (trials<50){ adj[i].add(c); adj[c].add(i); }
            else { adj[i].add(a); adj[a].add(i); }
          }
        }
      }
    }
    step=0;
    document.getElementById('sN').textContent = N;
  }

  function tick(){
    let totalSame=0, totalContacts=0, unhappyCount=0;
    const order = [];
    for (let i=0;i<N;i++) order.push(i);
    for (let k=order.length-1;k>0;k--){const j=(Math.random()*(k+1))|0;[order[k],order[j]]=[order[j],order[k]];}
    for (const i of order){
      let same=0, diff=0;
      for (const n of adj[i]){
        if (color[n]===color[i]) same++; else diff++;
      }
      const t = same+diff;
      if (t>0){
        totalSame+=same; totalContacts+=t;
        if (same/t < tol){
          unhappyCount++;
          // Try swap with a random opposite-color node that would also be happy
          for (let tries=0; tries<8; tries++){
            const j = (Math.random()*N)|0;
            if (j===i || color[j]===color[i]) continue;
            // Pretend swap; check both happiness
            let s_i=0,t_i=0,s_j=0,t_j=0;
            for (const n of adj[i]){
              if (n===j) continue;
              if (color[n]===color[j]) s_i++;
              t_i++;
            }
            // include if i and j are adjacent
            const adjacent = adj[i].has(j);
            for (const n of adj[j]){
              if (n===i) continue;
              if (color[n]===color[i]) s_j++;
              t_j++;
            }
            if (adjacent){ s_i++; t_i++; s_j++; t_j++; }
            const ok_i = t_i===0 || s_i/t_i >= tol;
            if (ok_i){
              [color[i],color[j]] = [color[j],color[i]];
              break;
            }
          }
        }
      }
    }
    step++;
    document.getElementById('sStep').textContent = step;
    document.getElementById('sUnhappy').textContent = unhappyCount;
    document.getElementById('sShare').textContent = totalContacts>0 ? (totalSame/totalContacts).toFixed(3) : '—';
  }

  function draw(){
    ctx.fillStyle='#06080d';
    ctx.fillRect(0,0,W,H);
    const cx = W*0.42, cy = H/2;
    const R = Math.min(W*0.32, H*0.42);
    // edges
    ctx.lineWidth = 0.5;
    ctx.strokeStyle = 'rgba(254,250,224,0.10)';
    ctx.beginPath();
    for (let i=0;i<N;i++){
      for (const j of adj[i]){
        if (j<i) continue;
        const ang = (j-i+N)%N;
        const isLong = Math.min(ang, N-ang) > kdeg/2 + 1;
        if (isLong){
          // skip long edges in this pass
        } else {
          ctx.moveTo(cx + Math.cos(nodes[i].angle)*R, cy + Math.sin(nodes[i].angle)*R);
          ctx.lineTo(cx + Math.cos(nodes[j].angle)*R, cy + Math.sin(nodes[j].angle)*R);
        }
      }
    }
    ctx.stroke();
    // long edges (rewires) drawn brighter
    ctx.strokeStyle = 'rgba(6,182,212,0.18)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    for (let i=0;i<N;i++){
      for (const j of adj[i]){
        if (j<i) continue;
        const ang = (j-i+N)%N;
        const isLong = Math.min(ang, N-ang) > kdeg/2 + 1;
        if (isLong){
          ctx.moveTo(cx + Math.cos(nodes[i].angle)*R, cy + Math.sin(nodes[i].angle)*R);
          ctx.lineTo(cx + Math.cos(nodes[j].angle)*R, cy + Math.sin(nodes[j].angle)*R);
        }
      }
    }
    ctx.stroke();
    // nodes
    for (let i=0;i<N;i++){
      const x = cx + Math.cos(nodes[i].angle)*R;
      const y = cy + Math.sin(nodes[i].angle)*R;
      const col = color[i]===1 ? '#06b6d4' : '#e879f9';
      ctx.fillStyle = col;
      ctx.shadowColor = col;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, 2*Math.PI);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    // title
    ctx.fillStyle = 'rgba(254,250,224,0.6)';
    ctx.font = '600 12px Nunito';
    ctx.fillText('Watts-Strogatz network · circular layout', cx - R, cy + R + 28);
  }

  function loop(){
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('iBeta').addEventListener('input', e=>{
    beta_p = +e.target.value;
    document.getElementById('vBeta').textContent = beta_p.toFixed(2);
    init();
  });
  document.getElementById('iTol').addEventListener('input', e=>{
    tol = +e.target.value;
    document.getElementById('vTol').textContent = tol.toFixed(2);
  });
  document.getElementById('iK').addEventListener('input', e=>{
    kdeg = +e.target.value;
    document.getElementById('vK').textContent = kdeg;
    init();
  });
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click', ()=>{
      const [bp, tt] = b.dataset.p.split(',').map(Number);
      beta_p=bp; tol=tt;
      document.getElementById('iBeta').value=bp; document.getElementById('vBeta').textContent=bp.toFixed(2);
      document.getElementById('iTol').value=tt; document.getElementById('vTol').textContent=tt.toFixed(2);
      init();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent = running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
