<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Replicator Dynamics — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(330px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .control select {
    width:100%; padding:0.4rem; font-family:'Nunito',sans-serif; font-size:0.8rem;
    background: rgba(254,250,224,0.1); color: var(--cream);
    border: 1px solid rgba(254,250,224,0.18); border-radius:8px;
  }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend { display:flex; gap:1rem; font-size:0.8rem; margin-top:0.5rem; flex-wrap:wrap; }
  .legend span::before { content:''; display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align: middle; }
  .legend .x1::before { background: var(--sage); }
  .legend .x2::before { background: var(--terracotta); }
  .legend .x3::before { background: var(--earth); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 32</span>
  <h2>Replicator Dynamics</h2>
  <p>dxᵢ/dt = xᵢ(fᵢ − f̄). Successful strategies grow at the expense of those below the population's mean payoff. Trajectory shown on a 2-simplex.</p>

  <div class="control"><label>Preset payoff matrix</label>
    <select id="iPreset">
      <option value="rps">Rock-Paper-Scissors (cycling)</option>
      <option value="hd">Hawk-Dove-Retaliator</option>
      <option value="coord">Coordination (3-strategy)</option>
      <option value="dom">Dominance (one strategy wins)</option>
    </select>
  </div>
  <div class="control"><label>diagonal payoff a <span id="va">0.00</span></label><input type="range" id="iA" min="-2" max="2" step="0.01" value="0" /></div>
  <div class="control"><label>off-diagonal scale b <span id="vb">1.00</span></label><input type="range" id="iB" min="-2" max="2" step="0.01" value="1.0" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>x₁</span><span class="v" id="sx1">—</span></div>
  <div class="stat"><span>x₂</span><span class="v" id="sx2">—</span></div>
  <div class="stat"><span>x₃</span><span class="v" id="sx3">—</span></div>
  <div class="stat"><span>avg fitness</span><span class="v" id="sF">—</span></div>
  <div class="legend"><span class="x1">x₁</span><span class="x2">x₂</span><span class="x3">x₃</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize',resize); resize();

  const C1='#8A9A5B', C2='#BC6C25', C3='#DDA15E', GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  // payoff matrix M, m[i][j] = payoff to i playing against j
  let M=[[0,-1,1],[1,0,-1],[-1,1,0]]; // RPS by default
  let a=0, b=1.0, presetVal='rps';

  function buildMatrix(){
    if(presetVal==='rps'){
      M=[[a, -b, b],[b, a, -b],[-b, b, a]];
    } else if(presetVal==='hd'){
      // Hawk-Dove-Retaliator
      M=[[a-1, b+1, a],[a, b/2, b/2],[a, b/2, b/2+0.1]];
    } else if(presetVal==='coord'){
      M=[[1+a,b/2,b/2],[b/2,1+a,b/2],[b/2,b/2,1+a]];
    } else if(presetVal==='dom'){
      M=[[1+a,b,b],[a,a,a],[-b,a,a]];
    }
  }

  let x1=0.4, x2=0.35, x3=0.25, t=0, running=true;
  const tsSeries=[]; const traj=[];
  const TSMAX=1500, TRMAX=4000;
  const dt=0.02;

  function reset(){
    x1=0.4; x2=0.35; x3=0.25; t=0; tsSeries.length=0; traj.length=0;
    buildMatrix();
  }

  function deriv(x1,x2,x3){
    const xs=[x1,x2,x3];
    const f=[0,0,0];
    for(let i=0;i<3;i++) for(let j=0;j<3;j++) f[i]+=M[i][j]*xs[j];
    const fbar = xs[0]*f[0]+xs[1]*f[1]+xs[2]*f[2];
    return [xs[0]*(f[0]-fbar), xs[1]*(f[1]-fbar), xs[2]*(f[2]-fbar)];
  }

  function rk4(){
    const k1=deriv(x1,x2,x3);
    const k2=deriv(x1+dt/2*k1[0], x2+dt/2*k1[1], x3+dt/2*k1[2]);
    const k3=deriv(x1+dt/2*k2[0], x2+dt/2*k2[1], x3+dt/2*k2[2]);
    const k4=deriv(x1+dt*k3[0],   x2+dt*k3[1],   x3+dt*k3[2]);
    x1 += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    x2 += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    x3 += dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
    // renormalize
    if(x1<0) x1=0; if(x2<0) x2=0; if(x3<0) x3=0;
    const sum=x1+x2+x3;
    if(sum>0){ x1/=sum; x2/=sum; x3/=sum; }
    t += dt;
  }

  function tick(){
    for(let i=0;i<3;i++) rk4();
    tsSeries.push({t,x1,x2,x3});
    if(tsSeries.length>TSMAX) tsSeries.shift();
    traj.push({x1,x2,x3});
    if(traj.length>TRMAX) traj.shift();
    const f=deriv(x1,x2,x3);
    const xs=[x1,x2,x3];
    const fp=[0,0,0];
    for(let i=0;i<3;i++) for(let j=0;j<3;j++) fp[i]+=M[i][j]*xs[j];
    const fbar = x1*fp[0]+x2*fp[1]+x3*fp[2];
    document.getElementById('st').textContent=t.toFixed(2);
    document.getElementById('sx1').textContent=x1.toFixed(3);
    document.getElementById('sx2').textContent=x2.toFixed(3);
    document.getElementById('sx3').textContent=x3.toFixed(3);
    document.getElementById('sF').textContent=fbar.toFixed(3);
  }

  // simplex: barycentric (x1,x2,x3) -> 2D
  function bary(x1,x2,x3, ox,oy,size){
    // vertices: v1 top, v2 bottom-left, v3 bottom-right
    const v1=[ox, oy];
    const v2=[ox-size*Math.sin(Math.PI/3), oy+size*Math.cos(Math.PI/3)+size/2];
    const v3=[ox+size*Math.sin(Math.PI/3), oy+size*Math.cos(Math.PI/3)+size/2];
    const px = x1*v1[0]+x2*v2[0]+x3*v3[0];
    const py = x1*v1[1]+x2*v2[1]+x3*v3[1];
    return [px,py,v1,v2,v3];
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if(tsSeries.length<2) return;
    const padL=70, padR=370, padT=60, padB=60;
    const leftW = (W-padL-padR)*0.5 - 20;
    const rightX = padL + leftW + 60;
    const rightW = W-padR-rightX;
    const totH = H-padT-padB;

    // === time series (left) ===
    const t0=tsSeries[0].t, t1=tsSeries[tsSeries.length-1].t;
    const tspan=Math.max(t1-t0,0.5);
    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for(let i=0;i<=5;i++){
      const yp=padT+i*totH/5;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+leftW,yp); ctx.stroke();
    }
    ctx.strokeStyle=AXIS;
    ctx.beginPath(); ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+totH); ctx.lineTo(padL+leftW,padT+totH); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='12px Nunito';
    ctx.fillText('Strategy fractions vs t', padL, padT-15);
    ctx.fillText('1.0', padL-30, padT+5);
    ctx.fillText('0', padL-15, padT+totH);
    ctx.fillText('t='+t1.toFixed(1), padL+leftW-50, padT+totH+18);

    function plot(key,color){
      ctx.strokeStyle=color; ctx.lineWidth=2.2; ctx.beginPath();
      for(let i=0;i<tsSeries.length;i++){
        const s=tsSeries[i];
        const px=padL+(s.t-t0)/tspan*leftW;
        const py=padT+totH-s[key]*totH;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    plot('x1',C1); plot('x2',C2); plot('x3',C3);

    // === simplex (right) ===
    const size = Math.min(rightW, totH) * 0.85;
    const ox = rightX + rightW/2;
    const oy = padT + 30;
    const [,,v1,v2,v3] = bary(1,0,0, ox,oy,size);

    ctx.strokeStyle=AXIS; ctx.lineWidth=1.4;
    ctx.beginPath();
    ctx.moveTo(v1[0],v1[1]); ctx.lineTo(v2[0],v2[1]); ctx.lineTo(v3[0],v3[1]); ctx.closePath(); ctx.stroke();

    // gridlines (every 0.2)
    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for(let f=0.2;f<1;f+=0.2){
      // x1=f line: connects (f,1-f,0) to (f,0,1-f)
      const pa = bary(f,1-f,0, ox,oy,size);
      const pb = bary(f,0,1-f, ox,oy,size);
      ctx.beginPath(); ctx.moveTo(pa[0],pa[1]); ctx.lineTo(pb[0],pb[1]); ctx.stroke();
      const pc = bary(1-f,f,0, ox,oy,size);
      const pd = bary(0,f,1-f, ox,oy,size);
      ctx.beginPath(); ctx.moveTo(pc[0],pc[1]); ctx.lineTo(pd[0],pd[1]); ctx.stroke();
      const pe = bary(1-f,0,f, ox,oy,size);
      const pf = bary(0,1-f,f, ox,oy,size);
      ctx.beginPath(); ctx.moveTo(pe[0],pe[1]); ctx.lineTo(pf[0],pf[1]); ctx.stroke();
    }

    // labels
    ctx.fillStyle=C1; ctx.font='13px Nunito'; ctx.fillText('x₁', v1[0]-7, v1[1]-8);
    ctx.fillStyle=C2; ctx.fillText('x₂', v2[0]-20, v2[1]+15);
    ctx.fillStyle=C3; ctx.fillText('x₃', v3[0]+8, v3[1]+15);

    // trajectory
    const N=traj.length;
    for(let i=1;i<N;i++){
      const a2=traj[i-1], b2=traj[i];
      const p1=bary(a2.x1,a2.x2,a2.x3, ox,oy,size);
      const p2=bary(b2.x1,b2.x2,b2.x3, ox,oy,size);
      const fade=i/N;
      ctx.strokeStyle=`rgba(221,161,94,${0.05+fade*0.85})`;
      ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.stroke();
    }
    // current point
    const last=traj[N-1];
    const cp=bary(last.x1,last.x2,last.x3, ox,oy,size);
    ctx.fillStyle='#FEFAE0';
    ctx.beginPath(); ctx.arc(cp[0],cp[1],5,0,Math.PI*2); ctx.fill();

    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='12px Nunito';
    ctx.fillText('Simplex trajectory', rightX, padT-15);
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      fn(v);
    });
  }
  bind('iA','va',v=>{a=v; buildMatrix();});
  bind('iB','vb',v=>{b=v; buildMatrix();});
  document.getElementById('iPreset').addEventListener('change',e=>{
    presetVal=e.target.value; buildMatrix(); reset();
  });
  document.getElementById('bRun').addEventListener('click',e=>{running=!running; e.target.textContent=running?'Pause':'Resume';});
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
