<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D Flocking — CAS</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d;
    --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.2rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.7rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem;
    padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ NN</span>
  <h2>3D Flocking</h2>
  <p>Boids in a 3D box, projected to 2D with depth-based color and scaling. Cohesion pulls toward neighbors' centroid, alignment matches velocity, separation avoids crowding — all in three dimensions.</p>

  <div class="control"><label>Cohesion <span id="vCo">0.005</span></label><input type="range" id="iCo" min="0" max="0.02" step="0.0005" value="0.005" /></div>
  <div class="control"><label>Alignment <span id="vAl">0.05</span></label><input type="range" id="iAl" min="0" max="0.20" step="0.005" value="0.05" /></div>
  <div class="control"><label>Separation <span id="vSe">0.06</span></label><input type="range" id="iSe" min="0" max="0.20" step="0.005" value="0.06" /></div>
  <div class="control"><label>Boids <span id="vN">240</span></label><input type="range" id="iN" min="60" max="500" step="20" value="240" /></div>

  <div class="btnrow">
    <button class="p" data-co="0.005" data-al="0.05" data-se="0.06">Balanced</button>
    <button class="p" data-co="0.014" data-al="0.10" data-se="0.04">Tight</button>
    <button class="p" data-co="0.002" data-al="0.02" data-se="0.10">Loose</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Frame</span><span class="v" id="sF">0</span></div>
  <div class="stat"><span>Mean speed</span><span class="v" id="sV">—</span></div>
  <div class="stat"><span>Order</span><span class="v" id="sO">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  let coh=0.005, ali=0.05, sep=0.06;
  let N = 240;
  const BOX = 220;
  const VMAX = 4, VMIN = 1.6;
  const SEP_R = 18, NEIGH_R = 50;
  let boids = [];
  let frame = 0, running = true;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    boids = [];
    for (let i=0;i<N;i++) {
      boids.push({
        x: (Math.random()-0.5)*BOX*1.2,
        y: (Math.random()-0.5)*BOX*1.2,
        z: (Math.random()-0.5)*BOX*1.2,
        vx: (Math.random()-0.5)*4,
        vy: (Math.random()-0.5)*4,
        vz: (Math.random()-0.5)*4
      });
    }
    frame = 0;
  }

  function step() {
    for (let i=0;i<N;i++) {
      const a = boids[i];
      let cx=0, cy=0, cz=0;       // cohesion target
      let ax=0, ay=0, az=0;       // alignment
      let sx=0, sy=0, sz=0;       // separation
      let cnt=0, scnt=0;
      for (let j=0;j<N;j++) {
        if (i===j) continue;
        const b = boids[j];
        const dx = b.x-a.x, dy = b.y-a.y, dz = b.z-a.z;
        const d2 = dx*dx + dy*dy + dz*dz;
        if (d2 < NEIGH_R*NEIGH_R) {
          cx += b.x; cy += b.y; cz += b.z;
          ax += b.vx; ay += b.vy; az += b.vz;
          cnt++;
          if (d2 < SEP_R*SEP_R) {
            const inv = 1.0/Math.max(0.5, Math.sqrt(d2));
            sx -= dx*inv; sy -= dy*inv; sz -= dz*inv;
            scnt++;
          }
        }
      }
      if (cnt>0) {
        cx = cx/cnt - a.x; cy = cy/cnt - a.y; cz = cz/cnt - a.z;
        ax = ax/cnt - a.vx; ay = ay/cnt - a.vy; az = az/cnt - a.vz;
        a.vx += coh*cx + ali*ax;
        a.vy += coh*cy + ali*ay;
        a.vz += coh*cz + ali*az;
      }
      if (scnt>0) {
        a.vx += sep*sx; a.vy += sep*sy; a.vz += sep*sz;
      }
      // gentle pull to center if outside box
      const half = BOX*0.55;
      if (a.x > half) a.vx -= 0.05;
      if (a.x < -half) a.vx += 0.05;
      if (a.y > half) a.vy -= 0.05;
      if (a.y < -half) a.vy += 0.05;
      if (a.z > half) a.vz -= 0.05;
      if (a.z < -half) a.vz += 0.05;
      // Speed clamp
      const sp = Math.sqrt(a.vx*a.vx + a.vy*a.vy + a.vz*a.vz);
      if (sp > VMAX) { a.vx*=VMAX/sp; a.vy*=VMAX/sp; a.vz*=VMAX/sp; }
      else if (sp < VMIN) { a.vx*=VMIN/Math.max(0.01,sp); a.vy*=VMIN/Math.max(0.01,sp); a.vz*=VMIN/Math.max(0.01,sp); }
      a.x += a.vx; a.y += a.vy; a.z += a.vz;
    }
    frame++;
  }

  let camYaw = 0, camPitch = 0.2;

  function project(x, y, z, ox, oy, scale) {
    // Rotate around Y (yaw)
    const cy = Math.cos(camYaw), sy = Math.sin(camYaw);
    const cp = Math.cos(camPitch), sp = Math.sin(camPitch);
    let xr = x*cy - z*sy;
    let zr = x*sy + z*cy;
    let yr = y*cp - zr*sp;
    let zz = y*sp + zr*cp;
    const f = 600;
    const denom = f - zz;
    const sc = scale * f / Math.max(50, denom);
    return [ox + xr*sc, oy + yr*sc, zz, sc];
  }

  function render() {
    // Fading trails — translucent overlay
    ctx.fillStyle = 'rgba(6,8,13,0.18)';
    ctx.fillRect(0,0,W,H);

    const ox = W/2 - 60, oy = H/2;
    const scale = Math.min(W, H) * 0.0021;

    // Sort by depth
    const arr = boids.map((b, i) => {
      const [px, py, zz, sc] = project(b.x, b.y, b.z, ox, oy, scale);
      return { b, px, py, zz, sc };
    });
    arr.sort((a, b) => a.zz - b.zz);

    // Draw box wireframe (cube)
    drawBox(ox, oy, scale);

    for (const item of arr) {
      const { b, px, py, zz, sc } = item;
      // Depth-based color via HSL (cyan-magenta-orange gradient)
      const dn = Math.max(0, Math.min(1, (zz + BOX) / (2*BOX)));
      const hue = 200 - dn*180; // 200 (cyan) → 20 (orange) far
      const lightness = 40 + dn*25;
      const sat = 80;
      const sp = Math.sqrt(b.vx*b.vx + b.vy*b.vy + b.vz*b.vz);
      // velocity heading projected
      const [hx, hy] = project(b.x + b.vx*3, b.y + b.vy*3, b.z + b.vz*3, ox, oy, scale);
      const ang = Math.atan2(hy - py, hx - px);
      const sz = Math.max(2.5, 7*sc);
      // Triangle oriented along velocity
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(ang);
      ctx.shadowColor = `hsl(${hue}, ${sat}%, ${lightness+10}%)`;
      ctx.shadowBlur = 8 + sc*8;
      ctx.fillStyle = `hsl(${hue}, ${sat}%, ${lightness}%)`;
      ctx.beginPath();
      ctx.moveTo(sz, 0);
      ctx.lineTo(-sz*0.7, sz*0.55);
      ctx.lineTo(-sz*0.7, -sz*0.55);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    ctx.shadowBlur = 0;

    // Stats
    let mv = 0;
    let avx=0, avy=0, avz=0;
    for (const b of boids) {
      const sp = Math.sqrt(b.vx*b.vx + b.vy*b.vy + b.vz*b.vz);
      mv += sp;
      avx += b.vx/Math.max(0.01,sp); avy += b.vy/Math.max(0.01,sp); avz += b.vz/Math.max(0.01,sp);
    }
    mv /= N;
    const order = Math.sqrt(avx*avx + avy*avy + avz*avz)/N;
    document.getElementById('sF').textContent = frame;
    document.getElementById('sV').textContent = mv.toFixed(2);
    document.getElementById('sO').textContent = order.toFixed(3);

    // Slowly rotate camera
    camYaw += 0.0035;
  }

  function drawBox(ox, oy, scale) {
    const r = BOX*0.55;
    const corners = [
      [-r,-r,-r], [r,-r,-r], [r,r,-r], [-r,r,-r],
      [-r,-r,r], [r,-r,r], [r,r,r], [-r,r,r]
    ];
    const ps = corners.map(([x,y,z]) => project(x,y,z, ox, oy, scale));
    const edges = [
      [0,1],[1,2],[2,3],[3,0],
      [4,5],[5,6],[6,7],[7,4],
      [0,4],[1,5],[2,6],[3,7]
    ];
    ctx.strokeStyle = 'rgba(232,121,249,0.20)';
    ctx.lineWidth = 1;
    for (const [a, b] of edges) {
      ctx.beginPath();
      ctx.moveTo(ps[a][0], ps[a][1]);
      ctx.lineTo(ps[b][0], ps[b][1]);
      ctx.stroke();
    }
  }

  function loop() {
    if (running) step();
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iCo').addEventListener('input', e => {
    coh = +e.target.value; document.getElementById('vCo').textContent = coh.toFixed(4);
  });
  document.getElementById('iAl').addEventListener('input', e => {
    ali = +e.target.value; document.getElementById('vAl').textContent = ali.toFixed(3);
  });
  document.getElementById('iSe').addEventListener('input', e => {
    sep = +e.target.value; document.getElementById('vSe').textContent = sep.toFixed(3);
  });
  document.getElementById('iN').addEventListener('input', e => {
    N = +e.target.value; document.getElementById('vN').textContent = N; reset();
  });
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      coh = +b.dataset.co; ali = +b.dataset.al; sep = +b.dataset.se;
      document.getElementById('iCo').value = coh; document.getElementById('vCo').textContent = coh.toFixed(4);
      document.getElementById('iAl').value = ali; document.getElementById('vAl').textContent = ali.toFixed(3);
      document.getElementById('iSe').value = sep; document.getElementById('vSe').textContent = sep.toFixed(3);
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  // Clear once for trails to look good
  ctx.fillStyle = '#06080d';
  ctx.fillRect(0,0,W,H);

  reset(); loop();
})();
</script>
</body>
</html>
