<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Couzin Fish Schooling — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; cursor:crosshair; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100; width: min(310px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12); border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream); max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.7rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.preset { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  button.active { box-shadow: 0 0 0 2px var(--accent); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ 63</span>
  <h2>Couzin Fish Schooling</h2>
  <p>Three concentric zones: <b>repulsion</b> (avoid), <b>alignment</b> (match heading), <b>attraction</b> (steer toward). Click to drop a predator — fish flee directly away. Toggle zones to see the radii.</p>

  <div class="control"><label>Repulsion radius <span id="vRr">8</span></label><input type="range" id="iRr" min="3" max="20" step="1" value="8" /></div>
  <div class="control"><label>Alignment radius <span id="vRa">28</span></label><input type="range" id="iRa" min="10" max="60" step="1" value="28" /></div>
  <div class="control"><label>Attraction radius <span id="vRc">60</span></label><input type="range" id="iRc" min="30" max="120" step="1" value="60" /></div>
  <div class="control"><label>Speed <span id="vSp">2.0</span></label><input type="range" id="iSp" min="0.5" max="4" step="0.05" value="2.0" /></div>
  <div class="control"><label>Population <span id="vN">300</span></label><input type="range" id="iN" min="60" max="600" step="10" value="300" /></div>

  <div class="btnrow">
    <button id="bZones" class="secondary">Show Zones</button>
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Fish</span><span class="v" id="sN">—</span></div>
  <div class="stat"><span>Polarization</span><span class="v" id="sPol">—</span></div>
  <div class="stat"><span>Predators</span><span class="v" id="sPred">0</span></div>
  <div class="stat"><span>Mode</span><span class="v" id="sMode">school</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  let Rr=8, Ra=28, Rc=60, speed=2.0, N=300;
  let showZones=false, running=true, frame=0;
  let predators=[];

  let fish=[];

  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize); resize();

  function reset() {
    fish=[];
    for (let i=0;i<N;i++) {
      const a=Math.random()*Math.PI*2;
      fish.push({
        x:Math.random()*W, y:Math.random()*H,
        vx:Math.cos(a)*speed, vy:Math.sin(a)*speed,
        trail:[]
      });
    }
    predators=[];
    frame=0;
  }

  function step() {
    const Rr2=Rr*Rr, Ra2=Ra*Ra, Rc2=Rc*Rc;
    const Pr=80, Pr2=Pr*Pr;
    for (let i=0;i<fish.length;i++) {
      const f=fish[i];
      let rx=0, ry=0, ax=0, ay=0, cx=0, cy=0;
      let nr=0, na=0, nc=0;
      let escape=false, ex=0, ey=0;

      for (let j=0;j<fish.length;j++) {
        if (i===j) continue;
        const o=fish[j];
        let dx=o.x-f.x, dy=o.y-f.y;
        if (dx>W/2) dx-=W; else if (dx<-W/2) dx+=W;
        if (dy>H/2) dy-=H; else if (dy<-H/2) dy+=H;
        const d2=dx*dx+dy*dy;
        if (d2<Rr2 && d2>0) { rx-=dx; ry-=dy; nr++; }
        else if (d2<Ra2) { ax+=o.vx; ay+=o.vy; na++; }
        else if (d2<Rc2) { cx+=dx; cy+=dy; nc++; }
      }

      // Predator escape (highest priority)
      for (let p of predators) {
        const dx=p.x-f.x, dy=p.y-f.y;
        const d2=dx*dx+dy*dy;
        if (d2<Pr2) {
          escape=true;
          ex-=dx; ey-=dy;
        }
      }

      let nvx=f.vx, nvy=f.vy;
      const sp=escape?speed*1.8:speed;

      if (escape) {
        const m=Math.hypot(ex,ey)||1;
        nvx=ex/m*sp; nvy=ey/m*sp;
      } else if (nr>0) {
        const m=Math.hypot(rx,ry)||1;
        nvx+=rx/m*0.5; nvy+=ry/m*0.5;
      } else {
        if (na>0) { const m=Math.hypot(ax,ay)||1; nvx+=ax/m*0.25; nvy+=ay/m*0.25; }
        if (nc>0) { const m=Math.hypot(cx,cy)||1; nvx+=cx/m*0.18; nvy+=cy/m*0.18; }
      }
      // Speed normalize
      const m=Math.hypot(nvx,nvy)||1;
      f.nvx=nvx/m*sp; f.nvy=nvy/m*sp;
    }
    for (let f of fish) {
      f.vx=f.nvx; f.vy=f.nvy;
      f.x+=f.vx; f.y+=f.vy;
      if (f.x<0) f.x+=W; if (f.x>=W) f.x-=W;
      if (f.y<0) f.y+=H; if (f.y>=H) f.y-=H;
      f.trail.push(f.x, f.y);
      if (f.trail.length>16) f.trail.splice(0,2);
    }
    // Predator decays
    for (let p of predators) p.life--;
    predators=predators.filter(p=>p.life>0);
    frame++;
  }

  function render() {
    // Fade
    ctx.fillStyle='rgba(6,8,13,0.18)';
    ctx.fillRect(0,0,W,H);

    // Zones (if enabled, draw on first fish)
    if (showZones && fish.length>0) {
      const f=fish[0];
      ctx.lineWidth=1;
      ctx.setLineDash([4,4]);
      ctx.strokeStyle='rgba(232,121,249,0.35)'; ctx.beginPath(); ctx.arc(f.x,f.y,Rr,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle='rgba(6,182,212,0.30)'; ctx.beginPath(); ctx.arc(f.x,f.y,Ra,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle='rgba(138,154,91,0.25)'; ctx.beginPath(); ctx.arc(f.x,f.y,Rc,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }

    // Trails
    ctx.lineWidth=1;
    for (let f of fish) {
      const t=f.trail; if (t.length<4) continue;
      for (let i=0;i<t.length-2;i+=2) {
        const a=(i/t.length);
        ctx.strokeStyle=`rgba(6,182,212,${a*0.5})`;
        ctx.beginPath();
        ctx.moveTo(t[i],t[i+1]);
        ctx.lineTo(t[i+2],t[i+3]);
        ctx.stroke();
      }
    }

    // Fish bodies (triangles with glow)
    ctx.shadowBlur=8; ctx.shadowColor='rgba(6,182,212,0.7)';
    ctx.fillStyle='#cffafe';
    for (let f of fish) {
      const a=Math.atan2(f.vy,f.vx);
      ctx.beginPath();
      ctx.moveTo(f.x+Math.cos(a)*5, f.y+Math.sin(a)*5);
      ctx.lineTo(f.x+Math.cos(a+2.5)*3.5, f.y+Math.sin(a+2.5)*3.5);
      ctx.lineTo(f.x+Math.cos(a-2.5)*3.5, f.y+Math.sin(a-2.5)*3.5);
      ctx.closePath();
      ctx.fill();
    }
    ctx.shadowBlur=0;

    // Predators
    for (let p of predators) {
      ctx.shadowBlur=20; ctx.shadowColor='rgba(232,121,249,0.9)';
      ctx.fillStyle='rgba(232,121,249,0.85)';
      ctx.beginPath(); ctx.arc(p.x,p.y,12,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(232,121,249,0.25)';
      ctx.beginPath(); ctx.arc(p.x,p.y,80,0,Math.PI*2); ctx.stroke();
    }

    // Stats
    let avx=0, avy=0;
    for (let f of fish) {
      const m=Math.hypot(f.vx,f.vy)||1;
      avx+=f.vx/m; avy+=f.vy/m;
    }
    const pol = Math.hypot(avx,avy)/Math.max(1,fish.length);
    document.getElementById('sN').textContent=fish.length;
    document.getElementById('sPol').textContent=pol.toFixed(3);
    document.getElementById('sPred').textContent=predators.length;
    document.getElementById('sMode').textContent = pol>0.7?'schooling':pol>0.3?'swarm':'milling';
  }

  function loop() { if (running) step(); render(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,decimals=0) {
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=decimals?v.toFixed(decimals):v;
      fn(v);
    });
  }
  bind('iRr','vRr',v=>Rr=v);
  bind('iRa','vRa',v=>Ra=v);
  bind('iRc','vRc',v=>Rc=v);
  bind('iSp','vSp',v=>{speed=v; document.getElementById('vSp').textContent=v.toFixed(1);},1);
  bind('iN','vN',v=>{N=v; reset();});

  document.getElementById('bZones').addEventListener('click',e=>{
    showZones=!showZones;
    e.target.classList.toggle('active', showZones);
  });
  document.getElementById('bRun').addEventListener('click',e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click',reset);

  cv.addEventListener('pointerdown',e=>{
    const r=cv.getBoundingClientRect();
    predators.push({x:e.clientX-r.left, y:e.clientY-r.top, life:240});
  });

  reset(); loop();
})();
</script>
</body>
</html>
