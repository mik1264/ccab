<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Allee Effect — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12); border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; background: linear-gradient(90deg, var(--earth), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600; background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream); border:none; border-radius:9px; cursor:pointer; transition:all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Allee Effect</h2>
  <p>Strong Allee: dN/dt = rN(N/A − 1)(1 − N/K). Below threshold A → extinction; above → grows to K. Phase line + multiple-IC time series show the watershed.</p>

  <div class="control"><label>Growth r <span id="vr">0.50</span></label><input type="range" id="ir" min="0.1" max="2" step="0.01" value="0.50" /></div>
  <div class="control"><label>Allee A <span id="vA">25</span></label><input type="range" id="iA" min="5" max="80" step="0.5" value="25" /></div>
  <div class="control"><label>Capacity K <span id="vK">100</span></label><input type="range" id="iK" min="40" max="200" step="1" value="100" /></div>
  <div class="control"><label>Initial N₀ <span id="vN0">40</span></label><input type="range" id="iN0" min="0" max="150" step="1" value="40" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="0.5,25,100,15">Below A</button>
    <button class="p" data-p="0.5,25,100,40">Above A</button>
    <button class="p" data-p="0.5,25,100,26">On edge</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>N</span><span class="v" id="sN">—</span></div>
  <div class="stat"><span>dN/dt</span><span class="v" id="sD">—</span></div>
  <div class="stat"><span>Fate</span><span class="v" id="sF">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  let r=0.5, A=25, K=100, N0=40;
  let N=40, t=0, running=true;
  let traces = []; // multiple IC traces for ensemble
  const MAX = 800;

  function dNdt(N){ return r*N*(N/A - 1)*(1 - N/K); }

  function reset() {
    t=0; N=N0;
    traces = [];
    // Set up ensemble of ICs from 0..1.5K
    const ICs = [];
    for (let i=1;i<=12;i++) ICs.push(i*K*1.4/12);
    for (const ic of ICs) traces.push({N:ic, hist:[{t:0,N:ic}]});
  }

  function rk4Single(N, dt){
    const f = (n)=>r*n*(n/A-1)*(1-n/K);
    const k1=f(N), k2=f(N+dt/2*k1), k3=f(N+dt/2*k2), k4=f(N+dt*k3);
    let v = N + dt/6*(k1+2*k2+2*k3+k4);
    if (v<0) v=0;
    return v;
  }

  function tick(){
    const dt=0.1;
    for (let st=0; st<3; st++){
      for (const tr of traces){
        tr.N = rk4Single(tr.N, dt);
        tr.hist.push({t:t+st*dt+dt, N:tr.N});
        if (tr.hist.length>MAX) tr.hist.shift();
      }
      // Main N
      N = rk4Single(N, dt);
    }
    t += 3*dt;
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sN').textContent=N.toFixed(2);
    document.getElementById('sD').textContent=dNdt(N).toFixed(3);
    const fate = N<0.5?'extinct':N>K*0.95?'at K':N<A?'declining':'growing→K';
    document.getElementById('sF').textContent=fate;
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    const padL=80, padR=360, padT=50, padB=40;
    const totW=W-padL-padR;
    const halfH = (H-padT-padB-50)/2;

    // === Top: ensemble time series ===
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Ensemble of trajectories N(t) from many initial N₀', padL, padT-12);
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++){const yp=padT+i*halfH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    const Nmax = K*1.6;
    // Reference lines K, A
    const yK = padT+halfH - K/Nmax*halfH;
    const yA = padT+halfH - A/Nmax*halfH;
    ctx.strokeStyle='rgba(138,154,91,0.5)'; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(padL,yK); ctx.lineTo(padL+totW,yK); ctx.stroke();
    ctx.strokeStyle='rgba(232,121,249,0.5)';
    ctx.beginPath(); ctx.moveTo(padL,yA); ctx.lineTo(padL+totW,yA); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(138,154,91,0.7)'; ctx.font='10px Nunito';
    ctx.fillText('K='+K.toFixed(0), padL+totW-50, yK-3);
    ctx.fillStyle='rgba(232,121,249,0.7)';
    ctx.fillText('A='+A.toFixed(0), padL+totW-50, yA-3);

    if (traces.length>0 && traces[0].hist.length>1){
      const t0=traces[0].hist[0].t, t1=traces[0].hist[traces[0].hist.length-1].t;
      const ts=Math.max(t1-t0, 1);
      for (const tr of traces){
        const aboveA = tr.hist[0].N >= A;
        ctx.strokeStyle = aboveA ? 'rgba(6,182,212,0.6)' : 'rgba(251,146,60,0.6)';
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        for (let i=0;i<tr.hist.length;i++){
          const s=tr.hist[i];
          const px=padL+(s.t-t0)/ts*totW;
          const py=padT+halfH-Math.min(s.N,Nmax)/Nmax*halfH;
          if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.stroke();
      }
    }
    // legend
    ctx.font='11px Nunito';
    ctx.fillStyle='#06b6d4'; ctx.fillText('— above A → grows to K', padL, padT+halfH+16);
    ctx.fillStyle='#fb923c'; ctx.fillText('— below A → extinction', padL+totW*0.45, padT+halfH+16);

    // === Bottom: phase line dN/dt vs N ===
    const bY = padT + halfH + 50;
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Phase line: dN/dt vs N (zeros = fixed points)', padL, bY-12);
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++){const yp=bY+i*halfH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}

    // Compute dNdt curve
    let dmax=0, dmin=0;
    const samples=200;
    const dvals=[];
    for (let i=0;i<=samples;i++){
      const n = Nmax*i/samples;
      const d = dNdt(n);
      dvals.push({n,d});
      if (d>dmax) dmax=d;
      if (d<dmin) dmin=d;
    }
    const drange = Math.max(dmax-dmin, 1e-3);
    const yZero = bY + halfH - (0-dmin)/drange*halfH;
    ctx.strokeStyle='rgba(254,250,224,0.4)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(padL,yZero); ctx.lineTo(padL+totW,yZero); ctx.stroke();
    // Curve
    ctx.strokeStyle='#e879f9'; ctx.lineWidth=2.2;
    ctx.beginPath();
    for (let i=0;i<dvals.length;i++){
      const v=dvals[i];
      const px=padL + v.n/Nmax*totW;
      const py=bY+halfH - (v.d-dmin)/drange*halfH;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();

    // Fixed points: 0, A, K
    const fps = [{n:0,stable:true}, {n:A, stable:false}, {n:K, stable:true}];
    for (const fp of fps){
      const px=padL+fp.n/Nmax*totW;
      ctx.fillStyle=fp.stable?'#06b6d4':'#e879f9';
      ctx.beginPath(); ctx.arc(px,yZero,7,0,Math.PI*2); ctx.fill();
      ctx.font='11px Nunito'; ctx.fillStyle='rgba(254,250,224,0.7)';
      ctx.fillText(fp.n===0?'0':(fp.n===A?'A':'K'), px-4, yZero+22);
      // Stability arrows
      ctx.strokeStyle=fp.stable?'#06b6d4':'#e879f9';
      ctx.lineWidth=1.5;
      const arrLen=18;
      const dir = fp.stable?1:-1;
      // left arrow points right if stable, left if unstable
      ctx.beginPath();
      ctx.moveTo(px-arrLen-3, yZero+12);
      ctx.lineTo(px-3, yZero+12);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(px+3, yZero+12); ctx.lineTo(px+arrLen+3, yZero+12);
      ctx.stroke();
    }

    // current N
    const px = padL + N/Nmax*totW;
    const py = bY+halfH - (dNdt(N)-dmin)/drange*halfH;
    ctx.fillStyle='#fb923c';
    ctx.beginPath(); ctx.arc(px,py,8,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(254,250,224,0.6)'; ctx.lineWidth=1.5; ctx.stroke();

    // axes labels
    ctx.fillStyle='rgba(254,250,224,0.5)'; ctx.font='10px Nunito';
    ctx.fillText('N=0', padL, bY+halfH+18);
    ctx.fillText('N='+Nmax.toFixed(0), padL+totW-30, bY+halfH+18);
  }

  function loop(){ if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,prop,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent = (id==='iK'||id==='iN0')?v.toFixed(0):v.toFixed(dec);
      if (prop==='r') r=v; if (prop==='A') A=v; if (prop==='K') K=v; if (prop==='N0') N0=v;
    });
  }
  bind('ir','vr','r'); bind('iA','vA','A',1); bind('iK','vK','K',0); bind('iN0','vN0','N0',0);
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click',()=>{
      const [pr,pa,pk,pn]=b.dataset.p.split(',').map(Number);
      r=pr; A=pa; K=pk; N0=pn;
      document.getElementById('ir').value=r; document.getElementById('vr').textContent=r.toFixed(2);
      document.getElementById('iA').value=A; document.getElementById('vA').textContent=A.toFixed(1);
      document.getElementById('iK').value=K; document.getElementById('vK').textContent=K.toFixed(0);
      document.getElementById('iN0').value=N0; document.getElementById('vN0').textContent=N0.toFixed(0);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); loop();
})();
</script>
</body>
</html>
