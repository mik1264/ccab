<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aizawa Attractor Particles — CAS</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d;
    --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.2rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.7rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem;
    padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ NN</span>
  <h2>Aizawa Attractor</h2>
  <p>Strange attractor with butterfly-with-stalk topology. Many particles share the same flow ẋ=(z−b)x−dy, ẏ=dx+(z−b)y, ż=c+az−z³/3−(x²+y²)(1+ez)+f·z·x³. Color encodes speed (turbo).</p>

  <div class="control"><label>dt <span id="vDt">0.012</span></label><input type="range" id="iDt" min="0.001" max="0.02" step="0.0005" value="0.012" /></div>
  <div class="control"><label>Particles <span id="vN">1500</span></label><input type="range" id="iN" min="200" max="4000" step="100" value="1500" /></div>
  <div class="control"><label>Trail fade <span id="vT">0.05</span></label><input type="range" id="iT" min="0.005" max="0.30" step="0.005" value="0.05" /></div>
  <div class="control"><label>Camera speed <span id="vS">0.005</span></label><input type="range" id="iS" min="0" max="0.02" step="0.001" value="0.005" /></div>

  <div class="btnrow">
    <button class="p" data-mode="butterfly">Butterfly</button>
    <button class="p" data-mode="thread">Thread</button>
    <button class="p" data-mode="cloud">Cloud</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Frame</span><span class="v" id="sFr">0</span></div>
  <div class="stat"><span>Mean speed</span><span class="v" id="sV">—</span></div>
  <div class="stat"><span>Particles</span><span class="v" id="sP">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  // Aizawa params
  const A = 0.95, B = 0.7, C = 0.6, D = 3.5, E = 0.25, FF = 0.1;
  let dt = 0.012, N = 1500, fade = 0.05, camSpeed = 0.005;
  let mode = 'butterfly';

  let xs, ys, zs;
  let frame = 0, running = true;
  let camYaw = 0;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    xs = new Float32Array(N);
    ys = new Float32Array(N);
    zs = new Float32Array(N);
    for (let i=0;i<N;i++) {
      if (mode==='butterfly') {
        xs[i] = (Math.random()-0.5)*2.0;
        ys[i] = (Math.random()-0.5)*2.0;
        zs[i] = (Math.random()-0.5)*2.0;
      } else if (mode==='thread') {
        xs[i] = 0.1 + (Math.random()-0.5)*0.05;
        ys[i] = 0.0 + (Math.random()-0.5)*0.05;
        zs[i] = 0.0 + (Math.random()-0.5)*0.05;
      } else {
        xs[i] = (Math.random()-0.5)*4;
        ys[i] = (Math.random()-0.5)*4;
        zs[i] = (Math.random()-0.5)*2 + 0.5;
      }
    }
    frame = 0;
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
  }

  function step() {
    for (let i=0;i<N;i++) {
      const x = xs[i], y = ys[i], z = zs[i];
      const r2 = x*x + y*y;
      const dx = (z - B)*x - D*y;
      const dy = D*x + (z - B)*y;
      const dz = C + A*z - (z*z*z)/3 - r2*(1 + E*z) + FF*z*x*x*x;
      xs[i] = x + dt*dx;
      ys[i] = y + dt*dy;
      zs[i] = z + dt*dz;
    }
    frame++;
  }

  // Turbo colormap (approx)
  function turbo(t) {
    t = Math.max(0, Math.min(1, t));
    const r = 0.13572 + t*(4.61539 + t*(-42.66032 + t*(132.13108 + t*(-152.94239 + t*59.28637))));
    const g = 0.09140 + t*(2.19418 + t*(4.84296 + t*(-14.18503 + t*(4.27729 + t*2.82956))));
    const b = 0.10667 + t*(12.64194 + t*(-60.58204 + t*(110.36276 + t*(-89.90310 + t*27.34554))));
    return [
      Math.max(0, Math.min(255, Math.round(r*255))),
      Math.max(0, Math.min(255, Math.round(g*255))),
      Math.max(0, Math.min(255, Math.round(b*255)))
    ];
  }

  function project(x, y, z, ox, oy, scale) {
    const cy = Math.cos(camYaw), sy = Math.sin(camYaw);
    const xr = x*cy - y*sy;
    const yr = x*sy + y*cy;
    // Tilt down a bit
    const tilt = 0.45;
    const ct = Math.cos(tilt), st = Math.sin(tilt);
    const yz = yr*ct - z*st;
    const zz = yr*st + z*ct;
    const f = 7;
    const sc = scale * f / Math.max(0.5, f - zz);
    return [ox + xr*sc, oy + yz*sc, zz];
  }

  function render() {
    // Fading overlay
    ctx.fillStyle = `rgba(6,8,13,${fade})`;
    ctx.fillRect(0,0,W,H);

    const ox = W/2 - 80, oy = H/2;
    const scale = Math.min(W, H) * 0.18;

    // Draw particles colored by velocity magnitude
    let totSpeed = 0;
    for (let i=0;i<N;i++) {
      const x = xs[i], y = ys[i], z = zs[i];
      const r2 = x*x + y*y;
      const dx = (z - B)*x - D*y;
      const dy = D*x + (z - B)*y;
      const dz = C + A*z - (z*z*z)/3 - r2*(1 + E*z) + FF*z*x*x*x;
      const sp = Math.sqrt(dx*dx + dy*dy + dz*dz);
      totSpeed += sp;
      const t = Math.min(1, sp/8);
      const [px, py, zz] = project(x, y, z, ox, oy, scale);
      if (px<-20 || px>W+20 || py<-20 || py>H+20) continue;
      const [r, g, b] = turbo(t);
      const alpha = 0.65 + 0.35*Math.max(0, Math.min(1, (zz+2)/3));
      ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
      const sz = 0.7 + 1.6*Math.max(0, Math.min(1, (zz+2)/3));
      ctx.fillRect(px-sz/2, py-sz/2, sz, sz);
    }

    // Stats
    document.getElementById('sFr').textContent = frame;
    document.getElementById('sV').textContent = (totSpeed/N).toFixed(3);
    document.getElementById('sP').textContent = N;

    // Title overlay (dark gradient text)
    ctx.fillStyle = 'rgba(254,250,224,0.10)';
    ctx.font = '700 18px Lora, serif';
    ctx.textAlign = 'left';
    ctx.fillText('Aizawa attractor (turbo / speed)', 18, H - 18);

    camYaw += camSpeed;
  }

  function loop() {
    if (running) {
      // multiple substeps for stability and motion
      for (let s=0;s<2;s++) step();
    }
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iDt').addEventListener('input', e => {
    dt = +e.target.value; document.getElementById('vDt').textContent = dt.toFixed(4);
  });
  document.getElementById('iN').addEventListener('input', e => {
    N = +e.target.value; document.getElementById('vN').textContent = N; reset();
  });
  document.getElementById('iT').addEventListener('input', e => {
    fade = +e.target.value; document.getElementById('vT').textContent = fade.toFixed(3);
  });
  document.getElementById('iS').addEventListener('input', e => {
    camSpeed = +e.target.value; document.getElementById('vS').textContent = camSpeed.toFixed(3);
  });
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      mode = b.dataset.mode;
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
