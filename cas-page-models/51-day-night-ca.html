<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Day & Night CA — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .tag-abm {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.6rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag-abm">ABM ✦ 51</span>
  <h2>Day & Night CA</h2>
  <p>Born with 3, 6, 7, or 8 neighbors; survives with 3, 4, 6, 7, or 8. The rule is symmetric under inversion of states, producing balanced day/night patterns.</p>

  <div class="control"><label>Init density <span id="vD">0.50</span></label><input type="range" id="iD" min="0.10" max="0.90" step="0.01" value="0.50" /></div>
  <div class="control"><label>Steps/frame <span id="vS">1</span></label><input type="range" id="iS" min="1" max="6" step="1" value="1" /></div>

  <div class="btnrow">
    <button class="p" data-d="0.30">Sparse</button>
    <button class="p" data-d="0.50">Balanced</button>
    <button class="p" data-d="0.70">Dense</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Generation</span><span class="v" id="sGen">0</span></div>
  <div class="stat"><span>Living</span><span class="v" id="sLive">—</span></div>
  <div class="stat"><span>Dead</span><span class="v" id="sDead">—</span></div>
  <div class="stat"><span>Density</span><span class="v" id="sDen">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0;
  const dpr = Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener('resize', resize); resize();

  const N = 250;
  let grid, next, gen=0, running=true;
  let density = 0.50, stepsPerFrame = 1;
  // B3678 / S34678
  const B = [false,false,false,true,false,false,true,true,true];
  const S = [false,false,false,true,true,false,true,true,true];
  const off = document.createElement('canvas');
  off.width = N; off.height = N;
  const offCtx = off.getContext('2d');
  const img = offCtx.createImageData(N, N);

  function init(){
    grid = new Uint8Array(N*N);
    next = new Uint8Array(N*N);
    for (let i=0;i<N*N;i++) grid[i] = Math.random()<density ? 1 : 0;
    gen = 0;
  }

  function step(){
    for (let r=0;r<N;r++){
      const rm = (r-1+N)%N, rp = (r+1)%N;
      for (let c=0;c<N;c++){
        const cm = (c-1+N)%N, cp = (c+1)%N;
        let n = 0;
        n += grid[rm*N+cm]; n += grid[rm*N+c]; n += grid[rm*N+cp];
        n += grid[r*N+cm]; n += grid[r*N+cp];
        n += grid[rp*N+cm]; n += grid[rp*N+c]; n += grid[rp*N+cp];
        const me = grid[r*N+c];
        next[r*N+c] = me ? (S[n]?1:0) : (B[n]?1:0);
      }
    }
    [grid, next] = [next, grid];
    gen++;
  }

  // viridis-ish colormap
  function viridis(t){
    t = Math.max(0, Math.min(1, t));
    // approximate viridis: dark purple → blue → green → yellow
    const r = Math.round(255 * (0.27 - 0.4*t + 1.6*Math.pow(t,3)));
    const g = Math.round(255 * (0.0 + 0.95*Math.pow(t, 0.85)));
    const b = Math.round(255 * (0.34 + 0.55*(1-t) - 0.4*Math.pow(t,2)));
    return [Math.max(0,Math.min(255,r)), Math.max(0,Math.min(255,g)), Math.max(0,Math.min(255,b))];
  }

  function paint(){
    const data = img.data;
    let live = 0;
    // local density = count of living in 5x5 window
    for (let r=0;r<N;r++){
      for (let c=0;c<N;c++){
        const v = grid[r*N+c];
        let cnt = 0, tot = 0;
        for (let dr=-2; dr<=2; dr++){
          const rr = (r+dr+N)%N;
          for (let dc=-2; dc<=2; dc++){
            const cc = (c+dc+N)%N;
            cnt += grid[rr*N+cc]; tot++;
          }
        }
        const ld = cnt/tot;
        const j = (r*N+c)*4;
        if (v){
          live++;
          const col = viridis(0.25 + 0.75*ld);
          data[j]=col[0]; data[j+1]=col[1]; data[j+2]=col[2]; data[j+3]=255;
        } else {
          // dim viridis tail
          const col = viridis(ld*0.25);
          data[j]=Math.round(col[0]*0.45);
          data[j+1]=Math.round(col[1]*0.45);
          data[j+2]=Math.round(col[2]*0.45);
          data[j+3]=255;
        }
      }
    }
    offCtx.putImageData(img, 0, 0);
    return live;
  }

  function draw(){
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
    const sz = Math.min(W*0.78, H*0.94);
    const ox = (W*0.46 - sz/2);
    const oy = (H - sz)/2;
    ctx.drawImage(off, ox, oy, sz, sz);
    ctx.strokeStyle = 'rgba(232,121,249,0.55)';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'rgba(232,121,249,0.7)';
    ctx.shadowBlur = 14;
    ctx.strokeRect(ox-1, oy-1, sz+2, sz+2);
    ctx.shadowBlur = 0;
  }

  function loop(){
    if (running) for (let s=0;s<stepsPerFrame;s++) step();
    const live = paint();
    draw();
    document.getElementById('sGen').textContent = gen;
    document.getElementById('sLive').textContent = live;
    document.getElementById('sDead').textContent = N*N - live;
    document.getElementById('sDen').textContent = (live/(N*N)).toFixed(3);
    requestAnimationFrame(loop);
  }

  document.getElementById('iD').addEventListener('input', e=>{
    density = +e.target.value;
    document.getElementById('vD').textContent = density.toFixed(2);
  });
  document.getElementById('iS').addEventListener('input', e=>{
    stepsPerFrame = +e.target.value;
    document.getElementById('vS').textContent = stepsPerFrame;
  });
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click', ()=>{
      density = +b.dataset.d;
      document.getElementById('iD').value = density;
      document.getElementById('vD').textContent = density.toFixed(2);
      init();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', init);

  cv.addEventListener('pointerdown', e=>{
    const sz = Math.min(W*0.78, H*0.94);
    const ox = (W*0.46 - sz/2);
    const oy = (H - sz)/2;
    const rect = cv.getBoundingClientRect();
    const x = e.clientX - rect.left - ox;
    const y = e.clientY - rect.top - oy;
    const cx = Math.round(x/sz*N), cy = Math.round(y/sz*N);
    for (let dr=-4; dr<=4; dr++) for (let dc=-4; dc<=4; dc++){
      const rr = (cy+dr+N)%N, cc = (cx+dc+N)%N;
      grid[rr*N+cc] = Math.random()<0.5 ? 1 : 0;
    }
  });

  init(); loop();
})();
</script>
</body>
</html>
