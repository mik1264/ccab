<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Differential Evolution — CAS</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d;
    --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.2rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.7rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem;
    padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ NN</span>
  <h2>Differential Evolution</h2>
  <p>For each agent x_i, build trial = x_a + F·(x_b − x_c) (a,b,c distinct random peers). Crossover into x_i with probability CR. Greedy replace if trial fitness is better. Cluster spreads, then converges to optima.</p>

  <div class="control"><label>Mutation F <span id="vF">0.7</span></label><input type="range" id="iF" min="0.1" max="2.0" step="0.05" value="0.7" /></div>
  <div class="control"><label>Crossover CR <span id="vCR">0.85</span></label><input type="range" id="iCR" min="0.0" max="1.0" step="0.01" value="0.85" /></div>
  <div class="control"><label>Population <span id="vN">50</span></label><input type="range" id="iN" min="15" max="120" step="5" value="50" /></div>

  <div class="btnrow">
    <button class="p" data-fn="0">Rastrigin</button>
    <button class="p" data-fn="1">Himmelblau</button>
    <button class="p" data-fn="2">Ackley</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Iter</span><span class="v" id="sIt">0</span></div>
  <div class="stat"><span>Best fitness</span><span class="v" id="sBF">—</span></div>
  <div class="stat"><span>Best position</span><span class="v" id="sBP">—</span></div>
  <div class="stat"><span>Spread</span><span class="v" id="sD">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  let F = 0.7, CR = 0.85, N = 50;
  let fnIndex = 0; // 0 rastrigin, 1 himmelblau, 2 ackley
  let DMIN = -5.12, DMAX = 5.12;
  let pop = []; // {x, y, f, trail:[]}
  let best = null;
  let iter = 0, running = true;
  let convergence = [];

  function setFn(idx) {
    fnIndex = idx;
    if (idx===1) { DMIN=-5; DMAX=5; }
    else if (idx===2) { DMIN=-32.768; DMAX=32.768; }
    else { DMIN=-5.12; DMAX=5.12; }
    contourCache = null;
  }

  function fnEval(x, y) {
    if (fnIndex===0) {
      const A = 10;
      return 2*A + (x*x - A*Math.cos(2*Math.PI*x)) + (y*y - A*Math.cos(2*Math.PI*y));
    } else if (fnIndex===1) {
      // Himmelblau (4 minima at 0)
      return Math.pow(x*x + y - 11, 2) + Math.pow(x + y*y - 7, 2);
    } else {
      // Ackley
      const a = 20, b = 0.2, c = 2*Math.PI;
      return -a*Math.exp(-b*Math.sqrt(0.5*(x*x+y*y))) - Math.exp(0.5*(Math.cos(c*x)+Math.cos(c*y))) + a + Math.E;
    }
  }

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    contourCache = null;
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    pop = [];
    best = null;
    for (let i=0;i<N;i++) {
      const x = DMIN + Math.random()*(DMAX-DMIN);
      const y = DMIN + Math.random()*(DMAX-DMIN);
      const f = fnEval(x, y);
      pop.push({x, y, f, trail: []});
      if (!best || f<best.f) best = {x, y, f};
    }
    iter = 0;
    convergence = [];
  }

  function step() {
    for (let i=0;i<N;i++) {
      let a = i, b = i, c = i;
      while (a===i) a = (Math.random()*N)|0;
      while (b===i || b===a) b = (Math.random()*N)|0;
      while (c===i || c===a || c===b) c = (Math.random()*N)|0;
      const tx = pop[a].x + F*(pop[b].x - pop[c].x);
      const ty = pop[a].y + F*(pop[b].y - pop[c].y);
      // Reflect to bounds
      let trX = tx, trY = ty;
      if (trX<DMIN) trX = 2*DMIN - trX; if (trX>DMAX) trX = 2*DMAX - trX;
      if (trY<DMIN) trY = 2*DMIN - trY; if (trY>DMAX) trY = 2*DMAX - trY;
      trX = Math.max(DMIN, Math.min(DMAX, trX));
      trY = Math.max(DMIN, Math.min(DMAX, trY));
      // Binomial crossover
      const useX = Math.random() < CR || Math.random()<0.5;
      const useY = Math.random() < CR || !useX;
      const newX = useX ? trX : pop[i].x;
      const newY = useY ? trY : pop[i].y;
      const newF = fnEval(newX, newY);
      if (newF < pop[i].f) {
        pop[i].x = newX; pop[i].y = newY; pop[i].f = newF;
        if (newF < best.f) best = {x:newX, y:newY, f:newF};
      }
      pop[i].trail.push([pop[i].x, pop[i].y]);
      if (pop[i].trail.length > 30) pop[i].trail.shift();
    }
    iter++;
    convergence.push(best.f);
    if (convergence.length > 300) convergence.shift();
  }

  function viridis(t) {
    t = Math.max(0, Math.min(1, t));
    const r = Math.round(255 * (0.27 + 0.55*t - 0.15*t*t));
    const g = Math.round(255 * (0.0 + 1.05*t - 0.2*t*t));
    const b = Math.round(255 * (0.33 + 0.85*Math.sin((1-t)*Math.PI*0.85)));
    return [Math.min(255,Math.max(0,r)), Math.min(255,Math.max(0,g)), Math.min(255,Math.max(0,b))];
  }

  let contourCache = null, contourSize = 0;
  function buildContour() {
    const RES = 220;
    const off = document.createElement('canvas');
    off.width = RES; off.height = RES;
    const c2d = off.getContext('2d');
    const img = c2d.createImageData(RES, RES);
    let mn = Infinity, mx = -Infinity;
    const buf = new Float32Array(RES*RES);
    for (let j=0;j<RES;j++) for (let i=0;i<RES;i++) {
      const x = DMIN + (i/(RES-1))*(DMAX-DMIN);
      const y = DMIN + (j/(RES-1))*(DMAX-DMIN);
      const v = fnEval(x,y);
      buf[j*RES+i] = v;
      if (v<mn) mn=v; if (v>mx) mx=v;
    }
    for (let k=0;k<RES*RES;k++) {
      const t = (buf[k]-mn)/(mx-mn);
      const tt = Math.pow(t, 0.55);
      const c = viridis(tt);
      img.data[k*4] = c[0]*0.7;
      img.data[k*4+1] = c[1]*0.7;
      img.data[k*4+2] = c[2]*0.75;
      img.data[k*4+3] = 255;
    }
    c2d.putImageData(img, 0, 0);
    return off;
  }

  function transform(x, y, ox, oy, size) {
    const px = ox + (x - DMIN)/(DMAX-DMIN) * size;
    const py = oy + (1 - (y - DMIN)/(DMAX-DMIN)) * size;
    return [px, py];
  }

  function render() {
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);

    const size = Math.min(W - 380, H - 60, 720);
    const ox = (W - size)/2 - 100;
    const oy = (H - size)/2;

    if (!contourCache || contourSize !== size) {
      contourCache = buildContour();
      contourSize = size;
    }
    ctx.drawImage(contourCache, ox, oy, size, size);

    ctx.strokeStyle = 'rgba(232,121,249,0.5)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(ox, oy, size, size);

    ctx.fillStyle = 'rgba(254,250,224,0.85)';
    ctx.font = '600 16px Lora, serif';
    ctx.textAlign = 'left';
    const fnName = ['Rastrigin','Himmelblau','Ackley'][fnIndex];
    ctx.fillText(`${fnName} contour`, ox, oy - 14);

    // Trails
    for (const p of pop) {
      if (p.trail.length<2) continue;
      ctx.lineWidth = 1.2;
      for (let k=1;k<p.trail.length;k++) {
        const a = p.trail[k-1], b = p.trail[k];
        const [ax,ay] = transform(a[0], a[1], ox, oy, size);
        const [bx,by] = transform(b[0], b[1], ox, oy, size);
        ctx.strokeStyle = `rgba(232,121,249,${(k/p.trail.length)*0.6})`;
        ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
      }
    }

    // Particles
    for (const p of pop) {
      const [px, py] = transform(p.x, p.y, ox, oy, size);
      ctx.shadowColor = '#e879f9';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#e879f9';
      ctx.beginPath(); ctx.arc(px, py, 3.2, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Best
    const [bgx, bgy] = transform(best.x, best.y, ox, oy, size);
    ctx.strokeStyle = '#06b6d4';
    ctx.shadowColor = '#06b6d4'; ctx.shadowBlur = 18;
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(bgx, bgy, 9, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;

    // Convergence inset
    const cw = 220, ch = 110;
    const cx = ox + size - cw - 12, cy = oy + 12;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(cx, cy, cw, ch);
    ctx.strokeStyle = 'rgba(232,121,249,0.4)';
    ctx.strokeRect(cx, cy, cw, ch);
    ctx.fillStyle = 'rgba(254,250,224,0.85)';
    ctx.font = '600 11px Nunito';
    ctx.textAlign = 'left';
    ctx.fillText('Convergence (log)', cx+8, cy+14);

    if (convergence.length>1) {
      let mn = Infinity, mx = -Infinity;
      const lc = convergence.map(v => Math.log(Math.max(0.0001, v) + 0.001));
      for (const v of lc) { if (v<mn) mn=v; if (v>mx) mx=v; }
      const range = Math.max(0.001, mx-mn);
      ctx.strokeStyle = '#06b6d4';
      ctx.shadowColor = '#06b6d4'; ctx.shadowBlur = 8;
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      for (let i=0;i<lc.length;i++) {
        const x = cx + 8 + i*(cw-16)/Math.max(1, lc.length-1);
        const y = cy + ch - 8 - ((lc[i]-mn)/range)*(ch-22);
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Stats
    let cmx=0, cmy=0;
    for (const p of pop) { cmx += p.x; cmy += p.y; }
    cmx /= N; cmy /= N;
    let dv = 0;
    for (const p of pop) {
      const dx = p.x-cmx, dy = p.y-cmy;
      dv += dx*dx + dy*dy;
    }
    const spread = Math.sqrt(dv/N);

    document.getElementById('sIt').textContent = iter;
    document.getElementById('sBF').textContent = best.f.toExponential(2);
    document.getElementById('sBP').textContent = `(${best.x.toFixed(2)}, ${best.y.toFixed(2)})`;
    document.getElementById('sD').textContent = spread.toFixed(3);
  }

  function loop() {
    if (running) step();
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iF').addEventListener('input', e => {
    F = +e.target.value; document.getElementById('vF').textContent = F.toFixed(2);
  });
  document.getElementById('iCR').addEventListener('input', e => {
    CR = +e.target.value; document.getElementById('vCR').textContent = CR.toFixed(2);
  });
  document.getElementById('iN').addEventListener('input', e => {
    N = +e.target.value; document.getElementById('vN').textContent = N; reset();
  });
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      setFn(+b.dataset.fn); reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  setFn(0);
  reset(); loop();
})();
</script>
</body>
</html>
