<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SEIR Epidemic — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend {
    display:flex; gap:0.8rem; font-size:0.8rem; margin-top:0.5rem; flex-wrap:wrap;
  }
  .legend span::before {
    content:''; display:inline-block; width:10px; height:10px;
    border-radius:3px; margin-right:5px; vertical-align: middle;
  }
  .legend .s::before { background: var(--sage); }
  .legend .e::before { background: #f0c674; }
  .legend .i::before { background: var(--terracotta); }
  .legend .r::before { background: var(--earth); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 24</span>
  <h2>SEIR Epidemic</h2>
  <p>SEIR adds an Exposed (latent) compartment: dS/dt=−βSI/N, dE/dt=βSI/N−σE, dI/dt=σE−γI, dR/dt=γI. 1/σ is incubation time, 1/γ is infectious time.</p>

  <div class="control"><label>β contact <span id="vb">0.60</span></label><input type="range" id="ib" min="0.05" max="2" step="0.01" value="0.60" /></div>
  <div class="control"><label>σ incubation rate <span id="vs">0.20</span></label><input type="range" id="is" min="0.02" max="1" step="0.01" value="0.20" /></div>
  <div class="control"><label>γ recovery rate <span id="vg">0.10</span></label><input type="range" id="ig" min="0.02" max="1" step="0.01" value="0.10" /></div>
  <div class="control"><label>I₀ initial infected <span id="vi">5</span></label><input type="range" id="ii" min="1" max="200" step="1" value="5" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>R₀=β/γ</span><span class="v" id="sr0">—</span></div>
  <div class="stat"><span>S</span><span class="v" id="sS">—</span></div>
  <div class="stat"><span>E</span><span class="v" id="sE">—</span></div>
  <div class="stat"><span>I</span><span class="v" id="sI">—</span></div>
  <div class="stat"><span>R</span><span class="v" id="sR">—</span></div>
  <div class="legend"><span class="s">S</span><span class="e">E</span><span class="i">I</span><span class="r">R</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize',resize); resize();

  const C_S='#8A9A5B', C_E='#f0c674', C_I='#BC6C25', C_R='#DDA15E', GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  const N=10000;
  let beta=0.60, sigma=0.20, gamma=0.10, I0=5;
  let S=N-I0, E=0, I=I0, R=0, t=0, running=true;
  const series=[]; const MAX=1500;

  function reset(){ S=N-I0; E=0; I=I0; R=0; t=0; series.length=0; }

  function rk4(dt){
    const f=(S,E,I,R)=>{
      const inf=beta*S*I/N;
      return [-inf, inf-sigma*E, sigma*E-gamma*I, gamma*I];
    };
    const k1=f(S,E,I,R);
    const k2=f(S+dt/2*k1[0],E+dt/2*k1[1],I+dt/2*k1[2],R+dt/2*k1[3]);
    const k3=f(S+dt/2*k2[0],E+dt/2*k2[1],I+dt/2*k2[2],R+dt/2*k2[3]);
    const k4=f(S+dt*k3[0],E+dt*k3[1],I+dt*k3[2],R+dt*k3[3]);
    S+=dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    E+=dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    I+=dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
    R+=dt/6*(k1[3]+2*k2[3]+2*k3[3]+k4[3]);
    if(S<0)S=0; if(E<0)E=0; if(I<0)I=0; if(R<0)R=0;
    t+=dt;
  }

  function tick(){
    const dt=0.1;
    for(let i=0;i<2;i++) rk4(dt);
    series.push({t,S,E,I,R});
    if(series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sr0').textContent=(beta/gamma).toFixed(2);
    document.getElementById('sS').textContent=S.toFixed(0);
    document.getElementById('sE').textContent=E.toFixed(0);
    document.getElementById('sI').textContent=I.toFixed(0);
    document.getElementById('sR').textContent=R.toFixed(0);
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if(series.length<2) return;
    const padL=70, padR=360, padT=60, padB=60;
    const totW=W-padL-padR, totH=H-padT-padB;
    const t0=series[0].t, t1=series[series.length-1].t;
    const tspan=Math.max(t1-t0,1);

    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for(let i=0;i<=5;i++){
      const yp=padT+i*totH/5;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
    }
    ctx.strokeStyle=AXIS;
    ctx.beginPath(); ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+totH); ctx.lineTo(padL+totW,padT+totH); ctx.stroke();

    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='12px Nunito';
    ctx.fillText('SEIR compartments vs time', padL, padT-15);
    ctx.fillText(N.toFixed(0), padL-55, padT+5);
    ctx.fillText('0', padL-15, padT+totH);
    ctx.fillText('t='+t1.toFixed(0), padL+totW-50, padT+totH+18);

    function plot(key,color){
      ctx.strokeStyle=color; ctx.lineWidth=2.2; ctx.beginPath();
      for(let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.t-t0)/tspan*totW;
        const py=padT+totH-s[key]/N*totH;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    plot('S',C_S); plot('E',C_E); plot('I',C_I); plot('R',C_R);
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=dec===0?v.toFixed(0):v.toFixed(dec);
      fn(v);
    });
  }
  bind('ib','vb',v=>beta=v);
  bind('is','vs',v=>sigma=v);
  bind('ig','vg',v=>gamma=v);
  bind('ii','vi',v=>{I0=v; reset();},0);
  document.getElementById('bRun').addEventListener('click',e=>{running=!running; e.target.textContent=running?'Pause':'Resume';});
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
