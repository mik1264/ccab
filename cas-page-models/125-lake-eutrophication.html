<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lake Eutrophication — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12); border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; background: linear-gradient(90deg, var(--earth), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600; background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream); border:none; border-radius:9px; cursor:pointer; transition:all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Lake Eutrophication</h2>
  <p>Phosphorus stock P with sigmoidal sediment recycling: dP/dt = L − sP + r·P^q/(P^q+m^q). Two stable states: clear (low P) and turbid (high P). Restoration shows hysteresis.</p>

  <div class="control"><label>Loading L <span id="vL">0.30</span></label><input type="range" id="iL" min="0" max="1.5" step="0.005" value="0.30" /></div>
  <div class="control"><label>Sed loss s <span id="vS">0.52</span></label><input type="range" id="iS" min="0.1" max="1.5" step="0.01" value="0.52" /></div>
  <div class="control"><label>Recycle r <span id="vR">1.0</span></label><input type="range" id="iR" min="0" max="2.5" step="0.01" value="1.0" /></div>
  <div class="control"><label>Half-sat m <span id="vM">1.0</span></label><input type="range" id="iM" min="0.2" max="3" step="0.01" value="1.0" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="0.20,0.52,1.0,1.0">Clear</button>
    <button class="p" data-p="0.80,0.52,1.0,1.0">Turbid</button>
    <button class="p" data-p="0.30,0.52,1.0,1.0,3.0">Tip-up</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-sweep="1">Sweep L ↑</button>
    <button class="p" data-sweep="-1">Sweep L ↓</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>P</span><span class="v" id="sP">—</span></div>
  <div class="stat"><span>State</span><span class="v" id="sR">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  let L=0.30, sLoss=0.52, r=1.0, m=1.0;
  const q=8;
  let P=0.1, t=0, running=true;
  const series=[]; const MAX=1500;
  const hyst=[];
  let sweep=0;

  function dPdt(P){
    const Pq=Math.pow(P,q), mq=Math.pow(m,q);
    return L - sLoss*P + r*Pq/(Pq+mq);
  }
  function reset(P0){ P = (P0!==undefined)?P0:0.1; t=0; series.length=0; hyst.length=0; sweep=0; }
  function rk4(dt){
    const k1=dPdt(P), k2=dPdt(P+dt/2*k1), k3=dPdt(P+dt/2*k2), k4=dPdt(P+dt*k3);
    P += dt/6*(k1+2*k2+2*k3+k4);
    if (P<0) P=0;
    t += dt;
  }
  function tick(){
    const dt=0.1;
    for (let i=0;i<3;i++) rk4(dt);
    if (sweep!==0) {
      L += sweep*0.0008;
      if (L<0) L=0; if (L>1.5) L=1.5;
      document.getElementById('iL').value=L;
      document.getElementById('vL').textContent=L.toFixed(3);
      hyst.push({L,P});
      if (hyst.length>3000) hyst.shift();
    }
    series.push({t,P,L});
    if (series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sP').textContent=P.toFixed(3);
    document.getElementById('sR').textContent = P<0.6?'clear':P>1.5?'turbid':'transition';
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=360, padT=50, padB=40;
    const totW=W-padL-padR;
    const halfH = (H-padT-padB-50)/2;

    // Top: time series
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Phosphorus stock P(t)', padL, padT-12);
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++){const yp=padT+i*halfH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    ctx.fillStyle='rgba(254,250,224,0.4)'; ctx.font='10px Nunito';
    ctx.fillText('3.0', padL-28, padT+5); ctx.fillText('0', padL-12, padT+halfH);
    if (series.length>1){
      const t0=series[0].t, t1=series[series.length-1].t, ts=Math.max(t1-t0,1);
      const Pmax=3;
      ctx.strokeStyle='#06b6d4'; ctx.lineWidth=2.2; ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.t-t0)/ts*totW;
        const py=padT+halfH-Math.min(s.P,Pmax)/Pmax*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }

    // Bottom: bifurcation diagram L vs P*
    const bY = padT + halfH + 50;
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Bifurcation: equilibrium P* vs loading L', padL, bY-12);
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++){const yp=bY+i*halfH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    const Lmin=0, Lmax=1.5, Pmin=0, Pmax=3;
    ctx.fillStyle='rgba(254,250,224,0.4)'; ctx.font='10px Nunito';
    ctx.fillText('P*=3', padL-30, bY+5);
    ctx.fillText('P*=0', padL-30, bY+halfH);
    ctx.fillText('L=0', padL, bY+halfH+18);
    ctx.fillText('L=1.5', padL+totW-30, bY+halfH+18);

    // Sample equilibria via Newton
    const Lsave=L;
    for (let s=Lmin; s<=Lmax; s+=0.005){
      L=s;
      for (const seed of [0.1, 1.0, 2.5]){
        let Pk=seed;
        for (let it=0;it<60;it++){
          const f=dPdt(Pk);
          const eps=1e-3;
          const fp=(dPdt(Pk+eps)-dPdt(Pk-eps))/(2*eps);
          if (Math.abs(fp)<1e-10) break;
          const Pn=Pk-f/fp;
          if (Math.abs(Pn-Pk)<1e-5) { Pk=Pn; break; }
          Pk=Math.max(0,Math.min(4,Pn));
        }
        if (Math.abs(dPdt(Pk))<1e-5){
          const eps=1e-3;
          const fp=(dPdt(Pk+eps)-dPdt(Pk-eps))/(2*eps);
          const stable=fp<0;
          const px=padL+(s-Lmin)/(Lmax-Lmin)*totW;
          const py=bY+halfH-(Pk-Pmin)/(Pmax-Pmin)*halfH;
          ctx.fillStyle = stable?'#06b6d4':'rgba(232,121,249,0.5)';
          ctx.fillRect(px-1,py-1,2,2);
        }
      }
    }
    L=Lsave;

    // Hysteresis trajectory
    if (hyst.length>1){
      ctx.strokeStyle='rgba(251,146,60,0.7)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      for (let i=0;i<hyst.length;i++){
        const h=hyst[i];
        const px=padL+(h.L-Lmin)/(Lmax-Lmin)*totW;
        const py=bY+halfH-(h.P-Pmin)/(Pmax-Pmin)*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    // Current
    const px=padL+(L-Lmin)/(Lmax-Lmin)*totW;
    const py=bY+halfH-(P-Pmin)/(Pmax-Pmin)*halfH;
    ctx.fillStyle='#fb923c';
    ctx.beginPath(); ctx.arc(px,py,7,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(254,250,224,0.6)'; ctx.lineWidth=1.5; ctx.stroke();

    // legend
    ctx.font='11px Nunito';
    ctx.fillStyle='#06b6d4'; ctx.fillText('● stable', padL+totW-200, bY+12);
    ctx.fillStyle='rgba(232,121,249,0.8)'; ctx.fillText('● unstable', padL+totW-130, bY+12);
    ctx.fillStyle='#fb923c'; ctx.fillText('● now', padL+totW-50, bY+12);
  }

  function loop(){ if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,prop,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      if (prop==='L') L=v; if (prop==='S') sLoss=v; if (prop==='R') r=v; if (prop==='M') m=v;
    });
  }
  bind('iL','vL','L',3); bind('iS','vS','S'); bind('iR','vR','R'); bind('iM','vM','M');
  document.querySelectorAll('.p[data-p]').forEach(b=>{
    b.addEventListener('click',()=>{
      const parts=b.dataset.p.split(',').map(Number);
      L=parts[0]; sLoss=parts[1]; r=parts[2]; m=parts[3];
      document.getElementById('iL').value=L; document.getElementById('vL').textContent=L.toFixed(3);
      document.getElementById('iS').value=sLoss; document.getElementById('vS').textContent=sLoss.toFixed(2);
      document.getElementById('iR').value=r; document.getElementById('vR').textContent=r.toFixed(2);
      document.getElementById('iM').value=m; document.getElementById('vM').textContent=m.toFixed(2);
      reset(parts[4]!==undefined?parts[4]:0.1);
    });
  });
  document.querySelectorAll('.p[data-sweep]').forEach(b=>{
    b.addEventListener('click',()=>{ sweep=+b.dataset.sweep; });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', ()=>reset(0.1));
  reset(0.1); loop();
})();
</script>
</body>
</html>
