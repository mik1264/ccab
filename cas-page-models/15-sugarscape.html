<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sugarscape — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423; --bg:#0e1218; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(20,28,38,0.78); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border:1px solid rgba(254,250,224,0.15); border-radius:18px; padding:1.1rem 1.2rem; color: var(--cream); max-height: calc(100vh - 36px); overflow-y:auto; }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: var(--sage); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.9rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--sage); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.5rem 0.6rem; font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600; background: var(--sage); color:var(--cream); border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
  button:hover { background: var(--moss); transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  button.secondary:hover { background: rgba(254,250,224,0.25); }
  .stat { display:flex; justify-content:space-between; font-size:0.8rem; padding: 0.25rem 0; border-bottom: 1px dashed rgba(254,250,224,0.1); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM · 15</span>
  <h2>Sugarscape</h2>
  <p>Epstein and Axtell's classic. Sugar grows in two mountains; agents with vision V move to the richest cell they can see, eat, and pay metabolism M each tick. Inequality emerges from heterogeneous endowments.</p>

  <div class="control">
    <label>Grid size <span id="vN">60</span></label>
    <input type="range" id="iN" min="30" max="100" step="5" value="60" />
  </div>
  <div class="control">
    <label>Initial agents <span id="vA">300</span></label>
    <input type="range" id="iA" min="50" max="800" step="25" value="300" />
  </div>
  <div class="control">
    <label>Regrowth rate <span id="vR">1</span></label>
    <input type="range" id="iR" min="0" max="3" step="1" value="1" />
  </div>
  <div class="control">
    <label>Max metabolism <span id="vM">3</span></label>
    <input type="range" id="iM" min="1" max="6" step="1" value="3" />
  </div>
  <div class="control">
    <label>Max vision <span id="vV">5</span></label>
    <input type="range" id="iV" min="1" max="10" step="1" value="5" />
  </div>

  <div class="btnrow" style="margin-bottom:0.9rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Step</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Population</span><span class="v" id="sPop">—</span></div>
  <div class="stat"><span>Mean wealth</span><span class="v" id="sW">—</span></div>
  <div class="stat"><span>Gini</span><span class="v" id="sG">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0, dpr = Math.min(window.devicePixelRatio||1, 2);
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  let N=60, A0=300, regrow=1, maxM=3, maxV=5;
  const SUGAR_MAX = 6;
  let capacity, sugar, agents, occ, step=0, running=true;

  function buildCapacity() {
    capacity = new Uint8Array(N*N);
    sugar = new Uint8Array(N*N);
    const m1x=N*0.3, m1y=N*0.3, m2x=N*0.7, m2y=N*0.7;
    const sigma = N*0.18;
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      const d1 = Math.exp(-((r-m1y)**2+(c-m1x)**2)/(2*sigma*sigma));
      const d2 = Math.exp(-((r-m2y)**2+(c-m2x)**2)/(2*sigma*sigma));
      const v = Math.floor(SUGAR_MAX*Math.min(1, d1+d2));
      capacity[r*N+c] = v;
      sugar[r*N+c] = v;
    }
  }

  function init() {
    N = +document.getElementById('iN').value;
    A0 = +document.getElementById('iA').value;
    regrow = +document.getElementById('iR').value;
    maxM = +document.getElementById('iM').value;
    maxV = +document.getElementById('iV').value;
    buildCapacity();
    occ = new Int32Array(N*N); occ.fill(-1);
    agents = [];
    let placed=0; let safety=0;
    while (placed<A0 && safety<A0*10) {
      safety++;
      const r = (Math.random()*N)|0, c = (Math.random()*N)|0;
      if (occ[r*N+c]!==-1) continue;
      const ag = {
        r, c,
        v: 1+((Math.random()*maxV)|0),
        m: 1+((Math.random()*maxM)|0),
        sugar: 5 + ((Math.random()*20)|0)
      };
      agents.push(ag); occ[r*N+c] = agents.length-1;
      placed++;
    }
    step=0;
    document.getElementById('vN').textContent = N;
    document.getElementById('vA').textContent = A0;
    document.getElementById('vR').textContent = regrow;
    document.getElementById('vM').textContent = maxM;
    document.getElementById('vV').textContent = maxV;
  }

  function tick() {
    // shuffle agent order
    const order = agents.map((_,i)=>i);
    for (let k=order.length-1;k>0;k--) { const j=(Math.random()*(k+1))|0; [order[k],order[j]]=[order[j],order[k]]; }
    for (const idx of order) {
      const a = agents[idx]; if (!a) continue;
      // search von Neumann within v
      let bestS = sugar[a.r*N+a.c], bestR=a.r, bestC=a.c, bestD=0;
      for (let dr=-a.v; dr<=a.v; dr++) {
        const rr = a.r+dr; if (rr<0||rr>=N) continue;
        const k = a.r*N+a.c;
        const idx2 = rr*N+a.c;
        if (idx2!==k && occ[idx2]===-1) {
          const s = sugar[idx2];
          if (s>bestS || (s===bestS && Math.abs(dr)<bestD)) { bestS=s; bestR=rr; bestC=a.c; bestD=Math.abs(dr); }
        }
      }
      for (let dc=-a.v; dc<=a.v; dc++) {
        const cc = a.c+dc; if (cc<0||cc>=N) continue;
        const idx2 = a.r*N+cc;
        const k = a.r*N+a.c;
        if (idx2!==k && occ[idx2]===-1) {
          const s = sugar[idx2];
          if (s>bestS || (s===bestS && Math.abs(dc)<bestD)) { bestS=s; bestR=a.r; bestC=cc; bestD=Math.abs(dc); }
        }
      }
      if (bestR!==a.r || bestC!==a.c) {
        occ[a.r*N+a.c] = -1;
        a.r = bestR; a.c = bestC;
        occ[a.r*N+a.c] = idx;
      }
      a.sugar += sugar[a.r*N+a.c];
      sugar[a.r*N+a.c] = 0;
      a.sugar -= a.m;
    }
    // remove dead, then random respawns
    const live=[]; for (let i=0;i<agents.length;i++) {
      const a = agents[i]; if (!a) continue;
      if (a.sugar<=0) { occ[a.r*N+a.c] = -1; }
      else live.push(a);
    }
    agents = live;
    occ.fill(-1);
    for (let i=0;i<agents.length;i++) occ[agents[i].r*N+agents[i].c] = i;
    // small random respawn to keep dynamics
    let respawn = 1 + ((Math.random()*3)|0);
    for (let k=0;k<respawn;k++) {
      const r=(Math.random()*N)|0, c=(Math.random()*N)|0;
      if (occ[r*N+c]===-1) {
        const ag = { r, c, v:1+((Math.random()*maxV)|0), m:1+((Math.random()*maxM)|0), sugar:5+((Math.random()*15)|0) };
        agents.push(ag); occ[r*N+c] = agents.length-1;
      }
    }
    // sugar regrowth
    for (let i=0;i<N*N;i++) {
      if (sugar[i] < capacity[i]) sugar[i] = Math.min(capacity[i], sugar[i]+regrow);
    }
    step++;
    // stats
    let sw=0; const wealths = agents.map(a=>a.sugar);
    for (const w of wealths) sw+=w;
    wealths.sort((a,b)=>a-b);
    let cum=0, gini=0;
    for (let i=0;i<wealths.length;i++) cum += wealths[i];
    if (cum>0 && wealths.length>0) {
      let s=0;
      for (let i=0;i<wealths.length;i++) s += (i+1)*wealths[i];
      gini = (2*s)/(wealths.length*cum) - (wealths.length+1)/wealths.length;
    }
    document.getElementById('sStep').textContent = step;
    document.getElementById('sPop').textContent = agents.length;
    document.getElementById('sW').textContent = agents.length>0 ? (sw/agents.length).toFixed(1) : '—';
    document.getElementById('sG').textContent = gini.toFixed(3);
  }

  function draw() {
    ctx.fillStyle = '#0e1218';
    ctx.fillRect(0,0,W,H);
    const cell = Math.min(W,H)/N;
    const ox = (W - cell*N)/2, oy = (H - cell*N)/2;
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      const s = sugar[r*N+c];
      const t = s/SUGAR_MAX;
      const R = Math.floor(20 + 200*t);
      const G = Math.floor(28 + 130*t);
      const B = Math.floor(30 + 30*t);
      ctx.fillStyle = `rgb(${R},${G},${B})`;
      ctx.fillRect(ox+c*cell, oy+r*cell, cell+0.5, cell+0.5);
    }
    ctx.fillStyle = '#FEFAE0';
    for (const a of agents) {
      ctx.fillRect(ox+a.c*cell+cell*0.15, oy+a.r*cell+cell*0.15, cell*0.7, cell*0.7);
    }
  }

  function loop() {
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  ['iN','iA','iR','iM','iV'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
      const m = {iN:'vN',iA:'vA',iR:'vR',iM:'vM',iV:'vV'};
      document.getElementById(m[id]).textContent = e.target.value;
      if (id==='iR') regrow=+e.target.value;
      else init();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => { running=!running; e.target.textContent = running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', init);

  init(); loop();
})();
</script>
</body>
</html>
