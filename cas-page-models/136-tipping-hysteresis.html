<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tipping & Hysteresis — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 136</span>
  <h2>Tipping & Hysteresis</h2>
  <p>Generic fold bifurcation: dS/dt = −S³ + S + F. For F in (−2/3√3, +2/3√3) two stable states coexist. Sweep F up then down; the stock S jumps at one fold but resets at the other — path-dependence.</p>

  <div class="control"><label>Forcing F <span id="vF">0.00</span></label><input type="range" id="iF" min="-1.0" max="1.0" step="0.001" value="0.00" /></div>
  <div class="control"><label>Sweep speed <span id="vSp">0.0035</span></label><input type="range" id="iSp" min="0" max="0.02" step="0.0005" value="0.0035" /></div>
  <div class="control"><label>Noise σ <span id="vN">0.02</span></label><input type="range" id="iN" min="0" max="0.2" step="0.001" value="0.02" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-mode="sweep">Slow sweep</button>
    <button class="p" data-mode="quench">Quench</button>
    <button class="p" data-mode="manual">Manual F</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>State S</span><span class="v" id="sS">—</span></div>
  <div class="stat"><span>Forcing F</span><span class="v" id="sF">—</span></div>
  <div class="stat"><span>Branch</span><span class="v" id="sB">—</span></div>
  <div class="stat"><span>Sweep dir</span><span class="v" id="sD">↑</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize); resize();

  // Cubic fold: dS/dt = -S^3 + S + F
  let S = -1.0, F = -0.8;
  let sweepSpeed = 0.0035, noise = 0.02, dir = 1;
  let mode = 'sweep'; // sweep | quench | manual
  let t = 0, running = true;
  const series = [];
  const trail = []; // S vs F
  const MAX = 4000;
  const FOLD = 2/Math.sqrt(27); // ≈0.3849

  function reset() {
    S = -1.0; F = -0.8; dir = 1; t = 0;
    series.length = 0; trail.length = 0;
  }

  function deriv(S, F) { return -S*S*S + S + F; }
  function rk4(dt) {
    const k1 = deriv(S, F);
    const k2 = deriv(S + dt/2*k1, F);
    const k3 = deriv(S + dt/2*k2, F);
    const k4 = deriv(S + dt*k3, F);
    S += dt/6*(k1 + 2*k2 + 2*k3 + k4);
    if (noise>0) S += noise*Math.sqrt(dt)*(Math.random()*2-1)*0.7;
    t += dt;
  }

  function tick() {
    const dt = 0.05;
    for (let i=0;i<3;i++) rk4(dt);
    if (mode === 'sweep') {
      F += sweepSpeed * dir * dt * 3;
      if (F >= 1.0) { dir = -1; }
      if (F <= -1.0) { dir = 1; }
    } else if (mode === 'quench') {
      // Hold then drop quickly across the fold
      if (t < 50) F = -0.5; else if (t < 80) F = 0.45; else if (t < 130) F = 0.45; else if (t < 160) F = -0.1; else if (t < 220) F = -0.1; else F = 0.4;
    }
    series.push({t, S, F});
    trail.push({S, F});
    if (series.length > MAX) series.shift();
    if (trail.length > MAX) trail.shift();
    document.getElementById('st').textContent = t.toFixed(1);
    document.getElementById('sS').textContent = S.toFixed(3);
    document.getElementById('sF').textContent = F.toFixed(3);
    let branch = 'middle (unstable)';
    if (S > 0.4) branch = 'upper';
    else if (S < -0.4) branch = 'lower';
    document.getElementById('sB').textContent = branch;
    document.getElementById('sD').textContent = dir>0 ? '↑ rising' : '↓ falling';
  }

  function draw() {
    ctx.fillStyle = '#06080d'; ctx.fillRect(0,0,W,H);
    if (series.length<2) return;

    const padL=80, padR=370, padT=70, padB=60;
    const totW = W - padL - padR;
    const sH = (H - padT - padB - 60);
    const tsH = sH * 0.42;
    const bfH = sH * 0.50;
    const bfY0 = padT + tsH + 60;

    const t1 = series[series.length-1].t;
    const tspan = Math.max(t1, 60);

    // === Top: time series of S and F ===
    ctx.fillStyle = 'rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('State S(t) and forcing F(t) — slow sweep induces sudden jumps', padL, padT-12);

    ctx.strokeStyle = 'rgba(254,250,224,0.07)';
    for (let i=0;i<=4;i++) {
      const yp = padT + i*tsH/4;
      ctx.beginPath(); ctx.moveTo(padL, yp); ctx.lineTo(padL+totW, yp); ctx.stroke();
    }
    // 0 line
    const cy = padT + tsH/2;
    ctx.strokeStyle = 'rgba(254,250,224,0.18)';
    ctx.beginPath(); ctx.moveTo(padL, cy); ctx.lineTo(padL+totW, cy); ctx.stroke();
    ctx.strokeStyle = 'rgba(254,250,224,0.4)';
    ctx.beginPath();
    ctx.moveTo(padL, padT); ctx.lineTo(padL, padT+tsH); ctx.lineTo(padL+totW, padT+tsH); ctx.stroke();

    ctx.fillStyle = 'rgba(254,250,224,0.55)'; ctx.font='10px Nunito';
    ctx.fillText('+1.5', padL-30, padT+5);
    ctx.fillText('0', padL-15, cy+4);
    ctx.fillText('−1.5', padL-30, padT+tsH);

    const VMAX = 1.5;
    // S
    ctx.strokeStyle = '#e879f9'; ctx.lineWidth = 2.2;
    ctx.shadowBlur = 6; ctx.shadowColor = '#e879f9';
    ctx.beginPath();
    for (let i=0;i<series.length;i++) {
      const s = series[i];
      const px = padL + s.t/tspan*totW;
      const py = padT + tsH/2 - s.S/VMAX*tsH/2;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke(); ctx.shadowBlur = 0;

    // F
    ctx.strokeStyle = '#06b6d4'; ctx.lineWidth = 1.6;
    ctx.setLineDash([4,3]);
    ctx.beginPath();
    for (let i=0;i<series.length;i++) {
      const s = series[i];
      const px = padL + s.t/tspan*totW;
      const py = padT + tsH/2 - s.F/VMAX*tsH/2;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke(); ctx.setLineDash([]);

    ctx.fillStyle='#e879f9'; ctx.font='11px Nunito';
    ctx.fillRect(padL+12, padT+12, 14, 3);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.fillText('State S', padL+30, padT+16);
    ctx.fillStyle='#06b6d4';
    ctx.fillRect(padL+90, padT+12, 14, 3);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.fillText('Forcing F', padL+108, padT+16);

    // === Bottom: Bifurcation diagram with hysteresis loop ===
    ctx.fillStyle = 'rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('Bifurcation diagram — equilibrium S* vs F (path traced in pink)', padL, bfY0-12);

    const fMin = -1.2, fMax = 1.2, sMin = -1.6, sMax = 1.6;
    function bX(f) { return padL + (f - fMin)/(fMax-fMin)*totW; }
    function bY(s) { return bfY0 + bfH - (s - sMin)/(sMax-sMin)*bfH; }

    // box
    ctx.strokeStyle = 'rgba(254,250,224,0.4)';
    ctx.strokeRect(padL, bfY0, totW, bfH);

    // grid
    ctx.strokeStyle = 'rgba(254,250,224,0.07)'; ctx.setLineDash([2,4]);
    for (let f=-1; f<=1; f+=0.5) {
      ctx.beginPath(); ctx.moveTo(bX(f), bfY0); ctx.lineTo(bX(f), bfY0+bfH); ctx.stroke();
    }
    for (let s=-1.5; s<=1.5; s+=0.5) {
      ctx.beginPath(); ctx.moveTo(padL, bY(s)); ctx.lineTo(padL+totW, bY(s)); ctx.stroke();
    }
    ctx.setLineDash([]);

    // axes
    ctx.fillStyle = 'rgba(254,250,224,0.55)'; ctx.font = '10px Nunito';
    ctx.fillText('F=−1', bX(-1)-12, bfY0+bfH+14);
    ctx.fillText('0', bX(0)-3, bfY0+bfH+14);
    ctx.fillText('+1', bX(1)-8, bfY0+bfH+14);
    ctx.fillText('S=+1.5', padL-50, bY(1.5)+4);
    ctx.fillText('−1.5', padL-30, bY(-1.5)+4);

    // Equilibria branches:
    // Solve -S^3 + S + F = 0 → S^3 - S = F.  For each F we sample.
    // Stable upper, stable lower, unstable middle.
    const branchUp=[], branchLow=[], branchMid=[];
    for (let f=-1.2; f<=1.2; f+=0.005) {
      // Roots of S^3 - S - f = 0
      // Cardano
      const a=1, b=0, c=-1, d=-f;
      // depressed cubic: t^3 + pt + q with p=c, q=d
      const pp = -1, qq = -f;
      const disc = -4*pp*pp*pp - 27*qq*qq;
      if (disc > 0) {
        // 3 real roots
        const m = 2*Math.sqrt(-pp/3);
        const arg = (3*qq)/(pp)*Math.sqrt(-3/pp)/2;
        const acsArg = Math.max(-1, Math.min(1, arg));
        const theta = Math.acos(acsArg)/3;
        const r1 = m*Math.cos(theta);
        const r2 = m*Math.cos(theta - 2*Math.PI/3);
        const r3 = m*Math.cos(theta - 4*Math.PI/3);
        const sorted = [r1,r2,r3].sort((a,b)=>a-b);
        branchLow.push({f, s: sorted[0]});
        branchMid.push({f, s: sorted[1]});
        branchUp.push({f, s: sorted[2]});
      } else {
        // 1 real root
        const A = Math.cbrt(-qq/2 + Math.sqrt(qq*qq/4 + pp*pp*pp/27));
        const B = Math.cbrt(-qq/2 - Math.sqrt(qq*qq/4 + pp*pp*pp/27));
        const r = A + B;
        if (f > 0) branchUp.push({f, s: r});
        else branchLow.push({f, s: r});
      }
    }

    // Plot stable branches (solid), unstable (dashed)
    ctx.strokeStyle = 'rgba(138,154,91,0.85)'; ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i=0;i<branchUp.length;i++) {
      const p = branchUp[i];
      const px = bX(p.f), py = bY(p.s);
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.beginPath();
    for (let i=0;i<branchLow.length;i++) {
      const p = branchLow[i];
      const px = bX(p.f), py = bY(p.s);
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    // unstable mid
    ctx.strokeStyle = 'rgba(220,80,80,0.7)';
    ctx.setLineDash([5,4]); ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i=0;i<branchMid.length;i++) {
      const p = branchMid[i];
      const px = bX(p.f), py = bY(p.s);
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke(); ctx.setLineDash([]);

    // fold points
    ctx.fillStyle = '#fb923c';
    ctx.beginPath(); ctx.arc(bX(FOLD), bY(-1/Math.sqrt(3)), 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(bX(-FOLD), bY(1/Math.sqrt(3)), 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(251,146,60,0.9)'; ctx.font='10px Nunito';
    ctx.fillText('fold', bX(FOLD)+8, bY(-1/Math.sqrt(3))+4);
    ctx.fillText('fold', bX(-FOLD)-30, bY(1/Math.sqrt(3))+4);

    // trajectory trail
    ctx.strokeStyle = '#e879f9'; ctx.lineWidth = 2;
    ctx.shadowBlur = 8; ctx.shadowColor = '#e879f9';
    ctx.beginPath();
    for (let i=0;i<trail.length;i++) {
      const p = trail[i];
      const px = bX(p.F), py = bY(p.S);
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke(); ctx.shadowBlur = 0;

    // current point
    const last = trail[trail.length-1];
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 14; ctx.shadowColor = '#e879f9';
    ctx.beginPath(); ctx.arc(bX(last.F), bY(last.S), 5.5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = 'rgba(254,250,224,0.55)'; ctx.font='10px Nunito';
    ctx.fillText('— stable', padL+totW-200, bfY0+bfH-14);
    ctx.fillStyle = 'rgba(220,80,80,0.7)';
    ctx.fillText('--- unstable', padL+totW-130, bfY0+bfH-14);
    ctx.fillStyle = '#e879f9';
    ctx.fillText('— trajectory', padL+totW-60, bfY0+bfH-14);
  }

  function loop() { if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,d=3) {
    document.getElementById(id).addEventListener('input', e => {
      const v=+e.target.value;
      document.getElementById(vid).textContent = v.toFixed(d);
      fn(v);
    });
  }
  bind('iF','vF',v=>{ if (mode==='manual') F=v; },2);
  bind('iSp','vSp',v=>sweepSpeed=v,4);
  bind('iN','vN',v=>noise=v,3);

  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      mode = b.dataset.mode;
      reset();
      if (mode === 'manual') F = +document.getElementById('iF').value;
      running=true; document.getElementById('bRun').textContent='Pause';
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running=!running; e.target.textContent = running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', () => { reset(); running=true; document.getElementById('bRun').textContent='Pause'; });

  reset(); loop();
})();
</script>
</body>
</html>
