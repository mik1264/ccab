<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIR on a Small-World Network — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ NN</span>
  <h2>Network SIR</h2>
  <p>Disease spreads on a Watts-Strogatz small-world network. Each infected node infects neighbors with probability β per step and recovers with probability γ. Cyan = susceptible, magenta = infected, earth = recovered.</p>

  <div class="control"><label>Infection β <span id="vB">0.18</span></label><input type="range" id="iB" min="0.02" max="0.6" step="0.005" value="0.18" /></div>
  <div class="control"><label>Recovery γ <span id="vG">0.06</span></label><input type="range" id="iG" min="0.01" max="0.30" step="0.005" value="0.06" /></div>
  <div class="control"><label>Rewiring β<sub>w</sub> <span id="vW">0.10</span></label><input type="range" id="iW" min="0" max="1" step="0.01" value="0.10" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="0.06,0.10">Mild outbreak</button>
    <button class="p" data-p="0.20,0.05">Pandemic</button>
    <button class="p" data-p="0.10,0.20">Burns out</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reseed</button>
  </div>

  <div class="stat"><span>Step</span><span class="v" id="sStep">0</span></div>
  <div class="stat"><span>Susceptible</span><span class="v" id="sS">—</span></div>
  <div class="stat"><span>Infected</span><span class="v" id="sI">—</span></div>
  <div class="stat"><span>Recovered</span><span class="v" id="sR">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  const N = 150;
  let beta = 0.18, gamma = 0.06, betaW = 0.10;
  let pos = [];
  let adj = [];
  let edges = []; // [a,b,flash]
  let state = new Uint8Array(N); // 0=S 1=I 2=R
  let infectedAt = new Float32Array(N); // for glow fade
  let history = []; // {S,I,R}
  let step = 0, running = true;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  function buildNetwork() {
    // Watts-Strogatz: ring + rewire
    pos = [];
    const cx = W/2, cy = H/2;
    const R = Math.min(W,H)*0.40;
    for (let i=0; i<N; i++) {
      const a = (i/N)*Math.PI*2 - Math.PI/2;
      pos.push({ x: cx + Math.cos(a)*R, y: cy + Math.sin(a)*R });
    }
    adj = Array.from({length:N}, () => new Set());
    edges = [];
    const k = 3;
    for (let i=0; i<N; i++) for (let j=1; j<=k; j++) {
      const u = i, v = (i+j)%N;
      adj[u].add(v); adj[v].add(u);
      edges.push([u,v,0]);
    }
    for (const e of edges) {
      if (Math.random() < betaW) {
        adj[e[0]].delete(e[1]); adj[e[1]].delete(e[0]);
        let w = e[0];
        while (w === e[0] || adj[e[0]].has(w)) w = (Math.random()*N)|0;
        adj[e[0]].add(w); adj[w].add(e[0]);
        e[1] = w;
      }
    }
  }

  function reset() {
    state.fill(0);
    infectedAt.fill(0);
    history = [];
    step = 0;
    // seed one infection
    const seed = (Math.random()*N)|0;
    state[seed] = 1;
    infectedAt[seed] = 1;
  }

  function tick() {
    const next = state.slice();
    const flashes = new Array(edges.length).fill(false);
    for (let i=0; i<N; i++) {
      if (state[i] !== 1) continue;
      // try infect each neighbor
      for (const j of adj[i]) {
        if (state[j] === 0 && Math.random() < beta) {
          next[j] = 1;
          infectedAt[j] = 1;
          // flash that edge
          for (let e=0; e<edges.length; e++) {
            const E = edges[e];
            if ((E[0]===i&&E[1]===j) || (E[0]===j&&E[1]===i)) { flashes[e] = true; break; }
          }
        }
      }
      if (Math.random() < gamma) next[i] = 2;
    }
    for (let e=0; e<edges.length; e++) if (flashes[e]) edges[e][2] = 1;
    state = next;
    step++;
    let s=0, ii=0, r=0;
    for (let k=0; k<N; k++) { if (state[k]===0) s++; else if (state[k]===1) ii++; else r++; }
    history.push({s,i:ii,r});
    if (history.length > 800) history.shift();
  }

  function colorState(s) {
    if (s===0) return [6, 182, 212];
    if (s===1) return [232, 121, 249];
    return [221, 161, 94];
  }

  function render() {
    ctx.fillStyle = 'rgba(6,8,13,0.45)';
    ctx.fillRect(0,0,W,H);

    // edges
    for (const e of edges) {
      e[2] = Math.max(0, e[2] - 0.05);
      const a = pos[e[0]], b = pos[e[1]];
      const cs = colorState(state[e[0]]), ce = colorState(state[e[1]]);
      // average
      const cr = (cs[0]+ce[0])/2|0, cg = (cs[1]+ce[1])/2|0, cb = (cs[2]+ce[2])/2|0;
      const flash = e[2];
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${0.18 + flash*0.7})`;
      ctx.lineWidth = 0.7 + flash*1.6;
      if (flash > 0.4) {
        ctx.shadowBlur = 12; ctx.shadowColor = 'rgba(232,121,249,0.8)';
      } else ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // nodes
    for (let i=0; i<N; i++) {
      const c = colorState(state[i]);
      infectedAt[i] = Math.max(0, infectedAt[i] - 0.04);
      const r = state[i]===1 ? 4.5 + 3*infectedAt[i] : 3.5;
      ctx.shadowBlur = state[i]===1 ? 16 : 6;
      ctx.shadowColor = `rgba(${c[0]},${c[1]},${c[2]},0.85)`;
      ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
      ctx.beginPath();
      ctx.arc(pos[i].x, pos[i].y, r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // SIR curves inset
    const iw = Math.min(280, W*0.30), ih = 150;
    const ix = 18, iy = H - ih - 18;
    ctx.fillStyle = 'rgba(12,18,28,0.85)';
    ctx.fillRect(ix, iy, iw, ih);
    ctx.strokeStyle = 'rgba(254,250,224,0.18)';
    ctx.strokeRect(ix, iy, iw, ih);
    ctx.fillStyle = 'rgba(254,250,224,0.7)';
    ctx.font = '10px Nunito';
    ctx.fillText('S(t)  I(t)  R(t)', ix+8, iy+14);

    if (history.length > 1) {
      const T = history.length;
      function plot(field, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let t=0; t<T; t++) {
          const v = history[t][field]/N;
          const x = ix + 8 + (t/(T-1))*(iw-16);
          const y = iy + ih - 8 - v*(ih-26);
          if (t===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
      plot('s', '#06b6d4');
      plot('i', '#e879f9');
      plot('r', '#DDA15E');
    }
    // legend
    ctx.fillStyle = '#06b6d4'; ctx.fillRect(ix+iw-90, iy+22, 8, 8);
    ctx.fillStyle = 'rgba(254,250,224,0.85)'; ctx.fillText('S', ix+iw-78, iy+30);
    ctx.fillStyle = '#e879f9'; ctx.fillRect(ix+iw-66, iy+22, 8, 8);
    ctx.fillStyle = 'rgba(254,250,224,0.85)'; ctx.fillText('I', ix+iw-54, iy+30);
    ctx.fillStyle = '#DDA15E'; ctx.fillRect(ix+iw-44, iy+22, 8, 8);
    ctx.fillStyle = 'rgba(254,250,224,0.85)'; ctx.fillText('R', ix+iw-32, iy+30);

    let s=0, ii=0, r=0;
    for (let k=0; k<N; k++) { if (state[k]===0) s++; else if (state[k]===1) ii++; else r++; }
    document.getElementById('sStep').textContent = step;
    document.getElementById('sS').textContent = s;
    document.getElementById('sI').textContent = ii;
    document.getElementById('sR').textContent = r;
  }

  function loop() {
    if (running) tick();
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iB').addEventListener('input', e => {
    beta = +e.target.value; document.getElementById('vB').textContent = beta.toFixed(3);
  });
  document.getElementById('iG').addEventListener('input', e => {
    gamma = +e.target.value; document.getElementById('vG').textContent = gamma.toFixed(3);
  });
  document.getElementById('iW').addEventListener('input', e => {
    betaW = +e.target.value; document.getElementById('vW').textContent = betaW.toFixed(2);
    buildNetwork(); reset();
  });
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      const [pb, pg] = b.dataset.p.split(',').map(Number);
      beta = pb; gamma = pg;
      document.getElementById('iB').value = pb;
      document.getElementById('iG').value = pg;
      document.getElementById('vB').textContent = pb.toFixed(3);
      document.getElementById('vG').textContent = pg.toFixed(3);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', () => { reset(); });

  buildNetwork(); reset(); loop();
})();
</script>
</body>
</html>
