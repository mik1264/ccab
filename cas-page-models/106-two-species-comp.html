<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Two-Species Competition — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(330px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend { display:flex; gap:1rem; font-size:0.78rem; margin-top:0.5rem; }
  .legend span::before { content:''; display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:middle; }
  .legend .a::before { background: var(--sage); }
  .legend .b::before { background: var(--magenta); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 106</span>
  <h2>Two-Species Competition</h2>
  <p>Competitive Lotka-Volterra: dN<sub>i</sub>/dt = r<sub>i</sub>N<sub>i</sub>(1 − (N<sub>i</sub> + α<sub>ij</sub>N<sub>j</sub>)/K<sub>i</sub>). Four regimes emerge from the isocline geometry: stable coexistence, exclusion of either species, or founder control.</p>

  <div class="control"><label>r₁ <span id="vr1">1.00</span></label><input type="range" id="ir1" min="0.1" max="2" step="0.01" value="1.00" /></div>
  <div class="control"><label>r₂ <span id="vr2">1.00</span></label><input type="range" id="ir2" min="0.1" max="2" step="0.01" value="1.00" /></div>
  <div class="control"><label>K₁ <span id="vk1">100</span></label><input type="range" id="ik1" min="20" max="200" step="1" value="100" /></div>
  <div class="control"><label>K₂ <span id="vk2">100</span></label><input type="range" id="ik2" min="20" max="200" step="1" value="100" /></div>
  <div class="control"><label>α₁₂ <span id="va12">0.50</span></label><input type="range" id="ia12" min="0" max="2" step="0.01" value="0.50" /></div>
  <div class="control"><label>α₂₁ <span id="va21">0.50</span></label><input type="range" id="ia21" min="0" max="2" step="0.01" value="0.50" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-p="0.5,0.5">Coexist</button>
    <button class="p" data-p="1.5,0.5">Sp1 wins</button>
    <button class="p" data-p="0.5,1.5">Sp2 wins</button>
    <button class="p" data-p="1.5,1.5">Founder</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>N₁</span><span class="v" id="sn1">—</span></div>
  <div class="stat"><span>N₂</span><span class="v" id="sn2">—</span></div>
  <div class="stat"><span>regime</span><span class="v" id="srg">—</span></div>
  <div class="legend"><span class="a">Species 1</span><span class="b">Species 2</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c'); const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() { W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize', resize); resize();

  const SAGE='#8A9A5B', TERRA='#BC6C25', EARTH='#DDA15E', MAGENTA='#e879f9', CYAN='#06b6d4';
  const GRID='rgba(254,250,224,0.08)', AXIS='rgba(254,250,224,0.4)', TXT='rgba(254,250,224,0.7)';

  let r1=1.0, r2=1.0, K1=100, K2=100, a12=0.5, a21=0.5;
  let N1=10, N2=10, t=0, running=true;
  const series=[]; const MAX=600;
  const trajs=[]; // saved trajectories from different ICs for phase portrait

  function reset() { N1=10; N2=10; t=0; series.length=0; trajs.length=0; seedTrajs(); }

  function deriv(n1,n2) {
    return [ r1*n1*(1 - (n1 + a12*n2)/K1), r2*n2*(1 - (n2 + a21*n1)/K2) ];
  }
  function rk4(dt) {
    const k1 = deriv(N1, N2);
    const k2 = deriv(N1+dt/2*k1[0], N2+dt/2*k1[1]);
    const k3 = deriv(N1+dt/2*k2[0], N2+dt/2*k2[1]);
    const k4 = deriv(N1+dt*k3[0], N2+dt*k3[1]);
    N1 += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    N2 += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    if (N1<0) N1=0; if (N2<0) N2=0; t += dt;
  }

  function step() { for (let i=0;i<3;i++) rk4(0.04); series.push([t,N1,N2]); if (series.length>MAX) series.shift(); }

  function seedTrajs() {
    // Start from grid of ICs, integrate forward, store paths
    const ICs = [];
    const M = 6;
    const Mmax = Math.max(K1, K2)*1.4;
    for (let i=1;i<=M;i++) for (let j=1;j<=M;j++) {
      ICs.push([i/(M+1)*Mmax, j/(M+1)*Mmax]);
    }
    for (const [n10,n20] of ICs) {
      let nn1=n10, nn2=n20;
      const path=[[nn1,nn2]];
      for (let s=0;s<300;s++) {
        const d1=r1*nn1*(1-(nn1+a12*nn2)/K1), d2=r2*nn2*(1-(nn2+a21*nn1)/K2);
        const dt=0.05;
        nn1 += dt*d1; nn2 += dt*d2;
        if (nn1<0) nn1=0; if (nn2<0) nn2=0;
        if (s%4===0) path.push([nn1,nn2]);
      }
      trajs.push(path);
    }
  }

  function regime() {
    // K1/a12 vs K2 and K2/a21 vs K1
    const A = K1/a12, B = K2;
    const C = K2/a21, D = K1;
    if (A > B && C < D) return 'Sp 1 wins';
    if (A < B && C > D) return 'Sp 2 wins';
    if (A > B && C > D) return 'Coexistence';
    return 'Founder ctrl';
  }

  function drawAxes(x,y,w,h,title,xl,yl) {
    ctx.strokeStyle = GRID; ctx.lineWidth=1;
    for (let i=1;i<4;i++) { const py=y+i*h/4; ctx.beginPath(); ctx.moveTo(x,py); ctx.lineTo(x+w,py); ctx.stroke(); }
    ctx.strokeStyle = AXIS; ctx.beginPath();
    ctx.moveTo(x,y); ctx.lineTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    ctx.fillStyle = TXT; ctx.font='12px Nunito'; ctx.fillText(title, x, y-10);
    ctx.font='10px Nunito'; ctx.fillStyle='rgba(254,250,224,0.5)';
    ctx.fillText(xl, x+w-30, y+h+18);
    ctx.save(); ctx.translate(x-44, y+h/2+10); ctx.rotate(-Math.PI/2); ctx.fillText(yl,0,0); ctx.restore();
  }

  function draw() {
    ctx.fillStyle = '#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=370, padT=60, padG=50;
    const col = W - padL - padR;
    const rowH = (H - padT - padG - 50)/2;

    // Time series
    let y0 = padT;
    drawAxes(padL, y0, col, rowH, 'Population trajectories', 't', 'N');
    let mx = Math.max(K1,K2)*1.2;
    if (series.length>1) {
      const t0=series[0][0], t1=series[series.length-1][0]; const tspan=Math.max(t1-t0,1);
      ctx.shadowColor=SAGE; ctx.shadowBlur=10; ctx.strokeStyle=SAGE; ctx.lineWidth=2.4; ctx.beginPath();
      for (let i=0;i<series.length;i++) {
        const px = padL + (series[i][0]-t0)/tspan*col;
        const py = y0+rowH - series[i][1]/mx*rowH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke(); ctx.shadowBlur=0;
      ctx.shadowColor=MAGENTA; ctx.shadowBlur=10; ctx.strokeStyle=MAGENTA; ctx.lineWidth=2.2; ctx.beginPath();
      for (let i=0;i<series.length;i++) {
        const px = padL + (series[i][0]-t0)/tspan*col;
        const py = y0+rowH - series[i][2]/mx*rowH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke(); ctx.shadowBlur=0;
    }

    // Phase portrait
    y0 = padT + rowH + padG;
    const sq = Math.min(col, rowH);
    drawAxes(padL, y0, sq, sq, 'Phase portrait with isoclines + vector field', 'N₁', 'N₂');
    const Nmax = Math.max(K1, K2, K1/Math.max(a21,1e-3), K2/Math.max(a12,1e-3))*1.05;
    const sxN = sq/Nmax, syN = sq/Nmax;

    // vector field
    const grid=18;
    for (let i=1;i<grid;i++) for (let j=1;j<grid;j++) {
      const n1=i/grid*Nmax, n2=j/grid*Nmax;
      const d1=r1*n1*(1-(n1+a12*n2)/K1), d2=r2*n2*(1-(n2+a21*n1)/K2);
      const m=Math.hypot(d1,d2)+1e-9;
      const len = Math.min(sq/grid*0.55, sq/grid*0.55);
      const dx=d1/m*len, dy=-d2/m*len;
      const px=padL+n1*sxN, py=y0+sq-n2*syN;
      ctx.strokeStyle='rgba(254,250,224,0.18)'; ctx.lineWidth=1; ctx.beginPath();
      ctx.moveTo(px,py); ctx.lineTo(px+dx,py+dy); ctx.stroke();
    }

    // saved trajectories
    ctx.strokeStyle='rgba(6,182,212,0.45)'; ctx.lineWidth=1.2;
    for (const path of trajs) {
      ctx.beginPath();
      for (let i=0;i<path.length;i++) {
        const px=padL+path[i][0]*sxN, py=y0+sq-path[i][1]*syN;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }

    // isoclines: dN1/dt=0 → N1+a12 N2 = K1 (and N1=0). dN2/dt=0 → N2+a21 N1 = K2 (and N2=0)
    function lineIsoc(col, p1, p2) {
      ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.shadowColor=col; ctx.shadowBlur=10; ctx.beginPath();
      ctx.moveTo(padL+p1[0]*sxN, y0+sq-p1[1]*syN);
      ctx.lineTo(padL+p2[0]*sxN, y0+sq-p2[1]*syN);
      ctx.stroke(); ctx.shadowBlur=0;
    }
    // dN1/dt=0: from (K1,0) to (0, K1/a12)
    lineIsoc(SAGE, [K1,0], [0, K1/Math.max(a12,1e-3)]);
    lineIsoc(MAGENTA, [0, K2], [K2/Math.max(a21,1e-3), 0]);

    // current trajectory
    if (series.length>1) {
      ctx.strokeStyle=EARTH; ctx.lineWidth=2; ctx.shadowColor=EARTH; ctx.shadowBlur=8; ctx.beginPath();
      for (let i=0;i<series.length;i++) {
        const px=padL+series[i][1]*sxN, py=y0+sq-series[i][2]*syN;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke(); ctx.shadowBlur=0;
      ctx.fillStyle=EARTH;
      const px=padL+N1*sxN, py=y0+sq-N2*syN;
      ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fill();
    }

    // K labels
    ctx.fillStyle=SAGE; ctx.font='10px Nunito';
    ctx.fillText('K₁', padL+K1*sxN-8, y0+sq+13);
    ctx.fillStyle=MAGENTA; ctx.fillText('K₂', padL-22, y0+sq-K2*syN+4);

    document.getElementById('st').textContent = t.toFixed(1);
    document.getElementById('sn1').textContent = N1.toFixed(2);
    document.getElementById('sn2').textContent = N2.toFixed(2);
    document.getElementById('srg').textContent = regime();
  }

  function loop() { if (running) step(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,setter,dec=2) {
    document.getElementById(id).addEventListener('input', e => {
      const v=+e.target.value;
      let txt = v.toFixed(dec);
      if (id==='ik1' || id==='ik2') txt = v.toFixed(0);
      document.getElementById(vid).textContent = txt;
      setter(v); trajs.length=0; seedTrajs();
    });
  }
  bind('ir1','vr1', v=>{ r1=v; });
  bind('ir2','vr2', v=>{ r2=v; });
  bind('ik1','vk1', v=>{ K1=v; });
  bind('ik2','vk2', v=>{ K2=v; });
  bind('ia12','va12', v=>{ a12=v; });
  bind('ia21','va21', v=>{ a21=v; });

  document.querySelectorAll('button.p').forEach(b => {
    b.addEventListener('click', () => {
      const [aa,bb]=b.dataset.p.split(',').map(Number);
      a12=aa; a21=bb;
      document.getElementById('ia12').value=aa; document.getElementById('va12').textContent=aa.toFixed(2);
      document.getElementById('ia21').value=bb; document.getElementById('va21').textContent=bb.toFixed(2);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => { running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
