<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chua's Circuit — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 96</span>
  <h2>Chua's Circuit</h2>
  <p>dx/dt = α(y − x − f(x)), dy/dt = x − y + z, dz/dt = −βy. The Chua diode f(x) is piecewise-linear: m₁x + ½(m₀−m₁)(|x+1|−|x−1|). Produces the iconic double-scroll attractor — the first chaotic system realized in hardware.</p>

  <div class="control"><label>α <span id="va">15.6</span></label><input id="ia" type="range" min="5" max="25" step="0.1" value="15.6" /></div>
  <div class="control"><label>β <span id="vb">28.0</span></label><input id="ib" type="range" min="10" max="50" step="0.1" value="28.0" /></div>
  <div class="control"><label>m₀ <span id="vm0">-1.143</span></label><input id="im0" type="range" min="-2" max="0" step="0.005" value="-1.143" /></div>
  <div class="control"><label>m₁ <span id="vm1">-0.714</span></label><input id="im1" type="range" min="-1.5" max="0" step="0.005" value="-0.714" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-p="15.6,28,-1.143,-0.714">Double scroll</button>
    <button class="p" data-p="9,14,-1.143,-0.714">Single</button>
    <button class="p" data-p="18,33,-1.27,-0.68">Wild</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>x</span><span class="v" id="sx">—</span></div>
  <div class="stat"><span>y</span><span class="v" id="sy">—</span></div>
  <div class="stat"><span>z</span><span class="v" id="sz">—</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);}
  addEventListener('resize',resize); resize();

  let alpha=15.6, beta=28, m0=-1.143, m1=-0.714;
  let x=0.1, y=0, z=0, t=0, running=true;
  const series=[]; const MAX=4500;

  function reset(){ x=0.1; y=0; z=0; t=0; series.length=0; }

  function f(x){ return m1*x + 0.5*(m0-m1)*(Math.abs(x+1)-Math.abs(x-1)); }
  function deriv(x,y,z){ return [alpha*(y-x-f(x)), x-y+z, -beta*y]; }
  function rk4(dt){
    const [k1x,k1y,k1z]=deriv(x,y,z);
    const [k2x,k2y,k2z]=deriv(x+dt/2*k1x, y+dt/2*k1y, z+dt/2*k1z);
    const [k3x,k3y,k3z]=deriv(x+dt/2*k2x, y+dt/2*k2y, z+dt/2*k2z);
    const [k4x,k4y,k4z]=deriv(x+dt*k3x, y+dt*k3y, z+dt*k3z);
    x += dt/6*(k1x+2*k2x+2*k3x+k4x);
    y += dt/6*(k1y+2*k2y+2*k3y+k4y);
    z += dt/6*(k1z+2*k2z+2*k3z+k4z);
    t += dt;
  }

  function tick(){
    const dt=0.005;
    for (let i=0;i<10;i++) rk4(dt);
    series.push({t,x,y,z});
    if (series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(2);
    document.getElementById('sx').textContent=x.toFixed(2);
    document.getElementById('sy').textContent=y.toFixed(3);
    document.getElementById('sz').textContent=z.toFixed(2);
  }

  function turbo(t){
    t=Math.max(0,Math.min(1,t));
    const r=Math.round(255*Math.min(1,Math.max(0, 0.13572 + 4.61539*t - 42.66032*t*t + 132.13108*t*t*t - 152.94239*t*t*t*t + 59.28637*t*t*t*t*t)));
    const g=Math.round(255*Math.min(1,Math.max(0, 0.09140 + 2.19418*t + 4.84296*t*t - 14.18503*t*t*t + 4.27729*t*t*t*t + 2.82956*t*t*t*t*t)));
    const bb=Math.round(255*Math.min(1,Math.max(0, 0.10667 + 12.64194*t - 60.58204*t*t + 110.36276*t*t*t - 89.90310*t*t*t*t + 27.34824*t*t*t*t*t)));
    return `rgb(${r},${g},${bb})`;
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    if (series.length<2) return;
    const padL=70, padR=360, padT=60, padB=60;
    const totW = W-padL-padR;
    const tsH = (H-padT-padB-60)*0.32;
    const ppSize = Math.min(totW*0.6, (H-padT-padB-60)*0.62);
    const ppX0 = padL, ppY0 = padT+tsH+50;
    const cdX = padL+ppSize+50, cdY = ppY0;
    const cdW = totW-ppSize-50, cdH = ppSize;

    // Time series
    let mx=1;
    for (const s of series) { const m=Math.max(Math.abs(s.x),Math.abs(s.y)*5,Math.abs(s.z)/2); if (m>mx) mx=m; }
    mx*=1.05;
    const t0=series[0].t, t1=series[series.length-1].t, tspan=Math.max(t1-t0,1e-3);
    ctx.strokeStyle='rgba(254,250,224,0.07)'; ctx.lineWidth=1;
    for (let i=0;i<=4;i++){const yp=padT+i*tsH/4; ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();}
    ctx.strokeStyle='rgba(254,250,224,0.4)';
    ctx.beginPath(); ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+tsH); ctx.lineTo(padL+totW,padT+tsH); ctx.stroke();
    ctx.strokeStyle='rgba(254,250,224,0.15)';
    ctx.beginPath(); ctx.moveTo(padL,padT+tsH/2); ctx.lineTo(padL+totW,padT+tsH/2); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('Voltages V_C1 (x), V_C2 (y), Current I_L (z)', padL, padT-12);
    const cols=['#06b6d4','#e879f9','#fb923c'];
    [['x',1],['y',5],['z',0.5]].forEach((tup,ki)=>{
      const k=tup[0], scale=tup[1];
      ctx.strokeStyle=cols[ki]; ctx.lineWidth=1.6;
      ctx.shadowBlur=6; ctx.shadowColor=cols[ki];
      ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.t-t0)/tspan*totW;
        const py=padT+tsH/2-(s[k]*scale)/mx*tsH/2;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    });
    ctx.shadowBlur=0;

    // Phase: x-y plane
    ctx.fillStyle='rgba(254,250,224,0.7)';
    ctx.fillText('Double-scroll attractor (x, z) — color = y', ppX0, ppY0-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(ppX0,ppY0,ppSize,ppSize);

    let mxS=1, mzS=1, myMin=999, myMax=-999;
    for (const s of series){if (Math.abs(s.x)>mxS) mxS=Math.abs(s.x); if (Math.abs(s.z)>mzS) mzS=Math.abs(s.z); if (s.y<myMin) myMin=s.y; if (s.y>myMax) myMax=s.y;}
    mxS*=1.1; mzS*=1.1;
    const yspan=Math.max(myMax-myMin, 1e-6);

    const cx0=ppX0+ppSize/2, cy0=ppY0+ppSize/2;
    ctx.strokeStyle='rgba(254,250,224,0.15)';
    ctx.beginPath();
    ctx.moveTo(ppX0,cy0); ctx.lineTo(ppX0+ppSize,cy0);
    ctx.moveTo(cx0,ppY0); ctx.lineTo(cx0,ppY0+ppSize); ctx.stroke();

    const N=series.length;
    for (let i=1;i<N;i++){
      const s0=series[i-1], s1=series[i];
      const px0=cx0+(s0.x/mxS)*(ppSize/2*0.9);
      const py0=cy0-(s0.z/mzS)*(ppSize/2*0.9);
      const px1=cx0+(s1.x/mxS)*(ppSize/2*0.9);
      const py1=cy0-(s1.z/mzS)*(ppSize/2*0.9);
      const yn=(s1.y-myMin)/yspan;
      const col=turbo(yn);
      ctx.shadowBlur=5; ctx.shadowColor=col;
      ctx.strokeStyle=col; ctx.lineWidth=1.3;
      ctx.globalAlpha=0.4 + 0.6*(i/N);
      ctx.beginPath(); ctx.moveTo(px0,py0); ctx.lineTo(px1,py1); ctx.stroke();
    }
    ctx.globalAlpha=1; ctx.shadowBlur=0;

    const last=series[series.length-1];
    const lpx=cx0+(last.x/mxS)*(ppSize/2*0.9);
    const lpy=cy0-(last.z/mzS)*(ppSize/2*0.9);
    ctx.fillStyle='#fff'; ctx.shadowBlur=14; ctx.shadowColor='#e879f9';
    ctx.beginPath(); ctx.arc(lpx,lpy,4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('x', ppX0+ppSize-15, cy0-6);
    ctx.fillText('z', cx0+6, ppY0+12);

    // Inset: Chua diode characteristic f(x)
    ctx.fillStyle='rgba(254,250,224,0.7)';
    ctx.fillText('Chua diode f(x)', cdX, cdY-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(cdX,cdY,cdW,cdH);
    const ccx=cdX+cdW/2, ccy=cdY+cdH/2;
    ctx.strokeStyle='rgba(254,250,224,0.15)';
    ctx.beginPath();
    ctx.moveTo(cdX,ccy); ctx.lineTo(cdX+cdW,ccy);
    ctx.moveTo(ccx,cdY); ctx.lineTo(ccx,cdY+cdH); ctx.stroke();

    const fxRange=3, fyRange=3;
    ctx.shadowBlur=10; ctx.shadowColor='#e879f9';
    ctx.strokeStyle='#e879f9'; ctx.lineWidth=2.4;
    ctx.beginPath();
    for (let i=0;i<=200;i++){
      const xx=-fxRange+2*fxRange*i/200;
      const fv=f(xx);
      const px=cdX+(xx+fxRange)/(2*fxRange)*cdW;
      const py=cdY+cdH/2-(fv/fyRange)*cdH/2;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.shadowBlur=0;

    // current x marker on diode
    const px=cdX+(Math.max(-fxRange,Math.min(fxRange,last.x))+fxRange)/(2*fxRange)*cdW;
    const fv=f(last.x);
    const py=cdY+cdH/2-(Math.max(-fyRange,Math.min(fyRange,fv))/fyRange)*cdH/2;
    ctx.fillStyle='#fb923c'; ctx.shadowBlur=10; ctx.shadowColor='#fb923c';
    ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('x', cdX+cdW-15, ccy-6);
    ctx.fillText('f(x)', ccx+6, cdY+12);
  }

  function loop(){ if (running) tick(); draw(); requestAnimationFrame(loop); }
  function bind(id,vid,prop,d=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{ const v=+e.target.value; document.getElementById(vid).textContent=v.toFixed(d);
      if (prop==='a') alpha=v; if (prop==='b') beta=v; if (prop==='m0') m0=v; if (prop==='m1') m1=v;
    });
  }
  bind('ia','va','a',2); bind('ib','vb','b',2); bind('im0','vm0','m0',3); bind('im1','vm1','m1',3);
  document.querySelectorAll('.p').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const [pa,pb,pm0,pm1]=btn.dataset.p.split(',').map(Number);
      alpha=pa; beta=pb; m0=pm0; m1=pm1;
      document.getElementById('ia').value=pa; document.getElementById('va').textContent=pa.toFixed(2);
      document.getElementById('ib').value=pb; document.getElementById('vb').textContent=pb.toFixed(2);
      document.getElementById('im0').value=pm0; document.getElementById('vm0').textContent=pm0.toFixed(3);
      document.getElementById('im1').value=pm1; document.getElementById('vm1').textContent=pm1.toFixed(3);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{ running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); loop();
})();
</script>
</body>
</html>
