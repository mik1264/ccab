<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bass Extended — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 135</span>
  <h2>Bass Extended</h2>
  <p>Classical Bass + word-of-mouth boost + advertising pulse + price decline that opens new adopters + repeat purchases. Track new adoptions, repeats, total sales — see how each lever reshapes the diffusion curve.</p>

  <div class="control"><label>Innovation p <span id="vp">0.012</span></label><input type="range" id="ip" min="0.001" max="0.05" step="0.001" value="0.012" /></div>
  <div class="control"><label>Imitation q (WoM) <span id="vq">0.42</span></label><input type="range" id="iq" min="0.05" max="1.5" step="0.01" value="0.42" /></div>
  <div class="control"><label>Advertising A <span id="vA">0.020</span></label><input type="range" id="iA" min="0" max="0.10" step="0.001" value="0.020" /></div>
  <div class="control"><label>Price decline rate <span id="vD">0.030</span></label><input type="range" id="iD" min="0" max="0.12" step="0.001" value="0.030" /></div>
  <div class="control"><label>Repeat rate r <span id="vR">0.10</span></label><input type="range" id="iR" min="0" max="0.5" step="0.005" value="0.10" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-p="0.012,0.42,0.02,0.03,0.1">Default</button>
    <button class="p" data-p="0.005,0.6,0.05,0.06,0.2">Hype-driven</button>
    <button class="p" data-p="0.03,0.2,0.0,0.0,0.05">Pure innovation</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>Adopted F</span><span class="v" id="sF">—</span></div>
  <div class="stat"><span>Sales/period</span><span class="v" id="sS">—</span></div>
  <div class="stat"><span>Price index</span><span class="v" id="sPi">—</span></div>
  <div class="stat"><span>Repeats</span><span class="v" id="sRp">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize); resize();

  let p=0.012, q=0.42, A=0.020, decP=0.030, repR=0.10;
  // Adopters fraction F, Price index P (1→0.2), Repeat sales rate
  let F=0, P=1.0, repeats=0, t=0, totalSales=0;
  let running = true;
  const series = [];
  const MAX = 4000;

  function reset() { F=0; P=1.0; repeats=0; t=0; totalSales=0; series.length=0; }

  // dF/dt = (p + A·sin pulse + q·F·priceFactor)(1-F)
  // priceFactor: lower price → larger pool (price-elastic latent demand)
  function deriv(F, P, t) {
    const adsPulse = A * (1 + 0.6*Math.sin(0.4*t));
    const wom = q * F;
    const priceMult = (2.0 - P);  // 1→1, 0.2→1.8
    const dF = (p + adsPulse + wom) * (1 - F) * priceMult;
    const dP = -decP * P * (1 - 0.2/Math.max(P,0.21));  // approaches 0.2
    return [dF, dP];
  }

  function rk4(dt) {
    const [a1,b1] = deriv(F, P, t);
    const [a2,b2] = deriv(F + dt/2*a1, P + dt/2*b1, t + dt/2);
    const [a3,b3] = deriv(F + dt/2*a2, P + dt/2*b2, t + dt/2);
    const [a4,b4] = deriv(F + dt*a3, P + dt*b3, t + dt);
    F += dt/6*(a1 + 2*a2 + 2*a3 + a4);
    P += dt/6*(b1 + 2*b2 + 2*b3 + b4);
    if (F>1) F=1; if (F<0) F=0;
    if (P<0.2) P=0.2; if (P>1) P=1;
    t += dt;
  }

  function tick() {
    const dt = 0.25;
    const Fprev = F;
    rk4(dt);
    const newAdopt = Math.max(F - Fprev, 0);
    const repNow = repR * F * dt;
    repeats = repNow;
    totalSales = newAdopt + repNow;
    series.push({t, F, P, sales: totalSales/Math.max(dt,1e-9), repeats: repNow/Math.max(dt,1e-9), newAdopt: newAdopt/Math.max(dt,1e-9)});
    if (series.length > MAX) series.shift();
    document.getElementById('st').textContent = t.toFixed(1);
    document.getElementById('sF').textContent = F.toFixed(3);
    document.getElementById('sS').textContent = (totalSales/dt).toFixed(3);
    document.getElementById('sPi').textContent = P.toFixed(3);
    document.getElementById('sRp').textContent = (repNow/dt).toFixed(3);
    if (t>200) running = false;
  }

  function draw() {
    ctx.fillStyle = '#06080d'; ctx.fillRect(0,0,W,H);
    if (series.length<2) return;

    const padL=80, padR=370, padT=70, padB=60;
    const totW = W - padL - padR;
    const sH = (H - padT - padB - 90);
    const tsH = sH * 0.46;
    const pH = sH * 0.46;
    const pY0 = padT + tsH + 70;

    const t1 = series[series.length-1].t;
    const tspan = Math.max(t1, 50);

    // === Top: cumulative F vs Price ===
    ctx.fillStyle = 'rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('Cumulative adoption F & price index P', padL, padT-12);

    ctx.strokeStyle = 'rgba(254,250,224,0.07)';
    for (let i=0;i<=4;i++) {
      const yp = padT + i*tsH/4;
      ctx.beginPath(); ctx.moveTo(padL, yp); ctx.lineTo(padL+totW, yp); ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(254,250,224,0.4)';
    ctx.beginPath();
    ctx.moveTo(padL, padT); ctx.lineTo(padL, padT+tsH); ctx.lineTo(padL+totW, padT+tsH); ctx.stroke();

    ctx.fillStyle = 'rgba(254,250,224,0.55)'; ctx.font='10px Nunito';
    ctx.fillText('1.0', padL-30, padT+5);
    ctx.fillText('0', padL-15, padT+tsH);

    // F line
    ctx.strokeStyle = '#e879f9'; ctx.lineWidth = 2.5;
    ctx.shadowBlur = 8; ctx.shadowColor = '#e879f9';
    ctx.beginPath();
    for (let i=0;i<series.length;i++) {
      const s = series[i];
      const px = padL + s.t/tspan*totW;
      const py = padT + tsH - s.F*tsH;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Price line (mapped to 0-1 same axis but in reverse intensity)
    ctx.strokeStyle = '#fb923c'; ctx.lineWidth = 1.8;
    ctx.setLineDash([6,4]);
    ctx.beginPath();
    for (let i=0;i<series.length;i++) {
      const s = series[i];
      const px = padL + s.t/tspan*totW;
      const py = padT + tsH - s.P*tsH;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // legend
    ctx.fillStyle='#e879f9'; ctx.font='11px Nunito';
    ctx.fillRect(padL+12, padT+12, 14, 3);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.fillText('Adopted F', padL+30, padT+16);
    ctx.fillStyle='#fb923c';
    ctx.fillRect(padL+110, padT+12, 14, 3);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.fillText('Price P', padL+128, padT+16);

    // === Bottom: sales rate decomposed (new + repeat) ===
    ctx.fillStyle = 'rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('Sales rate — new adoptions + repeat purchases', padL, pY0-12);

    let mxS = 0;
    for (const s of series) { if (s.sales>mxS) mxS=s.sales; }
    if (mxS<0.001) mxS=0.001; mxS *= 1.15;

    ctx.strokeStyle = 'rgba(254,250,224,0.07)';
    for (let i=0;i<=4;i++) {
      const yp = pY0 + i*pH/4;
      ctx.beginPath(); ctx.moveTo(padL, yp); ctx.lineTo(padL+totW, yp); ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(254,250,224,0.4)';
    ctx.beginPath();
    ctx.moveTo(padL, pY0); ctx.lineTo(padL, pY0+pH); ctx.lineTo(padL+totW, pY0+pH); ctx.stroke();

    // stacked area: new adopt + repeat
    ctx.fillStyle = 'rgba(6,182,212,0.55)';
    ctx.beginPath();
    for (let i=0;i<series.length;i++) {
      const s = series[i];
      const px = padL + s.t/tspan*totW;
      const py = pY0 + pH - s.newAdopt/mxS*pH;
      if (i===0) ctx.moveTo(px, pY0+pH); else null;
      if (i===0) ctx.lineTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.lineTo(padL + series[series.length-1].t/tspan*totW, pY0+pH);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(251,146,60,0.55)';
    ctx.beginPath();
    let started=false;
    for (let i=0;i<series.length;i++) {
      const s = series[i];
      const px = padL + s.t/tspan*totW;
      const top = s.newAdopt + s.repeats;
      const py = pY0 + pH - top/mxS*pH;
      const py0 = pY0 + pH - s.newAdopt/mxS*pH;
      if (!started) { ctx.moveTo(px, py0); started=true; }
      ctx.lineTo(px, py);
    }
    for (let i=series.length-1; i>=0; i--) {
      const s = series[i];
      const px = padL + s.t/tspan*totW;
      const py0 = pY0 + pH - s.newAdopt/mxS*pH;
      ctx.lineTo(px, py0);
    }
    ctx.closePath(); ctx.fill();

    // legend
    ctx.fillStyle='rgba(6,182,212,0.7)'; ctx.fillRect(padL+12, pY0+12, 14, 10);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.fillText('New adoption', padL+30, pY0+22);
    ctx.fillStyle='rgba(251,146,60,0.7)'; ctx.fillRect(padL+130, pY0+12, 14, 10);
    ctx.fillStyle='rgba(254,250,224,0.85)'; ctx.fillText('Repeat sales', padL+148, pY0+22);
  }

  function loop() { if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,d=3) {
    document.getElementById(id).addEventListener('input', e => {
      const v=+e.target.value;
      document.getElementById(vid).textContent = v.toFixed(d);
      fn(v);
    });
  }
  bind('ip','vp',v=>p=v,3);
  bind('iq','vq',v=>q=v,2);
  bind('iA','vA',v=>A=v,3);
  bind('iD','vD',v=>decP=v,3);
  bind('iR','vR',v=>repR=v,2);

  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      const a = b.dataset.p.split(',').map(Number);
      p=a[0]; q=a[1]; A=a[2]; decP=a[3]; repR=a[4];
      document.getElementById('ip').value=a[0]; document.getElementById('vp').textContent=a[0].toFixed(3);
      document.getElementById('iq').value=a[1]; document.getElementById('vq').textContent=a[1].toFixed(2);
      document.getElementById('iA').value=a[2]; document.getElementById('vA').textContent=a[2].toFixed(3);
      document.getElementById('iD').value=a[3]; document.getElementById('vD').textContent=a[3].toFixed(3);
      document.getElementById('iR').value=a[4]; document.getElementById('vR').textContent=a[4].toFixed(2);
      reset(); running=true; document.getElementById('bRun').textContent='Pause';
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running=!running; e.target.textContent = running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', () => { reset(); running=true; document.getElementById('bRun').textContent='Pause'; });

  reset(); loop();
})();
</script>
</body>
</html>
