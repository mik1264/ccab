<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solow Growth — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend { display:flex; gap:1rem; font-size:0.8rem; margin-top:0.5rem; flex-wrap:wrap; }
  .legend span::before { content:''; display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align: middle; }
  .legend .y::before { background: var(--terracotta); }
  .legend .k::before { background: var(--sage); }
  .legend .pw::before { background: var(--earth); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 31</span>
  <h2>Solow Growth</h2>
  <p>Y = A·K^α·L^(1−α). dK/dt = sY − δK. Capital saturates at steady state k* = (sA/δ)^(1/(1−α)). Watch convergence to a balanced path.</p>

  <div class="control"><label>s savings rate <span id="vs">0.25</span></label><input type="range" id="iS" min="0.02" max="0.6" step="0.005" value="0.25" /></div>
  <div class="control"><label>δ depreciation <span id="vd">0.05</span></label><input type="range" id="iD" min="0.005" max="0.3" step="0.005" value="0.05" /></div>
  <div class="control"><label>A productivity <span id="va">1.00</span></label><input type="range" id="iA" min="0.2" max="3" step="0.01" value="1.0" /></div>
  <div class="control"><label>α capital share <span id="val">0.33</span></label><input type="range" id="iAl" min="0.1" max="0.7" step="0.01" value="0.33" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>K (capital)</span><span class="v" id="sK">—</span></div>
  <div class="stat"><span>Y (output)</span><span class="v" id="sY">—</span></div>
  <div class="stat"><span>k = K/L</span><span class="v" id="sk">—</span></div>
  <div class="stat"><span>k* steady state</span><span class="v" id="skstar">—</span></div>
  <div class="legend"><span class="y">Y</span><span class="k">K</span><span class="pw">k=K/L</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize',resize); resize();

  const C_Y='#BC6C25', C_K='#8A9A5B', C_PW='#DDA15E', GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  const L=1; // labor (constant for clarity)
  let s=0.25, delta=0.05, A=1.0, alpha=0.33;
  let K=1, t=0, running=true;
  const series=[]; const MAX=1500;
  const dt=0.1;

  function reset(){ K=1; t=0; series.length=0; }

  function Y_of_K(K){ return A * Math.pow(K,alpha) * Math.pow(L,1-alpha); }
  function kStar(){
    // steady state capital per worker: k* satisfies sA k*^α = δ k*  =>  k* = (sA/δ)^(1/(1-α))
    return Math.pow(s*A/delta, 1/(1-alpha));
  }

  function rk4(){
    const f=(K)=> s*Y_of_K(K) - delta*K;
    const k1=f(K);
    const k2=f(K+dt/2*k1);
    const k3=f(K+dt/2*k2);
    const k4=f(K+dt*k3);
    K += dt/6*(k1+2*k2+2*k3+k4);
    if(K<0) K=0;
    t += dt;
  }

  function tick(){
    for(let i=0;i<2;i++) rk4();
    const Y=Y_of_K(K);
    const k=K/L;
    series.push({t,K,Y,k});
    if(series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sK').textContent=K.toFixed(3);
    document.getElementById('sY').textContent=Y.toFixed(3);
    document.getElementById('sk').textContent=k.toFixed(3);
    document.getElementById('skstar').textContent=kStar().toFixed(3);
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if(series.length<2) return;
    const padL=70, padR=360, padT=60, padB=60;
    const totW=W-padL-padR, totH=H-padT-padB;
    const t0=series[0].t, t1=series[series.length-1].t;
    const tspan=Math.max(t1-t0,1);
    let maxV=0.001;
    for(const s2 of series){
      if(s2.K>maxV) maxV=s2.K;
      if(s2.Y>maxV) maxV=s2.Y;
      if(s2.k>maxV) maxV=s2.k;
    }
    const ks=kStar();
    if(ks>maxV && isFinite(ks) && ks<1e6) maxV=ks;
    maxV*=1.1;

    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for(let i=0;i<=5;i++){
      const yp=padT+i*totH/5;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
    }
    ctx.strokeStyle=AXIS;
    ctx.beginPath(); ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+totH); ctx.lineTo(padL+totW,padT+totH); ctx.stroke();

    // k* line
    if(isFinite(ks) && ks<maxV){
      const yks=padT+totH-ks/maxV*totH;
      ctx.strokeStyle='rgba(221,161,94,0.4)'; ctx.setLineDash([5,5]);
      ctx.beginPath(); ctx.moveTo(padL,yks); ctx.lineTo(padL+totW,yks); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(221,161,94,0.7)';
      ctx.fillText('k*', padL+totW+5, yks+4);
    }

    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='12px Nunito';
    ctx.fillText('Solow trajectory: Y, K, k', padL, padT-15);
    ctx.fillText(maxV.toFixed(2), padL-50, padT+5);
    ctx.fillText('0', padL-15, padT+totH);
    ctx.fillText('t='+t1.toFixed(0), padL+totW-50, padT+totH+18);

    function plot(key,color,lw=2.2){
      ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.beginPath();
      for(let i=0;i<series.length;i++){
        const s2=series[i];
        const px=padL+(s2.t-t0)/tspan*totW;
        const py=padT+totH-s2[key]/maxV*totH;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    plot('Y',C_Y); plot('K',C_K); plot('k',C_PW,1.7);
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      fn(v);
    });
  }
  bind('iS','vs',v=>s=v,3);
  bind('iD','vd',v=>delta=v,3);
  bind('iA','va',v=>A=v);
  bind('iAl','val',v=>alpha=v);
  document.getElementById('bRun').addEventListener('click',e=>{running=!running; e.target.textContent=running?'Pause':'Resume';});
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
