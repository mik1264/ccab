<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmoothLife — Deluxe ABM</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream); letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ 55</span>
  <h2>SmoothLife</h2>
  <p>Rafler's continuous Game of Life: averages over an inner disk (radius r_i) and an outer annulus (r_a) decide a smooth birth/death rule. Soft, drifting blobs emerge.</p>

  <div class="control"><label>Outer radius r_a <span id="vRa">11.0</span></label><input type="range" id="iRa" min="6" max="18" step="0.5" value="11.0" /></div>
  <div class="control"><label>Smoothness s <span id="vS">0.030</span></label><input type="range" id="iS" min="0.005" max="0.10" step="0.005" value="0.030" /></div>
  <div class="control"><label>dt <span id="vDt">0.20</span></label><input type="range" id="iDt" min="0.05" max="0.50" step="0.01" value="0.20" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="11,0.030">Drifters</button>
    <button class="p" data-p="14,0.020">Big blobs</button>
    <button class="p" data-p="8,0.060">Fizz</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Frame</span><span class="v" id="sFr">0</span></div>
  <div class="stat"><span>Mean A</span><span class="v" id="sM">—</span></div>
  <div class="stat"><span>Active blobs</span><span class="v" id="sB">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  const N = 220;
  let A = new Float32Array(N*N);
  let nextA = new Float32Array(N*N);

  // SmoothLife parameters
  let r_a = 11.0;        // outer radius
  let r_i = r_a / 3.0;   // inner radius (Rafler's choice ~ ra/3)
  let alpha_n = 0.030;   // smoothness for neighborhood
  let alpha_m = 0.150;   // smoothness for inner disk (m)
  let dt = 0.20;
  // Birth/death intervals
  const b1 = 0.278, b2 = 0.365, d1 = 0.267, d2 = 0.445;

  // Precomputed kernel offsets for inner disk and outer annulus
  let innerOff = [], outerOff = [];
  let innerArea = 0, outerArea = 0;

  function buildKernel() {
    innerOff = []; outerOff = [];
    innerArea = 0; outerArea = 0;
    const R = Math.ceil(r_a) + 1;
    const ri2 = r_i*r_i, ra2 = r_a*r_a;
    const sm = 0.6; // antialias band
    for (let dy=-R; dy<=R; dy++) {
      for (let dx=-R; dx<=R; dx++) {
        const d = Math.sqrt(dx*dx+dy*dy);
        // smoothstep weights
        const wInner = 1 - smoothstep(r_i - sm, r_i + sm, d);
        const wOuter = smoothstep(r_i - sm, r_i + sm, d) * (1 - smoothstep(r_a - sm, r_a + sm, d));
        if (wInner > 0.001) { innerOff.push(dx, dy, wInner); innerArea += wInner; }
        if (wOuter > 0.001) { outerOff.push(dx, dy, wOuter); outerArea += wOuter; }
      }
    }
  }
  function smoothstep(a,b,x){ const t=Math.max(0,Math.min(1,(x-a)/(b-a))); return t*t*(3-2*t); }

  // Sigmoid functions for SmoothLife rule
  function sigm(x, a, alpha) { return 1.0/(1.0+Math.exp(-(x-a)*4.0/alpha)); }
  function sigmA(x, a, b) { return sigm(x,a,alpha_n)*(1-sigm(x,b,alpha_n)); }
  function sigmM(x,y,m) { return x*(1-sigm(m,0.5,alpha_m)) + y*sigm(m,0.5,alpha_m); }
  function S(n,m) {
    const aliveLow = sigmM(b1, d1, m);
    const aliveHigh = sigmM(b2, d2, m);
    return sigmA(n, aliveLow, aliveHigh);
  }

  let running = true, frame = 0;
  const img = new ImageData(N, N);

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = true;
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    A.fill(0);
    // Random patches of high density
    const patches = 16;
    for (let p=0; p<patches; p++) {
      const cx = (Math.random()*N)|0, cy = (Math.random()*N)|0;
      const rr = 6 + Math.random()*8;
      for (let r=-Math.ceil(rr); r<=Math.ceil(rr); r++) {
        for (let c=-Math.ceil(rr); c<=Math.ceil(rr); c++) {
          if (r*r+c*c > rr*rr) continue;
          const i = ((cy+r+N)%N)*N + (cx+c+N)%N;
          A[i] = Math.random();
        }
      }
    }
    frame = 0;
  }

  function step() {
    // For each cell, compute n (outer annulus avg) and m (inner disk avg), then update
    for (let y=0; y<N; y++) {
      for (let x=0; x<N; x++) {
        let mSum = 0, nSum = 0;
        for (let k=0; k<innerOff.length; k+=3) {
          const dx = innerOff[k], dy = innerOff[k+1], w = innerOff[k+2];
          mSum += A[((y+dy+N)%N)*N + (x+dx+N)%N] * w;
        }
        for (let k=0; k<outerOff.length; k+=3) {
          const dx = outerOff[k], dy = outerOff[k+1], w = outerOff[k+2];
          nSum += A[((y+dy+N)%N)*N + (x+dx+N)%N] * w;
        }
        const m = mSum/innerArea, n = nSum/outerArea;
        const target = 2*S(n,m) - 1;
        let v = A[y*N+x] + dt*target;
        if (v < 0) v = 0; if (v > 1) v = 1;
        nextA[y*N+x] = v;
      }
    }
    [A, nextA] = [nextA, A];
  }

  // Viridis-like colormap
  function colormap(t) {
    t = Math.max(0,Math.min(1,t));
    const r = Math.round(255*(0.267 + 1.0*t*t - 0.5*t));
    const g = Math.round(255*(0.005 + 0.95*Math.pow(t, 0.7)));
    const b = Math.round(255*(0.33 + 0.6*Math.sin(t*Math.PI*0.9) - 0.4*t*t));
    return [Math.max(0,Math.min(255,r)), Math.max(0,Math.min(255,g)), Math.max(0,Math.min(255,b))];
  }

  function render() {
    let sum = 0, blobs = 0;
    const data = img.data;
    for (let i=0;i<N*N;i++) {
      sum += A[i];
      if (A[i] > 0.5) blobs++;
      const c = colormap(A[i]);
      const j = i*4;
      data[j]=c[0]; data[j+1]=c[1]; data[j+2]=c[2]; data[j+3]=255;
    }
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
    const size = Math.min(W, H) * 0.92;
    const ox = (W - size)/2, oy = (H - size)/2;
    const off = render._off || (render._off = document.createElement('canvas'));
    off.width = N; off.height = N;
    off.getContext('2d').putImageData(img, 0, 0);
    ctx.shadowColor = 'rgba(6,182,212,0.5)';
    ctx.shadowBlur = 22;
    ctx.drawImage(off, ox, oy, size, size);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(232,121,249,0.45)';
    ctx.lineWidth = 2;
    ctx.strokeRect(ox-1, oy-1, size+2, size+2);

    document.getElementById('sFr').textContent = frame;
    document.getElementById('sM').textContent = (sum/(N*N)).toFixed(3);
    document.getElementById('sB').textContent = blobs;
  }

  function loop() {
    if (running) { step(); frame++; }
    render();
    requestAnimationFrame(loop);
  }

  function bindRange(id, vid, cb, fmt=2) {
    const el = document.getElementById(id);
    el.addEventListener('input', e => {
      const v = +e.target.value;
      document.getElementById(vid).textContent = v.toFixed(fmt);
      cb(v);
    });
  }
  bindRange('iRa','vRa', v => { r_a = v; r_i = v/3.0; buildKernel(); }, 1);
  bindRange('iS','vS', v => { alpha_n = v; }, 3);
  bindRange('iDt','vDt', v => { dt = v; }, 2);

  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      const [a, s] = b.dataset.p.split(',').map(Number);
      r_a = a; r_i = a/3.0; alpha_n = s; buildKernel();
      document.getElementById('iRa').value = a;
      document.getElementById('iS').value = s;
      document.getElementById('vRa').textContent = a.toFixed(1);
      document.getElementById('vS').textContent = s.toFixed(3);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  cv.addEventListener('pointerdown', e => {
    const rect = cv.getBoundingClientRect();
    const size = Math.min(W, H) * 0.92;
    const ox = (W - size)/2, oy = (H - size)/2;
    const x = e.clientX - rect.left - ox;
    const y = e.clientY - rect.top - oy;
    const cx = Math.round(x/size*N), cy = Math.round(y/size*N);
    const rr = 8;
    for (let r=-rr; r<=rr; r++) for (let c=-rr; c<=rr; c++) {
      if (r*r+c*c>rr*rr) continue;
      const i = ((cy+r+N)%N)*N + (cx+c+N)%N;
      A[i] = Math.random()*0.6 + 0.4;
    }
  });

  buildKernel(); reset(); loop();
})();
</script>
</body>
</html>
