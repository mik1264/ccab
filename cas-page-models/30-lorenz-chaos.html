<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lorenz Chaos — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 30</span>
  <h2>Lorenz Chaos</h2>
  <p>dx/dt=σ(y−x), dy/dt=x(ρ−z)−y, dz/dt=xy−βz. The classical strange attractor — sensitivity to initial conditions yields deterministic chaos.</p>

  <div class="control"><label>σ <span id="vs">10.00</span></label><input type="range" id="iS" min="1" max="20" step="0.05" value="10" /></div>
  <div class="control"><label>ρ <span id="vr">28.00</span></label><input type="range" id="iR" min="1" max="50" step="0.1" value="28" /></div>
  <div class="control"><label>β <span id="vb">2.667</span></label><input type="range" id="iB" min="0.5" max="6" step="0.01" value="2.667" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>x</span><span class="v" id="sx">—</span></div>
  <div class="stat"><span>y</span><span class="v" id="sy">—</span></div>
  <div class="stat"><span>z</span><span class="v" id="sz">—</span></div>
  <div class="stat"><span>trace points</span><span class="v" id="sN">—</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize',resize); resize();

  const GRID='rgba(254,250,224,0.08)', AXIS='rgba(254,250,224,0.4)';

  let sigma=10, rho=28, beta=2.667;
  let x=1, y=1, z=1, t=0, running=true;
  const trace=[]; const TMAX=5000;
  const xseries=[]; const XSMAX=1500;
  const dt=0.005;

  function reset(){ x=1; y=1; z=1; t=0; trace.length=0; xseries.length=0; }

  function deriv(x,y,z){ return [sigma*(y-x), x*(rho-z)-y, x*y-beta*z]; }

  function rk4(){
    const k1=deriv(x,y,z);
    const k2=deriv(x+dt/2*k1[0], y+dt/2*k1[1], z+dt/2*k1[2]);
    const k3=deriv(x+dt/2*k2[0], y+dt/2*k2[1], z+dt/2*k2[2]);
    const k4=deriv(x+dt*k3[0],   y+dt*k3[1],   z+dt*k3[2]);
    x += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    y += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    z += dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
    t += dt;
  }

  function tick(){
    for(let i=0;i<8;i++) rk4();
    trace.push({x,y,z});
    if(trace.length>TMAX) trace.shift();
    xseries.push({t,x});
    if(xseries.length>XSMAX) xseries.shift();
    document.getElementById('st').textContent=t.toFixed(2);
    document.getElementById('sx').textContent=x.toFixed(2);
    document.getElementById('sy').textContent=y.toFixed(2);
    document.getElementById('sz').textContent=z.toFixed(2);
    document.getElementById('sN').textContent=trace.length;
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if(trace.length<2) return;
    const padL=70, padR=370, padT=60, padB=60;
    const totW=W-padL-padR;
    const phaseH = (H-padT-padB) * 0.62;
    const tsY0 = padT + phaseH + 40;
    const tsH = H-padB-tsY0;

    // === Phase plot (x vs z) ===
    let xmin=Infinity,xmax=-Infinity,zmin=Infinity,zmax=-Infinity;
    for(const p of trace){
      if(p.x<xmin) xmin=p.x; if(p.x>xmax) xmax=p.x;
      if(p.z<zmin) zmin=p.z; if(p.z>zmax) zmax=p.z;
    }
    const xpad=(xmax-xmin)*0.05+1, zpad=(zmax-zmin)*0.05+1;
    xmin-=xpad; xmax+=xpad; zmin-=zpad; zmax+=zpad;
    const xspan=xmax-xmin, zspan=zmax-zmin;

    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for(let i=0;i<=5;i++){
      const xp=padL+i*totW/5;
      ctx.beginPath(); ctx.moveTo(xp,padT); ctx.lineTo(xp,padT+phaseH); ctx.stroke();
      const yp=padT+i*phaseH/5;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
    }
    ctx.strokeStyle=AXIS;
    ctx.beginPath(); ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+phaseH); ctx.lineTo(padL+totW,padT+phaseH); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='12px Nunito';
    ctx.fillText('Lorenz attractor (x, z)', padL, padT-15);
    ctx.fillText('x', padL+totW-20, padT+phaseH+18);
    ctx.save(); ctx.translate(padL-30,padT+phaseH/2+15); ctx.rotate(-Math.PI/2); ctx.fillText('z',0,0); ctx.restore();

    // draw trace with fading
    const N=trace.length;
    for(let i=1;i<N;i++){
      const a=trace[i-1], b=trace[i];
      const px1 = padL + (a.x-xmin)/xspan*totW;
      const py1 = padT + phaseH - (a.z-zmin)/zspan*phaseH;
      const px2 = padL + (b.x-xmin)/xspan*totW;
      const py2 = padT + phaseH - (b.z-zmin)/zspan*phaseH;
      const fade = i/N;
      ctx.strokeStyle = `rgba(188,108,37,${0.05+fade*0.85})`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(px1,py1); ctx.lineTo(px2,py2); ctx.stroke();
    }
    // current point
    const last=trace[N-1];
    const cpx = padL + (last.x-xmin)/xspan*totW;
    const cpy = padT + phaseH - (last.z-zmin)/zspan*phaseH;
    ctx.fillStyle='#FEFAE0';
    ctx.beginPath(); ctx.arc(cpx,cpy,4,0,Math.PI*2); ctx.fill();

    // === time series of x ===
    if(xseries.length<2) return;
    const t0=xseries[0].t, t1=xseries[xseries.length-1].t;
    const tspan=Math.max(t1-t0,0.1);
    let xmn=Infinity,xmx=-Infinity;
    for(const s of xseries){ if(s.x<xmn) xmn=s.x; if(s.x>xmx) xmx=s.x; }
    const xs = xmx-xmn || 1;

    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for(let i=0;i<=4;i++){
      const yp=tsY0+i*tsH/4;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
    }
    ctx.strokeStyle=AXIS;
    ctx.beginPath(); ctx.moveTo(padL,tsY0); ctx.lineTo(padL,tsY0+tsH); ctx.lineTo(padL+totW,tsY0+tsH); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.6)';
    ctx.fillText('x(t)', padL, tsY0-12);
    ctx.fillText(xmx.toFixed(1), padL-35, tsY0+5);
    ctx.fillText(xmn.toFixed(1), padL-35, tsY0+tsH);

    ctx.strokeStyle='#8A9A5B'; ctx.lineWidth=1.6; ctx.beginPath();
    for(let i=0;i<xseries.length;i++){
      const s=xseries[i];
      const px=padL+(s.t-t0)/tspan*totW;
      const py=tsY0+tsH-(s.x-xmn)/xs*tsH;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      fn(v);
    });
  }
  bind('iS','vs',v=>sigma=v);
  bind('iR','vr',v=>rho=v);
  bind('iB','vb',v=>beta=v,3);
  document.getElementById('bRun').addEventListener('click',e=>{running=!running; e.target.textContent=running?'Pause':'Resume';});
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
