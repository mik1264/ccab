<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Three-Trophic Food Chain — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E; --cream:#FEFAE0; --terracotta:#BC6C25;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(330px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend { display:flex; gap:0.7rem; font-size:0.76rem; margin-top:0.5rem; flex-wrap:wrap; }
  .legend span::before { content:''; display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:middle; }
  .legend .x::before { background: var(--sage); }
  .legend .y::before { background: var(--earth); }
  .legend .z::before { background: var(--magenta); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 107</span>
  <h2>Three-Trophic Chain</h2>
  <p>Hastings-Powell food chain: resource x, consumer y, top predator z with Holling type-II responses. Three nonlinear ODEs can produce limit cycles, period-doubling, and chaos — strange attractors atop ecology.</p>

  <div class="control"><label>a₁ <span id="va1">5.00</span></label><input type="range" id="ia1" min="2" max="8" step="0.05" value="5.00" /></div>
  <div class="control"><label>b₁ <span id="vb1">3.00</span></label><input type="range" id="ib1" min="1.5" max="5" step="0.05" value="3.00" /></div>
  <div class="control"><label>a₂ <span id="va2">0.10</span></label><input type="range" id="ia2" min="0.05" max="0.4" step="0.005" value="0.10" /></div>
  <div class="control"><label>b₂ <span id="vb2">2.00</span></label><input type="range" id="ib2" min="1" max="4" step="0.05" value="2.00" /></div>
  <div class="control"><label>d₁ <span id="vd1">0.40</span></label><input type="range" id="id1" min="0.1" max="1" step="0.01" value="0.40" /></div>
  <div class="control"><label>d₂ <span id="vd2">0.01</span></label><input type="range" id="id2" min="0.005" max="0.1" step="0.001" value="0.01" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-p="5,3,0.10,2,0.4,0.01">Chaos</button>
    <button class="p" data-p="5,2.5,0.10,2,0.4,0.01">Cycle</button>
    <button class="p" data-p="5,3,0.06,2,0.4,0.01">Stable</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>x resource</span><span class="v" id="sx">—</span></div>
  <div class="stat"><span>y consumer</span><span class="v" id="sy">—</span></div>
  <div class="stat"><span>z top pred</span><span class="v" id="sz">—</span></div>
  <div class="legend"><span class="x">x</span><span class="y">y</span><span class="z">z</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c'); const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() { W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize', resize); resize();

  const SAGE='#8A9A5B', TERRA='#BC6C25', EARTH='#DDA15E', MAGENTA='#e879f9', CYAN='#06b6d4';
  const GRID='rgba(254,250,224,0.08)', AXIS='rgba(254,250,224,0.4)', TXT='rgba(254,250,224,0.7)';

  // Hastings-Powell 1991:
  // dx/dt = x(1-x) - a1 x y / (1 + b1 x)
  // dy/dt = a1 x y / (1+b1 x) - a2 y z / (1+b2 y) - d1 y
  // dz/dt = a2 y z / (1+b2 y) - d2 z
  let a1=5, b1=3, a2=0.1, b2=2, d1=0.4, d2=0.01;
  let x=0.7, y=0.16, z=9.9, t=0, running=true;
  const series=[]; const MAX=2000;

  function reset() { x=0.7; y=0.16; z=9.9; t=0; series.length=0; }

  function f(x,y,z) {
    const fxy = a1*x*y/(1+b1*x);
    const fyz = a2*y*z/(1+b2*y);
    return [ x*(1-x) - fxy, fxy - fyz - d1*y, fyz - d2*z ];
  }
  function rk4(dt) {
    const k1=f(x,y,z);
    const k2=f(x+dt/2*k1[0], y+dt/2*k1[1], z+dt/2*k1[2]);
    const k3=f(x+dt/2*k2[0], y+dt/2*k2[1], z+dt/2*k2[2]);
    const k4=f(x+dt*k3[0], y+dt*k3[1], z+dt*k3[2]);
    x += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    y += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    z += dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
    if (x<0) x=0; if (y<0) y=0; if (z<0) z=0;
    t += dt;
  }

  function step() { for (let i=0;i<3;i++) rk4(0.05); series.push([t,x,y,z]); if (series.length>MAX) series.shift(); }

  function drawAxes(x,y,w,h,title,xl,yl) {
    ctx.strokeStyle = GRID; ctx.lineWidth=1;
    for (let i=1;i<4;i++) { const py=y+i*h/4; ctx.beginPath(); ctx.moveTo(x,py); ctx.lineTo(x+w,py); ctx.stroke(); }
    ctx.strokeStyle = AXIS; ctx.beginPath();
    ctx.moveTo(x,y); ctx.lineTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    ctx.fillStyle = TXT; ctx.font='12px Nunito'; ctx.fillText(title, x, y-10);
    ctx.font='10px Nunito'; ctx.fillStyle='rgba(254,250,224,0.5)';
    ctx.fillText(xl, x+w-30, y+h+18);
    ctx.save(); ctx.translate(x-44, y+h/2+10); ctx.rotate(-Math.PI/2); ctx.fillText(yl,0,0); ctx.restore();
  }

  function colorByZ(zv, zmin, zmax) {
    const t = zmax>zmin ? (zv-zmin)/(zmax-zmin) : 0.5;
    // gradient sage → magenta
    const r = Math.round(0x8A + (0xe8-0x8A)*t);
    const g = Math.round(0x9A + (0x79-0x9A)*t);
    const b = Math.round(0x5B + (0xf9-0x5B)*t);
    return `rgb(${r},${g},${b})`;
  }

  function draw() {
    ctx.fillStyle = '#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=370, padT=60, padG=50;
    const col = W - padL - padR;
    const rowH = (H - padT - padG - 50)/2;

    // Time series — three lines
    let y0 = padT;
    drawAxes(padL, y0, col, rowH, 'Three-trophic time series', 't', 'value');
    if (series.length>1) {
      const t0=series[0][0], t1=series[series.length-1][0]; const tspan=Math.max(t1-t0,1);
      let mxX=0,mxY=0,mxZ=0;
      for (const s of series) { if (s[1]>mxX) mxX=s[1]; if (s[2]>mxY) mxY=s[2]; if (s[3]>mxZ) mxZ=s[3]; }
      const mx = Math.max(mxX, mxY*5, mxZ); // visual scaling
      // y scaled to similar magnitude as z to share axis
      function plot(idx, color, scale=1) {
        ctx.shadowColor=color; ctx.shadowBlur=8; ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath();
        for (let i=0;i<series.length;i++) {
          const px = padL + (series[i][0]-t0)/tspan*col;
          const py = y0+rowH - (series[i][idx]*scale)/mx*rowH;
          if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.stroke(); ctx.shadowBlur=0;
      }
      plot(1, SAGE, 1);
      plot(2, EARTH, 5);
      plot(3, MAGENTA, 1);
    }

    // Phase portrait (x,y) with z color
    y0 = padT + rowH + padG;
    const sq = Math.min(col, rowH);
    drawAxes(padL, y0, sq, sq, 'Phase portrait (x, y) — color = z (top predator)', 'x', 'y');
    if (series.length>2) {
      let mxX=0,mxY=0,mxZ=0,mnZ=Infinity;
      for (const s of series) {
        if (s[1]>mxX) mxX=s[1]; if (s[2]>mxY) mxY=s[2];
        if (s[3]>mxZ) mxZ=s[3]; if (s[3]<mnZ) mnZ=s[3];
      }
      mxX=Math.max(mxX,1); mxY=Math.max(mxY,0.4);
      const sxX = sq/mxX, syY = sq/mxY;
      ctx.lineWidth=1.6;
      for (let i=1;i<series.length;i++) {
        ctx.strokeStyle = colorByZ(series[i][3], mnZ, mxZ);
        ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur=4;
        ctx.beginPath();
        ctx.moveTo(padL+series[i-1][1]*sxX, y0+sq-series[i-1][2]*syY);
        ctx.lineTo(padL+series[i][1]*sxX, y0+sq-series[i][2]*syY);
        ctx.stroke();
      }
      ctx.shadowBlur=0;
      // current point
      ctx.fillStyle=EARTH; ctx.shadowColor=EARTH; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.arc(padL+x*sxX, y0+sq-y*syY, 5, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
      // z legend (small color bar)
      const cbX=padL+sq+12, cbY=y0, cbW=14, cbH=sq;
      const grad = ctx.createLinearGradient(0, cbY+cbH, 0, cbY);
      grad.addColorStop(0, SAGE); grad.addColorStop(1, MAGENTA);
      ctx.fillStyle=grad; ctx.fillRect(cbX, cbY, cbW, cbH);
      ctx.strokeStyle=AXIS; ctx.strokeRect(cbX, cbY, cbW, cbH);
      ctx.fillStyle=TXT; ctx.font='10px Nunito';
      ctx.fillText(mxZ.toFixed(1), cbX+cbW+4, cbY+8);
      ctx.fillText(mnZ.toFixed(1), cbX+cbW+4, cbY+cbH);
      ctx.fillText('z', cbX+1, cbY-4);
    }

    document.getElementById('st').textContent = t.toFixed(1);
    document.getElementById('sx').textContent = x.toFixed(3);
    document.getElementById('sy').textContent = y.toFixed(3);
    document.getElementById('sz').textContent = z.toFixed(2);
  }

  function loop() { if (running) step(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,setter,dec=2) {
    document.getElementById(id).addEventListener('input', e => {
      const v=+e.target.value;
      let txt = v.toFixed(dec);
      if (id==='id2' || id==='ia2') txt = v.toFixed(3);
      document.getElementById(vid).textContent = txt;
      setter(v);
    });
  }
  bind('ia1','va1', v=>{ a1=v; });
  bind('ib1','vb1', v=>{ b1=v; });
  bind('ia2','va2', v=>{ a2=v; }, 3);
  bind('ib2','vb2', v=>{ b2=v; });
  bind('id1','vd1', v=>{ d1=v; });
  bind('id2','vd2', v=>{ d2=v; }, 3);

  document.querySelectorAll('button.p').forEach(b => {
    b.addEventListener('click', () => {
      const v=b.dataset.p.split(',').map(Number);
      a1=v[0]; b1=v[1]; a2=v[2]; b2=v[3]; d1=v[4]; d2=v[5];
      ['ia1','ib1','ia2','ib2','id1','id2'].forEach((id,i)=>{ document.getElementById(id).value=v[i]; });
      ['va1','vb1','va2','vb2','vd1','vd2'].forEach((id,i)=>{
        document.getElementById(id).textContent = (id==='va2'||id==='vd2')?v[i].toFixed(3):v[i].toFixed(2);
      });
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => { running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
