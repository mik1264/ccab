<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solow with Population Growth — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; padding:8px 16px;
    background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw);
    background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.5rem; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream);
    border: none; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Solow + Population</h2>
  <p>Capital per worker k=K/L follows dk/dt = s·f(k) − (n+δ)·k with f(k)=A·k^α. Steady state k* where saving curve meets the break-even line (n+δ)k. Faster pop growth lowers k*.</p>

  <div class="control"><label>s saving rate <span id="vs">0.25</span></label><input type="range" id="is" min="0.05" max="0.6" step="0.005" value="0.25" /></div>
  <div class="control"><label>n pop growth <span id="vn">0.020</span></label><input type="range" id="in" min="0" max="0.06" step="0.001" value="0.02" /></div>
  <div class="control"><label>δ depreciation <span id="vd">0.05</span></label><input type="range" id="id" min="0.01" max="0.15" step="0.005" value="0.05" /></div>
  <div class="control"><label>α capital share <span id="va">0.33</span></label><input type="range" id="ia" min="0.15" max="0.7" step="0.01" value="0.33" /></div>
  <div class="control"><label>A productivity <span id="vA">1.00</span></label><input type="range" id="iA" min="0.4" max="3" step="0.05" value="1.0" /></div>

  <div class="btnrow">
    <button class="p" data-p="0.25,0.02,0.05,0.33,1">Baseline</button>
    <button class="p" data-p="0.45,0.01,0.05,0.33,1">High save</button>
    <button class="p" data-p="0.20,0.045,0.05,0.33,1">Pop boom</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>k</span><span class="v" id="sk">—</span></div>
  <div class="stat"><span>k* (steady)</span><span class="v" id="skstar">—</span></div>
  <div class="stat"><span>y = f(k)</span><span class="v" id="sy">—</span></div>
  <div class="stat"><span>dk/dt</span><span class="v" id="sdk">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c'); const ctx = cv.getContext('2d');
  let W=0,H=0; const dpr = Math.min(window.devicePixelRatio||1, 2);
  function resize() { W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize', resize); resize();

  const SAGE='#8A9A5B', TER='#BC6C25', EARTH='#DDA15E', MAG='#e879f9', CY='#06b6d4', GRID='rgba(254,250,224,0.08)', AXIS='rgba(254,250,224,0.45)';

  let s=0.25, n=0.02, delta=0.05, alpha=0.33, A=1.0;
  let k=0.5, t=0, running=true;
  const series=[]; const MAX=1500;

  function f(kk){ return A*Math.pow(Math.max(kk,1e-9), alpha); }
  function dkdt(kk){ return s*f(kk) - (n+delta)*kk; }
  function kstar(){ // s·A·k^α = (n+δ)·k => k = (s·A/(n+δ))^(1/(1-α))
    return Math.pow(s*A/(n+delta), 1/(1-alpha));
  }
  function reset(){ k=0.5; t=0; series.length=0; }
  function rk4(dt){
    const k1=dkdt(k);
    const k2=dkdt(k+dt/2*k1);
    const k3=dkdt(k+dt/2*k2);
    const k4=dkdt(k+dt*k3);
    k += dt/6*(k1+2*k2+2*k3+k4);
    if(k<0) k=0;
    t += dt;
  }
  function tick(){
    for(let i=0;i<2;i++) rk4(0.25);
    series.push({t,k,y:f(k),dk:dkdt(k)});
    if (series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(1);
    document.getElementById('sk').textContent=k.toFixed(3);
    document.getElementById('skstar').textContent=kstar().toFixed(3);
    document.getElementById('sy').textContent=f(k).toFixed(3);
    document.getElementById('sdk').textContent=dkdt(k).toFixed(4);
  }

  function drawAxes(x,y,w,h,title){
    ctx.strokeStyle=AXIS; ctx.lineWidth=1; ctx.beginPath();
    ctx.moveTo(x,y); ctx.lineTo(x,y+h); ctx.lineTo(x+w,y+h); ctx.stroke();
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText(title, x, y-8);
  }

  function draw(){
    ctx.fillStyle = '#06080d'; ctx.fillRect(0,0,W,H);
    if (series.length<2) return;

    const padR = 360;
    const totW = W - padR - 80;
    const colW = totW/2 - 20;

    // === Top-left: Solow diagram (saving vs break-even) ===
    const x0=60, y0=60, w0=colW, h0=H*0.42;
    const ks = kstar();
    const kmax = Math.max(ks*1.6, k*1.4, 1);
    const ymax = Math.max(s*f(kmax), (n+delta)*kmax)*1.1 + 0.02;
    drawAxes(x0,y0,w0,h0,'Solow diagram: s·f(k) vs (n+δ)·k');

    // grid
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const yp=y0+i*h0/5; ctx.beginPath(); ctx.moveTo(x0,yp); ctx.lineTo(x0+w0,yp); ctx.stroke(); }

    // production y=f(k)
    ctx.strokeStyle=EARTH; ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<=200;i++){
      const kk=i/200*kmax; const yy=f(kk);
      const px=x0+kk/kmax*w0; const py=y0+h0-Math.min(yy,ymax)/ymax*h0;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();

    // saving curve s·f(k)
    ctx.strokeStyle=SAGE; ctx.lineWidth=2.5;
    ctx.beginPath();
    for(let i=0;i<=200;i++){
      const kk=i/200*kmax; const yy=s*f(kk);
      const px=x0+kk/kmax*w0; const py=y0+h0-yy/ymax*h0;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();

    // break-even (n+δ)·k
    ctx.strokeStyle=MAG; ctx.lineWidth=2.5;
    ctx.beginPath();
    const slope=(n+delta);
    ctx.moveTo(x0,y0+h0);
    ctx.lineTo(x0+w0, y0+h0-slope*kmax/ymax*h0);
    ctx.stroke();

    // k* dot
    const ks_x = x0+ks/kmax*w0;
    const ks_y = y0+h0-(n+delta)*ks/ymax*h0;
    ctx.fillStyle=MAG; ctx.beginPath(); ctx.arc(ks_x,ks_y,5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(232,121,249,0.4)'; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(ks_x,y0+h0); ctx.lineTo(ks_x,ks_y); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=MAG; ctx.font='12px Nunito'; ctx.fillText('k* = '+ks.toFixed(2), ks_x+6, ks_y-8);

    // current k
    const ck_x = x0+Math.min(k,kmax)/kmax*w0;
    ctx.fillStyle=CY; ctx.beginPath(); ctx.arc(ck_x, y0+h0-s*f(k)/ymax*h0,5,0,Math.PI*2); ctx.fill();

    // legend
    ctx.font='11px Nunito';
    ctx.fillStyle=EARTH; ctx.fillText('— y=f(k)', x0+w0-160, y0+18);
    ctx.fillStyle=SAGE; ctx.fillText('— s·f(k)', x0+w0-160, y0+34);
    ctx.fillStyle=MAG;  ctx.fillText('— (n+δ)·k', x0+w0-160, y0+50);
    ctx.fillStyle='rgba(254,250,224,0.55)'; ctx.fillText('k', x0+w0-12, y0+h0+16);

    // === Top-right: phase line dk/dt vs k ===
    const x1=x0+w0+40, y1=y0, w1=colW, h1=h0;
    drawAxes(x1,y1,w1,h1,'Phase line dk/dt vs k');
    let dmin=0,dmax=0;
    for(let i=0;i<=120;i++){ const kk=i/120*kmax; const d=dkdt(kk); if(d<dmin)dmin=d; if(d>dmax)dmax=d; }
    const drange=Math.max(dmax-dmin,1e-6);
    // zero line
    const zy=y1+h1-(0-dmin)/drange*h1;
    ctx.strokeStyle='rgba(254,250,224,0.3)'; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(x1,zy); ctx.lineTo(x1+w1,zy); ctx.stroke(); ctx.setLineDash([]);
    // dk/dt curve
    ctx.strokeStyle=CY; ctx.lineWidth=2.5; ctx.beginPath();
    for(let i=0;i<=200;i++){
      const kk=i/200*kmax; const d=dkdt(kk);
      const px=x1+kk/kmax*w1; const py=y1+h1-(d-dmin)/drange*h1;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    // arrows along axis showing direction
    ctx.fillStyle='rgba(232,121,249,0.7)';
    for(let i=1;i<10;i++){
      const kk=(i/10)*kmax; const d=dkdt(kk);
      const px=x1+kk/kmax*w1;
      const ay=y1+h1-(0-dmin)/drange*h1+12;
      ctx.beginPath();
      if(d>0){ ctx.moveTo(px-5,ay); ctx.lineTo(px+5,ay); ctx.lineTo(px+5-3,ay-3); ctx.moveTo(px+5,ay); ctx.lineTo(px+5-3,ay+3);}
      else if(d<0){ ctx.moveTo(px+5,ay); ctx.lineTo(px-5,ay); ctx.lineTo(px-5+3,ay-3); ctx.moveTo(px-5,ay); ctx.lineTo(px-5+3,ay+3);}
      ctx.stroke();
    }
    // current k
    ctx.fillStyle=CY;
    const cx=x1+Math.min(k,kmax)/kmax*w1; const cy=y1+h1-(dkdt(k)-dmin)/drange*h1;
    ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2); ctx.fill();
    // k* on phase line
    ctx.fillStyle=MAG;
    const ksx2=x1+ks/kmax*w1;
    ctx.beginPath(); ctx.arc(ksx2,zy,5,0,Math.PI*2); ctx.fill();

    // === Bottom: time series ===
    const x2=60, y2=y0+h0+70, w2=totW, h2=H-y2-50;
    drawAxes(x2,y2,w2,h2,'k(t) and y(t) over time');
    let kmaxT=0.1, ymaxT=0.1;
    for(const p of series){ if(p.k>kmaxT)kmaxT=p.k; if(p.y>ymaxT)ymaxT=p.y; }
    kmaxT=Math.max(kmaxT, ks*1.2);
    const t0=series[0].t, t1s=series[series.length-1].t, tspan=Math.max(t1s-t0,1);
    // grid
    ctx.strokeStyle=GRID;
    for(let i=1;i<5;i++){ const yp=y2+i*h2/5; ctx.beginPath(); ctx.moveTo(x2,yp); ctx.lineTo(x2+w2,yp); ctx.stroke(); }
    // k* line
    ctx.strokeStyle='rgba(232,121,249,0.5)'; ctx.setLineDash([4,4]);
    const ksy=y2+h2-ks/kmaxT*h2;
    ctx.beginPath(); ctx.moveTo(x2,ksy); ctx.lineTo(x2+w2,ksy); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=MAG; ctx.font='11px Nunito'; ctx.fillText('k*', x2+w2-22, ksy-4);

    // k curve
    ctx.strokeStyle=SAGE; ctx.lineWidth=2.5; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const p=series[i]; const px=x2+(p.t-t0)/tspan*w2; const py=y2+h2-p.k/kmaxT*h2;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke();
    // y curve scaled to its own max
    ctx.strokeStyle=EARTH; ctx.lineWidth=2; ctx.beginPath();
    for(let i=0;i<series.length;i++){
      const p=series[i]; const px=x2+(p.t-t0)/tspan*w2; const py=y2+h2-p.y/ymaxT*h2;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    } ctx.stroke();
    ctx.font='11px Nunito';
    ctx.fillStyle=SAGE; ctx.fillText('— k', x2+12, y2+18);
    ctx.fillStyle=EARTH; ctx.fillText('— y', x2+50, y2+18);
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,d=2){ const el=document.getElementById(id);
    el.addEventListener('input', e=>{ const v=+e.target.value; document.getElementById(vid).textContent=v.toFixed(d); fn(v); });
  }
  bind('is','vs',v=>s=v,3); bind('in','vn',v=>n=v,3); bind('id','vd',v=>delta=v,3);
  bind('ia','va',v=>alpha=v,2); bind('iA','vA',v=>A=v,2);

  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click', ()=>{
      const p=b.dataset.p.split(',').map(Number);
      s=p[0]; n=p[1]; delta=p[2]; alpha=p[3]; A=p[4];
      ['is','in','id','ia','iA'].forEach((id,i)=>{ document.getElementById(id).value=p[i]; });
      ['vs','vn','vd','va','vA'].forEach((id,i)=>{ const d=(i===0||i>=3)?(i===0?3:2):3; document.getElementById(id).textContent=p[i].toFixed(d); });
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{ running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
