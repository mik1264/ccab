<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logistic Map — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ 100</span>
  <h2>Logistic Map</h2>
  <p>x_{n+1} = r·x_n·(1 − x_n). The bifurcation diagram is the route to chaos: period-doubling cascades at Feigenbaum's δ ≈ 4.669, then chaos with periodic windows. Cobweb shows iteration; bifurcation diagram is precomputed.</p>

  <div class="control"><label>r <span id="vr">3.700</span></label><input id="ir" type="range" min="2.4" max="4" step="0.001" value="3.700" /></div>
  <div class="control"><label>x₀ <span id="vx">0.300</span></label><input id="ix" type="range" min="0.01" max="0.99" step="0.005" value="0.300" /></div>
  <div class="control"><label>steps/frame <span id="vs">1</span></label><input id="is" type="range" min="1" max="20" step="1" value="1" /></div>

  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-r="2.9">Period-1</button>
    <button class="p" data-r="3.2">Period-2</button>
    <button class="p" data-r="3.5">Period-4</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.5rem;">
    <button class="p" data-r="3.83">Period-3</button>
    <button class="p" data-r="3.7">Chaos</button>
    <button class="p" data-r="4">Full</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>n</span><span class="v" id="sn">0</span></div>
  <div class="stat"><span>x_n</span><span class="v" id="sx">—</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0); bifurcationDirty=true;}
  addEventListener('resize',resize); resize();

  let r=3.7, x0=0.3, stepsPerFrame=1;
  let x=x0, n=0, running=true;
  const cobweb=[]; const COB_MAX=400;
  const series=[]; const SER_MAX=300;

  // bifurcation cache (rendered to offscreen canvas, redrawn lazily)
  let bifCanvas=null, bifCtx=null, bifurcationDirty=true;

  function reset(){ x=x0; n=0; cobweb.length=0; series.length=0; }

  function tick(){
    for (let i=0;i<stepsPerFrame;i++){
      const xn = r*x*(1-x);
      cobweb.push({x, y:x}); cobweb.push({x, y:xn}); cobweb.push({x:xn, y:xn});
      while (cobweb.length>COB_MAX) cobweb.shift();
      x = xn; n++;
      series.push({n, x});
      while (series.length>SER_MAX) series.shift();
    }
    document.getElementById('sn').textContent=n;
    document.getElementById('sx').textContent=x.toFixed(5);
  }

  function drawBifurcation(){
    if (!bifCanvas){ bifCanvas=document.createElement('canvas'); bifCtx=bifCanvas.getContext('2d'); }
    const padL=70, padR=360, padT=60, padB=60;
    const totW = W-padL-padR;
    const bW = Math.floor(totW), bH = Math.floor((H-padT-padB-30)*0.45);
    if (bW<=0 || bH<=0) return;
    bifCanvas.width = bW; bifCanvas.height = bH;
    bifCtx.fillStyle='#06080d'; bifCtx.fillRect(0,0,bW,bH);

    const rMin=2.4, rMax=4.0;
    const skip=200, plot=120;
    const img = bifCtx.createImageData(bW, bH);
    const data = img.data;
    for (let i=0;i<data.length;i+=4){data[i]=6; data[i+1]=8; data[i+2]=13; data[i+3]=255;}
    for (let px=0; px<bW; px++){
      const rr = rMin + (rMax-rMin)*px/(bW-1);
      let xx=0.4;
      for (let i=0;i<skip;i++) xx = rr*xx*(1-xx);
      for (let i=0;i<plot;i++){
        xx = rr*xx*(1-xx);
        const py = Math.floor((1-xx)*(bH-1));
        if (py>=0 && py<bH){
          const j=(py*bW+px)*4;
          // cyan-magenta
          data[j  ] = Math.min(255, data[j  ]+30);
          data[j+1] = Math.min(255, data[j+1]+50);
          data[j+2] = Math.min(255, data[j+2]+90);
        }
      }
    }
    bifCtx.putImageData(img, 0, 0);
    bifurcationDirty=false;
  }

  function draw(){
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=360, padT=60, padB=60;
    const totW = W-padL-padR;
    const upH = (H-padT-padB-30)*0.5;
    const cobSize = Math.min(totW*0.42, upH);
    const cobX = padL, cobY = padT;
    const tsX = cobX+cobSize+30, tsY = padT, tsW = totW-cobSize-30, tsH = cobSize;
    const bifX = padL, bifY = padT+upH+30, bifW = totW, bifH = (H-padT-padB-30)*0.45;

    // Cobweb plot
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='12px Nunito';
    ctx.fillText('Cobweb: y = rx(1−x) + diagonal', cobX, cobY-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(cobX, cobY, cobSize, cobSize);

    // y=x diagonal
    ctx.strokeStyle='rgba(254,250,224,0.25)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cobX, cobY+cobSize); ctx.lineTo(cobX+cobSize, cobY); ctx.stroke();
    // parabola
    ctx.shadowBlur=6; ctx.shadowColor='#fb923c';
    ctx.strokeStyle='#fb923c'; ctx.lineWidth=2;
    ctx.beginPath();
    for (let i=0;i<=200;i++){
      const xx=i/200, yy=r*xx*(1-xx);
      const px=cobX+xx*cobSize, py=cobY+cobSize-yy*cobSize;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    ctx.shadowBlur=0;

    // cobweb path
    if (cobweb.length>1){
      ctx.shadowBlur=6; ctx.shadowColor='#06b6d4';
      ctx.strokeStyle='#06b6d4'; ctx.lineWidth=1.5;
      ctx.beginPath();
      for (let i=0;i<cobweb.length;i++){
        const c=cobweb[i];
        const px=cobX+c.x*cobSize;
        const py=cobY+cobSize-c.y*cobSize;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
      ctx.shadowBlur=0;
      // current
      const last=cobweb[cobweb.length-1];
      ctx.fillStyle='#fff'; ctx.shadowBlur=12; ctx.shadowColor='#e879f9';
      ctx.beginPath(); ctx.arc(cobX+last.x*cobSize, cobY+cobSize-last.y*cobSize, 4, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }
    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('0', cobX-12, cobY+cobSize+4);
    ctx.fillText('1', cobX+cobSize, cobY+cobSize+14);
    ctx.fillText('1', cobX-12, cobY+8);

    // Time series x_n vs n
    ctx.fillStyle='rgba(254,250,224,0.7)';
    ctx.fillText('x_n vs n', tsX, tsY-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)';
    ctx.strokeRect(tsX,tsY,tsW,tsH);
    ctx.strokeStyle='rgba(254,250,224,0.15)';
    ctx.beginPath(); ctx.moveTo(tsX, tsY+tsH/2); ctx.lineTo(tsX+tsW, tsY+tsH/2); ctx.stroke();
    if (series.length>1){
      ctx.shadowBlur=6; ctx.shadowColor='#e879f9';
      ctx.strokeStyle='#e879f9'; ctx.lineWidth=1.4;
      ctx.beginPath();
      const n0=series[0].n, n1=series[series.length-1].n, nspan=Math.max(n1-n0,1);
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=tsX+(s.n-n0)/nspan*tsW;
        const py=tsY+tsH-s.x*tsH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
      ctx.shadowBlur=0;
      // dots
      ctx.fillStyle='#06b6d4';
      for (const s of series){
        const px=tsX+(s.n-n0)/nspan*tsW;
        const py=tsY+tsH-s.x*tsH;
        ctx.beginPath(); ctx.arc(px,py,1.5,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('1', tsX-12, tsY+8);
    ctx.fillText('0', tsX-12, tsY+tsH+4);

    // Bifurcation diagram with current r highlighted
    ctx.fillStyle='rgba(254,250,224,0.7)';
    ctx.fillText('Bifurcation diagram (r ∈ [2.4, 4.0]) — current r highlighted', bifX, bifY-12);
    ctx.strokeStyle='rgba(254,250,224,0.3)';
    ctx.strokeRect(bifX, bifY, bifW, bifH);

    if (bifurcationDirty || !bifCanvas) drawBifurcation();
    if (bifCanvas) ctx.drawImage(bifCanvas, bifX, bifY, bifW, bifH);

    // r marker
    const rMin=2.4, rMax=4.0;
    const rX = bifX + (r-rMin)/(rMax-rMin)*bifW;
    ctx.strokeStyle='#fb923c'; ctx.lineWidth=2;
    ctx.shadowBlur=10; ctx.shadowColor='#fb923c';
    ctx.beginPath(); ctx.moveTo(rX, bifY); ctx.lineTo(rX, bifY+bifH); ctx.stroke();
    ctx.shadowBlur=0;
    // current x dot
    const xy = bifY + (1-x)*bifH;
    ctx.fillStyle='#fff'; ctx.shadowBlur=12; ctx.shadowColor='#fb923c';
    ctx.beginPath(); ctx.arc(rX, xy, 4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // r-axis labels
    ctx.fillStyle='rgba(254,250,224,0.55)'; ctx.font='11px Nunito';
    for (const lbl of [2.4, 3.0, 3.5, 3.57, 3.83, 4.0]){
      const px = bifX + (lbl-rMin)/(rMax-rMin)*bifW;
      ctx.beginPath(); ctx.moveTo(px, bifY+bifH); ctx.lineTo(px, bifY+bifH+4);
      ctx.strokeStyle='rgba(254,250,224,0.4)'; ctx.stroke();
      ctx.fillText(lbl.toFixed(2), px-12, bifY+bifH+16);
    }
    ctx.fillText('r = '+r.toFixed(3), rX+6, bifY+12);
  }

  function loop(){ if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,prop,d=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{ const v=+e.target.value; document.getElementById(vid).textContent=id==='is'?v:v.toFixed(d);
      if (prop==='r') {r=v; reset();}
      if (prop==='x') {x0=v;}
      if (prop==='s') stepsPerFrame=v;
    });
  }
  bind('ir','vr','r',3); bind('ix','vx','x',3); bind('is','vs','s',0);
  document.querySelectorAll('.p').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const pr=+btn.dataset.r;
      r=pr;
      document.getElementById('ir').value=pr; document.getElementById('vr').textContent=pr.toFixed(3);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{ running=!running; e.target.textContent=running?'Pause':'Resume'; });
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); loop();
})();
</script>
</body>
</html>
