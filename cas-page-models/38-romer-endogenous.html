<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Romer Endogenous Growth — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(330px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.7rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.2rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend { display:flex; gap:0.7rem; font-size:0.74rem; margin-top:0.4rem; flex-wrap:wrap; }
  .legend span::before {
    content:''; display:inline-block; width:10px; height:10px;
    border-radius:3px; margin-right:5px; vertical-align: middle;
  }
  .legend .Y::before { background: var(--earth); }
  .legend .K::before { background: var(--sage); }
  .legend .A::before { background: var(--terracotta); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 38</span>
  <h2>Romer Endogenous Growth</h2>
  <p>Y = K<sup>α</sup>(A·L<sub>Y</sub>)<sup>1−α</sup>. Knowledge: dA/dt = δ·A·L<sub>A</sub>. Capital: dK/dt = sY − ηK. With L=L<sub>Y</sub>+L<sub>A</sub>, putting people into research drives sustained growth in both Y and A.</p>

  <div class="control"><label>research share L_A/L <span id="vL">0.20</span></label><input type="range" id="iL" min="0.00" max="0.60" step="0.01" value="0.20" /></div>
  <div class="control"><label>savings s <span id="vS">0.20</span></label><input type="range" id="iS" min="0.05" max="0.50" step="0.01" value="0.20" /></div>
  <div class="control"><label>research productivity δ <span id="vD">0.030</span></label><input type="range" id="iD" min="0.000" max="0.100" step="0.001" value="0.030" /></div>
  <div class="control"><label>capital share α <span id="vA">0.33</span></label><input type="range" id="iA" min="0.10" max="0.70" step="0.01" value="0.33" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>year</span><span class="v" id="st">0</span></div>
  <div class="stat"><span>Y</span><span class="v" id="sY">—</span></div>
  <div class="stat"><span>K</span><span class="v" id="sK">—</span></div>
  <div class="stat"><span>A</span><span class="v" id="sA">—</span></div>
  <div class="stat"><span>g_A (knowledge)</span><span class="v" id="sgA">—</span></div>
  <div class="stat"><span>g_Y (output)</span><span class="v" id="sgY">—</span></div>
  <div class="legend"><span class="Y">Output Y</span><span class="K">Capital K</span><span class="A">Knowledge A</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize',resize); resize();

  const Y_C='#DDA15E', K_C='#8A9A5B', A_C='#BC6C25';
  const GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  let LA_share=0.20, sav=0.20, delta=0.030, alpha=0.33;
  const L=1.0, dep=0.05;
  let K, A, year, prevY=0, running=true;
  const series=[]; const MAX=1500;

  function output(K,A){
    const Ly=L*(1-LA_share);
    return Math.pow(Math.max(K,1e-6), alpha) * Math.pow(Math.max(A*Ly,1e-6), 1-alpha);
  }

  function reset(){
    K=1.0; A=1.0; year=0; series.length=0; prevY=output(K,A);
  }

  function deriv(K,A){
    const La=L*LA_share;
    const Y=output(K,A);
    const dA=delta*A*La;
    const dK=sav*Y - dep*K;
    return [dK,dA,Y];
  }

  function rk4(dt){
    const k1=deriv(K,A);
    const k2=deriv(K+dt/2*k1[0], A+dt/2*k1[1]);
    const k3=deriv(K+dt/2*k2[0], A+dt/2*k2[1]);
    const k4=deriv(K+dt*k3[0],   A+dt*k3[1]);
    K+=dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    A+=dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    K=Math.max(0.001,K); A=Math.max(0.001,A);
    year+=dt;
  }
  function tick(){
    const dt=0.25;
    if (year<200){
      const Yprev=output(K,A);
      rk4(dt);
      const Ynow=output(K,A);
      const La=L*LA_share;
      series.push({t:year, Y:Ynow, K, A, gA:delta*La, gY:(Ynow-Yprev)/Math.max(Yprev,1e-6)/dt });
      if (series.length>MAX) series.shift();
    }
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if (series.length<2) return;

    const padL=80, padR=360, padT=70, padB=60;
    const totW=W-padL-padR;
    const totH=H-padT-padB;

    // log scale for Y, K, A
    let mx=Math.log(series[0].Y+0.001), mn=mx;
    for (const s of series){
      const vs=[Math.log(s.Y+0.001), Math.log(s.K+0.001), Math.log(s.A+0.001)];
      for (const v of vs){ if (v>mx) mx=v; if (v<mn) mn=v; }
    }
    if (mx-mn<0.1){ mx=mn+1; }
    const t0=series[0].t, t1=series[series.length-1].t;
    const tspan=Math.max(t1-t0,1);
    const range=mx-mn;

    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for (let i=0;i<=5;i++){ const yp=padT+i*totH/5;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke(); }
    for (let i=0;i<=6;i++){ const xp=padL+i*totW/6;
      ctx.beginPath(); ctx.moveTo(xp,padT); ctx.lineTo(xp,padT+totH); ctx.stroke(); }
    ctx.strokeStyle=AXIS; ctx.beginPath();
    ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+totH); ctx.lineTo(padL+totW,padT+totH); ctx.stroke();

    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Output / Capital / Knowledge — log-scale', padL, padT-22);

    function plot(getter,color){
      ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath();
      for (let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.t-t0)/tspan*totW;
        const v=Math.log(getter(s)+0.001);
        const py=padT+totH - (v-mn)/range*totH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    plot(s=>s.Y, Y_C);
    plot(s=>s.K, K_C);
    plot(s=>s.A, A_C);

    // labels
    ctx.fillStyle='rgba(254,250,224,0.5)'; ctx.font='11px Nunito';
    for (let i=0;i<=5;i++){
      const v=Math.exp(mn + i*range/5);
      ctx.fillText(v.toFixed(1), padL-45, padT+totH-i*totH/5+4);
    }
    for (let i=0;i<=6;i++){
      const tt=t0+i*tspan/6;
      ctx.fillText(tt.toFixed(0), padL+i*totW/6-10, padT+totH+16);
    }
    ctx.fillText('year', padL+totW-25, padT+totH+34);

    // last labels
    const last=series[series.length-1];
    function tag(getter,color,name){
      const v=Math.log(getter(last)+0.001);
      const py=padT+totH - (v-mn)/range*totH;
      const x=padL+totW+8;
      ctx.fillStyle=color; ctx.fillRect(x,py-1,12,2);
      ctx.fillStyle='rgba(254,250,224,0.8)';
      ctx.fillText(name, x+16, py+4);
    }
    tag(s=>s.Y,Y_C,'Y');
    tag(s=>s.K,K_C,'K');
    tag(s=>s.A,A_C,'A');

    document.getElementById('st').textContent=year.toFixed(0);
    document.getElementById('sY').textContent=last.Y.toFixed(2);
    document.getElementById('sK').textContent=last.K.toFixed(2);
    document.getElementById('sA').textContent=last.A.toFixed(2);
    document.getElementById('sgA').textContent=(last.gA*100).toFixed(2)+'%';
    document.getElementById('sgY').textContent=(last.gY*100).toFixed(2)+'%';
  }

  function loop(){
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  function bind(id,vid,prop,dec){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      if (prop==='L') LA_share=v;
      if (prop==='S') sav=v;
      if (prop==='D') delta=v;
      if (prop==='A') alpha=v;
    });
  }
  bind('iL','vL','L',2); bind('iS','vS','S',2); bind('iD','vD','D',3); bind('iA','vA','A',2);

  document.getElementById('bRun').addEventListener('click',e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
