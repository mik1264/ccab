<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Particle Swarm Optimization — CAS</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d;
    --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.2rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.7rem; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem;
    padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ NN</span>
  <h2>Particle Swarm Opt.</h2>
  <p>Particles search 2D Rastrigin landscape. Each remembers its personal best p; they all share global best g. Velocity v ← w·v + c1·r₁(p−x) + c2·r₂(g−x).</p>

  <div class="control"><label>Inertia w <span id="vW">0.72</span></label><input type="range" id="iW" min="0.0" max="1.2" step="0.01" value="0.72" /></div>
  <div class="control"><label>Cognitive c₁ <span id="vC1">1.49</span></label><input type="range" id="iC1" min="0" max="3" step="0.01" value="1.49" /></div>
  <div class="control"><label>Social c₂ <span id="vC2">1.49</span></label><input type="range" id="iC2" min="0" max="3" step="0.01" value="1.49" /></div>
  <div class="control"><label>Particles <span id="vN">30</span></label><input type="range" id="iN" min="10" max="120" step="5" value="30" /></div>

  <div class="btnrow">
    <button class="p" data-w="0.72" data-c1="1.49" data-c2="1.49">Standard</button>
    <button class="p" data-w="0.4" data-c1="2.0" data-c2="2.0">Aggressive</button>
    <button class="p" data-w="0.95" data-c1="0.5" data-c2="0.5">Explorer</button>
  </div>
  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Iter</span><span class="v" id="sIt">0</span></div>
  <div class="stat"><span>Best fitness</span><span class="v" id="sBF">—</span></div>
  <div class="stat"><span>Best position</span><span class="v" id="sBP">—</span></div>
  <div class="stat"><span>Diversity</span><span class="v" id="sD">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  // Domain: Rastrigin on [-5.12, 5.12]^2
  const DMIN = -5.12, DMAX = 5.12;
  let w_in = 0.72, c1 = 1.49, c2 = 1.49;
  let nParticles = 30;
  let particles = []; // {x, y, vx, vy, px, py, pf, trail:[]}
  let gx=0, gy=0, gf=Infinity;
  let iter = 0, running = true;
  let convergence = []; // best fitness over time

  function rastrigin(x, y) {
    const A = 10;
    return 2*A + (x*x - A*Math.cos(2*Math.PI*x)) + (y*y - A*Math.cos(2*Math.PI*y));
  }

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    contourCache = null;
  }
  window.addEventListener('resize', resize);
  resize();

  function reset() {
    particles = [];
    gf = Infinity;
    for (let i=0; i<nParticles; i++) {
      const x = DMIN + Math.random()*(DMAX-DMIN);
      const y = DMIN + Math.random()*(DMAX-DMIN);
      const f = rastrigin(x,y);
      const p = {
        x, y,
        vx: (Math.random()-0.5)*1.5,
        vy: (Math.random()-0.5)*1.5,
        px: x, py: y, pf: f,
        trail: []
      };
      particles.push(p);
      if (f<gf) { gf=f; gx=x; gy=y; }
    }
    iter = 0;
    convergence = [];
  }

  function step() {
    for (const p of particles) {
      const r1 = Math.random(), r2 = Math.random();
      p.vx = w_in*p.vx + c1*r1*(p.px - p.x) + c2*r2*(gx - p.x);
      p.vy = w_in*p.vy + c1*r1*(p.py - p.y) + c2*r2*(gy - p.y);
      // velocity clamp
      const vmax = 2.0;
      p.vx = Math.max(-vmax, Math.min(vmax, p.vx));
      p.vy = Math.max(-vmax, Math.min(vmax, p.vy));
      p.x += p.vx; p.y += p.vy;
      // domain reflect
      if (p.x < DMIN) { p.x = DMIN; p.vx *= -0.5; }
      if (p.x > DMAX) { p.x = DMAX; p.vx *= -0.5; }
      if (p.y < DMIN) { p.y = DMIN; p.vy *= -0.5; }
      if (p.y > DMAX) { p.y = DMAX; p.vy *= -0.5; }
      const f = rastrigin(p.x, p.y);
      if (f < p.pf) { p.pf = f; p.px = p.x; p.py = p.y; }
      if (f < gf) { gf = f; gx = p.x; gy = p.y; }
      p.trail.push([p.x, p.y]);
      if (p.trail.length > 40) p.trail.shift();
    }
    iter++;
    convergence.push(gf);
    if (convergence.length > 300) convergence.shift();
  }

  // viridis colormap
  function viridis(t) {
    t = Math.max(0, Math.min(1, t));
    const r = Math.round(255 * (0.27 + 0.55*t - 0.15*t*t));
    const g = Math.round(255 * (0.0 + 1.05*t - 0.2*t*t));
    const b = Math.round(255 * (0.33 + 0.85*Math.sin((1-t)*Math.PI*0.85)));
    return [Math.min(255,Math.max(0,r)), Math.min(255,Math.max(0,g)), Math.min(255,Math.max(0,b))];
  }

  // Cache contour image
  let contourCache = null, contourSize = 0, contourBox = null;

  function buildContour(boxSize) {
    const RES = 220;
    const off = document.createElement('canvas');
    off.width = RES; off.height = RES;
    const c2d = off.getContext('2d');
    const img = c2d.createImageData(RES, RES);
    let mn = Infinity, mx = -Infinity;
    const buf = new Float32Array(RES*RES);
    for (let j=0;j<RES;j++) for (let i=0;i<RES;i++) {
      const x = DMIN + (i/(RES-1))*(DMAX-DMIN);
      const y = DMIN + (j/(RES-1))*(DMAX-DMIN);
      const v = rastrigin(x,y);
      buf[j*RES+i] = v;
      if (v<mn) mn=v; if (v>mx) mx=v;
    }
    for (let k=0;k<RES*RES;k++) {
      const t = (buf[k]-mn)/(mx-mn);
      const tt = Math.pow(t, 0.7);
      const c = viridis(tt);
      img.data[k*4] = c[0]*0.65;
      img.data[k*4+1] = c[1]*0.65;
      img.data[k*4+2] = c[2]*0.7;
      img.data[k*4+3] = 255;
    }
    c2d.putImageData(img, 0, 0);
    return off;
  }

  function transform(x, y, ox, oy, size) {
    const px = ox + (x - DMIN)/(DMAX-DMIN) * size;
    const py = oy + (1 - (y - DMIN)/(DMAX-DMIN)) * size;
    return [px, py];
  }

  function render() {
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);

    const size = Math.min(W - 380, H - 60, 720);
    const ox = (W - size)/2 - 100;
    const oy = (H - size)/2;

    if (!contourCache || contourSize !== size) {
      contourCache = buildContour(size);
      contourSize = size;
    }
    ctx.drawImage(contourCache, ox, oy, size, size);

    // Frame
    ctx.strokeStyle = 'rgba(232,121,249,0.5)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(ox, oy, size, size);

    // Title
    ctx.fillStyle = 'rgba(254,250,224,0.85)';
    ctx.font = '600 16px Lora, serif';
    ctx.textAlign = 'left';
    ctx.fillText('Rastrigin contour (viridis)', ox, oy - 14);

    // Trails
    ctx.lineWidth = 1.4;
    for (const p of particles) {
      if (p.trail.length<2) continue;
      for (let k=1; k<p.trail.length; k++) {
        const a = p.trail[k-1], b = p.trail[k];
        const [ax, ay] = transform(a[0], a[1], ox, oy, size);
        const [bx, by] = transform(b[0], b[1], ox, oy, size);
        ctx.strokeStyle = `rgba(6,182,212,${(k/p.trail.length)*0.55})`;
        ctx.beginPath();
        ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
      }
    }

    // Particles with cyan glow
    for (const p of particles) {
      const [px, py] = transform(p.x, p.y, ox, oy, size);
      ctx.shadowColor = '#06b6d4';
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#06b6d4';
      ctx.beginPath(); ctx.arc(px, py, 3.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Global best
    const [bgx, bgy] = transform(gx, gy, ox, oy, size);
    ctx.strokeStyle = '#e879f9';
    ctx.shadowColor = '#e879f9'; ctx.shadowBlur = 18;
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(bgx, bgy, 9, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(bgx-12, bgy); ctx.lineTo(bgx+12, bgy);
    ctx.moveTo(bgx, bgy-12); ctx.lineTo(bgx, bgy+12); ctx.stroke();
    ctx.shadowBlur = 0;

    // Convergence inset
    const cw = 220, ch = 110;
    const cx = ox + size - cw - 12, cy = oy + 12;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(cx, cy, cw, ch);
    ctx.strokeStyle = 'rgba(232,121,249,0.4)';
    ctx.strokeRect(cx, cy, cw, ch);
    ctx.fillStyle = 'rgba(254,250,224,0.85)';
    ctx.font = '600 11px Nunito';
    ctx.textAlign = 'left';
    ctx.fillText('Convergence (log)', cx+8, cy+14);

    if (convergence.length>1) {
      let mn = Infinity, mx = -Infinity;
      const lc = convergence.map(v => Math.log(v + 0.01));
      for (const v of lc) { if (v<mn) mn=v; if (v>mx) mx=v; }
      const range = Math.max(0.001, mx-mn);
      ctx.strokeStyle = '#06b6d4';
      ctx.shadowColor = '#06b6d4'; ctx.shadowBlur = 8;
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      for (let i=0;i<lc.length;i++) {
        const x = cx + 8 + i*(cw-16)/Math.max(1, lc.length-1);
        const y = cy + ch - 8 - ((lc[i]-mn)/range)*(ch-22);
        if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Stats
    let dx = 0, dy = 0;
    let cmx = 0, cmy = 0;
    for (const p of particles) { cmx += p.x; cmy += p.y; }
    cmx /= particles.length; cmy /= particles.length;
    for (const p of particles) {
      const dx_ = p.x-cmx, dy_ = p.y-cmy;
      dx += dx_*dx_ + dy_*dy_;
    }
    const div = Math.sqrt(dx/particles.length);

    document.getElementById('sIt').textContent = iter;
    document.getElementById('sBF').textContent = gf.toExponential(2);
    document.getElementById('sBP').textContent = `(${gx.toFixed(2)}, ${gy.toFixed(2)})`;
    document.getElementById('sD').textContent = div.toFixed(3);
  }

  function loop() {
    if (running) step();
    render();
    requestAnimationFrame(loop);
  }

  document.getElementById('iW').addEventListener('input', e => {
    w_in = +e.target.value; document.getElementById('vW').textContent = w_in.toFixed(2);
  });
  document.getElementById('iC1').addEventListener('input', e => {
    c1 = +e.target.value; document.getElementById('vC1').textContent = c1.toFixed(2);
  });
  document.getElementById('iC2').addEventListener('input', e => {
    c2 = +e.target.value; document.getElementById('vC2').textContent = c2.toFixed(2);
  });
  document.getElementById('iN').addEventListener('input', e => {
    nParticles = +e.target.value;
    document.getElementById('vN').textContent = nParticles;
    reset();
  });
  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      w_in = +b.dataset.w; c1 = +b.dataset.c1; c2 = +b.dataset.c2;
      document.getElementById('iW').value = w_in;
      document.getElementById('iC1').value = c1;
      document.getElementById('iC2').value = c2;
      document.getElementById('vW').textContent = w_in.toFixed(2);
      document.getElementById('vC1').textContent = c1.toFixed(2);
      document.getElementById('vC2').textContent = c2.toFixed(2);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  reset(); loop();
})();
</script>
</body>
</html>
