<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cobweb Market — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend {
    display:flex; gap:1rem; font-size:0.78rem; margin-top:0.5rem; flex-wrap:wrap;
  }
  .legend span::before {
    content:''; display:inline-block; width:10px; height:10px;
    border-radius:3px; margin-right:5px; vertical-align: middle;
  }
  .legend .price::before { background: var(--sage); }
  .legend .qty::before { background: var(--terracotta); }
  .legend .web::before { background: var(--earth); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 33</span>
  <h2>Cobweb Market</h2>
  <p>Producers plan supply this period from last period's price: Q<sub>s</sub>(t)=a+bP(t−1). Buyers respond instantly: Q<sub>d</sub>(t)=c−dP(t). Equilibrium picks tomorrow's price. Stable when |b/d|&lt;1.</p>

  <div class="control"><label>a supply intercept <span id="va">2.0</span></label><input type="range" id="ia" min="-2" max="6" step="0.05" value="2.0" /></div>
  <div class="control"><label>b supply slope <span id="vb">0.80</span></label><input type="range" id="ib" min="0.1" max="2.5" step="0.01" value="0.80" /></div>
  <div class="control"><label>c demand intercept <span id="vc">10.0</span></label><input type="range" id="ic" min="4" max="20" step="0.05" value="10.0" /></div>
  <div class="control"><label>d demand slope <span id="vd">1.00</span></label><input type="range" id="id" min="0.2" max="2.5" step="0.01" value="1.00" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>step n</span><span class="v" id="sn">0</span></div>
  <div class="stat"><span>price P</span><span class="v" id="sp">—</span></div>
  <div class="stat"><span>quantity Q</span><span class="v" id="sq">—</span></div>
  <div class="stat"><span>P*</span><span class="v" id="spe">—</span></div>
  <div class="stat"><span>|b/d|</span><span class="v" id="ss">—</span></div>
  <div class="stat"><span>regime</span><span class="v" id="sr">—</span></div>
  <div class="legend"><span class="price">P(t)</span><span class="qty">Q(t)</span><span class="web">cobweb</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize); resize();

  const PRICE='#8A9A5B', QTY='#BC6C25', WEB='#DDA15E', GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  let a=2.0, b=0.80, c=10.0, d=1.00;
  let P=8.0, n=0, running=true, accum=0;
  const series=[]; const MAX=400;

  function reset(){ P = 8.0 + (Math.random()-0.5)*4; n=0; series.length=0; accum=0; }

  function step(){
    const Q = a + b*P; // supply produced based on last P
    // next price clears demand: Q = c - d*P_next  =>  P_next = (c-Q)/d
    const Pn = (c - Q)/d;
    series.push({n, P, Q, Pn});
    if (series.length>MAX) series.shift();
    P = Math.max(0, Pn);
    n++;
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if (series.length<1) return;

    const padL=70, padR=360, padT=60, padB=40;
    const totW = W - padL - padR;
    const tsH = H*0.45 - padT/2;
    const cwH = H*0.45 - padB/2;
    const cwY0 = padT + tsH + 50;

    // === Time series of P and Q ===
    let maxV = 0.5;
    for (const s of series){ if (s.P>maxV) maxV=s.P; if (s.Q>maxV) maxV=s.Q; }
    const n0=series[0].n, n1=series[series.length-1].n;
    const nspan = Math.max(n1-n0, 1);

    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for (let i=0;i<=4;i++){ const yp=padT+i*tsH/4;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke(); }
    ctx.strokeStyle=AXIS; ctx.beginPath();
    ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+tsH); ctx.lineTo(padL+totW,padT+tsH); ctx.stroke();

    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='12px Nunito';
    ctx.fillText('Price & quantity vs step', padL, padT-12);
    ctx.fillText(maxV.toFixed(1), padL-40, padT+5);
    ctx.fillText('0', padL-15, padT+tsH);

    // P
    ctx.strokeStyle=PRICE; ctx.lineWidth=2; ctx.beginPath();
    for (let i=0;i<series.length;i++){
      const s=series[i];
      const px=padL+(s.n-n0)/nspan*totW;
      const py=padT+tsH - s.P/maxV*tsH;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
    // Q
    ctx.strokeStyle=QTY; ctx.beginPath();
    for (let i=0;i<series.length;i++){
      const s=series[i];
      const px=padL+(s.n-n0)/nspan*totW;
      const py=padT+tsH - s.Q/maxV*tsH;
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();

    // === Cobweb (Q on x, P on y) ===
    const Pe = (c - a)/(b + d);
    const Qe = a + b*Pe;
    let mxQ=Math.max(Qe*2, 1), mxP=Math.max(Pe*2, 1);
    for (const s of series){ if (s.Q>mxQ) mxQ=s.Q; if (s.P>mxP) mxP=s.P; }

    ctx.fillStyle='rgba(254,250,224,0.6)';
    ctx.fillText('Cobweb: Q on x, P on y', padL, cwY0-12);
    ctx.strokeStyle=AXIS; ctx.beginPath();
    ctx.moveTo(padL,cwY0); ctx.lineTo(padL,cwY0+cwH); ctx.lineTo(padL+totW,cwY0+cwH); ctx.stroke();

    const qx = q => padL + q/mxQ*totW;
    const py_ = p => cwY0 + cwH - p/mxP*cwH;

    // demand line P = (c - Q)/d  on plane (Q, P)
    ctx.strokeStyle='rgba(138,154,91,0.6)'; ctx.lineWidth=1.5;
    ctx.beginPath();
    for (let q=0; q<=mxQ; q+=mxQ/40){
      const pp=(c-q)/d;
      if (pp<0||pp>mxP) continue;
      const xx=qx(q), yy=py_(pp);
      ctx.lineTo(xx,yy);
    }
    ctx.stroke();
    ctx.fillStyle='rgba(138,154,91,0.9)'; ctx.fillText('demand', qx(mxQ*0.6), py_((c-mxQ*0.6)/d)-6);

    // supply line  Q = a + b*P  =>  P = (Q-a)/b   on (Q,P)
    ctx.strokeStyle='rgba(188,108,37,0.7)'; ctx.beginPath();
    for (let q=0; q<=mxQ; q+=mxQ/40){
      const pp=(q - a)/b;
      if (pp<0||pp>mxP) continue;
      const xx=qx(q), yy=py_(pp);
      ctx.lineTo(xx,yy);
    }
    ctx.stroke();
    ctx.fillStyle='rgba(188,108,37,0.9)'; ctx.fillText('supply', qx(a + b*mxP*0.7), py_(mxP*0.7)+12);

    // cobweb stair-step
    ctx.strokeStyle=WEB; ctx.lineWidth=1.5;
    ctx.beginPath();
    let first=true;
    for (let i=0;i<series.length-1;i++){
      const s=series[i], s2=series[i+1];
      // produce at price P[i]: vertical from (Q_old, P[i-1]) — we use cycle of segments
      // Sequence: at P_i, supply produces Q_i  (vertical from prev), demand sets P_{i+1} (horizontal to demand)
      const Qi=s.Q, Pi=s.P, Pn=s.Pn;
      const x1=qx(Qi), y1=py_(Pi);
      const x2=qx(Qi), y2=py_(Pn);
      const Qn=s2 ? s2.Q : a + b*Pn;
      const x3=qx(Qn), y3=py_(Pn);
      if (first){ ctx.moveTo(qx( Qi ), py_(Pi)); first=false; }
      ctx.lineTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3);
    }
    ctx.stroke();

    // equilibrium dot
    if (Pe>0 && Qe>0 && Pe<mxP && Qe<mxQ){
      ctx.fillStyle=PRICE; ctx.beginPath();
      ctx.arc(qx(Qe), py_(Pe), 5, 0, Math.PI*2); ctx.fill();
    }

    // current point
    const last=series[series.length-1];
    ctx.fillStyle=WEB; ctx.beginPath();
    ctx.arc(qx(last.Q), py_(last.P), 5, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('Q', padL+totW-20, cwY0+cwH+18);
    ctx.save(); ctx.translate(padL-30, cwY0+cwH/2+10); ctx.rotate(-Math.PI/2);
    ctx.fillText('P', 0,0); ctx.restore();

    // stats
    document.getElementById('sn').textContent = n;
    document.getElementById('sp').textContent = last.P.toFixed(2);
    document.getElementById('sq').textContent = last.Q.toFixed(2);
    document.getElementById('spe').textContent = Pe.toFixed(2);
    const ratio = Math.abs(b/d);
    document.getElementById('ss').textContent = ratio.toFixed(2);
    document.getElementById('sr').textContent = ratio<1 ? 'stable spiral' : ratio>1 ? 'divergent' : 'cycle';
  }

  function loop(){
    if (running){ accum++; if (accum>=10){ accum=0; step(); } }
    draw();
    requestAnimationFrame(loop);
  }

  function bind(id,vid,prop,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=v.toFixed(dec);
      if (prop==='a') a=v;
      if (prop==='b') b=v;
      if (prop==='c') c=v;
      if (prop==='d') d=v;
    });
  }
  bind('ia','va','a',2); bind('ib','vb','b',2); bind('ic','vc','c',2); bind('id','vd','d',2);

  document.getElementById('bRun').addEventListener('click',e=>{
    running=!running; e.target.textContent = running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
