<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bullwhip / Beer Game — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(330px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--terracotta); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--terracotta); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--terracotta); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: #9a5520; transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  .legend { display:flex; gap:0.6rem; font-size:0.78rem; margin-top:0.5rem; flex-wrap:wrap; }
  .legend span::before { content:''; display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align: middle; }
  .legend .c::before { background: #6db3a5; }
  .legend .ret::before { background: var(--sage); }
  .legend .who::before { background: var(--earth); }
  .legend .dis::before { background: #d97757; }
  .legend .fac::before { background: var(--terracotta); }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD · 28</span>
  <h2>Bullwhip / Beer Game</h2>
  <p>Four supply tiers each order to cover demand plus inventory gap. Customer demand steps from 4→8 at week 5. Watch upstream amplification.</p>

  <div class="control"><label>Order delay (weeks) <span id="vd">2</span></label><input type="range" id="iD" min="1" max="6" step="1" value="2" /></div>
  <div class="control"><label>Adjustment time α <span id="va">0.30</span></label><input type="range" id="iA" min="0.05" max="1" step="0.01" value="0.30" /></div>
  <div class="control"><label>Target inventory <span id="vt">12</span></label><input type="range" id="iT" min="0" max="40" step="1" value="12" /></div>

  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>week</span><span class="v" id="sw">0</span></div>
  <div class="stat"><span>customer demand</span><span class="v" id="sc">—</span></div>
  <div class="stat"><span>retailer order</span><span class="v" id="s1">—</span></div>
  <div class="stat"><span>wholesaler order</span><span class="v" id="s2">—</span></div>
  <div class="stat"><span>distributor order</span><span class="v" id="s3">—</span></div>
  <div class="stat"><span>factory order</span><span class="v" id="s4">—</span></div>
  <div class="legend"><span class="c">cust</span><span class="ret">retail</span><span class="who">whole</span><span class="dis">dist</span><span class="fac">fact</span></div>
</div>

<script>
(() => {
  const cv=document.getElementById('c'); const ctx=cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize(){ W=window.innerWidth; H=window.innerHeight; cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  window.addEventListener('resize',resize); resize();

  const COLORS=['#6db3a5','#8A9A5B','#DDA15E','#d97757','#BC6C25'];
  const GRID='rgba(254,250,224,0.1)', AXIS='rgba(254,250,224,0.4)';

  let delay=2, alpha=0.30, target=12;
  // Each tier has: inventory I, incoming pipeline (FIFO of length=delay)
  const NTIERS=4;
  let inventory=[], pipeline=[], orders=[], incomingDemand=[];
  let week=0, running=true;
  const series=[]; const MAX=300;
  let frameTick=0;

  function reset(){
    inventory=[]; pipeline=[]; orders=[]; incomingDemand=[];
    for(let i=0;i<NTIERS;i++){
      inventory.push(target);
      pipeline.push(new Array(delay).fill(4));
      orders.push(4);
      incomingDemand.push(4);
    }
    week=0; series.length=0; frameTick=0;
  }

  function customerDemand(w){ return w<5 ? 4 : 8; }

  function stepWeek(){
    const cust = customerDemand(week);
    incomingDemand[0] = cust;
    // For each tier: receive from pipeline, ship to downstream demand, place new order
    const ord=[];
    let downstreamDemand = cust;
    // process tier 0..3
    for(let i=0;i<NTIERS;i++){
      // receive top of pipeline
      const arrived = pipeline[i].shift();
      inventory[i] += arrived;
      // ship to downstream
      const shipped = Math.min(inventory[i], downstreamDemand);
      inventory[i] -= shipped;
      // place order: cover incoming demand + inventory gap
      const inv=inventory[i];
      const gap = target - inv;
      const o = Math.max(0, downstreamDemand + alpha*gap);
      ord.push(o);
      // push order into pipeline
      pipeline[i].push(o);
      // upstream tier sees this order as their demand
      downstreamDemand = o;
    }
    orders=ord;
    week++;

    series.push({week, cust, o:[ord[0],ord[1],ord[2],ord[3]]});
    if(series.length>MAX) series.shift();
    document.getElementById('sw').textContent=week;
    document.getElementById('sc').textContent=cust.toFixed(2);
    document.getElementById('s1').textContent=ord[0].toFixed(2);
    document.getElementById('s2').textContent=ord[1].toFixed(2);
    document.getElementById('s3').textContent=ord[2].toFixed(2);
    document.getElementById('s4').textContent=ord[3].toFixed(2);
  }

  function tick(){
    // step roughly 6 frames per week to slow it down
    frameTick++;
    if(frameTick%6===0) stepWeek();
  }

  function draw(){
    ctx.fillStyle='#0e1218'; ctx.fillRect(0,0,W,H);
    if(series.length<2) return;
    const padL=70, padR=370, padT=60, padB=60;
    const totW=W-padL-padR, totH=H-padT-padB;
    const w0=series[0].week, w1=series[series.length-1].week;
    const wspan=Math.max(w1-w0,1);

    let maxV=1;
    for(const s of series){
      if(s.cust>maxV) maxV=s.cust;
      for(const o of s.o) if(o>maxV) maxV=o;
    }
    maxV=Math.ceil(maxV*1.1);

    ctx.strokeStyle=GRID; ctx.lineWidth=1;
    for(let i=0;i<=5;i++){
      const yp=padT+i*totH/5;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
    }
    ctx.strokeStyle=AXIS;
    ctx.beginPath(); ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+totH); ctx.lineTo(padL+totW,padT+totH); ctx.stroke();

    ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.font='12px Nunito';
    ctx.fillText('Order rate by tier (weeks)', padL, padT-15);
    ctx.fillText(maxV.toFixed(0), padL-40, padT+5);
    ctx.fillText('0', padL-15, padT+totH);
    ctx.fillText('week '+w1, padL+totW-60, padT+totH+18);

    function plot(getter,color,lw=2){
      ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.beginPath();
      for(let i=0;i<series.length;i++){
        const s=series[i];
        const px=padL+(s.week-w0)/wspan*totW;
        const py=padT+totH-getter(s)/maxV*totH;
        if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    plot(s=>s.cust, COLORS[0], 2);
    plot(s=>s.o[0], COLORS[1], 2);
    plot(s=>s.o[1], COLORS[2], 2);
    plot(s=>s.o[2], COLORS[3], 2);
    plot(s=>s.o[3], COLORS[4], 2.4);
  }

  function loop(){ if(running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,fn,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input',e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent=dec===0?v.toFixed(0):v.toFixed(dec);
      fn(v);
    });
  }
  bind('iD','vd',v=>{delay=v|0; reset();},0);
  bind('iA','va',v=>alpha=v);
  bind('iT','vt',v=>{target=v|0; reset();},0);
  document.getElementById('bRun').addEventListener('click',e=>{running=!running; e.target.textContent=running?'Pause':'Resume';});
  document.getElementById('bReset').addEventListener('click',reset);

  reset(); loop();
})();
</script>
</body>
</html>
