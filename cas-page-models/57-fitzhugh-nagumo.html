<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FitzHugh-Nagumo Spatial — Deluxe ABM</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream); letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM ✦ 57</span>
  <h2>FitzHugh-Nagumo</h2>
  <p>Excitable medium PDE. ∂u/∂t = D∇²u + (1/ε)·u(1−u)(u−a) − v; ∂v/∂t = u − bv. Click anywhere to inject excitation — pulses race outward and form rotating spirals.</p>

  <div class="control"><label>ε (timescale) <span id="vE">0.020</span></label><input type="range" id="iE" min="0.005" max="0.080" step="0.001" value="0.020" /></div>
  <div class="control"><label>a (threshold) <span id="vA">0.10</span></label><input type="range" id="iA" min="0.02" max="0.30" step="0.01" value="0.10" /></div>
  <div class="control"><label>b (recovery) <span id="vB">0.50</span></label><input type="range" id="iB" min="0.10" max="1.50" step="0.01" value="0.50" /></div>
  <div class="control"><label>Steps/frame <span id="vS">8</span></label><input type="range" id="iS" min="1" max="20" step="1" value="8" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="spiral">Spiral</button>
    <button class="p" data-p="target">Target</button>
    <button class="p" data-p="chaos">Chaos</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Frame</span><span class="v" id="sFr">0</span></div>
  <div class="stat"><span>Mean u</span><span class="v" id="sU">—</span></div>
  <div class="stat"><span>Excited</span><span class="v" id="sX">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  const N = 200;
  let u = new Float32Array(N*N);
  let v = new Float32Array(N*N);
  let un = new Float32Array(N*N);
  let vn = new Float32Array(N*N);

  let eps = 0.020, a = 0.10, b = 0.50;
  const Du = 0.6;
  const dt = 0.10;
  let stepsPerFrame = 8;
  let running = true, frame = 0;

  const img = new ImageData(N, N);

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = true;
  }
  window.addEventListener('resize', resize);
  resize();

  function reset(mode='spiral') {
    u.fill(0); v.fill(0);
    if (mode === 'spiral') {
      // Half plane excited, half recovering -> classic spiral seed
      for (let y=0; y<N; y++) for (let x=0; x<N; x++) {
        const i = y*N+x;
        if (x < N/2) u[i] = 0.9;
        if (y < N/2) v[i] = 0.4;
      }
    } else if (mode === 'target') {
      const cx = N/2|0, cy = N/2|0;
      for (let r=-6; r<=6; r++) for (let c=-6; c<=6; c++) {
        if (r*r+c*c<=36) {
          const i = ((cy+r+N)%N)*N + (cx+c+N)%N;
          u[i] = 1.0;
        }
      }
    } else { // chaos
      for (let i=0; i<N*N; i++) {
        u[i] = Math.random() < 0.05 ? Math.random() : 0;
        v[i] = Math.random() < 0.05 ? Math.random()*0.3 : 0;
      }
    }
    frame = 0;
  }

  function step() {
    for (let y=0; y<N; y++) {
      const ym = (y-1+N)%N, yp = (y+1)%N;
      for (let x=0; x<N; x++) {
        const xm = (x-1+N)%N, xp = (x+1)%N;
        const i = y*N+x;
        const lapU = u[ym*N+x] + u[yp*N+x] + u[y*N+xm] + u[y*N+xp] - 4*u[i];
        const ui = u[i], vi = v[i];
        const du = Du*lapU + (1/eps)*ui*(1-ui)*(ui-a) - vi;
        const dv = ui - b*vi;
        un[i] = ui + dt*du;
        vn[i] = vi + dt*dv;
      }
    }
    [u,un] = [un,u]; [v,vn] = [vn,v];
  }

  // Plasma-ish colormap
  function colormap(t) {
    t = Math.max(0, Math.min(1, t));
    const r = Math.round(255*(0.05 + 0.95*Math.pow(t,0.6)));
    const g = Math.round(255*Math.pow(t,2.2)*0.85);
    const b = Math.round(255*(0.4*Math.sin(t*Math.PI*0.8) + 0.5*(1-t)));
    return [Math.max(0,Math.min(255,r)), Math.max(0,Math.min(255,g)), Math.max(0,Math.min(255,b))];
  }

  function render() {
    let sumU = 0, excited = 0;
    const data = img.data;
    for (let i=0;i<N*N;i++) {
      sumU += u[i];
      if (u[i] > 0.5) excited++;
      const t = Math.max(0, Math.min(1, u[i]));
      const c = colormap(t);
      const j = i*4;
      data[j]=c[0]; data[j+1]=c[1]; data[j+2]=c[2]; data[j+3]=255;
    }
    ctx.fillStyle = '#06080d';
    ctx.fillRect(0,0,W,H);
    const size = Math.min(W, H) * 0.92;
    const ox = (W - size)/2, oy = (H - size)/2;
    const off = render._off || (render._off = document.createElement('canvas'));
    off.width = N; off.height = N;
    off.getContext('2d').putImageData(img, 0, 0);
    ctx.shadowColor = 'rgba(251,146,60,0.55)';
    ctx.shadowBlur = 24;
    ctx.drawImage(off, ox, oy, size, size);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(232,121,249,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(ox-1, oy-1, size+2, size+2);

    document.getElementById('sFr').textContent = frame;
    document.getElementById('sU').textContent = (sumU/(N*N)).toFixed(3);
    document.getElementById('sX').textContent = excited;
  }

  function loop() {
    if (running) for (let s=0; s<stepsPerFrame; s++) { step(); frame++; }
    render();
    requestAnimationFrame(loop);
  }

  function bind(id, vid, cb, fmt=3) {
    const el = document.getElementById(id);
    el.addEventListener('input', e => {
      const val = +e.target.value;
      document.getElementById(vid).textContent = id==='iS'? val : val.toFixed(fmt);
      cb(val);
    });
  }
  bind('iE','vE', val => eps=val, 3);
  bind('iA','vA', val => a=val, 2);
  bind('iB','vB', val => b=val, 2);
  bind('iS','vS', val => stepsPerFrame=val);

  document.querySelectorAll('.p').forEach(btn => {
    btn.addEventListener('click', () => reset(btn.dataset.p));
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running; e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', () => reset('spiral'));

  cv.addEventListener('pointerdown', e => {
    const rect = cv.getBoundingClientRect();
    const size = Math.min(W, H) * 0.92;
    const ox = (W - size)/2, oy = (H - size)/2;
    const px = e.clientX - rect.left - ox;
    const py = e.clientY - rect.top - oy;
    const cx = Math.round(px/size*N), cy = Math.round(py/size*N);
    for (let r=-6; r<=6; r++) for (let c=-6; c<=6; c++) {
      if (r*r+c*c>36) continue;
      const i = ((cy+r+N)%N)*N + (cx+c+N)%N;
      u[i] = 1.0;
    }
  });

  reset('spiral'); loop();
})();
</script>
</body>
</html>
