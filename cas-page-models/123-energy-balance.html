<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Energy Balance Climate — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px; background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--terracotta), var(--magenta));
    color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream);
    border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>0D Energy Balance</h2>
  <p>Earth as a single point: dT/dt = (S(1−α(T))/4 − σT⁴(1−G))/C. Sigmoidal albedo α(T) (snowy planet bright, warm planet dark) creates two stable climates: snowball and warm. Hysteresis as S varies.</p>

  <div class="control"><label>Solar S (W/m²) <span id="vS">1361</span></label><input type="range" id="iS" min="900" max="1700" step="2" value="1361" /></div>
  <div class="control"><label>Greenhouse G <span id="vG">0.40</span></label><input type="range" id="iG" min="0" max="0.7" step="0.005" value="0.40" /></div>
  <div class="control"><label>Heat capacity C <span id="vC">2.0e8</span></label><input type="range" id="iC" min="5e7" max="5e8" step="1e7" value="2.0e8" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="1361,0.40,260">Modern</button>
    <button class="p" data-p="1100,0.20,230">Snowball</button>
    <button class="p" data-p="1500,0.55,300">Hothouse</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-sweep="1">Sweep S ↑</button>
    <button class="p" data-sweep="-1">Sweep S ↓</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t (yr)</span><span class="v" id="st">0.0</span></div>
  <div class="stat"><span>T (K)</span><span class="v" id="sT">—</span></div>
  <div class="stat"><span>α(T)</span><span class="v" id="sA">—</span></div>
  <div class="stat"><span>Regime</span><span class="v" id="sR">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  const SIGMA = 5.67e-8;
  let S=1361, G=0.40, C=2.0e8;
  let T=260, t=0, running=true;
  const series = []; const MAX = 1500;
  const hyst = []; // {S,T} for hysteresis
  let sweep = 0; let sweepRate = 0;

  function albedo(T) {
    // Sigmoidal: cold (ice) ~0.62, warm (no ice) ~0.25
    const k = 0.18, T0 = 263;
    return 0.25 + (0.62-0.25) / (1 + Math.exp((T-T0)*k));
  }

  function dTdt(T) {
    const a = albedo(T);
    const sw = S*(1-a)/4;
    const lw = SIGMA*T*T*T*T*(1-G);
    return (sw - lw)/C;
  }

  function reset(T0) {
    T = T0 || 260; t=0; series.length=0; hyst.length=0; sweep=0;
  }

  function rk4Step(dt) {
    const k1 = dTdt(T);
    const k2 = dTdt(T + dt/2*k1);
    const k3 = dTdt(T + dt/2*k2);
    const k4 = dTdt(T + dt*k3);
    T += dt/6*(k1+2*k2+2*k3+k4);
    t += dt;
  }

  function tick() {
    // dt in seconds, but display in years; one yr ≈ 3.15e7s
    const yrSec = 3.15e7;
    const dt = yrSec*0.5;
    for (let i=0;i<2;i++) rk4Step(dt);
    // Sweep
    if (sweep!==0) {
      S += sweepRate * sweep;
      if (S<900) S=900;
      if (S>1700) S=1700;
      document.getElementById('iS').value=S;
      document.getElementById('vS').textContent=S.toFixed(0);
      hyst.push({S, T});
      if (hyst.length>2000) hyst.shift();
    }
    series.push({t:t/yrSec, T, S});
    if (series.length>MAX) series.shift();
    document.getElementById('st').textContent = (t/yrSec).toFixed(1);
    document.getElementById('sT').textContent = T.toFixed(2)+' K';
    document.getElementById('sA').textContent = albedo(T).toFixed(3);
    document.getElementById('sR').textContent = T<240?'snowball':T>290?'warm':'transition';
  }

  function draw() {
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);

    const padL=70, padR=360, padT=50, padB=40;
    const totW = W - padL - padR;
    const halfH = (H - padT - padB - 60)/2;

    // === Top: time series T(t) ===
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Temperature time series', padL, padT-12);

    let Tmin=200, Tmax=320;
    ctx.strokeStyle='rgba(254,250,224,0.1)'; ctx.lineWidth=1;
    for (let i=0;i<=4;i++) {
      const yp = padT + i*halfH/4;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
      ctx.fillStyle='rgba(254,250,224,0.4)'; ctx.font='10px Nunito';
      ctx.fillText((Tmax - i*(Tmax-Tmin)/4).toFixed(0)+'K', padL-32, yp+3);
    }
    if (series.length>1) {
      const t0=series[0].t, t1=series[series.length-1].t, ts=Math.max(t1-t0,1);
      ctx.strokeStyle='#fb923c'; ctx.lineWidth=2.2;
      ctx.beginPath();
      for (let i=0;i<series.length;i++) {
        const s=series[i];
        const px=padL+(s.t-t0)/ts*totW;
        const py=padT+halfH-(s.T-Tmin)/(Tmax-Tmin)*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
      // 273K freeze line
      const yfreeze = padT+halfH-(273-Tmin)/(Tmax-Tmin)*halfH;
      ctx.strokeStyle='rgba(6,182,212,0.4)'; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.moveTo(padL,yfreeze); ctx.lineTo(padL+totW,yfreeze); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(6,182,212,0.7)';
      ctx.fillText('273 K freeze', padL+totW-80, yfreeze-4);
    }

    // === Bottom: bifurcation / hysteresis ===
    const bY = padT + halfH + 60;
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Equilibrium curve  S → T*  (hysteresis)', padL, bY-12);

    const Smin=900, Smax=1700;
    // Compute equilibrium branches by Newton at sample S
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++) {
      const yp=bY+i*halfH/4;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
    }
    ctx.fillStyle='rgba(254,250,224,0.4)'; ctx.font='10px Nunito';
    ctx.fillText('200K', padL-32, bY+halfH+3);
    ctx.fillText('320K', padL-32, bY+3);
    ctx.fillText('S='+Smin, padL, bY+halfH+18);
    ctx.fillText('S='+Smax, padL+totW-50, bY+halfH+18);

    // Sample equilibria via Newton
    const Ssave = S;
    const branchPts = [];
    for (let s=Smin; s<=Smax; s+=4) {
      S = s;
      // try multiple seeds
      for (const seed of [220, 270, 310]) {
        let Tk = seed;
        for (let it=0; it<60; it++) {
          const f = dTdt(Tk);
          const eps = 0.1;
          const fp = (dTdt(Tk+eps)-dTdt(Tk-eps))/(2*eps);
          if (Math.abs(fp)<1e-30) break;
          const Tn = Tk - f/fp;
          if (Math.abs(Tn-Tk)<1e-3) { Tk=Tn; break; }
          Tk = Math.max(150, Math.min(400, Tn));
        }
        if (Math.abs(dTdt(Tk))<1e-9) {
          // stability via sign of d(dT/dt)/dT
          const eps = 0.1;
          const fp = (dTdt(Tk+eps)-dTdt(Tk-eps))/(2*eps);
          branchPts.push({s, T:Tk, stable: fp<0});
        }
      }
    }
    S = Ssave;
    for (const p of branchPts) {
      const px = padL + (p.s-Smin)/(Smax-Smin)*totW;
      const py = bY + halfH - (p.T-200)/(320-200)*halfH;
      ctx.fillStyle = p.stable?'#06b6d4':'rgba(232,121,249,0.5)';
      ctx.beginPath(); ctx.arc(px,py,1.5,0,Math.PI*2); ctx.fill();
    }

    // hysteresis trace
    if (hyst.length>1) {
      ctx.strokeStyle='rgba(251,146,60,0.7)'; ctx.lineWidth=1.5;
      ctx.beginPath();
      for (let i=0;i<hyst.length;i++) {
        const h=hyst[i];
        const px=padL+(h.S-Smin)/(Smax-Smin)*totW;
        const py=bY+halfH-(h.T-200)/(320-200)*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }

    // current point
    const px=padL+(S-Smin)/(Smax-Smin)*totW;
    const py=bY+halfH-(T-200)/(320-200)*halfH;
    ctx.fillStyle='#fb923c';
    ctx.beginPath(); ctx.arc(px,py,7,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(254,250,224,0.6)'; ctx.lineWidth=1.5;
    ctx.stroke();

    // Causal loop diagram inset (top-left small)
    const cx=160, cy=padT+halfH+30;
    ctx.font='11px Nunito'; ctx.fillStyle='rgba(254,250,224,0.55)';
    ctx.fillText('R: ice-albedo  T↑→α↓→absorb↑→T↑', padL, padT+halfH+25);
    ctx.fillText('B: Stefan-Boltzmann  T↑→σT⁴↑→cools', padL, padT+halfH+42);
  }

  function loop() {
    if (running) tick();
    draw();
    requestAnimationFrame(loop);
  }

  function bind(id, vid, prop, dec=2) {
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent = (id==='iS')? v.toFixed(0) : (id==='iC')? v.toExponential(1) : v.toFixed(dec);
      if (prop==='S') S=v;
      if (prop==='G') G=v;
      if (prop==='C') C=v;
    });
  }
  bind('iS','vS','S'); bind('iG','vG','G'); bind('iC','vC','C',2);
  document.querySelectorAll('.p[data-p]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const [s,g,T0] = b.dataset.p.split(',').map(Number);
      S=s; G=g;
      document.getElementById('iS').value=S; document.getElementById('vS').textContent=S.toFixed(0);
      document.getElementById('iG').value=G; document.getElementById('vG').textContent=G.toFixed(2);
      reset(T0);
    });
  });
  document.querySelectorAll('.p[data-sweep]').forEach(b=>{
    b.addEventListener('click', ()=>{
      sweep = +b.dataset.sweep;
      sweepRate = 0.8;
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent = running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', ()=>reset(260));

  reset(260); loop();
})();
</script>
</body>
</html>
