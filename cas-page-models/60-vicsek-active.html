<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vicsek Active Matter — Deluxe ABM</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(310px, 90vw);
    background: rgba(12,18,28,0.82);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:18px; padding:1.05rem 1.15rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family:'Lora',serif; font-size:1.15rem;
    background: linear-gradient(90deg, var(--earth), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 0.3rem;
  }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: linear-gradient(135deg, var(--sage), var(--accent));
    color: var(--cream); letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.8rem; }
  .control label {
    display:flex; justify-content:space-between;
    font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth);
  }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button {
    flex:1; padding: 0.45rem 0.5rem;
    font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color:var(--cream); border: none; border-radius: 9px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.78rem; padding: 0.22rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.08);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
  #orderInset {
    position:fixed; left:18px; bottom:18px; z-index:100;
    width:230px; height:90px;
    background: rgba(12,18,28,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.12);
    border-radius:14px; padding:8px 10px;
  }
  #orderInset .lab {
    font-size:0.72rem; opacity:0.8; margin-bottom:2px;
  }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div id="orderInset">
  <div class="lab">Order parameter Φ = <span id="vPhi" style="color:var(--earth);font-weight:700">—</span></div>
  <canvas id="phiCv" width="220" height="60" style="position:relative;width:220px;height:60px;display:block;"></canvas>
</div>

<div class="panel">
  <span class="tag">ABM ✦ 60</span>
  <h2>Vicsek Active Matter</h2>
  <p>Self-propelled particles with constant speed align velocity to neighbors within radius r each step, plus angular noise η. Below a critical η a flock emerges (high Φ); above, motion is disordered.</p>

  <div class="control"><label>Noise η <span id="vEta">0.40</span></label><input type="range" id="iEta" min="0.0" max="2.0" step="0.02" value="0.40" /></div>
  <div class="control"><label>Speed v <span id="vV">1.20</span></label><input type="range" id="iV" min="0.2" max="3.0" step="0.05" value="1.20" /></div>
  <div class="control"><label>Radius r <span id="vR">22</span></label><input type="range" id="iR" min="8" max="60" step="1" value="22" /></div>
  <div class="control"><label>Particles <span id="vNp">1500</span></label><input type="range" id="iNp" min="300" max="2500" step="50" value="1500" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="0.10">Order</button>
    <button class="p" data-p="0.40">Critical</button>
    <button class="p" data-p="1.20">Disorder</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>Frame</span><span class="v" id="sFr">0</span></div>
  <div class="stat"><span>Φ (alignment)</span><span class="v" id="sPhi">—</span></div>
  <div class="stat"><span>Active</span><span class="v" id="sN">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0;
  const dpr = Math.min(window.devicePixelRatio||1, 2);

  // World extent (square area inside canvas)
  let LX = 600, LY = 600;
  let nP = 1500;
  let speed = 1.20;
  let eta = 0.40;
  let radius = 22;

  let px = new Float32Array(nP), py = new Float32Array(nP), th = new Float32Array(nP);
  let running = true, frame = 0;
  const phiHist = [];

  const phiCv = document.getElementById('phiCv');
  const phiCtx = phiCv.getContext('2d');

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    LX = LY = Math.min(W, H) * 0.92;
  }
  window.addEventListener('resize', resize);
  resize();

  function alloc(n) {
    px = new Float32Array(n); py = new Float32Array(n); th = new Float32Array(n);
    nP = n;
  }

  function reset() {
    alloc(nP);
    for (let i=0; i<nP; i++) {
      px[i] = Math.random()*LX;
      py[i] = Math.random()*LY;
      th[i] = Math.random()*Math.PI*2;
    }
    frame = 0; phiHist.length = 0;
  }

  // Spatial hash for neighbor lookup
  function step() {
    const cs = radius;
    const gx = Math.max(2, Math.ceil(LX/cs));
    const gy = Math.max(2, Math.ceil(LY/cs));
    const cells = new Array(gx*gy);
    for (let i=0; i<cells.length; i++) cells[i] = [];
    for (let i=0; i<nP; i++) {
      const cx = Math.min(gx-1, Math.max(0, Math.floor(px[i]/cs)));
      const cy = Math.min(gy-1, Math.max(0, Math.floor(py[i]/cs)));
      cells[cy*gx+cx].push(i);
    }

    const newTh = new Float32Array(nP);
    const r2 = radius*radius;
    for (let i=0; i<nP; i++) {
      let sx = 0, sy = 0;
      const cx = Math.floor(px[i]/cs);
      const cy = Math.floor(py[i]/cs);
      for (let dy=-1; dy<=1; dy++) for (let dx=-1; dx<=1; dx++) {
        const nx = (cx+dx+gx)%gx;
        const ny = (cy+dy+gy)%gy;
        const list = cells[ny*gx+nx];
        for (let k=0; k<list.length; k++) {
          const j = list[k];
          let ddx = px[j]-px[i]; let ddy = py[j]-py[i];
          // periodic wrap
          if (ddx > LX/2) ddx -= LX; else if (ddx < -LX/2) ddx += LX;
          if (ddy > LY/2) ddy -= LY; else if (ddy < -LY/2) ddy += LY;
          if (ddx*ddx+ddy*ddy < r2) {
            sx += Math.cos(th[j]); sy += Math.sin(th[j]);
          }
        }
      }
      const ang = Math.atan2(sy, sx);
      newTh[i] = ang + (Math.random()-0.5)*eta;
    }
    for (let i=0; i<nP; i++) {
      th[i] = newTh[i];
      px[i] += speed*Math.cos(th[i]);
      py[i] += speed*Math.sin(th[i]);
      if (px[i] < 0) px[i] += LX; else if (px[i] >= LX) px[i] -= LX;
      if (py[i] < 0) py[i] += LY; else if (py[i] >= LY) py[i] -= LY;
    }
  }

  function orderParam() {
    let sx = 0, sy = 0;
    for (let i=0; i<nP; i++) { sx += Math.cos(th[i]); sy += Math.sin(th[i]); }
    return Math.sqrt(sx*sx + sy*sy)/nP;
  }

  function render() {
    // Fade trails
    ctx.fillStyle = 'rgba(6,8,13,0.32)';
    ctx.fillRect(0, 0, W, H);
    const ox = (W - LX)/2, oy = (H - LY)/2;
    ctx.strokeStyle = 'rgba(6,182,212,0.30)';
    ctx.lineWidth = 1;
    ctx.strokeRect(ox-1, oy-1, LX+2, LY+2);

    // Render arrows colored by orientation
    ctx.lineCap = 'round';
    for (let i=0; i<nP; i++) {
      const hue = ((th[i] / (Math.PI*2)) + 1) % 1;
      const H360 = hue*360;
      const X = ox + px[i], Y = oy + py[i];
      const cs = Math.cos(th[i]), sn = Math.sin(th[i]);
      ctx.strokeStyle = `hsla(${H360},85%,62%,0.90)`;
      ctx.lineWidth = 1.6;
      ctx.shadowColor = `hsla(${H360},85%,62%,0.55)`;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(X - cs*3, Y - sn*3);
      ctx.lineTo(X + cs*4, Y + sn*4);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

    const phi = orderParam();
    phiHist.push(phi);
    if (phiHist.length > 220) phiHist.shift();

    // Draw inset chart
    phiCtx.clearRect(0,0,220,60);
    phiCtx.strokeStyle = 'rgba(254,250,224,0.18)';
    phiCtx.beginPath(); phiCtx.moveTo(0,30); phiCtx.lineTo(220,30); phiCtx.stroke();
    const grad = phiCtx.createLinearGradient(0, 60, 0, 0);
    grad.addColorStop(0, '#06b6d4'); grad.addColorStop(1, '#e879f9');
    phiCtx.strokeStyle = grad; phiCtx.lineWidth = 1.6;
    phiCtx.beginPath();
    for (let i=0; i<phiHist.length; i++) {
      const x = i, y = 60 - phiHist[i]*58;
      if (i===0) phiCtx.moveTo(x,y); else phiCtx.lineTo(x,y);
    }
    phiCtx.stroke();

    document.getElementById('vPhi').textContent = phi.toFixed(3);
    document.getElementById('sFr').textContent = frame;
    document.getElementById('sPhi').textContent = phi.toFixed(3);
    document.getElementById('sN').textContent = nP;
  }

  function loop() {
    if (running) { step(); frame++; }
    render();
    requestAnimationFrame(loop);
  }

  function bind(id, vid, cb, fmt=2) {
    const el = document.getElementById(id);
    el.addEventListener('input', e => {
      const v = +e.target.value;
      document.getElementById(vid).textContent = fmt===0?v:v.toFixed(fmt);
      cb(v);
    });
  }
  bind('iEta','vEta', v => eta=v, 2);
  bind('iV','vV', v => speed=v, 2);
  bind('iR','vR', v => radius=v, 0);
  bind('iNp','vNp', v => { nP=v; reset(); }, 0);

  document.querySelectorAll('.p').forEach(b => {
    b.addEventListener('click', () => {
      const v = +b.dataset.p;
      eta = v;
      document.getElementById('iEta').value = v;
      document.getElementById('vEta').textContent = v.toFixed(2);
    });
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running; e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);

  cv.addEventListener('pointerdown', e => {
    // Click pulls all nearby particles to align toward cursor direction
    const rect = cv.getBoundingClientRect();
    const ox = (W - LX)/2, oy = (H - LY)/2;
    const x = e.clientX - rect.left - ox;
    const y = e.clientY - rect.top - oy;
    const range = 80;
    for (let i=0; i<nP; i++) {
      const dx = px[i]-x, dy = py[i]-y;
      if (dx*dx+dy*dy < range*range) {
        th[i] = Math.atan2(y - py[i], x - px[i]);
      }
    }
  });

  reset(); loop();
})();
</script>
</body>
</html>
