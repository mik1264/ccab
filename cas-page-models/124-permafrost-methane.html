<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Permafrost Methane Runaway — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#06080d; --accent:#06b6d4; --magenta:#e879f9; --plasma:#fb923c;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; }
  .back-link { position:fixed; top:18px; left:18px; z-index:100; display:flex; align-items:center; gap:8px; padding:8px 16px; background: rgba(254,250,224,0.08); backdrop-filter: blur(12px); border:1px solid rgba(254,250,224,0.18); border-radius:30px; color:var(--cream); font-size:0.85rem; text-decoration:none; font-weight:600; transition: all 0.3s ease; }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel { position:fixed; top:18px; right:18px; z-index:100; width: min(320px, 90vw); background: rgba(12,18,28,0.82); backdrop-filter: blur(16px); border:1px solid rgba(254,250,224,0.12); border-radius:18px; padding:1.05rem 1.15rem; max-height: calc(100vh - 36px); overflow-y:auto; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; background: linear-gradient(90deg, var(--earth), var(--magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.3rem; }
  .panel .tag { display:inline-block; font-size:0.7rem; font-weight:700; padding: 0.18rem 0.6rem; border-radius:10px; background: linear-gradient(135deg, var(--terracotta), var(--magenta)); color: var(--cream); letter-spacing:0.05em; text-transform: uppercase; margin-bottom: 0.7rem; }
  .panel p { font-size:0.82rem; opacity:0.85; line-height:1.5; margin-bottom: 0.85rem; }
  .control { margin-bottom: 0.7rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:0.25rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--accent); }
  .btnrow { display:flex; gap:0.4rem; flex-wrap:wrap; }
  button { flex:1; padding: 0.45rem 0.5rem; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:600; background: linear-gradient(135deg, var(--sage), var(--moss)); color:var(--cream); border:none; border-radius:9px; cursor:pointer; transition:all 0.2s; }
  button:hover { transform: translateY(-1px); filter: brightness(1.15); }
  button.secondary { background: rgba(254,250,224,0.12); }
  button.p { background: linear-gradient(135deg, var(--terracotta), var(--earth)); }
  .stat { display:flex; justify-content:space-between; font-size:0.78rem; padding: 0.22rem 0; border-bottom: 1px dashed rgba(254,250,224,0.08); }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">SD ✦ NN</span>
  <h2>Permafrost Methane</h2>
  <p>Stock C_perma of frozen carbon thaws as temperature rises; thawed CH4 forces more warming. Reinforcing loop produces a tipping point: small extra forcing → runaway release.</p>

  <div class="control"><label>External forcing F <span id="vF">1.20</span></label><input type="range" id="iF" min="0" max="3" step="0.01" value="1.20" /></div>
  <div class="control"><label>CH4 sensitivity κ <span id="vK">0.020</span></label><input type="range" id="iK" min="0" max="0.05" step="0.001" value="0.020" /></div>
  <div class="control"><label>Thaw threshold Tθ <span id="vTh">1.5</span></label><input type="range" id="iTh" min="0.5" max="3" step="0.01" value="1.5" /></div>
  <div class="control"><label>Decay τ <span id="vTau">10</span></label><input type="range" id="iTau" min="2" max="40" step="0.5" value="10" /></div>

  <div class="btnrow" style="margin-bottom:0.6rem;">
    <button class="p" data-p="0.5,0.020,1.5">Stable</button>
    <button class="p" data-p="1.4,0.025,1.5">Tipping</button>
    <button class="p" data-p="2.2,0.030,1.2">Runaway</button>
  </div>
  <div class="btnrow" style="margin-bottom:0.8rem;">
    <button id="bRun">Pause</button>
    <button id="bReset" class="secondary">Reset</button>
  </div>

  <div class="stat"><span>t (yr)</span><span class="v" id="st">0</span></div>
  <div class="stat"><span>ΔT (°C)</span><span class="v" id="sT">—</span></div>
  <div class="stat"><span>C_perma</span><span class="v" id="sC">—</span></div>
  <div class="stat"><span>CH4 flux</span><span class="v" id="sM">—</span></div>
  <div class="stat"><span>Status</span><span class="v" id="sR">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0,H=0, dpr=Math.min(window.devicePixelRatio||1,2);
  function resize() {
    W=window.innerWidth; H=window.innerHeight;
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width=W+'px'; cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  let F=1.20, kappa=0.020, Tth=1.5, tau=10;
  // State: T = anomaly °C; Cp = remaining permafrost (1.0 init); M = CH4 in atmosphere
  let Tt=0.0, Cp=1.0, M=0.0, t=0, running=true;
  const series = []; const MAX = 1500;

  function thawRate(T, Cp) {
    // sigmoidal thaw response
    const x = (T - Tth);
    const s = 1/(1+Math.exp(-3*x));
    return 0.05 * s * Cp;
  }

  function deriv(T, Cp, M) {
    const thaw = thawRate(T, Cp);
    const dT = 0.05 * (F + kappa*M*100 - T*0.5);  // forcing - radiative damping
    const dCp = -thaw;
    const dM = thaw*5 - M/tau;
    return [dT, dCp, dM];
  }

  function reset() { Tt=0; Cp=1.0; M=0; t=0; series.length=0; }

  function rk4(dt) {
    const k1 = deriv(Tt, Cp, M);
    const k2 = deriv(Tt+dt/2*k1[0], Cp+dt/2*k1[1], M+dt/2*k1[2]);
    const k3 = deriv(Tt+dt/2*k2[0], Cp+dt/2*k2[1], M+dt/2*k2[2]);
    const k4 = deriv(Tt+dt*k3[0],   Cp+dt*k3[1],   M+dt*k3[2]);
    Tt += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    Cp += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
    M  += dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]);
    if (Cp<0) Cp=0; if (M<0) M=0;
    t += dt;
  }

  function tick() {
    const dt = 0.5;
    for (let i=0;i<2;i++) rk4(dt);
    series.push({t, T:Tt, Cp, M});
    if (series.length>MAX) series.shift();
    document.getElementById('st').textContent=t.toFixed(0);
    document.getElementById('sT').textContent=Tt.toFixed(2);
    document.getElementById('sC').textContent=Cp.toFixed(3);
    document.getElementById('sM').textContent=thawRate(Tt,Cp).toFixed(4);
    const status = Cp<0.05?'depleted':Tt>Tth+0.5?'tipping':Tt>Tth?'thawing':'stable';
    document.getElementById('sR').textContent=status;
  }

  function draw() {
    ctx.fillStyle='#06080d'; ctx.fillRect(0,0,W,H);
    const padL=70, padR=360, padT=50, padB=40;
    const totW=W-padL-padR;
    const halfH = (H-padT-padB-50)/2;

    // Top: time series of T, Cp, M
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Stocks vs time (T °C, Permafrost C_perma, CH4)', padL, padT-12);
    ctx.strokeStyle='rgba(254,250,224,0.1)';
    for (let i=0;i<=4;i++) {
      const yp=padT+i*halfH/4;
      ctx.beginPath(); ctx.moveTo(padL,yp); ctx.lineTo(padL+totW,yp); ctx.stroke();
    }
    if (series.length>1) {
      const t0=series[0].t, t1=series[series.length-1].t, ts=Math.max(t1-t0,1);
      // T (orange)
      const Tmax=Math.max(...series.map(s=>s.T),5);
      ctx.strokeStyle='#fb923c'; ctx.lineWidth=2.2; ctx.beginPath();
      for (let i=0;i<series.length;i++) {
        const s=series[i];
        const px=padL+(s.t-t0)/ts*totW;
        const py=padT+halfH-Math.max(0,s.T)/Tmax*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
      // Cp (sage)
      ctx.strokeStyle='#8A9A5B'; ctx.beginPath();
      for (let i=0;i<series.length;i++) {
        const s=series[i];
        const px=padL+(s.t-t0)/ts*totW;
        const py=padT+halfH-s.Cp*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
      // M (magenta)
      const Mmax=Math.max(...series.map(s=>s.M),0.5);
      ctx.strokeStyle='#e879f9'; ctx.beginPath();
      for (let i=0;i<series.length;i++) {
        const s=series[i];
        const px=padL+(s.t-t0)/ts*totW;
        const py=padT+halfH-s.M/Mmax*halfH;
        if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.stroke();
    }
    // legend
    ctx.font='11px Nunito';
    ctx.fillStyle='#fb923c'; ctx.fillText('■ ΔT', padL+totW-180, padT+12);
    ctx.fillStyle='#8A9A5B'; ctx.fillText('■ C_perma', padL+totW-130, padT+12);
    ctx.fillStyle='#e879f9'; ctx.fillText('■ CH4', padL+totW-60, padT+12);

    // Bottom: causal loop diagram
    const bY=padT+halfH+50;
    ctx.fillStyle='rgba(254,250,224,0.7)'; ctx.font='13px Nunito';
    ctx.fillText('Causal loop: thaw amplification (R)', padL, bY-12);

    // Draw nodes
    const cx0 = padL + totW*0.18;
    const cx1 = padL + totW*0.50;
    const cx2 = padL + totW*0.82;
    const cy0 = bY + halfH*0.3;
    const cy1 = bY + halfH*0.7;
    const nodes = [
      {x:cx0, y:cy0, label:'ΔT', color:'#fb923c'},
      {x:cx1, y:cy0, label:'Thaw rate', color:'#06b6d4'},
      {x:cx2, y:cy0, label:'CH4 flux', color:'#e879f9'},
      {x:cx1, y:cy1, label:'C_perma', color:'#8A9A5B'},
    ];
    function arrow(a,b,sign,curve) {
      const dx=b.x-a.x, dy=b.y-a.y;
      const len=Math.hypot(dx,dy);
      const ux=dx/len, uy=dy/len;
      const nx=-uy*(curve||0)*40, ny=ux*(curve||0)*40;
      const sx=a.x+ux*30, sy=a.y+uy*30;
      const ex=b.x-ux*30, ey=b.y-uy*30;
      const mx=(sx+ex)/2+nx, my=(sy+ey)/2+ny;
      ctx.strokeStyle='rgba(254,250,224,0.6)'; ctx.lineWidth=1.6;
      ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo(mx,my,ex,ey); ctx.stroke();
      // arrowhead
      const ang=Math.atan2(ey-my,ex-mx);
      ctx.beginPath();
      ctx.moveTo(ex,ey);
      ctx.lineTo(ex-10*Math.cos(ang-0.4), ey-10*Math.sin(ang-0.4));
      ctx.lineTo(ex-10*Math.cos(ang+0.4), ey-10*Math.sin(ang+0.4));
      ctx.closePath(); ctx.fillStyle='rgba(254,250,224,0.6)'; ctx.fill();
      // sign
      ctx.fillStyle = sign>0?'#fb923c':'#06b6d4';
      ctx.font='14px Nunito'; ctx.fillText(sign>0?'+':'−', mx-4, my-6);
    }
    arrow(nodes[0], nodes[1], +1, 0.0);
    arrow(nodes[1], nodes[2], +1, 0.0);
    arrow(nodes[2], nodes[0], +1, -0.6);
    arrow(nodes[1], nodes[3], -1, 0.0);
    // Reinforcing label
    ctx.fillStyle='#e879f9'; ctx.font='bold 18px Nunito';
    ctx.fillText('R', (cx0+cx1+cx2)/3-6, cy0-30);

    for (const n of nodes) {
      ctx.fillStyle='rgba(12,18,28,0.9)';
      ctx.strokeStyle=n.color; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(n.x,n.y,28,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle=n.color; ctx.font='bold 11px Nunito';
      ctx.textAlign='center'; ctx.fillText(n.label, n.x, n.y+4);
      ctx.textAlign='start';
    }
  }

  function loop() { if (running) tick(); draw(); requestAnimationFrame(loop); }

  function bind(id,vid,prop,dec=2){
    const el=document.getElementById(id);
    el.addEventListener('input', e=>{
      const v=+e.target.value;
      document.getElementById(vid).textContent = v.toFixed(dec);
      if (prop==='F') F=v; if (prop==='K') kappa=v; if (prop==='Th') Tth=v; if (prop==='Tau') tau=v;
    });
  }
  bind('iF','vF','F'); bind('iK','vK','K',3); bind('iTh','vTh','Th'); bind('iTau','vTau','Tau',1);
  document.querySelectorAll('.p').forEach(b=>{
    b.addEventListener('click',()=>{
      const [f,k,th]=b.dataset.p.split(',').map(Number);
      F=f; kappa=k; Tth=th;
      document.getElementById('iF').value=F; document.getElementById('vF').textContent=F.toFixed(2);
      document.getElementById('iK').value=kappa; document.getElementById('vK').textContent=kappa.toFixed(3);
      document.getElementById('iTh').value=Tth; document.getElementById('vTh').textContent=Tth.toFixed(2);
      reset();
    });
  });
  document.getElementById('bRun').addEventListener('click', e=>{
    running=!running; e.target.textContent=running?'Pause':'Resume';
  });
  document.getElementById('bReset').addEventListener('click', reset);
  reset(); loop();
})();
</script>
</body>
</html>
