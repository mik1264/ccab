<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Conway's Game of Life — Page CAS Models</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --sage:#8A9A5B; --moss:#606C38; --earth:#DDA15E;
    --cream:#FEFAE0; --terracotta:#BC6C25; --dark-moss:#3d4423;
    --bg:#0e1218;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Nunito',sans-serif; color:var(--cream); }
  canvas { display:block; position:fixed; inset:0; width:100%; height:100%; cursor: crosshair; }
  .back-link {
    position:fixed; top:18px; left:18px; z-index:100;
    display:flex; align-items:center; gap:8px;
    padding:8px 16px;
    background: rgba(254,250,224,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(254,250,224,0.18);
    border-radius:30px; color:var(--cream);
    font-size:0.85rem; text-decoration:none; font-weight:600;
    transition: all 0.3s ease;
  }
  .back-link:hover { background:rgba(254,250,224,0.16); transform: translateX(-3px); }
  .panel {
    position:fixed; top:18px; right:18px; z-index:100;
    width: min(320px, 90vw);
    background: rgba(20,28,38,0.78);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border:1px solid rgba(254,250,224,0.15);
    border-radius:18px; padding:1.1rem 1.2rem;
    color: var(--cream);
    max-height: calc(100vh - 36px); overflow-y:auto;
  }
  .panel h2 { font-family:'Lora',serif; font-size:1.15rem; color: var(--earth); margin-bottom: 0.3rem; }
  .panel .tag {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding: 0.18rem 0.6rem; border-radius:10px;
    background: var(--sage); color: var(--cream);
    letter-spacing:0.05em; text-transform: uppercase;
    margin-bottom: 0.7rem;
  }
  .panel p { font-size:0.84rem; opacity:0.85; line-height:1.5; margin-bottom: 0.9rem; }
  .control { margin-bottom: 0.9rem; }
  .control label { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:0.3rem; color: var(--earth); }
  .control input[type=range] { width:100%; accent-color: var(--sage); }
  .btnrow { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom: 0.7rem; }
  button {
    flex:1; padding: 0.5rem 0.6rem;
    font-family:'Nunito',sans-serif; font-size:0.8rem; font-weight:600;
    background: var(--sage); color:var(--cream);
    border: none; border-radius: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: var(--moss); transform: translateY(-1px); }
  button.secondary { background: rgba(254,250,224,0.15); }
  button.secondary:hover { background: rgba(254,250,224,0.25); }
  .stat {
    display:flex; justify-content:space-between;
    font-size:0.8rem; padding: 0.25rem 0;
    border-bottom: 1px dashed rgba(254,250,224,0.1);
  }
  .stat:last-child { border-bottom:none; }
  .stat .v { font-weight:700; color: var(--earth); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<a class="back-link" href="index.html">← Gallery</a>
<canvas id="c"></canvas>

<div class="panel">
  <span class="tag">ABM · 04</span>
  <h2>Conway's Game of Life</h2>
  <p>Toroidal grid running B3/S23. A dead cell with exactly 3 live neighbors comes to life; a live cell with 2 or 3 neighbors survives. Click cells to paint, drop a glider gun, or scatter randomly.</p>

  <div class="control">
    <label>Grid size <span id="vN">100</span></label>
    <input type="range" id="iN" min="40" max="200" step="10" value="100" />
  </div>
  <div class="control">
    <label>Speed (steps/frame) <span id="vSpd">1</span></label>
    <input type="range" id="iSpd" min="1" max="10" step="1" value="1" />
  </div>

  <div class="btnrow">
    <button id="bRun">Pause</button>
    <button id="bStep" class="secondary">Step</button>
  </div>
  <div class="btnrow">
    <button id="bRand">Random</button>
    <button id="bGun" class="secondary">Glider gun</button>
    <button id="bClear" class="secondary">Clear</button>
  </div>

  <div class="stat"><span>Generation</span><span class="v" id="sGen">0</span></div>
  <div class="stat"><span>Live cells</span><span class="v" id="sLive">—</span></div>
  <div class="stat"><span>Density</span><span class="v" id="sDen">—</span></div>
</div>

<script>
(() => {
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  let W=0, H=0, dpr = Math.min(window.devicePixelRatio||1, 2);
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W*dpr; cv.height = H*dpr;
    cv.style.width = W+'px'; cv.style.height = H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', () => { resize(); draw(); });
  resize();

  let N=100, speed=1, gen=0, running=true;
  let grid, next;

  function init(rand=true) {
    N = +document.getElementById('iN').value;
    grid = new Uint8Array(N*N);
    next = new Uint8Array(N*N);
    if (rand) {
      for (let i=0;i<N*N;i++) grid[i] = Math.random()<0.25 ? 1 : 0;
    }
    gen = 0;
    document.getElementById('vN').textContent = N;
  }

  function placeGun() {
    grid = new Uint8Array(N*N);
    next = new Uint8Array(N*N);
    const r0 = 5, c0 = 5;
    // Gosper glider gun
    const cells = [
      [0,4],[0,5],[1,4],[1,5],
      [10,4],[10,5],[10,6],[11,3],[11,7],[12,2],[12,8],[13,2],[13,8],
      [14,5],[15,3],[15,7],[16,4],[16,5],[16,6],[17,5],
      [20,2],[20,3],[20,4],[21,2],[21,3],[21,4],[22,1],[22,5],
      [24,0],[24,1],[24,5],[24,6],
      [34,2],[34,3],[35,2],[35,3]
    ];
    for (const [c,r] of cells) {
      const rr = (r0+r) % N, cc = (c0+c) % N;
      grid[rr*N+cc] = 1;
    }
    gen = 0;
  }

  function tick() {
    for (let r=0;r<N;r++) {
      const rm = (r-1+N)%N, rp = (r+1)%N;
      for (let c=0;c<N;c++) {
        const cm = (c-1+N)%N, cp = (c+1)%N;
        const n = grid[rm*N+cm]+grid[rm*N+c]+grid[rm*N+cp]
                + grid[r*N+cm]+grid[r*N+cp]
                + grid[rp*N+cm]+grid[rp*N+c]+grid[rp*N+cp];
        const v = grid[r*N+c];
        next[r*N+c] = (v && (n===2||n===3)) || (!v && n===3) ? 1 : 0;
      }
    }
    [grid,next] = [next,grid];
    gen++;
  }

  function draw() {
    ctx.fillStyle = '#0e1218';
    ctx.fillRect(0,0,W,H);
    const cell = Math.min(W,H)/N;
    const ox = (W - cell*N)/2, oy = (H - cell*N)/2;
    ctx.fillStyle = '#1a2230';
    ctx.fillRect(ox, oy, cell*N, cell*N);
    let live=0;
    ctx.fillStyle = '#DDA15E';
    for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
      if (grid[r*N+c]) {
        ctx.fillRect(ox+c*cell, oy+r*cell, cell+0.5, cell+0.5);
        live++;
      }
    }
    document.getElementById('sGen').textContent = gen;
    document.getElementById('sLive').textContent = live;
    document.getElementById('sDen').textContent = ((live/(N*N))*100).toFixed(1)+'%';
  }

  function loop() {
    if (running) for (let s=0;s<speed;s++) tick();
    draw();
    requestAnimationFrame(loop);
  }

  // Click painting
  let painting=false, paintVal=1;
  function cellAt(x,y) {
    const cell = Math.min(W,H)/N;
    const ox = (W - cell*N)/2, oy = (H - cell*N)/2;
    const c = Math.floor((x-ox)/cell), r = Math.floor((y-oy)/cell);
    if (r<0||r>=N||c<0||c>=N) return -1;
    return r*N+c;
  }
  cv.addEventListener('mousedown', e => {
    const i = cellAt(e.clientX, e.clientY);
    if (i<0) return;
    paintVal = grid[i] ? 0 : 1;
    grid[i] = paintVal;
    painting = true;
  });
  cv.addEventListener('mousemove', e => {
    if (!painting) return;
    const i = cellAt(e.clientX, e.clientY);
    if (i>=0) grid[i] = paintVal;
  });
  window.addEventListener('mouseup', () => painting=false);

  document.getElementById('iN').addEventListener('input', e => {
    document.getElementById('vN').textContent = e.target.value;
    init(true);
  });
  document.getElementById('iSpd').addEventListener('input', e => {
    speed = +e.target.value;
    document.getElementById('vSpd').textContent = speed;
  });
  document.getElementById('bRun').addEventListener('click', e => {
    running = !running;
    e.target.textContent = running ? 'Pause' : 'Resume';
  });
  document.getElementById('bStep').addEventListener('click', () => { tick(); });
  document.getElementById('bRand').addEventListener('click', () => init(true));
  document.getElementById('bGun').addEventListener('click', placeGun);
  document.getElementById('bClear').addEventListener('click', () => init(false));

  init(true); loop();
})();
</script>
</body>
</html>
