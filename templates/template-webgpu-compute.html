<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGPU Compute Demo - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --dark-moss: #3d4423;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background: #0a0e1a;
            color: #e8e6e1;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* Back Link */
        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.7);
            color: var(--earth);
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Nunito', sans-serif;
            z-index: 999;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(221, 161, 94, 0.2);
            transform: translateX(-4px);
        }

        /* FPS Counter */
        #fps-counter {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: var(--earth);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            z-index: 999;
        }

        .fps-good { color: #10b981; }
        .fps-medium { color: #fbbf24; }
        .fps-poor { color: #e11d48; }

        /* Controls Panel */
        #controls {
            position: fixed;
            top: 50px;
            right: 10px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            padding: 1rem;
            border-radius: 12px;
            z-index: 999;
            min-width: 200px;
            font-family: 'Nunito', sans-serif;
            border: 1px solid rgba(221, 161, 94, 0.3);
        }

        #controls h3 {
            font-family: 'Lora', serif;
            color: var(--earth);
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .control-group {
            margin-bottom: 0.75rem;
        }

        .control-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--sage);
            margin-bottom: 0.25rem;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: var(--earth);
        }

        .control-group .value {
            font-size: 0.75rem;
            color: var(--earth);
            text-align: right;
        }

        /* Loading State */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--earth);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error / Not Supported */
        #error, #not-supported {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            max-width: 480px;
            z-index: 1001;
            border: 1px solid rgba(225, 29, 72, 0.4);
        }

        #not-supported {
            border-color: rgba(251, 191, 36, 0.4);
        }

        #error h2, #not-supported h2 {
            font-family: 'Lora', serif;
            margin: 0 0 1rem 0;
            font-size: 1.5rem;
            color: #e11d48;
        }

        #not-supported h2 { color: #fbbf24; }

        #not-supported a {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.6rem 1.5rem;
            background: var(--moss);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.3s;
        }

        #not-supported a:hover { background: var(--sage); }
    </style>
</head>
<body>
    <!-- Back Navigation -->
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>

    <!-- FPS Counter -->
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>

    <!-- Controls Panel -->
    <div id="controls">
        <h3>Controls</h3>
        <div class="control-group">
            <label>Speed <span class="value" id="speed-value">1.0</span></label>
            <input type="range" id="speed" min="0.1" max="5" step="0.1" value="1.0">
        </div>
        <!-- Add more controls as needed -->
    </div>

    <!-- Loading State -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Initializing WebGPU...</p>
    </div>

    <!-- Error State -->
    <div id="error">
        <h2>Error</h2>
        <p id="error-message">An unexpected error occurred.</p>
    </div>

    <!-- WebGPU Not Supported -->
    <div id="not-supported">
        <h2>WebGPU Not Available</h2>
        <p>Your browser does not support WebGPU. WebGPU is available in Chrome 113+, Edge 113+, and Safari 18+.</p>
        <a href="https://www.google.com/chrome/" target="_blank" rel="noopener">Get Chrome</a>
    </div>

    <!-- Canvas -->
    <canvas id="canvas"></canvas>

    <script>
        // ============================================================
        // Utility Functions
        // ============================================================

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-message').textContent = message;
        }

        function showNotSupported() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('not-supported').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // FPS Counter
        class FPSCounter {
            constructor() {
                this.fps = 0;
                this.frames = 0;
                this.lastTime = performance.now();
                this.fpsDisplay = document.getElementById('fps-value');
            }

            update() {
                this.frames++;
                const currentTime = performance.now();
                const delta = currentTime - this.lastTime;

                if (delta >= 1000) {
                    this.fps = Math.round((this.frames * 1000) / delta);
                    this.frames = 0;
                    this.lastTime = currentTime;

                    this.fpsDisplay.textContent = this.fps;
                    this.fpsDisplay.className = this.fps >= 55 ? 'fps-good' :
                                                 this.fps >= 30 ? 'fps-medium' : 'fps-poor';
                }
            }
        }

        // Controls helper
        function setupSlider(id, valueId, callback) {
            const slider = document.getElementById(id);
            const display = document.getElementById(valueId);
            slider.addEventListener('input', () => {
                display.textContent = parseFloat(slider.value).toFixed(1);
                if (callback) callback(parseFloat(slider.value));
            });
        }

        // ============================================================
        // WebGPU Initialization
        // ============================================================

        async function init() {
            // Check WebGPU support
            if (!navigator.gpu) {
                showNotSupported();
                return;
            }

            const adapter = await navigator.gpu.requestAdapter();
            if (!adapter) {
                showNotSupported();
                return;
            }

            const device = await adapter.requestDevice();

            // Canvas setup
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('webgpu');
            const presentationFormat = navigator.gpu.getPreferredCanvasFormat();

            function resize() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = window.innerWidth * dpr;
                canvas.height = window.innerHeight * dpr;
                canvas.style.width = window.innerWidth + 'px';
                canvas.style.height = window.innerHeight + 'px';

                context.configure({
                    device: device,
                    format: presentationFormat,
                    alphaMode: 'premultiplied',
                });
            }

            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(resize, 150);
            });
            resize();

            // ========================================
            // YOUR COMPUTE SHADER HERE
            // ========================================

            const NUM_PARTICLES = 4096;

            const computeShaderCode = /* wgsl */`
                struct Particle {
                    pos: vec2f,
                    vel: vec2f,
                };

                struct Params {
                    deltaTime: f32,
                    speed: f32,
                };

                @group(0) @binding(0) var<storage, read> particlesIn: array<Particle>;
                @group(0) @binding(1) var<storage, read_write> particlesOut: array<Particle>;
                @group(0) @binding(2) var<uniform> params: Params;

                @compute @workgroup_size(64)
                fn main(@builtin(global_invocation_id) gid: vec3u) {
                    let i = gid.x;
                    if (i >= arrayLength(&particlesIn)) { return; }

                    var p = particlesIn[i];

                    // Simple attractor toward center
                    let toCenter = vec2f(0.0) - p.pos;
                    let dist = length(toCenter);
                    let force = toCenter / max(dist, 0.01) * 0.001 * params.speed;

                    p.vel = p.vel + force;
                    p.vel = p.vel * 0.999; // damping
                    p.pos = p.pos + p.vel * params.deltaTime * params.speed;

                    // Wrap around
                    if (p.pos.x > 1.0) { p.pos.x = -1.0; }
                    if (p.pos.x < -1.0) { p.pos.x = 1.0; }
                    if (p.pos.y > 1.0) { p.pos.y = -1.0; }
                    if (p.pos.y < -1.0) { p.pos.y = 1.0; }

                    particlesOut[i] = p;
                }
            `;

            // ========================================
            // YOUR RENDER SHADER HERE
            // ========================================

            const renderShaderCode = /* wgsl */`
                struct Particle {
                    pos: vec2f,
                    vel: vec2f,
                };

                struct VSOutput {
                    @builtin(position) position: vec4f,
                    @location(0) color: vec4f,
                };

                @group(0) @binding(0) var<storage, read> particles: array<Particle>;

                @vertex
                fn vs(@builtin(vertex_index) vi: u32) -> VSOutput {
                    let p = particles[vi];
                    var out: VSOutput;
                    out.position = vec4f(p.pos, 0.0, 1.0);
                    let speed = length(p.vel);
                    out.color = vec4f(
                        0.54 + speed * 50.0,
                        0.60 + speed * 20.0,
                        0.36,
                        1.0
                    );
                    return out;
                }

                @fragment
                fn fs(in: VSOutput) -> @location(0) vec4f {
                    return in.color;
                }
            `;

            // ========================================

            // Create shader modules
            const computeModule = device.createShaderModule({ code: computeShaderCode });
            const renderModule = device.createShaderModule({ code: renderShaderCode });

            // Particle data initialization
            const particleByteSize = 4 * 4; // 2 floats pos + 2 floats vel
            const bufferSize = NUM_PARTICLES * particleByteSize;

            const initialData = new Float32Array(NUM_PARTICLES * 4);
            for (let i = 0; i < NUM_PARTICLES; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 0.8;
                initialData[i * 4 + 0] = Math.cos(angle) * radius; // pos.x
                initialData[i * 4 + 1] = Math.sin(angle) * radius; // pos.y
                initialData[i * 4 + 2] = (Math.random() - 0.5) * 0.01; // vel.x
                initialData[i * 4 + 3] = (Math.random() - 0.5) * 0.01; // vel.y
            }

            // Double-buffered particle storage
            const particleBuffers = [
                device.createBuffer({
                    size: bufferSize,
                    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
                }),
                device.createBuffer({
                    size: bufferSize,
                    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
                }),
            ];
            device.queue.writeBuffer(particleBuffers[0], 0, initialData);
            device.queue.writeBuffer(particleBuffers[1], 0, initialData);

            // Params uniform buffer
            const paramsBuffer = device.createBuffer({
                size: 8, // 2 floats
                usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
            });

            // Compute pipeline
            const computePipeline = device.createComputePipeline({
                layout: 'auto',
                compute: { module: computeModule, entryPoint: 'main' },
            });

            // Render pipeline
            const renderPipeline = device.createRenderPipeline({
                layout: 'auto',
                vertex: {
                    module: renderModule,
                    entryPoint: 'vs',
                },
                fragment: {
                    module: renderModule,
                    entryPoint: 'fs',
                    targets: [{ format: presentationFormat }],
                },
                primitive: { topology: 'point-list' },
            });

            // Bind groups for double-buffering
            const computeBindGroups = [
                device.createBindGroup({
                    layout: computePipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: particleBuffers[0] } },
                        { binding: 1, resource: { buffer: particleBuffers[1] } },
                        { binding: 2, resource: { buffer: paramsBuffer } },
                    ],
                }),
                device.createBindGroup({
                    layout: computePipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: particleBuffers[1] } },
                        { binding: 1, resource: { buffer: particleBuffers[0] } },
                        { binding: 2, resource: { buffer: paramsBuffer } },
                    ],
                }),
            ];

            const renderBindGroups = [
                device.createBindGroup({
                    layout: renderPipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: particleBuffers[1] } },
                    ],
                }),
                device.createBindGroup({
                    layout: renderPipeline.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: particleBuffers[0] } },
                    ],
                }),
            ];

            // State
            let frame = 0;
            let speed = 1.0;
            const fpsCounter = new FPSCounter();

            // Setup controls
            setupSlider('speed', 'speed-value', (v) => { speed = v; });

            hideLoading();

            // Animation loop
            let lastTime = performance.now();

            function render() {
                fpsCounter.update();

                const now = performance.now();
                const dt = Math.min((now - lastTime) / 1000, 0.05);
                lastTime = now;

                // Update params
                device.queue.writeBuffer(paramsBuffer, 0, new Float32Array([dt, speed]));

                const commandEncoder = device.createCommandEncoder();

                // Compute pass
                const computePass = commandEncoder.beginComputePass();
                computePass.setPipeline(computePipeline);
                computePass.setBindGroup(0, computeBindGroups[frame % 2]);
                computePass.dispatchWorkgroups(Math.ceil(NUM_PARTICLES / 64));
                computePass.end();

                // Render pass
                const textureView = context.getCurrentTexture().createView();
                const renderPass = commandEncoder.beginRenderPass({
                    colorAttachments: [{
                        view: textureView,
                        clearValue: { r: 0.04, g: 0.055, b: 0.1, a: 1 },
                        loadOp: 'clear',
                        storeOp: 'store',
                    }],
                });
                renderPass.setPipeline(renderPipeline);
                renderPass.setBindGroup(0, renderBindGroups[frame % 2]);
                renderPass.draw(NUM_PARTICLES);
                renderPass.end();

                device.queue.submit([commandEncoder.finish()]);
                frame++;

                requestAnimationFrame(render);
            }

            render();

            // Cleanup
            window.addEventListener('beforeunload', () => {
                particleBuffers[0].destroy();
                particleBuffers[1].destroy();
                paramsBuffer.destroy();
            });
        }

        // Start
        init().catch((err) => {
            showError('WebGPU Initialization Error: ' + err.message);
            console.error(err);
        });

        // Global error handler
        window.addEventListener('error', (e) => {
            showError('Runtime Error: ' + e.message);
            console.error(e);
        });
    </script>
</body>
</html>
