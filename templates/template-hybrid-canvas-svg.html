<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Canvas + SVG Template - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background: #0a0e1a;
            color: #e8e6e1;
        }

        /* Back Link */
        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.7);
            color: var(--earth);
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Nunito', sans-serif;
            z-index: 999;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(221, 161, 94, 0.2);
            transform: translateX(-4px);
        }

        /* FPS Counter */
        #fps-counter {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: var(--earth);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            z-index: 999;
        }

        .fps-good { color: #10b981; }
        .fps-medium { color: #fbbf24; }
        .fps-poor { color: #e11d48; }

        /* Hybrid container: Canvas behind, SVG on top */
        #hybrid-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* SVG elements that need interaction must opt in */
        .interactive {
            pointer-events: all;
            cursor: pointer;
        }

        /* SVG text styling */
        .svg-label {
            font-family: 'Nunito', sans-serif;
            font-size: 12px;
            fill: rgba(255, 255, 255, 0.8);
            pointer-events: none;
        }

        .svg-title {
            font-family: 'Lora', serif;
            font-size: 16px;
            fill: var(--earth);
            pointer-events: none;
        }

        /* Loading State */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--earth);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error State */
        #error {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(225, 29, 72, 0.9);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
            z-index: 1001;
        }

        #error h2 {
            font-family: 'Lora', serif;
            margin: 0 0 1rem 0;
        }
    </style>
</head>
<body>
    <!-- Back Navigation -->
    <a href="../index.html" class="back-link">&larr; Back to Gallery</a>

    <!-- FPS Counter -->
    <div id="fps-counter">FPS: <span id="fps-value">0</span></div>

    <!-- Loading State -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Loading demo...</p>
    </div>

    <!-- Error State -->
    <div id="error">
        <h2>Error</h2>
        <p id="error-message">An unexpected error occurred.</p>
    </div>

    <!-- Hybrid Container -->
    <div id="hybrid-container">
        <!-- Canvas layer: high-performance pixel rendering -->
        <canvas id="canvas"></canvas>

        <!-- SVG overlay: crisp text, labels, interactive controls -->
        <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Reusable SVG definitions (gradients, filters, markers) -->
            </defs>

            <!-- ========================================
                 SVG OVERLAY CODE
                 ======================================== -->

            <!-- Example: Title and info overlay -->
            <text class="svg-title" x="50%" y="50" text-anchor="middle">Hybrid Demo</text>

            <!-- Example: Interactive button -->
            <g class="interactive" id="reset-btn" transform="translate(20, 60)">
                <rect width="80" height="30" rx="6" fill="rgba(0,0,0,0.6)" stroke="rgba(221,161,94,0.5)" stroke-width="1"/>
                <text x="40" y="20" text-anchor="middle" class="svg-label" fill="#DDA15E">Reset</text>
            </g>

            <!-- ======================================== -->
        </svg>
    </div>

    <script>
        // Error handling
        window.addEventListener('error', (e) => {
            showError('Runtime Error: ' + e.message);
            console.error(e);
        });

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error-message').textContent = message;
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        // FPS Counter
        class FPSCounter {
            constructor() {
                this.fps = 0;
                this.frames = 0;
                this.lastTime = performance.now();
                this.fpsDisplay = document.getElementById('fps-value');
            }

            update() {
                this.frames++;
                const currentTime = performance.now();
                const delta = currentTime - this.lastTime;

                if (delta >= 1000) {
                    this.fps = Math.round((this.frames * 1000) / delta);
                    this.frames = 0;
                    this.lastTime = currentTime;

                    this.fpsDisplay.textContent = this.fps;
                    this.fpsDisplay.className = this.fps >= 55 ? 'fps-good' :
                                                 this.fps >= 30 ? 'fps-medium' : 'fps-poor';
                }
            }
        }

        // ============================================================
        // Canvas Setup with Retina Support
        // ============================================================

        class CanvasManager {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.dpr = Math.min(window.devicePixelRatio || 1, 2);
                this.width = 0;
                this.height = 0;
            }

            resize() {
                const rect = this.canvas.getBoundingClientRect();
                this.width = rect.width;
                this.height = rect.height;

                this.canvas.width = rect.width * this.dpr;
                this.canvas.height = rect.height * this.dpr;
                this.ctx.scale(this.dpr, this.dpr);
            }

            clear(color) {
                this.ctx.clearRect(0, 0, this.width, this.height);
                if (color) {
                    this.ctx.fillStyle = color;
                    this.ctx.fillRect(0, 0, this.width, this.height);
                }
            }
        }

        // ============================================================
        // SVG Overlay Manager
        // ============================================================

        class SVGOverlayManager {
            constructor(svgId) {
                this.svg = document.getElementById(svgId);
                this.ns = 'http://www.w3.org/2000/svg';
            }

            resize(width, height) {
                this.svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
                this.svg.setAttribute('width', width);
                this.svg.setAttribute('height', height);
            }

            createElement(tag, attrs) {
                const el = document.createElementNS(this.ns, tag);
                for (const [key, val] of Object.entries(attrs)) {
                    el.setAttribute(key, val);
                }
                return el;
            }

            addText(x, y, text, className) {
                const el = this.createElement('text', { x, y, class: className || 'svg-label' });
                el.textContent = text;
                this.svg.appendChild(el);
                return el;
            }

            addLine(x1, y1, x2, y2, attrs) {
                return this.svg.appendChild(this.createElement('line', {
                    x1, y1, x2, y2,
                    stroke: 'rgba(255,255,255,0.3)',
                    'stroke-width': '1',
                    ...attrs,
                }));
            }
        }

        // ============================================================
        // Main Demo
        // ============================================================

        try {
            const canvasManager = new CanvasManager('canvas');
            const svgOverlay = new SVGOverlayManager('svg-overlay');
            const fpsCounter = new FPSCounter();

            // Unified resize handler
            function resize() {
                canvasManager.resize();
                svgOverlay.resize(canvasManager.width, canvasManager.height);
            }

            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(resize, 150);
            });
            resize();

            // ========================================
            // CANVAS RENDERING CODE
            // ========================================

            // Example: Particle system rendered on canvas
            const particles = [];
            const NUM_PARTICLES = 500;

            for (let i = 0; i < NUM_PARTICLES; i++) {
                particles.push({
                    x: Math.random() * canvasManager.width,
                    y: Math.random() * canvasManager.height,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    r: 2 + Math.random() * 3,
                    hue: Math.random() * 60 + 30, // warm colors
                });
            }

            // Interactive SVG button
            document.getElementById('reset-btn').addEventListener('click', () => {
                for (const p of particles) {
                    p.x = Math.random() * canvasManager.width;
                    p.y = Math.random() * canvasManager.height;
                    p.vx = (Math.random() - 0.5) * 2;
                    p.vy = (Math.random() - 0.5) * 2;
                }
            });

            // ========================================

            // Animation loop
            function animate() {
                fpsCounter.update();
                const ctx = canvasManager.ctx;
                const { width, height } = canvasManager;

                // ========================================
                // CANVAS RENDERING CODE
                // ========================================

                canvasManager.clear('#0a0e1a');

                for (const p of particles) {
                    p.x += p.vx;
                    p.y += p.vy;

                    if (p.x < 0 || p.x > width) p.vx *= -1;
                    if (p.y < 0 || p.y > height) p.vy *= -1;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.hue}, 70%, 55%, 0.8)`;
                    ctx.fill();
                }

                // ========================================
                // SVG OVERLAY CODE
                // (Update SVG elements here if needed, e.g. move labels)
                // ========================================

                // ========================================

                requestAnimationFrame(animate);
            }

            hideLoading();
            animate();

        } catch (error) {
            showError('Initialization Error: ' + error.message);
            console.error(error);
        }
    </script>
</body>
</html>
