<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring & Neap Tides</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
canvas { display: block; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px 25px; border-radius: 12px; color: #FEFAE0;
    display: flex; gap: 20px; align-items: center; z-index: 100; flex-wrap: wrap;
    justify-content: center;
}
#controls label { font-size: 0.85rem; }
#controls input[type="range"] { width: 120px; accent-color: #DDA15E; }
#info {
    position: fixed; top: 60px; right: 20px;
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px; border-radius: 12px; color: #FEFAE0;
    font-size: 0.8rem; max-width: 220px; z-index: 100; line-height: 1.5;
}
.highlight { color: #DDA15E; font-weight: bold; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <div class="highlight" id="phase">New Moon</div>
    <div id="tideType">Spring Tide</div>
    <div id="tideHeight">Tidal Range: --</div>
    <br>
    <div>Moon's gravity: ~70% of tidal force</div>
    <div>Sun's gravity: ~30% of tidal force</div>
</div>
<div id="controls">
    <label>Speed: <input type="range" id="speed" min="0.1" max="5" step="0.1" value="1"></label>
    <label>Moon Distance: <input type="range" id="moonDist" min="0.7" max="1.3" step="0.01" value="1"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
let time = 0;
let paused = false;
let animId;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

const speedEl = document.getElementById('speed');
const moonDistEl = document.getElementById('moonDist');
const phaseEl = document.getElementById('phase');
const tideTypeEl = document.getElementById('tideType');
const tideHeightEl = document.getElementById('tideHeight');

function drawStar(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = '#FFF8DC';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, r * 3, 0, Math.PI * 2);
    let g = ctx.createRadialGradient(x, y, r, x, y, r * 3);
    g.addColorStop(0, 'rgba(255,248,220,0.3)');
    g.addColorStop(1, 'rgba(255,248,220,0)');
    ctx.fillStyle = g;
    ctx.fill();
}

function drawEarth(ex, ey, radius, bulgeNear, bulgeFar, bulgeAngle) {
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(bulgeAngle);
    ctx.beginPath();
    // Draw elliptical bulge
    const a = radius + bulgeNear;
    const b = radius - bulgeFar * 0.3;
    for (let i = 0; i <= 360; i++) {
        const rad = (i * Math.PI) / 180;
        const r = (a * b) / Math.sqrt((b * Math.cos(rad)) ** 2 + (a * Math.sin(rad)) ** 2);
        const px = r * Math.cos(rad);
        const py = r * Math.sin(rad);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
    }
    ctx.closePath();
    // Ocean
    let oceanG = ctx.createRadialGradient(0, 0, radius * 0.5, 0, 0, a);
    oceanG.addColorStop(0, '#1e5799');
    oceanG.addColorStop(1, '#2989d8');
    ctx.fillStyle = oceanG;
    ctx.fill();
    // Land overlay
    ctx.beginPath();
    ctx.arc(0, 0, radius * 0.85, 0, Math.PI * 2);
    let landG = ctx.createRadialGradient(0, 0, 0, 0, 0, radius * 0.85);
    landG.addColorStop(0, '#606C38');
    landG.addColorStop(1, '#8A9A5B');
    ctx.fillStyle = landG;
    ctx.fill();
    ctx.restore();
}

function drawMoon(mx, my, r, phase) {
    ctx.beginPath();
    ctx.arc(mx, my, r, 0, Math.PI * 2);
    ctx.fillStyle = '#C0C0C0';
    ctx.fill();
    // Craters
    ctx.beginPath();
    ctx.arc(mx - r * 0.3, my - r * 0.2, r * 0.15, 0, Math.PI * 2);
    ctx.fillStyle = '#A0A0A0';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(mx + r * 0.2, my + r * 0.25, r * 0.1, 0, Math.PI * 2);
    ctx.fillStyle = '#A0A0A0';
    ctx.fill();
}

function drawSun(sx, sy, r) {
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    let sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
    sg.addColorStop(0, '#FFF8DC');
    sg.addColorStop(0.7, '#FFD700');
    sg.addColorStop(1, '#DDA15E');
    ctx.fillStyle = sg;
    ctx.fill();
    // Glow
    ctx.beginPath();
    ctx.arc(sx, sy, r * 2, 0, Math.PI * 2);
    let gg = ctx.createRadialGradient(sx, sy, r, sx, sy, r * 2);
    gg.addColorStop(0, 'rgba(255,215,0,0.2)');
    gg.addColorStop(1, 'rgba(255,215,0,0)');
    ctx.fillStyle = gg;
    ctx.fill();
}

function drawForceArrows(ex, ey, angle, magnitude, color) {
    const len = magnitude * 40;
    for (let side = 0; side < 2; side++) {
        const a = angle + (side === 0 ? 0 : Math.PI);
        const startX = ex + Math.cos(a) * 50;
        const startY = ey + Math.sin(a) * 50;
        const endX = startX + Math.cos(a) * len;
        const endY = startY + Math.sin(a) * len;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();
        // Arrowhead
        const headLen = 8;
        const headAngle = 0.5;
        ctx.beginPath();
        ctx.moveTo(endX, endY);
        ctx.lineTo(endX - headLen * Math.cos(a - headAngle), endY - headLen * Math.sin(a - headAngle));
        ctx.moveTo(endX, endY);
        ctx.lineTo(endX - headLen * Math.cos(a + headAngle), endY - headLen * Math.sin(a + headAngle));
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();
    }
}

function drawOrbit(cx, cy, r, dashed) {
    ctx.beginPath();
    ctx.setLineDash(dashed ? [5, 10] : []);
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(254,250,224,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);
}

function draw() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    // Draw background stars
    if (!draw.stars) {
        draw.stars = [];
        for (let i = 0; i < 200; i++) {
            draw.stars.push({
                x: Math.random() * 3000,
                y: Math.random() * 2000,
                r: Math.random() * 1.5 + 0.3,
                b: Math.random() * 0.5 + 0.5
            });
        }
    }
    draw.stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(254,250,224,${s.b * (0.5 + 0.5 * Math.sin(time * 0.5 + s.x))})`;
        ctx.fill();
    });

    const speed = parseFloat(speedEl.value);
    const moonDistFactor = parseFloat(moonDistEl.value);

    // Orbital mechanics
    const moonOrbitR = Math.min(W, H) * 0.25 * moonDistFactor;
    const sunOrbitR = Math.min(W, H) * 0.42;
    const earthR = Math.min(W, H) * 0.07;
    const moonR = earthR * 0.27;
    const sunR = earthR * 0.5;

    // Moon orbits ~12.4x faster than sun (relative)
    const moonAngle = time * 0.5;
    const sunAngle = time * 0.04;

    const mx = cx + Math.cos(moonAngle) * moonOrbitR;
    const my = cy + Math.sin(moonAngle) * moonOrbitR;
    const sx = cx + Math.cos(sunAngle) * sunOrbitR;
    const sy = cy + Math.sin(sunAngle) * sunOrbitR;

    // Calculate tidal forces
    const moonForce = 1.0 / (moonDistFactor * moonDistFactor * moonDistFactor);
    const sunForce = 0.46; // Sun is ~46% of Moon's tidal force

    // Combined tidal bulge angle and magnitude
    const moonBulgeX = Math.cos(moonAngle) * moonForce;
    const moonBulgeY = Math.sin(moonAngle) * moonForce;
    const sunBulgeX = Math.cos(sunAngle) * sunForce;
    const sunBulgeY = Math.sin(sunAngle) * sunForce;

    const totalX = moonBulgeX + sunBulgeX;
    const totalY = moonBulgeY + sunBulgeY;
    const totalMag = Math.sqrt(totalX * totalX + totalY * totalY);
    const bulgeAngle = Math.atan2(totalY, totalX);

    const bulgeSize = totalMag * earthR * 0.15;

    // Draw orbits
    drawOrbit(cx, cy, moonOrbitR, true);
    drawOrbit(cx, cy, sunOrbitR, false);

    // Draw Sun
    drawSun(sx, sy, sunR);

    // Draw force arrows
    drawForceArrows(cx, cy, moonAngle, moonForce * 0.7, 'rgba(192,192,192,0.5)');
    drawForceArrows(cx, cy, sunAngle, sunForce * 0.5, 'rgba(255,215,0,0.3)');

    // Draw Earth with tidal bulge
    drawEarth(cx, cy, earthR, bulgeSize, bulgeSize * 0.5, bulgeAngle);

    // Draw Moon
    drawMoon(mx, my, moonR, moonAngle);

    // Determine tide type
    const angleDiff = Math.abs(((moonAngle - sunAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2));
    let phaseName, tideName;
    if (angleDiff < 0.3 || angleDiff > Math.PI * 2 - 0.3) {
        phaseName = 'New Moon';
        tideName = 'SPRING TIDE (maximum)';
    } else if (Math.abs(angleDiff - Math.PI) < 0.3) {
        phaseName = 'Full Moon';
        tideName = 'SPRING TIDE (maximum)';
    } else if (Math.abs(angleDiff - Math.PI / 2) < 0.3) {
        phaseName = 'First Quarter';
        tideName = 'NEAP TIDE (minimum)';
    } else if (Math.abs(angleDiff - 3 * Math.PI / 2) < 0.3) {
        phaseName = 'Third Quarter';
        tideName = 'NEAP TIDE (minimum)';
    } else {
        const nearSpring = (angleDiff < Math.PI / 4 || angleDiff > 7 * Math.PI / 4 ||
                           (angleDiff > 3 * Math.PI / 4 && angleDiff < 5 * Math.PI / 4));
        phaseName = nearSpring ? 'Waxing/Waning' : 'Quarter Phase';
        tideName = nearSpring ? 'Building to Spring' : 'Transitioning to Neap';
    }

    phaseEl.textContent = phaseName;
    tideTypeEl.textContent = tideName;
    tideHeightEl.textContent = `Tidal Range: ${(totalMag * 3.2).toFixed(1)}m`;

    // Labels
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '12px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Moon', mx, my + moonR + 15);
    ctx.fillText('Sun', sx, sy + sunR + 20);
    ctx.fillText('Earth', cx, cy + earthR + 20);

    if (!paused) time += 0.016 * speed;
    animId = requestAnimationFrame(draw);
}

window.reset = function() {
    time = 0;
    speedEl.value = 1;
    moonDistEl.value = 1;
};

draw();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
