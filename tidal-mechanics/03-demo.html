<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tidal Bore Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
canvas { display: block; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px 25px; border-radius: 12px; color: #FEFAE0;
    display: flex; gap: 20px; align-items: center; z-index: 100; flex-wrap: wrap;
    justify-content: center; font-size: 0.85rem;
}
#controls input[type="range"] { width: 110px; accent-color: #DDA15E; }
#info {
    position: fixed; top: 60px; right: 20px;
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px; border-radius: 12px; color: #FEFAE0;
    font-size: 0.8rem; max-width: 220px; z-index: 100; line-height: 1.5;
}
.val { color: #DDA15E; font-weight: bold; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <div class="val">Tidal Bore</div>
    <br>
    <div>A tidal bore forms when incoming tide is funneled into a narrowing estuary.</div>
    <br>
    <div>Speed: <span class="val" id="boreSpeed">--</span></div>
    <div>Height: <span class="val" id="boreHeight">--</span></div>
    <br>
    <div>Famous bores: Qiantang River (China), Severn (UK), Amazon (Brazil)</div>
</div>
<div id="controls">
    <label>Tidal Range: <input type="range" id="tidalRange" min="1" max="8" step="0.1" value="4"></label>
    <label>Channel Narrowing: <input type="range" id="narrowing" min="0.2" max="0.9" step="0.01" value="0.6"></label>
    <label>River Flow: <input type="range" id="riverFlow" min="0" max="3" step="0.1" value="1"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let time = 0;
let animId;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const tidalRangeEl = document.getElementById('tidalRange');
const narrowingEl = document.getElementById('narrowing');
const riverFlowEl = document.getElementById('riverFlow');
const boreSpeedEl = document.getElementById('boreSpeed');
const boreHeightEl = document.getElementById('boreHeight');

// Water particles for visual effect
const particles = [];
for (let i = 0; i < 300; i++) {
    particles.push({
        x: Math.random(),
        y: Math.random(),
        vx: 0, vy: 0,
        size: Math.random() * 2 + 1
    });
}

function channelWidth(x) {
    // Funnel shape: wide at left (sea), narrow at right (river)
    const narrow = parseFloat(narrowingEl.value);
    const t = x; // 0=sea, 1=upriver
    return 1.0 - t * narrow;
}

function waterHeight(x, t) {
    const tidalRange = parseFloat(tidalRangeEl.value);
    const riverFlow = parseFloat(riverFlowEl.value);
    const narrow = parseFloat(narrowingEl.value);

    // Base river level
    const baseLevel = 0.5;

    // Tidal bore: a steep wavefront moving upstream
    const boreSpeed = 0.15 + tidalRange * 0.02;
    const borePos = ((t * boreSpeed) % 1.3) - 0.3; // Position of bore front

    // Height amplification from channel narrowing
    const widthFactor = 1.0 / channelWidth(x);

    // Bore shape: steep front, gradual rise behind
    let boreEffect = 0;
    const dx = x - borePos;
    if (dx < 0) {
        // Behind bore front - water has risen
        boreEffect = tidalRange * 0.08 * widthFactor * Math.min(1, -dx * 3);
    } else if (dx < 0.05) {
        // The bore front itself - steep rise
        boreEffect = tidalRange * 0.08 * widthFactor * (1 - dx / 0.05);
    }

    // Undulations behind bore
    if (dx < -0.02) {
        boreEffect += Math.sin((-dx) * 40 + t * 5) * tidalRange * 0.01 * widthFactor * Math.exp(dx * 10);
    }

    // River current opposing tide
    const riverEffect = -riverFlow * 0.01 * x;

    return baseLevel + boreEffect + riverEffect;
}

function draw() {
    // Sky gradient
    let skyG = ctx.createLinearGradient(0, 0, 0, H * 0.4);
    skyG.addColorStop(0, '#1a1a2e');
    skyG.addColorStop(1, '#2d3a5c');
    ctx.fillStyle = skyG;
    ctx.fillRect(0, 0, W, H);

    const tidalRange = parseFloat(tidalRangeEl.value);
    const narrow = parseFloat(narrowingEl.value);

    const margin = 50;
    const riverTop = H * 0.25;
    const riverBottom = H * 0.75;
    const riverMidY = (riverTop + riverBottom) / 2;
    const riverHalfH = (riverBottom - riverTop) / 2;

    // Draw estuary banks (funnel shape)
    ctx.beginPath();
    ctx.moveTo(margin, riverMidY - riverHalfH);
    for (let x = 0; x <= W - 2 * margin; x += 5) {
        const t = x / (W - 2 * margin);
        const w = channelWidth(t);
        ctx.lineTo(margin + x, riverMidY - riverHalfH * w);
    }
    ctx.lineTo(W - margin, riverMidY - riverHalfH * (1 - narrow));
    ctx.lineTo(W - margin, 0);
    ctx.lineTo(margin, 0);
    ctx.closePath();
    let bankG = ctx.createLinearGradient(0, 0, 0, riverTop);
    bankG.addColorStop(0, '#3d2b1f');
    bankG.addColorStop(1, '#606C38');
    ctx.fillStyle = bankG;
    ctx.fill();

    // Bottom bank
    ctx.beginPath();
    ctx.moveTo(margin, riverMidY + riverHalfH);
    for (let x = 0; x <= W - 2 * margin; x += 5) {
        const t = x / (W - 2 * margin);
        const w = channelWidth(t);
        ctx.lineTo(margin + x, riverMidY + riverHalfH * w);
    }
    ctx.lineTo(W - margin, riverMidY + riverHalfH * (1 - narrow));
    ctx.lineTo(W - margin, H);
    ctx.lineTo(margin, H);
    ctx.closePath();
    let bankG2 = ctx.createLinearGradient(0, riverBottom, 0, H);
    bankG2.addColorStop(0, '#606C38');
    bankG2.addColorStop(1, '#3d2b1f');
    ctx.fillStyle = bankG2;
    ctx.fill();

    // Draw water surface
    ctx.beginPath();
    const steps = 200;
    for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const x = margin + t * (W - 2 * margin);
        const wh = waterHeight(t, time);
        const cw = channelWidth(t);
        const waterY = riverMidY - riverHalfH * cw * (wh - 0.5) * 2;
        if (i === 0) ctx.moveTo(x, waterY);
        else ctx.lineTo(x, waterY);
    }
    // Close along bottom bank
    for (let i = steps; i >= 0; i--) {
        const t = i / steps;
        const x = margin + t * (W - 2 * margin);
        const cw = channelWidth(t);
        ctx.lineTo(x, riverMidY + riverHalfH * cw);
    }
    ctx.closePath();
    let waterG = ctx.createLinearGradient(0, riverTop, 0, riverBottom);
    waterG.addColorStop(0, '#1e5799');
    waterG.addColorStop(0.3, '#2989d8');
    waterG.addColorStop(1, '#0f3d6b');
    ctx.fillStyle = waterG;
    ctx.fill();

    // Draw bore wavefront highlight
    const boreSpeed = 0.15 + tidalRange * 0.02;
    const borePos = ((time * boreSpeed) % 1.3) - 0.3;
    if (borePos >= 0 && borePos <= 1) {
        const boreX = margin + borePos * (W - 2 * margin);
        const cw = channelWidth(borePos);
        const wh = waterHeight(borePos, time);
        const topY = riverMidY - riverHalfH * cw * (wh - 0.5) * 2;
        const botY = riverMidY;

        // White foam line
        ctx.beginPath();
        ctx.moveTo(boreX, topY);
        ctx.lineTo(boreX, riverMidY + riverHalfH * cw * 0.3);
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Foam particles
        for (let i = 0; i < 15; i++) {
            const fy = topY + Math.random() * (botY - topY) * 0.5;
            const fx = boreX + (Math.random() - 0.5) * 20;
            ctx.beginPath();
            ctx.arc(fx, fy, Math.random() * 3 + 1, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fill();
        }
    }

    // Floating debris / foam patches
    particles.forEach(p => {
        const px = (p.x + time * 0.01) % 1;
        const cw = channelWidth(px);
        const wh = waterHeight(px, time);
        const screenX = margin + px * (W - 2 * margin);
        const waterTop = riverMidY - riverHalfH * cw * (wh - 0.5) * 2;
        const screenY = waterTop + p.y * riverHalfH * cw * 0.3;

        ctx.beginPath();
        ctx.arc(screenX, screenY, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${0.1 + p.y * 0.1})`;
        ctx.fill();
    });

    // Labels
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '14px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Sea', margin + 30, riverMidY);
    ctx.fillText('Upriver', W - margin - 40, riverMidY);

    // Arrow showing bore direction
    if (borePos >= 0 && borePos <= 1) {
        const ax = margin + borePos * (W - 2 * margin) + 30;
        const ay = riverMidY - 60;
        ctx.beginPath();
        ctx.moveTo(ax - 30, ay);
        ctx.lineTo(ax, ay);
        ctx.lineTo(ax - 8, ay - 6);
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax - 8, ay + 6);
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#DDA15E';
        ctx.font = '11px Georgia';
        ctx.fillText('Bore direction', ax - 15, ay - 12);
    }

    // Update info
    const speed_kmh = (20 + tidalRange * 3).toFixed(0);
    const height_m = (tidalRange * (1 / (1 - narrow * 0.8))).toFixed(1);
    boreSpeedEl.textContent = speed_kmh + ' km/h';
    boreHeightEl.textContent = height_m + ' m';

    time += 0.04;
    animId = requestAnimationFrame(draw);
}

window.reset = function() {
    time = 0;
    tidalRangeEl.value = 4;
    narrowingEl.value = 0.6;
    riverFlowEl.value = 1;
};

draw();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
