<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amphidromic Points</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; overflow: hidden; font-family: Georgia, serif; }
canvas { display: block; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px 25px; border-radius: 12px; color: #FEFAE0;
    display: flex; gap: 20px; align-items: center; z-index: 100; flex-wrap: wrap;
    justify-content: center; font-size: 0.85rem;
}
#controls input[type="range"] { width: 120px; accent-color: #DDA15E; }
#info {
    position: fixed; top: 60px; right: 20px;
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px; border-radius: 12px; color: #FEFAE0;
    font-size: 0.8rem; max-width: 240px; z-index: 100; line-height: 1.5;
}
.val { color: #DDA15E; font-weight: bold; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <div class="val">Amphidromic Points</div>
    <br>
    <div>Tidal nodes where amplitude is zero. Cotidal lines radiate outward like spokes.</div>
    <br>
    <div>The tide wave rotates around these points:</div>
    <div>- <span class="val">Anticlockwise</span> in Northern Hemisphere</div>
    <div>- <span class="val">Clockwise</span> in Southern Hemisphere</div>
    <br>
    <div>Amplitude grows with distance from node (co-range lines).</div>
</div>
<div id="controls">
    <label>Speed: <input type="range" id="speed" min="0.2" max="4" step="0.1" value="1"></label>
    <label>Show Cotidal Lines: <input type="checkbox" id="showCotidal" checked></label>
    <label>Show Co-range: <input type="checkbox" id="showRange" checked></label>
    <label>Coriolis: <input type="range" id="coriolis" min="-1" max="1" step="0.1" value="1"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let time = 0;
let animId;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const speedEl = document.getElementById('speed');
const showCotidalEl = document.getElementById('showCotidal');
const showRangeEl = document.getElementById('showRange');
const coriolisEl = document.getElementById('coriolis');

// Define amphidromic points in a basin
const amphiPoints = [
    { x: 0.3, y: 0.35, strength: 1.0 },
    { x: 0.7, y: 0.55, strength: 0.8 },
    { x: 0.5, y: 0.75, strength: 0.6 },
];

function tidalHeight(px, py, t) {
    let totalH = 0;
    const coriolis = parseFloat(coriolisEl.value);

    amphiPoints.forEach(ap => {
        const dx = px - ap.x;
        const dy = py - ap.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);

        // Kelvin wave rotating around amphidromic point
        // Phase = angle * direction + omega * t
        const phase = angle * coriolis - t;
        const amplitude = Math.min(dist * 3, 1) * ap.strength;

        totalH += amplitude * Math.cos(phase);
    });

    return totalH;
}

function draw() {
    const speed = parseFloat(speedEl.value);
    const showCotidal = showCotidalEl.checked;
    const showRange = showRangeEl.checked;

    // Draw ocean basin
    const margin = 40;
    const bw = W - 2 * margin;
    const bh = H - 2 * margin;

    // Background
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);

    // Compute tidal height field
    const cellSize = 6;
    const cols = Math.ceil(bw / cellSize);
    const rows = Math.ceil(bh / cellSize);

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const px = c / cols;
            const py = r / rows;
            const h = tidalHeight(px, py, time);

            // Color: blue to lighter blue based on height
            const norm = (h + 1) / 2; // normalize to 0-1
            const R = Math.floor(15 + norm * 30);
            const G = Math.floor(50 + norm * 90);
            const B = Math.floor(100 + norm * 120);

            ctx.fillStyle = `rgb(${R},${G},${B})`;
            ctx.fillRect(margin + c * cellSize, margin + r * cellSize, cellSize, cellSize);
        }
    }

    // Draw coastline (border)
    ctx.strokeStyle = '#606C38';
    ctx.lineWidth = 4;
    ctx.strokeRect(margin, margin, bw, bh);

    // Land outside basin
    ctx.fillStyle = '#3d2b1f';
    ctx.fillRect(0, 0, margin, H);
    ctx.fillRect(W - margin, 0, margin, H);
    ctx.fillRect(0, 0, W, margin);
    ctx.fillRect(0, H - margin, W, margin);

    // Land texture
    ctx.fillStyle = '#606C38';
    ctx.fillRect(0, 0, margin - 2, H);
    ctx.fillRect(W - margin + 2, 0, margin - 2, H);
    ctx.fillRect(0, 0, W, margin - 2);
    ctx.fillRect(0, H - margin + 2, W, margin - 2);

    // Draw amphidromic points
    amphiPoints.forEach((ap, idx) => {
        const ax = margin + ap.x * bw;
        const ay = margin + ap.y * bh;

        // Point marker
        ctx.beginPath();
        ctx.arc(ax, ay, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#DDA15E';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ax, ay, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#FEFAE0';
        ctx.fill();

        // Co-range circles (amplitude contours)
        if (showRange) {
            for (let d = 0.05; d < 0.4; d += 0.08) {
                ctx.beginPath();
                ctx.arc(ax, ay, d * Math.min(bw, bh), 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(138,154,91,${0.15 + d * 0.3})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        // Cotidal lines (phase contours radiating outward)
        if (showCotidal) {
            const coriolis = parseFloat(coriolisEl.value);
            const nLines = 12;
            for (let i = 0; i < nLines; i++) {
                const phase = (i / nLines) * Math.PI * 2;
                const lineAngle = phase + time * coriolis;
                const len = 0.35 * Math.min(bw, bh);

                ctx.beginPath();
                ctx.moveTo(ax, ay);
                ctx.lineTo(ax + Math.cos(lineAngle) * len, ay + Math.sin(lineAngle) * len);

                // Color represents time of high tide
                const hue = (i / nLines);
                const r2 = Math.floor(221 * (1 - hue) + 138 * hue);
                const g2 = Math.floor(161 * (1 - hue) + 154 * hue);
                const b2 = Math.floor(94 * (1 - hue) + 91 * hue);
                ctx.strokeStyle = `rgba(${r2},${g2},${b2},0.5)`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        // Rotation arrow
        const coriolis = parseFloat(coriolisEl.value);
        const arrowR = 20;
        const dir = coriolis > 0 ? 1 : -1;
        ctx.beginPath();
        ctx.arc(ax, ay, arrowR, time * dir, time * dir + Math.PI * 1.5);
        ctx.strokeStyle = 'rgba(254,250,224,0.4)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        const aEnd = time * dir + Math.PI * 1.5;
        ctx.beginPath();
        ctx.arc(ax + Math.cos(aEnd) * arrowR, ay + Math.sin(aEnd) * arrowR, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(254,250,224,0.4)';
        ctx.fill();

        // Label
        ctx.fillStyle = '#FEFAE0';
        ctx.font = '11px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText(`Node ${idx + 1}`, ax, ay - 30);
    });

    // Legend
    ctx.fillStyle = 'rgba(13,17,23,0.8)';
    ctx.fillRect(margin + 10, margin + 10, 160, 80);
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '11px Georgia';
    ctx.textAlign = 'left';
    ctx.fillText('Amphidromic System', margin + 20, margin + 28);
    ctx.fillStyle = '#DDA15E';
    ctx.beginPath();
    ctx.arc(margin + 25, margin + 45, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FEFAE0';
    ctx.fillText('Amphidromic point', margin + 35, margin + 48);

    if (showCotidal) {
        ctx.strokeStyle = 'rgba(221,161,94,0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(margin + 18, margin + 63);
        ctx.lineTo(margin + 32, margin + 63);
        ctx.stroke();
        ctx.fillText('Cotidal line', margin + 35, margin + 67);
    }

    if (showRange) {
        ctx.strokeStyle = 'rgba(138,154,91,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(margin + 25, margin + 80, 6, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = '#FEFAE0';
        ctx.fillText('Co-range contour', margin + 35, margin + 83);
    }

    // Color bar for water height
    const cbx = W - margin - 30;
    const cby = margin + 10;
    const cbh = 100;
    for (let i = 0; i < cbh; i++) {
        const norm = 1 - i / cbh;
        const R = Math.floor(15 + norm * 30);
        const G = Math.floor(50 + norm * 90);
        const B = Math.floor(100 + norm * 120);
        ctx.fillStyle = `rgb(${R},${G},${B})`;
        ctx.fillRect(cbx, cby + i, 15, 1);
    }
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '9px Georgia';
    ctx.textAlign = 'left';
    ctx.fillText('High', cbx + 18, cby + 8);
    ctx.fillText('Low', cbx + 18, cby + cbh - 2);

    time += 0.02 * speed;
    animId = requestAnimationFrame(draw);
}

window.reset = function() {
    time = 0;
    speedEl.value = 1;
    coriolisEl.value = 1;
    showCotidalEl.checked = true;
    showRangeEl.checked = true;
};

draw();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
