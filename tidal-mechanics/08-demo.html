<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tidal Power Generation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; overflow: hidden; font-family: Georgia, serif; }
canvas { display: block; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px 25px; border-radius: 12px; color: #FEFAE0;
    display: flex; gap: 20px; align-items: center; z-index: 100; flex-wrap: wrap;
    justify-content: center; font-size: 0.85rem;
}
#controls input[type="range"] { width: 110px; accent-color: #DDA15E; }
#info {
    position: fixed; top: 60px; right: 20px;
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px; border-radius: 12px; color: #FEFAE0;
    font-size: 0.8rem; max-width: 230px; z-index: 100; line-height: 1.5;
}
.val { color: #DDA15E; font-weight: bold; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <div class="val">Tidal Barrage Power</div>
    <br>
    <div>A dam captures potential energy from tidal height difference.</div>
    <br>
    <div>Power: <span class="val" id="powerVal">--</span></div>
    <div>Head: <span class="val" id="headVal">--</span></div>
    <div>Flow: <span class="val" id="flowVal">--</span></div>
    <div>Total Energy: <span class="val" id="energyVal">--</span></div>
    <br>
    <div>P = &rho;gQH</div>
    <div>La Rance (France): 240 MW since 1966</div>
</div>
<div id="controls">
    <label>Tidal Range: <input type="range" id="tidalRange" min="2" max="14" step="0.5" value="8"> <span id="trVal">8</span>m</label>
    <label>Turbine Efficiency: <input type="range" id="efficiency" min="0.3" max="0.95" step="0.01" value="0.75"> <span id="effVal">75</span>%</label>
    <label>Speed: <input type="range" id="speed" min="0.2" max="5" step="0.1" value="1"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let time = 0;
let totalEnergy = 0;
let animId;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const tidalRangeEl = document.getElementById('tidalRange');
const efficiencyEl = document.getElementById('efficiency');
const speedEl = document.getElementById('speed');
const trValEl = document.getElementById('trVal');
const effValEl = document.getElementById('effVal');

tidalRangeEl.oninput = () => trValEl.textContent = parseFloat(tidalRangeEl.value).toFixed(0);
efficiencyEl.oninput = () => effValEl.textContent = (parseFloat(efficiencyEl.value) * 100).toFixed(0);

// Power history
const powerHistory = [];
const maxHistory = 400;

// Turbine blade particles
const blades = 6;

function draw() {
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);

    const speed = parseFloat(speedEl.value);
    const tidalRange = parseFloat(tidalRangeEl.value);
    const efficiency = parseFloat(efficiencyEl.value);

    // Scene layout
    const seaLevel = H * 0.35;
    const groundLevel = H * 0.75;
    const barrageX = W * 0.5;
    const barrageW = 40;

    // Tidal height (sinusoidal)
    const tidePhase = time * 0.3;
    const seaTideH = Math.sin(tidePhase) * (tidalRange / 2);
    const basinTideH = Math.sin(tidePhase - 1.5) * (tidalRange / 2) * 0.6; // Basin lags

    const seaWaterLevel = seaLevel - seaTideH * 8;
    const basinWaterLevel = seaLevel - basinTideH * 8;

    // Head difference
    const headDiff = Math.abs(seaTideH - basinTideH);
    const flowDirection = seaTideH > basinTideH ? 1 : -1;
    const flowRate = headDiff * 50; // m^3/s simplified

    // Power = rho * g * Q * H * efficiency
    const power = 1025 * 9.81 * flowRate * headDiff * efficiency / 1e6; // MW
    totalEnergy += power * 0.001 * speed;

    powerHistory.push(power);
    if (powerHistory.length > maxHistory) powerHistory.shift();

    // Sky
    let skyG = ctx.createLinearGradient(0, 0, 0, seaLevel);
    skyG.addColorStop(0, '#0d1117');
    skyG.addColorStop(1, '#1a2a4a');
    ctx.fillStyle = skyG;
    ctx.fillRect(0, 0, W, seaLevel);

    // Sea side water (left)
    ctx.beginPath();
    // Wave surface
    for (let x = 0; x < barrageX - barrageW / 2; x += 3) {
        const waveY = seaWaterLevel + Math.sin(x * 0.02 + time * 2) * 3 + Math.sin(x * 0.05 + time) * 2;
        if (x === 0) ctx.moveTo(x, waveY);
        else ctx.lineTo(x, waveY);
    }
    ctx.lineTo(barrageX - barrageW / 2, groundLevel);
    ctx.lineTo(0, groundLevel);
    ctx.closePath();
    let seaG = ctx.createLinearGradient(0, seaWaterLevel, 0, groundLevel);
    seaG.addColorStop(0, '#1e5799');
    seaG.addColorStop(1, '#0f3d6b');
    ctx.fillStyle = seaG;
    ctx.fill();

    // Basin side water (right)
    ctx.beginPath();
    for (let x = barrageX + barrageW / 2; x < W; x += 3) {
        const waveY = basinWaterLevel + Math.sin(x * 0.02 + time * 1.5) * 2 + Math.sin(x * 0.04 + time * 0.8) * 1.5;
        if (x === barrageX + barrageW / 2) ctx.moveTo(x, waveY);
        else ctx.lineTo(x, waveY);
    }
    ctx.lineTo(W, groundLevel);
    ctx.lineTo(barrageX + barrageW / 2, groundLevel);
    ctx.closePath();
    let basinG = ctx.createLinearGradient(0, basinWaterLevel, 0, groundLevel);
    basinG.addColorStop(0, '#1a5080');
    basinG.addColorStop(1, '#0d3050');
    ctx.fillStyle = basinG;
    ctx.fill();

    // Ground / seabed
    ctx.fillStyle = '#3d2b1f';
    ctx.fillRect(0, groundLevel, W, H - groundLevel);
    ctx.fillStyle = '#606C38';
    ctx.fillRect(0, groundLevel, W, 5);

    // Barrage structure
    ctx.fillStyle = '#555';
    ctx.fillRect(barrageX - barrageW / 2, seaLevel - 80, barrageW, groundLevel - seaLevel + 80);

    // Barrage details
    ctx.fillStyle = '#666';
    ctx.fillRect(barrageX - barrageW / 2 + 5, seaLevel - 75, barrageW - 10, 8);
    ctx.fillRect(barrageX - barrageW / 2 + 5, seaLevel - 60, barrageW - 10, 8);

    // Sluice gate / turbine housing
    const turbineY = seaLevel + 30;
    const turbineR = 25;
    ctx.fillStyle = '#444';
    ctx.fillRect(barrageX - barrageW / 2 - 5, turbineY - turbineR, barrageW + 10, turbineR * 2);

    // Turbine blades (rotating)
    const turbineSpeed = flowRate * 0.02 * flowDirection;
    ctx.save();
    ctx.translate(barrageX, turbineY);
    ctx.rotate(time * turbineSpeed * 3);
    for (let i = 0; i < blades; i++) {
        const angle = (i / blades) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(angle) * turbineR * 0.8, Math.sin(angle) * turbineR * 0.8);
        ctx.lineTo(Math.cos(angle + 0.15) * turbineR * 0.6, Math.sin(angle + 0.15) * turbineR * 0.6);
        ctx.closePath();
        ctx.fillStyle = power > 0.5 ? '#DDA15E' : '#888';
        ctx.fill();
    }
    // Hub
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#333';
    ctx.fill();
    ctx.restore();

    // Flow arrows through turbine
    if (headDiff > 0.3) {
        const arrowCount = Math.min(Math.floor(flowRate / 10) + 1, 5);
        for (let i = 0; i < arrowCount; i++) {
            const offset = ((time * flowDirection * 50 + i * 30) % 100) - 50;
            const ax = barrageX + offset * flowDirection;
            const ay = turbineY + (i - arrowCount / 2) * 6;
            ctx.beginPath();
            ctx.moveTo(ax - 10 * flowDirection, ay);
            ctx.lineTo(ax + 10 * flowDirection, ay);
            ctx.lineTo(ax + 5 * flowDirection, ay - 4);
            ctx.moveTo(ax + 10 * flowDirection, ay);
            ctx.lineTo(ax + 5 * flowDirection, ay + 4);
            ctx.strokeStyle = 'rgba(41,137,216,0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }

    // Water level markers
    ctx.setLineDash([3, 3]);
    // Sea level line
    ctx.beginPath();
    ctx.moveTo(0, seaWaterLevel);
    ctx.lineTo(barrageX - barrageW / 2, seaWaterLevel);
    ctx.strokeStyle = 'rgba(254,250,224,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Basin level line
    ctx.beginPath();
    ctx.moveTo(barrageX + barrageW / 2, basinWaterLevel);
    ctx.lineTo(W, basinWaterLevel);
    ctx.stroke();
    ctx.setLineDash([]);

    // Head difference indicator
    const headTop = Math.min(seaWaterLevel, basinWaterLevel);
    const headBot = Math.max(seaWaterLevel, basinWaterLevel);
    if (headBot - headTop > 3) {
        ctx.beginPath();
        ctx.moveTo(barrageX + barrageW, headTop);
        ctx.lineTo(barrageX + barrageW, headBot);
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Arrows
        ctx.beginPath();
        ctx.moveTo(barrageX + barrageW - 4, headTop + 6);
        ctx.lineTo(barrageX + barrageW, headTop);
        ctx.lineTo(barrageX + barrageW + 4, headTop + 6);
        ctx.moveTo(barrageX + barrageW - 4, headBot - 6);
        ctx.lineTo(barrageX + barrageW, headBot);
        ctx.lineTo(barrageX + barrageW + 4, headBot - 6);
        ctx.stroke();
        ctx.fillStyle = '#DDA15E';
        ctx.font = '11px Georgia';
        ctx.textAlign = 'left';
        ctx.fillText('H=' + headDiff.toFixed(1) + 'm', barrageX + barrageW + 8, (headTop + headBot) / 2 + 4);
    }

    // Labels
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '14px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Ocean', W * 0.25, seaLevel - 90);
    ctx.fillText('Basin', W * 0.75, seaLevel - 90);
    ctx.fillText('Barrage', barrageX, seaLevel - 90);

    // Power meter (large)
    ctx.fillStyle = '#DDA15E';
    ctx.font = 'bold 24px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText(power.toFixed(1) + ' MW', W * 0.25, groundLevel + 40);
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '12px Georgia';
    ctx.fillText('Current Output', W * 0.25, groundLevel + 55);

    // Power graph
    const gx = W * 0.55;
    const gy = groundLevel + 15;
    const gw = W * 0.38;
    const gh = H - groundLevel - 40;

    ctx.fillStyle = 'rgba(13,17,23,0.6)';
    ctx.fillRect(gx - 5, gy - 5, gw + 10, gh + 10);
    ctx.strokeStyle = 'rgba(254,250,224,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(gx, gy, gw, gh);

    if (powerHistory.length > 1) {
        const maxP = Math.max(...powerHistory, 1);
        // Fill
        ctx.beginPath();
        ctx.moveTo(gx, gy + gh);
        powerHistory.forEach((p, i) => {
            const px = gx + (i / maxHistory) * gw;
            const py = gy + gh - (p / maxP) * gh;
            ctx.lineTo(px, py);
        });
        ctx.lineTo(gx + (powerHistory.length / maxHistory) * gw, gy + gh);
        ctx.closePath();
        ctx.fillStyle = 'rgba(221,161,94,0.2)';
        ctx.fill();

        // Line
        ctx.beginPath();
        powerHistory.forEach((p, i) => {
            const px = gx + (i / maxHistory) * gw;
            const py = gy + gh - (p / maxP) * gh;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        });
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    ctx.fillStyle = '#FEFAE0';
    ctx.font = '10px Georgia';
    ctx.textAlign = 'left';
    ctx.fillText('Power Output (MW)', gx, gy - 8);

    // Update info
    document.getElementById('powerVal').textContent = power.toFixed(1) + ' MW';
    document.getElementById('headVal').textContent = headDiff.toFixed(1) + ' m';
    document.getElementById('flowVal').textContent = flowRate.toFixed(0) + ' m^3/s';
    document.getElementById('energyVal').textContent = totalEnergy.toFixed(0) + ' MWh';

    time += 0.016 * speed;
    animId = requestAnimationFrame(draw);
}

window.reset = function() {
    time = 0;
    totalEnergy = 0;
    powerHistory.length = 0;
    tidalRangeEl.value = 8;
    efficiencyEl.value = 0.75;
    speedEl.value = 1;
    trValEl.textContent = '8';
    effValEl.textContent = '75';
};

draw();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
