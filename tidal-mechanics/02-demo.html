<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tidal Bulge Gravitational Model</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; overflow: hidden; font-family: Georgia, serif; }
canvas { display: block; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px 25px; border-radius: 12px; color: #FEFAE0;
    display: flex; gap: 20px; align-items: center; z-index: 100; flex-wrap: wrap;
    justify-content: center; font-size: 0.85rem;
}
#controls input[type="range"] { width: 110px; accent-color: #DDA15E; }
#controls label { white-space: nowrap; }
#info {
    position: fixed; top: 60px; right: 20px;
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px; border-radius: 12px; color: #FEFAE0;
    font-size: 0.8rem; max-width: 240px; z-index: 100; line-height: 1.6;
}
.val { color: #DDA15E; font-weight: bold; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <div class="val">Tidal Force Field</div>
    <br>
    <div>The tidal force is the <em>differential</em> of gravity across the Earth's diameter.</div>
    <br>
    <div>Near side: pulled <span class="val">toward</span> Moon</div>
    <div>Far side: pulled <span class="val">away</span> from Moon</div>
    <div>Poles: squeezed <span class="val">inward</span></div>
    <br>
    <div>Force ~ 1/r<sup>3</sup> (inverse cube law)</div>
</div>
<div id="controls">
    <label>Moon Distance: <input type="range" id="dist" min="3" max="10" step="0.1" value="5"></label>
    <label>Show Vectors: <input type="checkbox" id="showVec" checked></label>
    <label>Show Field: <input type="checkbox" id="showField" checked></label>
    <label>Rotate: <input type="checkbox" id="rotate" checked></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
let time = 0;
let animId;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W * 0.4;
    cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

const distEl = document.getElementById('dist');
const showVecEl = document.getElementById('showVec');
const showFieldEl = document.getElementById('showField');
const rotateEl = document.getElementById('rotate');

function tidalForce(px, py, moonX, moonY, earthX, earthY) {
    // Gravitational acceleration at point p due to moon
    const dx1 = moonX - px;
    const dy1 = moonY - py;
    const r1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
    const gx1 = dx1 / (r1 * r1 * r1);
    const gy1 = dy1 / (r1 * r1 * r1);

    // Gravitational acceleration at earth center due to moon
    const dx2 = moonX - earthX;
    const dy2 = moonY - earthY;
    const r2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
    const gx2 = dx2 / (r2 * r2 * r2);
    const gy2 = dy2 / (r2 * r2 * r2);

    // Tidal force = difference
    return { x: gx1 - gx2, y: gy1 - gy2 };
}

function draw() {
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);

    // Stars
    if (!draw.stars) {
        draw.stars = [];
        for (let i = 0; i < 150; i++) {
            draw.stars.push({ x: Math.random() * 3000, y: Math.random() * 2000, r: Math.random() + 0.5 });
        }
    }
    draw.stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(254,250,224,${0.3 + 0.2 * Math.sin(time + s.x)})`;
        ctx.fill();
    });

    const moonDist = parseFloat(distEl.value);
    const showVectors = showVecEl.checked;
    const showField = showFieldEl.checked;
    const rotating = rotateEl.checked;

    const earthR = Math.min(W, H) * 0.12;
    const moonAngle = rotating ? time * 0.3 : 0;
    const moonR = earthR * 0.27;
    const moonX = cx + Math.cos(moonAngle) * earthR * moonDist;
    const moonY = cy + Math.sin(moonAngle) * earthR * moonDist;

    // Draw tidal force field (background)
    if (showField) {
        const gridSize = 25;
        for (let x = 0; x < W; x += gridSize) {
            for (let y = 0; y < H; y += gridSize) {
                const dx = x - cx;
                const dy = y - cy;
                const distFromEarth = Math.sqrt(dx * dx + dy * dy);
                if (distFromEarth < earthR * 2.5 && distFromEarth > earthR * 0.3) {
                    const tf = tidalForce(x, y, moonX, moonY, cx, cy);
                    const mag = Math.sqrt(tf.x * tf.x + tf.y * tf.y);
                    const normMag = Math.min(mag * earthR * earthR * 500, 1);
                    ctx.beginPath();
                    ctx.arc(x, y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(221,161,94,${normMag * 0.6})`;
                    ctx.fill();
                }
            }
        }
    }

    // Draw Earth
    ctx.beginPath();
    ctx.arc(cx, cy, earthR, 0, Math.PI * 2);
    let eg = ctx.createRadialGradient(cx, cy, 0, cx, cy, earthR);
    eg.addColorStop(0, '#2a5a3a');
    eg.addColorStop(0.7, '#1e5799');
    eg.addColorStop(1, '#0f3d6b');
    ctx.fillStyle = eg;
    ctx.fill();

    // Compute ocean surface (tidal deformation)
    ctx.beginPath();
    const nPoints = 120;
    for (let i = 0; i <= nPoints; i++) {
        const angle = (i / nPoints) * Math.PI * 2;
        const px = cx + Math.cos(angle) * earthR;
        const py = cy + Math.sin(angle) * earthR;
        const tf = tidalForce(px, py, moonX, moonY, cx, cy);
        // Radial component of tidal force
        const radial = tf.x * Math.cos(angle) + tf.y * Math.sin(angle);
        const deformation = radial * earthR * earthR * 400;
        const r = earthR + deformation;
        const sx = cx + Math.cos(angle) * r;
        const sy = cy + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(sx, sy);
        else ctx.lineTo(sx, sy);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(41,137,216,0.4)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(41,137,216,0.8)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Draw tidal force vectors on Earth surface
    if (showVectors) {
        const nArrows = 24;
        for (let i = 0; i < nArrows; i++) {
            const angle = (i / nArrows) * Math.PI * 2;
            const px = cx + Math.cos(angle) * earthR;
            const py = cy + Math.sin(angle) * earthR;
            const tf = tidalForce(px, py, moonX, moonY, cx, cy);
            const scale = earthR * earthR * 600;
            const ex = px + tf.x * scale;
            const ey = py + tf.y * scale;

            const mag = Math.sqrt(tf.x * tf.x + tf.y * tf.y);
            const normMag = Math.min(mag * earthR * earthR * 500, 1);

            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(ex, ey);
            ctx.strokeStyle = `rgba(221,161,94,${0.4 + normMag * 0.6})`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Arrowhead
            const aLen = 6;
            const aAngle = Math.atan2(ey - py, ex - px);
            ctx.beginPath();
            ctx.moveTo(ex, ey);
            ctx.lineTo(ex - aLen * Math.cos(aAngle - 0.5), ey - aLen * Math.sin(aAngle - 0.5));
            ctx.moveTo(ex, ey);
            ctx.lineTo(ex - aLen * Math.cos(aAngle + 0.5), ey - aLen * Math.sin(aAngle + 0.5));
            ctx.stroke();
        }
    }

    // Draw Moon
    ctx.beginPath();
    ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
    let mg = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, moonR);
    mg.addColorStop(0, '#D0D0D0');
    mg.addColorStop(1, '#909090');
    ctx.fillStyle = mg;
    ctx.fill();

    // Moon glow
    ctx.beginPath();
    ctx.arc(moonX, moonY, moonR * 2, 0, Math.PI * 2);
    let mgg = ctx.createRadialGradient(moonX, moonY, moonR, moonX, moonY, moonR * 2);
    mgg.addColorStop(0, 'rgba(200,200,200,0.15)');
    mgg.addColorStop(1, 'rgba(200,200,200,0)');
    ctx.fillStyle = mgg;
    ctx.fill();

    // Line connecting Earth to Moon
    ctx.beginPath();
    ctx.setLineDash([4, 8]);
    ctx.moveTo(cx, cy);
    ctx.lineTo(moonX, moonY);
    ctx.strokeStyle = 'rgba(254,250,224,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);

    // Labels
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '13px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Earth', cx, cy + earthR + 20);
    ctx.fillText('Moon', moonX, moonY + moonR + 18);

    // Draw near/far labels
    const nearAngle = moonAngle;
    const farAngle = moonAngle + Math.PI;
    ctx.font = '11px Georgia';
    ctx.fillStyle = '#DDA15E';
    ctx.fillText('Near side', cx + Math.cos(nearAngle) * (earthR + 25), cy + Math.sin(nearAngle) * (earthR + 25));
    ctx.fillText('Far side', cx + Math.cos(farAngle) * (earthR + 25), cy + Math.sin(farAngle) * (earthR + 25));

    time += 0.016;
    animId = requestAnimationFrame(draw);
}

window.reset = function() {
    time = 0;
    distEl.value = 5;
    showVecEl.checked = true;
    showFieldEl.checked = true;
    rotateEl.checked = true;
};

draw();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
