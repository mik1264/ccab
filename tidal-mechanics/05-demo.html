<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tidal Locking</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; overflow: hidden; font-family: Georgia, serif; }
canvas { display: block; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px 25px; border-radius: 12px; color: #FEFAE0;
    display: flex; gap: 20px; align-items: center; z-index: 100; flex-wrap: wrap;
    justify-content: center; font-size: 0.85rem;
}
#controls input[type="range"] { width: 120px; accent-color: #DDA15E; }
#controls button {
    background: #DDA15E; color: #1a1a2e; border: none; padding: 6px 14px;
    border-radius: 6px; cursor: pointer; font-family: Georgia; font-size: 0.85rem;
}
#info {
    position: fixed; top: 60px; right: 20px;
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px; border-radius: 12px; color: #FEFAE0;
    font-size: 0.8rem; max-width: 230px; z-index: 100; line-height: 1.5;
}
.val { color: #DDA15E; font-weight: bold; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <div class="val">Tidal Locking</div>
    <br>
    <div>Tidal friction gradually synchronizes a moon's rotation with its orbit.</div>
    <br>
    <div>Spin: <span class="val" id="spinVal">--</span></div>
    <div>Orbit: <span class="val" id="orbitVal">--</span></div>
    <div>Status: <span class="val" id="lockStatus">Unlocked</span></div>
    <br>
    <div>Energy dissipated as heat slows the rotation until spin = orbit period.</div>
</div>
<div id="controls">
    <label>Initial Spin: <input type="range" id="initSpin" min="1" max="10" step="0.1" value="5"></label>
    <label>Tidal Friction: <input type="range" id="friction" min="0.001" max="0.05" step="0.001" value="0.01"></label>
    <button id="resetBtn" onclick="window.reset()">Restart</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
let time = 0;
let animId;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

const initSpinEl = document.getElementById('initSpin');
const frictionEl = document.getElementById('friction');
const spinValEl = document.getElementById('spinVal');
const orbitValEl = document.getElementById('orbitVal');
const lockStatusEl = document.getElementById('lockStatus');

let moonSpin; // radians per frame
let orbitalRate = 0.01; // radians per frame
let moonRotation = 0;
let orbitalAngle = 0;
let isLocked = false;
let energyHistory = [];

function initSim() {
    moonSpin = parseFloat(initSpinEl.value) * orbitalRate;
    moonRotation = 0;
    orbitalAngle = 0;
    isLocked = false;
    energyHistory = [];
    time = 0;
}
initSim();

// Background stars
const stars = [];
for (let i = 0; i < 200; i++) {
    stars.push({ x: Math.random() * 3000, y: Math.random() * 2000, r: Math.random() * 1.5 + 0.3 });
}

function drawPlanet(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    let g = ctx.createRadialGradient(x - r * 0.2, y - r * 0.2, 0, x, y, r);
    g.addColorStop(0, '#4a8ab5');
    g.addColorStop(0.7, '#1e5799');
    g.addColorStop(1, '#0f3d6b');
    ctx.fillStyle = g;
    ctx.fill();
    // Atmosphere glow
    ctx.beginPath();
    ctx.arc(x, y, r * 1.15, 0, Math.PI * 2);
    let ag = ctx.createRadialGradient(x, y, r, x, y, r * 1.15);
    ag.addColorStop(0, 'rgba(41,137,216,0.2)');
    ag.addColorStop(1, 'rgba(41,137,216,0)');
    ctx.fillStyle = ag;
    ctx.fill();
}

function drawMoon(x, y, r, rotation) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    // Moon body
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    let g = ctx.createRadialGradient(-r * 0.2, -r * 0.2, 0, 0, 0, r);
    g.addColorStop(0, '#D0D0D0');
    g.addColorStop(1, '#808080');
    ctx.fillStyle = g;
    ctx.fill();
    // Reference marker (red dot on near side)
    ctx.beginPath();
    ctx.arc(r * 0.6, 0, r * 0.15, 0, Math.PI * 2);
    ctx.fillStyle = '#c44';
    ctx.fill();
    // Craters
    ctx.beginPath();
    ctx.arc(-r * 0.3, -r * 0.3, r * 0.12, 0, Math.PI * 2);
    ctx.fillStyle = '#707070';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(r * 0.1, r * 0.4, r * 0.08, 0, Math.PI * 2);
    ctx.fillStyle = '#707070';
    ctx.fill();
    // Tidal bulge visualization
    const bulgeSize = r * 0.08;
    ctx.beginPath();
    ctx.ellipse(0, 0, r + bulgeSize, r - bulgeSize * 0.3, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(221,161,94,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
}

function draw() {
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);

    // Stars
    stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(254,250,224,${0.3 + 0.2 * Math.sin(time * 0.3 + s.x)})`;
        ctx.fill();
    });

    const friction = parseFloat(frictionEl.value);
    const orbitR = Math.min(W, H) * 0.28;
    const planetR = Math.min(W, H) * 0.1;
    const moonR = planetR * 0.3;

    // Update moon physics
    // Tidal friction torque proportional to (spin - orbital rate)
    const spinDiff = moonSpin - orbitalRate;
    if (Math.abs(spinDiff) > 0.0001) {
        moonSpin -= spinDiff * friction;
        isLocked = false;
    } else {
        moonSpin = orbitalRate;
        isLocked = true;
    }

    orbitalAngle += orbitalRate;
    moonRotation += moonSpin;

    // Moon position
    const mx = cx + Math.cos(orbitalAngle) * orbitR;
    const my = cy + Math.sin(orbitalAngle) * orbitR;

    // Track energy dissipation
    const rotationalEnergy = 0.5 * moonSpin * moonSpin;
    energyHistory.push(rotationalEnergy);
    if (energyHistory.length > 300) energyHistory.shift();

    // Draw orbit
    ctx.beginPath();
    ctx.arc(cx, cy, orbitR, 0, Math.PI * 2);
    ctx.setLineDash([5, 10]);
    ctx.strokeStyle = 'rgba(254,250,224,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw orbital direction arc
    ctx.beginPath();
    ctx.arc(cx, cy, orbitR + 15, orbitalAngle, orbitalAngle + 0.3);
    ctx.strokeStyle = 'rgba(138,154,91,0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Arrowhead
    const arrAngle = orbitalAngle + 0.3;
    const arrX = cx + Math.cos(arrAngle) * (orbitR + 15);
    const arrY = cy + Math.sin(arrAngle) * (orbitR + 15);
    ctx.beginPath();
    ctx.arc(arrX, arrY, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#8A9A5B';
    ctx.fill();

    // Draw planet
    drawPlanet(cx, cy, planetR);

    // Draw tidal torque visualization
    if (!isLocked) {
        const torqueAngle = Math.atan2(my - cy, mx - cx);
        // Show torque arrow on moon
        const tLen = Math.min(Math.abs(spinDiff) * 500, 30);
        const tDir = spinDiff > 0 ? -1 : 1;
        const perpAngle = torqueAngle + Math.PI / 2 * tDir;
        ctx.beginPath();
        ctx.moveTo(mx, my);
        ctx.lineTo(mx + Math.cos(perpAngle) * tLen, my + Math.sin(perpAngle) * tLen);
        ctx.strokeStyle = 'rgba(221,161,94,0.6)';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    // Draw Moon (rotation includes both its own spin and the orbital viewing angle)
    // For tidal locking: moonRotation should equal orbitalAngle so same face points at planet
    drawMoon(mx, my, moonR, moonRotation - orbitalAngle);

    // Connecting line
    ctx.beginPath();
    ctx.setLineDash([3, 6]);
    ctx.moveTo(cx, cy);
    ctx.lineTo(mx, my);
    ctx.strokeStyle = 'rgba(254,250,224,0.1)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);

    // Labels
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '13px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Planet', cx, cy + planetR + 20);
    ctx.fillText('Moon', mx, my + moonR + 18);

    // Red marker legend
    ctx.fillStyle = '#c44';
    ctx.font = '11px Georgia';
    ctx.fillText('Red dot = reference point', mx, my + moonR + 32);

    // Update info
    const spinRatio = (moonSpin / orbitalRate).toFixed(2);
    spinValEl.textContent = spinRatio + 'x orbital';
    orbitValEl.textContent = (orbitalRate * 1000).toFixed(1) + ' mrad/f';
    lockStatusEl.textContent = isLocked ? 'LOCKED (1:1)' : 'Evolving...';
    lockStatusEl.style.color = isLocked ? '#8A9A5B' : '#DDA15E';

    // Energy graph (bottom-left)
    const gx = W * 0.05;
    const gy = H * 0.78;
    const gw = W * 0.25;
    const gh = H * 0.12;

    ctx.fillStyle = 'rgba(13,17,23,0.8)';
    ctx.fillRect(gx - 5, gy - 15, gw + 10, gh + 35);
    ctx.strokeStyle = 'rgba(254,250,224,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(gx, gy, gw, gh);

    if (energyHistory.length > 1) {
        const maxE = Math.max(...energyHistory) || 1;
        ctx.beginPath();
        energyHistory.forEach((e, i) => {
            const px = gx + (i / 300) * gw;
            const py = gy + gh - (e / maxE) * gh;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        });
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    ctx.fillStyle = '#FEFAE0';
    ctx.font = '10px Georgia';
    ctx.textAlign = 'left';
    ctx.fillText('Rotational Energy', gx, gy - 5);
    ctx.textAlign = 'center';
    ctx.fillText('Time', gx + gw / 2, gy + gh + 15);

    // Locked indicator
    if (isLocked) {
        ctx.fillStyle = '#8A9A5B';
        ctx.font = 'bold 16px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('TIDALLY LOCKED', cx, H * 0.15);
        ctx.font = '12px Georgia';
        ctx.fillStyle = '#FEFAE0';
        ctx.fillText('Same face always points toward planet', cx, H * 0.15 + 20);
    }

    time += 0.016;
    animId = requestAnimationFrame(draw);
}

window.reset = function() {
    initSim();
};

draw();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
