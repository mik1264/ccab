<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bay of Fundy Resonance</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; overflow: hidden; font-family: Georgia, serif; }
canvas { display: block; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px 25px; border-radius: 12px; color: #FEFAE0;
    display: flex; gap: 20px; align-items: center; z-index: 100; flex-wrap: wrap;
    justify-content: center; font-size: 0.85rem;
}
#controls input[type="range"] { width: 130px; accent-color: #DDA15E; }
#info {
    position: fixed; top: 60px; right: 20px;
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px; border-radius: 12px; color: #FEFAE0;
    font-size: 0.8rem; max-width: 230px; z-index: 100; line-height: 1.5;
}
.val { color: #DDA15E; font-weight: bold; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <div class="val">Tidal Resonance</div>
    <br>
    <div>Bay of Fundy's natural period (~12.5h) nearly matches the lunar tidal period (~12.42h).</div>
    <br>
    <div>Amplitude: <span class="val" id="ampVal">--</span></div>
    <div>Resonance Factor: <span class="val" id="resVal">--</span></div>
    <br>
    <div>Like pushing a swing at its natural frequency, the tide amplifies to 16+ meters!</div>
</div>
<div id="controls">
    <label>Forcing Period (h): <input type="range" id="forcePeriod" min="6" max="20" step="0.1" value="12.4"> <span id="fpVal">12.4</span></label>
    <label>Bay Length: <input type="range" id="bayLen" min="0.3" max="2" step="0.01" value="1"> <span id="blVal">1.0</span></label>
    <label>Damping: <input type="range" id="damping" min="0.01" max="0.5" step="0.01" value="0.08"> <span id="dVal">0.08</span></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let time = 0;
let animId;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const forcePeriodEl = document.getElementById('forcePeriod');
const bayLenEl = document.getElementById('bayLen');
const dampingEl = document.getElementById('damping');
const fpValEl = document.getElementById('fpVal');
const blValEl = document.getElementById('blVal');
const dValEl = document.getElementById('dVal');
const ampValEl = document.getElementById('ampVal');
const resValEl = document.getElementById('resVal');

forcePeriodEl.oninput = () => fpValEl.textContent = parseFloat(forcePeriodEl.value).toFixed(1);
bayLenEl.oninput = () => blValEl.textContent = parseFloat(bayLenEl.value).toFixed(2);
dampingEl.oninput = () => dValEl.textContent = parseFloat(dampingEl.value).toFixed(2);

// Resonance simulation using driven harmonic oscillator
// Natural period depends on bay length
// T_natural = 4L / sqrt(gH) ~ proportional to bayLen

function resonanceAmplitude(forcePeriod, naturalPeriod, damping) {
    const omega = 2 * Math.PI / forcePeriod;
    const omega0 = 2 * Math.PI / naturalPeriod;
    const ratio = omega / omega0;
    const amp = 1.0 / Math.sqrt((1 - ratio * ratio) ** 2 + (2 * damping * ratio) ** 2);
    return amp;
}

// Water column state
const N = 150; // number of water columns
let waterH = new Float64Array(N);
let waterV = new Float64Array(N);

function draw() {
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, W, H);

    const forcePeriod = parseFloat(forcePeriodEl.value);
    const bayLenFactor = parseFloat(bayLenEl.value);
    const damping = parseFloat(dampingEl.value);

    // Natural period ~ 12.5h * bayLenFactor
    const naturalPeriod = 12.5 * bayLenFactor;
    const amp = resonanceAmplitude(forcePeriod, naturalPeriod, damping);
    const cappedAmp = Math.min(amp, 15);

    ampValEl.textContent = (cappedAmp * 1.6).toFixed(1) + 'm';
    resValEl.textContent = cappedAmp.toFixed(1) + 'x';

    // Bay dimensions on screen
    const bayLeft = W * 0.1;
    const bayRight = W * 0.85;
    const bayWidth = bayRight - bayLeft;
    const bayTopBase = H * 0.3;
    const bayBotBase = H * 0.7;
    const bayMidY = (bayTopBase + bayBotBase) / 2;

    // Funnel shape: wider at left (open ocean), narrower at right (head of bay)
    function bayHalfWidth(t) {
        return (bayBotBase - bayTopBase) / 2 * (1 - t * 0.6);
    }

    // Compute water surface using standing wave pattern
    const omega = 2 * Math.PI / (forcePeriod * 0.5); // scaled time
    const forcing = Math.sin(time * omega);
    const amplitude = cappedAmp * 0.03;

    // Standing wave: maximum at closed end (right), node at open end (left)
    // h(x,t) = A * cos(pi*x/2L) * cos(omega*t)
    // Quarter wavelength resonance

    // Draw sky
    let skyG = ctx.createLinearGradient(0, 0, 0, bayTopBase);
    skyG.addColorStop(0, '#0d1117');
    skyG.addColorStop(1, '#1a2a4a');
    ctx.fillStyle = skyG;
    ctx.fillRect(0, 0, W, bayTopBase);

    // Draw land (top bank)
    ctx.beginPath();
    ctx.moveTo(bayLeft, 0);
    ctx.lineTo(bayLeft, bayMidY - bayHalfWidth(0));
    for (let i = 0; i <= 100; i++) {
        const t = i / 100;
        const x = bayLeft + t * bayWidth;
        const hw = bayHalfWidth(t);
        ctx.lineTo(x, bayMidY - hw);
    }
    ctx.lineTo(bayRight, 0);
    ctx.closePath();
    let landG = ctx.createLinearGradient(0, 0, 0, bayTopBase);
    landG.addColorStop(0, '#3d2b1f');
    landG.addColorStop(1, '#606C38');
    ctx.fillStyle = landG;
    ctx.fill();

    // Draw land (bottom bank)
    ctx.beginPath();
    ctx.moveTo(bayLeft, H);
    ctx.lineTo(bayLeft, bayMidY + bayHalfWidth(0));
    for (let i = 0; i <= 100; i++) {
        const t = i / 100;
        const x = bayLeft + t * bayWidth;
        const hw = bayHalfWidth(t);
        ctx.lineTo(x, bayMidY + hw);
    }
    ctx.lineTo(bayRight, H);
    ctx.closePath();
    landG = ctx.createLinearGradient(0, bayBotBase, 0, H);
    landG.addColorStop(0, '#606C38');
    landG.addColorStop(1, '#3d2b1f');
    ctx.fillStyle = landG;
    ctx.fill();

    // Close end of bay
    ctx.beginPath();
    const topR = bayMidY - bayHalfWidth(1);
    const botR = bayMidY + bayHalfWidth(1);
    ctx.moveTo(bayRight, topR);
    ctx.lineTo(bayRight + 20, topR - 10);
    ctx.lineTo(bayRight + 20, botR + 10);
    ctx.lineTo(bayRight, botR);
    ctx.closePath();
    ctx.fillStyle = '#606C38';
    ctx.fill();

    // Draw water
    ctx.beginPath();
    // Top surface
    for (let i = 0; i <= 100; i++) {
        const t = i / 100;
        const x = bayLeft + t * bayWidth;
        const hw = bayHalfWidth(t);
        // Standing wave: node at open end (t=0), antinode at closed end (t=1)
        const standingWave = Math.cos(Math.PI * t / 2) * forcing * amplitude * (bayBotBase - bayTopBase);
        // The amplitude increases toward the head
        const heightMod = (1 - Math.cos(Math.PI * t / 2)) * forcing * amplitude * (bayBotBase - bayTopBase) * 0.5;
        const waterTop = bayMidY - hw + heightMod;
        if (i === 0) ctx.moveTo(x, waterTop);
        else ctx.lineTo(x, waterTop);
    }
    // Bottom surface (in reverse)
    for (let i = 100; i >= 0; i--) {
        const t = i / 100;
        const x = bayLeft + t * bayWidth;
        const hw = bayHalfWidth(t);
        ctx.lineTo(x, bayMidY + hw);
    }
    ctx.closePath();
    let waterG = ctx.createLinearGradient(bayLeft, bayTopBase, bayRight, bayBotBase);
    waterG.addColorStop(0, '#1e5799');
    waterG.addColorStop(0.5, '#2989d8');
    waterG.addColorStop(1, '#0f3d6b');
    ctx.fillStyle = waterG;
    ctx.fill();

    // Wave highlights on surface
    ctx.beginPath();
    for (let i = 0; i <= 100; i++) {
        const t = i / 100;
        const x = bayLeft + t * bayWidth;
        const hw = bayHalfWidth(t);
        const heightMod = (1 - Math.cos(Math.PI * t / 2)) * forcing * amplitude * (bayBotBase - bayTopBase) * 0.5;
        const waterTop = bayMidY - hw + heightMod;
        if (i === 0) ctx.moveTo(x, waterTop);
        else ctx.lineTo(x, waterTop);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Resonance curve graph (bottom-left)
    const gx = W * 0.05;
    const gy = H * 0.78;
    const gw = W * 0.25;
    const gh = H * 0.15;

    ctx.fillStyle = 'rgba(13,17,23,0.8)';
    ctx.fillRect(gx - 5, gy - 5, gw + 10, gh + 30);
    ctx.strokeStyle = 'rgba(254,250,224,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(gx, gy, gw, gh);

    // Draw resonance curve
    ctx.beginPath();
    let maxPlotAmp = 0;
    for (let i = 0; i <= gw; i++) {
        const period = 6 + (i / gw) * 14; // 6 to 20 hours
        const a = resonanceAmplitude(period, naturalPeriod, damping);
        const plotA = Math.min(a, 15);
        if (plotA > maxPlotAmp) maxPlotAmp = plotA;
        const py = gy + gh - (plotA / 15) * gh;
        if (i === 0) ctx.moveTo(gx + i, py);
        else ctx.lineTo(gx + i, py);
    }
    ctx.strokeStyle = '#DDA15E';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Mark current forcing period
    const markerX = gx + ((forcePeriod - 6) / 14) * gw;
    const markerA = Math.min(resonanceAmplitude(forcePeriod, naturalPeriod, damping), 15);
    const markerY = gy + gh - (markerA / 15) * gh;
    ctx.beginPath();
    ctx.arc(markerX, markerY, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#DDA15E';
    ctx.fill();

    // Mark natural period
    const natX = gx + ((naturalPeriod - 6) / 14) * gw;
    ctx.beginPath();
    ctx.setLineDash([3, 3]);
    ctx.moveTo(natX, gy);
    ctx.lineTo(natX, gy + gh);
    ctx.strokeStyle = 'rgba(138,154,91,0.6)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);

    // Labels
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '10px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Forcing Period (hours)', gx + gw / 2, gy + gh + 22);
    ctx.fillText('6h', gx, gy + gh + 12);
    ctx.fillText('20h', gx + gw, gy + gh + 12);
    ctx.fillStyle = '#8A9A5B';
    ctx.fillText('Natural', natX, gy - 5);

    // Title label
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '10px Georgia';
    ctx.textAlign = 'left';
    ctx.fillText('Resonance Curve', gx, gy - 10);

    // Bay labels
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '13px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Open Ocean', bayLeft + 50, bayMidY);
    ctx.fillText('Head of Bay', bayRight - 50, bayMidY);

    time += 0.03;
    animId = requestAnimationFrame(draw);
}

window.reset = function() {
    time = 0;
    forcePeriodEl.value = 12.4;
    bayLenEl.value = 1;
    dampingEl.value = 0.08;
    fpValEl.textContent = '12.4';
    blValEl.textContent = '1.0';
    dValEl.textContent = '0.08';
};

draw();
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
