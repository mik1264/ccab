<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plinian Eruption Column</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; overflow: hidden; font-family: Georgia, serif; }
canvas { display: block; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px 25px; border-radius: 12px; color: #FEFAE0;
    display: flex; gap: 20px; align-items: center; z-index: 100; flex-wrap: wrap;
    justify-content: center;
}
#controls label { font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
#controls input[type=range] { width: 110px; accent-color: #DDA15E; }
#info {
    position: fixed; top: 60px; right: 20px; background: rgba(96,108,56,0.85);
    backdrop-filter: blur(10px); padding: 15px; border-radius: 12px;
    color: #FEFAE0; font-size: 0.8rem; max-width: 250px; z-index: 100; line-height: 1.5;
}
#info h3 { color: #DDA15E; margin-bottom: 8px; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <h3>Eruption Column Physics</h3>
    <p>A Plinian column has two regions: the lower <b>gas-thrust zone</b> (momentum-driven, 100s of m) and the upper <b>convective zone</b> (buoyancy-driven, up to 45km).</p>
    <p style="margin-top:6px;">Air entrainment heats and expands, making the column buoyant above a critical height.</p>
</div>
<div id="controls">
    <label>Mass Discharge Rate
        <input type="range" id="discharge" min="10" max="100" value="60">
    </label>
    <label>Exit Velocity (m/s)
        <input type="range" id="velocity" min="50" max="300" value="150">
    </label>
    <label>Wind Speed
        <input type="range" id="wind" min="0" max="100" value="20">
    </label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let time = 0;
let paused = false;
let particles = [];

class PlumeParticle {
    constructor(x, y, vx, vy, size, type) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.size = size;
        this.type = type; // 'hot', 'warm', 'ash', 'steam'
        this.life = 1;
        this.age = 0;
        this.turbulence = (Math.random() - 0.5) * 2;
    }
    update(dt, wind) {
        this.age += dt;
        const buoyancy = this.type === 'hot' ? -120 : this.type === 'warm' ? -60 : -20;
        const entrainment = 0.02; // air mixing rate

        this.vy += buoyancy * dt;
        this.vx += wind * dt * 0.5;
        this.vx += Math.sin(time * 3 + this.turbulence * 5) * 10 * dt;

        // Drag increases with altitude (thinner air simulated as less drag at top)
        const drag = 0.98;
        this.vx *= drag;
        this.vy *= drag;

        this.x += this.vx * dt;
        this.y += this.vy * dt;

        // Spread over time
        this.size += (this.type === 'ash' ? 15 : 8) * dt;
        this.life -= (this.type === 'hot' ? 0.015 : this.type === 'warm' ? 0.008 : 0.004) * dt * 60;
    }
}

function getColor(type, life, age) {
    if (type === 'hot') {
        const r = 255;
        const g = Math.floor(120 + life * 80);
        const b = Math.floor(30 + life * 30);
        return `rgba(${r},${g},${b},${life * 0.6})`;
    } else if (type === 'warm') {
        const v = Math.floor(100 + life * 80);
        return `rgba(${v},${Math.floor(v*0.5)},${Math.floor(v*0.3)},${life * 0.4})`;
    } else if (type === 'ash') {
        const v = Math.floor(140 + life * 40);
        return `rgba(${v},${v-10},${v-20},${life * 0.25})`;
    }
    const v = Math.floor(200 + life * 55);
    return `rgba(${v},${v},${v},${life * 0.15})`;
}

function drawVolcano() {
    const cx = W * 0.4;
    const baseY = H * 0.78;
    const peakY = H * 0.55;

    // Mountain silhouette
    ctx.beginPath();
    ctx.moveTo(cx - 300, baseY);
    ctx.quadraticCurveTo(cx - 180, baseY - 50, cx - 50, peakY);
    ctx.lineTo(cx - 20, peakY - 10);
    ctx.lineTo(cx + 20, peakY - 10);
    ctx.lineTo(cx + 50, peakY);
    ctx.quadraticCurveTo(cx + 180, baseY - 50, cx + 300, baseY);
    ctx.lineTo(W, baseY);
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.lineTo(0, baseY);
    ctx.closePath();

    const mGrad = ctx.createLinearGradient(0, peakY, 0, H);
    mGrad.addColorStop(0, '#4a3728');
    mGrad.addColorStop(0.3, '#3d3024');
    mGrad.addColorStop(1, '#2a1a10');
    ctx.fillStyle = mGrad;
    ctx.fill();

    // Crater glow
    const ventGrad = ctx.createRadialGradient(cx, peakY - 10, 0, cx, peakY - 10, 40);
    ventGrad.addColorStop(0, 'rgba(255,150,50,0.8)');
    ventGrad.addColorStop(0.5, 'rgba(255,80,20,0.3)');
    ventGrad.addColorStop(1, 'rgba(255,40,10,0)');
    ctx.fillStyle = ventGrad;
    ctx.fillRect(cx - 40, peakY - 50, 80, 50);

    return { cx, peakY };
}

function drawScaleBar() {
    const cx = W * 0.4;
    const peakY = H * 0.55;
    const topY = 30;
    const totalKm = 45;

    ctx.strokeStyle = 'rgba(138,154,91,0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);

    ctx.fillStyle = '#8A9A5B';
    ctx.font = '11px Georgia';
    ctx.textAlign = 'right';

    for (let km = 0; km <= totalKm; km += 5) {
        const y = peakY - (km / totalKm) * (peakY - topY);
        ctx.beginPath();
        ctx.moveTo(cx - 320, y);
        ctx.lineTo(cx - 280, y);
        ctx.stroke();
        ctx.fillText(`${km} km`, cx - 325, y + 4);
    }
    ctx.setLineDash([]);

    // Zone labels
    ctx.fillStyle = '#DDA15E';
    ctx.font = '12px Georgia';
    ctx.textAlign = 'left';

    const gasThrust = peakY - 40;
    const convective = peakY - (peakY - topY) * 0.4;
    const umbrella = topY + 60;

    ctx.fillText('Gas-Thrust Zone', W * 0.7, gasThrust);
    ctx.fillText('(momentum-driven)', W * 0.7, gasThrust + 16);

    ctx.fillText('Convective Zone', W * 0.7, convective);
    ctx.fillText('(buoyancy-driven)', W * 0.7, convective + 16);

    ctx.fillText('Umbrella Region', W * 0.7, umbrella);
    ctx.fillText('(neutral buoyancy)', W * 0.7, umbrella + 16);

    // Zone divider lines
    ctx.strokeStyle = 'rgba(221,161,94,0.3)';
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.moveTo(W * 0.3, gasThrust - 20);
    ctx.lineTo(W * 0.85, gasThrust - 20);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W * 0.2, umbrella + 30);
    ctx.lineTo(W * 0.85, umbrella + 30);
    ctx.stroke();
    ctx.setLineDash([]);
}

let lastTime = 0;
function animate(ts) {
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;

    if (!paused) {
        time += dt;

        const discharge = document.getElementById('discharge').value / 100;
        const velocity = parseInt(document.getElementById('velocity').value);
        const wind = (document.getElementById('wind').value - 50) * 0.5;

        const cx = W * 0.4;
        const peakY = H * 0.55;

        // Emit particles from vent
        const numNew = Math.floor(discharge * 12);
        for (let i = 0; i < numNew; i++) {
            const spread = (Math.random() - 0.5) * 30;
            const type = Math.random() < 0.4 ? 'hot' : Math.random() < 0.6 ? 'warm' : Math.random() < 0.8 ? 'ash' : 'steam';
            particles.push(new PlumeParticle(
                cx + spread,
                peakY - 15,
                spread * 2 + wind * 0.3,
                -velocity * (0.8 + Math.random() * 0.4),
                3 + Math.random() * 5,
                type
            ));
        }

        // Update
        for (let p of particles) p.update(dt, wind);
        particles = particles.filter(p => p.life > 0 && p.y > -50 && p.x > -100 && p.x < W + 100);
        if (particles.length > 2000) particles.splice(0, particles.length - 2000);
    }

    // Draw
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(254,250,224,0.4)';
    for (let i = 0; i < 80; i++) {
        const sx = (i * 137.5 + 50) % W;
        const sy = (i * 73.1 + 20) % (H * 0.5);
        ctx.fillRect(sx, sy, 1, 1);
    }

    // Draw plume particles (back to front)
    particles.sort((a, b) => b.size - a.size);
    for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = getColor(p.type, p.life, p.age);
        ctx.fill();
    }

    const { cx, peakY } = drawVolcano();
    drawScaleBar();

    // Height indicator
    let minY = peakY;
    for (let p of particles) if (p.y < minY) minY = p.y;
    const heightKm = ((peakY - minY) / (peakY - 30) * 45).toFixed(1);
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '14px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText(`Column Height: ~${heightKm} km`, W * 0.4, 20);

    requestAnimationFrame(animate);
}

window.reset = function() {
    particles = [];
    time = 0;
};

requestAnimationFrame(animate);
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
