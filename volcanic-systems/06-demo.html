<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volcanic Explosivity Index</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow-x: hidden; font-family: Georgia, serif; color: #FEFAE0; }
canvas { display: block; }
#info {
    position: fixed; top: 60px; right: 20px; background: rgba(96,108,56,0.85);
    backdrop-filter: blur(10px); padding: 15px; border-radius: 12px;
    color: #FEFAE0; font-size: 0.8rem; max-width: 280px; z-index: 100; line-height: 1.5;
}
#info h3 { color: #DDA15E; margin-bottom: 8px; }
#veiSelect {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px 20px; border-radius: 12px; z-index: 100;
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.vei-btn {
    background: rgba(221,161,94,0.2); color: #FEFAE0; border: 1px solid #606C38;
    padding: 8px 14px; border-radius: 8px; cursor: pointer; font-family: Georgia;
    font-size: 0.85rem; transition: all 0.3s;
}
.vei-btn:hover, .vei-btn.active { background: #DDA15E; color: #1a1a2e; border-color: #DDA15E; }
#details {
    position: fixed; top: 60px; left: 60px; color: #FEFAE0; font-size: 0.85rem;
    font-family: Georgia; z-index: 100; line-height: 1.7; max-width: 300px;
}
#details h2 { color: #DDA15E; font-size: 1.3rem; margin-bottom: 10px; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <h3>Volcanic Explosivity Index</h3>
    <p>The VEI is a logarithmic scale (0-8) measuring eruption size by tephra volume, column height, and duration. Each step is 10x more powerful.</p>
</div>
<div id="details"></div>
<div id="veiSelect"></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const details = document.getElementById('details');
const veiSelect = document.getElementById('veiSelect');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const veiData = [
    { vei: 0, name: 'Non-Explosive', desc: 'Effusive', volume: '< 10,000 m3', height: '< 100 m',
      example: 'Kilauea (continuous)', type: 'Hawaiian', freq: 'Daily', color: '#4a8a4a' },
    { vei: 1, name: 'Gentle', desc: 'Effusive-Explosive', volume: '> 10,000 m3', height: '100-1000 m',
      example: 'Stromboli (2002)', type: 'Strombolian', freq: 'Daily', color: '#6a9a3a' },
    { vei: 2, name: 'Explosive', desc: 'Explosive', volume: '> 1M m3', height: '1-5 km',
      example: 'Galeras (1993)', type: 'Vulcanian', freq: 'Weekly', color: '#8a9a2a' },
    { vei: 3, name: 'Severe', desc: 'Explosive', volume: '> 10M m3', height: '3-15 km',
      example: 'Nevado del Ruiz (1985)', type: 'Sub-Plinian', freq: 'Yearly', color: '#aa8a1a' },
    { vei: 4, name: 'Cataclysmic', desc: 'Explosive', volume: '> 100M m3', height: '10-25 km',
      example: 'Eyjafjallajokull (2010)', type: 'Plinian', freq: '~18 months', color: '#cc6a10' },
    { vei: 5, name: 'Paroxysmal', desc: 'Explosive', volume: '> 1 km3', height: '> 25 km',
      example: 'Mt. St. Helens (1980)', type: 'Plinian', freq: '~12 years', color: '#dd4a00' },
    { vei: 6, name: 'Colossal', desc: 'Explosive', volume: '> 10 km3', height: '> 25 km',
      example: 'Pinatubo (1991)', type: 'Ultra-Plinian', freq: '~50-100 yrs', color: '#ee2a00' },
    { vei: 7, name: 'Super-Colossal', desc: 'Explosive', volume: '> 100 km3', height: '> 25 km',
      example: 'Tambora (1815)', type: 'Ultra-Plinian', freq: '~500-1000 yrs', color: '#ff1000' },
    { vei: 8, name: 'Mega-Colossal', desc: 'Explosive', volume: '> 1000 km3', height: '> 25 km',
      example: 'Yellowstone (640 ka)', type: 'Supervolcanic', freq: '~50,000+ yrs', color: '#ff0040' }
];

let selectedVEI = 4;
let particles = [];
let time = 0;

// Create buttons
veiData.forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'vei-btn' + (v.vei === selectedVEI ? ' active' : '');
    btn.textContent = `VEI ${v.vei}`;
    btn.style.borderColor = v.color;
    btn.addEventListener('click', () => {
        selectedVEI = v.vei;
        document.querySelectorAll('.vei-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        particles = [];
    });
    veiSelect.appendChild(btn);
});

function updateDetails() {
    const v = veiData[selectedVEI];
    details.innerHTML = `
        <h2>VEI ${v.vei}: ${v.name}</h2>
        <div>Type: ${v.type}</div>
        <div>Description: ${v.desc}</div>
        <div>Tephra Volume: ${v.volume}</div>
        <div>Column Height: ${v.height}</div>
        <div>Example: ${v.example}</div>
        <div>Frequency: ${v.freq}</div>
    `;
}

function drawComparison() {
    const cx = W * 0.5;
    const baseY = H * 0.72;
    const v = veiData[selectedVEI];

    // Draw volcano
    const volcH = 60 + selectedVEI * 12;
    const volcW = 100 + selectedVEI * 25;

    ctx.beginPath();
    ctx.moveTo(cx - volcW, baseY);
    ctx.lineTo(cx - 25, baseY - volcH);
    ctx.lineTo(cx - 10, baseY - volcH - 5);
    ctx.lineTo(cx + 10, baseY - volcH - 5);
    ctx.lineTo(cx + 25, baseY - volcH);
    ctx.lineTo(cx + volcW, baseY);
    ctx.closePath();

    const mGrad = ctx.createLinearGradient(cx, baseY - volcH, cx, baseY);
    mGrad.addColorStop(0, '#5a4535');
    mGrad.addColorStop(1, '#3d3024');
    ctx.fillStyle = mGrad;
    ctx.fill();

    // Ground
    ctx.fillStyle = '#2a1a10';
    ctx.fillRect(0, baseY, W, H - baseY);

    // Eruption visualization scaled by VEI
    const columnH = Math.min(baseY - 50, 50 + selectedVEI * (baseY - 100) / 8);
    const columnW = 15 + selectedVEI * 8;
    const intensity = selectedVEI / 8;

    // Eruption column
    if (selectedVEI > 0) {
        const topY = baseY - volcH - columnH;

        // Column body
        for (let y = baseY - volcH - 5; y > topY; y -= 3) {
            const progress = (baseY - volcH - y) / columnH;
            const w = columnW * (1 + progress * 2);
            const wobble = Math.sin(y * 0.05 + time * 3) * w * 0.1;

            ctx.beginPath();
            ctx.ellipse(cx + wobble, y, w, 4, 0, 0, Math.PI * 2);

            const t = 1 - progress;
            if (t > 0.7) {
                ctx.fillStyle = `rgba(255,${Math.floor(120 + t * 80)},${Math.floor(30 + t * 30)},${0.5 * t})`;
            } else if (t > 0.3) {
                ctx.fillStyle = `rgba(${Math.floor(160 + t * 60)},${Math.floor(80 + t * 40)},${Math.floor(60 + t * 30)},${0.4 * t + 0.1})`;
            } else {
                ctx.fillStyle = `rgba(${Math.floor(130 + t * 50)},${Math.floor(120 + t * 40)},${Math.floor(110 + t * 30)},${0.3})`;
            }
            ctx.fill();
        }

        // Umbrella cloud for VEI 4+
        if (selectedVEI >= 4) {
            const umbrellaW = columnW * 4 + selectedVEI * 20;
            const umbrellaY = topY + 20;
            ctx.beginPath();
            ctx.ellipse(cx, umbrellaY, umbrellaW, 30 + selectedVEI * 5, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(150,140,130,${0.2 + intensity * 0.15})`;
            ctx.fill();
        }

        // Column height label
        const heightKm = selectedVEI <= 1 ? '< 1' : selectedVEI <= 2 ? '1-5' : selectedVEI <= 3 ? '3-15' : selectedVEI <= 4 ? '10-25' : '> 25';
        ctx.fillStyle = '#DDA15E';
        ctx.font = '12px Georgia';
        ctx.textAlign = 'left';
        ctx.fillText(`~${heightKm} km`, cx + columnW * 3 + 10, topY + columnH / 2);

        // Height line
        ctx.strokeStyle = 'rgba(221,161,94,0.4)';
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.moveTo(cx + columnW * 3, topY);
        ctx.lineTo(cx + columnW * 3, baseY - volcH);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Vent glow
    const ventGrad = ctx.createRadialGradient(cx, baseY - volcH - 5, 0, cx, baseY - volcH - 5, 30 + selectedVEI * 5);
    ventGrad.addColorStop(0, `rgba(255,150,50,${0.3 + intensity * 0.5})`);
    ventGrad.addColorStop(1, 'rgba(255,50,10,0)');
    ctx.fillStyle = ventGrad;
    ctx.fillRect(cx - 60, baseY - volcH - 40, 120, 50);

    // Particles
    if (selectedVEI > 0) {
        const numNew = Math.floor(intensity * 8);
        for (let i = 0; i < numNew; i++) {
            particles.push({
                x: cx + (Math.random() - 0.5) * 20,
                y: baseY - volcH - 10,
                vx: (Math.random() - 0.5) * 50 * (1 + selectedVEI),
                vy: -50 - Math.random() * 100 * intensity,
                size: 1 + Math.random() * 3 * intensity,
                life: 1,
                temp: 0.8 + Math.random() * 0.2
            });
        }
    }

    for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,${Math.floor(100 + p.temp * 100)},30,${p.life * 0.6})`;
        ctx.fill();
    }

    // VEI scale bar
    const barX = 60;
    const barY = H * 0.3;
    const barH = H * 0.35;
    ctx.fillStyle = '#8A9A5B';
    ctx.font = '11px Georgia';
    ctx.textAlign = 'right';
    for (let i = 0; i <= 8; i++) {
        const y = barY + barH - (i / 8) * barH;
        const isSelected = i === selectedVEI;
        ctx.fillStyle = isSelected ? veiData[i].color : 'rgba(138,154,91,0.5)';
        ctx.fillRect(barX, y - 2, 20 + i * 4, 4);
        ctx.fillStyle = isSelected ? '#FEFAE0' : 'rgba(254,250,224,0.4)';
        ctx.textAlign = 'right';
        ctx.fillText(`${i}`, barX - 5, y + 4);
    }
    ctx.fillStyle = '#8A9A5B';
    ctx.font = '10px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('VEI', barX + 10, barY - 10);
}

let lastTime = 0;
function animate(ts) {
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;
    time += dt;

    // Update particles
    for (let p of particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 30 * dt;
        p.life -= 0.015;
    }
    particles = particles.filter(p => p.life > 0);
    if (particles.length > 500) particles.splice(0, particles.length - 500);

    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    updateDetails();
    drawComparison();

    requestAnimationFrame(animate);
}

window.reset = function() {
    selectedVEI = 4;
    particles = [];
    time = 0;
    document.querySelectorAll('.vei-btn').forEach((b, i) => {
        b.classList.toggle('active', i === 4);
    });
};

requestAnimationFrame(animate);
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
