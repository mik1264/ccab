<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caldera Collapse Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
canvas { display: block; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px 25px; border-radius: 12px; color: #FEFAE0;
    display: flex; gap: 20px; align-items: center; z-index: 100; flex-wrap: wrap;
    justify-content: center;
}
#controls label { font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
#controls input[type=range] { width: 120px; accent-color: #DDA15E; }
#controls button { background: #DDA15E; color: #1a1a2e; border: none; padding: 8px 16px;
    border-radius: 8px; cursor: pointer; font-family: Georgia; font-size: 0.85rem; }
#info {
    position: fixed; top: 60px; right: 20px; background: rgba(96,108,56,0.85);
    backdrop-filter: blur(10px); padding: 15px; border-radius: 12px;
    color: #FEFAE0; font-size: 0.8rem; max-width: 260px; z-index: 100; line-height: 1.5;
}
#info h3 { color: #DDA15E; margin-bottom: 8px; }
#stage { position: fixed; top: 60px; left: 60px; color: #DDA15E; font-size: 1rem;
    font-family: Georgia; z-index: 100; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <h3>Caldera Collapse</h3>
    <p>When a magma chamber empties during a major eruption, the unsupported roof collapses inward. Collapse proceeds through four stages:</p>
    <p style="margin-top:6px;font-size:0.75rem;">1. Downsag &rarr; 2. Ring fault &rarr; 3. Piston collapse &rarr; 4. Caldera lake formation</p>
</div>
<div id="stage">Stage: Pre-eruption</div>
<div id="controls">
    <label>Chamber Depth (km)
        <input type="range" id="depth" min="2" max="10" value="5">
    </label>
    <label>Chamber Width (km)
        <input type="range" id="chamberWidth" min="3" max="15" value="8">
    </label>
    <button id="eruptBtn">Begin Eruption</button>
    <button id="stepBtn">Next Stage</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const stageLabel = document.getElementById('stage');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let time = 0;
let paused = false;
let stage = 0; // 0=pre, 1=erupting, 2=downsag, 3=ring fault, 4=piston collapse, 5=caldera
let magmaLevel = 1.0; // 1 = full, 0 = empty
let collapseDepth = 0;
let faultProgress = 0;
let eruptionParticles = [];
let debrisParticles = [];
let waterLevel = 0;

const stageNames = ['Pre-eruption', 'Erupting', 'Downsag', 'Ring Fault Formation', 'Piston Collapse', 'Caldera Formation'];

function nextStage() {
    if (stage < 5) {
        stage++;
        stageLabel.textContent = `Stage: ${stageNames[stage]}`;
    }
}

document.getElementById('eruptBtn').addEventListener('click', () => {
    stage = 1;
    magmaLevel = 1.0;
    collapseDepth = 0;
    faultProgress = 0;
    waterLevel = 0;
    eruptionParticles = [];
    debrisParticles = [];
    stageLabel.textContent = `Stage: ${stageNames[1]}`;
});

document.getElementById('stepBtn').addEventListener('click', nextStage);

function drawScene() {
    const cx = W / 2;
    const surfaceY = H * 0.35;
    const depthKm = parseInt(document.getElementById('depth').value);
    const chamberWidthKm = parseInt(document.getElementById('chamberWidth').value);
    const scale = (H * 0.55) / 12; // pixels per km

    const chamberCY = surfaceY + depthKm * scale;
    const chamberRX = chamberWidthKm * scale / 2;
    const chamberRY = chamberRX * 0.4;

    // Sky
    const skyGrad = ctx.createLinearGradient(0, 0, 0, surfaceY);
    skyGrad.addColorStop(0, '#0a0a1a');
    skyGrad.addColorStop(1, '#1a1a2e');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, surfaceY);

    // Mountain profile (affected by collapse)
    const peakH = 80;
    const sagAmount = stage >= 2 ? Math.min(1, collapseDepth) * 60 : 0;
    const pistonDrop = stage >= 4 ? Math.min(1, collapseDepth - 0.5) * 100 : 0;

    ctx.beginPath();
    ctx.moveTo(0, surfaceY);

    // Left slope
    ctx.lineTo(cx - chamberRX - 80, surfaceY);
    ctx.lineTo(cx - chamberRX * 0.8, surfaceY - peakH + sagAmount * 0.3);

    if (stage >= 3) {
        // Ring fault - left side
        ctx.lineTo(cx - chamberRX * 0.6, surfaceY - peakH + sagAmount * 0.5 + pistonDrop * 0.3);
        // Collapsed center
        ctx.lineTo(cx - chamberRX * 0.3, surfaceY - peakH + sagAmount + pistonDrop);
        ctx.lineTo(cx + chamberRX * 0.3, surfaceY - peakH + sagAmount + pistonDrop);
        ctx.lineTo(cx + chamberRX * 0.6, surfaceY - peakH + sagAmount * 0.5 + pistonDrop * 0.3);
    } else if (stage >= 2) {
        // Downsag - gentle depression
        ctx.quadraticCurveTo(cx, surfaceY - peakH + sagAmount, cx + chamberRX * 0.8, surfaceY - peakH + sagAmount * 0.3);
    } else {
        // Normal peak
        ctx.lineTo(cx - 20, surfaceY - peakH);
        ctx.lineTo(cx + 20, surfaceY - peakH);
    }

    // Right slope
    ctx.lineTo(cx + chamberRX * 0.8, surfaceY - peakH + sagAmount * 0.3);
    ctx.lineTo(cx + chamberRX + 80, surfaceY);
    ctx.lineTo(W, surfaceY);
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();

    const rockGrad = ctx.createLinearGradient(0, surfaceY - peakH, 0, H);
    rockGrad.addColorStop(0, '#4a3728');
    rockGrad.addColorStop(0.15, '#3d3024');
    rockGrad.addColorStop(0.5, '#5a4535');
    rockGrad.addColorStop(1, '#2a1a10');
    ctx.fillStyle = rockGrad;
    ctx.fill();

    // Rock layers
    ctx.strokeStyle = 'rgba(100,80,60,0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 15; i++) {
        const ly = surfaceY + i * scale * 0.8;
        ctx.beginPath();
        for (let x = 0; x < W; x += 20) {
            const deform = (stage >= 2 && Math.abs(x - cx) < chamberRX) ?
                Math.max(0, 1 - Math.abs(x - cx) / chamberRX) * sagAmount * (1 - i / 15) : 0;
            ctx.lineTo(x, ly + Math.sin(x * 0.015 + i * 2) * 3 + deform);
        }
        ctx.stroke();
    }

    // Ring faults
    if (stage >= 3) {
        ctx.strokeStyle = `rgba(255,100,50,${0.3 + Math.sin(time * 3) * 0.2})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);

        // Left fault
        ctx.beginPath();
        ctx.moveTo(cx - chamberRX * 0.65, surfaceY - peakH + sagAmount * 0.5);
        ctx.lineTo(cx - chamberRX * 0.8, chamberCY - chamberRY);
        ctx.stroke();

        // Right fault
        ctx.beginPath();
        ctx.moveTo(cx + chamberRX * 0.65, surfaceY - peakH + sagAmount * 0.5);
        ctx.lineTo(cx + chamberRX * 0.8, chamberCY - chamberRY);
        ctx.stroke();

        ctx.setLineDash([]);
    }

    // Magma chamber
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(cx, chamberCY, chamberRX, chamberRY, 0, 0, Math.PI * 2);

    // Chamber outline (rock wall)
    ctx.strokeStyle = 'rgba(80,60,40,0.8)';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Magma fill (partial based on magmaLevel)
    ctx.save();
    ctx.clip();
    const magmaTop = chamberCY - chamberRY + (1 - magmaLevel) * chamberRY * 2;
    const mgGrad = ctx.createLinearGradient(cx, magmaTop, cx, chamberCY + chamberRY);
    mgGrad.addColorStop(0, `rgba(255,130,40,${0.7 * magmaLevel})`);
    mgGrad.addColorStop(0.5, `rgba(220,80,20,${0.8 * magmaLevel})`);
    mgGrad.addColorStop(1, `rgba(160,40,10,${0.6 * magmaLevel})`);
    ctx.fillStyle = mgGrad;
    ctx.fillRect(cx - chamberRX, magmaTop, chamberRX * 2, chamberCY + chamberRY - magmaTop);

    // Convection
    if (magmaLevel > 0.1) {
        for (let i = 0; i < 5; i++) {
            const a = time * 0.5 + i * 1.2;
            const px = cx + Math.cos(a) * chamberRX * 0.5;
            const py = chamberCY + Math.sin(a) * chamberRY * 0.3;
            if (py > magmaTop) {
                ctx.beginPath();
                ctx.arc(px, py, 6, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,180,60,${0.4 * magmaLevel})`;
                ctx.fill();
            }
        }
    }
    ctx.restore();
    ctx.restore();

    // Empty chamber void
    if (magmaLevel < 0.3) {
        ctx.beginPath();
        ctx.ellipse(cx, chamberCY, chamberRX - 3, chamberRY - 3, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(10,10,10,${(1 - magmaLevel) * 0.5})`;
        ctx.fill();
    }

    // Conduit
    ctx.fillStyle = magmaLevel > 0.3 ? 'rgba(255,100,30,0.6)' : 'rgba(40,30,20,0.5)';
    ctx.fillRect(cx - 8, surfaceY - peakH + sagAmount + pistonDrop, 16, chamberCY - chamberRY - surfaceY + peakH - sagAmount - pistonDrop);

    // Caldera lake (stage 5)
    if (stage >= 5 && waterLevel > 0) {
        const lakeTop = surfaceY - peakH + sagAmount + pistonDrop + 10 - waterLevel * 30;
        ctx.fillStyle = `rgba(40,80,140,${waterLevel * 0.6})`;
        ctx.beginPath();
        ctx.moveTo(cx - chamberRX * 0.55, surfaceY - peakH + sagAmount + pistonDrop);
        ctx.lineTo(cx + chamberRX * 0.55, surfaceY - peakH + sagAmount + pistonDrop);
        ctx.lineTo(cx + chamberRX * 0.5, lakeTop);
        for (let x = cx + chamberRX * 0.5; x >= cx - chamberRX * 0.5; x -= 5) {
            ctx.lineTo(x, lakeTop + Math.sin(x * 0.05 + time * 2) * 2);
        }
        ctx.closePath();
        ctx.fill();
    }

    // Labels
    ctx.fillStyle = '#DDA15E';
    ctx.font = '12px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('Magma Chamber', cx, chamberCY + chamberRY + 20);
    ctx.fillText(`${(magmaLevel * 100).toFixed(0)}% full`, cx, chamberCY + chamberRY + 36);
    ctx.fillText(`Depth: ${depthKm} km`, cx + chamberRX + 40, chamberCY);
    ctx.fillText(`Width: ${chamberWidthKm} km`, cx, chamberCY + chamberRY + 52);

    // Eruption particles
    for (let p of eruptionParticles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,${Math.floor(100 + p.life * 100)},${Math.floor(30 + p.life * 30)},${p.life * 0.5})`;
        ctx.fill();
    }

    // Debris
    for (let p of debrisParticles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(100,80,60,${p.life * 0.7})`;
        ctx.fill();
    }
}

let lastTime = 0;
function animate(ts) {
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;

    if (!paused) {
        time += dt;

        // Stage progression
        if (stage === 1) {
            magmaLevel -= dt * 0.08;
            // Eruption particles
            const cx = W / 2;
            const surfaceY = H * 0.35;
            for (let i = 0; i < 5; i++) {
                eruptionParticles.push({
                    x: cx + (Math.random() - 0.5) * 20,
                    y: surfaceY - 80,
                    vx: (Math.random() - 0.5) * 60,
                    vy: -100 - Math.random() * 150,
                    size: 3 + Math.random() * 5,
                    life: 1
                });
            }
            if (magmaLevel <= 0.5) nextStage();
        }
        if (stage === 2) {
            collapseDepth += dt * 0.3;
            magmaLevel -= dt * 0.03;
            if (collapseDepth >= 0.5) nextStage();
        }
        if (stage === 3) {
            faultProgress += dt * 0.2;
            collapseDepth += dt * 0.2;
            magmaLevel -= dt * 0.03;
            if (faultProgress >= 1) nextStage();
        }
        if (stage === 4) {
            collapseDepth += dt * 0.4;
            magmaLevel = Math.max(0.05, magmaLevel - dt * 0.05);
            // Debris falling
            const cx = W / 2;
            const chamberRX = parseInt(document.getElementById('chamberWidth').value) * (H * 0.55) / 24;
            for (let i = 0; i < 3; i++) {
                debrisParticles.push({
                    x: cx + (Math.random() - 0.5) * chamberRX,
                    y: H * 0.35 - 40 + collapseDepth * 60,
                    vx: (Math.random() - 0.5) * 20,
                    vy: 30 + Math.random() * 50,
                    size: 2 + Math.random() * 4,
                    life: 1
                });
            }
            if (collapseDepth >= 2) nextStage();
        }
        if (stage === 5) {
            waterLevel = Math.min(1, waterLevel + dt * 0.05);
        }

        // Update particles
        for (let p of eruptionParticles) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += 80 * dt;
            p.life -= 0.02;
        }
        for (let p of debrisParticles) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += 100 * dt;
            p.life -= 0.015;
        }
        eruptionParticles = eruptionParticles.filter(p => p.life > 0);
        debrisParticles = debrisParticles.filter(p => p.life > 0);
    }

    ctx.clearRect(0, 0, W, H);
    drawScene();

    requestAnimationFrame(animate);
}

window.reset = function() {
    stage = 0;
    magmaLevel = 1.0;
    collapseDepth = 0;
    faultProgress = 0;
    waterLevel = 0;
    eruptionParticles = [];
    debrisParticles = [];
    time = 0;
    stageLabel.textContent = 'Stage: Pre-eruption';
};

requestAnimationFrame(animate);
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
