<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lava Flow Viscosity Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
canvas { display: block; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px 25px; border-radius: 12px; color: #FEFAE0;
    display: flex; gap: 20px; align-items: center; z-index: 100; flex-wrap: wrap;
    justify-content: center;
}
#controls label { font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
#controls input[type=range] { width: 120px; accent-color: #DDA15E; }
#controls button { background: #DDA15E; color: #1a1a2e; border: none; padding: 8px 16px;
    border-radius: 8px; cursor: pointer; font-family: Georgia; font-size: 0.85rem; }
#controls button:hover { background: #c4913e; }
#info {
    position: fixed; top: 60px; right: 20px; background: rgba(96,108,56,0.85);
    backdrop-filter: blur(10px); padding: 15px; border-radius: 12px;
    color: #FEFAE0; font-size: 0.8rem; max-width: 250px; z-index: 100; line-height: 1.5;
}
#info h3 { color: #DDA15E; margin-bottom: 8px; }
.type-label { color: #DDA15E; font-weight: bold; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <h3>Lava Viscosity</h3>
    <p>Viscosity controls how lava flows. <span class="type-label">Basaltic</span> lava (low SiO2, ~1200 C) flows freely like honey. <span class="type-label">Rhyolitic</span> lava (high SiO2, ~800 C) is stiff like tar.</p>
    <p style="margin-top:8px;" id="viscLabel">SiO2: 50% | Viscosity: Low</p>
</div>
<div id="controls">
    <label>SiO2 Content (%)
        <input type="range" id="silica" min="45" max="75" value="50">
    </label>
    <label>Temperature (C)
        <input type="range" id="temp" min="700" max="1250" value="1200">
    </label>
    <label>Slope Angle
        <input type="range" id="slope" min="5" max="45" value="15">
    </label>
    <button id="pourBtn">Pour Lava</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let time = 0;
let paused = false;
let lavaBlobs = [];

class LavaBlob {
    constructor(x, y, silica, temp, slopeAngle) {
        this.x = x;
        this.y = y;
        this.silica = silica;
        this.temp = temp;
        this.slopeAngle = slopeAngle;
        this.vx = 0;
        this.vy = 0;
        this.viscosity = this.calcViscosity();
        this.width = 20 + (1 - this.viscosity) * 15;
        this.height = 8 + this.viscosity * 12;
        this.trail = [];
        this.cooling = 0;
        this.life = 1;
    }
    calcViscosity() {
        // Higher silica = higher viscosity, lower temp = higher viscosity
        const silicaFactor = (this.silica - 45) / 30; // 0-1
        const tempFactor = 1 - (this.temp - 700) / 550; // 0-1 (inverted)
        return Math.min(1, Math.max(0, silicaFactor * 0.6 + tempFactor * 0.4));
    }
    update(dt) {
        this.cooling += dt * 0.005 * (1 + this.viscosity);
        const currentTemp = Math.max(600, this.temp - this.cooling * 200);
        const tempFactor = 1 - (currentTemp - 600) / 650;
        const currentVisc = Math.min(1, this.viscosity + this.cooling * 0.5);

        const gravity = 200;
        const slopeRad = this.slopeAngle * Math.PI / 180;
        const accelX = Math.cos(slopeRad) * gravity * Math.sin(slopeRad);
        const accelY = Math.sin(slopeRad) * gravity * Math.sin(slopeRad);

        const dragCoeff = 0.5 + currentVisc * 8;
        this.vx += accelX * dt;
        this.vy += accelY * dt;
        this.vx *= (1 - dragCoeff * dt);
        this.vy *= (1 - dragCoeff * dt);

        this.x += this.vx * dt;
        this.y += this.vy * dt;

        // Low viscosity = spreads wider and thinner
        this.width = 20 + (1 - currentVisc) * 30 + this.cooling * 5;
        this.height = Math.max(3, 10 + currentVisc * 15 - this.cooling * 3);

        // Save trail
        if (this.trail.length === 0 || Math.hypot(this.x - this.trail[this.trail.length-1].x, this.y - this.trail[this.trail.length-1].y) > 3) {
            this.trail.push({x: this.x, y: this.y, w: this.width, h: this.height, temp: currentTemp});
        }

        // Stop if cooled or off screen
        if (currentTemp < 650 || this.x > W + 50 || this.y > H + 50) {
            this.life = Math.max(0, this.life - dt * 0.5);
        }
    }
    draw() {
        // Draw trail
        for (let i = 0; i < this.trail.length; i++) {
            const t = this.trail[i];
            const age = (this.trail.length - i) / this.trail.length;
            ctx.beginPath();
            ctx.ellipse(t.x, t.y, t.w / 2, t.h / 2, 0, 0, Math.PI * 2);
            ctx.fillStyle = lavaColor(t.temp, 0.6 * age);
            ctx.fill();
        }
        // Draw head
        const currentTemp = Math.max(600, this.temp - this.cooling * 200);
        ctx.beginPath();
        ctx.ellipse(this.x, this.y, this.width / 2, this.height / 2, 0, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.width / 2);
        grad.addColorStop(0, lavaColor(currentTemp, 0.95));
        grad.addColorStop(0.7, lavaColor(currentTemp * 0.9, 0.7));
        grad.addColorStop(1, lavaColor(currentTemp * 0.7, 0.3));
        ctx.fillStyle = grad;
        ctx.fill();

        // Glow
        ctx.beginPath();
        ctx.ellipse(this.x, this.y, this.width, this.height, 0, 0, Math.PI * 2);
        ctx.fillStyle = lavaColor(currentTemp, 0.1);
        ctx.fill();
    }
}

function lavaColor(temp, alpha) {
    const t = (temp - 600) / 650;
    if (t > 0.7) {
        return `rgba(255,${Math.floor(140 + t * 80)},${Math.floor(30 + t * 40)},${alpha})`;
    } else if (t > 0.3) {
        return `rgba(${Math.floor(180 + t * 75)},${Math.floor(40 + t * 50)},20,${alpha})`;
    } else {
        return `rgba(${Math.floor(60 + t * 120)},${Math.floor(20 + t * 20)},${Math.floor(10 + t * 10)},${alpha})`;
    }
}

function drawTerrain() {
    const slopeAngle = parseInt(document.getElementById('slope').value);
    const slopeRad = slopeAngle * Math.PI / 180;

    // Ground with slope
    const ventX = W * 0.15;
    const ventY = H * 0.35;
    const endX = W;
    const endY = ventY + Math.tan(slopeRad) * (endX - ventX);

    // Background terrain
    ctx.beginPath();
    ctx.moveTo(0, ventY + 20);
    ctx.lineTo(ventX, ventY);
    ctx.lineTo(endX, Math.min(endY, H));
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();

    const tGrad = ctx.createLinearGradient(0, ventY, 0, H);
    tGrad.addColorStop(0, '#3d3024');
    tGrad.addColorStop(0.5, '#4a3728');
    tGrad.addColorStop(1, '#2a1a10');
    ctx.fillStyle = tGrad;
    ctx.fill();

    // Vent
    ctx.beginPath();
    ctx.arc(ventX, ventY - 10, 25, 0, Math.PI * 2);
    const ventGrad = ctx.createRadialGradient(ventX, ventY - 10, 0, ventX, ventY - 10, 25);
    ventGrad.addColorStop(0, 'rgba(255,150,50,0.8)');
    ventGrad.addColorStop(0.5, 'rgba(200,60,20,0.5)');
    ventGrad.addColorStop(1, 'rgba(60,30,10,0.3)');
    ctx.fillStyle = ventGrad;
    ctx.fill();

    // Angle label
    ctx.fillStyle = '#DDA15E';
    ctx.font = '12px Georgia';
    ctx.textAlign = 'left';
    ctx.fillText(`Slope: ${slopeAngle}deg`, ventX + 40, ventY - 30);

    return { ventX, ventY };
}

function drawLegend() {
    const x = 70;
    const y = H * 0.15;
    ctx.fillStyle = '#DDA15E';
    ctx.font = '12px Georgia';
    ctx.textAlign = 'left';

    const silica = parseInt(document.getElementById('silica').value);
    const temp = parseInt(document.getElementById('temp').value);
    let type = 'Basaltic';
    if (silica > 63) type = 'Rhyolitic';
    else if (silica > 57) type = 'Andesitic';
    else if (silica > 52) type = 'Basaltic Andesite';

    ctx.fillText(`Type: ${type}`, x, y);
    ctx.fillText(`Temperature: ${temp} C`, x, y + 20);

    const visc = ((silica - 45) / 30 * 0.6 + (1 - (temp - 700) / 550) * 0.4);
    const viscPa = Math.pow(10, 1 + visc * 8).toFixed(0);
    ctx.fillText(`Viscosity: ~${viscPa} Pa-s`, x, y + 40);

    document.getElementById('viscLabel').textContent = `SiO2: ${silica}% | ${type} | ~${viscPa} Pa-s`;
}

function pourLava() {
    const silica = parseInt(document.getElementById('silica').value);
    const temp = parseInt(document.getElementById('temp').value);
    const slope = parseInt(document.getElementById('slope').value);
    const ventX = W * 0.15;
    const ventY = H * 0.35;

    for (let i = 0; i < 8; i++) {
        setTimeout(() => {
            lavaBlobs.push(new LavaBlob(
                ventX + (Math.random() - 0.5) * 10,
                ventY + (Math.random() - 0.5) * 5,
                silica, temp, slope
            ));
        }, i * 200);
    }
}

document.getElementById('pourBtn').addEventListener('click', pourLava);

let lastTime = 0;
function animate(ts) {
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;

    if (!paused) {
        time += dt;
        for (let blob of lavaBlobs) blob.update(dt);
        lavaBlobs = lavaBlobs.filter(b => b.life > 0);
    }

    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(254,250,224,0.3)';
    for (let i = 0; i < 60; i++) {
        const sx = (i * 137.5 + 50) % W;
        const sy = (i * 73.1 + 20) % (H * 0.35);
        ctx.fillRect(sx, sy, 1.5, 1.5);
    }

    const { ventX, ventY } = drawTerrain();
    for (let blob of lavaBlobs) blob.draw();
    drawLegend();

    requestAnimationFrame(animate);
}

window.reset = function() {
    lavaBlobs = [];
    time = 0;
};

requestAnimationFrame(animate);
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
