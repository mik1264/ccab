<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stratovolcano vs Shield Volcano</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
canvas { display: block; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 15px 25px; border-radius: 12px; color: #FEFAE0;
    display: flex; gap: 15px; align-items: center; z-index: 100; flex-wrap: wrap;
    justify-content: center;
}
.toggle-btn {
    background: rgba(221,161,94,0.2); color: #FEFAE0; border: 1px solid #606C38;
    padding: 8px 18px; border-radius: 8px; cursor: pointer; font-family: Georgia;
    font-size: 0.85rem; transition: all 0.3s;
}
.toggle-btn:hover, .toggle-btn.active { background: #DDA15E; color: #1a1a2e; }
#info {
    position: fixed; top: 60px; right: 20px; background: rgba(96,108,56,0.85);
    backdrop-filter: blur(10px); padding: 15px; border-radius: 12px;
    color: #FEFAE0; font-size: 0.8rem; max-width: 260px; z-index: 100; line-height: 1.5;
}
#info h3 { color: #DDA15E; margin-bottom: 8px; }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="info">
    <h3>Volcano Types</h3>
    <p><b>Stratovolcano:</b> Steep slopes (~30-35 deg), alternating lava and pyroclastic layers, explosive eruptions, viscous magma.</p>
    <p style="margin-top:8px;"><b>Shield:</b> Gentle slopes (&lt;10 deg), built from many thin basaltic flows, effusive eruptions, fluid magma.</p>
</div>
<div id="controls">
    <button class="toggle-btn active" id="btnBoth">Both</button>
    <button class="toggle-btn" id="btnStrato">Stratovolcano</button>
    <button class="toggle-btn" id="btnShield">Shield Volcano</button>
    <button class="toggle-btn" id="btnCross">Cross-Section</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let time = 0;
let mode = 'both'; // 'both', 'strato', 'shield', 'cross'
let particles = [];

document.getElementById('btnBoth').addEventListener('click', () => setMode('both'));
document.getElementById('btnStrato').addEventListener('click', () => setMode('strato'));
document.getElementById('btnShield').addEventListener('click', () => setMode('shield'));
document.getElementById('btnCross').addEventListener('click', () => setMode('cross'));

function setMode(m) {
    mode = m;
    particles = [];
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
}

function drawStratovolcano(cx, baseY, scale, crossSection) {
    const peakH = 200 * scale;
    const baseW = 160 * scale;

    if (crossSection) {
        // Cross-section view - show internal layers
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(cx - baseW, baseY);
        ctx.lineTo(cx, baseY - peakH);
        ctx.lineTo(cx + baseW, baseY);
        ctx.closePath();
        ctx.clip();

        // Alternating layers (lava + pyroclastic)
        const numLayers = 20;
        for (let i = 0; i < numLayers; i++) {
            const y = baseY - (i / numLayers) * peakH;
            const nextY = baseY - ((i + 1) / numLayers) * peakH;
            const layerW = baseW * (1 - i / numLayers);

            ctx.fillStyle = i % 2 === 0
                ? `rgba(${80 + i * 3},${50 + i * 2},${30 + i},0.9)` // lava
                : `rgba(${100 + i * 2},${90 + i * 2},${70 + i},0.9)`; // tephra
            ctx.fillRect(cx - layerW, nextY, layerW * 2, y - nextY + 1);
        }

        // Central conduit
        ctx.fillStyle = 'rgba(255,100,30,0.7)';
        ctx.fillRect(cx - 8 * scale, baseY - peakH, 16 * scale, peakH);

        // Magma chamber
        ctx.beginPath();
        ctx.ellipse(cx, baseY + 40 * scale, 60 * scale, 25 * scale, 0, 0, Math.PI * 2);
        const mgGrad = ctx.createRadialGradient(cx, baseY + 40 * scale, 0, cx, baseY + 40 * scale, 60 * scale);
        mgGrad.addColorStop(0, 'rgba(255,140,40,0.8)');
        mgGrad.addColorStop(1, 'rgba(200,60,20,0.4)');
        ctx.fillStyle = mgGrad;
        ctx.fill();

        ctx.restore();

        // Outline
        ctx.beginPath();
        ctx.moveTo(cx - baseW, baseY);
        ctx.lineTo(cx, baseY - peakH);
        ctx.lineTo(cx + baseW, baseY);
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Labels
        ctx.fillStyle = '#DDA15E';
        ctx.font = `${10 * scale}px Georgia`;
        ctx.textAlign = 'left';
        ctx.fillText('Lava layers', cx + baseW * 0.3, baseY - peakH * 0.5);
        ctx.fillText('Pyroclastic layers', cx + baseW * 0.3, baseY - peakH * 0.35);
        ctx.fillText('Central conduit', cx + 15 * scale, baseY - peakH * 0.7);
        ctx.fillText('Magma chamber', cx + 65 * scale, baseY + 45 * scale);

        // Slope angle indicator
        ctx.strokeStyle = 'rgba(221,161,94,0.6)';
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.moveTo(cx + baseW, baseY);
        ctx.lineTo(cx + baseW - 60 * scale, baseY);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillText('~30-35 deg', cx + baseW - 55 * scale, baseY - 8);
    } else {
        // External view
        ctx.beginPath();
        ctx.moveTo(cx - baseW, baseY);
        ctx.lineTo(cx - 15 * scale, baseY - peakH);
        ctx.lineTo(cx, baseY - peakH + 5 * scale);
        ctx.lineTo(cx + 15 * scale, baseY - peakH);
        ctx.lineTo(cx + baseW, baseY);
        ctx.closePath();

        const mGrad = ctx.createLinearGradient(cx, baseY - peakH, cx, baseY);
        mGrad.addColorStop(0, '#5a4a40');
        mGrad.addColorStop(0.3, '#4a3a30');
        mGrad.addColorStop(0.7, '#3d3024');
        mGrad.addColorStop(1, '#2a2018');
        ctx.fillStyle = mGrad;
        ctx.fill();

        // Snow cap
        ctx.beginPath();
        ctx.moveTo(cx - 40 * scale, baseY - peakH + 30 * scale);
        ctx.lineTo(cx - 15 * scale, baseY - peakH);
        ctx.lineTo(cx, baseY - peakH + 5 * scale);
        ctx.lineTo(cx + 15 * scale, baseY - peakH);
        ctx.lineTo(cx + 40 * scale, baseY - peakH + 30 * scale);
        ctx.closePath();
        ctx.fillStyle = 'rgba(240,240,255,0.6)';
        ctx.fill();

        // Eruption
        const ventX = cx;
        const ventY = baseY - peakH;
        for (let i = 0; i < 3; i++) {
            particles.push({
                x: ventX + (Math.random() - 0.5) * 10,
                y: ventY,
                vx: (Math.random() - 0.5) * 40,
                vy: -80 - Math.random() * 120,
                size: 2 + Math.random() * 4,
                life: 1, type: 'strato'
            });
        }
    }

    // Label
    ctx.fillStyle = '#FEFAE0';
    ctx.font = `${14 * scale}px Georgia`;
    ctx.textAlign = 'center';
    ctx.fillText('Stratovolcano', cx, baseY + 25 * scale);
    ctx.font = `${10 * scale}px Georgia`;
    ctx.fillStyle = '#8A9A5B';
    ctx.fillText('e.g., Mt. Fuji, Mt. St. Helens', cx, baseY + 42 * scale);
}

function drawShieldVolcano(cx, baseY, scale, crossSection) {
    const peakH = 60 * scale;
    const baseW = 320 * scale;

    if (crossSection) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(cx - baseW, baseY);
        ctx.quadraticCurveTo(cx - baseW * 0.5, baseY - peakH * 0.7, cx, baseY - peakH);
        ctx.quadraticCurveTo(cx + baseW * 0.5, baseY - peakH * 0.7, cx + baseW, baseY);
        ctx.closePath();
        ctx.clip();

        // Many thin lava layers
        const numLayers = 30;
        for (let i = 0; i < numLayers; i++) {
            const y = baseY - (i / numLayers) * peakH;
            const nextY = baseY - ((i + 1) / numLayers) * peakH;
            const progress = i / numLayers;
            const layerW = baseW * (1 - progress * 0.5);

            ctx.fillStyle = `rgba(${50 + i * 3},${40 + i * 2},${35 + i},0.9)`;
            ctx.fillRect(cx - layerW, nextY, layerW * 2, y - nextY + 1);

            // Thin red lines for lava flows
            ctx.strokeStyle = `rgba(180,${60 + i * 3},30,0.3)`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(cx - layerW * 0.8, nextY + (y - nextY) / 2);
            ctx.lineTo(cx + layerW * 0.8, nextY + (y - nextY) / 2);
            ctx.stroke();
        }

        // Central conduit + summit caldera
        ctx.fillStyle = 'rgba(255,100,30,0.6)';
        ctx.fillRect(cx - 12 * scale, baseY - peakH, 24 * scale, peakH);

        // Magma chamber (wider, shallower)
        ctx.beginPath();
        ctx.ellipse(cx, baseY + 30 * scale, 80 * scale, 20 * scale, 0, 0, Math.PI * 2);
        const mgGrad = ctx.createRadialGradient(cx, baseY + 30 * scale, 0, cx, baseY + 30 * scale, 80 * scale);
        mgGrad.addColorStop(0, 'rgba(255,140,40,0.7)');
        mgGrad.addColorStop(1, 'rgba(200,60,20,0.3)');
        ctx.fillStyle = mgGrad;
        ctx.fill();

        ctx.restore();

        // Outline
        ctx.beginPath();
        ctx.moveTo(cx - baseW, baseY);
        ctx.quadraticCurveTo(cx - baseW * 0.5, baseY - peakH * 0.7, cx, baseY - peakH);
        ctx.quadraticCurveTo(cx + baseW * 0.5, baseY - peakH * 0.7, cx + baseW, baseY);
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#DDA15E';
        ctx.font = `${10 * scale}px Georgia`;
        ctx.textAlign = 'left';
        ctx.fillText('Thin basalt flows', cx + baseW * 0.3, baseY - peakH * 0.3);
        ctx.fillText('Summit caldera', cx + 15 * scale, baseY - peakH - 10);
        ctx.fillText('~5-10 deg slope', cx + baseW * 0.5, baseY - 8);
    } else {
        ctx.beginPath();
        ctx.moveTo(cx - baseW, baseY);
        ctx.quadraticCurveTo(cx - baseW * 0.5, baseY - peakH * 0.7, cx - 20 * scale, baseY - peakH);
        ctx.lineTo(cx + 20 * scale, baseY - peakH);
        ctx.quadraticCurveTo(cx + baseW * 0.5, baseY - peakH * 0.7, cx + baseW, baseY);
        ctx.closePath();

        const sGrad = ctx.createLinearGradient(cx, baseY - peakH, cx, baseY);
        sGrad.addColorStop(0, '#3a3030');
        sGrad.addColorStop(0.5, '#352a25');
        sGrad.addColorStop(1, '#2a2018');
        ctx.fillStyle = sGrad;
        ctx.fill();

        // Lava flows on flanks
        ctx.strokeStyle = 'rgba(255,100,30,0.3)';
        ctx.lineWidth = 2;
        for (let i = 0; i < 5; i++) {
            const startX = cx + (Math.random() - 0.5) * 20 * scale;
            const startY = baseY - peakH + 5 * scale;
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            let x = startX;
            let y = startY;
            for (let j = 0; j < 10; j++) {
                x += (Math.random() - 0.3 + i * 0.1) * 30 * scale;
                y += 5 * scale;
                ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        // Lava fountain
        for (let i = 0; i < 2; i++) {
            particles.push({
                x: cx + (Math.random() - 0.5) * 15,
                y: baseY - peakH,
                vx: (Math.random() - 0.5) * 15,
                vy: -20 - Math.random() * 40,
                size: 2 + Math.random() * 3,
                life: 1, type: 'shield'
            });
        }
    }

    ctx.fillStyle = '#FEFAE0';
    ctx.font = `${14 * scale}px Georgia`;
    ctx.textAlign = 'center';
    ctx.fillText('Shield Volcano', cx, baseY + 25 * scale);
    ctx.font = `${10 * scale}px Georgia`;
    ctx.fillStyle = '#8A9A5B';
    ctx.fillText('e.g., Mauna Loa, Kilauea', cx, baseY + 42 * scale);
}

let lastTime = 0;
function animate(ts) {
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;
    time += dt;

    // Update particles
    for (let p of particles) {
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += (p.type === 'strato' ? 60 : 40) * dt;
        p.life -= 0.02;
    }
    particles = particles.filter(p => p.life > 0);
    if (particles.length > 300) particles.splice(0, particles.length - 300);

    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(254,250,224,0.3)';
    for (let i = 0; i < 50; i++) {
        ctx.fillRect((i * 137.5 + 50) % W, (i * 73.1 + 20) % (H * 0.4), 1, 1);
    }

    const baseY = H * 0.65;
    const isCross = mode === 'cross';

    if (mode === 'both' || mode === 'strato' || mode === 'cross') {
        const cx = mode === 'both' || mode === 'cross' ? W * 0.3 : W * 0.5;
        const scale = mode === 'both' || mode === 'cross' ? 0.85 : 1.1;
        drawStratovolcano(cx, baseY, scale, isCross);
    }

    if (mode === 'both' || mode === 'shield' || mode === 'cross') {
        const cx = mode === 'both' || mode === 'cross' ? W * 0.72 : W * 0.5;
        const scale = mode === 'both' || mode === 'cross' ? 0.7 : 1.0;
        drawShieldVolcano(cx, baseY + (mode === 'both' || mode === 'cross' ? 50 : 0), scale, isCross);
    }

    // Draw particles
    for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        if (p.type === 'strato') {
            ctx.fillStyle = `rgba(255,${Math.floor(80 + p.life * 100)},30,${p.life * 0.7})`;
        } else {
            ctx.fillStyle = `rgba(255,${Math.floor(140 + p.life * 60)},40,${p.life * 0.6})`;
        }
        ctx.fill();
    }

    // Comparison table when in both mode
    if (mode === 'both') {
        const tableX = W * 0.5;
        const tableY = H * 0.12;
        ctx.fillStyle = '#DDA15E';
        ctx.font = '13px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Stratovolcano', tableX - 100, tableY);
        ctx.fillText('vs', tableX, tableY);
        ctx.fillText('Shield Volcano', tableX + 100, tableY);

        ctx.font = '11px Georgia';
        ctx.fillStyle = '#FEFAE0';
        const rows = [
            ['Slope: 30-35 deg', 'Slope: 5-10 deg'],
            ['Viscous magma', 'Fluid magma'],
            ['Explosive', 'Effusive'],
            ['Ash + lava layers', 'Basalt flows'],
        ];
        rows.forEach((row, i) => {
            ctx.fillStyle = 'rgba(254,250,224,0.7)';
            ctx.fillText(row[0], tableX - 100, tableY + 22 + i * 18);
            ctx.fillText(row[1], tableX + 100, tableY + 22 + i * 18);
        });
    }

    requestAnimationFrame(animate);
}

window.reset = function() {
    mode = 'both';
    particles = [];
    time = 0;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btnBoth').classList.add('active');
};

requestAnimationFrame(animate);
</script>
<script src="../assets/js/enhance.js" defer></script>
</body>
</html>
