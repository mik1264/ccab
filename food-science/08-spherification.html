<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spherification - Food Science</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        canvas { display: block; cursor: pointer; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 16px 24px; display: flex; gap: 20px;
            align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .control-group label { font-size: 0.7rem; color: #8A9A5B; text-transform: uppercase; letter-spacing: 1px; }
        .control-group .value { font-size: 0.85rem; color: #DDA15E; font-weight: bold; }
        input[type="range"] { width: 110px; accent-color: #8A9A5B; }
        select {
            background: #333; color: #FEFAE0; border: 1px solid #606C38;
            padding: 4px 8px; border-radius: 6px; font-size: 0.8rem;
        }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 12px 16px;
            font-size: 0.75rem; color: #FEFAE0; max-width: 260px; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Spherification</h3>
        <p>Sodium alginate + calcium chloride creates a gel membrane around liquid droplets. Click anywhere in the calcium bath to drop spheres! The gel thickens over time as calcium ions cross-link the alginate chains.</p>
    </div>
    <div class="controls">
        <div class="control-group">
            <label>Alginate %</label>
            <input type="range" id="alginate" min="0.2" max="2" value="1" step="0.1">
            <span class="value" id="algVal">1.0%</span>
        </div>
        <div class="control-group">
            <label>Calcium %</label>
            <input type="range" id="calcium" min="0.2" max="2" value="0.5" step="0.1">
            <span class="value" id="calVal">0.5%</span>
        </div>
        <div class="control-group">
            <label>Flavor</label>
            <select id="flavor">
                <option value="mango">Mango</option>
                <option value="raspberry">Raspberry</option>
                <option value="melon">Melon</option>
                <option value="balsamic">Balsamic</option>
                <option value="olive">Olive Oil</option>
            </select>
        </div>
        <div class="control-group">
            <label>Drop Size</label>
            <input type="range" id="dropSize" min="5" max="40" value="15">
            <span class="value" id="sizeVal">15</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        const flavorColors = {
            mango: { fill: 'rgba(255, 180, 30, 0.7)', stroke: '#ffaa00', inner: '#ff9500' },
            raspberry: { fill: 'rgba(200, 30, 60, 0.7)', stroke: '#cc1133', inner: '#aa0033' },
            melon: { fill: 'rgba(140, 220, 80, 0.7)', stroke: '#88cc44', inner: '#66aa22' },
            balsamic: { fill: 'rgba(60, 20, 10, 0.8)', stroke: '#551100', inner: '#330800' },
            olive: { fill: 'rgba(180, 200, 50, 0.6)', stroke: '#99aa22', inner: '#778800' }
        };

        let spheres = [];
        let ripples = [];
        let time = 0;

        class Sphere {
            constructor(x, y, r) {
                this.x = x;
                this.y = y;
                this.r = r;
                this.vy = 2 + Math.random();
                this.vx = (Math.random() - 0.5) * 0.5;
                this.gelThickness = 0;
                this.age = 0;
                this.wobblePhase = Math.random() * Math.PI * 2;
                this.flavor = document.getElementById('flavor').value;
                this.settled = false;
                this.alginate = parseFloat(document.getElementById('alginate').value);
                this.calcium = parseFloat(document.getElementById('calcium').value);
            }

            update() {
                this.age++;
                this.wobblePhase += 0.03;

                // Gelation: calcium ions cross-link alginate
                const gelRate = this.alginate * this.calcium * 0.003;
                this.gelThickness = Math.min(1, this.gelThickness + gelRate);

                // Physics
                if (!this.settled) {
                    this.vy += 0.02; // gravity
                    this.vy *= 0.99; // drag
                    this.vx *= 0.98;
                    this.y += this.vy;
                    this.x += this.vx;

                    // Bounce off walls
                    if (this.x - this.r < 0) { this.x = this.r; this.vx *= -0.5; }
                    if (this.x + this.r > W) { this.x = W - this.r; this.vx *= -0.5; }

                    // Settle on bottom or on other spheres
                    if (this.y + this.r > H - 80) {
                        this.y = H - 80 - this.r;
                        this.vy *= -0.3;
                        if (Math.abs(this.vy) < 0.5) this.settled = true;
                    }

                    // Collide with other spheres
                    for (let s of spheres) {
                        if (s === this) continue;
                        const dx = this.x - s.x;
                        const dy = this.y - s.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = this.r + s.r;
                        if (dist < minDist && dist > 0) {
                            const nx = dx / dist;
                            const ny = dy / dist;
                            const overlap = minDist - dist;
                            this.x += nx * overlap * 0.3;
                            this.y += ny * overlap * 0.3;
                            this.vx += nx * 0.2;
                            this.vy += ny * 0.2;
                        }
                    }
                }
            }

            draw() {
                const fc = flavorColors[this.flavor];
                const wobble = Math.sin(this.wobblePhase) * (1 - this.gelThickness) * 2;

                ctx.save();
                ctx.translate(this.x, this.y);

                // Gel membrane
                if (this.gelThickness > 0.05) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.r + 2 + this.gelThickness * 3, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.2 + this.gelThickness * 0.4})`;
                    ctx.lineWidth = 1 + this.gelThickness * 3;
                    ctx.stroke();
                }

                // Inner liquid
                const grad = ctx.createRadialGradient(-this.r * 0.2 + wobble, -this.r * 0.2, 0, 0, 0, this.r);
                grad.addColorStop(0, fc.fill.replace('0.7', '0.9').replace('0.8', '1').replace('0.6', '0.8'));
                grad.addColorStop(0.7, fc.fill);
                grad.addColorStop(1, fc.inner);
                ctx.beginPath();

                // Slightly wobbly shape when not fully gelled
                if (this.gelThickness < 0.8) {
                    const points = 20;
                    for (let i = 0; i <= points; i++) {
                        const a = (Math.PI * 2 * i) / points;
                        const rr = this.r + Math.sin(a * 3 + this.wobblePhase) * wobble;
                        if (i === 0) ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
                        else ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
                    }
                } else {
                    ctx.arc(0, 0, this.r, 0, Math.PI * 2);
                }
                ctx.fillStyle = grad;
                ctx.fill();

                // Specular highlight
                ctx.beginPath();
                ctx.arc(-this.r * 0.25, -this.r * 0.3, this.r * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.25)';
                ctx.fill();

                // Small highlight
                ctx.beginPath();
                ctx.arc(-this.r * 0.1, -this.r * 0.15, this.r * 0.12, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fill();

                ctx.restore();

                // Calcium ion interaction visualization
                if (this.gelThickness < 0.8 && this.age < 200) {
                    const ionCount = Math.floor(5 * (1 - this.gelThickness));
                    for (let i = 0; i < ionCount; i++) {
                        const angle = (Math.PI * 2 * i) / ionCount + time * 0.02;
                        const dist = this.r + 5 + Math.sin(time * 0.05 + i) * 5;
                        const ix = this.x + Math.cos(angle) * dist;
                        const iy = this.y + Math.sin(angle) * dist;
                        ctx.beginPath();
                        ctx.arc(ix, iy, 1.5, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(100, 200, 255, ${0.5 * (1 - this.gelThickness)})`;
                        ctx.fill();
                    }
                }
            }
        }

        // Click to drop sphere
        canvas.addEventListener('click', (e) => {
            const r = parseInt(document.getElementById('dropSize').value);
            const s = new Sphere(e.clientX, Math.min(e.clientY, H * 0.3), r);
            spheres.push(s);
            ripples.push({ x: e.clientX, y: Math.min(e.clientY, H * 0.3) + r, r: r, life: 1 });
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const r = parseInt(document.getElementById('dropSize').value);
            const s = new Sphere(touch.clientX, Math.min(touch.clientY, H * 0.3), r);
            spheres.push(s);
        });

        function drawBath() {
            // Calcium chloride bath
            const bathGrad = ctx.createLinearGradient(0, 0, 0, H);
            bathGrad.addColorStop(0, '#e8f0f8');
            bathGrad.addColorStop(0.2, '#d0e0f0');
            bathGrad.addColorStop(1, '#b0c8e0');
            ctx.fillStyle = bathGrad;
            ctx.fillRect(0, 0, W, H);

            // Subtle dissolved calcium visual
            ctx.globalAlpha = 0.03;
            for (let i = 0; i < 50; i++) {
                const px = (time * 0.1 + i * 137) % W;
                const py = (time * 0.05 + i * 97) % H;
                ctx.beginPath();
                ctx.arc(px, py, 1, 0, Math.PI * 2);
                ctx.fillStyle = '#6699cc';
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Dropper/pipette at top
            ctx.fillStyle = 'rgba(200, 200, 200, 0.3)';
            ctx.fillRect(W / 2 - 3, 0, 6, 30);
            ctx.beginPath();
            ctx.arc(W / 2, 30, 4, 0, Math.PI);
            ctx.fill();

            // Instructions
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.font = '14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Click to drop spheres into the calcium bath', W / 2, 60);
            ctx.textAlign = 'left';
        }

        function animate() {
            time++;

            document.getElementById('algVal').textContent = parseFloat(document.getElementById('alginate').value).toFixed(1) + '%';
            document.getElementById('calVal').textContent = parseFloat(document.getElementById('calcium').value).toFixed(1) + '%';
            document.getElementById('sizeVal').textContent = document.getElementById('dropSize').value;

            drawBath();

            // Ripples
            for (let i = ripples.length - 1; i >= 0; i--) {
                const rp = ripples[i];
                rp.r += 1;
                rp.life -= 0.02;
                if (rp.life <= 0) { ripples.splice(i, 1); continue; }
                ctx.beginPath();
                ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255,255,255,${rp.life * 0.3})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            for (let s of spheres) {
                s.update();
                s.draw();
            }

            // Limit sphere count
            if (spheres.length > 100) {
                spheres.splice(0, spheres.length - 100);
            }

            // Stats
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(10, H - 70, 130, 30);
            ctx.fillStyle = '#FEFAE0';
            ctx.font = '11px monospace';
            ctx.fillText(`Spheres: ${spheres.length}`, 20, H - 50);

            requestAnimationFrame(animate);
        }

        window.reset = function() {
            spheres = [];
            ripples = [];
            time = 0;
        };

        animate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
