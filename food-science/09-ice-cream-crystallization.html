<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream Crystallization - Food Science</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 16px 24px; display: flex; gap: 20px;
            align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .control-group label { font-size: 0.7rem; color: #8A9A5B; text-transform: uppercase; letter-spacing: 1px; }
        .control-group .value { font-size: 0.85rem; color: #DDA15E; font-weight: bold; }
        input[type="range"] { width: 110px; accent-color: #8A9A5B; }
        button {
            background: #606C38; color: #FEFAE0; border: none; padding: 8px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        button:hover { background: #8A9A5B; }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 12px 16px;
            font-size: 0.75rem; color: #FEFAE0; max-width: 270px; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.85rem; }
        .meter { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
        .meter-label { font-size: 0.65rem; color: #8A9A5B; width: 60px; }
        .meter-bar { flex: 1; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .meter-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Ice Cream Crystallization</h3>
        <p>Sugar depresses the freezing point. Churning incorporates air (overrun) and keeps ice crystals small. Fast freezing = smaller crystals = smoother texture.</p>
        <div class="meter">
            <span class="meter-label">Ice %</span>
            <div class="meter-bar"><div class="meter-fill" id="iceBar" style="width:0%;background:#a0d0ff"></div></div>
        </div>
        <div class="meter">
            <span class="meter-label">Overrun</span>
            <div class="meter-bar"><div class="meter-fill" id="airBar" style="width:0%;background:#fff"></div></div>
        </div>
        <div class="meter">
            <span class="meter-label">Smoothness</span>
            <div class="meter-bar"><div class="meter-fill" id="smoothBar" style="width:50%;background:#DDA15E"></div></div>
        </div>
    </div>
    <div class="controls">
        <div class="control-group">
            <label>Temperature</label>
            <input type="range" id="temp" min="-30" max="10" value="5">
            <span class="value" id="tempVal">5&deg;C</span>
        </div>
        <div class="control-group">
            <label>Sugar %</label>
            <input type="range" id="sugar" min="5" max="25" value="15">
            <span class="value" id="sugarVal">15%</span>
        </div>
        <div class="control-group">
            <label>Fat %</label>
            <input type="range" id="fat" min="5" max="20" value="12">
            <span class="value" id="fatVal">12%</span>
        </div>
        <div class="control-group">
            <label>Churning</label>
            <input type="range" id="churn" min="0" max="1" value="0.5" step="0.05">
            <span class="value" id="churnVal">0.50</span>
        </div>
        <button id="scoopBtn">Scoop!</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        let iceCrystals = [];
        let airBubbles = [];
        let fatGlobules = [];
        let icePercent = 0;
        let overrun = 0;
        let avgCrystalSize = 0;
        let time = 0;

        class IceCrystal {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 1;
                this.maxSize = 3 + Math.random() * 20;
                this.branches = [];
                this.angle = Math.random() * Math.PI * 2;
                this.growthRate = 0.5 + Math.random() * 0.5;

                // Generate 6-fold symmetry branches
                for (let i = 0; i < 6; i++) {
                    this.branches.push({
                        angle: this.angle + (Math.PI * 2 * i) / 6,
                        length: 0,
                        subBranches: Math.random() > 0.5
                    });
                }
            }

            update(temp, sugar, churn) {
                // Freezing point depression from sugar
                const freezingPoint = -sugar * 0.1 - 2;

                if (temp < freezingPoint) {
                    const supercooling = freezingPoint - temp;
                    const growRate = supercooling * 0.01 * this.growthRate;
                    this.size = Math.min(this.maxSize, this.size + growRate);

                    for (let b of this.branches) {
                        b.length = Math.min(this.size * 0.8, b.length + growRate * 0.8);
                    }
                }

                // Churning breaks crystals
                if (churn > 0.3 && this.size > 5) {
                    if (Math.random() < churn * 0.005) {
                        this.size *= 0.5;
                        this.maxSize *= 0.7;
                        for (let b of this.branches) b.length *= 0.5;
                    }
                }

                // Drift with churning
                this.x += Math.sin(time * 0.01 + this.y * 0.005) * churn * 2;
                this.y += Math.cos(time * 0.01 + this.x * 0.005) * churn * 2;

                if (this.x < 0) this.x = W;
                if (this.x > W) this.x = 0;
                if (this.y < 0) this.y = H;
                if (this.y > H) this.y = 0;
            }

            draw() {
                if (this.size < 1) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Crystal body
                ctx.fillStyle = `rgba(200, 230, 255, ${0.3 + this.size / this.maxSize * 0.4})`;
                ctx.beginPath();

                // Hexagonal crystal
                for (let i = 0; i < 6; i++) {
                    const a = (Math.PI * 2 * i) / 6;
                    const px = Math.cos(a) * this.size;
                    const py = Math.sin(a) * this.size;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();

                // Branches (dendrites)
                ctx.strokeStyle = `rgba(180, 220, 255, ${0.5 + this.size / this.maxSize * 0.3})`;
                ctx.lineWidth = Math.max(0.5, this.size / 10);

                for (let b of this.branches) {
                    if (b.length < 2) continue;
                    const ex = Math.cos(b.angle - this.angle) * b.length;
                    const ey = Math.sin(b.angle - this.angle) * b.length;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(ex, ey);
                    ctx.stroke();

                    if (b.subBranches && b.length > 5) {
                        const mid = 0.6;
                        const mx = ex * mid, my = ey * mid;
                        const subLen = b.length * 0.3;
                        const perpAngle = b.angle - this.angle + Math.PI / 3;
                        ctx.beginPath();
                        ctx.moveTo(mx, my);
                        ctx.lineTo(mx + Math.cos(perpAngle) * subLen, my + Math.sin(perpAngle) * subLen);
                        ctx.moveTo(mx, my);
                        ctx.lineTo(mx + Math.cos(perpAngle + Math.PI * 2 / 3) * subLen, my + Math.sin(perpAngle + Math.PI * 2 / 3) * subLen);
                        ctx.stroke();
                    }
                }

                ctx.restore();
            }
        }

        function init() {
            iceCrystals = [];
            airBubbles = [];
            fatGlobules = [];
            icePercent = 0;
            overrun = 0;
            time = 0;

            // Fat globules
            for (let i = 0; i < 60; i++) {
                fatGlobules.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: 2 + Math.random() * 4,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3
                });
            }
        }
        init();

        document.getElementById('scoopBtn').addEventListener('click', () => {
            // Visual scoop effect
            const cx = W / 2;
            const cy = H / 2;
            // Remove crystals near center
            iceCrystals = iceCrystals.filter(c => {
                const dx = c.x - cx;
                const dy = c.y - cy;
                return Math.sqrt(dx * dx + dy * dy) > 80;
            });
        });

        function animate() {
            time++;
            const temp = parseInt(document.getElementById('temp').value);
            const sugar = parseInt(document.getElementById('sugar').value);
            const fat = parseInt(document.getElementById('fat').value);
            const churn = parseFloat(document.getElementById('churn').value);

            document.getElementById('tempVal').innerHTML = temp + '&deg;C';
            document.getElementById('sugarVal').textContent = sugar + '%';
            document.getElementById('fatVal').textContent = fat + '%';
            document.getElementById('churnVal').textContent = churn.toFixed(2);

            const freezingPoint = -sugar * 0.1 - 2;

            // Nucleation
            if (temp < freezingPoint && Math.random() < 0.02 * (freezingPoint - temp) / 10) {
                if (iceCrystals.length < 300) {
                    iceCrystals.push(new IceCrystal(Math.random() * W, Math.random() * H));
                }
            }

            // Air incorporation from churning
            if (churn > 0.2 && Math.random() < churn * 0.1) {
                if (airBubbles.length < 200) {
                    airBubbles.push({
                        x: Math.random() * W,
                        y: Math.random() * H,
                        r: 1 + Math.random() * 8 * (1 - churn * 0.5), // Faster churn = smaller bubbles
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }

            // Calculate metrics
            let totalSize = 0;
            for (let c of iceCrystals) totalSize += c.size;
            avgCrystalSize = iceCrystals.length > 0 ? totalSize / iceCrystals.length : 0;
            icePercent = Math.min(100, iceCrystals.length * avgCrystalSize * 0.05);
            overrun = Math.min(100, airBubbles.length * 0.5);

            document.getElementById('iceBar').style.width = icePercent + '%';
            document.getElementById('airBar').style.width = overrun + '%';

            // Smoothness: small crystals + air = smooth
            const smoothness = Math.max(0, 100 - avgCrystalSize * 5 + overrun * 0.3);
            document.getElementById('smoothBar').style.width = Math.min(100, smoothness) + '%';

            // Background: cream base
            const baseColor = temp > 0 ? '#fff8e8' : '#e8eef8';
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, W, H);

            // Ice cream mix color based on fat
            const mixAlpha = 0.15 + fat * 0.01;
            ctx.fillStyle = `rgba(255, 248, 220, ${mixAlpha})`;
            ctx.fillRect(0, 0, W, H);

            // Fat globules
            for (let f of fatGlobules) {
                f.x += f.vx + Math.sin(time * 0.01) * churn * 0.5;
                f.y += f.vy + Math.cos(time * 0.01) * churn * 0.5;
                if (f.x < 0) f.x = W;
                if (f.x > W) f.x = 0;
                if (f.y < 0) f.y = H;
                if (f.y > H) f.y = 0;

                ctx.beginPath();
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 245, 200, 0.3)';
                ctx.fill();
            }

            // Air bubbles
            for (let b of airBubbles) {
                b.phase += 0.02;
                b.x += Math.sin(time * 0.005 + b.phase) * churn;
                b.y += Math.cos(time * 0.005 + b.phase) * churn;
                if (b.x < 0) b.x = W;
                if (b.x > W) b.x = 0;
                if (b.y < 0) b.y = H;
                if (b.y > H) b.y = 0;

                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }

            // Ice crystals
            for (let c of iceCrystals) {
                c.update(temp, sugar, churn);
                c.draw();
            }

            // Melt crystals if warm
            if (temp > freezingPoint + 2) {
                for (let c of iceCrystals) {
                    c.size -= 0.1;
                }
                iceCrystals = iceCrystals.filter(c => c.size > 0.5);
            }

            // Info overlay
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(10, 10, 200, 50);
            ctx.font = '11px monospace';
            ctx.fillStyle = '#DDA15E';
            ctx.fillText(`Freezing pt: ${freezingPoint.toFixed(1)}\u00B0C`, 20, 28);
            ctx.fillText(`Crystals: ${iceCrystals.length} | Avg: ${avgCrystalSize.toFixed(1)}px`, 20, 42);
            const texture = avgCrystalSize < 5 ? 'Smooth' : avgCrystalSize < 12 ? 'Creamy' : 'Icy/Grainy';
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText(`Texture: ${texture}`, 20, 56);

            requestAnimationFrame(animate);
        }

        window.reset = function() { init(); };

        animate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
