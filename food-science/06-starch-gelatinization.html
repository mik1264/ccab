<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starch Gelatinization - Food Science</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 16px 24px; display: flex; gap: 20px;
            align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .control-group label { font-size: 0.7rem; color: #8A9A5B; text-transform: uppercase; letter-spacing: 1px; }
        .control-group .value { font-size: 0.85rem; color: #DDA15E; font-weight: bold; }
        input[type="range"] { width: 120px; accent-color: #8A9A5B; }
        select {
            background: #333; color: #FEFAE0; border: 1px solid #606C38;
            padding: 4px 8px; border-radius: 6px; font-size: 0.8rem;
        }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 12px 16px;
            font-size: 0.75rem; color: #FEFAE0; max-width: 260px; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.85rem; }
        .viscosity-bar {
            width: 100%; height: 8px; background: #333; border-radius: 4px; margin-top: 8px; overflow: hidden;
        }
        .viscosity-fill { height: 100%; background: linear-gradient(90deg, #606C38, #DDA15E); border-radius: 4px; transition: width 0.3s; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Starch Gelatinization</h3>
        <p>Starch granules swell and absorb water when heated. Amylose leaches out, increasing viscosity. Different starches gelatinize at different temperatures.</p>
        <div style="margin-top:8px; font-size:0.65rem; color:#8A9A5B;">Viscosity</div>
        <div class="viscosity-bar"><div class="viscosity-fill" id="viscBar" style="width:5%"></div></div>
        <div id="viscText" style="font-size:0.7rem; color:#DDA15E; margin-top:4px;">Low</div>
    </div>
    <div class="controls">
        <div class="control-group">
            <label>Temperature</label>
            <input type="range" id="temp" min="20" max="100" value="30">
            <span class="value" id="tempVal">30&deg;C</span>
        </div>
        <div class="control-group">
            <label>Starch Type</label>
            <select id="starchType">
                <option value="corn">Corn (62-72&deg;C)</option>
                <option value="potato">Potato (56-66&deg;C)</option>
                <option value="rice">Rice (68-78&deg;C)</option>
                <option value="tapioca">Tapioca (52-64&deg;C)</option>
            </select>
        </div>
        <div class="control-group">
            <label>Concentration</label>
            <input type="range" id="conc" min="1" max="10" value="5">
            <span class="value" id="concVal">5%</span>
        </div>
        <div class="control-group">
            <label>Stir Speed</label>
            <input type="range" id="stir" min="0" max="1" value="0.3" step="0.05">
            <span class="value" id="stirVal">0.30</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        const starchData = {
            corn: { gelStart: 62, gelEnd: 72, amylose: 0.28, color: '#f5e6b8' },
            potato: { gelStart: 56, gelEnd: 66, amylose: 0.21, color: '#e8dcc8' },
            rice: { gelStart: 68, gelEnd: 78, amylose: 0.22, color: '#f0ece0' },
            tapioca: { gelStart: 52, gelEnd: 64, amylose: 0.17, color: '#f8f2e8' }
        };

        let granules = [];
        let amyloseChains = [];
        let time = 0;
        let viscosity = 0;

        class Granule {
            constructor() {
                this.x = Math.random() * W;
                this.y = H * 0.3 + Math.random() * H * 0.5;
                this.baseR = 6 + Math.random() * 8;
                this.r = this.baseR;
                this.swelling = 0; // 0 = native, 1 = fully swollen
                this.burst = false;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.phase = Math.random() * Math.PI * 2;
                this.rings = 3 + Math.floor(Math.random() * 3);
            }

            update(temp, starch, stir) {
                const gelStart = starch.gelStart;
                const gelEnd = starch.gelEnd;

                // Swelling
                if (temp > gelStart && !this.burst) {
                    const progress = Math.min(1, (temp - gelStart) / (gelEnd - gelStart));
                    this.swelling = Math.min(1, this.swelling + progress * 0.005);
                    this.r = this.baseR * (1 + this.swelling * 2.5);
                }

                // Burst at high swelling
                if (this.swelling > 0.9 && !this.burst && Math.random() < 0.002) {
                    this.burst = true;
                    // Release amylose chains
                    for (let i = 0; i < 3; i++) {
                        amyloseChains.push(new AmyloseChain(this.x, this.y));
                    }
                }

                // Movement
                const brownian = (temp / 50) * 0.3;
                this.vx += (Math.random() - 0.5) * brownian + stir * Math.sin(time * 0.01) * 0.2;
                this.vy += (Math.random() - 0.5) * brownian + 0.02; // slight sinking
                this.vx *= 0.97;
                this.vy *= 0.97;
                this.x += this.vx;
                this.y += this.vy;

                this.phase += 0.01;

                if (this.x < 0) this.x = W;
                if (this.x > W) this.x = 0;
                if (this.y < H * 0.2) { this.y = H * 0.2; this.vy *= -0.5; }
                if (this.y > H * 0.9) { this.y = H * 0.9; this.vy *= -0.5; }
            }

            draw(starch) {
                ctx.save();
                ctx.translate(this.x, this.y);

                if (this.burst) {
                    // Burst granule - irregular shape
                    ctx.globalAlpha = 0.4;
                    ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        const a = (Math.PI * 2 * i) / 8;
                        const rr = this.r * (0.5 + Math.sin(i * 3.7 + this.phase) * 0.3);
                        if (i === 0) ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
                        else ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
                    }
                    ctx.closePath();
                    ctx.fillStyle = starch.color;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                } else {
                    // Normal granule with concentric rings
                    const alpha = 0.4 + (1 - this.swelling) * 0.4;
                    ctx.globalAlpha = alpha;

                    // Outer
                    ctx.beginPath();
                    ctx.arc(0, 0, this.r, 0, Math.PI * 2);
                    ctx.fillStyle = starch.color;
                    ctx.fill();

                    // Growth rings (crystalline structure)
                    for (let ring = 1; ring <= this.rings; ring++) {
                        const ringR = (this.r * ring) / (this.rings + 1);
                        ctx.beginPath();
                        ctx.arc(0, 0, ringR, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(180, 160, 120, ${(1 - this.swelling) * 0.5})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }

                    // Hilum (center cross)
                    if (this.swelling < 0.5) {
                        const crossSize = this.baseR * 0.4;
                        ctx.strokeStyle = `rgba(120, 100, 70, ${(1 - this.swelling * 2) * 0.6})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(-crossSize, 0); ctx.lineTo(crossSize, 0);
                        ctx.moveTo(0, -crossSize); ctx.lineTo(0, crossSize);
                        ctx.stroke();
                    }

                    // Swelling glow
                    if (this.swelling > 0.3) {
                        ctx.beginPath();
                        ctx.arc(0, 0, this.r + 3, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(200, 220, 255, ${this.swelling * 0.3})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }

                ctx.restore();
            }
        }

        class AmyloseChain {
            constructor(x, y) {
                this.points = [];
                const segments = 15 + Math.floor(Math.random() * 10);
                let cx = x, cy = y;
                for (let i = 0; i < segments; i++) {
                    this.points.push({ x: cx, y: cy });
                    cx += (Math.random() - 0.5) * 12;
                    cy += (Math.random() - 0.5) * 12;
                }
                this.life = 1;
            }

            update(stir) {
                for (let p of this.points) {
                    p.x += (Math.random() - 0.5) * 1.5 + stir * Math.sin(time * 0.01) * 0.5;
                    p.y += (Math.random() - 0.5) * 1.5;
                }
                // Diffuse slowly
                this.life -= 0.0002;
            }

            draw() {
                if (this.life <= 0) return;
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                ctx.strokeStyle = `rgba(180, 200, 140, ${this.life * 0.6})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        function init() {
            granules = [];
            amyloseChains = [];
            viscosity = 0;
            time = 0;
            const conc = parseInt(document.getElementById('conc').value);
            const count = 30 + conc * 15;
            for (let i = 0; i < count; i++) {
                granules.push(new Granule());
            }
        }
        init();

        document.getElementById('starchType').addEventListener('change', init);
        document.getElementById('conc').addEventListener('input', init);

        function animate() {
            time++;
            const temp = parseFloat(document.getElementById('temp').value);
            const stir = parseFloat(document.getElementById('stir').value);
            const starchKey = document.getElementById('starchType').value;
            const starch = starchData[starchKey];
            const conc = parseInt(document.getElementById('conc').value);

            document.getElementById('tempVal').innerHTML = temp + '&deg;C';
            document.getElementById('concVal').textContent = conc + '%';
            document.getElementById('stirVal').textContent = stir.toFixed(2);

            // Calculate viscosity
            let swellSum = 0;
            let burstCount = 0;
            for (let g of granules) {
                swellSum += g.swelling;
                if (g.burst) burstCount++;
            }
            const avgSwell = swellSum / granules.length;
            viscosity = avgSwell * (conc / 5) * (1 + amyloseChains.length * 0.01);
            viscosity = Math.min(1, viscosity);

            document.getElementById('viscBar').style.width = (viscosity * 100) + '%';
            const viscLabel = viscosity < 0.2 ? 'Low' : viscosity < 0.5 ? 'Medium' : viscosity < 0.8 ? 'High' : 'Very High';
            document.getElementById('viscText').textContent = viscLabel;

            // Background: water/solution
            const waterAlpha = 1 - viscosity * 0.3;
            const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
            bgGrad.addColorStop(0, '#e0e8f0');
            bgGrad.addColorStop(0.3, `rgba(200, 210, 225, ${waterAlpha})`);
            bgGrad.addColorStop(1, `rgba(${180 + viscosity * 40}, ${190 + viscosity * 30}, ${200 - viscosity * 50}, 1)`);
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);

            // Viscosity visual: slower flow lines when thick
            ctx.globalAlpha = 0.06;
            const flowSpeed = 1 - viscosity * 0.8;
            for (let i = 0; i < 15; i++) {
                const ly = (time * flowSpeed * 0.5 + i * H / 15) % H;
                ctx.beginPath();
                for (let x = 0; x < W; x += 20) {
                    const yOff = Math.sin(x * 0.01 + time * 0.005 * flowSpeed) * (10 + viscosity * 30);
                    if (x === 0) ctx.moveTo(x, ly + yOff);
                    else ctx.lineTo(x, ly + yOff);
                }
                ctx.strokeStyle = '#aabbcc';
                ctx.lineWidth = 2 + viscosity * 4;
                ctx.stroke();
            }
            ctx.globalAlpha = 1;

            // Update and draw amylose chains
            for (let c of amyloseChains) {
                c.update(stir);
                c.draw();
            }
            amyloseChains = amyloseChains.filter(c => c.life > 0);

            // Update and draw granules
            for (let g of granules) {
                g.update(temp, starch, stir);
                g.draw(starch);
            }

            // Temp indicator
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(10, H - 70, 150, 30);
            ctx.fillStyle = '#DDA15E';
            ctx.font = '12px monospace';
            const gelPhase = temp < starch.gelStart ? 'Pre-gel' : temp < starch.gelEnd ? 'Gelatinizing' : 'Post-gel';
            ctx.fillText(`${gelPhase} | Burst: ${burstCount}`, 20, H - 50);

            requestAnimationFrame(animate);
        }

        window.reset = function() { init(); };

        animate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
