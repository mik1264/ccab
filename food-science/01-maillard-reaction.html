<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maillard Reaction Kinetics - Food Science</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 16px 24px; display: flex; gap: 20px;
            align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .control-group label { font-size: 0.7rem; color: #8A9A5B; text-transform: uppercase; letter-spacing: 1px; }
        .control-group .value { font-size: 0.85rem; color: #DDA15E; font-weight: bold; }
        input[type="range"] { width: 120px; accent-color: #8A9A5B; }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 12px 16px;
            font-size: 0.75rem; color: #FEFAE0; max-width: 280px; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.85rem; }
        .stage-indicator { display: flex; gap: 6px; margin-top: 8px; }
        .stage { padding: 3px 8px; border-radius: 8px; font-size: 0.65rem; opacity: 0.4; transition: opacity 0.3s; }
        .stage.active { opacity: 1; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Maillard Reaction</h3>
        <p>Amino acids + reducing sugars react under heat to produce browning, flavor compounds, and aromas. Rate follows Arrhenius kinetics: k = A&middot;e<sup>-Ea/RT</sup></p>
        <div class="stage-indicator">
            <span class="stage" id="s1" style="background:#ffe0b2">Initial</span>
            <span class="stage" id="s2" style="background:#ffb74d">Amadori</span>
            <span class="stage" id="s3" style="background:#e65100;color:#fff">Advanced</span>
            <span class="stage" id="s4" style="background:#3e2723;color:#fff">Final</span>
        </div>
    </div>
    <div class="controls">
        <div class="control-group">
            <label>Temperature</label>
            <input type="range" id="temp" min="80" max="220" value="150">
            <span class="value" id="tempVal">150&deg;C</span>
        </div>
        <div class="control-group">
            <label>pH</label>
            <input type="range" id="ph" min="3" max="10" value="7" step="0.1">
            <span class="value" id="phVal">7.0</span>
        </div>
        <div class="control-group">
            <label>Sugar Conc.</label>
            <input type="range" id="sugar" min="1" max="10" value="5">
            <span class="value" id="sugarVal">5</span>
        </div>
        <div class="control-group">
            <label>Water Activity</label>
            <input type="range" id="aw" min="0.1" max="1.0" value="0.6" step="0.05">
            <span class="value" id="awVal">0.60</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const tempSlider = document.getElementById('temp');
        const phSlider = document.getElementById('ph');
        const sugarSlider = document.getElementById('sugar');
        const awSlider = document.getElementById('aw');

        // Particles represent molecules
        let particles = [];
        let browningLevel = 0;
        let time = 0;

        class Particle {
            constructor(type) {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.type = type; // 'amino', 'sugar', 'melanoidin'
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = type === 'melanoidin' ? 4 + Math.random() * 4 : 3 + Math.random() * 2;
                this.reacted = false;
                this.reactTime = 0;
                this.life = 1;
            }

            getColor() {
                if (this.type === 'amino') return `rgba(100, 180, 255, ${this.life})`;
                if (this.type === 'sugar') return `rgba(255, 224, 130, ${this.life})`;
                const b = Math.min(1, this.reactTime / 200);
                const r = Math.floor(180 - b * 120);
                const g = Math.floor(120 - b * 90);
                const bl = Math.floor(60 - b * 40);
                return `rgba(${r}, ${g}, ${bl}, ${this.life})`;
            }

            update(speed) {
                this.x += this.vx * speed;
                this.y += this.vy * speed;
                if (this.x < 0 || this.x > W) this.vx *= -1;
                if (this.y < 0 || this.y > H) this.vy *= -1;
                this.x = Math.max(0, Math.min(W, this.x));
                this.y = Math.max(0, Math.min(H, this.y));
                if (this.type === 'melanoidin') {
                    this.reactTime++;
                    this.radius = Math.min(8, this.radius + 0.002);
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.getColor();
                ctx.fill();
                if (this.type === 'melanoidin') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 2, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(221, 161, 94, 0.3)`;
                    ctx.stroke();
                }
            }
        }

        function initParticles() {
            particles = [];
            browningLevel = 0;
            time = 0;
            const count = Math.min(300, Math.floor(W * H / 4000));
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(Math.random() < 0.5 ? 'amino' : 'sugar'));
            }
        }
        initParticles();

        function getReactionRate() {
            const T = parseFloat(tempSlider.value) + 273.15;
            const ph = parseFloat(phSlider.value);
            const sugar = parseFloat(sugarSlider.value);
            const aw = parseFloat(awSlider.value);

            // Arrhenius: k = A * exp(-Ea/RT)
            const Ea = 80000; // J/mol activation energy
            const R = 8.314;
            const A = 1e10;
            const k = A * Math.exp(-Ea / (R * T));

            // pH factor: optimal around 7-9
            const phFactor = Math.exp(-0.5 * Math.pow((ph - 8) / 2, 2));

            // Water activity factor: optimal around 0.6-0.8
            const awFactor = Math.exp(-2 * Math.pow(aw - 0.7, 2));

            // Sugar concentration factor
            const sugarFactor = sugar / 5;

            return k * phFactor * awFactor * sugarFactor;
        }

        function updateStageIndicators() {
            const stages = ['s1', 's2', 's3', 's4'];
            stages.forEach(s => document.getElementById(s).classList.remove('active'));
            if (browningLevel < 0.15) document.getElementById('s1').classList.add('active');
            else if (browningLevel < 0.4) document.getElementById('s2').classList.add('active');
            else if (browningLevel < 0.7) document.getElementById('s3').classList.add('active');
            else document.getElementById('s4').classList.add('active');
        }

        // Food surface grid for browning visualization
        const gridSize = 6;
        let grid = [];

        function initGrid() {
            const cols = Math.ceil(W / gridSize);
            const rows = Math.ceil(H / gridSize);
            grid = [];
            for (let i = 0; i < rows; i++) {
                grid[i] = [];
                for (let j = 0; j < cols; j++) {
                    grid[i][j] = 0;
                }
            }
        }
        initGrid();

        function animate() {
            const rate = getReactionRate();
            const speed = 0.5 + rate * 5000;
            time++;

            // Update browning level
            browningLevel = Math.min(1, browningLevel + rate * 0.01);

            // Update display values
            document.getElementById('tempVal').innerHTML = tempSlider.value + '&deg;C';
            document.getElementById('phVal').textContent = parseFloat(phSlider.value).toFixed(1);
            document.getElementById('sugarVal').textContent = sugarSlider.value;
            document.getElementById('awVal').textContent = parseFloat(awSlider.value).toFixed(2);

            updateStageIndicators();

            // Background: food surface browning
            const bgR = Math.floor(255 - browningLevel * 195);
            const bgG = Math.floor(230 - browningLevel * 200);
            const bgB = Math.floor(200 - browningLevel * 180);
            ctx.fillStyle = `rgb(${bgR}, ${bgG}, ${bgB})`;
            ctx.fillRect(0, 0, W, H);

            // Draw browning spots near melanoidin particles
            for (let p of particles) {
                if (p.type === 'melanoidin') {
                    const gx = Math.floor(p.x / gridSize);
                    const gy = Math.floor(p.y / gridSize);
                    for (let dy = -2; dy <= 2; dy++) {
                        for (let dx = -2; dx <= 2; dx++) {
                            const ny = gy + dy, nx = gx + dx;
                            if (ny >= 0 && ny < grid.length && nx >= 0 && nx < (grid[0] || []).length) {
                                grid[ny][nx] = Math.min(1, grid[ny][nx] + 0.005 * rate * 1000);
                            }
                        }
                    }
                }
            }

            // Render browning grid
            const cols = grid[0] ? grid[0].length : 0;
            for (let i = 0; i < grid.length; i++) {
                for (let j = 0; j < cols; j++) {
                    if (grid[i][j] > 0.01) {
                        const v = grid[i][j];
                        const r = Math.floor(120 - v * 80);
                        const g = Math.floor(80 - v * 50);
                        const b = Math.floor(40 - v * 20);
                        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${v * 0.6})`;
                        ctx.fillRect(j * gridSize, i * gridSize, gridSize, gridSize);
                    }
                }
            }

            // Check reactions between amino acids and sugars
            const reactionThreshold = 20 - rate * 10000;
            for (let i = particles.length - 1; i >= 0; i--) {
                const pi = particles[i];
                if (pi.type === 'melanoidin') continue;
                for (let j = i - 1; j >= 0; j--) {
                    const pj = particles[j];
                    if (pj.type === 'melanoidin') continue;
                    if (pi.type === pj.type) continue;
                    const dx = pi.x - pj.x;
                    const dy = pi.y - pj.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < Math.max(8, reactionThreshold) && Math.random() < rate * 100) {
                        // React: create melanoidin
                        const mp = new Particle('melanoidin');
                        mp.x = (pi.x + pj.x) / 2;
                        mp.y = (pi.y + pj.y) / 2;
                        mp.vx = (pi.vx + pj.vx) / 2;
                        mp.vy = (pi.vy + pj.vy) / 2;
                        particles.splice(i, 1);
                        if (j < particles.length) particles.splice(j, 1);
                        particles.push(mp);
                        // Emit flash
                        drawFlash(mp.x, mp.y);
                        break;
                    }
                }
            }

            // Update and draw particles
            for (let p of particles) {
                p.update(speed);
                p.draw();
            }

            // Draw aroma wisps from melanoidins at high browning
            if (browningLevel > 0.3) {
                for (let p of particles) {
                    if (p.type === 'melanoidin' && Math.random() < 0.1 * browningLevel) {
                        drawWisp(p.x, p.y);
                    }
                }
            }

            // Info overlay
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(10, H - 90, 200, 40);
            ctx.fillStyle = '#DDA15E';
            ctx.font = '12px monospace';
            ctx.fillText(`Browning: ${(browningLevel * 100).toFixed(1)}%`, 20, H - 72);
            ctx.fillText(`Rate: ${(rate * 1e6).toFixed(2)} x10\u207B\u2076`, 20, H - 58);

            requestAnimationFrame(animate);
        }

        function drawFlash(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(x, y, 0, x, y, 12);
            grad.addColorStop(0, 'rgba(255, 200, 50, 0.8)');
            grad.addColorStop(1, 'rgba(255, 200, 50, 0)');
            ctx.fillStyle = grad;
            ctx.fill();
        }

        function drawWisp(x, y) {
            ctx.beginPath();
            const wispY = y - 20 - Math.random() * 30;
            ctx.moveTo(x, y);
            ctx.quadraticCurveTo(x + (Math.random() - 0.5) * 20, (y + wispY) / 2, x + (Math.random() - 0.5) * 10, wispY);
            ctx.strokeStyle = `rgba(200, 180, 160, ${0.1 + Math.random() * 0.15})`;
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        window.reset = function() {
            initParticles();
            initGrid();
            browningLevel = 0;
            time = 0;
        };

        window.addEventListener('resize', () => { initGrid(); });

        animate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
