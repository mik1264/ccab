<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bread Dough Fermentation - Food Science</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 16px 24px; display: flex; gap: 20px;
            align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .control-group label { font-size: 0.7rem; color: #8A9A5B; text-transform: uppercase; letter-spacing: 1px; }
        .control-group .value { font-size: 0.85rem; color: #DDA15E; font-weight: bold; }
        input[type="range"] { width: 110px; accent-color: #8A9A5B; }
        button {
            background: #606C38; color: #FEFAE0; border: none; padding: 8px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        button:hover { background: #8A9A5B; }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 12px 16px;
            font-size: 0.75rem; color: #FEFAE0; max-width: 260px; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Bread Dough Fermentation</h3>
        <p>Yeast consumes sugars and produces CO<sub>2</sub> gas, which gets trapped in the gluten network. Bubbles grow via diffusion. Temperature controls yeast activity (optimal ~35&deg;C, dies above 60&deg;C).</p>
    </div>
    <div class="controls">
        <div class="control-group">
            <label>Temperature</label>
            <input type="range" id="temp" min="10" max="60" value="30">
            <span class="value" id="tempVal">30&deg;C</span>
        </div>
        <div class="control-group">
            <label>Yeast Level</label>
            <input type="range" id="yeast" min="0.1" max="2" value="1" step="0.1">
            <span class="value" id="yeastVal">1.0</span>
        </div>
        <div class="control-group">
            <label>Sugar</label>
            <input type="range" id="sugar" min="1" max="10" value="5">
            <span class="value" id="sugarVal">5</span>
        </div>
        <div class="control-group">
            <label>Gluten</label>
            <input type="range" id="gluten" min="0.1" max="1" value="0.7" step="0.05">
            <span class="value" id="glutenVal">0.70</span>
        </div>
        <button id="punchBtn">Punch Down</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        let bubbles = [];
        let doughHeight = 0.6; // fraction of canvas height
        let totalGas = 0;
        let time = 0;
        let sugarRemaining = 1;

        class Bubble {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.r = 1 + Math.random() * 2;
                this.maxR = 5 + Math.random() * 25;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = -0.1 - Math.random() * 0.2;
                this.wobble = Math.random() * Math.PI * 2;
                this.popped = false;
            }

            update(co2Rate, glutenStr) {
                if (this.popped) return;
                this.r += co2Rate * 0.02;
                this.wobble += 0.02;

                // Rise slowly
                this.vy += -0.005 * (this.r / 10);
                this.vy *= 0.99;
                this.vx += Math.sin(this.wobble) * 0.01;
                this.vx *= 0.98;

                this.x += this.vx;
                this.y += this.vy;

                // Pop if too large for gluten network
                if (this.r > this.maxR * (0.5 + glutenStr * 0.5)) {
                    if (Math.random() < 0.005 * (1 - glutenStr)) {
                        this.popped = true;
                    }
                }

                // Clamp radius
                this.r = Math.min(this.r, this.maxR);
            }

            draw(doughTop) {
                if (this.popped) return;
                if (this.y < doughTop) return;

                const squash = 1 + Math.sin(this.wobble) * 0.05;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(squash, 1 / squash);

                // Bubble body
                const grad = ctx.createRadialGradient(-this.r * 0.2, -this.r * 0.2, 0, 0, 0, this.r);
                grad.addColorStop(0, 'rgba(240, 225, 190, 0.6)');
                grad.addColorStop(0.7, 'rgba(220, 200, 160, 0.3)');
                grad.addColorStop(1, 'rgba(200, 180, 140, 0.1)');
                ctx.beginPath();
                ctx.arc(0, 0, this.r, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();

                // Highlight
                ctx.beginPath();
                ctx.arc(-this.r * 0.3, -this.r * 0.3, this.r * 0.25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fill();

                ctx.restore();
            }
        }

        function yeastActivity(temp) {
            // Bell curve centered around 35C
            if (temp > 55) return 0; // Dead
            return Math.exp(-0.5 * Math.pow((temp - 35) / 8, 2));
        }

        function init() {
            bubbles = [];
            doughHeight = 0.6;
            totalGas = 0;
            time = 0;
            sugarRemaining = 1;
            // Seed some initial bubbles
            for (let i = 0; i < 20; i++) {
                const b = new Bubble(
                    W * 0.1 + Math.random() * W * 0.8,
                    H * (0.5 + Math.random() * 0.4)
                );
                b.r = 2 + Math.random() * 5;
                bubbles.push(b);
            }
        }
        init();

        document.getElementById('punchBtn').addEventListener('click', () => {
            // Deflate bubbles
            for (let b of bubbles) {
                b.r *= 0.3;
                b.y += (H - b.y) * 0.3;
            }
            doughHeight = Math.max(0.5, doughHeight - 0.15);
            totalGas *= 0.3;
        });

        function drawDough(doughTop) {
            // Dough body
            const grad = ctx.createLinearGradient(0, doughTop, 0, H);
            grad.addColorStop(0, '#e8d5a8');
            grad.addColorStop(0.3, '#dcc894');
            grad.addColorStop(1, '#c4a96e');
            ctx.fillStyle = grad;

            // Wavy top surface
            ctx.beginPath();
            ctx.moveTo(0, H);
            ctx.lineTo(0, doughTop + 10);
            for (let x = 0; x <= W; x += 10) {
                const wave = Math.sin(x * 0.01 + time * 0.01) * 5 + Math.sin(x * 0.005 + time * 0.005) * 8;
                ctx.lineTo(x, doughTop + wave);
            }
            ctx.lineTo(W, H);
            ctx.closePath();
            ctx.fill();

            // Surface texture
            ctx.globalAlpha = 0.1;
            for (let i = 0; i < 30; i++) {
                const sx = (i * 67 + time * 0.1) % W;
                const sy = doughTop + 15 + Math.sin(i * 2.3) * 20 + i * 8;
                if (sy < H) {
                    ctx.beginPath();
                    ctx.arc(sx, sy, 10 + Math.sin(i) * 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#b89960';
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;
        }

        function drawYeast(doughTop) {
            const temp = parseFloat(document.getElementById('temp').value);
            const activity = yeastActivity(temp);
            const count = Math.floor(30 * parseFloat(document.getElementById('yeast').value));

            for (let i = 0; i < count; i++) {
                const yx = (i * 137 + Math.sin(time * 0.02 + i) * 20) % W;
                const yy = doughTop + 30 + (i * 97) % (H - doughTop - 60);
                if (yy > H) continue;

                // Yeast cell
                ctx.save();
                ctx.translate(yx, yy);

                ctx.beginPath();
                ctx.ellipse(0, 0, 4, 3, 0, 0, Math.PI * 2);
                ctx.fillStyle = activity > 0.1 ? `rgba(180, 200, 100, ${0.5 + activity * 0.3})` : 'rgba(120, 120, 100, 0.3)';
                ctx.fill();

                // CO2 emission
                if (activity > 0.2 && Math.random() < activity * 0.3) {
                    ctx.beginPath();
                    ctx.arc(3, -5 - Math.random() * 5, 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        function animate() {
            time++;
            const temp = parseFloat(document.getElementById('temp').value);
            const yeastLevel = parseFloat(document.getElementById('yeast').value);
            const sugar = parseFloat(document.getElementById('sugar').value);
            const glutenStr = parseFloat(document.getElementById('gluten').value);

            document.getElementById('tempVal').innerHTML = temp + '&deg;C';
            document.getElementById('yeastVal').textContent = yeastLevel.toFixed(1);
            document.getElementById('sugarVal').textContent = sugar;
            document.getElementById('glutenVal').textContent = glutenStr.toFixed(2);

            const activity = yeastActivity(temp);
            const co2Rate = activity * yeastLevel * (sugar / 5) * sugarRemaining;

            // Consume sugar
            sugarRemaining = Math.max(0.01, sugarRemaining - co2Rate * 0.00005);

            // Generate new bubbles
            if (co2Rate > 0.1 && Math.random() < co2Rate * 0.03) {
                const doughTop = H * (1 - doughHeight);
                const b = new Bubble(
                    W * 0.05 + Math.random() * W * 0.9,
                    doughTop + 30 + Math.random() * (H - doughTop - 50)
                );
                bubbles.push(b);
            }

            // Dough rises
            totalGas += co2Rate * 0.001;
            doughHeight = Math.min(0.9, 0.5 + totalGas * 0.3 * glutenStr);

            const doughTop = H * (1 - doughHeight);

            // Background: kitchen counter
            ctx.fillStyle = '#f5f0e6';
            ctx.fillRect(0, 0, W, H);

            // Air above dough
            const airGrad = ctx.createLinearGradient(0, 0, 0, doughTop);
            airGrad.addColorStop(0, '#f0ece0');
            airGrad.addColorStop(1, '#e8dcc8');
            ctx.fillStyle = airGrad;
            ctx.fillRect(0, 0, W, doughTop);

            drawDough(doughTop);

            // Update and draw bubbles
            for (let b of bubbles) {
                b.update(co2Rate, glutenStr);
                b.draw(doughTop);
            }
            // Remove popped bubbles
            bubbles = bubbles.filter(b => !b.popped);

            drawYeast(doughTop);

            // Gluten network visualization
            if (glutenStr > 0.3) {
                ctx.globalAlpha = glutenStr * 0.08;
                ctx.strokeStyle = '#a08050';
                ctx.lineWidth = 0.5;
                for (let i = 0; i < bubbles.length; i++) {
                    for (let j = i + 1; j < Math.min(i + 5, bubbles.length); j++) {
                        const dx = bubbles[i].x - bubbles[j].x;
                        const dy = bubbles[i].y - bubbles[j].y;
                        if (Math.abs(dx) < 80 && Math.abs(dy) < 80) {
                            ctx.beginPath();
                            ctx.moveTo(bubbles[i].x, bubbles[i].y);
                            ctx.lineTo(bubbles[j].x, bubbles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                ctx.globalAlpha = 1;
            }

            // Stats
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(10, 10, 180, 60);
            ctx.font = '11px monospace';
            ctx.fillStyle = '#DDA15E';
            ctx.fillText(`Rise: ${((doughHeight - 0.5) / 0.4 * 100).toFixed(0)}%`, 20, 28);
            ctx.fillText(`Bubbles: ${bubbles.length}`, 20, 42);
            ctx.fillText(`CO\u2082 rate: ${(co2Rate * 100).toFixed(1)}`, 20, 56);
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText(`Sugar left: ${(sugarRemaining * 100).toFixed(0)}%`, 100, 28);

            requestAnimationFrame(animate);
        }

        window.reset = function() { init(); };
        window.addEventListener('resize', () => { /* bubbles stay relative */ });

        animate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
