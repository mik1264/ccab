<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emulsion Stability - Food Science</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 16px 24px; display: flex; gap: 20px;
            align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .control-group label { font-size: 0.7rem; color: #8A9A5B; text-transform: uppercase; letter-spacing: 1px; }
        .control-group .value { font-size: 0.85rem; color: #DDA15E; font-weight: bold; }
        input[type="range"] { width: 110px; accent-color: #8A9A5B; }
        button {
            background: #606C38; color: #FEFAE0; border: none; padding: 8px 16px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        button:hover { background: #8A9A5B; }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 12px 16px;
            font-size: 0.75rem; color: #FEFAE0; max-width: 260px; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Oil-in-Water Emulsion</h3>
        <p>Oil droplets suspended in water, stabilized by surfactant molecules. Without surfactant, droplets coalesce and separate. HLB (Hydrophilic-Lipophilic Balance) determines emulsion type.</p>
    </div>
    <div class="controls">
        <div class="control-group">
            <label>Oil Fraction</label>
            <input type="range" id="oilFrac" min="0.1" max="0.6" value="0.3" step="0.05">
            <span class="value" id="oilVal">0.30</span>
        </div>
        <div class="control-group">
            <label>Surfactant</label>
            <input type="range" id="surfactant" min="0" max="1" value="0.5" step="0.05">
            <span class="value" id="surfVal">0.50</span>
        </div>
        <div class="control-group">
            <label>Temperature</label>
            <input type="range" id="temp" min="5" max="80" value="25">
            <span class="value" id="tempVal">25&deg;C</span>
        </div>
        <div class="control-group">
            <label>Agitation</label>
            <input type="range" id="agitation" min="0" max="1" value="0" step="0.05">
            <span class="value" id="agitVal">0.00</span>
        </div>
        <button id="shakeBtn">Shake!</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let droplets = [];
        let shakeEnergy = 0;

        class Droplet {
            constructor(x, y, r) {
                this.x = x;
                this.y = y;
                this.r = r;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.surfactantCoat = [];
            }

            update(surfLevel, temp, agitation) {
                const buoyancy = -0.02 * (this.r / 10) * (1 - surfLevel * 0.8);
                const brownian = (temp / 25) * 0.3;
                const viscosity = 0.98 - surfLevel * 0.02;

                this.vx += (Math.random() - 0.5) * brownian + shakeEnergy * (Math.random() - 0.5) * 0.5;
                this.vy += buoyancy + (Math.random() - 0.5) * brownian + shakeEnergy * (Math.random() - 0.5) * 0.5;

                this.vx *= viscosity;
                this.vy *= viscosity;

                this.x += this.vx + agitation * Math.sin(Date.now() * 0.003) * 0.5;
                this.y += this.vy;

                // Walls
                if (this.x - this.r < 0) { this.x = this.r; this.vx *= -0.5; }
                if (this.x + this.r > W) { this.x = W - this.r; this.vx *= -0.5; }
                if (this.y - this.r < 0) { this.y = this.r; this.vy *= -0.5; }
                if (this.y + this.r > H) { this.y = H - this.r; this.vy *= -0.5; }
            }

            draw(surfLevel) {
                // Oil droplet
                const grad = ctx.createRadialGradient(this.x - this.r * 0.3, this.y - this.r * 0.3, 0, this.x, this.y, this.r);
                grad.addColorStop(0, 'rgba(255, 220, 80, 0.9)');
                grad.addColorStop(1, 'rgba(200, 160, 30, 0.7)');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();

                // Surfactant coat
                if (surfLevel > 0.1) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r + 1.5, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(138, 154, 91, ${surfLevel * 0.8})`;
                    ctx.lineWidth = 2 * surfLevel;
                    ctx.stroke();

                    // Surfactant molecules as small lines
                    const count = Math.floor(8 * surfLevel);
                    for (let i = 0; i < count; i++) {
                        const angle = (Math.PI * 2 * i) / count;
                        const sx = this.x + Math.cos(angle) * (this.r + 2);
                        const sy = this.y + Math.sin(angle) * (this.r + 2);
                        const ex = this.x + Math.cos(angle) * (this.r + 6);
                        const ey = this.y + Math.sin(angle) * (this.r + 6);
                        ctx.beginPath();
                        ctx.moveTo(sx, sy);
                        ctx.lineTo(ex, ey);
                        ctx.strokeStyle = `rgba(96, 108, 56, ${surfLevel})`;
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                        // Hydrophilic head
                        ctx.beginPath();
                        ctx.arc(ex, ey, 2, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(100, 180, 255, ${surfLevel})`;
                        ctx.fill();
                    }
                }
            }
        }

        function initDroplets() {
            droplets = [];
            const oilFrac = parseFloat(document.getElementById('oilFrac').value);
            const count = Math.floor(40 + oilFrac * 80);
            for (let i = 0; i < count; i++) {
                const r = 5 + Math.random() * 15;
                const x = r + Math.random() * (W - 2 * r);
                const y = r + Math.random() * (H - 2 * r);
                droplets.push(new Droplet(x, y, r));
            }
        }
        initDroplets();

        function tryCoalesce(surfLevel) {
            if (surfLevel > 0.7) return; // High surfactant prevents coalescence
            for (let i = 0; i < droplets.length; i++) {
                for (let j = i + 1; j < droplets.length; j++) {
                    const dx = droplets[i].x - droplets[j].x;
                    const dy = droplets[i].y - droplets[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = droplets[i].r + droplets[j].r;
                    if (dist < minDist * 0.8) {
                        // Coalescence probability
                        const prob = (1 - surfLevel) * 0.01;
                        if (Math.random() < prob) {
                            const area = Math.PI * (droplets[i].r ** 2 + droplets[j].r ** 2);
                            const newR = Math.sqrt(area / Math.PI);
                            if (newR < 30) {
                                droplets[i].r = newR;
                                droplets[i].x = (droplets[i].x + droplets[j].x) / 2;
                                droplets[i].y = (droplets[i].y + droplets[j].y) / 2;
                                droplets.splice(j, 1);
                                return;
                            }
                        } else {
                            // Repel
                            const nx = dx / dist;
                            const ny = dy / dist;
                            const overlap = minDist - dist;
                            droplets[i].x += nx * overlap * 0.5;
                            droplets[i].y += ny * overlap * 0.5;
                            droplets[j].x -= nx * overlap * 0.5;
                            droplets[j].y -= ny * overlap * 0.5;
                        }
                    }
                }
            }
        }

        document.getElementById('shakeBtn').addEventListener('click', () => {
            shakeEnergy = 8;
            // Break up large droplets
            const surfLevel = parseFloat(document.getElementById('surfactant').value);
            const newDroplets = [];
            for (let d of droplets) {
                if (d.r > 10 && Math.random() < 0.5) {
                    const area = Math.PI * d.r * d.r;
                    const n = 2 + Math.floor(Math.random() * 3);
                    const subArea = area / n;
                    const subR = Math.sqrt(subArea / Math.PI);
                    for (let k = 0; k < n; k++) {
                        const nd = new Droplet(
                            d.x + (Math.random() - 0.5) * d.r,
                            d.y + (Math.random() - 0.5) * d.r,
                            subR
                        );
                        nd.vx = (Math.random() - 0.5) * 5;
                        nd.vy = (Math.random() - 0.5) * 5;
                        newDroplets.push(nd);
                    }
                } else {
                    newDroplets.push(d);
                }
            }
            droplets = newDroplets;
        });

        function drawWater() {
            // Water phase gradient
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#c8dff5');
            grad.addColorStop(1, '#a0c4e8');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // Subtle water texture
            ctx.globalAlpha = 0.03;
            for (let i = 0; i < 20; i++) {
                const y = (Date.now() * 0.01 + i * 60) % H;
                ctx.beginPath();
                ctx.moveTo(0, y);
                for (let x = 0; x < W; x += 30) {
                    ctx.lineTo(x, y + Math.sin(x * 0.02 + Date.now() * 0.001) * 5);
                }
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
        }

        function animate() {
            const surfLevel = parseFloat(document.getElementById('surfactant').value);
            const temp = parseFloat(document.getElementById('temp').value);
            const agitation = parseFloat(document.getElementById('agitation').value);

            document.getElementById('oilVal').textContent = parseFloat(document.getElementById('oilFrac').value).toFixed(2);
            document.getElementById('surfVal').textContent = surfLevel.toFixed(2);
            document.getElementById('tempVal').innerHTML = temp + '&deg;C';
            document.getElementById('agitVal').textContent = agitation.toFixed(2);

            shakeEnergy *= 0.95;

            drawWater();

            for (let d of droplets) {
                d.update(surfLevel, temp, agitation);
            }
            tryCoalesce(surfLevel);

            // Sort by size for proper overlapping
            droplets.sort((a, b) => b.r - a.r);
            for (let d of droplets) {
                d.draw(surfLevel);
            }

            // Cream layer indicator
            let topCount = 0;
            for (let d of droplets) {
                if (d.y < H * 0.3) topCount++;
            }
            const separation = topCount / droplets.length;
            if (separation > 0.6) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(W - 170, 60, 160, 30);
                ctx.fillStyle = '#DDA15E';
                ctx.font = '12px monospace';
                ctx.fillText('Creaming detected!', W - 160, 80);
            }

            // Stats
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(10, H - 90, 180, 40);
            ctx.fillStyle = '#FEFAE0';
            ctx.font = '11px monospace';
            ctx.fillText(`Droplets: ${droplets.length}`, 20, H - 72);
            const avgR = droplets.reduce((s, d) => s + d.r, 0) / droplets.length;
            ctx.fillText(`Avg size: ${avgR.toFixed(1)}px`, 20, H - 58);

            requestAnimationFrame(animate);
        }

        document.getElementById('oilFrac').addEventListener('input', initDroplets);

        window.reset = function() {
            shakeEnergy = 0;
            initDroplets();
        };

        animate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
