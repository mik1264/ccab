<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sous Vide Heat Transfer - Food Science</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 16px 24px; display: flex; gap: 20px;
            align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .control-group label { font-size: 0.7rem; color: #8A9A5B; text-transform: uppercase; letter-spacing: 1px; }
        .control-group .value { font-size: 0.85rem; color: #DDA15E; font-weight: bold; }
        input[type="range"] { width: 120px; accent-color: #8A9A5B; }
        select {
            background: #333; color: #FEFAE0; border: 1px solid #606C38;
            padding: 4px 8px; border-radius: 6px; font-size: 0.8rem;
        }
        button {
            background: #606C38; color: #FEFAE0; border: none; padding: 8px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem;
        }
        button:hover { background: #8A9A5B; }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px); border-radius: 12px; padding: 12px 16px;
            font-size: 0.75rem; color: #FEFAE0; max-width: 280px; z-index: 100;
        }
        .info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Sous Vide Heat Transfer</h3>
        <p>Food cooks in a precisely controlled water bath. Heat conducts from edge to center following Fourier's law. The low temperature gradient means uniform doneness throughout, unlike pan-searing which creates steep gradients.</p>
    </div>
    <div class="controls">
        <div class="control-group">
            <label>Water Bath</label>
            <input type="range" id="bathTemp" min="45" max="85" value="56" step="0.5">
            <span class="value" id="bathVal">56.0&deg;C</span>
        </div>
        <div class="control-group">
            <label>Protein</label>
            <select id="protein">
                <option value="steak">Beef Steak</option>
                <option value="chicken">Chicken Breast</option>
                <option value="salmon">Salmon Fillet</option>
                <option value="egg">Egg</option>
            </select>
        </div>
        <div class="control-group">
            <label>Thickness</label>
            <input type="range" id="thickness" min="10" max="50" value="25">
            <span class="value" id="thickVal">25mm</span>
        </div>
        <div class="control-group">
            <label>Speed</label>
            <input type="range" id="speed" min="1" max="10" value="5">
            <span class="value" id="speedVal">5x</span>
        </div>
        <button id="resetBtn">Reset</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        const proteinData = {
            steak: { diffusivity: 1.3e-7, startTemp: 5, rare: 52, medium: 60, wellDone: 71, color: [180, 40, 40] },
            chicken: { diffusivity: 1.4e-7, startTemp: 5, rare: 62, medium: 68, wellDone: 74, color: [255, 200, 170] },
            salmon: { diffusivity: 1.5e-7, startTemp: 5, rare: 46, medium: 52, wellDone: 60, color: [255, 130, 80] },
            egg: { diffusivity: 1.6e-7, startTemp: 5, rare: 62, medium: 68, wellDone: 80, color: [255, 240, 200] }
        };

        // 1D heat conduction grid
        const gridRes = 60;
        let tempGrid = [];
        let elapsedMinutes = 0;
        let time = 0;

        function initGrid() {
            const protein = proteinData[document.getElementById('protein').value];
            tempGrid = new Array(gridRes).fill(protein.startTemp);
            elapsedMinutes = 0;
            time = 0;
        }
        initGrid();

        function updateHeat() {
            const bathTemp = parseFloat(document.getElementById('bathTemp').value);
            const protein = proteinData[document.getElementById('protein').value];
            const thickness = parseInt(document.getElementById('thickness').value) / 1000; // meters
            const speed = parseInt(document.getElementById('speed').value);

            const dx = thickness / gridRes;
            const alpha = protein.diffusivity;
            const dt = 0.5 * dx * dx / alpha; // stability condition

            for (let step = 0; step < speed * 5; step++) {
                const newGrid = [...tempGrid];
                // Boundary: water bath temp on both sides
                newGrid[0] = bathTemp;
                newGrid[gridRes - 1] = bathTemp;

                for (let i = 1; i < gridRes - 1; i++) {
                    const d2T = (tempGrid[i - 1] - 2 * tempGrid[i] + tempGrid[i + 1]) / (dx * dx);
                    newGrid[i] = tempGrid[i] + alpha * d2T * dt;
                }
                tempGrid = newGrid;
            }

            elapsedMinutes += speed * 5 * 0.5 / 60; // rough time scaling
        }

        function getTempColor(temp, protein) {
            const p = proteinData[protein];
            if (temp < p.rare) {
                // Raw
                const t = Math.max(0, (temp - p.startTemp) / (p.rare - p.startTemp));
                return `rgb(${p.color[0]}, ${Math.floor(p.color[1] + t * 20)}, ${Math.floor(p.color[2] + t * 20)})`;
            } else if (temp < p.medium) {
                // Rare to medium
                const t = (temp - p.rare) / (p.medium - p.rare);
                if (protein === 'steak') return `rgb(${180 + Math.floor(t * 40)}, ${60 + Math.floor(t * 40)}, ${60 + Math.floor(t * 30)})`;
                if (protein === 'salmon') return `rgb(${255 - Math.floor(t * 30)}, ${130 + Math.floor(t * 40)}, ${80 + Math.floor(t * 30)})`;
                return `rgb(${p.color[0]}, ${p.color[1]}, ${p.color[2]})`;
            } else {
                // Well done
                const t = Math.min(1, (temp - p.medium) / (p.wellDone - p.medium));
                if (protein === 'steak') return `rgb(${220 - Math.floor(t * 40)}, ${100 + Math.floor(t * 50)}, ${90 + Math.floor(t * 40)})`;
                if (protein === 'chicken') return `rgb(255, ${200 + Math.floor(t * 30)}, ${170 + Math.floor(t * 50)})`;
                if (protein === 'salmon') return `rgb(${225 - Math.floor(t * 30)}, ${170 + Math.floor(t * 30)}, ${110 + Math.floor(t * 40)})`;
                return `rgb(${p.color[0]}, ${p.color[1]}, ${p.color[2]})`;
            }
        }

        function drawWaterBath() {
            // Water
            const waterGrad = ctx.createLinearGradient(0, 0, 0, H);
            waterGrad.addColorStop(0, '#c5dff5');
            waterGrad.addColorStop(1, '#8cb8e0');
            ctx.fillStyle = waterGrad;
            ctx.fillRect(0, 0, W, H);

            // Convection currents
            ctx.globalAlpha = 0.05;
            for (let i = 0; i < 20; i++) {
                const x = (time * 0.3 + i * W / 20) % W;
                const yBase = H * 0.8;
                ctx.beginPath();
                ctx.moveTo(x, yBase);
                ctx.quadraticCurveTo(x + 20, yBase - H * 0.3 - Math.sin(time * 0.01 + i) * 50, x + 5, H * 0.1);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            ctx.globalAlpha = 1;

            // Small bubbles
            for (let i = 0; i < 8; i++) {
                const bx = (time * 0.5 + i * 137) % W;
                const by = H - (time * 0.3 + i * 97) % H;
                ctx.beginPath();
                ctx.arc(bx, by, 2 + Math.sin(time * 0.05 + i) * 1, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fill();
            }
        }

        function drawMeatCrossSection() {
            const protein = document.getElementById('protein').value;
            const meatW = W * 0.5;
            const meatH = H * 0.35;
            const meatX = (W - meatW) / 2;
            const meatY = (H - meatH) / 2 - 20;

            // Vacuum bag outline
            ctx.beginPath();
            ctx.roundRect(meatX - 15, meatY - 15, meatW + 30, meatH + 30, 10);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fill();

            // Draw meat cross-section with temperature colors
            const cellW = meatW / gridRes;
            for (let i = 0; i < gridRes; i++) {
                const color = getTempColor(tempGrid[i], protein);
                ctx.fillStyle = color;
                ctx.fillRect(meatX + i * cellW, meatY, cellW + 1, meatH);
            }

            // Meat border
            ctx.strokeStyle = 'rgba(100, 60, 30, 0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(meatX, meatY, meatW, meatH);

            // Temperature profile line
            const graphY = meatY + meatH + 40;
            const graphH = 100;

            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(meatX - 10, graphY - 10, meatW + 20, graphH + 30);

            // Grid lines
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 0.5;
            for (let t = 0; t <= 4; t++) {
                const y = graphY + graphH - (graphH * t / 4);
                ctx.beginPath();
                ctx.moveTo(meatX, y);
                ctx.lineTo(meatX + meatW, y);
                ctx.stroke();
            }

            // Temperature curve
            const bathTemp = parseFloat(document.getElementById('bathTemp').value);
            const minT = 0;
            const maxT = bathTemp + 5;
            ctx.beginPath();
            for (let i = 0; i < gridRes; i++) {
                const x = meatX + (i / gridRes) * meatW;
                const y = graphY + graphH - ((tempGrid[i] - minT) / (maxT - minT)) * graphH;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Target line
            const targetY = graphY + graphH - ((bathTemp - minT) / (maxT - minT)) * graphH;
            ctx.beginPath();
            ctx.moveTo(meatX, targetY);
            ctx.lineTo(meatX + meatW, targetY);
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.6)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Labels
            ctx.fillStyle = '#8A9A5B';
            ctx.font = '10px monospace';
            ctx.fillText(`${bathTemp}\u00B0C target`, meatX + meatW + 5, targetY + 4);
            ctx.fillText('Edge', meatX, graphY + graphH + 15);
            ctx.textAlign = 'center';
            ctx.fillText('Center', meatX + meatW / 2, graphY + graphH + 15);
            ctx.textAlign = 'right';
            ctx.fillText('Edge', meatX + meatW, graphY + graphH + 15);
            ctx.textAlign = 'left';

            // Center temp
            const centerTemp = tempGrid[Math.floor(gridRes / 2)];
            ctx.fillStyle = '#DDA15E';
            ctx.font = 'bold 14px monospace';
            ctx.fillText(`Center: ${centerTemp.toFixed(1)}\u00B0C`, meatX, meatY - 25);
            ctx.fillText(`Edge: ${tempGrid[1].toFixed(1)}\u00B0C`, meatX + meatW - 120, meatY - 25);
        }

        function animate() {
            time++;
            updateHeat();

            const bathTemp = parseFloat(document.getElementById('bathTemp').value);
            const thickness = parseInt(document.getElementById('thickness').value);
            const speed = parseInt(document.getElementById('speed').value);

            document.getElementById('bathVal').innerHTML = bathTemp.toFixed(1) + '&deg;C';
            document.getElementById('thickVal').textContent = thickness + 'mm';
            document.getElementById('speedVal').textContent = speed + 'x';

            drawWaterBath();
            drawMeatCrossSection();

            // Time display
            const hrs = Math.floor(elapsedMinutes / 60);
            const mins = Math.floor(elapsedMinutes % 60);
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(10, H - 70, 150, 30);
            ctx.fillStyle = '#FEFAE0';
            ctx.font = '12px monospace';
            ctx.fillText(`Time: ${hrs}h ${mins}m`, 20, H - 50);

            requestAnimationFrame(animate);
        }

        document.getElementById('protein').addEventListener('change', initGrid);
        document.getElementById('resetBtn').addEventListener('click', initGrid);

        window.reset = function() { initGrid(); };

        animate();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
