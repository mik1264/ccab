<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hourglass - Historical Timekeeping</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; cursor: pointer; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 15px 25px;
            border-radius: 15px; color: #FEFAE0; display: flex; gap: 20px; align-items: center;
            font-size: 0.85rem; z-index: 100;
        }
        .controls label { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .controls input[type="range"] { width: 100px; accent-color: #DDA15E; }
        .controls .value { color: #DDA15E; font-weight: bold; }
        .controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 8px 16px;
            border-radius: 8px; cursor: pointer; font-family: inherit;
        }
        .controls button:hover { background: #8A9A5B; }
        .info {
            position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.8rem;
            background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 10px;
            backdrop-filter: blur(10px); z-index: 100; text-align: right; line-height: 1.6;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="info" id="info"></div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Neck Width
            <input type="range" id="neck" min="3" max="15" value="6" step="1">
            <span class="value" id="neckVal">6</span>
        </label>
        <label>Sand Amount
            <input type="range" id="amount" min="200" max="2000" value="800" step="100">
            <span class="value" id="amountVal">800</span>
        </label>
        <button id="flipBtn">Flip</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const neckSlider = document.getElementById('neck');
        const amountSlider = document.getElementById('amount');
        const flipBtn = document.getElementById('flipBtn');
        const neckVal = document.getElementById('neckVal');
        const amountVal = document.getElementById('amountVal');
        const infoEl = document.getElementById('info');

        let W, H;
        let particles = [];
        let topSand = 1.0; // fraction in top bulb
        let flipAngle = 0;
        let flipping = false;
        let flipTarget = 0;
        let flowParticles = [];
        let totalGrains;
        let elapsed = 0;
        let lastTime = 0;
        let pileHeight = 0;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function hourglass(t) {
            // t: -1 (top) to 1 (bottom), returns width fraction
            const absT = Math.abs(t);
            if (absT < 0.08) return 0.05 + parseFloat(neckSlider.value) / 100;
            return 0.05 + 0.95 * Math.pow((absT - 0.08) / 0.92, 0.6);
        }

        function drawGlass(cx, cy, glassH, maxR) {
            ctx.beginPath();
            const steps = 60;
            // Left edge, top to bottom
            for (let i = 0; i <= steps; i++) {
                const t = -1 + 2 * i / steps;
                const w = hourglass(t) * maxR;
                const y = cy + t * glassH / 2;
                if (i === 0) ctx.moveTo(cx - w, y);
                else ctx.lineTo(cx - w, y);
            }
            // Right edge, bottom to top
            for (let i = steps; i >= 0; i--) {
                const t = -1 + 2 * i / steps;
                const w = hourglass(t) * maxR;
                const y = cy + t * glassH / 2;
                ctx.lineTo(cx + w, y);
            }
            ctx.closePath();
            ctx.fillStyle = 'rgba(200, 220, 240, 0.08)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(200, 220, 240, 0.4)';
            ctx.lineWidth = 2.5;
            ctx.stroke();
        }

        function drawSand(cx, cy, glassH, maxR) {
            // Top bulb sand (fills from neck up)
            if (topSand > 0.01) {
                const sandTop = -1 + (1 - topSand) * 0.92; // where sand starts
                ctx.beginPath();
                const steps = 30;
                // Sand surface (flat)
                const surfY = cy + sandTop * glassH / 2;
                const surfW = hourglass(sandTop) * maxR;
                ctx.moveTo(cx - surfW, surfY);
                // Left edge down to neck
                for (let i = 0; i <= steps; i++) {
                    const t = sandTop + ((-0.08) - sandTop) * i / steps;
                    const w = hourglass(t) * maxR;
                    ctx.lineTo(cx - w, cy + t * glassH / 2);
                }
                // Right edge neck to surface
                for (let i = steps; i >= 0; i--) {
                    const t = sandTop + ((-0.08) - sandTop) * i / steps;
                    const w = hourglass(t) * maxR;
                    ctx.lineTo(cx + w, cy + t * glassH / 2);
                }
                ctx.closePath();
                ctx.fillStyle = '#DDA15E';
                ctx.fill();

                // Indent at center of sand surface (funnel effect)
                if (topSand > 0.05) {
                    ctx.beginPath();
                    ctx.ellipse(cx, surfY + 3, surfW * 0.25, 5, 0, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(188, 108, 37, 0.5)';
                    ctx.fill();
                }
            }

            // Bottom bulb sand (pile growing from bottom)
            const bottomSand = 1 - topSand;
            if (bottomSand > 0.01) {
                const pileTop = 1 - bottomSand * 0.92;
                ctx.beginPath();
                const steps = 30;
                // Bottom left edge
                const botY = cy + glassH / 2;
                const botW = hourglass(1) * maxR;
                ctx.moveTo(cx - botW, botY);
                // Left edge up to pile surface
                for (let i = 0; i <= steps; i++) {
                    const t = 1 + (pileTop - 1) * i / steps;
                    const w = hourglass(t) * maxR;
                    ctx.lineTo(cx - w, cy + t * glassH / 2);
                }
                // Pile peak
                const peakY = cy + pileTop * glassH / 2;
                const peakW = hourglass(pileTop) * maxR;

                // Cone peak if sand is flowing
                if (topSand > 0.01 && bottomSand < 0.95) {
                    const coneH = Math.min(8, bottomSand * 20);
                    ctx.lineTo(cx, peakY - coneH);
                }

                // Right edge
                for (let i = steps; i >= 0; i--) {
                    const t = 1 + (pileTop - 1) * i / steps;
                    const w = hourglass(t) * maxR;
                    ctx.lineTo(cx + w, cy + t * glassH / 2);
                }
                ctx.closePath();
                ctx.fillStyle = '#DDA15E';
                ctx.fill();
            }
        }

        function drawFlowStream(cx, cy, glassH, maxR) {
            if (topSand < 0.01) return;
            // Stream of sand through neck
            const neckW = (0.05 + parseFloat(neckSlider.value) / 100) * maxR;
            const streamW = neckW * 0.4;
            const neckY = cy;
            const bottomSand = 1 - topSand;
            const pileTop = 1 - bottomSand * 0.92;
            const endY = cy + pileTop * glassH / 2;

            ctx.beginPath();
            ctx.moveTo(cx - streamW, neckY - 10);
            ctx.lineTo(cx - streamW * 0.5, endY);
            ctx.lineTo(cx + streamW * 0.5, endY);
            ctx.lineTo(cx + streamW, neckY - 10);
            ctx.closePath();
            ctx.fillStyle = 'rgba(221, 161, 94, 0.6)';
            ctx.fill();

            // Individual falling grains
            for (let i = flowParticles.length - 1; i >= 0; i--) {
                const p = flowParticles[i];
                p.y += p.vy;
                p.vy += 0.15;
                p.x += (Math.random() - 0.5) * 0.3;
                if (p.y > endY) {
                    flowParticles.splice(i, 1);
                    continue;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, 1.2, 0, Math.PI * 2);
                ctx.fillStyle = '#BC6C25';
                ctx.fill();
            }

            // Spawn flow particles
            if (topSand > 0.01) {
                for (let i = 0; i < 2; i++) {
                    flowParticles.push({
                        x: cx + (Math.random() - 0.5) * streamW * 2,
                        y: neckY - 5 + Math.random() * 10,
                        vy: 1 + Math.random() * 2
                    });
                }
            }
        }

        function drawFrame(cx, cy, glassH, maxR) {
            // Wooden frame
            const frameW = maxR + 20;
            const frameH = glassH / 2 + 15;

            ctx.strokeStyle = '#8A6B3E';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';

            // Top cap
            ctx.beginPath();
            ctx.moveTo(cx - frameW * 0.4, cy - frameH);
            ctx.lineTo(cx + frameW * 0.4, cy - frameH);
            ctx.stroke();

            // Bottom cap
            ctx.beginPath();
            ctx.moveTo(cx - frameW * 0.4, cy + frameH);
            ctx.lineTo(cx + frameW * 0.4, cy + frameH);
            ctx.stroke();

            // Side posts
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(cx - frameW * 0.35, cy - frameH);
            ctx.lineTo(cx - frameW * 0.35, cy + frameH);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx + frameW * 0.35, cy - frameH);
            ctx.lineTo(cx + frameW * 0.35, cy + frameH);
            ctx.stroke();
        }

        function flip() {
            if (flipping) return;
            flipping = true;
            flipTarget = flipAngle + Math.PI;
        }

        function draw(timestamp) {
            const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.05) : 0.016;
            lastTime = timestamp;

            neckVal.textContent = neckSlider.value;
            amountVal.textContent = amountSlider.value;

            // Animate flip
            if (flipping) {
                const diff = flipTarget - flipAngle;
                flipAngle += diff * 0.08;
                if (Math.abs(diff) < 0.01) {
                    flipAngle = flipTarget;
                    flipping = false;
                    // Swap sand
                    topSand = 1 - topSand;
                }
            }

            // Sand flow (Beverloo/constant rate due to Janssen effect)
            if (!flipping && topSand > 0) {
                const neckW = parseFloat(neckSlider.value);
                const rate = neckW * 0.0004; // constant flow rate
                topSand = Math.max(0, topSand - rate);
                elapsed += dt;
            }

            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            // Title
            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'italic 16px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Click anywhere to flip the hourglass', W / 2, 35);

            const cx = W / 2;
            const cy = H / 2;
            const glassH = Math.min(H * 0.6, 450);
            const maxR = Math.min(W * 0.15, 120);

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(flipAngle);
            ctx.translate(-cx, -cy);

            drawFrame(cx, cy, glassH, maxR);
            drawGlass(cx, cy, glassH, maxR);
            drawSand(cx, cy, glassH, maxR);
            if (!flipping) drawFlowStream(cx, cy, glassH, maxR);

            ctx.restore();

            // Info
            const bottomPct = ((1 - topSand) * 100).toFixed(1);
            const mins = Math.floor(elapsed / 60);
            const secs = Math.floor(elapsed % 60);
            infoEl.innerHTML =
                'Top: ' + (topSand * 100).toFixed(1) + '%<br>' +
                'Bottom: ' + bottomPct + '%<br>' +
                'Elapsed: ' + mins + 'm ' + secs + 's<br>' +
                'Janssen effect: constant flow';

            requestAnimationFrame(draw);
        }

        canvas.addEventListener('click', flip);
        flipBtn.addEventListener('click', flip);

        window.reset = function() {
            topSand = 1.0;
            flipAngle = 0;
            flipping = false;
            flipTarget = 0;
            flowParticles = [];
            elapsed = 0;
            neckSlider.value = 6;
            amountSlider.value = 800;
        };

        requestAnimationFrame(draw);
    })();
    </script>
</body>
</html>
