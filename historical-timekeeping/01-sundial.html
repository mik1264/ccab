<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sundial &amp; Gnomon - Historical Timekeeping</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 15px 25px;
            border-radius: 15px; color: #FEFAE0; display: flex; gap: 20px; align-items: center;
            font-size: 0.85rem; z-index: 100;
        }
        .controls label { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .controls input[type="range"] { width: 120px; accent-color: #DDA15E; }
        .controls .value { color: #DDA15E; font-weight: bold; }
        .info {
            position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.8rem;
            background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 10px;
            backdrop-filter: blur(10px); z-index: 100; text-align: right; line-height: 1.6;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="info" id="info"></div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Latitude
            <input type="range" id="latitude" min="10" max="80" value="45" step="1">
            <span class="value" id="latVal">45&deg;</span>
        </label>
        <label>Hour (Solar)
            <input type="range" id="hour" min="6" max="18" value="10" step="0.1">
            <span class="value" id="hourVal">10:00</span>
        </label>
        <label>Auto
            <input type="checkbox" id="autoMode" checked>
        </label>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const latSlider = document.getElementById('latitude');
        const hourSlider = document.getElementById('hour');
        const autoCheck = document.getElementById('autoMode');
        const latVal = document.getElementById('latVal');
        const hourVal = document.getElementById('hourVal');
        const infoEl = document.getElementById('info');

        let W, H, cx, cy, dialRadius;
        let autoTime = 6;
        let animId;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            cx = W / 2;
            cy = H / 2;
            dialRadius = Math.min(W, H) * 0.32;
        }
        resize();
        window.addEventListener('resize', resize);

        function toRad(d) { return d * Math.PI / 180; }
        function toDeg(r) { return r * 180 / Math.PI; }

        function hourAngle(lat, solarHour) {
            // Hour line angle on horizontal sundial
            // alpha = atan(sin(lat) * tan(15 * (solarHour - 12)))
            const t = solarHour - 12;
            return Math.atan2(Math.sin(toRad(lat)) * Math.sin(toRad(15 * t)), Math.cos(toRad(15 * t)));
        }

        function sunAltitude(lat, solarHour) {
            // Simplified: assume equinox (declination = 0)
            const ha = toRad(15 * (solarHour - 12));
            const latR = toRad(lat);
            return Math.asin(Math.sin(latR) * Math.cos(ha)) * 0.8 + 0.1;
        }

        function drawDial() {
            const lat = parseFloat(latSlider.value);
            let hour;
            if (autoCheck.checked) {
                hour = autoTime;
                hourSlider.value = hour;
            } else {
                hour = parseFloat(hourSlider.value);
            }

            latVal.textContent = lat + '\u00B0';
            const h = Math.floor(hour);
            const m = Math.round((hour - h) * 60);
            hourVal.textContent = h + ':' + (m < 10 ? '0' : '') + m;

            // Background gradient - sky color based on hour
            const sunPos = Math.max(0, Math.min(1, (hour - 6) / 12));
            const skyR = Math.round(26 + 60 * Math.sin(sunPos * Math.PI));
            const skyG = Math.round(26 + 40 * Math.sin(sunPos * Math.PI));
            const skyB = Math.round(46 + 80 * Math.sin(sunPos * Math.PI));
            ctx.fillStyle = `rgb(${skyR},${skyG},${skyB})`;
            ctx.fillRect(0, 0, W, H);

            // Draw sun
            const sunAngleH = toRad(15 * (hour - 12));
            const sunAlt = sunAltitude(lat, hour);
            const sunX = cx + Math.sin(sunAngleH) * dialRadius * 1.8;
            const sunY = cy - sunAlt * dialRadius * 2.5;
            const sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 40);
            sunGrad.addColorStop(0, '#FEFAE0');
            sunGrad.addColorStop(0.3, '#DDA15E');
            sunGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = sunGrad;
            ctx.beginPath();
            ctx.arc(sunX, sunY, 40, 0, Math.PI * 2);
            ctx.fill();

            // Ground plane
            ctx.save();
            ctx.translate(cx, cy + dialRadius * 0.3);

            // Dial face (ellipse for perspective)
            const scaleY = 0.5;
            ctx.save();
            ctx.scale(1, scaleY);

            // Dial background
            const dialGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, dialRadius);
            dialGrad.addColorStop(0, '#f5f0d8');
            dialGrad.addColorStop(0.8, '#e8e0c0');
            dialGrad.addColorStop(1, '#d0c8a0');
            ctx.fillStyle = dialGrad;
            ctx.beginPath();
            ctx.arc(0, 0, dialRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Hour lines
            for (let hr = 6; hr <= 18; hr++) {
                const angle = hourAngle(lat, hr);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                const lineLen = dialRadius * 0.9;
                ctx.lineTo(Math.sin(angle) * lineLen, -Math.cos(angle) * lineLen);
                ctx.strokeStyle = hr === 12 ? '#606C38' : '#8A9A5B';
                ctx.lineWidth = hr === 12 ? 3 : 1.5;
                ctx.stroke();

                // Hour labels
                const labelDist = dialRadius * 0.78;
                const lx = Math.sin(angle) * labelDist;
                const ly = -Math.cos(angle) * labelDist;
                ctx.fillStyle = '#606C38';
                ctx.font = 'bold 14px Georgia';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const romanNumerals = ['', 'I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X', 'XI', 'XII'];
                const displayHr = hr > 12 ? hr - 12 : hr;
                ctx.fillText(romanNumerals[displayHr] || displayHr.toString(), lx, ly);
            }

            // Shadow
            const shadowAngle = hourAngle(lat, hour);
            const shadowLen = dialRadius * 0.85 / Math.max(0.3, Math.tan(sunAlt));
            const clampedLen = Math.min(shadowLen, dialRadius * 0.9);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.sin(shadowAngle) * clampedLen, -Math.cos(shadowAngle) * clampedLen);
            ctx.strokeStyle = 'rgba(0,0,0,0.6)';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Shadow tip
            ctx.beginPath();
            ctx.arc(Math.sin(shadowAngle) * clampedLen, -Math.cos(shadowAngle) * clampedLen, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fill();

            ctx.restore(); // unscale

            // Gnomon (triangle rising from center)
            const gnomonH = dialRadius * 0.6;
            const gnomonAngle = toRad(lat);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -gnomonH);
            ctx.lineTo(gnomonH * Math.cos(gnomonAngle) * 0.15, 0);
            ctx.closePath();
            ctx.fillStyle = '#BC6C25';
            ctx.globalAlpha = 0.8;
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.strokeStyle = '#606C38';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Gnomon angle label
            ctx.fillStyle = '#FEFAE0';
            ctx.font = '12px Georgia';
            ctx.textAlign = 'left';
            ctx.fillText(lat + '\u00B0 (latitude)', 10, -gnomonH * 0.4);

            ctx.restore(); // untranslate

            // Info
            const shadowDeg = toDeg(shadowAngle);
            infoEl.innerHTML =
                'Latitude: ' + lat + '\u00B0<br>' +
                'Solar Hour: ' + h + ':' + (m < 10 ? '0' : '') + m + '<br>' +
                'Shadow Angle: ' + shadowDeg.toFixed(1) + '\u00B0<br>' +
                'Formula: \u03B1 = atan(sin(\u03C6)\u00B7tan(15\u00B7t))';
        }

        function animate() {
            if (autoCheck.checked) {
                autoTime += 0.005;
                if (autoTime > 18) autoTime = 6;
            }
            drawDial();
            animId = requestAnimationFrame(animate);
        }

        hourSlider.addEventListener('input', () => {
            autoCheck.checked = false;
        });

        window.reset = function() {
            autoTime = 6;
            latSlider.value = 45;
            hourSlider.value = 10;
            autoCheck.checked = true;
        };

        animate();
    })();
    </script>
</body>
</html>
