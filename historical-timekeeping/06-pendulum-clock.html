<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huygens Pendulum Clock - Historical Timekeeping</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 15px 25px;
            border-radius: 15px; color: #FEFAE0; display: flex; gap: 20px; align-items: center;
            font-size: 0.85rem; z-index: 100; flex-wrap: wrap; justify-content: center;
        }
        .controls label { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .controls input[type="range"] { width: 100px; accent-color: #DDA15E; }
        .controls .value { color: #DDA15E; font-weight: bold; }
        .controls select {
            background: #333; color: #FEFAE0; border: 1px solid #606C38; padding: 4px 8px;
            border-radius: 5px; font-family: inherit;
        }
        .info {
            position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.8rem;
            background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 10px;
            backdrop-filter: blur(10px); z-index: 100; text-align: right; line-height: 1.6;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="info" id="info"></div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Path Type
            <select id="pathType">
                <option value="circular">Circular</option>
                <option value="cycloidal" selected>Cycloidal</option>
            </select>
        </label>
        <label>Amplitude
            <input type="range" id="amplitude" min="5" max="60" value="30" step="1">
            <span class="value" id="ampVal">30&deg;</span>
        </label>
        <label>Length
            <input type="range" id="length" min="50" max="300" value="200" step="10">
            <span class="value" id="lenVal">200</span>
        </label>
        <label>Damping
            <input type="range" id="damping" min="0" max="50" value="5" step="1">
            <span class="value" id="dampVal">5%</span>
        </label>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const pathSelect = document.getElementById('pathType');
        const ampSlider = document.getElementById('amplitude');
        const lenSlider = document.getElementById('length');
        const dampSlider = document.getElementById('damping');
        const ampVal = document.getElementById('ampVal');
        const lenVal = document.getElementById('lenVal');
        const dampVal = document.getElementById('dampVal');
        const infoEl = document.getElementById('info');

        let W, H;
        let angle = 0;
        let angularVelocity = 0;
        let time = 0;
        let lastTime = 0;
        let tickCount = 0;
        let lastTickSide = 0;
        let trailPoints = [];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const g = 9.81;

        function cycloidX(t, R) { return R * (t - Math.sin(t)); }
        function cycloidY(t, R) { return R * (1 - Math.cos(t)); }

        function draw(timestamp) {
            const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.05) : 0.016;
            lastTime = timestamp;

            const pathType = pathSelect.value;
            const maxAmp = parseFloat(ampSlider.value) * Math.PI / 180;
            const L = parseFloat(lenSlider.value);
            const damping = parseFloat(dampSlider.value) / 1000;

            ampVal.textContent = ampSlider.value + '\u00B0';
            lenVal.textContent = L;
            dampVal.textContent = dampSlider.value + '%';

            // Initialize angle if needed
            if (time === 0) {
                angle = maxAmp;
                angularVelocity = 0;
            }

            // Physics simulation (multiple substeps)
            const substeps = 10;
            const subDt = dt / substeps;
            for (let s = 0; s < substeps; s++) {
                let angularAccel;
                if (pathType === 'cycloidal') {
                    // Cycloidal pendulum: perfectly isochronous
                    // Restoring force proportional to arc length, period = 2pi*sqrt(4R/g)
                    angularAccel = -(g / L) * angle;
                } else {
                    // Circular pendulum: sin(theta) gives amplitude-dependent period
                    angularAccel = -(g / L) * Math.sin(angle);
                }
                angularAccel -= damping * angularVelocity;
                angularVelocity += angularAccel * subDt;
                angle += angularVelocity * subDt;
            }
            time += dt;

            // Count ticks
            const side = angle > 0 ? 1 : -1;
            if (side !== lastTickSide && lastTickSide !== 0) tickCount++;
            lastTickSide = side;

            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const pivotX = W / 2;
            const pivotY = H * 0.15;

            // Draw cycloidal cheeks if cycloidal mode
            if (pathType === 'cycloidal') {
                const R = L / 4;
                ctx.strokeStyle = 'rgba(138, 154, 91, 0.5)';
                ctx.lineWidth = 3;
                // Left cheek
                ctx.beginPath();
                for (let t = 0; t <= Math.PI; t += 0.05) {
                    const cx = pivotX - cycloidX(t, R);
                    const cy = pivotY + cycloidY(t, R);
                    if (t === 0) ctx.moveTo(cx, cy);
                    else ctx.lineTo(cx, cy);
                }
                ctx.stroke();
                // Right cheek
                ctx.beginPath();
                for (let t = 0; t <= Math.PI; t += 0.05) {
                    const cx = pivotX + cycloidX(t, R);
                    const cy = pivotY + cycloidY(t, R);
                    if (t === 0) ctx.moveTo(cx, cy);
                    else ctx.lineTo(cx, cy);
                }
                ctx.stroke();

                // Label
                ctx.fillStyle = '#8A9A5B';
                ctx.font = '11px Georgia';
                ctx.textAlign = 'center';
                ctx.fillText('Cycloidal cheeks', pivotX, pivotY - 10);
            }

            // Pendulum bob position
            let bobX, bobY;
            if (pathType === 'cycloidal') {
                bobX = pivotX + L * Math.sin(angle);
                bobY = pivotY + L * Math.cos(angle);
            } else {
                bobX = pivotX + L * Math.sin(angle);
                bobY = pivotY + L * Math.cos(angle);
            }

            // Trail
            trailPoints.push({ x: bobX, y: bobY });
            if (trailPoints.length > 200) trailPoints.shift();
            if (trailPoints.length > 2) {
                ctx.beginPath();
                ctx.moveTo(trailPoints[0].x, trailPoints[0].y);
                for (let i = 1; i < trailPoints.length; i++) {
                    ctx.lineTo(trailPoints[i].x, trailPoints[i].y);
                }
                ctx.strokeStyle = 'rgba(221, 161, 94, 0.15)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Pivot mount
            ctx.beginPath();
            ctx.arc(pivotX, pivotY, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#8A6B3E';
            ctx.fill();
            ctx.strokeStyle = '#BC6C25';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Rod
            ctx.beginPath();
            ctx.moveTo(pivotX, pivotY);
            ctx.lineTo(bobX, bobY);
            ctx.strokeStyle = '#BC6C25';
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // Bob
            ctx.beginPath();
            ctx.arc(bobX, bobY, 15, 0, Math.PI * 2);
            const bobGrad = ctx.createRadialGradient(bobX - 3, bobY - 3, 0, bobX, bobY, 15);
            bobGrad.addColorStop(0, '#DDA15E');
            bobGrad.addColorStop(1, '#8A6B3E');
            ctx.fillStyle = bobGrad;
            ctx.fill();
            ctx.strokeStyle = '#BC6C25';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Clock face (decorative)
            const clockY = pivotY - 40;
            ctx.beginPath();
            ctx.arc(pivotX, clockY, 35, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(254, 250, 224, 0.1)';
            ctx.fill();
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Clock hands (driven by tick count)
            const secAngle = (tickCount / 60) * Math.PI * 2 - Math.PI / 2;
            ctx.beginPath();
            ctx.moveTo(pivotX, clockY);
            ctx.lineTo(pivotX + Math.cos(secAngle) * 28, clockY + Math.sin(secAngle) * 28);
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Period comparison
            const circularPeriod = 2 * Math.PI * Math.sqrt(L / g);
            const exactCircPeriod = circularPeriod * (1 + maxAmp * maxAmp / 16); // 2nd order approx
            const cycloidalPeriod = 2 * Math.PI * Math.sqrt(L / g);

            // Info
            const angleDeg = (angle * 180 / Math.PI).toFixed(1);
            infoEl.innerHTML =
                'Mode: ' + (pathType === 'cycloidal' ? 'Cycloidal (isochronous)' : 'Circular (non-isochronous)') + '<br>' +
                'Angle: ' + angleDeg + '\u00B0<br>' +
                'Period (exact): ' + (pathType === 'cycloidal' ? cycloidalPeriod.toFixed(3) : exactCircPeriod.toFixed(3)) + 's<br>' +
                'Ticks: ' + tickCount + '<br>' +
                (pathType === 'circular' ? 'Period varies with amplitude!' : 'Period constant at all amplitudes');

            // Title
            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'italic 14px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Huygens\' Pendulum Clock (1656)', pivotX, H - 20);

            requestAnimationFrame(draw);
        }

        // Reset on parameter change
        function resetPendulum() {
            const maxAmp = parseFloat(ampSlider.value) * Math.PI / 180;
            angle = maxAmp;
            angularVelocity = 0;
            time = 0;
            tickCount = 0;
            lastTickSide = 0;
            trailPoints = [];
        }

        pathSelect.addEventListener('change', resetPendulum);
        ampSlider.addEventListener('input', resetPendulum);
        lenSlider.addEventListener('input', resetPendulum);

        window.reset = function() {
            ampSlider.value = 30;
            lenSlider.value = 200;
            dampSlider.value = 5;
            pathSelect.value = 'cycloidal';
            resetPendulum();
        };

        resetPendulum();
        requestAnimationFrame(draw);
    })();
    </script>
</body>
</html>
