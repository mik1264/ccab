<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escapement Mechanism - Historical Timekeeping</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 15px 25px;
            border-radius: 15px; color: #FEFAE0; display: flex; gap: 20px; align-items: center;
            font-size: 0.85rem; z-index: 100;
        }
        .controls label { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .controls input[type="range"] { width: 100px; accent-color: #DDA15E; }
        .controls .value { color: #DDA15E; font-weight: bold; }
        .controls select {
            background: #333; color: #FEFAE0; border: 1px solid #606C38; padding: 4px 8px;
            border-radius: 5px; font-family: inherit;
        }
        .info {
            position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.8rem;
            background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 10px;
            backdrop-filter: blur(10px); z-index: 100; text-align: right; line-height: 1.6;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="info" id="info"></div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Type
            <select id="escType">
                <option value="anchor" selected>Anchor (Recoil)</option>
                <option value="deadbeat">Deadbeat (Graham)</option>
            </select>
        </label>
        <label>Speed
            <input type="range" id="speed" min="0.2" max="3" value="1" step="0.1">
            <span class="value" id="speedVal">1x</span>
        </label>
        <label>Teeth
            <input type="range" id="teeth" min="15" max="40" value="30" step="1">
            <span class="value" id="teethVal">30</span>
        </label>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const escSelect = document.getElementById('escType');
        const speedSlider = document.getElementById('speed');
        const teethSlider = document.getElementById('teeth');
        const speedVal = document.getElementById('speedVal');
        const teethVal = document.getElementById('teethVal');
        const infoEl = document.getElementById('info');

        let W, H;
        let wheelAngle = 0;
        let anchorAngle = 0;
        let anchorVelocity = 0;
        let time = 0;
        let lastTime = 0;
        let ticks = 0;
        let lastPalletSide = 0;
        let state = 'left'; // which pallet is engaged

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function drawEscapeWheel(cx, cy, R, numTeeth, angle) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);

            // Hub
            ctx.beginPath();
            ctx.arc(0, 0, R * 0.12, 0, Math.PI * 2);
            ctx.fillStyle = '#8A6B3E';
            ctx.fill();
            ctx.strokeStyle = '#BC6C25';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Spokes
            ctx.strokeStyle = 'rgba(188, 108, 37, 0.3)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(a) * R * 0.7, Math.sin(a) * R * 0.7);
                ctx.stroke();
            }

            // Rim
            ctx.beginPath();
            ctx.arc(0, 0, R * 0.7, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(188, 108, 37, 0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Teeth
            for (let i = 0; i < numTeeth; i++) {
                const a1 = (i / numTeeth) * Math.PI * 2;
                const a2 = ((i + 0.3) / numTeeth) * Math.PI * 2;

                ctx.beginPath();
                ctx.moveTo(Math.cos(a1) * R * 0.75, Math.sin(a1) * R * 0.75);
                ctx.lineTo(Math.cos(a1) * R, Math.sin(a1) * R);
                ctx.lineTo(Math.cos(a2) * R * 0.75, Math.sin(a2) * R * 0.75);
                ctx.fillStyle = '#DDA15E';
                ctx.fill();
                ctx.strokeStyle = '#BC6C25';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            ctx.restore();
        }

        function drawAnchor(cx, cy, wheelR, anchorAngle, escType) {
            ctx.save();
            ctx.translate(cx, cy - wheelR * 1.1);
            ctx.rotate(anchorAngle);

            const armLen = wheelR * 0.85;
            const spread = 0.35; // angular spread of anchor arms

            // Anchor shaft
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -wheelR * 0.4);
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Pivot
            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#606C38';
            ctx.fill();

            // Left pallet arm
            ctx.beginPath();
            ctx.moveTo(0, 0);
            const leftX = -Math.sin(spread) * armLen;
            const leftY = Math.cos(spread) * armLen;
            ctx.lineTo(leftX, leftY);
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Left pallet face
            if (escType === 'deadbeat') {
                // Deadbeat: curved locking face + angled impulse face
                ctx.beginPath();
                ctx.arc(leftX, leftY, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#606C38';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(leftX, leftY, 8, spread - 0.5, spread + 0.5);
                ctx.strokeStyle = '#8A9A5B';
                ctx.lineWidth = 3;
                ctx.stroke();
            } else {
                // Anchor: flat pallet
                ctx.beginPath();
                ctx.arc(leftX, leftY, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#606C38';
                ctx.fill();
            }

            // Right pallet arm
            ctx.beginPath();
            ctx.moveTo(0, 0);
            const rightX = Math.sin(spread) * armLen;
            const rightY = Math.cos(spread) * armLen;
            ctx.lineTo(rightX, rightY);
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Right pallet face
            if (escType === 'deadbeat') {
                ctx.beginPath();
                ctx.arc(rightX, rightY, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#606C38';
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.arc(rightX, rightY, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#606C38';
                ctx.fill();
            }

            ctx.restore();
        }

        function drawPendulum(cx, cy, wheelR, anchorAngle) {
            const pivotX = cx;
            const pivotY = cy - wheelR * 1.1;
            const pendLen = wheelR * 1.8;

            // Crutch fork
            ctx.beginPath();
            ctx.moveTo(pivotX, pivotY);
            ctx.lineTo(pivotX, pivotY - wheelR * 0.4);
            ctx.strokeStyle = '#8A6B3E';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Pendulum rod
            const rodEndX = pivotX + Math.sin(anchorAngle * 3) * pendLen;
            const rodEndY = pivotY - wheelR * 0.4 + Math.cos(anchorAngle * 3) * pendLen * (-1);

            // Actually draw pendulum going upward from the anchor pivot
            const pendTopX = pivotX;
            const pendTopY = pivotY - wheelR * 0.4;
            const bobX = pendTopX + Math.sin(anchorAngle * 2) * pendLen;
            const bobY = pendTopY - pendLen * Math.cos(anchorAngle * 2);

            // Suspension spring
            ctx.beginPath();
            ctx.moveTo(pendTopX, pendTopY - pendLen - 15);
            ctx.lineTo(pendTopX, pendTopY - pendLen);
            ctx.strokeStyle = '#8A6B3E';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Rod going UP
            ctx.beginPath();
            ctx.moveTo(pendTopX, pendTopY);
            ctx.lineTo(bobX, bobY);
            ctx.strokeStyle = '#BC6C25';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Bob
            ctx.beginPath();
            ctx.arc(bobX, bobY, 12, 0, Math.PI * 2);
            const bobGrad = ctx.createRadialGradient(bobX - 2, bobY - 2, 0, bobX, bobY, 12);
            bobGrad.addColorStop(0, '#DDA15E');
            bobGrad.addColorStop(1, '#8A6B3E');
            ctx.fillStyle = bobGrad;
            ctx.fill();
        }

        function simulate(dt) {
            const speed = parseFloat(speedSlider.value);
            const escType = escSelect.value;
            const numTeeth = parseInt(teethSlider.value);

            // Simple escapement simulation
            // The anchor oscillates, alternately catching and releasing escape wheel teeth
            const escapementForce = 0.002 * speed;
            const restoring = -0.5 * anchorAngle; // spring-like restoring force
            const dampingForce = -0.02 * anchorVelocity;

            // Impulse from escape wheel
            let impulse = 0;
            if (escType === 'anchor') {
                // Recoil: impulse pushes in direction of motion near center
                impulse = (anchorAngle > 0 ? -1 : 1) * escapementForce * Math.cos(anchorAngle * 5);
            } else {
                // Deadbeat: impulse only near the crossing point
                if (Math.abs(anchorAngle) < 0.05) {
                    impulse = (anchorVelocity > 0 ? 1 : -1) * escapementForce * 2;
                }
            }

            anchorVelocity += (restoring + dampingForce + impulse) * dt * 60;
            anchorAngle += anchorVelocity * dt * 60;

            // Advance escape wheel
            const toothAngle = (2 * Math.PI) / numTeeth;
            if (escType === 'anchor') {
                // Recoil: wheel advances with some backward motion
                wheelAngle += (0.001 + Math.abs(anchorVelocity) * 0.002) * speed * dt * 60;
                if (Math.abs(anchorAngle) > 0.06) {
                    wheelAngle -= 0.0003 * speed * dt * 60; // recoil
                }
            } else {
                // Deadbeat: wheel advances only during impulse
                if (Math.abs(anchorAngle) < 0.04) {
                    wheelAngle += 0.003 * speed * dt * 60;
                }
            }

            // Count ticks
            const side = anchorAngle > 0 ? 1 : -1;
            if (side !== lastPalletSide && lastPalletSide !== 0) ticks++;
            lastPalletSide = side;
        }

        function draw(timestamp) {
            const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.05) : 0.016;
            lastTime = timestamp;
            time += dt;

            speedVal.textContent = speedSlider.value + 'x';
            teethVal.textContent = teethSlider.value;

            simulate(dt);

            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const cx = W / 2;
            const cy = H / 2 + 30;
            const wheelR = Math.min(W, H) * 0.2;
            const numTeeth = parseInt(teethSlider.value);
            const escType = escSelect.value;

            // Title
            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'italic 14px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText(escType === 'anchor' ? 'Anchor Escapement (with recoil)' : 'Deadbeat Escapement (Graham, no recoil)', cx, 30);

            // Draw escape wheel
            drawEscapeWheel(cx, cy, wheelR, numTeeth, wheelAngle);

            // Draw anchor
            drawAnchor(cx, cy, wheelR, anchorAngle, escType);

            // Draw pendulum
            drawPendulum(cx, cy, wheelR, anchorAngle);

            // Tick sound indicator
            if (Math.abs(anchorAngle) < 0.01 && Math.abs(anchorVelocity) > 0.005) {
                ctx.fillStyle = 'rgba(221, 161, 94, 0.3)';
                ctx.font = '12px Georgia';
                ctx.fillText(ticks % 2 === 0 ? 'tick' : 'tock', cx + (anchorAngle > 0 ? 40 : -40), cy - wheelR * 1.1);
            }

            // Direction arrow on wheel
            ctx.save();
            ctx.translate(cx + wheelR + 20, cy);
            ctx.beginPath();
            ctx.moveTo(0, 10);
            ctx.lineTo(0, -10);
            ctx.lineTo(10, 0);
            ctx.fillStyle = 'rgba(138, 154, 91, 0.5)';
            ctx.fill();
            ctx.restore();
            ctx.fillStyle = 'rgba(138, 154, 91, 0.5)';
            ctx.font = '10px Georgia';
            ctx.textAlign = 'left';
            ctx.fillText('drive', cx + wheelR + 25, cy + 4);

            // Info
            const period = 1; // approximation
            infoEl.innerHTML =
                'Type: ' + (escType === 'anchor' ? 'Anchor (recoil)' : 'Deadbeat (Graham)') + '<br>' +
                'Teeth: ' + numTeeth + '<br>' +
                'Ticks: ' + ticks + '<br>' +
                'Anchor \u03B8: ' + (anchorAngle * 180 / Math.PI).toFixed(2) + '\u00B0<br>' +
                (escType === 'anchor' ? 'Note: Wheel recoils each tick' : 'No recoil - more accurate');

            requestAnimationFrame(draw);
        }

        window.reset = function() {
            wheelAngle = 0;
            anchorAngle = 0;
            anchorVelocity = 0;
            time = 0;
            ticks = 0;
            lastPalletSide = 0;
            speedSlider.value = 1;
            teethSlider.value = 30;
            escSelect.value = 'anchor';
        };

        requestAnimationFrame(draw);
    })();
    </script>
</body>
</html>
