<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Harmonic Series - Musical Tuning Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .info-panel {
            position: fixed; top: 10px; right: 10px; background: rgba(26,26,46,0.85);
            backdrop-filter: blur(10px); border: 1px solid #8A9A5B; border-radius: 12px;
            padding: 15px; max-width: 320px; z-index: 1000; font-size: 0.85rem; line-height: 1.4;
        }
        .info-panel h2 { color: #DDA15E; margin-bottom: 8px; font-size: 1rem; }
        .info-panel p { color: #FEFAE0; opacity: 0.8; margin-bottom: 6px; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 1000; flex-wrap: wrap; justify-content: center;
        }
        .controls button {
            background: rgba(96,108,56,0.7); border: 1px solid #8A9A5B; color: #FEFAE0;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            transition: all 0.2s;
        }
        .controls button:hover { background: rgba(138,154,91,0.8); }
        .controls button.active { background: #DDA15E; color: #1a1a2e; border-color: #DDA15E; }
        .freq-display {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            color: #DDA15E; font-size: 1.1rem; z-index: 1000; text-align: center;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info-panel">
        <h2>The Harmonic Series</h2>
        <p>Click on any harmonic to hear it. The natural overtone series is the foundation of all tuning systems.</p>
        <p>Harmonics form simple integer ratios with the fundamental: 2:1 (octave), 3:2 (fifth), 4:3 (fourth), 5:4 (major third)...</p>
    </div>
    <div class="freq-display" id="freqDisplay">Click a harmonic to play</div>
    <div class="controls">
        <button id="btnFundamental">Fundamental: A2 (110 Hz)</button>
        <button id="btnPlayAll">Play All Harmonics</button>
        <button id="btnStop">Stop</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const freqDisplay = document.getElementById('freqDisplay');
        let W, H;
        let audioCtx = null;
        let activeOscs = [];
        let harmonicCount = 16;
        let hoveredHarmonic = -1;
        let playingHarmonic = -1;
        let fundamental = 110;
        let animTime = 0;
        let running = true;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function stopAll() {
            activeOscs.forEach(o => { try { o.gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1); o.osc.stop(audioCtx.currentTime + 0.15); } catch(e){} });
            activeOscs = [];
            playingHarmonic = -1;
        }

        function playHarmonic(n) {
            initAudio();
            stopAll();
            const freq = fundamental * n;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.value = 0;
            gain.gain.linearRampToValueAtTime(0.3 / Math.sqrt(n), audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            activeOscs.push({ osc, gain });
            playingHarmonic = n;
            freqDisplay.textContent = `Harmonic ${n}: ${freq.toFixed(1)} Hz (${getIntervalName(n)})`;
        }

        function playAllHarmonics() {
            initAudio();
            stopAll();
            for (let n = 1; n <= harmonicCount; n++) {
                const freq = fundamental * n;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.value = 0.15 / n;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                activeOscs.push({ osc, gain });
            }
            playingHarmonic = -2;
            freqDisplay.textContent = 'Playing all harmonics (rich timbre)';
        }

        function getIntervalName(n) {
            const names = { 1:'Fundamental', 2:'Octave', 3:'P5+Oct', 4:'2nd Oct', 5:'Maj 3rd+2Oct',
                6:'P5+2Oct', 7:'~m7+2Oct', 8:'3rd Oct', 9:'Maj 2nd+3Oct', 10:'Maj 3rd+3Oct',
                11:'~Tritone+3Oct', 12:'P5+3Oct', 13:'~m6+3Oct', 14:'~m7+3Oct', 15:'Maj 7th+3Oct', 16:'4th Oct' };
            return names[n] || `Harmonic ${n}`;
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function drawWave(x, y, w, h, freq, amp, color, alpha) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.globalAlpha = alpha;
            ctx.lineWidth = 2;
            for (let i = 0; i <= w; i++) {
                const t = i / w;
                const val = Math.sin(2 * Math.PI * freq * t + animTime * freq * 0.5) * amp;
                if (i === 0) ctx.moveTo(x + i, y + h/2 + val * h/2);
                else ctx.lineTo(x + i, y + h/2 + val * h/2);
            }
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const marginTop = 60;
            const marginBottom = 120;
            const rowH = (H - marginTop - marginBottom) / harmonicCount;
            const barW = W * 0.6;
            const barX = W * 0.15;

            for (let n = 1; n <= harmonicCount; n++) {
                const y = marginTop + (n - 1) * rowH;
                const isHovered = hoveredHarmonic === n;
                const isPlaying = playingHarmonic === n || playingHarmonic === -2;

                // Background bar
                ctx.fillStyle = isHovered ? 'rgba(138,154,91,0.15)' : 'rgba(255,255,255,0.03)';
                ctx.fillRect(barX - 10, y, barW + 20, rowH - 2);

                // Harmonic number
                ctx.fillStyle = isPlaying ? '#DDA15E' : '#8A9A5B';
                ctx.font = `bold ${Math.min(rowH * 0.6, 16)}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'right';
                ctx.fillText(`${n}`, barX - 20, y + rowH * 0.65);

                // Frequency label
                ctx.fillStyle = '#FEFAE0';
                ctx.globalAlpha = 0.6;
                ctx.font = `${Math.min(rowH * 0.45, 12)}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'left';
                ctx.fillText(`${(fundamental * n).toFixed(0)} Hz`, barX + barW + 15, y + rowH * 0.65);
                ctx.globalAlpha = 1;

                // Ratio
                ctx.fillStyle = '#DDA15E';
                ctx.globalAlpha = 0.5;
                ctx.textAlign = 'left';
                ctx.fillText(`${n}:1`, barX + barW + 70, y + rowH * 0.65);
                ctx.globalAlpha = 1;

                // Wave
                const amp = 1 / n;
                const alpha = isPlaying ? 0.9 : (isHovered ? 0.7 : 0.4);
                const color = isPlaying ? '#DDA15E' : (isHovered ? '#8A9A5B' : '#606C38');
                drawWave(barX, y, barW, rowH - 2, n, amp, color, alpha);
            }

            // Title
            ctx.fillStyle = '#8A9A5B';
            ctx.font = 'bold 18px "Segoe UI", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('THE HARMONIC SERIES', barX, 40);
        }

        function animate() {
            if (!running) { requestAnimationFrame(animate); return; }
            animTime += 0.016;
            draw();
            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mousemove', (e) => {
            const marginTop = 60;
            const marginBottom = 120;
            const rowH = (H - marginTop - marginBottom) / harmonicCount;
            const n = Math.floor((e.clientY - marginTop) / rowH) + 1;
            hoveredHarmonic = (n >= 1 && n <= harmonicCount) ? n : -1;
            canvas.style.cursor = hoveredHarmonic > 0 ? 'pointer' : 'default';
        });

        canvas.addEventListener('click', (e) => {
            if (hoveredHarmonic > 0) playHarmonic(hoveredHarmonic);
        });

        document.getElementById('btnFundamental').addEventListener('click', () => {
            fundamental = fundamental === 110 ? 220 : (fundamental === 220 ? 55 : 110);
            document.getElementById('btnFundamental').textContent = `Fundamental: ${fundamental === 110 ? 'A2 (110 Hz)' : (fundamental === 220 ? 'A3 (220 Hz)' : 'A1 (55 Hz)')}`;
        });

        document.getElementById('btnPlayAll').addEventListener('click', playAllHarmonics);
        document.getElementById('btnStop').addEventListener('click', () => { stopAll(); freqDisplay.textContent = 'Click a harmonic to play'; });

        window.addEventListener('resize', resize);
        resize();
        animate();

        window.reset = function() {
            stopAll();
            fundamental = 110;
            hoveredHarmonic = -1;
            playingHarmonic = -1;
            animTime = 0;
            freqDisplay.textContent = 'Click a harmonic to play';
            document.getElementById('btnFundamental').textContent = 'Fundamental: A2 (110 Hz)';
        };
    })();
    </script>
</body>
</html>
