<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clay Shrinkage Stages - Drying Curve Simulation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: Georgia, serif; overflow: hidden; }
        canvas { display: block; }
        a { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; align-items: center; z-index: 100;
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid #8A9A5B33;
        }
        .controls label { font-size: 0.8rem; }
        .controls input[type="range"] { width: 100px; accent-color: #DDA15E; }
        .controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 8px 14px;
            border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        .controls button:hover { background: #8A9A5B; }
        .controls select {
            background: #333; color: #FEFAE0; border: 1px solid #606C38;
            padding: 6px 10px; border-radius: 6px; font-size: 0.8rem; font-family: Georgia;
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Clay Type:</label>
        <select id="clayType">
            <option value="earthenware">Earthenware</option>
            <option value="stoneware" selected>Stoneware</option>
            <option value="porcelain">Porcelain</option>
        </select>
        <label>Humidity %</label>
        <input type="range" id="humiditySlider" min="10" max="90" value="40">
        <label>Speed</label>
        <input type="range" id="speedSlider" min="1" max="20" value="5">
        <button id="startBtn">Start Drying</button>
        <button id="resetBtn">Reset</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        const clayTypes = {
            earthenware: { shrinkage: 0.07, waterContent: 0.25, color: [180, 100, 70], name: 'Earthenware' },
            stoneware: { shrinkage: 0.06, waterContent: 0.22, color: [140, 100, 80], name: 'Stoneware' },
            porcelain: { shrinkage: 0.12, waterContent: 0.28, color: [220, 210, 200], name: 'Porcelain' }
        };

        // 7 stages of clay
        const stages = [
            { name: 'Wet/Plastic', maxWater: 1.0, minWater: 0.75, color: '#6a5a4a', desc: 'Freshly thrown, fully workable' },
            { name: 'Soft Leather-Hard', maxWater: 0.75, minWater: 0.55, color: '#7a6a5a', desc: 'Can still join pieces' },
            { name: 'Leather-Hard', maxWater: 0.55, minWater: 0.40, color: '#8a7a6a', desc: 'Firm like cheese, ideal for trimming' },
            { name: 'Stiff Leather-Hard', maxWater: 0.40, minWater: 0.25, color: '#9a8a7a', desc: 'Hard to deform, can still carve' },
            { name: 'Almost Dry', maxWater: 0.25, minWater: 0.10, color: '#aa9a8a', desc: 'Color lightening, fragile' },
            { name: 'Bone Dry', maxWater: 0.10, minWater: 0.02, color: '#bbaa99', desc: 'All free water gone, very fragile' },
            { name: 'Bisque Ready', maxWater: 0.02, minWater: 0.0, color: '#ccbbaa', desc: 'Ready for kiln' }
        ];

        let waterContent = 1.0; // 0-1, fraction of initial water
        let drying = false;
        let time = 0;
        let shrinkHistory = [];
        let waterHistory = [];
        let animId;
        let crackRisk = 0;

        function initState() {
            waterContent = 1.0;
            drying = false;
            time = 0;
            shrinkHistory = [{ t: 0, s: 0 }];
            waterHistory = [{ t: 0, w: 1.0 }];
            crackRisk = 0;
            document.getElementById('startBtn').textContent = 'Start Drying';
        }
        initState();

        document.getElementById('startBtn').addEventListener('click', () => {
            if (!drying) { drying = true; document.getElementById('startBtn').textContent = 'Pause'; }
            else { drying = false; document.getElementById('startBtn').textContent = 'Resume'; }
        });
        document.getElementById('resetBtn').addEventListener('click', initState);

        function getCurrentStage() {
            for (let i = 0; i < stages.length; i++) {
                if (waterContent >= stages[i].minWater && waterContent <= stages[i].maxWater) return i;
            }
            return stages.length - 1;
        }

        function updateDrying() {
            if (!drying || waterContent <= 0) return;

            const speed = parseFloat(document.getElementById('speedSlider').value);
            const humidity = parseFloat(document.getElementById('humiditySlider').value) / 100;
            const type = clayTypes[document.getElementById('clayType').value];

            // Drying rate depends on humidity, clay type, and current water content
            const evapRate = (1 - humidity) * 0.002 * speed * (0.3 + waterContent * 0.7);
            waterContent = Math.max(0, waterContent - evapRate);
            time += speed * 0.02;

            // Crack risk increases with fast drying and high water content
            if (evapRate > 0.005 && waterContent > 0.3) {
                crackRisk = Math.min(1, crackRisk + evapRate * 0.5);
            } else {
                crackRisk = Math.max(0, crackRisk - 0.001);
            }

            // Record history
            const shrinkage = (1 - waterContent) * type.shrinkage;
            if (shrinkHistory.length === 0 || time - shrinkHistory[shrinkHistory.length - 1].t > 0.1) {
                shrinkHistory.push({ t: time, s: shrinkage });
                waterHistory.push({ t: time, w: waterContent });
            }
        }

        function drawPot(cx, cy, water) {
            const type = clayTypes[document.getElementById('clayType').value];
            const shrink = (1 - water) * type.shrinkage;
            const scale = 1 - shrink;

            const potW = 100 * scale;
            const potH = 140 * scale;

            ctx.save();
            ctx.translate(cx, cy);

            // Determine color based on water content
            const baseColor = type.color;
            const dryFactor = 1 - water;
            const r = Math.min(255, baseColor[0] + dryFactor * 60);
            const g = Math.min(255, baseColor[1] + dryFactor * 50);
            const b = Math.min(255, baseColor[2] + dryFactor * 40);

            // Pot body
            ctx.beginPath();
            ctx.moveTo(-potW * 0.4, 0);
            ctx.quadraticCurveTo(-potW * 0.6, -potH * 0.3, -potW * 0.5, -potH * 0.6);
            ctx.quadraticCurveTo(-potW * 0.3, -potH, 0, -potH);
            ctx.quadraticCurveTo(potW * 0.3, -potH, potW * 0.5, -potH * 0.6);
            ctx.quadraticCurveTo(potW * 0.6, -potH * 0.3, potW * 0.4, 0);
            ctx.closePath();
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fill();
            ctx.strokeStyle = `rgb(${r - 30},${g - 30},${b - 30})`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Water sheen on wet clay
            if (water > 0.5) {
                ctx.globalAlpha = (water - 0.5) * 0.4;
                ctx.beginPath();
                ctx.ellipse(-potW * 0.1, -potH * 0.5, potW * 0.25, potH * 0.15, -0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(180,200,220,0.5)';
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            // Cracks if drying too fast
            if (crackRisk > 0.5) {
                const numCracks = Math.floor((crackRisk - 0.5) * 10);
                ctx.strokeStyle = `rgba(50,30,20,${crackRisk})`;
                ctx.lineWidth = 1;
                for (let i = 0; i < numCracks; i++) {
                    const startX = (Math.sin(i * 3.7) * 0.5) * potW * 0.5;
                    const startY = -potH * (0.3 + Math.cos(i * 2.3) * 0.3);
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(startX + (Math.sin(i * 5) * 15), startY + 15);
                    ctx.stroke();
                }
            }

            // Size label
            ctx.fillStyle = '#888';
            ctx.font = '11px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText(`${(scale * 100).toFixed(1)}% of original`, 0, 20);

            ctx.restore();
        }

        function drawStageIndicator(x, y, w) {
            const stageIdx = getCurrentStage();
            const barH = 24;

            ctx.fillStyle = '#8A9A5B';
            ctx.font = '13px Georgia';
            ctx.textAlign = 'left';
            ctx.fillText('Drying Stages:', x, y - 8);

            stages.forEach((stage, i) => {
                const sx = x;
                const sy = y + i * (barH + 4);
                const sw = w;

                ctx.fillStyle = i === stageIdx ? '#606C38' : '#2a2a2a';
                ctx.fillRect(sx, sy, sw, barH);

                if (i === stageIdx) {
                    ctx.strokeStyle = '#DDA15E';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(sx, sy, sw, barH);
                }

                ctx.fillStyle = i === stageIdx ? '#FEFAE0' : '#666';
                ctx.font = i === stageIdx ? 'bold 11px Georgia' : '11px Georgia';
                ctx.textAlign = 'left';
                ctx.fillText(stage.name, sx + 8, sy + 16);

                if (i === stageIdx) {
                    ctx.font = 'italic 10px Georgia';
                    ctx.fillStyle = '#DDA15E';
                    ctx.textAlign = 'right';
                    ctx.fillText(stage.desc, sx + sw - 8, sy + 16);
                }
            });
        }

        function drawChart(x, y, w, h) {
            ctx.fillStyle = 'rgba(30,30,30,0.7)';
            ctx.fillRect(x, y, w, h);

            ctx.fillStyle = '#8A9A5B';
            ctx.font = '12px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Shrinkage & Water Content vs Time', x + w / 2, y + 16);

            const plotX = x + 40;
            const plotW = w - 60;
            const plotY = y + 28;
            const plotH = h - 48;
            const maxTime = Math.max(time, 5);

            // Grid
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 0.5;
            for (let v = 0.2; v <= 1; v += 0.2) {
                const vy = plotY + plotH - v * plotH;
                ctx.beginPath(); ctx.moveTo(plotX, vy); ctx.lineTo(plotX + plotW, vy); ctx.stroke();
                ctx.fillStyle = '#666';
                ctx.font = '9px Georgia';
                ctx.textAlign = 'right';
                ctx.fillText(`${(v * 100).toFixed(0)}%`, plotX - 4, vy + 3);
            }

            // Water content curve (blue)
            if (waterHistory.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = '#5588aa';
                ctx.lineWidth = 2;
                waterHistory.forEach((pt, i) => {
                    const px = plotX + (pt.t / maxTime) * plotW;
                    const py = plotY + plotH - pt.w * plotH;
                    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                });
                ctx.stroke();
            }

            // Shrinkage curve (orange)
            const type = clayTypes[document.getElementById('clayType').value];
            if (shrinkHistory.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = '#DDA15E';
                ctx.lineWidth = 2;
                shrinkHistory.forEach((pt, i) => {
                    const px = plotX + (pt.t / maxTime) * plotW;
                    const py = plotY + plotH - (pt.s / type.shrinkage) * plotH;
                    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                });
                ctx.stroke();
            }

            // Legend
            ctx.fillStyle = '#5588aa';
            ctx.fillRect(plotX + plotW - 120, plotY + 4, 10, 10);
            ctx.fillStyle = '#FEFAE0';
            ctx.font = '10px Georgia';
            ctx.textAlign = 'left';
            ctx.fillText('Water', plotX + plotW - 106, plotY + 13);

            ctx.fillStyle = '#DDA15E';
            ctx.fillRect(plotX + plotW - 60, plotY + 4, 10, 10);
            ctx.fillStyle = '#FEFAE0';
            ctx.fillText('Shrink', plotX + plotW - 46, plotY + 13);
        }

        function animate() {
            animId = requestAnimationFrame(animate);
            updateDrying();

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, W, H);

            // Title
            ctx.fillStyle = '#8A9A5B';
            ctx.font = '24px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Clay Shrinkage Stages', W / 2, 40);
            ctx.font = '14px Georgia';
            ctx.fillStyle = '#FEFAE0';
            ctx.fillText('Watch clay shrink as water evaporates through 7 drying stages', W / 2, 62);

            // Pot visualization
            drawPot(W * 0.35, H * 0.45, waterContent);

            // Water content bar
            const barX = W * 0.35 - 60, barY = H * 0.55;
            ctx.fillStyle = '#333';
            ctx.fillRect(barX, barY, 120, 16);
            ctx.fillStyle = '#5588aa';
            ctx.fillRect(barX, barY, 120 * waterContent, 16);
            ctx.strokeStyle = '#555';
            ctx.strokeRect(barX, barY, 120, 16);
            ctx.fillStyle = '#FEFAE0';
            ctx.font = '10px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText(`Water: ${(waterContent * 100).toFixed(1)}%`, barX + 60, barY + 12);

            // Crack risk
            if (crackRisk > 0.2) {
                ctx.fillStyle = `rgba(180,50,50,${crackRisk})`;
                ctx.font = '12px Georgia';
                ctx.fillText(`Crack Risk: ${(crackRisk * 100).toFixed(0)}%`, W * 0.35, barY + 36);
            }

            // Stage indicator (right side)
            drawStageIndicator(W * 0.6, 90, W * 0.35);

            // Chart at bottom
            drawChart(W * 0.05, H * 0.65, W * 0.9, H * 0.25);
        }

        animate();

        window.reset = function() { initState(); };
    </script>
</body>
</html>
