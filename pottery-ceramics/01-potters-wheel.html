<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potter's Wheel - Centripetal Force Clay Forming</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: Georgia, serif; overflow: hidden; }
        canvas { display: block; }
        a { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center; z-index: 100;
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 12px 24px; border-radius: 12px; border: 1px solid #8A9A5B33;
        }
        .controls label { font-size: 0.85rem; color: #FEFAE0; }
        .controls input[type="range"] { width: 120px; accent-color: #8A9A5B; }
        .controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-size: 0.85rem;
        }
        .controls button:hover { background: #8A9A5B; }
        .info {
            position: fixed; top: 10px; right: 10px; font-size: 0.8rem;
            color: #8A9A5B; text-align: right; z-index: 100;
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 10px 14px; border-radius: 8px;
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <div class="info" id="info">
        RPM: <span id="rpmDisplay">0</span><br>
        Force: <span id="forceDisplay">0</span> N<br>
        Height: <span id="heightDisplay">0</span> cm<br>
        Click &amp; drag on clay to shape
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Wheel Speed</label>
        <input type="range" id="speedSlider" min="0" max="120" value="60">
        <label>Hand Pressure</label>
        <input type="range" id="pressureSlider" min="0" max="100" value="50">
        <button id="centerBtn">Center Clay</button>
        <button id="resetBtn">Reset</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const speedSlider = document.getElementById('speedSlider');
        const pressureSlider = document.getElementById('pressureSlider');

        let W, H;
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Clay profile - array of {r, y} points from bottom to top
        const NUM_POINTS = 40;
        let clayProfile = [];
        let wheelAngle = 0;
        let rpm = 60;
        let centered = false;
        let centerOffset = { x: 0, y: 0 };
        let wobble = 5;
        let mouseDown = false;
        let mouseX = 0, mouseY = 0;
        let animId;

        function initClay() {
            clayProfile = [];
            const baseR = 60;
            const topR = 55;
            const height = 80;
            for (let i = 0; i < NUM_POINTS; i++) {
                const t = i / (NUM_POINTS - 1);
                const r = baseR + (topR - baseR) * t * 0.5;
                clayProfile.push({ r: r, y: height * t });
            }
            centered = false;
            wobble = 5;
            centerOffset = { x: (Math.random() - 0.5) * 8, y: 0 };
        }
        initClay();

        canvas.addEventListener('mousedown', (e) => { mouseDown = true; mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('mouseup', () => { mouseDown = false; });
        canvas.addEventListener('touchstart', (e) => { mouseDown = true; const t = e.touches[0]; mouseX = t.clientX; mouseY = t.clientY; e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { const t = e.touches[0]; mouseX = t.clientX; mouseY = t.clientY; e.preventDefault(); });
        canvas.addEventListener('touchend', () => { mouseDown = false; });

        document.getElementById('centerBtn').addEventListener('click', () => {
            centered = true;
            wobble = 0.5;
            centerOffset = { x: 0, y: 0 };
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            initClay();
        });

        function drawWheel(cx, cy, angle) {
            // Wheel base (ellipse for 3D effect)
            const wheelR = 160;
            const wheelH = 20;
            ctx.save();
            ctx.translate(cx, cy);

            // Wheel surface
            ctx.beginPath();
            ctx.ellipse(0, 0, wheelR, wheelR * 0.3, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#5a5a5a';
            ctx.fill();
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Radial lines for rotation indication
            for (let i = 0; i < 12; i++) {
                const a = angle + (i / 12) * Math.PI * 2;
                const x1 = Math.cos(a) * 30;
                const y1 = Math.sin(a) * 30 * 0.3;
                const x2 = Math.cos(a) * wheelR * 0.9;
                const y2 = Math.sin(a) * wheelR * 0.9 * 0.3;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = 'rgba(138,154,91,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Center dot
            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#8A9A5B';
            ctx.fill();

            ctx.restore();
        }

        function drawClay(cx, cy, angle) {
            const perspective = 0.3;
            const pressure = pressureSlider.value / 100;

            // Compute wobble offset
            const wX = centerOffset.x + Math.sin(angle * 3) * wobble;
            const wY = centerOffset.y + Math.cos(angle * 2) * wobble * 0.3;

            // Apply mouse shaping if pressed
            if (mouseDown && rpm > 5) {
                const clayBaseY = cy;
                for (let i = 0; i < NUM_POINTS; i++) {
                    const ptY = clayBaseY - clayProfile[i].y * 2;
                    const ptX = cx + wX;
                    const dx = mouseX - ptX;
                    const dy = mouseY - ptY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < clayProfile[i].r + 40) {
                        const influence = Math.max(0, 1 - dist / (clayProfile[i].r + 40));
                        // Push inward = narrow, pull up = taller
                        if (dx * dx > dy * dy) {
                            // Horizontal: narrow the clay
                            clayProfile[i].r = Math.max(10, clayProfile[i].r - influence * pressure * 0.8);
                            // Conservation: push material up
                            if (i < NUM_POINTS - 1) {
                                clayProfile[i + 1].y += influence * pressure * 0.15;
                            }
                        } else if (mouseY < ptY) {
                            // Pulling up
                            if (i > NUM_POINTS / 2) {
                                clayProfile[i].y += influence * pressure * 0.3;
                                clayProfile[i].r = Math.max(8, clayProfile[i].r - influence * pressure * 0.2);
                            }
                        }
                    }
                }

                // Reduce wobble when shaping with speed
                if (wobble > 0.5) wobble *= 0.998;
            }

            ctx.save();
            ctx.translate(cx + wX, cy + wY);

            // Draw clay body as a series of ellipses from bottom to top
            for (let i = NUM_POINTS - 1; i >= 0; i--) {
                const pt = clayProfile[i];
                const y = -pt.y * 2;
                const rotatedR = pt.r + Math.sin(angle * 4 + i * 0.1) * wobble * 0.3;

                // Clay body fill
                ctx.beginPath();
                ctx.ellipse(0, y, rotatedR, rotatedR * perspective, 0, 0, Math.PI * 2);

                // Gradient from earthy brown to lighter
                const t = i / NUM_POINTS;
                const r = Math.floor(160 + t * 40);
                const g = Math.floor(100 + t * 30);
                const b = Math.floor(70 + t * 20);
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.fill();

                // Subtle highlight
                if (i % 3 === 0) {
                    ctx.beginPath();
                    ctx.ellipse(0, y, rotatedR, rotatedR * perspective, 0, 0, Math.PI);
                    ctx.strokeStyle = `rgba(221,161,94,${0.1 + t * 0.15})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }

            // Top rim highlight
            const top = clayProfile[NUM_POINTS - 1];
            ctx.beginPath();
            ctx.ellipse(0, -top.y * 2, top.r, top.r * perspective, 0, 0, Math.PI * 2);
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = 'rgba(221,161,94,0.3)';
            ctx.fill();

            ctx.restore();
        }

        function drawHands(cx, cy) {
            if (!mouseDown) return;
            // Simple hand indicators
            ctx.save();
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 15, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(221,161,94,0.3)';
            ctx.fill();
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Pressure indicator
            const pressure = pressureSlider.value / 100;
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 15 * pressure, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(138,154,91,0.5)';
            ctx.fill();
            ctx.restore();
        }

        function drawWaterSplash(cx, cy, angle) {
            if (rpm < 20) return;
            const splashCount = Math.floor(rpm / 15);
            ctx.save();
            for (let i = 0; i < splashCount; i++) {
                const a = angle * 2 + i * 1.5;
                const r = 100 + Math.sin(a) * 30;
                const x = cx + Math.cos(a) * r;
                const y = cy + Math.sin(a) * r * 0.3 - 20;
                ctx.beginPath();
                ctx.arc(x, y, 1 + Math.random() * 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(150,180,200,0.3)';
                ctx.fill();
            }
            ctx.restore();
        }

        function animate() {
            animId = requestAnimationFrame(animate);
            rpm = parseFloat(speedSlider.value);
            const rps = rpm / 60;
            wheelAngle += rps * 0.05;

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, W, H);

            const cx = W / 2;
            const cy = H * 0.6;

            // Title
            ctx.fillStyle = '#8A9A5B';
            ctx.font = '24px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText("Potter's Wheel", cx, 40);
            ctx.font = '14px Georgia';
            ctx.fillStyle = '#FEFAE0';
            ctx.fillText('Centripetal force shapes clay on the spinning wheel', cx, 65);

            drawWheel(cx, cy, wheelAngle);
            drawWaterSplash(cx, cy, wheelAngle);
            drawClay(cx, cy, wheelAngle);
            drawHands(cx, cy);

            // Update info
            const totalHeight = clayProfile[NUM_POINTS - 1].y * 2;
            const centripForce = (0.5 * (rpm * 2 * Math.PI / 60) ** 2 * 0.06 * clayProfile[Math.floor(NUM_POINTS / 2)].r / 100).toFixed(2);
            document.getElementById('rpmDisplay').textContent = rpm.toFixed(0);
            document.getElementById('forceDisplay').textContent = centripForce;
            document.getElementById('heightDisplay').textContent = (totalHeight / 10).toFixed(1);
        }

        animate();

        window.reset = function() {
            initClay();
            speedSlider.value = 60;
            pressureSlider.value = 50;
        };
    </script>
</body>
</html>
