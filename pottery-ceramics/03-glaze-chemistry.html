<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glaze Chemistry Lab - Seger Unity Molecular Formula</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: Georgia, serif; overflow: hidden; }
        canvas { display: block; }
        a { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .panel {
            position: fixed; right: 20px; top: 60px; width: 280px;
            background: rgba(30,30,30,0.9); backdrop-filter: blur(10px);
            padding: 16px; border-radius: 12px; border: 1px solid #8A9A5B33;
            z-index: 100; max-height: calc(100vh - 120px); overflow-y: auto;
        }
        .panel h3 { color: #8A9A5B; font-size: 0.95rem; margin-bottom: 8px; }
        .oxide-row {
            display: flex; align-items: center; justify-content: space-between;
            margin: 4px 0; font-size: 0.8rem;
        }
        .oxide-row label { flex: 1; }
        .oxide-row input {
            width: 60px; background: #333; border: 1px solid #606C38;
            color: #FEFAE0; padding: 4px 6px; border-radius: 4px;
            text-align: right; font-size: 0.8rem;
        }
        .oxide-row .bar {
            width: 60px; height: 8px; background: #333; border-radius: 4px;
            margin-left: 8px; overflow: hidden;
        }
        .oxide-row .bar-fill { height: 100%; border-radius: 4px; }
        .section-label {
            color: #DDA15E; font-size: 0.75rem; margin-top: 10px;
            border-top: 1px solid #333; padding-top: 6px;
        }
        .preset-btn {
            background: #606C38; color: #FEFAE0; border: none; padding: 5px 10px;
            border-radius: 4px; cursor: pointer; font-size: 0.75rem; margin: 2px;
        }
        .preset-btn:hover { background: #8A9A5B; }
        .result-box {
            background: rgba(96,108,56,0.2); border: 1px solid #606C38;
            border-radius: 6px; padding: 8px; margin-top: 8px; font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="panel" id="panel">
        <h3>Glaze Mixer (UMF)</h3>
        <div>
            <button class="preset-btn" onclick="loadPreset('clear')">Clear Gloss</button>
            <button class="preset-btn" onclick="loadPreset('matte')">Matte</button>
            <button class="preset-btn" onclick="loadPreset('celadon')">Celadon</button>
            <button class="preset-btn" onclick="loadPreset('tenmoku')">Tenmoku</button>
        </div>

        <p class="section-label">Fluxes (Unity = 1.0)</p>
        <div class="oxide-row">
            <label>KNaO</label>
            <input type="number" step="0.01" min="0" max="1" value="0.30" data-oxide="KNaO">
            <div class="bar"><div class="bar-fill" style="background:#DDA15E"></div></div>
        </div>
        <div class="oxide-row">
            <label>CaO</label>
            <input type="number" step="0.01" min="0" max="1" value="0.50" data-oxide="CaO">
            <div class="bar"><div class="bar-fill" style="background:#BC6C25"></div></div>
        </div>
        <div class="oxide-row">
            <label>MgO</label>
            <input type="number" step="0.01" min="0" max="1" value="0.10" data-oxide="MgO">
            <div class="bar"><div class="bar-fill" style="background:#8A9A5B"></div></div>
        </div>
        <div class="oxide-row">
            <label>ZnO</label>
            <input type="number" step="0.01" min="0" max="1" value="0.10" data-oxide="ZnO">
            <div class="bar"><div class="bar-fill" style="background:#606C38"></div></div>
        </div>

        <p class="section-label">Stabilizers</p>
        <div class="oxide-row">
            <label>Al₂O₃</label>
            <input type="number" step="0.01" min="0" max="2" value="0.40" data-oxide="Al2O3">
            <div class="bar"><div class="bar-fill" style="background:#aaa"></div></div>
        </div>

        <p class="section-label">Glass Formers</p>
        <div class="oxide-row">
            <label>SiO₂</label>
            <input type="number" step="0.1" min="0" max="10" value="3.50" data-oxide="SiO2">
            <div class="bar"><div class="bar-fill" style="background:#7aa"></div></div>
        </div>
        <div class="oxide-row">
            <label>B₂O₃</label>
            <input type="number" step="0.01" min="0" max="2" value="0.00" data-oxide="B2O3">
            <div class="bar"><div class="bar-fill" style="background:#a7a"></div></div>
        </div>

        <p class="section-label">Colorants (wt%)</p>
        <div class="oxide-row">
            <label>Fe₂O₃</label>
            <input type="number" step="0.5" min="0" max="15" value="0" data-oxide="Fe2O3">
            <div class="bar"><div class="bar-fill" style="background:#a44"></div></div>
        </div>
        <div class="oxide-row">
            <label>CuO</label>
            <input type="number" step="0.5" min="0" max="10" value="0" data-oxide="CuO">
            <div class="bar"><div class="bar-fill" style="background:#4a8"></div></div>
        </div>
        <div class="oxide-row">
            <label>CoO</label>
            <input type="number" step="0.1" min="0" max="5" value="0" data-oxide="CoO">
            <div class="bar"><div class="bar-fill" style="background:#44a"></div></div>
        </div>

        <div class="result-box" id="resultBox">
            Si:Al ratio: --<br>
            Flux unity: --<br>
            Surface: --<br>
            Est. cone: --
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let W, H;
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const presets = {
            clear: { KNaO: 0.25, CaO: 0.55, MgO: 0.10, ZnO: 0.10, Al2O3: 0.40, SiO2: 3.50, B2O3: 0, Fe2O3: 0, CuO: 0, CoO: 0 },
            matte: { KNaO: 0.20, CaO: 0.60, MgO: 0.15, ZnO: 0.05, Al2O3: 0.55, SiO2: 3.00, B2O3: 0, Fe2O3: 0, CuO: 0, CoO: 0 },
            celadon: { KNaO: 0.25, CaO: 0.55, MgO: 0.10, ZnO: 0.10, Al2O3: 0.40, SiO2: 3.50, B2O3: 0, Fe2O3: 2.0, CuO: 0, CoO: 0 },
            tenmoku: { KNaO: 0.20, CaO: 0.60, MgO: 0.10, ZnO: 0.10, Al2O3: 0.35, SiO2: 3.20, B2O3: 0, Fe2O3: 8.0, CuO: 0, CoO: 0 }
        };

        function getOxideValues() {
            const vals = {};
            document.querySelectorAll('[data-oxide]').forEach(inp => {
                vals[inp.dataset.oxide] = parseFloat(inp.value) || 0;
            });
            return vals;
        }

        function setOxideValues(vals) {
            document.querySelectorAll('[data-oxide]').forEach(inp => {
                if (vals[inp.dataset.oxide] !== undefined) {
                    inp.value = vals[inp.dataset.oxide];
                }
            });
        }

        window.loadPreset = function(name) {
            setOxideValues(presets[name]);
        };

        function computeGlazeProperties(vals) {
            const fluxTotal = vals.KNaO + vals.CaO + vals.MgO + vals.ZnO;
            const siAlRatio = vals.Al2O3 > 0 ? (vals.SiO2 / vals.Al2O3).toFixed(2) : '--';

            // Surface texture estimation
            let surface = 'Glossy';
            if (vals.Al2O3 > 0.5 && vals.SiO2 / vals.Al2O3 < 7) surface = 'Satin Matte';
            if (vals.Al2O3 > 0.6) surface = 'Matte';
            if (vals.MgO > 0.3) surface = 'Dry Matte';
            if (vals.ZnO > 0.3 && vals.SiO2 > 4) surface = 'Crystal Potential';

            // Estimated cone
            let cone = '6';
            if (vals.KNaO > 0.4 || vals.B2O3 > 0.3) cone = '04-02';
            else if (vals.CaO > 0.5 && vals.SiO2 > 4) cone = '8-10';
            else if (vals.SiO2 > 3.5 && vals.Al2O3 > 0.4) cone = '6-8';

            // Base color from colorants
            let r = 230, g = 220, b = 200; // base cream
            // Iron: amber/brown
            r -= vals.Fe2O3 * 8; g -= vals.Fe2O3 * 12; b -= vals.Fe2O3 * 15;
            // Copper: green
            r -= vals.CuO * 15; g += vals.CuO * 8; b -= vals.CuO * 5;
            // Cobalt: blue
            r -= vals.CoO * 20; g -= vals.CoO * 10; b += vals.CoO * 25;

            r = Math.max(20, Math.min(255, r));
            g = Math.max(20, Math.min(255, g));
            b = Math.max(20, Math.min(255, b));

            return { fluxTotal, siAlRatio, surface, cone, color: { r, g, b } };
        }

        function updateBars() {
            const vals = getOxideValues();
            const rows = document.querySelectorAll('.oxide-row');
            rows.forEach(row => {
                const inp = row.querySelector('input');
                const fill = row.querySelector('.bar-fill');
                if (!inp || !fill) return;
                const val = parseFloat(inp.value) || 0;
                const max = parseFloat(inp.max) || 1;
                fill.style.width = (val / max * 100) + '%';
            });
        }

        function drawGlazeSample(cx, cy, props) {
            const { color } = props;
            const r = 80;

            // Bowl shape
            ctx.save();
            ctx.translate(cx, cy);

            // Bowl exterior
            ctx.beginPath();
            ctx.ellipse(0, 0, r * 1.3, r * 0.5, 0, 0, Math.PI);
            ctx.lineTo(-r * 1.1, 0);
            ctx.ellipse(0, 0, r * 1.1, r * 0.4, 0, Math.PI, 0);
            ctx.closePath();
            ctx.fillStyle = '#8a7a6a';
            ctx.fill();

            // Glaze interior
            ctx.beginPath();
            ctx.ellipse(0, 0, r * 1.1, r * 0.4, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgb(${color.r},${color.g},${color.b})`;
            ctx.fill();

            // Surface texture highlight
            if (props.surface === 'Glossy') {
                ctx.beginPath();
                ctx.ellipse(-r * 0.3, -r * 0.1, r * 0.4, r * 0.15, -0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.25)';
                ctx.fill();
            } else if (props.surface === 'Satin Matte') {
                ctx.beginPath();
                ctx.ellipse(0, 0, r * 0.5, r * 0.15, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fill();
            }

            ctx.restore();
        }

        function drawSegerDiagram(x, y, w, h, vals) {
            ctx.fillStyle = 'rgba(30,30,30,0.6)';
            ctx.fillRect(x, y, w, h);

            ctx.fillStyle = '#8A9A5B';
            ctx.font = 'bold 13px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Seger Formula (UMF)', x + w / 2, y + 18);

            const cols = [x + w * 0.2, x + w * 0.5, x + w * 0.8];
            const colLabels = ['Fluxes (R₂O/RO)', 'Stabilizers (R₂O₃)', 'Glass Formers (RO₂)'];

            ctx.font = '10px Georgia';
            ctx.fillStyle = '#DDA15E';
            colLabels.forEach((label, i) => {
                ctx.fillText(label, cols[i], y + 36);
            });

            ctx.font = '14px Georgia';
            ctx.fillStyle = '#FEFAE0';

            // Fluxes column
            const fluxes = [
                { name: 'KNaO', val: vals.KNaO },
                { name: 'CaO', val: vals.CaO },
                { name: 'MgO', val: vals.MgO },
                { name: 'ZnO', val: vals.ZnO }
            ];
            fluxes.forEach((f, i) => {
                if (f.val > 0) {
                    ctx.fillText(`${f.val.toFixed(2)} ${f.name}`, cols[0], y + 58 + i * 20);
                }
            });

            // Stabilizers
            if (vals.Al2O3 > 0) {
                ctx.fillText(`${vals.Al2O3.toFixed(2)} Al₂O₃`, cols[1], y + 58);
            }

            // Glass formers
            let gfY = 58;
            if (vals.SiO2 > 0) { ctx.fillText(`${vals.SiO2.toFixed(2)} SiO₂`, cols[2], y + gfY); gfY += 20; }
            if (vals.B2O3 > 0) { ctx.fillText(`${vals.B2O3.toFixed(2)} B₂O₃`, cols[2], y + gfY); }

            // Bracket lines
            ctx.strokeStyle = '#8A9A5B44';
            ctx.lineWidth = 1;
            [0.35, 0.65].forEach(frac => {
                const lx = x + w * frac;
                ctx.beginPath();
                ctx.moveTo(lx, y + 42);
                ctx.lineTo(lx, y + h - 10);
                ctx.stroke();
            });
        }

        let animId;
        let time = 0;

        function animate() {
            animId = requestAnimationFrame(animate);
            time += 0.016;

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, W, H);

            const vals = getOxideValues();
            const props = computeGlazeProperties(vals);
            updateBars();

            // Update result box
            document.getElementById('resultBox').innerHTML =
                `Si:Al ratio: ${props.siAlRatio}<br>` +
                `Flux unity: ${props.fluxTotal.toFixed(2)}<br>` +
                `Surface: ${props.surface}<br>` +
                `Est. cone: ${props.cone}`;

            // Title
            ctx.fillStyle = '#8A9A5B';
            ctx.font = '24px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Glaze Chemistry Lab', W * 0.38, 40);
            ctx.font = '14px Georgia';
            ctx.fillStyle = '#FEFAE0';
            ctx.fillText('Mix oxides to design glazes using the Seger Unity Molecular Formula', W * 0.38, 62);

            // Glaze preview
            drawGlazeSample(W * 0.38, H * 0.3, props);

            // Labels for preview
            ctx.fillStyle = '#DDA15E';
            ctx.font = '16px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText(`${props.surface} - Cone ${props.cone}`, W * 0.38, H * 0.3 + 65);

            // Seger diagram
            drawSegerDiagram(W * 0.05, H * 0.5, W * 0.65, H * 0.4, vals);

            // Decorative molecules floating
            ctx.globalAlpha = 0.15;
            for (let i = 0; i < 20; i++) {
                const mx = (W * 0.38 + Math.sin(time * 0.3 + i * 1.3) * W * 0.3) % W;
                const my = (H * 0.5 + Math.cos(time * 0.2 + i * 0.9) * H * 0.3) % H;
                ctx.beginPath();
                ctx.arc(mx, my, 3 + Math.sin(time + i) * 2, 0, Math.PI * 2);
                ctx.fillStyle = i % 3 === 0 ? '#DDA15E' : i % 3 === 1 ? '#8A9A5B' : '#7aa';
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        animate();

        window.reset = function() {
            loadPreset('clear');
        };
    </script>
</body>
</html>
