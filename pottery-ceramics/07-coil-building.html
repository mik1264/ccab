<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coil Building - Interactive Pot Construction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: Georgia, serif; overflow: hidden; }
        canvas { display: block; cursor: crosshair; }
        a { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; align-items: center; z-index: 100;
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid #8A9A5B33;
        }
        .controls label { font-size: 0.8rem; }
        .controls input[type="range"] { width: 90px; accent-color: #DDA15E; }
        .controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 8px 14px;
            border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        .controls button:hover { background: #8A9A5B; }
        .controls button.active { background: #DDA15E; color: #1a1a1a; }
        .info {
            position: fixed; top: 10px; right: 10px;
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; color: #8A9A5B; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <div class="info">
        Coils: <span id="coilCount">0</span><br>
        Height: <span id="potHeight">0</span> cm<br>
        Click to place coils<br>
        Drag to adjust radius
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Coil Thickness</label>
        <input type="range" id="thicknessSlider" min="5" max="25" value="12">
        <button id="addCoilBtn" class="active">Add Coil</button>
        <button id="smoothBtn">Smooth</button>
        <button id="undoBtn">Undo</button>
        <button id="resetBtn">Reset</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        // Coil pot profile: array of {radius, y, smoothed}
        let coils = [];
        let mode = 'add'; // add, smooth
        let mouseX = 0, mouseY = 0;
        let mouseDown = false;
        let baseY;
        let animId;
        let rotationAngle = 0;

        function initState() {
            coils = [];
            baseY = H * 0.7;
            // Add base
            const baseR = 50;
            coils.push({ radius: baseR, y: baseY, smoothed: false, isBase: true });
        }
        initState();

        document.getElementById('addCoilBtn').addEventListener('click', () => {
            mode = 'add';
            document.getElementById('addCoilBtn').classList.add('active');
            document.getElementById('smoothBtn').classList.remove('active');
        });

        document.getElementById('smoothBtn').addEventListener('click', () => {
            mode = 'smooth';
            document.getElementById('smoothBtn').classList.add('active');
            document.getElementById('addCoilBtn').classList.remove('active');
        });

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (coils.length > 1) coils.pop();
        });

        document.getElementById('resetBtn').addEventListener('click', initState);

        canvas.addEventListener('mousedown', (e) => { mouseDown = true; mouseX = e.clientX; mouseY = e.clientY; handleClick(); });
        canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; if (mouseDown && mode === 'smooth') handleSmooth(); });
        canvas.addEventListener('mouseup', () => { mouseDown = false; });
        canvas.addEventListener('touchstart', (e) => { mouseDown = true; mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; handleClick(); e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; if (mode === 'smooth') handleSmooth(); e.preventDefault(); });
        canvas.addEventListener('touchend', () => { mouseDown = false; });

        function handleClick() {
            if (mode === 'add') {
                addCoil();
            }
        }

        function addCoil() {
            const thickness = parseFloat(document.getElementById('thicknessSlider').value);
            const lastCoil = coils[coils.length - 1];
            const cx = W / 2;

            // Radius based on mouse distance from center
            const dx = mouseX - cx;
            const newR = Math.max(15, Math.abs(dx));

            const newY = lastCoil.y - thickness;
            coils.push({ radius: newR, y: newY, smoothed: false, isBase: false });
        }

        function handleSmooth() {
            const cx = W / 2;
            // Find nearest coil to mouse
            let nearest = -1;
            let nearestDist = Infinity;
            coils.forEach((c, i) => {
                if (c.isBase) return;
                const dy = Math.abs(mouseY - c.y);
                if (dy < nearestDist) { nearestDist = dy; nearest = i; }
            });

            if (nearest > 0 && nearestDist < 30) {
                // Smooth by averaging with neighbors
                const prev = coils[nearest - 1];
                const next = nearest < coils.length - 1 ? coils[nearest + 1] : null;
                const avgR = next ? (prev.radius + coils[nearest].radius + next.radius) / 3 : (prev.radius + coils[nearest].radius) / 2;
                coils[nearest].radius += (avgR - coils[nearest].radius) * 0.3;
                coils[nearest].smoothed = true;
            }
        }

        function drawPot(cx) {
            if (coils.length < 2) {
                // Just draw the base
                const base = coils[0];
                ctx.beginPath();
                ctx.ellipse(cx, base.y, base.radius, base.radius * 0.2, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#8a6a4a';
                ctx.fill();
                ctx.strokeStyle = '#6a4a2a';
                ctx.lineWidth = 2;
                ctx.stroke();
                return;
            }

            // Draw as 3D rotating pot using concentric ellipses
            // Back side first
            ctx.save();

            // Draw coils from bottom to top
            for (let i = coils.length - 1; i >= 0; i--) {
                const coil = coils[i];
                const thickness = parseFloat(document.getElementById('thicknessSlider').value);
                const perspective = 0.25;

                // Coil color: lighter when smoothed
                const baseR = coil.smoothed ? 160 : 140;
                const baseG = coil.smoothed ? 120 : 100;
                const baseB = coil.smoothed ? 90 : 70;

                // Outer profile
                ctx.beginPath();
                ctx.ellipse(cx, coil.y, coil.radius, coil.radius * perspective, 0, 0, Math.PI * 2);

                // Gradient for 3D effect
                const grad = ctx.createRadialGradient(cx - coil.radius * 0.2, coil.y - 2, 0, cx, coil.y, coil.radius);
                grad.addColorStop(0, `rgb(${baseR + 30},${baseG + 30},${baseB + 30})`);
                grad.addColorStop(0.7, `rgb(${baseR},${baseG},${baseB})`);
                grad.addColorStop(1, `rgb(${baseR - 30},${baseG - 30},${baseB - 30})`);
                ctx.fillStyle = grad;
                ctx.fill();

                // Coil line visible when not smoothed
                if (!coil.smoothed && !coil.isBase) {
                    ctx.beginPath();
                    ctx.ellipse(cx, coil.y, coil.radius + 1, (coil.radius + 1) * perspective, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(100,70,40,0.6)`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // Connect to next coil with filled shape
                if (i < coils.length - 1) {
                    const next = coils[i + 1];
                    ctx.beginPath();
                    // Left side
                    ctx.moveTo(cx - coil.radius, coil.y);
                    ctx.lineTo(cx - next.radius, next.y);
                    // Right side
                    ctx.moveTo(cx + coil.radius, coil.y);
                    ctx.lineTo(cx + next.radius, next.y);

                    // Fill the body between coils
                    ctx.beginPath();
                    ctx.moveTo(cx - coil.radius, coil.y);
                    ctx.lineTo(cx - next.radius, next.y);
                    ctx.lineTo(cx + next.radius, next.y);
                    ctx.lineTo(cx + coil.radius, coil.y);
                    ctx.closePath();
                    ctx.fillStyle = `rgb(${baseR - 10},${baseG - 10},${baseB - 10})`;
                    ctx.fill();
                }
            }

            // Top rim highlight
            const top = coils[coils.length - 1];
            ctx.beginPath();
            ctx.ellipse(cx, top.y, top.radius, top.radius * 0.25, 0, 0, Math.PI * 2);
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.restore();

            // Rotation indicator marks on base
            const base = coils[0];
            ctx.save();
            ctx.translate(cx, base.y);
            for (let i = 0; i < 8; i++) {
                const a = rotationAngle + (i / 8) * Math.PI * 2;
                const ex = Math.cos(a) * base.radius * 0.8;
                const ey = Math.sin(a) * base.radius * 0.2 * 0.8;
                ctx.beginPath();
                ctx.arc(ex, ey, 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(138,154,91,0.3)';
                ctx.fill();
            }
            ctx.restore();
        }

        function drawProfile(x, y, w, h) {
            ctx.fillStyle = 'rgba(30,30,30,0.7)';
            ctx.fillRect(x, y, w, h);

            ctx.fillStyle = '#8A9A5B';
            ctx.font = '12px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Cross-Section Profile', x + w / 2, y + 16);

            if (coils.length < 2) return;

            const maxR = Math.max(...coils.map(c => c.radius));
            const minY = Math.min(...coils.map(c => c.y));
            const maxY = Math.max(...coils.map(c => c.y));
            const rangeY = maxY - minY || 1;

            const plotX = x + 20;
            const plotW = w - 40;
            const plotY = y + 28;
            const plotH = h - 40;

            // Draw profile line
            ctx.beginPath();
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            coils.forEach((c, i) => {
                const px = plotX + (c.radius / maxR) * plotW * 0.45 + plotW * 0.5;
                const py = plotY + ((c.y - minY) / rangeY) * plotH;
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            });
            ctx.stroke();

            // Mirror side
            ctx.beginPath();
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            coils.forEach((c, i) => {
                const px = plotX + plotW * 0.5 - (c.radius / maxR) * plotW * 0.45;
                const py = plotY + ((c.y - minY) / rangeY) * plotH;
                if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            });
            ctx.stroke();
        }

        function drawGhostCoil(cx) {
            if (mode !== 'add' || coils.length === 0) return;
            const lastCoil = coils[coils.length - 1];
            const thickness = parseFloat(document.getElementById('thicknessSlider').value);
            const dx = mouseX - cx;
            const newR = Math.max(15, Math.abs(dx));
            const newY = lastCoil.y - thickness;

            ctx.globalAlpha = 0.4;
            ctx.beginPath();
            ctx.ellipse(cx, newY, newR, newR * 0.25, 0, 0, Math.PI * 2);
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;
        }

        function animate() {
            animId = requestAnimationFrame(animate);
            rotationAngle += 0.01;

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, W, H);

            const cx = W * 0.4;

            // Title
            ctx.fillStyle = '#8A9A5B';
            ctx.font = '24px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Coil Building', W / 2, 40);
            ctx.font = '14px Georgia';
            ctx.fillStyle = '#FEFAE0';
            ctx.fillText('Click to add coils, drag position to set radius. Smooth to blend.', W / 2, 62);

            // Work surface
            ctx.fillStyle = '#2a2520';
            ctx.fillRect(0, baseY + 5, W, H - baseY);

            drawPot(cx);
            drawGhostCoil(cx);

            // Profile view
            drawProfile(W * 0.65, 80, W * 0.3, H * 0.5);

            // Update info
            document.getElementById('coilCount').textContent = coils.length - 1;
            const height = coils.length > 1 ? ((coils[0].y - coils[coils.length - 1].y) / 10).toFixed(1) : '0';
            document.getElementById('potHeight').textContent = height;
        }

        animate();

        window.reset = function() { initState(); };
    </script>
</body>
</html>
