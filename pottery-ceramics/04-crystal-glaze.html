<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Glaze Growth - Zinc Silicate Nucleation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: Georgia, serif; overflow: hidden; }
        canvas { display: block; }
        a { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; align-items: center; z-index: 100;
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid #8A9A5B33;
            flex-wrap: wrap; justify-content: center; max-width: 90vw;
        }
        .controls label { font-size: 0.8rem; color: #FEFAE0; }
        .controls input[type="range"] { width: 100px; accent-color: #DDA15E; }
        .controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 8px 14px;
            border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        .controls button:hover { background: #8A9A5B; }
        .info {
            position: fixed; top: 10px; right: 10px;
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 10px 14px; border-radius: 8px; font-size: 0.8rem;
            color: #8A9A5B; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <div class="info" id="info">
        Temp: <span id="tempDisp">--</span>°C<br>
        Phase: <span id="phaseDisp">--</span><br>
        Crystals: <span id="crystalCount">0</span>
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>ZnO %</label>
        <input type="range" id="znoSlider" min="10" max="40" value="25">
        <label>SiO₂ %</label>
        <input type="range" id="sio2Slider" min="15" max="45" value="25">
        <label>Hold Temp</label>
        <input type="range" id="holdSlider" min="1050" max="1200" value="1100">
        <button id="fireBtn">Start Firing</button>
        <button id="resetBtn">Reset</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let W, H;
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let crystals = [];
        let nuclei = [];
        let temperature = 25;
        let firing = false;
        let phase = 'idle';
        let time = 0;
        let animId;

        const MELT_TEMP = 1280;
        const NUCLEATION_TEMP = 1100;

        class Crystal {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 20 + Math.random() * 60;
                this.branches = 6 + Math.floor(Math.random() * 3);
                this.angle = Math.random() * Math.PI * 2;
                this.growthRate = 0.02 + Math.random() * 0.03;
                this.hue = 30 + Math.random() * 40; // warm gold to amber
                this.opacity = 0;
                this.dendrites = [];
                this.initDendrites();
            }

            initDendrites() {
                for (let i = 0; i < this.branches; i++) {
                    const a = this.angle + (i / this.branches) * Math.PI * 2;
                    this.dendrites.push({
                        angle: a,
                        length: 0,
                        subBranches: Math.random() > 0.5 ? 2 : 0,
                        width: 2 + Math.random() * 3
                    });
                }
            }

            grow(temp) {
                if (this.radius >= this.maxRadius) return;
                const holdTemp = parseFloat(document.getElementById('holdSlider').value);
                const optimalRange = Math.abs(temp - holdTemp);
                if (optimalRange < 50 && temp > 1000) {
                    const rate = this.growthRate * (1 - optimalRange / 50) * 0.5;
                    this.radius = Math.min(this.maxRadius, this.radius + rate);
                    this.opacity = Math.min(1, this.opacity + 0.005);

                    this.dendrites.forEach(d => {
                        d.length = this.radius;
                    });
                }
            }

            draw(ctx) {
                if (this.opacity < 0.01) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.globalAlpha = this.opacity;

                // Draw each dendrite branch
                this.dendrites.forEach(d => {
                    if (d.length < 1) return;
                    ctx.save();
                    ctx.rotate(d.angle);

                    // Main branch
                    const grad = ctx.createLinearGradient(0, 0, d.length, 0);
                    grad.addColorStop(0, `hsla(${this.hue}, 60%, 70%, 0.9)`);
                    grad.addColorStop(0.5, `hsla(${this.hue + 20}, 50%, 60%, 0.7)`);
                    grad.addColorStop(1, `hsla(${this.hue + 40}, 40%, 50%, 0.3)`);

                    ctx.beginPath();
                    ctx.moveTo(0, -d.width / 2);
                    ctx.lineTo(d.length, 0);
                    ctx.lineTo(0, d.width / 2);
                    ctx.closePath();
                    ctx.fillStyle = grad;
                    ctx.fill();

                    // Sub-branches
                    if (d.subBranches > 0 && d.length > 10) {
                        for (let s = 0; s < d.subBranches; s++) {
                            const subPos = 0.4 + s * 0.3;
                            const subLen = d.length * 0.4;
                            const subAngle = (s % 2 === 0 ? 1 : -1) * Math.PI / 5;

                            ctx.save();
                            ctx.translate(d.length * subPos, 0);
                            ctx.rotate(subAngle);
                            ctx.beginPath();
                            ctx.moveTo(0, -1);
                            ctx.lineTo(subLen, 0);
                            ctx.lineTo(0, 1);
                            ctx.closePath();
                            ctx.fillStyle = `hsla(${this.hue + 30}, 50%, 65%, 0.5)`;
                            ctx.fill();
                            ctx.restore();
                        }
                    }

                    ctx.restore();
                });

                // Center nucleus
                ctx.beginPath();
                ctx.arc(0, 0, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, 80%, ${this.opacity})`;
                ctx.fill();

                ctx.globalAlpha = 1;
                ctx.restore();
            }
        }

        function initState() {
            crystals = [];
            nuclei = [];
            temperature = 25;
            firing = false;
            phase = 'idle';
            time = 0;
            document.getElementById('fireBtn').textContent = 'Start Firing';
        }
        initState();

        document.getElementById('fireBtn').addEventListener('click', () => {
            if (!firing) {
                firing = true;
                phase = 'heating';
                document.getElementById('fireBtn').textContent = 'Firing...';
            }
        });

        document.getElementById('resetBtn').addEventListener('click', initState);

        function generateNuclei() {
            const zno = parseFloat(document.getElementById('znoSlider').value);
            const sio2 = parseFloat(document.getElementById('sio2Slider').value);
            const nucleiCount = Math.floor((zno + sio2) / 10) + Math.floor(Math.random() * 5);

            // Place nuclei on a virtual bowl surface
            const cx = W / 2, cy = H / 2;
            const bowlR = Math.min(W, H) * 0.35;

            for (let i = 0; i < nucleiCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * bowlR;
                const x = cx + Math.cos(angle) * dist;
                const y = cy + Math.sin(angle) * dist * 0.6; // perspective
                crystals.push(new Crystal(x, y));
            }
        }

        function updateFiring() {
            if (!firing) return;

            switch (phase) {
                case 'heating':
                    temperature += 2;
                    if (temperature >= MELT_TEMP) {
                        phase = 'melt_soak';
                        time = 0;
                    }
                    break;
                case 'melt_soak':
                    time += 0.016;
                    if (time > 2) {
                        phase = 'cooling_to_hold';
                        generateNuclei();
                    }
                    break;
                case 'cooling_to_hold':
                    temperature -= 1.5;
                    const holdTemp = parseFloat(document.getElementById('holdSlider').value);
                    if (temperature <= holdTemp) {
                        temperature = holdTemp;
                        phase = 'crystal_growth';
                        time = 0;
                    }
                    break;
                case 'crystal_growth':
                    time += 0.016;
                    crystals.forEach(c => c.grow(temperature));
                    if (time > 15) {
                        phase = 'final_cool';
                    }
                    break;
                case 'final_cool':
                    temperature -= 1;
                    if (temperature <= 25) {
                        temperature = 25;
                        phase = 'done';
                        firing = false;
                        document.getElementById('fireBtn').textContent = 'Done';
                    }
                    break;
            }
        }

        function drawBowl(cx, cy, r) {
            // Bowl shape with glaze
            ctx.save();

            // Glaze base color
            const gradient = ctx.createRadialGradient(cx, cy - r * 0.1, 0, cx, cy, r);
            const glazeTemp = Math.min(1, Math.max(0, (temperature - 800) / 500));
            if (temperature > 800) {
                gradient.addColorStop(0, `rgba(180,60,20,${glazeTemp * 0.5})`);
                gradient.addColorStop(0.5, `rgba(120,40,10,${glazeTemp * 0.3})`);
                gradient.addColorStop(1, `rgba(60,40,30,${glazeTemp * 0.2})`);
            } else {
                gradient.addColorStop(0, '#3a3530');
                gradient.addColorStop(0.5, '#2a2520');
                gradient.addColorStop(1, '#1a1510');
            }

            // Bowl exterior
            ctx.beginPath();
            ctx.ellipse(cx, cy, r, r * 0.6, 0, 0, Math.PI);
            ctx.quadraticCurveTo(cx - r * 0.8, cy + r * 0.3, cx - r * 0.7, cy);
            ctx.closePath();
            ctx.fillStyle = '#5a4a3a';
            ctx.fill();

            // Glaze surface (ellipse)
            ctx.beginPath();
            ctx.ellipse(cx, cy, r * 0.9, r * 0.5, 0, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Glossy sheen
            if (phase === 'done' || phase === 'final_cool') {
                ctx.beginPath();
                ctx.ellipse(cx - r * 0.2, cy - r * 0.1, r * 0.3, r * 0.12, -0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fill();
            }

            ctx.restore();
        }

        function drawTempGauge(x, y, h) {
            const gaugeW = 20;
            ctx.fillStyle = '#333';
            ctx.fillRect(x, y, gaugeW, h);
            ctx.strokeStyle = '#555';
            ctx.strokeRect(x, y, gaugeW, h);

            const maxTemp = 1400;
            const fillH = (Math.min(temperature, maxTemp) / maxTemp) * h;

            // Temperature gradient
            const grad = ctx.createLinearGradient(x, y + h, x, y);
            grad.addColorStop(0, '#333');
            grad.addColorStop(0.3, '#a02000');
            grad.addColorStop(0.6, '#e07020');
            grad.addColorStop(0.8, '#f0a040');
            grad.addColorStop(1, '#ffe890');

            ctx.fillStyle = grad;
            ctx.fillRect(x, y + h - fillH, gaugeW, fillH);

            // Scale marks
            ctx.fillStyle = '#888';
            ctx.font = '10px Georgia';
            ctx.textAlign = 'left';
            for (let t = 200; t <= maxTemp; t += 200) {
                const ty = y + h - (t / maxTemp) * h;
                ctx.fillRect(x + gaugeW, ty, 4, 1);
                ctx.fillText(`${t}°C`, x + gaugeW + 8, ty + 4);
            }

            // Current temp marker
            const curY = y + h - (Math.min(temperature, maxTemp) / maxTemp) * h;
            ctx.fillStyle = '#DDA15E';
            ctx.beginPath();
            ctx.moveTo(x + gaugeW + 2, curY);
            ctx.lineTo(x + gaugeW + 10, curY - 5);
            ctx.lineTo(x + gaugeW + 10, curY + 5);
            ctx.closePath();
            ctx.fill();
        }

        function animate() {
            animId = requestAnimationFrame(animate);
            updateFiring();

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, W, H);

            // Title
            ctx.fillStyle = '#8A9A5B';
            ctx.font = '24px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Crystal Glaze Growth', W / 2, 40);
            ctx.font = '14px Georgia';
            ctx.fillStyle = '#FEFAE0';
            ctx.fillText('Zinc silicate crystals nucleate and grow during controlled cooling', W / 2, 62);

            const cx = W / 2;
            const cy = H * 0.5;
            const bowlR = Math.min(W, H) * 0.3;

            // Kiln glow when hot
            if (temperature > 600) {
                const glowIntensity = Math.min(0.2, (temperature - 600) / 3000);
                const glow = ctx.createRadialGradient(cx, cy, bowlR * 0.5, cx, cy, bowlR * 2);
                glow.addColorStop(0, `rgba(255,150,50,${glowIntensity})`);
                glow.addColorStop(1, 'rgba(255,100,0,0)');
                ctx.fillStyle = glow;
                ctx.fillRect(0, 0, W, H);
            }

            drawBowl(cx, cy, bowlR);

            // Draw crystals on bowl surface
            crystals.forEach(c => c.draw(ctx));

            // Temperature gauge
            drawTempGauge(30, 80, H - 180);

            // Update info
            document.getElementById('tempDisp').textContent = Math.round(temperature);
            document.getElementById('phaseDisp').textContent = phase.replace(/_/g, ' ');
            document.getElementById('crystalCount').textContent = crystals.filter(c => c.opacity > 0.1).length;
        }

        animate();

        window.reset = function() {
            initState();
        };
    </script>
</body>
</html>
