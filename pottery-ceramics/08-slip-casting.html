<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slip Casting - Plaster Mold Absorption</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #FEFAE0; font-family: Georgia, serif; overflow: hidden; }
        canvas { display: block; }
        a { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; align-items: center; z-index: 100;
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 12px; border: 1px solid #8A9A5B33;
        }
        .controls label { font-size: 0.8rem; }
        .controls input[type="range"] { width: 100px; accent-color: #DDA15E; }
        .controls button {
            background: #606C38; color: #FEFAE0; border: none; padding: 8px 14px;
            border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        .controls button:hover { background: #8A9A5B; }
        .info {
            position: fixed; top: 10px; right: 10px;
            background: rgba(30,30,30,0.85); backdrop-filter: blur(10px);
            padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; color: #8A9A5B; z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <div class="info">
        Phase: <span id="phaseDisp">Ready</span><br>
        Wall: <span id="wallDisp">0</span> mm<br>
        Time: <span id="timeDisp">0</span> min<br>
        Mold moisture: <span id="moistDisp">0</span>%
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Plaster Ratio</label>
        <input type="range" id="ratioSlider" min="60" max="80" value="70" title="Water:plaster ratio">
        <label>Speed</label>
        <input type="range" id="speedSlider" min="1" max="20" value="5">
        <button id="pourBtn">Pour Slip</button>
        <button id="drainBtn" disabled>Drain</button>
        <button id="releaseBtn" disabled>Release</button>
        <button id="resetBtn">Reset</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        let phase = 'empty'; // empty, pouring, absorbing, draining, drying, releasing
        let slipLevel = 0; // 0-1
        let wallThickness = 0; // mm
        let moldMoisture = 0; // 0-1
        let time = 0;
        let castTime = 0;
        let particles = [];
        let animId;

        const MAX_WALL = 8; // mm
        const MOLD_WIDTH = 200;
        const MOLD_HEIGHT = 280;
        const MOLD_THICK = 40;

        function initState() {
            phase = 'empty';
            slipLevel = 0;
            wallThickness = 0;
            moldMoisture = 0;
            time = 0;
            castTime = 0;
            particles = [];
            document.getElementById('pourBtn').disabled = false;
            document.getElementById('drainBtn').disabled = true;
            document.getElementById('releaseBtn').disabled = true;
        }
        initState();

        document.getElementById('pourBtn').addEventListener('click', () => {
            if (phase === 'empty') {
                phase = 'pouring';
                document.getElementById('pourBtn').disabled = true;
            }
        });

        document.getElementById('drainBtn').addEventListener('click', () => {
            if (phase === 'absorbing') {
                phase = 'draining';
                document.getElementById('drainBtn').disabled = true;
            }
        });

        document.getElementById('releaseBtn').addEventListener('click', () => {
            if (phase === 'drying') {
                phase = 'releasing';
                document.getElementById('releaseBtn').disabled = true;
            }
        });

        document.getElementById('resetBtn').addEventListener('click', initState);

        function absorptionRate() {
            const ratio = parseFloat(document.getElementById('ratioSlider').value) / 100;
            // Higher water:plaster ratio = more porous = faster absorption
            const baseRate = 0.15 + (ratio - 0.6) * 0.8;
            // Absorption slows as mold saturates
            return baseRate * (1 - moldMoisture * 0.7);
        }

        function updateSimulation() {
            const speed = parseFloat(document.getElementById('speedSlider').value);
            const dt = 0.016 * speed;

            switch (phase) {
                case 'pouring':
                    slipLevel = Math.min(1, slipLevel + dt * 0.3);
                    if (slipLevel >= 1) {
                        phase = 'absorbing';
                        document.getElementById('drainBtn').disabled = false;
                    }
                    break;
                case 'absorbing':
                    castTime += dt;
                    time += dt;
                    const rate = absorptionRate();
                    wallThickness = Math.min(MAX_WALL, wallThickness + rate * dt * 0.1);
                    moldMoisture = Math.min(0.9, moldMoisture + rate * dt * 0.02);

                    // Generate absorption particles
                    if (Math.random() < rate * 0.3) {
                        const cx = W / 2;
                        const cy = H * 0.4;
                        const side = Math.random() > 0.5 ? 1 : -1;
                        particles.push({
                            x: cx + side * (MOLD_WIDTH / 2 - wallThickness * 5),
                            y: cy - MOLD_HEIGHT / 2 + Math.random() * MOLD_HEIGHT,
                            vx: side * (0.5 + Math.random()),
                            vy: (Math.random() - 0.5) * 0.3,
                            life: 1,
                            size: 2 + Math.random() * 2
                        });
                    }
                    break;
                case 'draining':
                    slipLevel = Math.max(0, slipLevel - dt * 0.15);
                    if (slipLevel <= 0) {
                        phase = 'drying';
                        document.getElementById('releaseBtn').disabled = false;
                    }
                    break;
                case 'drying':
                    time += dt;
                    moldMoisture = Math.max(0, moldMoisture - dt * 0.005);
                    break;
                case 'releasing':
                    time += dt;
                    break;
            }

            // Update particles
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);
        }

        function drawMold(cx, cy) {
            const halfW = MOLD_WIDTH / 2;
            const halfH = MOLD_HEIGHT / 2;

            // Plaster mold (outer shell)
            const moistColor = Math.floor(220 - moldMoisture * 60);
            ctx.fillStyle = `rgb(${moistColor},${moistColor - 5},${moistColor - 10})`;

            // Left mold half
            ctx.fillRect(cx - halfW - MOLD_THICK, cy - halfH, MOLD_THICK, MOLD_HEIGHT);
            // Right mold half
            ctx.fillRect(cx + halfW, cy - halfH, MOLD_THICK, MOLD_HEIGHT);
            // Bottom
            ctx.fillRect(cx - halfW - MOLD_THICK, cy + halfH, MOLD_WIDTH + MOLD_THICK * 2, MOLD_THICK);

            // Mold seam line
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            ctx.moveTo(cx - halfW, cy - halfH - 5);
            ctx.lineTo(cx - halfW, cy + halfH + MOLD_THICK);
            ctx.moveTo(cx + halfW, cy - halfH - 5);
            ctx.lineTo(cx + halfW, cy + halfH + MOLD_THICK);
            ctx.stroke();
            ctx.setLineDash([]);

            // Interior cavity
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(cx - halfW, cy - halfH, MOLD_WIDTH, MOLD_HEIGHT);

            // Clay wall (deposited by absorption)
            if (wallThickness > 0) {
                const wallPx = wallThickness * 5;
                const clayColor = phase === 'releasing' ? '#b09070' : '#a08060';

                // Left wall
                ctx.fillStyle = clayColor;
                ctx.fillRect(cx - halfW, cy - halfH, wallPx, MOLD_HEIGHT);
                // Right wall
                ctx.fillRect(cx + halfW - wallPx, cy - halfH, wallPx, MOLD_HEIGHT);
                // Bottom wall
                ctx.fillRect(cx - halfW, cy + halfH - wallPx, MOLD_WIDTH, wallPx);
            }

            // Slip (liquid clay)
            if (slipLevel > 0) {
                const slipH = slipLevel * (MOLD_HEIGHT - wallThickness * 10);
                const slipY = cy + halfH - wallThickness * 5 - slipH;
                const wallPx = wallThickness * 5;

                ctx.fillStyle = 'rgba(180,150,120,0.7)';
                ctx.fillRect(cx - halfW + wallPx, slipY, MOLD_WIDTH - wallPx * 2, slipH);

                // Slip surface shimmer
                ctx.fillStyle = 'rgba(200,180,160,0.3)';
                ctx.fillRect(cx - halfW + wallPx, slipY, MOLD_WIDTH - wallPx * 2, 3);
            }

            // Released piece
            if (phase === 'releasing') {
                const releaseOffset = Math.min(80, time * 5);
                const wallPx = wallThickness * 5;

                // Mold halves separating
                ctx.save();
                ctx.fillStyle = `rgb(${moistColor},${moistColor - 5},${moistColor - 10})`;
                ctx.fillRect(cx - halfW - MOLD_THICK - releaseOffset, cy - halfH, MOLD_THICK, MOLD_HEIGHT);
                ctx.fillRect(cx + halfW + releaseOffset, cy - halfH, MOLD_THICK, MOLD_HEIGHT);

                // Cast piece standing alone
                ctx.fillStyle = '#b09070';
                ctx.fillRect(cx - halfW + releaseOffset * 0.2, cy - halfH, wallPx, MOLD_HEIGHT);
                ctx.fillRect(cx + halfW - wallPx - releaseOffset * 0.2, cy - halfH, wallPx, MOLD_HEIGHT);
                ctx.fillRect(cx - halfW + releaseOffset * 0.2, cy + halfH - wallPx, MOLD_WIDTH - releaseOffset * 0.4, wallPx);
                ctx.restore();
            }

            // Absorption particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life * 0.6;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = '#89b0d0';
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Labels
            ctx.fillStyle = '#888';
            ctx.font = '10px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Plaster Mold', cx - halfW - MOLD_THICK / 2, cy - halfH - 8);
            if (wallThickness > 0) {
                ctx.fillStyle = '#DDA15E';
                ctx.fillText(`${wallThickness.toFixed(1)}mm`, cx, cy);
            }
        }

        function drawAbsorptionChart(x, y, w, h) {
            ctx.fillStyle = 'rgba(30,30,30,0.7)';
            ctx.fillRect(x, y, w, h);

            ctx.fillStyle = '#8A9A5B';
            ctx.font = '12px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Absorption Process', x + w / 2, y + 16);

            const plotX = x + 40;
            const plotW = w - 60;
            const plotY = y + 30;
            const plotH = h - 50;

            // Wall thickness vs square root of time
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            ctx.beginPath();
            const maxT = Math.max(castTime, 5);
            for (let t = 0; t <= maxT; t += 0.1) {
                const wall = Math.min(MAX_WALL, Math.sqrt(t) * absorptionRate() * 0.5);
                const px = plotX + (t / maxT) * plotW;
                const py = plotY + plotH - (wall / MAX_WALL) * plotH;
                if (t === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
            }
            ctx.stroke();

            // Current point
            const curX = plotX + (castTime / maxT) * plotW;
            const curY = plotY + plotH - (wallThickness / MAX_WALL) * plotH;
            ctx.beginPath();
            ctx.arc(curX, curY, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();

            // Axis labels
            ctx.fillStyle = '#888';
            ctx.font = '10px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Time (min)', plotX + plotW / 2, plotY + plotH + 14);
            ctx.save();
            ctx.translate(plotX - 24, plotY + plotH / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('Wall (mm)', 0, 0);
            ctx.restore();

            // Note about sqrt relationship
            ctx.fillStyle = '#666';
            ctx.font = 'italic 10px Georgia';
            ctx.textAlign = 'left';
            ctx.fillText('Wall ~ sqrt(time)', plotX + 4, plotY + 14);
        }

        function drawProcessSteps(x, y) {
            const steps = [
                { name: 'Pour Slip', active: phase === 'pouring' || phase === 'empty' },
                { name: 'Absorb', active: phase === 'absorbing' },
                { name: 'Drain', active: phase === 'draining' },
                { name: 'Dry', active: phase === 'drying' },
                { name: 'Release', active: phase === 'releasing' }
            ];

            ctx.font = '11px Georgia';
            steps.forEach((step, i) => {
                const sx = x + i * 90;
                ctx.fillStyle = step.active ? '#DDA15E' : '#555';
                ctx.textAlign = 'center';
                ctx.fillText(step.name, sx + 40, y);

                if (i < steps.length - 1) {
                    ctx.fillStyle = '#444';
                    ctx.fillText('>', sx + 80, y);
                }
            });
        }

        function animate() {
            animId = requestAnimationFrame(animate);
            updateSimulation();

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, W, H);

            const cx = W * 0.4;
            const cy = H * 0.42;

            // Title
            ctx.fillStyle = '#8A9A5B';
            ctx.font = '24px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Slip Casting', W / 2, 40);
            ctx.font = '14px Georgia';
            ctx.fillStyle = '#FEFAE0';
            ctx.fillText('Porous plaster absorbs water from liquid clay to build walls', W / 2, 62);

            // Process steps
            drawProcessSteps(W * 0.15, 85);

            drawMold(cx, cy);

            // Absorption chart
            drawAbsorptionChart(W * 0.6, H * 0.15, W * 0.35, H * 0.35);

            // Cross-section diagram
            ctx.fillStyle = 'rgba(30,30,30,0.7)';
            ctx.fillRect(W * 0.6, H * 0.55, W * 0.35, H * 0.2);
            ctx.fillStyle = '#8A9A5B';
            ctx.font = '12px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Capillary Action', W * 0.775, H * 0.57 + 8);

            // Draw arrows showing water movement
            const arrowY = H * 0.62;
            const arrowX = W * 0.775;
            for (let i = 0; i < 5; i++) {
                const ax = arrowX - 40 + i * 20;
                ctx.beginPath();
                ctx.moveTo(ax, arrowY);
                ctx.lineTo(ax + 8, arrowY - 4);
                ctx.lineTo(ax + 8, arrowY - 1);
                ctx.lineTo(ax + 16, arrowY - 1);
                ctx.lineTo(ax + 16, arrowY + 1);
                ctx.lineTo(ax + 8, arrowY + 1);
                ctx.lineTo(ax + 8, arrowY + 4);
                ctx.closePath();
                ctx.fillStyle = `rgba(130,176,208,${0.3 + Math.sin(time + i) * 0.2})`;
                ctx.fill();
            }

            ctx.fillStyle = '#888';
            ctx.font = '10px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Slip → Clay Wall → Plaster', arrowX, arrowY + 20);
            ctx.fillText('Water drawn by capillary forces into porous plaster', arrowX, arrowY + 34);

            // Update info
            document.getElementById('phaseDisp').textContent = phase;
            document.getElementById('wallDisp').textContent = wallThickness.toFixed(1);
            document.getElementById('timeDisp').textContent = castTime.toFixed(1);
            document.getElementById('moistDisp').textContent = (moldMoisture * 100).toFixed(0);
        }

        animate();

        window.reset = function() { initState(); };
    </script>
</body>
</html>
