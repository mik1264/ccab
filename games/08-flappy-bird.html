<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--moss);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        .organic-shape {
            position: fixed;
            border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            opacity: 0.07;
            animation: morph 30s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            background: var(--sage);
            top: -150px;
            left: -150px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: var(--earth);
            bottom: -100px;
            right: -100px;
            animation-delay: -10s;
        }

        .shape-3 {
            width: 300px;
            height: 300px;
            background: var(--terracotta);
            top: 50%;
            left: 60%;
            animation-delay: -20s;
        }

        @keyframes morph {
            0%, 100% {
                border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
                transform: rotate(0deg) scale(1);
            }
            25% {
                border-radius: 40% 60% 70% 30% / 40% 40% 60% 60%;
                transform: rotate(90deg) scale(1.05);
            }
            50% {
                border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%;
                transform: rotate(180deg) scale(1);
            }
            75% {
                border-radius: 70% 30% 50% 50% / 30% 65% 35% 70%;
                transform: rotate(270deg) scale(0.95);
            }
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--terracotta);
            text-decoration: none;
            font-weight: 600;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .back-link:hover {
            transform: translateX(-5px);
            background: rgba(255, 255, 255, 0.8);
        }

        .game-title {
            font-family: 'Lora', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--dark-moss);
            margin-bottom: 12px;
            text-align: center;
            z-index: 1;
        }

        .canvas-wrapper {
            position: relative;
            z-index: 1;
            border-radius: 20px;
            overflow: hidden;
            box-shadow:
                0 8px 32px rgba(96, 108, 56, 0.15),
                0 2px 8px rgba(0, 0, 0, 0.08);
            border: 3px solid rgba(138, 154, 91, 0.3);
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        .hint {
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            color: var(--sage);
            margin-top: 12px;
            text-align: center;
            z-index: 1;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Games</a>

    <div class="organic-shape shape-1"></div>
    <div class="organic-shape shape-2"></div>
    <div class="organic-shape shape-3"></div>

    <h1 class="game-title">Flappy Bird</h1>
    <div class="canvas-wrapper">
        <canvas id="game"></canvas>
    </div>
    <p class="hint">Tap, click, or press Space to flap</p>

    <script>
    (function() {
        'use strict';

        // ── Canvas Setup ──────────────────────────────────────────
        var canvas = document.getElementById('game');
        var ctx = canvas.getContext('2d');
        var W = 320;
        var H = 480;
        canvas.width = W;
        canvas.height = H;

        // ── Theme Colors ──────────────────────────────────────────
        var COL = {
            sage:       '#8A9A5B',
            moss:       '#606C38',
            earth:      '#DDA15E',
            cream:      '#FEFAE0',
            terracotta: '#BC6C25',
            darkMoss:   '#3d4423',
            skyTop:     '#FEFAE0',
            skyBot:     '#d4dbb5',
            pipeBody:   '#6a7d3a',
            pipeLip:    '#8A9A5B',
            pipeDark:   '#4a5a28',
            groundTop:  '#BC6C25',
            groundBot:  '#8a5a20',
            groundStripe: '#3d4423'
        };

        // ── Game Constants ────────────────────────────────────────
        var GRAVITY       = 0.45;
        var FLAP_POWER    = -7;
        var PIPE_WIDTH    = 52;
        var PIPE_GAP_INIT = 130;
        var PIPE_GAP_MIN  = 90;
        var PIPE_SPEED    = 2.2;
        var PIPE_SPACING  = 180;
        var GROUND_H      = 70;
        var BIRD_X        = 70;
        var BIRD_W        = 30;
        var BIRD_H        = 22;
        var PLAY_H        = H - GROUND_H;

        // ── Game State ────────────────────────────────────────────
        var STATE_TITLE    = 0;
        var STATE_READY    = 1;
        var STATE_PLAYING  = 2;
        var STATE_GAMEOVER = 3;

        var state = STATE_TITLE;
        var score = 0;
        var best  = parseInt(localStorage.getItem('flappy-highscore')) || 0;

        // ── Bird ──────────────────────────────────────────────────
        var bird = {
            x: BIRD_X,
            y: H * 0.42,
            vy: 0,
            rotation: 0,
            wingPhase: 0,
            wingSpeed: 0.15,
            flapTimer: 0
        };

        // ── Pipes ─────────────────────────────────────────────────
        var pipes = [];

        // ── Ground scroll ─────────────────────────────────────────
        var groundOffset = 0;

        // ── Background clouds ─────────────────────────────────────
        var clouds = [];
        for (var c = 0; c < 5; c++) {
            clouds.push({
                x: Math.random() * W * 1.5,
                y: 30 + Math.random() * (PLAY_H * 0.35),
                w: 40 + Math.random() * 60,
                speed: 0.2 + Math.random() * 0.3,
                opacity: 0.15 + Math.random() * 0.2
            });
        }

        // ── Background hills (parallax) ──────────────────────────
        var hills = [];
        for (var hh = 0; hh < 8; hh++) {
            hills.push({
                x: hh * 80 - 40,
                h: 30 + Math.random() * 50,
                w: 60 + Math.random() * 80
            });
        }
        var hillOffset = 0;

        // ── Particles (feathers on death) ─────────────────────────
        var particles = [];

        // ── Flash effect ──────────────────────────────────────────
        var flashAlpha = 0;

        // ── Title bob ─────────────────────────────────────────────
        var titleBob = 0;

        // ── Frame counting ────────────────────────────────────────
        var frameCount = 0;

        // ── Pipe gap for current score ────────────────────────────
        function getPipeGap() {
            var gap = PIPE_GAP_INIT - score * 1.5;
            return Math.max(gap, PIPE_GAP_MIN);
        }

        // ── Spawn a pipe ──────────────────────────────────────────
        function spawnPipe(x) {
            var gap = getPipeGap();
            var minTop = 50;
            var maxTop = PLAY_H - gap - 50;
            var topH = minTop + Math.random() * (maxTop - minTop);
            pipes.push({
                x: x,
                topH: topH,
                gap: gap,
                scored: false
            });
        }

        // ── Reset Game ────────────────────────────────────────────
        function resetGame() {
            bird.y = H * 0.42;
            bird.vy = 0;
            bird.rotation = 0;
            bird.flapTimer = 0;
            pipes = [];
            particles = [];
            score = 0;
            flashAlpha = 0;
            groundOffset = 0;
            hillOffset = 0;
        }

        // ── Flap ──────────────────────────────────────────────────
        function flap() {
            if (state === STATE_TITLE) {
                state = STATE_READY;
                resetGame();
                return;
            }
            if (state === STATE_READY) {
                state = STATE_PLAYING;
                bird.vy = FLAP_POWER;
                bird.flapTimer = 8;
                // Spawn initial pipes
                for (var i = 0; i < 3; i++) {
                    spawnPipe(W + 80 + i * PIPE_SPACING);
                }
                return;
            }
            if (state === STATE_PLAYING) {
                bird.vy = FLAP_POWER;
                bird.flapTimer = 8;
                return;
            }
            if (state === STATE_GAMEOVER) {
                // Wait a brief moment before allowing restart
                if (frameCount > 20) {
                    state = STATE_TITLE;
                    resetGame();
                }
            }
        }

        // ── Spawn feather particles ───────────────────────────────
        function spawnFeathers() {
            for (var i = 0; i < 12; i++) {
                var angle = Math.random() * Math.PI * 2;
                var speed = 1 + Math.random() * 3;
                particles.push({
                    x: bird.x,
                    y: bird.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2,
                    life: 1,
                    decay: 0.015 + Math.random() * 0.01,
                    size: 3 + Math.random() * 4,
                    color: Math.random() > 0.5 ? COL.terracotta : COL.earth,
                    rot: Math.random() * Math.PI * 2
                });
            }
        }

        // ── Collision Detection ───────────────────────────────────
        function checkCollision() {
            // Ground
            if (bird.y + BIRD_H / 2 >= PLAY_H) {
                bird.y = PLAY_H - BIRD_H / 2;
                return true;
            }
            // Ceiling
            if (bird.y - BIRD_H / 2 <= 0) {
                bird.y = BIRD_H / 2;
                bird.vy = 0;
            }
            // Pipes
            var bx = bird.x;
            var by = bird.y;
            var bw2 = BIRD_W / 2 - 3; // slight forgiveness
            var bh2 = BIRD_H / 2 - 2;
            for (var i = 0; i < pipes.length; i++) {
                var p = pipes[i];
                var px = p.x;
                var pw = PIPE_WIDTH;
                // Horizontal overlap
                if (bx + bw2 > px && bx - bw2 < px + pw) {
                    // Top pipe
                    if (by - bh2 < p.topH) return true;
                    // Bottom pipe
                    if (by + bh2 > p.topH + p.gap) return true;
                }
            }
            return false;
        }

        // ── UPDATE ────────────────────────────────────────────────
        function update() {
            frameCount++;

            // Clouds always move
            for (var c = 0; c < clouds.length; c++) {
                var cl = clouds[c];
                cl.x -= cl.speed;
                if (cl.x + cl.w < 0) {
                    cl.x = W + cl.w;
                    cl.y = 30 + Math.random() * (PLAY_H * 0.35);
                }
            }

            if (state === STATE_TITLE || state === STATE_READY) {
                titleBob += 0.05;
                bird.y = H * 0.42 + Math.sin(titleBob) * 8;
                bird.wingPhase += bird.wingSpeed;
                bird.rotation = 0;
                return;
            }

            if (state === STATE_GAMEOVER) {
                // Particles
                for (var pi = particles.length - 1; pi >= 0; pi--) {
                    var pt = particles[pi];
                    pt.x += pt.vx;
                    pt.y += pt.vy;
                    pt.vy += 0.1;
                    pt.life -= pt.decay;
                    pt.rot += 0.05;
                    if (pt.life <= 0) particles.splice(pi, 1);
                }
                // Flash fade
                if (flashAlpha > 0) flashAlpha -= 0.05;
                return;
            }

            // ── STATE_PLAYING ─────────────────────────────────────
            // Bird physics
            bird.vy += GRAVITY;
            bird.y += bird.vy;

            // Wing animation: faster when just flapped
            if (bird.flapTimer > 0) {
                bird.flapTimer--;
                bird.wingPhase += 0.4;
            } else {
                bird.wingPhase += bird.wingSpeed;
            }

            // Rotation: based on velocity
            var targetRot = bird.vy * 0.08;
            targetRot = Math.max(-0.5, Math.min(targetRot, 1.3));
            bird.rotation += (targetRot - bird.rotation) * 0.15;

            // Pipes
            for (var i = pipes.length - 1; i >= 0; i--) {
                var p = pipes[i];
                p.x -= PIPE_SPEED;

                // Score
                if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
                    p.scored = true;
                    score++;
                    if (score > best) {
                        best = score;
                        localStorage.setItem('flappy-highscore', best);
                    }
                }

                // Remove off-screen
                if (p.x + PIPE_WIDTH < -10) {
                    pipes.splice(i, 1);
                }
            }

            // Spawn new pipes
            if (pipes.length > 0) {
                var last = pipes[pipes.length - 1];
                if (last.x < W - PIPE_SPACING + PIPE_WIDTH) {
                    spawnPipe(W + 20);
                }
            }

            // Ground scroll
            groundOffset = (groundOffset + PIPE_SPEED) % 24;

            // Hill parallax
            hillOffset = (hillOffset + PIPE_SPEED * 0.3) % 80;

            // Collision
            if (checkCollision()) {
                state = STATE_GAMEOVER;
                frameCount = 0;
                flashAlpha = 0.8;
                spawnFeathers();
            }
        }

        // ── DRAW ──────────────────────────────────────────────────

        function drawSky() {
            var grad = ctx.createLinearGradient(0, 0, 0, PLAY_H);
            grad.addColorStop(0, COL.skyTop);
            grad.addColorStop(1, COL.skyBot);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, PLAY_H);
        }

        function drawClouds() {
            ctx.save();
            for (var i = 0; i < clouds.length; i++) {
                var cl = clouds[i];
                ctx.globalAlpha = cl.opacity;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.ellipse(cl.x, cl.y, cl.w * 0.5, cl.w * 0.22, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cl.x - cl.w * 0.2, cl.y + 4, cl.w * 0.3, cl.w * 0.16, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cl.x + cl.w * 0.22, cl.y + 3, cl.w * 0.28, cl.w * 0.15, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function drawHills() {
            ctx.save();
            ctx.fillStyle = 'rgba(138, 154, 91, 0.2)';
            ctx.beginPath();
            ctx.moveTo(0, PLAY_H);
            for (var i = 0; i < hills.length; i++) {
                var hx = hills[i].x - hillOffset;
                if (hx + hills[i].w < -100) hx += hills.length * 80;
                ctx.quadraticCurveTo(
                    hx + hills[i].w * 0.5,
                    PLAY_H - hills[i].h,
                    hx + hills[i].w,
                    PLAY_H
                );
            }
            ctx.lineTo(W, PLAY_H);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawPipe(p) {
            var lipH = 20;
            var lipW = 8;

            // Top pipe body
            var grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
            grad.addColorStop(0, COL.pipeDark);
            grad.addColorStop(0.3, COL.pipeBody);
            grad.addColorStop(0.7, COL.pipeLip);
            grad.addColorStop(1, COL.pipeDark);
            ctx.fillStyle = grad;
            ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topH);

            // Top pipe lip
            ctx.fillStyle = grad;
            ctx.beginPath();
            roundRect(ctx, p.x - lipW, p.topH - lipH, PIPE_WIDTH + lipW * 2, lipH, 4);
            ctx.fill();
            ctx.strokeStyle = COL.pipeDark;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            roundRect(ctx, p.x - lipW, p.topH - lipH, PIPE_WIDTH + lipW * 2, lipH, 4);
            ctx.stroke();

            // Bottom pipe body
            var botY = p.topH + p.gap;
            ctx.fillStyle = grad;
            ctx.fillRect(p.x, botY, PIPE_WIDTH, PLAY_H - botY);

            // Bottom pipe lip
            ctx.fillStyle = grad;
            ctx.beginPath();
            roundRect(ctx, p.x - lipW, botY, PIPE_WIDTH + lipW * 2, lipH, 4);
            ctx.fill();
            ctx.strokeStyle = COL.pipeDark;
            ctx.beginPath();
            roundRect(ctx, p.x - lipW, botY, PIPE_WIDTH + lipW * 2, lipH, 4);
            ctx.stroke();

            // Highlight stripe on pipes
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.fillRect(p.x + 6, 0, 5, p.topH - lipH);
            ctx.fillRect(p.x + 6, botY + lipH, 5, PLAY_H - botY - lipH);
        }

        function drawGround() {
            // Main ground
            var grad = ctx.createLinearGradient(0, PLAY_H, 0, H);
            grad.addColorStop(0, COL.groundTop);
            grad.addColorStop(0.15, COL.earth);
            grad.addColorStop(1, COL.groundBot);
            ctx.fillStyle = grad;
            ctx.fillRect(0, PLAY_H, W, GROUND_H);

            // Top edge line
            ctx.fillStyle = COL.darkMoss;
            ctx.fillRect(0, PLAY_H, W, 3);

            // Stripe pattern
            ctx.fillStyle = 'rgba(61, 68, 35, 0.15)';
            for (var sx = -24 + (-groundOffset); sx < W + 24; sx += 24) {
                ctx.beginPath();
                ctx.moveTo(sx, PLAY_H + 3);
                ctx.lineTo(sx + 12, PLAY_H + 3);
                ctx.lineTo(sx + 12 - 8, PLAY_H + GROUND_H);
                ctx.lineTo(sx - 8, PLAY_H + GROUND_H);
                ctx.closePath();
                ctx.fill();
            }

            // Grass tufts
            ctx.fillStyle = COL.moss;
            for (var gx = -12 + (-groundOffset % 18); gx < W + 18; gx += 18) {
                ctx.beginPath();
                ctx.moveTo(gx, PLAY_H + 3);
                ctx.quadraticCurveTo(gx + 3, PLAY_H - 4, gx + 6, PLAY_H + 3);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(gx + 7, PLAY_H + 3);
                ctx.quadraticCurveTo(gx + 11, PLAY_H - 6, gx + 14, PLAY_H + 3);
                ctx.fill();
            }
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.rotation);

            var wingY = Math.sin(bird.wingPhase * Math.PI * 2) * 5;

            // Body shadow
            ctx.fillStyle = 'rgba(0,0,0,0.08)';
            ctx.beginPath();
            ctx.ellipse(1, 2, BIRD_W / 2, BIRD_H / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Body
            var bodyGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, BIRD_W / 2);
            bodyGrad.addColorStop(0, '#e8944a');
            bodyGrad.addColorStop(0.6, COL.terracotta);
            bodyGrad.addColorStop(1, '#8a4a15');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.ellipse(0, 0, BIRD_W / 2, BIRD_H / 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Wing
            ctx.fillStyle = COL.earth;
            ctx.beginPath();
            ctx.ellipse(-2, wingY, 10, 6, -0.2, 0, Math.PI * 2);
            ctx.fill();
            // Wing highlight
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.beginPath();
            ctx.ellipse(-2, wingY - 1, 7, 3.5, -0.2, 0, Math.PI * 2);
            ctx.fill();

            // Belly highlight
            ctx.fillStyle = 'rgba(254, 250, 224, 0.4)';
            ctx.beginPath();
            ctx.ellipse(2, 3, 8, 6, 0.1, 0, Math.PI * 2);
            ctx.fill();

            // Eye (white)
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(8, -4, 5, 0, Math.PI * 2);
            ctx.fill();

            // Eye (pupil)
            ctx.fillStyle = COL.darkMoss;
            ctx.beginPath();
            ctx.arc(9.5, -4, 2.5, 0, Math.PI * 2);
            ctx.fill();

            // Eye shine
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(10.5, -5.5, 1, 0, Math.PI * 2);
            ctx.fill();

            // Beak
            ctx.fillStyle = COL.earth;
            ctx.beginPath();
            ctx.moveTo(12, -1);
            ctx.lineTo(20, 1);
            ctx.lineTo(12, 4);
            ctx.closePath();
            ctx.fill();
            // Beak line
            ctx.strokeStyle = '#a07030';
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(12, 1.5);
            ctx.lineTo(19, 1.5);
            ctx.stroke();

            // Tail feathers
            ctx.fillStyle = '#a05a18';
            ctx.beginPath();
            ctx.moveTo(-13, -3);
            ctx.lineTo(-19, -7);
            ctx.lineTo(-17, -1);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-13, 0);
            ctx.lineTo(-20, 0);
            ctx.lineTo(-16, 4);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawParticles() {
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function drawScore() {
            if (state === STATE_PLAYING || state === STATE_GAMEOVER) {
                // Score shadow
                ctx.save();
                ctx.font = 'bold 42px Lora, serif';
                ctx.textAlign = 'center';
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillText(score, W / 2 + 2, 58);
                // Score
                ctx.fillStyle = '#fff';
                ctx.strokeStyle = COL.darkMoss;
                ctx.lineWidth = 3;
                ctx.strokeText(score, W / 2, 56);
                ctx.fillText(score, W / 2, 56);
                ctx.restore();
            }
        }

        function drawTitleScreen() {
            ctx.save();

            // Title
            ctx.font = 'bold 36px Lora, serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = COL.darkMoss;
            ctx.fillText('Flappy Bird', W / 2, 100);

            // Subtitle
            ctx.font = '500 14px Nunito, sans-serif';
            ctx.fillStyle = COL.moss;
            ctx.fillText('Organic Edition', W / 2, 122);

            // Instruction
            ctx.font = '600 16px Nunito, sans-serif';
            ctx.fillStyle = COL.terracotta;
            ctx.fillText('Tap to Start', W / 2, PLAY_H - 40);

            // Best score
            if (best > 0) {
                ctx.font = '500 13px Nunito, sans-serif';
                ctx.fillStyle = COL.sage;
                ctx.fillText('Best: ' + best, W / 2, PLAY_H - 18);
            }

            ctx.restore();
        }

        function drawGetReady() {
            ctx.save();
            ctx.font = 'bold 28px Lora, serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = COL.darkMoss;
            ctx.fillText('Get Ready', W / 2, 100);

            ctx.font = '500 14px Nunito, sans-serif';
            ctx.fillStyle = COL.moss;
            ctx.fillText('Tap to flap!', W / 2, 125);

            // Arrow pointing at bird
            var arrowX = bird.x + 35;
            var arrowY = bird.y;
            ctx.strokeStyle = COL.terracotta;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(arrowX + 20, arrowY - 15);
            ctx.lineTo(arrowX, arrowY);
            ctx.lineTo(arrowX + 20, arrowY + 15);
            ctx.stroke();

            ctx.restore();
        }

        function drawGameOver() {
            ctx.save();

            // Darken overlay
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0, 0, W, PLAY_H);

            // Panel (glassmorphism style)
            var panelW = 200;
            var panelH = 160;
            var px = (W - panelW) / 2;
            var py = (PLAY_H - panelH) / 2 - 10;

            ctx.fillStyle = 'rgba(254, 250, 224, 0.85)';
            ctx.beginPath();
            roundRect(ctx, px, py, panelW, panelH, 16);
            ctx.fill();

            ctx.strokeStyle = 'rgba(138, 154, 91, 0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            roundRect(ctx, px, py, panelW, panelH, 16);
            ctx.stroke();

            // Game Over text
            ctx.font = 'bold 24px Lora, serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = COL.darkMoss;
            ctx.fillText('Game Over', W / 2, py + 38);

            // Score
            ctx.font = '600 14px Nunito, sans-serif';
            ctx.fillStyle = COL.moss;
            ctx.fillText('Score', W / 2, py + 62);
            ctx.font = 'bold 30px Lora, serif';
            ctx.fillStyle = COL.terracotta;
            ctx.fillText(score, W / 2, py + 92);

            // Best
            ctx.font = '600 14px Nunito, sans-serif';
            ctx.fillStyle = COL.moss;
            ctx.fillText('Best: ' + best, W / 2, py + 115);

            // New best indicator
            if (score === best && score > 0) {
                ctx.font = 'bold 12px Nunito, sans-serif';
                ctx.fillStyle = COL.terracotta;
                ctx.fillText('NEW BEST!', W / 2, py + 133);
            }

            // Restart hint
            ctx.font = '500 13px Nunito, sans-serif';
            ctx.fillStyle = COL.sage;
            ctx.fillText('Tap to restart', W / 2, py + panelH + 20);

            ctx.restore();
        }

        function drawFlash() {
            if (flashAlpha > 0) {
                ctx.save();
                ctx.globalAlpha = flashAlpha;
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, W, H);
                ctx.restore();
            }
        }

        // ── Rounded Rectangle Helper ─────────────────────────────
        function roundRect(ctx, x, y, w, h, r) {
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
        }

        // ── Main Draw ─────────────────────────────────────────────
        function draw() {
            ctx.clearRect(0, 0, W, H);

            drawSky();
            drawClouds();
            drawHills();

            // Pipes
            for (var i = 0; i < pipes.length; i++) {
                drawPipe(pipes[i]);
            }

            drawGround();
            drawBird();
            drawParticles();
            drawScore();

            if (state === STATE_TITLE) {
                drawTitleScreen();
            } else if (state === STATE_READY) {
                drawGetReady();
            } else if (state === STATE_GAMEOVER) {
                drawGameOver();
            }

            drawFlash();
        }

        // ── Game Loop ─────────────────────────────────────────────
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ── Input ─────────────────────────────────────────────────
        canvas.addEventListener('mousedown', function(e) {
            e.preventDefault();
            flap();
        });
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            flap();
        }, { passive: false });
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                flap();
            }
        });

        // ── Start ─────────────────────────────────────────────────
        gameLoop();
    })();
    </script>
</body>
</html>
