<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sokoban - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
            --cell-size: 48px;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--moss);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }

        .organic-shape {
            position: fixed;
            border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            opacity: 0.07;
            animation: morph 30s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            background: var(--sage);
            top: -150px;
            left: -150px;
        }

        .shape-2 {
            width: 350px;
            height: 350px;
            background: var(--earth);
            bottom: -80px;
            right: -80px;
            animation-delay: -10s;
        }

        .shape-3 {
            width: 280px;
            height: 280px;
            background: var(--terracotta);
            top: 50%;
            left: 60%;
            animation-delay: -20s;
        }

        @keyframes morph {
            0%, 100% { border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%; transform: rotate(0deg) scale(1); }
            25% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 60%; transform: rotate(90deg) scale(1.05); }
            50% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; transform: rotate(180deg) scale(1); }
            75% { border-radius: 70% 30% 50% 50% / 30% 65% 35% 70%; transform: rotate(270deg) scale(0.95); }
        }

        .back-link {
            position: fixed;
            top: 1rem;
            left: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--terracotta);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: translateX(-5px);
        }

        /* ========== SCREENS ========== */

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            padding: 1rem;
        }

        .screen.active {
            display: flex;
        }

        /* ========== LEVEL SELECT ========== */

        #level-select-screen {
            max-height: 100vh;
            max-height: 100dvh;
            overflow-y: auto;
            padding-top: 3.5rem;
            padding-bottom: 2rem;
        }

        .screen-title {
            font-family: 'Lora', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-moss);
            margin-bottom: 0.25rem;
        }

        .screen-subtitle {
            font-size: 0.95rem;
            color: var(--moss);
            opacity: 0.7;
            margin-bottom: 1.5rem;
        }

        .levels-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.75rem;
            width: 100%;
            max-width: 400px;
        }

        .level-btn {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(138, 154, 91, 0.2);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Nunito', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .level-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(96, 108, 56, 0.15);
            border-color: var(--sage);
        }

        .level-btn:active {
            transform: translateY(0);
        }

        .level-btn .level-num {
            font-family: 'Lora', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark-moss);
        }

        .level-btn .level-moves {
            font-size: 0.65rem;
            color: var(--moss);
            opacity: 0.6;
            margin-top: 2px;
        }

        .level-btn.completed {
            background: rgba(138, 154, 91, 0.15);
            border-color: var(--sage);
        }

        .level-btn.completed .level-num {
            color: var(--moss);
        }

        .level-btn.completed::after {
            content: '';
            position: absolute;
            top: 4px;
            right: 4px;
            width: 10px;
            height: 10px;
            background: var(--sage);
            border-radius: 50%;
        }

        .level-btn.locked {
            opacity: 0.4;
            cursor: default;
            pointer-events: none;
        }

        .reset-progress-btn {
            margin-top: 1.5rem;
            padding: 0.5rem 1.25rem;
            background: none;
            border: 1px solid rgba(188, 108, 37, 0.3);
            border-radius: 20px;
            color: var(--terracotta);
            font-family: 'Nunito', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-progress-btn:hover {
            background: rgba(188, 108, 37, 0.1);
        }

        /* ========== GAME SCREEN ========== */

        #game-screen {
            justify-content: center;
        }

        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            margin-bottom: 0.75rem;
            padding: 0 0.5rem;
        }

        .game-info {
            display: flex;
            flex-direction: column;
        }

        .game-level-title {
            font-family: 'Lora', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark-moss);
        }

        .game-move-count {
            font-size: 0.8rem;
            color: var(--moss);
            opacity: 0.7;
        }

        .game-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .game-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.4rem 0.85rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 154, 91, 0.2);
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--moss);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .game-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--sage);
            transform: translateY(-1px);
        }

        .game-btn:active {
            transform: translateY(0);
        }

        .game-btn .key-hint {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-left: 0.15rem;
        }

        /* ========== GAME BOARD ========== */

        .board-wrapper {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(96, 108, 56, 0.1);
            border: 1px solid rgba(138, 154, 91, 0.15);
        }

        .board {
            display: grid;
            gap: 2px;
            position: relative;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            position: relative;
            transition: background-color 0.15s ease;
        }

        .cell-void {
            background: transparent;
        }

        .cell-floor {
            background: var(--cream);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
        }

        .cell-wall {
            background: var(--dark-moss);
            border-radius: 4px;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2), inset 0 2px 0 rgba(255,255,255,0.08);
        }

        .cell-target {
            background: var(--cream);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
        }

        .cell-target::after {
            content: '';
            width: 40%;
            height: 40%;
            background: var(--sage);
            border-radius: 50%;
            opacity: 0.5;
            position: absolute;
        }

        /* ========== ENTITIES (player, crate) ========== */

        .entity {
            position: absolute;
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
            pointer-events: none;
        }

        .player-entity {
            z-index: 3;
        }

        .player-inner {
            width: 70%;
            height: 70%;
            background: var(--terracotta);
            border-radius: 50%;
            box-shadow: 0 3px 8px rgba(188, 108, 37, 0.4), inset 0 -2px 4px rgba(0,0,0,0.15), inset 0 2px 4px rgba(255,255,255,0.25);
            position: relative;
        }

        .player-inner::after {
            content: '';
            position: absolute;
            top: 22%;
            left: 25%;
            width: 50%;
            height: 30%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        .crate-inner {
            width: 78%;
            height: 78%;
            background: var(--earth);
            border-radius: 8px;
            box-shadow: 0 3px 8px rgba(221, 161, 94, 0.35), inset 0 -2px 4px rgba(0,0,0,0.12), inset 0 2px 4px rgba(255,255,255,0.2);
            position: relative;
            transition: all 0.15s ease;
        }

        .crate-inner::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30%;
            height: 30%;
            border: 2px solid rgba(188, 108, 37, 0.35);
            border-radius: 3px;
            transform: translate(-50%, -50%);
        }

        .crate-on-target .crate-inner {
            background: var(--moss);
            box-shadow: 0 3px 12px rgba(96, 108, 56, 0.5), 0 0 16px rgba(138, 154, 91, 0.3), inset 0 -2px 4px rgba(0,0,0,0.12), inset 0 2px 4px rgba(255,255,255,0.15);
        }

        .crate-on-target .crate-inner::before {
            border-color: rgba(254, 250, 224, 0.4);
        }

        /* ========== D-PAD (touch controls) ========== */

        .dpad-container {
            margin-top: 1rem;
            display: none;
        }

        .dpad-container.touch-device {
            display: grid;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 56px);
            grid-template-rows: repeat(3, 56px);
            gap: 4px;
        }

        .dpad-btn {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 154, 91, 0.2);
            border-radius: 12px;
            font-size: 1.3rem;
            color: var(--moss);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .dpad-btn:active {
            background: rgba(138, 154, 91, 0.2);
            transform: scale(0.93);
        }

        .dpad-spacer {
            visibility: hidden;
        }

        .dpad-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            justify-content: center;
        }

        .dpad-action-btn {
            padding: 0.5rem 1.2rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 154, 91, 0.2);
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--moss);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .dpad-action-btn:active {
            background: rgba(138, 154, 91, 0.2);
            transform: scale(0.95);
        }

        /* ========== COMPLETE OVERLAY ========== */

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(61, 68, 35, 0.5);
            backdrop-filter: blur(6px);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }

        .overlay.active {
            display: flex;
        }

        .overlay-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 360px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(61, 68, 35, 0.2);
            border: 1px solid rgba(138, 154, 91, 0.2);
            animation: panelIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes panelIn {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .overlay-title {
            font-family: 'Lora', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--dark-moss);
            margin-bottom: 0.5rem;
        }

        .overlay-subtitle {
            font-size: 0.9rem;
            color: var(--moss);
            margin-bottom: 0.25rem;
        }

        .overlay-highlight {
            font-family: 'Lora', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--terracotta);
            margin: 0.5rem 0;
        }

        .overlay-best {
            font-size: 0.85rem;
            color: var(--sage);
            margin-bottom: 1.5rem;
        }

        .overlay-best.new-record {
            color: var(--terracotta);
            font-weight: 700;
        }

        .overlay-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .overlay-btn {
            padding: 0.65rem 1.5rem;
            border-radius: 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .overlay-btn-primary {
            background: var(--sage);
            color: white;
        }

        .overlay-btn-primary:hover {
            background: var(--moss);
            transform: translateY(-2px);
        }

        .overlay-btn-secondary {
            background: rgba(255, 255, 255, 0.7);
            color: var(--moss);
            border: 1px solid rgba(138, 154, 91, 0.3);
        }

        .overlay-btn-secondary:hover {
            background: rgba(255, 255, 255, 1);
            transform: translateY(-2px);
        }

        /* ========== ALL COMPLETE ========== */

        .all-complete-msg {
            font-size: 1rem;
            color: var(--moss);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        /* ========== RESPONSIVE ========== */

        @media (max-width: 480px) {
            :root {
                --cell-size: 36px;
            }

            .screen-title {
                font-size: 1.5rem;
            }

            .levels-grid {
                gap: 0.5rem;
            }

            .level-btn .level-num {
                font-size: 1.1rem;
            }

            .game-header {
                flex-direction: column;
                gap: 0.5rem;
                align-items: center;
                text-align: center;
            }

            .overlay-panel {
                padding: 1.75rem;
            }

            .board-wrapper {
                padding: 10px;
            }
        }

        @media (max-height: 700px) {
            :root {
                --cell-size: 34px;
            }
        }

        @media (max-height: 600px) {
            :root {
                --cell-size: 28px;
            }

            .board-wrapper {
                padding: 8px;
                border-radius: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="organic-shape shape-1"></div>
    <div class="organic-shape shape-2"></div>
    <div class="organic-shape shape-3"></div>

    <a href="index.html" class="back-link">
        <span>&larr;</span>
        <span>Games</span>
    </a>

    <!-- LEVEL SELECT SCREEN -->
    <div id="level-select-screen" class="screen active">
        <h1 class="screen-title">Sokoban</h1>
        <p class="screen-subtitle">Push every crate onto a target</p>
        <div class="levels-grid" id="levels-grid"></div>
        <button class="reset-progress-btn" id="reset-progress-btn">Reset Progress</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <div class="game-info">
                <div class="game-level-title" id="game-level-title">Level 1</div>
                <div class="game-move-count" id="game-move-count">Moves: 0</div>
            </div>
            <div class="game-buttons">
                <button class="game-btn" id="btn-undo" title="Undo (Z)">&#8630; Undo <span class="key-hint">Z</span></button>
                <button class="game-btn" id="btn-reset" title="Reset (R)">&#8635; Reset <span class="key-hint">R</span></button>
                <button class="game-btn" id="btn-levels" title="Level Select">&#9776; Levels</button>
            </div>
        </div>
        <div class="board-wrapper">
            <div class="board" id="board"></div>
        </div>
        <div class="dpad-container" id="dpad-container">
            <div class="dpad">
                <div class="dpad-spacer"></div>
                <button class="dpad-btn" data-dir="up">&uarr;</button>
                <div class="dpad-spacer"></div>
                <button class="dpad-btn" data-dir="left">&larr;</button>
                <div class="dpad-spacer"></div>
                <button class="dpad-btn" data-dir="right">&rarr;</button>
                <div class="dpad-spacer"></div>
                <button class="dpad-btn" data-dir="down">&darr;</button>
                <div class="dpad-spacer"></div>
            </div>
            <div class="dpad-actions">
                <button class="dpad-action-btn" id="dpad-undo">Undo</button>
                <button class="dpad-action-btn" id="dpad-reset">Reset</button>
            </div>
        </div>
    </div>

    <!-- LEVEL COMPLETE OVERLAY -->
    <div class="overlay" id="overlay-complete">
        <div class="overlay-panel">
            <div class="overlay-title">Level Complete!</div>
            <div class="overlay-subtitle">You solved it in</div>
            <div class="overlay-highlight" id="complete-moves">0 moves</div>
            <div class="overlay-best" id="complete-best">Best: 0 moves</div>
            <div class="overlay-buttons">
                <button class="overlay-btn overlay-btn-primary" id="btn-next-level">Next Level</button>
                <button class="overlay-btn overlay-btn-secondary" id="btn-retry-level">Retry</button>
                <button class="overlay-btn overlay-btn-secondary" id="btn-complete-levels">Levels</button>
            </div>
        </div>
    </div>

    <!-- ALL COMPLETE OVERLAY -->
    <div class="overlay" id="overlay-all-complete">
        <div class="overlay-panel">
            <div class="overlay-title">Congratulations!</div>
            <p class="all-complete-msg">You have completed all 20 levels of Sokoban. You are a true puzzle master.</p>
            <div class="overlay-buttons">
                <button class="overlay-btn overlay-btn-primary" id="btn-all-levels">Level Select</button>
            </div>
        </div>
    </div>

<script>

            '#    #',
            '# .$ #',
            '##.$ #',
            ' #.$ #',
            ' # @ #',
            ' #####'
        ]},
        // Level 12: 3 crates, 27 moves
        { name: 'Tight Squeeze', map: [
            '########',
            '# @    #',
            '# $#$# #',
            '# .  . #',
            '## ## ##',
            ' # .  # ',
            ' # $# # ',
            ' #    # ',
            ' ###### '
        ]},
        // Level 13: 4 crates, 33 moves
        { name: 'Crossroads', map: [
            '  #####',
            '  #   #',
            '###$  #',
            '#  $..#',
            '# @$..#',
            '###$  #',
            '  #   #',
            '  #####'
        ]},
        // Level 14: 4 crates, 65 moves
        { name: 'The Gallery', map: [
            '  ######  ',
            '### @  #  ',
            '#  $## ## ',
            '# $ .   # ',
            '## #.#$ # ',
            ' # ..   # ',
            ' # $ ## # ',
            ' ###    # ',
            '   ###### '
        ]},
        // Level 15: 3 crates, 30 moves
        { name: 'Spiral In', map: [
            '####  ',
            '#  ###',
            '# $  #',
            '# .# #',
            '#  $ #',
            '##.@ #',
            ' # $ #',
            ' #.  #',
            ' #####'
        ]},
        // Level 16: 4 crates, 26 moves
        { name: 'Gauntlet', map: [
            '#####    ',
            '#   #### ',
            '# # $  # ',
            '#  . # # ',
            '## #$. ##',
            ' # .$$  #',
            ' # .  @ #',
            ' ########'
        ]},
        // Level 17: 4 crates, 59 moves
        { name: 'Labyrinth', map: [
            '  #####',
            '  #   #',
            '### # #',
            '# $ $ #',
            '# #.# #',
            '#  .$ #',
            '# #.###',
            '#  .$ #',
            '# @ # #',
            '#     #',
            '#######'
        ]},
        // Level 18: 4 crates, 22 moves
        { name: 'Fortress', map: [
            '######',
            '#    #',
            '#.$$.#',
            '#.  .#',
            '# $$ #',
            '#  @ #',
            '######'
        ]},
        // Level 19: 4 crates, 50 moves
        { name: 'The Vault', map: [
            '  ########',
            '  #      #',
            '### ##$# #',
            '#  $.  . #',
            '# $ .#$  #',
            '## .## ###',
            ' #  @  #  ',
            ' #######  '
        ]},
        // Level 20: 5 crates, 45 moves
        { name: 'Grand Hall', map: [
            '  ######',
            '###    #',
            '#   $  #',
            '# .$.  #',
            '##$#$###',
            ' #. . # ',
            ' # @  # ',
            ' ###### '
        ]}
    ];

    const TOTAL_LEVELS = LEVELS.length;
    const STORAGE_KEY = 'sokoban-progress';

    // Tile types
    const VOID = 0, FLOOR = 1, WALL = 2, TARGET = 3;

    // ==================== STATE ====================
    let currentLevel = 0;
    let grid = [];       // 2D array of tile types (static)
    let playerPos = { r: 0, c: 0 };
    let crates = [];     // array of { r, c }
    let moves = 0;
    let moveStack = [];  // for undo: each entry = { player: {r,c}, crate: {idx, from:{r,c}} | null }
    let progress = {};   // { levelIndex: bestMoves }
    let isAnimating = false;

    // DOM refs
    const boardEl = document.getElementById('board');
    const levelSelectScreen = document.getElementById('level-select-screen');
    const gameScreen = document.getElementById('game-screen');
    const levelsGrid = document.getElementById('levels-grid');
    const gameLevelTitle = document.getElementById('game-level-title');
    const gameMoveCount = document.getElementById('game-move-count');
    const overlayComplete = document.getElementById('overlay-complete');
    const overlayAllComplete = document.getElementById('overlay-all-complete');
    const dpadContainer = document.getElementById('dpad-container');

    // ==================== PERSISTENCE ====================
    function loadProgress() {
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) progress = JSON.parse(raw);
        } catch (e) {
            progress = {};
        }
    }

    function saveProgress() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        } catch (e) {}
    }

    // ==================== LEVEL PARSING ====================
    function parseLevel(levelIndex) {
        const data = LEVELS[levelIndex];
        const rows = data.map.length;
        const cols = Math.max(...data.map.map(r => r.length));

        grid = [];
        crates = [];
        playerPos = { r: 0, c: 0 };

        for (let r = 0; r < rows; r++) {
            grid[r] = [];
            for (let c = 0; c < cols; c++) {
                const ch = (data.map[r] || '')[c] || ' ';
                switch (ch) {
                    case '#':
                        grid[r][c] = WALL;
                        break;
                    case '.':
                        grid[r][c] = TARGET;
                        break;
                    case '$':
                        grid[r][c] = FLOOR;
                        crates.push({ r, c });
                        break;
                    case '@':
                        grid[r][c] = FLOOR;
                        playerPos = { r, c };
                        break;
                    case '+':
                        grid[r][c] = TARGET;
                        playerPos = { r, c };
                        break;
                    case '*':
                        grid[r][c] = TARGET;
                        crates.push({ r, c });
                        break;
                    case ' ':
                        grid[r][c] = FLOOR;
                        break;
                    default:
                        grid[r][c] = VOID;
                }
            }
        }

        // Flood-fill to determine which empty spaces are reachable vs void
        markVoidCells(rows, cols);
    }

    function markVoidCells(rows, cols) {
        // BFS from player to mark all reachable floor/target cells
        const visited = Array.from({ length: rows }, () => Array(cols).fill(false));
        const queue = [{ r: playerPos.r, c: playerPos.c }];
        visited[playerPos.r][playerPos.c] = true;

        while (queue.length > 0) {
            const { r, c } = queue.shift();
            for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !visited[nr][nc]) {
                    if (grid[nr][nc] !== WALL) {
                        visited[nr][nc] = true;
                        queue.push({ r: nr, c: nc });
                    }
                }
            }
        }

        // Mark unreachable floor cells as void (but keep walls as walls)
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if (grid[r][c] === FLOOR && !visited[r][c]) {
                    grid[r][c] = VOID;
                }
            }
        }
    }

    // ==================== RENDERING ====================
    let entityEls = { player: null, crates: [] };

    function renderBoard() {
        const rows = grid.length;
        const cols = grid[0].length;

        boardEl.innerHTML = '';
        boardEl.style.gridTemplateColumns = `repeat(${cols}, var(--cell-size))`;
        boardEl.style.gridTemplateRows = `repeat(${rows}, var(--cell-size))`;

        // Render static tiles
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                switch (grid[r][c]) {
                    case VOID: cell.classList.add('cell-void'); break;
                    case FLOOR: cell.classList.add('cell-floor'); break;
                    case WALL: cell.classList.add('cell-wall'); break;
                    case TARGET: cell.classList.add('cell-target'); break;
                }
                boardEl.appendChild(cell);
            }
        }

        // Create entity elements
        entityEls.crates = [];
        for (let i = 0; i < crates.length; i++) {
            const el = document.createElement('div');
            el.className = 'entity crate-entity';
            el.innerHTML = '<div class="crate-inner"></div>';
            boardEl.appendChild(el);
            entityEls.crates.push(el);
        }

        const playerEl = document.createElement('div');
        playerEl.className = 'entity player-entity';
        playerEl.innerHTML = '<div class="player-inner"></div>';
        boardEl.appendChild(playerEl);
        entityEls.player = playerEl;

        updateEntityPositions(false);
    }

    function updateEntityPositions(animate) {
        const gap = 2; // matches CSS gap
        const size = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cell-size'));

        const px = (c) => c * (size + gap);
        const py = (r) => r * (size + gap);

        if (!animate) {
            entityEls.player.style.transition = 'none';
            entityEls.crates.forEach(el => el.style.transition = 'none');
        } else {
            entityEls.player.style.transition = 'transform 0.15s cubic-bezier(0.4, 0, 0.2, 1)';
            entityEls.crates.forEach(el => {
                el.style.transition = 'transform 0.15s cubic-bezier(0.4, 0, 0.2, 1)';
            });
        }

        entityEls.player.style.transform = `translate(${px(playerPos.c)}px, ${py(playerPos.r)}px)`;

        for (let i = 0; i < crates.length; i++) {
            entityEls.crates[i].style.transform = `translate(${px(crates[i].c)}px, ${py(crates[i].r)}px)`;

            // Update crate-on-target class
            const onTarget = grid[crates[i].r][crates[i].c] === TARGET;
            entityEls.crates[i].classList.toggle('crate-on-target', onTarget);
        }
    }

    // ==================== GAME LOGIC ====================
    function crateAt(r, c) {
        for (let i = 0; i < crates.length; i++) {
            if (crates[i].r === r && crates[i].c === c) return i;
        }
        return -1;
    }

    function isWalkable(r, c) {
        if (r < 0 || r >= grid.length || c < 0 || c >= grid[0].length) return false;
        return grid[r][c] !== WALL && grid[r][c] !== VOID;
    }

    function tryMove(dr, dc) {
        if (isAnimating) return;

        const nr = playerPos.r + dr;
        const nc = playerPos.c + dc;

        if (!isWalkable(nr, nc)) return;

        const ci = crateAt(nr, nc);

        if (ci >= 0) {
            // Trying to push a crate
            const cr = nr + dr;
            const cc = nc + dc;
            if (!isWalkable(cr, cc)) return;
            if (crateAt(cr, cc) >= 0) return;

            // Push the crate
            moveStack.push({
                player: { r: playerPos.r, c: playerPos.c },
                crate: { idx: ci, from: { r: crates[ci].r, c: crates[ci].c } }
            });

            crates[ci].r = cr;
            crates[ci].c = cc;
        } else {
            moveStack.push({
                player: { r: playerPos.r, c: playerPos.c },
                crate: null
            });
        }

        playerPos.r = nr;
        playerPos.c = nc;
        moves++;
        gameMoveCount.textContent = 'Moves: ' + moves;

        updateEntityPositions(true);

        // Check win
        if (checkWin()) {
            isAnimating = true;
            setTimeout(() => {
                showLevelComplete();
                isAnimating = false;
            }, 300);
        }
    }

    function checkWin() {
        for (let i = 0; i < crates.length; i++) {
            if (grid[crates[i].r][crates[i].c] !== TARGET) return false;
        }
        return true;
    }

    function undoMove() {
        if (moveStack.length === 0 || isAnimating) return;

        const entry = moveStack.pop();
        playerPos.r = entry.player.r;
        playerPos.c = entry.player.c;

        if (entry.crate) {
            crates[entry.crate.idx].r = entry.crate.from.r;
            crates[entry.crate.idx].c = entry.crate.from.c;
        }

        moves--;
        gameMoveCount.textContent = 'Moves: ' + moves;
        updateEntityPositions(true);
    }

    function resetLevel() {
        if (isAnimating) return;
        startLevel(currentLevel);
    }

    // ==================== SCREENS ====================
    function showScreen(screen) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        screen.classList.add('active');
    }

    function buildLevelSelect() {
        levelsGrid.innerHTML = '';
        for (let i = 0; i < TOTAL_LEVELS; i++) {
            const btn = document.createElement('button');
            btn.className = 'level-btn';

            const isCompleted = progress.hasOwnProperty(i);
            // Levels are unlocked if: first level, or previous level completed
            const isUnlocked = i === 0 || progress.hasOwnProperty(i - 1);

            if (isCompleted) btn.classList.add('completed');
            if (!isUnlocked) btn.classList.add('locked');

            let html = `<span class="level-num">${i + 1}</span>`;
            if (isCompleted) {
                html += `<span class="level-moves">${progress[i]} moves</span>`;
            }
            btn.innerHTML = html;
            btn.title = LEVELS[i].name;

            if (isUnlocked) {
                btn.addEventListener('click', () => startLevel(i));
            }

            levelsGrid.appendChild(btn);
        }
    }

    function startLevel(levelIndex) {
        currentLevel = levelIndex;
        parseLevel(levelIndex);
        moves = 0;
        moveStack = [];

        gameLevelTitle.textContent = `Level ${levelIndex + 1}: ${LEVELS[levelIndex].name}`;
        gameMoveCount.textContent = 'Moves: 0';

        overlayComplete.classList.remove('active');
        overlayAllComplete.classList.remove('active');

        showScreen(gameScreen);
        renderBoard();
    }

    function showLevelComplete() {
        const isNewRecord = !progress.hasOwnProperty(currentLevel) || moves < progress[currentLevel];

        if (isNewRecord) {
            progress[currentLevel] = moves;
            saveProgress();
        }

        document.getElementById('complete-moves').textContent = moves + ' move' + (moves !== 1 ? 's' : '');

        const bestEl = document.getElementById('complete-best');
        bestEl.textContent = 'Best: ' + progress[currentLevel] + ' move' + (progress[currentLevel] !== 1 ? 's' : '');
        bestEl.classList.toggle('new-record', isNewRecord);
        if (isNewRecord) {
            bestEl.textContent += ' — New Record!';
        }

        const isLastLevel = currentLevel >= TOTAL_LEVELS - 1;
        document.getElementById('btn-next-level').style.display = isLastLevel ? 'none' : '';

        overlayComplete.classList.add('active');
    }

    function showAllComplete() {
        overlayComplete.classList.remove('active');
        overlayAllComplete.classList.add('active');
    }

    function goToLevelSelect() {
        overlayComplete.classList.remove('active');
        overlayAllComplete.classList.remove('active');
        buildLevelSelect();
        showScreen(levelSelectScreen);
    }

    // ==================== INPUT ====================
    const dirMap = {
        ArrowUp: [-1, 0], ArrowDown: [1, 0], ArrowLeft: [0, -1], ArrowRight: [0, 1],
        w: [-1, 0], s: [1, 0], a: [0, -1], d: [0, 1],
        W: [-1, 0], S: [1, 0], A: [0, -1], D: [0, 1]
    };

    document.addEventListener('keydown', (e) => {
        if (!gameScreen.classList.contains('active')) return;
        if (overlayComplete.classList.contains('active') || overlayAllComplete.classList.contains('active')) return;

        if (dirMap[e.key]) {
            e.preventDefault();
            tryMove(...dirMap[e.key]);
        } else if (e.key === 'z' || e.key === 'Z') {
            e.preventDefault();
            undoMove();
        } else if (e.key === 'r' || e.key === 'R') {
            e.preventDefault();
            resetLevel();
        }
    });

    // Touch / swipe support
    let touchStart = null;
    document.addEventListener('touchstart', (e) => {
        if (!gameScreen.classList.contains('active')) return;
        if (e.touches.length === 1) {
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
        if (!touchStart) return;
        if (!gameScreen.classList.contains('active')) return;
        if (overlayComplete.classList.contains('active') || overlayAllComplete.classList.contains('active')) return;

        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStart.x;
        const dy = touch.clientY - touchStart.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        touchStart = null;

        if (dist < 30) return; // too short

        if (Math.abs(dx) > Math.abs(dy)) {
            tryMove(0, dx > 0 ? 1 : -1);
        } else {
            tryMove(dy > 0 ? 1 : -1, 0);
        }
    }, { passive: true });

    // D-pad buttons
    document.querySelectorAll('.dpad-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (overlayComplete.classList.contains('active') || overlayAllComplete.classList.contains('active')) return;
            const dir = btn.dataset.dir;
            const map = { up: [-1,0], down: [1,0], left: [0,-1], right: [0,1] };
            if (map[dir]) tryMove(...map[dir]);
        });
    });

    // Show d-pad on touch devices
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        dpadContainer.classList.add('touch-device');
    }

    // ==================== BUTTON WIRING ====================
    document.getElementById('btn-undo').addEventListener('click', undoMove);
    document.getElementById('btn-reset').addEventListener('click', resetLevel);
    document.getElementById('btn-levels').addEventListener('click', goToLevelSelect);
    document.getElementById('dpad-undo').addEventListener('click', undoMove);
    document.getElementById('dpad-reset').addEventListener('click', resetLevel);

    document.getElementById('btn-next-level').addEventListener('click', () => {
        if (currentLevel + 1 >= TOTAL_LEVELS) {
            showAllComplete();
        } else {
            startLevel(currentLevel + 1);
        }
    });

    document.getElementById('btn-retry-level').addEventListener('click', () => {
        overlayComplete.classList.remove('active');
        resetLevel();
    });

    document.getElementById('btn-complete-levels').addEventListener('click', goToLevelSelect);
    document.getElementById('btn-all-levels').addEventListener('click', goToLevelSelect);

    document.getElementById('reset-progress-btn').addEventListener('click', () => {
        if (confirm('Reset all progress? This cannot be undone.')) {
            progress = {};
            saveProgress();
            buildLevelSelect();
        }
    });

    // ==================== INIT ====================
    loadProgress();
    buildLevelSelect();

})();
</script>
