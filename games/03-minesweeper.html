<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minesweeper - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            overflow-x: hidden;
        }

        /* Organic background shapes */
        .organic-shape {
            position: fixed;
            border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            opacity: 0.07;
            animation: morph 30s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            background: var(--sage);
            top: -150px;
            left: -150px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: var(--earth);
            bottom: -100px;
            right: -100px;
            animation-delay: -10s;
        }

        .shape-3 {
            width: 300px;
            height: 300px;
            background: var(--terracotta);
            top: 50%;
            right: -100px;
            animation-delay: -20s;
        }

        @keyframes morph {
            0%, 100% { border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%; transform: rotate(0deg) scale(1); }
            25% { border-radius: 37% 63% 46% 54% / 48% 55% 45% 52%; transform: rotate(90deg) scale(1.05); }
            50% { border-radius: 54% 46% 63% 37% / 52% 45% 55% 48%; transform: rotate(180deg) scale(1); }
            75% { border-radius: 46% 54% 37% 63% / 45% 52% 48% 55%; transform: rotate(270deg) scale(0.95); }
        }

        /* Back link */
        .back-link {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            color: var(--terracotta);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid rgba(188, 108, 37, 0.15);
        }

        .back-link:hover {
            transform: translateX(-5px);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(188, 108, 37, 0.15);
        }

        /* Main container */
        .game-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px;
            width: 100%;
            max-width: 100vw;
        }

        .game-title {
            font-family: 'Lora', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-moss);
            margin-top: 50px;
            margin-bottom: 4px;
            text-align: center;
        }

        .game-subtitle {
            font-size: 0.9rem;
            color: var(--moss);
            opacity: 0.7;
            margin-bottom: 16px;
            text-align: center;
        }

        /* Difficulty selector */
        .difficulty-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .diff-btn {
            padding: 8px 20px;
            border: 2px solid rgba(138, 154, 91, 0.3);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--moss);
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .diff-btn:hover {
            background: rgba(138, 154, 91, 0.15);
            border-color: var(--sage);
            transform: translateY(-1px);
        }

        .diff-btn.active {
            background: var(--sage);
            color: white;
            border-color: var(--sage);
            box-shadow: 0 3px 12px rgba(138, 154, 91, 0.35);
        }

        /* Status bar */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 10px 20px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(138, 154, 91, 0.15);
            min-width: 280px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 1rem;
        }

        .status-icon {
            font-size: 1.2rem;
        }

        .status-value {
            font-family: 'Lora', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark-moss);
            min-width: 36px;
            text-align: center;
        }

        .face-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid rgba(138, 154, 91, 0.3);
            background: rgba(255, 255, 255, 0.7);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .face-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
        }

        .face-btn:active {
            transform: scale(0.95);
        }

        /* Grid container */
        .grid-container {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 2px solid rgba(138, 154, 91, 0.2);
            padding: 6px;
            box-shadow: 0 8px 32px rgba(61, 68, 35, 0.08);
            overflow: auto;
            max-width: calc(100vw - 32px);
            max-height: calc(100vh - 260px);
        }

        .grid {
            display: grid;
            gap: 1px;
            background: rgba(138, 154, 91, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        /* Cells */
        .cell {
            width: var(--cell-size, 32px);
            height: var(--cell-size, 32px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Lora', serif;
            font-weight: 700;
            font-size: calc(var(--cell-size, 32px) * 0.55);
            cursor: pointer;
            transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
            position: relative;
            border: none;
            outline: none;
        }

        .cell.unrevealed {
            background: linear-gradient(145deg, #a3b373, #8A9A5B);
            box-shadow: inset 1px 1px 2px rgba(255, 255, 255, 0.3),
                        inset -1px -1px 2px rgba(0, 0, 0, 0.1);
        }

        .cell.unrevealed:hover {
            background: linear-gradient(145deg, #b3c383, #9aaa6b);
            transform: scale(1.02);
            z-index: 2;
        }

        .cell.unrevealed:active {
            background: linear-gradient(145deg, #8A9A5B, #7a8a4b);
            box-shadow: inset 1px 1px 3px rgba(0, 0, 0, 0.15),
                        inset -1px -1px 1px rgba(255, 255, 255, 0.1);
            transform: scale(0.97);
        }

        .cell.revealed {
            background: #FEFAE0;
            cursor: default;
        }

        .cell.revealed.empty {
            background: #f8f4d8;
        }

        .cell.flagged {
            background: linear-gradient(145deg, #a3b373, #8A9A5B);
            box-shadow: inset 1px 1px 2px rgba(255, 255, 255, 0.3),
                        inset -1px -1px 2px rgba(0, 0, 0, 0.1);
        }

        .cell.flagged::after {
            content: '';
            width: 60%;
            height: 60%;
            background: var(--terracotta);
            border-radius: 3px;
            opacity: 0.9;
            clip-path: polygon(20% 0%, 100% 0%, 100% 55%, 20% 55%, 20% 100%, 10% 100%, 10% 0%);
        }

        .cell.mine-hit {
            background: #e74c3c !important;
            animation: mine-explode 0.4s ease-out;
        }

        .cell.mine-revealed {
            background: #f0e0c0;
        }

        .cell.mine-revealed::after,
        .cell.mine-hit::after {
            content: '';
            width: 55%;
            height: 55%;
            background: var(--dark-moss);
            border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(61, 68, 35, 0.2);
        }

        .cell.wrong-flag {
            background: #f0e0c0;
        }

        .cell.wrong-flag::after {
            content: '';
            width: 60%;
            height: 60%;
            background: var(--terracotta);
            border-radius: 3px;
            opacity: 0.4;
            clip-path: polygon(20% 0%, 100% 0%, 100% 55%, 20% 55%, 20% 100%, 10% 100%, 10% 0%);
        }

        .cell.wrong-flag::before {
            content: '';
            position: absolute;
            width: 70%;
            height: 2px;
            background: #e74c3c;
            transform: rotate(-45deg);
            z-index: 2;
        }

        /* Number colors */
        .cell.n1 { color: #2563eb; }
        .cell.n2 { color: #16a34a; }
        .cell.n3 { color: #dc2626; }
        .cell.n4 { color: #7c3aed; }
        .cell.n5 { color: #7f1d1d; }
        .cell.n6 { color: #0d9488; }
        .cell.n7 { color: #1a1a1a; }
        .cell.n8 { color: #6b7280; }

        /* Reveal animation */
        @keyframes cell-reveal {
            0% { transform: scale(0.85); opacity: 0.5; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .cell.just-revealed {
            animation: cell-reveal 0.2s ease-out;
        }

        @keyframes mine-explode {
            0% { transform: scale(0.8); }
            40% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 50;
            background: rgba(61, 68, 35, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .overlay.visible {
            display: flex;
        }

        .overlay-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 36px 40px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 16px 48px rgba(61, 68, 35, 0.15);
            border: 1px solid rgba(138, 154, 91, 0.2);
            animation: panel-in 0.35s ease-out;
        }

        @keyframes panel-in {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .overlay-title {
            font-family: 'Lora', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--dark-moss);
            margin-bottom: 8px;
        }

        .overlay-message {
            color: var(--moss);
            font-size: 1rem;
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .overlay-time {
            font-family: 'Lora', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--terracotta);
            margin: 12px 0;
        }

        .overlay-best {
            font-size: 0.85rem;
            color: var(--sage);
            margin-bottom: 16px;
        }

        .overlay-best .new-record {
            color: var(--terracotta);
            font-weight: 700;
        }

        .play-btn {
            padding: 12px 32px;
            border: none;
            border-radius: 20px;
            background: var(--sage);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(138, 154, 91, 0.3);
        }

        .play-btn:hover {
            background: var(--moss);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 154, 91, 0.4);
        }

        .play-btn:active {
            transform: translateY(0);
        }

        /* Best times */
        .best-times {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid rgba(138, 154, 91, 0.15);
            text-align: left;
        }

        .best-times h4 {
            font-family: 'Lora', serif;
            font-size: 0.9rem;
            color: var(--moss);
            margin-bottom: 8px;
            text-align: center;
        }

        .best-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            padding: 3px 0;
            color: var(--dark-moss);
        }

        .best-row .label {
            font-weight: 600;
        }

        .best-row .time {
            font-family: 'Lora', serif;
            font-weight: 700;
            color: var(--terracotta);
        }

        /* Mobile touch hint */
        .touch-hint {
            font-size: 0.78rem;
            color: var(--sage);
            opacity: 0.7;
            margin-top: 8px;
            text-align: center;
        }

        /* Responsive sizing */
        @media (max-width: 600px) {
            .game-title {
                font-size: 1.5rem;
                margin-top: 46px;
            }
            .game-subtitle {
                font-size: 0.8rem;
            }
            .status-bar {
                padding: 8px 14px;
                min-width: 240px;
            }
            .overlay-panel {
                padding: 28px 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Organic background -->
    <div class="organic-shape shape-1"></div>
    <div class="organic-shape shape-2"></div>
    <div class="organic-shape shape-3"></div>

    <!-- Back link -->
    <a href="index.html" class="back-link">← Games</a>

    <div class="game-wrapper">
        <h1 class="game-title">Minesweeper</h1>
        <p class="game-subtitle">Click to reveal, right-click to flag</p>

        <!-- Difficulty -->
        <div class="difficulty-bar">
            <button class="diff-btn active" data-diff="easy">Easy</button>
            <button class="diff-btn" data-diff="medium">Medium</button>
            <button class="diff-btn" data-diff="hard">Hard</button>
        </div>

        <!-- Status -->
        <div class="status-bar">
            <div class="status-item">
                <span class="status-icon" aria-label="mines remaining">&#x1F4A3;</span>
                <span class="status-value" id="mine-count">10</span>
            </div>
            <button class="face-btn" id="face-btn" aria-label="new game">&#x1F642;</button>
            <div class="status-item">
                <span class="status-value" id="timer">0</span>
                <span class="status-icon" aria-label="timer">&#x23F1;</span>
            </div>
        </div>

        <!-- Grid -->
        <div class="grid-container">
            <div class="grid" id="grid"></div>
        </div>

        <p class="touch-hint" id="touch-hint"></p>
    </div>

    <!-- Win/Loss overlay -->
    <div class="overlay" id="overlay">
        <div class="overlay-panel">
            <div class="overlay-title" id="overlay-title"></div>
            <div class="overlay-message" id="overlay-message"></div>
            <div class="overlay-time" id="overlay-time"></div>
            <div class="overlay-best" id="overlay-best"></div>
            <button class="play-btn" id="overlay-btn">Play Again</button>
            <div class="best-times" id="best-times"></div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // --- Config ---
        const DIFFICULTIES = {
            easy:   { cols: 9,  rows: 9,  mines: 10 },
            medium: { cols: 16, rows: 16, mines: 40 },
            hard:   { cols: 30, rows: 16, mines: 99 }
        };

        // --- State ---
        let difficulty = 'easy';
        let cols, rows, mineCount;
        let board = [];       // 2D: { mine, revealed, flagged, count }
        let gameState = 'idle'; // idle | playing | won | lost
        let firstClick = true;
        let timer = 0;
        let timerInterval = null;
        let flagsPlaced = 0;
        let revealedCount = 0;
        let totalSafe = 0;
        let longPressTimer = null;
        let longPressTriggered = false;

        // --- DOM ---
        const gridEl = document.getElementById('grid');
        const mineCountEl = document.getElementById('mine-count');
        const timerEl = document.getElementById('timer');
        const faceBtn = document.getElementById('face-btn');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayMessage = document.getElementById('overlay-message');
        const overlayTime = document.getElementById('overlay-time');
        const overlayBest = document.getElementById('overlay-best');
        const overlayBtn = document.getElementById('overlay-btn');
        const bestTimesEl = document.getElementById('best-times');
        const touchHint = document.getElementById('touch-hint');

        // --- Touch detection ---
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isTouchDevice) {
            document.querySelector('.game-subtitle').textContent = 'Tap to reveal, long-press to flag';
            touchHint.textContent = 'Long-press a cell to place a flag';
        }

        // --- Difficulty buttons ---
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.diff-btn.active').classList.remove('active');
                btn.classList.add('active');
                difficulty = btn.dataset.diff;
                newGame();
            });
        });

        // --- Face button & overlay ---
        faceBtn.addEventListener('click', newGame);
        overlayBtn.addEventListener('click', () => {
            overlay.classList.remove('visible');
            newGame();
        });

        // --- Cell size calculation ---
        function calcCellSize() {
            const cfg = DIFFICULTIES[difficulty];
            const maxW = Math.min(window.innerWidth - 48, 960);
            const maxH = window.innerHeight - 300;
            const sizeFromW = Math.floor((maxW - (cfg.cols - 1)) / cfg.cols);
            const sizeFromH = Math.floor((maxH - (cfg.rows - 1)) / cfg.rows);
            return Math.max(20, Math.min(38, sizeFromW, sizeFromH));
        }

        // --- New game ---
        function newGame() {
            const cfg = DIFFICULTIES[difficulty];
            cols = cfg.cols;
            rows = cfg.rows;
            mineCount = cfg.mines;
            totalSafe = cols * rows - mineCount;
            revealedCount = 0;
            flagsPlaced = 0;
            firstClick = true;
            gameState = 'idle';
            timer = 0;
            clearInterval(timerInterval);
            timerInterval = null;

            // Init board
            board = [];
            for (let r = 0; r < rows; r++) {
                board[r] = [];
                for (let c = 0; c < cols; c++) {
                    board[r][c] = { mine: false, revealed: false, flagged: false, count: 0 };
                }
            }

            updateStatusDisplay();
            faceBtn.textContent = '\u{1F642}';
            buildGrid();
        }

        // --- Place mines (after first click) ---
        function placeMines(safeR, safeC) {
            let placed = 0;
            while (placed < mineCount) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * cols);
                // Keep safe zone: first click and its neighbors
                if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
                if (board[r][c].mine) continue;
                board[r][c].mine = true;
                placed++;
            }
            // Compute neighbor counts
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c].mine) continue;
                    let cnt = 0;
                    forNeighbors(r, c, (nr, nc) => {
                        if (board[nr][nc].mine) cnt++;
                    });
                    board[r][c].count = cnt;
                }
            }
        }

        // --- Build DOM grid ---
        function buildGrid() {
            const cellSize = calcCellSize();
            gridEl.style.setProperty('--cell-size', cellSize + 'px');
            gridEl.style.gridTemplateColumns = `repeat(${cols}, var(--cell-size))`;
            gridEl.style.gridTemplateRows = `repeat(${rows}, var(--cell-size))`;
            gridEl.innerHTML = '';

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell unrevealed';
                    cell.dataset.r = r;
                    cell.dataset.c = c;

                    // Mouse events
                    cell.addEventListener('click', handleClick);
                    cell.addEventListener('contextmenu', handleRightClick);

                    // Touch events (long press for flag)
                    cell.addEventListener('touchstart', handleTouchStart, { passive: false });
                    cell.addEventListener('touchend', handleTouchEnd);
                    cell.addEventListener('touchmove', handleTouchCancel);
                    cell.addEventListener('touchcancel', handleTouchCancel);

                    gridEl.appendChild(cell);
                }
            }
        }

        // --- Event handlers ---
        function handleClick(e) {
            if (longPressTriggered) { longPressTriggered = false; return; }
            const r = +e.currentTarget.dataset.r;
            const c = +e.currentTarget.dataset.c;
            revealCell(r, c);
        }

        function handleRightClick(e) {
            e.preventDefault();
            const r = +e.currentTarget.dataset.r;
            const c = +e.currentTarget.dataset.c;
            toggleFlag(r, c);
        }

        function handleTouchStart(e) {
            // Prevent default to stop context-menu popup on long press
            longPressTriggered = false;
            const target = e.currentTarget;
            longPressTimer = setTimeout(() => {
                longPressTriggered = true;
                const r = +target.dataset.r;
                const c = +target.dataset.c;
                toggleFlag(r, c);
                // Light haptic if available
                if (navigator.vibrate) navigator.vibrate(30);
            }, 400);
        }

        function handleTouchEnd(e) {
            clearTimeout(longPressTimer);
            if (longPressTriggered) {
                e.preventDefault();
            }
        }

        function handleTouchCancel() {
            clearTimeout(longPressTimer);
            longPressTriggered = false;
        }

        // --- Reveal cell ---
        function revealCell(r, c) {
            if (gameState === 'won' || gameState === 'lost') return;
            const cell = board[r][c];
            if (cell.revealed || cell.flagged) return;

            // First click: place mines, start timer
            if (firstClick) {
                firstClick = false;
                gameState = 'playing';
                placeMines(r, c);
                startTimer();
                faceBtn.textContent = '\u{1F642}';
            }

            if (cell.mine) {
                // BOOM
                cell.revealed = true;
                gameState = 'lost';
                clearInterval(timerInterval);
                faceBtn.textContent = '\u{1F635}';
                revealAllMines(r, c);
                showOverlay(false);
                return;
            }

            // Flood fill reveal
            floodReveal(r, c);
            checkWin();
        }

        // --- Flood fill ---
        function floodReveal(startR, startC) {
            const stack = [[startR, startC]];
            const toAnimate = [];
            let delay = 0;

            while (stack.length > 0) {
                const [r, c] = stack.pop();
                const cell = board[r][c];
                if (cell.revealed || cell.flagged || cell.mine) continue;

                cell.revealed = true;
                revealedCount++;
                toAnimate.push({ r, c, delay });

                if (cell.count === 0) {
                    delay += 8;
                    forNeighbors(r, c, (nr, nc) => {
                        if (!board[nr][nc].revealed && !board[nr][nc].mine) {
                            stack.push([nr, nc]);
                        }
                    });
                }
            }

            // Animate DOM updates
            toAnimate.forEach(({ r, c, delay: d }) => {
                const domCell = getCellEl(r, c);
                setTimeout(() => {
                    updateCellDOM(r, c, domCell);
                    domCell.classList.add('just-revealed');
                    setTimeout(() => domCell.classList.remove('just-revealed'), 200);
                }, d);
            });
        }

        // --- Toggle flag ---
        function toggleFlag(r, c) {
            if (gameState === 'won' || gameState === 'lost') return;
            const cell = board[r][c];
            if (cell.revealed) return;

            if (cell.flagged) {
                cell.flagged = false;
                flagsPlaced--;
            } else {
                cell.flagged = true;
                flagsPlaced++;
            }

            updateCellDOM(r, c);
            updateStatusDisplay();
        }

        // --- Check win ---
        function checkWin() {
            if (revealedCount === totalSafe) {
                gameState = 'won';
                clearInterval(timerInterval);
                faceBtn.textContent = '\u{1F60E}';
                // Auto-flag remaining
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        if (board[r][c].mine && !board[r][c].flagged) {
                            board[r][c].flagged = true;
                            flagsPlaced++;
                            updateCellDOM(r, c);
                        }
                    }
                }
                updateStatusDisplay();
                saveBestTime();
                showOverlay(true);
            }
        }

        // --- Reveal all mines on loss ---
        function revealAllMines(hitR, hitC) {
            const toReveal = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = board[r][c];
                    if (cell.mine && !cell.flagged && !(r === hitR && c === hitC)) {
                        toReveal.push({ r, c });
                    }
                    if (!cell.mine && cell.flagged) {
                        // Wrong flag
                        const el = getCellEl(r, c);
                        el.className = 'cell wrong-flag';
                    }
                }
            }

            // Hit mine
            const hitEl = getCellEl(hitR, hitC);
            hitEl.className = 'cell mine-hit';

            // Cascade reveal other mines
            toReveal.forEach(({ r, c }, i) => {
                setTimeout(() => {
                    const el = getCellEl(r, c);
                    el.className = 'cell mine-revealed';
                }, 30 + i * 40);
            });
        }

        // --- Timer ---
        function startTimer() {
            timer = 0;
            timerEl.textContent = '0';
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timer++;
                timerEl.textContent = timer;
                if (timer >= 999) {
                    timerEl.textContent = '999';
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        // --- DOM helpers ---
        function getCellEl(r, c) {
            return gridEl.children[r * cols + c];
        }

        function updateCellDOM(r, c, el) {
            el = el || getCellEl(r, c);
            const cell = board[r][c];

            if (cell.revealed) {
                if (cell.count > 0) {
                    el.className = 'cell revealed n' + cell.count;
                    el.textContent = cell.count;
                } else {
                    el.className = 'cell revealed empty';
                    el.textContent = '';
                }
            } else if (cell.flagged) {
                el.className = 'cell flagged';
                el.textContent = '';
            } else {
                el.className = 'cell unrevealed';
                el.textContent = '';
            }
        }

        function updateStatusDisplay() {
            mineCountEl.textContent = Math.max(0, mineCount - flagsPlaced);
        }

        // --- Overlay ---
        function showOverlay(won) {
            setTimeout(() => {
                if (won) {
                    overlayTitle.textContent = 'You Won!';
                    overlayMessage.textContent = 'All safe cells revealed';
                    overlayTime.textContent = formatTime(timer);
                    overlayTime.style.display = 'block';

                    const bestKey = 'minesweeper-best-' + difficulty;
                    const best = localStorage.getItem(bestKey);
                    if (best !== null) {
                        if (timer <= parseInt(best, 10)) {
                            overlayBest.innerHTML = '<span class="new-record">New record!</span> Previous: ' + formatTime(parseInt(best, 10));
                        } else {
                            overlayBest.textContent = 'Best: ' + formatTime(parseInt(best, 10));
                        }
                    } else {
                        overlayBest.innerHTML = '<span class="new-record">First win on this difficulty!</span>';
                    }
                    overlayBest.style.display = 'block';
                } else {
                    overlayTitle.textContent = 'Game Over';
                    overlayMessage.textContent = 'You hit a mine';
                    overlayTime.style.display = 'none';
                    overlayBest.style.display = 'none';
                }

                // Show best times
                renderBestTimes();

                overlay.classList.add('visible');
            }, won ? 300 : 600);
        }

        function renderBestTimes() {
            let html = '<h4>Best Times</h4>';
            ['easy', 'medium', 'hard'].forEach(d => {
                const best = localStorage.getItem('minesweeper-best-' + d);
                const label = d.charAt(0).toUpperCase() + d.slice(1);
                const time = best !== null ? formatTime(parseInt(best, 10)) : '---';
                html += `<div class="best-row"><span class="label">${label}</span><span class="time">${time}</span></div>`;
            });
            bestTimesEl.innerHTML = html;
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            if (m > 0) {
                return m + ':' + String(s).padStart(2, '0');
            }
            return s + 's';
        }

        // --- Best time saving ---
        function saveBestTime() {
            const key = 'minesweeper-best-' + difficulty;
            const prev = localStorage.getItem(key);
            if (prev === null || timer < parseInt(prev, 10)) {
                localStorage.setItem(key, timer);
            }
        }

        // --- Neighbor iterator ---
        function forNeighbors(r, c, fn) {
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const nr = r + dr;
                    const nc = c + dc;
                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                        fn(nr, nc);
                    }
                }
            }
        }

        // --- Resize handler ---
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (gameState === 'idle') {
                    buildGrid();
                } else {
                    // Just resize cells, keep state
                    const cellSize = calcCellSize();
                    gridEl.style.setProperty('--cell-size', cellSize + 'px');
                }
            }, 200);
        });

        // Prevent context menu on grid
        gridEl.addEventListener('contextmenu', e => e.preventDefault());

        // --- Init ---
        newGame();
    })();
    </script>
</body>
