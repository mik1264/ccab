<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake - CCAB Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--moss);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        /* Organic blob backgrounds */
        .organic-shape {
            position: fixed;
            border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            opacity: 0.07;
            animation: morph 30s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            background: var(--sage);
            top: -150px;
            left: -150px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: var(--earth);
            bottom: -120px;
            right: -120px;
            animation-delay: -15s;
        }

        @keyframes morph {
            0%, 100% { border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%; }
            25% { border-radius: 73% 27% 44% 56% / 45% 58% 42% 55%; }
            50% { border-radius: 43% 57% 64% 36% / 65% 38% 62% 35%; }
            75% { border-radius: 53% 47% 34% 66% / 35% 68% 32% 65%; }
        }

        /* Back link */
        .back-link {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(188, 108, 37, 0.2);
            border-radius: 20px;
            color: var(--terracotta);
            text-decoration: none;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-link:hover {
            transform: translateX(-5px);
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 4px 15px rgba(188, 108, 37, 0.15);
        }

        /* Game wrapper */
        .game-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 16px;
        }

        .game-title {
            font-family: 'Lora', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--dark-moss);
            margin-bottom: 12px;
            text-align: center;
        }

        /* Score bar */
        .score-bar {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            padding: 8px 24px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 154, 91, 0.2);
            border-radius: 16px;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--sage);
        }

        .score-value {
            font-family: 'Lora', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--dark-moss);
        }

        .score-divider {
            width: 1px;
            height: 32px;
            background: rgba(138, 154, 91, 0.3);
        }

        /* Canvas container */
        .canvas-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow:
                0 8px 32px rgba(61, 68, 35, 0.12),
                0 2px 8px rgba(61, 68, 35, 0.06);
            border: 2px solid rgba(138, 154, 91, 0.25);
        }

        canvas {
            display: block;
        }

        /* Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(254, 250, 224, 0.88);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-title {
            font-family: 'Lora', serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--dark-moss);
            margin-bottom: 8px;
        }

        .overlay-subtitle {
            font-size: 16px;
            color: var(--moss);
            margin-bottom: 24px;
            text-align: center;
            line-height: 1.5;
        }

        .overlay-scores {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }

        .overlay-score-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }

        .overlay-score-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--sage);
        }

        .overlay-score-value {
            font-family: 'Lora', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--dark-moss);
        }

        .new-best {
            color: var(--terracotta);
        }

        .play-btn {
            padding: 12px 36px;
            background: var(--moss);
            color: var(--cream);
            border: none;
            border-radius: 30px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }

        .play-btn:hover {
            background: var(--dark-moss);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(61, 68, 35, 0.25);
        }

        .play-hint {
            font-size: 13px;
            color: var(--sage);
            margin-top: 12px;
        }

        /* Snake emoji for start screen */
        .snake-icon {
            font-size: 52px;
            margin-bottom: 8px;
            animation: snakeBounce 2s infinite ease-in-out;
        }

        @keyframes snakeBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Speed indicator */
        .speed-indicator {
            font-size: 12px;
            color: var(--sage);
            margin-top: 8px;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .game-title { font-size: 22px; }
            .score-bar { gap: 14px; padding: 6px 16px; }
            .score-value { font-size: 18px; }
            .overlay-title { font-size: 28px; }
            .overlay-score-value { font-size: 24px; }
            .back-link { top: 10px; left: 10px; padding: 6px 14px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Games</a>

    <div class="organic-shape shape-1"></div>
    <div class="organic-shape shape-2"></div>

    <div class="game-wrapper">
        <h1 class="game-title">Snake</h1>

        <div class="score-bar">
            <div class="score-item">
                <span class="score-label">Score</span>
                <span class="score-value" id="score-display">0</span>
            </div>
            <div class="score-divider"></div>
            <div class="score-item">
                <span class="score-label">Best</span>
                <span class="score-value" id="best-display">0</span>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="game-canvas"></canvas>

            <!-- Start overlay -->
            <div class="overlay" id="start-overlay">
                <div class="snake-icon">🐍</div>
                <div class="overlay-title">Snake</div>
                <div class="overlay-subtitle">Eat to grow. Don't hit the walls or yourself.</div>
                <button class="play-btn" id="start-btn">Play</button>
                <div class="play-hint">Press Space or tap to start</div>
            </div>

            <!-- Game Over overlay -->
            <div class="overlay hidden" id="gameover-overlay">
                <div class="overlay-title">Game Over</div>
                <div class="overlay-scores">
                    <div class="overlay-score-block">
                        <span class="overlay-score-label">Score</span>
                        <span class="overlay-score-value" id="final-score">0</span>
                    </div>
                    <div class="overlay-score-block">
                        <span class="overlay-score-label">Best</span>
                        <span class="overlay-score-value" id="final-best">0</span>
                    </div>
                </div>
                <div id="new-best-msg" style="display:none; color: var(--terracotta); font-weight: 700; margin-bottom: 16px; font-family: 'Lora', serif; font-size: 18px;">New High Score!</div>
                <button class="play-btn" id="restart-btn">Play Again</button>
                <div class="play-hint">Press Space or tap to restart</div>
            </div>
        </div>

        <div class="speed-indicator" id="speed-display">Speed: 1</div>
    </div>

    <script>
    (function () {
        'use strict';

        // --- Configuration ---
        var GRID_COLS = 20;
        var GRID_ROWS = 20;
        var CELL_SIZE = 24;  // base cell size, may be adjusted for screen
        var BASE_INTERVAL = 150; // ms between moves at speed 1
        var MIN_INTERVAL = 60;   // fastest speed
        var SPEED_STEP = 5;      // decrease interval by this per food eaten

        // --- Colors ---
        var COLOR_BG = '#F4F1DE';
        var COLOR_GRID = 'rgba(138, 154, 91, 0.12)';
        var COLOR_SNAKE_HEAD = '#3d4423';
        var COLOR_SNAKE_BODY = '#606C38';
        var COLOR_SNAKE_BODY_ALT = '#8A9A5B';
        var COLOR_FOOD = '#DDA15E';
        var COLOR_FOOD_GLOW = 'rgba(221, 161, 94, 0.35)';
        var COLOR_DEATH = '#BC6C25';

        // --- DOM ---
        var canvas = document.getElementById('game-canvas');
        var ctx = canvas.getContext('2d');
        var scoreDisplay = document.getElementById('score-display');
        var bestDisplay = document.getElementById('best-display');
        var speedDisplay = document.getElementById('speed-display');
        var startOverlay = document.getElementById('start-overlay');
        var gameoverOverlay = document.getElementById('gameover-overlay');
        var finalScore = document.getElementById('final-score');
        var finalBest = document.getElementById('final-best');
        var newBestMsg = document.getElementById('new-best-msg');
        var startBtn = document.getElementById('start-btn');
        var restartBtn = document.getElementById('restart-btn');

        // --- State ---
        var state = 'start'; // 'start' | 'playing' | 'gameover'
        var snake = [];
        var direction = { x: 1, y: 0 };
        var nextDirection = { x: 1, y: 0 };
        var food = { x: 0, y: 0 };
        var score = 0;
        var highScore = 0;
        var moveInterval = BASE_INTERVAL;
        var lastMoveTime = 0;
        var animFrame = 0;
        var deathCells = null; // used for death flash
        var deathFlashTime = 0;

        // --- Canvas sizing ---
        function sizeCanvas() {
            var maxW = window.innerWidth - 40;
            var maxH = window.innerHeight - 200;
            var dpr = window.devicePixelRatio || 1;

            var cellW = Math.floor(maxW / GRID_COLS);
            var cellH = Math.floor(maxH / GRID_ROWS);
            CELL_SIZE = Math.max(12, Math.min(cellW, cellH, 30));

            var w = GRID_COLS * CELL_SIZE;
            var h = GRID_ROWS * CELL_SIZE;

            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        // --- High score ---
        function loadHighScore() {
            try {
                var stored = localStorage.getItem('snake-highscore');
                if (stored !== null) highScore = parseInt(stored, 10) || 0;
            } catch (e) { /* ignore */ }
            bestDisplay.textContent = highScore;
        }

        function saveHighScore() {
            try {
                localStorage.setItem('snake-highscore', String(highScore));
            } catch (e) { /* ignore */ }
        }

        // --- Init game ---
        function initGame() {
            var midX = Math.floor(GRID_COLS / 2);
            var midY = Math.floor(GRID_ROWS / 2);
            snake = [
                { x: midX, y: midY },
                { x: midX - 1, y: midY },
                { x: midX - 2, y: midY }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            moveInterval = BASE_INTERVAL;
            deathCells = null;
            deathFlashTime = 0;
            scoreDisplay.textContent = '0';
            speedDisplay.textContent = 'Speed: 1';
            placeFood();
        }

        function placeFood() {
            var tries = 0;
            do {
                food.x = Math.floor(Math.random() * GRID_COLS);
                food.y = Math.floor(Math.random() * GRID_ROWS);
                tries++;
            } while (isSnakeCell(food.x, food.y) && tries < 500);
        }

        function isSnakeCell(x, y) {
            for (var i = 0; i < snake.length; i++) {
                if (snake[i].x === x && snake[i].y === y) return true;
            }
            return false;
        }

        // --- Game logic ---
        function moveSnake() {
            direction.x = nextDirection.x;
            direction.y = nextDirection.y;

            var head = snake[0];
            var newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };

            // Check wall collision
            if (newHead.x < 0 || newHead.x >= GRID_COLS || newHead.y < 0 || newHead.y >= GRID_ROWS) {
                gameOver();
                return;
            }

            // Check self collision
            if (isSnakeCell(newHead.x, newHead.y)) {
                gameOver();
                return;
            }

            snake.unshift(newHead);

            // Check food
            if (newHead.x === food.x && newHead.y === food.y) {
                score++;
                scoreDisplay.textContent = score;

                // Speed up
                moveInterval = Math.max(MIN_INTERVAL, BASE_INTERVAL - score * SPEED_STEP);
                var speedLevel = Math.floor((BASE_INTERVAL - moveInterval) / SPEED_STEP) + 1;
                speedDisplay.textContent = 'Speed: ' + speedLevel;

                placeFood();
            } else {
                snake.pop();
            }
        }

        function gameOver() {
            state = 'gameover';

            // Record death position for flash effect
            deathCells = snake.slice();
            deathFlashTime = performance.now();

            var isNewBest = false;
            if (score > highScore) {
                highScore = score;
                saveHighScore();
                isNewBest = true;
            }

            bestDisplay.textContent = highScore;
            finalScore.textContent = score;
            finalBest.textContent = highScore;

            if (isNewBest && score > 0) {
                newBestMsg.style.display = 'block';
                finalBest.classList.add('new-best');
            } else {
                newBestMsg.style.display = 'none';
                finalBest.classList.remove('new-best');
            }

            // Show game over with short delay so player sees crash
            setTimeout(function () {
                gameoverOverlay.classList.remove('hidden');
            }, 400);
        }

        // --- Rendering ---
        function drawGrid() {
            ctx.fillStyle = COLOR_BG;
            ctx.fillRect(0, 0, GRID_COLS * CELL_SIZE, GRID_ROWS * CELL_SIZE);

            ctx.strokeStyle = COLOR_GRID;
            ctx.lineWidth = 0.5;
            for (var x = 0; x <= GRID_COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * CELL_SIZE, 0);
                ctx.lineTo(x * CELL_SIZE, GRID_ROWS * CELL_SIZE);
                ctx.stroke();
            }
            for (var y = 0; y <= GRID_ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * CELL_SIZE);
                ctx.lineTo(GRID_COLS * CELL_SIZE, y * CELL_SIZE);
                ctx.stroke();
            }
        }

        function drawFood(time) {
            var cx = food.x * CELL_SIZE + CELL_SIZE / 2;
            var cy = food.y * CELL_SIZE + CELL_SIZE / 2;
            var r = CELL_SIZE * 0.38;

            // Pulse glow
            var pulse = 1 + 0.15 * Math.sin(time * 0.004);
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, r * pulse * 1.6, 0, Math.PI * 2);
            ctx.fillStyle = COLOR_FOOD_GLOW;
            ctx.fill();
            ctx.restore();

            // Food body
            ctx.beginPath();
            ctx.arc(cx, cy, r * pulse, 0, Math.PI * 2);
            ctx.fillStyle = COLOR_FOOD;
            ctx.fill();

            // Highlight
            ctx.beginPath();
            ctx.arc(cx - r * 0.25, cy - r * 0.25, r * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fill();
        }

        function drawSnake(time) {
            var pad = 1;
            for (var i = snake.length - 1; i >= 0; i--) {
                var seg = snake[i];
                var x = seg.x * CELL_SIZE + pad;
                var y = seg.y * CELL_SIZE + pad;
                var size = CELL_SIZE - pad * 2;

                if (i === 0) {
                    // Head
                    ctx.fillStyle = COLOR_SNAKE_HEAD;
                    roundRect(ctx, x, y, size, size, CELL_SIZE * 0.3);
                    ctx.fill();

                    // Eyes
                    drawEyes(seg, size, pad);
                } else {
                    // Body with alternating colors
                    ctx.fillStyle = (i % 2 === 0) ? COLOR_SNAKE_BODY : COLOR_SNAKE_BODY_ALT;
                    roundRect(ctx, x, y, size, size, CELL_SIZE * 0.22);
                    ctx.fill();
                }
            }
        }

        function drawEyes(head, size, pad) {
            var cx = head.x * CELL_SIZE + CELL_SIZE / 2;
            var cy = head.y * CELL_SIZE + CELL_SIZE / 2;
            var eyeR = CELL_SIZE * 0.1;
            var eyeOff = CELL_SIZE * 0.22;
            var pupilR = eyeR * 0.55;

            // Determine eye positions based on direction
            var e1x, e1y, e2x, e2y;
            if (direction.x === 1) { // right
                e1x = cx + eyeOff * 0.6; e1y = cy - eyeOff;
                e2x = cx + eyeOff * 0.6; e2y = cy + eyeOff;
            } else if (direction.x === -1) { // left
                e1x = cx - eyeOff * 0.6; e1y = cy - eyeOff;
                e2x = cx - eyeOff * 0.6; e2y = cy + eyeOff;
            } else if (direction.y === -1) { // up
                e1x = cx - eyeOff; e1y = cy - eyeOff * 0.6;
                e2x = cx + eyeOff; e2y = cy - eyeOff * 0.6;
            } else { // down
                e1x = cx - eyeOff; e1y = cy + eyeOff * 0.6;
                e2x = cx + eyeOff; e2y = cy + eyeOff * 0.6;
            }

            // Eye whites
            ctx.fillStyle = '#FEFAE0';
            ctx.beginPath(); ctx.arc(e1x, e1y, eyeR, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(e2x, e2y, eyeR, 0, Math.PI * 2); ctx.fill();

            // Pupils (offset in movement direction)
            var px = direction.x * pupilR * 0.4;
            var py = direction.y * pupilR * 0.4;
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath(); ctx.arc(e1x + px, e1y + py, pupilR, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(e2x + px, e2y + py, pupilR, 0, Math.PI * 2); ctx.fill();
        }

        function drawDeathFlash(time) {
            if (!deathCells) return;
            var elapsed = time - deathFlashTime;
            if (elapsed > 600) { deathCells = null; return; }

            var alpha = 0.6 * (1 - elapsed / 600);
            ctx.fillStyle = 'rgba(188, 108, 37, ' + alpha + ')';
            for (var i = 0; i < deathCells.length; i++) {
                var seg = deathCells[i];
                ctx.fillRect(seg.x * CELL_SIZE, seg.y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            }
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // --- Main loop ---
        function gameLoop(time) {
            animFrame = requestAnimationFrame(gameLoop);

            drawGrid();

            if (state === 'playing') {
                if (time - lastMoveTime >= moveInterval) {
                    moveSnake();
                    lastMoveTime = time;
                }
                drawFood(time);
                drawSnake(time);
            } else if (state === 'start') {
                // Draw a little preview snake
                drawFood(time);
                drawSnake(time);
            } else if (state === 'gameover') {
                drawFood(time);
                drawSnake(time);
                drawDeathFlash(time);
            }
        }

        // --- Start / restart ---
        function startGame() {
            if (state === 'playing') return;
            initGame();
            state = 'playing';
            lastMoveTime = performance.now();
            startOverlay.classList.add('hidden');
            gameoverOverlay.classList.add('hidden');
        }

        // --- Input: keyboard ---
        document.addEventListener('keydown', function (e) {
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                if (state !== 'playing') {
                    startGame();
                }
                return;
            }

            if (state !== 'playing') return;

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    if (direction.y !== 1) { nextDirection = { x: 0, y: -1 }; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    if (direction.y !== -1) { nextDirection = { x: 0, y: 1 }; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    if (direction.x !== 1) { nextDirection = { x: -1, y: 0 }; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    if (direction.x !== -1) { nextDirection = { x: 1, y: 0 }; }
                    break;
            }
        });

        // --- Input: touch/swipe ---
        var touchStartX = 0;
        var touchStartY = 0;
        var touchStartTime = 0;

        canvas.addEventListener('touchstart', function (e) {
            e.preventDefault();
            if (state !== 'playing') return;
            var touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            touchStartTime = Date.now();
        }, { passive: false });

        canvas.addEventListener('touchend', function (e) {
            e.preventDefault();
            if (state !== 'playing') return;
            var touch = e.changedTouches[0];
            var dx = touch.clientX - touchStartX;
            var dy = touch.clientY - touchStartY;
            var elapsed = Date.now() - touchStartTime;

            // Need minimum swipe distance and not too slow
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 20 || elapsed > 500) return;

            if (Math.abs(dx) > Math.abs(dy)) {
                // Horizontal swipe
                if (dx > 0 && direction.x !== -1) {
                    nextDirection = { x: 1, y: 0 };
                } else if (dx < 0 && direction.x !== 1) {
                    nextDirection = { x: -1, y: 0 };
                }
            } else {
                // Vertical swipe
                if (dy > 0 && direction.y !== -1) {
                    nextDirection = { x: 0, y: 1 };
                } else if (dy < 0 && direction.y !== 1) {
                    nextDirection = { x: 0, y: -1 };
                }
            }
        }, { passive: false });

        // Buttons & overlay taps
        startBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            startGame();
        });

        restartBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            startGame();
        });

        // Also allow tapping overlay to start/restart
        startOverlay.addEventListener('click', function () { startGame(); });
        gameoverOverlay.addEventListener('click', function () { startGame(); });

        // --- Window resize ---
        var resizeTimeout;
        window.addEventListener('resize', function () {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function () {
                sizeCanvas();
            }, 150);
        });

        // --- Init ---
        loadHighScore();
        sizeCanvas();
        initGame();
        animFrame = requestAnimationFrame(gameLoop);
    })();
    </script>
</body>
</html>
