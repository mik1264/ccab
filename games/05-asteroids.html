<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Asteroids - CCAB</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--moss);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        .organic-shape {
            position: fixed;
            border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            opacity: 0.07;
            animation: morph 30s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            background: var(--sage);
            top: -150px;
            left: -150px;
        }

        .shape-2 {
            width: 350px;
            height: 350px;
            background: var(--earth);
            bottom: -80px;
            right: -80px;
            animation-delay: -10s;
        }

        .shape-3 {
            width: 280px;
            height: 280px;
            background: var(--terracotta);
            top: 50%;
            left: -100px;
            animation-delay: -20s;
        }

        @keyframes morph {
            0%, 100% {
                border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
                transform: rotate(0deg) scale(1);
            }
            25% {
                border-radius: 40% 60% 70% 30% / 40% 40% 60% 60%;
                transform: rotate(90deg) scale(1.05);
            }
            50% {
                border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%;
                transform: rotate(180deg) scale(1);
            }
            75% {
                border-radius: 70% 30% 50% 50% / 30% 65% 35% 70%;
                transform: rotate(270deg) scale(0.95);
            }
        }

        .back-link {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 100;
            color: var(--terracotta);
            text-decoration: none;
            font-weight: 600;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(188, 108, 37, 0.15);
        }

        .back-link:hover {
            transform: translateX(-5px);
            background: rgba(255, 255, 255, 0.85);
            border-color: rgba(188, 108, 37, 0.3);
        }

        .game-title {
            font-family: 'Lora', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark-moss);
            margin-top: 10px;
            margin-bottom: 4px;
            z-index: 1;
            text-align: center;
        }

        .hud-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: 100%;
            max-width: 800px;
            padding: 4px 16px;
            z-index: 1;
            flex-wrap: wrap;
        }

        .hud-item {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(138, 154, 91, 0.2);
            border-radius: 14px;
            padding: 4px 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--dark-moss);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .hud-label {
            color: var(--moss);
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hud-value {
            color: var(--terracotta);
            font-weight: 700;
            font-size: 1rem;
            font-family: 'Lora', serif;
        }

        .lives-display {
            display: flex;
            gap: 3px;
        }

        .life-icon {
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 12px solid var(--sage);
            display: inline-block;
        }

        .life-icon.lost {
            border-bottom-color: rgba(138, 154, 91, 0.2);
        }

        .canvas-wrapper {
            position: relative;
            z-index: 1;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(61, 68, 35, 0.15), inset 0 0 0 1px rgba(138, 154, 91, 0.2);
            margin: 6px 0;
            flex: 1;
            display: flex;
            max-height: calc(100vh - 170px);
            max-height: calc(100dvh - 170px);
        }

        canvas {
            display: block;
            background: #0a0c05;
        }

        /* Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            pointer-events: auto;
            opacity: 1;
        }

        .overlay-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 12, 5, 0.75);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .overlay-content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 32px;
        }

        .overlay-title {
            font-family: 'Lora', serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--cream);
            margin-bottom: 8px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }

        .overlay-subtitle {
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            color: var(--sage);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .overlay-score {
            font-family: 'Lora', serif;
            font-size: 1.6rem;
            color: var(--earth);
            margin-bottom: 6px;
        }

        .overlay-highscore {
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            color: rgba(254, 250, 224, 0.6);
            margin-bottom: 24px;
        }

        .overlay-btn {
            display: inline-block;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--cream);
            background: var(--moss);
            border: none;
            padding: 10px 32px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .overlay-btn:hover {
            background: var(--sage);
            transform: scale(1.05);
        }

        .overlay-hint {
            font-family: 'Nunito', sans-serif;
            font-size: 0.8rem;
            color: rgba(254, 250, 224, 0.45);
            margin-top: 14px;
        }

        .new-highscore {
            color: var(--earth);
            font-weight: 700;
            animation: pulse-hs 1s infinite;
        }

        @keyframes pulse-hs {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Touch Controls */
        .touch-controls {
            display: none;
            width: 100%;
            max-width: 800px;
            padding: 6px 12px 12px;
            z-index: 10;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .touch-group {
            display: flex;
            gap: 8px;
        }

        .touch-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid rgba(138, 154, 91, 0.4);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--sage);
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .touch-btn:active, .touch-btn.pressed {
            background: rgba(138, 154, 91, 0.35);
            border-color: var(--sage);
            transform: scale(0.92);
        }

        .touch-btn.fire-btn {
            width: 64px;
            height: 64px;
            border-color: rgba(221, 161, 94, 0.5);
            color: var(--earth);
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
        }

        .touch-btn.fire-btn:active, .touch-btn.fire-btn.pressed {
            background: rgba(221, 161, 94, 0.3);
            border-color: var(--earth);
        }

        .touch-btn.thrust-btn {
            border-color: rgba(188, 108, 37, 0.4);
            color: var(--terracotta);
        }

        .touch-btn.thrust-btn:active, .touch-btn.thrust-btn.pressed {
            background: rgba(188, 108, 37, 0.3);
            border-color: var(--terracotta);
        }

        @media (pointer: coarse), (max-width: 768px) {
            .touch-controls {
                display: flex;
            }
        }

        @media (max-width: 480px) {
            .game-title { font-size: 1.1rem; margin-top: 6px; }
            .hud-item { padding: 3px 10px; font-size: 0.78rem; }
            .hud-value { font-size: 0.88rem; }
            .overlay-title { font-size: 1.8rem; }
            .touch-btn { width: 50px; height: 50px; font-size: 1.2rem; }
            .touch-btn.fire-btn { width: 58px; height: 58px; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&larr; Games</a>

    <div class="organic-shape shape-1"></div>
    <div class="organic-shape shape-2"></div>
    <div class="organic-shape shape-3"></div>

    <h1 class="game-title">Asteroids</h1>

    <div class="hud-bar">
        <div class="hud-item">
            <span class="hud-label">Score</span>
            <span class="hud-value" id="hud-score">0</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">Wave</span>
            <span class="hud-value" id="hud-wave">1</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">Lives</span>
            <span class="lives-display" id="hud-lives"></span>
        </div>
        <div class="hud-item">
            <span class="hud-label">Best</span>
            <span class="hud-value" id="hud-highscore">0</span>
        </div>
    </div>

    <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas id="canvas"></canvas>

        <!-- Start Screen -->
        <div class="overlay active" id="start-overlay">
            <div class="overlay-bg"></div>
            <div class="overlay-content">
                <div class="overlay-title">Asteroids</div>
                <div class="overlay-subtitle">
                    Arrow keys to move &amp; rotate<br>
                    Space to fire &bull; P to pause
                </div>
                <button class="overlay-btn" id="start-btn">Start Game</button>
                <div class="overlay-hint">or press Space / Enter</div>
            </div>
        </div>

        <!-- Pause Screen -->
        <div class="overlay" id="pause-overlay">
            <div class="overlay-bg"></div>
            <div class="overlay-content">
                <div class="overlay-title">Paused</div>
                <div class="overlay-subtitle">Press P or tap to resume</div>
                <button class="overlay-btn" id="resume-btn">Resume</button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div class="overlay" id="gameover-overlay">
            <div class="overlay-bg"></div>
            <div class="overlay-content">
                <div class="overlay-title">Game Over</div>
                <div class="overlay-score" id="final-score">Score: 0</div>
                <div class="overlay-highscore" id="final-highscore">Best: 0</div>
                <button class="overlay-btn" id="restart-btn">Play Again</button>
                <div class="overlay-hint">or press Space / Enter</div>
            </div>
        </div>
    </div>

    <div class="touch-controls" id="touch-controls">
        <div class="touch-group">
            <button class="touch-btn" id="btn-left" aria-label="Rotate Left">&larr;</button>
            <button class="touch-btn" id="btn-right" aria-label="Rotate Right">&rarr;</button>
        </div>
        <button class="touch-btn fire-btn" id="btn-fire" aria-label="Fire">FIRE</button>
        <button class="touch-btn thrust-btn" id="btn-thrust" aria-label="Thrust">&uarr;</button>
    </div>

    <script>
    (function() {
        'use strict';

        // ---- Constants ----
        var SHIP_SIZE = 14;
        var SHIP_TURN_SPEED = 0.065;
        var SHIP_THRUST = 0.12;
        var SHIP_FRICTION = 0.985;
        var SHIP_MAX_SPEED = 6;
        var BULLET_SPEED = 7;
        var BULLET_LIFE = 55;
        var MAX_BULLETS = 6;
        var FIRE_COOLDOWN = 8;
        var ASTEROID_SPEED_RANGE = [0.5, 1.8];
        var ASTEROID_SIZES = { large: 40, medium: 22, small: 12 };
        var ASTEROID_SCORES = { large: 20, medium: 50, small: 100 };
        var BASE_ASTEROIDS = 4;
        var INVULN_TIME = 120;
        var RESPAWN_DELAY = 60;
        var WAVE_DELAY = 90;

        // Colors (organic palette)
        var COLOR_SHIP = '#8A9A5B';
        var COLOR_SHIP_THRUST = '#BC6C25';
        var COLOR_BULLET = '#DDA15E';
        var COLOR_ASTEROID = '#BC6C25';
        var COLOR_ASTEROID_STROKE = '#DDA15E';
        var COLOR_PARTICLE = '#DDA15E';
        var COLOR_STAR = 'rgba(138,154,91,0.3)';

        // ---- Canvas Setup ----
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var wrapper = document.getElementById('canvas-wrapper');

        function resizeCanvas() {
            var rect = wrapper.getBoundingClientRect();
            var w = Math.floor(rect.width);
            var h = Math.floor(rect.height);
            var dpr = window.devicePixelRatio || 1;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            return { w: w, h: h };
        }

        var dims = resizeCanvas();
        var W = dims.w;
        var H = dims.h;

        var resizeTimer = null;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function() {
                var d = resizeCanvas();
                W = d.w;
                H = d.h;
                generateStars();
            }, 100);
        });

        // ---- State ----
        var STATE_START = 0, STATE_PLAYING = 1, STATE_PAUSED = 2, STATE_GAMEOVER = 3, STATE_RESPAWNING = 4;
        var gameState = STATE_START;
        var score = 0;
        var lives = 3;
        var wave = 1;
        var highScore = parseInt(localStorage.getItem('asteroids-highscore')) || 0;
        var respawnTimer = 0;
        var waveTimer = 0;
        var fireCooldown = 0;

        // ---- HUD ----
        var hudScore = document.getElementById('hud-score');
        var hudWave = document.getElementById('hud-wave');
        var hudLives = document.getElementById('hud-lives');
        var hudHighscore = document.getElementById('hud-highscore');

        function updateHUD() {
            hudScore.textContent = score;
            hudWave.textContent = wave;
            hudHighscore.textContent = highScore;
            var html = '';
            for (var i = 0; i < 3; i++) {
                html += '<span class="life-icon' + (i < lives ? '' : ' lost') + '"></span>';
            }
            hudLives.innerHTML = html;
        }

        // ---- Overlays ----
        var startOverlay = document.getElementById('start-overlay');
        var pauseOverlay = document.getElementById('pause-overlay');
        var gameoverOverlay = document.getElementById('gameover-overlay');

        function showOverlay(el) {
            el.classList.add('active');
        }

        function hideOverlay(el) {
            el.classList.remove('active');
        }

        // ---- Stars ----
        var stars = [];
        function generateStars() {
            stars = [];
            var count = Math.floor((W * H) / 2000);
            for (var i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: Math.random() * 1.5 + 0.3,
                    a: Math.random() * 0.4 + 0.1,
                    twinkleSpeed: Math.random() * 0.02 + 0.005,
                    twinkleOffset: Math.random() * Math.PI * 2
                });
            }
        }
        generateStars();

        // ---- Ship ----
        var ship = null;

        function createShip() {
            return {
                x: W / 2,
                y: H / 2,
                angle: -Math.PI / 2,
                vx: 0,
                vy: 0,
                thrusting: false,
                invulnerable: INVULN_TIME,
                alive: true
            };
        }

        // ---- Asteroids ----
        var asteroids = [];

        function createAsteroid(x, y, size) {
            var speed = ASTEROID_SPEED_RANGE[0] + Math.random() * (ASTEROID_SPEED_RANGE[1] - ASTEROID_SPEED_RANGE[0]);
            if (size === 'medium') speed *= 1.2;
            if (size === 'small') speed *= 1.5;
            var angle = Math.random() * Math.PI * 2;
            var r = ASTEROID_SIZES[size];
            // Create jagged polygon vertices
            var numVerts = size === 'large' ? 10 : (size === 'medium' ? 8 : 7);
            var verts = [];
            for (var i = 0; i < numVerts; i++) {
                var a = (i / numVerts) * Math.PI * 2;
                var jag = 0.7 + Math.random() * 0.5;
                verts.push({ a: a, d: r * jag });
            }
            return {
                x: x, y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                size: size,
                r: r,
                verts: verts,
                rotAngle: 0,
                rotSpeed: (Math.random() - 0.5) * 0.02
            };
        }

        function spawnWave(num) {
            asteroids = [];
            for (var i = 0; i < num; i++) {
                var x, y;
                // Spawn away from ship
                do {
                    x = Math.random() * W;
                    y = Math.random() * H;
                } while (ship && Math.hypot(x - ship.x, y - ship.y) < 150);
                asteroids.push(createAsteroid(x, y, 'large'));
            }
        }

        // ---- Bullets ----
        var bullets = [];

        function fireBullet() {
            if (!ship || !ship.alive || fireCooldown > 0) return;
            if (bullets.length >= MAX_BULLETS) return;
            fireCooldown = FIRE_COOLDOWN;
            var tipX = ship.x + Math.cos(ship.angle) * SHIP_SIZE;
            var tipY = ship.y + Math.sin(ship.angle) * SHIP_SIZE;
            bullets.push({
                x: tipX,
                y: tipY,
                vx: Math.cos(ship.angle) * BULLET_SPEED + ship.vx * 0.3,
                vy: Math.sin(ship.angle) * BULLET_SPEED + ship.vy * 0.3,
                life: BULLET_LIFE
            });
        }

        // ---- Particles ----
        var particles = [];

        function spawnExplosion(x, y, count, color, speedMul) {
            speedMul = speedMul || 1;
            for (var i = 0; i < count; i++) {
                var a = Math.random() * Math.PI * 2;
                var sp = (Math.random() * 2.5 + 0.5) * speedMul;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(a) * sp,
                    vy: Math.sin(a) * sp,
                    life: 25 + Math.random() * 25,
                    maxLife: 50,
                    color: color || COLOR_PARTICLE,
                    size: Math.random() * 2.5 + 0.5
                });
            }
        }

        function spawnThrustParticle() {
            if (!ship || !ship.alive) return;
            var backAngle = ship.angle + Math.PI;
            var spread = (Math.random() - 0.5) * 0.6;
            var sp = Math.random() * 1.5 + 1;
            var bx = ship.x + Math.cos(backAngle) * (SHIP_SIZE * 0.7);
            var by = ship.y + Math.sin(backAngle) * (SHIP_SIZE * 0.7);
            particles.push({
                x: bx + (Math.random() - 0.5) * 3,
                y: by + (Math.random() - 0.5) * 3,
                vx: Math.cos(backAngle + spread) * sp + ship.vx * 0.3,
                vy: Math.sin(backAngle + spread) * sp + ship.vy * 0.3,
                life: 12 + Math.random() * 10,
                maxLife: 22,
                color: Math.random() < 0.5 ? COLOR_SHIP_THRUST : COLOR_BULLET,
                size: Math.random() * 2 + 0.5
            });
        }

        // ---- Input ----
        var keys = {};
        document.addEventListener('keydown', function(e) {
            keys[e.code] = true;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown' || e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                e.preventDefault();
            }
            // Start / Restart
            if (gameState === STATE_START && (e.code === 'Space' || e.code === 'Enter')) {
                e.preventDefault();
                startGame();
            } else if (gameState === STATE_GAMEOVER && (e.code === 'Space' || e.code === 'Enter')) {
                e.preventDefault();
                startGame();
            } else if (gameState === STATE_PLAYING && e.code === 'KeyP') {
                pauseGame();
            } else if (gameState === STATE_PAUSED && e.code === 'KeyP') {
                resumeGame();
            }
        });

        document.addEventListener('keyup', function(e) {
            keys[e.code] = false;
        });

        // ---- Touch Controls ----
        var touchState = { left: false, right: false, thrust: false, fire: false };

        function setupTouchBtn(id, key) {
            var btn = document.getElementById(id);
            btn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                touchState[key] = true;
                btn.classList.add('pressed');
            });
            btn.addEventListener('touchend', function(e) {
                e.preventDefault();
                touchState[key] = false;
                btn.classList.remove('pressed');
            });
            btn.addEventListener('touchcancel', function(e) {
                touchState[key] = false;
                btn.classList.remove('pressed');
            });
            // Mouse fallback
            btn.addEventListener('mousedown', function(e) {
                e.preventDefault();
                touchState[key] = true;
                btn.classList.add('pressed');
            });
            btn.addEventListener('mouseup', function(e) {
                touchState[key] = false;
                btn.classList.remove('pressed');
            });
            btn.addEventListener('mouseleave', function(e) {
                touchState[key] = false;
                btn.classList.remove('pressed');
            });
        }

        setupTouchBtn('btn-left', 'left');
        setupTouchBtn('btn-right', 'right');
        setupTouchBtn('btn-thrust', 'thrust');
        setupTouchBtn('btn-fire', 'fire');

        // ---- Overlay Buttons ----
        document.getElementById('start-btn').addEventListener('click', function() { startGame(); });
        document.getElementById('resume-btn').addEventListener('click', function() { resumeGame(); });
        document.getElementById('restart-btn').addEventListener('click', function() { startGame(); });

        // Tap on pause overlay
        pauseOverlay.addEventListener('click', function(e) {
            if (e.target === pauseOverlay || e.target.classList.contains('overlay-bg')) {
                resumeGame();
            }
        });

        // ---- Game Control ----
        function startGame() {
            score = 0;
            lives = 3;
            wave = 1;
            bullets = [];
            particles = [];
            ship = createShip();
            spawnWave(BASE_ASTEROIDS);
            gameState = STATE_PLAYING;
            fireCooldown = 0;
            respawnTimer = 0;
            waveTimer = 0;
            hideOverlay(startOverlay);
            hideOverlay(gameoverOverlay);
            hideOverlay(pauseOverlay);
            updateHUD();
        }

        function pauseGame() {
            if (gameState !== STATE_PLAYING && gameState !== STATE_RESPAWNING) return;
            gameState = STATE_PAUSED;
            showOverlay(pauseOverlay);
        }

        function resumeGame() {
            if (gameState !== STATE_PAUSED) return;
            gameState = STATE_PLAYING;
            hideOverlay(pauseOverlay);
        }

        function gameOver() {
            gameState = STATE_GAMEOVER;
            var isNew = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('asteroids-highscore', highScore);
                isNew = true;
            }
            document.getElementById('final-score').textContent = 'Score: ' + score;
            var hsEl = document.getElementById('final-highscore');
            if (isNew) {
                hsEl.innerHTML = '<span class="new-highscore">New High Score!</span>';
            } else {
                hsEl.textContent = 'Best: ' + highScore;
            }
            updateHUD();
            showOverlay(gameoverOverlay);
        }

        function shipDestroyed() {
            if (!ship) return;
            spawnExplosion(ship.x, ship.y, 30, COLOR_SHIP, 1.5);
            spawnExplosion(ship.x, ship.y, 15, COLOR_SHIP_THRUST, 1);
            ship.alive = false;
            lives--;
            updateHUD();
            if (lives <= 0) {
                respawnTimer = 60;
                gameState = STATE_RESPAWNING;
            } else {
                respawnTimer = RESPAWN_DELAY;
                gameState = STATE_RESPAWNING;
            }
        }

        function respawnShip() {
            ship = createShip();
            // Make sure spawn is safe
            for (var i = 0; i < asteroids.length; i++) {
                var a = asteroids[i];
                if (Math.hypot(a.x - ship.x, a.y - ship.y) < a.r + 60) {
                    // Push asteroid away
                    var ang = Math.atan2(a.y - ship.y, a.x - ship.x);
                    a.x = ship.x + Math.cos(ang) * (a.r + 80);
                    a.y = ship.y + Math.sin(ang) * (a.r + 80);
                }
            }
            gameState = STATE_PLAYING;
        }

        // ---- Wrap ----
        function wrap(obj) {
            if (obj.x < -50) obj.x += W + 100;
            if (obj.x > W + 50) obj.x -= W + 100;
            if (obj.y < -50) obj.y += H + 100;
            if (obj.y > H + 50) obj.y -= H + 100;
        }

        // ---- Collision ----
        function circlesCollide(ax, ay, ar, bx, by, br) {
            var dx = ax - bx, dy = ay - by;
            return dx * dx + dy * dy < (ar + br) * (ar + br);
        }

        // ---- Update ----
        function update() {
            if (gameState === STATE_PAUSED || gameState === STATE_START || gameState === STATE_GAMEOVER) return;

            // Respawn timer
            if (gameState === STATE_RESPAWNING) {
                respawnTimer--;
                if (respawnTimer <= 0) {
                    if (lives <= 0) {
                        gameOver();
                        return;
                    }
                    respawnShip();
                }
            }

            // Wave timer
            if (asteroids.length === 0 && gameState === STATE_PLAYING) {
                waveTimer++;
                if (waveTimer >= WAVE_DELAY) {
                    wave++;
                    spawnWave(BASE_ASTEROIDS + wave - 1);
                    updateHUD();
                    waveTimer = 0;
                }
            }

            // Ship input
            if (ship && ship.alive) {
                if (keys['ArrowLeft'] || touchState.left) {
                    ship.angle -= SHIP_TURN_SPEED;
                }
                if (keys['ArrowRight'] || touchState.right) {
                    ship.angle += SHIP_TURN_SPEED;
                }
                ship.thrusting = !!(keys['ArrowUp'] || touchState.thrust);
                if (ship.thrusting) {
                    ship.vx += Math.cos(ship.angle) * SHIP_THRUST;
                    ship.vy += Math.sin(ship.angle) * SHIP_THRUST;
                    // Clamp speed
                    var spd = Math.hypot(ship.vx, ship.vy);
                    if (spd > SHIP_MAX_SPEED) {
                        ship.vx = (ship.vx / spd) * SHIP_MAX_SPEED;
                        ship.vy = (ship.vy / spd) * SHIP_MAX_SPEED;
                    }
                    // Thrust particles
                    if (Math.random() < 0.7) spawnThrustParticle();
                }
                ship.vx *= SHIP_FRICTION;
                ship.vy *= SHIP_FRICTION;
                ship.x += ship.vx;
                ship.y += ship.vy;
                wrap(ship);

                if (ship.invulnerable > 0) ship.invulnerable--;

                // Fire
                if (fireCooldown > 0) fireCooldown--;
                if (keys['Space'] || touchState.fire) {
                    fireBullet();
                }
            }

            // Update bullets
            for (var i = bullets.length - 1; i >= 0; i--) {
                var b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                b.life--;
                wrap(b);
                if (b.life <= 0) {
                    bullets.splice(i, 1);
                }
            }

            // Update asteroids
            for (var i = 0; i < asteroids.length; i++) {
                var a = asteroids[i];
                a.x += a.vx;
                a.y += a.vy;
                a.rotAngle += a.rotSpeed;
                wrap(a);
            }

            // Update particles
            for (var i = particles.length - 1; i >= 0; i--) {
                var p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.97;
                p.vy *= 0.97;
                p.life--;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // Bullet-Asteroid collisions
            for (var i = bullets.length - 1; i >= 0; i--) {
                var b = bullets[i];
                for (var j = asteroids.length - 1; j >= 0; j--) {
                    var a = asteroids[j];
                    if (circlesCollide(b.x, b.y, 2, a.x, a.y, a.r * 0.85)) {
                        // Hit!
                        score += ASTEROID_SCORES[a.size];
                        spawnExplosion(a.x, a.y, a.size === 'large' ? 20 : (a.size === 'medium' ? 14 : 8), COLOR_ASTEROID_STROKE);
                        // Split
                        if (a.size === 'large') {
                            asteroids.push(createAsteroid(a.x, a.y, 'medium'));
                            asteroids.push(createAsteroid(a.x, a.y, 'medium'));
                        } else if (a.size === 'medium') {
                            asteroids.push(createAsteroid(a.x, a.y, 'small'));
                            asteroids.push(createAsteroid(a.x, a.y, 'small'));
                        }
                        asteroids.splice(j, 1);
                        bullets.splice(i, 1);
                        updateHUD();
                        break;
                    }
                }
            }

            // Ship-Asteroid collision
            if (ship && ship.alive && ship.invulnerable <= 0) {
                for (var i = 0; i < asteroids.length; i++) {
                    var a = asteroids[i];
                    if (circlesCollide(ship.x, ship.y, SHIP_SIZE * 0.6, a.x, a.y, a.r * 0.8)) {
                        shipDestroyed();
                        break;
                    }
                }
            }
        }

        // ---- Draw ----
        function drawStars(time) {
            for (var i = 0; i < stars.length; i++) {
                var s = stars[i];
                var alpha = s.a + Math.sin(time * s.twinkleSpeed + s.twinkleOffset) * 0.15;
                ctx.fillStyle = 'rgba(138,154,91,' + alpha.toFixed(2) + ')';
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawShip() {
            if (!ship || !ship.alive) return;

            var alpha = 1;
            if (ship.invulnerable > 0) {
                // Blink
                alpha = (Math.floor(ship.invulnerable / 4) % 2 === 0) ? 0.9 : 0.25;
            }

            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);
            ctx.globalAlpha = alpha;

            // Ship body - classic triangle
            ctx.strokeStyle = COLOR_SHIP;
            ctx.lineWidth = 2;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(SHIP_SIZE, 0);                                // nose
            ctx.lineTo(-SHIP_SIZE * 0.7, -SHIP_SIZE * 0.6);         // top-left
            ctx.lineTo(-SHIP_SIZE * 0.4, 0);                        // notch center
            ctx.lineTo(-SHIP_SIZE * 0.7, SHIP_SIZE * 0.6);          // bottom-left
            ctx.closePath();
            ctx.stroke();

            // Thrust flame
            if (ship.thrusting) {
                ctx.strokeStyle = COLOR_SHIP_THRUST;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                var fl = SHIP_SIZE * (0.4 + Math.random() * 0.4);
                ctx.moveTo(-SHIP_SIZE * 0.5, -SHIP_SIZE * 0.25);
                ctx.lineTo(-SHIP_SIZE * 0.4 - fl, 0);
                ctx.lineTo(-SHIP_SIZE * 0.5, SHIP_SIZE * 0.25);
                ctx.stroke();
            }

            ctx.globalAlpha = 1;
            ctx.restore();
        }

        function drawAsteroids() {
            ctx.strokeStyle = COLOR_ASTEROID;
            ctx.lineWidth = 1.5;
            for (var i = 0; i < asteroids.length; i++) {
                var a = asteroids[i];
                ctx.save();
                ctx.translate(a.x, a.y);
                ctx.rotate(a.rotAngle);
                ctx.beginPath();
                for (var j = 0; j < a.verts.length; j++) {
                    var v = a.verts[j];
                    var px = Math.cos(v.a) * v.d;
                    var py = Math.sin(v.a) * v.d;
                    if (j === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.restore();
            }
        }

        function drawBullets() {
            for (var i = 0; i < bullets.length; i++) {
                var b = bullets[i];
                var alpha = Math.min(1, b.life / 10);
                ctx.fillStyle = COLOR_BULLET;
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
                ctx.fill();
                // Small glow
                ctx.fillStyle = 'rgba(221,161,94,0.3)';
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function drawParticles() {
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                var alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * alpha + 0.3, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // ---- Main Loop ----
        var lastTime = 0;
        var accumulator = 0;
        var TIMESTEP = 1000 / 60;
        var time = 0;

        function gameLoop(timestamp) {
            requestAnimationFrame(gameLoop);

            if (!lastTime) lastTime = timestamp;
            var delta = timestamp - lastTime;
            lastTime = timestamp;
            time = timestamp;

            // Cap delta to prevent spiral of death
            if (delta > 100) delta = 100;

            accumulator += delta;
            while (accumulator >= TIMESTEP) {
                update();
                accumulator -= TIMESTEP;
            }

            draw(timestamp);
        }

        function draw(timestamp) {
            // Clear
            ctx.fillStyle = '#0a0c05';
            ctx.fillRect(0, 0, W, H);

            // Subtle grid
            ctx.strokeStyle = 'rgba(138,154,91,0.03)';
            ctx.lineWidth = 0.5;
            var gridSize = 60;
            for (var gx = 0; gx < W; gx += gridSize) {
                ctx.beginPath();
                ctx.moveTo(gx, 0);
                ctx.lineTo(gx, H);
                ctx.stroke();
            }
            for (var gy = 0; gy < H; gy += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, gy);
                ctx.lineTo(W, gy);
                ctx.stroke();
            }

            drawStars(timestamp);
            drawParticles();
            drawAsteroids();
            drawBullets();
            drawShip();

            // Wave message
            if (asteroids.length === 0 && gameState === STATE_PLAYING && waveTimer < 60) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, 1 - waveTimer / 60);
                ctx.font = '600 20px Lora, serif';
                ctx.fillStyle = COLOR_SHIP;
                ctx.textAlign = 'center';
                ctx.fillText('Wave ' + (wave + 1) + ' incoming...', W / 2, H / 2);
                ctx.restore();
            }
        }

        // ---- Init ----
        updateHUD();
        requestAnimationFrame(gameLoop);
    })();
    </script>
</body>
</html>
