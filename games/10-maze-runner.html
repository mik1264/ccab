<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Maze Runner - CCAB Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--moss);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        .organic-shape {
            position: fixed;
            border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            opacity: 0.07;
            animation: morph 30s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            background: var(--sage);
            top: -150px;
            left: -150px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: var(--earth);
            bottom: -100px;
            right: -100px;
            animation-delay: -10s;
        }

        .shape-3 {
            width: 300px;
            height: 300px;
            background: var(--terracotta);
            top: 50%;
            left: 60%;
            animation-delay: -20s;
        }

        @keyframes morph {
            0%, 100% { border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%; }
            25% { border-radius: 73% 27% 44% 56% / 45% 58% 42% 55%; }
            50% { border-radius: 53% 47% 64% 36% / 65% 38% 62% 35%; }
            75% { border-radius: 43% 57% 34% 66% / 35% 68% 32% 65%; }
        }

        .back-link {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: var(--terracotta);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-link:hover {
            transform: translateX(-5px);
            background: rgba(255, 255, 255, 0.8);
        }

        #game-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            padding: 16px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 24px 32px;
            text-align: center;
        }

        /* Title Screen */
        #title-screen {
            max-width: 480px;
            width: 90%;
        }

        #title-screen h1 {
            font-family: 'Lora', serif;
            font-size: 2.4em;
            font-weight: 700;
            color: var(--dark-moss);
            margin-bottom: 4px;
            line-height: 1.2;
        }

        #title-screen .subtitle {
            font-size: 0.95em;
            color: var(--moss);
            margin-bottom: 24px;
            opacity: 0.8;
        }

        .difficulty-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .difficulty-grid .full-width {
            grid-column: 1 / -1;
        }

        .diff-btn {
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            font-size: 15px;
            padding: 14px 12px;
            border: 2px solid rgba(138, 154, 91, 0.3);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.5);
            color: var(--dark-moss);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .diff-btn:hover {
            background: var(--sage);
            color: white;
            border-color: var(--sage);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 154, 91, 0.3);
        }

        .diff-btn .size-label {
            display: block;
            font-size: 11px;
            font-weight: 400;
            opacity: 0.7;
            margin-top: 2px;
        }

        .diff-btn .best-time {
            display: block;
            font-size: 11px;
            color: var(--terracotta);
            margin-top: 4px;
            font-weight: 700;
        }

        /* HUD */
        #hud {
            display: none;
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 10;
            gap: 8px;
            flex-direction: column;
            align-items: flex-end;
        }

        #hud.visible {
            display: flex;
        }

        .hud-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--dark-moss);
            white-space: nowrap;
        }

        .hud-panel .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            display: block;
        }

        .hud-panel .value {
            font-family: 'Lora', serif;
            font-size: 20px;
            font-weight: 700;
        }

        /* Bottom bar */
        #bottom-bar {
            display: none;
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            gap: 8px;
        }

        #bottom-bar.visible {
            display: flex;
        }

        .bar-btn {
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            font-size: 13px;
            padding: 8px 16px;
            border: none;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            color: var(--dark-moss);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .bar-btn:hover {
            background: rgba(255, 255, 255, 0.85);
            transform: translateY(-1px);
        }

        .bar-btn.active {
            background: var(--sage);
            color: white;
        }

        .bar-btn kbd {
            display: inline-block;
            background: rgba(0,0,0,0.1);
            border-radius: 4px;
            padding: 1px 5px;
            font-size: 11px;
            margin-left: 4px;
            font-family: 'Nunito', sans-serif;
        }

        /* Canvas */
        #maze-canvas {
            display: none;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(61, 68, 35, 0.15);
        }

        /* Win screen */
        #win-screen {
            display: none;
            max-width: 400px;
            width: 90%;
        }

        #win-screen h2 {
            font-family: 'Lora', serif;
            font-size: 2em;
            color: var(--dark-moss);
            margin-bottom: 8px;
        }

        #win-screen .win-time {
            font-family: 'Lora', serif;
            font-size: 2.8em;
            font-weight: 700;
            color: var(--terracotta);
            margin: 8px 0;
        }

        #win-screen .best-label {
            font-size: 14px;
            color: var(--sage);
            font-weight: 600;
            margin-bottom: 16px;
        }

        #win-screen .new-record {
            color: var(--terracotta);
            font-weight: 700;
        }

        .win-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .win-btn {
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            font-size: 15px;
            padding: 12px 24px;
            border: 2px solid var(--sage);
            border-radius: 14px;
            background: transparent;
            color: var(--dark-moss);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .win-btn:hover {
            background: var(--sage);
            color: white;
            transform: translateY(-2px);
        }

        .win-btn.primary {
            background: var(--sage);
            color: white;
        }

        .win-btn.primary:hover {
            background: var(--moss);
            border-color: var(--moss);
        }

        /* Mobile controls */
        #mobile-dpad {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
        }

        .dpad-grid {
            display: grid;
            grid-template-columns: 56px 56px 56px;
            grid-template-rows: 56px 56px 56px;
            gap: 4px;
        }

        .dpad-btn {
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            color: var(--dark-moss);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .dpad-btn:active {
            background: var(--sage);
            color: white;
            transform: scale(0.92);
        }

        .dpad-center {
            background: transparent;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            #title-screen h1 { font-size: 1.8em; }
            .glass-panel { padding: 20px; }
            .diff-btn { padding: 10px 8px; font-size: 13px; }
            .hud-panel .value { font-size: 16px; }
            .back-link { top: 10px; left: 10px; padding: 6px 12px; font-size: 12px; }
        }

        /* Fade animations */
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        .fade-out {
            animation: fadeOut 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(-8px) scale(0.97); }
        }

        /* Hint flash */
        @keyframes hintPulse {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

<div class="organic-shape shape-1"></div>
<div class="organic-shape shape-2"></div>
<div class="organic-shape shape-3"></div>

<a href="index.html" class="back-link">&#8592; Games</a>

<div id="game-container">
    <!-- Title / Difficulty Select -->
    <div id="title-screen" class="glass-panel fade-in">
        <h1>Maze Runner</h1>
        <p class="subtitle">Find your way through procedurally generated mazes</p>
        <div class="difficulty-grid">
            <button class="diff-btn" data-diff="tiny" onclick="startGame('tiny')">
                Tiny
                <span class="size-label">11 &times; 11</span>
                <span class="best-time" id="best-tiny"></span>
            </button>
            <button class="diff-btn" data-diff="small" onclick="startGame('small')">
                Small
                <span class="size-label">21 &times; 15</span>
                <span class="best-time" id="best-small"></span>
            </button>
            <button class="diff-btn" data-diff="medium" onclick="startGame('medium')">
                Medium
                <span class="size-label">31 &times; 21</span>
                <span class="best-time" id="best-medium"></span>
            </button>
            <button class="diff-btn" data-diff="large" onclick="startGame('large')">
                Large
                <span class="size-label">41 &times; 31</span>
                <span class="best-time" id="best-large"></span>
            </button>
            <button class="diff-btn full-width" data-diff="huge" onclick="startGame('huge')">
                Huge
                <span class="size-label">51 &times; 41</span>
                <span class="best-time" id="best-huge"></span>
            </button>
        </div>
        <p style="font-size:12px; opacity:0.6;">Arrow keys / WASD to move &middot; H for hint &middot; F for fog</p>
    </div>

    <!-- Canvas -->
    <canvas id="maze-canvas"></canvas>

    <!-- HUD -->
    <div id="hud">
        <div class="hud-panel">
            <span class="label">Time</span>
            <span class="value" id="hud-time">0:00.0</span>
        </div>
        <div class="hud-panel">
            <span class="label">Difficulty</span>
            <span class="value" id="hud-diff">Medium</span>
        </div>
    </div>

    <!-- Bottom bar -->
    <div id="bottom-bar">
        <button class="bar-btn" onclick="newMaze()">New Maze</button>
        <button class="bar-btn" id="btn-hint" onclick="showHint()">Hint <kbd>H</kbd></button>
        <button class="bar-btn" id="btn-fog" onclick="toggleFog()">Fog <kbd>F</kbd></button>
        <button class="bar-btn" onclick="backToMenu()">Menu</button>
    </div>

    <!-- Mobile dpad -->
    <div id="mobile-dpad">
        <div class="dpad-grid">
            <div></div>
            <button class="dpad-btn" ontouchstart="handleDpad(event, 0, -1)" onmousedown="handleDpad(event, 0, -1)">&#9650;</button>
            <div></div>
            <button class="dpad-btn" ontouchstart="handleDpad(event, -1, 0)" onmousedown="handleDpad(event, -1, 0)">&#9664;</button>
            <div class="dpad-center"></div>
            <button class="dpad-btn" ontouchstart="handleDpad(event, 1, 0)" onmousedown="handleDpad(event, 1, 0)">&#9654;</button>
            <div></div>
            <button class="dpad-btn" ontouchstart="handleDpad(event, 0, 1)" onmousedown="handleDpad(event, 0, 1)">&#9660;</button>
            <div></div>
        </div>
    </div>

    <!-- Win screen -->
    <div id="win-screen" class="glass-panel">
        <h2>Maze Complete!</h2>
        <div class="win-time" id="win-time">0:00.0</div>
        <div class="best-label" id="win-best"></div>
        <div class="win-actions">
            <button class="win-btn" onclick="backToMenu()">Menu</button>
            <button class="win-btn primary" onclick="newMaze()">Play Again</button>
        </div>
    </div>
</div>

<script>
// ============================================
// MAZE RUNNER - Procedural Maze Game
// ============================================

// --- Constants ---
var DIFFICULTIES = {
    tiny:   { cols: 11, rows: 11, label: 'Tiny' },
    small:  { cols: 21, rows: 15, label: 'Small' },
    medium: { cols: 31, rows: 21, label: 'Medium' },
    large:  { cols: 41, rows: 31, label: 'Large' },
    huge:   { cols: 51, rows: 41, label: 'Huge' }
};

var WALL = 1;
var PATH = 0;

// Colors from the design system
var COLOR_WALL = '#3d4423';
var COLOR_PATH = '#FEFAE0';
var COLOR_VISITED = 'rgba(138, 154, 91, 0.15)';
var COLOR_PLAYER = '#BC6C25';
var COLOR_GOAL_INNER = '#DDA15E';
var COLOR_GOAL_OUTER = 'rgba(138, 154, 91, 0.4)';
var COLOR_HINT = 'rgba(188, 108, 37, 0.35)';
var COLOR_FOG = 'rgba(40, 44, 25, 0.92)';

// --- State ---
var canvas, ctx;
var maze = null;
var mazeW = 0, mazeH = 0;
var cellSize = 0;
var offsetX = 0, offsetY = 0;
var currentDifficulty = 'medium';

// Player state (pixel position for smooth movement)
var playerCellX = 0, playerCellY = 0;      // logical cell
var playerPixelX = 0, playerPixelY = 0;    // smooth pixel (center of cell)
var targetPixelX = 0, targetPixelY = 0;    // movement target
var isMoving = false;
var moveSpeed = 0; // pixels per second; set per difficulty
var moveQueue = []; // queued directions

var visited = null; // 2D bool array

// Timer
var timerStart = 0;
var timerElapsed = 0;
var timerRunning = false;

// Hint
var hintPath = null;
var hintVisible = false;
var hintTimer = 0;
var HINT_DURATION = 1500;

// Fog
var fogEnabled = false;
var FOG_RADIUS = 3; // cells of visibility

// Game state
var STATE_MENU = 0;
var STATE_PLAYING = 1;
var STATE_WON = 2;
var gameState = STATE_MENU;

// Touch
var touchStartX = 0, touchStartY = 0;
var isMobile = false;

// Solution cache
var solution = null;

// Animation frame
var animFrameId = null;
var lastFrameTime = 0;

// Goal animation
var goalPulseTime = 0;

// --- Init ---
function init() {
    canvas = document.getElementById('maze-canvas');
    ctx = canvas.getContext('2d');

    detectMobile();
    loadBestTimes();

    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('resize', onResize);

    canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    canvas.addEventListener('touchend', onTouchEnd, { passive: false });

    showMenu();
}

function detectMobile() {
    isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
}

// --- Best Times ---
function getBestKey(diff) {
    return 'maze-best-' + diff;
}

function getBest(diff) {
    var v = localStorage.getItem(getBestKey(diff));
    return v ? parseFloat(v) : null;
}

function setBest(diff, time) {
    localStorage.setItem(getBestKey(diff), time.toFixed(1));
}

function loadBestTimes() {
    var diffs = ['tiny', 'small', 'medium', 'large', 'huge'];
    for (var i = 0; i < diffs.length; i++) {
        var d = diffs[i];
        var el = document.getElementById('best-' + d);
        var best = getBest(d);
        if (best !== null) {
            el.textContent = 'Best: ' + formatTime(best);
        } else {
            el.textContent = '';
        }
    }
}

function formatTime(secs) {
    var m = Math.floor(secs / 60);
    var s = secs % 60;
    return m + ':' + (s < 10 ? '0' : '') + s.toFixed(1);
}

// --- Screen Management ---
function showMenu() {
    gameState = STATE_MENU;
    if (animFrameId) {
        cancelAnimationFrame(animFrameId);
        animFrameId = null;
    }
    loadBestTimes();

    document.getElementById('title-screen').style.display = 'block';
    document.getElementById('title-screen').className = 'glass-panel fade-in';
    canvas.style.display = 'none';
    document.getElementById('hud').classList.remove('visible');
    document.getElementById('bottom-bar').classList.remove('visible');
    document.getElementById('win-screen').style.display = 'none';
    document.getElementById('mobile-dpad').style.display = 'none';
}

function showPlaying() {
    gameState = STATE_PLAYING;

    document.getElementById('title-screen').style.display = 'none';
    canvas.style.display = 'block';
    document.getElementById('hud').classList.add('visible');
    document.getElementById('bottom-bar').classList.add('visible');
    document.getElementById('win-screen').style.display = 'none';

    document.getElementById('hud-diff').textContent = DIFFICULTIES[currentDifficulty].label;

    updateFogButton();

    if (isMobile) {
        document.getElementById('mobile-dpad').style.display = 'block';
    }
}

function showWin() {
    gameState = STATE_WON;
    timerRunning = false;

    var time = timerElapsed;
    document.getElementById('win-time').textContent = formatTime(time);

    var best = getBest(currentDifficulty);
    var isNewRecord = false;
    if (best === null || time < best) {
        setBest(currentDifficulty, time);
        isNewRecord = true;
        best = time;
    }

    var bestEl = document.getElementById('win-best');
    if (isNewRecord) {
        bestEl.innerHTML = '<span class="new-record">New Record!</span>';
    } else {
        bestEl.textContent = 'Best: ' + formatTime(best);
    }

    document.getElementById('win-screen').style.display = 'block';
    document.getElementById('win-screen').className = 'glass-panel fade-in';
    document.getElementById('hud').classList.remove('visible');
    document.getElementById('bottom-bar').classList.remove('visible');
    document.getElementById('mobile-dpad').style.display = 'none';
}

// --- Maze Generation (Recursive Backtracking) ---
// Grid: odd cells are paths, even cells + borders are walls
function generateMaze(cols, rows) {
    // Maze array dimensions (in cells)
    mazeW = cols;
    mazeH = rows;

    // Initialize all walls
    maze = [];
    for (var y = 0; y < mazeH; y++) {
        maze[y] = [];
        for (var x = 0; x < mazeW; x++) {
            maze[y][x] = WALL;
        }
    }

    // Carve using iterative backtracking (avoids stack overflow on large mazes)
    // Work in "cell" coordinates: cells are at odd positions
    var cw = Math.floor((cols - 1) / 2);
    var ch = Math.floor((rows - 1) / 2);

    var stack = [];
    var visitedCells = [];
    for (var cy = 0; cy < ch; cy++) {
        visitedCells[cy] = [];
        for (var cx = 0; cx < cw; cx++) {
            visitedCells[cy][cx] = false;
        }
    }

    var startCX = 0, startCY = 0;
    visitedCells[startCY][startCX] = true;
    maze[startCY * 2 + 1][startCX * 2 + 1] = PATH;
    stack.push([startCX, startCY]);

    var dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];

    while (stack.length > 0) {
        var current = stack[stack.length - 1];
        var cx = current[0], cy = current[1];

        // Find unvisited neighbors
        var neighbors = [];
        for (var d = 0; d < 4; d++) {
            var nx = cx + dirs[d][0];
            var ny = cy + dirs[d][1];
            if (nx >= 0 && nx < cw && ny >= 0 && ny < ch && !visitedCells[ny][nx]) {
                neighbors.push(d);
            }
        }

        if (neighbors.length === 0) {
            stack.pop();
        } else {
            var chosen = neighbors[Math.floor(Math.random() * neighbors.length)];
            var dx = dirs[chosen][0];
            var dy = dirs[chosen][1];
            var nx = cx + dx;
            var ny = cy + dy;

            // Remove wall between
            var wallX = cx * 2 + 1 + dx;
            var wallY = cy * 2 + 1 + dy;
            maze[wallY][wallX] = PATH;
            maze[ny * 2 + 1][nx * 2 + 1] = PATH;

            visitedCells[ny][nx] = true;
            stack.push([nx, ny]);
        }
    }

    // Ensure start and goal cells are open
    maze[1][1] = PATH;
    maze[mazeH - 2][mazeW - 2] = PATH;

    // Reset visited tracking
    visited = [];
    for (var y = 0; y < mazeH; y++) {
        visited[y] = [];
        for (var x = 0; x < mazeW; x++) {
            visited[y][x] = false;
        }
    }

    // Pre-compute solution
    solution = solveMaze(1, 1, mazeW - 2, mazeH - 2);
}

// BFS solver
function solveMaze(sx, sy, gx, gy) {
    var prev = [];
    for (var y = 0; y < mazeH; y++) {
        prev[y] = [];
        for (var x = 0; x < mazeW; x++) {
            prev[y][x] = null;
        }
    }

    var queue = [[sx, sy]];
    prev[sy][sx] = [-1, -1];
    var dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];

    while (queue.length > 0) {
        var cur = queue.shift();
        var cx = cur[0], cy = cur[1];

        if (cx === gx && cy === gy) {
            // Reconstruct path
            var path = [];
            var px = gx, py = gy;
            while (px !== -1) {
                path.push([px, py]);
                var p = prev[py][px];
                px = p[0];
                py = p[1];
            }
            path.reverse();
            return path;
        }

        for (var d = 0; d < 4; d++) {
            var nx = cx + dirs[d][0];
            var ny = cy + dirs[d][1];
            if (nx >= 0 && nx < mazeW && ny >= 0 && ny < mazeH && maze[ny][nx] === PATH && prev[ny][nx] === null) {
                prev[ny][nx] = [cx, cy];
                queue.push([nx, ny]);
            }
        }
    }

    return [];
}

// Solve from current position
function solveFromPlayer() {
    return solveMaze(playerCellX, playerCellY, mazeW - 2, mazeH - 2);
}

// --- Game Start ---
function startGame(diff) {
    currentDifficulty = diff;
    var cfg = DIFFICULTIES[diff];

    generateMaze(cfg.cols, cfg.rows);

    // Player at start (top-left path cell)
    playerCellX = 1;
    playerCellY = 1;
    visited[1][1] = true;

    isMoving = false;
    moveQueue = [];

    hintVisible = false;
    hintPath = null;

    // Timer
    timerElapsed = 0;
    timerRunning = true;
    timerStart = performance.now();

    // Layout
    layoutCanvas();

    // Set pixel positions
    playerPixelX = offsetX + playerCellX * cellSize + cellSize / 2;
    playerPixelY = offsetY + playerCellY * cellSize + cellSize / 2;
    targetPixelX = playerPixelX;
    targetPixelY = playerPixelY;

    // Move speed: cells per second * cellSize
    var cellsPerSec = 12;
    moveSpeed = cellsPerSec * cellSize;

    showPlaying();

    lastFrameTime = performance.now();
    if (animFrameId) cancelAnimationFrame(animFrameId);
    animFrameId = requestAnimationFrame(gameLoop);
}

function newMaze() {
    startGame(currentDifficulty);
}

function backToMenu() {
    showMenu();
}

// --- Canvas Layout ---
function layoutCanvas() {
    var margin = 80;
    var bottomMargin = isMobile ? 200 : 80;
    var topMargin = 70;
    var availW = window.innerWidth - margin;
    var availH = window.innerHeight - topMargin - bottomMargin;

    var cs = Math.floor(Math.min(availW / mazeW, availH / mazeH));
    cs = Math.max(cs, 4);
    cs = Math.min(cs, 30);
    cellSize = cs;

    var canvasWidth = mazeW * cellSize;
    var canvasHeight = mazeH * cellSize;

    // Account for device pixel ratio
    var dpr = window.devicePixelRatio || 1;
    canvas.width = canvasWidth * dpr;
    canvas.height = canvasHeight * dpr;
    canvas.style.width = canvasWidth + 'px';
    canvas.style.height = canvasHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    offsetX = 0;
    offsetY = 0;

    // Recalc move speed
    moveSpeed = 12 * cellSize;
}

function onResize() {
    if (gameState !== STATE_PLAYING) return;

    var oldCellSize = cellSize;
    layoutCanvas();

    // Recalculate pixel positions
    var ratio = cellSize / oldCellSize;
    playerPixelX = offsetX + playerCellX * cellSize + cellSize / 2;
    playerPixelY = offsetY + playerCellY * cellSize + cellSize / 2;
    targetPixelX = playerPixelX;
    targetPixelY = playerPixelY;
    isMoving = false;
    moveQueue = [];
}

// --- Input ---
function onKeyDown(e) {
    if (gameState !== STATE_PLAYING) return;

    var dx = 0, dy = 0;
    switch (e.key) {
        case 'ArrowUp': case 'w': case 'W': dy = -1; break;
        case 'ArrowDown': case 's': case 'S': dy = 1; break;
        case 'ArrowLeft': case 'a': case 'A': dx = -1; break;
        case 'ArrowRight': case 'd': case 'D': dx = 1; break;
        case 'h': case 'H': showHint(); return;
        case 'f': case 'F': toggleFog(); return;
        default: return;
    }

    e.preventDefault();
    queueMove(dx, dy);
}

function queueMove(dx, dy) {
    if (gameState !== STATE_PLAYING) return;

    if (!isMoving) {
        tryMove(dx, dy);
    } else {
        // Replace queued direction (only keep latest)
        moveQueue = [[dx, dy]];
    }
}

function tryMove(dx, dy) {
    var nx = playerCellX + dx;
    var ny = playerCellY + dy;

    if (nx < 0 || nx >= mazeW || ny < 0 || ny >= mazeH) return false;
    if (maze[ny][nx] === WALL) return false;

    playerCellX = nx;
    playerCellY = ny;
    visited[ny][nx] = true;

    targetPixelX = offsetX + nx * cellSize + cellSize / 2;
    targetPixelY = offsetY + ny * cellSize + cellSize / 2;
    isMoving = true;

    return true;
}

function handleDpad(e, dx, dy) {
    e.preventDefault();
    queueMove(dx, dy);
}

// Touch swipe
function onTouchStart(e) {
    if (gameState !== STATE_PLAYING) return;
    e.preventDefault();
    var t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
}

function onTouchEnd(e) {
    if (gameState !== STATE_PLAYING) return;
    e.preventDefault();
    if (!e.changedTouches.length) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStartX;
    var dy = t.clientY - touchStartY;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 20) return;

    if (Math.abs(dx) > Math.abs(dy)) {
        queueMove(dx > 0 ? 1 : -1, 0);
    } else {
        queueMove(0, dy > 0 ? 1 : -1);
    }
}

// --- Hint ---
function showHint() {
    if (gameState !== STATE_PLAYING) return;
    hintPath = solveFromPlayer();
    hintVisible = true;
    hintTimer = performance.now();
}

// --- Fog ---
function toggleFog() {
    if (gameState !== STATE_PLAYING) return;
    fogEnabled = !fogEnabled;
    updateFogButton();
}

function updateFogButton() {
    var btn = document.getElementById('btn-fog');
    if (fogEnabled) {
        btn.classList.add('active');
    } else {
        btn.classList.remove('active');
    }
}

// --- Game Loop ---
function gameLoop(now) {
    if (gameState !== STATE_PLAYING) return;

    var dt = (now - lastFrameTime) / 1000;
    lastFrameTime = now;
    if (dt > 0.1) dt = 0.1; // cap delta for tab switching

    // Update timer
    if (timerRunning) {
        timerElapsed = (now - timerStart) / 1000;
        document.getElementById('hud-time').textContent = formatTime(timerElapsed);
    }

    // Update hint visibility
    if (hintVisible && now - hintTimer > HINT_DURATION) {
        hintVisible = false;
    }

    // Goal pulse animation
    goalPulseTime += dt;

    // Smooth movement
    if (isMoving) {
        var dx = targetPixelX - playerPixelX;
        var dy = targetPixelY - playerPixelY;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var step = moveSpeed * dt;

        if (step >= dist) {
            playerPixelX = targetPixelX;
            playerPixelY = targetPixelY;
            isMoving = false;

            // Check win
            if (playerCellX === mazeW - 2 && playerCellY === mazeH - 2) {
                showWin();
                render();
                return;
            }

            // Process queue
            if (moveQueue.length > 0) {
                var next = moveQueue.shift();
                tryMove(next[0], next[1]);
            }
        } else {
            playerPixelX += (dx / dist) * step;
            playerPixelY += (dy / dist) * step;
        }
    }

    render();
    animFrameId = requestAnimationFrame(gameLoop);
}

// --- Rendering ---
function render() {
    var w = mazeW * cellSize;
    var h = mazeH * cellSize;
    ctx.clearRect(0, 0, w, h);

    // Draw path cells
    ctx.fillStyle = COLOR_PATH;
    ctx.fillRect(0, 0, w, h);

    // Draw walls
    ctx.fillStyle = COLOR_WALL;
    for (var y = 0; y < mazeH; y++) {
        for (var x = 0; x < mazeW; x++) {
            if (maze[y][x] === WALL) {
                ctx.fillRect(
                    offsetX + x * cellSize,
                    offsetY + y * cellSize,
                    cellSize,
                    cellSize
                );
            }
        }
    }

    // Draw visited trail
    ctx.fillStyle = COLOR_VISITED;
    for (var y = 0; y < mazeH; y++) {
        for (var x = 0; x < mazeW; x++) {
            if (visited[y][x] && maze[y][x] === PATH) {
                ctx.fillRect(
                    offsetX + x * cellSize,
                    offsetY + y * cellSize,
                    cellSize,
                    cellSize
                );
            }
        }
    }

    // Draw hint path
    if (hintVisible && hintPath && hintPath.length > 0) {
        var elapsed = performance.now() - hintTimer;
        var alpha = 1;
        if (elapsed < 200) alpha = elapsed / 200;
        else if (elapsed > HINT_DURATION - 300) alpha = (HINT_DURATION - elapsed) / 300;
        alpha = Math.max(0, Math.min(1, alpha)) * 0.5;

        ctx.fillStyle = 'rgba(188, 108, 37, ' + alpha + ')';
        for (var i = 0; i < hintPath.length; i++) {
            var hx = hintPath[i][0];
            var hy = hintPath[i][1];
            ctx.fillRect(
                offsetX + hx * cellSize,
                offsetY + hy * cellSize,
                cellSize,
                cellSize
            );
        }
    }

    // Draw goal
    var gx = offsetX + (mazeW - 2) * cellSize + cellSize / 2;
    var gy = offsetY + (mazeH - 2) * cellSize + cellSize / 2;
    var pulseScale = 1 + 0.15 * Math.sin(goalPulseTime * 3);
    var goalRadius = cellSize * 0.35 * pulseScale;

    // Outer glow
    var grad = ctx.createRadialGradient(gx, gy, goalRadius * 0.3, gx, gy, goalRadius * 2.5);
    grad.addColorStop(0, 'rgba(138, 154, 91, 0.5)');
    grad.addColorStop(1, 'rgba(138, 154, 91, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(gx, gy, goalRadius * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Inner goal
    ctx.fillStyle = COLOR_GOAL_INNER;
    ctx.beginPath();
    ctx.arc(gx, gy, goalRadius, 0, Math.PI * 2);
    ctx.fill();

    // Goal highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.beginPath();
    ctx.arc(gx - goalRadius * 0.2, gy - goalRadius * 0.25, goalRadius * 0.35, 0, Math.PI * 2);
    ctx.fill();

    // Draw player
    var pr = cellSize * 0.35;
    ctx.fillStyle = COLOR_PLAYER;
    ctx.beginPath();
    ctx.arc(playerPixelX, playerPixelY, pr, 0, Math.PI * 2);
    ctx.fill();

    // Player highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
    ctx.beginPath();
    ctx.arc(playerPixelX - pr * 0.2, playerPixelY - pr * 0.25, pr * 0.35, 0, Math.PI * 2);
    ctx.fill();

    // Fog of war overlay
    if (fogEnabled) {
        drawFog();
    }
}

function drawFog() {
    // Create fog overlay using a temporary canvas for masking
    var w = mazeW * cellSize;
    var h = mazeH * cellSize;

    // Draw dark overlay
    ctx.save();
    ctx.fillStyle = COLOR_FOG;
    ctx.fillRect(0, 0, w, h);

    // Cut out visible area with radial gradient
    ctx.globalCompositeOperation = 'destination-out';

    var cx = playerPixelX;
    var cy = playerPixelY;
    var visRadius = (FOG_RADIUS + 0.5) * cellSize;

    var fogGrad = ctx.createRadialGradient(cx, cy, visRadius * 0.4, cx, cy, visRadius);
    fogGrad.addColorStop(0, 'rgba(0,0,0,1)');
    fogGrad.addColorStop(0.7, 'rgba(0,0,0,0.9)');
    fogGrad.addColorStop(1, 'rgba(0,0,0,0)');

    ctx.fillStyle = fogGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, visRadius, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

// --- Startup ---
init();
</script>
</body>
</html>
