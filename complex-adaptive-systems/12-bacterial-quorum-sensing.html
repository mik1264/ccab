<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quorum Sensing &mdash; Complex Adaptive Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #8A9A5B;
    --moss: #606C38;
    --earth: #DDA15E;
    --cream: #FEFAE0;
    --terracotta: #BC6C25;
    --dark-moss: #3d4423;
    --glow: #7ee8fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background: #0b120d;
    color: var(--cream);
  }
  canvas {
    display: block;
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(96, 108, 56, 0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(61, 68, 35, 0.35) 0%, transparent 60%),
      #0b120d;
  }

  /* Organic floating back link */
  .organic-back-link {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 20;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(254, 250, 224, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(254, 250, 224, 0.3);
    border-radius: 30px;
    color: var(--cream);
    text-decoration: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.02em;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .organic-back-link:hover {
    background: rgba(254, 250, 224, 0.25);
    transform: translateX(-2px);
    border-color: rgba(254, 250, 224, 0.5);
  }
  .back-arrow { transition: transform 0.3s ease; }
  .organic-back-link:hover .back-arrow { transform: translateX(-3px); }

  .title-card {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 15;
    max-width: 340px;
    padding: 18px 22px;
    background: rgba(11, 18, 13, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(138, 154, 91, 0.35);
    border-radius: 20px;
  }
  .title-card h1 {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--cream);
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }
  .title-card p {
    font-size: 13px;
    color: rgba(254, 250, 224, 0.75);
    line-height: 1.5;
  }

  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    z-index: 15;
    margin: 0 auto;
    max-width: 780px;
    padding: 18px 24px;
    background: rgba(11, 18, 13, 0.6);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(138, 154, 91, 0.35);
    border-radius: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 14px 22px;
    align-items: end;
  }
  .control {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .control .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12px;
    color: rgba(254, 250, 224, 0.72);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .control .val {
    font-family: 'Lora', serif;
    font-weight: 600;
    color: var(--glow);
    font-size: 14px;
    text-transform: none;
    letter-spacing: 0;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: linear-gradient(to right, var(--moss), var(--sage));
    border-radius: 4px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--cream);
    border: 2px solid var(--sage);
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--cream);
    border: 2px solid var(--sage);
    cursor: pointer;
  }

  .stats {
    position: fixed;
    bottom: 180px;
    left: 20px;
    z-index: 15;
    padding: 14px 20px;
    background: rgba(11, 18, 13, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(138, 154, 91, 0.35);
    border-radius: 20px;
    min-width: 180px;
  }
  .stats .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    padding: 3px 0;
  }
  .stats .stat-row .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: rgba(254, 250, 224, 0.65);
    font-weight: 600;
  }
  .stats .stat-row .val {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--glow);
  }
  .bar {
    margin-top: 10px;
    width: 100%;
    height: 6px;
    background: rgba(254, 250, 224, 0.12);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(to right, var(--moss), var(--glow));
    transition: width 0.2s ease;
    border-radius: 3px;
    box-shadow: 0 0 10px rgba(126, 232, 250, 0.6);
  }

  @media (max-width: 640px) {
    .title-card { max-width: calc(100vw - 40px); top: 70px; right: 20px; left: 20px; }
    .stats { bottom: auto; top: 220px; }
    .controls { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<a href="index.html" class="organic-back-link">
  <span class="back-arrow">&larr;</span>
  <span class="back-text">Gallery</span>
</a>

<div class="title-card">
  <h1>Bacterial Quorum Sensing</h1>
  <p>Bacteria secrete autoinducer molecules. Once local concentration crosses a threshold, they switch on &mdash; a classic collective decision.</p>
</div>

<canvas id="canvas"></canvas>

<div class="stats">
  <div class="stat-row">
    <span class="label">Activated</span>
    <span class="val" id="pctVal">0%</span>
  </div>
  <div class="stat-row">
    <span class="label">Bacteria</span>
    <span class="val" id="countVal">0</span>
  </div>
  <div class="bar"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
</div>

<div class="controls">
  <div class="control">
    <div class="row"><span>Bacteria Count</span><span class="val" id="popLabel">400</span></div>
    <input id="popSlider" type="range" min="20" max="1500" step="10" value="400">
  </div>
  <div class="control">
    <div class="row"><span>Secretion Rate</span><span class="val" id="secLabel">0.80</span></div>
    <input id="secSlider" type="range" min="0.05" max="2.0" step="0.01" value="0.80">
  </div>
  <div class="control">
    <div class="row"><span>Degradation</span><span class="val" id="degLabel">0.04</span></div>
    <input id="degSlider" type="range" min="0.005" max="0.15" step="0.005" value="0.04">
  </div>
  <div class="control">
    <div class="row"><span>Threshold</span><span class="val" id="thrLabel">1.20</span></div>
    <input id="thrSlider" type="range" min="0.1" max="4.0" step="0.05" value="1.20">
  </div>
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // Params (live)
  const params = {
    pop: 400,
    secretion: 0.80,
    degradation: 0.04,
    threshold: 1.20,
    diffusion: 0.22,   // fraction exchanged with neighbors per step
    hysteresis: 0.78,  // once active, stays active above threshold * hysteresis
    cellSize: 10       // grid cell size in px
  };

  // DOM refs
  const popSlider = document.getElementById('popSlider');
  const secSlider = document.getElementById('secSlider');
  const degSlider = document.getElementById('degSlider');
  const thrSlider = document.getElementById('thrSlider');
  const popLabel = document.getElementById('popLabel');
  const secLabel = document.getElementById('secLabel');
  const degLabel = document.getElementById('degLabel');
  const thrLabel = document.getElementById('thrLabel');
  const pctVal = document.getElementById('pctVal');
  const countVal = document.getElementById('countVal');
  const barFill = document.getElementById('barFill');

  // Grid & bacteria state
  let W = 0, H = 0, DPR = 1;
  let gridW = 0, gridH = 0;
  let field, fieldNext;
  let bacteria = [];

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    gridW = Math.max(10, Math.floor(W / params.cellSize));
    gridH = Math.max(10, Math.floor(H / params.cellSize));
    field = new Float32Array(gridW * gridH);
    fieldNext = new Float32Array(gridW * gridH);

    // Re-seed bacteria if any positions are out of bounds
    for (let i = 0; i < bacteria.length; i++) {
      const b = bacteria[i];
      if (b.x >= W) b.x = Math.random() * W;
      if (b.y >= H) b.y = Math.random() * H;
    }
  }

  function spawnBacteria(n) {
    // Preserve existing where possible, uniform random distribution
    const current = bacteria.length;
    if (n > current) {
      for (let i = current; i < n; i++) {
        bacteria.push(makeBacterium());
      }
    } else if (n < current) {
      bacteria.length = n;
    }
  }

  function makeBacterium() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25,
      active: false,
      glow: 0,            // smoothed activation for rendering
      phase: Math.random() * Math.PI * 2
    };
  }

  function idx(x, y) { return y * gridW + x; }

  function stepField() {
    // Diffuse with 4-neighbor Laplacian, plus degradation
    const d = params.diffusion;
    const decay = 1 - params.degradation;
    const w = gridW, h = gridH;
    const f = field, nf = fieldNext;
    for (let y = 0; y < h; y++) {
      const ym = y === 0 ? 0 : y - 1;
      const yp = y === h - 1 ? h - 1 : y + 1;
      for (let x = 0; x < w; x++) {
        const xm = x === 0 ? 0 : x - 1;
        const xp = x === w - 1 ? w - 1 : x + 1;
        const c = f[y * w + x];
        const l = f[y * w + xm];
        const r = f[y * w + xp];
        const u = f[ym * w + x];
        const dn = f[yp * w + x];
        const lap = (l + r + u + dn) * 0.25 - c;
        nf[y * w + x] = (c + d * lap) * decay;
      }
    }
    // swap
    const tmp = field; field = nf; fieldNext = tmp;
  }

  function stepBacteria(dt) {
    const thr = params.threshold;
    const thrOff = thr * params.hysteresis;
    const sec = params.secretion;
    let active = 0;

    for (let i = 0; i < bacteria.length; i++) {
      const b = bacteria[i];
      // slight drift so it looks alive
      b.x += b.vx;
      b.y += b.vy;
      if (b.x < 2 || b.x > W - 2) b.vx = -b.vx;
      if (b.y < 2 || b.y > H - 2) b.vy = -b.vy;
      // tiny random wander
      b.vx += (Math.random() - 0.5) * 0.04;
      b.vy += (Math.random() - 0.5) * 0.04;
      b.vx = Math.max(-0.4, Math.min(0.4, b.vx));
      b.vy = Math.max(-0.4, Math.min(0.4, b.vy));

      const gx = Math.min(gridW - 1, Math.max(0, Math.floor(b.x / params.cellSize)));
      const gy = Math.min(gridH - 1, Math.max(0, Math.floor(b.y / params.cellSize)));
      const local = field[idx(gx, gy)];

      // Secrete into grid
      field[idx(gx, gy)] += sec;

      // Switch logic with hysteresis for stable transition
      if (!b.active && local > thr) b.active = true;
      else if (b.active && local < thrOff) b.active = false;

      // Smooth glow
      const target = b.active ? 1 : 0;
      b.glow += (target - b.glow) * 0.15;
      b.phase += 0.06;

      if (b.active) active++;
    }
    return active;
  }

  function drawField() {
    // Render field as a subtle teal bloom using offscreen approach: per-cell rectangles
    const cs = params.cellSize;
    // Scaling for visibility
    const thr = params.threshold;
    for (let y = 0; y < gridH; y++) {
      for (let x = 0; x < gridW; x++) {
        const v = field[idx(x, y)];
        if (v < 0.02) continue;
        // Normalize relative to threshold: below = green-ish, above = cyan bloom
        const ratio = v / thr;
        let alpha, r, g, bl;
        if (ratio < 1) {
          // sage / moss tones
          alpha = Math.min(0.35, ratio * 0.35);
          r = 96; g = 108; bl = 56;
        } else {
          // cyan bloom once past threshold
          const over = Math.min(1, (ratio - 1) / 2);
          alpha = 0.35 + over * 0.4;
          r = 80 + over * 40;
          g = 180 + over * 50;
          bl = 200 + over * 55;
        }
        ctx.fillStyle = 'rgba(' + Math.round(r) + ',' + Math.round(g) + ',' + Math.round(bl) + ',' + alpha.toFixed(3) + ')';
        ctx.fillRect(x * cs, y * cs, cs + 1, cs + 1);
      }
    }
  }

  function drawBacteria() {
    for (let i = 0; i < bacteria.length; i++) {
      const b = bacteria[i];
      const g = b.glow;

      if (g > 0.15) {
        // Halo
        const pulse = 1 + 0.15 * Math.sin(b.phase);
        const radius = (3 + 7 * g) * pulse;
        const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, radius);
        grad.addColorStop(0, 'rgba(254, 250, 224, ' + (0.85 * g).toFixed(3) + ')');
        grad.addColorStop(0.3, 'rgba(126, 232, 250, ' + (0.6 * g).toFixed(3) + ')');
        grad.addColorStop(1, 'rgba(126, 232, 250, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(b.x, b.y, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      // Core dot
      const coreR = 1.6 + g * 1.1;
      const rCol = Math.round(138 + (254 - 138) * g);
      const gCol = Math.round(154 + (250 - 154) * g);
      const bCol = Math.round(91 + (224 - 91) * g);
      ctx.fillStyle = 'rgb(' + rCol + ',' + gCol + ',' + bCol + ')';
      ctx.beginPath();
      ctx.arc(b.x, b.y, coreR, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  let lastStats = -1;
  function updateStats(active) {
    const total = bacteria.length;
    const pct = total > 0 ? (active / total) * 100 : 0;
    // Avoid thrashing DOM every frame: only update if changed enough
    if (Math.abs(pct - lastStats) < 0.3 && total === parseInt(countVal.textContent, 10)) return;
    lastStats = pct;
    pctVal.textContent = pct.toFixed(1) + '%';
    countVal.textContent = total;
    barFill.style.width = pct.toFixed(1) + '%';
  }

  // Main loop
  let running = true;
  function frame() {
    if (!running) return;
    // Fade previous frame (not full clear) gives a slight trail / nicer bloom
    ctx.fillStyle = 'rgba(11, 18, 13, 0.35)';
    ctx.fillRect(0, 0, W, H);

    stepField();
    const active = stepBacteria();
    drawField();
    drawBacteria();
    updateStats(active);

    requestAnimationFrame(frame);
  }

  // Wire up controls
  function wireSlider(slider, label, key, parse, format) {
    slider.addEventListener('input', () => {
      const v = parse(slider.value);
      params[key] = v;
      label.textContent = format(v);
      if (key === 'pop') spawnBacteria(v);
    });
  }
  wireSlider(popSlider, popLabel, 'pop', v => parseInt(v, 10), v => v);
  wireSlider(secSlider, secLabel, 'secretion', v => parseFloat(v), v => v.toFixed(2));
  wireSlider(degSlider, degLabel, 'degradation', v => parseFloat(v), v => v.toFixed(3));
  wireSlider(thrSlider, thrLabel, 'threshold', v => parseFloat(v), v => v.toFixed(2));

  // Init
  window.addEventListener('resize', () => {
    resize();
  });

  resize();
  spawnBacteria(params.pop);
  frame();

  // Pause when tab hidden for perf
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      running = false;
    } else if (!running) {
      running = true;
      frame();
    }
  });
})();
</script>
</body>
</html>
