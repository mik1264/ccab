<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Swarm Robotics — Complex Adaptive Systems</title>
<style>
  :root {
    --sage: #8A9A5B;
    --moss: #606C38;
    --earth: #DDA15E;
    --cream: #FEFAE0;
    --terracotta: #BC6C25;
    --dark-moss: #3d4423;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--cream); }
  canvas { display: block; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }

  .organic-back-link {
    position: fixed; top: 20px; left: 20px; z-index: 100;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    background: rgba(254, 250, 224, 0.12);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(138, 154, 91, 0.4);
    border-radius: 30px;
    color: var(--cream);
    text-decoration: none;
    font-size: 14px; font-weight: 500;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .organic-back-link:hover {
    background: rgba(138, 154, 91, 0.25);
    border-color: var(--sage);
    transform: translateX(-3px);
  }
  .back-arrow { font-size: 18px; }

  .panel {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    padding: 20px 22px;
    background: rgba(10, 10, 15, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(138, 154, 91, 0.35);
    border-radius: 18px;
    min-width: 240px;
    max-width: 280px;
  }
  .title {
    font-family: 'Lora', Georgia, serif;
    font-size: 18px; font-weight: 600;
    color: var(--sage);
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .subtitle {
    font-size: 11px;
    color: rgba(254,250,224,0.55);
    margin-bottom: 14px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .control {
    margin-bottom: 12px;
  }
  .control label {
    display: block;
    font-size: 12px;
    color: rgba(254,250,224,0.75);
    margin-bottom: 5px;
    font-weight: 500;
  }
  .control input[type="range"] {
    width: 100%;
    accent-color: var(--sage);
  }
  .shape-buttons {
    display: flex; gap: 6px;
  }
  .shape-buttons button {
    flex: 1;
    padding: 7px 4px;
    background: rgba(254, 250, 224, 0.08);
    border: 1px solid rgba(138, 154, 91, 0.3);
    border-radius: 8px;
    color: var(--cream);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .shape-buttons button:hover {
    background: rgba(138, 154, 91, 0.2);
  }
  .shape-buttons button.active {
    background: var(--sage);
    border-color: var(--sage);
    color: var(--dark-moss);
    font-weight: 600;
  }
  .reset-btn {
    width: 100%;
    padding: 9px;
    margin-top: 4px;
    background: rgba(188, 108, 37, 0.2);
    border: 1px solid var(--terracotta);
    border-radius: 8px;
    color: var(--earth);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover {
    background: var(--terracotta);
    color: var(--cream);
  }
  .stats {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(138,154,91,0.2);
    font-size: 12px;
    line-height: 1.7;
  }
  .stats span {
    color: var(--earth);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .value {
    float: right;
    color: var(--cream);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>

<a href="index.html" class="organic-back-link">
  <span class="back-arrow">&larr;</span>
  <span class="back-text">Gallery</span>
</a>

<canvas id="canvas"></canvas>

<div class="panel">
  <div class="title">Swarm Robotics Self-Assembly</div>
  <div class="subtitle">Local gradient following</div>

  <div class="control">
    <label>Robots <span class="value" id="countVal">120</span></label>
    <input type="range" id="countSlider" min="30" max="300" value="120" step="10">
  </div>

  <div class="control">
    <label>Target Shape</label>
    <div class="shape-buttons">
      <button data-shape="star" class="active">Star</button>
      <button data-shape="ring">Ring</button>
      <button data-shape="k">K</button>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn">Reset Swarm</button>

  <div class="stats">
    Assembled: <span id="assembledVal">0%</span><br>
    Time: <span id="timeVal">0.0s</span><br>
    Moving: <span id="movingVal">0</span>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let W, H, DPR;
  function resize() {
    DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', () => { resize(); rebuildShape(); });
  resize();

  const ROBOT_R = 6;
  const COMM_R = 36;        // communication / sensing radius
  const STOP_EPS = 2.0;     // gradient tolerance
  const SPEED = 0.85;

  let robots = [];
  let shapeField = null;    // { width, height, scale, sdf, centerX, centerY }
  let currentShape = 'star';
  let startTime = 0;
  let finishTime = 0;

  // ==== SHAPE DEFINITIONS (signed distance functions) ====
  // Returns < 0 inside the target shape, >= 0 outside
  function makeShapeField(name) {
    const size = Math.min(W, H) * 0.55;
    const cx = W / 2;
    const cy = H / 2;
    let sdf;
    if (name === 'ring') {
      const outerR = size * 0.5;
      const innerR = size * 0.32;
      sdf = (x, y) => {
        const d = Math.hypot(x - cx, y - cy);
        return Math.max(d - outerR, innerR - d);
      };
    } else if (name === 'star') {
      const points = 5;
      const outerR = size * 0.5;
      const innerR = size * 0.22;
      sdf = (x, y) => {
        const dx = x - cx, dy = y - cy;
        const r = Math.hypot(dx, dy);
        let theta = Math.atan2(dy, dx);
        const sector = (Math.PI * 2) / points;
        // normalize angle into a single sector [0, sector]
        let a = (theta + Math.PI * 2) % sector;
        // reflect at midline
        a = Math.abs(a - sector / 2);
        // distance from center along direction is r; approximate SDF via
        // radial distance to segment between outer-tip and inner-valley
        const tipX = outerR * Math.cos(0);
        const tipY = outerR * Math.sin(0);
        const valleyX = innerR * Math.cos(sector / 2);
        const valleyY = innerR * Math.sin(sector / 2);
        // rotate into local frame so that tip is at angle 0
        const px = r * Math.cos(a);
        const py = r * Math.sin(a);
        // edge vector
        const ex = valleyX - tipX;
        const ey = valleyY - tipY;
        const elen = Math.hypot(ex, ey);
        const enx = ex / elen, eny = ey / elen;
        // perpendicular pointing outward from star body
        const nx = eny, ny = -enx;
        // signed distance to the edge line (positive = outside)
        const dOut = (px - tipX) * nx + (py - tipY) * ny;
        return dOut;
      };
    } else if (name === 'k') {
      // Letter K built from 3 thick line segments
      const h = size * 0.9;
      const thick = size * 0.12;
      const left   = { x1: cx - size * 0.25, y1: cy - h/2, x2: cx - size * 0.25, y2: cy + h/2 };
      const upper  = { x1: cx - size * 0.25, y1: cy,        x2: cx + size * 0.22, y2: cy - h/2 };
      const lower  = { x1: cx - size * 0.25, y1: cy,        x2: cx + size * 0.25, y2: cy + h/2 };
      const segs = [left, upper, lower];
      function segDist(px, py, s) {
        const vx = s.x2 - s.x1, vy = s.y2 - s.y1;
        const wx = px - s.x1, wy = py - s.y1;
        const c1 = vx * wx + vy * wy;
        const c2 = vx * vx + vy * vy;
        const t = Math.max(0, Math.min(1, c1 / c2));
        const dx = s.x1 + t * vx - px;
        const dy = s.y1 + t * vy - py;
        return Math.hypot(dx, dy);
      }
      sdf = (x, y) => {
        let d = Infinity;
        for (const s of segs) d = Math.min(d, segDist(x, y, s));
        return d - thick;
      };
    }
    return { sdf, cx, cy, size };
  }

  function rebuildShape() {
    shapeField = makeShapeField(currentShape);
  }

  // ==== ROBOTS ====
  // state: 'seed' (fixed frame), 'assembled' (stopped in shape), 'moving' (edge-following)
  function createRobots(n) {
    robots = [];
    const seedCx = W / 2;
    const seedCy = H / 2;

    // 4 seed robots forming a coordinate frame (small square)
    const s = COMM_R * 0.6;
    const seeds = [
      { x: seedCx - s/2, y: seedCy - s/2 },
      { x: seedCx + s/2, y: seedCy - s/2 },
      { x: seedCx - s/2, y: seedCy + s/2 },
      { x: seedCx + s/2, y: seedCy + s/2 },
    ];
    for (const p of seeds) {
      robots.push({
        x: p.x, y: p.y, vx: 0, vy: 0,
        state: 'seed', isSeed: true,
        heading: Math.random() * Math.PI * 2,
        id: robots.length
      });
    }

    // Free robots scattered around the seed area
    const scatterR = Math.min(W, H) * 0.4;
    for (let i = 0; i < n - 4; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = scatterR * 0.5 + Math.random() * scatterR * 0.5;
      robots.push({
        x: seedCx + Math.cos(angle) * dist,
        y: seedCy + Math.sin(angle) * dist,
        vx: 0, vy: 0,
        state: 'moving',
        isSeed: false,
        heading: Math.random() * Math.PI * 2,
        id: robots.length,
        entryTime: performance.now()
      });
    }

    startTime = performance.now();
    finishTime = 0;
  }

  // ==== LOCAL GRADIENT ====
  // Each robot estimates its gradient value from nearby neighbors
  // (seed robots know their position exactly; assembled robots have a stored gradient)
  function update() {
    const now = performance.now();

    // Phase 1: update gradient-like "shape distance" for each robot's position
    // (stationary robots remember it; moving robots compute continuously)
    for (const r of robots) {
      if (r.state !== 'moving') {
        r.shapeDist = shapeField.sdf(r.x, r.y);
      }
    }

    // Phase 2: movement of free robots (edge-follow + gradient descent)
    let anyMoving = false;
    for (const r of robots) {
      if (r.state !== 'moving') continue;
      anyMoving = true;

      // Find nearest neighbor & count close ones
      let nearest = null;
      let nearestD = Infinity;
      let neighborCount = 0;
      for (const o of robots) {
        if (o === r) continue;
        const dx = o.x - r.x, dy = o.y - r.y;
        const d = Math.hypot(dx, dy);
        if (d < COMM_R) {
          neighborCount++;
          if (d < nearestD) { nearestD = d; nearest = o; }
        }
      }

      // Repulsion from overlap
      let rx = 0, ry = 0;
      for (const o of robots) {
        if (o === r) continue;
        const dx = r.x - o.x, dy = r.y - o.y;
        const d = Math.hypot(dx, dy);
        if (d < ROBOT_R * 2.2 && d > 0.001) {
          const f = (ROBOT_R * 2.2 - d) / (ROBOT_R * 2.2);
          rx += (dx / d) * f * 1.2;
          ry += (dy / d) * f * 1.2;
        }
      }

      // Edge-following: orbit around the nearest stationary robot at a preferred radius
      let moveX = 0, moveY = 0;
      if (nearest) {
        const dx = r.x - nearest.x, dy = r.y - nearest.y;
        const dn = Math.hypot(dx, dy) || 0.0001;
        const preferredD = ROBOT_R * 2.2;
        // radial correction toward preferred distance
        const radialErr = dn - preferredD;
        const radX = -(dx / dn) * radialErr * 0.15;
        const radY = -(dy / dn) * radialErr * 0.15;
        // tangent (counter-clockwise around nearest)
        const tx = -dy / dn;
        const ty = dx / dn;
        moveX = tx * SPEED + radX;
        moveY = ty * SPEED + radY;
      } else {
        // no neighbors yet: drift toward swarm center (approximated by seed center)
        const cx = W / 2, cy = H / 2;
        const dx = cx - r.x, dy = cy - r.y;
        const d = Math.hypot(dx, dy) || 1;
        moveX = (dx / d) * SPEED;
        moveY = (dy / d) * SPEED;
      }

      r.x += moveX + rx;
      r.y += moveY + ry;

      // Clamp to viewport (soft)
      if (r.x < 10) r.x = 10;
      if (r.x > W - 10) r.x = W - 10;
      if (r.y < 10) r.y = 10;
      if (r.y > H - 10) r.y = H - 10;

      // Decide to stop: must be in target region AND touching another stationary robot
      // (ensures structural contiguity).
      const localDist = shapeField.sdf(r.x, r.y);
      if (nearest && nearestD < ROBOT_R * 2.6 && localDist < STOP_EPS) {
        r.state = 'assembled';
        r.shapeDist = localDist;
      }
    }

    if (!anyMoving && finishTime === 0) {
      finishTime = now - startTime;
    }
  }

  // ==== RENDER ====
  function drawShapeOutline() {
    // subtle ghost outline of the target shape
    ctx.save();
    ctx.strokeStyle = 'rgba(138, 154, 91, 0.18)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    // sample via marching: just iterate with a step and plot sign transitions
    const step = 6;
    ctx.beginPath();
    for (let y = 0; y < H; y += step) {
      let prev = null;
      for (let x = 0; x < W; x += step) {
        const v = shapeField.sdf(x, y);
        const inside = v < 0;
        if (prev !== null && prev !== inside) {
          ctx.moveTo(x - step, y);
          ctx.lineTo(x, y);
        }
        prev = inside;
      }
    }
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  function render() {
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, W, H);

    drawShapeOutline();

    // Draw communication links for a sparser, lighter impression
    ctx.strokeStyle = 'rgba(138, 154, 91, 0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < robots.length; i++) {
      const a = robots[i];
      for (let j = i + 1; j < robots.length; j++) {
        const b = robots[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        if (Math.abs(dx) > COMM_R || Math.abs(dy) > COMM_R) continue;
        const d2 = dx * dx + dy * dy;
        if (d2 < COMM_R * COMM_R) {
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
        }
      }
    }
    ctx.stroke();

    // Draw robots
    for (const r of robots) {
      if (r.state === 'seed') {
        ctx.fillStyle = '#DDA15E';
        ctx.strokeStyle = '#FEFAE0';
        ctx.lineWidth = 2;
      } else if (r.state === 'assembled') {
        ctx.fillStyle = '#8A9A5B';
        ctx.strokeStyle = '#FEFAE0';
        ctx.lineWidth = 1.3;
      } else {
        ctx.fillStyle = '#BC6C25';
        ctx.strokeStyle = 'rgba(254, 250, 224, 0.5)';
        ctx.lineWidth = 1;
      }
      ctx.beginPath();
      ctx.arc(r.x, r.y, ROBOT_R, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // seed robots get a cross marker (coordinate frame indicator)
      if (r.state === 'seed') {
        ctx.strokeStyle = 'rgba(61, 68, 35, 0.8)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(r.x - 2, r.y);
        ctx.lineTo(r.x + 2, r.y);
        ctx.moveTo(r.x, r.y - 2);
        ctx.lineTo(r.x, r.y + 2);
        ctx.stroke();
      }
    }
  }

  // ==== STATS UI ====
  const assembledEl = document.getElementById('assembledVal');
  const timeEl = document.getElementById('timeVal');
  const movingEl = document.getElementById('movingVal');

  function updateStats() {
    let assembled = 0, moving = 0;
    for (const r of robots) {
      if (r.state === 'assembled' || r.state === 'seed') assembled++;
      else moving++;
    }
    const pct = Math.round((assembled / robots.length) * 100);
    assembledEl.textContent = pct + '%';
    movingEl.textContent = moving;
    const t = finishTime > 0 ? finishTime : (performance.now() - startTime);
    timeEl.textContent = (t / 1000).toFixed(1) + 's';
  }

  // ==== CONTROLS ====
  const countSlider = document.getElementById('countSlider');
  const countVal = document.getElementById('countVal');
  const resetBtn = document.getElementById('resetBtn');
  const shapeButtons = document.querySelectorAll('.shape-buttons button');

  countSlider.addEventListener('input', () => {
    countVal.textContent = countSlider.value;
  });
  countSlider.addEventListener('change', () => {
    createRobots(parseInt(countSlider.value, 10));
  });

  resetBtn.addEventListener('click', () => {
    createRobots(parseInt(countSlider.value, 10));
  });

  shapeButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      shapeButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentShape = btn.dataset.shape;
      rebuildShape();
      createRobots(parseInt(countSlider.value, 10));
    });
  });

  // ==== INIT + LOOP ====
  rebuildShape();
  createRobots(120);

  function loop() {
    update();
    render();
    updateStats();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
