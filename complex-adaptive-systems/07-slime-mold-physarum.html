<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime Mold Physarum — Complex Adaptive Systems</title>
<style>
  :root {
    --sage: #8A9A5B;
    --moss: #606C38;
    --earth: #DDA15E;
    --cream: #FEFAE0;
    --terracotta: #BC6C25;
    --dark-moss: #3d4423;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0a0a0f;
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--cream);
    overflow: hidden;
  }

  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 50% 50%, #12121a 0%, #0a0a0f 70%);
  }

  canvas#physarum {
    display: block;
    width: min(100vmin, 900px);
    height: min(100vmin, 900px);
    image-rendering: auto;
    box-shadow:
      0 0 0 1px rgba(221, 161, 94, 0.08),
      0 10px 60px rgba(188, 108, 37, 0.18),
      0 0 120px rgba(221, 161, 94, 0.06) inset;
    border-radius: 6px;
  }

  .title-card {
    position: fixed;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }

  .title-card h1 {
    font-family: 'Lora', Georgia, serif;
    font-size: clamp(1rem, 2.2vw, 1.5rem);
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--earth);
    text-shadow: 0 0 30px rgba(221, 161, 94, 0.4);
  }

  .title-card p {
    margin-top: 4px;
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(254, 250, 224, 0.4);
  }

  .organic-back-link {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 20;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(254, 250, 224, 0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(221, 161, 94, 0.22);
    border-radius: 999px;
    color: var(--cream);
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    transition: all 0.35s cubic-bezier(0.2, 0.7, 0.2, 1);
  }

  .organic-back-link:hover {
    background: rgba(221, 161, 94, 0.15);
    border-color: rgba(221, 161, 94, 0.5);
    transform: translateY(-1px);
  }

  .back-arrow {
    display: inline-block;
    transition: transform 0.3s ease;
  }

  .organic-back-link:hover .back-arrow {
    transform: translateX(-3px);
  }

  .controls {
    position: fixed;
    right: 20px;
    bottom: 20px;
    z-index: 10;
    width: min(300px, calc(100vw - 40px));
    padding: 18px 20px 16px;
    background: rgba(10, 10, 15, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(221, 161, 94, 0.18);
    border-radius: 18px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
  }

  .controls h2 {
    font-family: 'Lora', Georgia, serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--earth);
    margin-bottom: 12px;
    opacity: 0.9;
  }

  .ctrl {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 10px;
    margin-bottom: 10px;
    font-size: 0.78rem;
  }

  .ctrl label {
    color: rgba(254, 250, 224, 0.82);
    letter-spacing: 0.03em;
  }

  .ctrl .val {
    color: var(--earth);
    font-variant-numeric: tabular-nums;
    font-size: 0.74rem;
  }

  .ctrl input[type="range"] {
    grid-column: 1 / -1;
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: rgba(254, 250, 224, 0.15);
    border-radius: 2px;
    outline: none;
  }

  .ctrl input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--earth);
    cursor: pointer;
    box-shadow: 0 0 0 1px rgba(10,10,15,0.6), 0 0 14px rgba(221,161,94,0.55);
    transition: transform 0.15s ease;
  }

  .ctrl input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  .ctrl input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px; border: none;
    border-radius: 50%; background: var(--earth);
    cursor: pointer;
    box-shadow: 0 0 14px rgba(221,161,94,0.55);
  }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1 1 auto;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 0.74rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cream);
    background: rgba(221, 161, 94, 0.1);
    border: 1px solid rgba(221, 161, 94, 0.3);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn:hover {
    background: rgba(221, 161, 94, 0.22);
    border-color: rgba(221, 161, 94, 0.55);
  }

  .btn.active {
    background: rgba(188, 108, 37, 0.3);
    border-color: var(--terracotta);
    color: var(--earth);
  }

  .hint {
    margin-top: 10px;
    font-size: 0.68rem;
    color: rgba(254, 250, 224, 0.4);
    letter-spacing: 0.04em;
    line-height: 1.5;
  }

  @media (max-width: 600px) {
    .controls { right: 10px; left: 10px; bottom: 10px; width: auto; padding: 14px; }
    .title-card { top: 70px; }
    .organic-back-link { font-size: 0.75rem; padding: 8px 14px; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<a href="index.html" class="organic-back-link">
  <span class="back-arrow">&larr;</span>
  <span class="back-text">Gallery</span>
</a>

<div class="title-card">
  <h1>Slime Mold &mdash; Physarum Polycephalum</h1>
  <p>agent-based trail simulation</p>
</div>

<div class="stage">
  <canvas id="physarum" width="700" height="700"></canvas>
</div>

<div class="controls">
  <h2>Parameters</h2>

  <div class="ctrl">
    <label>Particles</label><span class="val" id="val-count">20000</span>
    <input type="range" id="count" min="2000" max="60000" step="1000" value="20000">
  </div>

  <div class="ctrl">
    <label>Sensor angle &deg;</label><span class="val" id="val-sa">22</span>
    <input type="range" id="sa" min="5" max="80" step="1" value="22">
  </div>

  <div class="ctrl">
    <label>Sensor distance</label><span class="val" id="val-sd">9</span>
    <input type="range" id="sd" min="2" max="40" step="1" value="9">
  </div>

  <div class="ctrl">
    <label>Rotation angle &deg;</label><span class="val" id="val-ra">32</span>
    <input type="range" id="ra" min="2" max="90" step="1" value="32">
  </div>

  <div class="ctrl">
    <label>Evaporation</label><span class="val" id="val-ev">0.10</span>
    <input type="range" id="ev" min="0.01" max="0.30" step="0.01" value="0.10">
  </div>

  <div class="ctrl">
    <label>Diffusion</label><span class="val" id="val-df">0.55</span>
    <input type="range" id="df" min="0" max="1" step="0.05" value="0.55">
  </div>

  <div class="ctrl">
    <label>Speed</label><span class="val" id="val-sp">1.0</span>
    <input type="range" id="sp" min="0.2" max="3" step="0.1" value="1.0">
  </div>

  <div class="btn-row">
    <button class="btn active" id="mode-circle">Circle</button>
    <button class="btn" id="mode-scatter">Scatter</button>
    <button class="btn" id="mode-ring">Ring</button>
  </div>

  <div class="btn-row">
    <button class="btn" id="reset">Reset</button>
    <button class="btn" id="pause">Pause</button>
  </div>

  <div class="hint">Agents sense three forward points; follow trail; deposit more trail; networks emerge.</div>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('physarum');
  const ctx = canvas.getContext('2d');

  // Simulation grid (logical pixels)
  const W = canvas.width;   // 700
  const H = canvas.height;  // 700

  // Trail buffers (two for ping-pong diffusion)
  let trailA = new Float32Array(W * H);
  let trailB = new Float32Array(W * H);

  // Agent SoA
  let N = 20000;
  let px = new Float32Array(N);
  let py = new Float32Array(N);
  let pa = new Float32Array(N);

  // Parameters
  const P = {
    sensorAngle: 22 * Math.PI / 180,
    sensorDist: 9,
    rotAngle: 32 * Math.PI / 180,
    evap: 0.10,
    diffusion: 0.55,
    speed: 1.0,
    depositAmt: 1.0,
    mode: 'circle',
    paused: false,
  };

  // Color ramp: dark bg -> terracotta -> earth -> cream
  // Precompute 256 entries
  const ramp = new Uint8ClampedArray(256 * 4);
  function buildRamp() {
    // Stops: t=0 dark navy, t=0.15 deep moss/brown, t=0.45 terracotta, t=0.75 earth, t=1 cream highlight
    const stops = [
      [0.00,  10, 10, 15],
      [0.08,  24, 14, 18],
      [0.22,  70, 30, 20],
      [0.40, 140, 60, 30],     // deep terracotta
      [0.58, 188,108, 37],     // terracotta
      [0.78, 221,161, 94],     // earth
      [0.92, 245,215,160],
      [1.00, 254,250,224],     // cream
    ];
    for (let i = 0; i < 256; i++) {
      const t = i / 255;
      let j = 0;
      while (j < stops.length - 1 && t > stops[j+1][0]) j++;
      const s0 = stops[j], s1 = stops[Math.min(j+1, stops.length-1)];
      const span = Math.max(1e-6, s1[0] - s0[0]);
      const u = (t - s0[0]) / span;
      const r = s0[1] + (s1[1] - s0[1]) * u;
      const g = s0[2] + (s1[2] - s0[2]) * u;
      const b = s0[3] + (s1[3] - s0[3]) * u;
      ramp[i*4+0] = r;
      ramp[i*4+1] = g;
      ramp[i*4+2] = b;
      ramp[i*4+3] = 255;
    }
  }
  buildRamp();

  // Image data for output
  const imgData = ctx.createImageData(W, H);
  const imgPixels = imgData.data;

  function initAgents(mode) {
    const cx = W * 0.5, cy = H * 0.5;
    const R = Math.min(W, H) * 0.18;
    const R2 = Math.min(W, H) * 0.42;
    for (let i = 0; i < N; i++) {
      let x, y, a;
      if (mode === 'circle') {
        // small disc in center, outward pointing
        const r = Math.sqrt(Math.random()) * R;
        const th = Math.random() * Math.PI * 2;
        x = cx + Math.cos(th) * r;
        y = cy + Math.sin(th) * r;
        a = Math.random() * Math.PI * 2;
      } else if (mode === 'ring') {
        const th = Math.random() * Math.PI * 2;
        x = cx + Math.cos(th) * R2;
        y = cy + Math.sin(th) * R2;
        // Point tangentially or inward
        a = th + Math.PI + (Math.random() - 0.5) * 0.6;
      } else { // scatter
        x = Math.random() * W;
        y = Math.random() * H;
        a = Math.random() * Math.PI * 2;
      }
      px[i] = x; py[i] = y; pa[i] = a;
    }
  }

  function resizeAgents(newN) {
    const old = Math.min(N, newN);
    const oldPx = px, oldPy = py, oldPa = pa;
    N = newN;
    px = new Float32Array(N);
    py = new Float32Array(N);
    pa = new Float32Array(N);
    for (let i = 0; i < old; i++) { px[i] = oldPx[i]; py[i] = oldPy[i]; pa[i] = oldPa[i]; }
    // Seed remainder fresh
    if (newN > old) {
      const cx = W * 0.5, cy = H * 0.5;
      const R = Math.min(W, H) * 0.18;
      for (let i = old; i < N; i++) {
        if (P.mode === 'scatter') {
          px[i] = Math.random() * W;
          py[i] = Math.random() * H;
          pa[i] = Math.random() * Math.PI * 2;
        } else if (P.mode === 'ring') {
          const th = Math.random() * Math.PI * 2;
          px[i] = cx + Math.cos(th) * Math.min(W,H)*0.42;
          py[i] = cy + Math.sin(th) * Math.min(W,H)*0.42;
          pa[i] = th + Math.PI;
        } else {
          const r = Math.sqrt(Math.random()) * R;
          const th = Math.random() * Math.PI * 2;
          px[i] = cx + Math.cos(th) * r;
          py[i] = cy + Math.sin(th) * r;
          pa[i] = Math.random() * Math.PI * 2;
        }
      }
    }
  }

  function sampleTrail(x, y) {
    // Wrap coords (toroidal world)
    let xi = x | 0, yi = y | 0;
    if (xi < 0) xi += W; else if (xi >= W) xi -= W;
    if (yi < 0) yi += H; else if (yi >= H) yi -= H;
    return trailA[yi * W + xi];
  }

  function stepAgents() {
    const sa = P.sensorAngle;
    const sd = P.sensorDist;
    const ra = P.rotAngle;
    const spd = P.speed;
    const dep = P.depositAmt;

    for (let i = 0; i < N; i++) {
      const x = px[i], y = py[i], a = pa[i];

      const af = a;
      const al = a - sa;
      const ar = a + sa;

      const fx = x + Math.cos(af) * sd;
      const fy = y + Math.sin(af) * sd;
      const lx = x + Math.cos(al) * sd;
      const ly = y + Math.sin(al) * sd;
      const rx = x + Math.cos(ar) * sd;
      const ry = y + Math.sin(ar) * sd;

      const F = sampleTrail(fx, fy);
      const L = sampleTrail(lx, ly);
      const R = sampleTrail(rx, ry);

      let newA = a;
      if (F > L && F > R) {
        // stay straight
      } else if (F < L && F < R) {
        // random rotate
        newA += (Math.random() < 0.5 ? -1 : 1) * ra;
      } else if (R > L) {
        newA += ra;
      } else if (L > R) {
        newA -= ra;
      }

      // Move
      let nx = x + Math.cos(newA) * spd;
      let ny = y + Math.sin(newA) * spd;

      // Wrap world
      if (nx < 0) nx += W; else if (nx >= W) nx -= W;
      if (ny < 0) ny += H; else if (ny >= H) ny -= H;

      px[i] = nx;
      py[i] = ny;
      pa[i] = newA;

      // Deposit
      const idx = (ny | 0) * W + (nx | 0);
      trailA[idx] += dep;
    }
  }

  // 3x3 box blur from src->dst, toroidal wrap, with blend factor and evaporation
  function diffuseEvaporate() {
    const src = trailA, dst = trailB;
    const df = P.diffusion;
    const keep = 1 - df;
    const evapMul = 1 - P.evap;

    // Separable box blur would be faster, but 3x3 direct is acceptable at 700x700
    for (let y = 0; y < H; y++) {
      const ym = (y - 1 + H) % H;
      const yp = (y + 1) % H;
      const rowY  = y  * W;
      const rowYm = ym * W;
      const rowYp = yp * W;
      for (let x = 0; x < W; x++) {
        const xm = (x - 1 + W) % W;
        const xp = (x + 1) % W;
        const s =
          src[rowYm + xm] + src[rowYm + x] + src[rowYm + xp] +
          src[rowY  + xm] + src[rowY  + x] + src[rowY  + xp] +
          src[rowYp + xm] + src[rowYp + x] + src[rowYp + xp];
        const blurred = s * (1 / 9);
        // Blend: keep*original + df*blurred, then evaporate
        const v = (keep * src[rowY + x] + df * blurred) * evapMul;
        dst[rowY + x] = v < 0.0005 ? 0 : v;
      }
    }
    // swap
    trailA = dst;
    trailB = src;
  }

  function render() {
    // Map trail -> color ramp
    const len = W * H;
    // Use a nonlinear mapping for contrast: v^0.65 and cap at ~3
    for (let i = 0; i < len; i++) {
      let v = trailA[i];
      // Tone curve: emphasize mid trails, cap highlights
      // v in [0, ~8+], map to [0,255]
      let t = v / (v + 1.6);  // soft compressor 0..1
      t = Math.pow(t, 0.85);
      let ci = (t * 255) | 0;
      if (ci > 255) ci = 255;
      const r = ramp[ci * 4];
      const g = ramp[ci * 4 + 1];
      const b = ramp[ci * 4 + 2];
      const di = i * 4;
      imgPixels[di]     = r;
      imgPixels[di + 1] = g;
      imgPixels[di + 2] = b;
      imgPixels[di + 3] = 255;
    }
    ctx.putImageData(imgData, 0, 0);
  }

  function loop() {
    if (!P.paused) {
      stepAgents();
      diffuseEvaporate();
      render();
    }
    requestAnimationFrame(loop);
  }

  // ---- UI wiring ----
  function bindRange(id, valId, fn) {
    const el = document.getElementById(id);
    const label = document.getElementById(valId);
    const sync = () => {
      const v = parseFloat(el.value);
      fn(v);
      label.textContent = formatVal(id, v);
    };
    el.addEventListener('input', sync);
    sync();
  }

  function formatVal(id, v) {
    if (id === 'ev') return v.toFixed(2);
    if (id === 'df') return v.toFixed(2);
    if (id === 'sp') return v.toFixed(1);
    if (id === 'count') return (v | 0).toLocaleString();
    return String(v | 0);
  }

  bindRange('count', 'val-count', v => {
    const n = v | 0;
    if (n !== N) resizeAgents(n);
  });
  bindRange('sa', 'val-sa', v => { P.sensorAngle = v * Math.PI / 180; });
  bindRange('sd', 'val-sd', v => { P.sensorDist = v; });
  bindRange('ra', 'val-ra', v => { P.rotAngle = v * Math.PI / 180; });
  bindRange('ev', 'val-ev', v => { P.evap = v; });
  bindRange('df', 'val-df', v => { P.diffusion = v; });
  bindRange('sp', 'val-sp', v => { P.speed = v; });

  const modeBtns = {
    circle:  document.getElementById('mode-circle'),
    scatter: document.getElementById('mode-scatter'),
    ring:    document.getElementById('mode-ring'),
  };
  function setMode(m) {
    P.mode = m;
    Object.entries(modeBtns).forEach(([k, b]) => {
      b.classList.toggle('active', k === m);
    });
    // Clear trail + reseed
    trailA.fill(0); trailB.fill(0);
    initAgents(m);
  }
  modeBtns.circle.addEventListener('click',  () => setMode('circle'));
  modeBtns.scatter.addEventListener('click', () => setMode('scatter'));
  modeBtns.ring.addEventListener('click',    () => setMode('ring'));

  document.getElementById('reset').addEventListener('click', () => {
    trailA.fill(0); trailB.fill(0);
    initAgents(P.mode);
  });

  const pauseBtn = document.getElementById('pause');
  pauseBtn.addEventListener('click', () => {
    P.paused = !P.paused;
    pauseBtn.textContent = P.paused ? 'Resume' : 'Pause';
    pauseBtn.classList.toggle('active', P.paused);
  });

  // Click on canvas nudges agents toward click point (attractor pulse)
  canvas.addEventListener('pointerdown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) / rect.width * W;
    const cy = (e.clientY - rect.top) / rect.height * H;
    const radius = 60;
    const r2 = radius * radius;
    // Deposit a pulse of attractant
    const xi0 = Math.max(0, (cx - radius) | 0);
    const yi0 = Math.max(0, (cy - radius) | 0);
    const xi1 = Math.min(W - 1, (cx + radius) | 0);
    const yi1 = Math.min(H - 1, (cy + radius) | 0);
    for (let y = yi0; y <= yi1; y++) {
      for (let x = xi0; x <= xi1; x++) {
        const dx = x - cx, dy = y - cy;
        const d2 = dx*dx + dy*dy;
        if (d2 < r2) {
          trailA[y * W + x] += 6 * (1 - d2 / r2);
        }
      }
    }
  });

  // Initialize
  initAgents('circle');
  loop();
})();
</script>

</body>
</html>
