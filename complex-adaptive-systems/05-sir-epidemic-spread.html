<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIR Epidemic Spread — Complex Adaptive Systems</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        background: #0a0a0f;
        color: #FEFAE0;
        font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
        height: 100%;
        overflow: hidden;
    }

    .organic-back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(254, 250, 224, 0.08);
        border: 1px solid rgba(254, 250, 224, 0.2);
        border-radius: 30px;
        color: #FEFAE0;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        backdrop-filter: blur(10px);
        z-index: 100;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .organic-back-link:hover {
        background: rgba(254, 250, 224, 0.15);
        border-color: rgba(254, 250, 224, 0.4);
        transform: translateX(-3px);
    }

    .back-arrow {
        font-size: 18px;
        line-height: 1;
    }

    .page-header {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 50;
        text-align: right;
    }

    .page-header h1 {
        font-family: 'Lora', Georgia, serif;
        font-size: 22px;
        font-weight: 600;
        color: #FEFAE0;
        letter-spacing: 0.4px;
    }

    .page-header p {
        font-size: 12px;
        color: rgba(254, 250, 224, 0.55);
        margin-top: 2px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }

    .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100vw;
        height: 100vh;
    }

    .panel {
        position: relative;
        overflow: hidden;
    }

    .panel.left {
        background: #0a0a0f;
        border-right: 1px solid rgba(254, 250, 224, 0.08);
    }

    .panel.right {
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
    }

    #agentsCanvas, #chartCanvas {
        display: block;
        width: 100%;
        height: 100%;
    }

    .controls {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: rgba(20, 20, 28, 0.85);
        border: 1px solid rgba(254, 250, 224, 0.08);
        border-radius: 14px;
        padding: 14px 18px;
        backdrop-filter: blur(10px);
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
    }

    .control {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .control label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: rgba(254, 250, 224, 0.55);
        display: flex;
        justify-content: space-between;
    }

    .control label .val {
        color: #DDA15E;
        font-weight: 600;
    }

    .control input[type="range"] {
        width: 100%;
        appearance: none;
        height: 4px;
        background: rgba(254, 250, 224, 0.15);
        border-radius: 2px;
        outline: none;
    }

    .control input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #DDA15E;
        cursor: pointer;
        box-shadow: 0 0 8px rgba(221, 161, 94, 0.6);
    }

    .control input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #DDA15E;
        cursor: pointer;
        border: none;
        box-shadow: 0 0 8px rgba(221, 161, 94, 0.6);
    }

    .control button {
        background: rgba(188, 108, 37, 0.2);
        color: #FEFAE0;
        border: 1px solid rgba(188, 108, 37, 0.5);
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }

    .control button:hover {
        background: rgba(188, 108, 37, 0.35);
        border-color: #BC6C25;
    }

    .stats-box {
        position: absolute;
        top: 80px;
        left: 24px;
        background: rgba(20, 20, 28, 0.85);
        border: 1px solid rgba(254, 250, 224, 0.08);
        border-radius: 12px;
        padding: 14px 18px;
        backdrop-filter: blur(10px);
        min-width: 220px;
    }

    .stats-box h3 {
        font-family: 'Lora', serif;
        font-size: 13px;
        font-weight: 600;
        color: rgba(254, 250, 224, 0.5);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
    }

    .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 4px 0;
        font-size: 13px;
    }

    .stat-row .lbl {
        color: rgba(254, 250, 224, 0.65);
    }

    .stat-row .num {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
    }

    .num.s { color: #FEFAE0; }
    .num.i { color: #BC6C25; }
    .num.r { color: #8A9A5B; }
    .num.r0 { color: #DDA15E; }

    .legend {
        position: absolute;
        top: 80px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: rgba(20, 20, 28, 0.85);
        border: 1px solid rgba(254, 250, 224, 0.08);
        border-radius: 12px;
        padding: 12px 16px;
        backdrop-filter: blur(10px);
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
    }

    .legend-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
    }

    .legend-dot.s { background: #FEFAE0; }
    .legend-dot.i { background: #BC6C25; box-shadow: 0 0 8px #BC6C25; }
    .legend-dot.r { background: #8A9A5B; }

    @media (max-width: 720px) {
        .layout { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
        .legend, .stats-box { top: auto; }
        .controls { grid-template-columns: repeat(2, 1fr); }
    }
</style>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<a href="index.html" class="organic-back-link">
    <span class="back-arrow">&larr;</span>
    <span class="back-text">Gallery</span>
</a>

<div class="page-header">
    <h1>SIR Epidemic Spread</h1>
    <p>Agent-based S-I-R model</p>
</div>

<div class="layout">
    <div class="panel left">
        <canvas id="agentsCanvas"></canvas>
        <div class="legend">
            <div class="legend-item"><span class="legend-dot s"></span>Susceptible</div>
            <div class="legend-item"><span class="legend-dot i"></span>Infected</div>
            <div class="legend-item"><span class="legend-dot r"></span>Recovered</div>
        </div>
        <div class="controls">
            <div class="control">
                <label>Population <span class="val" id="popVal">700</span></label>
                <input type="range" id="pop" min="200" max="1000" step="50" value="700">
            </div>
            <div class="control">
                <label>Initial Infected <span class="val" id="i0Val">5</span></label>
                <input type="range" id="i0" min="1" max="50" step="1" value="5">
            </div>
            <div class="control">
                <label>&beta; (transmission) <span class="val" id="betaVal">0.35</span></label>
                <input type="range" id="beta" min="0.01" max="1.0" step="0.01" value="0.35">
            </div>
            <div class="control">
                <label>&gamma; (recovery) <span class="val" id="gammaVal">0.01</span></label>
                <input type="range" id="gamma" min="0.001" max="0.05" step="0.001" value="0.01">
            </div>
            <div class="control">
                <label>Infection Radius <span class="val" id="radVal">8</span></label>
                <input type="range" id="rad" min="3" max="20" step="1" value="8">
            </div>
            <div class="control">
                <label>Speed <span class="val" id="spdVal">1.0</span></label>
                <input type="range" id="spd" min="0.1" max="3.0" step="0.1" value="1.0">
            </div>
            <div class="control" style="justify-content:flex-end;">
                <button id="resetBtn">Reset</button>
            </div>
            <div class="control" style="justify-content:flex-end;">
                <button id="pauseBtn">Pause</button>
            </div>
        </div>
    </div>
    <div class="panel right">
        <canvas id="chartCanvas"></canvas>
        <div class="stats-box">
            <h3>Live Statistics</h3>
            <div class="stat-row"><span class="lbl">Susceptible (S)</span><span class="num s" id="statS">0</span></div>
            <div class="stat-row"><span class="lbl">Infected (I)</span><span class="num i" id="statI">0</span></div>
            <div class="stat-row"><span class="lbl">Recovered (R)</span><span class="num r" id="statR">0</span></div>
            <div class="stat-row"><span class="lbl">R<sub>0</sub> = &beta;/&gamma;</span><span class="num r0" id="statR0">0</span></div>
            <div class="stat-row"><span class="lbl">Peak Infected</span><span class="num i" id="statPeak">0</span></div>
            <div class="stat-row"><span class="lbl">Total Recovered</span><span class="num r" id="statTotR">0</span></div>
            <div class="stat-row"><span class="lbl">Day</span><span class="num" id="statDay">0</span></div>
        </div>
    </div>
</div>

<script>
(() => {
    const agentsCanvas = document.getElementById('agentsCanvas');
    const actx = agentsCanvas.getContext('2d');
    const chartCanvas = document.getElementById('chartCanvas');
    const cctx = chartCanvas.getContext('2d');

    const COLORS = {
        S: '#FEFAE0',
        I: '#BC6C25',
        R: '#8A9A5B',
        bg: '#0a0a0f',
        grid: 'rgba(254, 250, 224, 0.08)',
        text: 'rgba(254, 250, 224, 0.5)'
    };

    const STATE = { S: 0, I: 1, R: 2 };

    const params = {
        population: 700,
        initialInfected: 5,
        beta: 0.35,
        gamma: 0.01,
        radius: 8,
        speed: 1.0
    };

    let agents = [];
    let history = [];
    let peakI = 0;
    let day = 0;
    let paused = false;

    // Spatial hash for neighbor lookup
    let cellSize = 20;
    let grid = new Map();

    function setupCanvases() {
        const dpr = window.devicePixelRatio || 1;
        [agentsCanvas, chartCanvas].forEach(canvas => {
            const rect = canvas.getBoundingClientRect();
            canvas.width = Math.floor(rect.width * dpr);
            canvas.height = Math.floor(rect.height * dpr);
            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        });
    }

    function getSize(canvas) {
        const rect = canvas.getBoundingClientRect();
        return { w: rect.width, h: rect.height };
    }

    function resetSimulation() {
        agents = [];
        history = [];
        peakI = 0;
        day = 0;
        const { w, h } = getSize(agentsCanvas);
        for (let i = 0; i < params.population; i++) {
            const angle = Math.random() * Math.PI * 2;
            const sp = 0.4 + Math.random() * 0.4;
            agents.push({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: Math.cos(angle) * sp,
                vy: Math.sin(angle) * sp,
                state: i < params.initialInfected ? STATE.I : STATE.S,
                infectedSince: 0
            });
        }
        recordHistory();
    }

    function recordHistory() {
        let s = 0, i = 0, r = 0;
        for (const a of agents) {
            if (a.state === STATE.S) s++;
            else if (a.state === STATE.I) i++;
            else r++;
        }
        if (i > peakI) peakI = i;
        history.push({ s, i, r });
        if (history.length > 1200) history.shift();

        document.getElementById('statS').textContent = s;
        document.getElementById('statI').textContent = i;
        document.getElementById('statR').textContent = r;
        const r0 = params.gamma > 0 ? (params.beta / params.gamma).toFixed(2) : '∞';
        document.getElementById('statR0').textContent = r0;
        document.getElementById('statPeak').textContent = peakI;
        document.getElementById('statTotR').textContent = r;
        document.getElementById('statDay').textContent = day;
    }

    function buildGrid() {
        grid.clear();
        cellSize = Math.max(params.radius * 2, 10);
        for (let i = 0; i < agents.length; i++) {
            const a = agents[i];
            const cx = Math.floor(a.x / cellSize);
            const cy = Math.floor(a.y / cellSize);
            const key = cx + ',' + cy;
            let bucket = grid.get(key);
            if (!bucket) { bucket = []; grid.set(key, bucket); }
            bucket.push(i);
        }
    }

    function step() {
        const { w, h } = getSize(agentsCanvas);
        const speed = params.speed;

        // Move agents (random walk with small velocity drift, wrap edges)
        for (const a of agents) {
            // Small random perturbation to velocity
            a.vx += (Math.random() - 0.5) * 0.08;
            a.vy += (Math.random() - 0.5) * 0.08;
            // Clamp velocity magnitude
            const vm = Math.hypot(a.vx, a.vy);
            const maxV = 0.8;
            if (vm > maxV) { a.vx *= maxV / vm; a.vy *= maxV / vm; }

            a.x += a.vx * speed;
            a.y += a.vy * speed;

            // Wrap edges
            if (a.x < 0) a.x += w;
            else if (a.x >= w) a.x -= w;
            if (a.y < 0) a.y += h;
            else if (a.y >= h) a.y -= h;
        }

        // Build spatial hash
        buildGrid();

        // Infection transmission
        const r2 = params.radius * params.radius;
        const perContactProb = params.beta;
        for (const [key, bucket] of grid) {
            const [cx, cy] = key.split(',').map(Number);
            // For each susceptible in cell, check infected neighbors in cell & adjacent
            for (const idx of bucket) {
                const a = agents[idx];
                if (a.state !== STATE.S) continue;
                // Check 9 cells
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 1; dy++) {
                        const nb = grid.get((cx + dx) + ',' + (cy + dy));
                        if (!nb) continue;
                        for (const jdx of nb) {
                            if (jdx === idx) continue;
                            const b = agents[jdx];
                            if (b.state !== STATE.I) continue;
                            const ddx = a.x - b.x;
                            const ddy = a.y - b.y;
                            if (ddx * ddx + ddy * ddy <= r2) {
                                if (Math.random() < perContactProb) {
                                    a.state = STATE.I;
                                    a.infectedSince = day;
                                    break;
                                }
                            }
                        }
                        if (a.state === STATE.I) break;
                    }
                    if (a.state === STATE.I) break;
                }
            }
        }

        // Recovery
        for (const a of agents) {
            if (a.state === STATE.I && Math.random() < params.gamma) {
                a.state = STATE.R;
            }
        }

        day++;
        recordHistory();
    }

    function drawAgents() {
        const { w, h } = getSize(agentsCanvas);
        actx.fillStyle = COLORS.bg;
        actx.fillRect(0, 0, w, h);

        // Draw infection radius glow around infected agents (faint)
        actx.save();
        for (const a of agents) {
            if (a.state !== STATE.I) continue;
            const grad = actx.createRadialGradient(a.x, a.y, 0, a.x, a.y, params.radius);
            grad.addColorStop(0, 'rgba(188, 108, 37, 0.25)');
            grad.addColorStop(1, 'rgba(188, 108, 37, 0)');
            actx.fillStyle = grad;
            actx.beginPath();
            actx.arc(a.x, a.y, params.radius, 0, Math.PI * 2);
            actx.fill();
        }
        actx.restore();

        // Draw agents
        for (const a of agents) {
            actx.beginPath();
            if (a.state === STATE.S) {
                actx.fillStyle = COLORS.S;
                actx.arc(a.x, a.y, 2.2, 0, Math.PI * 2);
                actx.fill();
            } else if (a.state === STATE.I) {
                // Halo
                actx.fillStyle = 'rgba(188, 108, 37, 0.35)';
                actx.arc(a.x, a.y, 5, 0, Math.PI * 2);
                actx.fill();
                actx.beginPath();
                actx.fillStyle = COLORS.I;
                actx.arc(a.x, a.y, 2.4, 0, Math.PI * 2);
                actx.fill();
            } else {
                actx.fillStyle = COLORS.R;
                actx.arc(a.x, a.y, 2.2, 0, Math.PI * 2);
                actx.fill();
            }
        }
    }

    function drawChart() {
        const { w, h } = getSize(chartCanvas);
        cctx.fillStyle = COLORS.bg;
        cctx.fillRect(0, 0, w, h);

        const padL = 50, padR = 30, padT = 40, padB = 40;
        const chartW = w - padL - padR;
        const chartH = h - padT - padB;
        const pop = params.population || 1;

        // Title
        cctx.fillStyle = COLORS.text;
        cctx.font = "600 12px 'Nunito', sans-serif";
        cctx.textAlign = 'left';
        cctx.fillText('EPIDEMIC CURVE  (S, I, R over time)', padL, padT - 16);

        // Grid
        cctx.strokeStyle = COLORS.grid;
        cctx.lineWidth = 1;
        cctx.beginPath();
        for (let i = 0; i <= 5; i++) {
            const y = padT + (chartH * i) / 5;
            cctx.moveTo(padL, y);
            cctx.lineTo(padL + chartW, y);
        }
        for (let i = 0; i <= 5; i++) {
            const x = padL + (chartW * i) / 5;
            cctx.moveTo(x, padT);
            cctx.lineTo(x, padT + chartH);
        }
        cctx.stroke();

        // Y-axis labels (population percent)
        cctx.fillStyle = COLORS.text;
        cctx.font = "11px 'Nunito', sans-serif";
        cctx.textAlign = 'right';
        for (let i = 0; i <= 5; i++) {
            const y = padT + chartH - (chartH * i) / 5;
            const pct = Math.round((i / 5) * 100);
            cctx.fillText(pct + '%', padL - 8, y + 4);
        }

        // X-axis label
        cctx.textAlign = 'center';
        cctx.fillText('time (days)', padL + chartW / 2, h - 12);

        if (history.length < 2) return;

        const n = history.length;
        const maxX = Math.max(n - 1, 1);

        const plot = (key, color, fillA) => {
            cctx.beginPath();
            for (let i = 0; i < n; i++) {
                const x = padL + (i / maxX) * chartW;
                const v = history[i][key] / pop;
                const y = padT + chartH - v * chartH;
                if (i === 0) cctx.moveTo(x, y);
                else cctx.lineTo(x, y);
            }
            cctx.strokeStyle = color;
            cctx.lineWidth = 2;
            cctx.stroke();

            if (fillA) {
                cctx.lineTo(padL + chartW, padT + chartH);
                cctx.lineTo(padL, padT + chartH);
                cctx.closePath();
                cctx.fillStyle = fillA;
                cctx.fill();
            }
        };

        plot('s', COLORS.S, 'rgba(254, 250, 224, 0.04)');
        plot('r', COLORS.R, 'rgba(138, 154, 91, 0.08)');
        plot('i', COLORS.I, 'rgba(188, 108, 37, 0.18)');

        // Current values legend at top-right
        const last = history[history.length - 1];
        cctx.textAlign = 'right';
        cctx.font = "600 11px 'Nunito', sans-serif";
        const items = [
            ['S', last.s, COLORS.S],
            ['I', last.i, COLORS.I],
            ['R', last.r, COLORS.R]
        ];
        let xx = padL + chartW;
        for (let i = items.length - 1; i >= 0; i--) {
            const [lbl, v, c] = items[i];
            const txt = lbl + ' ' + v;
            cctx.fillStyle = c;
            cctx.fillText(txt, xx, padT - 16);
            xx -= cctx.measureText(txt).width + 14;
        }
    }

    function loop() {
        if (!paused) step();
        drawAgents();
        drawChart();
        requestAnimationFrame(loop);
    }

    // Controls
    function bindSlider(id, valId, key, parse) {
        const el = document.getElementById(id);
        const valEl = document.getElementById(valId);
        const update = () => {
            const v = parse(el.value);
            params[key] = v;
            valEl.textContent = typeof v === 'number' && !Number.isInteger(v) ? v.toFixed(v < 0.1 ? 3 : 2) : v;
        };
        el.addEventListener('input', update);
        update();
    }

    bindSlider('pop', 'popVal', 'population', v => parseInt(v, 10));
    bindSlider('i0', 'i0Val', 'initialInfected', v => parseInt(v, 10));
    bindSlider('beta', 'betaVal', 'beta', v => parseFloat(v));
    bindSlider('gamma', 'gammaVal', 'gamma', v => parseFloat(v));
    bindSlider('rad', 'radVal', 'radius', v => parseInt(v, 10));
    bindSlider('spd', 'spdVal', 'speed', v => parseFloat(v));

    document.getElementById('pop').addEventListener('change', resetSimulation);
    document.getElementById('i0').addEventListener('change', resetSimulation);

    document.getElementById('resetBtn').addEventListener('click', resetSimulation);
    const pauseBtn = document.getElementById('pauseBtn');
    pauseBtn.addEventListener('click', () => {
        paused = !paused;
        pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    });

    window.addEventListener('resize', () => {
        setupCanvases();
    });

    setupCanvases();
    resetSimulation();
    loop();
})();
</script>
</body>
</html>
