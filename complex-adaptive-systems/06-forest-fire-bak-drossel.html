<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Fire — Complex Adaptive Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --sage: #8A9A5B;
    --moss: #606C38;
    --terracotta: #BC6C25;
    --earth: #DDA15E;
    --cream: #FEFAE0;
    --ink: #e8e6d5;
    --muted: #8a8874;
    --panel: rgba(20, 22, 28, 0.72);
    --panel-border: rgba(138, 154, 91, 0.25);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  canvas#sim {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    display: block;
  }

  .organic-back-link {
    position: fixed;
    top: 20px; left: 20px;
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(254, 250, 224, 0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(138, 154, 91, 0.3);
    border-radius: 30px;
    color: var(--cream);
    text-decoration: none;
    font-family: 'Lora', Georgia, serif;
    font-size: 14px;
    letter-spacing: 0.3px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .organic-back-link:hover {
    background: rgba(138, 154, 91, 0.2);
    border-color: var(--sage);
    transform: translateX(-3px);
  }
  .organic-back-link .back-arrow { transition: transform 0.3s ease; }
  .organic-back-link:hover .back-arrow { transform: translateX(-3px); }

  .title-card {
    position: fixed;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    padding: 12px 26px;
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    text-align: center;
    pointer-events: none;
    max-width: 90vw;
  }
  .title-card h1 {
    margin: 0;
    font-family: 'Lora', Georgia, serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--cream);
  }
  .title-card .sub {
    margin-top: 3px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }

  .controls {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    align-items: center;
    padding: 14px 22px;
    background: var(--panel);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    max-width: calc(100vw - 40px);
  }
  .ctrl {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 150px;
  }
  .ctrl label {
    font-size: 10px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .ctrl label .val {
    color: var(--sage);
    font-variant-numeric: tabular-nums;
  }
  .ctrl input[type="range"] {
    appearance: none;
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(138, 154, 91, 0.2);
    border-radius: 2px;
    outline: none;
  }
  .ctrl input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--sage);
    cursor: pointer;
    box-shadow: 0 0 0 2px rgba(10,10,15,0.9), 0 0 8px rgba(138,154,91,0.6);
  }
  .ctrl input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--sage);
    cursor: pointer;
    border: 2px solid var(--bg);
  }
  .btn {
    appearance: none;
    border: 1px solid var(--panel-border);
    background: rgba(138, 154, 91, 0.12);
    color: var(--cream);
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.6px;
    padding: 8px 14px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
  }
  .btn:hover {
    background: rgba(138, 154, 91, 0.28);
    border-color: var(--sage);
  }
  .btn.active {
    background: rgba(188, 108, 37, 0.3);
    border-color: var(--terracotta);
    color: var(--earth);
  }

  .stats {
    position: fixed;
    top: 80px; left: 20px;
    z-index: 50;
    padding: 14px 18px;
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    font-size: 12px;
    min-width: 180px;
  }
  .stats .row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    padding: 3px 0;
  }
  .stats .label { color: var(--muted); letter-spacing: 0.5px; }
  .stats .value {
    color: var(--sage);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .stats .value.fire { color: var(--terracotta); }
  .stats .value.peak { color: var(--earth); }

  .histogram {
    position: fixed;
    top: 80px; right: 20px;
    z-index: 50;
    padding: 12px 14px 10px;
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    width: 280px;
  }
  .histogram .ht {
    font-size: 10px;
    letter-spacing: 1.2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .histogram canvas {
    display: block;
    width: 100%;
    height: 150px;
    border-radius: 6px;
    background: rgba(0,0,0,0.3);
  }
  .histogram .caption {
    margin-top: 6px;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.3px;
  }

  @media (max-width: 720px) {
    .stats { top: 72px; font-size: 11px; min-width: 140px; padding: 10px 12px; }
    .histogram { width: 210px; top: 72px; padding: 10px; }
    .histogram canvas { height: 110px; }
    .title-card h1 { font-size: 15px; }
    .title-card .sub { display: none; }
    .controls { gap: 10px; padding: 10px 12px; bottom: 14px; }
    .ctrl { min-width: 110px; }
  }
</style>
</head>
<body>

<a href="index.html" class="organic-back-link" aria-label="Back to Complex Adaptive Systems gallery">
  <span class="back-arrow">&larr;</span>
  <span class="back-text">Gallery</span>
</a>

<div class="title-card">
  <h1>Forest Fire (Bak-Drossel-Schwabl)</h1>
  <div class="sub">Self-Organized Criticality</div>
</div>

<canvas id="sim"></canvas>

<div class="stats" role="status" aria-live="polite">
  <div class="row"><span class="label">Tree cover</span><span class="value" id="stat-cover">0%</span></div>
  <div class="row"><span class="label">Burning</span><span class="value fire" id="stat-burning">0</span></div>
  <div class="row"><span class="label">Largest fire</span><span class="value peak" id="stat-peak">0</span></div>
  <div class="row"><span class="label">Step</span><span class="value" id="stat-step">0</span></div>
</div>

<div class="histogram">
  <div class="ht"><span>Fire Size Distribution</span><span id="hist-count">0 fires</span></div>
  <canvas id="hist"></canvas>
  <div class="caption">log&#8322;(count) vs log&#8322;(size) — power law via slope</div>
</div>

<div class="controls">
  <div class="ctrl">
    <label>Growth p <span class="val" id="val-p">0.010</span></label>
    <input type="range" id="p-slider" min="1" max="60" step="1" value="12" aria-label="Tree growth probability">
  </div>
  <div class="ctrl">
    <label>Lightning f <span class="val" id="val-f">0.00020</span></label>
    <input type="range" id="f-slider" min="1" max="200" step="1" value="20" aria-label="Lightning probability">
  </div>
  <button class="btn" id="btn-pause" type="button">Pause</button>
  <button class="btn" id="btn-reset" type="button">Reset</button>
</div>

<script>
(() => {
  'use strict';

  const GRID = 250;
  const CELLS = GRID * GRID;
  const EMPTY = 0, TREE = 1, BURNING = 2;

  const canvas = document.getElementById('sim');
  const ctx = canvas.getContext('2d', { alpha: false });

  const histCanvas = document.getElementById('hist');
  const histCtx = histCanvas.getContext('2d');

  const pSlider = document.getElementById('p-slider');
  const fSlider = document.getElementById('f-slider');
  const valP = document.getElementById('val-p');
  const valF = document.getElementById('val-f');
  const btnPause = document.getElementById('btn-pause');
  const btnReset = document.getElementById('btn-reset');

  const statCover = document.getElementById('stat-cover');
  const statBurning = document.getElementById('stat-burning');
  const statPeak = document.getElementById('stat-peak');
  const statStep = document.getElementById('stat-step');
  const histCount = document.getElementById('hist-count');

  let grid = new Uint8Array(CELLS);
  let next = new Uint8Array(CELLS);

  // Fire IDs stored per-cell: 0 = not burning, >0 = fire id for tracking fire sizes.
  let fireGrid = new Uint32Array(CELLS);
  let fireGridNext = new Uint32Array(CELLS);

  let pGrow = 0.012;
  let fLight = 0.00020;
  let paused = false;
  let stepCount = 0;
  let peakFire = 0;
  let totalFires = 0;
  let fireIdCounter = 1;

  const HIST_BINS = 40;      // bins of log2(size) * 2  => half-decade bins in log2
  const histCounts = new Uint32Array(HIST_BINS);

  // fireHistory: fid -> cumulative cell count across all steps it has been active
  let fireHistory = new Map();

  function updateLabels() {
    valP.textContent = pGrow.toFixed(3);
    valF.textContent = fLight.toFixed(5);
  }

  pSlider.addEventListener('input', () => {
    pGrow = (+pSlider.value) / 1000;      // 0.001..0.060
    updateLabels();
  });
  fSlider.addEventListener('input', () => {
    fLight = (+fSlider.value) / 1000000;  // 0.000001..0.0002
    updateLabels();
  });
  btnPause.addEventListener('click', () => {
    paused = !paused;
    btnPause.textContent = paused ? 'Resume' : 'Pause';
    btnPause.classList.toggle('active', paused);
  });
  btnReset.addEventListener('click', () => reset());

  function reset() {
    grid.fill(EMPTY);
    next.fill(EMPTY);
    fireGrid.fill(0);
    fireGridNext.fill(0);
    stepCount = 0;
    peakFire = 0;
    totalFires = 0;
    histCounts.fill(0);
    fireHistory = new Map();
    fireIdCounter = 1;
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';

    const r = histCanvas.getBoundingClientRect();
    histCanvas.width = Math.max(1, Math.floor(r.width * dpr));
    histCanvas.height = Math.max(1, Math.floor(r.height * dpr));
  }
  window.addEventListener('resize', resize);

  const offscreen = document.createElement('canvas');
  offscreen.width = GRID;
  offscreen.height = GRID;
  const offCtx = offscreen.getContext('2d');
  const imageData = offCtx.createImageData(GRID, GRID);
  const pixels = imageData.data;

  // Union-find for merging fire ids when two fires connect
  const parent = new Map();
  function find(a) {
    let r = a;
    while (parent.has(r)) r = parent.get(r);
    // path compress
    let c = a;
    while (parent.has(c)) {
      const n = parent.get(c);
      parent.set(c, r);
      c = n;
    }
    return r;
  }
  function union(a, b) {
    const ra = find(a), rb = find(b);
    if (ra === rb) return;
    // keep smaller as root (stable)
    if (ra < rb) parent.set(rb, ra);
    else parent.set(ra, rb);
  }

  function recordFire(size) {
    if (size <= 0) return;
    totalFires++;
    if (size > peakFire) peakFire = size;
    const logSize = Math.log2(size);
    const bin = Math.min(HIST_BINS - 1, Math.max(0, Math.floor(logSize * 2)));
    histCounts[bin]++;
  }

  function step() {
    parent.clear();

    // Phase 1: compute next grid + assign preliminary fire ids to new burning cells.
    // A cell that becomes BURNING inherits a parent's fire id from a currently-burning
    // neighbor. If none (lightning strike on isolated tree), it gets a new id.
    for (let y = 0; y < GRID; y++) {
      const rowStart = y * GRID;
      for (let x = 0; x < GRID; x++) {
        const i = rowStart + x;
        const c = grid[i];

        if (c === BURNING) {
          next[i] = EMPTY;
          fireGridNext[i] = 0;
        } else if (c === TREE) {
          // Check burning neighbors and pick one's fire id
          let pid = 0;
          if (x > 0) {
            const j = i - 1;
            if (grid[j] === BURNING) pid = fireGrid[j];
          }
          if (pid === 0 && x < GRID - 1) {
            const j = i + 1;
            if (grid[j] === BURNING) pid = fireGrid[j];
          }
          if (pid === 0 && y > 0) {
            const j = i - GRID;
            if (grid[j] === BURNING) pid = fireGrid[j];
          }
          if (pid === 0 && y < GRID - 1) {
            const j = i + GRID;
            if (grid[j] === BURNING) pid = fireGrid[j];
          }

          if (pid !== 0) {
            next[i] = BURNING;
            fireGridNext[i] = pid;
          } else if (Math.random() < fLight) {
            next[i] = BURNING;
            fireGridNext[i] = fireIdCounter++;
          } else {
            next[i] = TREE;
            fireGridNext[i] = 0;
          }
        } else {
          next[i] = (Math.random() < pGrow) ? TREE : EMPTY;
          fireGridNext[i] = 0;
        }
      }
    }

    // Phase 2: merge fire ids that got adjacent in next step.
    // (Two separate fires can collide through a newly-ignited cell.)
    for (let y = 0; y < GRID; y++) {
      const rowStart = y * GRID;
      for (let x = 0; x < GRID; x++) {
        const i = rowStart + x;
        const fid = fireGridNext[i];
        if (fid === 0) continue;
        if (x > 0) {
          const f2 = fireGridNext[i - 1];
          if (f2 !== 0 && f2 !== fid) union(fid, f2);
        }
        if (y > 0) {
          const f2 = fireGridNext[i - GRID];
          if (f2 !== 0 && f2 !== fid) union(fid, f2);
        }
      }
    }

    // Phase 3: canonicalize ids + count active fire sizes this step
    const activeSizes = new Map();
    for (let i = 0; i < CELLS; i++) {
      const fid = fireGridNext[i];
      if (fid === 0) continue;
      const root = parent.has(fid) ? find(fid) : fid;
      fireGridNext[i] = root;
      activeSizes.set(root, (activeSizes.get(root) || 0) + 1);
    }

    // Phase 4: merge fireHistory entries under new roots, add this step's sizes,
    // finalize entries that are no longer active.
    const newHistory = new Map();
    for (const [oldId, size] of fireHistory) {
      const root = parent.has(oldId) ? find(oldId) : oldId;
      newHistory.set(root, (newHistory.get(root) || 0) + size);
    }
    for (const [fid, sz] of activeSizes) {
      newHistory.set(fid, (newHistory.get(fid) || 0) + sz);
    }

    // Finalize dead fires (in history but not active anymore)
    fireHistory = new Map();
    for (const [fid, sz] of newHistory) {
      if (activeSizes.has(fid)) {
        fireHistory.set(fid, sz);
      } else {
        recordFire(sz);
      }
    }

    // Swap buffers
    let tmp = grid; grid = next; next = tmp;
    tmp = fireGrid; fireGrid = fireGridNext; fireGridNext = tmp;

    stepCount++;
  }

  function render() {
    let treeCount = 0, burningCount = 0;
    let p = 0;
    for (let i = 0; i < CELLS; i++) {
      const c = grid[i];
      let r, g, b;
      if (c === EMPTY) {
        r = 14; g = 14; b = 20;
      } else if (c === TREE) {
        treeCount++;
        // subtle per-cell hash texture (sage tones)
        const h = ((i * 2654435761) >>> 0) / 0xffffffff;
        const t = 0.55 + h * 0.45;
        r = 56 + (138 - 56) * t;
        g = 66 + (154 - 66) * t;
        b = 38 + (91 - 38) * t;
      } else {
        burningCount++;
        const h = Math.random();
        r = 210 + (255 - 210) * h;
        g = 110 + (210 - 110) * h;
        b = 40 + (90 - 40) * h;
      }
      pixels[p++] = r;
      pixels[p++] = g;
      pixels[p++] = b;
      pixels[p++] = 255;
    }
    offCtx.putImageData(imageData, 0, 0);

    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const scale = Math.min(canvas.width / GRID, canvas.height / GRID);
    const w = GRID * scale;
    const h = GRID * scale;
    const ox = (canvas.width - w) / 2;
    const oy = (canvas.height - h) / 2;

    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(offscreen, ox, oy, w, h);

    if (burningCount > 0) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.3;
      ctx.filter = 'blur(5px)';
      ctx.drawImage(offscreen, ox, oy, w, h);
      ctx.restore();
      ctx.filter = 'none';
    }

    statCover.textContent = (treeCount / CELLS * 100).toFixed(1) + '%';
    statBurning.textContent = burningCount;
    statPeak.textContent = peakFire.toLocaleString();
    statStep.textContent = stepCount.toLocaleString();
    histCount.textContent = totalFires.toLocaleString() + ' fires';
  }

  function drawHistogram() {
    const w = histCanvas.width;
    const h = histCanvas.height;
    if (w === 0 || h === 0) return;
    const cssW = histCanvas.getBoundingClientRect().width || 1;
    const dpr = w / cssW;

    histCtx.clearRect(0, 0, w, h);
    histCtx.fillStyle = 'rgba(0,0,0,0.35)';
    histCtx.fillRect(0, 0, w, h);

    const padL = 36 * dpr, padR = 10 * dpr, padT = 10 * dpr, padB = 22 * dpr;
    const plotW = Math.max(1, w - padL - padR);
    const plotH = Math.max(1, h - padT - padB);

    // horizontal grid lines
    histCtx.strokeStyle = 'rgba(138,154,91,0.15)';
    histCtx.lineWidth = 1;
    for (let k = 0; k <= 4; k++) {
      const gy = padT + plotH * (k / 4);
      histCtx.beginPath();
      histCtx.moveTo(padL, gy);
      histCtx.lineTo(w - padR, gy);
      histCtx.stroke();
    }

    const logged = new Array(HIST_BINS);
    let maxLog = 0;
    for (let i = 0; i < HIST_BINS; i++) {
      const c = histCounts[i];
      logged[i] = c > 0 ? Math.log2(c) + 1 : 0; // +1 so single-count bins are visible
      if (logged[i] > maxLog) maxLog = logged[i];
    }
    if (maxLog < 2) maxLog = 2;

    const binW = plotW / HIST_BINS;

    // bars
    histCtx.fillStyle = 'rgba(188, 108, 37, 0.85)';
    for (let i = 0; i < HIST_BINS; i++) {
      if (logged[i] <= 0) continue;
      const bh = (logged[i] / maxLog) * plotH;
      const bx = padL + i * binW;
      const by = padT + plotH - bh;
      histCtx.fillRect(bx + 0.5, by, Math.max(1, binW - 1), bh);
    }

    // power-law linear regression in log-log space
    const pts = [];
    for (let i = 0; i < HIST_BINS; i++) {
      if (histCounts[i] > 1) {
        pts.push([i * 0.5, Math.log2(histCounts[i])]);
      }
    }
    let slope = null;
    if (pts.length >= 3) {
      let sx = 0, sy = 0, sxy = 0, sxx = 0; const n = pts.length;
      for (const [x, y] of pts) { sx += x; sy += y; sxy += x*y; sxx += x*x; }
      const denom = n * sxx - sx * sx;
      if (Math.abs(denom) > 1e-9) {
        slope = (n * sxy - sx * sy) / denom;
        const intercept = (sy - slope * sx) / n;

        const xMin = 0, xMax = (HIST_BINS - 1) * 0.5;
        const toX = (x) => padL + (x / xMax) * plotW;
        const toY = (y) => {
          const v = y + 1; // matches +1 offset above
          const clamped = Math.max(0, Math.min(maxLog, v));
          return padT + plotH - (clamped / maxLog) * plotH;
        };

        histCtx.strokeStyle = 'rgba(221, 161, 94, 0.95)';
        histCtx.lineWidth = 1.5 * dpr;
        histCtx.setLineDash([4 * dpr, 3 * dpr]);
        histCtx.beginPath();
        histCtx.moveTo(toX(xMin), toY(intercept + slope * xMin));
        histCtx.lineTo(toX(xMax), toY(intercept + slope * xMax));
        histCtx.stroke();
        histCtx.setLineDash([]);
      }
    }

    histCtx.fillStyle = 'rgba(221, 161, 94, 0.95)';
    histCtx.font = (10 * dpr) + 'px Nunito, sans-serif';
    histCtx.textAlign = 'left';
    if (slope !== null) {
      histCtx.fillText('slope ≈ ' + slope.toFixed(2), padL + 6 * dpr, padT + 12 * dpr);
    }

    // axis labels: log2 size markers at bin indexes 2, 8, 16, 24, 32 => sizes 2, 16, 256, 4K, 64K
    histCtx.fillStyle = 'rgba(232, 230, 213, 0.55)';
    histCtx.font = (9 * dpr) + 'px Nunito, sans-serif';
    histCtx.textAlign = 'center';
    const labelAt = (binIdx, text) => {
      const x = padL + (binIdx / HIST_BINS) * plotW + binW / 2;
      histCtx.fillText(text, x, padT + plotH + 12 * dpr);
    };
    labelAt(0, '1');
    labelAt(8, '16');
    labelAt(16, '256');
    labelAt(24, '4K');
    labelAt(32, '64K');

    histCtx.save();
    histCtx.translate(10 * dpr, padT + plotH / 2);
    histCtx.rotate(-Math.PI / 2);
    histCtx.textAlign = 'center';
    histCtx.fillStyle = 'rgba(232, 230, 213, 0.55)';
    histCtx.fillText('log₂ count', 0, 0);
    histCtx.restore();

    histCtx.textAlign = 'center';
    histCtx.fillText('fire size (log₂)', padL + plotW / 2, h - 4 * dpr);
  }

  function loop() {
    if (!paused) step();
    render();
    drawHistogram();
    requestAnimationFrame(loop);
  }

  // Init
  pGrow = (+pSlider.value) / 1000;
  fLight = (+fSlider.value) / 1000000;
  updateLabels();
  resize();
  reset();
  loop();
})();
</script>

</body>
</html>
