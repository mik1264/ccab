<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couzin Schooling — Complex Adaptive Systems</title>
<style>
  :root {
    --sage: #8A9A5B;
    --moss: #606C38;
    --earth: #DDA15E;
    --cream: #FEFAE0;
    --terracotta: #BC6C25;
    --dark-moss: #3d4423;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0f;
    font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    color: var(--cream);
  }
  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
  }

  /* Organic back-link */
  .organic-back-link {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(254, 250, 224, 0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(138, 154, 91, 0.35);
    border-radius: 30px 20px 30px 20px;
    color: var(--cream);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .organic-back-link:hover {
    background: rgba(138, 154, 91, 0.2);
    transform: translateX(-4px);
    border-radius: 20px 30px 20px 30px;
  }
  .back-arrow { font-size: 16px; color: var(--sage); }

  .title-card {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10;
    padding: 14px 22px;
    background: rgba(10, 10, 15, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(221, 161, 94, 0.3);
    border-radius: 18px 28px 18px 28px;
    text-align: right;
    max-width: 280px;
  }
  .title-card h1 {
    font-family: 'Lora', 'Georgia', serif;
    font-weight: 600;
    font-size: 18px;
    color: var(--earth);
    letter-spacing: 0.02em;
  }
  .title-card p {
    margin-top: 4px;
    font-size: 11px;
    color: rgba(254, 250, 224, 0.6);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .panel {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 10;
    padding: 18px 20px;
    width: 300px;
    background: rgba(10, 10, 15, 0.65);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(138, 154, 91, 0.28);
    border-radius: 22px;
    font-size: 12px;
  }
  .panel h2 {
    font-family: 'Lora', serif;
    font-size: 14px;
    color: var(--sage);
    margin-bottom: 12px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .row {
    display: grid;
    grid-template-columns: 100px 1fr 42px;
    gap: 8px;
    align-items: center;
    margin-bottom: 9px;
  }
  .row label {
    color: rgba(254, 250, 224, 0.75);
    font-size: 11px;
  }
  .row .val {
    text-align: right;
    color: var(--earth);
    font-variant-numeric: tabular-nums;
    font-size: 11px;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(138, 154, 91, 0.2);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 13px;
    height: 13px;
    background: var(--sage);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--cream);
    transition: background 0.2s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { background: var(--earth); }
  input[type="range"]::-moz-range-thumb {
    width: 13px;
    height: 13px;
    background: var(--sage);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--cream);
  }

  .preset-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px dashed rgba(138, 154, 91, 0.2);
  }
  .preset-row label {
    font-size: 11px;
    color: rgba(254, 250, 224, 0.75);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  select {
    flex: 1;
    background: rgba(138, 154, 91, 0.14);
    border: 1px solid rgba(138, 154, 91, 0.35);
    border-radius: 8px;
    padding: 5px 8px;
    color: var(--cream);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    outline: none;
  }
  select:hover { background: rgba(138, 154, 91, 0.24); }

  .stats-panel {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10;
    padding: 16px 20px;
    background: rgba(10, 10, 15, 0.65);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(221, 161, 94, 0.28);
    border-radius: 22px;
    min-width: 180px;
  }
  .stats-panel h2 {
    font-family: 'Lora', serif;
    font-size: 13px;
    color: var(--earth);
    margin-bottom: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
    font-size: 11px;
  }
  .stat-row .k {
    color: rgba(254, 250, 224, 0.65);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .stat-row .v {
    color: var(--sage);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .bar {
    height: 3px;
    background: rgba(138, 154, 91, 0.15);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 2px;
    margin-bottom: 8px;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage), var(--earth));
    transition: width 0.1s linear;
  }

  @media (max-width: 720px) {
    .panel { width: calc(100vw - 40px); max-width: 320px; }
    .stats-panel { display: none; }
    .title-card { max-width: 180px; }
    .title-card h1 { font-size: 14px; }
  }
</style>
</head>
<body>

<a href="index.html" class="organic-back-link">
  <span class="back-arrow">←</span>
  <span class="back-text">Gallery</span>
</a>

<div class="title-card">
  <h1>Couzin Fish Schooling</h1>
  <p>Zones of Repulsion · Orientation · Attraction</p>
</div>

<canvas id="c"></canvas>

<div class="panel">
  <h2>Zones & Motion</h2>
  <div class="preset-row">
    <label>Preset</label>
    <select id="preset">
      <option value="torus">Torus (donut)</option>
      <option value="swarm">Swarm</option>
      <option value="parallel">Parallel</option>
      <option value="dynamic">Dynamic parallel</option>
    </select>
  </div>
  <div class="row">
    <label>r_repulsion</label>
    <input type="range" id="rr" min="1" max="20" step="0.5" value="4">
    <span class="val" id="rr-val">4.0</span>
  </div>
  <div class="row">
    <label>r_orientation</label>
    <input type="range" id="ro" min="0" max="40" step="0.5" value="7">
    <span class="val" id="ro-val">7.0</span>
  </div>
  <div class="row">
    <label>r_attraction</label>
    <input type="range" id="ra" min="5" max="80" step="1" value="40">
    <span class="val" id="ra-val">40</span>
  </div>
  <div class="row">
    <label>blind spot</label>
    <input type="range" id="bs" min="0" max="180" step="5" value="50">
    <span class="val" id="bs-val">50°</span>
  </div>
  <div class="row">
    <label>speed</label>
    <input type="range" id="sp" min="0.4" max="3.5" step="0.05" value="1.4">
    <span class="val" id="sp-val">1.40</span>
  </div>
</div>

<div class="stats-panel">
  <h2>Collective State</h2>
  <div class="stat-row"><span class="k">Polarization</span><span class="v" id="pol-v">0.00</span></div>
  <div class="bar"><div class="bar-fill" id="pol-bar" style="width:0%"></div></div>
  <div class="stat-row"><span class="k">Ang. momentum</span><span class="v" id="am-v">0.00</span></div>
  <div class="bar"><div class="bar-fill" id="am-bar" style="width:0%"></div></div>
  <div class="stat-row"><span class="k">State</span><span class="v" id="state-v">—</span></div>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0, DPR = 1;
  let trailCanvas, trailCtx;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    trailCanvas = document.createElement('canvas');
    trailCanvas.width = W * DPR;
    trailCanvas.height = H * DPR;
    trailCtx = trailCanvas.getContext('2d');
    trailCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // Simulation parameters
  const params = {
    rr: 4,    // repulsion radius
    ro: 7,    // orientation radius (inner boundary = rr, outer = rr+ro)
    ra: 40,   // attraction radius (outer boundary = rr+ro+ra)
    blindDeg: 50, // half-angle of blind spot behind each fish (degrees)
    speed: 1.4,
    turnRate: 0.12,   // how quickly fish align to desired heading (radians/step-ish)
    noise: 0.04,      // small random heading perturbation
  };

  const presets = {
    torus:    { rr: 3,  ro: 0,  ra: 40, blindDeg: 50, speed: 1.3, turnRate: 0.09 },
    swarm:    { rr: 3,  ro: 0,  ra: 14, blindDeg: 50, speed: 1.0, turnRate: 0.08 },
    parallel: { rr: 2,  ro: 30, ra: 60, blindDeg: 50, speed: 1.6, turnRate: 0.18 },
    dynamic:  { rr: 3,  ro: 10, ra: 45, blindDeg: 50, speed: 1.5, turnRate: 0.12 },
  };

  // Number of fish responsive to viewport area
  const area = W * H;
  const N = Math.max(220, Math.min(480, Math.round(area / 3500)));

  // Fish state
  const fish = [];
  function initFish() {
    fish.length = 0;
    const cx = W / 2, cy = H / 2;
    for (let i = 0; i < N; i++) {
      const r = 80 + Math.random() * 120;
      const a = Math.random() * Math.PI * 2;
      fish.push({
        x: cx + Math.cos(a) * r,
        y: cy + Math.sin(a) * r,
        vx: -Math.sin(a),
        vy:  Math.cos(a),
        theta: a + Math.PI / 2, // facing tangent to circle -> biases toward torus
      });
    }
  }
  initFish();

  // ---- Spatial hash grid for neighbor queries ----
  let cellSize = 48;
  let cols = 1, rows = 1;
  let grid = [];

  function rebuildGrid() {
    const outer = params.rr + params.ro + params.ra;
    cellSize = Math.max(24, outer);
    cols = Math.max(1, Math.ceil(W / cellSize));
    rows = Math.max(1, Math.ceil(H / cellSize));
    grid = new Array(cols * rows);
    for (let i = 0; i < grid.length; i++) grid[i] = [];
    for (let i = 0; i < fish.length; i++) {
      const f = fish[i];
      const cx = Math.floor(f.x / cellSize);
      const cy = Math.floor(f.y / cellSize);
      const col = ((cx % cols) + cols) % cols;
      const row = ((cy % rows) + rows) % rows;
      grid[row * cols + col].push(i);
    }
  }

  function wrap(v, max) {
    if (v < 0) return v + max;
    if (v >= max) return v - max;
    return v;
  }

  // Metrics
  let polarization = 0;
  let angMomentum = 0;
  let stateLabel = '—';

  function step() {
    rebuildGrid();

    const rrSq = params.rr * params.rr;
    const innerOri = params.rr;
    const outerOri = params.rr + params.ro;
    const outerAtt = params.rr + params.ro + params.ra;
    const oriSq = outerOri * outerOri;
    const attSq = outerAtt * outerAtt;
    const blindCos = Math.cos((Math.PI - (params.blindDeg * Math.PI / 180)));
    // If blind half-angle is β (behind), then a neighbor is visible when
    // angle between heading and vector to neighbor < (π - β). Using cos:
    // dot(headingUnit, toNeighUnit) > cos(π - β)

    const cellReach = Math.ceil(outerAtt / cellSize);

    for (let i = 0; i < fish.length; i++) {
      const f = fish[i];
      const hx = Math.cos(f.theta);
      const hy = Math.sin(f.theta);

      let repX = 0, repY = 0, repN = 0;
      let oriX = 0, oriY = 0, oriN = 0;
      let attX = 0, attY = 0, attN = 0;

      const fcx = Math.floor(f.x / cellSize);
      const fcy = Math.floor(f.y / cellSize);

      for (let dy = -cellReach; dy <= cellReach; dy++) {
        for (let dx = -cellReach; dx <= cellReach; dx++) {
          const col = ((fcx + dx) % cols + cols) % cols;
          const row = ((fcy + dy) % rows + rows) % rows;
          const bucket = grid[row * cols + col];
          for (let b = 0; b < bucket.length; b++) {
            const j = bucket[b];
            if (j === i) continue;
            const g = fish[j];

            // toroidal wrap-aware delta
            let ddx = g.x - f.x;
            let ddy = g.y - f.y;
            if (ddx >  W * 0.5) ddx -= W;
            if (ddx < -W * 0.5) ddx += W;
            if (ddy >  H * 0.5) ddy -= H;
            if (ddy < -H * 0.5) ddy += H;

            const d2 = ddx * ddx + ddy * ddy;
            if (d2 > attSq || d2 < 1e-6) continue;

            // blind-spot check using unit vectors
            const invD = 1 / Math.sqrt(d2);
            const ux = ddx * invD;
            const uy = ddy * invD;
            const dotHead = hx * ux + hy * uy;
            if (dotHead < blindCos) continue; // in blind zone

            if (d2 < rrSq) {
              // repulsion: move away from neighbor
              repX -= ux;
              repY -= uy;
              repN++;
            } else if (d2 < oriSq) {
              // orientation: align heading with neighbor
              oriX += Math.cos(g.theta);
              oriY += Math.sin(g.theta);
              oriN++;
            } else {
              // attraction: move toward neighbor
              attX += ux;
              attY += uy;
              attN++;
            }
          }
        }
      }

      // Desired heading from combined rules
      // Priority: repulsion dominates if any; otherwise mix orientation + attraction
      let desX, desY;
      if (repN > 0) {
        desX = repX; desY = repY;
      } else {
        desX = oriX + attX;
        desY = oriY + attY;
        if (oriN === 0 && attN === 0) {
          desX = hx; desY = hy; // keep current heading
        }
      }

      const dLen = Math.hypot(desX, desY);
      let desired;
      if (dLen > 1e-6) {
        desired = Math.atan2(desY / dLen, desX / dLen);
      } else {
        desired = f.theta;
      }

      // Smooth turn toward desired heading, capped by turnRate
      let diff = desired - f.theta;
      while (diff >  Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      const maxTurn = params.turnRate;
      if (diff >  maxTurn) diff =  maxTurn;
      if (diff < -maxTurn) diff = -maxTurn;
      f.theta += diff + (Math.random() - 0.5) * params.noise;

      // Move
      f.vx = Math.cos(f.theta) * params.speed;
      f.vy = Math.sin(f.theta) * params.speed;
      f.x = wrap(f.x + f.vx, W);
      f.y = wrap(f.y + f.vy, H);
    }

    // Metrics: polarization and angular momentum (around centroid)
    let sumVx = 0, sumVy = 0, cx = 0, cy = 0;
    for (let i = 0; i < fish.length; i++) {
      sumVx += Math.cos(fish[i].theta);
      sumVy += Math.sin(fish[i].theta);
      cx += fish[i].x;
      cy += fish[i].y;
    }
    cx /= fish.length; cy /= fish.length;
    polarization = Math.hypot(sumVx, sumVy) / fish.length;

    let am = 0;
    for (let i = 0; i < fish.length; i++) {
      const f = fish[i];
      // wrap-aware r
      let rx = f.x - cx, ry = f.y - cy;
      if (rx >  W * 0.5) rx -= W;
      if (rx < -W * 0.5) rx += W;
      if (ry >  H * 0.5) ry -= H;
      if (ry < -H * 0.5) ry += H;
      const rLen = Math.hypot(rx, ry);
      if (rLen < 1e-6) continue;
      const cross = (rx * Math.sin(f.theta) - ry * Math.cos(f.theta)) / rLen;
      am += cross;
    }
    angMomentum = Math.abs(am) / fish.length;

    // classify
    if (polarization > 0.65) stateLabel = 'parallel';
    else if (angMomentum > 0.55) stateLabel = 'torus';
    else if (polarization < 0.25 && angMomentum < 0.35) stateLabel = 'swarm';
    else stateLabel = 'dynamic';
  }

  function draw() {
    // Subtle trails: fade the trail canvas each frame
    trailCtx.fillStyle = 'rgba(10, 10, 15, 0.14)';
    trailCtx.fillRect(0, 0, W, H);

    // Main canvas: deep dark background
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, W, H);

    // Draw trail points for each fish
    trailCtx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < fish.length; i++) {
      const f = fish[i];
      trailCtx.fillStyle = 'rgba(138, 154, 91, 0.22)';
      trailCtx.beginPath();
      trailCtx.arc(f.x, f.y, 1.1, 0, Math.PI * 2);
      trailCtx.fill();
    }
    trailCtx.globalCompositeOperation = 'source-over';

    // Composite trails to main
    ctx.drawImage(trailCanvas, 0, 0, W, H);

    // Draw fish as small triangles oriented by heading
    for (let i = 0; i < fish.length; i++) {
      const f = fish[i];
      const cos = Math.cos(f.theta);
      const sin = Math.sin(f.theta);
      const len = 5.5;
      const w = 2.4;

      // Tip
      const tx = f.x + cos * len;
      const ty = f.y + sin * len;
      // Rear-left & rear-right
      const blx = f.x - cos * (len * 0.5) - sin * w;
      const bly = f.y - sin * (len * 0.5) + cos * w;
      const brx = f.x - cos * (len * 0.5) + sin * w;
      const bry = f.y - sin * (len * 0.5) - cos * w;

      // Color: alternate subtle sage/earth by heading to give shimmer
      const tint = (Math.sin(f.theta * 2 + i * 0.37) + 1) * 0.5;
      const r = Math.round(138 + (221 - 138) * tint * 0.5);
      const g = Math.round(154 + (161 - 154) * tint * 0.5);
      const b = Math.round( 91 + ( 94 -  91) * tint * 0.5);

      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(blx, bly);
      ctx.lineTo(brx, bry);
      ctx.closePath();
      ctx.fillStyle = `rgba(${r},${g},${b},0.92)`;
      ctx.fill();
    }
  }

  function updateStatsUI() {
    const polPct = Math.min(100, polarization * 100);
    const amPct = Math.min(100, angMomentum * 100);
    polVEl.textContent = polarization.toFixed(2);
    amVEl.textContent  = angMomentum.toFixed(2);
    polBarEl.style.width = polPct + '%';
    amBarEl.style.width  = amPct + '%';
    stateVEl.textContent = stateLabel;
  }

  // ---- UI bindings ----
  const $ = id => document.getElementById(id);
  const rr = $('rr'), ro = $('ro'), ra = $('ra'), bs = $('bs'), sp = $('sp');
  const rrV = $('rr-val'), roV = $('ro-val'), raV = $('ra-val'), bsV = $('bs-val'), spV = $('sp-val');
  const presetEl = $('preset');
  const polVEl = $('pol-v'), amVEl = $('am-v');
  const polBarEl = $('pol-bar'), amBarEl = $('am-bar');
  const stateVEl = $('state-v');

  function syncInputsFromParams() {
    rr.value = params.rr; rrV.textContent = params.rr.toFixed(1);
    ro.value = params.ro; roV.textContent = params.ro.toFixed(1);
    ra.value = params.ra; raV.textContent = params.ra.toFixed(0);
    bs.value = params.blindDeg; bsV.textContent = params.blindDeg + '°';
    sp.value = params.speed; spV.textContent = params.speed.toFixed(2);
  }

  function applyPreset(name) {
    const p = presets[name];
    if (!p) return;
    Object.assign(params, p);
    syncInputsFromParams();
  }
  applyPreset('torus');

  rr.addEventListener('input', () => { params.rr = +rr.value; rrV.textContent = (+rr.value).toFixed(1); });
  ro.addEventListener('input', () => { params.ro = +ro.value; roV.textContent = (+ro.value).toFixed(1); });
  ra.addEventListener('input', () => { params.ra = +ra.value; raV.textContent = (+ra.value).toFixed(0); });
  bs.addEventListener('input', () => { params.blindDeg = +bs.value; bsV.textContent = bs.value + '°'; });
  sp.addEventListener('input', () => { params.speed = +sp.value; spV.textContent = (+sp.value).toFixed(2); });
  presetEl.addEventListener('change', e => applyPreset(e.target.value));

  // ---- Main loop ----
  let frame = 0;
  function loop() {
    step();
    draw();
    if ((frame++ & 3) === 0) updateStatsUI();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
