<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Distribution — Complex Adaptive Systems</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #0a0a0f;
        color: #e8e8ec;
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
    }

    .organic-back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(138, 154, 91, 0.15);
        border: 1px solid rgba(138, 154, 91, 0.4);
        border-radius: 50px;
        color: #8A9A5B;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        backdrop-filter: blur(10px);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1000;
    }

    .organic-back-link:hover {
        background: rgba(138, 154, 91, 0.25);
        transform: translateX(-3px);
    }

    .back-arrow { font-size: 18px; }

    .title {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Lora', Georgia, serif;
        font-size: 22px;
        font-weight: 500;
        color: #DDA15E;
        letter-spacing: 1px;
        z-index: 100;
        pointer-events: none;
    }

    .container {
        display: flex;
        width: 100vw;
        height: 100vh;
    }

    .panel {
        flex: 1;
        position: relative;
        overflow: hidden;
    }

    .panel-left { border-right: 1px solid rgba(255, 255, 255, 0.08); }

    canvas { display: block; width: 100%; height: 100%; }

    .panel-label {
        position: absolute;
        top: 70px;
        left: 20px;
        font-family: 'Lora', serif;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 1px;
        text-transform: uppercase;
        pointer-events: none;
    }

    .controls {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 18px;
        align-items: center;
        padding: 14px 22px;
        background: rgba(20, 20, 28, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 50px;
        backdrop-filter: blur(10px);
        z-index: 100;
        flex-wrap: wrap;
        max-width: calc(100vw - 40px);
        justify-content: center;
    }

    .control-group {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 90px;
    }

    .control-group label {
        font-size: 10px;
        color: rgba(221, 161, 94, 0.8);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .control-group input[type="range"] {
        width: 100%;
        accent-color: #8A9A5B;
    }

    .control-value {
        font-size: 11px;
        color: #e8e8ec;
        font-family: 'Menlo', monospace;
    }

    button {
        background: rgba(188, 108, 37, 0.2);
        color: #DDA15E;
        border: 1px solid rgba(188, 108, 37, 0.5);
        padding: 8px 16px;
        border-radius: 50px;
        cursor: pointer;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        transition: all 0.25s;
    }

    button:hover {
        background: rgba(188, 108, 37, 0.35);
        color: #FEFAE0;
    }

    .stats {
        position: fixed;
        top: 70px;
        right: 20px;
        background: rgba(20, 20, 28, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 14px 18px;
        backdrop-filter: blur(10px);
        font-family: 'Menlo', monospace;
        font-size: 12px;
        z-index: 100;
        min-width: 180px;
    }

    .stat-row {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding: 3px 0;
    }

    .stat-label {
        color: rgba(255, 255, 255, 0.55);
    }

    .stat-value {
        color: #8A9A5B;
        font-weight: 600;
    }

    .legend {
        position: fixed;
        bottom: 90px;
        left: 20px;
        background: rgba(20, 20, 28, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 10px 14px;
        backdrop-filter: blur(10px);
        font-size: 11px;
        z-index: 100;
    }

    .legend-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 2px 0;
    }

    .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
    }
</style>
</head>
<body>

<a href="index.html" class="organic-back-link">
    <span class="back-arrow">&#8592;</span>
    <span class="back-text">Gallery</span>
</a>

<div class="title">Wealth Distribution</div>

<div class="container">
    <div class="panel panel-left">
        <div class="panel-label">Agent Society</div>
        <canvas id="agentCanvas"></canvas>
    </div>
    <div class="panel panel-right">
        <div class="panel-label">Wealth Distribution</div>
        <canvas id="distCanvas"></canvas>
    </div>
</div>

<div class="stats" id="stats">
    <div class="stat-row"><span class="stat-label">Gini</span><span class="stat-value" id="statGini">0.000</span></div>
    <div class="stat-row"><span class="stat-label">Top 1%</span><span class="stat-value" id="statTop1">0.0%</span></div>
    <div class="stat-row"><span class="stat-label">Top 10%</span><span class="stat-value" id="statTop10">0.0%</span></div>
    <div class="stat-row"><span class="stat-label">Time</span><span class="stat-value" id="statTime">0.00</span></div>
    <div class="stat-row"><span class="stat-label">Max/Mean</span><span class="stat-value" id="statMaxMean">1.00</span></div>
</div>

<div class="legend">
    <div class="legend-row"><span class="legend-dot" style="background:#BC6C25"></span>Poor (bottom 33%)</div>
    <div class="legend-row"><span class="legend-dot" style="background:#DDA15E"></span>Middle (33-90%)</div>
    <div class="legend-row"><span class="legend-dot" style="background:#8A9A5B"></span>Rich (top 10%)</div>
</div>

<div class="controls">
    <div class="control-group">
        <label>Agents: <span class="control-value" id="valN">500</span></label>
        <input type="range" id="ctrlN" min="50" max="2000" step="50" value="500">
    </div>
    <div class="control-group">
        <label>Volatility &sigma;: <span class="control-value" id="valSigma">0.10</span></label>
        <input type="range" id="ctrlSigma" min="0.01" max="0.30" step="0.01" value="0.10">
    </div>
    <div class="control-group">
        <label>Trade J: <span class="control-value" id="valJ">0.05</span></label>
        <input type="range" id="ctrlJ" min="0.00" max="0.30" step="0.005" value="0.05">
    </div>
    <div class="control-group">
        <label>Speed: <span class="control-value" id="valSpeed">1.0</span></label>
        <input type="range" id="ctrlSpeed" min="0.1" max="5" step="0.1" value="1.0">
    </div>
    <div class="control-group">
        <label>Seed: <span class="control-value" id="valSeed">42</span></label>
        <input type="range" id="ctrlSeed" min="1" max="9999" step="1" value="42">
    </div>
    <button id="btnReset">Reset</button>
    <button id="btnPause">Pause</button>
</div>

<script>
(function() {
    'use strict';

    const agentCanvas = document.getElementById('agentCanvas');
    const distCanvas = document.getElementById('distCanvas');
    const actx = agentCanvas.getContext('2d');
    const dctx = distCanvas.getContext('2d');

    // Controls
    const ctrlN = document.getElementById('ctrlN');
    const ctrlSigma = document.getElementById('ctrlSigma');
    const ctrlJ = document.getElementById('ctrlJ');
    const ctrlSpeed = document.getElementById('ctrlSpeed');
    const ctrlSeed = document.getElementById('ctrlSeed');
    const valN = document.getElementById('valN');
    const valSigma = document.getElementById('valSigma');
    const valJ = document.getElementById('valJ');
    const valSpeed = document.getElementById('valSpeed');
    const valSeed = document.getElementById('valSeed');
    const btnReset = document.getElementById('btnReset');
    const btnPause = document.getElementById('btnPause');

    // Stats elements
    const statGini = document.getElementById('statGini');
    const statTop1 = document.getElementById('statTop1');
    const statTop10 = document.getElementById('statTop10');
    const statTime = document.getElementById('statTime');
    const statMaxMean = document.getElementById('statMaxMean');

    // Colors
    const COL_POOR = '#BC6C25';
    const COL_MID = '#DDA15E';
    const COL_RICH = '#8A9A5B';

    // State
    let N = 500;
    let sigma = 0.10;
    let J = 0.05;
    let speed = 1.0;
    let seed = 42;
    let paused = false;
    let simTime = 0;

    let wealth = [];
    let posX = [];
    let posY = [];

    // Seeded RNG (mulberry32)
    let rngState = 42;
    function seedRng(s) { rngState = s | 0; if (rngState === 0) rngState = 1; }
    function rand() {
        rngState |= 0; rngState = (rngState + 0x6D2B79F5) | 0;
        let t = rngState;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    // Box-Muller normal
    function randn() {
        let u = 0, v = 0;
        while (u === 0) u = rand();
        while (v === 0) v = rand();
        return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    }

    // Canvas sizing with devicePixelRatio
    function sizeCanvas(canvas, ctx) {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function resize() {
        sizeCanvas(agentCanvas, actx);
        sizeCanvas(distCanvas, dctx);
    }
    window.addEventListener('resize', resize);

    function init() {
        N = parseInt(ctrlN.value);
        seed = parseInt(ctrlSeed.value);
        seedRng(seed);

        wealth = new Array(N);
        posX = new Array(N);
        posY = new Array(N);

        for (let i = 0; i < N; i++) {
            wealth[i] = 1.0;
            // Random fixed positions in a circle-ish area
            let u = rand(), v = rand();
            posX[i] = 0.05 + 0.9 * u;
            posY[i] = 0.05 + 0.9 * v;
        }
        simTime = 0;
        resize();
    }

    // Simulation step: Bouchaud-Mézard equation with Euler-Maruyama
    // dw_i = sigma * w_i * dW + J * (mean_w - w_i) dt
    function step(dt) {
        let sum = 0;
        for (let i = 0; i < N; i++) sum += wealth[i];
        const mean = sum / N;

        const sdt = Math.sqrt(dt);
        for (let i = 0; i < N; i++) {
            const w = wealth[i];
            const drift = J * (mean - w) * dt;
            const diff = sigma * w * sdt * randn();
            let nw = w + drift + diff;
            if (nw < 1e-6) nw = 1e-6;
            wealth[i] = nw;
        }

        // Renormalize so total wealth stays ~ N (prevents unbounded drift)
        let sum2 = 0;
        for (let i = 0; i < N; i++) sum2 += wealth[i];
        const factor = N / sum2;
        for (let i = 0; i < N; i++) wealth[i] *= factor;

        simTime += dt;
    }

    function computeStats(sorted) {
        // sorted: ascending
        const n = sorted.length;
        let total = 0;
        for (let i = 0; i < n; i++) total += sorted[i];

        // Gini via sorted formula: G = (2 * sum(i * x_i) / (n * sum(x_i))) - (n+1)/n
        let weightedSum = 0;
        for (let i = 0; i < n; i++) weightedSum += (i + 1) * sorted[i];
        const gini = (2 * weightedSum) / (n * total) - (n + 1) / n;

        // Top 1% share
        const top1Count = Math.max(1, Math.floor(n * 0.01));
        let top1Sum = 0;
        for (let i = n - top1Count; i < n; i++) top1Sum += sorted[i];
        const top1Share = top1Sum / total;

        // Top 10%
        const top10Count = Math.max(1, Math.floor(n * 0.10));
        let top10Sum = 0;
        for (let i = n - top10Count; i < n; i++) top10Sum += sorted[i];
        const top10Share = top10Sum / total;

        const maxW = sorted[n - 1];
        const meanW = total / n;

        return { gini, top1Share, top10Share, maxW, meanW, total };
    }

    function colorForQuantile(q) {
        if (q < 0.33) return COL_POOR;
        if (q < 0.90) return COL_MID;
        return COL_RICH;
    }

    // Drawing agents panel
    function drawAgents(sortedIndices, wealthRanks, stats) {
        const rect = agentCanvas.getBoundingClientRect();
        const W = rect.width, H = rect.height;
        actx.fillStyle = '#0a0a0f';
        actx.fillRect(0, 0, W, H);

        // Subtle grid
        actx.strokeStyle = 'rgba(255,255,255,0.03)';
        actx.lineWidth = 1;
        const gridSteps = 10;
        for (let i = 1; i < gridSteps; i++) {
            const x = i / gridSteps * W;
            const y = i / gridSteps * H;
            actx.beginPath(); actx.moveTo(x, 0); actx.lineTo(x, H); actx.stroke();
            actx.beginPath(); actx.moveTo(0, y); actx.lineTo(W, y); actx.stroke();
        }

        const maxW = stats.maxW;
        const meanW = stats.meanW;
        // Radius scaled by sqrt(wealth/mean)
        const baseR = Math.min(W, H) * 0.006;

        // Draw from poor (background) to rich (foreground)
        for (let k = 0; k < N; k++) {
            const i = sortedIndices[k];
            const q = wealthRanks[i] / (N - 1 || 1);
            const w = wealth[i];
            const r = baseR * (1 + 2.2 * Math.sqrt(w / meanW));
            const x = posX[i] * W;
            const y = posY[i] * H;
            const col = colorForQuantile(q);

            actx.beginPath();
            actx.fillStyle = col;
            actx.globalAlpha = q < 0.33 ? 0.55 : (q < 0.90 ? 0.75 : 0.95);
            actx.arc(x, y, r, 0, Math.PI * 2);
            actx.fill();

            // Glow for top 1%
            if (q >= 0.99) {
                actx.globalAlpha = 0.25;
                actx.beginPath();
                actx.arc(x, y, r * 2.5, 0, Math.PI * 2);
                actx.fill();
            }
        }
        actx.globalAlpha = 1;
    }

    // Drawing distribution panel: log-log histogram + Lorenz + Gini text
    function drawDistribution(sorted, stats) {
        const rect = distCanvas.getBoundingClientRect();
        const W = rect.width, H = rect.height;
        dctx.fillStyle = '#0a0a0f';
        dctx.fillRect(0, 0, W, H);

        const margin = { top: 40, right: 30, bottom: 40, left: 50 };

        // Split vertically: top half = log-log histogram, bottom half = Lorenz
        const histTop = margin.top;
        const histH = (H - margin.top - margin.bottom) * 0.55 - 20;
        const histLeft = margin.left;
        const histW = W - margin.left - margin.right;

        const lorenzTop = histTop + histH + 50;
        const lorenzH = H - lorenzTop - margin.bottom;
        const lorenzLeft = margin.left;
        const lorenzW = Math.min(lorenzH, histW);

        // --- Log-log histogram ---
        // Build log-binned histogram
        const minW = Math.max(1e-4, sorted[0]);
        const maxW = sorted[sorted.length - 1];
        const logMin = Math.log10(minW);
        const logMax = Math.log10(maxW);
        const nBins = 30;
        const binW = (logMax - logMin) / nBins || 1;
        const bins = new Array(nBins).fill(0);
        for (let i = 0; i < sorted.length; i++) {
            const lw = Math.log10(Math.max(1e-6, sorted[i]));
            let b = Math.floor((lw - logMin) / binW);
            if (b < 0) b = 0; if (b >= nBins) b = nBins - 1;
            bins[b]++;
        }
        let maxCount = 1;
        for (let i = 0; i < nBins; i++) if (bins[i] > maxCount) maxCount = bins[i];
        const logMaxCount = Math.log10(maxCount);

        // Title for histogram
        dctx.fillStyle = 'rgba(255,255,255,0.7)';
        dctx.font = "12px 'Lora', serif";
        dctx.textAlign = 'left';
        dctx.fillText('Log-log Histogram (Pareto Tail)', histLeft, histTop - 10);

        // Axes
        dctx.strokeStyle = 'rgba(255,255,255,0.2)';
        dctx.lineWidth = 1;
        dctx.beginPath();
        dctx.moveTo(histLeft, histTop);
        dctx.lineTo(histLeft, histTop + histH);
        dctx.lineTo(histLeft + histW, histTop + histH);
        dctx.stroke();

        // Axis labels
        dctx.fillStyle = 'rgba(255,255,255,0.45)';
        dctx.font = "10px 'Menlo', monospace";
        dctx.textAlign = 'center';
        dctx.fillText('log10(wealth)', histLeft + histW / 2, histTop + histH + 28);
        dctx.save();
        dctx.translate(histLeft - 35, histTop + histH / 2);
        dctx.rotate(-Math.PI / 2);
        dctx.fillText('log10(count)', 0, 0);
        dctx.restore();

        // Tick labels
        dctx.textAlign = 'center';
        for (let t = 0; t <= 4; t++) {
            const xf = t / 4;
            const x = histLeft + xf * histW;
            const val = logMin + xf * (logMax - logMin);
            dctx.fillStyle = 'rgba(255,255,255,0.35)';
            dctx.fillText(val.toFixed(1), x, histTop + histH + 14);
        }
        dctx.textAlign = 'right';
        for (let t = 0; t <= 3; t++) {
            const yf = t / 3;
            const y = histTop + histH - yf * histH;
            const val = yf * logMaxCount;
            dctx.fillText(val.toFixed(1), histLeft - 5, y + 3);
        }

        // Bars
        const barW = histW / nBins;
        for (let i = 0; i < nBins; i++) {
            if (bins[i] === 0) continue;
            const h = (Math.log10(bins[i]) / (logMaxCount || 1)) * histH;
            const x = histLeft + i * barW;
            const y = histTop + histH - h;

            const binMid = logMin + (i + 0.5) * binW;
            const q = (binMid - logMin) / (logMax - logMin);
            const col = q < 0.33 ? COL_POOR : (q < 0.80 ? COL_MID : COL_RICH);

            dctx.fillStyle = col;
            dctx.globalAlpha = 0.85;
            dctx.fillRect(x + 1, y, barW - 2, h);
        }
        dctx.globalAlpha = 1;

        // Dashed reference power-law line: slope -1 (Pareto-ish) from top-left
        dctx.strokeStyle = 'rgba(254, 250, 224, 0.35)';
        dctx.setLineDash([4, 4]);
        dctx.lineWidth = 1.5;
        dctx.beginPath();
        // Line from (logMin, logMaxCount) to (logMax, 0) if slope fits, else draw diagonal
        dctx.moveTo(histLeft, histTop + histH * 0.15);
        dctx.lineTo(histLeft + histW, histTop + histH);
        dctx.stroke();
        dctx.setLineDash([]);

        dctx.fillStyle = 'rgba(254, 250, 224, 0.5)';
        dctx.font = "10px 'Menlo', monospace";
        dctx.textAlign = 'right';
        dctx.fillText('~power-law ref', histLeft + histW - 5, histTop + histH - 8);

        // --- Lorenz curve ---
        dctx.fillStyle = 'rgba(255,255,255,0.7)';
        dctx.font = "12px 'Lora', serif";
        dctx.textAlign = 'left';
        dctx.fillText('Lorenz Curve — Gini: ' + stats.gini.toFixed(3), lorenzLeft, lorenzTop - 10);

        // Axes
        dctx.strokeStyle = 'rgba(255,255,255,0.2)';
        dctx.beginPath();
        dctx.moveTo(lorenzLeft, lorenzTop);
        dctx.lineTo(lorenzLeft, lorenzTop + lorenzH);
        dctx.lineTo(lorenzLeft + lorenzW, lorenzTop + lorenzH);
        dctx.stroke();

        // Line of equality
        dctx.strokeStyle = 'rgba(255,255,255,0.3)';
        dctx.setLineDash([3, 3]);
        dctx.beginPath();
        dctx.moveTo(lorenzLeft, lorenzTop + lorenzH);
        dctx.lineTo(lorenzLeft + lorenzW, lorenzTop);
        dctx.stroke();
        dctx.setLineDash([]);

        // Lorenz curve: cumulative share vs cumulative population
        const total = stats.total;
        dctx.strokeStyle = COL_RICH;
        dctx.lineWidth = 2.5;
        dctx.beginPath();
        let cum = 0;
        dctx.moveTo(lorenzLeft, lorenzTop + lorenzH);
        const step = Math.max(1, Math.floor(sorted.length / 200));
        for (let i = 0; i < sorted.length; i += step) {
            cum += 0;
            // recompute cumulative accurately
        }
        // Proper Lorenz build
        dctx.beginPath();
        dctx.moveTo(lorenzLeft, lorenzTop + lorenzH);
        let cumW = 0;
        const n = sorted.length;
        const sampleStep = Math.max(1, Math.floor(n / 250));
        for (let i = 0; i < n; i++) {
            cumW += sorted[i];
            if (i % sampleStep === 0 || i === n - 1) {
                const xf = (i + 1) / n;
                const yf = cumW / total;
                const x = lorenzLeft + xf * lorenzW;
                const y = lorenzTop + lorenzH - yf * lorenzH;
                dctx.lineTo(x, y);
            }
        }
        dctx.stroke();

        // Fill area between equality and Lorenz (Gini visualization)
        dctx.fillStyle = 'rgba(138, 154, 91, 0.15)';
        dctx.beginPath();
        dctx.moveTo(lorenzLeft, lorenzTop + lorenzH);
        cumW = 0;
        for (let i = 0; i < n; i++) {
            cumW += sorted[i];
            if (i % sampleStep === 0 || i === n - 1) {
                const xf = (i + 1) / n;
                const yf = cumW / total;
                const x = lorenzLeft + xf * lorenzW;
                const y = lorenzTop + lorenzH - yf * lorenzH;
                dctx.lineTo(x, y);
            }
        }
        dctx.lineTo(lorenzLeft + lorenzW, lorenzTop);
        dctx.closePath();
        dctx.fill();

        // Lorenz axis labels
        dctx.fillStyle = 'rgba(255,255,255,0.45)';
        dctx.font = "10px 'Menlo', monospace";
        dctx.textAlign = 'center';
        dctx.fillText('cumulative population', lorenzLeft + lorenzW / 2, lorenzTop + lorenzH + 28);
        dctx.textAlign = 'center';
        dctx.fillText('0', lorenzLeft, lorenzTop + lorenzH + 14);
        dctx.fillText('1', lorenzLeft + lorenzW, lorenzTop + lorenzH + 14);

        dctx.save();
        dctx.translate(lorenzLeft - 35, lorenzTop + lorenzH / 2);
        dctx.rotate(-Math.PI / 2);
        dctx.fillText('cumulative wealth', 0, 0);
        dctx.restore();
    }

    function updateStats(stats) {
        statGini.textContent = stats.gini.toFixed(3);
        statTop1.textContent = (stats.top1Share * 100).toFixed(1) + '%';
        statTop10.textContent = (stats.top10Share * 100).toFixed(1) + '%';
        statTime.textContent = simTime.toFixed(2);
        statMaxMean.textContent = (stats.maxW / stats.meanW).toFixed(2);
    }

    // Main loop
    let lastTime = performance.now();
    let accumulator = 0;
    const FIXED_DT = 0.02;

    function loop(now) {
        const frameDt = Math.min(0.1, (now - lastTime) / 1000);
        lastTime = now;

        if (!paused) {
            accumulator += frameDt * speed;
            let steps = 0;
            while (accumulator >= FIXED_DT && steps < 20) {
                step(FIXED_DT);
                accumulator -= FIXED_DT;
                steps++;
            }
        }

        // Sort wealth for stats and drawing
        const indices = new Array(N);
        for (let i = 0; i < N; i++) indices[i] = i;
        indices.sort((a, b) => wealth[a] - wealth[b]);

        const ranks = new Array(N);
        for (let k = 0; k < N; k++) ranks[indices[k]] = k;

        const sorted = new Array(N);
        for (let k = 0; k < N; k++) sorted[k] = wealth[indices[k]];

        const stats = computeStats(sorted);

        drawAgents(indices, ranks, stats);
        drawDistribution(sorted, stats);
        updateStats(stats);

        requestAnimationFrame(loop);
    }

    // Wire controls
    ctrlN.addEventListener('input', () => {
        valN.textContent = ctrlN.value;
    });
    ctrlN.addEventListener('change', () => { init(); });

    ctrlSigma.addEventListener('input', () => {
        sigma = parseFloat(ctrlSigma.value);
        valSigma.textContent = sigma.toFixed(2);
    });
    ctrlJ.addEventListener('input', () => {
        J = parseFloat(ctrlJ.value);
        valJ.textContent = J.toFixed(3);
    });
    ctrlSpeed.addEventListener('input', () => {
        speed = parseFloat(ctrlSpeed.value);
        valSpeed.textContent = speed.toFixed(1);
    });
    ctrlSeed.addEventListener('input', () => {
        valSeed.textContent = ctrlSeed.value;
    });
    ctrlSeed.addEventListener('change', () => { init(); });

    btnReset.addEventListener('click', () => { init(); });
    btnPause.addEventListener('click', () => {
        paused = !paused;
        btnPause.textContent = paused ? 'Play' : 'Pause';
    });

    // Initial setup
    sigma = parseFloat(ctrlSigma.value);
    J = parseFloat(ctrlJ.value);
    speed = parseFloat(ctrlSpeed.value);
    init();
    lastTime = performance.now();
    requestAnimationFrame(loop);
})();
</script>

</body>
</html>
