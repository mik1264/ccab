<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Majority Rule — Complex Adaptive Systems</title>
<style>
  :root {
    --bg: #0a0a0f;
    --sage: #8A9A5B;
    --terracotta: #BC6C25;
    --cream: #FEFAE0;
    --panel: rgba(20, 22, 30, 0.72);
    --border: rgba(254, 250, 224, 0.12);
    --muted: rgba(254, 250, 224, 0.6);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--cream);
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  canvas {
    display: block;
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: var(--bg);
  }

  .title {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Lora', Georgia, serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--cream);
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    z-index: 5;
    pointer-events: none;
  }

  .panel {
    position: fixed;
    top: 18px;
    right: 18px;
    width: 280px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 10;
    font-size: 13px;
  }

  .panel h2 {
    margin: 0 0 12px 0;
    font-family: 'Lora', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--sage);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .row {
    margin-bottom: 12px;
  }

  .row label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 0.03em;
  }

  .row label span.val {
    color: var(--cream);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--sage);
  }

  .seg {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.04);
    padding: 3px;
    border-radius: 8px;
  }

  .seg button {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 6px 0;
    font-size: 12px;
    font-family: inherit;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .seg button.active {
    background: var(--sage);
    color: #0a0a0f;
    font-weight: 700;
  }

  .seg button:hover:not(.active) {
    color: var(--cream);
  }

  .btn {
    width: 100%;
    background: var(--terracotta);
    border: none;
    color: var(--cream);
    padding: 9px 0;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    margin-top: 4px;
    transition: transform 0.15s ease, background 0.2s ease;
  }

  .btn:hover { background: #d07a2b; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .stats {
    position: fixed;
    bottom: 18px;
    left: 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    font-size: 12px;
    z-index: 10;
    min-width: 200px;
  }

  .stats .stat-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    line-height: 1.7;
  }

  .stats .stat-label {
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .stats .stat-val {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }

  .dot-sage { color: var(--sage); }
  .dot-terra { color: var(--terracotta); }

  .bar {
    height: 4px;
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
    background: var(--terracotta);
    display: flex;
  }

  .bar-fill {
    height: 100%;
    background: var(--sage);
    transition: width 0.15s linear;
  }

  .consensus {
    margin-top: 6px;
    font-size: 11px;
    color: var(--sage);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    min-height: 14px;
  }

  .organic-back-link {
    position: fixed;
    top: 20px;
    left: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px;
    background: rgba(254, 250, 224, 0.08);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--cream);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.04em;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 10;
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .organic-back-link:hover {
    background: rgba(254, 250, 224, 0.14);
    transform: translateY(-1px);
  }

  .back-arrow { font-size: 15px; }

  @media (max-width: 620px) {
    .panel { width: calc(100vw - 36px); top: auto; bottom: 220px; right: 18px; left: 18px; }
    .stats { min-width: 0; right: 18px; }
    .title { font-size: 17px; top: 70px; }
  }

  @import url('https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Nunito:wght@400;600;700&display=swap');
</style>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Nunito:wght@400;600;700&display=swap">
</head>
<body>
  <a href="index.html" class="organic-back-link">
    <span class="back-arrow">&larr;</span>
    <span class="back-text">Gallery</span>
  </a>

  <div class="title">Majority Rule</div>

  <canvas id="canvas"></canvas>

  <div class="panel">
    <h2>Galam Dynamics</h2>

    <div class="row">
      <label>Group size <span class="val" id="kVal">3</span></label>
      <div class="seg" id="kSeg">
        <button data-k="2">2</button>
        <button data-k="3" class="active">3</button>
        <button data-k="4">4</button>
        <button data-k="5">5</button>
      </div>
    </div>

    <div class="row">
      <label>Initial A fraction <span class="val" id="pVal">0.50</span></label>
      <input type="range" id="pSlider" min="0" max="1" step="0.01" value="0.5">
    </div>

    <div class="row">
      <label>Tie-breaking</label>
      <div class="seg" id="tieSeg">
        <button data-tie="random" class="active">Random</button>
        <button data-tie="dominance">Dominance</button>
      </div>
    </div>

    <div class="row">
      <label>Groups / tick <span class="val" id="rateVal">400</span></label>
      <input type="range" id="rateSlider" min="50" max="2000" step="50" value="400">
    </div>

    <button class="btn" id="resetBtn">Reset</button>
  </div>

  <div class="stats">
    <div class="stat-row">
      <span class="stat-label dot-sage">&#9632; Opinion A</span>
      <span class="stat-val" id="aPct">50.0%</span>
    </div>
    <div class="stat-row">
      <span class="stat-label dot-terra">&#9632; Opinion B</span>
      <span class="stat-val" id="bPct">50.0%</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Tick</span>
      <span class="stat-val" id="tickVal">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Consensus</span>
      <span class="stat-val" id="consensusVal">&mdash;</span>
    </div>
    <div class="bar"><div class="bar-fill" id="barFill" style="width:50%"></div></div>
    <div class="consensus" id="consensusLabel"></div>
  </div>

<script>
(function () {
  'use strict';

  const SIZE = 200;
  const CELLS = SIZE * SIZE;

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // Offscreen buffer for pixel-perfect grid rendering
  const offscreen = document.createElement('canvas');
  offscreen.width = SIZE;
  offscreen.height = SIZE;
  const offCtx = offscreen.getContext('2d');
  const imageData = offCtx.createImageData(SIZE, SIZE);

  // Parse colors: sage #8A9A5B and terracotta #BC6C25
  const COLOR_A = [0x8A, 0x9A, 0x5B];
  const COLOR_B = [0xBC, 0x6C, 0x25];

  // State: Uint8Array — 0 = opinion A, 1 = opinion B
  let grid = new Uint8Array(CELLS);

  // Parameters
  let k = 3;              // linear group size (k x k)
  let pA = 0.5;           // initial fraction of A
  let tieMode = 'random'; // 'random' | 'dominance'
  let groupsPerTick = 400;
  let tick = 0;
  let consensusTick = null;
  let consensusWinner = null;

  // Counters
  let countA = 0;

  function idx(x, y) { return y * SIZE + x; }

  function initGrid() {
    countA = 0;
    for (let i = 0; i < CELLS; i++) {
      if (Math.random() < pA) { grid[i] = 0; countA++; }
      else { grid[i] = 1; }
    }
    tick = 0;
    consensusTick = null;
    consensusWinner = null;
  }

  // Apply majority rule to one random k x k group
  // Galam-style: groups sample cells, then ALL take the majority
  function applyMajorityStep() {
    // random top-left with wrapping (toroidal)
    const ox = (Math.random() * SIZE) | 0;
    const oy = (Math.random() * SIZE) | 0;
    const total = k * k;

    // count A in group
    let aCount = 0;
    for (let dy = 0; dy < k; dy++) {
      const yy = (oy + dy) % SIZE;
      const rowOff = yy * SIZE;
      for (let dx = 0; dx < k; dx++) {
        const xx = (ox + dx) % SIZE;
        if (grid[rowOff + xx] === 0) aCount++;
      }
    }
    const bCount = total - aCount;

    let winner;
    if (aCount > bCount) {
      winner = 0;
    } else if (bCount > aCount) {
      winner = 1;
    } else {
      // tie (only possible when k is even)
      if (tieMode === 'random') {
        winner = Math.random() < 0.5 ? 0 : 1;
      } else {
        // Galam-style dominance: favor B (the minority-can-win rule — bias toward opinion B)
        // Classic Galam ties break toward the 'inertial' or preferred opinion.
        winner = 1;
      }
    }

    // assign winner, adjust count
    for (let dy = 0; dy < k; dy++) {
      const yy = (oy + dy) % SIZE;
      const rowOff = yy * SIZE;
      for (let dx = 0; dx < k; dx++) {
        const xx = (ox + dx) % SIZE;
        const id = rowOff + xx;
        const prev = grid[id];
        if (prev !== winner) {
          if (prev === 0) countA--;
          else countA++;
          grid[id] = winner;
        }
      }
    }
  }

  function renderGrid() {
    const data = imageData.data;
    for (let i = 0, p = 0; i < CELLS; i++, p += 4) {
      if (grid[i] === 0) {
        data[p]   = COLOR_A[0];
        data[p+1] = COLOR_A[1];
        data[p+2] = COLOR_A[2];
      } else {
        data[p]   = COLOR_B[0];
        data[p+1] = COLOR_B[1];
        data[p+2] = COLOR_B[2];
      }
      data[p+3] = 255;
    }
    offCtx.putImageData(imageData, 0, 0);

    // Blit to main canvas (preserving aspect, fitting viewport with square grid)
    const cw = canvas.width, ch = canvas.height;
    const side = Math.min(cw, ch);
    const dx = (cw - side) / 2;
    const dy = (ch - side) / 2;
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, cw, ch);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(offscreen, dx, dy, side, side);
  }

  // UI wiring
  const kVal = document.getElementById('kVal');
  const pSlider = document.getElementById('pSlider');
  const pVal = document.getElementById('pVal');
  const rateSlider = document.getElementById('rateSlider');
  const rateVal = document.getElementById('rateVal');
  const aPctEl = document.getElementById('aPct');
  const bPctEl = document.getElementById('bPct');
  const tickEl = document.getElementById('tickVal');
  const consensusEl = document.getElementById('consensusVal');
  const consensusLabel = document.getElementById('consensusLabel');
  const barFill = document.getElementById('barFill');
  const resetBtn = document.getElementById('resetBtn');

  document.querySelectorAll('#kSeg button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#kSeg button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      k = parseInt(btn.dataset.k, 10);
      kVal.textContent = k;
    });
  });

  document.querySelectorAll('#tieSeg button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#tieSeg button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      tieMode = btn.dataset.tie;
    });
  });

  pSlider.addEventListener('input', () => {
    pA = parseFloat(pSlider.value);
    pVal.textContent = pA.toFixed(2);
  });

  rateSlider.addEventListener('input', () => {
    groupsPerTick = parseInt(rateSlider.value, 10);
    rateVal.textContent = groupsPerTick;
  });

  resetBtn.addEventListener('click', () => {
    initGrid();
  });

  function resizeCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  initGrid();

  function updateStats() {
    const fracA = countA / CELLS;
    const pct = fracA * 100;
    aPctEl.textContent = pct.toFixed(1) + '%';
    bPctEl.textContent = (100 - pct).toFixed(1) + '%';
    tickEl.textContent = tick;
    barFill.style.width = pct + '%';

    if (consensusTick !== null) {
      consensusEl.textContent = 't = ' + consensusTick;
      consensusLabel.textContent = 'Consensus: Opinion ' + (consensusWinner === 0 ? 'A (sage)' : 'B (terracotta)');
      consensusLabel.style.color = consensusWinner === 0 ? '#8A9A5B' : '#BC6C25';
    } else {
      consensusEl.textContent = '—';
      consensusLabel.textContent = '';
    }
  }

  function checkConsensus() {
    if (consensusTick !== null) return;
    if (countA === 0) { consensusTick = tick; consensusWinner = 1; }
    else if (countA === CELLS) { consensusTick = tick; consensusWinner = 0; }
  }

  function step() {
    if (consensusTick === null) {
      for (let i = 0; i < groupsPerTick; i++) {
        applyMajorityStep();
      }
      tick++;
      checkConsensus();
    }
  }

  function loop() {
    step();
    renderGrid();
    updateStats();
    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
</body>
</html>
