<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ant Pheromone Foraging — Complex Adaptive Systems</title>
<style>
    :root {
        --sage: #8A9A5B;
        --moss: #606C38;
        --earth: #DDA15E;
        --cream: #FEFAE0;
        --terracotta: #BC6C25;
        --dark-moss: #3d4423;
        --bg: #0a0a0f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--cream);
    }
    canvas {
        display: block;
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: var(--bg);
        image-rendering: pixelated;
    }
    .back-link {
        position: fixed;
        top: 18px;
        left: 18px;
        z-index: 10;
        padding: 10px 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--cream);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.01em;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: background 0.25s ease, transform 0.25s ease, border-color 0.25s ease;
    }
    .back-link:hover {
        background: rgba(138, 154, 91, 0.22);
        border-color: rgba(221, 161, 94, 0.45);
        transform: translateY(-1px);
    }
    .title-card {
        position: fixed;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        padding: 10px 22px;
        border-radius: 14px;
        background: rgba(10, 10, 15, 0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        text-align: center;
        pointer-events: none;
    }
    .title-card h1 {
        font-family: 'Lora', Georgia, serif;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--cream);
    }
    .title-card p {
        font-size: 11px;
        color: rgba(254, 250, 224, 0.6);
        margin-top: 2px;
        letter-spacing: 0.04em;
    }
    .controls {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        padding: 14px 18px;
        border-radius: 16px;
        background: rgba(10, 10, 15, 0.55);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: grid;
        grid-template-columns: repeat(4, auto);
        gap: 14px 22px;
        max-width: 95vw;
    }
    .control {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 120px;
    }
    .control label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: rgba(254, 250, 224, 0.65);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .control label .value {
        font-weight: 600;
        color: var(--earth);
        font-variant-numeric: tabular-nums;
    }
    .control input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        background: rgba(254, 250, 224, 0.15);
        border-radius: 2px;
        outline: none;
    }
    .control input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--sage);
        cursor: pointer;
        border: 2px solid var(--cream);
        transition: transform 0.15s ease;
    }
    .control input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .control input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--sage);
        cursor: pointer;
        border: 2px solid var(--cream);
    }
    .control button {
        background: rgba(188, 108, 37, 0.22);
        border: 1px solid rgba(221, 161, 94, 0.4);
        color: var(--cream);
        padding: 6px 12px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s ease, border-color 0.2s ease;
        font-family: inherit;
    }
    .control button:hover {
        background: rgba(188, 108, 37, 0.4);
        border-color: var(--earth);
    }
    @media (max-width: 700px) {
        .controls {
            grid-template-columns: repeat(2, auto);
            gap: 10px 14px;
            padding: 12px;
        }
        .control { min-width: 130px; }
    }
</style>
</head>
<body>

<a class="back-link" href="index.html">
    <span>&larr;</span>
    <span>Gallery</span>
</a>

<div class="title-card">
    <h1>Ant Pheromone Foraging</h1>
    <p>stigmergy &middot; emergent shortest paths</p>
</div>

<canvas id="canvas"></canvas>

<div class="controls">
    <div class="control">
        <label>Ants <span class="value" id="antsVal">220</span></label>
        <input type="range" id="antsSlider" min="20" max="600" value="220" step="10">
    </div>
    <div class="control">
        <label>Evaporation <span class="value" id="evapVal">0.006</span></label>
        <input type="range" id="evapSlider" min="1" max="40" value="6" step="1">
    </div>
    <div class="control">
        <label>Deposit <span class="value" id="depVal">1.0</span></label>
        <input type="range" id="depSlider" min="10" max="300" value="100" step="5">
    </div>
    <div class="control">
        <label>Wander <span class="value" id="noiseVal">0.30</span></label>
        <input type="range" id="noiseSlider" min="0" max="100" value="30" step="1">
    </div>
    <div class="control" style="min-width: auto; grid-column: span 4; flex-direction: row; justify-content: center; gap: 10px;">
        <button id="resetBtn">Reset</button>
        <button id="newFoodBtn">New food</button>
    </div>
</div>

<script>
(function() {
    'use strict';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Simulation grid — keeps pheromones decoupled from viewport resolution
    const GRID_W = 200;
    const GRID_H = 200;
    let cellSize = 1; // px-per-cell, computed on resize

    // Pheromone fields
    const homePh = new Float32Array(GRID_W * GRID_H);
    const foodPh = new Float32Array(GRID_W * GRID_H);
    const tmpPh  = new Float32Array(GRID_W * GRID_H);

    // Offscreen canvas for pheromone visualization
    const phCanvas = document.createElement('canvas');
    phCanvas.width = GRID_W;
    phCanvas.height = GRID_H;
    const phCtx = phCanvas.getContext('2d');
    const phImage = phCtx.createImageData(GRID_W, GRID_H);

    // State
    let ants = [];
    let nest = { x: GRID_W * 0.5, y: GRID_H * 0.5, r: 6 };
    let foods = [];
    let params = {
        antCount: 220,
        evaporation: 0.006,
        deposit: 1.0,
        noise: 0.30,
        speed: 0.7,
    };

    function idx(x, y) { return y * GRID_W + x; }
    function inBounds(x, y) { return x >= 0 && x < GRID_W && y >= 0 && y < GRID_H; }

    function makeFood(x, y, amount) {
        foods.push({ x, y, r: 5, amount: amount != null ? amount : 2500 });
    }

    function resetFoods() {
        foods = [];
        // Three food sources at varied distances / angles
        const placements = [
            { angle: -0.5, dist: 70 },
            { angle: 2.3, dist: 60 },
            { angle: 3.9, dist: 75 },
        ];
        for (const p of placements) {
            const fx = nest.x + Math.cos(p.angle) * p.dist;
            const fy = nest.y + Math.sin(p.angle) * p.dist;
            makeFood(
                Math.max(8, Math.min(GRID_W - 8, fx)),
                Math.max(8, Math.min(GRID_H - 8, fy)),
                2500
            );
        }
    }

    function spawnNewFood() {
        const angle = Math.random() * Math.PI * 2;
        const dist = 45 + Math.random() * 45;
        const fx = nest.x + Math.cos(angle) * dist;
        const fy = nest.y + Math.sin(angle) * dist;
        makeFood(
            Math.max(8, Math.min(GRID_W - 8, fx)),
            Math.max(8, Math.min(GRID_H - 8, fy)),
            2500
        );
    }

    function createAnt() {
        return {
            x: nest.x,
            y: nest.y,
            dir: Math.random() * Math.PI * 2,
            carrying: false,
            life: 0,        // steps since leaving nest or food
            maxLife: 900,   // reset direction if wandering too long
        };
    }

    function setAntCount(n) {
        while (ants.length < n) ants.push(createAnt());
        if (ants.length > n) ants.length = n;
    }

    function reset() {
        homePh.fill(0);
        foodPh.fill(0);
        ants = [];
        setAntCount(params.antCount);
        resetFoods();
    }

    // Sense pheromone strength in a small forward cone
    function sense(ant, field, angleOffset) {
        const a = ant.dir + angleOffset;
        const sx = ant.x + Math.cos(a) * 4;
        const sy = ant.y + Math.sin(a) * 4;
        let sum = 0;
        const cx = Math.floor(sx);
        const cy = Math.floor(sy);
        // Sample 3x3 neighborhood
        for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
                const x = cx + dx, y = cy + dy;
                if (inBounds(x, y)) sum += field[idx(x, y)];
            }
        }
        return sum;
    }

    function updateAnts(dt) {
        const speed = params.speed;
        const noise = params.noise;
        const deposit = params.deposit;

        for (let i = 0; i < ants.length; i++) {
            const ant = ants[i];
            const targetField = ant.carrying ? homePh : foodPh;

            // Sense three directions — forward, left, right
            const fwd = sense(ant, targetField, 0);
            const lft = sense(ant, targetField, -0.6);
            const rgt = sense(ant, targetField, 0.6);

            // Bias turn toward strongest field
            let turn = 0;
            if (fwd >= lft && fwd >= rgt) {
                turn = 0;
            } else if (rgt > lft) {
                turn = 0.35;
            } else {
                turn = -0.35;
            }

            // Add random wander
            turn += (Math.random() - 0.5) * noise * 2;

            // If carrying food, add a gentle directional bias toward the nest
            // (represents an ant's innate sense of direction home)
            if (ant.carrying) {
                const dx = nest.x - ant.x;
                const dy = nest.y - ant.y;
                const homeAngle = Math.atan2(dy, dx);
                let diff = homeAngle - ant.dir;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                turn += diff * 0.08;
            }

            ant.dir += turn;

            // Move
            const nx = ant.x + Math.cos(ant.dir) * speed;
            const ny = ant.y + Math.sin(ant.dir) * speed;

            // Bounce off walls
            if (nx < 1 || nx > GRID_W - 2) {
                ant.dir = Math.PI - ant.dir + (Math.random() - 0.5) * 0.3;
                ant.x = Math.max(1, Math.min(GRID_W - 2, nx));
            } else {
                ant.x = nx;
            }
            if (ny < 1 || ny > GRID_H - 2) {
                ant.dir = -ant.dir + (Math.random() - 0.5) * 0.3;
                ant.y = Math.max(1, Math.min(GRID_H - 2, ny));
            } else {
                ant.y = ny;
            }

            ant.life++;

            // Deposit pheromone — amount falls off with life (fresher trails are stronger)
            const falloff = Math.max(0.15, 1 - ant.life / 600);
            const ix = Math.floor(ant.x);
            const iy = Math.floor(ant.y);
            if (inBounds(ix, iy)) {
                if (ant.carrying) {
                    // Carrying food → deposit food pheromone (leading others to food)
                    foodPh[idx(ix, iy)] = Math.min(1.0, foodPh[idx(ix, iy)] + deposit * 0.03 * falloff);
                } else {
                    // Foraging → deposit home pheromone (leading others back to nest)
                    homePh[idx(ix, iy)] = Math.min(1.0, homePh[idx(ix, iy)] + deposit * 0.03 * falloff);
                }
            }

            // Check for food / nest interactions
            if (ant.carrying) {
                const dx = ant.x - nest.x, dy = ant.y - nest.y;
                if (dx * dx + dy * dy < nest.r * nest.r) {
                    ant.carrying = false;
                    ant.dir += Math.PI + (Math.random() - 0.5) * 0.6;
                    ant.life = 0;
                }
            } else {
                for (let f = 0; f < foods.length; f++) {
                    const food = foods[f];
                    const dx = ant.x - food.x, dy = ant.y - food.y;
                    if (dx * dx + dy * dy < food.r * food.r && food.amount > 0) {
                        ant.carrying = true;
                        ant.dir += Math.PI + (Math.random() - 0.5) * 0.6;
                        ant.life = 0;
                        food.amount--;
                        break;
                    }
                }
            }

            // If life gets too long without progress, soft-reset orientation
            if (ant.life > ant.maxLife) {
                ant.dir = Math.random() * Math.PI * 2;
                ant.life = 0;
            }
        }

        // Remove depleted food
        foods = foods.filter(f => f.amount > 0);
    }

    function diffuseAndEvaporate(field) {
        const evap = 1 - params.evaporation;
        // Light diffusion — 5-point stencil with small coefficient
        const coef = 0.08;
        for (let y = 1; y < GRID_H - 1; y++) {
            for (let x = 1; x < GRID_W - 1; x++) {
                const i = idx(x, y);
                const sum = field[i - 1] + field[i + 1] + field[i - GRID_W] + field[i + GRID_W];
                tmpPh[i] = (field[i] * (1 - coef) + (sum * 0.25) * coef) * evap;
            }
        }
        // Copy tmp back, clear borders
        for (let i = 0; i < field.length; i++) field[i] = tmpPh[i];
    }

    function renderPheromones() {
        const data = phImage.data;
        // Sage (to-home): R=138 G=154 B=91
        // Earth (to-food): R=221 G=161 B=94
        for (let i = 0; i < GRID_W * GRID_H; i++) {
            const h = homePh[i];
            const f = foodPh[i];
            const r = Math.min(255, f * 221 * 2.2 + h * 138 * 1.2);
            const g = Math.min(255, f * 161 * 2.0 + h * 154 * 1.4);
            const b = Math.min(255, f * 94  * 1.8 + h * 91  * 1.2);
            const a = Math.min(255, (h + f) * 320);
            const j = i * 4;
            data[j] = r;
            data[j + 1] = g;
            data[j + 2] = b;
            data[j + 3] = a;
        }
        phCtx.putImageData(phImage, 0, 0);
    }

    function render() {
        // Clear full canvas
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Viewport layout — center the GRID square inside the viewport
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        const dpr = window.devicePixelRatio || 1;
        const size = Math.min(w, h) * 0.92;
        cellSize = size / GRID_W;
        const offX = (w - size) / 2;
        const offY = (h - size) / 2;

        ctx.save();
        ctx.scale(dpr, dpr);
        ctx.translate(offX, offY);

        // Soft vignette panel behind the sim
        const grad = ctx.createRadialGradient(size / 2, size / 2, size * 0.1, size / 2, size / 2, size * 0.7);
        grad.addColorStop(0, 'rgba(255, 255, 255, 0.02)');
        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, size, size);

        // Pheromone layer (blurred glow via two draws)
        renderPheromones();
        ctx.globalCompositeOperation = 'lighter';
        ctx.filter = 'blur(2px)';
        ctx.drawImage(phCanvas, 0, 0, size, size);
        ctx.filter = 'none';
        ctx.globalAlpha = 0.9;
        ctx.drawImage(phCanvas, 0, 0, size, size);
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';

        // Food sources — earth-colored clusters with glow
        for (const food of foods) {
            const fx = food.x * cellSize;
            const fy = food.y * cellSize;
            const rad = food.r * cellSize;
            const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, rad * 2.4);
            glow.addColorStop(0, 'rgba(221, 161, 94, 0.55)');
            glow.addColorStop(1, 'rgba(221, 161, 94, 0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(fx, fy, rad * 2.4, 0, Math.PI * 2);
            ctx.fill();
            // Cluster dots
            ctx.fillStyle = '#DDA15E';
            for (let k = 0; k < 9; k++) {
                const a = (k / 9) * Math.PI * 2 + k * 0.3;
                const r2 = rad * (0.4 + (k % 3) * 0.25);
                ctx.beginPath();
                ctx.arc(fx + Math.cos(a) * r2, fy + Math.sin(a) * r2, Math.max(0.8, rad * 0.18), 0, Math.PI * 2);
                ctx.fill();
            }
            // Amount ring (depletes visually)
            const amtFrac = food.amount / 2500;
            ctx.strokeStyle = 'rgba(254, 250, 224, ' + (0.15 + amtFrac * 0.25) + ')';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(fx, fy, rad + 1, 0, Math.PI * 2 * amtFrac);
            ctx.stroke();
        }

        // Ants
        for (let i = 0; i < ants.length; i++) {
            const ant = ants[i];
            const ax = ant.x * cellSize;
            const ay = ant.y * cellSize;
            ctx.fillStyle = ant.carrying ? '#FEFAE0' : '#BC6C25';
            ctx.beginPath();
            ctx.arc(ax, ay, ant.carrying ? 1.8 : 1.4, 0, Math.PI * 2);
            ctx.fill();
        }

        // Nest — glowing sage circle
        const nx = nest.x * cellSize;
        const ny = nest.y * cellSize;
        const nr = nest.r * cellSize;
        const nestGlow = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr * 2.8);
        nestGlow.addColorStop(0, 'rgba(138, 154, 91, 0.7)');
        nestGlow.addColorStop(0.5, 'rgba(138, 154, 91, 0.25)');
        nestGlow.addColorStop(1, 'rgba(138, 154, 91, 0)');
        ctx.fillStyle = nestGlow;
        ctx.beginPath();
        ctx.arc(nx, ny, nr * 2.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#8A9A5B';
        ctx.beginPath();
        ctx.arc(nx, ny, nr, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(254, 250, 224, 0.65)';
        ctx.lineWidth = 1.2;
        ctx.stroke();

        ctx.restore();
    }

    // Resize handling — set backing store size with DPR
    function resize() {
        const dpr = window.devicePixelRatio || 1;
        const w = window.innerWidth;
        const h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
    }

    // Main loop — fixed-step sim, rAF render
    let lastTime = 0;
    let accumulator = 0;
    const stepMs = 1000 / 60;

    function frame(t) {
        if (!lastTime) lastTime = t;
        const delta = Math.min(100, t - lastTime);
        lastTime = t;
        accumulator += delta;
        let steps = 0;
        while (accumulator >= stepMs && steps < 3) {
            updateAnts(stepMs);
            diffuseAndEvaporate(homePh);
            diffuseAndEvaporate(foodPh);
            accumulator -= stepMs;
            steps++;
        }
        render();
        requestAnimationFrame(frame);
    }

    // Wire controls
    const antsSlider = document.getElementById('antsSlider');
    const evapSlider = document.getElementById('evapSlider');
    const depSlider = document.getElementById('depSlider');
    const noiseSlider = document.getElementById('noiseSlider');
    const antsVal = document.getElementById('antsVal');
    const evapVal = document.getElementById('evapVal');
    const depVal = document.getElementById('depVal');
    const noiseVal = document.getElementById('noiseVal');

    antsSlider.addEventListener('input', () => {
        params.antCount = +antsSlider.value;
        antsVal.textContent = params.antCount;
        setAntCount(params.antCount);
    });
    evapSlider.addEventListener('input', () => {
        params.evaporation = +evapSlider.value / 1000;
        evapVal.textContent = params.evaporation.toFixed(3);
    });
    depSlider.addEventListener('input', () => {
        params.deposit = +depSlider.value / 100;
        depVal.textContent = params.deposit.toFixed(1);
    });
    noiseSlider.addEventListener('input', () => {
        params.noise = +noiseSlider.value / 100;
        noiseVal.textContent = params.noise.toFixed(2);
    });
    document.getElementById('resetBtn').addEventListener('click', reset);
    document.getElementById('newFoodBtn').addEventListener('click', spawnNewFood);

    // Init
    window.addEventListener('resize', resize);
    resize();
    reset();
    requestAnimationFrame(frame);
})();
</script>
</body>
</html>
