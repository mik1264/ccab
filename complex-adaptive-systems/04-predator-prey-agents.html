<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predator-Prey Agents — Complex Adaptive Systems</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
        color: #e8e8ea;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .organic-back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(138, 154, 91, 0.15);
        border: 1px solid rgba(138, 154, 91, 0.4);
        border-radius: 30px;
        color: #DDA15E;
        text-decoration: none;
        font-size: 14px;
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
    }
    .organic-back-link:hover {
        background: rgba(138, 154, 91, 0.25);
        transform: translateX(-3px);
    }
    .back-arrow { font-size: 16px; }

    .layout {
        display: grid;
        grid-template-columns: 1fr 420px;
        grid-template-rows: auto 1fr;
        width: 100%;
        height: 100%;
        gap: 0;
    }

    .header {
        grid-column: 1 / -1;
        padding: 16px 24px 8px 180px;
        border-bottom: 1px solid #22222a;
    }

    .header h1 {
        font-size: 22px;
        font-weight: 600;
        color: #f3f3f5;
        letter-spacing: 0.3px;
    }

    .header .sub {
        font-size: 12px;
        color: #888;
        margin-top: 4px;
    }

    .main-panel {
        position: relative;
        background: #0a0a0f;
        overflow: hidden;
    }

    #world {
        display: block;
        width: 100%;
        height: 100%;
    }

    .side-panel {
        background: #0e0e15;
        border-left: 1px solid #22222a;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        overflow-y: auto;
    }

    .counts {
        display: flex;
        justify-content: space-between;
        gap: 10px;
    }

    .count-box {
        flex: 1;
        background: #15151d;
        border: 1px solid #22222a;
        border-radius: 8px;
        padding: 12px;
        text-align: center;
    }

    .count-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #888;
        margin-bottom: 4px;
    }

    .count-value {
        font-size: 24px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }

    .prey-c { color: #8A9A5B; }
    .pred-c { color: #BC6C25; }
    .grass-c { color: #606C38; }

    .graph-container {
        background: #15151d;
        border: 1px solid #22222a;
        border-radius: 8px;
        padding: 10px;
    }

    .graph-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #888;
        margin-bottom: 6px;
    }

    #graph {
        display: block;
        width: 100%;
        height: 220px;
        background: #0a0a0f;
        border-radius: 4px;
    }

    .controls {
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .control {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .control-head {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
    }

    .control-label { color: #bbb; }
    .control-value { color: #DDA15E; font-variant-numeric: tabular-nums; }

    input[type=range] {
        -webkit-appearance: none;
        width: 100%;
        height: 4px;
        background: #22222a;
        border-radius: 2px;
        outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #DDA15E;
        cursor: pointer;
        border: none;
    }
    input[type=range]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #DDA15E;
        cursor: pointer;
        border: none;
    }

    button {
        padding: 10px 14px;
        background: #22222a;
        border: 1px solid #33333a;
        border-radius: 6px;
        color: #e8e8ea;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.2s;
    }
    button:hover { background: #2d2d38; }

    .legend {
        display: flex;
        gap: 14px;
        font-size: 11px;
        color: #888;
        margin-top: auto;
        padding-top: 10px;
        border-top: 1px solid #22222a;
    }
    .legend-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 5px;
        vertical-align: middle;
    }

    @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; grid-template-rows: auto 55% 45%; }
        .side-panel { border-left: none; border-top: 1px solid #22222a; }
        .header { padding-left: 24px; padding-top: 60px; }
    }
</style>
</head>
<body>

<a class="organic-back-link" href="index.html">
    <span class="back-arrow">&larr;</span>
    <span class="back-text">Gallery</span>
</a>

<div class="layout">
    <div class="header">
        <h1>Predator-Prey Agents</h1>
        <div class="sub">Agent-based Lotka-Volterra: grass feeds prey, prey feeds predators, populations oscillate.</div>
    </div>

    <div class="main-panel">
        <canvas id="world"></canvas>
    </div>

    <div class="side-panel">
        <div class="counts">
            <div class="count-box">
                <div class="count-label">Prey</div>
                <div class="count-value prey-c" id="preyCount">0</div>
            </div>
            <div class="count-box">
                <div class="count-label">Predators</div>
                <div class="count-value pred-c" id="predCount">0</div>
            </div>
            <div class="count-box">
                <div class="count-label">Grass</div>
                <div class="count-value grass-c" id="grassCount">0</div>
            </div>
        </div>

        <div class="graph-container">
            <div class="graph-title">Population Over Time</div>
            <canvas id="graph"></canvas>
        </div>

        <div class="controls">
            <div class="control">
                <div class="control-head">
                    <span class="control-label">Prey reproduction rate</span>
                    <span class="control-value" id="preyReproVal">0.04</span>
                </div>
                <input type="range" id="preyRepro" min="0" max="20" value="4">
            </div>
            <div class="control">
                <div class="control-head">
                    <span class="control-label">Predator reproduction rate</span>
                    <span class="control-value" id="predReproVal">0.05</span>
                </div>
                <input type="range" id="predRepro" min="0" max="20" value="5">
            </div>
            <div class="control">
                <div class="control-head">
                    <span class="control-label">Grass regrowth rate</span>
                    <span class="control-value" id="grassRegrowVal">0.020</span>
                </div>
                <input type="range" id="grassRegrow" min="0" max="100" value="20">
            </div>
            <button id="resetBtn">Reset Simulation</button>
        </div>

        <div class="legend">
            <span><span class="legend-dot" style="background:#8A9A5B;"></span>Prey</span>
            <span><span class="legend-dot" style="background:#BC6C25;"></span>Predator</span>
            <span><span class="legend-dot" style="background:#606C38;"></span>Grass</span>
        </div>
    </div>
</div>

<script>
(function () {
    'use strict';

    const worldCanvas = document.getElementById('world');
    const wctx = worldCanvas.getContext('2d');
    const graphCanvas = document.getElementById('graph');
    const gctx = graphCanvas.getContext('2d');

    // Colors
    const COLOR_BG       = '#0a0a0f';
    const COLOR_PREY     = '#8A9A5B';
    const COLOR_PRED     = '#BC6C25';
    const COLOR_GRASS    = '#3a4a25';  // dim earth-green
    const COLOR_NO_GRASS = '#13130c';

    // Grid size (tiles)
    const TILE = 8; // px per tile
    let cols = 0, rows = 0;

    // Grass grid: 0 = none, 1 = present; regrowth counters
    let grass;       // Uint8Array
    let grassTimer;  // Float32Array (countdown to regrow when 0)

    // Agents
    // Prey: {x, y, energy, alive}
    // Pred: {x, y, energy, alive}
    let preys = [];
    let preds = [];

    // Parameters
    let preyReproRate   = 0.04;   // probability per step when energy >= threshold
    let predReproRate   = 0.05;
    let grassRegrowRate = 0.020;  // prob per empty tile per step

    // Energy model
    const PREY_ENERGY_START = 20;
    const PREY_ENERGY_GAIN  = 8;
    const PREY_REPRO_THRESHOLD = 22;
    const PREY_MOVE_COST    = 0.5;

    const PRED_ENERGY_START = 30;
    const PRED_ENERGY_GAIN  = 18;
    const PRED_REPRO_THRESHOLD = 35;
    const PRED_MOVE_COST    = 0.8;

    // History for graph
    const HISTORY_MAX = 600;
    let history = []; // {prey, pred, grass}

    let running = true;
    let rafId = null;
    let frame = 0;

    // --- Setup ---
    function resize() {
        const rect = worldCanvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        worldCanvas.width  = Math.floor(rect.width * dpr);
        worldCanvas.height = Math.floor(rect.height * dpr);
        wctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        cols = Math.floor(rect.width / TILE);
        rows = Math.floor(rect.height / TILE);

        const gr = graphCanvas.getBoundingClientRect();
        graphCanvas.width  = Math.floor(gr.width * dpr);
        graphCanvas.height = Math.floor(gr.height * dpr);
        gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function reset() {
        resize();
        grass = new Uint8Array(cols * rows);
        grassTimer = new Float32Array(cols * rows);
        for (let i = 0; i < grass.length; i++) {
            grass[i] = Math.random() < 0.6 ? 1 : 0;
        }

        preys = [];
        preds = [];
        const preyCount = Math.floor(cols * rows * 0.05);
        const predCount = Math.floor(cols * rows * 0.012);
        for (let i = 0; i < preyCount; i++) {
            preys.push({
                x: Math.floor(Math.random() * cols),
                y: Math.floor(Math.random() * rows),
                energy: PREY_ENERGY_START * (0.6 + Math.random() * 0.8),
                alive: true
            });
        }
        for (let i = 0; i < predCount; i++) {
            preds.push({
                x: Math.floor(Math.random() * cols),
                y: Math.floor(Math.random() * rows),
                energy: PRED_ENERGY_START * (0.6 + Math.random() * 0.8),
                alive: true
            });
        }
        history = [];
        frame = 0;
    }

    // Hard population caps to avoid slowdown
    const MAX_PREY = 3000;
    const MAX_PRED = 1500;

    function step() {
        // Grass regrowth
        for (let i = 0; i < grass.length; i++) {
            if (grass[i] === 0) {
                if (Math.random() < grassRegrowRate) grass[i] = 1;
            }
        }

        // Spatial index of prey for predator hunting (grid bucket)
        const preyBucket = new Array(cols * rows);
        for (let i = 0; i < preys.length; i++) {
            const p = preys[i];
            if (!p.alive) continue;
            const idx = p.y * cols + p.x;
            if (!preyBucket[idx]) preyBucket[idx] = [];
            preyBucket[idx].push(i);
        }

        // Move + feed prey
        const newPrey = [];
        for (let i = 0; i < preys.length; i++) {
            const p = preys[i];
            if (!p.alive) continue;

            // Random walk (8-neighborhood + stay)
            const dir = Math.floor(Math.random() * 9);
            if (dir < 8) {
                p.x = (p.x + DX[dir] + cols) % cols;
                p.y = (p.y + DY[dir] + rows) % rows;
            }
            p.energy -= PREY_MOVE_COST;

            // Eat grass
            const idx = p.y * cols + p.x;
            if (grass[idx] === 1) {
                grass[idx] = 0;
                p.energy += PREY_ENERGY_GAIN;
            }

            // Die
            if (p.energy <= 0) { p.alive = false; continue; }

            // Reproduce
            if (p.energy >= PREY_REPRO_THRESHOLD && Math.random() < preyReproRate) {
                const childE = p.energy / 2;
                p.energy = childE;
                if (preys.length + newPrey.length < MAX_PREY) {
                    newPrey.push({
                        x: p.x, y: p.y,
                        energy: childE, alive: true
                    });
                }
            }
        }
        // Filter dead + add newborns
        preys = preys.filter(p => p.alive).concat(newPrey);

        // Rebuild prey bucket (positions may have changed, deaths happened)
        const preyBucket2 = new Array(cols * rows);
        for (let i = 0; i < preys.length; i++) {
            const p = preys[i];
            const idx = p.y * cols + p.x;
            if (!preyBucket2[idx]) preyBucket2[idx] = [];
            preyBucket2[idx].push(i);
        }

        // Move + feed predators
        const newPred = [];
        const eatenPrey = new Uint8Array(preys.length);
        for (let i = 0; i < preds.length; i++) {
            const pr = preds[i];
            if (!pr.alive) continue;

            const dir = Math.floor(Math.random() * 9);
            if (dir < 8) {
                pr.x = (pr.x + DX[dir] + cols) % cols;
                pr.y = (pr.y + DY[dir] + rows) % rows;
            }
            pr.energy -= PRED_MOVE_COST;

            // Try to eat prey at current tile
            const idx = pr.y * cols + pr.x;
            const here = preyBucket2[idx];
            if (here && here.length) {
                for (let k = 0; k < here.length; k++) {
                    const pIdx = here[k];
                    if (!eatenPrey[pIdx] && preys[pIdx].alive) {
                        preys[pIdx].alive = false;
                        eatenPrey[pIdx] = 1;
                        pr.energy += PRED_ENERGY_GAIN;
                        break;
                    }
                }
            }

            if (pr.energy <= 0) { pr.alive = false; continue; }

            if (pr.energy >= PRED_REPRO_THRESHOLD && Math.random() < predReproRate) {
                const childE = pr.energy / 2;
                pr.energy = childE;
                if (preds.length + newPred.length < MAX_PRED) {
                    newPred.push({
                        x: pr.x, y: pr.y,
                        energy: childE, alive: true
                    });
                }
            }
        }
        preds = preds.filter(p => p.alive).concat(newPred);
        preys = preys.filter(p => p.alive);

        // Record history every frame
        let grassCount = 0;
        for (let i = 0; i < grass.length; i++) if (grass[i]) grassCount++;
        history.push({ prey: preys.length, pred: preds.length, grass: grassCount });
        if (history.length > HISTORY_MAX) history.shift();

        frame++;
    }

    const DX = [-1, 0, 1, -1, 1, -1, 0, 1];
    const DY = [-1, -1, -1, 0, 0, 1, 1, 1];

    function draw() {
        // Draw grass as tile grid
        const w = cols * TILE;
        const h = rows * TILE;

        // Clear with bg
        wctx.fillStyle = COLOR_BG;
        wctx.fillRect(0, 0, worldCanvas.width, worldCanvas.height);

        // Grass tiles (skip drawing no-grass — bg already fills)
        wctx.fillStyle = COLOR_GRASS;
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if (grass[y * cols + x]) {
                    wctx.fillRect(x * TILE, y * TILE, TILE, TILE);
                }
            }
        }

        // Prey
        wctx.fillStyle = COLOR_PREY;
        for (let i = 0; i < preys.length; i++) {
            const p = preys[i];
            const cx = p.x * TILE + TILE / 2;
            const cy = p.y * TILE + TILE / 2;
            wctx.beginPath();
            wctx.arc(cx, cy, TILE * 0.35, 0, Math.PI * 2);
            wctx.fill();
        }

        // Predators (slightly larger)
        wctx.fillStyle = COLOR_PRED;
        for (let i = 0; i < preds.length; i++) {
            const p = preds[i];
            const cx = p.x * TILE + TILE / 2;
            const cy = p.y * TILE + TILE / 2;
            wctx.beginPath();
            wctx.arc(cx, cy, TILE * 0.5, 0, Math.PI * 2);
            wctx.fill();
        }

        // HUD counts
        document.getElementById('preyCount').textContent  = preys.length;
        document.getElementById('predCount').textContent  = preds.length;
        const gc = history.length ? history[history.length - 1].grass : 0;
        document.getElementById('grassCount').textContent = gc;
    }

    function drawGraph() {
        const rect = graphCanvas.getBoundingClientRect();
        const W = rect.width;
        const H = rect.height;

        gctx.fillStyle = '#0a0a0f';
        gctx.fillRect(0, 0, W, H);

        if (history.length < 2) return;

        // Find max
        let maxP = 10;
        for (let i = 0; i < history.length; i++) {
            if (history[i].prey > maxP) maxP = history[i].prey;
            if (history[i].pred > maxP) maxP = history[i].pred;
        }
        maxP = Math.max(maxP, 20);

        // Gridlines
        gctx.strokeStyle = '#1a1a22';
        gctx.lineWidth = 1;
        for (let i = 1; i < 4; i++) {
            const y = (H * i) / 4;
            gctx.beginPath();
            gctx.moveTo(0, y);
            gctx.lineTo(W, y);
            gctx.stroke();
        }

        const n = history.length;
        const step = W / (HISTORY_MAX - 1);
        const offset = (HISTORY_MAX - n) * step;

        // Prey line
        gctx.strokeStyle = COLOR_PREY;
        gctx.lineWidth = 1.5;
        gctx.beginPath();
        for (let i = 0; i < n; i++) {
            const x = offset + i * step;
            const y = H - (history[i].prey / maxP) * H;
            if (i === 0) gctx.moveTo(x, y);
            else gctx.lineTo(x, y);
        }
        gctx.stroke();

        // Predator line
        gctx.strokeStyle = COLOR_PRED;
        gctx.lineWidth = 1.5;
        gctx.beginPath();
        for (let i = 0; i < n; i++) {
            const x = offset + i * step;
            const y = H - (history[i].pred / maxP) * H;
            if (i === 0) gctx.moveTo(x, y);
            else gctx.lineTo(x, y);
        }
        gctx.stroke();

        // Axis label: current max on top-right
        gctx.fillStyle = '#555';
        gctx.font = '10px -apple-system, sans-serif';
        gctx.textAlign = 'right';
        gctx.fillText(String(maxP), W - 4, 12);
        gctx.textAlign = 'left';
        gctx.fillText('0', 4, H - 4);
    }

    function loop() {
        if (running) step();
        draw();
        drawGraph();
        rafId = requestAnimationFrame(loop);
    }

    // --- Controls ---
    const preyReproEl  = document.getElementById('preyRepro');
    const predReproEl  = document.getElementById('predRepro');
    const grassEl      = document.getElementById('grassRegrow');
    const preyReproVal = document.getElementById('preyReproVal');
    const predReproVal = document.getElementById('predReproVal');
    const grassVal     = document.getElementById('grassRegrowVal');

    function syncControls() {
        preyReproRate   = parseInt(preyReproEl.value, 10) / 100;   // 0..0.20
        predReproRate   = parseInt(predReproEl.value, 10) / 100;
        grassRegrowRate = parseInt(grassEl.value, 10) / 1000;      // 0..0.100
        preyReproVal.textContent = preyReproRate.toFixed(2);
        predReproVal.textContent = predReproRate.toFixed(2);
        grassVal.textContent     = grassRegrowRate.toFixed(3);
    }
    preyReproEl.addEventListener('input', syncControls);
    predReproEl.addEventListener('input', syncControls);
    grassEl.addEventListener('input', syncControls);
    document.getElementById('resetBtn').addEventListener('click', reset);

    syncControls();

    let resizeTimer = null;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => { reset(); }, 120);
    });

    // Start
    reset();
    loop();
})();
</script>
</body>
</html>
