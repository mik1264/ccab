<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Immune Agents — Complex Adaptive Systems</title>
<style>
    :root {
        --sage: #8A9A5B;
        --moss: #606C38;
        --earth: #DDA15E;
        --cream: #FEFAE0;
        --terracotta: #BC6C25;
        --dark-moss: #3d4423;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 100%; height: 100%; overflow: hidden;
        background: var(--cream);
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--dark-moss);
    }
    canvas {
        display: block;
        position: fixed; inset: 0;
        width: 100vw; height: 100vh;
    }

    /* Floating back-link */
    .organic-back-link {
        position: fixed;
        top: 20px; left: 20px;
        z-index: 100;
        display: inline-flex; align-items: center; gap: 8px;
        padding: 10px 18px;
        background: rgba(254, 250, 224, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(138, 154, 91, 0.3);
        border-radius: 30px;
        color: var(--moss);
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        box-shadow: 0 2px 10px rgba(61, 68, 35, 0.08);
    }
    .organic-back-link:hover {
        background: rgba(254, 250, 224, 0.95);
        transform: translateX(-3px);
        box-shadow: 0 4px 16px rgba(61, 68, 35, 0.12);
    }
    .back-arrow { font-size: 16px; }

    /* Title card */
    .title-card {
        position: fixed;
        top: 20px; right: 20px;
        z-index: 100;
        padding: 14px 20px;
        background: rgba(254, 250, 224, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(138, 154, 91, 0.3);
        border-radius: 18px;
        box-shadow: 0 2px 10px rgba(61, 68, 35, 0.08);
        max-width: 320px;
    }
    .title-card h1 {
        font-family: 'Lora', Georgia, serif;
        font-weight: 600;
        font-size: 20px;
        color: var(--moss);
        margin-bottom: 4px;
    }
    .title-card p {
        font-size: 12px;
        color: var(--dark-moss);
        opacity: 0.75;
    }

    /* Controls panel */
    .controls {
        position: fixed;
        bottom: 20px; left: 20px;
        z-index: 100;
        padding: 18px 20px;
        background: rgba(254, 250, 224, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(138, 154, 91, 0.3);
        border-radius: 20px;
        box-shadow: 0 2px 10px rgba(61, 68, 35, 0.1);
        width: 280px;
    }
    .controls h3 {
        font-family: 'Lora', Georgia, serif;
        font-size: 14px;
        color: var(--moss);
        margin-bottom: 12px;
        font-weight: 600;
    }
    .control-row {
        display: flex; flex-direction: column;
        margin-bottom: 10px;
    }
    .control-row label {
        font-size: 11px;
        color: var(--dark-moss);
        opacity: 0.85;
        display: flex; justify-content: space-between;
        margin-bottom: 3px;
    }
    .control-row input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 4px;
        background: rgba(138, 154, 91, 0.25);
        border-radius: 4px;
        outline: none;
    }
    .control-row input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px; height: 14px;
        background: var(--sage);
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid var(--cream);
    }
    .control-row input[type="range"]::-moz-range-thumb {
        width: 14px; height: 14px;
        background: var(--sage);
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid var(--cream);
    }
    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    button {
        flex: 1;
        padding: 8px 12px;
        background: var(--terracotta);
        color: var(--cream);
        border: none;
        border-radius: 12px;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, background 0.2s;
    }
    button:hover { transform: translateY(-1px); background: #a55d1e; }
    button.secondary { background: var(--sage); }
    button.secondary:hover { background: var(--moss); }

    /* Stats */
    .stats {
        position: fixed;
        bottom: 20px; right: 20px;
        z-index: 100;
        padding: 16px 20px;
        background: rgba(254, 250, 224, 0.85);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(138, 154, 91, 0.3);
        border-radius: 20px;
        box-shadow: 0 2px 10px rgba(61, 68, 35, 0.1);
        min-width: 200px;
    }
    .stats h3 {
        font-family: 'Lora', Georgia, serif;
        font-size: 14px;
        color: var(--moss);
        margin-bottom: 10px;
        font-weight: 600;
    }
    .stat-line {
        display: flex; justify-content: space-between;
        font-size: 12px;
        margin-bottom: 5px;
        color: var(--dark-moss);
    }
    .stat-value { font-weight: 700; font-variant-numeric: tabular-nums; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .bar-wrap { height: 6px; background: rgba(138, 154, 91, 0.2); border-radius: 4px; overflow: hidden; margin-top: 4px; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--terracotta), var(--sage)); transition: width 0.3s; }

    @media (max-width: 720px) {
        .controls, .stats { width: calc(50% - 28px); min-width: unset; font-size: 11px; }
        .controls { bottom: 10px; left: 10px; padding: 10px 12px; }
        .stats { bottom: 10px; right: 10px; padding: 10px 12px; }
        .title-card { max-width: 200px; padding: 10px 14px; top: 10px; right: 10px; }
        .title-card h1 { font-size: 15px; }
        .organic-back-link { top: 10px; left: 10px; padding: 7px 12px; font-size: 12px; }
    }
</style>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<a href="index.html" class="organic-back-link">
    <span class="back-arrow">&larr;</span>
    <span class="back-text">Gallery</span>
</a>
<div class="title-card">
    <h1>Immune System Agents</h1>
    <p>Pathogens, macrophages &amp; T-cells in tissue</p>
</div>
<canvas id="canvas"></canvas>

<div class="controls">
    <h3>Controls</h3>
    <div class="control-row">
        <label>Initial pathogens <span id="valP">25</span></label>
        <input type="range" id="pathCount" min="0" max="100" value="25">
    </div>
    <div class="control-row">
        <label>Macrophages <span id="valM">20</span></label>
        <input type="range" id="macroCount" min="0" max="60" value="20">
    </div>
    <div class="control-row">
        <label>T-cells <span id="valT">12</span></label>
        <input type="range" id="tcellCount" min="0" max="60" value="12">
    </div>
    <div class="control-row">
        <label>Mutation rate <span id="valMu">0.05</span></label>
        <input type="range" id="mutRate" min="0" max="100" value="5">
    </div>
    <div class="btn-row">
        <button id="inject">Inject pathogens</button>
        <button id="reset" class="secondary">Reset</button>
    </div>
</div>

<div class="stats">
    <h3>Live Stats</h3>
    <div class="stat-line"><span><span class="dot" style="background:var(--terracotta)"></span>Pathogens</span><span class="stat-value" id="sPath">0</span></div>
    <div class="stat-line"><span><span class="dot" style="background:var(--sage)"></span>Macrophages</span><span class="stat-value" id="sMacro">0</span></div>
    <div class="stat-line"><span><span class="dot" style="background:var(--earth)"></span>T-cells</span><span class="stat-value" id="sTcell">0</span></div>
    <div class="stat-line"><span><span class="dot" style="background:#c0524a"></span>Infected cells</span><span class="stat-value" id="sInf">0</span></div>
    <div class="stat-line" style="margin-top:8px"><span>Tissue health</span><span class="stat-value" id="sHealth">100%</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="healthBar" style="width:100%"></div></div>
</div>

<script>
(function () {
    'use strict';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0, DPR = 1;

    function resize() {
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * DPR;
        canvas.height = H * DPR;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        buildTissue();
    }
    window.addEventListener('resize', resize);

    // --- Params ---
    const params = {
        initPath: 25,
        initMacro: 20,
        initT: 12,
        mutRate: 0.05
    };

    // Tissue grid: each cell has infection level (0 unhealthy=never, 0 health..1; infected if infected=true with antigen)
    let tissue = []; // {health, infected, antigen, load}
    let tW = 0, tH = 0;
    const CELL = 18;

    function buildTissue() {
        tW = Math.ceil(W / CELL);
        tH = Math.ceil(H / CELL);
        tissue = new Array(tW * tH);
        for (let i = 0; i < tissue.length; i++) {
            tissue[i] = {
                health: 1,
                infected: false,
                antigen: 0,
                load: 0,
                // subtle noise offset for texture
                n: Math.random()
            };
        }
    }

    function tIdx(cx, cy) { return cy * tW + cx; }
    function tAt(x, y) {
        const cx = Math.floor(x / CELL);
        const cy = Math.floor(y / CELL);
        if (cx < 0 || cy < 0 || cx >= tW || cy >= tH) return null;
        return tissue[tIdx(cx, cy)];
    }

    // --- Agents ---
    // Antigens are 8-bit patterns (0..255)
    function mutateAntigen(a, rate) {
        let res = a;
        for (let b = 0; b < 8; b++) {
            if (Math.random() < rate) res ^= (1 << b);
        }
        return res & 0xFF;
    }

    function popcount(x) {
        x = x - ((x >> 1) & 0x55);
        x = (x & 0x33) + ((x >> 2) & 0x33);
        return (x + (x >> 4)) & 0x0F;
    }
    function similarity(a, b) {
        // 1.0 when identical; 0 when fully opposite
        return 1 - popcount((a ^ b) & 0xFF) / 8;
    }

    let pathogens = [];
    let macrophages = [];
    let tcells = [];
    let tick = 0;

    function spawnPathogen(x, y, antigen) {
        pathogens.push({
            x: x ?? Math.random() * W,
            y: y ?? Math.random() * H,
            vx: (Math.random() - 0.5) * 1.2,
            vy: (Math.random() - 0.5) * 1.2,
            antigen: antigen ?? Math.floor(Math.random() * 256),
            age: 0,
            hp: 1
        });
    }
    function spawnMacrophage() {
        macrophages.push({
            x: Math.random() * W,
            y: Math.random() * H,
            vx: (Math.random() - 0.5) * 1.6,
            vy: (Math.random() - 0.5) * 1.6,
            fed: 0,
            heading: Math.random() * Math.PI * 2
        });
    }
    function spawnTcell(antigen) {
        tcells.push({
            x: Math.random() * W,
            y: Math.random() * H,
            vx: (Math.random() - 0.5) * 1.8,
            vy: (Math.random() - 0.5) * 1.8,
            activated: antigen !== undefined,
            antigen: antigen ?? Math.floor(Math.random() * 256),
            energy: 100,
            kills: 0,
            heading: Math.random() * Math.PI * 2
        });
    }

    function resetSim() {
        pathogens.length = 0;
        macrophages.length = 0;
        tcells.length = 0;
        buildTissue();
        for (let i = 0; i < params.initPath; i++) spawnPathogen();
        for (let i = 0; i < params.initMacro; i++) spawnMacrophage();
        for (let i = 0; i < params.initT; i++) spawnTcell();
    }

    // --- Simulation step ---
    function wander(agent, turn) {
        agent.heading += (Math.random() - 0.5) * turn;
        const sp = Math.hypot(agent.vx, agent.vy) || 1;
        agent.vx = Math.cos(agent.heading) * sp;
        agent.vy = Math.sin(agent.heading) * sp;
    }

    function step() {
        tick++;

        // --- Pathogens ---
        for (let i = pathogens.length - 1; i >= 0; i--) {
            const p = pathogens[i];
            wander(p, 0.5);
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) { p.x = 0; p.vx *= -1; p.heading = Math.atan2(p.vy, p.vx); }
            if (p.x > W) { p.x = W; p.vx *= -1; p.heading = Math.atan2(p.vy, p.vx); }
            if (p.y < 0) { p.y = 0; p.vy *= -1; p.heading = Math.atan2(p.vy, p.vx); }
            if (p.y > H) { p.y = H; p.vy *= -1; p.heading = Math.atan2(p.vy, p.vx); }
            p.age++;

            // Infect tissue cell beneath
            const cell = tAt(p.x, p.y);
            if (cell && cell.health > 0) {
                if (!cell.infected) {
                    if (Math.random() < 0.08) {
                        cell.infected = true;
                        cell.antigen = p.antigen;
                        cell.load = 1;
                    }
                } else {
                    cell.load = Math.min(cell.load + 0.02, 3);
                    // Drain cell health when heavily loaded
                    cell.health = Math.max(0, cell.health - 0.0015 * cell.load);
                }
            }

            // Reproduce in infected cell
            if (cell && cell.infected && pathogens.length < 800 && Math.random() < 0.004 * cell.load) {
                const child = {
                    x: p.x + (Math.random() - 0.5) * 6,
                    y: p.y + (Math.random() - 0.5) * 6,
                    vx: (Math.random() - 0.5) * 1.2,
                    vy: (Math.random() - 0.5) * 1.2,
                    antigen: mutateAntigen(cell.antigen, params.mutRate),
                    age: 0,
                    hp: 1
                };
                child.heading = Math.atan2(child.vy, child.vx);
                pathogens.push(child);
            }

            if (p.hp <= 0) pathogens.splice(i, 1);
        }

        // --- Macrophages (phagocytose nearby pathogens) ---
        for (const m of macrophages) {
            wander(m, 0.3);
            m.x += m.vx; m.y += m.vy;
            if (m.x < 0 || m.x > W) m.vx *= -1;
            if (m.y < 0 || m.y > H) m.vy *= -1;
            m.x = Math.max(0, Math.min(W, m.x));
            m.y = Math.max(0, Math.min(H, m.y));

            // Scan nearby pathogens
            for (let j = pathogens.length - 1; j >= 0; j--) {
                const p = pathogens[j];
                const dx = p.x - m.x, dy = p.y - m.y;
                const d2 = dx * dx + dy * dy;
                if (d2 < 12 * 12) {
                    // Phagocytose
                    pathogens.splice(j, 1);
                    m.fed++;
                    // Present antigen: small chance to spawn an activated T-cell
                    if (Math.random() < 0.18 && tcells.length < 500) {
                        spawnTcell(p.antigen);
                    }
                }
            }

            // Slight healing bias to nearby tissue
            const cell = tAt(m.x, m.y);
            if (cell && cell.health < 1 && !cell.infected) {
                cell.health = Math.min(1, cell.health + 0.0008);
            }
        }

        // --- T-cells ---
        for (let i = tcells.length - 1; i >= 0; i--) {
            const t = tcells[i];
            wander(t, t.activated ? 0.25 : 0.45);
            t.x += t.vx; t.y += t.vy;
            if (t.x < 0 || t.x > W) t.vx *= -1;
            if (t.y < 0 || t.y > H) t.vy *= -1;
            t.x = Math.max(0, Math.min(W, t.x));
            t.y = Math.max(0, Math.min(H, t.y));
            t.energy -= 0.02;

            // Check tissue cell
            const cell = tAt(t.x, t.y);
            if (cell && cell.infected) {
                const sim = similarity(t.antigen, cell.antigen);
                if (sim >= 0.75) {
                    // Activated + matching -> kill infected cell
                    t.activated = true;
                    t.kills++;
                    cell.infected = false;
                    cell.load = 0;
                    cell.health = Math.max(0.15, cell.health);
                    // Also kill any pathogens standing on this cell
                    for (let j = pathogens.length - 1; j >= 0; j--) {
                        const p = pathogens[j];
                        if (Math.floor(p.x / CELL) === Math.floor(t.x / CELL) &&
                            Math.floor(p.y / CELL) === Math.floor(t.y / CELL)) {
                            pathogens.splice(j, 1);
                        }
                    }
                } else if (!t.activated && sim >= 0.5) {
                    // Weak match — activate
                    t.activated = true;
                    t.antigen = mutateAntigen(cell.antigen, 0.1);
                }
            }

            // Also check adjacent pathogens for matching (T-cells attacking free pathogens)
            for (let j = pathogens.length - 1; j >= 0; j--) {
                const p = pathogens[j];
                const dx = p.x - t.x, dy = p.y - t.y;
                if (dx * dx + dy * dy < 10 * 10) {
                    const sim = similarity(t.antigen, p.antigen);
                    if (t.activated && sim >= 0.75) {
                        pathogens.splice(j, 1);
                        t.kills++;
                    }
                }
            }

            // Proliferation if recently active
            if (t.activated && t.kills >= 2 && t.energy > 50 && tcells.length < 400 && Math.random() < 0.015) {
                spawnTcell(mutateAntigen(t.antigen, 0.05));
                t.kills = 0;
                t.energy -= 15;
            }

            if (t.energy <= 0) tcells.splice(i, 1);
        }

        // --- Tissue regen & infection clearance ---
        for (let i = 0; i < tissue.length; i++) {
            const c = tissue[i];
            if (c.infected) {
                if (c.health <= 0) {
                    c.infected = false;
                    c.load = 0;
                }
            } else {
                if (c.health < 1) c.health = Math.min(1, c.health + 0.0004);
            }
        }

        // Macrophage deaths (rare, simulates lifespan)
        if (tick % 240 === 0 && macrophages.length > 0 && Math.random() < 0.3) {
            macrophages.splice(Math.floor(Math.random() * macrophages.length), 1);
            spawnMacrophage();
        }
    }

    // --- Rendering ---
    function draw() {
        // Cream base
        ctx.fillStyle = '#FEFAE0';
        ctx.fillRect(0, 0, W, H);

        // Tissue background (subtle) — each cell drawn with soft fill
        for (let cy = 0; cy < tH; cy++) {
            for (let cx = 0; cx < tW; cx++) {
                const c = tissue[tIdx(cx, cy)];
                const x = cx * CELL, y = cy * CELL;

                // Base tissue color: slight variation from cream to sage
                const healthTint = c.health;
                if (c.infected) {
                    // Red-tinged infected cell
                    const load = Math.min(1, c.load / 2);
                    const r = Math.round(188 + 50 * load);
                    const g = Math.round(108 * (1 - 0.4 * load) + 60);
                    const b = Math.round(80 * (1 - 0.5 * load) + 50);
                    ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (0.28 + 0.35 * load).toFixed(2) + ')';
                } else {
                    // Subtle cream with noise & health
                    const base = 240 + Math.floor(c.n * 12);
                    const g = Math.round(base - (1 - healthTint) * 40);
                    ctx.fillStyle = 'rgba(' + base + ',' + g + ',' + (220 - (1 - healthTint) * 60) + ',0.55)';
                }
                ctx.fillRect(x, y, CELL, CELL);

                // subtle cell wall lines
                if (c.health < 1 || c.infected) {
                    ctx.strokeStyle = c.infected ? 'rgba(140, 60, 40, 0.25)' : 'rgba(138, 154, 91, 0.12)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x + 0.5, y + 0.5, CELL - 1, CELL - 1);
                }
            }
        }

        // Overall cream wash to soften
        ctx.fillStyle = 'rgba(254, 250, 224, 0.18)';
        ctx.fillRect(0, 0, W, H);

        // --- Draw Macrophages (sage, larger) ---
        for (const m of macrophages) {
            // blobby body
            ctx.beginPath();
            const wobble = Math.sin(tick * 0.1 + m.x * 0.1) * 1.5;
            ctx.fillStyle = 'rgba(138, 154, 91, 0.85)';
            ctx.arc(m.x, m.y, 7 + wobble * 0.3, 0, Math.PI * 2);
            ctx.fill();
            // Pseudopodia hint
            ctx.strokeStyle = 'rgba(96, 108, 56, 0.5)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(m.x, m.y, 10, 0, Math.PI * 2);
            ctx.stroke();
            // Nucleus
            ctx.fillStyle = 'rgba(61, 68, 35, 0.6)';
            ctx.beginPath();
            ctx.arc(m.x - 1.5, m.y - 1.5, 2.3, 0, Math.PI * 2);
            ctx.fill();
        }

        // --- Draw T-cells (earth) ---
        for (const t of tcells) {
            ctx.beginPath();
            ctx.fillStyle = t.activated ? 'rgba(221, 161, 94, 0.95)' : 'rgba(221, 161, 94, 0.55)';
            ctx.arc(t.x, t.y, t.activated ? 5.5 : 4.5, 0, Math.PI * 2);
            ctx.fill();
            if (t.activated) {
                // Spiky receptor hint
                ctx.strokeStyle = 'rgba(188, 108, 37, 0.6)';
                ctx.lineWidth = 1.1;
                for (let k = 0; k < 6; k++) {
                    const a = (k / 6) * Math.PI * 2 + tick * 0.02;
                    ctx.beginPath();
                    ctx.moveTo(t.x + Math.cos(a) * 5, t.y + Math.sin(a) * 5);
                    ctx.lineTo(t.x + Math.cos(a) * 8, t.y + Math.sin(a) * 8);
                    ctx.stroke();
                }
            }
            // Inner dot
            ctx.fillStyle = 'rgba(96, 54, 18, 0.7)';
            ctx.beginPath();
            ctx.arc(t.x, t.y, 1.4, 0, Math.PI * 2);
            ctx.fill();
        }

        // --- Draw Pathogens (terracotta, spiky) ---
        for (const p of pathogens) {
            ctx.fillStyle = 'rgba(188, 108, 37, 0.92)';
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
            ctx.fill();
            // Spikes encoding antigen — 8 spikes, length by bit
            ctx.strokeStyle = 'rgba(120, 60, 18, 0.7)';
            ctx.lineWidth = 1;
            for (let b = 0; b < 8; b++) {
                const a = (b / 8) * Math.PI * 2 + p.age * 0.02;
                const bit = (p.antigen >> b) & 1;
                const len = bit ? 4.2 : 2.2;
                ctx.beginPath();
                ctx.moveTo(p.x + Math.cos(a) * 3, p.y + Math.sin(a) * 3);
                ctx.lineTo(p.x + Math.cos(a) * (3 + len), p.y + Math.sin(a) * (3 + len));
                ctx.stroke();
            }
        }
    }

    // --- Stats ---
    const sPath = document.getElementById('sPath');
    const sMacro = document.getElementById('sMacro');
    const sTcell = document.getElementById('sTcell');
    const sInf = document.getElementById('sInf');
    const sHealth = document.getElementById('sHealth');
    const healthBar = document.getElementById('healthBar');

    let statTick = 0;
    function updateStats() {
        statTick++;
        if (statTick % 6 !== 0) return;
        let infected = 0;
        let totalHealth = 0;
        for (const c of tissue) {
            if (c.infected) infected++;
            totalHealth += c.health;
        }
        const hPct = tissue.length ? (totalHealth / tissue.length) * 100 : 100;
        sPath.textContent = pathogens.length;
        sMacro.textContent = macrophages.length;
        sTcell.textContent = tcells.length;
        sInf.textContent = infected;
        sHealth.textContent = hPct.toFixed(0) + '%';
        healthBar.style.width = hPct.toFixed(1) + '%';
    }

    // --- Main loop ---
    function loop() {
        step();
        draw();
        updateStats();
        requestAnimationFrame(loop);
    }

    // --- Controls wiring ---
    const pathCountEl = document.getElementById('pathCount');
    const macroCountEl = document.getElementById('macroCount');
    const tcellCountEl = document.getElementById('tcellCount');
    const mutRateEl = document.getElementById('mutRate');
    const valP = document.getElementById('valP');
    const valM = document.getElementById('valM');
    const valT = document.getElementById('valT');
    const valMu = document.getElementById('valMu');

    function syncLabels() {
        valP.textContent = pathCountEl.value;
        valM.textContent = macroCountEl.value;
        valT.textContent = tcellCountEl.value;
        valMu.textContent = (parseInt(mutRateEl.value, 10) / 100).toFixed(2);
    }

    pathCountEl.addEventListener('input', () => { params.initPath = +pathCountEl.value; syncLabels(); });
    macroCountEl.addEventListener('input', () => { params.initMacro = +macroCountEl.value; syncLabels(); });
    tcellCountEl.addEventListener('input', () => { params.initT = +tcellCountEl.value; syncLabels(); });
    mutRateEl.addEventListener('input', () => { params.mutRate = +mutRateEl.value / 100; syncLabels(); });

    document.getElementById('inject').addEventListener('click', () => {
        const n = Math.max(5, Math.floor(params.initPath * 0.5));
        // Cluster injection
        const cx = Math.random() * W, cy = Math.random() * H;
        const antigen = Math.floor(Math.random() * 256);
        for (let i = 0; i < n; i++) {
            const a = Math.random() * Math.PI * 2;
            const r = Math.random() * 40;
            spawnPathogen(cx + Math.cos(a) * r, cy + Math.sin(a) * r, mutateAntigen(antigen, 0.05));
        }
    });
    document.getElementById('reset').addEventListener('click', resetSim);

    // --- Go ---
    resize();
    syncLabels();
    resetSim();
    loop();
})();
</script>
</body>
</html>
