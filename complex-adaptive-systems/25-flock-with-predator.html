<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flock & Predator — Complex Adaptive Systems</title>
<style>
    :root {
        --sage: #8A9A5B;
        --moss: #606C38;
        --earth: #DDA15E;
        --cream: #FEFAE0;
        --terracotta: #BC6C25;
        --dark-moss: #3d4423;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        width: 100%;
        height: 100%;
        background: #0a0a0f;
        overflow: hidden;
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: var(--cream);
    }

    canvas {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
    }

    .organic-back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 10;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(254, 250, 224, 0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(254, 250, 224, 0.15);
        border-radius: 30px 28px 32px 26px;
        color: var(--cream);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .organic-back-link:hover {
        background: rgba(138, 154, 91, 0.25);
        border-color: var(--sage);
        transform: translateX(-3px);
    }

    .back-arrow { font-size: 16px; line-height: 1; }

    .title {
        position: fixed;
        top: 22px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9;
        font-family: 'Lora', Georgia, serif;
        font-weight: 600;
        font-size: 22px;
        color: var(--cream);
        letter-spacing: 0.5px;
        text-shadow: 0 2px 12px rgba(0,0,0,0.6);
        pointer-events: none;
    }

    .controls {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px 20px;
        max-width: calc(100vw - 40px);
        padding: 16px 22px;
        background: rgba(10, 10, 15, 0.55);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(254, 250, 224, 0.12);
        border-radius: 26px 30px 24px 28px;
    }

    .control {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        min-width: 130px;
    }

    .control label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--earth);
    }

    .control .value {
        color: var(--cream);
        font-weight: 400;
        margin-left: 6px;
    }

    input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 140px;
        height: 4px;
        background: rgba(254, 250, 224, 0.18);
        border-radius: 2px;
        outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        background: var(--sage);
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
        background: var(--earth);
        transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        background: var(--sage);
        border-radius: 50%;
        cursor: pointer;
        border: none;
    }

    button {
        padding: 10px 20px;
        background: rgba(188, 108, 37, 0.25);
        border: 1px solid var(--terracotta);
        border-radius: 22px 18px 24px 20px;
        color: var(--cream);
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.25s ease;
        align-self: flex-end;
    }

    button:hover {
        background: var(--terracotta);
        transform: translateY(-2px);
    }

    @media (max-width: 720px) {
        .title { font-size: 16px; top: 70px; }
        .organic-back-link { font-size: 12px; padding: 8px 14px; }
        .control { min-width: 110px; }
        input[type="range"] { width: 110px; }
    }
</style>
</head>
<body>
<a href="../index.html" class="organic-back-link">
    <span class="back-arrow">&larr;</span>
    <span class="back-text">Gallery</span>
</a>

<div class="title">Flock with Predator</div>

<canvas id="canvas"></canvas>

<div class="controls">
    <div class="control">
        <label>Boids <span class="value" id="boidCountVal">400</span></label>
        <input type="range" id="boidCount" min="100" max="600" step="20" value="400">
    </div>
    <div class="control">
        <label>Predators <span class="value" id="predCountVal">1</span></label>
        <input type="range" id="predCount" min="0" max="3" step="1" value="1">
    </div>
    <div class="control">
        <label>Flee Radius <span class="value" id="fleeRadiusVal">100</span></label>
        <input type="range" id="fleeRadius" min="40" max="220" step="5" value="100">
    </div>
    <div class="control">
        <label>Flee Weight <span class="value" id="fleeWeightVal">2.2</span></label>
        <input type="range" id="fleeWeight" min="0" max="5" step="0.1" value="2.2">
    </div>
    <div class="control">
        <label>Predator Speed <span class="value" id="predSpeedVal">3.2</span></label>
        <input type="range" id="predSpeed" min="1" max="6" step="0.1" value="3.2">
    </div>
    <button id="resetBtn">Reset</button>
</div>

<script>
(function() {
    'use strict';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let W = 0, H = 0;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * DPR;
        canvas.height = H * DPR;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // Parameters
    const params = {
        boidCount: 400,
        predCount: 1,
        fleeRadius: 100,
        fleeWeight: 2.2,
        predSpeed: 3.2,
        // Flocking tuning
        perception: 55,
        separationDist: 22,
        maxSpeed: 2.8,
        maxForce: 0.05,
        alignWeight: 1.0,
        cohesionWeight: 0.9,
        separationWeight: 1.5,
        // Predator
        predMaxForce: 0.08,
        predSize: 10
    };

    // Vector helpers (in-place ops on {x,y})
    function limit(v, max) {
        const mag = Math.hypot(v.x, v.y);
        if (mag > max && mag > 0) {
            v.x = (v.x / mag) * max;
            v.y = (v.y / mag) * max;
        }
    }
    function setMag(v, m) {
        const mag = Math.hypot(v.x, v.y);
        if (mag > 0) {
            v.x = (v.x / mag) * m;
            v.y = (v.y / mag) * m;
        }
    }

    // Boids
    let boids = [];
    let predators = [];

    function makeBoid() {
        const a = Math.random() * Math.PI * 2;
        const s = 1 + Math.random() * 1.5;
        return {
            x: Math.random() * W,
            y: Math.random() * H,
            vx: Math.cos(a) * s,
            vy: Math.sin(a) * s,
            ax: 0,
            ay: 0
        };
    }

    function makePredator() {
        const a = Math.random() * Math.PI * 2;
        return {
            x: Math.random() * W,
            y: Math.random() * H,
            vx: Math.cos(a) * 1.5,
            vy: Math.sin(a) * 1.5,
            ax: 0,
            ay: 0
        };
    }

    function initBoids() {
        boids = [];
        for (let i = 0; i < params.boidCount; i++) boids.push(makeBoid());
    }
    function initPredators() {
        predators = [];
        for (let i = 0; i < params.predCount; i++) predators.push(makePredator());
    }

    function syncBoidCount() {
        while (boids.length < params.boidCount) boids.push(makeBoid());
        if (boids.length > params.boidCount) boids.length = params.boidCount;
    }
    function syncPredCount() {
        while (predators.length < params.predCount) predators.push(makePredator());
        if (predators.length > params.predCount) predators.length = params.predCount;
    }

    initBoids();
    initPredators();

    function wrap(p) {
        if (p.x < -10) p.x = W + 10;
        else if (p.x > W + 10) p.x = -10;
        if (p.y < -10) p.y = H + 10;
        else if (p.y > H + 10) p.y = -10;
    }

    function updateBoids() {
        const perceptionSq = params.perception * params.perception;
        const sepSq = params.separationDist * params.separationDist;
        const fleeSq = params.fleeRadius * params.fleeRadius;

        // Spatial grid for neighbors
        const cell = params.perception;
        const cols = Math.max(1, Math.ceil(W / cell));
        const rows = Math.max(1, Math.ceil(H / cell));
        const grid = new Array(cols * rows);
        for (let i = 0; i < grid.length; i++) grid[i] = null;

        for (let i = 0; i < boids.length; i++) {
            const b = boids[i];
            const cx = Math.min(cols - 1, Math.max(0, Math.floor(b.x / cell)));
            const cy = Math.min(rows - 1, Math.max(0, Math.floor(b.y / cell)));
            const idx = cy * cols + cx;
            if (!grid[idx]) grid[idx] = [];
            grid[idx].push(i);
        }

        for (let i = 0; i < boids.length; i++) {
            const b = boids[i];
            const cx = Math.min(cols - 1, Math.max(0, Math.floor(b.x / cell)));
            const cy = Math.min(rows - 1, Math.max(0, Math.floor(b.y / cell)));

            let alignX = 0, alignY = 0, alignN = 0;
            let cohX = 0, cohY = 0, cohN = 0;
            let sepX = 0, sepY = 0, sepN = 0;

            for (let dy = -1; dy <= 1; dy++) {
                const ny = cy + dy;
                if (ny < 0 || ny >= rows) continue;
                for (let dx = -1; dx <= 1; dx++) {
                    const nx = cx + dx;
                    if (nx < 0 || nx >= cols) continue;
                    const cellList = grid[ny * cols + nx];
                    if (!cellList) continue;
                    for (let k = 0; k < cellList.length; k++) {
                        const j = cellList[k];
                        if (j === i) continue;
                        const o = boids[j];
                        const ddx = o.x - b.x;
                        const ddy = o.y - b.y;
                        const d2 = ddx * ddx + ddy * ddy;
                        if (d2 < perceptionSq) {
                            alignX += o.vx; alignY += o.vy; alignN++;
                            cohX += o.x; cohY += o.y; cohN++;
                        }
                        if (d2 < sepSq && d2 > 0) {
                            const inv = 1 / Math.sqrt(d2);
                            sepX -= ddx * inv;
                            sepY -= ddy * inv;
                            sepN++;
                        }
                    }
                }
            }

            // Accumulate steering
            let ax = 0, ay = 0;

            // Alignment
            if (alignN > 0) {
                let vx = alignX / alignN;
                let vy = alignY / alignN;
                const v = { x: vx, y: vy };
                setMag(v, params.maxSpeed);
                v.x -= b.vx; v.y -= b.vy;
                limit(v, params.maxForce);
                ax += v.x * params.alignWeight;
                ay += v.y * params.alignWeight;
            }

            // Cohesion
            if (cohN > 0) {
                let tx = cohX / cohN - b.x;
                let ty = cohY / cohN - b.y;
                const v = { x: tx, y: ty };
                setMag(v, params.maxSpeed);
                v.x -= b.vx; v.y -= b.vy;
                limit(v, params.maxForce);
                ax += v.x * params.cohesionWeight;
                ay += v.y * params.cohesionWeight;
            }

            // Separation
            if (sepN > 0) {
                let v = { x: sepX / sepN, y: sepY / sepN };
                setMag(v, params.maxSpeed);
                v.x -= b.vx; v.y -= b.vy;
                limit(v, params.maxForce * 1.5);
                ax += v.x * params.separationWeight;
                ay += v.y * params.separationWeight;
            }

            // Flee predators
            let fleeX = 0, fleeY = 0, fleeN = 0;
            for (let p = 0; p < predators.length; p++) {
                const pr = predators[p];
                const ddx = b.x - pr.x;
                const ddy = b.y - pr.y;
                const d2 = ddx * ddx + ddy * ddy;
                if (d2 < fleeSq && d2 > 0) {
                    const inv = 1 / Math.sqrt(d2);
                    // Weight inversely by distance so close danger dominates
                    const w = (params.fleeRadius - Math.sqrt(d2)) / params.fleeRadius;
                    fleeX += ddx * inv * w;
                    fleeY += ddy * inv * w;
                    fleeN++;
                }
            }
            if (fleeN > 0) {
                const v = { x: fleeX, y: fleeY };
                setMag(v, params.maxSpeed);
                v.x -= b.vx; v.y -= b.vy;
                limit(v, params.maxForce * 3);
                ax += v.x * params.fleeWeight;
                ay += v.y * params.fleeWeight;
            }

            b.ax = ax;
            b.ay = ay;
        }

        // Apply accelerations
        for (let i = 0; i < boids.length; i++) {
            const b = boids[i];
            b.vx += b.ax;
            b.vy += b.ay;
            const sp = Math.hypot(b.vx, b.vy);
            const maxS = params.maxSpeed;
            if (sp > maxS) { b.vx = (b.vx / sp) * maxS; b.vy = (b.vy / sp) * maxS; }
            b.x += b.vx;
            b.y += b.vy;
            wrap(b);
        }
    }

    function updatePredators() {
        for (let p = 0; p < predators.length; p++) {
            const pr = predators[p];
            // Find nearest boid
            let nearest = null;
            let nearestD2 = Infinity;
            for (let i = 0; i < boids.length; i++) {
                const b = boids[i];
                // Shortest wrapped distance
                let dx = b.x - pr.x;
                let dy = b.y - pr.y;
                if (dx > W / 2) dx -= W;
                else if (dx < -W / 2) dx += W;
                if (dy > H / 2) dy -= H;
                else if (dy < -H / 2) dy += H;
                const d2 = dx * dx + dy * dy;
                if (d2 < nearestD2) {
                    nearestD2 = d2;
                    nearest = { dx, dy };
                }
            }

            let ax = 0, ay = 0;
            if (nearest) {
                const mag = Math.sqrt(nearestD2);
                if (mag > 0) {
                    let tx = (nearest.dx / mag) * params.predSpeed;
                    let ty = (nearest.dy / mag) * params.predSpeed;
                    let sx = tx - pr.vx;
                    let sy = ty - pr.vy;
                    const sm = Math.hypot(sx, sy);
                    if (sm > params.predMaxForce) {
                        sx = (sx / sm) * params.predMaxForce;
                        sy = (sy / sm) * params.predMaxForce;
                    }
                    ax += sx; ay += sy;
                }
            }

            pr.vx += ax;
            pr.vy += ay;
            const sp = Math.hypot(pr.vx, pr.vy);
            if (sp > params.predSpeed) {
                pr.vx = (pr.vx / sp) * params.predSpeed;
                pr.vy = (pr.vy / sp) * params.predSpeed;
            }
            pr.x += pr.vx;
            pr.y += pr.vy;
            wrap(pr);
        }
    }

    function drawTriangle(x, y, vx, vy, size, fillStyle) {
        const angle = Math.atan2(vy, vx);
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(size, 0);
        ctx.lineTo(-size * 0.6, size * 0.5);
        ctx.lineTo(-size * 0.6, -size * 0.5);
        ctx.closePath();
        ctx.fillStyle = fillStyle;
        ctx.fill();
        ctx.restore();
    }

    function render() {
        // Motion trails: translucent dark overlay
        ctx.fillStyle = 'rgba(10, 10, 15, 0.18)';
        ctx.fillRect(0, 0, W, H);

        // Boids — alternate cream / sage for subtle variation
        for (let i = 0; i < boids.length; i++) {
            const b = boids[i];
            const color = (i % 3 === 0) ? 'rgba(138, 154, 91, 0.92)' : 'rgba(254, 250, 224, 0.88)';
            drawTriangle(b.x, b.y, b.vx, b.vy, 4.2, color);
        }

        // Predators — terracotta, larger, with soft glow
        for (let p = 0; p < predators.length; p++) {
            const pr = predators[p];
            // Glow
            const grd = ctx.createRadialGradient(pr.x, pr.y, 0, pr.x, pr.y, params.predSize * 3);
            grd.addColorStop(0, 'rgba(188, 108, 37, 0.35)');
            grd.addColorStop(1, 'rgba(188, 108, 37, 0)');
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.arc(pr.x, pr.y, params.predSize * 3, 0, Math.PI * 2);
            ctx.fill();

            drawTriangle(pr.x, pr.y, pr.vx, pr.vy, params.predSize, 'rgba(221, 161, 94, 1)');
            drawTriangle(pr.x, pr.y, pr.vx, pr.vy, params.predSize * 0.7, 'rgba(188, 108, 37, 1)');
        }
    }

    function loop() {
        updateBoids();
        updatePredators();
        render();
        requestAnimationFrame(loop);
    }
    loop();

    // Controls wiring
    function bindSlider(id, valId, key, parseFn, format) {
        const el = document.getElementById(id);
        const val = document.getElementById(valId);
        const update = () => {
            params[key] = parseFn(el.value);
            val.textContent = format ? format(params[key]) : params[key];
        };
        el.addEventListener('input', () => {
            update();
            if (key === 'boidCount') syncBoidCount();
            if (key === 'predCount') syncPredCount();
        });
        update();
    }

    bindSlider('boidCount', 'boidCountVal', 'boidCount', v => parseInt(v, 10));
    bindSlider('predCount', 'predCountVal', 'predCount', v => parseInt(v, 10));
    bindSlider('fleeRadius', 'fleeRadiusVal', 'fleeRadius', v => parseInt(v, 10));
    bindSlider('fleeWeight', 'fleeWeightVal', 'fleeWeight', v => parseFloat(v), v => v.toFixed(1));
    bindSlider('predSpeed', 'predSpeedVal', 'predSpeed', v => parseFloat(v), v => v.toFixed(1));

    document.getElementById('resetBtn').addEventListener('click', () => {
        initBoids();
        initPredators();
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, W, H);
    });
})();
</script>
</body>
</html>
