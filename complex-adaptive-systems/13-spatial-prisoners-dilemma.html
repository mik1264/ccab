<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spatial Prisoner's Dilemma — Complex Adaptive Systems</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        color: #FEFAE0;
    }

    canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }

    .organic-back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(254, 250, 224, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(138, 154, 91, 0.3);
        border-radius: 999px;
        color: #FEFAE0;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 100;
    }

    .organic-back-link:hover {
        background: rgba(138, 154, 91, 0.25);
        transform: translateX(-3px);
        border-color: rgba(138, 154, 91, 0.6);
    }

    .back-arrow {
        font-size: 16px;
        font-weight: 600;
    }

    .panel {
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(20, 20, 28, 0.75);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(138, 154, 91, 0.25);
        border-radius: 16px;
        padding: 20px 22px;
        min-width: 260px;
        z-index: 100;
    }

    .panel h1 {
        font-family: 'Lora', Georgia, serif;
        font-size: 18px;
        font-weight: 600;
        color: #DDA15E;
        margin-bottom: 14px;
        letter-spacing: 0.3px;
    }

    .control {
        margin-bottom: 12px;
    }

    .control label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        font-weight: 500;
        color: rgba(254, 250, 224, 0.75);
        margin-bottom: 6px;
        letter-spacing: 0.2px;
    }

    .control label span {
        color: #8A9A5B;
        font-weight: 600;
    }

    .control input[type="range"] {
        width: 100%;
        height: 4px;
        background: rgba(138, 154, 91, 0.2);
        border-radius: 2px;
        outline: none;
        -webkit-appearance: none;
        appearance: none;
    }

    .control input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        background: #8A9A5B;
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.2s;
    }

    .control input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        background: #DDA15E;
    }

    .control input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        background: #8A9A5B;
        border-radius: 50%;
        cursor: pointer;
        border: none;
    }

    .buttons {
        display: flex;
        gap: 8px;
        margin-top: 14px;
    }

    button {
        flex: 1;
        padding: 8px 14px;
        background: rgba(138, 154, 91, 0.2);
        border: 1px solid rgba(138, 154, 91, 0.4);
        border-radius: 8px;
        color: #FEFAE0;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.3px;
    }

    button:hover {
        background: rgba(138, 154, 91, 0.35);
        border-color: #8A9A5B;
    }

    button.primary {
        background: rgba(221, 161, 94, 0.2);
        border-color: rgba(221, 161, 94, 0.5);
    }

    button.primary:hover {
        background: rgba(221, 161, 94, 0.35);
        border-color: #DDA15E;
    }

    .stats {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: rgba(20, 20, 28, 0.75);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(138, 154, 91, 0.25);
        border-radius: 16px;
        padding: 16px 20px;
        z-index: 100;
        font-size: 13px;
        min-width: 200px;
    }

    .stats div {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
    }

    .stats div:last-child {
        margin-bottom: 0;
    }

    .stats .value {
        color: #DDA15E;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }

    .legend {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: rgba(20, 20, 28, 0.75);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(138, 154, 91, 0.25);
        border-radius: 16px;
        padding: 14px 18px;
        z-index: 100;
        font-size: 12px;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
    }

    .legend-item:last-child {
        margin-bottom: 0;
    }

    .swatch {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        flex-shrink: 0;
    }

    .caption {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        text-align: center;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 50;
    }

    .caption h2 {
        font-family: 'Lora', Georgia, serif;
        font-size: 48px;
        color: rgba(254, 250, 224, 0.6);
        font-weight: 400;
        letter-spacing: 2px;
    }
</style>
</head>
<body>

<a href="index.html" class="organic-back-link">
    <span class="back-arrow">&larr;</span>
    <span class="back-text">Gallery</span>
</a>

<canvas id="canvas"></canvas>

<div class="panel">
    <h1>Spatial Prisoner's Dilemma</h1>
    <div class="control">
        <label>Temptation (b) <span id="bVal">1.85</span></label>
        <input type="range" id="bSlider" min="1.0" max="2.5" step="0.01" value="1.85">
    </div>
    <div class="control">
        <label>Initial defectors <span id="fVal">10%</span></label>
        <input type="range" id="fSlider" min="0" max="100" step="1" value="10">
    </div>
    <div class="buttons">
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn" class="primary">Reset</button>
    </div>
</div>

<div class="stats">
    <div><span>Cooperators</span><span class="value" id="coopStat">—</span></div>
    <div><span>Defectors</span><span class="value" id="defStat">—</span></div>
    <div><span>Iteration</span><span class="value" id="iterStat">0</span></div>
</div>

<div class="legend">
    <div class="legend-item"><div class="swatch" style="background:#8A9A5B"></div><span>Cooperator (was C)</span></div>
    <div class="legend-item"><div class="swatch" style="background:#BC6C25"></div><span>Defector (was D)</span></div>
    <div class="legend-item"><div class="swatch" style="background:#DDA15E"></div><span>New cooperator (D&rarr;C)</span></div>
    <div class="legend-item"><div class="swatch" style="background:#606C38"></div><span>New defector (C&rarr;D)</span></div>
</div>

<script>
(() => {
    const N = 200;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Off-screen buffer at grid resolution
    const buffer = document.createElement('canvas');
    buffer.width = N;
    buffer.height = N;
    const bctx = buffer.getContext('2d');
    const imgData = bctx.createImageData(N, N);

    // State: 0 = C, 1 = D
    // PrevState: 0 = C, 1 = D
    let state = new Uint8Array(N * N);
    let prev = new Uint8Array(N * N);
    let next = new Uint8Array(N * N);
    let payoff = new Float32Array(N * N);

    // Colors (RGB)
    const COLOR_C_C = [138, 154, 91];   // sage -- was C, still C
    const COLOR_D_D = [188, 108, 37];   // terracotta -- was D, still D
    const COLOR_D_C = [221, 161, 94];   // earth -- was D, now C
    const COLOR_C_D = [96, 108, 56];    // moss -- was C, now D

    let b = 1.85;
    let initFrac = 0.10;
    let iter = 0;
    let paused = false;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // We'll draw buffer stretched to canvas
        ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resize);
    resize();

    function init() {
        for (let i = 0; i < N * N; i++) {
            state[i] = Math.random() < initFrac ? 1 : 0;
            prev[i] = state[i]; // start: prev same as current
        }
        iter = 0;
        draw();
        updateStats();
    }

    // Compute payoff for each cell (sum over 8 neighbors + self-interaction)
    // Nowak-May: each cell plays with 8 neighbors AND itself
    // Payoffs: CC=1, DC=b, CD=0, DD=0 (simplified)
    function step() {
        // Compute payoffs
        for (let y = 0; y < N; y++) {
            for (let x = 0; x < N; x++) {
                const idx = y * N + x;
                const s = state[idx];
                let p = 0;
                // Include self as a partner (Nowak-May style: cell plays with itself too, sometimes)
                // Standard version: 8 neighbors + self = 9 games
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const nx = (x + dx + N) % N;
                        const ny = (y + dy + N) % N;
                        const ns = state[ny * N + nx];
                        // Payoff table: CC=1, DC=b, CD=0, DD=0
                        if (s === 0 && ns === 0) p += 1;
                        else if (s === 1 && ns === 0) p += b;
                        // CD=0, DD=0: no contribution
                    }
                }
                payoff[idx] = p;
            }
        }

        // Each cell adopts strategy of highest-payoff neighbor (including self)
        for (let y = 0; y < N; y++) {
            for (let x = 0; x < N; x++) {
                const idx = y * N + x;
                let bestP = payoff[idx];
                let bestS = state[idx];
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = (x + dx + N) % N;
                        const ny = (y + dy + N) % N;
                        const nidx = ny * N + nx;
                        if (payoff[nidx] > bestP) {
                            bestP = payoff[nidx];
                            bestS = state[nidx];
                        }
                    }
                }
                next[idx] = bestS;
            }
        }

        // Swap: prev <- state, state <- next
        const tmp = prev;
        prev = state;
        state = next;
        next = tmp;
        iter++;
    }

    function draw() {
        const data = imgData.data;
        for (let i = 0; i < N * N; i++) {
            const s = state[i];
            const p = prev[i];
            let c;
            if (p === 0 && s === 0) c = COLOR_C_C;
            else if (p === 1 && s === 1) c = COLOR_D_D;
            else if (p === 1 && s === 0) c = COLOR_D_C;
            else c = COLOR_C_D;
            const j = i * 4;
            data[j] = c[0];
            data[j + 1] = c[1];
            data[j + 2] = c[2];
            data[j + 3] = 255;
        }
        bctx.putImageData(imgData, 0, 0);

        // Fit grid to viewport with aspect-preserving stretch (cover)
        const cw = canvas.width, ch = canvas.height;
        const size = Math.max(cw, ch);
        const offX = (cw - size) / 2;
        const offY = (ch - size) / 2;
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, cw, ch);
        ctx.drawImage(buffer, offX, offY, size, size);
    }

    function updateStats() {
        let coops = 0;
        for (let i = 0; i < N * N; i++) if (state[i] === 0) coops++;
        const total = N * N;
        const cPct = (100 * coops / total).toFixed(1);
        const dPct = (100 * (total - coops) / total).toFixed(1);
        document.getElementById('coopStat').textContent = cPct + '%';
        document.getElementById('defStat').textContent = dPct + '%';
        document.getElementById('iterStat').textContent = iter;
    }

    function loop() {
        if (!paused) {
            step();
            draw();
            updateStats();
        }
        requestAnimationFrame(loop);
    }

    // Controls
    const bSlider = document.getElementById('bSlider');
    const fSlider = document.getElementById('fSlider');
    const bValEl = document.getElementById('bVal');
    const fValEl = document.getElementById('fVal');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');

    bSlider.addEventListener('input', () => {
        b = parseFloat(bSlider.value);
        bValEl.textContent = b.toFixed(2);
    });

    fSlider.addEventListener('input', () => {
        initFrac = parseInt(fSlider.value, 10) / 100;
        fValEl.textContent = fSlider.value + '%';
    });

    pauseBtn.addEventListener('click', () => {
        paused = !paused;
        pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    });

    resetBtn.addEventListener('click', init);

    init();
    loop();
})();
</script>

</body>
</html>
