<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dictyostelium — Complex Adaptive Systems</title>
<style>
  :root {
    --sage: #8A9A5B;
    --moss: #606C38;
    --earth: #DDA15E;
    --cream: #FEFAE0;
    --terracotta: #BC6C25;
    --dark-moss: #3d4423;
    --bg: #0a0a0f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
  }
  canvas {
    display: block;
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }
  .organic-back-link {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px 10px 14px;
    background: rgba(254, 250, 224, 0.12);
    border: 1px solid rgba(254, 250, 224, 0.22);
    border-radius: 999px;
    color: var(--cream);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .organic-back-link:hover {
    background: rgba(188, 108, 37, 0.25);
    border-color: rgba(221, 161, 94, 0.5);
    transform: translateX(-2px);
  }
  .back-arrow { font-size: 15px; line-height: 1; }
  .back-text { line-height: 1; }

  .title-plate {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 90;
    padding: 10px 22px;
    background: rgba(10, 10, 15, 0.45);
    border: 1px solid rgba(138, 154, 91, 0.28);
    border-radius: 12px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    text-align: center;
  }
  .title-plate h1 {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 0.04em;
    color: var(--cream);
  }
  .title-plate .subtitle {
    font-size: 11px;
    color: var(--sage);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .panel {
    position: fixed;
    z-index: 80;
    background: rgba(10, 10, 15, 0.55);
    border: 1px solid rgba(138, 154, 91, 0.22);
    border-radius: 14px;
    padding: 16px 18px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: var(--cream);
    font-size: 12px;
  }
  .panel.controls {
    bottom: 20px;
    left: 20px;
    width: 280px;
  }
  .panel.stats {
    bottom: 20px;
    right: 20px;
    width: 230px;
  }
  .panel h3 {
    font-family: 'Georgia', serif;
    font-weight: 500;
    font-size: 13px;
    color: var(--earth);
    margin-bottom: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .ctrl {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 10px;
  }
  .ctrl-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
  }
  .ctrl-label {
    color: rgba(254, 250, 224, 0.75);
    letter-spacing: 0.02em;
  }
  .ctrl-value {
    color: var(--earth);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(138, 154, 91, 0.25);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--earth);
    border: 2px solid var(--cream);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(221, 161, 94, 0.6);
  }
  input[type=range]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--earth);
    border: 2px solid var(--cream);
    cursor: pointer;
  }
  .btn {
    width: 100%;
    padding: 9px;
    margin-top: 4px;
    background: rgba(188, 108, 37, 0.25);
    color: var(--cream);
    border: 1px solid rgba(221, 161, 94, 0.5);
    border-radius: 8px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.25s ease;
  }
  .btn:hover {
    background: rgba(221, 161, 94, 0.35);
    border-color: var(--earth);
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px dashed rgba(138, 154, 91, 0.15);
    font-size: 11.5px;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: rgba(254, 250, 224, 0.7); }
  .stat-val {
    color: var(--sage);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }

  @media (max-width: 720px) {
    .panel.controls { width: calc(100vw - 40px); bottom: 10px; left: 10px; }
    .panel.stats { display: none; }
    .title-plate h1 { font-size: 14px; }
  }
</style>
</head>
<body>

<a href="index.html" class="organic-back-link" aria-label="Back to gallery">
  <span class="back-arrow">←</span>
  <span class="back-text">Gallery</span>
</a>

<div class="title-plate">
  <h1>Dictyostelium Aggregation</h1>
  <div class="subtitle">cAMP spirals · chemotactic amoebae</div>
</div>

<canvas id="field"></canvas>
<canvas id="cells"></canvas>

<div class="panel controls">
  <h3>Parameters</h3>
  <div class="ctrl">
    <div class="ctrl-row"><span class="ctrl-label">Cell count</span><span class="ctrl-value" id="v-cells">4000</span></div>
    <input type="range" id="c-cells" min="500" max="10000" step="100" value="4000">
  </div>
  <div class="ctrl">
    <div class="ctrl-row"><span class="ctrl-label">Excitability</span><span class="ctrl-value" id="v-exc">0.85</span></div>
    <input type="range" id="c-exc" min="0.4" max="1.2" step="0.01" value="0.85">
  </div>
  <div class="ctrl">
    <div class="ctrl-row"><span class="ctrl-label">Refractory period</span><span class="ctrl-value" id="v-ref">0.05</span></div>
    <input type="range" id="c-ref" min="0.02" max="0.12" step="0.005" value="0.05">
  </div>
  <div class="ctrl">
    <div class="ctrl-row"><span class="ctrl-label">Chemotaxis strength</span><span class="ctrl-value" id="v-chem">1.30</span></div>
    <input type="range" id="c-chem" min="0" max="3" step="0.05" value="1.3">
  </div>
  <div class="ctrl">
    <div class="ctrl-row"><span class="ctrl-label">Random pulse rate</span><span class="ctrl-value" id="v-pulse">0.0008</span></div>
    <input type="range" id="c-pulse" min="0" max="0.005" step="0.0001" value="0.0008">
  </div>
  <button class="btn" id="btn-reset">Reset colony</button>
</div>

<div class="panel stats">
  <h3>Live statistics</h3>
  <div class="stat-row"><span class="stat-label">Active cells</span><span class="stat-val" id="s-cells">–</span></div>
  <div class="stat-row"><span class="stat-label">Aggregation centers</span><span class="stat-val" id="s-centers">–</span></div>
  <div class="stat-row"><span class="stat-label">Mean local density</span><span class="stat-val" id="s-density">–</span></div>
  <div class="stat-row"><span class="stat-label">cAMP wave activity</span><span class="stat-val" id="s-activity">–</span></div>
  <div class="stat-row"><span class="stat-label">Frame rate</span><span class="stat-val" id="s-fps">–</span></div>
</div>

<script>
(() => {
  'use strict';

  // =========================================================================
  // Canvas setup — two layered canvases: cAMP field + cells
  // =========================================================================
  const fieldCanvas = document.getElementById('field');
  const cellsCanvas = document.getElementById('cells');
  const fctx = fieldCanvas.getContext('2d');
  const cctx = cellsCanvas.getContext('2d', { alpha: true });

  // Simulation grid resolution (cAMP field). Lower than screen for perf.
  const GRID_SCALE = 4; // 1 grid cell = 4 screen px
  let GW = 0, GH = 0;   // grid dimensions
  let W = 0, H = 0;     // screen dimensions

  // Excitable media fields — FitzHugh-Nagumo-ish (u, v)
  // u = activator (cAMP concentration), v = inhibitor (refractory)
  let u, v, uNext, vNext;

  // Image buffer for fast field render
  let fieldImage;

  // Cells
  let cells = [];

  // Controls
  const params = {
    cellCount: 4000,
    excitability: 0.85,
    refractory: 0.05,
    chemotaxis: 1.3,
    pulseRate: 0.0008,
  };

  // =========================================================================
  // Resize handling
  // =========================================================================
  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;

    fieldCanvas.width = Math.floor(W * dpr);
    fieldCanvas.height = Math.floor(H * dpr);
    fieldCanvas.style.width = W + 'px';
    fieldCanvas.style.height = H + 'px';
    fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    fctx.imageSmoothingEnabled = true;

    cellsCanvas.width = Math.floor(W * dpr);
    cellsCanvas.height = Math.floor(H * dpr);
    cellsCanvas.style.width = W + 'px';
    cellsCanvas.style.height = H + 'px';
    cctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    GW = Math.max(40, Math.floor(W / GRID_SCALE));
    GH = Math.max(40, Math.floor(H / GRID_SCALE));

    initField();
    // Offscreen pixel buffer at grid resolution, scaled up by CSS draw
    fieldImage = fctx.createImageData(GW, GH);
  }

  function initField() {
    const n = GW * GH;
    u = new Float32Array(n);
    v = new Float32Array(n);
    uNext = new Float32Array(n);
    vNext = new Float32Array(n);

    // Seed a couple of initial asymmetric perturbations so spirals form
    for (let k = 0; k < 3; k++) {
      const cx = Math.floor(GW * (0.3 + 0.4 * Math.random()));
      const cy = Math.floor(GH * (0.3 + 0.4 * Math.random()));
      const r = 6 + Math.random() * 4;
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          const x = cx + dx, y = cy + dy;
          if (x < 0 || x >= GW || y < 0 || y >= GH) continue;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d > r) continue;
          const idx = y * GW + x;
          // Half-pulse, half-refractory — the asymmetry that breaks a target
          // into a spiral
          if (dx > 0) u[idx] = 1.0;
          else v[idx] = 0.3;
        }
      }
    }
  }

  // =========================================================================
  // Cells
  // =========================================================================
  function initCells() {
    cells = [];
    for (let i = 0; i < params.cellCount; i++) {
      cells.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: 0,
        vy: 0,
        // small individual variation
        speed: 0.45 + Math.random() * 0.35,
      });
    }
  }

  function setCellCount(n) {
    if (n > cells.length) {
      while (cells.length < n) {
        cells.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: 0,
          vy: 0,
          speed: 0.45 + Math.random() * 0.35,
        });
      }
    } else if (n < cells.length) {
      cells.length = n;
    }
  }

  // =========================================================================
  // Excitable-media step (Barkley-style simplification of FitzHugh-Nagumo)
  //   du/dt = (1/eps) * u * (1-u) * (u - (v+b)/a)  +  D * laplacian(u)
  //   dv/dt = u - v
  // Stable for small dt. This produces traveling pulses, target & spiral
  // waves — the canonical model Dictyostelium literature invokes.
  // =========================================================================
  const EPS = 0.02;       // time-scale ratio, small = sharp fronts
  const B   = 0.07;       // threshold offset
  const DT  = 0.08;
  const DIFF = 0.9;

  function stepField() {
    const a = 1.0 / params.excitability;  // 'a' controls pulse duration/excitability
    const tauV = 1.0 / params.refractory; // larger refractory => slower v decay
    const pulseRate = params.pulseRate;

    // Random micro-pulses scattered across the grid — mimics spontaneous
    // cAMP bursts from starving cells
    if (pulseRate > 0) {
      const expected = pulseRate * GW * GH;
      const count = expected > 5 ? Math.floor(expected) : (Math.random() < expected ? 1 : 0);
      for (let k = 0; k < count; k++) {
        const x = 1 + ((Math.random() * (GW - 2)) | 0);
        const y = 1 + ((Math.random() * (GH - 2)) | 0);
        const idx = y * GW + x;
        if (v[idx] < 0.1) u[idx] = Math.max(u[idx], 0.9);
      }
    }

    for (let y = 1; y < GH - 1; y++) {
      const row = y * GW;
      for (let x = 1; x < GW - 1; x++) {
        const i = row + x;
        // 5-point Laplacian with toroidal-ish (clamped) boundary
        const lap = u[i - 1] + u[i + 1] + u[i - GW] + u[i + GW] - 4 * u[i];
        const ui = u[i];
        const vi = v[i];

        // Reaction
        const f = (1 / EPS) * ui * (1 - ui) * (ui - (vi + B) * a);
        const nextU = ui + DT * (f + DIFF * lap);
        const nextV = vi + DT * (ui - vi) * tauV * 0.08;

        uNext[i] = nextU < 0 ? 0 : (nextU > 1 ? 1 : nextU);
        vNext[i] = nextV < 0 ? 0 : (nextV > 1 ? 1 : nextV);
      }
    }

    // Zero-flux boundaries (copy edge neighbor)
    for (let x = 0; x < GW; x++) {
      uNext[x] = uNext[GW + x];
      vNext[x] = vNext[GW + x];
      uNext[(GH - 1) * GW + x] = uNext[(GH - 2) * GW + x];
      vNext[(GH - 1) * GW + x] = vNext[(GH - 2) * GW + x];
    }
    for (let y = 0; y < GH; y++) {
      uNext[y * GW] = uNext[y * GW + 1];
      vNext[y * GW] = vNext[y * GW + 1];
      uNext[y * GW + GW - 1] = uNext[y * GW + GW - 2];
      vNext[y * GW + GW - 1] = vNext[y * GW + GW - 2];
    }

    // swap
    const tu = u; u = uNext; uNext = tu;
    const tv = v; v = vNext; vNext = tv;
  }

  // =========================================================================
  // Render cAMP field as sage-cream gradient
  // =========================================================================
  // Palette: deep bg → moss → sage → cream glow at crest
  function samplePalette(t) {
    // t in [0,1]
    // Three-stop gradient evaluated in sRGB (close enough for glow)
    // 0: bg (10,10,15)   0.35: moss (60,80,45)   0.75: sage (138,154,91)   1.0: cream (254,250,224)
    const stops = [
      [0.00, 10, 10, 15],
      [0.25, 40, 55, 35],
      [0.55, 100, 120, 70],
      [0.80, 180, 190, 130],
      [1.00, 254, 250, 224],
    ];
    for (let i = 1; i < stops.length; i++) {
      if (t <= stops[i][0]) {
        const a = stops[i - 1], b = stops[i];
        const k = (t - a[0]) / (b[0] - a[0]);
        return [
          a[1] + (b[1] - a[1]) * k,
          a[2] + (b[2] - a[2]) * k,
          a[3] + (b[3] - a[3]) * k,
        ];
      }
    }
    return [254, 250, 224];
  }

  // Precompute 256-entry LUT for speed
  const PAL = new Uint8ClampedArray(256 * 3);
  for (let i = 0; i < 256; i++) {
    const [r, g, b] = samplePalette(i / 255);
    PAL[i * 3] = r;
    PAL[i * 3 + 1] = g;
    PAL[i * 3 + 2] = b;
  }

  function renderField() {
    const data = fieldImage.data;
    let p = 0;
    for (let i = 0; i < GW * GH; i++) {
      // Visual mapping — emphasize wavefront (high u) + hint of refractory
      // tail (damped purple/moss). u dominates.
      let t = u[i];
      // subtle contribution from v so trailing refractory is visible as
      // a slightly darker echo behind the wavefront
      t = t * 1.05 - v[i] * 0.12;
      if (t < 0) t = 0;
      if (t > 1) t = 1;
      const idx = (t * 255) | 0;
      data[p++] = PAL[idx * 3];
      data[p++] = PAL[idx * 3 + 1];
      data[p++] = PAL[idx * 3 + 2];
      data[p++] = 255;
    }

    // Draw grid image then upscale with smoothing
    // Use an offscreen tiny canvas as source
    if (!renderField._tmp) {
      renderField._tmp = document.createElement('canvas');
    }
    const tmp = renderField._tmp;
    if (tmp.width !== GW || tmp.height !== GH) {
      tmp.width = GW;
      tmp.height = GH;
    }
    tmp.getContext('2d').putImageData(fieldImage, 0, 0);
    fctx.clearRect(0, 0, W, H);
    fctx.drawImage(tmp, 0, 0, GW, GH, 0, 0, W, H);
  }

  // =========================================================================
  // Cell update — chemotax toward ∇u, damped motion
  // =========================================================================
  function sampleU(gx, gy) {
    if (gx < 1) gx = 1;
    if (gy < 1) gy = 1;
    if (gx > GW - 2) gx = GW - 2;
    if (gy > GH - 2) gy = GH - 2;
    return u[gy * GW + gx];
  }

  function stepCells() {
    const chem = params.chemotaxis;
    const damp = 0.88;
    const noise = 0.08;

    for (let i = 0; i < cells.length; i++) {
      const c = cells[i];
      const gx = (c.x / GRID_SCALE) | 0;
      const gy = (c.y / GRID_SCALE) | 0;

      // Gradient via central differences
      const dux = sampleU(gx + 1, gy) - sampleU(gx - 1, gy);
      const duy = sampleU(gx, gy + 1) - sampleU(gx, gy - 1);

      // Cells chemotax up gradient of cAMP — but only strongly when locally
      // ON a wave (u significant). This captures the key biology: cells move
      // during the rising phase, rest during refractory.
      const localU = sampleU(gx, gy);
      const activityGate = Math.max(0, localU - 0.08);

      // Force = chem * gradient * gate
      let fx = dux * chem * 40 * activityGate;
      let fy = duy * chem * 40 * activityGate;

      // Small persistent noise
      fx += (Math.random() - 0.5) * noise;
      fy += (Math.random() - 0.5) * noise;

      c.vx = c.vx * damp + fx;
      c.vy = c.vy * damp + fy;

      // Cap speed
      const spd = Math.hypot(c.vx, c.vy);
      const maxSpd = c.speed;
      if (spd > maxSpd) {
        c.vx *= maxSpd / spd;
        c.vy *= maxSpd / spd;
      }

      c.x += c.vx;
      c.y += c.vy;

      // Soft wrap
      if (c.x < 0) c.x += W;
      else if (c.x >= W) c.x -= W;
      if (c.y < 0) c.y += H;
      else if (c.y >= H) c.y -= H;
    }
  }

  function renderCells() {
    // Trailing fade for soft motion blur
    cctx.globalCompositeOperation = 'destination-out';
    cctx.fillStyle = 'rgba(0,0,0,0.22)';
    cctx.fillRect(0, 0, W, H);

    cctx.globalCompositeOperation = 'source-over';

    // Draw cells as terracotta dots; stronger glow when locally active
    for (let i = 0; i < cells.length; i++) {
      const c = cells[i];
      const gx = (c.x / GRID_SCALE) | 0;
      const gy = (c.y / GRID_SCALE) | 0;
      const localU = (gx >= 0 && gx < GW && gy >= 0 && gy < GH) ? u[gy * GW + gx] : 0;

      const alpha = 0.55 + 0.45 * localU;
      // Terracotta-earth blend depending on activity
      const r = 188 + 40 * localU;
      const g = 108 + 50 * localU;
      const b = 37 + 40 * localU;
      cctx.fillStyle = `rgba(${r | 0},${g | 0},${b | 0},${alpha.toFixed(3)})`;
      cctx.fillRect(c.x - 0.5, c.y - 0.5, 1.6, 1.6);
    }
  }

  // =========================================================================
  // Statistics — count aggregation centers via density grid clustering
  // =========================================================================
  const DCELL = 24;  // density grid cell size in px
  let densityGrid;
  let meanLocalDensity = 0;
  let centerCount = 0;
  let activityMean = 0;

  function computeStats() {
    const dw = Math.ceil(W / DCELL);
    const dh = Math.ceil(H / DCELL);
    if (!densityGrid || densityGrid.length !== dw * dh) {
      densityGrid = new Uint16Array(dw * dh);
    }
    densityGrid.fill(0);
    for (let i = 0; i < cells.length; i++) {
      const cx = (cells[i].x / DCELL) | 0;
      const cy = (cells[i].y / DCELL) | 0;
      if (cx >= 0 && cx < dw && cy >= 0 && cy < dh) {
        densityGrid[cy * dw + cx]++;
      }
    }
    // Mean local density: average cells per cell (only nonzero)
    let sum = 0, nonzero = 0;
    for (let i = 0; i < densityGrid.length; i++) {
      if (densityGrid[i] > 0) { sum += densityGrid[i]; nonzero++; }
    }
    meanLocalDensity = nonzero > 0 ? sum / nonzero : 0;

    // Centers = local maxima in density grid above threshold
    const minCenterDensity = Math.max(8, meanLocalDensity * 3.2);
    let count = 0;
    for (let y = 1; y < dh - 1; y++) {
      for (let x = 1; x < dw - 1; x++) {
        const i = y * dw + x;
        const d = densityGrid[i];
        if (d < minCenterDensity) continue;
        // Check local neighborhood (3x3) strict max
        let isMax = true;
        for (let dy = -1; dy <= 1 && isMax; dy++) {
          for (let dx = -1; dx <= 1 && isMax; dx++) {
            if (dx === 0 && dy === 0) continue;
            if (densityGrid[(y + dy) * dw + (x + dx)] > d) isMax = false;
          }
        }
        if (isMax) count++;
      }
    }
    centerCount = count;

    // cAMP wave activity — mean u
    let s = 0;
    const N = GW * GH;
    // Sample every 4th cell for speed
    for (let i = 0; i < N; i += 4) s += u[i];
    activityMean = s / (N / 4);
  }

  // =========================================================================
  // Main loop
  // =========================================================================
  let lastStatUpdate = 0;
  let lastFpsTime = performance.now();
  let fpsFrames = 0;
  let fps = 60;

  const el = {
    sCells: document.getElementById('s-cells'),
    sCenters: document.getElementById('s-centers'),
    sDensity: document.getElementById('s-density'),
    sActivity: document.getElementById('s-activity'),
    sFps: document.getElementById('s-fps'),
  };

  function frame(now) {
    // Two excitable-media sub-steps per frame for faster wave propagation
    stepField();
    stepField();

    renderField();

    stepCells();
    renderCells();

    // FPS
    fpsFrames++;
    if (now - lastFpsTime >= 500) {
      fps = (fpsFrames * 1000) / (now - lastFpsTime);
      fpsFrames = 0;
      lastFpsTime = now;
    }

    // Stats: every 200ms
    if (now - lastStatUpdate > 200) {
      computeStats();
      el.sCells.textContent = cells.length.toLocaleString();
      el.sCenters.textContent = centerCount;
      el.sDensity.textContent = meanLocalDensity.toFixed(2);
      el.sActivity.textContent = (activityMean * 100).toFixed(1) + '%';
      el.sFps.textContent = fps.toFixed(0) + ' fps';
      lastStatUpdate = now;
    }

    requestAnimationFrame(frame);
  }

  // =========================================================================
  // Controls wiring
  // =========================================================================
  function bind(id, valId, fmt, setter) {
    const slider = document.getElementById(id);
    const label = document.getElementById(valId);
    const update = () => {
      const val = parseFloat(slider.value);
      label.textContent = fmt(val);
      setter(val);
    };
    slider.addEventListener('input', update);
    update();
  }

  bind('c-cells', 'v-cells', v => v.toFixed(0), v => {
    params.cellCount = v | 0;
    setCellCount(params.cellCount);
  });
  bind('c-exc', 'v-exc', v => v.toFixed(2), v => params.excitability = v);
  bind('c-ref', 'v-ref', v => v.toFixed(3), v => params.refractory = v);
  bind('c-chem', 'v-chem', v => v.toFixed(2), v => params.chemotaxis = v);
  bind('c-pulse', 'v-pulse', v => v.toFixed(4), v => params.pulseRate = v);

  document.getElementById('btn-reset').addEventListener('click', () => {
    initField();
    initCells();
    // Clear cells canvas fully
    cctx.clearRect(0, 0, W, H);
  });

  // =========================================================================
  // Boot
  // =========================================================================
  window.addEventListener('resize', () => {
    clearTimeout(resize._t);
    resize._t = setTimeout(() => {
      resize();
      initCells();
    }, 150);
  });

  resize();
  initCells();
  requestAnimationFrame(frame);
})();
</script>

</body>
</html>
