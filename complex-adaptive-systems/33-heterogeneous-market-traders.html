<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Traders — Complex Adaptive Systems</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: 'Nunito', -apple-system, sans-serif; color: #FEFAE0; }
    canvas { display: block; }

    .organic-back-link {
        position: fixed; top: 20px; left: 20px; z-index: 100;
        display: flex; align-items: center; gap: 8px;
        padding: 10px 18px; border-radius: 30px;
        background: rgba(138,154,91,0.15); backdrop-filter: blur(10px);
        border: 1px solid rgba(138,154,91,0.4);
        color: #DDA15E; text-decoration: none; font-size: 14px;
        transition: all 0.3s ease;
    }
    .organic-back-link:hover { background: rgba(138,154,91,0.3); transform: translateX(-3px); }
    .back-arrow { font-size: 18px; }

    .title-panel {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        z-index: 100; text-align: center;
        background: rgba(10,10,15,0.6); backdrop-filter: blur(8px);
        padding: 10px 28px; border-radius: 20px;
        border: 1px solid rgba(254,250,224,0.15);
    }
    .title-panel h1 {
        font-family: 'Lora', Georgia, serif;
        font-size: 22px; font-weight: 600; color: #FEFAE0;
        letter-spacing: 0.5px;
    }
    .title-panel .sub { font-size: 11px; color: #8A9A5B; margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }

    .controls {
        position: fixed; top: 20px; right: 20px; z-index: 100;
        background: rgba(10,10,15,0.75); backdrop-filter: blur(10px);
        border: 1px solid rgba(254,250,224,0.12);
        border-radius: 14px;
        padding: 16px 18px; width: 260px;
    }
    .controls h3 {
        font-family: 'Lora', serif;
        font-size: 13px; color: #DDA15E; margin-bottom: 10px;
        letter-spacing: 1px; text-transform: uppercase;
    }
    .control-row {
        margin-bottom: 10px;
    }
    .control-row label {
        display: flex; justify-content: space-between;
        font-size: 11px; color: #c8c9b8; margin-bottom: 4px;
    }
    .control-row label span.val { color: #8A9A5B; font-weight: 600; }
    .control-row input[type=range] {
        width: 100%; -webkit-appearance: none; appearance: none;
        height: 4px; background: rgba(254,250,224,0.1);
        border-radius: 2px; outline: none;
    }
    .control-row input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none;
        width: 14px; height: 14px; background: #DDA15E;
        border-radius: 50%; cursor: pointer;
        border: 2px solid #0a0a0f;
    }
    .control-row input[type=range]::-moz-range-thumb {
        width: 14px; height: 14px; background: #DDA15E;
        border-radius: 50%; cursor: pointer; border: 2px solid #0a0a0f;
    }
    button.reset {
        width: 100%; margin-top: 8px;
        padding: 8px 14px; border: 1px solid rgba(188,108,37,0.5);
        background: rgba(188,108,37,0.15); color: #DDA15E;
        border-radius: 8px; font-family: inherit; font-size: 12px;
        cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
        transition: all 0.2s ease;
    }
    button.reset:hover { background: rgba(188,108,37,0.3); }

    .stats {
        position: fixed; bottom: 20px; left: 20px; z-index: 100;
        background: rgba(10,10,15,0.75); backdrop-filter: blur(10px);
        border: 1px solid rgba(254,250,224,0.12);
        border-radius: 14px; padding: 14px 18px;
        font-size: 12px; min-width: 220px;
    }
    .stats h3 {
        font-family: 'Lora', serif;
        font-size: 12px; color: #DDA15E; margin-bottom: 10px;
        letter-spacing: 1px; text-transform: uppercase;
    }
    .stat-line {
        display: flex; justify-content: space-between;
        padding: 3px 0; color: #c8c9b8;
    }
    .stat-line .v { font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat-line.price .v { color: #FEFAE0; }
    .stat-line.vol .v { color: #DDA15E; }
    .stat-line.ratio .v { color: #8A9A5B; }
    .stat-line.returns .v { color: #BC6C25; }

    .legend {
        position: fixed; bottom: 20px; right: 20px; z-index: 100;
        background: rgba(10,10,15,0.75); backdrop-filter: blur(10px);
        border: 1px solid rgba(254,250,224,0.12);
        border-radius: 14px; padding: 12px 16px; font-size: 11px;
    }
    .legend h3 {
        font-family: 'Lora', serif;
        font-size: 12px; color: #DDA15E; margin-bottom: 8px;
        letter-spacing: 1px; text-transform: uppercase;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; color: #c8c9b8; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.fund { background: #8A9A5B; }
    .dot.chart { background: #BC6C25; }
</style>
</head>
<body>
<a href="../index.html" class="organic-back-link">
    <span class="back-arrow">&larr;</span>
    <span class="back-text">Gallery</span>
</a>

<div class="title-panel">
    <h1>Heterogeneous Market</h1>
    <div class="sub">Lux&middot;Marchesi&middot;lite &mdash; emergent volatility clustering</div>
</div>

<div class="controls">
    <h3>Parameters</h3>
    <div class="control-row">
        <label>Price speed &kappa; <span class="val" id="v-kappa">0.0040</span></label>
        <input type="range" id="kappa" min="0.0005" max="0.015" step="0.0005" value="0.004">
    </div>
    <div class="control-row">
        <label>Switching rate <span class="val" id="v-switch">0.020</span></label>
        <input type="range" id="switch" min="0" max="0.08" step="0.001" value="0.02">
    </div>
    <div class="control-row">
        <label>Fundamental <span class="val" id="v-fund">100.0</span></label>
        <input type="range" id="fund" min="50" max="150" step="1" value="100">
    </div>
    <div class="control-row">
        <label>Noise <span class="val" id="v-noise">0.40</span></label>
        <input type="range" id="noise" min="0" max="1.5" step="0.05" value="0.4">
    </div>
    <div class="control-row">
        <label>Traders <span class="val" id="v-n">300</span></label>
        <input type="range" id="n" min="60" max="600" step="20" value="300">
    </div>
    <button class="reset" id="reset">Reset Market</button>
</div>

<div class="stats">
    <h3>Live Market</h3>
    <div class="stat-line price"><span>Price</span><span class="v" id="s-price">100.00</span></div>
    <div class="stat-line"><span>Fundamental</span><span class="v" id="s-fund">100.00</span></div>
    <div class="stat-line vol"><span>Volatility (&sigma;)</span><span class="v" id="s-vol">0.000</span></div>
    <div class="stat-line ratio"><span>Chartist : Fund.</span><span class="v" id="s-ratio">0.50</span></div>
    <div class="stat-line returns"><span>Last return</span><span class="v" id="s-ret">0.00%</span></div>
    <div class="stat-line"><span>Kurtosis (excess)</span><span class="v" id="s-kurt">0.00</span></div>
</div>

<div class="legend">
    <h3>Legend</h3>
    <div class="legend-row"><span class="dot fund"></span>Fundamentalists</div>
    <div class="legend-row"><span class="dot chart"></span>Chartists</div>
    <div class="legend-row" style="opacity:0.7;">Size &prop; wealth</div>
</div>

<canvas id="canvas"></canvas>

<script>
(function(){
    'use strict';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0, DPR = Math.max(1, window.devicePixelRatio || 1);

    // Controls
    const ui = {
        kappa: document.getElementById('kappa'),
        sw:    document.getElementById('switch'),
        fund:  document.getElementById('fund'),
        noise: document.getElementById('noise'),
        n:     document.getElementById('n'),
        reset: document.getElementById('reset'),
    };
    const label = {
        kappa: document.getElementById('v-kappa'),
        sw:    document.getElementById('v-switch'),
        fund:  document.getElementById('v-fund'),
        noise: document.getElementById('v-noise'),
        n:     document.getElementById('v-n'),
    };
    const sdom = {
        price: document.getElementById('s-price'),
        fund:  document.getElementById('s-fund'),
        vol:   document.getElementById('s-vol'),
        ratio: document.getElementById('s-ratio'),
        ret:   document.getElementById('s-ret'),
        kurt:  document.getElementById('s-kurt'),
    };

    // Simulation state
    let traders = [];
    let priceHist = [];        // array of {t, p}
    const PRICE_HIST_MAX = 900;
    let returnsHist = [];      // for kurtosis / histogram
    const RET_MAX = 800;
    let t = 0;
    let price = 100;
    let lastPrice = 100;
    let trend = 0;

    // Colors
    const COL_FUND  = '#8A9A5B';
    const COL_CHART = '#BC6C25';
    const COL_PRICE = '#FEFAE0';
    const COL_FUNDLINE = '#5c6b3a';
    const COL_GRID  = 'rgba(254,250,224,0.06)';

    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width  = Math.floor(W * DPR);
        canvas.height = Math.floor(H * DPR);
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    function gauss() {
        // Box-Muller
        let u = 0, v = 0;
        while (u === 0) u = Math.random();
        while (v === 0) v = Math.random();
        return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
    }

    function initMarket() {
        const N = parseInt(ui.n.value, 10);
        traders = [];
        for (let i = 0; i < N; i++) {
            traders.push({
                type: Math.random() < 0.5 ? 'F' : 'C',
                wealth: 1 + Math.random() * 0.4,
                x: Math.random(),
                y: Math.random(),
            });
        }
        const f = parseFloat(ui.fund.value);
        price = f;
        lastPrice = f;
        trend = 0;
        priceHist = [];
        returnsHist = [];
        t = 0;
    }

    function step() {
        const kappa    = parseFloat(ui.kappa.value);
        const swRate   = parseFloat(ui.sw.value);
        const fundP    = parseFloat(ui.fund.value);
        const noiseAmp = parseFloat(ui.noise.value);

        // Recompute trend (EMA of returns)
        const ret = lastPrice > 0 ? (price - lastPrice) / lastPrice : 0;
        trend = 0.92 * trend + 0.08 * ret;

        // Count populations
        let Nf = 0, Nc = 0;
        for (let i = 0; i < traders.length; i++) {
            if (traders[i].type === 'F') Nf++; else Nc++;
        }

        // Excess demand
        // Fundamentalists push toward fundamental; chartists push with trend
        const demandF = Nf * (fundP - price);
        const demandC = Nc * trend * price * 80;  // scale trend (small) up to price units

        const noise = noiseAmp * gauss() * Math.sqrt(price) * 0.15;

        lastPrice = price;
        price = price + kappa * (demandF + demandC) / Math.max(1, traders.length) + noise;
        if (price < 1) price = 1;
        if (price > 10000) price = 10000;

        // Record history
        t++;
        priceHist.push({ t: t, p: price });
        if (priceHist.length > PRICE_HIST_MAX) priceHist.shift();

        const r = lastPrice > 0 ? (price - lastPrice) / lastPrice : 0;
        returnsHist.push(r);
        if (returnsHist.length > RET_MAX) returnsHist.shift();

        // Trader switching (herding-ish): switch probability influenced by recent absolute return
        // Chartists attracted when |trend| is large; fundamentalists attracted when price is far from f
        const magnet = Math.min(3, Math.abs(trend) * 200);   // drives C attractiveness
        const misprice = Math.min(3, Math.abs(price - fundP) / Math.max(1, fundP) * 10);

        for (let i = 0; i < traders.length; i++) {
            const a = traders[i];
            if (Math.random() < swRate) {
                if (a.type === 'F') {
                    // Tend to switch to C when trend is strong
                    const pSwitch = 0.3 + 0.25 * magnet;
                    if (Math.random() < pSwitch) a.type = 'C';
                } else {
                    // Tend to switch to F when price far from fundamental
                    const pSwitch = 0.3 + 0.25 * misprice;
                    if (Math.random() < pSwitch) a.type = 'F';
                }
            }
            // Wealth evolves with strategy success
            if (a.type === 'F') {
                // Fundamentalists profit when price converges to fund
                const dir = (fundP - lastPrice);
                a.wealth *= (1 + 0.002 * Math.sign(dir) * r);
            } else {
                // Chartists profit when trend continues
                a.wealth *= (1 + 0.003 * Math.sign(trend) * r);
            }
            // Bound wealth
            if (a.wealth < 0.2) a.wealth = 0.2;
            if (a.wealth > 6)   a.wealth = 6;
            // Gentle drift in agent canvas position (for visual liveliness)
            a.x += (Math.random() - 0.5) * 0.003;
            a.y += (Math.random() - 0.5) * 0.003;
            if (a.x < 0) a.x = 0; if (a.x > 1) a.x = 1;
            if (a.y < 0) a.y = 0; if (a.y > 1) a.y = 1;
        }
    }

    function stdev(arr) {
        if (arr.length < 2) return 0;
        let m = 0;
        for (let i = 0; i < arr.length; i++) m += arr[i];
        m /= arr.length;
        let v = 0;
        for (let i = 0; i < arr.length; i++) { const d = arr[i] - m; v += d*d; }
        return Math.sqrt(v / arr.length);
    }
    function kurtosisExcess(arr) {
        if (arr.length < 4) return 0;
        let m = 0;
        for (let i = 0; i < arr.length; i++) m += arr[i];
        m /= arr.length;
        let v = 0, k = 0;
        for (let i = 0; i < arr.length; i++) {
            const d = arr[i] - m;
            v += d*d;
            k += d*d*d*d;
        }
        v /= arr.length;
        k /= arr.length;
        if (v === 0) return 0;
        return k / (v*v) - 3;
    }

    function draw() {
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, W, H);

        const CHART_H = Math.floor(H * 0.58);
        const AGENT_Y = CHART_H + 10;
        const AGENT_H = H - AGENT_Y - 10;

        // --- Price chart ---
        const PAD_L = 60, PAD_R = 30, PAD_T = 80;
        const chartX = PAD_L;
        const chartY = PAD_T;
        const chartW = W - PAD_L - PAD_R;
        const chartH = CHART_H - PAD_T - 10;

        // Compute y-range from history
        let pmin = Infinity, pmax = -Infinity;
        const fundP = parseFloat(ui.fund.value);
        for (let i = 0; i < priceHist.length; i++) {
            if (priceHist[i].p < pmin) pmin = priceHist[i].p;
            if (priceHist[i].p > pmax) pmax = priceHist[i].p;
        }
        if (!isFinite(pmin)) { pmin = fundP * 0.9; pmax = fundP * 1.1; }
        pmin = Math.min(pmin, fundP);
        pmax = Math.max(pmax, fundP);
        const pad = (pmax - pmin) * 0.15 || fundP * 0.05;
        pmin -= pad; pmax += pad;

        // Grid
        ctx.strokeStyle = COL_GRID;
        ctx.lineWidth = 1;
        ctx.font = '10px Nunito, sans-serif';
        ctx.fillStyle = 'rgba(254,250,224,0.4)';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        for (let g = 0; g <= 5; g++) {
            const y = chartY + chartH * (g / 5);
            ctx.beginPath();
            ctx.moveTo(chartX, y);
            ctx.lineTo(chartX + chartW, y);
            ctx.stroke();
            const val = pmax - (pmax - pmin) * (g / 5);
            ctx.fillText(val.toFixed(1), chartX - 8, y);
        }

        // Fundamental line
        if (fundP >= pmin && fundP <= pmax) {
            const y = chartY + (1 - (fundP - pmin) / (pmax - pmin)) * chartH;
            ctx.strokeStyle = COL_FUNDLINE;
            ctx.setLineDash([6, 4]);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(chartX, y);
            ctx.lineTo(chartX + chartW, y);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#8A9A5B';
            ctx.textAlign = 'left';
            ctx.fillText('fundamental', chartX + 6, y - 10);
        }

        // Price line
        if (priceHist.length > 1) {
            ctx.strokeStyle = COL_PRICE;
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            for (let i = 0; i < priceHist.length; i++) {
                const x = chartX + (i / (PRICE_HIST_MAX - 1)) * chartW;
                const p = priceHist[i].p;
                const y = chartY + (1 - (p - pmin) / (pmax - pmin)) * chartH;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Price glow
            ctx.strokeStyle = 'rgba(254,250,224,0.15)';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Current price marker
            const last = priceHist[priceHist.length - 1];
            const x = chartX + ((priceHist.length - 1) / (PRICE_HIST_MAX - 1)) * chartW;
            const y = chartY + (1 - (last.p - pmin) / (pmax - pmin)) * chartH;
            ctx.fillStyle = COL_PRICE;
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(254,250,224,0.2)';
            ctx.beginPath();
            ctx.arc(x, y, 10, 0, Math.PI * 2);
            ctx.fill();
        }

        // Chart frame
        ctx.strokeStyle = 'rgba(254,250,224,0.15)';
        ctx.lineWidth = 1;
        ctx.strokeRect(chartX, chartY, chartW, chartH);

        // Chart title
        ctx.fillStyle = 'rgba(254,250,224,0.55)';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.font = '600 11px Nunito, sans-serif';
        ctx.fillText('PRICE / TIME', chartX + 6, chartY + 6);

        // --- Returns histogram inset ---
        drawReturnsInset(chartX + chartW - 200, chartY + 10, 190, 80);

        // --- Agent pool ---
        ctx.fillStyle = 'rgba(10,10,15,0.5)';
        ctx.fillRect(10, AGENT_Y, W - 20, AGENT_H);
        ctx.strokeStyle = 'rgba(254,250,224,0.08)';
        ctx.strokeRect(10, AGENT_Y, W - 20, AGENT_H);

        ctx.fillStyle = 'rgba(254,250,224,0.4)';
        ctx.font = '600 11px Nunito, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText('TRADER POPULATION', 20, AGENT_Y + 8);

        const ax = 20, ay = AGENT_Y + 28;
        const aw = W - 40, ah = AGENT_H - 38;
        for (let i = 0; i < traders.length; i++) {
            const a = traders[i];
            const cx = ax + a.x * aw;
            const cy = ay + a.y * ah;
            const r = 1.4 + a.wealth * 2.1;
            ctx.fillStyle = a.type === 'F' ? COL_FUND : COL_CHART;
            ctx.globalAlpha = 0.85;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    function drawReturnsInset(x, y, w, h) {
        // background
        ctx.fillStyle = 'rgba(10,10,15,0.75)';
        ctx.strokeStyle = 'rgba(254,250,224,0.15)';
        ctx.lineWidth = 1;
        ctx.fillRect(x, y, w, h);
        ctx.strokeRect(x, y, w, h);

        ctx.fillStyle = 'rgba(254,250,224,0.45)';
        ctx.font = '600 10px Nunito, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText('RETURNS DISTRIBUTION', x + 6, y + 4);

        if (returnsHist.length < 8) return;
        // Build histogram
        const bins = 29;
        const sd = stdev(returnsHist);
        const span = Math.max(sd * 4, 0.001);
        const counts = new Array(bins).fill(0);
        for (let i = 0; i < returnsHist.length; i++) {
            const r = returnsHist[i];
            let idx = Math.floor((r + span) / (2 * span) * bins);
            if (idx < 0) idx = 0;
            if (idx >= bins) idx = bins - 1;
            counts[idx]++;
        }
        let maxC = 1;
        for (let i = 0; i < bins; i++) if (counts[i] > maxC) maxC = counts[i];

        const bx = x + 4, by = y + 18, bw = w - 8, bh = h - 24;
        const bwi = bw / bins;
        for (let i = 0; i < bins; i++) {
            const bhv = (counts[i] / maxC) * bh;
            const far = Math.abs(i - bins / 2 + 0.5) / (bins / 2);  // 0 center, 1 tails
            const col = far > 0.65 ? '#BC6C25' : '#8A9A5B';
            ctx.fillStyle = col;
            ctx.globalAlpha = 0.4 + far * 0.5;
            ctx.fillRect(bx + i * bwi + 0.5, by + (bh - bhv), bwi - 1, bhv);
        }
        ctx.globalAlpha = 1;

        // zero line
        ctx.strokeStyle = 'rgba(254,250,224,0.2)';
        ctx.setLineDash([2, 3]);
        ctx.beginPath();
        ctx.moveTo(bx + bw / 2, by);
        ctx.lineTo(bx + bw / 2, by + bh);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    function updateStats() {
        const fundP = parseFloat(ui.fund.value);
        sdom.price.textContent = price.toFixed(2);
        sdom.fund.textContent = fundP.toFixed(2);
        // Volatility = stdev of recent returns * 100
        const recent = returnsHist.slice(-200);
        const sd = stdev(recent);
        sdom.vol.textContent = (sd * 100).toFixed(3) + '%';
        let Nf = 0, Nc = 0;
        for (let i = 0; i < traders.length; i++) if (traders[i].type === 'F') Nf++; else Nc++;
        const ratio = Nf === 0 ? Infinity : (Nc / Nf);
        sdom.ratio.textContent = isFinite(ratio) ? ratio.toFixed(2) : '∞';
        const r = returnsHist.length ? returnsHist[returnsHist.length - 1] : 0;
        sdom.ret.textContent = (r * 100).toFixed(3) + '%';
        sdom.kurt.textContent = kurtosisExcess(recent).toFixed(2);
    }

    function updateLabels() {
        label.kappa.textContent = parseFloat(ui.kappa.value).toFixed(4);
        label.sw.textContent    = parseFloat(ui.sw.value).toFixed(3);
        label.fund.textContent  = parseFloat(ui.fund.value).toFixed(1);
        label.noise.textContent = parseFloat(ui.noise.value).toFixed(2);
        label.n.textContent     = ui.n.value;
    }

    // Wire up UI
    ['kappa','sw','fund','noise'].forEach(k => {
        ui[k].addEventListener('input', updateLabels);
    });
    ui.n.addEventListener('input', () => { updateLabels(); initMarket(); });
    ui.reset.addEventListener('click', () => { initMarket(); });

    updateLabels();
    initMarket();

    let statsCounter = 0;
    function loop() {
        // Multiple sim ticks per frame for a lively chart
        for (let i = 0; i < 2; i++) step();
        draw();
        statsCounter++;
        if (statsCounter % 3 === 0) updateStats();
        requestAnimationFrame(loop);
    }
    loop();
})();
</script>
</body>
</html>
