<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolf Sheep — Complex Adaptive Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --sage: #8A9A5B;
        --moss: #606C38;
        --earth: #DDA15E;
        --cream: #FEFAE0;
        --terracotta: #BC6C25;
        --dark-moss: #3d4423;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
        font-family: 'Nunito', sans-serif;
        color: var(--dark-moss);
    }
    canvas {
        display: block;
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
    }
    .organic-back-link {
        position: fixed;
        top: 24px;
        left: 24px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 30px;
        color: var(--moss);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        box-shadow: 0 4px 15px rgba(96, 108, 56, 0.1);
        z-index: 100;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(138, 154, 91, 0.2);
    }
    .organic-back-link:hover {
        transform: translateX(-4px);
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 6px 20px rgba(96, 108, 56, 0.2);
    }
    .back-arrow { font-size: 1.1rem; }

    .title-bar {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 32px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 30px;
        box-shadow: 0 4px 15px rgba(96, 108, 56, 0.1);
        border: 1px solid rgba(138, 154, 91, 0.2);
        z-index: 100;
    }
    .title-bar h1 {
        font-family: 'Lora', serif;
        color: var(--moss);
        font-weight: 600;
        font-size: 1.25rem;
        letter-spacing: 0.02em;
    }

    .control-panel {
        position: fixed;
        top: 24px;
        right: 24px;
        width: 280px;
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 8px 32px rgba(96, 108, 56, 0.15);
        border: 1px solid rgba(138, 154, 91, 0.25);
        z-index: 100;
        max-height: calc(100vh - 48px);
        overflow-y: auto;
    }
    .control-panel h2 {
        font-family: 'Lora', serif;
        color: var(--moss);
        font-size: 1rem;
        margin-bottom: 12px;
        font-weight: 600;
    }
    .control {
        margin-bottom: 12px;
    }
    .control label {
        display: flex;
        justify-content: space-between;
        font-size: 0.78rem;
        color: var(--dark-moss);
        margin-bottom: 4px;
        font-weight: 500;
    }
    .control label .val {
        color: var(--terracotta);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
    }
    .control input[type="range"] {
        width: 100%;
        appearance: none;
        height: 4px;
        border-radius: 3px;
        background: linear-gradient(to right, var(--sage), var(--earth));
        outline: none;
    }
    .control input[type="range"]::-webkit-slider-thumb {
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--moss);
        cursor: pointer;
        border: 2px solid var(--cream);
        box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }
    .control input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--moss);
        cursor: pointer;
        border: 2px solid var(--cream);
    }
    .btn-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
    }
    button {
        flex: 1;
        padding: 9px 14px;
        border: none;
        border-radius: 20px;
        font-family: 'Nunito', sans-serif;
        font-weight: 600;
        font-size: 0.82rem;
        cursor: pointer;
        transition: all 0.25s;
        background: var(--moss);
        color: var(--cream);
        box-shadow: 0 2px 8px rgba(96, 108, 56, 0.25);
    }
    button:hover {
        background: var(--dark-moss);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(96, 108, 56, 0.35);
    }
    button.secondary {
        background: var(--terracotta);
        box-shadow: 0 2px 8px rgba(188, 108, 37, 0.25);
    }
    button.secondary:hover {
        background: #a85e1f;
    }

    .stats-bar {
        position: fixed;
        bottom: 24px;
        left: 24px;
        display: flex;
        gap: 14px;
        z-index: 100;
    }
    .stat-pill {
        padding: 10px 18px;
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 18px;
        box-shadow: 0 4px 15px rgba(96, 108, 56, 0.1);
        border: 1px solid rgba(138, 154, 91, 0.2);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 92px;
    }
    .stat-pill .label {
        font-size: 0.7rem;
        color: var(--moss);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
    }
    .stat-pill .value {
        font-family: 'Lora', serif;
        font-size: 1.35rem;
        font-weight: 600;
        color: var(--dark-moss);
        font-variant-numeric: tabular-nums;
    }
    .stat-pill.wolves .value { color: var(--terracotta); }
    .stat-pill.sheep .value { color: #8b7d4a; }
    .stat-pill.grass .value { color: var(--sage); }

    .chart-overlay {
        position: fixed;
        bottom: 24px;
        right: 24px;
        width: 360px;
        height: 140px;
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: 14px;
        border: 1px solid rgba(138, 154, 91, 0.25);
        box-shadow: 0 4px 18px rgba(96, 108, 56, 0.12);
        padding: 10px;
        z-index: 100;
    }
    .chart-overlay .chart-title {
        position: absolute;
        top: 8px;
        left: 12px;
        font-size: 0.7rem;
        color: var(--moss);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 700;
    }
    .chart-overlay .legend {
        position: absolute;
        top: 8px;
        right: 12px;
        display: flex;
        gap: 10px;
        font-size: 0.68rem;
        font-weight: 600;
    }
    .chart-overlay .legend span {
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }
    .chart-overlay .legend i {
        width: 10px;
        height: 3px;
        display: inline-block;
        border-radius: 2px;
    }
    #chartCanvas {
        position: absolute;
        top: 28px;
        left: 10px;
        width: calc(100% - 20px);
        height: calc(100% - 38px);
    }

    @media (max-width: 900px) {
        .control-panel { width: 240px; padding: 14px; }
        .chart-overlay { width: 260px; height: 110px; }
        .title-bar { font-size: 0.9rem; padding: 8px 18px; }
        .title-bar h1 { font-size: 1rem; }
    }
</style>
</head>
<body>
    <a href="index.html" class="organic-back-link">
        <span class="back-arrow">&larr;</span>
        <span class="back-text">Gallery</span>
    </a>

    <div class="title-bar">
        <h1>Wolf-Sheep Predation</h1>
    </div>

    <canvas id="world"></canvas>

    <div class="control-panel">
        <h2>Controls</h2>
        <div class="control">
            <label>Initial Sheep <span class="val" id="v-initSheep">100</span></label>
            <input type="range" id="initSheep" min="0" max="250" value="100">
        </div>
        <div class="control">
            <label>Initial Wolves <span class="val" id="v-initWolves">50</span></label>
            <input type="range" id="initWolves" min="0" max="150" value="50">
        </div>
        <div class="control">
            <label>Sheep Gain from Food <span class="val" id="v-sheepGain">4</span></label>
            <input type="range" id="sheepGain" min="1" max="20" value="4">
        </div>
        <div class="control">
            <label>Wolf Gain from Food <span class="val" id="v-wolfGain">20</span></label>
            <input type="range" id="wolfGain" min="1" max="50" value="20">
        </div>
        <div class="control">
            <label>Sheep Reproduce % <span class="val" id="v-sheepRepro">4</span></label>
            <input type="range" id="sheepRepro" min="0" max="20" value="4">
        </div>
        <div class="control">
            <label>Wolf Reproduce % <span class="val" id="v-wolfRepro">5</span></label>
            <input type="range" id="wolfRepro" min="0" max="20" value="5">
        </div>
        <div class="control">
            <label>Grass Regrow Time <span class="val" id="v-regrow">30</span></label>
            <input type="range" id="regrow" min="5" max="120" value="30">
        </div>
        <div class="btn-row">
            <button id="resetBtn" class="secondary">Reset</button>
            <button id="pauseBtn">Pause</button>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-pill sheep">
            <span class="label">Sheep</span>
            <span class="value" id="stat-sheep">0</span>
        </div>
        <div class="stat-pill wolves">
            <span class="label">Wolves</span>
            <span class="value" id="stat-wolves">0</span>
        </div>
        <div class="stat-pill grass">
            <span class="label">Grass</span>
            <span class="value" id="stat-grass">0%</span>
        </div>
    </div>

    <div class="chart-overlay">
        <span class="chart-title">Population Over Time</span>
        <span class="legend">
            <span><i style="background:#8b7d4a"></i>Sheep</span>
            <span><i style="background:#BC6C25"></i>Wolves</span>
            <span><i style="background:#8A9A5B"></i>Grass</span>
        </span>
        <canvas id="chartCanvas"></canvas>
    </div>

<script>
(function() {
    const COLS = 60;
    const ROWS = 40;

    const worldCanvas = document.getElementById('world');
    const wctx = worldCanvas.getContext('2d');
    const chartCanvas = document.getElementById('chartCanvas');
    const cctx = chartCanvas.getContext('2d');

    const controls = {
        initSheep: document.getElementById('initSheep'),
        initWolves: document.getElementById('initWolves'),
        sheepGain: document.getElementById('sheepGain'),
        wolfGain: document.getElementById('wolfGain'),
        sheepRepro: document.getElementById('sheepRepro'),
        wolfRepro: document.getElementById('wolfRepro'),
        regrow: document.getElementById('regrow')
    };
    const valLabels = {
        initSheep: document.getElementById('v-initSheep'),
        initWolves: document.getElementById('v-initWolves'),
        sheepGain: document.getElementById('v-sheepGain'),
        wolfGain: document.getElementById('v-wolfGain'),
        sheepRepro: document.getElementById('v-sheepRepro'),
        wolfRepro: document.getElementById('v-wolfRepro'),
        regrow: document.getElementById('v-regrow')
    };

    Object.keys(controls).forEach(k => {
        controls[k].addEventListener('input', () => {
            valLabels[k].textContent = controls[k].value;
        });
    });

    const statSheep = document.getElementById('stat-sheep');
    const statWolves = document.getElementById('stat-wolves');
    const statGrass = document.getElementById('stat-grass');

    let grass;       // Int32Array of regrow-timer; 0 = green, >0 = regrowing counter
    let sheep = [];
    let wolves = [];
    let paused = false;
    let history = []; // {s, w, g}
    const MAX_HIST = 260;

    function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        worldCanvas.width = window.innerWidth * dpr;
        worldCanvas.height = window.innerHeight * dpr;
        worldCanvas.style.width = window.innerWidth + 'px';
        worldCanvas.style.height = window.innerHeight + 'px';
        wctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const cr = chartCanvas.getBoundingClientRect();
        chartCanvas.width = cr.width * dpr;
        chartCanvas.height = cr.height * dpr;
        cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function reset() {
        grass = new Int32Array(COLS * ROWS);
        // Half initial grass green, half regrowing with random counters
        for (let i = 0; i < grass.length; i++) {
            grass[i] = Math.random() < 0.5 ? 0 : Math.floor(Math.random() * parseInt(controls.regrow.value));
        }
        sheep = [];
        wolves = [];
        const nS = parseInt(controls.initSheep.value);
        const nW = parseInt(controls.initWolves.value);
        for (let i = 0; i < nS; i++) {
            sheep.push({
                x: Math.random() * COLS,
                y: Math.random() * ROWS,
                heading: Math.random() * Math.PI * 2,
                energy: Math.random() * 2 * parseInt(controls.sheepGain.value)
            });
        }
        for (let i = 0; i < nW; i++) {
            wolves.push({
                x: Math.random() * COLS,
                y: Math.random() * ROWS,
                heading: Math.random() * Math.PI * 2,
                energy: Math.random() * 2 * parseInt(controls.wolfGain.value)
            });
        }
        history = [];
    }

    function wrapX(x) {
        while (x < 0) x += COLS;
        while (x >= COLS) x -= COLS;
        return x;
    }
    function wrapY(y) {
        while (y < 0) y += ROWS;
        while (y >= ROWS) y -= ROWS;
        return y;
    }

    function step() {
        const sheepGain = parseInt(controls.sheepGain.value);
        const wolfGain = parseInt(controls.wolfGain.value);
        const sheepRepro = parseInt(controls.sheepRepro.value);
        const wolfRepro = parseInt(controls.wolfRepro.value);
        const regrow = parseInt(controls.regrow.value);

        // Regrow grass
        for (let i = 0; i < grass.length; i++) {
            if (grass[i] > 0) {
                grass[i]--;
            }
        }

        // Move & act sheep
        const newSheep = [];
        for (let i = 0; i < sheep.length; i++) {
            const s = sheep[i];
            // Random turn + forward
            s.heading += (Math.random() - 0.5) * 0.8;
            s.x = wrapX(s.x + Math.cos(s.heading));
            s.y = wrapY(s.y + Math.sin(s.heading));
            s.energy -= 1;

            // Eat grass
            const gx = Math.floor(s.x);
            const gy = Math.floor(s.y);
            const idx = gy * COLS + gx;
            if (grass[idx] === 0) {
                s.energy += sheepGain;
                grass[idx] = regrow;
            }

            if (s.energy <= 0) continue; // die

            // Reproduce
            if (Math.random() * 100 < sheepRepro) {
                s.energy /= 2;
                newSheep.push({
                    x: s.x,
                    y: s.y,
                    heading: Math.random() * Math.PI * 2,
                    energy: s.energy
                });
            }
            newSheep.push(s);
        }
        sheep = newSheep;

        // Move & act wolves
        const newWolves = [];
        for (let i = 0; i < wolves.length; i++) {
            const w = wolves[i];
            w.heading += (Math.random() - 0.5) * 0.8;
            w.x = wrapX(w.x + Math.cos(w.heading));
            w.y = wrapY(w.y + Math.sin(w.heading));
            w.energy -= 1;

            // Eat a sheep on same patch
            const wx = Math.floor(w.x);
            const wy = Math.floor(w.y);
            for (let j = 0; j < sheep.length; j++) {
                const s = sheep[j];
                if (!s) continue;
                if (Math.floor(s.x) === wx && Math.floor(s.y) === wy) {
                    w.energy += wolfGain;
                    sheep[j] = null;
                    break;
                }
            }

            if (w.energy <= 0) continue;

            if (Math.random() * 100 < wolfRepro) {
                w.energy /= 2;
                newWolves.push({
                    x: w.x,
                    y: w.y,
                    heading: Math.random() * Math.PI * 2,
                    energy: w.energy
                });
            }
            newWolves.push(w);
        }
        wolves = newWolves;
        // Prune eaten sheep
        sheep = sheep.filter(s => s !== null);

        // History
        let green = 0;
        for (let i = 0; i < grass.length; i++) if (grass[i] === 0) green++;
        history.push({ s: sheep.length, w: wolves.length, g: green });
        if (history.length > MAX_HIST) history.shift();

        // Stats
        statSheep.textContent = sheep.length;
        statWolves.textContent = wolves.length;
        statGrass.textContent = Math.round(100 * green / (COLS * ROWS)) + '%';
    }

    function drawWorld() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const cellW = w / COLS;
        const cellH = h / ROWS;

        // Grass tiles
        for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
                const g = grass[y * COLS + x];
                if (g === 0) {
                    // Green; subtle hue shift for organic feel
                    const shade = 138 + ((x * 7 + y * 11) % 12) - 6;
                    wctx.fillStyle = `rgb(${shade - 20}, ${shade + 16}, ${Math.max(0, shade - 50)})`;
                } else {
                    // Bare / regrowing: dark moss tone, darker when freshly eaten
                    const regrowMax = parseInt(controls.regrow.value);
                    const t = g / regrowMax; // 1 = just eaten, 0 = ready
                    const base = 48 - Math.floor(t * 18);
                    wctx.fillStyle = `rgb(${base + 8}, ${base + 14}, ${Math.max(0, base - 8)})`;
                }
                wctx.fillRect(x * cellW, y * cellH, cellW + 0.5, cellH + 0.5);
            }
        }

        // Soft vignette overlay
        const grad = wctx.createRadialGradient(w/2, h/2, Math.min(w,h)*0.35, w/2, h/2, Math.max(w,h)*0.75);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(1, 'rgba(0,0,0,0.18)');
        wctx.fillStyle = grad;
        wctx.fillRect(0, 0, w, h);

        // Sheep (cream with darker outline)
        for (let i = 0; i < sheep.length; i++) {
            drawAgent(sheep[i], cellW, cellH, '#FEFAE0', '#b8a878', 0.42);
        }
        // Wolves (terracotta)
        for (let i = 0; i < wolves.length; i++) {
            drawAgent(wolves[i], cellW, cellH, '#BC6C25', '#5a2f10', 0.48);
        }
    }

    function drawAgent(a, cellW, cellH, fill, stroke, sizeFactor) {
        const px = a.x * cellW + cellW * 0.5;
        const py = a.y * cellH + cellH * 0.5;
        const r = Math.min(cellW, cellH) * sizeFactor;

        // Drop shadow
        wctx.save();
        wctx.translate(px, py);
        wctx.rotate(a.heading);

        wctx.fillStyle = 'rgba(0,0,0,0.28)';
        wctx.beginPath();
        wctx.ellipse(0.5, 1.2, r * 0.9, r * 0.55, 0, 0, Math.PI * 2);
        wctx.fill();

        // Tail
        wctx.strokeStyle = stroke;
        wctx.lineWidth = Math.max(1, r * 0.25);
        wctx.lineCap = 'round';
        wctx.beginPath();
        wctx.moveTo(-r * 0.7, 0);
        wctx.lineTo(-r * 1.5, r * 0.35);
        wctx.stroke();

        // Body
        wctx.fillStyle = fill;
        wctx.strokeStyle = stroke;
        wctx.lineWidth = Math.max(0.8, r * 0.18);
        wctx.beginPath();
        wctx.ellipse(0, 0, r, r * 0.72, 0, 0, Math.PI * 2);
        wctx.fill();
        wctx.stroke();

        // Head (small front circle)
        wctx.fillStyle = fill;
        wctx.beginPath();
        wctx.arc(r * 0.75, 0, r * 0.45, 0, Math.PI * 2);
        wctx.fill();
        wctx.stroke();

        // Eye dot
        wctx.fillStyle = stroke;
        wctx.beginPath();
        wctx.arc(r * 0.95, -r * 0.18, r * 0.1, 0, Math.PI * 2);
        wctx.fill();

        wctx.restore();
    }

    function drawChart() {
        const cr = chartCanvas.getBoundingClientRect();
        const w = cr.width;
        const h = cr.height;
        cctx.clearRect(0, 0, w, h);

        if (history.length < 2) return;

        // Find max to scale
        let maxPop = 10;
        for (let i = 0; i < history.length; i++) {
            if (history[i].s > maxPop) maxPop = history[i].s;
            if (history[i].w > maxPop) maxPop = history[i].w;
        }
        const maxGrass = COLS * ROWS;

        // Baseline
        cctx.strokeStyle = 'rgba(96,108,56,0.2)';
        cctx.lineWidth = 1;
        cctx.beginPath();
        cctx.moveTo(0, h - 0.5);
        cctx.lineTo(w, h - 0.5);
        cctx.stroke();

        function drawLine(accessor, maxVal, color) {
            cctx.strokeStyle = color;
            cctx.lineWidth = 1.6;
            cctx.lineJoin = 'round';
            cctx.beginPath();
            for (let i = 0; i < history.length; i++) {
                const x = (i / (MAX_HIST - 1)) * w;
                const y = h - (accessor(history[i]) / maxVal) * (h - 2) - 1;
                if (i === 0) cctx.moveTo(x, y);
                else cctx.lineTo(x, y);
            }
            cctx.stroke();
        }

        drawLine(d => d.g, maxGrass, '#8A9A5B');
        drawLine(d => d.s, maxPop, '#8b7d4a');
        drawLine(d => d.w, maxPop, '#BC6C25');
    }

    function loop() {
        if (!paused) {
            step();
        }
        drawWorld();
        drawChart();
        requestAnimationFrame(loop);
    }

    document.getElementById('resetBtn').addEventListener('click', reset);
    document.getElementById('pauseBtn').addEventListener('click', (e) => {
        paused = !paused;
        e.target.textContent = paused ? 'Resume' : 'Pause';
    });

    reset();
    loop();
})();
</script>
</body>
</html>
