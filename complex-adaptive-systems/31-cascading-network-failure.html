<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cascading Failure — Complex Adaptive Systems</title>
<style>
  :root {
    --bg: #0a0a0f;
    --sage: #8A9A5B;
    --moss: #606C38;
    --earth: #DDA15E;
    --cream: #FEFAE0;
    --terracotta: #BC6C25;
    --red-hot: #E63946;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--cream);
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    height: 100%;
    width: 100%;
  }
  canvas {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    cursor: crosshair;
  }
  .organic-back-link {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(138, 154, 91, 0.15);
    border: 1px solid rgba(138, 154, 91, 0.4);
    border-radius: 30px;
    color: var(--sage);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .organic-back-link:hover {
    background: rgba(138, 154, 91, 0.25);
    border-color: var(--sage);
    transform: translateX(-3px);
  }
  .back-arrow { font-size: 16px; }
  .title {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 100;
    text-align: right;
    font-family: 'Lora', serif;
  }
  .title h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.5px;
  }
  .title .subtitle {
    margin: 4px 0 0;
    font-size: 12px;
    color: var(--sage);
    opacity: 0.8;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .panel {
    position: fixed;
    z-index: 100;
    background: rgba(10, 10, 15, 0.75);
    border: 1px solid rgba(138, 154, 91, 0.25);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 18px 20px;
    font-size: 13px;
  }
  .controls {
    bottom: 24px;
    left: 24px;
    min-width: 260px;
  }
  .stats {
    bottom: 24px;
    right: 24px;
    min-width: 240px;
  }
  .panel h3 {
    margin: 0 0 12px;
    font-family: 'Lora', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--earth);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(221, 161, 94, 0.2);
    padding-bottom: 8px;
  }
  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 10px 0;
    gap: 12px;
  }
  .control-row label {
    color: var(--sage);
    font-size: 12px;
    flex: 1;
  }
  .control-row input[type="range"] {
    flex: 1.2;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: rgba(138, 154, 91, 0.3);
    border-radius: 2px;
    outline: none;
  }
  .control-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    background: var(--sage);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(138, 154, 91, 0.6);
  }
  .control-row input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: var(--sage);
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  .value {
    color: var(--cream);
    min-width: 40px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }
  .buttons {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  button {
    flex: 1;
    padding: 9px 12px;
    background: rgba(138, 154, 91, 0.15);
    border: 1px solid rgba(138, 154, 91, 0.35);
    border-radius: 8px;
    color: var(--cream);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }
  button:hover {
    background: rgba(138, 154, 91, 0.3);
    border-color: var(--sage);
    transform: translateY(-1px);
  }
  button.primary {
    background: rgba(188, 108, 37, 0.2);
    border-color: rgba(188, 108, 37, 0.4);
    color: var(--earth);
  }
  button.primary:hover {
    background: rgba(188, 108, 37, 0.35);
    border-color: var(--earth);
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin: 8px 0;
  }
  .stat-label {
    font-size: 11px;
    color: var(--sage);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-value {
    font-family: 'Lora', serif;
    font-size: 18px;
    color: var(--cream);
    font-variant-numeric: tabular-nums;
  }
  .stat-value.warn { color: var(--earth); }
  .stat-value.danger { color: var(--terracotta); }
  .legend {
    position: fixed;
    top: 90px;
    right: 24px;
    z-index: 100;
    font-size: 11px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0;
    color: var(--cream);
    opacity: 0.85;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .dot-live { background: var(--sage); box-shadow: 0 0 8px var(--sage); }
  .dot-over { background: var(--earth); box-shadow: 0 0 8px var(--earth); }
  .dot-fail { background: var(--terracotta); opacity: 0.5; }
  .hint {
    font-size: 11px;
    color: var(--sage);
    opacity: 0.7;
    margin-top: 10px;
    font-style: italic;
  }
</style>
</head>
<body>

<a href="../index.html" class="organic-back-link">
  <span class="back-arrow">&larr;</span>
  <span class="back-text">Gallery</span>
</a>

<div class="title">
  <h1>Cascading Network Failure</h1>
  <div class="subtitle">Scale-free power grid</div>
</div>

<div class="legend panel">
  <div class="legend-item"><span class="dot dot-live"></span>Live node</div>
  <div class="legend-item"><span class="dot dot-over"></span>Overloaded</div>
  <div class="legend-item"><span class="dot dot-fail"></span>Failed</div>
</div>

<canvas id="cv"></canvas>

<div class="panel controls">
  <h3>Controls</h3>
  <div class="control-row">
    <label>Tolerance &alpha;</label>
    <input type="range" id="tolerance" min="1.05" max="2.5" step="0.01" value="1.25">
    <span class="value" id="toleranceVal">1.25</span>
  </div>
  <div class="control-row">
    <label>Cascade speed</label>
    <input type="range" id="speed" min="1" max="20" step="1" value="6">
    <span class="value" id="speedVal">6</span>
  </div>
  <div class="buttons">
    <button id="attackBtn" class="primary">Attack hub</button>
    <button id="randomBtn">Random fail</button>
  </div>
  <div class="buttons">
    <button id="resetBtn">Reset network</button>
    <button id="newBtn">New topology</button>
  </div>
  <div class="hint">Click a node to fail it manually.</div>
</div>

<div class="panel stats">
  <h3>Live Stats</h3>
  <div class="stat-row">
    <span class="stat-label">Active nodes</span>
    <span class="stat-value" id="activeStat">100%</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Largest component</span>
    <span class="stat-value" id="lccStat">150</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Cascade depth</span>
    <span class="stat-value" id="depthStat">0</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Total failed</span>
    <span class="stat-value" id="failedStat">0</span>
  </div>
</div>

<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">

<script>
(() => {
  const canvas = document.getElementById('cv');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0, DPR = window.devicePixelRatio || 1;
  function resize() {
    DPR = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ---- Barabasi-Albert network ----
  const N = 150;
  const M = 2; // edges added per new node

  let nodes = [];
  let edges = [];
  let adj = [];

  function buildBA() {
    nodes = [];
    edges = [];
    adj = Array.from({ length: N }, () => []);

    // Seed with small complete graph
    const seedSize = M + 1;
    for (let i = 0; i < seedSize; i++) {
      nodes.push(makeNode(i));
    }
    for (let i = 0; i < seedSize; i++) {
      for (let j = i + 1; j < seedSize; j++) {
        addEdge(i, j);
      }
    }

    // Preferential attachment
    for (let i = seedSize; i < N; i++) {
      nodes.push(makeNode(i));
      const targets = new Set();
      // Build roulette from degrees
      const degreeSum = edges.length * 2;
      while (targets.size < M) {
        let r = Math.random() * degreeSum;
        let picked = -1;
        for (let k = 0; k < i; k++) {
          r -= adj[k].length;
          if (r <= 0) { picked = k; break; }
        }
        if (picked === -1) picked = Math.floor(Math.random() * i);
        if (!targets.has(picked)) targets.add(picked);
      }
      targets.forEach(t => addEdge(i, t));
    }

    // Layout init: random positions in a circle
    const cx = W / 2, cy = H / 2;
    const R = Math.min(W, H) * 0.38;
    for (let i = 0; i < N; i++) {
      const a = Math.random() * Math.PI * 2;
      const r = Math.sqrt(Math.random()) * R;
      nodes[i].x = cx + Math.cos(a) * r;
      nodes[i].y = cy + Math.sin(a) * r;
      nodes[i].vx = 0;
      nodes[i].vy = 0;
    }

    // Assign initial load based on betweenness-like proxy: degree^1.5
    for (let i = 0; i < N; i++) {
      const deg = adj[i].length;
      nodes[i].baseLoad = Math.pow(deg, 1.4);
    }
    setCapacities();
    resetState();
  }

  function makeNode(i) {
    return {
      id: i, x: 0, y: 0, vx: 0, vy: 0,
      load: 0, capacity: 1, baseLoad: 1,
      state: 'live', // live | over | failed
      failStep: -1, depth: -1, overCounter: 0
    };
  }

  function addEdge(a, b) {
    if (a === b) return;
    if (adj[a].includes(b)) return;
    edges.push({ a, b, stress: 0 });
    adj[a].push(b);
    adj[b].push(a);
  }

  function setCapacities() {
    const alpha = parseFloat(document.getElementById('tolerance').value);
    for (let i = 0; i < N; i++) {
      nodes[i].capacity = nodes[i].baseLoad * alpha;
    }
  }

  function resetState() {
    for (let i = 0; i < N; i++) {
      nodes[i].load = nodes[i].baseLoad;
      nodes[i].state = 'live';
      nodes[i].failStep = -1;
      nodes[i].depth = -1;
      nodes[i].overCounter = 0;
    }
    for (const e of edges) e.stress = 0;
    cascadeStep = 0;
    maxDepth = 0;
    updateStats();
  }

  // ---- Force-directed layout ----
  function layoutStep() {
    const cx = W / 2, cy = H / 2;
    const k = 38; // desired edge length
    const rep = 900;
    const centerPull = 0.004;
    const damp = 0.82;

    for (let i = 0; i < N; i++) {
      const a = nodes[i];
      let fx = 0, fy = 0;

      // Repulsion (approx, skip distant nodes)
      for (let j = 0; j < N; j++) {
        if (i === j) continue;
        const b = nodes[j];
        let dx = a.x - b.x;
        let dy = a.y - b.y;
        let d2 = dx * dx + dy * dy + 0.01;
        if (d2 > 40000) continue;
        const d = Math.sqrt(d2);
        const f = rep / d2;
        fx += (dx / d) * f;
        fy += (dy / d) * f;
      }

      // Attraction along edges
      for (const nb of adj[i]) {
        const b = nodes[nb];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const d = Math.sqrt(dx * dx + dy * dy) + 0.01;
        const f = (d - k) * 0.04;
        fx += (dx / d) * f * d;
        fy += (dy / d) * f * d;
      }

      // Center pull
      fx += (cx - a.x) * centerPull;
      fy += (cy - a.y) * centerPull;

      a.vx = (a.vx + fx * 0.02) * damp;
      a.vy = (a.vy + fy * 0.02) * damp;
    }
    for (let i = 0; i < N; i++) {
      const a = nodes[i];
      a.x += a.vx;
      a.y += a.vy;
      // Gentle bounds
      const pad = 40;
      if (a.x < pad) { a.x = pad; a.vx *= -0.5; }
      if (a.x > W - pad) { a.x = W - pad; a.vx *= -0.5; }
      if (a.y < pad) { a.y = pad; a.vy *= -0.5; }
      if (a.y > H - pad) { a.y = H - pad; a.vy *= -0.5; }
    }
  }

  // ---- Cascade dynamics ----
  let cascadeStep = 0;
  let maxDepth = 0;
  let stepTimer = 0;

  function failNode(id, depth = 0) {
    const n = nodes[id];
    if (n.state === 'failed') return;
    n.state = 'failed';
    n.failStep = cascadeStep;
    n.depth = depth;
    if (depth > maxDepth) maxDepth = depth;

    // Redistribute load proportionally to neighbors' free capacity
    const liveNeighbors = adj[id].filter(j => nodes[j].state !== 'failed');
    if (liveNeighbors.length === 0) { n.load = 0; return; }

    const weights = liveNeighbors.map(j => {
      const nb = nodes[j];
      return Math.max(0.001, nb.capacity);
    });
    const wSum = weights.reduce((s, v) => s + v, 0);
    const redistributed = n.load;
    for (let k = 0; k < liveNeighbors.length; k++) {
      const share = (weights[k] / wSum) * redistributed;
      nodes[liveNeighbors[k]].load += share;
    }
    n.load = 0;
  }

  function cascadeSubstep() {
    // Mark over-capacity nodes
    for (let i = 0; i < N; i++) {
      const n = nodes[i];
      if (n.state === 'failed') continue;
      if (n.load > n.capacity) {
        if (n.state === 'live') n.state = 'over';
        n.overCounter++;
      } else {
        n.state = 'live';
        n.overCounter = 0;
      }
    }

    // Fail nodes that have been overloaded (slight delay for visual drama)
    const toFail = [];
    for (let i = 0; i < N; i++) {
      if (nodes[i].state === 'over' && nodes[i].overCounter >= 1) {
        toFail.push(i);
      }
    }

    // Determine current depth: 1 + max depth of failed neighbors
    for (const id of toFail) {
      let d = 0;
      for (const j of adj[id]) {
        if (nodes[j].state === 'failed') {
          d = Math.max(d, nodes[j].depth + 1);
        }
      }
      failNode(id, d);
    }

    cascadeStep++;

    // Update edge stress
    for (const e of edges) {
      const a = nodes[e.a], b = nodes[e.b];
      if (a.state === 'failed' || b.state === 'failed') {
        e.stress = Math.max(0, e.stress - 0.05);
      } else {
        const loadRatio = Math.max(a.load / a.capacity, b.load / b.capacity);
        e.stress = Math.min(1, loadRatio - 0.8) * (loadRatio > 0.8 ? 1 : 0);
        if (loadRatio > 1) e.stress = 1;
      }
    }

    updateStats();
  }

  // ---- Connected components ----
  function largestComponent() {
    const visited = new Uint8Array(N);
    let best = 0;
    for (let i = 0; i < N; i++) {
      if (visited[i] || nodes[i].state === 'failed') continue;
      // BFS
      const q = [i];
      visited[i] = 1;
      let size = 0;
      while (q.length) {
        const v = q.pop();
        size++;
        for (const u of adj[v]) {
          if (!visited[u] && nodes[u].state !== 'failed') {
            visited[u] = 1;
            q.push(u);
          }
        }
      }
      if (size > best) best = size;
    }
    return best;
  }

  function updateStats() {
    const live = nodes.filter(n => n.state !== 'failed').length;
    const pct = Math.round((live / N) * 100);
    const lcc = largestComponent();
    const failed = N - live;

    const activeEl = document.getElementById('activeStat');
    activeEl.textContent = pct + '%';
    activeEl.className = 'stat-value' + (pct < 40 ? ' danger' : pct < 75 ? ' warn' : '');

    document.getElementById('lccStat').textContent = lcc;
    document.getElementById('depthStat').textContent = maxDepth;
    document.getElementById('failedStat').textContent = failed;
  }

  // ---- Rendering ----
  function render() {
    ctx.fillStyle = 'rgba(10, 10, 15, 0.92)';
    ctx.fillRect(0, 0, W, H);

    // Edges
    for (const e of edges) {
      const a = nodes[e.a], b = nodes[e.b];
      const failed = a.state === 'failed' || b.state === 'failed';
      if (failed) {
        ctx.strokeStyle = 'rgba(120, 70, 40, 0.12)';
        ctx.lineWidth = 0.5;
      } else if (e.stress > 0.01) {
        const t = e.stress;
        ctx.strokeStyle = `rgba(${Math.round(230 - 60 * (1 - t))}, ${Math.round(70 * (1 - t) + 50)}, ${Math.round(60 * (1 - t) + 30)}, ${0.35 + t * 0.55})`;
        ctx.lineWidth = 0.7 + t * 1.6;
      } else {
        ctx.strokeStyle = 'rgba(96, 108, 56, 0.28)';
        ctx.lineWidth = 0.6;
      }
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }

    // Nodes
    for (let i = 0; i < N; i++) {
      const n = nodes[i];
      const deg = adj[i].length;
      const r = 3 + Math.sqrt(deg) * 1.4;

      if (n.state === 'failed') {
        ctx.fillStyle = 'rgba(188, 108, 37, 0.35)';
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(188, 108, 37, 0.5)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
      } else if (n.state === 'over') {
        // pulsing earth glow
        const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.012 + i);
        const glow = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r * 3.5);
        glow.addColorStop(0, `rgba(221, 161, 94, ${0.55 + pulse * 0.3})`);
        glow.addColorStop(1, 'rgba(221, 161, 94, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r * 3.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#DDA15E';
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // live — sage glow
        const loadRatio = n.load / n.capacity;
        const glow = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r * 2.8);
        glow.addColorStop(0, 'rgba(138, 154, 91, 0.55)');
        glow.addColorStop(1, 'rgba(138, 154, 91, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r * 2.8, 0, Math.PI * 2);
        ctx.fill();

        const g = Math.round(154 - loadRatio * 40);
        ctx.fillStyle = `rgb(${Math.round(138 + loadRatio * 60)}, ${g}, 91)`;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // ---- Main loop ----
  const speedSlider = document.getElementById('speed');
  function tick() {
    layoutStep();
    stepTimer++;
    const speed = parseInt(speedSlider.value);
    if (stepTimer >= Math.max(1, Math.round(22 - speed))) {
      stepTimer = 0;
      cascadeSubstep();
    }
    render();
    requestAnimationFrame(tick);
  }

  // ---- Controls ----
  document.getElementById('tolerance').addEventListener('input', e => {
    document.getElementById('toleranceVal').textContent = parseFloat(e.target.value).toFixed(2);
    setCapacities();
  });
  speedSlider.addEventListener('input', e => {
    document.getElementById('speedVal').textContent = e.target.value;
  });

  document.getElementById('attackBtn').addEventListener('click', () => {
    // Fail highest-degree live node
    let best = -1, bestDeg = -1;
    for (let i = 0; i < N; i++) {
      if (nodes[i].state !== 'failed' && adj[i].length > bestDeg) {
        bestDeg = adj[i].length;
        best = i;
      }
    }
    if (best >= 0) failNode(best, 0);
  });

  document.getElementById('randomBtn').addEventListener('click', () => {
    const live = [];
    for (let i = 0; i < N; i++) if (nodes[i].state !== 'failed') live.push(i);
    if (live.length === 0) return;
    failNode(live[Math.floor(Math.random() * live.length)], 0);
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    setCapacities();
    resetState();
  });

  document.getElementById('newBtn').addEventListener('click', () => {
    buildBA();
  });

  // Click on node to fail it
  canvas.addEventListener('click', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    let closest = -1, bestD = 18 * 18;
    for (let i = 0; i < N; i++) {
      if (nodes[i].state === 'failed') continue;
      const dx = nodes[i].x - mx;
      const dy = nodes[i].y - my;
      const d = dx * dx + dy * dy;
      if (d < bestD) { bestD = d; closest = i; }
    }
    if (closest >= 0) failNode(closest, 0);
  });

  // Initial build
  buildBA();

  // Warm layout for a few steps before cascade
  for (let i = 0; i < 120; i++) layoutStep();

  tick();
})();
</script>
