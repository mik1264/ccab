<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPD Tournament — Complex Adaptive Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        color: #FEFAE0;
    }

    #grid {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
    }

    .organic-back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(254, 250, 224, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(138, 154, 91, 0.35);
        border-radius: 999px;
        color: #FEFAE0;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 100;
    }

    .organic-back-link:hover {
        background: rgba(138, 154, 91, 0.25);
        transform: translateX(-3px);
        border-color: rgba(138, 154, 91, 0.6);
    }

    .back-arrow { font-size: 16px; font-weight: 600; }

    .panel {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 300px;
        background: rgba(20, 20, 28, 0.78);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(138, 154, 91, 0.25);
        border-radius: 16px;
        padding: 20px 22px;
        z-index: 100;
    }

    .panel h1 {
        font-family: 'Lora', Georgia, serif;
        font-size: 18px;
        font-weight: 600;
        color: #DDA15E;
        margin-bottom: 4px;
    }

    .subtitle {
        font-size: 12px;
        color: rgba(254, 250, 224, 0.6);
        margin-bottom: 16px;
        font-style: italic;
    }

    .control {
        margin-bottom: 12px;
    }

    .control label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: rgba(254, 250, 224, 0.75);
        margin-bottom: 5px;
    }

    .control label span.val {
        color: #8A9A5B;
        font-weight: 600;
    }

    .control input[type=range] {
        width: 100%;
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        background: rgba(138, 154, 91, 0.3);
        border-radius: 2px;
        outline: none;
    }

    .control input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        background: #DDA15E;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid #0a0a0f;
    }

    .control input[type=range]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        background: #DDA15E;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid #0a0a0f;
    }

    .buttons {
        display: flex;
        gap: 8px;
        margin: 14px 0 4px;
    }

    button {
        flex: 1;
        padding: 8px 10px;
        background: rgba(138, 154, 91, 0.2);
        border: 1px solid rgba(138, 154, 91, 0.4);
        border-radius: 8px;
        color: #FEFAE0;
        font-family: 'Nunito', sans-serif;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    button:hover {
        background: rgba(138, 154, 91, 0.4);
        border-color: rgba(138, 154, 91, 0.7);
    }

    .legend {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: rgba(20, 20, 28, 0.78);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(138, 154, 91, 0.25);
        border-radius: 14px;
        padding: 14px 18px;
        z-index: 100;
        font-size: 12px;
    }

    .legend h2 {
        font-family: 'Lora', Georgia, serif;
        font-size: 13px;
        font-weight: 600;
        color: #DDA15E;
        margin-bottom: 8px;
    }

    .legend-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
    }

    .swatch {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        flex-shrink: 0;
    }

    .legend-row .pct {
        margin-left: auto;
        color: rgba(254, 250, 224, 0.75);
        font-variant-numeric: tabular-nums;
        font-weight: 600;
    }

    .stack-bar {
        display: flex;
        height: 10px;
        width: 100%;
        border-radius: 5px;
        overflow: hidden;
        margin-top: 10px;
        margin-bottom: 8px;
        border: 1px solid rgba(138, 154, 91, 0.2);
    }

    .stack-seg {
        height: 100%;
        transition: width 0.35s ease;
    }

    .timeseries {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 340px;
        height: 130px;
        background: rgba(20, 20, 28, 0.78);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(138, 154, 91, 0.25);
        border-radius: 14px;
        padding: 12px 14px 6px;
        z-index: 100;
    }

    .timeseries h2 {
        font-family: 'Lora', Georgia, serif;
        font-size: 12px;
        font-weight: 600;
        color: #DDA15E;
        margin-bottom: 4px;
    }

    #chart {
        display: block;
        width: 100%;
        height: 90px;
    }

    .generation {
        font-size: 11px;
        color: rgba(254, 250, 224, 0.55);
        margin-top: 2px;
    }

    @media (max-width: 700px) {
        .panel { width: calc(100vw - 40px); }
        .legend, .timeseries { display: none; }
    }
</style>
</head>
<body>

<a href="index.html" class="organic-back-link">
    <span class="back-arrow">&larr;</span>
    <span class="back-text">Gallery</span>
</a>

<canvas id="grid"></canvas>

<div class="panel">
    <h1>Spatial IPD Tournament</h1>
    <div class="subtitle">Strategies compete; losers copy winners.</div>

    <div class="control">
        <label>IPD rounds / encounter <span class="val" id="roundsVal">40</span></label>
        <input type="range" id="roundsSlider" min="1" max="200" value="40">
    </div>
    <div class="control">
        <label>Mutation rate <span class="val" id="mutVal">0.5%</span></label>
        <input type="range" id="mutSlider" min="0" max="100" value="5">
    </div>
    <div class="control">
        <label>Generation speed <span class="val" id="spdVal">Fast</span></label>
        <input type="range" id="spdSlider" min="1" max="10" value="6">
    </div>

    <div class="stack-bar" id="stackBar"></div>

    <div class="buttons">
        <button id="pauseBtn">Pause</button>
        <button id="stepBtn">Step</button>
        <button id="resetBtn">Reset</button>
    </div>
    <div class="generation" id="genLabel">Generation 0</div>
</div>

<div class="legend" id="legend">
    <h2>Strategies</h2>
</div>

<div class="timeseries">
    <h2>Population over time</h2>
    <canvas id="chart"></canvas>
</div>

<script>
(function(){
    // -----------------------------------------------------------------
    // Strategies. Each has name, color, and a move function.
    //   move(self, opp, history): returns 'C' or 'D'
    //   history is {self: [], opp: []} of past moves this encounter.
    // -----------------------------------------------------------------
    const STRATEGIES = [
        {
            name: 'AllC',
            label: 'All-Cooperate',
            color: '#8A9A5B',   // sage
            move: () => 'C'
        },
        {
            name: 'AllD',
            label: 'All-Defect',
            color: '#BC6C25',   // terracotta
            move: () => 'D'
        },
        {
            name: 'TFT',
            label: 'Tit-for-Tat',
            color: '#DDA15E',   // earth
            move: (h) => h.opp.length === 0 ? 'C' : h.opp[h.opp.length - 1]
        },
        {
            name: 'GTFT',
            label: 'Generous TFT',
            color: '#E9C46A',   // soft gold
            move: (h) => {
                if (h.opp.length === 0) return 'C';
                const last = h.opp[h.opp.length - 1];
                if (last === 'C') return 'C';
                // Forgive defection with probability ~10%
                return Math.random() < 0.1 ? 'C' : 'D';
            }
        },
        {
            name: 'WSLS',
            label: 'Win-Stay Lose-Shift',
            color: '#6B9080',   // teal-moss
            move: (h) => {
                if (h.self.length === 0) return 'C';
                const myLast = h.self[h.self.length - 1];
                const theirLast = h.opp[h.opp.length - 1];
                // "Win" = got R (C vs C) or T (D vs C)
                const won = (myLast === 'C' && theirLast === 'C') ||
                            (myLast === 'D' && theirLast === 'C');
                return won ? myLast : (myLast === 'C' ? 'D' : 'C');
            }
        },
        {
            name: 'Random',
            label: 'Random',
            color: '#9D8189',   // dusty rose
            move: () => Math.random() < 0.5 ? 'C' : 'D'
        },
        {
            name: 'Grudger',
            label: 'Grudger',
            color: '#3D4423',   // dark moss
            move: (h) => {
                for (let i = 0; i < h.opp.length; i++) {
                    if (h.opp[i] === 'D') return 'D';
                }
                return 'C';
            }
        }
    ];

    const NS = STRATEGIES.length;
    const GRID = 80;

    // Payoffs: T > R > P > S and 2R > T + S
    const T = 5, R = 3, P = 1, S = 0;

    function payoff(a, b) {
        if (a === 'C' && b === 'C') return [R, R];
        if (a === 'C' && b === 'D') return [S, T];
        if (a === 'D' && b === 'C') return [T, S];
        return [P, P];
    }

    // Play an N-round encounter between two strategy indices.
    function encounter(sA, sB, nRounds) {
        const h = { self: [], opp: [] };   // history from A's viewpoint
        let scoreA = 0, scoreB = 0;
        for (let i = 0; i < nRounds; i++) {
            const moveA = STRATEGIES[sA].move({ self: h.self, opp: h.opp });
            const moveB = STRATEGIES[sB].move({ self: h.opp, opp: h.self });
            const [pa, pb] = payoff(moveA, moveB);
            scoreA += pa;
            scoreB += pb;
            h.self.push(moveA);
            h.opp.push(moveB);
        }
        return [scoreA, scoreB];
    }

    // -----------------------------------------------------------------
    // Grid state
    // -----------------------------------------------------------------
    let cells = new Int8Array(GRID * GRID);
    let scores = new Float32Array(GRID * GRID);
    let generation = 0;

    function idx(x, y) { return y * GRID + x; }

    function reset() {
        for (let i = 0; i < cells.length; i++) {
            cells[i] = (Math.random() * NS) | 0;
        }
        generation = 0;
        history.length = 0;
        pushHistory();
    }

    // Neighborhood: Moore (8 neighbors) with toroidal wrap
    const NX = [-1, 0, 1, -1, 1, -1, 0, 1];
    const NY = [-1, -1, -1, 0, 0, 1, 1, 1];

    function computeScores(nRounds) {
        // Each cell plays encounter with each Moore neighbor; averaged score.
        for (let i = 0; i < scores.length; i++) scores[i] = 0;
        const counts = new Uint8Array(cells.length);

        // To save work: play each pair once, credit both cells.
        // We enumerate 4 of the 8 directions (the "forward" half).
        const dirs = [[1, 0], [1, 1], [0, 1], [-1, 1]];
        for (let y = 0; y < GRID; y++) {
            for (let x = 0; x < GRID; x++) {
                const i = idx(x, y);
                const sA = cells[i];
                for (let d = 0; d < dirs.length; d++) {
                    const nx = (x + dirs[d][0] + GRID) % GRID;
                    const ny = (y + dirs[d][1] + GRID) % GRID;
                    const j = idx(nx, ny);
                    const sB = cells[j];
                    const [pa, pb] = encounter(sA, sB, nRounds);
                    scores[i] += pa;
                    scores[j] += pb;
                    counts[i]++;
                    counts[j]++;
                }
            }
        }
        // Normalize to average per-opponent per-round so payoffs are comparable.
        const denom = nRounds;
        for (let i = 0; i < scores.length; i++) {
            scores[i] /= (counts[i] * denom) || 1;
        }
    }

    function evolve(mutation) {
        // Each cell copies the strategy of the best-scoring cell in its
        // Moore neighborhood (including itself).
        const next = new Int8Array(cells.length);
        for (let y = 0; y < GRID; y++) {
            for (let x = 0; x < GRID; x++) {
                const i = idx(x, y);
                let bestScore = scores[i];
                let bestStrat = cells[i];
                for (let d = 0; d < 8; d++) {
                    const nx = (x + NX[d] + GRID) % GRID;
                    const ny = (y + NY[d] + GRID) % GRID;
                    const j = idx(nx, ny);
                    if (scores[j] > bestScore) {
                        bestScore = scores[j];
                        bestStrat = cells[j];
                    }
                }
                if (Math.random() < mutation) {
                    next[i] = (Math.random() * NS) | 0;
                } else {
                    next[i] = bestStrat;
                }
            }
        }
        cells = next;
        generation++;
    }

    // -----------------------------------------------------------------
    // Rendering
    // -----------------------------------------------------------------
    const canvas = document.getElementById('grid');
    const ctx = canvas.getContext('2d');

    // Offscreen canvas at grid resolution; scale up via CSS / drawImage.
    const off = document.createElement('canvas');
    off.width = GRID;
    off.height = GRID;
    const offCtx = off.getContext('2d');
    const imageData = offCtx.createImageData(GRID, GRID);

    // Pre-compute strategy RGB triplets
    const stratRGB = STRATEGIES.map(s => {
        const hex = s.color.substring(1);
        return [
            parseInt(hex.substring(0, 2), 16),
            parseInt(hex.substring(2, 4), 16),
            parseInt(hex.substring(4, 6), 16)
        ];
    });

    function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resize);
    resize();

    function draw() {
        const data = imageData.data;
        for (let i = 0; i < cells.length; i++) {
            const rgb = stratRGB[cells[i]];
            const p = i * 4;
            data[p] = rgb[0];
            data[p + 1] = rgb[1];
            data[p + 2] = rgb[2];
            data[p + 3] = 255;
        }
        offCtx.putImageData(imageData, 0, 0);

        // Fit the grid to the viewport as a centered square.
        const W = canvas.width, H = canvas.height;
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, W, H);
        const size = Math.min(W, H);
        const ox = (W - size) / 2;
        const oy = (H - size) / 2;
        ctx.drawImage(off, 0, 0, GRID, GRID, ox, oy, size, size);
    }

    // -----------------------------------------------------------------
    // Stats: legend + stacked bar + time series
    // -----------------------------------------------------------------
    const legendEl = document.getElementById('legend');
    const legendRows = [];
    STRATEGIES.forEach((s, i) => {
        const row = document.createElement('div');
        row.className = 'legend-row';
        row.innerHTML = `
            <div class="swatch" style="background:${s.color}"></div>
            <div class="name">${s.label}</div>
            <div class="pct" data-i="${i}">0%</div>
        `;
        legendEl.appendChild(row);
        legendRows.push(row.querySelector('.pct'));
    });

    const stackBar = document.getElementById('stackBar');
    const stackSegs = STRATEGIES.map(s => {
        const seg = document.createElement('div');
        seg.className = 'stack-seg';
        seg.style.background = s.color;
        seg.style.width = (100 / NS) + '%';
        stackBar.appendChild(seg);
        return seg;
    });

    const chart = document.getElementById('chart');
    const chartCtx = chart.getContext('2d');
    const history = [];       // array of Uint16Array(NS) — counts over time
    const HISTORY_MAX = 220;

    function tally() {
        const counts = new Uint16Array(NS);
        for (let i = 0; i < cells.length; i++) counts[cells[i]]++;
        return counts;
    }

    function pushHistory() {
        history.push(tally());
        if (history.length > HISTORY_MAX) history.shift();
    }

    function updateStats() {
        const counts = history[history.length - 1];
        const total = cells.length;
        for (let i = 0; i < NS; i++) {
            const pct = 100 * counts[i] / total;
            legendRows[i].textContent = pct.toFixed(1) + '%';
            stackSegs[i].style.width = pct + '%';
        }
        document.getElementById('genLabel').textContent = 'Generation ' + generation;
        drawChart();
    }

    function drawChart() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const cssW = chart.clientWidth, cssH = chart.clientHeight;
        if (chart.width !== cssW * dpr || chart.height !== cssH * dpr) {
            chart.width = cssW * dpr;
            chart.height = cssH * dpr;
        }
        const W = chart.width, H = chart.height;
        chartCtx.clearRect(0, 0, W, H);

        if (history.length < 2) return;
        const n = history.length;
        const total = cells.length;
        const stepX = W / Math.max(HISTORY_MAX - 1, 1);

        // Stacked area chart: draw each strategy as a band.
        const cum = new Float32Array(n);
        for (let s = 0; s < NS; s++) {
            chartCtx.fillStyle = STRATEGIES[s].color;
            chartCtx.beginPath();
            // top edge (previous cum) — left to right
            for (let t = 0; t < n; t++) {
                const x = t * stepX;
                const yTop = H - (cum[t] / total) * H;
                if (t === 0) chartCtx.moveTo(x, yTop);
                else chartCtx.lineTo(x, yTop);
            }
            // bottom edge (new cum) — right to left
            for (let t = n - 1; t >= 0; t--) {
                cum[t] += history[t][s];
                const x = t * stepX;
                const yBot = H - (cum[t] / total) * H;
                chartCtx.lineTo(x, yBot);
            }
            chartCtx.closePath();
            chartCtx.fill();
        }
    }

    // -----------------------------------------------------------------
    // Controls
    // -----------------------------------------------------------------
    const roundsSlider = document.getElementById('roundsSlider');
    const roundsVal = document.getElementById('roundsVal');
    const mutSlider = document.getElementById('mutSlider');
    const mutVal = document.getElementById('mutVal');
    const spdSlider = document.getElementById('spdSlider');
    const spdVal = document.getElementById('spdVal');

    let rounds = +roundsSlider.value;
    let mutation = +mutSlider.value / 1000;   // 0..100 -> 0..0.1
    let speed = +spdSlider.value;
    let paused = false;

    function updateRoundsLabel() { roundsVal.textContent = rounds; }
    function updateMutLabel() {
        mutVal.textContent = (mutation * 100).toFixed(1) + '%';
    }
    function updateSpdLabel() {
        const labels = ['Very slow', 'Slow', 'Slow', 'Medium', 'Medium',
                        'Medium', 'Fast', 'Fast', 'Faster', 'Max'];
        spdVal.textContent = labels[speed - 1] || 'Fast';
    }
    updateRoundsLabel(); updateMutLabel(); updateSpdLabel();

    roundsSlider.addEventListener('input', () => {
        rounds = +roundsSlider.value;
        updateRoundsLabel();
    });
    mutSlider.addEventListener('input', () => {
        mutation = +mutSlider.value / 1000;
        updateMutLabel();
    });
    spdSlider.addEventListener('input', () => {
        speed = +spdSlider.value;
        updateSpdLabel();
    });

    document.getElementById('pauseBtn').addEventListener('click', (e) => {
        paused = !paused;
        e.target.textContent = paused ? 'Resume' : 'Pause';
    });
    document.getElementById('stepBtn').addEventListener('click', () => {
        computeScores(rounds);
        evolve(mutation);
        pushHistory();
        draw();
        updateStats();
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
        reset();
        draw();
        updateStats();
    });

    // -----------------------------------------------------------------
    // Main loop. speed 1..10 -> delay between generations.
    // -----------------------------------------------------------------
    reset();
    draw();
    updateStats();

    let lastStep = 0;
    function frame(now) {
        const delay = Math.max(40, 1200 - speed * 120); // ms per gen
        if (!paused && now - lastStep >= delay) {
            computeScores(rounds);
            evolve(mutation);
            pushHistory();
            draw();
            updateStats();
            lastStep = now;
        }
        requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

})();
</script>
</body>
</html>
