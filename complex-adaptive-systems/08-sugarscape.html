<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugarscape — Complex Adaptive Systems</title>
<style>
    :root {
        --bg: #0a0a0f;
        --cream: #FEFAE0;
        --earth: #DDA15E;
        --sage: #8A9A5B;
        --moss: #606C38;
        --terracotta: #BC6C25;
        --glass: rgba(20, 20, 28, 0.72);
        --border: rgba(221, 161, 94, 0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        height: 100%;
        background: var(--bg);
        color: var(--cream);
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        overflow: hidden;
    }
    canvas#grid {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        image-rendering: pixelated;
    }
    .organic-back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        background: var(--glass);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--border);
        border-radius: 24px;
        color: var(--cream);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        z-index: 100;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .organic-back-link:hover {
        background: rgba(138, 154, 91, 0.2);
        border-color: var(--sage);
        transform: translateX(-2px);
    }
    .back-arrow { font-size: 16px; color: var(--earth); }
    .title-card {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 14px 22px;
        background: var(--glass);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--border);
        border-radius: 18px;
        z-index: 100;
        max-width: 320px;
    }
    .title-card h1 {
        font-family: 'Lora', Georgia, serif;
        font-size: 22px;
        font-weight: 600;
        color: var(--earth);
        margin-bottom: 4px;
    }
    .title-card p {
        font-size: 12px;
        opacity: 0.75;
        line-height: 1.4;
    }
    .controls {
        position: fixed;
        left: 20px;
        bottom: 20px;
        padding: 18px 20px;
        background: var(--glass);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--border);
        border-radius: 18px;
        z-index: 100;
        min-width: 280px;
    }
    .controls h3 {
        font-family: 'Lora', Georgia, serif;
        font-size: 13px;
        font-weight: 600;
        color: var(--sage);
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }
    .ctrl-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
        font-size: 12px;
    }
    .ctrl-row label {
        flex: 0 0 120px;
        color: var(--cream);
        opacity: 0.85;
    }
    .ctrl-row input[type="range"] {
        flex: 1;
        accent-color: var(--earth);
        height: 3px;
    }
    .ctrl-row .val {
        flex: 0 0 36px;
        text-align: right;
        color: var(--earth);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }
    .buttons {
        display: flex;
        gap: 8px;
        margin-top: 10px;
    }
    .buttons button {
        flex: 1;
        padding: 8px 12px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--cream);
        font-family: inherit;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
    }
    .buttons button:hover {
        background: rgba(221, 161, 94, 0.15);
        border-color: var(--earth);
    }
    .buttons button.primary {
        background: rgba(138, 154, 91, 0.18);
        border-color: var(--sage);
    }
    .stats-panel {
        position: fixed;
        right: 20px;
        bottom: 20px;
        padding: 16px 20px;
        background: var(--glass);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--border);
        border-radius: 18px;
        z-index: 100;
        min-width: 260px;
    }
    .stats-panel h3 {
        font-family: 'Lora', Georgia, serif;
        font-size: 13px;
        font-weight: 600;
        color: var(--sage);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }
    .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        margin-bottom: 6px;
    }
    .stat-row .k { opacity: 0.7; }
    .stat-row .v {
        color: var(--earth);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }
    canvas#lorenz {
        display: block;
        margin-top: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(10, 10, 15, 0.6);
    }
    .lorenz-label {
        font-size: 10px;
        opacity: 0.6;
        text-align: center;
        margin-top: 4px;
        letter-spacing: 0.05em;
    }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<a href="index.html" class="organic-back-link">
    <span class="back-arrow">&larr;</span>
    <span class="back-text">Gallery</span>
</a>

<canvas id="grid"></canvas>

<div class="title-card">
    <h1>Sugarscape</h1>
    <p>Epstein &amp; Axtell (1996) — agents forage sugar mountains; wealth inequality emerges from simple rules.</p>
</div>

<div class="controls">
    <h3>Controls</h3>
    <div class="ctrl-row">
        <label>Agent count</label>
        <input id="c-agents" type="range" min="50" max="600" step="10" value="280">
        <span class="val" id="v-agents">280</span>
    </div>
    <div class="ctrl-row">
        <label>Max vision</label>
        <input id="c-vision" type="range" min="1" max="10" step="1" value="6">
        <span class="val" id="v-vision">6</span>
    </div>
    <div class="ctrl-row">
        <label>Max metabolism</label>
        <input id="c-metab" type="range" min="1" max="6" step="1" value="4">
        <span class="val" id="v-metab">4</span>
    </div>
    <div class="ctrl-row">
        <label>Growback / tick</label>
        <input id="c-grow" type="range" min="0" max="4" step="1" value="1">
        <span class="val" id="v-grow">1</span>
    </div>
    <div class="buttons">
        <button id="btn-pause" class="primary">Pause</button>
        <button id="btn-reset">Reset</button>
    </div>
</div>

<div class="stats-panel">
    <h3>Live Stats</h3>
    <div class="stat-row"><span class="k">Tick</span><span class="v" id="s-tick">0</span></div>
    <div class="stat-row"><span class="k">Population</span><span class="v" id="s-pop">0</span></div>
    <div class="stat-row"><span class="k">Mean wealth</span><span class="v" id="s-mean">0.0</span></div>
    <div class="stat-row"><span class="k">Max wealth</span><span class="v" id="s-max">0</span></div>
    <div class="stat-row"><span class="k">Gini coefficient</span><span class="v" id="s-gini">0.000</span></div>
    <canvas id="lorenz" width="240" height="120"></canvas>
    <div class="lorenz-label">Lorenz curve (wealth distribution)</div>
</div>

<script>
(function(){
    'use strict';

    // ---------- Simulation config ----------
    const N = 50; // grid size (NxN cells)
    const CAPACITY_MAX = 4;
    const MOUNTAIN_A = { x: 12, y: 12 };
    const MOUNTAIN_B = { x: 37, y: 37 };
    const MOUNTAIN_RADIUS = 18; // falloff radius

    // ---------- State ----------
    let capacity = new Float32Array(N * N); // max sugar at each cell
    let sugar = new Float32Array(N * N);    // current sugar
    let agents = [];
    let tick = 0;
    let paused = false;
    let growbackRate = 1;
    let targetAgents = 280;
    let maxVision = 6;
    let maxMetab = 4;

    // ---------- Utility ----------
    function idx(x, y) { return y * N + x; }
    function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
    function randInt(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

    // ---------- Capacity field: two sugar mountains ----------
    function buildCapacity() {
        for (let y = 0; y < N; y++) {
            for (let x = 0; x < N; x++) {
                const dA = Math.hypot(x - MOUNTAIN_A.x, y - MOUNTAIN_A.y);
                const dB = Math.hypot(x - MOUNTAIN_B.x, y - MOUNTAIN_B.y);
                const d = Math.min(dA, dB);
                // mountain -> 4, ring -> 3, next -> 2, outer -> 1, far -> 0
                let cap = 0;
                if (d < 4) cap = 4;
                else if (d < 8) cap = 3;
                else if (d < 13) cap = 2;
                else if (d < 19) cap = 1;
                else cap = 0;
                capacity[idx(x, y)] = cap;
                sugar[idx(x, y)] = cap; // start full
            }
        }
    }

    // ---------- Agents ----------
    function makeAgent() {
        // find empty cell
        let x, y, tries = 0;
        do {
            x = randInt(0, N - 1);
            y = randInt(0, N - 1);
            tries++;
            if (tries > 200) break;
        } while (agentAt(x, y));
        return {
            x, y,
            vision: randInt(1, maxVision),
            metabolism: randInt(1, maxMetab),
            sugar: randInt(5, 25),
            alive: true
        };
    }

    function agentAt(x, y) {
        for (let i = 0; i < agents.length; i++) {
            const a = agents[i];
            if (a.alive && a.x === x && a.y === y) return a;
        }
        return null;
    }

    function resetAgents(n) {
        agents = [];
        for (let i = 0; i < n; i++) agents.push(makeAgent());
    }

    function resetAll() {
        buildCapacity();
        resetAgents(targetAgents);
        tick = 0;
    }

    // ---------- One simulation tick ----------
    // Movement: for each agent, look in 4 cardinal directions up to `vision` cells,
    // pick unoccupied cell with most sugar (nearest on tie), move there, eat, metabolize.
    // Sugar regrows by growbackRate toward capacity.
    function step() {
        // occupancy map for fast lookup this tick
        const occ = new Int32Array(N * N); // store agent index+1 at each cell
        for (let i = 0; i < agents.length; i++) {
            const a = agents[i];
            if (a.alive) occ[idx(a.x, a.y)] = i + 1;
        }

        // shuffle order for fairness
        const order = [];
        for (let i = 0; i < agents.length; i++) if (agents[i].alive) order.push(i);
        for (let i = order.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            const t = order[i]; order[i] = order[j]; order[j] = t;
        }

        for (let oi = 0; oi < order.length; oi++) {
            const a = agents[order[oi]];
            if (!a.alive) continue;

            // search cardinal neighbors up to vision for best cell
            let bestSugar = sugar[idx(a.x, a.y)];
            let bestX = a.x, bestY = a.y, bestDist = 0;
            const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
            for (let d = 0; d < 4; d++) {
                const dx = dirs[d][0], dy = dirs[d][1];
                for (let r = 1; r <= a.vision; r++) {
                    const nx = a.x + dx * r;
                    const ny = a.y + dy * r;
                    if (nx < 0 || nx >= N || ny < 0 || ny >= N) break;
                    const cellIdx = idx(nx, ny);
                    if (occ[cellIdx] !== 0 && occ[cellIdx] !== order[oi] + 1) continue; // occupied
                    const s = sugar[cellIdx];
                    if (s > bestSugar || (s === bestSugar && r < bestDist && bestDist > 0)) {
                        bestSugar = s;
                        bestX = nx;
                        bestY = ny;
                        bestDist = r;
                    }
                }
            }

            // move
            if (bestX !== a.x || bestY !== a.y) {
                occ[idx(a.x, a.y)] = 0;
                a.x = bestX;
                a.y = bestY;
                occ[idx(a.x, a.y)] = order[oi] + 1;
            }

            // eat
            const cell = idx(a.x, a.y);
            a.sugar += sugar[cell];
            sugar[cell] = 0;

            // metabolize
            a.sugar -= a.metabolism;
            if (a.sugar <= 0) {
                a.alive = false;
                occ[idx(a.x, a.y)] = 0;
            }
        }

        // growback
        for (let i = 0; i < capacity.length; i++) {
            if (sugar[i] < capacity[i]) {
                sugar[i] = Math.min(capacity[i], sugar[i] + growbackRate);
            }
        }

        // replenish dead agents to target population
        const living = agents.filter(a => a.alive);
        const need = targetAgents - living.length;
        if (need > 0) {
            for (let i = 0; i < need; i++) living.push(makeAgent());
        } else if (need < 0) {
            living.sort((x, y) => y.sugar - x.sugar);
            living.length = targetAgents;
        }
        agents = living;

        tick++;
    }

    // ---------- Gini coefficient ----------
    function computeGini(values) {
        const n = values.length;
        if (n === 0) return 0;
        const sorted = values.slice().sort((a, b) => a - b);
        let sum = 0, weighted = 0;
        for (let i = 0; i < n; i++) {
            sum += sorted[i];
            weighted += (i + 1) * sorted[i];
        }
        if (sum === 0) return 0;
        return (2 * weighted) / (n * sum) - (n + 1) / n;
    }

    // ---------- Rendering ----------
    const gridCanvas = document.getElementById('grid');
    const gctx = gridCanvas.getContext('2d');
    let cellSize = 12;

    function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        gridCanvas.width = window.innerWidth * dpr;
        gridCanvas.height = window.innerHeight * dpr;
        gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        const w = window.innerWidth;
        const h = window.innerHeight;
        cellSize = Math.min(w, h) / N;
    }
    window.addEventListener('resize', resize);
    resize();

    function draw() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        gctx.fillStyle = '#0a0a0f';
        gctx.fillRect(0, 0, w, h);

        const ox = (w - cellSize * N) / 2;
        const oy = (h - cellSize * N) / 2;

        // draw sugar cells
        for (let y = 0; y < N; y++) {
            for (let x = 0; x < N; x++) {
                const s = sugar[idx(x, y)];
                if (s <= 0) continue;
                const t = s / CAPACITY_MAX;
                // earth #DDA15E with intensity
                const alpha = 0.12 + t * 0.65;
                gctx.fillStyle = `rgba(221, 161, 94, ${alpha.toFixed(3)})`;
                gctx.fillRect(ox + x * cellSize, oy + y * cellSize, cellSize + 0.5, cellSize + 0.5);
            }
        }

        // subtle grid shadow for mountain rings at capacity
        gctx.strokeStyle = 'rgba(96, 108, 56, 0.08)';
        gctx.lineWidth = 1;
        gctx.strokeRect(ox, oy, cellSize * N, cellSize * N);

        // draw agents
        for (let i = 0; i < agents.length; i++) {
            const a = agents[i];
            if (!a.alive) continue;
            const cx = ox + (a.x + 0.5) * cellSize;
            const cy = oy + (a.y + 0.5) * cellSize;
            const w = Math.max(2, Math.min(cellSize * 0.55, 2 + Math.sqrt(a.sugar) * 0.9));
            gctx.beginPath();
            gctx.arc(cx, cy, w / 2, 0, Math.PI * 2);
            gctx.fillStyle = 'rgba(254, 250, 224, 0.92)';
            gctx.fill();
        }
    }

    // ---------- Lorenz / stats ----------
    const lorenzCanvas = document.getElementById('lorenz');
    const lctx = lorenzCanvas.getContext('2d');

    function drawLorenz(values) {
        const W = lorenzCanvas.width;
        const H = lorenzCanvas.height;
        lctx.clearRect(0, 0, W, H);
        // background grid
        lctx.strokeStyle = 'rgba(138, 154, 91, 0.12)';
        lctx.lineWidth = 1;
        for (let i = 1; i < 4; i++) {
            const x = (i / 4) * W;
            const y = (i / 4) * H;
            lctx.beginPath(); lctx.moveTo(x, 0); lctx.lineTo(x, H); lctx.stroke();
            lctx.beginPath(); lctx.moveTo(0, y); lctx.lineTo(W, y); lctx.stroke();
        }
        // equality line
        lctx.strokeStyle = 'rgba(138, 154, 91, 0.5)';
        lctx.setLineDash([3, 3]);
        lctx.beginPath();
        lctx.moveTo(0, H);
        lctx.lineTo(W, 0);
        lctx.stroke();
        lctx.setLineDash([]);

        if (values.length === 0) return;
        const sorted = values.slice().sort((a, b) => a - b);
        const total = sorted.reduce((s, v) => s + v, 0);
        if (total === 0) return;
        // Lorenz curve
        lctx.strokeStyle = 'rgba(221, 161, 94, 0.95)';
        lctx.lineWidth = 2;
        lctx.beginPath();
        lctx.moveTo(0, H);
        let cum = 0;
        for (let i = 0; i < sorted.length; i++) {
            cum += sorted[i];
            const px = ((i + 1) / sorted.length) * W;
            const py = H - (cum / total) * H;
            lctx.lineTo(px, py);
        }
        lctx.stroke();

        // fill under
        lctx.lineTo(W, H);
        lctx.closePath();
        lctx.fillStyle = 'rgba(188, 108, 37, 0.18)';
        lctx.fill();
    }

    function updateStats() {
        const living = agents.filter(a => a.alive);
        const wealth = living.map(a => a.sugar);
        const pop = living.length;
        const mean = pop > 0 ? wealth.reduce((s, v) => s + v, 0) / pop : 0;
        const max = pop > 0 ? Math.max(...wealth) : 0;
        const gini = computeGini(wealth);

        document.getElementById('s-tick').textContent = tick;
        document.getElementById('s-pop').textContent = pop;
        document.getElementById('s-mean').textContent = mean.toFixed(1);
        document.getElementById('s-max').textContent = Math.round(max);
        document.getElementById('s-gini').textContent = gini.toFixed(3);

        drawLorenz(wealth);
    }

    // ---------- Controls wiring ----------
    function hookRange(id, valId, onChange) {
        const el = document.getElementById(id);
        const v = document.getElementById(valId);
        el.addEventListener('input', () => {
            v.textContent = el.value;
            onChange(+el.value);
        });
    }

    hookRange('c-agents', 'v-agents', v => { targetAgents = v; });
    hookRange('c-vision', 'v-vision', v => { maxVision = v; });
    hookRange('c-metab', 'v-metab', v => { maxMetab = v; });
    hookRange('c-grow', 'v-grow', v => { growbackRate = v; });

    const btnPause = document.getElementById('btn-pause');
    const btnReset = document.getElementById('btn-reset');
    btnPause.addEventListener('click', () => {
        paused = !paused;
        btnPause.textContent = paused ? 'Resume' : 'Pause';
    });
    btnReset.addEventListener('click', resetAll);

    // ---------- Main loop ----------
    resetAll();

    let lastStep = 0;
    const STEP_MS = 90; // ~11 ticks/sec
    let statsCounter = 0;

    function loop(t) {
        if (!paused && t - lastStep > STEP_MS) {
            step();
            lastStep = t;
            statsCounter++;
            if (statsCounter % 2 === 0) updateStats();
        }
        draw();
        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
    updateStats();
})();
</script>
</body>
</html>
