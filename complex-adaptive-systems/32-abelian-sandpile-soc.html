<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandpile — Complex Adaptive Systems</title>
<style>
    :root {
        --bg: #0a0a0f;
        --moss: #606C38;
        --earth: #DDA15E;
        --terracotta: #BC6C25;
        --sage: #8A9A5B;
        --cream: #FEFAE0;
        --panel: rgba(18, 18, 26, 0.82);
        --panel-border: rgba(138, 154, 91, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--cream);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        overflow: hidden;
    }

    #grid-canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        image-rendering: pixelated;
        background: var(--bg);
    }

    .title {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Lora', Georgia, serif;
        font-weight: 500;
        font-size: 20px;
        letter-spacing: 0.5px;
        color: var(--cream);
        background: var(--panel);
        border: 1px solid var(--panel-border);
        padding: 8px 18px;
        border-radius: 12px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        pointer-events: none;
        z-index: 5;
    }

    .organic-back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: var(--cream);
        background: var(--panel);
        border: 1px solid var(--panel-border);
        padding: 8px 14px;
        border-radius: 20px;
        font-size: 14px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        transition: all 0.3s cubic-bezier(.2,.8,.2,1);
        z-index: 10;
    }

    .organic-back-link:hover {
        background: rgba(138, 154, 91, 0.22);
        border-color: var(--sage);
        transform: translateX(-2px);
    }

    .back-arrow { font-size: 16px; line-height: 1; }

    .controls {
        position: fixed;
        top: 20px;
        right: 20px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        padding: 14px 16px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        min-width: 230px;
        z-index: 10;
        font-size: 13px;
    }

    .controls h3 {
        font-family: 'Lora', Georgia, serif;
        font-weight: 500;
        font-size: 14px;
        color: var(--earth);
        margin-bottom: 10px;
        letter-spacing: 0.5px;
    }

    .control-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 10px;
    }

    .control-row label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: rgba(254, 250, 224, 0.75);
    }

    .control-row label span { color: var(--sage); font-variant-numeric: tabular-nums; }

    input[type=range] {
        width: 100%;
        accent-color: var(--sage);
        background: transparent;
    }

    .btn-row { display: flex; gap: 6px; margin-top: 4px; }

    button, .toggle {
        background: rgba(138, 154, 91, 0.12);
        color: var(--cream);
        border: 1px solid var(--panel-border);
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
        flex: 1;
        font-family: inherit;
        transition: all 0.2s;
    }

    button:hover, .toggle:hover { background: rgba(138, 154, 91, 0.25); }
    .toggle.active { background: rgba(188, 108, 37, 0.35); border-color: var(--terracotta); color: var(--cream); }

    .stats {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 12px 16px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        font-size: 12px;
        line-height: 1.7;
        z-index: 10;
        font-variant-numeric: tabular-nums;
    }

    .stats .label { color: rgba(254, 250, 224, 0.6); margin-right: 8px; }
    .stats .val { color: var(--sage); }
    .stats .big { color: var(--earth); }

    .histogram {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 10px 12px 6px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 10;
    }

    .histogram h4 {
        font-family: 'Lora', Georgia, serif;
        font-weight: 500;
        font-size: 12px;
        color: var(--earth);
        margin-bottom: 4px;
        letter-spacing: 0.4px;
    }

    .histogram canvas { display: block; border-radius: 4px; }
    .histogram .axis { font-size: 10px; color: rgba(254, 250, 224, 0.5); text-align: center; margin-top: 2px; }

    .legend {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 14px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        padding: 8px 14px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        font-size: 11px;
        z-index: 10;
    }

    .legend .sw {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 2px;
        vertical-align: middle;
        margin-right: 4px;
    }

    @media (max-width: 720px) {
        .title { font-size: 15px; padding: 6px 12px; }
        .controls { min-width: 180px; padding: 10px; font-size: 12px; }
        .histogram { transform: scale(0.9); transform-origin: bottom right; }
        .stats { font-size: 11px; }
        .legend { display: none; }
    }
</style>
</head>
<body>
    <canvas id="grid-canvas"></canvas>

    <a href="index.html" class="organic-back-link">
        <span class="back-arrow">&larr;</span>
        <span class="back-text">Gallery</span>
    </a>

    <div class="title">Abelian Sandpile (SOC)</div>

    <div class="controls" aria-label="Controls">
        <h3>Controls</h3>
        <div class="control-row">
            <label>Drop rate <span id="rateLabel">1 / frame</span></label>
            <input type="range" id="rate" min="0" max="50" step="1" value="1">
        </div>
        <div class="control-row">
            <label>Drop location</label>
            <div class="btn-row">
                <button class="toggle active" id="locCenter">Center</button>
                <button class="toggle" id="locClick">Click</button>
            </div>
        </div>
        <div class="btn-row">
            <button id="burst">Burst +1k</button>
            <button id="reset">Reset</button>
        </div>
    </div>

    <div class="stats" aria-live="polite">
        <div><span class="label">Grains dropped</span><span class="val big" id="stGrains">0</span></div>
        <div><span class="label">Total topples</span><span class="val" id="stTopples">0</span></div>
        <div><span class="label">Largest avalanche</span><span class="val" id="stLargest">0</span></div>
        <div><span class="label">Last avalanche</span><span class="val" id="stLast">0</span></div>
    </div>

    <div class="histogram" aria-label="Avalanche size histogram">
        <h4>Avalanche size P(s) &mdash; log-log</h4>
        <canvas id="histo" width="220" height="130"></canvas>
        <div class="axis">log&#8322; avalanche size &rarr;</div>
    </div>

    <div class="legend">
        <span><span class="sw" style="background:#0a0a0f;border:1px solid #222"></span>0</span>
        <span><span class="sw" style="background:#606C38"></span>1</span>
        <span><span class="sw" style="background:#DDA15E"></span>2</span>
        <span><span class="sw" style="background:#BC6C25"></span>3</span>
    </div>

<script>
(function() {
    'use strict';

    // ===== Grid state =====
    const N = 250;
    const SIZE = N * N;
    const heights = new Uint8Array(SIZE);

    // Palette for 0..3 (and 4+ gets a brief highlight)
    const PAL = [
        [10, 10, 15],     // 0 near-black
        [96, 108, 56],    // 1 moss
        [221, 161, 94],   // 2 earth
        [188, 108, 37],   // 3 terracotta
        [255, 240, 200],  // 4+ brief highlight during topple
    ];

    // ===== Canvas setup =====
    const gridCanvas = document.getElementById('grid-canvas');
    const gctx = gridCanvas.getContext('2d', { alpha: false });
    // Offscreen N x N image
    const offscreen = document.createElement('canvas');
    offscreen.width = N;
    offscreen.height = N;
    const octx = offscreen.getContext('2d', { alpha: false });
    const imgData = octx.createImageData(N, N);

    function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const w = window.innerWidth;
        const h = window.innerHeight;
        gridCanvas.width = Math.floor(w * dpr);
        gridCanvas.height = Math.floor(h * dpr);
        gridCanvas.style.width = w + 'px';
        gridCanvas.style.height = h + 'px';
        gctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resize);
    resize();

    // ===== Sandpile mechanics =====
    // Use a toppling queue (BFS-like). Add grain, then while any cell >=4 topple it
    // (distribute 1 to each of 4 neighbors; mass is lost at the boundary).
    // Count number of cells that ever toppled during this avalanche.

    const toppleFlag = new Uint8Array(SIZE); // marks if a cell toppled this avalanche
    let queue = new Int32Array(SIZE);
    let qHead = 0, qTail = 0;

    function enqueue(idx) {
        queue[qTail++] = idx;
        if (qTail >= queue.length) qTail = 0;
    }
    function dequeue() {
        const v = queue[qHead++];
        if (qHead >= queue.length) qHead = 0;
        return v;
    }
    function queueSize() {
        return qHead <= qTail ? qTail - qHead : queue.length - qHead + qTail;
    }

    // Stats
    let grainsDropped = 0;
    let totalTopples = 0;
    let largestAvalanche = 0;
    let lastAvalanche = 0;

    // Histogram: bins by log2 of avalanche size (sizes >= 1)
    const HIST_BINS = 18; // covers sizes 1 .. 2^18 = 262144
    const histBins = new Uint32Array(HIST_BINS);

    function log2Bin(s) {
        if (s < 1) return -1;
        let b = 0;
        let v = s;
        while (v > 1) { v >>= 1; b++; }
        return Math.min(b, HIST_BINS - 1);
    }

    function addGrain(x, y) {
        if (x < 0 || x >= N || y < 0 || y >= N) return;
        const start = y * N + x;
        heights[start]++;
        grainsDropped++;

        if (heights[start] < 4) return;

        // Avalanche begins. Reset toppleFlag via queue traversal only; but we need a fast way.
        // Use an "epoch" trick with a Uint32 array would be ideal; but Uint8Array works by
        // clearing only the cells we set. We'll record touched cells.
        const touched = touchedList;
        let touchedCount = 0;

        qHead = 0; qTail = 0;
        enqueue(start);

        let avalancheSize = 0;

        while (queueSize() > 0) {
            const idx = dequeue();
            // A cell may be enqueued multiple times but we only topple when h>=4.
            while (heights[idx] >= 4) {
                heights[idx] -= 4;
                totalTopples++;
                if (toppleFlag[idx] === 0) {
                    toppleFlag[idx] = 1;
                    touched[touchedCount++] = idx;
                    avalancheSize++;
                }
                const yy = (idx / N) | 0;
                const xx = idx - yy * N;

                // 4 neighbors; grains at boundary are lost
                if (xx > 0) {
                    const nIdx = idx - 1;
                    heights[nIdx]++;
                    if (heights[nIdx] >= 4) enqueue(nIdx);
                }
                if (xx < N - 1) {
                    const nIdx = idx + 1;
                    heights[nIdx]++;
                    if (heights[nIdx] >= 4) enqueue(nIdx);
                }
                if (yy > 0) {
                    const nIdx = idx - N;
                    heights[nIdx]++;
                    if (heights[nIdx] >= 4) enqueue(nIdx);
                }
                if (yy < N - 1) {
                    const nIdx = idx + N;
                    heights[nIdx]++;
                    if (heights[nIdx] >= 4) enqueue(nIdx);
                }
            }
        }

        // Clear toppleFlag for next avalanche
        for (let i = 0; i < touchedCount; i++) toppleFlag[touched[i]] = 0;

        if (avalancheSize > 0) {
            lastAvalanche = avalancheSize;
            if (avalancheSize > largestAvalanche) largestAvalanche = avalancheSize;
            const b = log2Bin(avalancheSize);
            if (b >= 0) histBins[b]++;
        }
    }

    const touchedList = new Int32Array(SIZE);

    // ===== Rendering =====
    function draw() {
        const data = imgData.data;
        for (let i = 0, p = 0; i < SIZE; i++, p += 4) {
            const h = heights[i];
            const c = h < 4 ? PAL[h] : PAL[4];
            data[p]     = c[0];
            data[p + 1] = c[1];
            data[p + 2] = c[2];
            data[p + 3] = 255;
        }
        octx.putImageData(imgData, 0, 0);

        // Scale offscreen to viewport while preserving aspect; center in canvas.
        const cw = gridCanvas.width;
        const ch = gridCanvas.height;
        gctx.fillStyle = '#0a0a0f';
        gctx.fillRect(0, 0, cw, ch);
        const side = Math.min(cw, ch);
        const dx = (cw - side) * 0.5;
        const dy = (ch - side) * 0.5;
        gctx.drawImage(offscreen, 0, 0, N, N, dx, dy, side, side);
    }

    // ===== Histogram rendering (log-log) =====
    const histoCanvas = document.getElementById('histo');
    const hctx = histoCanvas.getContext('2d');

    function drawHisto() {
        const w = histoCanvas.width;
        const h = histoCanvas.height;
        hctx.fillStyle = 'rgba(10,10,15,0.9)';
        hctx.fillRect(0, 0, w, h);

        // Find max count (in log)
        let maxLog = 0;
        for (let i = 0; i < HIST_BINS; i++) {
            if (histBins[i] > 0) {
                const lv = Math.log10(histBins[i]);
                if (lv > maxLog) maxLog = lv;
            }
        }
        if (maxLog < 1) maxLog = 1;

        const pad = 6;
        const innerW = w - pad * 2;
        const innerH = h - pad * 2 - 8;
        const barW = innerW / HIST_BINS;

        // Reference power-law line (slope ~ -1 on log-log for BTW sandpile)
        hctx.strokeStyle = 'rgba(221, 161, 94, 0.35)';
        hctx.lineWidth = 1;
        hctx.setLineDash([3, 3]);
        hctx.beginPath();
        // draw y = max - x (slope -1) through top-left
        hctx.moveTo(pad, pad);
        hctx.lineTo(pad + innerW, pad + innerH);
        hctx.stroke();
        hctx.setLineDash([]);

        // Bars
        for (let i = 0; i < HIST_BINS; i++) {
            const c = histBins[i];
            if (c === 0) continue;
            const lv = Math.log10(c);
            const barH = (lv / maxLog) * innerH;
            const x = pad + i * barW;
            const y = pad + innerH - barH;
            // Color by size bucket: smaller = moss, mid = earth, big = terracotta
            let color;
            if (i < 6) color = 'rgba(138,154,91,0.85)';
            else if (i < 12) color = 'rgba(221,161,94,0.85)';
            else color = 'rgba(188,108,37,0.9)';
            hctx.fillStyle = color;
            hctx.fillRect(x + 0.5, y, Math.max(1, barW - 1), barH);
        }

        // Axis baseline
        hctx.strokeStyle = 'rgba(254, 250, 224, 0.2)';
        hctx.beginPath();
        hctx.moveTo(pad, pad + innerH + 0.5);
        hctx.lineTo(pad + innerW, pad + innerH + 0.5);
        hctx.stroke();
    }

    // ===== Stats UI =====
    const stGrains = document.getElementById('stGrains');
    const stTopples = document.getElementById('stTopples');
    const stLargest = document.getElementById('stLargest');
    const stLast = document.getElementById('stLast');

    function fmt(n) { return n.toLocaleString(); }

    function updateStats() {
        stGrains.textContent = fmt(grainsDropped);
        stTopples.textContent = fmt(totalTopples);
        stLargest.textContent = fmt(largestAvalanche);
        stLast.textContent = fmt(lastAvalanche);
    }

    // ===== Controls =====
    let dropRate = 1;
    let dropMode = 'center'; // 'center' | 'click'
    let clickTarget = null;

    const rate = document.getElementById('rate');
    const rateLabel = document.getElementById('rateLabel');
    rate.addEventListener('input', () => {
        dropRate = parseInt(rate.value, 10);
        rateLabel.textContent = dropRate === 0 ? 'paused' : dropRate + ' / frame';
    });

    const locCenter = document.getElementById('locCenter');
    const locClick = document.getElementById('locClick');
    locCenter.addEventListener('click', () => {
        dropMode = 'center';
        locCenter.classList.add('active');
        locClick.classList.remove('active');
    });
    locClick.addEventListener('click', () => {
        dropMode = 'click';
        locClick.classList.add('active');
        locCenter.classList.remove('active');
    });

    document.getElementById('reset').addEventListener('click', () => {
        heights.fill(0);
        toppleFlag.fill(0);
        histBins.fill(0);
        grainsDropped = 0;
        totalTopples = 0;
        largestAvalanche = 0;
        lastAvalanche = 0;
        updateStats();
    });

    document.getElementById('burst').addEventListener('click', () => {
        const cx = N >> 1, cy = N >> 1;
        for (let i = 0; i < 1000; i++) addGrain(cx, cy);
    });

    // Map canvas click to grid coordinates
    function mapPointerToGrid(ev) {
        const rect = gridCanvas.getBoundingClientRect();
        const cw = rect.width;
        const ch = rect.height;
        const side = Math.min(cw, ch);
        const dx = (cw - side) * 0.5;
        const dy = (ch - side) * 0.5;
        const px = ev.clientX - rect.left - dx;
        const py = ev.clientY - rect.top - dy;
        if (px < 0 || py < 0 || px >= side || py >= side) return null;
        const gx = Math.floor((px / side) * N);
        const gy = Math.floor((py / side) * N);
        return { x: gx, y: gy };
    }

    let pointerDown = false;
    gridCanvas.addEventListener('pointerdown', (ev) => {
        pointerDown = true;
        const p = mapPointerToGrid(ev);
        if (p) clickTarget = p;
        // Auto-switch to click mode on interaction
        if (dropMode !== 'click') {
            dropMode = 'click';
            locClick.classList.add('active');
            locCenter.classList.remove('active');
        }
    });
    gridCanvas.addEventListener('pointermove', (ev) => {
        if (!pointerDown) return;
        const p = mapPointerToGrid(ev);
        if (p) clickTarget = p;
    });
    window.addEventListener('pointerup', () => { pointerDown = false; });

    // ===== Main loop =====
    let frameCount = 0;
    function tick() {
        // Drop grains (each call fully settles before the next)
        if (dropRate > 0) {
            const cx = N >> 1, cy = N >> 1;
            for (let i = 0; i < dropRate; i++) {
                let tx = cx, ty = cy;
                if (dropMode === 'click' && clickTarget) {
                    tx = clickTarget.x;
                    ty = clickTarget.y;
                }
                addGrain(tx, ty);
            }
        }

        draw();

        frameCount++;
        if ((frameCount & 3) === 0) {
            updateStats();
            drawHisto();
        }

        requestAnimationFrame(tick);
    }

    // Kick off with a centered burst so the user sees structure immediately
    (function seed() {
        const cx = N >> 1, cy = N >> 1;
        for (let i = 0; i < 400; i++) addGrain(cx, cy);
        updateStats();
        drawHisto();
    })();

    requestAnimationFrame(tick);
})();
</script>
</body>
</html>
