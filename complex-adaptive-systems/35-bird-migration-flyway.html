<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bird Migration — Complex Adaptive Systems</title>
<style>
  :root {
    --bg: #0a0a0f;
    --cream: #FEFAE0;
    --earth: #DDA15E;
    --sage: #8A9A5B;
    --moss: #606C38;
    --terracotta: #BC6C25;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--cream);
    font-family: 'Nunito', system-ui, -apple-system, sans-serif;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    cursor: crosshair;
  }

  .organic-back-link {
    position: fixed;
    top: 20px;
    left: 20px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(254, 250, 224, 0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(221, 161, 94, 0.35);
    border-radius: 40% 60% 55% 45% / 50% 45% 55% 50%;
    color: var(--cream);
    text-decoration: none;
    font-size: 14px;
    z-index: 100;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .organic-back-link:hover {
    background: rgba(221, 161, 94, 0.2);
    transform: translateX(-2px);
  }
  .back-arrow { color: var(--earth); font-size: 16px; }

  .title-card {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 22px;
    background: rgba(10, 10, 15, 0.55);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(138, 154, 91, 0.3);
    border-radius: 20px;
    z-index: 50;
    text-align: center;
  }
  .title-card h1 {
    font-family: 'Lora', Georgia, serif;
    font-weight: 500;
    font-size: 18px;
    color: var(--cream);
    letter-spacing: 0.02em;
  }
  .title-card .sub {
    font-size: 11px;
    color: var(--earth);
    opacity: 0.8;
    margin-top: 2px;
  }

  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(10, 10, 15, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(138, 154, 91, 0.3);
    border-radius: 16px;
    padding: 16px 18px;
    z-index: 60;
    min-width: 260px;
    max-width: 300px;
  }
  .controls h3 {
    font-family: 'Lora', Georgia, serif;
    font-size: 13px;
    color: var(--sage);
    margin-bottom: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .control {
    margin-bottom: 10px;
  }
  .control label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--cream);
    opacity: 0.85;
    margin-bottom: 4px;
  }
  .control label span.val {
    color: var(--earth);
    font-variant-numeric: tabular-nums;
  }
  .control input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(138, 154, 91, 0.2);
    border-radius: 2px;
    outline: none;
  }
  .control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--earth);
    cursor: pointer;
    border: 2px solid var(--cream);
  }
  .control input[type="range"]::-moz-range-thumb {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--earth);
    cursor: pointer;
    border: 2px solid var(--cream);
  }
  .button-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 8px;
  }
  button {
    padding: 7px 10px;
    background: rgba(138, 154, 91, 0.15);
    color: var(--cream);
    border: 1px solid rgba(138, 154, 91, 0.4);
    border-radius: 8px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  button:hover {
    background: rgba(221, 161, 94, 0.3);
    border-color: var(--earth);
  }
  button.primary {
    background: rgba(221, 161, 94, 0.25);
    border-color: var(--earth);
    grid-column: span 2;
  }
  button.primary:hover {
    background: rgba(221, 161, 94, 0.45);
  }

  .stats {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(10, 10, 15, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(138, 154, 91, 0.3);
    border-radius: 16px;
    padding: 14px 18px;
    z-index: 60;
    font-size: 12px;
    min-width: 200px;
  }
  .stats h3 {
    font-family: 'Lora', Georgia, serif;
    font-size: 13px;
    color: var(--sage);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    color: var(--cream);
    opacity: 0.9;
  }
  .stat-row .val {
    color: var(--earth);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }

  .season-indicator {
    position: fixed;
    top: 80px;
    right: 20px;
    padding: 12px 20px;
    background: rgba(10, 10, 15, 0.7);
    backdrop-filter: blur(12px);
    border-radius: 40% 60% 55% 45% / 50% 45% 55% 50%;
    z-index: 60;
    text-align: center;
    border: 1px solid rgba(138, 154, 91, 0.3);
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .season-indicator .label {
    font-size: 10px;
    color: var(--sage);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.75;
  }
  .season-indicator .season {
    font-family: 'Lora', Georgia, serif;
    font-size: 20px;
    color: var(--cream);
    margin-top: 4px;
  }
  .season-indicator .arrow {
    font-size: 16px;
    margin-top: 2px;
    color: var(--earth);
  }
  .season-summer { border-color: rgba(221, 161, 94, 0.5) !important; }
  .season-winter { border-color: rgba(138, 154, 91, 0.5) !important; }

  .hint {
    position: fixed;
    top: 70px;
    left: 20px;
    font-size: 11px;
    color: var(--cream);
    opacity: 0.5;
    z-index: 50;
    pointer-events: none;
  }
</style>
</head>
<body>

<a href="index.html" class="organic-back-link">
  <span class="back-arrow">←</span>
  <span class="back-text">Gallery</span>
</a>

<div class="title-card">
  <h1>Bird Migration Flyways</h1>
  <div class="sub">alignment · preferred heading · obstacle deflection</div>
</div>

<div class="hint">Click anywhere to place mountain obstacles</div>

<div class="season-indicator season-summer" id="seasonIndicator">
  <div class="label">Season</div>
  <div class="season" id="seasonLabel">Summer</div>
  <div class="arrow" id="seasonArrow">↑ North</div>
</div>

<canvas id="canvas"></canvas>

<div class="controls">
  <h3>Controls</h3>
  <div class="control">
    <label>Bird Count <span class="val" id="vCount">400</span></label>
    <input type="range" id="count" min="50" max="1200" value="400" step="25">
  </div>
  <div class="control">
    <label>Heading Weight <span class="val" id="vHeading">0.60</span></label>
    <input type="range" id="heading" min="0" max="200" value="60">
  </div>
  <div class="control">
    <label>Alignment Weight <span class="val" id="vAlign">0.80</span></label>
    <input type="range" id="align" min="0" max="200" value="80">
  </div>
  <div class="control">
    <label>Flock Cohesion <span class="val" id="vCoh">0.30</span></label>
    <input type="range" id="coh" min="0" max="150" value="30">
  </div>
  <div class="button-row">
    <button id="btnSeason">Toggle Season</button>
    <button id="btnClear">Clear Mountains</button>
    <button id="btnReset" class="primary">Reset Birds</button>
  </div>
</div>

<div class="stats">
  <h3>Live Stats</h3>
  <div class="stat-row"><span>Mean Heading</span><span class="val" id="sMean">—</span></div>
  <div class="stat-row"><span>In Formation</span><span class="val" id="sForm">—</span></div>
  <div class="stat-row"><span>Birds</span><span class="val" id="sBirds">0</span></div>
  <div class="stat-row"><span>Mountains</span><span class="val" id="sObs">0</span></div>
</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // Params
  const P = {
    count: 400,
    headingWeight: 0.60,
    alignWeight: 0.80,
    cohWeight: 0.30,
    sepWeight: 1.2,
    neighborRadius: 45,
    sepRadius: 14,
    maxSpeed: 1.7,
    minSpeed: 0.9,
    trailAlpha: 0.09,
    season: 'summer', // 'summer' north (up, angle=-PI/2), 'winter' south (down, PI/2)
  };

  function preferredAngle() {
    return P.season === 'summer' ? -Math.PI / 2 : Math.PI / 2;
  }

  // Birds
  const birds = [];
  function spawnBird() {
    const angle = preferredAngle() + (Math.random() - 0.5) * Math.PI * 0.9;
    const speed = P.minSpeed + Math.random() * (P.maxSpeed - P.minSpeed);
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      // small per-bird preferred heading bias for heterogeneity
      biasAngle: (Math.random() - 0.5) * 0.35,
      hue: Math.random(),
    };
  }
  function rebuild() {
    birds.length = 0;
    for (let i = 0; i < P.count; i++) birds.push(spawnBird());
  }
  rebuild();

  // Obstacles (mountains)
  const obstacles = [];
  function addObstacle(x, y) {
    obstacles.push({
      x, y,
      r: 40 + Math.random() * 30,
      // Irregular mountain outline
      points: generateMountainOutline(50 + Math.random() * 30),
    });
  }
  function generateMountainOutline(baseR) {
    const pts = [];
    const n = 10 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const r = baseR * (0.7 + Math.random() * 0.5);
      pts.push({ a, r });
    }
    return pts;
  }

  canvas.addEventListener('click', (e) => {
    addObstacle(e.clientX, e.clientY);
    updateStatsObstacles();
  });

  // Spatial hash for neighbor lookup
  const CELL = 50;
  const grid = new Map();
  function cellKey(cx, cy) { return cx * 73856093 ^ cy * 19349663; }
  function rebuildGrid() {
    grid.clear();
    for (let i = 0; i < birds.length; i++) {
      const b = birds[i];
      const cx = Math.floor(b.x / CELL);
      const cy = Math.floor(b.y / CELL);
      const k = cellKey(cx, cy);
      let arr = grid.get(k);
      if (!arr) { arr = []; grid.set(k, arr); }
      arr.push(i);
    }
  }
  function neighborsOf(b) {
    const out = [];
    const cx = Math.floor(b.x / CELL);
    const cy = Math.floor(b.y / CELL);
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        const arr = grid.get(cellKey(cx + dx, cy + dy));
        if (arr) out.push(...arr);
      }
    }
    return out;
  }

  function step() {
    rebuildGrid();
    const prefAng = preferredAngle();
    const pvx = Math.cos(prefAng);
    const pvy = Math.sin(prefAng);

    const nr2 = P.neighborRadius * P.neighborRadius;
    const sr2 = P.sepRadius * P.sepRadius;

    for (let i = 0; i < birds.length; i++) {
      const b = birds[i];
      let avx = 0, avy = 0, acount = 0;
      let cx = 0, cy = 0, ccount = 0;
      let sx = 0, sy = 0;

      const neigh = neighborsOf(b);
      for (let j = 0; j < neigh.length; j++) {
        const idx = neigh[j];
        if (idx === i) continue;
        const o = birds[idx];
        const dx = o.x - b.x;
        const dy = o.y - b.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < nr2) {
          avx += o.vx; avy += o.vy; acount++;
          cx += o.x; cy += o.y; ccount++;
          if (d2 < sr2 && d2 > 0.0001) {
            const inv = 1 / Math.sqrt(d2);
            sx -= dx * inv;
            sy -= dy * inv;
          }
        }
      }

      // Alignment
      let alignX = 0, alignY = 0;
      if (acount > 0) {
        alignX = avx / acount - b.vx;
        alignY = avy / acount - b.vy;
      }

      // Cohesion
      let cohX = 0, cohY = 0;
      if (ccount > 0) {
        cohX = cx / ccount - b.x;
        cohY = cy / ccount - b.y;
        const m = Math.hypot(cohX, cohY);
        if (m > 0) { cohX /= m; cohY /= m; }
      }

      // Preferred heading (with per-bird bias)
      const biasedAng = prefAng + b.biasAngle;
      const desiredVX = Math.cos(biasedAng);
      const desiredVY = Math.sin(biasedAng);
      const headX = desiredVX - b.vx * 0.5;
      const headY = desiredVY - b.vy * 0.5;

      // Obstacle avoidance
      let oax = 0, oay = 0;
      for (let k = 0; k < obstacles.length; k++) {
        const ob = obstacles[k];
        const dx = b.x - ob.x;
        const dy = b.y - ob.y;
        const d = Math.hypot(dx, dy);
        const avoidR = ob.r + 60;
        if (d < avoidR && d > 0.001) {
          const force = (avoidR - d) / avoidR;
          oax += (dx / d) * force * force * 4;
          oay += (dy / d) * force * force * 4;
        }
      }

      // Combine forces
      let ax = 0, ay = 0;
      ax += alignX * P.alignWeight * 0.08;
      ay += alignY * P.alignWeight * 0.08;
      ax += cohX * P.cohWeight * 0.05;
      ay += cohY * P.cohWeight * 0.05;
      ax += headX * P.headingWeight * 0.04;
      ay += headY * P.headingWeight * 0.04;
      ax += sx * P.sepWeight * 0.03;
      ay += sy * P.sepWeight * 0.03;
      ax += oax;
      ay += oay;

      b.vx += ax;
      b.vy += ay;

      // Speed limit
      const sp = Math.hypot(b.vx, b.vy);
      if (sp > P.maxSpeed) {
        b.vx = (b.vx / sp) * P.maxSpeed;
        b.vy = (b.vy / sp) * P.maxSpeed;
      } else if (sp < P.minSpeed) {
        if (sp > 0.001) {
          b.vx = (b.vx / sp) * P.minSpeed;
          b.vy = (b.vy / sp) * P.minSpeed;
        } else {
          b.vx = pvx * P.minSpeed;
          b.vy = pvy * P.minSpeed;
        }
      }

      b.x += b.vx;
      b.y += b.vy;

      // Wrap horizontally; wrap vertically too so birds re-enter flyway
      if (b.x < -20) b.x = W + 20;
      if (b.x > W + 20) b.x = -20;
      if (b.y < -30) { b.y = H + 30; b.x = Math.random() * W; }
      if (b.y > H + 30) { b.y = -30; b.x = Math.random() * W; }
    }
  }

  function drawObstacles() {
    for (let i = 0; i < obstacles.length; i++) {
      const ob = obstacles[i];
      ctx.save();
      ctx.translate(ob.x, ob.y);

      // Mountain body
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, ob.r * 1.4);
      grad.addColorStop(0, 'rgba(96, 108, 56, 0.75)');
      grad.addColorStop(0.6, 'rgba(61, 68, 35, 0.55)');
      grad.addColorStop(1, 'rgba(10, 10, 15, 0)');

      ctx.fillStyle = grad;
      ctx.beginPath();
      const pts = ob.points;
      for (let j = 0; j < pts.length; j++) {
        const p = pts[j];
        const x = Math.cos(p.a) * p.r;
        const y = Math.sin(p.a) * p.r * 0.7;
        if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();

      // Peak highlight
      ctx.fillStyle = 'rgba(254, 250, 224, 0.18)';
      ctx.beginPath();
      ctx.ellipse(-ob.r * 0.15, -ob.r * 0.3, ob.r * 0.3, ob.r * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }
  }

  function drawBird(b) {
    const ang = Math.atan2(b.vy, b.vx);
    const sp = Math.hypot(b.vx, b.vy);
    const size = 4.5;
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(ang);

    // Blend between cream (aligned) and earth (divergent) based on speed & alignment
    // Use bias as coloring factor for subtle variety
    const shade = 0.6 + 0.4 * (sp / P.maxSpeed);
    const bias = Math.abs(b.biasAngle);
    const r = Math.floor(254 - bias * 60);
    const g = Math.floor(250 - bias * 100);
    const bb = Math.floor(224 - bias * 180);
    ctx.fillStyle = `rgba(${r}, ${g}, ${bb}, ${shade})`;

    ctx.beginPath();
    ctx.moveTo(size, 0);
    ctx.lineTo(-size * 0.7, size * 0.55);
    ctx.lineTo(-size * 0.4, 0);
    ctx.lineTo(-size * 0.7, -size * 0.55);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // Stats
  const sMean = document.getElementById('sMean');
  const sForm = document.getElementById('sForm');
  const sBirds = document.getElementById('sBirds');
  const sObs = document.getElementById('sObs');
  function updateStatsObstacles() {
    sObs.textContent = obstacles.length;
  }
  let statTimer = 0;
  function updateStats() {
    let sx = 0, sy = 0;
    for (let i = 0; i < birds.length; i++) {
      const b = birds[i];
      const sp = Math.hypot(b.vx, b.vy);
      if (sp > 0) { sx += b.vx / sp; sy += b.vy / sp; }
    }
    const meanAng = Math.atan2(sy, sx);
    const coherence = Math.hypot(sx, sy) / birds.length;
    // format heading as compass bearing
    // Canvas angle: -PI/2 = up = North
    const deg = (meanAng * 180 / Math.PI + 90 + 360) % 360;
    sMean.textContent = deg.toFixed(0) + '° ' + compass(deg);
    sForm.textContent = (coherence * 100).toFixed(0) + '%';
    sBirds.textContent = birds.length;
  }
  function compass(deg) {
    const dirs = ['N','NE','E','SE','S','SW','W','NW'];
    return dirs[Math.round(deg / 45) % 8];
  }

  // Main loop
  function frame() {
    // Trail fade
    ctx.fillStyle = `rgba(10, 10, 15, ${P.trailAlpha})`;
    ctx.fillRect(0, 0, W, H);

    step();

    drawObstacles();

    for (let i = 0; i < birds.length; i++) drawBird(birds[i]);

    statTimer++;
    if (statTimer % 10 === 0) updateStats();

    requestAnimationFrame(frame);
  }
  frame();

  // UI bindings
  const bind = (id, cb, fmt) => {
    const el = document.getElementById(id);
    const label = document.getElementById('v' + id[0].toUpperCase() + id.slice(1));
    el.addEventListener('input', () => {
      const v = +el.value;
      cb(v);
      if (label) label.textContent = fmt ? fmt(v) : v;
    });
  };

  document.getElementById('count').addEventListener('input', (e) => {
    const v = +e.target.value;
    P.count = v;
    document.getElementById('vCount').textContent = v;
    // Adjust population incrementally
    while (birds.length < v) birds.push(spawnBird());
    while (birds.length > v) birds.pop();
  });
  document.getElementById('heading').addEventListener('input', (e) => {
    const v = +e.target.value / 100;
    P.headingWeight = v;
    document.getElementById('vHeading').textContent = v.toFixed(2);
  });
  document.getElementById('align').addEventListener('input', (e) => {
    const v = +e.target.value / 100;
    P.alignWeight = v;
    document.getElementById('vAlign').textContent = v.toFixed(2);
  });
  document.getElementById('coh').addEventListener('input', (e) => {
    const v = +e.target.value / 100;
    P.cohWeight = v;
    document.getElementById('vCoh').textContent = v.toFixed(2);
  });

  const seasonInd = document.getElementById('seasonIndicator');
  const seasonLabel = document.getElementById('seasonLabel');
  const seasonArrow = document.getElementById('seasonArrow');

  function applySeason() {
    if (P.season === 'summer') {
      seasonLabel.textContent = 'Summer';
      seasonArrow.textContent = '↑ North';
      seasonInd.classList.remove('season-winter');
      seasonInd.classList.add('season-summer');
    } else {
      seasonLabel.textContent = 'Winter';
      seasonArrow.textContent = '↓ South';
      seasonInd.classList.remove('season-summer');
      seasonInd.classList.add('season-winter');
    }
  }

  document.getElementById('btnSeason').addEventListener('click', () => {
    P.season = P.season === 'summer' ? 'winter' : 'summer';
    applySeason();
  });
  document.getElementById('btnClear').addEventListener('click', () => {
    obstacles.length = 0;
    updateStatsObstacles();
  });
  document.getElementById('btnReset').addEventListener('click', () => {
    rebuild();
  });

  applySeason();
  updateStatsObstacles();
})();
</script>
</body>
</html>
