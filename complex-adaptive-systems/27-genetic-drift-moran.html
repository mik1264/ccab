<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genetic Drift — Complex Adaptive Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #8A9A5B;
    --moss: #606C38;
    --earth: #DDA15E;
    --cream: #FEFAE0;
    --terracotta: #BC6C25;
    --dark-moss: #3d4423;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
    color: var(--dark-moss);
  }

  canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  .organic-back-link {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    text-decoration: none;
    color: var(--moss);
    font-family: 'Lora', serif;
    font-weight: 500;
    box-shadow: 0 4px 15px rgba(96, 108, 56, 0.15);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .organic-back-link:hover {
    background: rgba(255, 255, 255, 0.9);
    transform: translateX(-3px);
    box-shadow: 0 6px 20px rgba(96, 108, 56, 0.25);
  }
  .back-arrow { font-size: 1.2em; color: var(--terracotta); }

  .title-banner {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    padding: 10px 26px;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 30px;
    box-shadow: 0 4px 15px rgba(96, 108, 56, 0.15);
    text-align: center;
    max-width: 90vw;
  }
  .title-banner h1 {
    font-family: 'Lora', serif;
    font-size: 1.3em;
    color: var(--moss);
    font-weight: 600;
    white-space: nowrap;
  }
  .title-banner .subtitle {
    font-size: 0.8em;
    color: var(--dark-moss);
    opacity: 0.7;
  }

  .controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    z-index: 50;
    padding: 16px 20px;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(96, 108, 56, 0.2);
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    align-items: center;
    justify-content: center;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 140px;
  }
  .control-group label {
    font-size: 0.75em;
    color: var(--moss);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .control-group input[type="range"] {
    width: 100%;
    accent-color: var(--sage);
  }
  .control-group .value {
    font-size: 0.8em;
    color: var(--terracotta);
    font-weight: 700;
    font-family: 'Lora', serif;
  }

  button {
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--sage), var(--moss));
    color: var(--cream);
    border: none;
    border-radius: 30px;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    font-size: 0.9em;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 3px 10px rgba(96, 108, 56, 0.3);
  }
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(96, 108, 56, 0.4);
  }
  button.secondary {
    background: linear-gradient(135deg, var(--earth), var(--terracotta));
  }

  .stats {
    display: flex;
    gap: 16px;
    padding: 8px 14px;
    background: rgba(254, 250, 224, 0.6);
    border-radius: 16px;
    border: 1px solid rgba(138, 154, 91, 0.2);
  }
  .stat {
    text-align: center;
    min-width: 70px;
  }
  .stat-value {
    font-family: 'Lora', serif;
    font-size: 1.1em;
    font-weight: 700;
    color: var(--moss);
  }
  .stat-label {
    font-size: 0.65em;
    color: var(--dark-moss);
    opacity: 0.7;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  @media (max-width: 700px) {
    .control-group { min-width: 110px; }
    .title-banner h1 { font-size: 1em; }
    .title-banner .subtitle { display: none; }
  }
</style>
</head>
<body>

<a href="index.html" class="organic-back-link">
  <span class="back-arrow">&larr;</span>
  <span class="back-text">Gallery</span>
</a>

<div class="title-banner">
  <h1>Genetic Drift (Moran)</h1>
  <div class="subtitle">Stochastic allele fixation in parallel populations</div>
</div>

<canvas id="canvas"></canvas>

<div class="controls">
  <div class="control-group">
    <label>Population N <span class="value" id="n-val">100</span></label>
    <input type="range" id="n-slider" min="10" max="400" value="100" step="10">
  </div>
  <div class="control-group">
    <label>Initial A freq <span class="value" id="p-val">0.50</span></label>
    <input type="range" id="p-slider" min="0" max="1" value="0.5" step="0.01">
  </div>
  <div class="control-group">
    <label>Mutation rate <span class="value" id="mu-val">0.000</span></label>
    <input type="range" id="mu-slider" min="0" max="0.02" value="0" step="0.0005">
  </div>
  <div class="control-group">
    <label>Speed <span class="value" id="speed-val">500</span></label>
    <input type="range" id="speed-slider" min="10" max="2000" value="500" step="10">
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="gen-stat">0</div>
      <div class="stat-label">Generations</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="fixed-stat">0 / 8</div>
      <div class="stat-label">Fixed</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="fixA-stat">0</div>
      <div class="stat-label">A Fixed</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="fixB-stat">0</div>
      <div class="stat-label">B Fixed</div>
    </div>
  </div>

  <button id="reset-btn">Reset All</button>
  <button id="pause-btn" class="secondary">Pause</button>
</div>

<script>
(function () {
  'use strict';

  const NUM_POPS = 8;
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let width = 0, height = 0, dpr = 1;

  const state = {
    N: 100,
    p0: 0.5,
    mu: 0,
    speed: 500,
    generation: 0,
    running: true,
    populations: [],
    trajectories: [],
    maxTrajLen: 600,
    fixedCount: 0,
    fixAcount: 0,
    fixBcount: 0
  };

  function initPopulations() {
    state.populations = [];
    state.trajectories = [];
    state.generation = 0;
    state.fixedCount = 0;
    state.fixAcount = 0;
    state.fixBcount = 0;

    for (let p = 0; p < NUM_POPS; p++) {
      const agents = new Uint8Array(state.N);
      let aCount = 0;
      for (let i = 0; i < state.N; i++) {
        if (Math.random() < state.p0) {
          agents[i] = 1;
          aCount++;
        } else {
          agents[i] = 0;
        }
      }
      state.populations.push({
        agents: agents,
        aCount: aCount,
        fixed: null
      });
      state.trajectories.push([aCount / state.N]);
    }
    updateStats();
  }

  function moranStep(pop) {
    if (pop.fixed !== null) return;
    const N = pop.agents.length;
    const reproIdx = Math.floor(Math.random() * N);
    const dieIdx = Math.floor(Math.random() * N);
    const child = pop.agents[reproIdx];
    const dying = pop.agents[dieIdx];

    let newAllele = child;
    if (state.mu > 0 && Math.random() < state.mu) {
      newAllele = 1 - child;
    }

    if (dying === 1 && newAllele === 0) pop.aCount--;
    else if (dying === 0 && newAllele === 1) pop.aCount++;

    pop.agents[dieIdx] = newAllele;

    if (state.mu === 0) {
      if (pop.aCount === 0) pop.fixed = 'B';
      else if (pop.aCount === N) pop.fixed = 'A';
    }
  }

  function step() {
    const stepsPerFrame = Math.max(1, Math.floor(state.speed / 60));
    for (let s = 0; s < stepsPerFrame; s++) {
      for (let p = 0; p < NUM_POPS; p++) {
        moranStep(state.populations[p]);
      }
      state.generation++;
    }

    for (let p = 0; p < NUM_POPS; p++) {
      const freq = state.populations[p].aCount / state.N;
      state.trajectories[p].push(freq);
      if (state.trajectories[p].length > state.maxTrajLen) {
        state.trajectories[p].shift();
      }
    }

    state.fixedCount = 0;
    state.fixAcount = 0;
    state.fixBcount = 0;
    for (let p = 0; p < NUM_POPS; p++) {
      if (state.populations[p].fixed === 'A') {
        state.fixedCount++;
        state.fixAcount++;
      } else if (state.populations[p].fixed === 'B') {
        state.fixedCount++;
        state.fixBcount++;
      }
    }
    updateStats();
  }

  function updateStats() {
    document.getElementById('gen-stat').textContent = state.generation.toLocaleString();
    document.getElementById('fixed-stat').textContent = state.fixedCount + ' / ' + NUM_POPS;
    document.getElementById('fixA-stat').textContent = state.fixAcount;
    document.getElementById('fixB-stat').textContent = state.fixBcount;
  }

  function lerpColor(t) {
    const sage = [138, 154, 91];
    const terra = [188, 108, 37];
    const r = Math.round(terra[0] + (sage[0] - terra[0]) * t);
    const g = Math.round(terra[1] + (sage[1] - terra[1]) * t);
    const b = Math.round(terra[2] + (sage[2] - terra[2]) * t);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  function draw() {
    ctx.clearRect(0, 0, width, height);

    const topPad = 90;
    const bottomPad = 180;
    const sidePad = 40;
    const availH = height - topPad - bottomPad;
    const availW = width - sidePad * 2;

    const barsAreaH = Math.floor(availH * 0.55);
    const trajAreaH = availH - barsAreaH - 20;
    const trajTop = topPad + barsAreaH + 20;

    const gap = 14;
    const barW = (availW - gap * (NUM_POPS - 1)) / NUM_POPS;

    for (let p = 0; p < NUM_POPS; p++) {
      const x = sidePad + p * (barW + gap);
      const pop = state.populations[p];
      const freq = pop.aCount / state.N;

      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      roundRect(ctx, x, topPad, barW, barsAreaH, 12);
      ctx.fill();

      const fillH = Math.floor(barsAreaH * freq);
      const fillY = topPad + barsAreaH - fillH;
      const grad = ctx.createLinearGradient(0, topPad, 0, topPad + barsAreaH);
      grad.addColorStop(0, lerpColor(1));
      grad.addColorStop(1, lerpColor(0));
      ctx.fillStyle = grad;
      ctx.globalAlpha = 0.85;
      roundRect(ctx, x, fillY, barW, fillH, 12);
      ctx.fill();
      ctx.globalAlpha = 1;

      ctx.strokeStyle = 'rgba(96, 108, 56, 0.3)';
      ctx.lineWidth = 1.5;
      roundRect(ctx, x, topPad, barW, barsAreaH, 12);
      ctx.stroke();

      ctx.fillStyle = 'var(--moss)';
      ctx.fillStyle = '#606C38';
      ctx.font = "600 12px 'Nunito', sans-serif";
      ctx.textAlign = 'center';
      ctx.fillText('Pop ' + (p + 1), x + barW / 2, topPad - 8);

      ctx.font = "700 13px 'Lora', serif";
      ctx.fillStyle = '#3d4423';
      const freqTxt = (freq * 100).toFixed(1) + '%';
      ctx.fillText(freqTxt, x + barW / 2, topPad + barsAreaH + 16);

      if (pop.fixed !== null) {
        ctx.font = "700 11px 'Nunito', sans-serif";
        ctx.fillStyle = pop.fixed === 'A' ? '#606C38' : '#BC6C25';
        ctx.fillText('FIXED ' + pop.fixed, x + barW / 2, topPad + barsAreaH + 32);
      }
    }

    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    roundRect(ctx, sidePad, trajTop, availW, trajAreaH, 12);
    ctx.fill();
    ctx.strokeStyle = 'rgba(96, 108, 56, 0.25)';
    ctx.lineWidth = 1;
    roundRect(ctx, sidePad, trajTop, availW, trajAreaH, 12);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(96, 108, 56, 0.15)';
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    const midY = trajTop + trajAreaH * 0.5;
    ctx.moveTo(sidePad, midY);
    ctx.lineTo(sidePad + availW, midY);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = 'rgba(96, 108, 56, 0.7)';
    ctx.font = "600 10px 'Nunito', sans-serif";
    ctx.textAlign = 'left';
    ctx.fillText('1.0 (all A)', sidePad + 6, trajTop + 12);
    ctx.fillText('0.5', sidePad + 6, midY - 2);
    ctx.fillText('0.0 (all B)', sidePad + 6, trajTop + trajAreaH - 4);

    const trajLen = state.trajectories[0].length;
    if (trajLen > 1) {
      for (let p = 0; p < NUM_POPS; p++) {
        const traj = state.trajectories[p];
        const hue = 80 + (p / NUM_POPS) * 260;
        ctx.strokeStyle = 'hsl(' + hue + ', 55%, 45%)';
        ctx.lineWidth = 1.8;
        ctx.globalAlpha = 0.75;
        ctx.beginPath();
        for (let i = 0; i < traj.length; i++) {
          const xx = sidePad + (i / (state.maxTrajLen - 1)) * availW;
          const yy = trajTop + (1 - traj[i]) * trajAreaH;
          if (i === 0) ctx.moveTo(xx, yy);
          else ctx.lineTo(xx, yy);
        }
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    ctx.fillStyle = '#606C38';
    ctx.font = "italic 600 12px 'Lora', serif";
    ctx.textAlign = 'center';
    ctx.fillText('Allele A frequency over time (8 parallel populations)', sidePad + availW / 2, trajTop + trajAreaH + 18);
  }

  function roundRect(ctx, x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function resize() {
    dpr = window.devicePixelRatio || 1;
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function loop() {
    if (state.running) step();
    draw();
    requestAnimationFrame(loop);
  }

  // Bind controls
  const nSlider = document.getElementById('n-slider');
  const pSlider = document.getElementById('p-slider');
  const muSlider = document.getElementById('mu-slider');
  const speedSlider = document.getElementById('speed-slider');
  const nVal = document.getElementById('n-val');
  const pVal = document.getElementById('p-val');
  const muVal = document.getElementById('mu-val');
  const speedVal = document.getElementById('speed-val');
  const resetBtn = document.getElementById('reset-btn');
  const pauseBtn = document.getElementById('pause-btn');

  nSlider.addEventListener('input', () => {
    state.N = parseInt(nSlider.value);
    nVal.textContent = state.N;
  });
  pSlider.addEventListener('input', () => {
    state.p0 = parseFloat(pSlider.value);
    pVal.textContent = state.p0.toFixed(2);
  });
  muSlider.addEventListener('input', () => {
    state.mu = parseFloat(muSlider.value);
    muVal.textContent = state.mu.toFixed(4);
  });
  speedSlider.addEventListener('input', () => {
    state.speed = parseInt(speedSlider.value);
    speedVal.textContent = state.speed;
  });
  resetBtn.addEventListener('click', initPopulations);
  pauseBtn.addEventListener('click', () => {
    state.running = !state.running;
    pauseBtn.textContent = state.running ? 'Pause' : 'Resume';
  });

  window.addEventListener('resize', resize);
  resize();
  initPopulations();
  loop();
})();
</script>
</body>
</html>
