<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bee Consensus — Complex Adaptive Systems</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: rgba(20, 22, 32, 0.82);
    --panel-border: rgba(255, 255, 255, 0.08);
    --text: #e8e6dd;
    --muted: #9aa0aa;
    --sage: #8A9A5B;
    --moss: #606C38;
    --earth: #DDA15E;
    --cream: #FEFAE0;
    --terracotta: #BC6C25;
    --dark-moss: #3d4423;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  #canvas {
    display: block;
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
  }

  .organic-back-link {
    position: fixed;
    top: 18px;
    left: 18px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(254, 250, 224, 0.08);
    border: 1px solid rgba(254, 250, 224, 0.18);
    border-radius: 30px;
    color: var(--cream);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 20;
  }
  .organic-back-link:hover {
    background: rgba(138, 154, 91, 0.22);
    border-color: rgba(138, 154, 91, 0.5);
    transform: translateX(-2px);
  }
  .back-arrow { font-size: 16px; }

  .title {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    pointer-events: none;
  }
  .title h1 {
    font-family: 'Lora', 'Georgia', serif;
    margin: 0;
    font-size: 22px;
    font-weight: 500;
    color: var(--cream);
    letter-spacing: 0.03em;
  }
  .title p {
    margin: 2px 0 0;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .panel {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 16px 18px;
    z-index: 15;
  }

  .controls {
    top: 78px;
    right: 18px;
    width: 278px;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
  }

  .panel h3 {
    margin: 0 0 12px;
    font-family: 'Lora', serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--earth);
  }

  .row {
    margin-bottom: 12px;
  }
  .row-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
    font-size: 12px;
    color: var(--muted);
  }
  .row-value {
    color: var(--cream);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }

  .site-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .site-swatch {
    width: 10px; height: 10px;
    border-radius: 2px;
    display: inline-block;
  }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 3px;
    background: rgba(255,255,255,0.1);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--sage);
    cursor: pointer;
    border: 2px solid var(--cream);
    transition: transform 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--sage);
    cursor: pointer;
    border: 2px solid var(--cream);
  }

  button {
    width: 100%;
    padding: 9px 14px;
    background: rgba(221, 161, 94, 0.15);
    color: var(--earth);
    border: 1px solid rgba(221, 161, 94, 0.35);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    margin-top: 4px;
  }
  button:hover {
    background: rgba(221, 161, 94, 0.28);
    border-color: rgba(221, 161, 94, 0.6);
    color: var(--cream);
  }

  .stats {
    bottom: 18px;
    left: 18px;
    min-width: 260px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .stat-bar-wrap {
    flex: 1;
    margin: 0 10px;
    height: 6px;
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    overflow: hidden;
  }
  .stat-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.35s ease;
  }
  .stat-name {
    width: 70px;
    color: var(--muted);
  }
  .stat-val {
    width: 40px;
    text-align: right;
    color: var(--cream);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }

  .separator {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 10px 0;
  }

  .quorum-msg {
    margin-top: 8px;
    font-size: 12px;
    color: var(--sage);
    font-weight: 600;
  }
  .quorum-msg.waiting {
    color: var(--muted);
    font-weight: 400;
  }

  @media (max-width: 720px) {
    .controls { width: calc(100vw - 36px); top: auto; bottom: 170px; right: 18px; left: 18px; max-height: 40vh; }
    .stats { min-width: auto; right: 18px; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<a href="index.html" class="organic-back-link">
  <span class="back-arrow">&larr;</span>
  <span class="back-text">Gallery</span>
</a>

<div class="title">
  <h1>Honeybee Hive Consensus</h1>
  <p>Seeley's Waggle-Dance Decision Model</p>
</div>

<canvas id="canvas"></canvas>

<div class="panel controls">
  <h3>Site Qualities</h3>
  <div id="site-sliders"></div>
  <div class="separator"></div>
  <h3>Colony</h3>
  <div class="row">
    <div class="row-label"><span>Scout Count</span><span class="row-value" id="scoutCountVal">150</span></div>
    <input type="range" id="scoutCount" min="40" max="300" step="10" value="150">
  </div>
  <div class="row">
    <div class="row-label"><span>Quorum Threshold</span><span class="row-value" id="quorumVal">35%</span></div>
    <input type="range" id="quorum" min="15" max="70" step="1" value="35">
  </div>
  <div class="row">
    <div class="row-label"><span>Cross-Inhibition</span><span class="row-value" id="inhibitVal">0.40</span></div>
    <input type="range" id="inhibit" min="0" max="100" step="1" value="40">
  </div>
  <button id="resetBtn">Reset Simulation</button>
</div>

<div class="panel stats">
  <h3>Committed Fraction</h3>
  <div id="statList"></div>
  <div class="separator"></div>
  <div class="stat-row">
    <span class="stat-name">Time</span>
    <span class="stat-bar-wrap"><span class="stat-bar" id="timeBar" style="background: var(--sage); width: 0%"></span></span>
    <span class="stat-val" id="timeVal">0s</span>
  </div>
  <div class="quorum-msg waiting" id="quorumMsg">Awaiting quorum&hellip;</div>
</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  // Colors for sites (sage/moss/earth/terracotta family to match theme)
  const SITE_PALETTE = [
    { fill: '#8A9A5B', glow: 'rgba(138,154,91,0.35)', name: 'A' },  // sage
    { fill: '#DDA15E', glow: 'rgba(221,161,94,0.35)', name: 'B' },  // earth
    { fill: '#BC6C25', glow: 'rgba(188,108,37,0.35)', name: 'C' },  // terracotta
    { fill: '#A67F8E', glow: 'rgba(166,127,142,0.35)', name: 'D' },  // dusty rose
  ];
  const UNCOMMITTED_COLOR = 'rgba(210,210,200,0.65)';

  // Simulation parameters
  const params = {
    siteQualities: [0.55, 0.85, 0.45, 0.70],
    scoutCount: 150,
    quorum: 0.35,
    inhibition: 0.40,
  };

  // Sites: arranged around the cluster
  let cluster = { x: 0, y: 0, r: 120 };
  let sites = [];

  // Bees
  let bees = [];
  let time = 0;         // seconds elapsed since last reset
  let quorumReachedAt = null;
  let quorumWinner = null;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    cluster.x = W / 2;
    cluster.y = H / 2;
    cluster.r = Math.min(W, H) * 0.12;

    layoutSites();
  }

  function layoutSites() {
    sites = [];
    const dist = Math.min(W, H) * 0.36;
    const angles = [-Math.PI * 0.72, -Math.PI * 0.24, Math.PI * 0.22, Math.PI * 0.78];
    for (let i = 0; i < 4; i++) {
      const a = angles[i];
      sites.push({
        id: i,
        x: cluster.x + Math.cos(a) * dist,
        y: cluster.y + Math.sin(a) * dist,
        quality: params.siteQualities[i],
        palette: SITE_PALETTE[i],
      });
    }
  }

  // Bee states:
  //   'resting'       - in cluster, uncommitted
  //   'scouting'      - flying out to assigned site (initial exploration)
  //   'inspecting'    - at site for a bit
  //   'returning'     - flying back to cluster
  //   'dancing'       - performing waggle dance in cluster
  //   'following'     - picked up a dance, flying out to recruited site
  function makeBee(i) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.sqrt(Math.random()) * cluster.r;
    return {
      id: i,
      x: cluster.x + Math.cos(a) * r,
      y: cluster.y + Math.sin(a) * r,
      vx: 0, vy: 0,
      state: 'resting',
      commit: -1,     // -1 means uncommitted
      targetSite: -1,
      timer: Math.random() * 2.0, // schedule first scout
      danceTimer: 0,
      waggleAngle: 0,
      waggleT: 0,
      speed: 80 + Math.random() * 30, // px/sec
    };
  }

  function reset() {
    bees = [];
    for (let i = 0; i < params.scoutCount; i++) bees.push(makeBee(i));
    time = 0;
    quorumReachedAt = null;
    quorumWinner = null;
    updateQuorumMsg();
  }

  // Animation loop
  let lastT = performance.now();
  function step() {
    const now = performance.now();
    let dt = (now - lastT) / 1000;
    lastT = now;
    if (dt > 0.08) dt = 0.08; // cap to avoid jumps
    update(dt);
    draw();
    requestAnimationFrame(step);
  }

  function update(dt) {
    time += dt;

    // Update each bee
    for (const b of bees) {
      b.timer -= dt;

      switch (b.state) {
        case 'resting': {
          // Gentle jitter
          b.x += (Math.random() - 0.5) * 6 * dt * 5;
          b.y += (Math.random() - 0.5) * 6 * dt * 5;
          pullToward(b, cluster.x, cluster.y, cluster.r * 0.7, dt, 25);

          if (b.timer <= 0) {
            // Either scout random new site, or follow an active dancer
            const followed = tryFollowDance(b);
            if (!followed) {
              // Random scout
              b.targetSite = Math.floor(Math.random() * sites.length);
              b.state = 'scouting';
              b.commit = -1;
            }
          }
          break;
        }
        case 'scouting':
        case 'following': {
          const s = sites[b.targetSite];
          moveToward(b, s.x, s.y, b.speed, dt);
          const d2 = (b.x - s.x) ** 2 + (b.y - s.y) ** 2;
          if (d2 < 22 * 22) {
            b.state = 'inspecting';
            b.timer = 1.0 + Math.random() * 1.0;
          }
          break;
        }
        case 'inspecting': {
          // Wiggle at site
          const s = sites[b.targetSite];
          const a = Math.random() * Math.PI * 2;
          b.x = s.x + Math.cos(a) * (8 + Math.random() * 6);
          b.y = s.y + Math.sin(a) * (8 + Math.random() * 6);
          if (b.timer <= 0) {
            b.commit = b.targetSite;
            b.state = 'returning';
          }
          break;
        }
        case 'returning': {
          moveToward(b, cluster.x, cluster.y, b.speed, dt);
          const d2 = (b.x - cluster.x) ** 2 + (b.y - cluster.y) ** 2;
          if (d2 < cluster.r * cluster.r) {
            // Start dancing — duration proportional to site quality
            const q = sites[b.commit].quality;
            b.state = 'dancing';
            b.danceTimer = 3.0 + q * 14.0; // 3..17 seconds
            b.waggleAngle = Math.atan2(sites[b.commit].y - cluster.y, sites[b.commit].x - cluster.x);
            b.waggleT = 0;
          }
          break;
        }
        case 'dancing': {
          b.danceTimer -= dt;
          b.waggleT += dt * 10;
          // Perform figure-8 waggle: small oscillation in cluster
          // Stay near cluster center, wobble along waggleAngle
          const ox = Math.sin(b.waggleT * 6) * 8;
          const oy = Math.sin(b.waggleT * 3) * 4;
          const cx = b.waggleAngle;
          b.x += (cluster.x + Math.cos(cx) * ox + Math.cos(cx + Math.PI/2) * oy - b.x) * Math.min(1, dt * 8);
          b.y += (cluster.y + Math.sin(cx) * ox + Math.sin(cx + Math.PI/2) * oy - b.y) * Math.min(1, dt * 8);

          // Cross-inhibition: dancing bees get "stopped" by rivals with prob
          if (Math.random() < params.inhibition * dt * 0.8) {
            // Count rivals (bees dancing for different sites)
            let rivals = 0;
            for (const o of bees) {
              if (o !== b && o.state === 'dancing' && o.commit !== b.commit) rivals++;
            }
            if (rivals > 0) {
              const pStop = Math.min(0.9, rivals / bees.length * 5);
              if (Math.random() < pStop) {
                // Stop dancing, return to resting
                b.state = 'resting';
                b.commit = -1;
                b.timer = 2 + Math.random() * 3;
                break;
              }
            }
          }

          if (b.danceTimer <= 0) {
            // Dance ended; go scout same site again with prob quality, or rest
            const q = sites[b.commit].quality;
            if (Math.random() < 0.6 + q * 0.3) {
              b.targetSite = b.commit;
              b.state = 'scouting';
            } else {
              b.state = 'resting';
              b.timer = 1 + Math.random() * 2;
            }
          }
          break;
        }
      }
    }

    // Quorum check: fraction committed (includes dancing, inspecting, returning, following)
    const counts = [0, 0, 0, 0];
    for (const b of bees) {
      if (b.commit >= 0) counts[b.commit]++;
    }
    if (!quorumReachedAt) {
      for (let i = 0; i < 4; i++) {
        if (counts[i] / bees.length >= params.quorum) {
          quorumReachedAt = time;
          quorumWinner = i;
          updateQuorumMsg();
          break;
        }
      }
    }

    updateStats(counts);
  }

  function tryFollowDance(b) {
    // Collect dancing bees
    const dancers = [];
    for (const o of bees) if (o.state === 'dancing') dancers.push(o);
    if (dancers.length === 0) return false;
    // Pick weighted by remaining dance time (quality proxy)
    let total = 0;
    for (const d of dancers) total += Math.max(0, d.danceTimer);
    if (total <= 0) return false;
    let r = Math.random() * total;
    for (const d of dancers) {
      r -= Math.max(0, d.danceTimer);
      if (r <= 0) {
        b.targetSite = d.commit;
        b.state = 'following';
        b.commit = -1;
        return true;
      }
    }
    return false;
  }

  function moveToward(b, tx, ty, speed, dt) {
    const dx = tx - b.x, dy = ty - b.y;
    const d = Math.hypot(dx, dy);
    if (d < 0.001) return;
    b.x += (dx / d) * speed * dt;
    b.y += (dy / d) * speed * dt;
  }

  function pullToward(b, tx, ty, maxR, dt, force) {
    const dx = tx - b.x, dy = ty - b.y;
    const d = Math.hypot(dx, dy);
    if (d > maxR) {
      b.x += (dx / d) * force * dt;
      b.y += (dy / d) * force * dt;
    }
  }

  // Rendering
  function draw() {
    // Subtle background
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, W, H);

    // Soft cluster ring
    const grad = ctx.createRadialGradient(cluster.x, cluster.y, cluster.r * 0.3, cluster.x, cluster.y, cluster.r * 1.8);
    grad.addColorStop(0, 'rgba(254,250,224,0.08)');
    grad.addColorStop(1, 'rgba(254,250,224,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cluster.x, cluster.y, cluster.r * 1.8, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(254,250,224,0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 6]);
    ctx.beginPath();
    ctx.arc(cluster.x, cluster.y, cluster.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw faint connection lines to sites
    for (const s of sites) {
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cluster.x, cluster.y);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
    }

    // Draw sites (earth/sage squares)
    for (const s of sites) {
      const size = 34 + s.quality * 32;   // bigger = higher quality
      const glow = s.quality;

      // Glow
      ctx.shadowColor = s.palette.fill;
      ctx.shadowBlur = 12 + glow * 24;
      ctx.fillStyle = s.palette.fill;
      roundRect(ctx, s.x - size / 2, s.y - size / 2, size, size, 6);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Inner quality indicator
      ctx.fillStyle = 'rgba(10,10,15,0.25)';
      const innerSize = size * (1 - s.quality * 0.55);
      roundRect(ctx, s.x - innerSize / 2, s.y - innerSize / 2, innerSize, innerSize, 3);
      ctx.fill();

      // Site label
      ctx.fillStyle = 'rgba(254,250,224,0.85)';
      ctx.font = '600 12px "Nunito", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Site ' + s.palette.name, s.x, s.y + size / 2 + 14);

      // Quality readout
      ctx.fillStyle = 'rgba(210,210,200,0.6)';
      ctx.font = '500 10px "Nunito", sans-serif';
      ctx.fillText('Q = ' + s.quality.toFixed(2), s.x, s.y + size / 2 + 28);
    }

    // Quorum-winner glow
    if (quorumWinner !== null) {
      const s = sites[quorumWinner];
      const pulse = 0.6 + Math.sin(time * 3) * 0.2;
      ctx.strokeStyle = `rgba(254,250,224,${pulse})`;
      ctx.lineWidth = 2;
      const size = 34 + s.quality * 32 + 10;
      roundRect(ctx, s.x - size / 2, s.y - size / 2, size, size, 8);
      ctx.stroke();
    }

    // Waggle dance highlight: show motion trails for dancers
    for (const b of bees) {
      if (b.state === 'dancing') {
        const s = sites[b.commit];
        ctx.strokeStyle = s.palette.glow;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(b.x, b.y);
        ctx.lineTo(b.x + Math.cos(b.waggleAngle) * 18, b.y + Math.sin(b.waggleAngle) * 18);
        ctx.stroke();
      }
    }

    // Draw bees
    for (const b of bees) {
      let color;
      if (b.commit >= 0) color = sites[b.commit].palette.fill;
      else if (b.targetSite >= 0 && (b.state === 'scouting' || b.state === 'following')) {
        color = sites[b.targetSite].palette.fill;
      } else color = UNCOMMITTED_COLOR;

      let radius = 2.2;
      if (b.state === 'dancing') {
        radius = 3.2;
        // Extra halo for dancers
        ctx.fillStyle = sites[b.commit].palette.glow;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 5 + Math.sin(b.waggleT * 8) * 1.5, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, radius, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // UI
  function buildSiteSliders() {
    const container = document.getElementById('site-sliders');
    container.innerHTML = '';
    for (let i = 0; i < 4; i++) {
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <div class="row-label">
          <span class="site-label">
            <span class="site-swatch" style="background:${SITE_PALETTE[i].fill}"></span>
            Site ${SITE_PALETTE[i].name}
          </span>
          <span class="row-value" id="qVal${i}">${params.siteQualities[i].toFixed(2)}</span>
        </div>
        <input type="range" id="q${i}" min="0" max="100" step="1" value="${Math.round(params.siteQualities[i] * 100)}">
      `;
      container.appendChild(row);
      const slider = row.querySelector(`#q${i}`);
      slider.addEventListener('input', (e) => {
        params.siteQualities[i] = +e.target.value / 100;
        sites[i].quality = params.siteQualities[i];
        document.getElementById(`qVal${i}`).textContent = params.siteQualities[i].toFixed(2);
      });
    }
  }

  function buildStatList() {
    const list = document.getElementById('statList');
    list.innerHTML = '';
    for (let i = 0; i < 4; i++) {
      const row = document.createElement('div');
      row.className = 'stat-row';
      row.innerHTML = `
        <span class="stat-name"><span class="site-swatch" style="background:${SITE_PALETTE[i].fill}; display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:5px;"></span>Site ${SITE_PALETTE[i].name}</span>
        <span class="stat-bar-wrap"><span class="stat-bar" id="bar${i}" style="background:${SITE_PALETTE[i].fill}; width:0%"></span></span>
        <span class="stat-val" id="frac${i}">0%</span>
      `;
      list.appendChild(row);
    }
  }

  function updateStats(counts) {
    for (let i = 0; i < 4; i++) {
      const frac = counts[i] / bees.length;
      document.getElementById('frac' + i).textContent = Math.round(frac * 100) + '%';
      document.getElementById('bar' + i).style.width = (frac * 100).toFixed(1) + '%';
    }
    document.getElementById('timeVal').textContent = time.toFixed(1) + 's';
    document.getElementById('timeBar').style.width = Math.min(100, time / 60 * 100).toFixed(1) + '%';
  }

  function updateQuorumMsg() {
    const el = document.getElementById('quorumMsg');
    if (quorumReachedAt !== null) {
      el.classList.remove('waiting');
      el.innerHTML = `Quorum reached for <strong>Site ${SITE_PALETTE[quorumWinner].name}</strong> at ${quorumReachedAt.toFixed(1)}s`;
    } else {
      el.classList.add('waiting');
      el.textContent = 'Awaiting quorum…';
    }
  }

  // Listeners
  document.getElementById('scoutCount').addEventListener('input', (e) => {
    params.scoutCount = +e.target.value;
    document.getElementById('scoutCountVal').textContent = params.scoutCount;
    reset();
  });
  document.getElementById('quorum').addEventListener('input', (e) => {
    params.quorum = +e.target.value / 100;
    document.getElementById('quorumVal').textContent = e.target.value + '%';
  });
  document.getElementById('inhibit').addEventListener('input', (e) => {
    params.inhibition = +e.target.value / 100;
    document.getElementById('inhibitVal').textContent = params.inhibition.toFixed(2);
  });
  document.getElementById('resetBtn').addEventListener('click', reset);

  window.addEventListener('resize', () => {
    resize();
  });

  resize();
  buildSiteSliders();
  buildStatList();
  reset();
  requestAnimationFrame(step);
})();
</script>
</body>
</html>
