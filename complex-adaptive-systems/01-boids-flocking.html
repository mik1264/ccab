<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boids Flocking — Complex Adaptive Systems</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0f;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #FEFAE0;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
  }

  .organic-back-link {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 24px;
    color: #FEFAE0;
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 0.3px;
    transition: all 0.3s ease;
  }
  .organic-back-link:hover {
    background: rgba(138, 154, 91, 0.25);
    border-color: rgba(138, 154, 91, 0.5);
    transform: translateX(-2px);
  }
  .back-arrow { font-size: 16px; }

  .title {
    position: fixed;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-family: 'Lora', Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: rgba(254, 250, 224, 0.92);
    text-shadow: 0 0 20px rgba(138, 154, 91, 0.3);
    pointer-events: none;
  }

  .info-panel {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    max-width: 280px;
    padding: 14px 18px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    font-size: 12px;
    line-height: 1.55;
    color: rgba(254, 250, 224, 0.78);
  }
  .info-panel strong {
    color: #DDA15E;
    font-weight: 600;
  }

  .controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    padding: 16px 22px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    align-items: center;
    justify-content: center;
    max-width: calc(100vw - 40px);
  }
  .control {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 120px;
  }
  .control label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(254, 250, 224, 0.65);
    display: flex;
    justify-content: space-between;
  }
  .control label .value {
    color: #DDA15E;
    font-weight: 600;
  }
  .control input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(254, 250, 224, 0.15);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    background: #8A9A5B;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(138, 154, 91, 0.6);
    transition: transform 0.15s ease;
  }
  .control input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
    background: #DDA15E;
  }
  .control input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: #8A9A5B;
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 10px rgba(138, 154, 91, 0.6);
  }

  @media (max-width: 680px) {
    .info-panel { display: none; }
    .title { font-size: 17px; }
    .controls { gap: 10px; padding: 12px; }
    .control { min-width: 90px; }
  }
</style>
</head>
<body>

<a href="../index.html" class="organic-back-link">
  <span class="back-arrow">←</span>
  <span class="back-text">Gallery</span>
</a>

<div class="title">Boids Flocking</div>

<div class="info-panel">
  <strong>Reynolds' Boids (1987)</strong><br>
  Each agent follows three local rules — <strong>separation</strong>, <strong>alignment</strong>, and <strong>cohesion</strong> — among nearby neighbors. Coherent flocks emerge from purely local interactions.
</div>

<canvas id="canvas"></canvas>

<div class="controls">
  <div class="control">
    <label>Separation <span class="value" id="v-sep">1.6</span></label>
    <input type="range" id="sep" min="0" max="4" step="0.05" value="1.6">
  </div>
  <div class="control">
    <label>Alignment <span class="value" id="v-ali">1.0</span></label>
    <input type="range" id="ali" min="0" max="3" step="0.05" value="1.0">
  </div>
  <div class="control">
    <label>Cohesion <span class="value" id="v-coh">1.0</span></label>
    <input type="range" id="coh" min="0" max="3" step="0.05" value="1.0">
  </div>
  <div class="control">
    <label>Speed <span class="value" id="v-spd">2.8</span></label>
    <input type="range" id="spd" min="0.5" max="6" step="0.1" value="2.8">
  </div>
</div>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    // paint background once on resize to avoid visible jump
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, W, H);
  }
  window.addEventListener('resize', resize);
  resize();

  // Controls
  const params = {
    sep: 1.6,
    ali: 1.0,
    coh: 1.0,
    spd: 2.8
  };
  function bindSlider(id, key, labelId) {
    const slider = document.getElementById(id);
    const label = document.getElementById(labelId);
    slider.addEventListener('input', () => {
      params[key] = parseFloat(slider.value);
      label.textContent = params[key].toFixed(key === 'spd' ? 1 : 2);
    });
  }
  bindSlider('sep', 'sep', 'v-sep');
  bindSlider('ali', 'ali', 'v-ali');
  bindSlider('coh', 'coh', 'v-coh');
  bindSlider('spd', 'spd', 'v-spd');

  // Boids
  const NUM_BOIDS = (() => {
    // Scale count to screen area for consistent density
    const area = window.innerWidth * window.innerHeight;
    const target = Math.round(area / 4500);
    return Math.max(200, Math.min(400, target));
  })();

  const PERCEPTION = 55;       // neighbor radius
  const SEP_RADIUS = 22;       // separation radius
  const MAX_FORCE = 0.07;
  const P2 = PERCEPTION * PERCEPTION;
  const S2 = SEP_RADIUS * SEP_RADIUS;

  const boids = [];
  for (let i = 0; i < NUM_BOIDS; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 1.5;
    boids.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      density: 0
    });
  }

  // Spatial hash
  const CELL = PERCEPTION;
  let cols = 0, rows = 0;
  let grid = null;

  function rebuildGrid() {
    cols = Math.max(1, Math.ceil(W / CELL));
    rows = Math.max(1, Math.ceil(H / CELL));
    grid = new Array(cols * rows);
    for (let i = 0; i < grid.length; i++) grid[i] = [];
  }
  rebuildGrid();
  window.addEventListener('resize', rebuildGrid);

  function cellIndex(cx, cy) {
    return ((cy + rows) % rows) * cols + ((cx + cols) % cols);
  }

  function clearGrid() {
    for (let i = 0; i < grid.length; i++) grid[i].length = 0;
  }

  function insertBoids() {
    for (let i = 0; i < boids.length; i++) {
      const b = boids[i];
      const cx = Math.floor(b.x / CELL);
      const cy = Math.floor(b.y / CELL);
      const idx = cellIndex(cx, cy);
      grid[idx].push(i);
    }
  }

  function limit(vx, vy, max) {
    const m2 = vx * vx + vy * vy;
    if (m2 > max * max) {
      const m = Math.sqrt(m2);
      return [vx / m * max, vy / m * max];
    }
    return [vx, vy];
  }

  function wrapDelta(d, size) {
    if (d > size * 0.5) return d - size;
    if (d < -size * 0.5) return d + size;
    return d;
  }

  function update() {
    clearGrid();
    insertBoids();

    const maxSpeed = params.spd;
    const minSpeed = maxSpeed * 0.55;

    for (let i = 0; i < boids.length; i++) {
      const b = boids[i];
      const cx = Math.floor(b.x / CELL);
      const cy = Math.floor(b.y / CELL);

      let sepX = 0, sepY = 0;
      let aliX = 0, aliY = 0;
      let cohX = 0, cohY = 0;
      let sepCount = 0, aliCount = 0, cohCount = 0;

      // Iterate 3x3 neighborhood
      for (let oy = -1; oy <= 1; oy++) {
        for (let ox = -1; ox <= 1; ox++) {
          const idx = cellIndex(cx + ox, cy + oy);
          const cell = grid[idx];
          for (let k = 0; k < cell.length; k++) {
            const j = cell[k];
            if (j === i) continue;
            const o = boids[j];
            let dx = o.x - b.x;
            let dy = o.y - b.y;
            // toroidal distance
            dx = wrapDelta(dx, W);
            dy = wrapDelta(dy, H);
            const d2 = dx * dx + dy * dy;
            if (d2 > P2 || d2 === 0) continue;

            // Cohesion & Alignment (perception radius)
            aliX += o.vx;
            aliY += o.vy;
            aliCount++;
            cohX += dx; // relative position sum
            cohY += dy;
            cohCount++;

            // Separation (closer radius, inverse-distance weighting)
            if (d2 < S2) {
              const inv = 1 / Math.sqrt(d2);
              sepX -= dx * inv * inv * 8;
              sepY -= dy * inv * inv * 8;
              sepCount++;
            }
          }
        }
      }

      let ax = 0, ay = 0;

      // Separation steering
      if (sepCount > 0) {
        let sx = sepX, sy = sepY;
        const m2 = sx * sx + sy * sy;
        if (m2 > 0) {
          const m = Math.sqrt(m2);
          sx = sx / m * maxSpeed;
          sy = sy / m * maxSpeed;
          let fx = sx - b.vx;
          let fy = sy - b.vy;
          [fx, fy] = limit(fx, fy, MAX_FORCE * 3);
          ax += fx * params.sep;
          ay += fy * params.sep;
        }
      }

      // Alignment steering
      if (aliCount > 0) {
        let avx = aliX / aliCount;
        let avy = aliY / aliCount;
        const m2 = avx * avx + avy * avy;
        if (m2 > 0) {
          const m = Math.sqrt(m2);
          avx = avx / m * maxSpeed;
          avy = avy / m * maxSpeed;
          let fx = avx - b.vx;
          let fy = avy - b.vy;
          [fx, fy] = limit(fx, fy, MAX_FORCE);
          ax += fx * params.ali;
          ay += fy * params.ali;
        }
      }

      // Cohesion steering (toward center of mass)
      if (cohCount > 0) {
        let targetDx = cohX / cohCount;
        let targetDy = cohY / cohCount;
        const m2 = targetDx * targetDx + targetDy * targetDy;
        if (m2 > 0) {
          const m = Math.sqrt(m2);
          const desiredVx = targetDx / m * maxSpeed;
          const desiredVy = targetDy / m * maxSpeed;
          let fx = desiredVx - b.vx;
          let fy = desiredVy - b.vy;
          [fx, fy] = limit(fx, fy, MAX_FORCE);
          ax += fx * params.coh;
          ay += fy * params.coh;
        }
      }

      b.vx += ax;
      b.vy += ay;

      // Clamp speed
      const sp2 = b.vx * b.vx + b.vy * b.vy;
      if (sp2 > maxSpeed * maxSpeed) {
        const sp = Math.sqrt(sp2);
        b.vx = b.vx / sp * maxSpeed;
        b.vy = b.vy / sp * maxSpeed;
      } else if (sp2 < minSpeed * minSpeed && sp2 > 0) {
        const sp = Math.sqrt(sp2);
        b.vx = b.vx / sp * minSpeed;
        b.vy = b.vy / sp * minSpeed;
      }

      b.x += b.vx;
      b.y += b.vy;
      // Toroidal wrap
      if (b.x < 0) b.x += W;
      else if (b.x >= W) b.x -= W;
      if (b.y < 0) b.y += H;
      else if (b.y >= H) b.y -= H;

      // Smooth density for coloring
      b.density = b.density * 0.92 + aliCount * 0.08;
    }
  }

  // Palette interpolation (sage -> earth -> terracotta -> cream)
  const PALETTE = [
    [138, 154, 91],   // sage
    [221, 161, 94],   // earth
    [188, 108, 37],   // terracotta
    [254, 250, 224]   // cream
  ];
  function paletteColor(t) {
    t = Math.max(0, Math.min(0.999, t));
    const seg = t * (PALETTE.length - 1);
    const i = Math.floor(seg);
    const f = seg - i;
    const a = PALETTE[i];
    const b = PALETTE[i + 1];
    return [
      a[0] + (b[0] - a[0]) * f,
      a[1] + (b[1] - a[1]) * f,
      a[2] + (b[2] - a[2]) * f
    ];
  }

  function render() {
    // Trail / ghosting
    ctx.fillStyle = 'rgba(10, 10, 15, 0.18)';
    ctx.fillRect(0, 0, W, H);

    ctx.globalCompositeOperation = 'lighter';

    for (let i = 0; i < boids.length; i++) {
      const b = boids[i];
      const heading = Math.atan2(b.vy, b.vx);

      // Color by local density (emergent property)
      const t = Math.min(1, b.density / 18);
      const [r, g, bl] = paletteColor(t);

      // Glow via a soft circle
      ctx.fillStyle = `rgba(${r|0},${g|0},${bl|0},0.18)`;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 5.5, 0, Math.PI * 2);
      ctx.fill();

      // Triangle pointing in direction of velocity
      const cos = Math.cos(heading);
      const sin = Math.sin(heading);
      const size = 4.2;
      const x1 = b.x + cos * size * 1.6;
      const y1 = b.y + sin * size * 1.6;
      const x2 = b.x + (-cos * size * 0.7) + (-sin * size * 0.8);
      const y2 = b.y + (-sin * size * 0.7) + (cos * size * 0.8);
      const x3 = b.x + (-cos * size * 0.7) - (-sin * size * 0.8);
      const y3 = b.y + (-sin * size * 0.7) - (cos * size * 0.8);

      ctx.fillStyle = `rgba(${r|0},${g|0},${bl|0},0.85)`;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x3, y3);
      ctx.closePath();
      ctx.fill();
    }

    ctx.globalCompositeOperation = 'source-over';
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
