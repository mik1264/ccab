<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voter Model — Complex Adaptive Systems</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; color: #e8e8ee; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  canvas { display: block; position: absolute; inset: 0; width: 100vw; height: 100vh; image-rendering: pixelated; }

  .organic-back-link {
    position: fixed; top: 20px; left: 20px; z-index: 20;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 999px;
    background: rgba(254, 250, 224, 0.12);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(138, 154, 91, 0.4);
    color: #DDA15E; text-decoration: none;
    font-family: 'Lora', serif; font-size: 0.95rem;
    transition: all 0.3s ease;
  }
  .organic-back-link:hover { background: rgba(138, 154, 91, 0.2); transform: translateX(-2px); }
  .back-arrow { font-size: 1.1rem; }

  .title-card {
    position: fixed; top: 20px; right: 20px; z-index: 20;
    padding: 14px 20px; border-radius: 16px;
    background: rgba(20, 20, 30, 0.75);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(138, 154, 91, 0.3);
    max-width: 320px;
  }
  .title-card h1 {
    font-family: 'Lora', serif;
    font-size: 1.4rem; font-weight: 600;
    background: linear-gradient(90deg, #8A9A5B, #BC6C25);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .title-card p { font-size: 0.8rem; color: #b8b8c2; margin-top: 4px; line-height: 1.4; }

  .panel {
    position: fixed; bottom: 20px; left: 20px; z-index: 20;
    padding: 16px 18px; border-radius: 16px;
    background: rgba(20, 20, 30, 0.82);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(138, 154, 91, 0.3);
    min-width: 260px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .panel label { font-size: 0.78rem; color: #c8c8d2; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .panel label span.val { color: #DDA15E; font-variant-numeric: tabular-nums; }
  .panel input[type=range] { width: 140px; accent-color: #8A9A5B; }
  .variants { display: flex; gap: 4px; }
  .variants button {
    flex: 1; padding: 6px 8px; font-size: 0.72rem;
    background: rgba(138,154,91,0.1); color: #c8c8d2;
    border: 1px solid rgba(138,154,91,0.3); border-radius: 8px;
    cursor: pointer; transition: all 0.2s;
    font-family: inherit;
  }
  .variants button.active { background: rgba(138,154,91,0.4); color: #FEFAE0; border-color: #8A9A5B; }
  .variants button:hover { background: rgba(138,154,91,0.25); }
  .reset-btn {
    padding: 8px; font-size: 0.82rem; font-family: inherit;
    background: rgba(188,108,37,0.2); color: #DDA15E;
    border: 1px solid rgba(188,108,37,0.5); border-radius: 8px;
    cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:hover { background: rgba(188,108,37,0.35); }

  .stats {
    position: fixed; bottom: 20px; right: 20px; z-index: 20;
    padding: 14px 18px; border-radius: 16px;
    background: rgba(20, 20, 30, 0.82);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(138, 154, 91, 0.3);
    min-width: 220px;
    font-size: 0.82rem;
  }
  .stat-row { display: flex; justify-content: space-between; padding: 3px 0; color: #c8c8d2; }
  .stat-row .v { color: #8A9A5B; font-variant-numeric: tabular-nums; font-weight: 600; }
  .stat-row.b .v { color: #BC6C25; }
  .bar {
    margin-top: 8px; height: 6px; border-radius: 3px; overflow: hidden;
    background: #BC6C25; position: relative;
  }
  .bar .fill {
    position: absolute; inset: 0; width: 50%;
    background: #8A9A5B; transition: width 0.3s;
  }
  .section-label { font-size: 0.68rem; color: #8888a0; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
</style>
</head>
<body>
<a href="index.html" class="organic-back-link"><span class="back-arrow">←</span><span>Gallery</span></a>

<canvas id="canvas"></canvas>

<div class="title-card">
  <h1>Voter Model</h1>
  <p>Opinion dynamics via local imitation. Domains coarsen until one opinion wins.</p>
</div>

<div class="panel">
  <div class="section-label">Variant</div>
  <div class="variants">
    <button data-v="classic" class="active">Classic</button>
    <button data-v="qvoter">Q-voter</button>
    <button data-v="majority">Majority</button>
  </div>
  <label>Initial A fraction <span class="val" id="fracVal">0.50</span>
    <input type="range" id="fracSlider" min="0" max="1" step="0.01" value="0.5">
  </label>
  <label id="qRow" style="display:none;">q neighbors <span class="val" id="qVal">3</span>
    <input type="range" id="qSlider" min="2" max="4" step="1" value="3">
  </label>
  <label>Speed <span class="val" id="spVal">5000</span>
    <input type="range" id="spSlider" min="500" max="20000" step="500" value="5000">
  </label>
  <button class="reset-btn" id="resetBtn">Reset</button>
</div>

<div class="stats">
  <div class="stat-row"><span>Opinion A (sage)</span><span class="v" id="fracA">—</span></div>
  <div class="stat-row b"><span>Opinion B (terra)</span><span class="v" id="fracB">—</span></div>
  <div class="bar"><div class="fill" id="barFill"></div></div>
  <div class="stat-row" style="margin-top:8px;"><span>Mean domain size</span><span class="v" id="meanDom">—</span></div>
  <div class="stat-row"><span>Step</span><span class="v" id="stepCt">0</span></div>
</div>

<script>
(() => {
  const GRID = 200;
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const off = document.createElement('canvas');
  off.width = GRID; off.height = GRID;
  const octx = off.getContext('2d');
  const img = octx.createImageData(GRID, GRID);

  // Colors
  const COLOR_A = [0x8A, 0x9A, 0x5B];
  const COLOR_B = [0xBC, 0x6C, 0x25];

  // Grid: 0 = A, 1 = B
  let grid = new Uint8Array(GRID * GRID);
  let variant = 'classic';
  let initialFrac = 0.5;
  let stepsPerFrame = 5000;
  let q = 3;
  let stepCount = 0;

  function init(frac) {
    for (let i = 0; i < grid.length; i++) {
      grid[i] = Math.random() < frac ? 0 : 1;
    }
    stepCount = 0;
  }

  function idx(x, y) {
    return ((y + GRID) % GRID) * GRID + ((x + GRID) % GRID);
  }

  function neighbors(x, y) {
    return [
      grid[idx(x+1, y)], grid[idx(x-1, y)],
      grid[idx(x, y+1)], grid[idx(x, y-1)]
    ];
  }

  function stepClassic() {
    const x = (Math.random() * GRID) | 0;
    const y = (Math.random() * GRID) | 0;
    const n = Math.floor(Math.random() * 4);
    let nx = x, ny = y;
    if (n === 0) nx = x + 1;
    else if (n === 1) nx = x - 1;
    else if (n === 2) ny = y + 1;
    else ny = y - 1;
    grid[idx(x, y)] = grid[idx(nx, ny)];
  }

  function stepQVoter() {
    const x = (Math.random() * GRID) | 0;
    const y = (Math.random() * GRID) | 0;
    const ns = neighbors(x, y);
    // Pick q distinct neighbors from the 4 available
    const pool = [0, 1, 2, 3];
    // Fisher-Yates partial shuffle
    for (let i = 0; i < q; i++) {
      const j = i + ((Math.random() * (pool.length - i)) | 0);
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const first = ns[pool[0]];
    let agree = true;
    for (let i = 1; i < q; i++) {
      if (ns[pool[i]] !== first) { agree = false; break; }
    }
    if (agree) grid[idx(x, y)] = first;
    else if (Math.random() < 0.01) grid[idx(x, y)] = 1 - grid[idx(x, y)]; // small noise
  }

  function stepMajority() {
    const x = (Math.random() * GRID) | 0;
    const y = (Math.random() * GRID) | 0;
    const ns = neighbors(x, y);
    const self = grid[idx(x, y)];
    let countB = 0;
    for (let i = 0; i < 4; i++) if (ns[i] === 1) countB++;
    // Including self in majority
    if (self === 1) countB++;
    const total = 5;
    if (countB > total / 2) grid[idx(x, y)] = 1;
    else if (countB < total / 2) grid[idx(x, y)] = 0;
    // Tie: no change
  }

  function render() {
    const data = img.data;
    for (let i = 0; i < grid.length; i++) {
      const p = i * 4;
      if (grid[i] === 0) {
        data[p] = COLOR_A[0]; data[p+1] = COLOR_A[1]; data[p+2] = COLOR_A[2];
      } else {
        data[p] = COLOR_B[0]; data[p+1] = COLOR_B[1]; data[p+2] = COLOR_B[2];
      }
      data[p+3] = 255;
    }
    octx.putImageData(img, 0, 0);

    // Draw scaled to viewport preserving aspect
    const W = canvas.width, H = canvas.height;
    const size = Math.min(W, H);
    const ox = (W - size) / 2;
    const oy = (H - size) / 2;
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, W, H);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(off, ox, oy, size, size);
  }

  function computeStats() {
    let countA = 0;
    for (let i = 0; i < grid.length; i++) if (grid[i] === 0) countA++;
    const fracA = countA / grid.length;

    // Mean domain size via flood-fill on sampled cells
    // Use a cheaper horizontal/vertical run-length average
    let runs = 0, total = 0;
    for (let y = 0; y < GRID; y++) {
      let runLen = 1;
      for (let x = 1; x < GRID; x++) {
        if (grid[y*GRID + x] === grid[y*GRID + x - 1]) {
          runLen++;
        } else {
          total += runLen; runs++; runLen = 1;
        }
      }
      total += runLen; runs++;
    }
    for (let x = 0; x < GRID; x++) {
      let runLen = 1;
      for (let y = 1; y < GRID; y++) {
        if (grid[y*GRID + x] === grid[(y-1)*GRID + x]) {
          runLen++;
        } else {
          total += runLen; runs++; runLen = 1;
        }
      }
      total += runLen; runs++;
    }
    const meanDom = runs > 0 ? total / runs : 0;
    return { fracA, meanDom };
  }

  function updateStats() {
    const { fracA, meanDom } = computeStats();
    document.getElementById('fracA').textContent = fracA.toFixed(3);
    document.getElementById('fracB').textContent = (1 - fracA).toFixed(3);
    document.getElementById('barFill').style.width = (fracA * 100) + '%';
    document.getElementById('meanDom').textContent = meanDom.toFixed(2);
    document.getElementById('stepCt').textContent = stepCount.toLocaleString();
  }

  let frameCt = 0;
  function loop() {
    const stepFn = variant === 'classic' ? stepClassic
                : variant === 'qvoter' ? stepQVoter
                : stepMajority;
    for (let i = 0; i < stepsPerFrame; i++) stepFn();
    stepCount += stepsPerFrame;
    render();
    frameCt++;
    if (frameCt % 6 === 0) updateStats();
    requestAnimationFrame(loop);
  }

  function resize() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  // Controls
  document.querySelectorAll('.variants button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.variants button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      variant = btn.dataset.v;
      document.getElementById('qRow').style.display = variant === 'qvoter' ? 'flex' : 'none';
    });
  });

  const fracSlider = document.getElementById('fracSlider');
  fracSlider.addEventListener('input', e => {
    initialFrac = parseFloat(e.target.value);
    document.getElementById('fracVal').textContent = initialFrac.toFixed(2);
  });

  const qSlider = document.getElementById('qSlider');
  qSlider.addEventListener('input', e => {
    q = parseInt(e.target.value);
    document.getElementById('qVal').textContent = q;
  });

  const spSlider = document.getElementById('spSlider');
  spSlider.addEventListener('input', e => {
    stepsPerFrame = parseInt(e.target.value);
    document.getElementById('spVal').textContent = stepsPerFrame;
  });

  document.getElementById('resetBtn').addEventListener('click', () => init(initialFrac));

  init(0.5);
  updateStats();
  loop();
})();
</script>
</body>
</html>
