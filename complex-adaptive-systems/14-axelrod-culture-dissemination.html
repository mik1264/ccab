<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axelrod Culture — Complex Adaptive Systems</title>
<style>
    :root {
        --sage: #8A9A5B;
        --moss: #606C38;
        --cream: #FEFAE0;
        --terracotta: #BC6C25;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        color: #e8e8ee;
    }
    canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: crosshair;
    }
    /* Floating back-link */
    .organic-back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(254, 250, 224, 0.12);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(138, 154, 91, 0.35);
        border-radius: 30px;
        color: var(--cream);
        text-decoration: none;
        font-weight: 500;
        font-size: 14px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 10;
    }
    .organic-back-link:hover {
        background: rgba(138, 154, 91, 0.25);
        transform: translateX(-3px);
    }
    .back-arrow { font-size: 18px; }

    /* Title */
    .title {
        position: fixed;
        top: 22px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Georgia', 'Lora', serif;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: 0.5px;
        color: var(--cream);
        text-shadow: 0 2px 12px rgba(0,0,0,0.7);
        z-index: 10;
        white-space: nowrap;
    }

    /* Controls panel */
    .controls {
        position: fixed;
        bottom: 20px;
        left: 20px;
        padding: 16px 20px;
        background: rgba(10, 10, 15, 0.72);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(138, 154, 91, 0.3);
        border-radius: 16px;
        z-index: 10;
        min-width: 250px;
    }
    .controls h3 {
        font-family: 'Georgia', serif;
        font-size: 13px;
        font-weight: 500;
        color: var(--sage);
        margin-bottom: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
    }
    .ctl-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
    }
    .ctl-row label {
        flex: 0 0 32px;
        font-size: 13px;
        color: #cbd5a0;
        font-weight: 600;
    }
    .ctl-row input[type="range"] {
        flex: 1;
        accent-color: var(--sage);
        cursor: pointer;
    }
    .ctl-row .val {
        flex: 0 0 38px;
        text-align: right;
        font-size: 13px;
        color: var(--cream);
        font-variant-numeric: tabular-nums;
    }
    .ctl-row button {
        padding: 7px 16px;
        background: rgba(138, 154, 91, 0.25);
        border: 1px solid rgba(138, 154, 91, 0.5);
        border-radius: 20px;
        color: var(--cream);
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
    }
    .ctl-row button:hover {
        background: rgba(188, 108, 37, 0.4);
    }
    .hint {
        font-size: 11px;
        color: rgba(254, 250, 224, 0.55);
        margin-top: 6px;
        line-height: 1.4;
    }

    /* Stats */
    .stats {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 16px 20px;
        background: rgba(10, 10, 15, 0.72);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(138, 154, 91, 0.3);
        border-radius: 16px;
        z-index: 10;
        min-width: 180px;
    }
    .stats h3 {
        font-family: 'Georgia', serif;
        font-size: 13px;
        font-weight: 500;
        color: var(--sage);
        margin-bottom: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
    }
    .stat-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 6px;
        font-size: 13px;
    }
    .stat-row .k { color: #cbd5a0; }
    .stat-row .v {
        color: var(--cream);
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }
    .phase-indicator {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid rgba(138, 154, 91, 0.2);
        font-size: 11px;
        color: var(--terracotta);
        font-style: italic;
    }
</style>
</head>
<body>

<a href="index.html" class="organic-back-link">
    <span class="back-arrow">←</span>
    <span class="back-text">Gallery</span>
</a>

<div class="title">Axelrod — Cultural Dissemination</div>

<canvas id="canvas"></canvas>

<div class="controls">
    <h3>Parameters</h3>
    <div class="ctl-row">
        <label for="fSlider">F</label>
        <input type="range" id="fSlider" min="2" max="10" value="5" step="1">
        <span class="val" id="fVal">5</span>
    </div>
    <div class="ctl-row">
        <label for="qSlider">q</label>
        <input type="range" id="qSlider" min="2" max="20" value="10" step="1">
        <span class="val" id="qVal">10</span>
    </div>
    <div class="ctl-row">
        <button id="resetBtn">Reset</button>
        <button id="pauseBtn">Pause</button>
    </div>
    <div class="hint">F = cultural features, q = traits per feature. Raise q to trigger the phase transition from monoculture to many cultures.</div>
</div>

<div class="stats">
    <h3>Live Stats</h3>
    <div class="stat-row"><span class="k">Iterations</span><span class="v" id="statIter">0</span></div>
    <div class="stat-row"><span class="k">Regions</span><span class="v" id="statRegions">—</span></div>
    <div class="stat-row"><span class="k">Largest</span><span class="v" id="statLargest">—</span></div>
    <div class="stat-row"><span class="k">Avg sim.</span><span class="v" id="statSim">—</span></div>
    <div class="phase-indicator" id="phaseLabel">initialising…</div>
</div>

<script>
(() => {
    'use strict';

    // --- Parameters ---
    const GRID = 60;
    let F = 5;
    let q = 10;
    let iter = 0;
    let paused = false;

    // grid: flat Uint8Array of length GRID*GRID*F, each cell's feature vector
    let grid = null;

    // --- Canvas setup with Retina support ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let cellSize = 10;
    let offsetX = 0, offsetY = 0;

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        const w = window.innerWidth;
        const h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // cell size that fits GRID into smaller viewport dimension
        const margin = 100; // leave breathing room top/bottom
        const available = Math.min(w, h - margin);
        cellSize = Math.max(4, Math.floor(available / GRID));
        const gridPx = cellSize * GRID;
        offsetX = (w - gridPx) / 2;
        offsetY = (h - gridPx) / 2;
    }
    window.addEventListener('resize', resize);

    // --- Initialise grid with random cultures ---
    function initGrid() {
        grid = new Uint8Array(GRID * GRID * F);
        for (let i = 0; i < grid.length; i++) {
            grid[i] = Math.floor(Math.random() * q);
        }
        iter = 0;
    }

    function idx(x, y, f) {
        return (y * GRID + x) * F + f;
    }

    // --- One Axelrod step: pick random cell + random neighbour, interact with prob = similarity ---
    function step() {
        // run many micro-steps per frame for speed
        const microSteps = 4000;
        for (let s = 0; s < microSteps; s++) {
            const x = Math.floor(Math.random() * GRID);
            const y = Math.floor(Math.random() * GRID);

            // pick one of 4 Von Neumann neighbours (torus)
            const dir = Math.floor(Math.random() * 4);
            let nx = x, ny = y;
            if (dir === 0) nx = (x + 1) % GRID;
            else if (dir === 1) nx = (x - 1 + GRID) % GRID;
            else if (dir === 2) ny = (y + 1) % GRID;
            else ny = (y - 1 + GRID) % GRID;

            // count shared features
            let shared = 0;
            const differing = [];
            const baseA = (y * GRID + x) * F;
            const baseB = (ny * GRID + nx) * F;
            for (let f = 0; f < F; f++) {
                if (grid[baseA + f] === grid[baseB + f]) shared++;
                else differing.push(f);
            }

            // interact with probability = similarity (shared / F)
            // and only if there is something to copy (not all same, not all different)
            if (shared === F) continue; // identical — nothing to do
            if (shared === 0) continue; // orthogonal — no interaction possible

            const similarity = shared / F;
            if (Math.random() < similarity) {
                // copy one random differing trait from neighbour to self
                const pickF = differing[Math.floor(Math.random() * differing.length)];
                grid[baseA + pickF] = grid[baseB + pickF];
            }
        }
        iter += microSteps;
    }

    // --- Rendering: color from first 3 feature values mapped to RGB ---
    function colorFor(x, y) {
        const base = (y * GRID + x) * F;
        // Map each of first 3 traits from [0..q-1] to [0..255]
        // If F < 3, wrap-around
        const qMax = Math.max(1, q - 1);
        const t0 = grid[base + (0 % F)] / qMax;
        const t1 = grid[base + (1 % F)] / qMax;
        const t2 = grid[base + (2 % F)] / qMax;
        // Slightly boost saturation with a subtle gamma
        const r = Math.round(40 + 215 * t0);
        const g = Math.round(40 + 215 * t1);
        const b = Math.round(40 + 215 * t2);
        return `rgb(${r},${g},${b})`;
    }

    function cultureKey(x, y) {
        const base = (y * GRID + x) * F;
        // build a compact key
        let k = '';
        for (let f = 0; f < F; f++) {
            k += grid[base + f].toString(36) + ',';
        }
        return k;
    }

    function sameCulture(ax, ay, bx, by) {
        const ba = (ay * GRID + ax) * F;
        const bb = (by * GRID + bx) * F;
        for (let f = 0; f < F; f++) {
            if (grid[ba + f] !== grid[bb + f]) return false;
        }
        return true;
    }

    function draw() {
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let y = 0; y < GRID; y++) {
            for (let x = 0; x < GRID; x++) {
                ctx.fillStyle = colorFor(x, y);
                ctx.fillRect(
                    offsetX + x * cellSize,
                    offsetY + y * cellSize,
                    cellSize,
                    cellSize
                );
            }
        }

        // subtle grid border
        ctx.strokeStyle = 'rgba(138, 154, 91, 0.3)';
        ctx.lineWidth = 1;
        ctx.strokeRect(offsetX - 0.5, offsetY - 0.5, cellSize * GRID + 1, cellSize * GRID + 1);
    }

    // --- Compute connected components (regions) of identical culture ---
    function computeStats() {
        const labels = new Int32Array(GRID * GRID);
        labels.fill(-1);
        let regionCount = 0;
        let largest = 0;
        const stackX = new Int32Array(GRID * GRID);
        const stackY = new Int32Array(GRID * GRID);

        for (let y0 = 0; y0 < GRID; y0++) {
            for (let x0 = 0; x0 < GRID; x0++) {
                if (labels[y0 * GRID + x0] !== -1) continue;
                // BFS/DFS flood fill
                let top = 0;
                stackX[top] = x0;
                stackY[top] = y0;
                top++;
                labels[y0 * GRID + x0] = regionCount;
                let size = 0;
                while (top > 0) {
                    top--;
                    const cx = stackX[top];
                    const cy = stackY[top];
                    size++;
                    // 4 neighbours (non-toroidal for region counting is standard)
                    const nbrs = [
                        [cx + 1, cy], [cx - 1, cy],
                        [cx, cy + 1], [cx, cy - 1]
                    ];
                    for (const [nx, ny] of nbrs) {
                        if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) continue;
                        if (labels[ny * GRID + nx] !== -1) continue;
                        if (sameCulture(cx, cy, nx, ny)) {
                            labels[ny * GRID + nx] = regionCount;
                            stackX[top] = nx;
                            stackY[top] = ny;
                            top++;
                        }
                    }
                }
                if (size > largest) largest = size;
                regionCount++;
            }
        }

        // Average similarity across neighbour pairs
        let simSum = 0;
        let simN = 0;
        for (let y = 0; y < GRID; y++) {
            for (let x = 0; x < GRID - 1; x++) {
                let s = 0;
                const a = (y * GRID + x) * F;
                const b = (y * GRID + x + 1) * F;
                for (let f = 0; f < F; f++) if (grid[a + f] === grid[b + f]) s++;
                simSum += s / F;
                simN++;
            }
        }
        for (let y = 0; y < GRID - 1; y++) {
            for (let x = 0; x < GRID; x++) {
                let s = 0;
                const a = (y * GRID + x) * F;
                const b = ((y + 1) * GRID + x) * F;
                for (let f = 0; f < F; f++) if (grid[a + f] === grid[b + f]) s++;
                simSum += s / F;
                simN++;
            }
        }
        const avgSim = simN > 0 ? simSum / simN : 0;

        return { regionCount, largest, avgSim };
    }

    // --- UI wiring ---
    const fSlider = document.getElementById('fSlider');
    const qSlider = document.getElementById('qSlider');
    const fVal = document.getElementById('fVal');
    const qVal = document.getElementById('qVal');
    const resetBtn = document.getElementById('resetBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const statIter = document.getElementById('statIter');
    const statRegions = document.getElementById('statRegions');
    const statLargest = document.getElementById('statLargest');
    const statSim = document.getElementById('statSim');
    const phaseLabel = document.getElementById('phaseLabel');

    function syncParams() {
        F = parseInt(fSlider.value, 10);
        q = parseInt(qSlider.value, 10);
        fVal.textContent = F;
        qVal.textContent = q;
    }

    fSlider.addEventListener('input', () => { syncParams(); initGrid(); });
    qSlider.addEventListener('input', () => { syncParams(); initGrid(); });
    resetBtn.addEventListener('click', () => { initGrid(); });
    pauseBtn.addEventListener('click', () => {
        paused = !paused;
        pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    });

    function fmt(n) {
        if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
        if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
        return n.toString();
    }

    function phaseDescription(regionCount) {
        if (regionCount === 1) return 'monoculture (absorbing state)';
        if (regionCount <= 5) return 'few dominant cultures';
        if (regionCount <= 30) return 'transition regime';
        if (regionCount <= 150) return 'fragmented mosaic';
        return 'many small cultures';
    }

    // --- Main loop ---
    let statsTimer = 0;
    function tick() {
        if (!paused) step();
        draw();

        // Update stats less frequently (expensive)
        statsTimer++;
        if (statsTimer >= 6) {
            statsTimer = 0;
            const s = computeStats();
            statIter.textContent = fmt(iter);
            statRegions.textContent = s.regionCount;
            statLargest.textContent = s.largest + ' cells';
            statSim.textContent = (s.avgSim * 100).toFixed(0) + '%';
            phaseLabel.textContent = phaseDescription(s.regionCount);
        } else {
            statIter.textContent = fmt(iter);
        }

        requestAnimationFrame(tick);
    }

    // --- Boot ---
    syncParams();
    resize();
    initGrid();
    tick();
})();
</script>
</body>
</html>
