<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumor Spreading — Complex Adaptive Systems</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: rgba(20, 20, 28, 0.82);
    --border: rgba(255, 255, 255, 0.08);
    --text: #e8e6d9;
    --muted: #8d8a7a;
    --cream: #FEFAE0;
    --terracotta: #BC6C25;
    --sage: #8A9A5B;
    --moss: #606C38;
    --earth: #DDA15E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  canvas { display: block; position: absolute; top: 0; left: 0; }

  .organic-back-link {
    position: fixed;
    top: 20px; left: 20px;
    z-index: 10;
    display: flex; align-items: center; gap: 8px;
    padding: 10px 18px;
    background: rgba(138, 154, 91, 0.18);
    border: 1px solid rgba(138, 154, 91, 0.4);
    border-radius: 30px;
    color: var(--cream);
    text-decoration: none;
    font-size: 14px;
    backdrop-filter: blur(8px);
    transition: all 0.3s ease;
  }
  .organic-back-link:hover {
    background: rgba(138, 154, 91, 0.3);
    transform: translateX(-2px);
  }
  .back-arrow { font-size: 16px; }

  .title {
    position: fixed;
    top: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-family: 'Lora', Georgia, serif;
    font-weight: 500;
    font-size: 20px;
    color: var(--cream);
    letter-spacing: 0.02em;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
  }

  .panel {
    position: fixed;
    top: 80px; right: 20px;
    z-index: 5;
    width: 280px;
    padding: 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    backdrop-filter: blur(12px);
    font-size: 13px;
  }
  .panel h2 {
    font-family: 'Lora', serif;
    font-size: 14px;
    color: var(--earth);
    margin-bottom: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }
  .row label {
    color: var(--muted);
    font-size: 12px;
    flex-shrink: 0;
  }
  .row input[type=range] {
    flex: 1;
    min-width: 0;
    accent-color: var(--terracotta);
  }
  .val {
    color: var(--cream);
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    min-width: 36px;
    text-align: right;
  }
  .toggle {
    display: flex;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 8px;
    padding: 3px;
    gap: 3px;
    margin-bottom: 14px;
  }
  .toggle button {
    flex: 1;
    padding: 7px 10px;
    background: transparent;
    border: 0;
    color: var(--muted);
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .toggle button.active {
    background: var(--terracotta);
    color: var(--cream);
  }
  .btn {
    width: 100%;
    padding: 9px;
    background: rgba(188, 108, 37, 0.2);
    border: 1px solid rgba(188, 108, 37, 0.5);
    color: var(--earth);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.2s;
    margin-top: 6px;
  }
  .btn:hover {
    background: rgba(188, 108, 37, 0.35);
    color: var(--cream);
  }

  .stats {
    position: fixed;
    left: 20px; bottom: 20px;
    z-index: 5;
    width: 320px;
    padding: 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    backdrop-filter: blur(12px);
    font-size: 12px;
  }
  .stats h2 {
    font-family: 'Lora', serif;
    font-size: 13px;
    color: var(--earth);
    margin-bottom: 10px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 7px;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot.ignorant { background: var(--cream); }
  .dot.spreader { background: var(--terracotta); box-shadow: 0 0 8px var(--terracotta); }
  .dot.stifler  { background: var(--sage); }
  .stat-label { color: var(--muted); width: 78px; }
  .bar {
    flex: 1;
    height: 8px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill { height: 100%; transition: width 0.15s linear; }
  .stat-val {
    color: var(--cream);
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    width: 42px;
    text-align: right;
  }

  #timeseries { display: block; width: 100%; height: 70px; margin-top: 10px; background: rgba(0,0,0,0.3); border-radius: 6px; }

  .coverage {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    line-height: 1.5;
  }
  .coverage strong { color: var(--earth); font-weight: 600; }

  @media (max-width: 720px) {
    .panel { width: calc(100% - 40px); right: 20px; top: 70px; }
    .stats { width: calc(100% - 40px); bottom: 10px; }
    .title { font-size: 16px; top: 70px; }
  }
</style>
</head>
<body>

<a href="../index.html" class="organic-back-link">
  <span class="back-arrow">&larr;</span>
  <span class="back-text">Gallery</span>
</a>

<div class="title">Rumor Spreading on Network</div>

<canvas id="net"></canvas>

<div class="panel">
  <h2>Network &amp; Rumor</h2>

  <div class="toggle" id="type-toggle">
    <button data-type="sw" class="active">Small-World</button>
    <button data-type="ba">Scale-Free</button>
  </div>

  <div class="row">
    <label>N nodes</label>
    <input type="range" id="n-slider" min="80" max="400" value="240" step="10">
    <span class="val" id="n-val">240</span>
  </div>

  <div class="row" id="k-row">
    <label>Degree k</label>
    <input type="range" id="k-slider" min="2" max="10" value="6" step="2">
    <span class="val" id="k-val">6</span>
  </div>

  <div class="row" id="p-row">
    <label>Rewire p</label>
    <input type="range" id="p-slider" min="0" max="1" value="0.12" step="0.01">
    <span class="val" id="p-val">0.12</span>
  </div>

  <div class="row" id="m-row" style="display:none;">
    <label>Attach m</label>
    <input type="range" id="m-slider" min="1" max="5" value="2" step="1">
    <span class="val" id="m-val">2</span>
  </div>

  <div class="row">
    <label>Speed</label>
    <input type="range" id="spd-slider" min="1" max="12" value="4" step="1">
    <span class="val" id="spd-val">4</span>
  </div>

  <button class="btn" id="reset-btn">Reset &amp; Reseed</button>
</div>

<div class="stats">
  <h2>Daley-Kendall Dynamics</h2>

  <div class="stat-row">
    <span class="dot ignorant"></span>
    <span class="stat-label">Ignorant</span>
    <div class="bar"><div class="bar-fill" id="bar-i" style="background:var(--cream);width:100%"></div></div>
    <span class="stat-val" id="pct-i">100%</span>
  </div>
  <div class="stat-row">
    <span class="dot spreader"></span>
    <span class="stat-label">Spreader</span>
    <div class="bar"><div class="bar-fill" id="bar-s" style="background:var(--terracotta);width:0%"></div></div>
    <span class="stat-val" id="pct-s">0%</span>
  </div>
  <div class="stat-row">
    <span class="dot stifler"></span>
    <span class="stat-label">Stifler</span>
    <div class="bar"><div class="bar-fill" id="bar-r" style="background:var(--sage);width:0%"></div></div>
    <span class="stat-val" id="pct-r">0%</span>
  </div>

  <canvas id="timeseries"></canvas>

  <div class="coverage">
    <strong>Coverage:</strong> <span id="coverage">0%</span> reached &nbsp;|&nbsp;
    <strong>Step:</strong> <span id="step">0</span>
    <div style="margin-top:6px;">Spreader+Ignorant &rarr; 2 Spreaders. Spreader+{Spreader,Stifler} &rarr; Spreader becomes Stifler.</div>
  </div>
</div>

<script>
(function(){
  'use strict';

  const canvas = document.getElementById('net');
  const ctx = canvas.getContext('2d');
  const tsCanvas = document.getElementById('timeseries');
  const tsCtx = tsCanvas.getContext('2d');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    const tsRect = tsCanvas.getBoundingClientRect();
    tsCanvas.width = Math.max(1, tsRect.width * DPR);
    tsCanvas.height = Math.max(1, tsRect.height * DPR);
    tsCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // Daley-Kendall states
  const IGNORANT = 0, SPREADER = 1, STIFLER = 2;

  // Config
  const cfg = {
    type: 'sw',  // 'sw' or 'ba'
    N: 240,
    k: 6,
    p: 0.12,
    m: 2,
    speed: 4
  };

  // Network state
  let nodes = [];   // {x,y,vx,vy,state,age,pulse,deg}
  let edges = [];   // {a,b,glow}
  let adj = [];     // adjacency list: adj[i] = [j, ...]
  let stepCount = 0;
  let history = []; // [[i,s,r], ...]

  function randRange(a, b) { return a + Math.random() * (b - a); }

  function buildSmallWorld(N, k, p) {
    // Watts-Strogatz
    k = Math.max(2, Math.min(k, N - 2));
    if (k % 2 === 1) k++;
    const half = k / 2;
    const es = new Set();
    function key(a, b) { return a < b ? a + '_' + b : b + '_' + a; }

    // Ring lattice
    for (let i = 0; i < N; i++) {
      for (let j = 1; j <= half; j++) {
        const nb = (i + j) % N;
        es.add(key(i, nb));
      }
    }
    // Rewire
    const current = Array.from(es);
    es.clear();
    for (const e of current) {
      const [aStr, bStr] = e.split('_');
      let a = +aStr, b = +bStr;
      if (Math.random() < p) {
        let nb;
        let tries = 0;
        do {
          nb = Math.floor(Math.random() * N);
          tries++;
        } while ((nb === a || es.has(key(a, nb))) && tries < 40);
        if (tries < 40) {
          es.add(key(a, nb));
          continue;
        }
      }
      es.add(key(a, b));
    }
    return Array.from(es).map(s => {
      const [a, b] = s.split('_').map(Number);
      return [a, b];
    });
  }

  function buildBA(N, m) {
    // Barabasi-Albert preferential attachment
    m = Math.max(1, Math.min(m, 5));
    const deg = new Array(N).fill(0);
    const edgeList = [];
    // seed: complete graph of m+1 nodes
    const seed = m + 1;
    for (let i = 0; i < seed; i++) {
      for (let j = i + 1; j < seed; j++) {
        edgeList.push([i, j]);
        deg[i]++;
        deg[j]++;
      }
    }
    // attach remaining
    for (let i = seed; i < N; i++) {
      const chosen = new Set();
      let totalDeg = 0;
      for (let j = 0; j < i; j++) totalDeg += deg[j];
      let safety = 0;
      while (chosen.size < m && safety < 200) {
        let r = Math.random() * totalDeg;
        let pick = 0;
        for (let j = 0; j < i; j++) {
          r -= deg[j];
          if (r <= 0) { pick = j; break; }
        }
        if (!chosen.has(pick)) chosen.add(pick);
        safety++;
      }
      for (const t of chosen) {
        edgeList.push([i, t]);
        deg[i]++;
        deg[t]++;
      }
    }
    return edgeList;
  }

  function buildNetwork() {
    const N = cfg.N;
    const edgeList = cfg.type === 'sw'
      ? buildSmallWorld(N, cfg.k, cfg.p)
      : buildBA(N, cfg.m);

    // Initial positions: circle + jitter
    nodes = [];
    const cx = W * 0.5 - 160; // shift left to account for right panel
    const cy = H * 0.5;
    const R = Math.min(W, H) * 0.32;
    for (let i = 0; i < N; i++) {
      const ang = (i / N) * Math.PI * 2 + Math.random() * 0.4;
      const r = R * (0.7 + Math.random() * 0.3);
      nodes.push({
        x: cx + Math.cos(ang) * r + randRange(-8, 8),
        y: cy + Math.sin(ang) * r + randRange(-8, 8),
        vx: 0, vy: 0,
        state: IGNORANT,
        pulse: 0,
        deg: 0,
        fx: 0, fy: 0
      });
    }

    edges = edgeList.map(([a, b]) => ({ a, b, glow: 0 }));
    adj = Array.from({ length: N }, () => []);
    for (const e of edges) {
      adj[e.a].push(e.b);
      adj[e.b].push(e.a);
      nodes[e.a].deg++;
      nodes[e.b].deg++;
    }

    // Seed one spreader — pick a high-degree node for scale-free, random otherwise
    let seedIdx = 0;
    if (cfg.type === 'ba') {
      let best = -1;
      for (let i = 0; i < N; i++) if (nodes[i].deg > best) { best = nodes[i].deg; seedIdx = i; }
    } else {
      seedIdx = Math.floor(Math.random() * N);
    }
    nodes[seedIdx].state = SPREADER;
    nodes[seedIdx].pulse = 1;

    stepCount = 0;
    history = [];
    relaxIterations = 320; // front-load layout
  }

  // Force-directed layout (simple spring-mass)
  let relaxIterations = 0;
  function relaxLayout(steps) {
    const N = nodes.length;
    const repulse = 1200;
    const springLen = 60;
    const springK = 0.04;
    const damping = 0.78;
    const center = { x: W * 0.5 - 160, y: H * 0.5 };
    const centerPull = 0.0018;

    for (let s = 0; s < steps; s++) {
      for (let i = 0; i < N; i++) {
        nodes[i].fx = 0;
        nodes[i].fy = 0;
      }
      // Repulsion (N^2) — capped via random-subset for large N
      const sample = N <= 250 ? null : 80;
      for (let i = 0; i < N; i++) {
        if (sample) {
          for (let s2 = 0; s2 < sample; s2++) {
            const j = Math.floor(Math.random() * N);
            if (j === i) continue;
            applyRepulse(i, j, repulse);
          }
        } else {
          for (let j = i + 1; j < N; j++) {
            applyRepulse(i, j, repulse);
          }
        }
      }
      // Springs
      for (const e of edges) {
        const a = nodes[e.a], b = nodes[e.b];
        let dx = b.x - a.x, dy = b.y - a.y;
        let d = Math.sqrt(dx * dx + dy * dy) || 0.001;
        const f = (d - springLen) * springK;
        const fx = (dx / d) * f;
        const fy = (dy / d) * f;
        a.fx += fx; a.fy += fy;
        b.fx -= fx; b.fy -= fy;
      }
      // Integrate + center gravity
      for (let i = 0; i < N; i++) {
        const n = nodes[i];
        n.fx += (center.x - n.x) * centerPull;
        n.fy += (center.y - n.y) * centerPull;
        n.vx = (n.vx + n.fx) * damping;
        n.vy = (n.vy + n.fy) * damping;
        // Clamp velocity
        const vm = Math.sqrt(n.vx * n.vx + n.vy * n.vy);
        if (vm > 12) { n.vx = n.vx / vm * 12; n.vy = n.vy / vm * 12; }
        n.x += n.vx;
        n.y += n.vy;
        // Keep inside bounds
        n.x = Math.max(30, Math.min(W - 320, n.x));
        n.y = Math.max(30, Math.min(H - 30, n.y));
      }
    }
  }
  function applyRepulse(i, j, repulse) {
    const a = nodes[i], b = nodes[j];
    let dx = a.x - b.x, dy = a.y - b.y;
    let d2 = dx * dx + dy * dy + 0.01;
    if (d2 > 40000) return;
    const d = Math.sqrt(d2);
    const f = repulse / d2;
    const fx = (dx / d) * f;
    const fy = (dy / d) * f;
    a.fx += fx; a.fy += fy;
    b.fx -= fx; b.fy -= fy;
  }

  // Daley-Kendall step: iterate pair interactions
  function rumorStep() {
    // For each spreader, pick a random neighbor and interact
    const N = nodes.length;
    const spreaders = [];
    for (let i = 0; i < N; i++) if (nodes[i].state === SPREADER) spreaders.push(i);

    // Shuffle order
    for (let i = spreaders.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [spreaders[i], spreaders[j]] = [spreaders[j], spreaders[i]];
    }

    for (const i of spreaders) {
      if (nodes[i].state !== SPREADER) continue; // may have changed mid-step
      const nbrs = adj[i];
      if (!nbrs.length) continue;
      const nb = nbrs[Math.floor(Math.random() * nbrs.length)];
      const edgeGlow = findEdge(i, nb);
      if (edgeGlow) edgeGlow.glow = 1;

      const other = nodes[nb];
      if (other.state === IGNORANT) {
        other.state = SPREADER;
        other.pulse = 1;
      } else {
        // SPREADER or STIFLER — the spreader becomes a stifler
        nodes[i].state = STIFLER;
      }
    }

    stepCount++;
  }

  const edgeMap = new Map();
  function rebuildEdgeMap() {
    edgeMap.clear();
    for (const e of edges) {
      const k1 = e.a + '_' + e.b;
      const k2 = e.b + '_' + e.a;
      edgeMap.set(k1, e);
      edgeMap.set(k2, e);
    }
  }
  function findEdge(a, b) { return edgeMap.get(a + '_' + b); }

  // Rendering
  function drawFrame() {
    ctx.fillStyle = 'rgba(10, 10, 15, 0.85)';
    ctx.fillRect(0, 0, W, H);

    // Edges
    ctx.lineCap = 'round';
    for (const e of edges) {
      const a = nodes[e.a], b = nodes[e.b];
      if (e.glow > 0.02) {
        ctx.strokeStyle = 'rgba(221, 161, 94,' + (e.glow * 0.9) + ')';
        ctx.lineWidth = 1.2 + e.glow * 1.6;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        e.glow *= 0.85;
      } else {
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    // Node halos for spreaders
    for (const n of nodes) {
      if (n.state === SPREADER && n.pulse > 0.01) {
        const rad = 6 + n.pulse * 18;
        const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, rad);
        grad.addColorStop(0, 'rgba(188, 108, 37, ' + (0.35 * n.pulse) + ')');
        grad.addColorStop(1, 'rgba(188, 108, 37, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(n.x, n.y, rad, 0, Math.PI * 2);
        ctx.fill();
        n.pulse *= 0.94;
      }
    }

    // Nodes
    for (const n of nodes) {
      let color, r;
      if (n.state === IGNORANT) { color = '#FEFAE0'; r = 3; }
      else if (n.state === SPREADER) { color = '#BC6C25'; r = 4; }
      else { color = '#8A9A5B'; r = 3.2; }
      // Size by degree
      r += Math.min(3, n.deg * 0.12);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fill();
      if (n.state === SPREADER) {
        ctx.strokeStyle = 'rgba(254, 250, 224, 0.6)';
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }
  }

  // Stats / history
  function updateStats() {
    let i = 0, s = 0, r = 0;
    const N = nodes.length;
    for (const n of nodes) {
      if (n.state === IGNORANT) i++;
      else if (n.state === SPREADER) s++;
      else r++;
    }
    const pi = i / N, ps = s / N, pr = r / N;
    document.getElementById('pct-i').textContent = Math.round(pi * 100) + '%';
    document.getElementById('pct-s').textContent = Math.round(ps * 100) + '%';
    document.getElementById('pct-r').textContent = Math.round(pr * 100) + '%';
    document.getElementById('bar-i').style.width = (pi * 100) + '%';
    document.getElementById('bar-s').style.width = (ps * 100) + '%';
    document.getElementById('bar-r').style.width = (pr * 100) + '%';
    document.getElementById('coverage').textContent = Math.round((ps + pr) * 100) + '%';
    document.getElementById('step').textContent = stepCount;

    history.push([pi, ps, pr]);
    if (history.length > 400) history.shift();
    drawTimeseries();
  }

  function drawTimeseries() {
    const w = tsCanvas.width / DPR;
    const h = tsCanvas.height / DPR;
    tsCtx.fillStyle = 'rgba(0, 0, 0, 0.35)';
    tsCtx.fillRect(0, 0, w, h);

    if (history.length < 2) return;

    // Draw stacked area: stifler bottom, spreader middle, ignorant top
    function drawBand(accessor, color) {
      tsCtx.fillStyle = color;
      tsCtx.beginPath();
      tsCtx.moveTo(0, h);
      for (let k = 0; k < history.length; k++) {
        const x = (k / (history.length - 1 || 1)) * w;
        const y = h - accessor(history[k]) * h;
        tsCtx.lineTo(x, y);
      }
      tsCtx.lineTo(w, h);
      tsCtx.closePath();
      tsCtx.fill();
    }
    drawBand(h => h[0] + h[1] + h[2], 'rgba(254, 250, 224, 0.85)'); // all
    drawBand(h => h[1] + h[2], 'rgba(188, 108, 37, 0.9)');          // spreader+stifler
    drawBand(h => h[2], 'rgba(138, 154, 91, 0.92)');                // stifler
  }

  // Main loop
  let rumorAccum = 0;
  function loop() {
    if (relaxIterations > 0) {
      const burst = Math.min(relaxIterations, 6);
      relaxLayout(burst);
      relaxIterations -= burst;
    } else {
      relaxLayout(1);
    }

    rumorAccum += cfg.speed;
    while (rumorAccum >= 10) {
      rumorStep();
      updateStats();
      rumorAccum -= 10;
    }

    drawFrame();
    requestAnimationFrame(loop);
  }

  // UI wiring
  const nSlider = document.getElementById('n-slider');
  const kSlider = document.getElementById('k-slider');
  const pSlider = document.getElementById('p-slider');
  const mSlider = document.getElementById('m-slider');
  const spdSlider = document.getElementById('spd-slider');
  const resetBtn = document.getElementById('reset-btn');

  function bindSlider(el, labelEl, key, parse) {
    el.addEventListener('input', () => {
      const v = parse(el.value);
      cfg[key] = v;
      labelEl.textContent = el.value;
    });
    el.addEventListener('change', () => {
      rebuildAll();
    });
  }
  bindSlider(nSlider, document.getElementById('n-val'), 'N', v => +v);
  bindSlider(kSlider, document.getElementById('k-val'), 'k', v => +v);
  bindSlider(pSlider, document.getElementById('p-val'), 'p', v => +v);
  bindSlider(mSlider, document.getElementById('m-val'), 'm', v => +v);
  spdSlider.addEventListener('input', () => {
    cfg.speed = +spdSlider.value;
    document.getElementById('spd-val').textContent = spdSlider.value;
  });

  const typeToggle = document.getElementById('type-toggle');
  typeToggle.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      typeToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      cfg.type = btn.dataset.type;
      document.getElementById('k-row').style.display = cfg.type === 'sw' ? '' : 'none';
      document.getElementById('p-row').style.display = cfg.type === 'sw' ? '' : 'none';
      document.getElementById('m-row').style.display = cfg.type === 'ba' ? '' : 'none';
      rebuildAll();
    });
  });

  resetBtn.addEventListener('click', rebuildAll);

  function rebuildAll() {
    buildNetwork();
    rebuildEdgeMap();
    updateStats();
  }

  rebuildAll();
  loop();
})();
</script>
</body>
</html>
