<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firefly Synchronization — Complex Adaptive Systems</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        color: #FEFAE0;
    }

    canvas {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }

    .organic-back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(138, 154, 91, 0.2);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(138, 154, 91, 0.4);
        border-radius: 20px;
        color: #FEFAE0;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        z-index: 100;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .organic-back-link:hover {
        background: rgba(138, 154, 91, 0.35);
        transform: translateX(-3px);
    }

    .back-arrow { font-size: 16px; }

    .title-card {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 14px 22px;
        background: rgba(10, 10, 15, 0.55);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(221, 161, 94, 0.3);
        border-radius: 20px;
        z-index: 100;
        text-align: right;
    }

    .title-card h1 {
        font-family: 'Lora', Georgia, serif;
        font-size: 20px;
        font-weight: 600;
        color: #DDA15E;
        letter-spacing: 0.5px;
    }

    .title-card .subtitle {
        font-size: 11px;
        color: rgba(254, 250, 224, 0.65);
        margin-top: 2px;
        letter-spacing: 1.2px;
        text-transform: uppercase;
    }

    .controls {
        position: fixed;
        bottom: 20px;
        left: 20px;
        padding: 18px 22px;
        background: rgba(10, 10, 15, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(138, 154, 91, 0.3);
        border-radius: 20px;
        z-index: 100;
        min-width: 260px;
        max-width: 320px;
    }

    .controls h2 {
        font-family: 'Lora', Georgia, serif;
        font-size: 13px;
        font-weight: 600;
        color: #8A9A5B;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(138, 154, 91, 0.25);
    }

    .control-row {
        margin-bottom: 10px;
    }

    .control-row:last-child { margin-bottom: 0; }

    .control-label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: rgba(254, 250, 224, 0.85);
        margin-bottom: 4px;
    }

    .control-label .val {
        color: #DDA15E;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
        width: 100%;
        height: 4px;
        -webkit-appearance: none;
        appearance: none;
        background: rgba(138, 154, 91, 0.25);
        border-radius: 2px;
        outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        background: #DDA15E;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid #0a0a0f;
        box-shadow: 0 0 6px rgba(221, 161, 94, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        background: #DDA15E;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid #0a0a0f;
    }

    button {
        width: 100%;
        padding: 8px 14px;
        background: rgba(188, 108, 37, 0.3);
        border: 1px solid rgba(188, 108, 37, 0.5);
        color: #FEFAE0;
        font-family: inherit;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.25s;
        margin-top: 6px;
    }

    button:hover {
        background: rgba(188, 108, 37, 0.5);
        transform: translateY(-1px);
    }

    .stats {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 18px 22px;
        background: rgba(10, 10, 15, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(221, 161, 94, 0.3);
        border-radius: 20px;
        z-index: 100;
        min-width: 200px;
    }

    .stats h2 {
        font-family: 'Lora', Georgia, serif;
        font-size: 13px;
        font-weight: 600;
        color: #DDA15E;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 14px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(221, 161, 94, 0.25);
    }

    .dial-container {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        margin-bottom: 12px;
    }

    .dial-svg {
        width: 120px;
        height: 120px;
    }

    .dial-label {
        font-size: 11px;
        color: rgba(254, 250, 224, 0.7);
        letter-spacing: 1.2px;
        text-transform: uppercase;
        margin-top: 4px;
    }

    .dial-value {
        font-family: 'Lora', Georgia, serif;
        font-size: 28px;
        font-weight: 700;
        color: #DDA15E;
        font-variant-numeric: tabular-nums;
    }

    .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: rgba(254, 250, 224, 0.85);
        padding: 4px 0;
    }

    .stat-row .sval {
        color: #8A9A5B;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
    }

    @media (max-width: 720px) {
        .controls, .stats {
            min-width: unset;
            max-width: calc(100vw - 40px);
            font-size: 11px;
        }
        .title-card { padding: 10px 14px; }
        .title-card h1 { font-size: 16px; }
    }
</style>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<a href="../index.html" class="organic-back-link">
    <span class="back-arrow">←</span>
    <span class="back-text">Gallery</span>
</a>

<div class="title-card">
    <h1>Firefly Synchronization</h1>
    <div class="subtitle">Kuramoto · Mirollo–Strogatz</div>
</div>

<canvas id="canvas"></canvas>

<div class="controls">
    <h2>Parameters</h2>
    <div class="control-row">
        <div class="control-label">
            <span>Fireflies</span>
            <span class="val" id="countVal">350</span>
        </div>
        <input type="range" id="countInput" min="100" max="500" step="10" value="350">
    </div>
    <div class="control-row">
        <div class="control-label">
            <span>Coupling ε</span>
            <span class="val" id="couplingVal">0.12</span>
        </div>
        <input type="range" id="couplingInput" min="0" max="0.5" step="0.005" value="0.12">
    </div>
    <div class="control-row">
        <div class="control-label">
            <span>Flash radius</span>
            <span class="val" id="radiusVal">85</span>
        </div>
        <input type="range" id="radiusInput" min="20" max="200" step="5" value="85">
    </div>
    <div class="control-row">
        <div class="control-label">
            <span>Period noise</span>
            <span class="val" id="noiseVal">0.18</span>
        </div>
        <input type="range" id="noiseInput" min="0" max="0.5" step="0.01" value="0.18">
    </div>
    <button id="resetBtn">Reset (Randomize Phases)</button>
</div>

<div class="stats">
    <h2>Order Parameter</h2>
    <div class="dial-container">
        <svg class="dial-svg" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="48" fill="none" stroke="rgba(138,154,91,0.15)" stroke-width="8"/>
            <circle id="dialArc" cx="60" cy="60" r="48" fill="none" stroke="#DDA15E" stroke-width="8"
                stroke-linecap="round" stroke-dasharray="301.6" stroke-dashoffset="301.6"
                transform="rotate(-90 60 60)"/>
            <text id="dialText" x="60" y="58" text-anchor="middle" dominant-baseline="middle"
                font-family="Lora, Georgia, serif" font-size="22" font-weight="700" fill="#DDA15E">0.00</text>
            <text x="60" y="78" text-anchor="middle" dominant-baseline="middle"
                font-family="Nunito, sans-serif" font-size="9" fill="rgba(254,250,224,0.6)"
                letter-spacing="1">R = |⟨e^iθ⟩|</text>
        </svg>
    </div>
    <div class="stat-row"><span>Flashing now</span><span class="sval" id="flashCount">0</span></div>
    <div class="stat-row"><span>Mean phase</span><span class="sval" id="meanPhase">0.00</span></div>
    <div class="stat-row"><span>Time</span><span class="sval" id="timeVal">0.0s</span></div>
</div>

<script>
(function() {
    'use strict';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let W = 0, H = 0, DPR = window.devicePixelRatio || 1;

    const params = {
        count: 350,
        coupling: 0.12,
        flashRadius: 85,
        noise: 0.18
    };

    const TWO_PI = Math.PI * 2;
    const BASE_PERIOD = 2.4; // seconds
    const FLASH_THRESHOLD = 0.92; // phase fraction >= threshold = flashing
    let fireflies = [];
    let startTime = performance.now();

    // Spatial hash for neighbor queries
    let cellSize = params.flashRadius;
    let grid = new Map();

    function resize() {
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * DPR;
        canvas.height = H * DPR;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    function makeFirefly() {
        const noiseScale = 1 + (Math.random() - 0.5) * 2 * params.noise;
        return {
            x: Math.random() * W,
            y: Math.random() * H,
            phase: Math.random(), // 0..1 fraction of period
            period: BASE_PERIOD * noiseScale,
            justFlashed: false,
            flashIntensity: 0
        };
    }

    function initFireflies() {
        fireflies = [];
        for (let i = 0; i < params.count; i++) {
            fireflies.push(makeFirefly());
        }
        startTime = performance.now();
    }
    initFireflies();

    function updateCounts() {
        const target = params.count;
        if (fireflies.length < target) {
            while (fireflies.length < target) fireflies.push(makeFirefly());
        } else if (fireflies.length > target) {
            fireflies.length = target;
        }
    }

    function rebuildGrid() {
        grid.clear();
        cellSize = Math.max(40, params.flashRadius);
        for (let i = 0; i < fireflies.length; i++) {
            const f = fireflies[i];
            const cx = Math.floor(f.x / cellSize);
            const cy = Math.floor(f.y / cellSize);
            const key = cx + ',' + cy;
            let bucket = grid.get(key);
            if (!bucket) { bucket = []; grid.set(key, bucket); }
            bucket.push(i);
        }
    }

    function neighborsOf(fx, fy) {
        const cx = Math.floor(fx / cellSize);
        const cy = Math.floor(fy / cellSize);
        const result = [];
        for (let dx = -1; dx <= 1; dx++) {
            for (let dy = -1; dy <= 1; dy++) {
                const bucket = grid.get((cx + dx) + ',' + (cy + dy));
                if (bucket) for (let k = 0; k < bucket.length; k++) result.push(bucket[k]);
            }
        }
        return result;
    }

    let lastTime = performance.now();

    function step(now) {
        const dt = Math.min(0.05, (now - lastTime) / 1000);
        lastTime = now;

        // 1. advance phases
        for (let i = 0; i < fireflies.length; i++) {
            const f = fireflies[i];
            f.justFlashed = false;
            const prevPhase = f.phase;
            f.phase += dt / f.period;
            if (f.phase >= 1) {
                f.phase -= 1;
                f.justFlashed = true;
                f.flashIntensity = 1;
            }
            // compute brightness based on distance from peak (at phase ~ 0)
            const peakDist = Math.min(f.phase, 1 - f.phase); // 0 at flash, 0.5 far
            f.flashIntensity = Math.max(0, 1 - peakDist * 8);
            // decay older flash intensity
            if (f.flashIntensity < 0.02) f.flashIntensity = 0;
        }

        // 2. apply coupling: for each firefly that just flashed, nudge neighbors
        rebuildGrid();
        const r2 = params.flashRadius * params.flashRadius;
        const eps = params.coupling;

        for (let i = 0; i < fireflies.length; i++) {
            const fi = fireflies[i];
            if (!fi.justFlashed) continue;
            const neighbors = neighborsOf(fi.x, fi.y);
            for (let n = 0; n < neighbors.length; n++) {
                const j = neighbors[n];
                if (j === i) continue;
                const fj = fireflies[j];
                const dxp = fj.x - fi.x;
                const dyp = fj.y - fi.y;
                const d2 = dxp * dxp + dyp * dyp;
                if (d2 > r2) continue;
                // Mirollo-Strogatz pulse-coupling: advance phase by eps (scaled by distance)
                const falloff = 1 - Math.sqrt(d2) / params.flashRadius;
                let newPhase = fj.phase + eps * falloff;
                if (newPhase >= 1) newPhase = 0.995; // snap to near-threshold, caller flashes next frame
                fj.phase = newPhase;
            }
        }
    }

    function computeOrderParameter() {
        let sumX = 0, sumY = 0, flashing = 0;
        const n = fireflies.length;
        for (let i = 0; i < n; i++) {
            const theta = fireflies[i].phase * TWO_PI;
            sumX += Math.cos(theta);
            sumY += Math.sin(theta);
            if (fireflies[i].flashIntensity > 0.5) flashing++;
        }
        const R = Math.sqrt(sumX * sumX + sumY * sumY) / n;
        const meanTheta = Math.atan2(sumY, sumX);
        return { R, meanTheta, flashing };
    }

    function draw() {
        // dark trail / clear
        ctx.fillStyle = 'rgba(10, 10, 15, 1)';
        ctx.fillRect(0, 0, W, H);

        // Use additive blending for halos
        ctx.globalCompositeOperation = 'lighter';

        for (let i = 0; i < fireflies.length; i++) {
            const f = fireflies[i];
            const intensity = f.flashIntensity;
            if (intensity <= 0.005) {
                // dim body
                ctx.globalAlpha = 0.25;
                ctx.fillStyle = 'rgba(120, 100, 60, 1)';
                ctx.beginPath();
                ctx.arc(f.x, f.y, 1.1, 0, TWO_PI);
                ctx.fill();
                continue;
            }

            const haloR = 22 * intensity + 4;
            const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, haloR);
            // warm yellow-earth glow
            const a1 = 0.95 * intensity;
            const a2 = 0.35 * intensity;
            grad.addColorStop(0, 'rgba(255, 235, 170, ' + a1 + ')');
            grad.addColorStop(0.35, 'rgba(245, 200, 110, ' + (a2) + ')');
            grad.addColorStop(0.75, 'rgba(221, 161, 94, ' + (0.12 * intensity) + ')');
            grad.addColorStop(1, 'rgba(188, 108, 37, 0)');
            ctx.globalAlpha = 1;
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(f.x, f.y, haloR, 0, TWO_PI);
            ctx.fill();

            // bright core
            ctx.globalAlpha = intensity;
            ctx.fillStyle = 'rgba(255, 250, 220, 1)';
            ctx.beginPath();
            ctx.arc(f.x, f.y, 1.8 + intensity * 1.4, 0, TWO_PI);
            ctx.fill();
        }
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
    }

    // UI wiring
    const countInput = document.getElementById('countInput');
    const couplingInput = document.getElementById('couplingInput');
    const radiusInput = document.getElementById('radiusInput');
    const noiseInput = document.getElementById('noiseInput');
    const countVal = document.getElementById('countVal');
    const couplingVal = document.getElementById('couplingVal');
    const radiusVal = document.getElementById('radiusVal');
    const noiseVal = document.getElementById('noiseVal');
    const resetBtn = document.getElementById('resetBtn');

    countInput.addEventListener('input', () => {
        params.count = parseInt(countInput.value, 10);
        countVal.textContent = params.count;
        updateCounts();
    });
    couplingInput.addEventListener('input', () => {
        params.coupling = parseFloat(couplingInput.value);
        couplingVal.textContent = params.coupling.toFixed(3);
    });
    radiusInput.addEventListener('input', () => {
        params.flashRadius = parseFloat(radiusInput.value);
        radiusVal.textContent = Math.round(params.flashRadius);
    });
    noiseInput.addEventListener('input', () => {
        params.noise = parseFloat(noiseInput.value);
        noiseVal.textContent = params.noise.toFixed(2);
        // update periods without resetting phases
        for (let i = 0; i < fireflies.length; i++) {
            const scale = 1 + (Math.random() - 0.5) * 2 * params.noise;
            fireflies[i].period = BASE_PERIOD * scale;
        }
    });
    resetBtn.addEventListener('click', () => {
        initFireflies();
    });

    const dialArc = document.getElementById('dialArc');
    const dialText = document.getElementById('dialText');
    const flashCountEl = document.getElementById('flashCount');
    const meanPhaseEl = document.getElementById('meanPhase');
    const timeVal = document.getElementById('timeVal');
    const DIAL_CIRC = 2 * Math.PI * 48;

    let statsTimer = 0;
    let smoothR = 0;

    function frame(now) {
        step(now);
        draw();

        const { R, meanTheta, flashing } = computeOrderParameter();
        smoothR = smoothR * 0.85 + R * 0.15;

        // update dial
        const offset = DIAL_CIRC * (1 - smoothR);
        dialArc.setAttribute('stroke-dashoffset', offset);
        dialText.textContent = smoothR.toFixed(2);

        // color-shift arc based on sync level
        if (smoothR > 0.8) dialArc.setAttribute('stroke', '#F5C86E');
        else if (smoothR > 0.5) dialArc.setAttribute('stroke', '#DDA15E');
        else dialArc.setAttribute('stroke', '#BC6C25');

        statsTimer += 1;
        if (statsTimer >= 6) {
            statsTimer = 0;
            flashCountEl.textContent = flashing;
            meanPhaseEl.textContent = ((meanTheta + Math.PI) / TWO_PI).toFixed(2);
            timeVal.textContent = ((now - startTime) / 1000).toFixed(1) + 's';
        }

        requestAnimationFrame(frame);
    }
    requestAnimationFrame((t) => { lastTime = t; frame(t); });
})();
</script>

</body>
</html>
