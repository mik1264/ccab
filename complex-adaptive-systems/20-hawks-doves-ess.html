<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hawks & Doves — Complex Adaptive Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --sage: #8A9A5B;
        --moss: #606C38;
        --earth: #DDA15E;
        --cream: #FEFAE0;
        --terracotta: #BC6C25;
        --dark-moss: #3d4423;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Nunito', sans-serif;
        background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
        color: var(--dark-moss);
    }

    #canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
    }

    .organic-back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(138, 154, 91, 0.3);
        border-radius: 30px 20px 30px 20px;
        color: var(--moss);
        text-decoration: none;
        font-family: 'Lora', serif;
        font-weight: 500;
        font-size: 14px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 12px rgba(96, 108, 56, 0.08);
    }

    .organic-back-link:hover {
        background: rgba(255, 255, 255, 0.85);
        transform: translateX(-3px);
        box-shadow: 0 6px 18px rgba(96, 108, 56, 0.15);
    }

    .back-arrow {
        font-size: 18px;
        transition: transform 0.3s ease;
    }

    .organic-back-link:hover .back-arrow {
        transform: translateX(-3px);
    }

    .title-panel {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 100;
        padding: 16px 24px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(138, 154, 91, 0.3);
        border-radius: 20px;
        box-shadow: 0 4px 12px rgba(96, 108, 56, 0.08);
        max-width: 320px;
    }

    .title-panel h1 {
        font-family: 'Lora', serif;
        font-weight: 600;
        color: var(--moss);
        font-size: 22px;
        margin-bottom: 4px;
    }

    .title-panel p {
        font-size: 12px;
        color: var(--dark-moss);
        opacity: 0.75;
        line-height: 1.4;
    }

    .controls {
        position: fixed;
        bottom: 20px;
        left: 20px;
        z-index: 100;
        padding: 18px 22px;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(138, 154, 91, 0.3);
        border-radius: 20px;
        box-shadow: 0 6px 18px rgba(96, 108, 56, 0.12);
        min-width: 280px;
    }

    .controls h3 {
        font-family: 'Lora', serif;
        font-weight: 600;
        color: var(--moss);
        font-size: 15px;
        margin-bottom: 12px;
        letter-spacing: 0.3px;
    }

    .control-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        gap: 12px;
    }

    .control-row label {
        font-size: 12.5px;
        color: var(--dark-moss);
        flex: 0 0 auto;
        font-weight: 500;
    }

    .control-row input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        background: rgba(138, 154, 91, 0.3);
        border-radius: 2px;
        outline: none;
        cursor: pointer;
    }

    .control-row input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        background: var(--moss);
        border-radius: 50%;
        cursor: pointer;
        transition: transform 0.2s;
    }

    .control-row input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
    }

    .control-row input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        background: var(--moss);
        border-radius: 50%;
        cursor: pointer;
        border: none;
    }

    .control-row .value {
        font-size: 12px;
        color: var(--terracotta);
        font-weight: 600;
        min-width: 38px;
        text-align: right;
        font-variant-numeric: tabular-nums;
    }

    .btn {
        padding: 8px 16px;
        background: var(--moss);
        color: var(--cream);
        border: none;
        border-radius: 14px;
        font-family: 'Nunito', sans-serif;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 6px;
        width: 100%;
    }

    .btn:hover {
        background: var(--dark-moss);
        transform: translateY(-1px);
        box-shadow: 0 4px 10px rgba(96, 108, 56, 0.25);
    }

    .stats-panel {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 100;
        padding: 18px 22px;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(138, 154, 91, 0.3);
        border-radius: 20px;
        box-shadow: 0 6px 18px rgba(96, 108, 56, 0.12);
        width: 360px;
    }

    .stats-panel h3 {
        font-family: 'Lora', serif;
        font-weight: 600;
        color: var(--moss);
        font-size: 15px;
        margin-bottom: 10px;
    }

    .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 12.5px;
        margin-bottom: 5px;
        color: var(--dark-moss);
    }

    .stat-row .val {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
    }

    .stat-row .hawk { color: var(--terracotta); }
    .stat-row .dove { color: var(--sage); }
    .stat-row .ess { color: var(--moss); }

    #plot {
        width: 100%;
        height: 110px;
        border-radius: 12px;
        background: rgba(254, 250, 224, 0.7);
        border: 1px solid rgba(138, 154, 91, 0.25);
        margin-top: 10px;
        display: block;
    }

    .legend {
        display: flex;
        gap: 12px;
        margin-top: 6px;
        font-size: 10.5px;
        color: var(--dark-moss);
        opacity: 0.85;
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .legend-swatch {
        width: 10px;
        height: 3px;
        border-radius: 2px;
    }

    @media (max-width: 860px) {
        .title-panel { max-width: 220px; padding: 10px 14px; }
        .title-panel h1 { font-size: 17px; }
        .title-panel p { font-size: 10px; }
        .controls { min-width: 240px; padding: 12px 14px; }
        .stats-panel { width: calc(100% - 40px); right: 20px; bottom: 260px; }
    }
</style>
</head>
<body>

<a href="../index.html" class="organic-back-link">
    <span class="back-arrow">&larr;</span>
    <span class="back-text">Gallery</span>
</a>

<div class="title-panel">
    <h1>Hawks &amp; Doves</h1>
    <p>Maynard Smith's ESS: when Hawks and Doves compete, the stable hawk fraction converges to V/C.</p>
</div>

<canvas id="canvas"></canvas>

<div class="controls">
    <h3>Parameters</h3>
    <div class="control-row">
        <label>V (resource value)</label>
        <input type="range" id="sliderV" min="1" max="20" value="10" step="0.5">
        <span class="value" id="valV">10.0</span>
    </div>
    <div class="control-row">
        <label>C (injury cost)</label>
        <input type="range" id="sliderC" min="2" max="40" value="20" step="0.5">
        <span class="value" id="valC">20.0</span>
    </div>
    <div class="control-row">
        <label>Mutation rate</label>
        <input type="range" id="sliderMut" min="0" max="0.2" value="0.02" step="0.005">
        <span class="value" id="valMut">0.020</span>
    </div>
    <div class="control-row">
        <label>Initial hawk %</label>
        <input type="range" id="sliderInit" min="0" max="100" value="50" step="5">
        <span class="value" id="valInit">50%</span>
    </div>
    <button class="btn" id="btnReset">Reset Population</button>
</div>

<div class="stats-panel">
    <h3>Population Dynamics</h3>
    <div class="stat-row"><span>Population size</span><span class="val" id="statPop">0</span></div>
    <div class="stat-row"><span class="hawk">Hawks (terracotta, sword)</span><span class="val hawk" id="statHawk">0%</span></div>
    <div class="stat-row"><span class="dove">Doves (sage, circle)</span><span class="val dove" id="statDove">0%</span></div>
    <div class="stat-row"><span class="ess">Predicted ESS (V/C)</span><span class="val ess" id="statESS">0%</span></div>
    <canvas id="plot"></canvas>
    <div class="legend">
        <div class="legend-item"><span class="legend-swatch" style="background: var(--terracotta);"></span>hawk fraction</div>
        <div class="legend-item"><span class="legend-swatch" style="background: var(--moss); opacity:0.5;"></span>ESS (V/C)</div>
    </div>
</div>

<script>
(function() {
    'use strict';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const plotCanvas = document.getElementById('plot');
    const pctx = plotCanvas.getContext('2d');

    let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * DPR;
        canvas.height = H * DPR;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

        const prect = plotCanvas.getBoundingClientRect();
        plotCanvas.width = prect.width * DPR;
        plotCanvas.height = prect.height * DPR;
        pctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Parameters ---
    const params = {
        V: 10,
        C: 20,
        mutation: 0.02,
        initHawk: 0.5
    };

    const sliderV = document.getElementById('sliderV');
    const sliderC = document.getElementById('sliderC');
    const sliderMut = document.getElementById('sliderMut');
    const sliderInit = document.getElementById('sliderInit');

    sliderV.addEventListener('input', () => {
        params.V = parseFloat(sliderV.value);
        document.getElementById('valV').textContent = params.V.toFixed(1);
    });
    sliderC.addEventListener('input', () => {
        params.C = parseFloat(sliderC.value);
        document.getElementById('valC').textContent = params.C.toFixed(1);
    });
    sliderMut.addEventListener('input', () => {
        params.mutation = parseFloat(sliderMut.value);
        document.getElementById('valMut').textContent = params.mutation.toFixed(3);
    });
    sliderInit.addEventListener('input', () => {
        params.initHawk = parseFloat(sliderInit.value) / 100;
        document.getElementById('valInit').textContent = sliderInit.value + '%';
    });

    // --- Agents ---
    const AGENT_RADIUS = 6;
    const INTERACTION_RADIUS = 14;
    const REPRODUCE_THRESHOLD = 30;
    const DEATH_THRESHOLD = -10;
    const INITIAL_ENERGY = 10;
    const BASE_METABOLISM = 0.004;
    const MAX_POP = 420;
    const TARGET_POP = 300;

    let agents = [];

    function spawnAgent(x, y, hawk) {
        return {
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 0.9,
            vy: (Math.random() - 0.5) * 0.9,
            hawk: hawk,
            energy: INITIAL_ENERGY + Math.random() * 5,
            cooldown: 0,
            jiggle: Math.random() * Math.PI * 2
        };
    }

    function resetPopulation() {
        agents = [];
        const n = 220;
        for (let i = 0; i < n; i++) {
            const x = Math.random() * W;
            const y = Math.random() * H;
            const hawk = Math.random() < params.initHawk;
            agents.push(spawnAgent(x, y, hawk));
        }
        history = [];
    }

    document.getElementById('btnReset').addEventListener('click', resetPopulation);

    // --- Interaction (Hawk-Dove payoffs) ---
    // Hawk vs Hawk: each gets (V - C) / 2
    // Hawk vs Dove: Hawk +V, Dove 0
    // Dove vs Dove: each gets V / 2
    function interact(a, b) {
        const V = params.V;
        const C = params.C;
        if (a.hawk && b.hawk) {
            const payoff = (V - C) / 2;
            a.energy += payoff;
            b.energy += payoff;
        } else if (a.hawk && !b.hawk) {
            a.energy += V;
            // dove yields immediately, tiny cost of retreat
            b.energy -= 0.1;
        } else if (!a.hawk && b.hawk) {
            b.energy += V;
            a.energy -= 0.1;
        } else {
            // dove-dove: share (with small display cost)
            a.energy += V / 2 - 0.5;
            b.energy += V / 2 - 0.5;
        }
        a.cooldown = 40;
        b.cooldown = 40;
        // bounce apart slightly
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const d = Math.hypot(dx, dy) || 1;
        const nx = dx / d, ny = dy / d;
        a.vx -= nx * 0.6;
        a.vy -= ny * 0.6;
        b.vx += nx * 0.6;
        b.vy += ny * 0.6;
    }

    // --- Spatial grid ---
    const CELL = 28;
    let grid = new Map();

    function gridKey(cx, cy) { return cx + ',' + cy; }

    function buildGrid() {
        grid.clear();
        for (let i = 0; i < agents.length; i++) {
            const a = agents[i];
            const cx = Math.floor(a.x / CELL);
            const cy = Math.floor(a.y / CELL);
            const k = gridKey(cx, cy);
            let list = grid.get(k);
            if (!list) { list = []; grid.set(k, list); }
            list.push(i);
        }
    }

    function findInteractions() {
        buildGrid();
        const pairsChecked = new Set();
        for (const [key, indices] of grid) {
            const [cx, cy] = key.split(',').map(Number);
            for (let dy = 0; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    if (dy === 0 && dx < 0) continue;
                    const nk = gridKey(cx + dx, cy + dy);
                    const other = grid.get(nk);
                    if (!other) continue;
                    for (const i of indices) {
                        for (const j of other) {
                            if (j <= i && dx === 0 && dy === 0) continue;
                            if (i === j) continue;
                            const a = agents[i];
                            const b = agents[j];
                            if (a.cooldown > 0 || b.cooldown > 0) continue;
                            const ddx = a.x - b.x;
                            const ddy = a.y - b.y;
                            const dist2 = ddx * ddx + ddy * ddy;
                            if (dist2 < INTERACTION_RADIUS * INTERACTION_RADIUS) {
                                interact(a, b);
                            }
                        }
                    }
                }
            }
        }
    }

    // --- Update loop ---
    let history = [];
    const MAX_HISTORY = 600;

    function step() {
        const n = agents.length;

        // density-dependent metabolism (crowded = harsher)
        const crowdFactor = 1 + Math.max(0, (n - TARGET_POP) / TARGET_POP) * 2;
        const metab = BASE_METABOLISM * crowdFactor;

        for (let i = 0; i < n; i++) {
            const a = agents[i];
            // random-walk steering
            a.jiggle += (Math.random() - 0.5) * 0.3;
            a.vx += Math.cos(a.jiggle) * 0.04;
            a.vy += Math.sin(a.jiggle) * 0.04;

            // damping + speed cap
            a.vx *= 0.96;
            a.vy *= 0.96;
            const sp = Math.hypot(a.vx, a.vy);
            if (sp > 1.6) {
                a.vx *= 1.6 / sp;
                a.vy *= 1.6 / sp;
            }

            a.x += a.vx;
            a.y += a.vy;

            // bounce off walls
            if (a.x < AGENT_RADIUS) { a.x = AGENT_RADIUS; a.vx = Math.abs(a.vx); }
            if (a.x > W - AGENT_RADIUS) { a.x = W - AGENT_RADIUS; a.vx = -Math.abs(a.vx); }
            if (a.y < AGENT_RADIUS) { a.y = AGENT_RADIUS; a.vy = Math.abs(a.vy); }
            if (a.y > H - AGENT_RADIUS) { a.y = H - AGENT_RADIUS; a.vy = -Math.abs(a.vy); }

            if (a.cooldown > 0) a.cooldown--;

            // slowly drain energy
            a.energy -= metab * 10;
        }

        findInteractions();

        // Reproduce + death
        const newborns = [];
        for (let i = agents.length - 1; i >= 0; i--) {
            const a = agents[i];
            if (a.energy < DEATH_THRESHOLD) {
                agents.splice(i, 1);
                continue;
            }
            if (a.energy > REPRODUCE_THRESHOLD && agents.length + newborns.length < MAX_POP) {
                a.energy *= 0.45;
                let hawk = a.hawk;
                if (Math.random() < params.mutation) hawk = !hawk;
                const child = spawnAgent(
                    a.x + (Math.random() - 0.5) * 10,
                    a.y + (Math.random() - 0.5) * 10,
                    hawk
                );
                child.energy = INITIAL_ENERGY;
                newborns.push(child);
            }
        }
        for (const c of newborns) agents.push(c);

        // Prevent total extinction: if population too small, spawn a few random agents
        if (agents.length < 30) {
            for (let k = 0; k < 10; k++) {
                agents.push(spawnAgent(
                    Math.random() * W,
                    Math.random() * H,
                    Math.random() < 0.5
                ));
            }
        }
    }

    // --- Rendering ---
    function render() {
        ctx.clearRect(0, 0, W, H);

        // soft textured overlay
        ctx.fillStyle = 'rgba(254, 250, 224, 0.12)';
        ctx.fillRect(0, 0, W, H);

        for (let i = 0; i < agents.length; i++) {
            const a = agents[i];
            if (a.hawk) {
                drawHawk(a);
            } else {
                drawDove(a);
            }
        }
    }

    function drawDove(a) {
        ctx.beginPath();
        ctx.arc(a.x, a.y, AGENT_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = '#8A9A5B';
        ctx.fill();
        ctx.lineWidth = 1.2;
        ctx.strokeStyle = 'rgba(61, 68, 35, 0.45)';
        ctx.stroke();
        // subtle highlight
        ctx.beginPath();
        ctx.arc(a.x - 1.6, a.y - 1.8, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
        ctx.fill();
    }

    function drawHawk(a) {
        // body: terracotta filled circle
        ctx.beginPath();
        ctx.arc(a.x, a.y, AGENT_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = '#BC6C25';
        ctx.fill();
        ctx.lineWidth = 1.2;
        ctx.strokeStyle = 'rgba(74, 39, 15, 0.6)';
        ctx.stroke();

        // sword icon: small triangle pointing outward
        const angle = Math.atan2(a.vy, a.vx);
        const sx = a.x + Math.cos(angle) * AGENT_RADIUS;
        const sy = a.y + Math.sin(angle) * AGENT_RADIUS;
        const bladeLen = 7;
        const tipX = sx + Math.cos(angle) * bladeLen;
        const tipY = sy + Math.sin(angle) * bladeLen;
        const perp = angle + Math.PI / 2;
        const wing = 2.3;
        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.lineTo(sx + Math.cos(perp) * wing, sy + Math.sin(perp) * wing);
        ctx.lineTo(sx - Math.cos(perp) * wing, sy - Math.sin(perp) * wing);
        ctx.closePath();
        ctx.fillStyle = '#F4E9C8';
        ctx.fill();
        ctx.lineWidth = 0.8;
        ctx.strokeStyle = 'rgba(61, 28, 10, 0.75)';
        ctx.stroke();

        // guard cross
        ctx.beginPath();
        ctx.moveTo(sx + Math.cos(perp) * 2.8, sy + Math.sin(perp) * 2.8);
        ctx.lineTo(sx - Math.cos(perp) * 2.8, sy - Math.sin(perp) * 2.8);
        ctx.lineWidth = 1.1;
        ctx.strokeStyle = 'rgba(61, 28, 10, 0.85)';
        ctx.stroke();
    }

    // --- Stats + plot ---
    function updateStats() {
        const n = agents.length;
        let hawks = 0;
        for (const a of agents) if (a.hawk) hawks++;
        const hawkFrac = n > 0 ? hawks / n : 0;
        const essFrac = Math.min(1, params.V / params.C);

        document.getElementById('statPop').textContent = n;
        document.getElementById('statHawk').textContent = (hawkFrac * 100).toFixed(1) + '%';
        document.getElementById('statDove').textContent = ((1 - hawkFrac) * 100).toFixed(1) + '%';
        document.getElementById('statESS').textContent = (essFrac * 100).toFixed(1) + '%';

        history.push({ h: hawkFrac, e: essFrac });
        if (history.length > MAX_HISTORY) history.shift();
    }

    function drawPlot() {
        const rect = plotCanvas.getBoundingClientRect();
        const pw = rect.width;
        const ph = rect.height;
        pctx.clearRect(0, 0, pw, ph);

        // gridlines at 0.25, 0.5, 0.75
        pctx.strokeStyle = 'rgba(138, 154, 91, 0.15)';
        pctx.lineWidth = 1;
        for (let g = 0; g <= 4; g++) {
            const y = (g / 4) * ph;
            pctx.beginPath();
            pctx.moveTo(0, y);
            pctx.lineTo(pw, y);
            pctx.stroke();
        }

        if (history.length < 2) return;
        const step = pw / (MAX_HISTORY - 1);

        // ESS line (dashed moss)
        pctx.strokeStyle = 'rgba(96, 108, 56, 0.55)';
        pctx.lineWidth = 1.4;
        pctx.setLineDash([4, 4]);
        pctx.beginPath();
        for (let i = 0; i < history.length; i++) {
            const x = i * step;
            const y = ph - history[i].e * ph;
            if (i === 0) pctx.moveTo(x, y);
            else pctx.lineTo(x, y);
        }
        pctx.stroke();
        pctx.setLineDash([]);

        // Hawk fraction line (terracotta)
        pctx.strokeStyle = '#BC6C25';
        pctx.lineWidth = 1.8;
        pctx.beginPath();
        for (let i = 0; i < history.length; i++) {
            const x = i * step;
            const y = ph - history[i].h * ph;
            if (i === 0) pctx.moveTo(x, y);
            else pctx.lineTo(x, y);
        }
        pctx.stroke();

        // axis labels
        pctx.fillStyle = 'rgba(61, 68, 35, 0.55)';
        pctx.font = '9px Nunito, sans-serif';
        pctx.fillText('1.0', 3, 10);
        pctx.fillText('0.5', 3, ph / 2 + 3);
        pctx.fillText('0.0', 3, ph - 3);
    }

    // --- Main loop ---
    resetPopulation();
    let frame = 0;

    function loop() {
        step();
        render();
        frame++;
        if (frame % 6 === 0) {
            updateStats();
            drawPlot();
        }
        requestAnimationFrame(loop);
    }

    loop();

    // Resize handling to re-scatter agents inside new bounds
    window.addEventListener('resize', () => {
        resize();
        for (const a of agents) {
            if (a.x > W) a.x = W - AGENT_RADIUS;
            if (a.y > H) a.y = H - AGENT_RADIUS;
        }
    });
})();
</script>

</body>
</html>
