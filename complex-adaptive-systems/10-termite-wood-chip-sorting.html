<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Termite Sorting — Complex Adaptive Systems</title>
<style>
  :root {
    --bg: #0a0a0f;
    --chip: #DDA15E;
    --termite: #BC6C25;
    --termite-carry: #E8853A;
    --sage: #8A9A5B;
    --moss: #606C38;
    --cream: #FEFAE0;
    --panel: rgba(20, 20, 28, 0.78);
    --border: rgba(221, 161, 94, 0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }
  .organic-back-link {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(254, 250, 224, 0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 30px 20px 30px 20px;
    color: var(--cream);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .organic-back-link:hover {
    background: rgba(221, 161, 94, 0.15);
    border-color: var(--chip);
    transform: translateX(-3px);
  }
  .back-arrow { font-size: 16px; }
  .title {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    padding: 10px 20px;
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 20px 30px 20px 30px;
    font-family: 'Lora', Georgia, serif;
    font-size: 16px;
    color: var(--chip);
    letter-spacing: 0.5px;
  }
  .panel {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 100;
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    min-width: 280px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  }
  .panel h3 {
    font-family: 'Lora', Georgia, serif;
    font-size: 14px;
    color: var(--chip);
    margin-bottom: 12px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .control { margin-bottom: 10px; }
  .control:last-child { margin-bottom: 0; }
  .control label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--cream);
    opacity: 0.85;
    margin-bottom: 4px;
  }
  .control label span:last-child { color: var(--chip); font-weight: 600; }
  .control input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: rgba(221, 161, 94, 0.25);
    border-radius: 2px;
    outline: none;
  }
  .control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--chip);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(221, 161, 94, 0.5);
  }
  .control input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    background: var(--chip);
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  button {
    width: 100%;
    padding: 8px 14px;
    margin-top: 6px;
    background: transparent;
    color: var(--chip);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
  }
  button:hover {
    background: rgba(221, 161, 94, 0.15);
    border-color: var(--chip);
  }
  .stats {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 100;
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    min-width: 200px;
  }
  .stats h3 {
    font-family: 'Lora', Georgia, serif;
    font-size: 14px;
    color: var(--chip);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 5px;
    color: var(--cream);
    opacity: 0.85;
  }
  .stat-row span:last-child {
    color: var(--sage);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  @media (max-width: 720px) {
    .panel, .stats { min-width: auto; width: calc(50vw - 30px); padding: 12px; }
    .panel h3, .stats h3 { font-size: 12px; }
    .title { font-size: 13px; padding: 8px 14px; }
  }
</style>
</head>
<body>
<a href="index.html" class="organic-back-link">
  <span class="back-arrow">&larr;</span>
  <span class="back-text">Gallery</span>
</a>
<div class="title">Termite Wood-Chip Sorting</div>

<canvas id="canvas"></canvas>

<div class="panel">
  <h3>Controls</h3>
  <div class="control">
    <label>Termites <span id="termiteVal">400</span></label>
    <input type="range" id="termiteSlider" min="50" max="1000" step="50" value="400">
  </div>
  <div class="control">
    <label>Chip Density <span id="chipVal">20%</span></label>
    <input type="range" id="chipSlider" min="5" max="40" step="1" value="20">
  </div>
  <div class="control">
    <label>Speed <span id="speedVal">3x</span></label>
    <input type="range" id="speedSlider" min="1" max="8" step="1" value="3">
  </div>
  <button id="resetBtn">Reset Simulation</button>
</div>

<div class="stats">
  <h3>Emergence</h3>
  <div class="stat-row"><span>Piles</span><span id="pileCount">—</span></div>
  <div class="stat-row"><span>Largest Pile</span><span id="largestPile">—</span></div>
  <div class="stat-row"><span>Total Chips</span><span id="totalChips">—</span></div>
  <div class="stat-row"><span>Carrying</span><span id="carrying">—</span></div>
  <div class="stat-row"><span>Ticks</span><span id="ticks">0</span></div>
</div>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const GW = 200;
  const GH = 150;

  let grid = new Uint8Array(GW * GH);
  let termites = [];
  let ticks = 0;

  let termiteCount = 400;
  let chipDensity = 0.20;
  let speedMult = 3;

  const termiteSlider = document.getElementById('termiteSlider');
  const chipSlider = document.getElementById('chipSlider');
  const speedSlider = document.getElementById('speedSlider');
  const termiteVal = document.getElementById('termiteVal');
  const chipVal = document.getElementById('chipVal');
  const speedVal = document.getElementById('speedVal');
  const resetBtn = document.getElementById('resetBtn');

  const pileCountEl = document.getElementById('pileCount');
  const largestPileEl = document.getElementById('largestPile');
  const totalChipsEl = document.getElementById('totalChips');
  const carryingEl = document.getElementById('carrying');
  const ticksEl = document.getElementById('ticks');

  let cellSize = 4;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cellSize = Math.max(1, Math.min(w / GW, h / GH));
  }
  window.addEventListener('resize', resize);
  resize();

  function idx(x, y) { return y * GW + x; }

  function init() {
    ticks = 0;
    grid = new Uint8Array(GW * GH);
    const target = Math.floor(GW * GH * chipDensity);
    let placed = 0;
    while (placed < target) {
      const i = Math.floor(Math.random() * GW * GH);
      if (grid[i] === 0) { grid[i] = 1; placed++; }
    }
    termites = [];
    for (let i = 0; i < termiteCount; i++) {
      termites.push({
        x: Math.floor(Math.random() * GW),
        y: Math.floor(Math.random() * GH),
        carrying: false,
      });
    }
  }

  function wrap(v, max) {
    if (v < 0) return v + max;
    if (v >= max) return v - max;
    return v;
  }

  function step() {
    for (let t = 0; t < termites.length; t++) {
      const termite = termites[t];

      // Random walk — 8-way neighborhood
      const dx = Math.floor(Math.random() * 3) - 1;
      const dy = Math.floor(Math.random() * 3) - 1;
      const nx = wrap(termite.x + dx, GW);
      const ny = wrap(termite.y + dy, GH);

      const cellIdx = idx(nx, ny);
      const hasChip = grid[cellIdx] === 1;

      if (!termite.carrying) {
        // Not carrying — if bump a chip, pick it up
        if (hasChip) {
          grid[cellIdx] = 0;
          termite.carrying = true;
        }
        termite.x = nx;
        termite.y = ny;
      } else {
        // Carrying — if bump a chip, try to drop in an adjacent empty cell
        if (hasChip) {
          // Look for an adjacent empty cell around (nx, ny) to drop
          let dropped = false;
          const tries = 8;
          for (let k = 0; k < tries; k++) {
            const ax = wrap(nx + Math.floor(Math.random() * 3) - 1, GW);
            const ay = wrap(ny + Math.floor(Math.random() * 3) - 1, GH);
            if (grid[idx(ax, ay)] === 0) {
              grid[idx(ax, ay)] = 1;
              termite.carrying = false;
              dropped = true;
              break;
            }
          }
          // If couldn't drop, just move
          if (!dropped) {
            termite.x = nx;
            termite.y = ny;
          } else {
            // After drop, move to an adjacent cell to wander away
            termite.x = wrap(termite.x + (Math.floor(Math.random() * 3) - 1), GW);
            termite.y = wrap(termite.y + (Math.floor(Math.random() * 3) - 1), GH);
          }
        } else {
          termite.x = nx;
          termite.y = ny;
        }
      }
    }
    ticks++;
  }

  // Flood-fill connected-component labeling for pile statistics
  function computePiles() {
    const labels = new Int32Array(GW * GH);
    const stack = [];
    let pileCount = 0;
    let largest = 0;
    let totalChips = 0;

    for (let y = 0; y < GH; y++) {
      for (let x = 0; x < GW; x++) {
        const i = idx(x, y);
        if (grid[i] === 1) totalChips++;
        if (grid[i] === 1 && labels[i] === 0) {
          pileCount++;
          let size = 0;
          stack.length = 0;
          stack.push(i);
          labels[i] = pileCount;
          while (stack.length) {
            const cur = stack.pop();
            const cx = cur % GW;
            const cy = (cur - cx) / GW;
            size++;
            for (let dy = -1; dy <= 1; dy++) {
              for (let dx = -1; dx <= 1; dx++) {
                if (dx === 0 && dy === 0) continue;
                const nx = wrap(cx + dx, GW);
                const ny = wrap(cy + dy, GH);
                const ni = idx(nx, ny);
                if (grid[ni] === 1 && labels[ni] === 0) {
                  labels[ni] = pileCount;
                  stack.push(ni);
                }
              }
            }
          }
          if (size > largest) largest = size;
        }
      }
    }
    // Treat single isolated chips as "loose" rather than piles — count only size >= 3
    // But first compute size-per-label
    const sizes = new Int32Array(pileCount + 1);
    for (let i = 0; i < GW * GH; i++) {
      if (labels[i] > 0) sizes[labels[i]]++;
    }
    let realPiles = 0;
    for (let i = 1; i <= pileCount; i++) {
      if (sizes[i] >= 3) realPiles++;
    }
    return { pileCount: realPiles, largest, totalChips };
  }

  function render() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, w, h);

    // Center grid
    const gridW = GW * cellSize;
    const gridH = GH * cellSize;
    const offX = (w - gridW) / 2;
    const offY = (h - gridH) / 2;

    // Chips
    ctx.fillStyle = '#DDA15E';
    for (let y = 0; y < GH; y++) {
      for (let x = 0; x < GW; x++) {
        if (grid[idx(x, y)] === 1) {
          ctx.fillRect(
            offX + x * cellSize,
            offY + y * cellSize,
            cellSize,
            cellSize
          );
        }
      }
    }

    // Termites
    const ts = Math.max(1, cellSize * 0.9);
    for (let i = 0; i < termites.length; i++) {
      const t = termites[i];
      ctx.fillStyle = t.carrying ? '#E8853A' : '#BC6C25';
      ctx.fillRect(
        offX + t.x * cellSize,
        offY + t.y * cellSize,
        ts,
        ts
      );
    }
  }

  let statsTimer = 0;
  function updateStats() {
    const { pileCount, largest, totalChips } = computePiles();
    let carrying = 0;
    for (let i = 0; i < termites.length; i++) if (termites[i].carrying) carrying++;
    pileCountEl.textContent = pileCount;
    largestPileEl.textContent = largest;
    totalChipsEl.textContent = totalChips;
    carryingEl.textContent = carrying;
    ticksEl.textContent = ticks;
  }

  function loop() {
    for (let s = 0; s < speedMult; s++) step();
    render();
    statsTimer++;
    if (statsTimer >= 15) {
      updateStats();
      statsTimer = 0;
    }
    requestAnimationFrame(loop);
  }

  termiteSlider.addEventListener('input', (e) => {
    termiteCount = parseInt(e.target.value, 10);
    termiteVal.textContent = termiteCount;
    // Adjust termite array without resetting the grid
    while (termites.length < termiteCount) {
      termites.push({
        x: Math.floor(Math.random() * GW),
        y: Math.floor(Math.random() * GH),
        carrying: false,
      });
    }
    while (termites.length > termiteCount) {
      const t = termites.pop();
      // Drop any carried chip back onto the grid
      if (t && t.carrying) {
        const i = idx(t.x, t.y);
        if (grid[i] === 0) grid[i] = 1;
      }
    }
  });

  chipSlider.addEventListener('input', (e) => {
    const v = parseInt(e.target.value, 10);
    chipDensity = v / 100;
    chipVal.textContent = v + '%';
  });

  speedSlider.addEventListener('input', (e) => {
    speedMult = parseInt(e.target.value, 10);
    speedVal.textContent = speedMult + 'x';
  });

  resetBtn.addEventListener('click', () => {
    init();
    updateStats();
  });

  init();
  updateStats();
  loop();
})();
</script>
</body>
</html>
