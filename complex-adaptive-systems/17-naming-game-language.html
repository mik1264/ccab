<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naming Game — Complex Adaptive Systems</title>
<style>
    :root {
        --sage: #8A9A5B;
        --moss: #606C38;
        --earth: #DDA15E;
        --cream: #FEFAE0;
        --terracotta: #BC6C25;
        --dark-moss: #3d4423;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        height: 100%;
        background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
        color: var(--dark-moss);
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
    }
    h1, h2, h3 { font-family: 'Lora', Georgia, serif; color: var(--moss); }

    .organic-back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        text-decoration: none;
        color: var(--moss);
        font-weight: 600;
        border: 1px solid rgba(138, 154, 91, 0.3);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 12px rgba(96, 108, 56, 0.1);
    }
    .organic-back-link:hover {
        transform: translateX(-4px);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 6px 18px rgba(96, 108, 56, 0.2);
    }
    .back-arrow { transition: transform 0.3s; }
    .organic-back-link:hover .back-arrow { transform: translateX(-3px); }

    #container {
        position: relative;
        width: 100vw;
        height: 100vh;
    }

    canvas {
        display: block;
        width: 100%;
        height: 100%;
    }

    .hud {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 320px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        border: 1px solid rgba(138, 154, 91, 0.3);
        padding: 20px;
        box-shadow: 0 6px 20px rgba(96, 108, 56, 0.12);
        z-index: 50;
    }
    .hud h1 {
        font-size: 1.4rem;
        margin-bottom: 4px;
    }
    .hud .subtitle {
        font-size: 0.78rem;
        color: var(--terracotta);
        margin-bottom: 14px;
        font-style: italic;
    }

    .controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 14px;
    }
    .control-row {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.82rem;
    }
    .control-row label {
        flex: 0 0 110px;
        color: var(--moss);
        font-weight: 600;
    }
    .control-row input[type=range] {
        flex: 1;
        accent-color: var(--sage);
    }
    .control-row .val {
        flex: 0 0 42px;
        text-align: right;
        font-variant-numeric: tabular-nums;
        color: var(--dark-moss);
    }
    button {
        padding: 8px 14px;
        background: var(--sage);
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-family: inherit;
        font-weight: 600;
        font-size: 0.85rem;
        transition: all 0.25s;
    }
    button:hover {
        background: var(--moss);
        transform: translateY(-1px);
    }
    button.secondary {
        background: var(--earth);
    }
    button.secondary:hover {
        background: var(--terracotta);
    }

    .stats {
        border-top: 1px dashed rgba(138, 154, 91, 0.4);
        padding-top: 12px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        font-size: 0.82rem;
    }
    .stat-cell {
        background: rgba(254, 250, 224, 0.7);
        padding: 6px 10px;
        border-radius: 10px;
    }
    .stat-cell .lbl {
        display: block;
        font-size: 0.68rem;
        color: var(--terracotta);
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }
    .stat-cell .v {
        font-weight: 700;
        color: var(--dark-moss);
        font-variant-numeric: tabular-nums;
    }

    .chart {
        position: absolute;
        bottom: 20px;
        left: 20px;
        width: 340px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        border: 1px solid rgba(138, 154, 91, 0.3);
        padding: 16px;
        box-shadow: 0 6px 20px rgba(96, 108, 56, 0.12);
        z-index: 50;
    }
    .chart h3 {
        font-size: 0.95rem;
        margin-bottom: 10px;
    }
    .bar-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
        font-size: 0.78rem;
    }
    .bar-row .word {
        flex: 0 0 80px;
        font-family: 'Lora', serif;
        color: var(--dark-moss);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .bar-row .bar-wrap {
        flex: 1;
        height: 16px;
        background: rgba(221, 161, 94, 0.15);
        border-radius: 8px;
        overflow: hidden;
    }
    .bar-row .bar {
        height: 100%;
        border-radius: 8px;
        transition: width 0.3s;
    }
    .bar-row .count {
        flex: 0 0 36px;
        text-align: right;
        font-variant-numeric: tabular-nums;
        color: var(--moss);
        font-weight: 600;
    }
    .consensus-banner {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 24px 48px;
        background: rgba(254, 250, 224, 0.95);
        backdrop-filter: blur(10px);
        border: 2px solid var(--sage);
        border-radius: 24px;
        font-family: 'Lora', serif;
        color: var(--moss);
        font-size: 1.6rem;
        text-align: center;
        opacity: 0;
        transition: opacity 0.6s;
        pointer-events: none;
        box-shadow: 0 10px 40px rgba(96, 108, 56, 0.25);
        z-index: 60;
    }
    .consensus-banner.show { opacity: 1; }
    .consensus-banner .big {
        font-size: 2.4rem;
        font-weight: 700;
        display: block;
        margin-top: 6px;
    }

    @media (max-width: 760px) {
        .hud, .chart { width: calc(100vw - 40px); }
        .chart { bottom: 10px; left: 20px; }
        .hud { top: 70px; right: 20px; }
    }
</style>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<a href="index.html" class="organic-back-link">
    <span class="back-arrow">←</span>
    <span class="back-text">Gallery</span>
</a>

<div id="container">
    <canvas id="world"></canvas>

    <div class="hud">
        <h1>Naming Game</h1>
        <div class="subtitle">Emergent consensus through pairwise talk</div>
        <div class="controls">
            <div class="control-row">
                <label for="agentCount">Agents</label>
                <input type="range" id="agentCount" min="100" max="500" step="25" value="300">
                <span class="val" id="agentCountVal">300</span>
            </div>
            <div class="control-row">
                <label for="rate">Rate</label>
                <input type="range" id="rate" min="1" max="60" step="1" value="20">
                <span class="val" id="rateVal">20</span>
            </div>
            <div class="control-row" style="gap: 8px;">
                <button id="resetBtn">Reset</button>
                <button id="pauseBtn" class="secondary">Pause</button>
            </div>
        </div>
        <div class="stats">
            <div class="stat-cell"><span class="lbl">Words in play</span><span class="v" id="statWords">0</span></div>
            <div class="stat-cell"><span class="lbl">Top word %</span><span class="v" id="statTop">0%</span></div>
            <div class="stat-cell"><span class="lbl">Interactions</span><span class="v" id="statIter">0</span></div>
            <div class="stat-cell"><span class="lbl">Time to consensus</span><span class="v" id="statTime">—</span></div>
        </div>
    </div>

    <div class="chart">
        <h3>Top 8 Words by Population</h3>
        <div id="bars"></div>
    </div>

    <div class="consensus-banner" id="banner">
        Consensus reached!
        <span class="big" id="bannerWord">—</span>
    </div>
</div>

<script>
(function() {
    const canvas = document.getElementById('world');
    const ctx = canvas.getContext('2d');

    const agentCountEl = document.getElementById('agentCount');
    const agentCountVal = document.getElementById('agentCountVal');
    const rateEl = document.getElementById('rate');
    const rateVal = document.getElementById('rateVal');
    const resetBtn = document.getElementById('resetBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const statWords = document.getElementById('statWords');
    const statTop = document.getElementById('statTop');
    const statIter = document.getElementById('statIter');
    const statTime = document.getElementById('statTime');
    const barsEl = document.getElementById('bars');
    const banner = document.getElementById('banner');
    const bannerWord = document.getElementById('bannerWord');

    // Invented word syllables — will produce ~plausible, pronounceable nonsense words.
    const SYL_A = ['mo','lu','ta','ki','ze','va','no','sa','be','ri','do','fa','je','wu','pi','gu','nu','ya','ce','ha'];
    const SYL_B = ['ra','li','mo','tu','ka','ve','so','na','do','fi','je','gu','hu','ba','ri','pa','ze','wi','nu','le'];
    const SYL_C = ['n','r','l','sh','th','k','m','','','s','','','v','ch','','','','','','t'];

    function randWord() {
        return (SYL_A[Math.floor(Math.random()*SYL_A.length)]
             + SYL_B[Math.floor(Math.random()*SYL_B.length)]
             + SYL_C[Math.floor(Math.random()*SYL_C.length)]);
    }

    // Hash-to-color: stable HSL from string
    const colorCache = new Map();
    function wordColor(word) {
        if (colorCache.has(word)) return colorCache.get(word);
        let h = 0;
        for (let i = 0; i < word.length; i++) {
            h = ((h << 5) - h) + word.charCodeAt(i);
            h |= 0;
        }
        const hue = Math.abs(h) % 360;
        const sat = 55 + (Math.abs(h >> 8) % 30);
        const lig = 50 + (Math.abs(h >> 16) % 18);
        const c = `hsl(${hue}, ${sat}%, ${lig}%)`;
        colorCache.set(word, c);
        return c;
    }

    let dpr = Math.max(1, window.devicePixelRatio || 1);
    let W = 0, H = 0;

    function resize() {
        const rect = canvas.getBoundingClientRect();
        dpr = Math.max(1, window.devicePixelRatio || 1);
        canvas.width = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        W = rect.width;
        H = rect.height;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize);

    // Simulation state
    let agents = [];
    let ephemeralLines = [];
    let interactions = 0;
    let startTime = 0;
    let consensusTime = null;
    let paused = false;

    function reset() {
        const n = parseInt(agentCountEl.value, 10);
        agents = [];
        for (let i = 0; i < n; i++) {
            agents.push({
                x: Math.random() * W,
                y: Math.random() * H,
                vx: (Math.random() - 0.5) * 0.35,
                vy: (Math.random() - 0.5) * 0.35,
                memory: [randWord()] // each starts with one unique invented word
            });
        }
        ephemeralLines = [];
        interactions = 0;
        startTime = performance.now();
        consensusTime = null;
        banner.classList.remove('show');
    }

    // Naming Game rule: speaker chooses random word from their memory,
    // utters to hearer; if hearer knows that word, BOTH collapse their
    // memory to just that word; otherwise, hearer adds it.
    function step(speaker, hearer) {
        if (speaker.memory.length === 0) speaker.memory.push(randWord());
        const word = speaker.memory[Math.floor(Math.random() * speaker.memory.length)];
        if (hearer.memory.includes(word)) {
            speaker.memory = [word];
            hearer.memory = [word];
        } else {
            hearer.memory.push(word);
        }
        interactions++;
    }

    function pickNeighborIndex(iIdx) {
        const a = agents[iIdx];
        let best = -1, bestD = Infinity;
        // sample 8 candidates, pick spatially nearest to encourage local
        // interactions (neighbors on a 2D plane)
        for (let k = 0; k < 8; k++) {
            const j = Math.floor(Math.random() * agents.length);
            if (j === iIdx) continue;
            const b = agents[j];
            const dx = a.x - b.x, dy = a.y - b.y;
            const d = dx*dx + dy*dy;
            if (d < bestD) { bestD = d; best = j; }
        }
        return best;
    }

    function updateAgents(dt) {
        for (let i = 0; i < agents.length; i++) {
            const a = agents[i];
            a.x += a.vx * dt;
            a.y += a.vy * dt;
            if (a.x < 6) { a.x = 6; a.vx *= -1; }
            else if (a.x > W - 6) { a.x = W - 6; a.vx *= -1; }
            if (a.y < 6) { a.y = 6; a.vy *= -1; }
            else if (a.y > H - 6) { a.y = H - 6; a.vy *= -1; }
            if (Math.random() < 0.002) {
                a.vx += (Math.random() - 0.5) * 0.1;
                a.vy += (Math.random() - 0.5) * 0.1;
                const sp = Math.hypot(a.vx, a.vy);
                if (sp > 0.6) { a.vx *= 0.6/sp; a.vy *= 0.6/sp; }
            }
        }
    }

    function runInteractions(rate, dt) {
        // rate = interactions per second per 100 agents
        const per = (rate * agents.length / 100) * (dt / 1000);
        let n = Math.floor(per);
        if (Math.random() < per - n) n++;
        for (let k = 0; k < n; k++) {
            const i = Math.floor(Math.random() * agents.length);
            const j = pickNeighborIndex(i);
            if (j < 0) continue;
            step(agents[i], agents[j]);
            ephemeralLines.push({
                x1: agents[i].x, y1: agents[i].y,
                x2: agents[j].x, y2: agents[j].y,
                life: 1.0
            });
        }
    }

    function primaryWord(agent) {
        return agent.memory[agent.memory.length - 1];
    }

    function tallyWords() {
        const counts = new Map();
        for (const a of agents) {
            const w = primaryWord(a);
            counts.set(w, (counts.get(w) || 0) + 1);
        }
        return counts;
    }

    function render() {
        ctx.clearRect(0, 0, W, H);

        // Subtle organic backdrop glows
        const g1 = ctx.createRadialGradient(W*0.2, H*0.25, 20, W*0.2, H*0.25, Math.max(W,H)*0.5);
        g1.addColorStop(0, 'rgba(138,154,91,0.10)');
        g1.addColorStop(1, 'rgba(138,154,91,0)');
        ctx.fillStyle = g1; ctx.fillRect(0, 0, W, H);
        const g2 = ctx.createRadialGradient(W*0.8, H*0.75, 20, W*0.8, H*0.75, Math.max(W,H)*0.5);
        g2.addColorStop(0, 'rgba(221,161,94,0.10)');
        g2.addColorStop(1, 'rgba(221,161,94,0)');
        ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);

        // Ephemeral lines (glowing)
        for (let i = ephemeralLines.length - 1; i >= 0; i--) {
            const ln = ephemeralLines[i];
            ctx.globalAlpha = ln.life * 0.7;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2 * ln.life;
            ctx.shadowBlur = 12 * ln.life;
            ctx.shadowColor = '#ffd27a';
            ctx.beginPath();
            ctx.moveTo(ln.x1, ln.y1);
            ctx.lineTo(ln.x2, ln.y2);
            ctx.stroke();
            ln.life -= 0.04;
            if (ln.life <= 0) ephemeralLines.splice(i, 1);
        }
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;

        // Agents
        for (const a of agents) {
            const w = primaryWord(a);
            const c = wordColor(w);
            ctx.fillStyle = c;
            ctx.beginPath();
            ctx.arc(a.x, a.y, a.memory.length === 1 ? 4 : 3, 0, Math.PI*2);
            ctx.fill();
            if (a.memory.length > 1) {
                ctx.strokeStyle = 'rgba(61,68,35,0.35)';
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }
        }
    }

    function updateHUD() {
        const counts = tallyWords();
        statWords.textContent = counts.size;
        let topW = '', topC = 0;
        for (const [w, c] of counts) if (c > topC) { topC = c; topW = w; }
        const topFrac = agents.length ? (topC / agents.length) : 0;
        statTop.textContent = (topFrac * 100).toFixed(1) + '%';
        statIter.textContent = interactions.toLocaleString();

        if (consensusTime !== null) {
            statTime.textContent = (consensusTime / 1000).toFixed(2) + 's';
        } else {
            const el = (performance.now() - startTime) / 1000;
            statTime.textContent = el.toFixed(1) + 's…';
        }

        // detect consensus: only one word present everywhere
        if (counts.size === 1 && consensusTime === null) {
            consensusTime = performance.now() - startTime;
            bannerWord.textContent = topW;
            bannerWord.style.color = wordColor(topW);
            banner.classList.add('show');
        } else if (counts.size > 1 && consensusTime !== null && banner.classList.contains('show')) {
            // will not normally happen, but keep banner visible only while consensus holds
        }

        // Top 8 chart
        const arr = [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 8);
        const max = arr.length ? arr[0][1] : 1;
        let html = '';
        for (const [w, c] of arr) {
            const pct = (c / max) * 100;
            const col = wordColor(w);
            html += `<div class="bar-row">
                <span class="word" title="${w}">${w}</span>
                <span class="bar-wrap"><span class="bar" style="width:${pct}%; background:${col}"></span></span>
                <span class="count">${c}</span>
            </div>`;
        }
        if (arr.length === 0) html = '<div style="opacity:0.6;font-size:0.8rem">No agents.</div>';
        barsEl.innerHTML = html;
    }

    let last = 0;
    let hudTimer = 0;
    function frame(t) {
        if (!last) last = t;
        let dt = t - last;
        last = t;
        if (dt > 80) dt = 80;

        if (!paused) {
            updateAgents(dt * 0.6);
            runInteractions(parseFloat(rateEl.value), dt);
        }
        render();

        hudTimer += dt;
        if (hudTimer > 120) { updateHUD(); hudTimer = 0; }

        requestAnimationFrame(frame);
    }

    agentCountEl.addEventListener('input', () => {
        agentCountVal.textContent = agentCountEl.value;
    });
    agentCountEl.addEventListener('change', reset);
    rateEl.addEventListener('input', () => {
        rateVal.textContent = rateEl.value;
    });
    resetBtn.addEventListener('click', reset);
    pauseBtn.addEventListener('click', () => {
        paused = !paused;
        pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    });

    resize();
    reset();
    requestAnimationFrame(frame);
})();
</script>
</body>
</html>
