<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schelling Segregation — Complex Adaptive Systems</title>
<style>
  :root {
    --sage: #8A9A5B;
    --terracotta: #BC6C25;
    --cream: #FEFAE0;
    --moss: #606C38;
    --bg: #0a0a0f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--cream);
  }

  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* Organic back-link */
  .organic-back-link {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: rgba(254, 250, 224, 0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(254, 250, 224, 0.18);
    border-radius: 40px;
    color: var(--cream);
    text-decoration: none;
    font-family: 'Lora', Georgia, serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }

  .organic-back-link:hover {
    background: rgba(138, 154, 91, 0.22);
    border-color: rgba(138, 154, 91, 0.45);
    transform: translateX(-3px);
    box-shadow: 0 6px 28px rgba(138, 154, 91, 0.3);
  }

  .back-arrow {
    font-size: 16px;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .organic-back-link:hover .back-arrow {
    transform: translateX(-3px);
  }

  /* Title */
  .title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-family: 'Lora', Georgia, serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--cream);
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    pointer-events: none;
    text-align: center;
    padding: 0 200px;
  }

  /* Control panel */
  .panel {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 16px 24px;
    background: rgba(10, 10, 15, 0.55);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(254, 250, 224, 0.15);
    border-radius: 20px;
    max-width: calc(100% - 40px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
  }

  .control {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 140px;
  }

  .control label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: rgba(254, 250, 224, 0.65);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .control .value {
    font-family: 'Lora', Georgia, serif;
    font-weight: 600;
    color: var(--sage);
    font-size: 13px;
    letter-spacing: 0;
    text-transform: none;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(254, 250, 224, 0.12);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--sage);
    cursor: pointer;
    border: 2px solid var(--cream);
    box-shadow: 0 0 8px rgba(138, 154, 91, 0.6);
    transition: transform 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--sage);
    cursor: pointer;
    border: 2px solid var(--cream);
    box-shadow: 0 0 8px rgba(138, 154, 91, 0.6);
  }

  .btn {
    padding: 9px 20px;
    background: rgba(138, 154, 91, 0.15);
    border: 1px solid rgba(138, 154, 91, 0.4);
    border-radius: 30px;
    color: var(--cream);
    font-family: 'Lora', Georgia, serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
  }

  .btn:hover {
    background: rgba(138, 154, 91, 0.3);
    border-color: var(--sage);
    box-shadow: 0 0 20px rgba(138, 154, 91, 0.3);
    transform: translateY(-1px);
  }

  .btn.terra {
    background: rgba(188, 108, 37, 0.15);
    border-color: rgba(188, 108, 37, 0.4);
  }
  .btn.terra:hover {
    background: rgba(188, 108, 37, 0.3);
    border-color: var(--terracotta);
    box-shadow: 0 0 20px rgba(188, 108, 37, 0.3);
  }

  /* Stats panel */
  .stats {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 50;
    padding: 16px 20px;
    background: rgba(10, 10, 15, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(254, 250, 224, 0.15);
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.7;
    min-width: 210px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
  }

  .stats .row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
  }

  .stats .row .k {
    color: rgba(254, 250, 224, 0.6);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    align-self: center;
  }

  .stats .row .v {
    font-family: 'Lora', Georgia, serif;
    font-weight: 600;
    color: var(--sage);
  }

  .stats .row.terra .v { color: var(--terracotta); }

  .legend-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    margin-right: 6px;
    vertical-align: middle;
  }

  @media (max-width: 700px) {
    .title { font-size: 16px; padding: 0 90px; }
    .panel { gap: 12px; padding: 12px 16px; bottom: 16px; }
    .control { min-width: 110px; }
    .stats { font-size: 11px; padding: 12px 14px; min-width: 170px; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<a href="../index.html" class="organic-back-link">
  <span class="back-arrow">&larr;</span>
  <span class="back-text">Gallery</span>
</a>

<div class="title">Schelling Segregation</div>

<canvas id="canvas"></canvas>

<div class="stats" id="stats">
  <div class="row"><span class="k"><span class="legend-dot" style="background:#8A9A5B"></span>Sage</span><span class="v" id="statA">0</span></div>
  <div class="row terra"><span class="k"><span class="legend-dot" style="background:#BC6C25"></span>Terracotta</span><span class="v" id="statB">0</span></div>
  <div class="row"><span class="k">Iterations</span><span class="v" id="statIter">0</span></div>
  <div class="row"><span class="k">Satisfied</span><span class="v" id="statSat">0%</span></div>
  <div class="row"><span class="k">Segregation</span><span class="v" id="statSeg">0%</span></div>
</div>

<div class="panel">
  <div class="control">
    <label>Tolerance <span class="value" id="tolVal">0.30</span></label>
    <input type="range" id="tol" min="0" max="1" step="0.01" value="0.3">
  </div>
  <div class="control">
    <label>Density <span class="value" id="denVal">0.90</span></label>
    <input type="range" id="den" min="0.3" max="0.98" step="0.01" value="0.9">
  </div>
  <button class="btn" id="pauseBtn">Pause</button>
  <button class="btn terra" id="resetBtn">Reset</button>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // Grid constants
  const GRID = 100;
  const EMPTY = 0;
  const A = 1; // sage
  const B = 2; // terracotta

  // Colors
  const COLOR_A = '#8A9A5B';
  const COLOR_A_GLOW = 'rgba(138, 154, 91, 0.35)';
  const COLOR_B = '#BC6C25';
  const COLOR_B_GLOW = 'rgba(188, 108, 37, 0.35)';

  // State
  let grid = new Uint8Array(GRID * GRID);
  let emptyCells = [];
  let agents = [];
  let tolerance = 0.3;
  let density = 0.9;
  let iterations = 0;
  let paused = false;
  let stepsPerFrame = 400;

  // Canvas sizing
  let cellSize = 6;
  let offsetX = 0, offsetY = 0;
  let dpr = 1;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';

    // Compute cell size to fit grid centered on screen
    const size = Math.min(w, h) * 0.86;
    cellSize = size / GRID;
    offsetX = (w - cellSize * GRID) / 2;
    offsetY = (h - cellSize * GRID) / 2;

    draw();
  }

  function idx(x, y) { return y * GRID + x; }

  function init() {
    grid = new Uint8Array(GRID * GRID);
    emptyCells = [];
    agents = [];
    iterations = 0;

    const total = GRID * GRID;
    const agentCount = Math.floor(total * density);

    // Pick random cells for agents
    const positions = new Array(total);
    for (let i = 0; i < total; i++) positions[i] = i;
    // Fisher-Yates shuffle (partial — we only need the first agentCount)
    for (let i = 0; i < agentCount; i++) {
      const j = i + Math.floor(Math.random() * (total - i));
      const tmp = positions[i];
      positions[i] = positions[j];
      positions[j] = tmp;
    }

    for (let i = 0; i < agentCount; i++) {
      const p = positions[i];
      const type = Math.random() < 0.5 ? A : B;
      grid[p] = type;
      agents.push(p);
    }
    for (let i = agentCount; i < total; i++) {
      emptyCells.push(positions[i]);
    }

    draw();
    updateStats();
  }

  // Count same/different neighbors (Moore neighborhood)
  function neighborCounts(p) {
    const x = p % GRID;
    const y = (p / GRID) | 0;
    const type = grid[p];
    let same = 0, total = 0;
    for (let dy = -1; dy <= 1; dy++) {
      const ny = y + dy;
      if (ny < 0 || ny >= GRID) continue;
      for (let dx = -1; dx <= 1; dx++) {
        if (dx === 0 && dy === 0) continue;
        const nx = x + dx;
        if (nx < 0 || nx >= GRID) continue;
        const nt = grid[ny * GRID + nx];
        if (nt !== EMPTY) {
          total++;
          if (nt === type) same++;
        }
      }
    }
    return { same, total };
  }

  function isHappy(p) {
    const { same, total } = neighborCounts(p);
    if (total === 0) return true; // isolated agents are "content"
    return (same / total) >= tolerance;
  }

  // Step: move a batch of unhappy agents
  function step() {
    if (agents.length === 0 || emptyCells.length === 0) return;

    const batch = stepsPerFrame;
    let moves = 0;
    const attempts = batch * 4;

    for (let t = 0; t < attempts && moves < batch; t++) {
      // Pick random agent
      const ai = (Math.random() * agents.length) | 0;
      const p = agents[ai];
      if (isHappy(p)) continue;

      // Pick random empty cell
      const ei = (Math.random() * emptyCells.length) | 0;
      const e = emptyCells[ei];

      // Swap
      const type = grid[p];
      grid[e] = type;
      grid[p] = EMPTY;
      agents[ai] = e;
      emptyCells[ei] = p;
      moves++;
    }

    iterations += moves;
  }

  // Compute stats: % satisfied + avg same-type neighbor fraction
  function computeStats() {
    if (agents.length === 0) return { satisfied: 0, segregation: 0, countA: 0, countB: 0 };
    let satisfied = 0;
    let sumFrac = 0;
    let withNeighbors = 0;
    let countA = 0, countB = 0;
    for (let i = 0; i < agents.length; i++) {
      const p = agents[i];
      if (grid[p] === A) countA++; else countB++;
      const { same, total } = neighborCounts(p);
      if (total === 0) { satisfied++; continue; }
      const frac = same / total;
      if (frac >= tolerance) satisfied++;
      sumFrac += frac;
      withNeighbors++;
    }
    return {
      satisfied: satisfied / agents.length,
      segregation: withNeighbors > 0 ? sumFrac / withNeighbors : 0,
      countA, countB
    };
  }

  let statsTick = 0;
  const $statA = document.getElementById('statA');
  const $statB = document.getElementById('statB');
  const $statIter = document.getElementById('statIter');
  const $statSat = document.getElementById('statSat');
  const $statSeg = document.getElementById('statSeg');

  function updateStats() {
    const s = computeStats();
    $statA.textContent = s.countA.toLocaleString();
    $statB.textContent = s.countB.toLocaleString();
    $statIter.textContent = iterations.toLocaleString();
    $statSat.textContent = (s.satisfied * 100).toFixed(1) + '%';
    $statSeg.textContent = (s.segregation * 100).toFixed(1) + '%';
  }

  // Rendering: two-pass — glow layer then squares
  function draw() {
    ctx.save();
    ctx.scale(dpr, dpr);
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);

    const ox = offsetX, oy = offsetY, cs = cellSize;

    // Pass 1: subtle glow using shadow on a single rect? Too expensive.
    // Instead, use two overlapping fills with different alpha to fake glow.

    // Glow pass: slightly larger, semi-transparent
    ctx.globalCompositeOperation = 'lighter';
    const gPad = cs * 0.35;
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        const v = grid[y * GRID + x];
        if (v === EMPTY) continue;
        ctx.fillStyle = v === A ? COLOR_A_GLOW : COLOR_B_GLOW;
        ctx.fillRect(ox + x * cs - gPad, oy + y * cs - gPad, cs + gPad * 2, cs + gPad * 2);
      }
    }
    ctx.globalCompositeOperation = 'source-over';

    // Main squares
    const sPad = Math.max(0.3, cs * 0.08);
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        const v = grid[y * GRID + x];
        if (v === EMPTY) continue;
        ctx.fillStyle = v === A ? COLOR_A : COLOR_B;
        ctx.fillRect(ox + x * cs + sPad, oy + y * cs + sPad, cs - sPad * 2, cs - sPad * 2);
      }
    }

    ctx.restore();
  }

  let lastTime = 0;
  function loop(t) {
    requestAnimationFrame(loop);
    if (!paused) {
      step();
    }
    draw();
    // Throttle stats to ~every 6 frames (~10Hz)
    if ((++statsTick % 6) === 0) updateStats();
  }

  // Controls
  const $tol = document.getElementById('tol');
  const $tolVal = document.getElementById('tolVal');
  const $den = document.getElementById('den');
  const $denVal = document.getElementById('denVal');
  const $pause = document.getElementById('pauseBtn');
  const $reset = document.getElementById('resetBtn');

  $tol.addEventListener('input', () => {
    tolerance = parseFloat($tol.value);
    $tolVal.textContent = tolerance.toFixed(2);
    updateStats();
  });
  $den.addEventListener('input', () => {
    density = parseFloat($den.value);
    $denVal.textContent = density.toFixed(2);
  });
  $den.addEventListener('change', () => init());

  $pause.addEventListener('click', () => {
    paused = !paused;
    $pause.textContent = paused ? 'Resume' : 'Pause';
  });

  $reset.addEventListener('click', () => init());

  window.addEventListener('resize', resize);

  // Boot
  resize();
  init();
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
