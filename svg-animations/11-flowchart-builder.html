<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowchart Builder - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh; display: flex; flex-direction: column;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.8);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .toolbar {
            display: flex; gap: 8px; padding: 0.5rem 1rem; justify-content: center;
            flex-wrap: wrap; background: rgba(255,255,255,0.6); backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(138,154,91,0.15); margin-top: 50px;
        }
        .tool-btn {
            padding: 6px 14px; border: 2px solid var(--sage); background: rgba(255,255,255,0.7);
            color: var(--moss); font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.85rem; cursor: pointer; border-radius: 15px; transition: all 0.3s;
            display: flex; align-items: center; gap: 5px;
        }
        .tool-btn:hover, .tool-btn.active { background: var(--sage); color: white; }
        .tool-btn svg { width: 20px; height: 16px; }
        .tool-btn.danger { border-color: #c0392b; color: #c0392b; }
        .tool-btn.danger:hover { background: #c0392b; color: white; }
        .tool-btn.export { border-color: var(--terracotta); color: var(--terracotta); }
        .tool-btn.export:hover { background: var(--terracotta); color: white; }
        .canvas-area {
            flex: 1; position: relative; overflow: hidden;
        }
        #flowSvg { width: 100%; height: 100%; }
        .grid-line { stroke: rgba(138,154,91,0.08); stroke-width: 1; }
        .node-shape { cursor: move; stroke-width: 2; }
        .node-shape.selected { stroke: var(--terracotta); stroke-width: 3; stroke-dasharray: 6 3; }
        .node-text { font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 600;
            fill: var(--dark-moss); pointer-events: none; text-anchor: middle; }
        .edge-line { stroke: #555; stroke-width: 2; fill: none; cursor: pointer; }
        .edge-line:hover { stroke: var(--terracotta); stroke-width: 3; }
        .hint-bar {
            text-align: center; padding: 4px; font-size: 0.8rem; color: var(--sage);
            background: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>

    <div class="toolbar">
        <button class="tool-btn active" data-tool="select" onclick="setTool('select')">
            <svg viewBox="0 0 20 16"><path d="M4 1L12 8L8 9L10 15L7 16L5 10L2 13Z" fill="currentColor"/></svg> Select
        </button>
        <button class="tool-btn" data-tool="process" onclick="setTool('process')">
            <svg viewBox="0 0 20 16"><rect x="2" y="2" width="16" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg> Process
        </button>
        <button class="tool-btn" data-tool="decision" onclick="setTool('decision')">
            <svg viewBox="0 0 20 16"><polygon points="10,1 19,8 10,15 1,8" fill="none" stroke="currentColor" stroke-width="2"/></svg> Decision
        </button>
        <button class="tool-btn" data-tool="terminal" onclick="setTool('terminal')">
            <svg viewBox="0 0 20 16"><rect x="2" y="2" width="16" height="12" rx="6" fill="none" stroke="currentColor" stroke-width="2"/></svg> Start/End
        </button>
        <button class="tool-btn" data-tool="io" onclick="setTool('io')">
            <svg viewBox="0 0 20 16"><polygon points="5,2 19,2 15,14 1,14" fill="none" stroke="currentColor" stroke-width="2"/></svg> I/O
        </button>
        <button class="tool-btn" data-tool="connect" onclick="setTool('connect')">
            <svg viewBox="0 0 20 16"><line x1="3" y1="12" x2="17" y2="4" stroke="currentColor" stroke-width="2"/><polygon points="17,4 13,3 14,7" fill="currentColor"/></svg> Connect
        </button>
        <button class="tool-btn danger" onclick="deleteSelected()">Delete</button>
        <button class="tool-btn export" onclick="exportSVG()">Export SVG</button>
    </div>
    <div class="hint-bar" id="hintBar">Click on the canvas to place a node. Use Connect mode to link nodes.</div>
    <div class="canvas-area">
        <svg id="flowSvg" role="graphics-document" aria-label="Flowchart builder canvas">
            <title>Flowchart Builder</title>
            <desc>Interactive flowchart builder. Drag shapes from the toolbar to the canvas, connect them with arrows, and double-click to edit labels.</desc>
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
                </marker>
            </defs>
        </svg>
    </div>

    <script>
    (function(){
        const svg = document.getElementById('flowSvg');
        const hintBar = document.getElementById('hintBar');
        const GRID = 20;
        let currentTool = 'select';
        let nodes = [];
        let edges = [];
        let nextId = 1;
        let selectedNode = null;
        let connectSource = null;
        let dragging = null;
        let dragOffset = { x: 0, y: 0 };

        // Draw grid
        const gridGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        svg.appendChild(gridGroup);
        function drawGrid() {
            gridGroup.innerHTML = '';
            const w = window.innerWidth, h = window.innerHeight;
            for (let x = 0; x < w; x += GRID) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x); line.setAttribute('y1', 0);
                line.setAttribute('x2', x); line.setAttribute('y2', h);
                line.classList.add('grid-line');
                gridGroup.appendChild(line);
            }
            for (let y = 0; y < h; y += GRID) {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', 0); line.setAttribute('y1', y);
                line.setAttribute('x2', w); line.setAttribute('y2', y);
                line.classList.add('grid-line');
                gridGroup.appendChild(line);
            }
        }
        drawGrid();

        const edgesGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        svg.appendChild(edgesGroup);
        const nodesGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        svg.appendChild(nodesGroup);

        function snap(val) { return Math.round(val / GRID) * GRID; }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
            const btn = document.querySelector(`.tool-btn[data-tool="${tool}"]`);
            if (btn) btn.classList.add('active');
            connectSource = null;
            deselectAll();
            const hints = {
                select: 'Click nodes to select. Drag to move. Double-click to edit label. Press Delete to remove.',
                process: 'Click on the canvas to place a Process rectangle.',
                decision: 'Click on the canvas to place a Decision diamond.',
                terminal: 'Click on the canvas to place a Start/End oval.',
                io: 'Click on the canvas to place an I/O parallelogram.',
                connect: 'Click a source node, then click a target node to create an arrow.'
            };
            hintBar.textContent = hints[tool] || '';
        }
        window.setTool = setTool;

        function deselectAll() {
            selectedNode = null;
            nodesGroup.querySelectorAll('.node-shape').forEach(s => s.classList.remove('selected'));
        }

        function createNode(type, x, y) {
            const id = nextId++;
            const label = type === 'terminal' ? 'Start' : type === 'decision' ? 'Condition?' : type === 'io' ? 'Input' : 'Process';
            const node = { id, type, x: snap(x), y: snap(y), w: 120, h: 60, label };
            nodes.push(node);
            renderNode(node);
            return node;
        }

        function renderNode(node) {
            // Remove existing
            const existing = nodesGroup.querySelector(`[data-node-id="${node.id}"]`);
            if (existing) existing.remove();

            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('data-node-id', node.id);
            g.setAttribute('transform', `translate(${node.x}, ${node.y})`);

            let shape;
            const w = node.w, h = node.h;
            const halfW = w / 2, halfH = h / 2;

            if (node.type === 'process') {
                shape = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                shape.setAttribute('x', -halfW); shape.setAttribute('y', -halfH);
                shape.setAttribute('width', w); shape.setAttribute('height', h);
                shape.setAttribute('rx', 6);
                shape.setAttribute('fill', 'rgba(138,154,91,0.15)');
                shape.setAttribute('stroke', '#606C38');
            } else if (node.type === 'decision') {
                shape = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                shape.setAttribute('points', `0,${-halfH} ${halfW},0 0,${halfH} ${-halfW},0`);
                shape.setAttribute('fill', 'rgba(221,161,94,0.15)');
                shape.setAttribute('stroke', '#BC6C25');
                node.w = 140; node.h = 80;
            } else if (node.type === 'terminal') {
                shape = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                shape.setAttribute('x', -halfW); shape.setAttribute('y', -halfH);
                shape.setAttribute('width', w); shape.setAttribute('height', h);
                shape.setAttribute('rx', halfH);
                shape.setAttribute('fill', 'rgba(188,108,37,0.15)');
                shape.setAttribute('stroke', '#BC6C25');
            } else if (node.type === 'io') {
                shape = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                const skew = 15;
                shape.setAttribute('points',
                    `${-halfW + skew},${-halfH} ${halfW + skew},${-halfH} ${halfW - skew},${halfH} ${-halfW - skew},${halfH}`);
                shape.setAttribute('fill', 'rgba(74,144,217,0.15)');
                shape.setAttribute('stroke', '#4a90d9');
            }

            shape.classList.add('node-shape');
            g.appendChild(shape);

            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.classList.add('node-text');
            text.setAttribute('y', 4);
            text.textContent = node.label;
            g.appendChild(text);

            // Events
            g.addEventListener('mousedown', e => {
                e.stopPropagation();
                if (currentTool === 'connect') {
                    if (!connectSource) {
                        connectSource = node;
                        shape.classList.add('selected');
                        hintBar.textContent = `Source: "${node.label}". Now click the target node.`;
                    } else if (connectSource.id !== node.id) {
                        createEdge(connectSource, node);
                        deselectAll();
                        connectSource = null;
                        hintBar.textContent = 'Edge created. Click another source or switch tools.';
                    }
                } else if (currentTool === 'select') {
                    deselectAll();
                    selectedNode = node;
                    shape.classList.add('selected');
                    dragging = node;
                    const pt = svgPoint(e);
                    dragOffset = { x: pt.x - node.x, y: pt.y - node.y };
                }
            });

            g.addEventListener('dblclick', e => {
                e.stopPropagation();
                const newLabel = prompt('Enter label:', node.label);
                if (newLabel !== null) {
                    node.label = newLabel;
                    text.textContent = newLabel;
                }
            });

            nodesGroup.appendChild(g);
        }

        function createEdge(from, to) {
            const edge = { from: from.id, to: to.id };
            edges.push(edge);
            renderEdge(edge);
        }

        function renderEdge(edge) {
            const from = nodes.find(n => n.id === edge.from);
            const to = nodes.find(n => n.id === edge.to);
            if (!from || !to) return;
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.classList.add('edge-line');
            line.setAttribute('x1', from.x);
            line.setAttribute('y1', from.y);
            line.setAttribute('x2', to.x);
            line.setAttribute('y2', to.y);
            line.setAttribute('marker-end', 'url(#arrowhead)');
            line.setAttribute('data-edge-from', edge.from);
            line.setAttribute('data-edge-to', edge.to);
            line.addEventListener('click', function() {
                if (confirm('Delete this edge?')) {
                    edges = edges.filter(e => !(e.from === edge.from && e.to === edge.to));
                    this.remove();
                }
            });
            edgesGroup.appendChild(line);
        }

        function updateEdges(nodeId) {
            const node = nodes.find(n => n.id === nodeId);
            if (!node) return;
            edgesGroup.querySelectorAll('line').forEach(line => {
                if (parseInt(line.dataset.edgeFrom) === nodeId) {
                    line.setAttribute('x1', node.x);
                    line.setAttribute('y1', node.y);
                }
                if (parseInt(line.dataset.edgeTo) === nodeId) {
                    line.setAttribute('x2', node.x);
                    line.setAttribute('y2', node.y);
                }
            });
        }

        function svgPoint(e) {
            const rect = svg.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (svg.viewBox.baseVal.width || rect.width) / rect.width,
                y: (e.clientY - rect.top) * (svg.viewBox.baseVal.height || rect.height) / rect.height
            };
        }

        svg.addEventListener('mousedown', e => {
            if (e.target === svg || e.target.classList.contains('grid-line')) {
                if (['process', 'decision', 'terminal', 'io'].includes(currentTool)) {
                    const pt = svgPoint(e);
                    createNode(currentTool, pt.x, pt.y);
                } else if (currentTool === 'select') {
                    deselectAll();
                }
            }
        });

        svg.addEventListener('mousemove', e => {
            if (dragging) {
                const pt = svgPoint(e);
                dragging.x = snap(pt.x - dragOffset.x);
                dragging.y = snap(pt.y - dragOffset.y);
                const g = nodesGroup.querySelector(`[data-node-id="${dragging.id}"]`);
                if (g) g.setAttribute('transform', `translate(${dragging.x}, ${dragging.y})`);
                updateEdges(dragging.id);
            }
        });

        svg.addEventListener('mouseup', () => { dragging = null; });

        window.deleteSelected = function() {
            if (!selectedNode) { alert('Select a node first.'); return; }
            const id = selectedNode.id;
            nodes = nodes.filter(n => n.id !== id);
            edges = edges.filter(e => e.from !== id && e.to !== id);
            const g = nodesGroup.querySelector(`[data-node-id="${id}"]`);
            if (g) g.remove();
            edgesGroup.querySelectorAll('line').forEach(line => {
                if (parseInt(line.dataset.edgeFrom) === id || parseInt(line.dataset.edgeTo) === id) {
                    line.remove();
                }
            });
            selectedNode = null;
        };

        document.addEventListener('keydown', e => {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (document.activeElement === document.body) {
                    window.deleteSelected();
                }
            }
        });

        window.exportSVG = function() {
            const clone = svg.cloneNode(true);
            // Remove grid
            const grid = clone.querySelector('g');
            if (grid) grid.remove();
            const svgData = new XMLSerializer().serializeToString(clone);
            const blob = new Blob([svgData], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'flowchart.svg';
            a.click();
            URL.revokeObjectURL(url);
        };

        // Resize handler
        window.addEventListener('resize', drawGrid);
    })();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
