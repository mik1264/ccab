<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuron &amp; Synapse - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 1rem;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); margin: 0.5rem 0; }
        .subtitle { color: var(--terracotta); margin-bottom: 0.75rem; }
        .controls {
            display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;
            justify-content: center; margin-bottom: 0.75rem;
        }
        button {
            font-family: 'Nunito', sans-serif; padding: 0.5rem 1.2rem;
            border: 2px solid var(--sage); background: rgba(255,255,255,0.7);
            color: var(--dark-moss); border-radius: 12px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; transition: all 0.2s;
        }
        button:hover { background: rgba(255,255,255,0.95); border-color: var(--moss); }
        button.active { background: var(--earth); color: white; border-color: var(--earth); }
        .diagram-area {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1rem;
            box-shadow: 0 8px 30px rgba(138,154,91,0.15);
            overflow: hidden;
        }
        .info-text {
            margin-top: 0.75rem; padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.7); border-radius: 10px;
            font-size: 0.85rem; text-align: center; max-width: 600px;
        }
        .action-potential {
            fill: #DDA15E;
            opacity: 0;
        }
        .ap-active {
            animation: apTravel 2s linear forwards;
        }
        @keyframes apTravel {
            0% { opacity: 0.9; }
            100% { opacity: 0; }
        }
        @keyframes pulse {
            0%,100% { r: 4; opacity: 0.7; }
            50% { r: 6; opacity: 1; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Neuron & Synapse</h1>
    <p class="subtitle">Anatomically detailed neuron with action potential animation</p>

    <div class="controls">
        <button id="fireBtn">Fire Action Potential</button>
        <button id="myelinToggle">Myelinated</button>
        <button id="synapseBtn">View Synapse Detail</button>
    </div>

    <div class="diagram-area">
        <svg id="neuronSvg" width="900" height="400" viewBox="0 0 900 400" role="img">
            <title>Neuron Anatomy</title>
            <desc>Anatomically detailed neuron showing soma, dendrites, axon, myelin sheaths, and axon terminals</desc>
        </svg>
    </div>
    <div class="info-text" id="infoText">Click "Fire Action Potential" to see signal propagation along the axon.</div>

    <script>
    (function() {
        const svg = document.getElementById('neuronSvg');
        const ns = 'http://www.w3.org/2000/svg';
        const fireBtn = document.getElementById('fireBtn');
        const myelinToggle = document.getElementById('myelinToggle');
        const synapseBtn = document.getElementById('synapseBtn');
        const infoText = document.getElementById('infoText');

        let myelinated = true;
        let viewMode = 'neuron'; // or 'synapse'
        let firing = false;

        myelinToggle.classList.add('active');
        myelinToggle.addEventListener('click', () => {
            myelinated = !myelinated;
            myelinToggle.classList.toggle('active', myelinated);
            myelinToggle.textContent = myelinated ? 'Myelinated' : 'Unmyelinated';
            drawNeuron();
        });

        synapseBtn.addEventListener('click', () => {
            if (viewMode === 'neuron') {
                viewMode = 'synapse';
                synapseBtn.textContent = 'View Full Neuron';
                drawSynapse();
            } else {
                viewMode = 'neuron';
                synapseBtn.textContent = 'View Synapse Detail';
                drawNeuron();
            }
        });

        function drawNeuron() {
            svg.innerHTML = '';
            svg.setAttribute('viewBox', '0 0 900 400');

            const somaX = 130, somaY = 200, somaR = 50;

            // Dendrites (branching paths from soma)
            const dendrites = [
                'M80,200 Q50,150 20,120 M50,150 Q30,130 10,140',
                'M80,200 Q40,180 10,170',
                'M80,200 Q50,220 20,250 M50,220 Q30,240 10,230',
                'M80,200 Q60,240 30,280 M60,240 Q40,260 15,270',
                'M80,200 Q50,170 25,150 M50,170 Q35,155 15,160',
                'M130,150 Q110,100 80,60 M110,100 Q90,80 70,90',
                'M130,150 Q140,100 130,50',
                'M130,250 Q120,300 100,340 M120,300 Q100,320 80,310',
            ];

            dendrites.forEach(d => {
                const path = document.createElementNS(ns, 'path');
                path.setAttribute('d', d);
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke', '#8A9A5B');
                path.setAttribute('stroke-width', '3');
                path.setAttribute('stroke-linecap', 'round');
                svg.appendChild(path);
            });

            // Soma (cell body)
            const soma = document.createElementNS(ns, 'circle');
            soma.setAttribute('cx', somaX); soma.setAttribute('cy', somaY); soma.setAttribute('r', somaR);
            soma.setAttribute('fill', 'rgba(138,154,91,0.3)');
            soma.setAttribute('stroke', '#606C38');
            soma.setAttribute('stroke-width', '2.5');
            svg.appendChild(soma);

            // Nucleus
            const nucleus = document.createElementNS(ns, 'circle');
            nucleus.setAttribute('cx', somaX); nucleus.setAttribute('cy', somaY); nucleus.setAttribute('r', 20);
            nucleus.setAttribute('fill', 'rgba(96,108,56,0.25)');
            nucleus.setAttribute('stroke', '#606C38');
            nucleus.setAttribute('stroke-width', '1.5');
            svg.appendChild(nucleus);

            // Nucleolus
            const nucleolus = document.createElementNS(ns, 'circle');
            nucleolus.setAttribute('cx', somaX + 5); nucleolus.setAttribute('cy', somaY - 3); nucleolus.setAttribute('r', 6);
            nucleolus.setAttribute('fill', '#606C38'); nucleolus.setAttribute('opacity', '0.4');
            svg.appendChild(nucleolus);

            // Axon hillock
            const hillock = document.createElementNS(ns, 'path');
            hillock.setAttribute('d', `M${somaX + somaR - 10},${somaY - 8} Q${somaX + somaR + 20},${somaY} ${somaX + somaR + 30},${somaY}`);
            hillock.setAttribute('fill', 'none');
            hillock.setAttribute('stroke', '#606C38');
            hillock.setAttribute('stroke-width', '6');
            svg.appendChild(hillock);

            // Axon line
            const axonStartX = somaX + somaR + 30;
            const axonEndX = 800;
            const axonY = somaY;

            const axon = document.createElementNS(ns, 'line');
            axon.setAttribute('x1', axonStartX); axon.setAttribute('y1', axonY);
            axon.setAttribute('x2', axonEndX); axon.setAttribute('y2', axonY);
            axon.setAttribute('stroke', '#606C38');
            axon.setAttribute('stroke-width', '4');
            svg.appendChild(axon);

            // Myelin sheaths or bare axon
            if (myelinated) {
                const myelinSegments = 6;
                const segmentWidth = (axonEndX - axonStartX - 60) / myelinSegments;
                const gap = 15; // Nodes of Ranvier

                for (let i = 0; i < myelinSegments; i++) {
                    const sx = axonStartX + 20 + i * segmentWidth;
                    const sw = segmentWidth - gap;

                    const sheath = document.createElementNS(ns, 'rect');
                    sheath.setAttribute('x', sx); sheath.setAttribute('y', axonY - 14);
                    sheath.setAttribute('width', sw); sheath.setAttribute('height', 28);
                    sheath.setAttribute('rx', 12);
                    sheath.setAttribute('fill', 'rgba(221,161,94,0.25)');
                    sheath.setAttribute('stroke', '#DDA15E');
                    sheath.setAttribute('stroke-width', '1.5');
                    svg.appendChild(sheath);

                    // Node of Ranvier label (for first gap)
                    if (i === 2) {
                        const nrX = sx + sw + gap / 2;
                        addLabel(nrX, axonY + 35, 'Node of Ranvier', '#BC6C25', nrX, axonY + 14);
                    }
                }
                addLabel(axonStartX + 20 + segmentWidth / 2, axonY - 25, 'Myelin Sheath', '#DDA15E');
            }

            // Axon terminals
            const terminals = [
                [axonEndX, axonY - 30],
                [axonEndX + 20, axonY],
                [axonEndX, axonY + 30],
                [axonEndX + 30, axonY - 15],
                [axonEndX + 30, axonY + 15]
            ];

            // Terminal branches
            terminals.forEach(([tx, ty]) => {
                const branch = document.createElementNS(ns, 'line');
                branch.setAttribute('x1', axonEndX - 20); branch.setAttribute('y1', axonY);
                branch.setAttribute('x2', tx); branch.setAttribute('y2', ty);
                branch.setAttribute('stroke', '#606C38');
                branch.setAttribute('stroke-width', '2');
                svg.appendChild(branch);

                const term = document.createElementNS(ns, 'circle');
                term.setAttribute('cx', tx); term.setAttribute('cy', ty);
                term.setAttribute('r', 8);
                term.setAttribute('fill', 'rgba(188,108,37,0.3)');
                term.setAttribute('stroke', '#BC6C25');
                term.setAttribute('stroke-width', '1.5');
                svg.appendChild(term);
            });

            // Labels
            addLabel(somaX, somaY + somaR + 20, 'Soma (Cell Body)', '#606C38');
            addLabel(somaX, somaY + 10, 'Nucleus', '#3d4423', null, null, 9);
            addLabel(40, 110, 'Dendrites', '#8A9A5B');
            addLabel(somaX + somaR + 35, axonY + 30, 'Axon Hillock', '#606C38');
            addLabel((axonStartX + axonEndX) / 2, axonY + 50, 'Axon', '#606C38');
            addLabel(axonEndX + 10, axonY + 55, 'Axon Terminals', '#BC6C25');

            // Action potential marker (hidden until fired)
            const apMarker = document.createElementNS(ns, 'circle');
            apMarker.setAttribute('cx', axonStartX);
            apMarker.setAttribute('cy', axonY);
            apMarker.setAttribute('r', 8);
            apMarker.setAttribute('class', 'action-potential');
            apMarker.id = 'apMarker';
            svg.appendChild(apMarker);

            // Speed indicator
            if (myelinated) {
                addLabel(450, 380, 'Saltatory conduction: ~120 m/s', '#8A9A5B', null, null, 10);
            } else {
                addLabel(450, 380, 'Continuous conduction: ~2 m/s', '#BC6C25', null, null, 10);
            }
        }

        function drawSynapse() {
            svg.innerHTML = '';
            svg.setAttribute('viewBox', '0 0 600 450');

            // Title
            addLabel(300, 25, 'Synaptic Junction (Detail View)', '#3d4423', null, null, 14);

            // Presynaptic terminal (large bulb)
            const preTerminal = document.createElementNS(ns, 'path');
            preTerminal.setAttribute('d', 'M100,80 Q100,40 200,40 Q350,40 350,120 Q350,200 200,200 Q100,200 100,140 Z');
            preTerminal.setAttribute('fill', 'rgba(138,154,91,0.2)');
            preTerminal.setAttribute('stroke', '#606C38');
            preTerminal.setAttribute('stroke-width', '2');
            svg.appendChild(preTerminal);

            // Synaptic vesicles
            const vesicles = [
                [160,80,12],[200,70,10],[240,85,11],[280,75,10],
                [150,120,10],[190,110,12],[230,115,10],[270,105,11],
                [180,150,10],[220,145,12],[260,140,10],[300,130,11],
            ];
            vesicles.forEach(([cx,cy,r]) => {
                const c = document.createElementNS(ns, 'circle');
                c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', r);
                c.setAttribute('fill', 'rgba(221,161,94,0.3)');
                c.setAttribute('stroke', '#DDA15E');
                c.setAttribute('stroke-width', '1.5');
                svg.appendChild(c);

                // Neurotransmitter dots inside
                for (let i = 0; i < 3; i++) {
                    const nx = cx + (Math.random() - 0.5) * r;
                    const ny = cy + (Math.random() - 0.5) * r;
                    const dot = document.createElementNS(ns, 'circle');
                    dot.setAttribute('cx', nx); dot.setAttribute('cy', ny);
                    dot.setAttribute('r', 2);
                    dot.setAttribute('fill', '#BC6C25');
                    svg.appendChild(dot);
                }
            });

            // Presynaptic membrane (bottom of terminal)
            const preMembrane = document.createElementNS(ns, 'line');
            preMembrane.setAttribute('x1', 100); preMembrane.setAttribute('y1', 200);
            preMembrane.setAttribute('x2', 350); preMembrane.setAttribute('y2', 200);
            preMembrane.setAttribute('stroke', '#606C38');
            preMembrane.setAttribute('stroke-width', '3');
            svg.appendChild(preMembrane);

            // Synaptic cleft
            const cleft = document.createElementNS(ns, 'rect');
            cleft.setAttribute('x', 80); cleft.setAttribute('y', 205);
            cleft.setAttribute('width', 290); cleft.setAttribute('height', 50);
            cleft.setAttribute('fill', 'rgba(200,220,240,0.3)');
            cleft.setAttribute('stroke', 'none');
            svg.appendChild(cleft);

            // Neurotransmitters diffusing in cleft
            const diffusingNT = [
                [140,215],[180,225],[220,218],[260,230],[300,220],
                [150,240],[200,235],[250,242],[290,238],
                [170,248],[230,250],[270,245]
            ];
            diffusingNT.forEach(([x,y]) => {
                const dot = document.createElementNS(ns, 'circle');
                dot.setAttribute('cx', x); dot.setAttribute('cy', y);
                dot.setAttribute('r', 3);
                dot.setAttribute('fill', '#BC6C25');
                dot.setAttribute('opacity', '0.7');
                // Simple animation
                const anim = document.createElementNS(ns, 'animate');
                anim.setAttribute('attributeName', 'cy');
                anim.setAttribute('values', `${y};${y+5};${y}`);
                anim.setAttribute('dur', `${1.5 + Math.random()}s`);
                anim.setAttribute('repeatCount', 'indefinite');
                dot.appendChild(anim);
                const anim2 = document.createElementNS(ns, 'animate');
                anim2.setAttribute('attributeName', 'cx');
                anim2.setAttribute('values', `${x};${x + (Math.random()-0.5)*10};${x}`);
                anim2.setAttribute('dur', `${2 + Math.random()}s`);
                anim2.setAttribute('repeatCount', 'indefinite');
                dot.appendChild(anim2);
                svg.appendChild(dot);
            });

            // Postsynaptic membrane
            const postMembrane = document.createElementNS(ns, 'line');
            postMembrane.setAttribute('x1', 80); postMembrane.setAttribute('y1', 260);
            postMembrane.setAttribute('x2', 370); postMembrane.setAttribute('y2', 260);
            postMembrane.setAttribute('stroke', '#8A9A5B');
            postMembrane.setAttribute('stroke-width', '3');
            svg.appendChild(postMembrane);

            // Receptors on postsynaptic membrane
            const receptors = [120, 160, 200, 240, 280, 320];
            receptors.forEach(x => {
                const receptor = document.createElementNS(ns, 'path');
                receptor.setAttribute('d', `M${x-8},260 L${x-5},250 L${x+5},250 L${x+8},260`);
                receptor.setAttribute('fill', 'none');
                receptor.setAttribute('stroke', '#606C38');
                receptor.setAttribute('stroke-width', '2');
                svg.appendChild(receptor);

                // Channel pore
                const pore = document.createElementNS(ns, 'line');
                pore.setAttribute('x1', x); pore.setAttribute('y1', 260);
                pore.setAttribute('x2', x); pore.setAttribute('y2', 275);
                pore.setAttribute('stroke', '#8A9A5B');
                pore.setAttribute('stroke-width', '2');
                pore.setAttribute('stroke-dasharray', '2,2');
                svg.appendChild(pore);
            });

            // Postsynaptic cell body (partial)
            const postCell = document.createElementNS(ns, 'path');
            postCell.setAttribute('d', 'M60,260 Q60,400 225,420 Q390,400 390,260');
            postCell.setAttribute('fill', 'rgba(138,154,91,0.12)');
            postCell.setAttribute('stroke', '#8A9A5B');
            postCell.setAttribute('stroke-width', '2');
            svg.appendChild(postCell);

            // Labels
            addLabel(225, 55, 'Presynaptic Terminal', '#606C38', null, null, 12);
            addLabel(225, 175, 'Synaptic Vesicles', '#DDA15E', null, null, 10);
            addLabel(400, 197, 'Presynaptic Membrane', '#606C38', null, null, 9);
            addLabel(420, 230, 'Synaptic Cleft', '#4a90d9', null, null, 10);
            addLabel(410, 258, 'Postsynaptic Membrane', '#8A9A5B', null, null, 9);
            addLabel(420, 280, 'Receptors', '#606C38', null, null, 9);
            addLabel(350, 230, 'Neurotransmitters', '#BC6C25', null, null, 9);
            addLabel(225, 390, 'Postsynaptic Cell', '#8A9A5B', null, null, 10);
            addLabel(200, 100, 'Vesicle contents', '#BC6C25', null, null, 8);

            // Mitochondria in presynaptic terminal
            const mito = document.createElementNS(ns, 'ellipse');
            mito.setAttribute('cx', 300); mito.setAttribute('cy', 160);
            mito.setAttribute('rx', 25); mito.setAttribute('ry', 12);
            mito.setAttribute('fill', 'rgba(188,108,37,0.15)');
            mito.setAttribute('stroke', '#BC6C25');
            mito.setAttribute('stroke-width', '1');
            svg.appendChild(mito);
            // Cristae
            for (let i = -15; i <= 15; i += 10) {
                const crista = document.createElementNS(ns, 'line');
                crista.setAttribute('x1', 300 + i); crista.setAttribute('y1', 152);
                crista.setAttribute('x2', 300 + i); crista.setAttribute('y2', 168);
                crista.setAttribute('stroke', 'rgba(188,108,37,0.3)');
                crista.setAttribute('stroke-width', '0.8');
                svg.appendChild(crista);
            }
            addLabel(300, 148, 'Mitochondrion', '#BC6C25', null, null, 8);

            infoText.textContent = 'Detailed view of the synaptic junction between two neurons.';
        }

        function addLabel(x, y, text, color, leaderX, leaderY, size) {
            if (leaderX !== undefined && leaderX !== null) {
                const line = document.createElementNS(ns, 'line');
                line.setAttribute('x1', x); line.setAttribute('y1', y);
                line.setAttribute('x2', leaderX); line.setAttribute('y2', leaderY);
                line.setAttribute('stroke', color || '#8A9A5B');
                line.setAttribute('stroke-width', '0.8');
                line.setAttribute('stroke-dasharray', '3,2');
                svg.appendChild(line);
            }

            const t = document.createElementNS(ns, 'text');
            t.setAttribute('x', x); t.setAttribute('y', y);
            t.setAttribute('text-anchor', 'middle');
            t.setAttribute('font-size', size || 11);
            t.setAttribute('fill', color || '#606C38');
            t.setAttribute('font-weight', '600');
            t.setAttribute('font-family', 'Nunito, sans-serif');
            t.textContent = text;
            svg.appendChild(t);
        }

        // Fire action potential
        fireBtn.addEventListener('click', () => {
            if (firing || viewMode !== 'neuron') return;
            firing = true;

            const apMarker = document.getElementById('apMarker');
            if (!apMarker) { firing = false; return; }

            const startX = 210;
            const endX = 800;
            const axonY = 200;
            const speed = myelinated ? 1200 : 300; // px/sec
            const duration = (endX - startX) / speed * 1000;

            apMarker.setAttribute('cx', startX);
            apMarker.setAttribute('opacity', '0.9');
            apMarker.setAttribute('r', myelinated ? 10 : 6);

            const startTime = performance.now();
            infoText.textContent = myelinated ?
                'Saltatory conduction: signal jumps between nodes of Ranvier.' :
                'Continuous conduction: signal travels along entire membrane.';

            function animateAP(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const cx = startX + (endX - startX) * progress;
                apMarker.setAttribute('cx', cx);

                // Pulse effect
                const pulseR = myelinated ? 10 + Math.sin(progress * 20) * 3 : 6 + Math.sin(progress * 40) * 2;
                apMarker.setAttribute('r', pulseR);

                if (progress < 1) {
                    requestAnimationFrame(animateAP);
                } else {
                    apMarker.setAttribute('opacity', '0');
                    firing = false;
                    infoText.textContent = 'Signal reached axon terminals. Click "Fire" again to repeat.';
                }
            }
            requestAnimationFrame(animateAP);
        });

        drawNeuron();
    })();
    </script>
</body>
</html>
