<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuit Schematic - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); margin: 1.5rem 0 0.5rem; text-align: center; }
        .subtitle { color: var(--terracotta); text-align: center; margin-bottom: 1rem; }
        .circuit-container {
            background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 1.5rem; border: 2px solid rgba(138,154,91,0.15);
            margin: 0 1rem;
        }
        .wire { stroke: #333; stroke-width: 2.5; fill: none; }
        .wire-animated {
            stroke: #606C38; stroke-width: 2.5; fill: none;
            stroke-dasharray: 8 6;
            animation: flowCurrent 0.6s linear infinite;
        }
        .wire-animated.off { animation: none; stroke: #999; stroke-dasharray: none; }
        @keyframes flowCurrent { to { stroke-dashoffset: -14; } }
        .component-label { font-family: 'Nunito', sans-serif; font-size: 11px; fill: var(--dark-moss); font-weight: 600; }
        .value-label { font-family: 'Nunito', sans-serif; font-size: 10px; fill: var(--terracotta); }
        .switch-area { cursor: pointer; }
        .calc-panel {
            background: rgba(255,255,255,0.75); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 1rem 1.5rem; margin-top: 1rem;
            border: 2px solid rgba(138,154,91,0.15);
            max-width: 700px; width: 100%;
        }
        .calc-panel h3 { font-family: 'Lora', serif; color: var(--moss); margin-bottom: 0.5rem; }
        .calc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.5rem; }
        .calc-item { font-size: 0.9rem; line-height: 1.6; }
        .calc-item strong { color: var(--terracotta); }
        .status-text { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Interactive Circuit Schematic</h1>
    <p class="subtitle">Click the switch to open/close the circuit. Current flow animates along wires.</p>

    <div class="circuit-container">
        <svg id="circuitSvg" width="700" height="380" viewBox="0 0 700 380" role="graphics-document" aria-label="Interactive DC circuit schematic">
            <title>DC Circuit Schematic</title>
            <desc>A DC circuit with a voltage source, three resistors (R1 in series, R2 and R3 in parallel), a capacitor, an LED, and a switch. Click the switch to toggle current flow.</desc>
            <defs>
                <marker id="arrowCurrent" markerWidth="6" markerHeight="4" refX="3" refY="2" orient="auto">
                    <path d="M0,0 L6,2 L0,4" fill="#606C38"/>
                </marker>
            </defs>

            <!-- Voltage Source (left side) -->
            <line class="wire-animated" x1="80" y1="60" x2="80" y2="120"/>
            <circle cx="80" cy="165" r="30" fill="none" stroke="#333" stroke-width="2.5"/>
            <line x1="72" y1="150" x2="88" y2="150" stroke="#333" stroke-width="2.5"/>
            <line x1="80" y1="142" x2="80" y2="158" stroke="#333" stroke-width="2.5"/>
            <line x1="72" y1="178" x2="88" y2="178" stroke="#333" stroke-width="2.5"/>
            <text class="component-label" x="38" y="168" text-anchor="middle">V₁</text>
            <text class="value-label" x="38" y="182" text-anchor="middle">12V DC</text>
            <text x="80" y="143" text-anchor="middle" font-size="10" fill="#333">+</text>
            <text x="80" y="196" text-anchor="middle" font-size="10" fill="#333">-</text>
            <line class="wire-animated" x1="80" y1="195" x2="80" y2="320"/>

            <!-- Bottom wire left to right -->
            <line class="wire-animated" x1="80" y1="320" x2="620" y2="320"/>

            <!-- Top wire from V+ to R1 -->
            <line class="wire-animated" x1="80" y1="60" x2="160" y2="60"/>

            <!-- R1 (series) -->
            <polyline points="160,60 168,48 182,72 196,48 210,72 224,48 232,60" fill="none" stroke="#333" stroke-width="2.5"/>
            <text class="component-label" x="196" y="42" text-anchor="middle">R₁</text>
            <text class="value-label" x="196" y="88" text-anchor="middle">100&#937;</text>

            <!-- Wire from R1 to junction -->
            <line class="wire-animated" x1="232" y1="60" x2="290" y2="60"/>

            <!-- Junction point top -->
            <circle cx="290" cy="60" r="4" fill="#333"/>

            <!-- R2 (parallel, top path) -->
            <line class="wire-animated" x1="290" y1="60" x2="290" y2="30"/>
            <line class="wire-animated" x1="290" y1="30" x2="310" y2="30"/>
            <polyline points="310,30 318,18 332,42 346,18 360,42 374,18 382,30" fill="none" stroke="#333" stroke-width="2.5"/>
            <text class="component-label" x="346" y="14" text-anchor="middle">R₂</text>
            <text class="value-label" x="346" y="55" text-anchor="middle">200&#937;</text>
            <line class="wire-animated" x1="382" y1="30" x2="420" y2="30"/>
            <line class="wire-animated" x1="420" y1="30" x2="420" y2="60"/>

            <!-- R3 (parallel, bottom path) -->
            <line class="wire-animated" x1="290" y1="60" x2="290" y2="100"/>
            <line class="wire-animated" x1="290" y1="100" x2="310" y2="100"/>
            <polyline points="310,100 318,88 332,112 346,88 360,112 374,88 382,100" fill="none" stroke="#333" stroke-width="2.5"/>
            <text class="component-label" x="346" y="126" text-anchor="middle">R₃</text>
            <text class="value-label" x="346" y="138" text-anchor="middle">300&#937;</text>
            <line class="wire-animated" x1="382" y1="100" x2="420" y2="100"/>
            <line class="wire-animated" x1="420" y1="100" x2="420" y2="60"/>

            <!-- Junction point bottom -->
            <circle cx="420" cy="60" r="4" fill="#333"/>

            <!-- Wire from parallel junction to capacitor -->
            <line class="wire-animated" x1="420" y1="60" x2="470" y2="60"/>

            <!-- Capacitor -->
            <line x1="470" y1="40" x2="470" y2="80" stroke="#333" stroke-width="3"/>
            <line x1="480" y1="40" x2="480" y2="80" stroke="#333" stroke-width="3"/>
            <text class="component-label" x="475" y="95" text-anchor="middle">C₁</text>
            <text class="value-label" x="475" y="107" text-anchor="middle">10&#956;F</text>

            <!-- Wire from capacitor to LED -->
            <line class="wire-animated" x1="480" y1="60" x2="530" y2="60"/>

            <!-- LED -->
            <polygon points="530,45 530,75 555,60" fill="none" stroke="#333" stroke-width="2.5"/>
            <line x1="555" y1="45" x2="555" y2="75" stroke="#333" stroke-width="2.5"/>
            <!-- LED arrows (light emission) -->
            <line x1="545" y1="42" x2="552" y2="32" stroke="#BC6C25" stroke-width="1.5"/>
            <line x1="550" y1="42" x2="557" y2="32" stroke="#BC6C25" stroke-width="1.5"/>
            <polygon points="551,30 554,34 549,34" fill="#BC6C25"/>
            <polygon points="556,30 559,34 554,34" fill="#BC6C25"/>
            <text class="component-label" x="543" y="92" text-anchor="middle">LED</text>
            <text class="value-label" x="543" y="104" text-anchor="middle">2V, 20mA</text>

            <!-- Wire from LED to switch -->
            <line class="wire-animated" x1="555" y1="60" x2="580" y2="60"/>

            <!-- Switch -->
            <g class="switch-area" id="switchGroup">
                <circle cx="580" cy="60" r="5" fill="#333"/>
                <circle cx="620" cy="60" r="5" fill="#333"/>
                <line id="switchArm" x1="580" y1="60" x2="620" y2="60" stroke="#333" stroke-width="3"/>
                <text class="component-label" x="600" y="45" text-anchor="middle">S₁</text>
            </g>

            <!-- Wire from switch down to bottom -->
            <line class="wire-animated" x1="620" y1="60" x2="620" y2="320"/>

            <!-- Current direction arrow -->
            <text class="status-text" id="statusText" x="350" y="290" text-anchor="middle" fill="#606C38">Circuit: CLOSED - Current Flowing</text>

            <!-- Current arrow indicator on bottom wire -->
            <line x1="200" y1="310" x2="500" y2="310" stroke="#606C38" stroke-width="1" marker-end="url(#arrowCurrent)" opacity="0.5"/>
            <text font-size="9" fill="#606C38" x="350" y="307" text-anchor="middle" opacity="0.6">conventional current</text>
        </svg>
    </div>

    <div class="calc-panel" id="calcPanel">
        <h3>Circuit Calculations (Ohm's Law)</h3>
        <div class="calc-grid" id="calcGrid"></div>
    </div>

    <script>
    (function(){
        const V = 12;
        const R1 = 100;
        const R2 = 200;
        const R3 = 300;
        const Vled = 2;

        // R2 || R3
        const Rparallel = (R2 * R3) / (R2 + R3); // 120 ohms
        const Rtotal = R1 + Rparallel;
        const Vresistors = V - Vled;
        const I = Vresistors / Rtotal; // total current
        const VR1 = I * R1;
        const Vparallel = I * Rparallel;
        const IR2 = Vparallel / R2;
        const IR3 = Vparallel / R3;

        const calcGrid = document.getElementById('calcGrid');
        function updateCalcs(closed) {
            const m = closed ? 1 : 0;
            calcGrid.innerHTML = `
                <div class="calc-item"><strong>R₂ || R₃:</strong> ${Rparallel.toFixed(1)} &#937;</div>
                <div class="calc-item"><strong>R_total:</strong> ${Rtotal.toFixed(1)} &#937;</div>
                <div class="calc-item"><strong>Total Current:</strong> ${(I * 1000 * m).toFixed(1)} mA</div>
                <div class="calc-item"><strong>V across R₁:</strong> ${(VR1 * m).toFixed(2)} V</div>
                <div class="calc-item"><strong>V across R₂/R₃:</strong> ${(Vparallel * m).toFixed(2)} V</div>
                <div class="calc-item"><strong>V across LED:</strong> ${(Vled * m).toFixed(1)} V</div>
                <div class="calc-item"><strong>I through R₂:</strong> ${(IR2 * 1000 * m).toFixed(1)} mA</div>
                <div class="calc-item"><strong>I through R₃:</strong> ${(IR3 * 1000 * m).toFixed(1)} mA</div>
            `;
        }

        let circuitClosed = true;
        const switchGroup = document.getElementById('switchGroup');
        const switchArm = document.getElementById('switchArm');
        const statusText = document.getElementById('statusText');
        const animatedWires = document.querySelectorAll('.wire-animated');

        updateCalcs(true);

        switchGroup.addEventListener('click', function() {
            circuitClosed = !circuitClosed;
            if (circuitClosed) {
                switchArm.setAttribute('x2', '620');
                switchArm.setAttribute('y2', '60');
                statusText.textContent = 'Circuit: CLOSED - Current Flowing';
                statusText.setAttribute('fill', '#606C38');
                animatedWires.forEach(w => w.classList.remove('off'));
            } else {
                switchArm.setAttribute('x2', '610');
                switchArm.setAttribute('y2', '35');
                statusText.textContent = 'Circuit: OPEN - No Current';
                statusText.setAttribute('fill', '#BC6C25');
                animatedWires.forEach(w => w.classList.add('off'));
            }
            updateCalcs(circuitClosed);
        });
    })();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
