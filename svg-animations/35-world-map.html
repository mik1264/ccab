<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Map - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 1rem;
        }
        .organic-shape {
            position: fixed; border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            opacity: 0.07; animation: morph 30s infinite ease-in-out;
            z-index: 0; pointer-events: none;
        }
        .shape-1 { width: 500px; height: 500px; background: var(--sage); top: -100px; left: -100px; }
        .shape-2 { width: 350px; height: 350px; background: var(--earth); bottom: -50px; right: -50px; animation-delay: -10s; }
        @keyframes morph {
            0%,100%{border-radius:63% 37% 54% 46%/55% 48% 52% 45%;}
            50%{border-radius:35% 65% 67% 33%/49% 45% 55% 51%;}
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); margin: 0.5rem 0; position: relative; z-index: 1; margin-top: 3.5rem; }
        .subtitle { color: var(--terracotta); margin-bottom: 1rem; position: relative; z-index: 1; }
        .main-card {
            background: rgba(255,255,255,0.78); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 1.25rem;
            box-shadow: 0 8px 30px rgba(138,154,91,0.15);
            position: relative; z-index: 1; max-width: 900px; width: 100%;
        }
        .controls-row {
            display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.75rem; align-items: center;
        }
        .dataset-btn {
            font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 700;
            padding: 0.4rem 0.9rem; border: none; border-radius: 15px; cursor: pointer; transition: all 0.25s;
            background: rgba(138,154,91,0.15); color: var(--moss);
        }
        .dataset-btn.active { background: var(--moss); color: white; }
        svg { display: block; width: 100%; border-radius: 12px; }
        .tooltip {
            position: fixed; background: rgba(30,40,20,0.92); color: #e8eed8;
            padding: 0.5rem 0.8rem; border-radius: 10px; font-size: 0.82rem; font-weight: 600;
            pointer-events: none; z-index: 200; display: none; max-width: 200px;
        }
        .legend {
            display: flex; align-items: center; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap;
        }
        .legend-label { font-size: 0.78rem; color: var(--dark-moss); }
        .legend-gradient {
            width: 180px; height: 12px; border-radius: 6px;
        }
        .legend-note { font-size: 0.72rem; color: var(--sage); margin-top: 0.25rem; }
    </style>
</head>
<body>
    <div class="organic-shape shape-1"></div>
    <div class="organic-shape shape-2"></div>
    <a href="../index.html" class="back-link">← Back to Gallery</a>
    <h1>World Map</h1>
    <p class="subtitle">Hover countries to explore data — click to zoom</p>
    <div class="tooltip" id="tooltip"></div>

    <div class="main-card">
        <div class="controls-row">
            <span style="font-size:0.82rem;font-weight:700;color:var(--moss)">Dataset:</span>
            <button class="dataset-btn active" onclick="setDataset('population')">Population Density</button>
            <button class="dataset-btn" onclick="setDataset('gdp')">GDP per Capita</button>
            <button class="dataset-btn" onclick="setDataset('life')">Life Expectancy</button>
        </div>
        <svg id="worldSvg" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#b8d4f0"/><stop offset="100%" stop-color="#8ab8e0"/>
                </linearGradient>
                <filter id="pulseFilt"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <rect width="900" height="460" fill="url(#oceanGrad)" rx="12"/>
            <!-- Grid lines -->
            <g stroke="rgba(100,150,200,0.3)" stroke-width="0.5" fill="none">
                <line x1="0" y1="230" x2="900" y2="230"/>
                <line x1="450" y1="0" x2="450" y2="460"/>
                <line x1="0" y1="115" x2="900" y2="115"/>
                <line x1="0" y1="345" x2="900" y2="345"/>
                <line x1="225" y1="0" x2="225" y2="460"/>
                <line x1="675" y1="0" x2="675" y2="460"/>
            </g>
            <g id="countries"></g>
            <g id="pulseGroup"></g>
        </svg>

        <div class="legend">
            <span class="legend-label" id="legLow">Low</span>
            <canvas id="legendGrad" width="180" height="12" class="legend-gradient" style="border-radius:6px"></canvas>
            <span class="legend-label" id="legHigh">High</span>
        </div>
        <div class="legend-note" id="legNote">Source: World Bank 2023 estimates</div>
    </div>

    <script>
    // Simplified country shapes using approximate SVG paths
    // Using equirectangular projection: lon → x = (lon+180)/360*900, lat → y = (90-lat)/180*460
    function lonLatToXY(lon, lat) {
        return [(lon+180)/360*900, (90-lat)/180*460];
    }
    function polyPath(pts) {
        return 'M '+pts.map(([lon,lat])=>lonLatToXY(lon,lat).map(v=>v.toFixed(1)).join(',')).join(' L ')+' Z';
    }

    // Country data: simplified polygons + data values
    const countries = [
        { id:'USA', name:'United States',

          population: 275, gdp: 45000, life: 81 },
        { id:'FRA', name:'France',

          population: 118, gdp: 40000, life: 82 },
        { id:'DEU', name:'Germany',
          shape: [[6,51],[15,51],[15,47],[8,47],[6,49],[6,51]],
          population: 235, gdp: 48000, life: 81 },
        { id:'ITA', name:'Italy',
          shape: [[7,44],[14,44],[15,41],[16,38],[14,37],[12,38],[10,43],[7,44]],
          population: 201, gdp: 33000, life: 83 },
        { id:'ESP', name:'Spain',
          shape: [[-9,44],[3,44],[3,36],[-5,36],[-9,39],[-9,44]],
          population: 94, gdp: 29000, life: 83 },
        { id:'RUS', name:'Russia',
          shape: [[28,70],[170,70],[170,50],[140,46],[80,46],[60,55],[40,65],[28,70]],
          population: 9, gdp: 12000, life: 73 },
        { id:'CHN', name:'China',

          population: 148, gdp: 4100, life: 71 },

        { id:'COD', name:'DR Congo',
          shape: [[16,5],[30,5],[30,-13],[16,-13],[16,5]],
          population: 41, gdp: 550, life: 61 },
        { id:'TZA', name:'Tanzania',
          shape: [[30,-2],[40,-2],[40,-12],[30,-12],[30,-2]],
          population: 73, gdp: 1100, life: 65 },

          shape: [[37,32],[56,32],[56,16],[44,14],[37,20],[37,32]],
          population: 15, gdp: 22000, life: 76 },

          shape: [[44,39],[63,39],[63,25],[56,25],[48,26],[44,30],[44,39]],
          population: 52, gdp: 6000, life: 77 },
        { id:'TUR', name:'Turkey',
          shape: [[26,42],[44,42],[44,36],[36,36],[26,38],[26,42]],
          population: 108, gdp: 10500, life: 78 },
        { id:'SWE', name:'Sweden',
          shape: [[11,56],[24,68],[22,70],[11,68],[10,60],[11,56]],
          population: 25, gdp: 55000, life: 83 },
        { id:'NOR', name:'Norway',
          shape: [[4,58],[10,58],[28,70],[18,71],[5,70],[4,60],[4,58]],
          population: 15, gdp: 90000, life: 83 },
        { id:'POL', name:'Poland',
          shape: [[14,51],[24,51],[24,49],[14,49],[14,51]],
          population: 123, gdp: 17000, life: 78 },
        { id:'UKR', name:'Ukraine',
          shape: [[22,52],[40,52],[40,44],[32,44],[22,46],[22,52]],
          population: 75, gdp: 4000, life: 73 },
        { id:'VNM', name:'Vietnam',
          shape: [[102,23],[109,23],[109,10],[104,10],[102,12],[102,23]],
          population: 308, gdp: 3300, life: 75 },
        { id:'THA', name:'Thailand',
          shape: [[98,20],[105,20],[105,6],[100,6],[98,10],[98,20]],
          population: 137, gdp: 7000, life: 77 },
        { id:'MYS', name:'Malaysia',
          shape: [[100,6],[119,6],[119,1],[114,1],[103,1],[100,3],[100,6]],
          population: 99, gdp: 11000, life: 76 },
        { id:'COL2', name:'Colombia', skip:true }, // already added
        { id:'MMR', name:'Myanmar',
          shape: [[92,28],[101,28],[101,16],[96,16],[92,20],[92,28]],
          population: 82, gdp: 1200, life: 68 },
        { id:'AGO', name:'Angola',
          shape: [[12,-5],[24,-5],[24,-18],[12,-18],[12,-5]],
          population: 26, gdp: 3400, life: 61 },
        { id:'KAZ', name:'Kazakhstan',
          shape: [[50,55],[80,55],[80,41],[52,41],[50,45],[50,55]],
          population: 7, gdp: 9500, life: 73 },
        { id:'GRC', name:'Greece',
          shape: [[20,42],[26,42],[28,36],[24,35],[20,38],[20,42]],
          population: 83, gdp: 19000, life: 82 },
        { id:'ROM', name:'Romania',
          shape: [[22,48],[30,48],[30,44],[22,44],[22,48]],
          population: 86, gdp: 14000, life: 76 },
    ];

    // Datasets
    const datasets = {
        population: { key:'population', label:'Population Density (per km²)', low:'#e0f0c8', high:'#1a4a08', unit:'/km²', low_val:0, high_val:1300, note:'Population density: persons per km²' },
        gdp: { key:'gdp', label:'GDP per Capita (USD)', low:'#fff3cc', high:'#b35c00', unit:'$', low_val:0, high_val:90000, note:'GDP per capita in USD (World Bank 2023)' },
        life: { key:'life', label:'Life Expectancy (years)', low:'#cce0ff', high:'#003388', unit:'yr', low_val:50, high_val:90, note:'Life expectancy at birth in years' }
    };

    let currentDataset = 'population';
    let hoveredId = null;
    let pulseAnim = {};

    function hexToRgb(hex) {
        const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
        return [r,g,b];
    }
    function interpolateColor(low, high, t) {
        const [r1,g1,b1]=hexToRgb(low), [r2,g2,b2]=hexToRgb(high);
        const r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b=Math.round(b1+(b2-b1)*t);
        return `rgb(${r},${g},${b})`;
    }
    function getColor(country, ds) {
        const d = datasets[ds];
        const val = country[d.key];
        const t = Math.max(0,Math.min(1,(val-d.low_val)/(d.high_val-d.low_val)));
        return interpolateColor(d.low, d.high, t);
    }

    const svg = document.getElementById('worldSvg');
    const gCountries = document.getElementById('countries');
    const tooltip = document.getElementById('tooltip');

    function buildMap() {
        gCountries.innerHTML = '';
        countries.filter(c=>!c.skip).forEach(c => {
            const path = document.createElementNS('http://www.w3.org/2000/svg','path');
            path.setAttribute('d', polyPath(c.shape));
            path.setAttribute('data-id', c.id);
            path.setAttribute('fill', getColor(c, currentDataset));
            path.setAttribute('stroke', 'rgba(255,255,255,0.6)');
            path.setAttribute('stroke-width', '0.8');
            path.style.cursor = 'pointer';
            path.style.transition = 'filter 0.2s';

            path.addEventListener('mouseenter', e => {
                path.setAttribute('filter','url(#pulseFilt)');
                path.setAttribute('stroke','rgba(255,255,255,1)');
                path.setAttribute('stroke-width','1.5');
                const ds = datasets[currentDataset];
                const val = c[ds.key];
                tooltip.style.display='block';
                tooltip.innerHTML=`<strong>${c.name}</strong><br>${ds.label.split('(')[0]}: <span style="color:#ffdd88">${ds.unit==='$'?'$'+val.toLocaleString():val+' '+ds.unit}</span>`;
                hoveredId = c.id;
            });
            path.addEventListener('mousemove', e => {
                tooltip.style.left=(e.clientX+12)+'px';
                tooltip.style.top=(e.clientY-30)+'px';
            });
            path.addEventListener('mouseleave', () => {
                path.removeAttribute('filter');
                path.setAttribute('stroke','rgba(255,255,255,0.6)');
                path.setAttribute('stroke-width','0.8');
                tooltip.style.display='none';
                hoveredId=null;
            });
            path.addEventListener('click', () => {
                // Pulse animation
                startPulse(c);
            });
            gCountries.appendChild(path);
        });
        updateLegend();
    }

    function startPulse(c) {
        const pg = document.getElementById('pulseGroup');
        // Calculate centroid of shape
        const cx = c.shape.reduce((s,p)=>s+lonLatToXY(p[0],p[1])[0],0)/c.shape.length;
        const cy = c.shape.reduce((s,p)=>s+lonLatToXY(p[0],p[1])[1],0)/c.shape.length;
        const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
        circle.setAttribute('cx',cx); circle.setAttribute('cy',cy); circle.setAttribute('r','0');
        circle.setAttribute('fill','none'); circle.setAttribute('stroke','rgba(255,220,50,0.8)'); circle.setAttribute('stroke-width','2');
        pg.appendChild(circle);
        let r=0, alpha=0.8;
        function animPulse() {
            r+=1; alpha=Math.max(0,0.8-r/40);
            circle.setAttribute('r',r);
            circle.setAttribute('stroke',`rgba(255,220,50,${alpha})`);
            if(alpha>0) requestAnimationFrame(animPulse);
            else pg.removeChild(circle);
        }
        animPulse();
    }

    function updateLegend() {
        const ds = datasets[currentDataset];
        const cv = document.getElementById('legendGrad');
        const ct = cv.getContext('2d');
        const grd = ct.createLinearGradient(0,0,180,0);
        grd.addColorStop(0,ds.low); grd.addColorStop(1,ds.high);
        ct.fillStyle=grd; ct.fillRect(0,0,180,12);
        document.getElementById('legLow').textContent = ds.unit==='$'?'$'+ds.low_val:ds.low_val+ds.unit;
        document.getElementById('legHigh').textContent = ds.unit==='$'?'$'+ds.high_val.toLocaleString():ds.high_val+ds.unit;
        document.getElementById('legNote').textContent = ds.note;
    }

    function setDataset(ds) {
        currentDataset = ds;
        document.querySelectorAll('.dataset-btn').forEach((b,i)=>{
            b.classList.toggle('active',['population','gdp','life'][i]===ds);
        });
        // Animate color transition
        countries.filter(c=>!c.skip).forEach(c=>{
            const path=gCountries.querySelector(`[data-id="${c.id}"]`);
            if(path) path.setAttribute('fill',getColor(c,ds));
        });
        updateLegend();
    }

    buildMap();

    // Gentle pulse on a random country every few seconds
    let autoIdx=0;
    const autoPulseCountries = countries.filter(c=>!c.skip);
    setInterval(() => {
        const c=autoPulseCountries[autoIdx%autoPulseCountries.length];
        startPulse(c); autoIdx++;
    }, 2500);
    </script>
</body>
</html>
