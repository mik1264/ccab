<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scale of the Universe - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: #080818; color: #e0e8ff;
            min-height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: #dda15e; text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.1);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.2); transform: translateX(-3px); }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        .hud {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,8,0.7); backdrop-filter: blur(10px);
            padding: 1rem 2rem; display: flex; align-items: center; gap: 1.5rem;
            border-top: 1px solid rgba(100,120,220,0.3); z-index: 50; flex-wrap: wrap;
        }
        .hud-info { flex: 1; min-width: 200px; }
        .hud-name { font-family: 'Lora', serif; font-size: 1.4rem; color: #ffd080; }
        .hud-size { font-size: 0.95rem; color: #a0b0e0; }
        .hud-desc { font-size: 0.85rem; color: #8090c0; margin-top: 0.2rem; }
        .hud-compare { font-size: 0.82rem; color: #dda15e; margin-top: 0.25rem; font-style: italic; }
        .nav-btns { display: flex; gap: 0.75rem; align-items: center; }
        button {
            font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 700;
            padding: 0.5rem 1.25rem; border: none; border-radius: 20px; cursor: pointer; transition: all 0.3s;
        }
        .btn-zoom { background: rgba(100,130,255,0.25); color: #a0b8ff; border: 1px solid rgba(100,130,255,0.4); }
        .btn-zoom:hover { background: rgba(100,130,255,0.4); }
        .btn-zoom:disabled { opacity: 0.3; cursor: not-allowed; }
        .scale-bar {
            display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
            min-width: 160px;
        }
        .scale-bar-track {
            width: 150px; height: 6px; background: rgba(100,120,255,0.2);
            border-radius: 3px; overflow: hidden;
        }
        .scale-bar-fill { height: 100%; background: linear-gradient(90deg,#4466ff,#88aaff); border-radius: 3px; transition: width 0.5s ease; }
        .scale-label { font-size: 0.75rem; color: #6080c0; }
        .level-dots { display: flex; gap: 4px; }
        .level-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(100,130,255,0.3); transition: all 0.3s; cursor: pointer; }
        .level-dot.active { background: #88aaff; }
        .hint { position: fixed; top: 50%; right: 1.5rem; transform: translateY(-50%); z-index: 50;
            display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-end; }
        .hint-text { font-size: 0.78rem; color: rgba(160,176,224,0.6); background: rgba(0,0,20,0.5);
            padding: 0.25rem 0.6rem; border-radius: 10px; white-space: nowrap; }
        title { display: none; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Back to Gallery</a>
    <canvas id="canvas"></canvas>

    <div class="hint">
        <div class="hint-text">Scroll or click buttons</div>
        <div class="hint-text">to zoom through scales</div>
    </div>

    <div class="hud">
        <div class="hud-info">
            <div class="hud-name" id="hudName">Quark</div>
            <div class="hud-size" id="hudSize">~10⁻¹⁸ m (1 attometer)</div>
            <div class="hud-desc" id="hudDesc">The fundamental constituents of protons and neutrons</div>
            <div class="hud-compare" id="hudCompare">3 quarks make a proton</div>
        </div>
        <div class="scale-bar">
            <div class="scale-label">Cosmic Scale</div>
            <div class="scale-bar-track"><div class="scale-bar-fill" id="scaleFill" style="width:0%"></div></div>
            <div class="level-dots" id="levelDots"></div>
        </div>
        <div class="nav-btns">
            <button class="btn-zoom" id="zoomOutBtn">◀ Zoom Out</button>
            <button class="btn-zoom" id="zoomInBtn">Zoom In ▶</button>
        </div>
    </div>

    <script>
    const scales = [
        { name:'Quark', size:'~10⁻¹⁸ m', unit:'1 am', desc:'Fundamental constituents of protons and neutrons', compare:'3 quarks make a proton', radius:4, color:'#ff44cc', starDensity:0, bgColor:'#100008' },
        { name:'Proton', size:'~10⁻¹⁵ m', unit:'1 fm', desc:'Positively charged particle in the atomic nucleus, made of 3 quarks', compare:'1000× larger than a quark', radius:10, color:'#ff8844', starDensity:0, bgColor:'#180808' },
        { name:'Atom', size:'~10⁻¹⁰ m', unit:'1 Ångström', desc:'The basic unit of matter — nucleus surrounded by electron cloud', compare:'100,000× larger than its nucleus', radius:22, color:'#44aaff', starDensity:0.02, bgColor:'#040820' },
        { name:'Bacterium', size:'~10⁻⁶ m', unit:'1 micrometer', desc:'Single-celled microorganisms — the simplest form of life', compare:'10,000 atoms across', radius:35, color:'#88dd44', starDensity:0.05, bgColor:'#041808' },
        { name:'Ant', size:'~10⁻³ m', unit:'1 mm – 1 cm', desc:'Common ant — one of the most successful organisms on Earth', compare:'1 million bacteria long', radius:20, color:'#cc8833', starDensity:0.05, bgColor:'#181008' },
        { name:'Human', size:'~1.7 m', unit:'~6 feet', desc:'Average adult human — made of ~37 trillion cells', compare:'1700× taller than an ant', radius:18, color:'#ffcc66', starDensity:0.05, bgColor:'#101818' },
        { name:'Mountain', size:'~10³ m', unit:'~1 km – 8 km', desc:'Everest at 8,849 m is the tallest peak on Earth', compare:'~5000× taller than a human', radius:55, color:'#99bbcc', starDensity:0.1, bgColor:'#101828' },
        { name:'Earth', size:'~10⁷ m', unit:'12,742 km diameter', desc:'Our home planet — one of 8 planets orbiting the Sun', compare:'12 million times taller than Everest', radius:60, color:'#4488ff', starDensity:0.3, bgColor:'#080818' },
        { name:'Solar System', size:'~10¹² m', unit:'~100 AU across', desc:'The Sun and all objects gravitationally bound to it', compare:'10,000 Earth diameters across', radius:65, color:'#ffee88', starDensity:0.6, bgColor:'#040814' },
        { name:'Milky Way', size:'~10²¹ m', unit:'100,000 light-years', desc:'Our home galaxy — a barred spiral with 200–400 billion stars', compare:'100 million Solar Systems across', radius:80, color:'#ccaaff', starDensity:0.9, bgColor:'#030810' },
        { name:'Observable Universe', size:'~10²⁶ m', unit:'93 billion light-years', desc:'Everything we can possibly see — about 2 trillion galaxies', compare:'100,000 Milky Way diameters', radius:90, color:'#88ccff', starDensity:1.0, bgColor:'#020408' }
    ];

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let currentLevel = 0;
    let targetLevel = 0;
    let animT = 1; // 1 = fully at currentLevel
    let animating = false;
    let stars = [];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        generateStars();
    }
    window.addEventListener('resize', resize);

    function generateStars() {
        stars = [];
        for (let i = 0; i < 400; i++) {
            stars.push({ x: Math.random()*W, y: Math.random()*(H-120), r: Math.random()*1.5+0.3, brightness: Math.random() });
        }
    }

    // Level dots
    const dotsEl = document.getElementById('levelDots');
    scales.forEach((s,i) => {
        const d = document.createElement('div');
        d.className = 'level-dot';
        d.title = s.name;
        d.onclick = () => goTo(i);
        dotsEl.appendChild(d);
    });
    function updateDots(idx) {
        dotsEl.querySelectorAll('.level-dot').forEach((d,i) => d.classList.toggle('active',i===idx));
    }

    function lerp(a,b,t){return a+(b-a)*t;}
    function easeInOut(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

    function drawStars(density, alpha) {
        ctx.save();
        stars.forEach(s => {
            const brightness = s.brightness * density * alpha;
            if (brightness < 0.05) return;
            const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r*2);
            grd.addColorStop(0, `rgba(200,220,255,${brightness})`);
            grd.addColorStop(1, 'rgba(200,220,255,0)');
            ctx.fillStyle = grd;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r*2, 0, Math.PI*2); ctx.fill();
        });
        ctx.restore();
    }

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return [r,g,b];
    }

    function drawLevel(level, alpha, scale_mult=1) {
        const s = scales[level];
        ctx.save();
        ctx.globalAlpha = alpha;

        // Draw object
        const cx = W/2, cy = H/2 - 60;
        const r = s.radius * scale_mult * Math.min(W,H) / 400;

        switch(level) {
            case 0: // quark - small glowing dot
                drawGlow(ctx, cx, cy, r, s.color, 3);
                break;
            case 1: // proton - sphere with quarks inside
                drawGlow(ctx, cx, cy, r, s.color, 2);
                [-r*0.35,r*0.2,0].forEach((dx,i) => {
                    const dy = i===0?r*0.2:i===1?r*0.2:-r*0.4;
                    drawGlow(ctx, cx+dx, cy+dy, r*0.18, ['#ff44ff','#44ffff','#ffff44'][i], 1.5);
                });
                break;
            case 2: // atom - nucleus + electron orbits
                drawGlow(ctx, cx, cy, r*0.25, s.color, 2);
                for (let o=0;o<3;o++) {
                    ctx.strokeStyle = `rgba(100,160,255,${alpha*0.5})`;
                    ctx.lineWidth = 1;
                    ctx.setLineDash([4,4]);
                    ctx.beginPath();
                    ctx.ellipse(cx, cy, r, r*0.35, o*Math.PI/3, 0, Math.PI*2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                break;
            case 3: // bacterium - oval shape
                const gBact = ctx.createRadialGradient(cx-r*0.2,cy-r*0.2,0,cx,cy,r);
                gBact.addColorStop(0, '#aaffaa'); gBact.addColorStop(1, '#22aa22');
                ctx.fillStyle = gBact;
                ctx.beginPath(); ctx.ellipse(cx, cy, r, r*1.8, 0.3, 0, Math.PI*2); ctx.fill();
                break;
            case 4: // ant - simple body segments
                ctx.fillStyle = s.color;
                [[-r,0,r*0.8],[0,r*0.3,r],[r*1.2,0,r*0.7]].forEach(([dx,dy,sr]) => {
                    const g2=ctx.createRadialGradient(cx+dx,cy+dy,0,cx+dx,cy+dy,sr);
                    g2.addColorStop(0,'#ffcc88'); g2.addColorStop(1,'#884400');
                    ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(cx+dx,cy+dy,sr,0,Math.PI*2); ctx.fill();
                });
                break;
            case 5: // human - simple silhouette
                ctx.fillStyle = '#ffcc88';
                ctx.beginPath(); ctx.arc(cx, cy-r*1.4, r*0.5, 0, Math.PI*2); ctx.fill(); // head
                ctx.fillRect(cx-r*0.4, cy-r*0.9, r*0.8, r*1.2); // body
                ctx.fillRect(cx-r*0.7, cy+r*0.3, r*0.3, r*0.9); // legs
                ctx.fillRect(cx+r*0.4, cy+r*0.3, r*0.3, r*0.9);
                break;
            case 6: // mountain
                ctx.fillStyle = '#99bbcc';
                ctx.beginPath(); ctx.moveTo(cx, cy-r*1.8); ctx.lineTo(cx-r*1.5, cy+r*0.8); ctx.lineTo(cx+r*1.5, cy+r*0.8); ctx.closePath(); ctx.fill();
                ctx.fillStyle = 'white'; ctx.beginPath();
                ctx.moveTo(cx, cy-r*1.8); ctx.lineTo(cx-r*0.4, cy-r*1.2); ctx.lineTo(cx+r*0.4, cy-r*1.2); ctx.closePath(); ctx.fill();
                break;
            case 7: // Earth
                const gEarth = ctx.createRadialGradient(cx-r*0.3, cy-r*0.3, 0, cx, cy, r);
                gEarth.addColorStop(0,'#88aaff'); gEarth.addColorStop(0.5,'#4477dd'); gEarth.addColorStop(1,'#224488');
                ctx.fillStyle = gEarth; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
                // continents
                ctx.fillStyle = '#55aa55';
                ctx.beginPath(); ctx.ellipse(cx-r*0.2, cy-r*0.1, r*0.35, r*0.4, -0.3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(cx+r*0.3, cy+r*0.1, r*0.25, r*0.35, 0.4, 0, Math.PI*2); ctx.fill();
                break;
            case 8: // Solar system
                const gSun = ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.18);
                gSun.addColorStop(0,'#ffffaa'); gSun.addColorStop(1,'#ffaa00');
                ctx.fillStyle=gSun; ctx.beginPath(); ctx.arc(cx,cy,r*0.18,0,Math.PI*2); ctx.fill();
                const planetColors=['#aaaaaa','#ddcc88','#4488ff','#ff6644'];
                [0.35,0.5,0.68,0.88].forEach((dist,i)=>{
                    ctx.strokeStyle=`rgba(200,200,255,0.2)`; ctx.lineWidth=1;
                    ctx.beginPath(); ctx.arc(cx,cy,r*dist,0,Math.PI*2); ctx.stroke();
                    const angle=i*1.3+performance.now()*0.0003*(4-i);
                    ctx.fillStyle=planetColors[i]; ctx.beginPath();
                    ctx.arc(cx+Math.cos(angle)*r*dist, cy+Math.sin(angle)*r*dist, r*0.05+i*r*0.02, 0, Math.PI*2); ctx.fill();
                });
                break;
            case 9: // Milky Way
                const gGal=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
                gGal.addColorStop(0,'rgba(220,200,255,0.9)'); gGal.addColorStop(0.3,'rgba(160,140,220,0.6)'); gGal.addColorStop(1,'rgba(80,60,160,0)');
                ctx.save(); ctx.translate(cx,cy); ctx.rotate(0.3); ctx.scale(1,0.4);
                ctx.fillStyle=gGal; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
                ctx.restore();
                // spiral arms
                for(let arm=0;arm<2;arm++) {
                    ctx.beginPath(); ctx.strokeStyle=`rgba(200,180,255,0.4)`; ctx.lineWidth=r*0.08;
                    for(let t=0;t<Math.PI*3;t+=0.1) {
                        const ar=t/(Math.PI*3)*r*0.9;
                        const ax=cx+Math.cos(t+arm*Math.PI)*ar*1.2;
                        const ay=cy+Math.sin(t+arm*Math.PI)*ar*0.4;
                        if(t<0.1)ctx.moveTo(ax,ay); else ctx.lineTo(ax,ay);
                    }
                    ctx.stroke();
                }
                break;
            case 10: // Observable Universe
                for(let i=0;i<200;i++) {
                    const ang=Math.random()*Math.PI*2;
                    const dist=(0.2+Math.random()*0.75)*r;
                    const gx=cx+Math.cos(ang)*dist, gy=cy+Math.sin(ang)*dist*0.7;
                    const gr=1.5+Math.random()*4;
                    const galGr=ctx.createRadialGradient(gx,gy,0,gx,gy,gr);
                    const colors=['rgba(200,180,255,','rgba(255,220,180,','rgba(160,200,255,'];
                    const c=colors[Math.floor(Math.random()*3)];
                    galGr.addColorStop(0,c+'0.9)'); galGr.addColorStop(1,c+'0)');
                    ctx.fillStyle=galGr; ctx.beginPath(); ctx.arc(gx,gy,gr,0,Math.PI*2); ctx.fill();
                }
                const outerGlow=ctx.createRadialGradient(cx,cy,r*0.5,cx,cy,r);
                outerGlow.addColorStop(0,'rgba(100,80,160,0)'); outerGlow.addColorStop(1,'rgba(40,30,80,0.4)');
                ctx.fillStyle=outerGlow; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
                break;
        }
        ctx.restore();
    }

    function drawGlow(ctx, x, y, r, color, intensity) {
        const g = ctx.createRadialGradient(x,y,0,x,y,r*3);
        const [rr,gg,bb] = hexToRgb(color);
        g.addColorStop(0,`rgba(${rr},${gg},${bb},${intensity*0.8})`);
        g.addColorStop(0.4,`rgba(${rr},${gg},${bb},${intensity*0.3})`);
        g.addColorStop(1,`rgba(${rr},${gg},${bb},0)`);
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r*3,0,Math.PI*2); ctx.fill();
        const g2=ctx.createRadialGradient(x-r*0.2,y-r*0.2,0,x,y,r);
        g2.addColorStop(0,'rgba(255,255,255,0.9)'); g2.addColorStop(1,`rgba(${rr},${gg},${bb},0.7)`);
        ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }

    function updateHUD(level) {
        const s = scales[level];
        document.getElementById('hudName').textContent = s.name;
        document.getElementById('hudSize').textContent = `${s.size} (${s.unit})`;
        document.getElementById('hudDesc').textContent = s.desc;
        document.getElementById('hudCompare').textContent = s.compare;
        document.getElementById('scaleFill').style.width = (level/(scales.length-1)*100)+'%';
        updateDots(level);
        document.getElementById('zoomOutBtn').disabled = level===0;
        document.getElementById('zoomInBtn').disabled = level===scales.length-1;
    }

    let transitionT = 1;
    let fromLevel = 0;
    let toLevel = 0;
    let transStart = null;
    const TRANS_DUR = 800;

    function render(ts) {
        if (!transStart && transitionT < 1) transStart = ts;

        // Background
        const s = scales[toLevel];
        const sf = scales[fromLevel];
        const t = transitionT;
        ctx.fillStyle = s.bgColor;
        ctx.fillRect(0, 0, W, H);

        // Stars
        const starDensity = lerp(sf.starDensity, s.starDensity, easeInOut(t));
        drawStars(starDensity, 1);

        // Title
        const titleAlpha = lerp(1-t*2, 1, Math.max(0, (t-0.5)*2));
        if (t < 0.5) {
            ctx.save(); ctx.globalAlpha = Math.max(0, 1-t*2);
            drawLevel(fromLevel, 1, lerp(1, 0.3, easeInOut(t)));
            ctx.restore();
        } else {
            ctx.save(); ctx.globalAlpha = Math.max(0, (t-0.5)*2);
            drawLevel(toLevel, 1, lerp(0.3, 1, easeInOut((t-0.5)*2)));
            ctx.restore();
        }

        // Scale bar text
        ctx.save();
        ctx.font = `700 1rem 'Lora', serif`;
        ctx.fillStyle = `rgba(255,220,150,0.8)`;
        ctx.textAlign = 'center';
        ctx.fillText(s.unit, W/2, H-140);
        ctx.restore();

        if (transitionT < 1) {
            if (transStart) {
                transitionT = Math.min(1, (ts - transStart) / TRANS_DUR);
                if (transitionT >= 1) {
                    fromLevel = toLevel;
                    transStart = null;
                }
            }
        }
        requestAnimationFrame(render);
    }

    function goTo(level) {
        if (level < 0 || level >= scales.length || (transitionT < 1)) return;
        fromLevel = toLevel;
        toLevel = level;
        currentLevel = level;
        transitionT = 0;
        transStart = null;
        updateHUD(level);
    }

    document.getElementById('zoomInBtn').onclick = () => goTo(Math.min(scales.length-1, currentLevel+1));
    document.getElementById('zoomOutBtn').onclick = () => goTo(Math.max(0, currentLevel-1));
    window.addEventListener('wheel', e => {
        if (e.deltaY > 0) goTo(Math.min(scales.length-1, currentLevel+1));
        else goTo(Math.max(0, currentLevel-1));
    });
    window.addEventListener('keydown', e => {
        if (e.key==='ArrowRight'||e.key==='ArrowDown') goTo(Math.min(scales.length-1, currentLevel+1));
        if (e.key==='ArrowLeft'||e.key==='ArrowUp') goTo(Math.max(0, currentLevel-1));
    });

    resize();
    updateHUD(0);
    requestAnimationFrame(render);
    </script>
</body>
</html>
