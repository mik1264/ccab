<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gear Train Simulation - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); margin: 0.5rem 0; }
        .subtitle { color: var(--terracotta); margin-bottom: 1rem; }
        .controls {
            display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
            justify-content: center; margin-bottom: 1rem;
        }
        .controls label { font-weight: 600; }
        .controls input[type="range"] { width: 150px; accent-color: var(--moss); }
        .gear-container {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1rem;
            box-shadow: 0 8px 30px rgba(138,154,91,0.15);
        }
        .info-panel {
            margin-top: 1rem;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 1rem;
            min-width: 300px;
            font-size: 0.9rem;
            display: none;
        }
        .info-panel.visible { display: block; }
        .info-panel h3 { font-family: 'Lora', serif; color: var(--moss); margin-bottom: 0.5rem; }
        .info-row { display: flex; justify-content: space-between; padding: 0.25rem 0; border-bottom: 1px solid rgba(138,154,91,0.15); }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Gear Train Simulation</h1>
    <p class="subtitle">Involute gear teeth with correct meshing ratios</p>

    <div class="controls">
        <label>Master RPM:</label>
        <input type="range" id="rpmSlider" min="1" max="30" value="10">
        <span id="rpmVal">10</span>
        <span style="font-size:0.85rem; color:var(--sage);">Click a gear for details</span>
    </div>

    <div class="gear-container">
        <svg id="gearSvg" width="800" height="420" viewBox="0 0 800 420" role="img">
            <title>Gear Train</title>
            <desc>Four meshing gears rotating at correct angular velocity ratios</desc>
            <defs>
                <linearGradient id="g0" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#606C38"/>
                    <stop offset="100%" stop-color="#8A9A5B"/>
                </linearGradient>
                <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#BC6C25"/>
                    <stop offset="100%" stop-color="#DDA15E"/>
                </linearGradient>
                <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#5B8A6C"/>
                    <stop offset="100%" stop-color="#7AB592"/>
                </linearGradient>
                <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#8A5B5B"/>
                    <stop offset="100%" stop-color="#B57A7A"/>
                </linearGradient>
            </defs>
        </svg>
    </div>
    <div class="info-panel" id="infoPanel">
        <h3 id="infoTitle">Gear Info</h3>
        <div class="info-row"><span>Teeth:</span><span id="infoTeeth">-</span></div>
        <div class="info-row"><span>RPM:</span><span id="infoRpm">-</span></div>
        <div class="info-row"><span>Direction:</span><span id="infoDir">-</span></div>
        <div class="info-row"><span>Ratio to Master:</span><span id="infoRatio">-</span></div>
    </div>

    <script>
    (function() {
        const svg = document.getElementById('gearSvg');
        const ns = 'http://www.w3.org/2000/svg';
        const rpmSlider = document.getElementById('rpmSlider');
        const rpmVal = document.getElementById('rpmVal');
        const infoPanel = document.getElementById('infoPanel');

        // Gear definitions: {teeth, module (size factor)}
        const module = 5; // module = pitch_diameter / teeth
        const gears = [
            { teeth: 20, label: 'Master', direction: 1 },
            { teeth: 10, label: 'Driven A', direction: -1 },
            { teeth: 30, label: 'Driven B', direction: 1 },
            { teeth: 15, label: 'Driven C', direction: -1 }
        ];

        // Calculate pitch radii and positions
        gears.forEach(g => {
            g.pitchRadius = (g.teeth * module) / 2;
        });

        // Position gears to mesh: gear[i+1] meshes with gear[i]
        // Place them in a line with centers at pitch_radius_i + pitch_radius_{i+1} apart
        gears[0].cx = 150;
        gears[0].cy = 210;
        for (let i = 1; i < gears.length; i++) {
            // Alternate vertical offset for visual variety
            const angle = (i % 2 === 1) ? -0.3 : 0.3;
            const dist = gears[i-1].pitchRadius + gears[i].pitchRadius;
            gears[i].cx = gears[i-1].cx + dist * Math.cos(angle);
            gears[i].cy = gears[i-1].cy + dist * Math.sin(angle);
        }

        // Generate involute gear tooth path
        function generateGearPath(teeth, pitchRadius) {
            const toothHeight = module * 2.25;
            const outerR = pitchRadius + module;
            const innerR = pitchRadius - module * 1.25;
            const points = [];
            const anglePerTooth = (2 * Math.PI) / teeth;

            for (let i = 0; i < teeth; i++) {
                const baseAngle = i * anglePerTooth;
                // Tooth tip
                const tipWidth = anglePerTooth * 0.25;
                // Root
                const rootWidth = anglePerTooth * 0.3;

                // Root start
                points.push(polarToCart(innerR, baseAngle - rootWidth));
                // Rise to tip
                points.push(polarToCart(outerR, baseAngle - tipWidth));
                // Tip
                points.push(polarToCart(outerR, baseAngle + tipWidth));
                // Back to root
                points.push(polarToCart(innerR, baseAngle + rootWidth));
            }

            function polarToCart(r, a) {
                return [r * Math.cos(a), r * Math.sin(a)];
            }

            let d = `M ${points[0][0]} ${points[0][1]}`;
            for (let i = 1; i < points.length; i++) {
                d += ` L ${points[i][0]} ${points[i][1]}`;
            }
            d += ' Z';
            return d;
        }

        // Create gear groups
        const gearGroups = [];
        gears.forEach((g, i) => {
            const group = document.createElementNS(ns, 'g');
            group.style.cursor = 'pointer';

            const path = document.createElementNS(ns, 'path');
            path.setAttribute('d', generateGearPath(g.teeth, g.pitchRadius));
            path.setAttribute('fill', `url(#g${i})`);
            path.setAttribute('stroke', '#3d4423');
            path.setAttribute('stroke-width', '1');
            path.setAttribute('opacity', '0.9');
            group.appendChild(path);

            // Center hole
            const hole = document.createElementNS(ns, 'circle');
            hole.setAttribute('cx', 0);
            hole.setAttribute('cy', 0);
            hole.setAttribute('r', module * 1.5);
            hole.setAttribute('fill', '#FEFAE0');
            hole.setAttribute('stroke', '#3d4423');
            hole.setAttribute('stroke-width', '1');
            group.appendChild(hole);

            // Axle dot
            const axle = document.createElementNS(ns, 'circle');
            axle.setAttribute('cx', 0);
            axle.setAttribute('cy', 0);
            axle.setAttribute('r', 3);
            axle.setAttribute('fill', '#3d4423');
            group.appendChild(axle);

            // Label
            const label = document.createElementNS(ns, 'text');
            label.setAttribute('x', 0);
            label.setAttribute('y', g.pitchRadius + module + 18);
            label.setAttribute('text-anchor', 'middle');
            label.setAttribute('font-size', '12');
            label.setAttribute('font-weight', '700');
            label.setAttribute('fill', '#3d4423');
            label.setAttribute('font-family', 'Nunito, sans-serif');
            label.textContent = `${g.label} (${g.teeth}T)`;
            group.appendChild(label);

            group.setAttribute('transform', `translate(${g.cx}, ${g.cy})`);
            svg.appendChild(group);
            gearGroups.push(group);

            // Click handler
            group.addEventListener('click', () => showInfo(i));
        });

        // Calculate gear ratios
        function getGearRPM(index) {
            const masterRPM = parseInt(rpmSlider.value);
            // Gear ratio: RPM_i = RPM_master * (teeth_master / teeth_i) * direction
            // For a chain: each gear inverts direction and ratio is cumulative
            let rpm = masterRPM;
            for (let j = 1; j <= index; j++) {
                rpm = rpm * (gears[j-1].teeth / gears[j].teeth);
            }
            return rpm;
        }

        function showInfo(index) {
            const g = gears[index];
            const masterRPM = parseInt(rpmSlider.value);
            const rpm = getGearRPM(index);
            const ratio = index === 0 ? '1:1' : `${gears[0].teeth}:${g.teeth}`;

            infoPanel.classList.add('visible');
            document.getElementById('infoTitle').textContent = g.label;
            document.getElementById('infoTeeth').textContent = g.teeth;
            document.getElementById('infoRpm').textContent = rpm.toFixed(1);
            document.getElementById('infoDir').textContent = g.direction > 0 ? 'Clockwise' : 'Counter-clockwise';
            document.getElementById('infoRatio').textContent = ratio;
        }

        rpmSlider.addEventListener('input', () => {
            rpmVal.textContent = rpmSlider.value;
        });

        // Animation
        let angles = gears.map(() => 0);
        let lastTime = 0;

        function animate(time) {
            const dt = lastTime ? (time - lastTime) / 1000 : 0;
            lastTime = time;

            const masterRPM = parseInt(rpmSlider.value);

            gears.forEach((g, i) => {
                const rpm = getGearRPM(i);
                const degreesPerSec = rpm * 6; // 360/60
                angles[i] += degreesPerSec * dt * g.direction;

                // Phase alignment: offset by half tooth to mesh correctly
                const phaseOffset = i > 0 ? (180 / gears[i].teeth) : 0;

                gearGroups[i].setAttribute('transform',
                    `translate(${g.cx}, ${g.cy}) rotate(${angles[i] + phaseOffset})`
                );
            });

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    })();
    </script>
</body>
</html>
