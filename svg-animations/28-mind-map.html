<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Map Builder - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            overflow: hidden;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .toolbar {
            position: fixed; top: 1rem; right: 1rem; z-index: 100;
            display: flex; gap: 0.5rem; flex-wrap: wrap;
        }
        .toolbar button {
            font-family: 'Nunito', sans-serif; padding: 0.4rem 0.9rem;
            border: 2px solid var(--sage); background: rgba(255,255,255,0.8);
            color: var(--dark-moss); border-radius: 10px; cursor: pointer;
            font-weight: 600; font-size: 0.8rem; transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        .toolbar button:hover { background: rgba(255,255,255,0.95); border-color: var(--moss); }
        .help-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem; text-align: center;
            font-size: 0.8rem; color: var(--sage);
            border-top: 1px solid rgba(138,154,91,0.2);
            z-index: 100;
        }
        .help-bar kbd {
            background: rgba(138,154,91,0.15); padding: 0.1rem 0.4rem;
            border-radius: 4px; font-size: 0.75rem; font-family: 'Nunito', sans-serif;
        }
        svg { width: 100vw; height: 100vh; cursor: crosshair; }
        .node-group { cursor: pointer; }
        .node-rect {
            transition: filter 0.2s;
        }
        .node-group:hover .node-rect { filter: brightness(1.05); }
        .node-group.selected .node-rect { stroke-width: 3; stroke-dasharray: 5,3; }
        .node-text {
            font-family: 'Nunito', sans-serif;
            pointer-events: none;
            user-select: none;
        }
        .edge-path {
            fill: none; stroke-width: 2;
        }
        .edit-input {
            position: fixed; z-index: 200;
            font-family: 'Nunito', sans-serif; font-size: 14px;
            padding: 0.4rem 0.6rem; border: 2px solid var(--moss);
            border-radius: 8px; outline: none; background: white;
            min-width: 120px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="toolbar">
        <button id="exportBtn">Export SVG</button>
        <button id="resetBtn">Reset</button>
    </div>

    <svg id="mindSvg" role="img">
        <title>Mind Map</title>
        <desc>Interactive mind map builder with radial layout</desc>
    </svg>

    <div class="help-bar">
        Click node to select | <kbd>Tab</kbd> Add child | <kbd>Enter</kbd> Add sibling | <kbd>Delete</kbd> Remove | Double-click to edit | Drag to reposition
    </div>

    <script>
    (function() {
        const svg = document.getElementById('mindSvg');
        const ns = 'http://www.w3.org/2000/svg';

        const depthColors = ['#3d4423', '#606C38', '#8A9A5B', '#DDA15E', '#BC6C25', '#A05B8A'];
        const depthBg = ['rgba(96,108,56,0.15)', 'rgba(138,154,91,0.15)', 'rgba(221,161,94,0.15)', 'rgba(188,108,37,0.15)', 'rgba(160,91,138,0.15)'];

        let nodeId = 0;
        let nodes = [];
        let selectedId = null;
        let dragState = null;
        let editingNode = null;

        function createNode(label, parentId, x, y) {
            const id = nodeId++;
            const depth = parentId === null ? 0 : (nodes.find(n => n.id === parentId).depth + 1);
            nodes.push({ id, label, parentId, x, y, depth });
            return id;
        }

        function getChildren(id) { return nodes.filter(n => n.parentId === id); }

        // Initialize with a root
        function initTree() {
            nodes = [];
            nodeId = 0;
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const root = createNode('Central Topic', null, cx, cy);
            createNode('Idea 1', root, cx + 180, cy - 80);
            createNode('Idea 2', root, cx + 180, cy + 80);
            createNode('Idea 3', root, cx - 180, cy);
            selectedId = null;
        }

        function autoLayout() {
            const root = nodes.find(n => n.parentId === null);
            if (!root) return;

            function layoutChildren(parentNode, startAngle, endAngle, radius) {
                const children = getChildren(parentNode.id);
                if (children.length === 0) return;
                const angleStep = (endAngle - startAngle) / children.length;
                children.forEach((child, i) => {
                    const angle = startAngle + angleStep * (i + 0.5);
                    child.x = parentNode.x + radius * Math.cos(angle);
                    child.y = parentNode.y + radius * Math.sin(angle);
                    layoutChildren(child, angle - angleStep/2, angle + angleStep/2, radius * 0.7);
                });
            }

            layoutChildren(root, 0, 2 * Math.PI, 200);
        }

        function render() {
            svg.innerHTML = '';

            // Draw edges first
            const edgeG = document.createElementNS(ns, 'g');
            nodes.forEach(node => {
                if (node.parentId === null) return;
                const parent = nodes.find(n => n.id === node.parentId);
                if (!parent) return;

                const path = document.createElementNS(ns, 'path');
                const dx = node.x - parent.x;
                const dy = node.y - parent.y;
                const cx1 = parent.x + dx * 0.4;
                const cy1 = parent.y;
                const cx2 = parent.x + dx * 0.6;
                const cy2 = node.y;
                path.setAttribute('d', `M${parent.x},${parent.y} C${cx1},${cy1} ${cx2},${cy2} ${node.x},${node.y}`);
                path.setAttribute('class', 'edge-path');
                const colorIdx = Math.min(node.depth - 1, depthColors.length - 1);
                path.setAttribute('stroke', depthColors[colorIdx]);
                path.setAttribute('opacity', '0.5');
                edgeG.appendChild(path);
            });
            svg.appendChild(edgeG);

            // Draw nodes
            nodes.forEach(node => {
                const g = document.createElementNS(ns, 'g');
                g.setAttribute('class', 'node-group' + (selectedId === node.id ? ' selected' : ''));
                g.dataset.nodeId = node.id;

                const labelLen = node.label.length;
                const w = Math.max(80, labelLen * 8 + 24);
                const h = node.depth === 0 ? 40 : 32;
                const rx = node.depth === 0 ? 20 : 14;

                const rect = document.createElementNS(ns, 'rect');
                rect.setAttribute('x', node.x - w/2);
                rect.setAttribute('y', node.y - h/2);
                rect.setAttribute('width', w);
                rect.setAttribute('height', h);
                rect.setAttribute('rx', rx);
                rect.setAttribute('class', 'node-rect');
                const bgIdx = Math.min(node.depth, depthBg.length - 1);
                rect.setAttribute('fill', node.depth === 0 ? 'rgba(96,108,56,0.25)' : depthBg[bgIdx]);
                const strokeIdx = Math.min(node.depth, depthColors.length - 1);
                rect.setAttribute('stroke', depthColors[strokeIdx]);
                rect.setAttribute('stroke-width', selectedId === node.id ? '3' : '1.5');
                g.appendChild(rect);

                const text = document.createElementNS(ns, 'text');
                text.setAttribute('x', node.x);
                text.setAttribute('y', node.y + 5);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('font-size', node.depth === 0 ? '15' : '12');
                text.setAttribute('font-weight', node.depth === 0 ? '700' : '600');
                text.setAttribute('fill', depthColors[strokeIdx]);
                text.setAttribute('class', 'node-text');
                text.textContent = node.label;
                g.appendChild(text);

                // Interaction
                g.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    selectedId = node.id;
                    const pt = svgPoint(e);
                    dragState = { nodeId: node.id, offsetX: pt.x - node.x, offsetY: pt.y - node.y, moved: false };
                    render();
                });

                g.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    startEdit(node);
                });

                svg.appendChild(g);
            });
        }

        function svgPoint(e) {
            const pt = svg.createSVGPoint();
            pt.x = e.clientX; pt.y = e.clientY;
            return pt.matrixTransform(svg.getScreenCTM().inverse());
        }

        // Drag
        document.addEventListener('mousemove', (e) => {
            if (!dragState) return;
            const pt = svgPoint(e);
            const node = nodes.find(n => n.id === dragState.nodeId);
            if (node) {
                node.x = pt.x - dragState.offsetX;
                node.y = pt.y - dragState.offsetY;
                dragState.moved = true;
                render();
            }
        });

        document.addEventListener('mouseup', () => { dragState = null; });

        // Click on empty space to deselect
        svg.addEventListener('mousedown', (e) => {
            if (e.target === svg) {
                selectedId = null;
                render();
            }
        });

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (editingNode) return;

            if (e.key === 'Tab' && selectedId !== null) {
                e.preventDefault();
                const parent = nodes.find(n => n.id === selectedId);
                const children = getChildren(selectedId);
                const angle = children.length > 0 ? Math.random() * Math.PI * 2 : Math.random() * Math.PI * 2;
                const dist = 150;
                const nx = parent.x + dist * Math.cos(angle);
                const ny = parent.y + dist * Math.sin(angle);
                const newId = createNode('New topic', selectedId, nx, ny);
                selectedId = newId;
                render();
                startEdit(nodes.find(n => n.id === newId));
            }

            if (e.key === 'Enter' && selectedId !== null) {
                e.preventDefault();
                const current = nodes.find(n => n.id === selectedId);
                if (current.parentId !== null) {
                    const parent = nodes.find(n => n.id === current.parentId);
                    const angle = Math.atan2(current.y - parent.y, current.x - parent.x) + 0.5;
                    const dist = Math.sqrt((current.x - parent.x)**2 + (current.y - parent.y)**2);
                    const nx = parent.x + dist * Math.cos(angle);
                    const ny = parent.y + dist * Math.sin(angle);
                    const newId = createNode('New topic', current.parentId, nx, ny);
                    selectedId = newId;
                    render();
                    startEdit(nodes.find(n => n.id === newId));
                }
            }

            if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId !== null) {
                const current = nodes.find(n => n.id === selectedId);
                if (current && current.parentId !== null) {
                    // Remove node and all descendants
                    function removeTree(id) {
                        getChildren(id).forEach(c => removeTree(c.id));
                        nodes = nodes.filter(n => n.id !== id);
                    }
                    const parentId = current.parentId;
                    removeTree(selectedId);
                    selectedId = parentId;
                    render();
                }
            }
        });

        // Inline edit
        function startEdit(node) {
            editingNode = node;
            const input = document.createElement('input');
            input.className = 'edit-input';
            input.value = node.label;
            // Position over node
            const ctm = svg.getScreenCTM();
            input.style.left = (node.x * ctm.a + ctm.e - 60) + 'px';
            input.style.top = (node.y * ctm.d + ctm.f - 14) + 'px';
            document.body.appendChild(input);
            input.focus();
            input.select();

            function finishEdit() {
                if (input.value.trim()) node.label = input.value.trim();
                document.body.removeChild(input);
                editingNode = null;
                render();
            }

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); finishEdit(); }
                if (e.key === 'Escape') { document.body.removeChild(input); editingNode = null; }
            });
            input.addEventListener('blur', finishEdit);
        }

        // Export SVG
        document.getElementById('exportBtn').addEventListener('click', () => {
            const serializer = new XMLSerializer();
            const svgStr = serializer.serializeToString(svg);
            const blob = new Blob([svgStr], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'mindmap.svg'; a.click();
            URL.revokeObjectURL(url);
        });

        // Reset
        document.getElementById('resetBtn').addEventListener('click', () => {
            initTree();
            render();
        });

        initTree();
        render();
    })();
    </script>
</body>
</html>
