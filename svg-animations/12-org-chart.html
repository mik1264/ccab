<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization Chart - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: auto;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.8);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 1.8rem; color: var(--moss); margin: 1.5rem 0 0.3rem; text-align: center; }
        .subtitle { color: var(--terracotta); text-align: center; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .controls {
            display: flex; gap: 8px; margin-bottom: 0.5rem;
        }
        .ctrl-btn {
            padding: 6px 16px; border: 2px solid var(--sage); background: rgba(255,255,255,0.6);
            color: var(--moss); font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.85rem; cursor: pointer; border-radius: 15px; transition: all 0.3s;
        }
        .ctrl-btn:hover, .ctrl-btn.active { background: var(--sage); color: white; }
        .chart-container {
            overflow: auto; max-width: 100vw; max-height: calc(100vh - 140px); padding: 1rem;
        }
        .node-card { cursor: pointer; transition: filter 0.3s, opacity 0.3s; }
        .node-card:hover { filter: brightness(1.05); }
        .node-card.dimmed { opacity: 0.2; }
        .node-card.highlight-chain rect { stroke: var(--terracotta); stroke-width: 3; }
        .link-line { fill: none; stroke: #aaa; stroke-width: 1.5; }
        .card-name { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 11px; fill: var(--dark-moss); }
        .card-title { font-family: 'Nunito', sans-serif; font-weight: 400; font-size: 9px; fill: #666; }
        .collapse-icon { font-size: 10px; fill: var(--terracotta); cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Organization Chart</h1>
    <p class="subtitle">Click to expand/collapse. Hover to see reporting chain.</p>
    <div class="controls">
        <button class="ctrl-btn active" id="vertBtn" onclick="setLayout('vertical')">Vertical</button>
        <button class="ctrl-btn" id="horizBtn" onclick="setLayout('horizontal')">Horizontal</button>
    </div>
    <div class="chart-container">
        <svg id="orgSvg" role="graphics-document" aria-label="Organization chart">
            <title>Organization Chart</title>
            <desc>Hierarchical organization chart of a fictional company showing CEO, VPs, managers, and employees. Click nodes to expand or collapse subtrees. Hover to highlight the reporting chain.</desc>
        </svg>
    </div>

    <script>
    (function(){
        const deptColors = {
            'Executive': '#606C38',
            'Engineering': '#2980b9',
            'Marketing': '#8e44ad',
            'Operations': '#d35400'
        };

        // Org data
        const org = {
            name: 'Elena Vasquez', title: 'CEO', dept: 'Executive', collapsed: false,
            children: [
                {
                    name: 'Marcus Chen', title: 'VP Engineering', dept: 'Engineering', collapsed: false,
                    children: [
                        { name: 'Priya Sharma', title: 'Dir. Frontend', dept: 'Engineering', collapsed: false, children: [
                            { name: 'Alex Kim', title: 'Sr. Engineer', dept: 'Engineering', children: [] },
                            { name: 'Jordan Lee', title: 'Engineer', dept: 'Engineering', children: [] },
                            { name: 'Casey Taylor', title: 'Engineer', dept: 'Engineering', children: [] }
                        ]},
                        { name: 'David Okafor', title: 'Dir. Backend', dept: 'Engineering', collapsed: false, children: [
                            { name: 'Nina Petrova', title: 'Sr. Engineer', dept: 'Engineering', children: [] },
                            { name: 'Sam Rivera', title: 'Engineer', dept: 'Engineering', children: [] },
                            { name: 'Wei Zhang', title: 'Engineer', dept: 'Engineering', children: [] }
                        ]},
                        { name: 'Lena Fischer', title: 'Dir. QA', dept: 'Engineering', collapsed: false, children: [
                            { name: 'Tom Harris', title: 'QA Lead', dept: 'Engineering', children: [] },
                            { name: 'Maya Patel', title: 'QA Engineer', dept: 'Engineering', children: [] }
                        ]}
                    ]
                },
                {
                    name: 'Sarah Williams', title: 'VP Marketing', dept: 'Marketing', collapsed: false,
                    children: [
                        { name: 'James Brown', title: 'Dir. Brand', dept: 'Marketing', collapsed: false, children: [
                            { name: 'Olivia Martin', title: 'Designer', dept: 'Marketing', children: [] },
                            { name: 'Ethan Clark', title: 'Copywriter', dept: 'Marketing', children: [] }
                        ]},
                        { name: 'Amy Tanaka', title: 'Dir. Growth', dept: 'Marketing', collapsed: false, children: [
                            { name: 'Chris Evans', title: 'SEO Lead', dept: 'Marketing', children: [] },
                            { name: 'Lily Wang', title: 'Analyst', dept: 'Marketing', children: [] },
                            { name: 'Ben Nguyen', title: 'PM', dept: 'Marketing', children: [] }
                        ]}
                    ]
                },
                {
                    name: 'Robert Johnson', title: 'VP Operations', dept: 'Operations', collapsed: false,
                    children: [
                        { name: 'Diana Lopez', title: 'Dir. HR', dept: 'Operations', collapsed: false, children: [
                            { name: 'Grace Kim', title: 'HR Specialist', dept: 'Operations', children: [] },
                            { name: 'Mike Ross', title: 'Recruiter', dept: 'Operations', children: [] }
                        ]},
                        { name: 'Frank Miller', title: 'Dir. Finance', dept: 'Operations', collapsed: false, children: [
                            { name: 'Anna White', title: 'Accountant', dept: 'Operations', children: [] },
                            { name: 'Paul Green', title: 'Controller', dept: 'Operations', children: [] }
                        ]}
                    ]
                }
            ]
        };

        const svg = document.getElementById('orgSvg');
        let layout = 'vertical';
        const CARD_W = 130, CARD_H = 48, GAP_X = 20, GAP_Y = 70;

        // Assign IDs
        let idCounter = 0;
        function assignIds(node, parent) {
            node.id = idCounter++;
            node.parent = parent;
            if (node.children) node.children.forEach(c => assignIds(c, node));
        }
        assignIds(org, null);

        function getVisibleChildren(node) {
            if (node.collapsed || !node.children) return [];
            return node.children;
        }

        // Compute layout positions
        function computeLayout(node) {
            const children = getVisibleChildren(node);
            if (children.length === 0) {
                node._w = CARD_W;
                node._h = CARD_H;
                return;
            }
            children.forEach(c => computeLayout(c));

            if (layout === 'vertical') {
                const totalW = children.reduce((sum, c) => sum + c._w, 0) + (children.length - 1) * GAP_X;
                node._w = Math.max(CARD_W, totalW);
                node._h = CARD_H;
            } else {
                const totalH = children.reduce((sum, c) => sum + c._h, 0) + (children.length - 1) * GAP_X;
                node._w = CARD_W;
                node._h = Math.max(CARD_H, totalH);
            }
        }

        function positionNodes(node, x, y) {
            node._x = x;
            node._y = y;
            const children = getVisibleChildren(node);
            if (children.length === 0) return;

            if (layout === 'vertical') {
                const totalW = children.reduce((sum, c) => sum + c._w, 0) + (children.length - 1) * GAP_X;
                let cx = x + (node._w - totalW) / 2;
                children.forEach(c => {
                    positionNodes(c, cx, y + CARD_H + GAP_Y);
                    cx += c._w + GAP_X;
                });
            } else {
                const totalH = children.reduce((sum, c) => sum + c._h, 0) + (children.length - 1) * GAP_X;
                let cy = y + (node._h - totalH) / 2;
                children.forEach(c => {
                    positionNodes(c, x + CARD_W + GAP_Y + 30, cy);
                    cy += c._h + GAP_X;
                });
            }
        }

        function getCenter(node) {
            return { x: node._x + CARD_W / 2, y: node._y + CARD_H / 2 };
        }

        function render() {
            computeLayout(org);
            positionNodes(org, 20, 20);
            svg.innerHTML = '';
            const totalW = org._w + 80;
            const totalH = countDepth(org) * (CARD_H + GAP_Y) + 80;
            svg.setAttribute('width', Math.max(totalW, 800));
            svg.setAttribute('height', Math.max(totalH, 400));

            // Draw links first
            const linksGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            svg.appendChild(linksGroup);
            drawLinks(org, linksGroup);

            // Draw nodes
            const nodesGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            svg.appendChild(nodesGroup);
            drawNodes(org, nodesGroup);
        }

        function countDepth(node) {
            const children = getVisibleChildren(node);
            if (children.length === 0) return 1;
            return 1 + Math.max(...children.map(countDepth));
        }

        function drawLinks(node, group) {
            const children = getVisibleChildren(node);
            const from = getCenter(node);
            children.forEach(child => {
                const to = getCenter(child);
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.classList.add('link-line');
                if (layout === 'vertical') {
                    const midY = (from.y + to.y) / 2;
                    path.setAttribute('d', `M${from.x},${from.y + CARD_H/2} C${from.x},${midY} ${to.x},${midY} ${to.x},${to.y - CARD_H/2}`);
                } else {
                    const midX = (from.x + to.x) / 2;
                    path.setAttribute('d', `M${from.x + CARD_W/2},${from.y} C${midX},${from.y} ${midX},${to.y} ${to.x - CARD_W/2},${to.y}`);
                }
                group.appendChild(path);
                drawLinks(child, group);
            });
        }

        function drawNodes(node, group) {
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.classList.add('node-card');
            g.dataset.nodeId = node.id;

            const color = deptColors[node.dept] || '#888';

            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('x', node._x);
            rect.setAttribute('y', node._y);
            rect.setAttribute('width', CARD_W);
            rect.setAttribute('height', CARD_H);
            rect.setAttribute('rx', 8);
            rect.setAttribute('fill', 'rgba(255,255,255,0.85)');
            rect.setAttribute('stroke', color);
            rect.setAttribute('stroke-width', 2);
            g.appendChild(rect);

            // Color bar on left
            const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            bar.setAttribute('x', node._x);
            bar.setAttribute('y', node._y);
            bar.setAttribute('width', 5);
            bar.setAttribute('height', CARD_H);
            bar.setAttribute('rx', '3 0 0 3');
            bar.setAttribute('fill', color);
            g.appendChild(bar);

            const nameText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            nameText.classList.add('card-name');
            nameText.setAttribute('x', node._x + 12);
            nameText.setAttribute('y', node._y + 18);
            nameText.textContent = node.name;
            g.appendChild(nameText);

            const titleText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            titleText.classList.add('card-title');
            titleText.setAttribute('x', node._x + 12);
            titleText.setAttribute('y', node._y + 33);
            titleText.textContent = node.title;
            g.appendChild(titleText);

            // Dept badge
            const deptText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            deptText.setAttribute('x', node._x + 12);
            deptText.setAttribute('y', node._y + 44);
            deptText.setAttribute('font-size', '7');
            deptText.setAttribute('fill', color);
            deptText.setAttribute('font-family', 'Nunito, sans-serif');
            deptText.setAttribute('font-weight', '700');
            deptText.textContent = node.dept;
            g.appendChild(deptText);

            // Collapse indicator
            if (node.children && node.children.length > 0) {
                const icon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                icon.classList.add('collapse-icon');
                icon.setAttribute('x', node._x + CARD_W - 14);
                icon.setAttribute('y', node._y + 14);
                icon.textContent = node.collapsed ? '+' : '-';
                g.appendChild(icon);
            }

            // Click: toggle collapse
            g.addEventListener('click', () => {
                if (node.children && node.children.length > 0) {
                    node.collapsed = !node.collapsed;
                    render();
                }
            });

            // Hover: highlight reporting chain
            g.addEventListener('mouseenter', () => {
                // Dim all, then highlight chain
                document.querySelectorAll('.node-card').forEach(n => n.classList.add('dimmed'));
                let current = node;
                while (current) {
                    const el = document.querySelector(`[data-node-id="${current.id}"]`);
                    if (el) {
                        el.classList.remove('dimmed');
                        el.classList.add('highlight-chain');
                    }
                    current = current.parent;
                }
                // Also highlight self
                g.classList.remove('dimmed');
            });
            g.addEventListener('mouseleave', () => {
                document.querySelectorAll('.node-card').forEach(n => {
                    n.classList.remove('dimmed');
                    n.classList.remove('highlight-chain');
                });
            });

            group.appendChild(g);

            const children = getVisibleChildren(node);
            children.forEach(c => drawNodes(c, group));
        }

        window.setLayout = function(l) {
            layout = l;
            document.getElementById('vertBtn').classList.toggle('active', l === 'vertical');
            document.getElementById('horizBtn').classList.toggle('active', l === 'horizontal');
            render();
        };

        render();
    })();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
