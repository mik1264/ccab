<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Scale - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: #0a0e27;
            color: #e0e0e0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--earth); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(10,14,39,0.8);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
            border: 1px solid rgba(221,161,94,0.3);
        }
        .back-link:hover { background: rgba(10,14,39,0.95); }
        h1 { font-family: 'Lora', serif; font-size: 1.8rem; color: var(--earth); margin: 1rem 0 0.2rem; text-align: center; }
        .subtitle { color: #8899aa; text-align: center; margin-bottom: 0.5rem; font-size: 0.85rem; }
        .controls {
            display: flex; gap: 8px; margin-bottom: 0.5rem;
        }
        .mode-btn {
            padding: 6px 16px; border: 2px solid var(--earth); background: rgba(10,14,39,0.6);
            color: var(--earth); font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.85rem; cursor: pointer; border-radius: 15px; transition: all 0.3s;
        }
        .mode-btn:hover, .mode-btn.active { background: var(--earth); color: #0a0e27; }
        .view-area { flex: 1; width: 100%; position: relative; }
        .planet-body { cursor: pointer; transition: filter 0.3s; }
        .planet-body:hover { filter: brightness(1.3); }
        .planet-label { font-family: 'Nunito', sans-serif; font-size: 10px; fill: #aabbcc; font-weight: 600; text-anchor: middle; }
        .orbit-ring { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 1; }
        .info-card {
            position: fixed; right: 1rem; top: 50%; transform: translateY(-50%);
            background: rgba(10,14,39,0.92); backdrop-filter: blur(12px);
            border-radius: 16px; padding: 1.2rem; border: 1px solid rgba(221,161,94,0.3);
            width: 250px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 50; display: none;
        }
        .info-card h2 { font-family: 'Lora', serif; color: var(--earth); font-size: 1.3rem; margin-bottom: 0.3rem; }
        .info-card .detail { margin: 0.3rem 0; font-size: 0.82rem; line-height: 1.4; }
        .info-card .detail strong { color: var(--earth); }
        .info-card .close-btn {
            position: absolute; top: 6px; right: 10px; background: none; border: none;
            font-size: 1.2rem; cursor: pointer; color: #888;
        }
        .asteroid-dot { fill: rgba(200,200,200,0.4); }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Gallery</a>
    <h1>Solar System to Scale</h1>
    <p class="subtitle">Click planets for details. Toggle between size comparison and orbital view.</p>
    <div class="controls">
        <button class="mode-btn active" id="sizeBtn" onclick="setMode('sizes')">Planet Sizes</button>
        <button class="mode-btn" id="orbitBtn" onclick="setMode('orbits')">Orbital Distances</button>
    </div>
    <div class="view-area">
        <svg id="solarSvg" width="100%" height="100%" role="graphics-document" aria-label="Solar system scale diagram">
            <title>Solar System to Scale</title>
            <desc>Interactive solar system diagram showing relative planet sizes or orbital distances with animated orbits. Click any planet for detailed information including diameter, mass, and fun facts.</desc>
        </svg>
    </div>
    <div class="info-card" id="infoCard">
        <button class="close-btn" onclick="document.getElementById('infoCard').style.display='none'">&times;</button>
        <div id="infoContent"></div>
    </div>

    <script>
    (function(){
        const planets = [
            { name:'Mercury', diameter:4879, mass:'3.30e23 kg', dayLength:'58.6 days', yearLength:'88 days',
              moons:0, color:'#b0a090', orbitAU:0.39, periodDays:88,
              fact:'Mercury has no atmosphere and temperatures swing from -180C to 430C.' },
            { name:'Venus', diameter:12104, mass:'4.87e24 kg', dayLength:'243 days', yearLength:'225 days',
              moons:0, color:'#e8c080', orbitAU:0.72, periodDays:225,
              fact:'Venus rotates backwards compared to most planets.' },
            { name:'Earth', diameter:12756, mass:'5.97e24 kg', dayLength:'24 hours', yearLength:'365.25 days',
              moons:1, color:'#4488cc', orbitAU:1.0, periodDays:365.25,
              fact:'Only known planet to harbor life.' },
            { name:'Mars', diameter:6792, mass:'6.42e23 kg', dayLength:'24.6 hours', yearLength:'687 days',
              moons:2, color:'#cc6644', orbitAU:1.52, periodDays:687,
              fact:'Olympus Mons on Mars is the tallest mountain in the solar system.' },
            { name:'Jupiter', diameter:142984, mass:'1.90e27 kg', dayLength:'9.9 hours', yearLength:'11.86 years',
              moons:95, color:'#d4a060', orbitAU:5.20, periodDays:4333,
              fact:'Jupiter\'s Great Red Spot is a storm larger than Earth that has raged for 350+ years.',
              majorMoons:['Io','Europa','Ganymede','Callisto'] },
            { name:'Saturn', diameter:120536, mass:'5.68e26 kg', dayLength:'10.7 hours', yearLength:'29.46 years',
              moons:146, color:'#e8d090', orbitAU:9.58, periodDays:10759,
              fact:'Saturn is less dense than water - it would float in a giant bathtub.',
              hasRings: true },
            { name:'Uranus', diameter:51118, mass:'8.68e25 kg', dayLength:'17.2 hours', yearLength:'84.01 years',
              moons:28, color:'#80c8d8', orbitAU:19.22, periodDays:30687,
              fact:'Uranus rotates on its side, with an axial tilt of 97.8 degrees.' },
            { name:'Neptune', diameter:49528, mass:'1.02e26 kg', dayLength:'16.1 hours', yearLength:'164.8 years',
              moons:16, color:'#4060c0', orbitAU:30.05, periodDays:60190,
              fact:'Neptune has the strongest winds in the solar system, up to 2,100 km/h.' }
        ];

        const svg = document.getElementById('solarSvg');
        let mode = 'sizes';
        let animFrame;

        function setMode(m) {
            mode = m;
            document.getElementById('sizeBtn').classList.toggle('active', m === 'sizes');
            document.getElementById('orbitBtn').classList.toggle('active', m === 'orbits');
            if (animFrame) cancelAnimationFrame(animFrame);
            if (m === 'orbits') drawOrbits();
            else drawSizes();
        }
        window.setMode = setMode;

        function drawSizes() {
            svg.innerHTML = '';
            const w = window.innerWidth, h = window.innerHeight - 140;
            svg.setAttribute('viewBox', `0 0 ${w} ${h}`);

            // Use log scale for sizes
            const maxD = planets[4].diameter; // Jupiter
            const maxR = Math.min(h * 0.35, 120);
            const spacing = w / (planets.length + 1);

            // Sun reference (partial circle on left)
            const sunR = maxR * 1.5;
            const sunCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            sunCircle.setAttribute('cx', -sunR + 30);
            sunCircle.setAttribute('cy', h / 2);
            sunCircle.setAttribute('r', sunR);
            sunCircle.setAttribute('fill', '#ffcc33');
            sunCircle.setAttribute('opacity', '0.3');
            svg.appendChild(sunCircle);
            const sunLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            sunLabel.classList.add('planet-label');
            sunLabel.setAttribute('x', 20);
            sunLabel.setAttribute('y', h / 2);
            sunLabel.setAttribute('text-anchor', 'start');
            sunLabel.setAttribute('fill', '#ffcc33');
            sunLabel.textContent = 'Sun (to scale: 109x Earth)';
            svg.appendChild(sunLabel);

            planets.forEach((p, i) => {
                const x = spacing * (i + 1);
                const r = Math.max(3, Math.sqrt(p.diameter / maxD) * maxR);
                const cy = h / 2;

                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.classList.add('planet-body');
                circle.setAttribute('cx', x);
                circle.setAttribute('cy', cy);
                circle.setAttribute('r', r);
                circle.setAttribute('fill', p.color);
                circle.addEventListener('click', () => showInfo(p));
                svg.appendChild(circle);

                // Saturn's rings
                if (p.hasRings) {
                    const ring = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                    ring.setAttribute('cx', x);
                    ring.setAttribute('cy', cy);
                    ring.setAttribute('rx', r * 1.8);
                    ring.setAttribute('ry', r * 0.4);
                    ring.setAttribute('fill', 'none');
                    ring.setAttribute('stroke', 'rgba(232,208,144,0.5)');
                    ring.setAttribute('stroke-width', r * 0.2);
                    svg.appendChild(ring);
                }

                // Moons for Jupiter
                if (p.majorMoons) {
                    p.majorMoons.forEach((moon, mi) => {
                        const moonR = 2;
                        const moonDist = r + 8 + mi * 6;
                        const angle = mi * 1.2;
                        const mx = x + Math.cos(angle) * moonDist;
                        const my = cy + Math.sin(angle) * moonDist * 0.4;
                        const mc = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        mc.setAttribute('cx', mx);
                        mc.setAttribute('cy', my);
                        mc.setAttribute('r', moonR);
                        mc.setAttribute('fill', '#ccc');
                        svg.appendChild(mc);
                    });
                }

                // Label
                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.classList.add('planet-label');
                label.setAttribute('x', x);
                label.setAttribute('y', cy + r + 18);
                label.textContent = p.name;
                svg.appendChild(label);

                // Diameter
                const dLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                dLabel.classList.add('planet-label');
                dLabel.setAttribute('x', x);
                dLabel.setAttribute('y', cy + r + 30);
                dLabel.setAttribute('font-size', '8');
                dLabel.setAttribute('fill', '#667788');
                dLabel.textContent = p.diameter.toLocaleString() + ' km';
                svg.appendChild(dLabel);
            });
        }

        function drawOrbits() {
            svg.innerHTML = '';
            const w = window.innerWidth, h = window.innerHeight - 140;
            svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
            const cx = w / 2, cy = h / 2;

            // Log scale for orbital distances
            const maxOrbit = Math.min(cx, cy) - 30;
            const logMax = Math.log(planets[7].orbitAU + 1);

            // Sun
            const sun = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            sun.setAttribute('cx', cx);
            sun.setAttribute('cy', cy);
            sun.setAttribute('r', 12);
            sun.setAttribute('fill', '#ffcc33');
            svg.appendChild(sun);

            // Asteroid belt
            const asteroidOrbit = Math.log(2.7 + 1) / logMax * maxOrbit;
            for (let i = 0; i < 80; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = asteroidOrbit + (Math.random() - 0.5) * 15;
                const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                dot.classList.add('asteroid-dot');
                dot.setAttribute('cx', cx + Math.cos(angle) * dist);
                dot.setAttribute('cy', cy + Math.sin(angle) * dist * 0.6);
                dot.setAttribute('r', 1);
                svg.appendChild(dot);
            }

            // Orbit rings and planets
            const planetEls = [];
            planets.forEach((p, i) => {
                const orbitR = Math.log(p.orbitAU + 1) / logMax * maxOrbit;

                // Orbit ring
                const ring = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                ring.classList.add('orbit-ring');
                ring.setAttribute('cx', cx);
                ring.setAttribute('cy', cy);
                ring.setAttribute('rx', orbitR);
                ring.setAttribute('ry', orbitR * 0.6);
                svg.appendChild(ring);

                // Planet
                const pr = Math.max(3, Math.sqrt(p.diameter / 142984) * 12);
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.classList.add('planet-body');
                circle.setAttribute('r', pr);
                circle.setAttribute('fill', p.color);
                circle.addEventListener('click', () => showInfo(p));
                svg.appendChild(circle);

                // Saturn rings in orbit mode
                let ringEl = null;
                if (p.hasRings) {
                    ringEl = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                    ringEl.setAttribute('rx', pr * 1.8);
                    ringEl.setAttribute('ry', pr * 0.4);
                    ringEl.setAttribute('fill', 'none');
                    ringEl.setAttribute('stroke', 'rgba(232,208,144,0.4)');
                    ringEl.setAttribute('stroke-width', pr * 0.15);
                    svg.appendChild(ringEl);
                }

                // Moons for Jupiter
                let moonEls = [];
                if (p.majorMoons) {
                    p.majorMoons.forEach((moon, mi) => {
                        const mc = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        mc.setAttribute('r', 1.5);
                        mc.setAttribute('fill', '#ccc');
                        svg.appendChild(mc);
                        moonEls.push(mc);
                    });
                }

                // Label
                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.classList.add('planet-label');
                svg.appendChild(label);

                planetEls.push({ p, circle, label, orbitR, pr, ringEl, moonEls });
            });

            // Animate orbits
            const startTime = performance.now();
            function animate(time) {
                const elapsed = (time - startTime) / 1000;
                planetEls.forEach(({ p, circle, label, orbitR, pr, ringEl, moonEls }) => {
                    // Relative speed: Mercury fastest, Neptune slowest
                    const speed = (88 / p.periodDays) * 0.5;
                    const angle = elapsed * speed;
                    const px = cx + Math.cos(angle) * orbitR;
                    const py = cy + Math.sin(angle) * orbitR * 0.6;
                    circle.setAttribute('cx', px);
                    circle.setAttribute('cy', py);
                    label.setAttribute('x', px);
                    label.setAttribute('y', py + pr + 14);
                    label.textContent = p.name;
                    if (ringEl) {
                        ringEl.setAttribute('cx', px);
                        ringEl.setAttribute('cy', py);
                    }
                    moonEls.forEach((mc, mi) => {
                        const moonAngle = elapsed * 2 + mi * 1.5;
                        const moonDist = pr + 4 + mi * 4;
                        mc.setAttribute('cx', px + Math.cos(moonAngle) * moonDist);
                        mc.setAttribute('cy', py + Math.sin(moonAngle) * moonDist * 0.4);
                    });
                });
                animFrame = requestAnimationFrame(animate);
            }
            animFrame = requestAnimationFrame(animate);
        }

        function showInfo(p) {
            const card = document.getElementById('infoCard');
            document.getElementById('infoContent').innerHTML = `
                <h2 style="color:${p.color}">${p.name}</h2>
                <div class="detail"><strong>Diameter:</strong> ${p.diameter.toLocaleString()} km</div>
                <div class="detail"><strong>Mass:</strong> ${p.mass}</div>
                <div class="detail"><strong>Day Length:</strong> ${p.dayLength}</div>
                <div class="detail"><strong>Year Length:</strong> ${p.yearLength}</div>
                <div class="detail"><strong>Known Moons:</strong> ${p.moons}</div>
                <div class="detail"><strong>Fun Fact:</strong> ${p.fact}</div>
            `;
            card.style.display = 'block';
        }

        window.addEventListener('resize', () => {
            if (animFrame) cancelAnimationFrame(animFrame);
            if (mode === 'orbits') drawOrbits();
            else drawSizes();
        });

        drawSizes();
    })();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
