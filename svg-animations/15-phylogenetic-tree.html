<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phylogenetic Tree of Life - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.8);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 1.6rem; color: var(--moss); margin: 1rem 0 0.2rem; text-align: center; }
        .subtitle { color: var(--terracotta); text-align: center; margin-bottom: 0.3rem; font-size: 0.85rem; }
        .controls {
            display: flex; gap: 8px; margin-bottom: 0.3rem;
        }
        .ctrl-btn {
            padding: 5px 14px; border: 2px solid var(--sage); background: rgba(255,255,255,0.6);
            color: var(--moss); font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.82rem; cursor: pointer; border-radius: 15px; transition: all 0.3s;
        }
        .ctrl-btn:hover, .ctrl-btn.active { background: var(--sage); color: white; }
        .legend {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
            font-size: 0.75rem; margin-bottom: 0.3rem;
        }
        .legend-item { display: flex; align-items: center; gap: 3px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .tree-container {
            flex: 1; width: 100%; overflow: auto; padding: 0.5rem;
        }
        .node-dot { cursor: pointer; transition: r 0.2s; }
        .node-dot:hover { r: 6; }
        .clade-label { font-family: 'Nunito', sans-serif; font-size: 8px; fill: #555; pointer-events: none; }
        .species-label { font-family: 'Nunito', sans-serif; font-size: 8px; fill: var(--dark-moss); font-weight: 600; cursor: pointer; }
        .species-label:hover { fill: var(--terracotta); }
        .link-line { fill: none; stroke: #bbb; stroke-width: 1; }
        .tooltip-box {
            position: fixed; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 0.8rem; border: 2px solid var(--earth);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1); z-index: 50; display: none;
            max-width: 250px; font-size: 0.82rem; pointer-events: none;
        }
        .tooltip-box h4 { font-family: 'Lora', serif; color: var(--moss); margin-bottom: 0.2rem; }
        .tooltip-box .detail { margin: 0.15rem 0; }
        .tooltip-box .detail strong { color: var(--terracotta); }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Phylogenetic Tree of Life</h1>
    <p class="subtitle">Click clades to collapse/expand. Hover species for details.</p>
    <div class="controls">
        <button class="ctrl-btn active" id="rectBtn" onclick="setLayout('rect')">Rectangular</button>
        <button class="ctrl-btn" id="radialBtn" onclick="setLayout('radial')">Radial</button>
    </div>
    <div class="legend" id="legend"></div>
    <div class="tree-container" id="treeContainer">
        <svg id="treeSvg" role="graphics-document" aria-label="Phylogenetic tree of life">
            <title>Phylogenetic Tree of Life</title>
            <desc>Interactive phylogenetic tree showing 80 species across all kingdoms of life. Click on clades to collapse or expand branches. Hover over species for details including common name, scientific name, and approximate divergence time.</desc>
        </svg>
    </div>
    <div class="tooltip-box" id="tooltip"></div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    (function(){
        const kingdomColors = {
            'Bacteria':  '#e74c3c',
            'Archaea':   '#e67e22',
            'Plantae':   '#27ae60',
            'Fungi':     '#8e44ad',
            'Animalia':  '#2980b9',
            'Protista':  '#1abc9c'
        };

        // Build legend
        const legendEl = document.getElementById('legend');
        Object.entries(kingdomColors).forEach(([k, c]) => {
            const item = document.createElement('span');
            item.className = 'legend-item';
            item.innerHTML = `<span class="legend-dot" style="background:${c}"></span>${k}`;
            legendEl.appendChild(item);
        });

        // Phylogenetic tree data
        const treeData = {
            name: 'LUCA', common: 'Last Universal Common Ancestor', kingdom: '', divergence: '~4000 Mya',
            children: [
                { name: 'Bacteria', common: 'Bacteria', kingdom: 'Bacteria', divergence: '~3500 Mya', children: [
                    { name: 'Proteobacteria', common: 'Proteobacteria', kingdom: 'Bacteria', divergence: '~2800 Mya', children: [
                        { name: 'E. coli', common: 'Escherichia coli', kingdom: 'Bacteria', divergence: '~500 Mya' },
                        { name: 'Salmonella', common: 'Salmonella enterica', kingdom: 'Bacteria', divergence: '~500 Mya' },
                        { name: 'Vibrio', common: 'Vibrio cholerae', kingdom: 'Bacteria', divergence: '~600 Mya' }
                    ]},
                    { name: 'Firmicutes', common: 'Firmicutes', kingdom: 'Bacteria', divergence: '~2500 Mya', children: [
                        { name: 'B. subtilis', common: 'Bacillus subtilis', kingdom: 'Bacteria', divergence: '~400 Mya' },
                        { name: 'S. aureus', common: 'Staphylococcus aureus', kingdom: 'Bacteria', divergence: '~400 Mya' },
                        { name: 'Lactobacillus', common: 'Lactobacillus acidophilus', kingdom: 'Bacteria', divergence: '~350 Mya' }
                    ]},
                    { name: 'Cyanobacteria', common: 'Blue-green algae', kingdom: 'Bacteria', divergence: '~2700 Mya', children: [
                        { name: 'Synechococcus', common: 'Synechococcus', kingdom: 'Bacteria', divergence: '~1500 Mya' },
                        { name: 'Anabaena', common: 'Anabaena', kingdom: 'Bacteria', divergence: '~1500 Mya' },
                        { name: 'Spirulina', common: 'Spirulina platensis', kingdom: 'Bacteria', divergence: '~1000 Mya' },
                        { name: 'Nostoc', common: 'Nostoc commune', kingdom: 'Bacteria', divergence: '~1200 Mya' }
                    ]}
                ]},
                { name: 'Archaea', common: 'Archaea', kingdom: 'Archaea', divergence: '~3500 Mya', children: [
                    { name: 'Euryarchaeota', common: 'Euryarchaeota', kingdom: 'Archaea', divergence: '~3000 Mya', children: [
                        { name: 'Methanococcus', common: 'Methanococcus jannaschii', kingdom: 'Archaea', divergence: '~2000 Mya' },
                        { name: 'Halobacterium', common: 'Halobacterium salinarum', kingdom: 'Archaea', divergence: '~2000 Mya' }
                    ]},
                    { name: 'Crenarchaeota', common: 'Crenarchaeota', kingdom: 'Archaea', divergence: '~3000 Mya', children: [
                        { name: 'Sulfolobus', common: 'Sulfolobus solfataricus', kingdom: 'Archaea', divergence: '~2000 Mya' },
                        { name: 'Thermoproteus', common: 'Thermoproteus tenax', kingdom: 'Archaea', divergence: '~2000 Mya' },
                        { name: 'Pyrobaculum', common: 'Pyrobaculum aerophilum', kingdom: 'Archaea', divergence: '~1800 Mya' }
                    ]}
                ]},
                { name: 'Eukaryota', common: 'Eukaryotes', kingdom: '', divergence: '~2100 Mya', children: [
                    { name: 'Plantae', common: 'Plants', kingdom: 'Plantae', divergence: '~1500 Mya', children: [
                        { name: 'Bryophyta', common: 'Mosses', kingdom: 'Plantae', divergence: '~470 Mya', children: [
                            { name: 'Sphagnum', common: 'Peat moss', kingdom: 'Plantae', divergence: '~350 Mya' },
                            { name: 'Polytrichum', common: 'Haircap moss', kingdom: 'Plantae', divergence: '~350 Mya' }
                        ]},
                        { name: 'Tracheophyta', common: 'Vascular plants', kingdom: 'Plantae', divergence: '~430 Mya', children: [
                            { name: 'Picea', common: 'Spruce', kingdom: 'Plantae', divergence: '~200 Mya' },
                            { name: 'Pinus', common: 'Pine', kingdom: 'Plantae', divergence: '~200 Mya' },
                            { name: 'Ginkgo', common: 'Ginkgo biloba', kingdom: 'Plantae', divergence: '~270 Mya' },
                            { name: 'Rosa', common: 'Rose', kingdom: 'Plantae', divergence: '~100 Mya' },
                            { name: 'Quercus', common: 'Oak', kingdom: 'Plantae', divergence: '~100 Mya' },
                            { name: 'Oryza', common: 'Rice', kingdom: 'Plantae', divergence: '~100 Mya' },
                            { name: 'Zea', common: 'Corn/Maize', kingdom: 'Plantae', divergence: '~80 Mya' },
                            { name: 'Triticum', common: 'Wheat', kingdom: 'Plantae', divergence: '~80 Mya' },
                            { name: 'Arabidopsis', common: 'Thale cress', kingdom: 'Plantae', divergence: '~120 Mya' },
                            { name: 'Helianthus', common: 'Sunflower', kingdom: 'Plantae', divergence: '~80 Mya' },
                            { name: 'Solanum', common: 'Tomato/Potato', kingdom: 'Plantae', divergence: '~90 Mya' },
                            { name: 'Cannabis', common: 'Hemp', kingdom: 'Plantae', divergence: '~90 Mya' },
                            { name: 'Coffea', common: 'Coffee', kingdom: 'Plantae', divergence: '~100 Mya' }
                        ]}
                    ]},
                    { name: 'Fungi', common: 'Fungi', kingdom: 'Fungi', divergence: '~1300 Mya', children: [
                        { name: 'Saccharomyces', common: 'Baker\'s yeast', kingdom: 'Fungi', divergence: '~600 Mya' },
                        { name: 'Agaricus', common: 'Button mushroom', kingdom: 'Fungi', divergence: '~300 Mya' },
                        { name: 'Penicillium', common: 'Penicillium mold', kingdom: 'Fungi', divergence: '~400 Mya' },
                        { name: 'Amanita', common: 'Death cap mushroom', kingdom: 'Fungi', divergence: '~200 Mya' },
                        { name: 'Candida', common: 'Candida albicans', kingdom: 'Fungi', divergence: '~500 Mya' },
                        { name: 'Aspergillus', common: 'Aspergillus niger', kingdom: 'Fungi', divergence: '~400 Mya' },
                        { name: 'Neurospora', common: 'Red bread mold', kingdom: 'Fungi', divergence: '~400 Mya' },
                        { name: 'Cordyceps', common: 'Zombie fungus', kingdom: 'Fungi', divergence: '~300 Mya' },
                        { name: 'Tuber', common: 'Truffle', kingdom: 'Fungi', divergence: '~300 Mya' },
                        { name: 'Claviceps', common: 'Ergot', kingdom: 'Fungi', divergence: '~350 Mya' }
                    ]},
                    { name: 'Animalia', common: 'Animals', kingdom: 'Animalia', divergence: '~900 Mya', children: [
                        { name: 'Invertebrates', common: 'Invertebrates', kingdom: 'Animalia', divergence: '~700 Mya', children: [
                            { name: 'Drosophila', common: 'Fruit fly', kingdom: 'Animalia', divergence: '~250 Mya' },
                            { name: 'Apis', common: 'Honey bee', kingdom: 'Animalia', divergence: '~250 Mya' },
                            { name: 'Octopus', common: 'Common octopus', kingdom: 'Animalia', divergence: '~500 Mya' },
                            { name: 'Lumbricus', common: 'Earthworm', kingdom: 'Animalia', divergence: '~500 Mya' },
                            { name: 'Asterias', common: 'Starfish', kingdom: 'Animalia', divergence: '~500 Mya' },
                            { name: 'Aurelia', common: 'Moon jellyfish', kingdom: 'Animalia', divergence: '~600 Mya' },
                            { name: 'C. elegans', common: 'Roundworm', kingdom: 'Animalia', divergence: '~550 Mya' },
                            { name: 'Homarus', common: 'Lobster', kingdom: 'Animalia', divergence: '~400 Mya' }
                        ]},
                        { name: 'Vertebrates', common: 'Vertebrates', kingdom: 'Animalia', divergence: '~525 Mya', children: [
                            { name: 'Danio', common: 'Zebrafish', kingdom: 'Animalia', divergence: '~400 Mya' },
                            { name: 'Xenopus', common: 'African clawed frog', kingdom: 'Animalia', divergence: '~350 Mya' },
                            { name: 'Gallus', common: 'Chicken', kingdom: 'Animalia', divergence: '~310 Mya' },
                            { name: 'Crocodylus', common: 'Nile crocodile', kingdom: 'Animalia', divergence: '~300 Mya' },
                            { name: 'Python', common: 'Burmese python', kingdom: 'Animalia', divergence: '~300 Mya' },
                            { name: 'Mus', common: 'House mouse', kingdom: 'Animalia', divergence: '~90 Mya' },
                            { name: 'Rattus', common: 'Brown rat', kingdom: 'Animalia', divergence: '~90 Mya' },
                            { name: 'Canis', common: 'Dog/Wolf', kingdom: 'Animalia', divergence: '~60 Mya' },
                            { name: 'Felis', common: 'Domestic cat', kingdom: 'Animalia', divergence: '~60 Mya' },
                            { name: 'Equus', common: 'Horse', kingdom: 'Animalia', divergence: '~55 Mya' },
                            { name: 'Bos', common: 'Cattle', kingdom: 'Animalia', divergence: '~60 Mya' },
                            { name: 'Elephas', common: 'Asian elephant', kingdom: 'Animalia', divergence: '~65 Mya' },
                            { name: 'Tursiops', common: 'Bottlenose dolphin', kingdom: 'Animalia', divergence: '~55 Mya' },
                            { name: 'Balaenoptera', common: 'Blue whale', kingdom: 'Animalia', divergence: '~55 Mya' },
                            { name: 'Pan', common: 'Chimpanzee', kingdom: 'Animalia', divergence: '~7 Mya' },
                            { name: 'Gorilla', common: 'Western gorilla', kingdom: 'Animalia', divergence: '~9 Mya' },
                            { name: 'Homo', common: 'Human', kingdom: 'Animalia', divergence: '~7 Mya' },
                            { name: 'Pongo', common: 'Orangutan', kingdom: 'Animalia', divergence: '~14 Mya' },
                            { name: 'Macaca', common: 'Rhesus macaque', kingdom: 'Animalia', divergence: '~25 Mya' },
                            { name: 'Ornithorhynchus', common: 'Platypus', kingdom: 'Animalia', divergence: '~170 Mya' },
                            { name: 'Pteropus', common: 'Flying fox bat', kingdom: 'Animalia', divergence: '~80 Mya' },
                            { name: 'Carcharodon', common: 'Great white shark', kingdom: 'Animalia', divergence: '~450 Mya' }
                        ]}
                    ]},
                    { name: 'Protista', common: 'Protists', kingdom: 'Protista', divergence: '~1800 Mya', children: [
                        { name: 'Amoeba', common: 'Amoeba proteus', kingdom: 'Protista', divergence: '~1500 Mya' },
                        { name: 'Paramecium', common: 'Paramecium caudatum', kingdom: 'Protista', divergence: '~1500 Mya' },
                        { name: 'Plasmodium', common: 'Malaria parasite', kingdom: 'Protista', divergence: '~800 Mya' },
                        { name: 'Euglena', common: 'Euglena gracilis', kingdom: 'Protista', divergence: '~1200 Mya' },
                        { name: 'Dictyostelium', common: 'Slime mold', kingdom: 'Protista', divergence: '~1000 Mya' },
                        { name: 'Chlamydomonas', common: 'Green alga', kingdom: 'Protista', divergence: '~1000 Mya' },
                        { name: 'Trypanosoma', common: 'Sleeping sickness', kingdom: 'Protista', divergence: '~900 Mya' },
                        { name: 'Giardia', common: 'Giardia lamblia', kingdom: 'Protista', divergence: '~1500 Mya' },
                        { name: 'Volvox', common: 'Volvox colony', kingdom: 'Protista', divergence: '~800 Mya' },
                        { name: 'Naegleria', common: 'Brain-eating amoeba', kingdom: 'Protista', divergence: '~1200 Mya' }
                    ]}
                ]}
            ]
        };

        const svg = document.getElementById('treeSvg');
        const tooltip = document.getElementById('tooltip');
        let layoutType = 'rect';

        // Process tree: assign collapse state
        function initNode(node) {
            if (!node._collapsed) node._collapsed = false;
            if (node.children) node.children.forEach(initNode);
        }
        initNode(treeData);

        function getEffectiveChildren(node) {
            if (node._collapsed || !node.children) return undefined;
            return node.children;
        }

        function getKingdomColor(node) {
            if (node.kingdom && kingdomColors[node.kingdom]) return kingdomColors[node.kingdom];
            return '#888';
        }

        function countLeaves(node) {
            if (!node.children || node._collapsed) return 1;
            return node.children.reduce((s, c) => s + countLeaves(c), 0);
        }

        function render() {
            // Build d3 hierarchy with effective children
            function buildHierarchy(node) {
                const obj = { data: node };
                const ch = getEffectiveChildren(node);
                if (ch && ch.length > 0) {
                    obj.children = ch.map(buildHierarchy);
                }
                return obj;
            }
            const hierData = buildHierarchy(treeData);
            const root = d3.hierarchy(hierData, d => d.children);

            const leaves = countLeaves(treeData);
            const depth = root.height;

            svg.innerHTML = '';

            if (layoutType === 'rect') {
                const w = Math.max(900, depth * 160 + 200);
                const h = Math.max(500, leaves * 16 + 40);
                svg.setAttribute('width', w);
                svg.setAttribute('height', h);
                svg.setAttribute('viewBox', `0 0 ${w} ${h}`);

                const treeLayout = d3.tree().size([h - 40, w - 250]);
                treeLayout(root);

                // Links
                root.links().forEach(link => {
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.classList.add('link-line');
                    const s = link.source, t = link.target;
                    path.setAttribute('d', `M${s.y + 20},${s.x + 20} C${(s.y + t.y) / 2 + 20},${s.x + 20} ${(s.y + t.y) / 2 + 20},${t.x + 20} ${t.y + 20},${t.x + 20}`);
                    path.setAttribute('stroke', getKingdomColor(t.data.data));
                    svg.appendChild(path);
                });

                // Nodes
                root.descendants().forEach(node => {
                    const d = node.data.data;
                    const x = node.y + 20, y = node.x + 20;
                    const isLeaf = !node.children;
                    const hasCollapsedChildren = d.children && d._collapsed;

                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.classList.add('node-dot');
                    circle.setAttribute('cx', x);
                    circle.setAttribute('cy', y);
                    circle.setAttribute('r', isLeaf ? 3 : 5);
                    circle.setAttribute('fill', getKingdomColor(d));
                    circle.setAttribute('stroke', hasCollapsedChildren ? var_terracotta() : 'none');
                    circle.setAttribute('stroke-width', hasCollapsedChildren ? 2 : 0);

                    if (d.children && d.children.length > 0) {
                        circle.addEventListener('click', () => {
                            d._collapsed = !d._collapsed;
                            render();
                        });
                    }
                    svg.appendChild(circle);

                    // Label
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.classList.add(isLeaf ? 'species-label' : 'clade-label');
                    text.setAttribute('x', x + (isLeaf ? 8 : -8));
                    text.setAttribute('y', y + 3);
                    text.setAttribute('text-anchor', isLeaf ? 'start' : 'end');
                    text.textContent = isLeaf ? `${d.name} (${d.common})` : d.name;

                    text.addEventListener('mouseenter', e => showTooltip(e, d));
                    text.addEventListener('mouseleave', () => tooltip.style.display = 'none');
                    if (d.children && d.children.length > 0) {
                        text.style.cursor = 'pointer';
                        text.addEventListener('click', () => {
                            d._collapsed = !d._collapsed;
                            render();
                        });
                    }
                    svg.appendChild(text);
                });
            } else {
                // Radial layout
                const size = Math.max(600, leaves * 10 + 200);
                svg.setAttribute('width', size);
                svg.setAttribute('height', size);
                svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
                const cx = size / 2, cy = size / 2;
                const radius = size / 2 - 80;

                const treeLayout = d3.tree().size([2 * Math.PI, radius]).separation((a, b) => (a.parent === b.parent ? 1 : 2) / a.depth);
                treeLayout(root);

                function project(x, y) {
                    const angle = x - Math.PI / 2;
                    return [cx + y * Math.cos(angle), cy + y * Math.sin(angle)];
                }

                // Links
                root.links().forEach(link => {
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.classList.add('link-line');
                    const s = project(link.source.x, link.source.y);
                    const t = project(link.target.x, link.target.y);
                    const m = project(link.target.x, link.source.y);
                    path.setAttribute('d', `M${s[0]},${s[1]} C${m[0]},${m[1]} ${m[0]},${m[1]} ${t[0]},${t[1]}`);
                    path.setAttribute('stroke', getKingdomColor(link.target.data.data));
                    svg.appendChild(path);
                });

                // Nodes
                root.descendants().forEach(node => {
                    const d = node.data.data;
                    const [x, y] = project(node.x, node.y);
                    const isLeaf = !node.children;
                    const hasCollapsedChildren = d.children && d._collapsed;

                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.classList.add('node-dot');
                    circle.setAttribute('cx', x);
                    circle.setAttribute('cy', y);
                    circle.setAttribute('r', isLeaf ? 2.5 : 4);
                    circle.setAttribute('fill', getKingdomColor(d));
                    circle.setAttribute('stroke', hasCollapsedChildren ? var_terracotta() : 'none');
                    circle.setAttribute('stroke-width', hasCollapsedChildren ? 2 : 0);

                    if (d.children && d.children.length > 0) {
                        circle.addEventListener('click', () => {
                            d._collapsed = !d._collapsed;
                            render();
                        });
                    }
                    svg.appendChild(circle);

                    if (isLeaf) {
                        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        text.classList.add('species-label');
                        const angle = node.x - Math.PI / 2;
                        const labelR = node.y + 8;
                        const [lx, ly] = [cx + labelR * Math.cos(angle), cy + labelR * Math.sin(angle)];
                        text.setAttribute('x', lx);
                        text.setAttribute('y', ly);
                        text.setAttribute('text-anchor', angle > Math.PI / 2 && angle < 3 * Math.PI / 2 ? 'end' : 'start');
                        const deg = angle * 180 / Math.PI;
                        const rotate = (deg > 90 && deg < 270) ? deg + 180 : deg;
                        text.setAttribute('transform', `rotate(${rotate},${lx},${ly})`);
                        text.setAttribute('font-size', '7');
                        text.textContent = d.name;
                        text.addEventListener('mouseenter', e => showTooltip(e, d));
                        text.addEventListener('mouseleave', () => tooltip.style.display = 'none');
                        svg.appendChild(text);
                    }
                });
            }
        }

        function var_terracotta() { return '#BC6C25'; }

        function showTooltip(e, d) {
            tooltip.innerHTML = `
                <h4>${d.name}</h4>
                <div class="detail"><strong>Common Name:</strong> ${d.common}</div>
                <div class="detail"><strong>Kingdom:</strong> ${d.kingdom || 'N/A'}</div>
                <div class="detail"><strong>Divergence:</strong> ${d.divergence}</div>
            `;
            tooltip.style.display = 'block';
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY - 10) + 'px';
        }

        window.setLayout = function(l) {
            layoutType = l;
            document.getElementById('rectBtn').classList.toggle('active', l === 'rect');
            document.getElementById('radialBtn').classList.toggle('active', l === 'radial');
            render();
        };

        render();
    })();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
