<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Schema Designer - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            padding: 1rem;
            overflow: hidden;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .top-bar {
            display: flex; justify-content: center; align-items: center;
            gap: 1rem; padding: 0.5rem; flex-wrap: wrap;
        }
        h1 { font-family: 'Lora', serif; font-size: 1.5rem; color: var(--moss); }
        .top-bar button {
            font-family: 'Nunito', sans-serif; padding: 0.4rem 1rem;
            border: 2px solid var(--sage); background: rgba(255,255,255,0.7);
            color: var(--dark-moss); border-radius: 10px; cursor: pointer;
            font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
        }
        .top-bar button:hover { background: var(--sage); color: white; }
        .canvas-area {
            width: 100%; height: calc(100vh - 80px);
            background: rgba(255,255,255,0.3);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        svg { width: 100%; height: 100%; }
        .table-group { cursor: grab; }
        .table-group:active { cursor: grabbing; }
        .table-rect { rx: 8; ry: 8; }
        .table-header { rx: 8; ry: 8; }
        .col-text { font-family: 'Nunito', sans-serif; font-size: 12px; }
        .col-text.pk { font-weight: 700; }
        .fk-line { stroke-width: 1.5; fill: none; }
        .fk-line:hover { stroke-width: 3; }

        /* SQL Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 200;
            justify-content: center; align-items: center;
        }
        .modal-overlay.visible { display: flex; }
        .modal {
            background: var(--cream); border-radius: 16px;
            padding: 1.5rem; max-width: 600px; width: 90%;
            max-height: 80vh; overflow: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal h2 { font-family: 'Lora', serif; color: var(--moss); margin-bottom: 1rem; }
        .modal pre {
            background: #2d2d2d; color: #f8f8f2; padding: 1rem;
            border-radius: 8px; font-size: 0.8rem; overflow: auto;
            max-height: 50vh; white-space: pre-wrap;
        }
        .modal button {
            margin-top: 1rem; padding: 0.5rem 1.5rem;
            border: 2px solid var(--sage); background: var(--sage);
            color: white; border-radius: 10px; cursor: pointer;
            font-family: 'Nunito', sans-serif; font-weight: 600;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="top-bar">
        <h1>Database Schema Designer</h1>
        <button id="exportBtn">Export SQL</button>
    </div>
    <div class="canvas-area">
        <svg id="schemaSvg" viewBox="0 0 1200 700" role="img">
            <title>Database Schema Diagram</title>
            <desc>E-commerce database schema with draggable tables and foreign key relationships</desc>
            <defs>
                <!-- Crow's foot markers -->
                <marker id="many" viewBox="0 0 12 12" refX="12" refY="6" markerWidth="12" markerHeight="12" orient="auto">
                    <path d="M0,6 L12,0 M0,6 L12,12 M0,6 L12,6" stroke="#8A9A5B" stroke-width="1.5" fill="none"/>
                </marker>
                <marker id="one" viewBox="0 0 12 12" refX="0" refY="6" markerWidth="12" markerHeight="12" orient="auto">
                    <line x1="4" y1="0" x2="4" y2="12" stroke="#8A9A5B" stroke-width="1.5"/>
                    <line x1="8" y1="0" x2="8" y2="12" stroke="#8A9A5B" stroke-width="1.5"/>
                </marker>
            </defs>
        </svg>
    </div>

    <div class="modal-overlay" id="sqlModal">
        <div class="modal">
            <h2>Generated SQL</h2>
            <pre id="sqlOutput"></pre>
            <button onclick="document.getElementById('sqlModal').classList.remove('visible')">Close</button>
        </div>
    </div>

    <script>
    (function() {
        const svg = document.getElementById('schemaSvg');
        const ns = 'http://www.w3.org/2000/svg';

        // Schema definition
        const tables = [
            {
                name: 'users', x: 50, y: 50,
                columns: [
                    { name: 'id', type: 'SERIAL', pk: true },
                    { name: 'email', type: 'VARCHAR(255)' },
                    { name: 'name', type: 'VARCHAR(100)' },
                    { name: 'password_hash', type: 'VARCHAR(255)' },
                    { name: 'created_at', type: 'TIMESTAMP' }
                ]
            },
            {
                name: 'addresses', x: 50, y: 300,
                columns: [
                    { name: 'id', type: 'SERIAL', pk: true },
                    { name: 'user_id', type: 'INT', fk: 'users.id' },
                    { name: 'street', type: 'VARCHAR(255)' },
                    { name: 'city', type: 'VARCHAR(100)' },
                    { name: 'zip', type: 'VARCHAR(20)' },
                    { name: 'country', type: 'VARCHAR(50)' }
                ]
            },
            {
                name: 'categories', x: 400, y: 50,
                columns: [
                    { name: 'id', type: 'SERIAL', pk: true },
                    { name: 'name', type: 'VARCHAR(100)' },
                    { name: 'slug', type: 'VARCHAR(100)' },
                    { name: 'parent_id', type: 'INT', fk: 'categories.id' }
                ]
            },
            {
                name: 'products', x: 400, y: 280,
                columns: [
                    { name: 'id', type: 'SERIAL', pk: true },
                    { name: 'category_id', type: 'INT', fk: 'categories.id' },
                    { name: 'name', type: 'VARCHAR(200)' },
                    { name: 'description', type: 'TEXT' },
                    { name: 'price', type: 'DECIMAL(10,2)' },
                    { name: 'stock', type: 'INT' }
                ]
            },
            {
                name: 'orders', x: 750, y: 50,
                columns: [
                    { name: 'id', type: 'SERIAL', pk: true },
                    { name: 'user_id', type: 'INT', fk: 'users.id' },
                    { name: 'address_id', type: 'INT', fk: 'addresses.id' },
                    { name: 'total', type: 'DECIMAL(10,2)' },
                    { name: 'status', type: 'VARCHAR(20)' },
                    { name: 'created_at', type: 'TIMESTAMP' }
                ]
            },
            {
                name: 'order_items', x: 750, y: 330,
                columns: [
                    { name: 'id', type: 'SERIAL', pk: true },
                    { name: 'order_id', type: 'INT', fk: 'orders.id' },
                    { name: 'product_id', type: 'INT', fk: 'products.id' },
                    { name: 'quantity', type: 'INT' },
                    { name: 'unit_price', type: 'DECIMAL(10,2)' }
                ]
            },
            {
                name: 'reviews', x: 1000, y: 180,
                columns: [
                    { name: 'id', type: 'SERIAL', pk: true },
                    { name: 'user_id', type: 'INT', fk: 'users.id' },
                    { name: 'product_id', type: 'INT', fk: 'products.id' },
                    { name: 'rating', type: 'INT' },
                    { name: 'comment', type: 'TEXT' },
                    { name: 'created_at', type: 'TIMESTAMP' }
                ]
            }
        ];

        const tableWidth = 200;
        const headerHeight = 28;
        const rowHeight = 20;
        const tablePadding = 6;

        // FK relationships derived from schema
        function getRelationships() {
            const rels = [];
            tables.forEach((table, ti) => {
                table.columns.forEach((col, ci) => {
                    if (col.fk) {
                        const [refTable, refCol] = col.fk.split('.');
                        const refTi = tables.findIndex(t => t.name === refTable);
                        if (refTi >= 0) {
                            const refCi = tables[refTi].columns.findIndex(c => c.name === refCol);
                            rels.push({ fromTable: ti, fromCol: ci, toTable: refTi, toCol: refCi >= 0 ? refCi : 0 });
                        }
                    }
                });
            });
            return rels;
        }

        let dragState = null;
        const fkGroup = document.createElementNS(ns, 'g');
        fkGroup.id = 'fk-lines';
        svg.appendChild(fkGroup);

        const tableGroups = [];

        function tableHeight(table) {
            return headerHeight + table.columns.length * rowHeight + tablePadding * 2;
        }

        function drawTables() {
            tableGroups.forEach(g => g.remove());
            tableGroups.length = 0;

            tables.forEach((table, ti) => {
                const g = document.createElementNS(ns, 'g');
                g.setAttribute('class', 'table-group');
                g.setAttribute('transform', `translate(${table.x}, ${table.y})`);

                const h = tableHeight(table);

                // Shadow
                const shadow = document.createElementNS(ns, 'rect');
                shadow.setAttribute('x', 3); shadow.setAttribute('y', 3);
                shadow.setAttribute('width', tableWidth); shadow.setAttribute('height', h);
                shadow.setAttribute('rx', 8); shadow.setAttribute('fill', 'rgba(0,0,0,0.08)');
                g.appendChild(shadow);

                // Body
                const body = document.createElementNS(ns, 'rect');
                body.setAttribute('x', 0); body.setAttribute('y', 0);
                body.setAttribute('width', tableWidth); body.setAttribute('height', h);
                body.setAttribute('rx', 8);
                body.setAttribute('fill', '#FEFAE0');
                body.setAttribute('stroke', '#606C38');
                body.setAttribute('stroke-width', '1.5');
                body.setAttribute('class', 'table-rect');
                g.appendChild(body);

                // Header
                const header = document.createElementNS(ns, 'rect');
                header.setAttribute('x', 0); header.setAttribute('y', 0);
                header.setAttribute('width', tableWidth); header.setAttribute('height', headerHeight);
                header.setAttribute('rx', 8);
                header.setAttribute('fill', '#606C38');
                header.setAttribute('class', 'table-header');
                g.appendChild(header);

                // Clip bottom corners of header
                const headerClip = document.createElementNS(ns, 'rect');
                headerClip.setAttribute('x', 0); headerClip.setAttribute('y', headerHeight - 8);
                headerClip.setAttribute('width', tableWidth); headerClip.setAttribute('height', 8);
                headerClip.setAttribute('fill', '#606C38');
                g.appendChild(headerClip);

                // Table name
                const nameText = document.createElementNS(ns, 'text');
                nameText.setAttribute('x', tableWidth / 2);
                nameText.setAttribute('y', headerHeight - 8);
                nameText.setAttribute('text-anchor', 'middle');
                nameText.setAttribute('font-size', '13');
                nameText.setAttribute('font-weight', '700');
                nameText.setAttribute('fill', '#FEFAE0');
                nameText.setAttribute('font-family', 'Nunito, sans-serif');
                nameText.textContent = table.name;
                g.appendChild(nameText);

                // Columns
                table.columns.forEach((col, ci) => {
                    const y = headerHeight + tablePadding + ci * rowHeight + 14;

                    // PK icon
                    if (col.pk) {
                        const pkIcon = document.createElementNS(ns, 'text');
                        pkIcon.setAttribute('x', 8);
                        pkIcon.setAttribute('y', y);
                        pkIcon.setAttribute('font-size', '10');
                        pkIcon.setAttribute('fill', '#DDA15E');
                        pkIcon.textContent = 'PK';
                        g.appendChild(pkIcon);
                    }

                    // FK icon
                    if (col.fk) {
                        const fkIcon = document.createElementNS(ns, 'text');
                        fkIcon.setAttribute('x', col.pk ? 28 : 8);
                        fkIcon.setAttribute('y', y);
                        fkIcon.setAttribute('font-size', '10');
                        fkIcon.setAttribute('fill', '#8A9A5B');
                        fkIcon.textContent = 'FK';
                        g.appendChild(fkIcon);
                    }

                    const colText = document.createElementNS(ns, 'text');
                    colText.setAttribute('x', 35);
                    colText.setAttribute('y', y);
                    colText.setAttribute('font-size', '11');
                    colText.setAttribute('fill', '#3d4423');
                    colText.setAttribute('font-family', 'Nunito, sans-serif');
                    colText.setAttribute('class', 'col-text' + (col.pk ? ' pk' : ''));
                    colText.textContent = col.name;
                    g.appendChild(colText);

                    const typeText = document.createElementNS(ns, 'text');
                    typeText.setAttribute('x', tableWidth - 8);
                    typeText.setAttribute('y', y);
                    typeText.setAttribute('text-anchor', 'end');
                    typeText.setAttribute('font-size', '9');
                    typeText.setAttribute('fill', '#8A9A5B');
                    typeText.setAttribute('font-family', 'Nunito, sans-serif');
                    typeText.textContent = col.type;
                    g.appendChild(typeText);

                    // Separator line
                    if (ci < table.columns.length - 1) {
                        const sep = document.createElementNS(ns, 'line');
                        sep.setAttribute('x1', 5); sep.setAttribute('x2', tableWidth - 5);
                        sep.setAttribute('y1', y + 5); sep.setAttribute('y2', y + 5);
                        sep.setAttribute('stroke', 'rgba(138,154,91,0.15)');
                        sep.setAttribute('stroke-width', '0.5');
                        g.appendChild(sep);
                    }
                });

                // Drag handlers
                g.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    e.preventDefault();
                    const pt = svg.createSVGPoint();
                    pt.x = e.clientX; pt.y = e.clientY;
                    const svgPt = pt.matrixTransform(svg.getScreenCTM().inverse());
                    dragState = { tableIndex: ti, offsetX: svgPt.x - table.x, offsetY: svgPt.y - table.y };
                });

                svg.appendChild(g);
                tableGroups.push(g);
            });

            drawRelationships();
        }

        function drawRelationships() {
            fkGroup.innerHTML = '';
            const rels = getRelationships();

            rels.forEach(rel => {
                const fromT = tables[rel.fromTable];
                const toT = tables[rel.toTable];

                const fromY = fromT.y + headerHeight + tablePadding + rel.fromCol * rowHeight + 8;
                const toY = toT.y + headerHeight + tablePadding + rel.toCol * rowHeight + 8;

                // Determine connection sides
                let fromX, toX;
                const fromCenterX = fromT.x + tableWidth / 2;
                const toCenterX = toT.x + tableWidth / 2;

                if (fromCenterX < toCenterX) {
                    fromX = fromT.x + tableWidth;
                    toX = toT.x;
                } else if (fromCenterX > toCenterX) {
                    fromX = fromT.x;
                    toX = toT.x + tableWidth;
                } else {
                    // Same x - use right side
                    fromX = fromT.x + tableWidth;
                    toX = toT.x + tableWidth;
                }

                // Self-referencing (e.g., categories.parent_id)
                if (rel.fromTable === rel.toTable) {
                    const ox = fromT.x + tableWidth + 30;
                    const path = document.createElementNS(ns, 'path');
                    path.setAttribute('d', `M${fromT.x + tableWidth},${fromY} C${ox},${fromY} ${ox},${toY} ${toT.x + tableWidth},${toY}`);
                    path.setAttribute('stroke', '#8A9A5B');
                    path.setAttribute('class', 'fk-line');
                    path.setAttribute('marker-end', 'url(#many)');
                    path.setAttribute('marker-start', 'url(#one)');
                    const title = document.createElementNS(ns, 'title');
                    title.textContent = `${fromT.name}.${fromT.columns[rel.fromCol].name} -> ${toT.name}.${toT.columns[rel.toCol].name}`;
                    path.appendChild(title);
                    fkGroup.appendChild(path);
                    return;
                }

                const mx = (fromX + toX) / 2;
                const path = document.createElementNS(ns, 'path');
                path.setAttribute('d', `M${fromX},${fromY} C${mx},${fromY} ${mx},${toY} ${toX},${toY}`);
                path.setAttribute('stroke', '#8A9A5B');
                path.setAttribute('class', 'fk-line');
                path.setAttribute('marker-end', 'url(#one)');
                path.setAttribute('marker-start', 'url(#many)');

                const title = document.createElementNS(ns, 'title');
                title.textContent = `${fromT.name}.${fromT.columns[rel.fromCol].name} -> ${toT.name}.${toT.columns[rel.toCol].name}`;
                path.appendChild(title);
                fkGroup.appendChild(path);
            });
        }

        // Mouse move/up for dragging
        document.addEventListener('mousemove', (e) => {
            if (!dragState) return;
            const pt = svg.createSVGPoint();
            pt.x = e.clientX; pt.y = e.clientY;
            const svgPt = pt.matrixTransform(svg.getScreenCTM().inverse());

            tables[dragState.tableIndex].x = svgPt.x - dragState.offsetX;
            tables[dragState.tableIndex].y = svgPt.y - dragState.offsetY;

            tableGroups[dragState.tableIndex].setAttribute('transform',
                `translate(${tables[dragState.tableIndex].x}, ${tables[dragState.tableIndex].y})`);
            drawRelationships();
        });

        document.addEventListener('mouseup', () => { dragState = null; });

        // Export SQL
        document.getElementById('exportBtn').addEventListener('click', () => {
            let sql = '';
            tables.forEach(table => {
                sql += `CREATE TABLE ${table.name} (\n`;
                const lines = [];
                const fks = [];
                table.columns.forEach(col => {
                    let line = `    ${col.name} ${col.type}`;
                    if (col.pk) line += ' PRIMARY KEY';
                    lines.push(line);
                    if (col.fk) {
                        const [refT, refC] = col.fk.split('.');
                        fks.push(`    FOREIGN KEY (${col.name}) REFERENCES ${refT}(${refC})`);
                    }
                });
                sql += lines.concat(fks).join(',\n');
                sql += '\n);\n\n';
            });
            document.getElementById('sqlOutput').textContent = sql;
            document.getElementById('sqlModal').classList.add('visible');
        });

        drawTables();
    })();
    </script>
</body>
</html>
