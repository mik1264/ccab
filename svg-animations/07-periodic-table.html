    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            overflow-x: auto;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.8);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 1.8rem; color: var(--moss); text-align: center; margin: 1rem 0 0.25rem; }
        .subtitle { color: var(--terracotta); text-align: center; margin-bottom: 0.5rem; font-size: 0.95rem; }
        .filters {
            display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
            padding: 0 1rem; margin-bottom: 0.5rem;
        }
        .filter-btn {
            padding: 4px 12px; border: 2px solid var(--sage); background: rgba(255,255,255,0.5);
            color: var(--moss); font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.8rem; cursor: pointer; border-radius: 15px; transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active { background: var(--sage); color: white; }
        .table-wrapper {
            overflow-x: auto; padding: 0.5rem 1rem 1rem;
            display: flex; justify-content: center;
        }
        .element-rect { cursor: pointer; transition: opacity 0.3s, filter 0.3s; }
        .element-rect:hover { filter: brightness(1.15); }
        .element-rect.dimmed { opacity: 0.15; }
        .element-symbol { font-family: 'Nunito', sans-serif; font-weight: 700; pointer-events: none; }
        .element-number { font-family: 'Nunito', sans-serif; font-size: 7px; pointer-events: none; }
        .element-name { font-family: 'Nunito', sans-serif; font-size: 5.5px; pointer-events: none; }
        .info-card {
            position: fixed; right: 1rem; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
            border-radius: 16px; padding: 1.2rem; border: 2px solid var(--earth);
            width: 260px; box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            z-index: 50; display: none;
        }
        .info-card h2 { font-family: 'Lora', serif; color: var(--moss); font-size: 1.3rem; margin-bottom: 0.3rem; }
        .info-card .big-symbol { font-size: 2.5rem; font-weight: 700; color: var(--terracotta); }
        .info-card .detail { margin: 0.3rem 0; font-size: 0.85rem; line-height: 1.4; }
        .info-card .detail strong { color: var(--terracotta); }
        .info-card .close-btn {
            position: absolute; top: 8px; right: 12px; background: none; border: none;
            font-size: 1.3rem; cursor: pointer; color: var(--moss);
        }
        .legend { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 0.5rem; padding: 0 1rem; }
        .legend-item { display: flex; align-items: center; gap: 3px; font-size: 0.7rem; }
        .legend-swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.15); }
    </style>
</head>

            [109,'Mt','Meitnerium',8,6,'transition-metal','solid','278','[Rn]5f14 6d7 7s2',1982,'Peter Armbruster','Named after Lise Meitner, nuclear fission co-discoverer'],
            [110,'Ds','Darmstadtium',9,6,'transition-metal','solid','281','[Rn]5f14 6d8 7s2',1994,'Sigurd Hofmann','Named after Darmstadt, Germany'],
            [111,'Rg','Roentgenium',10,6,'transition-metal','solid','282','[Rn]5f14 6d9 7s2',1994,'Sigurd Hofmann','Named after Wilhelm Rontgen, X-ray discoverer'],
            [112,'Cn','Copernicium',11,6,'transition-metal','liquid','285','[Rn]5f14 6d10 7s2',1996,'Sigurd Hofmann','Named after Nicolaus Copernicus'],
            [113,'Nh','Nihonium',12,6,'post-transition','solid','286','[Rn]5f14 6d10 7s2 7p1',2003,'Kosuke Morita','First element discovered in Asia (Japan)'],
            [114,'Fl','Flerovium',13,6,'post-transition','solid','289','[Rn]5f14 6d10 7s2 7p2',1999,'Yuri Oganessian','Named after Flerov Laboratory in Dubna'],
            [115,'Mc','Moscovium',14,6,'post-transition','solid','290','[Rn]5f14 6d10 7s2 7p3',2003,'Yuri Oganessian','Named after Moscow Oblast, Russia'],
            [116,'Lv','Livermorium',15,6,'post-transition','solid','293','[Rn]5f14 6d10 7s2 7p4',2000,'Yuri Oganessian','Named after Lawrence Livermore National Laboratory'],
            [117,'Ts','Tennessine',16,6,'halogen','solid','294','[Rn]5f14 6d10 7s2 7p5',2010,'Yuri Oganessian','Named after Tennessee; superheavy element'],
            [118,'Og','Oganesson',17,6,'noble-gas','gas','294','[Rn]5f14 6d10 7s2 7p6',2006,'Yuri Oganessian','Named after a living person (Yuri Oganessian)']
        ];

        const svg = document.getElementById('ptSvg');
        const totalCols = 18, totalRows = 10;
        const svgW = totalCols * CELL + 10, svgH = totalRows * CELL + 30;
        svg.setAttribute('width', svgW);
        svg.setAttribute('height', svgH);
        svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);

        // Build legend
        const legendEl = document.getElementById('legend');
        Object.entries(categories).forEach(([key, val]) => {
            const item = document.createElement('span');
            item.className = 'legend-item';
            item.innerHTML = `<span class="legend-swatch" style="background:${val.color}"></span>${val.label}`;
            legendEl.appendChild(item);
        });

        // Build filter buttons
        const filtersEl = document.getElementById('filters');
        const filterAll = document.createElement('button');
        filterAll.className = 'filter-btn active';
        filterAll.textContent = 'All';
        filterAll.onclick = () => filterBy(null);
        filtersEl.appendChild(filterAll);
        Object.entries(categories).forEach(([key, val]) => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.textContent = val.label;
            btn.onclick = () => filterBy('cat', key);
            filtersEl.appendChild(btn);
        });
        ['Solid','Liquid','Gas'].forEach(state => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.textContent = state;
            btn.onclick = () => filterBy('state', state.toLowerCase());
            filtersEl.appendChild(btn);
        });

        // Draw elements
        const groups = [];
        elements.forEach(el => {
            const [num, sym, name, col, row, cat, state, mass, eConfig, year, disc, fact] = el;
            const x = col * CELL + 5;
            const y = row * CELL + 5;
            const color = categories[cat]?.color || '#ccc';

            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.classList.add('element-rect');
            g.dataset.cat = cat;
            g.dataset.state = state;
            g.dataset.num = num;

            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('x', x);
            rect.setAttribute('y', y);
            rect.setAttribute('width', CELL - PAD);
            rect.setAttribute('height', CELL - PAD);
            rect.setAttribute('rx', 4);
            rect.setAttribute('fill', color);
            rect.setAttribute('stroke', '#fff');
            rect.setAttribute('stroke-width', '1');
            g.appendChild(rect);

            const numText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            numText.classList.add('element-number');
            numText.setAttribute('x', x + 4);
            numText.setAttribute('y', y + 9);
            numText.setAttribute('fill', '#333');
            numText.textContent = num;
            g.appendChild(numText);

            const symText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            symText.classList.add('element-symbol');
            symText.setAttribute('x', x + (CELL - PAD) / 2);
            symText.setAttribute('y', y + 26);
            symText.setAttribute('text-anchor', 'middle');
            symText.setAttribute('font-size', FONT);
            symText.setAttribute('fill', '#222');
            symText.textContent = sym;
            g.appendChild(symText);

            const nameText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            nameText.classList.add('element-name');
            nameText.setAttribute('x', x + (CELL - PAD) / 2);
            nameText.setAttribute('y', y + 36);
            nameText.setAttribute('text-anchor', 'middle');
            nameText.setAttribute('fill', '#444');
            nameText.textContent = name.length > 7 ? name.slice(0, 6) + '.' : name;
            g.appendChild(nameText);

            g.addEventListener('click', () => showInfo(el));
            svg.appendChild(g);
            groups.push(g);
        });

        // Lanthanide/Actinide labels
        const labelY8 = 8 * CELL + 5 + (CELL - PAD) / 2 + 3;
        const labelY9 = 9 * CELL + 5 + (CELL - PAD) / 2 + 3;
        [['57-71', labelY8], ['89-103', labelY9]].forEach(([text, y]) => {
            const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            t.setAttribute('x', 5 + (CELL - PAD) / 2);
            t.setAttribute('y', y);
            t.setAttribute('text-anchor', 'middle');
            t.setAttribute('font-size', '7');
            t.setAttribute('fill', '#888');
            t.setAttribute('font-family', 'Nunito, sans-serif');
            t.textContent = text;
            svg.appendChild(t);
        });

        function filterBy(type, value) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            groups.forEach(g => {
                if (!type) {
                    g.classList.remove('dimmed');
                } else if (type === 'cat') {
                    g.classList.toggle('dimmed', g.dataset.cat !== value);
                } else if (type === 'state') {
                    g.classList.toggle('dimmed', g.dataset.state !== value);
                }
            });
        }

        function showInfo(el) {
            const [num, sym, name, col, row, cat, state, mass, eConfig, year, disc, fact] = el;
            const card = document.getElementById('infoCard');
            const catLabel = categories[cat]?.label || cat;
            document.getElementById('infoContent').innerHTML = `
                <div class="big-symbol">${sym}</div>
                <h2>${name}</h2>
                <div class="detail"><strong>Atomic Number:</strong> ${num}</div>
                <div class="detail"><strong>Atomic Mass:</strong> ${mass}</div>
                <div class="detail"><strong>Category:</strong> ${catLabel}</div>
                <div class="detail"><strong>State (room temp):</strong> ${state}</div>
                <div class="detail"><strong>Electron Config:</strong> ${eConfig}</div>
                <div class="detail"><strong>Discovered:</strong> ${year} by ${disc}</div>
                <div class="detail"><strong>Fun Fact:</strong> ${fact}</div>
            `;
            card.style.display = 'block';
        }

        function closeInfo() {
            document.getElementById('infoCard').style.display = 'none';
        }
    })();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
