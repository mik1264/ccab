<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computing History Timeline - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.8);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 1.6rem; color: var(--moss); margin: 1rem 0 0.2rem; text-align: center; }
        .subtitle { color: var(--terracotta); text-align: center; margin-bottom: 0.3rem; font-size: 0.85rem; }
        .filters {
            display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
            margin-bottom: 0.3rem; padding: 0 1rem;
        }
        .filter-btn {
            padding: 4px 12px; border: 2px solid var(--sage); background: rgba(255,255,255,0.5);
            color: var(--moss); font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.78rem; cursor: pointer; border-radius: 12px; transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active { background: var(--sage); color: white; }
        .timeline-viewport {
            flex: 1; width: 100%; overflow: hidden; cursor: grab; position: relative;
        }
        .timeline-viewport.grabbing { cursor: grabbing; }
        .axis-line { stroke: var(--moss); stroke-width: 2; }
        .tick-line { stroke: rgba(96,108,56,0.3); stroke-width: 1; }
        .tick-label { font-family: 'Nunito', sans-serif; font-size: 11px; fill: var(--moss); font-weight: 600; }
        .event-dot { cursor: pointer; transition: r 0.2s, fill-opacity 0.3s; }
        .event-dot:hover { r: 8; }
        .event-dot.hidden { fill-opacity: 0.05; }
        .event-label {
            font-family: 'Nunito', sans-serif; font-size: 8px; fill: var(--dark-moss);
            pointer-events: none; font-weight: 600;
        }
        .event-stem { stroke: rgba(0,0,0,0.15); stroke-width: 1; }
        .event-stem.hidden { opacity: 0.05; }
        .info-card {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.94); backdrop-filter: blur(12px);
            border-radius: 16px; padding: 1rem 1.5rem; border: 2px solid var(--earth);
            max-width: 450px; width: 90%; box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            z-index: 50; display: none;
        }
        .info-card h3 { font-family: 'Lora', serif; color: var(--moss); margin-bottom: 0.2rem; font-size: 1.1rem; }
        .info-card .year-badge {
            display: inline-block; padding: 2px 10px; border-radius: 10px;
            font-weight: 700; font-size: 0.8rem; margin-bottom: 0.3rem;
        }
        .info-card .detail { font-size: 0.85rem; line-height: 1.5; }
        .info-card .close-btn {
            position: absolute; top: 6px; right: 10px; background: none; border: none;
            font-size: 1.2rem; cursor: pointer; color: var(--moss);
        }
        .hint { position: fixed; bottom: 0.5rem; right: 1rem; font-size: 0.75rem; color: var(--sage); z-index: 10; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>History of Computing</h1>
    <p class="subtitle">Scroll to zoom, drag to pan. Click events for details.</p>
    <div class="filters" id="filters"></div>
    <div class="timeline-viewport" id="viewport">
        <svg id="tlSvg" role="graphics-document" aria-label="Computing history timeline">
            <title>Computing History Timeline</title>
            <desc>Interactive horizontal timeline showing 60 key events in computing history from 1820 to 2025, color-coded by category: hardware, software, internet/web, AI, and people.</desc>
        </svg>
    </div>
    <div class="info-card" id="infoCard">
        <button class="close-btn" onclick="document.getElementById('infoCard').style.display='none'">&times;</button>
        <div id="infoContent"></div>
    </div>
    <div class="hint">Mouse wheel to zoom, drag to pan</div>

    <script>
    (function(){
        const categories = {
            hardware:  { label: 'Hardware',      color: '#e74c3c' },
            software:  { label: 'Software',      color: '#2980b9' },
            web:       { label: 'Internet/Web',  color: '#27ae60' },
            ai:        { label: 'AI',            color: '#8e44ad' },
            people:    { label: 'People',        color: '#e67e22' }
        };

        const events = [
            { year: 1822, title: "Babbage's Difference Engine", cat: 'hardware', desc: 'Charles Babbage designed the first automatic mechanical calculator, capable of computing polynomial functions.' },
            { year: 1843, title: "Ada Lovelace's Algorithm", cat: 'people', desc: 'Ada Lovelace published the first computer algorithm for Babbage\'s Analytical Engine, making her the first programmer.' },
            { year: 1890, title: 'Hollerith Tabulator', cat: 'hardware', desc: 'Herman Hollerith\'s punch card tabulating machine processed the 1890 US Census in 1 year instead of 8.' },
            { year: 1936, title: "Turing Machine Paper", cat: 'people', desc: 'Alan Turing published "On Computable Numbers," introducing the theoretical Turing machine and computability.' },
            { year: 1937, title: 'Shannon\'s Boolean Logic', cat: 'people', desc: 'Claude Shannon\'s master\'s thesis showed electrical circuits could perform Boolean algebra.' },
            { year: 1941, title: 'Z3 Computer', cat: 'hardware', desc: 'Konrad Zuse built the Z3, the world\'s first programmable, fully automatic digital computer.' },
            { year: 1943, title: 'Colossus', cat: 'hardware', desc: 'British codebreakers built Colossus, the first electronic digital programmable computer, to crack Enigma.' },
            { year: 1945, title: 'ENIAC', cat: 'hardware', desc: 'ENIAC, the first general-purpose electronic computer, was completed. It weighed 30 tons and used 18,000 vacuum tubes.' },
            { year: 1947, title: 'Transistor Invented', cat: 'hardware', desc: 'Bell Labs\' Bardeen, Brattain, and Shockley invented the transistor, revolutionizing electronics.' },
            { year: 1950, title: 'Turing Test', cat: 'ai', desc: 'Alan Turing proposed the "imitation game" (Turing Test) to evaluate machine intelligence.' },
            { year: 1956, title: 'Dartmouth AI Conference', cat: 'ai', desc: 'The field of Artificial Intelligence was formally founded at this seminal conference.' },
            { year: 1957, title: 'FORTRAN', cat: 'software', desc: 'IBM released FORTRAN, the first high-level programming language, transforming scientific computing.' },
            { year: 1958, title: 'Integrated Circuit', cat: 'hardware', desc: 'Jack Kilby and Robert Noyce independently invented the integrated circuit, enabling miniaturization.' },
            { year: 1962, title: 'Spacewar!', cat: 'software', desc: 'MIT students created Spacewar!, one of the first interactive computer games.' },
            { year: 1964, title: 'IBM System/360', cat: 'hardware', desc: 'IBM launched System/360, the first family of compatible computers, revolutionizing business computing.' },
            { year: 1965, title: "Moore's Law", cat: 'people', desc: 'Gordon Moore predicted transistor density would double every two years, a trend that held for 50+ years.' },
            { year: 1969, title: 'ARPANET', cat: 'web', desc: 'The first message was sent over ARPANET, the precursor to the internet, from UCLA to Stanford.' },
            { year: 1970, title: 'UNIX', cat: 'software', desc: 'Ken Thompson and Dennis Ritchie created UNIX at Bell Labs, influencing virtually all modern operating systems.' },
            { year: 1971, title: 'Intel 4004', cat: 'hardware', desc: 'Intel released the 4004, the first commercial microprocessor, containing 2,300 transistors.' },
            { year: 1972, title: 'C Language', cat: 'software', desc: 'Dennis Ritchie created C at Bell Labs. It became the most influential programming language in history.' },
            { year: 1973, title: 'Ethernet', cat: 'web', desc: 'Bob Metcalfe invented Ethernet at Xerox PARC, enabling local area networking.' },
            { year: 1975, title: 'Altair 8800', cat: 'hardware', desc: 'MITS released the Altair 8800, sparking the personal computer revolution.' },
            { year: 1976, title: 'Apple I', cat: 'hardware', desc: 'Steve Wozniak and Steve Jobs created the Apple I in a garage, founding Apple Computer.' },
            { year: 1977, title: 'RSA Encryption', cat: 'software', desc: 'Rivest, Shamir, and Adleman published RSA, the first practical public-key cryptosystem.' },
            { year: 1981, title: 'IBM PC', cat: 'hardware', desc: 'IBM launched the PC with MS-DOS, establishing the architecture that dominates desktop computing.' },
            { year: 1983, title: 'TCP/IP Adopted', cat: 'web', desc: 'ARPANET switched to TCP/IP on January 1, creating the modern internet protocol stack.' },
            { year: 1984, title: 'Macintosh', cat: 'hardware', desc: 'Apple launched the Macintosh, popularizing the graphical user interface for personal computers.' },
            { year: 1985, title: 'Windows 1.0', cat: 'software', desc: 'Microsoft released Windows 1.0, beginning the dominance of Windows in personal computing.' },
            { year: 1989, title: 'World Wide Web', cat: 'web', desc: 'Tim Berners-Lee proposed the World Wide Web at CERN, inventing HTML, HTTP, and URLs.' },
            { year: 1991, title: 'Linux Kernel', cat: 'software', desc: 'Linus Torvalds released the Linux kernel, launching the open-source operating system movement.' },
            { year: 1993, title: 'Mosaic Browser', cat: 'web', desc: 'NCSA Mosaic became the first popular graphical web browser, bringing the web to the masses.' },
            { year: 1995, title: 'JavaScript & Java', cat: 'software', desc: 'Brendan Eich created JavaScript in 10 days. Sun released Java. Both transformed web development.' },
            { year: 1997, title: 'Deep Blue Beats Kasparov', cat: 'ai', desc: 'IBM\'s Deep Blue defeated world chess champion Garry Kasparov, a milestone for AI.' },
            { year: 1998, title: 'Google Founded', cat: 'web', desc: 'Larry Page and Sergey Brin founded Google, transforming how humanity finds information.' },
            { year: 1999, title: 'Wi-Fi Standard', cat: 'hardware', desc: 'The IEEE 802.11b "Wi-Fi" standard was released, enabling widespread wireless networking.' },
            { year: 2001, title: 'Wikipedia Launched', cat: 'web', desc: 'Jimmy Wales launched Wikipedia, creating the world\'s largest collaborative encyclopedia.' },
            { year: 2004, title: 'Facebook Launched', cat: 'web', desc: 'Mark Zuckerberg launched Facebook from his Harvard dorm room, pioneering social networking.' },
            { year: 2005, title: 'YouTube & Git', cat: 'web', desc: 'YouTube launched (later acquired by Google). Linus Torvalds created Git for version control.' },
            { year: 2007, title: 'iPhone', cat: 'hardware', desc: 'Apple released the iPhone, launching the smartphone revolution and mobile computing era.' },
            { year: 2008, title: 'Bitcoin Whitepaper', cat: 'software', desc: 'Satoshi Nakamoto published the Bitcoin whitepaper, introducing blockchain technology.' },
            { year: 2009, title: 'Node.js', cat: 'software', desc: 'Ryan Dahl released Node.js, enabling JavaScript on the server and transforming web development.' },
            { year: 2010, title: 'iPad Launch', cat: 'hardware', desc: 'Apple launched the iPad, creating the modern tablet computing category.' },
            { year: 2011, title: 'Watson on Jeopardy!', cat: 'ai', desc: 'IBM Watson defeated Jeopardy! champions, showcasing natural language processing capabilities.' },
            { year: 2012, title: 'AlexNet / Deep Learning', cat: 'ai', desc: 'AlexNet won ImageNet, sparking the deep learning revolution and modern AI era.' },
            { year: 2013, title: 'Docker', cat: 'software', desc: 'Docker launched, popularizing containerization and transforming software deployment.' },
            { year: 2014, title: 'Alexa & Echo', cat: 'hardware', desc: 'Amazon launched Echo with Alexa, bringing AI voice assistants into millions of homes.' },
            { year: 2015, title: 'Kubernetes 1.0', cat: 'software', desc: 'Google released Kubernetes, becoming the standard for container orchestration.' },
            { year: 2016, title: 'AlphaGo Defeats Lee Sedol', cat: 'ai', desc: 'DeepMind\'s AlphaGo defeated Go world champion Lee Sedol 4-1, a landmark AI achievement.' },
            { year: 2017, title: 'Transformer Paper', cat: 'ai', desc: 'Google published "Attention Is All You Need," introducing the Transformer architecture behind modern AI.' },
            { year: 2018, title: 'BERT & GPT', cat: 'ai', desc: 'Google released BERT and OpenAI released GPT, advancing natural language understanding.' },
            { year: 2019, title: 'Quantum Supremacy', cat: 'hardware', desc: 'Google claimed quantum supremacy with Sycamore, performing a task beyond classical computers.' },
            { year: 2020, title: 'GPT-3', cat: 'ai', desc: 'OpenAI released GPT-3, a 175B parameter model that demonstrated remarkable language abilities.' },
            { year: 2020, title: 'Apple M1 Chip', cat: 'hardware', desc: 'Apple released the M1 chip, transitioning Macs to ARM architecture with exceptional performance.' },
            { year: 2021, title: 'GitHub Copilot', cat: 'ai', desc: 'GitHub launched Copilot, the first mainstream AI pair programmer powered by OpenAI Codex.' },
            { year: 2022, title: 'ChatGPT', cat: 'ai', desc: 'OpenAI released ChatGPT, reaching 100M users in 2 months and democratizing AI interaction.' },
            { year: 2022, title: 'Stable Diffusion', cat: 'ai', desc: 'Stability AI released Stable Diffusion, making AI image generation open and accessible.' },
            { year: 2023, title: 'GPT-4', cat: 'ai', desc: 'OpenAI released GPT-4, a multimodal model capable of understanding images and complex reasoning.' },
            { year: 2024, title: 'Claude 3 Opus', cat: 'ai', desc: 'Anthropic released Claude 3, advancing AI safety and capability with the Opus, Sonnet, and Haiku models.' },
            { year: 2024, title: 'Apple Vision Pro', cat: 'hardware', desc: 'Apple launched Vision Pro, its spatial computing headset blending AR and VR.' },
            { year: 2025, title: 'AI Agents Mainstream', cat: 'ai', desc: 'AI coding agents like Claude Code became mainstream development tools, transforming software engineering.' }
        ];

        // Build filters
        const filtersEl = document.getElementById('filters');
        const allBtn = document.createElement('button');
        allBtn.className = 'filter-btn active';
        allBtn.textContent = 'All';
        allBtn.onclick = () => filterCat(null);
        filtersEl.appendChild(allBtn);
        Object.entries(categories).forEach(([key, val]) => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.style.borderColor = val.color;
            btn.textContent = val.label;
            btn.onclick = () => filterCat(key);
            filtersEl.appendChild(btn);
        });

        let activeCat = null;
        function filterCat(cat) {
            activeCat = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderEvents();
        }

        const svg = document.getElementById('tlSvg');
        const viewport = document.getElementById('viewport');
        const H = 500;

        // Timeline range
        const minYear = 1820, maxYear = 2026;
        let viewStart = 1820, viewEnd = 2026;
        let panStartX = 0, panViewStart = 0, isPanning = false;

        function yearToX(year) {
            const vw = window.innerWidth;
            return ((year - viewStart) / (viewEnd - viewStart)) * vw;
        }

        function renderTimeline() {
            svg.innerHTML = '';
            const vw = window.innerWidth;
            svg.setAttribute('width', vw);
            svg.setAttribute('height', H);
            svg.setAttribute('viewBox', `0 0 ${vw} ${H}`);

            const axisY = H / 2;

            // Axis line
            const axis = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            axis.classList.add('axis-line');
            axis.setAttribute('x1', 0); axis.setAttribute('y1', axisY);
            axis.setAttribute('x2', vw); axis.setAttribute('y2', axisY);
            svg.appendChild(axis);

            // Ticks
            const range = viewEnd - viewStart;
            let tickInterval;
            if (range > 150) tickInterval = 20;
            else if (range > 60) tickInterval = 10;
            else if (range > 20) tickInterval = 5;
            else tickInterval = 1;

            const firstTick = Math.ceil(viewStart / tickInterval) * tickInterval;
            for (let y = firstTick; y <= viewEnd; y += tickInterval) {
                const x = yearToX(y);
                const tick = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                tick.classList.add('tick-line');
                tick.setAttribute('x1', x); tick.setAttribute('y1', axisY - 8);
                tick.setAttribute('x2', x); tick.setAttribute('y2', axisY + 8);
                svg.appendChild(tick);

                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.classList.add('tick-label');
                label.setAttribute('x', x);
                label.setAttribute('y', axisY + 22);
                label.setAttribute('text-anchor', 'middle');
                label.textContent = y;
                svg.appendChild(label);
            }

            renderEvents();
        }

        function renderEvents() {
            // Remove old events
            svg.querySelectorAll('.event-g').forEach(g => g.remove());

            const axisY = H / 2;
            events.forEach((ev, i) => {
                const x = yearToX(ev.year);
                if (x < -50 || x > window.innerWidth + 50) return;

                const above = i % 2 === 0;
                const stemLen = 40 + (i % 5) * 20;
                const ey = above ? axisY - stemLen : axisY + stemLen;

                const isHidden = activeCat && ev.cat !== activeCat;

                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.classList.add('event-g');

                // Stem
                const stem = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                stem.classList.add('event-stem');
                if (isHidden) stem.classList.add('hidden');
                stem.setAttribute('x1', x); stem.setAttribute('y1', axisY);
                stem.setAttribute('x2', x); stem.setAttribute('y2', ey);
                g.appendChild(stem);

                // Dot
                const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                dot.classList.add('event-dot');
                if (isHidden) dot.classList.add('hidden');
                dot.setAttribute('cx', x);
                dot.setAttribute('cy', ey);
                dot.setAttribute('r', 5);
                dot.setAttribute('fill', categories[ev.cat].color);
                dot.addEventListener('click', () => showEventInfo(ev));
                g.appendChild(dot);

                // Label
                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.classList.add('event-label');
                if (isHidden) label.style.opacity = '0.05';
                label.setAttribute('x', x + 6);
                label.setAttribute('y', ey + (above ? -6 : 14));
                label.textContent = ev.title;
                g.appendChild(label);

                svg.appendChild(g);
            });
        }

        function showEventInfo(ev) {
            const card = document.getElementById('infoCard');
            const color = categories[ev.cat].color;
            document.getElementById('infoContent').innerHTML = `
                <span class="year-badge" style="background:${color}; color:white;">${ev.year}</span>
                <h3>${ev.title}</h3>
                <p class="detail">${ev.desc}</p>
                <p class="detail" style="color:${color}; font-weight:700; font-size:0.8rem;">${categories[ev.cat].label}</p>
            `;
            card.style.display = 'block';
        }

        // Pan
        viewport.addEventListener('mousedown', e => {
            isPanning = true;
            panStartX = e.clientX;
            panViewStart = viewStart;
            viewport.classList.add('grabbing');
        });
        window.addEventListener('mousemove', e => {
            if (!isPanning) return;
            const dx = e.clientX - panStartX;
            const yearPerPx = (viewEnd - viewStart) / window.innerWidth;
            const shift = -dx * yearPerPx;
            viewStart = panViewStart + shift;
            viewEnd = viewStart + (panViewStart + (viewEnd - viewStart) + shift - viewStart);
            // Keep viewEnd consistent
            const span = viewEnd - viewStart;
            viewEnd = viewStart + span;
            renderTimeline();
        });
        window.addEventListener('mouseup', () => {
            isPanning = false;
            viewport.classList.remove('grabbing');
        });

        // Zoom
        viewport.addEventListener('wheel', e => {
            e.preventDefault();
            const zoom = e.deltaY > 0 ? 1.1 : 0.9;
            const rect = viewport.getBoundingClientRect();
            const mx = (e.clientX - rect.left) / rect.width;
            const span = viewEnd - viewStart;
            const newSpan = Math.max(10, Math.min(maxYear - minYear + 10, span * zoom));
            const yearAtMouse = viewStart + span * mx;
            viewStart = yearAtMouse - newSpan * mx;
            viewEnd = viewStart + newSpan;
            renderTimeline();
        }, { passive: false });

        window.addEventListener('resize', renderTimeline);
        renderTimeline();
    })();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
