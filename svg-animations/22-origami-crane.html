<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origami Crane Folding - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); margin: 0.5rem 0; }
        .subtitle { color: var(--terracotta); margin-bottom: 1rem; }
        .step-controls {
            display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem;
        }
        .step-controls button {
            font-family: 'Nunito', sans-serif; padding: 0.5rem 1.2rem;
            border: 2px solid var(--sage); background: rgba(255,255,255,0.7);
            color: var(--dark-moss); border-radius: 12px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; transition: all 0.2s;
        }
        .step-controls button:hover { background: rgba(255,255,255,0.95); border-color: var(--moss); }
        .step-controls button:disabled { opacity: 0.4; cursor: not-allowed; }
        .step-counter {
            font-weight: 700; font-size: 1rem; color: var(--moss);
            background: rgba(255,255,255,0.7); padding: 0.4rem 1rem; border-radius: 12px;
        }
        .diagram-area {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 30px rgba(138,154,91,0.15);
            text-align: center;
        }
        .instruction-text {
            margin-top: 1rem; font-size: 1rem; font-weight: 600;
            color: var(--moss); max-width: 500px; text-align: center;
            min-height: 3em;
        }
        .fold-legend {
            display: flex; gap: 1.5rem; justify-content: center; margin-top: 0.75rem;
            font-size: 0.85rem; color: var(--sage);
        }
        .fold-legend span { display: flex; align-items: center; gap: 0.3rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Origami Crane</h1>
    <p class="subtitle">Step-by-step paper folding sequence</p>

    <div class="step-controls">
        <button id="prevBtn" disabled>&#8592; Previous</button>
        <span class="step-counter" id="stepCounter">Step 1 / 15</span>
        <button id="nextBtn">Next &#8594;</button>
    </div>

    <div class="diagram-area">
        <svg id="origamiSvg" width="400" height="400" viewBox="0 0 400 400" role="img">
            <title>Origami Crane Folding Diagram</title>
            <desc>Step-by-step origami crane folding instructions</desc>
            <defs>
                <filter id="paper">
                    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
                    <feDiffuseLighting in="noise" lighting-color="#FEFAE0" surfaceScale="1.5" result="light">
                        <feDistantLight azimuth="45" elevation="55"/>
                    </feDiffuseLighting>
                    <feComposite in="SourceGraphic" in2="light" operator="arithmetic" k1="0.8" k2="0.3" k3="0" k4="0"/>
                </filter>
            </defs>
        </svg>
        <div class="instruction-text" id="instruction"></div>
        <div class="fold-legend">
            <span><svg width="40" height="10"><line x1="0" y1="5" x2="40" y2="5" stroke="#BC6C25" stroke-width="2" stroke-dasharray="6,3"/></svg> Valley fold</span>
            <span><svg width="40" height="10"><line x1="0" y1="5" x2="40" y2="5" stroke="#606C38" stroke-width="2" stroke-dasharray="8,3,2,3"/></svg> Mountain fold</span>
        </div>
    </div>

    <script>
    (function() {
        const svg = document.getElementById('origamiSvg');
        const ns = 'http://www.w3.org/2000/svg';
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const stepCounter = document.getElementById('stepCounter');
        const instruction = document.getElementById('instruction');

        let currentStep = 0;

        // Colors
        const paperFront = '#FEFAE0';
        const paperBack = '#DDA15E';
        const paperMid = '#EDE8D5';
        const valleyStroke = '#BC6C25';
        const mountainStroke = '#606C38';
        const shading = 'rgba(96,108,56,0.12)';

        // 15 steps of crane folding
        const steps = [
            {
                instruction: 'Start with a square sheet of paper, colored side up.',
                draw: function() {
                    rect(50, 50, 300, 300, paperFront, '#3d4423');
                }
            },
            {
                instruction: 'Valley fold in half diagonally, corner to corner.',
                draw: function() {
                    // Show square with diagonal fold line
                    rect(50, 50, 300, 300, paperFront, '#3d4423');
                    foldLine(50, 50, 350, 350, 'valley');
                    arrow(280, 120, 120, 280);
                }
            },
            {
                instruction: 'Result: a triangle. Colored side is hidden inside.',
                draw: function() {
                    polygon([[50,350],[350,350],[200,200]], paperBack, '#3d4423');
                    polygon([[50,350],[350,350],[200,200]], shading, 'none');
                }
            },
            {
                instruction: 'Valley fold the triangle in half, left corner to right.',
                draw: function() {
                    polygon([[50,350],[350,350],[200,200]], paperBack, '#3d4423');
                    foldLine(200, 200, 200, 350, 'valley');
                    arrow(100, 300, 300, 300);
                }
            },
            {
                instruction: 'Result: a smaller triangle.',
                draw: function() {
                    polygon([[200,200],[350,350],[200,350]], paperBack, '#3d4423');
                    polygon([[200,200],[350,350],[200,350]], shading, 'none');
                }
            },
            {
                instruction: 'Lift top flap and squash fold into a square (diamond).',
                draw: function() {
                    // Show the squash fold result - a diamond/square on point
                    polygon([[200,100],[300,200],[200,300],[100,200]], paperBack, '#3d4423');
                    // Fold line down center
                    foldLine(200, 100, 200, 300, 'mountain');
                    // Shading on right half
                    polygon([[200,100],[300,200],[200,300]], shading, 'none');
                }
            },
            {
                instruction: 'Flip over and repeat squash fold on other side.',
                draw: function() {
                    polygon([[200,100],[300,200],[200,300],[100,200]], paperFront, '#3d4423');
                    foldLine(200, 100, 200, 300, 'mountain');
                    polygon([[200,100],[100,200],[200,300]], shading, 'none');
                    textLabel(200, 370, 'Preliminary base complete');
                }
            },
            {
                instruction: 'Fold left and right edges to center line (kite fold).',
                draw: function() {
                    polygon([[200,100],[300,200],[200,300],[100,200]], paperFront, '#3d4423');
                    foldLine(100, 200, 200, 300, 'valley');
                    foldLine(300, 200, 200, 300, 'valley');
                    arrow(120, 220, 190, 260);
                    arrow(280, 220, 210, 260);
                }
            },
            {
                instruction: 'Result: kite shape. Fold top triangle down as crease.',
                draw: function() {
                    // Kite shape
                    polygon([[200,100],[260,200],[200,330],[140,200]], paperFront, '#3d4423');
                    // Top triangle fold
                    foldLine(140, 200, 260, 200, 'valley');
                    arrow(200, 130, 200, 180);
                    polygon([[140,200],[200,100],[260,200]], shading, 'none');
                }
            },
            {
                instruction: 'Unfold kite flaps, then petal fold upward using the creases.',
                draw: function() {
                    // Petal fold result - elongated diamond
                    polygon([[200,80],[260,200],[200,330],[140,200]], paperFront, '#3d4423');
                    polygon([[200,80],[260,200],[200,180],[140,200]], shading, 'none');
                    textLabel(200, 370, 'Petal fold (bird base half)');
                }
            },
            {
                instruction: 'Flip over and repeat petal fold on other side. Bird base complete.',
                draw: function() {
                    // Bird base - elongated diamond both sides
                    polygon([[200,70],[250,190],[200,340],[150,190]], paperBack, '#3d4423');
                    // Inner diamond lines
                    line(200, 70, 150, 190, '#3d4423', 0.5);
                    line(200, 70, 250, 190, '#3d4423', 0.5);
                    line(200, 340, 150, 190, '#3d4423', 0.5);
                    line(200, 340, 250, 190, '#3d4423', 0.5);
                    textLabel(200, 375, 'Bird base');
                }
            },
            {
                instruction: 'Fold lower legs up along center to form neck and tail.',
                draw: function() {
                    // Bird base with legs folded up
                    polygon([[200,70],[250,190],[200,200],[150,190]], paperBack, '#3d4423');
                    // Neck (left)
                    polygon([[150,190],[200,200],[130,90]], paperFront, '#3d4423');
                    // Tail (right)
                    polygon([[250,190],[200,200],[270,90]], paperFront, '#3d4423');
                    foldLine(150, 190, 200, 200, 'valley');
                    foldLine(250, 190, 200, 200, 'valley');
                }
            },
            {
                instruction: 'Inside reverse fold the neck upward. Shape the tail.',
                draw: function() {
                    // Body
                    polygon([[180,200],[220,200],[210,280],[190,280]], paperBack, '#3d4423');
                    // Wings
                    polygon([[180,200],[100,180],[190,230]], paperFront, '#3d4423');
                    polygon([[220,200],[300,180],[210,230]], paperFront, '#3d4423');
                    // Neck going up
                    polygon([[180,200],[170,120],[190,120]], paperBack, '#3d4423');
                    // Tail
                    polygon([[210,280],[250,310],[220,290]], paperFront, '#3d4423');
                }
            },
            {
                instruction: 'Inside reverse fold the head. Pull wings apart gently.',
                draw: function() {
                    // Body
                    polygon([[180,210],[220,210],[215,270],[185,270]], paperBack, '#3d4423');
                    // Wings spread
                    polygon([[180,210],[80,170],[185,240]], paperFront, '#3d4423');
                    polygon([[220,210],[320,170],[215,240]], paperFront, '#3d4423');
                    // Neck
                    polygon([[185,210],[175,130],[190,130]], paperBack, '#3d4423');
                    // Head (reverse fold)
                    polygon([[175,130],[155,110],[170,105]], paperBack, '#3d4423');
                    // Beak
                    line(155, 110, 140, 108, '#3d4423', 2);
                    // Tail
                    polygon([[215,270],[250,295],[220,280]], paperFront, '#3d4423');
                }
            },
            {
                instruction: 'Completed crane! Blow into the bottom to inflate the body.',
                draw: function() {
                    // Final crane with detail
                    // Body (puffed)
                    const bodyPath = `M190,220 Q175,200 185,185 Q195,175 205,175 Q215,175 225,185 Q235,200 220,220 Q210,260 205,265 Q200,268 195,265 Q190,260 190,220 Z`;
                    path(bodyPath, paperBack, '#3d4423');
                    // Left wing
                    path('M185,200 Q140,170 70,155 Q100,175 130,190 Q160,205 185,210 Z', paperFront, '#3d4423');
                    // Right wing
                    path('M225,200 Q260,170 330,155 Q300,175 270,190 Q240,205 225,210 Z', paperFront, '#3d4423');
                    // Neck
                    path('M195,185 Q185,160 180,135 Q178,125 175,120 L180,118 Q183,125 185,135 Q190,160 200,180 Z', paperBack, '#3d4423');
                    // Head
                    path('M175,120 Q168,115 160,112 L158,114 Q165,116 172,120 Z', paperBack, '#3d4423');
                    // Tail
                    path('M205,260 Q215,275 240,290 Q220,280 210,270 Q205,265 200,262 Z', paperFront, '#3d4423');
                    // Eye
                    circle(170, 116, 1.5, '#3d4423');
                    textLabel(200, 370, 'Traditional origami crane');
                }
            }
        ];

        function rect(x, y, w, h, fill, stroke) {
            const r = document.createElementNS(ns, 'rect');
            r.setAttribute('x', x); r.setAttribute('y', y);
            r.setAttribute('width', w); r.setAttribute('height', h);
            r.setAttribute('fill', fill);
            if (stroke) { r.setAttribute('stroke', stroke); r.setAttribute('stroke-width', '1.5'); }
            r.setAttribute('rx', '2');
            svg.appendChild(r);
        }

        function polygon(points, fill, stroke) {
            const p = document.createElementNS(ns, 'polygon');
            p.setAttribute('points', points.map(pt => pt.join(',')).join(' '));
            p.setAttribute('fill', fill);
            if (stroke && stroke !== 'none') { p.setAttribute('stroke', stroke); p.setAttribute('stroke-width', '1.5'); }
            p.appendChild(createTitle('Paper layer'));
            svg.appendChild(p);
        }

        function path(d, fill, stroke) {
            const p = document.createElementNS(ns, 'path');
            p.setAttribute('d', d);
            p.setAttribute('fill', fill);
            if (stroke) { p.setAttribute('stroke', stroke); p.setAttribute('stroke-width', '1'); }
            p.setAttribute('stroke-linejoin', 'round');
            svg.appendChild(p);
        }

        function line(x1, y1, x2, y2, stroke, width) {
            const l = document.createElementNS(ns, 'line');
            l.setAttribute('x1', x1); l.setAttribute('y1', y1);
            l.setAttribute('x2', x2); l.setAttribute('y2', y2);
            l.setAttribute('stroke', stroke);
            l.setAttribute('stroke-width', width || 1);
            svg.appendChild(l);
        }

        function circle(cx, cy, r, fill) {
            const c = document.createElementNS(ns, 'circle');
            c.setAttribute('cx', cx); c.setAttribute('cy', cy);
            c.setAttribute('r', r); c.setAttribute('fill', fill);
            svg.appendChild(c);
        }

        function foldLine(x1, y1, x2, y2, type) {
            const l = document.createElementNS(ns, 'line');
            l.setAttribute('x1', x1); l.setAttribute('y1', y1);
            l.setAttribute('x2', x2); l.setAttribute('y2', y2);
            l.setAttribute('stroke-width', '2');
            if (type === 'valley') {
                l.setAttribute('stroke', valleyStroke);
                l.setAttribute('stroke-dasharray', '6,3');
            } else {
                l.setAttribute('stroke', mountainStroke);
                l.setAttribute('stroke-dasharray', '8,3,2,3');
            }
            svg.appendChild(l);
        }

        function arrow(x1, y1, x2, y2) {
            // Curved arrow
            const mx = (x1 + x2) / 2 + (y1 - y2) * 0.3;
            const my = (y1 + y2) / 2 + (x2 - x1) * 0.3;
            const p = document.createElementNS(ns, 'path');
            p.setAttribute('d', `M${x1},${y1} Q${mx},${my} ${x2},${y2}`);
            p.setAttribute('fill', 'none');
            p.setAttribute('stroke', '#8A9A5B');
            p.setAttribute('stroke-width', '2');
            p.setAttribute('marker-end', 'url(#arrowhead)');
            svg.appendChild(p);
        }

        function textLabel(x, y, text) {
            const t = document.createElementNS(ns, 'text');
            t.setAttribute('x', x); t.setAttribute('y', y);
            t.setAttribute('text-anchor', 'middle');
            t.setAttribute('font-size', '12');
            t.setAttribute('fill', '#8A9A5B');
            t.setAttribute('font-weight', '600');
            t.setAttribute('font-family', 'Nunito, sans-serif');
            t.textContent = text;
            svg.appendChild(t);
        }

        function createTitle(text) {
            const t = document.createElementNS(ns, 'title');
            t.textContent = text;
            return t;
        }

        function drawStep(index) {
            // Keep defs
            svg.innerHTML = '';
            // Re-add defs
            const defs = document.createElementNS(ns, 'defs');
            // Arrow marker
            const marker = document.createElementNS(ns, 'marker');
            marker.setAttribute('id', 'arrowhead');
            marker.setAttribute('markerWidth', '8');
            marker.setAttribute('markerHeight', '6');
            marker.setAttribute('refX', '8');
            marker.setAttribute('refY', '3');
            marker.setAttribute('orient', 'auto');
            const arrowPath = document.createElementNS(ns, 'path');
            arrowPath.setAttribute('d', 'M0,0 L8,3 L0,6 Z');
            arrowPath.setAttribute('fill', '#8A9A5B');
            marker.appendChild(arrowPath);
            defs.appendChild(marker);

            // Paper texture filter
            const filter = document.createElementNS(ns, 'filter');
            filter.setAttribute('id', 'paper');
            const turb = document.createElementNS(ns, 'feTurbulence');
            turb.setAttribute('type', 'fractalNoise');
            turb.setAttribute('baseFrequency', '0.04');
            turb.setAttribute('numOctaves', '4');
            turb.setAttribute('result', 'noise');
            filter.appendChild(turb);
            defs.appendChild(filter);

            svg.appendChild(defs);

            steps[index].draw();
            instruction.textContent = steps[index].instruction;
            stepCounter.textContent = `Step ${index + 1} / ${steps.length}`;
            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === steps.length - 1;
        }

        prevBtn.addEventListener('click', () => {
            if (currentStep > 0) { currentStep--; drawStep(currentStep); }
        });

        nextBtn.addEventListener('click', () => {
            if (currentStep < steps.length - 1) { currentStep++; drawStep(currentStep); }
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentStep > 0) { currentStep--; drawStep(currentStep); }
            if (e.key === 'ArrowRight' && currentStep < steps.length - 1) { currentStep++; drawStep(currentStep); }
        });

        drawStep(0);
    })();
    </script>
</body>
</html>
