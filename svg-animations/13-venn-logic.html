<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venn Diagram Logic - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.8);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 1.8rem; color: var(--moss); margin: 1.5rem 0 0.3rem; text-align: center; }
        .subtitle { color: var(--terracotta); text-align: center; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .controls {
            display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
            margin-bottom: 0.5rem; padding: 0 1rem;
        }
        .ctrl-btn {
            padding: 5px 14px; border: 2px solid var(--sage); background: rgba(255,255,255,0.6);
            color: var(--moss); font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.82rem; cursor: pointer; border-radius: 15px; transition: all 0.3s;
        }
        .ctrl-btn:hover, .ctrl-btn.active { background: var(--sage); color: white; }
        .main-area {
            display: flex; gap: 1.5rem; padding: 0.5rem 1rem; max-width: 1000px;
            width: 100%; align-items: flex-start; flex-wrap: wrap; justify-content: center;
        }
        .venn-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 1rem; border: 2px solid rgba(138,154,91,0.15);
        }
        .venn-circle { fill-opacity: 0.2; stroke-width: 2.5; cursor: move; transition: fill-opacity 0.3s; }
        .venn-circle:hover { fill-opacity: 0.3; }
        .region-text { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; pointer-events: none; text-anchor: middle; }
        .set-label { font-family: 'Lora', serif; font-size: 16px; font-weight: 700; pointer-events: none; text-anchor: middle; }
        .formula-label { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; fill: var(--terracotta); pointer-events: none; text-anchor: middle; }
        .side-panel {
            background: rgba(255,255,255,0.75); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 1.2rem; border: 2px solid rgba(138,154,91,0.15);
            min-width: 250px; max-width: 300px; flex: 1;
        }
        .side-panel h3 { font-family: 'Lora', serif; color: var(--moss); margin-bottom: 0.5rem; }
        .set-editor { margin-bottom: 0.8rem; }
        .set-editor label { font-weight: 700; color: var(--terracotta); font-size: 0.9rem; }
        .set-editor input {
            width: 100%; padding: 6px 10px; border: 2px solid rgba(138,154,91,0.3);
            border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 0.85rem;
            background: rgba(255,255,255,0.7); margin-top: 3px; outline: none;
        }
        .set-editor input:focus { border-color: var(--sage); }
        .result-area { margin-top: 0.5rem; font-size: 0.85rem; line-height: 1.6; }
        .result-area strong { color: var(--terracotta); }
        .operation-btns {
            display: flex; gap: 6px; flex-wrap: wrap; margin-top: 0.5rem;
        }
        .op-btn {
            padding: 4px 10px; border: 1.5px solid var(--sage); background: rgba(255,255,255,0.5);
            color: var(--moss); font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.78rem; cursor: pointer; border-radius: 12px; transition: all 0.3s;
        }
        .op-btn:hover, .op-btn.active { background: var(--sage); color: white; }
        @media (max-width: 768px) {
            .main-area { flex-direction: column; align-items: center; }
            .side-panel { max-width: 100%; min-width: auto; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Venn Diagram Logic</h1>
    <p class="subtitle">Drag circles to reposition. Click operation buttons to highlight regions.</p>

    <div class="controls">
        <button class="ctrl-btn active" id="btn2" onclick="setCircles(2)">2 Sets</button>
        <button class="ctrl-btn" id="btn3" onclick="setCircles(3)">3 Sets</button>
    </div>

    <div class="main-area">
        <div class="venn-container">
            <svg id="vennSvg" width="420" height="380" viewBox="0 0 420 380" role="graphics-document" aria-label="Interactive Venn diagram">
                <title>Venn Diagram Logic</title>
                <desc>Interactive Venn diagram with two or three overlapping circles. Drag circles to reposition. Click operations to highlight regions showing set operations like union, intersection, and difference.</desc>
            </svg>
        </div>
        <div class="side-panel">
            <h3>Set Editor</h3>
            <div class="set-editor">
                <label>Set A (comma-separated):</label>
                <input id="inputA" value="1, 2, 3, 4, 5" oninput="updateSets()"/>
            </div>
            <div class="set-editor">
                <label>Set B (comma-separated):</label>
                <input id="inputB" value="3, 4, 5, 6, 7" oninput="updateSets()"/>
            </div>
            <div class="set-editor" id="inputCRow">
                <label>Set C (comma-separated):</label>
                <input id="inputC" value="5, 6, 7, 8, 9" oninput="updateSets()"/>
            </div>

            <h3>Operations</h3>
            <div class="operation-btns" id="opBtns"></div>

            <div class="result-area" id="resultArea">
                <p>Click an operation to see the result.</p>
            </div>
        </div>
    </div>

    <script>
    (function(){
        const svg = document.getElementById('vennSvg');
        let numCircles = 2;
        let activeOp = null;

        const circles = [
            { id: 'A', cx: 160, cy: 180, r: 100, color: '#2980b9', label: 'A' },
            { id: 'B', cx: 260, cy: 180, r: 100, color: '#27ae60', label: 'B' },
            { id: 'C', cx: 210, cy: 260, r: 100, color: '#e67e22', label: 'C' }
        ];

        const operations2 = [
            { label: 'A only', formula: 'A - B', fn: (a, b) => diff(a, b) },
            { label: 'A \u2229 B', formula: 'A \u2229 B', fn: (a, b) => intersect(a, b) },
            { label: 'B only', formula: 'B - A', fn: (a, b) => diff(b, a) },
            { label: 'A \u222A B', formula: 'A \u222A B', fn: (a, b) => union(a, b) },
            { label: 'A \u0394 B', formula: 'A \u0394 B', fn: (a, b) => symDiff(a, b) },
            { label: 'Neither', formula: "(A \u222A B)'", fn: (a, b, c, u) => diff(u, union(a, b)) }
        ];

        const operations3 = [
            { label: 'A only', formula: 'A - B - C', fn: (a, b, c) => diff(diff(a, b), c) },
            { label: 'A \u2229 B', formula: 'A \u2229 B - C', fn: (a, b, c) => diff(intersect(a, b), c) },
            { label: 'B only', formula: 'B - A - C', fn: (a, b, c) => diff(diff(b, a), c) },
            { label: 'A \u2229 C', formula: 'A \u2229 C - B', fn: (a, b, c) => diff(intersect(a, c), b) },
            { label: 'B \u2229 C', formula: 'B \u2229 C - A', fn: (a, b, c) => diff(intersect(b, c), a) },
            { label: 'C only', formula: 'C - A - B', fn: (a, b, c) => diff(diff(c, a), b) },
            { label: 'A \u2229 B \u2229 C', formula: 'A \u2229 B \u2229 C', fn: (a, b, c) => intersect(intersect(a, b), c) },
            { label: 'A \u222A B \u222A C', formula: 'A \u222A B \u222A C', fn: (a, b, c) => union(union(a, b), c) }
        ];

        function parseSet(input) {
            return new Set(input.split(',').map(s => s.trim()).filter(s => s));
        }
        function intersect(a, b) { return new Set([...a].filter(x => b.has(x))); }
        function union(a, b) { return new Set([...a, ...b]); }
        function diff(a, b) { return new Set([...a].filter(x => !b.has(x))); }
        function symDiff(a, b) { return diff(union(a, b), intersect(a, b)); }

        function getSets() {
            const a = parseSet(document.getElementById('inputA').value);
            const b = parseSet(document.getElementById('inputB').value);
            const c = parseSet(document.getElementById('inputC').value);
            const u = union(union(a, b), c);
            // Add some extra elements for complement
            for (let i = 1; i <= 10; i++) u.add(String(i));
            return { a, b, c, u };
        }

        function render() {
            svg.innerHTML = '';

            // Background rect
            const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            bg.setAttribute('x', 0); bg.setAttribute('y', 0);
            bg.setAttribute('width', 420); bg.setAttribute('height', 380);
            bg.setAttribute('fill', 'rgba(254,250,224,0.3)');
            bg.setAttribute('rx', 16);
            svg.appendChild(bg);

            const visibleCircles = numCircles === 2 ? circles.slice(0, 2) : circles;

            // Draw circles
            visibleCircles.forEach((c, i) => {
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.classList.add('venn-circle');
                circle.setAttribute('cx', c.cx);
                circle.setAttribute('cy', c.cy);
                circle.setAttribute('r', c.r);
                circle.setAttribute('fill', c.color);
                circle.setAttribute('stroke', c.color);
                circle.dataset.idx = i;
                svg.appendChild(circle);

                // Drag
                let dragging = false, offsetX, offsetY;
                circle.addEventListener('mousedown', e => {
                    dragging = true;
                    offsetX = e.clientX - c.cx;
                    offsetY = e.clientY - c.cy;
                    e.preventDefault();
                });
                window.addEventListener('mousemove', e => {
                    if (!dragging) return;
                    const rect = svg.getBoundingClientRect();
                    const scaleX = 420 / rect.width;
                    const scaleY = 380 / rect.height;
                    c.cx = Math.max(c.r, Math.min(420 - c.r, (e.clientX - rect.left) * scaleX));
                    c.cy = Math.max(c.r, Math.min(380 - c.r, (e.clientY - rect.top) * scaleY));
                    render();
                });
                window.addEventListener('mouseup', () => { dragging = false; });
            });

            // Labels
            visibleCircles.forEach(c => {
                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.classList.add('set-label');
                label.setAttribute('x', c.cx);
                label.setAttribute('y', c.cy - c.r - 8);
                label.setAttribute('fill', c.color);
                label.textContent = c.label;
                svg.appendChild(label);
            });

            // Highlight active operation
            if (activeOp !== null) {
                highlightOperation(activeOp);
            }

            // Universe label
            const uLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            uLabel.setAttribute('x', 10);
            uLabel.setAttribute('y', 20);
            uLabel.setAttribute('font-size', '12');
            uLabel.setAttribute('fill', '#999');
            uLabel.setAttribute('font-family', 'Nunito, sans-serif');
            uLabel.textContent = 'U (Universal Set)';
            svg.appendChild(uLabel);
        }

        function highlightOperation(opIdx) {
            const ops = numCircles === 2 ? operations2 : operations3;
            if (opIdx >= ops.length) return;
            const op = ops[opIdx];
            const { a, b, c, u } = getSets();
            let result;
            if (numCircles === 2) {
                result = op.fn(a, b, c, u);
            } else {
                result = op.fn(a, b, c, u);
            }

            const resultArea = document.getElementById('resultArea');
            const items = [...result].sort();
            resultArea.innerHTML = `
                <p><strong>${op.formula}:</strong></p>
                <p>{ ${items.join(', ')} }</p>
                <p><strong>Count:</strong> ${items.length}</p>
            `;

            // Add formula label to SVG
            const fLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            fLabel.classList.add('formula-label');
            fLabel.setAttribute('x', 210);
            fLabel.setAttribute('y', 370);
            fLabel.textContent = op.formula + ' = { ' + items.join(', ') + ' }';
            svg.appendChild(fLabel);
        }

        function buildOpButtons() {
            const opBtns = document.getElementById('opBtns');
            opBtns.innerHTML = '';
            const ops = numCircles === 2 ? operations2 : operations3;
            ops.forEach((op, i) => {
                const btn = document.createElement('button');
                btn.className = 'op-btn';
                btn.textContent = op.label;
                btn.onclick = () => {
                    activeOp = i;
                    document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    render();
                };
                opBtns.appendChild(btn);
            });
        }

        window.setCircles = function(n) {
            numCircles = n;
            document.getElementById('btn2').classList.toggle('active', n === 2);
            document.getElementById('btn3').classList.toggle('active', n === 3);
            document.getElementById('inputCRow').style.display = n === 3 ? 'block' : 'none';
            activeOp = null;
            document.getElementById('resultArea').innerHTML = '<p>Click an operation to see the result.</p>';
            buildOpButtons();
            render();
        };

        window.updateSets = function() {
            if (activeOp !== null) render();
        };

        // Initialize
        document.getElementById('inputCRow').style.display = 'none';
        buildOpButtons();
        render();
    })();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
