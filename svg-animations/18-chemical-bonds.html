<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemical Bond Builder - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
            display: flex; flex-direction: column;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.8);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .header-bar {
            text-align: center; padding: 0.5rem 0; margin-top: 48px;
        }
        .header-bar h1 { font-family: 'Lora', serif; font-size: 1.5rem; color: var(--moss); }
        .header-bar p { color: var(--terracotta); font-size: 0.82rem; }
        .top-controls {
            display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
            padding: 0.3rem 1rem; border-bottom: 1px solid rgba(138,154,91,0.15);
            background: rgba(255,255,255,0.4);
        }
        .top-controls label { font-weight: 600; color: var(--moss); font-size: 0.82rem; margin-right: 4px; }
        .element-pick {
            display: inline-block; padding: 3px 8px; border: 2px solid rgba(138,154,91,0.3);
            border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 700;
            transition: all 0.2s; margin: 2px; background: rgba(255,255,255,0.6);
        }
        .element-pick:hover { border-color: var(--terracotta); transform: scale(1.05); }
        .element-pick.selected { border-color: var(--terracotta); background: rgba(188,108,37,0.15); }
        .preset-btn {
            padding: 3px 10px; border: 1.5px solid var(--sage); background: rgba(255,255,255,0.5);
            color: var(--moss); font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.78rem; cursor: pointer; border-radius: 10px; transition: all 0.2s;
        }
        .preset-btn:hover { background: var(--sage); color: white; }
        .bond-btn {
            padding: 3px 10px; border: 1.5px solid var(--earth); background: rgba(255,255,255,0.5);
            color: var(--terracotta); font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.78rem; cursor: pointer; border-radius: 10px; transition: all 0.2s;
        }
        .bond-btn:hover { background: var(--earth); color: white; }
        .bond-btn.active { background: var(--earth); color: white; }
        .clear-btn {
            padding: 3px 10px; border: 1.5px solid #c0392b; background: rgba(255,255,255,0.5);
            color: #c0392b; font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.78rem; cursor: pointer; border-radius: 10px; transition: all 0.2s;
        }
        .clear-btn:hover { background: #c0392b; color: white; }
        .canvas-area { flex: 1; position: relative; }
        #bondSvg { width: 100%; height: 100%; }
        .atom-group { cursor: move; }
        .atom-circle { transition: filter 0.2s; }
        .atom-circle:hover { filter: brightness(1.15); }
        .atom-symbol { font-family: 'Nunito', sans-serif; font-weight: 700; fill: white; pointer-events: none; text-anchor: middle; }
        .atom-dots { pointer-events: none; }
        .dot { fill: var(--dark-moss); }
        .bond-line { stroke: #555; stroke-width: 3; cursor: pointer; }
        .bond-line:hover { stroke: var(--terracotta); }
        .valence-warning { fill: #c0392b; font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 700; pointer-events: none; }
        .hint-text {
            position: fixed; bottom: 0.5rem; left: 50%; transform: translateX(-50%);
            font-size: 0.78rem; color: var(--sage); background: rgba(255,255,255,0.7);
            padding: 3px 12px; border-radius: 10px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="header-bar">
        <h1>Chemical Bond Builder</h1>
        <p>Pick elements, place atoms on the canvas, and create bonds between them.</p>
    </div>
    <div class="top-controls">
        <label>Elements:</label>
        <span id="elementPicker"></span>
        <span style="margin-left: 8px;"><label>Presets:</label></span>
        <button class="preset-btn" onclick="loadPreset('H2O')">H&#8322;O</button>
        <button class="preset-btn" onclick="loadPreset('CO2')">CO&#8322;</button>
        <button class="preset-btn" onclick="loadPreset('CH4')">CH&#8324;</button>
        <button class="preset-btn" onclick="loadPreset('NH3')">NH&#8323;</button>
        <button class="preset-btn" onclick="loadPreset('O2')">O&#8322;</button>
        <button class="preset-btn" onclick="loadPreset('N2')">N&#8322;</button>
        <button class="preset-btn" onclick="loadPreset('HCl')">HCl</button>
        <button class="preset-btn" onclick="loadPreset('benzene')">Benzene</button>
        <span style="margin-left: 8px;"><label>Bond:</label></span>
        <button class="bond-btn" id="bondSingle" onclick="setBondMode(1)">Single</button>
        <button class="bond-btn" id="bondDouble" onclick="setBondMode(2)">Double</button>
        <button class="bond-btn" id="bondTriple" onclick="setBondMode(3)">Triple</button>
        <button class="clear-btn" onclick="clearCanvas()">Clear</button>
    </div>
    <div class="canvas-area">
        <svg id="bondSvg" role="graphics-document" aria-label="Chemical bond builder canvas">
            <title>Chemical Bond Builder</title>
            <desc>Interactive chemical bond builder. Select elements from the periodic table picker, place atoms on the canvas, and draw bonds between them. Lewis dot structures are shown around atoms, and valence violations are highlighted in red.</desc>
        </svg>
    </div>
    <div class="hint-text" id="hint">Select an element, then click on the canvas to place an atom. Click two atoms to bond them.</div>

    <script>
    (function(){
        const elementsData = {
            H:  { symbol: 'H',  name: 'Hydrogen',  valence: 1, electrons: 1, color: '#888888', radius: 18 },
            C:  { symbol: 'C',  name: 'Carbon',     valence: 4, electrons: 4, color: '#333333', radius: 22 },
            N:  { symbol: 'N',  name: 'Nitrogen',   valence: 3, electrons: 5, color: '#3498db', radius: 22 },
            O:  { symbol: 'O',  name: 'Oxygen',     valence: 2, electrons: 6, color: '#e74c3c', radius: 22 },
            F:  { symbol: 'F',  name: 'Fluorine',   valence: 1, electrons: 7, color: '#2ecc71', radius: 20 },
            Cl: { symbol: 'Cl', name: 'Chlorine',   valence: 1, electrons: 7, color: '#27ae60', radius: 24 },
            S:  { symbol: 'S',  name: 'Sulfur',     valence: 2, electrons: 6, color: '#f1c40f', radius: 24 },
            P:  { symbol: 'P',  name: 'Phosphorus', valence: 3, electrons: 5, color: '#e67e22', radius: 23 },
            Br: { symbol: 'Br', name: 'Bromine',    valence: 1, electrons: 7, color: '#8e44ad', radius: 26 }
        };

        const svg = document.getElementById('bondSvg');
        const hint = document.getElementById('hint');
        let selectedElement = 'C';
        let bondOrder = 1;
        let atoms = [];
        let bonds = [];
        let nextId = 1;
        let connectSource = null;
        let dragging = null;
        let dragOffset = { x: 0, y: 0 };

        // Build element picker
        const picker = document.getElementById('elementPicker');
        Object.keys(elementsData).forEach(sym => {
            const span = document.createElement('span');
            span.className = 'element-pick' + (sym === 'C' ? ' selected' : '');
            span.textContent = sym;
            span.style.color = elementsData[sym].color;
            span.onclick = () => {
                document.querySelectorAll('.element-pick').forEach(s => s.classList.remove('selected'));
                span.classList.add('selected');
                selectedElement = sym;
                hint.textContent = `Click on canvas to place ${elementsData[sym].name}.`;
            };
            picker.appendChild(span);
        });

        function setBondMode(order) {
            bondOrder = order;
            ['bondSingle', 'bondDouble', 'bondTriple'].forEach((id, i) => {
                document.getElementById(id).classList.toggle('active', i + 1 === order);
            });
        }
        window.setBondMode = setBondMode;

        function svgPoint(e) {
            const rect = svg.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function getBondsForAtom(atomId) {
            return bonds.filter(b => b.from === atomId || b.to === atomId)
                        .reduce((sum, b) => sum + b.order, 0);
        }

        function addAtom(sym, x, y) {
            const id = nextId++;
            const atom = { id, sym, x, y };
            atoms.push(atom);
            renderAll();
            return atom;
        }

        function addBond(fromId, toId, order) {
            // Check if bond already exists
            const existing = bonds.find(b =>
                (b.from === fromId && b.to === toId) || (b.from === toId && b.to === fromId)
            );
            if (existing) {
                // Cycle bond order
                existing.order = (existing.order % 3) + 1;
            } else {
                bonds.push({ from: fromId, to: toId, order: order });
            }
            renderAll();
        }

        function renderAll() {
            svg.innerHTML = '';

            // Draw bonds
            bonds.forEach(bond => {
                const from = atoms.find(a => a.id === bond.from);
                const to = atoms.find(a => a.id === bond.to);
                if (!from || !to) return;

                const dx = to.x - from.x, dy = to.y - from.y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                const nx = -dy / len, ny = dx / len;
                const sep = 5;

                for (let i = 0; i < bond.order; i++) {
                    const offset = (i - (bond.order - 1) / 2) * sep;
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.classList.add('bond-line');
                    line.setAttribute('x1', from.x + nx * offset);
                    line.setAttribute('y1', from.y + ny * offset);
                    line.setAttribute('x2', to.x + nx * offset);
                    line.setAttribute('y2', to.y + ny * offset);
                    line.addEventListener('click', e => {
                        e.stopPropagation();
                        bond.order = (bond.order % 3) + 1;
                        renderAll();
                    });
                    svg.appendChild(line);
                }
            });

            // Draw atoms
            atoms.forEach(atom => {
                const data = elementsData[atom.sym];
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.classList.add('atom-group');
                g.setAttribute('transform', `translate(${atom.x}, ${atom.y})`);

                // Circle
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.classList.add('atom-circle');
                circle.setAttribute('r', data.radius);
                circle.setAttribute('fill', data.color);
                circle.setAttribute('stroke', '#fff');
                circle.setAttribute('stroke-width', '2');
                g.appendChild(circle);

                // Symbol
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.classList.add('atom-symbol');
                text.setAttribute('y', 5);
                text.setAttribute('font-size', data.radius * 0.8);
                text.textContent = atom.sym;
                g.appendChild(text);

                // Lewis dots: show non-bonding electrons
                const bonded = getBondsForAtom(atom.id);
                const bondedElectrons = bonded * 2;
                const totalValenceElectrons = data.electrons;
                const lonePairElectrons = Math.max(0, totalValenceElectrons - bonded);
                const dotR = data.radius + 6;

                // Place lone pair dots around atom (top, right, bottom, left positions)
                const positions = [
                    { x: 0, y: -dotR },
                    { x: dotR, y: 0 },
                    { x: 0, y: dotR },
                    { x: -dotR, y: 0 }
                ];

                let dotsPlaced = 0;
                const dotsToPlace = lonePairElectrons;
                const dotsGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                dotsGroup.classList.add('atom-dots');

                for (let p = 0; p < 4 && dotsPlaced < dotsToPlace; p++) {
                    const pos = positions[p];
                    // Each position can have up to 2 dots (a pair)
                    const dotsHere = Math.min(2, dotsToPlace - dotsPlaced);
                    for (let d = 0; d < dotsHere; d++) {
                        const offset = (d === 0 ? -3 : 3);
                        const isHoriz = (p === 0 || p === 2);
                        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        dot.classList.add('dot');
                        dot.setAttribute('cx', pos.x + (isHoriz ? offset : 0));
                        dot.setAttribute('cy', pos.y + (isHoriz ? 0 : offset));
                        dot.setAttribute('r', 2);
                        dotsGroup.appendChild(dot);
                        dotsPlaced++;
                    }
                }
                g.appendChild(dotsGroup);

                // Valence warning
                if (bonded > data.valence) {
                    const warn = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    warn.classList.add('valence-warning');
                    warn.setAttribute('x', data.radius + 4);
                    warn.setAttribute('y', -data.radius + 4);
                    warn.textContent = '\u26A0';
                    g.appendChild(warn);

                    circle.setAttribute('stroke', '#c0392b');
                    circle.setAttribute('stroke-width', '3');
                }

                // Drag handling
                g.addEventListener('mousedown', e => {
                    e.stopPropagation();
                    if (e.shiftKey || connectSource) {
                        // Bond mode
                        if (!connectSource) {
                            connectSource = atom;
                            circle.setAttribute('stroke', '#BC6C25');
                            circle.setAttribute('stroke-width', '3');
                            hint.textContent = `Click another atom to create a ${['', 'single', 'double', 'triple'][bondOrder]} bond.`;
                        } else if (connectSource.id !== atom.id) {
                            addBond(connectSource.id, atom.id, bondOrder);
                            connectSource = null;
                            hint.textContent = 'Bond created! Click atoms to bond or drag to move.';
                        }
                    } else {
                        dragging = atom;
                        const pt = svgPoint(e);
                        dragOffset = { x: pt.x - atom.x, y: pt.y - atom.y };
                    }
                });

                svg.appendChild(g);
            });
        }

        svg.addEventListener('mousedown', e => {
            if (e.target === svg) {
                if (connectSource) {
                    connectSource = null;
                    renderAll();
                    hint.textContent = 'Connection cancelled.';
                    return;
                }
                const pt = svgPoint(e);
                addAtom(selectedElement, pt.x, pt.y);
            }
        });

        svg.addEventListener('mousemove', e => {
            if (dragging) {
                const pt = svgPoint(e);
                dragging.x = pt.x - dragOffset.x;
                dragging.y = pt.y - dragOffset.y;
                renderAll();
            }
        });

        svg.addEventListener('mouseup', () => { dragging = null; });

        window.clearCanvas = function() {
            atoms = [];
            bonds = [];
            connectSource = null;
            nextId = 1;
            renderAll();
            hint.textContent = 'Canvas cleared. Select an element and click to place atoms.';
        };

        // Presets
        const presets = {
            H2O: function() {
                clearCanvas();
                const o = addAtom('O', 300, 200);
                const h1 = addAtom('H', 230, 260);
                const h2 = addAtom('H', 370, 260);
                bonds.push({ from: o.id, to: h1.id, order: 1 });
                bonds.push({ from: o.id, to: h2.id, order: 1 });
                renderAll();
            },
            CO2: function() {
                clearCanvas();
                const c = addAtom('C', 300, 200);
                const o1 = addAtom('O', 200, 200);
                const o2 = addAtom('O', 400, 200);
                bonds.push({ from: c.id, to: o1.id, order: 2 });
                bonds.push({ from: c.id, to: o2.id, order: 2 });
                renderAll();
            },
            CH4: function() {
                clearCanvas();
                const c = addAtom('C', 300, 200);
                const h1 = addAtom('H', 300, 130);
                const h2 = addAtom('H', 370, 230);
                const h3 = addAtom('H', 300, 270);
                const h4 = addAtom('H', 230, 230);
                bonds.push({ from: c.id, to: h1.id, order: 1 });
                bonds.push({ from: c.id, to: h2.id, order: 1 });
                bonds.push({ from: c.id, to: h3.id, order: 1 });
                bonds.push({ from: c.id, to: h4.id, order: 1 });
                renderAll();
            },
            NH3: function() {
                clearCanvas();
                const n = addAtom('N', 300, 200);
                const h1 = addAtom('H', 240, 260);
                const h2 = addAtom('H', 360, 260);
                const h3 = addAtom('H', 300, 130);
                bonds.push({ from: n.id, to: h1.id, order: 1 });
                bonds.push({ from: n.id, to: h2.id, order: 1 });
                bonds.push({ from: n.id, to: h3.id, order: 1 });
                renderAll();
            },
            O2: function() {
                clearCanvas();
                const o1 = addAtom('O', 250, 200);
                const o2 = addAtom('O', 350, 200);
                bonds.push({ from: o1.id, to: o2.id, order: 2 });
                renderAll();
            },
            N2: function() {
                clearCanvas();
                const n1 = addAtom('N', 250, 200);
                const n2 = addAtom('N', 350, 200);
                bonds.push({ from: n1.id, to: n2.id, order: 3 });
                renderAll();
            },
            HCl: function() {
                clearCanvas();
                const h = addAtom('H', 250, 200);
                const cl = addAtom('Cl', 370, 200);
                bonds.push({ from: h.id, to: cl.id, order: 1 });
                renderAll();
            },
            benzene: function() {
                clearCanvas();
                const cx = 300, cy = 220, r = 80;
                const carbons = [];
                for (let i = 0; i < 6; i++) {
                    const angle = (i * 60 - 90) * Math.PI / 180;
                    const c = addAtom('C', cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
                    carbons.push(c);
                }
                // Alternating single/double bonds
                for (let i = 0; i < 6; i++) {
                    const next = (i + 1) % 6;
                    bonds.push({ from: carbons[i].id, to: carbons[next].id, order: i % 2 === 0 ? 2 : 1 });
                }
                // Add hydrogens
                for (let i = 0; i < 6; i++) {
                    const angle = (i * 60 - 90) * Math.PI / 180;
                    const h = addAtom('H', cx + Math.cos(angle) * (r + 50), cy + Math.sin(angle) * (r + 50));
                    bonds.push({ from: carbons[i].id, to: h.id, order: 1 });
                }
                renderAll();
            }
        };

        window.loadPreset = function(name) {
            if (presets[name]) presets[name]();
        };

        renderAll();
    })();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
