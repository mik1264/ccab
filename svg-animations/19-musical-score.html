<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Score Renderer - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }
        .back-link {
            position: fixed;
            top: 1rem;
            left: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--terracotta);
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.7);
            border-radius: 20px;
            z-index: 100;
            transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 {
            font-family: 'Lora', serif;
            font-size: 2rem;
            color: var(--moss);
            margin: 0.5rem 0;
        }
        .subtitle { color: var(--terracotta); margin-bottom: 1rem; }
        .controls {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            margin-bottom: 1rem;
        }
        button, select {
            font-family: 'Nunito', sans-serif;
            padding: 0.5rem 1.2rem;
            border: 2px solid var(--sage);
            background: rgba(255,255,255,0.7);
            color: var(--dark-moss);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        button:hover, select:hover { background: rgba(255,255,255,0.95); border-color: var(--moss); }
        button.active { background: var(--sage); color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .tempo-control {
            display: flex; align-items: center; gap: 0.5rem;
        }
        .tempo-control label { font-weight: 600; font-size: 0.9rem; }
        .tempo-control input[type="range"] { width: 120px; accent-color: var(--moss); }
        .score-container {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 30px rgba(138,154,91,0.15);
            overflow-x: auto;
            max-width: 100%;
        }
        svg text { font-family: 'Lora', serif; }
        .highlight-rect { transition: opacity 0.1s; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Musical Score Renderer</h1>
    <p class="subtitle">SVG music notation with Tone.js playback</p>

    <div class="controls">
        <select id="pieceSelect">
            <option value="twinkle">Twinkle Twinkle</option>
            <option value="mozart">Mozart Theme (K.331)</option>
            <option value="ode">Ode to Joy</option>
        </select>
        <button id="playBtn">Play</button>
        <button id="stopBtn" disabled>Stop</button>
        <div class="tempo-control">
            <label>BPM:</label>
            <input type="range" id="tempoSlider" min="60" max="200" value="120">
            <span id="tempoVal">120</span>
        </div>
    </div>

    <div class="score-container">
        <svg id="scoreSvg" width="900" height="260" viewBox="0 0 900 260" role="img">
            <title>Musical Score</title>
            <desc>An interactive musical score showing notes on a staff</desc>
        </svg>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script>
    (function() {
        // Note data: [noteName, duration in beats]
        // C4=middle C, etc.
        const pieces = {
            twinkle: {
                title: 'Twinkle Twinkle Little Star',
                timeSignature: '4/4',
                notes: [
                    ['C4',1],['C4',1],['G4',1],['G4',1],['A4',1],['A4',1],['G4',2],
                    ['F4',1],['F4',1],['E4',1],['E4',1],['D4',1],['D4',1],['C4',2]
                ]
            },
            mozart: {
                title: 'Mozart Sonata K.331 Theme',
                timeSignature: '6/8',
                notes: [
                    ['C#5',1],['A4',1],['A4',1],['B4',1],['A4',1],['F#4',1],
                    ['E4',1],['C#4',1],['D4',1],['E4',1],['F#4',1],['D4',1],
                    ['C#5',1],['A4',1],['A4',1],['B4',1]
                ]
            },
            ode: {
                title: 'Ode to Joy',
                timeSignature: '4/4',
                notes: [
                    ['E4',1],['E4',1],['F4',1],['G4',1],['G4',1],['F4',1],['E4',1],['D4',1],
                    ['C4',1],['C4',1],['D4',1],['E4',1],['E4',1.5],['D4',0.5],['D4',2]
                ]
            }
        };

        // Map note name to staff position (semitone-based, C4=0)
        const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        // Staff Y positions: each line is 10px apart, 5 lines
        // B5 at top, down to D4 (below staff with ledger lines)
        // We map: line positions based on note letter+octave
        const staffTop = 60;
        const lineSpacing = 10;
        // Note positions relative to B5=0 going down by half-step of diatonic
        // Actually let's map diatonic: C4=ledger line below
        // Staff lines (treble clef): E5, G5, B4, D5, F5 ... no wait
        // Treble clef lines from bottom: E4, G4, B4, D5, F5
        // Spaces: F4, A4, C5, E5
        function noteToStaffY(noteName) {
            const letter = noteName.replace(/[0-9#]/g, '');
            const octave = parseInt(noteName.replace(/[^0-9]/g, ''));
            // Diatonic scale positions: C=0, D=1, E=2, F=3, G=4, A=5, B=6
            const diatonicMap = {C:0, D:1, E:2, F:3, G:4, A:5, B:6};
            const diatonicPos = diatonicMap[letter.replace('#','')] + (octave - 4) * 7;
            // E4 = bottom line (position 2), each diatonic step = half lineSpacing
            // Bottom line Y = staffTop + 4*lineSpacing
            const bottomLineY = staffTop + 4 * lineSpacing;
            const e4Pos = 2; // E4 diatonic position
            return bottomLineY - (diatonicPos - e4Pos) * (lineSpacing / 2);
        }

        const svg = document.getElementById('scoreSvg');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const pieceSelect = document.getElementById('pieceSelect');
        const tempoSlider = document.getElementById('tempoSlider');
        const tempoVal = document.getElementById('tempoVal');

        let synth = null;
        let isPlaying = false;
        let playTimeouts = [];

        tempoSlider.addEventListener('input', () => {
            tempoVal.textContent = tempoSlider.value;
        });

        function drawScore(pieceName) {
            const piece = pieces[pieceName];
            const notes = piece.notes;
            svg.innerHTML = '';

            const ns = 'http://www.w3.org/2000/svg';

            // Title
            const titleText = document.createElementNS(ns, 'text');
            titleText.setAttribute('x', 450);
            titleText.setAttribute('y', 30);
            titleText.setAttribute('text-anchor', 'middle');
            titleText.setAttribute('font-size', '16');
            titleText.setAttribute('font-weight', '700');
            titleText.setAttribute('fill', '#606C38');
            titleText.textContent = piece.title;
            svg.appendChild(titleText);

            // Staff lines
            for (let i = 0; i < 5; i++) {
                const line = document.createElementNS(ns, 'line');
                line.setAttribute('x1', 60);
                line.setAttribute('x2', 860);
                line.setAttribute('y1', staffTop + i * lineSpacing);
                line.setAttribute('y2', staffTop + i * lineSpacing);
                line.setAttribute('stroke', '#3d4423');
                line.setAttribute('stroke-width', '1');
                svg.appendChild(line);
            }

            // Treble clef (simplified path)
            const clef = document.createElementNS(ns, 'text');
            clef.setAttribute('x', 65);
            clef.setAttribute('y', staffTop + 35);
            clef.setAttribute('font-size', '52');
            clef.setAttribute('fill', '#3d4423');
            clef.textContent = '\u{1D11E}'; // treble clef unicode
            svg.appendChild(clef);

            // Time signature
            const timeSigTop = document.createElementNS(ns, 'text');
            timeSigTop.setAttribute('x', 105);
            timeSigTop.setAttribute('y', staffTop + 17);
            timeSigTop.setAttribute('font-size', '18');
            timeSigTop.setAttribute('font-weight', '700');
            timeSigTop.setAttribute('fill', '#3d4423');
            timeSigTop.textContent = piece.timeSignature.split('/')[0];
            svg.appendChild(timeSigTop);

            const timeSigBot = document.createElementNS(ns, 'text');
            timeSigBot.setAttribute('x', 105);
            timeSigBot.setAttribute('y', staffTop + 37);
            timeSigBot.setAttribute('font-size', '18');
            timeSigBot.setAttribute('font-weight', '700');
            timeSigBot.setAttribute('fill', '#3d4423');
            timeSigBot.textContent = piece.timeSignature.split('/')[1];
            svg.appendChild(timeSigBot);

            // Draw notes
            const startX = 140;
            const noteSpacing = 45;

            notes.forEach((note, i) => {
                const [name, dur] = note;
                const x = startX + i * noteSpacing;
                const y = noteToStaffY(name);

                // Highlight rect (hidden initially)
                const highlight = document.createElementNS(ns, 'rect');
                highlight.setAttribute('x', x - 14);
                highlight.setAttribute('y', staffTop - 5);
                highlight.setAttribute('width', 28);
                highlight.setAttribute('height', 50);
                highlight.setAttribute('rx', 6);
                highlight.setAttribute('fill', 'rgba(221,161,94,0.3)');
                highlight.setAttribute('opacity', '0');
                highlight.setAttribute('class', 'highlight-rect');
                highlight.id = 'hl-' + i;
                svg.appendChild(highlight);

                // Ledger lines if needed
                const bottomLine = staffTop + 4 * lineSpacing;
                const topLine = staffTop;
                if (y > bottomLine) {
                    for (let ly = bottomLine + lineSpacing; ly <= y + 1; ly += lineSpacing) {
                        const ll = document.createElementNS(ns, 'line');
                        ll.setAttribute('x1', x - 10);
                        ll.setAttribute('x2', x + 10);
                        ll.setAttribute('y1', ly);
                        ll.setAttribute('y2', ly);
                        ll.setAttribute('stroke', '#3d4423');
                        ll.setAttribute('stroke-width', '1');
                        svg.appendChild(ll);
                    }
                }
                if (y < topLine) {
                    for (let ly = topLine - lineSpacing; ly >= y - 1; ly -= lineSpacing) {
                        const ll = document.createElementNS(ns, 'line');
                        ll.setAttribute('x1', x - 10);
                        ll.setAttribute('x2', x + 10);
                        ll.setAttribute('y1', ly);
                        ll.setAttribute('y2', ly);
                        ll.setAttribute('stroke', '#3d4423');
                        ll.setAttribute('stroke-width', '1');
                        svg.appendChild(ll);
                    }
                }

                // Notehead
                const notehead = document.createElementNS(ns, 'ellipse');
                notehead.setAttribute('cx', x);
                notehead.setAttribute('cy', y);
                notehead.setAttribute('rx', 6);
                notehead.setAttribute('ry', 4.5);
                notehead.setAttribute('transform', `rotate(-15, ${x}, ${y})`);
                notehead.setAttribute('fill', dur >= 2 ? 'none' : '#3d4423');
                notehead.setAttribute('stroke', '#3d4423');
                notehead.setAttribute('stroke-width', '1.5');
                svg.appendChild(notehead);

                // Stem
                const stemDir = y < staffTop + 2 * lineSpacing ? 1 : -1; // down if above middle
                const stem = document.createElementNS(ns, 'line');
                stem.setAttribute('x1', stemDir === -1 ? x + 5.5 : x - 5.5);
                stem.setAttribute('x2', stemDir === -1 ? x + 5.5 : x - 5.5);
                stem.setAttribute('y1', y);
                stem.setAttribute('y2', y + stemDir * 30);
                stem.setAttribute('stroke', '#3d4423');
                stem.setAttribute('stroke-width', '1.5');
                svg.appendChild(stem);

                // Sharp sign if needed
                if (name.includes('#')) {
                    const sharp = document.createElementNS(ns, 'text');
                    sharp.setAttribute('x', x - 16);
                    sharp.setAttribute('y', y + 5);
                    sharp.setAttribute('font-size', '14');
                    sharp.setAttribute('fill', '#3d4423');
                    sharp.textContent = '#';
                    svg.appendChild(sharp);
                }

                // Dot for dotted notes
                if (dur === 1.5) {
                    const dot = document.createElementNS(ns, 'circle');
                    dot.setAttribute('cx', x + 10);
                    dot.setAttribute('cy', y);
                    dot.setAttribute('r', 2);
                    dot.setAttribute('fill', '#3d4423');
                    svg.appendChild(dot);
                }
            });

            // End barline
            const endX = startX + notes.length * noteSpacing;
            const bl1 = document.createElementNS(ns, 'line');
            bl1.setAttribute('x1', endX);
            bl1.setAttribute('x2', endX);
            bl1.setAttribute('y1', staffTop);
            bl1.setAttribute('y2', staffTop + 4 * lineSpacing);
            bl1.setAttribute('stroke', '#3d4423');
            bl1.setAttribute('stroke-width', '1');
            svg.appendChild(bl1);
            const bl2 = document.createElementNS(ns, 'line');
            bl2.setAttribute('x1', endX + 4);
            bl2.setAttribute('x2', endX + 4);
            bl2.setAttribute('y1', staffTop);
            bl2.setAttribute('y2', staffTop + 4 * lineSpacing);
            bl2.setAttribute('stroke', '#3d4423');
            bl2.setAttribute('stroke-width', '3');
            svg.appendChild(bl2);

            // Note name labels below staff
            notes.forEach((note, i) => {
                const x = startX + i * noteSpacing;
                const label = document.createElementNS(ns, 'text');
                label.setAttribute('x', x);
                label.setAttribute('y', staffTop + 4 * lineSpacing + 30);
                label.setAttribute('text-anchor', 'middle');
                label.setAttribute('font-size', '10');
                label.setAttribute('fill', '#8A9A5B');
                label.textContent = note[0];
                svg.appendChild(label);
            });

            // Adjust SVG width
            const totalW = Math.max(900, endX + 60);
            svg.setAttribute('width', totalW);
            svg.setAttribute('viewBox', `0 0 ${totalW} 260`);
        }

        async function playScore() {
            if (isPlaying) return;
            await Tone.start();
            isPlaying = true;
            playBtn.disabled = true;
            stopBtn.disabled = false;
            playBtn.classList.add('active');

            if (!synth) {
                synth = new Tone.Synth({
                    oscillator: { type: 'triangle' },
                    envelope: { attack: 0.02, decay: 0.3, sustain: 0.3, release: 0.5 }
                }).toDestination();
            }

            const piece = pieces[pieceSelect.value];
            const bpm = parseInt(tempoSlider.value);
            const beatDuration = 60 / bpm;

            let time = 0;
            piece.notes.forEach((note, i) => {
                const [name, dur] = note;
                const durSec = dur * beatDuration;
                const t = time;
                const timeout = setTimeout(() => {
                    if (!isPlaying) return;
                    synth.triggerAttackRelease(name, durSec * 0.9);
                    // Highlight
                    document.querySelectorAll('.highlight-rect').forEach(r => r.setAttribute('opacity', '0'));
                    const hl = document.getElementById('hl-' + i);
                    if (hl) hl.setAttribute('opacity', '1');
                }, t * 1000);
                playTimeouts.push(timeout);
                time += durSec;
            });

            // Clear highlight after done
            const endTimeout = setTimeout(() => {
                stopPlayback();
            }, time * 1000 + 200);
            playTimeouts.push(endTimeout);
        }

        function stopPlayback() {
            isPlaying = false;
            playBtn.disabled = false;
            stopBtn.disabled = true;
            playBtn.classList.remove('active');
            playTimeouts.forEach(t => clearTimeout(t));
            playTimeouts = [];
            document.querySelectorAll('.highlight-rect').forEach(r => r.setAttribute('opacity', '0'));
            if (synth) {
                synth.triggerRelease();
            }
        }

        playBtn.addEventListener('click', playScore);
        stopBtn.addEventListener('click', stopPlayback);
        pieceSelect.addEventListener('change', () => {
            stopPlayback();
            drawScore(pieceSelect.value);
        });

        drawScore('twinkle');
    })();
    </script>
</body>
</html>
