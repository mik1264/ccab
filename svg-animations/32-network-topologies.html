<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Topology Zoo - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh; padding: 1rem;
        }
        .organic-shape {
            position: fixed; border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            opacity: 0.07; animation: morph 30s infinite ease-in-out;
            z-index: 0; pointer-events: none;
        }
        .shape-1 { width: 500px; height: 500px; background: var(--sage); top: -100px; left: -100px; }
        .shape-2 { width: 350px; height: 350px; background: var(--earth); bottom: -50px; right: -50px; animation-delay: -10s; }
        @keyframes morph {
            0%, 100% { border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%; }
            50% { border-radius: 35% 65% 67% 33% / 49% 45% 55% 51%; }
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        header { text-align: center; padding: 3.5rem 1rem 1rem; position: relative; z-index: 1; }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); margin-bottom: 0.3rem; }
        .subtitle { color: var(--terracotta); margin-bottom: 0.5rem; }
        .hint { font-size: 0.82rem; color: var(--sage); }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem; max-width: 980px; margin: 0 auto; padding: 0 1rem 2rem;
            position: relative; z-index: 1;
        }
        .topo-card {
            background: rgba(255,255,255,0.78); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 1rem;
            box-shadow: 0 6px 24px rgba(138,154,91,0.13);
            cursor: pointer; transition: all 0.3s ease; user-select: none;
        }
        .topo-card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(138,154,91,0.22); }
        .topo-card.selected { border: 2px solid var(--moss); box-shadow: 0 12px 36px rgba(96,108,56,0.3); }
        .card-title { font-family: 'Lora', serif; font-size: 1rem; color: var(--moss); font-weight: 600; margin-bottom: 0.5rem; }
        .card-stats { display: flex; gap: 0.75rem; flex-wrap: wrap; font-size: 0.75rem; color: var(--dark-moss); margin-top: 0.5rem; }
        .stat-tag { background: rgba(138,154,91,0.15); padding: 0.2rem 0.5rem; border-radius: 8px; }
        canvas { display: block; border-radius: 10px; }
        .resilience { font-size: 0.8rem; margin-top: 0.4rem; }
        .fail-btn {
            font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 700;
            padding: 0.3rem 0.8rem; border: none; border-radius: 12px; cursor: pointer;
            background: rgba(188,108,37,0.2); color: var(--terracotta); transition: all 0.25s; margin-top: 0.4rem;
        }
        .fail-btn:hover { background: rgba(188,108,37,0.35); }
        .fail-btn.active { background: var(--terracotta); color: white; }
        .failed-label { font-size: 0.75rem; color: var(--terracotta); }
    </style>
</head>
<body>
    <div class="organic-shape shape-1"></div>
    <div class="organic-shape shape-2"></div>
    <a href="../index.html" class="back-link">← Back to Gallery</a>
    <header>
        <h1>Network Topology Zoo</h1>
        <p class="subtitle">Six classic network structures with animated data packets</p>
        <p class="hint">Click a node to simulate failure</p>
    </header>

    <div class="grid" id="grid"></div>

    <script>
    const W = 260, H = 200;

    const topologies = [
        {
            name: 'Ring', nodes: 8, edges: null,
            desc: 'Each node connects to its two neighbors in a circle.',
            resilience: '★★☆☆ (single failure disrupts)', diameter: 4, color: '#4a90e2',
            buildNodes: (n) => {
                return Array.from({length:n},(_,i)=>{
                    const a=-Math.PI/2+i*2*Math.PI/n;
                    return {x:W/2+75*Math.cos(a), y:H/2+65*Math.sin(a)};
                });
            },
            buildEdges: (nodes) => {
                const n=nodes.length;
                return nodes.map((_,i)=>({from:i,to:(i+1)%n}));
            }
        },
        {
            name: 'Star', nodes: 8, edges: null,
            desc: 'Central hub connects to all other nodes.',
            resilience: '★☆☆☆ (hub failure = total failure)', diameter: 2, color: '#e2904a',
            buildNodes: (n) => {
                const nodes=[{x:W/2,y:H/2}];
                for(let i=0;i<n-1;i++){const a=-Math.PI/2+i*2*Math.PI/(n-1);nodes.push({x:W/2+72*Math.cos(a),y:H/2+62*Math.sin(a)});}
                return nodes;
            },
            buildEdges: (nodes) => nodes.slice(1).map((_,i)=>({from:0,to:i+1}))
        },
        {
            name: 'Mesh', nodes: 6, edges: null,
            desc: 'Fully connected — every node links to every other.',
            resilience: '★★★★ (most resilient)', diameter: 1, color: '#50b462',
            buildNodes: (n) => Array.from({length:n},(_,i)=>{
                const a=-Math.PI/2+i*2*Math.PI/n;
                return {x:W/2+68*Math.cos(a),y:H/2+58*Math.sin(a)};
            }),
            buildEdges: (nodes) => {
                const edges=[];
                for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++)edges.push({from:i,to:j});
                return edges;
            }
        },
        {
            name: 'Tree', nodes: 7, edges: null,
            desc: '3-level binary tree — hierarchical structure.',
            resilience: '★★☆☆ (branch cut isolates subtree)', diameter: 4, color: '#9b59b6',
            buildNodes: () => [
                {x:W/2,y:28},
                {x:W/2-62,y:85},{x:W/2+62,y:85},
                {x:W/2-90,y:148},{x:W/2-34,y:148},{x:W/2+34,y:148},{x:W/2+90,y:148}
            ],
            buildEdges: () => [{from:0,to:1},{from:0,to:2},{from:1,to:3},{from:1,to:4},{from:2,to:5},{from:2,to:6}]
        },
        {
            name: 'Bus', nodes: 7, edges: null,
            desc: 'All nodes connect to a single shared backbone.',
            resilience: '★★☆☆ (bus cut = total failure)', diameter: 2, color: '#e2504a',
            buildNodes: (n) => {
                const nodes=[];
                const bx1=40, bx2=W-40, by=H/2;
                nodes.push({x:bx1,y:by,isBus:true},{x:bx2,y:by,isBus:true});
                for(let i=0;i<n-2;i++){const x=bx1+(bx2-bx1)*(i/(n-3));nodes.push({x,y:by-60+(i%2)*120});}
                return nodes;
            },
            buildEdges: (nodes) => {
                const edges=[{from:0,to:1}]; // bus backbone
                for(let i=2;i<nodes.length;i++){
                    const busX=nodes[i].x, nearest=nodes[0].x+1;
                    edges.push({from:i,to:i<(2+Math.floor((nodes.length-2)/2))?0:1,isBusConn:true});
                }
                return edges;
            }
        },
        {
            name: 'Hybrid', nodes: 8, edges: null,
            desc: 'Star cores connected by a ring — combines both topologies.',
            resilience: '★★★☆ (good redundancy)', diameter: 3, color: '#e2d84a',
            buildNodes: () => {
                const ring=4, nodes=[];
                for(let i=0;i<ring;i++){const a=-Math.PI/2+i*2*Math.PI/ring;nodes.push({x:W/2+65*Math.cos(a),y:H/2+55*Math.sin(a),isHub:true});}
                for(let i=0;i<ring;i++){const a=-Math.PI/2+i*2*Math.PI/ring+Math.PI/ring;nodes.push({x:W/2+130*Math.cos(a),y:H/2+110*Math.sin(a)});}
                return nodes.slice(0,8);
            },
            buildEdges: (nodes) => {
                const edges=[];
                edges.push({from:0,to:1},{from:1,to:2},{from:2,to:3},{from:3,to:0}); // ring
                edges.push({from:0,to:4},{from:1,to:5},{from:2,to:6},{from:3,to:7}); // spokes
                return edges;
            }
        }
    ];

    // Build topology nodes/edges
    topologies.forEach(t => {
        t.nodePositions = t.buildNodes(t.nodes);
        t.edgeList = t.buildEdges(t.nodePositions);
        t.failedNodes = new Set();
        t.packets = [];
    });

    // Packet animation
    function spawnPackets(topo, idx) {
        const edges = topo.edgeList.filter(e => {
            const fn = topo.failedNodes;
            return !fn.has(e.from) && !fn.has(e.to);
        });
        if (edges.length === 0) return;
        if (topo.packets.length < 6) {
            const e = edges[Math.floor(Math.random()*edges.length)];
            const fwd = Math.random()<0.5;
            topo.packets.push({ from: fwd?e.from:e.to, to: fwd?e.to:e.from, t: 0, speed: 0.008+Math.random()*0.01 });
        }
    }

    function drawTopo(canvas, topo, ts) {
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle='#f0ede0'; ctx.fillRect(0,0,W,H);

        const nodes = topo.nodePositions;
        const edges = topo.edgeList;
        const failed = topo.failedNodes;

        // Draw edges
        edges.forEach(e => {
            const n1=nodes[e.from],n2=nodes[e.to];
            const isActive = !failed.has(e.from) && !failed.has(e.to);
            ctx.save();
            ctx.strokeStyle = isActive ? topo.color+'88' : '#ccc';
            ctx.lineWidth = 2;
            ctx.setLineDash(e.isBusConn?[4,3]:[]);
            ctx.beginPath(); ctx.moveTo(n1.x,n1.y); ctx.lineTo(n2.x,n2.y); ctx.stroke();
            ctx.restore();
        });

        // Update & draw packets
        spawnPackets(topo);
        topo.packets = topo.packets.filter(p => {
            p.t += p.speed;
            if (p.t >= 1) return false;
            if (failed.has(p.from)||failed.has(p.to)) return false;
            const n1=nodes[p.from],n2=nodes[p.to];
            const x=n1.x+(n2.x-n1.x)*p.t, y=n1.y+(n2.y-n1.y)*p.t;
            const grd=ctx.createRadialGradient(x,y,0,x,y,5);
            grd.addColorStop(0,'#fff'); grd.addColorStop(0.5,topo.color); grd.addColorStop(1,'transparent');
            ctx.save(); ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill(); ctx.restore();
            return true;
        });

        // Draw nodes
        nodes.forEach((n,i) => {
            const isFailed = failed.has(i);
            const isHub = n.isHub;
            ctx.save();
            const grd=ctx.createRadialGradient(n.x-2,n.y-2,1,n.x,n.y,isHub?10:8);
            if(isFailed){grd.addColorStop(0,'#999');grd.addColorStop(1,'#555');}
            else if(isHub){grd.addColorStop(0,'#fff');grd.addColorStop(1,topo.color);}
            else{grd.addColorStop(0,'#fff');grd.addColorStop(0.5,topo.color+'cc');grd.addColorStop(1,topo.color);}
            ctx.fillStyle=grd;
            ctx.beginPath(); ctx.arc(n.x,n.y,isHub?10:7,0,Math.PI*2); ctx.fill();
            if(isFailed){ctx.strokeStyle='#cc3333';ctx.lineWidth=2;ctx.stroke();}
            else{ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;ctx.stroke();}
            if(isFailed){ctx.fillStyle='#cc3333';ctx.font='bold 10px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✗',n.x,n.y);}
            ctx.restore();
        });
    }

    // Build DOM
    const grid = document.getElementById('grid');
    const canvases = [];
    topologies.forEach((t,idx) => {
        const card = document.createElement('div');
        card.className = 'topo-card';
        const edgeCount = t.edgeList.length;
        const nodeCount = t.nodePositions.length;
        card.innerHTML = `
            <div class="card-title">${t.name} Topology</div>
            <canvas width="${W}" height="${H}" id="cv${idx}" style="background:#f0ede0;border-radius:10px"></canvas>
            <div class="card-stats">
                <span class="stat-tag">Nodes: ${nodeCount}</span>
                <span class="stat-tag">Edges: ${edgeCount}</span>
                <span class="stat-tag">Diameter: ${t.diameter}</span>
            </div>
            <div class="resilience">${t.resilience}</div>
            <div style="font-size:0.78rem;color:var(--dark-moss);margin-top:0.25rem">${t.desc}</div>
            <div style="display:flex;gap:0.5rem;align-items:center;margin-top:0.5rem">
                <button class="fail-btn" id="failBtn${idx}" onclick="toggleFail(${idx})">Simulate Failure</button>
                <span class="failed-label" id="failLabel${idx}"></span>
            </div>
        `;
        grid.appendChild(card);
        const cv = document.getElementById(`cv${idx}`);
        canvases.push(cv);
        cv.addEventListener('click', e => {
            const rect = cv.getBoundingClientRect();
            const mx=e.clientX-rect.left, my=e.clientY-rect.top;
            let nearest=-1, nd=99;
            t.nodePositions.forEach((n,i)=>{
                const d=Math.sqrt((n.x-mx)**2+(n.y-my)**2);
                if(d<nd){nd=d;nearest=i;}
            });
            if(nearest>=0&&nd<20) {
                if(t.failedNodes.has(nearest)) t.failedNodes.delete(nearest);
                else t.failedNodes.add(nearest);
                document.getElementById(`failLabel${idx}`).textContent = t.failedNodes.size>0?`${t.failedNodes.size} node(s) failed`:'';
            }
        });
    });

    let failModes = new Array(topologies.length).fill(false);
    function toggleFail(idx) {
        failModes[idx] = !failModes[idx];
        const btn = document.getElementById(`failBtn${idx}`);
        btn.classList.toggle('active', failModes[idx]);
        btn.textContent = failModes[idx] ? 'Restore All' : 'Simulate Failure';
        if (!failModes[idx]) {
            topologies[idx].failedNodes.clear();
            document.getElementById(`failLabel${idx}`).textContent = '';
        } else {
            // Fail a random node
            const n = topologies[idx].nodePositions.length;
            topologies[idx].failedNodes.add(Math.floor(Math.random()*n));
            document.getElementById(`failLabel${idx}`).textContent = `${topologies[idx].failedNodes.size} node(s) failed`;
        }
    }

    let lastTs = 0;
    function animAll(ts) {
        topologies.forEach((t,i) => drawTopo(canvases[i], t, ts));
        requestAnimationFrame(animAll);
    }
    requestAnimationFrame(animAll);
    </script>
</body>
</html>
