<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protein Structure Viewer - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.8);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 1.6rem; color: var(--moss); margin: 1rem 0 0.2rem; text-align: center; }
        .subtitle { color: var(--terracotta); text-align: center; margin-bottom: 0.3rem; font-size: 0.85rem; }
        .controls {
            display: flex; gap: 8px; margin-bottom: 0.5rem;
        }
        .ctrl-btn {
            padding: 5px 14px; border: 2px solid var(--sage); background: rgba(255,255,255,0.6);
            color: var(--moss); font-family: 'Nunito', sans-serif; font-weight: 600;
            font-size: 0.82rem; cursor: pointer; border-radius: 15px; transition: all 0.3s;
        }
        .ctrl-btn:hover, .ctrl-btn.active { background: var(--sage); color: white; }
        .main-area {
            display: flex; gap: 1.5rem; padding: 0.5rem 1rem; max-width: 1100px;
            width: 100%; align-items: flex-start; flex-wrap: wrap; justify-content: center;
        }
        .viz-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 1rem; border: 2px solid rgba(138,154,91,0.15);
            flex: 1; min-width: 500px;
        }
        .info-panel {
            background: rgba(255,255,255,0.75); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 1.2rem; border: 2px solid rgba(138,154,91,0.15);
            min-width: 240px; max-width: 300px;
        }
        .info-panel h3 { font-family: 'Lora', serif; color: var(--moss); margin-bottom: 0.3rem; }
        .info-panel .detail { margin: 0.3rem 0; font-size: 0.85rem; line-height: 1.5; }
        .info-panel .detail strong { color: var(--terracotta); }
        .residue-rect { cursor: pointer; transition: opacity 0.2s; }
        .residue-rect:hover { opacity: 0.8; }
        .residue-label { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; fill: white; pointer-events: none; text-anchor: middle; }
        .residue-num { font-family: 'Nunito', sans-serif; font-size: 8px; fill: #666; pointer-events: none; text-anchor: middle; }
        .backbone-line { fill: none; stroke-width: 3; stroke-linecap: round; }
        .helix-ribbon { fill: none; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
        .sheet-arrow { fill: rgba(138,154,91,0.3); stroke: var(--sage); stroke-width: 1.5; }
        .loop-line { fill: none; stroke: #aaa; stroke-width: 2; stroke-dasharray: 4 3; }
        .legend {
            display: flex; gap: 8px; flex-wrap: wrap; font-size: 0.75rem; margin-top: 0.5rem;
        }
        .legend-item { display: flex; align-items: center; gap: 3px; }
        .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
        .sequence-title { font-family: 'Lora', serif; font-size: 0.95rem; color: var(--moss); margin: 0.5rem 0 0.3rem; }
        .heatmap-cell { cursor: pointer; }
        .heatmap-cell:hover { stroke: var(--terracotta); stroke-width: 2; }
        @media (max-width: 768px) {
            .main-area { flex-direction: column; align-items: center; }
            .info-panel { max-width: 100%; min-width: auto; }
            .viz-container { min-width: auto; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Protein Structure: Insulin A-Chain</h1>
    <p class="subtitle">Hover residues for details. Toggle between views.</p>
    <div class="controls">
        <button class="ctrl-btn active" id="primaryBtn" onclick="setView('primary')">Primary Sequence</button>
        <button class="ctrl-btn" id="secondaryBtn" onclick="setView('secondary')">Secondary Structure</button>
        <button class="ctrl-btn" id="hydroBtn" onclick="setView('hydrophobicity')">Hydrophobicity</button>
    </div>
    <div class="main-area">
        <div class="viz-container">
            <svg id="protSvg" width="600" height="340" viewBox="0 0 600 340" role="graphics-document" aria-label="Protein structure diagram">
                <title>Insulin A-Chain Structure</title>
                <desc>Visualization of insulin A-chain protein showing 21 amino acid residues. Three views available: primary sequence, secondary structure, and hydrophobicity heatmap. Hover residues for detailed information.</desc>
            </svg>
            <div class="legend" id="legendArea"></div>
        </div>
        <div class="info-panel" id="infoPanel">
            <h3>Insulin A-Chain</h3>
            <div class="detail"><strong>Sequence:</strong> GIVEQCCTSICSLYQLENYCN</div>
            <div class="detail"><strong>Length:</strong> 21 amino acids</div>
            <div class="detail"><strong>Function:</strong> One of two chains in insulin, critical for glucose regulation</div>
            <div class="detail" id="residueInfo" style="margin-top: 0.8rem;"></div>
        </div>
    </div>

    <script>
    (function(){
        const sequence = 'GIVEQCCTSICSLYQLENYCN';

        const aminoAcids = {
            G: { name: 'Glycine', abbr: 'Gly', type: 'Nonpolar', hydro: -0.4, color: '#8bc34a', role: 'Smallest AA, provides flexibility' },
            I: { name: 'Isoleucine', abbr: 'Ile', type: 'Nonpolar', hydro: 4.5, color: '#4caf50', role: 'Hydrophobic core stabilizer' },
            V: { name: 'Valine', abbr: 'Val', type: 'Nonpolar', hydro: 4.2, color: '#66bb6a', role: 'Hydrophobic core, branched chain' },
            E: { name: 'Glutamic Acid', abbr: 'Glu', type: 'Neg. Charged', hydro: -3.5, color: '#f44336', role: 'Acidic residue, salt bridges' },
            Q: { name: 'Glutamine', abbr: 'Gln', type: 'Polar', hydro: -3.5, color: '#2196f3', role: 'Polar, hydrogen bonding' },
            C: { name: 'Cysteine', abbr: 'Cys', type: 'Polar', hydro: 2.5, color: '#ff9800', role: 'Forms disulfide bonds (critical for insulin structure)' },
            T: { name: 'Threonine', abbr: 'Thr', type: 'Polar', hydro: -0.7, color: '#03a9f4', role: 'Polar hydroxyl, phosphorylation target' },
            S: { name: 'Serine', abbr: 'Ser', type: 'Polar', hydro: -0.8, color: '#00bcd4', role: 'Polar hydroxyl, common phosphorylation site' },
            L: { name: 'Leucine', abbr: 'Leu', type: 'Nonpolar', hydro: 3.8, color: '#43a047', role: 'Hydrophobic, most common amino acid' },
            Y: { name: 'Tyrosine', abbr: 'Tyr', type: 'Polar', hydro: -1.3, color: '#9c27b0', role: 'Aromatic, phosphorylation target' },
            N: { name: 'Asparagine', abbr: 'Asn', type: 'Polar', hydro: -3.5, color: '#42a5f5', role: 'Polar amide, glycosylation site' }
        };

        // Secondary structure annotation (simplified for insulin A-chain)
        // Helix: positions 2-8 (alpha helix), 13-19 (alpha helix), Loop: 9-12, 1, 20-21
        const secondaryStructure = [
            'L', 'H', 'H', 'H', 'H', 'H', 'H', 'H',  // G1=loop, I2-S8=helix
            'L', 'L', 'L', 'L',                          // I9-S12=loop
            'H', 'H', 'H', 'H', 'H', 'H', 'H',          // L13-C19=helix
            'L', 'L'                                       // N20-N21=loop
        ];

        const svg = document.getElementById('protSvg');
        const infoPanel = document.getElementById('residueInfo');
        const legendArea = document.getElementById('legendArea');
        let currentView = 'primary';

        function hydroColor(val) {
            // Map hydrophobicity -3.5 to 4.5 -> blue to red
            const t = (val + 3.5) / 8.0;
            const r = Math.round(255 * t);
            const b = Math.round(255 * (1 - t));
            return `rgb(${r}, 80, ${b})`;
        }

        function drawPrimary() {
            svg.innerHTML = '';
            legendArea.innerHTML = '';
            const startX = 30, y = 100, cellW = 26, cellH = 36, gap = 2;

            // Title
            const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            title.setAttribute('x', 300); title.setAttribute('y', 30);
            title.setAttribute('text-anchor', 'middle');
            title.setAttribute('font-family', 'Lora, serif');
            title.setAttribute('font-size', '16');
            title.setAttribute('fill', '#606C38');
            title.setAttribute('font-weight', '700');
            title.textContent = 'Primary Sequence';
            svg.appendChild(title);

            // Direction arrow
            const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            arrow.setAttribute('x', 300); arrow.setAttribute('y', 55);
            arrow.setAttribute('text-anchor', 'middle');
            arrow.setAttribute('font-family', 'Nunito, sans-serif');
            arrow.setAttribute('font-size', '11');
            arrow.setAttribute('fill', '#888');
            arrow.textContent = 'N-terminus \u2192 C-terminus';
            svg.appendChild(arrow);

            sequence.split('').forEach((aa, i) => {
                const x = startX + i * (cellW + gap);
                const data = aminoAcids[aa];

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.classList.add('residue-rect');
                rect.setAttribute('x', x); rect.setAttribute('y', y);
                rect.setAttribute('width', cellW); rect.setAttribute('height', cellH);
                rect.setAttribute('rx', 4);
                rect.setAttribute('fill', data.color);
                rect.addEventListener('mouseenter', () => showResidueInfo(aa, i));
                svg.appendChild(rect);

                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.classList.add('residue-label');
                label.setAttribute('x', x + cellW / 2);
                label.setAttribute('y', y + cellH / 2 + 4);
                label.textContent = aa;
                svg.appendChild(label);

                const num = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                num.classList.add('residue-num');
                num.setAttribute('x', x + cellW / 2);
                num.setAttribute('y', y + cellH + 14);
                num.textContent = i + 1;
                svg.appendChild(num);
            });

            // Type legend
            const types = { Nonpolar: '#4caf50', Polar: '#2196f3', 'Neg. Charged': '#f44336' };
            Object.entries(types).forEach(([type, color]) => {
                const item = document.createElement('span');
                item.className = 'legend-item';
                item.innerHTML = `<span class="legend-swatch" style="background:${color}"></span>${type}`;
                legendArea.appendChild(item);
            });

            // Disulfide bonds annotation
            const bonds = [[5, 10], [6, 19]]; // C6-C11, C7-C20 (0-indexed: 5-10, 6-19)
            bonds.forEach(([a, b]) => {
                const x1 = startX + a * (cellW + gap) + cellW / 2;
                const x2 = startX + b * (cellW + gap) + cellW / 2;
                const curveY = y + cellH + 35 + (a === 5 ? 0 : 20);
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M${x1},${y + cellH + 5} Q${x1},${curveY} ${(x1 + x2) / 2},${curveY} Q${x2},${curveY} ${x2},${y + cellH + 5}`);
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke', '#ff9800');
                path.setAttribute('stroke-width', '1.5');
                path.setAttribute('stroke-dasharray', '4 2');
                svg.appendChild(path);

                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', (x1 + x2) / 2);
                label.setAttribute('y', curveY + 12);
                label.setAttribute('text-anchor', 'middle');
                label.setAttribute('font-size', '8');
                label.setAttribute('fill', '#ff9800');
                label.setAttribute('font-family', 'Nunito, sans-serif');
                label.textContent = 'S-S bond';
                svg.appendChild(label);
            });
        }

        function drawSecondary() {
            svg.innerHTML = '';
            legendArea.innerHTML = '';

            const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            title.setAttribute('x', 300); title.setAttribute('y', 30);
            title.setAttribute('text-anchor', 'middle');
            title.setAttribute('font-family', 'Lora, serif');
            title.setAttribute('font-size', '16');
            title.setAttribute('fill', '#606C38');
            title.setAttribute('font-weight', '700');
            title.textContent = 'Secondary Structure';
            svg.appendChild(title);

            const startX = 30, y = 160, spacing = 26;

            // Draw secondary structure elements
            let i = 0;
            while (i < sequence.length) {
                const ssType = secondaryStructure[i];
                if (ssType === 'H') {
                    // Find helix span
                    let start = i;
                    while (i < sequence.length && secondaryStructure[i] === 'H') i++;
                    const end = i;
                    // Draw helix as sinusoidal ribbon
                    let d = '';
                    for (let j = start; j < end; j++) {
                        const x = startX + j * spacing + spacing / 2;
                        const yOff = Math.sin((j - start) * 1.2) * 20;
                        d += (j === start ? 'M' : 'L') + ` ${x} ${y + yOff}`;
                    }
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.classList.add('helix-ribbon');
                    path.setAttribute('d', d);
                    path.setAttribute('stroke', '#e74c3c');
                    path.setAttribute('opacity', '0.6');
                    svg.appendChild(path);

                    // Label
                    const lx = startX + ((start + end) / 2) * spacing;
                    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    label.setAttribute('x', lx); label.setAttribute('y', y - 35);
                    label.setAttribute('text-anchor', 'middle');
                    label.setAttribute('font-size', '10');
                    label.setAttribute('fill', '#e74c3c');
                    label.setAttribute('font-family', 'Nunito, sans-serif');
                    label.setAttribute('font-weight', '700');
                    label.textContent = '\u03B1-helix';
                    svg.appendChild(label);
                } else {
                    // Loop
                    let start = i;
                    while (i < sequence.length && secondaryStructure[i] === 'L') i++;
                    const end = i;
                    let d = '';
                    for (let j = start; j < end; j++) {
                        const x = startX + j * spacing + spacing / 2;
                        d += (j === start ? 'M' : 'L') + ` ${x} ${y}`;
                    }
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.classList.add('loop-line');
                    path.setAttribute('d', d);
                    svg.appendChild(path);
                }
            }

            // Draw residue dots on top
            sequence.split('').forEach((aa, idx) => {
                const x = startX + idx * spacing + spacing / 2;
                const yOff = secondaryStructure[idx] === 'H' ? Math.sin((idx - (idx < 8 ? 1 : 12)) * 1.2) * 20 : 0;
                const data = aminoAcids[aa];

                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.classList.add('residue-rect');
                circle.setAttribute('cx', x);
                circle.setAttribute('cy', y + yOff);
                circle.setAttribute('r', 10);
                circle.setAttribute('fill', data.color);
                circle.setAttribute('stroke', 'white');
                circle.setAttribute('stroke-width', '1.5');
                circle.addEventListener('mouseenter', () => showResidueInfo(aa, idx));
                svg.appendChild(circle);

                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.classList.add('residue-label');
                label.setAttribute('x', x);
                label.setAttribute('y', y + yOff + 4);
                label.setAttribute('font-size', '9');
                label.textContent = aa;
                svg.appendChild(label);

                const num = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                num.classList.add('residue-num');
                num.setAttribute('x', x);
                num.setAttribute('y', y + 55);
                num.textContent = idx + 1;
                svg.appendChild(num);
            });

            // Legend
            [{ label: '\u03B1-helix', color: '#e74c3c' }, { label: 'Loop/Coil', color: '#aaa' }].forEach(item => {
                const el = document.createElement('span');
                el.className = 'legend-item';
                el.innerHTML = `<span class="legend-swatch" style="background:${item.color}"></span>${item.label}`;
                legendArea.appendChild(el);
            });
        }

        function drawHydrophobicity() {
            svg.innerHTML = '';
            legendArea.innerHTML = '';

            const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            title.setAttribute('x', 300); title.setAttribute('y', 30);
            title.setAttribute('text-anchor', 'middle');
            title.setAttribute('font-family', 'Lora, serif');
            title.setAttribute('font-size', '16');
            title.setAttribute('fill', '#606C38');
            title.setAttribute('font-weight', '700');
            title.textContent = 'Hydrophobicity Heatmap';
            svg.appendChild(title);

            const startX = 30, y = 80, cellW = 26, cellH = 60, gap = 2;

            sequence.split('').forEach((aa, i) => {
                const x = startX + i * (cellW + gap);
                const data = aminoAcids[aa];
                const color = hydroColor(data.hydro);

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.classList.add('heatmap-cell');
                rect.setAttribute('x', x); rect.setAttribute('y', y);
                rect.setAttribute('width', cellW); rect.setAttribute('height', cellH);
                rect.setAttribute('rx', 3);
                rect.setAttribute('fill', color);
                rect.addEventListener('mouseenter', () => showResidueInfo(aa, i));
                svg.appendChild(rect);

                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.classList.add('residue-label');
                label.setAttribute('x', x + cellW / 2);
                label.setAttribute('y', y + cellH / 2 + 4);
                label.textContent = aa;
                svg.appendChild(label);

                // Hydrophobicity value
                const val = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                val.classList.add('residue-num');
                val.setAttribute('x', x + cellW / 2);
                val.setAttribute('y', y + cellH + 14);
                val.textContent = data.hydro.toFixed(1);
                svg.appendChild(val);

                const num = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                num.classList.add('residue-num');
                num.setAttribute('x', x + cellW / 2);
                num.setAttribute('y', y - 5);
                num.textContent = i + 1;
                svg.appendChild(num);
            });

            // Color scale
            const scaleY = y + cellH + 40;
            for (let v = -3.5; v <= 4.5; v += 0.5) {
                const sx = 200 + (v + 3.5) / 8 * 200;
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', sx);
                rect.setAttribute('y', scaleY);
                rect.setAttribute('width', 200 / 16);
                rect.setAttribute('height', 12);
                rect.setAttribute('fill', hydroColor(v));
                svg.appendChild(rect);
            }
            const hydLabels = [
                { text: 'Hydrophilic', x: 190, anchor: 'end' },
                { text: 'Hydrophobic', x: 410, anchor: 'start' }
            ];
            hydLabels.forEach(l => {
                const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                t.setAttribute('x', l.x); t.setAttribute('y', scaleY + 10);
                t.setAttribute('text-anchor', l.anchor);
                t.setAttribute('font-size', '9');
                t.setAttribute('fill', '#666');
                t.setAttribute('font-family', 'Nunito, sans-serif');
                t.textContent = l.text;
                svg.appendChild(t);
            });
        }

        function showResidueInfo(aa, position) {
            const data = aminoAcids[aa];
            infoPanel.innerHTML = `
                <h3 style="font-family:'Lora',serif; color:${data.color}; margin-bottom:0.2rem;">${data.name} (${aa})</h3>
                <div class="detail"><strong>3-Letter Code:</strong> ${data.abbr}</div>
                <div class="detail"><strong>Position:</strong> ${position + 1} of 21</div>
                <div class="detail"><strong>Property:</strong> ${data.type}</div>
                <div class="detail"><strong>Hydrophobicity:</strong> ${data.hydro}</div>
                <div class="detail"><strong>Role:</strong> ${data.role}</div>
            `;
        }

        function setView(view) {
            currentView = view;
            document.getElementById('primaryBtn').classList.toggle('active', view === 'primary');
            document.getElementById('secondaryBtn').classList.toggle('active', view === 'secondary');
            document.getElementById('hydroBtn').classList.toggle('active', view === 'hydrophobicity');
            if (view === 'primary') drawPrimary();
            else if (view === 'secondary') drawSecondary();
            else drawHydrophobicity();
        }
        window.setView = setView;

        drawPrimary();
    })();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
