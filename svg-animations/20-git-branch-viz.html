<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Branch Visualizer - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            padding: 1rem;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .page-header { text-align: center; margin-bottom: 1rem; padding-top: 0.5rem; }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); }
        .subtitle { color: var(--terracotta); margin-bottom: 1rem; }
        .layout { display: flex; gap: 1rem; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
        .input-panel {
            flex: 0 0 320px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 8px 25px rgba(138,154,91,0.12);
        }
        .input-panel h3 { font-family: 'Lora', serif; color: var(--moss); margin-bottom: 0.5rem; }
        textarea {
            width: 100%; height: 200px;
            font-family: 'Courier New', monospace; font-size: 13px;
            border: 2px solid var(--sage); border-radius: 10px;
            padding: 0.75rem; background: rgba(255,255,255,0.9);
            color: var(--dark-moss); resize: vertical;
        }
        textarea:focus { outline: none; border-color: var(--moss); }
        .presets { margin-top: 0.75rem; }
        .presets label { font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 0.3rem; }
        .preset-btns { display: flex; flex-wrap: wrap; gap: 0.4rem; }
        .preset-btns button {
            font-family: 'Nunito', sans-serif; padding: 0.3rem 0.7rem;
            border: 2px solid var(--sage); background: rgba(255,255,255,0.7);
            color: var(--dark-moss); border-radius: 10px; cursor: pointer;
            font-size: 0.8rem; font-weight: 600; transition: all 0.2s;
        }
        .preset-btns button:hover { background: var(--sage); color: white; }
        .graph-panel {
            flex: 1; min-width: 300px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 8px 25px rgba(138,154,91,0.12);
            overflow: auto;
        }
        .legend { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 0.75rem; font-size: 0.85rem; }
        .legend-item { display: flex; align-items: center; gap: 0.3rem; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        .head-info {
            margin-top: 0.75rem; padding: 0.5rem 0.75rem;
            background: rgba(138,154,91,0.1); border-radius: 8px;
            font-size: 0.85rem; font-weight: 600;
        }
        .help-text { font-size: 0.78rem; color: var(--sage); margin-top: 0.5rem; line-height: 1.5; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="page-header">
        <h1>Git Branch Visualizer</h1>
        <p class="subtitle">Type git commands to build a commit graph</p>
    </div>
    <div class="layout">
        <div class="input-panel">
            <h3>Commands</h3>
            <textarea id="cmdInput" spellcheck="false" placeholder="Type git commands...
commit &quot;message&quot;
branch feature
checkout feature
commit &quot;add feature&quot;
checkout main
merge feature"></textarea>
            <div class="help-text">
                <strong>Available commands:</strong><br>
                commit "message" &mdash; create a commit<br>
                branch NAME &mdash; create a branch<br>
                checkout NAME &mdash; switch branch<br>
                merge NAME &mdash; merge branch into current
            </div>
            <div class="presets">
                <label>Presets:</label>
                <div class="preset-btns">
                    <button onclick="loadPreset('feature')">Feature Branch</button>
                    <button onclick="loadPreset('gitflow')">Gitflow</button>
                    <button onclick="loadPreset('hotfix')">Hotfix</button>
                </div>
            </div>
        </div>
        <div class="graph-panel">
            <div class="legend" id="legend"></div>
            <svg id="graphSvg" width="700" height="400" viewBox="0 0 700 400" role="img">
                <title>Git Branch Graph</title>
                <desc>Visual representation of git commit history</desc>
            </svg>
            <div class="head-info" id="headInfo">HEAD: main</div>
        </div>
    </div>

    <script>
    (function() {
        const branchColors = ['#606C38','#BC6C25','#8A9A5B','#DDA15E','#5B8A6C','#A05B8A','#5B6C8A','#8A5B5B'];
        const presets = {
            feature: `commit "Initial commit"
commit "Add readme"
branch feature
checkout feature
commit "Start feature"
commit "Implement feature"
checkout main
commit "Fix typo"
merge feature
commit "Release v1.0"`,
            gitflow: `commit "Initial commit"
branch develop
checkout develop
commit "Setup project"
branch feature-login
checkout feature-login
commit "Add login form"
commit "Add auth logic"
checkout develop
merge feature-login
branch release-1.0
checkout release-1.0
commit "Bump version"
checkout main
merge release-1.0
checkout develop
merge release-1.0`,
            hotfix: `commit "Initial commit"
commit "Add feature A"
commit "Release v1.0"
branch hotfix
checkout hotfix
commit "Fix critical bug"
checkout main
merge hotfix
commit "Release v1.0.1"`
        };

        const cmdInput = document.getElementById('cmdInput');
        const graphSvg = document.getElementById('graphSvg');
        const legendEl = document.getElementById('legend');
        const headInfo = document.getElementById('headInfo');

        window.loadPreset = function(name) {
            cmdInput.value = presets[name];
            parseAndDraw();
        };

        cmdInput.addEventListener('input', parseAndDraw);

        function parseAndDraw() {
            const lines = cmdInput.value.split('\n').map(l => l.trim()).filter(l => l);
            // State
            const branches = { main: [] };
            let currentBranch = 'main';
            const commits = []; // {id, message, branch, parents}
            const branchHeads = { main: null };
            const mergeEdges = []; // {from, to}
            let commitId = 0;

            for (const line of lines) {
                const commitMatch = line.match(/^commit\s+"(.+)"$/i) || line.match(/^commit\s+(.+)$/i);
                const branchMatch = line.match(/^branch\s+(\S+)$/i);
                const checkoutMatch = line.match(/^checkout\s+(\S+)$/i);
                const mergeMatch = line.match(/^merge\s+(\S+)$/i);

                if (commitMatch) {
                    const msg = commitMatch[1].replace(/"/g, '');
                    const parents = [];
                    if (branchHeads[currentBranch] !== null && branchHeads[currentBranch] !== undefined) {
                        parents.push(branchHeads[currentBranch]);
                    }
                    const c = { id: commitId, message: msg, branch: currentBranch, parents };
                    commits.push(c);
                    if (!branches[currentBranch]) branches[currentBranch] = [];
                    branches[currentBranch].push(commitId);
                    branchHeads[currentBranch] = commitId;
                    commitId++;
                } else if (branchMatch) {
                    const name = branchMatch[1];
                    if (!branches[name]) {
                        branches[name] = [];
                        branchHeads[name] = branchHeads[currentBranch];
                    }
                } else if (checkoutMatch) {
                    const name = checkoutMatch[1];
                    if (branches[name] !== undefined) {
                        currentBranch = name;
                    }
                } else if (mergeMatch) {
                    const name = mergeMatch[1];
                    if (branches[name] !== undefined && branchHeads[name] !== null && branchHeads[name] !== undefined) {
                        const mergeFrom = branchHeads[name];
                        const parents = [branchHeads[currentBranch], mergeFrom].filter(p => p !== null && p !== undefined);
                        const c = { id: commitId, message: `Merge ${name}`, branch: currentBranch, parents };
                        commits.push(c);
                        if (!branches[currentBranch]) branches[currentBranch] = [];
                        branches[currentBranch].push(commitId);
                        mergeEdges.push({ from: mergeFrom, to: commitId });
                        branchHeads[currentBranch] = commitId;
                        commitId++;
                    }
                }
            }

            drawGraph(commits, branches, branchHeads, mergeEdges, currentBranch);
        }

        function drawGraph(commits, branches, branchHeads, mergeEdges, currentBranch) {
            const ns = 'http://www.w3.org/2000/svg';
            graphSvg.innerHTML = '';

            if (commits.length === 0) {
                headInfo.textContent = 'HEAD: (no commits)';
                legendEl.innerHTML = '';
                return;
            }

            // Assign lane (y-row) to each branch
            const branchNames = Object.keys(branches);
            const branchLane = {};
            branchNames.forEach((b, i) => branchLane[b] = i);

            const colSpacing = 70;
            const rowSpacing = 50;
            const startX = 50;
            const startY = 40;

            // Position each commit
            const positions = {};
            commits.forEach((c, i) => {
                const x = startX + i * colSpacing;
                const y = startY + branchLane[c.branch] * rowSpacing;
                positions[c.id] = { x, y };
            });

            // SVG size
            const maxX = startX + commits.length * colSpacing + 50;
            const maxY = startY + branchNames.length * rowSpacing + 40;
            graphSvg.setAttribute('width', Math.max(700, maxX));
            graphSvg.setAttribute('height', Math.max(200, maxY));
            graphSvg.setAttribute('viewBox', `0 0 ${Math.max(700, maxX)} ${Math.max(200, maxY)}`);

            // Draw parent edges
            commits.forEach(c => {
                c.parents.forEach(pid => {
                    const from = positions[pid];
                    const to = positions[c.id];
                    if (!from || !to) return;
                    const line = document.createElementNS(ns, 'path');
                    if (from.y === to.y) {
                        line.setAttribute('d', `M${from.x},${from.y} L${to.x},${to.y}`);
                    } else {
                        const mx = (from.x + to.x) / 2;
                        line.setAttribute('d', `M${from.x},${from.y} C${mx},${from.y} ${mx},${to.y} ${to.x},${to.y}`);
                    }
                    const colorIdx = branchNames.indexOf(c.branch) % branchColors.length;
                    line.setAttribute('stroke', branchColors[colorIdx]);
                    line.setAttribute('stroke-width', '2.5');
                    line.setAttribute('fill', 'none');
                    graphSvg.appendChild(line);
                });
            });

            // Draw merge edges
            mergeEdges.forEach(me => {
                const from = positions[me.from];
                const to = positions[me.to];
                if (!from || !to) return;
                const line = document.createElementNS(ns, 'path');
                const mx = (from.x + to.x) / 2;
                line.setAttribute('d', `M${from.x},${from.y} C${mx},${from.y} ${mx},${to.y} ${to.x},${to.y}`);
                line.setAttribute('stroke', '#DDA15E');
                line.setAttribute('stroke-width', '2');
                line.setAttribute('stroke-dasharray', '5,3');
                line.setAttribute('fill', 'none');
                graphSvg.appendChild(line);
            });

            // Draw commits
            commits.forEach(c => {
                const pos = positions[c.id];
                const colorIdx = branchNames.indexOf(c.branch) % branchColors.length;

                // Glow for HEAD
                const isHead = branchHeads[currentBranch] === c.id;
                if (isHead) {
                    const glow = document.createElementNS(ns, 'circle');
                    glow.setAttribute('cx', pos.x);
                    glow.setAttribute('cy', pos.y);
                    glow.setAttribute('r', 14);
                    glow.setAttribute('fill', 'none');
                    glow.setAttribute('stroke', branchColors[colorIdx]);
                    glow.setAttribute('stroke-width', '2');
                    glow.setAttribute('opacity', '0.4');
                    graphSvg.appendChild(glow);
                }

                const circle = document.createElementNS(ns, 'circle');
                circle.setAttribute('cx', pos.x);
                circle.setAttribute('cy', pos.y);
                circle.setAttribute('r', 8);
                circle.setAttribute('fill', branchColors[colorIdx]);
                circle.setAttribute('stroke', '#fff');
                circle.setAttribute('stroke-width', '2');
                circle.style.cursor = 'pointer';
                graphSvg.appendChild(circle);

                // Merge diamond
                if (c.parents.length > 1) {
                    circle.setAttribute('r', 9);
                    circle.setAttribute('stroke-width', '3');
                }

                // Tooltip
                const title = document.createElementNS(ns, 'title');
                title.textContent = `${c.branch}: ${c.message}`;
                circle.appendChild(title);

                // Message label
                const label = document.createElementNS(ns, 'text');
                label.setAttribute('x', pos.x);
                label.setAttribute('y', pos.y - 14);
                label.setAttribute('text-anchor', 'middle');
                label.setAttribute('font-size', '9');
                label.setAttribute('fill', '#3d4423');
                label.setAttribute('font-weight', '600');
                const maxLen = 12;
                label.textContent = c.message.length > maxLen ? c.message.slice(0, maxLen) + '...' : c.message;
                graphSvg.appendChild(label);
            });

            // HEAD label
            if (branchHeads[currentBranch] !== null && branchHeads[currentBranch] !== undefined) {
                const hp = positions[branchHeads[currentBranch]];
                if (hp) {
                    const headLabel = document.createElementNS(ns, 'text');
                    headLabel.setAttribute('x', hp.x);
                    headLabel.setAttribute('y', hp.y + 24);
                    headLabel.setAttribute('text-anchor', 'middle');
                    headLabel.setAttribute('font-size', '10');
                    headLabel.setAttribute('font-weight', '700');
                    headLabel.setAttribute('fill', '#BC6C25');
                    headLabel.textContent = 'HEAD';
                    graphSvg.appendChild(headLabel);
                }
            }

            // Branch labels on right
            branchNames.forEach((b, i) => {
                const lane = branchLane[b];
                const y = startY + lane * rowSpacing;
                const label = document.createElementNS(ns, 'text');
                label.setAttribute('x', 10);
                label.setAttribute('y', y + 4);
                label.setAttribute('font-size', '11');
                label.setAttribute('font-weight', '700');
                label.setAttribute('fill', branchColors[i % branchColors.length]);
                label.textContent = b;
                graphSvg.appendChild(label);
            });

            // Legend
            legendEl.innerHTML = '';
            branchNames.forEach((b, i) => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                const dot = document.createElement('span');
                dot.className = 'legend-dot';
                dot.style.background = branchColors[i % branchColors.length];
                item.appendChild(dot);
                const txt = document.createElement('span');
                txt.textContent = b;
                item.appendChild(txt);
                legendEl.appendChild(item);
            });

            headInfo.textContent = `HEAD: ${currentBranch} (${commits.length} commits)`;
        }

        // Load default
        loadPreset('feature');
    })();
    </script>
</body>
</html>
