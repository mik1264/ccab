<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planisphere Star Chart - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); margin: 0.5rem 0; }
        .subtitle { color: var(--terracotta); margin-bottom: 0.75rem; }
        .controls {
            display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
            align-items: center; margin-bottom: 1rem;
        }
        .control-group { display: flex; align-items: center; gap: 0.4rem; }
        .control-group label { font-weight: 600; font-size: 0.85rem; }
        .control-group input[type="range"] { width: 130px; accent-color: var(--moss); }
        .control-group span { font-size: 0.85rem; min-width: 35px; }
        .chart-container {
            background: rgba(30,35,50,0.95);
            border-radius: 50%;
            padding: 10px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.3);
        }
        .star-info {
            margin-top: 1rem; padding: 0.75rem 1.25rem;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            font-size: 0.9rem;
            min-height: 2.5em;
            text-align: center;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Planisphere Star Chart</h1>
    <p class="subtitle">Stereographic projection of the night sky</p>

    <div class="controls">
        <div class="control-group">
            <label>Hour:</label>
            <input type="range" id="hourSlider" min="0" max="23" value="21" step="1">
            <span id="hourVal">21:00</span>
        </div>
        <div class="control-group">
            <label>Latitude:</label>
            <input type="range" id="latSlider" min="10" max="70" value="45" step="1">
            <span id="latVal">45&deg;N</span>
        </div>
    </div>

    <div class="chart-container">
        <svg id="chartSvg" width="500" height="500" viewBox="-260 -260 520 520" role="img">
            <title>Planisphere Star Chart</title>
            <desc>Interactive star chart showing constellations visible at a given time and latitude</desc>
        </svg>
    </div>
    <div class="star-info" id="starInfo">Click a star for details</div>

    <script>
    (function() {
        const svg = document.getElementById('chartSvg');
        const ns = 'http://www.w3.org/2000/svg';
        const hourSlider = document.getElementById('hourSlider');
        const latSlider = document.getElementById('latSlider');
        const hourVal = document.getElementById('hourVal');
        const latVal = document.getElementById('latVal');
        const starInfo = document.getElementById('starInfo');

        const R = 230; // chart radius

        // Bright stars: [name, Bayer, RA(hours), Dec(degrees), magnitude, distance(ly)]
        const stars = [
            ['Polaris','Alpha UMi',2.53,89.26,1.98,433],
            ['Sirius','Alpha CMa',6.75,-16.72,-1.46,8.6],
            ['Betelgeuse','Alpha Ori',5.92,7.41,0.42,700],
            ['Rigel','Beta Ori',5.24,-8.20,0.13,860],
            ['Vega','Alpha Lyr',18.62,38.78,0.03,25],
            ['Capella','Alpha Aur',5.28,46.00,0.08,43],
            ['Arcturus','Alpha Boo',14.26,19.18,-0.05,37],
            ['Procyon','Alpha CMi',7.65,5.22,0.34,11],
            ['Aldebaran','Alpha Tau',4.60,16.51,0.85,65],
            ['Altair','Alpha Aql',19.85,8.87,0.76,17],
            ['Spica','Alpha Vir',13.42,-11.16,0.97,250],
            ['Antares','Alpha Sco',16.49,-26.43,0.96,550],
            ['Pollux','Beta Gem',7.76,28.03,1.14,34],
            ['Fomalhaut','Alpha PsA',22.96,-29.62,1.16,25],
            ['Deneb','Alpha Cyg',20.69,45.28,1.25,2600],
            ['Regulus','Alpha Leo',10.14,11.97,1.35,79],
            ['Castor','Alpha Gem',7.58,31.89,1.58,51],
            ['Bellatrix','Gamma Ori',5.42,6.35,1.64,250],
            ['Alnilam','Epsilon Ori',5.60,-1.20,1.69,2000],
            ['Dubhe','Alpha UMa',11.06,61.75,1.79,124],
            ['Merak','Beta UMa',11.03,56.38,2.37,79],
            ['Phecda','Gamma UMa',11.90,53.69,2.44,84],
            ['Megrez','Delta UMa',12.26,57.03,3.31,81],
            ['Alioth','Epsilon UMa',12.90,55.96,1.77,81],
            ['Mizar','Zeta UMa',13.40,54.93,2.27,78],
            ['Alkaid','Eta UMa',13.79,49.31,1.86,104],
            ['Albireo','Beta Cyg',19.51,27.96,3.08,430],
            ['Denebola','Beta Leo',11.82,14.57,2.14,36],
            ['Algol','Beta Per',3.14,40.96,2.12,93],
            ['Mirfak','Alpha Per',3.41,49.86,1.79,590],
            ['Schedar','Alpha Cas',0.68,56.54,2.23,230],
            ['Caph','Beta Cas',0.15,59.15,2.27,55],
            ['Navi','Gamma Cas',0.95,60.72,2.47,610],
            ['Ruchbah','Delta Cas',1.43,60.24,2.68,100],
            ['Alphecca','Alpha CrB',15.58,26.71,2.23,75],
            ['Rasalhague','Alpha Oph',17.58,12.56,2.07,49],
            ['Eltanin','Gamma Dra',17.94,51.49,2.23,148],
            ['Thuban','Alpha Dra',14.07,64.38,3.65,300],
            ['Kochab','Beta UMi',14.85,74.16,2.08,131],
            ['Alderamin','Alpha Cep',21.31,62.59,2.51,49],
            ['Hamal','Alpha Ari',2.12,23.46,2.00,66],
            ['Elnath','Beta Tau',5.44,28.61,1.65,134],
            ['Mintaka','Delta Ori',5.53,-0.30,2.23,1200],
            ['Saiph','Kappa Ori',5.80,-9.67,2.09,720],
            ['Menkalinan','Beta Aur',6.00,44.95,1.90,82],
            ['Alhena','Gamma Gem',6.63,16.40,1.93,105],
            ['Wezen','Delta CMa',7.14,-26.39,1.84,1800],
            ['Alphard','Alpha Hya',9.46,-8.66,1.98,177],
            ['Algieba','Gamma Leo',10.33,19.84,2.28,130],
            ['Cor Caroli','Alpha CVn',12.93,38.32,2.81,110]
        ];

        // Constellation lines: [star1_index, star2_index]
        // Major constellations using star indices above
        const constellations = [
            // Ursa Major (Big Dipper)
            [19,20],[20,21],[21,22],[22,23],[23,24],[24,25],
            // Orion
            [2,17],[17,42],[42,18],[18,43],[2,18],[3,18],[3,43],
            // Cassiopeia
            [30,31],[31,32],[32,33],
            // Cygnus (partial)
            [14,26],
            // Gemini
            [16,12],
            // Leo
            [15,27],
            // Summer Triangle
            // (Vega-Deneb-Altair drawn as constellation lines)
            [4,14],[14,9],[9,4],
        ];

        // Stereographic projection: RA/Dec to x,y
        // Centered on north celestial pole
        function project(raHours, decDeg, hourAngle, latitude) {
            const ra = raHours * 15 * Math.PI / 180; // RA to radians
            const dec = decDeg * Math.PI / 180;
            const lat = latitude * Math.PI / 180;
            const ha = hourAngle * Math.PI / 180;

            // Rotate by hour angle
            const adjustedRA = ra - ha;

            // Stereographic projection from south pole onto equatorial plane
            // r = cos(dec) / (1 + sin(dec)) for north pole projection
            const r_proj = R * Math.cos(dec) / (1 + Math.sin(dec));
            const x = r_proj * Math.sin(adjustedRA);
            const y = -r_proj * Math.cos(adjustedRA);

            // Check if above horizon at given latitude
            // Altitude: sin(alt) = sin(lat)*sin(dec) + cos(lat)*cos(dec)*cos(HA_actual)
            const haActual = adjustedRA; // simplified
            const sinAlt = Math.sin(lat) * Math.sin(dec) + Math.cos(lat) * Math.cos(dec) * Math.cos(haActual);
            const visible = sinAlt > -0.1 || decDeg > (90 - latitude - 20); // generous visibility

            return { x, y, visible };
        }

        function magnitudeToRadius(mag) {
            return Math.max(0.8, 3.5 - mag * 0.6);
        }

        function draw() {
            svg.innerHTML = '';
            const hour = parseInt(hourSlider.value);
            const latitude = parseInt(latSlider.value);
            const hourAngle = hour * 15; // degrees

            // Background circle
            const bg = document.createElementNS(ns, 'circle');
            bg.setAttribute('cx', 0); bg.setAttribute('cy', 0);
            bg.setAttribute('r', R);
            bg.setAttribute('fill', '#0a0f1e');
            bg.setAttribute('stroke', '#2a3050');
            bg.setAttribute('stroke-width', '2');
            svg.appendChild(bg);

            // Milky Way approximation
            const mw = document.createElementNS(ns, 'ellipse');
            mw.setAttribute('cx', 0); mw.setAttribute('cy', 0);
            mw.setAttribute('rx', R * 0.9); mw.setAttribute('ry', R * 0.25);
            mw.setAttribute('fill', 'rgba(100,120,180,0.06)');
            mw.setAttribute('transform', `rotate(${60 - hourAngle * 0.5})`);
            svg.appendChild(mw);

            // Compass labels
            const dirs = [['N', 0, -R-15], ['E', R+15, 0], ['S', 0, R+15], ['W', -R-15, 0]];
            dirs.forEach(([label, x, y]) => {
                const t = document.createElementNS(ns, 'text');
                t.setAttribute('x', x); t.setAttribute('y', y + 4);
                t.setAttribute('text-anchor', 'middle');
                t.setAttribute('font-size', '12');
                t.setAttribute('fill', '#556');
                t.setAttribute('font-weight', '700');
                t.setAttribute('font-family', 'Nunito, sans-serif');
                t.textContent = label;
                svg.appendChild(t);
            });

            // Declination circles
            [0, 30, 60].forEach(dec => {
                const r_proj = R * Math.cos(dec * Math.PI/180) / (1 + Math.sin(dec * Math.PI/180));
                const c = document.createElementNS(ns, 'circle');
                c.setAttribute('cx', 0); c.setAttribute('cy', 0);
                c.setAttribute('r', r_proj);
                c.setAttribute('fill', 'none');
                c.setAttribute('stroke', 'rgba(60,80,120,0.2)');
                c.setAttribute('stroke-width', '0.5');
                svg.appendChild(c);
            });

            // Project all stars
            const projected = stars.map((s, i) => {
                const pos = project(s[2], s[3], hourAngle, latitude);
                return { ...pos, index: i, star: s };
            });

            // Draw constellation lines
            constellations.forEach(([i1, i2]) => {
                const p1 = projected[i1];
                const p2 = projected[i2];
                if (!p1 || !p2) return;
                const inChart1 = p1.x*p1.x + p1.y*p1.y < R*R;
                const inChart2 = p2.x*p2.x + p2.y*p2.y < R*R;
                if (!inChart1 || !inChart2) return;

                const line = document.createElementNS(ns, 'line');
                line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
                line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);
                line.setAttribute('stroke', 'rgba(100,140,200,0.25)');
                line.setAttribute('stroke-width', '0.8');
                svg.appendChild(line);
            });

            // Draw stars
            projected.forEach(p => {
                const inChart = p.x*p.x + p.y*p.y < R*R;
                if (!inChart) return;

                const s = p.star;
                const r = magnitudeToRadius(s[4]);

                // Glow
                if (s[4] < 1.5) {
                    const glow = document.createElementNS(ns, 'circle');
                    glow.setAttribute('cx', p.x); glow.setAttribute('cy', p.y);
                    glow.setAttribute('r', r * 3);
                    glow.setAttribute('fill', 'rgba(200,220,255,0.08)');
                    svg.appendChild(glow);
                }

                const c = document.createElementNS(ns, 'circle');
                c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
                c.setAttribute('r', r);

                // Color by spectral class approximation (based on magnitude/name)
                let color = '#e8e8ff';
                if (s[0] === 'Betelgeuse' || s[0] === 'Aldebaran' || s[0] === 'Antares') color = '#ffb070';
                else if (s[0] === 'Arcturus' || s[0] === 'Pollux') color = '#ffd090';
                else if (s[0] === 'Vega' || s[0] === 'Sirius' || s[0] === 'Rigel') color = '#c0d0ff';
                c.setAttribute('fill', color);
                c.style.cursor = 'pointer';

                const title = document.createElementNS(ns, 'title');
                title.textContent = `${s[0]} (${s[1]})`;
                c.appendChild(title);

                c.addEventListener('click', () => {
                    starInfo.innerHTML = `<strong>${s[0]}</strong> (${s[1]}) &mdash; Mag: ${s[4].toFixed(2)}, Distance: ${s[5]} ly, RA: ${s[2].toFixed(1)}h, Dec: ${s[3].toFixed(1)}&deg;`;
                });

                svg.appendChild(c);

                // Label for bright stars
                if (s[4] < 1.5) {
                    const label = document.createElementNS(ns, 'text');
                    label.setAttribute('x', p.x + r + 4);
                    label.setAttribute('y', p.y + 3);
                    label.setAttribute('font-size', '8');
                    label.setAttribute('fill', 'rgba(180,200,230,0.7)');
                    label.setAttribute('font-family', 'Nunito, sans-serif');
                    label.textContent = s[0];
                    svg.appendChild(label);
                }
            });

            // Horizon line
            const horizon = document.createElementNS(ns, 'circle');
            horizon.setAttribute('cx', 0); horizon.setAttribute('cy', 0);
            horizon.setAttribute('r', R);
            horizon.setAttribute('fill', 'none');
            horizon.setAttribute('stroke', 'rgba(138,154,91,0.4)');
            horizon.setAttribute('stroke-width', '1.5');
            svg.appendChild(horizon);
        }

        hourSlider.addEventListener('input', () => {
            hourVal.textContent = hourSlider.value + ':00';
            draw();
        });

        latSlider.addEventListener('input', () => {
            latVal.innerHTML = latSlider.value + '&deg;N';
            draw();
        });

        draw();
    })();
    </script>
</body>
</html>
