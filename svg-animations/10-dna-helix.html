<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Double Helix - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); margin: 1.5rem 0 0.3rem; text-align: center; }
        .subtitle { color: var(--terracotta); text-align: center; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .main-area {
            display: flex; gap: 1.5rem; padding: 0.5rem 2rem; max-width: 1000px;
            width: 100%; align-items: flex-start; flex-wrap: wrap; justify-content: center;
        }
        .helix-container {
            background: rgba(255,255,255,0.65); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 1rem; border: 2px solid rgba(138,154,91,0.15);
        }
        .backbone { fill: none; stroke-width: 4; stroke-linecap: round; }
        .backbone-5 { stroke: #4a90d9; }
        .backbone-3 { stroke: #d94a4a; }
        .base-pair-line { stroke-width: 2; }
        .base-circle { cursor: pointer; transition: r 0.2s; }
        .base-circle:hover { r: 10; }
        .base-label { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 11px; pointer-events: none; fill: white; }
        .direction-arrow { font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; }
        .info-panel {
            background: rgba(255,255,255,0.75); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 1.5rem; border: 2px solid rgba(138,154,91,0.15);
            min-width: 260px; max-width: 320px; flex: 1;
        }
        .info-panel h2 { font-family: 'Lora', serif; color: var(--moss); font-size: 1.3rem; margin-bottom: 0.5rem; }
        .info-panel .detail { margin-bottom: 0.5rem; line-height: 1.5; font-size: 0.9rem; }
        .info-panel .detail strong { color: var(--terracotta); }
        .info-panel .placeholder { color: var(--sage); font-style: italic; text-align: center; padding: 1.5rem 0; }
        .sequence-bar {
            background: rgba(255,255,255,0.6); border-radius: 12px; padding: 0.5rem;
            margin-top: 0.5rem; font-family: monospace; font-size: 0.85rem;
            letter-spacing: 2px; text-align: center; word-break: break-all;
        }
        .seq-A { color: #27ae60; } .seq-T { color: #c0392b; }
        .seq-G { color: #2980b9; } .seq-C { color: #f39c12; }
        .legend-row { display: flex; gap: 12px; margin-top: 0.5rem; flex-wrap: wrap; justify-content: center; }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.8rem; }
        .legend-dot { width: 14px; height: 14px; border-radius: 50%; }
        @media (max-width: 768px) {
            .main-area { flex-direction: column; align-items: center; padding: 0.5rem 1rem; }
            .info-panel { max-width: 100%; min-width: auto; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>DNA Double Helix</h1>
    <p class="subtitle">Scroll to traverse the sequence. Click a base pair for details.</p>

    <div class="main-area">
        <div class="helix-container">
            <svg id="helixSvg" width="350" height="520" viewBox="0 0 350 520" role="graphics-document" aria-label="DNA double helix diagram">
                <title>DNA Double Helix</title>
                <desc>A 2D side view of the DNA double helix showing two sugar-phosphate backbones connected by base pairs. Adenine-Thymine pairs shown in green-red, Guanine-Cytosine pairs in blue-yellow.</desc>
            </svg>
            <div class="legend-row">
                <span class="legend-item"><span class="legend-dot" style="background:#27ae60"></span> Adenine</span>
                <span class="legend-item"><span class="legend-dot" style="background:#c0392b"></span> Thymine</span>
                <span class="legend-item"><span class="legend-dot" style="background:#2980b9"></span> Guanine</span>
                <span class="legend-item"><span class="legend-dot" style="background:#f39c12"></span> Cytosine</span>
            </div>
        </div>
        <div class="info-panel" id="infoPanel">
            <p class="placeholder">Click any base pair to learn about the nucleotide.</p>
            <div class="sequence-bar" id="sequenceBar"></div>
        </div>
    </div>

    <script>
    (function(){
        // DNA sequence (a short segment)
        const sequence = 'ATGCGATTAGCCTAAGGCATTGCAATCGGCTA';
        const complement = { 'A':'T', 'T':'A', 'G':'C', 'C':'G' };

        const baseColors = { A: '#27ae60', T: '#c0392b', G: '#2980b9', C: '#f39c12' };
        const baseNames = { A: 'Adenine', T: 'Thymine', G: 'Guanine', C: 'Cytosine' };
        const baseInfo = {
            A: { full: 'Adenine', type: 'Purine', bonds: 2, partner: 'Thymine', desc: 'A purine base that pairs with thymine via 2 hydrogen bonds. Part of the genetic code.' },
            T: { full: 'Thymine', type: 'Pyrimidine', bonds: 2, partner: 'Adenine', desc: 'A pyrimidine base unique to DNA (replaced by uracil in RNA). Pairs with adenine.' },
            G: { full: 'Guanine', type: 'Purine', bonds: 3, partner: 'Cytosine', desc: 'A purine base that forms 3 hydrogen bonds with cytosine, making G-C pairs stronger than A-T.' },
            C: { full: 'Cytosine', type: 'Pyrimidine', bonds: 3, partner: 'Guanine', desc: 'A pyrimidine base that pairs with guanine. Can be methylated for gene regulation.' }
        };

        const svg = document.getElementById('helixSvg');
        const infoPanel = document.getElementById('infoPanel');
        const sequenceBar = document.getElementById('sequenceBar');

        // Display sequence in sequence bar
        let seqHTML = "<strong>5' &#8594; 3':</strong> ";
        sequence.split('').forEach((b, i) => {
            seqHTML += `<span class="seq-${b}">${b}</span>`;
        });
        seqHTML += "<br><strong>3' &#8592; 5':</strong> ";
        sequence.split('').forEach((b, i) => {
            const c = complement[b];
            seqHTML += `<span class="seq-${c}">${c}</span>`;
        });
        sequenceBar.innerHTML = seqHTML;

        // Helix geometry
        const cx = 175, helixWidth = 100;
        const basesVisible = 12;
        let scrollOffset = 0;

        function drawHelix() {
            svg.innerHTML = '';
            // Defs
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            svg.appendChild(defs);

            // Direction labels
            const arrow5 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            arrow5.classList.add('direction-arrow');
            arrow5.setAttribute('x', cx - helixWidth - 25);
            arrow5.setAttribute('y', 25);
            arrow5.setAttribute('fill', '#4a90d9');
            arrow5.textContent = "5'";
            svg.appendChild(arrow5);

            const arrow3r = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            arrow3r.classList.add('direction-arrow');
            arrow3r.setAttribute('x', cx + helixWidth + 10);
            arrow3r.setAttribute('y', 25);
            arrow3r.setAttribute('fill', '#d94a4a');
            arrow3r.textContent = "3'";
            svg.appendChild(arrow3r);

            const arrow3 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            arrow3.classList.add('direction-arrow');
            arrow3.setAttribute('x', cx - helixWidth - 25);
            arrow3.setAttribute('y', 510);
            arrow3.setAttribute('fill', '#4a90d9');
            arrow3.textContent = "3'";
            svg.appendChild(arrow3);

            const arrow5r = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            arrow5r.classList.add('direction-arrow');
            arrow5r.setAttribute('x', cx + helixWidth + 10);
            arrow5r.setAttribute('y', 510);
            arrow5r.setAttribute('fill', '#d94a4a');
            arrow5r.textContent = "5'";
            svg.appendChild(arrow5r);

            // Arrow indicators
            const arrowDown = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            arrowDown.setAttribute('x', cx - helixWidth - 25);
            arrowDown.setAttribute('y', 45);
            arrowDown.setAttribute('fill', '#4a90d9');
            arrowDown.setAttribute('font-size', '14');
            arrowDown.textContent = '\u2193';
            svg.appendChild(arrowDown);

            const arrowUp = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            arrowUp.setAttribute('x', cx + helixWidth + 14);
            arrowUp.setAttribute('y', 498);
            arrowUp.setAttribute('fill', '#d94a4a');
            arrowUp.setAttribute('font-size', '14');
            arrowUp.textContent = '\u2191';
            svg.appendChild(arrowUp);

            const startIdx = Math.floor(scrollOffset);
            const frac = scrollOffset - startIdx;

            // Build backbone paths and base pairs
            const leftPoints = [];
            const rightPoints = [];

            for (let i = 0; i < basesVisible; i++) {
                const seqIdx = (startIdx + i) % sequence.length;
                const y = 40 + (i - frac) * 38;
                if (y < 20 || y > 500) continue;

                // Sinusoidal helix effect
                const phase = (i - frac) * 0.55;
                const leftX = cx + Math.sin(phase) * helixWidth;
                const rightX = cx - Math.sin(phase) * helixWidth;

                leftPoints.push({ x: leftX, y: y });
                rightPoints.push({ x: rightX, y: y });

                const base = sequence[seqIdx];
                const comp = complement[base];

                // Determine which strand is in front based on phase
                const sinVal = Math.sin(phase);
                const drawBasePairBehind = Math.cos(phase) > 0;

                // Base pair connecting line
                const pairLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                pairLine.classList.add('base-pair-line');
                pairLine.setAttribute('x1', leftX);
                pairLine.setAttribute('y1', y);
                pairLine.setAttribute('x2', rightX);
                pairLine.setAttribute('y2', y);
                const hBonds = baseInfo[base].bonds;
                pairLine.setAttribute('stroke', hBonds === 3 ? '#888' : '#aaa');
                pairLine.setAttribute('stroke-dasharray', hBonds === 3 ? '4 2' : '6 3');

                if (drawBasePairBehind) {
                    svg.insertBefore(pairLine, svg.firstChild.nextSibling);
                } else {
                    svg.appendChild(pairLine);
                }

                // Left base (5'->3' strand)
                const leftGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                const leftCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                leftCircle.classList.add('base-circle');
                leftCircle.setAttribute('cx', leftX);
                leftCircle.setAttribute('cy', y);
                leftCircle.setAttribute('r', 8);
                leftCircle.setAttribute('fill', baseColors[base]);
                leftCircle.setAttribute('stroke', '#fff');
                leftCircle.setAttribute('stroke-width', '1.5');
                leftGroup.appendChild(leftCircle);
                const leftLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                leftLabel.classList.add('base-label');
                leftLabel.setAttribute('x', leftX);
                leftLabel.setAttribute('y', y + 4);
                leftLabel.setAttribute('text-anchor', 'middle');
                leftLabel.textContent = base;
                leftGroup.appendChild(leftLabel);
                leftGroup.addEventListener('click', () => showBaseInfo(base, seqIdx, 'sense'));
                svg.appendChild(leftGroup);

                // Right base (3'->5' complementary strand)
                const rightGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                const rightCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                rightCircle.classList.add('base-circle');
                rightCircle.setAttribute('cx', rightX);
                rightCircle.setAttribute('cy', y);
                rightCircle.setAttribute('r', 8);
                rightCircle.setAttribute('fill', baseColors[comp]);
                rightCircle.setAttribute('stroke', '#fff');
                rightCircle.setAttribute('stroke-width', '1.5');
                rightGroup.appendChild(rightCircle);
                const rightLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                rightLabel.classList.add('base-label');
                rightLabel.setAttribute('x', rightX);
                rightLabel.setAttribute('y', y + 4);
                rightLabel.setAttribute('text-anchor', 'middle');
                rightLabel.textContent = comp;
                rightGroup.appendChild(rightLabel);
                rightGroup.addEventListener('click', () => showBaseInfo(comp, seqIdx, 'antisense'));
                svg.appendChild(rightGroup);
            }

            // Draw backbone curves
            if (leftPoints.length >= 2) {
                const leftPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                leftPath.classList.add('backbone', 'backbone-5');
                leftPath.setAttribute('d', smoothPath(leftPoints));
                svg.insertBefore(leftPath, svg.firstChild.nextSibling);

                const rightPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                rightPath.classList.add('backbone', 'backbone-3');
                rightPath.setAttribute('d', smoothPath(rightPoints));
                svg.insertBefore(rightPath, svg.firstChild.nextSibling);
            }
        }

        function smoothPath(points) {
            if (points.length < 2) return '';
            let d = `M ${points[0].x} ${points[0].y}`;
            for (let i = 1; i < points.length; i++) {
                const prev = points[i - 1], curr = points[i];
                const cpx1 = prev.x, cpy1 = prev.y + (curr.y - prev.y) * 0.4;
                const cpx2 = curr.x, cpy2 = curr.y - (curr.y - prev.y) * 0.4;
                d += ` C ${cpx1} ${cpy1} ${cpx2} ${cpy2} ${curr.x} ${curr.y}`;
            }
            return d;
        }

        function showBaseInfo(base, position, strand) {
            const info = baseInfo[base];
            const panel = document.getElementById('infoPanel');
            panel.innerHTML = `
                <h2 style="color:${baseColors[base]}">${info.full} (${base})</h2>
                <div class="detail"><strong>Type:</strong> ${info.type}</div>
                <div class="detail"><strong>Pairs with:</strong> ${info.partner}</div>
                <div class="detail"><strong>Hydrogen Bonds:</strong> ${info.bonds}</div>
                <div class="detail"><strong>Position:</strong> ${position + 1} (${strand} strand)</div>
                <div class="detail"><strong>Description:</strong> ${info.desc}</div>
                <div class="sequence-bar" id="sequenceBar">${sequenceBar.innerHTML}</div>
            `;
        }

        // Scroll to traverse sequence
        window.addEventListener('wheel', function(e) {
            e.preventDefault();
            scrollOffset += e.deltaY * 0.02;
            if (scrollOffset < 0) scrollOffset = 0;
            if (scrollOffset > sequence.length - basesVisible) scrollOffset = sequence.length - basesVisible;
            drawHelix();
        }, { passive: false });

        drawHelix();
    })();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
