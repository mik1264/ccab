<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Shape Morphing - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 1rem;
        }
        .organic-shape {
            position: fixed; border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            opacity: 0.07; animation: morph 30s infinite ease-in-out;
            z-index: 0; pointer-events: none;
        }
        .shape-1 { width: 500px; height: 500px; background: var(--sage); top: -100px; left: -100px; }
        .shape-2 { width: 350px; height: 350px; background: var(--earth); bottom: -50px; right: -50px; animation-delay: -10s; }
        @keyframes morph {
            0%, 100% { border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%; }
            25% { border-radius: 54% 46% 38% 62% / 49% 70% 30% 51%; }
            50% { border-radius: 35% 65% 67% 33% / 49% 45% 55% 51%; }
            75% { border-radius: 67% 33% 47% 53% / 37% 68% 32% 63%; }
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); margin: 0.5rem 0; position: relative; z-index: 1; margin-top: 3rem; }
        .subtitle { color: var(--terracotta); margin-bottom: 1.5rem; position: relative; z-index: 1; }
        .main-card {
            background: rgba(255,255,255,0.75); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 2rem;
            box-shadow: 0 8px 30px rgba(138,154,91,0.15);
            position: relative; z-index: 1; max-width: 700px; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
        }
        .shape-label {
            font-family: 'Lora', serif; font-size: 1.8rem; color: var(--moss);
            font-weight: 600; text-align: center; min-height: 2.5rem;
            transition: opacity 0.4s ease;
        }
        .shape-desc {
            font-size: 0.95rem; color: var(--terracotta); text-align: center;
            min-height: 1.5rem; transition: opacity 0.4s ease;
        }
        svg { display: block; }
        .controls {
            display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 100%;
        }
        .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
        button {
            font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 600;
            padding: 0.5rem 1.25rem; border: none; border-radius: 20px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary { background: var(--moss); color: white; }
        .btn-primary:hover { background: var(--dark-moss); transform: translateY(-2px); }
        .btn-secondary { background: rgba(138,154,91,0.2); color: var(--moss); }
        .btn-secondary:hover { background: rgba(138,154,91,0.35); transform: translateY(-2px); }
        .slider-row { display: flex; align-items: center; gap: 1rem; width: 100%; max-width: 350px; }
        .slider-row label { font-size: 0.85rem; color: var(--moss); font-weight: 600; white-space: nowrap; }
        input[type=range] { flex: 1; accent-color: var(--moss); }
        .dots {
            display: flex; gap: 0.5rem; justify-content: center;
        }
        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: rgba(96,108,56,0.25); transition: all 0.3s ease; cursor: pointer;
        }
        .dot.active { background: var(--moss); transform: scale(1.3); }
    </style>
</head>
<body>
    <div class="organic-shape shape-1"></div>
    <div class="organic-shape shape-2"></div>
    <a href="../index.html" class="back-link">← Back to Gallery</a>
    <h1>Animal Shape Morphing</h1>
    <p class="subtitle">Eight nature forms flowing into each other</p>

    <div class="main-card">
        <div class="shape-label" id="shapeLabel">Leaf</div>
        <div class="shape-desc" id="shapeDesc">A simple leaf, symbol of growth and nature</div>
        <svg id="morphSvg" width="380" height="320" viewBox="-190 -160 380 320">
            <defs>
                <radialGradient id="g0" cx="50%" cy="50%" r="60%">
                    <stop offset="0%" stop-color="#a8d8a8"/>
                    <stop offset="100%" stop-color="#4a7c59"/>
                </radialGradient>
                <radialGradient id="g1" cx="50%" cy="50%" r="60%">
                    <stop offset="0%" stop-color="#f9d4e0"/>
                    <stop offset="100%" stop-color="#e879a0"/>
                </radialGradient>
                <radialGradient id="g2" cx="50%" cy="50%" r="60%">
                    <stop offset="0%" stop-color="#b3e0f7"/>
                    <stop offset="100%" stop-color="#3a8cc1"/>
                </radialGradient>
                <radialGradient id="g3" cx="50%" cy="50%" r="60%">
                    <stop offset="0%" stop-color="#ffe5a0"/>
                    <stop offset="100%" stop-color="#e8a020"/>
                </radialGradient>
                <radialGradient id="g4" cx="50%" cy="50%" r="60%">
                    <stop offset="0%" stop-color="#f9c6e8"/>
                    <stop offset="100%" stop-color="#c8559a"/>
                </radialGradient>
                <radialGradient id="g5" cx="50%" cy="50%" r="60%">
                    <stop offset="0%" stop-color="#d0c8f7"/>
                    <stop offset="100%" stop-color="#5a40c8"/>
                </radialGradient>
                <radialGradient id="g6" cx="50%" cy="50%" r="60%">
                    <stop offset="0%" stop-color="#ffeeba"/>
                    <stop offset="100%" stop-color="#d4a017"/>
                </radialGradient>
                <radialGradient id="g7" cx="50%" cy="50%" r="60%">
                    <stop offset="0%" stop-color="#ffc8cc"/>
                    <stop offset="100%" stop-color="#e84060"/>
                </radialGradient>
                <filter id="shadow">
                    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.18"/>
                </filter>
            </defs>
            <path id="morphPath" fill="url(#g0)" filter="url(#shadow)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
        </svg>

        <div class="dots" id="dots"></div>

        <div class="controls">
            <div class="btn-row">
                <button class="btn-secondary" id="prevBtn">← Previous</button>
                <button class="btn-primary" id="autoBtn">⏸ Pause</button>
                <button class="btn-secondary" id="nextBtn">Next →</button>
            </div>
            <div class="slider-row">
                <label>Speed</label>
                <input type="range" id="speedSlider" min="1" max="5" value="3" step="1">
                <span id="speedLabel" style="font-size:0.85rem;color:var(--moss);font-weight:600;min-width:40px">Med</span>
            </div>
        </div>
    </div>

    <script>
    // Shape data: each has a path (normalized ~-90 to 90 coords), gradient id, name, description
    const shapes = [
        {
            name: 'Leaf',
            desc: 'A simple leaf, symbol of growth and nature',
            gradient: 'g0',
            // leaf path
            d: 'M 0,-120 C 60,-80 90,-20 80,30 C 70,80 30,110 0,120 C -30,110 -70,80 -80,30 C -90,-20 -60,-80 0,-120 Z M 0,-120 L 0,120'
        },
        {
            name: 'Butterfly',
            desc: 'Wings spread wide, dancing on the breeze',
            gradient: 'g1',
            d: 'M 0,0 C -20,-30 -90,-90 -130,-70 C -150,-55 -130,-10 -90,10 C -60,25 -20,15 0,0 C 20,-30 90,-90 130,-70 C 150,-55 130,-10 90,10 C 60,25 20,15 0,0 Z'
        },
        {
            name: 'Fish',
            desc: 'Gliding effortlessly through still water',
            gradient: 'g2',
            d: 'M -100,0 C -80,-15 -40,-25 0,-20 C 40,-15 80,-5 110,0 C 80,5 40,15 0,20 C -40,25 -80,15 -100,0 Z M 110,0 C 120,-25 130,-40 140,-35 C 135,-15 135,15 140,35 C 130,40 120,25 110,0 Z'
        },
        {
            name: 'Bird',
            desc: 'Soaring free above the clouds',
            gradient: 'g3',
            d: 'M 0,-20 C -10,-40 -80,-80 -130,-60 C -100,-40 -60,-20 0,-20 C 10,-40 80,-80 130,-60 C 100,-40 60,-20 0,-20 Z M 0,-20 C -10,20 -20,60 -15,90 C -5,70 5,70 15,90 C 20,60 10,20 0,-20 Z'
        },
        {
            name: 'Flower',
            desc: 'Petals open to greet the morning sun',
            gradient: 'g4',
            d: 'M 0,-100 C 15,-80 15,-60 0,-40 C 15,-60 35,-55 50,-40 C 35,-20 20,-15 0,-10 C 20,-15 30,5 20,25 C 0,15 -20,15 -20,25 C -30,5 -20,-15 0,-10 C -20,-15 -35,-20 -50,-40 C -35,-55 -15,-60 0,-40 C -15,-60 -15,-80 0,-100 Z'
        },
        {
            name: 'Moon',
            desc: 'The crescent moon watching over the night',
            gradient: 'g5',
            d: 'M 30,-110 C 90,-90 120,-40 110,20 C 100,70 60,110 10,120 C 60,100 90,60 90,10 C 90,-40 60,-85 30,-110 Z'
        },
        {
            name: 'Star',
            desc: 'A five-pointed star shining bright',
            gradient: 'g6',
            d: 'M 0,-120 L 28,-40 L 114,-37 L 46,14 L 70,100 L 0,54 L -70,100 L -46,14 L -114,-37 L -28,-40 Z'
        },
        {
            name: 'Heart',
            desc: 'Love and warmth in its purest form',
            gradient: 'g7',
            d: 'M 0,80 C -20,60 -90,20 -100,-30 C -110,-80 -70,-120 -30,-110 C -10,-105 0,-90 0,-90 C 0,-90 10,-105 30,-110 C 70,-120 110,-80 100,-30 C 90,20 20,60 0,80 Z'
        }
    ];

    // SMIL-free: we interpolate paths with JavaScript
    let currentIdx = 0;
    let targetIdx = 1;
    let progress = 0;
    let animating = false;
    let autoPlay = true;
    let speedMs = 1800; // duration for one morph in ms
    let pauseMs = 800;
    let lastTime = null;
    let phase = 'morphing'; // 'morphing' or 'pausing'
    let phaseTime = 0;

    const speedLabels = ['Slow', 'Slow', 'Med', 'Fast', 'Fast'];
    const speedValues = [3000, 2200, 1500, 900, 500];

    const morphPath = document.getElementById('morphPath');
    const shapeLabel = document.getElementById('shapeLabel');
    const shapeDesc = document.getElementById('shapeDesc');
    const autoBtn = document.getElementById('autoBtn');
    const dotsEl = document.getElementById('dots');

    // Create dots
    shapes.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === 0 ? ' active' : '');
        d.onclick = () => { if (!animating) jumpTo(i); };
        dotsEl.appendChild(d);
    });

    function updateDots(idx) {
        dotsEl.querySelectorAll('.dot').forEach((d, i) => {
            d.classList.toggle('active', i === idx);
        });
    }

    // Parse SVG path into segments of numbers for interpolation
    // We use a simpler approach: normalize all paths to same number of points
    // by converting to cubic beziers

    function parsePath(d) {
        // Extract all numbers from the path
        const nums = d.match(/-?\d+(\.\d+)?/g).map(Number);
        return nums;
    }

    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

    function buildPath(shape, nums) {
        // Rebuild path by replacing numbers
        let i = 0;
        return shape.d.replace(/-?\d+(\.\d+)?/g, () => {
            const val = nums[i++];
            return Math.round(val * 100) / 100;
        });
    }

    // Normalize paths to same number of points by padding
    const pathNums = shapes.map(s => parsePath(s.d));
    const maxLen = Math.max(...pathNums.map(p => p.length));
    // Pad shorter paths by repeating last values
    pathNums.forEach(nums => {
        while(nums.length < maxLen) nums.push(nums[nums.length-1]);
    });

    function getGradientId(t) {
        // Blend gradient: show current until > 0.5 then switch
        return t < 0.5 ? shapes[currentIdx].gradient : shapes[targetIdx].gradient;
    }

    function renderMorph(t) {
        const ease = easeInOut(Math.min(t, 1));
        const src = pathNums[currentIdx];
        const dst = pathNums[targetIdx];
        const interp = src.map((v, i) => lerp(v, dst[i], ease));
        // Use source path template until halfway, then target
        const template = ease < 0.5 ? shapes[currentIdx] : shapes[targetIdx];
        morphPath.setAttribute('d', buildPath(template, interp));
        morphPath.setAttribute('fill', `url(#${getGradientId(ease)})`);
    }

    function setLabel(idx, opacity=1) {
        shapeLabel.style.opacity = opacity;
        shapeDesc.style.opacity = opacity;
        shapeLabel.textContent = shapes[idx].name;
        shapeDesc.textContent = shapes[idx].desc;
    }

    function animate(ts) {
        if (!lastTime) lastTime = ts;
        const dt = ts - lastTime;
        lastTime = ts;

        if (phase === 'morphing') {
            phaseTime += dt;
            const t = phaseTime / speedMs;
            if (t >= 1) {
                renderMorph(1);
                currentIdx = targetIdx;
                updateDots(currentIdx);
                setLabel(currentIdx, 1);
                phase = 'pausing';
                phaseTime = 0;
            } else {
                renderMorph(t);
                // fade label during morph
                if (t < 0.3) setLabel(currentIdx, 1 - t/0.3);
                else if (t > 0.7) setLabel(targetIdx, (t-0.7)/0.3);
            }
        } else { // pausing
            phaseTime += dt;
            if (phaseTime >= pauseMs && autoPlay) {
                startMorph((currentIdx + 1) % shapes.length);
            }
        }

        if (autoPlay || phase === 'morphing') {
            requestAnimationFrame(animate);
        } else {
            animating = false;
        }
    }

    function startMorph(to) {
        targetIdx = to;
        phase = 'morphing';
        phaseTime = 0;
        lastTime = null;
        if (!animating) {
            animating = true;
            requestAnimationFrame(animate);
        }
    }

    function jumpTo(idx) {
        currentIdx = idx;
        targetIdx = idx;
        renderMorph(1);
        setLabel(idx, 1);
        updateDots(idx);
        phase = 'pausing';
        phaseTime = 0;
    }

    // Init
    renderMorph(0);
    setLabel(0, 1);
    updateDots(0);
    setTimeout(() => startMorph(1), 1000);

    autoBtn.onclick = () => {
        autoPlay = !autoPlay;
        autoBtn.textContent = autoPlay ? '⏸ Pause' : '▶ Play';
        if (autoPlay) {
            animating = true;
            lastTime = null;
            phase = 'pausing';
            phaseTime = 0;
            requestAnimationFrame(animate);
        }
    };

    document.getElementById('prevBtn').onclick = () => {
        const to = (currentIdx - 1 + shapes.length) % shapes.length;
        startMorph(to);
    };
    document.getElementById('nextBtn').onclick = () => {
        const to = (currentIdx + 1) % shapes.length;
        startMorph(to);
    };

    document.getElementById('speedSlider').oninput = function() {
        const v = parseInt(this.value) - 1;
        speedMs = speedValues[v];
        document.getElementById('speedLabel').textContent = speedLabels[v];
    };
    </script>
</body>
</html>
