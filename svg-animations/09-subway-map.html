<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viridis Metro Map - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B; --moss: #606C38; --earth: #DDA15E;
            --cream: #FEFAE0; --terracotta: #BC6C25; --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.8);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        .header-bar {
            width: 100%; text-align: center; padding: 0.8rem 0 0.3rem;
            background: rgba(255,255,255,0.5); backdrop-filter: blur(8px); z-index: 10;
        }
        .header-bar h1 { font-family: 'Lora', serif; font-size: 1.5rem; color: var(--moss); }
        .header-bar p { color: var(--terracotta); font-size: 0.85rem; }
        .map-viewport {
            flex: 1; width: 100%; overflow: hidden; cursor: grab; position: relative;
        }
        .map-viewport.grabbing { cursor: grabbing; }
        .station-dot { cursor: pointer; transition: r 0.2s; }
        .station-dot:hover { r: 7; }
        .station-dot.selected { stroke: #BC6C25; stroke-width: 3; }
        .station-label {
            font-family: 'Nunito', sans-serif; font-size: 9px; fill: #333;
            pointer-events: none; font-weight: 600;
        }
        .line-path { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
        .highlight-path { fill: none; stroke: #BC6C25; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; opacity: 0.5; }
        .interchange { cursor: pointer; stroke: #333; stroke-width: 2; }
        .info-panel {
            position: fixed; bottom: 1rem; right: 1rem;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
            border-radius: 16px; padding: 1rem 1.2rem; border: 2px solid var(--earth);
            min-width: 220px; max-width: 300px; box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            z-index: 50; display: none; font-size: 0.9rem;
        }
        .info-panel h3 { font-family: 'Lora', serif; color: var(--moss); margin-bottom: 0.3rem; }
        .info-panel .line-badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px; color: white;
            font-size: 0.75rem; font-weight: 700; margin: 2px 2px;
        }
        .instructions {
            position: fixed; bottom: 1rem; left: 1rem; background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px); border-radius: 12px; padding: 0.6rem 1rem;
            font-size: 0.75rem; color: var(--moss); z-index: 50; max-width: 240px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <div class="header-bar">
        <h1>Viridis Metro</h1>
        <p>Click a station for info. Click two stations to find shortest path.</p>
    </div>
    <div class="map-viewport" id="viewport">
        <svg id="metroSvg" role="graphics-document" aria-label="Viridis Metro subway map">
            <title>Viridis Metro Map</title>
            <desc>Fictional subway map with 8 lines and approximately 40 stations. Click stations for info or click two stations to find the shortest path between them.</desc>
        </svg>
    </div>
    <div class="info-panel" id="infoPanel"></div>
    <div class="instructions" id="instructions">Scroll to zoom. Drag to pan. Click stations to explore.</div>

    <script>
    (function(){
        const lineColors = {
            'Red':    '#e74c3c',
            'Blue':   '#3498db',
            'Green':  '#27ae60',
            'Orange': '#e67e22',
            'Purple': '#9b59b6',
            'Yellow': '#f1c40f',
            'Teal':   '#1abc9c',
            'Pink':   '#e84393'
        };

        // Station data: id, name, x, y, lines[], isInterchange
        const stations = [
            // Red Line: horizontal W-E
            { id: 'r1', name: 'Westport', x: 80, y: 300, lines: ['Red'] },
            { id: 'r2', name: 'Maple Grove', x: 180, y: 300, lines: ['Red'] },
            { id: 'r3', name: 'Central Park', x: 300, y: 300, lines: ['Red','Green','Blue'] },
            { id: 'r4', name: 'City Hall', x: 420, y: 300, lines: ['Red','Orange','Purple'] },
            { id: 'r5', name: 'Eastside', x: 540, y: 300, lines: ['Red','Teal'] },
            { id: 'r6', name: 'Harbor View', x: 660, y: 300, lines: ['Red'] },
            // Blue Line: NW to SE diagonal
            { id: 'b1', name: 'North Hills', x: 140, y: 120, lines: ['Blue'] },
            { id: 'b2', name: 'University', x: 220, y: 200, lines: ['Blue','Yellow'] },
            // b3 = Central Park (r3)
            { id: 'b4', name: 'South Market', x: 380, y: 400, lines: ['Blue','Pink'] },
            { id: 'b5', name: 'Riverside', x: 460, y: 480, lines: ['Blue'] },
            // Green Line: N to S vertical
            { id: 'g1', name: 'Pinewood', x: 300, y: 80, lines: ['Green'] },
            { id: 'g2', name: 'Museum District', x: 300, y: 180, lines: ['Green','Yellow'] },
            // g3 = Central Park (r3)
            { id: 'g4', name: 'Old Town', x: 300, y: 420, lines: ['Green','Pink'] },
            { id: 'g5', name: 'Lakeside', x: 300, y: 540, lines: ['Green'] },
            // Orange Line: NE to SW
            { id: 'o1', name: 'Tech Campus', x: 580, y: 120, lines: ['Orange'] },
            { id: 'o2', name: 'Innovation Hub', x: 500, y: 200, lines: ['Orange','Teal'] },
            // o3 = City Hall (r4)
            { id: 'o4', name: 'Arts Quarter', x: 340, y: 400, lines: ['Orange'] },
            { id: 'o5', name: 'Stadium', x: 260, y: 480, lines: ['Orange'] },
            // Purple Line: vertical through City Hall
            { id: 'p1', name: 'Hilltop', x: 420, y: 100, lines: ['Purple'] },
            { id: 'p2', name: 'Commerce Square', x: 420, y: 200, lines: ['Purple','Teal'] },
            // p3 = City Hall (r4)
            { id: 'p4', name: 'Docklands', x: 420, y: 420, lines: ['Purple'] },
            { id: 'p5', name: 'Ferry Terminal', x: 420, y: 540, lines: ['Purple'] },
            // Yellow Line: horizontal through middle
            { id: 'y1', name: 'Sunset Valley', x: 80, y: 200, lines: ['Yellow'] },
            // y2 = University (b2)
            // y3 = Museum District (g2)
            { id: 'y4', name: 'Clocktower', x: 420, y: 200, lines: ['Yellow','Purple','Teal'] },
            { id: 'y5', name: 'Orchard Park', x: 540, y: 200, lines: ['Yellow'] },
            // Teal Line: horizontal-ish through east
            { id: 't1', name: 'Aquarium', x: 540, y: 120, lines: ['Teal'] },
            // t2 = Innovation Hub (o2)
            // t3 = Commerce Sq / Clocktower (p2/y4)
            // t4 = Eastside (r5)
            { id: 't5', name: 'Marina Bay', x: 660, y: 400, lines: ['Teal'] },
            // Pink Line: SW diagonal
            { id: 'pk1', name: 'Rose Garden', x: 200, y: 480, lines: ['Pink'] },
            // pk2 = Old Town (g4)
            // pk3 = South Market (b4)
            { id: 'pk4', name: 'Blossom Hill', x: 460, y: 400, lines: ['Pink'] },
            { id: 'pk5', name: 'Peach Creek', x: 540, y: 480, lines: ['Pink'] }
        ];

        // Build station map
        const stationMap = {};
        stations.forEach(s => stationMap[s.id] = s);

        // Line routes (ordered station IDs)
        const lines = {
            'Red':    ['r1','r2','r3','r4','r5','r6'],
            'Blue':   ['b1','b2','r3','b4','b5'],
            'Green':  ['g1','g2','r3','g4','g5'],
            'Orange': ['o1','o2','r4','o4','o5'],
            'Purple': ['p1','p2','r4','p4','p5'],
            'Yellow': ['y1','b2','g2','y4','y5'],
            'Teal':   ['t1','o2','y4','r5','t5'],
            'Pink':   ['pk1','g4','b4','pk4','pk5']
        };

        // Build adjacency graph
        const graph = {};
        stations.forEach(s => graph[s.id] = new Set());
        Object.values(lines).forEach(route => {
            for (let i = 0; i < route.length - 1; i++) {
                graph[route[i]].add(route[i + 1]);
                graph[route[i + 1]].add(route[i]);
            }
        });

        // BFS shortest path
        function bfs(start, end) {
            if (start === end) return [start];
            const visited = new Set([start]);
            const queue = [[start]];
            while (queue.length) {
                const path = queue.shift();
                const node = path[path.length - 1];
                for (const neighbor of graph[node]) {
                    if (visited.has(neighbor)) continue;
                    const newPath = [...path, neighbor];
                    if (neighbor === end) return newPath;
                    visited.add(neighbor);
                    queue.push(newPath);
                }
            }
            return null;
        }

        // SVG setup
        const svg = document.getElementById('metroSvg');
        const viewport = document.getElementById('viewport');
        const W = 800, H = 640;
        svg.setAttribute('width', W);
        svg.setAttribute('height', H);
        svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

        // Pan & zoom state
        let viewBox = { x: 0, y: 0, w: W, h: H };
        let isPanning = false, panStart = { x: 0, y: 0 }, panVBStart = { x: 0, y: 0 };

        function updateViewBox() {
            svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
        }

        viewport.addEventListener('mousedown', e => {
            if (e.target.classList.contains('station-dot') || e.target.classList.contains('interchange')) return;
            isPanning = true;
            panStart = { x: e.clientX, y: e.clientY };
            panVBStart = { x: viewBox.x, y: viewBox.y };
            viewport.classList.add('grabbing');
        });
        window.addEventListener('mousemove', e => {
            if (!isPanning) return;
            const dx = (e.clientX - panStart.x) * (viewBox.w / viewport.clientWidth);
            const dy = (e.clientY - panStart.y) * (viewBox.h / viewport.clientHeight);
            viewBox.x = panVBStart.x - dx;
            viewBox.y = panVBStart.y - dy;
            updateViewBox();
        });
        window.addEventListener('mouseup', () => {
            isPanning = false;
            viewport.classList.remove('grabbing');
        });
        viewport.addEventListener('wheel', e => {
            e.preventDefault();
            const scale = e.deltaY > 0 ? 1.1 : 0.9;
            const rect = viewport.getBoundingClientRect();
            const mx = (e.clientX - rect.left) / rect.width;
            const my = (e.clientY - rect.top) / rect.height;
            const newW = Math.max(200, Math.min(W * 2, viewBox.w * scale));
            const newH = Math.max(160, Math.min(H * 2, viewBox.h * scale));
            viewBox.x += (viewBox.w - newW) * mx;
            viewBox.y += (viewBox.h - newH) * my;
            viewBox.w = newW;
            viewBox.h = newH;
            updateViewBox();
        }, { passive: false });

        // Draw lines
        const lineGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        svg.appendChild(lineGroup);
        Object.entries(lines).forEach(([lineName, route]) => {
            const points = route.map(id => stationMap[id]);
            let d = `M ${points[0].x} ${points[0].y}`;
            for (let i = 1; i < points.length; i++) {
                const prev = points[i - 1], curr = points[i];
                // Use L for straight segments (h/v/45deg), else route through corners
                if (prev.x === curr.x || prev.y === curr.y) {
                    d += ` L ${curr.x} ${curr.y}`;
                } else {
                    // Route via a corner for clean subway look
                    const dx = curr.x - prev.x, dy = curr.y - prev.y;
                    if (Math.abs(dx) === Math.abs(dy)) {
                        d += ` L ${curr.x} ${curr.y}`;
                    } else if (Math.abs(dx) > Math.abs(dy)) {
                        const midX = prev.x + (dx > 0 ? Math.abs(dy) : -Math.abs(dy)) * (dy > 0 ? 1 : -1) * (dx > 0 ? 1 : 1);
                        d += ` L ${curr.x - (curr.x - prev.x > 0 ? Math.abs(dy) : -Math.abs(dy))} ${curr.y} L ${curr.x} ${curr.y}`;
                    } else {
                        d += ` L ${curr.x} ${curr.y - (curr.y - prev.y > 0 ? Math.abs(dx) : -Math.abs(dx))} L ${curr.x} ${curr.y}`;
                    }
                }
            }
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', d);
            path.classList.add('line-path');
            path.setAttribute('stroke', lineColors[lineName]);
            path.setAttribute('data-line', lineName);
            lineGroup.appendChild(path);
        });

        // Highlight path group
        const highlightGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        svg.appendChild(highlightGroup);

        // Draw stations
        const stationGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        svg.appendChild(stationGroup);
        stations.forEach(s => {
            const isInterchange = s.lines.length > 1;
            const r = isInterchange ? 8 : 5;
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', s.x);
            circle.setAttribute('cy', s.y);
            circle.setAttribute('r', r);
            circle.setAttribute('fill', 'white');
            circle.setAttribute('stroke', isInterchange ? '#333' : lineColors[s.lines[0]]);
            circle.setAttribute('stroke-width', isInterchange ? 2.5 : 2);
            circle.classList.add(isInterchange ? 'interchange' : 'station-dot');
            circle.dataset.id = s.id;
            circle.addEventListener('click', e => {
                e.stopPropagation();
                handleStationClick(s);
            });
            stationGroup.appendChild(circle);

            // Label
            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.classList.add('station-label');
            text.setAttribute('x', s.x + (s.x > 400 ? -5 : 12));
            text.setAttribute('y', s.y - 10);
            text.setAttribute('text-anchor', s.x > 400 ? 'end' : 'start');
            text.textContent = s.name;
            stationGroup.appendChild(text);
        });

        // Station click logic
        let selectedStations = [];
        const infoPanel = document.getElementById('infoPanel');

        function handleStationClick(station) {
            selectedStations.push(station);
            // Highlight selected
            document.querySelectorAll('.station-dot.selected, .interchange.selected').forEach(c => c.classList.remove('selected'));

            if (selectedStations.length === 1) {
                showStationInfo(station);
                const c = stationGroup.querySelector(`[data-id="${station.id}"]`);
                if (c) c.classList.add('selected');
                highlightGroup.innerHTML = '';
            } else if (selectedStations.length >= 2) {
                const from = selectedStations[0], to = selectedStations[1];
                selectedStations = [];
                const path = bfs(from.id, to.id);
                if (path) {
                    showPathInfo(from, to, path);
                    drawHighlightPath(path);
                } else {
                    infoPanel.innerHTML = '<h3>No path found</h3>';
                    infoPanel.style.display = 'block';
                }
            }
        }

        function showStationInfo(s) {
            const lineBadges = s.lines.map(l =>
                `<span class="line-badge" style="background:${lineColors[l]}">${l}</span>`
            ).join('');
            const connections = [];
            graph[s.id].forEach(nId => connections.push(stationMap[nId].name));
            infoPanel.innerHTML = `
                <h3>${s.name}</h3>
                <p><strong>Lines:</strong> ${lineBadges}</p>
                <p><strong>Connections:</strong> ${connections.join(', ')}</p>
                <p style="font-size:0.8rem;color:var(--sage);margin-top:0.5rem;">Click another station to find shortest path</p>
            `;
            infoPanel.style.display = 'block';
        }

        function showPathInfo(from, to, path) {
            const stationNames = path.map(id => stationMap[id].name);
            infoPanel.innerHTML = `
                <h3>Route: ${from.name} &#8594; ${to.name}</h3>
                <p><strong>Stops:</strong> ${path.length - 1}</p>
                <p><strong>Route:</strong> ${stationNames.join(' &#8594; ')}</p>
            `;
            infoPanel.style.display = 'block';
        }

        function drawHighlightPath(path) {
            highlightGroup.innerHTML = '';
            if (path.length < 2) return;
            const points = path.map(id => stationMap[id]);
            let d = `M ${points[0].x} ${points[0].y}`;
            for (let i = 1; i < points.length; i++) {
                d += ` L ${points[i].x} ${points[i].y}`;
            }
            const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            p.classList.add('highlight-path');
            p.setAttribute('d', d);
            highlightGroup.appendChild(p);
        }
    })();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
