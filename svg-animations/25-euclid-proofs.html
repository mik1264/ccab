<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euclidean Constructions - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 1rem;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); margin: 0.5rem 0; }
        .subtitle { color: var(--terracotta); margin-bottom: 0.75rem; }
        .controls {
            display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;
            justify-content: center; margin-bottom: 1rem;
        }
        select, button {
            font-family: 'Nunito', sans-serif; padding: 0.5rem 1rem;
            border: 2px solid var(--sage); background: rgba(255,255,255,0.7);
            color: var(--dark-moss); border-radius: 12px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; transition: all 0.2s;
        }
        button:hover { background: rgba(255,255,255,0.95); border-color: var(--moss); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .step-counter {
            font-weight: 700; color: var(--moss);
            background: rgba(255,255,255,0.7); padding: 0.4rem 1rem; border-radius: 12px;
        }
        .diagram-area {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 30px rgba(138,154,91,0.15);
        }
        .step-text {
            margin-top: 1rem; font-size: 1rem; font-weight: 600;
            color: var(--moss); text-align: center; max-width: 550px; min-height: 2em;
        }
        .draw-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawIn 0.8s ease forwards;
        }
        .draw-arc {
            stroke-dasharray: 500;
            stroke-dashoffset: 500;
            animation: drawIn 1s ease forwards;
        }
        @keyframes drawIn {
            to { stroke-dashoffset: 0; }
        }
        .fade-in {
            opacity: 0;
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Euclidean Constructions</h1>
    <p class="subtitle">Compass and straightedge proofs animated step by step</p>

    <div class="controls">
        <select id="constructionSelect">
            <option value="0">1. Equilateral Triangle</option>
            <option value="1">2. Bisect a Segment</option>
            <option value="2">3. Bisect an Angle</option>
            <option value="3">4. Perpendicular Through Point</option>
            <option value="4">5. Pythagorean Theorem</option>
            <option value="5">6. Regular Hexagon</option>
            <option value="6">7. Golden Ratio</option>
            <option value="7">8. Triangle Angle Sum</option>
        </select>
        <button id="prevBtn" disabled>&#8592; Prev</button>
        <span class="step-counter" id="stepCounter">Step 1 / 4</span>
        <button id="nextBtn">Next &#8594;</button>
    </div>

    <div class="diagram-area">
        <svg id="euclidSvg" width="500" height="400" viewBox="0 0 500 400" role="img">
            <title>Euclidean Construction</title>
            <desc>Step-by-step geometric construction with compass and straightedge</desc>
        </svg>
    </div>
    <div class="step-text" id="stepText"></div>

    <script>
    (function() {
        const svg = document.getElementById('euclidSvg');
        const ns = 'http://www.w3.org/2000/svg';
        const constructionSelect = document.getElementById('constructionSelect');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const stepCounter = document.getElementById('stepCounter');
        const stepText = document.getElementById('stepText');

        const lineColor = '#3d4423';
        const arcColor = '#8A9A5B';
        const highlightColor = '#BC6C25';
        const fillColor = 'rgba(138,154,91,0.15)';
        const pointR = 4;

        function drawLine(x1,y1,x2,y2,color,width,cls) {
            const l = document.createElementNS(ns,'line');
            l.setAttribute('x1',x1); l.setAttribute('y1',y1);
            l.setAttribute('x2',x2); l.setAttribute('y2',y2);
            l.setAttribute('stroke',color||lineColor);
            l.setAttribute('stroke-width',width||1.5);
            if (cls) l.setAttribute('class',cls);
            svg.appendChild(l);
        }

        function drawCircle(cx,cy,r,stroke,fill,cls) {
            const c = document.createElementNS(ns,'circle');
            c.setAttribute('cx',cx); c.setAttribute('cy',cy); c.setAttribute('r',r);
            c.setAttribute('stroke',stroke||arcColor); c.setAttribute('stroke-width','1.5');
            c.setAttribute('fill',fill||'none');
            if (cls) c.setAttribute('class',cls);
            svg.appendChild(c);
        }

        function drawArc(cx,cy,r,startAngle,endAngle,color,cls) {
            const sa = startAngle*Math.PI/180, ea = endAngle*Math.PI/180;
            const x1 = cx+r*Math.cos(sa), y1 = cy+r*Math.sin(sa);
            const x2 = cx+r*Math.cos(ea), y2 = cy+r*Math.sin(ea);
            const largeArc = Math.abs(endAngle-startAngle)>180?1:0;
            const sweep = endAngle>startAngle?1:0;
            const p = document.createElementNS(ns,'path');
            p.setAttribute('d',`M${x1},${y1} A${r},${r} 0 ${largeArc} ${sweep} ${x2},${y2}`);
            p.setAttribute('stroke',color||arcColor);
            p.setAttribute('stroke-width','1.5');
            p.setAttribute('fill','none');
            if (cls) p.setAttribute('class',cls);
            svg.appendChild(p);
        }

        function drawPoint(x,y,label,color) {
            drawCircle(x,y,pointR,color||highlightColor,color||highlightColor);
            if (label) {
                const t = document.createElementNS(ns,'text');
                t.setAttribute('x',x+8); t.setAttribute('y',y-8);
                t.setAttribute('font-size','14'); t.setAttribute('font-weight','700');
                t.setAttribute('fill',color||highlightColor);
                t.setAttribute('font-family','Lora, serif');
                t.setAttribute('class','fade-in');
                t.textContent = label;
                svg.appendChild(t);
            }
        }

        function drawPolygon(points,fill,stroke) {
            const p = document.createElementNS(ns,'polygon');
            p.setAttribute('points',points.map(pt=>pt.join(',')).join(' '));
            p.setAttribute('fill',fill||fillColor);
            p.setAttribute('stroke',stroke||lineColor);
            p.setAttribute('stroke-width','1.5');
            p.setAttribute('class','fade-in');
            svg.appendChild(p);
        }

        function label(x,y,text,color,size) {
            const t = document.createElementNS(ns,'text');
            t.setAttribute('x',x); t.setAttribute('y',y);
            t.setAttribute('text-anchor','middle');
            t.setAttribute('font-size',size||12);
            t.setAttribute('fill',color||'#606C38');
            t.setAttribute('font-family','Nunito, sans-serif');
            t.setAttribute('font-weight','600');
            t.setAttribute('class','fade-in');
            t.textContent = text;
            svg.appendChild(t);
        }

        // Constructions data
        const constructions = [
            // 0: Equilateral Triangle
            {
                name: 'Equilateral Triangle on a Segment',
                steps: [
                    {
                        text: 'Given segment AB.',
                        draw: function() {
                            drawLine(150,300,350,300,lineColor,2,'draw-line');
                            drawPoint(150,300,'A'); drawPoint(350,300,'B');
                        }
                    },
                    {
                        text: 'Draw circle centered at A with radius AB.',
                        draw: function() {
                            drawLine(150,300,350,300,lineColor,2);
                            drawPoint(150,300,'A'); drawPoint(350,300,'B');
                            drawCircle(150,300,200,arcColor,null,'draw-arc');
                        }
                    },
                    {
                        text: 'Draw circle centered at B with radius BA.',
                        draw: function() {
                            drawLine(150,300,350,300,lineColor,2);
                            drawPoint(150,300,'A'); drawPoint(350,300,'B');
                            drawCircle(150,300,200,'rgba(138,154,91,0.3)');
                            drawCircle(350,300,200,arcColor,null,'draw-arc');
                        }
                    },
                    {
                        text: 'The circles intersect at C. Triangle ABC is equilateral.',
                        draw: function() {
                            const cx = 250, cy = 300 - Math.sqrt(200*200-100*100);
                            drawCircle(150,300,200,'rgba(138,154,91,0.2)');
                            drawCircle(350,300,200,'rgba(138,154,91,0.2)');
                            drawPolygon([[150,300],[350,300],[cx,cy]]);
                            drawLine(150,300,350,300,lineColor,2);
                            drawLine(150,300,cx,cy,highlightColor,2,'draw-line');
                            drawLine(350,300,cx,cy,highlightColor,2,'draw-line');
                            drawPoint(150,300,'A'); drawPoint(350,300,'B');
                            drawPoint(cx,cy,'C');
                        }
                    }
                ]
            },
            // 1: Bisect Segment
            {
                name: 'Bisect a Line Segment',
                steps: [
                    {
                        text: 'Given segment AB.',
                        draw: function() {
                            drawLine(100,250,400,250,lineColor,2,'draw-line');
                            drawPoint(100,250,'A'); drawPoint(400,250,'B');
                        }
                    },
                    {
                        text: 'Draw arcs from A and B with radius > half of AB.',
                        draw: function() {
                            drawLine(100,250,400,250,lineColor,2);
                            drawPoint(100,250,'A'); drawPoint(400,250,'B');
                            drawArc(100,250,220,-60,60,arcColor,'draw-arc');
                            drawArc(400,250,220,120,240,arcColor,'draw-arc');
                        }
                    },
                    {
                        text: 'Arcs intersect at C and D. Line CD bisects AB at M.',
                        draw: function() {
                            drawLine(100,250,400,250,lineColor,2);
                            // Intersection points
                            const d = 300; // AB distance
                            const r = 220;
                            const h = Math.sqrt(r*r - (d/2)*(d/2));
                            const mx = 250, top = 250-h, bot = 250+h;
                            drawArc(100,250,220,-60,60,'rgba(138,154,91,0.3)');
                            drawArc(400,250,220,120,240,'rgba(138,154,91,0.3)');
                            drawLine(mx,top,mx,bot,highlightColor,2,'draw-line');
                            drawPoint(100,250,'A'); drawPoint(400,250,'B');
                            drawPoint(mx,top,'C'); drawPoint(mx,bot,'D');
                            drawPoint(mx,250,'M',highlightColor);
                            label(mx,245,'Midpoint');
                        }
                    }
                ]
            },
            // 2: Bisect Angle
            {
                name: 'Bisect an Angle',
                steps: [
                    {
                        text: 'Given angle BAC.',
                        draw: function() {
                            drawLine(100,300,400,300,lineColor,2,'draw-line');
                            drawLine(100,300,350,100,lineColor,2,'draw-line');
                            drawPoint(100,300,'A'); drawPoint(400,300,'B'); drawPoint(350,100,'C');
                        }
                    },
                    {
                        text: 'Draw arc from A intersecting both rays at D and E.',
                        draw: function() {
                            drawLine(100,300,400,300,lineColor,2);
                            drawLine(100,300,350,100,lineColor,2);
                            drawArc(100,300,150,-40,0,arcColor,'draw-arc');
                            const dx = 100+150, dy = 300;
                            const angle = Math.atan2(100-300,350-100);
                            const ex = 100+150*Math.cos(angle), ey = 300+150*Math.sin(angle);
                            drawPoint(100,300,'A'); drawPoint(dx,dy,'D'); drawPoint(ex,ey,'E');
                        }
                    },
                    {
                        text: 'Draw arcs from D and E. Their intersection F defines the bisector.',
                        draw: function() {
                            drawLine(100,300,400,300,lineColor,2);
                            drawLine(100,300,350,100,lineColor,2);
                            const dx = 250, dy = 300;
                            const angle = Math.atan2(100-300,350-100);
                            const ex = 100+150*Math.cos(angle), ey = 300+150*Math.sin(angle);
                            // Bisector direction
                            const bisAngle = (0+angle)/2;
                            const fx = 100+200*Math.cos(bisAngle), fy = 300+200*Math.sin(bisAngle);
                            drawArc(dx,dy,100,-120,-60,arcColor,'draw-arc');
                            drawArc(ex,ey,100,-20,40,arcColor,'draw-arc');
                            drawLine(100,300,fx,fy,highlightColor,2,'draw-line');
                            drawPoint(100,300,'A');
                            drawPoint(fx,fy,'F');
                            label(fx+15,fy-10,'Bisector');
                        }
                    }
                ]
            },
            // 3: Perpendicular
            {
                name: 'Perpendicular Through a Point',
                steps: [
                    {
                        text: 'Given line l and point P not on l.',
                        draw: function() {
                            drawLine(50,300,450,300,lineColor,2,'draw-line');
                            drawPoint(250,150,'P');
                            label(460,300,'l');
                        }
                    },
                    {
                        text: 'Draw arc from P intersecting l at A and B.',
                        draw: function() {
                            drawLine(50,300,450,300,lineColor,2);
                            drawPoint(250,150,'P');
                            drawArc(250,150,180,20,160,arcColor,'draw-arc');
                            drawPoint(150,300,'A'); drawPoint(350,300,'B');
                        }
                    },
                    {
                        text: 'Draw arcs from A and B below l. They meet at Q.',
                        draw: function() {
                            drawLine(50,300,450,300,lineColor,2);
                            drawPoint(250,150,'P');
                            drawArc(150,300,200,30,90,'rgba(138,154,91,0.3)');
                            drawArc(350,300,200,90,150,'rgba(138,154,91,0.3)');
                            drawPoint(150,300,'A'); drawPoint(350,300,'B');
                            drawPoint(250,300+Math.sqrt(200*200-100*100),'Q');
                        }
                    },
                    {
                        text: 'Line PQ is perpendicular to l.',
                        draw: function() {
                            drawLine(50,300,450,300,lineColor,2);
                            const qy = 300+Math.sqrt(200*200-100*100);
                            drawLine(250,100,250,qy,highlightColor,2,'draw-line');
                            drawPoint(250,150,'P'); drawPoint(250,300,'',highlightColor);
                            // Right angle mark
                            drawLine(250,300,265,300,'#606C38',1);
                            drawLine(265,300,265,285,'#606C38',1);
                            label(270,290,'90\u00B0');
                        }
                    }
                ]
            },
            // 4: Pythagorean Theorem
            {
                name: 'Pythagorean Theorem',
                steps: [
                    {
                        text: 'Given right triangle with legs a and b, hypotenuse c.',
                        draw: function() {
                            drawPolygon([[100,350],[350,350],[100,200]],'rgba(138,154,91,0.1)');
                            drawLine(100,350,350,350,lineColor,2);
                            drawLine(100,200,100,350,lineColor,2);
                            drawLine(100,200,350,350,lineColor,2);
                            drawLine(100,335,115,335,'#606C38',1);
                            drawLine(115,335,115,350,'#606C38',1);
                            drawPoint(100,350,'A'); drawPoint(350,350,'B'); drawPoint(100,200,'C');
                            label(225,370,'a = 250');
                            label(80,275,'b = 150');
                            label(240,260,'c');
                        }
                    },
                    {
                        text: 'Construct square on side a (bottom).',
                        draw: function() {
                            drawPolygon([[100,350],[350,350],[100,200]],'rgba(138,154,91,0.05)');
                            drawPolygon([[100,350],[350,350],[350,600],[100,600]],'rgba(221,161,94,0.2)','#DDA15E');
                            drawLine(100,200,100,350,lineColor,2);
                            drawLine(100,200,350,350,lineColor,2);
                            label(225,490,'a\u00B2','#BC6C25',16);
                        }
                    },
                    {
                        text: 'Construct square on side b (left).',
                        draw: function() {
                            drawPolygon([[100,350],[350,350],[100,200]],'rgba(138,154,91,0.05)');
                            drawPolygon([[100,350],[350,350],[350,600],[100,600]],'rgba(221,161,94,0.15)','#DDA15E');
                            drawPolygon([[100,200],[100,350],[-50,350],[-50,200]],'rgba(138,154,91,0.2)','#8A9A5B');
                            drawLine(100,200,350,350,lineColor,2);
                            label(225,490,'a\u00B2','#BC6C25',14);
                            label(25,280,'b\u00B2','#606C38',14);
                        }
                    },
                    {
                        text: 'Construct square on hypotenuse c. Area c\u00B2 = a\u00B2 + b\u00B2.',
                        draw: function() {
                            drawPolygon([[100,350],[350,350],[350,600],[100,600]],'rgba(221,161,94,0.1)','rgba(221,161,94,0.5)');
                            drawPolygon([[100,200],[100,350],[-50,350],[-50,200]],'rgba(138,154,91,0.1)','rgba(138,154,91,0.5)');
                            // Square on hypotenuse
                            const dx = 350-100, dy = 350-200;
                            const px = 350+dy, py = 200-dx;  // Approximate
                            const qx = 100+dy, qy = 200-dx;  // Approximate
                            drawPolygon([[100,200],[350,350],[px,py],[qx,qy]],'rgba(188,108,37,0.2)','#BC6C25');
                            drawPolygon([[100,350],[350,350],[100,200]],'rgba(138,154,91,0.1)',lineColor);
                            label(280,160,'c\u00B2','#BC6C25',16);
                            label(250,390,'a\u00B2 + b\u00B2 = c\u00B2','#3d4423',14);
                        }
                    }
                ]
            },
            // 5: Regular Hexagon
            {
                name: 'Regular Hexagon in a Circle',
                steps: [
                    {
                        text: 'Draw circle with center O and radius r.',
                        draw: function() {
                            drawCircle(250,220,130,arcColor,null,'draw-arc');
                            drawPoint(250,220,'O');
                            drawPoint(380,220,'A');
                        }
                    },
                    {
                        text: 'Mark point A. Step off radius around circle 6 times.',
                        draw: function() {
                            drawCircle(250,220,130,'rgba(138,154,91,0.3)');
                            const r = 130;
                            for (let i = 0; i < 6; i++) {
                                const a = i*60*Math.PI/180;
                                const x = 250+r*Math.cos(a), y = 220-r*Math.sin(a);
                                drawPoint(x,y,String.fromCharCode(65+i));
                                // Compass arc hint
                                if (i < 5) {
                                    const na = (i+1)*60*Math.PI/180;
                                    drawArc(x,220-r*Math.sin(i*60*Math.PI/180)+y-220+r*Math.sin(i*60*Math.PI/180),r,
                                        -((i+1)*60+10), -(i*60-10), 'rgba(138,154,91,0.15)');
                                }
                            }
                            drawPoint(250,220,'O');
                        }
                    },
                    {
                        text: 'Connect consecutive points to form the regular hexagon.',
                        draw: function() {
                            drawCircle(250,220,130,'rgba(138,154,91,0.2)');
                            const r = 130;
                            const pts = [];
                            for (let i = 0; i < 6; i++) {
                                const a = i*60*Math.PI/180;
                                pts.push([250+r*Math.cos(a), 220-r*Math.sin(a)]);
                            }
                            drawPolygon(pts, fillColor, highlightColor);
                            pts.forEach((p,i) => drawPoint(p[0],p[1],String.fromCharCode(65+i)));
                            drawPoint(250,220,'O');
                            label(250,380,'All sides = radius');
                        }
                    }
                ]
            },
            // 6: Golden Ratio
            {
                name: 'Golden Ratio Construction',
                steps: [
                    {
                        text: 'Draw unit segment AB. Construct perpendicular at B of length AB/2.',
                        draw: function() {
                            drawLine(100,300,300,300,lineColor,2,'draw-line');
                            drawLine(300,300,300,200,lineColor,2,'draw-line');
                            drawPoint(100,300,'A'); drawPoint(300,300,'B'); drawPoint(300,200,'C');
                            label(200,320,'1 (unit)');
                            label(315,250,'1/2');
                            drawLine(300,285,315,285,'#606C38',1);
                            drawLine(315,285,315,300,'#606C38',1);
                        }
                    },
                    {
                        text: 'Draw line AC (hypotenuse).',
                        draw: function() {
                            drawLine(100,300,300,300,lineColor,2);
                            drawLine(300,300,300,200,lineColor,2);
                            drawLine(100,300,300,200,highlightColor,2,'draw-line');
                            drawPoint(100,300,'A'); drawPoint(300,300,'B'); drawPoint(300,200,'C');
                            const hyp = Math.sqrt(200*200+100*100);
                            label(180,240,'\u221A5/2','#BC6C25');
                        }
                    },
                    {
                        text: 'Arc from C with radius CB intersects AC at D. Then AD = golden ratio.',
                        draw: function() {
                            drawLine(100,300,300,300,lineColor,2);
                            drawLine(300,300,300,200,lineColor,2);
                            drawLine(100,300,300,200,lineColor,1.5);
                            drawArc(300,200,100,60,120,arcColor,'draw-arc');
                            // D is on line AC at distance (hyp - CB) from A
                            const hyp = Math.sqrt(200*200+100*100);
                            const cb = 100;
                            const ad = hyp - cb;
                            const ratio = ad/200; // relative to AB=200px
                            const dx = 100+(300-100)*ad/hyp;
                            const dy = 300+(200-300)*ad/hyp;
                            drawPoint(dx,dy,'D');
                            drawPoint(100,300,'A'); drawPoint(300,300,'B'); drawPoint(300,200,'C');
                            // Mark golden segment
                            drawLine(100,300,dx,dy,highlightColor,3,'draw-line');
                            label(250,370,`AD/AB = \u03C6 \u2248 ${(ad/200).toFixed(4)}`,'#BC6C25',14);
                            label(250,390,'Golden Ratio \u2248 1.618','#606C38',12);
                        }
                    }
                ]
            },
            // 7: Triangle Angle Sum
            {
                name: 'Sum of Angles in Triangle = 180\u00B0',
                steps: [
                    {
                        text: 'Given triangle ABC with angles \u03B1, \u03B2, \u03B3.',
                        draw: function() {
                            drawPolygon([[100,350],[400,350],[250,130]],'rgba(138,154,91,0.1)');
                            drawLine(100,350,400,350,lineColor,2);
                            drawLine(400,350,250,130,lineColor,2);
                            drawLine(250,130,100,350,lineColor,2);
                            drawPoint(100,350,'A'); drawPoint(400,350,'B'); drawPoint(250,130,'C');
                            drawArc(100,350,30,-50,0,'#BC6C25');
                            drawArc(400,350,30,180,220,'#606C38');
                            drawArc(250,130,30,55,125,'#8A9A5B');
                            label(135,335,'\u03B1','#BC6C25',14);
                            label(370,335,'\u03B2','#606C38',14);
                            label(250,170,'\u03B3','#8A9A5B',14);
                        }
                    },
                    {
                        text: 'Draw line through C parallel to AB.',
                        draw: function() {
                            drawPolygon([[100,350],[400,350],[250,130]],'rgba(138,154,91,0.05)');
                            drawLine(100,350,400,350,lineColor,2);
                            drawLine(400,350,250,130,lineColor,2);
                            drawLine(250,130,100,350,lineColor,2);
                            // Parallel line through C
                            drawLine(50,130,450,130,highlightColor,2,'draw-line');
                            drawPoint(100,350,'A'); drawPoint(400,350,'B'); drawPoint(250,130,'C');
                            label(460,128,'l \u2225 AB','#BC6C25');
                        }
                    },
                    {
                        text: 'Alternate interior angles: \u03B1\' = \u03B1 and \u03B2\' = \u03B2 along the parallel line.',
                        draw: function() {
                            drawLine(100,350,400,350,lineColor,2);
                            drawLine(400,350,250,130,lineColor,2);
                            drawLine(250,130,100,350,lineColor,2);
                            drawLine(50,130,450,130,highlightColor,1.5);
                            // Angles at C on the parallel line
                            drawArc(250,130,35,0,55,'#BC6C25');
                            drawArc(250,130,35,55,125,'#8A9A5B');
                            drawArc(250,130,35,125,180,'#606C38');
                            label(295,140,'\u03B1\'','#BC6C25',12);
                            label(250,105,'\u03B3','#8A9A5B',12);
                            label(205,140,'\u03B2\'','#606C38',12);
                            drawPoint(100,350,'A'); drawPoint(400,350,'B'); drawPoint(250,130,'C');
                        }
                    },
                    {
                        text: '\u03B1 + \u03B2 + \u03B3 form a straight line = 180\u00B0. QED.',
                        draw: function() {
                            drawLine(100,350,400,350,lineColor,1.5);
                            drawLine(400,350,250,130,lineColor,1.5);
                            drawLine(250,130,100,350,lineColor,1.5);
                            drawLine(50,130,450,130,highlightColor,2);
                            // Color the three angles on the line
                            drawArc(250,130,40,0,55,'#BC6C25');
                            drawArc(250,130,40,55,125,'#8A9A5B');
                            drawArc(250,130,40,125,180,'#606C38');
                            drawPoint(250,130,'C');
                            label(250,85,'\u03B1 + \u03B3 + \u03B2 = 180\u00B0','#3d4423',16);
                            label(250,390,'The three angles together form a straight angle.','#606C38',13);
                        }
                    }
                ]
            }
        ];

        let currentConstruction = 0;
        let currentStep = 0;

        function render() {
            svg.innerHTML = '';
            const c = constructions[currentConstruction];
            const step = c.steps[currentStep];
            step.draw();
            stepText.textContent = step.text;
            stepCounter.textContent = `Step ${currentStep+1} / ${c.steps.length}`;
            prevBtn.disabled = currentStep === 0;
            nextBtn.disabled = currentStep === c.steps.length - 1;
        }

        constructionSelect.addEventListener('change', () => {
            currentConstruction = parseInt(constructionSelect.value);
            currentStep = 0;
            render();
        });

        prevBtn.addEventListener('click', () => {
            if (currentStep > 0) { currentStep--; render(); }
        });

        nextBtn.addEventListener('click', () => {
            if (currentStep < constructions[currentConstruction].steps.length - 1) { currentStep++; render(); }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentStep > 0) { currentStep--; render(); }
            if (e.key === 'ArrowRight' && currentStep < constructions[currentConstruction].steps.length - 1) { currentStep++; render(); }
        });

        render();
    })();
    </script>
</body>
</html>
