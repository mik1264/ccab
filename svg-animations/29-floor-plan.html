<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floor Plan Viewer - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 1rem;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); margin: 0.5rem 0; }
        .subtitle { color: var(--terracotta); margin-bottom: 0.75rem; }
        .controls {
            display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;
            justify-content: center; margin-bottom: 1rem;
        }
        .layer-toggles { display: flex; gap: 0.5rem; }
        .layer-toggles button {
            font-family: 'Nunito', sans-serif; padding: 0.4rem 0.9rem;
            border: 2px solid var(--sage); background: rgba(255,255,255,0.7);
            color: var(--dark-moss); border-radius: 10px; cursor: pointer;
            font-weight: 600; font-size: 0.8rem; transition: all 0.2s;
        }
        .layer-toggles button:hover { background: rgba(255,255,255,0.95); }
        .layer-toggles button.active { background: var(--sage); color: white; }
        .plan-area {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 30px rgba(138,154,91,0.15);
        }
        .info-panel {
            margin-top: 1rem; padding: 0.75rem 1.25rem;
            background: rgba(255,255,255,0.7);
            border-radius: 12px; font-size: 0.9rem;
            min-height: 3em; max-width: 500px; text-align: center;
        }
        .info-panel strong { color: var(--moss); }
        .room-rect { cursor: pointer; transition: fill 0.2s; }
        .room-rect:hover { filter: brightness(1.1); }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Floor Plan</h1>
    <p class="subtitle">Interactive apartment layout with overlay layers</p>

    <div class="controls">
        <div class="layer-toggles">
            <button class="active" data-layer="base">Rooms</button>
            <button data-layer="electrical">Electrical</button>
            <button data-layer="plumbing">Plumbing</button>
            <button data-layer="structural">Structural</button>
        </div>
    </div>

    <div class="plan-area">
        <svg id="planSvg" width="750" height="500" viewBox="0 0 750 500" role="img">
            <title>Apartment Floor Plan</title>
            <desc>Floor plan of a fictional apartment with 8 rooms and overlay layers</desc>
        </svg>
    </div>
    <div class="info-panel" id="infoPanel">Hover over a room. Click for details.</div>

    <script>
    (function() {
        const svg = document.getElementById('planSvg');
        const ns = 'http://www.w3.org/2000/svg';
        const infoPanel = document.getElementById('infoPanel');

        // Rooms: x, y, w, h in SVG units (approx 1 unit = 0.1m for display)
        const rooms = [
            { name: 'Living Room', x: 30, y: 30, w: 260, h: 200, area: '28 m\u00B2', dims: '5.6m \u00D7 5.0m', color: '#e8e6d0', furniture: 'Sofa, TV stand, bookshelf, coffee table' },
            { name: 'Kitchen', x: 290, y: 30, w: 180, h: 120, area: '12 m\u00B2', dims: '3.6m \u00D7 3.3m', color: '#d4dfc4', furniture: 'Countertop, oven, refrigerator, dining table' },
            { name: 'Master Bedroom', x: 30, y: 280, w: 200, h: 180, area: '20 m\u00B2', dims: '4.0m \u00D7 5.0m', color: '#d0d8e8', furniture: 'Queen bed, wardrobe, nightstands, dresser' },
            { name: 'Bedroom 2', x: 290, y: 200, w: 180, h: 140, area: '14 m\u00B2', dims: '3.6m \u00D7 3.9m', color: '#d8d0e8', furniture: 'Single bed, desk, bookshelf' },
            { name: 'Bathroom 1', x: 470, y: 30, w: 120, h: 120, area: '6 m\u00B2', dims: '2.4m \u00D7 2.5m', color: '#c4dfe4', furniture: 'Shower, sink, toilet' },
            { name: 'Bathroom 2', x: 470, y: 200, w: 120, h: 140, area: '8 m\u00B2', dims: '2.4m \u00D7 3.3m', color: '#c4dfe4', furniture: 'Bathtub, sink, toilet, cabinet' },
            { name: 'Hallway', x: 230, y: 230, w: 60, h: 230, area: '7 m\u00B2', dims: '1.2m \u00D7 5.8m', color: '#e0ddd0', furniture: 'Coat hooks, shoe rack' },
            { name: 'Storage', x: 590, y: 30, w: 100, h: 120, area: '4 m\u00B2', dims: '2.0m \u00D7 2.0m', color: '#ddd8c8', furniture: 'Shelving units' }
        ];

        const wallWidth = 6;
        const layers = { base: true, electrical: false, plumbing: false, structural: false };

        // Door data: [x, y, orientation, swing direction]
        const doors = [
            { x: 200, y: 230, orient: 'h', swing: 'up' },     // Living->Hallway
            { x: 290, y: 80, orient: 'v', swing: 'right' },    // Living->Kitchen
            { x: 260, y: 300, orient: 'v', swing: 'right' },   // Hallway->Bedroom2
            { x: 230, y: 350, orient: 'v', swing: 'left' },    // Hallway->Master
            { x: 470, y: 80, orient: 'v', swing: 'right' },    // Kitchen->Bath1
            { x: 470, y: 280, orient: 'v', swing: 'right' },   // Bedroom2->Bath2
            { x: 560, y: 150, orient: 'h', swing: 'down' },    // Bath1->Storage
        ];

        // Window data
        const windows = [
            { x1: 60, y1: 30, x2: 130, y2: 30 },    // Living top
            { x1: 30, y1: 100, x2: 30, y2: 170 },    // Living left
            { x1: 360, y1: 30, x2: 430, y2: 30 },    // Kitchen top
            { x1: 60, y1: 460, x2: 130, y2: 460 },   // Master bottom
            { x1: 330, y1: 340, x2: 420, y2: 340 },   // Bedroom2 bottom
        ];

        function draw() {
            svg.innerHTML = '';

            // Outer walls
            const outer = document.createElementNS(ns, 'rect');
            outer.setAttribute('x', 25); outer.setAttribute('y', 25);
            outer.setAttribute('width', 670); outer.setAttribute('height', 440);
            outer.setAttribute('fill', 'none');
            outer.setAttribute('stroke', '#3d4423');
            outer.setAttribute('stroke-width', wallWidth + 2);
            outer.setAttribute('rx', 3);
            svg.appendChild(outer);

            // Rooms
            rooms.forEach((room, i) => {
                const g = document.createElementNS(ns, 'g');

                const rect = document.createElementNS(ns, 'rect');
                rect.setAttribute('x', room.x); rect.setAttribute('y', room.y);
                rect.setAttribute('width', room.w); rect.setAttribute('height', room.h);
                rect.setAttribute('fill', room.color);
                rect.setAttribute('stroke', '#3d4423');
                rect.setAttribute('stroke-width', wallWidth);
                rect.setAttribute('rx', 2);
                rect.setAttribute('class', 'room-rect');
                g.appendChild(rect);

                // Room label
                const label = document.createElementNS(ns, 'text');
                label.setAttribute('x', room.x + room.w / 2);
                label.setAttribute('y', room.y + room.h / 2);
                label.setAttribute('text-anchor', 'middle');
                label.setAttribute('font-size', room.w < 80 ? '9' : '12');
                label.setAttribute('font-weight', '700');
                label.setAttribute('fill', '#3d4423');
                label.setAttribute('font-family', 'Nunito, sans-serif');
                label.setAttribute('pointer-events', 'none');
                label.textContent = room.name;
                g.appendChild(label);

                // Area text
                const areaText = document.createElementNS(ns, 'text');
                areaText.setAttribute('x', room.x + room.w / 2);
                areaText.setAttribute('y', room.y + room.h / 2 + 16);
                areaText.setAttribute('text-anchor', 'middle');
                areaText.setAttribute('font-size', '10');
                areaText.setAttribute('fill', '#8A9A5B');
                areaText.setAttribute('font-family', 'Nunito, sans-serif');
                areaText.setAttribute('pointer-events', 'none');
                areaText.textContent = room.area;
                g.appendChild(areaText);

                // Interactions
                rect.addEventListener('mouseenter', () => {
                    rect.setAttribute('fill', adjustColor(room.color, 15));
                    infoPanel.innerHTML = `<strong>${room.name}</strong> &mdash; ${room.area} (${room.dims})`;
                });
                rect.addEventListener('mouseleave', () => {
                    rect.setAttribute('fill', room.color);
                });
                rect.addEventListener('click', () => {
                    infoPanel.innerHTML = `<strong>${room.name}</strong> &mdash; ${room.area} (${room.dims})<br>Suggested: ${room.furniture}`;
                });

                svg.appendChild(g);
            });

            // Doors (quarter-circle arcs)
            doors.forEach(door => {
                const doorWidth = 30;
                const g = document.createElementNS(ns, 'g');

                // Clear wall for door opening
                const clear = document.createElementNS(ns, 'rect');
                if (door.orient === 'h') {
                    clear.setAttribute('x', door.x - doorWidth/2);
                    clear.setAttribute('y', door.y - wallWidth/2 - 1);
                    clear.setAttribute('width', doorWidth);
                    clear.setAttribute('height', wallWidth + 2);
                } else {
                    clear.setAttribute('x', door.x - wallWidth/2 - 1);
                    clear.setAttribute('y', door.y - doorWidth/2);
                    clear.setAttribute('width', wallWidth + 2);
                    clear.setAttribute('height', doorWidth);
                }
                clear.setAttribute('fill', '#FEFAE0');
                g.appendChild(clear);

                // Door arc
                let startAngle, endAngle, cx, cy;
                if (door.orient === 'h') {
                    cx = door.x - doorWidth/2;
                    cy = door.y;
                    startAngle = door.swing === 'up' ? -90 : 0;
                    endAngle = startAngle + 90;
                } else {
                    cx = door.x;
                    cy = door.y - doorWidth/2;
                    startAngle = door.swing === 'right' ? 0 : 90;
                    endAngle = startAngle + 90;
                }

                const sa = startAngle * Math.PI / 180;
                const ea = endAngle * Math.PI / 180;
                const x1 = cx + doorWidth * Math.cos(sa);
                const y1 = cy + doorWidth * Math.sin(sa);
                const x2 = cx + doorWidth * Math.cos(ea);
                const y2 = cy + doorWidth * Math.sin(ea);

                const arc = document.createElementNS(ns, 'path');
                arc.setAttribute('d', `M${cx},${cy} L${x1},${y1} A${doorWidth},${doorWidth} 0 0 1 ${x2},${y2} Z`);
                arc.setAttribute('fill', 'rgba(138,154,91,0.1)');
                arc.setAttribute('stroke', '#8A9A5B');
                arc.setAttribute('stroke-width', '1');
                g.appendChild(arc);

                svg.appendChild(g);
            });

            // Windows
            windows.forEach(win => {
                const g = document.createElementNS(ns, 'g');

                // Double line for window
                const dx = win.x2 - win.x1;
                const dy = win.y2 - win.y1;
                const len = Math.sqrt(dx*dx + dy*dy);
                const nx = -dy / len * 3;
                const ny = dx / len * 3;

                const line1 = document.createElementNS(ns, 'line');
                line1.setAttribute('x1', win.x1 + nx); line1.setAttribute('y1', win.y1 + ny);
                line1.setAttribute('x2', win.x2 + nx); line1.setAttribute('y2', win.y2 + ny);
                line1.setAttribute('stroke', '#4a90d9');
                line1.setAttribute('stroke-width', '2');
                g.appendChild(line1);

                const line2 = document.createElementNS(ns, 'line');
                line2.setAttribute('x1', win.x1 - nx); line2.setAttribute('y1', win.y1 - ny);
                line2.setAttribute('x2', win.x2 - nx); line2.setAttribute('y2', win.y2 - ny);
                line2.setAttribute('stroke', '#4a90d9');
                line2.setAttribute('stroke-width', '2');
                g.appendChild(line2);

                svg.appendChild(g);
            });

            // Scale bar
            const scaleG = document.createElementNS(ns, 'g');
            const scaleX = 600, scaleY = 475;
            const scaleLen = 100; // = 2m at our scale
            const line = document.createElementNS(ns, 'line');
            line.setAttribute('x1', scaleX); line.setAttribute('y1', scaleY);
            line.setAttribute('x2', scaleX + scaleLen); line.setAttribute('y2', scaleY);
            line.setAttribute('stroke', '#3d4423'); line.setAttribute('stroke-width', '2');
            scaleG.appendChild(line);
            // End caps
            [[scaleX, -5, 5], [scaleX + scaleLen, -5, 5]].forEach(([x, dy1, dy2]) => {
                const cap = document.createElementNS(ns, 'line');
                cap.setAttribute('x1', x); cap.setAttribute('y1', scaleY + dy1);
                cap.setAttribute('x2', x); cap.setAttribute('y2', scaleY + dy2);
                cap.setAttribute('stroke', '#3d4423'); cap.setAttribute('stroke-width', '2');
                scaleG.appendChild(cap);
            });
            const scaleTxt = document.createElementNS(ns, 'text');
            scaleTxt.setAttribute('x', scaleX + scaleLen / 2);
            scaleTxt.setAttribute('y', scaleY - 8);
            scaleTxt.setAttribute('text-anchor', 'middle');
            scaleTxt.setAttribute('font-size', '10');
            scaleTxt.setAttribute('fill', '#3d4423');
            scaleTxt.setAttribute('font-family', 'Nunito, sans-serif');
            scaleTxt.textContent = '2 m';
            scaleG.appendChild(scaleTxt);
            svg.appendChild(scaleG);

            // Overlay layers
            if (layers.electrical) drawElectrical();
            if (layers.plumbing) drawPlumbing();
            if (layers.structural) drawStructural();
        }

        function drawElectrical() {
            const g = document.createElementNS(ns, 'g');
            // Outlets (small rectangles)
            const outlets = [
                [60, 220], [180, 220], [120, 40], // Living room
                [300, 140], [440, 140], // Kitchen
                [60, 450], [180, 450], // Master
                [300, 330], [430, 330], // Bedroom 2
                [500, 140], // Bath 1
            ];
            outlets.forEach(([x, y]) => {
                const r = document.createElementNS(ns, 'rect');
                r.setAttribute('x', x - 5); r.setAttribute('y', y - 3);
                r.setAttribute('width', 10); r.setAttribute('height', 6);
                r.setAttribute('fill', '#e8a030'); r.setAttribute('stroke', '#c07020');
                r.setAttribute('stroke-width', '1'); r.setAttribute('rx', 1);
                g.appendChild(r);
            });
            // Switches (circles with line)
            const switches = [[55, 230], [280, 230], [265, 345], [235, 395], [465, 70]];
            switches.forEach(([x, y]) => {
                const c = document.createElementNS(ns, 'circle');
                c.setAttribute('cx', x); c.setAttribute('cy', y);
                c.setAttribute('r', 5); c.setAttribute('fill', 'none');
                c.setAttribute('stroke', '#e8a030'); c.setAttribute('stroke-width', '1.5');
                g.appendChild(c);
                const l = document.createElementNS(ns, 'line');
                l.setAttribute('x1', x); l.setAttribute('y1', y - 5);
                l.setAttribute('x2', x); l.setAttribute('y2', y + 5);
                l.setAttribute('stroke', '#e8a030'); l.setAttribute('stroke-width', '1.5');
                g.appendChild(l);
            });
            svg.appendChild(g);
        }

        function drawPlumbing() {
            const g = document.createElementNS(ns, 'g');
            // Pipe runs (dashed lines in blue)
            const pipes = [
                [[350, 150], [350, 30], [470, 30], [470, 90]], // Kitchen to Bath1
                [[470, 140], [470, 200], [470, 280]], // Bath1 to Bath2
                [[350, 150], [290, 150], [290, 200]], // Kitchen down
            ];
            pipes.forEach(points => {
                let d = `M${points[0][0]},${points[0][1]}`;
                for (let i = 1; i < points.length; i++) {
                    d += ` L${points[i][0]},${points[i][1]}`;
                }
                const path = document.createElementNS(ns, 'path');
                path.setAttribute('d', d);
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke', '#4a90d9');
                path.setAttribute('stroke-width', '2');
                path.setAttribute('stroke-dasharray', '8,4');
                g.appendChild(path);
            });
            svg.appendChild(g);
        }

        function drawStructural() {
            const g = document.createElementNS(ns, 'g');
            // Load-bearing walls (highlighted thick red)
            const lbWalls = [
                [25, 25, 695, 25],     // Top outer
                [25, 25, 25, 465],     // Left outer
                [25, 465, 695, 465],   // Bottom outer
                [695, 25, 695, 465],   // Right outer
                [25, 230, 230, 230],   // Horizontal divider
                [290, 150, 470, 150],  // Kitchen bottom
            ];
            lbWalls.forEach(([x1, y1, x2, y2]) => {
                const line = document.createElementNS(ns, 'line');
                line.setAttribute('x1', x1); line.setAttribute('y1', y1);
                line.setAttribute('x2', x2); line.setAttribute('y2', y2);
                line.setAttribute('stroke', 'rgba(200,50,50,0.4)');
                line.setAttribute('stroke-width', '8');
                line.setAttribute('stroke-linecap', 'round');
                g.appendChild(line);
            });
            // Legend
            const lt = document.createElementNS(ns, 'text');
            lt.setAttribute('x', 30); lt.setAttribute('y', 490);
            lt.setAttribute('font-size', '10'); lt.setAttribute('fill', 'rgba(200,50,50,0.7)');
            lt.setAttribute('font-family', 'Nunito, sans-serif'); lt.setAttribute('font-weight', '600');
            lt.textContent = 'Red = Load-bearing walls';
            g.appendChild(lt);
            svg.appendChild(g);
        }

        function adjustColor(hex, amount) {
            // Simple brightness adjustment
            const c = hex.replace('#', '');
            const r = Math.min(255, parseInt(c.substr(0,2),16) + amount);
            const g = Math.min(255, parseInt(c.substr(2,2),16) + amount);
            const b = Math.min(255, parseInt(c.substr(4,2),16) + amount);
            return `rgb(${r},${g},${b})`;
        }

        // Layer toggle buttons
        document.querySelectorAll('.layer-toggles button').forEach(btn => {
            btn.addEventListener('click', () => {
                const layer = btn.dataset.layer;
                if (layer === 'base') {
                    // Base is always on, clicking resets others
                    Object.keys(layers).forEach(k => { if (k !== 'base') layers[k] = false; });
                    document.querySelectorAll('.layer-toggles button').forEach(b => {
                        b.classList.toggle('active', b.dataset.layer === 'base');
                    });
                } else {
                    layers[layer] = !layers[layer];
                    btn.classList.toggle('active', layers[layer]);
                }
                draw();
            });
        });

        draw();
    })();
    </script>
</body>
</html>
