<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glyph Anatomy Explorer - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 1rem;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); margin: 0.5rem 0; }
        .subtitle { color: var(--terracotta); margin-bottom: 1rem; }
        .controls {
            display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;
            justify-content: center; margin-bottom: 1rem;
        }
        .letter-btns { display: flex; gap: 0.5rem; }
        .letter-btns button {
            font-family: 'Lora', serif; font-size: 1.5rem;
            width: 48px; height: 48px;
            border: 2px solid var(--sage); background: rgba(255,255,255,0.7);
            color: var(--dark-moss); border-radius: 12px; cursor: pointer;
            font-weight: 700; transition: all 0.2s;
        }
        .letter-btns button:hover { background: rgba(255,255,255,0.95); }
        .letter-btns button.active { background: var(--sage); color: white; }
        .toggle-btn {
            font-family: 'Nunito', sans-serif; padding: 0.5rem 1rem;
            border: 2px solid var(--sage); background: rgba(255,255,255,0.7);
            color: var(--dark-moss); border-radius: 12px; cursor: pointer;
            font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
        }
        .toggle-btn:hover { background: rgba(255,255,255,0.95); }
        .toggle-btn.active { background: var(--earth); color: white; border-color: var(--earth); }
        .glyph-area {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 30px rgba(138,154,91,0.15);
        }
        .annotation-info {
            margin-top: 1rem; padding: 0.75rem 1.25rem;
            background: rgba(255,255,255,0.7); border-radius: 12px;
            font-size: 0.9rem; text-align: center; max-width: 500px;
            min-height: 2.5em;
        }
        .annotation-info strong { color: var(--moss); }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Glyph Anatomy</h1>
    <p class="subtitle">Explore the anatomical features of letterforms</p>

    <div class="controls">
        <div class="letter-btns">
            <button class="active" data-letter="A">A</button>
            <button data-letter="g">g</button>
            <button data-letter="R">R</button>
            <button data-letter="S">S</button>
        </div>
        <button class="toggle-btn" id="bezierToggle">Show Bezier Points</button>
    </div>

    <div class="glyph-area">
        <svg id="glyphSvg" width="600" height="500" viewBox="0 0 600 500" role="img">
            <title>Glyph Anatomy</title>
            <desc>Typographic anatomy of letterforms with labeled features</desc>
        </svg>
    </div>
    <div class="annotation-info" id="annotationInfo">Hover over labels to highlight glyph features</div>

    <script>
    (function() {
        const svg = document.getElementById('glyphSvg');
        const ns = 'http://www.w3.org/2000/svg';
        const annotationInfo = document.getElementById('annotationInfo');
        const bezierToggle = document.getElementById('bezierToggle');
        let showBezier = false;
        let currentLetter = 'A';

        // Reference lines
        const baseline = 380;
        const capHeight = 100;
        const xHeight = 220;
        const ascenderLine = 80;
        const descenderLine = 470;

        const lineNames = [
            { y: ascenderLine, label: 'Ascender Line', color: 'rgba(188,108,37,0.3)' },
            { y: capHeight, label: 'Cap Height', color: 'rgba(96,108,56,0.4)' },
            { y: xHeight, label: 'x-Height', color: 'rgba(138,154,91,0.4)' },
            { y: baseline, label: 'Baseline', color: 'rgba(61,68,35,0.5)' },
            { y: descenderLine, label: 'Descender Line', color: 'rgba(188,108,37,0.3)' }
        ];

        // Glyph paths (simplified serif letterforms)
        const glyphs = {
            A: {
                path: 'M100,380 L230,100 L250,100 L380,380 L340,380 L310,300 L170,300 L140,380 Z M185,270 L295,270 L240,140 Z',
                annotations: [
                    { label: 'Apex', x: 240, y: 90, hx: 240, hy: 100, desc: 'The pointed top where two strokes meet' },
                    { label: 'Stem', x: 420, y: 200, hx: 345, hy: 250, desc: 'Main vertical stroke of the letter' },
                    { label: 'Crossbar', x: 420, y: 285, hx: 295, hy: 270, desc: 'Horizontal stroke connecting two stems' },
                    { label: 'Counter', x: 240, y: 320, hx: 240, hy: 310, desc: 'The enclosed or partially enclosed space within a letter' },
                    { label: 'Leg', x: 90, y: 395, hx: 130, hy: 380, desc: 'Lower diagonal stroke extending from a junction' },
                    { label: 'Serif', x: 370, y: 400, hx: 360, hy: 380, desc: 'Small decorative stroke at the end of a stem' }
                ],
                bezierPoints: [
                    [100,380],[230,100],[250,100],[380,380],[340,380],[310,300],[170,300],[140,380],[185,270],[295,270],[240,140]
                ]
            },
            g: {
                path: 'M340,220 C340,170 300,160 260,160 C200,160 160,190 160,245 C160,300 200,330 260,330 C300,330 330,320 340,305 L340,330 C340,400 300,430 240,430 C200,430 170,415 155,400 L170,375 C185,390 210,405 240,405 C280,405 310,385 310,340 L310,315 C290,335 265,345 235,345 C175,345 130,305 130,245 C130,185 175,145 240,145 C275,145 305,160 320,180 L320,160 L340,160 Z',
                annotations: [
                    { label: 'Bowl', x: 70, y: 245, hx: 160, hy: 245, desc: 'The curved part enclosing the counter' },
                    { label: 'Counter', x: 250, y: 245, hx: 250, hy: 245, desc: 'The enclosed space within the bowl' },
                    { label: 'Ear', x: 380, y: 155, hx: 340, hy: 165, desc: 'Small stroke projecting from the upper right' },
                    { label: 'Descender', x: 380, y: 430, hx: 310, hy: 420, desc: 'Portion of the letter extending below the baseline' },
                    { label: 'Loop', x: 380, y: 370, hx: 310, hy: 370, desc: 'The lower enclosed or partially enclosed counter' },
                    { label: 'Link', x: 380, y: 330, hx: 340, hy: 330, desc: 'The stroke connecting bowl and loop' },
                    { label: 'Terminal', x: 80, y: 400, hx: 155, hy: 400, desc: 'The end of a stroke that does not terminate in a serif' }
                ],
                bezierPoints: [
                    [340,220],[340,170],[300,160],[260,160],[200,160],[160,190],[160,245],[160,300],[200,330],[260,330],[340,305],[340,400],[300,430],[240,430],[200,430],[170,415],[310,340],[310,315]
                ]
            },
            R: {
                path: 'M120,380 L120,100 L260,100 C340,100 380,140 380,185 C380,230 350,260 300,270 L390,380 L350,380 L265,275 L155,275 L155,380 Z M155,130 L155,250 L260,250 C320,250 350,225 350,185 C350,145 320,130 260,130 Z',
                annotations: [
                    { label: 'Stem', x: 70, y: 240, hx: 120, hy: 240, desc: 'The main vertical stroke' },
                    { label: 'Bowl', x: 420, y: 180, hx: 380, hy: 185, desc: 'The curved stroke enclosing the counter' },
                    { label: 'Counter', x: 240, y: 185, hx: 240, hy: 185, desc: 'The space enclosed by the bowl' },
                    { label: 'Leg', x: 400, y: 395, hx: 370, hy: 380, desc: 'The diagonal stroke descending from the junction' },
                    { label: 'Shoulder', x: 420, y: 130, hx: 350, hy: 130, desc: 'The curved stroke at top of bowl' },
                    { label: 'Serif', x: 70, y: 395, hx: 120, hy: 380, desc: 'Decorative stroke at end of stem' },
                    { label: 'Arm', x: 420, y: 100, hx: 300, hy: 100, desc: 'Horizontal stroke at top connecting to bowl' }
                ],
                bezierPoints: [
                    [120,380],[120,100],[260,100],[380,185],[300,270],[390,380],[265,275],[155,275],[155,130],[155,250],[260,250],[350,185],[260,130]
                ]
            },
            S: {
                path: 'M310,140 C290,115 260,100 220,100 C170,100 130,125 130,165 C130,210 165,230 220,250 C275,270 330,290 330,340 C330,385 290,405 240,405 C190,405 155,390 125,360 L145,340 C170,365 200,385 240,385 C280,385 305,365 305,340 C305,300 270,280 215,260 C160,240 105,215 105,165 C105,110 155,80 220,80 C270,80 305,100 330,125 Z',
                annotations: [
                    { label: 'Spine', x: 420, y: 245, hx: 260, hy: 255, desc: 'The main curved stroke forming the S shape' },
                    { label: 'Terminal (top)', x: 370, y: 115, hx: 320, hy: 125, desc: 'The finishing point of the upper curve' },
                    { label: 'Terminal (bottom)', x: 70, y: 365, hx: 135, hy: 355, desc: 'The finishing point of the lower curve' },
                    { label: 'Upper Counter', x: 175, y: 165, hx: 175, hy: 165, desc: 'The partially enclosed space in the upper bowl' },
                    { label: 'Lower Counter', x: 280, y: 340, hx: 280, hy: 340, desc: 'The partially enclosed space in the lower bowl' },
                    { label: 'Aperture', x: 60, y: 140, hx: 130, hy: 145, desc: 'The opening of the partially enclosed counter' }
                ],
                bezierPoints: [
                    [310,140],[220,100],[130,165],[220,250],[330,340],[240,405],[125,360],[240,385],[305,340],[215,260],[105,165],[220,80],[330,125]
                ]
            }
        };

        function drawRefLines() {
            lineNames.forEach(l => {
                const line = document.createElementNS(ns, 'line');
                line.setAttribute('x1', 40); line.setAttribute('x2', 560);
                line.setAttribute('y1', l.y); line.setAttribute('y2', l.y);
                line.setAttribute('stroke', l.color);
                line.setAttribute('stroke-width', '1');
                line.setAttribute('stroke-dasharray', '4,4');
                svg.appendChild(line);

                const text = document.createElementNS(ns, 'text');
                text.setAttribute('x', 565); text.setAttribute('y', l.y + 4);
                text.setAttribute('font-size', '9');
                text.setAttribute('fill', l.color.replace(/[\d.]+\)$/, '1)'));
                text.setAttribute('font-family', 'Nunito, sans-serif');
                text.textContent = l.label;
                svg.appendChild(text);
            });
        }

        function drawGlyph(letterKey) {
            svg.innerHTML = '';
            const glyph = glyphs[letterKey];

            drawRefLines();

            // Draw the glyph path
            const path = document.createElementNS(ns, 'path');
            path.setAttribute('d', glyph.path);
            path.setAttribute('fill', 'rgba(61,68,35,0.15)');
            path.setAttribute('stroke', '#3d4423');
            path.setAttribute('stroke-width', '2');
            path.id = 'glyphPath';
            svg.appendChild(path);

            // Annotations
            glyph.annotations.forEach((ann, i) => {
                const g = document.createElementNS(ns, 'g');
                g.style.cursor = 'pointer';

                // Leader line
                const line = document.createElementNS(ns, 'line');
                line.setAttribute('x1', ann.x); line.setAttribute('y1', ann.y);
                line.setAttribute('x2', ann.hx); line.setAttribute('y2', ann.hy);
                line.setAttribute('stroke', '#8A9A5B');
                line.setAttribute('stroke-width', '1');
                line.setAttribute('stroke-dasharray', '3,2');
                g.appendChild(line);

                // Highlight circle at target
                const hCircle = document.createElementNS(ns, 'circle');
                hCircle.setAttribute('cx', ann.hx); hCircle.setAttribute('cy', ann.hy);
                hCircle.setAttribute('r', 15);
                hCircle.setAttribute('fill', 'rgba(221,161,94,0)');
                hCircle.setAttribute('stroke', 'none');
                hCircle.id = 'highlight-' + i;
                g.appendChild(hCircle);

                // Label dot
                const dot = document.createElementNS(ns, 'circle');
                dot.setAttribute('cx', ann.x); dot.setAttribute('cy', ann.y);
                dot.setAttribute('r', 3);
                dot.setAttribute('fill', '#BC6C25');
                g.appendChild(dot);

                // Label text
                const text = document.createElementNS(ns, 'text');
                text.setAttribute('x', ann.x + (ann.x > 300 ? 8 : -8));
                text.setAttribute('y', ann.y + 4);
                text.setAttribute('text-anchor', ann.x > 300 ? 'start' : 'end');
                text.setAttribute('font-size', '11');
                text.setAttribute('fill', '#BC6C25');
                text.setAttribute('font-weight', '700');
                text.setAttribute('font-family', 'Nunito, sans-serif');
                text.textContent = ann.label;
                g.appendChild(text);

                // Hover events
                g.addEventListener('mouseenter', () => {
                    hCircle.setAttribute('fill', 'rgba(221,161,94,0.3)');
                    hCircle.setAttribute('r', 20);
                    hCircle.setAttribute('stroke', '#BC6C25');
                    hCircle.setAttribute('stroke-width', '2');
                    annotationInfo.innerHTML = '<strong>' + ann.label + ':</strong> ' + ann.desc;
                });
                g.addEventListener('mouseleave', () => {
                    hCircle.setAttribute('fill', 'rgba(221,161,94,0)');
                    hCircle.setAttribute('stroke', 'none');
                    annotationInfo.textContent = 'Hover over labels to highlight glyph features';
                });

                svg.appendChild(g);
            });

            // Bezier control points
            if (showBezier) {
                glyph.bezierPoints.forEach(pt => {
                    const c = document.createElementNS(ns, 'circle');
                    c.setAttribute('cx', pt[0]); c.setAttribute('cy', pt[1]);
                    c.setAttribute('r', 3);
                    c.setAttribute('fill', '#DDA15E');
                    c.setAttribute('stroke', '#BC6C25');
                    c.setAttribute('stroke-width', '1');
                    svg.appendChild(c);

                    // Small crosshair
                    const h = document.createElementNS(ns, 'line');
                    h.setAttribute('x1', pt[0]-5); h.setAttribute('x2', pt[0]+5);
                    h.setAttribute('y1', pt[1]); h.setAttribute('y2', pt[1]);
                    h.setAttribute('stroke', 'rgba(188,108,37,0.5)');
                    h.setAttribute('stroke-width', '0.5');
                    svg.appendChild(h);
                    const v = document.createElementNS(ns, 'line');
                    v.setAttribute('x1', pt[0]); v.setAttribute('x2', pt[0]);
                    v.setAttribute('y1', pt[1]-5); v.setAttribute('y2', pt[1]+5);
                    v.setAttribute('stroke', 'rgba(188,108,37,0.5)');
                    v.setAttribute('stroke-width', '0.5');
                    svg.appendChild(v);
                });
            }
        }

        // Letter buttons
        document.querySelectorAll('.letter-btns button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.letter-btns button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLetter = btn.dataset.letter;
                drawGlyph(currentLetter);
            });
        });

        // Bezier toggle
        bezierToggle.addEventListener('click', () => {
            showBezier = !showBezier;
            bezierToggle.classList.toggle('active', showBezier);
            drawGlyph(currentLetter);
        });

        drawGlyph('A');
    })();
    </script>
</body>
</html>
