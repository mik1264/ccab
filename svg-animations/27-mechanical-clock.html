<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanical Clock Escapement - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 1rem;
        }
        .back-link {
            position: fixed; top: 1rem; left: 1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--terracotta); text-decoration: none; font-weight: 600;
            padding: 0.5rem 1rem; background: rgba(255,255,255,0.7);
            border-radius: 20px; z-index: 100; transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 { font-family: 'Lora', serif; font-size: 2rem; color: var(--moss); margin: 0.5rem 0; }
        .subtitle { color: var(--terracotta); margin-bottom: 0.75rem; }
        .controls {
            display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
            justify-content: center; margin-bottom: 0.75rem;
        }
        button {
            font-family: 'Nunito', sans-serif; padding: 0.5rem 1.2rem;
            border: 2px solid var(--sage); background: rgba(255,255,255,0.7);
            color: var(--dark-moss); border-radius: 12px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; transition: all 0.2s;
        }
        button:hover { background: rgba(255,255,255,0.95); border-color: var(--moss); }
        button.active { background: var(--earth); color: white; border-color: var(--earth); }
        .clock-area {
            display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; align-items: flex-start;
        }
        .panel {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 8px 30px rgba(138,154,91,0.15);
            text-align: center;
        }
        .panel h3 { font-family: 'Lora', serif; color: var(--moss); margin-bottom: 0.5rem; }
        .time-display {
            font-family: 'Lora', serif;
            font-size: 1.6rem;
            color: var(--dark-moss);
            margin-top: 0.5rem;
            font-weight: 700;
        }
        .gear-info {
            font-size: 0.8rem; color: var(--sage); margin-top: 0.5rem;
            text-align: left; line-height: 1.6;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Mechanical Clock</h1>
    <p class="subtitle">Escapement mechanism and gear train</p>

    <div class="controls">
        <button id="slowBtn">Slow Motion (10x)</button>
    </div>

    <div class="clock-area">
        <div class="panel">
            <h3>Clock Face</h3>
            <svg id="clockSvg" width="280" height="280" viewBox="-150 -150 300 300" role="img">
                <title>Clock Face</title>
                <desc>Analog clock showing current time</desc>
            </svg>
            <div class="time-display" id="timeDisplay">12:00:00</div>
        </div>
        <div class="panel">
            <h3>Escapement Mechanism</h3>
            <svg id="escapeSvg" width="350" height="350" viewBox="-180 -180 360 360" role="img">
                <title>Escapement Mechanism</title>
                <desc>Escape wheel, pallet fork, and balance wheel animation</desc>
            </svg>
            <div class="gear-info">
                <strong>Escape Wheel:</strong> 15 teeth<br>
                <strong>Pallet Fork:</strong> 2 pallets, rocks back and forth<br>
                <strong>Balance Wheel:</strong> Oscillates with restoring force<br>
                <strong>Each tick:</strong> One tooth advancement
            </div>
        </div>
    </div>

    <script>
    (function() {
        const clockSvg = document.getElementById('clockSvg');
        const escapeSvg = document.getElementById('escapeSvg');
        const timeDisplay = document.getElementById('timeDisplay');
        const slowBtn = document.getElementById('slowBtn');
        const ns = 'http://www.w3.org/2000/svg';

        let slowMotion = false;
        slowBtn.addEventListener('click', () => {
            slowMotion = !slowMotion;
            slowBtn.classList.toggle('active', slowMotion);
            slowBtn.textContent = slowMotion ? 'Normal Speed' : 'Slow Motion (10x)';
        });

        // --- CLOCK FACE ---
        function drawClockFace() {
            // Outer ring
            const outer = document.createElementNS(ns, 'circle');
            outer.setAttribute('cx',0); outer.setAttribute('cy',0); outer.setAttribute('r',130);
            outer.setAttribute('fill','#FEFAE0'); outer.setAttribute('stroke','#606C38'); outer.setAttribute('stroke-width','3');
            clockSvg.appendChild(outer);

            const inner = document.createElementNS(ns, 'circle');
            inner.setAttribute('cx',0); inner.setAttribute('cy',0); inner.setAttribute('r',125);
            inner.setAttribute('fill','none'); inner.setAttribute('stroke','#8A9A5B'); inner.setAttribute('stroke-width','1');
            clockSvg.appendChild(inner);

            // Hour marks
            for (let i = 0; i < 12; i++) {
                const angle = (i * 30 - 90) * Math.PI / 180;
                const isMain = true;
                const r1 = 110, r2 = 120;
                const line = document.createElementNS(ns, 'line');
                line.setAttribute('x1', r1 * Math.cos(angle));
                line.setAttribute('y1', r1 * Math.sin(angle));
                line.setAttribute('x2', r2 * Math.cos(angle));
                line.setAttribute('y2', r2 * Math.sin(angle));
                line.setAttribute('stroke', '#3d4423');
                line.setAttribute('stroke-width', '2.5');
                clockSvg.appendChild(line);

                // Number
                const numR = 98;
                const text = document.createElementNS(ns, 'text');
                text.setAttribute('x', numR * Math.cos(angle));
                text.setAttribute('y', numR * Math.sin(angle) + 5);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('font-size', '14');
                text.setAttribute('font-weight', '700');
                text.setAttribute('fill', '#3d4423');
                text.setAttribute('font-family', 'Lora, serif');
                text.textContent = i === 0 ? '12' : String(i);
                clockSvg.appendChild(text);
            }

            // Minute marks
            for (let i = 0; i < 60; i++) {
                if (i % 5 === 0) continue;
                const angle = (i * 6 - 90) * Math.PI / 180;
                const line = document.createElementNS(ns, 'line');
                line.setAttribute('x1', 115 * Math.cos(angle));
                line.setAttribute('y1', 115 * Math.sin(angle));
                line.setAttribute('x2', 120 * Math.cos(angle));
                line.setAttribute('y2', 120 * Math.sin(angle));
                line.setAttribute('stroke', '#8A9A5B');
                line.setAttribute('stroke-width', '1');
                clockSvg.appendChild(line);
            }

            // Center cap
            const cap = document.createElementNS(ns, 'circle');
            cap.setAttribute('cx',0); cap.setAttribute('cy',0); cap.setAttribute('r',5);
            cap.setAttribute('fill','#3d4423');
            clockSvg.appendChild(cap);
        }

        // Clock hands
        const hourHand = document.createElementNS(ns, 'line');
        hourHand.setAttribute('x1',0); hourHand.setAttribute('y1',10);
        hourHand.setAttribute('stroke','#3d4423'); hourHand.setAttribute('stroke-width','4');
        hourHand.setAttribute('stroke-linecap','round');

        const minuteHand = document.createElementNS(ns, 'line');
        minuteHand.setAttribute('x1',0); minuteHand.setAttribute('y1',15);
        minuteHand.setAttribute('stroke','#606C38'); minuteHand.setAttribute('stroke-width','3');
        minuteHand.setAttribute('stroke-linecap','round');

        const secondHand = document.createElementNS(ns, 'line');
        secondHand.setAttribute('x1',0); secondHand.setAttribute('y1',20);
        secondHand.setAttribute('stroke','#BC6C25'); secondHand.setAttribute('stroke-width','1.5');
        secondHand.setAttribute('stroke-linecap','round');

        drawClockFace();
        clockSvg.appendChild(hourHand);
        clockSvg.appendChild(minuteHand);
        clockSvg.appendChild(secondHand);

        // Re-add center cap on top
        const topCap = document.createElementNS(ns, 'circle');
        topCap.setAttribute('cx',0); topCap.setAttribute('cy',0); topCap.setAttribute('r',4);
        topCap.setAttribute('fill','#BC6C25');
        clockSvg.appendChild(topCap);

        function updateClockHands(now) {
            const h = now.getHours() % 12;
            const m = now.getMinutes();
            const s = now.getSeconds();
            const ms = now.getMilliseconds();

            const secAngle = ((s + ms/1000) * 6 - 90) * Math.PI / 180;
            const minAngle = ((m + s/60) * 6 - 90) * Math.PI / 180;
            const hourAngle = ((h + m/60) * 30 - 90) * Math.PI / 180;

            hourHand.setAttribute('x2', 60 * Math.cos(hourAngle));
            hourHand.setAttribute('y2', 60 * Math.sin(hourAngle));
            minuteHand.setAttribute('x2', 85 * Math.cos(minAngle));
            minuteHand.setAttribute('y2', 85 * Math.sin(minAngle));
            secondHand.setAttribute('x2', 100 * Math.cos(secAngle));
            secondHand.setAttribute('y2', 100 * Math.sin(secAngle));

            timeDisplay.textContent = `${String(now.getHours()).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        // --- ESCAPEMENT ---
        const escapeTeeth = 15;
        const escapeR = 80;
        let escapeAngle = 0;
        let palletAngle = 0;
        let balanceAngle = 0;
        let balanceVel = 0;
        const balanceSpring = 3.0;
        const dampening = 0.02;
        let tickPhase = 0;

        function drawEscapement() {
            escapeSvg.innerHTML = '';

            // Background circle
            const bg = document.createElementNS(ns, 'circle');
            bg.setAttribute('cx',0); bg.setAttribute('cy',0); bg.setAttribute('r',170);
            bg.setAttribute('fill','rgba(254,250,224,0.5)'); bg.setAttribute('stroke','rgba(138,154,91,0.2)');
            escapeSvg.appendChild(bg);

            // Escape wheel
            const escG = document.createElementNS(ns, 'g');
            escG.setAttribute('transform', `rotate(${escapeAngle * 180 / Math.PI})`);

            // Wheel rim
            const rim = document.createElementNS(ns, 'circle');
            rim.setAttribute('cx',0); rim.setAttribute('cy',0); rim.setAttribute('r',escapeR);
            rim.setAttribute('fill','none'); rim.setAttribute('stroke','rgba(138,154,91,0.3)');
            rim.setAttribute('stroke-width','1');
            escG.appendChild(rim);

            // Teeth
            for (let i = 0; i < escapeTeeth; i++) {
                const a = (i * 2 * Math.PI / escapeTeeth);
                const tipR = escapeR + 15;
                const baseR = escapeR - 5;
                const toothWidth = Math.PI / escapeTeeth * 0.4;

                const path = document.createElementNS(ns, 'path');
                const x1 = baseR * Math.cos(a - toothWidth);
                const y1 = baseR * Math.sin(a - toothWidth);
                const x2 = tipR * Math.cos(a);
                const y2 = tipR * Math.sin(a);
                const x3 = baseR * Math.cos(a + toothWidth);
                const y3 = baseR * Math.sin(a + toothWidth);
                path.setAttribute('d', `M${x1},${y1} L${x2},${y2} L${x3},${y3} Z`);
                path.setAttribute('fill', '#8A9A5B');
                path.setAttribute('stroke', '#606C38');
                path.setAttribute('stroke-width', '0.5');
                escG.appendChild(path);
            }

            // Spokes
            for (let i = 0; i < 5; i++) {
                const a = i * 2 * Math.PI / 5;
                const spoke = document.createElementNS(ns, 'line');
                spoke.setAttribute('x1', 0); spoke.setAttribute('y1', 0);
                spoke.setAttribute('x2', (escapeR-8) * Math.cos(a));
                spoke.setAttribute('y2', (escapeR-8) * Math.sin(a));
                spoke.setAttribute('stroke', 'rgba(96,108,56,0.4)');
                spoke.setAttribute('stroke-width', '1.5');
                escG.appendChild(spoke);
            }

            // Center
            const esc = document.createElementNS(ns, 'circle');
            esc.setAttribute('cx',0); esc.setAttribute('cy',0); esc.setAttribute('r',6);
            esc.setAttribute('fill','#606C38'); esc.setAttribute('stroke','#3d4423');
            escG.appendChild(esc);

            escapeSvg.appendChild(escG);

            // Pallet fork
            const palletPivotY = -escapeR - 40;
            const palletG = document.createElementNS(ns, 'g');
            palletG.setAttribute('transform', `translate(0, ${palletPivotY}) rotate(${palletAngle * 180 / Math.PI})`);

            // Fork arms
            const arm1 = document.createElementNS(ns, 'line');
            arm1.setAttribute('x1', 0); arm1.setAttribute('y1', 0);
            arm1.setAttribute('x2', -25); arm1.setAttribute('y2', 35);
            arm1.setAttribute('stroke', '#BC6C25'); arm1.setAttribute('stroke-width', '3');
            arm1.setAttribute('stroke-linecap', 'round');
            palletG.appendChild(arm1);

            const arm2 = document.createElementNS(ns, 'line');
            arm2.setAttribute('x1', 0); arm2.setAttribute('y1', 0);
            arm2.setAttribute('x2', 25); arm2.setAttribute('y2', 35);
            arm2.setAttribute('stroke', '#BC6C25'); arm2.setAttribute('stroke-width', '3');
            arm2.setAttribute('stroke-linecap', 'round');
            palletG.appendChild(arm2);

            // Pallet stones
            const stone1 = document.createElementNS(ns, 'rect');
            stone1.setAttribute('x', -30); stone1.setAttribute('y', 32);
            stone1.setAttribute('width', 8); stone1.setAttribute('height', 6);
            stone1.setAttribute('fill', '#DDA15E'); stone1.setAttribute('rx', 1);
            palletG.appendChild(stone1);

            const stone2 = document.createElementNS(ns, 'rect');
            stone2.setAttribute('x', 22); stone2.setAttribute('y', 32);
            stone2.setAttribute('width', 8); stone2.setAttribute('height', 6);
            stone2.setAttribute('fill', '#DDA15E'); stone2.setAttribute('rx', 1);
            palletG.appendChild(stone2);

            // Pivot
            const pivot = document.createElementNS(ns, 'circle');
            pivot.setAttribute('cx', 0); pivot.setAttribute('cy', 0); pivot.setAttribute('r', 4);
            pivot.setAttribute('fill', '#BC6C25');
            palletG.appendChild(pivot);

            // Fork handle going up
            const handle = document.createElementNS(ns, 'line');
            handle.setAttribute('x1', 0); handle.setAttribute('y1', 0);
            handle.setAttribute('x2', 0); handle.setAttribute('y2', -30);
            handle.setAttribute('stroke', '#BC6C25'); handle.setAttribute('stroke-width', '2.5');
            handle.setAttribute('stroke-linecap', 'round');
            palletG.appendChild(handle);

            escapeSvg.appendChild(palletG);

            // Balance wheel
            const balanceY = palletPivotY - 55;
            const balanceG = document.createElementNS(ns, 'g');
            balanceG.setAttribute('transform', `translate(0, ${balanceY}) rotate(${balanceAngle * 180 / Math.PI})`);

            const balanceRim = document.createElementNS(ns, 'circle');
            balanceRim.setAttribute('cx', 0); balanceRim.setAttribute('cy', 0); balanceRim.setAttribute('r', 28);
            balanceRim.setAttribute('fill', 'none');
            balanceRim.setAttribute('stroke', '#3d4423'); balanceRim.setAttribute('stroke-width', '2.5');
            balanceG.appendChild(balanceRim);

            // Balance spokes
            for (let i = 0; i < 4; i++) {
                const a = i * Math.PI / 2;
                const sp = document.createElementNS(ns, 'line');
                sp.setAttribute('x1', 0); sp.setAttribute('y1', 0);
                sp.setAttribute('x2', 25 * Math.cos(a)); sp.setAttribute('y2', 25 * Math.sin(a));
                sp.setAttribute('stroke', '#3d4423'); sp.setAttribute('stroke-width', '1.5');
                balanceG.appendChild(sp);
            }

            // Impulse pin
            const pin = document.createElementNS(ns, 'circle');
            pin.setAttribute('cx', 0); pin.setAttribute('cy', 25);
            pin.setAttribute('r', 3); pin.setAttribute('fill', '#DDA15E');
            balanceG.appendChild(pin);

            const balCenter = document.createElementNS(ns, 'circle');
            balCenter.setAttribute('cx', 0); balCenter.setAttribute('cy', 0); balCenter.setAttribute('r', 4);
            balCenter.setAttribute('fill', '#3d4423');
            balanceG.appendChild(balCenter);

            escapeSvg.appendChild(balanceG);

            // Hairspring (spiral)
            const springG = document.createElementNS(ns, 'g');
            springG.setAttribute('transform', `translate(0, ${balanceY})`);
            let springD = '';
            const spiralTurns = 3;
            for (let t = 0; t <= spiralTurns * 360; t += 5) {
                const r = 4 + t / 360 * 5 + balanceAngle * 2;
                const a = t * Math.PI / 180;
                const x = r * Math.cos(a);
                const y = r * Math.sin(a);
                springD += (t === 0 ? 'M' : 'L') + `${x},${y} `;
            }
            const spring = document.createElementNS(ns, 'path');
            spring.setAttribute('d', springD);
            spring.setAttribute('fill', 'none');
            spring.setAttribute('stroke', 'rgba(188,108,37,0.5)');
            spring.setAttribute('stroke-width', '0.8');
            springG.appendChild(spring);
            escapeSvg.appendChild(springG);

            // Labels
            const labels = [
                [0, escapeR + 30, 'Escape Wheel'],
                [0, palletPivotY - 5, 'Pallet Fork'],
                [0, balanceY - 40, 'Balance Wheel']
            ];
            labels.forEach(([x,y,text]) => {
                const t = document.createElementNS(ns, 'text');
                t.setAttribute('x', x); t.setAttribute('y', y);
                t.setAttribute('text-anchor', 'middle');
                t.setAttribute('font-size', '9');
                t.setAttribute('fill', '#8A9A5B');
                t.setAttribute('font-family', 'Nunito, sans-serif');
                t.setAttribute('font-weight', '600');
                t.textContent = text;
                escapeSvg.appendChild(t);
            });
        }

        let lastTime = 0;
        function animate(time) {
            const rawDt = lastTime ? (time - lastTime) / 1000 : 0.016;
            lastTime = time;
            const dt = slowMotion ? rawDt * 0.1 : rawDt;

            // Update balance wheel (simple harmonic oscillator with impulse)
            const springForce = -balanceSpring * balanceAngle;
            const dampForce = -dampening * balanceVel;
            // Impulse from escapement
            const impulse = 0.5 * Math.sign(-balanceVel || 1);
            balanceVel += (springForce + dampForce + impulse) * dt;
            balanceAngle += balanceVel * dt;

            // Pallet fork follows balance
            palletAngle = Math.max(-0.3, Math.min(0.3, balanceAngle * 0.8));

            // Escape wheel advances based on pallet
            const tickRate = slowMotion ? 0.3 : 3;
            tickPhase += dt * tickRate;
            const toothAngle = 2 * Math.PI / escapeTeeth;
            escapeAngle = Math.floor(tickPhase) * toothAngle + Math.min(tickPhase % 1, 0.3) * toothAngle;

            // Update clock
            const now = new Date();
            updateClockHands(now);
            drawEscapement();

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    })();
    </script>
</body>
</html>
