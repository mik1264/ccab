<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Anatomy Explorer - SVG Animations</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            color: var(--dark-moss);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .back-link {
            position: fixed;
            top: 1rem;
            left: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--terracotta);
            text-decoration: none;
            font-weight: 600;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.7);
            border-radius: 20px;
            z-index: 100;
            transition: all 0.3s ease;
        }
        .back-link:hover { background: rgba(255,255,255,0.95); transform: translateX(-3px); }
        h1 {
            font-family: 'Lora', serif;
            font-size: 2rem;
            color: var(--moss);
            margin: 1.5rem 0 0.5rem;
            text-align: center;
        }
        .subtitle { color: var(--terracotta); margin-bottom: 0.5rem; text-align: center; }
        .main-container {
            display: flex;
            gap: 1.5rem;
            padding: 1rem 2rem;
            max-width: 1100px;
            width: 100%;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        .svg-container {
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1rem;
            border: 2px solid rgba(138,154,91,0.15);
            flex-shrink: 0;
        }
        .toggle-container {
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .toggle-btn {
            padding: 6px 18px;
            border: 2px solid var(--sage);
            background: transparent;
            color: var(--moss);
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .toggle-btn.active {
            background: var(--sage);
            color: white;
        }
        .toggle-btn:first-child { border-radius: 20px 0 0 20px; }
        .toggle-btn:last-child { border-radius: 0 20px 20px 0; }
        .info-panel {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            border: 2px solid rgba(138,154,91,0.15);
            min-width: 280px;
            max-width: 340px;
            flex: 1;
            transition: all 0.4s ease;
        }
        .info-panel h2 {
            font-family: 'Lora', serif;
            color: var(--moss);
            font-size: 1.4rem;
            margin-bottom: 0.8rem;
        }
        .info-panel .detail { margin-bottom: 0.5rem; line-height: 1.5; }
        .info-panel .detail strong { color: var(--terracotta); }
        .info-panel .placeholder {
            color: var(--sage);
            font-style: italic;
            text-align: center;
            padding: 2rem 0;
        }
        .organ-path {
            cursor: pointer;
            transition: filter 0.3s, opacity 0.3s;
        }
        .organ-path:hover { filter: url(#organGlow); }
        .organ-path.dimmed { opacity: 0.25; }
        .organ-path.highlighted { filter: url(#organGlow); }
        .label-text {
            font-family: 'Nunito', sans-serif;
            font-size: 9px;
            fill: var(--dark-moss);
            pointer-events: none;
            font-weight: 600;
        }
        @media (max-width: 768px) {
            .main-container { flex-direction: column; align-items: center; padding: 1rem; }
            .info-panel { max-width: 100%; min-width: auto; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back to Gallery</a>
    <h1>Human Anatomy Explorer</h1>
    <p class="subtitle">Hover and click organs to explore the human body</p>
    <div class="main-container">
        <div class="svg-container">
            <div class="toggle-container">
                <button class="toggle-btn active" onclick="setGender('male')">Male</button>
                <button class="toggle-btn" onclick="setGender('female')">Female</button>
            </div>
            <svg id="anatomySvg" width="340" height="560" viewBox="0 0 340 560" role="graphics-document" aria-label="Human anatomy diagram">
                <title>Human Anatomy Diagram</title>
                <desc>Interactive diagram showing major organs of the human body. Hover to highlight organs, click for details.</desc>
                <defs>
                    <filter id="organGlow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="blur"/>
                        <feFlood flood-color="#DDA15E" flood-opacity="0.6" result="color"/>
                        <feComposite in="color" in2="blur" operator="in" result="glow"/>
                        <feMerge>
                            <feMergeNode in="glow"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>

                <!-- Body silhouette -->
                <g id="bodyMale">
                    <path d="M170 30 C155 30 142 42 140 58 C138 74 145 85 150 90 L148 95 C130 98 115 115 112 135 L108 165 L80 220 L70 250 L78 255 L105 200 L108 220 L100 320 L95 400 L90 480 L95 530 L115 535 L120 530 L125 480 L135 400 L145 330 L155 330 L165 400 L175 480 L180 530 L185 535 L205 530 L210 480 L205 400 L195 320 L188 220 L190 200 L218 255 L226 250 L216 220 L188 165 L184 135 C181 115 166 98 148 95 L150 90" fill="#e8c9a0" stroke="#c9a87c" stroke-width="1.5"/>
                    <path d="M170 30 C185 30 198 42 200 58 C202 74 195 85 190 90 L192 95 C210 98 225 115 228 135 L232 165 L260 220 L270 250 L262 255 L235 200 L232 220 L240 320 L245 400 L250 480 L245 530 L225 535 L220 530 L215 480 L205 400 L195 330 L185 330 L175 400 L165 480 L160 530 L155 535 L135 530 L130 480 L135 400 L145 320 L152 220 L150 200 L122 255 L114 250 L124 220 L152 165 L156 135 C159 115 174 98 192 95 L190 90" fill="#e8c9a0" stroke="#c9a87c" stroke-width="1.5" opacity="0"/>
                </g>

                <!-- Body outline only (simplified) -->
                <path id="bodySilhouette" d="M170 25 C148 25 135 45 135 65 C135 80 142 88 148 93 C125 100 108 120 105 145 L98 180 L72 238 L65 260 L78 262 L100 210 L100 230 L88 340 L82 430 L80 500 L92 540 L130 545 L135 500 L140 430 L150 340 L160 340 L170 430 L175 500 L180 545 L218 540 L230 500 L228 430 L222 340 L210 230 L210 210 L232 262 L245 260 L238 238 L212 180 L205 145 C202 120 185 100 162 93 C168 88 175 80 175 65 C175 45 162 25 170 25 Z" fill="none" stroke="#c9a87c" stroke-width="2" opacity="0.3"/>

                <!-- Brain -->
                <path class="organ-path" data-organ="brain" d="M152 38 C148 35 145 40 143 48 C141 56 143 65 148 70 C153 75 158 78 163 78 L177 78 C182 78 187 75 192 70 C197 65 199 56 197 48 C195 40 192 35 188 38 C184 41 180 35 170 35 C160 35 156 41 152 38 Z" fill="#f0a0a0" stroke="#d08080" stroke-width="1"/>
                <text class="label-text" x="160" y="60" text-anchor="middle">Brain</text>

                <!-- Heart -->
                <path class="organ-path" data-organ="heart" d="M155 155 C155 145 160 138 168 138 C174 138 178 142 180 148 C182 142 186 138 192 138 C200 138 205 145 205 155 C205 172 180 190 180 190 C180 190 155 172 155 155 Z" fill="#c94040" stroke="#a03030" stroke-width="1"/>
                <text class="label-text" x="180" y="168" text-anchor="middle">Heart</text>

                <!-- Left Lung -->
                <path class="organ-path" data-organ="leftLung" d="M118 120 C115 125 112 140 112 160 C112 182 118 195 128 200 C135 203 142 198 145 190 C148 180 148 165 148 150 C148 135 145 122 140 118 C135 115 125 115 118 120 Z" fill="#f0b0b0" stroke="#d09090" stroke-width="1"/>
                <text class="label-text" x="128" y="165" text-anchor="middle">L.Lung</text>

                <!-- Right Lung -->
                <path class="organ-path" data-organ="rightLung" d="M222 120 C225 125 228 140 228 160 C228 182 222 195 212 200 C205 203 198 198 195 190 C192 180 192 165 192 150 C192 135 195 122 200 118 C205 115 215 115 222 120 Z" fill="#f0b0b0" stroke="#d09090" stroke-width="1"/>
                <text class="label-text" x="212" y="165" text-anchor="middle">R.Lung</text>

                <!-- Liver -->
                <path class="organ-path" data-organ="liver" d="M145 200 C140 202 138 208 140 215 C142 222 148 228 158 232 C168 236 185 238 200 235 C215 232 225 225 225 215 C225 208 218 202 210 200 C200 198 155 198 145 200 Z" fill="#8b4513" stroke="#6b3510" stroke-width="1"/>
                <text class="label-text" x="182" y="220" text-anchor="middle">Liver</text>

                <!-- Stomach -->
                <path class="organ-path" data-organ="stomach" d="M148 225 C142 228 138 238 140 250 C142 262 148 272 158 275 C168 278 175 272 178 262 C180 255 178 245 178 238 C178 230 175 225 168 222 C160 220 153 222 148 225 Z" fill="#e8b060" stroke="#c89040" stroke-width="1"/>
                <text class="label-text" x="158" y="252" text-anchor="middle">Stomach</text>

                <!-- Left Kidney -->
                <path class="organ-path" data-organ="leftKidney" d="M130 255 C126 258 124 265 125 272 C126 280 130 285 135 286 C140 287 144 283 145 276 C146 268 144 260 140 256 C137 254 133 253 130 255 Z" fill="#a05050" stroke="#804040" stroke-width="1"/>
                <text class="label-text" x="135" y="290" text-anchor="middle">L.Kid</text>

                <!-- Right Kidney -->
                <path class="organ-path" data-organ="rightKidney" d="M210 255 C214 258 216 265 215 272 C214 280 210 285 205 286 C200 287 196 283 195 276 C194 268 196 260 200 256 C203 254 207 253 210 255 Z" fill="#a05050" stroke="#804040" stroke-width="1"/>
                <text class="label-text" x="205" y="290" text-anchor="middle">R.Kid</text>

                <!-- Intestines -->
                <path class="organ-path" data-organ="intestines" d="M148 280 C142 282 138 290 140 300 C142 310 148 318 155 320 Q165 322 170 315 Q175 322 185 320 C192 318 198 310 200 300 C202 290 198 282 192 280 Q180 275 170 278 Q160 275 148 280 Z" fill="#e0a080" stroke="#c08060" stroke-width="1"/>
                <text class="label-text" x="170" y="304" text-anchor="middle">Intestines</text>

                <!-- Bladder -->
                <path class="organ-path" data-organ="bladder" d="M160 328 C155 330 152 336 153 342 C154 348 158 352 165 354 C170 355 175 355 180 354 C187 352 191 348 192 342 C193 336 190 330 185 328 C180 326 168 326 160 328 Z" fill="#c0a0d0" stroke="#a080b0" stroke-width="1"/>
                <text class="label-text" x="172" y="344" text-anchor="middle">Bladder</text>
            </svg>
        </div>

        <div class="info-panel" id="infoPanel">
            <p class="placeholder">Hover over an organ to highlight it.<br>Click an organ for detailed information.</p>
        </div>
    </div>

    <script>
        const organData = {
            brain: {
                name: 'Brain',
                function: 'Central processing unit of the nervous system. Controls thoughts, memory, emotion, motor skills, vision, breathing, and every process that regulates the body.',
                weight: '~1,400 g (3 lbs)',
                diseases: 'Alzheimer\'s disease, Parkinson\'s disease, Epilepsy, Stroke, Brain tumors'
            },
            heart: {
                name: 'Heart',
                function: 'Muscular pump that circulates blood through the cardiovascular system, delivering oxygen and nutrients to tissues while removing carbon dioxide and waste.',
                weight: '~300 g (10.5 oz)',
                diseases: 'Coronary artery disease, Heart failure, Arrhythmia, Valve disorders'
            },
            leftLung: {
                name: 'Left Lung',
                function: 'Gas exchange organ with two lobes. Oxygen from inhaled air passes into the blood, while carbon dioxide passes from blood into the lungs to be exhaled.',
                weight: '~500 g (1.1 lbs)',
                diseases: 'Pneumonia, COPD, Asthma, Lung cancer, Pulmonary embolism'
            },
            rightLung: {
                name: 'Right Lung',
                function: 'Gas exchange organ with three lobes (larger than left). Performs the same respiratory function, handling about 55% of total lung capacity.',
                weight: '~600 g (1.3 lbs)',
                diseases: 'Pneumonia, COPD, Asthma, Lung cancer, Tuberculosis'
            },
            liver: {
                name: 'Liver',
                function: 'Largest internal organ. Detoxifies chemicals, metabolizes drugs, produces bile for digestion, synthesizes proteins, and stores glycogen for energy.',
                weight: '~1,500 g (3.3 lbs)',
                diseases: 'Hepatitis, Cirrhosis, Fatty liver disease, Liver cancer'
            },
            stomach: {
                name: 'Stomach',
                function: 'Muscular organ that receives food from the esophagus and breaks it down using acid and enzymes (gastric juice) through mechanical and chemical digestion.',
                weight: '~150 g (empty)',
                diseases: 'Gastritis, Peptic ulcers, GERD, Stomach cancer, Gastroparesis'
            },
            leftKidney: {
                name: 'Left Kidney',
                function: 'Filters blood to remove waste and excess fluid, producing urine. Regulates electrolytes, blood pressure, and red blood cell production.',
                weight: '~150 g (5.3 oz)',
                diseases: 'Kidney stones, Chronic kidney disease, Renal cancer, Pyelonephritis'
            },
            rightKidney: {
                name: 'Right Kidney',
                function: 'Works with left kidney to filter ~180 liters of blood daily. Positioned slightly lower than the left due to the liver above it.',
                weight: '~150 g (5.3 oz)',
                diseases: 'Kidney stones, Chronic kidney disease, Renal cancer, Polycystic kidney disease'
            },
            intestines: {
                name: 'Intestines',
                function: 'Small intestine (6m) absorbs nutrients from digested food. Large intestine (1.5m) absorbs water, forms and stores stool. Houses trillions of gut bacteria.',
                weight: '~2,000 g (combined)',
                diseases: 'Crohn\'s disease, Ulcerative colitis, IBS, Celiac disease, Colorectal cancer'
            },
            bladder: {
                name: 'Urinary Bladder',
                function: 'Hollow muscular organ that stores urine received from the kidneys via the ureters, until voluntary urination. Can hold 400-600 mL.',
                weight: '~50 g (empty)',
                diseases: 'Urinary tract infections, Bladder cancer, Overactive bladder, Interstitial cystitis'
            }
        };

        const organPaths = document.querySelectorAll('.organ-path');
        const infoPanel = document.getElementById('infoPanel');
        let currentGender = 'male';

        organPaths.forEach(path => {
            path.addEventListener('mouseenter', function() {
                const organName = this.dataset.organ;
                organPaths.forEach(p => {
                    if (p.dataset.organ !== organName) p.classList.add('dimmed');
                });
                this.classList.add('highlighted');
            });
            path.addEventListener('mouseleave', function() {
                organPaths.forEach(p => {
                    p.classList.remove('dimmed');
                    p.classList.remove('highlighted');
                });
            });
            path.addEventListener('click', function() {
                const data = organData[this.dataset.organ];
                if (!data) return;
                infoPanel.innerHTML = `
                    <h2>${data.name}</h2>
                    <div class="detail"><strong>Function:</strong> ${data.function}</div>
                    <div class="detail"><strong>Average Weight:</strong> ${data.weight}</div>
                    <div class="detail"><strong>Common Diseases:</strong> ${data.diseases}</div>
                `;
            });
        });

        function setGender(gender) {
            currentGender = gender;
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            // Visual indicator only — organ data is sex-neutral in this demo
            const svg = document.getElementById('anatomySvg');
            svg.style.filter = gender === 'female' ? 'hue-rotate(10deg)' : 'none';
        }
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
