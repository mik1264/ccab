<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viking Sunstone - Ancient Navigation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a2030; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(26, 32, 48, 0.9); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 12px 24px; border-radius: 12px;
            font-size: 0.9rem; text-align: center; max-width: 560px;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls {
            position: fixed; top: 60px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 10px;
            background: rgba(26,32,48,0.85); padding: 14px; border-radius: 12px;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls label { color: #FEFAE0; font-size: 0.8rem; display: flex; flex-direction: column; gap: 4px; }
        #controls input[type=range] { width: 140px; }
        #result {
            position: fixed; top: 60px; left: 20px;
            background: rgba(26,32,48,0.85); backdrop-filter: blur(10px);
            color: #DDA15E; padding: 14px; border-radius: 12px;
            font-size: 0.9rem; min-width: 180px;
            border: 1px solid rgba(221,161,94,0.3);
        }
        #result .big { font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="result">
        <div style="color:#8A9A5B;font-size:0.75rem">Sun Direction</div>
        <div class="big" id="sunDir">--</div>
        <div style="color:#8A9A5B;font-size:0.75rem;margin-top:8px">Crystal Match</div>
        <div id="matchVal" style="font-size:1.1rem">--%</div>
    </div>
    <div id="controls">
        <label>Cloud Cover
            <input type="range" id="cloudSlider" min="0" max="100" value="70">
        </label>
        <label>Rotate Crystal
            <input type="range" id="crystalSlider" min="0" max="360" value="0">
        </label>
        <label>Sun Position
            <input type="range" id="sunSlider" min="0" max="360" value="45">
        </label>
    </div>
    <div id="info">
        Rotate the <strong>calcite crystal</strong> to find the hidden sun. When the two birefringent images are equally bright, you've found the sun's direction. Vikings used Iceland spar to navigate cloudy North Atlantic skies.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H, cx, cy;

    let sunAngle = 45 * Math.PI / 180;
    let crystalAngle = 0;
    let cloudCover = 0.7;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cx = W / 2;
        cy = H / 2;
    }
    resize();
    window.addEventListener('resize', resize);

    function drawClouds(t) {
        // Overcast sky
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        const grayness = 0.3 + cloudCover * 0.5;
        skyGrad.addColorStop(0, `rgba(${120 + grayness * 80}, ${130 + grayness * 70}, ${150 + grayness * 60}, 1)`);
        skyGrad.addColorStop(1, `rgba(${80 + grayness * 60}, ${90 + grayness * 50}, ${110 + grayness * 40}, 1)`);
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, H);

        // Cloud layers
        for (let layer = 0; layer < 3; layer++) {
            ctx.globalAlpha = cloudCover * (0.2 + layer * 0.15);
            for (let i = 0; i < 12; i++) {
                const bx = ((i * 137 + layer * 200 + t * (20 + layer * 10)) % (W + 300)) - 150;
                const by = H * (0.1 + layer * 0.25) + Math.sin(i * 2.3 + layer) * 40;
                const bw = 150 + i * 20;
                const bh = 40 + i * 5;
                ctx.fillStyle = `rgba(${180 + layer * 20}, ${185 + layer * 15}, ${195 + layer * 10}, 0.7)`;
                ctx.beginPath();
                ctx.ellipse(bx, by, bw, bh, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.globalAlpha = 1;

        // Hidden sun glow (barely visible through clouds)
        const sunX = cx + Math.cos(sunAngle) * Math.min(W, H) * 0.35;
        const sunY = cy + Math.sin(sunAngle) * Math.min(W, H) * 0.35;
        const sunGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 80);
        sunGlow.addColorStop(0, `rgba(255,240,200,${0.15 * (1 - cloudCover * 0.8)})`);
        sunGlow.addColorStop(1, 'transparent');
        ctx.fillStyle = sunGlow;
        ctx.fillRect(sunX - 80, sunY - 80, 160, 160);
    }

    function drawPolarizationRings(t) {
        // Concentric polarization rings centered on sun
        const sunX = cx + Math.cos(sunAngle) * Math.min(W, H) * 0.35;
        const sunY = cy + Math.sin(sunAngle) * Math.min(W, H) * 0.35;

        ctx.globalAlpha = 0.05;
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 1;
        for (let r = 30; r < 400; r += 20) {
            ctx.beginPath();
            ctx.arc(sunX, sunY, r, 0, Math.PI * 2);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;
    }

    function drawCrystal(t) {
        const crystalSize = Math.min(W, H) * 0.18;
        ctx.save();
        ctx.translate(cx, cy);

        // Crystal outline (Iceland spar - rhombohedron shape)
        ctx.save();
        ctx.rotate(crystalAngle);

        // Crystal body (translucent)
        const cGrad = ctx.createLinearGradient(-crystalSize, -crystalSize * 0.6, crystalSize, crystalSize * 0.6);
        cGrad.addColorStop(0, 'rgba(220, 230, 240, 0.25)');
        cGrad.addColorStop(0.5, 'rgba(240, 245, 250, 0.35)');
        cGrad.addColorStop(1, 'rgba(210, 220, 235, 0.25)');
        ctx.fillStyle = cGrad;
        ctx.strokeStyle = 'rgba(200, 210, 225, 0.6)';
        ctx.lineWidth = 2;

        // Rhombus shape
        const rw = crystalSize;
        const rh = crystalSize * 0.6;
        const skew = crystalSize * 0.2;
        ctx.beginPath();
        ctx.moveTo(-rw + skew, -rh);
        ctx.lineTo(rw + skew, -rh);
        ctx.lineTo(rw - skew, rh);
        ctx.lineTo(-rw - skew, rh);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Internal cleavage lines
        ctx.strokeStyle = 'rgba(200, 210, 230, 0.15)';
        ctx.lineWidth = 0.5;
        for (let i = -3; i <= 3; i++) {
            ctx.beginPath();
            ctx.moveTo(i * rw * 0.3 + skew, -rh);
            ctx.lineTo(i * rw * 0.3 - skew, rh);
            ctx.stroke();
        }

        // Birefringent double images
        // The key: polarization angle relative to sun determines brightness ratio
        const polAngle = crystalAngle - sunAngle;
        const brightness1 = Math.cos(polAngle) ** 2;
        const brightness2 = Math.sin(polAngle) ** 2;

        // Ordinary ray image (dot)
        const imgOffset = crystalSize * 0.15;
        ctx.fillStyle = `rgba(255, 220, 150, ${brightness1 * 0.9 + 0.1})`;
        ctx.beginPath();
        ctx.arc(-imgOffset, -imgOffset * 0.5, 8 + brightness1 * 6, 0, Math.PI * 2);
        ctx.fill();
        if (brightness1 > 0.3) {
            const g1 = ctx.createRadialGradient(-imgOffset, -imgOffset * 0.5, 0, -imgOffset, -imgOffset * 0.5, 20);
            g1.addColorStop(0, `rgba(255, 240, 180, ${brightness1 * 0.4})`);
            g1.addColorStop(1, 'transparent');
            ctx.fillStyle = g1;
            ctx.fillRect(-imgOffset - 20, -imgOffset * 0.5 - 20, 40, 40);
        }

        // Extraordinary ray image (dot)
        ctx.fillStyle = `rgba(255, 220, 150, ${brightness2 * 0.9 + 0.1})`;
        ctx.beginPath();
        ctx.arc(imgOffset, imgOffset * 0.5, 8 + brightness2 * 6, 0, Math.PI * 2);
        ctx.fill();
        if (brightness2 > 0.3) {
            const g2 = ctx.createRadialGradient(imgOffset, imgOffset * 0.5, 0, imgOffset, imgOffset * 0.5, 20);
            g2.addColorStop(0, `rgba(255, 240, 180, ${brightness2 * 0.4})`);
            g2.addColorStop(1, 'transparent');
            ctx.fillStyle = g2;
            ctx.fillRect(imgOffset - 20, imgOffset * 0.5 - 20, 40, 40);
        }

        // Labels on images
        ctx.fillStyle = 'rgba(254,250,224,0.6)';
        ctx.font = '9px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText(`O: ${(brightness1 * 100).toFixed(0)}%`, -imgOffset, -imgOffset * 0.5 + 22);
        ctx.fillText(`E: ${(brightness2 * 100).toFixed(0)}%`, imgOffset, imgOffset * 0.5 + 22);

        // Crystal rotation indicator
        ctx.strokeStyle = 'rgba(221,161,94,0.4)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(-rw * 1.2, 0);
        ctx.lineTo(rw * 1.2, 0);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.restore();

        // Circular rotation guide
        ctx.strokeStyle = 'rgba(138,154,91,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, crystalSize * 1.3, 0, Math.PI * 2);
        ctx.stroke();

        // Angle tick marks
        for (let i = 0; i < 12; i++) {
            const a = i * Math.PI / 6;
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.beginPath();
            ctx.moveTo(Math.cos(a) * crystalSize * 1.25, Math.sin(a) * crystalSize * 1.25);
            ctx.lineTo(Math.cos(a) * crystalSize * 1.35, Math.sin(a) * crystalSize * 1.35);
            ctx.stroke();
        }

        ctx.restore();

        // Match indicator
        const match = 1 - Math.abs(brightness1 - brightness2);
        const matchPct = (match * 100).toFixed(0);
        document.getElementById('matchVal').textContent = matchPct + '%';
        document.getElementById('matchVal').style.color = match > 0.95 ? '#8A9A5B' : (match > 0.7 ? '#DDA15E' : '#BC6C25');

        const sunDeg = ((sunAngle * 180 / Math.PI) % 360 + 360) % 360;
        const dirs = ['E', 'SE', 'S', 'SW', 'W', 'NW', 'N', 'NE'];
        const dirIdx = Math.round(sunDeg / 45) % 8;
        document.getElementById('sunDir').textContent = `${sunDeg.toFixed(0)}° (${dirs[dirIdx]})`;

        if (match > 0.95) {
            ctx.fillStyle = '#8A9A5B';
            ctx.font = 'bold 16px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Sun found! Images balanced.', cx, cy - Math.min(W, H) * 0.25);
        }
    }

    function drawViking(t) {
        // Simple viking ship silhouette at bottom
        const shipY = H - 60;
        const shipX = W * 0.5;
        ctx.fillStyle = 'rgba(60, 50, 35, 0.6)';
        ctx.beginPath();
        ctx.moveTo(shipX - 80, shipY);
        ctx.quadraticCurveTo(shipX - 100, shipY + 20, shipX - 60, shipY + 25);
        ctx.lineTo(shipX + 60, shipY + 25);
        ctx.quadraticCurveTo(shipX + 100, shipY + 20, shipX + 80, shipY);
        ctx.closePath();
        ctx.fill();

        // Mast
        ctx.strokeStyle = 'rgba(60, 50, 35, 0.5)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(shipX, shipY);
        ctx.lineTo(shipX, shipY - 40);
        ctx.stroke();

        // Prow ornament
        ctx.beginPath();
        ctx.moveTo(shipX + 80, shipY);
        ctx.quadraticCurveTo(shipX + 95, shipY - 15, shipX + 85, shipY - 25);
        ctx.stroke();
    }

    document.getElementById('cloudSlider').addEventListener('input', e => {
        cloudCover = parseInt(e.target.value) / 100;
    });
    document.getElementById('crystalSlider').addEventListener('input', e => {
        crystalAngle = parseInt(e.target.value) * Math.PI / 180;
    });
    document.getElementById('sunSlider').addEventListener('input', e => {
        sunAngle = parseInt(e.target.value) * Math.PI / 180;
    });

    // Drag to rotate crystal
    let crystalDragging = false;
    canvas.addEventListener('mousedown', e => {
        const dx = e.clientX - cx;
        const dy = e.clientY - cy;
        if (Math.sqrt(dx * dx + dy * dy) < Math.min(W, H) * 0.25) {
            crystalDragging = true;
        }
    });
    canvas.addEventListener('mousemove', e => {
        if (crystalDragging) {
            crystalAngle = Math.atan2(e.clientY - cy, e.clientX - cx);
            document.getElementById('crystalSlider').value =
                ((crystalAngle * 180 / Math.PI) % 360 + 360) % 360;
        }
    });
    canvas.addEventListener('mouseup', () => { crystalDragging = false; });

    function draw(t) {
        const sec = t * 0.001;
        ctx.clearRect(0, 0, W, H);
        drawClouds(sec);
        drawPolarizationRings(sec);
        drawViking(sec);
        drawCrystal(sec);
        requestAnimationFrame(draw);
    }

    window.reset = function() {
        sunAngle = 45 * Math.PI / 180;
        crystalAngle = 0;
        cloudCover = 0.7;
        document.getElementById('cloudSlider').value = 70;
        document.getElementById('crystalSlider').value = 0;
        document.getElementById('sunSlider').value = 45;
    };

    requestAnimationFrame(draw);
    </script>
</body>
</html>
