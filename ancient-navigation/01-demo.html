<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polynesian Star Compass - Ancient Navigation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 14, 26, 0.85); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 12px 24px; border-radius: 12px;
            font-size: 0.9rem; text-align: center; max-width: 500px;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px;
        }
        #controls label { color: #FEFAE0; font-size: 0.8rem; }
        #controls input[type=range] { width: 120px; }
        .star-name {
            position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
            color: #DDA15E; font-size: 1.1rem; font-style: italic;
            text-align: center; pointer-events: none;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="star-name" id="starName"></div>
    <div id="controls">
        <label>Time: <input type="range" id="timeSlider" min="0" max="1440" value="0"></label>
        <label>Latitude: <input type="range" id="latSlider" min="-30" max="30" value="20"></label>
    </div>
    <div id="info">
        Click a house on the compass to see which stars rise there. Drag the time slider to rotate the sky. The <strong>32-house star compass</strong> was a mental map memorized by Polynesian navigators.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H, cx, cy, radius;
    let timeMinutes = 0;
    let latitude = 20;
    let selectedHouse = -1;
    let hoveredHouse = -1;
    let animating = true;
    let autoTime = true;

    const houseNames = [
        'Haka', 'Na Leo', 'Nalani', 'Manu', 'Noio', 'Hikina', "'Aina", 'Lā',
        'Hilo', 'Nā Hiku', 'Hōkūpaʻa', 'Makaliʻi', "'Akau", 'Hōkūleʻa', 'Keoe', 'Iwi',
        'Kona', 'Mālama', 'Aʻa', 'Humu', 'Leo', 'Komohana', 'Laʻa', 'Puana',
        'Newe', 'Ka Lua', 'Haka Paʻa', 'Maulili', 'Hema', 'Mōhai', 'Kiopa', 'ʻAuʻa'
    ];

    const navStars = [
        { name: 'Hōkūleʻa (Arcturus)', house: 13, mag: 0.0, color: '#FFD700' },
        { name: 'Ke Ali\'i (Polaris)', house: 12, mag: 2.0, color: '#E0E0FF' },
        { name: 'Hikianalia (Spica)', house: 5, mag: 1.0, color: '#AACCFF' },
        { name: 'Hānaiakamālama (S. Cross)', house: 28, mag: 1.3, color: '#FFCCAA' },
        { name: 'Ka Iwikuamo\'o (Scorpius)', house: 16, mag: 1.1, color: '#FF8866' },
        { name: 'Nā Hiku (Big Dipper)', house: 10, mag: 1.8, color: '#CCDDFF' },
        { name: 'Makali\'i (Pleiades)', house: 11, mag: 1.6, color: '#BBCCFF' },
        { name: 'Newe (Canopus)', house: 24, mag: -0.7, color: '#FFFFCC' },
        { name: '\'A\'ā (Sirius)', house: 18, mag: -1.5, color: '#FFFFFF' },
        { name: 'Keoe (Venus)', house: 14, mag: -4.0, color: '#FFEECC' },
        { name: 'Pīpīri (Rigel)', house: 19, mag: 0.1, color: '#CCDDFF' },
        { name: 'Kaulu (Aldebaran)', house: 9, mag: 0.9, color: '#FFAA77' },
        { name: 'Humu (Altair)', house: 19, mag: 0.8, color: '#EEEEFF' },
        { name: 'Kamāile (Capella)', house: 8, mag: 0.1, color: '#FFFFAA' },
        { name: 'Puanakau (Rigil Kent)', house: 27, mag: -0.3, color: '#FFDDAA' }
    ];

    const bgStars = [];
    for (let i = 0; i < 400; i++) {
        bgStars.push({
            angle: Math.random() * Math.PI * 2,
            dist: Math.random() * 0.95,
            size: Math.random() * 1.5 + 0.3,
            bright: Math.random() * 0.6 + 0.4,
            twinkleSpeed: Math.random() * 2 + 1
        });
    }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cx = W / 2;
        cy = H / 2;
        radius = Math.min(W, H) * 0.38;
    }
    resize();
    window.addEventListener('resize', resize);

    function getHouseAngle(i) {
        return (i * Math.PI * 2 / 32) - Math.PI / 2;
    }

    function drawSky(t) {
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H));
        grad.addColorStop(0, '#0d1429');
        grad.addColorStop(0.5, '#0a0e1a');
        grad.addColorStop(1, '#060810');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        const timeRad = (timeMinutes / 1440) * Math.PI * 2;
        bgStars.forEach(s => {
            const a = s.angle + timeRad;
            const x = cx + Math.cos(a) * s.dist * radius * 1.3;
            const y = cy + Math.sin(a) * s.dist * radius * 1.3;
            const twinkle = (Math.sin(t * s.twinkleSpeed + s.angle * 10) + 1) * 0.3 + 0.4;
            ctx.globalAlpha = s.bright * twinkle;
            ctx.fillStyle = '#FEFAE0';
            ctx.beginPath();
            ctx.arc(x, y, s.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
    }

    function drawCompass() {
        ctx.save();
        ctx.translate(cx, cy);

        // Outer ring
        ctx.strokeStyle = 'rgba(138,154,91,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(138,154,91,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, radius * 0.7, 0, Math.PI * 2);
        ctx.stroke();

        // Draw 32 houses
        for (let i = 0; i < 32; i++) {
            const a = getHouseAngle(i);
            const na = getHouseAngle(i + 1);
            const midA = (a + na) / 2;
            const isSelected = i === selectedHouse;
            const isHovered = i === hoveredHouse;
            const isCardinal = i % 8 === 0;

            // House line
            ctx.strokeStyle = isCardinal ? 'rgba(221,161,94,0.6)' : 'rgba(138,154,91,0.2)';
            ctx.lineWidth = isCardinal ? 2 : 1;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(a) * radius, Math.sin(a) * radius);
            ctx.stroke();

            // House arc highlight
            if (isSelected || isHovered) {
                ctx.fillStyle = isSelected ? 'rgba(221,161,94,0.15)' : 'rgba(138,154,91,0.08)';
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, a, na);
                ctx.closePath();
                ctx.fill();
            }

            // House name
            const labelR = radius + 18;
            const lx = Math.cos(midA) * labelR;
            const ly = Math.sin(midA) * labelR;
            ctx.save();
            ctx.translate(lx, ly);
            ctx.rotate(midA + Math.PI / 2);
            if (midA > Math.PI / 2 && midA < Math.PI * 1.5) {
                ctx.rotate(Math.PI);
            }
            ctx.fillStyle = isSelected ? '#DDA15E' : (isCardinal ? '#8A9A5B' : 'rgba(254,250,224,0.5)');
            ctx.font = isCardinal ? 'bold 10px Georgia' : '8px Georgia';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(houseNames[i], 0, 0);
            ctx.restore();
        }

        // Cardinal labels
        const cardinals = ['E (Hikina)', 'SE', 'S (Hema)', 'SW', 'W (Komohana)', 'NW', 'N (ʻAkau)', 'NE'];
        for (let i = 0; i < 8; i++) {
            const a = getHouseAngle(i * 4);
            const lx = Math.cos(a) * (radius * 0.55);
            const ly = Math.sin(a) * (radius * 0.55);
            ctx.fillStyle = '#DDA15E';
            ctx.font = 'bold 11px Georgia';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(cardinals[i], lx, ly);
        }

        // Center island
        ctx.fillStyle = 'rgba(96,108,56,0.3)';
        ctx.beginPath();
        ctx.arc(0, 0, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#606C38';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = '#8A9A5B';
        ctx.font = '8px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Canoe', 0, 3);

        ctx.restore();
    }

    function drawNavStars(t) {
        const timeRad = (timeMinutes / 1440) * Math.PI * 2;
        navStars.forEach(star => {
            const baseAngle = getHouseAngle(star.house);
            const a = baseAngle + timeRad * 0.3;
            const elevation = 0.3 + Math.sin(t * 0.2 + star.house) * 0.15;
            const r = radius * (0.3 + elevation * 0.5);
            const x = cx + Math.cos(a) * r;
            const y = cy + Math.sin(a) * r;

            const size = Math.max(2, 4 - star.mag * 0.5);
            const twinkle = (Math.sin(t * 3 + star.house * 2) + 1) * 0.15 + 0.85;

            // Glow
            const glow = ctx.createRadialGradient(x, y, 0, x, y, size * 4);
            glow.addColorStop(0, star.color);
            glow.addColorStop(1, 'transparent');
            ctx.globalAlpha = 0.3 * twinkle;
            ctx.fillStyle = glow;
            ctx.fillRect(x - size * 4, y - size * 4, size * 8, size * 8);

            // Star
            ctx.globalAlpha = twinkle;
            ctx.fillStyle = star.color;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();

            // Label for selected house stars
            if (selectedHouse === star.house) {
                ctx.fillStyle = '#FEFAE0';
                ctx.font = '10px Georgia';
                ctx.textAlign = 'center';
                ctx.fillText(star.name, x, y - size - 8);
            }
        });
        ctx.globalAlpha = 1;
    }

    function drawOceanSwells() {
        ctx.save();
        ctx.translate(cx, cy);
        const t = performance.now() * 0.001;
        for (let i = 0; i < 3; i++) {
            const a = (i * Math.PI * 2 / 3) + t * 0.1;
            ctx.strokeStyle = `rgba(138,154,91,${0.06 - i * 0.015})`;
            ctx.lineWidth = 1;
            for (let d = 20; d < radius * 0.4; d += 15) {
                ctx.beginPath();
                ctx.arc(
                    Math.cos(a) * d * 0.3,
                    Math.sin(a) * d * 0.3,
                    d, a - 0.5, a + 0.5
                );
                ctx.stroke();
            }
        }
        ctx.restore();
    }

    function getHouseFromMouse(mx, my) {
        const dx = mx - cx;
        const dy = my - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > radius * 1.3 || dist < 15) return -1;
        let angle = Math.atan2(dy, dx) + Math.PI / 2;
        if (angle < 0) angle += Math.PI * 2;
        return Math.floor((angle / (Math.PI * 2)) * 32) % 32;
    }

    canvas.addEventListener('mousemove', e => {
        hoveredHouse = getHouseFromMouse(e.clientX, e.clientY);
        canvas.style.cursor = hoveredHouse >= 0 ? 'pointer' : 'default';
    });

    canvas.addEventListener('click', e => {
        const h = getHouseFromMouse(e.clientX, e.clientY);
        selectedHouse = (h === selectedHouse) ? -1 : h;
        if (selectedHouse >= 0) {
            const stars = navStars.filter(s => s.house === selectedHouse);
            const names = stars.map(s => s.name).join(', ');
            document.getElementById('starName').textContent =
                `House: ${houseNames[selectedHouse]} — Stars: ${names || 'none tracked'}`;
        } else {
            document.getElementById('starName').textContent = '';
        }
    });

    document.getElementById('timeSlider').addEventListener('input', e => {
        timeMinutes = parseInt(e.target.value);
        autoTime = false;
    });
    document.getElementById('latSlider').addEventListener('input', e => {
        latitude = parseInt(e.target.value);
    });

    let lastT = 0;
    function draw(t) {
        if (!animating) { requestAnimationFrame(draw); return; }
        const sec = t * 0.001;

        if (autoTime) {
            timeMinutes = (timeMinutes + 0.15) % 1440;
            document.getElementById('timeSlider').value = Math.floor(timeMinutes);
        }

        drawSky(sec);
        drawOceanSwells();
        drawCompass();
        drawNavStars(sec);

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        timeMinutes = 0;
        latitude = 20;
        selectedHouse = -1;
        hoveredHouse = -1;
        autoTime = true;
        document.getElementById('timeSlider').value = 0;
        document.getElementById('latSlider').value = 20;
        document.getElementById('starName').textContent = '';
    };

    requestAnimationFrame(draw);
    </script>
</body>
</html>
