<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portolan Chart Navigator - Ancient Navigation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #2a2218; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(42, 34, 24, 0.9); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 12px 24px; border-radius: 12px;
            font-size: 0.9rem; text-align: center; max-width: 560px;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #route-data {
            position: fixed; top: 60px; right: 20px;
            background: rgba(42,34,24,0.85); backdrop-filter: blur(10px);
            color: #DDA15E; padding: 14px; border-radius: 12px;
            font-size: 0.85rem; min-width: 190px;
            border: 1px solid rgba(221,161,94,0.3);
        }
        #route-data .label { color: #8A9A5B; font-size: 0.7rem; text-transform: uppercase; }
        #route-data .val { font-size: 1rem; margin-bottom: 6px; }
        #controls {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100;
        }
        #controls button {
            background: rgba(96,108,56,0.5); color: #FEFAE0; border: 1px solid rgba(138,154,91,0.4);
            padding: 7px 16px; border-radius: 8px; cursor: pointer; font-family: Georgia; font-size: 0.8rem;
        }
        #controls button:hover { background: rgba(96,108,56,0.8); }
        #controls button.active { background: rgba(221,161,94,0.5); border-color: #DDA15E; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="route-data">
        <div class="label">From</div>
        <div class="val" id="fromPort">--</div>
        <div class="label">To</div>
        <div class="val" id="toPort">--</div>
        <div class="label">Rhumb Bearing</div>
        <div class="val" id="rhumBearing">--</div>
        <div class="label">Distance</div>
        <div class="val" id="routeDist">--</div>
        <div class="label">Wind Rose</div>
        <div class="val" id="windName">--</div>
    </div>
    <div id="controls">
        <button onclick="toggleRhumbs()" id="rhumbBtn" class="active">Rhumb Lines</button>
        <button onclick="toggleNames()">Port Names</button>
        <button onclick="clearRoute()">Clear Route</button>
        <button onclick="animateShip()">Sail Route</button>
    </div>
    <div id="info">
        <strong>Portolan charts</strong> (13th-15th century) crisscrossed the Mediterranean with <em>rhumb lines</em> radiating from compass roses. Click two ports to plot a course along the rhumb line bearing. Medieval navigators sailed these constant-heading routes.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    let showRhumbs = true;
    let showNames = true;
    let selectedPorts = [];
    let shipPos = null;
    let shipProgress = 0;
    let sailing = false;

    // Mediterranean ports (approximate screen positions 0-1)
    const ports = [
        { name: 'Genoa', x: 0.35, y: 0.28, major: true },
        { name: 'Venice', x: 0.44, y: 0.24, major: true },
        { name: 'Barcelona', x: 0.2, y: 0.35, major: true },
        { name: 'Marseille', x: 0.27, y: 0.3, major: false },
        { name: 'Naples', x: 0.43, y: 0.4, major: false },
        { name: 'Rome', x: 0.4, y: 0.36, major: false },
        { name: 'Palermo', x: 0.42, y: 0.47, major: false },
        { name: 'Tunis', x: 0.38, y: 0.52, major: false },
        { name: 'Tripoli', x: 0.45, y: 0.58, major: false },
        { name: 'Alexandria', x: 0.68, y: 0.56, major: true },
        { name: 'Constantinople', x: 0.65, y: 0.28, major: true },
        { name: 'Athens', x: 0.58, y: 0.38, major: true },
        { name: 'Crete', x: 0.6, y: 0.46, major: false },
        { name: 'Beirut', x: 0.78, y: 0.44, major: false },
        { name: 'Majorca', x: 0.22, y: 0.42, major: false },
        { name: 'Algiers', x: 0.25, y: 0.5, major: false },
        { name: 'Gibraltar', x: 0.1, y: 0.46, major: true },
        { name: 'Lisbon', x: 0.04, y: 0.38, major: true },
        { name: 'Dubrovnik', x: 0.5, y: 0.3, major: false },
        { name: 'Rhodes', x: 0.66, y: 0.42, major: false },
        { name: 'Cyprus', x: 0.74, y: 0.44, major: false },
        { name: 'Cadiz', x: 0.07, y: 0.48, major: false }
    ];

    // Wind rose centers for rhumb lines
    const windRoses = [
        { x: 0.3, y: 0.4 },
        { x: 0.55, y: 0.35 },
        { x: 0.7, y: 0.45 },
        { x: 0.15, y: 0.42 },
        { x: 0.45, y: 0.55 }
    ];

    // Simplified coastline points
    const coastlines = [
        // Iberian Peninsula south coast
        [0.04, 0.37, 0.08, 0.42, 0.1, 0.44, 0.15, 0.42, 0.18, 0.38, 0.2, 0.33],
        // French/Italian Riviera
        [0.2, 0.33, 0.25, 0.28, 0.3, 0.26, 0.35, 0.27, 0.38, 0.3],
        // Italian peninsula
        [0.38, 0.3, 0.4, 0.33, 0.42, 0.36, 0.43, 0.42, 0.41, 0.48],
        // North Africa
        [0.08, 0.5, 0.15, 0.52, 0.25, 0.53, 0.35, 0.55, 0.45, 0.6, 0.55, 0.62, 0.65, 0.58, 0.72, 0.56],
        // Greece/Turkey
        [0.52, 0.28, 0.55, 0.3, 0.57, 0.35, 0.56, 0.4, 0.6, 0.42, 0.63, 0.3, 0.67, 0.26, 0.7, 0.3, 0.75, 0.35, 0.78, 0.4],
        // Adriatic
        [0.44, 0.22, 0.46, 0.25, 0.48, 0.28, 0.5, 0.3, 0.52, 0.28]
    ];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function drawParchment() {
        // Aged parchment background
        const grad = ctx.createRadialGradient(cx(), cy(), 0, cx(), cy(), Math.max(W, H) * 0.7);
        grad.addColorStop(0, '#D4C5A0');
        grad.addColorStop(0.5, '#C8B890');
        grad.addColorStop(1, '#B8A878');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Parchment texture (subtle noise via overlapping circles)
        ctx.globalAlpha = 0.03;
        for (let i = 0; i < 200; i++) {
            ctx.fillStyle = i % 2 === 0 ? '#8B7B5B' : '#A89B7B';
            ctx.beginPath();
            ctx.arc(Math.random() * W, Math.random() * H, Math.random() * 30 + 5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Burnt edges
        ctx.fillStyle = 'rgba(60, 40, 20, 0.15)';
        ctx.fillRect(0, 0, 15, H);
        ctx.fillRect(W - 15, 0, 15, H);
        ctx.fillRect(0, 0, W, 15);
        ctx.fillRect(0, H - 15, W, 15);
    }

    function cx() { return W / 2; }
    function cy() { return H / 2; }

    function drawCoastlines() {
        ctx.strokeStyle = '#5B4B35';
        ctx.lineWidth = 2;
        ctx.fillStyle = 'rgba(180, 200, 160, 0.2)';

        coastlines.forEach(coast => {
            ctx.beginPath();
            for (let i = 0; i < coast.length; i += 2) {
                const x = coast[i] * W;
                const y = coast[i + 1] * H;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        });

        // Sea coloring
        ctx.fillStyle = 'rgba(120, 150, 170, 0.08)';
        ctx.fillRect(0, 0, W, H);
    }

    function drawRhumbLines() {
        if (!showRhumbs) return;

        const windNames = ['Tramontana (N)', 'Greco (NE)', 'Levante (E)', 'Scirocco (SE)',
                           'Ostro (S)', 'Libeccio (SW)', 'Ponente (W)', 'Maestro (NW)'];
        const colors = ['#CC3333', '#CC6633', '#CC9933', '#999933',
                        '#339933', '#336699', '#333399', '#663399'];

        windRoses.forEach(rose => {
            const rx = rose.x * W;
            const ry = rose.y * H;

            // 16 rhumb lines from each wind rose
            for (let i = 0; i < 16; i++) {
                const a = i * Math.PI / 8;
                const colorIdx = Math.floor(i / 2) % 8;
                const isPrimary = i % 2 === 0;

                ctx.strokeStyle = isPrimary ? colors[colorIdx] : 'rgba(100, 80, 60, 0.15)';
                ctx.lineWidth = isPrimary ? 1 : 0.5;
                ctx.globalAlpha = isPrimary ? 0.3 : 0.15;

                ctx.beginPath();
                ctx.moveTo(rx, ry);
                ctx.lineTo(rx + Math.cos(a) * Math.max(W, H), ry + Math.sin(a) * Math.max(W, H));
                ctx.stroke();
            }

            // Wind rose center
            ctx.globalAlpha = 0.4;
            ctx.fillStyle = '#8B6B45';
            ctx.beginPath();
            ctx.arc(rx, ry, 4, 0, Math.PI * 2);
            ctx.fill();

            // Small compass rose decoration
            ctx.strokeStyle = '#CC3333';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(rx, ry - 8);
            ctx.lineTo(rx, ry + 8);
            ctx.moveTo(rx - 8, ry);
            ctx.lineTo(rx + 8, ry);
            ctx.stroke();
        });
        ctx.globalAlpha = 1;
    }

    function drawPorts() {
        ports.forEach((port, i) => {
            const x = port.x * W;
            const y = port.y * H;
            const isSelected = selectedPorts.includes(i);

            // Port dot
            ctx.fillStyle = isSelected ? '#CC3333' : (port.major ? '#5B4B35' : '#8B7B5B');
            ctx.beginPath();
            ctx.arc(x, y, isSelected ? 6 : (port.major ? 4 : 3), 0, Math.PI * 2);
            ctx.fill();

            if (isSelected) {
                ctx.strokeStyle = '#CC3333';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(x, y, 10, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Name label
            if (showNames || isSelected || port.major) {
                ctx.fillStyle = isSelected ? '#CC3333' : '#4B3B25';
                ctx.font = (port.major ? 'bold ' : '') + '10px Georgia';
                ctx.textAlign = 'center';
                ctx.fillText(port.name, x, y - 10);
            }
        });
    }

    function drawRoute() {
        if (selectedPorts.length === 2) {
            const p1 = ports[selectedPorts[0]];
            const p2 = ports[selectedPorts[1]];
            const x1 = p1.x * W, y1 = p1.y * H;
            const x2 = p2.x * W, y2 = p2.y * H;

            // Route line
            ctx.strokeStyle = '#CC3333';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 4]);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Bearing and distance
            const dx = x2 - x1;
            const dy = y2 - y1;
            const bearing = ((Math.atan2(-dy, dx) * 180 / Math.PI) + 90 + 360) % 360;
            const dist = Math.sqrt(dx * dx + dy * dy) / (W * 0.01); // arbitrary nm scale

            document.getElementById('fromPort').textContent = p1.name;
            document.getElementById('toPort').textContent = p2.name;
            document.getElementById('rhumBearing').textContent = bearing.toFixed(0) + '°';
            document.getElementById('routeDist').textContent = dist.toFixed(0) + ' nm';

            // Wind name
            const windNames = ['N Tramontana', 'NE Greco', 'E Levante', 'SE Scirocco',
                               'S Ostro', 'SW Libeccio', 'W Ponente', 'NW Maestro'];
            const windIdx = Math.round(bearing / 45) % 8;
            document.getElementById('windName').textContent = windNames[windIdx];

            // Ship
            if (sailing && shipProgress < 1) {
                const sx = x1 + (x2 - x1) * shipProgress;
                const sy = y1 + (y2 - y1) * shipProgress;
                drawShipIcon(sx, sy, Math.atan2(dy, dx));
                shipProgress += 0.003;
            } else if (shipProgress >= 1) {
                sailing = false;
                drawShipIcon(x2, y2, Math.atan2(dy, dx));
            }
        }
    }

    function drawShipIcon(x, y, angle) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle - Math.PI / 2);

        ctx.fillStyle = '#5B3B15';
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(-5, 6);
        ctx.lineTo(0, 4);
        ctx.lineTo(5, 6);
        ctx.closePath();
        ctx.fill();

        // Cross on sail (medieval)
        ctx.strokeStyle = '#CC3333';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, -6);
        ctx.lineTo(0, 2);
        ctx.moveTo(-3, -2);
        ctx.lineTo(3, -2);
        ctx.stroke();

        ctx.restore();
    }

    function drawTitle() {
        ctx.fillStyle = 'rgba(91, 75, 53, 0.4)';
        ctx.font = 'italic 14px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Carta Navigatoria del Mare Mediterraneo', W / 2, 30);
    }

    canvas.addEventListener('click', e => {
        const mx = e.clientX;
        const my = e.clientY;
        let closest = -1;
        let closestDist = 30;

        ports.forEach((p, i) => {
            const dx = mx - p.x * W;
            const dy = my - p.y * H;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < closestDist) {
                closestDist = d;
                closest = i;
            }
        });

        if (closest >= 0) {
            if (selectedPorts.includes(closest)) {
                selectedPorts = selectedPorts.filter(p => p !== closest);
            } else if (selectedPorts.length < 2) {
                selectedPorts.push(closest);
            } else {
                selectedPorts = [closest];
            }
            sailing = false;
            shipProgress = 0;
        }
    });

    function toggleRhumbs() {
        showRhumbs = !showRhumbs;
        document.getElementById('rhumbBtn').classList.toggle('active', showRhumbs);
    }
    function toggleNames() { showNames = !showNames; }
    function clearRoute() {
        selectedPorts = [];
        sailing = false;
        shipProgress = 0;
        document.getElementById('fromPort').textContent = '--';
        document.getElementById('toPort').textContent = '--';
        document.getElementById('rhumBearing').textContent = '--';
        document.getElementById('routeDist').textContent = '--';
        document.getElementById('windName').textContent = '--';
    }
    function animateShip() {
        if (selectedPorts.length === 2) {
            sailing = true;
            shipProgress = 0;
        }
    }

    function draw(t) {
        ctx.clearRect(0, 0, W, H);
        drawParchment();
        drawCoastlines();
        drawRhumbLines();
        drawPorts();
        drawRoute();
        drawTitle();
        requestAnimationFrame(draw);
    }

    window.reset = function() {
        clearRoute();
        showRhumbs = true;
        showNames = true;
    };

    requestAnimationFrame(draw);
    </script>
</body>
</html>
