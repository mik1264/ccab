<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamal Latitude Finder - Ancient Navigation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 14, 26, 0.85); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 12px 24px; border-radius: 12px;
            font-size: 0.9rem; text-align: center; max-width: 540px;
            border: 1px solid rgba(138,154,91,0.3);
        }
        #reading {
            position: fixed; top: 60px; right: 20px;
            background: rgba(10, 14, 26, 0.85); backdrop-filter: blur(10px);
            color: #DDA15E; padding: 14px 20px; border-radius: 12px;
            font-size: 1rem; text-align: right; min-width: 180px;
            border: 1px solid rgba(221,161,94,0.3);
        }
        #reading .val { font-size: 1.8rem; font-weight: bold; }
        #reading .label { font-size: 0.75rem; color: #8A9A5B; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="reading">
        <div class="label">Measured Altitude</div>
        <div class="val" id="altVal">--&deg;</div>
        <div class="label">Polaris Altitude = Your Latitude</div>
        <div class="val" id="latVal">--&deg;</div>
        <div class="label" id="knotLabel">String knots: --</div>
    </div>
    <div id="info">
        Drag the <strong>kamal card</strong> up and down to align: bottom edge on the horizon, top edge on Polaris. The string length (knots) gives your latitude. Arab navigators used this since the 9th century.
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    // Kamal state
    let cardY = 0;
    let cardWidth = 80;
    let cardHeight = 50;
    let dragging = false;
    let dragOffsetY = 0;
    let targetLatitude = 24; // Actual latitude
    let stringLength = 200;

    // Horizon line
    let horizonY;

    // Polaris position
    let polarisY;

    // Background stars
    const stars = [];
    for (let i = 0; i < 300; i++) {
        stars.push({
            x: Math.random(),
            y: Math.random() * 0.6,
            size: Math.random() * 1.5 + 0.3,
            bright: Math.random() * 0.5 + 0.5,
            twinklePhase: Math.random() * Math.PI * 2
        });
    }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        horizonY = H * 0.65;
        polarisY = horizonY - (targetLatitude / 90) * (horizonY - 40);
        if (cardY === 0) cardY = H * 0.4;
        cardWidth = Math.min(100, W * 0.08);
        cardHeight = cardWidth * 0.6;
    }
    resize();
    window.addEventListener('resize', resize);

    function drawSky(t) {
        // Sky gradient
        const grad = ctx.createLinearGradient(0, 0, 0, horizonY);
        grad.addColorStop(0, '#050812');
        grad.addColorStop(0.7, '#0d1429');
        grad.addColorStop(1, '#1a2040');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, horizonY);

        // Stars
        stars.forEach(s => {
            const twinkle = (Math.sin(t * 2 + s.twinklePhase) + 1) * 0.25 + 0.5;
            ctx.globalAlpha = s.bright * twinkle;
            ctx.fillStyle = '#FEFAE0';
            ctx.beginPath();
            ctx.arc(s.x * W, s.y * H, s.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Polaris (bright, labeled)
        const polarisX = W * 0.5;
        const glow = ctx.createRadialGradient(polarisX, polarisY, 0, polarisX, polarisY, 20);
        glow.addColorStop(0, '#FFFFCC');
        glow.addColorStop(0.3, 'rgba(255,255,200,0.3)');
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.fillRect(polarisX - 20, polarisY - 20, 40, 40);

        ctx.fillStyle = '#FFFFCC';
        ctx.beginPath();
        ctx.arc(polarisX, polarisY, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#8A9A5B';
        ctx.font = '11px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Polaris', polarisX, polarisY - 12);

        // Altitude angle indicator
        const altDeg = targetLatitude;
        ctx.fillStyle = 'rgba(138,154,91,0.4)';
        ctx.font = '10px Georgia';
        ctx.fillText(`True: ${altDeg.toFixed(1)}° above horizon`, polarisX, polarisY - 24);
    }

    function drawOcean(t) {
        // Ocean
        const oGrad = ctx.createLinearGradient(0, horizonY, 0, H);
        oGrad.addColorStop(0, '#0f1a30');
        oGrad.addColorStop(0.3, '#0a1225');
        oGrad.addColorStop(1, '#060a18');
        ctx.fillStyle = oGrad;
        ctx.fillRect(0, horizonY, W, H - horizonY);

        // Horizon line
        ctx.strokeStyle = 'rgba(138,154,91,0.4)';
        ctx.lineWidth = 1;
        ctx.setLineDash([8, 4]);
        ctx.beginPath();
        ctx.moveTo(0, horizonY);
        ctx.lineTo(W, horizonY);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = '#606C38';
        ctx.font = '11px Georgia';
        ctx.textAlign = 'left';
        ctx.fillText('Horizon', 10, horizonY - 6);

        // Gentle waves
        ctx.strokeStyle = 'rgba(138,154,91,0.1)';
        ctx.lineWidth = 1;
        for (let row = 0; row < 5; row++) {
            const wy = horizonY + 30 + row * 25;
            ctx.beginPath();
            for (let x = 0; x < W; x += 5) {
                const y = wy + Math.sin(x * 0.02 + t + row) * 3;
                if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }
    }

    function drawKamal(t) {
        const cardX = W * 0.5;
        const mouthX = W * 0.5;
        const mouthY = H * 0.82;

        // String from mouth to card
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(mouthX, mouthY);
        ctx.lineTo(cardX, cardY);
        ctx.stroke();

        // String knots
        const dx = cardX - mouthX;
        const dy = cardY - mouthY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const numKnots = Math.max(1, Math.floor(dist / 25));
        for (let i = 1; i <= numKnots; i++) {
            const frac = i / (numKnots + 1);
            const kx = mouthX + dx * frac;
            const ky = mouthY + dy * frac;
            ctx.fillStyle = '#BC6C25';
            ctx.beginPath();
            ctx.arc(kx, ky, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        document.getElementById('knotLabel').textContent = `String knots: ${numKnots}`;

        // Card (wooden rectangle)
        ctx.save();
        ctx.translate(cardX, cardY);
        const woodGrad = ctx.createLinearGradient(-cardWidth / 2, -cardHeight / 2, cardWidth / 2, cardHeight / 2);
        woodGrad.addColorStop(0, '#8B6914');
        woodGrad.addColorStop(0.5, '#A0782C');
        woodGrad.addColorStop(1, '#8B6914');
        ctx.fillStyle = woodGrad;
        ctx.strokeStyle = '#6B5010';
        ctx.lineWidth = 2;

        const r = 4;
        ctx.beginPath();
        ctx.roundRect(-cardWidth / 2, -cardHeight / 2, cardWidth, cardHeight, r);
        ctx.fill();
        ctx.stroke();

        // Center hole for string
        ctx.fillStyle = '#4a3808';
        ctx.beginPath();
        ctx.arc(0, 0, 3, 0, Math.PI * 2);
        ctx.fill();

        // Wood grain lines
        ctx.strokeStyle = 'rgba(107,80,16,0.3)';
        ctx.lineWidth = 0.5;
        for (let i = -cardWidth / 2 + 5; i < cardWidth / 2; i += 8) {
            ctx.beginPath();
            ctx.moveTo(i, -cardHeight / 2);
            ctx.lineTo(i + 3, cardHeight / 2);
            ctx.stroke();
        }

        ctx.restore();

        // Mouth indicator
        ctx.fillStyle = '#DDA15E';
        ctx.beginPath();
        ctx.arc(mouthX, mouthY, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#8A9A5B';
        ctx.font = '10px Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('String in teeth', mouthX, mouthY + 18);

        // Calculate measured angle
        const cardTopY = cardY - cardHeight / 2;
        const cardBottomY = cardY + cardHeight / 2;
        const measuredAlt = ((horizonY - cardTopY) / (horizonY - 40)) * 90;
        const horizonAlign = Math.abs(cardBottomY - horizonY);
        const polarisAlign = Math.abs(cardTopY - polarisY);

        document.getElementById('altVal').textContent = measuredAlt.toFixed(1) + '°';
        document.getElementById('latVal').textContent = measuredAlt.toFixed(1) + '° N';

        // Alignment indicators
        if (horizonAlign < 8) {
            ctx.fillStyle = 'rgba(138,154,91,0.7)';
            ctx.font = '10px Georgia';
            ctx.textAlign = 'right';
            ctx.fillText('Horizon aligned', cardX - cardWidth / 2 - 10, cardBottomY);
        }
        if (polarisAlign < 8) {
            ctx.fillStyle = 'rgba(221,161,94,0.7)';
            ctx.font = '10px Georgia';
            ctx.textAlign = 'right';
            ctx.fillText('Polaris aligned', cardX - cardWidth / 2 - 10, cardTopY);
        }
        if (horizonAlign < 8 && polarisAlign < 8) {
            ctx.fillStyle = '#8A9A5B';
            ctx.font = 'bold 14px Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Perfect reading!', cardX, cardY - cardHeight / 2 - 20);
        }
    }

    canvas.addEventListener('mousedown', e => {
        const cardX = W * 0.5;
        const dx = e.clientX - cardX;
        const dy = e.clientY - cardY;
        if (Math.abs(dx) < cardWidth && Math.abs(dy) < cardHeight) {
            dragging = true;
            dragOffsetY = dy;
        }
    });
    canvas.addEventListener('mousemove', e => {
        if (dragging) {
            cardY = Math.max(40, Math.min(horizonY + 20, e.clientY - dragOffsetY));
        }
    });
    canvas.addEventListener('mouseup', () => { dragging = false; });

    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const touch = e.touches[0];
        const cardX = W * 0.5;
        const dx = touch.clientX - cardX;
        const dy = touch.clientY - cardY;
        if (Math.abs(dx) < cardWidth * 1.5 && Math.abs(dy) < cardHeight * 1.5) {
            dragging = true;
            dragOffsetY = dy;
        }
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (dragging) {
            cardY = Math.max(40, Math.min(horizonY + 20, e.touches[0].clientY - dragOffsetY));
        }
    }, { passive: false });
    canvas.addEventListener('touchend', () => { dragging = false; });

    function draw(t) {
        const sec = t * 0.001;
        ctx.clearRect(0, 0, W, H);
        drawSky(sec);
        drawOcean(sec);
        drawKamal(sec);
        requestAnimationFrame(draw);
    }

    window.reset = function() {
        cardY = H * 0.4;
        targetLatitude = 24;
        polarisY = horizonY - (targetLatitude / 90) * (horizonY - 40);
    };

    requestAnimationFrame(draw);
    </script>
</body>
</html>
