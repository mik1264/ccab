<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forsythe Lines - Dance Choreography</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; cursor: crosshair; }
a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
#info {
    position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.75rem;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    padding: 10px 14px; border-radius: 12px; max-width: 220px; z-index: 100; line-height: 1.5;
}
#info h3 { color: #DDA15E; margin-bottom: 4px; font-size: 0.85rem; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 100;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 10px 16px;
}
.ctrl-btn {
    padding: 6px 14px; border: 2px solid rgba(138,154,91,0.4); border-radius: 8px;
    background: rgba(96,108,56,0.2); color: #FEFAE0; cursor: pointer;
    font-size: 0.75rem; font-weight: 600; transition: all 0.2s;
}
.ctrl-btn:hover, .ctrl-btn.active { background: rgba(221,161,94,0.4); border-color: #DDA15E; }
</style>
</head>
<body>
<a href="index.html" class="back">&larr; Back</a>
<canvas id="canvas"></canvas>
<div id="info">
    <h3>Forsythe Lines</h3>
    <p>Inspired by William Forsythe's Improvisation Technologies. Move your mouse to trace invisible geometric lines in space. The dancer's body creates extending lines, arcs, and planes.</p>
</div>
<div id="controls">
    <button class="ctrl-btn active" data-mode="extend">Extend Lines</button>
    <button class="ctrl-btn" data-mode="arc">Arc Traces</button>
    <button class="ctrl-btn" data-mode="plane">Plane Sweep</button>
    <button class="ctrl-btn" data-mode="fold">Fold/Unfold</button>
    <button class="ctrl-btn" id="clearBtn">Clear</button>
</div>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let mouseX = W / 2, mouseY = H / 2;
let mode = 'extend';
let lines = [];
let t = 0;

canvas.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
}, { passive: false });

document.querySelectorAll('.ctrl-btn[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
        mode = btn.dataset.mode;
        document.querySelectorAll('.ctrl-btn[data-mode]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
});
document.getElementById('clearBtn').addEventListener('click', () => { lines = []; });

class ForsytheDancer {
    constructor() {
        this.joints = {};
        this.prevJoints = {};
    }

    update(mx, my) {
        this.prevJoints = { ...this.joints };
        const cx = W / 2;
        const cy = H / 2;
        const scale = Math.min(W, H) * 0.15;

        // Dancer reacts to mouse position
        const dx = (mx - cx) / W;
        const dy = (my - cy) / H;
        const reach = Math.hypot(dx, dy);

        const headX = cx + dx * scale * 0.3;
        const headY = cy - scale * 1.3 + dy * scale * 0.2;
        const shoulderY = cy - scale * 0.9;
        const hipY = cy + scale * 0.1;

        // Arms reach toward mouse
        const armReach = 0.5 + reach * 1.5;
        this.joints = {
            head: { x: headX, y: headY },
            neck: { x: cx + dx * scale * 0.2, y: shoulderY + scale * 0.05 },
            lShoulder: { x: cx - scale * 0.35, y: shoulderY },
            rShoulder: { x: cx + scale * 0.35, y: shoulderY },
            lHand: {
                x: cx - scale * 0.35 + (mx - cx) * 0.3 * armReach - scale * 0.3,
                y: shoulderY + (my - shoulderY) * 0.25 * armReach
            },
            rHand: {
                x: cx + scale * 0.35 + (mx - cx) * 0.4 * armReach,
                y: shoulderY + (my - shoulderY) * 0.3 * armReach
            },
            hip: { x: cx, y: hipY },
            lFoot: { x: cx - scale * 0.3, y: cy + scale * 0.7 },
            rFoot: { x: cx + scale * 0.3 + dx * scale * 0.2, y: cy + scale * 0.7 }
        };
    }

    draw() {
        const j = this.joints;
        ctx.strokeStyle = 'rgba(254,250,224,0.5)';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';

        const drawLimb = (a, b) => {
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
        };

        // Body
        drawLimb(j.neck, j.hip);
        drawLimb(j.lShoulder, j.rShoulder);
        drawLimb(j.lShoulder, j.lHand);
        drawLimb(j.rShoulder, j.rHand);
        drawLimb(j.hip, j.lFoot);
        drawLimb(j.hip, j.rFoot);

        // Head
        ctx.fillStyle = 'rgba(254,250,224,0.5)';
        ctx.beginPath();
        ctx.arc(j.head.x, j.head.y, 10, 0, Math.PI * 2);
        ctx.fill();
    }

    getGeometricLines() {
        const j = this.joints;
        const result = [];

        if (mode === 'extend') {
            // Extend limb lines beyond joints
            const extensions = [
                [j.lShoulder, j.lHand],
                [j.rShoulder, j.rHand],
                [j.hip, j.lFoot],
                [j.hip, j.rFoot],
                [j.neck, j.head]
            ];
            for (const [a, b] of extensions) {
                const dx = b.x - a.x;
                const dy = b.y - a.y;
                const len = Math.hypot(dx, dy);
                if (len > 5) {
                    const ext = 3;
                    result.push({
                        x1: b.x, y1: b.y,
                        x2: b.x + (dx / len) * len * ext,
                        y2: b.y + (dy / len) * len * ext,
                        color: '#DDA15E'
                    });
                }
            }
        } else if (mode === 'arc') {
            // Arc traces from hand movements
            result.push({
                type: 'arc',
                cx: (j.lHand.x + j.rHand.x) / 2,
                cy: (j.lHand.y + j.rHand.y) / 2,
                r: Math.hypot(j.lHand.x - j.rHand.x, j.lHand.y - j.rHand.y) / 2,
                startAngle: Math.atan2(j.lHand.y - (j.lHand.y + j.rHand.y) / 2, j.lHand.x - (j.lHand.x + j.rHand.x) / 2),
                color: '#8A9A5B'
            });
        } else if (mode === 'plane') {
            // Plane sweep between limbs
            result.push({
                type: 'plane',
                points: [j.lHand, j.head, j.rHand, j.hip],
                color: 'rgba(221,161,94,0.1)'
            });
        } else if (mode === 'fold') {
            // Fold lines - symmetry axes
            const midX = (j.lHand.x + j.rHand.x) / 2;
            const midY = (j.lHand.y + j.rHand.y) / 2;
            result.push({
                x1: midX, y1: midY - 200,
                x2: midX, y2: midY + 200,
                color: '#606C38'
            });
            result.push({
                x1: j.head.x, y1: j.head.y,
                x2: j.hip.x + (j.hip.x - j.head.x), y2: j.hip.y + (j.hip.y - j.head.y),
                color: '#606C38'
            });
        }

        return result;
    }
}

const dancer = new ForsytheDancer();
let lastTime = performance.now();

function animate(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    t += dt;

    // Fade trail
    ctx.fillStyle = 'rgba(26,26,46,0.06)';
    ctx.fillRect(0, 0, W, H);

    dancer.update(mouseX, mouseY);

    // Draw geometric lines
    const geoLines = dancer.getGeometricLines();
    for (const line of geoLines) {
        if (line.type === 'arc') {
            ctx.strokeStyle = line.color;
            ctx.lineWidth = 1.5;
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.arc(line.cx, line.cy, line.r, line.startAngle, line.startAngle + Math.PI);
            ctx.stroke();
            ctx.globalAlpha = 1;
        } else if (line.type === 'plane') {
            ctx.fillStyle = line.color;
            ctx.beginPath();
            ctx.moveTo(line.points[0].x, line.points[0].y);
            for (let i = 1; i < line.points.length; i++) {
                ctx.lineTo(line.points[i].x, line.points[i].y);
            }
            ctx.closePath();
            ctx.fill();
        } else {
            ctx.strokeStyle = line.color;
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.5;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(line.x1, line.y1);
            ctx.lineTo(line.x2, line.y2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;

            // Accumulate persistent lines
            lines.push({ x1: line.x1, y1: line.y1, x2: line.x2, y2: line.y2, color: line.color, alpha: 0.3 });
        }
    }

    // Draw persistent lines fading
    for (let i = lines.length - 1; i >= 0; i--) {
        const l = lines[i];
        l.alpha -= 0.002;
        if (l.alpha <= 0) { lines.splice(i, 1); continue; }
        ctx.strokeStyle = l.color;
        ctx.globalAlpha = l.alpha;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(l.x1, l.y1);
        ctx.lineTo(l.x2, l.y2);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Keep line count manageable
    if (lines.length > 500) lines.splice(0, lines.length - 500);

    dancer.draw();

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

window.reset = function() {
    lines = [];
    t = 0;
    ctx.clearRect(0, 0, W, H);
};
</script>
</body>
</html>
