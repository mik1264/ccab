<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choreographic Score - Dance Choreography</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; cursor: crosshair; }
a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
#toolbar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 100; flex-wrap: wrap; justify-content: center;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 10px 14px; max-width: 90vw;
}
.tool-btn {
    padding: 5px 12px; border: 2px solid rgba(138,154,91,0.4); border-radius: 8px;
    background: rgba(96,108,56,0.2); color: #FEFAE0; cursor: pointer;
    font-size: 0.7rem; font-weight: 600; transition: all 0.2s;
}
.tool-btn:hover, .tool-btn.active { background: rgba(221,161,94,0.4); border-color: #DDA15E; }
#info {
    position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.7rem;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    padding: 10px 14px; border-radius: 12px; max-width: 200px; z-index: 100; line-height: 1.5;
}
#info h3 { color: #DDA15E; margin-bottom: 4px; font-size: 0.85rem; }
</style>
</head>
<body>
<a href="index.html" class="back">&larr; Back</a>
<canvas id="canvas"></canvas>
<div id="info">
    <h3>Choreographic Score</h3>
    <p>A timeline-based dance notation editor. Each lane represents a body part or dancer. Click to place movement events. Use the playhead to preview the sequence.</p>
</div>
<div id="toolbar">
    <button class="tool-btn active" data-tool="move">Move</button>
    <button class="tool-btn" data-tool="jump">Jump</button>
    <button class="tool-btn" data-tool="turn">Turn</button>
    <button class="tool-btn" data-tool="gesture">Gesture</button>
    <button class="tool-btn" data-tool="pause">Stillness</button>
    <button class="tool-btn" data-tool="floor">Floor Work</button>
    <button class="tool-btn" id="playBtn">Play</button>
    <button class="tool-btn" id="clearBtn">Clear</button>
</div>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const lanes = ['Head/Arms', 'Torso', 'Legs/Feet', 'Travel Path', 'Energy Level'];
const laneColors = ['#DDA15E', '#8A9A5B', '#BC6C25', '#606C38', '#FEFAE0'];
const measures = 16;
let currentTool = 'move';
let events = [];
let playing = false;
let playheadPos = 0;
let playSpeed = 0;

const toolSymbols = {
    move: { shape: 'arrow', label: 'M' },
    jump: { shape: 'up', label: 'J' },
    turn: { shape: 'spin', label: 'T' },
    gesture: { shape: 'wave', label: 'G' },
    pause: { shape: 'dot', label: 'S' },
    floor: { shape: 'low', label: 'F' }
};

const toolColors = {
    move: '#DDA15E',
    jump: '#FEFAE0',
    turn: '#8A9A5B',
    gesture: '#BC6C25',
    pause: '#606C38',
    floor: '#a3b55c'
};

document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => {
        currentTool = btn.dataset.tool;
        document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
});

document.getElementById('playBtn').addEventListener('click', function() {
    playing = !playing;
    if (playing) { playheadPos = 0; playSpeed = 1; }
    this.textContent = playing ? 'Stop' : 'Play';
});

document.getElementById('clearBtn').addEventListener('click', () => {
    events = [];
    playing = false;
    playheadPos = 0;
    document.getElementById('playBtn').textContent = 'Play';
});

function getTimelineArea() {
    const left = 100;
    const right = W - 40;
    const top = 60;
    const bottom = H - 120;
    return { left, right, top, bottom, width: right - left, height: bottom - top };
}

function getLaneY(laneIdx) {
    const area = getTimelineArea();
    const laneH = area.height / lanes.length;
    return area.top + laneIdx * laneH;
}

function getMeasureX(measure) {
    const area = getTimelineArea();
    return area.left + (measure / measures) * area.width;
}

canvas.addEventListener('click', (e) => {
    if (playing) return;
    const mx = e.clientX, my = e.clientY;
    const area = getTimelineArea();

    if (mx < area.left || mx > area.right || my < area.top || my > area.bottom) return;

    const laneH = area.height / lanes.length;
    const laneIdx = Math.floor((my - area.top) / laneH);
    if (laneIdx < 0 || laneIdx >= lanes.length) return;

    const measure = ((mx - area.left) / area.width) * measures;
    const snappedMeasure = Math.round(measure * 2) / 2; // Snap to half measures

    // Check if clicking on existing event to remove it
    for (let i = events.length - 1; i >= 0; i--) {
        const ev = events[i];
        if (ev.lane === laneIdx && Math.abs(ev.measure - snappedMeasure) < 0.3) {
            events.splice(i, 1);
            return;
        }
    }

    events.push({
        lane: laneIdx,
        measure: snappedMeasure,
        tool: currentTool,
        duration: 1
    });
});

function drawTimeline() {
    const area = getTimelineArea();
    const laneH = area.height / lanes.length;

    // Lane backgrounds
    for (let i = 0; i < lanes.length; i++) {
        const y = getLaneY(i);
        ctx.fillStyle = i % 2 === 0 ? 'rgba(254,250,224,0.03)' : 'rgba(254,250,224,0.01)';
        ctx.fillRect(area.left, y, area.width, laneH);

        // Lane label
        ctx.fillStyle = laneColors[i];
        ctx.globalAlpha = 0.6;
        ctx.font = '11px "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(lanes[i], area.left - 8, y + laneH / 2 + 4);
        ctx.globalAlpha = 1;

        // Lane line
        ctx.strokeStyle = 'rgba(138,154,91,0.1)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(area.left, y);
        ctx.lineTo(area.right, y);
        ctx.stroke();
    }

    // Bottom line
    ctx.beginPath();
    ctx.moveTo(area.left, area.bottom);
    ctx.lineTo(area.right, area.bottom);
    ctx.stroke();

    // Measure lines and numbers
    for (let m = 0; m <= measures; m++) {
        const x = getMeasureX(m);
        ctx.strokeStyle = m % 4 === 0 ? 'rgba(221,161,94,0.3)' : 'rgba(138,154,91,0.1)';
        ctx.lineWidth = m % 4 === 0 ? 1.5 : 0.5;
        ctx.beginPath();
        ctx.moveTo(x, area.top);
        ctx.lineTo(x, area.bottom);
        ctx.stroke();

        if (m < measures) {
            ctx.fillStyle = m % 4 === 0 ? 'rgba(221,161,94,0.5)' : 'rgba(254,250,224,0.2)';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(m + 1, x + (area.width / measures) / 2, area.top - 8);
        }
    }

    // Phrase markers
    ctx.fillStyle = 'rgba(254,250,224,0.15)';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    for (let p = 0; p < measures / 4; p++) {
        const px = getMeasureX(p * 4) + (area.width / measures) * 2;
        ctx.fillText(`A${p + 1}`, px, area.top - 20);
    }
}

function drawEvent(ev) {
    const area = getTimelineArea();
    const laneH = area.height / lanes.length;
    const x = getMeasureX(ev.measure);
    const y = getLaneY(ev.lane) + laneH / 2;
    const eventW = (area.width / measures) * ev.duration;
    const color = toolColors[ev.tool];

    // Event block
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.3;
    ctx.fillRect(x, getLaneY(ev.lane) + 4, eventW, laneH - 8);
    ctx.globalAlpha = 1;

    // Border
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x, getLaneY(ev.lane) + 4, eventW, laneH - 8);

    // Symbol
    const sym = toolSymbols[ev.tool];
    ctx.fillStyle = color;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';

    switch (sym.shape) {
        case 'arrow':
            ctx.beginPath();
            ctx.moveTo(x + 8, y);
            ctx.lineTo(x + 20, y - 6);
            ctx.lineTo(x + 20, y - 2);
            ctx.lineTo(x + 28, y - 2);
            ctx.lineTo(x + 28, y + 2);
            ctx.lineTo(x + 20, y + 2);
            ctx.lineTo(x + 20, y + 6);
            ctx.closePath();
            ctx.fill();
            break;
        case 'up':
            ctx.beginPath();
            ctx.moveTo(x + 18, y - 8);
            ctx.lineTo(x + 12, y);
            ctx.lineTo(x + 24, y);
            ctx.closePath();
            ctx.fill();
            ctx.fillRect(x + 15, y, 6, 8);
            break;
        case 'spin':
            ctx.beginPath();
            ctx.arc(x + 18, y, 7, 0, Math.PI * 1.5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + 18, y - 7);
            ctx.lineTo(x + 22, y - 4);
            ctx.lineTo(x + 14, y - 4);
            ctx.closePath();
            ctx.fill();
            break;
        case 'wave':
            ctx.beginPath();
            for (let wx = 0; wx < 20; wx++) {
                const wy = Math.sin(wx * 0.5) * 5;
                if (wx === 0) ctx.moveTo(x + 8 + wx, y + wy);
                else ctx.lineTo(x + 8 + wx, y + wy);
            }
            ctx.stroke();
            break;
        case 'dot':
            ctx.beginPath();
            ctx.arc(x + 18, y, 5, 0, Math.PI * 2);
            ctx.fill();
            break;
        case 'low':
            ctx.fillRect(x + 10, y + 2, 16, 4);
            ctx.fillRect(x + 8, y - 2, 3, 6);
            ctx.fillRect(x + 25, y - 2, 3, 6);
            break;
    }
}

function drawPlayhead() {
    if (!playing && playheadPos === 0) return;
    const area = getTimelineArea();
    const x = area.left + (playheadPos / measures) * area.width;

    ctx.strokeStyle = '#FEFAE0';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, area.top - 5);
    ctx.lineTo(x, area.bottom + 5);
    ctx.stroke();

    // Triangle head
    ctx.fillStyle = '#FEFAE0';
    ctx.beginPath();
    ctx.moveTo(x, area.top - 5);
    ctx.lineTo(x - 6, area.top - 12);
    ctx.lineTo(x + 6, area.top - 12);
    ctx.closePath();
    ctx.fill();
}

function drawPreviewFigure() {
    if (!playing) return;
    const previewX = W - 140;
    const previewY = H / 2;
    const s = 25;

    // Gather active events at current position
    const activeEvents = events.filter(ev =>
        playheadPos >= ev.measure && playheadPos < ev.measure + ev.duration
    );

    let headOffset = 0, bodyBend = 0, legSpread = 0, yOffset = 0, rotation = 0;
    for (const ev of activeEvents) {
        switch (ev.tool) {
            case 'move': headOffset += 5; break;
            case 'jump': yOffset -= 15; break;
            case 'turn': rotation += Math.PI * 0.3; break;
            case 'gesture': headOffset += 10; break;
            case 'pause': break;
            case 'floor': yOffset += 20; bodyBend = 0.5; break;
        }
    }

    ctx.save();
    ctx.translate(previewX, previewY + yOffset);
    ctx.rotate(rotation);

    // Stick figure
    ctx.strokeStyle = 'rgba(254,250,224,0.6)';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    // Head
    ctx.fillStyle = 'rgba(254,250,224,0.6)';
    ctx.beginPath();
    ctx.arc(headOffset, -s * 1.5, s * 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Spine
    ctx.beginPath();
    ctx.moveTo(0, -s * 1.2);
    ctx.quadraticCurveTo(bodyBend * s, -s * 0.5, 0, 0);
    ctx.stroke();

    // Arms
    const armWave = Math.sin(playheadPos * 3) * s * 0.3;
    ctx.beginPath();
    ctx.moveTo(-s * 0.8, -s * 0.8 + armWave);
    ctx.lineTo(0, -s);
    ctx.lineTo(s * 0.8 + headOffset, -s * 0.8 - armWave);
    ctx.stroke();

    // Legs
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-s * 0.5 - legSpread, s * 0.8);
    ctx.moveTo(0, 0);
    ctx.lineTo(s * 0.5 + legSpread, s * 0.8);
    ctx.stroke();

    ctx.restore();

    ctx.fillStyle = 'rgba(254,250,224,0.3)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Preview', previewX, previewY + s * 1.5);
}

let lastTime = performance.now();

function animate(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    if (playing) {
        playheadPos += dt * 2; // 2 measures per second
        if (playheadPos >= measures) {
            playheadPos = 0;
        }
    }

    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    // Title
    ctx.fillStyle = 'rgba(254,250,224,0.15)';
    ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Choreographic Score', W / 2, 35);

    drawTimeline();

    for (const ev of events) drawEvent(ev);

    drawPlayhead();
    drawPreviewFigure();

    // Event count
    ctx.fillStyle = 'rgba(254,250,224,0.3)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`${events.length} events | ${measures} measures`, 10, H - 10);

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

window.reset = function() {
    events = [];
    playing = false;
    playheadPos = 0;
    document.getElementById('playBtn').textContent = 'Play';
};
</script>
</body>
</html>
