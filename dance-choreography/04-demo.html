<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contra Dance Caller - Dance Choreography</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; }
a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
#callout {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #FEFAE0; font-size: 1.6rem; font-weight: 700;
    text-align: center; pointer-events: none; z-index: 100;
    text-shadow: 0 2px 20px rgba(0,0,0,0.7);
    opacity: 0; transition: opacity 0.3s;
}
#callout.visible { opacity: 1; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 100;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 10px 16px;
}
.ctrl-btn {
    padding: 8px 16px; border: 2px solid rgba(138,154,91,0.4); border-radius: 8px;
    background: rgba(96,108,56,0.2); color: #FEFAE0; cursor: pointer;
    font-size: 0.8rem; font-weight: 600; transition: all 0.2s;
}
.ctrl-btn:hover { background: rgba(221,161,94,0.4); border-color: #DDA15E; }
#phrase {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    color: #8A9A5B; font-size: 0.8rem; z-index: 100;
    background: rgba(254,250,224,0.08); padding: 6px 14px; border-radius: 8px;
}
</style>
</head>
<body>
<a href="index.html" class="back">&larr; Back</a>
<canvas id="canvas"></canvas>
<div id="callout"></div>
<div id="phrase"></div>
<div id="controls">
    <button class="ctrl-btn" id="speedDown">Slower</button>
    <button class="ctrl-btn" id="togglePlay">Pause</button>
    <button class="ctrl-btn" id="speedUp">Faster</button>
    <button class="ctrl-btn" id="nextDance">Next Dance</button>
</div>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const calloutEl = document.getElementById('callout');
const phraseEl = document.getElementById('phrase');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let paused = false;
let speed = 1;
let danceIndex = 0;

document.getElementById('togglePlay').addEventListener('click', function() {
    paused = !paused;
    this.textContent = paused ? 'Play' : 'Pause';
});
document.getElementById('speedDown').addEventListener('click', () => { speed = Math.max(0.25, speed - 0.25); });
document.getElementById('speedUp').addEventListener('click', () => { speed = Math.min(3, speed + 0.25); });
document.getElementById('nextDance').addEventListener('click', () => { danceIndex = (danceIndex + 1) % dances.length; t = 0; });

// Contra dance figures
const figures = {
    doSiDo: function(dancers, i, j, progress) {
        const cx = (dancers[i].homeX + dancers[j].homeX) / 2;
        const cy = (dancers[i].homeY + dancers[j].homeY) / 2;
        const r = Math.hypot(dancers[i].homeX - cx, dancers[i].homeY - cy) * 1.2;
        const a1 = Math.atan2(dancers[i].homeY - cy, dancers[i].homeX - cx);
        const a2 = Math.atan2(dancers[j].homeY - cy, dancers[j].homeX - cx);
        dancers[i].x = cx + Math.cos(a1 + progress * Math.PI * 2) * r;
        dancers[i].y = cy + Math.sin(a1 + progress * Math.PI * 2) * r;
        dancers[j].x = cx + Math.cos(a2 + progress * Math.PI * 2) * r;
        dancers[j].y = cy + Math.sin(a2 + progress * Math.PI * 2) * r;
    },
    swing: function(dancers, i, j, progress) {
        const cx = (dancers[i].homeX + dancers[j].homeX) / 2;
        const cy = (dancers[i].homeY + dancers[j].homeY) / 2;
        const r = 20;
        dancers[i].x = cx + Math.cos(progress * Math.PI * 4) * r;
        dancers[i].y = cy + Math.sin(progress * Math.PI * 4) * r;
        dancers[j].x = cx + Math.cos(progress * Math.PI * 4 + Math.PI) * r;
        dancers[j].y = cy + Math.sin(progress * Math.PI * 4 + Math.PI) * r;
    },
    chain: function(dancers, progress) {
        // Grand chain - all dancers weave
        const n = dancers.length;
        for (let i = 0; i < n; i++) {
            const offset = i * (1 / n);
            const p = (progress + offset) % 1;
            const col = dancers[i].col;
            const dir = col === 0 ? 1 : -1;
            const startY = dancers[i].homeY;
            const amplitude = 40;
            dancers[i].x = dancers[i].homeX + Math.sin(p * Math.PI * 2) * amplitude * dir;
            dancers[i].y = startY + (p - 0.5) * 60 * dir;
        }
    },
    allemande: function(dancers, i, j, progress) {
        const cx = (dancers[i].homeX + dancers[j].homeX) / 2;
        const cy = (dancers[i].homeY + dancers[j].homeY) / 2;
        const r = 25;
        const turns = 1.5;
        dancers[i].x = cx + Math.cos(progress * Math.PI * 2 * turns) * r;
        dancers[i].y = cy + Math.sin(progress * Math.PI * 2 * turns) * r;
        dancers[j].x = cx + Math.cos(progress * Math.PI * 2 * turns + Math.PI) * r;
        dancers[j].y = cy + Math.sin(progress * Math.PI * 2 * turns + Math.PI) * r;
    },
    balance: function(dancers, i, progress) {
        const p = Math.sin(progress * Math.PI * 2) * 15;
        dancers[i].x = dancers[i].homeX + p;
    }
};

const dances = [
    {
        name: 'Improper Contra',
        sequence: [
            { call: 'Balance & Swing partner', duration: 2, fn: (d, p) => { figures.swing(d, 0, 1, p); figures.swing(d, 2, 3, p); figures.swing(d, 4, 5, p); figures.swing(d, 6, 7, p); } },
            { call: 'Do-si-do neighbor', duration: 2, fn: (d, p) => { figures.doSiDo(d, 0, 3, p); figures.doSiDo(d, 1, 2, p); figures.doSiDo(d, 4, 7, p); figures.doSiDo(d, 5, 6, p); } },
            { call: 'Allemande left neighbor', duration: 1.5, fn: (d, p) => { figures.allemande(d, 0, 3, p); figures.allemande(d, 1, 2, p); figures.allemande(d, 4, 7, p); figures.allemande(d, 5, 6, p); } },
            { call: 'Grand chain down the hall', duration: 2, fn: (d, p) => { figures.chain(d, p); } },
            { call: 'Balance & Swing partner', duration: 2, fn: (d, p) => { for (let i = 0; i < 8; i++) figures.balance(d, i, p); } },
        ]
    },
    {
        name: 'Proper Contra',
        sequence: [
            { call: 'Forward and back', duration: 1.5, fn: (d, p) => { for (let i = 0; i < 8; i++) { const dir = d[i].col === 0 ? 1 : -1; d[i].x = d[i].homeX + Math.sin(p * Math.PI) * 30 * dir; } } },
            { call: 'Do-si-do partner', duration: 2, fn: (d, p) => { figures.doSiDo(d, 0, 1, p); figures.doSiDo(d, 2, 3, p); figures.doSiDo(d, 4, 5, p); figures.doSiDo(d, 6, 7, p); } },
            { call: 'Swing neighbor', duration: 2, fn: (d, p) => { figures.swing(d, 0, 3, p); figures.swing(d, 1, 2, p); figures.swing(d, 4, 7, p); figures.swing(d, 5, 6, p); } },
            { call: 'Allemande right partner', duration: 1.5, fn: (d, p) => { figures.allemande(d, 0, 1, p); figures.allemande(d, 2, 3, p); figures.allemande(d, 4, 5, p); figures.allemande(d, 6, 7, p); } },
            { call: 'Grand chain', duration: 2, fn: (d, p) => { figures.chain(d, p); } },
        ]
    },
    {
        name: 'Becket Contra',
        sequence: [
            { call: 'Circle left', duration: 2, fn: (d, p) => { for (let g = 0; g < 2; g++) { const cx = W / 2; const cy = H * 0.3 + g * H * 0.3; const r = 45; for (let i = g * 4; i < g * 4 + 4; i++) { const a = ((i - g * 4) / 4) * Math.PI * 2 + p * Math.PI * 2; d[i].x = cx + Math.cos(a) * r; d[i].y = cy + Math.sin(a) * r; } } } },
            { call: 'Balance & Swing neighbor', duration: 2, fn: (d, p) => { figures.swing(d, 0, 3, p); figures.swing(d, 1, 2, p); figures.swing(d, 4, 7, p); figures.swing(d, 5, 6, p); } },
            { call: 'Long lines forward & back', duration: 1.5, fn: (d, p) => { for (let i = 0; i < 8; i++) { const dir = d[i].col === 0 ? 1 : -1; d[i].x = d[i].homeX + Math.sin(p * Math.PI) * 35 * dir; } } },
            { call: 'Allemande right partner', duration: 1.5, fn: (d, p) => { figures.allemande(d, 0, 1, p); figures.allemande(d, 2, 3, p); figures.allemande(d, 4, 5, p); figures.allemande(d, 6, 7, p); } },
            { call: 'Do-si-do neighbor', duration: 2, fn: (d, p) => { figures.doSiDo(d, 0, 3, p); figures.doSiDo(d, 1, 2, p); figures.doSiDo(d, 4, 7, p); figures.doSiDo(d, 5, 6, p); } },
        ]
    }
];

// 8 dancers: 4 pairs in two lines
function createDancers() {
    const dancers = [];
    const cx = W / 2;
    const spacing = 70;
    const lineGap = 80;
    for (let row = 0; row < 4; row++) {
        const y = H * 0.25 + row * spacing;
        // Left line (col 0) - leads
        dancers.push({ x: cx - lineGap, y, homeX: cx - lineGap, homeY: y, col: 0, gender: 'lead', pair: row });
        // Right line (col 1) - follows
        dancers.push({ x: cx + lineGap, y, homeX: cx + lineGap, homeY: y, col: 1, gender: 'follow', pair: row });
    }
    return dancers;
}

let dancers = createDancers();
let t = 0;
let lastTime = performance.now();

function getCurrentFigure() {
    const dance = dances[danceIndex];
    let elapsed = 0;
    const totalDuration = dance.sequence.reduce((s, f) => s + f.duration, 0);
    const loopT = t % totalDuration;
    for (let i = 0; i < dance.sequence.length; i++) {
        const fig = dance.sequence[i];
        if (loopT < elapsed + fig.duration) {
            const progress = (loopT - elapsed) / fig.duration;
            return { ...fig, progress, index: i };
        }
        elapsed += fig.duration;
    }
    return { ...dance.sequence[0], progress: 0, index: 0 };
}

function drawDancer(d) {
    const isLead = d.gender === 'lead';
    const color = isLead ? '#DDA15E' : '#8A9A5B';
    const size = 14;

    // Glow
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(d.x, d.y, size, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Label
    ctx.fillStyle = '#1a1a2e';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(isLead ? 'L' : 'F', d.x, d.y + 4);
}

function animate(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    if (!paused) t += dt * speed;

    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    // Reset to home positions
    for (const d of dancers) {
        d.x = d.homeX;
        d.y = d.homeY;
    }

    const fig = getCurrentFigure();
    fig.fn(dancers, fig.progress);

    // Draw lines between facing partners
    ctx.strokeStyle = 'rgba(254,250,224,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 8; i += 2) {
        ctx.beginPath();
        ctx.moveTo(dancers[i].x, dancers[i].y);
        ctx.lineTo(dancers[i + 1].x, dancers[i + 1].y);
        ctx.stroke();
    }

    // Line markers
    ctx.fillStyle = 'rgba(254,250,224,0.1)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Leads Line', W / 2 - 80, H * 0.18);
    ctx.fillText('Follows Line', W / 2 + 80, H * 0.18);

    for (const d of dancers) drawDancer(d);

    // Callout
    calloutEl.textContent = fig.call;
    calloutEl.className = 'visible';

    // Phrase indicator
    const dance = dances[danceIndex];
    phraseEl.textContent = `${dance.name} - Figure ${fig.index + 1}/${dance.sequence.length} (Speed: ${speed}x)`;

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

window.reset = function() {
    t = 0;
    speed = 1;
    paused = false;
    danceIndex = 0;
    dancers = createDancers();
    document.getElementById('togglePlay').textContent = 'Pause';
};
</script>
</body>
</html>
