<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benesh Notation Staff - Dance Choreography</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; cursor: crosshair; }
a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
#toolbar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 100; flex-wrap: wrap; justify-content: center;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 10px 16px;
}
.tool-btn {
    padding: 6px 14px; border: 2px solid rgba(138,154,91,0.4); border-radius: 8px;
    background: rgba(96,108,56,0.2); color: #FEFAE0; cursor: pointer;
    font-size: 0.75rem; font-weight: 600; transition: all 0.2s;
}
.tool-btn:hover, .tool-btn.active { background: rgba(221,161,94,0.4); border-color: #DDA15E; }
#info {
    position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.75rem;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    padding: 10px 14px; border-radius: 12px; max-width: 200px; z-index: 100; line-height: 1.5;
}
#info h3 { color: #DDA15E; margin-bottom: 4px; font-size: 0.85rem; }
</style>
</head>
<body>
<a href="index.html" class="back">&larr; Back</a>
<canvas id="canvas"></canvas>
<div id="info">
    <h3>Benesh Notation</h3>
    <p>Click on the staff to place body position markers. The 5 lines represent: head, shoulders, waist, knees, feet (top to bottom). Select a symbol type below.</p>
</div>
<div id="toolbar">
    <button class="tool-btn active" data-tool="dot">Position</button>
    <button class="tool-btn" data-tool="cross">Cross (behind)</button>
    <button class="tool-btn" data-tool="line">Line (contact)</button>
    <button class="tool-btn" data-tool="curve">Curve (arc)</button>
    <button class="tool-btn" data-tool="clear">Clear All</button>
    <button class="tool-btn" data-tool="play">Play &raquo;</button>
</div>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const staffLineNames = ['Head', 'Shoulders', 'Waist', 'Knees', 'Feet'];
let currentTool = 'dot';
let notations = [];
let playIndex = -1;
let playTimer = 0;
let playing = false;

const staffTop = () => H * 0.2;
const staffBottom = () => H * 0.7;
const staffLineSpacing = () => (staffBottom() - staffTop()) / 4;
const staffLeft = () => W * 0.08;
const staffRight = () => W * 0.92;
const measureWidth = () => (staffRight() - staffLeft()) / 8;

function getStaffY(lineIndex) {
    return staffTop() + lineIndex * staffLineSpacing();
}

function snapToStaff(x, y) {
    const sl = staffLeft();
    const mw = measureWidth();
    const measure = Math.round((x - sl) / mw);
    const snappedX = sl + measure * mw;

    let closestLine = 0;
    let minDist = Infinity;
    for (let i = 0; i < 5; i++) {
        const ly = getStaffY(i);
        const d = Math.abs(y - ly);
        if (d < minDist) { minDist = d; closestLine = i; }
    }
    const betweenLines = (y - getStaffY(closestLine)) / staffLineSpacing();
    const snappedBetween = Math.round(betweenLines * 2) / 2;
    const snappedY = getStaffY(closestLine) + snappedBetween * staffLineSpacing();

    return { x: Math.max(sl, Math.min(staffRight(), snappedX)), y: snappedY, measure, line: closestLine };
}

// Toolbar
document.querySelectorAll('.tool-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const tool = btn.dataset.tool;
        if (tool === 'clear') { notations = []; playIndex = -1; playing = false; return; }
        if (tool === 'play') { playing = !playing; playIndex = playing ? 0 : -1; playTimer = 0; btn.textContent = playing ? 'Stop' : 'Play \u00BB'; return; }
        currentTool = tool;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
});

canvas.addEventListener('click', (e) => {
    if (playing) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const snap = snapToStaff(mx, my);
    notations.push({ ...snap, tool: currentTool, id: Date.now() });
    notations.sort((a, b) => a.x - b.x);
});

function drawStaff() {
    ctx.strokeStyle = 'rgba(138,154,91,0.5)';
    ctx.lineWidth = 1.5;

    for (let i = 0; i < 5; i++) {
        const y = getStaffY(i);
        ctx.beginPath();
        ctx.moveTo(staffLeft(), y);
        ctx.lineTo(staffRight(), y);
        ctx.stroke();

        ctx.fillStyle = 'rgba(254,250,224,0.4)';
        ctx.font = '11px "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(staffLineNames[i], staffLeft() - 10, y + 4);
    }

    // Bar lines
    ctx.strokeStyle = 'rgba(221,161,94,0.3)';
    ctx.lineWidth = 1;
    const mw = measureWidth();
    for (let i = 0; i <= 8; i++) {
        const x = staffLeft() + i * mw;
        ctx.beginPath();
        ctx.moveTo(x, staffTop() - 10);
        ctx.lineTo(x, staffBottom() + 10);
        ctx.stroke();
    }

    // Measure numbers
    ctx.fillStyle = 'rgba(221,161,94,0.5)';
    ctx.textAlign = 'center';
    ctx.font = '10px "Segoe UI", system-ui, sans-serif';
    for (let i = 0; i < 8; i++) {
        ctx.fillText(i + 1, staffLeft() + (i + 0.5) * mw, staffTop() - 16);
    }
}

function drawNotation(n, highlight) {
    const size = highlight ? 10 : 7;
    ctx.globalAlpha = highlight ? 1 : 0.85;

    switch (n.tool) {
        case 'dot':
            ctx.fillStyle = highlight ? '#FEFAE0' : '#DDA15E';
            ctx.beginPath();
            ctx.arc(n.x, n.y, size, 0, Math.PI * 2);
            ctx.fill();
            break;
        case 'cross':
            ctx.strokeStyle = highlight ? '#FEFAE0' : '#8A9A5B';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(n.x - size, n.y - size);
            ctx.lineTo(n.x + size, n.y + size);
            ctx.moveTo(n.x + size, n.y - size);
            ctx.lineTo(n.x - size, n.y + size);
            ctx.stroke();
            break;
        case 'line':
            ctx.strokeStyle = highlight ? '#FEFAE0' : '#DDA15E';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(n.x - size * 1.2, n.y);
            ctx.lineTo(n.x + size * 1.2, n.y);
            ctx.stroke();
            break;
        case 'curve':
            ctx.strokeStyle = highlight ? '#FEFAE0' : '#606C38';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(n.x, n.y + size * 0.5, size, Math.PI, 0);
            ctx.stroke();
            break;
    }
    ctx.globalAlpha = 1;
}

function drawFigure(notes) {
    if (notes.length === 0) return;
    const figX = W / 2;
    const figBaseY = staffBottom() + (H - staffBottom()) / 2;
    const figScale = Math.min(W, H) * 0.06;

    // Simple stick figure based on notation positions
    const bodyParts = { head: null, shoulders: null, waist: null, knees: null, feet: null };
    for (const n of notes) {
        const lineIdx = Math.round((n.y - staffTop()) / staffLineSpacing());
        const clamped = Math.max(0, Math.min(4, lineIdx));
        const key = ['head', 'shoulders', 'waist', 'knees', 'feet'][clamped];
        const xOffset = (n.x - (staffLeft() + staffRight()) / 2) / (staffRight() - staffLeft());
        bodyParts[key] = { offset: xOffset, tool: n.tool };
    }

    const headY = figBaseY - figScale * 4;
    const shoulderY = figBaseY - figScale * 3;
    const waistY = figBaseY - figScale * 1.5;
    const kneeY = figBaseY - figScale * 0.3;
    const feetY = figBaseY + figScale * 0.5;

    ctx.strokeStyle = 'rgba(254,250,224,0.6)';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    // Spine
    ctx.beginPath();
    ctx.moveTo(figX, headY + figScale * 0.5);
    ctx.lineTo(figX, waistY);
    ctx.stroke();

    // Arms
    const armSpread = bodyParts.shoulders ? (0.5 + bodyParts.shoulders.offset) * figScale * 3 : figScale * 1.5;
    ctx.beginPath();
    ctx.moveTo(figX - armSpread, shoulderY + figScale * 0.3);
    ctx.lineTo(figX, shoulderY);
    ctx.lineTo(figX + armSpread, shoulderY + figScale * 0.3);
    ctx.stroke();

    // Legs
    const legSpread = bodyParts.knees ? Math.abs(bodyParts.knees.offset) * figScale * 2 + figScale * 0.5 : figScale * 0.8;
    ctx.beginPath();
    ctx.moveTo(figX, waistY);
    ctx.lineTo(figX - legSpread, feetY);
    ctx.moveTo(figX, waistY);
    ctx.lineTo(figX + legSpread, feetY);
    ctx.stroke();

    // Head
    ctx.fillStyle = 'rgba(254,250,224,0.7)';
    ctx.beginPath();
    ctx.arc(figX, headY, figScale * 0.45, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(254,250,224,0.4)';
    ctx.font = '11px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Figure Preview', figX, feetY + 20);
}

let lastTime = performance.now();

function animate(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    drawStaff();

    // Draw notations
    const currentMeasureNotes = [];
    for (let i = 0; i < notations.length; i++) {
        const highlight = playing && i === playIndex;
        drawNotation(notations[i], highlight);
        if (playing && i === playIndex) {
            currentMeasureNotes.push(notations[i]);
        }
    }

    // Gather notes around current play position for figure
    if (playing && notations.length > 0) {
        playTimer += dt;
        if (playTimer > 0.5) {
            playTimer = 0;
            playIndex++;
            if (playIndex >= notations.length) { playIndex = 0; }
        }
        const pn = notations[playIndex];
        if (pn) {
            // Playhead
            ctx.strokeStyle = 'rgba(221,161,94,0.6)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(pn.x, staffTop() - 20);
            ctx.lineTo(pn.x, staffBottom() + 20);
            ctx.stroke();
            ctx.setLineDash([]);

            const nearby = notations.filter(n => Math.abs(n.x - pn.x) < measureWidth() * 0.6);
            drawFigure(nearby);
        }
    } else if (notations.length > 0) {
        drawFigure(notations.slice(-5));
    }

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

window.reset = function() {
    notations = [];
    playIndex = -1;
    playing = false;
    const playBtn = document.querySelector('[data-tool="play"]');
    if (playBtn) playBtn.textContent = 'Play \u00BB';
};
</script>
</body>
</html>
