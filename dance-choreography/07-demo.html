<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dance Polyrhythm - Dance Choreography</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; }
a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 100; flex-wrap: wrap; justify-content: center;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 10px 16px;
}
.ctrl-btn {
    padding: 6px 14px; border: 2px solid rgba(138,154,91,0.4); border-radius: 8px;
    background: rgba(96,108,56,0.2); color: #FEFAE0; cursor: pointer;
    font-size: 0.75rem; font-weight: 600; transition: all 0.2s;
}
.ctrl-btn:hover, .ctrl-btn.active { background: rgba(221,161,94,0.4); border-color: #DDA15E; }
#info {
    position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.75rem;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    padding: 10px 14px; border-radius: 12px; max-width: 200px; z-index: 100; line-height: 1.5;
}
#info h3 { color: #DDA15E; margin-bottom: 4px; font-size: 0.85rem; }
</style>
</head>
<body>
<a href="index.html" class="back">&larr; Back</a>
<canvas id="canvas"></canvas>
<div id="info">
    <h3>Dance Polyrhythm</h3>
    <p>Dancers move on different rhythmic cycles. Each ring represents a different beat division. When beats align, dancers pulse together. Click a ring to toggle beats.</p>
</div>
<div id="controls">
    <button class="ctrl-btn active" data-rhythm="3:4">3 vs 4</button>
    <button class="ctrl-btn" data-rhythm="2:3">2 vs 3</button>
    <button class="ctrl-btn" data-rhythm="5:4">5 vs 4</button>
    <button class="ctrl-btn" data-rhythm="3:4:5">3 vs 4 vs 5</button>
    <button class="ctrl-btn" data-rhythm="7:4">7 vs 4</button>
</div>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let rhythmParts = [3, 4];
let t = 0;
let bpm = 100;
let pulses = [];

document.querySelectorAll('[data-rhythm]').forEach(btn => {
    btn.addEventListener('click', () => {
        rhythmParts = btn.dataset.rhythm.split(':').map(Number);
        document.querySelectorAll('[data-rhythm]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        t = 0;
        pulses = [];
    });
});

function drawRhythmRing(cx, cy, radius, beats, phase, color, ringIndex) {
    const beatAngleStep = (Math.PI * 2) / beats;

    // Ring circle
    ctx.strokeStyle = color;
    ctx.globalAlpha = 0.2;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Beat markers
    for (let i = 0; i < beats; i++) {
        const angle = i * beatAngleStep - Math.PI / 2;
        const bx = cx + Math.cos(angle) * radius;
        const by = cy + Math.sin(angle) * radius;

        // Determine if this beat is currently active
        const beatPhase = (phase * beats) % beats;
        const dist = Math.abs(beatPhase - i);
        const isActive = dist < 0.15 || dist > beats - 0.15;

        const size = isActive ? 12 : 6;
        ctx.fillStyle = isActive ? '#FEFAE0' : color;
        ctx.globalAlpha = isActive ? 1 : 0.5;
        ctx.beginPath();
        ctx.arc(bx, by, size, 0, Math.PI * 2);
        ctx.fill();

        if (isActive) {
            // Pulse effect
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.4;
            ctx.beginPath();
            ctx.arc(bx, by, size + 8, 0, Math.PI * 2);
            ctx.stroke();

            pulses.push({ x: bx, y: by, r: size, color, alpha: 0.8 });
        }

        ctx.globalAlpha = 1;
    }

    // Dancer on the ring
    const dancerAngle = phase * Math.PI * 2 - Math.PI / 2;
    const dx = cx + Math.cos(dancerAngle) * radius;
    const dy = cy + Math.sin(dancerAngle) * radius;

    // Dancer trail
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    for (let a = 0; a < 0.3; a += 0.01) {
        const ta = (phase - a) * Math.PI * 2 - Math.PI / 2;
        const tx = cx + Math.cos(ta) * radius;
        const ty = cy + Math.sin(ta) * radius;
        if (a === 0) ctx.moveTo(tx, ty);
        else ctx.lineTo(tx, ty);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Dancer figure
    drawMiniDancer(dx, dy, dancerAngle + Math.PI / 2, color);

    // Label
    ctx.fillStyle = color;
    ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${beats} beats`, cx, cy - radius - 20);
}

function drawMiniDancer(x, y, facing, color) {
    const s = 8;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(facing);

    // Body
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    // Head
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, -s * 1.2, s * 0.4, 0, Math.PI * 2);
    ctx.fill();

    // Torso
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.8);
    ctx.lineTo(0, s * 0.3);
    ctx.stroke();

    // Arms
    const armPhase = t * 4;
    ctx.beginPath();
    ctx.moveTo(-s * 0.6, -s * 0.4 + Math.sin(armPhase) * s * 0.2);
    ctx.lineTo(0, -s * 0.6);
    ctx.lineTo(s * 0.6, -s * 0.4 - Math.sin(armPhase) * s * 0.2);
    ctx.stroke();

    // Legs
    ctx.beginPath();
    ctx.moveTo(0, s * 0.3);
    ctx.lineTo(-s * 0.4, s * 1);
    ctx.moveTo(0, s * 0.3);
    ctx.lineTo(s * 0.4, s * 1);
    ctx.stroke();

    ctx.restore();
}

function drawCenterPulse(cx, cy) {
    // Check if beats align (all rhythms hit simultaneously)
    let allAligned = true;
    for (const beats of rhythmParts) {
        const beatPhase = (t * bpm / 60) % 1;
        const beatPos = (beatPhase * beats) % 1;
        if (beatPos > 0.08 && beatPos < 0.92) allAligned = false;
    }

    if (allAligned) {
        const pulse = Math.sin(t * 20) * 0.5 + 0.5;
        ctx.fillStyle = `rgba(254,250,224,${pulse * 0.3})`;
        ctx.beginPath();
        ctx.arc(cx, cy, 30 + pulse * 20, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#FEFAE0';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('ALIGN', cx, cy + 4);
    }
}

const ringColors = ['#DDA15E', '#8A9A5B', '#BC6C25', '#606C38', '#FEFAE0'];

let lastTime = performance.now();

function animate(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    t += dt;

    ctx.fillStyle = 'rgba(26,26,46,0.15)';
    ctx.fillRect(0, 0, W, H);

    // Fade pulses
    for (let i = pulses.length - 1; i >= 0; i--) {
        const p = pulses[i];
        p.alpha -= 0.03;
        p.r += 1;
        if (p.alpha <= 0) { pulses.splice(i, 1); continue; }
        ctx.strokeStyle = p.color;
        ctx.globalAlpha = p.alpha;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
    if (pulses.length > 200) pulses.splice(0, pulses.length - 200);

    const cx = W / 2;
    const cy = H / 2;
    const maxR = Math.min(W, H) * 0.35;
    const minR = maxR * 0.3;

    const beatPhase = (t * bpm / 60);

    for (let i = 0; i < rhythmParts.length; i++) {
        const radius = minR + (maxR - minR) * (i / Math.max(1, rhythmParts.length - 1));
        const phase = beatPhase % 1;
        drawRhythmRing(cx, cy, radius, rhythmParts[i], phase, ringColors[i % ringColors.length], i);
    }

    drawCenterPulse(cx, cy);

    // BPM indicator
    ctx.fillStyle = 'rgba(254,250,224,0.4)';
    ctx.font = '11px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${bpm} BPM`, cx, cy + maxR + 40);

    // Beat counter
    const beatNum = Math.floor(beatPhase * 4) % 4 + 1;
    ctx.fillStyle = '#DDA15E';
    ctx.font = 'bold 24px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(beatNum, cx, cy + 8);

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

window.reset = function() {
    t = 0;
    pulses = [];
    ctx.clearRect(0, 0, W, H);
};
</script>
</body>
</html>
