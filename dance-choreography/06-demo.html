<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formation Editor - Dance Choreography</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; cursor: grab; }
canvas.dragging { cursor: grabbing; }
a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
#toolbar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 100; flex-wrap: wrap; justify-content: center;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 10px 16px;
}
.tool-btn {
    padding: 6px 14px; border: 2px solid rgba(138,154,91,0.4); border-radius: 8px;
    background: rgba(96,108,56,0.2); color: #FEFAE0; cursor: pointer;
    font-size: 0.75rem; font-weight: 600; transition: all 0.2s;
}
.tool-btn:hover, .tool-btn.active { background: rgba(221,161,94,0.4); border-color: #DDA15E; }
#info {
    position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.75rem;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    padding: 10px 14px; border-radius: 12px; max-width: 200px; z-index: 100; line-height: 1.5;
}
#info h3 { color: #DDA15E; margin-bottom: 4px; font-size: 0.85rem; }
#symmetry {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    color: #8A9A5B; font-size: 0.8rem; z-index: 100;
    background: rgba(254,250,224,0.08); padding: 6px 14px; border-radius: 8px;
}
</style>
</head>
<body>
<a href="index.html" class="back">&larr; Back</a>
<canvas id="canvas"></canvas>
<div id="info">
    <h3>Formation Editor</h3>
    <p>Drag dancers to position them. Use presets below, or click the stage to add dancers. Double-click a dancer to remove them.</p>
</div>
<div id="symmetry"></div>
<div id="toolbar">
    <button class="tool-btn" data-preset="circle">Circle</button>
    <button class="tool-btn" data-preset="vee">V-Shape</button>
    <button class="tool-btn" data-preset="line">Line</button>
    <button class="tool-btn" data-preset="diamond">Diamond</button>
    <button class="tool-btn" data-preset="stagger">Stagger</button>
    <button class="tool-btn" data-preset="spiral">Spiral</button>
    <button class="tool-btn" data-preset="grid">Grid</button>
    <button class="tool-btn" id="animateBtn">Animate</button>
    <button class="tool-btn" id="clearBtn">Clear</button>
</div>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const symmetryEl = document.getElementById('symmetry');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let dancers = [];
let dragging = null;
let dragOffsetX = 0, dragOffsetY = 0;
let animating = false;
let animT = 0;
let targetPositions = null;

const DANCER_SIZE = 16;
const colors = ['#DDA15E', '#8A9A5B', '#BC6C25', '#606C38', '#FEFAE0', '#a3b55c', '#d4944a', '#7a8a4e'];

function addDancer(x, y) {
    dancers.push({
        x, y, homeX: x, homeY: y,
        color: colors[dancers.length % colors.length],
        id: Date.now() + Math.random()
    });
}

function setPreset(type) {
    dancers = [];
    const cx = W / 2;
    const cy = H / 2 - 20;
    const n = type === 'grid' ? 16 : type === 'stagger' ? 12 : 8;
    const r = Math.min(W, H) * 0.2;

    for (let i = 0; i < n; i++) {
        let x, y;
        switch (type) {
            case 'circle':
                x = cx + Math.cos((i / n) * Math.PI * 2 - Math.PI / 2) * r;
                y = cy + Math.sin((i / n) * Math.PI * 2 - Math.PI / 2) * r;
                break;
            case 'vee':
                const side = i < n / 2 ? -1 : 1;
                const idx = i < n / 2 ? i : i - n / 2;
                x = cx + side * (idx + 1) * r * 0.35;
                y = cy - r * 0.6 + (idx + 1) * r * 0.3;
                break;
            case 'line':
                x = cx + (i - (n - 1) / 2) * (r * 2 / n);
                y = cy;
                break;
            case 'diamond':
                if (i === 0) { x = cx; y = cy - r; }
                else if (i < n / 2) { x = cx + (i / (n / 2)) * r; y = cy - r + (i / (n / 2)) * r; }
                else if (i === n / 2) { x = cx; y = cy + r * 0.2; }
                else { x = cx - ((i - n / 2) / (n / 2)) * r; y = cy + r * 0.2 - ((i - n / 2) / (n / 2)) * r + r; }
                break;
            case 'stagger':
                const row = Math.floor(i / 4);
                const col = i % 4;
                x = cx + (col - 1.5) * r * 0.5 + (row % 2) * r * 0.25;
                y = cy + (row - 1) * r * 0.4;
                break;
            case 'spiral':
                const angle = (i / n) * Math.PI * 4;
                const sr = (i / n) * r;
                x = cx + Math.cos(angle) * sr;
                y = cy + Math.sin(angle) * sr;
                break;
            case 'grid':
                const gr = Math.ceil(Math.sqrt(n));
                const gx = i % gr;
                const gy = Math.floor(i / gr);
                x = cx + (gx - (gr - 1) / 2) * r * 0.5;
                y = cy + (gy - (gr - 1) / 2) * r * 0.5;
                break;
        }
        addDancer(x, y);
    }
}

// Presets
document.querySelectorAll('[data-preset]').forEach(btn => {
    btn.addEventListener('click', () => {
        setPreset(btn.dataset.preset);
        animating = false;
    });
});

document.getElementById('animateBtn').addEventListener('click', () => {
    animating = !animating;
    animT = 0;
    document.getElementById('animateBtn').textContent = animating ? 'Stop' : 'Animate';
});

document.getElementById('clearBtn').addEventListener('click', () => {
    dancers = [];
    animating = false;
});

// Drag handling
canvas.addEventListener('mousedown', (e) => {
    const mx = e.clientX, my = e.clientY;
    for (let i = dancers.length - 1; i >= 0; i--) {
        if (Math.hypot(mx - dancers[i].x, my - dancers[i].y) < DANCER_SIZE + 5) {
            dragging = dancers[i];
            dragOffsetX = dancers[i].x - mx;
            dragOffsetY = dancers[i].y - my;
            canvas.classList.add('dragging');
            return;
        }
    }
    // Add new dancer on click
    addDancer(mx, my);
});

canvas.addEventListener('mousemove', (e) => {
    if (dragging) {
        dragging.x = e.clientX + dragOffsetX;
        dragging.y = e.clientY + dragOffsetY;
        dragging.homeX = dragging.x;
        dragging.homeY = dragging.y;
    }
});

canvas.addEventListener('mouseup', () => {
    dragging = null;
    canvas.classList.remove('dragging');
});

canvas.addEventListener('dblclick', (e) => {
    const mx = e.clientX, my = e.clientY;
    for (let i = dancers.length - 1; i >= 0; i--) {
        if (Math.hypot(mx - dancers[i].x, my - dancers[i].y) < DANCER_SIZE + 5) {
            dancers.splice(i, 1);
            return;
        }
    }
});

function analyzeSymmetry() {
    if (dancers.length < 2) return 'Add dancers to analyze';
    const cx = dancers.reduce((s, d) => s + d.x, 0) / dancers.length;
    const cy = dancers.reduce((s, d) => s + d.y, 0) / dancers.length;

    // Check bilateral symmetry
    let symScore = 0;
    for (const d of dancers) {
        const mirrorX = 2 * cx - d.x;
        const mirrorY = d.y;
        const closest = dancers.reduce((best, other) => {
            const dist = Math.hypot(other.x - mirrorX, other.y - mirrorY);
            return dist < best ? dist : best;
        }, Infinity);
        if (closest < 30) symScore++;
    }
    const bilateralPct = Math.round((symScore / dancers.length) * 100);

    // Check radial symmetry
    let radialScore = 0;
    for (let k = 2; k <= 8; k++) {
        let matches = 0;
        for (const d of dancers) {
            const angle = Math.atan2(d.y - cy, d.x - cx);
            const r = Math.hypot(d.x - cx, d.y - cy);
            const rotAngle = angle + (Math.PI * 2) / k;
            const rx = cx + Math.cos(rotAngle) * r;
            const ry = cy + Math.sin(rotAngle) * r;
            const closest = dancers.reduce((best, other) => {
                const dist = Math.hypot(other.x - rx, other.y - ry);
                return dist < best ? dist : best;
            }, Infinity);
            if (closest < 30) matches++;
        }
        if (matches > dancers.length * 0.7) radialScore = k;
    }

    let text = `${dancers.length} dancers | Bilateral: ${bilateralPct}%`;
    if (radialScore > 0) text += ` | ${radialScore}-fold radial`;
    return text;
}

function drawGrid() {
    ctx.strokeStyle = 'rgba(138,154,91,0.06)';
    ctx.lineWidth = 1;
    const gridSize = 50;
    for (let x = 0; x < W; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
    }
    for (let y = 0; y < H; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
    }

    // Center crosshair
    ctx.strokeStyle = 'rgba(221,161,94,0.15)';
    ctx.beginPath();
    ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H);
    ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2);
    ctx.stroke();
}

function drawConnections() {
    if (dancers.length < 2) return;
    ctx.strokeStyle = 'rgba(254,250,224,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i < dancers.length; i++) {
        for (let j = i + 1; j < dancers.length; j++) {
            const d = Math.hypot(dancers[i].x - dancers[j].x, dancers[i].y - dancers[j].y);
            if (d < 150) {
                ctx.globalAlpha = (1 - d / 150) * 0.3;
                ctx.beginPath();
                ctx.moveTo(dancers[i].x, dancers[i].y);
                ctx.lineTo(dancers[j].x, dancers[j].y);
                ctx.stroke();
            }
        }
    }
    ctx.globalAlpha = 1;
}

let lastTime = performance.now();

function animate(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    drawGrid();

    if (animating && dancers.length > 0) {
        animT += dt * 0.5;
        const cx = dancers.reduce((s, d) => s + d.homeX, 0) / dancers.length;
        const cy = dancers.reduce((s, d) => s + d.homeY, 0) / dancers.length;
        for (let i = 0; i < dancers.length; i++) {
            const d = dancers[i];
            const angle = Math.atan2(d.homeY - cy, d.homeX - cx);
            const r = Math.hypot(d.homeX - cx, d.homeY - cy);
            d.x = cx + Math.cos(angle + animT) * r;
            d.y = cy + Math.sin(angle + animT) * r;
        }
    }

    drawConnections();

    // Draw dancers
    for (const d of dancers) {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(d.x + 2, d.y + 3, DANCER_SIZE, DANCER_SIZE * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();

        // Body
        ctx.fillStyle = d.color;
        ctx.shadowColor = d.color;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(d.x, d.y, DANCER_SIZE, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Direction indicator
        if (animating) {
            const cx2 = dancers.reduce((s, dd) => s + dd.homeX, 0) / dancers.length;
            const cy2 = dancers.reduce((s, dd) => s + dd.homeY, 0) / dancers.length;
            const facing = Math.atan2(cy2 - d.y, cx2 - d.x);
            ctx.strokeStyle = 'rgba(254,250,224,0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(d.x + Math.cos(facing) * DANCER_SIZE * 0.5, d.y + Math.sin(facing) * DANCER_SIZE * 0.5);
            ctx.lineTo(d.x + Math.cos(facing) * DANCER_SIZE * 1.3, d.y + Math.sin(facing) * DANCER_SIZE * 1.3);
            ctx.stroke();
        }
    }

    // Convex hull
    if (dancers.length >= 3) {
        const hull = convexHull(dancers.map(d => [d.x, d.y]));
        ctx.strokeStyle = 'rgba(138,154,91,0.2)';
        ctx.lineWidth = 1;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(hull[0][0], hull[0][1]);
        for (let i = 1; i < hull.length; i++) ctx.lineTo(hull[i][0], hull[i][1]);
        ctx.closePath();
        ctx.stroke();
        ctx.setLineDash([]);
    }

    symmetryEl.textContent = analyzeSymmetry();

    requestAnimationFrame(animate);
}

function convexHull(points) {
    if (points.length < 3) return points;
    points.sort((a, b) => a[0] - b[0] || a[1] - b[1]);
    const cross = (o, a, b) => (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0]);
    const lower = [];
    for (const p of points) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) lower.pop();
        lower.push(p);
    }
    const upper = [];
    for (let i = points.length - 1; i >= 0; i--) {
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], points[i]) <= 0) upper.pop();
        upper.push(points[i]);
    }
    return lower.slice(0, -1).concat(upper.slice(0, -1));
}

setPreset('circle');
requestAnimationFrame(animate);

window.reset = function() {
    dancers = [];
    animating = false;
    animT = 0;
    document.getElementById('animateBtn').textContent = 'Animate';
};
</script>
</body>
</html>
