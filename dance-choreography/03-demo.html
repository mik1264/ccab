<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ballroom Floor Patterns - Dance Choreography</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; }
a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 100; flex-wrap: wrap; justify-content: center;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 10px 16px;
}
.dance-btn {
    padding: 8px 16px; border: 2px solid rgba(138,154,91,0.4); border-radius: 8px;
    background: rgba(96,108,56,0.2); color: #FEFAE0; cursor: pointer;
    font-size: 0.8rem; font-weight: 600; transition: all 0.2s;
}
.dance-btn:hover, .dance-btn.active { background: rgba(221,161,94,0.4); border-color: #DDA15E; }
#legend {
    position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.75rem;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    padding: 10px 14px; border-radius: 12px; z-index: 100; line-height: 1.6;
}
#legend h3 { color: #DDA15E; margin-bottom: 4px; }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
<a href="index.html" class="back">&larr; Back</a>
<canvas id="canvas"></canvas>
<div id="legend">
    <h3>Ballroom Floor</h3>
    <div class="legend-item"><div class="legend-dot" style="background:#DDA15E"></div> Lead</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8A9A5B"></div> Follow</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(254,250,224,0.3)"></div> LOD (counter-clockwise)</div>
</div>
<div id="controls">
    <button class="dance-btn active" data-dance="waltz">Waltz Box</button>
    <button class="dance-btn" data-dance="foxtrot">Foxtrot</button>
    <button class="dance-btn" data-dance="tango">Tango Walk</button>
    <button class="dance-btn" data-dance="viennese">Viennese Waltz</button>
</div>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let currentDance = 'waltz';
let t = 0;
let trailLead = [];
let trailFollow = [];

document.querySelectorAll('.dance-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        currentDance = btn.dataset.dance;
        document.querySelectorAll('.dance-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        t = 0;
        trailLead = [];
        trailFollow = [];
    });
});

function drawFloor() {
    const cx = W / 2;
    const cy = H / 2;
    const rx = Math.min(W, H) * 0.38;
    const ry = rx * 0.7;

    // Dance floor rectangle
    ctx.strokeStyle = 'rgba(138,154,91,0.2)';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 8]);
    ctx.strokeRect(cx - rx, cy - ry, rx * 2, ry * 2);
    ctx.setLineDash([]);

    // LOD arrows (counter-clockwise)
    ctx.strokeStyle = 'rgba(254,250,224,0.15)';
    ctx.lineWidth = 1.5;
    const arrowR = Math.min(rx, ry) * 0.95;
    for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
        const ax = cx + Math.cos(a) * arrowR * (rx / Math.min(rx, ry));
        const ay = cy + Math.sin(a) * arrowR * (ry / Math.min(rx, ry));
        const na = a + 0.15;
        const tipX = cx + Math.cos(na) * arrowR * (rx / Math.min(rx, ry));
        const tipY = cy + Math.sin(na) * arrowR * (ry / Math.min(rx, ry));
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(tipX, tipY);
        ctx.stroke();
        // Arrowhead
        const headA = na + Math.PI * 0.8;
        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.lineTo(tipX + Math.cos(headA) * 8, tipY + Math.sin(headA) * 8);
        ctx.stroke();
    }

    // Direction labels
    ctx.fillStyle = 'rgba(254,250,224,0.3)';
    ctx.font = '11px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Wall', cx, cy - ry - 8);
    ctx.fillText('Wall', cx, cy + ry + 16);
    ctx.fillText('Center', cx, cy + 4);
    ctx.textAlign = 'left';
    ctx.fillText('LOD \u2192', cx - rx - 5, cy - ry - 8);
}

const dancePatterns = {
    waltz: function(phase) {
        // Box step: forward-side-close, back-side-close
        const steps = [
            { lx: 0, ly: -1, fx: 0, fy: 1 },     // Lead forward, Follow back
            { lx: 1, ly: -1, fx: -1, fy: 1 },     // Lead side
            { lx: 1, ly: -1, fx: -1, fy: 1 },     // Close
            { lx: 0, ly: 1, fx: 0, fy: -1 },      // Lead back
            { lx: -1, ly: 1, fx: 1, fy: -1 },     // Lead side
            { lx: -1, ly: 1, fx: 1, fy: -1 },     // Close
        ];
        const idx = Math.floor(phase * 6) % 6;
        const frac = (phase * 6) % 1;
        const next = (idx + 1) % 6;
        const s = steps[idx];
        const sn = steps[next];
        return {
            lx: s.lx + (sn.lx - s.lx) * frac,
            ly: s.ly + (sn.ly - s.ly) * frac,
            fx: s.fx + (sn.fx - s.fx) * frac,
            fy: s.fy + (sn.fy - s.fy) * frac
        };
    },
    foxtrot: function(phase) {
        // Slow-slow-quick-quick traveling pattern
        const p = phase * Math.PI * 2;
        return {
            lx: Math.sin(p) * 1.5,
            ly: -Math.cos(p * 0.5) * 1.2 - 0.5,
            fx: Math.sin(p + Math.PI) * 1.5,
            fy: -Math.cos(p * 0.5 + Math.PI) * 1.2 + 0.5
        };
    },
    tango: function(phase) {
        // Sharp, linear walks with pauses
        const p = phase * 4;
        const seg = Math.floor(p) % 4;
        const frac = p % 1;
        const sharp = frac < 0.3 ? frac / 0.3 : 1; // Quick snap
        const patterns = [
            { lx: 0, ly: -sharp * 2, fx: 0, fy: sharp * 2 },
            { lx: sharp * 0.8, ly: -2, fx: -sharp * 0.8, fy: 2 },
            { lx: 0.8, ly: -2 + sharp, fx: -0.8, fy: 2 - sharp },
            { lx: 0.8 - sharp * 0.8, ly: -1 - sharp, fx: -0.8 + sharp * 0.8, fy: 1 + sharp }
        ];
        return patterns[seg];
    },
    viennese: function(phase) {
        // Continuous rotation traveling along LOD
        const p = phase * Math.PI * 2;
        const travel = phase * 3;
        const rotR = 0.6;
        return {
            lx: Math.cos(p * 3) * rotR + Math.sin(travel) * 0.5,
            ly: Math.sin(p * 3) * rotR - Math.cos(travel) * 0.5,
            fx: Math.cos(p * 3 + Math.PI) * rotR + Math.sin(travel) * 0.5,
            fy: Math.sin(p * 3 + Math.PI) * rotR - Math.cos(travel) * 0.5
        };
    }
};

function drawFootprints(trail, color) {
    for (let i = 0; i < trail.length; i++) {
        const alpha = (i / trail.length) * 0.6;
        ctx.fillStyle = color;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        // Footprint shape
        const p = trail[i];
        ctx.ellipse(p.x, p.y, 5, 8, p.angle || 0, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

let lastTime = performance.now();

function animate(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    t += dt * 0.15;

    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    drawFloor();

    const cx = W / 2;
    const cy = H / 2;
    const scale = Math.min(W, H) * 0.08;

    const phase = t % 1;
    const danceFn = dancePatterns[currentDance];
    if (!danceFn) { requestAnimationFrame(animate); return; }
    const pattern = danceFn(phase);
    if (!pattern || typeof pattern.lx === 'undefined') { requestAnimationFrame(animate); return; }

    const lx = cx + pattern.lx * scale;
    const ly = cy + pattern.ly * scale;
    const fx = cx + pattern.fx * scale;
    const fy = cy + pattern.fy * scale;

    // Footprint trail
    trailLead.push({ x: lx, y: ly, angle: Math.atan2(pattern.ly, pattern.lx) });
    trailFollow.push({ x: fx, y: fy, angle: Math.atan2(pattern.fy, pattern.fx) });
    if (trailLead.length > 120) trailLead.shift();
    if (trailFollow.length > 120) trailFollow.shift();

    drawFootprints(trailLead, '#DDA15E');
    drawFootprints(trailFollow, '#8A9A5B');

    // Connection line
    ctx.strokeStyle = 'rgba(254,250,224,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(fx, fy);
    ctx.stroke();
    ctx.setLineDash([]);

    // Lead dancer
    ctx.fillStyle = '#DDA15E';
    ctx.beginPath();
    ctx.arc(lx, ly, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('L', lx, ly + 4);

    // Follow dancer
    ctx.fillStyle = '#8A9A5B';
    ctx.beginPath();
    ctx.arc(fx, fy, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.fillText('F', fx, fy + 4);

    // Step diagram overlay
    drawStepDiagram(pattern, phase);

    requestAnimationFrame(animate);
}

function drawStepDiagram(pattern, phase) {
    const diagramX = 80;
    const diagramY = H / 2;
    const diagramScale = 25;

    ctx.fillStyle = 'rgba(254,250,224,0.08)';
    ctx.fillRect(diagramX - 50, diagramY - 80, 100, 160);

    ctx.fillStyle = 'rgba(254,250,224,0.4)';
    ctx.font = '10px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Step Pattern', diagramX, diagramY - 68);

    // Mini footprints
    ctx.fillStyle = '#DDA15E';
    ctx.beginPath();
    ctx.ellipse(diagramX + pattern.lx * diagramScale, diagramY + pattern.ly * diagramScale, 4, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#8A9A5B';
    ctx.beginPath();
    ctx.ellipse(diagramX + pattern.fx * diagramScale, diagramY + pattern.fy * diagramScale, 4, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Beat indicator
    const beatCount = currentDance === 'waltz' ? 6 : currentDance === 'tango' ? 4 : 8;
    const currentBeat = Math.floor(phase * beatCount) + 1;
    ctx.fillStyle = '#FEFAE0';
    ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
    ctx.fillText(`Beat ${currentBeat}`, diagramX, diagramY + 76);
}

requestAnimationFrame(animate);

window.reset = function() {
    t = 0;
    trailLead = [];
    trailFollow = [];
};
</script>
</body>
</html>
