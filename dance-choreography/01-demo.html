<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laban Effort Graph - Dance Choreography</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; }
a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; z-index: 100; flex-wrap: wrap; justify-content: center;
}
.slider-group {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(254,250,224,0.12); backdrop-filter: blur(10px);
    border-radius: 12px; padding: 10px 16px; min-width: 120px;
}
.slider-group label { color: #FEFAE0; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.slider-group .extremes { display: flex; justify-content: space-between; width: 100%; color: #8A9A5B; font-size: 0.6rem; margin-top: 2px; }
input[type=range] { width: 100px; accent-color: #DDA15E; margin: 4px 0; }
#info {
    position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.8rem;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    padding: 12px 16px; border-radius: 12px; max-width: 220px; z-index: 100;
}
#info h3 { color: #DDA15E; margin-bottom: 6px; font-size: 0.9rem; }
</style>
</head>
<body>
<a href="index.html" class="back">&larr; Back</a>
<canvas id="canvas"></canvas>
<div id="info">
    <h3>Laban Effort Graph</h3>
    <p>Adjust the four effort factors to see how they shape movement quality. The dancer figure responds to your settings in real-time.</p>
</div>
<div id="controls">
    <div class="slider-group">
        <label>Space</label>
        <input type="range" id="space" min="0" max="100" value="50">
        <div class="extremes"><span>Indirect</span><span>Direct</span></div>
    </div>
    <div class="slider-group">
        <label>Weight</label>
        <input type="range" id="weight" min="0" max="100" value="50">
        <div class="extremes"><span>Light</span><span>Strong</span></div>
    </div>
    <div class="slider-group">
        <label>Time</label>
        <input type="range" id="time" min="0" max="100" value="50">
        <div class="extremes"><span>Sustained</span><span>Quick</span></div>
    </div>
    <div class="slider-group">
        <label>Flow</label>
        <input type="range" id="flow" min="0" max="100" value="50">
        <div class="extremes"><span>Bound</span><span>Free</span></div>
    </div>
</div>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const sliders = {
    space: document.getElementById('space'),
    weight: document.getElementById('weight'),
    time: document.getElementById('time'),
    flow: document.getElementById('flow')
};

function getEffort() {
    return {
        space: sliders.space.value / 100,
        weight: sliders.weight.value / 100,
        time: sliders.time.value / 100,
        flow: sliders.flow.value / 100
    };
}

class DancerFigure {
    constructor() {
        this.joints = {};
        this.trails = [];
        this.t = 0;
    }

    update(effort, dt) {
        this.t += dt * (0.3 + effort.time * 2.5);
        const cx = W / 2;
        const cy = H / 2 - 40;
        const scale = Math.min(W, H) * 0.18;

        const wander = (1 - effort.space) * 0.6;
        const power = 0.3 + effort.weight * 0.7;
        const speed = this.t;
        const freeFlow = effort.flow;
        const bound = 1 - effort.flow;

        const bodySwayX = Math.sin(speed * 0.7) * wander * scale * 0.5;
        const bodySwayY = Math.sin(speed * 1.1) * 0.1 * scale * power;

        const headX = cx + bodySwayX * 0.3;
        const headY = cy - scale * 1.5 + bodySwayY * 0.3;

        const shoulderY = cy - scale * 1.1 + bodySwayY * 0.2;
        const hipY = cy - scale * 0.3;

        const armSpread = (0.5 + freeFlow * 0.5) * scale;
        const armWave = Math.sin(speed * 1.3) * power * 0.4;
        const armWave2 = Math.sin(speed * 1.3 + Math.PI * 0.7) * power * 0.4;

        const lHandX = cx + bodySwayX - armSpread + Math.sin(speed * 0.9 + 1) * wander * scale * 0.3;
        const lHandY = shoulderY + armWave * scale * (bound * 0.3 + 0.2) + Math.cos(speed * 0.8) * freeFlow * scale * 0.3;
        const rHandX = cx + bodySwayX + armSpread + Math.sin(speed * 0.9 - 1) * wander * scale * 0.3;
        const rHandY = shoulderY + armWave2 * scale * (bound * 0.3 + 0.2) - Math.cos(speed * 0.8 + 0.5) * freeFlow * scale * 0.3;

        const legSpread = (0.2 + power * 0.2) * scale;
        const legBend = Math.sin(speed * 1.5) * power * 0.25;
        const lFootX = cx + bodySwayX - legSpread + Math.sin(speed * 0.6) * wander * scale * 0.2;
        const lFootY = cy + scale * 0.6 + Math.abs(legBend) * scale * 0.2;
        const rFootX = cx + bodySwayX + legSpread + Math.sin(speed * 0.6 + Math.PI) * wander * scale * 0.2;
        const rFootY = cy + scale * 0.6 + Math.abs(Math.sin(speed * 1.5 + Math.PI)) * power * 0.25 * scale * 0.2;

        this.joints = {
            head: { x: headX, y: headY },
            neck: { x: cx + bodySwayX * 0.3, y: shoulderY + scale * 0.05 },
            lShoulder: { x: cx + bodySwayX - scale * 0.3, y: shoulderY },
            rShoulder: { x: cx + bodySwayX + scale * 0.3, y: shoulderY },
            lElbow: { x: (cx + bodySwayX - scale * 0.3 + lHandX) / 2, y: (shoulderY + lHandY) / 2 + scale * 0.05 },
            rElbow: { x: (cx + bodySwayX + scale * 0.3 + rHandX) / 2, y: (shoulderY + rHandY) / 2 + scale * 0.05 },
            lHand: { x: lHandX, y: lHandY },
            rHand: { x: rHandX, y: rHandY },
            hip: { x: cx + bodySwayX * 0.5, y: hipY },
            lKnee: { x: (cx + bodySwayX * 0.5 - legSpread * 0.5 + lFootX) / 2, y: (hipY + lFootY) / 2 },
            rKnee: { x: (cx + bodySwayX * 0.5 + legSpread * 0.5 + rFootX) / 2, y: (hipY + rFootY) / 2 },
            lFoot: { x: lFootX, y: lFootY },
            rFoot: { x: rFootX, y: rFootY },
            spine: { x: cx + bodySwayX * 0.4, y: (shoulderY + hipY) / 2 }
        };

        if (this.trails.length === 0 || Math.hypot(this.joints.lHand.x - this.trails[this.trails.length - 1].x, this.joints.lHand.y - this.trails[this.trails.length - 1].y) > 3) {
            this.trails.push({ x: this.joints.lHand.x, y: this.joints.lHand.y, rx: this.joints.rHand.x, ry: this.joints.rHand.y, a: 1 });
        }
        for (let i = this.trails.length - 1; i >= 0; i--) {
            this.trails[i].a -= 0.008;
            if (this.trails[i].a <= 0) this.trails.splice(i, 1);
        }
    }

    draw(effort) {
        // Draw trails
        for (const t of this.trails) {
            ctx.globalAlpha = t.a * 0.3;
            ctx.fillStyle = '#DDA15E';
            ctx.beginPath();
            ctx.arc(t.x, t.y, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#8A9A5B';
            ctx.beginPath();
            ctx.arc(t.rx, t.ry, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        const j = this.joints;
        const lineWidth = 3 + effort.weight * 5;

        // Body
        ctx.strokeStyle = '#FEFAE0';
        ctx.lineWidth = lineWidth;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const drawLimb = (a, b) => {
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
        };

        // Torso
        ctx.strokeStyle = 'rgba(254,250,224,0.8)';
        ctx.lineWidth = lineWidth * 1.2;
        drawLimb(j.neck, j.spine);
        drawLimb(j.spine, j.hip);

        // Arms
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = lineWidth;
        drawLimb(j.lShoulder, j.lElbow);
        drawLimb(j.lElbow, j.lHand);
        drawLimb(j.rShoulder, j.rElbow);
        drawLimb(j.rElbow, j.rHand);

        // Shoulders
        ctx.strokeStyle = 'rgba(254,250,224,0.6)';
        drawLimb(j.lShoulder, j.rShoulder);

        // Legs
        ctx.strokeStyle = '#8A9A5B';
        drawLimb(j.hip, j.lKnee);
        drawLimb(j.lKnee, j.lFoot);
        drawLimb(j.hip, j.rKnee);
        drawLimb(j.rKnee, j.rFoot);

        // Head
        ctx.fillStyle = '#FEFAE0';
        ctx.beginPath();
        ctx.arc(j.head.x, j.head.y, 12 + effort.weight * 4, 0, Math.PI * 2);
        ctx.fill();

        // Joint dots
        ctx.fillStyle = '#DDA15E';
        for (const key in j) {
            ctx.beginPath();
            ctx.arc(j[key].x, j[key].y, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

// Effort diamond graph
function drawEffortDiamond(effort) {
    const size = Math.min(W, H) * 0.12;
    const cx = 80 + size;
    const cy = H / 2;

    const labels = ['Space', 'Weight', 'Time', 'Flow'];
    const values = [effort.space, effort.weight, effort.time, effort.flow];
    const dirs = [[0, -1], [1, 0], [0, 1], [-1, 0]];

    // Diamond outline
    ctx.strokeStyle = 'rgba(138,154,91,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
        const x = cx + dirs[i][0] * size;
        const y = cy + dirs[i][1] * size;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();

    // Axes
    for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + dirs[i][0] * size, cy + dirs[i][1] * size);
        ctx.stroke();
    }

    // Value shape
    ctx.fillStyle = 'rgba(221,161,94,0.2)';
    ctx.strokeStyle = '#DDA15E';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
        const x = cx + dirs[i][0] * size * values[i];
        const y = cy + dirs[i][1] * size * values[i];
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Labels
    ctx.fillStyle = '#FEFAE0';
    ctx.font = '12px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    for (let i = 0; i < 4; i++) {
        const x = cx + dirs[i][0] * (size + 20);
        const y = cy + dirs[i][1] * (size + 16);
        ctx.fillText(labels[i], x, y + 4);
    }

    // Value dots
    ctx.fillStyle = '#DDA15E';
    for (let i = 0; i < 4; i++) {
        const x = cx + dirs[i][0] * size * values[i];
        const y = cy + dirs[i][1] * size * values[i];
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
    }
}

const dancer = new DancerFigure();
let lastTime = performance.now();

function animate(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    ctx.fillStyle = 'rgba(26,26,46,0.15)';
    ctx.fillRect(0, 0, W, H);

    const effort = getEffort();
    dancer.update(effort, dt);
    dancer.draw(effort);
    drawEffortDiamond(effort);

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

window.reset = function() {
    sliders.space.value = 50;
    sliders.weight.value = 50;
    sliders.time.value = 50;
    sliders.flow.value = 50;
    dancer.trails = [];
    dancer.t = 0;
    ctx.clearRect(0, 0, W, H);
};
</script>
</body>
</html>
