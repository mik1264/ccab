<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folk Circle Dance - Dance Choreography</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; }
a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 100; flex-wrap: wrap; justify-content: center;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 10px 16px;
}
.ctrl-btn {
    padding: 6px 14px; border: 2px solid rgba(138,154,91,0.4); border-radius: 8px;
    background: rgba(96,108,56,0.2); color: #FEFAE0; cursor: pointer;
    font-size: 0.75rem; font-weight: 600; transition: all 0.2s;
}
.ctrl-btn:hover, .ctrl-btn.active { background: rgba(221,161,94,0.4); border-color: #DDA15E; }
#info {
    position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.75rem;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    padding: 10px 14px; border-radius: 12px; max-width: 200px; z-index: 100; line-height: 1.5;
}
#info h3 { color: #DDA15E; margin-bottom: 4px; font-size: 0.85rem; }
#danceName {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: rgba(254,250,224,0.1); font-size: 4rem; font-weight: 700;
    pointer-events: none; z-index: 0; white-space: nowrap;
}
</style>
</head>
<body>
<a href="index.html" class="back">&larr; Back</a>
<canvas id="canvas"></canvas>
<div id="danceName">Hora</div>
<div id="info">
    <h3>Folk Circle Dance</h3>
    <p>Watch traditional folk dance patterns from around the world. Dancers hold hands in circles, move in/out, and weave chain patterns.</p>
</div>
<div id="controls">
    <button class="ctrl-btn active" data-dance="hora">Hora</button>
    <button class="ctrl-btn" data-dance="kolo">Kolo</button>
    <button class="ctrl-btn" data-dance="dabke">Dabke</button>
    <button class="ctrl-btn" data-dance="sirtaki">Sirtaki</button>
    <button class="ctrl-btn" data-dance="farandole">Farandole</button>
</div>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const danceNameEl = document.getElementById('danceName');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let currentDance = 'hora';
let t = 0;
const N_DANCERS = 12;

document.querySelectorAll('[data-dance]').forEach(btn => {
    btn.addEventListener('click', () => {
        currentDance = btn.dataset.dance;
        document.querySelectorAll('[data-dance]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        danceNameEl.textContent = btn.textContent;
        t = 0;
    });
});

const danceColors = ['#DDA15E', '#8A9A5B', '#BC6C25', '#606C38', '#a3b55c', '#d4944a'];

function getDancerPositions(dance, time) {
    const cx = W / 2;
    const cy = H / 2 - 20;
    const baseR = Math.min(W, H) * 0.25;
    const positions = [];

    switch (dance) {
        case 'hora': {
            // Circle moves right, dancers step in/out
            const circleAngle = time * 0.6;
            const inOut = Math.sin(time * 2) * baseR * 0.1;
            for (let i = 0; i < N_DANCERS; i++) {
                const a = (i / N_DANCERS) * Math.PI * 2 + circleAngle;
                const r = baseR + inOut + Math.sin(time * 3 + i * 0.5) * 8;
                const stepBounce = Math.abs(Math.sin(time * 4 + i * 0.3)) * 6;
                positions.push({
                    x: cx + Math.cos(a) * r,
                    y: cy + Math.sin(a) * r - stepBounce,
                    facing: a + Math.PI / 2,
                    color: danceColors[i % danceColors.length]
                });
            }
            break;
        }
        case 'kolo': {
            // Tight circle, grapevine steps
            const circleAngle = time * 0.5;
            const squeeze = Math.sin(time * 1.5) * 0.15;
            for (let i = 0; i < N_DANCERS; i++) {
                const a = (i / N_DANCERS) * Math.PI * 2 + circleAngle;
                const r = baseR * (0.85 + squeeze);
                const lateralShift = Math.sin(time * 3 + i * 0.8) * 10;
                positions.push({
                    x: cx + Math.cos(a) * r + Math.cos(a + Math.PI / 2) * lateralShift,
                    y: cy + Math.sin(a) * r + Math.sin(a + Math.PI / 2) * lateralShift,
                    facing: a + Math.PI / 2,
                    color: danceColors[i % danceColors.length]
                });
            }
            break;
        }
        case 'dabke': {
            // Semi-circle (line), leader at end stamps
            const spread = Math.PI * 1.2;
            const startAngle = -spread / 2 + Math.PI / 2;
            for (let i = 0; i < N_DANCERS; i++) {
                const a = startAngle + (i / (N_DANCERS - 1)) * spread + Math.sin(time * 0.3) * 0.1;
                const r = baseR;
                const stamp = i === 0 ? Math.abs(Math.sin(time * 6)) * 12 : Math.abs(Math.sin(time * 4 + i * 0.4)) * 5;
                positions.push({
                    x: cx + Math.cos(a) * r,
                    y: cy + Math.sin(a) * r - stamp,
                    facing: a + Math.PI / 2,
                    color: i === 0 ? '#FEFAE0' : danceColors[i % danceColors.length],
                    isLeader: i === 0
                });
            }
            break;
        }
        case 'sirtaki': {
            // Starts slow in line, speeds up into circle
            const phase = (Math.sin(time * 0.2) + 1) / 2; // 0=line, 1=circle
            const speed = 0.3 + phase * 1.5;
            const circleAngle = time * speed;
            for (let i = 0; i < N_DANCERS; i++) {
                // Interpolate between line and circle
                const lineX = cx + (i - (N_DANCERS - 1) / 2) * 40;
                const lineY = cy;
                const circA = (i / N_DANCERS) * Math.PI * 2 + circleAngle;
                const circX = cx + Math.cos(circA) * baseR * 0.8;
                const circY = cy + Math.sin(circA) * baseR * 0.8;
                const bounce = Math.abs(Math.sin(time * (2 + phase * 4) + i * 0.5)) * (4 + phase * 10);
                positions.push({
                    x: lineX + (circX - lineX) * phase,
                    y: lineY + (circY - lineY) * phase - bounce,
                    facing: phase > 0.5 ? circA + Math.PI / 2 : 0,
                    color: danceColors[i % danceColors.length]
                });
            }
            break;
        }
        case 'farandole': {
            // Chain/serpentine led by leader
            const headAngle = time * 0.8;
            const headX = cx + Math.cos(headAngle) * baseR * 0.6;
            const headY = cy + Math.sin(headAngle * 0.7) * baseR * 0.4;
            for (let i = 0; i < N_DANCERS; i++) {
                const delay = i * 0.25;
                const da = headAngle - delay;
                const spiralR = baseR * 0.6 - i * 3;
                const waveY = Math.sin(da * 0.7) * baseR * 0.4;
                positions.push({
                    x: cx + Math.cos(da) * Math.max(spiralR, baseR * 0.2),
                    y: cy + waveY + Math.sin(time * 3 - i * 0.3) * 5,
                    facing: da + Math.PI / 2,
                    color: i === 0 ? '#FEFAE0' : danceColors[i % danceColors.length],
                    isLeader: i === 0
                });
            }
            break;
        }
    }

    return positions;
}

function drawHandLinks(positions) {
    ctx.strokeStyle = 'rgba(254,250,224,0.15)';
    ctx.lineWidth = 2;
    for (let i = 0; i < positions.length; i++) {
        const next = (i + 1) % positions.length;
        if (currentDance === 'dabke' && next === 0) continue;
        if (currentDance === 'farandole' && next === 0) continue;
        ctx.beginPath();
        ctx.moveTo(positions[i].x, positions[i].y);
        ctx.lineTo(positions[next].x, positions[next].y);
        ctx.stroke();
    }
}

function drawDancer(pos) {
    const s = pos.isLeader ? 16 : 12;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(pos.x + 1, pos.y + s + 2, s * 0.8, s * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Glow
    ctx.shadowColor = pos.color;
    ctx.shadowBlur = pos.isLeader ? 15 : 8;

    // Body circle
    ctx.fillStyle = pos.color;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, s, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Facing direction
    ctx.strokeStyle = 'rgba(26,26,46,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    ctx.lineTo(pos.x + Math.cos(pos.facing) * s * 0.8, pos.y + Math.sin(pos.facing) * s * 0.8);
    ctx.stroke();
}

function drawFloorPattern(positions) {
    // Trace the formation shape
    if (positions.length < 3) return;
    ctx.strokeStyle = 'rgba(138,154,91,0.1)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(positions[0].x, positions[0].y);
    for (let i = 1; i < positions.length; i++) {
        ctx.lineTo(positions[i].x, positions[i].y);
    }
    if (currentDance !== 'dabke' && currentDance !== 'farandole') ctx.closePath();
    ctx.stroke();
    ctx.setLineDash([]);
}

let lastTime = performance.now();

function animate(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    t += dt;

    ctx.fillStyle = 'rgba(26,26,46,0.12)';
    ctx.fillRect(0, 0, W, H);

    // Stage circle
    ctx.strokeStyle = 'rgba(138,154,91,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(W / 2, H / 2 - 20, Math.min(W, H) * 0.38, 0, Math.PI * 2);
    ctx.stroke();

    const positions = getDancerPositions(currentDance, t);
    drawFloorPattern(positions);
    drawHandLinks(positions);
    for (const pos of positions) drawDancer(pos);

    // Dance info
    const danceInfo = {
        hora: 'Romanian/Israeli circle dance - dancers move right, stepping in and out',
        kolo: 'Serbian circle dance - tight formation with grapevine steps',
        dabke: 'Levantine line dance - leader stamps at the head of the semicircle',
        sirtaki: 'Greek dance - starts slow in a line, accelerates into a circle',
        farandole: 'Provencal chain dance - leader guides a serpentine pattern'
    };

    ctx.fillStyle = 'rgba(254,250,224,0.3)';
    ctx.font = '11px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(danceInfo[currentDance], W / 2, H - 80);

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

window.reset = function() {
    t = 0;
    ctx.clearRect(0, 0, W, H);
};
</script>
</body>
</html>
