<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swing Dance Slot - Dance Choreography</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; }
a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
#controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 100;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 10px 16px;
}
.ctrl-btn {
    padding: 6px 14px; border: 2px solid rgba(138,154,91,0.4); border-radius: 8px;
    background: rgba(96,108,56,0.2); color: #FEFAE0; cursor: pointer;
    font-size: 0.75rem; font-weight: 600; transition: all 0.2s;
}
.ctrl-btn:hover, .ctrl-btn.active { background: rgba(221,161,94,0.4); border-color: #DDA15E; }
#info {
    position: fixed; top: 10px; right: 10px; color: #FEFAE0; font-size: 0.75rem;
    background: rgba(254,250,224,0.1); backdrop-filter: blur(10px);
    padding: 10px 14px; border-radius: 12px; max-width: 220px; z-index: 100; line-height: 1.5;
}
#info h3 { color: #DDA15E; margin-bottom: 4px; font-size: 0.85rem; }
#countLabel {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: rgba(254,250,224,0.06); font-size: 8rem; font-weight: 900;
    pointer-events: none; z-index: 0;
}
</style>
</head>
<body>
<a href="index.html" class="back">&larr; Back</a>
<canvas id="canvas"></canvas>
<div id="countLabel">1</div>
<div id="info">
    <h3>Swing Dance Slot</h3>
    <p>Compare slotted vs circular swing dance styles. WCS moves in a narrow slot while Lindy Hop uses circular (Savoy) or slotted (Hollywood) patterns. Watch the floor patterns emerge.</p>
</div>
<div id="controls">
    <button class="ctrl-btn active" data-style="wcs">West Coast Swing</button>
    <button class="ctrl-btn" data-style="lindy-savoy">Lindy Hop (Savoy)</button>
    <button class="ctrl-btn" data-style="lindy-hollywood">Lindy Hop (Hollywood)</button>
    <button class="ctrl-btn" data-style="jive">Jive</button>
</div>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const countLabel = document.getElementById('countLabel');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let style = 'wcs';
let t = 0;
let trailLead = [];
let trailFollow = [];

document.querySelectorAll('[data-style]').forEach(btn => {
    btn.addEventListener('click', () => {
        style = btn.dataset.style;
        document.querySelectorAll('[data-style]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        t = 0;
        trailLead = [];
        trailFollow = [];
    });
});

const styles = {
    'wcs': {
        name: 'West Coast Swing',
        beats: 6,
        getPositions(phase, cx, cy, scale) {
            // Slotted dance - follow travels back and forth in a slot
            const slotLen = scale * 2;
            // 6-count basic: walk-walk-triple-step-triple-step
            const segments = [
                { lx: 0, ly: 0, fx: 0, fy: -slotLen * 0.5 },         // 1: anchor
                { lx: 0, ly: 0, fx: 0, fy: -slotLen * 0.3 },         // 2: walk
                { lx: 0, ly: slotLen * 0.1, fx: 0, fy: 0 },          // 3: walk
                { lx: 0, ly: slotLen * 0.2, fx: 0, fy: slotLen * 0.3 }, // 4: triple
                { lx: 0, ly: 0, fx: 0, fy: slotLen * 0.5 },          // 5: anchor back
                { lx: 0, ly: -slotLen * 0.1, fx: 0, fy: slotLen * 0.3 }, // 6: anchor
            ];
            const idx = Math.floor(phase * segments.length) % segments.length;
            const frac = (phase * segments.length) % 1;
            const next = (idx + 1) % segments.length;
            const s = segments[idx], sn = segments[next];
            return {
                lx: cx + s.lx + (sn.lx - s.lx) * frac,
                ly: cy + s.ly + (sn.ly - s.ly) * frac,
                fx: cx + s.fx + (sn.fx - s.fx) * frac,
                fy: cy + s.fy + (sn.fy - s.fy) * frac,
                beat: idx + 1
            };
        }
    },
    'lindy-savoy': {
        name: 'Lindy Hop (Savoy Style)',
        beats: 8,
        getPositions(phase, cx, cy, scale) {
            // Circular movement - lead and follow orbit each other
            const r = scale * 0.8;
            const p = phase * Math.PI * 2;
            const swingOut = Math.sin(p * 2) * scale * 0.5;
            return {
                lx: cx + Math.cos(p) * r,
                ly: cy + Math.sin(p) * r,
                fx: cx + Math.cos(p + Math.PI) * r + swingOut * Math.cos(p + Math.PI / 2),
                fy: cy + Math.sin(p + Math.PI) * r + swingOut * Math.sin(p + Math.PI / 2),
                beat: Math.floor(phase * 8) % 8 + 1
            };
        }
    },
    'lindy-hollywood': {
        name: 'Lindy Hop (Hollywood Style)',
        beats: 8,
        getPositions(phase, cx, cy, scale) {
            // Slotted lindy
            const slotLen = scale * 1.8;
            const p = phase * Math.PI * 2;
            const leadSlide = Math.sin(p) * slotLen * 0.3;
            const followTravel = Math.cos(p) * slotLen * 0.5;
            return {
                lx: cx + Math.sin(p * 0.5) * scale * 0.2,
                ly: cy + leadSlide,
                fx: cx + Math.sin(p * 0.5) * scale * 0.15,
                fy: cy + followTravel,
                beat: Math.floor(phase * 8) % 8 + 1
            };
        }
    },
    'jive': {
        name: 'Jive',
        beats: 6,
        getPositions(phase, cx, cy, scale) {
            // Compact, bouncy, slightly circular
            const r = scale * 0.5;
            const p = phase * Math.PI * 2;
            const bounce = Math.abs(Math.sin(p * 3)) * 15;
            return {
                lx: cx + Math.cos(p * 1.5) * r * 0.8,
                ly: cy + Math.sin(p * 0.5) * r * 0.4 - bounce,
                fx: cx + Math.cos(p * 1.5 + Math.PI * 0.8) * r,
                fy: cy + Math.sin(p * 0.5 + Math.PI * 0.6) * r * 0.6 - bounce * 0.8,
                beat: Math.floor(phase * 6) % 6 + 1
            };
        }
    }
};

function drawSlotGuide(cx, cy, scale) {
    if (style === 'wcs' || style === 'lindy-hollywood') {
        // Draw slot
        const slotLen = scale * 2.5;
        const slotW = 40;
        ctx.strokeStyle = 'rgba(221,161,94,0.1)';
        ctx.lineWidth = 1;
        ctx.setLineDash([6, 6]);
        ctx.strokeRect(cx - slotW / 2, cy - slotLen / 2, slotW, slotLen);
        ctx.setLineDash([]);

        ctx.fillStyle = 'rgba(221,161,94,0.05)';
        ctx.fillRect(cx - slotW / 2, cy - slotLen / 2, slotW, slotLen);

        ctx.fillStyle = 'rgba(254,250,224,0.2)';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('SLOT', cx, cy - slotLen / 2 - 5);
    } else if (style === 'lindy-savoy' || style === 'jive') {
        // Draw circular area
        ctx.strokeStyle = 'rgba(138,154,91,0.1)';
        ctx.lineWidth = 1;
        ctx.setLineDash([6, 6]);
        ctx.beginPath();
        ctx.arc(cx, cy, scale * 1.2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = 'rgba(254,250,224,0.2)';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('CIRCULAR', cx, cy - scale * 1.2 - 5);
    }
}

function drawTrail(trail, color) {
    if (trail.length < 2) return;
    for (let i = 1; i < trail.length; i++) {
        const alpha = (i / trail.length) * 0.4;
        ctx.strokeStyle = color;
        ctx.globalAlpha = alpha;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
        ctx.lineTo(trail[i].x, trail[i].y);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
}

let lastTime = performance.now();

function animate(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;
    t += dt * 0.12;

    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    const cx = W / 2;
    const cy = H / 2;
    const scale = Math.min(W, H) * 0.15;

    drawSlotGuide(cx, cy, scale);

    const phase = t % 1;
    const s = styles[style];
    if (!s || typeof s.getPositions !== 'function') { requestAnimationFrame(animate); return; }
    const pos = s.getPositions(phase, cx, cy, scale);
    if (!pos || typeof pos.lx === 'undefined') { requestAnimationFrame(animate); return; }

    trailLead.push({ x: pos.lx, y: pos.ly });
    trailFollow.push({ x: pos.fx, y: pos.fy });
    if (trailLead.length > 200) trailLead.shift();
    if (trailFollow.length > 200) trailFollow.shift();

    drawTrail(trailLead, '#DDA15E');
    drawTrail(trailFollow, '#8A9A5B');

    // Connection
    ctx.strokeStyle = 'rgba(254,250,224,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(pos.lx, pos.ly);
    ctx.lineTo(pos.fx, pos.fy);
    ctx.stroke();

    // Elastic connection visualization
    const connDist = Math.hypot(pos.lx - pos.fx, pos.ly - pos.fy);
    const elasticColor = connDist > scale * 1.5 ? '#BC6C25' : 'rgba(254,250,224,0.3)';
    ctx.strokeStyle = elasticColor;
    ctx.lineWidth = Math.max(1, 4 - connDist / scale);
    const midX = (pos.lx + pos.fx) / 2;
    const midY = (pos.ly + pos.fy) / 2;
    const bulge = Math.sin(t * 10) * 8;
    ctx.beginPath();
    ctx.moveTo(pos.lx, pos.ly);
    ctx.quadraticCurveTo(midX + bulge, midY + bulge, pos.fx, pos.fy);
    ctx.stroke();

    // Lead
    ctx.fillStyle = '#DDA15E';
    ctx.shadowColor = '#DDA15E';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(pos.lx, pos.ly, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#1a1a2e';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('L', pos.lx, pos.ly + 4);

    // Follow
    ctx.fillStyle = '#8A9A5B';
    ctx.shadowColor = '#8A9A5B';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(pos.fx, pos.fy, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillText('F', pos.fx, pos.fy + 4);

    // Beat count
    countLabel.textContent = pos.beat;

    // Style info
    ctx.fillStyle = 'rgba(254,250,224,0.3)';
    ctx.font = '12px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${s.name} - ${s.beats}-count basic`, cx, H - 80);
    ctx.fillText(`Beat ${pos.beat} of ${s.beats}`, cx, H - 62);

    requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

window.reset = function() {
    t = 0;
    trailLead = [];
    trailFollow = [];
    ctx.clearRect(0, 0, W, H);
};
</script>
</body>
</html>
