<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holographic Energy Shield | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #00ccff;
            text-decoration: none;
            z-index: 1000;
            font-size: 1rem;
            font-family: sans-serif;
            background: rgba(0, 20, 40, 0.7);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(0, 204, 255, 0.3);
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        .back-link:hover {
            background: rgba(0, 40, 80, 0.9);
            border-color: rgba(0, 204, 255, 0.7);
        }
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 204, 255, 0.5);
            font-family: sans-serif;
            font-size: 0.85rem;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.08em;
        }
        .title-overlay {
            position: fixed;
            top: 10px;
            right: 14px;
            color: rgba(0, 204, 255, 0.75);
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            pointer-events: none;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back</a>
    <div class="title-overlay">
        HOLOGRAPHIC ENERGY SHIELD<br>
        <span style="opacity:0.5;font-size:0.65rem;">DEFENSE SYSTEM ACTIVE</span>
    </div>
    <div class="info">Drag to rotate &nbsp;|&nbsp; Scroll to zoom</div>

    <script type="importmap">
    {"imports": {"three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"}}
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ── Scene setup ──────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000508);

        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
        camera.position.set(0, 0, 9);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(devicePixelRatio);
        renderer.setSize(innerWidth, innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ── OrbitControls ─────────────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 4;
        controls.maxDistance = 20;

        // ── Post-processing ───────────────────────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(innerWidth, innerHeight),
            2.0,   // strength
            0.4,   // radius
            0.1    // threshold
        );
        composer.addPass(bloomPass);
        composer.addPass(new OutputPass());

        // ── Holographic ShaderMaterial ────────────────────────────────
        const vertexShader = /* glsl */`
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vWorldPos;

            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = /* glsl */`
            uniform float uTime;
            uniform vec3  uCameraPos;
            uniform float uImpactTime;
            uniform vec2  uImpactUV;

            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vWorldPos;

            // ── Hexagonal grid ──────────────────────────────────────
            float hexGrid(vec2 uv, float scale) {
                uv *= scale;
                vec2 r = vec2(1.0, 1.732);
                vec2 h = r * 0.5;
                vec2 a = mod(uv, r) - h;
                vec2 b = mod(uv - h, r) - h;
                return min(dot(a, a), dot(b, b));
            }

            // ── Noise helper ────────────────────────────────────────
            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
            }
            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                return mix(
                    mix(hash(i), hash(i + vec2(1,0)), f.x),
                    mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x),
                    f.y
                );
            }

            void main() {
                // View direction for Fresnel
                vec3 viewDir = normalize(uCameraPos - vWorldPos);
                float ndv = abs(dot(vNormal, viewDir));
                float fresnel = pow(1.0 - ndv, 2.5);

                // ── Scanlines ──────────────────────────────────────
                float scanline = 0.5 + 0.5 * sin(vUv.y * 200.0 - uTime * 3.0);
                float scanFade = mix(0.85, 1.0, scanline);

                // ── Hex grid ───────────────────────────────────────
                float hex = hexGrid(vUv, 15.0);
                float hexEdge = smoothstep(0.02, 0.06, hex);   // 1 = interior, 0 = edge
                float hexBright = 1.0 - hexEdge;               // edges glow

                // ── Interference rings from equator ─────────────
                float dist = length(vUv - vec2(0.5, 0.5));
                float rings = 0.5 + 0.5 * sin(dist * 40.0 - uTime * 5.0);
                rings = pow(rings, 2.0);

                // ── Impact ripples (triggered by click) ─────────
                float impactAge = uTime - uImpactTime;
                float impactRipple = 0.0;
                if (impactAge >= 0.0 && impactAge < 2.0) {
                    float impactDist = length(vUv - uImpactUV);
                    float wave = 0.5 + 0.5 * sin(impactDist * 60.0 - impactAge * 12.0);
                    wave = pow(wave, 3.0);
                    float envelope = (1.0 - impactAge * 0.5) * smoothstep(0.0, 0.05, impactAge);
                    impactRipple = wave * envelope;
                }

                // ── Energy pulse traveling pole→pole ───────────
                float pulse = fract(vUv.y - uTime * 0.15);
                float pulseGlow = smoothstep(0.0, 0.04, pulse) * smoothstep(0.08, 0.04, pulse);

                // ── Color composition ─────────────────────────────
                vec3 cyanBase  = vec3(0.0, 0.85, 1.0);
                vec3 blueEdge  = vec3(0.1, 0.4,  1.0);
                vec3 white     = vec3(1.0, 1.0,  1.0);

                // Fresnel rim glows blue, face is cyan
                vec3 color = mix(cyanBase, blueEdge, fresnel);

                // Hex edges emit bright cyan lines
                color += cyanBase * hexBright * 0.6;

                // Interference rings add subtle white shimmer
                color += white * rings * 0.15;

                // Scanlines modulate brightness slightly
                color *= scanFade;

                // Impact ripple flares white
                color += white * impactRipple * 0.9;

                // Energy pulse band
                color += vec3(0.3, 1.0, 1.0) * pulseGlow * 0.7;

                // Noise flicker for "electronic" feel
                float flicker = noise(vUv * 40.0 + uTime * 3.0) * 0.05;
                color += cyanBase * flicker;

                // ── Alpha ─────────────────────────────────────────
                float alpha =
                    fresnel * 0.85                    // rim always visible
                    + hexBright * 0.35                // hex edges
                    + rings * 0.12                    // rings
                    + pulseGlow * 0.5                 // pulse band
                    + impactRipple * 0.6;             // impact

                alpha = clamp(alpha, 0.0, 1.0);

                gl_FragColor = vec4(color, alpha);
            }
        `;

        const holoMat = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uTime:       { value: 0.0 },
                uCameraPos:  { value: new THREE.Vector3() },
                uImpactTime: { value: -99.0 },
                uImpactUV:   { value: new THREE.Vector2(0.5, 0.5) }
            },
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        // ── Shield sphere ─────────────────────────────────────────────
        const shieldGeo = new THREE.SphereGeometry(3, 128, 64);
        const shield    = new THREE.Mesh(shieldGeo, holoMat);
        scene.add(shield);

        // Second shell slightly larger for outer Fresnel halo
        const haloMat = holoMat.clone();
        haloMat.uniforms = {
            uTime:       { value: 0.0 },
            uCameraPos:  { value: new THREE.Vector3() },
            uImpactTime: { value: -99.0 },
            uImpactUV:   { value: new THREE.Vector2(0.5, 0.5) }
        };
        const halo = new THREE.Mesh(
            new THREE.SphereGeometry(3.12, 64, 32),
            haloMat
        );
        scene.add(halo);

        // ── Inner core ───────────────────────────────────────────────
        const coreGeo = new THREE.IcosahedronGeometry(1.2, 0);
        const coreMat = new THREE.MeshStandardMaterial({
            color:     0x001830,
            emissive:  new THREE.Color(0x003060),
            emissiveIntensity: 0.8,
            metalness: 0.9,
            roughness: 0.2
        });
        const core = new THREE.Mesh(coreGeo, coreMat);
        scene.add(core);

        // Wireframe accent on the core
        const wireGeo = new THREE.IcosahedronGeometry(1.25, 0);
        const wireMat = new THREE.MeshBasicMaterial({
            color: 0x00ccff,
            wireframe: true,
            transparent: true,
            opacity: 0.4
        });
        const wire = new THREE.Mesh(wireGeo, wireMat);
        scene.add(wire);

        // ── Orbiting energy particles ─────────────────────────────────
        const PARTICLE_COUNT = 1200;
        const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
        const particleData = []; // { theta, phi, speed, radius }

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            // Spread particles across thin shell around shield
            const r      = 3.0 + (Math.random() - 0.5) * 0.6;
            const theta  = Math.random() * Math.PI * 2;
            const phi    = Math.acos(2 * Math.random() - 1);
            const speed  = (Math.random() - 0.5) * 0.004 + 0.002;
            particleData.push({ theta, phi, speed, r });
        }

        const particleGeo = new THREE.BufferGeometry();
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

        // Vary particle colors: cyan to white
        const particleColors = new Float32Array(PARTICLE_COUNT * 3);
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const t = Math.random();
            particleColors[i * 3 + 0] = t * 0.2;
            particleColors[i * 3 + 1] = 0.8 + t * 0.2;
            particleColors[i * 3 + 2] = 1.0;
        }
        particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

        const particleMat = new THREE.PointsMaterial({
            size:           0.035,
            vertexColors:   true,
            transparent:    true,
            opacity:        0.8,
            blending:       THREE.AdditiveBlending,
            depthWrite:     false
        });

        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // ── Starfield ─────────────────────────────────────────────────
        const starCount = 2000;
        const starPos   = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i++) {
            starPos[i] = (Math.random() - 0.5) * 160;
        }
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.08,
            transparent: true,
            opacity: 0.6
        });
        scene.add(new THREE.Points(starGeo, starMat));

        // ── Lighting (for the MeshStandardMaterial core) ──────────────
        const ambientLight = new THREE.AmbientLight(0x001040, 2);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0x00ccff, 4, 20);
        pointLight1.position.set(5, 5, 5);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0x0040ff, 2, 15);
        pointLight2.position.set(-4, -3, -4);
        scene.add(pointLight2);

        // ── Impact on click ───────────────────────────────────────────
        const raycaster = new THREE.Raycaster();
        const mouse     = new THREE.Vector2();

        renderer.domElement.addEventListener('click', (e) => {
            mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
            mouse.y = -(e.clientY / innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObject(shield);
            if (hits.length > 0) {
                const uv = hits[0].uv;
                const t  = holoMat.uniforms.uTime.value;
                holoMat.uniforms.uImpactTime.value = t;
                holoMat.uniforms.uImpactUV.value.copy(uv);
                haloMat.uniforms.uImpactTime.value = t;
                haloMat.uniforms.uImpactUV.value.copy(uv);
            }
        });

        // ── Resize handler ────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            composer.setSize(innerWidth, innerHeight);
            bloomPass.resolution.set(innerWidth, innerHeight);
        });

        // ── Animation loop ────────────────────────────────────────────
        const clock = new THREE.Clock();

        renderer.setAnimationLoop(() => {
            const elapsed = clock.getElapsedTime();

            // Update shader uniforms
            holoMat.uniforms.uTime.value = elapsed;
            haloMat.uniforms.uTime.value = elapsed;
            holoMat.uniforms.uCameraPos.value.copy(camera.position);
            haloMat.uniforms.uCameraPos.value.copy(camera.position);

            // Slow shield rotation
            shield.rotation.y = elapsed * 0.08;
            shield.rotation.x = Math.sin(elapsed * 0.05) * 0.03;
            halo.rotation.copy(shield.rotation);

            // Core pulsing rotation
            core.rotation.y  = elapsed * 0.3;
            core.rotation.x  = elapsed * 0.15;
            wire.rotation.y  = -elapsed * 0.2;
            wire.rotation.z  = elapsed * 0.1;

            // Emissive pulse on core
            const pulse = 0.6 + 0.4 * Math.sin(elapsed * 2.5);
            coreMat.emissiveIntensity = pulse;

            // Update orbiting particles
            const posAttr = particleGeo.attributes.position;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const p = particleData[i];
                p.theta += p.speed;
                const x = p.r * Math.sin(p.phi) * Math.cos(p.theta);
                const y = p.r * Math.cos(p.phi) + Math.sin(elapsed * 0.4 + i) * 0.04;
                const z = p.r * Math.sin(p.phi) * Math.sin(p.theta);
                posAttr.setXYZ(i, x, y, z);
            }
            posAttr.needsUpdate = true;

            // Animate point lights
            const a = elapsed * 0.7;
            pointLight1.position.set(
                6 * Math.cos(a),
                4 * Math.sin(a * 0.6),
                6 * Math.sin(a)
            );
            pointLight2.position.set(
                -5 * Math.sin(a * 0.8),
                -3 * Math.cos(a * 0.5),
                -5 * Math.cos(a * 0.8)
            );

            controls.update();
            composer.render();
        });
    </script>
</body>
</html>
