<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Borealis | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed;
            top: 14px;
            left: 14px;
            color: rgba(120, 220, 160, 0.85);
            text-decoration: none;
            z-index: 1000;
            font-size: 0.9rem;
            font-family: 'Nunito', sans-serif, sans-serif;
            background: rgba(0, 0, 0, 0.55);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(100, 200, 140, 0.25);
            transition: background 0.25s ease, color 0.25s ease;
            backdrop-filter: blur(6px);
        }
        .back-link:hover {
            background: rgba(0, 10, 0, 0.8);
            color: rgba(160, 255, 200, 1);
        }
        .info {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(180, 255, 210, 0.45);
            font-family: sans-serif;
            font-size: 0.78rem;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.06em;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Three.js VFX</a>
    <div class="info">Aurora Borealis &mdash; layered GLSL curtains &bull; FBM noise &bull; UnrealBloom</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ─── Renderer ────────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        // ─── Scene & Camera ───────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x01020a);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.01, 200);
        // Positioned slightly back, tilted slightly upward to look at the aurora
        camera.position.set(0, 1.5, 12);
        camera.lookAt(0, 4, 0);

        // ─── Post-processing ──────────────────────────────────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5,   // strength
            0.6,   // radius
            0.10   // threshold
        );
        composer.addPass(bloomPass);
        composer.addPass(new OutputPass());

        // ─── Aurora Vertex Shader ─────────────────────────────────────────────────
        const auroraVert = /* glsl */`
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        // ─── Aurora Fragment Shader ───────────────────────────────────────────────
        const auroraFrag = /* glsl */`
            uniform float uTime;
            uniform float uLayerOffset;
            uniform float uHueShift;
            varying vec2 vUv;

            // ── value noise helpers ──────────────────────────────────────────────
            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
            }

            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                vec2 u = f * f * (3.0 - 2.0 * f);
                return mix(
                    mix(hash(i),              hash(i + vec2(1.0, 0.0)), u.x),
                    mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0, 1.0)), u.x),
                    u.y
                );
            }

            // 4-octave FBM
            float fbm(vec2 p) {
                float v = 0.0;
                float a = 0.5;
                for (int i = 0; i < 4; i++) {
                    v += a * noise(p);
                    p  *= 2.0;
                    a  *= 0.5;
                }
                return v;
            }

            // HSV → RGB helper (for richer hue control)
            vec3 hsv2rgb(vec3 c) {
                vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
                vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
            }

            void main() {
                vec2 uv = vUv;

                // Horizontal warp — big slow drift
                float warp = fbm(vec2(uv.x * 1.8 + uLayerOffset * 0.7, uTime * 0.12 + uLayerOffset));

                // Curtain pattern — vertical bands that ripple with time
                float curtain = fbm(vec2(
                    uv.x * 2.2 + warp * 0.6,
                    uv.y * 2.5 + warp + uTime * 0.09 + uLayerOffset * 1.3
                ));

                // Add a second FBM pass for finer detail streaks
                float detail = fbm(vec2(
                    uv.x * 4.5 - uLayerOffset,
                    uv.y * 3.0 + uTime * 0.15
                )) * 0.35;

                curtain = curtain * 0.75 + detail;

                // Vertical falloff — brightest in the upper-middle band
                float falloff = smoothstep(0.0, 0.35, uv.y) * smoothstep(1.0, 0.45, uv.y);

                // Sharp lower edge — aurora curtains taper at the bottom
                float lowerEdge = smoothstep(0.0, 0.18, uv.y);
                falloff *= lowerEdge;

                float alpha = curtain * falloff * 1.7;
                alpha = clamp(alpha, 0.0, 1.0);

                // Hue: 0.35 = yellow-green, shift through cyan (0.5) to violet (0.8)
                // uHueShift spans 0→0.8 across layers, curtain adds local variation
                float hue = 0.30 + uHueShift * 0.55 + curtain * 0.18;
                hue = mod(hue, 1.0);

                // Saturation dips where curtain is brightest (white-ish hot spots)
                float sat = 0.85 - curtain * 0.25;
                float val = 0.6 + curtain * 0.5;

                vec3 auroraColor = hsv2rgb(vec3(hue, sat, val));

                // Subtle shimmer — rapid small oscillation on bright threads
                float shimmer = sin(uv.x * 80.0 + uTime * 3.5 + uLayerOffset * 20.0) * 0.5 + 0.5;
                shimmer = pow(shimmer, 6.0) * curtain * 0.25;
                auroraColor += shimmer * vec3(0.8, 1.0, 0.9);

                gl_FragColor = vec4(auroraColor, alpha * 0.72);
            }
        `;

        // ─── Aurora Layers ────────────────────────────────────────────────────────
        // 5 planes at slightly different depths and vertical positions
        const LAYER_CONFIGS = [
            { z: -1.0, y: 5.5, hue: 0.00, offset:  0.00, scaleX: 1.10, scaleY: 1.0 },
            { z: -2.2, y: 6.2, hue: 0.20, offset:  2.73, scaleX: 1.20, scaleY: 0.9 },
            { z: -3.4, y: 5.0, hue: 0.40, offset:  5.11, scaleX: 1.05, scaleY: 1.1 },
            { z: -4.5, y: 6.8, hue: 0.60, offset:  8.47, scaleX: 1.30, scaleY: 0.95 },
            { z: -5.5, y: 5.8, hue: 0.80, offset: 12.00, scaleX: 1.15, scaleY: 1.05 },
        ];

        const auroraUniforms = [];
        const PLANE_W = 24;
        const PLANE_H = 10;

        LAYER_CONFIGS.forEach(cfg => {
            const uniforms = {
                uTime:        { value: 0 },
                uLayerOffset: { value: cfg.offset },
                uHueShift:    { value: cfg.hue },
            };
            auroraUniforms.push(uniforms);

            const mat = new THREE.ShaderMaterial({
                vertexShader:   auroraVert,
                fragmentShader: auroraFrag,
                uniforms,
                transparent:  true,
                side:         THREE.DoubleSide,
                depthWrite:   false,
                blending:     THREE.AdditiveBlending,
            });

            const geo = new THREE.PlaneGeometry(PLANE_W * cfg.scaleX, PLANE_H * cfg.scaleY, 1, 1);
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(0, cfg.y, cfg.z);
            scene.add(mesh);
        });

        // ─── Starfield ────────────────────────────────────────────────────────────
        (function buildStars() {
            const COUNT = 5000;
            const pos = new Float32Array(COUNT * 3);
            const sizes = new Float32Array(COUNT);
            const brightness = new Float32Array(COUNT);

            for (let i = 0; i < COUNT; i++) {
                // Spread stars in a dome above the horizon
                const theta  = Math.random() * Math.PI * 2;
                const phi    = Math.random() * Math.PI * 0.5; // upper hemisphere
                const radius = 60 + Math.random() * 40;

                pos[i * 3]     = Math.cos(phi) * Math.cos(theta) * radius;
                pos[i * 3 + 1] = Math.abs(Math.sin(phi)) * radius + 2; // keep above y=2
                pos[i * 3 + 2] = Math.cos(phi) * Math.sin(theta) * radius;

                sizes[i]      = 0.5 + Math.random() * 2.5;
                brightness[i] = 0.4 + Math.random() * 0.6;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position',   new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('aSize',      new THREE.BufferAttribute(sizes, 1));
            geo.setAttribute('aBrightness', new THREE.BufferAttribute(brightness, 1));

            const starVert = /* glsl */`
                attribute float aSize;
                attribute float aBrightness;
                varying float vBrightness;
                void main() {
                    vBrightness = aBrightness;
                    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = aSize * (300.0 / -mvPos.z);
                    gl_Position  = projectionMatrix * mvPos;
                }
            `;
            const starFrag = /* glsl */`
                varying float vBrightness;
                void main() {
                    // Soft circular star with twinkling edge falloff
                    vec2 c = gl_PointCoord - 0.5;
                    float d = length(c);
                    float alpha = smoothstep(0.5, 0.1, d) * vBrightness;
                    // Slight warm-cool tint spread
                    vec3 col = mix(vec3(0.85, 0.90, 1.0), vec3(1.0, 0.95, 0.85), vBrightness);
                    gl_FragColor = vec4(col, alpha);
                }
            `;

            const mat = new THREE.ShaderMaterial({
                vertexShader:   starVert,
                fragmentShader: starFrag,
                transparent:    true,
                depthWrite:     false,
                blending:       THREE.AdditiveBlending,
            });

            scene.add(new THREE.Points(geo, mat));
        })();

        // ─── Arctic Ground Silhouette ─────────────────────────────────────────────
        (function buildSilhouette() {
            // Build a mountain/treeline profile using a custom Shape
            const shape = new THREE.Shape();

            // Start at bottom-left, draw a jagged mountain+treeline horizon
            const W = 30;
            const BASE_Y = -3.0; // base of silhouette in world y

            shape.moveTo(-W, BASE_Y - 4);

            // Mountain range peaks (left to right)
            const profile = [
                [-W, -0.5],
                [-10.5,  2.8],  // tall mountain
                [-8.0,   1.0],
                [-6.5,   3.8],  // tallest peak
                [-5.0,   2.2],
                [-3.8,   3.1],
                [-2.5,   1.5],
                // treeline section
                [-2.0,   1.2],
                [-1.7,   1.85], // tree spike
                [-1.4,   1.2],
                [-1.1,   1.7],  // tree spike
                [-0.8,   1.1],
                [-0.5,   1.6],
                [-0.2,   1.05],
                [ 0.1,   1.55],
                [ 0.4,   0.9],
                [ 0.7,   1.45],
                [ 1.1,   0.85],
                // more mountains
                [ 1.8,   2.6],
                [ 3.0,   1.4],
                [ 4.5,   3.2],
                [ 6.0,   1.8],
                [ 7.5,   2.5],
                [ 9.0,   1.0],
                [ 11.0,  2.2],
                [ W,    -0.5],
            ];

            profile.forEach(([x, y]) => shape.lineTo(x, BASE_Y + y));

            shape.lineTo(W, BASE_Y - 4);
            shape.closePath();

            const geo = new THREE.ShapeGeometry(shape);
            const mat = new THREE.MeshBasicMaterial({ color: 0x000002, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(0, 0, 0.5); // in front of aurora layers (positive z)
            scene.add(mesh);

            // Thin snow caps — slightly lighter stripe along ridge
            const snowShape = new THREE.Shape();
            snowShape.moveTo(-W, BASE_Y - 0.5);
            profile.forEach(([x, y]) => snowShape.lineTo(x, BASE_Y + y));
            snowShape.lineTo(W, BASE_Y - 0.5);
            snowShape.closePath();

            const snowGeo = new THREE.ShapeGeometry(snowShape);
            const snowMat = new THREE.MeshBasicMaterial({
                color: 0x1a2030,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.6,
            });
            const snowMesh = new THREE.Mesh(snowGeo, snowMat);
            snowMesh.position.set(0, 0, 0.45);
            scene.add(snowMesh);
        })();

        // ─── Water / Ice Reflection Plane ─────────────────────────────────────────
        (function buildReflection() {
            // A large flat plane at y ≈ -3.5 that will show a faint reflected aurora
            // We use the same aurora shader but flipped vertically (uv.y inverted)

            const reflFrag = /* glsl */`
                uniform float uTime;
                uniform float uLayerOffset;
                uniform float uHueShift;
                varying vec2 vUv;

                float hash(vec2 p) {
                    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
                }
                float noise(vec2 p) {
                    vec2 i = floor(p); vec2 f = fract(p);
                    vec2 u = f * f * (3.0 - 2.0 * f);
                    return mix(
                        mix(hash(i), hash(i+vec2(1,0)), u.x),
                        mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x),
                        u.y
                    );
                }
                float fbm(vec2 p) {
                    float v=0.; float a=0.5;
                    for(int i=0;i<4;i++){v+=a*noise(p);p*=2.;a*=.5;}
                    return v;
                }
                vec3 hsv2rgb(vec3 c) {
                    vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
                    vec3 p = abs(fract(c.xxx + K.xyz)*6.-K.www);
                    return c.z * mix(K.xxx, clamp(p-K.xxx,0.,1.), c.y);
                }

                void main() {
                    // Flip vertically for reflection
                    vec2 uv = vec2(vUv.x, 1.0 - vUv.y);

                    // Add water ripple distortion
                    float ripple = sin(uv.x * 18.0 + uTime * 1.2) * 0.012
                                 + sin(uv.y * 12.0 + uTime * 0.9) * 0.008;
                    uv.x += ripple;

                    float warp    = fbm(vec2(uv.x * 1.8 + uLayerOffset * 0.7, uTime * 0.12 + uLayerOffset));
                    float curtain = fbm(vec2(uv.x*2.2 + warp*0.6, uv.y*2.5 + warp + uTime*0.09 + uLayerOffset*1.3));

                    float falloff = smoothstep(0.0, 0.35, uv.y) * smoothstep(1.0, 0.45, uv.y);
                    float alpha   = curtain * falloff * 0.9;
                    alpha = clamp(alpha, 0.0, 1.0);

                    float hue = 0.30 + uHueShift * 0.55 + curtain * 0.18;
                    hue = mod(hue, 1.0);
                    vec3 col = hsv2rgb(vec3(hue, 0.85, 0.5 + curtain * 0.4));

                    // Fade reflection toward camera (y=0 of this plane = nearest)
                    float distFade = smoothstep(1.0, 0.0, vUv.y);
                    alpha *= distFade * 0.35;

                    gl_FragColor = vec4(col, alpha);
                }
            `;

            // One merged reflection plane (combines all layers)
            const LAYER_OFFSETS = [0.00, 2.73, 5.11, 8.47, 12.00];
            const LAYER_HUES    = [0.00, 0.20, 0.40, 0.60, 0.80];

            LAYER_OFFSETS.forEach((offset, i) => {
                const uniforms = {
                    uTime:        { value: 0 },
                    uLayerOffset: { value: offset },
                    uHueShift:    { value: LAYER_HUES[i] },
                };
                auroraUniforms.push(uniforms); // reuse the update loop

                const mat = new THREE.ShaderMaterial({
                    vertexShader:   auroraVert,
                    fragmentShader: reflFrag,
                    uniforms,
                    transparent: true,
                    side:        THREE.DoubleSide,
                    depthWrite:  false,
                    blending:    THREE.AdditiveBlending,
                });

                // Plane lies flat on the "ice" surface
                const geo = new THREE.PlaneGeometry(30, 8, 1, 1);
                const mesh = new THREE.Mesh(geo, mat);
                mesh.rotation.x = -Math.PI / 2;  // lay flat
                mesh.position.set(0, -2.8, -3 - i * 0.5);
                scene.add(mesh);
            });

            // Dark frozen water base
            const waterGeo = new THREE.PlaneGeometry(60, 20, 1, 1);
            const waterMat = new THREE.MeshBasicMaterial({ color: 0x010308, side: THREE.DoubleSide });
            const waterMesh = new THREE.Mesh(waterGeo, waterMat);
            waterMesh.rotation.x = -Math.PI / 2;
            waterMesh.position.set(0, -2.85, -5);
            scene.add(waterMesh);
        })();

        // ─── Resize handler ───────────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
            bloomPass.resolution.set(w, h);
        });

        // ─── Subtle camera breathing ──────────────────────────────────────────────
        const CAM_BASE_Y   = 1.5;
        const CAM_BASE_Z   = 12;
        const CAM_TARGET_Y = 4.0;

        // ─── Animation loop ───────────────────────────────────────────────────────
        renderer.setAnimationLoop((elapsed) => {
            const t = elapsed * 0.001; // seconds

            // Update all aurora & reflection uniforms
            auroraUniforms.forEach(u => { u.uTime.value = t; });

            // Gentle camera drift — a slow sine bob that makes the scene feel alive
            camera.position.y = CAM_BASE_Y + Math.sin(t * 0.11) * 0.3;
            camera.position.x = Math.sin(t * 0.07) * 0.4;
            camera.position.z = CAM_BASE_Z + Math.sin(t * 0.05) * 0.6;
            camera.lookAt(
                Math.sin(t * 0.06) * 0.5,  // slight horizontal wander of gaze
                CAM_TARGET_Y + Math.sin(t * 0.13) * 0.5,
                0
            );

            composer.render();
        });
    </script>
</body>
</html>
