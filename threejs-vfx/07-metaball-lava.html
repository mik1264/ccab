<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaball Lava Lamp | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }

        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #8A9A5B;
            text-decoration: none;
            z-index: 1000;
            font-size: 1rem;
            font-family: sans-serif;
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 20px;
            transition: background 0.2s ease;
        }
        .back-link:hover { background: rgba(0,0,0,0.8); }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,200,100,0.5);
            font-family: sans-serif;
            font-size: 0.85rem;
            pointer-events: none;
            white-space: nowrap;
        }

        .stats {
            position: fixed;
            top: 10px;
            right: 10px;
            color: rgba(255,180,80,0.5);
            font-family: monospace;
            font-size: 0.75rem;
            text-align: right;
            line-height: 1.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back</a>
    <div class="info">Fullscreen raymarched metaballs &nbsp;&middot;&nbsp; 10 animated spheres merged via smooth-min</div>
    <div class="stats" id="stats">Raymarching &nbsp;|&nbsp; GLSL smin &nbsp;|&nbsp; UnrealBloom &nbsp;|&nbsp; Three.js r175</div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ─── Renderer ─────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // ─── Orthographic camera (fullscreen quad trick) ───────────────────────────
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const scene  = new THREE.Scene();

    // ─── Vertex shader (pass-through) ─────────────────────────────────────────
    const vertexShader = /* glsl */`
        void main() {
            gl_Position = vec4(position, 1.0);
        }
    `;

    // ─── Fragment shader — raymarched lava lamp ────────────────────────────────
    const fragmentShader = /* glsl */`
        precision highp float;

        uniform float uTime;
        uniform vec2  uResolution;

        // ── Smooth minimum (polynomial) ───────────────────────────────────────
        float smin(float a, float b, float k) {
            float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
            return mix(b, a, h) - k * h * (1.0 - h);
        }

        // ── Sphere SDF ────────────────────────────────────────────────────────
        float sdSphere(vec3 p, vec3 center, float r) {
            return length(p - center) - r;
        }

        // ── Container cylinder SDF (vertical glass tube) ─────────────────────
        float sdCylinder(vec3 p, float radius, float halfHeight) {
            vec2 d = vec2(length(p.xz) - radius, abs(p.y) - halfHeight);
            return min(max(d.x, d.y), 0.0) + length(max(d, 0.0));
        }

        // ── Scene: 10 metaballs inside a lava lamp tube ──────────────────────
        float scene(vec3 p) {
            float t = uTime;

            // Ten blobs at different speeds and orbital radii
            vec3 c0 = vec3( sin(t * 0.70) * 1.10,  cos(t * 0.50) * 1.60,  cos(t * 0.40) * 0.40);
            vec3 c1 = vec3( cos(t * 0.45) * 0.90,  sin(t * 0.85) * 1.40,  sin(t * 0.60) * 0.50);
            vec3 c2 = vec3( sin(t * 1.10) * 0.70,  cos(t * 0.65) * 1.70,  cos(t * 0.75) * 0.70);
            vec3 c3 = vec3( cos(t * 0.80) * 1.20,  sin(t * 0.30) * 1.50,  sin(t * 0.50) * 0.90);
            vec3 c4 = vec3( sin(t * 0.50 + 1.0) * 0.80, cos(t * 1.20) * 1.20, cos(t * 0.35) * 1.00);
            vec3 c5 = vec3( cos(t * 1.30) * 0.55,  sin(t * 0.70) * 1.75,  sin(t * 1.00) * 0.35);
            vec3 c6 = vec3( sin(t * 0.90) * 1.10,  cos(t * 0.40 + 2.0) * 0.90, cos(t * 0.55) * 1.10);
            vec3 c7 = vec3( cos(t * 0.60) * 1.30,  sin(t * 1.10) * 1.30,  sin(t * 0.80) * 0.55);
            // Blob 9: slow large mass rising/falling in center
            vec3 c8 = vec3( sin(t * 0.35) * 0.60,  cos(t * 0.25) * 1.80,  sin(t * 0.45) * 0.55);
            // Blob 10: fast small swirler at lower region
            vec3 c9 = vec3( cos(t * 1.50) * 0.95,  sin(t * 0.55 + 0.8) * 1.10,  cos(t * 1.20) * 0.75);

            float d = sdSphere(p, c0, 0.80);
            d = smin(d, sdSphere(p, c1, 0.72), 0.55);
            d = smin(d, sdSphere(p, c2, 0.62), 0.55);
            d = smin(d, sdSphere(p, c3, 0.76), 0.55);
            d = smin(d, sdSphere(p, c4, 0.66), 0.55);
            d = smin(d, sdSphere(p, c5, 0.56), 0.50);
            d = smin(d, sdSphere(p, c6, 0.70), 0.55);
            d = smin(d, sdSphere(p, c7, 0.60), 0.50);
            d = smin(d, sdSphere(p, c8, 0.85), 0.60);   // blob 9: large slow
            d = smin(d, sdSphere(p, c9, 0.48), 0.45);   // blob 10: small fast

            return d;
        }

        // ── Central-difference normal estimation ─────────────────────────────
        vec3 calcNormal(vec3 p) {
            const vec2 e = vec2(0.0012, 0.0);
            return normalize(vec3(
                scene(p + e.xyy) - scene(p - e.xyy),
                scene(p + e.yxy) - scene(p - e.yxy),
                scene(p + e.yyx) - scene(p - e.yyx)
            ));
        }

        // ── Lava color palette with glowing crack veins ──────────────────────
        vec3 lavaColor(vec3 pos, float t) {
            float ny = smoothstep(-2.0, 2.0, pos.y);

            vec3 colBottom = vec3(0.70, 0.05, 0.00);
            vec3 colMid    = vec3(1.00, 0.30, 0.02);
            vec3 colTop    = vec3(1.00, 0.88, 0.10);

            vec3 baseCol = mix(colBottom, colMid, smoothstep(0.0, 0.55, ny));
            baseCol      = mix(baseCol,   colTop,  smoothstep(0.45, 1.0, ny));

            // Animated wave variation
            float wave = sin(pos.x * 3.1 + t * 0.8) * 0.5 + 0.5;
            wave      *= sin(pos.z * 2.7 + t * 1.1) * 0.5 + 0.5;
            baseCol   += vec3(0.08, 0.04, 0.00) * wave;

            // ── Glowing crack / vein patterns ───────────────────────────────
            float crackU = fract(pos.x * 3.0 + pos.y * 2.1);
            float crackV = fract(pos.z * 2.7 + pos.y * 1.8 + t * 0.15);
            float crackW = fract(pos.x * 2.2 - pos.z * 3.1 + t * 0.10);
            float cracks = smoothstep(0.92, 1.0, crackU)
                         + smoothstep(0.92, 1.0, crackV)
                         + smoothstep(0.94, 1.0, crackW);
            // Bright orange-white veins
            baseCol += vec3(1.0, 0.6, 0.1) * cracks * 2.0;

            return baseCol;
        }

        // ── Ambient occlusion (simple step-based) ────────────────────────────
        float calcAO(vec3 pos, vec3 nor) {
            float occ = 0.0;
            float sca = 1.0;
            for (int i = 0; i < 5; i++) {
                float h  = 0.01 + 0.12 * float(i) / 4.0;
                float d  = scene(pos + h * nor);
                occ     += (h - d) * sca;
                sca     *= 0.95;
            }
            return clamp(1.0 - 3.5 * occ, 0.0, 1.0);
        }

        // ── Soft shadow ──────────────────────────────────────────────────────
        float softShadow(vec3 ro, vec3 rd, float tmin, float tmax, float k) {
            float res = 1.0;
            float t   = tmin;
            for (int i = 0; i < 24; i++) {
                float h = scene(ro + rd * t);
                if (h < 0.001) return 0.0;
                res = min(res, k * h / t);
                t  += clamp(h, 0.02, 0.3);
                if (t > tmax) break;
            }
            return clamp(res, 0.0, 1.0);
        }

        void main() {
            // ── Heat shimmer: distort UV before ray setup ─────────────────────
            vec2 rawUv = (gl_FragCoord.xy - 0.5 * uResolution) / uResolution.y;
            float shimmerX = sin(rawUv.y * 18.0 + uTime * 2.1) * 0.0012;
            float shimmerY = cos(rawUv.x * 14.0 + uTime * 1.7) * 0.0008;
            vec2 uv = rawUv + vec2(shimmerX, shimmerY);

            // ── Camera setup ─────────────────────────────────────────────────
            float camAngle  = uTime * 0.18;
            float camDist   = 5.8;
            float camHeight = 0.6 + sin(uTime * 0.11) * 0.4;

            vec3 ro = vec3(sin(camAngle) * camDist, camHeight, cos(camAngle) * camDist);
            vec3 target  = vec3(0.0, 0.2, 0.0);
            vec3 forward = normalize(target - ro);
            vec3 right   = normalize(cross(forward, vec3(0.0, 1.0, 0.0)));
            vec3 up      = cross(right, forward);

            float fovFactor = 1.4;
            vec3 rd = normalize(forward * fovFactor + right * uv.x + up * uv.y);

            // ── Raymarching loop — 128 steps for sharper surface ─────────────
            float t   = 0.0;
            bool  hit = false;
            const int MAX_STEPS   = 128;
            const float SURF_DIST = 0.0006;
            const float MAX_DIST  = 18.0;

            for (int i = 0; i < MAX_STEPS; i++) {
                vec3 p = ro + rd * t;
                float d = scene(p);
                if (d < SURF_DIST) { hit = true; break; }
                if (t > MAX_DIST)  { break; }
                t += d * 0.82;   // tighter step near surface
            }

            // ── Background ───────────────────────────────────────────────────
            float bgGrad = uv.y * 0.5 + 0.5;
            vec3 bgColor = mix(
                vec3(0.01, 0.00, 0.04),
                vec3(0.02, 0.01, 0.08),
                bgGrad
            );
            float vign = 1.0 - smoothstep(0.4, 1.2, length(uv));
            bgColor *= vign;

            // ── Glass container cylinder ──────────────────────────────────────
            // Ray-march the cylinder independently
            float tCyl = 0.0;
            bool  hitCyl = false;
            vec3  cylNor  = vec3(0.0);
            for (int i = 0; i < 64; i++) {
                vec3 cp = ro + rd * tCyl;
                float dc = sdCylinder(cp, 1.65, 2.1);
                // Only render the outer shell (positive distance close to 0)
                if (abs(dc) < 0.015 && tCyl > 0.1) { hitCyl = true; cylNor = normalize(vec3(cp.x, 0.0, cp.z)); break; }
                tCyl += clamp(abs(dc), 0.02, 0.5);
                if (tCyl > MAX_DIST) break;
            }

            // ── Shading ──────────────────────────────────────────────────────
            vec3 finalColor = bgColor;

            if (hit) {
                vec3 pos = ro + rd * t;
                vec3 nor = calcNormal(pos);

                // ── Surface micro-bump via noise normal perturbation ──────────
                float noiseScale = 4.0;
                vec3 noiseNorm = vec3(
                    sin(pos.x * noiseScale + uTime * 0.3) * cos(pos.z * noiseScale * 0.7),
                    sin(pos.y * noiseScale * 1.3 + uTime * 0.2),
                    cos(pos.x * noiseScale * 0.8) * sin(pos.z * noiseScale + uTime * 0.25)
                ) * 0.12;
                nor = normalize(nor + noiseNorm);

                vec3 keyDir  = normalize(vec3( 1.2,  2.5,  2.0));
                vec3 fillDir = normalize(vec3(-1.0,  0.5, -1.5));
                vec3 rimDir  = normalize(vec3( 0.0, -1.0,  3.0));

                float keyDiff  = max(dot(nor, keyDir),  0.0);
                float fillDiff = max(dot(nor, fillDir), 0.0);

                vec3  h      = normalize(keyDir - rd);
                float spec   = pow(max(dot(nor, h), 0.0), 80.0);
                float spec2  = pow(max(dot(nor, h), 0.0), 20.0) * 0.3;

                float fres = pow(1.0 - max(dot(nor, -rd), 0.0), 3.5);

                float ao  = calcAO(pos, nor);
                float sha = softShadow(pos + nor * 0.02, keyDir, 0.1, 5.0, 8.0);

                vec3 lava = lavaColor(pos, uTime);

                vec3 ambient  = lava * vec3(0.12, 0.06, 0.01) * ao;
                vec3 diffuse  = lava * (
                    keyDiff  * sha  * vec3(1.00, 0.55, 0.15) * 1.1 +
                    fillDiff        * vec3(0.05, 0.02, 0.10) * 0.4
                ) * ao;
                vec3 specular = vec3(1.00, 0.80, 0.50) * spec * sha
                              + vec3(1.00, 0.60, 0.20) * spec2;
                vec3 rim      = vec3(1.00, 0.45, 0.05) * fres * 0.7;

                float thick = clamp(-scene(pos - nor * 0.3) * 4.0, 0.0, 1.0);
                vec3  transm = lava * vec3(1.00, 0.30, 0.02) * thick * 0.25;

                finalColor = ambient + diffuse + specular + rim + transm;
                finalColor = mix(finalColor, finalColor / (1.0 + finalColor), 0.15);
            }

            // ── Glass container overlay ───────────────────────────────────────
            if (hitCyl && (!hit || tCyl < t)) {
                vec3 cylPos = ro + rd * tCyl;
                vec3 cn = cylNor;
                // Basic glass Fresnel
                float cFres = pow(1.0 - abs(dot(cn, -rd)), 3.0);
                vec3  glassCol = vec3(0.3, 0.5, 0.7) * cFres;
                // Slight specular
                vec3  ch = normalize(normalize(vec3(1.2, 2.5, 2.0)) - rd);
                float cSpec = pow(max(dot(cn, ch), 0.0), 32.0) * 0.4;
                glassCol += vec3(0.8, 0.9, 1.0) * cSpec;
                finalColor = mix(finalColor, finalColor + glassCol, 0.25);
            }

            // ── Vignette ─────────────────────────────────────────────────────
            float fullVign = smoothstep(1.0, 0.3, length(uv * vec2(0.85, 1.0)));
            finalColor *= mix(0.55, 1.0, fullVign);

            gl_FragColor = vec4(finalColor, 1.0);
        }
    `;

    // ─── Fullscreen quad material ──────────────────────────────────────────────
    const uniforms = {
        uTime:       { value: 0.0 },
        uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    };

    const material = new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms,
        depthWrite: false,
        depthTest:  false,
    });

    const quad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
    scene.add(quad);

    // ─── Post-processing ───────────────────────────────────────────────────────
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.8,   // stronger bloom for lava glow
        0.7,   // wider radius
        0.04   // very low threshold
    );
    composer.addPass(bloomPass);
    composer.addPass(new OutputPass());

    // ─── Resize handler ───────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        renderer.setSize(w, h);
        composer.setSize(w, h);
        bloomPass.resolution.set(w, h);
        uniforms.uResolution.value.set(w, h);
    });

    // ─── Animation loop ───────────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
        const elapsed = clock.getElapsedTime();
        uniforms.uTime.value = elapsed;

        // Breathe the bloom
        bloomPass.strength  = 1.8 + Math.sin(elapsed * 0.4) * 0.35;
        bloomPass.threshold = 0.04 + Math.sin(elapsed * 0.7) * 0.02;

        composer.render();
    }

    renderer.setAnimationLoop(animate);
    </script>
</body>
</html>
