<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Metal Morphing Sphere | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #8A9A5B;
            text-decoration: none;
            z-index: 1000;
            font-size: 1rem;
            font-family: sans-serif;
            background: rgba(0,0,0,0.55);
            padding: 6px 14px;
            border-radius: 20px;
            transition: background 0.2s ease;
        }
        .back-link:hover { background: rgba(0,0,0,0.85); }
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-family: sans-serif;
            font-size: 0.85rem;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Three.js VFX</a>
    <div class="info">Drag to orbit &nbsp;·&nbsp; Scroll to zoom</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass }from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass }     from 'three/addons/postprocessing/ShaderPass.js';
        import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

        // ── Renderer ──────────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setSize(innerWidth, innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.4;
        document.body.appendChild(renderer.domElement);

        // ── Scene / Camera ────────────────────────────────────────────────────────
        const scene  = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
        camera.position.set(0, 0, 7);

        // ── Orbit controls ────────────────────────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping  = true;
        controls.dampingFactor  = 0.06;
        controls.minDistance    = 3.5;
        controls.maxDistance    = 18;

        // ── Procedural env map from PMREMGenerator ─────────────────────────────────
        const pmrem = new THREE.PMREMGenerator(renderer);
        pmrem.compileEquirectangularShader();

        function buildEnvScene() {
            const s = new THREE.Scene();
            s.background = new THREE.Color(0x000000);

            const lights = [
                { color: 0xffffff, intensity: 4.0, pos: [ 8,  8,  8] },
                { color: 0x88aaff, intensity: 2.5, pos: [-8,  4,  6] },
                { color: 0xff6644, intensity: 1.5, pos: [ 6, -6, -8] },
                { color: 0x44ffcc, intensity: 1.8, pos: [-6, -4,  8] },
                { color: 0xffee88, intensity: 1.2, pos: [ 0,  9, -4] },
                { color: 0xcc88ff, intensity: 1.0, pos: [ 0, -9,  4] },
            ];
            lights.forEach(({ color, intensity, pos }) => {
                const pl = new THREE.PointLight(color, intensity, 50);
                pl.position.set(...pos);
                s.add(pl);
            });

            s.add(new THREE.HemisphereLight(0xfff4e0, 0x223366, 0.8));
            return s;
        }

        const envTexture = pmrem.fromScene(buildEnvScene(), 0, 0.1, 100).texture;
        scene.environment = envTexture;

        // ── Vertex shader — 5-octave simplex noise displacement ───────────────────
        const vertexShader = /* glsl */`
            uniform float uTime;

            varying vec3 vWorldNormal;
            varying vec3 vWorldPos;

            // --- 3-D Simplex Noise (Ashima Arts / Stefan Gustavson) ---------------
            vec3 mod289v3(vec3 x){ return x - floor(x*(1.0/289.0))*289.0; }
            vec4 mod289v4(vec4 x){ return x - floor(x*(1.0/289.0))*289.0; }
            vec4 permute(vec4 x)  { return mod289v4(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314*r; }

            float snoise(vec3 v) {
                const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy));
                vec3 x0 = v - i + dot(i, C.xxx);
                vec3 g  = step(x0.yzx, x0.xyz);
                vec3 l  = 1.0 - g;
                vec3 i1 = min(g.xyz, l.zxy);
                vec3 i2 = max(g.xyz, l.zxy);
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.yyy;
                i = mod289v3(i);
                vec4 p = permute(
                    permute(
                        permute(i.z + vec4(0.0, i1.z, i2.z, 1.0))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                    + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                float n_ = 0.142857142857;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j  = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_);
                vec4 x  = x_ * ns.x + ns.yyyy;
                vec4 y  = y_ * ns.x + ns.yyyy;
                vec4 h  = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4(x.xy, y.xy);
                vec4 b1 = vec4(x.zw, y.zw);
                vec4 s0 = floor(b0) * 2.0 + 1.0;
                vec4 s1 = floor(b1) * 2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
                vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
                vec3 p0 = vec3(a0.xy, h.x);
                vec3 p1 = vec3(a0.zw, h.y);
                vec3 p2 = vec3(a1.xy, h.z);
                vec3 p3 = vec3(a1.zw, h.w);
                vec4 norm = taylorInvSqrt(vec4(
                    dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(
                    dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot(m*m, vec4(
                    dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
            }

            // 5-octave FBM displacement
            float fbmDisplace(vec3 pos, float t) {
                float d = snoise(pos * 1.5 + t * 0.50) * 0.30;   // oct 1
                d      += snoise(pos * 3.0 + t * 0.35) * 0.12;   // oct 2
                d      += snoise(pos * 6.0 + t * 0.20) * 0.05;   // oct 3
                d      += snoise(pos * 11.0 + t * 0.14) * 0.025; // oct 4 — finer
                d      += snoise(pos * 21.0 + t * 0.10) * 0.012; // oct 5 — finest
                return d;
            }

            // Secondary high-frequency ripple (mercury surface shimmer)
            float rippleDisplace(vec3 pos, float t) {
                float r = snoise(pos * 18.0 + t * 2.5) * 0.018;   // fast high-freq
                r      += snoise(pos * 32.0 + t * 3.1) * 0.009;
                return r;
            }

            // Numeric normal on displaced surface
            vec3 displacedNormal(vec3 pos, float t, float eps) {
                float n  = fbmDisplace(pos, t) + rippleDisplace(pos, t);

                vec3 px   = normalize(pos + vec3(eps, 0.0, 0.0));
                vec3 nx_d = px + px * (fbmDisplace(px, t) + rippleDisplace(px, t));

                vec3 pz   = normalize(pos + vec3(0.0, 0.0, eps));
                vec3 nz_d = pz + pz * (fbmDisplace(pz, t) + rippleDisplace(pz, t));

                vec3 origin   = pos + pos * n;
                vec3 tangent  = nz_d - origin;
                vec3 bitangent= nx_d - origin;
                return normalize(cross(tangent, bitangent));
            }

            void main() {
                float t = uTime;

                float d  = fbmDisplace(position, t) + rippleDisplace(position, t);
                vec3 displaced = position + normal * d;

                vec3 dispNorm = displacedNormal(position, t, 0.025);
                vWorldNormal  = normalize(mat3(modelMatrix) * dispNorm);
                vWorldPos     = (modelMatrix * vec4(displaced, 1.0)).xyz;

                gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
            }
        `;

        // ── Fragment shader — full rainbow iridescence ────────────────────────────
        const fragmentShader = /* glsl */`
            uniform float uTime;
            uniform vec3  uCameraPos;
            uniform samplerCube uEnvMap;

            varying vec3 vWorldNormal;
            varying vec3 vWorldPos;

            void main() {
                vec3 N = normalize(vWorldNormal);
                vec3 V = normalize(uCameraPos - vWorldPos);

                vec3 R = reflect(-V, N);
                vec3 envColor = textureCube(uEnvMap, R).rgb;

                // --- Fresnel (Schlick) -------------------------------------------
                float F0 = 0.95;
                float cosTheta = clamp(dot(N, V), 0.0, 1.0);
                float fresnel = F0 + (1.0 - F0) * pow(1.0 - cosTheta, 5.0);

                // --- Chrome base tint -------------------------------------------
                vec3 baseMetal = vec3(0.82, 0.87, 0.92);

                // --- Full rainbow iridescent halo at glancing angles ─────────────
                // Cycle through all hues instead of a limited range
                float edge = pow(1.0 - cosTheta, 2.5);
                float hueShift = uTime * 0.25;
                vec3 iridescence = vec3(
                    0.5 + 0.5 * sin(edge * 12.566 + hueShift + 0.0),
                    0.5 + 0.5 * sin(edge * 12.566 + hueShift + 2.094),
                    0.5 + 0.5 * sin(edge * 12.566 + hueShift + 4.189)
                );
                // Add second harmonic for richer color banding
                vec3 iridescence2 = vec3(
                    0.5 + 0.5 * sin(edge * 25.0 + hueShift * 1.3 + 1.0),
                    0.5 + 0.5 * sin(edge * 25.0 + hueShift * 1.3 + 3.094),
                    0.5 + 0.5 * sin(edge * 25.0 + hueShift * 1.3 + 5.189)
                );
                vec3 finalIrid = mix(iridescence, iridescence2, 0.35);

                // --- Combine reflection ------------------------------------------
                vec3 reflected = envColor * baseMetal;

                // --- Key specular highlight (sun) --------------------------------
                vec3 keyDir = normalize(vec3(0.6, 0.8, 0.5));
                float spec  = pow(max(dot(R, keyDir), 0.0), 256.0);
                vec3 specular = vec3(1.0) * spec;

                // --- Fill specular (secondary light) ----------------------------
                vec3 fillDir  = normalize(vec3(-0.7, -0.3, 0.6));
                float fillSpec = pow(max(dot(R, fillDir), 0.0), 64.0) * 0.35;
                specular += vec3(0.6, 0.75, 1.0) * fillSpec;

                // Third specular for extra brilliance
                vec3 fill2Dir  = normalize(vec3(0.2, -0.8, -0.5));
                float fill2Spec = pow(max(dot(R, fill2Dir), 0.0), 96.0) * 0.2;
                specular += vec3(1.0, 0.8, 0.5) * fill2Spec;

                // --- Final assembly ---------------------------------------------
                vec3 color = reflected * fresnel
                           + specular
                           + finalIrid * edge * 0.22;   // stronger rainbow ring

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        // ── Sphere mesh ───────────────────────────────────────────────────────────
        const sphereGeo = new THREE.SphereGeometry(2, 128, 128);
        const sphereMat = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uTime:      { value: 0.0 },
                uCameraPos: { value: new THREE.Vector3() },
                uEnvMap:    { value: null },
            },
        });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        scene.add(sphere);

        // CubeCamera for live reflections
        const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(512, {
            generateMipmaps: true,
            minFilter: THREE.LinearMipmapLinearFilter,
        });
        const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRenderTarget);
        cubeCamera.position.set(0, 0, 0);
        scene.add(cubeCamera);

        sphere.visible = false;
        cubeCamera.update(renderer, scene);
        sphere.visible = true;

        sphereMat.uniforms.uEnvMap.value = cubeRenderTarget.texture;

        // ── 5 Orbiting chrome spheres ─────────────────────────────────────────────
        const orbitSpheres = [];
        const ORBIT_COUNT = 5;
        const orbitMat = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uTime:      { value: 0.0 },
                uCameraPos: { value: new THREE.Vector3() },
                uEnvMap:    { value: cubeRenderTarget.texture },
            },
        });

        for (let i = 0; i < ORBIT_COUNT; i++) {
            const r   = 0.28 + Math.random() * 0.18;
            const geo = new THREE.SphereGeometry(r, 64, 64);
            const mesh = new THREE.Mesh(geo, orbitMat);

            const orbitRadius = 3.0 + Math.random() * 1.2;
            const orbitTilt   = (Math.random() - 0.5) * Math.PI * 0.6;
            const orbitPhase  = (i / ORBIT_COUNT) * Math.PI * 2;
            const orbitSpeed  = 0.18 + Math.random() * 0.14;

            mesh.userData = { orbitRadius, orbitTilt, orbitPhase, orbitSpeed };
            scene.add(mesh);
            orbitSpheres.push(mesh);
        }

        // ── Floating mercury droplets (original 18) ───────────────────────────────
        const droplets = [];
        const dropletCount = 18;
        const dropletMat = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uTime:      { value: 0.0 },
                uCameraPos: { value: new THREE.Vector3() },
                uEnvMap:    { value: cubeRenderTarget.texture },
            },
        });

        for (let i = 0; i < dropletCount; i++) {
            const r    = 0.18 + Math.random() * 0.28;
            const geo  = new THREE.SphereGeometry(r, 48, 48);
            const mesh = new THREE.Mesh(geo, dropletMat);

            const theta = Math.random() * Math.PI * 2;
            const phi   = Math.acos(2 * Math.random() - 1);
            const dist  = 3.2 + Math.random() * 2.6;

            mesh.userData = {
                basePos: new THREE.Vector3(
                    dist * Math.sin(phi) * Math.cos(theta),
                    dist * Math.sin(phi) * Math.sin(theta),
                    dist * Math.cos(phi)
                ),
                orbitSpeed: (0.06 + Math.random() * 0.10) * (Math.random() < 0.5 ? 1 : -1),
                orbitAxis:  new THREE.Vector3(
                    Math.random() - 0.5,
                    Math.random() - 0.5,
                    Math.random() - 0.5
                ).normalize(),
                phase: Math.random() * Math.PI * 2,
            };

            scene.add(mesh);
            droplets.push(mesh);
        }

        // ── Scene lights ──────────────────────────────────────────────────────────
        const ambientLight = new THREE.AmbientLight(0x112233, 0.4);
        scene.add(ambientLight);

        const lights = [
            new THREE.PointLight(0xffffff, 6.0, 30),
            new THREE.PointLight(0x88aaff, 3.0, 30),
            new THREE.PointLight(0xff8844, 2.0, 30),
        ];
        lights[0].position.set( 6,  8,  6);
        lights[1].position.set(-8,  3,  5);
        lights[2].position.set( 4, -7, -6);
        lights.forEach(l => scene.add(l));

        // ── Surface drip particles ─────────────────────────────────────────────────
        const particleCount = 800;
        const particlePositions = new Float32Array(particleCount * 3);
        const particleSpeeds   = new Float32Array(particleCount);
        const particleThetas   = new Float32Array(particleCount);
        const particlePhis     = new Float32Array(particleCount);
        const particleRadii    = new Float32Array(particleCount);

        for (let i = 0; i < particleCount; i++) {
            particleThetas[i] = Math.random() * Math.PI * 2;
            particlePhis[i]   = Math.acos(2 * Math.random() - 1);
            particleRadii[i]  = 2.05 + Math.random() * 0.08;
            particleSpeeds[i] = 0.12 + Math.random() * 0.25;
        }

        const particleGeo = new THREE.BufferGeometry();
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMesh = new THREE.Points(particleGeo, new THREE.PointsMaterial({
            color: 0xc8d8e8,
            size:  0.022,
            sizeAttenuation: true,
            transparent: true,
            opacity: 0.7,
        }));
        scene.add(particleMesh);

        // ── Post-processing: bloom + chromatic aberration ─────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloom = new UnrealBloomPass(
            new THREE.Vector2(innerWidth, innerHeight),
            0.8,   // stronger bloom (was 0.5)
            0.5,   // wider radius
            0.60   // lower threshold — more highlights bloom
        );
        composer.addPass(bloom);

        // ── Chromatic aberration ShaderPass ───────────────────────────────────────
        const chromaticPass = new ShaderPass({
            uniforms: {
                tDiffuse:   { value: null },
                uStrength:  { value: 0.006 },
                uTime:      { value: 0.0 },
            },
            vertexShader: /* glsl */`
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: /* glsl */`
                uniform sampler2D tDiffuse;
                uniform float uStrength;
                uniform float uTime;
                varying vec2 vUv;

                void main() {
                    vec2 center = vec2(0.5);
                    vec2 dir = (vUv - center);
                    float dist = length(dir);
                    // Pulsing aberration — stronger at edges
                    float mag = uStrength * dist * (0.85 + 0.15 * sin(uTime * 1.3));

                    float r = texture2D(tDiffuse, vUv + dir * mag * 1.5).r;
                    float g = texture2D(tDiffuse, vUv).g;
                    float b = texture2D(tDiffuse, vUv - dir * mag * 1.2).b;

                    gl_FragColor = vec4(r, g, b, 1.0);
                }
            `
        });
        composer.addPass(chromaticPass);
        composer.addPass(new OutputPass());

        // ── Resize handler ─────────────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            composer.setSize(innerWidth, innerHeight);
            bloom.resolution.set(innerWidth, innerHeight);
        });

        // ── Animation loop ─────────────────────────────────────────────────────────
        const clock = new THREE.Clock();
        const _quat = new THREE.Quaternion();

        renderer.setAnimationLoop(() => {
            const t = clock.getElapsedTime();

            // -- Main sphere uniforms + slow auto-rotation -----------------------
            sphereMat.uniforms.uTime.value = t;
            sphereMat.uniforms.uCameraPos.value.copy(camera.position);

            sphere.rotation.y = t * 0.08;
            sphere.rotation.x = Math.sin(t * 0.05) * 0.3;

            // -- 5 Orbiting chrome spheres ---------------------------------------
            orbitMat.uniforms.uTime.value = t;
            orbitMat.uniforms.uCameraPos.value.copy(camera.position);

            orbitSpheres.forEach((mesh, i) => {
                const { orbitRadius, orbitTilt, orbitPhase, orbitSpeed } = mesh.userData;
                const angle = t * orbitSpeed + orbitPhase;
                // Orbit in a tilted plane
                mesh.position.set(
                    orbitRadius * Math.cos(angle),
                    orbitRadius * Math.sin(angle) * Math.sin(orbitTilt),
                    orbitRadius * Math.sin(angle) * Math.cos(orbitTilt)
                );
                // Self-rotation
                mesh.rotation.y = t * 0.8 * (i % 2 === 0 ? 1 : -1);
            });

            // -- Droplets --------------------------------------------------------
            dropletMat.uniforms.uTime.value = t;
            dropletMat.uniforms.uCameraPos.value.copy(camera.position);

            droplets.forEach((mesh) => {
                const { basePos, orbitSpeed, orbitAxis, phase } = mesh.userData;
                const angle = t * orbitSpeed + phase;
                _quat.setFromAxisAngle(orbitAxis, angle);
                mesh.position.copy(basePos).applyQuaternion(_quat);
                mesh.position.addScaledVector(orbitAxis, Math.sin(t * 0.4 + phase) * 0.15);
            });

            // -- Surface drip particles ------------------------------------------
            for (let i = 0; i < particleCount; i++) {
                particlePhis[i] += particleSpeeds[i] * 0.005;
                if (particlePhis[i] > Math.PI) particlePhis[i] -= Math.PI * 2;

                const theta = particleThetas[i] + t * particleSpeeds[i] * 0.04;
                const phi   = particlePhis[i];
                const r     = particleRadii[i];

                particlePositions[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
                particlePositions[i * 3 + 1] = r * Math.cos(phi);
                particlePositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
            }
            particleGeo.attributes.position.needsUpdate = true;

            // -- Chromatic aberration pulse --------------------------------------
            chromaticPass.uniforms.uTime.value = t;
            // Subtle breathing of the aberration strength
            chromaticPass.uniforms.uStrength.value = 0.005 + 0.003 * Math.sin(t * 0.8);

            // Bloom pulse tied to surface motion
            bloom.strength = 0.8 + 0.25 * Math.sin(t * 0.6);

            // -- Controls & render -----------------------------------------------
            controls.update();
            composer.render();
        });
    </script>
</body>
</html>
