<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Metal Morphing Sphere | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #8A9A5B;
            text-decoration: none;
            z-index: 1000;
            font-size: 1rem;
            font-family: sans-serif;
            background: rgba(0,0,0,0.55);
            padding: 6px 14px;
            border-radius: 20px;
            transition: background 0.2s ease;
        }
        .back-link:hover { background: rgba(0,0,0,0.85); }
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-family: sans-serif;
            font-size: 0.85rem;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Three.js VFX</a>
    <div class="info">Drag to orbit &nbsp;·&nbsp; Scroll to zoom</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass }from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

        // ── Renderer ──────────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setSize(innerWidth, innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.4;
        document.body.appendChild(renderer.domElement);

        // ── Scene / Camera ────────────────────────────────────────────────────────
        const scene  = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
        camera.position.set(0, 0, 7);

        // ── Orbit controls ────────────────────────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping  = true;
        controls.dampingFactor  = 0.06;
        controls.minDistance    = 3.5;
        controls.maxDistance    = 18;

        // ── Procedural env map from PMREMGenerator ────────────────────────────────
        // Build a tiny scene of colored lights that will bake into a cube env texture.
        // The PMREM generator handles importance sampling for realistic reflections.
        const pmrem = new THREE.PMREMGenerator(renderer);
        pmrem.compileEquirectangularShader();

        function buildEnvScene() {
            const s = new THREE.Scene();
            s.background = new THREE.Color(0x000000);

            // Large soft "studio" lights at various angles
            const lights = [
                { color: 0xffffff, intensity: 4.0, pos: [ 8,  8,  8] },
                { color: 0x88aaff, intensity: 2.5, pos: [-8,  4,  6] },
                { color: 0xff6644, intensity: 1.5, pos: [ 6, -6, -8] },
                { color: 0x44ffcc, intensity: 1.8, pos: [-6, -4,  8] },
                { color: 0xffee88, intensity: 1.2, pos: [ 0,  9, -4] },
                { color: 0xcc88ff, intensity: 1.0, pos: [ 0, -9,  4] },
            ];
            lights.forEach(({ color, intensity, pos }) => {
                const pl = new THREE.PointLight(color, intensity, 50);
                pl.position.set(...pos);
                s.add(pl);
            });

            // Hemisphere fills: warm sky / cool ground
            s.add(new THREE.HemisphereLight(0xfff4e0, 0x223366, 0.8));
            return s;
        }

        const envTexture = pmrem.fromScene(buildEnvScene(), 0, 0.1, 100).texture;
        scene.environment = envTexture;

        // ── Vertex shader (simplex noise displacement) ─────────────────────────────
        const vertexShader = /* glsl */`
            uniform float uTime;

            varying vec3 vWorldNormal;
            varying vec3 vWorldPos;

            // --- 3-D Simplex Noise (Ashima Arts / Stefan Gustavson) ---------------
            vec3 mod289v3(vec3 x){ return x - floor(x*(1.0/289.0))*289.0; }
            vec4 mod289v4(vec4 x){ return x - floor(x*(1.0/289.0))*289.0; }
            vec4 permute(vec4 x)  { return mod289v4(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314*r; }

            float snoise(vec3 v) {
                const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy));
                vec3 x0 = v - i + dot(i, C.xxx);
                vec3 g  = step(x0.yzx, x0.xyz);
                vec3 l  = 1.0 - g;
                vec3 i1 = min(g.xyz, l.zxy);
                vec3 i2 = max(g.xyz, l.zxy);
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.yyy;
                i = mod289v3(i);
                vec4 p = permute(
                    permute(
                        permute(i.z + vec4(0.0, i1.z, i2.z, 1.0))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                    + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                float n_ = 0.142857142857;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j  = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_);
                vec4 x  = x_ * ns.x + ns.yyyy;
                vec4 y  = y_ * ns.x + ns.yyyy;
                vec4 h  = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4(x.xy, y.xy);
                vec4 b1 = vec4(x.zw, y.zw);
                vec4 s0 = floor(b0) * 2.0 + 1.0;
                vec4 s1 = floor(b1) * 2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
                vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
                vec3 p0 = vec3(a0.xy, h.x);
                vec3 p1 = vec3(a0.zw, h.y);
                vec3 p2 = vec3(a1.xy, h.z);
                vec3 p3 = vec3(a1.zw, h.w);
                vec4 norm = taylorInvSqrt(vec4(
                    dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(
                    dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot(m*m, vec4(
                    dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
            }
            // -----------------------------------------------------------------------

            // Compute displaced normal numerically (finite differences)
            vec3 displacedNormal(vec3 pos, float t, float eps) {
                float n  = snoise(pos * 1.5 + t * 0.5) * 0.30
                         + snoise(pos * 3.0 + t * 0.35) * 0.12
                         + snoise(pos * 6.0 + t * 0.20) * 0.04;

                vec3 px = normalize(pos + vec3(eps, 0.0, 0.0));
                vec3 nx_d = px + px * (
                    snoise(px*1.5+t*0.5)*0.30 +
                    snoise(px*3.0+t*0.35)*0.12 +
                    snoise(px*6.0+t*0.20)*0.04);

                vec3 pz = normalize(pos + vec3(0.0, 0.0, eps));
                vec3 nz_d = pz + pz * (
                    snoise(pz*1.5+t*0.5)*0.30 +
                    snoise(pz*3.0+t*0.35)*0.12 +
                    snoise(pz*6.0+t*0.20)*0.04);

                vec3 origin = pos + pos * n;
                vec3 tangent  = nz_d - origin;
                vec3 bitangent= nx_d - origin;
                return normalize(cross(tangent, bitangent));
            }

            void main() {
                float t = uTime;

                // Multi-octave displacement along the sphere's own normal
                float d = snoise(position * 1.5 + t * 0.50) * 0.30
                        + snoise(position * 3.0 + t * 0.35) * 0.12
                        + snoise(position * 6.0 + t * 0.20) * 0.04;

                vec3 displaced = position + normal * d;

                // Numeric normal on the displaced surface
                vec3 dispNorm = displacedNormal(position, t, 0.03);
                vWorldNormal  = normalize(mat3(modelMatrix) * dispNorm);
                vWorldPos     = (modelMatrix * vec4(displaced, 1.0)).xyz;

                gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
            }
        `;

        // ── Fragment shader (chrome / liquid metal) ────────────────────────────────
        const fragmentShader = /* glsl */`
            uniform float uTime;
            uniform vec3  uCameraPos;
            uniform samplerCube uEnvMap;

            varying vec3 vWorldNormal;
            varying vec3 vWorldPos;

            void main() {
                vec3 N = normalize(vWorldNormal);
                vec3 V = normalize(uCameraPos - vWorldPos);

                // --- reflection ---------------------------------------------------
                vec3 R = reflect(-V, N);
                vec3 envColor = textureCube(uEnvMap, R).rgb;

                // --- Fresnel (Schlick) -------------------------------------------
                // Chrome base reflectance F0 ~ 0.95 (near-perfect mirror)
                float F0 = 0.95;
                float cosTheta = clamp(dot(N, V), 0.0, 1.0);
                float fresnel = F0 + (1.0 - F0) * pow(1.0 - cosTheta, 5.0);

                // --- Chrome base tint: silver-blue --------------------------------
                vec3 baseMetal = vec3(0.82, 0.87, 0.92);

                // --- Very subtle iridescent rainbow at glancing angles ------------
                float edge = pow(1.0 - cosTheta, 3.0);
                vec3 iridescence = vec3(
                    0.5 + 0.5 * sin(edge * 6.2832 + uTime * 0.6 + 0.0),
                    0.5 + 0.5 * sin(edge * 6.2832 + uTime * 0.6 + 2.094),
                    0.5 + 0.5 * sin(edge * 6.2832 + uTime * 0.6 + 4.189)
                );

                // --- Combine: env reflection tinted by metal albedo --------------
                vec3 reflected = envColor * baseMetal;

                // --- Key specular highlight (sun / studio key) -------------------
                vec3 keyDir = normalize(vec3(0.6, 0.8, 0.5));
                float spec  = pow(max(dot(R, keyDir), 0.0), 256.0);
                vec3 specular = vec3(1.0) * spec;

                // --- Fill specular (secondary light) ----------------------------
                vec3 fillDir = normalize(vec3(-0.7, -0.3, 0.6));
                float fillSpec = pow(max(dot(R, fillDir), 0.0), 64.0) * 0.35;
                specular += vec3(0.6, 0.75, 1.0) * fillSpec;

                // --- Final assembly ---------------------------------------------
                vec3 color = reflected * fresnel
                           + specular
                           + iridescence * edge * 0.08;

                // Gamma is handled by ACESFilmic tone mapping + OutputPass
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        // ── Sphere mesh ───────────────────────────────────────────────────────────
        const sphereGeo = new THREE.SphereGeometry(2, 128, 128);
        const sphereMat = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uTime:      { value: 0.0 },
                uCameraPos: { value: new THREE.Vector3() },
                uEnvMap:    { value: null },   // set below after PMREMGenerator builds it
            },
        });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        scene.add(sphere);

        // Wire the pre-generated env map into the shader uniform
        // (Using the raw cube texture from the PMREM target)
        // PMREMGenerator.fromScene returns an RenderTarget; .texture is the pmrem result.
        // We also expose the raw cube so the shader can use textureCube().
        // Build a second, unfiltered cube render target for the raw cube reflection.
        const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(512, {
            generateMipmaps: true,
            minFilter: THREE.LinearMipmapLinearFilter,
        });
        const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRenderTarget);
        // The cubeCamera does not need to be in the scene; we set its position manually.
        cubeCamera.position.set(0, 0, 0);
        scene.add(cubeCamera);

        // The CubeCamera will be updated once after the lights are set up.
        // We deliberately keep the sphere invisible during the bake.
        sphere.visible = false;
        cubeCamera.update(renderer, scene);
        sphere.visible = true;

        sphereMat.uniforms.uEnvMap.value = cubeRenderTarget.texture;

        // ── Floating mercury droplets ─────────────────────────────────────────────
        const droplets = [];
        const dropletCount = 18;
        const dropletMat = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uTime:      { value: 0.0 },
                uCameraPos: { value: new THREE.Vector3() },
                uEnvMap:    { value: cubeRenderTarget.texture },
            },
        });

        for (let i = 0; i < dropletCount; i++) {
            const r    = 0.18 + Math.random() * 0.28;
            const geo  = new THREE.SphereGeometry(r, 48, 48);
            const mesh = new THREE.Mesh(geo, dropletMat);

            const theta = Math.random() * Math.PI * 2;
            const phi   = Math.acos(2 * Math.random() - 1);
            const dist  = 3.2 + Math.random() * 2.6;

            mesh.userData = {
                basePos: new THREE.Vector3(
                    dist * Math.sin(phi) * Math.cos(theta),
                    dist * Math.sin(phi) * Math.sin(theta),
                    dist * Math.cos(phi)
                ),
                orbitSpeed: (0.06 + Math.random() * 0.10) * (Math.random() < 0.5 ? 1 : -1),
                orbitAxis:  new THREE.Vector3(
                    Math.random() - 0.5,
                    Math.random() - 0.5,
                    Math.random() - 0.5
                ).normalize(),
                phase: Math.random() * Math.PI * 2,
            };

            scene.add(mesh);
            droplets.push(mesh);
        }

        // ── Scene lights (real lights for Three.js, complement shader lights) ────
        const ambientLight = new THREE.AmbientLight(0x112233, 0.4);
        scene.add(ambientLight);

        const lights = [
            new THREE.PointLight(0xffffff, 6.0, 30),
            new THREE.PointLight(0x88aaff, 3.0, 30),
            new THREE.PointLight(0xff8844, 2.0, 30),
        ];
        lights[0].position.set( 6,  8,  6);
        lights[1].position.set(-8,  3,  5);
        lights[2].position.set( 4, -7, -6);
        lights.forEach(l => scene.add(l));

        // ── Particle drip system (small dots streaming around) ─────────────────────
        const particleCount = 800;
        const particlePositions = new Float32Array(particleCount * 3);
        const particleSpeeds   = new Float32Array(particleCount);
        const particleThetas   = new Float32Array(particleCount);
        const particlePhis     = new Float32Array(particleCount);
        const particleRadii    = new Float32Array(particleCount);

        for (let i = 0; i < particleCount; i++) {
            particleThetas[i] = Math.random() * Math.PI * 2;
            particlePhis[i]   = Math.acos(2 * Math.random() - 1);
            particleRadii[i]  = 2.05 + Math.random() * 0.08;
            particleSpeeds[i] = 0.12 + Math.random() * 0.25;
        }

        const particleGeo = new THREE.BufferGeometry();
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMesh = new THREE.Points(particleGeo, new THREE.PointsMaterial({
            color: 0xc8d8e8,
            size:  0.022,
            sizeAttenuation: true,
            transparent: true,
            opacity: 0.7,
        }));
        scene.add(particleMesh);

        // ── Post-processing ────────────────────────────────────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloom = new UnrealBloomPass(
            new THREE.Vector2(innerWidth, innerHeight),
            0.5,   // strength  – subtle chrome gleam
            0.4,   // radius
            0.75   // threshold – only the brightest highlights bloom
        );
        composer.addPass(bloom);
        composer.addPass(new OutputPass());

        // ── Resize handler ─────────────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            composer.setSize(innerWidth, innerHeight);
            bloom.resolution.set(innerWidth, innerHeight);
        });

        // ── Animation loop ─────────────────────────────────────────────────────────
        const clock = new THREE.Clock();
        const _quat = new THREE.Quaternion();

        renderer.setAnimationLoop(() => {
            const t = clock.getElapsedTime();

            // -- Main sphere uniforms + slow auto-rotation ------------------------
            sphereMat.uniforms.uTime.value = t;
            sphereMat.uniforms.uCameraPos.value.copy(camera.position);

            sphere.rotation.y = t * 0.08;
            sphere.rotation.x = Math.sin(t * 0.05) * 0.3;

            // -- Droplets ---------------------------------------------------------
            dropletMat.uniforms.uTime.value = t;
            dropletMat.uniforms.uCameraPos.value.copy(camera.position);

            droplets.forEach((mesh) => {
                const { basePos, orbitSpeed, orbitAxis, phase } = mesh.userData;
                const angle = t * orbitSpeed + phase;
                _quat.setFromAxisAngle(orbitAxis, angle);
                mesh.position.copy(basePos).applyQuaternion(_quat);
                // Gentle bob along orbit axis
                mesh.position.addScaledVector(orbitAxis, Math.sin(t * 0.4 + phase) * 0.15);
            });

            // -- Surface drip particles (flow along sphere surface) ---------------
            for (let i = 0; i < particleCount; i++) {
                particlePhis[i] += particleSpeeds[i] * 0.005;
                if (particlePhis[i] > Math.PI) particlePhis[i] -= Math.PI * 2;

                const theta = particleThetas[i] + t * particleSpeeds[i] * 0.04;
                const phi   = particlePhis[i];
                const r     = particleRadii[i];

                particlePositions[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
                particlePositions[i * 3 + 1] = r * Math.cos(phi);
                particlePositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
            }
            particleGeo.attributes.position.needsUpdate = true;

            // -- Controls & render ------------------------------------------------
            controls.update();
            composer.render();
        });
    </script>
</body>
</html>
