<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Web – Dark Matter Filaments | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
        #info {
            position: fixed;
            bottom: 18px;
            right: 18px;
            color: rgba(180,220,255,0.55);
            font-family: 'Helvetica Neue', sans-serif;
            font-size: 12px;
            line-height: 1.6;
            text-align: right;
            pointer-events: none;
            letter-spacing: 0.04em;
        }
        #title {
            position: fixed;
            top: 18px;
            right: 18px;
            color: rgba(180,220,255,0.7);
            font-family: 'Helvetica Neue', sans-serif;
            font-size: 13px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-family:sans-serif;background:rgba(0,0,0,0.5);padding:6px 14px;border-radius:20px;">← Back</a>

    <div id="title">Cosmic Web &nbsp;/&nbsp; Dark Matter Filaments</div>
    <div id="info">Drag to orbit &nbsp;|&nbsp; Scroll to zoom</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

        // ─── Constants ─────────────────────────────────────────────────────────
        const NODE_COUNT       = 80;
        const HALF_EXTENT      = 10;          // nodes live in [-10, 10]^3
        const NEAREST_K        = 3;           // filaments per node
        const FILAMENT_SEGS    = 80;          // points per filament curve
        const FILAMENT_WOBBLE  = 0.18;        // max sinusoidal displacement
        const DUST_COUNT       = 50_000;
        const AUTO_ROTATE_SPD  = 0.00018;     // rad/frame

        // ─── Renderer ──────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        // ─── Scene & Camera ────────────────────────────────────────────────────
        const scene  = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 0, 38);

        // Ambient light (subtle) + point light at centre for node shading
        scene.add(new THREE.AmbientLight(0x112244, 1.5));
        const pointLight = new THREE.PointLight(0x4488ff, 2, 60);
        scene.add(pointLight);

        // ─── OrbitControls ────────────────────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance   = 5;
        controls.maxDistance   = 80;
        controls.autoRotate    = false;   // we do manual rotation on the group

        // ─── Master group (everything rotates together) ────────────────────────
        const cosmos = new THREE.Group();
        scene.add(cosmos);

        // ─── 1. NODES ─────────────────────────────────────────────────────────
        const nodePositions = [];          // THREE.Vector3 array
        const nodeMeshes    = [];

        const nodeGeo = new THREE.SphereGeometry(0.15, 14, 14);

        for (let i = 0; i < NODE_COUNT; i++) {
            const pos = new THREE.Vector3(
                (Math.random() - 0.5) * 2 * HALF_EXTENT,
                (Math.random() - 0.5) * 2 * HALF_EXTENT,
                (Math.random() - 0.5) * 2 * HALF_EXTENT
            );
            nodePositions.push(pos);

            const mat = new THREE.MeshStandardMaterial({
                color:            0xffffff,
                emissive:         0xffffff,
                emissiveIntensity: 2.0,
                roughness:        0.2,
                metalness:        0.1,
            });

            const mesh = new THREE.Mesh(nodeGeo, mat);
            mesh.position.copy(pos);
            cosmos.add(mesh);
            nodeMeshes.push(mesh);
        }

        // ─── 2. FILAMENTS ─────────────────────────────────────────────────────
        // Helper: k nearest neighbours for a given node index
        function kNearest(idx, k) {
            const origin = nodePositions[idx];
            const dists = nodePositions
                .map((p, j) => ({ j, d: origin.distanceTo(p) }))
                .filter(o => o.j !== idx)
                .sort((a, b) => a.d - b.d);
            return dists.slice(0, k).map(o => o.j);
        }

        // Colour helper: lerp between cyan and purple along t in [0,1]
        function filamentColor(t) {
            // cyan  = (0, 1, 1)  at t=0
            // magenta = (1, 0, 1) at t=0.5
            // purple  = (0.55, 0, 1) at t=1
            const r = t < 0.5 ? THREE.MathUtils.lerp(0,   1,    t * 2)
                               : THREE.MathUtils.lerp(1,   0.55, (t - 0.5) * 2);
            const g = t < 0.5 ? THREE.MathUtils.lerp(1,   0,    t * 2)
                               : 0;
            const b = 1.0;
            return new THREE.Color(r, g, b);
        }

        // Build one filament as a LineSegments (pairs of coloured vertices)
        const edgeSet = new Set();   // avoid duplicate filaments
        const filamentGroup = new THREE.Group();
        cosmos.add(filamentGroup);

        for (let i = 0; i < NODE_COUNT; i++) {
            const neighbours = kNearest(i, NEAREST_K);
            for (const j of neighbours) {
                const key = i < j ? `${i}-${j}` : `${j}-${i}`;
                if (edgeSet.has(key)) continue;
                edgeSet.add(key);

                const A = nodePositions[i];
                const B = nodePositions[j];

                // Direction + perpendicular axes for wobble
                const dir = new THREE.Vector3().subVectors(B, A);
                const len = dir.length();
                const dirN = dir.clone().normalize();

                // Build a perpendicular vector (up unless nearly parallel)
                let up = new THREE.Vector3(0, 1, 0);
                if (Math.abs(dirN.dot(up)) > 0.95) up.set(1, 0, 0);
                const perp1 = new THREE.Vector3().crossVectors(dirN, up).normalize();
                const perp2 = new THREE.Vector3().crossVectors(dirN, perp1).normalize();

                // Random phase and frequency for this filament
                const phase  = Math.random() * Math.PI * 2;
                const freq   = 1.5 + Math.random() * 2.0;   // cycles along filament
                const amp    = FILAMENT_WOBBLE * (0.5 + Math.random() * 0.5);
                const amp2   = FILAMENT_WOBBLE * (0.3 + Math.random() * 0.4);

                // Sample FILAMENT_SEGS+1 points, build FILAMENT_SEGS segment pairs
                const pts    = new Float32Array((FILAMENT_SEGS + 1) * 3);
                const colors = new Float32Array((FILAMENT_SEGS + 1) * 3);

                for (let s = 0; s <= FILAMENT_SEGS; s++) {
                    const t    = s / FILAMENT_SEGS;
                    // Base interpolation
                    const base = A.clone().lerp(B, t);
                    // Sinusoidal wobble (fades to zero at endpoints for smooth attachment)
                    const envelope = Math.sin(t * Math.PI);           // 0→1→0
                    const wobble   = envelope * amp  * Math.sin(freq * t * Math.PI * 2 + phase);
                    const wobble2  = envelope * amp2 * Math.cos(freq * t * Math.PI * 2 + phase * 0.7);
                    const pt = base
                        .addScaledVector(perp1, wobble)
                        .addScaledVector(perp2, wobble2);

                    pts[s * 3]     = pt.x;
                    pts[s * 3 + 1] = pt.y;
                    pts[s * 3 + 2] = pt.z;

                    const col = filamentColor(t);
                    colors[s * 3]     = col.r;
                    colors[s * 3 + 1] = col.g;
                    colors[s * 3 + 2] = col.b;
                }

                // Build index buffer: pairs (0,1), (1,2), ... (n-1,n)
                const indices = new Uint32Array(FILAMENT_SEGS * 2);
                for (let s = 0; s < FILAMENT_SEGS; s++) {
                    indices[s * 2]     = s;
                    indices[s * 2 + 1] = s + 1;
                }

                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.BufferAttribute(pts,    3));
                geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
                geo.setIndex(new THREE.BufferAttribute(indices, 1));

                const mat = new THREE.LineBasicMaterial({
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.75,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                });

                const line = new THREE.LineSegments(geo, mat);
                // Store original per-vertex colour for potential future fade
                filamentGroup.add(line);
            }
        }

        // ─── 3. COSMIC DUST (background particles) ────────────────────────────
        const dustPositions = new Float32Array(DUST_COUNT * 3);
        const dustColors    = new Float32Array(DUST_COUNT * 3);
        const spread        = HALF_EXTENT * 2.2;

        for (let i = 0; i < DUST_COUNT; i++) {
            dustPositions[i * 3]     = (Math.random() - 0.5) * spread * 2;
            dustPositions[i * 3 + 1] = (Math.random() - 0.5) * spread * 2;
            dustPositions[i * 3 + 2] = (Math.random() - 0.5) * spread * 2;

            // Very dim — mostly dark blue/purple haze
            const hue = 200 + Math.random() * 80;     // 200-280 (blue→purple)
            const col = new THREE.Color().setHSL(hue / 360, 0.7, 0.06 + Math.random() * 0.06);
            dustColors[i * 3]     = col.r;
            dustColors[i * 3 + 1] = col.g;
            dustColors[i * 3 + 2] = col.b;
        }

        const dustGeo = new THREE.BufferGeometry();
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        dustGeo.setAttribute('color',    new THREE.BufferAttribute(dustColors,    3));

        const dustMat = new THREE.PointsMaterial({
            size:         0.04,
            vertexColors: true,
            transparent:  true,
            opacity:      0.6,
            blending:     THREE.AdditiveBlending,
            depthWrite:   false,
            sizeAttenuation: true,
        });

        const dust = new THREE.Points(dustGeo, dustMat);
        cosmos.add(dust);

        // ─── 4. POST-PROCESSING ───────────────────────────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloom = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            2.5,    // strength
            0.4,    // radius
            0.1     // threshold
        );
        composer.addPass(bloom);
        composer.addPass(new OutputPass());

        // ─── 5. RESIZE HANDLER ────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
            bloom.resolution.set(w, h);
        });

        // ─── 6. ANIMATION LOOP ────────────────────────────────────────────────
        let time = 0;

        renderer.setAnimationLoop(() => {
            time += 0.016;   // approx 60 fps delta; good enough without delta-time

            // Slow auto-rotation of the whole scene
            cosmos.rotation.y += AUTO_ROTATE_SPD * 60 * 0.016;
            cosmos.rotation.x  = Math.sin(time * 0.04) * 0.08;

            // Pulsing node emissive intensity
            for (let i = 0; i < nodeMeshes.length; i++) {
                const mesh = nodeMeshes[i];
                const pulse = Math.sin(time * 1.1 + i * 0.41) * 0.5 + 1.5;
                mesh.material.emissiveIntensity = pulse;
                // Subtle scale breathe
                const s = 1.0 + 0.12 * Math.sin(time * 0.9 + i * 0.37);
                mesh.scale.setScalar(s);
            }

            // Gentle dust drift (rotate very slowly opposite to cosmos)
            dust.rotation.y -= AUTO_ROTATE_SPD * 0.3;

            controls.update();
            composer.render();
        });
    </script>
</body>
</html>
