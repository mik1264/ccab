<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Web – Dark Matter Filaments | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
        #info {
            position: fixed;
            bottom: 18px;
            right: 18px;
            color: rgba(180,220,255,0.55);
            font-family: 'Helvetica Neue', sans-serif;
            font-size: 12px;
            line-height: 1.6;
            text-align: right;
            pointer-events: none;
            letter-spacing: 0.04em;
        }
        #title {
            position: fixed;
            top: 18px;
            right: 18px;
            color: rgba(180,220,255,0.7);
            font-family: 'Helvetica Neue', sans-serif;
            font-size: 13px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-family:sans-serif;background:rgba(0,0,0,0.5);padding:6px 14px;border-radius:20px;">← Back</a>

    <div id="title">Cosmic Web &nbsp;/&nbsp; Dark Matter Filaments</div>
    <div id="info">Drag to orbit &nbsp;|&nbsp; Scroll to zoom</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

        // ─── Constants ─────────────────────────────────────────────────────────
        const NODE_COUNT       = 80;
        const HALF_EXTENT      = 10;
        const NEAREST_K        = 3;
        const FILAMENT_SEGS    = 80;
        const FILAMENT_WOBBLE  = 0.18;
        const DUST_COUNT       = 70_000;   // 50K original + 20K more ambient
        const AUTO_ROTATE_SPD  = 0.00018;

        // ─── Renderer ──────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        // ─── Scene & Camera ────────────────────────────────────────────────────
        const scene  = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 0, 38);

        scene.add(new THREE.AmbientLight(0x112244, 1.5));
        const pointLight = new THREE.PointLight(0x4488ff, 2, 60);
        scene.add(pointLight);

        // ─── OrbitControls ────────────────────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance   = 5;
        controls.maxDistance   = 80;
        controls.autoRotate    = false;

        // ─── Master group ──────────────────────────────────────────────────────
        const cosmos = new THREE.Group();
        scene.add(cosmos);

        // ─── Gaussian dust ShaderMaterial ─────────────────────────────────────
        const dustShader = new THREE.ShaderMaterial({
            uniforms: { uTime: { value: 0 } },
            vertexShader: `
                attribute float size;
                attribute vec3 color;
                varying vec3 vColor;
                void main() {
                    vColor = color;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * (350.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    vec2 uv = gl_PointCoord - 0.5;
                    float d = length(uv);
                    if (d > 0.5) discard;
                    float alpha = exp(-d * d * 6.0) * 0.9;
                    float core = exp(-d * d * 80.0);
                    vec3 col = vColor + core * 0.5;
                    gl_FragColor = vec4(col, alpha);
                }
            `,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            vertexColors: false,
        });

        // ─── 1. NODES ─────────────────────────────────────────────────────────
        const nodePositions = [];
        const nodeMeshes    = [];
        const nodeSprites   = [];   // glow sprite per node

        const nodeGeo = new THREE.SphereGeometry(0.15, 14, 14);

        // Build a glow sprite texture
        function makeGlowTexture(size) {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx  = canvas.getContext('2d');
            const half = size / 2;
            const grad = ctx.createRadialGradient(half, half, 0, half, half, half);
            grad.addColorStop(0.0, 'rgba(180,220,255,0.8)');
            grad.addColorStop(0.3, 'rgba(100,160,255,0.3)');
            grad.addColorStop(1.0, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            return new THREE.CanvasTexture(canvas);
        }
        const glowTex = makeGlowTexture(128);
        const glowSpriteMat = new THREE.SpriteMaterial({
            map:         glowTex,
            blending:    THREE.AdditiveBlending,
            transparent: true,
            depthWrite:  false,
        });

        for (let i = 0; i < NODE_COUNT; i++) {
            const pos = new THREE.Vector3(
                (Math.random() - 0.5) * 2 * HALF_EXTENT,
                (Math.random() - 0.5) * 2 * HALF_EXTENT,
                (Math.random() - 0.5) * 2 * HALF_EXTENT
            );
            nodePositions.push(pos);

            const mat = new THREE.MeshStandardMaterial({
                color:            0xffffff,
                emissive:         0x88aaff,
                emissiveIntensity: 2.5,
                roughness:        0.2,
                metalness:        0.1,
            });

            const mesh = new THREE.Mesh(nodeGeo, mat);
            mesh.position.copy(pos);
            cosmos.add(mesh);
            nodeMeshes.push(mesh);

            // Soft glow sprite around each node
            const sprite = new THREE.Sprite(glowSpriteMat.clone());
            sprite.position.copy(pos);
            sprite.scale.set(1.8, 1.8, 1.0);
            cosmos.add(sprite);
            nodeSprites.push(sprite);
        }

        // ─── 2. FILAMENTS ─────────────────────────────────────────────────────
        function kNearest(idx, k) {
            const origin = nodePositions[idx];
            const dists = nodePositions
                .map((p, j) => ({ j, d: origin.distanceTo(p) }))
                .filter(o => o.j !== idx)
                .sort((a, b) => a.d - b.d);
            return dists.slice(0, k).map(o => o.j);
        }

        function filamentColor(t) {
            const r = t < 0.5 ? THREE.MathUtils.lerp(0,   1,    t * 2)
                               : THREE.MathUtils.lerp(1,   0.55, (t - 0.5) * 2);
            const g = t < 0.5 ? THREE.MathUtils.lerp(1,   0,    t * 2) : 0;
            const b = 1.0;
            return new THREE.Color(r, g, b);
        }

        const edgeSet = new Set();
        const filamentGroup = new THREE.Group();
        cosmos.add(filamentGroup);

        // Store filament geometry refs for pulse animation
        const filamentGeos = [];
        const filamentBaseColors = [];   // original per-vertex colors
        const filamentLengths = [];

        for (let i = 0; i < NODE_COUNT; i++) {
            const neighbours = kNearest(i, NEAREST_K);
            for (const j of neighbours) {
                const key = i < j ? `${i}-${j}` : `${j}-${i}`;
                if (edgeSet.has(key)) continue;
                edgeSet.add(key);

                const A = nodePositions[i];
                const B = nodePositions[j];

                const dir = new THREE.Vector3().subVectors(B, A);
                const len = dir.length();
                const dirN = dir.clone().normalize();

                let up = new THREE.Vector3(0, 1, 0);
                if (Math.abs(dirN.dot(up)) > 0.95) up.set(1, 0, 0);
                const perp1 = new THREE.Vector3().crossVectors(dirN, up).normalize();
                const perp2 = new THREE.Vector3().crossVectors(dirN, perp1).normalize();

                const phase  = Math.random() * Math.PI * 2;
                const freq   = 1.5 + Math.random() * 2.0;
                const amp    = FILAMENT_WOBBLE * (0.5 + Math.random() * 0.5);
                const amp2   = FILAMENT_WOBBLE * (0.3 + Math.random() * 0.4);

                const pts    = new Float32Array((FILAMENT_SEGS + 1) * 3);
                const colors = new Float32Array((FILAMENT_SEGS + 1) * 3);
                const baseC  = new Float32Array((FILAMENT_SEGS + 1) * 3);

                for (let s = 0; s <= FILAMENT_SEGS; s++) {
                    const t    = s / FILAMENT_SEGS;
                    const base = A.clone().lerp(B, t);
                    const envelope = Math.sin(t * Math.PI);
                    const wobble   = envelope * amp  * Math.sin(freq * t * Math.PI * 2 + phase);
                    const wobble2  = envelope * amp2 * Math.cos(freq * t * Math.PI * 2 + phase * 0.7);
                    const pt = base
                        .addScaledVector(perp1, wobble)
                        .addScaledVector(perp2, wobble2);

                    pts[s * 3]     = pt.x;
                    pts[s * 3 + 1] = pt.y;
                    pts[s * 3 + 2] = pt.z;

                    const col = filamentColor(t);
                    colors[s * 3]     = col.r;
                    colors[s * 3 + 1] = col.g;
                    colors[s * 3 + 2] = col.b;
                    baseC[s * 3]     = col.r;
                    baseC[s * 3 + 1] = col.g;
                    baseC[s * 3 + 2] = col.b;
                }

                const indices = new Uint32Array(FILAMENT_SEGS * 2);
                for (let s = 0; s < FILAMENT_SEGS; s++) {
                    indices[s * 2]     = s;
                    indices[s * 2 + 1] = s + 1;
                }

                const geo = new THREE.BufferGeometry();
                geo.setAttribute('position', new THREE.BufferAttribute(pts,    3));
                geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
                geo.setIndex(new THREE.BufferAttribute(indices, 1));

                const mat = new THREE.LineBasicMaterial({
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.75,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                });

                const line = new THREE.LineSegments(geo, mat);
                filamentGroup.add(line);

                // Track for pulse animation
                filamentGeos.push(geo);
                filamentBaseColors.push(baseC);
                filamentLengths.push(FILAMENT_SEGS + 1);
            }
        }

        // ─── 3. COSMIC DUST (background particles) — Gaussian glow ───────────
        const dustPositions = new Float32Array(DUST_COUNT * 3);
        const dustColors    = new Float32Array(DUST_COUNT * 3);
        const dustSizes     = new Float32Array(DUST_COUNT);
        const spread        = HALF_EXTENT * 2.8;   // slightly larger sphere for 70K

        for (let i = 0; i < DUST_COUNT; i++) {
            dustPositions[i * 3]     = (Math.random() - 0.5) * spread * 2;
            dustPositions[i * 3 + 1] = (Math.random() - 0.5) * spread * 2;
            dustPositions[i * 3 + 2] = (Math.random() - 0.5) * spread * 2;

            const hue = 200 + Math.random() * 80;
            const col = new THREE.Color().setHSL(hue / 360, 0.7, 0.05 + Math.random() * 0.07);
            dustColors[i * 3]     = col.r;
            dustColors[i * 3 + 1] = col.g;
            dustColors[i * 3 + 2] = col.b;

            // Mix of small and medium sized dust particles for depth
            dustSizes[i] = 0.05 + Math.random() * 0.15;
        }

        const dustGeo = new THREE.BufferGeometry();
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        dustGeo.setAttribute('color',    new THREE.BufferAttribute(dustColors,    3));
        dustGeo.setAttribute('size',     new THREE.BufferAttribute(dustSizes,     1));

        const dust = new THREE.Points(dustGeo, dustShader);
        cosmos.add(dust);

        // ─── 4. POST-PROCESSING ───────────────────────────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloom = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            2.5,    // strength
            0.4,    // radius
            0.1     // threshold
        );
        composer.addPass(bloom);
        composer.addPass(new OutputPass());

        // ─── 5. RESIZE HANDLER ────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
            bloom.resolution.set(w, h);
        });

        // ─── 6. ANIMATION LOOP ────────────────────────────────────────────────
        let time = 0;

        renderer.setAnimationLoop(() => {
            time += 0.016;

            cosmos.rotation.y += AUTO_ROTATE_SPD * 60 * 0.016;
            cosmos.rotation.x  = Math.sin(time * 0.04) * 0.08;

            // Pulsing node emissive + glow sprite scale
            for (let i = 0; i < nodeMeshes.length; i++) {
                const mesh = nodeMeshes[i];
                const pulse = Math.sin(time * 1.1 + i * 0.41) * 0.5 + 1.5;
                mesh.material.emissiveIntensity = pulse * 1.2;
                const s = 1.0 + 0.12 * Math.sin(time * 0.9 + i * 0.37);
                mesh.scale.setScalar(s);

                // Glow sprite breathes with node
                const spriteScale = 1.5 + 0.6 * Math.sin(time * 1.1 + i * 0.41);
                nodeSprites[i].scale.set(spriteScale, spriteScale, 1.0);
                nodeSprites[i].material.opacity = 0.4 + 0.3 * Math.sin(time * 0.9 + i * 0.41);
            }

            // Filament brightness pulse — sin wave along each filament
            for (let fi = 0; fi < filamentGeos.length; fi++) {
                const geo    = filamentGeos[fi];
                const baseC  = filamentBaseColors[fi];
                const nVerts = filamentLengths[fi];
                const colAttr = geo.attributes.color;
                const colArr  = colAttr.array;

                const pulsePhase = time * 2.5 + fi * 0.37;
                for (let s = 0; s < nVerts; s++) {
                    const t = s / (nVerts - 1);
                    // Sin wave that travels along the filament
                    const brightness = 0.6 + 0.4 * Math.sin(t * Math.PI * 4 - pulsePhase);
                    colArr[s * 3]     = baseC[s * 3]     * brightness;
                    colArr[s * 3 + 1] = baseC[s * 3 + 1] * brightness;
                    colArr[s * 3 + 2] = baseC[s * 3 + 2] * brightness;
                }
                colAttr.needsUpdate = true;
            }

            // Gentle dust drift
            dust.rotation.y -= AUTO_ROTATE_SPD * 0.3;

            controls.update();
            composer.render();
        });
    </script>
</body>
</html>
