<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wormhole Tunnel | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }

        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #88aaff;
            text-decoration: none;
            z-index: 1000;
            font-size: 1rem;
            font-family: sans-serif;
            background: rgba(0, 0, 30, 0.7);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(100, 140, 255, 0.3);
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        .back-link:hover {
            background: rgba(10, 10, 60, 0.9);
            border-color: rgba(100, 140, 255, 0.7);
        }

        .title-overlay {
            position: fixed;
            top: 10px;
            right: 14px;
            color: rgba(140, 180, 255, 0.8);
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            pointer-events: none;
            line-height: 1.6;
            text-align: right;
        }

        .controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 210, 255, 0.7);
            font-family: 'Courier New', monospace;
            font-size: 0.82rem;
            letter-spacing: 0.06em;
            text-align: center;
            background: rgba(0, 0, 20, 0.6);
            padding: 10px 22px;
            border-radius: 20px;
            border: 1px solid rgba(100, 140, 255, 0.2);
            backdrop-filter: blur(8px);
            pointer-events: none;
            white-space: nowrap;
        }

        .speed-readout {
            position: fixed;
            bottom: 20px;
            right: 18px;
            color: rgba(180, 200, 255, 0.85);
            font-family: 'Courier New', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            line-height: 1.8;
            pointer-events: none;
        }
        .speed-bar-track {
            display: inline-block;
            width: 80px;
            height: 6px;
            background: rgba(80, 100, 200, 0.25);
            border-radius: 3px;
            vertical-align: middle;
            overflow: hidden;
        }
        .speed-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3355ff, #aa44ff, #ffffff);
            border-radius: 3px;
            transition: width 0.08s linear;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back</a>

    <div class="title-overlay">
        WORMHOLE TUNNEL<br>
        <span style="opacity:0.5;font-size:0.65rem;">HYPERSPACE &mdash; CATMULLROM SPLINE &bull; CUSTOM GLSL &bull; SPIRAL GALAXY ARMS</span>
    </div>

    <div class="controls-hint">
        Click anywhere for warp jump &nbsp;&bull;&nbsp; Hyperspace tunnel &nbsp;&bull;&nbsp; Spacetime distortion shader
    </div>

    <div class="speed-readout">
        WARP SPEED<br>
        <div class="speed-bar-track"><div class="speed-bar-fill" id="speedBar" style="width:15%"></div></div>
    </div>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass }      from 'three/addons/postprocessing/ShaderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

        // ─── Renderer ──────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ─── Scene & Camera ────────────────────────────────────────────────────
        const scene  = new THREE.Scene();
        scene.background = new THREE.Color(0x000008);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 200);

        // ─── Spline path ───────────────────────────────────────────────────────
        const seed = Math.random;
        const pathPoints = [];
        const NUM_PATH_PTS = 12;
        for (let i = 0; i < NUM_PATH_PTS; i++) {
            const angle = (i / NUM_PATH_PTS) * Math.PI * 2;
            pathPoints.push(new THREE.Vector3(
                Math.cos(angle) * 8  + (seed() - 0.5) * 3,
                (seed() - 0.5) * 4,
                Math.sin(angle) * 8  + (seed() - 0.5) * 3
            ));
        }
        const curve = new THREE.CatmullRomCurve3(pathPoints, true, 'catmullrom', 0.5);

        // ─── Tunnel geometry ───────────────────────────────────────────────────
        // Increased: 500 tubular segments, 20 radial segments
        const TUBE_SEGMENTS    = 500;
        const TUBE_RADIUS      = 2.2;
        const TUBE_RADIAL_SEGS = 20;

        const tubeGeo = new THREE.TubeGeometry(curve, TUBE_SEGMENTS, TUBE_RADIUS, TUBE_RADIAL_SEGS, true);

        const tunnelVert = /* glsl */`
            varying vec2  vUv;
            varying vec3  vPosition;
            varying float vTubeAngle;

            void main() {
                vUv       = uv;
                vPosition = position;
                vTubeAngle = uv.y * 6.28318;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const tunnelFrag = /* glsl */`
            varying vec2  vUv;
            varying vec3  vPosition;
            varying float vTubeAngle;

            uniform float uTime;
            uniform float uSpeed;

            #define TWO_PI 6.28318530718

            // ------- hash / noise helpers -------
            float hash(vec2 p) {
                p = fract(p * vec2(234.34, 435.345));
                p += dot(p, p + 34.23);
                return fract(p.x * p.y);
            }
            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                return mix(
                    mix(hash(i + vec2(0,0)), hash(i + vec2(1,0)), f.x),
                    mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x),
                    f.y
                );
            }

            // Simple 3-octave FBM for richer wall texture
            float fbm(vec2 p) {
                float v = 0.0;
                float a = 0.5;
                for (int i = 0; i < 3; i++) {
                    v += a * noise(p);
                    p *= 2.1;
                    a *= 0.5;
                }
                return v;
            }

            void main() {
                vec2 uv = vUv;

                float along  = uv.x;
                float around = uv.y;

                // ---- Radial warp ----
                float warpFreq  = 10.0;
                float warpAmp   = 0.03;
                float warpPhase = along * warpFreq - uTime * uSpeed * 6.0;
                float warp = sin(warpPhase) * warpAmp;
                uv.y += warp * 0.5;

                // ---- Tunnel energy rings ----
                float rings = 0.5 + 0.5 * sin(along * 40.0 - uTime * uSpeed * 10.0);
                rings = pow(rings, 2.0);

                // ---- Base color ----
                vec3 coreColor = vec3(0.05, 0.25, 1.00);
                vec3 rimColor  = vec3(0.75, 0.05, 1.00);
                vec3 hotColor  = vec3(1.00, 1.00, 1.00);

                float t = rings;
                vec3 color = mix(coreColor, rimColor, t);
                color = mix(color, hotColor, pow(t, 4.0));

                // ---- Chromatic aberration ----
                float aberr = around * (1.0 - around) * 4.0;
                color.r += aberr * 0.18;
                color.b -= aberr * 0.10;
                color.g -= aberr * 0.04;

                // ---- Streaming star streaks ----
                float streakN = 80.0;
                float streakU = fract(around * streakN + uTime * uSpeed * 1.5);
                float streakV = fract(along  * 0.3   + uTime * uSpeed * 3.0);
                float laneRand = hash(vec2(floor(around * streakN), floor(along * 6.0)));
                float streak = 0.0;
                if (laneRand > 0.82) {
                    streak = smoothstep(0.94, 1.0, streakV) * smoothstep(0.35, 0.0, streakU) * 4.0;
                }
                color += vec3(streak * 0.9, streak * 0.95, streak);

                // ---- Hex grid overlay ----
                float hexU = along  * 20.0;
                float hexV = around * 10.0 + floor(along * 20.0) * 0.5;
                float hx   = fract(hexV) - 0.5;
                float hy   = fract(hexU) - 0.5;
                float hexDist = max(abs(hx) * 1.732 + abs(hy), abs(hy) * 2.0) * 0.5;
                float hexGrid = 1.0 - smoothstep(0.42, 0.5, hexDist);
                color += vec3(0.04, 0.08, 0.25) * hexGrid;

                // ---- LAYER 3: Spiral galaxy arms in tunnel walls ────────────
                // Creates slowly rotating spiral arm patterns visible in the wall
                float spiralAngle = atan(sin(along * TWO_PI * 3.0), cos(along * TWO_PI * 3.0));
                float spiral = smoothstep(0.02, 0.0,
                    abs(fract(around + spiralAngle / TWO_PI + uTime * 0.05) - 0.5) - 0.1
                );
                color += vec3(0.2, 0.8, 1.0) * spiral * 0.5;

                // ---- FBM texture for organic nebula feel ----
                float fbmVal = fbm(vec2(along * 12.0, around * 8.0) + uTime * uSpeed * 0.15);
                color += fbmVal * vec3(0.05, 0.03, 0.20) * 0.8;

                // ---- Noise texture for organic feel ----
                float n = noise(vec2(along * 30.0, around * 15.0) + uTime * uSpeed * 0.4) * 0.12;
                color += n * vec3(0.2, 0.1, 0.5);

                // ---- Vignette ----
                float vig = sin(around * 3.14159);
                color *= 0.65 + 0.35 * vig;

                // ---- Speed-based intensity ----
                float speedGlow = 0.8 + uSpeed * 0.3;
                color *= speedGlow;

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const tunnelMat = new THREE.ShaderMaterial({
            vertexShader:   tunnelVert,
            fragmentShader: tunnelFrag,
            side:           THREE.BackSide,
            uniforms: {
                uTime:  { value: 0.0 },
                uSpeed: { value: 0.3 }
            }
        });

        const tunnel = new THREE.Mesh(tubeGeo, tunnelMat);
        scene.add(tunnel);

        // ─── Nebula cloud at tunnel end ────────────────────────────────────────
        // A soft glowing sphere far ahead with animated colors
        const nebulaVert = /* glsl */`
            varying vec3 vNormal;
            varying vec3 vPosition;
            void main() {
                vNormal   = normalize(normalMatrix * normal);
                vPosition = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        const nebulaFrag = /* glsl */`
            varying vec3 vNormal;
            varying vec3 vPosition;
            uniform float uTime;

            float hash(vec2 p) {
                p = fract(p * vec2(234.34, 435.345));
                p += dot(p, p + 34.23);
                return fract(p.x * p.y);
            }
            float noise(vec2 p) {
                vec2 i = floor(p); vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                return mix(
                    mix(hash(i+vec2(0,0)),hash(i+vec2(1,0)),f.x),
                    mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y
                );
            }

            void main() {
                // Edge glow (fresnel-like)
                float fresnel = 1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0)));
                fresnel = pow(fresnel, 1.5);

                // Animated color cycling
                float t = uTime * 0.15;
                vec3 col1 = vec3(0.3, 0.05, 0.9);   // violet
                vec3 col2 = vec3(0.0, 0.5, 1.0);    // cyan
                vec3 col3 = vec3(0.9, 0.1, 0.5);    // magenta
                float cycle = sin(t) * 0.5 + 0.5;
                float cycle2 = sin(t * 1.3 + 1.0) * 0.5 + 0.5;
                vec3 nebulaColor = mix(mix(col1, col2, cycle), col3, cycle2 * 0.4);

                // Noise texture on surface
                float n = noise(vec2(vPosition.x * 0.5 + t, vPosition.y * 0.5 - t * 0.7)) * 0.4;
                nebulaColor += n * vec3(0.4, 0.2, 0.8);

                float alpha = fresnel * 0.45 + n * 0.1;
                gl_FragColor = vec4(nebulaColor * 1.5, alpha);
            }
        `;

        const nebulaUniforms = { uTime: { value: 0.0 } };

        // Position nebula sphere ahead at one end of the spline
        const nebulaCenter = curve.getPointAt(0.5); // halfway around loop
        const nebulaMesh = new THREE.Mesh(
            new THREE.SphereGeometry(6.0, 48, 32),
            new THREE.ShaderMaterial({
                vertexShader:   nebulaVert,
                fragmentShader: nebulaFrag,
                uniforms:       nebulaUniforms,
                transparent:    true,
                side:           THREE.FrontSide,
                depthWrite:     false,
                blending:       THREE.AdditiveBlending,
            })
        );
        nebulaMesh.position.copy(nebulaCenter);
        scene.add(nebulaMesh);

        // ─── Energy portal rings with inner rotating discs ─────────────────────
        const RING_COUNT = 20;
        const ringMeshes = [];

        const ringVert = /* glsl */`
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        const ringFrag = /* glsl */`
            varying vec2 vUv;
            uniform float uTime;
            uniform float uSpeed;
            uniform float uPhase;

            void main() {
                float angle = atan(vUv.y - 0.5, vUv.x - 0.5);
                float pulse  = 0.5 + 0.5 * sin(angle * 6.0 - uTime * uSpeed * 8.0 + uPhase);
                vec3 col = mix(vec3(0.1, 0.3, 1.0), vec3(0.9, 0.1, 1.0), pulse);
                float alpha = 0.5 + 0.35 * pulse;
                gl_FragColor = vec4(col * 1.6, alpha);
            }
        `;

        // Inner disc shader — rotating triangle/rune patterns
        const discVert = /* glsl */`
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        const discFrag = /* glsl */`
            varying vec2 vUv;
            uniform float uTime;
            uniform float uSpeed;
            uniform float uPhase;
            #define PI 3.14159265358979

            float hash(float n) { return fract(sin(n) * 43758.5453); }

            void main() {
                // Centre UV at (0,0)
                vec2 p = vUv - 0.5;
                float r = length(p);
                float a = atan(p.y, p.x);

                // Concentric rings
                float rings = sin(r * 18.0 - uTime * uSpeed * 3.0 + uPhase) * 0.5 + 0.5;
                rings = pow(rings, 3.0);

                // Radial spokes / rune lines — 6-fold symmetry
                float spokes = 0.0;
                for (int k = 0; k < 6; k++) {
                    float kAngle = float(k) * PI / 3.0 + uTime * uSpeed * 0.4 + uPhase;
                    float d = abs(sin(a - kAngle)) * r;
                    spokes += smoothstep(0.03, 0.0, d) * smoothstep(0.5, 0.1, r);
                }

                // Triangle rune overlay
                float triAngle = mod(a + uTime * uSpeed * 0.25 + uPhase, PI * 2.0 / 3.0);
                float triR     = r / cos(triAngle - PI / 3.0) * 0.28;
                float tri      = smoothstep(0.02, 0.0, abs(r - triR)) * smoothstep(0.45, 0.1, r);

                // Outer fade
                float fade = smoothstep(0.5, 0.1, r);
                float alpha = (rings * 0.15 + spokes * 0.7 + tri * 0.5) * fade;

                vec3 col = mix(vec3(0.2, 0.7, 1.0), vec3(0.8, 0.1, 1.0), rings);
                col += vec3(1.0, 0.9, 0.5) * tri;

                gl_FragColor = vec4(col * 1.4, alpha * 0.7);
            }
        `;

        for (let i = 0; i < RING_COUNT; i++) {
            const t = i / RING_COUNT;
            const ringUniforms = {
                uTime:  { value: 0.0 },
                uSpeed: { value: 0.3 },
                uPhase: { value: t * Math.PI * 2 }
            };
            const discUniforms = {
                uTime:  { value: 0.0 },
                uSpeed: { value: 0.3 },
                uPhase: { value: t * Math.PI * 2 }
            };

            // Outer ring torus
            const ringGeo = new THREE.TorusGeometry(TUBE_RADIUS * 0.9, 0.04, 8, 48);
            const ringMat = new THREE.ShaderMaterial({
                vertexShader:   ringVert,
                fragmentShader: ringFrag,
                transparent:    true,
                depthWrite:     false,
                blending:       THREE.AdditiveBlending,
                uniforms:       ringUniforms,
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);

            // Inner rotating disc with rune patterns
            const discGeo = new THREE.PlaneGeometry(TUBE_RADIUS * 1.8, TUBE_RADIUS * 1.8, 1, 1);
            const discMat = new THREE.ShaderMaterial({
                vertexShader:   discVert,
                fragmentShader: discFrag,
                transparent:    true,
                depthWrite:     false,
                blending:       THREE.AdditiveBlending,
                uniforms:       discUniforms,
                side:           THREE.DoubleSide,
            });
            const disc = new THREE.Mesh(discGeo, discMat);

            scene.add(ring);
            scene.add(disc);
            ringMeshes.push({ ring, disc, pathT: t, ringMat, discMat });
        }

        // ─── Starfield ─────────────────────────────────────────────────────────
        (function buildStars() {
            const N = 6000;
            const pos = new Float32Array(N * 3);
            for (let i = 0; i < N; i++) {
                const r = 30 + Math.random() * 80;
                const theta = Math.random() * Math.PI * 2;
                const phi   = Math.acos(2 * Math.random() - 1);
                pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
                pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i*3+2] = r * Math.cos(phi);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
                size: 0.15, color: 0xaabbff, sizeAttenuation: true,
                transparent: true, opacity: 0.6
            })));
        })();

        // ─── Chromatic aberration post-pass ────────────────────────────────────
        const ChromaShader = {
            uniforms: {
                tDiffuse:  { value: null },
                uStrength: { value: 0.003 }
            },
            vertexShader: /* glsl */`
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: /* glsl */`
                uniform sampler2D tDiffuse;
                uniform float uStrength;
                varying vec2 vUv;
                void main() {
                    vec2 dir = (vUv - 0.5) * uStrength * 2.0;
                    float r = texture2D(tDiffuse, vUv + dir * 1.5).r;
                    float g = texture2D(tDiffuse, vUv).g;
                    float b = texture2D(tDiffuse, vUv - dir * 1.0).b;
                    gl_FragColor = vec4(r, g, b, 1.0);
                }
            `
        };

        // ─── Post-processing composer ──────────────────────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5, 0.6, 0.1
        );
        composer.addPass(bloomPass);

        const chromaPass = new ShaderPass(ChromaShader);
        composer.addPass(chromaPass);
        composer.addPass(new OutputPass());

        // ─── Warp speed state ──────────────────────────────────────────────────
        const warpSpeed  = { value: 0.3 };
        const speedBarEl = document.getElementById('speedBar');

        function triggerWarpJump() {
            gsap.killTweensOf(warpSpeed);
            gsap.to(warpSpeed, {
                value: 2.2,
                duration: 0.45,
                ease: 'power3.in',
                onComplete: () => {
                    gsap.to(warpSpeed, {
                        value: 0.3,
                        duration: 2.5,
                        ease: 'power2.out'
                    });
                }
            });
        }

        document.addEventListener('click', triggerWarpJump);

        // ─── Camera traversal ──────────────────────────────────────────────────
        let cameraProgress = 0;
        const clock = new THREE.Clock();
        const bobAmplitude = 0.18;

        // Camera roll accumulator for gentle continuous rotation
        let cameraRoll = 0;

        // ─── Animation loop ────────────────────────────────────────────────────
        function animate() {
            const dt  = clock.getDelta();
            const now = clock.getElapsedTime();
            const speed = warpSpeed.value;

            // Advance camera along spline
            cameraProgress = (cameraProgress + 0.00018 * speed * (1 + dt * 60 * 0.5)) % 1;

            const camPos    = curve.getPointAt(cameraProgress);
            const lookAhead = (cameraProgress + 0.012) % 1;
            const camTarget = curve.getPointAt(lookAhead);

            const tangent = new THREE.Vector3().subVectors(camTarget, camPos).normalize();
            const up      = new THREE.Vector3(0, 1, 0);
            const right   = new THREE.Vector3().crossVectors(tangent, up).normalize();
            const bobY    = Math.sin(now * 1.8) * bobAmplitude;
            const bobX    = Math.cos(now * 1.2) * bobAmplitude * 0.5;
            camPos.addScaledVector(up,    bobY);
            camPos.addScaledVector(right, bobX);

            camera.position.copy(camPos);
            camera.lookAt(camTarget);

            // Camera roll — gentle continuous rotation around forward axis
            cameraRoll += dt * 0.08;
            camera.rotation.z = Math.sin(cameraRoll) * 0.12;

            // Update tunnel shader
            tunnelMat.uniforms.uTime.value  = now;
            tunnelMat.uniforms.uSpeed.value = speed;

            // Update nebula
            nebulaUniforms.uTime.value = now;

            // Update ring/disc positions + uniforms
            for (const { ring, disc, pathT, ringMat, discMat } of ringMeshes) {
                const ringT = ((pathT - cameraProgress * 0.15 + now * 0.003 * speed) % 1 + 1) % 1;
                const pt      = curve.getPointAt(ringT);
                const ptAhead = curve.getPointAt((ringT + 0.01) % 1);

                ring.position.copy(pt);
                disc.position.copy(pt);

                const dir = new THREE.Vector3().subVectors(ptAhead, pt).normalize();
                const q   = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), dir);

                ring.quaternion.copy(q);
                disc.quaternion.copy(q);

                ringMat.uniforms.uTime.value  = now;
                ringMat.uniforms.uSpeed.value = speed;
                discMat.uniforms.uTime.value  = now;
                discMat.uniforms.uSpeed.value = speed;
            }

            // Chromatic aberration grows with speed
            chromaPass.uniforms.uStrength.value = 0.002 + (speed - 0.3) * 0.003;

            // Speed readout
            const barPct = Math.round((speed / 2.2) * 100);
            speedBarEl.style.width = barPct + '%';

            composer.render();
        }

        renderer.setAnimationLoop(animate);

        // ─── Resize handler ────────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            bloomPass.resolution.set(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
