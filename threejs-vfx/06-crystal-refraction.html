<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Gem Refraction | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #8A9A5B;
            text-decoration: none;
            z-index: 1000;
            font-size: 1rem;
            font-family: sans-serif;
            background: rgba(0,0,0,0.55);
            padding: 6px 14px;
            border-radius: 20px;
            transition: background 0.2s ease;
        }
        .back-link:hover { background: rgba(0,0,0,0.85); }
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.45);
            font-family: sans-serif;
            font-size: 0.85rem;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Three.js VFX</a>
    <div class="info">Drag to orbit &nbsp;·&nbsp; Scroll to zoom</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ── Scene setup ──────────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
        camera.position.set(0, 0, 7);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setSize(innerWidth, innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ── Orbit controls ────────────────────────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 3;
        controls.maxDistance = 20;

        // ── Post-processing ───────────────────────────────────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloom = new UnrealBloomPass(
            new THREE.Vector2(innerWidth, innerHeight),
            1.5,   // strength
            0.5,   // radius
            0.2    // threshold
        );
        composer.addPass(bloom);
        composer.addPass(new OutputPass());

        // ── Shaders ───────────────────────────────────────────────────────────────
        const vertexShader = /* glsl */`
            varying vec3 vNormal;
            varying vec3 vPosition;
            varying vec3 vWorldPos;
            uniform float uTime;

            void main() {
                vNormal    = normalize(normalMatrix * normal);
                vPosition  = position;
                vWorldPos  = (modelMatrix * vec4(position, 1.0)).xyz;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = /* glsl */`
            varying vec3 vNormal;
            varying vec3 vPosition;
            varying vec3 vWorldPos;
            uniform float uTime;
            uniform vec3  uCameraPos;

            void main() {
                vec3 viewDir = normalize(uCameraPos - vWorldPos);
                float NdotV  = abs(dot(vNormal, viewDir));

                // Fresnel – strong edge glow
                float fresnel = pow(1.0 - NdotV, 3.0);

                // Slight offset per channel for chromatic aberration on edges
                vec3 nR = normalize(vNormal + vec3( 0.04,  0.0,  0.02));
                vec3 nG = normalize(vNormal + vec3(-0.02,  0.02, 0.0 ));
                vec3 nB = normalize(vNormal + vec3( 0.0,  -0.02, 0.04));

                float fresnelR = pow(1.0 - abs(dot(nR, viewDir)), 3.0);
                float fresnelG = pow(1.0 - abs(dot(nG, viewDir)), 3.0);
                float fresnelB = pow(1.0 - abs(dot(nB, viewDir)), 3.0);
                vec3 chromatic = vec3(fresnelR, fresnelG, fresnelB);

                // Rainbow internal light dispersion
                float angle = dot(vNormal, vec3(0.0, 1.0, 0.0));
                vec3 rainbow = vec3(
                    0.5 + 0.5 * sin(angle * 6.28318 + uTime * 0.8 + 0.0),
                    0.5 + 0.5 * sin(angle * 6.28318 + uTime * 0.8 + 2.09440),
                    0.5 + 0.5 * sin(angle * 6.28318 + uTime * 0.8 + 4.18879)
                );

                // Interior scattering – secondary iridescence from position
                float scatter = dot(normalize(vPosition), vec3(0.577));
                vec3 scatter2 = vec3(
                    0.5 + 0.5 * sin(scatter * 9.0 + uTime * 0.5),
                    0.5 + 0.5 * sin(scatter * 9.0 + uTime * 0.5 + 2.094),
                    0.5 + 0.5 * sin(scatter * 9.0 + uTime * 0.5 + 4.189)
                );

                // Deep blue-violet base
                vec3 baseColor = vec3(0.05, 0.10, 0.32);

                // Blend layers
                vec3 interior = mix(baseColor, rainbow, 0.55) + scatter2 * 0.25;
                vec3 edgeGlow  = chromatic * 1.1;

                vec3 finalColor = mix(interior, edgeGlow, fresnel * 0.85);

                // Extra specular point highlight
                vec3 reflDir = reflect(-viewDir, vNormal);
                vec3 lightDir = normalize(vec3(1.0, 1.5, 1.0));
                float spec = pow(max(dot(reflDir, lightDir), 0.0), 64.0);
                finalColor += vec3(spec * 0.9);

                // Thin sharp Fresnel rim
                finalColor += edgeGlow * fresnel * 0.4;

                gl_FragColor = vec4(finalColor, 0.88);
            }
        `;

        // ── Crystal material factory ──────────────────────────────────────────────
        function makeCrystalMaterial() {
            return new THREE.ShaderMaterial({
                vertexShader,
                fragmentShader,
                uniforms: {
                    uTime:      { value: 0.0 },
                    uCameraPos: { value: new THREE.Vector3() }
                },
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false
            });
        }

        // ── Main gem ──────────────────────────────────────────────────────────────
        const crystalMaterial = makeCrystalMaterial();

        const gemGeo  = new THREE.IcosahedronGeometry(2, 2);
        const gemMesh = new THREE.Mesh(gemGeo, crystalMaterial);
        scene.add(gemMesh);

        // ── Inner wireframe gem ────────────────────────────────────────────────────
        const innerGeo  = new THREE.IcosahedronGeometry(1.5, 1);
        const innerMat  = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.10
        });
        const innerMesh = new THREE.Mesh(innerGeo, innerMat);
        scene.add(innerMesh);

        // ── Floating crystal shards ───────────────────────────────────────────────
        const shardCount = 20;
        const shards = [];

        for (let i = 0; i < shardCount; i++) {
            const radius = 0.3 + Math.random() * 0.5;   // 0.3 – 0.8
            const geo    = new THREE.IcosahedronGeometry(radius, Math.random() < 0.5 ? 0 : 1);
            const mat    = makeCrystalMaterial();

            const mesh = new THREE.Mesh(geo, mat);

            // Place shards in a loose cloud around the gem
            const theta  = Math.random() * Math.PI * 2;
            const phi    = Math.acos(2 * Math.random() - 1);
            const dist   = 3.2 + Math.random() * 2.8;
            mesh.position.set(
                dist * Math.sin(phi) * Math.cos(theta),
                dist * Math.sin(phi) * Math.sin(theta),
                dist * Math.cos(phi)
            );
            // Random initial rotation
            mesh.rotation.set(
                Math.random() * Math.PI * 2,
                Math.random() * Math.PI * 2,
                Math.random() * Math.PI * 2
            );

            const orbitAngle = Math.random() * Math.PI * 2;
            const orbitSpeed = 0.08 + Math.random() * 0.14;
            const orbitRadius = dist;
            const orbitTilt  = (Math.random() - 0.5) * 1.2; // slight inclination

            shards.push({ mesh, mat, orbitAngle, orbitSpeed, orbitRadius, orbitTilt, phi });
            scene.add(mesh);
        }

        // ── Ambient + point lights (for specular in shaders) ──────────────────────
        // (Shader handles its own lighting but let's add subtle env brightness)
        const ambient = new THREE.AmbientLight(0x111133, 0.6);
        scene.add(ambient);

        const pointLight1 = new THREE.PointLight(0x6688ff, 3.0, 30);
        pointLight1.position.set(5, 5, 5);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xff88cc, 2.0, 30);
        pointLight2.position.set(-5, -3, 3);
        scene.add(pointLight2);

        // ── Star field background ─────────────────────────────────────────────────
        const starGeo = new THREE.BufferGeometry();
        const starCount = 2000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i++) {
            starPositions[i] = (Math.random() - 0.5) * 80;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMat  = new THREE.PointsMaterial({ color: 0xffffff, size: 0.07, sizeAttenuation: true });
        const starField = new THREE.Points(starGeo, starMat);
        scene.add(starField);

        // ── Resize handler ────────────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            composer.setSize(innerWidth, innerHeight);
            bloom.resolution.set(innerWidth, innerHeight);
        });

        // ── Animation loop ────────────────────────────────────────────────────────
        const clock = new THREE.Clock();

        renderer.setAnimationLoop(() => {
            const elapsed = clock.getElapsedTime();

            // Update main gem uniforms
            crystalMaterial.uniforms.uTime.value      = elapsed;
            crystalMaterial.uniforms.uCameraPos.value.copy(camera.position);

            // Slow auto-rotation of main gem
            gemMesh.rotation.x = elapsed * 0.12;
            gemMesh.rotation.y = elapsed * 0.19;

            // Inner wireframe counter-rotates
            innerMesh.rotation.x = -elapsed * 0.08;
            innerMesh.rotation.y = -elapsed * 0.13;

            // Orbit shards
            shards.forEach(({ mesh, mat, orbitAngle, orbitSpeed, orbitRadius, orbitTilt, phi }, idx) => {
                const angle = orbitAngle + elapsed * orbitSpeed;
                mesh.position.x = Math.cos(angle) * orbitRadius;
                mesh.position.z = Math.sin(angle) * orbitRadius;
                mesh.position.y = Math.sin(angle * 0.7 + orbitTilt) * (orbitRadius * 0.4);

                // Self-spin
                mesh.rotation.x = elapsed * 0.3 * (idx % 2 === 0 ? 1 : -1);
                mesh.rotation.y = elapsed * 0.2 * (idx % 3 === 0 ? 1 : -1);

                mat.uniforms.uTime.value      = elapsed;
                mat.uniforms.uCameraPos.value.copy(camera.position);
            });

            controls.update();
            composer.render();
        });
    </script>
</body>
</html>
