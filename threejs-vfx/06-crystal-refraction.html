<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Gem Refraction | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #8A9A5B;
            text-decoration: none;
            z-index: 1000;
            font-size: 1rem;
            font-family: sans-serif;
            background: rgba(0,0,0,0.55);
            padding: 6px 14px;
            border-radius: 20px;
            transition: background 0.2s ease;
        }
        .back-link:hover { background: rgba(0,0,0,0.85); }
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.45);
            font-family: sans-serif;
            font-size: 0.85rem;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Three.js VFX</a>
    <div class="info">Drag to orbit &nbsp;·&nbsp; Scroll to zoom</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ── Scene setup ──────────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
        camera.position.set(0, 0, 7);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setSize(innerWidth, innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ── Orbit controls ────────────────────────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 3;
        controls.maxDistance = 20;

        // ── Off-screen render targets for RGB dispersion layers ──────────────────
        const rtR = new THREE.WebGLRenderTarget(innerWidth, innerHeight, { format: THREE.RGBAFormat });
        const rtG = new THREE.WebGLRenderTarget(innerWidth, innerHeight, { format: THREE.RGBAFormat });
        const rtB = new THREE.WebGLRenderTarget(innerWidth, innerHeight, { format: THREE.RGBAFormat });

        // Dedicated cameras for each channel (slight offset for dispersion)
        const camR = camera.clone();
        const camG = camera.clone();
        const camB = camera.clone();

        // ── Post-processing: bloom + chromatic composite ──────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloom = new UnrealBloomPass(
            new THREE.Vector2(innerWidth, innerHeight),
            1.8,   // strength (boosted)
            0.5,   // radius
            0.15   // threshold (lower for more glow)
        );
        composer.addPass(bloom);

        // ── Chromatic aberration composite ShaderPass ─────────────────────────────
        const dispersionPass = new ShaderPass({
            uniforms: {
                tDiffuse: { value: null },
                tR:       { value: null },
                tG:       { value: null },
                tB:       { value: null },
                uStrength: { value: 0.008 },
                uTime:    { value: 0.0 },
            },
            vertexShader: /* glsl */`
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `,
            fragmentShader: /* glsl */`
                uniform sampler2D tDiffuse;
                uniform sampler2D tR;
                uniform sampler2D tG;
                uniform sampler2D tB;
                uniform float uStrength;
                uniform float uTime;
                varying vec2 vUv;

                void main() {
                    vec2 center = vec2(0.5);
                    vec2 dir = (vUv - center);
                    float dist = length(dir);

                    // Animated dispersion magnitude
                    float mag = uStrength * (0.8 + 0.4 * sin(uTime * 0.7));

                    // Sample with slight offset per channel
                    vec4 base = texture2D(tDiffuse, vUv);
                    float r = texture2D(tDiffuse, vUv + dir * mag * 1.6).r;
                    float g = texture2D(tDiffuse, vUv + dir * mag * 0.5).g;
                    float b = texture2D(tDiffuse, vUv - dir * mag * 1.2).b;

                    // Blend extra channel hue from off-screen dispersion renders
                    vec4 layerR = texture2D(tR, vUv + dir * mag * 0.9);
                    vec4 layerB = texture2D(tB, vUv - dir * mag * 0.9);

                    vec3 col = vec3(
                        max(r, layerR.r * 0.4),
                        g,
                        max(b, layerB.b * 0.4)
                    );

                    gl_FragColor = vec4(col, base.a);
                }
            `
        });
        composer.addPass(dispersionPass);
        composer.addPass(new OutputPass());

        // ── Crystal vertex shader ─────────────────────────────────────────────────
        const vertexShader = /* glsl */`
            varying vec3 vNormal;
            varying vec3 vPosition;
            varying vec3 vWorldPos;
            uniform float uTime;

            void main() {
                vNormal    = normalize(normalMatrix * normal);
                vPosition  = position;
                vWorldPos  = (modelMatrix * vec4(position, 1.0)).xyz;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        // ── Crystal fragment shader with caustics ─────────────────────────────────
        const fragmentShader = /* glsl */`
            varying vec3 vNormal;
            varying vec3 vPosition;
            varying vec3 vWorldPos;
            uniform float uTime;
            uniform vec3  uCameraPos;
            uniform float uChannel;   // 0=R, 1=G, 2=B for dispersion layers

            void main() {
                vec3 viewDir = normalize(uCameraPos - vWorldPos);
                float NdotV  = abs(dot(vNormal, viewDir));

                // Fresnel – strong edge glow
                float fresnel = pow(1.0 - NdotV, 3.0);

                // Per-channel normal offset for dispersion
                vec3 channelOff = vec3(0.0);
                if (uChannel < 0.5) channelOff = vec3(0.06, 0.0, 0.03);        // R
                else if (uChannel < 1.5) channelOff = vec3(-0.02, 0.02, 0.0);  // G
                else channelOff = vec3(0.0, -0.03, 0.07);                       // B

                vec3 nR = normalize(vNormal + vec3( 0.04,  0.0,  0.02));
                vec3 nG = normalize(vNormal + vec3(-0.02,  0.02, 0.0 ));
                vec3 nB = normalize(vNormal + vec3( 0.0,  -0.02, 0.04));

                float fresnelR = pow(1.0 - abs(dot(nR, viewDir)), 3.0);
                float fresnelG = pow(1.0 - abs(dot(nG, viewDir)), 3.0);
                float fresnelB = pow(1.0 - abs(dot(nB, viewDir)), 3.0);
                vec3 chromatic = vec3(fresnelR, fresnelG, fresnelB);

                // Rainbow internal light dispersion
                float angle = dot(vNormal, vec3(0.0, 1.0, 0.0));
                vec3 rainbow = vec3(
                    0.5 + 0.5 * sin(angle * 6.28318 + uTime * 0.8 + 0.0),
                    0.5 + 0.5 * sin(angle * 6.28318 + uTime * 0.8 + 2.09440),
                    0.5 + 0.5 * sin(angle * 6.28318 + uTime * 0.8 + 4.18879)
                );

                // Interior scattering – secondary iridescence from position
                float scatter = dot(normalize(vPosition), vec3(0.577));
                vec3 scatter2 = vec3(
                    0.5 + 0.5 * sin(scatter * 9.0 + uTime * 0.5),
                    0.5 + 0.5 * sin(scatter * 9.0 + uTime * 0.5 + 2.094),
                    0.5 + 0.5 * sin(scatter * 9.0 + uTime * 0.5 + 4.189)
                );

                // ── Animated caustic pattern (UV-based sin wave light patterns) ───
                float cx = vPosition.x * 3.5 + vPosition.y * 2.1;
                float cy = vPosition.z * 3.2 + vPosition.y * 1.7;
                float cz = vPosition.x * 2.8 - vPosition.z * 2.3;
                float caustic1 = sin(cx + uTime * 1.2) * cos(cy - uTime * 0.9);
                float caustic2 = sin(cy * 1.4 + uTime * 0.7) * cos(cz + uTime * 1.1);
                float caustic3 = cos(cx * 0.8 - uTime * 1.4) * sin(cz * 1.2 + uTime * 0.6);
                float causticPattern = max(0.0, caustic1 * caustic2 + caustic3 * 0.5);
                causticPattern = pow(causticPattern, 2.0) * 0.8;

                // Caustic color varies by channel
                vec3 causticCol = vec3(
                    causticPattern * (0.6 + 0.4 * sin(uTime * 0.5)),
                    causticPattern * (0.4 + 0.6 * cos(uTime * 0.7 + 1.2)),
                    causticPattern * (0.7 + 0.3 * sin(uTime * 0.9 + 2.4))
                );

                // Deep blue-violet base
                vec3 baseColor = vec3(0.05, 0.10, 0.32);

                // Blend layers
                vec3 interior = mix(baseColor, rainbow, 0.55) + scatter2 * 0.25;
                interior += causticCol * 0.6;   // caustic light inside crystal
                vec3 edgeGlow  = chromatic * 1.1;

                vec3 finalColor = mix(interior, edgeGlow, fresnel * 0.85);

                // Extra specular point highlight
                vec3 reflDir = reflect(-viewDir, vNormal);
                vec3 lightDir = normalize(vec3(1.0, 1.5, 1.0));
                float spec = pow(max(dot(reflDir, lightDir), 0.0), 96.0);
                finalColor += vec3(spec * 1.1);

                // Secondary sharp highlight
                vec3 lightDir2 = normalize(vec3(-0.8, 0.5, 1.2));
                float spec2 = pow(max(dot(reflDir, lightDir2), 0.0), 48.0);
                finalColor += vec3(0.4, 0.6, 1.0) * spec2 * 0.5;

                // Thin sharp Fresnel rim
                finalColor += edgeGlow * fresnel * 0.4;

                gl_FragColor = vec4(finalColor, 0.88);
            }
        `;

        // ── Crystal material factory ──────────────────────────────────────────────
        function makeCrystalMaterial(channel = -1.0) {
            return new THREE.ShaderMaterial({
                vertexShader,
                fragmentShader,
                uniforms: {
                    uTime:      { value: 0.0 },
                    uCameraPos: { value: new THREE.Vector3() },
                    uChannel:   { value: channel },
                },
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false
            });
        }

        // ── Main gem — detail:3 for high-quality geometry ─────────────────────────
        const crystalMaterial = makeCrystalMaterial(-1.0);

        const gemGeo  = new THREE.IcosahedronGeometry(2, 3);   // detail 3 (was 2)
        const gemMesh = new THREE.Mesh(gemGeo, crystalMaterial);
        scene.add(gemMesh);

        // Dispersion layer materials (used to render off-screen)
        const matR = makeCrystalMaterial(0.0);
        const matG = makeCrystalMaterial(1.0);
        const matB = makeCrystalMaterial(2.0);
        const gemR = new THREE.Mesh(gemGeo, matR);
        const gemG = new THREE.Mesh(gemGeo, matG);
        const gemB = new THREE.Mesh(gemGeo, matB);
        // Don't add to scene — rendered separately

        // ── Inner wireframe gem ────────────────────────────────────────────────────
        const innerGeo  = new THREE.IcosahedronGeometry(1.5, 2);
        const innerMat  = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.10
        });
        const innerMesh = new THREE.Mesh(innerGeo, innerMat);
        scene.add(innerMesh);

        // ── Floating crystal shards with trail meshes ─────────────────────────────
        const shardCount = 20;
        const shards = [];

        // Trail: each shard gets a set of fading "ghost" copies
        const TRAIL_LENGTH = 6;

        for (let i = 0; i < shardCount; i++) {
            const radius = 0.3 + Math.random() * 0.5;
            const geo    = new THREE.IcosahedronGeometry(radius, Math.random() < 0.5 ? 1 : 2);
            const mat    = makeCrystalMaterial(-1.0);

            const mesh = new THREE.Mesh(geo, mat);

            const theta  = Math.random() * Math.PI * 2;
            const phi    = Math.acos(2 * Math.random() - 1);
            const dist   = 3.2 + Math.random() * 2.8;
            mesh.position.set(
                dist * Math.sin(phi) * Math.cos(theta),
                dist * Math.sin(phi) * Math.sin(theta),
                dist * Math.cos(phi)
            );
            mesh.rotation.set(
                Math.random() * Math.PI * 2,
                Math.random() * Math.PI * 2,
                Math.random() * Math.PI * 2
            );

            const orbitAngle = Math.random() * Math.PI * 2;
            const orbitSpeed = 0.08 + Math.random() * 0.14;
            const orbitRadius = dist;
            const orbitTilt  = (Math.random() - 0.5) * 1.2;

            // Trail ghosts: smaller, very transparent copies
            const trails = [];
            for (let j = 0; j < TRAIL_LENGTH; j++) {
                const trailAlpha = (1.0 - j / TRAIL_LENGTH) * 0.18;
                const trailMat = new THREE.MeshBasicMaterial({
                    color: new THREE.Color().setHSL(0.6 + j * 0.05, 0.8, 0.7),
                    transparent: true,
                    opacity: trailAlpha,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending,
                });
                const trailScale = 1.0 - j * 0.08;
                const trailMesh = new THREE.Mesh(geo, trailMat);
                trailMesh.scale.setScalar(trailScale);
                scene.add(trailMesh);
                trails.push({ mesh: trailMesh, prevPositions: [], mat: trailMat });
            }

            shards.push({ mesh, mat, orbitAngle, orbitSpeed, orbitRadius, orbitTilt, phi, trails, posHistory: [] });
            scene.add(mesh);
        }

        // ── Sparkle particle system: 500 tiny bright sparks ──────────────────────
        const SPARK_COUNT = 500;
        const sparkPositions = new Float32Array(SPARK_COUNT * 3);
        const sparkColors    = new Float32Array(SPARK_COUNT * 3);
        const sparkSpeeds    = new Float32Array(SPARK_COUNT);
        const sparkPhases    = new Float32Array(SPARK_COUNT);
        const sparkRadii     = new Float32Array(SPARK_COUNT);
        const sparkThetas    = new Float32Array(SPARK_COUNT);
        const sparkPhiArr    = new Float32Array(SPARK_COUNT);

        for (let i = 0; i < SPARK_COUNT; i++) {
            sparkThetas[i] = Math.random() * Math.PI * 2;
            sparkPhiArr[i] = Math.acos(2 * Math.random() - 1);
            sparkRadii[i]  = 2.1 + Math.random() * 4.0;  // distributed around main gem
            sparkSpeeds[i] = 0.3 + Math.random() * 1.2;
            sparkPhases[i] = Math.random() * Math.PI * 2;

            // Bright white-to-prismatic colors
            const hue = Math.random();
            const col = new THREE.Color().setHSL(hue, 0.7, 0.9);
            sparkColors[i * 3 + 0] = col.r;
            sparkColors[i * 3 + 1] = col.g;
            sparkColors[i * 3 + 2] = col.b;
        }

        const sparkGeo = new THREE.BufferGeometry();
        sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPositions, 3));
        sparkGeo.setAttribute('color',    new THREE.BufferAttribute(sparkColors, 3));

        const sparkMat = new THREE.PointsMaterial({
            size: 0.045,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true,
        });
        const sparkSystem = new THREE.Points(sparkGeo, sparkMat);
        scene.add(sparkSystem);

        // ── Ambient + point lights ─────────────────────────────────────────────────
        const ambient = new THREE.AmbientLight(0x111133, 0.6);
        scene.add(ambient);

        const pointLight1 = new THREE.PointLight(0x6688ff, 3.0, 30);
        pointLight1.position.set(5, 5, 5);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xff88cc, 2.0, 30);
        pointLight2.position.set(-5, -3, 3);
        scene.add(pointLight2);

        const pointLight3 = new THREE.PointLight(0xffcc44, 1.5, 25);
        pointLight3.position.set(0, -5, -4);
        scene.add(pointLight3);

        // ── Star field background ─────────────────────────────────────────────────
        const starGeo = new THREE.BufferGeometry();
        const starCount = 3000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount * 3; i++) {
            starPositions[i] = (Math.random() - 0.5) * 80;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMat  = new THREE.PointsMaterial({ color: 0xffffff, size: 0.06, sizeAttenuation: true });
        const starField = new THREE.Points(starGeo, starMat);
        scene.add(starField);

        // ── Resize handler ────────────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            composer.setSize(innerWidth, innerHeight);
            bloom.resolution.set(innerWidth, innerHeight);
            rtR.setSize(innerWidth, innerHeight);
            rtG.setSize(innerWidth, innerHeight);
            rtB.setSize(innerWidth, innerHeight);
        });

        // Helper: sync dispersion camera position/rotation from main camera
        function syncCamera(src, dst, offsetX, offsetY) {
            dst.position.copy(src.position);
            dst.quaternion.copy(src.quaternion);
            dst.fov = src.fov;
            dst.aspect = src.aspect;
            dst.near = src.near;
            dst.far = src.far;
            // Tiny lateral offset for dispersion effect
            dst.position.x += offsetX;
            dst.position.y += offsetY;
            dst.updateProjectionMatrix();
        }

        // ── Animation loop ────────────────────────────────────────────────────────
        const clock = new THREE.Clock();

        renderer.setAnimationLoop(() => {
            const elapsed = clock.getElapsedTime();

            // ── Render dispersion layers to off-screen targets ────────────────────
            const dispOff = 0.06 + 0.03 * Math.sin(elapsed * 0.5);

            // Temporarily replace main gem material and render each channel
            gemMesh.material = matR;
            syncCamera(camera, camR, -dispOff, 0);
            matR.uniforms.uTime.value = elapsed;
            matR.uniforms.uCameraPos.value.copy(camR.position);
            renderer.setRenderTarget(rtR);
            renderer.render(scene, camR);

            gemMesh.material = matG;
            syncCamera(camera, camG, 0, dispOff * 0.5);
            matG.uniforms.uTime.value = elapsed;
            matG.uniforms.uCameraPos.value.copy(camG.position);
            renderer.setRenderTarget(rtG);
            renderer.render(scene, camG);

            gemMesh.material = matB;
            syncCamera(camera, camB, dispOff, 0);
            matB.uniforms.uTime.value = elapsed;
            matB.uniforms.uCameraPos.value.copy(camB.position);
            renderer.setRenderTarget(rtB);
            renderer.render(scene, camB);

            // Restore main material
            gemMesh.material = crystalMaterial;
            renderer.setRenderTarget(null);

            // Feed dispersion textures into composite pass
            dispersionPass.uniforms.tR.value = rtR.texture;
            dispersionPass.uniforms.tG.value = rtG.texture;
            dispersionPass.uniforms.tB.value = rtB.texture;
            dispersionPass.uniforms.uTime.value = elapsed;

            // ── Update main gem uniforms ──────────────────────────────────────────
            crystalMaterial.uniforms.uTime.value      = elapsed;
            crystalMaterial.uniforms.uCameraPos.value.copy(camera.position);

            // Slow auto-rotation of main gem
            gemMesh.rotation.x = elapsed * 0.12;
            gemMesh.rotation.y = elapsed * 0.19;

            // Inner wireframe counter-rotates
            innerMesh.rotation.x = -elapsed * 0.08;
            innerMesh.rotation.y = -elapsed * 0.13;

            // ── Orbit shards with motion trails ──────────────────────────────────
            shards.forEach(({ mesh, mat, orbitAngle, orbitSpeed, orbitRadius, orbitTilt, phi, trails, posHistory }, idx) => {
                const angle = orbitAngle + elapsed * orbitSpeed;
                const newPos = new THREE.Vector3(
                    Math.cos(angle) * orbitRadius,
                    Math.sin(angle * 0.7 + orbitTilt) * (orbitRadius * 0.4),
                    Math.sin(angle) * orbitRadius
                );
                mesh.position.copy(newPos);

                // Track position history for trails
                posHistory.unshift(newPos.clone());
                if (posHistory.length > TRAIL_LENGTH) posHistory.pop();

                // Update trail ghost positions
                trails.forEach((trail, ti) => {
                    if (posHistory[ti]) {
                        trail.mesh.position.copy(posHistory[ti]);
                        trail.mesh.rotation.copy(mesh.rotation);
                    }
                });

                // Self-spin
                mesh.rotation.x = elapsed * 0.3 * (idx % 2 === 0 ? 1 : -1);
                mesh.rotation.y = elapsed * 0.2 * (idx % 3 === 0 ? 1 : -1);

                mat.uniforms.uTime.value      = elapsed;
                mat.uniforms.uCameraPos.value.copy(camera.position);
            });

            // ── Update sparkle particles ──────────────────────────────────────────
            const sparkPosAttr = sparkGeo.attributes.position;
            for (let i = 0; i < SPARK_COUNT; i++) {
                const t   = elapsed * sparkSpeeds[i] * 0.4 + sparkPhases[i];
                const phi = sparkPhiArr[i] + Math.sin(t * 0.3) * 0.1;
                const theta = sparkThetas[i] + elapsed * sparkSpeeds[i] * 0.15;
                const r   = sparkRadii[i] * (0.85 + 0.15 * Math.sin(t * 2.0 + sparkPhases[i]));

                sparkPosAttr.setXYZ(i,
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.cos(phi),
                    r * Math.sin(phi) * Math.sin(theta)
                );
            }
            sparkPosAttr.needsUpdate = true;

            // Flicker sparkle opacity
            sparkMat.opacity = 0.7 + 0.3 * Math.sin(elapsed * 3.7);

            controls.update();
            composer.render();
        });
    </script>
</body>
</html>
