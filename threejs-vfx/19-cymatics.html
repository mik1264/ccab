<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cymatics / Chladni Standing Wave Patterns | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }

        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #00e5ff;
            text-decoration: none;
            z-index: 1000;
            font-size: 0.95rem;
            font-family: 'Courier New', monospace;
            background: rgba(0, 5, 20, 0.75);
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid rgba(0, 200, 255, 0.3);
            transition: background 0.2s ease, border-color 0.2s ease;
            letter-spacing: 0.04em;
        }
        .back-link:hover {
            background: rgba(0, 10, 40, 0.9);
            border-color: rgba(0, 200, 255, 0.7);
        }

        .title-overlay {
            position: fixed;
            top: 12px;
            right: 14px;
            color: rgba(0, 200, 255, 0.75);
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            pointer-events: none;
            line-height: 1.7;
            text-align: right;
        }

        .controls-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 5, 20, 0.82);
            border: 1px solid rgba(0, 180, 255, 0.25);
            color: #cceeff;
            padding: 16px 22px 14px;
            border-radius: 14px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            text-align: center;
            z-index: 1000;
            backdrop-filter: blur(6px);
            min-width: 340px;
        }
        .controls-panel .row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            justify-content: space-between;
        }
        .controls-panel label {
            width: 90px;
            text-align: right;
            color: rgba(0, 220, 255, 0.85);
            flex-shrink: 0;
        }
        .controls-panel input[type="range"] {
            flex: 1;
            accent-color: #00d4ff;
            cursor: pointer;
            height: 4px;
        }
        .controls-panel .val {
            width: 28px;
            text-align: left;
            color: #fff;
            font-weight: bold;
        }
        .presets-row {
            margin-top: 10px;
            display: flex;
            gap: 7px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        .presets-row span {
            color: rgba(0, 200, 255, 0.6);
            font-size: 0.72rem;
            letter-spacing: 0.08em;
        }
        .presets-row button {
            background: rgba(0, 180, 255, 0.12);
            border: 1px solid rgba(0, 180, 255, 0.35);
            color: #00d4ff;
            padding: 4px 11px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.06em;
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        .presets-row button:hover,
        .presets-row button.active {
            background: rgba(0, 180, 255, 0.28);
            border-color: rgba(0, 220, 255, 0.7);
            color: #fff;
        }

        .info-badge {
            position: fixed;
            top: 48px;
            left: 10px;
            color: rgba(150, 220, 255, 0.6);
            font-family: 'Courier New', monospace;
            font-size: 0.66rem;
            line-height: 1.7;
            pointer-events: none;
            z-index: 999;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← VFX Gallery</a>

    <div class="title-overlay">
        CYMATICS<br>
        CHLADNI PATTERNS<br>
        Three.js r175
    </div>

    <div class="info-badge" id="infoBadge">
        FREQ X: 3 &nbsp; FREQ Y: 2<br>
        RATIO: 3:2<br>
        AUTO-CYCLING
    </div>

    <div class="controls-panel">
        <div class="row">
            <label>Freq X</label>
            <input type="range" id="freqX" min="1" max="12" step="1" value="3">
            <span class="val" id="freqXVal">3</span>
        </div>
        <div class="row">
            <label>Freq Y</label>
            <input type="range" id="freqY" min="1" max="12" step="1" value="2">
            <span class="val" id="freqYVal">2</span>
        </div>
        <div class="row">
            <label>Phase</label>
            <input type="range" id="phase" min="0" max="6.28" step="0.05" value="0">
            <span class="val" id="phaseVal">0.00</span>
        </div>
        <div class="presets-row">
            <span>PRESETS:</span>
            <button id="btn-23" onclick="setPreset(2,3,0)">2:3</button>
            <button id="btn-34" onclick="setPreset(3,4,0)">3:4</button>
            <button id="btn-45" onclick="setPreset(4,5,0)">4:5</button>
            <button id="btn-56" onclick="setPreset(5,6,1.57)">5:6</button>
            <button id="btn-47" onclick="setPreset(4,7,0.78)">4:7</button>
            <button id="btn-57" onclick="setPreset(5,7,1.05)">5:7</button>
            <button id="btn-38" onclick="setPreset(3,8,0)">3:8</button>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ── Scene setup ──────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000508);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 100);
        camera.position.set(0, 7, 6);
        camera.lookAt(0, 0, 0);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 2;
        controls.maxDistance = 25;
        controls.target.set(0, 0, 0);
        controls.update();

        // ── Post-processing ─────────────────────────────────────────────────────
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            2.0,
            0.55,
            0.30
        );
        composer.addPass(bloomPass);
        composer.addPass(new OutputPass());

        // ── Main wave surface shader ────────────────────────────────────────────
        // Mesh resolution 256x256 for detailed Chladni patterns
        const vertexShader = /* glsl */`
            uniform float uTime;
            uniform float uFreqX;
            uniform float uFreqY;
            uniform float uPhase;
            varying float vDisplacement;
            varying vec2  vUv;
            varying vec3  vNormal;
            varying float vDispSign;  // +1 above, -1 below — for warm/cool coloring

            const float PI = 3.14159265358979;

            void main() {
                vUv = uv;

                float wave1 = sin(uFreqX * position.x * PI) * sin(uFreqY * position.z * PI)
                            * cos(uTime * 1.8);
                float wave2 = sin(uFreqY * position.x * PI) * sin(uFreqX * position.z * PI)
                            * cos(uTime * 1.8 + uPhase);

                float displacement = (wave1 + wave2) * 0.5;
                vDisplacement = displacement;
                vDispSign     = sign(displacement);

                // Approximate normals via analytic derivatives
                float eps = 0.02;
                float dxW1 = cos(uFreqX * (position.x + eps) * PI) * uFreqX * PI
                           * sin(uFreqY * position.z * PI) * cos(uTime * 1.8);
                float dxW2 = cos(uFreqY * (position.x + eps) * PI) * uFreqY * PI
                           * sin(uFreqX * position.z * PI) * cos(uTime * 1.8 + uPhase);
                float dzdW1 = sin(uFreqX * position.x * PI)
                            * cos(uFreqY * position.z * PI) * uFreqY * PI
                            * cos(uTime * 1.8);
                float dzdW2 = sin(uFreqY * position.x * PI)
                            * cos(uFreqX * position.z * PI) * uFreqX * PI
                            * cos(uTime * 1.8 + uPhase);

                float ddx = (dxW1 + dxW2) * 0.5 * 0.8;
                float ddz = (dzdW1 + dzdW2) * 0.5 * 0.8;
                vNormal = normalize(vec3(-ddx, 1.0, -ddz));

                vec3 newPos = position + vec3(0.0, displacement * 0.8, 0.0);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPos, 1.0);
            }
        `;

        const fragmentShader = /* glsl */`
            varying float vDisplacement;
            varying vec2  vUv;
            varying vec3  vNormal;
            varying float vDispSign;
            uniform float uTime;
            uniform float uFreqX;
            uniform float uFreqY;

            void main() {
                float d = abs(vDisplacement);

                // Node lines (Chladni nodal lines)
                float nodeLine  = 1.0 - smoothstep(0.0, 0.07, d);
                float nodeSharp = 1.0 - smoothstep(0.0, 0.025, d);

                // Peak mask
                float peakMask = smoothstep(0.55, 1.0, d);

                // Grid shimmer
                float gridU = abs(sin(vUv.x * (uFreqX + uFreqY) * 6.28));
                float gridV = abs(sin(vUv.y * (uFreqX + uFreqY) * 6.28));
                float grid  = gridU * gridV * 0.04;

                // Time-based pulse
                float pulse = 0.85 + 0.15 * sin(uTime * 3.5);

                // ── Rainbow gradient based on displacement direction ───────────
                // up (+1) = warm colors (red/orange/yellow), down (-1) = cool (blue/violet)
                float warmT = vDispSign * 0.5 + 0.5; // 1 when up, 0 when down

                // Warm antinodes: orange-yellow
                vec3 warmColor = vec3(1.0, 0.55 + d * 0.35, 0.05);
                // Cool antinodes: blue-violet
                vec3 coolColor = vec3(0.25, 0.05, 0.9 + d * 0.1);
                vec3 peakColor = mix(coolColor, warmColor, warmT);

                // Base and mid
                vec3 baseColor = vec3(0.03, 0.01, 0.12);
                vec3 midColor  = mix(
                    vec3(0.02, 0.15, 0.55),   // cool mid (downward)
                    vec3(0.55, 0.18, 0.02),    // warm mid (upward)
                    warmT
                );

                // Node lines remain electric cyan
                vec3 nodeColor = vec3(0.0, 0.95, 1.0) * pulse;
                vec3 coreColor = vec3(0.8, 1.0, 1.0);

                // Compose color layers
                vec3 color = baseColor;
                color = mix(color, midColor, smoothstep(0.0, 0.5, d) * 0.5);
                color = mix(color, peakColor, peakMask * 0.65);
                color = mix(color, nodeColor, nodeLine * 0.9);
                color = mix(color, coreColor, nodeSharp * 0.95);
                color += grid;

                // ── Specular highlight on wave peaks ─────────────────────────
                // Camera is roughly above; light from above-right
                vec3 lightDir  = normalize(vec3(0.4, 1.0, 0.3));
                vec3 viewDir   = normalize(vec3(0.0, 1.0, 0.6));
                vec3 halfDir   = normalize(lightDir + viewDir);
                float spec     = pow(max(0.0, dot(normalize(vNormal), halfDir)), 64.0);
                // Only show specular at peaks (high amplitude)
                spec *= peakMask * (0.7 + 0.3 * pulse);
                color += vec3(0.9, 1.0, 1.0) * spec * 0.6;

                // Simple diffuse from above
                float light = dot(normalize(vNormal), normalize(vec3(0.3, 1.0, 0.5)));
                light = clamp(light, 0.0, 1.0);
                color = mix(color, color * (0.6 + 0.4 * light), 0.25);

                // ── Rim light from below — shows through valleys ────────────
                // Valleys are where displacement < 0; glow through from underneath
                float valleyMask = smoothstep(-0.05, -0.4, vDisplacement);
                float rimGlow    = valleyMask * (0.4 + 0.3 * sin(uTime * 2.0));
                color += vec3(0.15, 0.55, 1.0) * rimGlow * 0.35;

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const uniforms = {
            uTime:  { value: 0.0 },
            uFreqX: { value: 3.0 },
            uFreqY: { value: 2.0 },
            uPhase: { value: 0.0 },
        };

        // 256×256 resolution for fine Chladni pattern detail
        const geometry = new THREE.PlaneGeometry(10, 10, 256, 256);
        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms,
            side: THREE.DoubleSide,
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = -Math.PI / 2;
        scene.add(mesh);

        // Border
        const edgeGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(10, 10));
        const edgeMat = new THREE.LineBasicMaterial({ color: 0x003344, transparent: true, opacity: 0.4 });
        const edgeMesh = new THREE.LineSegments(edgeGeo, edgeMat);
        edgeMesh.rotation.x = -Math.PI / 2;
        scene.add(edgeMesh);

        // ── Sand particle system — 20K particles on wave surface ───────────────
        // Particles rest at their XZ position, Y = wave displacement.
        // They cluster at Chladni node lines (low amplitude regions).
        const SAND_COUNT = 20000;
        const sandXZ     = new Float32Array(SAND_COUNT * 2); // fixed XZ positions
        const sandPos    = new Float32Array(SAND_COUNT * 3);
        const sandCol    = new Float32Array(SAND_COUNT * 3);

        // Distribute uniformly over the plate [-5, 5] x [-5, 5]
        for (let i = 0; i < SAND_COUNT; i++) {
            sandXZ[i * 2]     = (Math.random() - 0.5) * 10.0;
            sandXZ[i * 2 + 1] = (Math.random() - 0.5) * 10.0;
        }

        const sandGeo = new THREE.BufferGeometry();
        sandGeo.setAttribute('position', new THREE.BufferAttribute(sandPos, 3));
        sandGeo.setAttribute('color',    new THREE.BufferAttribute(sandCol, 3));

        const sandMat = new THREE.PointsMaterial({
            size:         0.022,
            vertexColors: true,
            transparent:  true,
            opacity:      0.75,
            depthWrite:   false,
            blending:     THREE.AdditiveBlending,
        });

        const sandPoints = new THREE.Points(sandGeo, sandMat);
        scene.add(sandPoints);

        const sandPosAttr = sandGeo.attributes.position;
        const sandColAttr = sandGeo.attributes.color;

        // Precompute PI constant for JS
        const PI = Math.PI;

        // ── Ambient glow particles ─────────────────────────────────────────────
        const particleCount = 600;
        const pPositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            pPositions[i * 3 + 0] = (Math.random() - 0.5) * 12;
            pPositions[i * 3 + 1] = Math.random() * 0.5 - 0.1;
            pPositions[i * 3 + 2] = (Math.random() - 0.5) * 12;
        }
        const pGeo = new THREE.BufferGeometry();
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
        scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({
            color: 0x003355, size: 0.025, transparent: true, opacity: 0.55,
            blending: THREE.AdditiveBlending, depthWrite: false,
        })));

        // ── UI state ────────────────────────────────────────────────────────────
        let userInteracted = false;
        let autoTimer = 0;
        const AUTO_INTERVAL = 4.0;

        const PRESETS = [
            { fx: 2, fy: 3, ph: 0.0,  id: 'btn-23' },
            { fx: 3, fy: 4, ph: 0.0,  id: 'btn-34' },
            { fx: 4, fy: 5, ph: 0.0,  id: 'btn-45' },
            { fx: 5, fy: 6, ph: 1.57, id: 'btn-56' },
            { fx: 4, fy: 7, ph: 0.78, id: 'btn-47' },
            { fx: 5, fy: 7, ph: 1.05, id: 'btn-57' },
            { fx: 3, fy: 8, ph: 0.0,  id: 'btn-38' },
        ];
        let presetIndex = 0;

        let targetFreqX = 3.0;
        let targetFreqY = 2.0;
        let targetPhase = 0.0;
        let currentFreqX = 3.0;
        let currentFreqY = 2.0;
        let currentPhase = 0.0;
        const LERP_SPEED = 0.04;

        const elFreqX   = document.getElementById('freqX');
        const elFreqY   = document.getElementById('freqY');
        const elPhase   = document.getElementById('phase');
        const elFXVal   = document.getElementById('freqXVal');
        const elFYVal   = document.getElementById('freqYVal');
        const elPhVal   = document.getElementById('phaseVal');
        const infoBadge = document.getElementById('infoBadge');

        function setPreset(fx, fy, ph) {
            targetFreqX = fx;
            targetFreqY = fy;
            targetPhase = ph;
            elFreqX.value = fx;
            elFreqY.value = fy;
            elPhase.value = ph.toFixed(2);
            elFXVal.textContent = fx;
            elFYVal.textContent = fy;
            elPhVal.textContent = ph.toFixed(2);
            updateBadge(fx, fy, false);
        }
        window.setPreset = (fx, fy, ph) => {
            userInteracted = true;
            setPreset(fx, fy, ph);
            highlightButton(fx, fy);
        };

        function highlightButton(fx, fy) {
            document.querySelectorAll('.presets-row button').forEach(b => b.classList.remove('active'));
            const match = PRESETS.find(p => p.fx === fx && p.fy === fy);
            if (match) document.getElementById(match.id)?.classList.add('active');
        }

        function updateBadge(fx, fy, auto) {
            const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
            const g = gcd(fx, fy);
            infoBadge.innerHTML =
                `FREQ X: ${fx} &nbsp; FREQ Y: ${fy}<br>` +
                `RATIO: ${fx/g}:${fy/g}<br>` +
                (auto ? 'AUTO-CYCLING' : 'MANUAL');
        }

        elFreqX.addEventListener('input', () => {
            userInteracted = true;
            targetFreqX = parseInt(elFreqX.value);
            elFXVal.textContent = targetFreqX;
            updateBadge(targetFreqX, targetFreqY, false);
        });
        elFreqY.addEventListener('input', () => {
            userInteracted = true;
            targetFreqY = parseInt(elFreqY.value);
            elFYVal.textContent = targetFreqY;
            updateBadge(targetFreqX, targetFreqY, false);
        });
        elPhase.addEventListener('input', () => {
            userInteracted = true;
            targetPhase = parseFloat(elPhase.value);
            elPhVal.textContent = targetPhase.toFixed(2);
        });

        // ── Clock / animation ──────────────────────────────────────────────────
        const clock = new THREE.Clock();
        function lerp(a, b, t) { return a + (b - a) * t; }

        function advanceAutoPreset(dt) {
            if (userInteracted) return;
            autoTimer += dt;
            if (autoTimer >= AUTO_INTERVAL) {
                autoTimer = 0;
                presetIndex = (presetIndex + 1) % PRESETS.length;
                const p = PRESETS[presetIndex];
                setPreset(p.fx, p.fy, p.ph);
                highlightButton(p.fx, p.fy);
                updateBadge(p.fx, p.fy, true);
            }
        }

        // Update sand particles (run every other frame for performance)
        let sandFrameSkip = 0;

        function updateSandParticles(elapsed) {
            const fx  = currentFreqX;
            const fy  = currentFreqY;
            const ph  = currentPhase;
            const t   = elapsed;
            const cosT = Math.cos(t * 1.8);
            const cosTPh = Math.cos(t * 1.8 + ph);

            for (let i = 0; i < SAND_COUNT; i++) {
                const px = sandXZ[i * 2];
                const pz = sandXZ[i * 2 + 1];

                const wave1 = Math.sin(fx * px * PI) * Math.sin(fy * pz * PI) * cosT;
                const wave2 = Math.sin(fy * px * PI) * Math.sin(fx * pz * PI) * cosTPh;
                const disp  = (wave1 + wave2) * 0.5;

                // Particle Y = wave surface + small offset
                sandPosAttr.array[i * 3]     = px;
                sandPosAttr.array[i * 3 + 1] = disp * 0.8;
                sandPosAttr.array[i * 3 + 2] = pz;

                // Particles at low-amplitude zones (node lines) glow bright
                // Particles at high-amplitude zones are dimmer (flung away in reality)
                const absD   = Math.abs(disp);
                const nodeT  = 1.0 - Math.min(1.0, absD / 0.15); // bright near zero crossing
                // Sand color: gold/yellow at nodes, dim grey elsewhere
                const r = 0.9 * nodeT + 0.15;
                const g = 0.75 * nodeT + 0.1;
                const b = 0.1  * nodeT + 0.05;
                sandColAttr.array[i * 3]     = r;
                sandColAttr.array[i * 3 + 1] = g;
                sandColAttr.array[i * 3 + 2] = b;
            }
            sandPosAttr.needsUpdate = true;
            sandColAttr.needsUpdate = true;
        }

        function animate() {
            const dt      = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            advanceAutoPreset(dt);

            currentFreqX = lerp(currentFreqX, targetFreqX, LERP_SPEED);
            currentFreqY = lerp(currentFreqY, targetFreqY, LERP_SPEED);
            currentPhase = lerp(currentPhase, targetPhase, LERP_SPEED);

            uniforms.uTime.value  = elapsed;
            uniforms.uFreqX.value = currentFreqX;
            uniforms.uFreqY.value = currentFreqY;
            uniforms.uPhase.value = currentPhase;

            // Update sand every other frame (20K particles is expensive)
            sandFrameSkip++;
            if (sandFrameSkip % 2 === 0) {
                updateSandParticles(elapsed);
            }

            controls.update();
            composer.render();
        }

        renderer.setAnimationLoop(animate);

        // ── Resize ─────────────────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
            bloomPass.setSize(w, h);
        });

        // Boot
        highlightButton(3, 2);
        updateBadge(3, 2, true);
        setPreset(PRESETS[0].fx, PRESETS[0].fy, PRESETS[0].ph);
        highlightButton(PRESETS[0].fx, PRESETS[0].fy);
        updateBadge(PRESETS[0].fx, PRESETS[0].fy, true);
        presetIndex = 0;

    </script>
</body>
</html>
