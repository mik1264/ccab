<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morphing Platonic Solids | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }

        .back-link {
            position: fixed;
            top: 14px;
            left: 14px;
            color: #8A9A5B;
            text-decoration: none;
            z-index: 1000;
            font-size: 0.95rem;
            font-family: 'Nunito', sans-serif, sans-serif;
            background: rgba(0,0,0,0.55);
            padding: 7px 16px;
            border-radius: 20px;
            backdrop-filter: blur(6px);
            transition: background 0.2s ease;
        }
        .back-link:hover { background: rgba(0,0,0,0.85); }

        /* Shape name display */
        #shapeName {
            position: fixed;
            bottom: 44px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Georgia', serif;
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.0);
            pointer-events: none;
            white-space: nowrap;
            transition: color 0.6s ease;
            text-shadow: 0 0 30px rgba(140,200,255,0.5);
        }

        /* Shape counter dots */
        #shapeDots {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: none;
        }
        .shape-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transition: all 0.4s ease;
        }
        .shape-dot.active {
            background: rgba(180,220,255,0.9);
            box-shadow: 0 0 8px rgba(140,200,255,0.8);
            transform: scale(1.35);
        }

        /* Stats overlay */
        #stats {
            position: fixed;
            top: 14px;
            right: 14px;
            color: rgba(255,255,255,0.35);
            font-family: monospace;
            font-size: 0.72rem;
            text-align: right;
            line-height: 1.7;
            pointer-events: none;
        }

        /* Sidebar legend */
        #legend {
            position: fixed;
            top: 50%;
            right: 18px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.4;
            transition: opacity 0.5s ease;
        }
        .legend-item.active { opacity: 1.0; }
        .legend-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-label {
            font-family: monospace;
            font-size: 0.68rem;
            color: #fff;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        /* Instruction hint */
        #hint {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-family: sans-serif;
            font-size: 0.78rem;
            pointer-events: none;
            letter-spacing: 0.05em;
        }

        /* Loading screen */
        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 16px;
            transition: opacity 0.8s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loading-ring {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(140,200,255,0.15);
            border-top-color: rgba(140,200,255,0.8);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            color: rgba(255,255,255,0.4);
            font-family: monospace;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-ring"></div>
        <div class="loading-text">INITIALIZING...</div>
    </div>

    <a href="index.html" class="back-link">&#8592; Back</a>
    <div id="hint">Drag to rotate &nbsp;&middot;&nbsp; Scroll to zoom</div>
    <div id="stats">5,000 particles &nbsp;|&nbsp; Bloom &nbsp;|&nbsp; GSAP morphing &nbsp;|&nbsp; Three.js r175</div>

    <div id="shapeName">Tetrahedron</div>

    <div id="shapeDots">
        <div class="shape-dot active" id="dot-0"></div>
        <div class="shape-dot" id="dot-1"></div>
        <div class="shape-dot" id="dot-2"></div>
        <div class="shape-dot" id="dot-3"></div>
        <div class="shape-dot" id="dot-4"></div>
    </div>

    <div id="legend">
        <div class="legend-item active" id="leg-0">
            <div class="legend-dot" style="background:#ff9d6b"></div>
            <span class="legend-label">TETRAHEDRON</span>
        </div>
        <div class="legend-item" id="leg-1">
            <div class="legend-dot" style="background:#6bffb8"></div>
            <span class="legend-label">CUBE</span>
        </div>
        <div class="legend-item" id="leg-2">
            <div class="legend-dot" style="background:#6bc8ff"></div>
            <span class="legend-label">OCTAHEDRON</span>
        </div>
        <div class="legend-item" id="leg-3">
            <div class="legend-dot" style="background:#d96bff"></div>
            <span class="legend-label">DODECAHEDRON</span>
        </div>
        <div class="legend-item" id="leg-4">
            <div class="legend-dot" style="background:#fff06b"></div>
            <span class="legend-label">ICOSAHEDRON</span>
        </div>
    </div>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <!-- Three.js r175 import map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ─── Constants ────────────────────────────────────────────────────────────
        const PARTICLE_COUNT = 5000;
        const MORPH_DURATION  = 2.4;   // seconds for GSAP tween
        const PAUSE_DURATION  = 1200;  // ms pause between morphs
        const SOLID_RADIUS    = 2.0;

        // Per-solid accent colour (HSL hue degrees)
        const SOLID_HUES = [20, 150, 200, 285, 55]; // orange, teal, sky, violet, gold
        const SOLID_NAMES = ['Tetrahedron', 'Cube', 'Octahedron', 'Dodecahedron', 'Icosahedron'];

        // ─── Scene Setup ─────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const scene  = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 0, 7);

        // Orbit controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 3.5;
        controls.maxDistance = 18;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.55;

        // ─── Post-processing ──────────────────────────────────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5,   // strength
            0.55,  // radius
            0.05   // threshold
        );
        composer.addPass(bloomPass);
        composer.addPass(new OutputPass());

        // ─── Geometry sampling ────────────────────────────────────────────────────
        /**
         * Sample `count` points uniformly on the surface of a non-indexed geometry
         * using random barycentric coordinates per triangle.
         */
        function sampleGeometry(geometry, count) {
            const nonIndexed = geometry.toNonIndexed();
            const pos = nonIndexed.attributes.position;
            const faceCount = Math.floor(pos.count / 3);

            const positions = new Float32Array(count * 3);

            for (let i = 0; i < count; i++) {
                const faceIdx = Math.floor(Math.random() * faceCount) * 3;

                let u = Math.random();
                let v = Math.random();
                if (u + v > 1.0) { u = 1.0 - u; v = 1.0 - v; }
                const w = 1.0 - u - v;

                const ax = pos.getX(faceIdx),   ay = pos.getY(faceIdx),   az = pos.getZ(faceIdx);
                const bx = pos.getX(faceIdx+1), by = pos.getY(faceIdx+1), bz = pos.getZ(faceIdx+1);
                const cx = pos.getX(faceIdx+2), cy = pos.getY(faceIdx+2), cz = pos.getZ(faceIdx+2);

                positions[i*3]   = ax*u + bx*v + cx*w;
                positions[i*3+1] = ay*u + by*v + cy*w;
                positions[i*3+2] = az*u + bz*v + cz*w;
            }

            nonIndexed.dispose();
            return positions;
        }

        // Build source geometries and sample them
        const sourceGeometries = [
            new THREE.TetrahedronGeometry(SOLID_RADIUS, 2),
            new THREE.BoxGeometry(SOLID_RADIUS * 1.3, SOLID_RADIUS * 1.3, SOLID_RADIUS * 1.3),
            new THREE.OctahedronGeometry(SOLID_RADIUS, 2),
            new THREE.DodecahedronGeometry(SOLID_RADIUS, 1),
            new THREE.IcosahedronGeometry(SOLID_RADIUS, 2),
        ];

        const samples = sourceGeometries.map(g => sampleGeometry(g, PARTICLE_COUNT));
        sourceGeometries.forEach(g => g.dispose());

        // ─── Particle system ──────────────────────────────────────────────────────
        // Start with tetrahedron positions
        const bufferGeom = new THREE.BufferGeometry();
        const posArray   = new Float32Array(samples[0]);
        bufferGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        // Per-particle random size variation (used in shader)
        const sizeArray = new Float32Array(PARTICLE_COUNT);
        for (let i = 0; i < PARTICLE_COUNT; i++) sizeArray[i] = 0.5 + Math.random() * 0.5;
        bufferGeom.setAttribute('aSize', new THREE.BufferAttribute(sizeArray, 1));

        // Vertex shader: size from attribute, project position
        const vertexShader = /* glsl */`
            attribute float aSize;
            uniform float uTime;
            uniform vec3  uColor;

            varying vec3 vColor;
            varying float vAlpha;

            void main() {
                vColor = uColor;

                // Subtle oscillating alpha per particle based on position hash
                float hash = fract(sin(dot(position, vec3(127.1, 311.7, 74.7))) * 43758.5453);
                vAlpha = 0.55 + 0.45 * sin(uTime * 2.0 + hash * 6.2832);

                vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = aSize * (180.0 / -mvPos.z);
                gl_Position  = projectionMatrix * mvPos;
            }
        `;

        // Fragment shader: circular soft dot
        const fragmentShader = /* glsl */`
            varying vec3  vColor;
            varying float vAlpha;

            void main() {
                vec2 uv   = gl_PointCoord - 0.5;
                float r   = length(uv) * 2.0;
                float disc = 1.0 - smoothstep(0.7, 1.0, r);
                if (disc < 0.001) discard;

                // soft radial falloff
                float glow = exp(-r * r * 2.5);
                gl_FragColor = vec4(vColor, disc * glow * vAlpha);
            }
        `;

        const particleMat = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uTime:  { value: 0 },
                uColor: { value: new THREE.Color().setHSL(SOLID_HUES[0] / 360, 0.85, 0.72) },
            },
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
        });

        const particles = new THREE.Points(bufferGeom, particleMat);
        scene.add(particles);

        // ─── Wireframe overlays ───────────────────────────────────────────────────
        // We keep one WireframeGeometry that we rebuild on each shape completion.
        const wireframeGeometries = [
            new THREE.TetrahedronGeometry(SOLID_RADIUS, 0),
            new THREE.BoxGeometry(SOLID_RADIUS * 1.3, SOLID_RADIUS * 1.3, SOLID_RADIUS * 1.3),
            new THREE.OctahedronGeometry(SOLID_RADIUS, 0),
            new THREE.DodecahedronGeometry(SOLID_RADIUS, 0),
            new THREE.IcosahedronGeometry(SOLID_RADIUS, 1),
        ];

        const wireMat = new THREE.LineBasicMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.08,
            depthWrite: false,
            blending: THREE.AdditiveBlending,
        });

        let currentWire = new THREE.LineSegments(
            new THREE.WireframeGeometry(wireframeGeometries[0]),
            wireMat
        );
        scene.add(currentWire);

        // ─── Morphing state ───────────────────────────────────────────────────────
        let currentShape = 0;
        let isMorphing   = false;
        let morphTween   = null;

        // References to the "from" and "to" sample arrays for the active morph
        let fromSamples = samples[0];
        let toSamples   = null;

        // ─── UI helpers ───────────────────────────────────────────────────────────
        const shapeNameEl = document.getElementById('shapeName');

        function updateUI(idx, progress) {
            // Dot indicators
            for (let i = 0; i < 5; i++) {
                document.getElementById(`dot-${i}`).classList.toggle('active', i === idx);
                document.getElementById(`leg-${i}`).classList.toggle('active',  i === idx);
            }

            // Shape name fade
            const h = SOLID_HUES[idx];
            const col = new THREE.Color().setHSL(h / 360, 0.85, 0.78);
            shapeNameEl.textContent = SOLID_NAMES[idx];
            shapeNameEl.style.color = `rgba(${Math.round(col.r*255)},${Math.round(col.g*255)},${Math.round(col.b*255)},${0.7 + 0.3 * progress})`;
        }

        // ─── Morph logic ──────────────────────────────────────────────────────────
        function morphToNext() {
            if (isMorphing) return;
            isMorphing = true;

            const next      = (currentShape + 1) % 5;
            const fromArr   = samples[currentShape];
            const toArr     = samples[next];

            // Colours to lerp between
            const fromHSL = SOLID_HUES[currentShape] / 360;
            const toHSL   = SOLID_HUES[next] / 360;

            // Blend hue (handle wrap-around)
            let dHue = toHSL - fromHSL;
            if (dHue > 0.5)  dHue -= 1;
            if (dHue < -0.5) dHue += 1;

            const posArr = bufferGeom.attributes.position.array;
            const obj    = { progress: 0 };

            // Fade wireframe out immediately
            gsap.to(wireMat, { opacity: 0.0, duration: 0.4, ease: 'power2.in' });

            morphTween = gsap.to(obj, {
                progress: 1,
                duration: MORPH_DURATION,
                ease: 'power2.inOut',
                onUpdate() {
                    const p = obj.progress;

                    // Vertex interpolation
                    for (let i = 0; i < posArr.length; i++) {
                        posArr[i] = fromArr[i] + (toArr[i] - fromArr[i]) * p;
                    }
                    bufferGeom.attributes.position.needsUpdate = true;

                    // Colour interpolation
                    const hue = fromHSL + dHue * p;
                    particleMat.uniforms.uColor.value.setHSL(
                        ((hue % 1) + 1) % 1, 0.85, 0.72
                    );

                    // Bloom breathes
                    bloomPass.strength = 1.5 + Math.sin(p * Math.PI) * 0.8;

                    updateUI(next, p);
                },
                onComplete() {
                    currentShape = next;
                    isMorphing   = false;
                    fromSamples  = samples[next];

                    // Swap wireframe geometry
                    currentWire.geometry.dispose();
                    currentWire.geometry = new THREE.WireframeGeometry(wireframeGeometries[next]);

                    // Tint wireframe to match current colour
                    const c = new THREE.Color().setHSL(SOLID_HUES[next] / 360, 0.5, 0.7);
                    wireMat.color = c;

                    // Fade wireframe back in
                    gsap.to(wireMat, { opacity: 0.12, duration: 0.6, ease: 'power2.out' });

                    // Settle bloom
                    bloomPass.strength = 1.5;

                    updateUI(next, 1);

                    // Schedule next morph
                    setTimeout(morphToNext, PAUSE_DURATION);
                }
            });
        }

        // ─── Resize ───────────────────────────────────────────────────────────────
        function onResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
            bloomPass.resolution.set(w, h);
        }
        window.addEventListener('resize', onResize);

        // ─── Animate ──────────────────────────────────────────────────────────────
        let clock = new THREE.Clock();
        let frameCount = 0;

        renderer.setAnimationLoop(() => {
            const dt = clock.getDelta();
            const elapsed = clock.elapsedTime;

            particleMat.uniforms.uTime.value = elapsed;

            // Slow additional rotation (on top of OrbitControls autoRotate)
            particles.rotation.y += 0.0008;
            currentWire.rotation.copy(particles.rotation);

            controls.update();
            composer.render();

            // FPS in stats (every 60 frames)
            frameCount++;
            if (frameCount % 60 === 0) {
                const fps = Math.round(1 / dt);
                document.getElementById('stats').textContent =
                    `${PARTICLE_COUNT.toLocaleString()} particles  |  Bloom  |  GSAP  |  ${fps} fps`;
            }
        });

        // ─── Bootstrap ────────────────────────────────────────────────────────────
        // Hide loading overlay, show name, start morphing
        const loading = document.getElementById('loading');
        loading.classList.add('hidden');
        setTimeout(() => { loading.style.display = 'none'; }, 900);

        // Initial UI state
        updateUI(0, 1);

        // Begin morph cycle after intro pause
        setTimeout(morphToNext, 1600);

    </script>
</body>
</html>
