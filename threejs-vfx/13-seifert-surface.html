<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seifert Surface | Trefoil Knot | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }

        .back-link {
            position: fixed;
            top: 14px;
            left: 14px;
            color: #8A9A5B;
            text-decoration: none;
            z-index: 1000;
            font-size: 0.95rem;
            font-family: 'Nunito', sans-serif;
            background: rgba(0,0,0,0.55);
            padding: 6px 16px;
            border-radius: 20px;
            transition: background 0.2s ease;
            backdrop-filter: blur(6px);
        }
        .back-link:hover { background: rgba(0,0,0,0.85); }

        .title-overlay {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 100;
        }
        .title-overlay h1 {
            font-family: 'Lora', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.08em;
            text-shadow: 0 0 20px rgba(255, 120, 0, 0.7), 0 0 40px rgba(255, 60, 0, 0.4);
            white-space: nowrap;
        }
        .title-overlay p {
            font-family: 'Nunito', sans-serif;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .info-bar {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-family: 'Nunito', sans-serif;
            font-size: 0.8rem;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.05em;
        }

        .legend {
            position: fixed;
            bottom: 50px;
            right: 18px;
            pointer-events: none;
            z-index: 100;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.55);
        }
        .legend-swatch {
            width: 28px;
            height: 4px;
            border-radius: 2px;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <a href="index.html" class="back-link">← Back</a>

    <div class="title-overlay">
        <h1>Seifert Surface</h1>
        <p>Trefoil Knot &nbsp;·&nbsp; Milnor Fiber &nbsp;·&nbsp; Three.js r175</p>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-swatch" style="background: linear-gradient(90deg, #ff4400, #ffaa00);"></div>
            <span>Trefoil Knot</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: linear-gradient(90deg, #00aaff88, #aa00ff88); height: 10px; border-radius: 3px; opacity: 0.8;"></div>
            <span>Seifert Surface</span>
        </div>
    </div>

    <div class="info-bar">Drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Right-drag to pan</div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ─── Scene ────────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x02010a);
    scene.fog = new THREE.FogExp2(0x02010a, 0.045);

    // ─── Camera ───────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 300);
    camera.position.set(0, 3.5, 10);
    camera.lookAt(0, 0, 0);

    // ─── Renderer ─────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    // ─── OrbitControls ────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 3;
    controls.maxDistance = 40;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.6;

    // ─── Post-processing ──────────────────────────────────────────────────────
    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.0,   // strength
        0.5,   // radius
        0.3    // threshold
    );
    composer.addPass(bloomPass);

    const outputPass = new OutputPass();
    composer.addPass(outputPass);

    // ─── Lights ───────────────────────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0x111122, 0.8);
    scene.add(ambientLight);

    // Three colored rotating point lights
    const lights = [
        { color: 0xff4400, radius: 6,  speed: 0.7,  phase: 0,            height: 3  },
        { color: 0x0066ff, radius: 7,  speed: 0.5,  phase: Math.PI*2/3,  height: -2 },
        { color: 0xaa00ff, radius: 5,  speed: 0.9,  phase: Math.PI*4/3,  height: 1  },
    ];
    const pointLightMeshes = lights.map(cfg => {
        const light = new THREE.PointLight(cfg.color, 3.5, 20);
        light.position.set(
            cfg.radius * Math.cos(cfg.phase),
            cfg.height,
            cfg.radius * Math.sin(cfg.phase)
        );
        scene.add(light);
        // small glow sphere to show position
        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.06, 8, 8),
            new THREE.MeshBasicMaterial({ color: cfg.color })
        );
        light.add(sphere);
        return { light, ...cfg };
    });

    // ─── Mathematics ──────────────────────────────────────────────────────────
    // Trefoil knot parametrization
    function trefoilKnot(t) {
        return new THREE.Vector3(
            Math.sin(t) + 2 * Math.sin(2 * t),
            Math.cos(t) - 2 * Math.cos(2 * t),
            -Math.sin(3 * t)
        );
    }

    // Trefoil tangent (analytical for accuracy)
    function trefoilTangent(t) {
        return new THREE.Vector3(
            Math.cos(t) + 4 * Math.cos(2 * t),
            -Math.sin(t) + 4 * Math.sin(2 * t),
            -3 * Math.cos(3 * t)
        ).normalize();
    }

    // Build a stable Frenet-like frame (Bishop frame) along the knot
    // to avoid sudden flips at inflection points.
    function buildBishopFrame(N) {
        // Sample knot positions and tangents
        const positions = [];
        const tangents = [];
        for (let i = 0; i <= N; i++) {
            const t = (i / N) * 2 * Math.PI;
            positions.push(trefoilKnot(t));
            tangents.push(trefoilTangent(t));
        }

        // Initialize first normal by using a vector not parallel to tangent[0]
        const t0 = tangents[0];
        let seed = new THREE.Vector3(0, 1, 0);
        if (Math.abs(t0.dot(seed)) > 0.9) seed.set(1, 0, 0);
        let normal = seed.clone().sub(t0.clone().multiplyScalar(t0.dot(seed))).normalize();
        let binormal = new THREE.Vector3().crossVectors(t0, normal).normalize();

        const normals   = [normal.clone()];
        const binormals = [binormal.clone()];

        // Parallel transport
        for (let i = 1; i <= N; i++) {
            const tPrev = tangents[i - 1];
            const tCurr = tangents[i];
            // Rotation axis and angle to map tPrev -> tCurr
            const axis = new THREE.Vector3().crossVectors(tPrev, tCurr);
            const sinA = axis.length();
            const cosA = tPrev.dot(tCurr);
            if (sinA < 1e-8) {
                normals.push(normals[i - 1].clone());
                binormals.push(binormals[i - 1].clone());
            } else {
                axis.normalize();
                const quat = new THREE.Quaternion().setFromAxisAngle(axis, Math.atan2(sinA, cosA));
                const nNew = normals[i - 1].clone().applyQuaternion(quat).normalize();
                const bNew = new THREE.Vector3().crossVectors(tCurr, nNew).normalize();
                normals.push(nNew);
                binormals.push(bNew);
            }
        }
        return { positions, tangents, normals, binormals };
    }

    // ─── Trefoil Knot Tube ────────────────────────────────────────────────────
    class TrefoilCurve extends THREE.Curve {
        getPoint(u) {
            return trefoilKnot(u * 2 * Math.PI);
        }
    }

    const knotCurve = new TrefoilCurve();
    const knotGeometry = new THREE.TubeGeometry(knotCurve, 300, 0.085, 12, true);
    const knotMaterial = new THREE.MeshStandardMaterial({
        color:             0xff5500,
        emissive:          0xff2200,
        emissiveIntensity: 0.9,
        metalness:         0.6,
        roughness:         0.25,
    });
    const knotMesh = new THREE.Mesh(knotGeometry, knotMaterial);
    scene.add(knotMesh);

    // ─── Seifert Surface (Milnor Fiber Approximation) ─────────────────────────
    // We parametrize the Seifert surface by attaching "spanning fibers" to each
    // point on the knot. At each knot sample i, we draw a disk-segment of radius R
    // in the normal-binormal plane. The fiber angle φ ∈ [0, π] gives the upper
    // half-disk, and we include the seam φ=0..π as one band that sweeps around.
    //
    // To capture the full Seifert disk (genus 1), we use a double covering:
    //   φ ∈ [0, 2π], r ∈ [0, R]   with a Möbius-like twist (2 rotations per loop)
    // This traces the Milnor fiber for the trefoil (p=2, q=3 torus knot).
    //
    // Surface parametrization:
    //   P(θ, φ) = knot(θ) + r(φ) * [cos(ψ(θ,φ))·N(θ) + sin(ψ(θ,φ))·B(θ)]
    // where ψ = φ + (3/2)·θ  (3/2 because the trefoil winds 3/2 times).
    // r(φ) = R * sin(φ/2)²  makes r vanish at φ=0,2π (boundary = the knot).

    const THETA_SEGS = 280;  // along knot
    const PHI_SEGS   = 120;  // across surface
    const SURF_R     = 2.2;  // maximum disk radius

    // Build Bishop frame
    const frame = buildBishopFrame(THETA_SEGS);

    // Build vertex array
    // Grid: (THETA_SEGS+1) × (PHI_SEGS+1) vertices
    const totalVerts = (THETA_SEGS + 1) * (PHI_SEGS + 1);
    const positions_arr = new Float32Array(totalVerts * 3);
    const normals_arr   = new Float32Array(totalVerts * 3);
    const uvs_arr       = new Float32Array(totalVerts * 2);
    const colors_arr    = new Float32Array(totalVerts * 3);

    const tmpColor = new THREE.Color();

    for (let i = 0; i <= THETA_SEGS; i++) {
        const theta = (i / THETA_SEGS) * 2 * Math.PI;
        const P  = frame.positions[i];
        const N  = frame.normals[i];
        const B  = frame.binormals[i];

        for (let j = 0; j <= PHI_SEGS; j++) {
            const phi = (j / PHI_SEGS) * 2 * Math.PI;

            // Milnor fiber angle: fiber rotates 3/2 times as θ goes around once
            // (trefoil = (2,3) torus knot, genus = 1, so one half-twist per loop side)
            const psi = phi + (3 / 2) * theta;

            // Radial envelope: vanishes at phi=0 and phi=2π (the knot boundary)
            const r = SURF_R * Math.pow(Math.sin(phi * 0.5), 2);

            const cx = Math.cos(psi);
            const sx = Math.sin(psi);

            const vx = P.x + r * (cx * N.x + sx * B.x);
            const vy = P.y + r * (cx * N.y + sx * B.y);
            const vz = P.z + r * (cx * N.z + sx * B.z);

            const idx = i * (PHI_SEGS + 1) + j;
            positions_arr[idx * 3 + 0] = vx;
            positions_arr[idx * 3 + 1] = vy;
            positions_arr[idx * 3 + 2] = vz;

            // UV
            uvs_arr[idx * 2 + 0] = i / THETA_SEGS;
            uvs_arr[idx * 2 + 1] = j / PHI_SEGS;

            // Iridescent color: hue varies with phi (across fiber) + slight theta shift
            const hue = ((phi / (2 * Math.PI)) * 0.72 + (theta / (2 * Math.PI)) * 0.18) % 1.0;
            const saturation = 0.85;
            const lightness = 0.48 + 0.15 * Math.cos(phi);
            tmpColor.setHSL(hue, saturation, lightness);
            colors_arr[idx * 3 + 0] = tmpColor.r;
            colors_arr[idx * 3 + 1] = tmpColor.g;
            colors_arr[idx * 3 + 2] = tmpColor.b;
        }
    }

    // Build index array
    const triCount = THETA_SEGS * PHI_SEGS * 2;
    const indices  = new Uint32Array(triCount * 3);
    let idx = 0;
    for (let i = 0; i < THETA_SEGS; i++) {
        for (let j = 0; j < PHI_SEGS; j++) {
            const a = i * (PHI_SEGS + 1) + j;
            const b = a + 1;
            const c = (i + 1) * (PHI_SEGS + 1) + j;
            const d = c + 1;
            // Two triangles per quad
            indices[idx++] = a;
            indices[idx++] = c;
            indices[idx++] = b;
            indices[idx++] = b;
            indices[idx++] = c;
            indices[idx++] = d;
        }
    }

    const surfGeom = new THREE.BufferGeometry();
    surfGeom.setAttribute('position', new THREE.BufferAttribute(positions_arr, 3));
    surfGeom.setAttribute('color',    new THREE.BufferAttribute(colors_arr, 3));
    surfGeom.setAttribute('uv',       new THREE.BufferAttribute(uvs_arr, 2));
    surfGeom.setIndex(new THREE.BufferAttribute(indices, 1));
    surfGeom.computeVertexNormals();

    // Copy normals into our array for later (not strictly needed)
    const computedNormals = surfGeom.getAttribute('normal');
    for (let i = 0; i < totalVerts; i++) {
        normals_arr[i * 3 + 0] = computedNormals.getX(i);
        normals_arr[i * 3 + 1] = computedNormals.getY(i);
        normals_arr[i * 3 + 2] = computedNormals.getZ(i);
    }

    // Semi-transparent iridescent surface material
    const surfMaterial = new THREE.MeshPhysicalMaterial({
        vertexColors:      true,
        side:              THREE.DoubleSide,
        transparent:       true,
        opacity:           0.62,
        roughness:         0.15,
        metalness:         0.05,
        reflectivity:      0.8,
        iridescence:       1.0,
        iridescenceIOR:    1.5,
        depthWrite:        false,
        blending:          THREE.NormalBlending,
    });

    const surfMesh = new THREE.Mesh(surfGeom, surfMaterial);
    scene.add(surfMesh);

    // ─── Wireframe Overlay ────────────────────────────────────────────────────
    // Use a separate WireframeGeometry for a clean overlay
    const wireGeom = new THREE.WireframeGeometry(surfGeom);
    const wireMat  = new THREE.LineBasicMaterial({
        color:       0xffffff,
        transparent: true,
        opacity:     0.10,
        depthWrite:  false,
        blending:    THREE.AdditiveBlending,
    });
    const wireMesh = new THREE.LineSegments(wireGeom, wireMat);
    scene.add(wireMesh);

    // ─── Star Field ───────────────────────────────────────────────────────────
    const starCount = 2500;
    const starPos   = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        const theta = Math.random() * 2 * Math.PI;
        const phi   = Math.acos(2 * Math.random() - 1);
        const r     = 50 + Math.random() * 100;
        starPos[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
        starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        starPos[i * 3 + 2] = r * Math.cos(phi);
    }
    const starGeom = new THREE.BufferGeometry();
    starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.15,
        transparent: true,
        opacity: 0.55,
        sizeAttenuation: true,
    });
    scene.add(new THREE.Points(starGeom, starMat));

    // ─── Resize ───────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Animation Loop ───────────────────────────────────────────────────────
    let elapsed = 0;
    const clock = new THREE.Clock();

    renderer.setAnimationLoop(() => {
        const dt = clock.getDelta();
        elapsed += dt;

        // Rotate the colored point lights
        pointLightMeshes.forEach((cfg, idx) => {
            const angle = elapsed * cfg.speed + cfg.phase;
            cfg.light.position.set(
                cfg.radius * Math.cos(angle),
                cfg.height + 0.8 * Math.sin(elapsed * 0.4 + idx),
                cfg.radius * Math.sin(angle)
            );
        });

        // Slow global rotation for visual interest beyond OrbitControls auto-rotate
        // (only when user is not interacting)
        if (controls.autoRotate) {
            // subtle surface hue drift via emissive intensity pulse
            const pulse = 0.5 + 0.5 * Math.sin(elapsed * 0.5);
            knotMaterial.emissiveIntensity = 0.6 + 0.4 * pulse;
        }

        controls.update();
        composer.render();
    });
    </script>
</body>
</html>
