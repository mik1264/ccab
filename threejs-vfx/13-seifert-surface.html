<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seifert Surface | Trefoil Knot | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }

        .back-link {
            position: fixed;
            top: 14px;
            left: 14px;
            color: #8A9A5B;
            text-decoration: none;
            z-index: 1000;
            font-size: 0.95rem;
            font-family: 'Nunito', sans-serif;
            background: rgba(0,0,0,0.55);
            padding: 6px 16px;
            border-radius: 20px;
            transition: background 0.2s ease;
            backdrop-filter: blur(6px);
        }
        .back-link:hover { background: rgba(0,0,0,0.85); }

        .title-overlay {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 100;
        }
        .title-overlay h1 {
            font-family: 'Lora', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.08em;
            text-shadow: 0 0 20px rgba(255, 120, 0, 0.7), 0 0 40px rgba(255, 60, 0, 0.4);
            white-space: nowrap;
        }
        .title-overlay p {
            font-family: 'Nunito', sans-serif;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .info-bar {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-family: 'Nunito', sans-serif;
            font-size: 0.8rem;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.05em;
        }

        .legend {
            position: fixed;
            bottom: 50px;
            right: 18px;
            pointer-events: none;
            z-index: 100;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.55);
        }
        .legend-swatch {
            width: 28px;
            height: 4px;
            border-radius: 2px;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <a href="index.html" class="back-link">← Back</a>

    <div class="title-overlay">
        <h1>Seifert Surface</h1>
        <p>Trefoil Knot &nbsp;·&nbsp; Milnor Fiber &nbsp;·&nbsp; Three.js r175</p>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-swatch" style="background: linear-gradient(90deg, #ff4400, #ffaa00);"></div>
            <span>Trefoil Knot</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: linear-gradient(90deg, #00aaff88, #aa00ff88); height: 10px; border-radius: 3px; opacity: 0.8;"></div>
            <span>Seifert Surface (front)</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: linear-gradient(90deg, #ff440066, #ffaa0066); height: 10px; border-radius: 3px; opacity: 0.8;"></div>
            <span>Seifert Surface (back)</span>
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: #ff8800; height: 4px;"></div>
            <span>Trefoil Spine (glowing)</span>
        </div>
    </div>

    <div class="info-bar">Drag to rotate &nbsp;·&nbsp; Scroll to zoom &nbsp;·&nbsp; Right-drag to pan</div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ─── Scene ────────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x02010a);
    scene.fog = new THREE.FogExp2(0x02010a, 0.038);

    // ─── Camera ───────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 300);
    camera.position.set(0, 3.5, 10);
    camera.lookAt(0, 0, 0);

    // ─── Renderer ─────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    // ─── OrbitControls ────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 3;
    controls.maxDistance = 40;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.6;

    // ─── Post-processing ──────────────────────────────────────────────────────
    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.3,   // increased bloom for more dramatic iridescence
        0.55,
        0.25
    );
    composer.addPass(bloomPass);

    const outputPass = new OutputPass();
    composer.addPass(outputPass);

    // ─── Lights ───────────────────────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0x111122, 0.8);
    scene.add(ambientLight);

    const lights = [
        { color: 0xff4400, radius: 6,  speed: 0.7,  phase: 0,            height: 3  },
        { color: 0x0066ff, radius: 7,  speed: 0.5,  phase: Math.PI*2/3,  height: -2 },
        { color: 0xaa00ff, radius: 5,  speed: 0.9,  phase: Math.PI*4/3,  height: 1  },
    ];
    const pointLightMeshes = lights.map(cfg => {
        const light = new THREE.PointLight(cfg.color, 4.5, 22);  // stronger lights
        light.position.set(
            cfg.radius * Math.cos(cfg.phase),
            cfg.height,
            cfg.radius * Math.sin(cfg.phase)
        );
        scene.add(light);
        const sphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.06, 8, 8),
            new THREE.MeshBasicMaterial({ color: cfg.color })
        );
        light.add(sphere);
        return { light, ...cfg };
    });

    // ─── Mathematics ──────────────────────────────────────────────────────────
    function trefoilKnot(t) {
        return new THREE.Vector3(
            Math.sin(t) + 2 * Math.sin(2 * t),
            Math.cos(t) - 2 * Math.cos(2 * t),
            -Math.sin(3 * t)
        );
    }

    function trefoilTangent(t) {
        return new THREE.Vector3(
            Math.cos(t) + 4 * Math.cos(2 * t),
            -Math.sin(t) + 4 * Math.sin(2 * t),
            -3 * Math.cos(3 * t)
        ).normalize();
    }

    function buildBishopFrame(N) {
        const positions = [];
        const tangents = [];
        for (let i = 0; i <= N; i++) {
            const t = (i / N) * 2 * Math.PI;
            positions.push(trefoilKnot(t));
            tangents.push(trefoilTangent(t));
        }

        const t0 = tangents[0];
        let seed = new THREE.Vector3(0, 1, 0);
        if (Math.abs(t0.dot(seed)) > 0.9) seed.set(1, 0, 0);
        let normal = seed.clone().sub(t0.clone().multiplyScalar(t0.dot(seed))).normalize();
        let binormal = new THREE.Vector3().crossVectors(t0, normal).normalize();

        const normals   = [normal.clone()];
        const binormals = [binormal.clone()];

        for (let i = 1; i <= N; i++) {
            const tPrev = tangents[i - 1];
            const tCurr = tangents[i];
            const axis = new THREE.Vector3().crossVectors(tPrev, tCurr);
            const sinA = axis.length();
            const cosA = tPrev.dot(tCurr);
            if (sinA < 1e-8) {
                normals.push(normals[i - 1].clone());
                binormals.push(binormals[i - 1].clone());
            } else {
                axis.normalize();
                const quat = new THREE.Quaternion().setFromAxisAngle(axis, Math.atan2(sinA, cosA));
                const nNew = normals[i - 1].clone().applyQuaternion(quat).normalize();
                const bNew = new THREE.Vector3().crossVectors(tCurr, nNew).normalize();
                normals.push(nNew);
                binormals.push(bNew);
            }
        }
        return { positions, tangents, normals, binormals };
    }

    // ─── Trefoil Knot Tube — glowing spine ───────────────────────────────────
    class TrefoilCurve extends THREE.Curve {
        getPoint(u) {
            return trefoilKnot(u * 2 * Math.PI);
        }
    }

    const knotCurve    = new TrefoilCurve();
    const knotGeometry = new THREE.TubeGeometry(knotCurve, 400, 0.10, 16, true);  // more segments + thicker
    const knotMaterial = new THREE.MeshStandardMaterial({
        color:             0xff6600,
        emissive:          0xff3300,
        emissiveIntensity: 1.2,
        metalness:         0.7,
        roughness:         0.2,
    });
    const knotMesh = new THREE.Mesh(knotGeometry, knotMaterial);
    scene.add(knotMesh);

    // ─── Glowing spine tube (slightly thicker, pulsing emissive) ─────────────
    // Visible through the transparent Seifert surface — rendered as additive glow
    const spineGeo = new THREE.TubeGeometry(knotCurve, 400, 0.18, 16, true);
    const spineMat = new THREE.MeshBasicMaterial({
        color:     0xff8800,
        transparent: true,
        opacity:   0.18,
        blending:  THREE.AdditiveBlending,
        depthWrite: false,
        side:      THREE.DoubleSide,
    });
    const spineMesh = new THREE.Mesh(spineGeo, spineMat);
    scene.add(spineMesh);

    // ─── Seifert Surface ──────────────────────────────────────────────────────
    // Doubled resolution: 560 x 240 (from 280 x 120)
    const THETA_SEGS = 560;
    const PHI_SEGS   = 240;
    const SURF_R     = 2.2;

    const frame = buildBishopFrame(THETA_SEGS);

    const totalVerts     = (THETA_SEGS + 1) * (PHI_SEGS + 1);
    const positions_arr  = new Float32Array(totalVerts * 3);
    const normals_arr    = new Float32Array(totalVerts * 3);
    const uvs_arr        = new Float32Array(totalVerts * 2);
    const colors_front   = new Float32Array(totalVerts * 3);
    const colors_back    = new Float32Array(totalVerts * 3);

    const tmpColor  = new THREE.Color();
    const tmpColorB = new THREE.Color();

    for (let i = 0; i <= THETA_SEGS; i++) {
        const theta = (i / THETA_SEGS) * 2 * Math.PI;
        const P  = frame.positions[i];
        const N  = frame.normals[i];
        const B  = frame.binormals[i];

        for (let j = 0; j <= PHI_SEGS; j++) {
            const phi = (j / PHI_SEGS) * 2 * Math.PI;

            const psi = phi + (3 / 2) * theta;
            const r   = SURF_R * Math.pow(Math.sin(phi * 0.5), 2);

            const cx = Math.cos(psi);
            const sx = Math.sin(psi);

            const vx = P.x + r * (cx * N.x + sx * B.x);
            const vy = P.y + r * (cx * N.y + sx * B.y);
            const vz = P.z + r * (cx * N.z + sx * B.z);

            const idx = i * (PHI_SEGS + 1) + j;
            positions_arr[idx * 3 + 0] = vx;
            positions_arr[idx * 3 + 1] = vy;
            positions_arr[idx * 3 + 2] = vz;

            uvs_arr[idx * 2 + 0] = i / THETA_SEGS;
            uvs_arr[idx * 2 + 1] = j / PHI_SEGS;

            // Front face: dramatic iridescence — wide hue sweep
            const hue = ((phi / (2 * Math.PI)) * 0.85 + (theta / (2 * Math.PI)) * 0.20) % 1.0;
            const saturation = 0.95;
            const lightness  = 0.42 + 0.20 * Math.cos(phi);
            tmpColor.setHSL(hue, saturation, lightness);
            colors_front[idx * 3 + 0] = tmpColor.r;
            colors_front[idx * 3 + 1] = tmpColor.g;
            colors_front[idx * 3 + 2] = tmpColor.b;

            // Back face: shifted hue for double-sided differentiation (warm orange-red)
            const hueB = ((phi / (2 * Math.PI)) * 0.5 + 0.55 + (theta / (2 * Math.PI)) * 0.12) % 1.0;
            tmpColorB.setHSL(hueB, 0.9, 0.35 + 0.18 * Math.cos(phi));
            colors_back[idx * 3 + 0] = tmpColorB.r;
            colors_back[idx * 3 + 1] = tmpColorB.g;
            colors_back[idx * 3 + 2] = tmpColorB.b;
        }
    }

    const triCount = THETA_SEGS * PHI_SEGS * 2;
    const indices  = new Uint32Array(triCount * 3);
    let   iptr     = 0;
    for (let i = 0; i < THETA_SEGS; i++) {
        for (let j = 0; j < PHI_SEGS; j++) {
            const a = i * (PHI_SEGS + 1) + j;
            const b = a + 1;
            const c = (i + 1) * (PHI_SEGS + 1) + j;
            const d = c + 1;
            indices[iptr++] = a;
            indices[iptr++] = c;
            indices[iptr++] = b;
            indices[iptr++] = b;
            indices[iptr++] = c;
            indices[iptr++] = d;
        }
    }

    // Front geometry
    const surfGeomFront = new THREE.BufferGeometry();
    surfGeomFront.setAttribute('position', new THREE.BufferAttribute(positions_arr.slice(), 3));
    surfGeomFront.setAttribute('color',    new THREE.BufferAttribute(colors_front, 3));
    surfGeomFront.setAttribute('uv',       new THREE.BufferAttribute(uvs_arr.slice(), 2));
    surfGeomFront.setIndex(new THREE.BufferAttribute(indices, 1));
    surfGeomFront.computeVertexNormals();

    // Back geometry — same positions, different colors
    const surfGeomBack = new THREE.BufferGeometry();
    surfGeomBack.setAttribute('position', new THREE.BufferAttribute(positions_arr, 3));
    surfGeomBack.setAttribute('color',    new THREE.BufferAttribute(colors_back, 3));
    surfGeomBack.setAttribute('uv',       new THREE.BufferAttribute(uvs_arr, 2));
    surfGeomBack.setIndex(new THREE.BufferAttribute(indices.slice(), 1));
    surfGeomBack.computeVertexNormals();

    // Front face material (FrontSide, cool iridescent blue/purple)
    const surfMaterialFront = new THREE.MeshPhysicalMaterial({
        vertexColors:      true,
        side:              THREE.FrontSide,
        transparent:       true,
        opacity:           0.68,
        roughness:         0.10,
        metalness:         0.05,
        reflectivity:      0.9,
        iridescence:       1.0,
        iridescenceIOR:    1.8,
        depthWrite:        false,
        blending:          THREE.NormalBlending,
    });

    // Back face material (BackSide, warm orange-red tint)
    const surfMaterialBack = new THREE.MeshPhysicalMaterial({
        vertexColors:      true,
        side:              THREE.BackSide,
        transparent:       true,
        opacity:           0.52,
        roughness:         0.25,
        metalness:         0.02,
        reflectivity:      0.6,
        iridescence:       0.7,
        iridescenceIOR:    1.5,
        depthWrite:        false,
        blending:          THREE.NormalBlending,
    });

    const surfMeshFront = new THREE.Mesh(surfGeomFront, surfMaterialFront);
    const surfMeshBack  = new THREE.Mesh(surfGeomBack,  surfMaterialBack);
    scene.add(surfMeshFront);
    scene.add(surfMeshBack);

    // ─── Wireframe Overlay ────────────────────────────────────────────────────
    const wireGeom = new THREE.WireframeGeometry(surfGeomFront);
    const wireMat  = new THREE.LineBasicMaterial({
        color:       0xffffff,
        transparent: true,
        opacity:     0.06,
        depthWrite:  false,
        blending:    THREE.AdditiveBlending,
    });
    const wireMesh = new THREE.LineSegments(wireGeom, wireMat);
    scene.add(wireMesh);

    // ─── Fiber flow particles along surface ──────────────────────────────────
    // Small arrow-like particles flowing in the fiber bundle direction
    const FIBER_COUNT = 600;
    const fiberPos    = new Float32Array(FIBER_COUNT * 3);
    const fiberUV     = new Float32Array(FIBER_COUNT * 2);
    const fiberPhase  = new Float32Array(FIBER_COUNT);

    for (let i = 0; i < FIBER_COUNT; i++) {
        fiberUV[i*2]   = Math.random();
        fiberUV[i*2+1] = Math.random();
        fiberPhase[i]  = Math.random() * Math.PI * 2;
    }

    const fiberGeo = new THREE.BufferGeometry();
    fiberGeo.setAttribute('position', new THREE.BufferAttribute(fiberPos, 3));
    fiberGeo.attributes.position.usage = THREE.DynamicDrawUsage;
    const fiberMat = new THREE.PointsMaterial({
        color:           0xffcc44,
        size:            0.09,
        sizeAttenuation: true,
        transparent:     true,
        opacity:         0.8,
        depthWrite:      false,
        blending:        THREE.AdditiveBlending,
    });
    scene.add(new THREE.Points(fiberGeo, fiberMat));

    function updateFibers(t) {
        for (let i = 0; i < FIBER_COUNT; i++) {
            // Advance along phi (fiber direction)
            fiberUV[i*2+1] += 0.003;
            if (fiberUV[i*2+1] > 1.0) fiberUV[i*2+1] -= 1.0;

            const theta = fiberUV[i*2] * 2 * Math.PI;
            const phi   = fiberUV[i*2+1] * 2 * Math.PI;

            const P = frame.positions[Math.floor(fiberUV[i*2] * THETA_SEGS)];
            const N = frame.normals[Math.floor(fiberUV[i*2] * THETA_SEGS)];
            const B = frame.binormals[Math.floor(fiberUV[i*2] * THETA_SEGS)];

            const psi = phi + (3 / 2) * theta;
            const r   = SURF_R * 0.6 * Math.pow(Math.sin(phi * 0.5), 2);

            fiberPos[i*3]   = P.x + r * (Math.cos(psi) * N.x + Math.sin(psi) * B.x);
            fiberPos[i*3+1] = P.y + r * (Math.cos(psi) * N.y + Math.sin(psi) * B.y);
            fiberPos[i*3+2] = P.z + r * (Math.cos(psi) * N.z + Math.sin(psi) * B.z);
        }
        fiberGeo.attributes.position.needsUpdate = true;
    }

    // ─── Star Field ───────────────────────────────────────────────────────────
    const starCount = 3500;
    const starPos   = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        const theta = Math.random() * 2 * Math.PI;
        const phi   = Math.acos(2 * Math.random() - 1);
        const r     = 60 + Math.random() * 100;
        starPos[i * 3 + 0] = r * Math.sin(phi) * Math.cos(theta);
        starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        starPos[i * 3 + 2] = r * Math.cos(phi);
    }
    const starGeom = new THREE.BufferGeometry();
    starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.18,
        transparent: true,
        opacity: 0.65,
        sizeAttenuation: true,
    });
    scene.add(new THREE.Points(starGeom, starMat));

    // ─── Resize ───────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Animation Loop ───────────────────────────────────────────────────────
    let elapsed = 0;
    const clock = new THREE.Clock();

    renderer.setAnimationLoop(() => {
        const dt = clock.getDelta();
        elapsed += dt;

        // Rotate the colored point lights
        pointLightMeshes.forEach((cfg, idx) => {
            const angle = elapsed * cfg.speed + cfg.phase;
            cfg.light.position.set(
                cfg.radius * Math.cos(angle),
                cfg.height + 0.8 * Math.sin(elapsed * 0.4 + idx),
                cfg.radius * Math.sin(angle)
            );
        });

        // Knot pulsing emissive glow
        if (controls.autoRotate) {
            const pulse = 0.5 + 0.5 * Math.sin(elapsed * 0.5);
            knotMaterial.emissiveIntensity = 0.8 + 0.5 * pulse;

            // Spine glow pulses with a slower beat
            spineMat.opacity = 0.12 + 0.10 * Math.sin(elapsed * 0.3);
        }

        // Fiber flow
        updateFibers(elapsed);

        controls.update();
        composer.render();
    });
    </script>
</body>
</html>
