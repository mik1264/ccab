<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon City Reflections | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }

        .back-link {
            position: fixed;
            top: 14px;
            left: 14px;
            color: #8A9A5B;
            text-decoration: none;
            z-index: 1000;
            font-size: 0.95rem;
            font-family: sans-serif;
            background: rgba(0,0,0,0.6);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            transition: background 0.2s ease;
            border: 1px solid rgba(138,154,91,0.25);
        }
        .back-link:hover { background: rgba(0,0,0,0.85); }

        .info {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.38);
            font-family: sans-serif;
            font-size: 0.8rem;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.04em;
        }

        .stats {
            position: fixed;
            top: 14px;
            right: 14px;
            color: rgba(255,255,255,0.38);
            font-family: monospace;
            font-size: 0.72rem;
            text-align: right;
            line-height: 1.7;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back</a>
    <div class="info">Drag to orbit &nbsp;&middot;&nbsp; Scroll to zoom &nbsp;&middot;&nbsp; Right-drag to pan</div>
    <div class="stats" id="stats">200 buildings &nbsp;|&nbsp; 6 000 rain drops &nbsp;|&nbsp; UnrealBloom &nbsp;|&nbsp; Three.js r175</div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

    // ─── Renderer ─────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
    renderer.toneMapping          = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure  = 0.9;
    document.body.appendChild(renderer.domElement);

    // ─── Scene ────────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020008);
    scene.fog = new THREE.FogExp2(0x020008, 0.022);

    // ─── Camera ───────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 300);
    // Street-level, slightly above ground, looking along the city
    camera.position.set(0, 2.2, 22);
    camera.lookAt(0, 3, 0);

    // ─── Controls ─────────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping  = true;
    controls.dampingFactor  = 0.06;
    controls.minDistance    = 2;
    controls.maxDistance    = 80;
    controls.maxPolarAngle  = Math.PI / 2 + 0.05; // let it peek just below horizon
    controls.target.set(0, 3, 0);

    // ─── Post-processing ──────────────────────────────────────────────────────
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.5,   // strength
        0.3,   // radius
        0.3    // threshold
    );
    composer.addPass(bloomPass);
    composer.addPass(new OutputPass());

    // ─── Palette ──────────────────────────────────────────────────────────────
    const neonPalette = [
        0xff0080,  // hot pink
        0x00ffff,  // cyan
        0xff6600,  // orange
        0x9900ff,  // violet
        0x00ff44,  // lime
        0xff2200,  // red
        0x0088ff,  // sky blue
        0xffee00,  // yellow
    ];

    function randNeon() {
        return neonPalette[Math.floor(Math.random() * neonPalette.length)];
    }

    // ─── Ambient / Hemisphere lights ──────────────────────────────────────────
    const hemi = new THREE.HemisphereLight(0x110033, 0x000011, 0.4);
    scene.add(hemi);

    // Subtle ambient so dark building faces aren't pure black
    const ambient = new THREE.AmbientLight(0x080015, 0.6);
    scene.add(ambient);

    // ─── Buildings (InstancedMesh) ─────────────────────────────────────────────
    const COUNT = 200;
    const buildingGeo = new THREE.BoxGeometry(1, 1, 1);
    const buildingMat = new THREE.MeshStandardMaterial({
        color:     0x0a0a18,
        roughness: 0.85,
        metalness: 0.25,
    });

    const buildings = new THREE.InstancedMesh(buildingGeo, buildingMat, COUNT);
    buildings.castShadow    = true;
    buildings.receiveShadow = true;
    scene.add(buildings);

    // We also want some buildings to have a subtly tinted facade.
    // InstancedMesh supports per-instance color.
    const matrix    = new THREE.Matrix4();
    const tmpColor  = new THREE.Color();
    const buildingData = []; // store {x, z, height, width, depth} for later use

    for (let i = 0; i < COUNT; i++) {
        // Scatter buildings in a ring so the camera centre stays clear
        const angle  = Math.random() * Math.PI * 2;
        const dist   = 4 + Math.random() * 22;       // 4…26 units from centre
        const x      = Math.cos(angle) * dist;
        const z      = Math.sin(angle) * dist;
        const height = 1.5 + Math.random() * 14;
        const w      = 0.8 + Math.random() * 2.2;
        const d      = 0.8 + Math.random() * 2.2;

        matrix.identity();
        matrix.makeScale(w, height, d);
        // translate so building base sits on y=0
        const t = new THREE.Matrix4().makeTranslation(x, height / 2, z);
        matrix.premultiply(t);
        buildings.setMatrixAt(i, matrix);

        // Slight colour tint – very dark blues / purples
        const tint = Math.random();
        tmpColor.setRGB(0.03 + tint * 0.02, 0.03 + tint * 0.02, 0.06 + tint * 0.05);
        buildings.setColorAt(i, tmpColor);

        buildingData.push({ x, z, height, w, d });
    }
    buildings.instanceMatrix.needsUpdate = true;
    buildings.instanceColor.needsUpdate  = true;

    // ─── Window emissive quads ─────────────────────────────────────────────────
    // Place glowing window rectangles on building facades
    const windowGroup = new THREE.Group();
    scene.add(windowGroup);

    const windowGeo = new THREE.PlaneGeometry(1, 1);

    buildingData.forEach(({ x, z, height, w, d }) => {
        const cols  = Math.max(1, Math.floor(w * 2));
        const rows  = Math.max(2, Math.floor(height * 1.2));
        const color = randNeon();
        const winMat = new THREE.MeshStandardMaterial({
            color,
            emissive:          new THREE.Color(color),
            emissiveIntensity: 2.5 + Math.random() * 2,
            side: THREE.DoubleSide,
        });

        const winW  = w / (cols + 1) * 0.55;
        const winH  = height / (rows + 1) * 0.45;

        // pick a face (front / back / left / right)
        const faces = [
            { nx: 0, nz: 1,  ox: x,     oz: z + d / 2 + 0.01, spanW: w, spanH: height, rotY: 0 },
            { nx: 0, nz: -1, ox: x,     oz: z - d / 2 - 0.01, spanW: w, spanH: height, rotY: Math.PI },
            { nx: 1, nz: 0,  ox: x + w / 2 + 0.01, oz: z,    spanW: d, spanH: height, rotY: -Math.PI / 2 },
            { nx: -1, nz: 0, ox: x - w / 2 - 0.01, oz: z,    spanW: d, spanH: height, rotY:  Math.PI / 2 },
        ];

        // Only put windows on 1–2 faces to keep draw calls reasonable
        const numFaces = 1 + Math.floor(Math.random() * 2);
        for (let f = 0; f < numFaces; f++) {
            const face  = faces[f];
            const fCols = Math.max(1, Math.floor(face.spanW * 1.8));
            const fRows = Math.max(2, Math.floor(face.spanH * 0.9));
            const fWinW = face.spanW / (fCols + 1) * 0.5;
            const fWinH = face.spanH / (fRows + 1) * 0.4;

            for (let r = 0; r < fRows; r++) {
                for (let c = 0; c < fCols; c++) {
                    // randomly skip some windows (dark offices)
                    if (Math.random() < 0.35) continue;

                    const mesh = new THREE.Mesh(windowGeo, winMat);
                    mesh.scale.set(fWinW, fWinH, 1);

                    // position within the face
                    const localX = -face.spanW / 2 + (c + 1) * face.spanW / (fCols + 1);
                    const localY = (r + 1) * face.spanH / (fRows + 1);  // from ground

                    if (face.rotY === 0 || face.rotY === Math.PI) {
                        mesh.position.set(face.ox + localX, localY, face.oz);
                    } else {
                        mesh.position.set(face.ox, localY, face.oz + localX);
                    }
                    mesh.rotation.y = face.rotY;
                    windowGroup.add(mesh);
                }
            }
        }
    });

    // ─── Neon signs (large emissive planes) ───────────────────────────────────
    const signGroup = new THREE.Group();
    scene.add(signGroup);

    for (let i = 0; i < 50; i++) {
        const color = randNeon();
        const w     = 0.6 + Math.random() * 1.4;
        const h     = 0.2 + Math.random() * 0.5;
        const signGeo = new THREE.PlaneGeometry(w, h);
        const signMat = new THREE.MeshStandardMaterial({
            color,
            emissive:          new THREE.Color(color),
            emissiveIntensity: 4 + Math.random() * 3,
            side: THREE.DoubleSide,
        });
        const sign = new THREE.Mesh(signGeo, signMat);
        const angle = Math.random() * Math.PI * 2;
        const dist  = 3 + Math.random() * 18;
        sign.position.set(
            Math.cos(angle) * dist,
            1.5 + Math.random() * 10,
            Math.sin(angle) * dist
        );
        sign.rotation.y = Math.random() * Math.PI;
        signGroup.add(sign);
    }

    // ─── Neon vertical tubes / pipes ──────────────────────────────────────────
    const tubeGroup = new THREE.Group();
    scene.add(tubeGroup);

    for (let i = 0; i < 40; i++) {
        const color   = neonPalette[i % neonPalette.length];
        const tubeLen = 0.5 + Math.random() * 3.5;
        const tubeMat = new THREE.MeshStandardMaterial({
            color,
            emissive:          new THREE.Color(color),
            emissiveIntensity: 5,
        });
        const tubeGeo  = new THREE.CylinderGeometry(0.025, 0.025, tubeLen, 8);
        const tube     = new THREE.Mesh(tubeGeo, tubeMat);
        const angle    = Math.random() * Math.PI * 2;
        const dist     = 2 + Math.random() * 20;
        tube.position.set(
            Math.cos(angle) * dist,
            tubeLen / 2 + 0.01,
            Math.sin(angle) * dist
        );
        // some are horizontal, most vertical
        if (Math.random() < 0.3) {
            tube.rotation.z = Math.PI / 2 + (Math.random() - 0.5) * 0.5;
            tube.position.y = 0.5 + Math.random() * 5;
        }
        tubeGroup.add(tube);
    }

    // ─── Coloured point lights matching neon signs ────────────────────────────
    const lightColors = [0xff0080, 0x00ffff, 0xff6600, 0x9900ff, 0x00ff44, 0xff2200, 0x0088ff];

    lightColors.forEach((col, idx) => {
        const angle = (idx / lightColors.length) * Math.PI * 2;
        const dist  = 6 + Math.random() * 12;
        const light = new THREE.PointLight(col, 40, 25, 2);
        light.position.set(
            Math.cos(angle) * dist,
            1.5 + Math.random() * 5,
            Math.sin(angle) * dist
        );
        scene.add(light);
    });

    // A few additional moving accent lights added during animation

    // ─── Reflective wet floor ─────────────────────────────────────────────────
    const floorGeo = new THREE.PlaneGeometry(120, 120, 1, 1);
    const floorMat = new THREE.MeshStandardMaterial({
        color:            0x0b0b1e,
        metalness:        0.95,
        roughness:        0.08,
        envMapIntensity:  2.0,
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Puddle-like irregular glossy patches
    for (let i = 0; i < 20; i++) {
        const pR    = 0.5 + Math.random() * 2;
        const pudGeo = new THREE.CircleGeometry(pR, 16);
        const pudMat = new THREE.MeshStandardMaterial({
            color:     randNeon(),
            metalness: 1.0,
            roughness: 0.0,
            opacity:   0.18 + Math.random() * 0.12,
            transparent: true,
        });
        const pud = new THREE.Mesh(pudGeo, pudMat);
        pud.rotation.x = -Math.PI / 2;
        pud.position.set(
            (Math.random() - 0.5) * 40,
            0.001,
            (Math.random() - 0.5) * 40
        );
        scene.add(pud);
    }

    // ─── Road markings ────────────────────────────────────────────────────────
    // Dashed centre line along Z axis
    const dashMat = new THREE.MeshStandardMaterial({
        color:            0xffdd00,
        emissive:         new THREE.Color(0xffdd00),
        emissiveIntensity: 0.8,
    });
    for (let i = -10; i <= 10; i++) {
        if (Math.abs(i) % 2 === 0) continue;
        const dashGeo = new THREE.PlaneGeometry(0.12, 0.9);
        const dash    = new THREE.Mesh(dashGeo, dashMat);
        dash.rotation.x = -Math.PI / 2;
        dash.position.set(0, 0.002, i * 1.3);
        scene.add(dash);
    }

    // ─── Rain particles ───────────────────────────────────────────────────────
    const RAIN_COUNT = 6000;
    const rainPositions  = new Float32Array(RAIN_COUNT * 3);
    const rainVelocities = new Float32Array(RAIN_COUNT); // y-speed per drop

    for (let i = 0; i < RAIN_COUNT; i++) {
        rainPositions[i * 3]     = (Math.random() - 0.5) * 70;
        rainPositions[i * 3 + 1] = Math.random() * 25;
        rainPositions[i * 3 + 2] = (Math.random() - 0.5) * 70;
        rainVelocities[i]        = 0.12 + Math.random() * 0.18;
    }

    const rainGeo = new THREE.BufferGeometry();
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));

    // Custom shader material for rain streaks – thin vertical lines
    const rainMat = new THREE.ShaderMaterial({
        uniforms: {
            uColor:   { value: new THREE.Color(0x88ccff) },
            uOpacity: { value: 0.35 },
        },
        vertexShader: `
            void main() {
                vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = 1.5;
                gl_Position  = projectionMatrix * mvPos;
            }
        `,
        fragmentShader: `
            uniform vec3  uColor;
            uniform float uOpacity;
            void main() {
                gl_FragColor = vec4(uColor, uOpacity);
            }
        `,
        transparent: true,
        depthWrite:  false,
    });

    const rain = new THREE.Points(rainGeo, rainMat);
    scene.add(rain);

    // ─── Thin streaks geometry (line segments, one per drop) ──────────────────
    // Each drop: two vertices – top and bottom of a short streak
    const streakPositions = new Float32Array(RAIN_COUNT * 6); // 2 verts * 3
    const streakGeo = new THREE.BufferGeometry();
    streakGeo.setAttribute('position', new THREE.BufferAttribute(streakPositions, 3));

    const streakMat = new THREE.LineBasicMaterial({
        color:       0x99ccff,
        transparent: true,
        opacity:     0.22,
        depthWrite:  false,
    });
    const streaks = new THREE.LineSegments(streakGeo, streakMat);
    scene.add(streaks);

    // ─── Moving accent lights (hover above city) ───────────────────────────────
    // Simulates a couple of slow-moving cop-car style sweeping lights
    const accentLights = [];
    [0xff0044, 0x00aaff].forEach((col, i) => {
        const l = new THREE.PointLight(col, 60, 30, 2);
        l.position.set(0, 1.5, 0);
        scene.add(l);
        accentLights.push({ light: l, phase: i * Math.PI });
    });

    // ─── Stars in the distance ────────────────────────────────────────────────
    const starCount = 800;
    const starPos   = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        // place on a large sphere above the city
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.random() * Math.PI * 0.45; // upper hemisphere only
        const r     = 150;
        starPos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
        starPos[i * 3 + 1] = r * Math.cos(phi) + 10;
        starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starMat = new THREE.PointsMaterial({
        color: 0xaaaacc,
        size:  0.5,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.7,
    });
    scene.add(new THREE.Points(starGeo, starMat));

    // ─── Utility: random uniform ───────────────────────────────────────────────
    function rng(min, max) { return min + Math.random() * (max - min); }

    // ─── Window flicker animation data ────────────────────────────────────────
    // Each window mesh has a base emissiveIntensity; occasionally flicker
    const windowMeshes = windowGroup.children;
    const windowFlicker = windowMeshes.map(m => ({
        base:  m.material.emissiveIntensity,
        timer: rng(0, 10),
        interval: rng(2, 12),
    }));

    // ─── Animate ─────────────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    let   frameCount = 0;
    const posAttr     = rainGeo.attributes.position;
    const streakAttr  = streakGeo.attributes.position;

    renderer.setAnimationLoop(() => {
        const elapsed = clock.getElapsedTime();
        frameCount++;

        // ── Rain update ──────────────────────────────────────────────────────
        for (let i = 0; i < RAIN_COUNT; i++) {
            posAttr.array[i * 3 + 1] -= rainVelocities[i];

            if (posAttr.array[i * 3 + 1] < 0) {
                posAttr.array[i * 3 + 1]  = 22 + Math.random() * 5;
                posAttr.array[i * 3]      = (Math.random() - 0.5) * 70;
                posAttr.array[i * 3 + 2]  = (Math.random() - 0.5) * 70;
            }

            // Update streak: top = current pos, bottom = 0.35 units below
            const sy = posAttr.array[i * 3 + 1];
            const sx = posAttr.array[i * 3];
            const sz = posAttr.array[i * 3 + 2];

            streakAttr.array[i * 6]     = sx;
            streakAttr.array[i * 6 + 1] = sy;
            streakAttr.array[i * 6 + 2] = sz;
            streakAttr.array[i * 6 + 3] = sx;
            streakAttr.array[i * 6 + 4] = sy - 0.35;
            streakAttr.array[i * 6 + 5] = sz;
        }
        posAttr.needsUpdate    = true;
        streakAttr.needsUpdate = true;

        // ── Accent lights orbit ───────────────────────────────────────────────
        accentLights.forEach(({ light, phase }) => {
            const t = elapsed * 0.4 + phase;
            light.position.set(
                Math.cos(t) * 12,
                1.2 + Math.sin(elapsed * 0.7 + phase) * 0.8,
                Math.sin(t) * 12
            );
        });

        // ── Window flicker ─────────────────────────────────────────────────────
        // Only update a small subset per frame to avoid CPU stall
        const batchSize = 30;
        const start     = windowMeshes.length > 0 ? (frameCount * batchSize) % windowMeshes.length : 0;
        for (let i = start; i < Math.min(start + batchSize, windowMeshes.length); i++) {
            const d = windowFlicker[i];
            d.timer += 0.016;
            if (d.timer > d.interval) {
                d.timer    = 0;
                d.interval = rng(2, 14);
                // brief flicker: dim then restore
                windowMeshes[i].material.emissiveIntensity = d.base * rng(0.1, 0.5);
                setTimeout(() => {
                    if (windowMeshes[i]) {
                        windowMeshes[i].material.emissiveIntensity = d.base;
                    }
                }, rng(40, 200));
            }
        }

        // ── Signs slowly pulse ────────────────────────────────────────────────
        signGroup.children.forEach((sign, idx) => {
            const base = 5.5;
            sign.material.emissiveIntensity = base + Math.sin(elapsed * 1.2 + idx * 0.8) * 1.5;
        });

        // ── Controls / camera ─────────────────────────────────────────────────
        controls.update();

        composer.render();
    });

    // ─── Resize handler ───────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
        bloomPass.resolution.set(window.innerWidth, window.innerHeight);
    });

    </script>
</body>
</html>
