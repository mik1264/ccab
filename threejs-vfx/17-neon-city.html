<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon City Reflections | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }

        .back-link {
            position: fixed;
            top: 14px;
            left: 14px;
            color: #8A9A5B;
            text-decoration: none;
            z-index: 1000;
            font-size: 0.95rem;
            font-family: sans-serif;
            background: rgba(0,0,0,0.6);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            transition: background 0.2s ease;
            border: 1px solid rgba(138,154,91,0.25);
        }
        .back-link:hover { background: rgba(0,0,0,0.85); }

        .info {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.38);
            font-family: sans-serif;
            font-size: 0.8rem;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 0.04em;
        }

        .stats {
            position: fixed;
            top: 14px;
            right: 14px;
            color: rgba(255,255,255,0.38);
            font-family: monospace;
            font-size: 0.72rem;
            text-align: right;
            line-height: 1.7;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back</a>
    <div class="info">Drag to orbit &nbsp;&middot;&nbsp; Scroll to zoom &nbsp;&middot;&nbsp; Right-drag to pan</div>
    <div class="stats" id="stats">200 buildings &nbsp;|&nbsp; 6 000 rain drops &nbsp;|&nbsp; 20 vehicles &nbsp;|&nbsp; UnrealBloom &nbsp;|&nbsp; Three.js r175</div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

    // ─── Renderer ─────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
    renderer.toneMapping          = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure  = 0.9;
    document.body.appendChild(renderer.domElement);

    // ─── Scene ────────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020008);
    // Exponential distance fog with blue-purple gradient (near=blue-purple, far=dark)
    scene.fog = new THREE.FogExp2(0x050012, 0.018);

    // ─── Camera ───────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 2.2, 22);
    camera.lookAt(0, 3, 0);

    // ─── Controls ─────────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping  = true;
    controls.dampingFactor  = 0.06;
    controls.minDistance    = 2;
    controls.maxDistance    = 80;
    controls.maxPolarAngle  = Math.PI / 2 + 0.05;
    controls.target.set(0, 3, 0);

    // ─── Post-processing ──────────────────────────────────────────────────────
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.5,   // strength
        0.3,   // radius
        0.3    // threshold
    );
    composer.addPass(bloomPass);
    composer.addPass(new OutputPass());

    // ─── Palette ──────────────────────────────────────────────────────────────
    const neonPalette = [
        0xff0080,  // hot pink
        0x00ffff,  // cyan
        0xff6600,  // orange
        0x9900ff,  // violet
        0x00ff44,  // lime
        0xff2200,  // red
        0x0088ff,  // sky blue
        0xffee00,  // yellow
    ];

    function randNeon() {
        return neonPalette[Math.floor(Math.random() * neonPalette.length)];
    }

    // ─── Ambient / Hemisphere lights ──────────────────────────────────────────
    const hemi = new THREE.HemisphereLight(0x110033, 0x000011, 0.4);
    scene.add(hemi);
    const ambient = new THREE.AmbientLight(0x080015, 0.6);
    scene.add(ambient);

    // ─── Buildings with window texture shader ─────────────────────────────────
    // Each building uses a custom ShaderMaterial so the fragment shader can draw
    // a grid of lit/unlit windows procedurally.

    const windowVertShader = /* glsl */`
        varying vec2 vUv;
        varying vec3 vWorldNormal;
        void main() {
            vUv = uv;
            vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `;

    // Simple hash for per-window randomness (no texture needed)
    const windowFragShader = /* glsl */`
        varying vec2 vUv;
        varying vec3 vWorldNormal;
        uniform vec3  uBuildingColor;
        uniform vec3  uWindowColor;
        uniform float uEmissive;
        uniform float uWindowDensity; // fraction of lit windows [0..1]
        uniform float uCols;          // window columns
        uniform float uRows;          // window rows

        float hash21(vec2 p) {
            p = fract(p * vec2(234.34, 435.345));
            p += dot(p, p + 34.23);
            return fract(p.x * p.y);
        }

        void main() {
            // Window grid
            vec2 cell = floor(vUv * vec2(uCols, uRows));
            vec2 local = fract(vUv * vec2(uCols, uRows));

            // Window border (margin)
            float border = 0.12;
            float inWindow = step(border, local.x) * step(border, local.y)
                           * step(local.x, 1.0 - border) * step(local.y, 1.0 - border);

            float litRand = hash21(cell + vec2(17.3, 41.7));
            float lit = step(1.0 - uWindowDensity, litRand) * inWindow;

            // Building base color with very subtle normal-based shading
            float ndotUp = max(0.0, dot(vWorldNormal, vec3(0.0, 1.0, 0.0)));
            vec3 base = uBuildingColor * (0.8 + 0.2 * ndotUp);

            // Window color (emissive when lit)
            vec3 winEmit = uWindowColor * uEmissive * lit;
            vec3 color   = base + winEmit;

            gl_FragColor = vec4(color, 1.0);
        }
    `;

    const COUNT = 200;
    const buildingData = [];
    const matrix    = new THREE.Matrix4();
    const tmpColor  = new THREE.Color();

    // We build individual meshes per building so each gets its own shader instance
    // (instancing + per-instance shader uniforms isn't trivial; individual meshes
    // allow easy per-building window colors and densities).
    // To keep draw calls manageable we use a shared geometry per building.
    const buildingGeo = new THREE.BoxGeometry(1, 1, 1);

    for (let i = 0; i < COUNT; i++) {
        const angle  = Math.random() * Math.PI * 2;
        const dist   = 4 + Math.random() * 22;
        const x      = Math.cos(angle) * dist;
        const z      = Math.sin(angle) * dist;
        const height = 1.5 + Math.random() * 14;
        const w      = 0.8 + Math.random() * 2.2;
        const d      = 0.8 + Math.random() * 2.2;

        const winColor = new THREE.Color(randNeon());
        const cols = Math.max(2, Math.round(w * 3));
        const rows = Math.max(3, Math.round(height * 1.5));
        const density = 0.3 + Math.random() * 0.55;

        const tint = Math.random();
        const buildColor = new THREE.Color(
            0.03 + tint * 0.02,
            0.03 + tint * 0.02,
            0.06 + tint * 0.05
        );

        const mat = new THREE.ShaderMaterial({
            vertexShader: windowVertShader,
            fragmentShader: windowFragShader,
            uniforms: {
                uBuildingColor:  { value: buildColor },
                uWindowColor:    { value: winColor },
                uEmissive:       { value: 2.0 + Math.random() * 2.0 },
                uWindowDensity:  { value: density },
                uCols:           { value: cols },
                uRows:           { value: rows },
            }
        });

        const mesh = new THREE.Mesh(buildingGeo, mat);
        mesh.scale.set(w, height, d);
        mesh.position.set(x, height / 2, z);
        mesh.castShadow    = true;
        mesh.receiveShadow = true;
        scene.add(mesh);

        buildingData.push({ x, z, height, w, d, mat });
    }

    // ─── Neon signs (large emissive planes) ───────────────────────────────────
    const signGroup = new THREE.Group();
    scene.add(signGroup);

    for (let i = 0; i < 50; i++) {
        const color = randNeon();
        const w     = 0.6 + Math.random() * 1.4;
        const h     = 0.2 + Math.random() * 0.5;
        const signGeo = new THREE.PlaneGeometry(w, h);
        const signMat = new THREE.MeshStandardMaterial({
            color,
            emissive:          new THREE.Color(color),
            emissiveIntensity: 4 + Math.random() * 3,
            side: THREE.DoubleSide,
        });
        const sign = new THREE.Mesh(signGeo, signMat);
        const angle = Math.random() * Math.PI * 2;
        const dist  = 3 + Math.random() * 18;
        sign.position.set(
            Math.cos(angle) * dist,
            1.5 + Math.random() * 10,
            Math.sin(angle) * dist
        );
        sign.rotation.y = Math.random() * Math.PI;
        signGroup.add(sign);

        // Point light near sign for lens-flare style local glow
        if (Math.random() < 0.4) {
            const signLight = new THREE.PointLight(color, 20, 10, 2);
            signLight.position.copy(sign.position);
            signLight.position.y += 0.3;
            scene.add(signLight);
        }
    }

    // ─── Neon vertical tubes / pipes ──────────────────────────────────────────
    const tubeGroup = new THREE.Group();
    scene.add(tubeGroup);

    for (let i = 0; i < 40; i++) {
        const color   = neonPalette[i % neonPalette.length];
        const tubeLen = 0.5 + Math.random() * 3.5;
        const tubeMat = new THREE.MeshStandardMaterial({
            color,
            emissive:          new THREE.Color(color),
            emissiveIntensity: 5,
        });
        const tubeGeo  = new THREE.CylinderGeometry(0.025, 0.025, tubeLen, 8);
        const tube     = new THREE.Mesh(tubeGeo, tubeMat);
        const angle    = Math.random() * Math.PI * 2;
        const dist     = 2 + Math.random() * 20;
        tube.position.set(
            Math.cos(angle) * dist,
            tubeLen / 2 + 0.01,
            Math.sin(angle) * dist
        );
        if (Math.random() < 0.3) {
            tube.rotation.z = Math.PI / 2 + (Math.random() - 0.5) * 0.5;
            tube.position.y = 0.5 + Math.random() * 5;
        }
        tubeGroup.add(tube);
    }

    // ─── Coloured point lights ────────────────────────────────────────────────
    const lightColors = [0xff0080, 0x00ffff, 0xff6600, 0x9900ff, 0x00ff44, 0xff2200, 0x0088ff];

    lightColors.forEach((col, idx) => {
        const angle = (idx / lightColors.length) * Math.PI * 2;
        const dist  = 6 + Math.random() * 12;
        const light = new THREE.PointLight(col, 40, 25, 2);
        light.position.set(
            Math.cos(angle) * dist,
            1.5 + Math.random() * 5,
            Math.sin(angle) * dist
        );
        scene.add(light);
    });

    // ─── Reflective wet floor ─────────────────────────────────────────────────
    const floorGeo = new THREE.PlaneGeometry(120, 120, 1, 1);
    const floorMat = new THREE.MeshStandardMaterial({
        color:            0x0b0b1e,
        metalness:        0.95,
        roughness:        0.08,
        envMapIntensity:  2.0,
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Puddle-like glossy patches
    for (let i = 0; i < 20; i++) {
        const pR    = 0.5 + Math.random() * 2;
        const pudGeo = new THREE.CircleGeometry(pR, 16);
        const pudMat = new THREE.MeshStandardMaterial({
            color:     randNeon(),
            metalness: 1.0,
            roughness: 0.0,
            opacity:   0.18 + Math.random() * 0.12,
            transparent: true,
        });
        const pud = new THREE.Mesh(pudGeo, pudMat);
        pud.rotation.x = -Math.PI / 2;
        pud.position.set(
            (Math.random() - 0.5) * 40,
            0.001,
            (Math.random() - 0.5) * 40
        );
        scene.add(pud);
    }

    // ─── Road markings ────────────────────────────────────────────────────────
    const dashMat = new THREE.MeshStandardMaterial({
        color:            0xffdd00,
        emissive:         new THREE.Color(0xffdd00),
        emissiveIntensity: 0.8,
    });
    for (let i = -10; i <= 10; i++) {
        if (Math.abs(i) % 2 === 0) continue;
        const dashGeo = new THREE.PlaneGeometry(0.12, 0.9);
        const dash    = new THREE.Mesh(dashGeo, dashMat);
        dash.rotation.x = -Math.PI / 2;
        dash.position.set(0, 0.002, i * 1.3);
        scene.add(dash);
    }

    // ─── Rain particles with longer floor reflection streaks ──────────────────
    const RAIN_COUNT = 6000;
    const rainPositions  = new Float32Array(RAIN_COUNT * 3);
    const rainVelocities = new Float32Array(RAIN_COUNT);

    for (let i = 0; i < RAIN_COUNT; i++) {
        rainPositions[i * 3]     = (Math.random() - 0.5) * 70;
        rainPositions[i * 3 + 1] = Math.random() * 25;
        rainPositions[i * 3 + 2] = (Math.random() - 0.5) * 70;
        rainVelocities[i]        = 0.12 + Math.random() * 0.18;
    }

    const rainGeo = new THREE.BufferGeometry();
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));

    const rainMat = new THREE.ShaderMaterial({
        uniforms: {
            uColor:   { value: new THREE.Color(0x88ccff) },
            uOpacity: { value: 0.35 },
        },
        vertexShader: `
            void main() {
                vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = 1.5;
                gl_Position  = projectionMatrix * mvPos;
            }
        `,
        fragmentShader: `
            uniform vec3  uColor;
            uniform float uOpacity;
            void main() {
                gl_FragColor = vec4(uColor, uOpacity);
            }
        `,
        transparent: true,
        depthWrite:  false,
    });

    const rain = new THREE.Points(rainGeo, rainMat);
    scene.add(rain);

    // Longer streaks (0.8 units) for more visible rain light reflections
    const streakPositions = new Float32Array(RAIN_COUNT * 6);
    const streakGeo = new THREE.BufferGeometry();
    streakGeo.setAttribute('position', new THREE.BufferAttribute(streakPositions, 3));

    const streakMat = new THREE.LineBasicMaterial({
        color:       0xaaddff,
        transparent: true,
        opacity:     0.38,
        depthWrite:  false,
    });
    const streaks = new THREE.LineSegments(streakGeo, streakMat);
    scene.add(streaks);

    // Floor light splash splats — bright short horizontal segments at y=0
    // Each raindrop landing creates a brief light streak on the wet floor
    const SPLASH_COUNT = RAIN_COUNT;
    const splashPositions = new Float32Array(SPLASH_COUNT * 6);
    const splashGeo = new THREE.BufferGeometry();
    splashGeo.setAttribute('position', new THREE.BufferAttribute(splashPositions, 3));
    const splashMat = new THREE.LineBasicMaterial({
        color:       0x88bbff,
        transparent: true,
        opacity:     0.18,
        depthWrite:  false,
    });
    const splashes = new THREE.LineSegments(splashGeo, splashMat);
    scene.add(splashes);

    // ─── Flying vehicles (20 small rectangular meshes on orbital paths) ────────
    const vehicleGroup = new THREE.Group();
    scene.add(vehicleGroup);
    const vehicles = [];

    const vehicleGeo = new THREE.BoxGeometry(0.5, 0.12, 0.22);

    for (let i = 0; i < 20; i++) {
        const color = neonPalette[i % neonPalette.length];
        const vMat = new THREE.MeshStandardMaterial({
            color,
            emissive:          new THREE.Color(color),
            emissiveIntensity: 3.5,
        });
        const vMesh = new THREE.Mesh(vehicleGeo, vMat);

        // Headlight glow
        const headLight = new THREE.PointLight(color, 8, 6, 2);
        vMesh.add(headLight);
        headLight.position.set(0.28, 0, 0);

        scene.add(vMesh);

        // Each vehicle has a random orbital path
        const orbitRadius = 5 + Math.random() * 18;
        const orbitHeight = 3 + Math.random() * 12;
        const orbitSpeed  = (0.2 + Math.random() * 0.4) * (Math.random() < 0.5 ? 1 : -1);
        const orbitPhase  = Math.random() * Math.PI * 2;
        const orbitTiltX  = (Math.random() - 0.5) * 0.3;
        const orbitTiltZ  = (Math.random() - 0.5) * 0.3;

        vehicles.push({ mesh: vMesh, orbitRadius, orbitHeight, orbitSpeed, orbitPhase, orbitTiltX, orbitTiltZ });
    }

    // ─── Moving accent lights ─────────────────────────────────────────────────
    const accentLights = [];
    [0xff0044, 0x00aaff].forEach((col, i) => {
        const l = new THREE.PointLight(col, 60, 30, 2);
        l.position.set(0, 1.5, 0);
        scene.add(l);
        accentLights.push({ light: l, phase: i * Math.PI });
    });

    // ─── Stars ────────────────────────────────────────────────────────────────
    const starCount = 800;
    const starPos   = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.random() * Math.PI * 0.45;
        const r     = 150;
        starPos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
        starPos[i * 3 + 1] = r * Math.cos(phi) + 10;
        starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starMat = new THREE.PointsMaterial({
        color: 0xaaaacc,
        size:  0.5,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.7,
    });
    scene.add(new THREE.Points(starGeo, starMat));

    // ─── Utility ───────────────────────────────────────────────────────────────
    function rng(min, max) { return min + Math.random() * (max - min); }

    // ─── Animate ─────────────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    let   frameCount = 0;
    const posAttr     = rainGeo.attributes.position;
    const streakAttr  = streakGeo.attributes.position;
    const splashAttr  = splashGeo.attributes.position;

    renderer.setAnimationLoop(() => {
        const elapsed = clock.getElapsedTime();
        frameCount++;

        // ── Rain update ──────────────────────────────────────────────────────
        for (let i = 0; i < RAIN_COUNT; i++) {
            posAttr.array[i * 3 + 1] -= rainVelocities[i];

            if (posAttr.array[i * 3 + 1] < 0) {
                posAttr.array[i * 3 + 1]  = 22 + Math.random() * 5;
                posAttr.array[i * 3]      = (Math.random() - 0.5) * 70;
                posAttr.array[i * 3 + 2]  = (Math.random() - 0.5) * 70;
            }

            const sy = posAttr.array[i * 3 + 1];
            const sx = posAttr.array[i * 3];
            const sz = posAttr.array[i * 3 + 2];

            // Vertical streak — longer (0.8) for wet-street light reflection
            streakAttr.array[i * 6]     = sx;
            streakAttr.array[i * 6 + 1] = sy;
            streakAttr.array[i * 6 + 2] = sz;
            streakAttr.array[i * 6 + 3] = sx;
            streakAttr.array[i * 6 + 4] = sy - 0.8;
            streakAttr.array[i * 6 + 5] = sz;

            // Floor splash: near-ground drops cast tiny horizontal light streaks
            if (sy < 1.5) {
                const splashLen = 0.25 + (1.5 - sy) * 0.15;
                splashAttr.array[i * 6]     = sx - splashLen;
                splashAttr.array[i * 6 + 1] = 0.005;
                splashAttr.array[i * 6 + 2] = sz;
                splashAttr.array[i * 6 + 3] = sx + splashLen;
                splashAttr.array[i * 6 + 4] = 0.005;
                splashAttr.array[i * 6 + 5] = sz;
            } else {
                // Hide above-ground entries
                splashAttr.array[i * 6 + 1] = -999;
                splashAttr.array[i * 6 + 4] = -999;
            }
        }
        posAttr.needsUpdate     = true;
        streakAttr.needsUpdate  = true;
        splashAttr.needsUpdate  = true;

        // ── Flying vehicles ───────────────────────────────────────────────────
        vehicles.forEach(v => {
            const angle = elapsed * v.orbitSpeed + v.orbitPhase;
            v.mesh.position.x = Math.cos(angle) * v.orbitRadius;
            v.mesh.position.y = v.orbitHeight + Math.sin(elapsed * 0.3 + v.orbitPhase) * 0.5;
            v.mesh.position.z = Math.sin(angle) * v.orbitRadius;
            // Face direction of travel
            v.mesh.rotation.y = -angle + (v.orbitSpeed < 0 ? Math.PI : 0);
            v.mesh.rotation.x = v.orbitTiltX;
            v.mesh.rotation.z = v.orbitTiltZ;
        });

        // ── Accent lights orbit ───────────────────────────────────────────────
        accentLights.forEach(({ light, phase }) => {
            const t = elapsed * 0.4 + phase;
            light.position.set(
                Math.cos(t) * 12,
                1.2 + Math.sin(elapsed * 0.7 + phase) * 0.8,
                Math.sin(t) * 12
            );
        });

        // ── Signs slowly pulse ────────────────────────────────────────────────
        signGroup.children.forEach((sign, idx) => {
            const base = 5.5;
            sign.material.emissiveIntensity = base + Math.sin(elapsed * 1.2 + idx * 0.8) * 1.5;
        });

        // ── Controls / camera ─────────────────────────────────────────────────
        controls.update();

        composer.render();
    });

    // ─── Resize handler ───────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
        bloomPass.resolution.set(window.innerWidth, window.innerHeight);
    });

    </script>
</body>
</html>
