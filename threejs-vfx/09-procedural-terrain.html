<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Terrain | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #87ceeb; overflow: hidden; }
        canvas { display: block; }

        .back-link {
            position: fixed;
            top: 14px;
            left: 14px;
            color: #fff;
            text-decoration: none;
            z-index: 1000;
            font-size: 0.95rem;
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: rgba(0, 0, 0, 0.35);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(6px);
            transition: background 0.2s ease;
            letter-spacing: 0.02em;
        }
        .back-link:hover { background: rgba(0, 0, 0, 0.6); }

        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.35);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(6px);
            white-space: nowrap;
            pointer-events: none;
            letter-spacing: 0.03em;
        }

        .legend {
            position: fixed;
            top: 14px;
            right: 14px;
            color: #fff;
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.35);
            padding: 12px 16px;
            border-radius: 14px;
            backdrop-filter: blur(6px);
            line-height: 1.9;
            z-index: 1000;
        }
        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Three.js VFX</a>

    <div class="legend">
        <div class="legend-row"><div class="legend-swatch" style="background:#1a4d99;"></div> Deep Water</div>
        <div class="legend-row"><div class="legend-swatch" style="background:#c2b280;"></div> Sand &amp; Shore</div>
        <div class="legend-row"><div class="legend-swatch" style="background:#336619;"></div> Grasslands</div>
        <div class="legend-row"><div class="legend-swatch" style="background:#66594d;"></div> Rocky Slopes</div>
        <div class="legend-row"><div class="legend-swatch" style="background:#e5f0ff;"></div> Snow &amp; Ice Peaks</div>
    </div>

    <div class="info-panel">Procedural Terrain &mdash; FBM + Detail Noise &bull; Drag to orbit &bull; Scroll to zoom</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // -------------------------------------------------------------------------
    // Renderer
    // -------------------------------------------------------------------------
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    // -------------------------------------------------------------------------
    // Scene
    // -------------------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    // Denser fog for better atmospheric depth
    scene.fog = new THREE.FogExp2(0x87ceeb, 0.048);

    // -------------------------------------------------------------------------
    // Camera
    // -------------------------------------------------------------------------
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 8, 18);
    camera.lookAt(0, 0, 0);

    // -------------------------------------------------------------------------
    // Controls
    // -------------------------------------------------------------------------
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 4;
    controls.maxDistance = 60;
    controls.maxPolarAngle = Math.PI * 0.48;
    controls.target.set(0, 0, 0);

    // -------------------------------------------------------------------------
    // Lighting
    // -------------------------------------------------------------------------
    const ambient = new THREE.AmbientLight(0xd4e8ff, 0.7);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xfff4e0, 2.2);
    sun.position.set(15, 20, 10);
    sun.castShadow = false;
    scene.add(sun);

    const fill = new THREE.DirectionalLight(0xc8dff5, 0.4);
    fill.position.set(-10, 5, -8);
    scene.add(fill);

    // -------------------------------------------------------------------------
    // Terrain Shader Material
    // -------------------------------------------------------------------------
    const vertexShader = /* glsl */`
        uniform float uTime;
        varying float vHeight;
        varying vec3  vWorldNormal;
        varying vec3  vWorldPos;
        varying vec2  vUv;
        varying float vSlope;

        // --- 2-D gradient noise (IQ style) -----------------------------------
        vec2 hash2(vec2 p) {
            p = vec2(dot(p, vec2(127.1, 311.7)),
                     dot(p, vec2(269.5, 183.3)));
            return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
        }

        float gradNoise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            vec2 u = f * f * (3.0 - 2.0 * f);

            float a = dot(hash2(i + vec2(0.0, 0.0)), f - vec2(0.0, 0.0));
            float b = dot(hash2(i + vec2(1.0, 0.0)), f - vec2(1.0, 0.0));
            float c = dot(hash2(i + vec2(0.0, 1.0)), f - vec2(0.0, 1.0));
            float d = dot(hash2(i + vec2(1.0, 1.0)), f - vec2(1.1, 1.0));
            return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
        }

        // --- 6-octave FBM ---------------------------------------------------
        float fbm(vec2 p) {
            float value = 0.0;
            float amp   = 0.5;
            float freq  = 1.0;
            for (int i = 0; i < 6; i++) {
                value += amp * gradNoise(p * freq);
                freq  *= 2.07;
                amp   *= 0.48;
            }
            return value;
        }

        // --- Domain-warped FBM ----------------------------------------------
        float warpedFbm(vec2 p) {
            vec2 q = vec2(fbm(p + vec2(0.0, 0.0)),
                          fbm(p + vec2(5.2, 1.3)));
            vec2 r = vec2(fbm(p + 4.0 * q + vec2(1.7, 9.2)),
                          fbm(p + 4.0 * q + vec2(8.3, 2.8)));
            return fbm(p + 4.0 * r);
        }

        // --- Detail noise (higher frequency) --------------------------------
        float detailNoise(vec2 p) {
            float value = 0.0;
            float amp   = 0.5;
            float freq  = 1.0;
            for (int i = 0; i < 3; i++) {
                value += amp * gradNoise(p * freq);
                freq  *= 2.2;
                amp   *= 0.45;
            }
            return value;
        }

        void main() {
            vUv = uv;

            vec2 st = position.xz * 0.28 + uTime * 0.008;

            float h = warpedFbm(st);
            // Secondary detail layer: 4x frequency, 0.15 amplitude
            float detail = detailNoise(st * 4.0 + vec2(3.7, 1.9)) * 0.15;
            h = h * 5.0 - 0.3 + detail;

            vHeight = h;

            vec3 displaced = position + vec3(0.0, h, 0.0);

            // Approximate normal via finite differences
            float eps = 0.15;
            vec2 stX = (position.xz + vec2(eps, 0.0)) * 0.28 + uTime * 0.008;
            vec2 stZ = (position.xz + vec2(0.0, eps)) * 0.28 + uTime * 0.008;

            float hX = warpedFbm(stX) * 5.0 - 0.3 + detailNoise(stX * 4.0 + vec2(3.7, 1.9)) * 0.15;
            float hZ = warpedFbm(stZ) * 5.0 - 0.3 + detailNoise(stZ * 4.0 + vec2(3.7, 1.9)) * 0.15;

            vec3 tangentX = normalize(vec3(eps, hX - h, 0.0));
            vec3 tangentZ = normalize(vec3(0.0, hZ - h, eps));
            vWorldNormal  = normalize(cross(tangentZ, tangentX));
            vWorldPos     = displaced;

            // Slope for roughness variation
            vSlope = 1.0 - abs(vWorldNormal.y);

            gl_Position = projectionMatrix * modelViewMatrix * vec4(displaced, 1.0);
        }
    `;

    const fragmentShader = /* glsl */`
        uniform vec3  uSunDir;
        uniform float uTime;

        varying float vHeight;
        varying vec3  vWorldNormal;
        varying vec3  vWorldPos;
        varying vec2  vUv;
        varying float vSlope;

        // ── Simple value noise for cloud shadow ──────────────────────
        float hash(vec2 p) {
            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
        }
        float valueNoise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            return mix(
                mix(hash(i), hash(i + vec2(1,0)), f.x),
                mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x),
                f.y
            );
        }
        float cloudNoise(vec2 p) {
            float n = 0.0;
            n += 0.5   * valueNoise(p);
            n += 0.25  * valueNoise(p * 2.1 + vec2(1.7, 3.3));
            n += 0.125 * valueNoise(p * 4.3 + vec2(5.1, 2.4));
            return n;
        }

        // ── Palette ──────────────────────────────────────────────────
        vec3 terrainColor(float h, vec3 n) {
            float slope = 1.0 - abs(n.y);

            vec3 deepWater  = vec3(0.08, 0.22, 0.55);
            vec3 shallowW   = vec3(0.18, 0.42, 0.72);
            vec3 sand       = vec3(0.76, 0.70, 0.50);
            vec3 grass      = vec3(0.18, 0.46, 0.12);
            vec3 darkGrass  = vec3(0.12, 0.32, 0.08);
            vec3 rock       = vec3(0.42, 0.37, 0.30);
            vec3 darkRock   = vec3(0.28, 0.24, 0.20);
            // Snow with brighter ice tint at very high peaks
            vec3 snow       = vec3(0.92, 0.96, 1.00);
            vec3 snowShadow = vec3(0.72, 0.80, 0.95);
            vec3 icePeak    = vec3(0.80, 0.92, 1.00);   // blue-white ice

            vec3 col;

            if (h < -0.8) {
                col = deepWater;
            } else if (h < 0.0) {
                float t = (h + 0.8) / 0.8;
                col = mix(deepWater, shallowW, t);
            } else if (h < 0.25) {
                float t = h / 0.25;
                col = mix(shallowW, sand, t);
            } else if (h < 1.0) {
                float t = (h - 0.25) / 0.75;
                col = mix(sand, grass, smoothstep(0.0, 1.0, t));
            } else if (h < 2.5) {
                float t = (h - 1.0) / 1.5;
                vec3 vegColor = mix(grass, darkGrass, t * 0.5);
                col = mix(vegColor, rock, smoothstep(0.3, 0.7, slope));
                col = mix(col, rock, smoothstep(0.0, 1.0, t));
            } else if (h < 3.6) {
                float t = (h - 2.5) / 1.1;
                col = mix(rock, darkRock, 0.4);
                col = mix(col, snow, smoothstep(0.4, 1.0, t));
            } else {
                // Ice/snow peaks — altitude-dependent specular roughness via vertex color
                float t = clamp((h - 3.6) / 1.2, 0.0, 1.0);
                col = mix(snow, snowShadow, slope * 0.5);
                col = mix(col, icePeak, t * (1.0 - slope * 0.7));
            }

            col *= (0.85 + 0.15 * clamp(n.y, 0.0, 1.0));
            return col;
        }

        // ── Lighting ─────────────────────────────────────────────────
        vec3 shade(vec3 color, vec3 n, vec3 sunDir, float roughness) {
            float diff = max(dot(n, sunDir), 0.0);
            float amb  = 0.38 + 0.12 * n.y;
            vec3 skyTint = vec3(0.53, 0.81, 0.92);

            vec3 lit = color * (amb + diff * 1.1);
            lit += skyTint * color * max(n.y, 0.0) * 0.12;

            // Specular on water
            if (vHeight < 0.05) {
                vec3 viewDir  = normalize(cameraPosition - vWorldPos);
                vec3 halfDir  = normalize(sunDir + viewDir);
                float spec    = pow(max(dot(n, halfDir), 0.0), 64.0);
                float waterMask = clamp(1.0 - vHeight * 6.0, 0.0, 1.0);
                lit += vec3(1.0, 0.95, 0.8) * spec * 0.9 * waterMask;
            }

            // Specular on ice/snow peaks — roughness-modulated
            if (vHeight > 3.0) {
                vec3 viewDir = normalize(cameraPosition - vWorldPos);
                vec3 halfDir = normalize(sunDir + viewDir);
                float snowSpec = pow(max(dot(n, halfDir), 0.0), 80.0 * (1.0 - roughness));
                float snowMask = smoothstep(3.0, 4.2, vHeight) * (1.0 - vSlope * 0.8);
                lit += vec3(0.9, 0.95, 1.0) * snowSpec * 0.6 * snowMask;
            }

            return lit;
        }

        void main() {
            vec3 n      = normalize(vWorldNormal);
            vec3 sunDir = normalize(uSunDir);

            // Vertex color roughness variation: rocky peaks are rougher (darker specular)
            float roughness = mix(0.3, 0.95, vSlope);

            vec3 baseCol = terrainColor(vHeight, n);
            vec3 lit     = shade(baseCol, n, sunDir, roughness);

            // ── Moving cloud shadow ─────────────────────────────────
            // Animated noise pattern darkening ground areas
            vec2 cloudUV = vWorldPos.xz * 0.04 + vec2(uTime * 0.03, uTime * 0.018);
            float cloud = cloudNoise(cloudUV);
            float cloudShadow = smoothstep(0.55, 0.72, cloud);  // soft shadow boundary
            // Only darken above water
            if (vHeight > 0.0) {
                lit *= mix(1.0, 0.72, cloudShadow * 0.7);
            }

            gl_FragColor = vec4(lit, 1.0);
        }
    `;

    const terrainUniforms = {
        uTime:    { value: 0.0 },
        uSunDir:  { value: new THREE.Vector3(0.65, 0.8, 0.4).normalize() },
    };

    const terrainMaterial = new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: terrainUniforms,
        fog: true,
    });

    // -------------------------------------------------------------------------
    // Geometry — 256×256 subdivisions
    // -------------------------------------------------------------------------
    const geometry = new THREE.PlaneGeometry(32, 32, 255, 255);
    const terrain  = new THREE.Mesh(geometry, terrainMaterial);
    terrain.rotation.x = -Math.PI / 2;
    scene.add(terrain);

    // -------------------------------------------------------------------------
    // Water plane — semi-transparent animated wave surface
    // -------------------------------------------------------------------------
    const waterVertexShader = /* glsl */`
        uniform float uTime;
        varying vec3  vWorldPos;
        varying vec3  vWorldNormal;
        varying vec2  vUv;

        void main() {
            vUv = uv;
            vec3 pos = position;
            // Gentle wave displacement
            float wave1 = sin(pos.x * 1.5 + uTime * 1.2) * 0.04;
            float wave2 = cos(pos.z * 1.8 + uTime * 0.9) * 0.03;
            float wave3 = sin(pos.x * 0.8 + pos.z * 1.1 + uTime * 0.7) * 0.025;
            pos.y += wave1 + wave2 + wave3;

            // Approximate wave normal
            float dx = cos(pos.x * 1.5 + uTime * 1.2) * 1.5 * 0.04
                     + cos(pos.x * 0.8 + pos.z * 1.1 + uTime * 0.7) * 0.8 * 0.025;
            float dz = cos(pos.z * 1.8 + uTime * 0.9) * 1.8 * 0.03
                     + cos(pos.x * 0.8 + pos.z * 1.1 + uTime * 0.7) * 1.1 * 0.025;
            vWorldNormal = normalize(vec3(-dx, 1.0, -dz));
            vWorldPos = (modelMatrix * vec4(pos, 1.0)).xyz;

            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    `;

    const waterFragmentShader = /* glsl */`
        uniform float uTime;
        uniform vec3  uSunDir;
        varying vec3  vWorldPos;
        varying vec3  vWorldNormal;
        varying vec2  vUv;

        void main() {
            vec3 n = normalize(vWorldNormal);
            vec3 viewDir = normalize(cameraPosition - vWorldPos);

            // Fresnel
            float fresnel = pow(1.0 - max(dot(n, viewDir), 0.0), 3.0);

            // Deep water color
            vec3 deepCol    = vec3(0.04, 0.15, 0.45);
            vec3 shallowCol = vec3(0.08, 0.35, 0.65);
            vec3 baseWater  = mix(deepCol, shallowCol, fresnel * 0.6);

            // Specular highlight
            vec3 halfDir = normalize(uSunDir + viewDir);
            float spec   = pow(max(dot(n, halfDir), 0.0), 96.0);
            vec3 specCol = vec3(1.0, 0.97, 0.9) * spec * 1.2;

            // Animated ripple lines
            float ripple1 = sin((vUv.x * 40.0 + vUv.y * 30.0) + uTime * 2.0) * 0.5 + 0.5;
            float ripple2 = cos((vUv.x * 25.0 - vUv.y * 35.0) + uTime * 1.5) * 0.5 + 0.5;
            float ripples = pow(ripple1 * ripple2, 4.0) * 0.12;

            vec3 col = baseWater + specCol + vec3(0.3, 0.6, 0.9) * ripples;

            // Alpha: more opaque at grazing angles
            float alpha = 0.55 + fresnel * 0.35;

            gl_FragColor = vec4(col, alpha);
        }
    `;

    const waterUniforms = {
        uTime:   { value: 0.0 },
        uSunDir: { value: new THREE.Vector3(0.65, 0.8, 0.4).normalize() },
    };

    const waterMat = new THREE.ShaderMaterial({
        vertexShader:   waterVertexShader,
        fragmentShader: waterFragmentShader,
        uniforms:       waterUniforms,
        transparent:    true,
        depthWrite:     false,
        side:           THREE.DoubleSide,
        fog:            true,
    });

    const waterGeo  = new THREE.PlaneGeometry(32, 32, 64, 64);
    const waterMesh = new THREE.Mesh(waterGeo, waterMat);
    waterMesh.rotation.x = -Math.PI / 2;
    waterMesh.position.y = 0.0;   // sea level
    scene.add(waterMesh);

    // -------------------------------------------------------------------------
    // Sky dome
    // -------------------------------------------------------------------------
    const skyGeo = new THREE.SphereGeometry(200, 32, 16);
    const skyMat = new THREE.ShaderMaterial({
        side: THREE.BackSide,
        uniforms: {
            uHorizon: { value: new THREE.Color(0x87ceeb) },
            uZenith:  { value: new THREE.Color(0x2c6bb0) },
        },
        vertexShader: /* glsl */`
            varying vec3 vPos;
            void main() {
                vPos = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: /* glsl */`
            uniform vec3 uHorizon;
            uniform vec3 uZenith;
            varying vec3 vPos;
            void main() {
                float t = clamp(vPos.y / 200.0, 0.0, 1.0);
                vec3 sky = mix(uHorizon, uZenith, smoothstep(0.0, 1.0, t));
                gl_FragColor = vec4(sky, 1.0);
            }
        `,
        depthWrite: false,
        fog: false,
    });
    const skyDome = new THREE.Mesh(skyGeo, skyMat);
    scene.add(skyDome);

    // -------------------------------------------------------------------------
    // Sun disc billboard
    // -------------------------------------------------------------------------
    const sunPos = new THREE.Vector3(65, 85, 40);
    const sunGeo = new THREE.CircleGeometry(4, 32);
    const sunMat = new THREE.MeshBasicMaterial({
        color: 0xfff8c0,
        fog: false,
        depthWrite: false,
    });
    const sunDisc = new THREE.Mesh(sunGeo, sunMat);
    sunDisc.position.copy(sunPos);
    sunDisc.lookAt(camera.position);
    scene.add(sunDisc);

    // -------------------------------------------------------------------------
    // Resize handler
    // -------------------------------------------------------------------------
    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize);

    // -------------------------------------------------------------------------
    // Animation loop
    // -------------------------------------------------------------------------
    const clock = new THREE.Clock();

    renderer.setAnimationLoop(() => {
        const elapsed = clock.getElapsedTime();
        terrainUniforms.uTime.value = elapsed;
        waterUniforms.uTime.value   = elapsed;

        sunDisc.lookAt(camera.position);

        controls.update();
        renderer.render(scene, camera);
    });
    </script>
</body>
</html>
