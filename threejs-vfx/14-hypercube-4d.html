<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4D Hypercube Projection | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }

        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #88aaff;
            text-decoration: none;
            z-index: 1000;
            font-size: 1rem;
            font-family: sans-serif;
            background: rgba(0, 0, 30, 0.7);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(100, 140, 255, 0.3);
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        .back-link:hover {
            background: rgba(10, 10, 60, 0.9);
            border-color: rgba(100, 140, 255, 0.7);
        }

        .title-overlay {
            position: fixed;
            top: 10px;
            right: 14px;
            color: rgba(140, 180, 255, 0.8);
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            pointer-events: none;
            line-height: 1.6;
            text-align: right;
        }

        .controls-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 220, 255, 0.9);
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            background: rgba(0, 0, 20, 0.75);
            padding: 14px 22px;
            border-radius: 12px;
            border: 1px solid rgba(100, 140, 255, 0.25);
            backdrop-filter: blur(8px);
            min-width: 320px;
            user-select: none;
        }
        .controls-panel label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 6px 0;
            white-space: nowrap;
        }
        .controls-panel input[type="range"] {
            flex: 1;
            accent-color: #88aaff;
            cursor: pointer;
        }
        .controls-panel .val {
            width: 38px;
            text-align: right;
            color: #aaccff;
        }
        .controls-panel .section-title {
            font-size: 0.68rem;
            letter-spacing: 0.15em;
            color: rgba(140, 180, 255, 0.5);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .legend {
            position: fixed;
            bottom: 20px;
            right: 18px;
            color: rgba(200, 220, 255, 0.75);
            font-family: 'Courier New', monospace;
            font-size: 0.72rem;
            line-height: 1.8;
            pointer-events: none;
        }
        .legend-bar {
            display: inline-block;
            width: 80px;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(to right, #2266ff, #22ffcc, #aaff22, #ff8800, #ff2200);
            vertical-align: middle;
            margin-left: 6px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back</a>

    <div class="title-overlay">
        4D HYPERCUBE PROJECTION<br>
        <span style="opacity:0.5;font-size:0.65rem;">TESSERACT &mdash; 16 VERTICES &bull; 32 EDGES</span>
    </div>

    <div class="controls-panel">
        <div class="section-title">4D Rotation Controls</div>
        <label>
            XW Speed
            <input type="range" id="xwSpeed" min="-2" max="2" step="0.05" value="0.5">
            <span class="val" id="xwVal">0.50</span>
        </label>
        <label>
            YZ Speed
            <input type="range" id="yzSpeed" min="-2" max="2" step="0.05" value="0.3">
            <span class="val" id="yzVal">0.30</span>
        </label>
        <label>
            XY Speed
            <input type="range" id="xySpeed" min="-2" max="2" step="0.05" value="0.0">
            <span class="val" id="xyVal">0.00</span>
        </label>
        <label>
            W Distance
            <input type="range" id="wDist" min="1.5" max="5.0" step="0.1" value="2.5">
            <span class="val" id="wVal">2.50</span>
        </label>
    </div>

    <div class="legend">
        W-coordinate (4th dim)<br>
        Near &nbsp;&nbsp;&nbsp;<span class="legend-bar"></span>&nbsp;&nbsp;&nbsp; Far
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // -------------------------------------------------------
        // Scene setup
        // -------------------------------------------------------
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
        camera.position.set(0, 0, 5);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 2;
        controls.maxDistance = 18;

        // -------------------------------------------------------
        // Post-processing
        // -------------------------------------------------------
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            2.0,
            0.4,
            0.05
        );
        composer.addPass(bloomPass);
        composer.addPass(new OutputPass());

        // -------------------------------------------------------
        // Starfield background
        // -------------------------------------------------------
        (function buildStars() {
            const N = 4000;
            const pos = new Float32Array(N * 3);
            const col = new Float32Array(N * 3);
            for (let i = 0; i < N; i++) {
                const r     = 40 + Math.random() * 40;
                const theta = Math.random() * Math.PI * 2;
                const phi   = Math.acos(2 * Math.random() - 1);
                pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
                pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i*3+2] = r * Math.cos(phi);
                const bright = 0.6 + Math.random() * 0.4;
                col[i*3]   = bright;
                col[i*3+1] = bright;
                col[i*3+2] = bright + Math.random() * 0.2;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
            const mat = new THREE.PointsMaterial({ size: 0.06, vertexColors: true, sizeAttenuation: true });
            scene.add(new THREE.Points(geo, mat));
        })();

        // -------------------------------------------------------
        // 4D Tesseract data
        // -------------------------------------------------------
        const vertices4D = [];
        for (let i = 0; i < 16; i++) {
            vertices4D.push([
                (i & 1) ? 1 : -1,
                (i & 2) ? 1 : -1,
                (i & 4) ? 1 : -1,
                (i & 8) ? 1 : -1
            ]);
        }

        const edges = [];
        for (let i = 0; i < 16; i++) {
            for (let j = i + 1; j < 16; j++) {
                let diff = 0;
                for (let k = 0; k < 4; k++) {
                    if (vertices4D[i][k] !== vertices4D[j][k]) diff++;
                }
                if (diff === 1) edges.push([i, j]);
            }
        }
        console.assert(edges.length === 32, `Expected 32 edges, got ${edges.length}`);

        // -------------------------------------------------------
        // 4D rotation + projection
        // -------------------------------------------------------
        function rotate4D(v, angleXW, angleYZ, angleXY) {
            let [x, y, z, w] = v;

            const cosXW = Math.cos(angleXW), sinXW = Math.sin(angleXW);
            let x1 = x * cosXW - w * sinXW;
            let w1 = x * sinXW + w * cosXW;
            x = x1; w = w1;

            const cosYZ = Math.cos(angleYZ), sinYZ = Math.sin(angleYZ);
            let y1 = y * cosYZ - z * sinYZ;
            let z1 = y * sinYZ + z * cosYZ;
            y = y1; z = z1;

            const cosXY = Math.cos(angleXY), sinXY = Math.sin(angleXY);
            let x2 = x * cosXY - y * sinXY;
            let y2 = x * sinXY + y * cosXY;
            x = x2; y = y2;

            return [x, y, z, w];
        }

        function project4Dto3D(v, wCamera) {
            const [x, y, z, wCoord] = v;
            const denom = wCamera - wCoord;
            const scale = Math.abs(denom) > 0.001 ? wCamera / denom : 0;
            return { vec: new THREE.Vector3(x * scale, y * scale, z * scale), w: wCoord };
        }

        function wCoordToColor(wCoord) {
            const t  = (wCoord + 1.8) / 3.6;
            const tc = Math.max(0, Math.min(1, t));
            let r, g, b;
            if (tc < 0.25) {
                const s = tc / 0.25;
                r = 0.1; g = s * 0.9; b = 1.0;
            } else if (tc < 0.5) {
                const s = (tc - 0.25) / 0.25;
                r = 0.1; g = 0.9; b = 1.0 * (1 - s);
            } else if (tc < 0.75) {
                const s = (tc - 0.5) / 0.25;
                r = 0.1 + s * 0.9; g = 0.9; b = 0;
            } else {
                const s = (tc - 0.75) / 0.25;
                r = 1.0; g = 0.9 * (1 - s); b = 0;
            }
            return new THREE.Color(r, g, b);
        }

        // -------------------------------------------------------
        // Edge line geometry (LineSegments with vertex colors)
        // -------------------------------------------------------
        const edgePositions = new Float32Array(edges.length * 2 * 3);
        const edgeColors    = new Float32Array(edges.length * 2 * 3);

        const edgeGeo = new THREE.BufferGeometry();
        edgeGeo.setAttribute('position', new THREE.BufferAttribute(edgePositions, 3));
        edgeGeo.setAttribute('color',    new THREE.BufferAttribute(edgeColors,    3));
        edgeGeo.attributes.position.usage = THREE.DynamicDrawUsage;
        edgeGeo.attributes.color.usage    = THREE.DynamicDrawUsage;

        const edgeMat = new THREE.LineBasicMaterial({
            vertexColors: true,
            linewidth: 1,
            transparent: true,
            opacity: 0.95
        });

        const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
        scene.add(edgeLines);

        // -------------------------------------------------------
        // Vertex glow sprites at all 16 vertices
        // Built using a canvas-generated radial gradient texture
        // -------------------------------------------------------
        function makeGlowTexture(size) {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');
            const cx  = size / 2;
            const grad = ctx.createRadialGradient(cx, cx, 0, cx, cx, cx);
            grad.addColorStop(0.0, 'rgba(255,255,255,1.0)');
            grad.addColorStop(0.3, 'rgba(180,220,255,0.8)');
            grad.addColorStop(0.7, 'rgba(80,140,255,0.3)');
            grad.addColorStop(1.0, 'rgba(0,0,0,0.0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            return new THREE.CanvasTexture(canvas);
        }
        const glowTex = makeGlowTexture(128);

        const vertexSprites = [];
        for (let i = 0; i < 16; i++) {
            const mat = new THREE.SpriteMaterial({
                map:        glowTex,
                transparent: true,
                blending:   THREE.AdditiveBlending,
                depthWrite: false,
                color:      0xffffff,
            });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(0.35, 0.35, 1);
            scene.add(sprite);
            vertexSprites.push(sprite);
        }

        // -------------------------------------------------------
        // Trail effect: previous frame positions accumulation
        // Using a low-opacity secondary edge pass for ghosting
        // -------------------------------------------------------
        const TRAIL_STEPS   = 5;
        const trailPositions = Array.from({ length: TRAIL_STEPS }, () => new Array(16).fill(null).map(() => new THREE.Vector3()));
        const trailGeos      = [];
        const trailMeshes    = [];

        for (let t = 0; t < TRAIL_STEPS; t++) {
            const trailPos = new Float32Array(edges.length * 2 * 3);
            const trailCol = new Float32Array(edges.length * 2 * 3);
            const tGeo = new THREE.BufferGeometry();
            tGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
            tGeo.setAttribute('color',    new THREE.BufferAttribute(trailCol, 3));
            tGeo.attributes.position.usage = THREE.DynamicDrawUsage;
            tGeo.attributes.color.usage    = THREE.DynamicDrawUsage;
            const tMat = new THREE.LineBasicMaterial({
                vertexColors: true,
                transparent:  true,
                opacity:      (TRAIL_STEPS - t) / (TRAIL_STEPS * 6),  // fading older trails
                depthWrite:   false,
                blending:     THREE.AdditiveBlending,
            });
            const tMesh = new THREE.LineSegments(tGeo, tMat);
            scene.add(tMesh);
            trailGeos.push(tGeo);
            trailMeshes.push(tMesh);
        }

        let trailFrame = 0;

        function updateTrail(projected) {
            // Shift history
            for (let t = TRAIL_STEPS - 1; t > 0; t--) {
                for (let i = 0; i < 16; i++) {
                    trailPositions[t][i].copy(trailPositions[t-1][i]);
                }
            }
            for (let i = 0; i < 16; i++) {
                trailPositions[0][i].copy(projected[i]);
            }

            // Update trail geo
            for (let t = 0; t < TRAIL_STEPS; t++) {
                const posArr = trailGeos[t].attributes.position.array;
                const colArr = trailGeos[t].attributes.color.array;
                for (let e = 0; e < edges.length; e++) {
                    const [a, b] = edges[e];
                    const pa = trailPositions[t][a];
                    const pb = trailPositions[t][b];
                    posArr[e*6+0] = pa.x; posArr[e*6+1] = pa.y; posArr[e*6+2] = pa.z;
                    posArr[e*6+3] = pb.x; posArr[e*6+4] = pb.y; posArr[e*6+5] = pb.z;
                    // Dim color for trails
                    const fade = (TRAIL_STEPS - t) / TRAIL_STEPS * 0.4;
                    colArr[e*6+0] = fade; colArr[e*6+1] = fade; colArr[e*6+2] = fade;
                    colArr[e*6+3] = fade; colArr[e*6+4] = fade; colArr[e*6+5] = fade;
                }
                trailGeos[t].attributes.position.needsUpdate = true;
                trailGeos[t].attributes.color.needsUpdate    = true;
            }
        }

        // -------------------------------------------------------
        // Electric arcs between nearby vertices
        // Using TubeGeometry with animated noise
        // We pick 8 "near" vertex pairs and regenerate arcs periodically
        // -------------------------------------------------------
        const arcGroup = new THREE.Group();
        scene.add(arcGroup);

        const arcMat = new THREE.MeshBasicMaterial({
            color:      0x88ccff,
            transparent: true,
            opacity:    0.55,
            depthWrite: false,
            blending:   THREE.AdditiveBlending,
        });

        // We'll keep 8 arc tube meshes and update their curves each frame
        const ARC_COUNT = 8;
        const arcMeshes = [];

        // Simple noise function for arc displacement
        function hash(n) {
            return Math.sin(n * 127.1 + 311.7) * 43758.5453 % 1;
        }
        function noiseVal(x) {
            const i = Math.floor(x);
            const f = x - i;
            const a = hash(i), b = hash(i + 1);
            const t = f * f * (3 - 2 * f);
            return a + (b - a) * t;
        }

        class ArcCurve extends THREE.Curve {
            constructor(from, to, seed) {
                super();
                this.from = from.clone();
                this.to   = to.clone();
                this.seed = seed;
                this.time = 0;
            }
            getPoint(u) {
                const p    = new THREE.Vector3().lerpVectors(this.from, this.to, u);
                const disp = Math.sin(u * Math.PI) * 0.18;
                p.x += disp * (noiseVal(this.seed + u * 4.0 + this.time * 3.1) - 0.5);
                p.y += disp * (noiseVal(this.seed + u * 4.0 + this.time * 2.7 + 10) - 0.5);
                p.z += disp * (noiseVal(this.seed + u * 4.0 + this.time * 2.3 + 20) - 0.5);
                return p;
            }
        }

        const arcCurves = [];
        for (let i = 0; i < ARC_COUNT; i++) {
            const curve = new ArcCurve(new THREE.Vector3(), new THREE.Vector3(), i * 13.7);
            arcCurves.push(curve);
            const tubeGeo = new THREE.TubeGeometry(curve, 12, 0.012, 4, false);
            const mesh    = new THREE.Mesh(tubeGeo, arcMat.clone());
            arcGroup.add(mesh);
            arcMeshes.push({ mesh, curve, tubeGeo });
        }

        // -------------------------------------------------------
        // UI bindings
        // -------------------------------------------------------
        let xwSpeed = 0.5;
        let yzSpeed = 0.3;
        let xySpeed = 0.0;
        let wDist   = 2.5;

        let angleXW = 0;
        let angleYZ = 0;
        let angleXY = 0;

        function bindSlider(id, valId, setter) {
            const slider = document.getElementById(id);
            const valEl  = document.getElementById(valId);
            slider.addEventListener('input', () => {
                const v = parseFloat(slider.value);
                setter(v);
                valEl.textContent = v.toFixed(2);
            });
        }

        bindSlider('xwSpeed', 'xwVal', v => { xwSpeed = v; });
        bindSlider('yzSpeed', 'yzVal', v => { yzSpeed = v; });
        bindSlider('xySpeed', 'xyVal', v => { xySpeed = v; });
        bindSlider('wDist',   'wVal',  v => { wDist = v; });

        // -------------------------------------------------------
        // Projected vertices cache
        // -------------------------------------------------------
        const projected3D = new Array(16);
        const rotatedW    = new Array(16);

        // -------------------------------------------------------
        // Animation loop
        // -------------------------------------------------------
        const clock  = new THREE.Clock();
        let   arcTimer = 0;
        let   arcPairs = [];  // which vertex pairs get arcs

        function pickArcPairs() {
            // Find pairs of nearby projected vertices (not necessarily edges)
            arcPairs = [];
            const candidates = [];
            for (let i = 0; i < 16; i++) {
                for (let j = i + 1; j < 16; j++) {
                    const d = projected3D[i].distanceTo(projected3D[j]);
                    if (d < 1.5) candidates.push({ i, j, d });
                }
            }
            candidates.sort((a, b) => a.d - b.d);
            for (let k = 0; k < Math.min(ARC_COUNT, candidates.length); k++) {
                arcPairs.push(candidates[k]);
            }
        }

        function animate() {
            const dt = clock.getDelta();
            const t  = clock.elapsedTime;

            // Accumulate rotation angles
            angleXW += xwSpeed * dt;
            angleYZ += yzSpeed * dt;
            angleXY += xySpeed * dt;

            // Project all 16 vertices
            for (let i = 0; i < 16; i++) {
                const rot = rotate4D(vertices4D[i], angleXW, angleYZ, angleXY);
                rotatedW[i]    = rot[3];
                const proj     = project4Dto3D(rot, wDist);
                projected3D[i] = proj.vec;
            }

            // Update edge geometry
            const pos = edgeGeo.attributes.position.array;
            const col = edgeGeo.attributes.color.array;

            for (let e = 0; e < edges.length; e++) {
                const [a, b] = edges[e];
                const pa = projected3D[a];
                const pb = projected3D[b];

                pos[e * 6 + 0] = pa.x; pos[e * 6 + 1] = pa.y; pos[e * 6 + 2] = pa.z;
                pos[e * 6 + 3] = pb.x; pos[e * 6 + 4] = pb.y; pos[e * 6 + 5] = pb.z;

                // Edge brightness pulses based on average W coordinate
                const midW      = (rotatedW[a] + rotatedW[b]) * 0.5;
                const c         = wCoordToColor(midW);
                const wNorm     = (midW + 1.8) / 3.6;
                const pulse     = 0.7 + 0.3 * Math.sin(t * 3.0 + wNorm * Math.PI * 4);

                col[e * 6 + 0] = c.r * pulse; col[e * 6 + 1] = c.g * pulse; col[e * 6 + 2] = c.b * pulse;
                col[e * 6 + 3] = c.r * pulse; col[e * 6 + 4] = c.g * pulse; col[e * 6 + 5] = c.b * pulse;
            }

            edgeGeo.attributes.position.needsUpdate = true;
            edgeGeo.attributes.color.needsUpdate    = true;
            edgeGeo.computeBoundingSphere();

            // Update vertex sprites with W-based color and size
            for (let i = 0; i < 16; i++) {
                const p    = projected3D[i];
                const c    = wCoordToColor(rotatedW[i]);
                const wN   = (rotatedW[i] + 1.8) / 3.6;
                // Sprite size pulses with W position
                const sz   = 0.28 + 0.18 * Math.sin(t * 2.0 + wN * Math.PI * 3);

                vertexSprites[i].position.copy(p);
                vertexSprites[i].material.color.set(
                    new THREE.Color(Math.min(c.r * 3, 1), Math.min(c.g * 3, 1), Math.min(c.b * 3, 1))
                );
                vertexSprites[i].scale.set(sz, sz, 1);
            }

            // Trail update (every 2 frames to save perf)
            if (Math.round(t * 60) % 2 === 0) {
                updateTrail(projected3D);
            }

            // Electric arcs: update periodically
            arcTimer += dt;
            if (arcTimer > 0.18) {
                arcTimer = 0;
                pickArcPairs();
            }

            // Update arc curves
            for (let k = 0; k < ARC_COUNT; k++) {
                const { mesh, curve, tubeGeo } = arcMeshes[k];
                if (k < arcPairs.length) {
                    const { i, j } = arcPairs[k];
                    curve.from.copy(projected3D[i]);
                    curve.to.copy(projected3D[j]);
                    curve.time = t;

                    // Rebuild tube geometry with animated curve
                    tubeGeo.dispose();
                    const newGeo = new THREE.TubeGeometry(curve, 12, 0.010, 4, false);
                    mesh.geometry = newGeo;
                    arcMeshes[k].tubeGeo = newGeo;
                    mesh.visible = true;

                    // Pulse opacity
                    mesh.material.opacity = 0.3 + 0.4 * Math.abs(Math.sin(t * 8 + k));
                } else {
                    mesh.visible = false;
                }
            }

            controls.update();
            composer.render();
        }

        renderer.setAnimationLoop(animate);

        // -------------------------------------------------------
        // Resize handler
        // -------------------------------------------------------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            bloomPass.resolution.set(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
