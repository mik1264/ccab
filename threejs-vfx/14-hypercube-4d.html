<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4D Hypercube Projection | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }

        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #88aaff;
            text-decoration: none;
            z-index: 1000;
            font-size: 1rem;
            font-family: sans-serif;
            background: rgba(0, 0, 30, 0.7);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(100, 140, 255, 0.3);
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        .back-link:hover {
            background: rgba(10, 10, 60, 0.9);
            border-color: rgba(100, 140, 255, 0.7);
        }

        .title-overlay {
            position: fixed;
            top: 10px;
            right: 14px;
            color: rgba(140, 180, 255, 0.8);
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            pointer-events: none;
            line-height: 1.6;
            text-align: right;
        }

        .controls-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 220, 255, 0.9);
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            background: rgba(0, 0, 20, 0.75);
            padding: 14px 22px;
            border-radius: 12px;
            border: 1px solid rgba(100, 140, 255, 0.25);
            backdrop-filter: blur(8px);
            min-width: 320px;
            user-select: none;
        }
        .controls-panel label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 6px 0;
            white-space: nowrap;
        }
        .controls-panel input[type="range"] {
            flex: 1;
            accent-color: #88aaff;
            cursor: pointer;
        }
        .controls-panel .val {
            width: 38px;
            text-align: right;
            color: #aaccff;
        }
        .controls-panel .section-title {
            font-size: 0.68rem;
            letter-spacing: 0.15em;
            color: rgba(140, 180, 255, 0.5);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .legend {
            position: fixed;
            bottom: 20px;
            right: 18px;
            color: rgba(200, 220, 255, 0.75);
            font-family: 'Courier New', monospace;
            font-size: 0.72rem;
            line-height: 1.8;
            pointer-events: none;
        }
        .legend-bar {
            display: inline-block;
            width: 80px;
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(to right, #2266ff, #22ffcc, #aaff22, #ff8800, #ff2200);
            vertical-align: middle;
            margin-left: 6px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back</a>

    <div class="title-overlay">
        4D HYPERCUBE PROJECTION<br>
        <span style="opacity:0.5;font-size:0.65rem;">TESSERACT &mdash; 16 VERTICES &bull; 32 EDGES</span>
    </div>

    <div class="controls-panel">
        <div class="section-title">4D Rotation Controls</div>
        <label>
            XW Speed
            <input type="range" id="xwSpeed" min="-2" max="2" step="0.05" value="0.5">
            <span class="val" id="xwVal">0.50</span>
        </label>
        <label>
            YZ Speed
            <input type="range" id="yzSpeed" min="-2" max="2" step="0.05" value="0.3">
            <span class="val" id="yzVal">0.30</span>
        </label>
        <label>
            XY Speed
            <input type="range" id="xySpeed" min="-2" max="2" step="0.05" value="0.0">
            <span class="val" id="xyVal">0.00</span>
        </label>
        <label>
            W Distance
            <input type="range" id="wDist" min="1.5" max="5.0" step="0.1" value="2.5">
            <span class="val" id="wVal">2.50</span>
        </label>
    </div>

    <div class="legend">
        W-coordinate (4th dim)<br>
        Near &nbsp;&nbsp;&nbsp;<span class="legend-bar"></span>&nbsp;&nbsp;&nbsp; Far
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // -------------------------------------------------------
        // Scene setup
        // -------------------------------------------------------
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
        camera.position.set(0, 0, 5);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 2;
        controls.maxDistance = 18;

        // -------------------------------------------------------
        // Post-processing
        // -------------------------------------------------------
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            2.0,   // strength
            0.4,   // radius
            0.05   // threshold
        );
        composer.addPass(bloomPass);
        composer.addPass(new OutputPass());

        // -------------------------------------------------------
        // Starfield background
        // -------------------------------------------------------
        (function buildStars() {
            const N = 3000;
            const pos = new Float32Array(N * 3);
            const col = new Float32Array(N * 3);
            for (let i = 0; i < N; i++) {
                const r = 40 + Math.random() * 40;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
                pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i*3+2] = r * Math.cos(phi);
                const bright = 0.6 + Math.random() * 0.4;
                col[i*3] = bright;
                col[i*3+1] = bright;
                col[i*3+2] = bright + Math.random() * 0.2;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
            const mat = new THREE.PointsMaterial({ size: 0.06, vertexColors: true, sizeAttenuation: true });
            scene.add(new THREE.Points(geo, mat));
        })();

        // -------------------------------------------------------
        // 4D Tesseract data
        // -------------------------------------------------------

        // 16 vertices: all ±1 combinations in 4D
        const vertices4D = [];
        for (let i = 0; i < 16; i++) {
            vertices4D.push([
                (i & 1) ? 1 : -1,
                (i & 2) ? 1 : -1,
                (i & 4) ? 1 : -1,
                (i & 8) ? 1 : -1
            ]);
        }

        // 32 edges: pairs of vertices differing in exactly one coordinate
        const edges = [];
        for (let i = 0; i < 16; i++) {
            for (let j = i + 1; j < 16; j++) {
                let diff = 0;
                for (let k = 0; k < 4; k++) {
                    if (vertices4D[i][k] !== vertices4D[j][k]) diff++;
                }
                if (diff === 1) edges.push([i, j]);
            }
        }
        // Should be exactly 32 edges
        console.assert(edges.length === 32, `Expected 32 edges, got ${edges.length}`);

        // -------------------------------------------------------
        // 4D rotation + projection
        // -------------------------------------------------------

        function rotate4D(v, angleXW, angleYZ, angleXY) {
            let [x, y, z, w] = v;

            // XW plane rotation
            const cosXW = Math.cos(angleXW), sinXW = Math.sin(angleXW);
            let x1 = x * cosXW - w * sinXW;
            let w1 = x * sinXW + w * cosXW;
            x = x1; w = w1;

            // YZ plane rotation
            const cosYZ = Math.cos(angleYZ), sinYZ = Math.sin(angleYZ);
            let y1 = y * cosYZ - z * sinYZ;
            let z1 = y * sinYZ + z * cosYZ;
            y = y1; z = z1;

            // XY plane rotation
            const cosXY = Math.cos(angleXY), sinXY = Math.sin(angleXY);
            let x2 = x * cosXY - y * sinXY;
            let y2 = x * sinXY + y * cosXY;
            x = x2; y = y2;

            return [x, y, z, w];
        }

        // 4D perspective projection to 3D
        // wCamera: the viewer's position on the W axis
        function project4Dto3D(v, wCamera) {
            const [x, y, z, wCoord] = v;
            const denom = wCamera - wCoord;
            // Avoid division by zero / behind-camera
            const scale = Math.abs(denom) > 0.001 ? wCamera / denom : 0;
            return new THREE.Vector3(x * scale, y * scale, z * scale);
        }

        // Map a W-coordinate in [-1, 1] to a color (blue=near, red=far)
        // wCoord in [-1, 1] after rotation, wCamera > 1 so near means wCoord close to +wCamera side
        // We normalise wCoord to [0, 1] and map through a 5-stop rainbow
        function wCoordToColor(wCoord) {
            // wCoord ranges roughly -1.73 to +1.73 (diagonal of unit cube)
            const t = (wCoord + 1.8) / 3.6; // normalise to [0,1]
            const tc = Math.max(0, Math.min(1, t));

            // Gradient: blue(0) -> cyan(0.25) -> green(0.5) -> yellow(0.75) -> red(1)
            let r, g, b;
            if (tc < 0.25) {
                const s = tc / 0.25;
                r = 0.1;
                g = s * 0.9;
                b = 1.0;
            } else if (tc < 0.5) {
                const s = (tc - 0.25) / 0.25;
                r = 0.1 * (1 - s) + s * 0.1;
                g = 0.9;
                b = 1.0 * (1 - s);
            } else if (tc < 0.75) {
                const s = (tc - 0.5) / 0.25;
                r = 0.1 + s * 0.9;
                g = 0.9;
                b = 0;
            } else {
                const s = (tc - 0.75) / 0.25;
                r = 1.0;
                g = 0.9 * (1 - s);
                b = 0;
            }
            return new THREE.Color(r, g, b);
        }

        // -------------------------------------------------------
        // Edge line geometry (LineSegments with vertex colors)
        // -------------------------------------------------------
        const edgePositions = new Float32Array(edges.length * 2 * 3); // 2 verts per edge, 3 floats each
        const edgeColors    = new Float32Array(edges.length * 2 * 3);

        const edgeGeo = new THREE.BufferGeometry();
        edgeGeo.setAttribute('position', new THREE.BufferAttribute(edgePositions, 3));
        edgeGeo.setAttribute('color',    new THREE.BufferAttribute(edgeColors,    3));
        edgeGeo.attributes.position.usage = THREE.DynamicDrawUsage;
        edgeGeo.attributes.color.usage    = THREE.DynamicDrawUsage;

        const edgeMat = new THREE.LineBasicMaterial({
            vertexColors: true,
            linewidth: 1,
            transparent: true,
            opacity: 0.95
        });

        const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
        scene.add(edgeLines);

        // -------------------------------------------------------
        // Vertex spheres (16 glowing dots)
        // -------------------------------------------------------
        const spheres = [];
        const sphereGeo = new THREE.SphereGeometry(0.045, 12, 8);

        for (let i = 0; i < 16; i++) {
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const mesh = new THREE.Mesh(sphereGeo, mat);
            scene.add(mesh);
            spheres.push(mesh);
        }

        // -------------------------------------------------------
        // Inner cube glow lines (add faint inner structure)
        // -------------------------------------------------------
        // We'll draw a secondary set of lines at half opacity for depth cues
        // by connecting pairs of edges that form "inner" cube faces
        // (already included in the 32 edges above, so just use those)

        // -------------------------------------------------------
        // Axes helper (subtle)
        // -------------------------------------------------------
        const axisHelper = new THREE.AxesHelper(0.4);
        axisHelper.position.set(-2.5, -2.0, 0);
        axisHelper.material.opacity = 0.3;
        axisHelper.material.transparent = true;
        scene.add(axisHelper);

        // -------------------------------------------------------
        // UI bindings
        // -------------------------------------------------------
        let xwSpeed = 0.5;
        let yzSpeed = 0.3;
        let xySpeed = 0.0;
        let wDist   = 2.5;

        let angleXW = 0;
        let angleYZ = 0;
        let angleXY = 0;

        function bindSlider(id, valId, setter) {
            const slider = document.getElementById(id);
            const valEl  = document.getElementById(valId);
            slider.addEventListener('input', () => {
                const v = parseFloat(slider.value);
                setter(v);
                valEl.textContent = v.toFixed(2);
            });
        }

        bindSlider('xwSpeed', 'xwVal', v => { xwSpeed = v; });
        bindSlider('yzSpeed', 'yzVal', v => { yzSpeed = v; });
        bindSlider('xySpeed', 'xyVal', v => { xySpeed = v; });
        bindSlider('wDist',   'wVal',  v => { wDist = v; });

        // -------------------------------------------------------
        // Projected vertices cache
        // -------------------------------------------------------
        const projected3D = new Array(16);
        const rotatedW    = new Array(16); // store the W coord after rotation

        // -------------------------------------------------------
        // Animation loop
        // -------------------------------------------------------
        const clock = new THREE.Clock();

        function animate() {
            const dt = clock.getDelta();

            // Accumulate rotation angles
            angleXW += xwSpeed * dt;
            angleYZ += yzSpeed * dt;
            angleXY += xySpeed * dt;

            // Project all 16 vertices
            for (let i = 0; i < 16; i++) {
                const rot = rotate4D(vertices4D[i], angleXW, angleYZ, angleXY);
                rotatedW[i] = rot[3];
                projected3D[i] = project4Dto3D(rot, wDist);
            }

            // Update edge geometry
            const pos = edgeGeo.attributes.position.array;
            const col = edgeGeo.attributes.color.array;

            for (let e = 0; e < edges.length; e++) {
                const [a, b] = edges[e];
                const pa = projected3D[a];
                const pb = projected3D[b];

                // Positions
                pos[e * 6 + 0] = pa.x;
                pos[e * 6 + 1] = pa.y;
                pos[e * 6 + 2] = pa.z;
                pos[e * 6 + 3] = pb.x;
                pos[e * 6 + 4] = pb.y;
                pos[e * 6 + 5] = pb.z;

                // Color from midpoint W coordinate
                const midW = (rotatedW[a] + rotatedW[b]) * 0.5;
                const c = wCoordToColor(midW);

                col[e * 6 + 0] = c.r;
                col[e * 6 + 1] = c.g;
                col[e * 6 + 2] = c.b;
                col[e * 6 + 3] = c.r;
                col[e * 6 + 4] = c.g;
                col[e * 6 + 5] = c.b;
            }

            edgeGeo.attributes.position.needsUpdate = true;
            edgeGeo.attributes.color.needsUpdate    = true;
            edgeGeo.computeBoundingSphere();

            // Update sphere positions and colors
            for (let i = 0; i < 16; i++) {
                const p = projected3D[i];
                spheres[i].position.copy(p);
                const c = wCoordToColor(rotatedW[i]);
                // Boost brightness for bloom
                spheres[i].material.color.set(
                    new THREE.Color(
                        Math.min(c.r * 2.5, 1),
                        Math.min(c.g * 2.5, 1),
                        Math.min(c.b * 2.5, 1)
                    )
                );
            }

            controls.update();
            composer.render();
        }

        renderer.setAnimationLoop(animate);

        // -------------------------------------------------------
        // Resize handler
        // -------------------------------------------------------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            bloomPass.resolution.set(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
