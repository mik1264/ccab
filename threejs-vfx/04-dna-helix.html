<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Double Helix Particle Storm | Three.js VFX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
        }

        canvas {
            display: block;
        }

        /* Back link */
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 40px;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }
        .back-link:hover {
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
            transform: translateX(-2px);
        }
        .back-link .arrow {
            font-size: 16px;
            line-height: 1;
        }

        /* Info overlay */
        .info-panel {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }
        .info-panel h1 {
            font-family: 'Lora', serif;
            font-size: clamp(18px, 3vw, 28px);
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5), 0 0 40px rgba(255, 0, 255, 0.3);
            margin-bottom: 6px;
        }
        .info-panel p {
            font-family: 'Nunito', sans-serif;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
        }

        /* Legend */
        .legend {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.75);
            font-family: 'Nunito', sans-serif;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* FPS counter */
        .fps {
            position: fixed;
            bottom: 24px;
            right: 20px;
            z-index: 100;
            font-family: 'Nunito', sans-serif;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">
        <span class="arrow">←</span>
        <span>Three.js VFX</span>
    </a>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot" style="background:#00ffff; box-shadow:0 0 6px #00ffff;"></div>
            <span>Strand A (Cytosine-Guanine)</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#ff00ff; box-shadow:0 0 6px #ff00ff;"></div>
            <span>Strand B (Adenine-Thymine)</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#ffffff; box-shadow:0 0 6px #fff;"></div>
            <span>Base-Pair Rungs</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#aaff88; box-shadow:0 0 6px #88ff44;"></div>
            <span>Flowing Signal Particles</span>
        </div>
    </div>

    <div class="info-panel">
        <h1>DNA Double Helix Particle Storm</h1>
        <p>12,000 particles &nbsp;&bull;&nbsp; Bloom post-processing &nbsp;&bull;&nbsp; Custom GLSL shaders &nbsp;&bull;&nbsp; Drag to orbit</p>
    </div>

    <div class="fps" id="fps">-- FPS</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ─── Constants ───────────────────────────────────────────────────────────────
        const STRAND_N       = 5000;   // particles per strand
        const HELIX_RADIUS   = 2.0;
        const HELIX_HEIGHT   = 30.0;
        const RUNG_SPACING   = 50;     // every Nth strand particle gets a rung
        const RUNG_PARTICLES = 5;      // points per rung bridge
        const FLOW_N         = 2000;   // flowing signal particles
        const HELIX_TURNS    = 10;     // full turns over the height

        // ─── Scene / Camera / Renderer ────────────────────────────────────────────
        const scene    = new THREE.Scene();
        scene.background = new THREE.Color(0x000005);
        scene.fog        = new THREE.FogExp2(0x000005, 0.012);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(8, 5, 14);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ─── Orbit Controls ───────────────────────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping  = true;
        controls.dampingFactor  = 0.06;
        controls.autoRotate     = true;
        controls.autoRotateSpeed = 0.5;
        controls.minDistance    = 5;
        controls.maxDistance    = 60;

        // ─── Post-processing ──────────────────────────────────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5,   // strength
            0.4,   // radius
            0.1    // threshold
        );
        composer.addPass(bloomPass);
        composer.addPass(new OutputPass());

        // ─── Custom Particle ShaderMaterial ───────────────────────────────────────
        const particleVertexShader = /* glsl */`
            attribute float aSize;
            attribute float aAlpha;
            attribute vec3  aColor;

            varying vec3  vColor;
            varying float vAlpha;

            void main() {
                vColor = aColor;
                vAlpha = aAlpha;

                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                // Size attenuates with distance; base size scaled by aSize
                gl_PointSize = aSize * (300.0 / -mvPosition.z);
                gl_Position  = projectionMatrix * mvPosition;
            }
        `;

        const particleFragmentShader = /* glsl */`
            varying vec3  vColor;
            varying float vAlpha;

            void main() {
                // Circular sprite — discard corners
                vec2  cxy = 2.0 * gl_PointCoord - 1.0;
                float r   = dot(cxy, cxy);
                if (r > 1.0) discard;

                // Soft glow falloff
                float alpha = (1.0 - r) * vAlpha;
                // Bright core
                float core  = pow(1.0 - r, 3.0) * 0.6;
                vec3  col   = vColor + vec3(core);

                gl_FragColor = vec4(col, alpha);
            }
        `;

        function makeMaterial() {
            return new THREE.ShaderMaterial({
                vertexShader:   particleVertexShader,
                fragmentShader: particleFragmentShader,
                transparent:    true,
                depthWrite:     false,
                blending:       THREE.AdditiveBlending,
                vertexColors:   false,
            });
        }

        // ─── Helper: build a BufferGeometry from raw arrays ──────────────────────
        function buildGeometry(positions, sizes, alphas, colors) {
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.setAttribute('aSize',    new THREE.Float32BufferAttribute(sizes,     1));
            geo.setAttribute('aAlpha',   new THREE.Float32BufferAttribute(alphas,    1));
            geo.setAttribute('aColor',   new THREE.Float32BufferAttribute(colors,    3));
            return geo;
        }

        // ─── Helper: helix position at parameter index i ─────────────────────────
        //   t goes 0 → 2π × HELIX_TURNS as i goes 0 → STRAND_N
        function helixPos(i, phaseOffset, N) {
            const t    = (i / N) * Math.PI * 2 * HELIX_TURNS + phaseOffset;
            const y    = (i / N) * HELIX_HEIGHT - HELIX_HEIGHT * 0.5;
            const x    = HELIX_RADIUS * Math.cos(t);
            const z    = HELIX_RADIUS * Math.sin(t);
            return { x, y, z, t };
        }

        // ─── DNA Group (everything rotates together) ──────────────────────────────
        const dnaGroup = new THREE.Group();
        scene.add(dnaGroup);

        // ── Strand A: Cyan ────────────────────────────────────────────────────────
        {
            const N   = STRAND_N;
            const pos = new Float32Array(N * 3);
            const siz = new Float32Array(N);
            const alp = new Float32Array(N);
            const col = new Float32Array(N * 3);
            const cyanR = 0.0, cyanG = 1.0, cyanB = 1.0;

            for (let i = 0; i < N; i++) {
                const { x, y, z } = helixPos(i, 0, N);
                pos[i * 3]     = x;
                pos[i * 3 + 1] = y;
                pos[i * 3 + 2] = z;

                // Size varies with a subtle wave along the strand
                const wave = 0.5 + 0.5 * Math.sin(i / N * Math.PI * 20);
                siz[i] = 1.8 + wave * 1.2;
                alp[i] = 0.7 + wave * 0.3;

                col[i * 3]     = cyanR;
                col[i * 3 + 1] = cyanG;
                col[i * 3 + 2] = cyanB;
            }

            const geo = buildGeometry(pos, siz, alp, col);
            const mat = makeMaterial();
            dnaGroup.add(new THREE.Points(geo, mat));
        }

        // ── Strand B: Magenta (phase offset π) ───────────────────────────────────
        {
            const N   = STRAND_N;
            const pos = new Float32Array(N * 3);
            const siz = new Float32Array(N);
            const alp = new Float32Array(N);
            const col = new Float32Array(N * 3);
            const magR = 1.0, magG = 0.0, magB = 1.0;

            for (let i = 0; i < N; i++) {
                const { x, y, z } = helixPos(i, Math.PI, N);
                pos[i * 3]     = x;
                pos[i * 3 + 1] = y;
                pos[i * 3 + 2] = z;

                const wave = 0.5 + 0.5 * Math.sin(i / N * Math.PI * 20 + 1.5);
                siz[i] = 1.8 + wave * 1.2;
                alp[i] = 0.7 + wave * 0.3;

                col[i * 3]     = magR;
                col[i * 3 + 1] = magG;
                col[i * 3 + 2] = magB;
            }

            const geo = buildGeometry(pos, siz, alp, col);
            const mat = makeMaterial();
            dnaGroup.add(new THREE.Points(geo, mat));
        }

        // ── Rungs: White particles connecting the two strands ─────────────────────
        {
            const rungCount = Math.floor(STRAND_N / RUNG_SPACING);
            const totalRung = rungCount * RUNG_PARTICLES;

            const pos = new Float32Array(totalRung * 3);
            const siz = new Float32Array(totalRung);
            const alp = new Float32Array(totalRung);
            const col = new Float32Array(totalRung * 3);

            let idx = 0;
            for (let ri = 0; ri < rungCount; ri++) {
                const i  = ri * RUNG_SPACING;
                const pA = helixPos(i, 0,       STRAND_N);
                const pB = helixPos(i, Math.PI, STRAND_N);

                for (let p = 0; p < RUNG_PARTICLES; p++) {
                    const t = p / (RUNG_PARTICLES - 1);
                    pos[idx * 3]     = pA.x + (pB.x - pA.x) * t;
                    pos[idx * 3 + 1] = pA.y + (pB.y - pA.y) * t;
                    pos[idx * 3 + 2] = pA.z + (pB.z - pA.z) * t;

                    // Middle rung particles are slightly larger / brighter
                    const mid = 1.0 - Math.abs(t - 0.5) * 2.0;
                    siz[idx] = 1.2 + mid * 1.0;
                    alp[idx] = 0.5 + mid * 0.5;

                    col[idx * 3]     = 1.0;
                    col[idx * 3 + 1] = 1.0;
                    col[idx * 3 + 2] = 1.0;
                    idx++;
                }
            }

            const geo = buildGeometry(pos, siz, alp, col);
            const mat = makeMaterial();
            dnaGroup.add(new THREE.Points(geo, mat));
        }

        // ── Flowing signal particles (animated) ───────────────────────────────────
        //   Each particle has a t-offset that advances over time.
        //   They stream along both strands simultaneously.
        const FLOW_HALF = FLOW_N / 2;

        // Store per-particle offset (0→1 along the strand)
        const flowOffset = new Float32Array(FLOW_N);
        for (let i = 0; i < FLOW_N; i++) {
            flowOffset[i] = Math.random(); // initial spread
        }

        const flowPos = new Float32Array(FLOW_N * 3);
        const flowSiz = new Float32Array(FLOW_N);
        const flowAlp = new Float32Array(FLOW_N);
        const flowCol = new Float32Array(FLOW_N * 3);

        // Pre-fill colors: first half green-ish cyan, second half warm magenta
        for (let i = 0; i < FLOW_HALF; i++) {
            flowCol[i * 3]     = 0.4;
            flowCol[i * 3 + 1] = 1.0;
            flowCol[i * 3 + 2] = 0.53;
        }
        for (let i = FLOW_HALF; i < FLOW_N; i++) {
            flowCol[i * 3]     = 1.0;
            flowCol[i * 3 + 1] = 0.6;
            flowCol[i * 3 + 2] = 0.0;
        }

        const flowGeo = buildGeometry(flowPos, flowSiz, flowAlp, flowCol);
        const flowMat = makeMaterial();
        const flowPoints = new THREE.Points(flowGeo, flowMat);
        dnaGroup.add(flowPoints);

        // ─── Ambient background star field ────────────────────────────────────────
        {
            const N   = 800;
            const pos = new Float32Array(N * 3);
            const siz = new Float32Array(N);
            const alp = new Float32Array(N);
            const col = new Float32Array(N * 3);

            for (let i = 0; i < N; i++) {
                // Random sphere distribution, far away
                const theta = Math.random() * Math.PI * 2;
                const phi   = Math.acos(2 * Math.random() - 1);
                const r     = 30 + Math.random() * 30;
                pos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
                pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i * 3 + 2] = r * Math.cos(phi);
                siz[i] = 0.4 + Math.random() * 0.8;
                alp[i] = 0.2 + Math.random() * 0.4;
                col[i * 3]     = 0.8 + Math.random() * 0.2;
                col[i * 3 + 1] = 0.8 + Math.random() * 0.2;
                col[i * 3 + 2] = 0.9 + Math.random() * 0.1;
            }

            const geo = buildGeometry(pos, siz, alp, col);
            const mat = makeMaterial();
            scene.add(new THREE.Points(geo, mat));   // not part of dnaGroup — fixed
        }

        // ─── FPS tracking ─────────────────────────────────────────────────────────
        const fpsEl    = document.getElementById('fps');
        let   lastTime = performance.now();
        let   frames   = 0;

        // ─── Animation Loop ───────────────────────────────────────────────────────
        const clock = new THREE.Clock();

        function updateFlowParticles(elapsed) {
            const speed = 0.08; // fraction of helix height per second

            for (let i = 0; i < FLOW_N; i++) {
                // Advance offset; wrap around
                flowOffset[i] = (flowOffset[i] + speed * clock.getDelta() * 0.016) % 1.0;
            }

            // Recalculate using elapsed time — simpler than per-frame delta inside loop
            for (let i = 0; i < FLOW_N; i++) {
                const frac  = (flowOffset[i] + elapsed * speed) % 1.0;
                const iPos  = frac * STRAND_N;
                const phase = i < FLOW_HALF ? 0 : Math.PI;
                const { x, y, z } = helixPos(iPos, phase, STRAND_N);

                flowPos[i * 3]     = x;
                flowPos[i * 3 + 1] = y;
                flowPos[i * 3 + 2] = z;

                // Size pulses as particle flows
                const pulse = 0.5 + 0.5 * Math.sin(frac * Math.PI * 40 + elapsed * 4.0);
                flowSiz[i] = 2.2 + pulse * 2.0;
                flowAlp[i] = 0.6 + pulse * 0.4;
            }

            flowGeo.attributes.position.needsUpdate = true;
            flowGeo.attributes.aSize.needsUpdate    = true;
            flowGeo.attributes.aAlpha.needsUpdate   = true;
        }

        function animate() {
            const elapsed = clock.getElapsedTime();

            // Slowly rotate the whole DNA structure around Y
            dnaGroup.rotation.y = elapsed * 0.12;

            // Update flowing particles
            updateFlowParticles(elapsed);

            // Orbit controls
            controls.update();

            // Render with bloom
            composer.render();

            // FPS
            frames++;
            const now = performance.now();
            if (now - lastTime >= 500) {
                fpsEl.textContent = Math.round(frames / ((now - lastTime) / 1000)) + ' FPS';
                frames   = 0;
                lastTime = now;
            }
        }

        renderer.setAnimationLoop(animate);

        // ─── Resize handler ───────────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;

            camera.aspect = w / h;
            camera.updateProjectionMatrix();

            renderer.setSize(w, h);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            composer.setSize(w, h);
            bloomPass.resolution.set(w, h);
        });
    </script>
</body>
</html>
