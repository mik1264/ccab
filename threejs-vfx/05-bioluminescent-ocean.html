<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioluminescent Particle Ocean</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        #info {
            position: fixed;
            bottom: 16px;
            right: 16px;
            color: rgba(0, 200, 200, 0.6);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            text-align: right;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-family:sans-serif;background:rgba(0,0,0,0.5);padding:6px 14px;border-radius:20px;">← Back</a>
    <div id="info">Bioluminescent Ocean &nbsp;|&nbsp; 500K particles</div>

    <script type="importmap">
    {"imports": {"three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"}}
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ─── Scene ───────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000a0a, 0.018);

    // ─── Camera ───────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 300);
    camera.position.set(0, 2.2, 60);
    camera.lookAt(0, 0, 0);

    // ─── Renderer ─────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    // ─── Post-processing ──────────────────────────────────────────────────────
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(innerWidth, innerHeight),
        2.0,   // strength
        0.5,   // radius
        0.05   // threshold
    );
    composer.addPass(bloomPass);
    composer.addPass(new OutputPass());

    // ─── Wave height function ─────────────────────────────────────────────────
    function waveHeight(x, z, time) {
        return Math.sin(x * 0.3 + time) * 0.4
             + Math.sin(z * 0.2 + time * 0.8) * 0.6
             + Math.sin((x + z) * 0.15 + time * 1.2) * 0.3
             + Math.sin(x * 0.05 - z * 0.07 + time * 0.5) * 1.0;
    }

    // ─── Ocean Particles ──────────────────────────────────────────────────────
    const GRID = 707; // 707*707 ≈ 499,849 ≈ 500K
    const SPAN = 700;
    const HALF = SPAN / 2;
    const COUNT = GRID * GRID;

    const positions = new Float32Array(COUNT * 3);
    const colors    = new Float32Array(COUNT * 3);

    // Pre-calculate x,z so we only recompute y each frame
    const baseX = new Float32Array(COUNT);
    const baseZ = new Float32Array(COUNT);

    let idx = 0;
    for (let i = 0; i < GRID; i++) {
        for (let j = 0; j < GRID; j++) {
            const x = (i / (GRID - 1)) * SPAN - HALF;
            const z = (j / (GRID - 1)) * SPAN - HALF;
            baseX[idx] = x;
            baseZ[idx] = z;
            positions[idx * 3]     = x;
            positions[idx * 3 + 1] = 0;
            positions[idx * 3 + 2] = z;
            idx++;
        }
    }

    const oceanGeo = new THREE.BufferGeometry();
    oceanGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    oceanGeo.setAttribute('color',    new THREE.BufferAttribute(colors,    3));

    const oceanMat = new THREE.PointsMaterial({
        size: 0.05,
        sizeAttenuation: true,
        vertexColors: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        transparent: true,
    });

    const ocean = new THREE.Points(oceanGeo, oceanMat);
    scene.add(ocean);

    // Color helpers
    const deepTeal   = new THREE.Color('#004444');
    const midCyan    = new THREE.Color('#00cccc');
    const brightCyan = new THREE.Color('#00ffff');
    const white      = new THREE.Color('#ffffff');
    const tmpColor   = new THREE.Color();

    // ─── Bioluminescent Organisms (rising particles) ──────────────────────────
    const ORG_COUNT = 800;
    const orgPositions = new Float32Array(ORG_COUNT * 3);
    const orgColors    = new Float32Array(ORG_COUNT * 3);
    const orgVelocity  = new Float32Array(ORG_COUNT); // upward speed
    const orgPhase     = new Float32Array(ORG_COUNT); // horizontal sway phase

    for (let i = 0; i < ORG_COUNT; i++) {
        orgPositions[i * 3]     = (Math.random() - 0.5) * SPAN;
        orgPositions[i * 3 + 1] = Math.random() * 8;
        orgPositions[i * 3 + 2] = (Math.random() - 0.5) * SPAN;
        orgVelocity[i]  = 0.005 + Math.random() * 0.015;
        orgPhase[i]     = Math.random() * Math.PI * 2;

        // Warm blue-green glow
        const hue = 0.45 + Math.random() * 0.15;
        tmpColor.setHSL(hue, 1, 0.7 + Math.random() * 0.3);
        orgColors[i * 3]     = tmpColor.r;
        orgColors[i * 3 + 1] = tmpColor.g;
        orgColors[i * 3 + 2] = tmpColor.b;
    }

    const orgGeo = new THREE.BufferGeometry();
    orgGeo.setAttribute('position', new THREE.BufferAttribute(orgPositions, 3));
    orgGeo.setAttribute('color',    new THREE.BufferAttribute(orgColors,    3));

    const orgMat = new THREE.PointsMaterial({
        size: 0.15,
        sizeAttenuation: true,
        vertexColors: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        transparent: true,
    });

    const organisms = new THREE.Points(orgGeo, orgMat);
    scene.add(organisms);

    // ─── Stars ────────────────────────────────────────────────────────────────
    const STAR_COUNT = 1200;
    const starPositions = new Float32Array(STAR_COUNT * 3);
    for (let i = 0; i < STAR_COUNT; i++) {
        starPositions[i * 3]     = (Math.random() - 0.5) * 600;
        starPositions[i * 3 + 1] = 15 + Math.random() * 100;
        starPositions[i * 3 + 2] = (Math.random() - 0.5) * 600;
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMat = new THREE.PointsMaterial({
        size: 0.25,
        color: 0xaaddff,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        transparent: true,
        opacity: 0.7,
    });
    scene.add(new THREE.Points(starGeo, starMat));

    // ─── Animation ────────────────────────────────────────────────────────────
    let time = 0;
    const WRAP_Z = SPAN / 2;

    // Vertical camera bob
    let camBobPhase = 0;

    function animate() {
        time += 0.008;
        camBobPhase += 0.005;

        // --- Update ocean particle positions and colors ---
        const pos = oceanGeo.attributes.position.array;
        const col = oceanGeo.attributes.color.array;

        for (let i = 0; i < COUNT; i++) {
            const x = baseX[i];
            const z = baseZ[i];
            const y = waveHeight(x, z, time);
            pos[i * 3 + 1] = y;

            // Normalize height for color mapping: typical range [-2.3, 2.3]
            const t = (y + 2.3) / 4.6; // 0=trough, 1=crest
            const tc = Math.max(0, Math.min(1, t));

            if (tc < 0.45) {
                // Deep teal → mid cyan
                tmpColor.copy(deepTeal).lerp(midCyan, tc / 0.45);
            } else if (tc < 0.80) {
                // Mid cyan → bright cyan
                tmpColor.copy(midCyan).lerp(brightCyan, (tc - 0.45) / 0.35);
            } else {
                // Bright cyan → white sparkle
                tmpColor.copy(brightCyan).lerp(white, (tc - 0.80) / 0.20);
            }

            col[i * 3]     = tmpColor.r;
            col[i * 3 + 1] = tmpColor.g;
            col[i * 3 + 2] = tmpColor.b;
        }

        oceanGeo.attributes.position.needsUpdate = true;
        oceanGeo.attributes.color.needsUpdate    = true;

        // --- Update organisms ---
        const op = orgGeo.attributes.position.array;
        for (let i = 0; i < ORG_COUNT; i++) {
            op[i * 3 + 1] += orgVelocity[i];
            // Gentle sway
            op[i * 3]     += Math.sin(time * 2.3 + orgPhase[i]) * 0.005;

            // Surface "birth" height based on local wave
            const sx = op[i * 3];
            const sz = op[i * 3 + 2];
            const surfaceY = waveHeight(sx, sz, time);
            const maxHeight = surfaceY + 7 + Math.random() * 2;

            if (op[i * 3 + 1] > maxHeight) {
                // Reset to below surface
                op[i * 3]     = (Math.random() - 0.5) * SPAN;
                op[i * 3 + 1] = surfaceY - 0.2;
                op[i * 3 + 2] = (Math.random() - 0.5) * SPAN;
            }
        }
        orgGeo.attributes.position.needsUpdate = true;

        // --- Camera fly-through ---
        camera.position.z -= 0.05;

        // Wrap camera Z so the ocean appears endless
        if (camera.position.z < -WRAP_Z) {
            camera.position.z += SPAN;
        }

        // Subtle vertical bob and gentle pan
        camera.position.y = 2.2 + Math.sin(camBobPhase) * 0.3;
        camera.position.x = Math.sin(camBobPhase * 0.4) * 5;

        // Look slightly ahead and slightly downward for immersive angle
        camera.lookAt(
            camera.position.x + Math.sin(camBobPhase * 0.3) * 2,
            0.5,
            camera.position.z - 20
        );

        composer.render();
    }

    renderer.setAnimationLoop(animate);

    // ─── Resize ───────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
        composer.setSize(innerWidth, innerHeight);
        bloomPass.resolution.set(innerWidth, innerHeight);
    });
    </script>
</body>
</html>
