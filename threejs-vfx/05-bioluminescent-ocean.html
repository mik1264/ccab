<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioluminescent Particle Ocean</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        #info {
            position: fixed;
            bottom: 16px;
            right: 16px;
            color: rgba(0, 200, 200, 0.6);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            text-align: right;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-family:sans-serif;background:rgba(0,0,0,0.5);padding:6px 14px;border-radius:20px;">← Back</a>
    <div id="info">Bioluminescent Ocean &nbsp;|&nbsp; 505K particles &nbsp;|&nbsp; Gaussian Glow</div>

    <script type="importmap">
    {"imports": {"three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"}}
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ─── Scene ───────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000a0a, 0.018);

    // ─── Camera ───────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 300);
    camera.position.set(0, 2.2, 60);
    camera.lookAt(0, 0, 0);

    // ─── Renderer ─────────────────────────────────────────────────────────────
    // antialias: true for crisp glow edges
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    // ─── Post-processing ──────────────────────────────────────────────────────
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(innerWidth, innerHeight),
        2.0,   // strength
        0.5,   // radius
        0.05   // threshold
    );
    composer.addPass(bloomPass);
    composer.addPass(new OutputPass());

    // ─── Gaussian Glow ShaderMaterial factory ─────────────────────────────────
    // Includes depth-fade: particles far from camera fade out gradually.
    // Per-particle brightness (brt attribute) modulates the glow intensity.
    const oceanVertexShader = `
        attribute float size;
        attribute vec3 color;
        attribute float brt;
        varying vec3 vColor;
        varying float vBrt;
        varying float vDepthFade;
        void main() {
            vColor = color;
            vBrt   = brt;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            // Depth fade: full at -10, fading toward -200
            float depth = -mvPosition.z;
            vDepthFade = clamp(1.0 - (depth - 10.0) / 180.0, 0.0, 1.0);
            gl_PointSize = size * (350.0 / depth);
            gl_Position = projectionMatrix * mvPosition;
        }
    `;

    const oceanFragmentShader = `
        varying vec3 vColor;
        varying float vBrt;
        varying float vDepthFade;
        void main() {
            vec2 uv = gl_PointCoord - 0.5;
            float d = length(uv);
            if (d > 0.5) discard;
            // Soft gaussian glow
            float alpha = exp(-d * d * 6.0) * 0.92 * vDepthFade;
            // Bright core weighted by per-particle brightness
            float core = exp(-d * d * 80.0) * vBrt;
            vec3 col = vColor + core * 0.9;
            gl_FragColor = vec4(col, alpha);
        }
    `;

    function makeOceanMaterial() {
        return new THREE.ShaderMaterial({
            vertexShader:   oceanVertexShader,
            fragmentShader: oceanFragmentShader,
            blending:       THREE.AdditiveBlending,
            depthWrite:     false,
            transparent:    true,
            vertexColors:   false,
        });
    }

    // ─── Wave height function ─────────────────────────────────────────────────
    function waveHeight(x, z, time) {
        return Math.sin(x * 0.3 + time) * 0.4
             + Math.sin(z * 0.2 + time * 0.8) * 0.6
             + Math.sin((x + z) * 0.15 + time * 1.2) * 0.3
             + Math.sin(x * 0.05 - z * 0.07 + time * 0.5) * 1.0;
    }

    // Simple noise-like value for brightness variation (cheaper than Perlin)
    function noiseVal(x, z, time) {
        return 0.5 + 0.5 * Math.sin(x * 0.8 + time * 1.3)
                   * Math.cos(z * 0.6 - time * 0.9);
    }

    // ─── Ocean Particles ──────────────────────────────────────────────────────
    const GRID = 707;
    const SPAN = 700;
    const HALF = SPAN / 2;
    const COUNT = GRID * GRID;

    const positions  = new Float32Array(COUNT * 3);
    const colors     = new Float32Array(COUNT * 3);
    const sizes      = new Float32Array(COUNT);
    const brts       = new Float32Array(COUNT);   // per-particle brightness

    const baseX = new Float32Array(COUNT);
    const baseZ = new Float32Array(COUNT);

    let idx = 0;
    for (let i = 0; i < GRID; i++) {
        for (let j = 0; j < GRID; j++) {
            const x = (i / (GRID - 1)) * SPAN - HALF;
            const z = (j / (GRID - 1)) * SPAN - HALF;
            baseX[idx] = x;
            baseZ[idx] = z;
            positions[idx * 3]     = x;
            positions[idx * 3 + 1] = 0;
            positions[idx * 3 + 2] = z;
            // Size variation: mostly uniform with occasional larger sparks
            sizes[idx] = 0.04 + Math.random() * 0.06;
            brts[idx]  = 0.3 + Math.random() * 0.7;
            idx++;
        }
    }

    const oceanGeo = new THREE.BufferGeometry();
    oceanGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    oceanGeo.setAttribute('color',    new THREE.BufferAttribute(colors,    3));
    oceanGeo.setAttribute('size',     new THREE.BufferAttribute(sizes,     1));
    oceanGeo.setAttribute('brt',      new THREE.BufferAttribute(brts,      1));

    const oceanMat = makeOceanMaterial();
    const ocean = new THREE.Points(oceanGeo, oceanMat);
    scene.add(ocean);

    // Color helpers
    const deepTeal   = new THREE.Color('#004444');
    const midCyan    = new THREE.Color('#00cccc');
    const brightCyan = new THREE.Color('#00ffff');
    const white      = new THREE.Color('#ffffff');
    const tmpColor   = new THREE.Color();

    // ─── Small bioluminescent organisms (rising) — Gaussian glow ─────────────
    const ORG_COUNT = 800;
    const orgPositions = new Float32Array(ORG_COUNT * 3);
    const orgColors    = new Float32Array(ORG_COUNT * 3);
    const orgSizes     = new Float32Array(ORG_COUNT);
    const orgBrts      = new Float32Array(ORG_COUNT);
    const orgVelocity  = new Float32Array(ORG_COUNT);
    const orgPhase     = new Float32Array(ORG_COUNT);

    for (let i = 0; i < ORG_COUNT; i++) {
        orgPositions[i * 3]     = (Math.random() - 0.5) * SPAN;
        orgPositions[i * 3 + 1] = Math.random() * 8;
        orgPositions[i * 3 + 2] = (Math.random() - 0.5) * SPAN;
        orgVelocity[i]  = 0.005 + Math.random() * 0.015;
        orgPhase[i]     = Math.random() * Math.PI * 2;

        const hue = 0.45 + Math.random() * 0.15;
        tmpColor.setHSL(hue, 1, 0.7 + Math.random() * 0.3);
        orgColors[i * 3]     = tmpColor.r;
        orgColors[i * 3 + 1] = tmpColor.g;
        orgColors[i * 3 + 2] = tmpColor.b;

        orgSizes[i] = 0.10 + Math.random() * 0.12;
        orgBrts[i]  = 0.8 + Math.random() * 0.2;
    }

    const orgGeo = new THREE.BufferGeometry();
    orgGeo.setAttribute('position', new THREE.BufferAttribute(orgPositions, 3));
    orgGeo.setAttribute('color',    new THREE.BufferAttribute(orgColors,    3));
    orgGeo.setAttribute('size',     new THREE.BufferAttribute(orgSizes,     1));
    orgGeo.setAttribute('brt',      new THREE.BufferAttribute(orgBrts,      1));

    const organisms = new THREE.Points(orgGeo, makeOceanMaterial());
    scene.add(organisms);

    // ─── Large glowing organisms (5K, 3-5x size, near surface) ───────────────
    const LARGE_ORG_COUNT = 5000;
    const lgPositions = new Float32Array(LARGE_ORG_COUNT * 3);
    const lgColors    = new Float32Array(LARGE_ORG_COUNT * 3);
    const lgSizes     = new Float32Array(LARGE_ORG_COUNT);
    const lgBrts      = new Float32Array(LARGE_ORG_COUNT);
    const lgVelocity  = new Float32Array(LARGE_ORG_COUNT);
    const lgPhase     = new Float32Array(LARGE_ORG_COUNT);

    for (let i = 0; i < LARGE_ORG_COUNT; i++) {
        lgPositions[i * 3]     = (Math.random() - 0.5) * SPAN;
        // Near surface: -1 to +5 above mean sea level
        lgPositions[i * 3 + 1] = -1 + Math.random() * 6;
        lgPositions[i * 3 + 2] = (Math.random() - 0.5) * SPAN;
        lgVelocity[i]  = 0.002 + Math.random() * 0.006;  // slower rise
        lgPhase[i]     = Math.random() * Math.PI * 2;

        // Varied bioluminescent colors: cyan, blue, green, purple
        const hue = 0.4 + Math.random() * 0.3;  // 0.4-0.7
        tmpColor.setHSL(hue, 1.0, 0.6 + Math.random() * 0.25);
        lgColors[i * 3]     = tmpColor.r;
        lgColors[i * 3 + 1] = tmpColor.g;
        lgColors[i * 3 + 2] = tmpColor.b;

        // 3-5x size of small organisms
        lgSizes[i] = 0.18 + Math.random() * 0.30;
        lgBrts[i]  = 0.9 + Math.random() * 0.1;
    }

    const lgGeo = new THREE.BufferGeometry();
    lgGeo.setAttribute('position', new THREE.BufferAttribute(lgPositions, 3));
    lgGeo.setAttribute('color',    new THREE.BufferAttribute(lgColors,    3));
    lgGeo.setAttribute('size',     new THREE.BufferAttribute(lgSizes,     1));
    lgGeo.setAttribute('brt',      new THREE.BufferAttribute(lgBrts,      1));

    const largeOrgs = new THREE.Points(lgGeo, makeOceanMaterial());
    scene.add(largeOrgs);

    // ─── Stars (gaussian glow) ────────────────────────────────────────────────
    const STAR_COUNT = 1200;
    const starPositions = new Float32Array(STAR_COUNT * 3);
    const starColors    = new Float32Array(STAR_COUNT * 3);
    const starSizes     = new Float32Array(STAR_COUNT);
    const starBrts      = new Float32Array(STAR_COUNT);

    for (let i = 0; i < STAR_COUNT; i++) {
        starPositions[i * 3]     = (Math.random() - 0.5) * 600;
        starPositions[i * 3 + 1] = 15 + Math.random() * 100;
        starPositions[i * 3 + 2] = (Math.random() - 0.5) * 600;

        // Blue-white star colors
        tmpColor.setHSL(0.6 + Math.random() * 0.1, 0.3, 0.6 + Math.random() * 0.4);
        starColors[i * 3]     = tmpColor.r;
        starColors[i * 3 + 1] = tmpColor.g;
        starColors[i * 3 + 2] = tmpColor.b;

        starSizes[i] = 0.08 + Math.random() * 0.15;
        starBrts[i]  = 0.4 + Math.random() * 0.6;
    }

    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    starGeo.setAttribute('color',    new THREE.BufferAttribute(starColors,    3));
    starGeo.setAttribute('size',     new THREE.BufferAttribute(starSizes,     1));
    starGeo.setAttribute('brt',      new THREE.BufferAttribute(starBrts,      1));

    scene.add(new THREE.Points(starGeo, makeOceanMaterial()));

    // ─── Animation ────────────────────────────────────────────────────────────
    let time = 0;
    const WRAP_Z = SPAN / 2;
    let camBobPhase = 0;

    function animate() {
        time += 0.008;
        camBobPhase += 0.005;

        // --- Update ocean particle positions and colors ---
        const pos = oceanGeo.attributes.position.array;
        const col = oceanGeo.attributes.color.array;
        const brtArr = oceanGeo.attributes.brt.array;

        for (let i = 0; i < COUNT; i++) {
            const x = baseX[i];
            const z = baseZ[i];
            const y = waveHeight(x, z, time);
            pos[i * 3 + 1] = y;

            const t = (y + 2.3) / 4.6;
            const tc = Math.max(0, Math.min(1, t));

            if (tc < 0.45) {
                tmpColor.copy(deepTeal).lerp(midCyan, tc / 0.45);
            } else if (tc < 0.80) {
                tmpColor.copy(midCyan).lerp(brightCyan, (tc - 0.45) / 0.35);
            } else {
                tmpColor.copy(brightCyan).lerp(white, (tc - 0.80) / 0.20);
            }

            col[i * 3]     = tmpColor.r;
            col[i * 3 + 1] = tmpColor.g;
            col[i * 3 + 2] = tmpColor.b;

            // Per-particle brightness driven by noise at this position
            brtArr[i] = 0.2 + 0.8 * noiseVal(x * 0.1, z * 0.1, time * 0.5) * tc;
        }

        oceanGeo.attributes.position.needsUpdate = true;
        oceanGeo.attributes.color.needsUpdate    = true;
        oceanGeo.attributes.brt.needsUpdate      = true;

        // --- Update small organisms ---
        const op = orgGeo.attributes.position.array;
        for (let i = 0; i < ORG_COUNT; i++) {
            op[i * 3 + 1] += orgVelocity[i];
            op[i * 3]     += Math.sin(time * 2.3 + orgPhase[i]) * 0.005;

            const sx = op[i * 3];
            const sz = op[i * 3 + 2];
            const surfaceY = waveHeight(sx, sz, time);
            const maxHeight = surfaceY + 7 + Math.random() * 2;

            if (op[i * 3 + 1] > maxHeight) {
                op[i * 3]     = (Math.random() - 0.5) * SPAN;
                op[i * 3 + 1] = surfaceY - 0.2;
                op[i * 3 + 2] = (Math.random() - 0.5) * SPAN;
            }
        }
        orgGeo.attributes.position.needsUpdate = true;

        // --- Update large organisms ---
        const lp = lgGeo.attributes.position.array;
        const lb = lgGeo.attributes.brt.array;
        for (let i = 0; i < LARGE_ORG_COUNT; i++) {
            lp[i * 3 + 1] += lgVelocity[i];
            // Gentle drift
            lp[i * 3]     += Math.sin(time * 1.5 + lgPhase[i]) * 0.003;
            lp[i * 3 + 2] += Math.cos(time * 1.1 + lgPhase[i] * 0.7) * 0.002;

            const sx = lp[i * 3];
            const sz = lp[i * 3 + 2];
            const surfaceY = waveHeight(sx, sz, time);
            const maxHeight = surfaceY + 5;

            if (lp[i * 3 + 1] > maxHeight) {
                lp[i * 3]     = (Math.random() - 0.5) * SPAN;
                lp[i * 3 + 1] = surfaceY - 1.0;
                lp[i * 3 + 2] = (Math.random() - 0.5) * SPAN;
            }

            // Pulsing brightness
            lb[i] = 0.6 + 0.4 * Math.sin(time * 3.0 + lgPhase[i] * 2.0);
        }
        lgGeo.attributes.position.needsUpdate = true;
        lgGeo.attributes.brt.needsUpdate      = true;

        // --- Camera fly-through ---
        camera.position.z -= 0.05;

        if (camera.position.z < -WRAP_Z) {
            camera.position.z += SPAN;
        }

        camera.position.y = 2.2 + Math.sin(camBobPhase) * 0.3;
        camera.position.x = Math.sin(camBobPhase * 0.4) * 5;

        camera.lookAt(
            camera.position.x + Math.sin(camBobPhase * 0.3) * 2,
            0.5,
            camera.position.z - 20
        );

        composer.render();
    }

    renderer.setAnimationLoop(animate);

    // ─── Resize ───────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
        composer.setSize(innerWidth, innerHeight);
        bloomPass.resolution.set(innerWidth, innerHeight);
    });
    </script>
</body>
</html>
