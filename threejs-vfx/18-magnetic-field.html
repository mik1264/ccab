<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Dipole Field Lines | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }

        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #88ccff;
            text-decoration: none;
            z-index: 1000;
            font-size: 1rem;
            font-family: sans-serif;
            background: rgba(0, 10, 30, 0.7);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(80, 160, 255, 0.3);
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        .back-link:hover {
            background: rgba(0, 20, 60, 0.9);
            border-color: rgba(80, 160, 255, 0.7);
        }

        .title-overlay {
            position: fixed;
            top: 10px;
            right: 14px;
            color: rgba(140, 200, 255, 0.85);
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            pointer-events: none;
            line-height: 1.7;
            text-align: right;
        }

        .info-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(160, 210, 255, 0.75);
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            pointer-events: none;
            white-space: nowrap;
            background: rgba(0, 10, 30, 0.55);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(80, 160, 255, 0.15);
            backdrop-filter: blur(6px);
        }

        .legend {
            position: fixed;
            bottom: 66px;
            right: 18px;
            color: rgba(180, 220, 255, 0.75);
            font-family: 'Courier New', monospace;
            font-size: 0.68rem;
            line-height: 1.9;
            pointer-events: none;
            text-align: right;
        }
        .pole-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            vertical-align: middle;
            margin-left: 6px;
        }
        .pole-n { background: #ff4422; box-shadow: 0 0 6px #ff4422; }
        .pole-s { background: #2266ff; box-shadow: 0 0 6px #2266ff; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back</a>

    <div class="title-overlay">
        MAGNETIC DIPOLE FIELD<br>
        <span style="opacity:0.5;font-size:0.65rem;">40 FIELD LINES &bull; ANIMATED STREAMLINES</span>
    </div>

    <div class="info-bar">Magnetic Dipole Field &nbsp;|&nbsp; Click &amp; drag to rotate</div>

    <div class="legend">
        North Pole (N) <span class="pole-dot pole-n"></span><br>
        South Pole (S) <span class="pole-dot pole-s"></span><br>
        Field direction &rarr; dots
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // -------------------------------------------------------
        // Renderer
        // -------------------------------------------------------
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);

        // -------------------------------------------------------
        // Scene & Camera
        // -------------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000308);

        // Subtle blue fog to give depth
        scene.fog = new THREE.FogExp2(0x000308, 0.045);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 120);
        camera.position.set(0, 3, 7);

        // -------------------------------------------------------
        // Controls
        // -------------------------------------------------------
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.6;
        controls.minDistance = 2;
        controls.maxDistance = 20;

        // -------------------------------------------------------
        // Post-processing: Bloom
        // -------------------------------------------------------
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.0,   // strength
            0.5,   // radius
            0.2    // threshold
        );
        composer.addPass(bloomPass);
        composer.addPass(new OutputPass());

        // -------------------------------------------------------
        // Starfield background
        // -------------------------------------------------------
        (function buildStars() {
            const N = 2500;
            const pos = new Float32Array(N * 3);
            const col = new Float32Array(N * 3);
            for (let i = 0; i < N; i++) {
                const r = 50 + Math.random() * 40;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                pos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
                pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i * 3 + 2] = r * Math.cos(phi);
                const bright = 0.4 + Math.random() * 0.6;
                col[i * 3]     = bright * (0.8 + Math.random() * 0.2);
                col[i * 3 + 1] = bright * (0.8 + Math.random() * 0.2);
                col[i * 3 + 2] = bright;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
            scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
                size: 0.08, vertexColors: true, sizeAttenuation: true
            })));
        })();

        // -------------------------------------------------------
        // Magnetic dipole field math
        // Dipole moment m along +Y axis, located at origin.
        // B = (3(m·r̂)r̂ - m) / r³,  m = (0,1,0)
        // -------------------------------------------------------
        function magneticField(x, y, z) {
            const r2 = x * x + y * y + z * z;
            const r  = Math.sqrt(r2);
            if (r < 0.3) return { x: 0, y: 0, z: 0 };
            const r5  = r2 * r2 * r;
            const mDotR = y; // m=(0,1,0) so m·r = y
            const Bx = (3 * mDotR * x) / r5;
            const By = (3 * mDotR * y - r2) / r5;
            const Bz = (3 * mDotR * z) / r5;
            return { x: Bx, y: By, z: Bz };
        }

        // Return field magnitude at a point (for dot speed scaling)
        function fieldMagnitude(x, y, z) {
            const B = magneticField(x, y, z);
            return Math.sqrt(B.x * B.x + B.y * B.y + B.z * B.z);
        }

        // -------------------------------------------------------
        // Field line tracer — Euler integration with normalised step
        // -------------------------------------------------------
        function traceFieldLine(startX, startY, startZ, steps, stepSize) {
            steps    = steps    || 600;
            stepSize = stepSize || 0.045;

            const points = [new THREE.Vector3(startX, startY, startZ)];
            let x = startX, y = startY, z = startZ;

            for (let i = 0; i < steps; i++) {
                const B   = magneticField(x, y, z);
                const mag = Math.sqrt(B.x * B.x + B.y * B.y + B.z * B.z);
                if (mag < 0.0001) break;
                if (Math.sqrt(x * x + y * y + z * z) > 8.5) break;

                x += (B.x / mag) * stepSize;
                y += (B.y / mag) * stepSize;
                z += (B.z / mag) * stepSize;

                points.push(new THREE.Vector3(x, y, z));

                // Stop once we re-enter the south pole region (y < -0.45) after leaving it
                if (y < -0.45 && i > 15) break;
            }
            return points;
        }

        // -------------------------------------------------------
        // Build field lines: 5 latitudes × 8 longitudes = 40 lines
        // -------------------------------------------------------
        const fieldLines = []; // array of THREE.Vector3[] arrays

        for (let lat = 1; lat <= 5; lat++) {
            const theta = (lat / 6) * Math.PI * 0.82; // near-pole to near-equator
            for (let lon = 0; lon < 8; lon++) {
                const phi = (lon / 8) * Math.PI * 2;
                const r0  = 0.52;
                const sx  = r0 * Math.sin(theta) * Math.cos(phi);
                const sy  = r0 * Math.cos(theta);
                const sz  = r0 * Math.sin(theta) * Math.sin(phi);

                const points = traceFieldLine(sx, sy, sz);
                if (points.length < 3) continue;

                // Hue: innermost latitude (lat=1) is cyan-blue, outermost (lat=5) is magenta-red
                const hue = 0.62 - (lat / 5) * 0.35; // 0.62 (blue) -> 0.27 (orange-ish)
                const lightness = 0.55 + (lat / 5) * 0.1;
                const color = new THREE.Color().setHSL(hue, 1.0, lightness);

                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.LineBasicMaterial({
                    color,
                    transparent: true,
                    opacity: 0.7 - (lat / 5) * 0.15
                });
                scene.add(new THREE.Line(geo, mat));

                fieldLines.push({ points, color, lat });
            }
        }

        // -------------------------------------------------------
        // Animated dots — one per field line travelling forward
        // -------------------------------------------------------
        const dotGeo   = new THREE.SphereGeometry(0.045, 8, 6);
        const dots     = [];

        fieldLines.forEach((fl, idx) => {
            // Phase spread so lines animate at different offsets
            const phase = idx / fieldLines.length;

            // Material cloned so each dot keeps its line colour (boosted for bloom)
            const col = fl.color.clone();
            col.multiplyScalar(2.5); // bloom amplification
            const mat = new THREE.MeshBasicMaterial({ color: col });

            const mesh = new THREE.Mesh(dotGeo, mat);
            scene.add(mesh);

            dots.push({
                mesh,
                points: fl.points,
                t: phase,          // normalised position [0, 1) along the line
                speed: 0.18        // base speed in normalised units per second
            });
        });

        // -------------------------------------------------------
        // Pole spheres — N (red) and S (blue) with bloom glow
        // -------------------------------------------------------
        const poleGeo = new THREE.SphereGeometry(0.12, 24, 18);

        const northMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(2.0, 0.2, 0.1) });
        const northMesh = new THREE.Mesh(poleGeo, northMat);
        northMesh.position.set(0, 0.5, 0);
        scene.add(northMesh);

        const southMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(0.1, 0.4, 2.5) });
        const southMesh = new THREE.Mesh(poleGeo, southMat);
        southMesh.position.set(0, -0.5, 0);
        scene.add(southMesh);

        // Slightly larger, very transparent halos for the poles
        const haloGeo = new THREE.SphereGeometry(0.22, 20, 16);

        const northHaloMat = new THREE.MeshBasicMaterial({
            color: new THREE.Color(1.0, 0.3, 0.1),
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide
        });
        const northHalo = new THREE.Mesh(haloGeo, northHaloMat);
        northHalo.position.set(0, 0.5, 0);
        scene.add(northHalo);

        const southHaloMat = new THREE.MeshBasicMaterial({
            color: new THREE.Color(0.1, 0.3, 1.0),
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide
        });
        const southHalo = new THREE.Mesh(haloGeo, southHaloMat);
        southHalo.position.set(0, -0.5, 0);
        scene.add(southHalo);

        // -------------------------------------------------------
        // Central dipole magnet — cylinder split N (red) / S (blue)
        // using two half-cylinders
        // -------------------------------------------------------
        const magnetRadTop    = 0.09;
        const magnetRadBottom = 0.09;
        const magnetHalfH     = 0.46;

        // North half (top)
        const northCylGeo = new THREE.CylinderGeometry(magnetRadTop, magnetRadTop, magnetHalfH, 24);
        const northCylMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(1.5, 0.15, 0.08) });
        const northCyl    = new THREE.Mesh(northCylGeo, northCylMat);
        northCyl.position.set(0, magnetHalfH / 2, 0);
        scene.add(northCyl);

        // South half (bottom)
        const southCylGeo = new THREE.CylinderGeometry(magnetRadBottom, magnetRadBottom, magnetHalfH, 24);
        const southCylMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(0.08, 0.2, 1.8) });
        const southCyl    = new THREE.Mesh(southCylGeo, southCylMat);
        southCyl.position.set(0, -magnetHalfH / 2, 0);
        scene.add(southCyl);

        // -------------------------------------------------------
        // Equatorial disk — faint transparent plane
        // -------------------------------------------------------
        const diskGeo = new THREE.CircleGeometry(3.2, 80);
        const diskMat = new THREE.MeshBasicMaterial({
            color: new THREE.Color(0.08, 0.18, 0.35),
            transparent: true,
            opacity: 0.18,
            side: THREE.DoubleSide
        });
        const disk = new THREE.Mesh(diskGeo, diskMat);
        disk.rotation.x = Math.PI / 2;
        scene.add(disk);

        // Equatorial ring outline
        const ringGeo = new THREE.RingGeometry(3.15, 3.2, 80);
        const ringMat = new THREE.MeshBasicMaterial({
            color: new THREE.Color(0.2, 0.5, 1.0),
            transparent: true,
            opacity: 0.35,
            side: THREE.DoubleSide
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);

        // -------------------------------------------------------
        // Y-axis line from S to N pole (dipole axis indicator)
        // -------------------------------------------------------
        const axisPoints = [new THREE.Vector3(0, -0.5, 0), new THREE.Vector3(0, 0.5, 0)];
        const axisGeo = new THREE.BufferGeometry().setFromPoints(axisPoints);
        const axisMat = new THREE.LineBasicMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.25
        });
        scene.add(new THREE.Line(axisGeo, axisMat));

        // -------------------------------------------------------
        // Helpers — advance a dot along its field line by dt seconds
        // -------------------------------------------------------
        function updateDot(dot, dt) {
            const pts = dot.points;
            const n   = pts.length;
            if (n < 2) return;

            // Advance t, wrapping around [0,1)
            dot.t = (dot.t + dot.speed * dt) % 1.0;

            // Map t to a float index
            const fi  = dot.t * (n - 1);
            const i0  = Math.floor(fi);
            const i1  = Math.min(i0 + 1, n - 1);
            const frac = fi - i0;

            // Interpolate position
            dot.mesh.position.lerpVectors(pts[i0], pts[i1], frac);

            // Scale dot speed inversely proportional to field magnitude so it
            // appears to accelerate near poles (strong field) and slow at equator.
            // We sample the actual field at the dot position.
            const { x, y, z } = dot.mesh.position;
            const B = fieldMagnitude(x, y, z);
            // clamp: minimum 0.05 so it never stalls, maximum 0.6 (near poles)
            dot.speed = Math.max(0.05, Math.min(0.6, B * 0.8));
        }

        // -------------------------------------------------------
        // Animation loop
        // -------------------------------------------------------
        const clock = new THREE.Clock();

        function animate() {
            const dt = clock.getDelta();

            // Advance each travelling dot
            dots.forEach(dot => updateDot(dot, dt));

            // Subtle pulse on pole halos
            const t = clock.elapsedTime;
            const pulse = 0.06 + 0.03 * Math.sin(t * 2.0);
            northHaloMat.opacity = pulse;
            southHaloMat.opacity = pulse;

            controls.update();
            composer.render();
        }

        renderer.setAnimationLoop(animate);

        // -------------------------------------------------------
        // Resize handler
        // -------------------------------------------------------
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            bloomPass.resolution.set(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
