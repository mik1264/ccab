<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Dipole Field Lines | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }

        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #88ccff;
            text-decoration: none;
            z-index: 1000;
            font-size: 1rem;
            font-family: sans-serif;
            background: rgba(0, 10, 30, 0.7);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(80, 160, 255, 0.3);
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        .back-link:hover {
            background: rgba(0, 20, 60, 0.9);
            border-color: rgba(80, 160, 255, 0.7);
        }

        .title-overlay {
            position: fixed;
            top: 10px;
            right: 14px;
            color: rgba(140, 200, 255, 0.85);
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            pointer-events: none;
            line-height: 1.7;
            text-align: right;
        }

        .info-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(160, 210, 255, 0.75);
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            pointer-events: none;
            white-space: nowrap;
            background: rgba(0, 10, 30, 0.55);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(80, 160, 255, 0.15);
            backdrop-filter: blur(6px);
        }

        .legend {
            position: fixed;
            bottom: 66px;
            right: 18px;
            color: rgba(180, 220, 255, 0.75);
            font-family: 'Courier New', monospace;
            font-size: 0.68rem;
            line-height: 1.9;
            pointer-events: none;
            text-align: right;
        }
        .pole-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            vertical-align: middle;
            margin-left: 6px;
        }
        .pole-n { background: #ff4422; box-shadow: 0 0 6px #ff4422; }
        .pole-s { background: #2266ff; box-shadow: 0 0 6px #2266ff; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; Back</a>

    <div class="title-overlay">
        MAGNETIC DIPOLE FIELD<br>
        <span style="opacity:0.5;font-size:0.65rem;">80 FIELD LINES &bull; 5000 PARTICLES &bull; EQUIPOTENTIAL SURFACES</span>
    </div>

    <div class="info-bar">Magnetic Dipole Field &nbsp;|&nbsp; Click &amp; drag to rotate</div>

    <div class="legend">
        North Pole (N) <span class="pole-dot pole-n"></span><br>
        South Pole (S) <span class="pole-dot pole-s"></span><br>
        Strong field <span style="color:#ff4400">&#9632;</span> &rarr; Weak field <span style="color:#2255ff">&#9632;</span>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ─── Renderer ─────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);

        // ─── Scene & Camera ───────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000308);
        scene.fog = new THREE.FogExp2(0x000308, 0.040);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 120);
        camera.position.set(0, 3, 7);

        // ─── Controls ─────────────────────────────────────────────────────────
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.6;
        controls.minDistance = 2;
        controls.maxDistance = 20;

        // ─── Post-processing ──────────────────────────────────────────────────
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.0,
            0.5,
            0.2
        );
        composer.addPass(bloomPass);
        composer.addPass(new OutputPass());

        // ─── Starfield ────────────────────────────────────────────────────────
        (function buildStars() {
            const N = 2500;
            const pos = new Float32Array(N * 3);
            const col = new Float32Array(N * 3);
            for (let i = 0; i < N; i++) {
                const r = 50 + Math.random() * 40;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                pos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
                pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i * 3 + 2] = r * Math.cos(phi);
                const bright = 0.4 + Math.random() * 0.6;
                col[i * 3]     = bright * (0.8 + Math.random() * 0.2);
                col[i * 3 + 1] = bright * (0.8 + Math.random() * 0.2);
                col[i * 3 + 2] = bright;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
            scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
                size: 0.08, vertexColors: true, sizeAttenuation: true
            })));
        })();

        // ─── Magnetic dipole field math ───────────────────────────────────────
        function magneticField(x, y, z) {
            const r2 = x * x + y * y + z * z;
            const r  = Math.sqrt(r2);
            if (r < 0.3) return { x: 0, y: 0, z: 0 };
            const r5  = r2 * r2 * r;
            const mDotR = y;
            const Bx = (3 * mDotR * x) / r5;
            const By = (3 * mDotR * y - r2) / r5;
            const Bz = (3 * mDotR * z) / r5;
            return { x: Bx, y: By, z: Bz };
        }

        function fieldMagnitude(x, y, z) {
            const B = magneticField(x, y, z);
            return Math.sqrt(B.x * B.x + B.y * B.y + B.z * B.z);
        }

        // ─── Field line tracer ────────────────────────────────────────────────
        function traceFieldLine(startX, startY, startZ, steps, stepSize) {
            steps    = steps    || 600;
            stepSize = stepSize || 0.045;

            const points = [new THREE.Vector3(startX, startY, startZ)];
            let x = startX, y = startY, z = startZ;

            for (let i = 0; i < steps; i++) {
                const B   = magneticField(x, y, z);
                const mag = Math.sqrt(B.x * B.x + B.y * B.y + B.z * B.z);
                if (mag < 0.0001) break;
                if (Math.sqrt(x * x + y * y + z * z) > 8.5) break;

                x += (B.x / mag) * stepSize;
                y += (B.y / mag) * stepSize;
                z += (B.z / mag) * stepSize;

                points.push(new THREE.Vector3(x, y, z));

                if (y < -0.45 && i > 15) break;
            }
            return points;
        }

        // ─── Build field lines — 5 latitudes × 16 longitudes = 80 lines ──────
        // Doubled from original 40 by increasing longitude divisions from 8 to 16
        const fieldLines = [];

        for (let lat = 1; lat <= 5; lat++) {
            const theta = (lat / 6) * Math.PI * 0.82;
            // 16 longitude samples for finer angular spacing (double original 8)
            for (let lon = 0; lon < 16; lon++) {
                const phi = (lon / 16) * Math.PI * 2;
                const r0  = 0.52;
                const sx  = r0 * Math.sin(theta) * Math.cos(phi);
                const sy  = r0 * Math.cos(theta);
                const sz  = r0 * Math.sin(theta) * Math.sin(phi);

                const points = traceFieldLine(sx, sy, sz);
                if (points.length < 3) continue;

                // Color based on distance from magnet (red=strong, blue=weak)
                // lat=1 is closest → strongest (red-orange), lat=5 is outermost (blue)
                const strengthT = (lat - 1) / 4; // 0=strong/near, 1=weak/far
                const hue = strengthT * 0.62;     // 0=red, 0.62=blue
                const lightness = 0.55 + strengthT * 0.1;
                const color = new THREE.Color().setHSL(hue, 1.0, lightness);

                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.LineBasicMaterial({
                    color,
                    transparent: true,
                    opacity: 0.7 - (lat / 5) * 0.15
                });
                scene.add(new THREE.Line(geo, mat));

                fieldLines.push({ points, color, lat, strengthT });
            }
        }

        // ─── 5000 charged particles animated along field lines ────────────────
        const PARTICLE_COUNT = 5000;
        const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
        const particleColors    = new Float32Array(PARTICLE_COUNT * 3);

        // Assign each particle to a random field line
        const particleData = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const fl = fieldLines[Math.floor(Math.random() * fieldLines.length)];
            const t  = Math.random(); // position along line [0,1)
            particleData.push({
                fieldLine: fl,
                t,
                // Speed scales with field strength — faster near poles
                baseSpeed: 0.05 + (1.0 - fl.strengthT) * 0.35,
            });
            // Initial color from field line color
            particleColors[i * 3]     = fl.color.r;
            particleColors[i * 3 + 1] = fl.color.g;
            particleColors[i * 3 + 2] = fl.color.b;
        }

        const particleGeo = new THREE.BufferGeometry();
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        particleGeo.setAttribute('color',    new THREE.BufferAttribute(particleColors, 3));

        const particleMat = new THREE.PointsMaterial({
            size:         0.05,
            vertexColors: true,
            transparent:  true,
            opacity:      0.85,
            depthWrite:   false,
            blending:     THREE.AdditiveBlending,
        });

        scene.add(new THREE.Points(particleGeo, particleMat));

        // ─── Animated dots — one per field line ───────────────────────────────
        const dotGeo   = new THREE.SphereGeometry(0.045, 8, 6);
        const dots     = [];

        fieldLines.forEach((fl, idx) => {
            const phase = idx / fieldLines.length;
            const col = fl.color.clone();
            col.multiplyScalar(2.5);
            const mat = new THREE.MeshBasicMaterial({ color: col });
            const mesh = new THREE.Mesh(dotGeo, mat);
            scene.add(mesh);
            dots.push({ mesh, points: fl.points, t: phase, speed: 0.18 });
        });

        // ─── Detailed cylindrical magnet (N/S pole colors, metallic) ──────────
        // North half — red, metallic
        const northCylGeo = new THREE.CylinderGeometry(0.13, 0.13, 0.50, 32);
        const northCylMat = new THREE.MeshStandardMaterial({
            color:     new THREE.Color(0.8, 0.08, 0.04),
            emissive:  new THREE.Color(0.4, 0.02, 0.01),
            emissiveIntensity: 0.8,
            metalness: 0.9,
            roughness: 0.15,
        });
        const northCyl = new THREE.Mesh(northCylGeo, northCylMat);
        northCyl.position.set(0, 0.25, 0);
        scene.add(northCyl);

        // "N" disc cap
        const nCapGeo = new THREE.CircleGeometry(0.13, 32);
        const nCapMat = new THREE.MeshStandardMaterial({
            color:     new THREE.Color(1.0, 0.1, 0.05),
            emissive:  new THREE.Color(0.6, 0.02, 0.01),
            emissiveIntensity: 1.2,
            metalness: 0.7,
            roughness: 0.2,
        });
        const nCap = new THREE.Mesh(nCapGeo, nCapMat);
        nCap.rotation.x = -Math.PI / 2;
        nCap.position.set(0, 0.501, 0);
        scene.add(nCap);

        // South half — blue, metallic
        const southCylGeo = new THREE.CylinderGeometry(0.13, 0.13, 0.50, 32);
        const southCylMat = new THREE.MeshStandardMaterial({
            color:     new THREE.Color(0.04, 0.10, 0.90),
            emissive:  new THREE.Color(0.01, 0.03, 0.45),
            emissiveIntensity: 0.8,
            metalness: 0.9,
            roughness: 0.15,
        });
        const southCyl = new THREE.Mesh(southCylGeo, southCylMat);
        southCyl.position.set(0, -0.25, 0);
        scene.add(southCyl);

        // "S" disc cap
        const sCapGeo = new THREE.CircleGeometry(0.13, 32);
        const sCapMat = new THREE.MeshStandardMaterial({
            color:     new THREE.Color(0.05, 0.12, 1.0),
            emissive:  new THREE.Color(0.01, 0.04, 0.6),
            emissiveIntensity: 1.2,
            metalness: 0.7,
            roughness: 0.2,
        });
        const sCap = new THREE.Mesh(sCapGeo, sCapMat);
        sCap.rotation.x = Math.PI / 2;
        sCap.position.set(0, -0.501, 0);
        scene.add(sCap);

        // Thin chrome band at junction
        const bandGeo = new THREE.CylinderGeometry(0.135, 0.135, 0.04, 32);
        const bandMat = new THREE.MeshStandardMaterial({
            color:     new THREE.Color(0.8, 0.8, 0.85),
            metalness: 1.0,
            roughness: 0.05,
        });
        const band = new THREE.Mesh(bandGeo, bandMat);
        band.position.set(0, 0, 0);
        scene.add(band);

        // Directional light to show metallic magnet shading
        const dirLight = new THREE.DirectionalLight(0xaaccff, 1.2);
        dirLight.position.set(3, 5, 4);
        scene.add(dirLight);
        scene.add(new THREE.AmbientLight(0x112233, 0.5));

        // Pole glow spheres
        const poleGeo = new THREE.SphereGeometry(0.12, 24, 18);
        const northMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(2.0, 0.2, 0.1) });
        const northMesh = new THREE.Mesh(poleGeo, northMat);
        northMesh.position.set(0, 0.5, 0);
        scene.add(northMesh);

        const southMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(0.1, 0.4, 2.5) });
        const southMesh = new THREE.Mesh(poleGeo, southMat);
        southMesh.position.set(0, -0.5, 0);
        scene.add(southMesh);

        // Halos
        const haloGeo = new THREE.SphereGeometry(0.22, 20, 16);
        const northHaloMat = new THREE.MeshBasicMaterial({
            color: new THREE.Color(1.0, 0.3, 0.1),
            transparent: true, opacity: 0.08, side: THREE.BackSide
        });
        const northHalo = new THREE.Mesh(haloGeo, northHaloMat);
        northHalo.position.set(0, 0.5, 0);
        scene.add(northHalo);

        const southHaloMat = new THREE.MeshBasicMaterial({
            color: new THREE.Color(0.1, 0.3, 1.0),
            transparent: true, opacity: 0.08, side: THREE.BackSide
        });
        const southHalo = new THREE.Mesh(haloGeo, southHaloMat);
        southHalo.position.set(0, -0.5, 0);
        scene.add(southHalo);

        // ─── Equipotential surfaces: 3 semi-transparent spheres ───────────────
        // |B| is approximately constant on spheres centered at origin for a dipole
        // (exact surfaces are more complex, but spheres approximate well near equator)
        const eqRadii = [1.8, 3.2, 5.0];
        const eqColors = [0x8822ff, 0x2255ff, 0x0088ff];
        eqRadii.forEach((r, i) => {
            const eqGeo = new THREE.SphereGeometry(r, 48, 32);
            const eqMat = new THREE.MeshBasicMaterial({
                color:       eqColors[i],
                transparent: true,
                opacity:     0.035 - i * 0.008,
                side:        THREE.DoubleSide,
                depthWrite:  false,
            });
            scene.add(new THREE.Mesh(eqGeo, eqMat));

            // Wireframe ring outline at equator for visual reference
            const ringGeo = new THREE.RingGeometry(r - 0.01, r + 0.01, 80);
            const ringMat = new THREE.MeshBasicMaterial({
                color:       eqColors[i],
                transparent: true,
                opacity:     0.18 - i * 0.04,
                side:        THREE.DoubleSide,
                depthWrite:  false,
            });
            const ringMesh = new THREE.Mesh(ringGeo, ringMat);
            ringMesh.rotation.x = Math.PI / 2;
            scene.add(ringMesh);
        });

        // ─── Equatorial disk & ring ────────────────────────────────────────────
        const diskGeo = new THREE.CircleGeometry(3.2, 80);
        const diskMat = new THREE.MeshBasicMaterial({
            color: new THREE.Color(0.08, 0.18, 0.35),
            transparent: true, opacity: 0.18, side: THREE.DoubleSide
        });
        const disk = new THREE.Mesh(diskGeo, diskMat);
        disk.rotation.x = Math.PI / 2;
        scene.add(disk);

        const ringOutGeo = new THREE.RingGeometry(3.15, 3.2, 80);
        const ringOutMat = new THREE.MeshBasicMaterial({
            color: new THREE.Color(0.2, 0.5, 1.0),
            transparent: true, opacity: 0.35, side: THREE.DoubleSide
        });
        const ringOut = new THREE.Mesh(ringOutGeo, ringOutMat);
        ringOut.rotation.x = Math.PI / 2;
        scene.add(ringOut);

        // Y-axis indicator
        const axisPoints = [new THREE.Vector3(0, -0.5, 0), new THREE.Vector3(0, 0.5, 0)];
        const axisGeo = new THREE.BufferGeometry().setFromPoints(axisPoints);
        scene.add(new THREE.Line(axisGeo, new THREE.LineBasicMaterial({
            color: 0xffffff, transparent: true, opacity: 0.25
        })));

        // ─── Dot advance helper ───────────────────────────────────────────────
        function updateDot(dot, dt) {
            const pts = dot.points;
            const n   = pts.length;
            if (n < 2) return;
            dot.t = (dot.t + dot.speed * dt) % 1.0;
            const fi  = dot.t * (n - 1);
            const i0  = Math.floor(fi);
            const i1  = Math.min(i0 + 1, n - 1);
            const frac = fi - i0;
            dot.mesh.position.lerpVectors(pts[i0], pts[i1], frac);
            const { x, y, z } = dot.mesh.position;
            const B = fieldMagnitude(x, y, z);
            dot.speed = Math.max(0.05, Math.min(0.6, B * 0.8));
        }

        // ─── Animation loop ───────────────────────────────────────────────────
        const clock = new THREE.Clock();
        const posAttr  = particleGeo.attributes.position;
        const colAttr  = particleGeo.attributes.color;

        function animate() {
            const dt = clock.getDelta();
            const t  = clock.elapsedTime;

            // Advance field-line dots
            dots.forEach(dot => updateDot(dot, dt));

            // Advance 5000 particles along field lines
            // Speed proportional to local |B| (stronger field = faster particle)
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const pd = particleData[i];
                const pts = pd.fieldLine.points;
                const n   = pts.length;
                if (n < 2) continue;

                // Sample field at current position for speed modulation
                const fi0 = Math.floor(pd.t * (n - 1));
                const fi1 = Math.min(fi0 + 1, n - 1);
                const frac = pd.t * (n - 1) - fi0;
                const px = pts[fi0].x + (pts[fi1].x - pts[fi0].x) * frac;
                const py = pts[fi0].y + (pts[fi1].y - pts[fi0].y) * frac;
                const pz = pts[fi0].z + (pts[fi1].z - pts[fi0].z) * frac;

                // Speed proportional to |B|
                const B = fieldMagnitude(px, py, pz);
                const speed = pd.baseSpeed * Math.max(0.1, Math.min(3.0, B));

                pd.t = (pd.t + speed * dt * 0.4) % 1.0;

                posAttr.array[i * 3]     = px;
                posAttr.array[i * 3 + 1] = py;
                posAttr.array[i * 3 + 2] = pz;

                // Color: red (strong/near) to blue (weak/far)
                const c = pd.fieldLine.color;
                colAttr.array[i * 3]     = c.r;
                colAttr.array[i * 3 + 1] = c.g;
                colAttr.array[i * 3 + 2] = c.b;
            }
            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;

            // Pulse on pole halos
            const pulse = 0.06 + 0.03 * Math.sin(t * 2.0);
            northHaloMat.opacity = pulse;
            southHaloMat.opacity = pulse;

            controls.update();
            composer.render();
        }

        renderer.setAnimationLoop(animate);

        // ─── Resize handler ───────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            bloomPass.resolution.set(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
