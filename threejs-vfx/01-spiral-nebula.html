<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Nebula | Three.js VFX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #8A9A5B;
            text-decoration: none;
            z-index: 1000;
            font-size: 1rem;
            font-family: sans-serif;
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 20px;
            transition: background 0.2s ease;
        }
        .back-link:hover { background: rgba(0,0,0,0.8); }
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-family: sans-serif;
            font-size: 0.85rem;
            pointer-events: none;
            white-space: nowrap;
        }
        .stats {
            position: fixed;
            top: 10px;
            right: 10px;
            color: rgba(255,255,255,0.4);
            font-family: monospace;
            font-size: 0.75rem;
            text-align: right;
            line-height: 1.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back</a>
    <div class="info">Drag to rotate &nbsp;&middot;&nbsp; Scroll to zoom</div>
    <div class="stats" id="stats">300,000 particles &nbsp;|&nbsp; UnrealBloom &nbsp;|&nbsp; Three.js r175</div>

    <!-- GSAP for cinematic intro -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <!-- Three.js r175 import map -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
      }
    }
    </script>

    <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // ─── Scene ────────────────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000005);

    // ─── Camera ───────────────────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(0, 8, 30);
    camera.lookAt(0, 0, 0);

    // ─── Renderer ─────────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // ─── OrbitControls ────────────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 2;
    controls.maxDistance = 80;
    controls.autoRotate = false; // we handle rotation manually on the mesh

    // ─── Post-processing ──────────────────────────────────────────────────────
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.8,   // strength
        0.4,   // radius
        0.1    // threshold
    );
    composer.addPass(bloomPass);
    composer.addPass(new OutputPass());

    // ─── Galaxy / Nebula particle system ──────────────────────────────────────
    const PARTICLE_COUNT    = 300000;
    const ARM_COUNT         = 4;
    const ARM_SPREAD        = 0.35;    // radial scatter around the ideal radius
    const HEIGHT_SPREAD     = 0.18;    // vertical scatter
    const SPIRAL_TIGHTNESS  = 3.5;     // how many full turns across the disk
    const GALAXY_RADIUS     = 10;      // maximum extent in world units

    const positions  = new Float32Array(PARTICLE_COUNT * 3);
    const colors     = new Float32Array(PARTICLE_COUNT * 3);
    const sizes      = new Float32Array(PARTICLE_COUNT);

    const tmpColor = new THREE.Color();

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;

        // Which arm?
        const arm = (i % ARM_COUNT) * ((Math.PI * 2) / ARM_COUNT);

        // Distribute particles along a power curve so the core is denser
        const t      = Math.pow(Math.random(), 1.4);          // 0…1, biased toward core
        const radius = t * GALAXY_RADIUS;

        // Logarithmic spiral angle
        const spinAngle = radius * SPIRAL_TIGHTNESS * 0.15;

        // Random scatter around the ideal arm position
        const scatter = (Math.random() - 0.5) * ARM_SPREAD * (radius + 0.5);
        const angle   = arm + spinAngle + scatter / (radius + 1);

        const x = Math.cos(angle) * radius + (Math.random() - 0.5) * ARM_SPREAD * (1 - t);
        const z = Math.sin(angle) * radius + (Math.random() - 0.5) * ARM_SPREAD * (1 - t);

        // Vertical height falls off with radius (disk flare)
        const heightSigma = HEIGHT_SPREAD * (1 - t * 0.75);
        const y = (Math.random() - 0.5) * heightSigma * GALAXY_RADIUS * 0.4;

        positions[i3    ] = x;
        positions[i3 + 1] = y;
        positions[i3 + 2] = z;

        // Color: electric blue (hue ~0.60) at core → warm gold → deep crimson at rim
        // Normalized radius 0…1
        const nr = Math.min(radius / GALAXY_RADIUS, 1.0);

        // Hue: 0.62 (blue) → 0.10 (gold) → 0.02 (red)
        const hue        = 0.62 - nr * 0.60;
        const saturation = 0.85 + Math.random() * 0.15;
        const lightness  = 0.55 + nr * 0.12 + Math.random() * 0.12;

        tmpColor.setHSL(hue, saturation, lightness);
        colors[i3    ] = tmpColor.r;
        colors[i3 + 1] = tmpColor.g;
        colors[i3 + 2] = tmpColor.b;

        // Particles near center are slightly larger / more brilliant
        sizes[i] = Math.random() * 0.5 + 0.05 + (1 - t) * 0.3;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color',    new THREE.BufferAttribute(colors,    3));
    geometry.setAttribute('size',     new THREE.BufferAttribute(sizes,     1));

    const material = new THREE.PointsMaterial({
        size:          0.055,
        vertexColors:  true,
        depthWrite:    false,
        blending:      THREE.AdditiveBlending,
        transparent:   true,
        opacity:       0.95,
        sizeAttenuation: true,
    });

    const galaxy = new THREE.Points(geometry, material);
    scene.add(galaxy);

    // ─── Central bright cluster (5 000 white/blue-white stars) ────────────────
    const CORE_COUNT   = 5000;
    const corePositions = new Float32Array(CORE_COUNT * 3);
    const coreColors    = new Float32Array(CORE_COUNT * 3);

    for (let i = 0; i < CORE_COUNT; i++) {
        const i3 = i * 3;
        // Gaussian-like distribution by summing randoms
        const r = (Math.random() + Math.random() + Math.random()) / 3 * 1.2;
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(2 * Math.random() - 1);

        corePositions[i3    ] = r * Math.sin(phi) * Math.cos(theta);
        corePositions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta) * 0.3; // flatten slightly
        corePositions[i3 + 2] = r * Math.cos(phi);

        // White to pale blue-white
        const t = Math.random();
        tmpColor.setHSL(0.60, 0.2 + t * 0.4, 0.88 + t * 0.12);
        coreColors[i3    ] = tmpColor.r;
        coreColors[i3 + 1] = tmpColor.g;
        coreColors[i3 + 2] = tmpColor.b;
    }

    const coreGeo = new THREE.BufferGeometry();
    coreGeo.setAttribute('position', new THREE.BufferAttribute(corePositions, 3));
    coreGeo.setAttribute('color',    new THREE.BufferAttribute(coreColors,    3));

    const coreMat = new THREE.PointsMaterial({
        size:         0.12,
        vertexColors: true,
        depthWrite:   false,
        blending:     THREE.AdditiveBlending,
        transparent:  true,
        opacity:      1.0,
        sizeAttenuation: true,
    });

    const core = new THREE.Points(coreGeo, coreMat);
    scene.add(core);

    // ─── Background starfield (distant, tiny, no bloom impact) ────────────────
    const BG_STARS = 8000;
    const bgPositions = new Float32Array(BG_STARS * 3);
    for (let i = 0; i < BG_STARS; i++) {
        const i3 = i * 3;
        const r  = 50 + Math.random() * 200;
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(2 * Math.random() - 1);
        bgPositions[i3    ] = r * Math.sin(phi) * Math.cos(theta);
        bgPositions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        bgPositions[i3 + 2] = r * Math.cos(phi);
    }

    const bgGeo = new THREE.BufferGeometry();
    bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
    const bgMat = new THREE.PointsMaterial({
        color:       0xaaaacc,
        size:        0.08,
        depthWrite:  false,
        blending:    THREE.AdditiveBlending,
        transparent: true,
        opacity:     0.6,
    });
    scene.add(new THREE.Points(bgGeo, bgMat));

    // ─── Subtle nebula haze via a large semi-transparent sprite ───────────────
    // We use a canvas-drawn radial gradient as a sprite texture
    function makeHazeTexture(size, innerColor, outerColor) {
        const canvas = document.createElement('canvas');
        canvas.width  = size;
        canvas.height = size;
        const ctx    = canvas.getContext('2d');
        const half   = size / 2;
        const grad   = ctx.createRadialGradient(half, half, 0, half, half, half);
        grad.addColorStop(0,   innerColor);
        grad.addColorStop(0.4, outerColor);
        grad.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, size, size);
        return new THREE.CanvasTexture(canvas);
    }

    // Core glow — warm white
    const coreHazeTex = makeHazeTexture(256, 'rgba(200,210,255,0.18)', 'rgba(120,100,200,0.04)');
    const coreHazeMat = new THREE.SpriteMaterial({
        map:         coreHazeTex,
        blending:    THREE.AdditiveBlending,
        transparent: true,
        depthWrite:  false,
    });
    const coreHaze = new THREE.Sprite(coreHazeMat);
    coreHaze.scale.set(8, 8, 1);
    scene.add(coreHaze);

    // Outer blue haze
    const outerHazeTex = makeHazeTexture(256, 'rgba(20,40,160,0.09)', 'rgba(5,10,60,0.02)');
    const outerHazeMat = new THREE.SpriteMaterial({
        map:         outerHazeTex,
        blending:    THREE.AdditiveBlending,
        transparent: true,
        depthWrite:  false,
    });
    const outerHaze = new THREE.Sprite(outerHazeMat);
    outerHaze.scale.set(26, 26, 1);
    scene.add(outerHaze);

    // ─── GSAP cinematic intro ─────────────────────────────────────────────────
    // Wait for GSAP to be available on window (it is a classic script)
    const startZ = 30;
    const endZ   = 15;
    camera.position.z = startZ;

    // Small tilt for drama
    gsap.to(camera.position, {
        z:        endZ,
        y:        6,
        duration: 3.2,
        ease:     'power2.out',
        onUpdate: () => camera.lookAt(0, 0, 0),
    });

    // Fade info text
    gsap.from('#stats', { opacity: 0, duration: 2, delay: 1 });

    // ─── Resize ───────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
        composer.setSize(w, h);
        bloomPass.resolution.set(w, h);
    });

    // ─── Animation loop ───────────────────────────────────────────────────────
    let frameCount = 0;
    const clock = new THREE.Clock();

    function animate() {
        const elapsed = clock.getElapsedTime();

        // Slow auto-rotation of galaxy geometry
        galaxy.rotation.y += 0.0005;
        core.rotation.y   += 0.0005;
        // Haze sprites don't rotate (they always face camera)

        // Subtle galaxy tilt pulse — makes it feel alive
        galaxy.rotation.x = Math.sin(elapsed * 0.04) * 0.04;
        core.rotation.x   = galaxy.rotation.x;

        // Gently breathe the bloom strength
        bloomPass.strength = 1.8 + Math.sin(elapsed * 0.3) * 0.15;

        // Bloom threshold pulses slightly at core — subtle effect
        bloomPass.threshold = 0.08 + Math.sin(elapsed * 0.5) * 0.02;

        controls.update();
        composer.render();
    }

    renderer.setAnimationLoop(animate);
    </script>
</body>
</html>
