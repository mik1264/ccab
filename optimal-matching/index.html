<script>
'use strict';
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const sidePanel = document.getElementById('side-panel');
const tooltip = document.getElementById('tooltip');
let W, H, dpr;
let currentMode = 'classic';
let animFrame;

// --- Colors ---
const C = {
    cream:'#FEFAE0',moss:'#606C38',sage:'#8A9A5B',earth:'#DDA15E',
    terracotta:'#BC6C25',darkMoss:'#3d4423',
    free:'#aab08a',proposing:'#DDA15E',matched:'#606C38',
    rejected:'#BC6C25',tentative:'#8A9A5B',highlight:'#e8c547'
};

// --- Names ---
const NAMES_A = ['Alice','Bob','Carol','Dave','Eve','Frank','Grace','Hank'];
const NAMES_B = ['Univ A','Univ B','Univ C','Univ D','Univ E','Univ F','Univ G','Univ H'];
const STUDENT_NAMES = ['Ava','Ben','Cleo','Dan','Ella','Finn','Gina','Hugo','Iris','Jake','Kate','Leo','Mia','Noah','Olga','Pete','Quinn','Rosa','Sam','Tina'];
const SCHOOL_NAMES = ['Lincoln','Jefferson','Hamilton','Madison','Monroe','Adams'];
const HOSPITAL_NAMES = ['Mass General','Johns Hopkins','Mayo Clinic','Cleveland Clinic','Stanford Med','UCSF Med'];
const RESIDENT_NAMES = ['Dr. Kim','Dr. Patel','Dr. Chen','Dr. Lopez','Dr. Williams','Dr. Brown','Dr. Davis','Dr. Wilson','Dr. Moore','Dr. Taylor','Dr. Anderson','Dr. Thomas'];

// --- Utility ---
function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]} return arr; }
function randPrefs(n,m) { const p=[]; for(let i=0;i<n;i++){const a=[];for(let j=0;j<m;j++) a.push(j);p.push(shuffle(a));} return p; }
function avgRank(matches, prefs) {
    let sum=0,c=0;
    for(const [p,r] of matches){if(r>=0){sum+=prefs[p].indexOf(r)+1;c++;}}
    return c?sum/c:0;
}
function lerp(a,b,t){return a+(b-a)*t}
function easeInOut(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}

// --- Resize ---
function resize() {
    const wrap = canvas.parentElement;
    const rect = wrap.getBoundingClientRect();
    dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    W = rect.width; H = rect.height;
    ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', () => { resize(); render(); });

// ============================================================
// GALE-SHAPLEY ALGORITHM
// ============================================================
function galeShapley(pPrefs, rPrefs, nP, nR) {
    const pMatch = new Array(nP).fill(-1);
    const rMatch = new Array(nR).fill(-1);
    const proposalIdx = new Array(nP).fill(0);
    const steps = [];
    const rRank = [];
    for(let r=0;r<nR;r++){
        rRank[r]={};
        for(let i=0;i<rPrefs[r].length;i++) rRank[r][rPrefs[r][i]]=i;
    }
    let changed = true;
    while(changed){
        changed = false;
        for(let p=0;p<nP;p++){
            if(pMatch[p]>=0 || proposalIdx[p]>=pPrefs[p].length) continue;
            const r = pPrefs[p][proposalIdx[p]];
            proposalIdx[p]++;
            changed = true;
            if(rMatch[r]<0){
                pMatch[p]=r; rMatch[r]=p;
                steps.push({type:'accept',p,r,displaced:-1});
            } else {
                const cur = rMatch[r];
                if(rRank[r][p] < rRank[r][cur]){
                    pMatch[cur]=-1; pMatch[p]=r; rMatch[r]=p;
                    steps.push({type:'displace',p,r,displaced:cur});
                } else {
                    steps.push({type:'reject',p,r,displaced:-1});
                }
            }
        }
    }
    return {pMatch, rMatch, steps};
}

// ============================================================
// BOSTON MECHANISM
// ============================================================
function bostonMechanism(sPrefs, sPriority, nS, nSch, caps) {
    const sMatch = new Array(nS).fill(-1);
    const schStudents = [];
    const remaining = [...caps];
    for(let i=0;i<nSch;i++) schStudents[i]=[];
    const steps = [];
    for(let round=0;round<nSch;round++){
        const applicants = {};
        for(let i=0;i<nSch;i++) applicants[i]=[];
        for(let s=0;s<nS;s++){
            if(sMatch[s]>=0) continue;
            if(round < sPrefs[s].length){
                const sch = sPrefs[s][round];
                applicants[sch].push(s);
            }
        }
        for(let sch=0;sch<nSch;sch++){
            if(remaining[sch]<=0) continue;
            const apps = applicants[sch].sort((a,b)=>sPriority[sch].indexOf(a)-sPriority[sch].indexOf(b));
            for(const s of apps){
                if(remaining[sch]<=0) break;
                sMatch[s]=sch;
                schStudents[sch].push(s);
                remaining[sch]--;
                steps.push({type:'boston-assign',s,sch,round});
            }
        }
    }
    return {sMatch, steps};
}

// ============================================================
// TOP TRADING CYCLES
// ============================================================
function topTradingCycles(sPrefs, sPriority, nS, nSch, caps) {
    const sMatch = new Array(nS).fill(-1);
    const steps = [];
    const sRemaining = new Set();
    for(let i=0;i<nS;i++) sRemaining.add(i);
    const schRemaining = new Map();
    for(let i=0;i<nSch;i++) schRemaining.set(i, caps[i]);
    const sPrefIdx = new Array(nS).fill(0);
    const schPriorityIdx = new Array(nSch).fill(0);
    let iteration = 0;
    while(sRemaining.size > 0 && iteration < 100) {
        iteration++;
        const sPoints = {};
        const schPoints = {};
        for(const s of sRemaining) {
            while(sPrefIdx[s] < sPrefs[s].length && !schRemaining.has(sPrefs[s][sPrefIdx[s]])) sPrefIdx[s]++;
            if(sPrefIdx[s] < sPrefs[s].length) sPoints[s] = sPrefs[s][sPrefIdx[s]];
        }
        for(const [sch] of schRemaining) {
            while(schPriorityIdx[sch] < sPriority[sch].length && !sRemaining.has(sPriority[sch][schPriorityIdx[sch]])) schPriorityIdx[sch]++;
            if(schPriorityIdx[sch] < sPriority[sch].length) schPoints[sch] = sPriority[sch][schPriorityIdx[sch]];
        }
        // find cycles
        const visited = new Set();
        const cycles = [];
        for(const s of sRemaining) {
            if(visited.has('s'+s)) continue;
            const path = [];
            const pathSet = new Set();
            let cur = {type:'s',id:s};
            while(cur && !visited.has(cur.type+cur.id)) {
                if(pathSet.has(cur.type+cur.id)){
                    const ci = path.findIndex(x=>x.type===cur.type&&x.id===cur.id);
                    cycles.push(path.slice(ci));
                    break;
                }
                path.push(cur);
                pathSet.add(cur.type+cur.id);
                if(cur.type==='s'){
                    const sch = sPoints[cur.id];
                    cur = sch!==undefined ? {type:'sch',id:sch} : null;
                } else {
                    const st = schPoints[cur.id];
                    cur = st!==undefined ? {type:'s',id:st} : null;
                }
            }
            for(const node of path) visited.add(node.type+node.id);
        }
        if(cycles.length===0) break;
        for(const cycle of cycles){
            for(const node of cycle){
                if(node.type==='s'){
                    const sch = sPoints[node.id];
                    if(sch!==undefined){
                        sMatch[node.id]=sch;
                        sRemaining.delete(node.id);
                        const rem = schRemaining.get(sch)-1;
                        if(rem<=0) schRemaining.delete(sch);
                        else schRemaining.set(sch,rem);
                        steps.push({type:'ttc-assign',s:node.id,sch,iteration});
                    }
                }
            }
        }
    }
    return {sMatch, steps};
}

// ============================================================
// COUNT BLOCKING PAIRS
// ============================================================
function countBlockingPairs(sMatch, sPrefs, sPriority, nS, nSch) {
    let bp=0;
    for(let s=0;s<nS;s++){
        const curSch = sMatch[s];
        const curRank = curSch>=0 ? sPrefs[s].indexOf(curSch) : sPrefs[s].length;
        for(let rank=0;rank<curRank;rank++){
            const sch = sPrefs[s][rank];
            // check if sch prefers s over some currently assigned student
            const assigned = [];
            for(let s2=0;s2<nS;s2++) if(sMatch[s2]===sch) assigned.push(s2);
            for(const s2 of assigned){
                if(sPriority[sch].indexOf(s) < sPriority[sch].indexOf(s2)){bp++;break;}
            }
        }
    }
    return bp;
}

// ============================================================
// STATE MANAGEMENT
// ============================================================
let state = {};

function initClassic() {
    const n = state.n || 5;
    const pPrefs = randPrefs(n, n);
    const rPrefs = randPrefs(n, n);
    const result = galeShapley(pPrefs, rPrefs, n, n);
    state = {
        mode:'classic', n, pPrefs, rPrefs,
        steps: result.steps, pMatch: result.pMatch, rMatch: result.rMatch,
        stepIdx: 0, playing: false, speed: 1,
        animProgress: 1, currentStep: null
    };
}

function initAsymmetry() {
    const n = state.n || 5;
    const aPrefs = randPrefs(n, n);
    const bPrefs = randPrefs(n, n);
    const r1 = galeShapley(aPrefs, bPrefs, n, n);
    const r2 = galeShapley(bPrefs, aPrefs, n, n);
    // Convert r2 back: r2.pMatch[b] = a means b->a, we need a->b for display
    const r2aMatch = new Array(n).fill(-1);
    const r2bMatch = new Array(n).fill(-1);
    for(let b=0;b<n;b++){if(r2.pMatch[b]>=0){r2aMatch[r2.pMatch[b]]=b;r2bMatch[b]=r2.pMatch[b];}}
    state = {
        mode:'asymmetry', n, aPrefs, bPrefs,
        r1Match: r1.pMatch, r2Match: r2aMatch,
        r1Steps: r1.steps, r2Steps: r2.steps,
        avgA1: avgRank(r1.pMatch.map((r,i)=>[i,r]), aPrefs),
        avgB1: avgRank(r1.rMatch.map((p,i)=>[i,p>=0?aPrefs[p].indexOf(i):-1]).map(([i,_])=>[i,r1.rMatch[i]>=0?bPrefs[i].indexOf(r1.rMatch[i])+1:0]).map(x=>x), bPrefs),
        avgA2: 0, avgB2: 0
    };
    // recalc averages properly
    let sumA1=0,sumB1=0,sumA2=0,sumB2=0,c=0;
    for(let a=0;a<n;a++){
        const bPartner1 = r1.pMatch[a];
        if(bPartner1>=0){sumA1+=aPrefs[a].indexOf(bPartner1)+1;c++;}
        const bPartner2 = r2aMatch[a];
        if(bPartner2>=0) sumA2+=aPrefs[a].indexOf(bPartner2)+1;
    }
    for(let b=0;b<n;b++){
        const aPartner1 = r1.rMatch[b];
        if(aPartner1>=0) sumB1+=bPrefs[b].indexOf(aPartner1)+1;
        const aPartner2 = r2.pMatch[b]>=0 ? r2.pMatch[b] : -1;
        if(r2.pMatch[b]>=0) sumB2+=bPrefs[b].indexOf(r2.pMatch[b])+1;
    }
    state.avgA1=c?sumA1/c:0; state.avgB1=c?sumB1/c:0;
    state.avgA2=c?sumA2/c:0; state.avgB2=c?sumB2/c:0;
}

function initSchool() {
    const nS = state.nStudents || 8;
    const nSch = state.nSchools || 4;
    const cap = state.schoolCap || 2;
    const sPrefs = randPrefs(nS, nSch);
    const sPriority = randPrefs(nSch, nS);
    const caps = new Array(nSch).fill(cap);
    const daResult = galeShapley(sPrefs, sPriority, nS, nSch);
    const bostonResult = bostonMechanism(sPrefs, sPriority, nS, nSch, [...caps]);
    const ttcResult = topTradingCycles(sPrefs, sPriority, nS, nSch, [...caps]);
    state = {
        mode:'school', nStudents:nS, nSchools:nSch, schoolCap:cap,
        sPrefs, sPriority, caps,
        daMatch: daResult.pMatch,
        bostonMatch: bostonResult.sMatch,
        ttcMatch: ttcResult.sMatch,
        daBP: countBlockingPairs(daResult.pMatch, sPrefs, sPriority, nS, nSch),
        bostonBP: countBlockingPairs(bostonResult.sMatch, sPrefs, sPriority, nS, nSch),
        ttcBP: countBlockingPairs(ttcResult.sMatch, sPrefs, sPriority, nS, nSch),
        selectedAlgo: 'all'
    };
}

function initNRMP() {
    const nR = state.nResidents || 9;
    const nH = state.nHospitals || 3;
    const cap = state.hospCap || 3;
    const rPrefs = randPrefs(nR, nH);
    const hPriority = randPrefs(nH, nR);
    const caps = new Array(nH).fill(cap);
    // Student-proposing DA
    const studentDA = galeShapley(rPrefs, hPriority, nR, nH);
    // Hospital-proposing DA (flip)
    const hospDA = galeShapley(hPriority, rPrefs, nH, nR);
    // Convert hospital-proposing results
    const hospMatch = new Array(nR).fill(-1);
    for(let h=0;h<nH;h++){
        if(hospDA.pMatch[h]>=0) hospMatch[hospDA.pMatch[h]]=h;
    }
    // Actually do many-to-one properly
    const sDAMatch = manyToOneDA(rPrefs, hPriority, nR, nH, caps, 'student');
    const hDAMatch = manyToOneDA(rPrefs, hPriority, nR, nH, caps, 'hospital');
    state = {
        mode:'nrmp', nResidents:nR, nHospitals:nH, hospCap:cap,
        rPrefs, hPriority, caps,
        studentDAMatch: sDAMatch,
        hospDAMatch: hDAMatch,
        showMode: 'student'
    };
}

function manyToOneDA(rPrefs, hPriority, nR, nH, caps, proposer) {
    const rMatch = new Array(nR).fill(-1);
    const hSlots = [];
    for(let h=0;h<nH;h++) hSlots[h]=[];
    const hRank = [];
    for(let h=0;h<nH;h++){
        hRank[h]={};
        for(let i=0;i<hPriority[h].length;i++) hRank[h][hPriority[h][i]]=i;
    }
    if(proposer==='student'){
        const propIdx = new Array(nR).fill(0);
        let changed=true;
        while(changed){
            changed=false;
            for(let r=0;r<nR;r++){
                if(rMatch[r]>=0||propIdx[r]>=rPrefs[r].length) continue;
                const h = rPrefs[r][propIdx[r]];
                propIdx[r]++;
                changed=true;
                if(hSlots[h].length < caps[h]){
                    rMatch[r]=h; hSlots[h].push(r);
                } else {
                    let worst=-1,worstRank=-1;
                    for(const s of hSlots[h]){
                        const rank = hRank[h][s]!==undefined?hRank[h][s]:999;
                        if(rank>worstRank){worstRank=rank;worst=s;}
                    }
                    const myRank = hRank[h][r]!==undefined?hRank[h][r]:999;
                    if(myRank<worstRank){
                        hSlots[h]=hSlots[h].filter(s=>s!==worst);
                        rMatch[worst]=-1;
                        rMatch[r]=h; hSlots[h].push(r);
                    }
                }
            }
        }
    } else {
        const propIdx = new Array(nH).fill(0);
        const rRank = [];
        for(let r=0;r<nR;r++){
            rRank[r]={};
            for(let i=0;i<rPrefs[r].length;i++) rRank[r][rPrefs[r][i]]=i;
        }
        let changed=true;
        while(changed){
            changed=false;
            for(let h=0;h<nH;h++){
                while(hSlots[h].length < caps[h] && propIdx[h] < hPriority[h].length){
                    const r = hPriority[h][propIdx[h]];
                    propIdx[h]++;
                    changed=true;
                    if(rMatch[r]<0){
                        rMatch[r]=h; hSlots[h].push(r);
                    } else {
                        const curH = rMatch[r];
                        const curRank = rRank[r][curH]!==undefined?rRank[r][curH]:999;
                        const newRank = rRank[r][h]!==undefined?rRank[r][h]:999;
                        if(newRank < curRank){
                            hSlots[curH]=hSlots[curH].filter(s=>s!==r);
                            rMatch[r]=h; hSlots[h].push(r);
                        }
                    }
                }
            }
        }
    }
    return rMatch;
}

function initWelfare() {
    const n = state.welfareN || 6;
    const trials = state.welfareTrials || 200;
    const results = {da_s:[],da_r:[],boston:[],ttc:[]};
    const dist = {da_s:new Array(n).fill(0),da_r:new Array(n).fill(0),boston:new Array(n).fill(0),ttc:new Array(n).fill(0)};
    for(let t=0;t<trials;t++){
        const sP = randPrefs(n,n);
        const rP = randPrefs(n,n);
        const caps = new Array(n).fill(1);
        const da_s = galeShapley(sP, rP, n, n);
        const da_r = galeShapley(rP, sP, n, n);
        const bos = bostonMechanism(sP, rP, n, n, [...caps]);
        const ttc = topTradingCycles(sP, rP, n, n, [...caps]);
        const avgDAS = avgRank(da_s.pMatch.map((r,i)=>[i,r]),sP);
        // For da_r, convert back
        let sumDAR=0;
        for(let s=0;s<n;s++){
            const h = da_r.rMatch[s];
            if(h>=0) sumDAR+=sP[s].indexOf(h)+1; else sumDAR+=n;
        }
        const avgDAR=sumDAR/n;
        const avgBos=avgRank(bos.sMatch.map((r,i)=>[i,r]),sP);
        const avgTTC=avgRank(ttc.sMatch.map((r,i)=>[i,r]),sP);
        results.da_s.push(avgDAS);
        results.da_r.push(avgDAR);
        results.boston.push(avgBos);
        results.ttc.push(avgTTC);
        // Distribution of choices
        for(let s=0;s<n;s++){
            const r1=da_s.pMatch[s]; if(r1>=0){const rk=sP[s].indexOf(r1); if(rk<n) dist.da_s[rk]++;}
            const r3=bos.sMatch[s]; if(r3>=0){const rk=sP[s].indexOf(r3); if(rk<n) dist.boston[rk]++;}
            const r4=ttc.sMatch[s]; if(r4>=0){const rk=sP[s].indexOf(r4); if(rk<n) dist.ttc[rk]++;}
        }
        for(let r=0;r<n;r++){
            const s=da_r.rMatch[r]; if(s>=0){const partner=da_r.pMatch[s]; if(partner>=0){const rk=sP[partner]?sP[partner].indexOf(r):-1; if(rk>=0&&rk<n) dist.da_r[rk]++;}}
        }
    }
    state = {
        mode:'welfare', welfareN:n, welfareTrials:trials,
        results, dist,
        meanDAS: results.da_s.reduce((a,b)=>a+b,0)/trials,
        meanDAR: results.da_r.reduce((a,b)=>a+b,0)/trials,
        meanBos: results.boston.reduce((a,b)=>a+b,0)/trials,
        meanTTC: results.ttc.reduce((a,b)=>a+b,0)/trials
    };
}

function render() {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = 'rgba(254,250,224,0.3)';
    ctx.fillRect(0,0,W,H);
    switch(currentMode){
        case 'classic': renderClassic(); break;
        case 'asymmetry': renderAsymmetry(); break;
        case 'school': renderSchool(); break;
        case 'nrmp': renderNRMP(); break;
        case 'welfare': renderWelfare(); break;
    }
}

function drawCircle(x,y,r,fill,stroke,text,textColor){
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=fill;ctx.fill();
    if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();}
    if(text){ctx.fillStyle=textColor||'#fff';ctx.font=`bold ${Math.max(9,r*.55)}px Nunito`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,x,y);}
}

function drawLine(x1,y1,x2,y2,color,width,dashed){
    ctx.beginPath();
    if(dashed) ctx.setLineDash([5,5]); else ctx.setLineDash([]);
    ctx.strokeStyle=color;ctx.lineWidth=width||2;
    ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.setLineDash([]);
}

function drawArrow(x1,y1,x2,y2,color,width){
    const angle=Math.atan2(y2-y1,x2-x1);
    const len=8;
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=width||2;
    ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.beginPath();ctx.fillStyle=color;
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-len*Math.cos(angle-0.4),y2-len*Math.sin(angle-0.4));
    ctx.lineTo(x2-len*Math.cos(angle+0.4),y2-len*Math.sin(angle+0.4));
    ctx.closePath();ctx.fill();
}

function renderClassic() {
    const n = state.n;
    const margin = 60;
    const colL = W * 0.25;
    const colR = W * 0.75;
    const topY = margin;
    const botY = H - margin;
    const spacing = n > 1 ? (botY - topY) / (n - 1) : 0;
    const r = Math.min(22, spacing * 0.35, 30);

    // Title
    ctx.fillStyle = C.moss;
    ctx.font = 'bold 14px Lora';
    ctx.textAlign = 'center';
    ctx.fillText('Proposers (Group A)', colL, 25);
    ctx.fillText('Receivers (Group B)', colR, 25);

    // Draw matches first
    const stepLimit = state.stepIdx;
    const tempPMatch = new Array(n).fill(-1);
    const tempRMatch = new Array(n).fill(-1);
    const rejections = [];
    for(let i=0;i<stepLimit && i<state.steps.length;i++){
        const s=state.steps[i];
        if(s.type==='accept'){tempPMatch[s.p]=s.r;tempRMatch[s.r]=s.p;}
        else if(s.type==='displace'){tempPMatch[s.displaced]=-1;tempPMatch[s.p]=s.r;tempRMatch[s.r]=s.p;}
        else if(s.type==='reject'){rejections.push({p:s.p,r:s.r});}
    }

    // Draw match lines
    for(let p=0;p<n;p++){
        if(tempPMatch[p]>=0){
            const py = topY + p * spacing;
            const ry = topY + tempPMatch[p] * spacing;
            drawLine(colL+r+4, py, colR-r-4, ry, C.matched, 3);
        }
    }

    // Current step highlight
    if(stepLimit > 0 && stepLimit <= state.steps.length){
        const cs = state.steps[stepLimit-1];
        const py = topY + cs.p * spacing;
        const ry = topY + cs.r * spacing;
        const col = cs.type==='reject' ? C.rejected : C.matched;
        drawArrow(colL+r+4, py, colR-r-4, ry, col, 3);
        if(cs.type==='reject'){
            ctx.font = 'bold 11px Nunito';
            ctx.fillStyle = C.rejected;
            const mx=(colL+colR)/2, my=(py+ry)/2;
            ctx.fillText('REJECTED', mx, my-10);
        } else if(cs.type==='displace' && cs.displaced>=0){
            ctx.font = 'bold 11px Nunito';
            ctx.fillStyle = C.earth;
            const mx=(colL+colR)/2, my=(py+ry)/2;
            ctx.fillText('DISPLACED #'+(cs.displaced+1), mx, my-10);
        }
    }

    // Draw participants
    for(let i=0;i<n;i++){
        const y = topY + i * spacing;
        const pColor = tempPMatch[i]>=0 ? C.matched : C.free;
        drawCircle(colL, y, r, pColor, C.darkMoss, NAMES_A[i] ? NAMES_A[i].substring(0,3) : ''+(i+1), '#fff');
        const rColor = tempRMatch[i]>=0 ? C.matched : C.free;
        drawCircle(colR, y, r, rColor, C.darkMoss, NAMES_B[i] ? NAMES_B[i].substring(0,4) : ''+(i+1), '#fff');

        // Preference lists
        ctx.font = '10px Nunito';
        ctx.textAlign = 'left';
        ctx.fillStyle = C.darkMoss;
        const prefStr = state.pPrefs[i].map(x=>(x+1)).join(', ');
        ctx.fillText('Prefs: '+prefStr, colL+r+8, y+4);
    }

    // Step info
    ctx.font = '12px Nunito';
    ctx.fillStyle = C.darkMoss;
    ctx.textAlign = 'left';
    ctx.fillText(`Step ${stepLimit} / ${state.steps.length}`, 10, H-10);
}

function renderAsymmetry() {
    const n = state.n;
    const halfW = W/2;
    const margin = 50;
    const topY = 50;
    const botY = H * 0.55;
    const spacing = n>1?(botY-topY)/(n-1):0;
    const r = Math.min(18, spacing*0.35);

    // Labels
    ctx.font = 'bold 13px Lora';
    ctx.textAlign = 'center';
    ctx.fillStyle = C.moss;
    ctx.fillText('A Proposes to B', halfW*0.5, 20);
    ctx.fillText('B Proposes to A', halfW*1.5, 20);

    // Draw vertical divider
    ctx.beginPath();ctx.strokeStyle='rgba(96,108,56,0.2)';ctx.lineWidth=1;
    ctx.moveTo(halfW,10);ctx.lineTo(halfW,H*0.6);ctx.stroke();

    const colL1=halfW*0.2, colR1=halfW*0.8;
    const colL2=halfW+halfW*0.2, colR2=halfW+halfW*0.8;

    // Config 1: A proposes
    for(let i=0;i<n;i++){
        const y=topY+i*spacing;
        const matched1=state.r1Match[i]>=0;
        drawCircle(colL1,y,r,matched1?C.sage:C.free,C.darkMoss,NAMES_A[i]?NAMES_A[i][0]:''+(i+1),'#fff');
        drawCircle(colR1,y,r,matched1?C.sage:C.free,C.darkMoss,''+(i+1),'#fff');
        if(state.r1Match[i]>=0){
            const ry=topY+state.r1Match[i]*spacing;
            drawLine(colL1+r+2,y,colR1-r-2,ry,C.matched,2);
        }
    }

    // Config 2: B proposes
    for(let i=0;i<n;i++){
        const y=topY+i*spacing;
        const matched2=state.r2Match[i]>=0;
        drawCircle(colL2,y,r,matched2?C.earth:C.free,C.darkMoss,NAMES_A[i]?NAMES_A[i][0]:''+(i+1),'#fff');
        drawCircle(colR2,y,r,matched2?C.earth:C.free,C.darkMoss,''+(i+1),'#fff');
        if(state.r2Match[i]>=0){
            const ry=topY+state.r2Match[i]*spacing;
            drawLine(colL2+r+2,y,colR2-r-2,ry,C.earth,2);
        }
    }

    // Bar chart comparison
    const chartY = H*0.62;
    const chartH = H*0.3;
    const barW = W*0.08;
    const maxVal = Math.max(state.avgA1,state.avgB1,state.avgA2,state.avgB2,1);

    ctx.font = 'bold 12px Lora';
    ctx.textAlign = 'center';
    ctx.fillStyle = C.moss;
    ctx.fillText('Average Rank of Partner (lower = better)', W/2, chartY-5);

    const bars = [
        {label:'A (A prop.)',val:state.avgA1,color:C.sage,x:W*0.15},
        {label:'B (A prop.)',val:state.avgB1,color:C.sage+'88',x:W*0.3},
        {label:'A (B prop.)',val:state.avgA2,color:C.earth,x:W*0.55},
        {label:'B (B prop.)',val:state.avgB2,color:C.earth+'88',x:W*0.7}
    ];
    for(const b of bars){
        const h = (b.val/maxVal)*chartH*0.7;
        ctx.fillStyle=b.color;
        ctx.fillRect(b.x-barW/2,chartY+chartH-h,barW,h);
        ctx.fillStyle=C.darkMoss;ctx.font='10px Nunito';
        ctx.fillText(b.val.toFixed(2),b.x,chartY+chartH-h-8);
        ctx.fillText(b.label,b.x,chartY+chartH+14);
    }

    // Insight
    ctx.font = 'italic 11px Nunito';
    ctx.fillStyle = C.terracotta;
    ctx.fillText('Proposers always get better outcomes (lower rank = happier)', W/2, H-15);
}

function renderSchool() {
    const {nStudents:nS,nSchools:nSch,sPrefs,daMatch,bostonMatch,ttcMatch} = state;

    const topY = 45;
    const sSpacing = Math.min(30, (H-100)/nS);
    const schSpacing = Math.min(50, (H-100)/nSch);
    const r = Math.min(14, sSpacing*0.4);
    const sr = Math.min(20, schSpacing*0.4);

    const algos = [
        {name:'Deferred Acceptance',match:daMatch,bp:state.daBP,color:C.sage,offset:0},
        {name:'Boston Mechanism',match:bostonMatch,bp:state.bostonBP,color:C.earth,offset:section},
        {name:'Top Trading Cycles',match:ttcMatch,bp:state.ttcBP,color:C.terracotta,offset:section*2}
    ];

    for(const algo of algos){
        const ox = algo.offset;
        ctx.font = 'bold 11px Lora';
        ctx.textAlign = 'center';
        ctx.fillStyle = C.moss;
        ctx.fillText(algo.name, ox+section/2, 18);

        // Blocking pairs badge
        ctx.font = '10px Nunito';
        ctx.fillStyle = algo.bp>0?C.rejected:C.matched;
        ctx.fillText(`Blocking pairs: ${algo.bp}`, ox+section/2, 32);

        const sCol = ox+section*0.25;
        const schCol = ox+section*0.75;

        // Draw students
        for(let s=0;s<nS;s++){
            const y = topY + s*sSpacing;
            const matched = algo.match[s]>=0;
            drawCircle(sCol, y, r, matched?algo.color:C.free, null, STUDENT_NAMES[s]?STUDENT_NAMES[s][0]:''+(s+1), '#fff');
            if(algo.match[s]>=0){
                const schY = topY + algo.match[s]*schSpacing;
                drawLine(sCol+r+1, y, schCol-sr-1, schY, algo.color+'88', 1.5);
            }
        }
        // Draw schools
        for(let sch=0;sch<nSch;sch++){
            const y = topY + sch*schSpacing;
            const count = algo.match.filter(m=>m===sch).length;
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillRect(schCol-sr, y-sr*0.6, sr*2, sr*1.2);
            ctx.strokeStyle = algo.color;
            ctx.lineWidth=1.5;
            ctx.strokeRect(schCol-sr, y-sr*0.6, sr*2, sr*1.2);
            ctx.font = 'bold 9px Nunito';
            ctx.textAlign='center';
            ctx.fillStyle=C.darkMoss;
            ctx.fillText(SCHOOL_NAMES[sch]||('S'+(sch+1)), schCol, y-2);
            ctx.font = '8px Nunito';
            ctx.fillStyle=C.sage;
            ctx.fillText(`${count}/${state.schoolCap}`, schCol, y+10);
        }

        // Avg rank
        let sum=0,c=0;
        for(let s=0;s<nS;s++){
            if(algo.match[s]>=0){sum+=sPrefs[s].indexOf(algo.match[s])+1;c++;}
        }
        const avg = c?sum/c:0;
        ctx.font = 'bold 10px Nunito';
        ctx.fillStyle = C.darkMoss;
        ctx.textAlign='center';
        ctx.fillText(`Avg student rank: ${avg.toFixed(2)}`, ox+section/2, H-15);
    }
}

function renderWelfare() {
    const {welfareN:n,welfareTrials:trials,results,dist,meanDAS,meanDAR,meanBos,meanTTC} = state;
    const margin=40;

    // Title
    ctx.font='bold 14px Lora';ctx.textAlign='center';ctx.fillStyle=C.moss;
    ctx.fillText(`Monte Carlo Analysis: ${trials} Random Instances (n=${n})`,W/2,22);

    // Top half: histogram of avg ranks
    const chartL=margin, chartR=W-margin, chartT=40, chartH=H*0.35;
    const algos=[
        {name:'DA (Student)',data:results.da_s,color:C.sage,mean:meanDAS},
        {name:'DA (School)',data:results.da_r,color:C.terracotta,mean:meanDAR},
        {name:'Boston',data:results.boston,color:C.earth,mean:meanBos},
        {name:'TTC',data:results.ttc,color:C.moss,mean:meanTTC}
    ];

    // Create histogram bins
    const bins=20;
    const allVals=[...results.da_s,...results.da_r,...results.boston,...results.ttc];
    const minV=Math.min(...allVals),maxV=Math.max(...allVals);
    const binW=(maxV-minV)/bins||1;

    let maxCount=0;
    const histograms=algos.map(a=>{
        const h=new Array(bins).fill(0);
        for(const v of a.data){const bi=Math.min(bins-1,Math.floor((v-minV)/binW));h[bi]++;}
        maxCount=Math.max(maxCount,...h);
        return h;
    });

    const bw=(chartR-chartL)/bins;
    const barSubW=bw/algos.length*0.85;
    for(let ai=0;ai<algos.length;ai++){
        for(let bi=0;bi<bins;bi++){
            const h=(histograms[ai][bi]/maxCount)*chartH*0.85;
            const x=chartL+bi*bw+ai*barSubW;
            ctx.fillStyle=algos[ai].color+'88';
            ctx.fillRect(x,chartT+chartH-h,barSubW,h);
        }
    }
    // Axis
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(chartL,chartT+chartH);ctx.lineTo(chartR,chartT+chartH);ctx.stroke();
    ctx.font='9px Nunito';ctx.fillStyle=C.darkMoss;ctx.textAlign='center';
    ctx.fillText('Avg Rank of Partner (lower=better for students)',W/2,chartT+chartH+15);

    // Legend
    const legY=chartT+chartH+25;
    for(let i=0;i<algos.length;i++){
        const x=chartL+i*(W-2*margin)/algos.length;
        ctx.fillStyle=algos[i].color;
        ctx.fillRect(x,legY,12,12);
        ctx.fillStyle=C.darkMoss;ctx.font='10px Nunito';ctx.textAlign='left';
        ctx.fillText(`${algos[i].name}: ${algos[i].mean.toFixed(2)}`,x+16,legY+10);
    }

    // Bottom half: choice distribution
    const chartT2=legY+35;
    const chartH2=H-chartT2-30;
    ctx.font='bold 12px Lora';ctx.textAlign='center';ctx.fillStyle=C.moss;
    ctx.fillText('Distribution of Choice Rank Received by Students',W/2,chartT2-5);

    const total=trials*n;
    const dAlgos=[
        {name:'DA (Student)',d:dist.da_s,color:C.sage},
        {name:'DA (School)',d:dist.da_r,color:C.terracotta},
        {name:'Boston',d:dist.boston,color:C.earth},
        {name:'TTC',d:dist.ttc,color:C.moss}
    ];
    const groupW=(chartR-chartL)/n;
    const subBarW=groupW/dAlgos.length*0.8;
    let maxD=0;
    for(const a of dAlgos) for(const v of a.d) maxD=Math.max(maxD,v);

    for(let rank=0;rank<n;rank++){
        for(let ai=0;ai<dAlgos.length;ai++){
            const h=(dAlgos[ai].d[rank]/(maxD||1))*chartH2*0.75;
            const x=chartL+rank*groupW+ai*subBarW+(groupW-subBarW*dAlgos.length)/2;
            ctx.fillStyle=dAlgos[ai].color+'99';
            ctx.fillRect(x,chartT2+chartH2-h,subBarW,h);
        }
        ctx.font='9px Nunito';ctx.fillStyle=C.darkMoss;ctx.textAlign='center';
        ctx.fillText(`#${rank+1}`,chartL+rank*groupW+groupW/2,chartT2+chartH2+12);
    }
    ctx.fillText('Choice Rank',W/2,chartT2+chartH2+25);

    // Insight
    ctx.font='italic 10px Nunito';ctx.fillStyle=C.terracotta;ctx.textAlign='center';
    ctx.fillText('Student-proposing DA consistently gives students the best stable outcome',W/2,H-5);
}

// ============================================================
// SIDE PANELS
// ============================================================
function buildSidePanel() {
    let html = '';
    switch(currentMode){
        case 'classic': html = buildClassicPanel(); break;
        case 'asymmetry': html = buildAsymmetryPanel(); break;
        case 'school': html = buildSchoolPanel(); break;
        case 'nrmp': html = buildNRMPPanel(); break;
        case 'welfare': html = buildWelfarePanel(); break;
    }
    sidePanel.innerHTML = html;
    attachPanelEvents();
}

function buildClassicPanel() {
    return `
    <div class="panel">
        <h3>Controls</h3>
        <label class="ctrl">Pairs (n)
            <input type="range" id="ctrl-n" min="3" max="8" value="${state.n||5}">
            <span class="ctrl-val" id="ctrl-n-val">${state.n||5}</span>
        </label>
        <div class="controls-row">
            <button class="btn primary" id="btn-step">&raquo; Step</button>
            <button class="btn primary" id="btn-play">&#9654; Play</button>
            <button class="btn danger" id="btn-reset">Reset</button>
            <button class="btn" id="btn-new">New Prefs</button>
        </div>
        <label class="ctrl">Speed
            <input type="range" id="ctrl-speed" min="1" max="10" value="${state.speed||3}">
        </label>
    </div>
    <div class="panel">
        <h3>Statistics</h3>
        <div class="stat-grid">
            <div class="stat-item"><div class="val">${state.stepIdx||0}</div><div class="lbl">Steps Done</div></div>
            <div class="stat-item"><div class="val">${state.steps?state.steps.length:0}</div><div class="lbl">Total Steps</div></div>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:${C.matched}"></div>Matched</div>
            <div class="legend-item"><div class="legend-dot" style="background:${C.free}"></div>Free</div>
            <div class="legend-item"><div class="legend-dot" style="background:${C.rejected}"></div>Rejected</div>
        </div>
    </div>
    <div class="panel">
        <h3>About Gale-Shapley</h3>
        <p>The <strong>Deferred Acceptance</strong> algorithm (1962) finds a stable matching where no two participants would prefer each other over their assigned partners.</p>
        <h4>How It Works</h4>
        <ul>
            <li>Each proposer proposes to their top remaining choice</li>
            <li>Receivers tentatively accept the best proposal</li>
            <li>Rejected proposers try their next choice</li>
            <li>Repeat until everyone is matched</li>
        </ul>
        <h4>Key Properties</h4>
        <p><span class="badge badge-stable">Stable</span> <span class="badge badge-stratproof">Strategy-proof (proposers)</span></p>
        <p style="margin-top:6px;font-size:.72rem;">Complexity: O(n&sup2;) &bull; Always terminates &bull; Nobel Prize 2012 (Roth & Shapley)</p>
    </div>`;
}

function buildAsymmetryPanel() {
    return `
    <div class="panel">
        <h3>Controls</h3>
        <label class="ctrl">Pairs (n)
            <input type="range" id="ctrl-n" min="3" max="8" value="${state.n||5}">
            <span class="ctrl-val" id="ctrl-n-val">${state.n||5}</span>
        </label>
        <div class="controls-row">
            <button class="btn primary" id="btn-new">Generate New</button>
        </div>
    </div>
    <div class="panel">
        <h3>Results</h3>
        <h4>When A Proposes:</h4>
        <div class="stat-grid">
            <div class="stat-item"><div class="val">${state.avgA1?state.avgA1.toFixed(2):'-'}</div><div class="lbl">A's Avg Rank</div></div>
            <div class="stat-item"><div class="val">${state.avgB1?state.avgB1.toFixed(2):'-'}</div><div class="lbl">B's Avg Rank</div></div>
        </div>
        <h4>When B Proposes:</h4>
        <div class="stat-grid">
            <div class="stat-item"><div class="val">${state.avgA2?state.avgA2.toFixed(2):'-'}</div><div class="lbl">A's Avg Rank</div></div>
            <div class="stat-item"><div class="val">${state.avgB2?state.avgB2.toFixed(2):'-'}</div><div class="lbl">B's Avg Rank</div></div>
        </div>
    </div>
    <div class="panel">
        <h3>The Asymmetry Principle</h3>
        <p>The proposing side always gets their <strong>best valid partner</strong> (proposer-optimal), while receivers get their <strong>worst valid partner</strong> (receiver-pessimal).</p>
        <h4>Real-World Impact</h4>
        <p>The NRMP used hospital-proposing for 45 years (1952-1997), systematically favoring hospitals. After Alvin Roth's analysis, it switched to applicant-proposing in 1998.</p>
        <p style="margin-top:6px;font-size:.72rem;color:var(--terracotta)"><em>Lower rank = better outcome (1 = first choice)</em></p>
    </div>`;
}

function buildSchoolPanel() {

    <div class="panel">

        <label class="ctrl">Students

            <span class="ctrl-val" id="ctrl-students-val">${state.nStudents||8}</span>

        <label class="ctrl">Schools

            <span class="ctrl-val" id="ctrl-schools-val">${state.nSchools||4}</span>

        <label class="ctrl">Capacity/School

        <div class="controls-row">
            <button class="btn primary" id="btn-new">Regenerate</button>
        </div>
    </div>
    <div class="panel">
        <h3>Algorithm Comparison</h3>
        <h4>Deferred Acceptance</h4>
        <p><span class="badge badge-stable">Stable</span> <span class="badge badge-stratproof">Strategy-proof</span></p>
        <p>Used in NYC (2003+), Boston (2005+). No blocking pairs, but may not be Pareto efficient.</p>
        <h4>Boston Mechanism</h4>
        <p><span class="badge badge-efficient">Efficient*</span></p>
        <p>Historical mechanism. First-choice priority creates incentive to game preferences. Disadvantages unsophisticated families.</p>
        <h4>Top Trading Cycles</h4>
        <p><span class="badge badge-efficient">Efficient</span> <span class="badge badge-stratproof">Strategy-proof</span></p>
        <p>Pareto optimal but may violate school priorities. Used in New Orleans (2012).</p>
    </div>
    <div class="panel">
        <h3>Key Insight</h3>
        <p>NYC's 2003 reform reduced unassigned students from <strong>30,000 to 3,000</strong> (90% reduction) by switching to student-proposing DA.</p>
        <p style="margin-top:4px;font-size:.72rem;">Student-proposing DA maximizes student welfare among stable matchings while being strategy-proof for students.</p>
    </div>`;
}

function buildNRMPPanel() {
    return `
    <div class="panel">
        <h3>Controls</h3>
        <label class="ctrl">Residents
            <input type="range" id="ctrl-residents" min="6" max="12" value="${state.nResidents||9}">
            <span class="ctrl-val" id="ctrl-residents-val">${state.nResidents||9}</span>
        </label>
        <label class="ctrl">Hospitals
            <input type="range" id="ctrl-hospitals" min="2" max="6" value="${state.nHospitals||3}">

        <label class="ctrl">Capacity/Hospital

        <div class="controls-row">
            <button class="btn primary" id="btn-new">Regenerate</button>
        </div>
    </div>
    <div class="panel">
        <h3>NRMP History</h3>
        <p><strong>1952:</strong> NRMP created to end chaotic "exploding offers" in medical residency placement.</p>
        <p><strong>1952-1997:</strong> Used hospital-proposing algorithm (favored hospitals for 45 years).</p>
        <p><strong>1995:</strong> Alvin Roth commissioned to analyze the algorithm.</p>
        <p><strong>1998:</strong> Switched to applicant-proposing DA, favoring medical students.</p>
        <p><strong>Finding:</strong> Only ~0.1% of applicants matched differently between the two algorithms.</p>
    </div>
    <div class="panel">
        <h3>Rural Hospital Theorem</h3>
        <p>The set of unmatched participants and the number of filled positions at each hospital is <strong>the same in every stable matching</strong>. Unpopular hospitals cannot be helped by switching between stable algorithms.</p>

function buildWelfarePanel() {
    return `
    <div class="panel">
        <h3>Controls</h3>
        <label class="ctrl">Market Size (n)
            <input type="range" id="ctrl-wn" min="3" max="8" value="${state.welfareN||6}">

        </label>

            <select id="ctrl-trials">
                <option value="50" ${state.welfareTrials===50?'selected':''}>50</option>
                <option value="100" ${state.welfareTrials===100?'selected':''}>100</option>
                <option value="200" ${(state.welfareTrials===200||!state.welfareTrials)?'selected':''}>200</option>

            <button class="btn primary" id="btn-run">Run Analysis</button>
        </div>
    </div>
    <div class="panel">
        <h3>Mean Student Satisfaction</h3>
        <p style="font-size:.72rem;color:var(--sage)">(Average rank of assigned partner, lower = better)</p>
        <div class="stat-grid">
            <div class="stat-item"><div class="val" style="color:${C.sage}">${state.meanDAS?state.meanDAS.toFixed(2):'-'}</div><div class="lbl">DA (Student)</div></div>
            <div class="stat-item"><div class="val" style="color:${C.terracotta}">${state.meanDAR?state.meanDAR.toFixed(2):'-'}</div><div class="lbl">DA (School)</div></div>
            <div class="stat-item"><div class="val" style="color:${C.earth}">${state.meanBos?state.meanBos.toFixed(2):'-'}</div><div class="lbl">Boston</div></div>
            <div class="stat-item"><div class="val" style="color:${C.moss}">${state.meanTTC?state.meanTTC.toFixed(2):'-'}</div><div class="lbl">TTC</div></div>
        </div>
    </div>
    <div class="panel">
        <h3>Nobel Prize Context</h3>
        <p>In 2012, <strong>Lloyd Shapley</strong> and <strong>Alvin Roth</strong> received the Nobel Prize in Economics "for the theory of stable allocations and the practice of market design."</p>
        <h4>Key Findings</h4>
        <ul>
            <li>Student-proposing DA is optimal for students among all stable matchings</li>
            <li>No mechanism can be both stable AND Pareto efficient</li>
            <li>No mechanism can be stable AND strategy-proof for both sides (Roth 1982)</li>
            <li>Simply coordinating offers captures ~80% of possible welfare gains</li>
        </ul>
    </div>`;
}

// ============================================================
// EVENT HANDLING
// ============================================================
function attachPanelEvents() {
    // Classic mode
    const ctrlN = document.getElementById('ctrl-n');
    if(ctrlN) {
        ctrlN.addEventListener('input', e => {
            document.getElementById('ctrl-n-val').textContent = e.target.value;
        });
        ctrlN.addEventListener('change', e => {
            state.n = parseInt(e.target.value);
            if(currentMode==='classic') initClassic();
            else if(currentMode==='asymmetry') initAsymmetry();
            buildSidePanel(); render();
        });
    }
    const btnStep = document.getElementById('btn-step');
    if(btnStep) btnStep.addEventListener('click', () => {
        if(state.stepIdx < state.steps.length){
            state.stepIdx++;
            buildSidePanel(); render();
        }
    });
    const btnPlay = document.getElementById('btn-play');
    if(btnPlay) btnPlay.addEventListener('click', () => {
        if(state.playing){
            state.playing=false;
            btnPlay.textContent='▶ Play';
        } else {
            state.playing=true;
            btnPlay.textContent='⏸ Pause';
            playAnimation();
        }
    });
    const btnReset = document.getElementById('btn-reset');
    if(btnReset) btnReset.addEventListener('click', () => {
        state.stepIdx=0; state.playing=false;
        buildSidePanel(); render();
    });
    const btnNew = document.getElementById('btn-new');
    if(btnNew) btnNew.addEventListener('click', () => {
        state.playing=false;
        switch(currentMode){
            case 'classic': initClassic(); break;
            case 'asymmetry': initAsymmetry(); break;
            case 'school':
                state.nStudents=parseInt(document.getElementById('ctrl-students')?.value||8);
                state.nSchools=parseInt(document.getElementById('ctrl-schools')?.value||4);
                state.schoolCap=parseInt(document.getElementById('ctrl-cap')?.value||2);
                initSchool(); break;
            case 'nrmp':
                state.nResidents=parseInt(document.getElementById('ctrl-residents')?.value||9);
                state.nHospitals=parseInt(document.getElementById('ctrl-hospitals')?.value||3);
                state.hospCap=parseInt(document.getElementById('ctrl-hcap')?.value||3);
                initNRMP(); break;
        }
        buildSidePanel(); render();
    });

    // School mode sliders
    ['ctrl-students','ctrl-schools','ctrl-cap'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.addEventListener('input', e => {
            const valEl = document.getElementById(id+'-val');
            if(valEl) valEl.textContent = e.target.value;
        });
    });

    // NRMP sliders
    ['ctrl-residents','ctrl-hospitals','ctrl-hcap'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.addEventListener('input', e => {
            const valEl = document.getElementById(id+'-val');
            if(valEl) valEl.textContent = e.target.value;
        });
    });

    // Welfare
    const btnRun = document.getElementById('btn-run');
    if(btnRun) btnRun.addEventListener('click', () => {
        state.welfareN = parseInt(document.getElementById('ctrl-wn')?.value||6);
        state.welfareTrials = parseInt(document.getElementById('ctrl-trials')?.value||200);
        initWelfare();
        buildSidePanel(); render();
    });
    const ctrlWN = document.getElementById('ctrl-wn');
    if(ctrlWN) ctrlWN.addEventListener('input', e => {
        document.getElementById('ctrl-wn-val').textContent = e.target.value;
    });
    const ctrlSpeed = document.getElementById('ctrl-speed');
    if(ctrlSpeed) ctrlSpeed.addEventListener('input', e => {
        state.speed = parseInt(e.target.value);
    });
}

function playAnimation() {
    if(!state.playing) return;
    if(state.stepIdx < state.steps.length){
        state.stepIdx++;
        buildSidePanel();
        render();
        setTimeout(()=>playAnimation(), 800/(state.speed||1));
    } else {
        state.playing = false;
        const btn = document.getElementById('btn-play');
        if(btn) btn.textContent = '▶ Play';
    }
}

// ============================================================
// TAB SWITCHING
// ============================================================
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        currentMode = tab.dataset.mode;
        state.playing = false;
        switch(currentMode){
            case 'classic': initClassic(); break;
            case 'asymmetry': initAsymmetry(); break;
            case 'school': initSchool(); break;
            case 'nrmp': initNRMP(); break;
            case 'welfare': initWelfare(); break;
        }
        buildSidePanel();
        resize();
        render();
    });
});

// ============================================================
// INIT
// ============================================================
state.n = 5;
resize();
initClassic();
buildSidePanel();
render();
</script>
