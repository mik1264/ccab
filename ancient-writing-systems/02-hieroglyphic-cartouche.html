<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hieroglyphic Cartouche Generator - Ancient Writing Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1610; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(26, 22, 16, 0.9); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 14px 20px; color: #FEFAE0;
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center;
        }
        #nameInput {
            background: rgba(221, 161, 94, 0.15); border: 1px solid #DDA15E;
            color: #FEFAE0; padding: 8px 14px; border-radius: 8px; font-size: 1rem;
            font-family: Georgia, serif; width: 200px; text-align: center;
        }
        #nameInput::placeholder { color: rgba(254, 250, 224, 0.4); }
        .btn {
            background: rgba(138, 154, 91, 0.4); border: 1px solid #8A9A5B;
            color: #FEFAE0; padding: 8px 16px; border-radius: 8px; cursor: pointer;
            font-size: 0.9rem; transition: background 0.2s; font-family: Georgia, serif;
        }
        .btn:hover { background: rgba(138, 154, 91, 0.7); }
        #info {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(26, 22, 16, 0.85); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 12px 16px; color: #FEFAE0;
            font-size: 0.8rem; max-width: 240px; line-height: 1.5;
        }
        #info h3 { color: #DDA15E; margin-bottom: 4px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Cartouche Generator</h3>
        <p>Type your name to encode it in Egyptian hieroglyphics. The oval cartouche (shenu) enclosed royal names, symbolizing eternal protection.</p>
    </div>
    <div id="ui">
        <input type="text" id="nameInput" placeholder="Enter your name..." maxlength="12">
        <button class="btn" id="generateBtn">Inscribe</button>
        <button class="btn" id="randomBtn">Random Pharaoh</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let currentGlyphs = [];
    let animProgress = 0;
    let animating = false;
    let animFrame = null;

    const pharaohs = ['RAMSES', 'CLEOPATRA', 'TUTANKHAMUN', 'NEFERTITI', 'KHUFU', 'HATSHEPSUT', 'THUTMOSE', 'AKHENATEN'];

    // Simplified hieroglyphic alphabet - each letter maps to a drawable glyph
    const glyphMap = {
        A: { draw: drawVulture, name: 'Vulture' },
        B: { draw: drawFoot, name: 'Foot' },
        C: { draw: drawBasket, name: 'Basket' },
        D: { draw: drawHand, name: 'Hand' },
        E: { draw: drawReed, name: 'Reed' },
        F: { draw: drawViper, name: 'Viper' },
        G: { draw: drawJar, name: 'Jar Stand' },
        H: { draw: drawShelter, name: 'Shelter' },
        I: { draw: drawReed, name: 'Reed' },
        J: { draw: drawSnake, name: 'Snake' },
        K: { draw: drawBasket, name: 'Basket' },
        L: { draw: drawLion, name: 'Lion' },
        M: { draw: drawOwl, name: 'Owl' },
        N: { draw: drawWater, name: 'Water' },
        O: { draw: drawLasso, name: 'Lasso' },
        P: { draw: drawSquare, name: 'Mat' },
        Q: { draw: drawHill, name: 'Hill' },
        R: { draw: drawMouth, name: 'Mouth' },
        S: { draw: drawCloth, name: 'Cloth' },
        T: { draw: drawBread, name: 'Bread' },
        U: { draw: drawChick, name: 'Chick' },
        V: { draw: drawViper, name: 'Viper' },
        W: { draw: drawChick, name: 'Chick' },
        X: { draw: drawBasket, name: 'Basket+Cloth' },
        Y: { draw: drawDoubleReed, name: 'Two Reeds' },
        Z: { draw: drawBolt, name: 'Door Bolt' },
    };

    function drawVulture(ctx, x, y, s) {
        ctx.beginPath();
        ctx.moveTo(x, y - s * 0.4);
        ctx.quadraticCurveTo(x + s * 0.3, y - s * 0.5, x + s * 0.4, y - s * 0.2);
        ctx.quadraticCurveTo(x + s * 0.5, y, x + s * 0.3, y + s * 0.3);
        ctx.lineTo(x - s * 0.1, y + s * 0.4);
        ctx.quadraticCurveTo(x - s * 0.3, y + s * 0.1, x - s * 0.3, y - s * 0.2);
        ctx.quadraticCurveTo(x - s * 0.2, y - s * 0.4, x, y - s * 0.4);
        ctx.fill(); ctx.stroke();
        // Eye
        ctx.beginPath(); ctx.arc(x + s * 0.15, y - s * 0.25, s * 0.04, 0, Math.PI * 2); ctx.fill();
    }

    function drawFoot(ctx, x, y, s) {
        ctx.beginPath();
        ctx.moveTo(x - s * 0.2, y - s * 0.4);
        ctx.lineTo(x - s * 0.15, y + s * 0.2);
        ctx.lineTo(x + s * 0.3, y + s * 0.2);
        ctx.quadraticCurveTo(x + s * 0.35, y + s * 0.35, x + s * 0.15, y + s * 0.4);
        ctx.lineTo(x - s * 0.2, y + s * 0.3);
        ctx.closePath(); ctx.fill(); ctx.stroke();
    }

    function drawBasket(ctx, x, y, s) {
        ctx.beginPath();
        ctx.moveTo(x - s * 0.3, y - s * 0.1);
        ctx.lineTo(x + s * 0.3, y - s * 0.1);
        ctx.lineTo(x + s * 0.2, y + s * 0.3);
        ctx.lineTo(x - s * 0.2, y + s * 0.3);
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.arc(x, y - s * 0.2, s * 0.15, Math.PI, 0);
        ctx.stroke();
    }

    function drawHand(ctx, x, y, s) {
        ctx.beginPath();
        ctx.moveTo(x - s * 0.3, y);
        ctx.lineTo(x + s * 0.1, y);
        ctx.lineTo(x + s * 0.2, y - s * 0.15);
        ctx.lineTo(x + s * 0.3, y - s * 0.1);
        ctx.lineTo(x + s * 0.15, y + s * 0.05);
        ctx.lineTo(x + s * 0.1, y + s * 0.15);
        ctx.lineTo(x - s * 0.3, y + s * 0.15);
        ctx.closePath(); ctx.fill(); ctx.stroke();
    }

    function drawReed(ctx, x, y, s) {
        ctx.beginPath();
        ctx.moveTo(x, y + s * 0.4);
        ctx.lineTo(x, y - s * 0.2);
        ctx.quadraticCurveTo(x + s * 0.15, y - s * 0.4, x + s * 0.05, y - s * 0.45);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y - s * 0.1);
        ctx.quadraticCurveTo(x - s * 0.2, y - s * 0.25, x - s * 0.15, y - s * 0.35);
        ctx.stroke();
    }

    function drawViper(ctx, x, y, s) {
        ctx.beginPath();
        ctx.moveTo(x - s * 0.3, y + s * 0.1);
        ctx.quadraticCurveTo(x - s * 0.1, y - s * 0.3, x + s * 0.1, y);
        ctx.quadraticCurveTo(x + s * 0.3, y + s * 0.3, x + s * 0.35, y + s * 0.1);
        ctx.stroke();
        ctx.beginPath(); ctx.arc(x + s * 0.33, y + s * 0.05, s * 0.05, 0, Math.PI * 2); ctx.fill();
    }

    function drawJar(ctx, x, y, s) {
        ctx.beginPath();
        ctx.moveTo(x - s * 0.15, y - s * 0.4);
        ctx.lineTo(x + s * 0.15, y - s * 0.4);
        ctx.lineTo(x + s * 0.15, y - s * 0.25);
        ctx.lineTo(x + s * 0.25, y + s * 0.2);
        ctx.lineTo(x + s * 0.25, y + s * 0.4);
        ctx.lineTo(x - s * 0.25, y + s * 0.4);
        ctx.lineTo(x - s * 0.25, y + s * 0.2);
        ctx.lineTo(x - s * 0.15, y - s * 0.25);
        ctx.closePath(); ctx.fill(); ctx.stroke();
    }

    function drawShelter(ctx, x, y, s) {
        ctx.beginPath();
        ctx.moveTo(x - s * 0.35, y + s * 0.2);
        ctx.lineTo(x - s * 0.35, y - s * 0.15);
        ctx.lineTo(x, y - s * 0.4);
        ctx.lineTo(x + s * 0.35, y - s * 0.15);
        ctx.lineTo(x + s * 0.35, y + s * 0.2);
        ctx.stroke();
    }

    function drawSnake(ctx, x, y, s) {
        ctx.beginPath();
        ctx.moveTo(x - s * 0.3, y + s * 0.3);
        ctx.bezierCurveTo(x - s * 0.3, y - s * 0.3, x + s * 0.3, y - s * 0.3, x + s * 0.3, y);
        ctx.quadraticCurveTo(x + s * 0.35, y + s * 0.15, x + s * 0.2, y + s * 0.15);
        ctx.stroke();
    }

    function drawLion(ctx, x, y, s) {
        ctx.beginPath();
        ctx.ellipse(x, y + s * 0.1, s * 0.3, s * 0.15, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.arc(x - s * 0.25, y - s * 0.1, s * 0.12, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x + s * 0.3, y + s * 0.15);
        ctx.quadraticCurveTo(x + s * 0.45, y, x + s * 0.4, y - s * 0.1);
        ctx.stroke();
    }

    function drawOwl(ctx, x, y, s) {
        ctx.beginPath();
        ctx.ellipse(x, y - s * 0.15, s * 0.15, s * 0.2, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(x, y + s * 0.2, s * 0.12, s * 0.18, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        // Eyes
        ctx.beginPath(); ctx.arc(x - s * 0.06, y - s * 0.2, s * 0.035, 0, Math.PI * 2);
        ctx.arc(x + s * 0.06, y - s * 0.2, s * 0.035, 0, Math.PI * 2); ctx.fill();
    }

    function drawWater(ctx, x, y, s) {
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(x - s * 0.3, y - s * 0.15 + i * s * 0.2);
            ctx.bezierCurveTo(x - s * 0.1, y - s * 0.3 + i * s * 0.2, x + s * 0.1, y + i * s * 0.2, x + s * 0.3, y - s * 0.15 + i * s * 0.2);
            ctx.stroke();
        }
    }

    function drawLasso(ctx, x, y, s) {
        ctx.beginPath();
        ctx.arc(x, y - s * 0.1, s * 0.2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y + s * 0.1);
        ctx.lineTo(x, y + s * 0.4);
        ctx.stroke();
    }

    function drawSquare(ctx, x, y, s) {
        ctx.beginPath();
        ctx.rect(x - s * 0.25, y - s * 0.15, s * 0.5, s * 0.3);
        ctx.fill(); ctx.stroke();
        // Weave pattern
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(x - s * 0.25, y - s * 0.15 + i * s * 0.1 + s * 0.05);
            ctx.lineTo(x + s * 0.25, y - s * 0.15 + i * s * 0.1 + s * 0.05);
            ctx.stroke();
        }
    }

    function drawHill(ctx, x, y, s) {
        ctx.beginPath();
        ctx.moveTo(x - s * 0.35, y + s * 0.2);
        ctx.quadraticCurveTo(x, y - s * 0.4, x + s * 0.35, y + s * 0.2);
        ctx.closePath(); ctx.fill(); ctx.stroke();
    }

    function drawMouth(ctx, x, y, s) {
        ctx.beginPath();
        ctx.ellipse(x, y, s * 0.3, s * 0.12, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x - s * 0.2, y);
        ctx.lineTo(x + s * 0.2, y);
        ctx.stroke();
    }

    function drawCloth(ctx, x, y, s) {
        ctx.beginPath();
        ctx.moveTo(x - s * 0.1, y - s * 0.4);
        ctx.lineTo(x + s * 0.1, y - s * 0.4);
        ctx.lineTo(x + s * 0.25, y + s * 0.4);
        ctx.lineTo(x - s * 0.25, y + s * 0.4);
        ctx.closePath(); ctx.fill(); ctx.stroke();
    }

    function drawBread(ctx, x, y, s) {
        ctx.beginPath();
        ctx.moveTo(x, y - s * 0.35);
        ctx.lineTo(x + s * 0.25, y + s * 0.2);
        ctx.lineTo(x - s * 0.25, y + s * 0.2);
        ctx.closePath(); ctx.fill(); ctx.stroke();
    }

    function drawChick(ctx, x, y, s) {
        ctx.beginPath();
        ctx.ellipse(x - s * 0.05, y, s * 0.15, s * 0.2, -0.2, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.arc(x - s * 0.1, y - s * 0.25, s * 0.1, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x + s * 0.1, y + s * 0.2);
        ctx.lineTo(x + s * 0.1, y + s * 0.4);
        ctx.lineTo(x + s * 0.2, y + s * 0.4);
        ctx.stroke();
    }

    function drawDoubleReed(ctx, x, y, s) {
        drawReed(ctx, x - s * 0.1, y, s * 0.8);
        drawReed(ctx, x + s * 0.1, y, s * 0.8);
    }

    function drawBolt(ctx, x, y, s) {
        ctx.beginPath();
        ctx.moveTo(x - s * 0.3, y);
        ctx.lineTo(x + s * 0.3, y);
        ctx.moveTo(x - s * 0.1, y - s * 0.15);
        ctx.lineTo(x - s * 0.1, y + s * 0.15);
        ctx.moveTo(x + s * 0.1, y - s * 0.15);
        ctx.lineTo(x + s * 0.1, y + s * 0.15);
        ctx.stroke();
    }

    function drawScene() {
        ctx.fillStyle = '#1a1610';
        ctx.fillRect(0, 0, W, H);

        // Stone wall texture
        const wallGrad = ctx.createLinearGradient(0, 0, W, H);
        wallGrad.addColorStop(0, '#3a3020');
        wallGrad.addColorStop(0.5, '#4a3d28');
        wallGrad.addColorStop(1, '#3a3020');
        ctx.fillStyle = wallGrad;
        ctx.fillRect(0, 0, W, H);

        // Stone texture noise
        ctx.globalAlpha = 0.05;
        for (let i = 0; i < 2000; i++) {
            ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000';
            ctx.fillRect(Math.random() * W, Math.random() * H, 2, 2);
        }
        ctx.globalAlpha = 1;

        if (currentGlyphs.length === 0) {
            ctx.fillStyle = 'rgba(221, 161, 94, 0.3)';
            ctx.font = '1.2rem Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('Type a name and click Inscribe to create a cartouche', W / 2, H / 2);
            return;
        }

        const glyphSize = Math.min(60, W / (currentGlyphs.length + 3), H / 5);
        const totalW = currentGlyphs.length * glyphSize * 1.1;
        const cartoucheW = totalW + glyphSize * 1.5;
        const cartoucheH = glyphSize * 2;
        const cx = W / 2;
        const cy = H / 2;

        const prog = Math.min(animProgress, 1);

        // Draw cartouche oval
        ctx.save();
        ctx.globalAlpha = prog;

        // Cartouche border glow
        ctx.shadowColor = '#DDA15E';
        ctx.shadowBlur = 20 * prog;

        ctx.beginPath();
        ctx.ellipse(cx, cy, cartoucheW / 2 * prog, cartoucheH / 2 * prog, 0, 0, Math.PI * 2);
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Horizontal line at bottom of cartouche
        ctx.beginPath();
        ctx.moveTo(cx + cartoucheW / 2 * prog + 5, cy);
        ctx.lineTo(cx + cartoucheW / 2 * prog + 5, cy - cartoucheH / 3);
        ctx.lineTo(cx + cartoucheW / 2 * prog + 5, cy + cartoucheH / 3);
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.restore();

        // Draw glyphs
        const startX = cx - totalW / 2 + glyphSize * 0.55;
        currentGlyphs.forEach((g, i) => {
            const glyphProg = Math.max(0, Math.min(1, (animProgress - 0.3 - i * 0.08) / 0.5));
            if (glyphProg <= 0) return;

            const gx = startX + i * glyphSize * 1.1;
            const gy = cy;

            ctx.save();
            ctx.globalAlpha = glyphProg;
            ctx.translate(gx, gy);
            ctx.scale(glyphProg, glyphProg);
            ctx.translate(-gx, -gy);

            ctx.strokeStyle = '#DDA15E';
            ctx.fillStyle = 'rgba(221, 161, 94, 0.3)';
            ctx.lineWidth = 2;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            if (g.draw) {
                g.draw(ctx, gx, gy, glyphSize * 0.8);
            }

            // Letter label below
            ctx.fillStyle = 'rgba(254, 250, 224, 0.5)';
            ctx.font = `${glyphSize * 0.2}px Georgia`;
            ctx.textAlign = 'center';
            ctx.fillText(g.letter, gx, gy + glyphSize * 0.7);
            ctx.fillStyle = 'rgba(254, 250, 224, 0.3)';
            ctx.font = `${glyphSize * 0.15}px Georgia`;
            ctx.fillText(g.name, gx, gy + glyphSize * 0.9);

            ctx.restore();
        });
    }

    function encodeName(name) {
        const upper = name.toUpperCase().replace(/[^A-Z]/g, '');
        currentGlyphs = [];
        for (const ch of upper) {
            if (glyphMap[ch]) {
                currentGlyphs.push({ letter: ch, draw: glyphMap[ch].draw, name: glyphMap[ch].name });
            }
        }
        animProgress = 0;
        animating = true;
    }

    function animate() {
        animFrame = requestAnimationFrame(animate);
        if (animating) {
            animProgress += 0.015;
            if (animProgress > 2) animating = false;
        }
        drawScene();
    }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    document.getElementById('generateBtn').addEventListener('click', () => {
        const name = document.getElementById('nameInput').value.trim();
        if (name) encodeName(name);
    });

    document.getElementById('nameInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            const name = e.target.value.trim();
            if (name) encodeName(name);
        }
    });

    document.getElementById('randomBtn').addEventListener('click', () => {
        const p = pharaohs[Math.floor(Math.random() * pharaohs.length)];
        document.getElementById('nameInput').value = p;
        encodeName(p);
    });

    window.addEventListener('resize', resize);
    resize();
    animate();

    window.reset = function() {
        currentGlyphs = [];
        animProgress = 0;
        animating = false;
        document.getElementById('nameInput').value = '';
    };
    </script>
</body>
</html>
