<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rongorongo Script - Ancient Writing Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #12100e; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(18, 16, 14, 0.9); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 12px 20px; color: #FEFAE0;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center;
        }
        .btn {
            background: rgba(138, 154, 91, 0.4); border: 1px solid #8A9A5B;
            color: #FEFAE0; padding: 6px 14px; border-radius: 8px; cursor: pointer;
            font-size: 0.85rem; transition: background 0.2s;
        }
        .btn:hover { background: rgba(138, 154, 91, 0.7); }
        .btn.active { background: rgba(221, 161, 94, 0.5); border-color: #DDA15E; }
        #info {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(18, 16, 14, 0.9); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 12px 16px; color: #FEFAE0;
            font-size: 0.8rem; max-width: 250px; line-height: 1.5;
        }
        #info h3 { color: #DDA15E; margin-bottom: 4px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Rongorongo Script</h3>
        <p>Easter Island's mysterious undeciphered script (~400 glyphs). Found on 27 surviving wooden tablets. Written in reverse boustrophedon - alternating lines read in opposite directions, with every other line upside down. Click glyphs to place them.</p>
    </div>
    <div id="ui">
        <button class="btn active" data-mode="tablet">Tablet View</button>
        <button class="btn" data-mode="boustrophedon">Boustrophedon Demo</button>
        <button class="btn" data-mode="compose">Compose</button>
        <button class="btn" id="newGlyphs">Regenerate</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let time = 0;
    let mode = 'tablet';
    let tabletGlyphs = [];
    let composeGlyphs = [];
    let boustroLine = 0;

    // Generate pseudo-Rongorongo glyphs (figure-like)
    function generateGlyph(seed) {
        const r = mulberry32(seed);
        const parts = [];
        const bodyType = Math.floor(r() * 4);

        // Body
        if (bodyType === 0) { // Standing figure
            parts.push({ t: 'line', x1: 0.5, y1: 0.25, x2: 0.5, y2: 0.7 }); // body
            parts.push({ t: 'circle', cx: 0.5, cy: 0.18, r: 0.1 }); // head
            parts.push({ t: 'line', x1: 0.5, y1: 0.35, x2: 0.3, y2: 0.5 }); // left arm
            parts.push({ t: 'line', x1: 0.5, y1: 0.35, x2: 0.7, y2: 0.5 }); // right arm
            parts.push({ t: 'line', x1: 0.5, y1: 0.7, x2: 0.35, y2: 0.9 }); // left leg
            parts.push({ t: 'line', x1: 0.5, y1: 0.7, x2: 0.65, y2: 0.9 }); // right leg
        } else if (bodyType === 1) { // Bird-like
            parts.push({ t: 'ellipse', cx: 0.5, cy: 0.5, rx: 0.25, ry: 0.15 }); // body
            parts.push({ t: 'circle', cx: 0.75, cy: 0.4, r: 0.08 }); // head
            parts.push({ t: 'line', x1: 0.82, y1: 0.4, x2: 0.95, y2: 0.38 }); // beak
            parts.push({ t: 'line', x1: 0.35, y1: 0.65, x2: 0.35, y2: 0.85 }); // leg
            parts.push({ t: 'line', x1: 0.55, y1: 0.65, x2: 0.55, y2: 0.85 }); // leg
            if (r() > 0.5) parts.push({ t: 'arc', cx: 0.4, cy: 0.35, r: 0.2, sa: Math.PI * 1.2, ea: Math.PI * 1.8 }); // wing
        } else if (bodyType === 2) { // Fish/creature
            parts.push({ t: 'ellipse', cx: 0.5, cy: 0.5, rx: 0.3, ry: 0.12 }); // body
            parts.push({ t: 'line', x1: 0.8, y1: 0.5, x2: 0.95, y2: 0.35 }); // tail
            parts.push({ t: 'line', x1: 0.8, y1: 0.5, x2: 0.95, y2: 0.65 }); // tail
            parts.push({ t: 'circle', cx: 0.3, cy: 0.47, r: 0.03 }); // eye
            if (r() > 0.5) parts.push({ t: 'arc', cx: 0.5, cy: 0.38, r: 0.12, sa: Math.PI * 1.2, ea: Math.PI * 1.8 }); // fin
        } else { // Abstract/geometric
            parts.push({ t: 'circle', cx: 0.5, cy: 0.4, r: 0.15 });
            parts.push({ t: 'line', x1: 0.5, y1: 0.55, x2: 0.5, y2: 0.85 });
            parts.push({ t: 'line', x1: 0.35, y1: 0.4, x2: 0.15, y2: 0.3 });
            parts.push({ t: 'line', x1: 0.65, y1: 0.4, x2: 0.85, y2: 0.3 });
            if (r() > 0.4) parts.push({ t: 'line', x1: 0.5, y1: 0.85, x2: 0.35, y2: 0.95 });
            if (r() > 0.4) parts.push({ t: 'line', x1: 0.5, y1: 0.85, x2: 0.65, y2: 0.95 });
        }

        // Random embellishments
        if (r() > 0.6) parts.push({ t: 'line', x1: r() * 0.3 + 0.1, y1: r() * 0.3 + 0.1, x2: r() * 0.3 + 0.2, y2: r() * 0.3 + 0.2 });
        if (r() > 0.7) parts.push({ t: 'circle', cx: r() * 0.6 + 0.2, cy: r() * 0.4 + 0.1, r: 0.04 });

        return parts;
    }

    function mulberry32(a) {
        return function() {
            a |= 0; a = a + 0x6D2B79F5 | 0;
            let t = Math.imul(a ^ a >>> 15, 1 | a);
            t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
    }

    const allGlyphs = [];
    for (let i = 0; i < 120; i++) {
        allGlyphs.push(generateGlyph(i * 7919 + 31));
    }

    function drawGlyphShape(c, glyph, x, y, size, flipped) {
        c.save();
        if (flipped) {
            c.translate(x + size / 2, y + size / 2);
            c.rotate(Math.PI);
            c.translate(-(x + size / 2), -(y + size / 2));
        }

        c.lineCap = 'round';
        c.lineJoin = 'round';

        for (const p of glyph) {
            if (p.t === 'line') {
                c.beginPath();
                c.moveTo(x + p.x1 * size, y + p.y1 * size);
                c.lineTo(x + p.x2 * size, y + p.y2 * size);
                c.stroke();
            } else if (p.t === 'circle') {
                c.beginPath();
                c.arc(x + p.cx * size, y + p.cy * size, p.r * size, 0, Math.PI * 2);
                c.stroke();
            } else if (p.t === 'ellipse') {
                c.beginPath();
                c.ellipse(x + p.cx * size, y + p.cy * size, p.rx * size, p.ry * size, 0, 0, Math.PI * 2);
                c.stroke();
            } else if (p.t === 'arc') {
                c.beginPath();
                c.arc(x + p.cx * size, y + p.cy * size, p.r * size, p.sa, p.ea);
                c.stroke();
            }
        }
        c.restore();
    }

    function initTablet() {
        tabletGlyphs = [];
        for (let i = 0; i < 80; i++) {
            tabletGlyphs.push(Math.floor(Math.random() * allGlyphs.length));
        }
    }

    function drawTabletMode() {
        // Wooden tablet
        const tabW = Math.min(W * 0.8, 700);
        const tabH = Math.min(H * 0.75, 500);
        const tx = (W - tabW) / 2;
        const ty = (H - tabH) / 2;

        // Wood grain background
        const woodGrad = ctx.createLinearGradient(tx, ty, tx + tabW, ty + tabH);
        woodGrad.addColorStop(0, '#5a3d20');
        woodGrad.addColorStop(0.3, '#6a4d30');
        woodGrad.addColorStop(0.6, '#5a3d20');
        woodGrad.addColorStop(1, '#4a2d10');
        ctx.fillStyle = woodGrad;
        ctx.beginPath();
        ctx.roundRect(tx, ty, tabW, tabH, 12);
        ctx.fill();

        // Wood texture lines
        ctx.globalAlpha = 0.08;
        ctx.strokeStyle = '#2a1a08';
        ctx.lineWidth = 0.5;
        for (let y = ty; y < ty + tabH; y += 3) {
            ctx.beginPath();
            ctx.moveTo(tx, y + Math.sin(y * 0.1) * 2);
            ctx.lineTo(tx + tabW, y + Math.sin(y * 0.1 + 3) * 2);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // Border
        ctx.strokeStyle = 'rgba(100,70,40,0.6)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(tx, ty, tabW, tabH, 12);
        ctx.stroke();

        // Tablet name
        ctx.fillStyle = 'rgba(254,250,224,0.3)';
        ctx.font = 'italic 0.8rem Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Tablet RR1 (Recreation) - Reverse Boustrophedon', W / 2, ty - 10);

        // Draw glyphs in boustrophedon (alternating direction, alternating upside down)
        const pad = 25;
        const glyphSize = Math.min(35, (tabW - pad * 2) / 12);
        const cols = Math.floor((tabW - pad * 2) / (glyphSize + 4));
        const lineH = glyphSize + 8;

        ctx.strokeStyle = 'rgba(220,200,160,0.7)';
        ctx.lineWidth = 1.5;

        tabletGlyphs.forEach((gi, idx) => {
            const row = Math.floor(idx / cols);
            const colInRow = idx % cols;
            const isReversed = row % 2 === 1;
            const col = isReversed ? (cols - 1 - colInRow) : colInRow;
            const x = tx + pad + col * (glyphSize + 4);
            const y = ty + pad + row * lineH;

            if (y + glyphSize > ty + tabH - pad) return;

            drawGlyphShape(ctx, allGlyphs[gi], x, y, glyphSize, isReversed);
        });

        // Row direction arrows
        const maxRows = Math.floor((tabH - pad * 2) / lineH);
        for (let r = 0; r < maxRows; r++) {
            const ay = ty + pad + r * lineH + glyphSize / 2;
            const isRev = r % 2 === 1;
            ctx.fillStyle = 'rgba(221,161,94,0.3)';
            ctx.font = '0.7rem Georgia';
            ctx.textAlign = isRev ? 'right' : 'left';
            const arrowX = isRev ? tx + tabW + 8 : tx - 8;
            ctx.fillText(isRev ? '\u2190' : '\u2192', arrowX, ay + 4);
        }
    }

    function drawBoustrophedonDemo() {
        ctx.fillStyle = '#DDA15E';
        ctx.font = 'bold 1.2rem Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Reverse Boustrophedon Writing', W / 2, 50);

        ctx.fillStyle = 'rgba(254,250,224,0.6)';
        ctx.font = '0.9rem Georgia';
        ctx.fillText('Each line alternates direction AND is flipped upside-down', W / 2, 75);

        const demoText = 'THE RONGORONGO GLYPHS REMAIN ONE OF THE GREAT UNSOLVED MYSTERIES OF WRITING';
        const lineLen = 30;
        const lines = [];
        for (let i = 0; i < demoText.length; i += lineLen) {
            lines.push(demoText.substring(i, i + lineLen));
        }

        const fontSize = Math.min(20, W / 30);
        const lineH = fontSize * 2.2;
        const startY = 120;

        const animLine = Math.floor(boustroLine);
        const animChar = (boustroLine - animLine);

        lines.forEach((line, li) => {
            const y = startY + li * lineH;
            const isReversed = li % 2 === 1;
            const displayLine = isReversed ? line.split('').reverse().join('') : line;

            ctx.save();
            if (isReversed) {
                ctx.translate(W / 2, y + fontSize / 2);
                ctx.rotate(Math.PI);
                ctx.translate(-W / 2, -(y + fontSize / 2));
            }

            // Background strip
            ctx.fillStyle = isReversed ? 'rgba(221,161,94,0.08)' : 'rgba(138,154,91,0.08)';
            const tw = ctx.measureText(displayLine).width || displayLine.length * fontSize * 0.6;
            ctx.fillRect(W / 2 - tw * 0.6, y - 5, tw * 1.2, lineH * 0.7);

            ctx.font = `${fontSize}px Georgia`;
            ctx.textAlign = 'center';

            for (let ci = 0; ci < displayLine.length; ci++) {
                const charAlpha = li < animLine ? 1 : (li === animLine ? (ci / displayLine.length < animChar ? 1 : 0.15) : 0.15);
                ctx.fillStyle = isReversed ? `rgba(221,161,94,${charAlpha})` : `rgba(138,154,91,${charAlpha})`;
                const cx = W / 2 - (displayLine.length * fontSize * 0.35) / 2 + ci * fontSize * 0.35 + fontSize * 0.175;
                ctx.fillText(displayLine[ci], cx, y + fontSize);
            }

            ctx.restore();

            // Direction arrow
            ctx.fillStyle = 'rgba(254,250,224,0.3)';
            ctx.font = '0.8rem Georgia';
            ctx.textAlign = 'left';
            const arrow = isReversed ? '\u2190 flipped' : '\u2192 normal';
            ctx.fillText(arrow, W * 0.05, y + fontSize);
        });
    }

    function drawComposeMode() {
        ctx.fillStyle = '#DDA15E';
        ctx.font = 'bold 1.1rem Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Compose with Rongorongo Glyphs', W / 2, 45);
        ctx.fillStyle = 'rgba(254,250,224,0.5)';
        ctx.font = '0.85rem Georgia';
        ctx.fillText('Click glyphs from the palette below to build a sequence', W / 2, 68);

        // Composition area
        const compW = Math.min(W * 0.8, 600);
        const compH = 100;
        const compX = (W - compW) / 2;
        const compY = 90;

        ctx.fillStyle = 'rgba(90,60,30,0.3)';
        ctx.beginPath();
        ctx.roundRect(compX, compY, compW, compH, 10);
        ctx.fill();
        ctx.strokeStyle = 'rgba(221,161,94,0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Draw composed glyphs
        const gs = 50;
        composeGlyphs.forEach((gi, i) => {
            const x = compX + 10 + i * (gs + 5);
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 1.5;
            drawGlyphShape(ctx, allGlyphs[gi], x, compY + 25, gs, false);
        });

        // Palette
        const palY = compY + compH + 30;
        const palCols = Math.floor((W - 60) / 55);
        const palSize = Math.min(45, (W - 60) / palCols - 5);

        ctx.strokeStyle = 'rgba(138,154,91,0.6)';
        ctx.lineWidth = 1;
        for (let i = 0; i < Math.min(60, allGlyphs.length); i++) {
            const col = i % palCols;
            const row = Math.floor(i / palCols);
            const x = 30 + col * (palSize + 5);
            const y = palY + row * (palSize + 5);

            ctx.fillStyle = 'rgba(60,40,20,0.3)';
            ctx.beginPath();
            ctx.roundRect(x, y, palSize, palSize, 4);
            ctx.fill();

            drawGlyphShape(ctx, allGlyphs[i], x, y, palSize, false);
        }
    }

    function draw() {
        requestAnimationFrame(draw);
        time += 0.016;

        ctx.fillStyle = '#12100e';
        ctx.fillRect(0, 0, W, H);

        if (mode === 'tablet') {
            drawTabletMode();
        } else if (mode === 'boustrophedon') {
            boustroLine += 0.02;
            if (boustroLine > 10) boustroLine = 0;
            drawBoustrophedonDemo();
        } else if (mode === 'compose') {
            drawComposeMode();
        }
    }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    canvas.addEventListener('click', e => {
        if (mode === 'compose') {
            const palY = 220;
            const palCols = Math.floor((W - 60) / 55);
            const palSize = Math.min(45, (W - 60) / palCols - 5);
            const col = Math.floor((e.clientX - 30) / (palSize + 5));
            const row = Math.floor((e.clientY - palY) / (palSize + 5));
            const idx = row * palCols + col;
            if (idx >= 0 && idx < 60 && col >= 0 && col < palCols && row >= 0) {
                composeGlyphs.push(idx);
                if (composeGlyphs.length > 10) composeGlyphs.shift();
            }
        }
    });

    document.querySelectorAll('.btn[data-mode]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.btn[data-mode]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            mode = btn.dataset.mode;
            boustroLine = 0;
        });
    });

    document.getElementById('newGlyphs').addEventListener('click', () => {
        initTablet();
        composeGlyphs = [];
    });

    window.addEventListener('resize', resize);
    resize();
    initTablet();
    draw();

    window.reset = function() {
        mode = 'tablet';
        composeGlyphs = [];
        boustroLine = 0;
        initTablet();
        document.querySelectorAll('.btn[data-mode]').forEach(b => b.classList.remove('active'));
        document.querySelector('.btn[data-mode="tablet"]').classList.add('active');
    };
    </script>
</body>
</html>
