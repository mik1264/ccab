<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elder Futhark Runes - Ancient Writing Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1610; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(26, 22, 16, 0.9); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 14px 20px; color: #FEFAE0;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center;
        }
        #runeInput {
            background: rgba(221, 161, 94, 0.15); border: 1px solid #DDA15E;
            color: #FEFAE0; padding: 8px 14px; border-radius: 8px; font-size: 1rem;
            font-family: Georgia, serif; width: 200px; text-align: center;
        }
        #runeInput::placeholder { color: rgba(254, 250, 224, 0.4); }
        .btn {
            background: rgba(138, 154, 91, 0.4); border: 1px solid #8A9A5B;
            color: #FEFAE0; padding: 6px 14px; border-radius: 8px; cursor: pointer;
            font-size: 0.85rem; transition: background 0.2s;
        }
        .btn:hover { background: rgba(138, 154, 91, 0.7); }
        #info {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(26, 22, 16, 0.85); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 12px 16px; color: #FEFAE0;
            font-size: 0.8rem; max-width: 240px; line-height: 1.5;
        }
        #info h3 { color: #DDA15E; margin-bottom: 4px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Elder Futhark Runes</h3>
        <p>The oldest runic alphabet (c. 150-800 CE), 24 characters in 3 aettir (families of 8). Type text to transliterate, or click runes to learn their meanings.</p>
    </div>
    <div id="ui">
        <input type="text" id="runeInput" placeholder="Type to transliterate..." maxlength="20">
        <button class="btn" id="inscribeBtn">Inscribe</button>
        <button class="btn" id="castBtn">Cast Runes</button>
        <button class="btn" id="clearBtn">Clear</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let hoveredRune = -1;
    let inscribedRunes = [];
    let castRunes = [];
    let animFrame = null;
    let time = 0;

    // Elder Futhark: 24 runes with stroke data (relative coordinates)
    const runes = [
        { char: '\u16A0', name: 'Fehu', sound: 'F', meaning: 'Wealth, Cattle', aett: 0,
          strokes: [[0.5,0,0.5,1],[0.5,0.15,0.85,0.3],[0.5,0.4,0.85,0.55]] },
        { char: '\u16A2', name: 'Uruz', sound: 'U', meaning: 'Aurochs, Strength', aett: 0,
          strokes: [[0.25,0,0.25,0.7],[0.25,0.7,0.55,1],[0.55,1,0.75,0]] },
        { char: '\u16A6', name: 'Thurisaz', sound: 'TH', meaning: 'Giant, Thorn', aett: 0,
          strokes: [[0.35,0,0.35,1],[0.35,0.25,0.8,0.45],[0.8,0.45,0.35,0.65]] },
        { char: '\u16A8', name: 'Ansuz', sound: 'A', meaning: 'God, Mouth', aett: 0,
          strokes: [[0.65,0,0.65,1],[0.65,0.2,0.2,0.4],[0.65,0.45,0.2,0.65]] },
        { char: '\u16B1', name: 'Raidho', sound: 'R', meaning: 'Ride, Journey', aett: 0,
          strokes: [[0.35,0,0.35,1],[0.35,0.15,0.75,0.35],[0.75,0.35,0.35,0.55]] },
        { char: '\u16B2', name: 'Kenaz', sound: 'K', meaning: 'Torch, Knowledge', aett: 0,
          strokes: [[0.3,0,0.7,0.5],[0.7,0.5,0.3,1]] },
        { char: '\u16B7', name: 'Gebo', sound: 'G', meaning: 'Gift, Partnership', aett: 0,
          strokes: [[0.2,0.1,0.8,0.9],[0.8,0.1,0.2,0.9]] },
        { char: '\u16B9', name: 'Wunjo', sound: 'W', meaning: 'Joy, Bliss', aett: 0,
          strokes: [[0.35,0,0.35,1],[0.35,0,0.8,0.25],[0.8,0.25,0.35,0.5]] },
        // Second aett
        { char: '\u16BA', name: 'Hagalaz', sound: 'H', meaning: 'Hail, Disruption', aett: 1,
          strokes: [[0.25,0,0.25,1],[0.75,0,0.75,1],[0.25,0.35,0.75,0.65]] },
        { char: '\u16BE', name: 'Nauthiz', sound: 'N', meaning: 'Need, Constraint', aett: 1,
          strokes: [[0.5,0,0.5,1],[0.25,0.3,0.75,0.7]] },
        { char: '\u16C1', name: 'Isa', sound: 'I', meaning: 'Ice, Stillness', aett: 1,
          strokes: [[0.5,0.05,0.5,0.95]] },
        { char: '\u16C3', name: 'Jera', sound: 'J', meaning: 'Year, Harvest', aett: 1,
          strokes: [[0.5,0,0.8,0.25],[0.8,0.25,0.5,0.5],[0.5,0.5,0.2,0.75],[0.2,0.75,0.5,1]] },
        { char: '\u16C7', name: 'Eihwaz', sound: 'EI', meaning: 'Yew Tree, Defense', aett: 1,
          strokes: [[0.5,0,0.5,1],[0.5,0.25,0.75,0.4],[0.5,0.75,0.25,0.6]] },
        { char: '\u16C8', name: 'Perthro', sound: 'P', meaning: 'Lot Cup, Mystery', aett: 1,
          strokes: [[0.3,0,0.3,1],[0.3,0.15,0.75,0.35],[0.75,0.35,0.75,0.65],[0.75,0.65,0.3,0.85]] },
        { char: '\u16C9', name: 'Algiz', sound: 'Z', meaning: 'Elk, Protection', aett: 1,
          strokes: [[0.5,0.2,0.5,1],[0.5,0.2,0.2,0],[0.5,0.2,0.8,0]] },
        { char: '\u16CB', name: 'Sowilo', sound: 'S', meaning: 'Sun, Victory', aett: 1,
          strokes: [[0.3,0,0.7,0.35],[0.7,0.35,0.3,0.65],[0.3,0.65,0.7,1]] },
        // Third aett
        { char: '\u16CF', name: 'Tiwaz', sound: 'T', meaning: 'Tyr, Justice', aett: 2,
          strokes: [[0.5,0,0.5,1],[0.2,0,0.8,0]] },
        { char: '\u16D2', name: 'Berkano', sound: 'B', meaning: 'Birch, Growth', aett: 2,
          strokes: [[0.3,0,0.3,1],[0.3,0.15,0.75,0.35],[0.75,0.35,0.3,0.5],[0.3,0.5,0.75,0.7],[0.75,0.7,0.3,0.85]] },
        { char: '\u16D6', name: 'Ehwaz', sound: 'E', meaning: 'Horse, Trust', aett: 2,
          strokes: [[0.3,0,0.3,1],[0.7,0,0.7,1],[0.3,0.35,0.7,0.65]] },
        { char: '\u16D7', name: 'Mannaz', sound: 'M', meaning: 'Man, Self', aett: 2,
          strokes: [[0.2,0,0.2,1],[0.8,0,0.8,1],[0.2,0,0.5,0.3],[0.8,0,0.5,0.3]] },
        { char: '\u16DA', name: 'Laguz', sound: 'L', meaning: 'Lake, Flow', aett: 2,
          strokes: [[0.4,0,0.4,1],[0.4,0,0.8,0.4]] },
        { char: '\u16DC', name: 'Ingwaz', sound: 'NG', meaning: 'Ing, Fertility', aett: 2,
          strokes: [[0.5,0,0.8,0.5],[0.8,0.5,0.5,1],[0.5,1,0.2,0.5],[0.2,0.5,0.5,0]] },
        { char: '\u16DD', name: 'Dagaz', sound: 'D', meaning: 'Day, Breakthrough', aett: 2,
          strokes: [[0.2,0,0.2,1],[0.8,0,0.8,1],[0.2,0,0.8,0.5],[0.8,0.5,0.2,1]] },
        { char: '\u16DF', name: 'Othala', sound: 'O', meaning: 'Homeland, Heritage', aett: 2,
          strokes: [[0.5,0,0.8,0.35],[0.8,0.35,0.5,0.65],[0.5,0.65,0.2,0.35],[0.2,0.35,0.5,0],[0.35,0.65,0.35,1],[0.65,0.65,0.65,1]] },
    ];

    const aettColors = ['#DDA15E', '#8A9A5B', '#BC6C25'];
    const aettNames = ["Freya's Aett", "Heimdall's Aett", "Tyr's Aett"];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    function drawRune(rune, x, y, size, highlight, alpha) {
        ctx.save();
        ctx.globalAlpha = (alpha !== undefined ? alpha : 1);
        const pad = size * 0.15;
        const inner = size - pad * 2;

        // Background stone
        if (highlight) {
            ctx.fillStyle = 'rgba(221,161,94,0.15)';
            ctx.shadowColor = '#DDA15E';
            ctx.shadowBlur = 15;
        } else {
            ctx.fillStyle = 'rgba(50,40,30,0.6)';
        }
        ctx.beginPath();
        ctx.roundRect(x, y, size, size * 1.2, 8);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = highlight ? '#DDA15E' : 'rgba(138,154,91,0.3)';
        ctx.lineWidth = highlight ? 2 : 1;
        ctx.stroke();

        // Draw rune strokes
        ctx.strokeStyle = aettColors[rune.aett];
        ctx.lineWidth = Math.max(2, size * 0.05);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        for (const s of rune.strokes) {
            ctx.beginPath();
            ctx.moveTo(x + pad + s[0] * inner, y + pad + s[1] * inner * 1.2);
            ctx.lineTo(x + pad + s[2] * inner, y + pad + s[3] * inner * 1.2);
            ctx.stroke();
        }

        // Labels
        ctx.fillStyle = 'rgba(254,250,224,0.7)';
        ctx.font = `${Math.max(9, size * 0.16)}px Georgia`;
        ctx.textAlign = 'center';
        ctx.fillText(rune.name, x + size / 2, y + size * 1.2 + Math.max(12, size * 0.18));

        ctx.restore();
    }

    function drawGrid() {
        const margin = 60;
        const gap = 8;
        const cols = Math.min(8, Math.floor((W - margin * 2) / 80));
        const cellW = Math.floor((W - margin * 2 - gap * (cols - 1)) / cols);
        const cellH = cellW * 1.2;

        for (let aett = 0; aett < 3; aett++) {
            const startIdx = aett * 8;
            const ay = margin + aett * (cellH + gap + 40);

            // Aett label
            ctx.fillStyle = aettColors[aett];
            ctx.font = 'bold 0.9rem Georgia';
            ctx.textAlign = 'left';
            ctx.fillText(aettNames[aett], margin, ay - 8);

            for (let i = 0; i < 8; i++) {
                const ri = startIdx + i;
                const col = i % cols;
                const row = Math.floor(i / cols);
                const x = margin + col * (cellW + gap);
                const y = ay + row * (cellH + gap + 20);
                drawRune(runes[ri], x, y, cellW, hoveredRune === ri);
            }
        }

        // Inscribed runes at bottom center
        if (inscribedRunes.length > 0) {
            const iSize = Math.min(50, W / (inscribedRunes.length + 2));
            const totalW = inscribedRunes.length * (iSize + 4);
            const startX = W / 2 - totalW / 2;
            const iy = H - 120;

            ctx.fillStyle = 'rgba(50,40,30,0.8)';
            ctx.beginPath();
            ctx.roundRect(startX - 15, iy - 10, totalW + 30, iSize * 1.2 + 25, 10);
            ctx.fill();
            ctx.strokeStyle = 'rgba(221,161,94,0.4)';
            ctx.lineWidth = 1;
            ctx.stroke();

            inscribedRunes.forEach((ri, idx) => {
                drawRune(runes[ri], startX + idx * (iSize + 4), iy, iSize, false, 0.9);
            });
        }

        // Cast runes
        if (castRunes.length > 0) {
            castRunes.forEach(cr => {
                ctx.save();
                ctx.translate(cr.x, cr.y);
                ctx.rotate(cr.rot);
                drawRune(runes[cr.idx], -30, -36, 60, false, cr.alpha);
                ctx.restore();
            });
        }
    }

    function draw() {
        animFrame = requestAnimationFrame(draw);
        time += 0.016;

        ctx.fillStyle = '#1a1610';
        ctx.fillRect(0, 0, W, H);

        // Subtle wood grain
        ctx.globalAlpha = 0.02;
        for (let y = 0; y < H; y += 3) {
            ctx.strokeStyle = '#8A9A5B';
            ctx.beginPath();
            ctx.moveTo(0, y + Math.sin(y * 0.05 + time * 0.5) * 3);
            ctx.lineTo(W, y + Math.sin(y * 0.05 + time * 0.5 + 2) * 3);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        drawGrid();

        // Animate cast runes
        castRunes.forEach(cr => {
            cr.alpha = Math.min(1, cr.alpha + 0.02);
        });
    }

    function letterToRune(ch) {
        const upper = ch.toUpperCase();
        const map = { F: 0, U: 1, V: 1, TH: 2, A: 3, R: 4, K: 5, C: 5, G: 6, W: 7,
            H: 8, N: 9, I: 10, J: 11, Y: 11, P: 13, Z: 14, S: 15,
            T: 16, B: 17, E: 18, M: 19, L: 20, D: 22, O: 23 };
        return map[upper] !== undefined ? map[upper] : -1;
    }

    function inscribe(text) {
        inscribedRunes = [];
        for (const ch of text) {
            const ri = letterToRune(ch);
            if (ri >= 0) inscribedRunes.push(ri);
        }
    }

    canvas.addEventListener('mousemove', e => {
        const margin = 60;
        const gap = 8;
        const cols = Math.min(8, Math.floor((W - margin * 2) / 80));
        const cellW = Math.floor((W - margin * 2 - gap * (cols - 1)) / cols);
        const cellH = cellW * 1.2;

        hoveredRune = -1;
        for (let aett = 0; aett < 3; aett++) {
            const ay = margin + aett * (cellH + gap + 40);
            for (let i = 0; i < 8; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const x = margin + col * (cellW + gap);
                const y = ay + row * (cellH + gap + 20);
                if (e.clientX >= x && e.clientX <= x + cellW && e.clientY >= y && e.clientY <= y + cellH) {
                    hoveredRune = aett * 8 + i;
                }
            }
        }
        canvas.style.cursor = hoveredRune >= 0 ? 'pointer' : 'default';
    });

    document.getElementById('inscribeBtn').addEventListener('click', () => {
        inscribe(document.getElementById('runeInput').value);
    });

    document.getElementById('runeInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') inscribe(e.target.value);
    });

    document.getElementById('castBtn').addEventListener('click', () => {
        castRunes = [];
        const count = 3;
        for (let i = 0; i < count; i++) {
            castRunes.push({
                idx: Math.floor(Math.random() * 24),
                x: W * 0.3 + Math.random() * W * 0.4,
                y: H * 0.3 + Math.random() * H * 0.3,
                rot: (Math.random() - 0.5) * 0.8,
                alpha: 0
            });
        }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
        inscribedRunes = [];
        castRunes = [];
    });

    window.addEventListener('resize', resize);
    resize();
    draw();

    window.reset = function() {
        inscribedRunes = [];
        castRunes = [];
        hoveredRune = -1;
        document.getElementById('runeInput').value = '';
    };
    </script>
</body>
</html>
