<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear B Syllabary - Ancient Writing Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a1610 0%, #2a2418 100%); overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(26, 22, 16, 0.9); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 14px 20px; color: #FEFAE0;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center;
            max-width: 90vw;
        }
        .btn {
            background: rgba(138, 154, 91, 0.4); border: 1px solid #8A9A5B;
            color: #FEFAE0; padding: 6px 14px; border-radius: 8px; cursor: pointer;
            font-size: 0.85rem; transition: background 0.2s;
        }
        .btn:hover { background: rgba(138, 154, 91, 0.7); }
        .btn.active { background: rgba(221, 161, 94, 0.5); border-color: #DDA15E; }
        #info {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(26, 22, 16, 0.85); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 12px 16px; color: #FEFAE0;
            font-size: 0.8rem; max-width: 250px; line-height: 1.5;
        }
        #info h3 { color: #DDA15E; margin-bottom: 4px; }
        #detail {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(26, 22, 16, 0.95); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 30px; color: #FEFAE0; z-index: 2000;
            display: none; text-align: center; border: 2px solid #DDA15E;
            min-width: 200px;
        }
        #detail canvas { margin: 10px auto; display: block; }
        #detail h2 { color: #DDA15E; font-size: 1.5rem; margin-bottom: 4px; }
        #detail p { opacity: 0.7; margin-bottom: 10px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Linear B Syllabary</h3>
        <p>87 syllabic signs used in Mycenaean Greek (c. 1450 BCE). Deciphered in 1952 by Michael Ventris. Click any sign to see its phonetic value. Toggle grid/tablet view.</p>
    </div>
    <div id="ui">
        <button class="btn active" id="gridBtn">Grid View</button>
        <button class="btn" id="tabletBtn">Tablet View</button>
        <button class="btn" id="quizBtn">Quiz Mode</button>
        <button class="btn" id="shuffleBtn">Shuffle</button>
    </div>
    <div id="detail">
        <canvas id="detailCanvas" width="120" height="120"></canvas>
        <h2 id="detailSound"></h2>
        <p id="detailInfo"></p>
        <button class="btn" onclick="document.getElementById('detail').style.display='none'">Close</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let mode = 'grid';
    let quizMode = false;
    let hoveredSign = -1;
    let scrollOffset = 0;

    // Linear B syllabary signs - simplified stroke data
    const signs = [
        { sound: 'a', strokes: [[0.3,0.2,0.5,0.8],[0.7,0.2,0.5,0.8],[0.3,0.5,0.7,0.5]] },
        { sound: 'e', strokes: [[0.3,0.3,0.7,0.3],[0.3,0.5,0.7,0.5],[0.3,0.7,0.7,0.7],[0.3,0.3,0.3,0.7]] },
        { sound: 'i', strokes: [[0.5,0.2,0.5,0.8],[0.3,0.3,0.5,0.2],[0.7,0.3,0.5,0.2]] },
        { sound: 'o', strokes: [[0.5,0.5,0.25,'circle'],[0.4,0.5,0.6,0.5]] },
        { sound: 'u', strokes: [[0.3,0.2,0.3,0.6],[0.3,0.6,0.5,0.8],[0.5,0.8,0.7,0.6],[0.7,0.6,0.7,0.2]] },
        { sound: 'da', strokes: [[0.2,0.2,0.8,0.2],[0.5,0.2,0.5,0.8],[0.3,0.8,0.7,0.8],[0.2,0.5,0.5,0.5]] },
        { sound: 'de', strokes: [[0.5,0.2,0.5,0.8],[0.3,0.4,0.7,0.4],[0.3,0.2,0.7,0.8]] },
        { sound: 'di', strokes: [[0.5,0.5,0.2,'circle'],[0.5,0.2,0.5,0.35],[0.5,0.65,0.5,0.8]] },
        { sound: 'do', strokes: [[0.3,0.3,0.7,0.3],[0.3,0.7,0.7,0.7],[0.3,0.3,0.3,0.7],[0.7,0.3,0.7,0.7],[0.3,0.3,0.7,0.7]] },
        { sound: 'du', strokes: [[0.5,0.2,0.2,0.8],[0.5,0.2,0.8,0.8],[0.3,0.5,0.7,0.5]] },
        { sound: 'ja', strokes: [[0.3,0.2,0.7,0.2],[0.5,0.2,0.3,0.5],[0.5,0.2,0.7,0.5],[0.5,0.5,0.5,0.8]] },
        { sound: 'je', strokes: [[0.2,0.5,0.8,0.5],[0.5,0.2,0.5,0.8],[0.3,0.3,0.7,0.7]] },
        { sound: 'ka', strokes: [[0.3,0.2,0.3,0.8],[0.3,0.2,0.7,0.5],[0.7,0.5,0.3,0.8]] },
        { sound: 'ke', strokes: [[0.2,0.3,0.8,0.3],[0.2,0.7,0.8,0.7],[0.5,0.3,0.5,0.7],[0.2,0.3,0.2,0.7]] },
        { sound: 'ki', strokes: [[0.5,0.5,0.3,'circle'],[0.2,0.2,0.8,0.8]] },
        { sound: 'ko', strokes: [[0.3,0.2,0.3,0.8],[0.7,0.2,0.7,0.8],[0.3,0.5,0.7,0.5],[0.3,0.2,0.7,0.2]] },
        { sound: 'ku', strokes: [[0.5,0.2,0.2,0.5],[0.5,0.2,0.8,0.5],[0.2,0.5,0.5,0.8],[0.8,0.5,0.5,0.8]] },
        { sound: 'ma', strokes: [[0.3,0.8,0.5,0.2],[0.5,0.2,0.7,0.8],[0.35,0.55,0.65,0.55]] },
        { sound: 'me', strokes: [[0.5,0.5,0.25,'circle'],[0.3,0.3,0.5,0.2],[0.7,0.3,0.5,0.2]] },
        { sound: 'mi', strokes: [[0.3,0.2,0.3,0.8],[0.7,0.2,0.7,0.8],[0.3,0.5,0.7,0.3],[0.3,0.5,0.7,0.7]] },
        { sound: 'mo', strokes: [[0.2,0.8,0.5,0.2],[0.5,0.2,0.8,0.8],[0.2,0.8,0.8,0.8]] },
        { sound: 'mu', strokes: [[0.3,0.3,0.7,0.3],[0.3,0.7,0.7,0.7],[0.5,0.3,0.3,0.7],[0.5,0.3,0.7,0.7]] },
        { sound: 'na', strokes: [[0.3,0.2,0.3,0.8],[0.3,0.2,0.7,0.2],[0.3,0.8,0.7,0.8],[0.7,0.2,0.7,0.8]] },
        { sound: 'ne', strokes: [[0.2,0.5,0.8,0.5],[0.5,0.2,0.3,0.5],[0.5,0.2,0.7,0.5],[0.5,0.8,0.3,0.5],[0.5,0.8,0.7,0.5]] },
        { sound: 'ni', strokes: [[0.5,0.5,0.2,'circle'],[0.5,0.2,0.5,0.35]] },
        { sound: 'no', strokes: [[0.3,0.2,0.5,0.5],[0.7,0.2,0.5,0.5],[0.5,0.5,0.5,0.8],[0.3,0.8,0.7,0.8]] },
        { sound: 'nu', strokes: [[0.3,0.3,0.7,0.7],[0.7,0.3,0.3,0.7],[0.5,0.2,0.5,0.8]] },
        { sound: 'pa', strokes: [[0.3,0.2,0.3,0.8],[0.3,0.2,0.7,0.2],[0.7,0.2,0.7,0.5],[0.7,0.5,0.3,0.5]] },
        { sound: 'pe', strokes: [[0.5,0.5,0.2,'circle'],[0.2,0.5,0.8,0.5]] },
        { sound: 'pi', strokes: [[0.3,0.2,0.3,0.8],[0.7,0.2,0.7,0.8],[0.3,0.2,0.7,0.2],[0.3,0.5,0.7,0.5],[0.3,0.8,0.7,0.8]] },
        { sound: 'po', strokes: [[0.5,0.2,0.2,0.5],[0.5,0.2,0.8,0.5],[0.2,0.5,0.8,0.5],[0.5,0.5,0.5,0.8]] },
        { sound: 'pu', strokes: [[0.3,0.2,0.7,0.2],[0.5,0.2,0.5,0.5],[0.3,0.5,0.7,0.5],[0.3,0.5,0.3,0.8],[0.7,0.5,0.7,0.8]] },
        { sound: 'qa', strokes: [[0.2,0.2,0.8,0.8],[0.2,0.8,0.8,0.2],[0.5,0.5,0.15,'circle']] },
        { sound: 'qe', strokes: [[0.3,0.2,0.3,0.8],[0.3,0.5,0.7,0.2],[0.3,0.5,0.7,0.8]] },
        { sound: 'ra', strokes: [[0.3,0.2,0.3,0.8],[0.3,0.2,0.7,0.2],[0.7,0.2,0.7,0.5],[0.7,0.5,0.3,0.5],[0.3,0.5,0.7,0.8]] },
        { sound: 're', strokes: [[0.2,0.5,0.8,0.5],[0.3,0.2,0.5,0.5],[0.7,0.2,0.5,0.5]] },
        { sound: 'ri', strokes: [[0.5,0.2,0.5,0.8],[0.3,0.4,0.7,0.4],[0.3,0.6,0.7,0.6]] },
        { sound: 'ro', strokes: [[0.5,0.5,0.25,'circle'],[0.5,0.5,0.12,'circle']] },
        { sound: 'ru', strokes: [[0.3,0.2,0.7,0.2],[0.3,0.2,0.3,0.5],[0.7,0.2,0.7,0.5],[0.3,0.5,0.7,0.5],[0.5,0.5,0.5,0.8]] },
        { sound: 'sa', strokes: [[0.5,0.2,0.2,0.8],[0.5,0.2,0.8,0.8],[0.35,0.5,0.5,0.4],[0.65,0.5,0.5,0.4]] },
        { sound: 'se', strokes: [[0.3,0.3,0.7,0.3],[0.5,0.3,0.5,0.8],[0.3,0.8,0.7,0.8],[0.3,0.3,0.5,0.1],[0.7,0.3,0.5,0.1]] },
        { sound: 'si', strokes: [[0.3,0.2,0.7,0.5],[0.7,0.5,0.3,0.8],[0.3,0.2,0.3,0.8]] },
        { sound: 'so', strokes: [[0.3,0.2,0.7,0.2],[0.7,0.2,0.5,0.5],[0.5,0.5,0.7,0.8],[0.7,0.8,0.3,0.8]] },
        { sound: 'su', strokes: [[0.5,0.2,0.5,0.8],[0.2,0.4,0.5,0.2],[0.8,0.4,0.5,0.2],[0.2,0.6,0.8,0.6]] },
        { sound: 'ta', strokes: [[0.3,0.2,0.7,0.2],[0.5,0.2,0.5,0.8],[0.3,0.8,0.5,0.6],[0.7,0.8,0.5,0.6]] },
        { sound: 'te', strokes: [[0.2,0.2,0.8,0.2],[0.5,0.2,0.5,0.8],[0.2,0.2,0.2,0.4],[0.8,0.2,0.8,0.4]] },
        { sound: 'ti', strokes: [[0.5,0.5,0.2,'circle'],[0.35,0.35,0.65,0.65],[0.35,0.65,0.65,0.35]] },
        { sound: 'to', strokes: [[0.3,0.2,0.3,0.8],[0.3,0.2,0.7,0.5],[0.3,0.8,0.7,0.5]] },
        { sound: 'tu', strokes: [[0.3,0.3,0.7,0.3],[0.3,0.3,0.3,0.7],[0.7,0.3,0.7,0.7],[0.5,0.7,0.5,0.9]] },
        { sound: 'wa', strokes: [[0.2,0.2,0.5,0.5],[0.5,0.5,0.8,0.2],[0.5,0.5,0.5,0.8]] },
        { sound: 'we', strokes: [[0.2,0.2,0.4,0.8],[0.4,0.8,0.5,0.4],[0.5,0.4,0.6,0.8],[0.6,0.8,0.8,0.2]] },
        { sound: 'wi', strokes: [[0.5,0.2,0.3,0.5],[0.5,0.2,0.7,0.5],[0.3,0.5,0.5,0.8],[0.7,0.5,0.5,0.8]] },
        { sound: 'wo', strokes: [[0.5,0.5,0.25,'circle'],[0.5,0.2,0.5,0.3],[0.5,0.7,0.5,0.8],[0.2,0.5,0.3,0.5],[0.7,0.5,0.8,0.5]] },
        { sound: 'za', strokes: [[0.2,0.2,0.8,0.2],[0.2,0.2,0.5,0.5],[0.8,0.2,0.5,0.5],[0.5,0.5,0.2,0.8],[0.5,0.5,0.8,0.8]] },
        { sound: 'ze', strokes: [[0.2,0.2,0.8,0.2],[0.8,0.2,0.2,0.5],[0.2,0.5,0.8,0.5],[0.8,0.5,0.2,0.8],[0.2,0.8,0.8,0.8]] },
        { sound: 'zo', strokes: [[0.5,0.2,0.2,0.5],[0.5,0.2,0.8,0.5],[0.2,0.5,0.5,0.8],[0.8,0.5,0.5,0.8],[0.5,0.5,0.5,0.8]] },
    ];

    let displayOrder = signs.map((_, i) => i);

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        scrollOffset = 0;
    }

    function drawSign(c, sign, x, y, size, highlight, hideLabel) {
        c.save();
        c.strokeStyle = highlight ? '#DDA15E' : '#8A9A5B';
        c.fillStyle = highlight ? 'rgba(221,161,94,0.1)' : 'rgba(138,154,91,0.05)';
        c.lineWidth = highlight ? 2.5 : 1.5;
        c.lineCap = 'round';
        c.lineJoin = 'round';

        // Background
        c.beginPath();
        c.roundRect(x, y, size, size, 6);
        c.fill();
        c.strokeStyle = highlight ? 'rgba(221,161,94,0.4)' : 'rgba(138,154,91,0.2)';
        c.stroke();

        // Draw strokes
        const pad = size * 0.12;
        const inner = size - pad * 2;
        c.strokeStyle = highlight ? '#DDA15E' : '#8A9A5B';
        c.lineWidth = Math.max(1.5, size * 0.035);

        for (const s of sign.strokes) {
            if (s[3] === 'circle') {
                c.beginPath();
                c.arc(x + pad + s[0] * inner, y + pad + s[1] * inner, s[2] * inner, 0, Math.PI * 2);
                c.stroke();
            } else {
                c.beginPath();
                c.moveTo(x + pad + s[0] * inner, y + pad + s[1] * inner);
                c.lineTo(x + pad + s[2] * inner, y + pad + s[3] * inner);
                c.stroke();
            }
        }

        // Label
        if (!hideLabel && !quizMode) {
            c.fillStyle = highlight ? '#DDA15E' : 'rgba(254,250,224,0.6)';
            c.font = `${Math.max(10, size * 0.18)}px Georgia`;
            c.textAlign = 'center';
            c.fillText(sign.sound, x + size / 2, y + size - pad * 0.3);
        }

        c.restore();
    }

    function getGridLayout() {
        const margin = 60;
        const gap = 6;
        const cols = Math.floor((W - margin * 2) / 70);
        const cellSize = Math.floor((W - margin * 2 - gap * (cols - 1)) / cols);
        return { margin, gap, cols, cellSize };
    }

    function draw() {
        ctx.fillStyle = '#1a1610';
        ctx.fillRect(0, 0, W, H);

        if (mode === 'grid') {
            const { margin, gap, cols, cellSize } = getGridLayout();
            displayOrder.forEach((si, idx) => {
                const col = idx % cols;
                const row = Math.floor(idx / cols);
                const x = margin + col * (cellSize + gap);
                const y = margin + row * (cellSize + gap) + scrollOffset;
                if (y + cellSize < 0 || y > H) return;
                drawSign(ctx, signs[si], x, y, cellSize, hoveredSign === si, false);
            });
        } else {
            // Tablet view - arranged as on a clay tablet
            const tabW = W * 0.7;
            const tabH = H * 0.75;
            const tx = (W - tabW) / 2;
            const ty = (H - tabH) / 2;

            // Tablet background
            const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, tabW * 0.6);
            grad.addColorStop(0, '#c4a87a');
            grad.addColorStop(1, '#9a7d52');
            ctx.save();
            ctx.beginPath();
            ctx.roundRect(tx, ty, tabW, tabH, 15);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();

            const pad = 20;
            const innerW = tabW - pad * 2;
            const cols = Math.floor(innerW / 55);
            const cellSize = Math.floor((innerW - (cols - 1) * 4) / cols);

            displayOrder.forEach((si, idx) => {
                const col = idx % cols;
                const row = Math.floor(idx / cols);
                const x = tx + pad + col * (cellSize + 4);
                const y = ty + pad + row * (cellSize + 4) + scrollOffset;
                if (y + cellSize < ty || y > ty + tabH) return;

                ctx.save();
                ctx.strokeStyle = '#5a4a2a';
                ctx.fillStyle = 'rgba(90,74,42,0.1)';
                ctx.lineWidth = 1.5;
                ctx.lineCap = 'round';

                const iPad = cellSize * 0.12;
                const inner = cellSize - iPad * 2;
                for (const s of signs[si].strokes) {
                    if (s[3] === 'circle') {
                        ctx.beginPath();
                        ctx.arc(x + iPad + s[0] * inner, y + iPad + s[1] * inner, s[2] * inner, 0, Math.PI * 2);
                        ctx.stroke();
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(x + iPad + s[0] * inner, y + iPad + s[1] * inner);
                        ctx.lineTo(x + iPad + s[2] * inner, y + iPad + s[3] * inner);
                        ctx.stroke();
                    }
                }
                ctx.restore();
            });
        }

        requestAnimationFrame(draw);
    }

    canvas.addEventListener('mousemove', e => {
        if (mode !== 'grid') { hoveredSign = -1; return; }
        const { margin, gap, cols, cellSize } = getGridLayout();
        const col = Math.floor((e.clientX - margin) / (cellSize + gap));
        const row = Math.floor((e.clientY - margin - scrollOffset) / (cellSize + gap));
        const idx = row * cols + col;
        if (col >= 0 && col < cols && idx >= 0 && idx < displayOrder.length) {
            hoveredSign = displayOrder[idx];
        } else {
            hoveredSign = -1;
        }
    });

    canvas.addEventListener('click', e => {
        if (hoveredSign >= 0 && mode === 'grid') {
            showDetail(hoveredSign);
        }
    });

    canvas.addEventListener('wheel', e => {
        scrollOffset -= e.deltaY;
        scrollOffset = Math.min(0, scrollOffset);
    }, { passive: true });

    function showDetail(idx) {
        const detail = document.getElementById('detail');
        const dc = document.getElementById('detailCanvas');
        const dctx = dc.getContext('2d');
        dctx.clearRect(0, 0, 120, 120);
        drawSign(dctx, signs[idx], 10, 10, 100, true, true);
        document.getElementById('detailSound').textContent = signs[idx].sound.toUpperCase();
        const vowel = signs[idx].sound.length === 1 ? 'Pure vowel' : 'Consonant + vowel syllable';
        document.getElementById('detailInfo').textContent = vowel + ' (Mycenaean Greek)';
        detail.style.display = 'block';
    }

    document.getElementById('gridBtn').addEventListener('click', () => {
        mode = 'grid'; scrollOffset = 0;
        document.getElementById('gridBtn').classList.add('active');
        document.getElementById('tabletBtn').classList.remove('active');
    });
    document.getElementById('tabletBtn').addEventListener('click', () => {
        mode = 'tablet'; scrollOffset = 0;
        document.getElementById('tabletBtn').classList.add('active');
        document.getElementById('gridBtn').classList.remove('active');
    });
    document.getElementById('quizBtn').addEventListener('click', function() {
        quizMode = !quizMode;
        this.classList.toggle('active');
    });
    document.getElementById('shuffleBtn').addEventListener('click', () => {
        for (let i = displayOrder.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [displayOrder[i], displayOrder[j]] = [displayOrder[j], displayOrder[i]];
        }
    });

    window.addEventListener('resize', resize);
    resize();
    draw();

    window.reset = function() {
        displayOrder = signs.map((_, i) => i);
        scrollOffset = 0;
        mode = 'grid';
        quizMode = false;
        hoveredSign = -1;
    };
    </script>
</body>
</html>
