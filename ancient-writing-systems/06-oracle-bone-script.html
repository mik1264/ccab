<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Bone Script - Ancient Writing Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1610; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; cursor: crosshair; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #ui {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(26, 22, 16, 0.9); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 12px 16px; color: #FEFAE0;
            font-size: 0.8rem; max-width: 250px;
        }
        #ui h3 { color: #DDA15E; margin-bottom: 6px; }
        #ui p { line-height: 1.5; margin-bottom: 8px; opacity: 0.8; }
        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 6px; }
        .char-btn {
            background: rgba(221, 161, 94, 0.15); border: 1px solid rgba(221, 161, 94, 0.3);
            color: #DDA15E; padding: 8px 2px; border-radius: 6px; cursor: pointer;
            font-size: 0.75rem; text-align: center; transition: background 0.2s;
            line-height: 1.3;
        }
        .char-btn:hover { background: rgba(221, 161, 94, 0.4); }
        .char-btn span { display: block; font-size: 0.6rem; color: rgba(254,250,224,0.5); }
        .tool-row { display: flex; gap: 6px; margin-top: 8px; }
        .btn {
            background: rgba(138, 154, 91, 0.4); border: 1px solid #8A9A5B;
            color: #FEFAE0; padding: 5px 10px; border-radius: 6px; cursor: pointer;
            font-size: 0.8rem; transition: background 0.2s; flex: 1;
        }
        .btn:hover { background: rgba(138, 154, 91, 0.7); }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <h3>Oracle Bone Script (jiaguwen)</h3>
        <p>Shang Dynasty divination (c. 1200 BCE). Scratch characters onto bone with a bronze pin, then click "Divine" to create heat cracks for fortune-telling.</p>
        <div class="char-grid" id="charGrid"></div>
        <div class="tool-row">
            <button class="btn" id="divineBtn">Divine</button>
            <button class="btn" id="clearBtn">New Bone</button>
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let isDrawing = false;
    let scratches = [];
    let cracks = [];
    let boneTexture = [];
    let stampedChars = [];

    const BONE_LIGHT = { r: 220, g: 210, b: 180 };
    const BONE_DARK = { r: 180, g: 165, b: 130 };

    // Oracle bone characters - simplified pictographic strokes
    const oracleChars = [
        { name: 'Sun (ri)', strokes: [[0.3,0.3,0.7,0.3],[0.7,0.3,0.7,0.7],[0.7,0.7,0.3,0.7],[0.3,0.7,0.3,0.3],[0.3,0.5,0.7,0.5]] },
        { name: 'Moon (yue)', strokes: [[0.4,0.2,0.3,0.5],[0.3,0.5,0.4,0.8],[0.4,0.8,0.6,0.8],[0.6,0.8,0.7,0.5],[0.7,0.5,0.6,0.2],[0.6,0.2,0.4,0.2],[0.35,0.45,0.65,0.45]] },
        { name: 'Mountain (shan)', strokes: [[0.2,0.8,0.5,0.2],[0.5,0.2,0.8,0.8],[0.35,0.5,0.35,0.8],[0.65,0.5,0.65,0.8]] },
        { name: 'Water (shui)', strokes: [[0.5,0.15,0.5,0.85],[0.25,0.3,0.4,0.6],[0.75,0.3,0.6,0.6],[0.15,0.5,0.3,0.75],[0.85,0.5,0.7,0.75]] },
        { name: 'Fire (huo)', strokes: [[0.5,0.2,0.5,0.8],[0.5,0.4,0.25,0.7],[0.5,0.4,0.75,0.7],[0.3,0.3,0.5,0.15],[0.7,0.3,0.5,0.15]] },
        { name: 'Person (ren)', strokes: [[0.5,0.2,0.3,0.8],[0.5,0.2,0.7,0.8]] },
        { name: 'King (wang)', strokes: [[0.25,0.25,0.75,0.25],[0.25,0.5,0.75,0.5],[0.25,0.75,0.75,0.75],[0.5,0.25,0.5,0.75]] },
        { name: 'Heaven (tian)', strokes: [[0.2,0.3,0.8,0.3],[0.5,0.3,0.5,0.8],[0.5,0.15,0.3,0.3],[0.5,0.15,0.7,0.3]] },
        { name: 'Earth (tu)', strokes: [[0.5,0.2,0.5,0.65],[0.3,0.45,0.7,0.45],[0.2,0.75,0.8,0.75]] },
        { name: 'Ox (niu)', strokes: [[0.5,0.15,0.5,0.85],[0.25,0.35,0.75,0.35],[0.3,0.2,0.25,0.35],[0.7,0.2,0.75,0.35]] },
        { name: 'Horse (ma)', strokes: [[0.3,0.2,0.7,0.2],[0.5,0.2,0.5,0.5],[0.3,0.5,0.7,0.5],[0.35,0.5,0.25,0.8],[0.5,0.5,0.5,0.85],[0.65,0.5,0.75,0.8],[0.3,0.2,0.2,0.35]] },
        { name: 'Rain (yu)', strokes: [[0.2,0.3,0.8,0.3],[0.2,0.3,0.2,0.2],[0.8,0.3,0.8,0.2],[0.2,0.2,0.8,0.2],[0.5,0.2,0.5,0.3],[0.3,0.45,0.35,0.55],[0.5,0.45,0.55,0.55],[0.7,0.45,0.75,0.55],[0.35,0.65,0.4,0.75],[0.65,0.65,0.7,0.75]] },
    ];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        generateBoneTexture();
        drawBone();
    }

    function generateBoneTexture() {
        boneTexture = [];
        for (let y = 0; y < H; y += 3) {
            const row = [];
            for (let x = 0; x < W; x += 3) {
                row.push((Math.random() - 0.5) * 25);
            }
            boneTexture.push(row);
        }
    }

    function drawBone() {
        // Dark background
        ctx.fillStyle = '#1a1610';
        ctx.fillRect(0, 0, W, H);

        // Bone shape - turtle plastron / scapula shape
        const bx = W * 0.1;
        const by = H * 0.08;
        const bw = W * 0.75;
        const bh = H * 0.84;

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(bx + bw * 0.3, by);
        ctx.quadraticCurveTo(bx + bw * 0.5, by - bh * 0.02, bx + bw * 0.7, by);
        ctx.quadraticCurveTo(bx + bw * 1.05, by + bh * 0.2, bx + bw, by + bh * 0.4);
        ctx.quadraticCurveTo(bx + bw * 1.02, by + bh * 0.7, bx + bw * 0.8, by + bh);
        ctx.quadraticCurveTo(bx + bw * 0.5, by + bh * 1.03, bx + bw * 0.2, by + bh);
        ctx.quadraticCurveTo(bx - bw * 0.02, by + bh * 0.7, bx, by + bh * 0.4);
        ctx.quadraticCurveTo(bx - bw * 0.05, by + bh * 0.2, bx + bw * 0.3, by);
        ctx.closePath();

        // Bone gradient
        const grad = ctx.createRadialGradient(W * 0.45, H * 0.45, 0, W * 0.45, H * 0.45, Math.max(W, H) * 0.5);
        grad.addColorStop(0, `rgb(${BONE_LIGHT.r}, ${BONE_LIGHT.g}, ${BONE_LIGHT.b})`);
        grad.addColorStop(0.8, `rgb(${BONE_DARK.r}, ${BONE_DARK.g}, ${BONE_DARK.b})`);
        grad.addColorStop(1, `rgb(${BONE_DARK.r - 30}, ${BONE_DARK.g - 30}, ${BONE_DARK.b - 30})`);
        ctx.fillStyle = grad;
        ctx.fill();

        // Texture
        ctx.clip();
        ctx.globalAlpha = 0.08;
        for (let y = 0; y < boneTexture.length; y++) {
            for (let x = 0; x < boneTexture[y].length; x++) {
                const v = boneTexture[y][x];
                ctx.fillStyle = v > 0 ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
                ctx.fillRect(x * 3, y * 3, 3, 3);
            }
        }
        ctx.globalAlpha = 1;

        // Draw scratches (user inscriptions)
        ctx.strokeStyle = 'rgba(80, 60, 30, 0.8)';
        ctx.lineWidth = 1.5;
        ctx.lineCap = 'round';
        for (const scratch of scratches) {
            if (scratch.length < 2) continue;
            ctx.beginPath();
            ctx.moveTo(scratch[0].x, scratch[0].y);
            for (let i = 1; i < scratch.length; i++) {
                ctx.lineTo(scratch[i].x, scratch[i].y);
            }
            ctx.stroke();
        }

        // Draw stamped characters
        for (const sc of stampedChars) {
            drawOracleChar(sc.char, sc.x, sc.y, sc.size);
        }

        // Draw divination cracks
        ctx.strokeStyle = 'rgba(60, 40, 10, 0.7)';
        ctx.lineWidth = 2;
        for (const crack of cracks) {
            ctx.beginPath();
            ctx.moveTo(crack[0].x, crack[0].y);
            for (let i = 1; i < crack.length; i++) {
                ctx.lineTo(crack[i].x, crack[i].y);
            }
            ctx.stroke();
            // Lighter edges
            ctx.strokeStyle = 'rgba(200, 180, 140, 0.3)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(crack[0].x + 1, crack[0].y + 1);
            for (let i = 1; i < crack.length; i++) {
                ctx.lineTo(crack[i].x + 1, crack[i].y + 1);
            }
            ctx.stroke();
            ctx.strokeStyle = 'rgba(60, 40, 10, 0.7)';
            ctx.lineWidth = 2;
        }

        ctx.restore();
    }

    function drawOracleChar(char, cx, cy, size) {
        ctx.save();
        ctx.strokeStyle = 'rgba(60, 40, 10, 0.85)';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const s = size / 2;
        for (const stroke of char.strokes) {
            ctx.beginPath();
            ctx.moveTo(cx - s + stroke[0] * size, cy - s + stroke[1] * size);
            ctx.lineTo(cx - s + stroke[2] * size, cy - s + stroke[3] * size);
            ctx.stroke();
        }
        ctx.restore();
    }

    function generateCracks() {
        cracks = [];
        const numCracks = 3 + Math.floor(Math.random() * 5);
        for (let c = 0; c < numCracks; c++) {
            const crack = [];
            let x = W * 0.2 + Math.random() * W * 0.5;
            let y = H * 0.2 + Math.random() * H * 0.5;
            const segments = 8 + Math.floor(Math.random() * 15);
            const angle = Math.random() * Math.PI * 2;
            crack.push({ x, y });
            for (let i = 0; i < segments; i++) {
                const a = angle + (Math.random() - 0.5) * 1.5;
                const len = 5 + Math.random() * 20;
                x += Math.cos(a) * len;
                y += Math.sin(a) * len;
                crack.push({ x, y });
            }
            cracks.push(crack);

            // Branch cracks
            if (Math.random() > 0.4) {
                const bi = Math.floor(Math.random() * crack.length);
                const branch = [{ x: crack[bi].x, y: crack[bi].y }];
                let bx = crack[bi].x;
                let by = crack[bi].y;
                const bsegs = 3 + Math.floor(Math.random() * 6);
                for (let j = 0; j < bsegs; j++) {
                    const ba = Math.random() * Math.PI * 2;
                    const bl = 3 + Math.random() * 12;
                    bx += Math.cos(ba) * bl;
                    by += Math.sin(ba) * bl;
                    branch.push({ x: bx, y: by });
                }
                cracks.push(branch);
            }
        }
        drawBone();
    }

    // Build character buttons
    const charGrid = document.getElementById('charGrid');
    oracleChars.forEach((ch, idx) => {
        const btn = document.createElement('button');
        btn.className = 'char-btn';
        btn.innerHTML = ch.name.split(' ')[0] + '<span>' + ch.name.split('(')[1]?.replace(')', '') + '</span>';
        btn.addEventListener('click', () => {
            stampedChars.push({
                char: ch,
                x: W * 0.2 + Math.random() * W * 0.4,
                y: H * 0.15 + Math.random() * H * 0.6,
                size: 40 + Math.random() * 30
            });
            drawBone();
        });
        charGrid.appendChild(btn);
    });

    document.getElementById('divineBtn').addEventListener('click', generateCracks);
    document.getElementById('clearBtn').addEventListener('click', () => {
        scratches = [];
        cracks = [];
        stampedChars = [];
        generateBoneTexture();
        drawBone();
    });

    let currentScratch = null;
    canvas.addEventListener('mousedown', e => {
        isDrawing = true;
        currentScratch = [{ x: e.clientX, y: e.clientY }];
    });
    canvas.addEventListener('mousemove', e => {
        if (isDrawing && currentScratch) {
            currentScratch.push({ x: e.clientX, y: e.clientY });
            drawBone();
            // Draw current scratch
            ctx.strokeStyle = 'rgba(80, 60, 30, 0.8)';
            ctx.lineWidth = 1.5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(currentScratch[0].x, currentScratch[0].y);
            for (let i = 1; i < currentScratch.length; i++) {
                ctx.lineTo(currentScratch[i].x, currentScratch[i].y);
            }
            ctx.stroke();
        }
    });
    canvas.addEventListener('mouseup', () => {
        if (currentScratch && currentScratch.length > 1) {
            scratches.push(currentScratch);
        }
        isDrawing = false;
        currentScratch = null;
        drawBone();
    });

    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.touches[0];
        isDrawing = true;
        currentScratch = [{ x: t.clientX, y: t.clientY }];
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (isDrawing && currentScratch) {
            const t = e.touches[0];
            currentScratch.push({ x: t.clientX, y: t.clientY });
            drawBone();
            ctx.strokeStyle = 'rgba(80, 60, 30, 0.8)';
            ctx.lineWidth = 1.5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(currentScratch[0].x, currentScratch[0].y);
            for (let i = 1; i < currentScratch.length; i++) {
                ctx.lineTo(currentScratch[i].x, currentScratch[i].y);
            }
            ctx.stroke();
        }
    }, { passive: false });
    canvas.addEventListener('touchend', () => {
        if (currentScratch && currentScratch.length > 1) scratches.push(currentScratch);
        isDrawing = false;
        currentScratch = null;
        drawBone();
    });

    window.addEventListener('resize', resize);
    resize();

    window.reset = function() {
        scratches = [];
        cracks = [];
        stampedChars = [];
        generateBoneTexture();
        drawBone();
    };
    </script>
</body>
</html>
