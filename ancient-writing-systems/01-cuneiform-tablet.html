<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuneiform Tablet - Ancient Writing Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #2a1f14; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; cursor: crosshair; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #ui {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(42, 31, 20, 0.85); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 12px 16px; color: #FEFAE0;
            font-size: 0.85rem; max-width: 260px;
        }
        #ui h3 { color: #DDA15E; margin-bottom: 6px; font-size: 1rem; }
        #ui p { line-height: 1.5; margin-bottom: 8px; opacity: 0.85; }
        .tool-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
        .tool-btn {
            background: rgba(138, 154, 91, 0.3); border: 1px solid #8A9A5B;
            color: #FEFAE0; padding: 4px 10px; border-radius: 6px; cursor: pointer;
            font-size: 0.8rem; transition: background 0.2s;
        }
        .tool-btn:hover, .tool-btn.active { background: rgba(138, 154, 91, 0.7); }
        .symbol-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-top: 6px; }
        .symbol-btn {
            background: rgba(221, 161, 94, 0.2); border: 1px solid rgba(221, 161, 94, 0.4);
            color: #DDA15E; padding: 6px 2px; border-radius: 4px; cursor: pointer;
            font-size: 1rem; text-align: center; transition: background 0.2s;
        }
        .symbol-btn:hover { background: rgba(221, 161, 94, 0.5); }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <h3>Cuneiform Tablet</h3>
        <p>Click and drag to press wedge-shaped marks into clay, as Sumerian scribes did c. 3500 BCE.</p>
        <div class="tool-row">
            <button class="tool-btn active" data-tool="wedge-h">&#x25B6; Horizontal</button>
            <button class="tool-btn" data-tool="wedge-v">&#x25BC; Vertical</button>
            <button class="tool-btn" data-tool="wedge-d">&#x25E2; Diagonal</button>
        </div>
        <p style="font-size:0.75rem; opacity:0.6;">Common Sumerian signs:</p>
        <div class="symbol-grid" id="symbols"></div>
        <div class="tool-row" style="margin-top:8px;">
            <button class="tool-btn" id="clearBtn">Clear Tablet</button>
            <button class="tool-btn" id="newTablet">New Clay</button>
        </div>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let tool = 'wedge-h';
    let impressions = [];
    let clayVariation = [];
    let isDrawing = false;
    let lastStamp = 0;

    const CLAY_BASE = { r: 195, g: 165, b: 120 };
    const CLAY_DARK = { r: 140, g: 110, b: 70 };

    const sumerianSigns = [
        { name: 'AN', desc: 'sky/god', strokes: [[0,0,0],[0,0,Math.PI/2]] },
        { name: 'KI', desc: 'earth', strokes: [[0,0,0],[0,8,0],[0,16,0]] },
        { name: 'LU', desc: 'person', strokes: [[0,0,Math.PI/4],[-4,8,0],[4,8,0]] },
        { name: 'E', desc: 'house', strokes: [[0,0,0],[0,0,Math.PI/2],[-6,6,0],[6,6,0]] },
        { name: 'A', desc: 'water', strokes: [[0,0,Math.PI/4],[0,10,Math.PI/4],[0,20,Math.PI/4]] },
        { name: 'SAG', desc: 'head', strokes: [[0,0,0],[0,0,Math.PI/2],[-5,8,Math.PI/4],[5,8,-Math.PI/4]] },
        { name: 'DU', desc: 'walk', strokes: [[-4,0,Math.PI/6],[4,0,-Math.PI/6],[0,12,0]] },
        { name: 'DINGIR', desc: 'deity', strokes: [[0,0,0],[0,0,Math.PI/2],[0,0,Math.PI/4],[0,0,-Math.PI/4]] },
        { name: 'UD', desc: 'sun/day', strokes: [[0,0,0],[-6,0,Math.PI/4],[6,0,-Math.PI/4],[0,10,Math.PI/2]] },
        { name: 'GI', desc: 'reed', strokes: [[0,0,Math.PI/2],[0,10,Math.PI/2],[0,20,Math.PI/2]] },
    ];

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        generateClayTexture();
        drawTablet();
    }

    function generateClayTexture() {
        clayVariation = [];
        for (let y = 0; y < H; y += 4) {
            const row = [];
            for (let x = 0; x < W; x += 4) {
                row.push((Math.random() - 0.5) * 20);
            }
            clayVariation.push(row);
        }
    }

    function drawTablet() {
        const tabletMargin = Math.min(W, H) * 0.05;
        const tx = tabletMargin;
        const ty = tabletMargin;
        const tw = W - tabletMargin * 2;
        const th = H - tabletMargin * 2;

        ctx.fillStyle = '#1a1008';
        ctx.fillRect(0, 0, W, H);

        // Clay tablet base
        const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.6);
        grad.addColorStop(0, `rgb(${CLAY_BASE.r + 10}, ${CLAY_BASE.g + 10}, ${CLAY_BASE.b + 10})`);
        grad.addColorStop(0.7, `rgb(${CLAY_BASE.r}, ${CLAY_BASE.g}, ${CLAY_BASE.b})`);
        grad.addColorStop(1, `rgb(${CLAY_BASE.r - 30}, ${CLAY_BASE.g - 30}, ${CLAY_BASE.b - 30})`);

        ctx.save();
        ctx.beginPath();
        const cr = 20;
        ctx.moveTo(tx + cr, ty);
        ctx.lineTo(tx + tw - cr, ty);
        ctx.quadraticCurveTo(tx + tw, ty, tx + tw, ty + cr);
        ctx.lineTo(tx + tw, ty + th - cr);
        ctx.quadraticCurveTo(tx + tw, ty + th, tx + tw - cr, ty + th);
        ctx.lineTo(tx + cr, ty + th);
        ctx.quadraticCurveTo(tx, ty + th, tx, ty + th - cr);
        ctx.lineTo(tx, ty + cr);
        ctx.quadraticCurveTo(tx, ty, tx + cr, ty);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // Clay texture
        ctx.globalAlpha = 0.15;
        for (let y = 0; y < clayVariation.length; y++) {
            for (let x = 0; x < clayVariation[y].length; x++) {
                const v = clayVariation[y][x];
                ctx.fillStyle = v > 0 ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
                ctx.fillRect(tx + x * 4, ty + y * 4, 4, 4);
            }
        }
        ctx.globalAlpha = 1;

        // Tablet edge shadow
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();

        // Draw all impressions
        for (const imp of impressions) {
            drawWedge(imp.x, imp.y, imp.angle, imp.size);
        }
    }

    function drawWedge(x, y, angle, size) {
        const s = size || 12;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        // Wedge shape - triangular impression
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.15);
        ctx.lineTo(s * 0.8, -s * 0.02);
        ctx.lineTo(s * 0.8, s * 0.02);
        ctx.lineTo(0, s * 0.15);
        ctx.closePath();

        // Deep impression shadow
        const wGrad = ctx.createLinearGradient(0, -s * 0.15, s * 0.3, s * 0.15);
        wGrad.addColorStop(0, `rgba(${CLAY_DARK.r - 30}, ${CLAY_DARK.g - 30}, ${CLAY_DARK.b - 30}, 0.9)`);
        wGrad.addColorStop(0.4, `rgba(${CLAY_DARK.r}, ${CLAY_DARK.g}, ${CLAY_DARK.b}, 0.85)`);
        wGrad.addColorStop(1, `rgba(${CLAY_BASE.r + 20}, ${CLAY_BASE.g + 20}, ${CLAY_BASE.b + 20}, 0.5)`);
        ctx.fillStyle = wGrad;
        ctx.fill();

        // Raised edge highlight
        ctx.beginPath();
        ctx.moveTo(-1, -s * 0.18);
        ctx.lineTo(0, -s * 0.15);
        ctx.lineTo(s * 0.8, -s * 0.02);
        ctx.strokeStyle = `rgba(${CLAY_BASE.r + 40}, ${CLAY_BASE.g + 40}, ${CLAY_BASE.b + 40}, 0.5)`;
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.restore();
    }

    function getAngle() {
        if (tool === 'wedge-h') return 0;
        if (tool === 'wedge-v') return Math.PI / 2;
        if (tool === 'wedge-d') return Math.PI / 4;
        return 0;
    }

    function stampAt(x, y) {
        const now = Date.now();
        if (now - lastStamp < 40) return;
        lastStamp = now;
        const jx = x + (Math.random() - 0.5) * 3;
        const jy = y + (Math.random() - 0.5) * 3;
        const ja = getAngle() + (Math.random() - 0.5) * 0.15;
        const size = 10 + Math.random() * 6;
        impressions.push({ x: jx, y: jy, angle: ja, size });
        drawTablet();
    }

    function stampSign(sign, cx, cy) {
        const scale = 14;
        for (const s of sign.strokes) {
            impressions.push({
                x: cx + s[0] * 2,
                y: cy + s[1] * 2,
                angle: s[2],
                size: scale + Math.random() * 3
            });
        }
        drawTablet();
    }

    // Build symbol buttons
    const symGrid = document.getElementById('symbols');
    sumerianSigns.forEach(sign => {
        const btn = document.createElement('button');
        btn.className = 'symbol-btn';
        btn.textContent = sign.name;
        btn.title = sign.desc;
        btn.addEventListener('click', () => {
            const cx = W / 2 + (Math.random() - 0.5) * W * 0.4;
            const cy = H / 2 + (Math.random() - 0.5) * H * 0.4;
            stampSign(sign, cx, cy);
        });
        symGrid.appendChild(btn);
    });

    // Tool buttons
    document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            tool = btn.dataset.tool;
        });
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
        impressions = [];
        drawTablet();
    });

    document.getElementById('newTablet').addEventListener('click', () => {
        impressions = [];
        generateClayTexture();
        drawTablet();
    });

    canvas.addEventListener('mousedown', e => { isDrawing = true; stampAt(e.clientX, e.clientY); });
    canvas.addEventListener('mousemove', e => { if (isDrawing) stampAt(e.clientX, e.clientY); });
    canvas.addEventListener('mouseup', () => { isDrawing = false; });
    canvas.addEventListener('mouseleave', () => { isDrawing = false; });

    canvas.addEventListener('touchstart', e => {
        e.preventDefault(); isDrawing = true;
        const t = e.touches[0]; stampAt(t.clientX, t.clientY);
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (isDrawing) { const t = e.touches[0]; stampAt(t.clientX, t.clientY); }
    }, { passive: false });
    canvas.addEventListener('touchend', () => { isDrawing = false; });

    window.addEventListener('resize', resize);
    resize();

    window.reset = function() {
        impressions = [];
        generateClayTexture();
        drawTablet();
    };
    </script>
</body>
</html>
