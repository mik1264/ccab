<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayan Number System - Ancient Writing Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1a2410 0%, #0d1a08 100%); overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(13, 26, 8, 0.9); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 14px 20px; color: #FEFAE0;
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center;
        }
        #numInput {
            background: rgba(221, 161, 94, 0.15); border: 1px solid #DDA15E;
            color: #FEFAE0; padding: 8px 14px; border-radius: 8px; font-size: 1.2rem;
            font-family: Georgia, serif; width: 140px; text-align: center;
        }
        .btn {
            background: rgba(138, 154, 91, 0.4); border: 1px solid #8A9A5B;
            color: #FEFAE0; padding: 6px 14px; border-radius: 8px; cursor: pointer;
            font-size: 0.85rem; transition: background 0.2s;
        }
        .btn:hover { background: rgba(138, 154, 91, 0.7); }
        #info {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(13, 26, 8, 0.85); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 12px 16px; color: #FEFAE0;
            font-size: 0.8rem; max-width: 240px; line-height: 1.5;
        }
        #info h3 { color: #DDA15E; margin-bottom: 4px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Mayan Vigesimal System</h3>
        <p>The Maya used base-20 with three symbols: a dot (1), a bar (5), and a shell (0). Numbers stack vertically in powers of 20. Enter any number to see its Mayan form.</p>
    </div>
    <div id="ui">
        <input type="number" id="numInput" value="2026" min="0" max="999999">
        <button class="btn" id="convertBtn">Convert</button>
        <button class="btn" id="randomBtn">Random</button>
        <button class="btn" id="countBtn">Count Animation</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let currentNumber = 2026;
    let mayanDigits = [];
    let animProgress = 0;
    let counting = false;
    let countValue = 0;
    let animFrame = null;

    const DOT_COLOR = '#DDA15E';
    const BAR_COLOR = '#8A9A5B';
    const SHELL_COLOR = '#606C38';
    const STONE_BG = '#3a4a2a';

    function toMayan(n) {
        if (n === 0) return [0];
        const digits = [];
        let val = n;
        while (val > 0) {
            digits.push(val % 20);
            val = Math.floor(val / 20);
        }
        return digits; // index 0 = ones, index 1 = twenties, etc.
    }

    function drawShell(cx, cy, size) {
        ctx.save();
        ctx.strokeStyle = SHELL_COLOR;
        ctx.lineWidth = 2;
        // Outer oval
        ctx.beginPath();
        ctx.ellipse(cx, cy, size * 0.4, size * 0.25, 0, 0, Math.PI * 2);
        ctx.stroke();
        // Inner detail
        ctx.beginPath();
        ctx.ellipse(cx, cy, size * 0.2, size * 0.12, 0, 0, Math.PI * 2);
        ctx.stroke();
        // Cross lines
        for (let a = 0; a < Math.PI; a += Math.PI / 3) {
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(a) * size * 0.2, cy + Math.sin(a) * size * 0.12);
            ctx.lineTo(cx + Math.cos(a) * size * 0.4, cy + Math.sin(a) * size * 0.25);
            ctx.stroke();
        }
        ctx.restore();
    }

    function drawDot(cx, cy, size) {
        ctx.save();
        const r = size * 0.08;
        const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, 0, cx, cy, r);
        grad.addColorStop(0, '#f0d090');
        grad.addColorStop(1, DOT_COLOR);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
    }

    function drawBar(cx, cy, size) {
        ctx.save();
        const bw = size * 0.55;
        const bh = size * 0.08;
        const grad = ctx.createLinearGradient(cx - bw / 2, cy - bh / 2, cx - bw / 2, cy + bh / 2);
        grad.addColorStop(0, '#a0b870');
        grad.addColorStop(0.5, BAR_COLOR);
        grad.addColorStop(1, '#506028');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(cx - bw / 2, cy - bh / 2, bw, bh, 3);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
    }

    function drawMayanDigit(val, cx, cy, size, alpha) {
        ctx.save();
        ctx.globalAlpha = alpha;

        if (val === 0) {
            drawShell(cx, cy, size);
        } else {
            const bars = Math.floor(val / 5);
            const dots = val % 5;
            const spacing = size * 0.18;
            const totalH = (bars + (dots > 0 ? 1 : 0)) * spacing;
            let y = cy + totalH / 2 - spacing / 2;

            // Draw bars bottom-up
            for (let b = 0; b < bars; b++) {
                drawBar(cx, y, size);
                y -= spacing;
            }

            // Draw dots on top
            if (dots > 0) {
                const dotSpacing = size * 0.2;
                const startX = cx - (dots - 1) * dotSpacing / 2;
                for (let d = 0; d < dots; d++) {
                    drawDot(startX + d * dotSpacing, y, size);
                }
            }
        }
        ctx.restore();
    }

    function drawStoneBackground() {
        ctx.fillStyle = '#0d1a08';
        ctx.fillRect(0, 0, W, H);

        // Stone texture
        ctx.globalAlpha = 0.03;
        for (let i = 0; i < 3000; i++) {
            ctx.fillStyle = Math.random() > 0.5 ? '#8A9A5B' : '#000';
            ctx.fillRect(Math.random() * W, Math.random() * H, 2, 1);
        }
        ctx.globalAlpha = 1;
    }

    function drawScene() {
        drawStoneBackground();

        const digits = mayanDigits;
        const numDigits = digits.length;
        if (numDigits === 0) return;

        const colSize = Math.min(160, W / 3, H / (numDigits + 1.5));
        const totalH = numDigits * colSize * 1.2;
        const startY = H / 2 - totalH / 2 + colSize * 0.6;

        // Title
        ctx.fillStyle = '#DDA15E';
        ctx.font = `bold ${Math.min(36, W * 0.04)}px Georgia`;
        ctx.textAlign = 'center';
        ctx.fillText(currentNumber.toLocaleString(), W / 2, startY - colSize * 0.5);

        // Place value labels
        const placeNames = ['ones (1)', 'twenties (20)', '400s (20\u00B2)', '8,000s (20\u00B3)', '160,000s (20\u2074)', '3.2M (20\u2075)'];

        for (let i = numDigits - 1; i >= 0; i--) {
            const y = startY + (numDigits - 1 - i) * colSize * 1.2;
            const prog = Math.max(0, Math.min(1, (animProgress - (numDigits - 1 - i) * 0.15) / 0.6));
            if (prog <= 0) continue;

            // Stone slab
            ctx.save();
            ctx.globalAlpha = prog;
            ctx.fillStyle = STONE_BG;
            ctx.beginPath();
            ctx.roundRect(W / 2 - colSize * 0.8, y - colSize * 0.4, colSize * 1.6, colSize * 0.8, 10);
            ctx.fill();
            ctx.strokeStyle = 'rgba(138,154,91,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Mayan digit
            drawMayanDigit(digits[i], W / 2, y, colSize, prog);

            // Place value label
            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = `${Math.max(11, colSize * 0.12)}px Georgia`;
            ctx.textAlign = 'left';
            ctx.fillText(placeNames[i] || '', W / 2 + colSize * 0.9, y + 5);

            // Digit value
            ctx.fillStyle = '#DDA15E';
            ctx.font = `bold ${Math.max(14, colSize * 0.16)}px Georgia`;
            ctx.textAlign = 'right';
            ctx.fillText(digits[i].toString(), W / 2 - colSize * 0.9, y + 5);

            ctx.restore();
        }

        // Reference chart at left
        const refSize = Math.min(40, W * 0.035);
        ctx.fillStyle = 'rgba(254,250,224,0.3)';
        ctx.font = `${refSize * 0.4}px Georgia`;
        ctx.textAlign = 'center';
        ctx.fillText('0-19 Reference', 70, 80);
        for (let v = 0; v < 20; v++) {
            const rx = 30 + (v % 4) * (refSize + 10);
            const ry = 100 + Math.floor(v / 4) * (refSize + 8);
            ctx.save();
            ctx.globalAlpha = 0.6;
            ctx.fillStyle = 'rgba(58,74,42,0.5)';
            ctx.beginPath();
            ctx.roundRect(rx, ry, refSize, refSize, 4);
            ctx.fill();
            drawMayanDigit(v, rx + refSize / 2, ry + refSize / 2, refSize, 0.7);
            ctx.globalAlpha = 0.4;
            ctx.fillStyle = '#FEFAE0';
            ctx.font = `${refSize * 0.28}px Georgia`;
            ctx.textAlign = 'center';
            ctx.fillText(v.toString(), rx + refSize / 2, ry + refSize + 10);
            ctx.restore();
        }
    }

    function animate() {
        animFrame = requestAnimationFrame(animate);
        if (counting) {
            countValue++;
            if (countValue > 400) { counting = false; countValue = 0; }
            currentNumber = countValue;
            mayanDigits = toMayan(currentNumber);
            animProgress = 2;
        } else {
            animProgress += 0.025;
        }
        drawScene();
    }

    function convert(n) {
        currentNumber = Math.max(0, Math.min(999999, n));
        mayanDigits = toMayan(currentNumber);
        animProgress = 0;
        counting = false;
    }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }

    document.getElementById('convertBtn').addEventListener('click', () => {
        convert(parseInt(document.getElementById('numInput').value) || 0);
    });

    document.getElementById('numInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') convert(parseInt(e.target.value) || 0);
    });

    document.getElementById('randomBtn').addEventListener('click', () => {
        const n = Math.floor(Math.random() * 160000);
        document.getElementById('numInput').value = n;
        convert(n);
    });

    document.getElementById('countBtn').addEventListener('click', () => {
        counting = !counting;
        countValue = 0;
    });

    window.addEventListener('resize', resize);
    resize();
    convert(2026);
    animate();

    window.reset = function() {
        counting = false;
        countValue = 0;
        convert(2026);
        document.getElementById('numInput').value = 2026;
    };
    </script>
</body>
</html>
