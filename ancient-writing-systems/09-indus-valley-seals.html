<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indus Valley Seals - Ancient Writing Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #14100e; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; cursor: pointer; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(20, 16, 14, 0.9); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 12px 20px; color: #FEFAE0;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center;
        }
        .btn {
            background: rgba(138, 154, 91, 0.4); border: 1px solid #8A9A5B;
            color: #FEFAE0; padding: 6px 14px; border-radius: 8px; cursor: pointer;
            font-size: 0.85rem; transition: background 0.2s;
        }
        .btn:hover { background: rgba(138, 154, 91, 0.7); }
        #info {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(20, 16, 14, 0.9); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 12px 16px; color: #FEFAE0;
            font-size: 0.8rem; max-width: 250px; line-height: 1.5;
        }
        #info h3 { color: #DDA15E; margin-bottom: 4px; }
        #sealDetail {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 16, 14, 0.95); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 24px; color: #FEFAE0; z-index: 2000;
            display: none; text-align: center; border: 2px solid #DDA15E;
            min-width: 280px;
        }
        #sealDetail h2 { color: #DDA15E; margin-bottom: 8px; }
        #sealDetail p { opacity: 0.7; margin-bottom: 6px; font-size: 0.9rem; line-height: 1.5; }
        #sealDetail canvas { margin: 10px auto; display: block; border-radius: 8px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Indus Valley Seals</h3>
        <p>The undeciphered Indus script (c. 2600-1900 BCE). Over 400 distinct signs found on ~4,000 seals from Mohenjo-daro and Harappa. Click any seal to examine it. Drag symbols to create your own seal.</p>
    </div>
    <div id="ui">
        <button class="btn" id="generateBtn">Generate Seal</button>
        <button class="btn" id="galleryBtn">Symbol Gallery</button>
        <button class="btn" id="statsBtn">Script Statistics</button>
    </div>
    <div id="sealDetail">
        <canvas id="detailCanvas" width="200" height="200"></canvas>
        <h2 id="sealTitle"></h2>
        <p id="sealDesc"></p>
        <button class="btn" onclick="document.getElementById('sealDetail').style.display='none'">Close</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let time = 0;
    let mode = 'seals'; // seals, gallery, stats
    let hoveredSeal = -1;
    let seals = [];

    // Simplified Indus Valley script signs (stroke-based)
    const indusSymbols = [];
    for (let i = 0; i < 60; i++) {
        const strokes = [];
        const complexity = 2 + Math.floor(Math.random() * 4);
        for (let s = 0; s < complexity; s++) {
            const type = Math.floor(Math.random() * 5);
            if (type === 0) { // Line
                strokes.push({ t: 'line', x1: Math.random(), y1: Math.random(), x2: Math.random(), y2: Math.random() });
            } else if (type === 1) { // Arc
                strokes.push({ t: 'arc', cx: 0.3 + Math.random() * 0.4, cy: 0.3 + Math.random() * 0.4, r: 0.1 + Math.random() * 0.2, sa: Math.random() * Math.PI, ea: Math.random() * Math.PI * 2 });
            } else if (type === 2) { // Circle
                strokes.push({ t: 'circle', cx: 0.3 + Math.random() * 0.4, cy: 0.3 + Math.random() * 0.4, r: 0.05 + Math.random() * 0.12 });
            } else if (type === 3) { // Vertical line
                const x = 0.2 + Math.random() * 0.6;
                strokes.push({ t: 'line', x1: x, y1: 0.1 + Math.random() * 0.2, x2: x, y2: 0.7 + Math.random() * 0.2 });
            } else { // Hook
                strokes.push({ t: 'line', x1: 0.3 + Math.random() * 0.4, y1: 0.2, x2: 0.3 + Math.random() * 0.4, y2: 0.6 });
                strokes.push({ t: 'arc', cx: 0.5, cy: 0.6, r: 0.15, sa: 0, ea: Math.PI });
            }
        }
        indusSymbols.push(strokes);
    }

    // Seal animal types
    const animals = [
        { name: 'Unicorn', draw: drawUnicorn },
        { name: 'Bull', draw: drawBull },
        { name: 'Elephant', draw: drawElephant },
        { name: 'Rhinoceros', draw: drawRhino },
        { name: 'Water Buffalo', draw: drawBuffalo },
    ];

    function drawUnicorn(ctx, x, y, s) {
        ctx.beginPath();
        ctx.ellipse(x, y + s * 0.1, s * 0.35, s * 0.18, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        // Head
        ctx.beginPath();
        ctx.ellipse(x + s * 0.3, y - s * 0.1, s * 0.1, s * 0.08, -0.3, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        // Horn
        ctx.beginPath();
        ctx.moveTo(x + s * 0.35, y - s * 0.15);
        ctx.lineTo(x + s * 0.45, y - s * 0.4);
        ctx.stroke();
        // Legs
        for (let l = -1; l <= 1; l += 2) {
            ctx.beginPath();
            ctx.moveTo(x + l * s * 0.15, y + s * 0.25);
            ctx.lineTo(x + l * s * 0.15, y + s * 0.45);
            ctx.stroke();
        }
    }

    function drawBull(ctx, x, y, s) {
        ctx.beginPath();
        ctx.ellipse(x, y + s * 0.05, s * 0.3, s * 0.2, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.arc(x + s * 0.25, y - s * 0.1, s * 0.1, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        // Horns
        ctx.beginPath();
        ctx.moveTo(x + s * 0.2, y - s * 0.18);
        ctx.quadraticCurveTo(x + s * 0.15, y - s * 0.4, x + s * 0.25, y - s * 0.35);
        ctx.moveTo(x + s * 0.3, y - s * 0.18);
        ctx.quadraticCurveTo(x + s * 0.35, y - s * 0.4, x + s * 0.25, y - s * 0.35);
        ctx.stroke();
        for (let l = -1; l <= 1; l += 2) {
            ctx.beginPath();
            ctx.moveTo(x + l * s * 0.12, y + s * 0.22);
            ctx.lineTo(x + l * s * 0.14, y + s * 0.42);
            ctx.stroke();
        }
    }

    function drawElephant(ctx, x, y, s) {
        ctx.beginPath();
        ctx.ellipse(x - s * 0.05, y, s * 0.3, s * 0.25, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        // Head
        ctx.beginPath();
        ctx.arc(x + s * 0.25, y - s * 0.05, s * 0.12, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        // Trunk
        ctx.beginPath();
        ctx.moveTo(x + s * 0.35, y);
        ctx.quadraticCurveTo(x + s * 0.45, y + s * 0.15, x + s * 0.4, y + s * 0.35);
        ctx.stroke();
        // Legs
        ctx.beginPath();
        ctx.moveTo(x - s * 0.15, y + s * 0.22);
        ctx.lineTo(x - s * 0.15, y + s * 0.42);
        ctx.moveTo(x + s * 0.1, y + s * 0.22);
        ctx.lineTo(x + s * 0.1, y + s * 0.42);
        ctx.stroke();
    }

    function drawRhino(ctx, x, y, s) {
        ctx.beginPath();
        ctx.ellipse(x, y + s * 0.05, s * 0.3, s * 0.18, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(x + s * 0.28, y - s * 0.02, s * 0.1, s * 0.08, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        // Horn
        ctx.beginPath();
        ctx.moveTo(x + s * 0.36, y - s * 0.06);
        ctx.lineTo(x + s * 0.42, y - s * 0.22);
        ctx.stroke();
        for (let l = -1; l <= 1; l += 2) {
            ctx.beginPath();
            ctx.moveTo(x + l * s * 0.12, y + s * 0.2);
            ctx.lineTo(x + l * s * 0.12, y + s * 0.4);
            ctx.stroke();
        }
    }

    function drawBuffalo(ctx, x, y, s) {
        ctx.beginPath();
        ctx.ellipse(x, y + s * 0.05, s * 0.3, s * 0.2, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        ctx.beginPath();
        ctx.arc(x + s * 0.25, y - s * 0.08, s * 0.1, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
        // Curved horns
        ctx.beginPath();
        ctx.moveTo(x + s * 0.18, y - s * 0.15);
        ctx.quadraticCurveTo(x, y - s * 0.45, x + s * 0.35, y - s * 0.3);
        ctx.stroke();
        for (let l = -1; l <= 1; l += 2) {
            ctx.beginPath();
            ctx.moveTo(x + l * s * 0.12, y + s * 0.22);
            ctx.lineTo(x + l * s * 0.14, y + s * 0.42);
            ctx.stroke();
        }
    }

    function drawIndusSymbol(ctx, sym, x, y, size) {
        const s = size;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        for (const stroke of sym) {
            if (stroke.t === 'line') {
                ctx.beginPath();
                ctx.moveTo(x + stroke.x1 * s, y + stroke.y1 * s);
                ctx.lineTo(x + stroke.x2 * s, y + stroke.y2 * s);
                ctx.stroke();
            } else if (stroke.t === 'arc') {
                ctx.beginPath();
                ctx.arc(x + stroke.cx * s, y + stroke.cy * s, stroke.r * s, stroke.sa, stroke.ea);
                ctx.stroke();
            } else if (stroke.t === 'circle') {
                ctx.beginPath();
                ctx.arc(x + stroke.cx * s, y + stroke.cy * s, stroke.r * s, 0, Math.PI * 2);
                ctx.stroke();
            }
        }
    }

    function generateSeal() {
        const animal = animals[Math.floor(Math.random() * animals.length)];
        const numSymbols = 3 + Math.floor(Math.random() * 5);
        const symbols = [];
        for (let i = 0; i < numSymbols; i++) {
            symbols.push(Math.floor(Math.random() * indusSymbols.length));
        }
        return {
            animal, symbols,
            site: Math.random() > 0.5 ? 'Mohenjo-daro' : 'Harappa',
            material: Math.random() > 0.3 ? 'Steatite' : 'Terracotta',
            id: 'H-' + (1000 + Math.floor(Math.random() * 9000)),
        };
    }

    function initSeals() {
        seals = [];
        const cols = Math.floor(W / 180);
        const rows = Math.floor((H - 80) / 200);
        const sealSize = Math.min(150, (W - 60) / cols - 10);

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x = 40 + c * (sealSize + 10) + sealSize / 2;
                const y = 60 + r * (sealSize + 40) + sealSize / 2;
                const seal = generateSeal();
                seal.x = x; seal.y = y; seal.size = sealSize;
                seals.push(seal);
            }
        }
    }

    function drawSealOnCanvas(c, seal, x, y, size) {
        const s = size;
        const half = s / 2;

        // Seal background (steatite)
        const grad = c.createRadialGradient(x, y, 0, x, y, half);
        grad.addColorStop(0, '#8a7a60');
        grad.addColorStop(1, '#6a5a40');
        c.fillStyle = grad;
        c.beginPath();
        c.roundRect(x - half, y - half, s, s, 8);
        c.fill();

        // Border
        c.strokeStyle = 'rgba(180,160,120,0.5)';
        c.lineWidth = 2;
        c.stroke();

        // Script symbols along top (right to left, as Indus script was read)
        const symSize = s * 0.15;
        const numSym = seal.symbols.length;
        const symStartX = x + half - symSize - 5;
        c.strokeStyle = 'rgba(40,30,20,0.8)';
        c.lineWidth = 1.5;
        for (let i = 0; i < numSym; i++) {
            drawIndusSymbol(c, indusSymbols[seal.symbols[i]], symStartX - i * (symSize + 2), y - half + 5, symSize);
        }

        // Animal in center-bottom
        c.strokeStyle = 'rgba(40,30,20,0.7)';
        c.fillStyle = 'rgba(40,30,20,0.15)';
        c.lineWidth = 1.5;
        seal.animal.draw(c, x, y + s * 0.12, s * 0.7);
    }

    function drawGalleryMode() {
        ctx.fillStyle = 'rgba(254,250,224,0.5)';
        ctx.font = 'bold 1.1rem Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Indus Valley Script - Symbol Gallery (60 of 400+ known signs)', W / 2, 40);

        const cols = Math.floor((W - 60) / 50);
        const symSize = Math.min(40, (W - 60) / cols - 6);

        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 1.5;
        for (let i = 0; i < indusSymbols.length; i++) {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const x = 40 + col * (symSize + 6);
            const y = 65 + row * (symSize + 20);

            ctx.save();
            ctx.fillStyle = 'rgba(100,80,50,0.3)';
            ctx.beginPath();
            ctx.roundRect(x, y, symSize, symSize, 4);
            ctx.fill();
            ctx.strokeStyle = 'rgba(221,161,94,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 1.5;
            drawIndusSymbol(ctx, indusSymbols[i], x, y, symSize);

            ctx.fillStyle = 'rgba(254,250,224,0.3)';
            ctx.font = '0.6rem Georgia';
            ctx.textAlign = 'center';
            ctx.fillText('#' + (i + 1), x + symSize / 2, y + symSize + 12);
            ctx.restore();
        }
    }

    function drawStatsMode() {
        const stats = [
            { label: 'Known inscribed objects', value: '~4,000' },
            { label: 'Distinct signs identified', value: '400+' },
            { label: 'Average inscription length', value: '5 signs' },
            { label: 'Longest inscription', value: '26 signs' },
            { label: 'Writing direction', value: 'Right to left' },
            { label: 'Period of use', value: '2600-1900 BCE' },
            { label: 'Primary medium', value: 'Steatite seals' },
            { label: 'Decipherment status', value: 'Undeciphered' },
        ];

        ctx.fillStyle = '#DDA15E';
        ctx.font = 'bold 1.3rem Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Indus Valley Script Statistics', W / 2, 60);

        const barW = Math.min(400, W * 0.6);
        const startX = (W - barW) / 2;

        stats.forEach((s, i) => {
            const y = 100 + i * 55;
            ctx.fillStyle = 'rgba(138,154,91,0.15)';
            ctx.beginPath();
            ctx.roundRect(startX, y, barW, 40, 8);
            ctx.fill();

            ctx.fillStyle = '#FEFAE0';
            ctx.font = '0.9rem Georgia';
            ctx.textAlign = 'left';
            ctx.fillText(s.label, startX + 15, y + 25);

            ctx.fillStyle = '#DDA15E';
            ctx.font = 'bold 0.95rem Georgia';
            ctx.textAlign = 'right';
            ctx.fillText(s.value, startX + barW - 15, y + 25);
        });

        // Sign frequency distribution
        const distY = 100 + stats.length * 55 + 30;
        ctx.fillStyle = 'rgba(254,250,224,0.5)';
        ctx.font = 'bold 1rem Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Sign Frequency Distribution (simulated)', W / 2, distY);

        const freqs = Array.from({ length: 40 }, (_, i) => Math.exp(-i * 0.08) * 100 + Math.random() * 10);
        const maxFreq = Math.max(...freqs);
        const bw = barW / freqs.length;

        for (let i = 0; i < freqs.length; i++) {
            const bh = (freqs[i] / maxFreq) * 120;
            ctx.fillStyle = `rgba(221,161,94,${0.3 + freqs[i] / maxFreq * 0.7})`;
            ctx.fillRect(startX + i * bw, distY + 130 - bh, bw - 1, bh);
        }

        ctx.fillStyle = 'rgba(254,250,224,0.4)';
        ctx.font = '0.7rem Georgia';
        ctx.textAlign = 'center';
        ctx.fillText('Most common signs                                                          Rare signs', W / 2, distY + 148);
    }

    function drawScene() {
        ctx.fillStyle = '#14100e';
        ctx.fillRect(0, 0, W, H);

        if (mode === 'gallery') {
            drawGalleryMode();
        } else if (mode === 'stats') {
            drawStatsMode();
        } else {
            // Draw seals
            seals.forEach((seal, i) => {
                drawSealOnCanvas(ctx, seal, seal.x, seal.y, seal.size);

                // Label
                ctx.fillStyle = 'rgba(254,250,224,0.4)';
                ctx.font = '0.7rem Georgia';
                ctx.textAlign = 'center';
                ctx.fillText(seal.id + ' | ' + seal.animal.name, seal.x, seal.y + seal.size / 2 + 18);

                if (hoveredSeal === i) {
                    ctx.strokeStyle = '#DDA15E';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(seal.x - seal.size / 2 - 3, seal.y - seal.size / 2 - 3, seal.size + 6, seal.size + 6, 10);
                    ctx.stroke();
                }
            });
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        time += 0.016;
        drawScene();
    }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        initSeals();
    }

    canvas.addEventListener('mousemove', e => {
        if (mode !== 'seals') return;
        hoveredSeal = -1;
        seals.forEach((seal, i) => {
            const dx = e.clientX - seal.x;
            const dy = e.clientY - seal.y;
            if (Math.abs(dx) < seal.size / 2 && Math.abs(dy) < seal.size / 2) {
                hoveredSeal = i;
            }
        });
        canvas.style.cursor = hoveredSeal >= 0 ? 'pointer' : 'default';
    });

    canvas.addEventListener('click', () => {
        if (hoveredSeal >= 0 && mode === 'seals') {
            const seal = seals[hoveredSeal];
            const dc = document.getElementById('detailCanvas');
            const dctx = dc.getContext('2d');
            dctx.clearRect(0, 0, 200, 200);
            drawSealOnCanvas(dctx, seal, 100, 100, 180);
            document.getElementById('sealTitle').textContent = seal.id + ' - ' + seal.animal.name;
            document.getElementById('sealDesc').innerHTML =
                'Site: ' + seal.site + '<br>Material: ' + seal.material +
                '<br>Script signs: ' + seal.symbols.length +
                '<br><br><em>This seal likely served as a merchant\'s mark or administrative identifier. The Indus script remains undeciphered.</em>';
            document.getElementById('sealDetail').style.display = 'block';
        }
    });

    document.getElementById('generateBtn').addEventListener('click', () => {
        mode = 'seals';
        initSeals();
    });
    document.getElementById('galleryBtn').addEventListener('click', () => { mode = mode === 'gallery' ? 'seals' : 'gallery'; });
    document.getElementById('statsBtn').addEventListener('click', () => { mode = mode === 'stats' ? 'seals' : 'stats'; });

    window.addEventListener('resize', resize);
    resize();
    animate();

    window.reset = function() {
        mode = 'seals';
        hoveredSeal = -1;
        initSeals();
    };
    </script>
</body>
</html>
