<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosetta Stone Trilingual Comparison - Ancient Writing Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0e0e0e; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(14, 14, 14, 0.9); backdrop-filter: blur(10px);
            border-radius: 16px; padding: 12px 20px; color: #FEFAE0;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center;
        }
        .btn {
            background: rgba(138, 154, 91, 0.4); border: 1px solid #8A9A5B;
            color: #FEFAE0; padding: 6px 14px; border-radius: 8px; cursor: pointer;
            font-size: 0.85rem; transition: background 0.2s;
        }
        .btn:hover { background: rgba(138, 154, 91, 0.7); }
        .btn.active { background: rgba(221, 161, 94, 0.5); border-color: #DDA15E; }
        #info {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(14, 14, 14, 0.9); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 12px 16px; color: #FEFAE0;
            font-size: 0.8rem; max-width: 260px; line-height: 1.5;
        }
        #info h3 { color: #DDA15E; margin-bottom: 4px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Rosetta Stone</h3>
        <p>Discovered 1799. The same decree (196 BCE, Ptolemy V) in three scripts: Egyptian hieroglyphs, Demotic, and Ancient Greek. Click sections to highlight the parallel passages. This trilingual text was the key to deciphering hieroglyphics.</p>
    </div>
    <div id="ui">
        <button class="btn active" data-section="all">Full Stone</button>
        <button class="btn" data-section="hieroglyphic">Hieroglyphic</button>
        <button class="btn" data-section="demotic">Demotic</button>
        <button class="btn" data-section="greek">Greek</button>
        <button class="btn" data-section="compare">Compare Mode</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let time = 0;
    let section = 'all';
    let stoneNoise = [];
    let compareOffset = 0;

    // Excerpt passages from the Rosetta Stone decree
    const passages = [
        {
            title: 'Royal Titles',
            hieroglyphic: 'The young one, who has received the kingship from his father',
            demotic: 'The youth who has assumed the crown from his father',
            greek: 'The king, who inherited the throne from his father',
        },
        {
            title: 'Temple Donations',
            hieroglyphic: 'He has given much silver and grain to the temples of Egypt',
            demotic: 'He bestowed silver and wheat upon the temples throughout the land',
            greek: 'He dedicated great quantities of money and corn to the temples',
        },
        {
            title: 'Tax Relief',
            hieroglyphic: 'He has remitted the taxes which were owed by the people',
            demotic: 'He released the people from the burdens which lay upon them',
            greek: 'He remitted some of the taxes and lightened others for the people',
        },
        {
            title: 'The Decree',
            hieroglyphic: 'This decree shall be inscribed on a stela of hard stone in sacred, native, and Greek writing',
            demotic: 'This text is to be carved on a stone of hard rock in the script of gods, the script of documents, and Greek',
            greek: 'This decree shall be written on a stele of hard stone in sacred and native and Greek characters',
        }
    ];

    function generateNoise() {
        stoneNoise = [];
        for (let y = 0; y < 400; y++) {
            const row = [];
            for (let x = 0; x < 300; x++) {
                row.push((Math.random() - 0.5) * 30);
            }
            stoneNoise.push(row);
        }
    }

    function drawStone(sx, sy, sw, sh) {
        // Granodiorite stone base
        const grad = ctx.createLinearGradient(sx, sy, sx + sw, sy + sh);
        grad.addColorStop(0, '#3a3a3a');
        grad.addColorStop(0.3, '#4a4a46');
        grad.addColorStop(0.6, '#3e3e3a');
        grad.addColorStop(1, '#333330');
        ctx.fillStyle = grad;

        // Stone shape - slightly irregular
        ctx.beginPath();
        ctx.moveTo(sx + sw * 0.05, sy);
        ctx.lineTo(sx + sw * 0.95, sy);
        ctx.quadraticCurveTo(sx + sw, sy, sx + sw, sy + sh * 0.05);
        ctx.lineTo(sx + sw * 0.98, sy + sh * 0.6);
        // Bottom is broken/irregular
        ctx.lineTo(sx + sw * 0.95, sy + sh * 0.85);
        ctx.quadraticCurveTo(sx + sw * 0.85, sy + sh, sx + sw * 0.7, sy + sh * 0.95);
        ctx.lineTo(sx + sw * 0.5, sy + sh);
        ctx.lineTo(sx + sw * 0.3, sy + sh * 0.97);
        ctx.quadraticCurveTo(sx + sw * 0.1, sy + sh * 0.95, sx + sw * 0.02, sy + sh * 0.8);
        ctx.lineTo(sx, sy + sh * 0.05);
        ctx.quadraticCurveTo(sx, sy, sx + sw * 0.05, sy);
        ctx.closePath();
        ctx.fill();

        // Stone texture
        ctx.save();
        ctx.clip();
        ctx.globalAlpha = 0.06;
        for (let y = 0; y < Math.min(stoneNoise.length, sh / 2); y++) {
            for (let x = 0; x < Math.min(stoneNoise[0]?.length || 0, sw / 2); x++) {
                const v = stoneNoise[y]?.[x] || 0;
                ctx.fillStyle = v > 0 ? '#fff' : '#000';
                ctx.fillRect(sx + x * 2, sy + y * 2, 2, 2);
            }
        }
        ctx.globalAlpha = 1;
        ctx.restore();

        return ctx;
    }

    function drawInscribedText(text, x, y, maxW, style) {
        ctx.save();
        ctx.font = style.font;
        ctx.fillStyle = style.color;
        ctx.globalAlpha = style.alpha || 1;
        ctx.textAlign = 'left';

        const words = text.split(' ');
        let line = '';
        let ly = y;
        const lineH = style.lineHeight || 16;

        for (const word of words) {
            const test = line + word + ' ';
            if (ctx.measureText(test).width > maxW) {
                ctx.fillText(line.trim(), x, ly);
                line = word + ' ';
                ly += lineH;
            } else {
                line = test;
            }
        }
        ctx.fillText(line.trim(), x, ly);
        ctx.restore();
        return ly + lineH;
    }

    function generatePseudoScript(type, count) {
        const chars = [];
        if (type === 'hieroglyphic') {
            // Pseudo-hieroglyphic symbols
            for (let i = 0; i < count; i++) {
                chars.push({
                    x: Math.random(),
                    y: Math.random(),
                    type: Math.floor(Math.random() * 8),
                    size: 0.6 + Math.random() * 0.4
                });
            }
        }
        return chars;
    }

    function drawPseudoHieroglyph(x, y, size, type) {
        ctx.save();
        ctx.strokeStyle = 'rgba(180,175,160,0.5)';
        ctx.lineWidth = 1;
        ctx.lineCap = 'round';
        const s = size;

        switch (type % 8) {
            case 0: // Eye of Horus-like
                ctx.beginPath(); ctx.arc(x, y, s * 0.3, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x - s * 0.3, y); ctx.lineTo(x - s * 0.5, y + s * 0.2); ctx.stroke();
                break;
            case 1: // Bird
                ctx.beginPath(); ctx.ellipse(x, y, s * 0.2, s * 0.35, 0, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x + s * 0.15, y - s * 0.2); ctx.lineTo(x + s * 0.35, y - s * 0.3); ctx.stroke();
                break;
            case 2: // Wavy line
                ctx.beginPath();
                ctx.moveTo(x - s * 0.4, y);
                ctx.bezierCurveTo(x - s * 0.2, y - s * 0.2, x + s * 0.2, y + s * 0.2, x + s * 0.4, y);
                ctx.stroke();
                break;
            case 3: // Rectangle
                ctx.strokeRect(x - s * 0.2, y - s * 0.3, s * 0.4, s * 0.6);
                break;
            case 4: // Cross/ankh
                ctx.beginPath(); ctx.moveTo(x, y - s * 0.4); ctx.lineTo(x, y + s * 0.4); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x - s * 0.2, y - s * 0.1); ctx.lineTo(x + s * 0.2, y - s * 0.1); ctx.stroke();
                ctx.beginPath(); ctx.arc(x, y - s * 0.4, s * 0.1, 0, Math.PI * 2); ctx.stroke();
                break;
            case 5: // Reed
                ctx.beginPath(); ctx.moveTo(x, y + s * 0.4); ctx.lineTo(x, y - s * 0.3);
                ctx.quadraticCurveTo(x + s * 0.1, y - s * 0.45, x + s * 0.05, y - s * 0.5); ctx.stroke();
                break;
            case 6: // Seated figure
                ctx.beginPath(); ctx.arc(x, y - s * 0.2, s * 0.1, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x, y - s * 0.1); ctx.lineTo(x, y + s * 0.2);
                ctx.lineTo(x + s * 0.2, y + s * 0.4); ctx.stroke();
                break;
            case 7: // Half circle
                ctx.beginPath(); ctx.arc(x, y, s * 0.25, 0, Math.PI); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x - s * 0.25, y); ctx.lineTo(x + s * 0.25, y); ctx.stroke();
                break;
        }
        ctx.restore();
    }

    function drawScene() {
        ctx.fillStyle = '#0e0e0e';
        ctx.fillRect(0, 0, W, H);

        // Museum ambient light
        const ambGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.6);
        ambGrad.addColorStop(0, 'rgba(60, 55, 45, 0.15)');
        ambGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = ambGrad;
        ctx.fillRect(0, 0, W, H);

        if (section === 'compare') {
            drawCompareMode();
            return;
        }

        const stoneW = Math.min(W * 0.65, 500);
        const stoneH = Math.min(H * 0.85, 700);
        const sx = (W - stoneW) / 2;
        const sy = (H - stoneH) / 2;

        drawStone(sx, sy, stoneW, stoneH);

        // Three sections of the stone
        const hierH = stoneH * 0.28;
        const demH = stoneH * 0.32;
        const greekH = stoneH * 0.35;
        const pad = stoneW * 0.08;

        const hierAlpha = (section === 'all' || section === 'hieroglyphic') ? 1 : 0.2;
        const demAlpha = (section === 'all' || section === 'demotic') ? 1 : 0.2;
        const greekAlpha = (section === 'all' || section === 'greek') ? 1 : 0.2;

        // Section divider lines
        ctx.strokeStyle = 'rgba(150,145,130,0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(sx + pad, sy + hierH);
        ctx.lineTo(sx + stoneW - pad, sy + hierH);
        ctx.moveTo(sx + pad, sy + hierH + demH);
        ctx.lineTo(sx + stoneW - pad, sy + hierH + demH);
        ctx.stroke();

        // Section labels
        ctx.save();
        ctx.font = 'italic 0.7rem Georgia';
        ctx.textAlign = 'right';
        ctx.fillStyle = 'rgba(221, 161, 94, 0.6)';
        ctx.fillText('Hieroglyphic', sx - 10, sy + hierH / 2);
        ctx.fillText('Demotic', sx - 10, sy + hierH + demH / 2);
        ctx.fillText('Greek', sx - 10, sy + hierH + demH + greekH / 2);
        ctx.restore();

        // Hieroglyphic section - pseudo-glyphs
        ctx.save();
        ctx.globalAlpha = hierAlpha;
        const glyphSize = Math.min(16, stoneW * 0.035);
        const cols = Math.floor((stoneW - pad * 2) / (glyphSize * 1.4));
        const rows = Math.floor((hierH - 20) / (glyphSize * 1.8));
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const gx = sx + pad + c * glyphSize * 1.4 + glyphSize * 0.7;
                const gy = sy + 15 + r * glyphSize * 1.8 + glyphSize;
                drawPseudoHieroglyph(gx, gy, glyphSize, (r * cols + c + Math.floor(time)) % 8);
            }
        }
        ctx.restore();

        // Demotic section - cursive script simulation
        ctx.save();
        ctx.globalAlpha = demAlpha;
        ctx.strokeStyle = 'rgba(170,165,150,0.5)';
        ctx.lineWidth = 1;
        const demRows = Math.floor((demH - 20) / 14);
        for (let r = 0; r < demRows; r++) {
            const ly = sy + hierH + 12 + r * 14;
            ctx.beginPath();
            let lx = sx + pad;
            ctx.moveTo(lx, ly);
            while (lx < sx + stoneW - pad) {
                const seg = 3 + Math.random() * 8;
                const dy = (Math.random() - 0.5) * 6;
                lx += seg;
                ctx.quadraticCurveTo(lx - seg / 2, ly + dy, lx, ly + (Math.random() - 0.5) * 2);
            }
            ctx.stroke();
        }
        ctx.restore();

        // Greek section
        ctx.save();
        ctx.globalAlpha = greekAlpha;
        const greekText = 'BASILEUS PTOLEMAIOS AIWNOBIOS HGAPHMENOS UPO TOU FTHA THEOS EPIFANHS EUCHARISTOS TO DWRON DEDWKEN TOIS IEROIS ARGURIOU TE KAI SITOU POLLA METRA';
        drawInscribedText(greekText, sx + pad, sy + hierH + demH + 18, stoneW - pad * 2, {
            font: `${Math.max(10, stoneW * 0.024)}px Georgia`,
            color: 'rgba(170,165,150,0.6)',
            lineHeight: Math.max(13, stoneW * 0.032),
            alpha: greekAlpha
        });
        ctx.restore();

        // Highlight border for selected section
        if (section !== 'all') {
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            let hy, hh;
            if (section === 'hieroglyphic') { hy = sy; hh = hierH; }
            else if (section === 'demotic') { hy = sy + hierH; hh = demH; }
            else { hy = sy + hierH + demH; hh = greekH; }
            ctx.strokeRect(sx + pad - 5, hy + 5, stoneW - pad * 2 + 10, hh - 10);
            ctx.setLineDash([]);
        }
    }

    function drawCompareMode() {
        compareOffset += 0.005;
        const colW = W / 3;
        const pad = 30;

        const headers = ['Hieroglyphic', 'Demotic', 'Greek'];
        const colors = ['#DDA15E', '#8A9A5B', '#BC6C25'];

        for (let col = 0; col < 3; col++) {
            // Column header
            ctx.fillStyle = colors[col];
            ctx.font = 'bold 1.1rem Georgia';
            ctx.textAlign = 'center';
            ctx.fillText(headers[col], colW * col + colW / 2, 50);

            // Divider
            ctx.strokeStyle = 'rgba(138,154,91,0.2)';
            ctx.lineWidth = 1;
            if (col > 0) {
                ctx.beginPath();
                ctx.moveTo(colW * col, 30);
                ctx.lineTo(colW * col, H);
                ctx.stroke();
            }
        }

        // Passages
        passages.forEach((p, pi) => {
            const baseY = 90 + pi * (H - 120) / passages.length;

            // Passage title
            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            ctx.font = 'italic 0.85rem Georgia';
            ctx.textAlign = 'left';
            ctx.fillText(p.title, pad, baseY);

            const texts = [p.hieroglyphic, p.demotic, p.greek];
            texts.forEach((text, ti) => {
                const x = colW * ti + pad;
                const maxW = colW - pad * 2;
                drawInscribedText(text, x, baseY + 20, maxW, {
                    font: `${Math.max(11, W * 0.012)}px Georgia`,
                    color: colors[ti],
                    lineHeight: 18,
                    alpha: 0.8
                });
            });

            // Connecting lines showing parallel passages
            const anim = Math.sin(time * 2 + pi) * 0.3 + 0.7;
            ctx.strokeStyle = `rgba(221,161,94,${anim * 0.15})`;
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            for (let ti = 0; ti < 2; ti++) {
                ctx.beginPath();
                ctx.moveTo(colW * (ti + 1) - 10, baseY + 25);
                ctx.lineTo(colW * (ti + 1) + 10, baseY + 25);
                ctx.stroke();
            }
            ctx.setLineDash([]);
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        time += 0.016;
        drawScene();
    }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        generateNoise();
    }

    document.querySelectorAll('.btn[data-section]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.btn[data-section]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            section = btn.dataset.section;
        });
    });

    window.addEventListener('resize', resize);
    resize();
    animate();

    window.reset = function() {
        section = 'all';
        compareOffset = 0;
        document.querySelectorAll('.btn[data-section]').forEach(b => b.classList.remove('active'));
        document.querySelector('.btn[data-section="all"]').classList.add('active');
    };
    </script>
</body>
</html>
