<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenician Alphabet Evolution Tree - Ancient Writing Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f1a10; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(15, 26, 16, 0.9); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 12px 16px; color: #FEFAE0;
            font-size: 0.8rem; max-width: 260px; line-height: 1.5;
        }
        #info h3 { color: #DDA15E; margin-bottom: 4px; }
        #tooltip {
            position: fixed; display: none; z-index: 2000;
            background: rgba(15, 26, 16, 0.95); backdrop-filter: blur(10px);
            border: 1px solid #DDA15E; border-radius: 10px; padding: 10px 14px;
            color: #FEFAE0; font-size: 0.85rem; max-width: 220px; pointer-events: none;
        }
        #tooltip h4 { color: #DDA15E; margin-bottom: 4px; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="info">
        <h3>Alphabet Evolution Tree</h3>
        <p>From Phoenician (~1050 BCE) to modern scripts. Hover over any letter to see how its shape evolved through Greek, Latin, Hebrew, and Arabic. Scroll to zoom.</p>
    </div>
    <div id="tooltip">
        <h4 id="ttTitle"></h4>
        <p id="ttBody"></p>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let time = 0;
    let hoveredNode = null;
    let panX = 0, panY = 0, zoom = 1;
    let dragging = false, lastMX = 0, lastMY = 0;

    // Alphabet evolution tree data
    const scripts = [
        { id: 'proto', name: 'Proto-Sinaitic', date: '~1800 BCE', color: '#BC6C25', y: 0 },
        { id: 'phoen', name: 'Phoenician', date: '~1050 BCE', color: '#DDA15E', y: 1 },
        { id: 'greek', name: 'Greek', date: '~800 BCE', color: '#8A9A5B', y: 2 },
        { id: 'aramaic', name: 'Aramaic', date: '~800 BCE', color: '#a08050', y: 2 },
        { id: 'latin', name: 'Latin', date: '~700 BCE', color: '#606C38', y: 3 },
        { id: 'etruscan', name: 'Etruscan', date: '~700 BCE', color: '#7a9060', y: 3 },
        { id: 'hebrew', name: 'Hebrew', date: '~300 BCE', color: '#c09050', y: 3 },
        { id: 'arabic', name: 'Arabic', date: '~400 CE', color: '#b08040', y: 4 },
        { id: 'cyrillic', name: 'Cyrillic', date: '~900 CE', color: '#5a8a4a', y: 3 },
    ];

    const edges = [
        ['proto', 'phoen'],
        ['phoen', 'greek'], ['phoen', 'aramaic'],
        ['greek', 'latin'], ['greek', 'etruscan'], ['greek', 'cyrillic'],
        ['aramaic', 'hebrew'], ['aramaic', 'arabic'],
    ];

    // 22 Phoenician letters with their evolution
    const letters = [
        { phoen: 'Aleph', proto: 'Ox head', greek: 'Alpha (A)', latin: 'A', hebrew: 'Alef', arabic: 'Alif' },
        { phoen: 'Beth', proto: 'House', greek: 'Beta (B)', latin: 'B', hebrew: 'Bet', arabic: 'Ba' },
        { phoen: 'Gimel', proto: 'Camel/stick', greek: 'Gamma (G)', latin: 'C, G', hebrew: 'Gimel', arabic: 'Jim' },
        { phoen: 'Daleth', proto: 'Door', greek: 'Delta (D)', latin: 'D', hebrew: 'Dalet', arabic: 'Dal' },
        { phoen: 'He', proto: 'Window/prayer', greek: 'Epsilon (E)', latin: 'E', hebrew: 'He', arabic: 'Ha' },
        { phoen: 'Waw', proto: 'Hook/mace', greek: 'Digamma > Upsilon', latin: 'F, U, V, W, Y', hebrew: 'Vav', arabic: 'Waw' },
        { phoen: 'Zayin', proto: 'Weapon', greek: 'Zeta (Z)', latin: 'Z', hebrew: 'Zayin', arabic: 'Zay' },
        { phoen: 'Heth', proto: 'Fence', greek: 'Eta (H)', latin: 'H', hebrew: 'Chet', arabic: 'Ha' },
        { phoen: 'Teth', proto: 'Wheel/coil', greek: 'Theta', latin: '-', hebrew: 'Tet', arabic: 'Ta' },
        { phoen: 'Yodh', proto: 'Hand/arm', greek: 'Iota (I)', latin: 'I, J', hebrew: 'Yod', arabic: 'Ya' },
        { phoen: 'Kaph', proto: 'Palm', greek: 'Kappa (K)', latin: 'K', hebrew: 'Kaf', arabic: 'Kaf' },
        { phoen: 'Lamedh', proto: 'Goad', greek: 'Lambda (L)', latin: 'L', hebrew: 'Lamed', arabic: 'Lam' },
        { phoen: 'Mem', proto: 'Water', greek: 'Mu (M)', latin: 'M', hebrew: 'Mem', arabic: 'Mim' },
        { phoen: 'Nun', proto: 'Snake/fish', greek: 'Nu (N)', latin: 'N', hebrew: 'Nun', arabic: 'Nun' },
        { phoen: 'Samekh', proto: 'Pillar/support', greek: 'Xi', latin: 'X', hebrew: 'Samekh', arabic: 'Sin' },
        { phoen: 'Ayin', proto: 'Eye', greek: 'Omicron (O)', latin: 'O', hebrew: 'Ayin', arabic: 'Ayn' },
        { phoen: 'Pe', proto: 'Mouth', greek: 'Pi (P)', latin: 'P', hebrew: 'Pe', arabic: 'Fa' },
        { phoen: 'Tsade', proto: 'Plant/fish hook', greek: '-', latin: '-', hebrew: 'Tsade', arabic: 'Sad' },
        { phoen: 'Qoph', proto: 'Needle eye/monkey', greek: 'Qoppa', latin: 'Q', hebrew: 'Qof', arabic: 'Qaf' },
        { phoen: 'Resh', proto: 'Head', greek: 'Rho (R)', latin: 'R', hebrew: 'Resh', arabic: 'Ra' },
        { phoen: 'Shin', proto: 'Tooth/bow', greek: 'Sigma (S)', latin: 'S', hebrew: 'Shin', arabic: 'Shin' },
        { phoen: 'Taw', proto: 'Mark/cross', greek: 'Tau (T)', latin: 'T', hebrew: 'Tav', arabic: 'Ta' },
    ];

    let nodePositions = [];

    function layoutTree() {
        nodePositions = [];
        const levels = {};
        scripts.forEach(s => {
            if (!levels[s.y]) levels[s.y] = [];
            levels[s.y].push(s);
        });

        const levelH = H * 0.16;
        const startY = H * 0.08;

        Object.keys(levels).forEach(ly => {
            const nodes = levels[ly];
            const y = startY + parseInt(ly) * levelH;
            const spacing = W / (nodes.length + 1);
            nodes.forEach((n, i) => {
                nodePositions.push({
                    id: n.id, name: n.name, date: n.date, color: n.color,
                    x: spacing * (i + 1), y: y,
                    radius: 35
                });
            });
        });
    }

    function getNodePos(id) {
        return nodePositions.find(n => n.id === id);
    }

    function drawTree() {
        ctx.fillStyle = '#0f1a10';
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        ctx.translate(W / 2 + panX, H / 2 + panY);
        ctx.scale(zoom, zoom);
        ctx.translate(-W / 2, -H / 2);

        // Draw edges
        for (const [fromId, toId] of edges) {
            const from = getNodePos(fromId);
            const to = getNodePos(toId);
            if (!from || !to) continue;

            ctx.strokeStyle = 'rgba(138, 154, 91, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(from.x, from.y + from.radius);
            const midY = (from.y + to.y) / 2;
            ctx.bezierCurveTo(from.x, midY, to.x, midY, to.x, to.y - to.radius);
            ctx.stroke();

            // Animated particles along edges
            const t = (time * 0.3 + edges.indexOf(arguments[0])) % 1;
            // skip particle for now to avoid arguments issue
        }

        // Draw nodes
        for (const node of nodePositions) {
            const isHovered = hoveredNode && hoveredNode.id === node.id;
            const r = isHovered ? node.radius * 1.2 : node.radius;

            // Glow
            if (isHovered) {
                ctx.shadowColor = node.color;
                ctx.shadowBlur = 25;
            }

            // Circle
            const grad = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, r);
            grad.addColorStop(0, node.color);
            grad.addColorStop(1, 'rgba(0,0,0,0.5)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.strokeStyle = node.color;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Label
            ctx.fillStyle = '#FEFAE0';
            ctx.font = `bold ${Math.max(10, r * 0.32)}px Georgia`;
            ctx.textAlign = 'center';
            ctx.fillText(node.name, node.x, node.y + 3);
            ctx.fillStyle = 'rgba(254,250,224,0.5)';
            ctx.font = `${Math.max(8, r * 0.24)}px Georgia`;
            ctx.fillText(node.date, node.x, node.y + r + 14);
        }

        // Draw letter table below tree
        const tableY = H * 0.58;
        const colW = Math.min(60, (W - 80) / 22);
        const startX = (W - 22 * colW) / 2;

        // Header
        const headers = ['Phoenician', 'Greek', 'Latin', 'Hebrew', 'Arabic'];
        const headerColors = ['#DDA15E', '#8A9A5B', '#606C38', '#c09050', '#b08040'];
        ctx.font = `bold ${Math.max(9, colW * 0.2)}px Georgia`;

        for (let h = 0; h < headers.length; h++) {
            ctx.fillStyle = headerColors[h];
            ctx.textAlign = 'right';
            ctx.fillText(headers[h], startX - 8, tableY + h * (colW * 0.6) + colW * 0.35);
        }

        letters.forEach((letter, i) => {
            const x = startX + i * colW + colW / 2;

            // Column line
            ctx.strokeStyle = 'rgba(138,154,91,0.1)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(x, tableY - 5);
            ctx.lineTo(x, tableY + 5 * colW * 0.6);
            ctx.stroke();

            const vals = [letter.phoen, letter.greek, letter.latin, letter.hebrew, letter.arabic];
            const colors = headerColors;

            vals.forEach((val, vi) => {
                ctx.fillStyle = colors[vi];
                ctx.globalAlpha = 0.8;
                ctx.font = `${Math.max(8, colW * 0.18)}px Georgia`;
                ctx.textAlign = 'center';
                ctx.fillText(val.length > 6 ? val.substring(0, 5) + '..' : val, x, tableY + vi * (colW * 0.6) + colW * 0.35);
                ctx.globalAlpha = 1;
            });
        });

        ctx.restore();
    }

    function animate() {
        requestAnimationFrame(animate);
        time += 0.016;
        drawTree();
    }

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        layoutTree();
    }

    canvas.addEventListener('mousemove', e => {
        if (dragging) {
            panX += e.clientX - lastMX;
            panY += e.clientY - lastMY;
            lastMX = e.clientX;
            lastMY = e.clientY;
            return;
        }

        const mx = (e.clientX - W / 2 - panX) / zoom + W / 2;
        const my = (e.clientY - H / 2 - panY) / zoom + H / 2;

        hoveredNode = null;
        for (const node of nodePositions) {
            const dx = mx - node.x;
            const dy = my - node.y;
            if (dx * dx + dy * dy < node.radius * node.radius) {
                hoveredNode = node;
                break;
            }
        }

        const tt = document.getElementById('tooltip');
        if (hoveredNode) {
            canvas.style.cursor = 'pointer';
            const scriptInfo = scripts.find(s => s.id === hoveredNode.id);
            document.getElementById('ttTitle').textContent = hoveredNode.name + ' (' + hoveredNode.date + ')';
            const connections = edges.filter(e => e[0] === hoveredNode.id || e[1] === hoveredNode.id);
            const related = connections.map(c => {
                const otherId = c[0] === hoveredNode.id ? c[1] : c[0];
                return scripts.find(s => s.id === otherId)?.name;
            }).join(', ');
            document.getElementById('ttBody').textContent = related ? 'Connected to: ' + related : '';
            tt.style.display = 'block';
            tt.style.left = e.clientX + 15 + 'px';
            tt.style.top = e.clientY + 15 + 'px';
        } else {
            canvas.style.cursor = dragging ? 'grabbing' : 'grab';
            tt.style.display = 'none';
        }
    });

    canvas.addEventListener('mousedown', e => {
        dragging = true;
        lastMX = e.clientX;
        lastMY = e.clientY;
        canvas.style.cursor = 'grabbing';
    });
    canvas.addEventListener('mouseup', () => { dragging = false; canvas.style.cursor = 'grab'; });
    canvas.addEventListener('wheel', e => {
        const zf = e.deltaY > 0 ? 0.9 : 1.1;
        zoom = Math.max(0.5, Math.min(3, zoom * zf));
    }, { passive: true });

    window.addEventListener('resize', resize);
    resize();
    animate();

    window.reset = function() {
        panX = 0; panY = 0; zoom = 1;
        hoveredNode = null;
    };
    </script>
</body>
</html>
