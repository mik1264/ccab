<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourier Shape Morphing - Fourier Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .ctrl {
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 10px 14px; border-radius: 10px; color: #FEFAE0; font-size: 0.8rem;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }
        .ctrl label { color: #8A9A5B; }
        .ctrl input[type=range] { width: 130px; accent-color: #DDA15E; }
        .ctrl select {
            background: #2a2a4a; color: #FEFAE0; border: 1px solid rgba(138, 154, 91, 0.3);
            padding: 4px 8px; border-radius: 6px; font-size: 0.82rem; width: 130px;
        }
        #info {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 10px 20px; border-radius: 10px;
            font-size: 0.82rem; z-index: 100;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <div class="ctrl">
            <label>From</label><br>
            <select id="shapeA">
                <option value="circle">Circle</option>
                <option value="square" selected>Square</option>
                <option value="star">Star</option>
                <option value="heart">Heart</option>
                <option value="triangle">Triangle</option>
            </select>
        </div>
        <div class="ctrl">
            <label>To</label><br>
            <select id="shapeB">
                <option value="circle">Circle</option>
                <option value="square">Square</option>
                <option value="star" selected>Star</option>
                <option value="heart">Heart</option>
                <option value="triangle">Triangle</option>
            </select>
        </div>
        <div class="ctrl">
            <label>Morph: <span id="mv">auto</span></label><br>
            <input type="range" id="morph" min="0" max="100" value="50">
        </div>
        <div class="ctrl">
            <label>Terms: <span id="tv">40</span></label><br>
            <input type="range" id="terms" min="4" max="128" value="40">
        </div>
        <div class="ctrl">
            <label>Auto-morph Speed</label><br>
            <input type="range" id="aspeed" min="0" max="30" value="10">
        </div>
    </div>
    <div id="info">Morph between shapes by interpolating their Fourier coefficients</div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        let shapeA = 'square', shapeB = 'star';
        let morphT = 0.5;
        let numTerms = 40;
        let autoSpeed = 1.0;
        let time = 0;
        let autoMorphTime = 0;
        let manualMorph = false;

        const N = 256; // sample points per shape

        function generateShapePoints(name) {
            const pts = [];
            const s = Math.min(W, H) * 0.28;
            for (let i = 0; i < N; i++) {
                const t = (i / N) * 2 * Math.PI;
                let x = 0, y = 0;
                switch (name) {
                    case 'circle':
                        x = s * Math.cos(t);
                        y = s * Math.sin(t);
                        break;
                    case 'square': {
                        const a = t % (Math.PI / 2);
                        const side = Math.floor((t / (Math.PI / 2)) % 4);
                        const d = s * 0.7 / Math.max(Math.abs(Math.cos(t)), Math.abs(Math.sin(t)));
                        x = d * Math.cos(t);
                        y = d * Math.sin(t);
                        break;
                    }
                    case 'star': {
                        const r = s * (0.4 + 0.6 * Math.pow(Math.cos(2.5 * t), 2));
                        x = r * Math.cos(t);
                        y = r * Math.sin(t);
                        break;
                    }
                    case 'heart': {
                        x = s * 0.6 * 16 * Math.pow(Math.sin(t), 3) / 16;
                        y = -s * 0.6 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 16;
                        break;
                    }
                    case 'triangle': {
                        const r = s * 0.8 / Math.max(
                            Math.abs(Math.sin(t + Math.PI/6)),
                            Math.abs(Math.sin(t + Math.PI/6 + 2*Math.PI/3)),
                            Math.abs(Math.sin(t + Math.PI/6 + 4*Math.PI/3))
                        ) * 0.5;
                        x = r * Math.cos(t);
                        y = r * Math.sin(t);
                        break;
                    }
                }
                pts.push({ re: x, im: y });
            }
            return pts;
        }

        function dft(x) {
            const len = x.length;
            const X = [];
            for (let k = 0; k < len; k++) {
                let re = 0, im = 0;
                for (let n = 0; n < len; n++) {
                    const phi = (2 * Math.PI * k * n) / len;
                    re += x[n].re * Math.cos(phi) + x[n].im * Math.sin(phi);
                    im += x[n].im * Math.cos(phi) - x[n].re * Math.sin(phi);
                }
                re /= len;
                im /= len;
                X.push({ re, im, freq: k, amp: Math.sqrt(re*re + im*im), phase: Math.atan2(im, re) });
            }
            return X;
        }

        let fourierA = [], fourierB = [];

        function computeShapes() {
            const ptsA = generateShapePoints(shapeA);
            const ptsB = generateShapePoints(shapeB);
            fourierA = dft(ptsA);
            fourierB = dft(ptsB);
            // Sort both by amplitude descending
            fourierA.sort((a, b) => b.amp - a.amp);
            fourierB.sort((a, b) => b.amp - a.amp);
        }

        computeShapes();

        // Controls
        document.getElementById('shapeA').addEventListener('change', e => { shapeA = e.target.value; computeShapes(); });
        document.getElementById('shapeB').addEventListener('change', e => { shapeB = e.target.value; computeShapes(); });
        document.getElementById('morph').addEventListener('input', e => {
            morphT = e.target.value / 100;
            document.getElementById('mv').textContent = morphT.toFixed(2);
            manualMorph = true;
        });
        document.getElementById('terms').addEventListener('input', e => {
            numTerms = +e.target.value;
            document.getElementById('tv').textContent = numTerms;
        });
        document.getElementById('aspeed').addEventListener('input', e => {
            autoSpeed = e.target.value / 10;
            if (autoSpeed > 0) manualMorph = false;
        });

        function animate() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const cx = W / 2;
            const cy = H / 2;

            // Auto-morph
            if (!manualMorph && autoSpeed > 0) {
                autoMorphTime += 0.01 * autoSpeed;
                morphT = (Math.sin(autoMorphTime) + 1) / 2;
                document.getElementById('morph').value = Math.round(morphT * 100);
                document.getElementById('mv').textContent = morphT.toFixed(2);
            }

            const count = Math.min(numTerms, fourierA.length, fourierB.length);

            // Draw interpolated epicycles
            let x = 0, y = 0;
            for (let i = 0; i < count; i++) {
                const a = fourierA[i];
                const b = fourierB[i];
                const prevX = x, prevY = y;

                // Interpolate amplitude and phase
                const amp = a.amp * (1 - morphT) + b.amp * morphT;
                const freq = Math.round(a.freq * (1 - morphT) + b.freq * morphT);
                const phaseA = a.phase;
                const phaseB = b.phase;
                // Interpolate angle properly
                let dp = phaseB - phaseA;
                while (dp > Math.PI) dp -= 2 * Math.PI;
                while (dp < -Math.PI) dp += 2 * Math.PI;
                const phase = phaseA + dp * morphT;

                x += amp * Math.cos(freq * time + phase);
                y += amp * Math.sin(freq * time + phase);

                // Draw circle (faint)
                if (i < 20) {
                    ctx.beginPath();
                    ctx.arc(cx + prevX, cy + prevY, amp, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(138, 154, 91, ${Math.max(0.03, 0.15 - i * 0.006)})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(cx + prevX, cy + prevY);
                    ctx.lineTo(cx + x, cy + y);
                    ctx.strokeStyle = `rgba(221, 161, 94, ${Math.max(0.05, 0.3 - i * 0.01)})`;
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            }

            // Draw path by sampling many time values
            ctx.beginPath();
            const pathSteps = 500;
            for (let s = 0; s <= pathSteps; s++) {
                const t2 = (s / pathSteps) * 2 * Math.PI;
                let px = 0, py = 0;
                for (let i = 0; i < count; i++) {
                    const a = fourierA[i], b = fourierB[i];
                    const amp = a.amp * (1 - morphT) + b.amp * morphT;
                    const freq = Math.round(a.freq * (1 - morphT) + b.freq * morphT);
                    let dp = b.phase - a.phase;
                    while (dp > Math.PI) dp -= 2 * Math.PI;
                    while (dp < -Math.PI) dp += 2 * Math.PI;
                    const phase = a.phase + dp * morphT;
                    px += amp * Math.cos(freq * t2 + phase);
                    py += amp * Math.sin(freq * t2 + phase);
                }
                if (s === 0) ctx.moveTo(cx + px, cy + py);
                else ctx.lineTo(cx + px, cy + py);
            }
            ctx.closePath();
            ctx.strokeStyle = 'rgba(254, 250, 224, 0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Current tip with glow
            ctx.shadowColor = '#DDA15E';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(cx + x, cy + y, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Labels
            ctx.fillStyle = 'rgba(138, 154, 91, 0.5)';
            ctx.font = '13px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            const nameA = shapeA.charAt(0).toUpperCase() + shapeA.slice(1);
            const nameB = shapeB.charAt(0).toUpperCase() + shapeB.slice(1);
            ctx.fillText(`${nameA} ----[${(morphT * 100).toFixed(0)}%]----> ${nameB}`, cx, H - 25);

            // Morph bar
            const barW = 200;
            const barX = cx - barW / 2;
            const barY = H - 50;
            ctx.fillStyle = 'rgba(96, 108, 56, 0.3)';
            ctx.fillRect(barX, barY, barW, 6);
            ctx.fillStyle = '#DDA15E';
            ctx.fillRect(barX, barY, barW * morphT, 6);

            const dt = (2 * Math.PI) / N;
            time += dt * 0.8;
            if (time >= 2 * Math.PI) time -= 2 * Math.PI;

            requestAnimationFrame(animate);
        }

        animate();

        window.reset = function() {
            time = 0; morphT = 0.5; autoMorphTime = 0; manualMorph = false;
            shapeA = 'square'; shapeB = 'star'; numTerms = 40; autoSpeed = 1.0;
            document.getElementById('shapeA').value = 'square';
            document.getElementById('shapeB').value = 'star';
            document.getElementById('morph').value = 50;
            document.getElementById('mv').textContent = 'auto';
            document.getElementById('terms').value = 40;
            document.getElementById('tv').textContent = '40';
            document.getElementById('aspeed').value = 10;
            computeShapes();
        };
    })();
    </script>
</body>
</html>
