<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourier Portrait Gallery - Fourier Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .ctrl {
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 10px 14px; border-radius: 10px; color: #FEFAE0; font-size: 0.8rem;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }
        .ctrl label { color: #8A9A5B; }
        .ctrl input[type=range] { width: 130px; accent-color: #DDA15E; }
        .ctrl select {
            background: #2a2a4a; color: #FEFAE0; border: 1px solid rgba(138, 154, 91, 0.3);
            padding: 4px 8px; border-radius: 6px; font-size: 0.82rem; width: 130px;
        }
        #info {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 8px 18px; border-radius: 10px;
            font-size: 0.82rem; z-index: 100;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <div class="ctrl">
            <label>Shape</label><br>
            <select id="shape">
                <option value="star">Star</option>
                <option value="heart">Heart</option>
                <option value="trefoil">Trefoil Knot</option>
                <option value="butterfly">Butterfly</option>
                <option value="infinity">Infinity</option>
                <option value="pi">Pi Symbol</option>
            </select>
        </div>
        <div class="ctrl">
            <label>Epicycles: <span id="nv">80</span></label><br>
            <input type="range" id="numE" min="2" max="250" value="80">
        </div>
        <div class="ctrl">
            <label>Speed: <span id="sv">1.0</span>x</label><br>
            <input type="range" id="spd" min="1" max="30" value="10">
        </div>
    </div>
    <div id="info">Predefined shapes traced by Fourier epicycles</div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        let numEpicycles = 80;
        let speed = 1.0;
        let shapeName = 'star';
        let time = 0;
        let tracePoints = [];
        let fourierCoeffs = [];

        // Shape generators - return array of {re, im} points
        function generateShape(name, N) {
            const points = [];
            const s = Math.min(W, H) * 0.25;
            for (let i = 0; i < N; i++) {
                const t = (i / N) * 2 * Math.PI;
                let x = 0, y = 0;
                switch (name) {
                    case 'star': {
                        const r = s * (0.5 + 0.5 * Math.cos(5 * t));
                        x = r * Math.cos(t);
                        y = r * Math.sin(t);
                        break;
                    }
                    case 'heart': {
                        x = s * 0.7 * 16 * Math.pow(Math.sin(t), 3) / 16;
                        y = -s * 0.7 * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) / 16;
                        break;
                    }
                    case 'trefoil': {
                        const r2 = s * (0.4 + 0.2 * Math.cos(3 * t));
                        x = r2 * Math.cos(t) + s * 0.3 * Math.cos(2 * t);
                        y = r2 * Math.sin(t) - s * 0.3 * Math.sin(2 * t);
                        break;
                    }
                    case 'butterfly': {
                        const r3 = s * 0.4 * (Math.exp(Math.cos(t)) - 2 * Math.cos(4 * t) - Math.pow(Math.sin(t / 12), 5));
                        x = r3 * Math.sin(t);
                        y = -r3 * Math.cos(t);
                        break;
                    }
                    case 'infinity': {
                        const denom = 1 + Math.sin(t) * Math.sin(t);
                        x = s * 0.8 * Math.cos(t) / denom;
                        y = s * 0.8 * Math.sin(t) * Math.cos(t) / denom;
                        break;
                    }
                    case 'pi': {
                        // Approximate pi shape
                        if (t < Math.PI * 0.7) {
                            x = s * 0.5 * (t / Math.PI - 0.35);
                            y = -s * 0.35;
                        } else if (t < Math.PI) {
                            const lt = (t - Math.PI * 0.7) / (Math.PI * 0.3);
                            x = -s * 0.15;
                            y = -s * 0.35 + lt * s * 0.7;
                        } else if (t < Math.PI * 1.4) {
                            const lt = (t - Math.PI) / (Math.PI * 0.4);
                            x = -s * 0.15 + lt * s * 0.3;
                            y = s * 0.35 - lt * s * 0.05;
                        } else if (t < Math.PI * 1.7) {
                            const lt = (t - Math.PI * 1.4) / (Math.PI * 0.3);
                            x = s * 0.15;
                            y = s * 0.3 - lt * s * 0.65;
                        } else {
                            const lt = (t - Math.PI * 1.7) / (Math.PI * 0.3);
                            x = s * 0.15 + lt * s * 0.2;
                            y = -s * 0.35;
                        }
                        break;
                    }
                }
                points.push({ re: x + W / 2, im: y + H / 2 });
            }
            return points;
        }

        function dft(x) {
            const N = x.length;
            const X = [];
            for (let k = 0; k < N; k++) {
                let re = 0, im = 0;
                for (let n = 0; n < N; n++) {
                    const phi = (2 * Math.PI * k * n) / N;
                    re += x[n].re * Math.cos(phi) + x[n].im * Math.sin(phi);
                    im += x[n].im * Math.cos(phi) - x[n].re * Math.sin(phi);
                }
                re /= N;
                im /= N;
                X.push({ re, im, freq: k, amp: Math.sqrt(re * re + im * im), phase: Math.atan2(im, re) });
            }
            return X;
        }

        function computeShape() {
            const N = 256;
            const pts = generateShape(shapeName, N);
            fourierCoeffs = dft(pts);
            fourierCoeffs.sort((a, b) => b.amp - a.amp);
            tracePoints = [];
            time = 0;
        }

        function epicycles(fourier, count) {
            let x = 0, y = 0;
            for (let i = 0; i < Math.min(count, fourier.length); i++) {
                const prevX = x, prevY = y;
                const f = fourier[i];
                const radius = f.amp;
                x += radius * Math.cos(f.freq * time + f.phase);
                y += radius * Math.sin(f.freq * time + f.phase);

                ctx.beginPath();
                ctx.arc(prevX, prevY, radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(138, 154, 91, ${Math.max(0.05, 0.2 - i * 0.002)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(prevX, prevY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = `rgba(221, 161, 94, ${Math.max(0.1, 0.4 - i * 0.003)})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }
            return { x, y };
        }

        // Controls
        document.getElementById('shape').addEventListener('change', e => { shapeName = e.target.value; computeShape(); });
        document.getElementById('numE').addEventListener('input', e => {
            numEpicycles = +e.target.value;
            document.getElementById('nv').textContent = numEpicycles;
            tracePoints = []; time = 0;
        });
        document.getElementById('spd').addEventListener('input', e => {
            speed = e.target.value / 10;
            document.getElementById('sv').textContent = speed.toFixed(1);
        });

        computeShape();

        function animate() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            if (fourierCoeffs.length === 0) {
                requestAnimationFrame(animate);
                return;
            }

            const count = Math.min(numEpicycles, fourierCoeffs.length);
            const v = epicycles(fourierCoeffs, count);

            tracePoints.unshift({ x: v.x, y: v.y });
            if (tracePoints.length > fourierCoeffs.length + 100) tracePoints.pop();

            // Draw trace
            if (tracePoints.length > 1) {
                ctx.beginPath();
                ctx.moveTo(tracePoints[0].x, tracePoints[0].y);
                for (let i = 1; i < tracePoints.length; i++) {
                    ctx.lineTo(tracePoints[i].x, tracePoints[i].y);
                }
                ctx.strokeStyle = '#FEFAE0';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Glow
                ctx.shadowColor = '#DDA15E';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(tracePoints[0].x, tracePoints[0].y, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#DDA15E';
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Shape name
            ctx.fillStyle = 'rgba(138, 154, 91, 0.5)';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`${shapeName.charAt(0).toUpperCase() + shapeName.slice(1)} -- ${count} epicycles`, W / 2, H - 20);

            const dt = (2 * Math.PI) / fourierCoeffs.length;
            time += dt * speed;
            if (time >= 2 * Math.PI) {
                time = 0;
                tracePoints = [];
            }

            requestAnimationFrame(animate);
        }

        animate();

        window.reset = function() {
            time = 0;
            tracePoints = [];
            numEpicycles = 80;
            speed = 1.0;
            shapeName = 'star';
            document.getElementById('shape').value = 'star';
            document.getElementById('numE').value = 80;
            document.getElementById('nv').textContent = '80';
            document.getElementById('spd').value = 10;
            document.getElementById('sv').textContent = '1.0';
            computeShape();
        };
    })();
    </script>
</body>
</html>
