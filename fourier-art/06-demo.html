<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency Spectrum Painter - Fourier Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; cursor: crosshair; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 10px 20px; border-radius: 10px;
            font-size: 0.82rem; z-index: 100; text-align: center;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }
        .label {
            position: fixed; color: #8A9A5B; font-size: 0.75rem; z-index: 50;
            background: rgba(30, 30, 50, 0.7); padding: 3px 8px; border-radius: 4px;
        }
        #freqLabel { top: 45%; left: 15px; }
        #timeLabel { top: 5px; left: 50%; transform: translateX(-50%); }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
        }
        .btn {
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            color: #DDA15E; border: 1px solid rgba(221, 161, 94, 0.3);
            padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 0.82rem;
        }
        .btn:hover { background: rgba(221, 161, 94, 0.15); }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="label" id="freqLabel">Frequency Domain (draw here)</div>
    <div class="label" id="timeLabel">Time Domain (synthesized signal)</div>
    <div id="controls">
        <button class="btn" id="clearBtn">Clear Spectrum</button>
        <button class="btn" id="presetSine">Preset: Sine</button>
        <button class="btn" id="presetChord">Preset: Chord</button>
        <button class="btn" id="presetNoise">Preset: Noise</button>
    </div>
    <div id="info">Draw in the frequency domain (bottom) to compose a signal in the time domain (top)</div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        const NUM_BINS = 64;
        const spectrum = new Float32Array(NUM_BINS);
        const phases = new Float32Array(NUM_BINS);
        let painting = false;
        let animTime = 0;

        // Initialize random phases
        for (let i = 0; i < NUM_BINS; i++) phases[i] = Math.random() * 2 * Math.PI;

        const freqAreaTop = () => H * 0.55;
        const freqAreaBottom = () => H - 60;
        const timeAreaTop = () => 40;
        const timeAreaBottom = () => H * 0.45;
        const margin = 40;

        function getBin(x) {
            const binW = (W - 2 * margin) / NUM_BINS;
            return Math.floor((x - margin) / binW);
        }
        function getAmp(y) {
            const top = freqAreaTop();
            const bot = freqAreaBottom();
            return Math.max(0, Math.min(1, 1 - (y - top) / (bot - top)));
        }

        canvas.addEventListener('mousedown', (e) => { painting = true; paint(e); });
        canvas.addEventListener('mousemove', (e) => { if (painting) paint(e); });
        canvas.addEventListener('mouseup', () => painting = false);
        canvas.addEventListener('mouseleave', () => painting = false);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); painting = true; paintTouch(e); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (painting) paintTouch(e); }, { passive: false });
        canvas.addEventListener('touchend', () => painting = false);

        function paint(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const bin = getBin(x);
            if (bin >= 0 && bin < NUM_BINS && y >= freqAreaTop() && y <= freqAreaBottom()) {
                spectrum[bin] = getAmp(y);
            }
        }
        function paintTouch(e) {
            const rect = canvas.getBoundingClientRect();
            const t = e.touches[0];
            paint({ clientX: t.clientX, clientY: t.clientY });
        }

        // Synthesize time-domain signal from spectrum
        function synthesize(t, offset) {
            let sum = 0;
            for (let i = 0; i < NUM_BINS; i++) {
                if (spectrum[i] > 0.01) {
                    const freq = (i + 1) * 0.5;
                    sum += spectrum[i] * Math.sin(freq * (t + offset) + phases[i]);
                }
            }
            return sum;
        }

        // Presets
        document.getElementById('clearBtn').addEventListener('click', () => spectrum.fill(0));
        document.getElementById('presetSine').addEventListener('click', () => {
            spectrum.fill(0);
            spectrum[2] = 1.0;
        });
        document.getElementById('presetChord').addEventListener('click', () => {
            spectrum.fill(0);
            spectrum[3] = 0.8;
            spectrum[5] = 0.6;
            spectrum[7] = 0.4;
        });
        document.getElementById('presetNoise').addEventListener('click', () => {
            for (let i = 0; i < NUM_BINS; i++) {
                spectrum[i] = Math.random() * 0.6;
            }
        });

        function animate() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const binW = (W - 2 * margin) / NUM_BINS;

            // Divider
            ctx.beginPath();
            ctx.moveTo(0, H * 0.5);
            ctx.lineTo(W, H * 0.5);
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.15)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Draw frequency spectrum bars
            const fTop = freqAreaTop();
            const fBot = freqAreaBottom();
            const fH = fBot - fTop;

            for (let i = 0; i < NUM_BINS; i++) {
                const x = margin + i * binW;
                const barH = spectrum[i] * fH;
                const hue = 30 + (i / NUM_BINS) * 60;

                // Bar
                if (barH > 1) {
                    const grad = ctx.createLinearGradient(x, fBot, x, fBot - barH);
                    grad.addColorStop(0, `hsla(${hue}, 60%, 45%, 0.8)`);
                    grad.addColorStop(1, `hsla(${hue}, 70%, 65%, 0.9)`);
                    ctx.fillStyle = grad;
                    ctx.fillRect(x + 1, fBot - barH, binW - 2, barH);
                }

                // Grid line
                ctx.beginPath();
                ctx.moveTo(x, fTop);
                ctx.lineTo(x, fBot);
                ctx.strokeStyle = 'rgba(138, 154, 91, 0.05)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }

            // Baseline
            ctx.beginPath();
            ctx.moveTo(margin, fBot);
            ctx.lineTo(W - margin, fBot);
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Frequency labels
            ctx.fillStyle = 'rgba(138, 154, 91, 0.4)';
            ctx.font = '10px monospace';
            ctx.textAlign = 'center';
            for (let i = 0; i < NUM_BINS; i += 8) {
                ctx.fillText(`${i + 1}`, margin + i * binW + binW / 2, fBot + 14);
            }

            // Time domain signal
            const tTop = timeAreaTop();
            const tBot = timeAreaBottom();
            const tMid = (tTop + tBot) / 2;
            const tH = (tBot - tTop) * 0.4;

            // Center line
            ctx.beginPath();
            ctx.moveTo(margin, tMid);
            ctx.lineTo(W - margin, tMid);
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.15)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Synthesized waveform
            const numSamples = W - 2 * margin;
            let maxAmp = 0;
            const samples = [];
            for (let i = 0; i < numSamples; i++) {
                const t = (i / numSamples) * 20 * Math.PI;
                const val = synthesize(t, animTime);
                samples.push(val);
                if (Math.abs(val) > maxAmp) maxAmp = Math.abs(val);
            }

            if (maxAmp > 0.01) {
                ctx.beginPath();
                for (let i = 0; i < samples.length; i++) {
                    const x = margin + i;
                    const y = tMid - (samples[i] / maxAmp) * tH;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.strokeStyle = '#FEFAE0';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Glow effect
                ctx.shadowColor = '#DDA15E';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                for (let i = 0; i < samples.length; i++) {
                    const x = margin + i;
                    const y = tMid - (samples[i] / maxAmp) * tH;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.strokeStyle = 'rgba(221, 161, 94, 0.3)';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Labels
            ctx.fillStyle = 'rgba(221, 161, 94, 0.5)';
            ctx.font = '11px "Segoe UI", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('Time Domain (synthesized)', margin, tTop + 15);
            ctx.fillText('Frequency Domain (draw amplitudes)', margin, fTop + 15);

            animTime += 0.05;
            requestAnimationFrame(animate);
        }

        animate();

        window.reset = function() {
            spectrum.fill(0);
            animTime = 0;
        };
    })();
    </script>
</body>
</html>
