<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic Circle Interference - Fourier Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
        }
        .ctrl {
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 8px 12px; border-radius: 10px; color: #FEFAE0; font-size: 0.78rem;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }
        .ctrl label { color: #8A9A5B; }
        .ctrl input[type=range] { width: 120px; accent-color: #DDA15E; }
        .btn {
            background: rgba(96, 108, 56, 0.3); color: #DDA15E;
            border: 1px solid rgba(221, 161, 94, 0.3); padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-size: 0.78rem;
        }
        .btn:hover { background: rgba(96, 108, 56, 0.5); }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <div class="ctrl">
            <label>Circles: <span id="nv">6</span></label><br>
            <input type="range" id="num" min="2" max="16" value="6">
        </div>
        <div class="ctrl">
            <label>Freq Ratio: <span id="fv">1.5</span></label><br>
            <input type="range" id="freq" min="10" max="50" value="15">
        </div>
        <div class="ctrl">
            <label>Speed: <span id="sv">1.0</span>x</label><br>
            <input type="range" id="spd" min="1" max="30" value="10">
        </div>
        <div class="ctrl">
            <label>Trail Fade: <span id="tv">0.05</span></label><br>
            <input type="range" id="fade" min="1" max="50" value="5">
        </div>
        <button class="btn" id="clearBtn">Clear</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let numCircles = 6;
        let freqRatio = 1.5;
        let speed = 1.0;
        let fadeFactor = 0.05;
        let time = 0;

        document.getElementById('num').addEventListener('input', e => {
            numCircles = +e.target.value;
            document.getElementById('nv').textContent = numCircles;
        });
        document.getElementById('freq').addEventListener('input', e => {
            freqRatio = e.target.value / 10;
            document.getElementById('fv').textContent = freqRatio.toFixed(1);
        });
        document.getElementById('spd').addEventListener('input', e => {
            speed = e.target.value / 10;
            document.getElementById('sv').textContent = speed.toFixed(1);
        });
        document.getElementById('fade').addEventListener('input', e => {
            fadeFactor = e.target.value / 100;
            document.getElementById('tv').textContent = fadeFactor.toFixed(2);
        });
        document.getElementById('clearBtn').addEventListener('click', () => {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);
        });

        function animate() {
            // Fade
            ctx.fillStyle = `rgba(26, 26, 46, ${fadeFactor})`;
            ctx.fillRect(0, 0, W, H);

            const cx = W / 2;
            const cy = H / 2;
            const maxR = Math.min(W, H) * 0.35;

            // Each circle orbits at a different harmonic frequency
            const points = [];
            for (let i = 0; i < numCircles; i++) {
                const angle = time * (1 + i * freqRatio);
                const r = maxR * (0.3 + 0.7 * (i / numCircles));
                const x = cx + r * Math.cos(angle);
                const y = cy + r * Math.sin(angle);
                points.push({ x, y, i });

                // Draw orbit circle (very faint)
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(138, 154, 91, ${0.02 + 0.01 * (numCircles - i)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();

                // Draw point
                const hue = 30 + (i / numCircles) * 60;
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 65%, 60%, 0.8)`;
                ctx.fill();
            }

            // Draw interference lines between all pairs
            for (let i = 0; i < points.length; i++) {
                for (let j = i + 1; j < points.length; j++) {
                    const a = points[i];
                    const b = points[j];
                    const dist = Math.hypot(a.x - b.x, a.y - b.y);
                    const maxDist = maxR * 2;
                    const alpha = Math.max(0, 0.3 * (1 - dist / maxDist));

                    if (alpha > 0.01) {
                        const hue = ((a.i + b.i) / (2 * numCircles)) * 60 + 30;
                        ctx.beginPath();
                        ctx.moveTo(a.x, a.y);
                        ctx.lineTo(b.x, b.y);
                        ctx.strokeStyle = `hsla(${hue}, 55%, 60%, ${alpha})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();

                        // Midpoint glow for close pairs
                        if (dist < maxDist * 0.2) {
                            const mx = (a.x + b.x) / 2;
                            const my = (a.y + b.y) / 2;
                            ctx.beginPath();
                            ctx.arc(mx, my, 2, 0, Math.PI * 2);
                            ctx.fillStyle = `hsla(${hue}, 70%, 70%, ${alpha * 0.8})`;
                            ctx.fill();
                        }
                    }
                }
            }

            // Sum point: average of all positions
            let sumX = 0, sumY = 0;
            for (const p of points) { sumX += p.x; sumY += p.y; }
            sumX /= points.length;
            sumY /= points.length;

            // Draw sum point with glow
            ctx.shadowColor = '#DDA15E';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(sumX, sumY, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Lines from sum to each point
            for (const p of points) {
                ctx.beginPath();
                ctx.moveTo(sumX, sumY);
                ctx.lineTo(p.x, p.y);
                ctx.strokeStyle = 'rgba(254, 250, 224, 0.05)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }

            time += 0.015 * speed;
            requestAnimationFrame(animate);
        }

        animate();

        window.reset = function() {
            numCircles = 6; freqRatio = 1.5; speed = 1.0; fadeFactor = 0.05; time = 0;
            document.getElementById('num').value = 6;
            document.getElementById('freq').value = 15;
            document.getElementById('spd').value = 10;
            document.getElementById('fade').value = 5;
            document.getElementById('nv').textContent = '6';
            document.getElementById('fv').textContent = '1.5';
            document.getElementById('sv').textContent = '1.0';
            document.getElementById('tv').textContent = '0.05';
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);
        };
    })();
    </script>
</body>
</html>
