<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirograph Epicycles - Fourier Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .ctrl {
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 10px 14px; border-radius: 10px; color: #FEFAE0; font-size: 0.8rem;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }
        .ctrl label { color: #8A9A5B; }
        .ctrl input[type=range] { width: 130px; accent-color: #DDA15E; }
        .btn {
            background: rgba(96, 108, 56, 0.3); color: #DDA15E;
            border: 1px solid rgba(221, 161, 94, 0.3); padding: 7px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.82rem;
        }
        .btn:hover { background: rgba(96, 108, 56, 0.5); }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <div class="ctrl">
            <label>R1 (outer): <span id="r1v">5</span></label><br>
            <input type="range" id="r1" min="1" max="12" value="5">
        </div>
        <div class="ctrl">
            <label>R2 (inner): <span id="r2v">3</span></label><br>
            <input type="range" id="r2" min="1" max="12" value="3">
        </div>
        <div class="ctrl">
            <label>R3 (pen): <span id="r3v">2</span></label><br>
            <input type="range" id="r3" min="1" max="8" value="2">
        </div>
        <div class="ctrl">
            <label>Speed: <span id="sv">1.0</span>x</label><br>
            <input type="range" id="spd" min="1" max="30" value="10">
        </div>
        <div class="ctrl">
            <label>Trail Length: <span id="tv">2000</span></label><br>
            <input type="range" id="trail" min="200" max="8000" value="2000">
        </div>
        <button class="btn" id="randBtn">Randomize</button>
        <button class="btn" id="clearBtn">Clear</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        let r1 = 5, r2 = 3, r3 = 2;
        let speed = 1.0;
        let maxTrail = 2000;
        let time = 0;
        let trail = [];
        let showCircles = true;

        const scale = () => Math.min(W, H) * 0.04;

        // Controls
        const bind = (id, cb) => document.getElementById(id).addEventListener('input', cb);
        bind('r1', e => { r1 = +e.target.value; document.getElementById('r1v').textContent = r1; trail = []; time = 0; });
        bind('r2', e => { r2 = +e.target.value; document.getElementById('r2v').textContent = r2; trail = []; time = 0; });
        bind('r3', e => { r3 = +e.target.value; document.getElementById('r3v').textContent = r3; trail = []; time = 0; });
        bind('spd', e => { speed = e.target.value / 10; document.getElementById('sv').textContent = speed.toFixed(1); });
        bind('trail', e => { maxTrail = +e.target.value; document.getElementById('tv').textContent = maxTrail; });

        document.getElementById('randBtn').addEventListener('click', () => {
            r1 = Math.floor(Math.random() * 10) + 2;
            r2 = Math.floor(Math.random() * 8) + 1;
            r3 = Math.floor(Math.random() * 6) + 1;
            document.getElementById('r1').value = r1;
            document.getElementById('r2').value = r2;
            document.getElementById('r3').value = r3;
            document.getElementById('r1v').textContent = r1;
            document.getElementById('r2v').textContent = r2;
            document.getElementById('r3v').textContent = r3;
            trail = []; time = 0;
        });
        document.getElementById('clearBtn').addEventListener('click', () => { trail = []; time = 0; });

        function spirographPoint(t) {
            const s = scale();
            const R = r1 * s;
            const rr = r2 * s;
            const d = r3 * s;
            const x = (R - rr) * Math.cos(t) + d * Math.cos(((R - rr) / rr) * t);
            const y = (R - rr) * Math.sin(t) - d * Math.sin(((R - rr) / rr) * t);
            return { x: x + W / 2, y: y + H / 2 };
        }

        function animate() {
            ctx.fillStyle = 'rgba(26, 26, 46, 0.08)';
            ctx.fillRect(0, 0, W, H);

            const s = scale();
            const cx = W / 2;
            const cy = H / 2;
            const R = r1 * s;
            const rr = r2 * s;

            // Draw outer circle
            ctx.beginPath();
            ctx.arc(cx, cy, R, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Inner circle position
            const innerCx = cx + (R - rr) * Math.cos(time);
            const innerCy = cy + (R - rr) * Math.sin(time);

            ctx.beginPath();
            ctx.arc(innerCx, innerCy, rr, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(221, 161, 94, 0.25)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Pen point
            const pt = spirographPoint(time);
            trail.push(pt);
            if (trail.length > maxTrail) trail.shift();

            // Line from inner center to pen
            ctx.beginPath();
            ctx.moveTo(innerCx, innerCy);
            ctx.lineTo(pt.x, pt.y);
            ctx.strokeStyle = 'rgba(254, 250, 224, 0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Draw trail with gradient
            if (trail.length > 1) {
                for (let i = 1; i < trail.length; i++) {
                    const t = i / trail.length;
                    const hue = (t * 60 + 30) % 360; // golden to green range
                    const alpha = 0.1 + t * 0.8;
                    ctx.beginPath();
                    ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
                    ctx.lineTo(trail[i].x, trail[i].y);
                    ctx.strokeStyle = `hsla(${hue}, 60%, 60%, ${alpha})`;
                    ctx.lineWidth = 1.5 + t;
                    ctx.stroke();
                }
            }

            // Pen dot
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();

            // Center dot
            ctx.beginPath();
            ctx.arc(cx, cy, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#8A9A5B';
            ctx.fill();

            // Inner center dot
            ctx.beginPath();
            ctx.arc(innerCx, innerCy, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#FEFAE0';
            ctx.fill();

            // Info text
            ctx.fillStyle = 'rgba(138, 154, 91, 0.5)';
            ctx.font = '12px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`Spirograph: R=${r1}, r=${r2}, d=${r3}`, 15, H - 15);

            time += 0.02 * speed;
            requestAnimationFrame(animate);
        }

        animate();

        window.reset = function() {
            r1 = 5; r2 = 3; r3 = 2; speed = 1.0; maxTrail = 2000;
            trail = []; time = 0;
            document.getElementById('r1').value = 5;
            document.getElementById('r2').value = 3;
            document.getElementById('r3').value = 2;
            document.getElementById('spd').value = 10;
            document.getElementById('trail').value = 2000;
            document.getElementById('r1v').textContent = '5';
            document.getElementById('r2v').textContent = '3';
            document.getElementById('r3v').textContent = '2';
            document.getElementById('sv').textContent = '1.0';
            document.getElementById('tv').textContent = '2000';
            ctx.clearRect(0, 0, W, H);
        };
    })();
    </script>
</body>
</html>
