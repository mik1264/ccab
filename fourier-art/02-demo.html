<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourier Square Wave Builder - Fourier Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .ctrl {
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 10px 16px; border-radius: 10px; color: #FEFAE0; font-size: 0.82rem;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }
        .ctrl label { display: block; margin-bottom: 4px; color: #8A9A5B; }
        .ctrl input[type=range] { width: 140px; accent-color: #DDA15E; }
        .ctrl select {
            background: #2a2a4a; color: #FEFAE0; border: 1px solid rgba(138, 154, 91, 0.3);
            padding: 4px 8px; border-radius: 6px; font-size: 0.82rem;
        }
        #info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 10px 20px; border-radius: 10px;
            font-size: 0.85rem; text-align: center; z-index: 100;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <div class="ctrl">
            <label>Waveform</label>
            <select id="waveType">
                <option value="square">Square Wave</option>
                <option value="sawtooth">Sawtooth Wave</option>
                <option value="triangle">Triangle Wave</option>
            </select>
        </div>
        <div class="ctrl">
            <label>Harmonics: <span id="harmVal">5</span></label>
            <input type="range" id="harmonics" min="1" max="50" value="5">
        </div>
        <div class="ctrl">
            <label>Speed: <span id="speedVal">1.0</span>x</label>
            <input type="range" id="speed" min="1" max="30" value="10">
        </div>
    </div>
    <div id="info">Watch spinning circles add up to create waveforms -- adjust harmonics to see convergence</div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let numHarmonics = 5;
        let waveType = 'square';
        let speed = 1.0;
        let time = 0;
        let wave = [];
        const maxWavePoints = 600;

        document.getElementById('harmonics').addEventListener('input', (e) => {
            numHarmonics = parseInt(e.target.value);
            document.getElementById('harmVal').textContent = numHarmonics;
            wave = [];
        });
        document.getElementById('speed').addEventListener('input', (e) => {
            speed = e.target.value / 10;
            document.getElementById('speedVal').textContent = speed.toFixed(1);
        });
        document.getElementById('waveType').addEventListener('change', (e) => {
            waveType = e.target.value;
            wave = [];
        });

        function getHarmonics(type, n) {
            const harmonics = [];
            for (let i = 0; i < n; i++) {
                if (type === 'square') {
                    const k = 2 * i + 1; // odd harmonics
                    harmonics.push({ freq: k, amp: 4 / (Math.PI * k) });
                } else if (type === 'sawtooth') {
                    const k = i + 1;
                    harmonics.push({ freq: k, amp: 2 * Math.pow(-1, k + 1) / (Math.PI * k) });
                } else if (type === 'triangle') {
                    const k = 2 * i + 1;
                    harmonics.push({ freq: k, amp: 8 * Math.pow(-1, i) / (Math.PI * Math.PI * k * k) });
                }
            }
            return harmonics;
        }

        function animate() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const harmonics = getHarmonics(waveType, numHarmonics);
            const cx = W * 0.25;
            const cy = H * 0.5;
            const scale = Math.min(W, H) * 0.18;

            let x = cx;
            let y = cy;

            // Draw each circle
            for (let i = 0; i < harmonics.length; i++) {
                const prevX = x;
                const prevY = y;
                const h = harmonics[i];
                const radius = Math.abs(h.amp) * scale;
                const angle = h.freq * time;

                x += radius * Math.cos(angle);
                y += radius * Math.sin(angle) * (h.amp < 0 ? -1 : 1);

                // Circle
                ctx.beginPath();
                ctx.arc(prevX, prevY, radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${80 + i * 15}, 50%, 60%, ${0.15 + 0.05 * Math.min(i, 5)})`;
                ctx.lineWidth = 1;
                ctx.stroke();

                // Radius
                ctx.beginPath();
                ctx.moveTo(prevX, prevY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = `hsla(${40 + i * 12}, 70%, 65%, 0.6)`;
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Small dot at center
                ctx.beginPath();
                ctx.arc(prevX, prevY, 2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(138, 154, 91, 0.5)';
                ctx.fill();
            }

            // Tip dot
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();

            // Add to wave
            wave.unshift(y);
            if (wave.length > maxWavePoints) wave.pop();

            // Draw connecting line from tip to wave
            const waveStartX = W * 0.4;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(waveStartX, wave[0]);
            ctx.strokeStyle = 'rgba(221, 161, 94, 0.4)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw wave
            if (wave.length > 1) {
                ctx.beginPath();
                const dx = (W - waveStartX - 20) / maxWavePoints;
                ctx.moveTo(waveStartX, wave[0]);
                for (let i = 1; i < wave.length; i++) {
                    ctx.lineTo(waveStartX + i * dx, wave[i]);
                }
                ctx.strokeStyle = '#FEFAE0';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Target waveform (faint)
                ctx.beginPath();
                for (let i = 0; i < wave.length; i++) {
                    const t = time - i * (2 * Math.PI / maxWavePoints) * speed;
                    let target = 0;
                    // Ideal wave
                    if (waveType === 'square') {
                        target = Math.sign(Math.sin(t)) * scale * (4 / Math.PI);
                    } else if (waveType === 'sawtooth') {
                        target = ((t / Math.PI + 1) % 2 - 1) * scale * (-2 / Math.PI) * Math.PI;
                    } else if (waveType === 'triangle') {
                        target = (2 * Math.abs(2 * ((t / (2 * Math.PI)) - Math.floor(t / (2 * Math.PI) + 0.5))) - 1) * scale * (8 / (Math.PI * Math.PI));
                    }
                    const py = cy + target;
                    if (i === 0) ctx.moveTo(waveStartX + i * dx, py);
                    else ctx.lineTo(waveStartX + i * dx, py);
                }
                ctx.strokeStyle = 'rgba(138, 154, 91, 0.25)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Label
            ctx.fillStyle = '#8A9A5B';
            ctx.font = '14px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`${waveType.charAt(0).toUpperCase() + waveType.slice(1)} Wave = ${numHarmonics} harmonic${numHarmonics > 1 ? 's' : ''}`, cx, H - 30);

            // Formula
            let formula = '';
            if (waveType === 'square') formula = 'f(t) = (4/pi) * sum[ sin((2k-1)t) / (2k-1) ]';
            else if (waveType === 'sawtooth') formula = 'f(t) = (2/pi) * sum[ (-1)^(k+1) * sin(kt) / k ]';
            else if (waveType === 'triangle') formula = 'f(t) = (8/pi^2) * sum[ (-1)^k * sin((2k+1)t) / (2k+1)^2 ]';
            ctx.fillStyle = 'rgba(254, 250, 224, 0.4)';
            ctx.font = '12px monospace';
            ctx.fillText(formula, W * 0.65, H - 15);

            time += 0.02 * speed;
            requestAnimationFrame(animate);
        }

        animate();

        window.reset = function() {
            time = 0;
            wave = [];
            numHarmonics = 5;
            waveType = 'square';
            speed = 1.0;
            document.getElementById('harmonics').value = 5;
            document.getElementById('harmVal').textContent = '5';
            document.getElementById('speed').value = 10;
            document.getElementById('speedVal').textContent = '1.0';
            document.getElementById('waveType').value = 'square';
        };
    })();
    </script>
</body>
</html>
