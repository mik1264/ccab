<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourier Series Explorer - Fourier Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #panel {
            position: fixed; right: 10px; top: 10px; width: 220px; z-index: 100;
            background: rgba(30, 30, 50, 0.9); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 14px; color: #FEFAE0;
            border: 1px solid rgba(138, 154, 91, 0.25);
            max-height: 90vh; overflow-y: auto;
        }
        #panel h3 { color: #DDA15E; font-size: 0.95rem; margin-bottom: 10px; }
        .coeff-row {
            display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
            font-size: 0.78rem;
        }
        .coeff-row label { width: 30px; color: #8A9A5B; flex-shrink: 0; }
        .coeff-row input { flex: 1; accent-color: #DDA15E; }
        .coeff-row .val { width: 35px; text-align: right; color: #FEFAE0; font-family: monospace; }
        .btn-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .btn {
            background: rgba(96, 108, 56, 0.3); color: #8A9A5B;
            border: 1px solid rgba(138, 154, 91, 0.3); padding: 5px 10px;
            border-radius: 6px; cursor: pointer; font-size: 0.75rem;
        }
        .btn:hover { background: rgba(96, 108, 56, 0.5); }
        #info {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 8px 18px; border-radius: 10px;
            font-size: 0.82rem; z-index: 100;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="panel">
        <h3>Fourier Coefficients</h3>
        <div id="sliders"></div>
        <div class="btn-row">
            <button class="btn" onclick="presetSquare()">Square</button>
            <button class="btn" onclick="presetSaw()">Sawtooth</button>
            <button class="btn" onclick="presetTri()">Triangle</button>
            <button class="btn" onclick="presetRandom()">Random</button>
            <button class="btn" onclick="resetAll()">Reset</button>
        </div>
    </div>
    <div id="info">Drag sliders to mix sine harmonics and sculpt waveforms</div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        const NUM_HARMONICS = 12;
        const coeffs = new Array(NUM_HARMONICS).fill(0);
        let time = 0;
        const waveHistory = [];
        const maxHistory = 500;

        // Build sliders
        const slidersDiv = document.getElementById('sliders');
        const sliderEls = [];
        const valEls = [];
        for (let i = 0; i < NUM_HARMONICS; i++) {
            const row = document.createElement('div');
            row.className = 'coeff-row';
            const label = document.createElement('label');
            label.textContent = `n=${i + 1}`;
            const input = document.createElement('input');
            input.type = 'range';
            input.min = '-100';
            input.max = '100';
            input.value = '0';
            const val = document.createElement('span');
            val.className = 'val';
            val.textContent = '0.00';
            input.addEventListener('input', () => {
                coeffs[i] = input.value / 100;
                val.textContent = coeffs[i].toFixed(2);
            });
            row.appendChild(label);
            row.appendChild(input);
            row.appendChild(val);
            slidersDiv.appendChild(row);
            sliderEls.push(input);
            valEls.push(val);
        }

        function setCoeffs(arr) {
            for (let i = 0; i < NUM_HARMONICS; i++) {
                coeffs[i] = arr[i] || 0;
                sliderEls[i].value = Math.round(coeffs[i] * 100);
                valEls[i].textContent = coeffs[i].toFixed(2);
            }
            waveHistory.length = 0;
        }

        window.presetSquare = function() {
            const arr = [];
            for (let i = 0; i < NUM_HARMONICS; i++) {
                const k = i + 1;
                arr[i] = k % 2 === 1 ? 1 / k : 0;
            }
            setCoeffs(arr);
        };
        window.presetSaw = function() {
            const arr = [];
            for (let i = 0; i < NUM_HARMONICS; i++) {
                arr[i] = Math.pow(-1, i) / (i + 1);
            }
            setCoeffs(arr);
        };
        window.presetTri = function() {
            const arr = [];
            for (let i = 0; i < NUM_HARMONICS; i++) {
                const k = i + 1;
                arr[i] = k % 2 === 1 ? Math.pow(-1, (k - 1) / 2) / (k * k) : 0;
            }
            setCoeffs(arr);
        };
        window.presetRandom = function() {
            const arr = [];
            for (let i = 0; i < NUM_HARMONICS; i++) {
                arr[i] = (Math.random() * 2 - 1) / (i + 1);
            }
            setCoeffs(arr);
        };
        window.resetAll = function() {
            setCoeffs(new Array(NUM_HARMONICS).fill(0));
        };

        function evaluate(t) {
            let sum = 0;
            for (let i = 0; i < NUM_HARMONICS; i++) {
                sum += coeffs[i] * Math.sin((i + 1) * t);
            }
            return sum;
        }

        function animate() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            const panelW = 240;
            const usableW = W - panelW;
            const cx = usableW * 0.15;
            const cy = H * 0.5;
            const scale = Math.min(usableW, H) * 0.15;
            const waveStartX = usableW * 0.35;

            // Draw individual sinusoids (stacked on left)
            const sinH = H / (NUM_HARMONICS + 2);
            for (let i = 0; i < NUM_HARMONICS; i++) {
                if (Math.abs(coeffs[i]) < 0.01) continue;
                const baseY = 40 + sinH * (i + 0.5);
                const amp = coeffs[i] * sinH * 0.35;

                ctx.beginPath();
                for (let px = 0; px < usableW * 0.28; px++) {
                    const t = (px / (usableW * 0.28)) * 4 * Math.PI + time;
                    const y = baseY + amp * Math.sin((i + 1) * t);
                    if (px === 0) ctx.moveTo(px + 10, y);
                    else ctx.lineTo(px + 10, y);
                }
                ctx.strokeStyle = `hsla(${70 + i * 20}, 55%, 55%, 0.5)`;
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.fillStyle = `hsla(${70 + i * 20}, 55%, 55%, 0.6)`;
                ctx.font = '10px monospace';
                ctx.fillText(`n=${i + 1}`, 12, baseY - sinH * 0.3);
            }

            // Composite wave
            const val = evaluate(time);
            waveHistory.unshift(val);
            if (waveHistory.length > maxHistory) waveHistory.pop();

            // Draw composite
            if (waveHistory.length > 1) {
                ctx.beginPath();
                const dx = (usableW - waveStartX - 20) / maxHistory;
                for (let i = 0; i < waveHistory.length; i++) {
                    const x = waveStartX + i * dx;
                    const y = cy + waveHistory[i] * scale;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.strokeStyle = '#FEFAE0';
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }

            // Center line
            ctx.beginPath();
            ctx.moveTo(waveStartX, cy);
            ctx.lineTo(usableW - 10, cy);
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.15)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Dot on wave
            ctx.beginPath();
            ctx.arc(waveStartX, cy + val * scale, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Spectrum bars at bottom
            const barW = 20;
            const barSpacing = 8;
            const barBaseY = H - 40;
            const barMaxH = 60;
            const barsStartX = waveStartX;

            ctx.fillStyle = 'rgba(138, 154, 91, 0.3)';
            ctx.font = '10px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('Frequency Spectrum', barsStartX + (NUM_HARMONICS * (barW + barSpacing)) / 2, barBaseY + 25);

            for (let i = 0; i < NUM_HARMONICS; i++) {
                const x = barsStartX + i * (barW + barSpacing);
                const h = Math.abs(coeffs[i]) * barMaxH;
                const hue = 70 + i * 20;

                ctx.fillStyle = `hsla(${hue}, 55%, 50%, 0.7)`;
                ctx.fillRect(x, barBaseY - h, barW, h);
                ctx.strokeStyle = `hsla(${hue}, 55%, 65%, 0.4)`;
                ctx.strokeRect(x, barBaseY - h, barW, h);

                ctx.fillStyle = 'rgba(254, 250, 224, 0.5)';
                ctx.fillText(i + 1, x + barW / 2, barBaseY + 12);
            }

            time += 0.03;
            requestAnimationFrame(animate);
        }

        // Start with square wave preset
        presetSquare();
        animate();

        window.reset = function() {
            time = 0;
            waveHistory.length = 0;
            resetAll();
        };
    })();
    </script>
</body>
</html>
