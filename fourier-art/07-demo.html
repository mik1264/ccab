<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gibbs Phenomenon - Fourier Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        }
        .ctrl {
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 10px 14px; border-radius: 10px; color: #FEFAE0; font-size: 0.8rem;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }
        .ctrl label { color: #8A9A5B; }
        .ctrl input[type=range] { width: 160px; accent-color: #DDA15E; }
        .ctrl select {
            background: #2a2a4a; color: #FEFAE0; border: 1px solid rgba(138, 154, 91, 0.3);
            padding: 4px 8px; border-radius: 6px; font-size: 0.82rem;
        }
        .btn {
            background: rgba(96, 108, 56, 0.3); color: #DDA15E;
            border: 1px solid rgba(221, 161, 94, 0.3); padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-size: 0.78rem; margin-top: 4px;
        }
        .btn:hover { background: rgba(96, 108, 56, 0.5); }
        #info {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            color: #FEFAE0; padding: 10px 20px; border-radius: 10px;
            font-size: 0.82rem; z-index: 100; text-align: center; max-width: 600px;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <div class="ctrl">
            <label>Waveform</label><br>
            <select id="wave">
                <option value="square">Square Wave</option>
                <option value="sawtooth">Sawtooth Wave</option>
                <option value="rect_pulse">Rectangular Pulse</option>
            </select>
        </div>
        <div class="ctrl">
            <label>Terms: <span id="nv">10</span></label><br>
            <input type="range" id="terms" min="1" max="200" value="10">
            <br>
            <button class="btn" id="animBtn">Animate Growth</button>
        </div>
        <div class="ctrl">
            <label>Zoom at discontinuity</label><br>
            <input type="range" id="zoom" min="1" max="20" value="1">
            <span id="zv">1x</span>
        </div>
    </div>
    <div id="info">
        The Gibbs phenomenon: Fourier series overshoot ~9% at discontinuities, no matter how many terms you add
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        let numTerms = 10;
        let waveType = 'square';
        let zoomLevel = 1;
        let animating = false;
        let animTerms = 1;

        document.getElementById('terms').addEventListener('input', e => {
            numTerms = +e.target.value;
            document.getElementById('nv').textContent = numTerms;
            animating = false;
        });
        document.getElementById('wave').addEventListener('change', e => {
            waveType = e.target.value;
            animating = false;
        });
        document.getElementById('zoom').addEventListener('input', e => {
            zoomLevel = +e.target.value;
            document.getElementById('zv').textContent = zoomLevel + 'x';
        });
        document.getElementById('animBtn').addEventListener('click', () => {
            animating = true;
            animTerms = 1;
        });

        function targetWave(t, type) {
            const tp = ((t % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
            switch (type) {
                case 'square': return tp < Math.PI ? 1 : -1;
                case 'sawtooth': return 1 - tp / Math.PI;
                case 'rect_pulse': return (tp < Math.PI * 0.5 || tp > Math.PI * 1.5) ? 1 : -1;
            }
            return 0;
        }

        function fourierSum(t, type, n) {
            let sum = 0;
            for (let k = 1; k <= n; k++) {
                if (type === 'square') {
                    if (k % 2 === 1) sum += (4 / (Math.PI * k)) * Math.sin(k * t);
                } else if (type === 'sawtooth') {
                    sum += (2 * Math.pow(-1, k + 1) / (Math.PI * k)) * Math.sin(k * t);
                } else if (type === 'rect_pulse') {
                    sum += (2 / (Math.PI * k)) * Math.sin(k * Math.PI / 2) * Math.cos(k * t) * 2;
                }
            }
            return sum;
        }

        let frameCount = 0;

        function animate() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            if (animating) {
                frameCount++;
                if (frameCount % 8 === 0) {
                    animTerms++;
                    if (animTerms > numTerms) {
                        animating = false;
                        animTerms = numTerms;
                    }
                    document.getElementById('terms').value = animTerms;
                    document.getElementById('nv').textContent = animTerms;
                }
            }

            const currentTerms = animating ? animTerms : numTerms;
            const margin = 60;
            const plotW = W - 2 * margin;
            const plotH = H - 2 * margin - 40;
            const cx = margin;
            const cy = margin + plotH / 2;
            const ampScale = plotH * 0.35;

            // Determine view range based on zoom
            let tMin = 0;
            let tMax = 4 * Math.PI;
            if (zoomLevel > 1) {
                // Zoom into first discontinuity
                const discPoint = waveType === 'rect_pulse' ? Math.PI * 0.5 : Math.PI;
                const range = (4 * Math.PI) / zoomLevel;
                tMin = discPoint - range / 2;
                tMax = discPoint + range / 2;
            }

            // Grid
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.1)';
            ctx.lineWidth = 0.5;
            // Horizontal center
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + plotW, cy);
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.25)';
            ctx.stroke();

            // +1 and -1 lines
            ctx.beginPath();
            ctx.moveTo(cx, cy - ampScale);
            ctx.lineTo(cx + plotW, cy - ampScale);
            ctx.moveTo(cx, cy + ampScale);
            ctx.lineTo(cx + plotW, cy + ampScale);
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.1)';
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Axis labels
            ctx.fillStyle = 'rgba(138, 154, 91, 0.4)';
            ctx.font = '11px monospace';
            ctx.textAlign = 'right';
            ctx.fillText('+1', cx - 8, cy - ampScale + 4);
            ctx.fillText('-1', cx - 8, cy + ampScale + 4);
            ctx.fillText('0', cx - 8, cy + 4);

            // Target wave (dashed)
            ctx.beginPath();
            const steps = plotW;
            for (let i = 0; i <= steps; i++) {
                const t = tMin + (i / steps) * (tMax - tMin);
                const val = targetWave(t, waveType);
                const x = cx + i;
                const y = cy - val * ampScale;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.35)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([6, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Fourier approximation
            ctx.beginPath();
            let maxOvershoot = 0;
            let overshootX = 0, overshootY = 0;
            for (let i = 0; i <= steps; i++) {
                const t = tMin + (i / steps) * (tMax - tMin);
                const val = fourierSum(t, waveType, currentTerms);
                const target = targetWave(t, waveType);
                const x = cx + i;
                const y = cy - val * ampScale;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);

                const overshoot = Math.abs(val) - 1;
                if (overshoot > maxOvershoot) {
                    maxOvershoot = overshoot;
                    overshootX = x;
                    overshootY = y;
                }
            }
            ctx.strokeStyle = '#FEFAE0';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Highlight overshoot
            if (maxOvershoot > 0.01) {
                // Overshoot region fill
                ctx.beginPath();
                ctx.arc(overshootX, overshootY, 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(221, 161, 94, 0.6)';
                ctx.fill();

                // Annotation
                const pct = (maxOvershoot * 100).toFixed(1);
                ctx.fillStyle = '#DDA15E';
                ctx.font = '12px "Segoe UI", sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`Overshoot: ${pct}%`, overshootX + 12, overshootY - 8);
                ctx.fillStyle = 'rgba(221, 161, 94, 0.5)';
                ctx.font = '10px monospace';
                ctx.fillText(`(Gibbs limit: ~9.0%)`, overshootX + 12, overshootY + 8);
            }

            // Individual harmonics (faint)
            for (let k = 1; k <= Math.min(currentTerms, 8); k++) {
                ctx.beginPath();
                for (let i = 0; i <= steps; i++) {
                    const t = tMin + (i / steps) * (tMax - tMin);
                    let val = 0;
                    if (waveType === 'square' && k % 2 === 1) {
                        val = (4 / (Math.PI * k)) * Math.sin(k * t);
                    } else if (waveType === 'sawtooth') {
                        val = (2 * Math.pow(-1, k + 1) / (Math.PI * k)) * Math.sin(k * t);
                    } else if (waveType === 'rect_pulse') {
                        val = (2 / (Math.PI * k)) * Math.sin(k * Math.PI / 2) * Math.cos(k * t) * 2;
                    }
                    const x = cx + i;
                    const y = cy - val * ampScale;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                const hue = 50 + k * 25;
                ctx.strokeStyle = `hsla(${hue}, 50%, 55%, 0.15)`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Info text
            ctx.fillStyle = 'rgba(138, 154, 91, 0.6)';
            ctx.font = '13px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`${waveType} -- ${currentTerms} terms -- zoom ${zoomLevel}x`, W / 2, 28);

            requestAnimationFrame(animate);
        }

        animate();

        window.reset = function() {
            numTerms = 10;
            waveType = 'square';
            zoomLevel = 1;
            animating = false;
            document.getElementById('terms').value = 10;
            document.getElementById('nv').textContent = '10';
            document.getElementById('wave').value = 'square';
            document.getElementById('zoom').value = 1;
            document.getElementById('zv').textContent = '1x';
        };
    })();
    </script>
</body>
</html>
