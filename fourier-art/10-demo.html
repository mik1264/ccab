<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epicycle Symphony - Fourier Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
        }
        .ctrl {
            background: rgba(30, 30, 50, 0.85); backdrop-filter: blur(10px);
            padding: 8px 12px; border-radius: 10px; color: #FEFAE0; font-size: 0.78rem;
            border: 1px solid rgba(138, 154, 91, 0.2);
        }
        .ctrl label { color: #8A9A5B; }
        .ctrl input[type=range] { width: 120px; accent-color: #DDA15E; }
        .ctrl select {
            background: #2a2a4a; color: #FEFAE0; border: 1px solid rgba(138, 154, 91, 0.3);
            padding: 3px 6px; border-radius: 6px; font-size: 0.78rem;
        }
        .btn {
            background: rgba(96, 108, 56, 0.3); color: #DDA15E;
            border: 1px solid rgba(221, 161, 94, 0.3); padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-size: 0.78rem;
        }
        .btn:hover { background: rgba(96, 108, 56, 0.5); }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="controls">
        <div class="ctrl">
            <label>Preset</label><br>
            <select id="preset">
                <option value="duet">Duet (2 systems)</option>
                <option value="trio">Trio (3 systems)</option>
                <option value="quartet">Quartet (4 systems)</option>
                <option value="swarm">Swarm (8 systems)</option>
            </select>
        </div>
        <div class="ctrl">
            <label>Circles each: <span id="cv">8</span></label><br>
            <input type="range" id="circles" min="2" max="20" value="8">
        </div>
        <div class="ctrl">
            <label>Speed: <span id="sv">1.0</span>x</label><br>
            <input type="range" id="spd" min="1" max="30" value="10">
        </div>
        <div class="ctrl">
            <label>Trail Opacity</label><br>
            <input type="range" id="fade" min="1" max="30" value="3">
        </div>
        <button class="btn" id="clearBtn">Clear Trails</button>
        <button class="btn" id="randBtn">Randomize</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        let numSystems = 2;
        let circlesPerSystem = 8;
        let speed = 1.0;
        let fadeFactor = 0.03;
        let time = 0;
        let systems = [];

        const hueBase = [35, 80, 50, 65, 40, 90, 55, 70];

        function createSystem(idx, total) {
            const system = {
                cx: W * (0.25 + 0.5 * (idx / Math.max(1, total - 1))),
                cy: H / 2,
                circles: [],
                trail: [],
                hue: hueBase[idx % hueBase.length]
            };

            if (total === 1) { system.cx = W / 2; }

            for (let i = 0; i < circlesPerSystem; i++) {
                system.circles.push({
                    freq: (i + 1) * (1 + idx * 0.3) * (Math.random() > 0.5 ? 1 : -1),
                    amp: (Math.min(W, H) * 0.08) / (i + 1) * (0.5 + Math.random()),
                    phase: Math.random() * Math.PI * 2
                });
            }
            return system;
        }

        function initSystems() {
            systems = [];
            for (let i = 0; i < numSystems; i++) {
                systems.push(createSystem(i, numSystems));
            }
        }

        function repositionSystems() {
            if (numSystems <= 2) {
                // Side by side
                for (let i = 0; i < systems.length; i++) {
                    systems[i].cx = W * (0.3 + 0.4 * (i / Math.max(1, numSystems - 1)));
                    systems[i].cy = H / 2;
                }
            } else {
                // Circular arrangement
                for (let i = 0; i < systems.length; i++) {
                    const angle = (i / numSystems) * 2 * Math.PI - Math.PI / 2;
                    const r = Math.min(W, H) * 0.25;
                    systems[i].cx = W / 2 + r * Math.cos(angle);
                    systems[i].cy = H / 2 + r * Math.sin(angle);
                }
            }
        }

        initSystems();

        document.getElementById('preset').addEventListener('change', e => {
            const val = e.target.value;
            const counts = { duet: 2, trio: 3, quartet: 4, swarm: 8 };
            numSystems = counts[val] || 2;
            initSystems();
        });
        document.getElementById('circles').addEventListener('input', e => {
            circlesPerSystem = +e.target.value;
            document.getElementById('cv').textContent = circlesPerSystem;
            initSystems();
        });
        document.getElementById('spd').addEventListener('input', e => {
            speed = e.target.value / 10;
            document.getElementById('sv').textContent = speed.toFixed(1);
        });
        document.getElementById('fade').addEventListener('input', e => {
            fadeFactor = e.target.value / 1000;
        });
        document.getElementById('clearBtn').addEventListener('click', () => {
            for (const s of systems) s.trail = [];
            ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, W, H);
        });
        document.getElementById('randBtn').addEventListener('click', () => {
            initSystems();
            ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, W, H);
        });

        function animate() {
            // Fade
            ctx.fillStyle = `rgba(26, 26, 46, ${fadeFactor})`;
            ctx.fillRect(0, 0, W, H);

            repositionSystems();

            const tips = [];

            for (let s = 0; s < systems.length; s++) {
                const sys = systems[s];
                let x = sys.cx, y = sys.cy;

                // Draw epicycles
                for (let i = 0; i < sys.circles.length; i++) {
                    const c = sys.circles[i];
                    const prevX = x, prevY = y;
                    x += c.amp * Math.cos(c.freq * time + c.phase);
                    y += c.amp * Math.sin(c.freq * time + c.phase);

                    // Circle
                    ctx.beginPath();
                    ctx.arc(prevX, prevY, c.amp, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${sys.hue}, 40%, 50%, ${Math.max(0.02, 0.08 - i * 0.005)})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();

                    // Arm
                    if (i < 5) {
                        ctx.beginPath();
                        ctx.moveTo(prevX, prevY);
                        ctx.lineTo(x, y);
                        ctx.strokeStyle = `hsla(${sys.hue}, 50%, 60%, ${0.15 - i * 0.02})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }

                tips.push({ x, y, sys: s });

                // Trail
                sys.trail.push({ x, y });
                if (sys.trail.length > 800) sys.trail.shift();

                // Draw trail
                if (sys.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(sys.trail[0].x, sys.trail[0].y);
                    for (let i = 1; i < sys.trail.length; i++) {
                        ctx.lineTo(sys.trail[i].x, sys.trail[i].y);
                    }
                    ctx.strokeStyle = `hsla(${sys.hue}, 60%, 60%, 0.6)`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                // Tip glow
                ctx.shadowColor = `hsl(${sys.hue}, 70%, 65%)`;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${sys.hue}, 70%, 70%)`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Connection lines between system tips
            if (tips.length > 1) {
                for (let i = 0; i < tips.length; i++) {
                    for (let j = i + 1; j < tips.length; j++) {
                        const a = tips[i], b = tips[j];
                        const dist = Math.hypot(a.x - b.x, a.y - b.y);
                        const maxDist = Math.max(W, H) * 0.6;
                        const alpha = Math.max(0, 0.2 * (1 - dist / maxDist));

                        if (alpha > 0.005) {
                            ctx.beginPath();
                            ctx.moveTo(a.x, a.y);
                            ctx.lineTo(b.x, b.y);
                            ctx.strokeStyle = `rgba(254, 250, 224, ${alpha})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();

                            // Midpoint sparkle
                            if (dist < maxDist * 0.3) {
                                const mx = (a.x + b.x) / 2;
                                const my = (a.y + b.y) / 2;
                                ctx.beginPath();
                                ctx.arc(mx, my, 1.5, 0, Math.PI * 2);
                                ctx.fillStyle = `rgba(221, 161, 94, ${alpha * 2})`;
                                ctx.fill();
                            }
                        }
                    }
                }
            }

            time += 0.015 * speed;
            requestAnimationFrame(animate);
        }

        animate();

        window.reset = function() {
            time = 0;
            numSystems = 2;
            circlesPerSystem = 8;
            speed = 1.0;
            fadeFactor = 0.03;
            document.getElementById('preset').value = 'duet';
            document.getElementById('circles').value = 8;
            document.getElementById('cv').textContent = '8';
            document.getElementById('spd').value = 10;
            document.getElementById('sv').textContent = '1.0';
            document.getElementById('fade').value = 3;
            initSystems();
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);
        };
    })();
    </script>
</body>
</html>
