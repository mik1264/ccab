<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosquito vs Hawkmoth Flight</title>
    <script src="../assets/js/enhance.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center; padding: 12px 20px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-radius: 12px; z-index: 1000; color: #FEFAE0; font-size: 0.85rem;
        }
        .controls label { display: flex; align-items: center; gap: 6px; }
        .controls input[type="range"] { width: 80px; accent-color: #8A9A5B; }
        .divider {
            position: fixed; top: 0; left: 50%; width: 2px; height: 100%;
            background: rgba(254,250,224,0.15); z-index: 500;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="divider"></div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Time Scale <input type="range" id="timeScale" min="0.1" max="2" step="0.1" value="0.5"> <span id="tsVal">0.5</span>x</label>
        <label>Show Trail <input type="checkbox" id="showTrail" checked></label>
    </div>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let time = 0;
        const mosquitoTrail = [];
        const hawkmothTrail = [];
        const MAX_TRAIL = 150;

        const mosquito = {
            name: 'Mosquito',
            wingbeat: 600, // Hz
            strokeAmplitude: 40, // degrees (narrow)
            wingspan: 4, // mm
            re: 200,
            mass: 2.5, // mg
            desc: 'High frequency, low amplitude',
            characteristics: [
                'Wingbeat: 600 Hz',
                'Stroke: 40 deg (narrow)',
                'Re: ~200',
                'Slender wings',
                'Trailing-edge vortex lift',
                'Unique rotational mechanism'
            ]
        };

        const hawkmoth = {
            name: 'Hawkmoth',
            wingbeat: 25, // Hz
            strokeAmplitude: 120, // degrees (wide)
            wingspan: 50, // mm
            re: 6000,
            mass: 1500, // mg
            desc: 'Low frequency, high amplitude',
            characteristics: [
                'Wingbeat: 25 Hz',
                'Stroke: 120 deg (wide)',
                'Re: ~6000',
                'Broad wings',
                'Strong LEV formation',
                'Classic hovering specialist'
            ]
        };

        function drawInsect(cx, cy, scale, insect, t, trail, side) {
            // Wing kinematics
            const freq = insect.wingbeat * 0.001; // scaled down for visualization
            const amp = insect.strokeAmplitude * Math.PI / 180;

            // Wing angle
            const wingAngle = Math.sin(t * freq * 50) * amp / 2;
            const wingVel = Math.cos(t * freq * 50) * freq * 50 * amp / 2;

            // Wing length scaled
            const wingLen = scale * 0.5;

            // Record trail (wingtip position)
            const tipX = cx + Math.cos(wingAngle) * wingLen;
            const tipY = cy - Math.sin(Math.abs(wingAngle)) * wingLen * 0.3;
            trail.push({ x: tipX, y: tipY });
            while (trail.length > MAX_TRAIL) trail.shift();

            // Draw trail
            if (document.getElementById('showTrail').checked && trail.length > 1) {
                ctx.beginPath();
                ctx.moveTo(trail[0].x, trail[0].y);
                for (let i = 1; i < trail.length; i++) {
                    const alpha = i / trail.length;
                    ctx.strokeStyle = `rgba(221, 161, 94, ${alpha * 0.5})`;
                    ctx.lineWidth = alpha * 2;
                    ctx.lineTo(trail[i].x, trail[i].y);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(trail[i].x, trail[i].y);
                }
            }

            // Draw wings
            for (let s = -1; s <= 1; s += 2) {
                const wAngle = wingAngle * s;
                const wtipX = cx + Math.cos(wAngle) * wingLen * s;
                const wtipY = cy - Math.sin(Math.abs(wAngle)) * wingLen * 0.3;

                // Wing shape depends on species
                ctx.beginPath();
                ctx.moveTo(cx, cy);

                if (insect === mosquito) {
                    // Slender, narrow wings
                    ctx.quadraticCurveTo(
                        cx + s * wingLen * 0.4, cy - wingLen * 0.12,
                        wtipX, wtipY
                    );
                    ctx.quadraticCurveTo(
                        cx + s * wingLen * 0.3, cy + wingLen * 0.03,
                        cx, cy
                    );
                } else {
                    // Broad, rounded wings
                    ctx.bezierCurveTo(
                        cx + s * wingLen * 0.2, cy - wingLen * 0.35,
                        cx + s * wingLen * 0.6, cy - wingLen * 0.3,
                        wtipX, wtipY
                    );
                    ctx.bezierCurveTo(
                        cx + s * wingLen * 0.5, cy + wingLen * 0.08,
                        cx + s * wingLen * 0.2, cy + wingLen * 0.05,
                        cx, cy
                    );
                }

                const wingAlpha = 0.3 + Math.abs(wingVel) * 0.005;
                ctx.fillStyle = `rgba(138, 154, 91, ${Math.min(0.6, wingAlpha)})`;
                ctx.fill();
                ctx.strokeStyle = 'rgba(96, 108, 56, 0.7)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Body
            if (insect === mosquito) {
                // Slender body
                ctx.fillStyle = '#606C38';
                ctx.beginPath();
                ctx.ellipse(cx, cy, scale * 0.015, scale * 0.08, 0, 0, Math.PI * 2);
                ctx.fill();
                // Long legs
                ctx.strokeStyle = 'rgba(96,108,56,0.5)';
                ctx.lineWidth = 0.8;
                for (let i = 0; i < 3; i++) {
                    for (let s = -1; s <= 1; s += 2) {
                        ctx.beginPath();
                        ctx.moveTo(cx, cy + i * scale * 0.02);
                        ctx.lineTo(cx + s * scale * 0.08, cy + scale * 0.12 + i * scale * 0.02);
                        ctx.stroke();
                    }
                }
                // Proboscis
                ctx.beginPath();
                ctx.moveTo(cx, cy - scale * 0.08);
                ctx.lineTo(cx, cy - scale * 0.14);
                ctx.stroke();
            } else {
                // Stocky hawkmoth body
                ctx.fillStyle = '#606C38';
                // Thorax
                ctx.beginPath();
                ctx.ellipse(cx, cy, scale * 0.04, scale * 0.06, 0, 0, Math.PI * 2);
                ctx.fill();
                // Abdomen
                ctx.beginPath();
                ctx.ellipse(cx, cy + scale * 0.1, scale * 0.035, scale * 0.08, 0, 0, Math.PI * 2);
                ctx.fill();
                // Head
                ctx.beginPath();
                ctx.arc(cx, cy - scale * 0.07, scale * 0.025, 0, Math.PI * 2);
                ctx.fill();
                // Proboscis (long, curled)
                ctx.strokeStyle = '#DDA15E';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(cx, cy - scale * 0.09);
                for (let a = 0; a < Math.PI * 2; a += 0.1) {
                    const r = scale * 0.03 * (1 - a / (Math.PI * 4));
                    ctx.lineTo(cx + Math.cos(a) * r, cy - scale * 0.1 - Math.sin(a) * r);
                }
                ctx.stroke();
                // Antennae
                ctx.strokeStyle = 'rgba(96,108,56,0.6)';
                ctx.beginPath();
                ctx.moveTo(cx - scale * 0.015, cy - scale * 0.08);
                ctx.lineTo(cx - scale * 0.06, cy - scale * 0.14);
                ctx.moveTo(cx + scale * 0.015, cy - scale * 0.08);
                ctx.lineTo(cx + scale * 0.06, cy - scale * 0.14);
                ctx.stroke();
            }

            // Eyes
            ctx.fillStyle = '#DDA15E';
            const eyeY = insect === mosquito ? cy - scale * 0.075 : cy - scale * 0.07;
            ctx.beginPath();
            ctx.arc(cx - scale * 0.01, eyeY, scale * 0.008, 0, Math.PI * 2);
            ctx.arc(cx + scale * 0.01, eyeY, scale * 0.008, 0, Math.PI * 2);
            ctx.fill();

            // Stroke angle visualization
            ctx.strokeStyle = 'rgba(254,250,224,0.15)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 5]);
            ctx.beginPath();
            ctx.arc(cx, cy, wingLen * 0.6, -amp / 2 - 0.1, amp / 2 + 0.1);
            ctx.stroke();
            ctx.setLineDash([]);

            return { wingAngle, wingVel };
        }

        function drawStats(x, y, insect, side) {
            ctx.fillStyle = '#FEFAE0';
            ctx.font = 'bold 16px monospace';
            ctx.textAlign = side === 'left' ? 'left' : 'right';
            ctx.fillText(insect.name, x, y);

            ctx.font = '11px monospace';
            ctx.fillStyle = '#DDA15E';
            ctx.fillText(insect.desc, x, y + 18);

            ctx.fillStyle = 'rgba(254,250,224,0.6)';
            ctx.font = '10px monospace';
            for (let i = 0; i < insect.characteristics.length; i++) {
                ctx.fillText(insect.characteristics[i], x, y + 35 + i * 15);
            }
        }

        function drawWingbeatComparison(y) {
            const cx = W / 2;
            const w = W * 0.35;

            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            ctx.font = '11px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('Wingbeat Frequency Comparison', cx, y - 15);

            // Mosquito bar
            const mBarW = (600 / 600) * w * 0.4;
            ctx.fillStyle = 'rgba(221, 161, 94, 0.5)';
            ctx.fillRect(cx - w * 0.45, y, mBarW, 15);
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'left';
            ctx.fillText('600 Hz', cx - w * 0.45 + mBarW + 5, y + 12);

            // Hawkmoth bar
            const hBarW = (25 / 600) * w * 0.4;
            ctx.fillStyle = 'rgba(138, 154, 91, 0.5)';
            ctx.fillRect(cx + w * 0.05, y, Math.max(hBarW, 3), 15);
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText('25 Hz', cx + w * 0.05 + Math.max(hBarW, 3) + 5, y + 12);

            // Labels
            ctx.fillStyle = 'rgba(254,250,224,0.4)';
            ctx.textAlign = 'center';
            ctx.fillText('Mosquito', cx - w * 0.25, y + 30);
            ctx.fillText('Hawkmoth', cx + w * 0.25, y + 30);

            // Stroke amplitude comparison
            ctx.fillText('Stroke Amplitude', cx, y + 50);
            ctx.fillStyle = '#DDA15E';
            ctx.fillText('40 deg', cx - w * 0.25, y + 65);
            ctx.fillStyle = '#8A9A5B';
            ctx.fillText('120 deg', cx + w * 0.25, y + 65);
        }

        function animate() {
            const timeScale = parseFloat(document.getElementById('timeScale').value);

            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, W, H);

            const scale = Math.min(W / 2, H) * 0.55;

            // Left side - Mosquito
            drawInsect(W * 0.25, H * 0.4, scale, mosquito, time * timeScale, mosquitoTrail, 'left');
            drawStats(W * 0.05, H * 0.05, mosquito, 'left');

            // Right side - Hawkmoth
            drawInsect(W * 0.75, H * 0.4, scale, hawkmoth, time * timeScale, hawkmothTrail, 'right');
            drawStats(W * 0.95, H * 0.05, hawkmoth, 'right');

            // Center comparison
            drawWingbeatComparison(H * 0.78);

            // Title
            ctx.fillStyle = 'rgba(254,250,224,0.3)';
            ctx.font = '10px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('Two strategies for staying aloft', W / 2, H * 0.95);

            document.getElementById('tsVal').textContent = timeScale.toFixed(1);

            time += 0.016;
            requestAnimationFrame(animate);
        }

        window.reset = function() {
            time = 0;
            mosquitoTrail.length = 0;
            hawkmothTrail.length = 0;
            ctx.clearRect(0, 0, W, H);
        };

        animate();
    })();
    </script>
</body>
</html>
