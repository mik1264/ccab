<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figure-8 Wing Stroke Pattern</title>
    <script src="../assets/js/enhance.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; align-items: center; padding: 12px 20px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-radius: 12px; z-index: 1000; color: #FEFAE0; font-size: 0.85rem;
        }
        .controls label { display: flex; align-items: center; gap: 6px; }
        .controls input[type="range"] { width: 80px; accent-color: #8A9A5B; }
        .info {
            position: fixed; top: 10px; right: 10px; max-width: 280px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 15px; color: #FEFAE0; font-size: 0.8rem;
            z-index: 1000; line-height: 1.4;
        }
        .info h3 { color: #8A9A5B; margin-bottom: 6px; font-size: 0.95rem; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <div class="info">
        <h3>Figure-8 Wing Stroke</h3>
        <p>Insects trace a figure-8 pattern with their wingtips during each stroke cycle. The wing rotates at the end of each half-stroke (pronation and supination), creating continuous lift on both the downstroke and upstroke.</p>
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Frequency <input type="range" id="freq" min="0.3" max="3" step="0.1" value="1"> <span id="freqVal">1.0</span></label>
        <label>Amplitude <input type="range" id="amp" min="0.3" max="1.5" step="0.1" value="1"> <span id="ampVal">1.0</span></label>
        <label>Trail <input type="range" id="trail" min="10" max="200" step="5" value="100"> <span id="trailVal">100</span></label>
    </div>
    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let time = 0;
        let paused = false;
        const trailPoints = [];
        const maxTrail = 500;

        // Wing stroke parameters
        function getWingTip(t, freq, amp) {
            // Figure-8 Lissajous: x = sin(t), y = sin(2t)
            const x = Math.sin(t * freq) * amp;
            const y = Math.sin(t * freq * 2) * amp * 0.6;
            // Wing angle follows the stroke
            const angle = Math.atan2(
                Math.cos(t * freq * 2) * 2 * amp * 0.6,
                Math.cos(t * freq) * amp
            );
            return { x, y, angle };
        }

        function drawInsectBody(cx, cy, scale) {
            // Thorax
            ctx.fillStyle = '#606C38';
            ctx.beginPath();
            ctx.ellipse(cx, cy, scale * 0.12, scale * 0.18, 0, 0, Math.PI * 2);
            ctx.fill();
            // Head
            ctx.beginPath();
            ctx.ellipse(cx, cy - scale * 0.25, scale * 0.08, scale * 0.08, 0, 0, Math.PI * 2);
            ctx.fill();
            // Abdomen
            ctx.beginPath();
            ctx.ellipse(cx, cy + scale * 0.35, scale * 0.1, scale * 0.22, 0, 0, Math.PI * 2);
            ctx.fill();
            // Eyes
            ctx.fillStyle = '#DDA15E';
            ctx.beginPath();
            ctx.arc(cx - scale * 0.05, cy - scale * 0.28, scale * 0.025, 0, Math.PI * 2);
            ctx.arc(cx + scale * 0.05, cy - scale * 0.28, scale * 0.025, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawWing(cx, cy, scale, tipX, tipY, angle, side) {
            const flip = side === 'left' ? -1 : 1;
            const wx = cx + tipX * scale * flip;
            const wy = cy + tipY * scale;

            // Wing shape
            ctx.save();
            ctx.translate(cx, cy);
            ctx.beginPath();
            // Wing as bezier curve from body to tip
            const tx = tipX * scale * flip;
            const ty = tipY * scale;
            const cp1x = tx * 0.3 + flip * scale * 0.15;
            const cp1y = ty * 0.3 - scale * 0.15;
            const cp2x = tx * 0.7 + flip * scale * 0.1;
            const cp2y = ty * 0.7 - scale * 0.05;
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, tx, ty);
            ctx.bezierCurveTo(cp2x + flip * scale * 0.05, cp2y + scale * 0.08,
                              cp1x + flip * scale * 0.03, cp1y + scale * 0.1,
                              0, scale * 0.05);
            ctx.closePath();

            // Wing fill with transparency
            const grad = ctx.createLinearGradient(0, 0, tx, ty);
            grad.addColorStop(0, 'rgba(138, 154, 91, 0.4)');
            grad.addColorStop(0.5, 'rgba(221, 161, 94, 0.3)');
            grad.addColorStop(1, 'rgba(254, 250, 224, 0.2)');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.7)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Wing veins
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(tx, ty);
            ctx.moveTo(0, 0);
            ctx.lineTo(tx * 0.6 + flip * scale * 0.08, ty * 0.6 - scale * 0.06);
            ctx.strokeStyle = 'rgba(96, 108, 56, 0.4)';
            ctx.lineWidth = 0.8;
            ctx.stroke();

            ctx.restore();
            return { x: wx, y: wy };
        }

        function animate() {
            if (!paused) {
                const freq = parseFloat(document.getElementById('freq').value);
                const amp = parseFloat(document.getElementById('amp').value);
                const maxPts = parseInt(document.getElementById('trail').value);

                ctx.fillStyle = 'rgba(26, 26, 46, 0.08)';
                ctx.fillRect(0, 0, W, H);

                const cx = W / 2;
                const cy = H / 2;
                const scale = Math.min(W, H) * 0.3;

                const wing = getWingTip(time, freq, amp);

                // Draw trail (figure-8 path)
                trailPoints.push({
                    rx: wing.x, ry: wing.y,
                    lx: -wing.x, ly: wing.y
                });
                while (trailPoints.length > maxPts) trailPoints.shift();

                // Right wing trail
                if (trailPoints.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(cx + trailPoints[0].rx * scale, cy + trailPoints[0].ry * scale);
                    for (let i = 1; i < trailPoints.length; i++) {
                        const alpha = i / trailPoints.length;
                        ctx.strokeStyle = `rgba(221, 161, 94, ${alpha * 0.6})`;
                        ctx.lineWidth = alpha * 2.5;
                        ctx.lineTo(cx + trailPoints[i].rx * scale, cy + trailPoints[i].ry * scale);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(cx + trailPoints[i].rx * scale, cy + trailPoints[i].ry * scale);
                    }

                    // Left wing trail
                    ctx.beginPath();
                    ctx.moveTo(cx + trailPoints[0].lx * scale, cy + trailPoints[0].ly * scale);
                    for (let i = 1; i < trailPoints.length; i++) {
                        const alpha = i / trailPoints.length;
                        ctx.strokeStyle = `rgba(138, 154, 91, ${alpha * 0.6})`;
                        ctx.lineWidth = alpha * 2.5;
                        ctx.lineTo(cx + trailPoints[i].lx * scale, cy + trailPoints[i].ly * scale);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(cx + trailPoints[i].lx * scale, cy + trailPoints[i].ly * scale);
                    }
                }

                // Draw wings
                drawWing(cx, cy, scale, wing.x, wing.y, wing.angle, 'right');
                drawWing(cx, cy, scale, wing.x, wing.y, wing.angle, 'left');

                // Draw body
                drawInsectBody(cx, cy, scale);

                // Draw wingtip markers
                ctx.fillStyle = '#DDA15E';
                ctx.beginPath();
                ctx.arc(cx + wing.x * scale, cy + wing.y * scale, 4, 0, Math.PI * 2);
                ctx.arc(cx - wing.x * scale, cy + wing.y * scale, 4, 0, Math.PI * 2);
                ctx.fill();

                // Labels
                ctx.fillStyle = '#FEFAE0';
                ctx.font = '12px monospace';
                ctx.textAlign = 'center';
                const phase = ((time * freq) % (Math.PI * 2)) / (Math.PI * 2);
                let strokePhase = '';
                if (phase < 0.25) strokePhase = 'Downstroke';
                else if (phase < 0.5) strokePhase = 'Pronation';
                else if (phase < 0.75) strokePhase = 'Upstroke';
                else strokePhase = 'Supination';
                ctx.fillText(strokePhase, cx, cy + scale * 0.7);

                time += 0.03;
            }

            // Update labels
            document.getElementById('freqVal').textContent = parseFloat(document.getElementById('freq').value).toFixed(1);
            document.getElementById('ampVal').textContent = parseFloat(document.getElementById('amp').value).toFixed(1);
            document.getElementById('trailVal').textContent = document.getElementById('trail').value;

            requestAnimationFrame(animate);
        }

        window.reset = function() {
            time = 0;
            trailPoints.length = 0;
            ctx.clearRect(0, 0, W, H);
        };

        animate();
    })();
    </script>
</body>
</html>
