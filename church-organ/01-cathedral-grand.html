<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cathedral Grand - 3-Manual Pipe Organ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #0d0a07;
            color: #e8dcc8;
            overflow-x: hidden;
            min-height: 100vh;
            user-select: none;
        }

        /* Stained Glass Background */
        .stained-glass-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .stained-glass-bg .shard {
            position: absolute;
            border-radius: 50%;
            opacity: 0.03;
            filter: blur(60px);
        }

        /* Rose Window */
        .rose-window {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 10px auto;
            z-index: 1;
        }
        .rose-window canvas {
            width: 200px;
            height: 200px;
        }

        /* Header */
        .header {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 15px 20px 5px;
        }
        .back-link {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #d4af37;
            text-decoration: none;
            font-size: 14px;
            z-index: 10;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .back-link:hover { opacity: 1; }
        h1 {
            font-family: 'Georgia', serif;
            font-weight: 300;
            font-size: 28px;
            color: #d4af37;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(212,175,55,0.3);
        }
        .subtitle {
            font-size: 12px;
            color: #a08c6a;
            letter-spacing: 2px;
            margin-top: 2px;
        }

        /* Power Button */
        #power-btn {
            display: block;
            margin: 8px auto;
            background: linear-gradient(180deg, #8b1a1a, #5a0000);
            color: #ffd700;
            border: 2px solid #d4af37;
            padding: 10px 30px;
            font-size: 14px;
            font-family: 'Georgia', serif;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.4s;
            text-transform: uppercase;
            z-index: 1;
            position: relative;
        }
        #power-btn.on {
            background: linear-gradient(180deg, #1a5a1a, #003300);
            border-color: #44ff44;
            color: #88ff88;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }

        /* Main Console */
        .console-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 5px auto;
            padding: 0 15px;
            opacity: 0.4;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .console-wrapper.powered { opacity: 1; pointer-events: auto; }

        .console {
            background: linear-gradient(180deg, #3d2b1a, #2a1a0e, #1f140a);
            border: 3px solid #5a3d20;
            border-radius: 8px;
            padding: 12px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5), 0 8px 30px rgba(0,0,0,0.6);
        }

        /* Pipe Display */
        .pipe-display {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 100px;
            margin-bottom: 8px;
            gap: 2px;
            padding: 0 30px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(15,10,5,0.9), rgba(30,20,10,0.6));
            border-radius: 6px 6px 0 0;
            border: 1px solid #3a2a18;
            border-bottom: none;
        }
        .pipe {
            width: 6px;
            border-radius: 2px 2px 0 0;
            transition: height 0.15s, background 0.15s, box-shadow 0.15s;
            position: relative;
        }
        .pipe.sounding {
            box-shadow: 0 0 8px rgba(212,175,55,0.6), inset 0 0 4px rgba(255,220,100,0.3);
        }

        /* Stop Panels */
        .stops-area {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .stop-panel {
            background: linear-gradient(180deg, #2a1f14, #1e150d);
            border: 1px solid #4a3520;
            border-radius: 6px;
            padding: 8px;
        }
        .stop-panel h3 {
            font-size: 11px;
            color: #d4af37;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            text-align: center;
            border-bottom: 1px solid #3a2a18;
            padding-bottom: 4px;
        }
        .stop-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            justify-content: center;
        }
        .stop-btn {
            background: linear-gradient(180deg, #f5ecd8, #e8dcc0);
            color: #2a1a0e;
            border: none;
            padding: 4px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            width: auto;
            min-width: 75px;
            text-align: center;
            transition: all 0.15s;
            border-bottom: 3px solid #c4b496;
            font-family: 'Georgia', serif;
            line-height: 1.2;
        }
        .stop-btn:hover {
            background: linear-gradient(180deg, #fff8e8, #f0e4c8);
        }
        .stop-btn.active {
            background: linear-gradient(180deg, #c41e1e, #8b0000);
            color: #ffd700;
            border-bottom-width: 0;
            transform: translateY(3px);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }
        .stop-btn .footage {
            display: block;
            font-size: 9px;
            opacity: 0.7;
        }

        /* Manuals */
        .manuals-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }
        .manual-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .manual-label {
            font-size: 10px;
            color: #a08c6a;
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 55px;
            text-align: right;
            flex-shrink: 0;
        }
        .keyboard {
            display: flex;
            position: relative;
            height: 70px;
            background: #1a1008;
            border-radius: 3px;
            padding: 2px;
            border: 1px solid #3a2a18;
        }
        .keyboard.pedal-kb {
            height: 45px;
        }
        .key-wrapper {
            position: relative;
            display: flex;
        }
        .white-key {
            width: 22px;
            height: 66px;
            background: linear-gradient(180deg, #fffff0, #f5f0e0, #e8e0cc);
            border: 1px solid #c0b090;
            border-radius: 0 0 3px 3px;
            cursor: pointer;
            z-index: 1;
            transition: background 0.08s;
            position: relative;
        }
        .white-key:active, .white-key.pressed {
            background: linear-gradient(180deg, #e0d8c0, #d0c8b0);
            border-color: #a09070;
        }
        .white-key.sounding {
            background: linear-gradient(180deg, #fff8d0, #ffe880);
            box-shadow: 0 0 8px rgba(255,220,50,0.4);
        }
        .black-key {
            width: 14px;
            height: 42px;
            background: linear-gradient(180deg, #222, #111, #000);
            border: 1px solid #333;
            border-radius: 0 0 2px 2px;
            cursor: pointer;
            z-index: 2;
            margin-left: -7px;
            margin-right: -7px;
            position: relative;
            transition: background 0.08s;
        }
        .black-key:active, .black-key.pressed {
            background: linear-gradient(180deg, #444, #333);
            height: 40px;
        }
        .black-key.sounding {
            background: linear-gradient(180deg, #664400, #443300);
            box-shadow: 0 0 6px rgba(200,150,50,0.5);
        }
        .pedal-kb .white-key {
            width: 28px;
            height: 41px;
            background: linear-gradient(180deg, #c4a060, #a08040, #886830);
            border-color: #6a5020;
        }
        .pedal-kb .white-key.sounding {
            background: linear-gradient(180deg, #e0c060, #c4a040);
            box-shadow: 0 0 10px rgba(200,150,50,0.5);
        }
        .pedal-kb .black-key {
            width: 18px;
            height: 26px;
            margin-left: -9px;
            margin-right: -9px;
            background: linear-gradient(180deg, #3a2a10, #1a1000);
        }

        /* Expression Pedal */
        .expression-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-top: 8px;
            padding: 8px;
            background: linear-gradient(180deg, #1e150d, #150e08);
            border-radius: 4px;
            border: 1px solid #3a2a18;
        }
        .expression-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .expression-control label {
            font-size: 10px;
            color: #a08c6a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .expression-slider {
            -webkit-appearance: none;
            width: 140px;
            height: 8px;
            background: linear-gradient(90deg, #2a1a0e, #5a3d20);
            border-radius: 4px;
            outline: none;
            border: 1px solid #4a3520;
        }
        .expression-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 24px;
            background: linear-gradient(180deg, #d4af37, #a08020);
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid #806010;
        }
        .expression-value {
            font-size: 10px;
            color: #d4af37;
        }

        /* Keyboard Shortcuts Legend */
        .kb-legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 6px;
            font-size: 9px;
            color: #6a5a40;
        }
        .kb-legend span { letter-spacing: 1px; }

        /* Info Panel */
        .info-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
            font-size: 10px;
            color: #6a5a40;
        }
        .info-bar span {
            background: rgba(30,20,10,0.6);
            padding: 3px 10px;
            border-radius: 3px;
            border: 1px solid #2a1a0e;
        }
        #note-display { color: #d4af37; min-width: 80px; }
        #stop-count { color: #a08c6a; }

        /* Playlist Panel */
        .playlist-panel {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 10px auto;
            padding: 0 15px;
        }
        .playlist-box {
            background: linear-gradient(180deg, #2a1f14, #1e150d);
            border: 1px solid #4a3520;
            border-radius: 8px;
            padding: 12px;
        }
        .playlist-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .playlist-header h2 {
            font-size: 14px;
            color: #d4af37;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: normal;
        }
        .playlist-transport {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .transport-btn {
            background: linear-gradient(180deg, #3d2b1a, #2a1a0e);
            border: 1px solid #5a3d20;
            color: #d4af37;
            width: 34px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .transport-btn:hover { background: linear-gradient(180deg, #4a3520, #3d2b1a); }
        .transport-btn.active { background: linear-gradient(180deg, #1a5a1a, #003300); border-color: #44ff44; color: #88ff88; }
        .transport-btn:disabled { opacity: 0.3; cursor: default; }
        .progress-wrap {
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .progress-bar-outer {
            flex: 1;
            height: 6px;
            background: #1a1008;
            border-radius: 3px;
            border: 1px solid #3a2a18;
            overflow: hidden;
            cursor: pointer;
        }
        .progress-bar-inner {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d4af37, #a08020);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .progress-time {
            font-size: 10px;
            color: #a08c6a;
            min-width: 80px;
            text-align: right;
            font-family: monospace;
        }
        .now-playing {
            font-size: 11px;
            color: #d4af37;
            text-align: center;
            margin-bottom: 6px;
            min-height: 16px;
            letter-spacing: 1px;
        }
        .playlist-tracks {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 4px;
            max-height: 200px;
            overflow-y: auto;
        }
        .playlist-tracks::-webkit-scrollbar { width: 6px; }
        .playlist-tracks::-webkit-scrollbar-track { background: #1a1008; }
        .playlist-tracks::-webkit-scrollbar-thumb { background: #4a3520; border-radius: 3px; }
        .track-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 8px;
            background: rgba(20,14,8,0.6);
            border: 1px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .track-item:hover { border-color: #4a3520; background: rgba(40,28,16,0.6); }
        .track-item.active { border-color: #d4af37; background: rgba(60,40,20,0.5); }
        .track-item.playing { border-color: #44ff44; }
        .track-num {
            font-size: 10px;
            color: #6a5a40;
            width: 18px;
            text-align: center;
            flex-shrink: 0;
        }
        .track-item.playing .track-num { color: #88ff88; }
        .track-info { flex: 1; min-width: 0; }
        .track-title {
            font-size: 11px;
            color: #e8dcc8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-composer {
            font-size: 9px;
            color: #6a5a40;
        }
        .track-dur {
            font-size: 9px;
            color: #6a5a40;
            flex-shrink: 0;
        }
        .playlist-toggle {
            position: relative;
            z-index: 1;
            display: block;
            margin: 6px auto;
            background: linear-gradient(180deg, #3d2b1a, #2a1a0e);
            border: 1px solid #5a3d20;
            color: #d4af37;
            padding: 6px 20px;
            border-radius: 4px;
            font-family: 'Georgia', serif;
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .playlist-toggle:hover { background: linear-gradient(180deg, #4a3520, #3d2b1a); }

        /* Responsive */
        @media (max-width: 900px) {
            .stops-area { grid-template-columns: 1fr 1fr; }
            .white-key { width: 18px; height: 56px; }
            .black-key { width: 12px; height: 35px; margin-left: -6px; margin-right: -6px; }
            .keyboard { height: 60px; }
            .pipe-display { height: 70px; }
        }
        @media (max-width: 600px) {
            .stops-area { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="stained-glass-bg" id="stainedBg"></div>

<a href="../index.html" class="back-link">&larr; Back to Gallery</a>

<div class="header">
    <h1>Cathedral Grand</h1>
    <div class="subtitle">Three-Manual Pipe Organ Simulator</div>
</div>

<div class="rose-window">
    <canvas id="roseCanvas" width="400" height="400"></canvas>
</div>

<button id="power-btn" onclick="togglePower()">Activate Wind Chest</button>

<div class="console-wrapper" id="consoleWrapper">
    <div class="console">

        <!-- Pipe Display -->
        <div class="pipe-display" id="pipeDisplay"></div>

        <!-- Stops -->
        <div class="stops-area">
            <!-- Swell Stops -->
            <div class="stop-panel">
                <h3>III - Swell</h3>
                <div class="stop-grid" id="swell-stops"></div>
            </div>
            <!-- Great Stops -->
            <div class="stop-panel">
                <h3>II - Great</h3>
                <div class="stop-grid" id="great-stops"></div>
            </div>
            <!-- Choir Stops -->
            <div class="stop-panel">
                <h3>I - Choir</h3>
                <div class="stop-grid" id="choir-stops"></div>
            </div>
            <!-- Pedal Stops -->
            <div class="stop-panel">
                <h3>Pedal</h3>
                <div class="stop-grid" id="pedal-stops"></div>
            </div>
        </div>

        <!-- Manuals -->
        <div class="manuals-section">
            <div class="manual-row">
                <div class="manual-label">Swell</div>
                <div class="keyboard" id="swell-kb" data-division="swell"></div>
            </div>
            <div class="manual-row">
                <div class="manual-label">Great</div>
                <div class="keyboard" id="great-kb" data-division="great"></div>
            </div>
            <div class="manual-row">
                <div class="manual-label">Choir</div>
                <div class="keyboard" id="choir-kb" data-division="choir"></div>
            </div>
            <div class="manual-row">
                <div class="manual-label">Pedal</div>
                <div class="keyboard pedal-kb" id="pedal-kb" data-division="pedal"></div>
            </div>
        </div>

        <!-- Expression Pedals -->
        <div class="expression-area">
            <div class="expression-control">
                <label>Swell Expression</label>
                <input type="range" class="expression-slider" id="swell-expr" min="0" max="100" value="80">
                <span class="expression-value" id="swell-expr-val">80%</span>
            </div>
            <div class="expression-control">
                <label>Choir Expression</label>
                <input type="range" class="expression-slider" id="choir-expr" min="0" max="100" value="80">
                <span class="expression-value" id="choir-expr-val">80%</span>
            </div>
            <div class="expression-control">
                <label>Master Volume</label>
                <input type="range" class="expression-slider" id="master-vol" min="0" max="100" value="70">
                <span class="expression-value" id="master-vol-val">70%</span>
            </div>
        </div>

        <!-- Keyboard Shortcuts -->
        <div class="kb-legend">
            <span>ZXCVBNM = Great</span>
            <span>ASDFGHJ = Swell</span>
            <span>QWERTYU = Choir</span>
            <span>Click Pedals = Pedal</span>
        </div>

        <!-- Info Bar -->
        <div class="info-bar">
            <span id="note-display">--</span>
            <span id="stop-count">Stops: 0</span>
        </div>

    </div>
</div>

<button class="playlist-toggle" id="playlistToggle" onclick="togglePlaylist()">Repertoire</button>

<div class="playlist-panel" id="playlistPanel" style="display:none;">
    <div class="playlist-box">
        <div class="playlist-header">
            <h2>Classical Repertoire</h2>
            <div class="playlist-transport">
                <button class="transport-btn" id="btnPrev" onclick="playlistPrev()" title="Previous">&#9198;</button>
                <button class="transport-btn" id="btnPlay" onclick="playlistPlayPause()" title="Play">&#9654;</button>
                <button class="transport-btn" id="btnStop" onclick="playlistStop()" title="Stop">&#9632;</button>
                <button class="transport-btn" id="btnNext" onclick="playlistNext()" title="Next">&#9197;</button>
            </div>
        </div>
        <div class="now-playing" id="nowPlaying"></div>
        <div class="progress-wrap">
            <div class="progress-bar-outer" id="progressOuter" onclick="seekPlayback(event)">
                <div class="progress-bar-inner" id="progressInner"></div>
            </div>
            <span class="progress-time" id="progressTime">0:00 / 0:00</span>
        </div>
        <div class="playlist-tracks" id="playlistTracks"></div>
    </div>
</div>

<script>
// ============================================================
// Cathedral Grand - 3-Manual Pipe Organ Simulator
// ============================================================

// --- Audio Context & Nodes ---
let audioCtx = null;
let masterGain = null;
let compressor = null;
let convolver = null;
let dryGain = null;
let wetGain = null;
let swellGain = null;
let greatGain = null;
let choirGain = null;
let pedalGain = null;
let powered = false;
let activeNotes = {};  // key: "division-midi" -> {oscillators, gains}
let animFrame = null;

// --- Stop Definitions ---
const STOPS = {
    swell: [
        { id: 'sw-bourdon16',    name: 'Bourdon',       footage: "16'", wave: 'sine',     pitch: 0.5,  gain: 0.25, lp: 600 },
        { id: 'sw-gedeckt8',     name: 'Gedeckt',       footage: "8'",  wave: 'sine',     pitch: 1,    gain: 0.28, lp: 1200 },
        { id: 'sw-salicional8',  name: 'Salicional',    footage: "8'",  wave: 'sawtooth', pitch: 1,    gain: 0.15, lp: 2000 },
        { id: 'sw-voxceleste8',  name: 'Vox Celeste',   footage: "8'",  wave: 'sawtooth', pitch: 1.002, gain: 0.13, lp: 1800 },
        { id: 'sw-principal4',   name: 'Principal',      footage: "4'",  wave: 'sawtooth', pitch: 2,    gain: 0.18, lp: 3000 },
        { id: 'sw-flute4',      name: 'Flute',          footage: "4'",  wave: 'triangle', pitch: 2,    gain: 0.16, lp: 2500 },
        { id: 'sw-nazard223',   name: 'Nazard',         footage: "2 2/3'", wave: 'sine',  pitch: 3,    gain: 0.10, lp: 3500 },
        { id: 'sw-blockflute2', name: 'Blockflute',     footage: "2'",  wave: 'triangle', pitch: 4,    gain: 0.12, lp: 4000 },
        { id: 'sw-oboe8',       name: 'Oboe',           footage: "8'",  wave: 'sawtooth', pitch: 1,    gain: 0.22, lp: 2800 },
        { id: 'sw-tremulant',   name: 'Tremulant',      footage: '',    wave: 'tremulant', pitch: 0, gain: 0, lp: 0 },
    ],
    great: [
        { id: 'gt-principal16', name: 'Principal',      footage: "16'", wave: 'sawtooth', pitch: 0.5,  gain: 0.22, lp: 800 },
        { id: 'gt-principal8',  name: 'Principal',       footage: "8'",  wave: 'sawtooth', pitch: 1,    gain: 0.30, lp: 3000 },

        { id: 'pd-trombone16',  name: 'Trombone',       footage: "16'", wave: 'sawtooth', pitch: 0.5,  gain: 0.28, lp: 1200 },
    ],

// Active stops state
const activeStops = {};
Object.keys(STOPS).forEach(div => {
    activeStops[div] = new Set();
});

// --- Expression state ---
const expression = { swell: 0.8, choir: 0.8, master: 0.7 };

// --- Note name mapping ---
const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
function midiToNoteName(midi) {
    return NOTE_NAMES[midi % 12] + Math.floor(midi / 12 - 1);
}
function midiToFreq(midi) {
    return 440 * Math.pow(2, (midi - 69) / 12);
}

// --- Initialize Audio ---
function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Master compressor
    compressor = audioCtx.createDynamicsCompressor();
    compressor.threshold.value = -15;
    compressor.knee.value = 20;
    compressor.ratio.value = 10;
    compressor.attack.value = 0.003;
    compressor.release.value = 0.15;

    // Master gain
    masterGain = audioCtx.createGain();
    masterGain.gain.value = expression.master;

    // Division gains
    swellGain = audioCtx.createGain();
    swellGain.gain.value = expression.swell;
    greatGain = audioCtx.createGain();
    greatGain.gain.value = 1.0;
    choirGain = audioCtx.createGain();
    choirGain.gain.value = expression.choir;
    pedalGain = audioCtx.createGain();
    pedalGain.gain.value = 1.0;

    // Convolver for cathedral reverb
    convolver = audioCtx.createConvolver();
    convolver.buffer = generateImpulseResponse(3.2, 3.5, false);

    // Dry/wet mix
    dryGain = audioCtx.createGain();
    dryGain.gain.value = 0.55;
    wetGain = audioCtx.createGain();
    wetGain.gain.value = 0.45;

    // Route: divisions -> compressor -> dry/wet -> master -> destination
    swellGain.connect(compressor);
    greatGain.connect(compressor);
    choirGain.connect(compressor);
    pedalGain.connect(compressor);

    compressor.connect(dryGain);
    compressor.connect(convolver);
    convolver.connect(wetGain);
    dryGain.connect(masterGain);
    wetGain.connect(masterGain);
    masterGain.connect(audioCtx.destination);
}

// --- Generate cathedral impulse response ---
function generateImpulseResponse(duration, decay, reverse) {
    const rate = audioCtx.sampleRate;
    const length = rate * duration;
    const impulse = audioCtx.createBuffer(2, length, rate);
    for (let ch = 0; ch < 2; ch++) {
        const data = impulse.getChannelData(ch);
        for (let i = 0; i < length; i++) {
            const t = i / rate;
            // Cathedral: multi-layered decay with early reflections
            let sample = (Math.random() * 2 - 1);
            // Early reflections
            const early = t < 0.08 ? Math.sin(t * 200) * 0.3 * (1 - t / 0.08) : 0;
            // Late reverb tail
            const env = Math.pow(1 - i / length, decay) * Math.exp(-3 * t);
            // Slight modulation for richness
            const mod = 1 + 0.02 * Math.sin(t * 1.7);
            data[i] = (sample * env * mod + early) * 0.6;
        }
    }
    if (reverse) {
        for (let ch = 0; ch < 2; ch++) {
            Array.prototype.reverse.call(impulse.getChannelData(ch));
        }
    }
    return impulse;
}

// --- Division gain node lookup ---
function getDivisionGain(division) {
    switch (division) {
        case 'swell': return swellGain;
        case 'great': return greatGain;
        case 'choir': return choirGain;
        case 'pedal': return pedalGain;
    }
}

// --- Check if tremulant is active for a division ---
function isTremulantActive(division) {
    return activeStops[division].has(division === 'swell' ? 'sw-tremulant' :
           division === 'choir' ? 'ch-tremulant' : null);
}

// --- Play a note ---
function playNote(division, midi) {
    const key = division + '-' + midi;
    if (activeNotes[key]) return; // already sounding

    const stops = STOPS[division].filter(s => activeStops[division].has(s.id) && s.wave !== 'tremulant');
    if (stops.length === 0) return;

    const freq = midiToFreq(midi);
    const t = audioCtx.currentTime;
    const divGain = getDivisionGain(division);
    const useTremulant = isTremulantActive(division);

    const oscillators = [];
    const gains = [];
    let tremLfo = null;
    let tremGainNode = null;

    // Tremulant LFO
    if (useTremulant) {
        tremLfo = audioCtx.createOscillator();
        tremLfo.type = 'sine';
        tremLfo.frequency.value = 6.0;
        tremGainNode = audioCtx.createGain();
        tremGainNode.gain.value = 0.06;
        tremLfo.connect(tremGainNode);
        tremLfo.start(t);
    }

    stops.forEach(stop => {
        if (stop.wave === 'mixture') {
            // Mixture: creates multiple harmonics
            const mixturePitches = [2, 2.67, 4, 5.33];
            mixturePitches.forEach((mp, idx) => {
                const osc = audioCtx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.value = freq * mp + (Math.random() - 0.5) * 0.8;
                const g = audioCtx.createGain();
                g.gain.setValueAtTime(0, t);
                g.gain.linearRampToValueAtTime(stop.gain * 0.6, t + 0.04);
                const lp = audioCtx.createBiquadFilter();
                lp.type = 'lowpass';
                lp.frequency.value = stop.lp;
                lp.Q.value = 0.7;
                osc.connect(lp);
                lp.connect(g);
                if (useTremulant && tremGainNode) {
                    tremGainNode.connect(g.gain);
                }
                g.connect(divGain);
                osc.start(t);
                oscillators.push(osc);
                gains.push(g);
            });
        } else {
            const osc = audioCtx.createOscillator();
            osc.type = stop.wave;
            osc.frequency.value = freq * stop.pitch + (Math.random() - 0.5) * 0.5;
            const g = audioCtx.createGain();
            // Wind attack: slight ramp-up like real pipes
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(stop.gain, t + 0.03 + Math.random() * 0.02);
            const lp = audioCtx.createBiquadFilter();
            lp.type = 'lowpass';
            lp.frequency.value = stop.lp;
            lp.Q.value = 0.7;
            osc.connect(lp);
            lp.connect(g);
            if (useTremulant && tremGainNode) {
                tremGainNode.connect(g.gain);
            }
            g.connect(divGain);
            osc.start(t);
            oscillators.push(osc);
            gains.push(g);
        }
    });

    activeNotes[key] = { oscillators, gains, tremLfo, tremGainNode };

    // Update visuals
    highlightKey(division, midi, true);
    highlightPipe(midi, true);
    updateNoteDisplay(division, midi);
}

// --- Stop a note ---
function stopNote(division, midi) {
    const key = division + '-' + midi;
    const note = activeNotes[key];
    if (!note) return;

    const t = audioCtx.currentTime;
    const fadeTime = 0.08;

    note.gains.forEach(g => {
        g.gain.cancelScheduledValues(t);
        g.gain.setValueAtTime(g.gain.value, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + fadeTime);
    });

    note.oscillators.forEach(osc => {
        osc.stop(t + fadeTime + 0.01);
    });

    if (note.tremLfo) {
        note.tremLfo.stop(t + fadeTime + 0.01);
    }

    delete activeNotes[key];
    highlightKey(division, midi, false);
    highlightPipe(midi, false);
}

// --- Build Stop Buttons ---
function buildStops() {
    Object.keys(STOPS).forEach(division => {
        const container = document.getElementById(division + '-stops');
        STOPS[division].forEach(stop => {
            const btn = document.createElement('button');
            btn.className = 'stop-btn';
            btn.dataset.stopId = stop.id;
            btn.innerHTML = stop.name + (stop.footage ? '<span class="footage">' + stop.footage + '</span>' : '');
            btn.addEventListener('click', () => toggleStop(division, stop.id, btn));
            container.appendChild(btn);
        });
    });
}

function toggleStop(division, stopId, btn) {
    if (activeStops[division].has(stopId)) {
        activeStops[division].delete(stopId);
        btn.classList.remove('active');
    } else {
        activeStops[division].add(stopId);
        btn.classList.add('active');
    }
    updateStopCount();
}

function updateStopCount() {
    let total = 0;
    Object.values(activeStops).forEach(s => total += s.size);
    document.getElementById('stop-count').textContent = 'Stops: ' + total;
}

// --- Build Keyboards ---
function buildKeyboard(elementId, startMidi, endMidi) {
    const kb = document.getElementById(elementId);
    const division = kb.dataset.division;
    for (let midi = startMidi; midi <= endMidi; midi++) {
        const note = midi % 12;
        const isBlack = [1, 3, 6, 8, 10].includes(note);
        const key = document.createElement('div');
        key.className = isBlack ? 'black-key' : 'white-key';
        key.dataset.midi = midi;
        key.dataset.division = division;

        // Mouse events
        key.addEventListener('mousedown', (e) => {
            e.preventDefault();
            playNote(division, midi);
            key._mouseHeld = true;
        });
        key.addEventListener('mouseenter', (e) => {
            if (e.buttons === 1) {
                playNote(division, midi);
                key._mouseHeld = true;
            }
        });
        key.addEventListener('mouseleave', () => {
            if (key._mouseHeld) {
                stopNote(division, midi);
                key._mouseHeld = false;
            }
        });
        key.addEventListener('mouseup', () => {
            stopNote(division, midi);
            key._mouseHeld = false;
        });

        // Touch events
        key.addEventListener('touchstart', (e) => {
            e.preventDefault();
            playNote(division, midi);
        });
        key.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopNote(division, midi);
        });

        kb.appendChild(key);
    }
}

// --- Highlight keys ---
function highlightKey(division, midi, on) {
    const kb = document.getElementById(division + '-kb');
    if (!kb) return;
    const key = kb.querySelector('[data-midi="' + midi + '"]');
    if (key) {
        key.classList.toggle('sounding', on);
        key.classList.toggle('pressed', on);
    }
}

// --- Build & animate pipes ---
function buildPipes() {
    const display = document.getElementById('pipeDisplay');
    display.innerHTML = '';
    // 61 pipes for a 5-octave display
    for (let i = 0; i < 61; i++) {
        const pipe = document.createElement('div');
        pipe.className = 'pipe';
        pipe.dataset.index = i;
        // Height follows organ facade pattern: taller in middle, shorter at edges
        const center = 30;
        const dist = Math.abs(i - center) / center;
        const h = 90 - dist * 50 + Math.sin(i * 0.5) * 8;
        pipe.style.height = h + 'px';
        // Color: warm metallic gradient
        const hue = 35 + (i / 61) * 15;
        const lightness = 35 + Math.sin(i * 0.3) * 10;
        pipe.style.background = `linear-gradient(180deg, hsl(${hue}, 40%, ${lightness + 15}%), hsl(${hue}, 35%, ${lightness}%), hsl(${hue}, 30%, ${lightness - 5}%))`;
        display.appendChild(pipe);
    }
}

function highlightPipe(midi, on) {
    const index = midi - 36; // map midi 36-96 to pipe 0-60
    if (index < 0 || index > 60) return;
    const pipes = document.querySelectorAll('.pipe');
    if (pipes[index]) {
        pipes[index].classList.toggle('sounding', on);
        if (on) {
            const hue = 40 + Math.random() * 20;
            pipes[index].style.background = `linear-gradient(180deg, hsl(${hue}, 80%, 65%), hsl(${hue}, 70%, 50%), hsl(${hue}, 60%, 40%))`;
            pipes[index].style.boxShadow = `0 0 12px rgba(212,175,55,0.7), inset 0 0 6px rgba(255,220,100,0.4)`;
        } else {
            const i = index;
            const hue = 35 + (i / 61) * 15;
            const lightness = 35 + Math.sin(i * 0.3) * 10;
            pipes[index].style.background = `linear-gradient(180deg, hsl(${hue}, 40%, ${lightness + 15}%), hsl(${hue}, 35%, ${lightness}%), hsl(${hue}, 30%, ${lightness - 5}%))`;
            pipes[index].style.boxShadow = 'none';
        }
    }
}

// --- Note display ---
function updateNoteDisplay(division, midi) {
    const el = document.getElementById('note-display');
    el.textContent = division.charAt(0).toUpperCase() + division.slice(1) + ': ' + midiToNoteName(midi);
}

// --- Computer Keyboard Mapping ---
// ZXCVBNM, row = Great (C4-B4 naturals plus sharps via shifted keys)
// ASDFGHJ row = Swell
// QWERTYU row = Choir
const QWERTY_GREAT = {
    'KeyZ': 60, 'KeyS': 61, 'KeyX': 62, 'KeyD': 63, 'KeyC': 64,
    'KeyV': 65, 'KeyG': 66, 'KeyB': 67, 'KeyH': 68, 'KeyN': 69,
    'KeyJ': 70, 'KeyM': 71, 'Comma': 72, 'KeyL': 73, 'Period': 74,
    'Semicolon': 75, 'Slash': 76
};
const QWERTY_SWELL = {
    'KeyA': 60, 'KeyW': 61, 'KeyS_swell': -1, // Handled via shift
    'KeyD_swell': -1,
    // Swell uses the A-row with a simple mapping
};
// Simpler approach: use modifier-free rows
const KB_MAPS = {
    // Bottom row (Z-M): Great manual, C4 to C5
    great: { 'KeyZ': 60, 'KeyX': 62, 'KeyC': 64, 'KeyV': 65, 'KeyB': 67, 'KeyN': 69, 'KeyM': 71, 'Comma': 72 },
    // Middle row (A-L): Swell manual
    swell: { 'KeyA': 60, 'KeyS': 62, 'KeyD': 64, 'KeyF': 65, 'KeyG': 67, 'KeyH': 69, 'KeyJ': 71, 'KeyK': 72 },
    // Top row (Q-U): Choir manual
    choir: { 'KeyQ': 60, 'KeyW': 62, 'KeyE': 64, 'KeyR': 65, 'KeyT': 67, 'KeyY': 69, 'KeyU': 71, 'KeyI': 72 },
};
// Add black keys using number row for choir sharps and other combos
const KB_SHARPS = {
    // Number row sharps for choir
    'Digit2': { division: 'choir', midi: 61 },
    'Digit3': { division: 'choir', midi: 63 },
    'Digit5': { division: 'choir', midi: 66 },
    'Digit6': { division: 'choir', midi: 68 },
    'Digit7': { division: 'choir', midi: 70 },
    // Between A-row sharps for swell (using common interspersed keys is tricky,
    // so we use the QWERTY standard piano-like layout within each row)
};

const heldKeys = new Set();

document.addEventListener('keydown', (e) => {
    if (!powered || e.repeat) return;
    // Prevent enhance.js shortcuts from firing when playing organ
    if (['Space', 'KeyR', 'KeyF', 'KeyP'].includes(e.code) && !e.ctrlKey && !e.metaKey) {
        // Only block these if we might be playing the organ
    }
    const code = e.code;
    if (heldKeys.has(code)) return;

    // Check each division
    for (const [division, map] of Object.entries(KB_MAPS)) {
        if (map[code] !== undefined) {
            heldKeys.add(code);
            playNote(division, map[code]);
            return;
        }
    }
    // Check sharps
    if (KB_SHARPS[code]) {
        heldKeys.add(code);
        playNote(KB_SHARPS[code].division, KB_SHARPS[code].midi);
        return;
    }
});

document.addEventListener('keyup', (e) => {
    if (!powered) return;
    const code = e.code;
    if (!heldKeys.has(code)) return;
    heldKeys.delete(code);

    for (const [division, map] of Object.entries(KB_MAPS)) {
        if (map[code] !== undefined) {
            stopNote(division, map[code]);
            return;
        }
    }
    if (KB_SHARPS[code]) {
        stopNote(KB_SHARPS[code].division, KB_SHARPS[code].midi);
    }
});

// --- Expression pedal handlers ---
document.getElementById('swell-expr').addEventListener('input', (e) => {
    expression.swell = e.target.value / 100;
    document.getElementById('swell-expr-val').textContent = e.target.value + '%';
    if (swellGain) swellGain.gain.linearRampToValueAtTime(expression.swell, audioCtx.currentTime + 0.05);
});
document.getElementById('choir-expr').addEventListener('input', (e) => {
    expression.choir = e.target.value / 100;
    document.getElementById('choir-expr-val').textContent = e.target.value + '%';
    if (choirGain) choirGain.gain.linearRampToValueAtTime(expression.choir, audioCtx.currentTime + 0.05);
});
document.getElementById('master-vol').addEventListener('input', (e) => {
    expression.master = e.target.value / 100;
    document.getElementById('master-vol-val').textContent = e.target.value + '%';
    if (masterGain) masterGain.gain.linearRampToValueAtTime(expression.master, audioCtx.currentTime + 0.05);
});

// --- Power Toggle ---
function togglePower() {
    const btn = document.getElementById('power-btn');
    const wrapper = document.getElementById('consoleWrapper');
    if (!powered) {
        if (!audioCtx) initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        powered = true;
        btn.classList.add('on');
        btn.textContent = 'Wind Chest Active';
        wrapper.classList.add('powered');
        startAnimation();
    } else {
        powered = false;
        btn.classList.remove('on');
        btn.textContent = 'Activate Wind Chest';
        wrapper.classList.remove('powered');
        // Stop all notes
        Object.keys(activeNotes).forEach(key => {
            const [div, midi] = key.split('-');
            stopNote(div, parseInt(midi));
        });
        stopAnimation();
    }
}

// --- Rose Window Drawing ---
function drawRoseWindow() {
    const canvas = document.getElementById('roseCanvas');
    const ctx = canvas.getContext('2d');
    const cx = 200, cy = 200, r = 190;

    ctx.clearRect(0, 0, 400, 400);

    // Background circle
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#0a0705';
    ctx.fill();
    ctx.strokeStyle = '#5a3d20';
    ctx.lineWidth = 4;
    ctx.stroke();

    // Stained glass petals
    const colors = [
        'rgba(180, 40, 40, 0.6)',
        'rgba(40, 80, 160, 0.6)',
        'rgba(160, 120, 20, 0.5)',
        'rgba(30, 120, 60, 0.5)',
        'rgba(120, 40, 140, 0.5)',
        'rgba(180, 80, 20, 0.5)',
        'rgba(40, 100, 140, 0.5)',
        'rgba(140, 60, 30, 0.5)',
    ];

    // Outer petals
    for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2 - Math.PI / 2;
        const px = cx + Math.cos(angle) * r * 0.6;
        const py = cy + Math.sin(angle) * r * 0.6;
        ctx.beginPath();
        ctx.ellipse(px, py, r * 0.35, r * 0.18, angle, 0, Math.PI * 2);
        ctx.fillStyle = colors[i];
        ctx.fill();
        ctx.strokeStyle = '#3a2a18';
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    // Inner petals
    for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2 + Math.PI / 8 - Math.PI / 2;
        const px = cx + Math.cos(angle) * r * 0.33;
        const py = cy + Math.sin(angle) * r * 0.33;
        ctx.beginPath();
        ctx.ellipse(px, py, r * 0.2, r * 0.1, angle, 0, Math.PI * 2);
        ctx.fillStyle = colors[(i + 4) % 8];
        ctx.fill();
        ctx.strokeStyle = '#3a2a18';
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    // Center circle
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.12, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.12);
    grad.addColorStop(0, 'rgba(212, 175, 55, 0.8)');
    grad.addColorStop(1, 'rgba(140, 100, 20, 0.5)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = '#d4af37';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Radial tracery lines
    ctx.strokeStyle = 'rgba(58, 42, 24, 0.5)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 16; i++) {
        const angle = (i / 16) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(angle) * r * 0.14, cy + Math.sin(angle) * r * 0.14);
        ctx.lineTo(cx + Math.cos(angle) * r * 0.95, cy + Math.sin(angle) * r * 0.95);
        ctx.stroke();
    }

    // Outer ring
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.95, 0, Math.PI * 2);
    ctx.strokeStyle = '#5a3d20';
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.75, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(58, 42, 24, 0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
}

// --- Rose Window Glow Animation ---
let rosePhase = 0;
function animateRoseGlow() {
    const canvas = document.getElementById('roseCanvas');
    const ctx = canvas.getContext('2d');
    const cx = 200, cy = 200;

    // Count active notes for intensity
    const noteCount = Object.keys(activeNotes).length;
    const intensity = Math.min(noteCount / 8, 1);

    if (intensity > 0) {
        rosePhase += 0.03;
        // Pulsing glow overlay
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const glowR = 100 + Math.sin(rosePhase) * 20;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
        grad.addColorStop(0, `rgba(212, 175, 55, ${0.15 * intensity})`);
        grad.addColorStop(0.5, `rgba(180, 60, 20, ${0.08 * intensity})`);
        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 400, 400);
        ctx.restore();
    }
}

// --- Stained Glass Background ---
function buildStainedGlassBg() {
    const bg = document.getElementById('stainedBg');
    const colors = ['#8b2020', '#204080', '#806020', '#207040', '#602080', '#805020', '#205060'];
    for (let i = 0; i < 12; i++) {
        const shard = document.createElement('div');
        shard.className = 'shard';
        shard.style.width = (100 + Math.random() * 300) + 'px';
        shard.style.height = (100 + Math.random() * 300) + 'px';
        shard.style.left = (Math.random() * 100) + '%';
        shard.style.top = (Math.random() * 100) + '%';
        shard.style.background = colors[Math.floor(Math.random() * colors.length)];
        bg.appendChild(shard);
    }
}

// --- Animation Loop ---
function startAnimation() {
    function loop() {
        if (!powered) return;
        drawRoseWindow();
        animateRoseGlow();
        animFrame = requestAnimationFrame(loop);
    }
    animFrame = requestAnimationFrame(loop);
}

function stopAnimation() {
    if (animFrame) {
        cancelAnimationFrame(animFrame);
        animFrame = null;
    }
    drawRoseWindow();
}

// --- Preset Registrations ---
function activatePreset(preset) {
    // Clear all stops first
    Object.keys(activeStops).forEach(div => activeStops[div].clear());
    document.querySelectorAll('.stop-btn').forEach(b => b.classList.remove('active'));

    const presets = {
        'plenum': {
            great: ['gt-principal16', 'gt-principal8', 'gt-octave4', 'gt-superoctave2', 'gt-mixture', 'gt-trumpet8'],
            swell: ['sw-principal4', 'sw-salicional8', 'sw-voxceleste8', 'sw-oboe8'],
            choir: ['ch-principal4', 'ch-gedeckt8'],
            pedal: ['pd-principal16', 'pd-octave8', 'pd-trombone16'],
        },
        'soft': {
            great: ['gt-bourdon8'],
            swell: ['sw-gedeckt8', 'sw-salicional8', 'sw-voxceleste8', 'sw-tremulant'],
            choir: ['ch-dulciana8', 'ch-rohrflute4', 'ch-tremulant'],
            pedal: ['pd-subbass16'],
        },
        'full': {
            great: ['gt-principal16', 'gt-principal8', 'gt-bourdon8', 'gt-octave4', 'gt-spitzflute4', 'gt-superoctave2', 'gt-mixture', 'gt-trumpet8'],
            swell: ['sw-bourdon16', 'sw-gedeckt8', 'sw-salicional8', 'sw-voxceleste8', 'sw-principal4', 'sw-flute4', 'sw-nazard223', 'sw-blockflute2', 'sw-oboe8'],
            choir: ['ch-gedeckt8', 'ch-dulciana8', 'ch-principal4', 'ch-rohrflute4', 'ch-waldflute2', 'ch-cromorne8'],
            pedal: ['pd-subbass32', 'pd-principal16', 'pd-subbass16', 'pd-octave8', 'pd-trombone16'],
        }
    };

    const reg = presets[preset];
    if (!reg) return;

    Object.entries(reg).forEach(([division, stopIds]) => {
        stopIds.forEach(id => {
            activeStops[division].add(id);
            const btn = document.querySelector(`.stop-btn[data-stop-id="${id}"]`);
            if (btn) btn.classList.add('active');
        });
    });
    updateStopCount();
}

// ============================================================
// PLAYLIST / PLAYBACK ENGINE
// ============================================================

const PLAYLIST = []; // Populated by piece data below

const playback = {
    playing: false,
    paused: false,
    currentTrack: -1,
    startTime: 0,
    pauseTime: 0,
    scheduledEvents: [],
    timeouts: [],
    totalDuration: 0,
    progressRAF: null,
};

function togglePlaylist() {
    const panel = document.getElementById('playlistPanel');
    const btn = document.getElementById('playlistToggle');
    if (panel.style.display === 'none') {
        panel.style.display = 'block';
        btn.textContent = 'Hide Repertoire';
    } else {
        panel.style.display = 'none';
        btn.textContent = 'Repertoire';
    }
}

function buildPlaylistUI() {
    const container = document.getElementById('playlistTracks');
    container.innerHTML = '';
    PLAYLIST.forEach((piece, i) => {
        const dur = getPieceDuration(piece);
        const item = document.createElement('div');
        item.className = 'track-item';
        item.dataset.index = i;
        item.innerHTML = `
            <span class="track-num">${i + 1}</span>
            <div class="track-info">
                <div class="track-title">${piece.title}</div>
                <div class="track-composer">${piece.composer}${piece.catalog ? ' \u2022 ' + piece.catalog : ''}</div>
            </div>
            <span class="track-dur">${formatTime(dur)}</span>
        `;
        item.addEventListener('click', () => selectAndPlay(i));
        container.appendChild(item);
    });
}

function getPieceDuration(piece) {
    if (!piece.events || piece.events.length === 0) return 0;
    let maxTime = 0;
    piece.events.forEach(e => {
        const end = e.t + (e.dur || 0);
        if (end > maxTime) maxTime = end;
    });
    return (maxTime / piece.tempo) * 60; // Convert beats to seconds
}

function formatTime(secs) {
    const m = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
}

function selectAndPlay(index) {
    playlistStop();
    playback.currentTrack = index;
    updateTrackHighlights();
    startPlayback();
}

function playlistPlayPause() {
    if (playback.playing && !playback.paused) {
        pausePlayback();
    } else if (playback.paused) {
        resumePlayback();
    } else {
        if (playback.currentTrack < 0) playback.currentTrack = 0;
        startPlayback();
    }
}

function playlistStop() {
    // Clear all scheduled timeouts
    playback.timeouts.forEach(t => clearTimeout(t));
    playback.timeouts = [];
    playback.playing = false;
    playback.paused = false;
    playback.pauseTime = 0;
    // Stop all sounding notes
    Object.keys(activeNotes).forEach(key => {
        const parts = key.split('-');
        stopNote(parts[0], parseInt(parts[1]));
    });
    if (playback.progressRAF) cancelAnimationFrame(playback.progressRAF);
    playback.progressRAF = null;
    document.getElementById('btnPlay').innerHTML = '&#9654;';
    document.getElementById('btnPlay').classList.remove('active');
    document.getElementById('progressInner').style.width = '0%';
    document.getElementById('progressTime').textContent = '0:00 / 0:00';
    document.getElementById('nowPlaying').textContent = '';
    updateTrackHighlights();
}

function playlistNext() {
    if (PLAYLIST.length === 0) return;
    playlistStop();
    playback.currentTrack = (playback.currentTrack + 1) % PLAYLIST.length;
    updateTrackHighlights();
    startPlayback();
}

function playlistPrev() {
    if (PLAYLIST.length === 0) return;
    playlistStop();
    playback.currentTrack = (playback.currentTrack - 1 + PLAYLIST.length) % PLAYLIST.length;
    updateTrackHighlights();
    startPlayback();
}

function startPlayback() {
    const piece = PLAYLIST[playback.currentTrack];
    if (!piece || !piece.events || piece.events.length === 0) return;

    // Ensure power is on
    if (!powered) togglePower();

    // Apply registration
    applyRegistration(piece.registration);

    // Calculate timing
    const bps = piece.tempo / 60; // beats per second
    playback.totalDuration = getPieceDuration(piece);
    playback.startTime = performance.now() / 1000;
    playback.playing = true;
    playback.paused = false;

    document.getElementById('btnPlay').innerHTML = '&#10074;&#10074;';
    document.getElementById('btnPlay').classList.add('active');
    document.getElementById('nowPlaying').textContent = piece.composer + ' \u2014 ' + piece.title;
    updateTrackHighlights();

    // Schedule all note events as timeouts
    playback.timeouts = [];
    piece.events.forEach(evt => {
        const onTime = (evt.t / bps) * 1000; // ms from start
        const offTime = ((evt.t + evt.dur) / bps) * 1000;

        const onTimeout = setTimeout(() => {
            if (!playback.playing || playback.paused) return;
            playNote(evt.div, evt.midi);
        }, onTime);

        const offTimeout = setTimeout(() => {
            if (!playback.paused) stopNote(evt.div, evt.midi);
        }, offTime);

        playback.timeouts.push(onTimeout, offTimeout);
    });

    // Schedule end of piece
    const endTimeout = setTimeout(() => {
        if (!playback.playing) return;
        // Auto-advance to next track
        if (playback.currentTrack < PLAYLIST.length - 1) {
            playback.currentTrack++;
            playback.playing = false;
            startPlayback();
        } else {
            playlistStop();
        }
    }, playback.totalDuration * 1000 + 500);
    playback.timeouts.push(endTimeout);

    // Start progress animation
    updateProgress();
}

function pausePlayback() {
    playback.paused = true;
    playback.pauseTime = performance.now() / 1000 - playback.startTime;
    // Clear pending timeouts
    playback.timeouts.forEach(t => clearTimeout(t));
    playback.timeouts = [];
    // Stop sounding notes
    Object.keys(activeNotes).forEach(key => {
        const parts = key.split('-');
        stopNote(parts[0], parseInt(parts[1]));
    });
    document.getElementById('btnPlay').innerHTML = '&#9654;';
    document.getElementById('btnPlay').classList.remove('active');
    if (playback.progressRAF) cancelAnimationFrame(playback.progressRAF);
}

function resumePlayback() {
    const piece = PLAYLIST[playback.currentTrack];
    if (!piece) return;

    const bps = piece.tempo / 60;
    const resumeOffset = playback.pauseTime; // seconds into the piece
    playback.startTime = performance.now() / 1000 - resumeOffset;
    playback.paused = false;

    document.getElementById('btnPlay').innerHTML = '&#10074;&#10074;';
    document.getElementById('btnPlay').classList.add('active');

    // Re-schedule remaining events
    playback.timeouts = [];
    piece.events.forEach(evt => {
        const onTimeSec = evt.t / bps;
        const offTimeSec = (evt.t + evt.dur) / bps;

        if (offTimeSec > resumeOffset) {
            const onDelay = Math.max(0, (onTimeSec - resumeOffset) * 1000);
            const offDelay = Math.max(0, (offTimeSec - resumeOffset) * 1000);

            if (onTimeSec >= resumeOffset) {
                playback.timeouts.push(setTimeout(() => {
                    if (!playback.playing || playback.paused) return;
                    playNote(evt.div, evt.midi);
                }, onDelay));
            } else {
                // Note should already be sounding - start it now
                playNote(evt.div, evt.midi);
            }
            playback.timeouts.push(setTimeout(() => {
                if (!playback.paused) stopNote(evt.div, evt.midi);
            }, offDelay));
        }
    });

    // Re-schedule end
    const remaining = (playback.totalDuration - resumeOffset) * 1000 + 500;
    playback.timeouts.push(setTimeout(() => {
        if (!playback.playing) return;
        if (playback.currentTrack < PLAYLIST.length - 1) {
            playback.currentTrack++;
            playback.playing = false;
            startPlayback();
        } else {
            playlistStop();
        }
    }, remaining));

    updateProgress();
}

function updateProgress() {
    if (!playback.playing || playback.paused) return;
    const elapsed = performance.now() / 1000 - playback.startTime;
    const pct = Math.min(100, (elapsed / playback.totalDuration) * 100);
    document.getElementById('progressInner').style.width = pct + '%';
    document.getElementById('progressTime').textContent =
        formatTime(elapsed) + ' / ' + formatTime(playback.totalDuration);
    playback.progressRAF = requestAnimationFrame(updateProgress);
}

function seekPlayback(e) {
    if (!playback.playing && !playback.paused) return;
    const rect = document.getElementById('progressOuter').getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    const seekTo = pct * playback.totalDuration;
    const wasPaused = playback.paused;
    pausePlayback();
    playback.pauseTime = seekTo;
    if (!wasPaused) resumePlayback();
}

function applyRegistration(reg) {
    if (!reg) return;
    // Clear all stops
    Object.keys(activeStops).forEach(div => activeStops[div].clear());
    document.querySelectorAll('.stop-btn').forEach(b => b.classList.remove('active'));
    // Apply new registration
    Object.entries(reg).forEach(([division, stopIds]) => {
        if (!stopIds) return;
        stopIds.forEach(id => {
            activeStops[division].add(id);
            const btn = document.querySelector(`.stop-btn[data-stop-id="${id}"]`);
            if (btn) btn.classList.add('active');
        });
    });
    updateStopCount();
}

function updateTrackHighlights() {
    document.querySelectorAll('.track-item').forEach((el, i) => {
        el.classList.toggle('active', i === playback.currentTrack);
        el.classList.toggle('playing', i === playback.currentTrack && playback.playing && !playback.paused);
    });
}

// --- Reset ---
window.reset = function() {
    // Stop playlist if playing
    playlistStop();
    // Stop all notes
    Object.keys(activeNotes).forEach(key => {
        const parts = key.split('-');
        const div = parts[0];
        const midi = parseInt(parts[1]);
        stopNote(div, midi);
    });
    // Clear all stops
    Object.keys(activeStops).forEach(div => activeStops[div].clear());
    document.querySelectorAll('.stop-btn').forEach(b => b.classList.remove('active'));
    updateStopCount();
    // Reset expression
    expression.swell = 0.8;
    expression.choir = 0.8;
    expression.master = 0.7;
    document.getElementById('swell-expr').value = 80;
    document.getElementById('choir-expr').value = 80;
    document.getElementById('master-vol').value = 70;
    document.getElementById('swell-expr-val').textContent = '80%';
    document.getElementById('choir-expr-val').textContent = '80%';
    document.getElementById('master-vol-val').textContent = '70%';
    if (swellGain) swellGain.gain.value = 0.8;
    if (choirGain) choirGain.gain.value = 0.8;
    if (masterGain) masterGain.gain.value = 0.7;
    document.getElementById('note-display').textContent = '--';
    heldKeys.clear();
};

// --- Initialize ---
function init() {
    buildStainedGlassBg();
    drawRoseWindow();
    buildStops();
    // Manuals: Swell=C3-C6, Great=C3-C6, Choir=C3-C6, Pedal=C2-G4
    buildKeyboard('swell-kb', 48, 84);
    buildKeyboard('great-kb', 48, 84);
    buildKeyboard('choir-kb', 48, 84);
    buildKeyboard('pedal-kb', 36, 67);
    buildPipes();
    buildPlaylistUI();
}

init();
