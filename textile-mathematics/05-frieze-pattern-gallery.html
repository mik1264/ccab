<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frieze Pattern Gallery - Textile Mathematics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }

.controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 12px 20px;
    border-radius: 16px; border: 1px solid rgba(138,154,91,0.3); z-index: 100;
}
.controls label { font-size: 0.85rem; color: #8A9A5B; }
.controls select, .controls input[type=range] {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(138,154,91,0.4);
    color: #FEFAE0; padding: 4px 8px; border-radius: 8px; font-size: 0.85rem; cursor: pointer;
}
.controls input[type=range] { width: 100px; }

.info-panel {
    position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 14px;
    border: 1px solid rgba(138,154,91,0.3); max-width: 280px; z-index: 100;
}
.info-panel h2 { font-size: 1rem; color: #DDA15E; margin-bottom: 6px; }
.info-panel p { font-size: 0.8rem; line-height: 1.5; opacity: 0.8; }
.info-panel .group-name { font-size: 0.9rem; color: #8A9A5B; margin-top: 8px; font-weight: bold; }
</style>
</head>
<body>
<a href="index.html">&larr; Back</a>

<div class="info-panel">
    <h2>Seven Frieze Groups</h2>
    <p>Every repeating border pattern belongs to exactly one of 7 frieze groups, classified by their symmetries: translation, reflection, rotation, and glide reflection.</p>
    <div class="group-name" id="groupName"></div>
</div>

<div class="controls">
    <label>Motif:
        <select id="motifType">
            <option value="triangle">Triangle</option>
            <option value="leaf">Leaf</option>
            <option value="wave">Wave</option>
            <option value="diamond">Diamond</option>
        </select>
    </label>
    <label>Scale: <input type="range" id="scale" min="20" max="80" value="40"></label>
    <label>Speed: <input type="range" id="speed" min="0" max="50" value="15"></label>
</div>

<canvas id="canvas"></canvas>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let motifType = 'triangle';
let scale = 40;
let speed = 15;
let animOffset = 0;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function drawMotif(cx, cy, size, flipH, flipV, rotation) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rotation);
    ctx.scale(flipH ? -1 : 1, flipV ? -1 : 1);

    const s = size * 0.4;
    switch(motifType) {
        case 'triangle':
            ctx.beginPath();
            ctx.moveTo(0, -s);
            ctx.lineTo(s * 0.7, s * 0.5);
            ctx.lineTo(-s * 0.3, s * 0.5);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            break;
        case 'leaf':
            ctx.beginPath();
            ctx.moveTo(0, -s);
            ctx.bezierCurveTo(s * 0.8, -s * 0.3, s * 0.5, s * 0.5, 0, s);
            ctx.bezierCurveTo(-s * 0.2, s * 0.5, -s * 0.3, -s * 0.3, 0, -s);
            ctx.fill();
            ctx.stroke();
            // Vein
            ctx.beginPath();
            ctx.moveTo(0, -s * 0.8);
            ctx.lineTo(0, s * 0.7);
            ctx.strokeStyle = 'rgba(254,250,224,0.3)';
            ctx.stroke();
            break;
        case 'wave':
            ctx.beginPath();
            ctx.moveTo(-s, 0);
            ctx.bezierCurveTo(-s * 0.5, -s, s * 0.5, s, s, 0);
            ctx.lineTo(s, s * 0.3);
            ctx.bezierCurveTo(s * 0.5, s * 1.3, -s * 0.5, -s * 0.7, -s, s * 0.3);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            break;
        case 'diamond':
            ctx.beginPath();
            ctx.moveTo(0, -s);
            ctx.lineTo(s * 0.6, 0);
            ctx.lineTo(0, s * 0.5);
            ctx.lineTo(-s * 0.3, 0);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            break;
    }
    ctx.restore();
}

const friezeGroups = [
    {
        name: 'F1 (p1) - Translation only',
        symmetries: 'T',
        desc: 'Only translation. The simplest frieze group.',
        draw: function(y, cellW, cellH) {
            for (let x = -cellW + animOffset % cellW; x < canvas.width + cellW; x += cellW) {
                ctx.fillStyle = '#606C38'; ctx.strokeStyle = 'rgba(254,250,224,0.2)'; ctx.lineWidth = 1;
                drawMotif(x, y, cellH, false, false, 0);
            }
        }
    },
    {
        name: 'F2 (p11m) - Horizontal reflection',
        symmetries: 'T + H',
        desc: 'Translation + reflection across horizontal axis.',
        draw: function(y, cellW, cellH) {
            for (let x = -cellW + animOffset % cellW; x < canvas.width + cellW; x += cellW) {
                ctx.fillStyle = '#606C38'; ctx.strokeStyle = 'rgba(254,250,224,0.2)'; ctx.lineWidth = 1;
                drawMotif(x, y - cellH * 0.3, cellH * 0.8, false, false, 0);
                ctx.fillStyle = '#8A9A5B';
                drawMotif(x, y + cellH * 0.3, cellH * 0.8, false, true, 0);
            }
        }
    },
    {
        name: 'F3 (p11g) - Glide reflection',
        symmetries: 'T + G',
        desc: 'Translation + glide reflection (reflect + translate half).',
        draw: function(y, cellW, cellH) {
            for (let x = -cellW + animOffset % cellW; x < canvas.width + cellW; x += cellW) {
                ctx.fillStyle = '#606C38'; ctx.strokeStyle = 'rgba(254,250,224,0.2)'; ctx.lineWidth = 1;
                drawMotif(x, y - cellH * 0.3, cellH * 0.8, false, false, 0);
                ctx.fillStyle = '#8A9A5B';
                drawMotif(x + cellW * 0.5, y + cellH * 0.3, cellH * 0.8, false, true, 0);
            }
        }
    },
    {
        name: 'F4 (p2) - 180\u00B0 rotation',
        symmetries: 'T + R180',
        desc: 'Translation + 180\u00B0 rotation centers.',
        draw: function(y, cellW, cellH) {
            for (let x = -cellW + animOffset % cellW; x < canvas.width + cellW; x += cellW) {
                ctx.fillStyle = '#606C38'; ctx.strokeStyle = 'rgba(254,250,224,0.2)'; ctx.lineWidth = 1;
                drawMotif(x, y, cellH * 0.8, false, false, 0);
                ctx.fillStyle = '#DDA15E';
                drawMotif(x + cellW * 0.5, y, cellH * 0.8, false, false, Math.PI);
            }
        }
    },
    {
        name: 'F5 (p1m1) - Vertical reflection',
        symmetries: 'T + V',
        desc: 'Translation + vertical reflection axes.',
        draw: function(y, cellW, cellH) {
            for (let x = -cellW + animOffset % cellW; x < canvas.width + cellW; x += cellW) {
                ctx.fillStyle = '#606C38'; ctx.strokeStyle = 'rgba(254,250,224,0.2)'; ctx.lineWidth = 1;
                drawMotif(x - cellW * 0.15, y, cellH * 0.8, false, false, 0);
                ctx.fillStyle = '#BC6C25';
                drawMotif(x + cellW * 0.15, y, cellH * 0.8, true, false, 0);
            }
        }
    },
    {
        name: 'F6 (p2mm) - Full symmetry',
        symmetries: 'T + H + V + R180',
        desc: 'All symmetries: horizontal + vertical mirrors + 180\u00B0 rotation.',
        draw: function(y, cellW, cellH) {
            for (let x = -cellW + animOffset % cellW; x < canvas.width + cellW; x += cellW) {
                const s = cellH * 0.6;
                ctx.fillStyle = '#606C38'; ctx.strokeStyle = 'rgba(254,250,224,0.2)'; ctx.lineWidth = 1;
                drawMotif(x - cellW * 0.15, y - cellH * 0.2, s, false, false, 0);
                ctx.fillStyle = '#8A9A5B';
                drawMotif(x + cellW * 0.15, y - cellH * 0.2, s, true, false, 0);
                ctx.fillStyle = '#DDA15E';
                drawMotif(x - cellW * 0.15, y + cellH * 0.2, s, false, true, 0);
                ctx.fillStyle = '#BC6C25';
                drawMotif(x + cellW * 0.15, y + cellH * 0.2, s, true, true, 0);
            }
        }
    },
    {
        name: 'F7 (p2mg) - Vertical + glide',
        symmetries: 'T + V + G + R180',
        desc: 'Vertical mirrors + glide reflection + 180\u00B0 rotation.',
        draw: function(y, cellW, cellH) {
            for (let x = -cellW + animOffset % cellW; x < canvas.width + cellW; x += cellW) {
                const s = cellH * 0.6;
                ctx.fillStyle = '#606C38'; ctx.strokeStyle = 'rgba(254,250,224,0.2)'; ctx.lineWidth = 1;
                drawMotif(x - cellW * 0.15, y - cellH * 0.2, s, false, false, 0);
                ctx.fillStyle = '#8A9A5B';
                drawMotif(x + cellW * 0.15, y - cellH * 0.2, s, true, false, 0);
                ctx.fillStyle = '#DDA15E';
                drawMotif(x + cellW * 0.35, y + cellH * 0.2, s, true, true, 0);
                ctx.fillStyle = '#BC6C25';
                drawMotif(x + cellW * 0.05, y + cellH * 0.2, s, false, true, 0);
            }
        }
    }
];

function draw() {
    animOffset += speed * 0.02;
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, w, h);

    const numGroups = friezeGroups.length;
    const bandH = Math.min((h - 100) / numGroups, 90);
    const startY = (h - numGroups * bandH) / 2;
    const cellW = scale * 2;

    // Group info
    document.getElementById('groupName').innerHTML = friezeGroups.map((g, i) =>
        `<span style="color:${i % 2 === 0 ? '#8A9A5B' : '#DDA15E'}; font-size: 0.75rem;">${g.symmetries}</span>`
    ).join(' | ');

    for (let i = 0; i < numGroups; i++) {
        const y = startY + i * bandH + bandH / 2;
        const g = friezeGroups[i];

        // Band background
        ctx.fillStyle = i % 2 === 0 ? 'rgba(96,108,56,0.08)' : 'rgba(221,161,94,0.08)';
        ctx.fillRect(0, y - bandH / 2, w, bandH);

        // Horizontal center line
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 0.5;
        ctx.setLineDash([2, 6]);
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
        ctx.setLineDash([]);

        // Draw the frieze pattern
        g.draw(y, cellW, bandH);

        // Label
        ctx.fillStyle = 'rgba(254,250,224,0.6)';
        ctx.font = '11px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(g.name, 10, y - bandH / 2 + 14);

        // Symmetry description
        ctx.fillStyle = 'rgba(254,250,224,0.35)';
        ctx.font = '10px sans-serif';
        ctx.fillText(g.desc, 10, y - bandH / 2 + 28);
    }

    requestAnimationFrame(draw);
}

document.getElementById('motifType').addEventListener('change', (e) => { motifType = e.target.value; });
document.getElementById('scale').addEventListener('input', (e) => { scale = parseInt(e.target.value); });
document.getElementById('speed').addEventListener('input', (e) => { speed = parseInt(e.target.value); });

window.reset = function() {
    motifType = 'triangle';
    scale = 40;
    speed = 15;
    animOffset = 0;
    document.getElementById('motifType').value = 'triangle';
    document.getElementById('scale').value = 40;
    document.getElementById('speed').value = 15;
};

draw();
</script>
</body>
</html>
