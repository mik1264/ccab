<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Braid Group Visualizer - Textile Mathematics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }

.controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 12px 20px;
    border-radius: 16px; border: 1px solid rgba(138,154,91,0.3); z-index: 100;
}
.controls label { font-size: 0.85rem; color: #8A9A5B; }
.controls select, .controls button {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(138,154,91,0.4);
    color: #FEFAE0; padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; cursor: pointer;
}
.controls button:hover { background: rgba(138,154,91,0.3); }
.controls .word { font-family: monospace; font-size: 1rem; color: #DDA15E; letter-spacing: 2px; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.info-panel {
    position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 14px;
    border: 1px solid rgba(138,154,91,0.3); max-width: 260px; z-index: 100;
}
.info-panel h2 { font-size: 1rem; color: #DDA15E; margin-bottom: 6px; }
.info-panel p { font-size: 0.8rem; line-height: 1.5; opacity: 0.8; }
</style>
</head>
<body>
<a href="index.html">&larr; Back</a>

<div class="info-panel">
    <h2>Braid Group Visualizer</h2>
    <p>Explore braid groups B_n. Add generators (sigma_i) and their inverses to build braids. Generators swap adjacent strands -- positive crossings go over, negative go under.</p>
</div>

<div class="controls">
    <label>Strands:
        <select id="strandCount">
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
        </select>
    </label>
    <button id="addPos">+&sigma;<sub>i</sub></button>
    <button id="addNeg">-&sigma;<sub>i</sub></button>
    <label>at i=<select id="genIndex"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></label>
    <button id="clearBtn">Clear</button>
    <button id="randomBtn">Random</button>
    <span class="word" id="braidWord">e (identity)</span>
</div>

<canvas id="canvas"></canvas>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let nStrands = 4;
let generators = []; // array of {i: strand index (1-based), sign: 1 or -1}
let animT = 0;

const strandColors = ['#8A9A5B', '#DDA15E', '#BC6C25', '#606C38', '#FEFAE0', '#7B8A4E'];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function updateGenIndexOptions() {
    const sel = document.getElementById('genIndex');
    sel.innerHTML = '';
    for (let i = 1; i < nStrands; i++) {
        const opt = document.createElement('option');
        opt.value = i; opt.textContent = i;
        sel.appendChild(opt);
    }
}

function updateBraidWord() {
    const el = document.getElementById('braidWord');
    if (generators.length === 0) { el.textContent = 'e (identity)'; return; }
    el.textContent = generators.map(g =>
        (g.sign > 0 ? '\u03C3' : '\u03C3\u207B\u00B9') + '_' + g.i
    ).join(' \u00B7 ');
}

function computePermutation() {
    const perm = Array.from({length: nStrands}, (_, i) => i);
    for (const g of generators) {
        const idx = g.i - 1;
        [perm[idx], perm[idx + 1]] = [perm[idx + 1], perm[idx]];
    }
    return perm;
}

function draw() {
    animT += 0.01;
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, w, h);

    const nGens = generators.length;
    const segH = Math.min(80, (h - 300) / Math.max(nGens + 1, 3));
    const totalH = (nGens + 1) * segH;
    const strandSpacing = Math.min(80, (w - 200) / (nStrands - 1));
    const ox = (w - (nStrands - 1) * strandSpacing) / 2;
    const oy = (h - totalH) / 2 - 20;

    // Track strand positions through crossings
    const positions = Array.from({length: nStrands}, (_, i) => i);

    // Draw each segment
    for (let seg = 0; seg <= nGens; seg++) {
        const y0 = oy + seg * segH;
        const y1 = y0 + segH;

        if (seg < nGens) {
            const g = generators[seg];
            const gi = g.i - 1;
            const leftStrand = positions.indexOf(positions.find((_, idx) => idx === gi));
            const rightStrand = gi + 1;

            // Draw non-crossing strands
            for (let s = 0; s < nStrands; s++) {
                if (s === gi || s === gi + 1) continue;
                const x = ox + s * strandSpacing;
                ctx.beginPath();
                ctx.moveTo(x, y0);
                ctx.lineTo(x, y1);
                ctx.strokeStyle = strandColors[positions[s] % strandColors.length];
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            // Draw crossing strands
            const x1 = ox + gi * strandSpacing;
            const x2 = ox + (gi + 1) * strandSpacing;
            const midY = (y0 + y1) / 2;

            // The strand that goes UNDER is drawn first
            const overStrand = g.sign > 0 ? gi : gi + 1;
            const underStrand = g.sign > 0 ? gi + 1 : gi;

            // Under strand (with gap)
            ctx.beginPath();
            ctx.moveTo(ox + underStrand * strandSpacing, y0);
            const ux1 = underStrand === gi ? x2 : x1;
            ctx.bezierCurveTo(
                ox + underStrand * strandSpacing, midY - 5,
                ux1, midY + 5,
                ux1, y1
            );
            ctx.strokeStyle = strandColors[positions[underStrand] % strandColors.length];
            ctx.lineWidth = 4;
            ctx.globalAlpha = 0.4;
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Over strand
            ctx.beginPath();
            ctx.moveTo(ox + overStrand * strandSpacing, y0);
            const ox1 = overStrand === gi ? x2 : x1;
            ctx.bezierCurveTo(
                ox + overStrand * strandSpacing, midY - 5,
                ox1, midY + 5,
                ox1, y1
            );
            // White outline for "over" effect
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 8;
            ctx.stroke();
            ctx.strokeStyle = strandColors[positions[overStrand] % strandColors.length];
            ctx.lineWidth = 4;
            ctx.stroke();

            // Crossing indicator
            ctx.fillStyle = g.sign > 0 ? 'rgba(138,154,91,0.3)' : 'rgba(221,161,94,0.3)';
            ctx.beginPath();
            ctx.arc((x1 + x2) / 2, midY, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FEFAE0';
            ctx.font = '10px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(g.sign > 0 ? '+' : '-', (x1 + x2) / 2, midY);

            // Swap positions
            [positions[gi], positions[gi + 1]] = [positions[gi + 1], positions[gi]];
        } else {
            // Final straight segment
            for (let s = 0; s < nStrands; s++) {
                const x = ox + s * strandSpacing;
                ctx.beginPath();
                ctx.moveTo(x, y0);
                ctx.lineTo(x, y0 + segH * 0.3);
                ctx.strokeStyle = strandColors[positions[s] % strandColors.length];
                ctx.lineWidth = 4;
                ctx.stroke();
            }
        }
    }

    // Draw strand labels at top and bottom
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    const startPositions = Array.from({length: nStrands}, (_, i) => i);
    for (let s = 0; s < nStrands; s++) {
        const x = ox + s * strandSpacing;
        ctx.fillStyle = strandColors[s % strandColors.length];
        ctx.fillText(s + 1, x, oy - 10);
    }

    // Permutation display
    const perm = computePermutation();
    ctx.fillStyle = '#8A9A5B';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    const permY = oy + totalH + 20;
    ctx.fillText('Permutation: (' + perm.map(p => p + 1).join(' ') + ')', w / 2, permY);

    // Animated particles along strands
    for (let s = 0; s < nStrands; s++) {
        const t = (animT * 0.5 + s * 0.2) % 1;
        const segIdx = Math.floor(t * (nGens + 1));
        const localT = (t * (nGens + 1)) - segIdx;
        if (segIdx <= nGens) {
            const py = oy + (segIdx + localT) * segH;
            let px = ox + s * strandSpacing;
            // Approximate position (simplified)
            ctx.fillStyle = strandColors[s % strandColors.length];
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.arc(px, py, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    requestAnimationFrame(draw);
}

document.getElementById('strandCount').addEventListener('change', (e) => {
    nStrands = parseInt(e.target.value);
    generators = [];
    updateGenIndexOptions();
    updateBraidWord();
});

document.getElementById('addPos').addEventListener('click', () => {
    const i = parseInt(document.getElementById('genIndex').value);
    generators.push({i, sign: 1});
    updateBraidWord();
});

document.getElementById('addNeg').addEventListener('click', () => {
    const i = parseInt(document.getElementById('genIndex').value);
    generators.push({i, sign: -1});
    updateBraidWord();
});

document.getElementById('clearBtn').addEventListener('click', () => {
    generators = [];
    updateBraidWord();
});

document.getElementById('randomBtn').addEventListener('click', () => {
    generators = [];
    const len = 4 + Math.floor(Math.random() * 6);
    for (let k = 0; k < len; k++) {
        generators.push({
            i: 1 + Math.floor(Math.random() * (nStrands - 1)),
            sign: Math.random() < 0.5 ? 1 : -1
        });
    }
    updateBraidWord();
});

window.reset = function() {
    nStrands = 4;
    generators = [];
    document.getElementById('strandCount').value = '4';
    updateGenIndexOptions();
    updateBraidWord();
};

updateGenIndexOptions();
updateBraidWord();
draw();
</script>
</body>
</html>
