<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jacquard Loom Simulator - Textile Mathematics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }

.controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 12px 20px;
    border-radius: 16px; border: 1px solid rgba(138,154,91,0.3); z-index: 100;
}
.controls label { font-size: 0.85rem; color: #8A9A5B; }
.controls select, .controls button, .controls input[type=range] {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(138,154,91,0.4);
    color: #FEFAE0; padding: 4px 10px; border-radius: 8px; font-size: 0.85rem; cursor: pointer;
}
.controls button:hover { background: rgba(138,154,91,0.3); }
.controls input[type=range] { width: 80px; }

.info-panel {
    position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 14px;
    border: 1px solid rgba(138,154,91,0.3); max-width: 260px; z-index: 100;
}
.info-panel h2 { font-size: 1rem; color: #DDA15E; margin-bottom: 6px; }
.info-panel p { font-size: 0.8rem; line-height: 1.5; opacity: 0.8; }
.info-panel .stat { color: #8A9A5B; font-size: 0.8rem; margin-top: 6px; }
</style>
</head>
<body>
<a href="index.html">&larr; Back</a>

<div class="info-panel">
    <h2>Jacquard Loom Simulator</h2>
    <p>Click the punch card grid to toggle holes. Each hole (1) raises a warp thread; no hole (0) keeps it down. The fabric preview shows the resulting pattern in real time.</p>
    <div class="stat" id="statInfo">Card: 16x16 | Bits: 0/256</div>
</div>

<div class="controls">
    <label>Grid:
        <select id="gridSize">
            <option value="8">8x8</option>
            <option value="16" selected>16x16</option>
            <option value="24">24x24</option>
            <option value="32">32x32</option>
        </select>
    </label>
    <label>Pattern:
        <select id="patternPreset">
            <option value="blank">Blank</option>
            <option value="checkerboard">Checkerboard</option>
            <option value="diamond">Diamond</option>
            <option value="heart">Heart</option>
            <option value="star">Star</option>
            <option value="wave">Wave</option>
            <option value="spiral">Spiral</option>
        </select>
    </label>
    <label>Speed: <input type="range" id="speed" min="1" max="10" value="3"></label>
    <button id="playBtn">Weave</button>
    <button id="clearBtn">Clear Card</button>
    <button id="invertBtn">Invert</button>
</div>

<canvas id="canvas"></canvas>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let gridSize = 16;
let grid = [];
let weaving = false;
let weaveRow = 0;
let weaveTimer = 0;
let speed = 3;
let fabricRows = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function initGrid(size) {
    gridSize = size;
    grid = Array.from({length: size}, () => Array(size).fill(0));
    fabricRows = [];
    weaveRow = 0;
}
initGrid(16);

function applyPreset(preset) {
    initGrid(gridSize);
    const n = gridSize;
    const c = n / 2;
    switch(preset) {
        case 'checkerboard':
            for (let r = 0; r < n; r++)
                for (let cl = 0; cl < n; cl++)
                    grid[r][cl] = (r + cl) % 2;
            break;
        case 'diamond':
            for (let r = 0; r < n; r++)
                for (let cl = 0; cl < n; cl++) {
                    const d = Math.abs(r - c + 0.5) + Math.abs(cl - c + 0.5);
                    grid[r][cl] = d < c ? 1 : 0;
                }
            break;
        case 'heart': {
            for (let r = 0; r < n; r++)
                for (let cl = 0; cl < n; cl++) {
                    const x = (cl - c + 0.5) / (c * 0.7);
                    const y = -(r - c * 0.6) / (c * 0.7);
                    const v = x*x + (y - Math.sqrt(Math.abs(x)))**2;
                    grid[r][cl] = v < 2.5 ? 1 : 0;
                }
            break;
        }
        case 'star':
            for (let r = 0; r < n; r++)
                for (let cl = 0; cl < n; cl++) {
                    const x = cl - c + 0.5;
                    const y = r - c + 0.5;
                    const angle = Math.atan2(y, x);
                    const dist = Math.sqrt(x*x + y*y);
                    const radius = c * 0.7 * (0.5 + 0.5 * Math.cos(5 * angle));
                    grid[r][cl] = dist < radius ? 1 : 0;
                }
            break;
        case 'wave':
            for (let r = 0; r < n; r++)
                for (let cl = 0; cl < n; cl++) {
                    const wave = Math.sin(cl * Math.PI * 2 / n) * n * 0.2;
                    grid[r][cl] = Math.abs(r - c - wave) < 2 ? 1 : 0;
                }
            break;
        case 'spiral':
            for (let r = 0; r < n; r++)
                for (let cl = 0; cl < n; cl++) {
                    const x = cl - c + 0.5;
                    const y = r - c + 0.5;
                    const angle = Math.atan2(y, x);
                    const dist = Math.sqrt(x*x + y*y);
                    const spiralAngle = dist * 0.8 + angle;
                    grid[r][cl] = Math.sin(spiralAngle * 2) > 0 ? 1 : 0;
                }
            break;
    }
    updateStats();
}

function updateStats() {
    const bits = grid.flat().reduce((s, v) => s + v, 0);
    const total = gridSize * gridSize;
    document.getElementById('statInfo').textContent = `Card: ${gridSize}x${gridSize} | Holes: ${bits}/${total} | ${(bits/total*100).toFixed(1)}% raised`;
}

function draw() {
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, w, h);

    // Layout: punch card on left, fabric preview on right
    const cardAreaW = w * 0.45;
    const fabricAreaW = w * 0.45;
    const margin = 30;

    // Draw punch card
    const cellSize = Math.min((cardAreaW - margin * 2) / gridSize, (h - 200) / gridSize, 30);
    const cardW = gridSize * cellSize;
    const cardH = gridSize * cellSize;
    const cardX = (cardAreaW - cardW) / 2;
    const cardY = (h - cardH) / 2 - 20;

    // Card background (punch card look)
    ctx.fillStyle = '#f5e6c8';
    const cardPad = 15;
    ctx.beginPath();
    ctx.roundRect(cardX - cardPad, cardY - cardPad, cardW + cardPad * 2, cardH + cardPad * 2, 8);
    ctx.fill();

    // Card holes
    for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
            const x = cardX + c * cellSize;
            const y = cardY + r * cellSize;
            if (grid[r][c]) {
                // Punched hole
                ctx.fillStyle = '#1a1a2e';
                ctx.beginPath();
                ctx.arc(x + cellSize / 2, y + cellSize / 2, cellSize * 0.35, 0, Math.PI * 2);
                ctx.fill();
                // Hole shadow
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.beginPath();
                ctx.arc(x + cellSize / 2 + 1, y + cellSize / 2 + 1, cellSize * 0.35, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Unmarked position
                ctx.fillStyle = 'rgba(0,0,0,0.08)';
                ctx.beginPath();
                ctx.arc(x + cellSize / 2, y + cellSize / 2, cellSize * 0.15, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // Weave progress indicator on card
    if (weaving && weaveRow < gridSize) {
        ctx.strokeStyle = '#c8102e';
        ctx.lineWidth = 2;
        const ry = cardY + weaveRow * cellSize;
        ctx.strokeRect(cardX - 2, ry - 1, cardW + 4, cellSize + 2);
    }

    // Card label
    ctx.fillStyle = '#8A9A5B';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('JACQUARD PUNCH CARD', cardX + cardW / 2, cardY - cardPad - 8);

    // Draw fabric preview
    const fabricX = cardAreaW + 30;
    const fabricCellSize = Math.min((fabricAreaW - margin * 2) / gridSize, cellSize);
    const fabricW = gridSize * fabricCellSize;
    const fabricH = fabricRows.length * fabricCellSize;
    const fabricOx = fabricX + (fabricAreaW - fabricW) / 2;
    const fabricOy = cardY;

    // Fabric background
    ctx.fillStyle = 'rgba(254,250,224,0.05)';
    ctx.fillRect(fabricOx - 5, fabricOy - 5, fabricW + 10, cardH + 10);

    // Draw warp threads (background)
    for (let c = 0; c < gridSize; c++) {
        ctx.fillStyle = 'rgba(96,108,56,0.3)';
        ctx.fillRect(fabricOx + c * fabricCellSize, fabricOy, fabricCellSize - 0.5, cardH);
    }

    // Draw woven rows
    for (let r = 0; r < fabricRows.length; r++) {
        for (let c = 0; c < gridSize; c++) {
            const x = fabricOx + c * fabricCellSize;
            const y = fabricOy + r * fabricCellSize;
            if (fabricRows[r][c]) {
                // Warp up
                ctx.fillStyle = '#606C38';
            } else {
                // Weft showing
                ctx.fillStyle = '#DDA15E';
            }
            ctx.fillRect(x + 0.25, y + 0.25, fabricCellSize - 0.5, fabricCellSize - 0.5);
        }
    }

    ctx.fillStyle = '#DDA15E';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WOVEN FABRIC', fabricOx + fabricW / 2, fabricOy - 12);

    // Weave animation
    if (weaving) {
        weaveTimer++;
        if (weaveTimer >= (11 - speed) * 3) {
            weaveTimer = 0;
            if (weaveRow < gridSize) {
                fabricRows.push([...grid[weaveRow % gridSize]]);
                weaveRow++;
            }
            if (fabricRows.length > gridSize * 3) {
                // Loop the pattern
                fabricRows = fabricRows.slice(-gridSize * 3);
            }
            if (weaveRow >= gridSize) weaveRow = 0;
        }
    }

    // Binary readout at bottom
    if (weaving && fabricRows.length > 0) {
        const lastRow = fabricRows[fabricRows.length - 1];
        ctx.fillStyle = 'rgba(138,154,91,0.5)';
        ctx.font = '11px monospace';
        ctx.textAlign = 'center';
        const binary = lastRow.map(v => v ? '1' : '0').join('');
        ctx.fillText('Binary: ' + binary, w / 2, h - 80);
        const decimal = parseInt(binary.slice(0, 16), 2);
        ctx.fillText('Decimal (first 16 bits): ' + decimal, w / 2, h - 65);
    }

    requestAnimationFrame(draw);
}

canvas.addEventListener('click', (e) => {
    const cardAreaW = canvas.width * 0.45;
    const cellSize = Math.min((cardAreaW - 60) / gridSize, (canvas.height - 200) / gridSize, 30);
    const cardW = gridSize * cellSize;
    const cardH = gridSize * cellSize;
    const cardX = (cardAreaW - cardW) / 2;
    const cardY = (canvas.height - cardH) / 2 - 20;

    const col = Math.floor((e.clientX - cardX) / cellSize);
    const row = Math.floor((e.clientY - cardY) / cellSize);
    if (col >= 0 && col < gridSize && row >= 0 && row < gridSize) {
        grid[row][col] = 1 - grid[row][col];
        updateStats();
    }
});

document.getElementById('gridSize').addEventListener('change', (e) => {
    initGrid(parseInt(e.target.value));
    updateStats();
});

document.getElementById('patternPreset').addEventListener('change', (e) => {
    if (e.target.value !== 'blank') applyPreset(e.target.value);
    else initGrid(gridSize);
    updateStats();
});

document.getElementById('speed').addEventListener('input', (e) => { speed = parseInt(e.target.value); });

document.getElementById('playBtn').addEventListener('click', () => {
    weaving = !weaving;
    document.getElementById('playBtn').textContent = weaving ? 'Pause' : 'Weave';
    if (weaving) { fabricRows = []; weaveRow = 0; }
});

document.getElementById('clearBtn').addEventListener('click', () => {
    initGrid(gridSize);
    updateStats();
});

document.getElementById('invertBtn').addEventListener('click', () => {
    for (let r = 0; r < gridSize; r++)
        for (let c = 0; c < gridSize; c++)
            grid[r][c] = 1 - grid[r][c];
    updateStats();
});

window.reset = function() {
    weaving = false;
    document.getElementById('playBtn').textContent = 'Weave';
    initGrid(16);
    document.getElementById('gridSize').value = '16';
    document.getElementById('patternPreset').value = 'blank';
    document.getElementById('speed').value = 3;
    speed = 3;
    updateStats();
};

updateStats();
draw();
</script>
</body>
</html>
