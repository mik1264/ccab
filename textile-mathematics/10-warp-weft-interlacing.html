<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warp & Weft Interlacing - Textile Mathematics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }

.controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 12px 20px;
    border-radius: 16px; border: 1px solid rgba(138,154,91,0.3); z-index: 100;
}
.controls label { font-size: 0.85rem; color: #8A9A5B; }
.controls select, .controls button, .controls input[type=range] {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(138,154,91,0.4);
    color: #FEFAE0; padding: 4px 10px; border-radius: 8px; font-size: 0.85rem; cursor: pointer;
}
.controls button:hover { background: rgba(138,154,91,0.3); }
.controls input[type=range] { width: 80px; }

.info-panel {
    position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 14px;
    border: 1px solid rgba(138,154,91,0.3); max-width: 280px; z-index: 100;
}
.info-panel h2 { font-size: 1rem; color: #DDA15E; margin-bottom: 6px; }
.info-panel p { font-size: 0.8rem; line-height: 1.5; opacity: 0.8; }
.matrix-display { font-family: monospace; font-size: 0.75rem; color: #8A9A5B; margin-top: 8px; white-space: pre; }
</style>
</head>
<body>
<a href="index.html">&larr; Back</a>

<div class="info-panel">
    <h2>Warp & Weft Interlacing</h2>
    <p>Click cells to toggle interlacing. The binary matrix (1=warp over, 0=weft over) defines the fabric structure. Apply algebraic operations to transform patterns using modular arithmetic.</p>
    <div class="matrix-display" id="matrixDisplay"></div>
</div>

<div class="controls">
    <label>Grid:
        <select id="gridSize">
            <option value="6">6x6</option>
            <option value="8" selected>8x8</option>
            <option value="10">10x10</option>
            <option value="12">12x12</option>
        </select>
    </label>
    <label>Operation:
        <select id="operation">
            <option value="none">None</option>
            <option value="transpose">Transpose</option>
            <option value="rotate90">Rotate 90</option>
            <option value="mirror_h">Mirror H</option>
            <option value="mirror_v">Mirror V</option>
            <option value="invert">Invert (NOT)</option>
            <option value="shift_r">Shift Right</option>
            <option value="shift_d">Shift Down</option>
        </select>
    </label>
    <button id="applyBtn">Apply</button>
    <label>Thread Width: <input type="range" id="threadWidth" min="3" max="15" value="8"></label>
    <label>Preset:
        <select id="preset">
            <option value="plain">Plain</option>
            <option value="twill">Twill</option>
            <option value="satin">Satin</option>
            <option value="waffle">Waffle</option>
            <option value="huckaback">Huckaback</option>
        </select>
    </label>
</div>

<canvas id="canvas"></canvas>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let gridSize = 8;
let matrix = [];
let threadWidth = 8;
let animPhase = 0;
let hoveredCell = null;

const warpColor = '#606C38';
const weftColor = '#DDA15E';

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function initMatrix(size) {
    gridSize = size;
    matrix = Array.from({length: size}, () => Array(size).fill(0));
    // Default: plain weave
    for (let r = 0; r < size; r++)
        for (let c = 0; c < size; c++)
            matrix[r][c] = (r + c) % 2;
}

function applyPreset(type) {
    const n = gridSize;
    for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
            switch(type) {
                case 'plain':
                    matrix[r][c] = (r + c) % 2;
                    break;
                case 'twill':
                    matrix[r][c] = ((r + c) % n) < n / 2 ? 1 : 0;
                    break;
                case 'satin': {
                    const shift = Math.floor(n / 2);
                    matrix[r][c] = (c === (r * shift) % n) ? 1 : 0;
                    break;
                }
                case 'waffle': {
                    const half = Math.floor(n / 2);
                    const dr = r < half ? r : n - 1 - r;
                    const dc = c < half ? c : n - 1 - c;
                    matrix[r][c] = (dr + dc) % 2 === 0 ? 1 : 0;
                    break;
                }
                case 'huckaback': {
                    if (r % 2 === 0) {
                        matrix[r][c] = (r + c) % 2;
                    } else {
                        matrix[r][c] = c % 4 < 2 ? 1 : 0;
                    }
                    break;
                }
            }
        }
    }
}

function applyOperation(op) {
    const n = gridSize;
    let result = Array.from({length: n}, () => Array(n).fill(0));

    switch(op) {
        case 'transpose':
            for (let r = 0; r < n; r++)
                for (let c = 0; c < n; c++)
                    result[r][c] = matrix[c][r];
            break;
        case 'rotate90':
            for (let r = 0; r < n; r++)
                for (let c = 0; c < n; c++)
                    result[c][n - 1 - r] = matrix[r][c];
            break;
        case 'mirror_h':
            for (let r = 0; r < n; r++)
                for (let c = 0; c < n; c++)
                    result[r][n - 1 - c] = matrix[r][c];
            break;
        case 'mirror_v':
            for (let r = 0; r < n; r++)
                for (let c = 0; c < n; c++)
                    result[n - 1 - r][c] = matrix[r][c];
            break;
        case 'invert':
            for (let r = 0; r < n; r++)
                for (let c = 0; c < n; c++)
                    result[r][c] = 1 - matrix[r][c];
            break;
        case 'shift_r':
            for (let r = 0; r < n; r++)
                for (let c = 0; c < n; c++)
                    result[r][(c + 1) % n] = matrix[r][c];
            break;
        case 'shift_d':
            for (let r = 0; r < n; r++)
                for (let c = 0; c < n; c++)
                    result[(r + 1) % n][c] = matrix[r][c];
            break;
        default:
            return;
    }
    matrix = result;
}

function updateMatrixDisplay() {
    const n = gridSize;
    let txt = '';
    const ones = matrix.flat().reduce((s, v) => s + v, 0);
    const total = n * n;
    txt += `${n}x${n} | Warp: ${ones}/${total} (${(ones/total*100).toFixed(0)}%)\n`;
    for (let r = 0; r < Math.min(n, 10); r++) {
        txt += matrix[r].slice(0, 10).map(v => v ? '1' : '0').join(' ') + '\n';
    }
    if (n > 10) txt += '  ...\n';
    document.getElementById('matrixDisplay').textContent = txt;
}

function draw() {
    animPhase += 0.005;
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, w, h);

    const n = gridSize;
    updateMatrixDisplay();

    // Layout: Binary matrix on left, 3D-ish interlacing view on right
    const leftW = w * 0.4;
    const rightW = w * 0.5;

    // === Binary Matrix Grid ===
    const cellSize = Math.min((leftW - 80) / n, (h - 200) / n, 50);
    const gridW = n * cellSize;
    const gridH = n * cellSize;
    const gx = (leftW - gridW) / 2;
    const gy = (h - gridH) / 2 - 10;

    // Grid background
    ctx.fillStyle = 'rgba(254,250,224,0.03)';
    ctx.fillRect(gx - 5, gy - 5, gridW + 10, gridH + 10);

    for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
            const x = gx + c * cellSize;
            const y = gy + r * cellSize;
            const isWarp = matrix[r][c] === 1;

            ctx.fillStyle = isWarp ? warpColor : weftColor;
            const isHovered = hoveredCell && hoveredCell.r === r && hoveredCell.c === c;
            ctx.globalAlpha = isHovered ? 1 : 0.8;
            ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);

            // Value label
            ctx.fillStyle = isWarp ? '#FEFAE0' : '#3d4423';
            ctx.font = `${Math.min(14, cellSize * 0.5)}px monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(isWarp ? '1' : '0', x + cellSize / 2, y + cellSize / 2);
            ctx.globalAlpha = 1;
        }
    }

    ctx.fillStyle = '#8A9A5B';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BINARY INTERLACING MATRIX', gx + gridW / 2, gy - 15);
    ctx.font = '10px monospace';
    ctx.fillStyle = 'rgba(138,154,91,0.6)';
    ctx.fillText('(click to toggle)', gx + gridW / 2, gy - 3);

    // === 3D Interlacing View ===
    const viewOx = leftW + 30;
    const tw = threadWidth;
    const viewCellW = Math.min(30, (rightW - 60) / n);
    const viewW = n * viewCellW;
    const viewH = n * viewCellW;
    const vx = viewOx + (rightW - viewW) / 2;
    const vy = (h - viewH) / 2 - 10;

    ctx.fillStyle = '#DDA15E';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('3D INTERLACING VIEW', vx + viewW / 2, vy - 15);

    // Tile the pattern
    const tilesX = Math.ceil(viewW / (n * viewCellW)) + 1;
    const tilesY = Math.ceil(viewH / (n * viewCellW)) + 1;

    // Draw weft threads first (horizontal), then warp where matrix=1
    for (let tr = 0; tr < tilesY; tr++) {
        for (let tc = 0; tc < tilesX; tc++) {
            for (let r = 0; r < n; r++) {
                for (let c = 0; c < n; c++) {
                    const px = vx + (tc * n + c) * viewCellW;
                    const py = vy + (tr * n + r) * viewCellW;
                    if (px > vx + viewW || py > vy + viewH) continue;

                    const isWarp = matrix[r][c] === 1;

                    // Draw weft (horizontal thread background)
                    ctx.fillStyle = weftColor;
                    ctx.globalAlpha = isWarp ? 0.4 : 0.85;
                    ctx.fillRect(px, py + (viewCellW - tw) / 2, viewCellW, tw);

                    // Draw warp (vertical thread)
                    ctx.fillStyle = warpColor;
                    ctx.globalAlpha = isWarp ? 0.85 : 0.4;
                    ctx.fillRect(px + (viewCellW - tw) / 2, py, tw, viewCellW);

                    ctx.globalAlpha = 1;

                    // Shadow for depth
                    if (isWarp) {
                        ctx.fillStyle = 'rgba(0,0,0,0.15)';
                        ctx.fillRect(px + (viewCellW - tw) / 2 + 1, py + 1, tw, viewCellW);
                    } else {
                        ctx.fillStyle = 'rgba(0,0,0,0.15)';
                        ctx.fillRect(px + 1, py + (viewCellW - tw) / 2 + 1, viewCellW, tw);
                    }
                }
            }
        }
    }

    // Clip the view
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(vx + viewW, vy, rightW, viewH + 20);
    ctx.fillRect(vx, vy + viewH, rightW, h);

    // Border
    ctx.strokeStyle = 'rgba(138,154,91,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(vx, vy, viewW, viewH);

    // Legend
    const legendY = vy + viewH + 25;
    ctx.fillStyle = warpColor;
    ctx.fillRect(vx, legendY, 20, 12);
    ctx.fillStyle = '#8A9A5B';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Warp (vertical, 1)', vx + 25, legendY + 10);

    ctx.fillStyle = weftColor;
    ctx.fillRect(vx + 160, legendY, 20, 12);
    ctx.fillStyle = '#8A9A5B';
    ctx.fillText('Weft (horizontal, 0)', vx + 185, legendY + 10);

    requestAnimationFrame(draw);
}

// Click on binary matrix to toggle
canvas.addEventListener('click', (e) => {
    const leftW = canvas.width * 0.4;
    const n = gridSize;
    const cellSize = Math.min((leftW - 80) / n, (canvas.height - 200) / n, 50);
    const gridW = n * cellSize;
    const gridH = n * cellSize;
    const gx = (leftW - gridW) / 2;
    const gy = (canvas.height - gridH) / 2 - 10;

    const col = Math.floor((e.clientX - gx) / cellSize);
    const row = Math.floor((e.clientY - gy) / cellSize);
    if (col >= 0 && col < n && row >= 0 && row < n) {
        matrix[row][col] = 1 - matrix[row][col];
    }
});

canvas.addEventListener('mousemove', (e) => {
    const leftW = canvas.width * 0.4;
    const n = gridSize;
    const cellSize = Math.min((leftW - 80) / n, (canvas.height - 200) / n, 50);
    const gridW = n * cellSize;
    const gridH = n * cellSize;
    const gx = (leftW - gridW) / 2;
    const gy = (canvas.height - gridH) / 2 - 10;

    const col = Math.floor((e.clientX - gx) / cellSize);
    const row = Math.floor((e.clientY - gy) / cellSize);
    if (col >= 0 && col < n && row >= 0 && row < n) {
        hoveredCell = { r: row, c: col };
    } else {
        hoveredCell = null;
    }
});

document.getElementById('gridSize').addEventListener('change', (e) => {
    initMatrix(parseInt(e.target.value));
});

document.getElementById('preset').addEventListener('change', (e) => {
    applyPreset(e.target.value);
});

document.getElementById('applyBtn').addEventListener('click', () => {
    const op = document.getElementById('operation').value;
    if (op !== 'none') applyOperation(op);
});

document.getElementById('threadWidth').addEventListener('input', (e) => {
    threadWidth = parseInt(e.target.value);
});

window.reset = function() {
    gridSize = 8;
    threadWidth = 8;
    hoveredCell = null;
    document.getElementById('gridSize').value = '8';
    document.getElementById('preset').value = 'plain';
    document.getElementById('operation').value = 'none';
    document.getElementById('threadWidth').value = 8;
    initMatrix(8);
};

initMatrix(8);
draw();
</script>
</body>
</html>
