<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablet Weaving Patterns - Textile Mathematics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }

.controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 12px 20px;
    border-radius: 16px; border: 1px solid rgba(138,154,91,0.3); z-index: 100;
}
.controls label { font-size: 0.85rem; color: #8A9A5B; }
.controls select, .controls button, .controls input[type=range] {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(138,154,91,0.4);
    color: #FEFAE0; padding: 4px 10px; border-radius: 8px; font-size: 0.85rem; cursor: pointer;
}
.controls button:hover { background: rgba(138,154,91,0.3); }
.controls input[type=range] { width: 80px; }

.info-panel {
    position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 14px;
    border: 1px solid rgba(138,154,91,0.3); max-width: 280px; z-index: 100;
}
.info-panel h2 { font-size: 1rem; color: #DDA15E; margin-bottom: 6px; }
.info-panel p { font-size: 0.8rem; line-height: 1.5; opacity: 0.8; }
.turning-seq { font-family: monospace; font-size: 0.85rem; color: #8A9A5B; margin-top: 8px; letter-spacing: 1px; }
</style>
</head>
<body>
<a href="index.html">&larr; Back</a>

<div class="info-panel">
    <h2>Tablet Weaving</h2>
    <p>Each card has 4 holes threaded with colored yarn. Turning cards forward (F) or backward (B) changes which threads appear on the surface, creating patterns.</p>
    <div class="turning-seq" id="turningSeq">Sequence: 4F 4B</div>
</div>

<div class="controls">
    <label>Cards:
        <select id="numCards">
            <option value="8">8</option>
            <option value="12" selected>12</option>
            <option value="16">16</option>
            <option value="20">20</option>
        </select>
    </label>
    <label>Sequence:
        <select id="sequence">
            <option value="4f4b">4F 4B</option>
            <option value="2f2b">2F 2B</option>
            <option value="allf">All Forward</option>
            <option value="alternating">Alternating F/B</option>
            <option value="progressive">Progressive</option>
        </select>
    </label>
    <label>Threading:
        <select id="threading">
            <option value="diagonal">Diagonal</option>
            <option value="chevron">Chevron</option>
            <option value="stripe">Stripe</option>
            <option value="random">Random</option>
        </select>
    </label>
    <label>Speed: <input type="range" id="speed" min="1" max="20" value="8"></label>
    <button id="weaveBtn">Weave / Pause</button>
</div>

<canvas id="canvas"></canvas>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let numCards = 12;
let sequenceType = '4f4b';
let threadingType = 'diagonal';
let speed = 8;
let weaving = true;
let weaveTick = 0;
let pickCount = 0;

const colors = ['#606C38', '#DDA15E', '#8A9A5B', '#BC6C25'];
const bgColor = '#FEFAE0';

// Card state: each card has 4 holes (A,B,C,D) with colors, a direction (S or Z), and current rotation
let cards = [];
let weavedRows = []; // array of arrays of {color, isWarp}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function initCards() {
    cards = [];
    weavedRows = [];
    pickCount = 0;

    for (let i = 0; i < numCards; i++) {
        const card = {
            holes: [null, null, null, null], // A, B, C, D
            direction: i % 2 === 0 ? 'S' : 'Z',
            rotation: 0 // 0-3, which hole pair is at the top
        };

        switch(threadingType) {
            case 'diagonal':
                for (let h = 0; h < 4; h++) {
                    card.holes[h] = colors[(i + h) % colors.length];
                }
                break;
            case 'chevron':
                const ci = i < numCards / 2 ? i : numCards - 1 - i;
                for (let h = 0; h < 4; h++) {
                    card.holes[h] = colors[(ci + h) % colors.length];
                }
                break;
            case 'stripe':
                const c = colors[i % 2 === 0 ? 0 : 1];
                for (let h = 0; h < 4; h++) {
                    card.holes[h] = h < 2 ? c : colors[2];
                }
                break;
            case 'random':
                for (let h = 0; h < 4; h++) {
                    card.holes[h] = colors[Math.floor(Math.random() * colors.length)];
                }
                break;
        }
        cards.push(card);
    }
}

function getTurningForPick(pick) {
    switch(sequenceType) {
        case '4f4b':
            return (pick % 8) < 4 ? 1 : -1;
        case '2f2b':
            return (pick % 4) < 2 ? 1 : -1;
        case 'allf':
            return 1;
        case 'alternating':
            return pick % 2 === 0 ? 1 : -1;
        case 'progressive': {
            const phase = Math.floor(pick / numCards) % 2;
            return phase === 0 ? 1 : -1;
        }
        default: return 1;
    }
}

function weaveOnePick() {
    const row = [];
    for (let i = 0; i < numCards; i++) {
        const card = cards[i];
        const turn = getTurningForPick(pickCount);

        // Top thread is determined by rotation
        const topHole = ((card.rotation % 4) + 4) % 4;
        const topColor = card.holes[topHole];

        row.push(topColor);

        // Turn the card
        card.rotation = ((card.rotation + turn) % 4 + 4) % 4;
    }

    weavedRows.push(row);
    if (weavedRows.length > 200) weavedRows.shift();
    pickCount++;

    // Update turning sequence display
    const turns = [];
    for (let p = 0; p < 8; p++) {
        turns.push(getTurningForPick(p) > 0 ? 'F' : 'B');
    }
    document.getElementById('turningSeq').textContent = 'Sequence: ' + turns.join(' ') + '... | Pick #' + pickCount;
}

function draw() {
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, w, h);

    // Weave animation
    if (weaving) {
        weaveTick++;
        if (weaveTick >= (21 - speed)) {
            weaveTick = 0;
            weaveOnePick();
        }
    }

    // Layout: Cards on left, band on right
    const cardAreaW = w * 0.35;
    const bandAreaW = w * 0.55;

    // Draw cards
    const cardW = Math.min(40, (cardAreaW - 60) / numCards);
    const cardH = cardW * 1.4;
    const cardsOx = 30;
    const cardsOy = h * 0.15;

    ctx.fillStyle = '#8A9A5B';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('CARDS (tablets)', cardsOx + numCards * cardW / 2, cardsOy - 15);

    for (let i = 0; i < numCards; i++) {
        const card = cards[i];
        const cx = cardsOx + i * cardW + cardW / 2;
        const cy = cardsOy + cardH;

        // Card body
        ctx.fillStyle = 'rgba(254,250,224,0.1)';
        ctx.strokeStyle = 'rgba(138,154,91,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(cx - cardW / 2 + 2, cy - cardH / 2, cardW - 4, cardH, 3);
        ctx.fill();
        ctx.stroke();

        // Holes with thread colors
        const holeSize = cardW * 0.2;
        const holeLabels = ['A', 'B', 'C', 'D'];
        for (let h = 0; h < 4; h++) {
            const hy = cy - cardH / 2 + (h + 0.5) * cardH / 4;
            ctx.fillStyle = card.holes[h];
            ctx.beginPath();
            ctx.arc(cx, hy, holeSize, 0, Math.PI * 2);
            ctx.fill();

            // Highlight current top hole
            if (((card.rotation % 4) + 4) % 4 === h) {
                ctx.strokeStyle = '#FEFAE0';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // Card number
        ctx.fillStyle = 'rgba(254,250,224,0.5)';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(i + 1, cx, cy + cardH / 2 + 12);

        // Direction indicator
        ctx.fillStyle = 'rgba(221,161,94,0.5)';
        ctx.font = '8px monospace';
        ctx.fillText(card.direction, cx, cy - cardH / 2 - 4);
    }

    // Draw woven band
    const bandOx = cardAreaW + 30;
    const cellW = Math.min(20, (bandAreaW - 40) / numCards);
    const cellH = Math.min(6, (h - 100) / Math.max(weavedRows.length, 50));
    const bandW = numCards * cellW;
    const bandH = weavedRows.length * cellH;
    const bandOy = 40;

    // Band background
    ctx.fillStyle = 'rgba(254,250,224,0.05)';
    ctx.fillRect(bandOx - 5, bandOy - 5, bandW + 10, h - 100);

    ctx.fillStyle = '#DDA15E';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WOVEN BAND', bandOx + bandW / 2, bandOy - 10);

    // Draw woven rows
    const maxVisible = Math.floor((h - 100) / cellH);
    const startRow = Math.max(0, weavedRows.length - maxVisible);

    for (let r = startRow; r < weavedRows.length; r++) {
        const row = weavedRows[r];
        const ry = bandOy + (r - startRow) * cellH;
        for (let c = 0; c < row.length; c++) {
            ctx.fillStyle = row[c];
            ctx.fillRect(bandOx + c * cellW, ry, cellW - 0.5, cellH - 0.5);
        }
    }

    // Selvedge lines
    ctx.strokeStyle = 'rgba(138,154,91,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(bandOx, bandOy);
    ctx.lineTo(bandOx, bandOy + (weavedRows.length - startRow) * cellH);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(bandOx + bandW, bandOy);
    ctx.lineTo(bandOx + bandW, bandOy + (weavedRows.length - startRow) * cellH);
    ctx.stroke();

    // Current pick indicator
    if (weavedRows.length > startRow) {
        const lastY = bandOy + (weavedRows.length - startRow) * cellH;
        ctx.strokeStyle = 'rgba(221,161,94,0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(bandOx - 5, lastY);
        ctx.lineTo(bandOx + bandW + 5, lastY);
        ctx.stroke();
    }

    requestAnimationFrame(draw);
}

document.getElementById('numCards').addEventListener('change', (e) => {
    numCards = parseInt(e.target.value);
    initCards();
});

document.getElementById('sequence').addEventListener('change', (e) => {
    sequenceType = e.target.value;
    weavedRows = [];
    pickCount = 0;
});

document.getElementById('threading').addEventListener('change', (e) => {
    threadingType = e.target.value;
    initCards();
});

document.getElementById('speed').addEventListener('input', (e) => { speed = parseInt(e.target.value); });

document.getElementById('weaveBtn').addEventListener('click', () => { weaving = !weaving; });

window.reset = function() {
    numCards = 12;
    sequenceType = '4f4b';
    threadingType = 'diagonal';
    speed = 8;
    weaving = true;
    document.getElementById('numCards').value = '12';
    document.getElementById('sequence').value = '4f4b';
    document.getElementById('threading').value = 'diagonal';
    document.getElementById('speed').value = 8;
    initCards();
};

initCards();
draw();
</script>
</body>
</html>
