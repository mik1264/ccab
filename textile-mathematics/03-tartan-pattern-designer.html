<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tartan Pattern Designer - Textile Mathematics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }

.controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 12px 20px;
    border-radius: 16px; border: 1px solid rgba(138,154,91,0.3); z-index: 100;
}
.controls label { font-size: 0.85rem; color: #8A9A5B; }
.controls select, .controls input[type=range], .controls button {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(138,154,91,0.4);
    color: #FEFAE0; padding: 4px 8px; border-radius: 8px; font-size: 0.85rem; cursor: pointer;
}
.controls button:hover { background: rgba(138,154,91,0.3); }
.controls input[type=range] { width: 80px; }

.info-panel {
    position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 14px;
    border: 1px solid rgba(138,154,91,0.3); max-width: 250px; z-index: 100;
}
.info-panel h2 { font-size: 1rem; color: #DDA15E; margin-bottom: 6px; }
.info-panel p { font-size: 0.8rem; line-height: 1.5; opacity: 0.8; }
.symmetry-info { margin-top: 8px; font-size: 0.8rem; color: #8A9A5B; }
</style>
</head>
<body>
<a href="index.html">&larr; Back</a>

<div class="info-panel">
    <h2>Tartan Pattern Designer</h2>
    <p>Design tartan patterns using thread count sequences. Tartans exhibit reflection symmetry in both warp and weft, creating patterns classified by wallpaper groups.</p>
    <div class="symmetry-info" id="symmetryInfo"></div>
</div>

<div class="controls">
    <label>Preset:
        <select id="preset">
            <option value="royal_stewart">Royal Stewart</option>
            <option value="black_watch">Black Watch</option>
            <option value="macleod">MacLeod</option>
            <option value="gordon">Gordon</option>
            <option value="custom">Custom</option>
        </select>
    </label>
    <label>Thread Size: <input type="range" id="threadSize" min="2" max="12" value="5"></label>
    <label>Opacity: <input type="range" id="opacity" min="30" max="90" value="60"></label>
    <button id="randomBtn">Random Tartan</button>
</div>

<canvas id="canvas"></canvas>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const tartanPresets = {
    royal_stewart: {
        sett: [
            {color: '#c8102e', count: 7},
            {color: '#000000', count: 1},
            {color: '#c8102e', count: 1},
            {color: '#00205b', count: 5},
            {color: '#c8102e', count: 1},
            {color: '#000000', count: 1},
            {color: '#ffd700', count: 1},
            {color: '#000000', count: 1},
            {color: '#00843d', count: 5},
            {color: '#000000', count: 1},
            {color: '#ffd700', count: 1},
        ],
        name: 'Royal Stewart'
    },
    black_watch: {
        sett: [
            {color: '#003366', count: 6},
            {color: '#000000', count: 2},
            {color: '#003366', count: 2},
            {color: '#000000', count: 2},
            {color: '#006633', count: 6},
            {color: '#000000', count: 2},
            {color: '#006633', count: 2},
            {color: '#000000', count: 2},
        ],
        name: 'Black Watch'
    },
    macleod: {
        sett: [
            {color: '#ffd700', count: 4},
            {color: '#000000', count: 2},
            {color: '#ffd700', count: 4},
            {color: '#000000', count: 2},
            {color: '#ffd700', count: 2},
            {color: '#000000', count: 8},
        ],
        name: 'MacLeod'
    },
    gordon: {
        sett: [
            {color: '#006633', count: 6},
            {color: '#ffd700', count: 1},
            {color: '#006633', count: 2},
            {color: '#000000', count: 4},
            {color: '#006633', count: 2},
            {color: '#00205b', count: 4},
        ],
        name: 'Gordon'
    }
};

let currentSett = tartanPresets.royal_stewart.sett;
let threadSize = 5;
let weftOpacity = 0.6;
let animPhase = 0;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function expandSett(sett) {
    // Expand thread counts, then mirror for reflection symmetry
    let threads = [];
    for (const s of sett) {
        for (let i = 0; i < s.count; i++) threads.push(s.color);
    }
    // Mirror (exclude last element to avoid doubling)
    const mirrored = [...threads, ...threads.slice(0, -1).reverse()];
    return mirrored;
}

function analyzeSymmetry(threads) {
    const n = threads.length;
    let hasReflectH = true;
    for (let i = 0; i < Math.floor(n / 2); i++) {
        if (threads[i] !== threads[n - 1 - i]) { hasReflectH = false; break; }
    }
    const info = document.getElementById('symmetryInfo');
    const uniqueColors = new Set(threads).size;
    info.innerHTML = `Thread count: ${n}<br>Unique colors: ${uniqueColors}<br>` +
        `Reflection symmetry: ${hasReflectH ? 'Yes (pmm)' : 'Translation only (p1)'}<br>` +
        `Wallpaper group: ${hasReflectH ? 'pmm (2 mirrors + 180\u00B0)' : 'p1 (translation only)'}`;
}

function draw() {
    animPhase += 0.003;
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, w, h);

    const threads = expandSett(currentSett);
    const n = threads.length;
    analyzeSymmetry(threads);

    const ts = threadSize;
    const repeatW = n * ts;
    const repeatH = n * ts;

    // Draw background cloth
    ctx.fillStyle = '#2a2a3e';
    ctx.fillRect(0, 0, w, h);

    // Draw warp (vertical) threads
    for (let x = 0; x < w + repeatW; x += ts) {
        const idx = Math.floor(x / ts) % n;
        const threadIdx = ((idx % n) + n) % n;
        ctx.fillStyle = threads[threadIdx];
        ctx.globalAlpha = 0.7;
        ctx.fillRect(x, 0, ts - 0.5, h);
    }

    // Draw weft (horizontal) threads with transparency for interlacing effect
    for (let y = 0; y < h + repeatH; y += ts) {
        const idx = Math.floor(y / ts) % n;
        const threadIdx = ((idx % n) + n) % n;
        ctx.fillStyle = threads[threadIdx];
        ctx.globalAlpha = weftOpacity;
        ctx.fillRect(0, y, w, ts - 0.5);
    }
    ctx.globalAlpha = 1;

    // Draw pattern repeat boundary markers
    ctx.strokeStyle = 'rgba(254,250,224,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    for (let x = 0; x < w; x += repeatW) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
    }
    for (let y = 0; y < h; y += repeatH) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
    }
    ctx.setLineDash([]);

    // Draw symmetry axes indicator on first repeat
    if (repeatW > 50) {
        const cx = repeatW / 2;
        const cy = repeatH / 2;
        ctx.strokeStyle = 'rgba(221,161,94,0.3)';
        ctx.lineWidth = 1;
        ctx.setLineDash([2, 6]);
        // Horizontal axis
        ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(repeatW, cy); ctx.stroke();
        // Vertical axis
        ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, repeatH); ctx.stroke();
        ctx.setLineDash([]);
        // Center point
        ctx.fillStyle = 'rgba(221,161,94,0.5)';
        ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();
    }

    requestAnimationFrame(draw);
}

function randomTartan() {
    const palette = ['#c8102e', '#00205b', '#006633', '#ffd700', '#000000', '#8A9A5B', '#606C38', '#DDA15E', '#BC6C25', '#800020', '#2f4f4f'];
    const numBands = 3 + Math.floor(Math.random() * 5);
    const sett = [];
    for (let i = 0; i < numBands; i++) {
        sett.push({
            color: palette[Math.floor(Math.random() * palette.length)],
            count: 1 + Math.floor(Math.random() * 8)
        });
    }
    currentSett = sett;
}

document.getElementById('preset').addEventListener('change', (e) => {
    if (e.target.value === 'custom') { randomTartan(); return; }
    currentSett = tartanPresets[e.target.value].sett;
});

document.getElementById('threadSize').addEventListener('input', (e) => {
    threadSize = parseInt(e.target.value);
});

document.getElementById('opacity').addEventListener('input', (e) => {
    weftOpacity = parseInt(e.target.value) / 100;
});

document.getElementById('randomBtn').addEventListener('click', () => {
    randomTartan();
    document.getElementById('preset').value = 'custom';
});

window.reset = function() {
    currentSett = tartanPresets.royal_stewart.sett;
    threadSize = 5;
    weftOpacity = 0.6;
    document.getElementById('preset').value = 'royal_stewart';
    document.getElementById('threadSize').value = 5;
    document.getElementById('opacity').value = 60;
};

draw();
</script>
</body>
</html>
