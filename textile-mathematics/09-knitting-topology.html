<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knitting Topology - Textile Mathematics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
a { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }

.controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 12px 20px;
    border-radius: 16px; border: 1px solid rgba(138,154,91,0.3); z-index: 100;
}
.controls label { font-size: 0.85rem; color: #8A9A5B; }
.controls select, .controls input[type=range] {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(138,154,91,0.4);
    color: #FEFAE0; padding: 4px 8px; border-radius: 8px; font-size: 0.85rem; cursor: pointer;
}
.controls input[type=range] { width: 90px; }

.info-panel {
    position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 14px;
    border: 1px solid rgba(138,154,91,0.3); max-width: 280px; z-index: 100;
}
.info-panel h2 { font-size: 1rem; color: #DDA15E; margin-bottom: 6px; }
.info-panel p { font-size: 0.8rem; line-height: 1.5; opacity: 0.8; }
.topology-info { margin-top: 8px; font-size: 0.8rem; color: #8A9A5B; }
</style>
</head>
<body>
<a href="index.html">&larr; Back</a>

<div class="info-panel">
    <h2>Knitting Topology</h2>
    <p>Explore topological surfaces that can be knitted: the cylinder, Mobius strip, torus, and Klein bottle. Each is built from a single strand of yarn connecting loops in specific topological configurations.</p>
    <div class="topology-info" id="topoInfo"></div>
</div>

<div class="controls">
    <label>Surface:
        <select id="surface">
            <option value="cylinder">Cylinder</option>
            <option value="mobius">Mobius Strip</option>
            <option value="torus">Torus</option>
            <option value="klein">Klein Bottle</option>
        </select>
    </label>
    <label>Resolution: <input type="range" id="resolution" min="8" max="40" value="20"></label>
    <label>Yarn Width: <input type="range" id="yarnWidth" min="1" max="5" value="2"></label>
    <label>Rotate: <input type="range" id="rotSpeed" min="0" max="20" value="8"></label>
</div>

<canvas id="canvas"></canvas>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let surfaceType = 'cylinder';
let resolution = 20;
let yarnWidth = 2;
let rotSpeed = 8;
let angleX = 0.3;
let angleY = 0;
let mouseDown = false;
let lastMouse = { x: 0, y: 0 };

const topoData = {
    cylinder: { orientable: true, sides: 2, euler: 0, genus: 0, desc: 'Orientable, 2 sides, 2 boundaries. Euler char: 0' },
    mobius: { orientable: false, sides: 1, euler: 0, genus: 0, desc: 'Non-orientable, 1 side, 1 boundary. Euler char: 0' },
    torus: { orientable: true, sides: 2, euler: 0, genus: 1, desc: 'Orientable, genus 1, no boundary. Euler char: 0' },
    klein: { orientable: false, sides: 1, euler: 0, genus: 0, desc: 'Non-orientable, 1 side, no boundary. Euler char: 0' }
};

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function generateSurface(type, res) {
    const points = [];
    const u_steps = res * 2;
    const v_steps = res;

    for (let ui = 0; ui <= u_steps; ui++) {
        const u = (ui / u_steps) * Math.PI * 2;
        for (let vi = 0; vi <= v_steps; vi++) {
            const v = (vi / v_steps) * 2 - 1; // -1 to 1
            let x, y, z;

            switch(type) {
                case 'cylinder': {
                    const R = 120;
                    const H = 200;
                    x = R * Math.cos(u);
                    z = R * Math.sin(u);
                    y = v * H / 2;
                    break;
                }
                case 'mobius': {
                    const R = 120;
                    const w = 60;
                    x = (R + v * w * Math.cos(u / 2)) * Math.cos(u);
                    z = (R + v * w * Math.cos(u / 2)) * Math.sin(u);
                    y = v * w * Math.sin(u / 2);
                    break;
                }
                case 'torus': {
                    const R = 120;
                    const r = 50;
                    const vAngle = v * Math.PI;
                    x = (R + r * Math.cos(vAngle)) * Math.cos(u);
                    z = (R + r * Math.cos(vAngle)) * Math.sin(u);
                    y = r * Math.sin(vAngle);
                    break;
                }
                case 'klein': {
                    // Klein bottle immersion (figure-8)
                    const a = 100;
                    const vAngle = v * Math.PI;
                    const r = a * (0.5 + 0.3 * Math.cos(u));
                    if (u < Math.PI) {
                        x = (a * (1 + Math.sin(u)) + r * Math.cos(vAngle)) * Math.cos(u);
                        z = (a * (1 + Math.sin(u)) + r * Math.cos(vAngle)) * Math.sin(u);
                    } else {
                        x = (a * (1 + Math.sin(u)) - r * Math.cos(vAngle)) * Math.cos(u);
                        z = (a * (1 + Math.sin(u)) - r * Math.cos(vAngle)) * Math.sin(u);
                    }
                    y = r * Math.sin(vAngle);
                    // Scale down
                    x *= 0.5; y *= 0.5; z *= 0.5;
                    break;
                }
            }
            points.push({ x, y, z, u: ui, v: vi });
        }
    }
    return { points, u_steps, v_steps };
}

function project(x, y, z) {
    // Rotate
    let x1 = x;
    let y1 = y * Math.cos(angleX) - z * Math.sin(angleX);
    let z1 = y * Math.sin(angleX) + z * Math.cos(angleX);

    let x2 = x1 * Math.cos(angleY) + z1 * Math.sin(angleY);
    let y2 = y1;
    let z2 = -x1 * Math.sin(angleY) + z1 * Math.cos(angleY);

    const scale = 400 / (400 + z2);
    return {
        x: x2 * scale + canvas.width / 2,
        y: y2 * scale + canvas.height / 2 - 30,
        z: z2,
        scale
    };
}

function draw() {
    angleY += rotSpeed * 0.0005;
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, w, h);

    const surface = generateSurface(surfaceType, resolution);
    const { points, u_steps, v_steps } = surface;

    // Update topology info
    const td = topoData[surfaceType];
    document.getElementById('topoInfo').innerHTML = td.desc +
        `<br>Vertices: ${points.length} | Stitches: ~${u_steps * v_steps}`;

    // Draw knit stitch pattern along U direction (rows)
    // Each "row" is a v-value, stitches go along u
    const stitchColors = ['#606C38', '#8A9A5B', '#DDA15E'];

    // Collect segments with z-depth for sorting
    const segments = [];

    for (let vi = 0; vi < v_steps; vi++) {
        const colorIdx = vi % stitchColors.length;
        for (let ui = 0; ui < u_steps; ui++) {
            const i1 = ui * (v_steps + 1) + vi;
            const i2 = (ui + 1) * (v_steps + 1) + vi;
            const p1 = points[i1];
            const p2 = points[i2];
            const proj1 = project(p1.x, p1.y, p1.z);
            const proj2 = project(p2.x, p2.y, p2.z);
            const avgZ = (proj1.z + proj2.z) / 2;

            segments.push({
                x1: proj1.x, y1: proj1.y,
                x2: proj2.x, y2: proj2.y,
                z: avgZ,
                color: stitchColors[colorIdx],
                isU: true,
                scale: (proj1.scale + proj2.scale) / 2
            });
        }
    }

    // V direction (columns)
    for (let ui = 0; ui <= u_steps; ui += 2) {
        for (let vi = 0; vi < v_steps; vi++) {
            const i1 = ui * (v_steps + 1) + vi;
            const i2 = ui * (v_steps + 1) + vi + 1;
            if (i1 >= points.length || i2 >= points.length) continue;
            const p1 = points[i1];
            const p2 = points[i2];
            const proj1 = project(p1.x, p1.y, p1.z);
            const proj2 = project(p2.x, p2.y, p2.z);
            const avgZ = (proj1.z + proj2.z) / 2;

            segments.push({
                x1: proj1.x, y1: proj1.y,
                x2: proj2.x, y2: proj2.y,
                z: avgZ,
                color: 'rgba(254,250,224,0.15)',
                isU: false,
                scale: (proj1.scale + proj2.scale) / 2
            });
        }
    }

    // Sort by z (painter's algorithm)
    segments.sort((a, b) => a.z - b.z);

    // Draw
    for (const seg of segments) {
        ctx.beginPath();
        ctx.moveTo(seg.x1, seg.y1);

        if (seg.isU) {
            // Knit stitch curve (loop shape)
            const mx = (seg.x1 + seg.x2) / 2;
            const my = (seg.y1 + seg.y2) / 2;
            const dx = seg.x2 - seg.x1;
            const dy = seg.y2 - seg.y1;
            const bulge = 3 * seg.scale;
            ctx.bezierCurveTo(
                seg.x1 + dx * 0.3 - dy * 0.15 * bulge / 10, seg.y1 + dy * 0.3 + dx * 0.15 * bulge / 10,
                seg.x1 + dx * 0.7 - dy * 0.15 * bulge / 10, seg.y1 + dy * 0.7 + dx * 0.15 * bulge / 10,
                seg.x2, seg.y2
            );
        } else {
            ctx.lineTo(seg.x2, seg.y2);
        }

        const brightness = Math.max(0.3, Math.min(1, 1 - seg.z / 400));
        ctx.strokeStyle = seg.color;
        ctx.globalAlpha = brightness;
        ctx.lineWidth = seg.isU ? yarnWidth * seg.scale : 0.5 * seg.scale;
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    // Draw identification arrows for edge gluing
    ctx.strokeStyle = 'rgba(221,161,94,0.4)';
    ctx.fillStyle = 'rgba(221,161,94,0.6)';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';

    if (surfaceType === 'mobius') {
        ctx.fillText('Half-twist identification: a \u2192 -a', w / 2, h - 90);
    } else if (surfaceType === 'klein') {
        ctx.fillText('Identification: a \u2192 a, b \u2192 -b', w / 2, h - 90);
    } else if (surfaceType === 'torus') {
        ctx.fillText('Identification: a \u2192 a, b \u2192 b', w / 2, h - 90);
    }

    requestAnimationFrame(draw);
}

// Mouse rotation
canvas.addEventListener('mousedown', (e) => {
    mouseDown = true;
    lastMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mousemove', (e) => {
    if (mouseDown) {
        const dx = e.clientX - lastMouse.x;
        const dy = e.clientY - lastMouse.y;
        angleY += dx * 0.005;
        angleX += dy * 0.005;
        lastMouse = { x: e.clientX, y: e.clientY };
    }
});

canvas.addEventListener('mouseup', () => { mouseDown = false; });

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    mouseDown = true;
    lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (mouseDown) {
        const dx = e.touches[0].clientX - lastMouse.x;
        const dy = e.touches[0].clientY - lastMouse.y;
        angleY += dx * 0.005;
        angleX += dy * 0.005;
        lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
}, { passive: false });

canvas.addEventListener('touchend', () => { mouseDown = false; });

document.getElementById('surface').addEventListener('change', (e) => { surfaceType = e.target.value; });
document.getElementById('resolution').addEventListener('input', (e) => { resolution = parseInt(e.target.value); });
document.getElementById('yarnWidth').addEventListener('input', (e) => { yarnWidth = parseInt(e.target.value); });
document.getElementById('rotSpeed').addEventListener('input', (e) => { rotSpeed = parseInt(e.target.value); });

window.reset = function() {
    surfaceType = 'cylinder';
    resolution = 20;
    yarnWidth = 2;
    rotSpeed = 8;
    angleX = 0.3;
    angleY = 0;
    document.getElementById('surface').value = 'cylinder';
    document.getElementById('resolution').value = 20;
    document.getElementById('yarnWidth').value = 2;
    document.getElementById('rotSpeed').value = 8;
};

draw();
</script>
</body>
</html>
