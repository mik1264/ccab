<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoshizawa-Randlett Notation - Origami Mathematics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    color: #3d4423;
}
canvas { display: block; }

.back-link {
    position: fixed; top: 10px; left: 10px; color: #8A9A5B;
    text-decoration: none; z-index: 1000; font-size: 1.2rem;
}
.back-link:hover { color: #606C38; }

.panel {
    position: fixed; top: 10px; right: 10px; z-index: 100;
    background: rgba(254,250,224,0.92); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 16px; width: 290px;
    border: 1px solid rgba(138,154,91,0.25);
    max-height: 92vh; overflow-y: auto;
}
.panel h3 {
    font-size: 15px; color: #606C38; margin-bottom: 6px;
    border-bottom: 2px solid #DDA15E; padding-bottom: 6px;
}
.panel p { font-size: 11px; line-height: 1.5; color: #606C38; margin-bottom: 8px; }

.symbol-card {
    background: rgba(255,255,255,0.6); border-radius: 10px;
    padding: 10px; margin: 6px 0; cursor: pointer;
    border: 2px solid transparent; transition: all 0.2s;
}
.symbol-card:hover { background: rgba(255,255,255,0.9); }
.symbol-card.active { border-color: #DDA15E; background: rgba(221,161,94,0.1); }
.symbol-name { font-size: 13px; font-weight: 700; color: #3d4423; }
.symbol-desc { font-size: 10px; color: #8A9A5B; line-height: 1.4; margin-top: 2px; }
.symbol-preview {
    display: inline-block; width: 40px; height: 30px;
    vertical-align: middle; margin-right: 8px;
}

.btn {
    display: inline-block; margin: 3px; padding: 6px 12px; border: none;
    border-radius: 8px; background: #8A9A5B; color: white;
    font-size: 12px; cursor: pointer;
}
.btn:hover { background: #606C38; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="panel">
    <h3>Yoshizawa-Randlett Notation</h3>
    <p>The standard diagramming system for origami, created by Akira Yoshizawa and refined by
       Samuel Randlett and Robert Harbin. Click each symbol to see it animated on the paper.</p>
    <div id="symbolList"></div>
    <div style="margin-top:8px;">
        <button class="btn" onclick="cycleAll()">Cycle All</button>
        <button class="btn" onclick="resetDemo()">Reset</button>
    </div>
</div>

<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

const symbols = [
    {
        name: "Valley Fold",
        desc: "Dashed line with arrow curving forward. Fold paper toward you.",
        lineStyle: "dash", arrowDir: "forward", color: "#BC6C25",
        drawDemo: (t) => drawValleyFold(t)
    },
    {
        name: "Mountain Fold",
        desc: "Dash-dot line with arrow curving behind. Fold paper away from you.",
        lineStyle: "dashdot", arrowDir: "behind", color: "#606C38",
        drawDemo: (t) => drawMountainFold(t)
    },
    {
        name: "Fold and Unfold",
        desc: "Valley fold line with a double-headed arrow. Make crease then open.",
        lineStyle: "dash", arrowDir: "double", color: "#DDA15E",
        drawDemo: (t) => drawFoldUnfold(t)
    },
    {
        name: "Existing Crease",
        desc: "Thin solid line showing a previously made fold.",
        lineStyle: "thin", arrowDir: "none", color: "#8A9A5B",
        drawDemo: (t) => drawExistingCrease(t)
    },
    {
        name: "Turn Over",
        desc: "Curved arrow looping around. Flip the paper to the other side.",
        lineStyle: "none", arrowDir: "loop", color: "#BC6C25",
        drawDemo: (t) => drawTurnOver(t)
    },
    {
        name: "Push / Sink",
        desc: "Arrow pointing inward. Push paper inside along existing creases.",
        lineStyle: "dash", arrowDir: "in", color: "#606C38",
        drawDemo: (t) => drawPushSink(t)
    },
    {
        name: "Repeat",
        desc: "Arrow with hash marks. Repeat the fold on other layers or sides.",
        lineStyle: "none", arrowDir: "repeat", color: "#DDA15E",
        drawDemo: (t) => drawRepeat(t)
    },
    {
        name: "Cut Line",
        desc: "Zigzag or scissors line. Cut along this line.",
        lineStyle: "zigzag", arrowDir: "none", color: "#BC6C25",
        drawDemo: (t) => drawCutLine(t)
    }
];

let currentSymbol = 0;
let animTime = 0;
let cycling = false;
let cycleTimer = 0;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}

function resetDemo() {
    currentSymbol = 0;
    animTime = 0;
    cycling = false;
    updateSymbolList();
}
window.reset = resetDemo;

function cycleAll() {
    cycling = true;
    currentSymbol = 0;
    animTime = 0;
    cycleTimer = 0;
    updateSymbolList();
}

function updateSymbolList() {
    const list = document.getElementById('symbolList');
    if (list.children.length === 0) {
        symbols.forEach((sym, i) => {
            const card = document.createElement('div');
            card.className = 'symbol-card' + (i === currentSymbol ? ' active' : '');
            card.innerHTML = `<div class="symbol-name">${sym.name}</div><div class="symbol-desc">${sym.desc}</div>`;
            card.onclick = () => { currentSymbol = i; animTime = 0; cycling = false; updateSymbolList(); };
            list.appendChild(card);
        });
    } else {
        const cards = list.querySelectorAll('.symbol-card');
        cards.forEach((c, i) => {
            c.className = 'symbol-card' + (i === currentSymbol ? ' active' : '');
        });
    }
}

// Paper drawing helpers
const paperW = 300, paperH = 300;
function getPaper() {
    const px = (W - 310 - paperW) / 2 + 20;
    const py = (H - paperH) / 2;
    return { px, py };
}

function drawPaper(foldAngle) {
    const { px, py } = getPaper();
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.08)';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#FFFEF5';
    ctx.fillRect(px, py, paperW, paperH);
    ctx.restore();
    ctx.strokeStyle = 'rgba(138,154,91,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(px, py, paperW, paperH);
    return { px, py };
}

function drawDashLine(x1, y1, x2, y2, style, color, width) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = color;
    ctx.lineWidth = width || 2.5;
    if (style === 'dash') ctx.setLineDash([8, 5]);
    else if (style === 'dashdot') ctx.setLineDash([10, 4, 3, 4]);
    else if (style === 'thin') { ctx.setLineDash([]); ctx.lineWidth = 1; }
    else ctx.setLineDash([]);
    ctx.stroke();
    ctx.setLineDash([]);
}

function drawArrow(x1, y1, x2, y2, color) {
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const headLen = 12;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - headLen * Math.cos(angle - 0.4), y2 - headLen * Math.sin(angle - 0.4));
    ctx.lineTo(x2 - headLen * Math.cos(angle + 0.4), y2 - headLen * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
}

function drawCurvedArrow(cx, cy, r, startA, endA, color) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, startA, endA);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    // Arrowhead
    const ax = cx + r * Math.cos(endA);
    const ay = cy + r * Math.sin(endA);
    const tangent = endA + Math.PI / 2;
    const headLen = 10;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax + headLen * Math.cos(tangent - 0.5), ay + headLen * Math.sin(tangent - 0.5));
    ctx.lineTo(ax + headLen * Math.cos(tangent + 0.5), ay + headLen * Math.sin(tangent + 0.5));
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
}

// Demo drawing functions
function drawValleyFold(t) {
    const { px, py } = drawPaper();
    const foldY = py + paperH / 2;
    const progress = Math.min(t / 2, 1);

    // Fold line
    drawDashLine(px, foldY, px + paperW, foldY, 'dash', '#BC6C25', 2.5);

    // Arrow
    const arrowX = px + paperW / 2;
    drawCurvedArrow(arrowX, foldY, 40, Math.PI * 0.1, -Math.PI * 0.6, '#BC6C25');

    // Animated fold
    if (progress > 0) {
        ctx.save();
        ctx.globalAlpha = 0.3 + progress * 0.4;
        ctx.translate(px, foldY);
        ctx.scale(1, -1);
        ctx.translate(-px, -foldY);
        const foldH = paperH / 2 * progress;
        ctx.fillStyle = 'rgba(221,161,94,0.2)';
        ctx.fillRect(px, foldY - foldH, paperW, foldH);
        ctx.restore();
    }

    // Label
    ctx.fillStyle = '#BC6C25';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Valley Fold', px + paperW / 2, py - 20);
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#8A9A5B';
    ctx.fillText('Fold toward you (dashed line)', px + paperW / 2, py + paperH + 30);
}

function drawMountainFold(t) {
    const { px, py } = drawPaper();
    const foldY = py + paperH / 2;

    drawDashLine(px, foldY, px + paperW, foldY, 'dashdot', '#606C38', 2.5);
    drawCurvedArrow(px + paperW / 2, foldY, 40, -Math.PI * 0.1, Math.PI * 0.6, '#606C38');

    ctx.fillStyle = '#606C38';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Mountain Fold', px + paperW / 2, py - 20);
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#8A9A5B';
    ctx.fillText('Fold away from you (dash-dot line)', px + paperW / 2, py + paperH + 30);
}

function drawFoldUnfold(t) {
    const { px, py } = drawPaper();
    const foldY = py + paperH / 2;
    const cycle = (t * 0.5) % 2;

    drawDashLine(px, foldY, px + paperW, foldY, 'dash', '#DDA15E', 2.5);

    // Double arrow
    const arrowX = px + paperW / 2;
    drawCurvedArrow(arrowX, foldY, 40, Math.PI * 0.1, -Math.PI * 0.6, '#DDA15E');
    drawCurvedArrow(arrowX, foldY, 40, -Math.PI * 0.1, Math.PI * 0.6, '#DDA15E');

    ctx.fillStyle = '#DDA15E';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Fold and Unfold', px + paperW / 2, py - 20);
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#8A9A5B';
    ctx.fillText('Make the crease, then open back up', px + paperW / 2, py + paperH + 30);

    // Show thin crease line result
    if (cycle > 1) {
        drawDashLine(px + 5, foldY, px + paperW - 5, foldY, 'thin', 'rgba(138,154,91,0.5)', 1);
    }
}

function drawExistingCrease(t) {
    const { px, py } = drawPaper();
    // Multiple existing creases forming a pattern
    const mid = paperW / 2;
    drawDashLine(px, py, px + mid, py + mid, 'thin', '#8A9A5B', 1);
    drawDashLine(px + paperW, py, px + mid, py + mid, 'thin', '#8A9A5B', 1);
    drawDashLine(px + mid, py + mid, px + mid, py + paperH, 'thin', '#8A9A5B', 1);

    ctx.fillStyle = '#8A9A5B';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Existing Crease', px + paperW / 2, py - 20);
    ctx.font = '12px sans-serif';
    ctx.fillText('Thin line showing a previously made fold', px + paperW / 2, py + paperH + 30);
}

function drawTurnOver(t) {
    const { px, py } = drawPaper();
    const cx = px + paperW / 2;
    const cy = py + paperH / 2;

    // Large curved arrow
    const rot = t * 0.5;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(Math.sin(rot) * 0.2);
    ctx.translate(-cx, -cy);

    ctx.beginPath();
    ctx.ellipse(cx, cy - 30, 60, 30, 0, Math.PI * 0.9, -Math.PI * 0.1, true);
    ctx.strokeStyle = '#BC6C25';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Arrowhead
    const ax = cx + 60 * Math.cos(-Math.PI * 0.1);
    const ay = cy - 30 + 30 * Math.sin(-Math.PI * 0.1);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - 5, ay - 12);
    ctx.lineTo(ax + 10, ay - 3);
    ctx.closePath();
    ctx.fillStyle = '#BC6C25';
    ctx.fill();
    ctx.restore();

    ctx.fillStyle = '#BC6C25';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Turn Over', px + paperW / 2, py - 20);
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#8A9A5B';
    ctx.fillText('Flip the entire paper to the other side', px + paperW / 2, py + paperH + 30);
}

function drawPushSink(t) {
    const { px, py } = drawPaper();
    const tipX = px + paperW / 2;
    const tipY = py + 40;

    // Draw triangular tip
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX - 60, py + paperH * 0.4);
    ctx.lineTo(tipX + 60, py + paperH * 0.4);
    ctx.closePath();
    ctx.strokeStyle = '#606C38';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Dashed fold line
    drawDashLine(tipX - 60, py + paperH * 0.4, tipX + 60, py + paperH * 0.4, 'dash', '#606C38', 2);

    // Push arrow
    const pushDepth = Math.sin(t) * 20 + 20;
    drawArrow(tipX, tipY - 20, tipX, tipY + pushDepth, '#606C38');

    ctx.fillStyle = '#606C38';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Push / Sink', px + paperW / 2, py - 20);
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#8A9A5B';
    ctx.fillText('Push paper inward along creases', px + paperW / 2, py + paperH + 30);
}

function drawRepeat(t) {
    const { px, py } = drawPaper();
    // Arrow with hash marks
    const y = py + paperH / 2;
    drawArrow(px + 50, y, px + paperW - 50, y, '#DDA15E');

    // Hash marks on arrow
    const hashX = px + paperW / 2;
    for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(hashX + i * 12 - 4, y - 8);
        ctx.lineTo(hashX + i * 12 + 4, y + 8);
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2.5;
        ctx.stroke();
    }

    ctx.fillStyle = '#DDA15E';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Repeat', px + paperW / 2, py - 20);
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#8A9A5B';
    ctx.fillText('Repeat fold on other layers (hash marks = number of times)', px + paperW / 2, py + paperH + 30);
}

function drawCutLine(t) {
    const { px, py } = drawPaper();
    const cutY = py + paperH * 0.6;

    // Zigzag line
    ctx.beginPath();
    ctx.moveTo(px + 20, cutY);
    const zigSize = 6;
    for (let x = px + 20; x < px + paperW - 20; x += zigSize * 2) {
        ctx.lineTo(x + zigSize, cutY - zigSize);
        ctx.lineTo(x + zigSize * 2, cutY);
    }
    ctx.strokeStyle = '#BC6C25';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Scissors icon
    const scissX = px + paperW * 0.3 + Math.sin(t * 2) * 30;
    ctx.fillStyle = '#BC6C25';
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('\u2702', scissX, cutY - 15);

    ctx.fillStyle = '#BC6C25';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Cut Line', px + paperW / 2, py - 20);
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#8A9A5B';
    ctx.fillText('Zigzag or scissors mark indicates a cut', px + paperW / 2, py + paperH + 30);
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#FEFAE0');
    grad.addColorStop(0.5, '#F4F1DE');
    grad.addColorStop(1, '#EDE8D5');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    symbols[currentSymbol].drawDemo(animTime);
}

function animate() {
    animTime += 0.016;

    if (cycling) {
        cycleTimer += 0.016;
        if (cycleTimer > 3) {
            cycleTimer = 0;
            animTime = 0;
            currentSymbol = (currentSymbol + 1) % symbols.length;
            if (currentSymbol === 0) cycling = false;
            updateSymbolList();
        }
    }

    draw();
    requestAnimationFrame(animate);
}

window.addEventListener('resize', resize);
resize();
updateSymbolList();
animate();
</script>
</body>
</html>
