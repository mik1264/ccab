<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Origami Tessellations - Origami Mathematics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    color: #3d4423;
}
canvas { display: block; }

.back-link {
    position: fixed; top: 10px; left: 10px; color: #8A9A5B;
    text-decoration: none; z-index: 1000; font-size: 1.2rem;
}
.back-link:hover { color: #606C38; }

.panel {
    position: fixed; top: 10px; right: 10px; z-index: 100;
    background: rgba(254,250,224,0.92); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 16px; width: 260px;
    border: 1px solid rgba(138,154,91,0.25);
}
.panel h3 {
    font-size: 15px; color: #606C38; margin-bottom: 6px;
    border-bottom: 2px solid #DDA15E; padding-bottom: 6px;
}
.panel p { font-size: 11px; line-height: 1.5; color: #606C38; margin-bottom: 8px; }

label { display: block; font-size: 12px; color: #8A9A5B; margin-top: 8px; }
input[type=range] { width: 100%; accent-color: #8A9A5B; }
.val { font-size: 11px; color: #606C38; text-align: right; font-family: monospace; }

.tess-btn {
    display: inline-block; margin: 3px; padding: 6px 10px; border: 2px solid transparent;
    border-radius: 8px; background: rgba(138,154,91,0.1);
    color: #3d4423; font-size: 11px; cursor: pointer; transition: all 0.2s;
}
.tess-btn:hover { background: rgba(138,154,91,0.2); }
.tess-btn.active { border-color: #DDA15E; background: rgba(221,161,94,0.15); font-weight: 600; }

.btn {
    display: inline-block; margin: 3px; padding: 6px 12px; border: none;
    border-radius: 8px; background: #8A9A5B; color: white;
    font-size: 12px; cursor: pointer;
}
.btn:hover { background: #606C38; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="panel">
    <h3>Origami Tessellations</h3>
    <p>Tessellations fold a flat sheet into repeating geometric patterns. The crease pattern tiles
       the plane, and when folded, creates stunning 3D textures from a single sheet of paper.</p>

    <div style="margin-bottom:8px;">
        <button class="tess-btn active" id="tTriangle" onclick="setTess('triangle')">Triangle Twist</button>
        <button class="tess-btn" id="tSquare" onclick="setTess('square')">Square Twist</button>
        <button class="tess-btn" id="tHex" onclick="setTess('hex')">Hex Twist</button>
        <button class="tess-btn" id="tPinwheel" onclick="setTess('pinwheel')">Pinwheel</button>
    </div>

    <label>Fold Depth</label>
    <input type="range" id="foldSlider" min="0" max="100" value="50">
    <div class="val" id="foldVal">50%</div>

    <label>Tile Scale</label>
    <input type="range" id="scaleSlider" min="30" max="120" value="60">
    <div class="val" id="scaleVal">60</div>

    <label>Twist Amount</label>
    <input type="range" id="twistSlider" min="0" max="100" value="50">
    <div class="val" id="twistVal">50%</div>

    <label>Light Angle</label>
    <input type="range" id="lightSlider" min="0" max="360" value="45">
    <div class="val" id="lightVal">45&deg;</div>

    <div style="margin-top:8px;">
        <button class="btn" onclick="toggleAnimate()">Animate</button>
        <button class="btn" onclick="resetDemo()">Reset</button>
    </div>
</div>

<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

let tessType = 'triangle';
let animating = false;
let animTime = 0;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}

function resetDemo() {
    document.getElementById('foldSlider').value = 50;
    document.getElementById('scaleSlider').value = 60;
    document.getElementById('twistSlider').value = 50;
    document.getElementById('lightSlider').value = 45;
    tessType = 'triangle';
    animating = false;
    document.querySelectorAll('.tess-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tTriangle').classList.add('active');
}
window.reset = resetDemo;

function setTess(t) {
    tessType = t;
    document.querySelectorAll('.tess-btn').forEach(b => b.classList.remove('active'));
    const ids = { triangle: 'tTriangle', square: 'tSquare', hex: 'tHex', pinwheel: 'tPinwheel' };
    document.getElementById(ids[t]).classList.add('active');
}

function toggleAnimate() { animating = !animating; }

function drawTriangleTess(scale, fold, twist, lightAngle) {
    const cx = (W - 280) / 2;
    const cy = H / 2;
    const rows = Math.ceil(H / (scale * 1.5)) + 2;
    const cols = Math.ceil((W - 280) / (scale * 1.7)) + 2;
    const h = scale * Math.sqrt(3) / 2;

    for (let r = -rows; r <= rows; r++) {
        for (let c = -cols; c <= cols; c++) {
            const x = cx + c * scale * 1.5;
            const y = cy + r * h * 2 + (c % 2) * h;

            // Triangle twist pattern
            const twistAngle = twist * Math.PI / 6;
            for (let t = 0; t < 3; t++) {
                const angle = t * Math.PI * 2 / 3 + twistAngle;
                const nextAngle = (t + 1) * Math.PI * 2 / 3 + twistAngle;
                const innerR = scale * 0.2 * (1 - fold * 0.5);
                const outerR = scale * 0.6;

                const x1 = x + Math.cos(angle) * innerR;
                const y1 = y + Math.sin(angle) * innerR;
                const x2 = x + Math.cos(angle) * outerR;
                const y2 = y + Math.sin(angle) * outerR;
                const x3 = x + Math.cos(nextAngle) * outerR;
                const y3 = y + Math.sin(nextAngle) * outerR;
                const x4 = x + Math.cos(nextAngle) * innerR;
                const y4 = y + Math.sin(nextAngle) * innerR;

                // Compute face normal for lighting
                const midAngle = (angle + nextAngle) / 2;
                const faceZ = fold * Math.cos(midAngle - lightAngle);
                const brightness = 0.4 + (faceZ + 1) * 0.3;

                const isMountain = t % 2 === 0;
                if (isMountain) {
                    const g = Math.floor(154 * brightness);
                    const rb = Math.floor(91 * brightness);
                    ctx.fillStyle = `rgb(${rb}, ${g}, ${rb})`;
                } else {
                    const r = Math.floor(221 * brightness);
                    const g = Math.floor(161 * brightness);
                    ctx.fillStyle = `rgb(${r}, ${g}, 94)`;
                }

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.lineTo(x3, y3);
                ctx.lineTo(x4, y4);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = `rgba(61,68,35,${0.1 + fold * 0.2})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Center polygon
            ctx.beginPath();
            for (let t = 0; t < 3; t++) {
                const angle = t * Math.PI * 2 / 3 + twistAngle;
                const innerR = scale * 0.2 * (1 - fold * 0.5);
                const px = x + Math.cos(angle) * innerR;
                const py = y + Math.sin(angle) * innerR;
                if (t === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fillStyle = `rgba(254,250,224,${0.3 + fold * 0.5})`;
            ctx.fill();
            ctx.stroke();
        }
    }
}

function drawSquareTess(scale, fold, twist, lightAngle) {
    const cx = (W - 280) / 2;
    const cy = H / 2;
    const rows = Math.ceil(H / scale) + 2;
    const cols = Math.ceil((W - 280) / scale) + 2;

    for (let r = -rows; r <= rows; r++) {
        for (let c = -cols; c <= cols; c++) {
            const x = cx + c * scale;
            const y = cy + r * scale;

            const twistAngle = twist * Math.PI / 4;
            // 4 trapezoidal flaps around a central square
            for (let t = 0; t < 4; t++) {
                const angle = t * Math.PI / 2 + twistAngle;
                const nextAngle = (t + 1) * Math.PI / 2 + twistAngle;
                const innerR = scale * 0.15 * (1 - fold * 0.3);
                const outerR = scale * 0.48;

                const x1 = x + Math.cos(angle) * innerR;
                const y1 = y + Math.sin(angle) * innerR;
                const x2 = x + Math.cos(angle) * outerR;
                const y2 = y + Math.sin(angle) * outerR;
                const x3 = x + Math.cos(nextAngle) * outerR;
                const y3 = y + Math.sin(nextAngle) * outerR;
                const x4 = x + Math.cos(nextAngle) * innerR;
                const y4 = y + Math.sin(nextAngle) * innerR;

                const midAngle = (angle + nextAngle) / 2;
                const faceZ = fold * Math.cos(midAngle - lightAngle);
                const brightness = 0.4 + (faceZ + 1) * 0.3;

                if (t % 2 === 0) {
                    const g = Math.floor(154 * brightness);
                    const rb = Math.floor(91 * brightness);
                    ctx.fillStyle = `rgb(${rb}, ${g}, ${rb})`;
                } else {
                    const r = Math.floor(221 * brightness);
                    const g = Math.floor(161 * brightness);
                    ctx.fillStyle = `rgb(${r}, ${g}, 94)`;
                }

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.lineTo(x3, y3);
                ctx.lineTo(x4, y4);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = `rgba(61,68,35,${0.1 + fold * 0.2})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Center square
            ctx.beginPath();
            for (let t = 0; t < 4; t++) {
                const angle = t * Math.PI / 2 + twistAngle;
                const innerR = scale * 0.15 * (1 - fold * 0.3);
                const px = x + Math.cos(angle) * innerR;
                const py = y + Math.sin(angle) * innerR;
                if (t === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fillStyle = `rgba(254,250,224,${0.3 + fold * 0.5})`;
            ctx.fill();
            ctx.stroke();
        }
    }
}

function drawHexTess(scale, fold, twist, lightAngle) {
    const cx = (W - 280) / 2;
    const cy = H / 2;
    const h = scale * Math.sqrt(3);
    const rows = Math.ceil(H / h) + 2;
    const cols = Math.ceil((W - 280) / (scale * 1.5)) + 2;

    for (let r = -rows; r <= rows; r++) {
        for (let c = -cols; c <= cols; c++) {
            const x = cx + c * scale * 1.5;
            const y = cy + r * h + (c % 2) * h * 0.5;

            const twistAngle = twist * Math.PI / 6;
            for (let t = 0; t < 6; t++) {
                const angle = t * Math.PI / 3 + twistAngle;
                const nextAngle = (t + 1) * Math.PI / 3 + twistAngle;
                const innerR = scale * 0.2 * (1 - fold * 0.4);
                const outerR = scale * 0.55;

                const x1 = x + Math.cos(angle) * innerR;
                const y1 = y + Math.sin(angle) * innerR;
                const x2 = x + Math.cos(angle) * outerR;
                const y2 = y + Math.sin(angle) * outerR;
                const x3 = x + Math.cos(nextAngle) * outerR;
                const y3 = y + Math.sin(nextAngle) * outerR;
                const x4 = x + Math.cos(nextAngle) * innerR;
                const y4 = y + Math.sin(nextAngle) * innerR;

                const midAngle = (angle + nextAngle) / 2;
                const faceZ = fold * Math.cos(midAngle - lightAngle);
                const brightness = 0.35 + (faceZ + 1) * 0.3;

                const colors = [
                    [91, 154, 91], [221, 161, 94], [138, 154, 91],
                    [188, 108, 37], [96, 108, 56], [221, 161, 94]
                ];
                const col = colors[t % 6];
                ctx.fillStyle = `rgb(${Math.floor(col[0] * brightness)}, ${Math.floor(col[1] * brightness)}, ${Math.floor(col[2] * brightness)})`;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.lineTo(x3, y3);
                ctx.lineTo(x4, y4);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = `rgba(61,68,35,${0.05 + fold * 0.15})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }

            // Center hexagon
            ctx.beginPath();
            for (let t = 0; t < 6; t++) {
                const angle = t * Math.PI / 3 + twistAngle;
                const innerR = scale * 0.2 * (1 - fold * 0.4);
                const px = x + Math.cos(angle) * innerR;
                const py = y + Math.sin(angle) * innerR;
                if (t === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fillStyle = `rgba(254,250,224,${0.2 + fold * 0.6})`;
            ctx.fill();
            ctx.strokeStyle = `rgba(61,68,35,${0.1 + fold * 0.2})`;
            ctx.stroke();
        }
    }
}

function drawPinwheelTess(scale, fold, twist, lightAngle) {
    const cx = (W - 280) / 2;
    const cy = H / 2;
    const rows = Math.ceil(H / scale) + 2;
    const cols = Math.ceil((W - 280) / scale) + 2;

    for (let r = -rows; r <= rows; r++) {
        for (let c = -cols; c <= cols; c++) {
            const x = cx + c * scale;
            const y = cy + r * scale;
            const twistAngle = twist * Math.PI / 2;
            const spin = ((r + c) % 2 === 0) ? 1 : -1;

            for (let t = 0; t < 4; t++) {
                const angle = t * Math.PI / 2 + twistAngle * spin;
                const nextAngle = angle + Math.PI / 2;
                const innerR = scale * 0.1;
                const outerR = scale * 0.48;
                const midR = scale * 0.3;

                // Pinwheel blade shape
                const tipA = angle + Math.PI / 4;
                const x1 = x + Math.cos(angle) * innerR;
                const y1 = y + Math.sin(angle) * innerR;
                const x2 = x + Math.cos(tipA) * outerR;
                const y2 = y + Math.sin(tipA) * outerR;
                const x3 = x + Math.cos(nextAngle) * innerR;
                const y3 = y + Math.sin(nextAngle) * innerR;

                const faceZ = fold * Math.cos(tipA - lightAngle) * spin;
                const brightness = 0.4 + (faceZ + 1) * 0.3;

                if ((t + (spin > 0 ? 0 : 1)) % 2 === 0) {
                    const g = Math.floor(154 * brightness);
                    const rb = Math.floor(91 * brightness);
                    ctx.fillStyle = `rgb(${rb}, ${g}, ${rb})`;
                } else {
                    const r = Math.floor(221 * brightness);
                    const g = Math.floor(161 * brightness);
                    ctx.fillStyle = `rgb(${r}, ${g}, 94)`;
                }

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.lineTo(x3, y3);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = `rgba(61,68,35,${0.1 + fold * 0.15})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#FEFAE0');
    grad.addColorStop(0.5, '#F4F1DE');
    grad.addColorStop(1, '#EDE8D5');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    const fold = parseInt(document.getElementById('foldSlider').value) / 100;
    const scale = parseInt(document.getElementById('scaleSlider').value);
    const twist = parseInt(document.getElementById('twistSlider').value) / 100;
    const lightAngle = parseInt(document.getElementById('lightSlider').value) * Math.PI / 180;

    document.getElementById('foldVal').textContent = document.getElementById('foldSlider').value + '%';
    document.getElementById('scaleVal').textContent = scale;
    document.getElementById('twistVal').textContent = document.getElementById('twistSlider').value + '%';
    document.getElementById('lightVal').textContent = document.getElementById('lightSlider').value + '\u00B0';

    if (tessType === 'triangle') drawTriangleTess(scale, fold, twist, lightAngle);
    else if (tessType === 'square') drawSquareTess(scale, fold, twist, lightAngle);
    else if (tessType === 'hex') drawHexTess(scale, fold, twist, lightAngle);
    else if (tessType === 'pinwheel') drawPinwheelTess(scale, fold, twist, lightAngle);
}

function animate() {
    if (animating) {
        animTime += 0.01;
        document.getElementById('twistSlider').value = Math.floor((Math.sin(animTime) * 0.5 + 0.5) * 100);
        document.getElementById('lightSlider').value = Math.floor(animTime * 30) % 360;
    }
    draw();
    requestAnimationFrame(animate);
}

window.addEventListener('resize', resize);
resize();
animate();
</script>
</body>
</html>
