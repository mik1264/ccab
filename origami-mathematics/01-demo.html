<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huzita-Hatori Axioms - Origami Mathematics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    color: #3d4423;
}
canvas { display: block; cursor: crosshair; }

.back-link {
    position: fixed; top: 10px; left: 10px; color: #8A9A5B;
    text-decoration: none; z-index: 1000; font-size: 1.2rem;
}
.back-link:hover { color: #606C38; }

.panel {
    position: fixed; top: 10px; right: 10px; z-index: 100;
    background: rgba(254,250,224,0.92); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 16px; width: 300px;
    border: 1px solid rgba(138,154,91,0.25);
    max-height: 90vh; overflow-y: auto;
}
.panel h3 {
    font-size: 15px; color: #606C38; margin-bottom: 10px;
    border-bottom: 2px solid #DDA15E; padding-bottom: 6px;
}
.axiom-btn {
    display: block; width: 100%; text-align: left;
    margin: 4px 0; padding: 8px 12px; border: 2px solid transparent;
    border-radius: 8px; background: rgba(138,154,91,0.1);
    color: #3d4423; font-size: 12px; cursor: pointer;
    transition: all 0.2s; line-height: 1.4;
}
.axiom-btn:hover { background: rgba(138,154,91,0.2); }
.axiom-btn.active {
    border-color: #DDA15E; background: rgba(221,161,94,0.15);
    color: #606C38; font-weight: 600;
}
.axiom-num {
    display: inline-block; width: 22px; height: 22px;
    background: linear-gradient(135deg, #8A9A5B, #606C38);
    color: white; border-radius: 50%; text-align: center;
    line-height: 22px; font-size: 11px; font-weight: 700;
    margin-right: 6px; flex-shrink: 0;
}
.axiom-btn-inner { display: flex; align-items: flex-start; }
.axiom-text { flex: 1; }

.instructions {
    margin-top: 10px; padding: 10px; border-radius: 8px;
    background: rgba(96,108,56,0.08); font-size: 12px;
    line-height: 1.6; color: #606C38;
}
.instructions strong { color: #BC6C25; }

.legend {
    margin-top: 8px; font-size: 11px; color: #8A9A5B;
}
.legend span {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 50%; margin-right: 4px; vertical-align: middle;
}

.clear-btn {
    display: block; width: 100%; margin-top: 8px; padding: 8px;
    border: none; border-radius: 8px; background: #BC6C25;
    color: white; font-size: 13px; cursor: pointer; font-weight: 600;
}
.clear-btn:hover { background: #a05520; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="panel">
    <h3>Huzita-Hatori Axioms</h3>
    <p style="font-size:11px;color:#8A9A5B;margin-bottom:8px;">
        The 7 axioms that define all possible single-fold operations in origami.
        Each axiom creates a crease line by aligning points and lines.
    </p>
    <div id="axiomList"></div>
    <div id="instructions" class="instructions"></div>
    <div class="legend">
        <span style="background:#606C38;"></span> Points &nbsp;
        <span style="background:#DDA15E;"></span> Lines &nbsp;
        <span style="background:#BC6C25;"></span> Crease
    </div>
    <button class="clear-btn" onclick="clearAll()">Clear All</button>
</div>

<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    draw();
}

const axioms = [
    { id: 1, name: "Point-to-Point Fold",
      desc: "Given two points, fold along the crease that connects them.",
      needs: "points", count: 2,
      instruction: "Click to place <strong>2 points</strong>. The fold crease passes through both." },
    { id: 2, name: "Point-onto-Point Fold",
      desc: "Given two points, fold one onto the other (perpendicular bisector).",
      needs: "points", count: 2,
      instruction: "Click to place <strong>2 points</strong>. The crease is their perpendicular bisector." },
    { id: 3, name: "Line-onto-Line Fold",
      desc: "Given two lines, fold one onto the other (angle bisector).",
      needs: "lines", count: 2,
      instruction: "Click to place <strong>2 pairs of points</strong> defining 2 lines. The crease bisects the angle." },
    { id: 4, name: "Point-and-Line Fold",
      desc: "Given a point and a line, fold the line onto itself passing through the point.",
      needs: "pointAndLine", count: 3,
      instruction: "Click <strong>1 point</strong>, then <strong>2 points</strong> for a line. Crease is perpendicular to line through point." },
    { id: 5, name: "Point-onto-Line through Point",
      desc: "Given two points and a line, fold the first point onto the line passing through the second point.",
      needs: "twoPointsLine", count: 4,
      instruction: "Click <strong>2 points</strong>, then <strong>2 more</strong> defining a line. Folds point 1 onto the line through point 2." },
    { id: 6, name: "Two Points onto Two Lines",
      desc: "Given two points and two lines, fold each point onto its respective line simultaneously.",
      needs: "twoPointsTwoLines", count: 6,
      instruction: "Click <strong>2 points</strong>, then <strong>4 points</strong> for 2 lines. Folds each point onto its line." },
    { id: 7, name: "Point onto Line along Line",
      desc: "Given a point and two lines, fold the point onto the first line along the second line.",
      needs: "pointTwoLines", count: 5,
      instruction: "Click <strong>1 point</strong>, then <strong>4 points</strong> for 2 lines. Folds point onto line 1 along line 2." },
];

let currentAxiom = 0;
let placedPoints = [];
let creaseLines = [];
let guideLines = [];
let hoverPos = null;

function initAxiomButtons() {
    const list = document.getElementById('axiomList');
    axioms.forEach((ax, i) => {
        const btn = document.createElement('button');
        btn.className = 'axiom-btn' + (i === 0 ? ' active' : '');
        btn.innerHTML = `<div class="axiom-btn-inner"><span class="axiom-num">${ax.id}</span><span class="axiom-text"><strong>${ax.name}</strong><br><span style="font-size:11px;opacity:0.7;">${ax.desc}</span></span></div>`;
        btn.onclick = () => selectAxiom(i);
        list.appendChild(btn);
    });
    updateInstructions();
}

function selectAxiom(i) {
    currentAxiom = i;
    placedPoints = [];
    creaseLines = [];
    guideLines = [];
    document.querySelectorAll('.axiom-btn').forEach((b, j) => {
        b.className = 'axiom-btn' + (j === i ? ' active' : '');
    });
    updateInstructions();
    draw();
}

function updateInstructions() {
    document.getElementById('instructions').innerHTML = axioms[currentAxiom].instruction;
}

function clearAll() {
    placedPoints = [];
    creaseLines = [];
    guideLines = [];
    draw();
}

window.reset = clearAll;

// Geometry helpers
function perpBisector(p1, p2) {
    const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    return { px: mx, py: my, dx: -dy, dy: dx };
}

function lineThrough(p1, p2) {
    return { px: p1.x, py: p1.y, dx: p2.x - p1.x, dy: p2.y - p1.y };
}

function perpThroughPoint(pt, line) {
    const { px, py, dx, dy } = line;
    return { px: pt.x, py: pt.y, dx: -dy, dy: dx };
}

function angleBisector(l1, l2) {
    const len1 = Math.sqrt(l1.dx * l1.dx + l1.dy * l1.dy);
    const len2 = Math.sqrt(l2.dx * l2.dx + l2.dy * l2.dy);
    const d1x = l1.dx / len1, d1y = l1.dy / len1;
    const d2x = l2.dx / len2, d2y = l2.dy / len2;
    // Find intersection
    const det = d1x * (-d2y) - d1y * (-d2x);
    if (Math.abs(det) < 1e-10) {
        // Parallel lines - bisector is midway
        const mx = (l1.px + l2.px) / 2, my = (l1.py + l2.py) / 2;
        return { px: mx, py: my, dx: d1x, dy: d1y };
    }
    const t = ((l2.px - l1.px) * (-d2y) - (l2.py - l1.py) * (-d2x)) / det;
    const ix = l1.px + d1x * t, iy = l1.py + d1y * t;
    const bx = d1x + d2x, by = d1y + d2y;
    const blen = Math.sqrt(bx * bx + by * by);
    if (blen < 1e-10) return { px: ix, py: iy, dx: -d1y, dy: d1x };
    return { px: ix, py: iy, dx: bx / blen, dy: by / blen };
}

function projectPointOnLine(pt, line) {
    const { px, py, dx, dy } = line;
    const len2 = dx * dx + dy * dy;
    const t = ((pt.x - px) * dx + (pt.y - py) * dy) / len2;
    return { x: px + dx * t, y: py + dy * t };
}

function reflectPointOverLine(pt, line) {
    const proj = projectPointOnLine(pt, line);
    return { x: 2 * proj.x - pt.x, y: 2 * proj.y - pt.y };
}

function computeCrease() {
    const ax = axioms[currentAxiom];
    const pts = placedPoints;
    creaseLines = [];
    guideLines = [];

    if (ax.id === 1 && pts.length >= 2) {
        creaseLines.push(lineThrough(pts[0], pts[1]));
    }
    else if (ax.id === 2 && pts.length >= 2) {
        creaseLines.push(perpBisector(pts[0], pts[1]));
    }
    else if (ax.id === 3 && pts.length >= 4) {
        const l1 = lineThrough(pts[0], pts[1]);
        const l2 = lineThrough(pts[2], pts[3]);
        guideLines.push(l1, l2);
        creaseLines.push(angleBisector(l1, l2));
    }
    else if (ax.id === 4 && pts.length >= 3) {
        const line = lineThrough(pts[1], pts[2]);
        guideLines.push(line);
        creaseLines.push(perpThroughPoint(pts[0], line));
    }
    else if (ax.id === 5 && pts.length >= 4) {
        const p1 = pts[0], p2 = pts[1];
        const line = lineThrough(pts[2], pts[3]);
        guideLines.push(line);
        // Fold p1 onto line through p2: find point on line such that perpBisector of p1 and that point passes through p2
        const proj = projectPointOnLine(p1, line);
        const dp = { x: proj.x - p1.x, y: proj.y - p1.y };
        const dist = Math.sqrt(dp.x * dp.x + dp.y * dp.y);
        if (dist > 1e-6) {
            // Reflection of p1 over crease must land on line
            // Crease passes through p2 and is perpBisector of p1 and its image
            // Try: reflect p1 over line through p2 with various angles, find where image hits target line
            let bestCrease = null;
            let bestDist = Infinity;
            for (let a = 0; a < Math.PI; a += 0.005) {
                const cdx = Math.cos(a), cdy = Math.sin(a);
                const crease = { px: p2.x, py: p2.y, dx: cdx, dy: cdy };
                const img = reflectPointOverLine(p1, crease);
                const onLine = projectPointOnLine(img, line);
                const d = Math.sqrt((img.x - onLine.x) ** 2 + (img.y - onLine.y) ** 2);
                if (d < bestDist) { bestDist = d; bestCrease = crease; }
            }
            if (bestCrease && bestDist < 5) creaseLines.push(bestCrease);
        }
    }
    else if (ax.id === 6 && pts.length >= 6) {
        const p1 = pts[0], p2 = pts[1];
        const l1 = lineThrough(pts[2], pts[3]);
        const l2 = lineThrough(pts[4], pts[5]);
        guideLines.push(l1, l2);
        // Find crease that simultaneously folds p1 onto l1 and p2 onto l2
        let bestCrease = null;
        let bestScore = Infinity;
        for (let a = 0; a < Math.PI; a += 0.002) {
            for (let off = -500; off < 500; off += 4) {
                const cdx = Math.cos(a), cdy = Math.sin(a);
                const cx = W / 2 + off * cdy, cy = H / 2 - off * cdx;
                const crease = { px: cx, py: cy, dx: cdx, dy: cdy };
                const img1 = reflectPointOverLine(p1, crease);
                const img2 = reflectPointOverLine(p2, crease);
                const on1 = projectPointOnLine(img1, l1);
                const on2 = projectPointOnLine(img2, l2);
                const d1 = Math.sqrt((img1.x - on1.x) ** 2 + (img1.y - on1.y) ** 2);
                const d2 = Math.sqrt((img2.x - on2.x) ** 2 + (img2.y - on2.y) ** 2);
                const score = d1 + d2;
                if (score < bestScore) { bestScore = score; bestCrease = crease; }
            }
        }
        if (bestCrease && bestScore < 10) creaseLines.push(bestCrease);
    }
    else if (ax.id === 7 && pts.length >= 5) {
        const p = pts[0];
        const l1 = lineThrough(pts[1], pts[2]);
        const l2 = lineThrough(pts[3], pts[4]);
        guideLines.push(l1, l2);
        // Fold point onto l1 with crease perpendicular to l2
        const crease = { px: 0, py: 0, dx: -l2.dy, dy: l2.dx };
        // Find offset: reflect p over crease, image must be on l1
        let bestCrease = null;
        let bestDist = Infinity;
        const ndx = l2.dy, ndy = -l2.dx;
        const nlen = Math.sqrt(ndx * ndx + ndy * ndy);
        for (let off = -800; off < 800; off += 2) {
            const cx = p.x + (off * ndx) / nlen;
            const cy = p.y + (off * ndy) / nlen;
            const cr = { px: cx, py: cy, dx: l2.dx, dy: l2.dy };
            const clen = Math.sqrt(cr.dx * cr.dx + cr.dy * cr.dy);
            cr.dx /= clen; cr.dy /= clen;
            const img = reflectPointOverLine(p, cr);
            const proj = projectPointOnLine(img, l1);
            const d = Math.sqrt((img.x - proj.x) ** 2 + (img.y - proj.y) ** 2);
            if (d < bestDist) { bestDist = d; bestCrease = cr; }
        }
        if (bestCrease && bestDist < 5) creaseLines.push(bestCrease);
    }
}

function drawLineExtended(line, color, width, dash) {
    const { px, py, dx, dy } = line;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 1e-10) return;
    const ndx = dx / len, ndy = dy / len;
    const t = Math.max(W, H) * 2;
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    if (dash) ctx.setLineDash(dash);
    ctx.beginPath();
    ctx.moveTo(px - ndx * t, py - ndy * t);
    ctx.lineTo(px + ndx * t, py + ndy * t);
    ctx.stroke();
    ctx.restore();
}

function drawPoint(p, color, r) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, r || 7, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
}

// Draw paper grid
function drawPaper() {
    const margin = 60;
    const paperW = W - 380;
    const paperH = H - 120;
    const px = margin;
    const py = margin;

    // Paper shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.1)';
    ctx.shadowBlur = 20;
    ctx.shadowOffsetY = 5;
    ctx.fillStyle = '#FEFAE0';
    ctx.fillRect(px, py, paperW, paperH);
    ctx.restore();

    // Paper border
    ctx.strokeStyle = 'rgba(138,154,91,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(px, py, paperW, paperH);

    // Grid lines
    ctx.strokeStyle = 'rgba(138,154,91,0.08)';
    ctx.lineWidth = 0.5;
    const step = 40;
    for (let x = px + step; x < px + paperW; x += step) {
        ctx.beginPath(); ctx.moveTo(x, py); ctx.lineTo(x, py + paperH); ctx.stroke();
    }
    for (let y = py + step; y < py + paperH; y += step) {
        ctx.beginPath(); ctx.moveTo(px, y); ctx.lineTo(px + paperW, y); ctx.stroke();
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#FEFAE0');
    grad.addColorStop(0.5, '#F4F1DE');
    grad.addColorStop(1, '#EDE8D5');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    drawPaper();

    computeCrease();

    // Draw guide lines
    guideLines.forEach(l => {
        drawLineExtended(l, 'rgba(221,161,94,0.4)', 2, [8, 6]);
    });

    // Draw crease lines
    creaseLines.forEach(l => {
        drawLineExtended(l, '#BC6C25', 3, null);
        // Draw fold direction arrows along crease
        const { px: lx, py: ly, dx, dy } = l;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len < 1e-10) return;
        const ndx = dx / len, ndy = dy / len;
        for (let t = -200; t <= 200; t += 80) {
            const ax = lx + ndx * t, ay = ly + ndy * t;
            if (ax < 0 || ax > W || ay < 0 || ay > H) continue;
            ctx.save();
            ctx.translate(ax, ay);
            ctx.rotate(Math.atan2(ndy, ndx));
            ctx.fillStyle = 'rgba(188,108,37,0.5)';
            ctx.beginPath();
            ctx.moveTo(6, 0);
            ctx.lineTo(-3, -4);
            ctx.lineTo(-3, 4);
            ctx.fill();
            ctx.restore();
        }
    });

    // Draw placed points
    placedPoints.forEach((p, i) => {
        drawPoint(p, '#606C38', 7);
        ctx.fillStyle = 'white';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(i + 1, p.x, p.y);
    });

    // Draw hover point
    if (hoverPos) {
        ctx.beginPath();
        ctx.arc(hoverPos.x, hoverPos.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(138,154,91,0.4)';
        ctx.fill();
    }

    // Title
    ctx.fillStyle = '#606C38';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    const ax = axioms[currentAxiom];
    ctx.fillText(`Axiom ${ax.id}: ${ax.name}`, 70, H - 35);
}

canvas.addEventListener('click', (e) => {
    const ax = axioms[currentAxiom];
    let maxPts;
    if (ax.id <= 2) maxPts = 2;
    else if (ax.id === 3) maxPts = 4;
    else if (ax.id === 4) maxPts = 3;
    else if (ax.id === 5) maxPts = 4;
    else if (ax.id === 6) maxPts = 6;
    else maxPts = 5;

    if (placedPoints.length < maxPts) {
        placedPoints.push({ x: e.clientX, y: e.clientY });
        draw();
    }
});

canvas.addEventListener('mousemove', (e) => {
    hoverPos = { x: e.clientX, y: e.clientY };
    draw();
});

window.addEventListener('resize', resize);
resize();
initAxiomButtons();

let animId;
function animate() {
    animId = requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
