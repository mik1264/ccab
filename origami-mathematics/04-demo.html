<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crease Pattern Editor - Origami Mathematics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    color: #3d4423;
}
canvas { display: block; cursor: crosshair; }

.back-link {
    position: fixed; top: 10px; left: 10px; color: #8A9A5B;
    text-decoration: none; z-index: 1000; font-size: 1.2rem;
}
.back-link:hover { color: #606C38; }

.panel {
    position: fixed; top: 10px; right: 10px; z-index: 100;
    background: rgba(254,250,224,0.92); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 16px; width: 270px;
    border: 1px solid rgba(138,154,91,0.25);
}
.panel h3 {
    font-size: 15px; color: #606C38; margin-bottom: 6px;
    border-bottom: 2px solid #DDA15E; padding-bottom: 6px;
}
.panel p { font-size: 11px; line-height: 1.5; color: #606C38; margin-bottom: 8px; }

.mode-btn {
    display: inline-block; margin: 3px; padding: 6px 12px; border: 2px solid transparent;
    border-radius: 8px; background: rgba(138,154,91,0.1);
    color: #3d4423; font-size: 12px; cursor: pointer; transition: all 0.2s;
}
.mode-btn:hover { background: rgba(138,154,91,0.2); }
.mode-btn.active { border-color: #DDA15E; background: rgba(221,161,94,0.15); font-weight: 600; }

.stats-box {
    background: rgba(96,108,56,0.08); border-radius: 8px;
    padding: 10px; margin: 10px 0; font-size: 12px;
}
.stat-row { display: flex; justify-content: space-between; padding: 2px 0; }
.stat-label { color: #8A9A5B; }
.stat-value { color: #3d4423; font-weight: 600; font-family: monospace; }

.check-box {
    padding: 8px; border-radius: 8px; margin-top: 6px;
    font-size: 12px; font-weight: 600; text-align: center;
}
.check-pass { background: rgba(138,154,91,0.2); color: #606C38; }
.check-fail { background: rgba(188,108,37,0.2); color: #BC6C25; }
.check-neutral { background: rgba(138,154,91,0.08); color: #8A9A5B; }

.btn {
    display: inline-block; margin: 3px; padding: 6px 12px; border: none;
    border-radius: 8px; background: #8A9A5B; color: white;
    font-size: 12px; cursor: pointer;
}
.btn:hover { background: #606C38; }
.btn.danger { background: #BC6C25; }
.btn.danger:hover { background: #a05520; }

.presets { margin-top: 8px; }
.presets select {
    width: 100%; padding: 6px; border-radius: 6px; border: 1px solid rgba(138,154,91,0.3);
    background: white; color: #3d4423; font-size: 12px;
}
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="panel">
    <h3>Crease Pattern Editor</h3>
    <p>Draw mountain and valley creases on a square sheet. The editor validates Maekawa's and Kawasaki's theorems at each vertex.</p>

    <div style="margin-bottom:8px;">
        <button class="mode-btn active" id="btnMountain" onclick="setMode('mountain')">Mountain (M)</button>
        <button class="mode-btn" id="btnValley" onclick="setMode('valley')">Valley (V)</button>
        <button class="mode-btn" id="btnErase" onclick="setMode('erase')">Erase (E)</button>
    </div>

    <div class="stats-box" id="statsBox">
        <div class="stat-row"><span class="stat-label">Mountain creases</span><span class="stat-value" id="mCount">0</span></div>
        <div class="stat-row"><span class="stat-label">Valley creases</span><span class="stat-value" id="vCount">0</span></div>
        <div class="stat-row"><span class="stat-label">Vertices</span><span class="stat-value" id="vertCount">0</span></div>
    </div>

    <div id="maekawa" class="check-box check-neutral">Maekawa: Draw creases to check</div>
    <div id="kawasaki" class="check-box check-neutral">Kawasaki: Draw creases to check</div>

    <div class="presets">
        <label style="font-size:12px;color:#8A9A5B;">Load preset:</label>
        <select id="presetSelect" onchange="loadPreset()">
            <option value="">-- Select --</option>
            <option value="waterbomb">Waterbomb Base</option>
            <option value="birdbase">Bird Base</option>
            <option value="fishbase">Fish Base</option>
            <option value="star">Star Pattern</option>
        </select>
    </div>

    <div style="margin-top:10px;">
        <button class="btn" onclick="toggleGrid()">Toggle Grid</button>
        <button class="btn danger" onclick="clearAll()">Clear All</button>
    </div>
</div>

<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

// Paper square dimensions
let paperX, paperY, paperSize;
const GRID = 16;
let showGrid = true;
let mode = 'mountain'; // mountain, valley, erase

// Creases: {x1, y1, x2, y2, type: 'mountain'|'valley'} in grid coords (0-GRID)
let creases = [];
let drawStart = null;
let mouseGrid = null;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    paperSize = Math.min(W - 320, H - 80) * 0.85;
    paperX = (W - 290 - paperSize) / 2 + 20;
    paperY = (H - paperSize) / 2;
}

function gridToPixel(gx, gy) {
    return {
        x: paperX + (gx / GRID) * paperSize,
        y: paperY + (gy / GRID) * paperSize
    };
}

function pixelToGrid(px, py) {
    const gx = Math.round(((px - paperX) / paperSize) * GRID);
    const gy = Math.round(((py - paperY) / paperSize) * GRID);
    return { gx: Math.max(0, Math.min(GRID, gx)), gy: Math.max(0, Math.min(GRID, gy)) };
}

function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
}

function toggleGrid() { showGrid = !showGrid; }

function clearAll() {
    creases = [];
    drawStart = null;
}
window.reset = clearAll;

// Find vertices (grid intersections with creases)
function findVertices() {
    const verts = new Map();
    creases.forEach(c => {
        const k1 = c.x1 + ',' + c.y1;
        const k2 = c.x2 + ',' + c.y2;
        if (!verts.has(k1)) verts.set(k1, { x: c.x1, y: c.y1, creases: [] });
        if (!verts.has(k2)) verts.set(k2, { x: c.x2, y: c.y2, creases: [] });
        verts.get(k1).creases.push(c);
        verts.get(k2).creases.push(c);
    });
    // Only interior vertices (not on boundary)
    const interior = [];
    verts.forEach(v => {
        if (v.creases.length >= 2 && v.x > 0 && v.x < GRID && v.y > 0 && v.y < GRID) {
            interior.push(v);
        }
    });
    return interior;
}

function checkMaekawa(vertex) {
    let m = 0, v = 0;
    vertex.creases.forEach(c => {
        if (c.type === 'mountain') m++;
        else v++;
    });
    return Math.abs(m - v) === 2;
}

function checkKawasaki(vertex) {
    const angles = vertex.creases.map(c => {
        const dx = (c.x1 === vertex.x && c.y1 === vertex.y) ? c.x2 - c.x1 : c.x1 - c.x2;
        const dy = (c.x1 === vertex.x && c.y1 === vertex.y) ? c.y2 - c.y1 : c.y1 - c.y2;
        return Math.atan2(dy, dx);
    }).sort((a, b) => a - b);

    if (angles.length < 4 || angles.length % 2 !== 0) return false;

    const gaps = [];
    for (let i = 0; i < angles.length; i++) {
        let gap = angles[(i + 1) % angles.length] - angles[i];
        if (gap < 0) gap += Math.PI * 2;
        gaps.push(gap);
    }

    let evenSum = 0, oddSum = 0;
    for (let i = 0; i < gaps.length; i++) {
        if (i % 2 === 0) evenSum += gaps[i];
        else oddSum += gaps[i];
    }
    return Math.abs(evenSum - oddSum) < 0.1;
}

function updateChecks() {
    let mCount = 0, vCount = 0;
    creases.forEach(c => { if (c.type === 'mountain') mCount++; else vCount++; });
    document.getElementById('mCount').textContent = mCount;
    document.getElementById('vCount').textContent = vCount;

    const verts = findVertices();
    document.getElementById('vertCount').textContent = verts.length;

    if (verts.length === 0) {
        document.getElementById('maekawa').className = 'check-box check-neutral';
        document.getElementById('maekawa').textContent = 'Maekawa: Draw creases to check';
        document.getElementById('kawasaki').className = 'check-box check-neutral';
        document.getElementById('kawasaki').textContent = 'Kawasaki: Draw creases to check';
        return;
    }

    const maekAll = verts.every(v => v.creases.length < 2 || checkMaekawa(v));
    const kawAll = verts.every(v => v.creases.length < 4 || checkKawasaki(v));

    const mae = document.getElementById('maekawa');
    mae.className = 'check-box ' + (maekAll ? 'check-pass' : 'check-fail');
    mae.textContent = maekAll ? 'Maekawa: |M - V| = 2 at all vertices' : 'Maekawa: VIOLATED at some vertices';

    const kaw = document.getElementById('kawasaki');
    kaw.className = 'check-box ' + (kawAll ? 'check-pass' : 'check-fail');
    kaw.textContent = kawAll ? 'Kawasaki: Alternating angles = 180 deg' : 'Kawasaki: VIOLATED at some vertices';
}

function loadPreset() {
    const sel = document.getElementById('presetSelect').value;
    creases = [];
    const N = GRID;
    const mid = N / 2;

    if (sel === 'waterbomb') {
        // Waterbomb base crease pattern
        creases.push({ x1: 0, y1: 0, x2: N, y2: N, type: 'mountain' });
        creases.push({ x1: N, y1: 0, x2: 0, y2: N, type: 'mountain' });
        creases.push({ x1: mid, y1: 0, x2: mid, y2: N, type: 'valley' });
        creases.push({ x1: 0, y1: mid, x2: N, y2: mid, type: 'valley' });
    } else if (sel === 'birdbase') {
        creases.push({ x1: 0, y1: 0, x2: N, y2: N, type: 'valley' });
        creases.push({ x1: N, y1: 0, x2: 0, y2: N, type: 'valley' });
        creases.push({ x1: mid, y1: 0, x2: mid, y2: N, type: 'mountain' });
        creases.push({ x1: 0, y1: mid, x2: N, y2: mid, type: 'mountain' });
        // Kite folds
        creases.push({ x1: mid, y1: 0, x2: 0, y2: mid, type: 'mountain' });
        creases.push({ x1: mid, y1: 0, x2: N, y2: mid, type: 'mountain' });
        creases.push({ x1: 0, y1: mid, x2: mid, y2: N, type: 'mountain' });
        creases.push({ x1: N, y1: mid, x2: mid, y2: N, type: 'mountain' });
    } else if (sel === 'fishbase') {
        creases.push({ x1: 0, y1: 0, x2: N, y2: N, type: 'mountain' });
        creases.push({ x1: 0, y1: 0, x2: N, y2: mid, type: 'valley' });
        creases.push({ x1: 0, y1: 0, x2: mid, y2: N, type: 'valley' });
        creases.push({ x1: N, y1: N, x2: 0, y2: mid, type: 'valley' });
        creases.push({ x1: N, y1: N, x2: mid, y2: 0, type: 'valley' });
    } else if (sel === 'star') {
        const cx = mid, cy = mid;
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const ex = Math.round(cx + mid * Math.cos(angle));
            const ey = Math.round(cy + mid * Math.sin(angle));
            creases.push({ x1: cx, y1: cy, x2: ex, y2: ey, type: i % 2 === 0 ? 'mountain' : 'valley' });
        }
    }

    document.getElementById('presetSelect').value = '';
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#FEFAE0');
    grad.addColorStop(0.5, '#F4F1DE');
    grad.addColorStop(1, '#EDE8D5');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Paper
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.1)';
    ctx.shadowBlur = 20;
    ctx.shadowOffsetY = 5;
    ctx.fillStyle = '#FFFEF5';
    ctx.fillRect(paperX, paperY, paperSize, paperSize);
    ctx.restore();
    ctx.strokeStyle = 'rgba(138,154,91,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(paperX, paperY, paperSize, paperSize);

    // Grid
    if (showGrid) {
        ctx.strokeStyle = 'rgba(138,154,91,0.08)';
        ctx.lineWidth = 0.5;
        for (let i = 1; i < GRID; i++) {
            const p = gridToPixel(i, 0);
            const p2 = gridToPixel(i, GRID);
            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            const q = gridToPixel(0, i);
            const q2 = gridToPixel(GRID, i);
            ctx.beginPath(); ctx.moveTo(q.x, q.y); ctx.lineTo(q2.x, q2.y); ctx.stroke();
        }
    }

    // Draw creases
    creases.forEach(c => {
        const p1 = gridToPixel(c.x1, c.y1);
        const p2 = gridToPixel(c.x2, c.y2);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        if (c.type === 'mountain') {
            ctx.strokeStyle = '#606C38';
            ctx.lineWidth = 2.5;
            ctx.setLineDash([]);
        } else {
            ctx.strokeStyle = '#BC6C25';
            ctx.lineWidth = 2.5;
            ctx.setLineDash([6, 4]);
        }
        ctx.stroke();
        ctx.setLineDash([]);
    });

    // Draw vertices with validation
    const verts = findVertices();
    verts.forEach(v => {
        const p = gridToPixel(v.x, v.y);
        const maekOk = v.creases.length < 2 || checkMaekawa(v);
        const kawOk = v.creases.length < 4 || checkKawasaki(v);
        const ok = maekOk && kawOk;

        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = ok ? '#606C38' : '#BC6C25';
        ctx.fill();
        if (!ok) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 9, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(188,108,37,0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    });

    // Drawing in progress
    if (drawStart && mouseGrid) {
        const p1 = gridToPixel(drawStart.gx, drawStart.gy);
        const p2 = gridToPixel(mouseGrid.gx, mouseGrid.gy);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = mode === 'mountain' ? 'rgba(96,108,56,0.5)' : 'rgba(188,108,37,0.5)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Snap cursor
    if (mouseGrid) {
        const p = gridToPixel(mouseGrid.gx, mouseGrid.gy);
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(138,154,91,0.5)';
        ctx.fill();
    }

    updateChecks();

    // Legend
    ctx.fillStyle = '#606C38';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Solid = Mountain  |  Dashed = Valley  |  Green dot = valid vertex  |  Orange dot = invalid', paperX, paperY + paperSize + 25);
}

canvas.addEventListener('mousedown', (e) => {
    const g = pixelToGrid(e.clientX, e.clientY);
    if (g.gx >= 0 && g.gx <= GRID && g.gy >= 0 && g.gy <= GRID) {
        if (mode === 'erase') {
            // Erase nearby crease
            const px = e.clientX, py = e.clientY;
            let closest = -1, minDist = 15;
            creases.forEach((c, i) => {
                const p1 = gridToPixel(c.x1, c.y1);
                const p2 = gridToPixel(c.x2, c.y2);
                const d = distToSegment(px, py, p1.x, p1.y, p2.x, p2.y);
                if (d < minDist) { minDist = d; closest = i; }
            });
            if (closest >= 0) creases.splice(closest, 1);
        } else {
            drawStart = g;
        }
    }
});

canvas.addEventListener('mousemove', (e) => {
    mouseGrid = pixelToGrid(e.clientX, e.clientY);
});

canvas.addEventListener('mouseup', (e) => {
    if (drawStart && mode !== 'erase') {
        const g = pixelToGrid(e.clientX, e.clientY);
        if (g.gx !== drawStart.gx || g.gy !== drawStart.gy) {
            // Check for duplicate
            const dup = creases.find(c =>
                (c.x1 === drawStart.gx && c.y1 === drawStart.gy && c.x2 === g.gx && c.y2 === g.gy) ||
                (c.x2 === drawStart.gx && c.y2 === drawStart.gy && c.x1 === g.gx && c.y1 === g.gy)
            );
            if (!dup) {
                creases.push({ x1: drawStart.gx, y1: drawStart.gy, x2: g.gx, y2: g.gy, type: mode });
            }
        }
    }
    drawStart = null;
});

function distToSegment(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const len2 = dx * dx + dy * dy;
    if (len2 === 0) return Math.sqrt((px - x1) ** 2 + (py - y1) ** 2);
    let t = ((px - x1) * dx + (py - y1) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const projX = x1 + t * dx, projY = y1 + t * dy;
    return Math.sqrt((px - projX) ** 2 + (py - projY) ** 2);
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'm' || e.key === 'M') setMode('mountain');
    if (e.key === 'v' || e.key === 'V') setMode('valley');
    if (e.key === 'e' || e.key === 'E') setMode('erase');
});

window.addEventListener('resize', resize);
resize();

function animate() {
    draw();
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
