<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miura-Ori Fold - Origami Mathematics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    color: #3d4423;
}
canvas { display: block; }

.back-link {
    position: fixed; top: 10px; left: 10px; color: #8A9A5B;
    text-decoration: none; z-index: 1000; font-size: 1.2rem;
}
.back-link:hover { color: #606C38; }

.panel {
    position: fixed; top: 10px; right: 10px; z-index: 100;
    background: rgba(254,250,224,0.92); backdrop-filter: blur(10px);
    border-radius: 14px; padding: 16px; width: 260px;
    border: 1px solid rgba(138,154,91,0.25);
}
.panel h3 {
    font-size: 15px; color: #606C38; margin-bottom: 6px;
    border-bottom: 2px solid #DDA15E; padding-bottom: 6px;
}
.panel p { font-size: 11px; line-height: 1.5; color: #606C38; margin-bottom: 10px; }

label { display: block; font-size: 12px; color: #8A9A5B; margin-top: 8px; }
input[type=range] { width: 100%; accent-color: #8A9A5B; }
.val { font-size: 11px; color: #606C38; text-align: right; font-family: monospace; }

.btn {
    display: inline-block; margin: 4px 2px; padding: 6px 14px; border: none;
    border-radius: 8px; background: #8A9A5B; color: white;
    font-size: 12px; cursor: pointer;
}
.btn:hover { background: #606C38; }
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="canvas"></canvas>

<div class="panel">
    <h3>Miura-Ori Fold</h3>
    <p>The Miura fold packs a flat sheet into a compact parallelogram array that deploys
       with a single pull. Used for solar panels in space! Drag or use slider to fold/unfold.</p>

    <label>Fold Amount</label>
    <input type="range" id="foldSlider" min="0" max="100" value="0">
    <div class="val" id="foldVal">0%</div>

    <label>Grid Rows</label>
    <input type="range" id="rowSlider" min="3" max="12" value="6">
    <div class="val" id="rowVal">6</div>

    <label>Grid Cols</label>
    <input type="range" id="colSlider" min="3" max="12" value="8">
    <div class="val" id="colVal">8</div>

    <label>Zigzag Angle</label>
    <input type="range" id="angleSlider" min="15" max="75" value="30">
    <div class="val" id="angleVal">30&deg;</div>

    <label>Rotation</label>
    <input type="range" id="rotSlider" min="0" max="360" value="30">
    <div class="val" id="rotVal">30&deg;</div>

    <button class="btn" onclick="autoFold()">Auto Fold/Unfold</button>
    <button class="btn" onclick="resetDemo()">Reset</button>
</div>

<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

const foldSlider = document.getElementById('foldSlider');
const rowSlider = document.getElementById('rowSlider');
const colSlider = document.getElementById('colSlider');
const angleSlider = document.getElementById('angleSlider');
const rotSlider = document.getElementById('rotSlider');

let autoFolding = false;
let autoDir = 1;
let fold = 0;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}

function resetDemo() {
    foldSlider.value = 0;
    rowSlider.value = 6;
    colSlider.value = 8;
    angleSlider.value = 30;
    rotSlider.value = 30;
    autoFolding = false;
    fold = 0;
}
window.reset = resetDemo;

function autoFold() {
    autoFolding = !autoFolding;
}

// 3D projection helpers
function rotateY(p, angle) {
    const c = Math.cos(angle), s = Math.sin(angle);
    return { x: p.x * c + p.z * s, y: p.y, z: -p.x * s + p.z * c };
}
function rotateX(p, angle) {
    const c = Math.cos(angle), s = Math.sin(angle);
    return { x: p.x, y: p.y * c - p.z * s, z: p.y * s + p.z * c };
}
function project(p) {
    const d = 800;
    const scale = d / (d + p.z);
    return { x: p.x * scale, y: p.y * scale, z: p.z, scale };
}

function generateMiuraVertices(rows, cols, zigAngle, foldAmount) {
    const cellW = 50;
    const cellH = 50;
    const angle = zigAngle * Math.PI / 180;
    const f = foldAmount; // 0 = flat, 1 = fully folded
    const vertices = [];

    for (let r = 0; r <= rows; r++) {
        const row = [];
        for (let c = 0; c <= cols; c++) {
            // Base flat position
            let x = c * cellW;
            let y = r * cellH;
            let z = 0;

            // Zigzag offset
            const zigOffset = Math.tan(angle) * cellW * 0.5;
            if (r % 2 === 1) {
                x += zigOffset * (1 - f);
            }

            // Folding: alternate columns fold up/down
            const colFold = f * Math.PI * 0.45;
            if (c > 0) {
                const prevX = row[c - 1].x;
                const foldDir = (c % 2 === 0) ? 1 : -1;
                const foldAngle = foldDir * colFold;
                const dx = cellW * Math.cos(foldAngle) * (1 - f * 0.3);
                const dz = cellW * Math.sin(foldAngle) * f;
                x = prevX + dx;
                z = row[c - 1].z + dz;
            }

            // Row folding
            if (r > 0) {
                const rowFold = f * Math.PI * 0.4;
                const prevY = vertices[r - 1][c].y;
                const prevZ = vertices[r - 1][c].z;
                const foldDir = (r % 2 === 0) ? -1 : 1;
                const dy = cellH * Math.cos(rowFold) * (1 - f * 0.2);
                const dzr = cellH * Math.sin(rowFold) * foldDir * f * 0.5;
                y = prevY + dy;
                z += dzr;
            }

            row.push({ x, y, z });
        }
        vertices.push(row);
    }

    // Center
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const row of vertices) {
        for (const v of row) {
            minX = Math.min(minX, v.x); maxX = Math.max(maxX, v.x);
            minY = Math.min(minY, v.y); maxY = Math.max(maxY, v.y);
        }
    }
    const offX = (minX + maxX) / 2, offY = (minY + maxY) / 2;
    for (const row of vertices) {
        for (const v of row) {
            v.x -= offX; v.y -= offY;
        }
    }

    return vertices;
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#FEFAE0');
    grad.addColorStop(0.5, '#F4F1DE');
    grad.addColorStop(1, '#EDE8D5');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    const rows = parseInt(rowSlider.value);
    const cols = parseInt(colSlider.value);
    const zigAngle = parseInt(angleSlider.value);
    const rotY = parseInt(rotSlider.value) * Math.PI / 180;
    fold = parseInt(foldSlider.value) / 100;

    document.getElementById('foldVal').textContent = foldSlider.value + '%';
    document.getElementById('rowVal').textContent = rows;
    document.getElementById('colVal').textContent = cols;
    document.getElementById('angleVal').textContent = zigAngle + '\u00B0';
    document.getElementById('rotVal').textContent = rotSlider.value + '\u00B0';

    const vertices = generateMiuraVertices(rows, cols, zigAngle, fold);
    const centerX = (W - 280) / 2;
    const centerY = H / 2;

    // Collect faces for z-sorting
    const faces = [];
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const corners = [
                vertices[r][c], vertices[r][c + 1],
                vertices[r + 1][c + 1], vertices[r + 1][c]
            ];
            const projected = corners.map(v => {
                let p = rotateY(v, rotY);
                p = rotateX(p, -0.5);
                const pr = project(p);
                return { x: centerX + pr.x, y: centerY + pr.y, z: pr.z };
            });
            const avgZ = (projected[0].z + projected[1].z + projected[2].z + projected[3].z) / 4;
            faces.push({ projected, r, c, avgZ });
        }
    }

    // Sort by z (back to front)
    faces.sort((a, b) => b.avgZ - a.avgZ);

    // Draw faces
    faces.forEach(face => {
        const { projected, r, c } = face;
        ctx.beginPath();
        ctx.moveTo(projected[0].x, projected[0].y);
        for (let i = 1; i < 4; i++) ctx.lineTo(projected[i].x, projected[i].y);
        ctx.closePath();

        // Color based on mountain/valley fold
        const isMountain = (r + c) % 2 === 0;
        const brightness = 0.7 + (face.avgZ + 200) / 600 * 0.3;
        if (isMountain) {
            const g = Math.floor(138 * brightness);
            const rb = Math.floor(91 * brightness);
            ctx.fillStyle = `rgba(${rb}, ${g}, ${rb}, 0.85)`;
        } else {
            const r = Math.floor(221 * brightness);
            const g = Math.floor(161 * brightness);
            ctx.fillStyle = `rgba(${r}, ${g}, 94, 0.85)`;
        }
        ctx.fill();

        // Crease lines
        ctx.strokeStyle = isMountain ? 'rgba(96,108,56,0.5)' : 'rgba(188,108,37,0.5)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
    });

    // Title
    ctx.fillStyle = '#606C38';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Mountain folds (green) / Valley folds (gold)', 70, H - 20);
}

function animate() {
    if (autoFolding) {
        let val = parseInt(foldSlider.value) + autoDir;
        if (val >= 100) { val = 100; autoDir = -1; }
        if (val <= 0) { val = 0; autoDir = 1; }
        foldSlider.value = val;
    }
    draw();
    requestAnimationFrame(animate);
}

window.addEventListener('resize', resize);
resize();
animate();
</script>
</body>
</html>
