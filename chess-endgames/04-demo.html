<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zugzwang: The Compulsion to Move - Chess Endgames</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
canvas { display: block; }
#ui {
    position: fixed; top: 10px; right: 10px; z-index: 100;
    background: rgba(96,108,56,0.9); backdrop-filter: blur(10px);
    padding: 15px; border-radius: 12px; max-width: 300px;
    font-size: 0.85rem; line-height: 1.5;
}
#ui h3 { color: #DDA15E; margin-bottom: 8px; }
.highlight { color: #DDA15E; font-weight: bold; }
#status {
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.9); backdrop-filter: blur(10px);
    padding: 10px 20px; border-radius: 12px; font-size: 0.95rem;
    z-index: 100; text-align: center; max-width: 90%;
}
#controls {
    position: fixed; bottom: 10px; right: 10px; z-index: 100;
    display: flex; gap: 8px;
}
#controls button {
    background: rgba(138,154,91,0.9); border: none; color: #FEFAE0;
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
}
#controls button:hover { background: rgba(221,161,94,0.9); }
#puzzle-nav {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 100;
}
#puzzle-nav button {
    background: rgba(138,154,91,0.8); border: none; color: #FEFAE0;
    padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
}
#puzzle-nav button.active { background: rgba(221,161,94,0.9); }
.zug-label {
    position: fixed; top: 55px; left: 50%; transform: translateX(-50%);
    background: rgba(221,161,94,0.15); border: 1px solid rgba(221,161,94,0.4);
    padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; z-index: 100;
    color: #DDA15E; font-weight: bold;
}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="ui">
    <h3>Zugzwang</h3>
    <p><span class="highlight">Zugzwang</span> = "compulsion to move." The side to move is worse off because ANY move worsens their position.</p>
    <p><span class="highlight">Mutual Zugzwang</span>: Both sides would be worse off if they had to move.</p>
    <p>Toggle who moves first to see the difference!</p>
</div>
<div id="puzzle-nav">
    <button class="active" onclick="loadPuzzle(0)">KPK</button>
    <button onclick="loadPuzzle(1)">Trebuchet</button>
    <button onclick="loadPuzzle(2)">Rook Ending</button>
    <button onclick="loadPuzzle(3)">Bishop Trap</button>
</div>
<div class="zug-label" id="zug-label">Click a side to move first</div>
<div id="status">Select who moves first</div>
<div id="controls">
    <button onclick="setTurn('white')">White Moves</button>
    <button onclick="setTurn('black')">Black Moves</button>
    <button onclick="resetPuzzle()">Reset</button>
</div>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, sq, ox, oy;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    sq = Math.min(W, H) * 0.09;
    ox = (W - 8 * sq) / 2;
    oy = (H - 8 * sq) / 2;
}
resize();
window.addEventListener('resize', resize);

const puzzles = [
    {
        name: 'King & Pawn Zugzwang',
        pieces: { WK: {f:2,r:5}, WP: {f:2,r:6}, BK: {f:2,r:7} },
        desc: 'White to move: stalemate or loses pawn. Black to move: must step aside, pawn promotes.',
        whiteResult: 'draw', blackResult: 'white wins'
    },
    {
        name: 'The Trebuchet',
        pieces: { WK: {f:2,r:4}, WP: {f:3,r:3}, BK: {f:4,r:3}, BP: {f:3,r:4} },
        desc: 'Mutual zugzwang! Whoever moves loses their pawn and the game.',
        whiteResult: 'black wins', blackResult: 'white wins'
    },
    {
        name: 'Rook Ending Zugzwang',
        pieces: { WK: {f:5,r:6}, WR: {f:7,r:4}, WP: {f:4,r:5}, BK: {f:4,r:7}, BR: {f:0,r:0} },
        desc: 'Black to move must abandon defense. White to move cannot make progress.',
        whiteResult: 'draw', blackResult: 'white wins'
    },
    {
        name: 'Bishop Color Trap',
        pieces: { WK: {f:5,r:5}, WB: {f:3,r:3}, WP: {f:4,r:4}, BK: {f:4,r:6}, BP: {f:4,r:5} },
        desc: 'Black is in zugzwang - the king must abandon the key square.',
        whiteResult: 'draw', blackResult: 'white wins'
    }
];

let currentPuzzle = 0;
let pieces = {};
let turn = null;
let gameOver = false;
let validMoves = [];
let message = '';
let moveCount = 0;
let resultShown = '';

function loadPuzzle(idx) {
    currentPuzzle = idx;
    document.querySelectorAll('#puzzle-nav button').forEach((b, i) => {
        b.classList.toggle('active', i === idx);
    });
    resetPuzzle();
}

function resetPuzzle() {
    const p = puzzles[currentPuzzle];
    pieces = {};
    for (const [k, v] of Object.entries(p.pieces)) {
        pieces[k] = { f: v.f, r: v.r };
    }
    turn = null;
    gameOver = false;
    moveCount = 0;
    validMoves = [];
    resultShown = '';
    message = p.desc;
    document.getElementById('zug-label').textContent = p.name + ' - Choose who moves';
}

function setTurn(side) {
    if (gameOver) resetPuzzle();
    turn = side;
    const p = puzzles[currentPuzzle];
    resultShown = side === 'white' ? p.whiteResult : p.blackResult;
    document.getElementById('zug-label').textContent =
        (side === 'white' ? 'White' : 'Black') + ' to move → ' + resultShown;
    message = (side === 'white' ? 'White' : 'Black') + ' to move. Result: ' + resultShown;
    computeValidMoves();
}

function inBounds(f, r) { return f >= 0 && f <= 7 && r >= 0 && r <= 7; }

function pieceAt(f, r, excl) {
    for (const [k, p] of Object.entries(pieces)) {
        if (k !== excl && p.f === f && p.r === r) return k;
    }
    return null;
}

function kingsAdj(f1, r1, f2, r2) {
    return Math.abs(f1 - f2) <= 1 && Math.abs(r1 - r2) <= 1;
}

function computeValidMoves() {
    validMoves = [];
    if (gameOver || !turn) return;
    const isWhite = turn === 'white';
    const kingKey = isWhite ? 'WK' : 'BK';
    const king = pieces[kingKey];
    const otherKing = pieces[isWhite ? 'BK' : 'WK'];
    if (!king || !otherKing) return;
    // King moves
    for (let df = -1; df <= 1; df++) {
        for (let dr = -1; dr <= 1; dr++) {
            if (df === 0 && dr === 0) continue;
            const nf = king.f + df, nr = king.r + dr;
            if (!inBounds(nf, nr)) continue;
            const occ = pieceAt(nf, nr, kingKey);
            if (occ && occ[0] === (isWhite ? 'W' : 'B')) continue; // can't take own
            if (kingsAdj(nf, nr, otherKing.f, otherKing.r)) continue;
            validMoves.push({ piece: kingKey, f: nf, r: nr, capture: occ && occ[0] !== (isWhite ? 'W' : 'B') ? occ : null });
        }
    }
    // Pawn moves
    const pawnKey = isWhite ? 'WP' : 'BP';
    if (pieces[pawnKey]) {
        const pawn = pieces[pawnKey];
        const dir = isWhite ? 1 : -1;
        const nr = pawn.r + dir;
        if (inBounds(pawn.f, nr) && !pieceAt(pawn.f, nr, null)) {
            validMoves.push({ piece: pawnKey, f: pawn.f, r: nr });
        }
    }
    // Rook moves
    const rookKey = isWhite ? 'WR' : 'BR';
    if (pieces[rookKey]) {
        const rook = pieces[rookKey];
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
        for (const [df, dr] of dirs) {
            let f = rook.f + df, r = rook.r + dr;
            while (inBounds(f, r)) {
                const occ = pieceAt(f, r, rookKey);
                if (occ) {
                    if (occ[0] !== (isWhite ? 'W' : 'B')[0]) {
                        validMoves.push({ piece: rookKey, f, r, capture: occ });
                    }
                    break;
                }
                validMoves.push({ piece: rookKey, f, r });
                f += df; r += dr;
            }
        }
    }
    // Bishop moves
    const bishopKey = isWhite ? 'WB' : 'BB';
    if (pieces[bishopKey]) {
        const bishop = pieces[bishopKey];
        const dirs = [[1,1],[1,-1],[-1,1],[-1,-1]];
        for (const [df, dr] of dirs) {
            let f = bishop.f + df, r = bishop.r + dr;
            while (inBounds(f, r)) {
                const occ = pieceAt(f, r, bishopKey);
                if (occ) {
                    if (occ[0] !== (isWhite ? 'W' : 'B')[0]) {
                        validMoves.push({ piece: bishopKey, f, r, capture: occ });
                    }
                    break;
                }
                validMoves.push({ piece: bishopKey, f, r });
                f += df; r += dr;
            }
        }
    }
    if (validMoves.length === 0 && !gameOver) {
        gameOver = true;
        message = 'Stalemate! Draw.';
    }
}

function handleClick(e) {
    if (gameOver || !turn) return;
    const mx = e.clientX - ox, my = e.clientY - oy;
    const clickF = Math.floor(mx / sq);
    const clickR = 7 - Math.floor(my / sq);
    for (const m of validMoves) {
        if (m.f === clickF && m.r === clickR) {
            if (m.capture) delete pieces[m.capture];
            pieces[m.piece].f = m.f;
            pieces[m.piece].r = m.r;
            // Check promotion
            if (m.piece === 'WP' && m.r === 7) {
                pieces.WQ = { f: m.f, r: m.r };
                delete pieces.WP;
                gameOver = true;
                message = 'White promotes! White wins.';
            } else if (m.piece === 'BP' && m.r === 0) {
                pieces.BQ = { f: m.f, r: m.r };
                delete pieces.BP;
                gameOver = true;
                message = 'Black promotes! Black wins.';
            }
            moveCount++;
            turn = turn === 'white' ? 'black' : 'white';
            computeValidMoves();
            if (!gameOver) {
                message = (turn === 'white' ? 'White' : 'Black') + ' to move. (Expected: ' + resultShown + ')';
            }
            if (moveCount > 20) {
                gameOver = true;
                message = 'Draw by repetition.';
            }
            return;
        }
    }
}
canvas.addEventListener('click', handleClick);

function drawBoard() {
    const light = '#FEFAE0', dark = '#8A9A5B';
    for (let f = 0; f < 8; f++) {
        for (let r = 0; r < 8; r++) {
            ctx.fillStyle = (f + r) % 2 === 0 ? dark : light;
            ctx.fillRect(ox + f * sq, oy + (7 - r) * sq, sq, sq);
        }
    }
    ctx.fillStyle = '#FEFAE0';
    ctx.font = `${sq * 0.18}px sans-serif`;
    ctx.textAlign = 'center';
    for (let f = 0; f < 8; f++) ctx.fillText('abcdefgh'[f], ox + f * sq + sq / 2, oy + 8 * sq + sq * 0.25);
    for (let r = 0; r < 8; r++) ctx.fillText(r + 1, ox - sq * 0.25, oy + (7 - r) * sq + sq / 2 + sq * 0.06);
}

function drawHighlights() {
    // Zugzwang glow around the side to move
    if (turn && !gameOver) {
        const kingKey = turn === 'white' ? 'WK' : 'BK';
        const king = pieces[kingKey];
        if (king) {
            const x = ox + king.f * sq + sq / 2;
            const y = oy + (7 - king.r) * sq + sq / 2;
            const t = Date.now() / 500;
            const pulse = 0.5 + 0.3 * Math.sin(t);
            ctx.beginPath();
            ctx.arc(x, y, sq * 0.55, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(221,161,94,${pulse})`;
            ctx.lineWidth = 3;
            ctx.stroke();
        }
    }
    for (const m of validMoves) {
        const x = ox + m.f * sq, y = oy + (7 - m.r) * sq;
        ctx.beginPath();
        ctx.arc(x + sq / 2, y + sq / 2, sq * 0.13, 0, Math.PI * 2);
        ctx.fillStyle = m.capture ? 'rgba(188,108,37,0.7)' : 'rgba(221,161,94,0.5)';
        ctx.fill();
    }
}

function drawPiece(f, r, type) {
    const x = ox + f * sq + sq / 2, y = oy + (7 - r) * sq + sq / 2;
    const s = sq * 0.4;
    const isWhite = type[0] === 'W';
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = isWhite ? '#FEFAE0' : '#2a2a3e';
    ctx.fill();
    ctx.strokeStyle = isWhite ? '#606C38' : '#DDA15E';
    ctx.lineWidth = 2; ctx.stroke();
    const symbols = {
        WK: '\u2654', WQ: '\u2655', WR: '\u2656', WB: '\u2657', WP: '\u2659',
        BK: '\u265A', BQ: '\u265B', BR: '\u265C', BB: '\u265D', BP: '\u265F'
    };
    ctx.fillStyle = isWhite ? '#606C38' : '#DDA15E';
    ctx.font = `bold ${s * 0.9}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(symbols[type] || '?', 0, 0);
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, W, H);
    drawBoard();
    drawHighlights();
    for (const [key, pos] of Object.entries(pieces)) drawPiece(pos.f, pos.r, key);
    document.getElementById('status').textContent = message;
    requestAnimationFrame(draw);
}

loadPuzzle(0);
draw();

window.reset = function() { resetPuzzle(); };
</script>
</body>
</html>
