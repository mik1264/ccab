<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philidor Defense: The Drawing Technique - Chess Endgames</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
canvas { display: block; }
#ui {
    position: fixed; top: 10px; right: 10px; z-index: 100;
    background: rgba(96,108,56,0.9); backdrop-filter: blur(10px);
    padding: 15px; border-radius: 12px; max-width: 300px;
    font-size: 0.85rem; line-height: 1.5;
}
#ui h3 { color: #DDA15E; margin-bottom: 8px; }
.highlight { color: #DDA15E; font-weight: bold; }
#status {
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.9); backdrop-filter: blur(10px);
    padding: 10px 20px; border-radius: 12px; font-size: 0.95rem;
    z-index: 100; text-align: center; max-width: 90%;
}
#controls {
    position: fixed; bottom: 10px; right: 10px; z-index: 100;
    display: flex; gap: 8px;
}
#controls button {
    background: rgba(138,154,91,0.9); border: none; color: #FEFAE0;
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
}
#controls button:hover { background: rgba(221,161,94,0.9); }
.phase-indicator {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(221,161,94,0.9); backdrop-filter: blur(10px);
    padding: 8px 16px; border-radius: 12px; font-size: 0.85rem;
    z-index: 100; font-weight: bold; color: #1a1a2e;
}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="ui">
    <h3>Philidor Defense</h3>
    <p>You play <span class="highlight">Black</span>. Defend with the Philidor technique!</p>
    <p><span class="highlight">Phase 1</span>: Keep rook on 6th rank to cut off White's king.</p>
    <p><span class="highlight">Phase 2</span>: When pawn reaches 6th, go to 1st rank and check from behind!</p>
</div>
<div class="phase-indicator" id="phase">Phase 1: Hold the 6th rank</div>
<div id="status">Black to move - keep your rook on the 6th rank!</div>
<div id="controls">
    <button onclick="resetGame()">Reset</button>
    <button onclick="showHint()">Hint</button>
</div>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, sq, ox, oy;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    sq = Math.min(W, H) * 0.09;
    ox = (W - 8 * sq) / 2;
    oy = (H - 8 * sq) / 2;
}
resize();
window.addEventListener('resize', resize);

let pieces = {};
let turn = 'black';
let gameOver = false;
let validMoves = [];
let message = '';
let phase = 1; // 1 = rook on 6th, 2 = rook to back rank
let moveCount = 0;

function initGame() {
    // Philidor: White Ke5, Pe4, Ra8; Black Ke7 (or Kf7), Re6 (defending)
    // Classic setup: White Ke5, Pd5, Ra1; Black Kd7, Re6
    pieces = {
        WK: { f: 4, r: 4 }, // Ke5
        WR: { f: 0, r: 0 }, // Ra1
        WP: { f: 3, r: 4 }, // Pd5
        BK: { f: 3, r: 6 }, // Kd7
        BR: { f: 4, r: 5 }, // Re6 - on the 6th rank!
    };
    turn = 'black';
    gameOver = false;
    phase = 1;
    moveCount = 0;
    computeValidMoves();
    message = 'Black to move - keep your rook patrolling the 6th rank!';
    document.getElementById('phase').textContent = 'Phase 1: Hold the 6th rank';
}

function inBounds(f, r) { return f >= 0 && f <= 7 && r >= 0 && r <= 7; }

function pieceAt(f, r, exclude) {
    for (const [k, p] of Object.entries(pieces)) {
        if (k !== exclude && p.f === f && p.r === r) return k;
    }
    return null;
}

function kingsAdj(f1, r1, f2, r2) {
    return Math.abs(f1 - f2) <= 1 && Math.abs(r1 - r2) <= 1;
}

function computeValidMoves() {
    validMoves = [];
    if (gameOver) return;
    if (turn === 'black') {
        // Black King moves
        for (let df = -1; df <= 1; df++) {
            for (let dr = -1; dr <= 1; dr++) {
                if (df === 0 && dr === 0) continue;
                const nf = pieces.BK.f + df, nr = pieces.BK.r + dr;
                if (!inBounds(nf, nr)) continue;
                const occ = pieceAt(nf, nr, 'BK');
                if (occ && occ.startsWith('B')) continue;
                if (kingsAdj(nf, nr, pieces.WK.f, pieces.WK.r)) continue;
                // Don't move into rook check (simplified)
                if (nf === pieces.WR.f || nr === pieces.WR.r) {
                    // Check if white rook could see this square
                    if (!isBlockedRook(pieces.WR.f, pieces.WR.r, nf, nr, 'BK')) continue;
                }
                validMoves.push({ piece: 'BK', f: nf, r: nr });
            }
        }
        // Black Rook moves (along ranks and files)
        addRookMoves('BR', pieces.BR.f, pieces.BR.r);
    }
}

function isBlockedRook(rf, rr, tf, tr, ignore) {
    // Is the path from rook to target blocked?
    if (rf !== tf && rr !== tr) return true; // not on same line
    const df = Math.sign(tf - rf), dr = Math.sign(tr - rr);
    let cf = rf + df, cr = rr + dr;
    while (cf !== tf || cr !== tr) {
        const p = pieceAt(cf, cr, ignore);
        if (p) return true;
        cf += df; cr += dr;
    }
    return false;
}

function addRookMoves(piece, startF, startR) {
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for (const [df, dr] of dirs) {
        let f = startF + df, r = startR + dr;
        while (inBounds(f, r)) {
            const occ = pieceAt(f, r, piece);
            if (occ) {
                if (occ.startsWith('W') && piece.startsWith('B')) {
                    // Can capture white piece (but not king simply)
                    if (occ !== 'WK') validMoves.push({ piece, f, r, capture: occ });
                }
                break;
            }
            validMoves.push({ piece, f, r });
            f += df; r += dr;
        }
    }
}

function makeWhiteMove() {
    if (gameOver) return;
    moveCount++;
    // White AI: try to advance pawn, push king forward
    // Phase 1 behavior: try to advance pawn to 6th rank
    if (pieces.WP.r < 5) {
        // Try to push pawn
        const nr = pieces.WP.r + 1;
        if (!pieceAt(pieces.WP.f, nr, null)) {
            pieces.WP.f = pieces.WP.f;
            pieces.WP.r = nr;
            if (nr >= 5) {
                phase = 2;
                document.getElementById('phase').textContent = 'Phase 2: Check from behind!';
                message = 'Pawn reached 6th! Move rook to 1st rank and check!';
            } else {
                message = 'White pushes pawn. Keep rook on 6th rank!';
            }
            turn = 'black';
            computeValidMoves();
            return;
        }
    }
    // Try king moves toward promotion square
    const kMoves = [];
    for (let df = -1; df <= 1; df++) {
        for (let dr = -1; dr <= 1; dr++) {
            if (df === 0 && dr === 0) continue;
            const nf = pieces.WK.f + df, nr = pieces.WK.r + dr;
            if (!inBounds(nf, nr)) continue;
            if (pieceAt(nf, nr, 'WK')) continue;
            if (kingsAdj(nf, nr, pieces.BK.f, pieces.BK.r)) continue;
            let score = nr; // prefer advancing
            kMoves.push({ f: nf, r: nr, score });
        }
    }
    if (kMoves.length > 0) {
        kMoves.sort((a, b) => b.score - a.score);
        pieces.WK.f = kMoves[0].f;
        pieces.WK.r = kMoves[0].r;
        message = 'White advances king. Your move!';
    }
    turn = 'black';
    computeValidMoves();
    if (moveCount > 30) {
        gameOver = true;
        message = 'Draw by repetition! Philidor defense successful!';
    }
}

function handleClick(e) {
    if (gameOver || turn !== 'black') return;
    const mx = e.clientX - ox, my = e.clientY - oy;
    const clickF = Math.floor(mx / sq);
    const clickR = 7 - Math.floor(my / sq);
    for (const m of validMoves) {
        if (m.f === clickF && m.r === clickR) {
            if (m.capture) {
                delete pieces[m.capture];
                if (m.capture === 'WP') {
                    gameOver = true;
                    message = 'You captured the pawn! Draw secured!';
                }
            }
            pieces[m.piece].f = m.f;
            pieces[m.piece].r = m.r;
            // Feedback
            if (m.piece === 'BR' && m.r === 5 && phase === 1) {
                message = 'Good! Rook stays on 6th rank.';
            } else if (m.piece === 'BR' && (m.r === 0 || m.r === 1) && phase === 2) {
                message = 'Excellent! Rook goes behind to check!';
            }
            turn = 'white';
            validMoves = [];
            if (!gameOver) setTimeout(makeWhiteMove, 500);
            return;
        }
    }
}
canvas.addEventListener('click', handleClick);

function showHint() {
    if (phase === 1) {
        message = 'HINT: Keep rook on rank 6 (e6, d6, f6...) to stop White king crossing.';
    } else {
        message = 'HINT: Move rook to a1 or h1 and check the White king from behind!';
    }
}

function resetGame() { initGame(); }

function drawBoard() {
    const light = '#FEFAE0', dark = '#8A9A5B';
    for (let f = 0; f < 8; f++) {
        for (let r = 0; r < 8; r++) {
            const x = ox + f * sq, y = oy + (7 - r) * sq;
            ctx.fillStyle = (f + r) % 2 === 0 ? dark : light;
            ctx.fillRect(x, y, sq, sq);
        }
    }
    // Rank 6 highlight in phase 1
    if (phase === 1) {
        for (let f = 0; f < 8; f++) {
            const x = ox + f * sq, y = oy + (7 - 5) * sq;
            ctx.fillStyle = 'rgba(221,161,94,0.15)';
            ctx.fillRect(x, y, sq, sq);
        }
    }
    // Back rank highlight in phase 2
    if (phase === 2) {
        for (let f = 0; f < 8; f++) {
            ctx.fillStyle = 'rgba(221,161,94,0.15)';
            ctx.fillRect(ox + f * sq, oy + 7 * sq, sq, sq); // rank 1
        }
    }
    ctx.fillStyle = '#FEFAE0';
    ctx.font = `${sq * 0.18}px sans-serif`;
    ctx.textAlign = 'center';
    for (let f = 0; f < 8; f++) {
        ctx.fillText('abcdefgh'[f], ox + f * sq + sq / 2, oy + 8 * sq + sq * 0.25);
    }
    for (let r = 0; r < 8; r++) {
        ctx.fillText(r + 1, ox - sq * 0.25, oy + (7 - r) * sq + sq / 2 + sq * 0.06);
    }
}

function drawHighlights() {
    for (const m of validMoves) {
        const x = ox + m.f * sq, y = oy + (7 - m.r) * sq;
        ctx.beginPath();
        ctx.arc(x + sq / 2, y + sq / 2, sq * 0.13, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(221,161,94,0.6)';
        ctx.fill();
    }
}

function drawPiece(f, r, type) {
    const x = ox + f * sq + sq / 2, y = oy + (7 - r) * sq + sq / 2;
    const s = sq * 0.4;
    const isWhite = type.startsWith('W');
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = isWhite ? '#FEFAE0' : '#2a2a3e';
    ctx.fill();
    ctx.strokeStyle = isWhite ? '#606C38' : '#DDA15E';
    ctx.lineWidth = 2; ctx.stroke();
    const symbols = { WK: '\u2654', WR: '\u2656', WP: '\u2659', BK: '\u265A', BR: '\u265C' };
    ctx.fillStyle = isWhite ? '#606C38' : '#DDA15E';
    ctx.font = `bold ${s * 0.9}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(symbols[type], 0, 0);
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, W, H);
    drawBoard();
    drawHighlights();
    for (const [key, pos] of Object.entries(pieces)) drawPiece(pos.f, pos.r, key);
    document.getElementById('status').textContent = message;
    requestAnimationFrame(draw);
}

initGame();
draw();

window.reset = function() { resetGame(); };
</script>
</body>
</html>
