<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucena Position: Building the Bridge - Chess Endgames</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #FEFAE0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
canvas { display: block; }
#ui {
    position: fixed; top: 10px; right: 10px; z-index: 100;
    background: rgba(96,108,56,0.9); backdrop-filter: blur(10px);
    padding: 15px; border-radius: 12px; max-width: 300px;
    font-size: 0.85rem; line-height: 1.5;
}
#ui h3 { color: #DDA15E; margin-bottom: 8px; font-size: 1rem; }
.highlight { color: #DDA15E; font-weight: bold; }
#status {
    position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(96,108,56,0.9); backdrop-filter: blur(10px);
    padding: 10px 20px; border-radius: 12px; font-size: 0.95rem;
    z-index: 100; text-align: center; max-width: 90%;
}
#controls {
    position: fixed; bottom: 10px; right: 10px; z-index: 100;
    display: flex; gap: 8px;
}
#controls button {
    background: rgba(138,154,91,0.9); border: none; color: #FEFAE0;
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
}
#controls button:hover { background: rgba(221,161,94,0.9); }
#step-list {
    position: fixed; bottom: 50px; right: 10px; z-index: 100;
    background: rgba(96,108,56,0.85); backdrop-filter: blur(10px);
    padding: 10px 15px; border-radius: 12px; font-size: 0.78rem; max-width: 260px;
}
#step-list .done { color: #DDA15E; }
#step-list .current { color: #FEFAE0; font-weight: bold; }
#step-list .future { color: rgba(254,250,224,0.4); }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:10px;left:10px;color:#8A9A5B;text-decoration:none;z-index:1000;font-size:1.2rem;">&larr; Back</a>
<canvas id="c"></canvas>
<div id="ui">
    <h3>Lucena Position</h3>
    <p>The most important rook endgame position. White has R+P vs R.</p>
    <p><span class="highlight">Building the Bridge</span>: Bring the rook to the 4th rank to shield the king from checks.</p>
    <p>Click highlighted squares to play White's winning moves.</p>
</div>
<div id="status">White to move - build the bridge!</div>
<div id="step-list"></div>
<div id="controls">
    <button onclick="resetGame()">Reset</button>
    <button onclick="showSolution()">Show Solution</button>
</div>
<script src="../assets/js/enhance.js" defer></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, sq, ox, oy;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    sq = Math.min(W, H) * 0.09;
    ox = (W - 8 * sq) / 2;
    oy = (H - 8 * sq) / 2;
}
resize();
window.addEventListener('resize', resize);

// Lucena position: White Ke1 (will be on e8 after setup), Rook, Pawn on d7/e7
// Classic: White Kf8, Pe7, Rh1; Black Kd7, Ra2 (or similar)
// Simplified classic: White Ke8, Pd7, Ra1; Black Kd6, Ra2

let pieces = {};
let turn = 'white';
let gameOver = false;
let validMoves = [];
let message = '';
let moveHistory = [];
let solutionStep = 0;

// The classic Lucena: White Kf8, Pe7, Ra1; Black Kd7, Rf2
// Bridge solution: 1.Ra4! (preparing bridge) Rf1 2.Ke8 Re1+ 3.Kd8 Rf1 4.Re4 (bridge!) ...
const solution = [
    { piece: 'WR', from: {f:0,r:0}, to: {f:0,r:3}, desc: '1. Ra4! - Rook to 4th rank' },
    { piece: 'BR', from: null, to: null, desc: '1...Rf1' },
    { piece: 'WK', from: {f:5,r:7}, to: {f:4,r:7}, desc: '2. Ke8 - King steps out' },
    { piece: 'BR', from: null, to: null, desc: '2...Re1+' },
    { piece: 'WK', from: {f:4,r:7}, to: {f:3,r:7}, desc: '3. Kd8 - Hide behind pawn' },
    { piece: 'BR', from: null, to: null, desc: '3...Rf1' },
    { piece: 'WR', from: {f:0,r:3}, to: {f:4,r:3}, desc: '4. Re4! - The Bridge!' },
    { piece: 'BR', from: null, to: null, desc: '4...Rd1+' },
    { piece: 'WK', from: {f:3,r:7}, to: {f:4,r:6}, desc: '5. Ke7 - King advances' },
    { piece: 'BR', from: null, to: null, desc: '5...Re1+' },
    { piece: 'WR', from: {f:4,r:3}, to: {f:4,r:4}, desc: '6. Re5! - Bridge blocks check!' },
];

function initGame() {
    pieces = {
        WK: { f: 5, r: 7 }, // Kf8
        WR: { f: 0, r: 0 }, // Ra1
        WP: { f: 4, r: 6 }, // Pe7
        BK: { f: 3, r: 6 }, // Kd7
        BR: { f: 5, r: 1 }, // Rf2
    };
    turn = 'white';
    gameOver = false;
    solutionStep = 0;
    moveHistory = [];
    computeValidMoves();
    message = 'White to move - build the bridge! Try 1.Ra4!';
    updateStepList();
}

function computeValidMoves() {
    validMoves = [];
    if (gameOver) return;
    if (turn === 'white') {
        // For guided puzzle, only allow correct move
        const step = solution[solutionStep];
        if (step && step.piece.startsWith('W')) {
            validMoves.push({ piece: step.piece, f: step.to.f, r: step.to.r });
        }
    }
}

function makeBlackResponse() {
    const step = solution[solutionStep];
    if (!step || !step.piece.startsWith('B')) return;
    // Execute black's response based on solution step
    const responses = {
        1: { f: 5, r: 0 }, // Rf1
        3: { f: 4, r: 0 }, // Re1+
        5: { f: 5, r: 0 }, // Rf1
        7: { f: 3, r: 0 }, // Rd1+
        9: { f: 4, r: 0 }, // Re1+
    };
    const resp = responses[solutionStep];
    if (resp) {
        pieces.BR.f = resp.f;
        pieces.BR.r = resp.r;
    }
    moveHistory.push(step.desc);
    solutionStep++;
    turn = 'white';
    if (solutionStep >= solution.length) {
        gameOver = true;
        message = 'The bridge is built! White wins by promoting the pawn.';
    } else {
        computeValidMoves();
        message = solution[solutionStep] ? solution[solutionStep].desc.split('-')[1] || 'Your move' : 'Complete!';
        message = 'White to move - ' + message.trim();
    }
    updateStepList();
}

function handleClick(e) {
    if (gameOver || turn !== 'white') return;
    const mx = e.clientX - ox;
    const my = e.clientY - oy;
    const clickF = Math.floor(mx / sq);
    const clickR = 7 - Math.floor(my / sq);
    for (const m of validMoves) {
        if (m.f === clickF && m.r === clickR) {
            pieces[m.piece].f = m.f;
            pieces[m.piece].r = m.r;
            moveHistory.push(solution[solutionStep].desc);
            solutionStep++;
            turn = 'black';
            message = 'Black responds...';
            updateStepList();
            setTimeout(() => {
                makeBlackResponse();
            }, 600);
            return;
        }
    }
}
canvas.addEventListener('click', handleClick);

function showSolution() {
    if (gameOver) return;
    // Auto-play remaining moves
    function playNext() {
        if (solutionStep >= solution.length) {
            gameOver = true;
            message = 'The bridge is built! White wins!';
            updateStepList();
            return;
        }
        const step = solution[solutionStep];
        if (step.piece.startsWith('W')) {
            pieces[step.piece].f = step.to.f;
            pieces[step.piece].r = step.to.r;
        }
        moveHistory.push(step.desc);
        solutionStep++;
        updateStepList();
        setTimeout(playNext, 800);
    }
    playNext();
}

function resetGame() {
    initGame();
}

function updateStepList() {
    const el = document.getElementById('step-list');
    let html = '<b style="color:#DDA15E;">Bridge Steps:</b><br>';
    for (let i = 0; i < solution.length; i++) {
        const cls = i < solutionStep ? 'done' : i === solutionStep ? 'current' : 'future';
        const prefix = i < solutionStep ? '\u2713 ' : i === solutionStep ? '\u25B6 ' : '  ';
        html += `<span class="${cls}">${prefix}${solution[i].desc}</span><br>`;
    }
    el.innerHTML = html;
}

function drawBoard() {
    const light = '#FEFAE0';
    const dark = '#8A9A5B';
    for (let f = 0; f < 8; f++) {
        for (let r = 0; r < 8; r++) {
            const x = ox + f * sq;
            const y = oy + (7 - r) * sq;
            ctx.fillStyle = (f + r) % 2 === 0 ? dark : light;
            ctx.fillRect(x, y, sq, sq);
        }
    }
    ctx.fillStyle = '#FEFAE0';
    ctx.font = `${sq * 0.18}px sans-serif`;
    ctx.textAlign = 'center';
    for (let f = 0; f < 8; f++) {
        ctx.fillText('abcdefgh'[f], ox + f * sq + sq / 2, oy + 8 * sq + sq * 0.25);
    }
    for (let r = 0; r < 8; r++) {
        ctx.fillText(r + 1, ox - sq * 0.25, oy + (7 - r) * sq + sq / 2 + sq * 0.06);
    }
}

function drawHighlights() {
    for (const m of validMoves) {
        const x = ox + m.f * sq;
        const y = oy + (7 - m.r) * sq;
        ctx.fillStyle = 'rgba(221,161,94,0.4)';
        ctx.fillRect(x, y, sq, sq);
        ctx.beginPath();
        ctx.arc(x + sq / 2, y + sq / 2, sq * 0.18, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(221,161,94,0.7)';
        ctx.fill();
    }
    // Highlight the 4th rank with a subtle line when relevant
    if (solutionStep <= 1) {
        ctx.strokeStyle = 'rgba(221,161,94,0.3)';
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(ox, oy + (7 - 3) * sq);
        ctx.lineTo(ox + 8 * sq, oy + (7 - 3) * sq);
        ctx.moveTo(ox, oy + (7 - 3) * sq + sq);
        ctx.lineTo(ox + 8 * sq, oy + (7 - 3) * sq + sq);
        ctx.stroke();
        ctx.setLineDash([]);
    }
}

function drawPiece(f, r, type) {
    const x = ox + f * sq + sq / 2;
    const y = oy + (7 - r) * sq + sq / 2;
    const s = sq * 0.4;
    const isWhite = type.startsWith('W');
    ctx.save();
    ctx.translate(x, y);
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = isWhite ? '#FEFAE0' : '#2a2a3e';
    ctx.fill();
    ctx.strokeStyle = isWhite ? '#606C38' : '#DDA15E';
    ctx.lineWidth = 2;
    ctx.stroke();
    const symbols = { WK: '\u2654', WR: '\u2656', WP: '\u2659', BK: '\u265A', BR: '\u265C' };
    ctx.fillStyle = isWhite ? '#606C38' : '#DDA15E';
    ctx.font = `bold ${s * 0.9}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(symbols[type] || '?', 0, 0);
    ctx.restore();
}

function drawBridgeArrow() {
    // After rook reaches e4, show the bridge concept
    if (solutionStep >= 7) {
        ctx.save();
        ctx.strokeStyle = 'rgba(221,161,94,0.5)';
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 4]);
        // Arrow from king position through rook's protection
        const rx = ox + pieces.WR.f * sq + sq / 2;
        const ry = oy + (7 - pieces.WR.r) * sq + sq / 2;
        ctx.beginPath();
        ctx.arc(rx, ry, sq * 0.9, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(221,161,94,0.6)';
        ctx.font = `${sq * 0.2}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText('BRIDGE', rx, ry - sq * 1.1);
        ctx.restore();
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);
    drawBoard();
    drawHighlights();
    drawBridgeArrow();
    for (const [key, pos] of Object.entries(pieces)) {
        drawPiece(pos.f, pos.r, key);
    }
    document.getElementById('status').textContent = message;
    requestAnimationFrame(draw);
}

initGame();
draw();

window.reset = function() { resetGame(); };
</script>
</body>
</html>
