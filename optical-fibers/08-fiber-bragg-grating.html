<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiber Bragg Grating - Optical Fibers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 14px; color: #FEFAE0;
            display: flex; gap: 24px; align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
            border: 1px solid rgba(138,154,91,0.3);
        }
        .controls label { font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .controls input[type=range] { width: 110px; accent-color: #8A9A5B; }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,60,0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 260px;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.5;
        }
        .info h3 { color: #8A9A5B; margin-bottom: 6px; }
        .val { color: #DDA15E; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Fiber Bragg Grating</h3>
        <p>Periodic variations in refractive index act as a <span class="val">wavelength-selective mirror</span>. The Bragg wavelength satisfying 2n&Lambda; = &lambda;<sub>B</sub> is reflected while all others pass through.</p>
        <p style="margin-top:6px;">Grating period: <span class="val" id="periodDisp">530</span> nm</p>
        <p>Bragg &lambda;: <span class="val" id="braggDisp">1550</span> nm</p>
        <p>Reflectivity: <span class="val" id="reflDisp">95</span>%</p>
    </div>
    <div class="controls">
        <label>Grating Period (&Lambda;)
            <input type="range" id="period" min="510" max="550" step="1" value="530">
            <span id="periodVal">530</span> nm
        </label>
        <label>Index Modulation (&Delta;n)
            <input type="range" id="deltaN" min="0.0001" max="0.005" step="0.0001" value="0.001">
            <span id="deltaNVal">0.0010</span>
        </label>
        <label>Grating Length
            <input type="range" id="gratingLen" min="1" max="20" step="0.5" value="10">
            <span id="gratingLenVal">10</span> mm
        </label>
        <label>Speed
            <input type="range" id="speed" min="0.5" max="4" step="0.25" value="1.5">
            <span id="speedVal">1.5</span>x
        </label>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let gratingPeriod = 530, deltaN = 0.001, gratingLength = 10, speed = 1.5;
    let time = 0;
    const nEff = 1.46;

    const periodSlider = document.getElementById('period');
    const deltaNSlider = document.getElementById('deltaN');
    const gratingLenSlider = document.getElementById('gratingLen');
    const speedSlider = document.getElementById('speed');

    periodSlider.addEventListener('input', () => { gratingPeriod = parseInt(periodSlider.value); document.getElementById('periodVal').textContent = gratingPeriod; });
    deltaNSlider.addEventListener('input', () => { deltaN = parseFloat(deltaNSlider.value); document.getElementById('deltaNVal').textContent = deltaN.toFixed(4); });
    gratingLenSlider.addEventListener('input', () => { gratingLength = parseFloat(gratingLenSlider.value); document.getElementById('gratingLenVal').textContent = gratingLength; });
    speedSlider.addEventListener('input', () => { speed = parseFloat(speedSlider.value); document.getElementById('speedVal').textContent = speed.toFixed(1); });

    function getBraggWavelength() {
        return 2 * nEff * gratingPeriod; // in nm
    }

    function getReflectivity(wavelength) {
        const braggWl = getBraggWavelength();
        const L = gratingLength * 1e-3; // mm to m
        const kappa = Math.PI * deltaN / braggWl * 1e9; // coupling coefficient
        const detuning = 2 * Math.PI * nEff * (1 / wavelength - 1 / braggWl) * 1e9;
        const gamma = Math.sqrt(kappa * kappa - detuning * detuning);

        if (kappa * kappa > detuning * detuning) {
            const sinhGL = Math.sinh(gamma * L);
            const coshGL = Math.cosh(gamma * L);
            return (kappa * kappa * sinhGL * sinhGL) / (gamma * gamma * coshGL * coshGL + detuning * detuning * sinhGL * sinhGL);
        } else {
            const gammaI = Math.sqrt(detuning * detuning - kappa * kappa);
            const sinGL = Math.sin(gammaI * L);
            const cosGL = Math.cos(gammaI * L);
            return (kappa * kappa * sinGL * sinGL) / (gammaI * gammaI * cosGL * cosGL + detuning * detuning * sinGL * sinGL);
        }
    }

    // Wavelength channels for animation
    const wdmChannels = [
        { wl: 1530, color: '#e74c3c' },
        { wl: 1540, color: '#f39c12' },
        { wl: 1550, color: '#2ecc71' },
        { wl: 1560, color: '#3498db' },
        { wl: 1570, color: '#9b59b6' }
    ];

    function draw() {
        time += 0.016 * speed;
        ctx.clearRect(0, 0, W, H);

        const braggWl = getBraggWavelength();
        const braggRefl = getReflectivity(braggWl);

        // Update readouts
        document.getElementById('periodDisp').textContent = gratingPeriod;
        document.getElementById('braggDisp').textContent = braggWl.toFixed(0);
        document.getElementById('reflDisp').textContent = (braggRefl * 100).toFixed(1);

        // Fiber layout
        const fiberY = H * 0.35;
        const fiberH = H * 0.06;
        const fiberX = W * 0.05;
        const fiberEnd = W * 0.95;
        const fiberLen = fiberEnd - fiberX;

        // Grating region
        const gratingX = W * 0.38;
        const gratingEnd = W * 0.62;
        const gratingW = gratingEnd - gratingX;

        // Draw fiber
        ctx.fillStyle = 'rgba(50, 70, 130, 0.3)';
        ctx.fillRect(fiberX, fiberY - fiberH, fiberLen, fiberH * 2);
        ctx.strokeStyle = 'rgba(96,108,56,0.5)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(fiberX, fiberY - fiberH, fiberLen, fiberH * 2);

        // Draw grating (periodic index variations)
        const numBars = Math.floor(gratingW / 6);
        for (let i = 0; i < numBars; i++) {
            const x = gratingX + (i / numBars) * gratingW;
            const modulation = 0.3 + 0.3 * Math.sin(i * Math.PI * 2 / 3);
            ctx.fillStyle = `rgba(138, 154, 91, ${modulation * deltaN * 300})`;
            ctx.fillRect(x, fiberY - fiberH + 2, 3, fiberH * 2 - 4);
        }

        // Grating bracket
        ctx.strokeStyle = '#8A9A5B';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(gratingX, fiberY - fiberH - 15);
        ctx.lineTo(gratingX, fiberY - fiberH - 8);
        ctx.moveTo(gratingX, fiberY - fiberH - 12);
        ctx.lineTo(gratingEnd, fiberY - fiberH - 12);
        ctx.moveTo(gratingEnd, fiberY - fiberH - 15);
        ctx.lineTo(gratingEnd, fiberY - fiberH - 8);
        ctx.stroke();
        ctx.font = '11px Georgia';
        ctx.fillStyle = '#8A9A5B';
        ctx.textAlign = 'center';
        ctx.fillText(`Bragg Grating (L = ${gratingLength} mm, Λ = ${gratingPeriod} nm)`, (gratingX + gratingEnd) / 2, fiberY - fiberH - 20);

        // Animate photons
        wdmChannels.forEach((ch, ci) => {
            const refl = getReflectivity(ch.wl);
            const isReflected = refl > 0.5;

            for (let p = 0; p < 3; p++) {
                const phase = ((time * 0.6 + ci * 0.2 + p * 0.33) % 2);
                const yOff = (ci - 2) * (fiberH * 0.3);

                if (phase < 1) {
                    // Incoming photon
                    const px = fiberX + phase * (gratingX - fiberX + gratingW * 0.2);
                    if (px < gratingX + gratingW * 0.2) {
                        ctx.beginPath();
                        ctx.arc(px, fiberY + yOff, 3.5, 0, Math.PI * 2);
                        ctx.fillStyle = ch.color;
                        ctx.fill();
                        // Trail
                        ctx.beginPath();
                        ctx.moveTo(px, fiberY + yOff);
                        ctx.lineTo(Math.max(fiberX, px - 20), fiberY + yOff);
                        ctx.strokeStyle = ch.color + '60';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                } else {
                    const phase2 = phase - 1;
                    if (isReflected) {
                        // Reflected back
                        const px = gratingX + gratingW * 0.2 - phase2 * (gratingX - fiberX + gratingW * 0.2);
                        if (px > fiberX) {
                            ctx.beginPath();
                            ctx.arc(px, fiberY + yOff, 3.5, 0, Math.PI * 2);
                            ctx.fillStyle = ch.color;
                            ctx.fill();
                            ctx.beginPath();
                            ctx.moveTo(px, fiberY + yOff);
                            ctx.lineTo(px + 20, fiberY + yOff);
                            ctx.strokeStyle = ch.color + '60';
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        }
                    } else {
                        // Transmitted through
                        const px = gratingEnd - gratingW * 0.2 + phase2 * (fiberEnd - gratingEnd + gratingW * 0.2);
                        if (px < fiberEnd) {
                            ctx.beginPath();
                            ctx.arc(px, fiberY + yOff, 3.5, 0, Math.PI * 2);
                            ctx.fillStyle = ch.color;
                            ctx.fill();
                            ctx.beginPath();
                            ctx.moveTo(px, fiberY + yOff);
                            ctx.lineTo(px - 20, fiberY + yOff);
                            ctx.strokeStyle = ch.color + '60';
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        }
                    }
                }
            }

            // Channel label
            ctx.font = '10px Georgia';
            ctx.fillStyle = ch.color;
            ctx.textAlign = 'right';
            const yLabel = fiberY + (ci - 2) * (fiberH * 0.3) + 3;
            ctx.fillText(`${ch.wl} nm`, fiberX - 5, yLabel);

            // Status
            const r = getReflectivity(ch.wl);
            ctx.textAlign = 'left';
            ctx.fillText(r > 0.5 ? 'REFLECTED' : 'transmitted', fiberEnd + 8, yLabel);
        });

        // Arrow labels
        ctx.font = '12px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.6)';
        ctx.textAlign = 'center';
        ctx.fillText('Input →', fiberX + 50, fiberY + fiberH + 25);
        ctx.fillText('← Reflected', fiberX + 50, fiberY + fiberH + 42);
        ctx.fillText('Transmitted →', fiberEnd - 60, fiberY + fiberH + 25);

        // Reflection spectrum
        const specY = H * 0.68;
        const specW = W * 0.7;
        const specX = (W - specW) / 2;
        const specH = H * 0.22;

        ctx.font = '13px Georgia';
        ctx.fillStyle = '#8A9A5B';
        ctx.textAlign = 'center';
        ctx.fillText('Reflection Spectrum', W / 2, specY - 10);

        // Axes
        ctx.strokeStyle = 'rgba(254,250,224,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(specX, specY + specH);
        ctx.lineTo(specX + specW, specY + specH);
        ctx.moveTo(specX, specY);
        ctx.lineTo(specX, specY + specH);
        ctx.stroke();

        // Y axis label
        ctx.font = '10px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.4)';
        ctx.save();
        ctx.translate(specX - 15, specY + specH / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText('Reflectivity', 0, 0);
        ctx.restore();

        // X axis
        ctx.textAlign = 'center';
        ctx.fillText('Wavelength (nm)', specX + specW / 2, specY + specH + 20);

        // Y ticks
        for (let r = 0; r <= 1; r += 0.25) {
            const y = specY + specH - r * specH;
            ctx.beginPath();
            ctx.moveTo(specX - 3, y);
            ctx.lineTo(specX, y);
            ctx.strokeStyle = 'rgba(254,250,224,0.2)';
            ctx.stroke();
            ctx.fillStyle = 'rgba(254,250,224,0.3)';
            ctx.textAlign = 'right';
            ctx.fillText((r * 100).toFixed(0) + '%', specX - 6, y + 3);
        }

        // X ticks
        const wlMin = 1510, wlMax = 1590;
        for (let wl = wlMin; wl <= wlMax; wl += 10) {
            const x = specX + ((wl - wlMin) / (wlMax - wlMin)) * specW;
            ctx.beginPath();
            ctx.moveTo(x, specY + specH);
            ctx.lineTo(x, specY + specH + 4);
            ctx.strokeStyle = 'rgba(254,250,224,0.2)';
            ctx.stroke();
            ctx.fillStyle = 'rgba(254,250,224,0.3)';
            ctx.textAlign = 'center';
            ctx.fillText(wl.toString(), x, specY + specH + 14);
        }

        // Plot reflection spectrum
        ctx.beginPath();
        for (let px = 0; px < specW; px++) {
            const wl = wlMin + (px / specW) * (wlMax - wlMin);
            const refl = getReflectivity(wl);
            const y = specY + specH - Math.min(1, refl) * specH;
            if (px === 0) ctx.moveTo(specX + px, y);
            else ctx.lineTo(specX + px, y);
        }
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Fill under curve
        ctx.lineTo(specX + specW, specY + specH);
        ctx.lineTo(specX, specY + specH);
        ctx.closePath();
        ctx.fillStyle = 'rgba(221,161,94,0.1)';
        ctx.fill();

        // Bragg wavelength marker
        const braggX = specX + ((braggWl - wlMin) / (wlMax - wlMin)) * specW;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(braggX, specY);
        ctx.lineTo(braggX, specY + specH);
        ctx.strokeStyle = 'rgba(138,154,91,0.5)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.font = '11px Georgia';
        ctx.fillStyle = '#8A9A5B';
        ctx.textAlign = 'center';
        ctx.fillText(`λB = ${braggWl.toFixed(0)} nm`, braggX, specY - 3);

        // Channel markers on spectrum
        wdmChannels.forEach((ch) => {
            const x = specX + ((ch.wl - wlMin) / (wlMax - wlMin)) * specW;
            const refl = getReflectivity(ch.wl);
            const y = specY + specH - Math.min(1, refl) * specH;
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fillStyle = ch.color;
            ctx.fill();
        });

        // Formula
        ctx.font = '13px Georgia';
        ctx.fillStyle = '#FEFAE0';
        ctx.textAlign = 'center';
        ctx.fillText(`Bragg condition: λB = 2 · neff · Λ = 2 × ${nEff} × ${gratingPeriod} = ${braggWl.toFixed(0)} nm`, W / 2, specY + specH + 38);

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        gratingPeriod = 530; deltaN = 0.001; gratingLength = 10; speed = 1.5; time = 0;
        periodSlider.value = 530; deltaNSlider.value = 0.001; gratingLenSlider.value = 10; speedSlider.value = 1.5;
        document.getElementById('periodVal').textContent = '530';
        document.getElementById('deltaNVal').textContent = '0.0010';
        document.getElementById('gratingLenVal').textContent = '10';
        document.getElementById('speedVal').textContent = '1.5';
    };

    draw();
    </script>
</body>
</html>
