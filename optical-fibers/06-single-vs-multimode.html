<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single-Mode vs Multi-Mode Fiber - Optical Fibers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 14px; color: #FEFAE0;
            display: flex; gap: 24px; align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
            border: 1px solid rgba(138,154,91,0.3);
        }
        .controls label { font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .controls input[type=range] { width: 120px; accent-color: #8A9A5B; }
        .controls button {
            background: rgba(138,154,91,0.3); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: Georgia;
        }
        .controls button:hover { background: rgba(138,154,91,0.5); }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <label>Distance (km)
            <input type="range" id="dist" min="0.1" max="10" step="0.1" value="2.0">
            <span id="distVal">2.0</span>
        </label>
        <label>Speed
            <input type="range" id="speed" min="0.5" max="4" step="0.25" value="1.5">
            <span id="speedVal">1.5</span>x
        </label>
        <button id="sendBtn">Send Pulses</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let dist = 2.0, speed = 1.5, time = 0;
    let pulseActive = true, pulseStart = 0;

    const distSlider = document.getElementById('dist');
    const speedSlider = document.getElementById('speed');

    distSlider.addEventListener('input', () => { dist = parseFloat(distSlider.value); document.getElementById('distVal').textContent = dist.toFixed(1); });
    speedSlider.addEventListener('input', () => { speed = parseFloat(speedSlider.value); document.getElementById('speedVal').textContent = speed.toFixed(1); });

    document.getElementById('sendBtn').addEventListener('click', () => { pulseActive = true; pulseStart = time; });

    function drawFiber(label, subtitle, yCenter, coreH, fiberH, fiberX, fiberLen, modes, modeColors, pulseProgress, isMultimode) {
        // Title
        ctx.font = '15px Georgia';
        ctx.fillStyle = '#8A9A5B';
        ctx.textAlign = 'left';
        ctx.fillText(label, fiberX, yCenter - fiberH - 22);
        ctx.font = '11px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.5)';
        ctx.fillText(subtitle, fiberX, yCenter - fiberH - 8);

        // Cladding
        ctx.fillStyle = 'rgba(45, 60, 110, 0.3)';
        ctx.fillRect(fiberX, yCenter - fiberH, fiberLen, fiberH * 2);

        // Core
        const coreGrad = ctx.createLinearGradient(0, yCenter - coreH, 0, yCenter + coreH);
        coreGrad.addColorStop(0, 'rgba(80, 120, 200, 0.3)');
        coreGrad.addColorStop(0.5, 'rgba(100, 150, 220, 0.4)');
        coreGrad.addColorStop(1, 'rgba(80, 120, 200, 0.3)');
        ctx.fillStyle = coreGrad;
        ctx.fillRect(fiberX, yCenter - coreH, fiberLen, coreH * 2);

        // Core boundary
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = 'rgba(138,154,91,0.4)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(fiberX, yCenter - coreH); ctx.lineTo(fiberX + fiberLen, yCenter - coreH);
        ctx.moveTo(fiberX, yCenter + coreH); ctx.lineTo(fiberX + fiberLen, yCenter + coreH);
        ctx.stroke();
        ctx.setLineDash([]);

        // Outer boundary
        ctx.strokeStyle = 'rgba(96,108,56,0.6)';
        ctx.lineWidth = 2;
        ctx.strokeRect(fiberX, yCenter - fiberH, fiberLen, fiberH * 2);

        // Core size label
        ctx.font = '10px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.4)';
        ctx.textAlign = 'right';
        ctx.fillText(`core: ${isMultimode ? '50' : '9'} μm`, fiberX - 8, yCenter + 4);

        // Draw modes
        for (let m = 0; m < modes; m++) {
            const amp = coreH * (0.1 + (m / Math.max(1, modes - 1)) * 0.8);
            const freq = 1.5 + m * 0.6;
            const phase = m * 0.3;
            const color = modeColors[m % modeColors.length];

            const modeDelay = m * 0.05 * dist;
            const mProgress = Math.max(0, Math.min(1, pulseProgress - modeDelay * 0.1));

            if (mProgress <= 0) continue;

            ctx.beginPath();
            const drawEnd = fiberX + mProgress * fiberLen;
            for (let x = fiberX; x <= drawEnd; x += 3) {
                const t = (x - fiberX) / fiberLen;
                const py = yCenter + amp * Math.sin(freq * Math.PI * t + phase);
                if (x === fiberX) ctx.moveTo(x, py);
                else ctx.lineTo(x, py);
            }
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Photon
            if (mProgress > 0 && mProgress < 1) {
                const px = fiberX + mProgress * fiberLen;
                const py = yCenter + amp * Math.sin(freq * Math.PI * mProgress + phase);
                ctx.beginPath();
                ctx.arc(px, py, 4, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();

                const glow = ctx.createRadialGradient(px, py, 0, px, py, 12);
                glow.addColorStop(0, color.replace(/^(rgba?)\((.+)\)$/, function(m, fn, args) { return 'rgba(' + args.split(',').slice(0,3).join(',') + ',0.4)'; }));
                glow.addColorStop(1, 'transparent');
                ctx.beginPath();
                ctx.arc(px, py, 12, 0, Math.PI * 2);
                ctx.fillStyle = glow;
                ctx.fill();
            }
        }

        // Output pulse shape (right side)
        if (pulseProgress > 0.5) {
            const pulseX = fiberX + fiberLen + 20;
            const spread = isMultimode ? dist * modes * 0.8 : 1;
            const pulseW = 40;

            ctx.beginPath();
            for (let dy = -fiberH; dy <= fiberH; dy++) {
                const norm = dy / fiberH;
                const val = Math.exp(-norm * norm * 4) / Math.sqrt(spread);
                ctx.lineTo(pulseX + val * pulseW, yCenter + dy);
            }
            ctx.strokeStyle = isMultimode ? '#DDA15E' : '#8A9A5B';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.font = '10px Georgia';
            ctx.fillStyle = isMultimode ? '#DDA15E' : '#8A9A5B';
            ctx.textAlign = 'left';
            ctx.fillText(isMultimode ? 'Broadened' : 'Sharp', pulseX + pulseW + 5, yCenter + 4);
        }
    }

    function draw() {
        time += 0.016 * speed;
        ctx.clearRect(0, 0, W, H);

        const fiberX = W * 0.12;
        const fiberEnd = W * 0.82;
        const fiberLen = fiberEnd - fiberX;

        const elapsed = time - pulseStart;
        const duration = 2 + dist * 0.5;
        const progress = pulseActive ? Math.min(elapsed / duration, 1.2) : 0;

        // Title
        ctx.font = '18px Georgia';
        ctx.fillStyle = '#FEFAE0';
        ctx.textAlign = 'center';
        ctx.fillText('Single-Mode vs Multi-Mode Fiber Comparison', W / 2, 35);

        // Multi-mode fiber (top)
        const mmY = H * 0.3;
        const mmCoreH = H * 0.06;
        const mmFiberH = H * 0.09;
        const mmColors = [];
        for (let i = 0; i < 8; i++) mmColors.push(`hsl(${60 + i * 30}, 60%, 60%)`);
        drawFiber('Multi-Mode Fiber', 'Core: 50 μm / 62.5 μm — supports hundreds of modes', mmY, mmCoreH, mmFiberH, fiberX, fiberLen, 6, mmColors, progress, true);

        // Single-mode fiber (bottom)
        const smY = H * 0.68;
        const smCoreH = H * 0.012;
        const smFiberH = H * 0.09;
        const smColors = ['rgba(138,154,91,0.9)'];
        drawFiber('Single-Mode Fiber', 'Core: 8-10 μm — only the fundamental mode propagates', smY, smCoreH, smFiberH, fiberX, fiberLen, 1, smColors, progress, false);

        // Comparison table
        const tableY = H * 0.92;
        ctx.font = '12px Georgia';
        ctx.textAlign = 'center';

        const cols = [W * 0.3, W * 0.5, W * 0.7];
        const headers = ['Property', 'Multi-Mode', 'Single-Mode'];
        const rows = [
            ['Core diameter', '50 / 62.5 μm', '8-10 μm'],
            ['Bandwidth', `~${(500 / dist).toFixed(0)} MHz·km`, '> 100 GHz·km'],
            ['Distance', '< 2 km', '> 100 km'],
            ['Modal dispersion', `${(dist * 3).toFixed(1)} ns/km`, 'None']
        ];

        ctx.fillStyle = '#8A9A5B';
        headers.forEach((h, i) => ctx.fillText(h, cols[i], tableY - 35));

        ctx.fillStyle = 'rgba(254,250,224,0.6)';
        rows.forEach((row, ri) => {
            row.forEach((cell, ci) => {
                ctx.fillText(cell, cols[ci], tableY - 15 + ri * 16);
            });
        });

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        dist = 2.0; speed = 1.5; time = 0; pulseActive = true; pulseStart = 0;
        distSlider.value = 2.0; speedSlider.value = 1.5;
        document.getElementById('distVal').textContent = '2.0';
        document.getElementById('speedVal').textContent = '1.5';
    };

    draw();
    </script>
</body>
</html>
