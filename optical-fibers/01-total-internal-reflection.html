<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Total Internal Reflection - Optical Fibers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 14px; color: #FEFAE0;
            display: flex; gap: 24px; align-items: center; z-index: 100;
            border: 1px solid rgba(138,154,91,0.3);
        }
        .controls label { font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .controls input[type=range] { width: 120px; accent-color: #8A9A5B; }
        .controls select { background: #2a2a4e; color: #FEFAE0; border: 1px solid #8A9A5B; border-radius: 6px; padding: 4px 8px; }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,60,0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 250px;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.5;
        }
        .info h3 { color: #8A9A5B; margin-bottom: 6px; font-size: 0.95rem; }
        .val { color: #DDA15E; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Total Internal Reflection</h3>
        <p>Drag the light source angle. When the angle exceeds the <span class="val">critical angle</span>, light reflects completely.</p>
        <p style="margin-top:8px;">Incident: <span class="val" id="incAngle">45.0</span>&deg;</p>
        <p>Critical: <span class="val" id="critAngle">41.8</span>&deg;</p>
        <p>Status: <span class="val" id="status">Partial reflection</span></p>
    </div>
    <div class="controls">
        <label>n1 (dense medium)
            <input type="range" id="n1" min="1.0" max="2.5" step="0.01" value="1.5">
            <span id="n1Val">1.50</span>
        </label>
        <label>n2 (rare medium)
            <input type="range" id="n2" min="1.0" max="2.0" step="0.01" value="1.0">
            <span id="n2Val">1.00</span>
        </label>
        <label>Material
            <select id="preset">
                <option value="custom">Custom</option>
                <option value="glass-air" selected>Glass → Air</option>
                <option value="water-air">Water → Air</option>
                <option value="diamond-air">Diamond → Air</option>
                <option value="fiber">Fiber Core → Cladding</option>
            </select>
        </label>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H, cx, cy;
    let incidentAngle = Math.PI / 4;
    let dragging = false;
    let n1 = 1.5, n2 = 1.0;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cx = W / 2;
        cy = H / 2;
    }
    resize();
    window.addEventListener('resize', resize);

    const n1Slider = document.getElementById('n1');
    const n2Slider = document.getElementById('n2');
    const n1ValEl = document.getElementById('n1Val');
    const n2ValEl = document.getElementById('n2Val');
    const presetSel = document.getElementById('preset');
    const incAngleEl = document.getElementById('incAngle');
    const critAngleEl = document.getElementById('critAngle');
    const statusEl = document.getElementById('status');

    const presets = {
        'glass-air': [1.5, 1.0],
        'water-air': [1.33, 1.0],
        'diamond-air': [2.42, 1.0],
        'fiber': [1.48, 1.46]
    };

    presetSel.addEventListener('change', () => {
        const p = presets[presetSel.value];
        if (p) {
            n1 = p[0]; n2 = p[1];
            n1Slider.value = n1; n2Slider.value = n2;
            n1ValEl.textContent = n1.toFixed(2);
            n2ValEl.textContent = n2.toFixed(2);
        }
    });

    n1Slider.addEventListener('input', () => {
        n1 = parseFloat(n1Slider.value);
        n1ValEl.textContent = n1.toFixed(2);
        presetSel.value = 'custom';
    });
    n2Slider.addEventListener('input', () => {
        n2 = parseFloat(n2Slider.value);
        n2ValEl.textContent = n2.toFixed(2);
        presetSel.value = 'custom';
    });

    function getCriticalAngle() {
        if (n2 >= n1) return Math.PI / 2;
        return Math.asin(n2 / n1);
    }

    function getRefractedAngle(theta_i) {
        const sinR = (n1 / n2) * Math.sin(theta_i);
        if (Math.abs(sinR) > 1) return null;
        return Math.asin(sinR);
    }

    function drawRay(x0, y0, x1, y1, color, width, dashed) {
        ctx.beginPath();
        ctx.setLineDash(dashed ? [8, 6] : []);
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.stroke();
        ctx.setLineDash([]);
    }

    function drawArrow(x0, y0, x1, y1, color) {
        const dx = x1 - x0, dy = y1 - y0;
        const len = Math.sqrt(dx * dx + dy * dy);
        const ux = dx / len, uy = dy / len;
        const mx = (x0 + x1) / 2, my = (y0 + y1) / 2;
        const sz = 10;
        ctx.beginPath();
        ctx.moveTo(mx + ux * sz, my + uy * sz);
        ctx.lineTo(mx - ux * sz * 0.5 - uy * sz * 0.5, my - uy * sz * 0.5 + ux * sz * 0.5);
        ctx.lineTo(mx - ux * sz * 0.5 + uy * sz * 0.5, my - uy * sz * 0.5 - ux * sz * 0.5);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Draw media
        ctx.fillStyle = 'rgba(40, 60, 120, 0.4)';
        ctx.fillRect(0, 0, W, cy);
        ctx.fillStyle = 'rgba(20, 30, 60, 0.6)';
        ctx.fillRect(0, cy, W, H);

        // Labels
        ctx.font = '16px Georgia';
        ctx.fillStyle = '#FEFAE0';
        ctx.textAlign = 'center';
        ctx.fillText(`n₂ = ${n2.toFixed(2)} (rarer medium)`, cx, 40);
        ctx.fillText(`n₁ = ${n1.toFixed(2)} (denser medium)`, cx, cy + 40);

        // Interface line
        ctx.beginPath();
        ctx.moveTo(0, cy);
        ctx.lineTo(W, cy);
        ctx.strokeStyle = 'rgba(138,154,91,0.6)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Normal line
        drawRay(cx, cy - 200, cx, cy + 200, 'rgba(254,250,224,0.3)', 1, true);
        ctx.font = '12px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.5)';
        ctx.textAlign = 'left';
        ctx.fillText('normal', cx + 5, cy - 180);

        const rayLen = Math.min(W, H) * 0.4;

        // Incident ray (coming from bottom-left to center)
        const ix = cx - rayLen * Math.sin(incidentAngle);
        const iy = cy + rayLen * Math.cos(incidentAngle);
        drawRay(ix, iy, cx, cy, '#DDA15E', 3, false);
        drawArrow(ix, iy, cx, cy, '#DDA15E');

        // Reflected ray
        const rx = cx + rayLen * Math.sin(incidentAngle);
        const ry = cy + rayLen * Math.cos(incidentAngle);

        const critAngle = getCriticalAngle();
        const isTIR = incidentAngle >= critAngle && n1 > n2;

        // Fresnel reflectance
        let reflectance = 0;
        if (isTIR) {
            reflectance = 1.0;
        } else {
            const refAngle = getRefractedAngle(incidentAngle);
            if (refAngle !== null) {
                const rs = Math.pow((n1 * Math.cos(incidentAngle) - n2 * Math.cos(refAngle)) / (n1 * Math.cos(incidentAngle) + n2 * Math.cos(refAngle)), 2);
                const rp = Math.pow((n2 * Math.cos(incidentAngle) - n1 * Math.cos(refAngle)) / (n2 * Math.cos(incidentAngle) + n1 * Math.cos(refAngle)), 2);
                reflectance = (rs + rp) / 2;
            }
        }

        // Reflected ray
        const reflAlpha = 0.3 + reflectance * 0.7;
        drawRay(cx, cy, rx, ry, `rgba(221,161,94,${reflAlpha})`, 3 * reflectance + 0.5, false);
        if (reflectance > 0.1) drawArrow(cx, cy, rx, ry, `rgba(221,161,94,${reflAlpha})`);

        // Refracted ray (if not TIR)
        if (!isTIR && n1 > n2) {
            const refAngle = getRefractedAngle(incidentAngle);
            if (refAngle !== null) {
                const tx = cx + rayLen * Math.sin(refAngle);
                const ty = cy - rayLen * Math.cos(refAngle);
                const transAlpha = (1 - reflectance) * 0.9;
                drawRay(cx, cy, tx, ty, `rgba(138,154,91,${transAlpha})`, 3 * (1 - reflectance), false);
                drawArrow(cx, cy, tx, ty, `rgba(138,154,91,${transAlpha})`);
            }
        } else if (n1 <= n2) {
            // Always refracts when going rare to dense
            const refAngle = getRefractedAngle(incidentAngle);
            if (refAngle !== null) {
                const tx = cx + rayLen * Math.sin(refAngle);
                const ty = cy - rayLen * Math.cos(refAngle);
                drawRay(cx, cy, tx, ty, `rgba(138,154,91,0.8)`, 2.5, false);
                drawArrow(cx, cy, tx, ty, 'rgba(138,154,91,0.8)');
            }
        }

        // Draw angle arcs
        const arcR = 50;
        // Incident angle arc
        ctx.beginPath();
        ctx.arc(cx, cy, arcR, Math.PI / 2, Math.PI / 2 + incidentAngle, false);
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Critical angle indicator
        if (n1 > n2) {
            ctx.beginPath();
            ctx.arc(cx, cy, arcR + 12, Math.PI / 2, Math.PI / 2 + critAngle, false);
            ctx.strokeStyle = 'rgba(188,108,37,0.5)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // TIR glow effect
        if (isTIR) {
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
            grad.addColorStop(0, 'rgba(221,161,94,0.3)');
            grad.addColorStop(1, 'rgba(221,161,94,0)');
            ctx.beginPath();
            ctx.arc(cx, cy, 60, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
        }

        // Update readouts
        const incDeg = (incidentAngle * 180 / Math.PI).toFixed(1);
        const critDeg = n1 > n2 ? (critAngle * 180 / Math.PI).toFixed(1) : 'N/A';
        incAngleEl.textContent = incDeg;
        critAngleEl.textContent = critDeg;
        statusEl.textContent = isTIR ? 'TOTAL INTERNAL REFLECTION' : `Partial reflection (${(reflectance * 100).toFixed(1)}%)`;
        statusEl.style.color = isTIR ? '#DDA15E' : '#8A9A5B';

        requestAnimationFrame(draw);
    }

    function getAngleFromMouse(mx, my) {
        const dx = mx - cx;
        const dy = my - cy;
        // Only allow angles from bottom half
        if (dy <= 0) return incidentAngle;
        let angle = Math.atan2(Math.abs(dx), dy);
        return Math.max(0.02, Math.min(Math.PI / 2 - 0.02, angle));
    }

    canvas.addEventListener('mousedown', (e) => { dragging = true; incidentAngle = getAngleFromMouse(e.clientX, e.clientY); });
    canvas.addEventListener('mousemove', (e) => { if (dragging) incidentAngle = getAngleFromMouse(e.clientX, e.clientY); });
    canvas.addEventListener('mouseup', () => { dragging = false; });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); dragging = true; const t = e.touches[0]; incidentAngle = getAngleFromMouse(t.clientX, t.clientY); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (dragging) { const t = e.touches[0]; incidentAngle = getAngleFromMouse(t.clientX, t.clientY); } });
    canvas.addEventListener('touchend', () => { dragging = false; });

    window.reset = function() {
        incidentAngle = Math.PI / 4;
        n1 = 1.5; n2 = 1.0;
        n1Slider.value = 1.5; n2Slider.value = 1.0;
        n1ValEl.textContent = '1.50'; n2ValEl.textContent = '1.00';
        presetSel.value = 'glass-air';
    };

    draw();
    </script>
</body>
</html>
