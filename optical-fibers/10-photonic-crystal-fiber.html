<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photonic Crystal Fiber - Optical Fibers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 14px; color: #FEFAE0;
            display: flex; gap: 24px; align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
            border: 1px solid rgba(138,154,91,0.3);
        }
        .controls label { font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .controls input[type=range] { width: 110px; accent-color: #8A9A5B; }
        .controls select { background: #2a2a4e; color: #FEFAE0; border: 1px solid #8A9A5B; border-radius: 6px; padding: 4px 8px; }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,60,0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 260px;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.5;
        }
        .info h3 { color: #8A9A5B; margin-bottom: 6px; }
        .val { color: #DDA15E; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Photonic Crystal Fiber</h3>
        <p>A <span class="val">microstructured</span> fiber with a periodic array of air holes running along its length. Light is confined by a photonic bandgap or modified total internal reflection.</p>
        <p style="margin-top:6px;">Structure: <span class="val" id="structType">Solid core</span></p>
        <p>Rings: <span class="val" id="ringCount">3</span></p>
        <p>Air fill: <span class="val" id="fillFrac">40</span>%</p>
    </div>
    <div class="controls">
        <label>Type
            <select id="fiberType">
                <option value="solid">Solid Core</option>
                <option value="hollow">Hollow Core</option>
            </select>
        </label>
        <label>Hole Rings
            <input type="range" id="rings" min="2" max="6" step="1" value="3">
            <span id="ringsVal">3</span>
        </label>
        <label>Air Fill Fraction
            <input type="range" id="fill" min="0.2" max="0.8" step="0.02" value="0.4">
            <span id="fillVal">0.40</span>
        </label>
        <label>Pitch (&Lambda;)
            <input type="range" id="pitch" min="1.0" max="5.0" step="0.1" value="2.5">
            <span id="pitchVal">2.5</span> &micro;m
        </label>
        <label>Speed
            <input type="range" id="speed" min="0.5" max="4" step="0.25" value="1.5">
            <span id="speedVal">1.5</span>x
        </label>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let fiberType = 'solid', numRings = 3, airFill = 0.4, pitch = 2.5, speed = 1.5;
    let time = 0;

    const fiberTypeSelect = document.getElementById('fiberType');
    const ringsSlider = document.getElementById('rings');
    const fillSlider = document.getElementById('fill');
    const pitchSlider = document.getElementById('pitch');
    const speedSlider = document.getElementById('speed');

    fiberTypeSelect.addEventListener('change', () => { fiberType = fiberTypeSelect.value; document.getElementById('structType').textContent = fiberType === 'solid' ? 'Solid core' : 'Hollow core'; });
    ringsSlider.addEventListener('input', () => { numRings = parseInt(ringsSlider.value); document.getElementById('ringsVal').textContent = numRings; document.getElementById('ringCount').textContent = numRings; });
    fillSlider.addEventListener('input', () => { airFill = parseFloat(fillSlider.value); document.getElementById('fillVal').textContent = airFill.toFixed(2); document.getElementById('fillFrac').textContent = (airFill * 100).toFixed(0); });
    pitchSlider.addEventListener('input', () => { pitch = parseFloat(pitchSlider.value); document.getElementById('pitchVal').textContent = pitch.toFixed(1); });
    speedSlider.addEventListener('input', () => { speed = parseFloat(speedSlider.value); document.getElementById('speedVal').textContent = speed.toFixed(1); });

    function getHexPositions(rings) {
        const positions = [];
        for (let ring = 1; ring <= rings; ring++) {
            for (let i = 0; i < 6; i++) {
                for (let j = 0; j < ring; j++) {
                    const angle1 = (i * 60 + 30) * Math.PI / 180;
                    const angle2 = ((i + 1) * 60 + 30) * Math.PI / 180;
                    const x = ring * Math.cos(angle1) - j * (Math.cos(angle1) - Math.cos(angle2));
                    const y = ring * Math.sin(angle1) - j * (Math.sin(angle1) - Math.sin(angle2));
                    positions.push({ x, y });
                }
            }
        }
        return positions;
    }

    // Mode field photons
    const modePhotons = [];
    for (let i = 0; i < 60; i++) {
        const angle = Math.random() * Math.PI * 2;
        const r = Math.random() * 0.5;
        modePhotons.push({
            x: r * Math.cos(angle),
            y: r * Math.sin(angle),
            vx: (Math.random() - 0.5) * 0.01,
            vy: (Math.random() - 0.5) * 0.01,
            brightness: 0.3 + Math.random() * 0.7
        });
    }

    function draw() {
        time += 0.016 * speed;
        ctx.clearRect(0, 0, W, H);

        // Cross section view (left half)
        const crossX = W * 0.28;
        const crossY = H * 0.45;
        const scale = Math.min(W * 0.2, H * 0.3) / (numRings + 1.5);
        const holeRadius = scale * airFill * 0.5;

        // Title
        ctx.font = '16px Georgia';
        ctx.fillStyle = '#FEFAE0';
        ctx.textAlign = 'center';
        ctx.fillText('Photonic Crystal Fiber', W / 2, 30);

        ctx.font = '14px Georgia';
        ctx.fillStyle = '#8A9A5B';
        ctx.fillText('Cross Section', crossX, crossY - scale * (numRings + 1.5) - 10);

        // Outer cladding circle
        const outerR = scale * (numRings + 1.2);
        ctx.beginPath();
        ctx.arc(crossX, crossY, outerR, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(70, 90, 150, 0.25)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(96,108,56,0.5)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Draw air holes
        const positions = getHexPositions(numRings);
        positions.forEach(pos => {
            const hx = crossX + pos.x * scale;
            const hy = crossY + pos.y * scale;

            ctx.beginPath();
            ctx.arc(hx, hy, holeRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(20, 25, 50, 0.8)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(100, 130, 200, 0.3)';
            ctx.lineWidth = 0.5;
            ctx.stroke();
        });

        // Core region
        if (fiberType === 'hollow') {
            // Missing center hole is larger (hollow core)
            ctx.beginPath();
            ctx.arc(crossX, crossY, scale * 0.7, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(20, 25, 50, 0.8)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(100, 130, 200, 0.3)';
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        // Mode field (glowing center)
        const modeR = fiberType === 'solid' ? scale * 0.6 : scale * 0.5;
        const modeGrad = ctx.createRadialGradient(crossX, crossY, 0, crossX, crossY, modeR);
        if (fiberType === 'solid') {
            modeGrad.addColorStop(0, `rgba(221, 161, 94, ${0.5 + 0.2 * Math.sin(time * 2)})`);
            modeGrad.addColorStop(0.5, 'rgba(221, 161, 94, 0.15)');
            modeGrad.addColorStop(1, 'rgba(221, 161, 94, 0)');
        } else {
            modeGrad.addColorStop(0, `rgba(138, 154, 91, ${0.4 + 0.2 * Math.sin(time * 2)})`);
            modeGrad.addColorStop(0.6, 'rgba(138, 154, 91, 0.1)');
            modeGrad.addColorStop(1, 'rgba(138, 154, 91, 0)');
        }
        ctx.beginPath();
        ctx.arc(crossX, crossY, modeR, 0, Math.PI * 2);
        ctx.fillStyle = modeGrad;
        ctx.fill();

        // Animate mode field photons
        modePhotons.forEach(p => {
            p.x += p.vx * speed;
            p.y += p.vy * speed;

            // Keep in core region
            const dist = Math.sqrt(p.x * p.x + p.y * p.y);
            if (dist > 0.4) {
                p.vx -= p.x * 0.005;
                p.vy -= p.y * 0.005;
            }
            p.vx += (Math.random() - 0.5) * 0.002;
            p.vy += (Math.random() - 0.5) * 0.002;

            const px = crossX + p.x * modeR;
            const py = crossY + p.y * modeR;
            const alpha = p.brightness * (0.5 + 0.5 * Math.sin(time * 3 + p.x * 10));

            ctx.beginPath();
            ctx.arc(px, py, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = fiberType === 'solid' ? `rgba(221, 161, 94, ${alpha})` : `rgba(138, 154, 91, ${alpha})`;
            ctx.fill();
        });

        // Pitch annotation
        if (positions.length >= 2) {
            const p1x = crossX + positions[0].x * scale;
            const p1y = crossY + positions[0].y * scale;
            const p2x = crossX + positions[1].x * scale;
            const p2y = crossY + positions[1].y * scale;

            ctx.beginPath();
            ctx.moveTo(p1x, p1y);
            ctx.lineTo(p2x, p2y);
            ctx.strokeStyle = '#DDA15E';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.font = '10px Georgia';
            ctx.fillStyle = '#DDA15E';
            ctx.textAlign = 'center';
            ctx.fillText(`Λ = ${pitch.toFixed(1)} μm`, (p1x + p2x) / 2, (p1y + p2y) / 2 - 8);
        }

        // Labels
        ctx.font = '11px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.5)';
        ctx.textAlign = 'left';
        ctx.fillText('Silica', crossX + outerR * 0.6, crossY - outerR * 0.6);
        ctx.fillText('Air holes', crossX + scale * 1.5, crossY + scale * 0.3);
        ctx.fillText(fiberType === 'solid' ? 'Solid core' : 'Hollow core', crossX - 25, crossY + outerR + 20);

        // Side view (right half) - propagation along fiber
        const sideX = W * 0.55;
        const sideEnd = W * 0.95;
        const sideY = H * 0.45;
        const sideH = outerR;
        const sideLen = sideEnd - sideX;

        ctx.font = '14px Georgia';
        ctx.fillStyle = '#8A9A5B';
        ctx.textAlign = 'center';
        ctx.fillText('Side View — Light Propagation', (sideX + sideEnd) / 2, sideY - sideH - 20);

        // Fiber body
        ctx.fillStyle = 'rgba(60, 80, 140, 0.25)';
        ctx.fillRect(sideX, sideY - sideH, sideLen, sideH * 2);
        ctx.strokeStyle = 'rgba(96,108,56,0.5)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(sideX, sideY - sideH, sideLen, sideH * 2);

        // Hole rows (side view as horizontal stripes)
        const coreH = sideH * 0.3;
        for (let r = 1; r <= numRings; r++) {
            const yUp = sideY - coreH - (r - 0.5) * (sideH - coreH) / numRings;
            const yDown = sideY + coreH + (r - 0.5) * (sideH - coreH) / numRings;

            // Multiple holes along length
            const numHolesPerRow = Math.floor(sideLen / (holeRadius * 3));
            for (let h = 0; h < numHolesPerRow; h++) {
                const hx = sideX + (h + 0.5) / numHolesPerRow * sideLen;
                const hr = holeRadius * 0.4;
                ctx.beginPath();
                ctx.ellipse(hx, yUp, hr, hr * 0.5, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(20, 25, 50, 0.5)';
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(hx, yDown, hr, hr * 0.5, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(20, 25, 50, 0.5)';
                ctx.fill();
            }
        }

        // Core region highlight
        const coreGrad = ctx.createLinearGradient(0, sideY - coreH, 0, sideY + coreH);
        coreGrad.addColorStop(0, 'rgba(100, 140, 200, 0.15)');
        coreGrad.addColorStop(0.5, 'rgba(120, 160, 220, 0.25)');
        coreGrad.addColorStop(1, 'rgba(100, 140, 200, 0.15)');
        ctx.fillStyle = coreGrad;
        ctx.fillRect(sideX, sideY - coreH, sideLen, coreH * 2);

        // Animated light propagation
        const numSidePhotons = 15;
        for (let i = 0; i < numSidePhotons; i++) {
            const phase = ((time * 0.5 + i * 0.12) % 1);
            const px = sideX + phase * sideLen;
            const py = sideY + Math.sin(time * 2 + i * 1.5) * coreH * 0.6;
            const alpha = 0.5 + 0.5 * Math.sin(time * 4 + i * 2);

            const color = fiberType === 'solid' ? `rgba(221, 161, 94, ${alpha * 0.7})` : `rgba(138, 154, 91, ${alpha * 0.7})`;
            ctx.beginPath();
            ctx.arc(px, py, 3, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();

            // Trail
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(px - 15, py);
            ctx.strokeStyle = color.replace(String(alpha * 0.7), String(alpha * 0.2));
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        // Properties comparison
        const propY = H * 0.82;
        ctx.font = '12px Georgia';
        ctx.textAlign = 'center';

        const props = [
            ['Property', 'Conventional Fiber', 'Photonic Crystal Fiber'],
            ['Guidance', 'Total Internal Reflection', fiberType === 'solid' ? 'Modified TIR' : 'Photonic Bandgap'],
            ['Single-mode', 'Only at specific λ', 'Endlessly single-mode'],
            ['Dispersion', 'Material-limited', 'Highly engineerable'],
            ['Nonlinearity', 'Standard', fiberType === 'hollow' ? 'Very low (air core)' : 'Enhanced (small core)']
        ];

        const colW = W * 0.28;
        const colStart = [W * 0.17, W * 0.5, W * 0.83];

        props.forEach((row, ri) => {
            row.forEach((cell, ci) => {
                ctx.fillStyle = ri === 0 ? '#8A9A5B' : 'rgba(254,250,224,0.6)';
                ctx.font = ri === 0 ? 'bold 12px Georgia' : '11px Georgia';
                ctx.fillText(cell, colStart[ci], propY + ri * 18);
            });
        });

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        fiberType = 'solid'; numRings = 3; airFill = 0.4; pitch = 2.5; speed = 1.5; time = 0;
        fiberTypeSelect.value = 'solid'; ringsSlider.value = 3; fillSlider.value = 0.4; pitchSlider.value = 2.5; speedSlider.value = 1.5;
        document.getElementById('ringsVal').textContent = '3';
        document.getElementById('fillVal').textContent = '0.40';
        document.getElementById('pitchVal').textContent = '2.5';
        document.getElementById('speedVal').textContent = '1.5';
        document.getElementById('structType').textContent = 'Solid core';
        document.getElementById('ringCount').textContent = '3';
        document.getElementById('fillFrac').textContent = '40';
    };

    draw();
    </script>
</body>
</html>
