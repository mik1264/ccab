<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerical Aperture & Acceptance Cone - Optical Fibers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 14px; color: #FEFAE0;
            display: flex; gap: 24px; align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
            border: 1px solid rgba(138,154,91,0.3);
        }
        .controls label { font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .controls input[type=range] { width: 110px; accent-color: #8A9A5B; }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,60,0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 260px;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.5;
        }
        .info h3 { color: #8A9A5B; margin-bottom: 6px; font-size: 0.95rem; }
        .val { color: #DDA15E; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Numerical Aperture</h3>
        <p>The <span class="val">acceptance cone</span> shows the range of angles at which light can enter the fiber and be guided by total internal reflection.</p>
        <p style="margin-top:8px;">NA = <span class="val" id="naVal">0.30</span></p>
        <p>Acceptance angle: <span class="val" id="accAngle">17.5</span>&deg;</p>
        <p>n<sub>core</sub>: <span class="val" id="ncoreDisp">1.48</span></p>
        <p>n<sub>clad</sub>: <span class="val" id="ncladDisp">1.45</span></p>
    </div>
    <div class="controls">
        <label>Core Index (n<sub>core</sub>)
            <input type="range" id="ncore" min="1.40" max="1.60" step="0.001" value="1.480">
            <span id="ncoreVal">1.480</span>
        </label>
        <label>Cladding Index (n<sub>clad</sub>)
            <input type="range" id="nclad" min="1.38" max="1.58" step="0.001" value="1.450">
            <span id="ncladVal">1.450</span>
        </label>
        <label>Rays
            <input type="range" id="numRays" min="3" max="20" step="1" value="9">
            <span id="numRaysVal">9</span>
        </label>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let nCore = 1.48, nClad = 1.45, numRays = 9;
    let time = 0;

    const ncoreSlider = document.getElementById('ncore');
    const ncladSlider = document.getElementById('nclad');
    const numRaysSlider = document.getElementById('numRays');

    ncoreSlider.addEventListener('input', () => { nCore = parseFloat(ncoreSlider.value); document.getElementById('ncoreVal').textContent = nCore.toFixed(3); });
    ncladSlider.addEventListener('input', () => { nClad = parseFloat(ncladSlider.value); document.getElementById('ncladVal').textContent = nClad.toFixed(3); });
    numRaysSlider.addEventListener('input', () => { numRays = parseInt(numRaysSlider.value); document.getElementById('numRaysVal').textContent = numRays; });

    function getNA() {
        const diff = nCore * nCore - nClad * nClad;
        return diff > 0 ? Math.sqrt(diff) : 0;
    }

    function getAcceptanceAngle() {
        const na = getNA();
        return na <= 1 ? Math.asin(na) : Math.PI / 2;
    }

    function draw() {
        time += 0.016;
        ctx.clearRect(0, 0, W, H);

        const na = getNA();
        const accAngle = getAcceptanceAngle();
        const fiberLen = W * 0.6;
        const fiberH = H * 0.15;
        const fiberX = W * 0.25;
        const fiberY = H / 2;

        // Draw fiber cross-section (side view)
        // Cladding
        ctx.fillStyle = 'rgba(60, 80, 140, 0.3)';
        ctx.fillRect(fiberX, fiberY - fiberH, fiberLen, fiberH * 2);

        // Core
        const coreH = fiberH * 0.6;
        ctx.fillStyle = 'rgba(100, 140, 200, 0.4)';
        ctx.fillRect(fiberX, fiberY - coreH, fiberLen, coreH * 2);

        // Core/cladding boundary
        ctx.strokeStyle = 'rgba(138,154,91,0.5)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(fiberX, fiberY - coreH); ctx.lineTo(fiberX + fiberLen, fiberY - coreH);
        ctx.moveTo(fiberX, fiberY + coreH); ctx.lineTo(fiberX + fiberLen, fiberY + coreH);
        ctx.stroke();
        ctx.setLineDash([]);

        // Outer boundary
        ctx.strokeStyle = 'rgba(96,108,56,0.6)';
        ctx.lineWidth = 2;
        ctx.strokeRect(fiberX, fiberY - fiberH, fiberLen, fiberH * 2);

        // Labels
        ctx.font = '13px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.6)';
        ctx.textAlign = 'center';
        ctx.fillText('Core', fiberX + fiberLen / 2, fiberY + 5);
        ctx.fillText('Cladding', fiberX + fiberLen / 2, fiberY - coreH - 10);
        ctx.fillText('Cladding', fiberX + fiberLen / 2, fiberY + coreH + 20);

        // Draw acceptance cone
        const coneLen = W * 0.18;
        const coneHalf = coneLen * Math.tan(accAngle);

        ctx.beginPath();
        ctx.moveTo(fiberX, fiberY);
        ctx.lineTo(fiberX - coneLen, fiberY - coneHalf);
        ctx.lineTo(fiberX - coneLen, fiberY + coneHalf);
        ctx.closePath();
        const coneGrad = ctx.createLinearGradient(fiberX - coneLen, 0, fiberX, 0);
        coneGrad.addColorStop(0, 'rgba(221,161,94,0.05)');
        coneGrad.addColorStop(1, 'rgba(221,161,94,0.2)');
        ctx.fillStyle = coneGrad;
        ctx.fill();
        ctx.strokeStyle = 'rgba(221,161,94,0.6)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Acceptance angle arc
        ctx.beginPath();
        ctx.arc(fiberX, fiberY, 40, Math.PI - accAngle, Math.PI + accAngle);
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Label the angle
        ctx.font = '12px Georgia';
        ctx.fillStyle = '#DDA15E';
        ctx.textAlign = 'left';
        ctx.fillText(`θ = ${(accAngle * 180 / Math.PI).toFixed(1)}°`, fiberX - coneLen + 10, fiberY - coneHalf - 8);

        // Draw rays entering fiber
        for (let i = 0; i < numRays; i++) {
            const frac = (i / (numRays - 1)) - 0.5; // -0.5 to 0.5
            const rayAngle = frac * accAngle * 2.2; // Some rays outside cone
            const isAccepted = Math.abs(rayAngle) <= accAngle;

            const startX = fiberX - coneLen * 0.8;
            const startY = fiberY + coneLen * 0.8 * Math.tan(rayAngle);
            const enterY = fiberY;
            const enterX = fiberX;

            // Animate photon along ray
            const photonPhase = (time * 0.5 + i * 0.3) % 2;

            if (isAccepted) {
                // Draw incoming ray
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(enterX, enterY);
                ctx.strokeStyle = 'rgba(138,154,91,0.7)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Propagate inside fiber with bouncing
                const internalAngle = Math.asin(Math.sin(Math.abs(rayAngle)) / nCore) || 0;
                const bounceAngle = Math.atan2(coreH, fiberLen * 0.15);
                let bx = enterX, by = enterY;
                let dir = rayAngle > 0 ? -1 : 1;
                const segments = 8;
                const segLen = fiberLen / segments;

                ctx.beginPath();
                ctx.moveTo(bx, by);
                for (let s = 0; s < segments; s++) {
                    const nx = bx + segLen;
                    let ny = by + dir * segLen * Math.tan(internalAngle);
                    if (ny < fiberY - coreH) { ny = fiberY - coreH; dir = 1; }
                    if (ny > fiberY + coreH) { ny = fiberY + coreH; dir = -1; }
                    ctx.lineTo(nx, ny);
                    bx = nx; by = ny;
                }
                ctx.strokeStyle = 'rgba(138,154,91,0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Photon dot
                if (photonPhase < 1) {
                    const px = enterX + photonPhase * fiberLen;
                    const py = fiberY + Math.sin(photonPhase * Math.PI * 4 + i) * coreH * 0.8 * Math.abs(frac);
                    ctx.beginPath();
                    ctx.arc(px, py, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#8A9A5B';
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(px, py, 8, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(138,154,91,0.3)';
                    ctx.fill();
                }
            } else {
                // Rejected ray - leaks out
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(enterX, enterY);
                ctx.strokeStyle = 'rgba(188,108,37,0.4)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);

                // Ray leaks through cladding
                const leakX = enterX + fiberLen * 0.3;
                const leakY = rayAngle > 0 ? fiberY + fiberH + 30 : fiberY - fiberH - 30;
                ctx.beginPath();
                ctx.moveTo(enterX, enterY);
                ctx.lineTo(leakX, leakY);
                ctx.strokeStyle = 'rgba(188,108,37,0.2)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        // Update displays
        document.getElementById('naVal').textContent = na.toFixed(3);
        document.getElementById('accAngle').textContent = (accAngle * 180 / Math.PI).toFixed(1);
        document.getElementById('ncoreDisp').textContent = nCore.toFixed(3);
        document.getElementById('ncladDisp').textContent = nClad.toFixed(3);

        // Formula display
        ctx.font = '14px Georgia';
        ctx.fillStyle = '#FEFAE0';
        ctx.textAlign = 'center';
        ctx.fillText(`NA = √(n²core - n²clad) = √(${(nCore*nCore).toFixed(4)} - ${(nClad*nClad).toFixed(4)}) = ${na.toFixed(3)}`, W / 2, H - 100);

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        nCore = 1.48; nClad = 1.45; numRays = 9; time = 0;
        ncoreSlider.value = 1.48; ncladSlider.value = 1.45; numRaysSlider.value = 9;
        document.getElementById('ncoreVal').textContent = '1.480';
        document.getElementById('ncladVal').textContent = '1.450';
        document.getElementById('numRaysVal').textContent = '9';
    };

    draw();
    </script>
</body>
</html>
