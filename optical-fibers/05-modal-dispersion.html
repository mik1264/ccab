<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Dispersion - Optical Fibers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 14px; color: #FEFAE0;
            display: flex; gap: 24px; align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
            border: 1px solid rgba(138,154,91,0.3);
        }
        .controls label { font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .controls input[type=range] { width: 110px; accent-color: #8A9A5B; }
        .controls button {
            background: rgba(138,154,91,0.3); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: Georgia;
        }
        .controls button:hover { background: rgba(138,154,91,0.5); }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,60,0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 260px;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.5;
        }
        .info h3 { color: #8A9A5B; margin-bottom: 6px; }
        .val { color: #DDA15E; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Modal Dispersion</h3>
        <p>Different modes travel different path lengths. A sharp input pulse <span class="val">broadens</span> as higher-order modes arrive later.</p>
        <p style="margin-top:6px;">Pulse spread: <span class="val" id="spread">0.0</span> ns/km</p>
        <p>Fiber length: <span class="val" id="fiberLen">1.0</span> km</p>
    </div>
    <div class="controls">
        <label>Fiber Length (km)
            <input type="range" id="length" min="0.1" max="5" step="0.1" value="1.0">
            <span id="lengthVal">1.0</span>
        </label>
        <label>Number of Modes
            <input type="range" id="modes" min="2" max="10" step="1" value="5">
            <span id="modesVal">5</span>
        </label>
        <label>Speed
            <input type="range" id="speed" min="0.5" max="4" step="0.25" value="1.5">
            <span id="speedVal">1.5</span>x
        </label>
        <button id="pulseBtn">Send Pulse</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let fiberLength = 1.0, numModes = 5, speed = 1.5;
    let pulses = [];
    let time = 0;

    const lengthSlider = document.getElementById('length');
    const modesSlider = document.getElementById('modes');
    const speedSlider = document.getElementById('speed');

    lengthSlider.addEventListener('input', () => { fiberLength = parseFloat(lengthSlider.value); document.getElementById('lengthVal').textContent = fiberLength.toFixed(1); document.getElementById('fiberLen').textContent = fiberLength.toFixed(1); });
    modesSlider.addEventListener('input', () => { numModes = parseInt(modesSlider.value); document.getElementById('modesVal').textContent = numModes; });
    speedSlider.addEventListener('input', () => { speed = parseFloat(speedSlider.value); document.getElementById('speedVal').textContent = speed.toFixed(1); });

    function sendPulse() {
        const modes = [];
        for (let m = 0; m < numModes; m++) {
            const angle = (m / numModes) * 15 * Math.PI / 180;
            const pathLength = 1.0 / Math.cos(angle);
            const delay = (pathLength - 1.0) * fiberLength * 5; // ns delay
            modes.push({
                angle,
                pathLength,
                delay,
                amplitude: fiberLength > 0 ? 0.2 + 0.05 * m : 0.2,
                hue: 80 + m * 25
            });
        }
        pulses.push({
            modes,
            progress: 0,
            startTime: time
        });
    }

    document.getElementById('pulseBtn').addEventListener('click', sendPulse);
    sendPulse();

    function draw() {
        time += 0.016 * speed;
        ctx.clearRect(0, 0, W, H);

        const fiberH = H * 0.12;
        const fiberY = H * 0.35;
        const fiberX = W * 0.08;
        const fiberEnd = W * 0.92;
        const fiberW = fiberEnd - fiberX;

        // Section: Fiber with modes
        ctx.font = '14px Georgia';
        ctx.fillStyle = '#8A9A5B';
        ctx.textAlign = 'left';
        ctx.fillText('Multimode Fiber — Ray Paths', fiberX, fiberY - fiberH - 15);

        // Fiber body
        ctx.fillStyle = 'rgba(50, 70, 130, 0.3)';
        ctx.fillRect(fiberX, fiberY - fiberH, fiberW, fiberH * 2);
        ctx.strokeStyle = 'rgba(96,108,56,0.6)';
        ctx.lineWidth = 2;
        ctx.strokeRect(fiberX, fiberY - fiberH, fiberW, fiberH * 2);

        // Input pulse shape (left side)
        ctx.font = '11px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.5)';
        ctx.textAlign = 'center';
        ctx.fillText('Input Pulse', fiberX - 5, fiberY - fiberH - 5);

        // Draw narrow input pulse
        const pulseH = fiberH * 1.5;
        ctx.beginPath();
        for (let y = -pulseH; y <= pulseH; y++) {
            const val = Math.exp(-y * y / (pulseH * 0.1 * pulseH * 0.1));
            ctx.lineTo(fiberX - 10 - val * 25, fiberY + y);
        }
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Process active pulses
        for (const pulse of pulses) {
            const elapsed = time - pulse.startTime;
            const duration = 3 + fiberLength;

            for (let m = 0; m < pulse.modes.length; m++) {
                const mode = pulse.modes[m];
                const modeProgress = Math.min((elapsed - mode.delay * 0.1) / duration, 1);
                if (modeProgress < 0) continue;

                const amp = fiberH * (0.1 + (m / pulse.modes.length) * 0.8);
                const freq = 2 + m * 0.8;
                const color = `hsla(${mode.hue}, 60%, 60%, 0.6)`;

                // Draw mode path in fiber
                ctx.beginPath();
                const drawEnd = fiberX + modeProgress * fiberW;
                for (let x = fiberX; x <= drawEnd; x += 3) {
                    const t = (x - fiberX) / fiberW;
                    const py = fiberY + amp * Math.sin(freq * Math.PI * t);
                    if (x === fiberX) ctx.moveTo(x, py);
                    else ctx.lineTo(x, py);
                }
                ctx.strokeStyle = color;
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Photon
                if (modeProgress > 0 && modeProgress < 1) {
                    const px = fiberX + modeProgress * fiberW;
                    const py = fiberY + amp * Math.sin(freq * Math.PI * modeProgress);
                    ctx.beginPath();
                    ctx.arc(px, py, 4, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${mode.hue}, 70%, 70%, 0.9)`;
                    ctx.fill();
                }
            }
        }

        // Section: Output pulse comparison
        const outY = H * 0.72;
        ctx.font = '14px Georgia';
        ctx.fillStyle = '#8A9A5B';
        ctx.textAlign = 'left';
        ctx.fillText('Pulse Shape — Input vs Output', W * 0.08, outY - H * 0.13);

        // Axes
        const graphX = W * 0.08;
        const graphW = W * 0.84;
        const graphH = H * 0.2;

        ctx.strokeStyle = 'rgba(254,250,224,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(graphX, outY);
        ctx.lineTo(graphX + graphW, outY);
        ctx.moveTo(graphX, outY - graphH);
        ctx.lineTo(graphX, outY + 10);
        ctx.stroke();

        ctx.font = '11px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.4)';
        ctx.textAlign = 'center';
        ctx.fillText('Time →', graphX + graphW / 2, outY + 25);
        ctx.save();
        ctx.translate(graphX - 15, outY - graphH / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText('Intensity', 0, 0);
        ctx.restore();

        // Input pulse (narrow Gaussian)
        ctx.beginPath();
        const inputCenter = graphX + graphW * 0.2;
        const inputSigma = graphW * 0.015;
        for (let x = graphX; x < graphX + graphW; x++) {
            const dx = x - inputCenter;
            const val = Math.exp(-dx * dx / (2 * inputSigma * inputSigma));
            const py = outY - val * graphH * 0.9;
            if (x === graphX) ctx.moveTo(x, py);
            else ctx.lineTo(x, py);
        }
        ctx.strokeStyle = '#8A9A5B';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Output pulse (broadened Gaussian)
        const spreadFactor = 1 + fiberLength * numModes * 0.3;
        const outputCenter = graphX + graphW * 0.6;
        const outputSigma = inputSigma * spreadFactor;

        ctx.beginPath();
        for (let x = graphX; x < graphX + graphW; x++) {
            const dx = x - outputCenter;
            const val = Math.exp(-dx * dx / (2 * outputSigma * outputSigma)) / Math.sqrt(spreadFactor);
            const py = outY - val * graphH * 0.9;
            if (x === graphX) ctx.moveTo(x, py);
            else ctx.lineTo(x, py);
        }
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Individual mode arrivals (small ticks)
        for (let m = 0; m < numModes; m++) {
            const angle = (m / numModes) * 15 * Math.PI / 180;
            const delay = (1.0 / Math.cos(angle) - 1.0) * fiberLength;
            const tickX = outputCenter - outputSigma * 1.5 + delay * outputSigma * 3;
            ctx.beginPath();
            ctx.moveTo(tickX, outY + 3);
            ctx.lineTo(tickX, outY + 10);
            ctx.strokeStyle = `hsla(${80 + m * 25}, 60%, 60%, 0.5)`;
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // Legend
        ctx.font = '12px Georgia';
        ctx.fillStyle = '#8A9A5B';
        ctx.textAlign = 'left';
        ctx.fillText('— Input pulse', graphX + graphW * 0.75, outY - graphH + 15);
        ctx.fillStyle = '#DDA15E';
        ctx.fillText('— Output pulse (dispersed)', graphX + graphW * 0.75, outY - graphH + 32);

        // Update spread display
        const dispersionNs = (fiberLength * numModes * 0.5).toFixed(1);
        document.getElementById('spread').textContent = dispersionNs;

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        fiberLength = 1.0; numModes = 5; speed = 1.5; time = 0; pulses = [];
        lengthSlider.value = 1.0; modesSlider.value = 5; speedSlider.value = 1.5;
        document.getElementById('lengthVal').textContent = '1.0';
        document.getElementById('modesVal').textContent = '5';
        document.getElementById('speedVal').textContent = '1.5';
        document.getElementById('fiberLen').textContent = '1.0';
        sendPulse();
    };

    draw();
    </script>
</body>
</html>
