<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step-Index Fiber Propagation - Optical Fibers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 14px; color: #FEFAE0;
            display: flex; gap: 24px; align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
            border: 1px solid rgba(138,154,91,0.3);
        }
        .controls label { font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .controls input[type=range] { width: 110px; accent-color: #8A9A5B; }
        .controls button {
            background: rgba(138,154,91,0.3); color: #FEFAE0; border: 1px solid #8A9A5B;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: Georgia;
        }
        .controls button:hover { background: rgba(138,154,91,0.5); }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,60,0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 240px;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.5;
        }
        .info h3 { color: #8A9A5B; margin-bottom: 6px; }
        .val { color: #DDA15E; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Step-Index Fiber</h3>
        <p>Light rays bounce through the fiber core via <span class="val">total internal reflection</span> at the core-cladding boundary.</p>
        <p style="margin-top:6px;">The step index profile has a sharp boundary between core and cladding refractive indices.</p>
        <p style="margin-top:6px;">Bounces: <span class="val" id="bounces">0</span></p>
    </div>
    <div class="controls">
        <label>Launch Angle
            <input type="range" id="angle" min="1" max="25" step="0.5" value="10">
            <span id="angleVal">10.0</span>&deg;
        </label>
        <label>Core Diameter
            <input type="range" id="coreSize" min="20" max="80" step="1" value="50">
            <span id="coreSizeVal">50</span>&micro;m
        </label>
        <label>Speed
            <input type="range" id="speed" min="0.5" max="5" step="0.25" value="2">
            <span id="speedVal">2.0</span>x
        </label>
        <button id="launchBtn">Launch Ray</button>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let launchAngle = 10;
    let coreDiamFrac = 0.5;
    let speed = 2;
    let rays = [];
    let time = 0;

    const angleSlider = document.getElementById('angle');
    const coreSizeSlider = document.getElementById('coreSize');
    const speedSlider = document.getElementById('speed');

    angleSlider.addEventListener('input', () => { launchAngle = parseFloat(angleSlider.value); document.getElementById('angleVal').textContent = launchAngle.toFixed(1); });
    coreSizeSlider.addEventListener('input', () => { coreDiamFrac = parseInt(coreSizeSlider.value) / 100; document.getElementById('coreSizeVal').textContent = parseInt(coreSizeSlider.value); });
    speedSlider.addEventListener('input', () => { speed = parseFloat(speedSlider.value); document.getElementById('speedVal').textContent = speed.toFixed(1); });

    function launchRay() {
        const fiberH = H * 0.25;
        const coreH = fiberH * coreDiamFrac;
        const fiberY = H / 2;
        const fiberX = W * 0.08;
        const fiberEnd = W * 0.92;
        const rad = launchAngle * Math.PI / 180;

        // Compute bounce path
        const path = [];
        let x = fiberX, y = fiberY;
        let dx = Math.cos(rad);
        let dy = Math.sin(rad) * (Math.random() > 0.5 ? 1 : -1);
        let bounces = 0;

        path.push({ x, y });

        while (x < fiberEnd) {
            // How far to next boundary?
            const topDist = (fiberY - coreH) - y;
            const botDist = (fiberY + coreH) - y;
            let tTop = dy < 0 ? topDist / dy : Infinity;
            let tBot = dy > 0 ? botDist / dy : Infinity;

            if (tTop < 0) tTop = Infinity;
            if (tBot < 0) tBot = Infinity;

            const t = Math.min(tTop, tBot);
            const tEnd = (fiberEnd - x) / dx;

            if (tEnd < t) {
                x = fiberEnd;
                y = y + dy * tEnd;
                path.push({ x, y });
                break;
            }

            x += dx * t;
            y += dy * t;
            path.push({ x, y });
            dy = -dy;
            bounces++;

            if (bounces > 500) break;
        }

        const hue = 30 + Math.random() * 100;
        rays.push({
            path,
            bounces,
            progress: 0,
            hue,
            photons: []
        });
    }

    document.getElementById('launchBtn').addEventListener('click', launchRay);

    // Initial ray
    launchRay();

    function draw() {
        time += 0.016 * speed;
        ctx.clearRect(0, 0, W, H);

        const fiberH = H * 0.25;
        const coreH = fiberH * coreDiamFrac;
        const fiberY = H / 2;
        const fiberX = W * 0.08;
        const fiberEnd = W * 0.92;
        const fiberLen = fiberEnd - fiberX;

        // Draw refractive index profile on the left
        const profileW = W * 0.05;
        const profileX = 10;
        const profileTop = fiberY - fiberH - 20;
        const profileBot = fiberY + fiberH + 20;

        ctx.strokeStyle = 'rgba(254,250,224,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(profileX, profileTop);
        ctx.lineTo(profileX, profileBot);
        ctx.moveTo(profileX, fiberY);
        ctx.lineTo(profileX + profileW, fiberY);
        ctx.stroke();

        // Step profile
        ctx.beginPath();
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        ctx.moveTo(profileX + profileW * 0.3, profileTop);
        ctx.lineTo(profileX + profileW * 0.3, fiberY - coreH);
        ctx.lineTo(profileX + profileW * 0.8, fiberY - coreH);
        ctx.lineTo(profileX + profileW * 0.8, fiberY + coreH);
        ctx.lineTo(profileX + profileW * 0.3, fiberY + coreH);
        ctx.lineTo(profileX + profileW * 0.3, profileBot);
        ctx.stroke();

        ctx.font = '10px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.5)';
        ctx.textAlign = 'center';
        ctx.fillText('n(r)', profileX + profileW / 2, profileTop - 5);

        // Fiber structure
        // Cladding
        const cladGrad = ctx.createLinearGradient(0, fiberY - fiberH, 0, fiberY + fiberH);
        cladGrad.addColorStop(0, 'rgba(40, 50, 90, 0.5)');
        cladGrad.addColorStop(0.5, 'rgba(50, 65, 110, 0.5)');
        cladGrad.addColorStop(1, 'rgba(40, 50, 90, 0.5)');
        ctx.fillStyle = cladGrad;
        ctx.fillRect(fiberX, fiberY - fiberH, fiberLen, fiberH * 2);

        // Core
        const coreGrad = ctx.createLinearGradient(0, fiberY - coreH, 0, fiberY + coreH);
        coreGrad.addColorStop(0, 'rgba(80, 110, 180, 0.35)');
        coreGrad.addColorStop(0.5, 'rgba(100, 140, 210, 0.4)');
        coreGrad.addColorStop(1, 'rgba(80, 110, 180, 0.35)');
        ctx.fillStyle = coreGrad;
        ctx.fillRect(fiberX, fiberY - coreH, fiberLen, coreH * 2);

        // Boundaries
        ctx.strokeStyle = 'rgba(138,154,91,0.6)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(fiberX, fiberY - coreH); ctx.lineTo(fiberEnd, fiberY - coreH);
        ctx.moveTo(fiberX, fiberY + coreH); ctx.lineTo(fiberEnd, fiberY + coreH);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(96,108,56,0.8)';
        ctx.lineWidth = 2;
        ctx.strokeRect(fiberX, fiberY - fiberH, fiberLen, fiberH * 2);

        // Labels
        ctx.font = '13px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.5)';
        ctx.textAlign = 'left';
        ctx.fillText('Cladding (n₂)', fiberEnd + 8, fiberY - coreH - 15);
        ctx.fillText('Core (n₁)', fiberEnd + 8, fiberY + 4);
        ctx.fillText('Cladding (n₂)', fiberEnd + 8, fiberY + coreH + 20);

        // Draw rays
        let totalBounces = 0;
        for (const ray of rays) {
            ray.progress = Math.min(ray.progress + 0.003 * speed, 1);
            totalBounces = Math.max(totalBounces, ray.bounces);

            const totalLen = ray.path.reduce((sum, p, i) => {
                if (i === 0) return 0;
                const prev = ray.path[i - 1];
                return sum + Math.sqrt((p.x - prev.x) ** 2 + (p.y - prev.y) ** 2);
            }, 0);

            const drawLen = totalLen * ray.progress;
            let accumulated = 0;

            ctx.beginPath();
            ctx.moveTo(ray.path[0].x, ray.path[0].y);

            for (let i = 1; i < ray.path.length; i++) {
                const prev = ray.path[i - 1];
                const segLen = Math.sqrt((ray.path[i].x - prev.x) ** 2 + (ray.path[i].y - prev.y) ** 2);

                if (accumulated + segLen <= drawLen) {
                    ctx.lineTo(ray.path[i].x, ray.path[i].y);
                    accumulated += segLen;
                } else {
                    const remain = drawLen - accumulated;
                    const frac = remain / segLen;
                    const endX = prev.x + (ray.path[i].x - prev.x) * frac;
                    const endY = prev.y + (ray.path[i].y - prev.y) * frac;
                    ctx.lineTo(endX, endY);

                    // Photon at tip
                    ctx.beginPath();
                    ctx.arc(endX, endY, 5, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${ray.hue}, 70%, 65%, 0.9)`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(endX, endY, 12, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${ray.hue}, 70%, 65%, 0.2)`;
                    ctx.fill();
                    break;
                }
            }

            ctx.strokeStyle = `hsla(${ray.hue}, 60%, 60%, 0.6)`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw bounce points
            for (let i = 1; i < ray.path.length - 1; i++) {
                const prev = ray.path[i - 1];
                const segLenToHere = ray.path.slice(0, i + 1).reduce((sum, p, j) => {
                    if (j === 0) return 0;
                    const pr = ray.path[j - 1];
                    return sum + Math.sqrt((p.x - pr.x) ** 2 + (p.y - pr.y) ** 2);
                }, 0);
                if (segLenToHere <= drawLen) {
                    ctx.beginPath();
                    ctx.arc(ray.path[i].x, ray.path[i].y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(221,161,94,0.6)';
                    ctx.fill();
                }
            }
        }

        document.getElementById('bounces').textContent = totalBounces;

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        rays = [];
        launchAngle = 10; coreDiamFrac = 0.5; speed = 2; time = 0;
        angleSlider.value = 10; coreSizeSlider.value = 50; speedSlider.value = 2;
        document.getElementById('angleVal').textContent = '10.0';
        document.getElementById('coreSizeVal').textContent = '50';
        document.getElementById('speedVal').textContent = '2.0';
        launchRay();
    };

    draw();
    </script>
</body>
</html>
