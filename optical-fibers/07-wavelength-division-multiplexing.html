<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wavelength Division Multiplexing - Optical Fibers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 14px; color: #FEFAE0;
            display: flex; gap: 20px; align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
            border: 1px solid rgba(138,154,91,0.3);
        }
        .controls label { font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .controls input[type=range] { width: 100px; accent-color: #8A9A5B; }
        .ch-toggle { display: flex; gap: 8px; }
        .ch-toggle button {
            width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer; font-size: 0.7rem; font-weight: bold; color: #fff;
        }
        .ch-toggle button.off { opacity: 0.3; }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,60,0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 260px;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.5;
        }
        .info h3 { color: #8A9A5B; margin-bottom: 6px; }
        .val { color: #DDA15E; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>WDM - Wavelength Division Multiplexing</h3>
        <p>Multiple data channels travel simultaneously through a single fiber, each at a different <span class="val">wavelength</span> (color).</p>
        <p style="margin-top:6px;">A multiplexer combines them at input, a demultiplexer separates them at output.</p>
        <p style="margin-top:6px;">Channels: <span class="val" id="chCount">4</span></p>
        <p>Total bandwidth: <span class="val" id="bwTotal">40</span> Gbps</p>
    </div>
    <div class="controls">
        <label>Channels
            <div class="ch-toggle" id="chButtons"></div>
        </label>
        <label>Data Rate per Ch.
            <input type="range" id="dataRate" min="1" max="40" step="1" value="10">
            <span id="dataRateVal">10</span> Gbps
        </label>
        <label>Speed
            <input type="range" id="speed" min="0.5" max="4" step="0.25" value="1.5">
            <span id="speedVal">1.5</span>x
        </label>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const channels = [
        { wavelength: 1530, color: '#e74c3c', name: 'λ1 = 1530 nm', active: true },
        { wavelength: 1540, color: '#f39c12', name: 'λ2 = 1540 nm', active: true },
        { wavelength: 1550, color: '#2ecc71', name: 'λ3 = 1550 nm', active: true },
        { wavelength: 1560, color: '#3498db', name: 'λ4 = 1560 nm', active: true },
        { wavelength: 1570, color: '#9b59b6', name: 'λ5 = 1570 nm', active: false },
        { wavelength: 1580, color: '#1abc9c', name: 'λ6 = 1580 nm', active: false },
        { wavelength: 1590, color: '#e67e22', name: 'λ7 = 1590 nm', active: false },
        { wavelength: 1600, color: '#e91e63', name: 'λ8 = 1600 nm', active: false }
    ];

    let dataRate = 10, speed = 1.5, time = 0;

    // Create channel buttons
    const chBtnContainer = document.getElementById('chButtons');
    channels.forEach((ch, i) => {
        const btn = document.createElement('button');
        btn.textContent = i + 1;
        btn.style.background = ch.color;
        btn.className = ch.active ? '' : 'off';
        btn.addEventListener('click', () => {
            ch.active = !ch.active;
            btn.className = ch.active ? '' : 'off';
            updateDisplay();
        });
        chBtnContainer.appendChild(btn);
    });

    const dataRateSlider = document.getElementById('dataRate');
    const speedSlider = document.getElementById('speed');
    dataRateSlider.addEventListener('input', () => { dataRate = parseInt(dataRateSlider.value); document.getElementById('dataRateVal').textContent = dataRate; updateDisplay(); });
    speedSlider.addEventListener('input', () => { speed = parseFloat(speedSlider.value); document.getElementById('speedVal').textContent = speed.toFixed(1); });

    function updateDisplay() {
        const active = channels.filter(c => c.active).length;
        document.getElementById('chCount').textContent = active;
        document.getElementById('bwTotal').textContent = active * dataRate;
    }
    updateDisplay();

    function drawBox(x, y, w, h, label, color) {
        ctx.fillStyle = color || 'rgba(50, 70, 120, 0.5)';
        ctx.strokeStyle = 'rgba(138,154,91,0.5)';
        ctx.lineWidth = 1.5;
        const r = 8;
        ctx.beginPath();
        ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.font = '11px Georgia';
        ctx.fillStyle = '#FEFAE0';
        ctx.textAlign = 'center';
        ctx.fillText(label, x + w / 2, y + h / 2 + 4);
    }

    function draw() {
        time += 0.016 * speed;
        ctx.clearRect(0, 0, W, H);

        const centerY = H * 0.45;
        const fiberX = W * 0.3;
        const fiberEnd = W * 0.7;
        const fiberLen = fiberEnd - fiberX;
        const fiberH = H * 0.05;

        // Title
        ctx.font = '16px Georgia';
        ctx.fillStyle = '#FEFAE0';
        ctx.textAlign = 'center';
        ctx.fillText('Wavelength Division Multiplexing (WDM)', W / 2, 30);

        // Multiplexer box
        const muxW = 60, muxH = 120;
        drawBox(fiberX - muxW - 10, centerY - muxH / 2, muxW, muxH, 'MUX', 'rgba(96,108,56,0.4)');

        // Demultiplexer box
        drawBox(fiberEnd + 10, centerY - muxH / 2, muxW, muxH, 'DEMUX', 'rgba(96,108,56,0.4)');

        // Fiber
        const fGrad = ctx.createLinearGradient(0, centerY - fiberH, 0, centerY + fiberH);
        fGrad.addColorStop(0, 'rgba(50, 70, 130, 0.4)');
        fGrad.addColorStop(0.5, 'rgba(70, 100, 170, 0.5)');
        fGrad.addColorStop(1, 'rgba(50, 70, 130, 0.4)');
        ctx.fillStyle = fGrad;
        ctx.fillRect(fiberX, centerY - fiberH, fiberLen, fiberH * 2);
        ctx.strokeStyle = 'rgba(96,108,56,0.5)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(fiberX, centerY - fiberH, fiberLen, fiberH * 2);

        ctx.font = '11px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.4)';
        ctx.textAlign = 'center';
        ctx.fillText('Single-Mode Fiber', fiberX + fiberLen / 2, centerY - fiberH - 6);

        // Draw input channels (left side)
        const activeChannels = channels.filter(c => c.active);
        const chSpacing = muxH / (activeChannels.length + 1);

        activeChannels.forEach((ch, i) => {
            const yOff = centerY - muxH / 2 + chSpacing * (i + 1);
            const inputX = fiberX - muxW - 80;

            // Input line to MUX
            ctx.beginPath();
            ctx.moveTo(inputX, yOff);
            ctx.lineTo(fiberX - muxW - 10, yOff);
            ctx.strokeStyle = ch.color;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Label
            ctx.font = '9px Georgia';
            ctx.fillStyle = ch.color;
            ctx.textAlign = 'right';
            ctx.fillText(ch.name, inputX - 5, yOff + 4);

            // Data pulses on input
            const pulsePhase = (time * 2 + i * 0.7) % 2;
            for (let p = 0; p < 3; p++) {
                const px = inputX + ((pulsePhase + p * 0.6) % 2) * 35;
                if (px < fiberX - muxW - 10) {
                    ctx.beginPath();
                    ctx.arc(px, yOff, 3, 0, Math.PI * 2);
                    ctx.fillStyle = ch.color;
                    ctx.fill();
                }
            }

            // Output line from DEMUX
            const outX = fiberEnd + 10 + muxW;
            const outEndX = outX + 80;
            ctx.beginPath();
            ctx.moveTo(outX, yOff);
            ctx.lineTo(outEndX, yOff);
            ctx.strokeStyle = ch.color;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Label
            ctx.font = '9px Georgia';
            ctx.fillStyle = ch.color;
            ctx.textAlign = 'left';
            ctx.fillText(ch.name, outEndX + 5, yOff + 4);

            // Output pulses
            for (let p = 0; p < 3; p++) {
                const px = outX + ((pulsePhase + p * 0.6) % 2) * 40;
                if (px < outEndX) {
                    ctx.beginPath();
                    ctx.arc(px, yOff, 3, 0, Math.PI * 2);
                    ctx.fillStyle = ch.color;
                    ctx.fill();
                }
            }
        });

        // Animated photons inside fiber (all colors traveling together)
        activeChannels.forEach((ch, i) => {
            const yOffset = (i - (activeChannels.length - 1) / 2) * (fiberH * 0.6 / Math.max(1, activeChannels.length));

            // Multiple photons per channel
            for (let p = 0; p < 4; p++) {
                const phase = ((time * 0.8 + i * 0.15 + p * 0.25) % 1);
                const px = fiberX + phase * fiberLen;
                const py = centerY + yOffset + Math.sin(time * 3 + i + p) * 3;

                ctx.beginPath();
                ctx.arc(px, py, 3, 0, Math.PI * 2);
                ctx.fillStyle = ch.color;
                ctx.fill();

                // Trail
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(px - 15, py);
                ctx.strokeStyle = ch.color + '60';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        });

        // Spectrum display at bottom
        const specY = H * 0.78;
        const specW = W * 0.6;
        const specX = (W - specW) / 2;
        const specH = H * 0.12;

        ctx.font = '13px Georgia';
        ctx.fillStyle = '#8A9A5B';
        ctx.textAlign = 'center';
        ctx.fillText('WDM Channel Spectrum', W / 2, specY - 15);

        // Spectrum axes
        ctx.strokeStyle = 'rgba(254,250,224,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(specX, specY + specH);
        ctx.lineTo(specX + specW, specY + specH);
        ctx.moveTo(specX, specY);
        ctx.lineTo(specX, specY + specH);
        ctx.stroke();

        ctx.font = '10px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.4)';
        ctx.textAlign = 'center';
        ctx.fillText('Wavelength (nm)', specX + specW / 2, specY + specH + 18);

        // Wavelength ticks
        for (let wl = 1530; wl <= 1600; wl += 10) {
            const x = specX + ((wl - 1525) / 80) * specW;
            ctx.beginPath();
            ctx.moveTo(x, specY + specH);
            ctx.lineTo(x, specY + specH + 5);
            ctx.strokeStyle = 'rgba(254,250,224,0.3)';
            ctx.stroke();
            ctx.fillText(wl.toString(), x, specY + specH + 15);
        }

        // Channel peaks
        channels.forEach((ch) => {
            const x = specX + ((ch.wavelength - 1525) / 80) * specW;
            if (ch.active) {
                // Gaussian peak
                ctx.beginPath();
                for (let dx = -30; dx <= 30; dx++) {
                    const val = Math.exp(-dx * dx / 50);
                    const py = specY + specH - val * specH * 0.85;
                    if (dx === -30) ctx.moveTo(x + dx, py);
                    else ctx.lineTo(x + dx, py);
                }
                ctx.strokeStyle = ch.color;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Fill
                ctx.beginPath();
                ctx.moveTo(x - 30, specY + specH);
                for (let dx = -30; dx <= 30; dx++) {
                    const val = Math.exp(-dx * dx / 50);
                    ctx.lineTo(x + dx, specY + specH - val * specH * 0.85);
                }
                ctx.lineTo(x + 30, specY + specH);
                ctx.closePath();
                ctx.fillStyle = ch.color + '30';
                ctx.fill();
            }
        });

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        dataRate = 10; speed = 1.5; time = 0;
        dataRateSlider.value = 10; speedSlider.value = 1.5;
        document.getElementById('dataRateVal').textContent = '10';
        document.getElementById('speedVal').textContent = '1.5';
        channels.forEach((ch, i) => { ch.active = i < 4; });
        const btns = chBtnContainer.querySelectorAll('button');
        btns.forEach((btn, i) => { btn.className = i < 4 ? '' : 'off'; });
        updateDisplay();
    };

    draw();
    </script>
</body>
</html>
