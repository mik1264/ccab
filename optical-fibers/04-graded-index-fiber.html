<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graded-Index Fiber - Optical Fibers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: Georgia, serif; }
        canvas { display: block; }
        a.back { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        a.back:hover { color: #DDA15E; }
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30,30,60,0.85); backdrop-filter: blur(10px);
            padding: 16px 24px; border-radius: 14px; color: #FEFAE0;
            display: flex; gap: 24px; align-items: center; z-index: 100; flex-wrap: wrap; justify-content: center;
            border: 1px solid rgba(138,154,91,0.3);
        }
        .controls label { font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .controls input[type=range] { width: 110px; accent-color: #8A9A5B; }
        .info {
            position: fixed; top: 10px; right: 10px; background: rgba(30,30,60,0.85);
            backdrop-filter: blur(10px); padding: 14px 18px; border-radius: 12px;
            color: #FEFAE0; font-size: 0.8rem; z-index: 100; max-width: 250px;
            border: 1px solid rgba(138,154,91,0.3); line-height: 1.5;
        }
        .info h3 { color: #8A9A5B; margin-bottom: 6px; }
        .val { color: #DDA15E; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h3>Graded-Index Fiber</h3>
        <p>The refractive index <span class="val">gradually decreases</span> from center to edge. Rays follow smooth sinusoidal paths instead of sharp zigzags.</p>
        <p style="margin-top:6px;">Higher-angle rays travel faster at the edges, equalizing transit times and reducing <span class="val">modal dispersion</span>.</p>
    </div>
    <div class="controls">
        <label>Profile Exponent (alpha)
            <input type="range" id="alpha" min="0.5" max="10" step="0.1" value="2.0">
            <span id="alphaVal">2.0</span>
        </label>
        <label>Number of Rays
            <input type="range" id="nRays" min="1" max="12" step="1" value="5">
            <span id="nRaysVal">5</span>
        </label>
        <label>Speed
            <input type="range" id="speed" min="0.5" max="4" step="0.25" value="1.5">
            <span id="speedVal">1.5</span>x
        </label>
    </div>
    <script src="../assets/js/enhance.js" defer></script>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    let alpha = 2.0, nRays = 5, speed = 1.5;
    let time = 0;

    const alphaSlider = document.getElementById('alpha');
    const nRaysSlider = document.getElementById('nRays');
    const speedSlider = document.getElementById('speed');

    alphaSlider.addEventListener('input', () => { alpha = parseFloat(alphaSlider.value); document.getElementById('alphaVal').textContent = alpha.toFixed(1); });
    nRaysSlider.addEventListener('input', () => { nRays = parseInt(nRaysSlider.value); document.getElementById('nRaysVal').textContent = nRays; });
    speedSlider.addEventListener('input', () => { speed = parseFloat(speedSlider.value); document.getElementById('speedVal').textContent = speed.toFixed(1); });

    function nProfile(r, a) {
        // n(r) = n1 * sqrt(1 - 2*delta*(r/a)^alpha)  for r < a
        const n1 = 1.48, delta = 0.01;
        const ra = Math.min(Math.abs(r) / a, 1);
        return n1 * Math.sqrt(Math.max(0, 1 - 2 * delta * Math.pow(ra, alpha)));
    }

    function draw() {
        time += 0.016 * speed;
        ctx.clearRect(0, 0, W, H);

        const fiberH = H * 0.22;
        const fiberY = H / 2;
        const fiberX = W * 0.1;
        const fiberEnd = W * 0.9;
        const fiberLen = fiberEnd - fiberX;

        // Draw refractive index profile
        const profileW = W * 0.06;
        const profileX = 12;

        ctx.strokeStyle = 'rgba(254,250,224,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(profileX, fiberY - fiberH - 20);
        ctx.lineTo(profileX, fiberY + fiberH + 20);
        ctx.moveTo(profileX, fiberY);
        ctx.lineTo(profileX + profileW, fiberY);
        ctx.stroke();

        // Graded profile curve
        ctx.beginPath();
        ctx.strokeStyle = '#DDA15E';
        ctx.lineWidth = 2;
        const steps = 60;
        for (let i = 0; i <= steps; i++) {
            const r = (i / steps - 0.5) * 2 * fiberH;
            const n = nProfile(r, fiberH);
            const px = profileX + (n - 1.45) / 0.04 * profileW;
            const py = fiberY + r;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.stroke();

        ctx.font = '10px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.5)';
        ctx.textAlign = 'center';
        ctx.fillText('n(r)', profileX + profileW / 2, fiberY - fiberH - 25);
        ctx.fillText(`α=${alpha.toFixed(1)}`, profileX + profileW / 2, fiberY + fiberH + 35);

        // Draw fiber
        // Gradient index shading
        for (let y = -fiberH; y <= fiberH; y += 2) {
            const r = Math.abs(y) / fiberH;
            const intensity = 0.15 + 0.25 * (1 - Math.pow(r, alpha / 2));
            ctx.fillStyle = `rgba(80, 120, 200, ${intensity})`;
            ctx.fillRect(fiberX, fiberY + y, fiberLen, 2);
        }

        // Outer boundary
        ctx.strokeStyle = 'rgba(96,108,56,0.8)';
        ctx.lineWidth = 2;
        ctx.strokeRect(fiberX, fiberY - fiberH, fiberLen, fiberH * 2);

        // Center axis
        ctx.setLineDash([6, 6]);
        ctx.strokeStyle = 'rgba(254,250,224,0.2)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(fiberX, fiberY);
        ctx.lineTo(fiberEnd, fiberY);
        ctx.stroke();
        ctx.setLineDash([]);

        // Draw rays - sinusoidal paths in GRIN fiber
        const colors = [
            'rgba(138,154,91,0.8)',
            'rgba(221,161,94,0.8)',
            'rgba(188,108,37,0.8)',
            'rgba(120,170,90,0.8)',
            'rgba(200,140,80,0.8)',
            'rgba(140,180,100,0.7)',
            'rgba(180,120,60,0.7)',
            'rgba(100,150,80,0.7)',
            'rgba(210,150,90,0.7)',
            'rgba(130,160,85,0.7)',
            'rgba(190,130,70,0.7)',
            'rgba(110,145,75,0.7)'
        ];

        for (let r = 0; r < nRays; r++) {
            const amplitude = fiberH * 0.15 + (r / Math.max(1, nRays - 1)) * fiberH * 0.75;
            const frequency = 2 + r * 0.3;
            const phase = r * 0.5;
            const color = colors[r % colors.length];

            // Draw path
            ctx.beginPath();
            let firstPoint = true;
            for (let x = fiberX; x <= fiberEnd; x += 2) {
                const t = (x - fiberX) / fiberLen;
                const py = fiberY + amplitude * Math.sin(frequency * Math.PI * t + phase);
                if (py >= fiberY - fiberH && py <= fiberY + fiberH) {
                    if (firstPoint) { ctx.moveTo(x, py); firstPoint = false; }
                    else ctx.lineTo(x, py);
                }
            }
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Animated photon
            const photonT = ((time * 0.15 + r * 0.15) % 1);
            const photonX = fiberX + photonT * fiberLen;
            const photonY = fiberY + amplitude * Math.sin(frequency * Math.PI * photonT + phase);

            if (photonY >= fiberY - fiberH && photonY <= fiberY + fiberH) {
                ctx.beginPath();
                ctx.arc(photonX, photonY, 5, 0, Math.PI * 2);
                ctx.fillStyle = color.replace('0.8', '1').replace('0.7', '1');
                ctx.fill();

                const glow = ctx.createRadialGradient(photonX, photonY, 0, photonX, photonY, 15);
                glow.addColorStop(0, color.replace('0.8', '0.4').replace('0.7', '0.3'));
                glow.addColorStop(1, 'transparent');
                ctx.beginPath();
                ctx.arc(photonX, photonY, 15, 0, Math.PI * 2);
                ctx.fillStyle = glow;
                ctx.fill();
            }
        }

        // Comparison note
        ctx.font = '13px Georgia';
        ctx.fillStyle = 'rgba(254,250,224,0.6)';
        ctx.textAlign = 'center';
        ctx.fillText('Smooth curves (not zigzags) because n(r) varies gradually', W / 2, fiberY + fiberH + 30);
        ctx.fillText(`Rays self-focus at the fiber axis — α = ${alpha.toFixed(1)} profile`, W / 2, fiberY + fiberH + 50);

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        alpha = 2.0; nRays = 5; speed = 1.5; time = 0;
        alphaSlider.value = 2.0; nRaysSlider.value = 5; speedSlider.value = 1.5;
        document.getElementById('alphaVal').textContent = '2.0';
        document.getElementById('nRaysVal').textContent = '5';
        document.getElementById('speedVal').textContent = '1.5';
    };

    draw();
    </script>
</body>
</html>
