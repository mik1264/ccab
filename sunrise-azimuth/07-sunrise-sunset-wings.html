<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrise &amp; Sunset Wings</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
        }

        body {
            background: #0d1117;
            color: #e6e6e6;
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        a.organic-back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(138, 154, 91, 0.15);
            border: 1px solid rgba(138, 154, 91, 0.3);
            border-radius: 30px;
            color: var(--sage);
            text-decoration: none;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        a.organic-back-link:hover {
            background: rgba(138, 154, 91, 0.25);
            transform: translateX(-3px);
        }

        .back-arrow {
            font-size: 16px;
            transition: transform 0.3s ease;
        }

        a.organic-back-link:hover .back-arrow {
            transform: translateX(-3px);
        }

        h1 {
            font-family: 'Lora', serif;
            text-align: center;
            padding: 30px 20px 5px;
            font-size: 2rem;
            color: var(--earth);
        }

        .subtitle {
            text-align: center;
            color: #8b949e;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 30px;
        }

        .chart-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(138, 154, 91, 0.2);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }

        #mainCanvas {
            display: block;
            width: 100%;
            border-radius: 10px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 0.8rem;
            color: var(--sage);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-group input[type="range"] {
            width: 220px;
            accent-color: var(--sage);
        }

        .control-group .value-display {
            font-size: 0.85rem;
            color: var(--earth);
            font-weight: 600;
        }

        .presets {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .preset-btn {
            padding: 5px 12px;
            border: 1px solid rgba(138, 154, 91, 0.3);
            background: rgba(138, 154, 91, 0.1);
            color: var(--sage);
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .preset-btn:hover, .preset-btn.active {
            background: rgba(138, 154, 91, 0.3);
            color: var(--cream);
        }

        .play-btn {
            padding: 8px 24px;
            border: 1px solid rgba(221, 161, 94, 0.4);
            background: rgba(221, 161, 94, 0.15);
            color: var(--earth);
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }

        .play-btn:hover {
            background: rgba(221, 161, 94, 0.3);
        }

        .info-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(138, 154, 91, 0.15);
            border-radius: 12px;
        }

        .info-item {
            text-align: center;
        }

        .info-item .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b949e;
            margin-bottom: 2px;
        }

        .info-item .value {
            font-family: 'Lora', serif;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .info-item .value.sunrise-color {
            color: var(--earth);
        }

        .info-item .value.sunset-color {
            color: #7B9FD9;
        }

        .info-item .value.date-color {
            color: var(--sage);
        }

        .compass-container {
            position: absolute;
            bottom: 25px;
            right: 25px;
        }

        #compassCanvas {
            display: block;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 12px;
            font-size: 0.8rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-swatch {
            width: 24px;
            height: 4px;
            border-radius: 2px;
        }

        .swatch-sunrise {
            background: linear-gradient(90deg, #DDA15E, #BC6C25);
        }

        .swatch-sunset {
            background: linear-gradient(90deg, #4A90D9, #7B68EE);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="organic-back-link">
        <span class="back-arrow">&larr;</span>
        <span class="back-text">Gallery</span>
    </a>

    <h1>Sunrise &amp; Sunset Wings</h1>
    <p class="subtitle">How sunrise and sunset azimuths trace butterfly wings across the year</p>

    <div class="main-container">
        <div class="controls">
            <div class="control-group">
                <label>Latitude</label>
                <input type="range" id="latSlider" min="-66" max="66" value="52" step="0.5">
                <span class="value-display" id="latValue">52.0° N — Cambridge</span>
            </div>
            <div class="control-group">
                <label>Presets</label>
                <div class="presets">
                    <button class="preset-btn" data-lat="0">Equator</button>
                    <button class="preset-btn" data-lat="23.44">Tropic</button>
                    <button class="preset-btn" data-lat="35">Tokyo</button>
                    <button class="preset-btn" data-lat="40.7">New York</button>
                    <button class="preset-btn active" data-lat="52.2">Cambridge</button>
                    <button class="preset-btn" data-lat="60">Helsinki</button>
                    <button class="preset-btn" data-lat="64">Reykjavik</button>
                </div>
            </div>
            <button class="play-btn" id="playBtn">&#9654; Play Year</button>
        </div>

        <div class="chart-wrapper">
            <canvas id="mainCanvas"></canvas>
            <div class="compass-container">
                <canvas id="compassCanvas" width="130" height="130"></canvas>
            </div>
        </div>

        <div class="info-bar">
            <div class="info-item">
                <div class="label">Date</div>
                <div class="value date-color" id="infoDate">Mar 14</div>
            </div>
            <div class="info-item">
                <div class="label">Sunrise Azimuth</div>
                <div class="value sunrise-color" id="infoSunrise">—</div>
            </div>
            <div class="info-item">
                <div class="label">Sunset Azimuth</div>
                <div class="value sunset-color" id="infoSunset">—</div>
            </div>
            <div class="info-item">
                <div class="label">Wing Spread</div>
                <div class="value date-color" id="infoSpread">—</div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-swatch swatch-sunrise"></div>
                <span style="color: #DDA15E;">Sunrise Azimuth</span>
            </div>
            <div class="legend-item">
                <div class="legend-swatch swatch-sunset"></div>
                <span style="color: #7B9FD9;">Sunset Azimuth</span>
            </div>
        </div>
    </div>

    <script>
        const mainCanvas = document.getElementById('mainCanvas');
        const ctx = mainCanvas.getContext('2d');
        const compassCanvas = document.getElementById('compassCanvas');
        const cctx = compassCanvas.getContext('2d');

        const latSlider = document.getElementById('latSlider');
        const latValueEl = document.getElementById('latValue');
        const playBtn = document.getElementById('playBtn');
        const infoDate = document.getElementById('infoDate');
        const infoSunrise = document.getElementById('infoSunrise');
        const infoSunset = document.getElementById('infoSunset');
        const infoSpread = document.getElementById('infoSpread');

        const presetBtns = document.querySelectorAll('.preset-btn');

        const DEG = Math.PI / 180;
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const monthDays = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334, 365];

        let latitude = 52.2;
        let currentDay = getDayOfYear();
        let playing = false;
        let animFrame = null;
        let dpr = window.devicePixelRatio || 1;

        // Chart margins
        const MARGIN = { top: 40, right: 30, bottom: 50, left: 55 };

        function getDayOfYear() {
            var now = new Date();
            var start = new Date(now.getFullYear(), 0, 0);
            var diff = now - start;
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }

        function solarDeclination(dayOfYear) {
            return 23.44 * Math.sin((360 / 365) * (dayOfYear - 81) * DEG);
        }

        function sunriseAzimuth(dayOfYear, lat) {
            var decl = solarDeclination(dayOfYear);
            var cosA = Math.sin(decl * DEG) / Math.cos(lat * DEG);
            if (cosA < -1 || cosA > 1) return null; // no sunrise/sunset
            return Math.acos(cosA) / DEG;
        }

        function resizeCanvas() {
            var rect = mainCanvas.parentElement.getBoundingClientRect();
            var w = rect.width - 30;
            var h = Math.min(w * 0.55, 550);
            mainCanvas.style.width = w + 'px';
            mainCanvas.style.height = h + 'px';
            mainCanvas.width = w * dpr;
            mainCanvas.height = h * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            draw();
        }

        function getPresetName(lat) {
            var abs = Math.abs(lat);
            if (abs < 1) return 'Equator';
            if (Math.abs(lat - 23.44) < 1) return 'Tropic of Cancer';
            if (Math.abs(lat + 23.44) < 1) return 'Tropic of Capricorn';
            if (Math.abs(lat - 35) < 1) return 'Tokyo';
            if (Math.abs(lat - 40.7) < 1) return 'New York';
            if (Math.abs(lat - 52.2) < 1) return 'Cambridge';
            if (Math.abs(lat - 60) < 1) return 'Helsinki';
            if (Math.abs(lat - 64) < 1) return 'Reykjavik';
            return '';
        }

        function dayToDate(day) {
            for (var m = 0; m < 12; m++) {
                if (day <= monthDays[m + 1]) {
                    return months[m] + ' ' + (day - monthDays[m]);
                }
            }
            return 'Dec 31';
        }

        function draw() {
            var W = mainCanvas.width / dpr;
            var H = mainCanvas.height / dpr;
            var plotW = W - MARGIN.left - MARGIN.right;
            var plotH = H - MARGIN.top - MARGIN.bottom;

            ctx.clearRect(0, 0, W, H);

            // Background
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, W, H);

            // Axis labels
            ctx.fillStyle = '#8b949e';
            ctx.font = '11px Nunito, sans-serif';
            ctx.textAlign = 'center';

            // X axis: months
            for (var m = 0; m < 12; m++) {
                var x = MARGIN.left + ((monthDays[m] + monthDays[m + 1]) / 2) / 365 * plotW;
                ctx.fillText(months[m], x, H - MARGIN.bottom + 20);

                // tick
                var tx = MARGIN.left + monthDays[m] / 365 * plotW;
                ctx.strokeStyle = 'rgba(139,148,158,0.15)';
                ctx.beginPath();
                ctx.moveTo(tx, MARGIN.top);
                ctx.lineTo(tx, H - MARGIN.bottom);
                ctx.stroke();
            }

            // Y axis: azimuth
            ctx.textAlign = 'right';
            var yTicks = [0, 45, 90, 135, 180, 225, 270, 315, 360];
            for (var i = 0; i < yTicks.length; i++) {
                var az = yTicks[i];
                var y = MARGIN.top + (1 - az / 360) * plotH;
                ctx.fillStyle = '#8b949e';
                ctx.fillText(az + '°', MARGIN.left - 8, y + 4);

                ctx.strokeStyle = 'rgba(139,148,158,0.1)';
                ctx.beginPath();
                ctx.moveTo(MARGIN.left, y);
                ctx.lineTo(W - MARGIN.right, y);
                ctx.stroke();
            }

            // Due East (90°) and Due West (270°) reference lines
            ctx.setLineDash([6, 4]);
            ctx.lineWidth = 1;

            var yEast = MARGIN.top + (1 - 90 / 360) * plotH;
            ctx.strokeStyle = 'rgba(221, 161, 94, 0.5)';
            ctx.beginPath();
            ctx.moveTo(MARGIN.left, yEast);
            ctx.lineTo(W - MARGIN.right, yEast);
            ctx.stroke();
            ctx.fillStyle = 'rgba(221, 161, 94, 0.7)';
            ctx.textAlign = 'left';
            ctx.fillText('Due East (90°)', W - MARGIN.right - 85, yEast - 6);

            var yWest = MARGIN.top + (1 - 270 / 360) * plotH;
            ctx.strokeStyle = 'rgba(74, 144, 217, 0.5)';
            ctx.beginPath();
            ctx.moveTo(MARGIN.left, yWest);
            ctx.lineTo(W - MARGIN.right, yWest);
            ctx.stroke();
            ctx.fillStyle = 'rgba(74, 144, 217, 0.7)';
            ctx.textAlign = 'left';
            ctx.fillText('Due West (270°)', W - MARGIN.right - 100, yWest - 6);

            ctx.setLineDash([]);

            // Compute curves
            var sunriseData = [];
            var sunsetData = [];
            for (var d = 1; d <= 365; d++) {
                var a = sunriseAzimuth(d, latitude);
                if (a !== null) {
                    sunriseData.push({ day: d, az: a });
                    sunsetData.push({ day: d, az: 360 - a });
                }
            }

            function dayToX(day) {
                return MARGIN.left + (day / 365) * plotW;
            }
            function azToY(az) {
                return MARGIN.top + (1 - az / 360) * plotH;
            }

            // Shaded area: sunrise fill between curve and 90°
            if (sunriseData.length > 1) {
                ctx.beginPath();
                ctx.moveTo(dayToX(sunriseData[0].day), azToY(90));
                for (var i = 0; i < sunriseData.length; i++) {
                    ctx.lineTo(dayToX(sunriseData[i].day), azToY(sunriseData[i].az));
                }
                ctx.lineTo(dayToX(sunriseData[sunriseData.length - 1].day), azToY(90));
                ctx.closePath();
                ctx.fillStyle = 'rgba(221, 161, 94, 0.08)';
                ctx.fill();
            }

            // Shaded area: sunset fill between curve and 270°
            if (sunsetData.length > 1) {
                ctx.beginPath();
                ctx.moveTo(dayToX(sunsetData[0].day), azToY(270));
                for (var i = 0; i < sunsetData.length; i++) {
                    ctx.lineTo(dayToX(sunsetData[i].day), azToY(sunsetData[i].az));
                }
                ctx.lineTo(dayToX(sunsetData[sunsetData.length - 1].day), azToY(270));
                ctx.closePath();
                ctx.fillStyle = 'rgba(74, 144, 217, 0.08)';
                ctx.fill();
            }

            // Draw sunrise curve
            if (sunriseData.length > 1) {
                var grad = ctx.createLinearGradient(MARGIN.left, 0, W - MARGIN.right, 0);
                grad.addColorStop(0, '#DDA15E');
                grad.addColorStop(0.5, '#BC6C25');
                grad.addColorStop(1, '#DDA15E');
                ctx.strokeStyle = grad;
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(dayToX(sunriseData[0].day), azToY(sunriseData[0].az));
                for (var i = 1; i < sunriseData.length; i++) {
                    ctx.lineTo(dayToX(sunriseData[i].day), azToY(sunriseData[i].az));
                }
                ctx.stroke();
            }

            // Draw sunset curve
            if (sunsetData.length > 1) {
                var grad2 = ctx.createLinearGradient(MARGIN.left, 0, W - MARGIN.right, 0);
                grad2.addColorStop(0, '#4A90D9');
                grad2.addColorStop(0.5, '#7B68EE');
                grad2.addColorStop(1, '#4A90D9');
                ctx.strokeStyle = grad2;
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(dayToX(sunsetData[0].day), azToY(sunsetData[0].az));
                for (var i = 1; i < sunsetData.length; i++) {
                    ctx.lineTo(dayToX(sunsetData[i].day), azToY(sunsetData[i].az));
                }
                ctx.stroke();
            }

            // Today line
            var todayX = dayToX(currentDay);
            ctx.setLineDash([4, 3]);
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.7)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(todayX, MARGIN.top);
            ctx.lineTo(todayX, H - MARGIN.bottom);
            ctx.stroke();
            ctx.setLineDash([]);

            // Intersection dots
            var riseAz = sunriseAzimuth(currentDay, latitude);
            if (riseAz !== null) {
                var setAz = 360 - riseAz;

                // Sunrise dot
                ctx.beginPath();
                ctx.arc(todayX, azToY(riseAz), 5, 0, Math.PI * 2);
                ctx.fillStyle = '#DDA15E';
                ctx.fill();
                ctx.strokeStyle = '#0d1117';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Sunset dot
                ctx.beginPath();
                ctx.arc(todayX, azToY(setAz), 5, 0, Math.PI * 2);
                ctx.fillStyle = '#7B68EE';
                ctx.fill();
                ctx.strokeStyle = '#0d1117';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Update info bar
                infoDate.textContent = dayToDate(currentDay);
                infoSunrise.textContent = riseAz.toFixed(1) + '°';
                infoSunset.textContent = setAz.toFixed(1) + '°';
                infoSpread.textContent = (Math.abs(riseAz - 90) * 2).toFixed(1) + '°';

                drawCompass(riseAz, setAz);
            } else {
                infoDate.textContent = dayToDate(currentDay);
                infoSunrise.textContent = 'N/A';
                infoSunset.textContent = 'N/A';
                infoSpread.textContent = 'N/A';
                drawCompass(null, null);
            }

            // Title on chart
            ctx.fillStyle = '#e6e6e6';
            ctx.font = '600 14px Lora, serif';
            ctx.textAlign = 'center';
            ctx.fillText('Azimuth (°N)', MARGIN.left + plotW / 2, MARGIN.top - 15);

            // Y-axis label
            ctx.save();
            ctx.translate(14, MARGIN.top + plotH / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillStyle = '#8b949e';
            ctx.font = '11px Nunito, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Azimuth from North', 0, 0);
            ctx.restore();
        }

        function drawCompass(riseAz, setAz) {
            var W = 130, H = 130;
            var cx = W / 2, cy = H / 2;
            var r = 50;

            cctx.clearRect(0, 0, W, H);

            // Outer ring
            cctx.beginPath();
            cctx.arc(cx, cy, r + 2, 0, Math.PI * 2);
            cctx.strokeStyle = 'rgba(138, 154, 91, 0.3)';
            cctx.lineWidth = 1;
            cctx.stroke();

            // Inner fill
            cctx.beginPath();
            cctx.arc(cx, cy, r, 0, Math.PI * 2);
            cctx.fillStyle = 'rgba(13, 17, 23, 0.85)';
            cctx.fill();

            // Cardinal directions
            cctx.fillStyle = '#8b949e';
            cctx.font = '10px Nunito, sans-serif';
            cctx.textAlign = 'center';
            cctx.textBaseline = 'middle';
            cctx.fillText('N', cx, cy - r - 8);
            cctx.fillText('S', cx, cy + r + 8);
            cctx.fillText('E', cx + r + 8, cy);
            cctx.fillText('W', cx - r - 8, cy);

            // Tick marks
            for (var i = 0; i < 360; i += 15) {
                var angle = (i - 90) * DEG;
                var inner = i % 90 === 0 ? r - 10 : (i % 45 === 0 ? r - 7 : r - 4);
                cctx.beginPath();
                cctx.moveTo(cx + Math.cos(angle) * inner, cy + Math.sin(angle) * inner);
                cctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
                cctx.strokeStyle = 'rgba(139,148,158,0.3)';
                cctx.lineWidth = 1;
                cctx.stroke();
            }

            if (riseAz !== null) {
                // Sunrise marker
                var rAngle = (riseAz - 90) * DEG;
                cctx.beginPath();
                cctx.moveTo(cx, cy);
                cctx.lineTo(cx + Math.cos(rAngle) * (r - 3), cy + Math.sin(rAngle) * (r - 3));
                cctx.strokeStyle = '#DDA15E';
                cctx.lineWidth = 2.5;
                cctx.stroke();

                // Sunrise dot
                cctx.beginPath();
                cctx.arc(cx + Math.cos(rAngle) * (r - 3), cy + Math.sin(rAngle) * (r - 3), 4, 0, Math.PI * 2);
                cctx.fillStyle = '#DDA15E';
                cctx.fill();

                // Sunset marker
                var sAngle = (setAz - 90) * DEG;
                cctx.beginPath();
                cctx.moveTo(cx, cy);
                cctx.lineTo(cx + Math.cos(sAngle) * (r - 3), cy + Math.sin(sAngle) * (r - 3));
                cctx.strokeStyle = '#7B68EE';
                cctx.lineWidth = 2.5;
                cctx.stroke();

                // Sunset dot
                cctx.beginPath();
                cctx.arc(cx + Math.cos(sAngle) * (r - 3), cy + Math.sin(sAngle) * (r - 3), 4, 0, Math.PI * 2);
                cctx.fillStyle = '#7B68EE';
                cctx.fill();
            }

            // Center dot
            cctx.beginPath();
            cctx.arc(cx, cy, 3, 0, Math.PI * 2);
            cctx.fillStyle = '#8A9A5B';
            cctx.fill();
        }

        // Slider
        latSlider.addEventListener('input', function() {
            latitude = parseFloat(this.value);
            var name = getPresetName(latitude);
            var dir = latitude >= 0 ? 'N' : 'S';
            latValueEl.textContent = Math.abs(latitude).toFixed(1) + '° ' + dir + (name ? ' — ' + name : '');
            updatePresetBtns();
            draw();
        });

        // Presets
        presetBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                latitude = parseFloat(this.dataset.lat);
                latSlider.value = latitude;
                var name = getPresetName(latitude);
                var dir = latitude >= 0 ? 'N' : 'S';
                latValueEl.textContent = Math.abs(latitude).toFixed(1) + '° ' + dir + (name ? ' — ' + name : '');
                updatePresetBtns();
                draw();
            });
        });

        function updatePresetBtns() {
            presetBtns.forEach(function(btn) {
                var diff = Math.abs(parseFloat(btn.dataset.lat) - latitude);
                btn.classList.toggle('active', diff < 1);
            });
        }

        // Play animation
        var playInterval = null;
        playBtn.addEventListener('click', function() {
            if (playing) {
                playing = false;
                clearInterval(playInterval);
                playBtn.innerHTML = '&#9654; Play Year';
            } else {
                playing = true;
                playBtn.innerHTML = '&#9646;&#9646; Pause';
                currentDay = 1;
                playInterval = setInterval(function() {
                    currentDay++;
                    if (currentDay > 365) {
                        currentDay = 1;
                    }
                    draw();
                }, 30);
            }
        });

        // Mouse interaction on chart
        mainCanvas.addEventListener('mousemove', function(e) {
            if (playing) return;
            var rect = mainCanvas.getBoundingClientRect();
            var mx = e.clientX - rect.left;
            var W = rect.width;
            var plotW = W - MARGIN.left - MARGIN.right;
            var relX = mx - MARGIN.left;
            if (relX >= 0 && relX <= plotW) {
                currentDay = Math.max(1, Math.min(365, Math.round((relX / plotW) * 365)));
                draw();
            }
        });

        mainCanvas.addEventListener('mouseleave', function() {
            if (!playing) {
                currentDay = getDayOfYear();
                draw();
            }
        });

        // Init
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
