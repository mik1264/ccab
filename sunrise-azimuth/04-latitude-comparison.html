<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latitude Comparison - Sunrise Azimuth</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
        }

        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            text-decoration: none;
            color: var(--sage);
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(138, 154, 91, 0.3);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(138, 154, 91, 0.15);
            border-color: var(--sage);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px 40px;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 40px;
        }

        header h1 {
            font-family: 'Lora', serif;
            font-size: 2rem;
            color: var(--cream);
            margin-bottom: 8px;
        }

        header p {
            color: #8b949e;
            font-size: 1rem;
            max-width: 650px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .play-btn {
            background: var(--moss);
            color: var(--cream);
            border: none;
            padding: 10px 28px;
            border-radius: 24px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            background: var(--sage);
        }

        .date-display {
            font-family: 'Lora', serif;
            font-size: 1.1rem;
            color: var(--earth);
            min-width: 140px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        @media (max-width: 800px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .compass-cell {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 14px 10px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        .compass-cell.highlight {
            border-color: var(--earth);
            background: rgba(221, 161, 94, 0.08);
            box-shadow: 0 0 20px rgba(221, 161, 94, 0.1);
        }

        .compass-cell .city-name {
            font-family: 'Lora', serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--cream);
            margin-bottom: 2px;
        }

        .compass-cell.highlight .city-name {
            color: var(--earth);
        }

        .compass-cell .city-lat {
            font-size: 0.78rem;
            color: #8b949e;
            margin-bottom: 6px;
        }

        .compass-cell canvas {
            display: block;
        }

        .compass-cell .spread-label {
            font-size: 0.82rem;
            font-weight: 600;
            margin-top: 4px;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: #8b949e;
        }

        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">
        <span>&#8592;</span> Gallery
    </a>

    <div class="container">
        <header>
            <h1>Latitude Comparison</h1>
            <p>How sunrise azimuth variation increases dramatically with latitude. Near the equator the sun always rises almost due east; at high latitudes it sweeps across a huge arc.</p>
        </header>

        <div class="controls">
            <button class="play-btn" id="playBtn">&#9654; Play Year</button>
            <div class="date-display" id="dateDisplay">21 Mar</div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="legend">
            <div class="legend-item"><div class="legend-swatch" style="background:#4ade80"></div> Small spread</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#facc15"></div> Moderate</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#f97316"></div> Large</div>
            <div class="legend-item"><div class="legend-swatch" style="background:#ef4444"></div> Extreme</div>
        </div>
    </div>

    <script>
        const cities = [
            { name: 'Quito',      lat: 0.2  },
            { name: 'Singapore',  lat: 1.3  },
            { name: 'Cairo',      lat: 30.0 },
            { name: 'Tokyo',      lat: 35.7 },
            { name: 'Rome',       lat: 41.9 },
            { name: 'London',     lat: 51.5 },
            { name: 'Cambridge',  lat: 52.2, highlight: true },
            { name: 'Helsinki',   lat: 60.2 },
            { name: 'Reykjavik',  lat: 64.1 }
        ];

        const DEG = Math.PI / 180;
        const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const DAYS_IN_MONTH = [31,28,31,30,31,30,31,31,30,31,30,31];

        function solarDeclination(dayOfYear) {
            return 23.44 * Math.sin((360 / 365) * (dayOfYear - 81) * DEG);
        }

        function sunriseAzimuth(dayOfYear, latDeg) {
            const decl = solarDeclination(dayOfYear) * DEG;
            const latRad = latDeg * DEG;
            const cosA = Math.sin(decl) / Math.cos(latRad);
            if (cosA < -1 || cosA > 1) return null; // no sunrise
            return Math.acos(cosA) / DEG; // degrees from north
        }

        function spreadColor(spread) {
            if (spread < 10)  return '#4ade80';
            if (spread < 30)  return '#a3e635';
            if (spread < 50)  return '#facc15';
            if (spread < 70)  return '#f97316';
            return '#ef4444';
        }

        function dayOfYearToDate(doy) {
            let d = doy;
            for (let m = 0; m < 12; m++) {
                if (d <= DAYS_IN_MONTH[m]) return (d) + ' ' + MONTHS[m];
                d -= DAYS_IN_MONTH[m];
            }
            return '31 Dec';
        }

        // Compute spread for each city
        function computeSpread(latDeg) {
            let min = 360, max = 0;
            for (let d = 1; d <= 365; d++) {
                const az = sunriseAzimuth(d, latDeg);
                if (az === null) continue;
                if (az < min) min = az;
                if (az > max) max = az;
            }
            return { min, max, spread: max - min };
        }

        // Build UI
        const grid = document.getElementById('grid');
        const dpr = window.devicePixelRatio || 1;
        const canvasCSS = 160;
        const canvasPx = Math.round(canvasCSS * dpr);

        const cells = cities.map(city => {
            const info = computeSpread(city.lat);
            const cell = document.createElement('div');
            cell.className = 'compass-cell' + (city.highlight ? ' highlight' : '');

            const nameEl = document.createElement('div');
            nameEl.className = 'city-name';
            nameEl.textContent = city.name;

            const latEl = document.createElement('div');
            latEl.className = 'city-lat';
            latEl.textContent = city.lat.toFixed(1) + '\u00b0 N';

            const canvas = document.createElement('canvas');
            canvas.width = canvasPx;
            canvas.height = canvasPx;
            canvas.style.width = canvasCSS + 'px';
            canvas.style.height = canvasCSS + 'px';

            const spreadEl = document.createElement('div');
            spreadEl.className = 'spread-label';
            spreadEl.style.color = spreadColor(info.spread);
            spreadEl.textContent = info.spread.toFixed(1) + '\u00b0 spread';

            cell.appendChild(nameEl);
            cell.appendChild(latEl);
            cell.appendChild(canvas);
            cell.appendChild(spreadEl);
            grid.appendChild(cell);

            return {
                city,
                canvas,
                ctx: canvas.getContext('2d'),
                info
            };
        });

        let currentDay = 80; // ~equinox
        let animating = false;
        let animFrame = null;

        function drawCompass(entry, dayOfYear) {
            const { ctx, canvas, info, city } = entry;
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const r = w * 0.38;

            ctx.clearRect(0, 0, w, h);

            // Compass circle
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1.5 * dpr;
            ctx.stroke();

            // Cardinal ticks and labels
            const cardinals = [
                { label: 'N', angle: -90 },
                { label: 'E', angle: 0 },
                { label: 'S', angle: 90 },
                { label: 'W', angle: 180 }
            ];
            ctx.font = `${11 * dpr}px Nunito, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(255,255,255,0.4)';

            cardinals.forEach(c => {
                const a = c.angle * DEG;
                // tick
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(a) * (r - 4 * dpr), cy + Math.sin(a) * (r - 4 * dpr));
                ctx.lineTo(cx + Math.cos(a) * (r + 4 * dpr), cy + Math.sin(a) * (r + 4 * dpr));
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1 * dpr;
                ctx.stroke();
                // label
                ctx.fillText(c.label, cx + Math.cos(a) * (r + 14 * dpr), cy + Math.sin(a) * (r + 14 * dpr));
            });

            // Draw the sunrise arc (azimuth is measured from north clockwise on compass)
            // sunriseAzimuth returns degrees from north; on canvas north = up = -90deg
            // Compass bearing to canvas angle: canvasAngle = (bearing - 90) degrees
            // The arc spans from info.min to info.max bearing (east side of compass)
            const arcStartBearing = info.min; // most northerly sunrise
            const arcEndBearing = info.max;   // most southerly sunrise

            // Convert bearing to canvas angle (radians)
            // Bearing 0 = north (up), clockwise. Canvas 0 = right, CCW.
            // Canvas angle = (bearing - 90) * DEG
            const canvasStart = (arcStartBearing - 90) * DEG;
            const canvasEnd = (arcEndBearing - 90) * DEG;

            // Draw arc band
            ctx.beginPath();
            ctx.arc(cx, cy, r, canvasStart, canvasEnd);
            ctx.strokeStyle = spreadColor(info.spread);
            ctx.globalAlpha = 0.35;
            ctx.lineWidth = 8 * dpr;
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Brighter outline arc
            ctx.beginPath();
            ctx.arc(cx, cy, r, canvasStart, canvasEnd);
            ctx.strokeStyle = spreadColor(info.spread);
            ctx.lineWidth = 2 * dpr;
            ctx.stroke();

            // Current sun position
            const az = sunriseAzimuth(dayOfYear, city.lat);
            if (az !== null) {
                const sunAngle = (az - 90) * DEG;
                const sx = cx + Math.cos(sunAngle) * r;
                const sy = cy + Math.sin(sunAngle) * r;

                // Sun glow
                const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 12 * dpr);
                grad.addColorStop(0, 'rgba(255,220,50,0.7)');
                grad.addColorStop(1, 'rgba(255,220,50,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(sx, sy, 12 * dpr, 0, Math.PI * 2);
                ctx.fill();

                // Sun dot
                ctx.beginPath();
                ctx.arc(sx, sy, 4 * dpr, 0, Math.PI * 2);
                ctx.fillStyle = '#ffdc32';
                ctx.fill();

                // Line from center to sun
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(sx, sy);
                ctx.strokeStyle = 'rgba(255,220,50,0.25)';
                ctx.lineWidth = 1 * dpr;
                ctx.stroke();
            } else {
                // No sunrise - show text
                ctx.font = `${10 * dpr}px Nunito, sans-serif`;
                ctx.fillStyle = 'rgba(255,100,100,0.6)';
                ctx.textAlign = 'center';
                ctx.fillText('No sunrise', cx, cy);
            }

            // Center dot
            ctx.beginPath();
            ctx.arc(cx, cy, 2.5 * dpr, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fill();
        }

        function drawAll() {
            cells.forEach(c => drawCompass(c, currentDay));
            document.getElementById('dateDisplay').textContent = dayOfYearToDate(((currentDay - 1) % 365) + 1);
        }

        // Animation
        const playBtn = document.getElementById('playBtn');
        let lastTime = 0;
        const SPEED = 120; // days per second

        function animateStep(timestamp) {
            if (!animating) return;
            if (!lastTime) lastTime = timestamp;
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            currentDay += dt * SPEED;
            if (currentDay > 365) currentDay -= 365;
            drawAll();
            animFrame = requestAnimationFrame(animateStep);
        }

        playBtn.addEventListener('click', () => {
            if (animating) {
                animating = false;
                cancelAnimationFrame(animFrame);
                playBtn.innerHTML = '&#9654; Play Year';
            } else {
                animating = true;
                lastTime = 0;
                playBtn.innerHTML = '&#9724; Pause';
                animFrame = requestAnimationFrame(animateStep);
            }
        });

        // Initial draw
        drawAll();
    </script>
</body>
</html>
