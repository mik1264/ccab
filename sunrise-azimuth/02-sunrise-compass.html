<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrise Compass</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
            --bg: #0d1117;
        }

        body {
            background: var(--bg);
            color: var(--cream);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .organic-back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(138, 154, 91, 0.15);
            border: 1px solid rgba(138, 154, 91, 0.3);
            border-radius: 30px;
            color: var(--sage);
            text-decoration: none;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .organic-back-link:hover {
            background: rgba(138, 154, 91, 0.25);
            border-color: var(--sage);
            transform: translateX(-3px);
        }

        .back-arrow {
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .organic-back-link:hover .back-arrow {
            transform: translateX(-3px);
        }

        h1 {
            font-family: 'Lora', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--earth);
            margin-top: 24px;
            margin-bottom: 4px;
            text-align: center;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--sage);
            margin-bottom: 16px;
            text-align: center;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        canvas {
            display: block;
        }

        .info-display {
            text-align: center;
            margin-bottom: 8px;
        }

        .azimuth-value {
            font-family: 'Lora', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--earth);
        }

        .azimuth-diff {
            font-size: 1rem;
            color: var(--sage);
            margin-top: 2px;
        }

        .controls {
            width: 100%;
            max-width: 500px;
            padding: 0 24px;
            margin-bottom: 24px;
        }

        .control-group {
            margin-bottom: 16px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }

        .control-label label {
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--sage);
        }

        .control-label .value-display {
            font-family: 'Lora', serif;
            font-size: 0.95rem;
            color: var(--earth);
            font-weight: 600;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(138, 154, 91, 0.2);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--earth);
            cursor: pointer;
            border: 2px solid var(--cream);
            box-shadow: 0 0 8px rgba(221, 161, 94, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--earth);
            cursor: pointer;
            border: 2px solid var(--cream);
            box-shadow: 0 0 8px rgba(221, 161, 94, 0.4);
        }

        .month-ticks {
            display: flex;
            justify-content: space-between;
            padding: 4px 0 0 0;
            font-size: 0.65rem;
            color: rgba(138, 154, 91, 0.6);
        }

        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
            font-size: 0.8rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--sage);
        }

        .legend-swatch {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; margin-top: 60px; }
            .subtitle { font-size: 0.85rem; }
            .controls { padding: 0 16px; }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="organic-back-link">
        <span class="back-arrow">&larr;</span>
        <span class="back-text">Gallery</span>
    </a>

    <h1>Sunrise Compass</h1>
    <p class="subtitle">Where the sun rises for any date and latitude</p>

    <div class="info-display">
        <div class="azimuth-value" id="azimuthValue">Azimuth: 90.0&deg;</div>
        <div class="azimuth-diff" id="azimuthDiff">Exactly Due East</div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="compass"></canvas>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-swatch" style="background: #FFB347;"></div>
            Sunrise position
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="background: rgba(138,154,91,0.4);"></div>
            Annual range
        </div>
        <div class="legend-item">
            <div class="legend-swatch" style="border: 2px dashed rgba(254,250,224,0.3); background: none; border-radius: 0; width: 16px; height: 0;"></div>
            Due East (90&deg;)
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <div class="control-label">
                <label for="daySlider">Day of Year</label>
                <span class="value-display" id="dateDisplay">Mar 20</span>
            </div>
            <input type="range" id="daySlider" min="1" max="365" value="80">
            <div class="month-ticks">
                <span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span><span>May</span><span>Jun</span>
                <span>Jul</span><span>Aug</span><span>Sep</span><span>Oct</span><span>Nov</span><span>Dec</span>
            </div>
        </div>
        <div class="control-group">
            <div class="control-label">
                <label for="latSlider">Latitude</label>
                <span class="value-display" id="latDisplay">45.0&deg; N</span>
            </div>
            <input type="range" id="latSlider" min="-665" max="665" value="450">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('compass');
        const ctx = canvas.getContext('2d');
        const daySlider = document.getElementById('daySlider');
        const latSlider = document.getElementById('latSlider');
        const azimuthValueEl = document.getElementById('azimuthValue');
        const azimuthDiffEl = document.getElementById('azimuthDiff');
        const dateDisplayEl = document.getElementById('dateDisplay');
        const latDisplayEl = document.getElementById('latDisplay');

        let dpr = window.devicePixelRatio || 1;
        let currentAzimuth = 90;
        let targetAzimuth = 90;
        let animationId;

        const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const MONTH_DAYS = [31,28,31,30,31,30,31,31,30,31,30,31];

        function dayToDate(day) {
            let d = day;
            for (let i = 0; i < 12; i++) {
                if (d <= MONTH_DAYS[i]) return MONTHS[i] + ' ' + d;
                d -= MONTH_DAYS[i];
            }
            return 'Dec 31';
        }

        function degToRad(d) { return d * Math.PI / 180; }
        function radToDeg(r) { return r * 180 / Math.PI; }

        function solarDeclination(dayOfYear) {
            return 23.44 * Math.sin(degToRad((360 / 365) * (dayOfYear - 81)));
        }

        function sunriseAzimuth(dayOfYear, latDeg) {
            const decl = solarDeclination(dayOfYear);
            const latRad = degToRad(latDeg);
            const declRad = degToRad(decl);
            const cosAz = Math.sin(declRad) / Math.cos(latRad);
            if (cosAz < -1 || cosAz > 1) return null; // no sunrise
            return radToDeg(Math.acos(cosAz));
        }

        function resize() {
            dpr = window.devicePixelRatio || 1;
            const maxSize = Math.min(window.innerWidth - 20, 560);
            const size = Math.max(300, maxSize);
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            canvas.width = size * dpr;
            canvas.height = size * dpr;
        }

        function annualRange(latDeg) {
            let minAz = 180, maxAz = 0;
            for (let d = 1; d <= 365; d++) {
                const az = sunriseAzimuth(d, latDeg);
                if (az !== null) {
                    minAz = Math.min(minAz, az);
                    maxAz = Math.max(maxAz, az);
                }
            }
            return { min: minAz, max: maxAz };
        }

        function drawCompass(azimuth) {
            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const radius = Math.min(cx, cy) * 0.82;

            ctx.clearRect(0, 0, w, h);
            ctx.save();

            // Outer glow
            const outerGlow = ctx.createRadialGradient(cx, cy, radius * 0.9, cx, cy, radius * 1.1);
            outerGlow.addColorStop(0, 'rgba(221, 161, 94, 0.05)');
            outerGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = outerGlow;
            ctx.fillRect(0, 0, w, h);

            // Concentric circles (vintage nautical feel)
            const circleRadii = [1.0, 0.88, 0.72, 0.55, 0.35, 0.15];
            circleRadii.forEach((r, i) => {
                ctx.beginPath();
                ctx.arc(cx, cy, radius * r, 0, Math.PI * 2);
                ctx.strokeStyle = i === 0
                    ? 'rgba(221, 161, 94, 0.5)'
                    : 'rgba(138, 154, 91, ' + (0.15 - i * 0.015) + ')';
                ctx.lineWidth = (i === 0 ? 2.5 : 1) * dpr;
                ctx.stroke();
            });

            // Degree markings
            for (let deg = 0; deg < 360; deg += 1) {
                const ang = degToRad(deg - 90); // 0=North
                const isMajor = deg % 10 === 0;
                const isMid = deg % 5 === 0;
                const innerR = isMajor ? radius * 0.9 : (isMid ? radius * 0.93 : radius * 0.95);
                const outerR = radius;

                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(ang) * innerR, cy + Math.sin(ang) * innerR);
                ctx.lineTo(cx + Math.cos(ang) * outerR, cy + Math.sin(ang) * outerR);
                ctx.strokeStyle = isMajor
                    ? 'rgba(254, 250, 224, 0.5)'
                    : 'rgba(254, 250, 224, 0.12)';
                ctx.lineWidth = (isMajor ? 1.5 : 0.5) * dpr;
                ctx.stroke();

                // Degree labels every 30 degrees
                if (deg % 30 === 0 && deg % 90 !== 0) {
                    const labelR = radius * 0.83;
                    const lx = cx + Math.cos(ang) * labelR;
                    const ly = cy + Math.sin(ang) * labelR;
                    ctx.save();
                    ctx.translate(lx, ly);
                    ctx.fillStyle = 'rgba(254, 250, 224, 0.35)';
                    ctx.font = (11 * dpr) + 'px Nunito, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(deg + '\u00B0', 0, 0);
                    ctx.restore();
                }
            }

            // Annual range arc
            const latDeg = parseInt(latSlider.value) / 10;
            const range = annualRange(latDeg);
            if (range.min < range.max) {
                // Azimuth measured from North; sunrise is from North clockwise
                const angMin = degToRad(range.min - 90);
                const angMax = degToRad(range.max - 90);
                ctx.beginPath();
                ctx.arc(cx, cy, radius * 0.98, angMin, angMax);
                ctx.strokeStyle = 'rgba(138, 154, 91, 0.35)';
                ctx.lineWidth = 8 * dpr;
                ctx.lineCap = 'round';
                ctx.stroke();

                // Fainter fill
                ctx.beginPath();
                ctx.arc(cx, cy, radius * 0.98, angMin, angMax);
                ctx.strokeStyle = 'rgba(138, 154, 91, 0.12)';
                ctx.lineWidth = 16 * dpr;
                ctx.stroke();
            }

            // Cardinal and intercardinal directions
            const directions = [
                { label: 'N', deg: 0, major: true },
                { label: 'NE', deg: 45, major: false },
                { label: 'E', deg: 90, major: true },
                { label: 'SE', deg: 135, major: false },
                { label: 'S', deg: 180, major: true },
                { label: 'SW', deg: 225, major: false },
                { label: 'W', deg: 270, major: true },
                { label: 'NW', deg: 315, major: false }
            ];

            directions.forEach(d => {
                const ang = degToRad(d.deg - 90);
                const labelR = radius * (d.major ? 1.1 : 1.08);
                const lx = cx + Math.cos(ang) * labelR;
                const ly = cy + Math.sin(ang) * labelR;

                ctx.fillStyle = d.major ? 'rgba(254, 250, 224, 0.85)' : 'rgba(254, 250, 224, 0.45)';
                ctx.font = (d.major ? 'bold ' + (18 * dpr) : (13 * dpr)) + 'px Lora, serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(d.label, lx, ly);

                // Decorative line for cardinals
                if (d.major) {
                    ctx.beginPath();
                    ctx.moveTo(cx + Math.cos(ang) * radius * 0.15, cy + Math.sin(ang) * radius * 0.15);
                    ctx.lineTo(cx + Math.cos(ang) * radius * 0.55, cy + Math.sin(ang) * radius * 0.55);
                    ctx.strokeStyle = 'rgba(138, 154, 91, 0.15)';
                    ctx.lineWidth = 1 * dpr;
                    ctx.stroke();
                }
            });

            // North pointer (decorative triangle)
            const nAng = degToRad(-90);
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(nAng) * radius * 0.6, cy + Math.sin(nAng) * radius * 0.6);
            ctx.lineTo(cx + Math.cos(degToRad(-95)) * radius * 0.52, cy + Math.sin(degToRad(-95)) * radius * 0.52);
            ctx.lineTo(cx + Math.cos(degToRad(-85)) * radius * 0.52, cy + Math.sin(degToRad(-85)) * radius * 0.52);
            ctx.closePath();
            ctx.fillStyle = 'rgba(188, 108, 37, 0.6)';
            ctx.fill();

            // Due East marker (dashed line)
            const eastAng = degToRad(0); // 90 - 90 = 0
            ctx.beginPath();
            ctx.setLineDash([6 * dpr, 4 * dpr]);
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(eastAng) * radius * 0.95, cy + Math.sin(eastAng) * radius * 0.95);
            ctx.strokeStyle = 'rgba(254, 250, 224, 0.25)';
            ctx.lineWidth = 1.5 * dpr;
            ctx.stroke();
            ctx.setLineDash([]);

            // "Due East" label
            const dueEastLabelR = radius * 0.68;
            ctx.save();
            ctx.translate(cx + Math.cos(eastAng) * dueEastLabelR, cy + Math.sin(eastAng) * dueEastLabelR);
            ctx.rotate(0);
            ctx.fillStyle = 'rgba(254, 250, 224, 0.3)';
            ctx.font = (10 * dpr) + 'px Nunito, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('Due East', 0, -4 * dpr);
            ctx.restore();

            // Sunrise line and sun icon
            if (azimuth !== null) {
                const sunAng = degToRad(azimuth - 90);
                const sunX = cx + Math.cos(sunAng) * radius * 0.95;
                const sunY = cy + Math.sin(sunAng) * radius * 0.95;

                // Dotted line from center to sun
                ctx.beginPath();
                ctx.setLineDash([4 * dpr, 6 * dpr]);
                ctx.moveTo(cx, cy);
                ctx.lineTo(sunX, sunY);
                ctx.strokeStyle = 'rgba(255, 179, 71, 0.5)';
                ctx.lineWidth = 2 * dpr;
                ctx.stroke();
                ctx.setLineDash([]);

                // Sun glow
                const sunGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 28 * dpr);
                sunGlow.addColorStop(0, 'rgba(255, 200, 50, 0.4)');
                sunGlow.addColorStop(0.5, 'rgba(255, 160, 30, 0.15)');
                sunGlow.addColorStop(1, 'transparent');
                ctx.fillStyle = sunGlow;
                ctx.fillRect(sunX - 40 * dpr, sunY - 40 * dpr, 80 * dpr, 80 * dpr);

                // Sun body
                ctx.beginPath();
                ctx.arc(sunX, sunY, 12 * dpr, 0, Math.PI * 2);
                ctx.fillStyle = '#FFB347';
                ctx.fill();
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 2 * dpr;
                ctx.stroke();

                // Sun rays
                for (let i = 0; i < 12; i++) {
                    const rayAng = (i / 12) * Math.PI * 2;
                    const innerR = 16 * dpr;
                    const outerR = (i % 2 === 0 ? 22 : 18) * dpr;
                    ctx.beginPath();
                    ctx.moveTo(sunX + Math.cos(rayAng) * innerR, sunY + Math.sin(rayAng) * innerR);
                    ctx.lineTo(sunX + Math.cos(rayAng) * outerR, sunY + Math.sin(rayAng) * outerR);
                    ctx.strokeStyle = 'rgba(255, 215, 0, 0.7)';
                    ctx.lineWidth = 1.5 * dpr;
                    ctx.stroke();
                }

                // Azimuth label near sun
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold ' + (13 * dpr) + 'px Nunito, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const labelOffset = 34 * dpr;
                const lx = sunX + Math.cos(sunAng) * labelOffset;
                const ly = sunY + Math.sin(sunAng) * labelOffset;
                ctx.fillText(azimuth.toFixed(1) + '\u00B0', lx, ly);
            }

            // Center decorative dot
            ctx.beginPath();
            ctx.arc(cx, cy, 4 * dpr, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(221, 161, 94, 0.7)';
            ctx.fill();

            ctx.restore();
        }

        function update() {
            const day = parseInt(daySlider.value);
            const latDeg = parseInt(latSlider.value) / 10;

            dateDisplayEl.textContent = dayToDate(day);
            const absLat = Math.abs(latDeg).toFixed(1);
            latDisplayEl.innerHTML = absLat + '&deg; ' + (latDeg >= 0 ? 'N' : 'S');

            targetAzimuth = sunriseAzimuth(day, latDeg);

            if (targetAzimuth === null) {
                azimuthValueEl.textContent = 'No sunrise at this latitude/date';
                azimuthDiffEl.textContent = 'Sun does not rise (polar night or midnight sun)';
                drawCompass(currentAzimuth);
                return;
            }

            const diff = targetAzimuth - 90;
            azimuthValueEl.innerHTML = 'Azimuth: ' + targetAzimuth.toFixed(1) + '&deg;';
            if (Math.abs(diff) < 0.1) {
                azimuthDiffEl.textContent = 'Exactly Due East';
            } else {
                const dir = diff > 0 ? 'south' : 'north';
                azimuthDiffEl.innerHTML = Math.abs(diff).toFixed(1) + '&deg; ' + dir + ' of Due East';
            }
        }

        function animate() {
            if (targetAzimuth !== null) {
                const diff = targetAzimuth - currentAzimuth;
                if (Math.abs(diff) > 0.05) {
                    currentAzimuth += diff * 0.12;
                } else {
                    currentAzimuth = targetAzimuth;
                }
            }
            drawCompass(currentAzimuth);
            animationId = requestAnimationFrame(animate);
        }

        daySlider.addEventListener('input', update);
        latSlider.addEventListener('input', update);

        window.addEventListener('resize', () => {
            resize();
        });

        resize();
        update();
        animate();
    </script>
</body>
</html>
