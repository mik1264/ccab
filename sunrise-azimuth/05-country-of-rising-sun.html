<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country of the Rising Sun</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
        --sage: #8A9A5B;
        --moss: #606C38;
        --earth: #DDA15E;
        --cream: #FEFAE0;
        --terracotta: #BC6C25;
        --dark-moss: #3d4423;
    }

    body {
        background: linear-gradient(135deg, #0a0e1a 0%, #111827 40%, #0f172a 100%);
        color: var(--cream);
        font-family: 'Nunito', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
    }

    .organic-back-link {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 50px;
        text-decoration: none;
        color: var(--cream);
        font-family: 'Nunito', sans-serif;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s ease;
    }
    .organic-back-link:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: translateX(-3px);
    }
    .back-arrow { font-size: 16px; }

    h1 {
        font-family: 'Lora', serif;

    .subtitle {

        font-style: italic;
    }

    .quote {
        font-family: 'Lora', serif;
        font-size: 0.85rem;
        color: rgba(254, 250, 224, 0.45);
        text-align: center;
        max-width: 480px;
        margin-bottom: 20px;
        font-style: italic;
    }

    #canvas-container {
        position: relative;
        width: 600px;
        height: 600px;
        max-width: 95vw;
        max-height: 60vh;
    }

    canvas {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        box-shadow: 0 0 60px rgba(221, 161, 94, 0.1), inset 0 0 40px rgba(0, 0, 0, 0.3);
    }

    .destination-label {
        font-family: 'Lora', serif;
        font-size: 1.3rem;
        text-align: center;
        margin: 16px 0 6px;
        min-height: 40px;
        color: var(--earth);
    }
    .destination-label span {
        font-weight: 700;
        font-size: 1.6rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 0 20px rgba(221, 161, 94, 0.5);
    }

    .azimuth-info {
        font-size: 0.85rem;
        color: rgba(254, 250, 224, 0.5);
        text-align: center;
        margin-bottom: 14px;
    }

    .controls {
        width: 500px;
        max-width: 90vw;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
    }

    .slider-row {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .slider-row label {
        font-size: 0.8rem;
        color: rgba(254, 250, 224, 0.6);
        min-width: 40px;
    }

    .slider-row .date-display {
        font-family: 'Lora', serif;
        font-size: 0.9rem;
        color: var(--earth);
        min-width: 90px;
        text-align: right;
    }

    input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 6px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.1);
        outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--earth);
        cursor: pointer;
        box-shadow: 0 0 10px rgba(221, 161, 94, 0.5);
    }
    input[type="range"]::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--earth);
        cursor: pointer;
        border: none;
        box-shadow: 0 0 10px rgba(221, 161, 94, 0.5);
    }

    .city-selector {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 8px;
    }

    .city-btn {
        font-family: 'Nunito', sans-serif;
        font-size: 0.8rem;
        padding: 6px 14px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.05);
        color: var(--cream);
        cursor: pointer;
        transition: all 0.3s ease;
    }
    .city-btn:hover {
        background: rgba(255, 255, 255, 0.12);
    }
    .city-btn.active {
        background: rgba(221, 161, 94, 0.25);
        border-color: var(--earth);
        color: var(--earth);
        font-weight: 600;
    }

    .key-dates {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 20px;
    }

    .key-date {
        font-size: 0.7rem;
        color: rgba(254, 250, 224, 0.4);
        cursor: pointer;
        padding: 3px 10px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: all 0.2s ease;
    }
    .key-date:hover {
        color: var(--earth);
        border-color: rgba(221, 161, 94, 0.3);
    }
</style>
</head>
<body>

<a href="../index.html" class="organic-back-link">
    <span class="back-arrow">&larr;</span>
    <span class="back-text">Gallery</span>
</a>

<h1>Country of the Rising Sun</h1>
<p class="subtitle">Which country does the sun rise from today?</p>
<p class="quote">"If you're in Cambridge, some days the country of the rising sun is Finland. Other days, it's Berlin."</p>

<div class="city-selector" id="citySelector"></div>

<div id="canvas-container">
    <canvas id="canvas"></canvas>
</div>

<div class="destination-label" id="destinationLabel"></div>
<div class="azimuth-info" id="azimuthInfo"></div>

<div class="controls">
    <div class="slider-row">
        <label>Date</label>
        <input type="range" id="daySlider" min="1" max="365" value="1">
        <div class="date-display" id="dateDisplay"></div>
    </div>
</div>

<div class="key-dates" id="keyDates"></div>

<script>
(function() {
    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;

    var cities = {
        cambridge: {
            name: 'Cambridge, UK',
            lat: 52.2,
            landmarks: [
                { name: 'Arctic / Norway', bearing: 0, dist: 0.85, country: 'Norway' },
                { name: 'Stockholm', bearing: 25, dist: 0.78, country: 'Sweden' },
                { name: 'Helsinki', bearing: 48, dist: 0.82, country: 'Finland' },
                { name: 'St. Petersburg', bearing: 55, dist: 0.88, country: 'Russia' },
                { name: 'Amsterdam', bearing: 82, dist: 0.45, country: 'Netherlands' },
                { name: 'Berlin', bearing: 97, dist: 0.6, country: 'Germany' },
                { name: 'Prague', bearing: 110, dist: 0.65, country: 'Czechia' },
                { name: 'Zurich', bearing: 135, dist: 0.62, country: 'Switzerland' },
                { name: 'Lyon', bearing: 155, dist: 0.58, country: 'France' },
                { name: 'Madrid', bearing: 190, dist: 0.75, country: 'Spain' },
                { name: 'Lisbon', bearing: 205, dist: 0.82, country: 'Portugal' },
                { name: 'Iceland', bearing: 325, dist: 0.9, country: 'Iceland' },
            ]
        },
        newyork: {
            name: 'New York, USA',
            lat: 40.7,
            landmarks: [
                { name: 'Montreal', bearing: 15, dist: 0.45, country: 'Canada' },
                { name: 'Halifax', bearing: 47, dist: 0.65, country: 'Canada' },
                { name: 'Azores', bearing: 72, dist: 0.85, country: 'Portugal' },
                { name: 'Lisbon', bearing: 80, dist: 0.92, country: 'Portugal' },
                { name: 'Casablanca', bearing: 95, dist: 0.88, country: 'Morocco' },
                { name: 'Bermuda', bearing: 130, dist: 0.55, country: 'Bermuda' },
                { name: 'Bahamas', bearing: 160, dist: 0.7, country: 'Bahamas' },
                { name: 'Miami', bearing: 195, dist: 0.6, country: 'USA (Florida)' },
                { name: 'Chicago', bearing: 275, dist: 0.55, country: 'USA (Midwest)' },
                { name: 'Toronto', bearing: 335, dist: 0.4, country: 'Canada' },
            ]
        },
        tokyo: {
            name: 'Tokyo, Japan',
            lat: 35.7,
            landmarks: [
                { name: 'Sakhalin', bearing: 15, dist: 0.75, country: 'Russia' },
                { name: 'Kamchatka', bearing: 35, dist: 0.88, country: 'Russia' },
                { name: 'Midway Atoll', bearing: 80, dist: 0.85, country: 'USA' },
                { name: 'Pacific Ocean', bearing: 100, dist: 0.9, country: 'Open Pacific' },
                { name: 'Guam', bearing: 155, dist: 0.78, country: 'USA (Guam)' },
                { name: 'Taiwan', bearing: 200, dist: 0.65, country: 'Taiwan' },
                { name: 'Shanghai', bearing: 235, dist: 0.6, country: 'China' },
                { name: 'Seoul', bearing: 255, dist: 0.5, country: 'South Korea' },
                { name: 'Vladivostok', bearing: 300, dist: 0.6, country: 'Russia' },
                { name: 'Hokkaido', bearing: 345, dist: 0.35, country: 'Japan' },
            ]
        },
        sydney: {
            name: 'Sydney, Australia',
            lat: -33.9,
            landmarks: [
                { name: 'Papua New Guinea', bearing: 350, dist: 0.75, country: 'PNG' },
                { name: 'Solomon Islands', bearing: 20, dist: 0.82, country: 'Solomon Islands' },
                { name: 'Fiji', bearing: 55, dist: 0.78, country: 'Fiji' },
                { name: 'New Zealand', bearing: 105, dist: 0.65, country: 'New Zealand' },
                { name: 'Tasman Sea', bearing: 140, dist: 0.7, country: 'Open Sea' },
                { name: 'Antarctica', bearing: 180, dist: 0.95, country: 'Antarctica' },
                { name: 'Melbourne', bearing: 215, dist: 0.35, country: 'Australia' },
                { name: 'Adelaide', bearing: 245, dist: 0.55, country: 'Australia' },
                { name: 'Perth', bearing: 260, dist: 0.85, country: 'Australia' },
                { name: 'Indonesia', bearing: 310, dist: 0.75, country: 'Indonesia' },
            ]
        }
    };

    var currentCity = 'cambridge';
    var currentDay = dayOfYear(new Date());
    var animatedAzimuth = 0;

    function dayOfYear(date) {
        var start = new Date(date.getFullYear(), 0, 0);
        var diff = date - start;
        return Math.floor(diff / 86400000);
    }

    function solarDeclination(day) {
        return 23.44 * Math.sin((2 * Math.PI / 365) * (day - 81));
    }

    function sunriseAzimuth(day, lat) {
        var decl = solarDeclination(day);
        var declRad = decl * Math.PI / 180;
        var latRad = lat * Math.PI / 180;
        var cosA = Math.sin(declRad) / Math.cos(latRad);
        cosA = Math.max(-1, Math.min(1, cosA));
        var A = Math.acos(cosA) * 180 / Math.PI;
        // Azimuth from North: sunrise is in the east half
        // A is the angle from due east measured toward north
        // Azimuth from north = 90 - (A - 90) when A > 90 ...
        // Actually: sunrise azimuth from north = A (already correct for northern hemisphere)
        // cos(azimuth) = sin(decl) / cos(lat) gives azimuth from due south measured westward
        // Let me use the proper formula:
        // sunrise hour angle H = -arccos(-tan(lat)*tan(decl))
        // azimuth = arccos( (sin(decl) - sin(lat)*cos(zenith)) / (cos(lat)*sin(zenith)) )
        // At sunrise zenith = 90, so cos(zenith)=0, sin(zenith)=1
        // azimuth from south = arccos( sin(decl) / cos(lat) )
        // For sunrise (east), azimuth from north = 180 - arccos(sin(decl)/cos(lat)) ... for northern hemisphere
        // Wait, let me think simply:
        // The formula cos(Az) = sin(decl)/cos(lat) gives the azimuth measured from due North (or South?)
        // Standard: at sunrise, Az from North:
        // Az_north = arccos( sin(decl) / cos(lat) ) -- this gives the angle, but need to handle hemisphere
        // Actually the direct formula: sunrise azimuth from north = arccos(sin(decl)/cos(lat))
        // For Cambridge (52.2N): summer solstice decl=23.44, cos(52.2)=0.6115
        // sin(23.44)/cos(52.2) = 0.3977/0.6115 = 0.650 -> arccos = 49.5 degrees from north
        // That means NE, which is correct for summer sunrise in northern latitudes
        // Winter solstice decl=-23.44: sin(-23.44)/cos(52.2) = -0.650 -> arccos = 130.5
        // 130.5 from north = SE, correct for winter
        return A;
    }

    function dayToDate(day) {
        var d = new Date(2026, 0, 1);
        d.setDate(d.getDate() + day - 1);
        var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        return months[d.getMonth()] + ' ' + d.getDate();
    }

    function findNearestLandmark(azimuth, landmarks) {
        var best = null;
        var bestDiff = 999;
        for (var i = 0; i < landmarks.length; i++) {
            var diff = Math.abs(azimuth - landmarks[i].bearing);
            if (diff > 180) diff = 360 - diff;
            if (diff < bestDiff) {
                bestDiff = diff;
                best = landmarks[i];
            }
        }
        return best;
    }

    function resize() {
        var container = document.getElementById('canvas-container');
        var size = Math.min(container.clientWidth, container.clientHeight);
        canvas.width = size * dpr;
        canvas.height = size * dpr;
        canvas.style.width = size + 'px';
        canvas.style.height = size + 'px';
    }

    function drawCompass(cx, cy, r) {
        // Outer ring
        ctx.strokeStyle = 'rgba(254, 250, 224, 0.1)';
        ctx.lineWidth = 2 * dpr;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();

        // Inner rings
        for (var i = 1; i <= 3; i++) {
            ctx.strokeStyle = 'rgba(254, 250, 224, ' + (0.03 + i * 0.01) + ')';
            ctx.lineWidth = 1 * dpr;
            ctx.beginPath();
            ctx.arc(cx, cy, r * i / 4, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Cardinal directions
        var cardinals = [
            { label: 'N', angle: -90 },
            { label: 'E', angle: 0 },
            { label: 'S', angle: 90 },
            { label: 'W', angle: 180 }
        ];
        ctx.font = (14 * dpr) + 'px Lora, serif';
        ctx.fillStyle = 'rgba(254, 250, 224, 0.3)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        for (var i = 0; i < cardinals.length; i++) {
            var a = cardinals[i].angle * Math.PI / 180;
            var lx = cx + Math.cos(a) * (r + 18 * dpr);
            var ly = cy + Math.sin(a) * (r + 18 * dpr);
            ctx.fillText(cardinals[i].label, lx, ly);
        }

        // Tick marks every 10 degrees
        for (var deg = 0; deg < 360; deg += 10) {
            var a = (deg - 90) * Math.PI / 180;
            var inner = deg % 30 === 0 ? r - 10 * dpr : r - 6 * dpr;
            ctx.strokeStyle = deg % 30 === 0 ? 'rgba(254, 250, 224, 0.15)' : 'rgba(254, 250, 224, 0.07)';
            ctx.lineWidth = (deg % 30 === 0 ? 1.5 : 1) * dpr;
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(a) * inner, cy + Math.sin(a) * inner);
            ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
            ctx.stroke();
        }
    }

    function drawLandmarks(cx, cy, r, landmarks, sunAz) {
        for (var i = 0; i < landmarks.length; i++) {
            var lm = landmarks[i];
            var a = (lm.bearing - 90) * Math.PI / 180;
            var d = lm.dist * r * 0.85;
            var lx = cx + Math.cos(a) * d;
            var ly = cy + Math.sin(a) * d;

            // Bearing line
            ctx.strokeStyle = 'rgba(254, 250, 224, 0.04)';
            ctx.lineWidth = 1 * dpr;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(lx, ly);
            ctx.stroke();

            // Check if this landmark is near the sun azimuth
            var diff = Math.abs(sunAz - lm.bearing);
            if (diff > 180) diff = 360 - diff;
            var highlight = diff < 15;

            // Dot
            var dotR = highlight ? 5 * dpr : 3 * dpr;
            ctx.beginPath();
            ctx.arc(lx, ly, dotR, 0, Math.PI * 2);
            if (highlight) {
                ctx.fillStyle = 'rgba(221, 161, 94, 0.9)';
                ctx.shadowColor = 'rgba(221, 161, 94, 0.6)';
                ctx.shadowBlur = 15 * dpr;
            } else {
                ctx.fillStyle = 'rgba(254, 250, 224, 0.35)';
                ctx.shadowBlur = 0;
            }
            ctx.fill();
            ctx.shadowBlur = 0;

            // Label
            ctx.font = (highlight ? 'bold ' : '') + (10 * dpr) + 'px Nunito, sans-serif';
            ctx.fillStyle = highlight ? 'rgba(221, 161, 94, 0.95)' : 'rgba(254, 250, 224, 0.4)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';

            // Offset label to avoid overlap with dot
            var labelOffset = -8 * dpr;
            // If bearing is in bottom half, put label above; otherwise handle via bearing
            ctx.fillText(lm.name, lx, ly + labelOffset);
        }
    }

    function drawSunBeam(cx, cy, r, azimuth) {
        var a = (azimuth - 90) * Math.PI / 180;
        var beamLen = r * 0.92;

        // Glow cone
        var spread = 8 * Math.PI / 180;
        var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, beamLen);
        grad.addColorStop(0, 'rgba(221, 161, 94, 0.0)');
        grad.addColorStop(0.3, 'rgba(221, 161, 94, 0.08)');
        grad.addColorStop(0.7, 'rgba(221, 161, 94, 0.15)');
        grad.addColorStop(1, 'rgba(221, 161, 94, 0.02)');

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a - spread) * beamLen, cy + Math.sin(a - spread) * beamLen);
        ctx.lineTo(cx + Math.cos(a + spread) * beamLen, cy + Math.sin(a + spread) * beamLen);
        ctx.closePath();
        ctx.fill();

        // Main beam line
        ctx.strokeStyle = 'rgba(221, 161, 94, 0.8)';
        ctx.lineWidth = 2.5 * dpr;
        ctx.shadowColor = 'rgba(221, 161, 94, 0.6)';
        ctx.shadowBlur = 20 * dpr;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * beamLen, cy + Math.sin(a) * beamLen);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Arrowhead
        var tipX = cx + Math.cos(a) * beamLen;
        var tipY = cy + Math.sin(a) * beamLen;
        var headLen = 14 * dpr;
        var headAngle = 25 * Math.PI / 180;

        ctx.fillStyle = 'rgba(221, 161, 94, 0.9)';
        ctx.shadowColor = 'rgba(221, 161, 94, 0.7)';
        ctx.shadowBlur = 15 * dpr;
        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.lineTo(tipX - Math.cos(a - headAngle) * headLen, tipY - Math.sin(a - headAngle) * headLen);
        ctx.lineTo(tipX - Math.cos(a + headAngle) * headLen, tipY - Math.sin(a + headAngle) * headLen);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;

        // Sun circle at the tip
        ctx.beginPath();
        ctx.arc(tipX, tipY, 8 * dpr, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(221, 161, 94, 0.9)';
        ctx.shadowColor = 'rgba(221, 161, 94, 0.8)';
        ctx.shadowBlur = 30 * dpr;
        ctx.fill();

        // Inner bright core
        ctx.beginPath();
        ctx.arc(tipX, tipY, 4 * dpr, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(254, 250, 224, 0.9)';
        ctx.fill();
        ctx.shadowBlur = 0;

        // Small rays
        for (var i = 0; i < 8; i++) {
            var rayA = (i / 8) * Math.PI * 2;
            ctx.strokeStyle = 'rgba(221, 161, 94, 0.4)';
            ctx.lineWidth = 1 * dpr;
            ctx.beginPath();
            ctx.moveTo(tipX + Math.cos(rayA) * 10 * dpr, tipY + Math.sin(rayA) * 10 * dpr);
            ctx.lineTo(tipX + Math.cos(rayA) * 15 * dpr, tipY + Math.sin(rayA) * 15 * dpr);
            ctx.stroke();
        }
    }

    function drawCenter(cx, cy) {
        // Observer dot
        ctx.beginPath();
        ctx.arc(cx, cy, 5 * dpr, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(138, 154, 91, 0.8)';
        ctx.fill();

        ctx.beginPath();
        ctx.arc(cx, cy, 2.5 * dpr, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(254, 250, 224, 0.8)';
        ctx.fill();
    }

    function drawAzimuthArc(cx, cy, r, minAz, maxAz) {
        // Show the range of sunrise azimuths across the year
        var arcR = r * 0.35;
        var startA = (minAz - 90) * Math.PI / 180;
        var endA = (maxAz - 90) * Math.PI / 180;

        ctx.strokeStyle = 'rgba(221, 161, 94, 0.12)';
        ctx.lineWidth = 3 * dpr;
        ctx.beginPath();
        ctx.arc(cx, cy, arcR, startA, endA);
        ctx.stroke();

        // Labels at ends
        ctx.font = (8 * dpr) + 'px Nunito, sans-serif';
        ctx.fillStyle = 'rgba(221, 161, 94, 0.35)';
        ctx.textAlign = 'center';

        var sx = cx + Math.cos(startA) * (arcR + 12 * dpr);
        var sy = cy + Math.sin(startA) * (arcR + 12 * dpr);
        ctx.fillText('Jun', sx, sy);

        var ex = cx + Math.cos(endA) * (arcR + 12 * dpr);
        var ey = cy + Math.sin(endA) * (arcR + 12 * dpr);
        ctx.fillText('Dec', ex, ey);
    }

    function draw() {
        var w = canvas.width;
        var h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        var cx = w / 2;
        var cy = h / 2;
        var r = Math.min(w, h) / 2 - 35 * dpr;

        // Background subtle gradient
        var bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.2);
        bg.addColorStop(0, 'rgba(15, 23, 42, 0.5)');
        bg.addColorStop(1, 'rgba(10, 14, 26, 0.8)');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, w, h);

        var city = cities[currentCity];
        var targetAzimuth = sunriseAzimuth(currentDay, city.lat);

        // Smooth animation
        var diff = targetAzimuth - animatedAzimuth;
        animatedAzimuth += diff * 0.12;

        // Compute min/max azimuth for this latitude
        var minAz = sunriseAzimuth(172, city.lat); // summer solstice ~day 172
        var maxAz = sunriseAzimuth(355, city.lat); // winter solstice ~day 355

        drawCompass(cx, cy, r);
        drawAzimuthArc(cx, cy, r, minAz, maxAz);
        drawLandmarks(cx, cy, r, city.landmarks, animatedAzimuth);
        drawSunBeam(cx, cy, r, animatedAzimuth);
        drawCenter(cx, cy);

        // Update labels
        var nearest = findNearestLandmark(animatedAzimuth, city.landmarks);
        var destEl = document.getElementById('destinationLabel');
        destEl.innerHTML = 'Today the sun rises from the direction of <span>' + nearest.country + '</span>';

        var infoEl = document.getElementById('azimuthInfo');
        infoEl.textContent = 'Sunrise azimuth: ' + animatedAzimuth.toFixed(1) + '\u00B0 from North \u00B7 Solar declination: ' + solarDeclination(currentDay).toFixed(1) + '\u00B0';

        requestAnimationFrame(draw);
    }

    // Build city buttons
    function buildCityButtons() {
        var container = document.getElementById('citySelector');
        var keys = Object.keys(cities);
        for (var i = 0; i < keys.length; i++) {
            (function(key) {
                var btn = document.createElement('button');
                btn.className = 'city-btn' + (key === currentCity ? ' active' : '');
                btn.textContent = cities[key].name;
                btn.addEventListener('click', function() {
                    currentCity = key;
                    var btns = container.querySelectorAll('.city-btn');
                    for (var j = 0; j < btns.length; j++) btns[j].classList.remove('active');
                    btn.classList.add('active');
                });
                container.appendChild(btn);
            })(keys[i]);
        }
    }

    // Build key dates
    function buildKeyDates() {
        var container = document.getElementById('keyDates');
        var dates = [
            { label: 'Vernal Equinox (Mar 20)', day: 79 },
            { label: 'Summer Solstice (Jun 21)', day: 172 },
            { label: 'Autumnal Equinox (Sep 22)', day: 265 },
            { label: 'Winter Solstice (Dec 21)', day: 355 },
            { label: 'Today', day: dayOfYear(new Date()) }
        ];
        var slider = document.getElementById('daySlider');
        for (var i = 0; i < dates.length; i++) {
            (function(d) {
                var el = document.createElement('span');
                el.className = 'key-date';
                el.textContent = d.label;
                el.addEventListener('click', function() {
                    currentDay = d.day;
                    slider.value = d.day;
                    document.getElementById('dateDisplay').textContent = dayToDate(d.day);
                });
                container.appendChild(el);
            })(dates[i]);
        }
    }

    // Slider
    var slider = document.getElementById('daySlider');
    slider.value = currentDay;
    document.getElementById('dateDisplay').textContent = dayToDate(currentDay);

    slider.addEventListener('input', function() {
        currentDay = parseInt(this.value);
        document.getElementById('dateDisplay').textContent = dayToDate(currentDay);
    });

    // Initialize animated azimuth
    animatedAzimuth = sunriseAzimuth(currentDay, cities[currentCity].lat);

    resize();
    buildCityButtons();
    buildKeyDates();
    window.addEventListener('resize', resize);
    draw();
})();
</script>
</body>
</html>
