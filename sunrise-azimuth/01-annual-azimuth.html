<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annual Sunrise Azimuth Curve</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FEFAE0 0%, #F4F1DE 50%, #EDE8D5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--dark-moss);
        }

        .organic-back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            text-decoration: none;
            color: var(--moss);
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(138, 154, 91, 0.2);
        }

        .organic-back-link:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateX(-4px);
            box-shadow: 0 4px 16px rgba(96, 108, 56, 0.15);
        }

        .back-arrow {
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .organic-back-link:hover .back-arrow {
            transform: translateX(-3px);
        }

        h1 {
            font-family: 'Lora', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--moss);
            margin: 24px 0 8px;
            text-align: center;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--sage);
            margin-bottom: 16px;
            text-align: center;
        }

        .chart-container {
            width: 95%;
            max-width: 1200px;
            flex: 1;
            min-height: 400px;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .controls {
            width: 95%;
            max-width: 1200px;
            padding: 20px 24px;
            margin: 16px 0 24px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(138, 154, 91, 0.2);
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            justify-content: center;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-group label {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--dark-moss);
            white-space: nowrap;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 220px;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, var(--sage), var(--earth));
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--moss);
            cursor: pointer;
            border: 3px solid var(--cream);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--moss);
            cursor: pointer;
            border: 3px solid var(--cream);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .lat-value {
            font-family: 'Lora', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--terracotta);
            min-width: 70px;
            text-align: right;
        }

        .presets {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .preset-btn {
            padding: 6px 14px;
            border: 1px solid rgba(138, 154, 91, 0.4);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.5);
            color: var(--dark-moss);
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .preset-btn:hover {
            background: var(--sage);
            color: white;
            border-color: var(--sage);
            transform: translateY(-1px);
            box-shadow: 0 3px 8px rgba(138, 154, 91, 0.3);
        }

        .preset-btn.active {
            background: var(--moss);
            color: white;
            border-color: var(--moss);
        }

        .spread-display {
            background: rgba(188, 108, 37, 0.1);
            border: 1px solid rgba(188, 108, 37, 0.3);
            border-radius: 12px;
            padding: 8px 16px;
            text-align: center;
        }

        .spread-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--terracotta);
            font-weight: 700;
        }

        .spread-value {
            font-family: 'Lora', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--terracotta);
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; margin-top: 60px; }
            .controls { padding: 14px 16px; gap: 12px; }
            input[type="range"] { width: 160px; }
            .preset-btn { font-size: 0.8rem; padding: 5px 10px; }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="organic-back-link">
        <span class="back-arrow">&larr;</span>
        <span class="back-text">Gallery</span>
    </a>

    <h1>Annual Sunrise Azimuth Curve</h1>
    <p class="subtitle">Sunrise compass bearing throughout the year</p>

    <div class="chart-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div class="slider-group">
            <label for="latSlider">Latitude:</label>
            <input type="range" id="latSlider" min="-66.5" max="66.5" step="0.1" value="51.5">
            <span class="lat-value" id="latValue">51.5&deg;</span>
        </div>

        <div class="spread-display">
            <div class="spread-label">Azimuth Spread</div>
            <div class="spread-value" id="spreadValue">--</div>
        </div>

        <div class="presets">
            <button class="preset-btn" data-lat="0">Equator 0&deg;</button>
            <button class="preset-btn active" data-lat="51.5">London 51.5&deg;</button>
            <button class="preset-btn" data-lat="52.2">Cambridge 52.2&deg;</button>
            <button class="preset-btn" data-lat="60.2">Helsinki 60.2&deg;</button>
            <button class="preset-btn" data-lat="64.1">Reykjavik 64.1&deg;</button>
            <button class="preset-btn" data-lat="-33.9">Sydney -33.9&deg;</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const latSlider = document.getElementById('latSlider');
        const latValueEl = document.getElementById('latValue');
        const spreadValueEl = document.getElementById('spreadValue');
        const presetBtns = document.querySelectorAll('.preset-btn');

        let latitude = 51.5;
        let animTime = 0;
        let dpr = window.devicePixelRatio || 1;

        const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const MONTH_DAYS = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334, 365];

        function degToRad(d) { return d * Math.PI / 180; }
        function radToDeg(r) { return r * 180 / Math.PI; }

        function solarDeclination(dayOfYear) {
            return 23.44 * Math.sin(degToRad((360 / 365) * (dayOfYear - 81)));
        }

        function sunriseAzimuth(dayOfYear, lat) {
            const decl = solarDeclination(dayOfYear);
            const cosLat = Math.cos(degToRad(lat));
            if (Math.abs(cosLat) < 1e-10) return 90;
            const sinDecl = Math.sin(degToRad(decl));
            let val = sinDecl / cosLat;
            val = Math.max(-1, Math.min(1, val));
            return radToDeg(Math.acos(val));
        }

        function getTodayDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            return Math.floor(diff / (1000 * 60 * 60 * 24));
        }

        function resize() {
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            const w = rect.width;
            const h = Math.max(400, window.innerHeight - 280);
            dpr = window.devicePixelRatio || 1;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
        }

        function draw() {
            animTime += 0.01;
            const w = canvas.width;
            const h = canvas.height;

            // Chart margins
            const ml = 72 * dpr;
            const mr = 30 * dpr;
            const mt = 30 * dpr;
            const mb = 50 * dpr;
            const cw = w - ml - mr;
            const ch = h - mt - mb;

            // Background
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.roundRect(0, 0, w, h, 16 * dpr);
            ctx.fill();

            // Compute azimuth range for current latitude
            let azimuths = [];
            for (let d = 1; d <= 365; d++) {
                azimuths.push(sunriseAzimuth(d, latitude));
            }
            const minAz = Math.min(...azimuths);
            const maxAz = Math.max(...azimuths);
            const spread = maxAz - minAz;

            // Y-axis range: pad a bit
            const yPad = Math.max(5, spread * 0.15);
            let yMin = Math.floor((minAz - yPad) / 5) * 5;
            let yMax = Math.ceil((maxAz + yPad) / 5) * 5;
            if (yMin < 0) yMin = 0;
            if (yMax > 180) yMax = 180;
            // Ensure 90 is in range
            if (yMin > 90) yMin = 85;
            if (yMax < 90) yMax = 95;
            const yRange = yMax - yMin;

            function xPos(day) {
                return ml + (day - 1) / 364 * cw;
            }
            function yPos(az) {
                return mt + (1 - (az - yMin) / yRange) * ch;
            }

            // Grid lines
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 1 * dpr;

            // Horizontal grid
            const yStep = yRange <= 30 ? 5 : yRange <= 60 ? 10 : 20;
            for (let v = yMin; v <= yMax; v += yStep) {
                const y = yPos(v);
                ctx.beginPath();
                ctx.moveTo(ml, y);
                ctx.lineTo(ml + cw, y);
                ctx.stroke();
            }

            // Vertical grid at month boundaries
            for (let m = 0; m < 12; m++) {
                const x = xPos(MONTH_DAYS[m] + 1);
                ctx.beginPath();
                ctx.moveTo(x, mt);
                ctx.lineTo(x, mt + ch);
                ctx.stroke();
            }

            // Due East dashed line at 90 degrees
            if (90 >= yMin && 90 <= yMax) {
                const y90 = yPos(90);
                ctx.save();
                ctx.strokeStyle = '#DDA15E';
                ctx.lineWidth = 1.5 * dpr;
                ctx.setLineDash([8 * dpr, 6 * dpr]);
                ctx.beginPath();
                ctx.moveTo(ml, y90);
                ctx.lineTo(ml + cw, y90);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();

                // Label
                ctx.fillStyle = '#DDA15E';
                ctx.font = `${12 * dpr}px Nunito, sans-serif`;
                ctx.textAlign = 'right';
                ctx.textBaseline = 'bottom';
                ctx.fillText('Due East', ml + cw - 6 * dpr, y90 - 4 * dpr);
            }

            // Shaded area between curve and 90 degrees
            if (90 >= yMin && 90 <= yMax) {
                const y90 = yPos(90);
                ctx.save();
                // Area above 90 (sunrise north of east)
                ctx.beginPath();
                ctx.moveTo(xPos(1), y90);
                for (let d = 1; d <= 365; d++) {
                    const x = xPos(d);
                    const y = yPos(azimuths[d - 1]);
                    if (d === 1) ctx.lineTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.lineTo(xPos(365), y90);
                ctx.closePath();
                ctx.fillStyle = 'rgba(138, 154, 91, 0.15)';
                ctx.fill();
                ctx.restore();
            }

            // Draw the azimuth curve
            ctx.save();
            ctx.beginPath();
            for (let d = 1; d <= 365; d++) {
                const x = xPos(d);
                const y = yPos(azimuths[d - 1]);
                if (d === 1) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = '#8A9A5B';
            ctx.lineWidth = 3 * dpr;
            ctx.lineJoin = 'round';
            ctx.stroke();

            // Glow effect
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.3)';
            ctx.lineWidth = 8 * dpr;
            ctx.stroke();
            ctx.restore();

            // Today's dot
            const today = getTodayDayOfYear();
            const todayAz = azimuths[today - 1] || azimuths[0];
            const todayX = xPos(today);
            const todayY = yPos(todayAz);
            const glowSize = (6 + Math.sin(animTime * 3) * 2) * dpr;

            ctx.save();
            ctx.shadowColor = '#DDA15E';
            ctx.shadowBlur = 20 * dpr;
            ctx.beginPath();
            ctx.arc(todayX, todayY, glowSize, 0, Math.PI * 2);
            ctx.fillStyle = '#DDA15E';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Today label
            ctx.fillStyle = '#FEFAE0';
            ctx.font = `bold ${11 * dpr}px Nunito, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('Today: ' + todayAz.toFixed(1) + '\u00B0', todayX, todayY - 12 * dpr);
            ctx.restore();

            // Axes
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1.5 * dpr;
            // Y axis
            ctx.beginPath();
            ctx.moveTo(ml, mt);
            ctx.lineTo(ml, mt + ch);
            ctx.stroke();
            // X axis
            ctx.beginPath();
            ctx.moveTo(ml, mt + ch);
            ctx.lineTo(ml + cw, mt + ch);
            ctx.stroke();

            // Y-axis labels
            ctx.fillStyle = 'rgba(254, 250, 224, 0.8)';
            ctx.font = `${12 * dpr}px Nunito, sans-serif`;
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            for (let v = yMin; v <= yMax; v += yStep) {
                const y = yPos(v);
                ctx.fillText(v + '\u00B0', ml - 8 * dpr, y);
                // Tick
                ctx.beginPath();
                ctx.moveTo(ml - 4 * dpr, y);
                ctx.lineTo(ml, y);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1 * dpr;
                ctx.stroke();
            }

            // Y-axis title
            ctx.save();
            ctx.fillStyle = 'rgba(254, 250, 224, 0.6)';
            ctx.font = `${13 * dpr}px Nunito, sans-serif`;
            ctx.translate(18 * dpr, mt + ch / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Azimuth (\u00B0 from North)', 0, 0);
            ctx.restore();

            // X-axis month labels
            ctx.fillStyle = 'rgba(254, 250, 224, 0.8)';
            ctx.font = `${12 * dpr}px Nunito, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            for (let m = 0; m < 12; m++) {
                const midDay = (MONTH_DAYS[m] + MONTH_DAYS[m + 1]) / 2;
                const x = xPos(midDay);
                ctx.fillText(MONTHS[m], x, mt + ch + 10 * dpr);

                // Tick at month boundary
                const tx = xPos(MONTH_DAYS[m] + 1);
                ctx.beginPath();
                ctx.moveTo(tx, mt + ch);
                ctx.lineTo(tx, mt + ch + 5 * dpr);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1 * dpr;
                ctx.stroke();
            }

            // Min/Max labels on curve
            const minDay = azimuths.indexOf(minAz) + 1;
            const maxDay = azimuths.indexOf(maxAz) + 1;

            ctx.fillStyle = 'rgba(188, 108, 37, 0.9)';
            ctx.font = `bold ${11 * dpr}px Nunito, sans-serif`;
            ctx.textAlign = 'center';

            // Max label
            ctx.textBaseline = 'bottom';
            ctx.fillText(maxAz.toFixed(1) + '\u00B0', xPos(maxDay), yPos(maxAz) - 8 * dpr);
            // Min label
            ctx.textBaseline = 'top';
            ctx.fillText(minAz.toFixed(1) + '\u00B0', xPos(minDay), yPos(minAz) + 8 * dpr);

            // Update spread display
            spreadValueEl.textContent = spread.toFixed(1) + '\u00B0';

            requestAnimationFrame(draw);
        }

        // Event listeners
        latSlider.addEventListener('input', function () {
            latitude = parseFloat(this.value);
            latValueEl.innerHTML = latitude.toFixed(1) + '&deg;';
            updatePresetHighlight();
        });

        presetBtns.forEach(btn => {
            btn.addEventListener('click', function () {
                const lat = parseFloat(this.dataset.lat);
                latitude = lat;
                latSlider.value = lat;
                latValueEl.innerHTML = lat.toFixed(1) + '&deg;';
                updatePresetHighlight();
            });
        });

        function updatePresetHighlight() {
            presetBtns.forEach(btn => {
                const bLat = parseFloat(btn.dataset.lat);
                btn.classList.toggle('active', Math.abs(bLat - latitude) < 0.05);
            });
        }

        // Resize handling
        let resizeTimer;
        window.addEventListener('resize', function () {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(resize, 100);
        });

        resize();
        draw();
    </script>
</body>
</html>
