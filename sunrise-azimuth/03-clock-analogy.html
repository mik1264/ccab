<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clock Analogy — Sunrise Azimuth</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #8A9A5B;
            --moss: #606C38;
            --earth: #DDA15E;
            --cream: #FEFAE0;
            --terracotta: #BC6C25;
            --dark-moss: #3d4423;
            --bg: #1a1a2e;
            --bg-light: #232340;
            --gold: #DDA15E;
            --gold-bright: #F0C775;
            --gold-dim: #A07830;
            --text: #E8E0D0;
            --text-dim: #9A9480;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .organic-back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: var(--cream);
            text-decoration: none;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .organic-back-link:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-3px);
        }

        .back-arrow {
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .organic-back-link:hover .back-arrow {
            transform: translateX(-3px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 40px;
        }

        header h1 {
            font-family: 'Lora', serif;
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--gold-bright);
            margin-bottom: 12px;
        }

        .quote {
            font-family: 'Lora', serif;
            font-style: italic;
            color: var(--text-dim);
            max-width: 640px;
            margin: 0 auto 10px;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .displays {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .display-panel {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .display-panel h2 {
            font-family: 'Lora', serif;
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 16px;
            font-weight: 500;
        }

        canvas {
            display: block;
            margin: 0 auto;
        }

        .range-text {
            text-align: center;
            margin-bottom: 24px;
            padding: 16px 24px;
            background: rgba(221, 161, 94, 0.1);
            border: 1px solid rgba(221, 161, 94, 0.2);
            border-radius: 14px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }

        .range-text .main {
            font-family: 'Lora', serif;
            font-size: 1.15rem;
            color: var(--gold-bright);
            margin-bottom: 4px;
        }

        .range-text .sub {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .equinox-note {
            color: var(--sage);
            font-weight: 600;
        }

        .controls {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 18px 22px;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: 500;
            color: var(--text);
            font-size: 0.95rem;
        }

        .control-group label span.value {
            color: var(--gold);
            font-family: 'Lora', serif;
            font-weight: 600;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(221, 161, 94, 0.4);
            transition: box-shadow 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            box-shadow: 0 0 18px rgba(221, 161, 94, 0.7);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--gold);
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(221, 161, 94, 0.4);
        }

        .presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .preset-btn {
            padding: 6px 14px;
            border: 1px solid rgba(221, 161, 94, 0.3);
            border-radius: 20px;
            background: rgba(221, 161, 94, 0.08);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .preset-btn:hover, .preset-btn.active {
            background: rgba(221, 161, 94, 0.25);
            border-color: var(--gold);
            color: var(--gold-bright);
        }

        .info-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .info-item {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .info-item strong {
            color: var(--gold);
        }

        @media (max-width: 700px) {
            .displays {
                gap: 20px;
            }
            header h1 {
                font-size: 1.6rem;
            }
            .quote {
                font-size: 0.92rem;
            }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="organic-back-link">
        <span class="back-arrow">&larr;</span>
        <span class="back-text">Gallery</span>
    </a>

    <div class="container">
        <header>
            <h1>The Clock Analogy</h1>
            <p class="quote">"It's as if a clock, from which we always expected to show three o'clock, instead showed anything from 1:30 to 4:30."</p>
        </header>

        <div class="displays">
            <div class="display-panel">
                <h2>Sunrise Clock</h2>
                <canvas id="clockCanvas" width="340" height="340"></canvas>
            </div>
            <div class="display-panel">
                <h2>Compass Azimuth</h2>
                <canvas id="compassCanvas" width="340" height="340"></canvas>
            </div>
        </div>

        <div class="range-text" id="rangeText">
            <div class="main" id="rangeMain"></div>
            <div class="sub" id="rangeSub"></div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>
                    Day of Year
                    <span class="value" id="dayLabel">80 — Mar 21</span>
                </label>
                <input type="range" id="daySlider" min="1" max="365" value="80">
                <div class="info-row" id="infoRow">
                    <span class="info-item">Declination: <strong id="declVal">0.0°</strong></span>
                    <span class="info-item">Azimuth: <strong id="azVal">90.0°</strong></span>
                    <span class="info-item">Clock: <strong id="clockVal">3:00</strong></span>
                </div>
            </div>

            <div class="control-group">
                <label>
                    Latitude
                    <span class="value" id="latLabel">52.2° N</span>
                </label>
                <input type="range" id="latSlider" min="0" max="66" value="52.2" step="0.1">
                <div class="presets" id="presets">
                    <button class="preset-btn" data-lat="0">Equator 0°</button>
                    <button class="preset-btn" data-lat="34.1">Los Angeles 34.1°</button>
                    <button class="preset-btn active" data-lat="52.2">Cambridge 52.2°</button>
                    <button class="preset-btn" data-lat="60.2">Helsinki 60.2°</button>
                    <button class="preset-btn" data-lat="64.1">Reykjavik 64.1°</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const clockCanvas = document.getElementById('clockCanvas');
        const compassCanvas = document.getElementById('compassCanvas');
        const clockCtx = clockCanvas.getContext('2d');
        const compassCtx = compassCanvas.getContext('2d');
        const daySlider = document.getElementById('daySlider');
        const latSlider = document.getElementById('latSlider');
        const dayLabel = document.getElementById('dayLabel');
        const latLabel = document.getElementById('latLabel');
        const rangeMain = document.getElementById('rangeMain');
        const rangeSub = document.getElementById('rangeSub');
        const declVal = document.getElementById('declVal');
        const azVal = document.getElementById('azVal');
        const clockValEl = document.getElementById('clockVal');

        const dpr = window.devicePixelRatio || 1;
        [clockCanvas, compassCanvas].forEach(c => {
            const w = c.width, h = c.height;
            c.width = w * dpr;
            c.height = h * dpr;
            c.style.width = w + 'px';
            c.style.height = h + 'px';
            c.getContext('2d').scale(dpr, dpr);
        });

        const CW = 340, CH = 340;
        const CX = CW / 2, CY = CH / 2;
        const RADIUS = 140;

        const GOLD = '#DDA15E';
        const GOLD_BRIGHT = '#F0C775';
        const GOLD_DIM = '#A07830';
        const SAGE = '#8A9A5B';
        const CREAM = '#FEFAE0';
        const TEXT_DIM = '#9A9480';
        const BG = '#1a1a2e';

        const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const monthDays = [31,28,31,30,31,30,31,31,30,31,30,31];

        function dayToDate(doy) {
            let d = doy;
            for (let m = 0; m < 12; m++) {
                if (d <= monthDays[m]) return monthNames[m] + ' ' + d;
                d -= monthDays[m];
            }
            return 'Dec 31';
        }

        function toRad(deg) { return deg * Math.PI / 180; }
        function toDeg(rad) { return rad * 180 / Math.PI; }

        function solarDeclination(doy) {
            return 23.44 * Math.sin(toRad((360 / 365) * (doy - 81)));
        }

        function sunriseAzimuth(doy, latDeg) {
            const decl = solarDeclination(doy);
            const latRad = toRad(latDeg);
            const sinDecl = Math.sin(toRad(decl));
            const cosLat = Math.cos(latRad);
            if (cosLat === 0) return 90;
            const ratio = sinDecl / cosLat;
            if (ratio < -1 || ratio > 1) return ratio > 0 ? 0 : 180;
            return toDeg(Math.acos(ratio));
        }

        function azimuthToClockHours(az) {
            return az / 30;
        }

        function clockTimeStr(hours) {
            const h = Math.floor(hours);
            const m = Math.round((hours - h) * 60);
            if (m === 60) return (h + 1) + ':00';
            return h + ':' + (m < 10 ? '0' : '') + m;
        }

        // Animated values
        let currentAzimuth = 90;
        let targetAzimuth = 90;

        function drawClockFace(ctx) {
            ctx.clearRect(0, 0, CW, CH);

            // Outer ring
            ctx.beginPath();
            ctx.arc(CX, CY, RADIUS + 10, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(221, 161, 94, 0.15)';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(221, 161, 94, 0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Hour markers
            for (let i = 1; i <= 12; i++) {
                const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
                const inner = RADIUS - 15;
                const outer = RADIUS - 4;
                ctx.beginPath();
                ctx.moveTo(CX + Math.cos(angle) * inner, CY + Math.sin(angle) * inner);
                ctx.lineTo(CX + Math.cos(angle) * outer, CY + Math.sin(angle) * outer);
                ctx.strokeStyle = i === 3 ? GOLD_BRIGHT : 'rgba(221, 161, 94, 0.5)';
                ctx.lineWidth = i === 3 ? 3 : 2;
                ctx.stroke();

                // Numbers
                const numR = RADIUS - 28;
                ctx.font = (i === 3 ? '600 16px' : '400 14px') + " 'Lora', serif";
                ctx.fillStyle = i === 3 ? GOLD_BRIGHT : TEXT_DIM;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(i, CX + Math.cos(angle) * numR, CY + Math.sin(angle) * numR);
            }

            // Minute ticks
            for (let i = 0; i < 60; i++) {
                if (i % 5 === 0) continue;
                const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
                const inner = RADIUS - 6;
                const outer = RADIUS - 2;
                ctx.beginPath();
                ctx.moveTo(CX + Math.cos(angle) * inner, CY + Math.sin(angle) * inner);
                ctx.lineTo(CX + Math.cos(angle) * outer, CY + Math.sin(angle) * outer);
                ctx.strokeStyle = 'rgba(221, 161, 94, 0.15)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function drawClockRange(ctx, latDeg) {
            // Find min/max azimuth across the year
            let minAz = 180, maxAz = 0;
            for (let d = 1; d <= 365; d++) {
                const az = sunriseAzimuth(d, latDeg);
                if (az < minAz) minAz = az;
                if (az > maxAz) maxAz = az;
            }
            const minHours = azimuthToClockHours(minAz);
            const maxHours = azimuthToClockHours(maxAz);

            // Draw range arc
            const startAngle = (minHours / 12) * Math.PI * 2 - Math.PI / 2;
            const endAngle = (maxHours / 12) * Math.PI * 2 - Math.PI / 2;

            ctx.beginPath();
            ctx.arc(CX, CY, RADIUS - 45, startAngle, endAngle);
            ctx.strokeStyle = 'rgba(138, 154, 91, 0.25)';
            ctx.lineWidth = 20;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Range boundary lines
            [startAngle, endAngle].forEach(a => {
                ctx.beginPath();
                ctx.moveTo(CX + Math.cos(a) * 50, CY + Math.sin(a) * 50);
                ctx.lineTo(CX + Math.cos(a) * (RADIUS - 35), CY + Math.sin(a) * (RADIUS - 35));
                ctx.strokeStyle = 'rgba(138, 154, 91, 0.3)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
            });

            return { minAz, maxAz, minHours, maxHours };
        }

        function drawExpectedMark(ctx) {
            // 3:00 = due east expected position
            const angle = (3 / 12) * Math.PI * 2 - Math.PI / 2;
            ctx.beginPath();
            ctx.moveTo(CX + Math.cos(angle) * 45, CY + Math.sin(angle) * 45);
            ctx.lineTo(CX + Math.cos(angle) * (RADIUS - 35), CY + Math.sin(angle) * (RADIUS - 35));
            ctx.strokeStyle = 'rgba(240, 199, 117, 0.2)';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Small label
            ctx.font = "500 10px 'Nunito', sans-serif";
            ctx.fillStyle = 'rgba(240, 199, 117, 0.4)';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText('due east', CX + Math.cos(angle) * (RADIUS - 32) + 4, CY + Math.sin(angle) * (RADIUS - 32));
        }

        function drawClockHand(ctx, azimuth) {
            const hours = azimuthToClockHours(azimuth);
            const angle = (hours / 12) * Math.PI * 2 - Math.PI / 2;
            const handLen = RADIUS - 50;

            // Glow
            ctx.save();
            ctx.shadowColor = 'rgba(221, 161, 94, 0.6)';
            ctx.shadowBlur = 12;

            // Hand
            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.lineTo(CX + Math.cos(angle) * handLen, CY + Math.sin(angle) * handLen);
            ctx.strokeStyle = GOLD_BRIGHT;
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Arrow tip
            const tipX = CX + Math.cos(angle) * handLen;
            const tipY = CY + Math.sin(angle) * handLen;
            const arrowSize = 8;
            ctx.beginPath();
            ctx.moveTo(tipX, tipY);
            ctx.lineTo(tipX + Math.cos(angle + 2.7) * arrowSize, tipY + Math.sin(angle + 2.7) * arrowSize);
            ctx.lineTo(tipX + Math.cos(angle - 2.7) * arrowSize, tipY + Math.sin(angle - 2.7) * arrowSize);
            ctx.closePath();
            ctx.fillStyle = GOLD_BRIGHT;
            ctx.fill();

            ctx.restore();

            // Center dot
            ctx.beginPath();
            ctx.arc(CX, CY, 6, 0, Math.PI * 2);
            ctx.fillStyle = GOLD;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(CX, CY, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1a2e';
            ctx.fill();
        }

        function drawCompass(ctx, azimuth) {
            ctx.clearRect(0, 0, CW, CH);

            // Outer ring
            ctx.beginPath();
            ctx.arc(CX, CY, RADIUS + 10, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(221, 161, 94, 0.15)';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(221, 161, 94, 0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Cardinal directions
            const dirs = [
                { label: 'N', deg: 0 },
                { label: 'E', deg: 90 },
                { label: 'S', deg: 180 },
                { label: 'W', deg: 270 }
            ];

            dirs.forEach(d => {
                const angle = toRad(d.deg) - Math.PI / 2;
                const inner = RADIUS - 15;
                const outer = RADIUS - 4;
                ctx.beginPath();
                ctx.moveTo(CX + Math.cos(angle) * inner, CY + Math.sin(angle) * inner);
                ctx.lineTo(CX + Math.cos(angle) * outer, CY + Math.sin(angle) * outer);
                ctx.strokeStyle = d.label === 'E' ? GOLD_BRIGHT : 'rgba(221, 161, 94, 0.5)';
                ctx.lineWidth = d.label === 'E' ? 3 : 2;
                ctx.stroke();

                const numR = RADIUS - 28;
                ctx.font = (d.label === 'E' ? '600 16px' : '400 14px') + " 'Lora', serif";
                ctx.fillStyle = d.label === 'E' ? GOLD_BRIGHT : TEXT_DIM;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(d.label, CX + Math.cos(angle) * numR, CY + Math.sin(angle) * numR);
            });

            // Intercardinals
            const inter = [
                { label: 'NE', deg: 45 },
                { label: 'SE', deg: 135 },
                { label: 'SW', deg: 225 },
                { label: 'NW', deg: 315 }
            ];

            inter.forEach(d => {
                const angle = toRad(d.deg) - Math.PI / 2;
                const inner = RADIUS - 10;
                const outer = RADIUS - 4;
                ctx.beginPath();
                ctx.moveTo(CX + Math.cos(angle) * inner, CY + Math.sin(angle) * inner);
                ctx.lineTo(CX + Math.cos(angle) * outer, CY + Math.sin(angle) * outer);
                ctx.strokeStyle = 'rgba(221, 161, 94, 0.25)';
                ctx.lineWidth = 1;
                ctx.stroke();

                const numR = RADIUS - 24;
                ctx.font = "300 10px 'Nunito', sans-serif";
                ctx.fillStyle = 'rgba(154, 148, 128, 0.6)';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(d.label, CX + Math.cos(angle) * numR, CY + Math.sin(angle) * numR);
            });

            // Degree ticks
            for (let i = 0; i < 360; i += 10) {
                if (i % 90 === 0 || i % 45 === 0) continue;
                const angle = toRad(i) - Math.PI / 2;
                const inner = RADIUS - 6;
                const outer = RADIUS - 2;
                ctx.beginPath();
                ctx.moveTo(CX + Math.cos(angle) * inner, CY + Math.sin(angle) * inner);
                ctx.lineTo(CX + Math.cos(angle) * outer, CY + Math.sin(angle) * outer);
                ctx.strokeStyle = 'rgba(221, 161, 94, 0.12)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Due east line
            const eastAngle = toRad(90) - Math.PI / 2;
            ctx.beginPath();
            ctx.moveTo(CX + Math.cos(eastAngle) * 45, CY + Math.sin(eastAngle) * 45);
            ctx.lineTo(CX + Math.cos(eastAngle) * (RADIUS - 35), CY + Math.sin(eastAngle) * (RADIUS - 35));
            ctx.strokeStyle = 'rgba(240, 199, 117, 0.2)';
            ctx.lineWidth = 2;
            ctx.setLineDash([6, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Sunrise direction - sun icon
            const sunAngle = toRad(azimuth) - Math.PI / 2;
            const sunDist = RADIUS - 55;
            const sunX = CX + Math.cos(sunAngle) * sunDist;
            const sunY = CY + Math.sin(sunAngle) * sunDist;

            // Direction line
            ctx.save();
            ctx.shadowColor = 'rgba(221, 161, 94, 0.5)';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.lineTo(sunX, sunY);
            ctx.strokeStyle = GOLD;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();

            // Sun circle
            ctx.save();
            ctx.shadowColor = 'rgba(240, 199, 117, 0.8)';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(sunX, sunY, 10, 0, Math.PI * 2);
            ctx.fillStyle = GOLD_BRIGHT;
            ctx.fill();
            ctx.restore();

            // Sun rays
            for (let i = 0; i < 8; i++) {
                const rayAngle = (i / 8) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(sunX + Math.cos(rayAngle) * 13, sunY + Math.sin(rayAngle) * 13);
                ctx.lineTo(sunX + Math.cos(rayAngle) * 17, sunY + Math.sin(rayAngle) * 17);
                ctx.strokeStyle = GOLD;
                ctx.lineWidth = 1.5;
                ctx.lineCap = 'round';
                ctx.stroke();
            }

            // Center dot
            ctx.beginPath();
            ctx.arc(CX, CY, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(221, 161, 94, 0.5)';
            ctx.fill();

            // Azimuth label
            ctx.font = "600 13px 'Nunito', sans-serif";
            ctx.fillStyle = GOLD;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(azimuth.toFixed(1) + '°', CX, CY + RADIUS + 20);
        }

        function getLocationName(lat) {
            const presets = {
                0: 'the Equator',
                34.1: 'Los Angeles',
                52.2: 'Cambridge',
                60.2: 'Helsinki',
                64.1: 'Reykjavik'
            };
            for (const [k, v] of Object.entries(presets)) {
                if (Math.abs(lat - parseFloat(k)) < 0.5) return v;
            }
            return lat.toFixed(1) + '° N';
        }

        function isEquinox(doy) {
            return (doy >= 79 && doy <= 81) || (doy >= 265 && doy <= 267);
        }

        function update() {
            const doy = parseInt(daySlider.value);
            const lat = parseFloat(latSlider.value);

            const decl = solarDeclination(doy);
            targetAzimuth = sunriseAzimuth(doy, lat);

            // Smooth animation
            currentAzimuth += (targetAzimuth - currentAzimuth) * 0.15;
            if (Math.abs(currentAzimuth - targetAzimuth) < 0.01) currentAzimuth = targetAzimuth;

            const clockHours = azimuthToClockHours(currentAzimuth);

            // Update labels
            dayLabel.textContent = doy + ' — ' + dayToDate(doy);
            latLabel.textContent = lat.toFixed(1) + '° N';
            declVal.textContent = decl.toFixed(1) + '°';
            azVal.textContent = currentAzimuth.toFixed(1) + '°';
            clockValEl.textContent = clockTimeStr(clockHours);

            // Draw clock
            drawClockFace(clockCtx);
            const range = drawClockRange(clockCtx, lat);
            drawExpectedMark(clockCtx);
            drawClockHand(clockCtx, currentAzimuth);

            // Draw compass
            drawCompass(compassCtx, currentAzimuth);

            // Update range text
            const spread = range.maxAz - range.minAz;
            const locName = getLocationName(lat);

            if (isEquinox(doy)) {
                rangeMain.innerHTML = 'At ' + locName + ': the clock shows ' +
                    clockTimeStr(range.minHours) + ' to ' + clockTimeStr(range.maxHours) +
                    ' (spread: ' + spread.toFixed(0) + '°)';
                rangeSub.innerHTML = '<span class="equinox-note">Today is near an equinox — the clock shows exactly 3:00!</span>';
            } else {
                rangeMain.innerHTML = 'At ' + locName + ': the clock shows ' +
                    clockTimeStr(range.minHours) + ' to ' + clockTimeStr(range.maxHours) +
                    ' (spread: ' + spread.toFixed(0) + '°)';
                rangeSub.textContent = 'It only shows exactly 3:00 (due east) twice a year, at the equinoxes.';
            }

            // Update preset button states
            document.querySelectorAll('.preset-btn').forEach(btn => {
                const pLat = parseFloat(btn.dataset.lat);
                btn.classList.toggle('active', Math.abs(lat - pLat) < 0.5);
            });

            requestAnimationFrame(update);
        }

        daySlider.addEventListener('input', () => {});
        latSlider.addEventListener('input', () => {});

        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                latSlider.value = btn.dataset.lat;
            });
        });

        update();
    </script>
</body>
</html>
