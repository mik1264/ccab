<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Costco Receipt Agent{% endblock %}</title>
  <style>
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --ink: #1f2328;
      --muted: #6e7781;
      --accent: #0969da;
      --good: #1a7f37;
      --warn: #bf8700;
      --line: #d0d7de;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 24px;
      background: var(--bg); color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; }
    header h1 { margin: 0; font-size: 22px; }
    header .sub { color: var(--muted); font-size: 13px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .grid { display: grid; gap: 16px; grid-template-columns: 2fr 1fr; }
    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 8px; padding: 18px;
    }
    .card h2 { margin: 0 0 12px 0; font-size: 16px; }
    .card .desc { color: var(--muted); font-size: 13px; margin-top: -6px; margin-bottom: 12px; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 12px; background: #ddf4ff; color: #0969da;
    }
    .savings { color: var(--good); font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { color: var(--muted); font-weight: 500; }
    form.inline { display: inline; }
    button, input[type="submit"] {
      background: var(--accent); color: white; border: 0;
      padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 14px;
    }
    button.secondary { background: white; color: var(--ink); border: 1px solid var(--line); }
    button.danger { background: white; color: #cf222e; border: 1px solid var(--line); }
    input[type="file"] { font-size: 13px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .total {
      background: #fff8c5; border: 1px solid #d4a72c; border-radius: 6px;
      padding: 12px 16px; margin-bottom: 16px;
    }
    code { background: #f6f8fa; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>Costco Receipt Agent</h1>
        <div class="sub">Local recreation of the AWS agent &mdash; OCR by Anthropic Claude Haiku.</div>
      </div>
      <div class="sub"><a href="/">Home</a></div>
    </header>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
