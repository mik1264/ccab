<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Star Map - Constellation Myths</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #info-panel {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10,10,26,0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(138,154,91,0.3); border-radius: 12px;
            padding: 12px 20px; color: #FEFAE0; font-size: 0.9rem;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
            max-width: 400px; text-align: center;
        }
        #info-panel.visible { opacity: 1; }
        #info-panel .star-name { color: #DDA15E; font-weight: 700; font-size: 1.1rem; }
        #info-panel .star-detail { color: #8A9A5B; margin-top: 4px; }
        #controls {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            display: flex; flex-direction: column; gap: 6px;
        }
        .ctrl-btn {
            background: rgba(10,10,26,0.7); border: 1px solid rgba(138,154,91,0.4);
            color: #8A9A5B; padding: 6px 12px; border-radius: 8px; cursor: pointer;
            font-size: 0.8rem; transition: all 0.2s;
        }
        .ctrl-btn:hover { background: rgba(138,154,91,0.2); color: #DDA15E; }
        .ctrl-btn.active { background: rgba(138,154,91,0.3); color: #DDA15E; border-color: #DDA15E; }
        #coord-display {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            color: rgba(138,154,91,0.6); font-size: 0.75rem; z-index: 1000;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="coord-display">RA 0h 0m | Dec +0&deg;</div>
    <div id="controls">
        <button class="ctrl-btn active" id="btn-lines">Lines</button>
        <button class="ctrl-btn active" id="btn-names">Names</button>
        <button class="ctrl-btn" id="btn-grid">Grid</button>
        <button class="ctrl-btn active" id="btn-milkyway">Milky Way</button>
    </div>
    <div id="info-panel">
        <div class="star-name"></div>
        <div class="star-detail"></div>
    </div>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const infoPanel = document.getElementById('info-panel');
    const coordDisplay = document.getElementById('coord-display');

    let W, H;
    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    resize();
    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resize, 150); });

    // State
    let centerRA = 6.0, centerDec = 20.0;
    let fov = 90;
    let dragging = false, lastX = 0, lastY = 0;
    let showLines = true, showNames = true, showGrid = false, showMilkyWay = true;
    let hoveredStar = null;

    // Toggle buttons
    document.getElementById('btn-lines').addEventListener('click', function() { showLines = !showLines; this.classList.toggle('active'); });
    document.getElementById('btn-names').addEventListener('click', function() { showNames = !showNames; this.classList.toggle('active'); });
    document.getElementById('btn-grid').addEventListener('click', function() { showGrid = !showGrid; this.classList.toggle('active'); });
    document.getElementById('btn-milkyway').addEventListener('click', function() { showMilkyWay = !showMilkyWay; this.classList.toggle('active'); });

    // Star catalog - bright stars with RA (hours), Dec (degrees), magnitude, name
    const stars = [
        // Orion
        { ra: 5.919, dec: 7.407, mag: 0.42, name: 'Betelgeuse', con: 'Orion', bayer: 'Alpha Ori', spec: 'M2', myth: 'The Hunter\'s shoulder. A red supergiant nearing its end.' },
        { ra: 5.242, dec: -8.202, mag: 0.12, name: 'Rigel', con: 'Orion', bayer: 'Beta Ori', spec: 'B8', myth: 'The Hunter\'s foot. A blue supergiant 860 light-years away.' },
        { ra: 5.679, dec: -1.943, mag: 1.70, name: 'Alnilam', con: 'Orion', bayer: 'Epsilon Ori', spec: 'B0', myth: 'The middle belt star. "String of pearls" in Arabic.' },
        { ra: 5.604, dec: -1.202, mag: 1.77, name: 'Alnitak', con: 'Orion', bayer: 'Zeta Ori', spec: 'O9', myth: 'The eastern belt star. One of the hottest stars visible to the naked eye.' },
        { ra: 5.534, dec: -2.600, mag: 2.23, name: 'Mintaka', con: 'Orion', bayer: 'Delta Ori', spec: 'O9', myth: 'The western belt star. Almost exactly on the celestial equator.' },
        { ra: 5.418, dec: 6.350, mag: 1.64, name: 'Bellatrix', con: 'Orion', bayer: 'Gamma Ori', spec: 'B2', myth: 'The Female Warrior. Orion\'s left shoulder.' },
        { ra: 5.796, dec: -9.670, mag: 2.06, name: 'Saiph', con: 'Orion', bayer: 'Kappa Ori', spec: 'B0', myth: 'The Sword of the Giant.' },
        // Ursa Major (Big Dipper)
        { ra: 11.062, dec: 61.751, mag: 1.79, name: 'Dubhe', con: 'Ursa Major', bayer: 'Alpha UMa', spec: 'K0', myth: 'The Bear\'s back. Points to Polaris.' },
        { ra: 11.031, dec: 56.382, mag: 2.37, name: 'Merak', con: 'Ursa Major', bayer: 'Beta UMa', spec: 'A1', myth: 'The Bear\'s flank. Pointer star to Polaris.' },
        { ra: 11.897, dec: 53.695, mag: 2.44, name: 'Phecda', con: 'Ursa Major', bayer: 'Gamma UMa', spec: 'A0', myth: 'The Bear\'s thigh.' },
        { ra: 12.257, dec: 57.033, mag: 3.31, name: 'Megrez', con: 'Ursa Major', bayer: 'Delta UMa', spec: 'A3', myth: 'The root of the Bear\'s tail.' },
        { ra: 12.900, dec: 55.960, mag: 1.77, name: 'Alioth', con: 'Ursa Major', bayer: 'Epsilon UMa', spec: 'A1', myth: 'The brightest star in Ursa Major.' },
        { ra: 13.399, dec: 54.926, mag: 2.27, name: 'Mizar', con: 'Ursa Major', bayer: 'Zeta UMa', spec: 'A2', myth: 'Famous double star. Ancient eye test with Alcor.' },
        { ra: 13.792, dec: 49.313, mag: 1.86, name: 'Alkaid', con: 'Ursa Major', bayer: 'Eta UMa', spec: 'B3', myth: 'The end of the Bear\'s tail. "Leader of the mourners."' },
        // Scorpius
        { ra: 16.490, dec: -26.432, mag: 0.96, name: 'Antares', con: 'Scorpius', bayer: 'Alpha Sco', spec: 'M1', myth: 'The Rival of Mars. A red supergiant 550x the Sun\'s diameter.' },
        { ra: 17.560, dec: -37.104, mag: 1.63, name: 'Shaula', con: 'Scorpius', bayer: 'Lambda Sco', spec: 'B2', myth: 'The Scorpion\'s stinger.' },
        { ra: 16.006, dec: -22.622, mag: 2.56, name: 'Dschubba', con: 'Scorpius', bayer: 'Delta Sco', spec: 'B0', myth: 'The Scorpion\'s forehead.' },
        { ra: 16.836, dec: -34.293, mag: 2.29, name: 'Sargas', con: 'Scorpius', bayer: 'Theta Sco', spec: 'F1', myth: 'Tail of the Scorpion.' },
        // Lyra
        { ra: 18.616, dec: 38.784, mag: 0.03, name: 'Vega', con: 'Lyra', bayer: 'Alpha Lyr', spec: 'A0', myth: 'The Harp Star. Future north star in 13,000 years. The standard for magnitude 0.' },
        // Cygnus
        { ra: 20.691, dec: 45.280, mag: 1.25, name: 'Deneb', con: 'Cygnus', bayer: 'Alpha Cyg', spec: 'A2', myth: 'The Tail of the Swan. One of the most luminous stars known.' },
        { ra: 19.512, dec: 27.960, mag: 2.23, name: 'Albireo', con: 'Cygnus', bayer: 'Beta Cyg', spec: 'K3', myth: 'The Beak of the Swan. Stunning gold and blue double star.' },
        // Aquila
        { ra: 19.846, dec: 8.868, mag: 0.77, name: 'Altair', con: 'Aquila', bayer: 'Alpha Aql', spec: 'A7', myth: 'The Flying Eagle. One of the closest bright stars at 17 light-years.' },
        // Taurus
        { ra: 4.598, dec: 16.509, mag: 0.85, name: 'Aldebaran', con: 'Taurus', bayer: 'Alpha Tau', spec: 'K5', myth: 'The Eye of the Bull. "The Follower" — it follows the Pleiades.' },
        // Gemini
        { ra: 7.755, dec: 28.026, mag: 1.14, name: 'Pollux', con: 'Gemini', bayer: 'Beta Gem', spec: 'K0', myth: 'The immortal twin. The closest giant star to the Sun.' },
        { ra: 7.577, dec: 31.888, mag: 1.58, name: 'Castor', con: 'Gemini', bayer: 'Alpha Gem', spec: 'A1', myth: 'The mortal twin. Actually a system of six stars.' },
        // Canis Major
        { ra: 6.752, dec: -16.716, mag: -1.46, name: 'Sirius', con: 'Canis Major', bayer: 'Alpha CMa', spec: 'A1', myth: 'The Dog Star. Brightest star in the night sky. Herald of the Nile flood.' },
        // Leo
        { ra: 10.140, dec: 11.967, mag: 1.35, name: 'Regulus', con: 'Leo', bayer: 'Alpha Leo', spec: 'B8', myth: 'The Heart of the Lion. "Little King" in Latin.' },
        { ra: 11.817, dec: 14.572, mag: 2.14, name: 'Denebola', con: 'Leo', bayer: 'Beta Leo', spec: 'A3', myth: 'The Tail of the Lion.' },
        // Virgo
        { ra: 13.420, dec: -11.161, mag: 0.97, name: 'Spica', con: 'Virgo', bayer: 'Alpha Vir', spec: 'B1', myth: 'The Ear of Wheat. Used by Hipparchus to discover precession.' },
        // Ursa Minor
        { ra: 2.530, dec: 89.264, mag: 1.98, name: 'Polaris', con: 'Ursa Minor', bayer: 'Alpha UMi', spec: 'F7', myth: 'The North Star. Currently 0.7° from the celestial pole. A Cepheid variable.' },
        // Bootes
        { ra: 14.261, dec: 19.182, mag: -0.05, name: 'Arcturus', con: 'Bootes', bayer: 'Alpha Boo', spec: 'K1', myth: 'The Bear Watcher. Fourth brightest star in the sky. A red giant.' },
        // Centaurus
        { ra: 14.660, dec: -60.835, mag: -0.01, name: 'Alpha Centauri', con: 'Centaurus', bayer: 'Alpha Cen', spec: 'G2', myth: 'The closest star system to the Sun at 4.37 light-years.' },
        // Auriga
        { ra: 5.278, dec: 45.998, mag: 0.08, name: 'Capella', con: 'Auriga', bayer: 'Alpha Aur', spec: 'G5', myth: 'The She-Goat. Sixth brightest star. A quadruple star system.' },
        // Crux
        { ra: 12.443, dec: -63.099, mag: 0.77, name: 'Acrux', con: 'Crux', bayer: 'Alpha Cru', spec: 'B0', myth: 'The foot of the Southern Cross. Brightest star in Crux.' },
        { ra: 12.795, dec: -59.689, mag: 1.25, name: 'Mimosa', con: 'Crux', bayer: 'Beta Cru', spec: 'B0', myth: 'Left arm of the Southern Cross.' },
        // Eridanus
        { ra: 1.629, dec: -57.237, mag: 0.46, name: 'Achernar', con: 'Eridanus', bayer: 'Alpha Eri', spec: 'B6', myth: 'End of the River. Flattest star known, spinning near breakup speed.' },
        // Draco
        { ra: 14.073, dec: 64.376, mag: 3.65, name: 'Thuban', con: 'Draco', bayer: 'Alpha Dra', spec: 'A0', myth: 'North Star of the ancient Egyptians when the pyramids were built (3000 BC).' },
        // Cassiopeia
        { ra: 0.675, dec: 56.537, mag: 2.24, name: 'Schedar', con: 'Cassiopeia', bayer: 'Alpha Cas', spec: 'K0', myth: 'The Breast of Cassiopeia. The vain queen punished by Poseidon.' },
        { ra: 0.153, dec: 59.150, mag: 2.27, name: 'Caph', con: 'Cassiopeia', bayer: 'Beta Cas', spec: 'F2', myth: 'The Hand. A Delta Scuti variable star.' },
        // Perseus
        { ra: 3.405, dec: 49.861, mag: 1.79, name: 'Mirfak', con: 'Perseus', bayer: 'Alpha Per', spec: 'F5', myth: 'The Elbow. Hero who slew Medusa.' },
        { ra: 3.136, dec: 40.957, mag: 2.12, name: 'Algol', con: 'Perseus', bayer: 'Beta Per', spec: 'B8', myth: 'The Demon Star. Famous eclipsing binary, winks every 2.87 days.' },
    ];

    // Constellation line connections
    const constellationLines = {
        'Orion': [[0,5],[5,4],[4,3],[3,2],[2,6],[6,1],[0,3],[5,2],[1,2]],
        'Ursa Major': [[7,8],[8,9],[9,10],[10,11],[11,12],[12,13]],
        'Scorpius': [[16,14],[14,17],[17,15]],
        'Cygnus': [[19,20]],
        'Gemini': [[23,24]],
        'Leo': [[26,27]],
        'Crux': [[33,34]],
        'Cassiopeia': [[37,38]],
    };

    // Background stars
    const bgStars = [];
    for (let i = 0; i < 2000; i++) {
        bgStars.push({
            ra: Math.random() * 24,
            dec: (Math.random() - 0.5) * 180,
            mag: 3 + Math.random() * 3,
            twinkle: Math.random() * Math.PI * 2
        });
    }

    // Milky Way band (simplified RA bands)
    const milkyWayRA = [
        { ra: 18, dec: -30, width: 25 },
        { ra: 19, dec: -20, width: 22 },
        { ra: 20, dec: -5, width: 20 },
        { ra: 21, dec: 10, width: 18 },
        { ra: 22, dec: 20, width: 15 },
        { ra: 23, dec: 30, width: 12 },
        { ra: 0, dec: 40, width: 10 },
        { ra: 1, dec: 50, width: 12 },
        { ra: 2, dec: 55, width: 14 },
        { ra: 3, dec: 50, width: 16 },
        { ra: 4, dec: 40, width: 18 },
        { ra: 5, dec: 20, width: 20 },
        { ra: 6, dec: 5, width: 22 },
        { ra: 7, dec: -10, width: 24 },
        { ra: 8, dec: -25, width: 20 },
    ];

    // Project RA/Dec to screen coordinates (stereographic)
    function project(ra, dec) {
        const scale = Math.min(W, H) / fov;
        const dRA = ((ra - centerRA + 36) % 24 - 12) * 15; // degrees
        const dDec = dec - centerDec;
        const cosCenter = Math.cos(centerDec * Math.PI / 180);
        const x = W / 2 - dRA * scale * cosCenter / 15;
        const y = H / 2 - dDec * scale / 15;
        return { x, y };
    }

    // Unproject screen to RA/Dec
    function unproject(sx, sy) {
        const scale = Math.min(W, H) / fov;
        const cosCenter = Math.cos(centerDec * Math.PI / 180);
        const dRA = -(sx - W / 2) / (scale * cosCenter / 15);
        const dDec = -(sy - H / 2) / (scale / 15);
        let ra = centerRA + dRA / 15;
        ra = ((ra % 24) + 24) % 24;
        const dec = centerDec + dDec;
        return { ra, dec };
    }

    // Magnitude to visual size
    function magToSize(mag) {
        return Math.max(0.5, 4 - mag * 0.7);
    }

    // Spectral type to color
    function specToColor(spec) {
        if (!spec) return '#ffffff';
        const c = spec[0];
        const colors = { O: '#9bb0ff', B: '#aabfff', A: '#cad7ff', F: '#f8f7ff', G: '#fff4e8', K: '#ffd2a1', M: '#ffcc6f' };
        return colors[c] || '#ffffff';
    }

    // Mouse / touch
    canvas.addEventListener('mousedown', (e) => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
    canvas.addEventListener('mousemove', (e) => {
        if (dragging) {
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            const scale = fov / Math.min(W, H);
            centerRA += dx * scale * 0.05;
            centerDec += dy * scale * 0.8;
            centerDec = Math.max(-85, Math.min(85, centerDec));
            centerRA = ((centerRA % 24) + 24) % 24;
            lastX = e.clientX; lastY = e.clientY;
        }
        // Hover detection
        const coords = unproject(e.clientX, e.clientY);
        coordDisplay.textContent = `RA ${Math.floor(coords.ra)}h ${Math.floor((coords.ra % 1) * 60)}m | Dec ${coords.dec >= 0 ? '+' : ''}${Math.floor(coords.dec)}\u00B0`;

        hoveredStar = null;
        for (const star of stars) {
            const p = project(star.ra, star.dec);
            const d = Math.hypot(p.x - e.clientX, p.y - e.clientY);
            if (d < 15) { hoveredStar = star; break; }
        }
        if (hoveredStar) {
            infoPanel.querySelector('.star-name').textContent = `${hoveredStar.name} (${hoveredStar.bayer})`;
            infoPanel.querySelector('.star-detail').textContent = `${hoveredStar.myth} | Mag ${hoveredStar.mag.toFixed(2)} | ${hoveredStar.con}`;
            infoPanel.classList.add('visible');
        } else {
            infoPanel.classList.remove('visible');
        }
    });
    canvas.addEventListener('mouseup', () => { dragging = false; });
    canvas.addEventListener('wheel', (e) => {
        fov += e.deltaY * 0.05;
        fov = Math.max(10, Math.min(180, fov));
        e.preventDefault();
    }, { passive: false });

    // Touch
    let touchDist = 0;
    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
            touchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
        e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
        if (e.touches.length === 1 && dragging) {
            const dx = e.touches[0].clientX - lastX;
            const dy = e.touches[0].clientY - lastY;
            const scale = fov / Math.min(W, H);
            centerRA += dx * scale * 0.05;
            centerDec += dy * scale * 0.8;
            centerDec = Math.max(-85, Math.min(85, centerDec));
            centerRA = ((centerRA % 24) + 24) % 24;
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
            const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            fov *= touchDist / d;
            fov = Math.max(10, Math.min(180, fov));
            touchDist = d;
        }
        e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchend', () => { dragging = false; });

    let time = 0;
    function draw() {
        time += 0.016;
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(0, 0, W, H);

        // Milky Way
        if (showMilkyWay) {
            for (const band of milkyWayRA) {
                const p = project(band.ra, band.dec);
                const r = band.width * Math.min(W, H) / fov;
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
                grad.addColorStop(0, 'rgba(200,200,255,0.04)');
                grad.addColorStop(0.5, 'rgba(180,180,220,0.02)');
                grad.addColorStop(1, 'rgba(150,150,200,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(p.x - r, p.y - r, r * 2, r * 2);
            }
        }

        // Grid
        if (showGrid) {
            ctx.strokeStyle = 'rgba(138,154,91,0.15)';
            ctx.lineWidth = 0.5;
            for (let ra = 0; ra < 24; ra += 1) {
                ctx.beginPath();
                for (let dec = -80; dec <= 80; dec += 2) {
                    const p = project(ra, dec);
                    if (dec === -80) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }
            for (let dec = -60; dec <= 60; dec += 30) {
                ctx.beginPath();
                for (let ra = 0; ra <= 24; ra += 0.2) {
                    const p = project(ra, dec);
                    if (ra === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
            }
            // Label grid
            ctx.fillStyle = 'rgba(138,154,91,0.3)';
            ctx.font = '10px monospace';
            for (let ra = 0; ra < 24; ra += 2) {
                const p = project(ra, 0);
                if (p.x > 0 && p.x < W && p.y > 0 && p.y < H) {
                    ctx.fillText(ra + 'h', p.x + 2, p.y - 2);
                }
            }
        }

        // Background stars with twinkle
        for (const s of bgStars) {
            const p = project(s.ra, s.dec);
            if (p.x < -10 || p.x > W + 10 || p.y < -10 || p.y > H + 10) continue;
            const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * 2 + s.twinkle));
            const sz = magToSize(s.mag) * twinkle;
            ctx.globalAlpha = twinkle * 0.6;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(p.x, p.y, sz * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Constellation lines
        if (showLines) {
            ctx.strokeStyle = 'rgba(138,154,91,0.35)';
            ctx.lineWidth = 1;
            for (const [name, lines] of Object.entries(constellationLines)) {
                for (const [i, j] of lines) {
                    const p1 = project(stars[i].ra, stars[i].dec);
                    const p2 = project(stars[j].ra, stars[j].dec);
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }
            }
        }

        // Named stars
        for (const star of stars) {
            const p = project(star.ra, star.dec);
            if (p.x < -50 || p.x > W + 50 || p.y < -50 || p.y > H + 50) continue;
            const sz = magToSize(star.mag);
            const color = specToColor(star.spec);
            const isHovered = star === hoveredStar;

            // Glow
            const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, sz * (isHovered ? 8 : 4));
            grad.addColorStop(0, color);
            grad.addColorStop(0.3, color.replace(')', ',0.3)').replace('rgb', 'rgba'));
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(p.x, p.y, sz * (isHovered ? 8 : 4), 0, Math.PI * 2);
            ctx.fill();

            // Core
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
            ctx.fill();

            // Name
            if (showNames && fov < 120) {
                ctx.fillStyle = isHovered ? '#DDA15E' : 'rgba(254,250,224,0.6)';
                ctx.font = isHovered ? 'bold 12px Segoe UI, sans-serif' : '10px Segoe UI, sans-serif';
                ctx.fillText(star.name, p.x + sz + 4, p.y + 3);
            }
        }

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        centerRA = 6.0;
        centerDec = 20.0;
        fov = 90;
        showLines = true; showNames = true; showGrid = false; showMilkyWay = true;
        document.getElementById('btn-lines').classList.add('active');
        document.getElementById('btn-names').classList.add('active');
        document.getElementById('btn-grid').classList.remove('active');
        document.getElementById('btn-milkyway').classList.add('active');
    };
