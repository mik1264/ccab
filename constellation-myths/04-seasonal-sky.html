<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seasonal Sky Rotation - Constellation Myths</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080818; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        a[href="index.html"] { position: fixed; top: 10px; left: 10px; color: #8A9A5B; text-decoration: none; z-index: 1000; font-size: 1.2rem; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; align-items: center; z-index: 100;
            background: rgba(8,8,24,0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(138,154,91,0.25); border-radius: 16px;
            padding: 12px 20px;
        }
        .season-btn {
            background: rgba(138,154,91,0.15); border: 1px solid rgba(138,154,91,0.3);
            color: #8A9A5B; padding: 8px 16px; border-radius: 10px; cursor: pointer;
            font-size: 0.85rem; transition: all 0.3s;
        }
        .season-btn:hover { background: rgba(138,154,91,0.3); }
        .season-btn.active { background: rgba(221,161,94,0.25); border-color: #DDA15E; color: #DDA15E; }
        #month-label { color: #DDA15E; font-size: 1.2rem; font-weight: 700; min-width: 120px; text-align: center; }
        #month-slider {
            width: 200px; -webkit-appearance: none; background: rgba(138,154,91,0.2);
            height: 4px; border-radius: 2px;
        }
        #month-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px; background: #DDA15E; border-radius: 50%; cursor: pointer;
        }
        #horizon-info {
            position: fixed; top: 60px; right: 20px; width: 240px;
            background: rgba(8,8,24,0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(138,154,91,0.2); border-radius: 12px;
            padding: 14px; color: #FEFAE0; z-index: 100; font-size: 0.85rem; line-height: 1.6;
        }
        #horizon-info h3 { color: #DDA15E; margin-bottom: 6px; }
    </style>
</head>
<body>
    <a href="index.html">&larr; Back</a>
    <canvas id="canvas"></canvas>
    <div id="horizon-info">
        <h3 id="season-name">Winter</h3>
        <p id="season-desc">Orion dominates the sky. Sirius blazes near the horizon. The Winter Hexagon connects the brightest stars of the season.</p>
    </div>
    <div id="controls">
        <button class="season-btn active" data-month="0">Winter</button>
        <button class="season-btn" data-month="3">Spring</button>
        <button class="season-btn" data-month="6">Summer</button>
        <button class="season-btn" data-month="9">Autumn</button>
        <input type="range" id="month-slider" min="0" max="11.9" step="0.1" value="0">
        <span id="month-label">January</span>
    </div>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const monthSlider = document.getElementById('month-slider');
    const monthLabel = document.getElementById('month-label');

    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    let resizeTimer;
    window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resize, 150); });

    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const SEASONS = {
        0: { name: 'Winter', desc: 'Orion the Hunter strides across the sky with his belt of three stars. Sirius, the brightest star, follows at his heel. The Winter Hexagon — six first-magnitude stars — forms the grandest asterism of the year.' },
        3: { name: 'Spring', desc: 'Leo the Lion rises high. Follow the arc of the Big Dipper\'s handle to "arc to Arcturus" and "spike to Spica." The Virgo Cluster of galaxies lurks behind these stars.' },
        6: { name: 'Summer', desc: 'The Summer Triangle of Vega, Deneb, and Altair soars overhead. The Milky Way arches from Sagittarius through Cygnus, revealing the center of our galaxy. Scorpius hugs the southern horizon.' },
        9: { name: 'Autumn', desc: 'The Great Square of Pegasus marks the season. Andromeda stretches from its corner toward Perseus. The Andromeda Galaxy — the most distant object visible to the naked eye — glows faintly nearby.' }
    };

    // Stars with seasonal visibility (RA determines when overhead at midnight)
    const stars = [
        // Winter stars (RA ~4-8h)
        { ra: 5.919, dec: 7.4, mag: 0.42, name: 'Betelgeuse', color: '#ffcc6f' },
        { ra: 5.242, dec: -8.2, mag: 0.12, name: 'Rigel', color: '#aabfff' },
        { ra: 6.752, dec: -16.7, mag: -1.46, name: 'Sirius', color: '#cad7ff' },
        { ra: 4.598, dec: 16.5, mag: 0.85, name: 'Aldebaran', color: '#ffd2a1' },
        { ra: 5.278, dec: 46.0, mag: 0.08, name: 'Capella', color: '#fff4e8' },
        { ra: 7.755, dec: 28.0, mag: 1.14, name: 'Pollux', color: '#ffd2a1' },
        { ra: 7.655, dec: 5.2, mag: 0.34, name: 'Procyon', color: '#f8f7ff' },
        { ra: 5.679, dec: -1.9, mag: 1.7, name: 'Alnilam', color: '#aabfff' },
        // Spring stars (RA ~10-14h)
        { ra: 10.140, dec: 12.0, mag: 1.35, name: 'Regulus', color: '#aabfff' },
        { ra: 14.261, dec: 19.2, mag: -0.05, name: 'Arcturus', color: '#ffd2a1' },
        { ra: 13.420, dec: -11.2, mag: 0.97, name: 'Spica', color: '#aabfff' },
        { ra: 11.897, dec: 53.7, mag: 2.44, name: 'Phecda', color: '#cad7ff' },
        // Summer stars (RA ~18-21h)
        { ra: 18.616, dec: 38.8, mag: 0.03, name: 'Vega', color: '#cad7ff' },
        { ra: 20.691, dec: 45.3, mag: 1.25, name: 'Deneb', color: '#cad7ff' },
        { ra: 19.846, dec: 8.9, mag: 0.77, name: 'Altair', color: '#f8f7ff' },
        { ra: 16.490, dec: -26.4, mag: 0.96, name: 'Antares', color: '#ffcc6f' },
        // Autumn stars (RA ~0-3h)
        { ra: 0.139, dec: 29.1, mag: 2.06, name: 'Alpheratz', color: '#aabfff' },
        { ra: 1.163, dec: 35.6, mag: 2.07, name: 'Mirach', color: '#ffd2a1' },
        { ra: 0.438, dec: 15.2, mag: 2.83, name: 'Algenib', color: '#aabfff' },
        { ra: 23.063, dec: 28.1, mag: 2.39, name: 'Markab', color: '#aabfff' },
        { ra: 0.675, dec: 56.5, mag: 2.24, name: 'Schedar', color: '#ffd2a1' },
        // Circumpolar
        { ra: 2.530, dec: 89.3, mag: 1.98, name: 'Polaris', color: '#f8f7ff' },
        { ra: 11.062, dec: 61.8, mag: 1.79, name: 'Dubhe', color: '#ffd2a1' },
    ];

    // Seasonal constellation lines
    const seasonLines = [
        // Winter hexagon: Capella-Aldebaran-Rigel-Sirius-Procyon-Pollux
        [4,3],[3,1],[1,2],[2,6],[6,5],[5,4],
        // Orion belt
        [0,7],[7,1],
        // Summer triangle
        [12,13],[13,14],[14,12],
        // Great Square of Pegasus
        [16,18],[18,19],[19,16],
    ];

    let currentMonth = 0;
    let animTime = 0;
    let autoPlay = false;

    // Background stars
    const bgStars = [];
    for (let i = 0; i < 1200; i++) {
        bgStars.push({ ra: Math.random() * 24, dec: -30 + Math.random() * 120, mag: 3 + Math.random() * 3, tw: Math.random() * Math.PI * 2 });
    }

    document.querySelectorAll('.season-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentMonth = parseInt(btn.dataset.month);
            monthSlider.value = currentMonth;
            document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    monthSlider.addEventListener('input', () => {
        currentMonth = parseFloat(monthSlider.value);
        document.querySelectorAll('.season-btn').forEach(b => {
            b.classList.toggle('active', Math.abs(parseInt(b.dataset.month) - currentMonth) < 1.5 ||
                (parseInt(b.dataset.month) === 0 && currentMonth > 10.5));
        });
    });

    // Project: all-sky view from 40N latitude
    function project(ra, dec, monthOffset) {
        const cx = W / 2, cy = H * 0.5;
        const radius = Math.min(W, H) * 0.42;
        const lat = 40 * Math.PI / 180;

        // Sidereal time offset for month
        const lst = (monthOffset / 12 * 24 + 18) % 24; // Local sidereal time at midnight
        const ha = (lst - ra) * 15 * Math.PI / 180; // Hour angle in radians
        const decR = dec * Math.PI / 180;

        // Alt-az conversion
        const alt = Math.asin(Math.sin(lat) * Math.sin(decR) + Math.cos(lat) * Math.cos(decR) * Math.cos(ha));
        const az = Math.atan2(-Math.cos(decR) * Math.sin(ha), Math.sin(decR) * Math.cos(lat) - Math.cos(decR) * Math.sin(lat) * Math.cos(ha));

        if (alt < -0.1) return null; // Below horizon

        const r = (1 - alt / (Math.PI / 2)) * radius;
        const x = cx + r * Math.sin(az);
        const y = cy - r * Math.cos(az);
        return { x, y, alt };
    }

    function getSeason(month) {
        if (month < 2 || month >= 11) return SEASONS[0];
        if (month < 5) return SEASONS[3];
        if (month < 8) return SEASONS[6];
        return SEASONS[9];
    }

    function draw() {
        animTime += 0.016;
        ctx.fillStyle = '#080818';
        ctx.fillRect(0, 0, W, H);

        const cx = W / 2, cy = H * 0.5;
        const radius = Math.min(W, H) * 0.42;

        monthLabel.textContent = MONTHS[Math.floor(currentMonth) % 12];
        const season = getSeason(currentMonth);
        document.getElementById('season-name').textContent = season.name;
        document.getElementById('season-desc').textContent = season.desc;

        // Horizon circle
        ctx.strokeStyle = 'rgba(138,154,91,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.stroke();

        // Horizon gradient (ground)
        const horizGrad = ctx.createRadialGradient(cx, cy, radius * 0.95, cx, cy, radius * 1.1);
        horizGrad.addColorStop(0, 'transparent');
        horizGrad.addColorStop(1, 'rgba(40,60,30,0.3)');
        ctx.fillStyle = horizGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 1.1, 0, Math.PI * 2);
        ctx.fill();

        // Cardinal directions
        ctx.fillStyle = 'rgba(138,154,91,0.6)';
        ctx.font = '14px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('N', cx, cy - radius - 8);
        ctx.fillText('S', cx, cy + radius + 18);
        ctx.fillText('E', cx - radius - 14, cy + 5);
        ctx.fillText('W', cx + radius + 14, cy + 5);
        ctx.textAlign = 'left';

        // Milky Way band (simplified)
        const mwRA = [17, 18, 19, 20, 21, 22, 23, 0, 1, 2, 3, 4, 5, 6, 7];
        const mwDec = [-35, -25, -10, 5, 20, 35, 50, 55, 55, 50, 40, 25, 10, -5, -20];
        for (let i = 0; i < mwRA.length; i++) {
            const p = project(mwRA[i], mwDec[i], currentMonth);
            if (!p) continue;
            const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 40);
            grad.addColorStop(0, 'rgba(180,180,220,0.04)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 40, 0, Math.PI * 2);
            ctx.fill();
        }

        // Background stars
        for (const s of bgStars) {
            const p = project(s.ra, s.dec, currentMonth);
            if (!p) continue;
            const tw = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(animTime * 2 + s.tw));
            const altFade = Math.min(1, p.alt / 0.15);
            ctx.globalAlpha = tw * 0.4 * altFade;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.4, 2.5 - s.mag * 0.4), 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // Constellation lines
        ctx.strokeStyle = 'rgba(138,154,91,0.25)';
        ctx.lineWidth = 1;
        for (const [i, j] of seasonLines) {
            const p1 = project(stars[i].ra, stars[i].dec, currentMonth);
            const p2 = project(stars[j].ra, stars[j].dec, currentMonth);
            if (!p1 || !p2) continue;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        }

        // Named stars
        for (const star of stars) {
            const p = project(star.ra, star.dec, currentMonth);
            if (!p) continue;
            const altFade = Math.min(1, p.alt / 0.1);
            const sz = Math.max(0.1, Math.max(1, 4 - star.mag * 0.7) * altFade);

            // Glow
            const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, sz * 5);
            grad.addColorStop(0, star.color);
            grad.addColorStop(0.4, star.color.slice(0, 7) + '33');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(p.x, p.y, sz * 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = star.color;
            ctx.globalAlpha = altFade;
            ctx.beginPath();
            ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
            ctx.fill();

            // Name
            ctx.fillStyle = 'rgba(254,250,224,0.7)';
            ctx.font = '10px Segoe UI';
            ctx.fillText(star.name, p.x + sz + 4, p.y + 3);
            ctx.globalAlpha = 1;
        }

        // Zenith marker
        ctx.fillStyle = 'rgba(221,161,94,0.3)';
        ctx.font = '10px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('Zenith', cx, cy - 8);
        ctx.textAlign = 'left';

        requestAnimationFrame(draw);
    }

    window.reset = function() {
        currentMonth = 0;
        monthSlider.value = 0;
        document.querySelectorAll('.season-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
    };

    draw();
    </script>
    <script src="../assets/js/enhance.js" defer></script>
</body>
</html>
